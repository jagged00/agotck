l_french:
 DRAGON_IN_SIEGE:0 "Recourir à un dragon"
 agot_dragon_siege.gui_tt_event_already_fired:0 "Vous envisagez déjà le cas de ce siège…"
 agot_dragon_siege.gui_tt_cant_siege_pirate_den:0 "Les pirates utilisent l'environnement pour se cacher, rendant l'utilisation d'un dragon impossible."
 agot_dragon_siege.gui_tt_one_dragon_bound:0 "[sieging_rider.Custom('FR_le_Char_U_Pi')|U][sieging_rider.GetShortUIName|U] [Select_CString(sieging_rider.IsLocalPlayer,'serez','sera')] chargé d’assiéger [sieging_location.GetTitle.GetNameNoTierNoTooltip] à l’aide de [sieging_dragon.GetName] [Select_CString(sieging_rider.IsLocalPlayer,'selon votre bon vouloir','selon vos directives')]."
 agot_dragon_siege.gui_tt_one_dragon_free:0 "[sieging_rider.Custom('FR_le_Char_U_Pi')|U][sieging_rider.GetShortUIName|U] [Select_CString(sieging_rider.IsLocalPlayer,'serez','sera')] chargé d’assiéger [sieging_location.GetTitle.GetNameNoTierNoTooltip] à l’aide de [sieging_dragon.GetName] [Select_CString(sieging_rider.IsLocalPlayer,'selon votre bon vouloir',Select_CString(sieging_rider.IsFemale,'comme elle l’entend','comme il l’entend'))]."
 agot_dragon_siege.gui_tt_multiple_dragons:0 "Puisqu'il y a de nombreux dragonniers disponibles pour assiéger [sieging_location.GetTitle.GetNameNoTierNoTooltip], [Scope.Char.Custom('FR_le_Char_U_Pi')][Scope.Char.GetShortUIName] [Select_CString(sieging_rider.IsLocalPlayer,'pourrez','pourra')] choisir quel dragon utiliser."
 agot_dragon_siege.gui_anti_dragon_tt:0 "@warning_icon!#warning La présence d’[men_at_arms|El] [anti_dragon_maa|El] chez les défenseurs augmente le risque d'une telle action.#!"
 agot_dragon_siege.gui_scorpion_1_tt:0 "@warning_icon!#warning La présence d'emplacements pour scorpion augmente le risque d'une telle action.#!"
 agot_dragon_siege.gui_scorpion_2_tt:0 "@warning_icon!#warning La présence d'emplacements pour scorpion lourd augmente fortement le risque d'une telle action.#!"
 agot_dragon_siege.gui_tt_check:0 "Vous ne pouvez pas utiliser votre dragon durant un siège plus d'une fois par jour."
 agot_dragon_siege.gui_tt_commander_check:0 "L'utilisation d'un dragon contre une propriété est limitée à une fois tous les trois mois. Le dernier assaillant fut [sieging_location.GetTitle.MakeScope.Var('used_dragon_sieged_today').Char.GetName]."
 agot_dragon_siege.gui_tt_no_valid_rider:0 "Aucun dragonnier n'est disponible pour assiéger."
 agot_dragon_siege.gui_tt_cant_damage_single:0 "[only_dragon.GetFirstName] n'est pas assez grand[only_dragon.Custom('DR_FR_E')] pour endommager davantage cette propriété."
 agot_dragon_siege.gui_tt_cant_damage_multiple:0 "Aucun dragon assez grand pour endommager davantage cette propriété n'est disponible."
 agot_dragon_siege.tt.rider_already_attacked.single:0 "[only_dragon.MakeScope.Var('current_rider').Char.GetName] a déjà attaqué [sieging_location.GetName]…"
 agot_dragon_siege.tt.rider_already_attacked.multiple:0 "Tous les dragonniers potentiels disponibles ont déjà attaqué [sieging_location.GetName]…"
 agot_dragon_siege.title:0 "[sieging_location.GetNameNoTooltip] en état de siège :"
 agot_dragon_siege.scorpion_1_warning:0 "@warning_icon!#warning [sieging_location.GetName] possède des emplacements pour scorpion, augmentant le risque d'utiliser [sieging_dragon.GetFirstName] durant ce siège.#!"
 agot_dragon_siege.scorpion_2_warning:0 "@warning_icon!#warning [sieging_location.GetName] possède des emplacements pour scorpion lourd, augmentant le risque d'utiliser [sieging_dragon.GetFirstName] durant ce siège.#!"
 agot_dragon_siege.ineffective:0 "L'attaque de votre dragon a été inefficace."
 agot_dragon_siege.0001.t:0 "$agot_dragon_siege.title$ Qui pour délivrer le Fléau ?"
 agot_dragon_siege.0001.desc.a:0 "La peur envahie [sieging_location.GetName]. La peur de voir des trombes de flammes en furie s'abattre, et avec elles, "
 agot_dragon_siege.0001.desc.b:0 "[other_dragon_rider.Custom('FR_le_Char_Pi')][other_dragon_rider.GetTitledFirstName] juché[other_dragon_rider.Custom('FR_E')] sur le dos de [sieging_dragon.GetNameNicknamed]."
 agot_dragon_siege.0001.desc.c:0 "les ombres ailées qui réduiront en lambeaux la bravoure que le feu aura épargnée."
 agot_dragon_siege.0001.desc.d:0 "\n\nSans oublier m[myself_current_dragon.Custom('DR_FR_OnA')] fidèle [myself_current_dragon.GetName], qui balaiera ces [sieging_location.Custom('FR_TerrainTypeProvince_Plural')] de son souffle si l'envie me sied…"
 agot_dragon_siege.0001.desc.e:0 "\n\nJ'aurais aimé pouvoir compter sur m[myself_current_dragon.Custom('DR_FR_OnA')] fidèle [myself_current_dragon.GetName], mais [myself_current_dragon.Custom('DR_FR_IlElle')] n'est pas de taille pour un tel défi…"
 agot_dragon_siege.0001.a:0 "...c'est à vous que revient l'honneur."
 agot_dragon_siege.0001.a.tt:0 "[THIS.Var('si_selected_character').Char.Custom('FR_le_Char_Pi')|U][THIS.Var('si_selected_character').Char.GetTitledFirstName] attaquera avec son dragon."
 agot_dragon_siege.0001.b:0 "[other_dragon_rider.GetTitledFirstNameNoTooltip], écourtez-moi ce siège."
 agot_dragon_siege.0001.b.tt:0 "[other_dragon_rider.Custom('FR_le_Char_Pi')|U][other_dragon_rider.GetTitledFirstName] attaquera avec [sieging_dragon.GetName]"
 agot_dragon_siege.0001.c:0 "J'apporterais moi-même la destruction à nos ennemis !"
 agot_dragon_siege.0001.c.tt:0 "[myself_sieging_dragonrider.Custom('FR_le_Char_U_Pi')|U][myself_sieging_dragonrider.GetShortUIName|U] [Select_CString(myself_sieging_dragonrider.IsLocalPlayer,'attaquerez','attaquera')] avec [myself_current_dragon.GetName]"
 agot_dragon_siege.0001.d:0 "Finalement, je préfère me passer du feu d'un dragon."
 agot_dragon_siege.0001.d.tt:0 "Le siège se poursuivra sans soutien d'aucun dragon."
 agot_dragon_siege.0002.t:0 "$agot_dragon_siege.title$ Commander au feu"
 agot_dragon_siege.0002.desc:0 "Quel spectacle grandiose que de voir [sieging_rider.Custom('FR_le_Char_Pi')][sieging_rider.GetTitledFirstName]"
 agot_dragon_siege.0002.desc_mounted:0 "ainsi juché[sieging_rider.Custom('FR_E')] sur [sieging_dragon.GetName]. Dans ses yeux brûlent déjà notre victoire, comme le feront nos ennemis dans les flammes.\n\n"
 agot_dragon_siege.0002.desc_land:0 "se tenir aux côtés de [sieging_dragon.GetName]. La paisible concentration qui se lit dans ses yeux me fait l'effet du calme avant la tempête, et déjà elle s'annonce ardente et cinglante pour nos ennemis.\n\n"
 agot_dragon_siege.0002.desc_end.1:0 "En ma qualité de commandant, il me revient de lui donner les ordres, mais en vertu de sa condition de dragonni[sieging_rider.Custom('FR_ErEre')], il lui appartient de les suivre selon son bon vouloir, car qui dompte un dragon devient de feu, sauvage et imprévisible."
 agot_dragon_siege.0002.desc_end.2:0 "N'étant pas son commandant, [sieging_rider.Custom('FR_IlElle')] n'a aucune obligation de suivre les ordres que je vais lui donner, car qui dompte un dragon devient de feu, sauvage et imprévisible."
 agot_dragon_siege.0002.a:0 "Affaiblissez leurs défenses en ciblant les structures les plus vulnérables."
 agot_dragon_siege.0002.d.f_third:0 "#N;bold Rasez jusqu'à la dernière pierre de cet endroit !#!"
 agot_dragon_siege.0002.e:0 "C'est [defending_dragonrider.GetFirstName] le danger ! C'est [defending_dragonrider.Custom('FR_LuiElle')] qu'il vous faut abattre !"
 agot_dragon_siege.0002.f.f:0 "Le siège va se poursuivre."
 agot_dragon_siege.0002.will_choose:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstNameNoTooltip] choisira de suivre ou non votre ordre."
 agot_dragon_siege.0002.chance_success.order:0 "[sieging_rider.Custom('FR_IlElle')|U] prend en compte votre ordre"
 agot_dragon_siege.0002.chance_success.advice:0 "[sieging_rider.Custom('FR_IlElle')|U] prend en compte votre ordre"
 agot_dragon_siege.0002.chance_failure.order:0 "[sieging_rider.Custom('FR_IlElle')|U] agit comme [sieging_rider.Custom('FR_IlElle')] l'entend"
 agot_dragon_siege.0002.chance_failure.advice:0 "[sieging_rider.Custom('FR_IlElle')|U] agit comme [sieging_rider.Custom('FR_IlElle')] l'entend"
 agot_dragon_siege.0002.tt.2:0 "[sieging_rider.Custom('FR_IlElle')|U] perd du prestige ainsi que l'opinion à votre égard…"
 agot_dragon_siege.0003.t:0 "$agot_dragon_siege.title$ Ardentes réflexions"
 agot_dragon_siege.0003.desc.a:0 "La fresque obsidionale qu'offre [sieging_location.GetName] se dresse devant moi, et comme attendu, [commander.Custom('FR_le_Char_Pi')][commander.GetTitledFirstName] m'ordonne d'y ajouter des nuances de rouge et d'orange, avec pour pinceau [sieging_dragon.GetName] qui"
 agot_dragon_siege.0003.desc.b:0 "La fresque obsidionale qu'offre [sieging_location.GetName] se dresse devant moi, et comme attendu, [commander.Custom('FR_le_Char_Pi')][commander.GetTitledFirstName] me suggère d'y ajouter des nuances de rouge et d'orange, avec pour pinceau [sieging_dragon.GetName] qui"
 agot_dragon_siege.0003.desc.opt_a:0 "soufflera les structures les plus vulnérables pour effriter les défenses.\n\nUne approche mesurée, mais non sans risque."
 agot_dragon_siege.0003.desc.opt_b:0 "soufflera les défenses, écourtant le siège de ses flammes libérées.\n\nUne approche qui n'est certes pas sans risque, mais qui a au moins le mérite d'être efficace."
 agot_dragon_siege.0003.desc.opt_c:0 "déchaînera sa fureur sans retenue.\n\nUne telle approche ne se fera pas sans risque pour nous, et nombreux périront dans les flammes."
 agot_dragon_siege.0003.desc.opt_d:0 "rasera la moindre parcelle, noyant les [sieging_location.Custom('FR_TerrainTypeProvince_Plural')] alentours dans un déluge ardent.\n\nC'est pour le moins ce qu'on peut appeler une mesure draconienne…"
 agot_dragon_siege.0003.desc.opt_e:0 "affrontera tout dragon ennemi qui pourrait interférer dans le siège.\n\nC'est sans conteste le défi le plus dangereux qu'un[ROOT.Char.Custom('FR_E')] dragonni[ROOT.Char.Custom('FR_ErEre')] peut relever…"
 agot_dragon_siege.0003.desc.c:0 "\n\nLe privilège propre à un dragonni[ROOT.Char.Custom('FR_ErEre')] étant d'avoir un dragon à ses côtés, de fait, nul ne peut me contraindre à quoi que ce soit. Pour autant, je n'oublie que je suis tenu par serment d'obéir aux ordres de m[sieging_rider.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('commander'))]."
 agot_dragon_siege.0003.a.1:0 "Je ferai ce que l'on attend de moi."
 agot_dragon_siege.0003.a.2:0 "Cela semble d'une prudence bienvenue."
 agot_dragon_siege.0003.a.toast.t:0 "Le siège de [sieging_location.GetTitle.GetNameNoTierNoTooltip]"
 agot_dragon_siege.0003.a.toast.tt.order:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstNameNoTooltip] a suivi votre ordre et utilisé [sieging_dragon.GetFirstNameNoTooltip] comme vous l'espériez."
 agot_dragon_siege.0003.a.toast.tt.advice:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstNameNoTooltip] a utilisé [sieging_dragon.GetFirstNameNoTooltip] comme vous l'espériez."
 agot_dragon_siege.0003.b.1:0 "Un[sieging_rider.Custom('FR_ErEre')] dragonni[sieging_rider.Custom('FR_ErEre')] n'est pas un fantassin que l'on commande à sa guise !"
 agot_dragon_siege.0003.b.2:0 "J'agirai comme bon me semble."
 agot_dragon_siege.0003.b.f.order:0 "Vous contrevenez à l'ordre qui vous a été donné."
 agot_dragon_siege.0003.b.f.advice:0 "Vous ne tenez pas compte de la volonté [commander.Custom('FR_du_Char_Pi')][commander.GetTitledFirstNameNoTooltip]."
 agot_dragon_siege.0003.b.tt:0 "Puisque je ne suis tenu[sieging_rider.Custom('FR_E')] sous aucun serment d'obéir [commander.Custom('FR_du_Char_Pi')][commander.GetTitledFirstNameNoTooltip], il m'appartient de choisir ce que je veux que [sieging_dragon.GetFirstName] fasse ou non."
 agot_dragon_siege.0003.b.toast.t:0 "Le siège de [sieging_location.GetTitle.GetNameNoTierNoTooltip]"
 agot_dragon_siege.0003.b.toast.tt.order:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstNameNoTooltip] a fait fi de votre autorité et choisi de ne pas utiliser [sieging_dragon.GetFirstNameNoTooltip]."
 agot_dragon_siege.0003.b.toast.tt.advice:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstNameNoTooltip] a fait fi de votre volonté et choisi de ne pas utiliser [sieging_dragon.GetFirstNameNoTooltip]."
 agot_dragon_siege.0003.c:0 "Je n'ai aucune envie de m'éterniser ici."
 agot_dragon_siege.0003.c.f:0 "Vous quittez le siège à dos de dragon…"
 agot_dragon_siege.0003.d:0 "Personne ne me donne d'ordre, ni maintenant, ni jamais ! Personne !"
 agot_dragon_siege.0003.d.f:0 "@warning_icon!#warning Vous rejetterez systématiquement les ordres qui vous sont donnés, au mépris de toute conséquence que cela pourrait entraîner…#!"
 agot_dragon_siege.0100.t:0 "$agot_dragon_siege.title$ Que s'abatte le Fléau"
 agot_dragon_siege.0100.desc_opening:0 "De hauts murs se dressent devant moi, mais mes yeux les voient bien moindres ainsi perchés sur le dos de [sieging_dragon.GetName]. Nos troupes encerclent [sieging_location.GetName] où les défenseurs se terrent, comme des souris effrayées par le chat qui lorgne — et malheur à eux car le chat est un immense fauve d'écailles aux crocs plus acérés que des épées.\n\n"
 agot_dragon_siege.0100.desc_opening_third:0 "De hauts murs se dressent devant moi, mais point encore assez hauts pour [sieging_rider.GetFirstName] et [sieging_dragon.GetName]. Nos troupes encerclent [sieging_location.GetName] où les défenseurs se terrent, comme des souris effrayées par le chat qui lorgne —  et le chat est un immense fauve d'écailles aux crocs plus acérés que des épées.\n\n"
 agot_dragon_siege.0100.desc_asked_to_use:0 "[player.Custom('FR_le_Char_Pi')|U][player.GetTitledFirstName] requiert mon intervention en tant que dragonni[ROOT.Char.Custom('FR_ErEre')] pour soutenir l'effort de guerre contre [sieging_location.GetTitle.GetNameNoTier].\n\n"
 agot_dragon_siege.0100.desc_none:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème. Cela ne serait pas sans risque, mais avec [sieging_dragon.GetNameNoTooltip] je pourrais faire pleuvoir le feu et ainsi écourter le siège."
 agot_dragon_siege.0100.desc_none_third:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème. Cela ne serait pas sans risque, mais je pourrais envoyer [sieging_rider.GetFirstNameNoTooltip] et [sieging_dragon.GetNameNoTooltip] faire pleuvoir le feu et ainsi écourter le siège."
 agot_dragon_siege.0100.desc_defender:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème.\n\nDu haut de [sieging_dragon.GetNameNoTooltip] je pourrais faire pleuvoir le feu… mais ce serait oublier la présence [defending_dragonrider.Custom('FR_du_Char_Pi')][defending_dragonrider.GetTitledFirstName] et de [defending_dragon.GetName]. Pour atteindre [sieging_location.GetNameNoTooltip] il me faudra d'abord les affronter…"
 agot_dragon_siege.0100.desc_defender_third:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème.\n\nDu haut de [sieging_dragon.GetNameNoTooltip], [sieging_rider.GetFirstNameNoTooltip] pourrait faire pleuvoir le feu… mais ce serait oublier la présence [defending_dragonrider.Custom('FR_du_Char_Pi')][defending_dragonrider.GetTitledFirstName] et de [defending_dragon.GetName]. Pour atteindre [sieging_location.GetNameNoTooltip] [sieging_rider.Custom('FR_IlElle')] devra d'abord les affronter…"
 agot_dragon_siege.0100.desc_defenders:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème.\n\nDu haut de [sieging_dragon.GetNameNoTooltip] je pourrais faire pleuvoir le feu… mais ce serait oublier la présence de plusieurs dragons, dont [defending_dragon.GetName]. Pour atteindre [sieging_location.GetNameNoTooltip] il me faudra d'abord les affronter… #bold tous autant qu'ils sont !#!"
 agot_dragon_siege.0100.desc_defenders_third:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème.\n\nDu haut de [sieging_dragon.GetNameNoTooltip], [sieging_rider.GetFirstNameNoTooltip] pourrait faire pleuvoir le feu… mais ce serait oublier la présence de plusieurs dragons, dont [defending_dragon.GetName]. Pour atteindre [sieging_location.GetNameNoTooltip] [sieging_rider.Custom('FR_IlElle')] devra d'abord les affronter… #bold tous autant qu'ils sont !#!"
 agot_dragon_siege.0100.desc_owned:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème.\n\nAvec [sieging_dragon.GetNameNoTooltip] je pourrais faire pleuvoir le feu, mais il se trouve que justement ces murs abritent des dragons. Qu'ils soient sans dragonniers rend peu probable l'éventualité qu'ils nous affrontent, mais faible probabilité n'est pas absence de probabilité…"
 agot_dragon_siege.0100.desc_owned_third:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème.\n\nAvec [sieging_dragon.GetNameNoTooltip], [sieging_rider.GetFirstNameNoTooltip] pourrait faire pleuvoir le feu, mais il se trouve que justement ces murs abritent des dragons. Qu'ils soient sans dragonniers rend peu probable l'éventualité qu'ils interviennent, mais faible probabilité n'est pas absence de probabilité…"
 agot_dragon_siege.0100.desc_owned_single:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème.\n\nAvec [sieging_dragon.GetNameNoTooltip] je pourrais faire pleuvoir le feu, mais je ne suis pas sans savoir que [owned_dragon_present.GetName] réside entre ces murs. La bête n'a pas de dragonnier, mais cela n'en reste pas moins un dragon, avec les risques que cela implique…"
 agot_dragon_siege.0100.desc_owned_single_third:0 "Avec le temps nous pourrions les contraindre à capituler, mais si les murs font obstacle aux armées clouées au sol, pour les dragons un simple battement d'aile contourne aisément le problème.\n\nAvec [sieging_dragon.GetNameNoTooltip], [sieging_rider.GetFirstNameNoTooltip] pourrait faire pleuvoir le feu, mais je ne suis pas sans savoir que [owned_dragon_present.GetName] réside entre ces murs. La bête n'a pas de dragonnier, mais cela n'en reste pas moins un dragon, avec les risques que cela implique…"
 agot_dragon_siege.0100.a:0 "Affaiblissons leurs défenses en ciblant les structures les plus vulnérables."
 agot_dragon_siege.0100.a.f:0 "C'est l'approche la moins risquée. [sieging_rider.Custom('FR_le_Char_U_Pi')|U][sieging_rider.GetShortUIName|U] [Select_CString(sieging_rider.IsLocalPlayer,'chevaucherez','chevauchera')] [sieging_dragon.GetNameNoTooltip] pour frapper les points faibles et amoindrir les défenses."
 agot_dragon_siege.0100.b:0 "Ces murs ne sauront les protéger du feu du dragon."
 agot_dragon_siege.0100.b.f:0 "[sieging_rider.Custom('FR_le_Char_U_Pi')|U][sieging_rider.GetShortUIName|U] [Select_CString(sieging_rider.IsLocalPlayer,'utiliserez','utilisera')] [sieging_dragon.GetNameNoTooltip] pour détruire les fortifications et tenter de mettre fin au siège dans un glorieux coup d'éclat."
 agot_dragon_siege.0100.c:0 "La pitié n'a pas sa place ici. #N Je brûlerais la pierre et la chair !#!"
 agot_dragon_siege.0100.c.f:0 "Faisant fi de toute forme de considération, [sieging_rider.Custom('FR_le_Char_U_Pi')][sieging_rider.GetShortUIName] [Select_CString(sieging_rider.IsLocalPlayer,'déchaînerez','déchaînera')] [sieging_dragon.GetNameNoTooltip] sur les défenses ainsi que le donjon afin de ne rien épargner."
 agot_dragon_siege.0100.c.tt:0 "#N Nombreux sont ceux qui brûleront ou périront.#!"
 agot_dragon_siege.0100.c.tt.family:0 "@warning_icon! [family_scope.GetFirstName] se trouve à [sieging_location.GetNameNoTooltip]. #X [family_scope.Custom('FR_IlElle')|U] pourrait être blessé[family_scope.Custom('FR_E')] ou tué[family_scope.Custom('FR_E')] !#!"
 agot_dragon_siege.0100.d:0 "#N;bold [Select_CString(sieging_rider.IsLocalPlayer,'Je vais raser','Rasez')] cet endroit jusqu'à la dernière pierre !#!"
 agot_dragon_siege.0100.d.f:0 "Vous raserez la propriété pour qu'il n'en reste que des cendres et des ruines."
 agot_dragon_siege.0100.d.f_third:0 "[sieging_rider.Custom('FR_le_Char_U_Pi')|U][sieging_rider.GetShortUIName|U] [Select_CString(sieging_rider.IsLocalPlayer,'raserez','rasera')] la propriété pour qu'il n'en reste que des cendres et des ruines."
 agot_dragon_siege.0100.d.tt:0 "#N Nul n'en réchappera vivant.#!"
 agot_dragon_siege.0100.d.tt.family:0 "@warning_icon! [family_scope.GetFirstName] se trouve à [sieging_location.GetNameNoTooltip]. #X [family_scope.Custom('FR_IlElle')|U] sera dévoré[family_scope.Custom('FR_E')] par les flammes.#!"
 agot_dragon_siege.0100.e:0 "[defending_dragonrider.GetFirstNameNoTooltip] ! Viens donc !"
 agot_dragon_siege.0100.e.f:0 "[sieging_rider.Custom('FR_le_Char_U_Pi')|U][sieging_rider.GetShortUIName|U] [Select_CString(sieging_rider.IsLocalPlayer,'devrez','devra')] affronter [defending_dragonrider.Custom('FR_le_Char_Pi')][defending_dragonrider.GetTitledFirstNameNoTooltip] et [defending_dragon.GetFirstNameNoTooltip]."
 agot_dragon_siege.0100.f:0 "Je n'ai pas besoin de dragon pour prendre cette place forte."
 agot_dragon_siege.0100.f.f:0 "Le siège va se poursuivre."
 agot_dragon_siege.0101.t:0 "$agot_dragon_siege.title$ Le feu du dragon !"
 agot_dragon_siege.0101.intro:0 "Où que mes pas me portent le long des remparts et où que mes yeux se posent au-delà, la marée humaine n'en finit pas. [location.GetName] est encerclé d'ennemis, présageant un long et inévitable siège… c'est du moins ce que ma sottise me laisse croire avant d'être violement rudoyé par la réalité…\n\n"
 agot_dragon_siege.0101.bigboi:0 "Un rugissement éclate ! Cinglant comme une bourrasque, il emporte ma bravoure comme frêle tissu au vent. L'ombre ailée voile le soleil et masque la hardiesse, et mes yeux, fidèles vigies qui ne m'obéissent plus, ne peuvent se détourner de l'abîme de terreur qui vole à ma rencontre : [sieging_dragon.GetFirstNameNicknamed], #XB une gigantesque monstruosité#! !\n\n"
 agot_dragon_siege.0101.option1:0 "Un rugissement perce les nuées, aussi strident qu'un cor. Ce n'est pas une offensive qui est annoncée, mais le glas de ceux qui résident ces murs. L'effroi prend la forme d'une silhouette ailée et tandis que mon cœur est déjà frappé du chancre de la terreur, le fléau cingle sur moi : [sieging_dragon.GetFirstNameNicknamed], #X une bête redoutable#! !\n\n"
 agot_dragon_siege.0101.option2:0 "Le soleil se fait couchant quand un rugissement s'élève au loin. Perçant les cieux comme une flèche, tranchant l'air comme une épée, il apporte avec lui une nuée de flammes dansantes qui offrirait presque une forme de grâce et de beauté à la mort qui cingle dans ma direction : [sieging_dragon.GetFirstNameNicknamed], #X un monstre flamboyant#! !\n\n"
 agot_dragon_siege.0101.option3:0 "Jusque-là pesant, le silence est néantisé par un cri mortifère, secouant les [ROOT.Char.GetCurrentLocation.Custom('FR_TerrainTypeProvince_Plural')] et balayant les preux pour ne laisser qu'un amas de poulets sans tête courant en tout sens. Et voilà que plonge ma bête noire : [sieging_dragon.GetFirstNameNicknamed], #X l’immondice cracheuse de flammes#! !\n\n"
 agot_dragon_siege.0101.option4:0 "Un mutisme de mort plane alentour, dans lequel on ne peut entendre que les cœurs qui tambourinent. La délivrance de cette tension mortifère est un rugissement, brisant le silence aussi promptement que le verre jeté au sol. L'effroi est jeté sur mon cœur, comme la noirceur sur mes yeux : [sieging_dragon.GetFirstNameNicknamed], #X la bête qui apporte ma ruine !#!\n\n"
 agot_dragon_siege.0101.outro:0 "J'adresse une prière à qui veut l'entendre avant d'être noyé[ROOT.Char.Custom('FR_E')] dans un ressac de rouge et d'orange. Ma chair brûle tandis que mon âme hurle, dans une éternité qui me laisse voir horrifié[ROOT.Char.Custom('FR_E')] les valeureux soldats autour de moi devenir cendres et poussières…"
 agot_dragon_siege.0101.a:0 "AAAAAAAAAAAAHHHHHH !!!"
 agot_dragon_siege.0101.a.f:0 "Vous en ressortez vivant[THIS.Char.Custom('FR_E')], mais pas indemne…"
 agot_dragon_siege.0102.t:0 "$agot_dragon_siege.title$ Le feu du dragon !"
 agot_dragon_siege.0102.outro:0 "J'adresse une prière à qui veut l'entendre avant d'être figé[ROOT.Char.Custom('FR_E')] dans une tapisserie de rouge et d'orange, dont les fils s'entremêlent dans ma chair pour conter comment de valeureux soldats disparaissent dans la poussière et la cendre…"
 agot_dragon_siege.0102.a:0 "AAAAAAAAAAAAHHHHHH !!!"
 agot_dragon_siege.0102.a.f:0 "Vous êtes brûlé[THIS.Char.Custom('FR_E')] vi[THIS.Char.Custom('FR_FVe')] par [sieging_dragon.GetNameNoTooltip]."
 agot_dragon_siege.0103.t:0 "$agot_dragon_siege.title$ Un trait chanceux"
 agot_dragon_siege.0103.desc.minor:0 "Dans notre envolée vers [sieging_location.GetName], [sieging_dragon.GetName] et moi frappons la première chose que nous croisons : un simple chariot de ravitaillement bêtement laissé hors les murs. Moins que du menu fretin pour le feu d'un dragon, mais ce n'est là que l'orée de la destruction à venir.\n\nVient ensuite une tour, puis un poste de garde, puis une écurie. Je me dis que ce petit jeu a bien assez duré et qu'il est temps d'entrer dans le vif du sujet, mais une douleur ébranle subitement ma fougue. Mon premier réflexe est de pousser un cri, le second est d'en chercher la raison.\n\nUne foutrerie de flèche s'est invitée dans mon abdomen, et déjà le rouge se répand. Dans un rugissement, comme pour signifier la douleur partagée, [sieging_dragon.GetNameNoTooltip] me ramène vers nos lignes, tandis que je discerne brièvement le putain d'archer à qui je dois ce trait — m'est avis plus chanceux que minutieux…"
 agot_dragon_siege.0103.desc:0 "Les cendres de [sieging_location.GetName] volent et virevoltent au gré des va-et-vient de [sieging_dragon.GetName], soufflées par les battements d'ailes et attisées par la mort qui sille tout du long.\n\nEn contrebas, les défenseurs se rassemblent pour s'essayer à une vaine tentative de m'arrêter. D'un ordre je fais choir des trombes de feu qui transforment la chair en poussière et la naïveté en fatalité. La pluie ardente s'abat sans discontinuer, mais aux cris des pauvres hères qui brûlent, vient s'ajouter mon propre cri.\n\nUne foutrerie de flèche s'est invitée dans mon abdomen, et je vois la merdaille qui l'a décochée. Dans un souffle vindicatif, [sieging_dragon.GetFirstNameNoTooltip] l'envoi rejoindre ses camarades carbonisés, comme pour signifier que nul ne s'en prend à un[ROOT.Char.Custom('FR_E')] dragonni[ROOT.Char.Custom('FR_ErEre')] en présence de son dragon, avant de me ramener vers nos lignes…"
 agot_dragon_siege.0103.a:0 "Je reviendrais terminer le travail, bâtard !"
 agot_dragon_siege.0103.a.f:0 "Vous avez été contraint[THIS.Char.Custom('FR_E')] de battre en retraite, non sans avoir causé les dégâts que vous espériez."
 agot_dragon_siege.0104.t:0 "$agot_dragon_siege.title$ Hardiesse ardente"
 agot_dragon_siege.0104.desc.minor:0 "Nos attaques visant à jauger les défenses de [sieging_location.GetName] sont couronnées de succès. Les soldats en garnison les moins prudents sont soit en cendres, soit en sueur, et la dernière cible n'est autre qu'une tour, que [sieging_dragon.GetName] n'aura aucun mal à noyer sous un torrent de flammes.\n\nTandis que la pierre courbe sous son souffle, un soldat, seul, situé au sommet et soulevant une lance, s'élève et s'élance alors que sous ses pieds, le sol s'effondre.\n\nSa témérité le condamne, mais puisqu'ils le sont tous ici bas, ce brave-sans-nom aura au moins fait bien plus que bien d'autres, son jet ayant atteint miraculeusement le ventre de [sieging_dragon.GetNameNoTooltip], qui rugit dans un mélange de furie et de douleur, nous obligeant à faire demi-tour."
 agot_dragon_siege.0104.desc:0 "Les rues de [sieging_location.GetName] ne sont plus que rivières de feu, et les frêles défenseurs qui ne se dispersent pas à l'approche de [sieging_dragon.GetName] se retrouvent noyés ou frappés par le ressac de rouge et d'orange.\n\nDans ce dédale de fournaise et de fureur, les fous qui s'égarent sont soufflés avec panache, pourtant, il en est un qui, à la faveur des ombres, a patienté jusqu'au moment propice pour ficher une lance dans le ventre de [sieging_dragon.GetFirstNameNoTooltip]. La prudence aurait pu l'épargner, mais c'est son audace qui a parlé. Par vaine tentative de gloire, ou simplement par devoir, le voilà balayé d'un jet de furie enflammé.\n\nLes grognements de douleur qui suivent me forcent à ordonner notre retraite !"
 agot_dragon_siege.0104.a:0 "Il faut panser cette blessure !"
 agot_dragon_siege.0104.a.f:0 "Vous avez été contraint[THIS.Char.Custom('FR_E')] de battre en retraite, non sans avoir causé les dégâts que vous espériez."
 agot_dragon_siege.0105.t:0 "$agot_dragon_siege.title$ Bravoure suicidaire"
 agot_dragon_siege.0105.desc:0 "Lances et flèches abondent et fussent de tous côtés. La garnison de [sieging_location.GetName] se montre tant hardie que prudente, se cachant à la faveur de solides fortifications lorsque vient le danger, mais vaille que vaille, vient enfin l'opportunité de réduire leur nombre. Un groupe d'archers sottement rassemblé n'a qu'une maigre couverture à leur portée, et j'ordonne alors à [sieging_dragon.GetName] de plonger.\n\nMais je ne réalise que trop tard ma propre sottise de ne pas avoir vu cette occasion pour ce qu'elle est : un piège. Des troupes sortent de toutes parts et exploitent les hauteurs pour aborder mon dragon, comme le feraient des pirates face à un navire imprudent.\n\nS'ils sont nombreux à chuter, par maladresse ou manque de prise, d'autres, plus précis ou plus chanceux, s'agrippent et s'arment de leurs lances ou leurs épées pour tenir tant bien que mal. [sieging_dragon.GetFirstNameNoTooltip] rugit et se tortille pour s'en défaire, et aucun des passagers clandestins ne parvient à supporter l'ascension fulgurante d'une bête qui s'élève par la force de ses puissantes ailes."
 agot_dragon_siege.0105.a:0 "De vaillants fils de putain, pour sûr !"
 agot_dragon_siege.0105.a.f:0 "[sieging_dragon.GetFirstNameNoTooltip] est sévèrement blessé[sieging_dragon.Custom('DR_FR_E')] et vous avez été contraint[THIS.Char.Custom('FR_E')] de battre en retraite, non sans avoir causé les dégâts que vous espériez."
 agot_dragon_siege.0106.t:0 "$agot_dragon_siege.title$ Un déluge de traits"
 agot_dragon_siege.0106.desc:0 "L'attaque sur [sieging_location.GetName] se poursuit avec succès alors que nombre de structures sont tombées sans aucune résistance. J'aurais cru cette place forte mieux défendue, mais j'en ai vraisemblablement surestimé la hardiesse de sa garnison.\n\nDu moins je le crois, car des flèches fussent de toutes parts à travers les myriades de fenêtres et meurtrières. Ce n'était donc pas la couardise qui gardait les défenseurs cachés, mais la patience ?\n\nTel le bouclier lige gardant s[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom('FR_SeigneurDame')] de tout danger, [sieging_dragon.GetFirstName] déploie ses ailes pour dresser une muraille. Une action plus que bienvenue, mais qui n'empêche pas quelques traits d'infortune de trouver leur chemin dans ma chair meurtrie. Je hurle de douleur et vocifère de rage tandis qu'[sieging_dragon.Custom('DR_FR_IlElle')] m'emporte à tire-d’aile. Nous nous frayons un passage à travers les cieux tandis que mon sang, lui, se fraie un passage à travers mes blessures."
 agot_dragon_siege.0106.a:0 "Il me faut des soins !"
 agot_dragon_siege.0106.a.f:0 "Vous avez été grièvement blessé[THIS.Char.Custom('FR_E')] et contraint[THIS.Char.Custom('FR_E')] de battre en retraite, non sans avoir causé les dégâts que vous espériez."
 agot_dragon_siege.0106.b:0 "Plus vite… [sieging_dragon.GetFirstNameNoTooltip]… plus… vite…"
 agot_dragon_siege.0106.b.f:0 "Vous vous videz de votre sang et [sieging_dragon.GetNameNoTooltip] ramène votre corps dans vos lignes. Les dégâts escomptés ont été menés à bien, mais au prix d'un lourd tribut."
 agot_dragon_siege.0107.t:0 "$agot_dragon_siege.title$ Le cavalier de la mort"
 agot_dragon_siege.0107.desc:0 "Aussi respectable qu'a pu être la défense de [sieging_location.GetName], sa garnison n'en reste pas moins que du menu fretin pour [sieging_dragon.GetName]. Les défenses du donjon ont été incendiées de part et d'autre, brûlant toute fortification susceptible d'abriter des troupes ennemies ou d'entraver les nôtres.\n\nLa destruction va bon train, mais dans la fournaise ambiante, un cavalier armé d'une lance se fraie miraculeusement un chemin aux travers des flammes. Vaillance ou démence, qu'importe, son sort est d'ores et déjà scellé. La mort flamboyante s'apprête à jaillir, mais se sachant condamné, le fou se risque à un jet désespéré.\n\nUn désespoir qui fend l'air pour venir perforer ma poitrine, laissant échapper l'air de mes poumons autant que la vie de mon corps. [sieging_dragon.GetFirstNameNoTooltip] m'emporte loin des flammes, probablement vers nos lignes où je pourrais y recevoir des soins salutaires, mais je n'ai déjà plus la force de garder conscience…"
 agot_dragon_siege.0107.a:0 "[sieging_dragon.GetNameNoTooltip]… ? [sieging_dragon.GetNameNoTooltip] où es-tu ?"
 agot_dragon_siege.0107.a.f:0 "Votre corps est ramené par [sieging_dragon.GetNameNoTooltip] jusque dans vos lignes. Des dégâts ont été menés à bien, mais au prix d'un lourd tribut."
 agot_dragon_siege.0108.t:0 "$agot_dragon_siege.title$ Plus on s'élève..."
 agot_dragon_siege.0108.desc:0 "Rares sont les moments où, du haut d'un dragon, l'humiliation guette, mais hélas, à regarder tout le monde de si haut, on finit par se croire hors d'atteinte, et le camouflet violemment infligé n'en devient alors que plus amer.\n\nCela commence par un sifflement métallique et se termine par un rugissement. [sieging_dragon.GetName], frappé[sieging_dragon.Custom('DR_FR_E')] au flanc, laisse éclater une furie assourdissante qu'aucun tonnerre ne se risquerait à rivaliser.\n\nToutefois, je parviens à [sieging_dragon.Custom('DR_FR_LeLa')] rasséréner avant que ses gesticulations hasardeuses ne me désarçonnent…"
 agot_dragon_siege.0108.a:0 "Demi-tour [sieging_dragon.GetFirstNameNoTooltip] ! Preste !"
 agot_dragon_siege.0108.a.f:0 "Vous avez été contraint[THIS.Char.Custom('FR_E')] de battre en retraite. Votre attaque a été inefficace et [sieging_dragon.GetFirstNameNoTooltip] a été sévèrement blessé[sieging_dragon.Custom('DR_FR_E')]."
 agot_dragon_siege.0109.t:0 "$agot_dragon_siege.title$ …Plus dure sera la chute"
 agot_dragon_siege.0109.desc:0 "Les Valyriens de jadis nommaient leurs dragons d'après des divinités, et si j'en comprends aisément la raison lorsque je vois [sieging_dragon.GetName] à l'œuvre, je comprends aussi l'erreur qui est la mienne d'ainsi oublier que nous ne sommes pas pour autant hors d'atteinte.\n\nContre la tempête de rouge et d'orange, les scorpions en contrebas répondent par une pluie de gris et d'acier. Esquiver semble bien vain, car pour chaque trait qui manque sa cible, un autre l'atteint, et je vois, horrifié[ROOT.Char.Custom('FR_E')], un carreau qui perfore une aile, puis un autre qui transperce le cou, néantisant tout cri dans un râle fugace.\n\nMortellement blessé[sieging_dragon.Custom('DR_FR_E')], [sieging_dragon.GetNameNoTooltip] n'a plus la force de voler, et me sachant condamné[ROOT.Char.Custom('FR_E')], je n'ai moi plus la force de lutter…"
 agot_dragon_siege.0109.a:0 "Adieu [sieging_dragon.GetFirstNameNoTooltip]…"
 agot_dragon_siege.0109.a.f:0 "Vous périssez dans la chute. Votre corps est retrouvé dans les décombres aux côtés de celui de [sieging_dragon.GetFirstNameNoTooltip]."
 agot_dragon_siege.0110.t:0 "$agot_dragon_siege.title$ Une invitation à danser"
 agot_dragon_siege.0110.desc:0 "La fidèle garnison de [sieging_location.GetName] a vaillamment combattu, repoussant vaille que vaille les assaillants au point que, la frustration gagnant en intensité dans les rangs ennemis, [sieging_dragonrider.Custom('FR_le_Char_Pi')][sieging_dragonrider.GetTitledFirstName] a décidé de se joindre en personne aux hostilités, du haut de son dragon [sieging_dragon.GetName].\n\nAu contraire du reste des soldats, j'ai pour moi le luxe d'avoir le choix. Je peux les abandonner, aussi vaillants soient-ils, pour ne pas me risquer dans une entreprise dangereuse ; ou bien monter [defending_dragon.GetName] et aller au-devant du danger pour protéger [sieging_location.GetNameNoTooltip] !"
 agot_dragon_siege.0110.a:0 "Je viendrais à leur rencontre ! En avant [defending_dragon.GetFirstNameNoTooltip] !"
 agot_dragon_siege.0110.a.f:0 "Chevauchant [defending_dragon.GetNameNoTooltip], vous allez affrontez vos adversaires dans les cieux."
 agot_dragon_siege.0110.b:0 "J'emmerde [sieging_location.GetNameNoTooltip] !"
 agot_dragon_siege.0110.b.f:0 "Vous fuyez avec [defending_dragon.GetFirstNameNoTooltip], abandonnant les soldats à leur sort."
 agot_dragon_siege.notify_sieger_of_fleeing.t:0 "[defending_dragonrider.Custom('FR_le_Char_Pi')|U][defending_dragonrider.GetTitledFirstNameNoTooltip] s'enfuit !"
 agot_dragon_siege.notify_sieger_of_fleeing.tt:0 "[defending_dragonrider.Custom('FR_le_Char_Pi')|U][defending_dragonrider.GetTitledFirstName] a préféré fuir sur le dos de [defending_dragon.GetFirstName] plutôt que de vous affronter."
 agot_dragon_siege.0112.t:0 "$agot_dragon_siege.title$ À tire-d'aile"
 agot_dragon_siege.0112.desc:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstName] et [sieging_dragon.GetFirstName] ont fait pleuvoir la destruction, et les pertes ont été plus graves qu'ils n'y paraissaient au premier abord.\n\nMon dragon, [fleeing_dragon.GetName], du fait du fracas causé par le siège ou de la terreur inspiré par la présence de [sieging_dragon.GetNameNoTooltip], a tout simplement fui !\n\nOn m'a rapporté qu'[fleeing_dragon.Custom('DR_FR_IlElle')] aurait établi sa nouvelle tanière à [new_location.GetBaseName]."
 agot_dragon_siege.0112.a:0 "C'est une catastrophe !"
 agot_dragon_siege.0112.a.f:0 "[fleeing_dragon.GetFirstNameNoTooltip] est redevenu[fleeing_dragon.Custom('DR_FR_E')] sauvage. Vous pourriez [fleeing_dragon.Custom('DR_FR_LeLa')] récupérer, mais maintenant qu'[fleeing_dragon.Custom('DR_FR_IlElle')] n'est plus votre dragon, cela pourrait s'avérer difficile."
 agot_dragon_siege.0113.t:0 "$agot_dragon_siege.title$ L'arrivée d'un dragon"
 agot_dragon_siege.0113.desc:0 "J'ai ouï dire que non loin d'ici, [sieging_location.GetName] a été le théâtre d'événements de grandes calamités. [sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstName] et [sieging_dragon.GetName] ont provoqué des ravages parmi les défenses, mais pourtant, ce n'est pas ce qui me préoccupe le plus. J'ai également eu vent d'une nouvelle à propos de [fleeing_dragon.GetFirstName] !\n\nLa bête aurait fui le siège de son propre gré, et des éclaireurs rapportent qu'elle aurait établi une nouvelle tanière à [new_location.GetBaseName]."
 agot_dragon_siege.0113.a:0 "Est-ce le présage d'une calamité ou d'un bienfait ?"
 agot_dragon_siege.0113.a.f:0 "Un dragon sauvage est arrivé à [new_location.GetBaseName], avec tout ce que cela implique comme opportunité et comme danger..."
 agot_dragon_siege.dragon_rider_third.t:0 "Le siège de [sieging_location.GetTitle.GetNameNoTierNoTooltip]"
 agot_dragon_siege.dragon_rider_third_arrow.tt:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstName] a été touché[sieging_rider.Custom('FR_E')] par une flèche !"
 agot_dragon_siege.dragon_rider_third_spear.tt:0 "[sieging_dragon.GetName] a été touché[sieging_dragon.Custom('DR_FR_E')] par une lance !"
 agot_dragon_siege.dragon_rider_third_soldiers.tt:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstName] et [sieging_dragon.GetName] sont tombé[sieging_dragon.Custom2('FR_E', SCOPE.sC('sieging_rider'))]s dans un piège tendu par des soldats !"
 agot_dragon_siege.dragon_rider_third_many_arrows.tt:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstName] a été frappé[sieging_rider.Custom('FR_E')] de nombreux traits !"
 agot_dragon_siege.dragon_rider_third_spear_death.tt:0 "[sieging_rider.Custom('FR_le_Char_Pi')|U][sieging_rider.GetTitledFirstName] a été tué[sieging_rider.Custom('FR_E')] par une lance !"
 agot_dragon_siege.dragon_rider_third_scorpion.tt:0 "[sieging_dragon.GetName] a été gravement blessé[sieging_dragon.Custom('DR_FR_E')] par le carreau d'un scorpion !"
 agot_dragon_siege.dragon_rider_third_scorpion_death.tt:0 "[sieging_dragon.GetName] a été tué[sieging_dragon.Custom('DR_FR_E')] par de nombreux carreaux de scorpion !"