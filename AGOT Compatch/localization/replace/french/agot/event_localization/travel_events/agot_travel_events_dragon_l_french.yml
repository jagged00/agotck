l_french:
 agot_travel_events_dragon.9000.t:0 "À tire-d’aile"
 agot_travel_events_dragon.9000.desc:0 "[awkward_entourage_member.GetName] s'approche de moi, nerveu[awkward_entourage_member.Custom('FR_XSe')], alors que j'enfourche [dragon.GetFirstName] en prévision du voyage qui m'attends.\n\n« Malheureusement, puisque nous n'avons pas tous la bonne fortune d'être dragonniers, nous ne pouvons vous accompagner à travers les cieux. Il ne me reste donc qu'à vous souhaiter bonne route… euh… bonne… bon vent ? »"
 agot_travel_events_dragon.9000.a:0 "Quel dommage."
 agot_travel_events_dragon.9000.tt:0 "[entourage_member.GetFirstName] quitte la suite."
 agot_travel_events_dragon.0001.t:0 "Culbutes et cabrioles"
 agot_travel_events_dragon.0001.desc:0 "Le ciel qui me gratifie de sa caresse chaque fois que je chevauche [pet_dragon.GetName] est une sensation dont je ne me lasserais sans doute jamais. Pour autant, l'idée d'ajouter un peu de piquant à un voyage qui semble bien long, même ainsi perché[ROOT.Char.Custom('FR_E')] sur une bête qui rend justice à l'idée de célérité, me traverse l'esprit.\n\nLes dragons sont connus pour leur puissance, leur dangerosité, mais peu savent qu'ils sont aussi capables d'une #italic virevoltante#! agilité.\n\nQuelques pirouettes ne peuvent pas être si dangereuses… #italic n'est-ce pas ?#!"
 agot_travel_events_dragon.0001.a:0 "Montre-moi ce que tu sais faire [pet_dragon.GetNameNoTooltip] !"
 agot_travel_events_dragon.0001.b:0 "Une idée grotesque, rien de plus."
 agot_travel_events_dragon.0001.injury_warning:0 "@warning_icon!#X Vous pourriez vous blesser#!"
 agot_travel_events_dragon.0001.success:0 "[pet_dragon.GetName] réussit une belle figure !"
 agot_travel_events_dragon.0001.success.flip_past:0 "[pet_dragon.GetName] réussit une belle figure !"
 agot_travel_events_dragon.0001.success.flip:0 "[pet_dragon.GetNameNoTooltip] fait montre de force agilité, laquelle est guidée par vos ordres et votre assurance."
 agot_travel_events_dragon.0001.failure:0 "[pet_dragon.GetName] se vautre lamentablement…"
 agot_travel_events_dragon.0001.failure.flip_past:0 "[pet_dragon.GetName] se vautre lamentablement…"
 agot_travel_events_dragon.0001.failure.flip:0 "À qui la faute entre vos ordres imprécis ou l'inaptitude de votre dragon à les suivre ? Difficile à dire, mais reste que c'était une idée aussi dangereuse qu'insensée."
 agot_travel_events_dragon.0001.no_attempt:0 "Le voyage se poursuit."
 agot_travel_events_dragon.0001.no_attempt.flip:0 "Cela n'en vaut pas la peine…"
 agot_travel_events_dragon.0005.t:0 "Si belle, si calme"
 agot_travel_events_dragon.0005.desc:0 "Cinglant à travers cette mer plus haute qu'aucune autre, nous galopant plus vite que les nuées coureuses elles-mêmes. L'étendue céleste, diaprée d'azur et de blanc, ne semble avoir nulle fin, comme notre joie de la traverser.\n\nC'est là un domaine bâti par et pour les dieux. Bien loin de cette morne et maussade terre qui s'étend en contrebas."
 agot_travel_events_dragon.0005.a:0 "*Fermer les yeux et profiter de l'instant*"
 agot_travel_events_dragon.0005.b:0 "Un royaume que [Select_CString(ROOT.Char.IsFemale,'seule une dragonnière','seul un dragonnier')] peut jouir !"
 agot_travel_events_dragon.0005.c:0 "Je pourrais presque sentir la caresse [ROOT.Char.GetFaith.HighGodNameAlternatePossessive]…"
 agot_travel_events_dragon.0006.t:0 "Une agitation qui gronde"
 agot_travel_events_dragon.0006.desc:0 "La traversée des cieux se faisait jusqu'alors dans une sérénité des plus célestes, mais l'agitation se met subitement à bouillonner dans les veines de [pet_dragon.GetName].\n\nEn jetant l'œil en contrebas, j'y vois une forêt, laquelle semble lui susciter trop d'intérêt pour que ce soit une curiosité anodine.\n\nY a-t-il ci-bas quelques proies ou menaces pour ainsi troubler un dragon ?"
 agot_travel_events_dragon.0006.a:0 "Peu me chaut, nous avons mieux à faire."
 agot_travel_events_dragon.0006.a.tt:0 "Cela ne plaira pas à [pet_dragon.GetNameNoTooltip]"
 agot_travel_events_dragon.0006.b:0 "Allons voir ça de plus près."
 agot_travel_events_dragon.0006.b.tt:0 "Le voyage sera retardé"
 agot_travel_events_dragon.0007.t:0 "$agot_travel_events_dragon.0006.t$"
 agot_travel_events_dragon.0007.desc:0 "[pet_dragon.GetName] atterrit avec la finesse d'un marteau sur une enclume.\n\nJe vois des feuillages et des arbres, en grande quantité, et pourtant il n'y a rien à voir. Alors quoi ? Qu'est-ce qui l'a mis dans un tel état ?\n\nUne question intrigante qui ne semble pas vouer à trouver une réponse, hélas. Si tant est qu'il y eut quelque chose ici, cela a disparu. L'agitation [pet_dragon.GetNameNoTooltip] s'éteint et ma déception s'embrase…"
 agot_travel_events_dragon.0007.a:0 "Trêve de temps perdu ! En avant [pet_dragon.GetNameNoTooltip] !"
 agot_travel_events_dragon.0007.b:0 "Co[pet_dragon.Custom('DR_FR_NNne')] de dragon ! Cesse de faire ton intéressant[pet_dragon.Custom('DR_FR_E')] !"
 agot_travel_events_dragon.0008.t:0 "$agot_travel_events_dragon.0006.t$"
 agot_travel_events_dragon.0008.desc:0 "[pet_dragon.GetName] atterrit avec la finesse d'un marteau sur une enclume.\n\n"
 agot_travel_events_dragon.0008.desc.pred:0 "Il ne faut guère plus qu'un bref coup d'œil pour voir la raison de son agitation : [ROOT.Char.Custom('RegionalFerociousAnimal')]. Une bête qui ne fait nullement le poids face à l'incarnation du pouvoir qu'est un dragon, et pourtant aussi improbable que celui puisse paraître, peut-être mue par une terreur mortifère ou une témérité suicidaire, elle fait face. Contre un dragon, la bête fait face.\n\nLa gestuelle de [pet_dragon.GetNameNoTooltip] et l'excitation qui germe en [pet_dragon.Custom('DR_FR_LuiElle')] pour croître à travers moi me laisse à comprendre que ce défi, aussi bref sera-t-il, éveille sa nature profonde."
 agot_travel_events_dragon.0008.desc.prey:0 "Une paire d'yeux terrorisés reste figée au beau milieu des arbres : [ROOT.Char.Custom('GetRandomRegionalSmallGame')]. La frêle petite chose semble au moins autant affolée par ce qui doit être un monstre à ses yeux que par l'irruption soudaine de celui-ci dans son insignifiant monde d'innocence.\n\nUn ordre, un seul, et cette frayeur pourrait disparaître…"
 agot_travel_events_dragon.0008.a.valyrian:0 "#emp Dracarys !#!"
 agot_travel_events_dragon.0008.a:0 "Réduis ça en cendres [pet_dragon.GetNameNoTooltip] !"
 agot_travel_events_dragon.0008.b:0 "Nous avons mieux à faire. En avant [pet_dragon.GetNameNoTooltip] !"
 agot_travel_events_dragon.0008.c:0 "Remercie les dieux, petite chose. C'est mon jour de bonté."
 agot_travel_events_dragon.0009.t:0 "Rencontre fortuite"
 agot_travel_events_dragon.0009.desc:0 "La routine des heures passées à dos de dragon ayant fini par s'installer, je commence à désespérer à l'idée que ce voyage se termine enfin. La présence de [pet_dragon.GetName] apporte certes un peu de chaleur, mais [pet_dragon.Custom('DR_FR_IlElle')] manque cruellement de conversation aujourd'hui.\n\nEn ayant assez des nuages taciturnes, je finis par donner l'ordre de plonger, histoire de pouvoir me dégourdir les guiboles.\n\n"
 agot_travel_events_dragon.0009.desc.good:0 "Une fois ramené[ROOT.Char.Custom('FR_E')] au plancher des vaches, je croise le chemin d'un[good_commoner.Custom('FR_E')] [good_commoner.GetWomanMan] passant par là, [good_commoner.Custom('FR_LequelLaquelle')] me salue bien chaleureusement."
 agot_travel_events_dragon.0009.desc.bad:0 "Une fois ramené[ROOT.Char.Custom('FR_E')] au plancher des vaches, je croise le chemin d'un[good_commoner.Custom('FR_E')] [good_commoner.GetWomanMan] passant par là, [good_commoner.Custom('FR_LequelLaquelle')] manifeste une certaine hostilité à mon égard, qui n'est pas du goût de [pet_dragon.GetNameNoTooltip]."
 agot_travel_events_dragon.0009.desc.noble:0 "Une fois ramené[ROOT.Char.Custom('FR_E')] au plancher des vaches, je croise le chemin d'un[good_commoner.Custom('FR_E')] [good_commoner.GetWomanMan] passant par là. Cherchait-[good_commoner.Custom('FR_IlElle')] compagnie ? Ou a-t-[good_commoner.Custom('FR_IlElle')] perdu son chemin ?"
 agot_travel_events_dragon.0009.a:0 "À qui ai-je l'honneur ?"
 agot_travel_events_dragon.0009.b:0 "J'ai d'autres chats à fouetter."
 agot_travel_events_dragon.0009.c:0 "Tu vas payer ton outrecuidance, merdaille !"
 agot_travel_events_dragon.0009.d:0 "Une geôle t'apprendra la politesse, maraud[good_commoner.Custom('FR_E')] !"
 agot_travel_events_dragon.0009.e:0 "Ces petites gens sont le moindre de mes soucis."
 agot_travel_events_dragon.0009.f:0 "En quelques battements d'ailes vous serez chez vous, [Select_CString(noble.IsFemale,'gente dame','mon brave')]."
 agot_travel_events_dragon.0009.g:0 "Un brin de causette ne peut pas faire de mal."
 agot_travel_events_dragon.0009.g.modifier_desc:0 "A conversé avec [noble.Custom('FR_le_Char')][noble.GetName]."
 agot_travel_events_dragon.0009.h:0 "J'ai encore beaucoup de route à faire."
 agot_travel_events_dragon.0009.h.modifier_desc:0 "A ignoré [noble.Custom('FR_le_Char')][noble.GetName]."
 agot_travel_events_dragon.0011.t:0 "Courroux céleste"
 agot_travel_events_dragon.0011.desc:0 "Voyager dans l'immensité céleste est aussi plaisant lorsqu'elle fait montre d'hospitalité, que cela est déplaisant lorsqu'aube sa fureur.\n\nSi les dragons sont une manifestation de la puissance de la nature — des dieux mêmes diront certains — cette tempête ne l'est pas moins, et qui plus est, semble presque dirigée contre nous. C'est une grêle de bourrasque et d'orage qui nous barre le ciel, et [pet_dragon.GetName] doit lutter corps et âme pour progresser. Mais quand bien même le navire peut espérer braver les trombes, son capitaine n'en est pas à l'abri pour autant.\n\nÀ chaque colère qui tonne, je m'interroge sur le bien fondé de ma témérité à vouloir percer ces nuées furibondes."
 agot_travel_events_dragon.0011.a:0 "C'est de la folie ! [pet_dragon.GetNameNoTooltip], ramène moi à terre !"
 agot_travel_events_dragon.0011.a.tt:0 "Le voyage sera retardé de quelques jours, mais vous serez hors de tout danger"
 agot_travel_events_dragon.0011.b:0 "Le feu n'a rien à craindre de quelques gouttelettes !"
 agot_travel_events_dragon.0011.b.tt:0 "Vous risquez d'être blessé[THIS.Char.Custom('FR_E')], mais le voyage n'en sera pas retardé"
 agot_travel_events_dragon.0013.t:0 "Un dragon à tête de mule"
 agot_travel_events_dragon.0013.desc:0 "#italic On se fait royalement chier.#!\nParfois, il est bon de dire les choses telles qu'elles nous viennent. J'en somnolerais presque, et [pet_dragon.GetName] aussi — ce qui serait un tantinet plus grave. Je sens presque son feu intérieur s'éteindre comme braise sous la pluie, et le mien aussi d'ailleurs. Les alentours se font noirs, d'un noir de nuit. Comme si je… je piquais du nez. C'est bien ça oui.....\n\n#italic Roaarrr !#! Furieusement arraché[ROOT.Char.Custom('FR_E')] d'un lit de songe par un dragon qui s'emporte et m'emporte loin de notre route, je tente de le rasséréner, de le rappeler à l'ordre, de lui mettre taloche à l'oreille, mais l'animal se fait aussi bête qu'un baudet, et aussi têtu. [pet_dragon.Custom('DR_FR_IlElle')|U] nous amène en rase-motte, cherchant ça et là quelque chose digne d'intérêt qui pourrait [pet_dragon.Custom('DR_FR_LeLa')] sortir de sa froide torpeur !"
 agot_travel_events_dragon.0013.a:0 "Veux-tu bien cesser tes enfantillages ?! Tu vas nous mettre en retard !"
 agot_travel_events_dragon.0013.tt:0 "Votre voyage est retardé"
 agot_travel_events_dragon.0021.t:0 "Distraction draconienne"
 agot_travel_events_dragon.0021.desc:0 "Ainsi perché à moult pieds au-dessus d'un sol terne et froid, [pet_dragon.GetName] me jette un regard. Il y a dans ces yeux une flamme que je vois depuis bien longtemps, comme une étincelle d'innocence. Et comme chaque fois que je la vois, je sais de suite ce qu'il en est.\n\n« Tu veux jouer, n'est-ce pas ? »\n\nLe renâclement jovial qu'[pet_dragon.Custom('DR_FR_IlElle')] laisse échapper en dit bien assez, et connaissant cette tête de pioche mieux que n'importe qui, je sais que si je fais taire son espièglerie, cela pourrait [pet_dragon.Custom('DR_FR_LeLa')] mettre dans tous ses états."
 agot_travel_events_dragon.0021.a:0 "Très bien, m[pet_dragon.Custom('DR_FR_OnA')] tout[pet_dragon.Custom('DR_FR_E')] b[pet_dragon.Custom('DR_FR_EauElle')], amusons-nous un peu."
 agot_travel_events_dragon.0021.a.tt:0 "Vous allez jouer avec [pet_dragon.GetNameNoTooltip]"
 agot_travel_events_dragon.0021.b:0 "Regarde droit devant toi [pet_dragon.GetNameNoTooltip]."
 agot_travel_events_dragon.0021.b.tt:0 "Vous lui faites comprendre que ce n'est pas le moment pour des distractions"
 agot_travel_events_dragon.0022.t:0 "Distraction draconienne"
 agot_travel_events_dragon.0022.desc.played:0 "« Prêt[pet_dragon.Custom('DR_FR_E')] m[pet_dragon.Custom('DR_FR_OnA')] grand[pet_dragon.Custom('DR_FR_E')] ? » Le souffle qu'[pet_dragon.Custom('DR_FR_IlElle')] expulse subitement de ses nasaux me semble interprétable comme un « oui, vot' seigneurie ».\n\nJe saisis la pièce de viande et l'envoie valdinguer en l'air. D'un fugace jet flamboyant, il transforme un banal gigot de chèvre, une côte d'aurochs ou même un blanc de poulet en un met de fin gourmet pour le palais d'un dragon. Et c'est avec toute la finesse que l'on connaît des dragons qu'[pet_dragon.Custom('DR_FR_IlElle')] l'attrape de ses crocs déchiqueteurs.\n\nLes morceaux s'enchaînent et ne se ressemblent pas — du moins jusqu'à ce qu'ils soient grillés à point — et après un certain moment, [pet_dragon.GetNameNoTooltip] semble calmé[pet_dragon.Custom('DR_FR_E')] et prêt[pet_dragon.Custom('DR_FR_E')] à reprendre la route."
 agot_travel_events_dragon.0022.desc.no_play:0 "Je savais [pet_dragon.GetNameNoTooltip] capable de faire fondre la pierre, mais essayer de faire fondre mon cœur ?\n\nC'est pourtant bien ce qu'[pet_dragon.Custom('DR_FR_LeLa')] tente vainement de faire avec son regard qui supplie désespérément de pouvoir jouer. Un désespoir agrémenté de grognements, lesquels s'écrasent sous le poids autoritaire d'un[ROOT.Char.Custom('FR_E')] dragonni[ROOT.Char.Custom('FR_ErEre')] qui n'a que faire des pleurnicheries puériles de son baudet de dragon."
 agot_travel_events_dragon.0022.desc.fallback:0 "I honestly think this isn't needed, but just in case, for the sake of good code structure. /shrug."
 agot_travel_events_dragon.0022.a:0 "Fini de jouer m[pet_dragon.Custom('DR_FR_OnA')] grand[pet_dragon.Custom('DR_FR_E')], on a encore du chemin à faire."
 agot_travel_events_dragon.0022.b:0 "Un peu de tenue ! Tu es un dragon, que diable !"
 agot_travel_events_dragon.0023.t:0 "Distraction draconienne"
 agot_travel_events_dragon.0023.desc:0 "Le crépitement du feu a quelque chose d'apaisant en cette fraîche nuit, comme l'est le son régulier de la respiration de [pet_dragon.GetName].\n\nSa présence se fait un peu plus chaleureuse — mais de surcroît imposante — à mesure qu'[pet_dragon.Custom('DR_FR_IlElle')] s'approche et s'affale sur moi. Non content[pet_dragon.Custom('DR_FR_E')] d'empiéter sur mon espace, [pet_dragon.Custom('DR_FR_IlElle')] commence à me tapoter du bout de son ferme museau — sa façon à [pet_dragon.Custom('DR_FR_LuiElle')] de quémander un brin d'attention.\n\nIl est vrai que mes responsabilités m'amènent souvent à délaisser ce qui pourtant est une part de moi-même, mais l'heure est tardive, et la fatigue se fait déjà bien pressante…"
 agot_travel_events_dragon.0023.a:0 "L'heure n'est jamais trop tardive pour un dragon."
 agot_travel_events_dragon.0023.a.tt:0 "Votre lien avec [pet_dragon.GetNameNoTooltip] s'en trouvera renforcé et [pet_dragon.Custom('DR_FR_IlElle')] devrait être suffisamment calmé[pet_dragon.Custom('DR_FR_E')] pour ne pas causer de soucis"
 agot_travel_events_dragon.0023.b:0 "Je dois me reposer. Trouve toi quelque chose à faire."
 agot_travel_events_dragon.0023.b.tt:0 "Votre lien avec [pet_dragon.GetNameNoTooltip] s'en trouvera amoindri et [pet_dragon.Custom('DR_FR_IlElle')] pourrait être un tantinet… agité[pet_dragon.Custom('DR_FR_E')]"
 agot_travel_events_dragon.0024.t:0 "Distraction draconienne"
 agot_travel_events_dragon.0024.desc.played:0 "D'un ordre, un seul, [pet_dragon.GetName] s'envole, et lorsqu'[pet_dragon.Custom('DR_FR_IlElle')] revient, c'est avec [ROOT.Char.Custom('GetRandomRegionalSmallGame')] dans la gueule. Je gage qu'une telle prise n'aura guère été un défi, mais [pet_dragon.Custom('DR_FR_IlElle')] semble néanmoins particulièrement enjoué[pet_dragon.Custom('DR_FR_E')] de l'avoir prise.\n\nQuand je m'approche pour regarder la bête de plus près, la plus grosse des deux bêtes renâcle. « C'est pas des manières ça, [pet_dragon.GetNameNoTooltip] », je saisis ce qui était encore une proie et ne semble plus être qu'un jouet, car plus je tire pour l'en priver, plus il tire pour s'en garder. [pet_dragon.Custom('DR_FR_IlElle')|U] pourrait aisément m'arracher la bête des mains — et m'arracher les mains d'ailleurs — mais ce n'est là que l'espièglerie d'un[pet_dragon.Custom('DR_FR_E')] drago[pet_dragon.Custom('DR_FR_NNne')] facétieu[pet_dragon.Custom('DR_FR_XSe')].\n\nJe finis par lâcher prise et [pet_dragon.Custom('DR_FR_LeLa')] laisse profiter de sa friandise."
 agot_travel_events_dragon.0024.desc.no_play:0 "[pet_dragon.Custom('DR_FR_IlElle')|U] se fait insistant[pet_dragon.Custom('DR_FR_E')], même lorsque j'ordonne par la voix, même lorsque je réprimande par le geste, [pet_dragon.Custom('DR_FR_IlElle')] se fait insistant[pet_dragon.Custom('DR_FR_E')].\n\n« [pet_dragon.GetName] ! » Une voix et un geste bien plus fermes, qui trouvent pour réponse une lueur de défi… qui s'éteint aussitôt — presque aussitôt.\n\nLe peu d'énergie qu'il me reste de cette journée éprouvante ne sera pas gaspillée pour des enfantillages avec un dragon borné."
 agot_travel_events_dragon.0024.desc.fallback:0 "I honestly think this isn't needed, but just in case, for the sake of good code structure. /shrug."
 agot_travel_events_dragon.0024.a:0 "Profite-en, nous avons encore beaucoup de route à faire."
 agot_travel_events_dragon.0024.b:0 "C'est l'heure de dormir, pas de jouer."
 agot_travel_events_dragon.0031.t:0 "Si haut quand hurle le vent"
 agot_travel_events_dragon.0031.desc:0 "La quiétude habite les cieux aujourd'hui. Le ruissèlement de l'air qui caresse ma silhouette m'évoque l'eau d'une rivière qui me glisserait entre les doigts. Il me plairait de profiter du reste du voyage de la sorte, mais cela est de trop fugace durée je le crains, car si la quiétude habite les cieux, les cieux sont quant à eux un hôte fort inconstant.\n\n[pet_dragon.GetName] subit brutalement les assauts d'un vent d'une extrême violence. Des courants déferlants qui frappent la monture et malmènent [ROOT.Char.Custom('FR_LeLa')] cavali[ROOT.Char.Custom('FR_ErEre')]. Sous mon séant, le sang bouillonne d'une colère qui ne trouve nulle cible à brûler. Entre la bête et les éléments, je ne sais de qui je dois le plus redouter la fureur, mais la bête elle, peut-être rasséréner. J'agrippe les rennes si fort que je ne sens déjà plus mes extrémités et lui ordonne vaille que vaille de plonger en piqué pour me ramener au plus près du sol, car quitte à choir de ma selle, mieux vaudrait en réduire la chute."
 agot_travel_events_dragon.0031.a:0 "Du calme [pet_dragon.GetNameNoTooltip] ! Du calme !"
 agot_travel_events_dragon.0031.a.tt:0 "Votre voyage risque d'être retardé, et vous d'être blessé[THIS.Char.Custom('FR_E')]"
 agot_travel_events_dragon.0047.t:0 "Une faim de dragon"
 agot_travel_events_dragon.0047.desc:0 "Qu'il s'agisse du domaine des dieux ou non, le ciel s'apparente à un [ROOT.Char.Custom('ResidenceBuilding')] sans fin, où il n'y a guère que les dragonniers qui peuvent se targuer de traverser ses longs corridors de quiétude. Mais à strictement parler, ce n'est pas la vérité vraie, comme en témoigne la volée d'oiseaux que [pet_dragon.GetName] et moi croisons sur notre route.\n\nFrappé[pet_dragon.Custom('DR_FR_E')] d'appétit ou de gourmandise, [pet_dragon.Custom('DR_FR_IlElle')] change subitement de cap pour rapprocher sa grosse bedaine [pet_dragon.Custom('DR_FR_CouleurF')] de ce qui à ses yeux doit s'apparenter à un festin servi sur un plateau d'argent.\n\nNous aurons bien le temps de manger plus tard, mais [pet_dragon.GetNameNoTooltip] ne l'entends pas de cette oreille, et ce malgré mes ordres répétés."
 agot_travel_events_dragon.0047.a:0 "Comme tu voudras, mais fais ça prestement."
 agot_travel_events_dragon.0047.a.tt:0 "Vous laissez [pet_dragon.GetNameNoTooltip] se repaître au prix d'un voyage retardé"
 agot_travel_events_dragon.0047.b:0 "T[ROOT.Char.Custom('FR_OnA')] dragonni[ROOT.Char.Custom('FR_ErEre')] t'a donné un ordre, [pet_dragon.GetNameNoTooltip] !"
 agot_travel_events_dragon.0047.b.tt:0 "[pet_dragon.GetNameNoTooltip] vous obéira, mais n'appréciera peut-être pas de le faire"
 agot_travel_events_dragon.0048.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0048.desc_fish:0 "Aujourd'hui, plutôt que de prendre pour compagnons de voyage les pèlerins blancs des hauteurs du ciel, [pet_dragon.GetName] préfère voler à ras des eaux, sur lesquels soufflent la fraîcheur matinière et marinière d'une brise au parfum salé. Nous troquons le toit moucheté de blanc, pour un tapis d'un bleu uni, sous lequel semble se terrer une forme imprécise.\n\nJe mise sur une morue, ou un vivaneau, ce qui ne serait rien de plus qu'un amuse-bouche pour un[pet_dragon.Custom('DR_FR_E')] drago[XXX.Custom('DR_FR_NNne')], mais suffisant semble-t-il, pour éveiller son appétit, et faire fi de mes ordres."
 agot_travel_events_dragon.0048.desc_dolphin:0 "Aujourd'hui, plutôt que de prendre pour compagnons de voyage les pèlerins blancs des hauteurs du ciel, [pet_dragon.GetName] préfère voler à ras des eaux, sur lesquels soufflent la fraîcheur matinière et marinière d'une brise au parfum salé. Nous troquons le toit moucheté de blanc, pour un tapis d'un bleu uni, sous lequel myriade de formes grâcieuses semble évoluer.\n\nDes dauphins nagent et bondissent hors de l'eau, comme pour présenter un ballet aquatique, mais pour [pet_dragon.GetNameNoTooltip], c'est un autre sorte de spectacle qu'[pet_dragon.Custom('DR_FR_IlElle')] y voit. J'entends rugir non la bête mais l'estomac, dont l'appétit grondant semble silencier mes ordres donnés."
 agot_travel_events_dragon.0048.desc_whale:0 "Aujourd'hui, plutôt que de prendre pour compagnons de voyage les pèlerins blancs des hauteurs du ciel, [pet_dragon.GetName] préfère voler à ras des eaux, sur lesquels soufflent la fraîcheur matinière et marinière d'une brise au parfum salé. Nous troquons le toit moucheté de blanc, pour un tapis d'un bleu uni, sous lequel semble se terrer une forme gigantesque.\n\n#italic Une baleine !#! Un géant des océans dont le gigantisme n'a d'égal que la majesté.\n\nC'est certes un spectacle magnifique, mais pour [pet_dragon.GetNameNoTooltip], je crains que ce ne soit guère plus qu'une énorme pièce de viande qui ne suscite pas tant son émerveillement que son appétit. Un appétit qui semble [pet_dragon.Custom('DR_FR_LeLa')] rendre sourd[pet_dragon.Custom('DR_FR_E')] à tout ordre."
 agot_travel_events_dragon.0048.a:0 "Comme tu voudras, mais fais ça prestement."
 agot_travel_events_dragon.0048.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0048.b:0 "T[ROOT.Char.Custom('FR_OnA')] dragonni[ROOT.Char.Custom('FR_ErEre')] t'a donné un ordre, [pet_dragon.GetNameNoTooltip] !"
 agot_travel_events_dragon.0048.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"
 agot_travel_events_dragon.0049.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0049.desc:0 "Aujourd'hui, le ciel nous appartient. Nulle âme ne vient nous troubler, et du haut de notre domaine de sérénité, [pet_dragon.GetName] aperçoit en contrebas un troupeau de [ROOT.Char.Custom('RegionalFarmAnimalPlural')], qui semblent autant agiter de sa présence qu[pet_dragon.Custom('DR_FR_EluiElle')]-même s'en trouve agité[pet_dragon.Custom('DR_FR_E')].\n\nAgité[pet_dragon.Custom('DR_FR_E')] par l'appétit que suscite un tel banquet, pour sûr."
 agot_travel_events_dragon.0049.a:0 "Personne ne remarquera la disparition d'une ou deux têtes de bétail..."
 agot_travel_events_dragon.0049.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0049.b:0 "Ménage tes ardeurs, [pet_dragon.GetNameNoTooltip] !"
 agot_travel_events_dragon.0049.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"
 agot_travel_events_dragon.0050.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0050.desc:0 "La forêt ombragée qui se tient en contrebas semble éveiller l'intérêt de [pet_dragon.GetName] à en juger par son regard braqué et ses muscles contractés. Quelque chose se terre sous la cime des arbres c'est évident, et c'est le rugissement soudain qui fait frémir d'effroi les feuillages qui en révèlent la nature véritable.\n\n#italic [ROOT.Char.Custom('GetRandomRegionalSmallGame')|U].#!\n\nSe carapatant à grande allure, cette course effrénée ne fait qu'attiser encore davantage l'instinct de prédation qui sommeille en tout dragon, et qui par nature tend à s'embraser avec aisance."
 agot_travel_events_dragon.0050.a:0 "Régale-toi de sa chair !"
 agot_travel_events_dragon.0050.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0050.b:0 "Ménage tes ardeurs, [pet_dragon.GetNameNoTooltip] !"
 agot_travel_events_dragon.0050.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"
 agot_travel_events_dragon.0051.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0051.desc:0 "[pet_dragon.GetName] fend les cieux avec autant de grâce que de force, comme seul un dragon sait le faire. Pareille créature ne saurait rester aussi majestueuse sans se remplir la panse de temps à autre, raison pour laquelle son regard pointe en contrebas depuis un moment.\n\nQue voit-[pet_dragon.Custom('DR_FR_IlElle')], là-bas sur la terre bien ferme ? [ROOT.Char.Custom('RegionalFerociousAnimal')|U] en chasse.\n\nVoilà une bête fauve qu'il serait hardi d'affronter sur son propre terrain, mais [pet_dragon.GetNameNoTooltip] n'en ferait qu'une bouchée — non plus qu'une flambée."
 agot_travel_events_dragon.0051.a:0 "Régale-toi de sa chair !"
 agot_travel_events_dragon.0051.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0051.b:0 "Ménage tes ardeurs, [pet_dragon.GetNameNoTooltip] !"
 agot_travel_events_dragon.0051.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"
 agot_travel_events_dragon.0056.t:0 "Un ciel trop petit pour trois"
 agot_travel_events_dragon.0056.desc:0 "Il est bien des choses qui peuvent survenir, même à moult pieds au-dessus du sol, mais je n'aurais pensé devoir faire face aux assauts d'un rapace furibond.\n\nQu'ai-je bien pu faire pour être la cible d'une telle furie ? Quelle folie a bien pu frapper cet oiseau du diable pour venir se risquer au contact d'une bête par cent fois plus redoutable que lui ?\n\nIl va et vient, virevoltant et vociférant, tandis que je m'attèle à le faire déguerpir. Mais foutredieu, ce bâtard emplumé est coriace et les mouvements amples que je fais ne font guère plus que brasser du vent contre un adversaire qui frappe de tous côtés à tout instant…"
 agot_travel_events_dragon.0056.a:0 "Arrière, putain de piaf !"
 agot_travel_events_dragon.0056.a.tt:0 "Votre voyage risque d'être retardé, et vous d'être blessé[THIS.Char.Custom('FR_E')]"