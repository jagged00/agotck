l_french:
 agot_choose_dragonpit_event.0001.t:0 "Un toit pour [dragon.GetNameNoTooltip]"
 agot_choose_dragonpit_event.0001.desc:0 "Les dragons sont des armes à double tranchant, car le lien entre dragonnier et dragon fait office de laisse, et quand celle-ci est coupée, rien ne les empêche plus de s'échapper — ou de laisser s'échapper leur véritable nature. De compagnons aussi fidèles que des limiers, ils deviennent des loups pour l'homme.\n\nLa seule manière de garder un semblant de contrôle c'est une fossedragon, et fort heureusement, nous en possédons plusieurs."
 agot_choose_dragonpit_event.0001.desc_rider:0 "[dragon.GetName] est un atout précieux pour [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip], nul n'oserait prétendre le contraire, mais sa loyauté est dépendante du lien qui existe entre [dragon.Custom('DR_FR_LuiElle')] et [Select_CString( rider.IsLocalPlayer, 'moi', rider.GetFirstName )] — lien qui viendrait à disparaître avec [Select_CString(rider.IsLocalPlayer,'ma','sa')] mort, cela va sans dire.\n\nPuisque je ne peux pas me permettre qu'[dragon.Custom('DR_FR_IlElle')] retourne à l'état sauvage si cela venait à arriver, je dois choisir une fossedragon où [dragon.Custom('DR_FR_IlElle')] sera parqué[dragon.Custom('DR_FR_E')]."
 agot_choose_dragonpit_event.0001.a:0 "Ici ce sera très bien."
 agot_choose_dragonpit_event.0001.a.tt:0 "[dragon.GetNameNoTooltip] sera parqué[dragon.Custom('DR_FR_E')] dans la fossedragon sélectionnée."
 agot_choose_dragonpit_event.0001.b:0 "[dragon.GetNameNoTooltip] n'a rien à faire dans une fossedragon."
 agot_choose_dragonpit_event.0001.c:0 "[dragon.Custom('DR_FR_IlElle')|U] est très bien là où [dragon.Custom('DR_FR_IlElle')] est."
 agot_choose_dragonpit_event.0001.d:0 "Hors de question de l'enfermer dans une fosse."
 agot_choose_dragonpit_event.0001.a.tt_2:0 "@warning_icon!#X Parquer [dragon.GetNameNoTooltip] dans une fosse trop éloignée de son dragonnier l’empêchera d'être utilisé[dragon.Custom('DR_FR_E')] pour les voyages ou la guerre et pourrait affaiblir le lien qui les unit#!"
 dragon_bond_weakening_toast:0 "Lien affaibli"