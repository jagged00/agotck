 silk_road_situation_sub_region_region_silk_road_proper_china_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak 商人从东方采购的丝绸和茶叶开始慢慢地向外输送。除了这些商品，商人们还带来了一种事物：新#italic 理念#!。#!"
 silk_road_situation_sub_region_region_silk_road_proper_tibet: "吐蕃"
 silk_road_situation_sub_region_region_silk_road_proper_tibet_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak 吐蕃高原是一片难以逾越的地形，但在该地区分散的峡谷和山口中可以找到贸易路线。#!"
 silk_road_situation_sub_region_region_silk_road_proper_india: "天竺"
 silk_road_situation_sub_region_region_silk_road_proper_india_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak 穿过该地区的贸易路线就像恒河和印度河的河水一样，有涨有落，但总是存在。#!"
 silk_road_situation_sub_region_region_silk_road_proper_central_asia: "中亚"
 silk_road_situation_sub_region_region_silk_road_proper_central_asia_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak 精明的眼睛能越过草原，辨识出前方无数条开阔的小径。对商人和劫掠者而言，机遇总是无处不在。#!"
 silk_road_situation_sub_region_region_silk_road_proper_transcaspia: "外里海"
 silk_road_situation_sub_region_region_silk_road_proper_transcaspia_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak 里海和黑海为贸易和旅行提供了独特的机遇。河流将这些水域与北方土地连接起来，有着自己的贸易网络，以及财富和机运。#!"
 silk_road_situation_sub_region_region_silk_road_proper_occident: "西方"
 silk_road_situation_sub_region_region_silk_road_proper_occident_desc: "$SITUATION_SUB_REGION_TOOLTIP_DESC$\n\n#weak 庞大的旅队在此抵达他们最终的目的地，财富得之于此，失之于此。#!"
