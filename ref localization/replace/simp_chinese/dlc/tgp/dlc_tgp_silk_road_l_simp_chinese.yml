 situation_silk_road_phase_exceptional_bounty: "利润丰厚"
 situation_silk_road_phase_exceptional_bounty_desc: "丝绸之路能带来惊人的财富，人们可获得最丰厚的利润，思想与革新也能得到最佳传播。"
 situation_silk_road_phase_steady_trading: "稳定贸易"
 situation_silk_road_phase_steady_trading_desc: "人们赚取利润，讨价还价，生意照常进行。别处或许有更赚钱的选择，但都不如丝绸之路可靠。"
 situation_silk_road_phase_hardship: "困境"
 situation_silk_road_phase_hardship_desc: "战乱、灾祸与无常命运使丝绸之路完全停滞。金钱与思想皆不再流动，沿着丝路前行只能收获苦难与贫穷。"
