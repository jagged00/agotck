 culture_emergence_events.0005.t: "Le romantisme du romanche"
 culture_emergence_events.0005.desc: "Alors que [county_scope.GetNameNoTierNoTooltip] célèbre l’émergence de la culture [new_culture_scope.GetName], je remarque que de nombreux habitants des zones rurales parlent encore un dialecte qui ne correspond pas tout à fait à ce que j’imaginais.\n\nPar hasard, je croise [Select_CString(rustic_peasant.IsFemale,'une fermière','un fermier')] qui parle ce charabia. « Vous là-bas ! tonné-je. Mais quelle langue parlez-vous donc ? »\n\n[rustic_peasant.Custom('FR_IlElle')|U] s’arrête. « Je pense... répond-[rustic_peasant.Custom('FR_IlElle')] lentement en langue [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip|l], que nous l’appelons simplement le romanche. »\n\n« Le romanche » ? Est-ce vraiment ce qu’est mon peuple ?"
 culture_emergence_events.0005.a: "Nos langues doivent être romanches, tout comme nos cœurs."
 culture_emergence_events.0005.a.tt: "La culture [new_culture_scope.GetNameNoTooltip] n’utilisera que des noms romanches."
 culture_emergence_events.0005.b: "Le romanche fait partie de la mosaïque [new_culture_scope.GetName]."
 culture_emergence_events.0005.b.tt: "La culture [new_culture_scope.GetNameNoTooltip] utilisera des noms romanches en plus des noms actuels."
 culture_emergence_events.0005.c: "La langue des paysans n’a aucune valeur pour la culture [new_culture_scope.GetName] !"
 culture_emergence_events.0005.c.tt: "La culture [new_culture_scope.GetNameNoTooltip] restera telle quelle."
