 culture_parameter_better_knights_from_decision:0 "Obtient de meilleurs [knights|El] avec la [decision|El] #V $invite_knights_decision$#!"
 culture_parameter_pardoning_gives_loyalty:0 "L’[interaction|El] #V $pardon_interaction$#! donne beaucoup plus d’[opinion|El] positive et un [strong_hook|El]"
