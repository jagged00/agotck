 tradition_tgp_warrior_monks_name: "Moines guerriers"
 tradition_tgp_warrior_monks_desc: "Le fait de mener une vie morale ne doit pas exclure le recours à la force, en particulier lorsqu’il est nécessaire de protéger la communauté religieuse contre des fois rivales et des fonctionnaires corrompus, ou de défendre les nécessiteux."
 culture_parameter_unlock_warrior_monk_units: "Peut recruter des [GetMaA('warrior_monks').GetName|l] comme [men_at_arms|El]"
 tradition_scholar_officials_name: "Fonctionnaires érudits"
 tradition_scholar_officials_desc: "La plume et le pinceau sont plus puissants que l’épée... Cette culture croit fermement en un idéal où l’influence est accordée aux fonctionnaires loyaux formés aux arts nobles."
 culture_parameter_can_always_convert_to_confucianism: "Peut utiliser la [decision|El] de [GetDecisionWithKey('convert_to_confucianism').GetName|l]"
