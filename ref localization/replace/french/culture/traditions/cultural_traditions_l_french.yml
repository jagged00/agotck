 tradition_mpo_wolves_of_the_deep_steppe_name: "Loups de la steppe profonde"
 tradition_mpo_wolves_of_the_deep_steppe_desc: "Loin du confort de la civilisation, les hommes vivent de ce qu’ils peuvent prendre et rêvent de mourir sur le dos de leur cheval. Les gens faibles fuient devant ces guerriers."
