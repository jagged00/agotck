 tradition_maritime_way_of_life_name: "Mode de vie maritime"
 tradition_maritime_way_of_life_desc: "Depuis des temps immémoriaux, les pirogues à balancier de cette culture ont été aperçus à l’horizon. Les longs voyages en mer sont une seconde nature pour ce peuple.\nPour quelqu’un qui considère la vie en mer comme naturelle, il n’y a pas de limites à l’endroit où il peut s’installer, aux personnes avec lesquelles il peut commercer ou à celles qu’il peut attaquer."
 tradition_nudists_name: "Dans le plus simple appareil"
 tradition_nudists_desc: "Les adeptes de cette culture ne croient pas qu’il faille protéger son corps des éléments, au contraire, ils vivent comme le Créateur les a créés."
 tradition_stratified_society_name: "Société stratifiée"
 tradition_stratified_society_desc: "Il y a ceux qui sont nés pour diriger, et ceux qui sont nés pour servir. Dans une $tradition_stratified_society_name|l$, les privilèges héréditaires l’emportent souvent sur la méritocratie, et la proximité du pouvoir est primordiale."
 culture_parameter_family_shares_merit: "En atteignant le [GetModifier( 'merit_level_5' ).GetNameWithTooltip|L]@merit_level_5_icon! de [merit|El], chaque [close_family_member|El] du sexe dominant en dessous de ce rang gagnera un [merit|El] substantiel"
 culture_parameter_family_skips_exams: "De ces [close_family_members|El] seront également traités comme ayant passé l’[GetActivityType( 'activity_local_examination' ).GetName|l]@provincial_exam_icon!"
 culture_parameter_marrying_into_the_ruling_family_gives_influence: "Quand un [independent_ruler|El] épouse un [character|El] du même [realm|El] et ayant en commun cette [tradition|El], le [house_head|El] du [spouse|El] gagnera une immense [influence|El]"
