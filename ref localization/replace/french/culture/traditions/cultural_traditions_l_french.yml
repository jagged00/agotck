 culture_parameter_may_build_sacred_pools_ahead_of_time: "La série de [buildings|El] [GetBuilding('sacred_pool_01').GetTypeName|V] peut être construite une [era|El] plus tôt"
 tradition_tgp_esoteric_power_name: "Puissance ésotérique"
 tradition_tgp_esoteric_power_desc: "Divin et mystérieux sont les deux mots qui décrivent la noblesse aux yeux de cette culture. Les dirigeants qui souhaitent assurer leur mandat doivent se livrer à des rituels élaborés et manifester leur pouvoir en exhibant des objets divins."
 culture_parameter_increases_effect_of_mandala_realm_contracts: "Le gain en [piety|El] et en [legitimacy|El] des [mandala_rituals|El] est augmenté"
 culture_parameter_may_commission_kris: "Peut prendre la [decision|El] de [GetDecisionWithKey('commission_artifact_decision').GetName|l] pour un [Concept('artifacts', 'kriss')|E]"
 culture_parameter_piety_level_affect_artifact_quality: "Les [inspirations|El] produisent des [artifacts|El] de meilleure qualité en fonction du [piety_level|El] du commanditaire"
 culture_parameter_kris_artifacts_are_more_powerful: "Les [Concept('artifacts', 'kriss ($artifact_dagger|q$)')|E] produits reçoivent des bonus supplémentaires"
 tradition_tgp_barangay_confederations_name: "Confédérations du barangay"
 tradition_tgp_barangay_confederations_desc: "Les dirigeants de cette culture gouvernent de nombreuses cités-États disparates disséminées le long des estuaires et de la côte. Ces États varient considérablement en taille, mais ont tendance à s’unir en confédérations, dirigées par un chef choisi parmi les membres [Glossary( 'datu', 'DATU_GLOSS' )]."
 DATU_GLOSS: "Titre désignant les chefs des différentes entités politiques présentes aux Philippines."
