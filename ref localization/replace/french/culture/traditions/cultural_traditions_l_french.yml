 tradition_tgp_mountain_island_name: "Yashima"
 tradition_tgp_mountain_island_desc: "Le dénivelé des montagnes et des forêts des nombreuses îles de l’archipel japonais se succède à travers l’océan. Leurs habitants savent parfaitement comment traverser leurs paysages escarpés et variés."
 tradition_tgp_japanese_houses_name: "Pragmatisme dynastique"
 tradition_tgp_japanese_houses_desc: "S’il est important de respecter les règles du mariage pour les apparences et la loi, le plaisir est un don naturel que les dieux nous ont accordé et qui est essentiel à une bonne santé, quels que soient ses effets sur la descendance."
 culture_parameter_adultery_always_accepted: "Les personnages avec les [traits|El] [GetTrait('adulterer').GetName( GetNullCharacter )] et [GetTrait('fornicator').GetName( GetNullCharacter )] sont toujours pleinement acceptés"
