 tradition_ep3_cultivated_sophistication_name: "Sophistication culturelle"
 tradition_ep3_cultivated_sophistication_desc: "Les barbares contemplent avec envie le luxe resplendissant de cette culture et la sophistication de sa société. Nourrie d’un sentiment de primauté, cette culture rejette toutes les contradictions qui se situent en dehors de sa sphère d’influence cosmopolite."
