 tradition_tgp_defiant_ambushers_name: "Expertise de l'embuscade"
 tradition_tgp_defiant_ambushers_desc: "Constamment harcelés par des envahisseurs, la maîtrise de la selle et de l’arc permet à un nombre limité de soldats d’avoir un effet dévastateur lors d’escarmouches et d’embuscades."
