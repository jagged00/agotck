l_french:
 ethos_bellicose_name:0 "Belliqueuse"
 ethos_bellicose_desc:1 "Cette culture considère le conflit et la violence comme nécessaires dans l’existence ; l’idée de devoir se battre pour les siens est ancrée dans ce peuple."
 ethos_stoic_name:0 "Stoïque"
 ethos_stoic_desc:1 "Cette culture croit qu’il faut être fort comme une montagne et endurer les difficultés de la vie avec une détermination sans faille."
 ethos_bureaucratic_name:1 "Bureaucratique"
 ethos_bureaucratic_desc:2 "Aucune culture ne dure plus longtemps que ses archives les plus anciennes, et cette culture croit en une comptabilité si méticuleuse qu’elle garantit l’immortalité."
 ethos_spiritual_name:0 "Spirituelle"
 ethos_spiritual_desc:1 "Alors que certaines cultures se tournent vers la guerre ou la connaissance du monde, cette culture place sa confiance dans le divin. La spiritualité est le seul moyen d’avancer dans un monde dur et indifférent."
 ethos_courtly_name:1 "Solennelle"
 ethos_courtly_desc_nhc:1 "Le cérémonial de la vie de cour fait tellement partie intégrante de cette culture qu’il constitue un élément central du comportement social des gens. Une place pour chacun, et chacun à sa place."
 ethos_egalitarian_name:0 "Égalitariste"
 ethos_egalitarian_desc:1 "L’intolérance et l’isolationnisme peuvent être la voie à suivre pour d’autres, mais cette culture considère que l’acceptation de la différence est bien meilleure que son annihilation."
 ethos_communal_name:0 "Communautaire"
 ethos_communal_desc:1 "Cette culture valorise les liens de la communauté par-dessus tout, encourageant une grande loyauté et un grand dévouement à travailler ensemble vers des objectifs communs."
 martial_custom_equal_name:0 "Égalité"
 martial_custom_equal_desc:2 "Dans cette culture, toute personne valide peut avoir à prendre les armes pour son seigneur."
 martial_custom_male_only_name:0 "Hommes seulement"
 martial_custom_male_only_desc:0 "Cette culture considère que seuls les hommes sont physiquement assez forts et résistants pour se battre."
 martial_custom_female_only_name:0 "Femmes seulement"
 martial_custom_female_only_desc:0 "Cette culture considère que seules les femmes sont physiquement assez fortes et résistantes pour se battre."
 tradition_court_eunuchs_name:0 "Eunuques de la Cour"
 tradition_court_eunuchs_desc:1 "Cette culture fait un usage intensif d’eunuques à la cour, occupant des postes allant de domestiques à administrateurs bureaucratiques et même des commandants militaires. Les hommes sans désir sont faciles à croire."
 tradition_byzantine_succession_name:1 "Traditions byzantines"
 tradition_byzantine_succession_desc:1 "Cette culture est étroitement associée aux traditions impériales de l’Empire romain d’Orient et à son héritage sous la forme d’un code complexe de conduite à la cour."
 tradition_african_tolerance_name:0 "Tolérance africaine"
 tradition_african_tolerance_desc:1 "Bien que certains les décrivent comme une faiblesse, un pays fondé sur la compréhension et la tolérance est construit sur des bases solides."
 tradition_memories_of_bactria_name:0 "Souvenirs de Bactrie"
 tradition_memories_of_bactria_desc:1 "Dans la mémoire culturelle de ce peuple est gravé l’idéal de la terre parfaite de Bactrie, la belle couronne de l’Est, dont le temps reviendra."
 tradition_equal_inheritance_name:0 "Héritage équitable"
 tradition_equal_inheritance_desc:0 "Dans cette culture, les dirigeants ont l’habitude de partager leurs terres entre tous leurs enfants, même ceux qui seraient normalement exclus."
 tradition_equal_inheritance_link:0 "Héritage équitable"
 tradition_the_witenagemot_name:0 "Witenagemot"
 tradition_the_witenagemot_desc:1 "Cette culture a une longue tradition de tenue d’assemblées de sages du pays lors desquelles ils débattent de la politique, du droit, des finances et, plus important encore, de la meilleure façon de conseiller le dirigeant."
 tradition_things_name:1 "Tings"
 tradition_things_desc:1 "En Scandinavie, les distances et la nature sauvage rendent l’autorité centralisée inefficace. Lorsque des différends doivent être résolus et des décisions prises, on réunit le Ting, une assemblée de pairs présidée par un législateur."
 tradition_caravaneers_name:0 "Où les caravanes rêvent et flânent"
 tradition_caravaneers_desc:1 "Cette culture est bien intégrée dans les pratiques commerciales de la région et ses membres sont fortement associés au commerce caravanier."
 tradition_xenophilic_name:0 "L’amour de l’autre"
 tradition_xenophilic_desc:0 "Cette culture accueille tout le monde et est véritablement fascinée par toutes les cultures."
 tradition_legalistic_name:0 "Légaliste"
 tradition_legalistic_desc:1 "Cette culture considère le droit et sa codification comme le paramètre le plus important d’une société civilisée."
 tradition_warrior_culture_name:0 "Belligérance culturelle"
 tradition_warrior_culture_desc:0 "Cette culture valorise les prouesses martiales et la force par-dessus tout. Les enfants sont formés au combat et sont découragés de poursuivre des études. La faiblesse n’est pas tolérée."
 tradition_philosopher_culture_name:0 "Culture philosophique"
 tradition_philosopher_culture_desc:0 "Cette culture favorise la réflexion et le travail sur soi."
 tradition_chivalry_name:0 "Esprit chevaleresque"
 tradition_chivalry_desc:1 "Cette culture a adopté la chevalerie et les codes de conduite chevaleresques comme méthode sociale de régulation des comportements. Les prouesses martiales, le devoir, l’honneur et la moralité sont appréciés, tout comme la mauvaise poésie et la littérature romantique."
 tradition_hit_and_run_name:0 "Tactiques de harcèlement"
 tradition_hit_and_run_desc:0 "Cette culture est passée maître dans l’utilisation d’unités à armure légère pour frapper durement l’ennemi, puis se replier."
 tradition_stand_and_fight_name:0 "Jusqu’à la mort !"
 tradition_stand_and_fight_desc:0 "Il n'est de plus grand honneur pour les [ROOT.Culture.GetCollectiveNounNoTooltip] que de mourir pour leur pays, mais il n'est de plus grande fierté que d'emporter avec eux leurs ennemis. Leurs guerriers ne fléchiront ni ne failliront, ils tiendront la ligne jusqu'à leur dernier souffle, et la tiendront encore quand celui-ci aura été rendu."
 tradition_horse_lords_name:0 "Seigneurs du cheval"
 tradition_horse_lords_desc:0 "La cavalerie [ROOT.Culture.GetNameNoTooltip] est redoutée, à juste titre, car les [ROOT.Culture.GetCollectiveNounNoTooltip] ont su parfaire l'usage des chevaux dans tous les domaines qui touchent au combat."
 tradition_adaptive_skirmishing_name:0 "Escarmoucheurs adaptatifs"
 tradition_adaptive_skirmishing_desc:0 "Cette culture sait comment déployer efficacement des escarmoucheurs dans n’importe quel environnement."
 tradition_formation_fighting_name:0 "Experts en formations de combat"
 tradition_formation_fighting_desc:0 "Cette culture sait créer une synergie entre différents types d’unités par l’utilisation de formations protectrices efficaces."
 tradition_republican_legacy_name:0 "Héritage des Possessions"
 tradition_republican_legacy_desc:1 "Cette culture fait depuis longtemps partie des Possessions de Valyria, où les citadins sont tout aussi importants que les propriétaires fonciers ruraux."
 tradition_hereditary_hierarchy_name:0 "Hiérarchie héréditaire"
 tradition_hereditary_hierarchy_desc:0 "Il est ancré dans cette culture que le rôle de chef se transmet par le sang, que la noblesse est liée aux châteaux et que la structure féodale est inébranlable. Ils n’oublient pas facilement ceux qui brisent le code féodal."
 tradition_theocratic_autonomy_name:0 "Autonomie théocratique"
 tradition_theocratic_autonomy_desc:1 "Les autorités religieuses de cette culture bénéficient d’une grande marge de manœuvre de la part des dirigeants laïques et reçoivent le respect et l’obéissance de la population."
 tradition_saharan_nomads_name:0 "Nomades sahariens"
 tradition_saharan_nomads_desc:1 "Cette culture est intimement liée au désert saharien, qu’elle traverse depuis des siècles, reliant la Méditerranée aux royaumes subsahariens du Sahel."
 tradition_himalayan_settlers_name:0 "Colons himalayens"
 tradition_himalayan_settlers_desc:1 "Cette culture a élu domicile sur le « toit du monde » où les hivers sont longs et rigoureux. Ses membres sont fiers du fait que peu de cultures en bas seraient capables de vivre aussi bien qu’eux sur les sommets et les plateaux où seuls les moutons peuvent prospérer."
 tradition_esteemed_hospitality_name:0 "Hospitalité estimée"
 tradition_esteemed_hospitality_desc:0 "Dans cette culture, les dirigeants sont connus pour accueillir à bras ouverts tous ceux qui viennent à leur cour. Ils accueillent les invités et les visiteurs de manière spectaculaire."
 tradition_hard_working_name:0 "Assidus"
 tradition_hard_working_desc:1 "Cette culture transmet les idées d’assiduité et de dur labeur."
 tradition_loyal_soldiers_name:1 "Loyauté indéfectible"
 tradition_loyal_soldiers_desc:2 "Pour cette culture, servir son seigneur et son pays est à la fois noble et juste – un devoir et un privilège, plutôt qu’un arrangement intéressé ou un fardeau indésirable."
 tradition_female_only_inheritance_name:0 "Matriarcale"
 tradition_female_only_inheritance_desc:1 "Cette culture impose une hiérarchie matriarcale, où la classe dirigeante est composée en grande majorité de femmes."
 tradition_pacifism_name:0 "Pacifistes"
 tradition_pacifism_desc:1 "Pour cette culture, l’usage de la force n’est jamais justifié. Ce n’est qu’en suivant la voie de la non-violence que les gens peuvent réellement vivre en paix."
 tradition_scientific_curiosity_name:0 "Curiosité scientifique"
 tradition_scientific_curiosity_desc:1 "La plupart des gens cherchent des réponses à gauche, à droite, en arrière et en avant. Pas ces gens-là. Ces gens regardent vers le haut."
 tradition_spartan_name:0 "Faire fi de toute fioriture"
 tradition_spartan_desc:1 "Si le pouvoir réside là où les hommes s'imaginent qu'il réside, n'en reste pas moins que ses ornements, quelles que soient les formes qu'ils peuvent prendre, ne sont que des distractions qui nous en éloignent. Les cérémonies, les parures, les embellissements, tout cela ne sert qu'à draper le pouvoir dans une fausseté apparente — et inutilement coûteuse."
 tradition_tribe_unity_name:0 "Unité tribale"
 tradition_tribe_unity_desc:1 "Cette culture met l’accent sur les liens familiaux et communautaires que ses membres partagent, les poussant à se souvenir de leur héritage commun."
 tradition_astute_diplomats_name:0 "La plume plutôt que l’épée"
 tradition_astute_diplomats_desc:1 "#italic « Il est des batailles qu'on gagne à la pointe de l’épée, d’autres à la pointe de la plume. »#!"
 tradition_collective_lands_name:0 "Terres collectives"
 tradition_collective_lands_desc:1 "L’idée que les individus sont personnellement propriétaires de la terre est étrangère à cette culture ; la terre appartient à tous, pour le bien commun."
 tradition_horse_breeder_name:0 "La plus noble des conquêtes"
 tradition_horse_breeder_desc:1 "L'élevage équin n'a plus aucun secret pour les [ROOT.Culture.GetCollectiveNounNoTooltip], pour qui les chevaux sont devenus une part inhérente de leur culture. Qu'il s'agisse de simple monture, d'arme de guerre ou de levier économique, « la plus noble des conquêtes » leur rend au centuple le respect qui leur est manifesté."
 tradition_hunters_name:0 "Chasseurs prolifiques"
 tradition_hunters_desc:1 "Poussée par la nécessité économique, ou peut-être par les attentes sociales, cette culture a raffiné ses pratiques de chasse pour en faire un art précis et presque magnifique."
 tradition_sacred_mountains_name:0 "Montagnes sacrées"
 tradition_sacred_mountains_desc:1 "Cette culture considère la montagne comme un lien avec le divin et la traite avec révérence."
 tradition_culinary_art_name:0 "Artistes culinaires"
 tradition_culinary_art_desc:1 "La nourriture n’est pas seulement un moyen de subsistance pour cette culture ; c’est à la fois un art et un rituel, un point central pour la famille et la communauté."
 tradition_festivities_name:0 "Jusqu’à plus soif"
 tradition_festivities_desc:1 "La fréquence et l’exubérance avec lesquelles cette culture organise des festivités seraient considérées comme vulgaires par d’autres, mais une fête est une fête !"
 tradition_tea_ceremony_name:0 "Cérémonies du thé"
 tradition_tea_ceremony_desc:1 "Parfois, il suffit d’une bonne tasse de thé pour que tout aille mieux."
 tradition_vegetarianism_name:0 "Végétariens"
 tradition_vegetarianism_desc:1 "Cette culture a développé une forte aversion pour la consommation de la chair animale et pratique le végétarisme."
 tradition_alpine_supremacy_name:0 "Suprématie alpine"
 tradition_alpine_supremacy_desc:1 "Les membres de cette culture se sont adaptés à la vie dans et autour des régions montagneuses, et leur connaissance des climats alpins est inégalée."
 tradition_seafaring_name:0 "L’appel de la mer"
 tradition_seafaring_desc:1 "Qu'est-ce que la caresse de l'herbe en comparaison de celle de la brise marine ? Qu'est-ce qu'un horizon de terre ferme et insipide en comparaison d'une immensité d'azur cristallin ? Lorsque vous êtes meurtri de ne pouvoir être bercé par la houle, c'est donc que l'appel de la mer est devenu trop fort pour être ignoré."
 tradition_strength_display_name:0 "Démonstration de force"
 tradition_strength_display_desc:1 "Il ne suffit pas de posséder la force. Il faut en faire la démonstration devant les autres, afin de savoir que l’on puisse soit affronter un adversaire de taille, soit combattre aux côtés d’un allié précieux."
 tradition_mystical_ancestors_name:0 "Ancêtres mystiques"
 tradition_mystical_ancestors_desc:1 "Le lignage est très important pour cette culture, au point que les ancêtres sont devenus des êtres mythiques et légendaires dont nombre de membres prétendent être les descendants."
 tradition_priestly_caste_name:0 "Caste sacerdotale"
 tradition_priestly_caste_desc:1 "Cette culture applique un système de castes pour anoblir la prêtrise dans leur société. Pour ses membres, les personnes chargées d’interpréter la volonté du divin doivent être protégées et obéies."
 tradition_religion_blending_name:0 "Éclectisme ecclésiastique"
 tradition_religion_blending_desc:1 "Les membres de cette culture vivent souvent ensemble avec ceux qui partagent des croyances différentes et adoptent volontiers des éléments étrangers dans leur propre culte."
 tradition_religious_festivities_name:0 "Festivités religieuses"
 tradition_religious_festivities_desc:1 "Le mouvement du soleil et des étoiles n’est pas pertinent pour la conception du temps dans cette culture. Le passage des jours s’y compte par les célébrations religieuses régulières auxquelles tout le monde est invité !"
 tradition_religious_patronage_name:0 "Patronage religieux"
 tradition_religious_patronage_desc:1 "Pour le salut de l’âme, il faut s’engager dans des œuvres à signification religieuse. On ne peut pas acheter la rédemption, mais avoir un temple de prêtres qui chantent ses louanges aide."
 tradition_medicinal_plants_name:0 "Herboristes médicinaux"
 tradition_medicinal_plants_desc:1 "Cette culture a depuis longtemps développé une connaissance des propriétés médicinales des plantes et des arbres. Pour ses membres, la plupart des maux peuvent être soignés avec le bon cataplasme, la bonne pommade ou le bon ragoût."
 tradition_storytellers_name:0 "Transmettre par le verbe"
 tradition_storytellers_desc:1 "Cette culture possède une tradition orale forte. Le passé est préservé par des récits rituels dans lesquels les légendes sont transmises de génération en génération."
 tradition_sacred_hunts_name:0 "Chasses sacrées"
 tradition_sacred_hunts_desc:1 "La chasse n’est ni un sport ni un passe-temps, elle n’est rien de moins que l’expression la plus pure de l’expérience humaine lors de laquelle l’on peut se connecter au divin en démontrant sa maîtrise de la nature."
 tradition_wedding_ceremonies_name:1 "Cérémonies nuptiales"
 tradition_wedding_ceremonies_desc:1 "Pour cette culture, l’union de deux personnes par le mariage est considérée comme une affaire hautement publique et rituelle."
 tradition_music_theory_name:0 "Théoriciens de la musique"
 tradition_music_theory_desc:1 "Cette culture considère la musique comme le langage du divin et c’est pourquoi de nombreux membres l’étudie dès leur plus jeune âge."
 tradition_poetry_name:0 "D’une plume raffinée"
 tradition_poetry_desc:0 "Si la poésie [ROOT.Culture.GetNameNoTooltip] jouit d'une grande renommée c'est sans conteste grâce à l'assiduité des hommes et femmes qui en sont à l'origine. Si dans d'autres cultures elle n'est qu'un passe-temps, ou une menue distraction, ici il est bel et bien question d'art, et en tant que tel, doit être pratiquée, perpétuée et perfectionnée."
 tradition_culture_blending_name:0 "Brassage culturel"
 tradition_culture_blending_desc:1 "Les membres de cette culture ont souvent vécu aux côtés de personnes d’autres cultures et sont devenus capables d’assimiler des langues, des traditions et des coutumes étrangères."
 tradition_family_entrepreneurship_name:0 "Une affaire de famille"
 tradition_family_entrepreneurship_desc:2 "#italic « La maison qui fait passer la famille avant le reste aura toujours le dessus sur celle qui fait passer les humeurs et les souhaits de ses fils et de ses filles avant le reste. L’homme juste fait tout ce qui est en son pouvoir pour parfaire la situation de sa famille. »#!"
 tradition_fishermen_name:0 "Pêcheurs aguerris"
 tradition_fishermen_desc:1 "Tout le monde peut pêcher, mais le faire avec une habileté telle que toute tentative est fructueuse, indépendamment de la marée ou du vent, est un talent plus rare. Personne ne connaît mieux la côte, sur terre ou en mer, que ces pêcheurs."
 tradition_metal_craftsmanship_name:0 "Métallurgistes"
 tradition_metal_craftsmanship_desc:1 "Cette culture bénéficie d’un accès aisé au fer depuis des siècles. Au fil du temps, ses membres ont amélioré leur compréhension du métal à un tel point que leur nom est devenu synonyme d’armes et d’armures durables et de haute qualité."
 tradition_isolationist_name:0 "Isolationniste"
 tradition_isolationist_desc:0 "Cette culture préfère rester isolée et ne regarde pas souvent en dehors de ses frontières."
 tradition_winter_warriors_name:0 "Aguerris par le froid"
 tradition_winter_warriors_desc:0 "#italic « Des vents si forts qu'ils déracinèrent des arbres de cent pieds de haut en une seule bourrasque. Si tu enlevais un gant pour sortir ton dard pour pisser, tu perdais un doigt à cause du gel. Et tout cela dans le noir. Vous ignorez ce qu'est le froid, tous autant que vous êtes. Quand viendra l'hiver, vous mourrez… »#!"
 tradition_forest_fighters_name:0 "Combattants des forêts"
 tradition_forest_fighters_desc:0 "Cette culture est rompue aux combats en forêt."
 tradition_mountaineers_name:0 "Rochassiers"
 tradition_mountaineers_desc:0 "Les soldats de cette culture portent tout ce dont ils ont besoin pour franchir les montagnes."
 tradition_warriors_of_the_dry_name:0 "Guerriers des terrains secs"
 tradition_warriors_of_the_dry_desc:0 "Cette culture est passée maître dans l’art de se battre dans des climats très secs."
 tradition_highland_warriors_name:0 "Guerriers des collines"
 tradition_highland_warriors_desc:0 "Les guerriers de cette culture se battent bien sur les pentes et les vallées de leurs régions vallonnées."
 tradition_jungle_warriors_name:0 "Guerriers de la jungle"
 tradition_jungle_warriors_desc:0 "Les guerriers de cette culture savent comment traverser des jungles dangereuses."
 tradition_only_the_strong_name:0 "La loi du plus fort"
 tradition_only_the_strong_desc:0 "Cette culture accorde une grande importance au fait de disposer de quelques guerriers bien entraînés. Si vous n’êtes pas le meilleur des meilleurs, vous n’êtes pas le bienvenu pour combattre."
 tradition_warriors_by_merit_name:0 "Guerriers par le mérite"
 tradition_warriors_by_merit_desc:0 "De tous temps de grandes figures héroïques se sont démarquées du commun des guerriers. Hyrkoon le Héros, la Princesse Nymeria, ce n'était en rien leur naissance qui les a permis de rentrer dans la légende, ce furent leurs actes, et c'est par leur prouesse qu'ils parvinrent à concrétiser leurs actes. De quel droit devrions-nous interdire à quelqu'un de manier une arme s'il a prouvé être capable de la manier ?"
 tradition_warrior_monks_name:0 "La force par la foi"
 tradition_warrior_monks_desc:0 "Force et foi sont indissociables. Quand la première permet de protéger la seconde, la seconde permet de garder intacte la première. Quiconque suivra la voie du divin se devra d'en protéger le chemin."
 tradition_talent_acquisition_name:0 "Reconnaissance du talent"
 tradition_talent_acquisition_desc:0 "#italic « Aux ennemis qui se dressent devant toi, offre-leur le fer et le feu, mais à ceux qui se courbent, à ceux-là, offre-leur grâce et indulgence, sans quoi nul n'osera jamais plus se courber devant toi. »#!"
 tradition_strength_in_numbers_name:0 "L’union fait la force"
 tradition_strength_in_numbers_desc:0 "Cette culture renonce à avoir des troupes d’élite, et favorise plutôt les armées de masse."
 tradition_frugal_armorsmiths_name:0 "Armuriers économes"
 tradition_frugal_armorsmiths_desc:0 "Si une armure de haute qualité peut sauver une vie, dix armures décentes peuvent permettre de gagner une bataille."
 tradition_malleable_invaders_name:0 "Envahisseurs malléables"
 tradition_malleable_invaders_desc:1 "Nous prendrons vos terres, vos enfants, vos traditions et votre avenir."
 tradition_quarrelsome_name:0 "Querelleurs"
 tradition_quarrelsome_desc:0 "Les conflits frontaliers sont courants pour les dirigeants de cette culture. Les terres changent souvent de mains de manière injuste."
 tradition_swords_for_hire_name:0 "Épées-Louées"
 tradition_swords_for_hire_desc:0 "Cette culture voit d’un bon œil le travail des mercenaires et encourage les guerriers à rechercher la gloire en tant que mercenaires entre deux guerres."
 tradition_reverence_for_veterans_name:0 "Révérence aux vétérans"
 tradition_reverence_for_veterans_desc:0 "Les stigmates sont au corps ce que les souvenirs sont à l'esprit. Un visage balafré ou un corps mutilé sont des récits non moins palpitants que des archives consignées sur du papier. Voilà pourquoi il faut tenir en haute estime ceux qui portent la marque apparente de l'expérience, et qui sont encore en vie pour transmettre ce savoir."
 tradition_stalwart_defenders_name:0 "Défenseurs acharnés"
 tradition_stalwart_defenders_desc:0 "La défense de ce qui lui appartient est d’une importance capitale pour cette culture."
 tradition_battlefield_looters_name:0 "La fortune dans le déshonneur"
 tradition_battlefield_looters_desc:0 "Dans cette culture, les batailles ne sont pas menées pour le prestige, mais pour le profit. Qui se soucie de son rang si l’on est incapable de payer la guerre ?"
 tradition_fervent_temple_builders_name:0 "Fervents bâtisseurs de temples"
 tradition_fervent_temple_builders_desc:0 "Cette culture considère que la construction de temples est le chemin le plus direct vers le divin. On s’attend à ce que les fervents dirigeants construisent de nombreux et grands temples."
 tradition_lords_of_the_elephant_name:0 "Seigneurs des éléphants"
 tradition_lords_of_the_elephant_desc:0 "Cette culture vénère les éléphants et les assimilent à la royauté. Ses membres sont passés maîtres dans l’art de les capturer, de les dresser et de les utiliser pour obtenir des effets dévastateurs à la guerre."
 tradition_zealous_people_name:0 "Solides croyants"
 tradition_zealous_people_desc:0 "Les personnes de cette culture sont particulièrement zélées et dévouées à leur foi."
 tradition_welcoming_name:1 "Verve diplomatique"
 tradition_welcoming_desc:1 "Les membres de cette culture excellent dans les affaires diplomatiques, et l’étiquette est valorisée par-dessus tout."
 tradition_agrarian_name:0 "Agraire"
 tradition_agrarian_desc:0 "Cette culture est nettement agraire, ses terres produisant d’abondantes récoltes pour des armées affamées. Si le fait de ne pas avoir à se battre pour la nourriture permet d’avoir beaucoup de paysans pour la levée, cela signifie également que chaque soldat n’est pas aussi motivé que ceux des régions plus rudes."
 tradition_eye_for_an_eye_name:0 "Œil pour œil"
 tradition_eye_for_an_eye_desc:0 "#italic « Je te ferais souffrir pour ceci. Le jour viendra où tu te croiras heureuse et en sécurité, et où ta joie se changera en cendres dans ta bouche. Et tu sauras que j'ai payé ma dette. »#!"
 tradition_forbearing_name:0 "Tout vient à point"
 tradition_forbearing_desc:1 "#italic « Qui se hâte sa vie durant hâte simplement sa mort. »#!"
 tradition_equitable_name:0 "En toute équité"
 tradition_equitable_desc:0 "Dans cette culture, la vérité et la justice impartiale sont très appréciées."
 tradition_charitable_name:0 "Le cœur sur la main"
 tradition_charitable_desc:0 "Quelle que soit leur foi, les personnes de cette culture sont motivées pour soutenir les moins fortunés."
 tradition_modest_name:0 "En toute modestie"
 tradition_modest_desc:0 "Cette culture valorise la modestie, il ne faut pas prendre trop de place ni se croire meilleur que les autres."
 tradition_hill_dwellers_name:0 "Habitants des collines"
 tradition_hill_dwellers_desc:0 "Cette culture est à l’aise dans les collines, et sait comment y travailler les terres efficacement."
 tradition_forest_folk_name:0 "Habitants des forêts"
 tradition_forest_folk_desc:0 "Cette culture vit à proximité de vastes forêts et sait comment en tirer profit."
 tradition_mountain_homes_name:0 "Habitants des montagnes"
 tradition_mountain_homes_desc:0 "Cette culture sait comment vivre et prospérer sur les plateaux près des pentes abruptes des montagnes."
 tradition_dryland_dwellers_name:0 "Habitants des terres arides"
 tradition_dryland_dwellers_desc:0 "Cette culture est habituée à vivre dans des climats secs, et sait où trouver de l’eau et comment travailler la terre."
 tradition_jungle_dwellers_name:0 "Habitants de la jungle"
 tradition_jungle_dwellers_desc:0 "Cette culture vit à proximité de la jungle et sait comment en exploiter les richesses."
 tradition_faith_bound_name:0 "Liés par la foi"
 tradition_faith_bound_desc:0 "Dans cette culture, être d’une autre foi signifie que vous n’êtes pas éligible à la succession."
 tradition_by_the_sword_name:0 "Par l’épée"
 tradition_by_the_sword_desc:0 "Les membres de cette culture pensent que le meilleur missionnaire est celui qui porte une épée. Bien que le soutien aux guerres saintes soit très répandu, les motifs sont examinés de près afin de s’assurer que les puissances divines approuvent."
 tradition_language_scholars_name:0 "Le poids des mots"
 tradition_language_scholars_desc:0 "Apprendre les mots d’un voisin rapproche un peu plus de la langue du Divin."
 tradition_pastoralists_name:0 "Pastoralistes"
 tradition_pastoralists_desc:0 "Cette culture est à l’aise dans les terrains vastes et ouverts, où elle garde de grands groupes d’animaux."
 tradition_desert_nomads_name:1 "Voyageurs du désert"
 tradition_desert_nomads_desc:1 "Cette culture n’est pas étrangère à l’environnement difficile du désert et ses membres ont maîtrisé l’utilisation des chameaux pour les aider dans leurs déplacements, leurs guerres et leur vie quotidienne."
 tradition_gardening_name:0 "Architectes des jardins"
 tradition_gardening_desc:0 "Cette culture a une longue tradition de construction et d’entretien de divers types de jardins, se construisant ainsi un petit paradis."
 can_appoint_court_gardener_name: "[GetCultureTradition('tradition_gardening').GetName]"
 tradition_monogamous_name:0 "Monogamie"
 tradition_monogamous_desc:0 "Dans cette culture, on ne garde qu’un seul conjoint, quelle que soit sa foi."
 tradition_polygamous_name:0 "Polygamie"
 tradition_polygamous_desc:0 "Dans cette culture, on a tendance à avoir plusieurs conjoints, quelle que soit la foi."
 tradition_concubines_name:1 "Concubinage"
 tradition_concubines_desc:1 "Les dirigeants de cette culture ont souvent un certain nombre de concubins ou de concubines dans leur foyer, quelle que soit leur foi."
 tradition_mendicant_mystics_name:0 "Mystiques mendiants"
 tradition_mendicant_mystics_desc:1 "Les membres pieux de cette culture croient fermement que la foi doit être dispensée sur le terrain et les plus dévots d’entre eux parcourent fréquemment le monde."
 tradition_parochialism_name:0 "Esprit de clocher"
 tradition_parochialism_desc:0 "Les citadins de cette culture sont férocement compétitifs et indépendants. Ils investissent beaucoup d’argent et d’énergie pour s’assurer que #EMP leur#! ville est la plus grande."
 tradition_martial_admiration_name:0 "Admiration martiale"
 tradition_martial_admiration_desc:0 "Ceux qui sont prêts à prendre l’épée et à se battre pour leur culture sont dignes d’admiration. Quelles que soient leurs chances."
 tradition_chanson_de_geste_name:0 "Chanson de geste"
 tradition_chanson_de_geste_desc:0 "Cette culture valorise les actes héroïques d’ancêtres disparus depuis longtemps. Le récit de la vie de chevaliers tels que Guillaume ou Roland est très inspirant."
 tradition_ruling_caste_name:0 "Caste dirigeante"
 tradition_ruling_caste_desc:0 "Les dirigeants de cette culture ont l’habitude de régner sur des sujets qui ne font pas partie de leur propre culture. Ils savent comment réprimer efficacement les révoltes, au détriment de la façon dont ils sont perçus."
 tradition_staunch_traditionalists_name:0 "Traditionalistes acharnés"
 tradition_staunch_traditionalists_desc:1 "La tradition est la tradition, elle est immuable. Nous devons être prêts et disposés à défendre ce qui fait de nous ce que nous sommes."
 tradition_sacred_groves_name:0 "Arbres sacrés"
 tradition_sacred_groves_desc:0 "Les arbres sont considérés comme sacrés par cette culture. La forêt est un être vivant dont il faut prendre soin et non qu’il faut détruire."
 tradition_hold_the_line_name:0 "Tenir la ligne"
 tradition_hold_the_line_desc:1 "Dans cette culture, chaque combattant est fier de sa puissance. Les discours enthousiastes de leurs commandants gardent les soldats inspirés jusqu’à la fin."
 tradition_legendary_noble_families_name:0 "Familles nobles légendaires"
 tradition_legendary_noble_families_desc:1 "Si vous n’êtes pas lié à l’une des familles nobles qui ont contribué à forger le destin de cette culture, vous n’êtes rien."
 tradition_castle_keepers_name:0 "Gardiens de château"
 tradition_castle_keepers_desc:1 "L’attaque est-elle la meilleure des défenses ? Que nenni, sinon pourquoi donc construirions-nous des châteaux ceints de remparts ? La meilleure défense c'est d'avoir des murs, hauts et épais, et d'attendre que nos ennemis viennent se briser dessus, comme l'eau sur les récifs."
 tradition_city_keepers_name:0 "Gardiens de ville"
 tradition_city_keepers_desc:1 "Les villes sont au centre de cette culture et ses membres souhaitent que chacune de leurs métropoles devienne soient enviée dans le monde entier."
 tradition_fractious_name:0 "Indisciplinés"
 tradition_fractious_desc:1 "L’ennemi de mon ennemi est aussi mon ennemi."
 tradition_runestones_name:1 "Pierres runiques"
 tradition_runestones_desc:1 "La mort, la conquête et l’acquisition d’un rang ne sont-elles pas ce qui définit la vie de la noblesse ?"
 tradition_insular_spirit_name:0 "Esprit insulaire"
 tradition_insular_spirit_desc:1 "Cette culture est déterminée à ne pas être détournée de ses voies originales et se battra pour n’importe lequel des siens attaqué par une autre culture."
 tradition_monastic_communities_name:0 "Communautés monastiques"
 tradition_monastic_communities_desc:1 "Cette culture a comme longue tradition d’envoyer sa progéniture noble servir la foi. Des penseurs politiques vénérés sont souvent issus des ordres monastiques."
 tradition_roman_legacy_name:1 "Héritage romain oriental"
 tradition_roman_legacy_desc:1 "L’organisation militaire de l’Empire romain est toujours présente dans la mémoire de cette culture. Une armée professionnelle est préférée aux levées."
 tradition_longbow_competitions_name:0 "Concours d’arcs longs"
 tradition_longbow_competitions_desc:1 "Cette culture privilégie un arc plus puissant que la normale et s’entraîner à l’utiliser une fois par semaine est aussi important qu’un rituel de culte, que ce soit dans les villages ruraux ou les grandes métropoles."
 tradition_illyrian_grit_name:0 "Courage illyrien"
 tradition_illyrian_grit_desc:1 "Les membres de cette culture peuvent se battre entre eux, mais ils se lèveront d’un seul bloc pour affronter un éventuel envahisseur."
 tradition_maritime_mercantilism_name:0 "Mercantilisme maritime"
 tradition_maritime_mercantilism_desc:1 "Le monde est peut-être dirigé par des armées, mais cette culture sait qu’il est véritablement contrôlé par celui qui domine les flux d’or à travers les mers."
 tradition_sacral_kingship_name:0 "Royauté sacrée"
 tradition_sacral_kingship_desc:1 "Dans cette culture, la royauté est considérée comme divine. Qu’est-ce qu’un roi par rapport à un dieu ?"
 tradition_reavers_name:0 "Pilleurs"
 tradition_reavers_desc:1 "De nombreux membres de cette culture qui vivent sur la côte s’essaient à monter à bord de navires pour aller commettre des pillages dans d’autres ports. Bien que cela ne soit pas toléré par leurs seigneurs directs, chaque dirigeant sait que cela fera de meilleurs soldats le moment venu."
 tradition_practiced_pirates_name:0 "Pirates chevronnés"
 tradition_practiced_pirates_desc:1 "Prendre d’assaut un port, l’incendier et prendre tout ce qui n’est pas fixé au sol n’est peut-être pas noble, mais c’est rentable."
 tradition_determined_independence_name:0 "Indépendance résolue"
 tradition_determined_independence_desc:1 "La mort avant la soumission ! Les dirigeants de cette culture ne trouvent aucune défaite pire que la vassalisation et feront tout pour devenir leurs propres maîtres."
 tradition_merciful_blindings_name:0 "La vue plutôt que la vie"
 tradition_merciful_blindings_desc:1 "Toute scélérate, félonne ou criminelle puisse être une âme, n'en reste pas moins que la mort est par trop définitive, tandis que la vie, elle, regorge de possibilités. De fait, ôter la vue semble être un châtiment adéquat pour continuer à faire bon usage des éléments utiles sans pour autant favoriser l'impunité à tout va."
 tradition_reindeer_hunters_name:0 "Chasseurs de rennes"
 tradition_reindeer_hunters_desc:1 "La chasse au cerf n’est rien de plus qu’une danse sur le gel constant de la taïga. Cette culture a appris à utiliser au mieux les fournitures de chasse qu’elle possède."
 tradition_mountaineer_ruralism_name:0 "Ruralisme montagnard"
 tradition_mountaineer_ruralism_desc:1 "Depuis leurs origines dans les collines de la forêt de Bohême, jusqu’aux rochers des montagnes Ore et Tatra, la plupart des membres de cette culture savent non seulement comment traverser les terres rocheuses, mais aussi comment gérer la vie en montagne avec aisance."
 tradition_life_is_just_a_joke_name:0 "La vie n’est qu’une blague"
 tradition_life_is_just_a_joke_desc:1 "Les membres de cette culture riraient même sur le billot avec une hache au-dessus de la tête."
 tradition_steppe_tolerance_name:0 "Tolérance de la steppe"
 tradition_steppe_tolerance_desc:1 "Ceux qui vivent dans la steppe auront toujours beaucoup en commun avec ceux qui partagent leur mode de vie. Les étrangers peuvent pratiquer un culte différent, ils restent néanmoins des chevaucheurs."
 tradition_nubian_warrior_queens_name:0 "Reines guerrières"
 tradition_nubian_warrior_queens_desc:0 "Ceux qui vivent à l’est de l’Afrique se souviennent bien des grandes reines guerrières qui se sont dressées jadis contre les envahisseurs et ont forgé les royaumes de Koush. Nos voisins persistent peut-être à prôner la supériorité des mâles, mais nous assurons la continuité de nos lignées par nos mères, et le cri de guerre des puissantes femmes nubiennes renvoie ces « hommes » étrangers chez eux en courant."
 tradition_nubian_warrior_kings_name:0 "Rois guerriers"
 tradition_nubian_warrior_kings_desc:0 "Ceux qui vivent à l’est de l’Afrique se souviennent bien des grands rois guerriers qui se sont dressées jadis contre les envahisseurs et ont forgé les royaumes de Koush. Nos voisins persistent peut-être à prôner la supériorité des femmes, mais nous assurons la continuité de nos lignées par nos pères, et le cri de guerre des puissants nubiens renvoie ces étrangères chez elles en courant."
 tradition_maritime_mangroves_name:0 "Mangroves maritimes"
 tradition_maritime_mangroves_desc:1 "Cette culture a appris à naviguer dans des terres marécageuses que d’autres cultures trouvent infranchissables. Elle s’en est servie pour construire des bases inaccessibles d’où elle peut commercer, faire des raids et explorer le monde."
 tradition_mixed_governance_name:0 "Gouvernance mixte"
 tradition_mixed_governance_desc:1 "Cette culture considère que chaque pensée vaut la peine d’être entendue et que chaque nouvelle façon de gouverner vaut la peine d’être essayée. Les seigneurs encouragent leurs vassaux à gouverner comme ils l’entendent."
 tradition_ritual_scarrification_name:0 "Scarification rituelle"
 tradition_ritual_scarrification_desc:1 "Cette culture respecte les personnes dont la chair a rencontré une lame. Que ce soit pour prouver leur valeur ou pour dessiner de beaux motifs, ses membres se scarifient eux-mêmes."
 tradition_hidden_cities_name:0 "Cités cachées"
 tradition_hidden_cities_desc:2 "Qu’elles soient dans les arbres de la jungle ou protégés par le dédale de la végétation, les villes de cette culture peuvent ne pas être connues des étrangers. Il leur est donc difficile de savoir comment les assiéger."
 tradition_hereditary_bards_name:0 "Bardes héréditaires"
 tradition_hereditary_bards_desc:1 "Pour cette cultures, il existe des histoires transmises de génération en génération qui sont aussi précieuses que n’importe quel titre de propriété."
 tradition_ancient_miners_name:0 "Mineurs antiques"
 tradition_ancient_miners_desc:1 "Les membres de cette culture ont toujours été entourés de matières premières, de minerais et de pierres précieuses non taillées. Ils ont ainsi des facilités à trouver des sites d’excavation minière."
 tradition_wetlanders_name:0 "Habitants de zones humides"
 tradition_wetlanders_desc:1 "Les membres de cette culture ont maîtrisé les tourbières et les marais. Bien que la vie soit parfois une bataille contre la moisissure, ils ont appris à utiliser la tourbe à leur avantage."
 tradition_diasporic_name:0 "Diaspora"
 tradition_diasporic_desc:1 "Les membres de cette culture ont perdu leur chère patrie. Certains d’entre eux parcourent le monde à la recherche d’un endroit où ils pourront recommencer leur vie."
 tradition_sorcerous_metallurgy_name:0 "Sortilèges et soufflets"
 tradition_sorcerous_metallurgy_desc:1 "Il y a autant d’alchimistes de cette culture qui tentent de transformer le métal en or que de forgerons qui forgent des armes. Quelle importance si leur richesse et leurs armes sont améliorées par la sorcellerie ?"
 tradition_polders_name:0 "Terres endiguées"
 tradition_polders_desc:0 "Cette culture a pour vieille tradition de gagner des terres sur la mer. Cela lui permet d’utiliser pour l’agriculture et la construction ce qui serait normalement un fond marin peu profond."
 tradition_caucasian_wolves_name:0 "Loups du Caucase"
 tradition_caucasian_wolves_desc:0 "Ayant passé des siècles à s’établir autour des portes du Caucase, cette culture s’est adaptée à tout ce que la guerre de montagne implique."
 tradition_artisans_name:0 "Artisans experts"
 tradition_artisans_desc:0 "Dans cette culture, les enfants reprennent souvent la profession de leurs parents, accumulant des connaissances et des compétences étendues pour leur métier au fil des générations."
 tradition_debug_name:0 "Versatilité"
 tradition_debug_desc:0 "Cette culture est connue pour ses nombreux us éclectiques et contradictoires."
 tradition_fp1_coastal_warriors_name:0 "Guerriers côtiers"
 tradition_fp1_coastal_warriors_desc:1 "Les [ROOT.Culture.GetCollectiveNounNoTooltip] ont l'impétuosité des vagues et la dangerosité des récifs. Où qu'ils posent le pied, le sang coule, fut-ce le leur ou celui de leurs ennemis — mais plus souvent celui de leurs ennemis."
 tradition_fp1_performative_honour_name:0 "Honneur performatif"
 tradition_fp1_performative_honour_desc:1 "L’honneur est certes de naissance, mais il se gagne et se perd aussi par les actes. En se vengeant des offenses, ou en échouant à le faire, les soldats deviennent de la racaille tandis que les enfants deviennent des guerriers."
 tradition_fp1_northern_stories_name:0 "Récits du Nord"
 tradition_fp1_northern_stories_desc:1 "#italic « Oh mon doux enfant de l'été, que sais-tu donc de la peur ? La peur c'est pour l'hiver, quand la neige recouvre tout d'une épaisse couche de trois mètres. La peur c'est pour la Longue Nuit, quand le soleil reste caché pendant des années et que des enfants naissent, vivent et meurent sans rien voir d'autre que les ténèbres. Le voilà le temps pour la peur, mon jeune seigneur, quand les Marcheurs Blancs rôdent dans les forêts. Il y a des milliers d'années on a connu une nuit qui a duré toute une génération. Les rois mourraient de froid dans leurs châteaux comme les pauvres bergers dans leurs masures. Et les femmes étouffaient leurs bébés plutôt que de les voir périr de faim, et elles pleuraient, et elles sentaient les larmes gelées sur leurs joues. Alors c'est ça le genre d'histoire qui te plaît ? »#!"
 tradition_fp1_trials_by_combat_name:0 "Duels judiciaires"
 tradition_fp1_trials_by_combat_desc:1 "#italic « Le duel judiciaire, qui décide si un homme est coupable ou innocent aux yeux des dieux par le combat de deux hommes prêts à se mettre en pièce. Cela en dit pas mal sur nos dieux. »#!"
 tradition_fp1_the_right_to_prove_name:0 "Le droit de faire ses preuves"
 tradition_fp1_the_right_to_prove_desc:0 "Bien que tout le monde ne naît pas combattants, avec du courage et un bras fort pour tenir l’arme, n’importe qui peut se montrer guerrier dans l’âme et le devenir dans les faits."
 culture_parameter_city_buildings_more_county_opinion:0 "Les [holdings|El] de type [city|El] donnent plus d’[county_opinion|El] par niveau"
 culture_parameter_monastic_expectations:1 "Les [characters|El] de cette [culture|El] sont plus susceptibles d’accepter de prononcer les vœux, en particulier les enfants mineurs"
 culture_parameter_temperate_trait_bonuses:0 "Le [trait|El] [GetTrait('temperate').GetName( GetNullCharacter )|l] a des bonus supplémentaires"
 culture_parameter_devoted_trait_bonuses:0 "Le [trait|El] [GetTrait('devoted').GetName( GetNullCharacter )|l] a des bonus supplémentaires"
 tradition_strong_kinship_name:0 "Liens du sang"
 tradition_strong_kinship_desc:0 "Cette culture a une longue tradition de liens du sang su sein de la famille élargie, ou clan. En cas de besoin, un dirigeant pourra toujours compter sur sa famille."
 tradition_amharic_highlanders_name:0 "Montagnards endurcis"
 tradition_amharic_highlanders_desc:0 "Les hauts plateaux amhariques se prêtent bien à l’agriculture, pour autant que l’on sache comment s’y prendre. Depuis de nombreuses générations, ce peuple travaille et vit dans cet environnement, prospérant tout en développant ses propres traditions et coutumes."
