 tradition_ep3_indomitable_azatani_name: "Indomptables azatani"
 tradition_ep3_indomitable_azatani_desc: "Pour les fiers nobles de cette culture, qui descendent en trombe de leurs forteresses, « la blessure d’un poignard guérit, mais celle d’une langue ne guérit jamais ! »"
 culture_parameter_house_hostility_more_common: "Les [rulers|El] agissent de manière plus agressive contre les autres [houses|E]"
 culture_parameter_vassals_more_likely_to_refuse_demands: "Les [characters|El] sont plus susceptibles de refuser les [Concept('imprisonment','emprisonnements')|E], les [retractions|El] et les [revocations|El]"
 tradition_ep3_audacious_cadets_name: "Cadets audacieux"
 tradition_ep3_audacious_cadets_desc: "Des foules agitées de jeunes fils définissent cette culture. Audacieux et sans scrupules, ces cavaliers poursuivent des rêves d’aventures lointaines, de cruautés mercenaires et de conquêtes glorieuses."
 culture_parameter_ambitious_trait_more_common: "Le [trait|El] [GetTrait('ambitious').GetName( GetNullCharacter )] est plus courant"
 culture_parameter_reduced_bodyguard_aptitude: "Réduction de la [aptitude|El] de [GetCourtPositionType('bodyguard_court_position').GetName()|l]"
 tradition_ep3_imperial_tagmata_name: "Tagmata impériaux"
 tradition_ep3_imperial_tagmata_desc: "Des régiments d’élite bien armés forment l’épine dorsale des campagnes militaires de cette culture. Leurs troupes hautaines n’ont que peu de considération pour les petits nobles guerriers et les actes téméraires de bravoure personnelle ; au contraire, elles honorent la discipline et les noms sacrés de leurs unités. #EMP Exkoubitoi ! Scholai ! Hikanatoi !#!"
 domain_counties_with_stables_desc: "Le [culture_head|El] ne détient pas #high 8#! [counties|El] avec des $building_type_stables_01$ construites dans l’une de ses [holdings|El]"
 tradition_ep3_roman_ceremonies_name: "Cérémonies romaines"
 tradition_ep3_roman_ceremonies_desc: "Les empereurs du passé ont conféré à cette culture une grandeur persistante, des rites spectaculaires, une admiration pour la fonction impériale... et une vie publique riche en troubles."
 tradition_ep3_palace_politics_name: "Politique du palais"
 tradition_ep3_palace_politics_desc: "De puissants eunuques et des flagorneurs en robe de soie gèrent un vaste appareil politique. Ils impressionnent par leurs parures, courtisent avec des honneurs et complotent en vue de leur ascension."
 culture_head_court_grandeur_desc: "Le [culture_head|El] n’a pas un [court_grandeur_level|El] d’au moins #high 8#!"
 culture_parameter_unlock_akolouthos: "Peut attribuer le [court_position|El] [GetCourtPositionType('akolouthos_court_position').GetName()], à condition que la garde varègue ait été fondée."
 tradition_tgp_bushido_name: "Bushidō"
 tradition_tgp_bushido_desc: "Cette tradition se fonde sur l’honneur ancestral et la discipline guerrière. Elle élève les liens entre le prince et ses vassaux par des hommages et des actes de bravoure. La force de caractère et l’intégrité créent une loyauté et un respect inébranlables."
 culture_parameter_must_pledge_loyalty_to_liege: "Doit #v prêter serment d’allégeance#! rapidement dès lors que la [decision|El] est disponible"
 culture_parameter_better_petition_outcomes: "La [decision|El] de #v demander audience#! donne de meilleurs résultats"
 culture_parameter_opinion_from_prowess: "Bonus d’[opinion|El] en raison de la [prowess|El]"
 culture_parameter_honorable_trait_bonuses: "Les [personality_traits|El] $trait_diligent$, $trait_humble$, $trait_brave$ et $trait_just$ sont meilleurs."
 culture_parameter_unlock_infantry_samurai_units: "Peut recruter des [GetMaA('samurai').GetName|l]s comme [men_at_arms|El]"
 culture_parameter_stalwart_leader_non_admin_duels: "Le [single_combat_fight|El] du [GetPerk('stalwart_leader_perk').GetName(GetPlayer)|l] disponible contre tout [character|El] non [administrative|El] du sexe [Concept('martial', 'martial')|E] de [rank|El] égal ou inférieur"
 culture_parameter_non_admin_close_family_non_martial_gender_knights_in_defensive_wars: "La [close_family|El] non mariée de sexe non [Concept('martial', 'martial')|E] et les [spouses|El] des [rulers|El] non [Concept('administrative', 'administratifs')|E] peuvent être des $knight_culture_player_plural|l$ dans les [wars|El] défensives"
 tradition_tgp_court_machinations_name: "Machinations à la Cour"
 tradition_tgp_court_machinations_desc: "Dans les couloirs enchevêtrés de la Cour, les eunuques tirent les ficelles, les concubines se disputent les faveurs et les murmures de trahison résonnent dans les chambres dorées."
 tradition_tgp_art_of_war_name: "Art de la guerre"
 tradition_tgp_art_of_war_desc: "Cette culture étudie la théorie militaire depuis mille ans, et ses généraux et maréchaux disposent d’une riche collection de manuels et d’ouvrages militaires. Ce savoir accumulé n’a d’égal que leur grande maîtrise technique dans la fabrication d’armures et d’armes solides."
 duchies_with_examination_halls_desc: "La [culture|El] ne détient pas #high 5#! [duchies|El] avec des $building_type_examination_hall_01|l$ construits dans l’une de ses [holdings|El]"
 culture_parameter_unlock_maa_tiefutu: "Peut recruter de la [GetMaA('tiefutu').GetName|l] comme [men_at_arms|El]"
 culture_parameter_unlock_zhanmadao: "Peut recruter de l’[GetMaA('zhanmadao_infantry').GetName|l] comme [men_at_arms|El]"
 culture_parameter_unlock_burenjia: "Peut recruter de l’[GetMaA('burenjia').GetName|l] comme [men_at_arms|El]"
 culture_parameter_unlock_shenbigong_innovation: "L’[innovation|El] #high $innovation_repeating_crossbow$#! est disponible à partir de l’[era|El] $culture_era_tribal|l$"
 culture_parameter_military_governor_appointment_score: "L’[learning_skill|El] augmente le [candidate_score|El] pour la province [GetSubjectContractType( 'celestial_provinces' ).GetObligationNameShort( 'celestial_province_military' )|l]"
 tradition_tgp_ephemeral_grace_name: "Grâce éphémère"
 tradition_tgp_ephemeral_grace_desc: "La philosophie esthétique du #EMP mono no aware#! célèbre la beauté éphémère des moments fugaces. Elle assure une profonde harmonie avec la nature et une appréciation réfléchie de l’art et du caractère éphémère de la vie."
 culture_parameter_stress_loss_bonus_from_harmonious_traits: "Augmentation de la perte de [stress|El] des [traits|El] [GetTrait('temperate').GetName( GetNullCharacter )], [GetTrait('calm').GetName( GetNullCharacter )], [GetTrait('patient').GetName( GetNullCharacter )] et [GetTrait('compassionate').GetName( GetNullCharacter )]"
 tradition_tgp_imperial_peace_name: "Paix fragile"
 tradition_tgp_imperial_peace_desc: "Bien que Kanmu soit largement protégé des invasions venues de la mer, la défense contre les incursions du nord et le maintien de la paix face aux usurpateurs du trône ou aux gouverneurs rebelles nécessitent toujours des combattants expérimentés et une bonne organisation."
 culture_parameter_unlock_mounted_samurai_units: "Peut recruter des [GetMaA('japanese_horse_archers').GetName|l] comme [men_at_arms|El]"
 tradition_tgp_rice_cultivators_name: "Cultivateurs de riz"
 tradition_tgp_rice_cultivators_desc: "Le riz est la base de la vie de cette culture. Grâce à un travail assidu et à la connaissance de l’agriculture, les récoltes sont abondantes lorsque des terres appropriées sont cultivées. Leur prospérité économique et leur force militaire dépassent de loin celles de leurs voisins moins avancés."
 tradition_tgp_inward_perfection_name: "Perfection intérieure"
 tradition_tgp_inward_perfection_desc: "Cette culture préfère l’autonomie et l’enrichissement des vertus intérieures aux influences étrangères. Les liens diplomatiques peuvent s’estomper, mais le savoir et l’introspection prospèrent dans ce paisible isolement."
 tradition_tgp_fortified_strongholds_name: "Bastions fortifiés"
 tradition_tgp_fortified_strongholds_desc: "Cette culture se caractérise par de grandes villes fortifiées qui remplissent des fonctions religieuses, militaires et gouvernementales. La protection de ces bastions culturels est essentielle et la fondation de nouvelles villes procure beaucoup de prestige."
 culture_parameter_founding_temple_citadels_gives_more_piety: "Fonder des [holdings|El] de [temple_citadel|el] procure #P +100%#! de [piety|El]"
 culture_parameter_warmonger_city_founders: "Fonder des [holdings|El] de [temple_citadel|El] définit le [control|El][control_i|E] à #P 100%#!"
 culture_parameter_temple_citadel_fort_level_bonus: "Les [temple_citadels|El] ont un [fort_level|El][fort_level_i|E] augmenté"
 culture_parameter_temple_citadel_control_bonus: "Les [temple_citadels|El] fournissent un petit bonus de [control|El][control_i]"
 not_a_defense_focused_culture: "Moins de #N 50%#! des [counties|El] de la [culture|El] sont côtiers"
 tradition_tgp_hydraulic_builders_name: "Bâtisseurs hydrauliques"
 tradition_tgp_hydraulic_builders_desc: "Cette culture accorde une grande importance à l’utilisation spirituelle des ouvrages hydrauliques. Au cœur de cette fascination se trouve le [GetBuilding('sacred_pool_06').GetName|l], qui tend à être agrandi pour former de grands réservoirs revêtant une importance religieuse capitale."
 culture_parameter_sacred_pool_additional_bonuses: "La série de [buildings|El] [GetBuilding('sacred_pool_01').GetTypeName|V] donne des bonus supplémentaires dans les [counties|El] de cette [culture|El]#V $building_type_sacred_pool_01$#!"
