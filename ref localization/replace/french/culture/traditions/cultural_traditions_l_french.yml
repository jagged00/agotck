 tradition_stratified_society_toast_title: "Ascendance [ROOT.Char.GetHouse.GetNameNoTooltip]"
 tradition_stratified_society_toast_desc: "Comme privilège de votre rang distingué, vos proches parents ont gagné du [merit|El] et n’ont pas besoin de passer l’[GetActivityType( 'activity_local_examination' ).GetName|l]@provincial_exam_icon!"
