 tgp_nepotism_bypass_exams_modifier: "Exemption d’examen"
 tgp_nepotism_bypass_exams_modifier_desc: "Ce personnage a contourné les examens habituels pour devenir fonctionnaire grâce à l’influence d’un proche parent."
 tenet_takamin_name: "Takamine"
 tenet_takamin_desc: "Comme les ours sont considérés comme des manifestations des dieux, il faut respecter leur caractère sacré. Tuer l’un d’entre eux lors d’une chasse doit donc se faire avec le plus grand respect."
 doctrine_parameter_allows_bear_sacrifice: "Déverrouille la [decision|El] de [GetDecisionWithKey('sacrifice_bear_decision').GetName|l]"
 doctrine_parameter_chance_to_gain_prowess_during_bear_hunts: "Tuer un #V ours#! durant une [GetActivityType('activity_hunt').GetName|l] procure de la [prowess|El][prowess_i] et de la [martial|El][martial_i]"
 doctrine_parameter_frequent_bear_sightings: "Les [hunt_sightings|El] de type #V ours#! apparaissent périodiquement"
 doctrine_parameter_efficient_hunt_cornering: "Durant la [GetActivityType('activity_hunt').GetName|l], la méthode de l’#V encerclement#! est plus susceptible de réussir"
 culture_tradition_events.3000.t: "Ours aperçu"
 culture_tradition_events.3000.desc: "Les chasseurs de [bear_sighting.GetName] ont aperçu des [bear_sighting_county.Custom('GetAnimalPlural')] parcourant [bear_sighting.Custom('GetTerrainTypePlural')] : de nombreuses traces dans la boue, des arbres griffés, des buissons brisés.\n\nSi je partais en [GetActivityType('activity_hunt').GetName|l] et tuais ou capturais une de ces bêtes, les esprits s’en apercevraient certainement."
 culture_tradition_events.3000.a: "Je devrais préparer ma lance…"
 bear_sacrifice_war_modifier: "Sacrifice d’un ours pour la guerre"
 bear_sacrifice_war_modifier_desc: "Ce personnage a sacrifié un ours et pense avoir été béni pour remporter la guerre."
 bear_sacrifice_authority_modifier: "Sacrifice d’ours pour l’autorité"
 bear_sacrifice_authority_modifier_desc: "Ce personnage a sacrifié un ours et pense avoir été béni par une présence autoritaire."
 sacrifice_bear_decision_effect: "Choisissez la [piety|El][piety_i], [GetModifier('bear_sacrifice_war_modifier').GetNameWithTooltip] ou [GetModifier('bear_sacrifice_authority_modifier').GetNameWithTooltip]"
 culture_tradition_events.3100.t: "Sacrifice d’un ours"
 culture_tradition_events.3100.desc: "Nous attachons le grand ours en silence. Les chasseurs chantent d’une voix basse mais assurée, la fumée s’élève avec un parfum d’épicéa.\n\nJe m’agenouille, presse mon front contre son museau et murmure mes remerciements avant que la lame ne tombe. Nous partagerons sa chair afin que sa force vive parmi nous."
 culture_tradition_events.3100.a: "Que le festin commence !"
 culture_tradition_events.3100.b: "Nos ennemis tomberont !"
 culture_tradition_events.3100.c: "Obéissez, car l’esprit de l’ours est à mes côtés."
 tradition_ordo_riders_name: "Cavaliers ordo"
 tradition_ordo_riders_desc: "La demande en troupeaux et la nécessité de renforcer l’unité de la tribu ont contraint de nombreux membres de la horde de cette culture à devenir des guerriers endurcis, capables de repousser les attaques et de rassembler efficacement des provisions pour leur peuple."
 culture_parameter_unlocks_ordo_riders_maa: "Peut recruter des [GetMaA('ordo_riders_horse_archers').GetName|l] comme [men_at_arms|El]"
 culture_parameter_reaver_gives_buffs_to_horse_archers: "Les [traits|El] de [GetTrait('reaver').GetName( GetNullCharacter )|l] accorderont des bonus aux [men_at_arms|El] [archer_cavalry|El]"
 tradition_chinese_arts_name: "Arts chinois"
 tradition_chinese_arts_desc: "La voie de la plume et du pinceau est un élément important de cette culture. Au lieu de dépendre uniquement de la puissance militaire ou d’une administration complexe, les Chinois mettent l’accent sur le perfectionnement de toute forme d’art."
 culture_parameter_commissions_cheaper: "La [decision|El] de #bold $commission_artifact_decision|l$#! coûtera #P 50%#! d’[gold|El][gold_i] en moins"
 culture_parameter_scholars_and_poets_are_viewed_more_positively: "Les [traits|El] [GetTrait('lifestyle_poet').GetName( GetNullCharacter )|l] et [GetTrait('scholar').GetName( GetNullCharacter )|l] sont considérés comme positifs"
 tradition_sinophilic_name: "Sinophile"
 tradition_sinophilic_desc: "L’influence de l’hégémonie chinoise sur ce pays a conduit une grande partie de sa population à adopter des coutumes chinoises."
 culture_parameter_can_adopt_chinese_culture: "Peut adopter la [culture|El] [GetCultureByKey('han').GetName]"
 culture_parameter_more_successful_kowtows: "Les [tribute_missions|El] ont plus de chances de réussir"
