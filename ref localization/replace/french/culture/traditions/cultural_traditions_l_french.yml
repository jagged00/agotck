 culture_parameter_wants_to_learn_chinese:0 "Les personnages de cette [culture|El] apprendront souvent la [language|El] chinoise"
 culture_parameter_learn_language_success_chance_for_others: "[success_chance|E] de l’[GetScheme('learn_language').GetTypeName|l] : #P +50%#! lors de l’apprentissage de la [language|El] de cette culture"
 culture_parameter_mystic_trait_from_education: "Les enfants peuvent gagner le [trait|El] [GetTrait('lifestyle_mystic').GetName( GetNullCharacter )] s’ils ont un [guardian|El] de cette [culture|El] ayant au moins #V 12#! en [learning|El][learning_i]"
 tradition_cultivation_name: "Raffinement"
 tradition_cultivation_desc: "Harmoniser le corps, la respiration et l’esprit jusqu’à ce que la boue du cœur se dépose et que la vertu intérieure s’élève comme de l’eau claire."
 tradition_intensive_farming_name: "Agriculture intensive"
 tradition_intensive_farming_desc: "Cette culture accorde de l’importance à avoir des fermiers en nombre qui subviennent aux besoins alimentaires du reste de la population. Grâce à des millénaires d’expérience, elle a réussi à augmenter considérablement la production de blé et de riz en fonction des conditions locales."
 oath_mend_the_fracture_tradition_name:0 "Héritage de la conciliation promise"
 oath_mend_the_fracture_tradition_desc:0 "De la colère et de la méfiance sanglante est née une réconciliation. Guidée par son souverain qui en avait fait le serment, cette culture a comblé le fossé qui la séparait des autres peuples du pays, instaurant ainsi la paix et la prospérité."
 culture_parameter_synergy_cultures_counties_development: "Tous les trois ans, les [counties|El] de cette [culture|El] peuvent gagner le [modifier|El] [GetModifier('oath_mend_the_fracture_county').GetNameWithTooltip]"
