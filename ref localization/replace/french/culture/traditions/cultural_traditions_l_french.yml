 recruit_terrain_specialist_decision_desc: "Nous avons d’innombrables ennemis et nos armées ne peuvent pas toujours choisir le champ de bataille sur lequel nous les engageons.\n\nPour nous assurer la victoire sur tous les fronts, nous avons besoin de commandants capables d’utiliser habilement le terrain à notre avantage."
