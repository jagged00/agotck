 tradition_mpo_iron_cavalry_name: "Cavalerie de fer"
 tradition_mpo_iron_cavalry_desc: "Même les peuples à cheval peuvent être battus par une cavalerie recouverte de plates lamellaires de la tête aux pieds. Cette culture a non seulement développé un goût pour cet armement coûteux, mais elle emploie ceux qui ont l’équitation dans le sang comme archers montés lourds."
