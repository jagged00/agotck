 mpo_siberian_permafrost_modifier: "Pergélisol hyperboréen"
 mpo_siberian_permafrost_modifier_desc: "Sol gelé depuis des millénaires, sans aucun accès aux eaux souterraines, et à la végétation clairsemée. Le terrain change chaque année en raison des cycles de fonte et de regel répétés. Ceux qui y vivent ont besoin de plusieurs siècles d’adaptation pour s’approprier ces terres. Tous les autres mourront et rejoindront les anciens morts sous la glace.\n\n#weak Ce modificateur peut être supprimé par l’[interaction|El] visant à #V $feudalize_holding_interaction|l$#!\n\n"
