 tradition_tgp_religious_hospitality_name: "Hospitalité religieuse"
 tradition_tgp_religious_hospitality_desc: "Cette culture sait habilement mêler les religions étrangères à ses coutumes, ce qui conduit à une société plus cosmopolite où de nombreuses confessions cohabitent pacifiquement. Cela est en grande partie rendu possible grâce au commerce et aux relations entre les pays."
