 appoint_podesta_desc:0 "Nommer [recipient.Custom('FR_le_Char_U_Pi')][recipient.GetShortUINameNoTooltip] pour superviser la ville en pleine croissance de [recipient.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], et en faire un[recipient.Custom('FR_E')] vassal[recipient.Custom('FR_E')] républicain[recipient.Custom('FR_E')]."
 REQUEST_REPUBLIC_TEXT:0 "Salutations, m[actor.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('recipient'))]. Il est devenu évident que la partie la plus riche du pays que vous dirigez est la communauté urbaine qui s’y trouve. Je vous invite à assumer la supervision de cette République croissante en mon nom."
