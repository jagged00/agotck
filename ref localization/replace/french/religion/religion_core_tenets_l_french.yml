 doctrine_parameter_hostility_override_special_doctrine_adoptionist_school_radical_doctrine:0 ""
 doctrine_parameter_adoptionists_like_ecumenism:0 "Considère les [faiths|El] $christianity_religion_adj$s  avec [GetFaithDoctrine('special_doctrine_ecumenical_christian').GetBaseName|l] comme $hostility_astray_tooltippable$ plutôt que $hostility_hostile_tooltippable$"
 doctrine_parameter_adoptionists_are_unilateral_hostile:0 "Les autres [faiths|El] $christianity_religion_adj$s ne les considèrent que comme $hostility_hostile_tooltippable$, bien que les adoptianistes plus raffinés soient considérés comme $hostility_evil_tooltippable$"
 doctrine_parameter_adoptionists_are_unilateral_evil:0 "Les autres [faiths|El] $christianity_religion_adj$s les considèrent comme $hostility_evil_tooltippable$"
 doctrine_parameter_adoptionists_are_mutual_evil:0 "Considère les autres $christianity_religion_adherent_plural$ et sont considérés par eux comme $hostility_evil_tooltippable$"
 doctrine_parameter_adoptionist_school_removed_on_reformation:0 "Les nuances subtiles de cette école sont #EMP définitivement#! perdues lors de la [reformation|El]"
 doctrine_parameter_adoptionists_attractively_intuitive_theology:0 "[EmptyScope.ScriptValue('fp2_lyonese_monk_conversion_bonus_root_value')|=+%0] de vitesse de conversion par rapport aux autres [faiths|El] [GetReligionByKey('christianity_religion').GetAdjective]s"
 tenet_islamic_syncretism_name:0 "Syncrétisme islamique"
 tenet_islamic_syncretism_desc:0 "La parole du Prophète est incontestablement sage et juste, et quels que soient nos autres doutes, nous devons tenir compte de ses pensées et de ses actes."
 doctrine_parameter_hostility_override_special_doctrine_is_islamic_faith:2 "Considère les [faiths|El] islamiques et est considéré par elles comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|Vl]#L #V s#!#! au lieu de $hostility_evil_tooltippable$#L #V s#!#!"
 doctrine_parameter_can_use_islamic_artefacts:0 "Peut utiliser les [artifacts|El] musulmans à plein rendement"
 doctrine_parameter_islamic_syncretic_actor_opinion_active:1 "Bonus d’[opinion|El] réciproque de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] avec les [faiths|El] islamiques"
 doctrine_parameter_opinion_of_islamic_syncretic_recipient_opinion_active:0 ""
 doctrine_parameter_islamic_syncretic_recipient_opinion_active:1 "Bonus d’[opinion|El] réciproque de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] avec les [faiths|El] qui ont le [core_tenet|El] $tenet_islamic_syncretism_name$"
 doctrine_parameter_opinion_of_islamic_syncretic_actor_opinion_active:0 ""
 tenet_jewish_syncretism_name:0 "Syncrétisme juif"
 tenet_jewish_syncretism_desc:0 "Bien que nous ne soyons pas d’accord avec ses affirmations sur le peuple élu de Dieu, la sagesse de la Torah juive est indéniable, et il y a beaucoup à apprendre de ce texte."
 doctrine_parameter_hostility_override_special_doctrine_is_jewish_faith:2 "Considère les [faiths|El] juives et est considéré par elles comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|Vl]#L #V s#!#! au lieu de $hostility_evil_tooltippable$#L #V s#!#!"
 doctrine_parameter_can_use_jewish_artefacts:0 "Peut utiliser les [artifacts|El] juifs à plein rendement"
 doctrine_parameter_jewish_syncretic_actor_opinion_active:1 "Bonus d’[opinion|El] réciproque de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] avec les [faiths|El] juives"
 doctrine_parameter_opinion_of_jewish_syncretic_recipient_opinion_active:0 ""
 doctrine_parameter_jewish_syncretic_recipient_opinion_active:1 "Bonus d’[opinion|El] réciproque de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] avec les [faiths|El] qui ont le [core_tenet|El] $tenet_jewish_syncretism_name$"
 doctrine_parameter_opinion_of_jewish_syncretic_actor_opinion_active:0 ""
 tenet_ritual_cannibalism_name:0 "Cannibalisme rituel"
 tenet_ritual_cannibalism_desc:0 "Si le corps est la création [ROOT.Faith.PantheonTerm3], n'est-ce pas blasphématoire d'en gâcher l'essence par la terre ou le feu ? Plutôt que de laisser la chair redevenir poussière, ne vaut-il mieux pas la faire devenir nôtre ?"
 doctrine_parameter_cannibalism_legal:0 "Le trait [GetTrait('cannibal').GetName( GetNullCharacter )|l] n’est plus considéré comme [criminal|El]"
 tenet_exaltation_of_pain_name:0 "Exaltation de la douleur"
 tenet_exaltation_of_pain_desc:0 "La douleur est l’émotion universelle, la violence le langage universel. Accorder de la douleur à un autre, c’est lui donner une bénédiction, alors recevoir soi-même de la douleur, c’est recevoir la grâce."
 doctrine_parameter_torturing_prisoners_grants_piety:0 "Torturer les [prisoners|El] fournit de la [piety|El] au lieu d’en coûter"
 doctrine_parameter_reduced_stress_from_torture:0 "Les adeptes sont résistants aux effets négatifs de la torture"
 doctrine_parameter_self_mutilation_active:0 "Peut [decide|El] de se mutiler, ce qui fournit de la [piety|El] au prix d’obtenir le [trait|El] [GetTrait('wounded_1').GetName( GetPlayer )|l]"
 tenet_sacred_shadows_name:0 "La foi par le faux"
 tenet_sacred_shadows_desc:0 "Les mots sont des armes, comme le sont les épées, et tout bon bretteur sait l'importance des feintes et de ne jamais se risquer à devenir prévisible. Par les mots nous pouvons défaire les hérétiques, par les mots nous pouvons dévoiler les apostats."
 doctrine_parameter_piety_gain_from_successful_intrigue_schemes:0 "Les adeptes gagnent de la piété pour avoir réussi des [schemes|El] d’[intrigue|El]"
 doctrine_parameter_adherents_more_likely_to_join_schemes:0 "Les adeptes sont plus disposés à devenir des agents des [schemes|El] d’autres personnages"
 tenet_pursuit_of_power_name:0 "Quête du pouvoir"
 tenet_pursuit_of_power_desc:0 "Ce qui est juste et ce qui ne l’est pas est transitoire, car définit par ceux qui détiennent le pouvoir. Cela implique que la recherche du pouvoir est la seule cause véritablement juste."
 tenet_pastoral_isolation_name:0 "Isolement pastoral"
 tenet_pastoral_isolation_desc:0 "Tout ce que nous voulons, c’est rester seuls. Nos pratiques sont les nôtres et celles des autres ne nous concernent pas davantage."
 doctrine_parameter_unattractive_for_character_conversions:0 "Les [characters|El] de cette [faith|El], mais non les [counties|El], sont plus disposés à se convertir"
 tenet_natural_primitivism_name:0 "Primitivisme naturel"
 tenet_natural_primitivism_desc:0 "La civilisation est contre nature, une tentative futile et blasphématoire de l’homme pour imposer l’ordre à une création intrinsèquement non ordonnée. Nous embrassons le naturisme et vivons à l’état sauvage et libres, comme cela a été voulu par [ROOT.Faith.PantheonTerm]."
 doctrine_parameter_naked_adherents_active:0 "Les adeptes ne portent pas de vêtements"
 doctrine_parameter_natural_primitivism_law_cost_increase:0 "Coût des lois : #N +50%#!"
 doctrine_parameter_unlock_jizya_contract:1 "Déverrouille le [vassal_contract|El] et le [tax_decree|El] d'irūdir"
 tenet_communal_possessions_name: "Possessions communales"
 tenet_communal_possessions_desc: "La volonté [ROOT.Faith.HighGodNamePossessive] est que nous recevions tous une part égale des richesses de ce monde. Nous devrions tout détenir en commun et redistribuer ce que les puissants ont volé."
 doctrine_parameter_piety_from_gifts_active: "Les adeptes gagnent en [piety|El] en envoyant des [gifts|El] et en offrant des [artifacts|El]"
 doctrine_parameter_piety_from_marrying_lowborn_active: "Les dirigeants gagnent en [piety|El], lorsqu’ils épousent des [characters|El] [Concept('lowborn','roturiers')|E]"
 tenet_sacrificial_ceremonies_name:0 "Cérémonies sacrificielles"
 tenet_sacrificial_ceremonies_desc:0 "Les sacrifices humains, volontaires ou involontaires, nous rapprochent du divin. Il est coutumier et vertueux de se porter volontaire pour se sacrifier lors d’une cérémonie, tout comme il est vertueux de sacrifier ceux qui ont commis des crimes impardonnables contre les Dieux."
 tenet_megaliths_name:0 "Constructions mégalithiques"
 tenet_megaliths_desc:0 "Le culte ne doit pas se faire uniquement dans l’enceinte de temples, car ce sont des constructions primitives de l’homme qui le détournent des créations divines qui nous entourent tous. Nous embrassons la pierre et le grand air, et agençons les pierres que le créateur nous a données d’une manière qui lui plaît et nous rapproche de la divinité."
 doctrine_parameter_can_build_megaliths:0 "Permet la construction de mégalithes dans les propriétés de type [temple|El] et les grands mégalithes dans les capitales ducales."
 province_is_of_a_megalith_faith_tt:0 "Ce [county|El] doit suivre une [faith|El] qui croit en l’importance des mégalithes."
 tenet_fp3_fedayeen_name: "Fedayin"
 tenet_fp3_sacred_murder_name: "Meurtre sacré"
 tenet_fp3_fedayeen_desc: "Quand nous n’arrivons pas à nos fins par la guerre ouverte, nous devons [ROOT.Faith.HighGodName2] de détruire ses ennemis par l’infiltration et la tromperie. Nous ne devons craindre ni la mort ni la douleur, et nous réjouir de donner notre vie pour la plus grande des causes."
 doctrine_parameter_master_assassin_court_position_unlocked: "Débloque le [court_position|El] #V [GetCourtPositionType( 'master_assassin_court_position' ).GetName()]#!"
 doctrine_parameter_death_is_glory: "Probabilité de mourir ou d’être blessé à la [battle|El] : #N +10%#!"
 doctrine_parameter_sanctioned_assassinations: "Aucune perte de [piety|El] pour le meurtre de personnages d’une [faith|El] différente, grâce aux [schemes|El] visant à [GetScheme('murder').GetActionName|l]"
 tenet_household_gods_name: "Dieux du logis"
 tenet_household_gods_desc: "Nous vénérons les #EMP lares#! et les #EMP génies#! qui veillent sur nos demeures. Par-dessus tout, nous honorons notre glorieux empereur qui est chargé de protéger tout le pays."
 doctrine_parameter_allows_brewery: "$allows_brewery$ pour les [temple_holdings|El]"
