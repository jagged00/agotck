 tenet_pursuit_of_knowledge_name: "Recherche de connaissances"
 tenet_pursuit_of_knowledge_desc: "Celui qui est doté de savoir dès sa naissance est supérieur. Celui qui cherche le savoir arrive ensuite. Celui qui ne veut rien apprendre est inférieur."
