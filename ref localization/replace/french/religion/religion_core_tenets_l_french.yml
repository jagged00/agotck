 tenet_sacred_destruction_name: "Destruction sacrée"
 tenet_sacred_destruction_desc: "Il ne peut y avoir de création sans destruction. Pour que quelque chose de nouveau advienne, quelque chose d’ancien doit finir."
 doctrine_parameter_successful_sieges_give_piety: "Gagner un [siege|El] offensif procure de la [piety|El] et détruit davantage de [development|El] [Concept('county', 'comtal')|E]"
