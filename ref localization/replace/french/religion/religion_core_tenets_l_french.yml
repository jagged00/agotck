 tenet_eastern_syncretism_name: "Syncrétisme $rf_eastern$"
 tenet_eastern_syncretism_desc: "Il y a quelque chose à apprendre de la façon dont les différentes religions dharmiques se tolèrent. Ils ne suivent peut-être pas la vraie foi, mais cela ne les rend pas néfastes pour autant."
 doctrine_parameter_hostility_override_eastern_hostility_doctrine: "Les [faiths|El] [GetReligionFamily('rf_eastern').GetName] sont seulement considérées comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|Vl]#L #V s#!#!"
 doctrine_parameter_is_eastern_faith_bilateral_loc_override: "Considère les [faiths|El] [GetReligionFamily('rf_eastern').GetName] et est considéré par elles comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] au lieu de $hostility_evil_tooltippable$"
 doctrine_parameter_hostility_override_special_doctrine_is_eastern_faith: "Considère les [faiths|El] [GetReligionFamily('rf_eastern').GetName] et est considéré par elles comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] au lieu de $hostility_evil_tooltippable$"
 doctrine_parameter_eastern_syncretic_actor_opinion_active: "Bonus d’[opinion|El] mutuel de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] avec les [faiths|El] [GetReligionFamily('rf_eastern').GetName]"
 doctrine_parameter_opinion_of_eastern_syncretic_recipient_opinion_active: ""
 doctrine_parameter_eastern_syncretic_recipient_opinion_active: "Bonus d’[opinion|El] mutuel de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] avec les [faiths|El] qui ont le [core_tenet|El] $tenet_eastern_syncretism_name$"
 doctrine_parameter_opinion_of_eastern_syncretic_actor_opinion_active: ""
 tenet_unreformed_syncretism_name:0 "Traditions populaires syncrétiques"
 tenet_unreformed_syncretism_desc:0 "Qui sommes-nous pour dire aux autres que leurs traditions sont fausses ? Ce n’est pas à nous de leur faire la leçon sur des coutumes qu’ils ont pratiquées pendant des siècles : nous devrions plutôt apprendre d’eux."
 doctrine_parameter_hostility_override_unreformed_faith_doctrine:2 "Considère les [faiths|El] [GetFaithDoctrine('unreformed_faith_doctrine').GetBaseName|l]s et est considéré par elles comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|Vl]#L #V s#!#! au lieu de $hostility_evil_tooltippable$#L #V s#!#!"
 doctrine_parameter_hostility_override_west_african_unreformed_faith_doctrine:0 "Considère les [faiths|El] [GetFaithDoctrine('west_african_unreformed_faith_doctrine').GetBaseName]s africaines et est considéré par elles comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|Vl]s au lieu de $hostility_evil_tooltippable$s"
 doctrine_parameter_unreformed_syncretic_actor_opinion_active:2 "Bonus d’[opinion|El] réciproque de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] avec les [faiths|El] [GetFaithDoctrine('unreformed_faith_doctrine').GetBaseName|l]s"
 doctrine_parameter_opinion_of_unreformed_syncretic_recipient_opinion_active:0 ""
 doctrine_parameter_unreformed_syncretic_recipient_opinion_active:1 "Bonus d’[opinion|El] réciproque de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] avec les [faiths|El] qui ont le [core_tenet|El] $tenet_unreformed_syncretism_name$"
 doctrine_parameter_opinion_of_unreformed_syncretic_actor_opinion_active:0 ""
 doctrine_parameter_unreformed_syncretic_conversion_malus_active:0 "La vitesse de base de conversion des fois syncrétiques est réduite de [EmptyScope.ScriptValue('conversion_syncretic_with_religion_malus_efficancy_procentage')|-0%]"
 tenet_christian_syncretism_name:0 "Syncrétisme chrétien"
 tenet_christian_syncretism_desc:0 "Jésus de Nazareth n’était peut-être pas une vraie divinité, mais il reste une figure droite et vertueuse. Nous devrions honorer ses enseignements."
 doctrine_parameter_hostility_override_special_doctrine_is_christian_faith:1 ""
 doctrine_parameter_is_christian_faith_bilateral_loc_override:2 "Considère les [faiths|El] chrétiennes et est considéré par elles comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|Vl]#L #V s#!#! au lieu de $hostility_evil_tooltippable$#L #V s#!#!"
 doctrine_parameter_is_christian_faith_pastoral_isolation_loc_override:1 "Considère toujours les autres [faiths|El] chrétiennes comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|Vl], quelles que soient les différences doctrinales"
 doctrine_parameter_can_use_christian_artefacts:0 "Peut utiliser les [artifacts|El] chrétiens à plein rendement"
 doctrine_parameter_christian_syncretic_actor_opinion_active:1 "Bonus d’[opinion|El] de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] réciproque avec les [faiths|El] chrétiennes"
 doctrine_parameter_opinion_of_christian_syncretic_recipient_opinion_active:0 ""
 doctrine_parameter_christian_syncretic_recipient_opinion_active:1 "Bonus d’[opinion|El] réciproque de [EmptyScope.ScriptValue('syncretic_mutual_opinion_bonus_value')|=+0] avec les [faiths|El] qui ont le [core_tenet|El] $tenet_christian_syncretism_name$"
