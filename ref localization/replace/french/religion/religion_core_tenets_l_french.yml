 immaterial_harmony_name: "Harmonie immatérielle"
 special_doctrine_immaterial_harmony_name: "Harmonie immatérielle"
 special_doctrine_immaterial_harmony_desc: "Il n’y a pas de contradiction entre nos traditions et les enseignements de Bouddha ou des sages. On peut suivre l’un d’entre eux (ou même tous) sans que cela pose de problèmes spirituels."
 doctrine_parameter_hostility_override_special_doctrine_immaterial_harmony: "Considère, et est considéré par elle, toute [faith|El] ayant la doctrine spéciale de l’$special_doctrine_immaterial_harmony_name|l$ comme [GetHostilityLevelName( TOKEN_PARAMETER.GetIntValue )|V] au lieu de $hostility_astray_tooltippable$, $hostility_hostile_tooltippable$ ou $hostility_evil_tooltippable$"
 tenet_extinction_of_dharma_name: "Extinction du dharma"
 tenet_extinction_of_dharma_desc: "Les démons parcourent la terre sous l’apparence de personnes pieuses ; celui qui en tue un fera un pas vers la bouddhéité, celui qui en tue dix fera dix pas vers la bouddhéité."
 tenet_cranial_trophies_name: "Trophées crâniens"
 tenet_cranial_trophies_desc: "La tête contient la quintessence de son propriétaire. Si nous la coupons et en extrayons son contenu, nous pouvons revendiquer pour nous-mêmes sa puissante énergie spirituelle."
 doctrine_parameter_killing_bestows_heads: "Il est possible de gagner un [Concept('artifact', 'trophée crânien')|E] en [Concept('executing', 'exécutant')|E] un autre personnage ou en le tuant dans un [single_combat_duel|El] ou une [battle|El]"
 doctrine_parameter_decapitation_steals_prestige_as_piety: "En gagnant un [Concept('artifact', 'trophée crânien')|E], le tueur gagnera en outre de la [piety|El] proportionnellement au [prestige|El] du défunt"
 tenet_benevolent_governance_name: "Gouvernance bienveillante"
 tenet_benevolent_governance_desc: "Ceux qui gouvernent les masses ont le devoir moral de promouvoir ce qui est bon et de renoncer à ce qui est mauvais. Seuls ceux qui respectent ce principe peuvent gouverner de manière vraiment juste."
 tenet_filial_piety_name: "Piété filiale"
 tenet_filial_piety_desc: "La fidélité et l’obéissance aux aînés sont la base de la bonté humaine. Tant que nos parents sont vivants, nous les servons avec décence, lorsqu’ils meurent, nous les enterrons avec décence – pour ensuite les vénérer avec décence."
 tenet_harmonious_society_name: "Société harmonieuse"
 tenet_harmonious_society_desc: "Tout doit être équilibré : individus, nature, société. Les cieux établissent le tempo et nous suivons la musique."
 doctrine_parameter_sway_scheme_better: "[scheme_success_chance|E] de l’[GetScheme('sway').GetTypeName|l] : #P +15%#![success_chance_i]"
