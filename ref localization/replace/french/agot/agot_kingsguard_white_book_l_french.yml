 agot_kingsguard_white_book.0001.t:0 "Le Livre Blanc"
 agot_kingsguard_white_book.0001.desc:0 "Mes doigts font glisser une à une les pages où ont été immortalisés ceux qui ont revêtu la cape blanche pour servir honorablement la Couronne. Je puis ainsi feuilleter l'Histoire, de celle où l'on trouve abondance de bravoure, de devoir et de sacrifice. [Select_CString(ROOT.Char.HasTrait( GetTrait('inquisitive') ), 'Il y a tant de choses à apprendre là-dedans', 'De grands noms pour des hauts faits' )]."
