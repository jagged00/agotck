l_french:
 agot_shattered_world.1000.t:0 "Une nouvelle page se tourne"
 agot_shattered_world.1000.desc:0 "J'ai rassemblé mes [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], j'ai brandi ma bannière, étendu mon influence et guidé mon peuple à travers périls et promesses. Beaucoup d'encre ont ainsi noirci les pages de mon récit, mais beaucoup d'autres restent encore vierges.\n\nChaque choix est primordial, car chacun d'entre eux peut écrire une histoire bien différente. Certaines portes peuvent être ouvertes, tandis que d'autres seront scellées. C'est pourquoi je dois réfléchir à la nature du prochain chapitre…"
 agot_shattered_world.1000.a:0 "Je vais fonder une nouvelle [Concept('administrative','cité libre')|E]."
 agot_shattered_world.1000.b:0 "Je vais établir une [Concept('feudal','monarchie féodale')|E]."
 agot_shattered_world.1000.c:0 "Je vais forger un [Concept('pirate_government','royaume pirate')|E]."