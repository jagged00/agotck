 agot_scenario_rr_toj.0201.a:0 "Je l'élèverai comme m[baby_snow.Custom('FR_OnA')] propre enfant."
 agot_scenario_rr_toj.0201.b:0 "[new_father_2.GetFirstNameNoTooltip] will make a suitable adoptive father."
 agot_scenario_rr_toj.0201.c:0 "[new_father_3.GetFirstNameNoTooltip] will do this if I ask it of him."
 agot_scenario_rr_toj.0201.d:0 "[new_father_4.GetFirstNameNoTooltip] can be trusted in this."
 agot_scenario_rr_toj.0201.e:0 "Lyanna may stay at our court and raise her child as her own."
 agot_scenario_rr_toj.0201.tooltip:0 "[new_father.GetFirstNameNoTooltip] will take the baby as [new_father.GetHerHis] bastard. The baby will be part of [new_father.GetNamePossessive] house and raised as one of theirs."
 agot_scenario_rr_toj.0301.t:0 "The She-Wolf of Winterfell"
 agot_scenario_rr_toj.0301.desc:0 "With everything that has happened, and everything that must happen now, I cannot remain in Westeros."
 agot_scenario_rr_toj.0301.a:0 "I will leave it all behind for my [ROOT.Char.Custom2('RelationToMeShort',baby_snow)]."
 agot_scenario_rr_toj.0302.t:0 "The [baby_snow.Custom('GirlBoy')|U] from the Tower"
 agot_scenario_rr_toj.0302.desc:0 "I'm wandering the [ROOT.Char.Custom('GetCourtyard')] when I hear my name and turn. [surviving_kingsguard.GetTitledFirstName] approaches, Lyanna beside him, pale and exhausted, a small, dark-haired bundle in her arms.\n\n\"We heard what happened and came as soon as we could,\" Ser [surviving_kingsguard.GetFirstNameNoTooltip] says. \"Ser [dead_kingsguard_1.GetFirstNameNoTooltip] and Ser [dead_kingsguard_2.GetFirstNameNoTooltip] fell defending the tower.\"\n\nAt his side, Lyanna lets out a quiet, angry scoff. She doesn't speak at first, just stares down at the infant and gently runs her fingers through their hair. \"There's nowhere else safe for [baby_snow.GetHerHim],\" she murmurs. \"Not anymore.\""
 agot_scenario_rr_toj.0302.desc_lyanna_dead:0 "I'm wandering the [ROOT.Char.Custom('GetCourtyard')] when I hear my name and turn. Ser [surviving_kingsguard.GetFirstNameNoTooltip] approaches, travel-worn and grim, a small, dark-haired infant resting quietly in his arms.\n\n\"Ser [dead_kingsguard_1.GetFirstNameNoTooltip] and Ser [dead_kingsguard_2.GetFirstNameNoTooltip] fell defending the tower. Lyanna... she didn't survive the birth. I'm sorry.\"\n\nHe gently offers the child to me. \"A [ROOT.Char.Custom2('RelationToMeShort', baby_snow)].\""
 agot_scenario_rr_toj.0302.a:0 "[baby_snow.GetSheHe|U] is of my blood, and will be raised as such."
 agot_scenario_rr_toj.0302.b:0 "[baby_snow.GetSheHe|U] is of my blood, and will be treated as legitimate."
 agot_scenario_rr_toj.0302.c:0 "Let us marry, Lyanna, and I swear our children will inherit the realm."
 agot_scenario_rr_toj.0302.d:0 "Let us marry, Lyanna, and put these troubled times behind us."
 agot_scenario_rr_toj.0303.t:0 "$agot_scenario_rr_toj.0302.t$"
 agot_scenario_rr_toj.0303.desc:0 "$agot_scenario_rr_toj.0304.desc$"
 agot_scenario_rr_toj.0303.desc_lyanna_dead:0 "$agot_scenario_rr_toj.0304.desc_lyanna_dead$"
 agot_scenario_rr_toj.0303.desc_child:0 "$agot_scenario_rr_toj.0304.desc_child$"
 agot_scenario_rr_toj.0303.a:0 "$agot_scenario_rr_toj.0304.b$"
 agot_scenario_rr_toj.0303.a_child:0 "$agot_scenario_rr_toj.0304.b_child$"
 agot_scenario_rr_toj.0304.t:0 "$agot_scenario_rr_toj.0302.t$"
 agot_scenario_rr_toj.0304.desc:0 "I'm wandering the [ROOT.Char.Custom('GetCourtyard')] when I hear my name and turn. Ser [surviving_kingsguard.GetFirstNameNoTooltip] approaches, a woman beside him, pale and exhausted, a small, dark-haired bundle in her arms.\n\n\"[rhaegar.GetTitledFirstName] commanded me and my brothers to remain at the Tower of Joy, to guard Lady Lyanna and their child,\" he says. \"But it was no longer safe. Ser [dead_kingsguard_1.GetFirstNameNoTooltip] and Ser [dead_kingsguard_2.GetFirstNameNoTooltip] fell in its defense.\" He glances toward the woman, wordless and questioning, but she says nothing, her eyes fixed blankly on the child in her arms.\n\nHe turns back to me and speaks quietly. \"[baby_snow.GetHerHis|U] name is [baby_snow.GetFirstName]. Your [ROOT.Char.Custom2('RelationToMeShort',baby_snow)].\""
 agot_scenario_rr_toj.0304.desc_lyanna_dead:0 "I'm wandering the [ROOT.Char.Custom('GetCourtyard')] when I hear my name and turn. Ser [surviving_kingsguard.GetFirstNameNoTooltip] approaches, travel-worn and grim, a small, dark-haired infant resting quietly in his arms.\n\n\"[rhaegar.GetTitledFirstName] commanded me and my brothers to remain at the Tower of Joy, to guard Lady Lyanna and their child,\" he says. \"But it was no longer safe. Ser [dead_kingsguard_1.GetFirstNameNoTooltip] and Ser [dead_kingsguard_2.GetFirstNameNoTooltip] fell in its defense. The lady did not survive the birth.\"\n\nHe glances down at the infant, his voice softening. \"[baby_snow.GetHerHis|U] name is [baby_snow.GetFirstName]. Your [ROOT.Char.Custom2('RelationToMeShort',baby_snow)].\""
 agot_scenario_rr_toj.0304.desc_child:0 "Someone new arrived today, and ever since, the grown-ups have been talking in loud, serious voices.\n\nAt last, a man in shiny white armor walks over to me. He's carrying a small bundle in his arms. When he kneels, I see what's inside: a tiny baby, wrapped in soft cloth.\n\n\"This is your [ROOT.Char.Custom2('RelationToMeShort',baby_snow)],\" he says gently. \"His name is Jon.\""
 agot_scenario_rr_toj.0304.a:0 "If [baby_snow.GetSheHe] is Rhaegar's in truth, the throne belongs to [baby_snow.GetHerHim]."
 agot_scenario_rr_toj.0304.a_child:0 "[baby_snow.GetSheHe|U] was meant to be [baby_snow.Custom('QueenKing')]."
 agot_scenario_rr_toj.0304.b:0 "I cannot turn them away."
 agot_scenario_rr_toj.0304.b_child:0 "A [ROOT.Char.Custom2('RelationToMeShort',baby_snow)]?"