l_french:
 agot_scenario_events_rr.loyalists.t:0 "La guerre de l'Usurpateur"
 agot_scenario_events_rr.rebels.t:0 "La rébellion de Robert"
 agot_events_scenario_rr_exp.1.desc:0 "The love that sparked between [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] and I burned deep in both our hearts from our first meeting. My Queen of Love and Beauty, with her crown of winter roses, blue as frost. Our love has angered many, her betrothed, [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName], most of all. His ire casts a shadow most black over the Kingdoms, but he could not stop us from making haste to Dorne and eloping beyond the judgmental eyes of our families. My love is safe in the Tower of Joy, and there is no army strong enough to wrench us apart. Our destiny has been foretold; ours is the song of Ice and Fire..."
 agot_events_scenario_rr_exp.1.a:0 "Le dragon ne se brise pas si facilement."
 agot_events_scenario_rr_exp.2.desc:0 "Traitors! Traitors one and all! Who is [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName] to deny my right to justice, to break the King's peace? The [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName]s, so insolently demanding my son's life, simply for him protecting the wolf girl from that lecherous lordling of [GetTitleByKey('c_storms_end').GetNameNoTier]! The [GetScriptedCharacterByHistoryID('Tully_1').GetHouse.GetName]s, too, who owe all that they own to my house, now rise in open rebellion against their King! All the while, the ingrate, [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstName] [GetScriptedCharacterByHistoryID('Lannister_1').GetHouse.GetName], hides beneath [GetTitleByKey('c_casterly_rock').GetNameNoTier], the Others take him! They will pay! #bold They will pay with Fire and Blood! #"
 agot_events_scenario_rr_exp.2.a:0 "#bold Brûlez-les ! Brûlez-les tous ! #!"
 agot_events_scenario_rr_exp.3.desc:0 "[GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName] and his followers have risen up against our rightful liege, [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName]. The [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName]s are the rightful Lords of the Seven Kingdoms, and we [GetScriptedCharacterByHistoryID('Tyrell_8').GetHouse.GetName]s owe them for our place in the realm. We did not arrive at where we are by making rash decisions, we did so through carefully choosing our battles and fulfilling our duty. We will now defend the crown against the rebels, as would be the duty of any loyal vassal."
 agot_events_scenario_rr_exp.4.desc:0 "[GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] is our ally by blood through my sister [GetScriptedCharacterByHistoryID('Martell_7').GetFirstNamePossessive] marriage to the Crown Prince [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName]. Lord [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName] has risen up against the tyranny of the cruel king following the execution of [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName]'s brother and father, as well as Prince [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstNamePossessive] kidnapping of [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_5').GetHouse.GetName]. His cause may well be just, but with my nephews under the direct care of the king in the capitol we have little choice but to march in support of the crown."
 agot_events_scenario_rr_exp.4.a:0 "Les seigneurs de Dorne se mettent en marche."
 agot_events_scenario_rr_exp.5.desc:0 "My beloved [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] has been kidnapped by the vile [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUIName]. After protesting this cruel act to [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName], [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName] has been cruelly burned alive whilst his son [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName] looked on. Now Ned and I, with our allies, stand against the Mad King's tyranny. We may not yet know who should succeed the king, but one thing is certain: the reign of the dragon is over!"
 agot_events_scenario_rr_exp.5.a:0 "Les Targaryen périront de mes mains..."
 agot_events_scenario_rr_exp.6.desc:0 "My sister is in the hands of [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUIName], and the mad [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] has burned my father alive whilst [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName], my eldest brother, looked on in despair. [GetScriptedCharacterByHistoryID('Stark_5').GetFirstNamePossessive] betrothed, Robert, has risen up against the king's tyranny and I will do my utmost to aid my friend in bringing justice."
 agot_events_scenario_rr_exp.6.a:0 "Lyanna sera de nouveau en sécurité..."
 agot_events_scenario_rr_exp.7.desc:0 "My former wards, [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName] and [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName], have risen up against the tyranny of [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName]. The Mad King burned [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName] and allowed [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_5').GetHouse.GetName], Robert's betrothed, to be kidnapped. I will not let my companions stand alone. The knights of the Vale stand ready, and House [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName] will aid in bringing justice to the realm."
 agot_events_scenario_rr_exp.7.a:0 "Nous vaincrons"
 agot_events_scenario_rr_exp.8.desc:0 "[GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName], in another fit of madness, has cruelly executed [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] and [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_2').GetHouse.GetName]. [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUIName] has also kidnapped [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_5').GetHouse.GetName]. We are allied to the Starks by blood, my daughter [GetScriptedCharacterByHistoryID('Tully_4').GetFirstName] being wed to Lord [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName]. It is clear that the Mad King's reign has outlived its welcome, and order must be returned to the realm at any cost."
 agot_events_scenario_rr_exp.8.a:0 "Les seigneurs du Conflans sont prêts"
 agot_events_scenario_rr_exp.9.desc:0 "My old friend [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] has provoked [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName], [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName], and their allies into rebellion through his rash actions. The King has repeatedly slighted me despite my loyal service as Hand of the King. If he thinks he will find an eager ally in the Westerlands, he is gravely mistaken. For now sit, wait, and observe."
 agot_events_scenario_rr_exp.9.a:0 "Le lion dort... pour l'instant..."
 agot_events_scenario_rr_exp.10.desc:0 "La guerre est de retour à Westeros. Mes fils, pris dans leur incessante course à la gloire et au pillage, ont tenté de me convaincre de prendre l'épée. Mais je suis un vieil homme, un homme malade. J'ai gagné ma gloire dans des batailles passées depuis des décennies. Je suis las de la guerre, des effusions de sang, et je crains que les progrès que j'ai accomplis pour que mon peuple cesse de se livrer au pillage et à la conquête ne soient anéantis à la minute où un seul snekkar quitterait nos côtes escarpées. Nous ne paierons pas le prix du fer ; pas pour l'instant, du moins..."
 agot_events_scenario_rr_exp.10.a:0 "Pas pour l'instant, du moins..."
 agot_events_scenario_rr_exp.3.a:0 "Et ainsi, notre puissance pourra croître !"