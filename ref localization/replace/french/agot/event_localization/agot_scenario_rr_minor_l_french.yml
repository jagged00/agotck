l_french:
 agot_events_rr_minor.0001.t:0 "La bataille de [duel_location.GetNameNoTooltip]"
 agot_events_rr_minor.0001.desc.a:0 "Dès lors que les premiers rayons du soleil ont frappé ma tente ce matin, j'étais déjà vêtu de mon armure. L'air y est pesant, mais n'est-ce qu'une simple impression, ou l'appréhension d'un moment tant redouté ? Car au loin se dresse l'ennemi, et l'épreuve qu'il me faudra braver.\n\nL'épée et le marteau vont s'entrechoquer, le dragon et le cerf vont s'entretuer. Je puis presque sentir sa fureur d'ici. Une fine goutte glisse le long du rubis de mon plastron, et l'espace d'un instant je crains qu'il s'agit là de l'exsudation d'une frayeur que je tente de réprimer, mais il n'en est rien. Ce n'est pas de la sueur, mais la simple rosée du matin. Je n'ai point de dilection pour les joutes et les batailles, mais je ne m'y soustrait pas pour autant.\n\nDu reste, il n'y a pas lieu de s'inquiéter, ce jour n'est pas celui de ma mort."
 agot_events_rr_minor.0001.desc.b:0 "Je ne sais depuis combien de temps je suis figé là, à lorgner le camp qui se dresse à l'autre bout de l'horizon, mais plus l'attente demeure, plus mon sang bouillonne.\n\nJ'imagine mille et une façons de crever cette sale raclure de dragon, la plus évidente étant d'empoigner fermement mon marteau et de l'enfoncer au plus profond de son putain de plastron ! Les premiers rayons du soleil viennent poindre, et avec eux, aube une bataille pour laquelle je trépigne d'impatience.\n\nIl me tarde de me retrouver devant ce bâtard et de le faire saigner ! Je ferais choir la bête et sauverais ma belle !"
 agot_events_rr_minor.0001.a:0 "Patience Lyanna, bientôt je serai à tes côtés."
 agot_events_rr_minor.0002.t:0 "La bataille de [duel_location.GetNameNoTooltip]"
 agot_events_rr_minor.0002.t.alt:0 ": La mort du dragon"
 agot_events_rr_minor.0002.desc:0 "Mon garçon, mon fils aîné… mon précieux héritier ! On m'a volé tant des miens, et maintenant voilà que l'on m'a également volé Rhaegar ! Ne suis-je en vie que pour voir la ruine de ma maison, la fin de mon sang ? Je suis encerclé par les traîtres, noyé dans la félonie ! Le dragon doit protéger sa famille ! Il le doit !\n\nMais que puis-je faire lorsque ceux qui me veulent du mal sont partout et en tout lieu à ma cour ? [GetTitleByKey('c_dragonstone').GetNameNoTier] ! Il n'est d'endroit plus sûr que Peyredragon désormais. Dans la forteresse de mes ancêtres, ma famille sera en sécurité !\n\nMais peut-être serait-il plus raisonnable de ne pas envoyer tout le monde là-bas…"
 agot_events_rr_minor.0002.a:0 "I shall send only [GetScriptedCharacterByHistoryID('Targaryen_2').GetFirstName] and [GetScriptedCharacterByHistoryID('Targaryen_8').GetFirstName]."
 AGOT_EVENTS_RR_MINOR_0002_TOOLTIP:0 "[GetScriptedCharacterByHistoryID('Targaryen_2').GetFirstName] will hold Dragonstone till the war is over."
 agot_events_rr_minor.0002.b:0 "Je veux savoir toute ma famille en sécurité !"
 agot_events_rr_minor.0004.t:0 "À court de choix"
 agot_events_rr_minor.0004.desc:0 "« [ROOT.Char.Custom('FR_MonseigneurMadame')], » l'émissaire venu depuis la cour de [iron_throne_ruler.GetFirstName] s'incline et annonce solennellement : « #N Port-Réal est tombé#!. Il ne reste plus que [GetTitleByKey('c_dragonstone').GetNameNoTier]. »\n\nLes options vacillent devant moi comme les flammes d’une bougie dans une salle venteuse. Nous pourrions tenir notre position à Peyredragon, rassembler le peu d'hommes qu'il nous reste, et lutter, vaille que vaille. Ou bien, nous pourrions engager des pourparlers avec l'Usurpateur, et espérer conserver notre fief. Mais les chances que l'une ou l'autre de ces solutions puissent aboutir à un dénouement satisfaisant ne sont guère reluisantes.\n\nJe ne puis faire autrement que lâcher un soupir alors que je réfléchis à la situation. En tout état de cause, la voie la plus sage pour les reliquats de notre maison et les derniers à nous être encore fidèle, semble être de partir chercher refuge dans les Cités Libres. Là-bas, tapis dans les rues inconnues et couvert par le tumulte des langues étrangères, nous pourrions reconstruire nos forces et forger un nouvel héritage pour la Maison [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName]."
 agot_events_rr_minor.0004.a:0 "Nous devons fuir vers Essos, en tant que rois de l'autre côté du Détroit."
 agot_events_rr_minor.0005.t:0 "Du Typhon"
 agot_events_rr_minor.0005.desc:0 "Une grêle battante tambourine le toit du château, ponctuée d'un tonnerre retentissant, et malgré toutes les furies de la nature qui semblent conjurées pour mettre à bas [GetTitleByKey('c_dragonstone').GetNameNoTier], le cri perçant de [GetScriptedCharacterByHistoryID('Targaryen_2').GetFirstName] parvient à survivre dans un vacarme de tous les diables. Ses efforts autant que la tempête n'ont que trop duré, et à l'image de ce qu'il reste de la flotte Targaryen, la reine est mal en point. Les sages-femmes vont et viennent, transportant les linges ensanglantés, tandis que le mestre semble accorder plus d'espoir dans la prière que la science…\n\nMalgré la faiblesse qui l'habite, Rhaella laisse échapper un cri, si violent, si perçant, que le tonnerre, le vent et les mers se taisent dans un mutisme solennel. Alors seulement peuvent être entendus les cris de l'enfant, accompagnés des rires de soulagement de la mère. Les bras tremblants, le visage exsangue, elle sourit. Une accalmie dans laquelle est murmuré « …du Typhon » et alors, la foudre frappe à nouveau.\n\nLa tempête ne semble pas décider à s'arrêter, tout comme le sang de couler…\n\nQuel dessein les dieux peuvent-ils avoir pour l'enfant dont l'existence débute dans le sang, le feu, la foudre et la furie ?"
 agot_events_rr_minor.0005.a:0 "Seuls les dieux le savent…"
 agot_events_rr_minor.0006.t:0 "Une pensée pour les enfants"
 agot_events_rr_minor.0006.desc.a:0 "La naissance de l'enfant fut longue et douloureuse, mais c'est au moins un soulagement de savoir que la mort de la mère, elle, fut rapide.\n\nUne dynastie en lambeaux dont il ne reste que deux enfants. Mais aussi jeunes puissent-ils être, ils n'en sont pas moins Targaryen, de même que le sang qui coule dans leur veine. Un sang qui pourrait être leur perte. Par vengeance ou par précaution, nombreux seront ceux qui chercheront leur mort, et payeront grassement pour l'obtenir.\n\nLe temps n'est point une alliée en ces temps troubles, et la seule voie qui semble sûre est celle qui mène vers les cités libres. Là-bas, loin du Trône de Fer, par-delà le Détroit, les enfants pourront chercher de loyaux partisans pour reconquérir ce qui leur appartient… ou qui sait, chercher la paix dans une vie d'insouciance en laissant au temps le soin d'effacer les souvenirs et les rancœurs…"
 agot_events_rr_minor.0006.desc.b:0 "À quoi dois-je d'être encore en vie ? D'ardentes prières ? Le feu qui coule dans mon sang ? Une quelconque bonne fortune ? Je ne saurais le dire, mais je me réjouis d'avoir encore la force d'être de ce monde pour protéger mes enfants, car bientôt, ils seront traqués comme des animaux. Pour une gloire futile, ou une fugace rétribution, les chiens de la Couronne vont se mettre en chasse !\n\nLe plus sage serait de faire voile vers les cités libres. Distancer d'un Détroit entre nous et le Trône, nous pourrons panser nos blessures et peut-être même rassembler des forces, qui sait. Mais pour dire le vrai, si deux enfants peuvent se faire discrets dans l'effervescence d'une ville, cela ne saurait être si facile pour une reine, même déchue. Devrais-je donc prendre position à [GetTitleByKey('c_dragonstone').GetNameNoTier] ? Tenir la place jusqu'à ce que mes enfants atteignent un âge plus mûr ?\n\nQuelle que soit la décision à prendre, elle ne saurait tarder !"
 agot_events_rr_minor.0006.desc.c:0 "agot_events_rr_minor.0006.desc.c"
 agot_events_rr_minor.0006.a:0 "Je dois protéger les enfants, quitte à partir au bout du monde !"
 agot_events_rr_minor.0006.b:0 "Je dois veiller sur eux, et veiller à bien les préparer."
 agot_events_rr_minor.0006.c:0 "La prime sur leur tête serait probablement… mirobolante."
 agot_events_rr_minor.0007.t:0 "Les dernières braises"
 agot_events_rr_minor.0007.desc:0 "La traversée du Détroit est source d'agitation, et ce n'est pas là que l'effet de la houle et du navire qui tangue. Chaque regard en direction de Westeros ravive l'existence du danger qui pèse sur nos épaules, et chaque regard dans la direction opposée est un augure de maints autres à venir.\n\nFinalement, lorsque les jeunes dragons posent pied à terre dans les cités libres, le soulagement est palpable. Même si la traversée des flots n'est au demeurant que les prémices de leur odyssée, au moins, le danger immédiat semble un peu plus lointain, et ce malgré les yeux qui déjà dévisagent…"
 agot_events_rr_minor.0007.a:0 "Feu et sang."
 agot_events_rr_minor.0100.t:0 "Sous fausse bannière"
 agot_events_rr_minor.0100.desc:0 "The time has come to make an important decision. The war [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] incited has weakened his and his house's position in Westeros, with the Red Keep in King's Landing being his last major stronghold. With a well executed feint I could manage to capture the city and the Red Keep and put an end to the abomination of Seven Hells. The days of his reign must come to an end."
 agot_events_rr_minor.0100.a:0 "Il m'entendra rugir..."
 agot_events_rr_minor.0100.b:0 "Le danger est trop grand..."
 agot_events_rr_minor.0101.t:0 "Qu'est-ce que la loyauté ?"
 agot_events_rr_minor.0101.desc:0 "My guards swiftly attend me in the throne room, bringing news: [traitor_scope.GetTitledFirstName] has brought the forces of the Westerlands to the gates of King's Landing to protect me from the treasonous bastards of [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName], [GetScriptedCharacterByHistoryID('Stark_3').GetHouse.GetName], [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName], and [GetScriptedCharacterByHistoryID('Tully_1').GetHouse.GetName]! \n\nFrom both sides my council advises me. [advisor.GetName] urges me to not let him enter the city since he fears [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstName] might hide his true intentions whilst [traitor.GetName] speaks in favour of Lord [traitor_scope.GetHouse.GetBaseNameNoTooltip]..."
 agot_events_rr_minor.0101.a:0 "C'est un serviteur loyal, laissez-le entrer !"
 agot_events_rr_minor.0101.a.tt:0 "Vous allez ouvrir vos portes..."
 agot_events_rr_minor.0101.b:0 "Un traître de plus !"
 agot_events_rr_minor.0102.t:0 "Sous fausse bannière"
 agot_events_rr_minor.0102.desc.a:0 "With the city gates opened and the vast streets of [GetTitleByKey('c_kings_landing').GetNameNoTier] lying before me and my men, I am one step closer to my goal. However, soldiers need spoils, my men are hungry, and the city is ripe for harvest. As I let my dogs loose on the sheep in the streets, I continue my ascent of Aegon's High Hill, [GetTitleByKey('b_the_red_keep').GetNameNoTier] looming above me. As we reach the gates, we find them barred, the castle's garrison standing their ground. Arrows raining, [killer_1.GetFirstName] and [killer_2.GetFirstName] together with well-chosen soldiers begin climbing the pale red walls. \n\nShouting is heard from the top of the Red Keep Steps..."
 agot_events_rr_minor.0102.desc.b:0 "\"The gates shall stay closed\" was the only thing the envoy cried from the city gate. My plans for eliminating [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] and his abominous spawn have come to a halt. As the war is lost for them still I must show the rebels that I have answered their call at last..."
 agot_events_rr_minor.0102.a:0 "Apportez-moi sa tête."
 agot_events_rr_minor.0102.b:0 "Que le siège commence."
 agot_events_rr_minor.0103.t:0 "Sous fausse bannière"
 agot_events_rr_minor.0103.desc:0 "Les portes de la ville s'ouvrent et les soldats Lannister affluent et se propagent dans la ville comme un chancre. Le chaos se répand et je sais pertinemment que la garnison n'a pas la moindre chance. Tout est perdu. Je canalise ma colère sur l'aîné du traître Tywin, [jaime_scope.GetName], et lui ordonne de m'apporter la tête de son père dans l'instant. Immédiatement après je me tourne vers mon pyromant [pyromancer_plotter.GetFirstName] : « Ils brûleront pour leur traîtrise ! Allumez les caches de feu grégeois dans toute la ville ! Il ne restera que des cendres et des os lorsque l'Usurpateur arrivera ! » Alors qu'[pyromancer_plotter.Custom('FR_IlElle')] se hâte d'exécuter ma volonté, je patiente dans la salle du trône d'une ville d'ores et déjà condamné.\n\nUn bref instant s'écoule et les portes qui s'étaient fermées sur le départ de [pyromancer_plotter.GetFirstNameNoTooltip] s'ouvrent à nouveau sur l'arrivée de [jaime_scope.GetNameNoTooltip]. En voyant le sang sur son épée, je crois un court instant que le fils du traître a accompli son devoir, mais il n'en est rien. « J'ai tué votre pyromant. » La colère qui m'habitait se retrouve mélangé à de la terreur. Il me réserve le même sort, mais je peux encore fuir. Je me retourne prestement et je parviens à faire quelques pas, avant de sentir quelque chose de froid et métallique. Mon corps s'effondre et le sang inonde le sol, ajoutant des nuances plus foncées à la pierre déjà rouge. Tout s'obscurcit, et depuis plusieurs minutes déjà, il n'y a qu'une chose qui me taraude l'esprit..."
 agot_events_rr_minor.0103.a:0 "Brûlez-les tous ! #EMP Brûlez-les tous...#!"
 agot_events_rr_minor.0104.t:0 "Sous fausse bannière"
 agot_events_rr_minor.0104.desc:0 "The air was thick with blood and death as [killer_1.GetFirstName] and [killer_2.GetFirstName] approach me. Both clothed in blood, their eyes filled with lust. Their looks leave no doubt, the deed is done. The loyalists stood their ground in [GetTitleByKey('b_the_red_keep').GetNameNoTier] but they did not stand a chance against the lion of the west. My scouts have already informed me of rebel forces heading towards the capital. A new era is dawning..."
 agot_events_rr_minor.0104.a:0 "Le lion a toujours des griffes..."
 agot_events_rr_minor.0105.t:0 "Espoirs brisés, prétendants brisés"
 agot_events_rr_minor.0105.desc.b:0 "A roaring lion flies high above the gates of [GetTitleByKey('c_kings_landing').GetNameNoTier] where the three headed dragon once took residence. The city has fallen to the [GetScriptedCharacterByHistoryID('Lannister_1').GetHouse.GetName]s. \n\nThe city has been sacked, and when we reach [GetTitleByKey('b_the_red_keep').GetNameNoTier], [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstNamePossessive] men are filling carts with the bodies of loyalists and whoever else got in their way. The one immaculate dressings and decorations of the keep are drenched with blood, giving a new meaning to the keep's name — one I won't soon forget. \n\nThe throne room is no better, the once illustrious carpet at the steps of the throne now soaked through with blood. It is who I find sitting on the Iron Throne that truly shakes me, however: [GetScriptedCharacterByHistoryID('Lannister_7').GetFirstName] [GetScriptedCharacterByHistoryID('Lannister_7').GetHouse.GetName], a sworn knight of [GetTitleByKey('d_kingsguard').GetNameNoTier]. \n\nWhen told of the Mad King's fate, I had surely thought it to be untrue. Yet, here it is, the ugly truth, directly in front of me, before my own eyes. One of my men approaches me. \"My lord, Lord [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstNamePossessive] host is approaching the city.\""
 agot_events_rr_minor.0105.desc.a:0 "Despite the cause for celebration, the high spirits of those in the keep are somewhat dashed as two crimson bundles are laid out before [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] — the bundles far smaller than they should be. [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstName] watches solemnly as Robert inspects the bundles, silently pulling back the cloaks that cover the bodies inside. [GetScriptedCharacterByHistoryID('Targaryen_10').GetFirstName], and... \n\nTywin reaches out, gesturing for Robert to stop as his hand moves to uncover the second bundle. \"[GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName] [GetScriptedCharacterByHistoryID('Targaryen_11').GetHouse.GetName],\" Tywin announces. \"I would recommend saving yourself the discomfort, My Lord. There's little left to see.\" Robert hesitates for a moment, but ultimately decides it's in his best interests to see for himself — something he immediately regrets when he lifts the cloak and is greeted by a faceless horror of bone and gore. He quickly covers the body back up, making haste to move on from the bodies presented. Tywin has proven his fealty today, although few who come after Robert are brave enough to look upon Aegon's remains."
 agot_events_rr_minor.0105.desc.c:0 "[GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] stands before the two bundles I have laid before him. [GetScriptedCharacterByHistoryID('Targaryen_10').GetFirstName] and [GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName] — both wrapped in crimson cloaks in the hopes of concealing all the blood. Robert inspects the bodies, one after the other, lifting the cloaks to see their faces and confirm their identities. When he comes to the smallest of the two, I gesture for him to wait. \n\n\"Aegon Targaryen's body,\" I declare, having seen the mess beneath the cloak with my own eyes. \"I would recommend saving yourself the discomfort, My Lord. There's little left to see.\" Robert hesitates for a moment, but ultimately decides it's in his best interests to see for himself — something he immediately regrets when he lifts the cloak and is greeted by a faceless horror of bone and gore. The faint structure of Aegon's skull remains, not an ounce of remaining brain where it's supposed to be. Robert quickly covers the body back up, making haste to move on. \n\n\"Very good,\" is all he manages as he gives me a nod of acknowledgement."
 agot_events_rr_minor.0105.a:0 "Une affaire terrible, en effet."
 agot_events_rr_minor.0106.t:0 "Sang pour sang"
 agot_events_rr_minor.0106.desc.a:0 "\"They were #italic children,#! Robert!\" Ned paces as he speaks, visibly upset. He's always been a bit of a bleeding heart. \n\n\"And children grow into pretenders,\" I remind him.\n\n\"[GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName] [GetScriptedCharacterByHistoryID('Targaryen_11').GetHouse.GetName] wasn't even yet off the breast,\" Ned shouts. \"There were other ways—\"\n\n\"There were other ways for [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] to address the kidnapping of my [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName],\" I snap. Has he forgotten what this is all about? \"Blood for blood, I say.\"\n\nNed shakes his head. \"And how will you explain this to her?\" He asks. \"How will you look my sister in the eye and explain the murder of those children?\" \n\nI can't believe what I'm hearing. Over some dragonspawn? Ned storms out of the room in a fury."
 agot_events_rr_minor.0106.desc.b:0 "My heart is racing and I am unable to keep still as I attempt to process what I have just seen. \"They were #italic children,#! Robert!\"\n\n\"And children grow into pretenders,\" he argues.\n\n\"[GetScriptedCharacterByHistoryID('Targaryen_11').GetFirstName] [GetScriptedCharacterByHistoryID('Targaryen_11').GetHouse.GetName] wasn't even yet off the breast,\" I find myself shouting. \"There were other ways—\" \n\n\"There were other ways for [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] to address the kidnapping of my [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName],\" Robert interrupts. \"Blood for blood, I say.\" \n\nI am horrified. \"And how will you explain this to her?\" I ask him \"How will you look my sister in the eye and explain the murder of those children?\" \n\nI can't believe that Robert, my dearest friend, has become so vengeful that he would see the blood of children spilled. My grief must wait, however, until Lyanna is home."
 agot_events_rr_minor.0106.a:0 "La recherche de Lyanna se poursuit."
 agot_events_rr_minor.0107.t:0 "Et les cloches sonnent..."
 agot_events_rr_minor.0107.desc:0 "Que cela se sache partout dans le monde, de Westeros à Essos et dans les terres au-delà : \n\n#bold Le Roi Fou, Aerys II Targaryen, a péri.#!\n\nPort-Réal est tombé, emportant avec lui la dynastie régnante des Targaryen."
 agot_events_rr_minor.0107.a:0 "Valar morghulis."
 agot_events_rr_minor.0200.t:0 "Sous une fausse bannière"
 agot_events_rr_minor.0200.desc:0 "J'ai maintenant amené mes forces des Terres de l'Ouest vers la porte. Nous saluons les gardes et leur demandons de dire au roi que nous sommes venus les sauver et qu'ils doivent ouvrir la porte pour que nous puissions défendre la ville."
 agot_events_rr_minor.0200.a:0 "Ils ne se doutent de rien"
 agot_events_rr_minor.0117.t:0 "Brûlez-les tous"
 agot_events_rr_minor.0117.desc:0 "Burn them all, I say to [GetScriptedCharacterByHistoryID('Pyromancer_1').GetFirstName], as I retake my seat upon my throne, I watch the traitorous lion squirm as he knows he cannot defeat the fire of a dragon. They managed to evade Aegon's dragon during the Field of Fire, but I ought to correct my ancestor's mistakes, and deny the throne to the traitors"
 agot_events_rr_minor.0117.a:0 "Ils régneront sur un trône de cendres"
 agot_events_rr_minor.0118.t:0 "Brûlez-les tous"
 agot_events_rr_minor.0118.a:0 "Ils régneront sur un trône de cendres."
 agot_events_rr_minor.0119.t:0 "Flammes vertes"
 agot_events_rr_minor.0119.desc:0 "[GetTitleByKey('c_kings_landing').GetNameNoTier] is in a state of utter chaos. The city has fallen, and soldiers march through the streets, leaving few properties unlooted.\n\nIt would seem, however, that the looting and devastation are the least of the people's problems as the sound of explosions rings out through the city. I hear them, I even feel them; deep in my bones, I know that the end has come for me. I try to run, to seek shelter in one of the houses as a stampede of people outside trampled one another. I reached the house, at last, but alas, alack! I see the green flame pour through the streets, and as I draw my last breath, I feel it engulf me. "
 agot_events_rr_minor.0119.a:0 "Il semblerait que j'ai connu un terrible destin."
 agot_events_rr_minor.0108.t:0 "The Spark for Rebellion"
 agot_events_rr_minor.0108.desc:0 "The memory of the messenger's words still tastes like ash. My father is gone. [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName] is gone. The Mad King's \"justice\" was nothing more than a pyre. My sister still lies in [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUINamePossessive] hands.\n\nNow [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] demands that [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] surrender me and [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] to him — no doubt to suffer the same fate as my kin. Jon answered that demand with steel.\n\nThe weight of the North rests upon me, a lordship bought in blood and wildfire, along with a marriage pact with a woman I barely know. Yet, I cannot stand idle while my family is destroyed and my sister remains captive.\n\nRobert, Jon and I rise together in defiance. For the father who raised me, for the brother who should be here in my place, and for Lyanna — I march. Today, our banners rise before the gates of [GetTitleByKey('c_gulltown').GetNameNoTier], and the dragon's reign begins to crumble."
 agot_events_rr_minor.0108.a:0 "For justice."
 agot_events_rr_minor.0109.t:0 "The Spark for Rebellion"
 agot_events_rr_minor.0109.desc:0 "Every night I see her face, and every morning I wake to the realization that the dragon-spawn [GetScriptedCharacterByHistoryID('Targaryen_3').GetShortUIName] still draws breath while my [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] remains in his filthy clutches. The gods have gone mad, and [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] is their herald — burning Lord [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName] and strangling his son [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName] in a court that has become a slaughterhouse.\n\nNow the Mad King sends for our heads? He calls us traitors for the crime of breathing? Let him come. [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] gave his answer in steel, and mine is already gripped in my fist.\n\nThe wolf, the falcon, and the trout stand with the stag, and we will not rest until Lyanna is returned. I will see Rhaegar dead and Aerys cast down.\n\nWe may not yet know who should succeed the king, but one thing is certain: the reign of the dragon is over! Today, our banners snap in the wind before the gates of [GetTitleByKey('c_gulltown').GetNameNoTier]."
 agot_events_rr_minor.0109.a:0 "Pour Lyanna !"
 agot_events_rr_minor.0110.t:0 "The Spark for Rebellion"
 agot_events_rr_minor.0110.desc:0 "A raven arrived last week. When the Mad [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUINamePossessive] cruelty claimed the life of my old friend, Lord [GetScriptedCharacterByHistoryID('Stark_1').GetFirstName] [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName], and his heir, [GetScriptedCharacterByHistoryID('Stark_2').GetFirstName], I thought that had already set the stages for rebellion. But now he demands me to hand over my wards: [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] and [GetScriptedCharacterByHistoryID('Stark_3').GetFirstName], Rickard's second son, naming them traitors without cause.\n\nI refused.\n\nTogether with Ned — now Lord of [GetTitleByKey('c_winterfell').GetNameNoTier] and newly wed to Lady [GetScriptedCharacterByHistoryID('Tully_4').GetFirstName] [GetScriptedCharacterByHistoryID('Tully_4').GetHouse.GetName] of [GetTitleByKey('c_riverrun').GetNameNoTier] — and Robert leading his men from the Stormlands, my knights of the Vale and I have risen in open rebellion against the Iron Throne.\n\nToday, our banners cast their shadow upon the gates of the traitorous [GetTitleByKey('c_gulltown').GetNameNoTier]."
 agot_events_rr_minor.0110.a:0 "There's no turning back."
 agot_events_rr_minor.0111.t:0 "Une grande opportunité"
 agot_events_rr_minor.0111.desc:0 "With the [GetScriptedCharacterByHistoryID('Stark_5').GetHouse.GetName] girl dead, the new Lord of the Seven Kingdoms, [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName], is without a wife. \n\nPerhaps I should offer my daughter to him — a [GetScriptedCharacterByHistoryID('Lannister_6').GetHouse.GetName] queen, after all, would benefit our family immensely at court and abroad."
 agot_events_rr_minor.0111.a.tt:0 "Vous envoyez la proposition"
 agot_events_rr_minor.0111.b:0 "Roi ou pas, aucune de mes filles n'épousera un ivrogne !"
 agot_events_rr_minor.0111.b.tt:0 "Vous n'envoyez pas de proposition"
 agot_events_rr_minor.0112.t:0 "La Mariée d'Or"
 agot_events_rr_minor.0112.desc:0 "My beloved [GetScriptedCharacterByHistoryID('Stark_5').GetFirstName] is dead, and my heart has never known so deep a sorrow. The wine numbs most of the pain, but there is an emptiness that lingers, one I just cannot seem to shake. Oh, my sweet, sweet Lyanna...\n\nAfter a few more days of grieving, the Grand Maester informs me of a proposal from Lord [GetScriptedCharacterByHistoryID('Lannister_1').GetFirstName]: he has offered me his daughter's hand. She is beautiful, pleasant, and by all means perfect, I am told — but even so, can she truly compare to my lost love?"
 agot_events_rr_minor.0112.a:0 "Chaque roi a besoin d'une reine. A défaut d'autre chose, elle fait l'affaire, je suppose..."
 agot_events_rr_minor.0112.a.tt:0 "Vous acceptez la proposition."
 agot_events_rr_minor.0112.b:0 "Je n'ai aimé qu'une fois. Jamais plus."
 agot_events_rr_minor.0112.b.tt:0 "Vous refusez la proposition."
 agot_events_rr_minor.0113.t:0 "Liés par le sang et le cœur"
 agot_events_rr_minor.0113.desc:0 "My Jaime. My dear, sweet, handsome Jaime, my brother, my twin, my love... \n\nWe have always been together, even in the womb. My hand belongs to [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName], yes, but he is still #italic my#! Jaime, and I cannot help but long for him. \n\nBut if we were to be caught? If he were to father my children and #italic anyone#! were to learn the truth? Oh, the consequences would be unspeakable. \n\nHe holds me in his arms, and he is everything that Robert is not — but he is also my brother and we should be ashamed, but we #italic aren't!#! If our love is as unnatural and shameful as they say, why does his touch feel so good? Why deprive ourselves?"
 agot_events_rr_minor.0113.a:0 "Je ne suis pas entiere sans toi."
 agot_events_rr_minor.0113.a.tt:0 "Vous couchez avec Jaime."
 agot_events_rr_minor.0113.b:0 "Cela s'arrête maintenant, avant que nous ne fassions quelque chose qui ne peut être défait."
 agot_events_rr_minor.0113.b.tt:0 "Vous rejetez Jaime."
 agot_events_rr_minor.0114.t:0 "Le tournoi de Harrenhal"
 agot_events_rr_minor.0114.desc:0 "It is my pride that has wrought this upon the land. At my tourney the great lords gathered, and the great lords conspired. And when the Prince of [GetTitleByKey('c_dragonstone').GetNameNoTier] chose not my daughter [daughter.GetName] as his Queen of Love and Beauty, but another, the seeds of this chaos were sown in the soil.\n\nNow my brother [brother.GetTitledFirstName] writes to me, and his words implore that I trust this Prince. That [rhaegar.GetTitledFirstNamePossessive] plan will see the resplendent return of House [rhaegar.GetDynastyName] to her full glory.\n\nBut what of the future of House [ROOT.Char.GetDynastyName]? Our liege lords House [tully.GetDynastyName] have risen with the rebels, and [tully.GetTitledFirstName] is our goodbrother, his children of our blood. Am I to watch [sister.GetFirstNamePossessive] children meet the same end as Lord [GetScriptedCharacterByHistoryID('Stark_1').GetHouse.GetName]?"
 agot_events_rr_minor.0114.a:0 "Je ferai confiance à la loyauté de mon frère."
 agot_events_rr_minor.0114.a.tt:0 "Vous resterez loyaux."
 agot_events_rr_minor.0114.b:0 "Un fils dans chaque camp assurera l'avenir de la maison [ROOT.Char.GetDynastyName]."
 agot_events_rr_minor.0114.b.tt:0 "Vous deviendrez neutre."
 agot_events_rr_minor.0114.c:0 "Faites savoir à l'Usurpateur que la chauve-souris a pris son envol."
 agot_events_rr_minor.0114.c.tt:0 "Vous rejoindrez la rébellion de Robert."
 agot_events_rr_minor.0115.t:0 "Le kraken en hiver"
 agot_events_rr_minor.0115.desc:0 "Ces garçons vont me tuer ! Pendant que les continentaux s'entre-déchirent pour leur chaise en fer, nous, les hommes de fer, sommes dans la tourmente. \n\nMes fils me haranguent pour que je rejoigne le combat contre le dragon, salivant sur ma santé défaillante. Ils savent que mon prochain voyage sera le dernier, mais aucun n'est prêt à me suivre. Je dois subir les plaintes incessantes de [balon.GetName] sur la perte de l'Antique Voie, le manque de sang-froid de [victarian.GetName], et les ambitions perverses d'[euron.GetName] - que je n'ose pas détailler, de peur de faire fructifier une telle dégénérescence.\n\nM[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('piper'))] [piper.GetTitledFirstName] est mon seul réconfort. Le jeune [robin.GetName] dans ses bras, le pont entre nos deux mondes, né d'une vieille et faible semence. J'ai extrait la pierre, mais nous marchons sur un pont branlant dans la tempête.\n\nAujourd'hui, alors que je regarde ma propre mortalité en face, je le vois clairement : #bold mon héritage sera mis en pièces par mes propres rejetons.#! Une couvée de corbeaux qui se disputeront la charogne."
 agot_events_rr_minor.0115.a:0 "Voyons si le cerf peut encorner le dragon."
 agot_events_rr_minor.0115.a.tt:0 "Le vieux Kraken va ruminer la guerre."
 agot_events_rr_minor.0115.b:0 "À période radicale, action radicale."
 agot_events_rr_minor.0116.t:0 "Bataille de [location.GetName]"
 agot_events_rr_minor.0116.desc:0 "During my clash with the [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName] loyalists at the battle of [location.GetName], [stormlander_lord.GetTitledFirstName] has come before me to offer [stormlander_lord.GetHerHis] submission. Clearly, after seeing my skill at arms and my munificent treatment of other former loyalists, [stormlander_lord.GetSheHe] has realized that it is much wiser to side with our righteous cause."
 agot_events_rr_minor.0116.a:0 "Le cerf devient de plus en plus fort."
 agot_events_rr_minor.0116.a.tt:0 "[stormlander_lord.GetTitledFirstName] sera désormais de votre côté dans le conflit."
 agot_rr_preg_status_lyanna:0 "agot_rr_preg_status_lyanna"
 agot_rr_robert_rhaegar_duel:0 "agot_rr_robert_rhaegar_duel"
 agot_rr_scenario_status:0 "agot_rr_scenario_status"
 agot_events_rr_minor.0124.t:0 "Le lion et le dragon"
 agot_events_rr_minor.0124.desc:0 "Cartes et missives sont étalées sur mon bureau, et pourtant, ce fouillis ne saurait émuler le chaos qui embrase en ce moment même les Sept Couronnes. À l'image de sa démence qui n'a cessé de croître au fil des ans, la rébellion contre [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] a elle aussi pris de l'ampleur, et il est peut-être temps pour le lion de sortir de sa tanière.\n\nSi j'admets que nous étions autrefois amis, je ne le considère plus comme tel depuis longtemps déjà. La folie devenant le chancre de son esprit, il n'a eu de cesse de se mettre à dos tout le royaume, et moi par la même occasion quand il eut l'audace de me voler mon fils et héritier, pour en faire la vulgaire sentinelle de sa garde rapprochée. Voilà pourquoi aujourd'hui un guerrier tel que [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName] se retrouve à la tête d'une insurrection — bien qu'un bon guerrier ne fasse pas forcément un bon roi.\n\nDu reste, il me faut décider quel camp rejoindre. La réponse la plus judicieuse serait bien entendu « celui du vainqueur », mais l'issue de la guerre est encore loin d'être scellée. La tentation de me retourner contre Aerys est forte, mais par expérience, je sais ce qui peut advenir d'une maison qui a l'outrecuidance de se retourner contre son suzerain. Le mieux est peut-être encore de faire preuve de patience…"
 agot_events_rr_minor.0124.a:0 "Le destin des Sept Couronnes est en jeu."
 agot_events_rr_minor.0124.a.tt:0 "Vous pouvez choisir de vous ranger du côté du Trône de fer ou du côté des rebelles, dans le cas où le [war_score|El] du Trône de fer tombe en dessous de 50"
 MarchOnKingsLanding:0 "Vous devez vous mettre à la tête de l'armée que vous envoyez à Port-Réal pour poursuivre votre plan. Aerys risquerait de se méfier si vous ne veniez pas personnellement #italic défendre#! la cité !\n"
 agot_events_rr_minor.0103.tta:0 "[jaime_scope.GetFirstName] défait [defending_kingsguard.Custom('FR_le_Char')][defending_kingsguard.GetName] et tue [pyromancer_plotter.GetFirstName]."
 agot_events_rr_minor.0103.ttb:0 "[defending_kingsguard.Custom('FR_le_Char')|U][defending_kingsguard.GetName] défait [jaime_scope.GetFirstName], l'empêchant ainsi de tuer [pyromancer_plotter.GetFirstName]."
 agot_events_rr_minor.0103.ttc:0 "Puisqu'aucun de ses frères de la Garde n'est là pour l'arrêter, [jaime_scope.GetFirstName] n'a aucun mal à tuer [pyromancer_plotter.GetFirstName] ainsi qu'[aerys_scope.GetFirstName]."
 agot_events_rr_minor.0126.t:0 "La fin du Trône de Fer"
 agot_events_rr_minor.0126.desc:0 "A raven from the Crownlands brings news not conceivable since the time of old Valyria: The Iron Throne, the Red Keep, [GetTitleByKey('c_kings_landing').GetNameNoTier] and its hundreds of thousands of inhabitants, in an instant, were no more. A ball of fire green as an emerald consumed the city in its entirety, the roar of the explosion echoing from the [GetTitleByKey('c_the_eyrie').GetNameNoTier] to [GetTitleByKey('c_highgarden').GetNameNoTier]. Rumors abound: the Mad King [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] orchestrated the plot, those who rose up against the crown destroyed the city in a desperate bid to win the war, some even claim a dragon has been sighted in wreckage. Rumors aside, there is one truth: King's Landing is nothing but ash and rubble."
 agot_events_rr_minor.0126.a:0 "C'est une nouvelle ère effroyable qui semble s'annoncer..."
 agot_events_rr_minor.0128.t: "La défense des Terres de l'Orage"
 agot_events_rr_minor.0128.desc: "Alongside [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName], We have just accomplished a significant victory, the first of this rebellion. After the successful siege, we have managed to capture [GetTitleByKey('c_gulltown').GetNameNoTier], the strategic city blocking my path to sail back to the Stormlands.\n\nWith Gulltown now under our control, it is time to set sail and rally the armies of the Stormlands to my cause. The winds are favorable, and the ships are ready to set sail."
 agot_events_rr_minor.0128.a: "To [GetTitleByKey('c_storms_end').GetNameNoTier]!"
 agot_events_rr_minor.0131.t: "Depuis le Val jusqu'à Winterfell"
 agot_events_rr_minor.0131.desc: "As [GetScriptedCharacterByHistoryID('Arryn_3').GetFirstName] [GetScriptedCharacterByHistoryID('Arryn_3').GetHouse.GetName] and [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] deal with the aftermath of [GetTitleByKey('c_gulltown').GetNameNoTier], I ready my bags, and horse as I am to depart from the Vale to return to [GetTitleByKey('c_winterfell').GetNameNoTier], riding through the Fingers. Hopefully with swift travel I can rally the forces of the North; and ride south in haste to assist in this war."
 agot_events_rr_minor.0131.a: "À Winterfell !"
 agot_events_rr_minor.0132.desc_opening:0 "[informer.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_events_rr_minor.0132.desc_body:0 "Word has reached us from the greenlanders of a major happening in their war. The warrior who would be king, [baratheon.GetFullName] has slain the dragon [targaryen.GetName] at the Battle of [location.GetName], caving in the last hope of the [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName] dynasty. Now is the time for us to curry favour with this new King, and find pretense to scour the green lands!"
 agot_events_rr_minor.0132.a: "Préparez les snekkars, ils craindront à nouveau les Fer-nés."
 agot_events_rr_minor.0132.b: "Je ne me soucie pas des guerres des continentaux."
 agot_events_rr_minor.0400.t: "Le siège d'Accalmie"
 agot_events_rr_minor.0400.desc: "Rappelez, si vous voulez, le nom de ce château."
 agot_events_rr_minor.0400.a: "Cela semble effrayant."
 agot_events_rr_minor.0401.t: "Le Chevalier Oignon"
 agot_events_rr_minor.0401.desc: "For a month the garrison of [GetTitleByKey('c_storms_end').GetNameNoTier] has endured a brutal siege, resorting to eating horses, dogs, and rats just to stave off starvation. Morale is low, and yet not all is lost. Late in the night, a small skiff is seen zig-zagging its way across the treacherous waters of Shipbreaker Bay, making port to the amazement of every man of the garrison.\n\nA lone figure jumps from the vessel and takes off a glove, offering it to the nearest captain.\n\n\"I hope you like onions,\" he says."
 agot_events_rr_minor.0401.a: "Une telle bravoure mérite récompense, séance tenante !"
 agot_events_rr_minor.0401.b: "Récompensez cet homme, moyennant un prix."
 agot_events_rr_minor.0401.c: "Je n'accorde qu'une chose aux contrebandiers : la mort."
 agot_events_rr_minor.0111.a:0 "C'est tout à fait logique !"
 agot_events_rr_minor.0103.ttd:0 "[jaime_scope.GetFirstName] tue [pyromancer_plotter.GetFirstName] et [aerys_scope.GetFirstName]."
 agot_events_rr_minor.0126.b:0 "Avec la mort du Roi Fou, cette guerre peut prendre fin."
 agot_events_rr_minor.1000.t:0 "L'envolée des Targaryen"
 agot_events_rr_minor.1000.desc:0 "Following their flight across the Narrow Sea, the [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName]s have found refuge in [exile_region.GetNameNoTier].\n\n[exile.GetTitledFirstName] serves as the Targaryen leader, now."
 agot_events_rr_minor.1000.a:0 "Intéressant."
 agot_events_rr_minor.0004.c:0 "Nous sommes à la merci de nos ravisseurs"
 agot_events_rr_minor.0004.t_defeated_and_imprisoned:0 "Vaincu par les rebelles"
 agot_events_rr_minor.0004.desc.imprisoned:0 "Les rebelles ont pris d'assaut la grande salle de [GetTitleByKey('c_dragonstone').GetNameNoTier], brisant notre dernière ligne de défense. L'affrontement fut féroce, un typhon chaotique d'épées et de cris désespérés, mais tragiquement #italic ce ne fut pas assez#!. Nous avons payé le prix ultime lorsque le château est tombé aux mains de l'ennemi. La poussière retomba, la bataille était perdu, et je tomba aux pieds de [iron_throne_ruler.GetFullName], perdant ce qu'il me restait de dignité.\n\nDésormais, je patiente dans le donjon de [iron_throne_ruler.GetFirstNameNoTooltip], en attente de son jugement. Chaque instant est plus angoissant que celui qui le précède. Je ne peux rien faire d'autre que d'adresser des prières à [ROOT.Char.GetFaith.HighGodName], en espérant que la fureur de l'Usurpateur n'aille pas jusqu'à réclamer ma tête comme gage final de mon échec."
 agot_events_rr_minor.0004.a.tt:0 "Vous, votre famille et certains de vos courtisans fuiront jusqu'à [exile_destination.GetName]."
 agot_events_rr_minor.0005.exiled.desc:0 "Malgré la grêle assourdissante de l'orage qui s'abat violemment sur les toits de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], les cris de [GetScriptedCharacterByHistoryID('Targaryen_2').GetFirstName] semblent toujours se frayer un chemin jusqu'à la surface du monde. Ses efforts, tout comme l'orage, ont duré bien plus longtemps que la normale — et tout comme ce qu'il reste de la flotte des Targaryen, Rhaella se porte mal. Ses dames entrent et sortent de la pièce avec des draps et des mains couverts de sang, et le mestre ne peut que prier tandis qu'elle se tortille dans son lit de naissance.\n\nAu moment où un coup de tonnerre fracassant retentit de ce qui semble être directement au-dessus du château, Rhaella pousse un cri à glacer le sang qui n'a d'égal que les cris qu'elle a déjà poussés. Par la grâce des dieux, le tonnerre, le vent et la grêle s'arrêtent suffisamment longtemps pour que tous puissent entendre les pleurs d'un nouveau-né.\n\nPour la première fois depuis des jours, elle rit de soulagement, tenant son nouveau-né dans ses bras tremblants, son visage malade et exsangue souriant à son enfant. Après tout ce qu'elle a traversé, c'est un répit singulier et bref face aux horreurs qu'elle a vécues et qu'elle devra encore affronter. « du Typhon, » roucoule-t-elle doucement, sa voix chancelante alors que le mestre emmène l'enfant pour qu'il soit soigné.\n\nUn autre coup de tonnerre accompagne un gémissement douloureux de Rhaella — le bébé est arrivé, mais elle saigne toujours à un rythme alarmant. Née du feu et du sang, née parmi les éclairs et le tonnerre, quel dessein les dieux peuvent ils avoir pour une enfant ayant connu pareilles prémices ?"