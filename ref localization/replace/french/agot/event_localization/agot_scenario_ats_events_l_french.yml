l_french:
 agot_scenario_ats.1000.t:0 "Le dragon en exil"
 agot_scenario_ats.1000.desc:0 "Aux heures les plus sombres, aux instants les plus silencieux, le sommeil m'enlace, et avec lui les rêveries. Des songes teintés de rouge, nimbés de sang, ainsi mes nuits se font aux côtés de mes frères qui suffoquent et se noient dans l'étendue pourpre. L'armée de mon père prise entre le marteau qui s'abat et le fer glacial d'une enclume. Le trait d'un frère qui frappe le cœur palpitant d'un dragon noir sous une crête éplorée.\n\nCes rêves étaient vrais, et le seront également les nouveaux. Un dragon brisant sa froide coquille parmi les festivités nuptiales. Un géant tout de blanc armuré, avec draperie flottant dans son sillage, et monarque à la chevelure argentée à ses côtés. Mes songes ont toujours étaient nébuleux, et les énigmes dans le noir difficiles à démêler, mais j'ai l'intime conviction que c'est le présage que j'attendais. Un héritage à revendiquer, un gardien qui m'épaulera.\n\nJe suis le digne fils de mon père, et en tant que tel, l'ascension m'attend de l'autre côté du Détroit. Le monde le découvrira bientôt, mais la première épreuve qui se dresse sur ma route n'est pas un dragon rouge, c'est de l'aigre acier."
 agot_scenario_ats.1000.a:0 "Aucun acier ne saurait entraver le Dragon Noir !"
 agot_scenario_ats.1000.a.tt:0 "Viendra le moment où vous devrez prendre une décision à propos d’[bittercringe.GetFirstNameNicknamed]"
 agot_scenario_ats.1001.t:0 "La mort pour fil rouge"
 agot_scenario_ats.1001.desc:0 "« La Veuve Rouge », c'est ainsi qu'ils me nomment, c'est ainsi qu'ils me raillent, moi la Dame de Froide-Douve.\n\nJe n'étais qu'une donzelle de dix ans révolus lorsque je perdis mon premier époux au [Glossary( 'champ d’herberouge', 'REDGRASS_FIELD_GLOSS' )]. J'eus la naïveté de croire que la mort daignerait m'oublier, mais il n'en fut rien. Mon fils, ma fille, mon père et trois autres époux ont été emportés à leur tour par l'Étranger.\n\nMère éplorée, veuve attristée et maintenant fille endeuillée. Non content de simplement me léguer le fief, mon père m'a transmis aussi un devoir, sacré pour nous autres femmes j'imagine : trouver un époux. Et si je ne remplis pas ce devoir avant la prochaine lune, mon château reviendra à un quelconque cousin.\n\nMe voilà malgré moi au centre de tous les regards. Celui [longinch.Custom('FR_du_Char_Pi')][longinch.GetTitledFirstNameNicknamed], et de tant d'autres hommes qui ne me voient que comme une frêle damoiselle. Je me garde de leurs sourires et de l'ambition qui se dessine derrière. La pierre, l'acier et l'eau, c'est tout ce en quoi je puis croire dans un monde où les mots sont traîtres et les serments si aisément oubliables."
 agot_scenario_ats.1001.a:0 "Qu'ils viennent. Mes murs sont hauts et mes douves profondes."
 agot_scenario_ats.1001.a.tt:0 "Vous allez endiguez l'Échiquetée"
 agot_scenario_ats.1002.t:0 "The Chequy Lion"
 agot_scenario_ats.1002.desc:0 "As I look out from the balcony high in the tower at Standfast, I am struck by how small and feeble I have become. I may still stand tall, but my House is a broken and ruined thing, stripped of everything we were by a red dragon; whose mercy they say I should be grateful for.\n\nThe mercy that took my sons at the [Glossary( 'Redgrass Field', 'REDGRASS_FIELD_GLOSS' )], that took my wife with the same blows, that took my daughter as recompense for standing with the one true king... A silent sister he made her, who would not even say her father's name when I last saw her.\n\nOf service, I have only two hedge knights, Ser [bennis.GetFirstNameNicknamed] and [dunk.GetTitledFirstNameNicknamed]; the latter is a fine young man, but not my blood. No, the last of my blood went with the spring sickness in King's Landing, still silent as a ghost as Daeron's mercy took one final thing from me.\n\nFor what, then, should I be thankful?"
 agot_scenario_ats.1002.a:0 "A king's mercy is a poisoned gift."
 agot_scenario_ats.1002.a.tt:0 "You will stand fast alone"
 agot_scenario_ats.1003.t:0 "Épais tel le rempart"
 agot_scenario_ats.1003.desc:0 "Ça fait deux ans depuis la mort de Ser Arlan… depuis Cendregué… depuis la tragédie du prince tant aimé. Trois grands hommes sont morts pour moi ce jour-là, et ma dette n'est toujours pas payée… [maekar.Custom('FR_le_Char_Pi')|U][maekar.GetTitledFirstName] m'a confié son plus jeune fils, l'Œuf, et je voulais m'acquitter de ma dette comme ça…\n\nAprès Cendregué, nous sommes allés à Dorne où s'trouvait la famille de l'Œuf, et vint c'te Fléau de Printemps. Quand le père de son père est mort, c'est son oncle Aerys qui est monté sur le trône, et [bloodraven.GetFirstNameNicknamed] est devenu sa Main. Des milliers d'yeux, et un seul, paraît qu'il a, et le royaume a peur alors que l'été est là.\n\nLa grande chaleur est arrivé, et nous avons rendu visite à [aemon.GetFirstName] à la Citadelle, avant d'aller chercher service dans le Bief. C'est là que nous avons trouvé [eustace.Custom('FR_le_Char_P')][eustace.GetFullName], un vieux chevalier avec juste un nom et pas vraiment plus. Le printemps est fini, faut que serve avec honneur mon nouveau suze... suzera... mon nouveau seigneur. Ce sera ma façon à moi de payer ma dette."
 agot_scenario_ats.1003.a:0 "En route."
 agot_scenario_ats.1003.a.tt:0 "Vous allez vous rendrez à Piéferme"
 agot_scenario_ats.2000.t:0 "Un dragon sans griffes"
 agot_scenario_ats.2000.desc:0 "Suite au trépas de mon père et de mes frères au [Glossary( 'champ d’herberouge', 'REDGRASS_FIELD_GLOSS' )], c'est mon oncle, [bittercringe.GetFirstNameNicknamed], qui prit les rennes de la Maison Feunoyr et mena notre famille à Tyrosh, le foyer de ma mère. Désormais, j'attend de ce commandant mercenaire aguerri qu'il nous mène à la victoire, de l'autre côté du Détroit, là où m'attends mon héritage, mais il persiste à refuser, dédaignant jusqu'à mon droit à porter l'artefact de ma maison.\n\nQu'il me refuse son concours dans la conquête des Sept Couronnes est une chose, mais l'épée est mienne, jusque dans mon nom ! Il me faut une armée pour prouver ma force, et un symbole, pour prouver ma légitimité, mais comment faire entendre raison à un tel homme ?\n\nLa force sans nul doute, mais je serais bien prétentieux de m'imaginer d'emblée victorieux face à un guerrier d'une telle habileté, car sa réputation n'est pas sans fondement. Alors l'éloquence peut-être ? Mais même si une joute verbale jouerait moins en ma défaveur, des mots, même plus aiguisés que l'acier, peuvent-ils défaire l'aigreur ? Le plus simple serait encore de cingler vers Westeros et de laisser mon oncle ruminer son amertume, mais dépourvu de soutien et dépossédé de son nom, qui se souciera des prétentions d'un dragon sans griffes ?"
 agot_scenario_ats.2000.a:0 "Il n'y a qu'un seul langage pour faire entendre raison à un tel homme…"
 agot_scenario_ats.2000.a.tt:0 "Vous allez affronter Aegor en duel"
 agot_scenario_ats.2000.b:0 "Si je dois l'affronter, ce ne sera pas épée en main..."
 agot_scenario_ats.2000.b.tt:0 "Vous tenterez de convaincre votre oncle de vous céder Feunoyr"
 agot_scenario_ats.2000.c:0 "S'il ne veut pas m'apporter son soutien, j'irai en chercher ailleurs !"
 agot_scenario_ats.2000.c.tt:0 "Vous renoncerez à obtenir le concours d'Aigracier ainsi que l'épée de votre père"
 agot_scenario_ats.2001.t:0 "Celui qui porte l’épée"
 agot_scenario_ats.2001.desc.daemonwins:0 "Je me dresse de toute mon envergure devant [bittercringe.GetFirstName]. J'ai brisé son corps, mais en ai-je fait autant de son obstination à me refuser mon droit ?\n\n« Acceptez votre défaite, mon oncle », mes mots ne sont pas moins brutaux que ne l'étaient mes coups, mais l'espace d'un instant je crois apercevoir une lueur de défi amère… qui s'éteint promptement.\n\nIl s'incline respectueusement, plus respectueusement qu'il ne l'a jamais été à mon égard, puis va quérir ce pourquoi nous sommes là. « Je te prenais pour un vulgaire roquet, mais tu es le digne fils de mon frère. Tu es digne de porter le prénom de ton père, son nom, ainsi que son épée… Quant à moi, je serais fier de me battre à nouveau aux côtés de Daemon Feunoyr. »\n\nJe saisis [blackfyre.GetName], l'épée d'une maison sur laquelle se reflète son futur…"
 agot_scenario_ats.2001.desc.daemonloses:0 "Je suis mis à bas et jeté dans la boue, comme le sont mes folles espérances…\n\n« Tu oses revendiquer la lame du Conquérant, toi, un vulgaire chiard incapable de conquérir ne serait-ce qu'une victoire ? Va donc ! Part pour l'ouest et tente ta chance. Risque ta vie pour tes vaines ambitions et peut-être certains se souviendront de ton nom quelques années durant après ta mort. Ou bien terre-toi dans un trou et oublie jusqu'à ton nom, car jamais tu ne seras digne de [blackfyre.GetName]. »\n\nLes coups de mon oncle étaient déjà difficiles à supporter, ses mots le sont davantage."
 agot_scenario_ats.2001.a:0 "Aujourd'hui l'épée, demain le trône…"
 agot_scenario_ats.2001.a.tt:0 "Vous devrez choisir comment procéder pour la conquête du Trône de Fer"
 agot_scenario_ats.2001.b:0 "Je n'ai ni épée, ni allié…"
 agot_scenario_ats.2001.b.tt:0 "Vous devrez continuer votre route autrement"
 agot_scenario_ats.2002.t:0 "Celui qui porte l’épée"
 agot_scenario_ats.2002.desc.intro:0 "À peine je débute par « Mon oncle » que déjà je suis repris sèchement par un « Pas tout à fait ».\n\nIl va me falloir soupeser chacun de mes mots, semble-t-il, si je veux parvenir à ébranler ce rempart d'amertume derrière lequel le bien nommé [bittercringe.GetFirstNameNicknamed] semble se réfugier à chaque instant…\n\n"
 agot_scenario_ats.2002.desc.daemonhassword:0 "Les prochaines minutes seront déterminantes, et par conséquent, doivent être convaincantes.\nJe commence à parler de rêves prophétiques, de destin, mais plus encore de devoir. Je réveille les sentiments enfouis derrière l'aigreur pour en faire mes alliés. Et je fais tout cela en drapant l'ensemble dans de belles formulations et de grands mots.\n\n« Le dragon rouge a fait son temps. Il est voué à chuter, et cela a déjà commencé. » Ainsi se termine ma plaidoirie… et débute, semble-t-il, mon ascension.\n\n« Je te prenais pour un vulgaire roquet, mais tu #bold sembles#! le digne fils de mon frère. Pour l'heure, voici une part de ton héritage, quant au reste, nous nous emparerons ensemble, tu as ma parole. »\n\n[blackfyre.GetName]. La lame du conquérant est enfin mienne. Avec elle, je pourrais me tailler un chemin jusqu'au Trône de Fer et remettre notre nom à sa juste place."
 agot_scenario_ats.2002.desc.nosword:0 "Les prochaines minutes seront déterminantes, et par conséquent, doivent être convaincantes.\nJe commence en évoquant mes rêves prophétiques, mais cela le laisse de marbre. J'en appel à son honneur, et à celui de ma maison, mais l'honneur semble être le cadet de ses soucis.\n\n« Tu penses cracher du feu, mais tu ne fais qu'aboyer comme un vulgaire roquet. Moi vivant, jamais [blackfyre.GetName] ne sera brandie comme un trophée par un chiard, fut-ce t'il de mon sang. »\n\nIl refuse de me céder la lame du Conquérant. Il refuse de me concéder jusqu'à mon propre nom. Alors, soit. Vienne le jour où je siégerai sur le Trône de Fer, et ce jour-là, je reviendrai récupérer ce qui est mien."
 agot_scenario_ats.2002.a:0 "Aujourd'hui l'épée, demain le trône…"
 agot_scenario_ats.2002.a.tt:0 "Vous devrez choisir comment procéder pour la conquête du Trône de Fer"
 agot_scenario_ats.2002.b:0 "Je n'ai ni épée, ni allié…"
 agot_scenario_ats.2002.b.tt:0 "Vous devrez continuer votre route autrement"
 agot_scenario_ats.2010.t:0 "Trouble at the Dam"
 agot_scenario_ats.2010.desc:0 "A servant rushes into the yard at Coldmoat, his breathing heavy and ragged. \"My [rohanne.GetLadyLord], there's been trouble at the dam!\" he hurries out. Through a nervous face he explains that one of the peasants sent to work at the dam has been cut across the face by Ser [bennis.GetFirstNameNicknamed], a hedge knight in service to Ser [eustace.GetFirstName]. Another hedge knight, this one much younger and taller, was present as well.\n\nI had thought what I had to do to the peasant Dake would be enough to deter them, but it seems I was wrong.\n\nI have no choice but to seek retribution now, though perhaps I could turn this to my advantage... if I lie in wait."
 agot_scenario_ats.2010.a:0 "I'll wait for an envoy from Ser [eustace.GetFirstNameNoTooltip]."
 agot_scenario_ats.2010.a.tt:0 "You will wait to see who comes from Standfast"
 agot_scenario_ats.2020.t:0 "Trouble at the Dam"
 agot_scenario_ats.2020.desc:0 "[dunk.GetFullName] arrives at the top of the steps that wind their way up my tower at Standfast, interrupting my daydreams of ancient days I was not born to see, a worried look on [dunk.GetHerHis] face.\n\nUpon inquiring, I learn that [dunk.GetSheHe] and [bennis.GetFullName] found the Chequy Water, #italic my#! chequy water, dry and feeble by the time it reaches my lands. [rohanne.GetFullNameNicknamed] has dammed it, and in retaliation [bennis.GetTitledFirstNameNoTooltip] struck one of [rohanne.GetHerHis] peasants. If I am to stave off open conflict I must send an envoy to greet the Red Widow, and hope I can offer enough to get the dam down and my lands protected.\n\n[dunk.GetFullNameNoTooltip] has offered to go in my stead, as I have sworn never to enter the seat of Coldmoat again, unless it is as its lord. Though I know the message would be better received coming from me, should I take [dunk.GetHerHim] up on the offer?"
 agot_scenario_ats.2020.desc.nodunk:0 "A servant arrives at the top of the steps that wind their way up my tower at Standfast, interrupting my daydreams of ancient days I was not born to see, a worried look on his face.\n\nUpon inquiring, I learn that my knight [bennis.GetFullName] found the Chequy Water, #italic my#! chequy water, dry and feeble by the time it reaches my lands. [rohanne.GetFullNameNicknamed] has dammed it, and in retaliation [bennis.GetTitledFirstNameNoTooltip] struck one of [rohanne.GetHerHis] peasants. If I am to stave off open conflict I must quickly open negotiations with the Red Widow.\n\nYet, an old oath lingers in my mind. I swore never to enter Coldmoat again unless it was as its restored lord. Still, there is little choice now but to break it."
 agot_scenario_ats.2020.a:0 "[dunk.GetTitledFirstNameNoTooltip] shall go."
 agot_scenario_ats.2020.a.tt:0 "[dunk.GetTitledFirstNameNoTooltip] will be sent to Coldmoat to negotiate"
 agot_scenario_ats.2020.b:0 "I'll go, though it will pain me to do so."
 agot_scenario_ats.2020.b.tt:0 "You will go to Coldmoat despite your oath"
 agot_scenario_ats.2021.t:0 "The Slumbering Lion"
 agot_scenario_ats.2021.desc:0 "As I approach the gates of Coldmoat, I am struck by its strength. Standfast is little more than a tower with some middling walls around it; Coldmoat is a true keep.\n\nMy heart burns as I pass beneath the great spiders of House Webber, and the faded stone relief of a chequy lion slumbering in the stones above the gate."
 agot_scenario_ats.2021.a:0 "So my oath is broken..."
 agot_sceanrio_ats.2021.a.tt:0 "You will enter Coldmoat"
 agot_scenario_ats.2030.t:0 "Trouble at the Dam"
 agot_scenario_ats.2030.desc:0 "As Egg and I make our way back to the tower at Standfast, we notice the steady stream of water that feeds the local forest and crops is nearly bone dry. [bennis.GetTitledFirstNameNicknamed], another hedge knight pledged to [eustace.GetTitledFirstName], joins us as we head upstream in search of answers, as while the recent drought has been difficult, it would not have dried the stream so quickly.\n\nAfter a brief ride we see the dam that's dried the water, and a group of peasants who serve the nearby seat of Coldmoat. Before I can react, [bennis.GetTitledFirstNameNoTooltip] is on them, and an argument quickly turns physical, a peasant being left with a scar across his face for their trouble.\n\nReturning to Standfast, we inform [eustace.GetTitledFirstNameNoTooltip] of the confrontation and see who [eustace.GetSheHe] will send to meet the Red Widow of Coldmoat."
 agot_scenario_ats.2030.a:0 "It's up to my liege now."
 agot_scenario_ats.2030.a.tt:0 "You'll wait to be informed of who Eustace will send"
 agot_scenario_ats.3010.t:0 "An Offer of Coin"
 agot_scenario_ats.3010.desc:0 "As I practice my archery, I am told of the arrival of an envoy sent in [eustace.GetTitledFirstNamePossessive] place. [dunk.GetSheHe|U] introduces [dunk.GetHerselfHimself] as [dunk.GetTitledFirstNameNicknamed], a hedge knight. [dunk.GetSheHe|U] is indeed taller than the [longinch.GetNicknameNoTooltip] even; broad, well-built, and handsome in a plain sort of way. There's a flirtation between us that comes more easily than I would expect, though [dunk.GetSheHe] clearly has little experience.\n\nDispensing with the pleasantries, and the natural flirtation, [dunk.GetTitledFirstNameNoTooltip] offers me a sack of gold as payment for my injured peasant, and requests I remove the dam from the Chequy Water — going so far as to claim it belongs to House Osgrey, despite their loss of the stream after the Redgrass Field."
 agot_scenario_ats.3010.a:0 "I'll take the gold, and remove the dam."
 agot_scenario_ats.3010.a.tt:0 "You'll take the dam down; there will be less water for all involved"
 agot_scenario_ats.3010.b:0 "I'll take your gold, but my moat cannot go dry."
 agot_scenario_ats.3010.b.tt:0 "You'll take the gold for your peasant's injury, but keep the dam up"
 agot_scenario_ats.3010.c:0 "I'll have none of your gold, and you'll have none of my water."
 agot_scenario_ats.3010.c.tt:0 "You'll take no gold and keep the dam up"
 agot_scenario_ats.3011.t:0 "An Offer of Blood"
 agot_scenario_ats.3011.desc:0 "As I practice my archery, I am told of the arrival of an envoy sent in [eustace.GetTitledFirstNamePossessive] place. [dunk.GetSheHe|U] introduces [dunk.GetHerselfHimself] as [dunk.GetTitledFirstNameNicknamed], a hedge knight. [dunk.GetSheHe|U] is indeed taller than the [longinch.GetNicknameNoTooltip] even; broad, well-built, and handsome in a plain sort of way. There's a flirtation between us that comes more easily than I would expect, though [dunk.GetSheHe] clearly has little experience.\n\nDispensing with the pleasantries, [dunk.GetTitledFirstNameNoTooltip] offers me the life of Ser [bennis.GetFirstNameNicknamed] as payment for my injured peasant, and requests I remove the dam on the Chequy Water. Going so far as to claim it belongs to House Osgrey, despite their loss of the stream after the Redgrass Field."
 agot_scenario_ats.3011.a:0 "I'll take the man, and remove the dam."
 agot_scenario_ats.3011.a.tt:0 "You'll take the dam down; there will be less water for all involved"
 agot_scenario_ats.3011.b:0 "I'll take your man, but my moat cannot go dry."
 agot_scenario_ats.3011.b.tt:0 "You'll take the prisoner for your peasant's injury, but keep the dam up"
 agot_scenario_ats.3011.c:0 "I'll not bother with your hedge knight."
 agot_scenario_ats.3011.c.tt:0 "You'll refuse the prisoner and keep the dam up"
 agot_scenario_ats.3012.t:0 "An Offer of Coin"
 agot_scenario_ats.3012.desc:0 "As I practice my archery, I hear the gates to Coldmoat groan as they're opened. Everyone gathered in the yard freezes in place as a lone rider enters. [eustace.GetSheHe|U] calls for [eustace.GetHerHis] horse to be stabled, then lumbers toward me. It is Ser [eustace.GetFirstName], face red with rage.\n\n[eustace.GetSheHe|U] stops just shy of me, ignoring the [longinch.GetNickname] who attempts to step between us. Ser [eustace.GetFirstNameNoTooltip] is here to negotiate — still as tall, broad, and strongly built as I remember, though there's an emptiness in [eustace.GetHerHis] eyes that wasn't there before the Redgrass Field.\n\nAfter a short journey to the hall where my throne waits, Ser [eustace.GetFirstNameNoTooltip] makes an offer of gold as recompense for my injured peasant, and requests that I remove the dam, leaving less water for us both."
 agot_scenario_ats.3012.a:0 "I'll take the gold, and remove the dam."
 agot_scenario_ats.3012.a.tt:0 "You'll take the dam down; there will be less water for all involved"
 agot_scenario_ats.3012.b:0 "I'll take your gold, but my moat cannot go dry."
 agot_scenario_ats.3012.b.tt:0 "You'll take the gold for your peasant's injury, but keep the dam up"
 agot_scenario_ats.3012.c:0 "I'll have none of your gold, and you'll have none of my water."
 agot_scenario_ats.3012.c.tt:0 "You'll take no gold and keep the dam up"
 agot_scenario_ats.3013.t:0 "An Offer of Blood"
 agot_scenario_ats.3013.desc:0 "As I practice my archery, I hear the gates to Coldmoat groan as they're opened. Everyone gathered in the yard freezes in place as a lone rider enters. [eustace.GetSheHe|U] calls for [eustace.GetHerHis] horse to be stabled, then lumbers toward me. It is Ser [eustace.GetFirstName], face red with rage.\n\n[eustace.GetSheHe|U] stops just shy of me, ignoring the [longinch.GetNickname] who attempts to step between us. Ser [eustace.GetFirstNameNoTooltip] is here to negotiate — still as tall, broad, and strongly built as I remember, though there's an emptiness in [eustace.GetHerHis] eyes that wasn't there before the Redgrass Field.\n\nAfter a short journey to the hall where my throne waits, Ser [eustace.GetFirstNameNoTooltip] makes an offer of Ser [bennis.GetFirstNameNicknamed] in chains as recompense for my injured peasant, and requests that I remove the dam. Amid this drought, removing the dam might simply visit further hardship on us both."
 agot_scenario_ats.3013.a:0 "I'll take the man, and remove the dam."
 agot_scenario_ats.3013.a.tt:0 "You'll take the dam down; there will be less water for all involved"
 agot_scenario_ats.3013.b:0 "I'll take your man, but my moat cannot go dry."
 agot_scenario_ats.3013.b.tt:0 "You'll take the prisoner for your peasant's injury, but keep the dam up"
 agot_scenario_ats.3013.c:0 "I'll not bother with your hedge knight, and you'll have none of my water."
 agot_scenario_ats.3013.c.tt:0 "You'll refuse the prisoner and keep the dam up"
 agot_scenario_ats.3020.t:0 "A Deal with a Spider"
 agot_scenario_ats.3020.desc:0 "I wait a brief time before being invited into [rohanne.GetFullNamePossessive] throne room. [rohanne.GetSheHe|U] begins with some pleasantries, even as [rohanne.GetSheHe] sits on a throne meant for my House, in the castle that was our seat. Containing my rage and horror, I must do what I broke my oath to do.\n\nWhat shall I offer the [rohanne.GetLadyLord] of Coldmoat: gold, or blood? Which would encourage [rohanne.GetHerHim] to remove this bloody dam?"
 agot_scenario_ats.3020.a:0 "Gold will have to do for your injured peasant. Now will you remove this dam?"
 agot_scenario_ats.3020.a.tt:0 "You will offer [rohanne.GetNameNoTooltip] gold as payment"
 agot_scenario_ats.3020.b:0 "Take Ser [bennis.GetFirstNameNicknamed], and take down your dam."
 agot_scenario_ats.3020.b.tt:0 "You will offer Ser [bennis.GetFirstNameNoTooltip] as a prisoner, and request that the dam be removed"
 agot_scenario_ats.3021.t:0 "My Chequy Water"
 agot_scenario_ats.3021.desc:0 "[rohanne.GetTitledFirstNameNicknamed] has relented and removed the dam blocking the Chequy Water. Though the drought will now strike us both, at least the lands of Standfast will survive.\n\nAll we can hope now is that rain comes... and soon."
 agot_scenario_ats.3021.a:0 "Perhaps this Red Widow is not so cruel after all..."
 agot_scenario_ats.3021.a.tt:0 "The dam has been removed from Standfast, stretching out the Chequy Water"
 agot_scenario_ats.3030.t:0 "The Lion or the Oak?"
 agot_scenario_ats.3030.desc:0 "Ser [eustace.GetFirstName] has taken me up on my offer of going in [eustace.GetHerHis] stead to Coldmoat to negotiate with the Red Widow. My mind spends its time racing through the rumors regarding the Lady of Coldmoat — of her aged and bony fingers, of the murder of her dead husbands, of the wicked sorceries done in her castle beneath the pale moonlight. It may be that I ride to Coldmoat to face my doom, but at least I face it in service to my lord.\n\nAs Egg and I leave Standfast behind, we discuss etiquette, and how best to approach a highborn lady. If we are to survive a greeting with the dangerous witch of House Webber, I will have to speak to her as befits a woman of her station. At least, that's what Egg tells me."
 agot_scenario_ats.3030.desc.eustacegoing:0 "Ser [eustace.GetFirstName] has refused my offer of going in [eustace.GetHerHis] stead to Coldmoat to negotiate with the Red Widow. [eustace.GetSheHe|U] will go [eustace.GetHerselfHimself] in the hopes that it will send a better message, despite the oaths he has taken to stay out of his family's ancient home. I spend the time after Ser Eustace leaves pacing the top floor of Standfast, wondering if the chequy lion had given up too much of his pride, just to ride into a spider's deadly web."
 agot_scenario_ats.3030.a:0 "Let us hope the Red Widow can be reasoned with."
 agot_scenario_ats.3030.a.tt:0 "The negotiations will proceed"
 agot_scenario_ats.3033.t:0 "In the Widow's Den"
 agot_scenario_ats.3033.desc:0 "Egg and I make our way through the gates of Coldmoat, passing beneath the faded relief of a chequy lion that belies its long history. Despite misdirection and pranks by Ser [longinch.GetNameNicknamed], I am finally introduced to [rohanne.GetFullNameNicknamed]. From all the stories I had heard, the Red Widow was an old crone who had killed all [rohanne.GetHerHis] husbands with vile sorcery.\n\nStanding before me is a woman, perhaps five-and-twenty years, short, and pretty. Stepping away from an archery field, [rohanne.GetSheHe] seems to size me up, running her hands along my borrowed tunic bearing a chequy lion of House Osgrey, and speaking in a tone that sends blood straight to my face.\n\nSer [eustace.GetFirstName] entrusted me with negotiating, but what offer would best please this Red Widow? And how do I convince [rohanne.GetHerHim] to bring down the dam?"
 agot_scenario_ats.3033.a:0 "Take this gold my [rohanne.GetLadyLord]; and let the Chequy Water flow."
 agot_scenario_ats.3033.a.tt:0 "You offer gold for the injured peasant, and ask that the dam come down"
 agot_scenario_ats.3033.b:0 "Take Ser [bennis.GetFirstNameNicknamedNoTooltip] and bring down the dam."
 agot_scenario_ats.3033.b.tt:0 "You offer [bennis.GetFirstNameNoTooltip] as a prisoner, and ask that the dam come down"
 agot_scenario_ats.3031.t:0 "A Widow's Bite"
 agot_scenario_ats.3031.desc:0 "Lady [rohanne.GetFirstName] did not take kindly to my offer, and the dam will not come down. Without that water, the lands held by Ser [eustace.GetFirstName] will wither and [eustace.GetHerHis] people will die.\n\nRemembering a story Ser [eustace.GetFirstNameNoTooltip] told me, of [eustace.GetHerHis] son [addam.GetFirstName] and his long friendship with Lady [rohanne.GetFirstNameNoTooltip], I try to plead with [rohanne.GetHerHim] by invoking his memory — and the bond they shared.\n\n[rohanne.GetHerHis|U] face contorts with rage, and before I can react [rohanne.GetHerHis] hand shoots out like an arrow, striking my cheek and sending stings of pain across my face. [rohanne.GetSheHe|U] tells me of how Ser [eustace.GetFirstNameNoTooltip] brought [eustace.GetHerHis] own sons to war, thinking the Black Dragon would restore what the Red Dragon had taken from House Osgrey, and how it killed them. All I can do is stand in stunned silence as I learn that my liege was a traitor. [rohanne.GetSheHe|U] breaks me free of my stupor \"Leave here, Ser, and know that I will defend my lands, and my moat, with #italic fire and sword!#!\""
 agot_scenario_ats.3031.desc.tookbennis:0 "Lady [rohanne.GetFirstName] did not take kindly to my offer, having taken Bennis, and keeping her dam. Without that water, the lands held by Ser [eustace.GetFirstName] will wither and [eustace.GetHerHis] people will die.\n\nRemembering a story Ser [eustace.GetFirstNameNoTooltip] told me, of [eustace.GetHerHis] son [addam.GetFirstName] and his long friendship with Lady [rohanne.GetFirstNameNoTooltip], I try to plead with [rohanne.GetHerHim] by invoking his memory — and the bond they shared.\n\n[rohanne.GetHerHis|U] face contorts with rage, and before I can react [rohanne.GetHerHis] hand shoots out like an arrow, striking my cheek and sending stings of pain across my face. [rohanne.GetSheHe|U] tells me of how Ser [eustace.GetFirstNameNoTooltip] brought [eustace.GetHerHis] own sons to war, thinking the Black Dragon would restore what the Red Dragon had taken from House Osgrey, and how it killed them. All I can do is stand in stunned silence as I learn that my liege was a traitor. [rohanne.GetSheHe|U] breaks me free of my stupor \"Leave here, Ser, and know that I will defend my lands, and my moat, with #italic fire and sword!#!\""
 agot_scenario_ats.3031.a:0 "I fear what will come of the Widow's rage."
 agot_scenario_ats.3031.a.tt:0 "You will wait to see what happens next"
 agot_scenario_ats.4010.t:0 "A Burning Sky"
 agot_scenario_ats.4010.desc:0 "Raised voices and bright light rouse me from sleep. I step out and past a gathering of castle guards to see what seems like the rising sun in the east. Billowing smoke and roaring flames disprove that in an instant.\n\nWat's Wood is afire, and if the wind shifts, our fields will not be far behind."
 agot_scenario_ats.4010.a:0 "I'll be blamed for this."
 agot_scenario_ats.4010.a.tt:0 "You'll be expected to meet at the river, as Standfast will blame you"
 agot_scenario_ats.4020.t:0 "The Guilty Lion"
 agot_scenario_ats.4020.desc:0 "I hear [dunk.GetTitledFirstNamePossessive] horse approach Standfast as I stand waiting by the fire. I can tell by the frustration in [dunk.GetHerHis] breaths and the stomp of [dunk.GetHerHis] feet that it did not go well. [dunk.GetSheHe|U] reaches the top of the stairs, and within moments accuses me of treason.\n\n\"You said you fought for the king!\" [dunk.GetSheHe] exclaims. \"So, I did; I fought for the King Who Bore the Sword.\" My reply leaves me feeling the rush of heartbreak. #italic If only Fireball had lived, if only Daemon had run down Gwayne Corbray, if only he'd taken the Weeping Ridge, if only my sons...#!\n\nIt's too late now though, and there's little I can do to stop [dunk.GetTitledFirstNameNoTooltip] from storming out of the room and down the stairs, leaving me alone with my relics once more."
 agot_scenario_ats.4020.a:0 "If only..."
 agot_scenario_ats.4020.a.tt:0 "You'll rest for the night"
 agot_scenario_ats.4021.t:0 "A Burning Sky"
 agot_scenario_ats.4021.desc:0 "After the Red Widow's rejection of my earlier offer, I rode home in melancholic silence, heading straight to my chambers in the hopes of forgetting the prior day's humiliations. Long into the night's rest, the harsh orange-red light of dawn raises me from my slumber. I wipe the weariness from my eyes, pushing aside the ancient goblet I'd been drinking from last night. I peek through the eastern window, finding the dark blue of night greeting me. In confusion I turn back to the rising sun and realize it's no sun at all.\n\nCurling smoke and raging flames envelop Wat's Wood, servants at the base of Standfast rushing to get water from the wells should the fire spread. In an instant I know; the Red Widow did this.\n\nNow I have no choice but to fight or meet on the field for terms. There can be no middle ground."
 agot_scenario_ats.4021.a:0 "Soon we'll ride... one way or another."
 agot_scenario_ats.4021.a.tt:0 "You'll decide how to proceed soon"
 agot_scenario_ats.4030.t:0 "The Lies of the Lion"
 agot_scenario_ats.4030.desc:0 "The return ride from Coldmoat is a silent one. I spend it in a rage, distraught that the liege I serve fought for the Black Dragon. Ser [eustace.GetFirstName] had always said [eustace.GetSheHe]'d served the King. He never said which one. Egg feels much the same; [egg.GetHerHis] own father had helped break the Black Dragon's army at the Redgrass Field, only to serve one of his knights. #italic Dunk the Lunk, thick as a castle wall...#!\n\nUpon our arrival I order Egg to tend to the horses and stomp my way to the top of the tower, confronting Ser [eustace.GetFirstNameNoTooltip] in a huff and a rage. \"You're a traitor,\" I say with confidence, but I am reminded things are rarely so simple.\n\n\"If the Black Dragon had won, we would be called loyalists, and Daeron the Falseborn's supporters the traitors,\" [eustace.GetFirstNameNoTooltip] points out. Now I must choose: to stay with a traitor and see this through, or return to the hedges."
 agot_scenario_ats.4030.a:0 "We have to leave; I cannot serve a traitor."
 agot_scenario_ats.4030.a.tt:0 "You will plan on leaving as soon as you're able"
 agot_scenario_ats.4030.b:0 "Black Dragon or Red, I swore to serve."
 agot_scenario_ats.4030.b.tt:0 "You will decide to stay at Standfast"
 agot_scenario_ats.4031.t:0 "A Burning Sky"
 agot_scenario_ats.4031.desc:0 "As I rest in the cellar beneath Coldmoat, a pleasant dream on my mind, a sudden commotion forces me to shoot awake. Egg is already waiting, and we both storm up the stairs following the short train of servants and local peasant levies up and out to the yard.\n\nA raging fire engulfs the sky as Wat's Wood burns, the drought having dried the trees and wild grasses and spreading it beyond a normal wildfire. Everyone rushes to the well, gathering buckets and preparing to fight back the flames.\n\nBy morning, the wood is scorched and ruined, and many crops are lost."
 agot_scenario_ats.4031.a:0 "Fire and sword... I have to stay."
 agot_scenario_ats.4031.a.tt:0 "You'll stay to see this through"
 agot_scenario_ats.4031.b:0 "This changes nothing, I have to stay."
 agot_scenario_ats.4031.b.tt:0 "You'll stay to see this through"
 agot_scenario_ats.4031.c:0 "I will not serve this traitor."
 agot_scenario_ats.4031.c.tt:0 "You'll leave the conflict behind"
 agot_scenario_ats.4031.d:0 "This will mean a confrontation, either of armies or knights."
 agot_scenario_ats.4031.d.tt:0 "You must be ready to fight"
 agot_scenario_ats.5010.t:0 "Among the Ashes"
 agot_scenario_ats.5010.desc.dunkstayed:0 "My scouts report that Ser [eustace.GetFirstName] gathers [eustace.GetHerHis] troops and hedge knights in the wake of the fire at Wat's Wood. I have two roads before me: to march my way to Standfast and make war; or meet them at the stream between us and agree to a parley.\n\nThere's little honor in making war now, but I could seize Standfast before [eustace.GetSheHe] has time to react.\n\nA parley would offer me the chance for a trial by combat, and potentially the removal of the Longinch, especially if [dunk.GetTitledFirstNameNicknamed] is willing to duel. In either case, my knights await my decision."
 agot_scenario_ats.5010.desc.dunkleft:0 "My scouts report that Ser [eustace.GetFirstName] gathers [eustace.GetHerHis] troops and hedge knights in the wake of the fire at [wats_wood]. I have two roads before me: to march my way to Standfast and make war, or meet them at the stream between us and agree to a parley.\n\nThere's little honor in making war now, but I could seize Standfast before [eustace.GetSheHe] has time to react.\n\nA parley would offer me the chance for a trial by combat, and potentially the removal of the Longinch. In either case, my knights await my decision."
 agot_scenario_ats.5010.a:0 "We ride for the stream!"
 agot_scenario_ats.5010.a.tt:0 "You'll meet Ser [eustace.GetFirstNameNoTooltip] and [dunk.GetTitledFirstNameNoTooltip]"
 agot_scenario_ats.5010.b:0 "We ride to war! With fire and sword!"
 agot_scenario_ats.5010.c:0 "We ride for the stream!"
 agot_scenario_ats.5010.c.tt:0 "You'll meet Ser [eustace.GetFirstNameNoTooltip]"
 agot_scenario_ats.5011.t:0 "The Parley"
 agot_scenario_ats.5011.desc:0 "[longinch.GetFirstNameNicknamed], my knights, and I arrive to see [dunk.GetTitledFirstNameNicknamed] and Ser [eustace.GetFirstName] waiting across the stream. Ser [eustace.GetFirstNameNoTooltip] wastes no time in laying the fire of Wat's Wood at my feet. \"Look at my fields, how dry they are; I would've been a fool to set that fire,\" I reply, though [eustace.GetSheHe] will have none of it. To [eustace.GetHerHim], I am the wicked Red Widow of Coldmoat, caster of evil spells.\n\n[dunk.GetTitledFirstNameNoTooltip] beckons me closer, and we meet in the midst of the stream where none but us will hear. [dunk.GetSheHe|U] draws out a small ring bearing a seal: four quartered dragons breathing fire, each with three heads. The seal of [maekar.GetTitledFirstName] of Summerhall. [dunk.GetFirstNamePossessiveNoTooltip] squire is the prince's son, and to crush them now might incur his wrath — and I would rather be a dragon's friend. Still, I cannot give in so easily or my enemies will think me weak, and I have been accused of a heinous crime besides.\n\nWIth the sound of the stream claiming my hearing, I glance back at [longinch.GetFirstName], and realize this could be my chance. A trial by combat to prove me innocent of the fire."
 agot_scenario_ats.5011.a:0 "I demand a trial by combat! [longinch.GetFirstNameNoTooltip] will be my champion!"
 agot_scenario_ats.5011.a.tt:0 "You will demand a trial by combat from Eustace"
 agot_scenario_ats.5011.b:0 "There'll be no trial, to war!"
 agot_scenario_ats.5011.c:0 "I admit my guilt, and I'll remove the dam."
 agot_scenario_ats.5011.c.tt:0 "You'll give in, and may look weak"
 agot_scenario_ats.5012.t:0 "The Parley"
 agot_scenario_ats.5012.desc:0 "When my knights and I arrive at the stream, we see Ser [eustace.GetFirstName] waiting across the stream, alone but for a few barely armed peasants. \"I know you set the fire, witch! With some dark spell!\" [eustace.GetSheHe] shouts over the sound of the water.\n\n\"Look at my fields, how dry they are; I would've been a fool to set that fire,\" I reply, though [eustace.GetFirstNameNoTooltip] will have none of it. To [eustace.GetHerHim], I am the wicked Red Widow of Coldmoat, caster of evil spells.\n\nSer [eustace.GetFirstNameNoTooltip] draws [eustace.GetHerHis] sword, waiting for us to cross. I could march with my army, and there would be little chance Standfast could hold, though I would dishonor my childhood friend... my sweet [addam.GetFirstName].\n\nI glance over at [longinch.GetFirstNameNicknamed], and a plan begins to form. I could avoid a battle by demanding a trial by combat for the crimes laid at my feet. A flurry of thoughts rush through my head...\n\nA battle would be quicker, but bloodier. My champion may win the duel, and I'd gain nothing but an old tower. Then again, perhaps I should give in, and we would once again split the water in this time of drought. #italic Whatever the choice, this must be decided #bold now#!.#!"
 agot_scenario_ats.5012.a:0 "I demand a trial by combat! Ser [longinch.GetFirstNameNoTooltip] will be my champion!"
 agot_scenario_ats.5012.a.tt:0 "You will demand a trial by combat from Eustace"
 agot_scenario_ats.5012.b:0 "There'll be no trial, to war!"
 agot_scenario_ats.5012.c:0 "I admit my guilt, and I'll remove the dam."
 agot_scenario_ats.5012.c.tt:0 "You'll give in, and may look weak"
 agot_scenario_ats.5013.t:0 "The Lion's Rage"
 agot_scenario_ats.5013.desc:0 "Despite my attempts at patience and reason, Ser [eustace.GetFirstName] has insisted upon taking up arms against me. Unfortunately for [eustace.GetHerHim], I will no longer come just for water — I shall lay low what little is left of House Osgrey!\n\nHouse Webber will wipe the Chequy stain from the Reach a final time."
 agot_scenario_ats.5013.desc.eustacerefused:0 "Ser [eustace.GetFirstName] has refused the demand of trial by combat, and insisted upon taking up arms against me. Unfortunately for [eustace.GetHerHim] I will no longer come just for water — I shall lay low what little is left of House Osgrey.\n\nHouse Webber will wipe the Chequy stain from the Reach a final time."
 agot_scenario_ats.5013.a:0 "With fire and sword! To war!"
 agot_scenario_ats.5013.a.tt:0 "You will fight a war with Eustace"
 agot_scenario_ats.5014.t:0 "A Trial of Blood"
 agot_scenario_ats.5014.desc:0 "Ser [eustace.GetFirstName] has sent a demand: a trial by combat. Should my champion lose, I will remove the dam on the Chequy Water, and be called guilty for the fire in Wat's Wood.\n\nThere is little choice now but to accept."
 agot_scenario_ats.5014.a:0 "[longinch.GetFirstNameNicknamed] shall be my champion."
 agot_scenario_ats.5014.a.tt:0 "The Longinch will take part in a trial by combat"
 agot_scenario_ats.5020.t:0 "Among the Ashes"
 agot_scenario_ats.5020.desc.dunkstayed:0 "Much of Wat's Wood has burned to cinders, and without rain it will be long before it's restored. I am nearly certain that it was the Red Widow of Coldmoat who did this, using some infernal spell to take advantage of the long drought. [rohanne.GetSheHe|U] will be marching for my lands now, leaving me only two choices:\n\nI can march for war — with no allies and few troops at my command — and hope that the chequy lion still has some bite. Or I can meet, and attempt to parley. [dunk.GetTitledFirstNameNicknamed] believes I should choose the latter, and see what deal can be struck. [dunk.GetSheHe|U] is young, with little knowledge of the true cruelty of the world, but [dunk.GetSheHe] might have a point all the same.\n\nI must choose now though, for a war later would be even less likely to find victory."
 agot_scenario_ats.5020.desc.dunkleft:0 "Much of Wat's Wood has burned to cinders, and without rain it will be long before it's restored. I am nearly certain that it was the Red Widow of Coldmoat who did this, using some infernal spell to take advantage of the long drought. [rohanne.GetSheHe|U] will be marching for my lands now, leaving me only two choices:\n\nI can march for war — with no allies and few troops at my command — and hope that the chequy lion still has some bite. Or I can meet, and attempt to parley. [addam.GetFirstName] would have bid me parley, if only for the friendship he shared with [rohanne.GetHerHim]. Honoring his memory may be the wise choice besides, as perhaps some deal could be struck that might save my lands and what remains of my house.\n\nI must choose now though, for a war later would be even less likely to find victory."
 agot_scenario_ats.5020.a:0 "We'll meet this witch at the stream, and attempt a deal."
 agot_scenario_ats.5020.a.tt:0 "You will meet [rohanne.GetNameNoTooltip] at the Chequy Water"
 agot_scenario_ats.5020.b:0 "I'll show them all the chequy lion still has claws!"
 agot_scenario_ats.5021.t:0 "The Parley"
 agot_scenario_ats.5021.desc:0 "[dunk.GetTitledFirstName] and I have arrived at the shore of the Chequy Water. It is not long before [rohanne.GetTitledFirstName] emerges on the other bank, wearing silk like a spider's and scale armor atop a great black steed. [rohanne.GetHerHis|U] knights surround [rohanne.GetHerHim], seemingly poised for war. Just the sight of the Red Widow has my old blood boiling, and before I can think I am shouting out my accusations.\n\n\"Why would I light a fire so near to my own lands, Ser?\" Before I can parry her retort with one of my own, [dunk.GetTitledFirstNameNicknamed] trots forth, asking to meet with the Red Widow in the center of the stream.\n\nI allow it, in hopes that his head will be cooler than my own. As the two meet amid the stream, I gasp as [dunk.GetTitledFirstNameNoTooltip] draws his knife... then cuts [dunk.GetHerHis] own face with the blade. The two finish their conversation, and my hedge knight returns to me.\n\n[rohanne.GetTitledFirstNameNoTooltip] has requested a trial by combat for my accusations, [dunk.GetSheHe] says, bidding me to choose my champion. This is a chance to resolve the whole conflict without a war, and it could be by mine own hand, though perhaps [dunk.GetTitledFirstNameNoTooltip] would be the better choice."
 agot_scenario_ats.5021.a:0 "[dunk.GetTitledFirstNameNoTooltip] will be my champion."
 agot_scenario_ats.5021.a.tt:0 "You will have [dunk.GetFirstNameNoTooltip] fight the trial by combat"
 agot_scenario_ats.5021.b:0 "I will fight for myself!"
 agot_scenario_ats.5021.b.tt:0 "You will fight in the trial by combat"
 agot_scenario_ats.5021.c:0 "Damn the trial, attack!"
 agot_scenario_ats.5021.c.tt:0 "You will go to war with [rohanne.GetFullNameNoTooltip]"
 agot_scenario_ats.5022.t:0 "The Parley"
 agot_scenario_ats.5022.desc:0 "I have arrived at the shore of the Chequy Water, alone but for a few of my peasant levies. It is not long before [rohanne.GetTitledFirstName] emerges on the other bank, wearing silk like a spider's and scale armor atop a great black steed. [rohanne.GetHerHis|U] knights surround [rohanne.GetHerHim], seemingly poised for war. Just the sight of the Red Widow has my old blood boiling, and before I can think I am shouting out my accusations.\n\n[rohanne.GetTitledFirstNameNoTooltip] denies them, claiming it would make little sense for [rohanne.GetHerHim] to start the fire so near to [rohanne.GetHerHis] own fields, though I have difficulty believing it.\n\nWe spend a short time arguing before we reach the true point of this meeting: [rohanne.GetTitledFirstNameNoTooltip] requests a trial by combat for my accusations, and to resolve the bad blood between us, bidding me to choose my champion. This is a chance to find victory in this feud, and do it by mine own hand. Or I could try to strike with my few troops now, while they don't expect it."
 agot_scenario_ats.5022.a:0 "I'll face your champion!"
 agot_scenario_ats.5022.a.tt:0 "You will fight in a trial by combat"
 agot_scenario_ats.5022.b:0 "Damn the trial, attack!"
 agot_scenario_ats.5022.b.tt:0 "You will go to war with [rohanne.GetFullNameNoTooltip]"
 agot_scenario_ats.5024.t:0 "Fire and Sword"
 agot_scenario_ats.5024.desc:0 "The Red Widow has declared war on me! I doubt our liege will come to my aid, so it falls to me and mine own to defend ourselves.\n\nI will show them all the chequy lion still has claws!"
 agot_scenario_ats.5024.a:0 "To war!"
 agot_scenario_ats.5024.a.tt:0 "A war will start"
 agot_scenario_ats.5025.t:0 "Duel on the Water"
 agot_scenario_ats.5025.desc:0 "[rohanne.GetTitledFirstName] has requested a trial by combat to resolve both the accusations of the Wat's Wood fire, and the feud between us. Though it is difficult to trust [rohanne.GetHerHim], few would willingly defy the god's will in a trial by combat.\n\nSo the decision is left to me: Either I choose a champion, or we draw our swords for war."
 agot_scenario_ats.5025.desc.dunkrefused:0 "Despite [dunk.GetHerHis] oath of service to me, and [dunk.GetHerHis] supposed honor, [dunk.GetSheHe] has refused to fight in my name. I have little choice now; I must either face [rohanne.GetTitledFirstNamePossessive] champion myself, or march to war to gain my satisfaction.\n\nSo, shall I make war on the Red Widow? Or draw my old sword one last time?"
 agot_scenario_ats.5025.a:0 "I will face your champion!"
 agot_scenario_ats.5025.a.tt:0 "You will fight in the trial by combat"
 agot_scenario_ats.5025.b:0 "I will have [dunk.GetTitledFirstNameNoTooltip] fight in my name."
 agot_scenario_ats.5025.b.tt:0 "Dunk will fight in the trial by combat"
 agot_scenario_ats.5025.c:0 "Damn the trial, attack!"
 agot_scenario_ats.5025.c.tt:0 "You will go to war with [rohanne.GetFullNameNoTooltip]"
 agot_scenario_ats.5026.t:0 "A Feud Resolved"
 agot_scenario_ats.5026.desc:0 "A messenger arrives from Coldmoat: [rohanne.GetTitledFirstName] has called for our feud to end, and has taken the step of removing the dam from the Chequy Water. This will save my land from the drought at the risk of [rohanne.GetHerHis] own.\n\nPerhaps I was wrong about the Red Widow, perhaps it's time to leave the past behind. Water will still be scarce, even moreso for [rohanne.GetTitledFirstNameNoTooltip] without the dam to hoard it, but this has improved our chances greatly."
 agot_scenario_ats.5026.a:0 "My Chequy Water is back."
 agot_scenario_ats.5026.a.tt:0 "The dam is removed, though water is still scarce"
 agot_scenario_ats.5030.t:0 "The Parley"
 agot_scenario_ats.5030.desc:0 "Our meager entourage arrives at the stream, only to find no one waiting there. I glance at Egg, but the boy has kept his head down all morning. #italic I'd do so too, if in his position.#!\n\nNot long after, [rohanne.GetTitledFirstName] arrives with [rohanne.GetHerHis] knights in tow. Ser [eustace.GetFirstNameNoTooltip] takes little time before shouting his accusations, though the Red Widow denies any involvement in the ruinous fire. Before things can escalate further, I spur my steed forward, calling for [rohanne.GetFirstNameNoTooltip] to meet me in the stream alone. Knights and levies alike exchange confused glances as I splash forward into the Chequy Water.\n\nOnce [rohanne.GetSheHe] reaches me at the center of the stream, I show [rohanne.GetHerHim] the ring with the seal of Egg's father. Few would trifle with the son of a Targaryen prince, after all. Though [rohanne.GetSheHe] understands the gravity of the ring, [rohanne.GetSheHe] also cannot afford to look weak.\n\nI move quickly to draw my dagger from its sheath, running it cleanly against the surface of my cheek. Blood drips down into the stream below, but [rohanne.GetTitledFirstNamePossessiveNoTooltip] face tells me I have impressed [rohanne.GetHerHim] and made up for the injury of the peasant.\n\nNow we must deal with the accusations: [rohanne.GetSheHe|U] offers a trial by combat with a smug glance toward Ser [longinch.GetFirstNameNicknamed]."
 agot_scenario_ats.5030.a:0 "We accept, and I will fight as Ser [eustace.GetFirstNamePossessiveNoTooltip] champion!"
 agot_scenario_ats.5030.a.tt:0 "You will fight in the trial by combat"
 agot_scenario_ats.5030.b:0 "I must leave the decision to Ser [eustace.GetFirstNameNoTooltip]."
 agot_scenario_ats.5030.b.tt:0 "You will let [eustace.GetFirstNameNoTooltip] decide"
 agot_scenario_ats.5031.t:0 "Duel on the Water"
 agot_scenario_ats.5031.desc:0 "There is to be a trial by combat in the stream, a duel between knights to decide the end to this feud. I must decide whether I will agree to fight in the name of Ser [eustace.GetFirstName], or leave it to [eustace.GetHerHim] to fight for [eustace.GetHerselfHimself] against whichever champion [rohanne.GetTitledFirstName] chooses."
 agot_scenario_ats.5031.a:0 "I will stand as your champion."
 agot_scenario_ats.5031.a.tt:0 "You will fight in the trial by combat"
 agot_scenario_ats.5031.b:0 "The chequy lion should fight his own battles."
 agot_scenario_ats.5031.b.tt:0 "You will refuse to fight in the trial by combat"
 agot_scenario_ats.5032.t:0 "Duel on the Water"
 agot_scenario_ats.5032.desc:0 "Despite [eustace.GetHerHis] age, and my oath of service, Ser [eustace.GetFirstName] has chosen to fight as [eustace.GetHerHis] own champion in the coming trial by combat.\n\nAll I can do now is watch, and hope my [eustace.GetLadyLord] emerges victorious from the stream."
 agot_scenario_ats.5032.a:0 "I'll watch the duel."
 agot_scenario_ats.5032.a.tt:0 "You'll be notified of the duel's result."
 agot_scenario_ats.6010.t:0 "Blood in the Water"
 agot_scenario_ats.6010.desc:0 "[dunk.GetTitledFirstNameNicknamed] and Ser [longinch.GetFirstNameNicknamed] lay limp in the water, blood pouring from a wound just beneath the Longinch's arm. [dunk.GetTitledFirstNameNoTooltip] has won, though [dunk.GetSheHe]'s found [dunk.GetHerHis] lungs full of water for the trouble.\n\nThough being found guilty of burning Wat's Wood is a problem, it pales in comparison to removing the Longinch and freeing myself.\n\nWe all wait for [dunk.GetTitledFirstNameNoTooltip] to rise from the water, but there's been little movement. My maester rushes forward, an Ironborn with experience saving the drowned."
 agot_scenario_ats.6010.a:0 "[dunk.GetSheHe|U] will heal at Coldmoat!"
 agot_scenario_ats.6010.a.tt:0 "You may now choose a husband for yourself"
 agot_scenario_ats.6011.t:0 "Blood in the Water"
 agot_scenario_ats.6011.desc:0 "Ser [longinch.GetFirstNameNicknamed] clambers out of the stream, gasping for air as the limp body of Ser [longinch_opponent.GetFirstNameNicknamed] floats bloody and broken atop the water. I have no love for the Longinch — I even hoped [longinch.GetSheHe] might die in this duel — but at least now the way is cleared for me to take Standfast.\n\nThere is little left to stop me, and I would have the support of my liege. All that's left is to ride over and take it."
 agot_scenario_ats.6011.a:0 "Send the demand to Ser [eustace.GetFirstNameNoTooltip], Standfast is mine."
 agot_scenario_ats.6011.a.tt:0 "You will demand Standfast, though [eustace.GetFirstName] may refuse"
 agot_scenario_ats.6011.b:0 "Standfast is mine."
 agot_scenario_ats.6011.b.tt:0 "You will become the new liege of Standfast"
 eustace_gave_up_standfast:0 "Ser [eustace.GetFirstName] has given up Standfast to me!"
 agot_scenario_ats.6012.t:0 "Blood in the Water"
 agot_scenario_ats.6012.desc:0 "Ser [eustace.GetFirstName] clambers out of the stream, gasping for air as the limp body of the [longinch.GetName] fills the stream with blood. I am guilty in the eyes of gods and men of setting the fire at Wat's Wood, be it true or no.\n\nSer [eustace.GetFirstNameNoTooltip] will almost certainly demand I remove the dam now, and I'll have little choice, though at least with Ser [longinch.GetFirstName] dead my father's will is much less a concern."
 agot_scenario_ats.6012.a:0 "We'll see what [eustace.GetFirstNameNoTooltip] actually demands."
 agot_scenario_ats.6012.a.tt:0 "You will hear Eustace's demands"
 agot_scenario_ats.6013.t:0 "Blood in the Water"
 agot_scenario_ats.6013.desc:0 "The lifeless bodies of [dunk.GetTitledFirstNameNicknamed] and Ser [longinch.GetFirstNameNicknamed] hang in the shallow waters of the stream, blood seeping from numerous wounds and blending with the murky waters. My guilt has not been proven, nor my innocence, but the matter is as settled as it can be now.\n\nWith the Longinch gone I will be free to choose my own husband, and without proof before gods and men Ser [eustace.GetFirstName] will find it difficult to accuse me of the Wat's Wood fire.\n\nNow all that's left is to resolve my father's will, and move on."
 agot_scenario_ats.6013.a:0 "A tragic but necessary end."
 agot_scenario_ats.6013.a.tt:0 "You will move on to choosing a husband"
 agot_scenario_ats.6014.t:0 "The Demand"
 agot_scenario_ats.6014.desc:0 "In the wake of my champion's loss in the trial by combat at the stream, Ser [eustace.GetFirstName] has sent a demand to remove the dam. To do this, even now, might still make me look weak. Beyond that, it would spread out our water supply in a time of drought.\n\nTo refuse this demand, I will essentially be declaring war, so I must consider my next course carefully."
 agot_scenario_ats.6014.a:0 "Fine, I'll remove the dam."
 agot_scenario_ats.6014.a.tt:0 "You will remove the dam, and look weak"
 agot_scenario_ats.6014.b:0 "I will look treasonous before I look weak!"
 agot_scenario_ats.6020.t:0 "Blood in the Water"
 agot_scenario_ats.6020.desc:0 "[dunk.GetTitledFirstNameNicknamed] and Ser [longinch.GetFirstNameNicknamed] lay limp in the water, blood pouring from a wound just beneath the Longinch's arm. [dunk.GetTitledFirstNameNoTooltip] has won, though [dunk.GetSheHe]'s found [dunk.GetHerHis] lungs full of water for the trouble.\n\nWith [rohanne.GetTitledFirstName] now found guilty of the fire at Wat's Wood, I have the leverage I need to demand the dam come down and let my Chequy Water flow again!"
 agot_scenario_ats.6020.a:0 "Time to send my demand, the dam must come down!"
 agot_scenario_ats.6020.a.tt:0 "You will demand that [rohanne.GetFullNameNoTooltip] bring the dam down"
 agot_scenario_ats.6021.t:0 "Blood in the Water"
 agot_scenario_ats.6021.desc:0 "Ser [longinch.GetFirstNameNicknamed] clambers free from the stream, leaving the limp body of [dunk.GetTitledFirstNameNicknamed] bleeding in the stream behind him. I feel involuntary tears work their way down my cheeks; I had told the lad that if my daughter were still alive I'd have liked her to marry [dunk.GetHerHim], and now [dunk.GetSheHe] is with her and the rest of my House in the afterlife. Egg, the young squire, is weeping beside me as [rohanne.GetTitledFirstName] hangs a long look on the body of the gallant knight.\n\n[rohanne.GetSheHe|U] is free of my charges now, and in a strong position to take my land if it pleases [rohanne.GetHerHim]. I'll have to hope the demand does not come, or rely on my strength of arms to deal with it."
 agot_scenario_ats.6021.a:0 "Goodbye, [dunk.GetTitledFirstNameNoTooltip]..."
 agot_scenario_ats.6021.a.tt:0 "You will wait for what comes next"
 agot_scenario_ats.6022.t:0 "Blood in the Water"
 agot_scenario_ats.6022.desc:0 "I grasp at the banks of the stream, pulling myself free from the water and ripping my helmet off of my head. I see the bloody corpse of Ser [longinch.GetFirstNameNicknamed] floating in the shallow water, blood pouring from the wound to the armpit that ended our duel.\n\n[rohanne.GetTitledFirstName] watches on as the body is pulled from the stream, and we go our separate ways. With my charges proven before gods and men, I can now make the demand for the dam to be removed and the water to flow back to my lands without delay!"
 agot_scenario_ats.6022.a:0 "Remove that dam!"
 agot_scenario_ats.6022.a.tt:0 "You'll demand the dam be removed from the Chequy Water"
 agot_scenario_ats.6023.t:0 "Blood in the Water"
 agot_scenario_ats.6023.desc:0 "Both [dunk.GetTitledFirstNameNicknamed] and Ser [longinch.GetFirstNameNicknamed] float in the stream, bloody and broken. [rohanne.GetTitledFirstName] has the body of Ser [longinch.GetFirstNameNoTooltip] retrieved by [rohanne.GetHerHis] men, nodding to me as the squire Egg helps me collect [dunk.GetTitledFirstNameNoTooltip].\n\nWe each sought to prove our claims in this trial by combat — and now two knights are dead, and nothing has been made any more true in the eyes of gods and men. Without proof I cannot accuse [rohanne.GetTitledFirstNameNoTooltip] of anything, and the suspicion will surely prevent [rohanne.GetHerHim] from moving against me now."
 agot_scenario_ats.6023.a:0 "What a waste of a good knight..."
 agot_scenario_ats.6023.a.tt:0 "You will return to Standfast"
 agot_scenario_ats.6024.t:0 "Venom and Claws"
 agot_scenario_ats.6024.desc:0 "Despite [rohanne.GetHerHis] defeat in the trial by combat, [rohanne.GetTitledFirstName] has not only refused my demand for the dam on the Chequy Water to be removed, but laid claim to my remaining lands and marched with an army to take them.\n\nAll that is left to do now is to prove that I still have claws on the field of battle, and to make war on this Red Widow until one of us knows the sting of defeat!"
 agot_scenario_ats.6024.a:0 "This Lion will bear its claws!"
 agot_scenario_ats.6024.a.tt:0 "You will fight [rohanne.GetFullNameNoTooltip] in a war for [rohanne.GetHerHis] claim on your lands"
 agot_scenario_ats.6025.t:0 "A Tower Besieged"
 agot_scenario_ats.6025.desc:0 "With my defeat in the trial by combat, and the loss of what remains of my dignity, I am forced to consider [rohanne.GetTitledFirstNamePossessive] demand for Standfast. I could fight for the last vestige of my House's ancient right to this land, and likely die in the attempt to keep it, taking what might be hundreds of my own people with me.\n\nPerhaps it would be better, then, to do what I ought to have done when we lost on the Redgrass Field, leave for the sellsword's life as [bittercringe.GetNickname] did. Perhaps I might even join [bittercringe.GetHerHis] band — if one has formed — and take up arms with the remaining Black Dragons as I once did with Daemon.\n\nThe decision must be made now: Fight for the past, or leave for a new future?"
 agot_scenario_ats.6025.a:0 "I'll not give up my ancestor's bones just yet!"
 agot_scenario_ats.6025.a.tt:0 "You will fight a war for Standfast"
 agot_scenario_ats.6025.b:0 "Keep this old tower, I will find a new path."
 agot_scenario_ats.6025.b.tt:0 "You will become a landless adventurer"
 agot_scenario_ats.6030.t:0 "A Painful Victory"
 agot_scenario_ats.6030.desc:0 "I wake in the wrong castle, a cut scarring across my face and bruised and broken bones across my body. I won the trial by combat, and it's expected that peace can be negotiated. A maester cares for me as my wounds heal, and informs me that Ser [eustace.GetFirstName] and [rohanne.GetTitledFirstName] are amid those very negotiations, and that once I am recovered I will be free to go where I please. As the days go by [rohanne.GetTitledFirstNameNoTooltip] seemingly avoids visiting me, as I never see [rohanne.GetHerHim] throughout my entire stay.\n\nMy bitterness grows even as Egg remains stalwart by my side, aiding in my recovery wherever possible. All of that pain, all of that fighting and back and forth just to reach a settlement easily obtained with a single meeting.\n\nWhatever comes of these negotiations, I know I must teach Egg the value of smallfolk, that they are not merely pieces to be used in the games of nobles, and that pride is not a good enough excuse for so much hardship."
 agot_scenario_ats.6030.a:0 "We'll wait for the negotiations, and then move on."
 agot_scenario_ats.6030.a.tt:0 "You wait to see if a war breaks out, or a peace is brokered"
 agot_scenario_ats.6031.t:0 "Blood in the Water"
 agot_scenario_ats.6031.desc:0 "Ser [eustace.GetFirstNameNicknamed] clambers up and onto the stream, reveling in [eustace.GetHerHis] victory as the body of [eustace.GetHerHis] opponent bleeds into the water behind [eustace.GetHerHim]. [eustace.GetSheHe|U] smiles at me, then lets out a sigh of relief, knowing that the Chequy Water will soon flow freely once more.\n\nWith a final, longing glance toward [rohanne.GetTitledFirstName], I leave the stream behind, and return to Standfast."
 agot_scenario_ats.6031.a:0 "The dam is sure to come down now."
 agot_scenario_ats.6031.a.tt:0 "You will wait to see if [rohanne.GetTitledFirstNameNoTooltip] will accept the outcome of the duel"
 agot_scenario_ats.6032.t:0 "Blood in the Water"
 agot_scenario_ats.6032.desc:0 "Ser [longinch.GetFirstNameNicknamed] clambers free from the stream, leaving the limp body of Ser [eustace.GetFirstNameNicknamed] bleeding in the water behind [longinch.GetHerHim]. I feel guilt tear through my heart as the body laps against the stream's edge. I turn to look across the water at [rohanne.GetTitledFirstName], expecting to see a satisfied smile across [rohanne.GetHerHis] pretty features. Instead, I see melancholy, and perhaps even sorrow.\n\n[rohanne.GetSheHe|U] is now free of all charges, and to take the last of the chequy lion's lands. As Egg and I leave the water behind, returning to Standfast, I find tears working their way down my face at the death of the old knight."
 agot_scenario_ats.6032.a:0 "Goodbye, Ser [eustace.GetFirstNameNoTooltip]..."
 agot_scenario_ats.6032.a.tt:0 "You will wait for what comes next"
 agot_scenario_ats.7010.t:0 "Summer Roses"
 agot_scenario_ats.7010.desc.start:0 "With the recent hostilities left behind me, and my father's will looming ahead, it's time to find another husband.\n\n"
 agot_scenario_ats.7010.desc.e:0 "Ser [eustace.GetFirstName] presents an opportunity to unite our claims on Coldmoat, save [eustace.GetHerHis] pride, and secure for me a husband with little interest in ruling my lands, who will die long before I. It would not be a marriage of love, but it would be good local politics."
 agot_scenario_ats.7010.desc.d:0 "[dunk.GetTitledFirstName] is tall, handsome, and likeable, with an endearing sense of honor and willingness to put [dunk.GetHerselfHimself] in harm's way in its name. It would not be a politically advantageous marriage, but it may be a happy one."
 agot_scenario_ats.7010.desc.g:0 "Ser [gerold.GetNameNicknamed] is a strong candidate. [gerold.GetSheHe|U] sends me letters frequently, which I have come to enjoy, and besides [gerold.GetSheHe] is the highly capable and influential brother of the wealthiest lord in the realm. I have my doubts as to whether [gerold.GetSheHe] would be satisfied with a life in Coldmoat far from the Lion's court, and so the marriage would not be without risk."
 agot_scenario_ats.7010.desc.l:0 "Ser [longinch.GetFirstNameNicknamed] is a despicable man with little joy and cruel wit. If I could've arranged [longinch.GetHerHis] death I might've, yet [longinch.GetSheHe] was whom my father wished for me to marry, so I must consider [longinch.GetHerHim] nonetheless."
 agot_scenario_ats.7010.desc.ed:0 "Ser [eustace.GetFirstName] presents an opportunity to unite our claims on Coldmoat, save [eustace.GetHerHis] pride, and secure for me a husband with little interest in ruling my lands, who will die long before I. Though I must also consider my personal happiness, and to that end I look to [dunk.GetTitledFirstName], a handsome and gallant knight I have found some affection for in the short time we have known one another, and who would also leave me to rule my own lands as I see fit."
 agot_scenario_ats.7010.desc.eg:0 "Ser [eustace.GetFirstName] presents an opportunity to unite our claims on Coldmoat, save [eustace.GetHerHis] pride, and secure for me a husband with little interest in ruling my lands, who will die long before I. However, I must consider an even more politically advantageous marriage. Ser [gerold.GetNameNicknamed] sends me letters often, which I have come to enjoy, and is a scion of the wealthiest House in Westeros. Though [gerold.GetSheHe] might find little joy in Coldmoat, and so is a risk to marry, it cannot go unconsidered."
 agot_scenario_ats.7010.desc.el:0 "Ser [eustace.GetFirstName] presents an opportunity to unite our claims on Coldmoat, save [eustace.GetHerHis] pride, and secure for me a husband with little interest in ruling my lands, who will die long before I. Then there is Ser [longinch.GetFirstNameNicknamed], a despicable man with little joy and cruel wit. If I could've arranged [longinch.GetHerHis] death I might've, yet [longinch.GetSheHe] was whom my father wished for me to marry, so I must consider [longinch.GetHerHim] nonetheless."
 agot_scenario_ats.7010.desc.edg:0 "Ser [eustace.GetFirstName] presents an opportunity to unite our claims on Coldmoat, save [eustace.GetHerHis] pride, and secure for me a husband with little interest in ruling my lands, who will die long before I. However, when I consider my own happiness, two other candidates come to the fore. [dunk.GetTitledFirstName] is tall, handsome, and I have found affection for [dunk.GetHerHim] in the short time we've known one another. On the other hand there is Ser [gerold.GetNameNicknamed], who sends me sweet letters daily, and who comes from the wealthiest House in Westeros. Any of these might make a fitting husband; I need only ask."
 agot_scenario_ats.7010.desc.edl:0 "Ser [eustace.GetFirstName] presents an opportunity to unite our claims on Coldmoat, save [eustace.GetHerHis] pride, and secure for me a husband with little interest in ruling my lands, who will die long before I. Still, I must also consider my personal happiness, and to that end I look to [dunk.GetTitledFirstName], a handsome and gallant knight I have found some affection for in the short time we have known one another, and who would also leave me to rule my own lands as I see fit. Finally I must consider Ser [longinch.GetNameNicknamed], if only because my father expected that we would be wed despite how little I like the man."
 agot_scenario_ats.7010.desc.egl:0 "Ser [eustace.GetFirstName] presents an opportunity to unite our claims on Coldmoat, save [eustace.GetHerHis] pride, and secure for me a husband with little interest in ruling my lands, who will die long before I. Another lion comes to mind though, as Ser [gerold.GetNameNicknamed] is a strong candidate. [gerold.GetSheHe|U] sends me letters frequently, which I have come to enjoy, and beyond that [gerold.GetSheHe] is the brother of the wealthiest lord in the realm. Finally I must consider Ser [longinch.GetNameNicknamed], if only because my father expected that we would be wed despite how little I like the man."
 agot_scenario_ats.7010.desc.edgl:0 "Four choices come to mind as I consider my options. Ser [eustace.GetFirstName] presents stability, uniting our claims on Coldmoat, and advantages in local politics. [dunk.GetTitledFirstName] is gallant and handsome, and my affection for [dunk.GetHerHim] surprises even me, though there is little to be gained in such a match... it might be a happy one. Ser [gerold.GetNameNicknamed] is a strong choice, as [gerold.GetHerHis] letters have been a source of comfort to me of late, and the strength and wealth of House Lannister cannot be matched. Finally, I must consider Ser [longinch.GetNameNicknamed], a despicable man who I only consider because my father thought we ought to marry."
 agot_scenario_ats.7010.desc.dg:0 "Two potential suitors come to mind. [dunk.GetTitledFirstName] is an honest and gallant knight, and my affection for [dunk.GetHerHim] has grown quickly in the short time we have known each other. There would be little political advantage in such a match, but it could be a happy one. The other is Ser [gerold.GetNameNicknamed] whose letters I have come to look forward to. [gerold.GetSheHe|U] is also a member of the wealthiest House in the realm, and would make a fine political match, though I doubt [gerold.GetSheHe] would be satisfied by a life at Coldmoat so far from the Lion's court."
 agot_scenario_ats.7010.desc.dgl:0 "Three potential suitors come to mind. [dunk.GetTitledFirstName] is an honest and gallant knight, and my affection for [dunk.GetHerHim] has grown quickly in the short time we have known each other. There would be little political advantage in such a match, but it could be a happy one. The other is Ser [gerold.GetNameNicknamed] whose letters I have come to look forward to. [gerold.GetSheHe|U] is also the member of the wealthiest House in the realm, and would make a fine political match, though I doubt [gerold.GetSheHe] would be satisfied by a life at Coldmoat so far from the Lion's court. Finally, I must consider Ser [longinch.GetNameNicknamed], a despicable man who I only consider because my father thought we ought to marry."
 agot_scenario_ats.7010.desc.dl:0 "Two potential suitors come to mind. [dunk.GetTitledFirstName] is an honest and gallant knight, and my affection for [dunk.GetHerHim] has grown quickly in the short time we have known each other. There would be little political advantage in such a match, but it could be a happy one. The other is Ser [longinch.GetNameNicknamed], a despicable man who I only consider because my father thought we ought to marry."
 agot_scenario_ats.7010.desc.gl:0 "Two potential suitors come to mind. Ser [gerold.GetNameNicknamed], whose letters I have come to look forward to, and who is the brother of the wealthiest lord in the realm. Though [gerold.GetSheHe] would be a fine choice, I doubt [gerold.GetSheHe] would be satisfied by a life at Coldmoat so far from the Lion's court. The other is Ser [longinch.GetNameNicknamed], a despicable man who I only consider because my father thought we ought to marry."
 agot_scenario_ats.7010.desc.finish:0 "\n\nHow shall I decide?"
 agot_scenario_ats.7010.a:0 "The spider will wed the chequy lion."
 agot_scenario_ats.7010.b:0 "I'll marry [dunk.GetTitledFirstNameNoTooltip], and hope to find happiness."
 agot_scenario_ats.7010.c:0 "I'll hope the golden lion can be satisfied."
 agot_scenario_ats.7010.d:0 "I'll stomach making my father's match."
 agot_scenario_ats.7010.e:0 "I'll find a husband elsewhere, though I must act fast."
 agot_scenario_ats.7010.e.tt:0 "You will search for another spouse, though you will only have six months to do so"
 agot_scenario_ats.7011.t:0 "History Remembers Names"
 agot_scenario_ats.7011.desc:0 "I have received a reply from Ser [eustace.GetFirstName] about my marriage offer. Though [eustace.GetSheHe] expressed interest after we found common grief in the loss of [eustace.GetHerHis] son, [eustace.GetSheHe] will not allow our children to bear the name Webber.\n\nIf I am to marry Ser [eustace.GetFirstNameNoTooltip], it shall have to be in the traditional way, with our potential children bearing the name Osgrey and the chequy lion as their arms.\n\nIf I refuse this request, I shall have to find a husband elsewhere, so what is the name Webber worth?"
 agot_scenario_ats.7011.a:0 "I'll agree to these terms."
 agot_scenario_ats.7011.a.tt:0 "You will marry [eustace.GetNameNoTooltip] non-matrilineally"
 agot_scenario_ats.7011.b:0 "I'll find a better choice elsewhere."
 agot_scenario_ats.7011.b.tt:0 "You will search for a husband freely"
 rohanne_patrimarried_eustace:0 "Lady Rohanne has accepted my proposal of a traditional marriage!"
 agot_scenario_ats.7012.t:0 "A Harsh Refusal"
 agot_scenario_ats.7012.desc:0 "Word has come from Ser [eustace.GetFirstName]: [eustace.GetSheHe|U] has rejected my proposal of marriage and bid me find another elsewhere. \n\nI must return to the search to satisfy my father's will."
 agot_scenario_ats.7012.a:0 "I'll find a better choice elsewhere."
 agot_scenario_ats.7012.a.tt:0 "You will search for a husband freely"
 agot_scenario_ats.7013.t:0 "A Harsh Refusal"
 agot_scenario_ats.7013.desc:0 "I've received word from [dunk.GetTitledFirstName] about my marriage offer. Despite [dunk.GetHerHis] common birth and the height of my own, and even the chance for [dunk.GetHerHis] squire to serve at Coldmoat in the safety of a castle, I have been rejected by the lowly hedge knight.\n\nIt seems I must return to the search, as surprising as that may be."
 agot_scenario_ats.7013.a:0 "I'll find a better choice elsewhere."
 agot_scenario_ats.7013.a.tt:0 "You will search for a husband freely"
 agot_scenario_ats.7020.t:0 "A Surprising Offer"
 agot_scenario_ats.7020.desc:0 "A notice has come from [rohanne.GetTitledFirstName] requesting access to my lands to visit the grave of my son [addam.GetFirstName]. I hardly think before allowing it, and not long thereafter find [rohanne.GetHerHim] weeping beside his grave. Some part of me I long thought dead drives me to comfort [rohanne.GetHerHim], and we soon find ourselves recounting fond memories beside my fire, eating blackberries in remembrance. Not long after her departure, a runner comes bearing an offer of marriage.\n\nI would be a fool not to consider it, as a marriage pact would make me lord of Coldmoat in name, and save my House from extinction, though she wishes for our children to be Webbers, and I must answer with that in mind."
 agot_scenario_ats.7020.a:0 "I'll accept, but only if our children bear the chequy lion."
 agot_scenario_ats.7020.a.tt:0 "You will request a non-matrilineal marriage"
 agot_scenario_ats.7020.b:0 "I accept [rohanne.GetHerHis] terms, our children will be spiders."
 agot_scenario_ats.7020.c:0 "Damn the whole thing, I refuse."
 agot_scenario_ats.7020.c.tt:0 "You refuse the marriage offer"
 agot_scenario_ats.7021.t:0 "A Harsh Rejection"
 agot_scenario_ats.7021.desc:0 "Despite [rohanne.GetTitledFirstNamePossessive] initial interest in a marriage pact between us, it seems the idea of [rohanne.GetHerHis] children bearing the proud chequy lion is a bridge too far! [rohanne.GetSheHe|U] has thus sent a harsh rejection to my request for a traditional marriage, and ended our marriage talks outright.\n\nIt seems the spider and the chequy lion were not fit to be."
 agot_scenario_ats.7021.a:0 "Its best to move on, and find my own wife."
 agot_scenario_ats.7021.a.tt:0 "You will leave the story behind."
 agot_scenario_ats.7031.t:0 "The Red Widow's Offer"
 agot_scenario_ats.7031.desc:0 "A messenger has arrived from [rohanne.GetTitledFirstName]. Breaking the spider seal, I find within an all-too-sweet letter, and an offer of marriage. I can hardly contain my shock as I continue to read. A pretty, highborn [rohanne.GetLadyLord] has chosen me to be [rohanne.GetHerHis] husband? Even going so far as to offer Egg a position amongst the squires of the castle, and me command of the household knights besides.\n\nThis would change it all, I would no longer be a hedge knight — but the lord-consort to the Lady of Coldmoat. Egg could be raised in a proper castle, still learning of the world but from the safety of walls and surrounded by squires his age.\n\nBeyond that, [rohanne.GetTitledFirstNameNoTooltip] is a wife fit for any man. It would be hard, giving up the life in the hedges, but would it be worth a home — and perhaps even love?"
 agot_scenario_ats.7031.b:0 "I'll marry the widow, and leave the hedges behind."
 agot_scenario_ats.7031.b.tt:0 "You will marry [rohanne.GetNameNoTooltip] matrilineally, and switch to [rohanne.GetHerHim]"
 agot_scenario_ats.7031.c:0 "I can't leave the hedges behind, they're all I know."
 agot_scenario_ats.7031.c.tt:0 "You will refuse the offer of marriage"
 agot_scenario_ats.8030.t:0 "Summer Rains and Soft Farewells"
 agot_scenario_ats.8030.desc:0 "As rain finally falls on the Reach, I prepare to leave Coldmoat and the whole affair between it and Standfast behind. I am stopped at the stables by the short frame of [rohanne.GetName]. Though I am dejected after hearing of [rohanne.GetHerHis] impending marriage — and the futility of the conflict from the start — it is nice to see [rohanne.GetTitledFirstNamePossessive] face. [rohanne.GetSheHe|U] apologizes, and seems to struggle between saying something and not as horses shift and adjust themselves in their stables.\n\nEventually, [rohanne.GetSheHe] offers me a position as a household knight, and Egg a position as a squire of the castle, and says [rohanne.GetSheHe] hoped not to lose us to the road.\n\nIt is a tempting offer, but the hedges are all I have ever known, and I have found myself bitter about this place. If I will not accept, [rohanne.GetSheHe] offers to at least give me some sort of gift."
 agot_scenario_ats.8030.a:0 "I'll become your knight."
 agot_scenario_ats.8030.a.tt:0 "You will become a courtier of [rohanne.GetNameNoTooltip], and switch to [rohanne.GetHerHim]"
 agot_scenario_ats.8030.b:0 "I cannot accept, but I would ask for a kiss, and a small gift."
 agot_scenario_ats.8030.b.tt:0 "You will leave with nothing but a few strands of hair"
 agot_scenario_ats.9000.t:0 "The Black Dragon's Birthright"
 agot_scenario_ats.9000.desc:0 "My [ROOT.Char.Custom2('RelationToMeShort', bittercringe)] [bittercringe.GetFirstName] has sent word, [bittercringe.GetSheHe] has summoned all who have been wronged, exiled, and stolen from by the red dragons. They've rallied to [bittercringe.GetHerHim] beneath a golden banner, forming a new company grander than any the Free Cities have yet seen.\n\nSince I earned Blackfyre and gained [bittercringe.GetHerHis] support, [bittercringe.GetSheHe] is ready to make war in my name, and help me claim the Iron Throne from the Usurper [ITRuler.GetFirstName]. Thousands will die, and the realm I hope to rule will bleed if I choose to start this war, but without it the red dragons may never be challenged at all. Whatever my decision, I must make it now.\n\nWill I march for my birthright, or let my people be ruled by the falseborn dragons?"
 agot_scenario_ats.9000.a:0 "We march to war!"
 agot_scenario_ats.9000.b:0 "I must find my own path to power, now is not the time."
 agot_scenario_ats.9010.t:0 "The Last Chequy Lion"
 agot_scenario_ats.9010.desc:0 "With the death of Ser [eustace.GetFirstName], the conflict over the dam is over, and my moat will remain full and ready. There is some sorrow in me watching them bury the last of such a noble line, and the father of a boy I had loved, but I have buried old men before.\n\nNow, despite my heavy heart, I move on to other pursuits."
 agot_scenario_ats.9010.a:0 "A sad end to a sad life."
 agot_scenario_ats.9010.a.tt:0 "You will move on with more vital tasks"
 agot_scenario_ats.9011.t:0 "One Last Chance"
 agot_scenario_ats.9011.desc:0 "My father's will bears down on me like a heavy weight. I must marry within the week, or see my titles taken from me, and my legal heir take hold of my castles. I have sent ravens and riders to see which of the men I had earlier examined remain available, and the choices have been arrayed before me.\n\nWill I finally choose a consort? Or once again tempt fate by taking the search upon myself?"
 agot_scenario_ats.9011.a:0 "The chequy lion might yet marry the spider."
 agot_scenario_ats.9011.a.tt:0 "You will reach out to Ser [eustace.GetFirstNameNoTooltip] about a marriage pact."
 agot_scenario_ats.9011.b:0 "[dunk.GetTitledFirstNameNoTooltip] could yet be my savior."
 agot_scenario_ats.9011.b.tt:0 "You will reach out to [dunk.GetTitledFirstNameNoTooltip] about a marriage pact."
 agot_scenario_ats.9011.c:0 "I could see if [gerold.GetFirstNameNoTooltip] might be satisfied here."
 agot_scenario_ats.9011.c.tt:0 "You will marry Ser [gerold.GetFirstNameNoTooltip]."
 agot_scenario_ats.9011.d:0 "I could stomach a match with Ser [longinch.GetFirstNameNoTooltip]."
 agot_scenario_ats.9011.d.tt:0 "You will marry Ser [longinch.GetFirstNameNoTooltip]"
 agot_scenario_ats.9011.e:0 "I must try, one final time."
 agot_scenario_ats.9011.e.tt:0 "You may attempt to search for a spouse on your own again, but you will only have one more week."
 agot_scenario_ats.9012.t:0 "A Father's Web"
 agot_scenario_ats.9012.desc:0 "My father's trap has finally caught up with me. Despite my efforts, I have little choice now. I must give up my lands, and leave my castles to my heir. This was hardly the fate I desired, but there is little to be done now.\n\nThe Red Widow of Coldmoat is no more; I am merely Lady Rohanne now."
 agot_scenario_ats.9012.a:0 "Goodbye, Coldmoat."
 agot_scenario_ats.9012.b:0 "I will seek out Ser Duncan, and join his camp."
 agot_scenario_ats.9012.b.tt:0 "You will switch to Ser Duncan the Tall, and Rohanne will become a follower."
 agot_scenario_ats.9012.c:0 "I will leave these lands behind, and forge a new path."
 agot_scenario_ats.9012.c.tt:0 "You will give up your titles, and form an adventuring camp."
 agot_scenario_ats.9013.t:0 "A Tower Made a Torch"
 agot_scenario_ats.9013.desc:0 "As the fires burn about Standfast, and the pitiful forces arrayed by Ser [eustace.GetFirstName] against us vanish into nothing, I stand victorious. Now as the dust settles, I can rebuild, and finally see to the issue of my father's will."
 agot_scenario_ats.9013.a:0 "The tower is mine, and the dam can come down!"
 agot_scenario_ats.9013.a.tt:0 "Standfast and Coldmoat will share water"
 agot_scenario_ats.9014.t:0 "The Toothless Lion"
 agot_scenario_ats.9014.desc:0 "Despite the vast gulf between our resources, Ser [eustace.GetFirstName] still saw fit to wage a war against the Widow of Coldmoat. Now, his feeble force has been crushed, and he is left a ruin. With this matter settled, and leaving me victorious, I can finally see to my father's will, and the strengthening of my position."
 agot_scenario_ats.9014.a:0 "On to other matters."
 agot_scenario_ats.9014.a.tt:0 "You will receive a choice of marriage options"
 agot_scenario_ats.9015.t:0 "The Burning Webs"
 agot_scenario_ats.9015.desc:0 "The bodies of Webber men litter the blood-soaked fields outside Coldmoat, with the proud chequy lion waiting at the gates. I made my move against Ser [eustace.GetFirstName], and paid the price for failure. I am humiliated, and my dam has been ripped down, leaving less water for the crops of Coldmoat for the coming days.\n\nAll I can do now, is pray for rain."
 agot_scenario_ats.9015.a:0 "I have to simply wait out this drought, and plot my next move"
 agot_scenario_ats.9015.a.tt:0 "The dam will come down, and you'll move on to choose a spouse"
 agot_scenario_ats.9016.t:0 "A Birthright Lost"
 agot_scenario_ats.9016.desc:0 "The chequy lion once more flies proud over Coldmoat, with the ancient castle's spider banners torn down and tossed into the flames below. I am left to wonder if my father was right, if I could not rule on my own as the greatest part of my birthright is ripped from my grasp.\n\nWhat shall come next? Revenge? Or acceptance?"
 agot_scenario_ats.9016.a:0 "I shall turn to other matters, and consider my next move."
 agot_scenario_ats.9016.a.tt:0 "You'll choose from a list of potential spouses"
 agot_scenario_ats.9020.t:0 "A Dead Widow"
 agot_scenario_ats.9020.desc:0 "With the death of [rohanne.GetTitledFirstName], the conflict over the dam is over for now. I can't help but feel sorrow as my boy's childhood love is buried in the shadow of my family's castle. So much death and destruction in my life, and still none of it has meant a thing. It will be hard to make any further moves, my liege will be watching too closely now, so I must tough out the drought until the rains come to save us.\n\nI hope they come soon."
 agot_scenario_ats.9020.a:0 "We will mourn the dead, and pray for the living."
 agot_scenario_ats.9020.a.tt:0 "You will wait for the drought to end"
 agot_scenario_ats.9021.t:0 "The Lion Triumphant"
 agot_scenario_ats.9021.desc:0 "In what will be called a stunning victory for generations, I have smashed the armies of [rohanne.GetTitledFirstName], leaving [rohanne.GetHerHis] men in a blood soaked heap outside of Coldmoat. As I walk to the mighty gatehouse of the keep, taking my time to examine each of the ancient walls my House once built, a wide smile forms on my face. Tearing down the Webber banner, the white spider swaying in the breeze as it floats down to the ground, my smile widens at the sight of the restored chequy lion, its proud place returned.\n\nFinally, I have restored my House."
 agot_scenario_ats.9021.a:0 "The dam shall be ripped down, and I shall rule."
 agot_scenario_ats.9021.a.tt:0 "Coldmoat and Standfast will share water"
 agot_scenario_ats.9022.t:0 "The Lion Triumphant"
 agot_scenario_ats.9022.desc:0 "Despite all of [rohanne.GetTitledFirstNamePossessive] threats, I have proven this widow's venom weak indeed. [rohanne.GetHerHis|U] men lay broken, and bleeding upon the fields outside of Standfast, while my tower remains untaken. I have won, against all odds, and brought new pride and glory to my ancient House. Rohanne is forced to make a humiliating peace deal, leaving the Red Widow weakened, and the chequy lion stronger than ever."
 agot_scenario_ats.9022.a:0 "Rip that dam down!"
 agot_scenario_ats.9022.a.tt:0 "You will tear down the dam"
 agot_scenario_ats.9023.t:0 "The End of the Chequy Lion"
 agot_scenario_ats.9023.desc:0 "With the taking of Standfast, [rohanne.GetTitledFirstName] has broken my forces and claimed the last fortress my House had to its name. I am a knight without land now, without a home, without hope.\n\nI wish it had never come to this, that I had backed down when the chance there was, now I am left in ruins."
 agot_scenario_ats.9023.a:0 "My House has fallen."
 agot_scenario_ats.9023.a.tt:0 "You have lost Standfast"
 agot_scenario_ats.9024.t:0 "The Clawless Lion"
 agot_scenario_ats.9024.desc:0 "With the defeat of my armies, and the burning of my lands, House Osgrey has once again been proven weak. I have disgraced my House further than I had ever dreamt. My family in ruins, my lands destroyed, and my political position weaker than ever.\n\nI am a lion without claws now, and I am at this widow's mercy."
 agot_scenario_ats.9024.a:0 "The dam will remain, and I must live with my failures."
 agot_scenario_ats.9024.a.tt:0 "You will wait for what comes next"
 agot_scenario_ats.9030.t:0 "A Dead Widow"
 agot_scenario_ats.9030.desc:0 "With the death of [rohanne.GetFullName], the conflict over the dam is over for now. I am sorry to see the short frame of the Lady of Coldmoat buried in its shadow.\n\nWith this conflict over, Egg and I are free to choose whether to stay and work here or move on to what may be greener pastures. In any case, the hedges await."
 agot_scenario_ats.9030.a:0 "A farewell to the widow."
 agot_scenario_ats.9030.a.tt:0 "You will return to doing contracts"
 agot_scenario_ats.9031.t:0 "The Last Chequy Lion"
 agot_scenario_ats.9031.desc:0 "With the death of Ser [eustace.GetFirstName], Egg and I once again find ourselves without service to a master. It would seem it's time to travel again and bring Egg to see more of the world.\n\nThe last chequy lion may be gone, but the hedges wait for us always."
 agot_scenario_ats.9031.a:0 "Goodbye, chequy lion."
 agot_scenario_ats.9031.a.tt:0 "You will return to doing contracts"
 agot_scenario_ats.9032.t:0 "Fire and Sword"
 agot_scenario_ats.9032.desc:0 "[rohanne.GetFullName] and Ser [eustace.GetFirstName] are now at war! Our oaths of service demand that Egg and I join Ser [eustace.GetFirstNameNoTooltip] and fight by [eustace.GetHerHis] side, and [eustace.GetSheHe] has offered troops for me to command, but to risk Egg is a hard choice to make.\n\nWar is not an easy thing, and bringing even a very capable squire can be dangerous, I must choose carefully whether to provide aid."
 agot_scenario_ats.9032.a:0 "For the chequy lion!"
 agot_scenario_ats.9032.a.tt:0 "You will lead troops on the side of [eustace.GetNameNoTooltip]"
 agot_scenario_ats.9032.b:0 "I can't be involved in this, not now."
 agot_scenario_ats.9032.b.tt:0 "You will refuse to join on the side of Ser [eustace.GetFirstNameNoTooltip]"
 rohanne_hair_token.desc:0 "A lock of hair tied with a silk ribbon, taken from the long red braid of [rohanne.GetTitledFirstName] during [dunk.GetTitledFirstNameNicknamedPossessive] time at Standfast."
 agot_scenario_ats.9033.t:0 "The Broken Lion"
 agot_scenario_ats.9033.desc:0 "Perhaps it should come as no surprise, given how small the army at Ser [eustace.GetFirstNamePossessive] command was, that [eustace.GetHerHis] men lay dead and broken around me. The field is littered with bleeding corpses as [rohanne.GetTitledFirstName] claims [rohanne.GetHerHis] victory beneath the blood-red sky of morning. My own men, granted by Ser [eustace.GetFirstNameNoTooltip], return to their homes.\n\nEgg and I, as always, will return to the hedges, and try to forget all we have seen."
 agot_scenario_ats.9033.a:0 "Goodbye, chequy lion."
 agot_scenario_ats.9033.a.tt:0 "You will return to doing contracts"
 agot_scenario_ats.9034.t:0 "The Lion Victorious"
 agot_scenario_ats.9034.desc:0 "The widow's army lays in tatters, with the forces of the experienced Ser [eustace.GetFirstName] leaving the field triumphant. This remarkable victory over vastly superior forces leaves the chequy lion stronger than ever, and without so much need for a common knight of the hedges. As the morning sky turns a bloody crimson, I turn back command of the men Ser [eustace.GetFirstNameNoTooltip] granted me, gather my things, and prepare to leave.\n\nEgg and I shall, as always, return to the hedges."
 agot_scenario_ats.9034.a:0 "Goodbye, chequy lion."
 agot_scenario_ats.9034.a.tt:0 "You will return to doing contracts"
 osgrey_and_webber_claim:0 "The Widow's War"
 rohanne_removed_the_dam:0 "Lady Rohanne has agreed to terms, and removed the dam"
 rohanne_laamp_name_1:0 "Widow's Webs"
 rohanne_laamp_name_2:0 "Spider's Swords"
 rohanne_laamp_name_3:0 "Cold Companions"
 eustace_laamp_name_1:0 "Lion's Pride"
 eustace_laamp_name_2:0 "Chequy Companions"
 eustace_laamp_name_3:0 "Eustace's Exiles"
 eustace_laamp_name_4:0 "Chequy Mates"