l_french:
 agot_childhood_events.0001.t:0 "Le revers de la Pièce"
 agot_childhood_events.0001.desc:0 "Chaque fois qu'un [GetPlayer.GetHouse.GetBaseName] vient au monde, les dieux lancent une pièce ; d'un côté, la grandeur, de l'autre, la folie.\n\n[child.Custom('CoinFlipChild')]"
 agot_childhood_events.0002.t:0 "$agot_childhood_events.0001.t$"
 agot_childhood_events.0002.desc:0 "Chaque fois qu'un [GetPlayer.GetHouse.GetBaseName] vient au monde, les dieux lancent une pièce ; d'un côté, la grandeur, de l'autre, la folie. Et le monde retient son souffle en attendant le résultat.\n\nIl semblerait qu'aujourd'hui, il soit favorable… [child.GetFirstName] [child.Custom('CoinFlip')]"
 agot_childhood_events.0002.a:0 "Nous suivrons votre carrière avec beaucoup d'intérêt."
 agot_childhood_events.0003.t:0 "$agot_childhood_events.0001.t$"
 agot_childhood_events.0003.desc:0 "Chaque fois qu'un [GetPlayer.GetHouse.GetBaseName] vient au monde, les dieux lancent une pièce ; d'un côté, la grandeur, de l'autre, la folie. Et le monde retient son souffle en attendant le résultat.\n\nIl semblerait qu'aujourd'hui, il ne soit pas des plus favorables. Il semblerait que [child.GetFirstName] soit l'image même de la folie."
 agot_childhood_events.0003.a:0 "Malheur à la Maison [GetPlayer.GetHouse.GetBaseName] !"
 coin_flip_diligent:0 "semble naturellement appliqué[ROOT.Char.Custom('FR_E')] dans tout ce qu'[ROOT.Char.Custom('FR_IlElle')] fait."
 coin_flip_learning:0 "semble avoir une aptitude naturelle pour les arts savants."
 coin_flip_martial:0 "semble avoir une aptitude naturelle pour les études martiales."
 coin_flip_intrigue:0 "semble avoir une aptitude naturelle à l'intrigue."
 coin_flip_stewardship:0 "semble avoir une aptitude naturelle à l'intendance."
 coin_flip_diplomacy:0 "semble avoir une aptitude naturelle à la diplomatie."
 coin_flip_prowess:0 "semble avoir un talent naturel avec une lame."
 coin_flip_shrewd:0 "semble avoir un talent naturel pour tout ce qu'[ROOT.Char.Custom('FR_IlElle')] entreprend."
 coin_flip_genius:0 "semble posséder une intuition stupéfiante dans tout ce qu'[ROOT.Char.Custom('FR_IlElle')] entreprend."
 agot_childhood_events.0004.t:0 "La graine est vigoureuse..."
 agot_childhood_events.0004.desc:0 "Au fur et à mesure que [child.GetFirstName] grandit, je me reconnais de moins en moins en [child.Custom('FR_LuiElle')]. Est-ce qu'[child.Custom('FR_IlElle')] est vraiment [child.Custom('FR_LeLa')] mie[child.Custom('FR_NNne')] ?"
 agot_childhood_events.0004.a:0 "En y réfléchissant bien, ce n'est peut-être rien après tout..."
 agot_childhood_events.0004.b:0 "Je dois apprendre la vérité !"
 agot_childhood_events.0004.b.success:0 "Si votre enfant n'est pas le vôtre, vous apprendrez le secret"
 agot_childhood_events.0004.b.success.bastard.t:0 "Succès de l'enquête"
 agot_childhood_events.0004.b.success.bastard.desc:0 "[child.GetFirstName] est en fait l'enfant de [real_father.GetFullName] !"
 agot_childhood_events.0004.b.success.notbastard.t:0 "Succès de l'enquête"
 agot_childhood_events.0004.b.success.notbastard.desc:0 "[child.GetFirstName] est vraiment mon enfant après tout !"
 agot_childhood_events.0004.b.failure:0 "Vous ne trouvez aucune preuve"
 agot_childhood_events.0004.b.failure.t:0 "Échec de l'enquête"
 agot_childhood_events.0004.b.failure.desc:0 "Vous n'avez trouvé aucune preuve."
 agot_childhood_events.0004.c:0 "Tout le monde doit connaître la vérité !"
 agot_childhood_events.0004.c.tt:0 "Vous accuserez publiquement vos enfants d'être des bâtards."
 agot_childhood_events.0004.c.tt.1:0 "Personne ne vous croit, et vos vassaux trouvent votre accusation déshonorante."
 agot_childhood_events.0004.c.tt.2:0 "L'accusation est jugée crédible"
 agot_childhood_events.0004.c.failure.t:0 "Échec de l'accusation"
 agot_childhood_events.0004.c.failure.desc:0 "Personne ne croit à vos accusations et vous considère comme un menteur déshonorant."
 agot_childhood_events.0004.c.success.t:0 "Accusation réussie"
 agot_childhood_events.0004.c.success.desc:0 "Le grand public croit à vos accusations. [child.GetFirstName] a gagné le trait Héritage contesté."
 agot_childhood_events.0004.d:0 "Qu'ils soient miens de naissance ou non ne change rien à l'affaire."
 agot_childhood_events.0004.d.tt:0 "Si votre femme a des secrets d'héritage contestés, ils seront invalidés."
 agot_childhood_events.0001.a:0 "Ainsi soit-il..."
 coin_flip_child_diligent:0 "Parfois, je voudrais maudire [ROOT.Char.GetFaith.HighGodName] pour mon manque de talent, mais se plaindre ne donne aucun résultat. Chaque jour est un défi, chaque défi est une occasion de progresser. La clé de la réussite réside dans la persévérance."
 coin_flip_child_learning:0 "La démence revêt bien des formes, la mienne se caractérise par un appétit insatiable pour les livres... Une petite minute, est-ce que la folie des [GetPlayer.GetHouse.GetBaseName] s'est-elle déjà manifestée de la sorte ? Je devrais aller faire un tour dans la bibliothèque pour en apprendre davantage !"
 coin_flip_child_martial:0 "Aujourd'hui encore, les chevaliers de la cour se sont rassemblés pour s'entraîner au siège d'une place forte. Depuis les murs du château, j'observe ce simulacre et ce que je vois pourrait bien me rendre fou ! Ils enchaînent les mauvaises décisions, alors que la tactique idéale à adopter est pourtant évidente. #italic Sont-ce des idiots ?#!"
 coin_flip_child_intrigue:0 "Les gens présents à la cour s'échangent des regards, pas aussi subtils qu'ils ne le pensent, et entretiennent des relations, pas aussi bien dissimulés qu'ils ne le croient... du moins c'est ce que je pensais au début. Lorsque j'en ai parlé à un[ROOT.Char.Custom('FR_E')] autre [ROOT.Char.Custom('FR_GarconFille')], [ROOT.Char.Custom('FR_IlElle')] semblait n'avoir aucune idée de ce dont je parlais. Il semblerait que j'ai l'œil pour ces choses là, tandis que d'autres ne sont au mieux que des borgnes."
 coin_flip_child_stewardship:0 "Après avoir parlé en rond pendant des heures avec l'un des intendants, dont j'ai déjà oublié le nom, j'ai mal à la tête et mon esprit aspire au sommeil. Je pourrais mourir heureux si je n'avais plus jamais à entendre « Vous êtes bien informé sur les questions de monnaie pour votre âge. »"
 coin_flip_child_diplomacy:0 "Rien ne me procure plus de plaisir que de narrer les histoires d'antan, notamment celles de l'Âge des Héros, à un public qui, bien que les connaissant par cœur, continue d'être captivé comme au premier jour. Je suis bon orateur... je dirais même que j'ai un talent certain pour ça !"
 coin_flip_child_prowess:0 "Je ne cesse d'être obnubilé par les jeux d'épée. Frapper ! Parer ! #bold Riposter !#! Je ne compte même plus le nombre de fois que j'ai vu et revu ces échanges entre chevaliers au cours de duels. Une fois mon tour venu, c'est une simple formalité. Frapper ! Parer ! Riposter ! #bold Gagner !#!"
 coin_flip_child_shrewd:0 "J'ai discuté à maintes reprises à propos du fait que libérer des prisonniers pour en faire des espions serait bien plus productif que des exécutions sommaires, mais les mots sont tombés dans l'oreille de sourds. On me rétorque que le devoir d'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.Custom('FR_SeigneurDame')] est d'être juste. Si seulement les gens pouvaient avoir une vision plus #italic pragmatique#! des choses."
 coin_flip_child_genius:0 "Peu importe ce que j'entreprends, tout est d'une facilité déconcertante. Un discours à prononcer ? Une stratégie à établir ? Des intrigues à dévoiler ? Un savoir à approfondir ? Même mes aînés peinent à suivre mon rythme !"
 coin_flip_child_lunatic_1:0 "Le roi sans tête observe depuis le coin de la salle... encore. Sa présence hante mes pas, son regard trouble mes pensées, sa voix s'introduit dans mes songes. Peu à peu, les histoires qu'il me conte deviennent réconfortantes. Des histoires sur ma nature hors du commun. Des histoires sur nos similitudes, lui et moi. Plus les mots s'accumulent dans ma tête, et plus je prends conscience des vérités qui les accompagnent."
 coin_flip_child_possessed_1:0 "Pourquoi nous regardent-ils tous comme ça ? Savent-ils que nous sommes spéciaux ? Non, bien sûr que non. Mais que se passerait-il s'ils le savaient ? Personne ne doit le savoir. Nous sommes si spéciaux. Ils veulent nous séparer, nous diviser, nous affaiblir. Nous ne les laisserons pas faire."
 coin_flip_child_arbitrary:0 "D'un côté les chanceux, de l'autre les fous ? C'est d'un grotesque ! Qui est apte à en définir les frontières ? Quels sont les critères objectifs ? Pourquoi tout le monde ne parle que de ça à la cour ? Qui peut bien s'en soucier ? Pas moi en tout cas, et mon avis est bien la seule chose qui importe vraiment."
 coin_flip_child_paranoid:0 "Il m'est impossible de dormir, de boire, de manger, et même de penser. Les regards. Les regards partout. Ils attendent tous de savoir de quel côté cette foutue pièce est tombée. Je n'en peux plus ! Mais... les questions s'entassent dans mon esprit. Suis-je en train de devenir fou ? Où se situe la frontière entre clarté et démence ? Ces questionnements sont-ils un signe avant-coureur ? La folie des [GetPlayer.GetHouse.GetBaseName], ce n'est probablement qu'une fable inventée pour que les enfants se tiennent correctement... n'est-ce pas ?"
 coin_flip_child_wrathful:0 "Depuis trois semaines, on me ressert encore le même morceau de l'histoire de la maison [GetPlayer.GetHouse.GetBaseName], et ma patience s'amenuise de plus en plus. J'en ai entendu certains à la cour dire que je n'avais aucun talent d'aucune sorte. Ils feraient mieux d'apprendre à tenir leur langue s'ils ne veulent pas la perdre."
 coin_flip_child_fire_obsessed:0 "J'avais entendu bien des rumeurs concernant les dons de la Maison [GetPlayer.GetHouse.GetBaseName], mais je n'avais jamais réalisé sous quelle forme ils se manifesteraient. Chaque fois que je plonge mon regard dans la danse sulfureuse des flammes, j'y vois tant de choses. Elles semblent vouloir communiquer avec moi. Souhaitent-elles me prévenir de quelque chose ? Un plus grand feu pourrait m'apporter une réponse plus claire. Un bûcher peut-être..."
 agot_childhood_events.0007.t:0 "Les couleurs de la Cour"
 agot_childhood_events.0007.desc.courtier:0 "La chevelure de [dyed_hair.GetName] en fait le centre de l'attention qu'importe où [dyed_hair.Custom('FR_IlElle')] va."
 agot_childhood_events.0007.desc.sellsword:0 "Un mercenaire en voyage est récemment arrivé à la cour en provenance des cités libres, et je n'ai pas pu m'empêcher de remarquer la couleur absolument incroyable de ses cheveux."
 agot_childhood_events.0007.a:0 "Peut-être que je devrais essayer..."
 agot_childhood_events.0007.tt:0 "Vous allez teindre vos cheveux à la manière des cités libres !"
 agot_childhood_events.0007.b:0 "Une telle flamboyance ne ferait qu’attirer les moqueries."
 agot_childhood_events.0008.t:0 "Teinture en folie"
 agot_childhood_events.0008.desc:0 "Tandis que je déambule dans les salles de [home.GetNameNoTooltip], j'aperçois une étrange couleur du coin de l'œil. Un brusque mouvement du cou en viendrait presque à le briser quand je réalise que les cheveux de m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('dyed_hair'))], [dyed_hair.GetFirstName], ont pris une couleur grotesque.\n\n« Qu'est-ce que vous en pensez ? C'est à la mode dans les cités libres d'Essos. »"
 agot_childhood_events.0008.a:0 "Si c'est ce que vous voulez..."
 agot_childhood_events.0008.b:0 "Vous allez me nettoyer ça ! Et tout de suite !"
 agot_childhood_events.0008.c:0 "J'adore !"
 agot_childhood_events.0008.c.tt:0 "Vous allez vous aussi teindre vos cheveux !"
 agot_childhood_events.0009.t:0 "L'éducation d'une pupille"
 agot_childhood_events.0009.desc:0 "Assis[ROOT.Char.Custom('FR_E')] dans vos appartements, vous réfléchissez à l'avenir de votre descendance, quand une pensée troublante se glisse dans votre esprit. [ward.GetFirstName] grandit rapidement, et il parait évident qu'[ward.Custom('FR_IlElle')] a besoin de conseils et d'éducation pour façonner sa voie dans ce monde. Il est temps de décider à qui confier cette tâche cruciale."
 agot_childhood_events.0009.a:0 "Pourquoi pas moi ?"
 agot_childhood_events.0009.a.tt:0 "C'est peut-être vous qui devriez guider [ward.GetFirstName] à travers le voyage tumultueux de la vie. Votre expérience et votre sagesse pourraient s'avérer inestimable pour forger son caractère et en faire quelqu'un digne d'une succession."
 agot_childhood_events.0009.b:0 "Pourquoi pas [guardian.GetFirstName] ?"
 agot_childhood_events.0009.b.tt:0 "Vous songez à [guardian.GetFirstName] pour prendre en charge [ward.GetFirstName]. Quelqu'un de reconnu pour sa sagesse et son intégrité qui saura lui garantir un avenir brillant, fait d'opportunités, de connaissances acquises et d'épanouissement."
 agot_childhood_events.0009.c:0 "Je pourrais trouver quelqu'un d'autre."
 agot_childhood_events.0009.c.tt:0 "Vous trouverez quelqu’un pour assumer cette responsabilité."
 agot_childhood_events.0009.d:0 "Je n'ai pas encore pris ma décision."
 agot_childhood_events.0009.d.tt:0 "Une telle responsabilité est un lourd fardeau, et le choix n'est pas facile. Il est peut-être préférable de reporter cette décision à plus tard. Cela vous laissera le temps de réfléchir à la question."
 child_personality.keeps_authoritative_tt: "[child.GetFirstName] conserve le trait [GetTrait('authoritative').GetName( child.Self )]"
 child_personality.keeps_rude_tt: "[child.GetFirstName] conserve le trait [GetTrait('rude').GetName( child.Self )]"
 child_personality.keeps_inquisitive_tt: "[child.GetFirstName] conserve le trait [GetTrait('inquisitive').GetName( child.Self )]"
 agot_child_personality_events.2010.t: "Querelles domestiques"
 agot_child_personality_events.2010.guardian: "[guardian.Custom('FR_le_Char_Pi')|U][guardian.GetTitledFirstName] amène devant moi deux domestiques, le visage aussi rouge que la tache de vin qui a imbibé le rideau, qui s'avère être justement le sujet de leur fâcherie. Chacun blâmant l'autre pour cette faute, aucun des deux ne veut s'adonner à la nettoyer. [guardian.GetFirstNameNoTooltip] me charge de résoudre le différend, afin de me mettre à l'épreuve."
 agot_child_personality_events.2010.no_guardian: "En déambulant dans les couloirs, je tombe sur deux domestiques, le visage aussi rouge que la tache de vin qui a imbibé le rideau, qui s'avère être justement le sujet de leur fâcherie. Chacun blâmant l'autre pour cette faute, aucun des deux ne veut s'adonner à la nettoyer. C'est une affaire grotesque, mais mieux vaut éviter que ça ne dégénère."
 agot_child_personality_events.2010.a: "Vous vous partagerez la tâche."
 agot_child_personality_events.2010.b: "Vous êtes tous deux congédiés... définitivement !"
 agot_child_personality_events.2010.c: "Qui était de service la nuit dernière ?"
 agot_child_personality_events.201.desc: "J'ai décidé de mettre à l'épreuve m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('child'))], [child.GetFirstName], en l'amenant devant deux domestiques, le visage aussi rouge que la tache de vin qui a imbibé le rideau, qui s'avère être justement le sujet de leur fâcherie. Chacun blâmant l'autre pour cette faute, aucun des deux ne veut s'adonner à la nettoyer, et leur zizanie ne passe pas inaperçu auprès du reste de la maisonnée."
 agot_child_personality_events.2011.t: "$agot_child_personality_events.2010.t$"
 agot_child_personality_events.201.authoritative: "[child.GetFirstNameNoTooltip] leur a ordonné à tous deux de nettoyer la tache sur le rideau, et de plus jamais remettre sur le tapis cette histoire. [child.Custom('FR_IlElle')|U] a su se montrer décisif et ses ordres ont étaient appliqués séance tenante."
 agot_child_personality_events.201.confirm_authoritative: "Vous ferez un dirigeant inspirant."
 agot_child_personality_events.201.authoritative_change: "Faites preuve d'autorité et tout le monde vous écoutera."
 agot_child_personality_events.2012.t: "$agot_child_personality_events.2010.t$"
 agot_child_personality_events.201.rude: "[child.GetFirstNameNoTooltip] a réagi avec force et fracas, vociférant sur les domestiques sur leur inaptitude à la tâche. [child.Custom('FR_IlElle')|U] n'a pas mâché ses mots, et leur a fait comprendre sans aucune retenue qu'ils allaient se mettre au travail dans l'instant."
 agot_child_personality_events.201.confirm_rude: "C'est bien, jeune [Select_CString(child.IsFemale,'fille','homme')], remettez-les à leur juste place."
 agot_child_personality_events.201.rude_change: "N'ayez pas peur de vous exprimer sèchement et sans retenue."
 agot_child_personality_events.2013.t: "$agot_child_personality_events.2010.t$"
 agot_child_personality_events.201.inquisitive: "[child.GetFirstNameNoTooltip] a rassemblé les domestiques, parvenant à trouver rapidement qui était de service la nuit dernière et leur intimer l'ordre de nettoyer. [child.Custom('FR_IlElle')|U] a su poser les bonnes questions et en apprendre suffisamment pour prendre la décision qui s'imposait."
 agot_child_personality_events.201.confirm_inquisitive: "Vous avez su recouper les informations, c'était très malin."
 agot_child_personality_events.201.inquisitive_change: "Pour prendre la bonne décision, il faut un maximum d'informations."
 agot_childhood_events.0011.t:0 "Une étoile prometteuse"
 agot_childhood_events.0011.desc:0 "J'observe [prodigy.GetFirstName] s'entraîner en jouant de son épée et l'évidence me saute alors au visage : m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('prodigy'))] est un véritable prodige.\n\nComment pourrait-il en être autrement lorsque je [prodigy.Custom('FR_LeLa')] vois ainsi manier la lame avec une telle habileté, une telle dextérité. [prodigy.Custom('FR_IlElle')|U] est leste, agile, d'une célérité sans pareille alors qu'à son âge ses pairs sont aussi capables qu'un poulet sans tête. Peut-être n'est-ce qu'une forme de fierté familiale, mais je vois en [prodigy.Custom('FR_LuiElle')] un immense potentiel.\n\nLe jour viendra où [prodigy.Custom('FR_IlElle')] deviendra un[prodigy.Custom('FR_E')] bretteu[prodigy.Custom('FR_RSe')] d'exception, digne de brandir [dawn.GetName] et de porter le titre d'#italic Épée du Matin#!, mais pour ce faire, je vais devoir [prodigy.Custom('FR_LeLa')] pousser à perfectionner sa maîtrise, #bold jour après jour#!. Cela lui demandera un investissement draconien, ce qui n'est pas sans risque…"
 agot_childhood_events.0011.a:0 "Quel gâchis ce serait de ne pas nourrir ce prodige."
 agot_childhood_events.0011.a.tt:0 "[prodigy.GetFirstNameNoTooltip] va suivre la voie difficile pour devenir l'Épée du Matin"
 agot_childhood_events.0011.b:0 "Je préfère [prodigy.Custom('FR_LeLa')] laisser s'envoler de ses propres ailes."
 agot_childhood_events.0011.b.tt:0 "[prodigy.GetFirstNameNoTooltip] suivra la même éducation que n'importe quel autre enfant"
 agot_childhood_events.dragon_doll:0 "La poupée :"
 agot_childhood_events.0020.t:0 "$agot_childhood_events.dragon_doll$ L'enfant sans dragon"
 agot_childhood_events.0020.desc_dragons_live:0 "Par le sang qui coule dans ses veines et selon les anciennes coutumes qui remontent à l'époque de l'Antique Valyria, [child.GetFirstName] aurait dû se lier avec un dragon, et pourtant, aujourd'hui encore il n'en est rien.\n\nMon cœur saigne de voir m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] ainsi esseulé[child.Custom('FR_E')], et plus encore de savoir que je ne peux lui offrir ce qui lui fait défaut. Si le sortilège pour faire plier un dragon à ma volonté m'est inconnu, il y a bien quelque chose que je sais : nombreuses sont les façons de combler le vide dans le cœur d'un enfant."
 agot_childhood_events.0020.desc_dragons_dead:0 "Depuis sa naissance, [child.GetFirstName] est bercé[child.Custom('FR_E')] par les contes et récits des seigneurs dragons d'antan. \n\nDes hommes et femmes qui régnaient sur la terre comme aux cieux, chevauchant les plus terribles créatures que le monde ait jamais vues, mais aussi les plus magnifiques. Hélas, le monde a bien changé. Les cieux se sont vidés, les flammes se sont éteintes, les dragons ne sont plus.\n\nPourtant, ces bêtes majestueuses demeurent encore aujourd'hui une part de notre identité, un symbole de ce qui nous rapprochait du divin. Voilà pourquoi mon cœur saigne de savoir que m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] ne pourra jamais pleinement embrasser l'héritage qui coule dans nos veines. Mais si le sortilège pour ramener les dragons à la vie m'est inconnu, je puis attiser cette flamme par d'autres moyens."
 agot_childhood_events.0020.a:0 "[child.Custom('FR_IlElle')|U] aura un dragon, non de feu mais de laine."
 agot_childhood_events.0020.a.tt:0 "Vous allez entamer la création d'une poupée pour [child.GetFirstNameNoTooltip]."
 agot_childhood_events.0020.ignore:0 "Notre héritage n'est pas un vulgaire jouet pour amuser la marmaille !"
 agot_childhood_events.0021.t:0 "$agot_childhood_events.dragon_doll$ [newly_created_artifact.GetNameNoTooltip]"
 agot_childhood_events.0021.desc_simple:0 "C'est une main toute tremblotante qui fait passer le fil, achevant de placer l'œil à sa juste place. Vaille que vaille, voilà mon ouvrage terminé — imparfait, inégal, mais terminé. Point une merveille, mais un humble présent qui fera la joie de [child.GetFirstName].\n\nAu lendemain, lorsque l'aurore réveille enfin [ROOT.Char.Custom('FR_ResidenceBuilding_Le')], je fais don à m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] du fruit de mon labeur. [child.Custom('FR_IlElle')|U] s'en saisit, quand je suis moi-même saisi[ROOT.Char.Custom('FR_E')] d'une profonde joie à la vue de son sourire.\n\nTout imparfait que soit un cadeau, l'affection qui y est brodée apporte toujours son lot d'exultation."
 agot_childhood_events.0021.desc_exquisite:0 "D'une main leste et d'un geste sûr, je sectionne le dernier fil avec une précision chirurgicale. « #italic Magnifique#! » c'est ainsi que résonne mon soupir de soulagement, auquel vient se mêler une pointe de satisfaction. Le labeur fut long, mais il en valait les efforts.\n\nJ'accours dans la chambre de [child.GetFirstName], qui bondit hors du lit, tout[child.Custom('FR_E')] jouasse qu'[child.Custom('FR_IlElle')] est. Mon présent tout juste offert, et le voilà déjà virevoltant de ci de là à travers la pièce. L'ouvrage aurait presque autant de majesté qu'un véritable dragon dans ses cabrioles aériennes, mais plus important encore, il a fait son office.\n\nCela je le sais car je le lis sur le sourire de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] lorsqu'[child.Custom('FR_IlElle')] s'abandonne au royaume des songes, mon cadeau fermement blotti contre sa poitrine."
 agot_childhood_events.0021.a:0 "Quelle joie de voir m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] aussi heureu[child.Custom('FR_XSe')]."
 agot_childhood_events.0021.a.callous:0 "[child.Custom('FR_IlElle')|U] a plutôt intérêt à en prendre soin."
 agot_childhood_events.0021.desc_chosen_dragon:0 "\n\nLa poupée n'a beau être qu'une imitation de [chosen_dragon.GetNameNicknamed], je sais que [child.GetFirstNameNoTooltip] s'y est déjà pleinement attaché[child.Custom('FR_E')], autant qu'un dragonni[child.Custom('FR_ErEre')] avec son dragon."
 agot_childhood_events.0021.desc_named_dragon:0 "\n\nLa poupée a si bien rempli son rôle que [child.GetFirstNameNoTooltip] a décidé de lui donner un nom : [newly_created_artifact.GetNameNoTooltip]."
 agot_childhood_events.0022.t:0 "$agot_childhood_events.dragon_doll$ Choisir la matière"
 agot_childhood_events.0022.desc:0 "Les dragons sont connus pour être de légendaires et majestueuses créatures, mais surtout pour être faits de feu et de chair.\n\nJe doute que ce soit de bon goût d'ouvrager le cadeau d'un enfant avec du feu et de la chair. Donc, de quoi sera faite cette poupée ?"
 agot_childhood_events.0022.a:0 "Je veux ce qu'il y a de mieux ! De la soie et des bijoux !"
 agot_childhood_events.0022.a.tt:0 "La qualité de la poupée sera #V #Bold considérablement augmentée#!#!."
 agot_childhood_events.0022.b:0 "M'est avis que nous n'avons pas besoin de fil d'or..."
 agot_childhood_events.0022.b.tt:0 "La qualité de la poupée sera #V #Bold légèrement augmentée#!#!."
 agot_childhood_events.0022.c:0 "Il doit bien y avoir des choses qui traînent dans les réserves..."
 agot_doll_quality_significantly_increased:0 "La qualité de la poupée sera #V #Bold considérablement augmentée#!#!."
 agot_doll_quality_slightly_increased:0 "La qualité de la poupée sera #V #Bold légèrement augmentée#!#!."
 agot_doll_quality_slightly_decreased:0 "La qualité de la poupée sera #V #Bold légèrement diminuée#!#!."
 agot_doll_quality_significantly_decreased:0 "La qualité de la poupée sera #V #Bold considérablement diminuée#!#!."
 agot_childhood_events.0023.t:0 "$agot_childhood_events.dragon_doll$ Temps et investissement"
 agot_childhood_events.0023.desc:0 "Pour façonner le parfait ouvrage, le temps est une denrée précieuse. Fâcheusement, mes responsabilités en tant que lady ne m'en laissent guère à ma disposition.\n\nEst-il judicieux de délaisser mes devoirs au profit de ce projet ? Ou bien dois-je concéder avoir des choses plus importantes à faire ?"
 agot_childhood_events.0023.a:0 "Chaque minute sera mise à profit."
 agot_childhood_events.0023.b:0 "Ce sont deux choses qui méritent chacune mon attention."
 agot_childhood_events.0023.c:0 "Le devoir a préséance sur les lubies."
 agot_childhood_events.0024.t:0 "$agot_childhood_events.dragon_doll$ De vibrantes couleurs"
 agot_childhood_events.0024.desc_dragons_live:0 "Quand on songe aux dragons, c'est une palette de couleur infinie qui s'ouvre à notre esprit. Du noir de nuit qu'évoque autant les flammes que les écailles de [GetScriptedCharacterByHistoryID('dragon_balerion').GetNameNicknamed], aux coloris étincelants d'[GetScriptedCharacterByHistoryID('dragon_silverwing').GetName], y a-t-il vivier de teintes plus fertile que l'évocation de ces bêtes majestueuses ?\n\nGammes et nuances dansent, devenant les hôtes d'un esprit qui se perd à conceptualiser la poupée parfaite."
 agot_childhood_events.0024.desc_dragons_dead:0 "Bien qu'ils aient disparu, aujourd'hui encore l'évocation des dragons est une porte ouverte sur un océan infini de couleurs. Du noir de nuit des flammes autant que des écailles de [GetScriptedCharacterByHistoryID('dragon_balerion').GetNameNicknamed] qui a tant marqué les esprits, aux coloris étincelants qui furent l'apanage d'[GetScriptedCharacterByHistoryID('dragon_silverwing').GetName], y a-t-il vivier de teintes plus fertile que l'image que nous renvoient encore aujourd'hui ces bêtes majestueuses de jadis ?\n\nGammes et nuances dansent, devenant les hôtes d'un esprit qui se perd à conceptualiser la poupée parfaite."
 agot_childhood_events.0024.desc_fallback:0 "Évoquer les dragons, c'est évoquer les couleurs. Sombres, étincelantes, infinies.\n\nIl me plaît de songer à toutes ces possibilités, tandis que gammes et nuances dansent, devenant les hôtes d'un esprit qui se perd à conceptualiser la poupée parfaite."
 agot_childhood_events.0024.a:0 "Des couleurs, encore des couleurs, toujours des couleurs !"
 agot_childhood_events.0024.a.tt:0 "Vous allez tenter d'obtenir un motif coloré complexe."
 agot_childhood_events.0024.a.vibrant_success.tt: "Les multiples couleurs forment un tout harmonieux."
 agot_childhood_events.0024.a.vibrant_fail.tt: "Certaines couleurs ne semblent pas à leur place."
 agot_childhood_events.0024.a.vibrant_major_fail.tt: "L'ensemble devient un bariolage sans queue ni tête."
 agot_childhood_events.0024.b:0 "Un peu de couleur pour flatter la rétine suffira."
 agot_childhood_events.0024.b.tt:0 "Vous allez tenter d'obtenir un motif de couleur variée."
 agot_childhood_events.0024.b.simple_success.tt:0 "Les couleurs sont disposées harmonieusement."
 agot_childhood_events.0024.b.simple_neutral.tt:0 "Le résultat n'est ni fait ni à refaire."
 agot_childhood_events.0024.b.simple_fail.tt:0 "Le motif tient plus du gribouillage que de l'ouvrage."
 agot_childhood_events.0024.c:0 "Trop de couleur tue la couleur. Optons pour la sobriété."
 agot_childhood_events.0024.c.tt:0 "Vous vous contentez d'un motif quelconque."
 agot_childhood_events.0025.t:0 "$agot_childhood_events.dragon_doll$ Procrastination"
 agot_childhood_events.0025.desc:0 "En passant devant la chambre de [child.GetFirstName], une grimace vient barbouiller mon visage. Dans un coin de mes appartements gît la poupée inachevée qui lui est destinée. La motivation me faisant défaut, je ne parviens pas à voir le bout de ce qui est presque devenu une corvée.\n\nJ'ai beau me gifler — d'une main onirique — chaque fois que cette pensée perce le rempart de mon esprit, je ne peux faire autrement que reconnaître la vérité : ce qui était motivé par une envie sincère de faire plaisir à m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] est devenu un boulet, car ce labeur ombrage tout autre projet qui germe dans ma caboche. La culpabilité devenant des chaînes qui entravent mes gestes, et rend pénible toute conception de l'esprit.\n\nSi je veux en finir avec cela, ou bien je m'arme de discipline et j'empoigne l'aiguille pour achever la poupée, ou bien je m'ouvre à d'autres desseins pour tenter de raviver la flamme intérieure."
 agot_childhood_events.0025.a:0 "Je vais redoubler d'efforts, par [ROOT.Char.GetFaith.WealthGodName], je le jure !"
 agot_childhood_events.0025.a.push_success:0 "Le travail sur la poupée progresse grandement."
 agot_childhood_events.0025.a.push_fail:0 "Malgré votre bonne volonté, la motivation vous fait toujours défaut."
 agot_childhood_events.0025.a.push_major_fail:0 "Vous tuez à la tâche devient contre-productif."
 agot_childhood_events.0025.b:0 "Je pourrais apprendre à sculpter le bois."
 agot_childhood_events.0025.b.wood_success:0 "Vous retrouvez la passion qu'il vous manquait pour continuer la poupée."
 agot_childhood_events.0025.b.wood_neutral:0 "Une lubie amusante, mais qui n'aide en rien."
 agot_childhood_events.0025.b.wood_fail:0 "Votre nouvelle lubie devient par trop chronophage."
 agot_childhood_events.0025.c:0 "Rien ne sert de courir…"
 agot_childhood_events.0025.c.later_success:0 "La patience aide à raviver la passion."
 agot_childhood_events.0025.c.later_neutral:0 "Rien n'y fait, vous n'avez pas la motivation de continuer."
 agot_childhood_events.0025.c.later_fail:0 "La poupée à jamais inachevée devient comme un poids dans votre esprit."
 agot_childhood_events.0026.t:0 "$agot_childhood_events.dragon_doll$ Choisir l'envergure"
 agot_childhood_events.0026.desc:0 "Les dragons sont les maîtres incontestés des cieux. Des créatures si terribles que leurs ailes masquent le soleil, et qu'un simple battement d'aile les porte d'un horizon à un autre. Ils inspirent l'effroi et reflètent la majesté, et cette combinaison parfaite entre terreur et grandeur n'est guère simple à insuffler dans un petit morceau de laine.\n\nLa première étape est encore de choisir l'envergure souhaitée."
 agot_childhood_events.0026.a:0 "La taille ça compte. Il faut que ce soit énorme !"
 agot_childhood_events.0026.a.large_success.tt: "L'envergure des ailes donne de la prestance à la poupée."
 agot_childhood_events.0026.a.large_fail.tt: "L'immensité des ailes donne une allure étrange à la poupée."
 agot_childhood_events.0026.a.large_major_fail.tt: "Le résultat est clairement grotesque."
 agot_childhood_events.0026.small:0 "Je veux quelque chose de petit et mignon."
 agot_childhood_events.0026.small.large_success.tt: "L'envergure des ailes donne une certaine grâce à la poupée."
 agot_childhood_events.0026.small.large_fail.tt: "La petitesse des ailes donne une allure étrange à la poupée."
 agot_childhood_events.0026.small.large_major_fail.tt: "Le résultat est clairement grotesque."
 agot_childhood_events.0026.b:0 "Mieux vaut garder des proportions réalistes."
 agot_childhood_events.0026.b.proportional_success.tt: "La proportion est tout à fait satisfaisante."
 agot_childhood_events.0026.b.proportional_neutral.tt: "Le résultat, loin d'être impressionnant, reste convenable."
 agot_childhood_events.0026.b.proportional_fail.tt: "Les ailes sont inégales, donnant un résultat grotesque."
 agot_childhood_events.0026.c:0 "Je pourrais solliciter l'avis de [courtier.Custom('FR_du_Char')][courtier.GetName]."
 agot_childhood_events.0026.c.expert_major_success.tt: "Vous bénéficiez de précieux conseils."
 agot_childhood_events.0026.c.expert_success.tt: "Vous bénéficiez de conseils utiles."
 agot_childhood_events.0026.c.expert_fail.tt: "Vos efforts souffrent de mauvais conseils."
 agot_childhood_events.0027.t:0 "$agot_childhood_events.dragon_doll$ Choisir les yeux"
 agot_childhood_events.0027.desc:0 "D'ordinaire, des boutons sont utilisés en guise d'yeux, mais compte tenu du fait que les dragons sont des créatures extraordinaires, il serait peut-être de bon aloi de choisir quelque chose de plus raffiné pour une poupée à leur effigie.\n\nLa première idée qui me vient à l'esprit est d'utiliser des pierres précieuses, mais peut-être est-ce trop ostentatoire ?"
 agot_childhood_events.0027.gems:0 "Des pierres précieuses pour une poupée précieuse."
 agot_childhood_events.0027.gems.tt:0 "Vous optez pour des pierres précieuses en guise d'yeux"
 agot_childhood_events.0027.gems.success.tt:0 "Les yeux sont parfaitement adaptés au style général"
 agot_childhood_events.0027.gems.fail.tt:0 "Les yeux ne semblent pas correctement fixés."
 agot_childhood_events.0027.buttons:0 "Des boutons ça ira très bien."
 agot_childhood_events.0027.buttons.tt:0 "Vous vous contentez de boutons ordinaires en guise d'yeux"
 agot_childhood_events.0028.t:0 "$agot_childhood_events.dragon_doll$ Les premières flammes"
 agot_childhood_events.0028.desc.intro:0 "Des éclats de joyeusetés enfantines proviennent de l'autre bout du couloir, attisant ma curiosité. D'un pas feutré je m'approche, d'un œil enjoué j'observe. La scène est attendrissante : [child.GetFirstName] qui joue avec [dragon_doll.GetName]. M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] est tant absorbé[child.Custom('FR_E')] par ses espiègleries qu'[child.Custom('FR_IlElle')] ne remarque pas ma présence."
 agot_childhood_events.0028.desc.fire_common:0 "\n\n« Allez [dragon_doll.GetNameNoTooltip] ! Crache le feu ! #EMP Grrooah !#! »"
 agot_childhood_events.0028.desc.fire_valyrian:0 "\n\n« [dragon_doll.GetNameNoTooltip] ! [Glossary('Dracarys','DRACARYS_GLOSS')] ! »"
 agot_childhood_events.0028.desc.fire_breath:0 "\n\nJe n'ai aucun mal à imaginer des flammes sortir de la bouche du dragon, et à en juger par les éclats de rire, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] non plus."
 agot_childhood_events.0028.a:0 "C'est si adorable."
 agot_childhood_events.0028.a.flavor:0 "Les flammes ne sont peut-être pas réelles, mais ma joie l'est."
 agot_childhood_events.0028.b:0 "Que voilà un[child.Custom('FR_E')] brave petit[child.Custom('FR_E')] dragonni[child.Custom('FR_ErEre')]."
 agot_childhood_events.0028.b.flavor:0 "Même des flammes imaginaires arrivent à faire fondre mon cœur de pierre…"
 agot_childhood_events.0029.t:0 "$agot_childhood_events.dragon_doll$ L'inspiration"
 agot_childhood_events.0029.desc:0 "D'aussi bonne qualité puisse être un jouet pour enfant, il ne peut en aucun cas être autre chose que le simulacre d'un dragon. Il peut imiter leur magnificence, mais jamais il ne saurait l'égaler. Pourtant, je gage que ce petit morceau de laine pourrait être source d'inspiration si je venais à lui donner les traits d'un dragon bien vivant.\n\nSi [child.GetFirstName] venait à s'attacher profondément à la poupée, une fois adulte, [child.Custom('FR_IlElle')] pourrait lui venir en tête d'aller aux devants de la bête qui lui aurait prêté ses traits pour se lier à elle."
 agot_childhood_events.0029.untamed_dragon:0 "Réfléchissons, quel dragon choisir ?"
 agot_childhood_events.0029.ask_child:0 "Le mieux est encore de demander à m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] quel dragon suscite son intérêt."
 agot_childhood_events.0029.unnamed:0 "Je veux que cette poupée soit unique en son genre."
 agot_childhood_events.0029.unnamed.tt:0 "Un nom sera donné à la poupée lorsqu'elle sera achevée."
 agot_childhood_events.0029.child_dragon_name.toast_title:0 "[chosen_dragon.GetNameNoTooltip]"
 agot_childhood_events.0029.child_dragon_name.toast_desc:0 "[child.GetFirstName] a choisi [chosen_dragon.GetNameNicknamed]."
 agot_childhood_events.0029.inspiration_quality_bump.tt:0 "Modeler la poupée d'après un dragon vivant améliorera légèrement sa qualité."
 agot_childhood_events.0030.t:0 "$agot_childhood_events.dragon_doll$ Choisir le modèle"
 agot_childhood_events.0030.desc:0 "Quel dragon choisir pour devenir le modèle de la poupée ?"
 agot_childhood_events.0030.confirm_dragon:0 "Parfait !"
 agot_childhood_events.0030.confirm_dragon.tt:0 "La poupée sera modelée d'après [chosen_dragon.GetNameNicknamed]."
 agot_childhood_events.0030.ask_child:0 "Le mieux est encore de demander à m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))] quel dragon suscite son intérêt."
 agot_childhood_events.0030.cancel:0 "Finalement, je préfère rester sur de l'originalité."
 agot_childhood_events.0030.child_dragon_name.toast_title:0 "[chosen_dragon.GetNameNoTooltip]"
 agot_childhood_events.0030.child_dragon_name.toast_desc:0 "[child.GetFirstName] a choisi [chosen_dragon.GetNameNicknamed]."
 agot_hand_crafted_dragon_doll_exquisite_desc:0 "Une magnifique poupée de laine à l'effigie d'un dragon.[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]\n\n$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_exquisite_desc_modeled:0 "Une magnifique poupée de laine modelée à l'image de [chosen_dragon.GetNameNicknamed].[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]\n\n$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_simple_desc:0 "Une simple poupée de laine à l'effigie d'un dragon.[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]\n\n$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_simple_desc_modeled:0 "Une simple poupée de laine modelée à l'image de [chosen_dragon.GetNameNicknamed].[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]\n\n$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_creator:0 "Conçu personnellement par [creator.Custom('FR_le_Char_Pi')][creator.GetTitledFirstName] pour s[creator.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))], [child.GetFirstName]."
 agot_dragon_doll_color_vibrant_fit:0 " Malgré la myriade de couleurs vives, l'ensemble forme un coloris des plus harmonieux."
 agot_dragon_doll_color_vibrant_off:0 " La multitude de couleurs vives forme un bariolage coloré mais désordonné."
 agot_dragon_doll_color_vibrant_incoherent:0 "La multitude de couleurs vives forme un tout qui donne plus l'impression de voir une orgie sans queue ni tête qu'un travail d'artisan."
 agot_dragon_doll_color_simple_complement:0 "Le style simpliste se marie bien avec le coloris sobre."
 agot_dragon_doll_color_simple_clash:0 " Les couleurs semblent avoir été mises bout à bout sans réelle cohérence."
 agot_dragon_doll_color_monotone:0 " Les couleurs sont assez fades."
 agot_dragon_eyes_buttons:0 " Comme il est attendu de ce genre de poupée, de simples boutons servent d'yeux."
 agot_dragon_eyes_gems_off:0 " Des pierres précieuses ont été maladroitement fixées pour servir d'yeux."
 agot_dragon_eyes_gems_pop:0 " De sublimes gemmes font office d'yeux."
 agot_dragon_wings_large_fit:0 " Aux traits féroces de la bête s'ajoute un caractère mignon de par ses imposantes ailes."
 agot_dragon_wings_large_oversize:0 " La taille démesurée des ailes lui donne un caractère très étrange."
 agot_dragon_wings_large_goat:0 " Les ailes démesurées tombent aussi grotesquement que les oreilles d'une chèvre."
 agot_dragon_wings_small_fit:0 " C'est une bête féroce, pourvue d'un large corps et de mignonnes petites ailes."
 agot_dragon_wings_small_undersized:0 " À en juger par le reste du corps, les ailes sont bien trop petites."
 agot_dragon_wings_small_whale:0 " Cette férocité navigue à travers les cieux à l'aide d'ailes qui ressemblent à des nageoires de baleines."
 agot_dragon_wings_proportional_lopsided:0 " Aussi féroce que soit cette bête, l'asymétrie de ses ailes en ternit l'aura."
 agot_childhood_events.9001.t:0 "L'enfant, le dragon et la poupée"
 agot_childhood_events.9001.desc:0 "[child.GetFirstName] a finalement revendiqué un dragon.\n\nPuisqu'en comparaison d'une créature de feu et de chair, un simple morceau de laine et de tissu ne fait clairement pas le poids, je ne vois plus vraiment d'intérêt à poursuivre cet ouvrage."
 agot_childhood_events.9001.a:0 "Ce n'est pas plus mal."
 agot_dead_pirate_dragon_baby_name:0 "[dead_pirate_dragon_baby.GetNameNoTooltip]"
 agot_character_name:0 "[character.GetNameNoTooltip]"
 agot_childhood_events.0101.t:0 "La danse des lices"
 agot_childhood_events.0101.desc:0 "En flânant dans la cour je tombe sur [other_child.GetFirstName] qui croise le fer contre un ennemi aussi invincible qu'invisible — le bois plus que le fer à y regarder son épée de plus près.\n\n« [Select_CString(other_child.HasTrait( GetTrait('rude') ), 'Bouffe ça', 'Prends garde' )], [Select_CString(other_child.HasTrait( GetTrait('rude') ), 'bâtard', 'scélérat' )] ! » Ses mots rythment ses pas, qui semblent presque dansants, mais pas d'une danse que l'on enseigne aux filles.\n\nTandis que j'observe dans une curiosité silencieuse, sa chorégraphie virevoltante finit par lui faire remarquer ma présence.\n\n« [ROOT.Char.GetTitledFirstNameNoTooltip],[Select_CString(other_child.HasTrait( GetTrait('rude') ), '', ' pardonnez mes manières,' )] je ne vous avais pas vu. » [other_child.Custom('FR_IlElle')|U] ne m'avait pas vu, mais bien vite, c'est mon air intrigué qu'[other_child.Custom('FR_IlElle')] voit. « [Select_CString(other_child.HasTrait( GetTrait('rude') ), 'Ça vous tente', 'Peut-être voudriez-vous vous joindre à moi' )] ? »"
 agot_childhood_events.0101.desc.alone:0 "#italic La cour d'entraînement.#! Ce n'est pas un endroit où j'ai pour coutume de me rendre, car ce n'est tout simplement pas un endroit où la coutume souhaite la présence des filles.\n\nC'est là que sont posées négligemment deux épées d'entraînement. Probablement encore utilisé quelques heures plus tôt par des fils de courtisans partis précipitamment. \n\nQuelque chose cogite dans ma tête en voyant cela. Quelque chose qui ne devrait pas cogiter dans la tête d'une fille, certes, mais…"
 agot_childhood_events.0101.a:0 "J'en ai assez de jouer à la poupée."
 agot_childhood_events.0101.b:0 "Je saurais être l'égale des garçons !"
 agot_childhood_events.0101.c:0 "Ce ne sont pas des manières pour une fille."
 agot_childhood_events.0101.tt:0 "Vous allez entamer une formation à l'épée"
 agot_childhood_events.0102.t:0 "L'épée plutôt que l'aiguille"
 agot_childhood_events.0102.desc:0 "Cessant mon occupation du moment — [ROOT.Char.Custom('IdleActivity')] pour l'essentiel de la matinée — je me retrouve à musarder dans la cour d'entraînement, où j'y vois se dérouler un duel des plus singuliers. Deux enfants qui s'amusent l'épée en main — et en bois, fort heureusement.\n\nJe réalise subitement qu'il s'agit de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))], [child.GetFirstName], qui non seulement outrepasse sa condition, mais de surcroît, surpasse son concurrent.\n\nElle bondit de joie après lui avoir fait mordre la poussière, et bondit vers moi lorsqu'elle réalise que sa prouesse n'est pas passée inaperçue. « Vous avez vu ça ?! Je l'ai battu à plate couture ! Ah ! Quand je serai grande, je serais aussi forte et preuse que la Princesse Nymeria ! »"
 agot_childhood_events.0102.desc.alone:0 "Cessant mon occupation du moment — [ROOT.Char.Custom('IdleActivity')] pour l'essentiel de la matinée — je me retrouve à musarder dans la cour d'entraînement, où j'y découvre m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))], [child.GetFirstName], en prise avec un ennemi aussi invincible qu'invisible, qu'elle tente d'occire de son épée d'entraînement.\n\nElle bondit de joie à ma vue, mettant en suspens ses gesticulations pour se gargariser de hauts faits qui seront siens dans un futur lointain selon elle : « Je ne pensais pas que les jeux des garçons pouvaient être si amusants. J'en ai assez de coudre et de chanter. Quand je serai grande, je serais aussi forte et preuse que la Princesse Nymeria ! »"
 agot_childhood_events.0102.a:0 "Montrez-moi ce que vous avez appris d'autre."
 agot_childhood_events.0102.b:0 "S'il en est ainsi, alors vous apprendrez dans les règles de l'art."
 agot_childhood_events.0102.c:0 "Ce ne sont pas des manières dignes d'une [SelectLocalization(ROOT.Char.GetGovernment.HasGovernmentFlag( 'government_is_feudal' ), 'dame', 'fille de votre rang')]."
 agot_childhood_events.0102.tt:0 "[child.GetFirstNameNoTooltip] entamera une formation à l'épée"