l_french:
 agot_artifact_events.0010.t:0 "Le prix de la liberté"
 agot_artifact_events.0010.desc:0 "[prisoner.Custom('FR_le_Char_Pi')|U][prisoner.GetTitledFirstNameNicknamed] étant sous bonne garde, sa liberté ne dépend que de mon bon vouloir, lequel pourrait se montrer magnanime en échange d'une faveur… matérielle.\n\nBien entendu, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('prisoner'))] aura toute #italic liberté#! de ne point me céder ses biens, mais [prisoner.Custom('FR_IlElle')] ne serait pas so[prisoner.Custom('FR_TTte')] au point d'éconduire une main si gracieusement tendue, n'est-ce pas ?"
 agot_artifact_events.0010.a:0 "Voyons à combien [prisoner.Custom('FR_IlElle')] estime sa liberté…"
 agot_artifact_events.0010.a_tt:0 "Vous allez considérer l'éventualité d'exiger ou non chacun des artefacts en possession [prisoner.Custom('FR_du_Char_Pi')][prisoner.GetTitledFirstNameNoTooltip]"
 agot_artifact_events.0010.a_tt_artifact:0 "Vous allez décider d'exiger ou non [artifact_to_inform.GetName]"
 agot_artifact_events.0010.b:0 "Je dois réévaluer mes exigences."
 agot_artifact_events.0010.c:0 "Cela devrait suffire."
 agot_artifact_events.0010.c_tt:0 "Vous allez exiger [artifact_to_show.GetName]"
 agot_artifact_events.0011.t:0 "$agot_artifact_events.0010.t$"
 agot_artifact_events.0011.desc:0 "Voyons ce que nous avons là…\n\n[artifact_to_steal.GetName].\n\nJe peux l'ajouter à la liste des biens que je souhaite acquérir en échange de sa liberté, mais encore faut-il qu'[prisoner.Custom('FR_IlElle')] soit disposé[prisoner.Custom('FR_E')] à s'en séparer…"
 agot_artifact_events.0011.a:0 "Ajoutons cela à la liste."
 agot_artifact_events.0011.a_valyrian_tt_no_house:0 "Si [prisoner.Custom('FR_le_Char_Pi')][prisoner.GetTitledFirstNameNoTooltip] accepte de vous céder [artifact_to_steal.GetNameNoTooltip], vous vous attirerez es foudres de la Maison [prisoner.GetHouse.GetNameNoTooltip]"
 agot_artifact_events.0011.a_illustrious:0 "Du fait de sa rareté, prendre cet artefact comme rançon vous coûtera #N 1000#! [prestige_i|E]"
 agot_artifact_events.0011.a_famed:0 "Du fait de sa rareté, prendre cet artefact comme rançon vous coûtera #N 500#! [prestige_i|E]"
 agot_artifact_events.0011.a_masterwork:0 "Du fait de sa rareté, prendre cet artefact comme rançon vous coûtera #N 250#! [prestige_i|E]"
 agot_artifact_events.0011.a_common:0 "Du fait de sa rareté, prendre cet artefact comme rançon vous coûtera #N 100#! [prestige_i|E]"
 agot_artifact_events.0011.b:0 "Je n'ai que faire de cela."
 agot_artifact_events.0011.b_tt:0 "[prisoner.Custom('FR_le_Char_Pi')|U][prisoner.GetTitledFirstNameNoTooltip] restera [prisoner.Custom('FR_LeLa')] propriétaire de cet artefact."
 agot_artifact_events.0011.c:0 "On ne va pas y passer la journée..."