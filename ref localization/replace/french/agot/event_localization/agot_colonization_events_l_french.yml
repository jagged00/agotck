l_french:
 agot_colonization_events.1001.t:0 "[obstacle_province.GetNameNoTooltip] : Loup-y-es-tu ?"
 agot_colonization_events.1001.desc:0 "Une fois encore un rapport d'éclaireur me parvient, et une fois encore il ne m'apporte aucune satisfaction.\n\nCombien sont-ils à arpenter les [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')] à la recherche de ces maudites créatures ? N'y aurait-il finalement pas quelques sorcelleries ou malédictions derrière toutes ces histoires de loups qui rôdent à [obstacle_province.GetName] ? Cette idée commence à germer dans mon esprit, quand surgit à l'improviste une silhouette dépenaillée et au regard pesant d'informations à partager.\n\n« [ROOT.Char.GetTitledFirstNameNoTooltip], je les ai débusqués ! » m'informe l'éclaireur venu me délivrer de la tourmente."
 agot_colonization_events.1001.a:0 "Allez me quérir m[ROOT.Char.Custom('FR_OnA_signature_weapon')], je m'en vais les occire moi-même !"
 agot_colonization_events.1001.a.duel_success:0 "Vous parvenez à terrasser les loups"
 agot_colonization_events.1001.a.duel_failure:0 "Vous avez sous-estimé la dangerosité des loups"
 agot_colonization_events.1001.b:0 "L'un de mes [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] peut s'en charger. [knight.Custom('FR_le_Char_Pi')|U][knight.GetTitledFirstName] par exemple."
 agot_colonization_events.1001.b.duel_success:0 "[knight.GetFirstNameNoTooltip] parvient à terrasser les loups"
 agot_colonization_events.1001.b.duel_failure:0 "[knight.GetFirstNameNoTooltip] a sous-estimé la dangerosité des loups"
 agot_colonization_events.1001.c:0 "Il est temps pour [hooked_character.Custom('FR_le_Char_Pi')][hooked_character.GetTitledFirstName] de régler sa dette envers moi."
 agot_colonization_events.1001.c.duel_success:0 "[hooked_character.GetFirstNameNoTooltip] parvient à terrasser les loups"
 agot_colonization_events.1001.c.duel_failure:0 "[hooked_character.GetFirstNameNoTooltip] a sous-estimé la dangerosité des loups"
 agot_colonization_events.1001.d:0 "C'est le genre de besogne qui requiert des professionnels."
 agot_colonization_events.1001.e:0 "La peste soit ces loups, je m'occuperai de cette affaire plus tard."
 agot_colonization_events.1001.success.toast.t:0 "Les loups ne sont plus un problème pour [obstacle_province.GetNameNoTooltip]"
 agot_colonization_events.1001.failure.toast.t:0 "Les loups sont toujours un problème pour [obstacle_province.GetNameNoTooltip]"
 agot_colonization_events.1002.t:0 "[obstacle_province.GetNameNoTooltip] : Tapis dans l'ombre"
 agot_colonization_events.1002.desc:0 "J'avais escompté atteindre la colonie de [obstacle_province.GetName] avant que l'obscurité ne nous rattrape, mais c'était oublié les multiples retards que nous avons soufferts tout du long. À la faveur d'un crépuscule naissant, nous avons établi notre campement, laissant les flammes crépitantes nous garder de tous dangers qui viendraient nous porter ombrage, avec pour seul toit le ciel étoilé. Néanmoins, nous réalisons bien vite qu'un feu de camp ne sera pas suffisant pour ce qui se terre dans le noir.\n\nDeux prunelles étincelantes s'avancent, telles des bannières dressées avec hostilité. Un grognement rythme la marche comme le ferait un tambour, et au loin, un cor se met à hurler, dévoilant une ribambelle d'autres yeux. C'est une déclaration de guerre ! Nous avons empiété sur le territoire d'une meute de loups, celle-là même qui a tant fait de bruit au sein de la colonie, et il va nous falloir batailler pour arracher la victoire à nos ennemis."
 agot_colonization_events.1002.a:0 "Compagnons, il y a du loup au menu de ce soir !"
 agot_colonization_events.1002.b:0 "[knight.GetFirstNameNoTooltip] ! Protégez votre [ROOT.Char.GetTitleAsNameNoTooltip|l], que diable !"
 agot_colonization_events.1002.c:0 "Attrapons quelques torches et déguerpissons en vitesse !"
 agot_colonization_events.1003.t:0 "[obstacle_province.GetNameNoTooltip] : La mère louve"
 agot_colonization_events.1003.desc:0 "Il n'aura pas fallu moins de quelques mois pour enfin parvenir à trouver la tanière où se terrent les loups qui menaçaient avec tant d'acharnement [obstacle_province.GetName]. La meute n'était pas seulement imposante, mais également diablement rusée, mais faisant fi de tous dangers, nous avons réussi à en venir à bout, du moins en partie…\n\nMaintes fourrures sont déjà entassées au camp, et pourtant prendre d'assaut la tanière suscite encore force agitation, car y demeure toujours la louve dominante, celle qui fut à leur tête. D'une taille avoisinant celle d'un poney, pourvu d'un museau tacheté du sang de ses victimes, ce n'est pas là un ennemi qu'il faut sous-estimer. Et pour ne rien arranger à la situation, une poignée de louveteaux se trouve à ses côtés.\n\nOutre une imposante bête fauve, nous avons donc là une mère, qui, comme toute mère qui se respecte, se montrera particulièrement féroce à l'idée de protéger ses enfants."
 agot_colonization_events.1003.a:0 "Écartez-vous ! La louve est à moi !"
 agot_colonization_events.1003.a.duel_success:0 "Vous parvenez à occire la bête"
 agot_colonization_events.1003.a.duel_failure:0 "Vous échouez à occire la bête"
 agot_colonization_events.1003.b:0 "En formation ! Nous allons mettre à bas ce monstre !"
 agot_colonization_events.1003.b.duel_success:0 "Vous parvenez à acculer la bête"
 agot_colonization_events.1003.b.duel_failure:0 "La bête parvient à s'escamper"
 agot_colonization_events.1003.c:0 "Nous reviendrons quand le moment sera plus opportun."
 agot_colonization_events.1004.t:0 "[obstacle_province.GetNameNoTooltip] : Une espèce hybride"
 agot_colonization_events.1004.desc:0 "De singulières nouvelles me parviennent de [obstacle_province.GetName]. Il y est question d'un grand nombre de chiens domestiques introduits par les colons sur les terres. Ces animaux ont toujours fait office de loyaux gardiens et de compagnons fidèles pour veiller tant sur le bétail que sur le foyer, mais cette prolifération n'a pas que de bons côtés. La raréfaction des loups dans la région et la hausse de la population des chiens ont entraîné la prolifération d'une espèce hybride.\n\nCes « chiens-loups » possèdent le tempérament des uns, et les traits des autres, et leur popularité croissante au sein de la population locale soulève diverses questions, notamment le risque qu'ils pourraient être trop sauvages pour l'usage familier que l'on a des chiens. Du reste, il n'est pas inenvisageable qu'une explosion démographique entraîne l'apparition de meutes sauvages à travers les [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')]."
 agot_colonization_events.1004.a:0 "Cette pratique doit cesser… et la population être régulée…"
 agot_colonization_events.1004.b:0 "La force du loup et la loyauté du chien ?"
 agot_colonization_events.1004.c:0 "Cela pourrait faire une fantastique partie de chasse."
 agot_colonization_events.1004.a.duel_success:0 "Un loup est prêt à être [Concept('hunt_sighting','chassé')|E] à [obstacle_province.GetName]"
 agot_colonization_events.1004.a.success.toast.t:0 "Les loups sont relâchés dans la nature"
 agot_colonization_events.1004.a.duel_failure:0 "Les loups ne sont pas relâchés dans la nature"
 agot_colonization_events.1004.a.failure.toast.t:0 "Population indignée"
 agot_colonization_events.1004.b.duel_success:0 "Vous parvenez à entraîner l'un des chiens-loups"
 agot_colonization_events.1004.b.success.toast.t:0 "Le meilleur ami de l'Homme"
 agot_colonization_events.1004.b.duel_failure:0 "Vous échouez à apprivoiser l'un des chiens-loups"
 agot_colonization_events.1004.b.failure.toast.t:0 "Une nature indomptable"
 agot_colonization_events.1005.t:0 "[obstacle_province.GetNameNoTooltip] : Devine qui vient rôder…"
 agot_colonization_events.1005.desc:0 "Les nouvelles qui me parviennent de [obstacle_province.GetName] sont pour le moins… glaçantes. L'on me rapporte un nombre d'attaques croissantes de loups. Les meutes qui parcourent les [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')], enhardies par les intrusions répétées sur leur territoire, multiplient les attaques, faisant sombrer la population dans la tourmente.\n\nLeur férocité, nullement réfrénée par la peur, les amène à rôder dans les rues en pleine nuit. Si je n'agis pas dare-dare, bientôt l'on viendra m'apporter des nouvelles plus terribles encore."
 agot_colonization_events.1005.a:0 "Armons la populace et organisons une battue !"
 agot_colonization_events.1005.a.duel_success:0 "La tanière des loups a été vidée de ses résidents"
 agot_colonization_events.1005.a.duel_failure:0 "La menace des loups s'est intensifiée, la colonie a été perdue"
 agot_colonization_events.1005.success.toast.t:0 "La menace a été écartée !"
 agot_colonization_events.1005.failure.toast.t:0 "Le danger rôde toujours"
 agot_colonization_events.1005.b:0 "Rassemblez les villageois et brûlez-moi cette nuisance !"
 agot_colonization_events.1005.b.duel_success:0 "La tanière est purgée par le feu"
 agot_colonization_events.1005.b.duel_failure:0 "La menace des loups s'est intensifiée, la colonie a été perdue"
 agot_colonization_events.1005.c:0 "Il ne reste qu'à prier la miséricorde [ROOT.Char.GetFaith.PantheonTerm3]."
 agot_colonization_events.1006.t:0 "[obstacle_province.GetNameNoTooltip] : À chasseur, chasseur et demi"
 agot_colonization_events.1006.desc:0 "La chasse bénigne qui avait débuté au bris de l'aube s'est transformée en récit d'horreur au soir venu. La traque de cette grande bête, tout de noir velu, m'aura conduit jusqu'aux tréfonds d'une grotte. Les corps des loups terrassés et des hommes dépecés gisent ça et là, narrant la boucherie qui a fait de moi [ROOT.Char.Custom('FR_LeLa')] seul[ROOT.Char.Custom('FR_E')] survivant[ROOT.Char.Custom('FR_E')], esseulé[ROOT.Char.Custom('FR_E')] et acculé[ROOT.Char.Custom('FR_E')], la tanière pour geôle et le loup d'ébène pour bourreau.\n\nD'aussi loin que je puisse remonter le cours de ma mémoire, je n'ai pas le souvenir d'avoir vu pareil spécimen. Et plus encore que sa taille, c'est cet éclat dans son regard qui me terrifie, comme une vivacité d'esprit vengeresse. Est-ce réellement un loup fait de chair ? Ou bien un démon surgit [ROOT.Char.GetFaith.NegativeAfterLife3] ? Je chasse ces interrogations pour me concentrer sur le plus important à l'heure actuelle : ma survie !"
 agot_colonization_events.1006.a:0 "Approche ta jolie petite gueule de m[ROOT.Char.Custom('FR_OnA_signature_weapon')] !"
 agot_colonization_events.1006.a.duel_success:0 "Les loups sont tous morts"
 agot_colonization_events.1006.a.duel_failure:0 "Il reste encore des loups pour menacer la région"
 agot_colonization_events.1006.success.toast.t:0 "La menace a été écartée !"
 agot_colonization_events.1006.failure.toast.t:0 "Le danger rôde toujours"
 agot_colonization_events.1006.b:0 "Il n'y a guère que le feu pour venir à bout d'une telle engeance..."
 agot_colonization_events.1006.c:0 "Le courage de fuir, c'est la seule chose qu'il me reste."
 agot_colonization_events.1006.b.duel_success:0 "La tanière des loups a été vidée de ses résidents"
 agot_colonization_events.1006.b.duel_failure:0 "Il reste encore des loups pour menacer la région"
 agot_colonization_events.1007.t:0 "[obstacle_province.GetNameNoTooltip] : La colline a des yeux"
 agot_colonization_events.1007.desc:0 "« Les bonnes gens de [obstacle_province.GetName] s'efforcent de rendre la colonie viable, m'informe un messager fraîchement débarqué dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')]. La plupart des loups qui vivaient dans ces [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')] ont été éradiqués. » Ces quelques mots pourraient suffire à rendre cette journée plus agréable, mais outre les bonnes nouvelles, le messager a également une requête à transmettre de la part des colons. « Néanmoins, une bonne poignée a survécu et s'est installée dans des collines aux abords de la frontière. Votre concours dans leur anéantissement est sollicité. »\n\nD'un côté, on me demande de dépêcher une petite troupe pour achever le travail déjà bien entamé, de l'autre, mon [steward.Custom('GetCouncilOrCourtPosition')|l] [steward.GetFirstName], préconise la retenue : « Boutés à la frontière, ce qu'il reste des loups ne survivra guère longtemps. Gardez l'épée au fourreau et laissez au temps le soin de porter le coup final à cette affaire. »"
 agot_colonization_events.1007.a:0 "Il serait grotesque de laisser passer l'occasion d'en finir dès maintenant !"
 agot_colonization_events.1007.b:0 "Soit. Faisons preuve de retenue."
 agot_colonization_events.1007.success.toast.t:0 "Les loups ont fini par se disperser d'eux-même"
 agot_colonization_events.1007.failure.toast.t:0 "Les loups restent toujours une menace pour [obstacle_province.GetNameNoTooltip]"
 agot_colonization_events.1008.t:0 "[obstacle_province.GetNameNoTooltip] : Féru de chasse"
 agot_colonization_events.1008.desc:0 "Les nombreux efforts déployés pour endiguer la prolifération des loups à [obstacle_province.GetName] a porté ses fruits, mais le zèle déployé a fini par entraîner une conséquence inattendue. L'organisation des chasseurs pour faciliter la coordination a abouti à la formation de simili-guilde à travers la région.\n\nL'abatage des loups en devient plus aisé et plus sûr, mais ce qui n'était qu'une simple activité sportive semble muer en une pratique culturelle, la chasse devenant de plus en plus populaire auprès des communautés locales."
 agot_colonization_events.1008.a:0 "Voilà qui est intéressant."
 agot_colonization_events.1008.success.toast.t:0 "La chasse a été encouragée !"
 agot_colonization_events.1008.failure.toast.t:0 "La chasse prend des proportions inquiétantes !"
 agot_colonization_events.1008.b:0 "Nous devrions favoriser de telles pratiques !"
 agot_colonization_events.1008.b.duel_success:0 "Vous encouragez avec brio ces pratiques sportives"
 agot_colonization_events.1008.b.duel_failure:0 "La chasse prend des proportions inquiétantes..."
 agot_colonization_events.1008.c:0 "J'aurais beaucoup à apprendre de ces bonnes gens."
 agot_colonization_events.1009.t:0 "[obstacle_province.GetNameNoTooltip] : Des hurlements dans le noir"
 agot_colonization_events.1009.desc:0 "En visite d'inspection à [obstacle_province.GetName], l'effroi me saisit lorsque je constate l'état des lieux. Des habitations désertées, des habitants démunis, et de maigres palissades de fortune qui ne tiennent debout que par la bonne grâce de fourches plantées à même le sol. Rapporté par quelques pauvres hères croisés en chemin, les nouvelles font état d'attaques virulentes de loups à la population croissante. Survivre dans ces [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')] semble être devenu une véritable gageure !\n\nDans la précipitation du voyage de retour, quelques membres de la suite et moi-même nous retrouvons isolés, voilés par l'obscurité qui s'abat sur nous sans crier gare. Le feu des torches devient le dernier rempart contre les maux qui hantent ces contrées, et les hurlements qui foisonnent au-delà de ce que nos yeux perçoivent me font l'effet de cors sonnant notre glas. L'éclat de notre salut faiblit, tandis que notre perte avance à pas de loup, seulement trahie par des grognements annonciateurs d'une mort horrible."
 agot_colonization_events.1009.a:0 "En formation ! Et tenez la position !"
 agot_colonization_events.1009.a.duel_success:0 "Votre expertise militaire supplante la férocité de vos adversaires"
 agot_colonization_events.1009.a.duel_failure:0 "Votre expertise militaire ne fait pas le poids face à ces bêtes fauves"
 agot_colonization_events.1009.success.toast.t:0 "Les loups ont été mis en déroute"
 agot_colonization_events.1009.failure.toast.t:0 "Les loups vous laissent dans un sale état !"
 agot_colonization_events.1009.b:0 "Servez-vous des torches pour les tenir éloignés !"
 agot_colonization_events.1009.b.duel_success:0 "Le feu réussit à mettre en déroute les loups"
 agot_colonization_events.1009.b.duel_failure:0 "Le feu ne s'avère pas suffisant…"
 agot_colonization_events.1009.c:0 "[knight.GetFirstName] ! Au nom [ROOT.Char.GetFaith.WarGodNamePossessive], faites quelque chose !"
 agot_colonization_events.1009.c.duel_success:0 "[knight.GetFirstNameNoTooltip] parvient à vaillamment repousser les loups"
 agot_colonization_events.1009.c.duel_failure:0 "[knight.GetFirstNameNoTooltip] et vous finissez dans un sale état"
 agot_colonization_events.1101.t:0 "[obstacle_province.GetNameNoTooltip] : Yoh-gi"
 agot_colonization_events.1101.desc:0 "Les colons installés à [obstacle_province.GetName] sont devenus costumiers de la présence des ours dans ces contrées. La prudence suffit bien souvent à se garder du danger, et la cacophonie du métal qui s'entrechoque effrite la curiosité des spécimens trop curieux.\n\nPourtant, il existe dans ces [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')] un ours bien différent des autres. Nommé « Yoh-gi » par les habitants, selon un dialecte local, il apparaît comme étant plus rusé que ses congénères. Nombreux sont les travailleurs à faire mention d'un ours les ayant sournoisement traqués, pour finalement dérober leurs vivres dès lors qu'ils prennent la poudre d'escampette.\n\nDe houleuses controverses sont soulevées pour savoir comment régler cet épineux problème. La colonie a fait appel à des professionnels pour organiser une battue, le forgeron quant à lui a sa propre vision des choses : « Rien qu’un con de bestiasse, voilà s’que c'est. Trappez le sol, foutez-y du miel, et v’là-t-i’ pas une nouvelle paillasse pour vot' [ROOT.Char.Custom('ResidenceBuilding')]. »"
 agot_colonization_events.1101.a:0 "La battue me parait être une bonne idée."
 agot_colonization_events.1101.a.duel_success:0 "Yoh-gi est terrassé avec le reste de ses congénères"
 agot_colonization_events.1101.a.duel_failure:0 "Yoh-gi se joue habilement de la battue"
 agot_colonization_events.1101.b:0 "Va pour l'idée du forgeron."
 agot_colonization_events.1101.c:0 "Je vais aller personnellement embrocher cette bête !"
 agot_colonization_events.1101.c.duel_success:0 "Vous parvenez à terrasser Yoh-gi avec le reste de ses congénères"
 agot_colonization_events.1101.c.duel_failure:0 "Yoh-gi se montre plus habile que vous"
 agot_colonization_events.1101.d:0 "Laissez donc cette pauvre bête tranquille."
 agot_colonization_events.1101.success.toast.t:0 "La tanière a été nettoyée"
 agot_colonization_events.1101.failure.toast.t:0 "Les ours demeurent un danger"
 agot_colonization_events.1102.t:0 "[obstacle_province.GetNameNoTooltip] : La complainte de l'ours"
 agot_colonization_events.1102.desc:0 "Quatre jours et quatre nuits auront été nécessaires pour arriver au bout de cette fastidieuse traque dans les [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')] de [obstacle_province.GetName]. À l'orée d'une caverne se dresse un ours colossal, dont le rugissement tonne avec fracas. De ce que je crois être un signe avant-coureur d'une charge bestiale ne résulte qu'une longue attente. Le monstre serait-il trop pleutre pour se risquer à quitter la sécurité de sa tanière ? J'en déduis que oui et prends l'initiative de l'attaque. J'enfonce une lance au plus profond de sa poitrine, et quelques gesticulations plus tard, il rend son dernier souffle. Avant que l'éclat de vie dans ses yeux ne s'efface, je pourrais jurer y voir une forme de supplication.\n\nLe monstre est mort dans un dernier grognement d'agonie, et pourtant, j'ai comme l'impression de continuer à l'entendre.\n\nAu tréfonds de la grotte se trouve un ourson, qui crie, comme un nourrisson réclamant sa mère. Je n'ai pas mis à bas ni un monstre ni un pleutre, juste une ourse veillant sur son petit. Et me voilà, grandi[ROOT.Char.Custom('FR_E')] par la bassesse d'une vaine gloire, une lance à la main, face à la bête orpheline…"
 agot_colonization_events.1102.a:0 "Un coup net pour une miséricorde prompte."
 agot_colonization_events.1102.b:0 "N'aie crainte maman ourse, je veillerai sur ton petit."
 agot_colonization_events.1102.b.success.toast.t:0 "Vous réussissiez à apprivoiser la bête"
 agot_colonization_events.1102.b.failure.toast.t:0 "Vous échouez à apprivoiser la bête"
 agot_colonization_events.1102.c:0 "Il devra apprendre à survivre par lui-même..."
 agot_colonization_events.1103.t:0 "[obstacle_province.GetNameNoTooltip]: The Raid"
 agot_colonization_events.1103.desc:0 "The new settlement at [obstacle_province.GetNameNoTier] is shaping up nicely. A cluster of buildings has already sprung up, smoke rising to the sky from myriad chimneys and fire-pits. Land has been cleared for farming, and the wilderness is gradually giving way to a tamed and tended landscape. As I muse on the progress that has been made, my reverie is interrupted by a scream.\n\nA bear! Its giant hulk bounds into the heart of the settlement, scattering colonists like skittles."
 agot_colonization_events.1103.a:0 "Bring me a bow! I will bring it down myself."
 agot_colonization_events.1103.a.duel_success:0 "You manage to kill the bear"
 agot_colonization_events.1103.a.duel_failure:0 "You fail to kill the bear"
 agot_colonization_events.1103.b:0 "Sound the horns! We must put an end to this!"
 agot_colonization_events.1103.b.duel_success:0 "Your party manages to kill the bear"
 agot_colonization_events.1103.b.duel_failure:0 "Your party failed to kill the bear"
 agot_colonization_events.1103.c:0 "Flee! This foe is greater than any of us"
 agot_colonization_events.1103.failure.toast.t:0 "Bear Den Remains"
 agot_colonization_events.1103.success.toast.t:0 "Bear Den Cleared"
 agot_colonization_events.1104.t:0 "[obstacle_province.GetNameNoTooltip]: Mushroom Bear"
 agot_colonization_events.1104.desc:0 "My [steward.Custom('GetCouncilOrCourtPosition')] [steward.GetFirstName] brings me news from our nascent colony at [obstacle_province.GetName]. It is such a baffling tale that [steward.GetFirstNameNoTooltip] insisted on verifying it before bringing it to me, but he is now certain of its veracity. It seems that one of our colonists has discovered a particularly potent form of mushroom, the consumption of which gives astonishing visions and feelings of intense euphoria.\n\nThat may be all well and good, but a cultivated patch of mushrooms has been raided by a local bear of fearsome size. This bear has subsequently gone on a rampage of immense proportions, destroying houses and storerooms and slaughtering settlers, such that the colony now faces an existential threat."
 agot_colonization_events.1104.a:0 "Divert some of our levies to deal with this furry threat."
 agot_colonization_events.1104.a.duel_failure:0 "Your levies fail to drive off the bear"
 agot_colonization_events.1104.a.duel_success:0 "Your levies successfully drive off the bear"
 agot_colonization_events.1104.b:0 "Dig a spiked pit and lure the bear with fresh fungus"
 agot_colonization_events.1104.b.duel_failure:0 "The bear manages to escape your trap"
 agot_colonization_events.1104.b.duel_success:0 "You successfully lure the bear into your trap"
 agot_colonization_events.1104.c:0 "I would like to try some of these mushrooms... for medicinal purposes."
 agot_colonization_events.1104.c.success.toast.t:0 "Shroomed Up"
 agot_colonization_events.1104.c.failure.toast.t:0 "Shroomed Down"
 agot_colonization_events.1104.failure.toast.t:0 "Bear Den Remains"
 agot_colonization_events.1104.success.toast.t:0 "Bear Driven Off"
 agot_colonization_events.1105.t:0 "[obstacle_province.GetNameNoTooltip]: More Than Meets the Eye"
 agot_colonization_events.1105.desc:0 "The lands surrounding [obstacle_province.GetName] have long been renowned for the large bears that make their home there.\n\nAs I visit my colony to check on its progress, I am accosted on the road by what seems to be a small family of massive bears. Seemingly leading them is a massive beast of a man, who demands that we leave their lands lest they extract vengeance for all the bears we have slain."
 agot_colonization_events.1105.a:0 "I should like to see you try, savage!"
 agot_colonization_events.1105.b:0 "Keep your bears away from our settlements..."
 agot_colonization_events.1105.c:0 "We were just leaving, weren't we, fellows?"
 agot_colonization_events.1105.toast.t:0 "The bear remains"
 agot_colonization_events.1105.a.duel_success:0 "You drive off the skinchanger"
 agot_colonization_events.1105.a.success.toast.t:0 "Bear Den Cleared"
 agot_colonization_events.1105.a.duel_failure:0 "You fail to drive off the skinchanger"
 agot_colonization_events.1105.a.failure.toast.t:0 "Wounded hunting bears"
 agot_colonization_events.1105.b.duel_success:0 "You manage to strike a deal with the skinchanger"
 agot_colonization_events.1105.b.success.toast.t:0 "Co-exist"
 agot_colonization_events.1105.b.duel_failure:0 "You fail to strike a deal with the skinchanger"
 agot_colonization_events.1105.b.failure.toast.t:0 "Bear Den Remains"
 agot_colonization_events.1106.t:0 "[obstacle_province.GetNameNoTooltip]: The Man-Eater"
 agot_colonization_events.1106.desc:0 "It watches in the night. Seven feet tall, and half a ton in weight. Its hide is thicker and tougher than dragon scales, its fangs and claws greater than swords, the stench of its breath more putrid than a meadow after battle. It bears the scars of a hundred battles, and its face shows the wear and bruises of a hundred years.\n\nAt least, that's what the letters from [obstacle_province.GetName] tell me. It is likely that at least some of the facts about this great bear are exaggerated, yet their feeling is clear. They report many things: that it is nigh invincible; that it has survived a thousand arrows; that it slaughters hunting parties of fifty men; and that it enters the village at night, unseen, to slaughter livestock and townsfolk — especially townsfolk! The colonists are clear: they plead for aid, for anything; for this terror of the night to be rid of once and for all."
 agot_colonization_events.1106.success.toast.t:0 "Bear Killed"
 agot_colonization_events.1106.failure.toast.t:0 "Bear Den Remains"
 agot_colonization_events.1106.a:0 "Send my finest warriors to slaughter this beast!"
 agot_colonization_events.1106.b:0 "[marshal.GetFirstName], rally the colonists and bring me this bear's head."
 agot_colonization_events.1106.b.duel_success:0 "Bear is killed"
 agot_colonization_events.1106.b.duel_failure:0 "Bear survived"
 agot_colonization_events.1106.c:0 "Ah, 'tis naught but the superstition of peasants! They can deal with the bear themselves."
 agot_colonization_events.1107.t:0 "[obstacle_province.GetNameNoTooltip]: Hated Enemies"
 agot_colonization_events.1107.desc:0 "As the colony in [obstacle_province.GetName] grows, the troublesome bear population in the area is hunted down — safety, food, and mere sport. But it seems that our actions have incurred the ire of these bears, as while I visit the colony to check on its progress, we come under siege by the damned things, alongside what is by far the largest bear I have ever seen. Worse yet, it looks to be commanding the smaller bears somehow!"
 agot_colonization_events.1107.success.toast.t:0 "Bear Killed"
 agot_colonization_events.1107.failure.toast.t:0 "Bear Den Remains"
 agot_colonization_events.1107.a:0 "It's bear season, boys!"
 agot_colonization_events.1107.b:0 "Cut that big beastie's head off, and the bears will disperse."
 agot_colonization_events.1107.duel_success:0 "Bear is killed"
 agot_colonization_events.1107.duel_failure:0 "Bear survived"
 agot_colonization_events.1107.c:0 "Distract them for me while I, er, go to get reinforcements!"
 agot_colonization_events.1108.t:0 "[obstacle_province.GetNameNoTooltip]: Bear-Baiting"
 agot_colonization_events.1108.desc:0 "Deciding to visit [obstacle_province.GetName] to check up on the place, I am greeted with a lavish festival to mark my arrival. Food is piled high, and drink flows. At the peak of the revelry, I am led to a large arena and seated on the high seat. A number of mean-looking, large dogs are brought into the pit of the arena from one door. And then, to my great surprise, a sad-looking bear slowly lumbers out from the other!\n\nLike a shot, the dogs charge at the beast, snapping at it. The whole ordeal quickly becomes an orgy of blood, but eventually, the bear is brought low by the surviving hound. As I turn to look at the smiling governor sitting next to me, I consider my reaction to the spectacle."
 agot_colonization_events.1108.a:0 "Now that's what I call entertainment!"
 agot_colonization_events.1108.b:0 "This is a disgusting practice, and you shall not do it again!"
 agot_colonization_events.1108.c:0 "...How do I make money from this?"
 agot_colonization_events.1108.c.duel_success:0 "You successfully monetize these bear fights"
 agot_colonization_events.1108.success.toast.t:0 "Successful Monetization"
 agot_colonization_events.1108.c.duel_failure:0 "You fail to monetize these bear fights"
 agot_colonization_events.1108.failure.toast.t:0 "Failed Monetization"
 agot_colonization_events.1109.t:0 "[obstacle_province.GetNameNoTooltip]: Sloth and Savagery"
 agot_colonization_events.1109.desc:0 "Some rather concerning news arrives on my desk this morning from [obstacle_province.GetName]. The local bear population found there has, since the settlement's beginning, been a constant thorn in the side of the locals due to the aggressive nature of the beasts. Maned, sickle-clawed, and shaggy-furred are these bears, but what makes them so dangerous is their savagery — attacking people with little provocation and little warning. Things have gotten so bad that I have been personally requested by the local governor to step in and deal with the threat these sloth bears pose."
 agot_colonization_events.1109.success.toast.t:0 "Bear Killed"
 agot_colonization_events.1109.failure.toast.t:0 "Bear Den Remains"
 agot_colonization_events.1109.a:0 "[knight.GetFirstName], care to go bear hunting?"
 agot_colonization_events.1109.b:0 "Someone pass me my good bear spear!"
 agot_colonization_events.1109.duel_success:0 "Bear is killed"
 agot_colonization_events.1109.duel_failure:0 "Bear survived"
 agot_colonization_events.1109.c:0 "All very interesting, but I simply do not have the time."
 agot_colonization_events.1201.t:0 "[obstacle_province.GetNameNoTooltip] : Les parias"
 agot_colonization_events.1201.desc.1:0 "Cela fait maintenant plusieurs semaines que je reçois régulièrement des missives provenant de [obstacle_province.GetName]. La colonie souffre d'une bande de hors-la-loi qui sévit dans la région, n'ayant de cesse de piller ses réserves de vivres."
 agot_colonization_events.1201.desc.2.marshal:0 "Mon [marshal.GetCouncilTitle|l], [marshal.Custom('FR_le_Char_Pi')][marshal.GetTitledFirstName], suggère ni plus ni moins qu'une expédition punitive pour redresser ce tort. « Le billot ou la corde, [ROOT.Char.Custom('FR_MonseigneurMadame')]. Ce ne sont pas là des méthodes très élégantes, mais elles ont déjà fait leur preuve. »\n\nNéanmoins, j'entends un autre son de cloche "
 agot_colonization_events.1201.desc.2.knight:0 "My military advisor, [marshal.GetName], suggests a punitive expedition to drive the bandits away.\n\nHowever, "
 agot_colonization_events.1201.desc.3.spymaster:0 "de la part de mon [spymaster.GetCouncilTitle|l], [spymaster.Custom('FR_le_Char_Pi')][spymaster.GetTitledFirstName]. Selon ses informations, les hors-la-loi seraient d'anciens colons, chassés de chez eux par des soldats qui voyaient plus de facilité à dérober qu'à construire.\n\nLa situation apparaît donc comme plus alambiquée qu'une banale affaire de bandits."
 agot_colonization_events.1201.desc.3.scholar:0 "the scholar, [spymaster.GetName], whispers that there is more to this situation than meets the eye. It seems the outlaws were among the earliest colonists, and for the most part, were upstanding subjects — until driven from their homes by former soldiers who were better armed and less inclined to construct shelters with their own hands when they could steal those that had already been built."
 agot_colonization_events.1201.a:0 "Ce sont des criminels, le reste m'importe peu."
 agot_colonization_events.1201.a.duel_success:0 "Les fauteurs de troubles ont goûté à votre justice expéditive."
 agot_colonization_events.1201.a.duel_failure:0 "Votre expédition punitive est mise en déroute."
 agot_colonization_events.1201.b:0 "Cette profonde injustice doit être réparée !"
 agot_colonization_events.1201.b.duel_success:0 "Les hors-la-loi sont graciés et leurs terres rendues"
 agot_colonization_events.1201.b.duel_failure:0 "Vos efforts pour rendre justice échouent"
 agot_colonization_events.1201.c:0 "Nous pourrions trouver un compromis..."
 agot_colonization_events.1201.c.duel_success:0 "Vous parvenez à un accord entre les hors-la-loi et les colons"
 agot_colonization_events.1201.c.duel_failure:0 "Aucun accord n'est trouvé entre les hors-la-loi et les colons"
 agot_colonization_events.1201.d:0 "Il y a plus important que de vulgaires histoires de rapines."
 agot_colonization_events.1201.success.toast.t:0 "La menace des bandits est écartée"
 agot_colonization_events.1201.failure.toast.t:0 "Les bandits demeurent toujours une menace"
 agot_colonization_events.1202.t:0 "[obstacle_province.GetNameNoTooltip] : Cerné de toute part"
 agot_colonization_events.1202.desc.marshal:0 "« [ROOT.Char.Custom('FR_MonseigneurMadame')|U], des nouvelles de la colonie de [obstacle_province.GetName]… » relate mon [marshal.GetCouncilTitle], [marshal.Custom('FR_le_Char_Pi')][marshal.GetTitledFirstName]. Je pourrais craindre le pire, mais son faciès sans équivoque me laisse comprendre que ces nouvelles sont bonnes.\n\nLe repaire des bandits qui harassaient les colons a été découvert, puis encerclé par la garnison locale. Aucun des deux camps n'a entrepris d'action décisive, et chacun se contente d'observer l'autre en chien de faïence. C'est tout juste si quelques flèches ont été décochées comme tir de semonce. D'après ce qui est rapporté, les brigands sont menés par un chef qui ne craint nullement de se battre jusqu'à la mort ; néanmoins, sa vaillance n'étouffe pas pour autant son goût pour la vie… et l'argent.\n\nJe demande un éclaircissement à ce sujet, ce à quoi [marshal.GetFirstNameNoTooltip] me répond : « Il consent à plier bagage en échange d'une coquette somme. »"
 agot_colonization_events.1202.desc.knight:0 "« [ROOT.Char.Custom('FR_MonseigneurMadame')|U], des nouvelles de la colonie de [obstacle_province.GetName]… » relate [marshal.Custom('FR_le_Char_Pi')][marshal.GetTitledFirstName]. Je pourrais craindre le pire, mais son faciès sans équivoque me laisse comprendre que ces nouvelles sont bonnes.\n\nLe repaire des bandits qui harassaient les colons a été découvert, puis encerclé par la garnison locale. Aucun des deux camps n'a entrepris d'action décisive, et chacun se contente d'observer l'autre en chien de faïence. C'est tout juste si quelques flèches ont été décochées comme tir de semonce. D'après ce qui est rapporté, les brigands sont menés par un chef qui ne craint nullement de se battre jusqu'à la mort ; néanmoins, sa vaillance n'étouffe pas pour autant son goût pour la vie… et l'argent.\n\nJe demande un éclaircissement à ce sujet, ce à quoi [marshal.GetFirstNameNoTooltip] me répond : « Il consent à plier bagage en échange d'une coquette somme. »"
 agot_colonization_events.1202.a:0 "Culotté l'animal. Il va plier, ça oui, mais pas sous le poids de l'or !"
 agot_colonization_events.1202.a.duel_success:0 "Les fauteurs de troubles sont mis hors d'état de nuire."
 agot_colonization_events.1202.a.duel_failure:0 "Les bandits repoussent l'attaque."
 agot_colonization_events.1202.b:0 "Quitte à les payer, j'aime autant qu'ils se battent pour moi."
 agot_colonization_events.1202.b.duel_success:0 "Le chef des bandits est convaincu de porter assistance dans la défense de la colonie contre une solde régulière."
 agot_colonization_events.1202.b.duel_failure:0 "Les négociations échouent."
 agot_colonization_events.1202.c:0 "Bonté divine, que je hais devoir céder à ce genre d'exigence..."
 agot_colonization_events.1203.t:0 "[obstacle_province.GetNameNoTooltip] : De bandits à bâtisseurs"
 agot_colonization_events.1203.desc:0 "Le brigandage n'est plus un menu problème pour [obstacle_province.GetName] depuis un certain moment, et pour cause ? Ce qui n'était qu'une poignée de malfrats désorganisés a fini par gagner en taille, en assurance et en organisation. Désormais sous le joug de chefs tout aussi impitoyables que rusés et ambitieux, ils se revendiquent d'être devenus une « confrérie », et la garnison locale n'étant visiblement plus en mesure de leur tenir tête, ce ramassé de bandits s'est autoproclamé gouverneurs des lieux.\n\nC'est à la tête d'une troupe de combattants émérites que je me rends dans les [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')] pour dispenser ordre et justice, mais alors que j'imaginais mon arrivée être marquée par le rouge du sang versé et de la chair tranchée, c'est le blanc d'un drapeau que je vois poindre. Les meneurs de la confrérie semblent enclin aux pourparlers : « Nous mettrons nos épées au service de la colonie pour la protéger, et nos marteaux, pour aider à la développer. » Piqué[ROOT.Char.Custom('FR_E')] au vif par cette audace, je le laisse continuer, et sa proposition est très claire. Ils souhaitent se reconvertir en honnêtes gens, et former une guilde, mais pour ce faire, ils ont besoin de ma clémence… ainsi qu'une exonération fiscale temporaire.\n\nIls ont un sacré toupet, mais force est d'admettre que la colonie semble avoir prospéré sous leur #italic gouvernance#!…"
 agot_colonization_events.1203.a:0 "Vous me volez et vous espérez en plus être rétribué ?!"
 agot_colonization_events.1203.a.duel_success:0 "Les membres de la confrérie sont mis hors d'état de nuire."
 agot_colonization_events.1203.a.duel_failure:0 "Vos troupes sont mises en déroute par les bandits."
 agot_colonization_events.1203.b:0 "Une offre intéressante, mais j'ai mieux à proposer."
 agot_colonization_events.1203.b.duel_success:0 "Vous parvenez à convaincre la confrérie de quitter la colonie moyennant finance."
 agot_colonization_events.1203.b.duel_failure:0 "Les négociations échouent."
 agot_colonization_events.1203.c:0 "Oui-da. Ployez le genou et jurez-moi fidélité !"
 agot_colonization_events.1203.success.toast.t:0 "La menace des bandits est écartée"
 agot_colonization_events.1203.failure.toast.t:0 "Les bandits demeurent toujours une menace"
 agot_colonization_events.1204.t:0 "[obstacle_province.GetNameNoTooltip] : Voisinage sauvage"
 agot_colonization_events.1204.desc:0 "La population y est rare au-delà du Mur, et ce depuis des temps immémoriaux. Le peu d'individus qu'on y trouve sont d'une nature primale et d'un tempérament intraitable. Avec la croissance de la colonie à [obstacle_province.GetName], s'accroît également l'ire des tribus locales, et si les ressources tendent à se raréfier, les disputes qu'elles génèrent, elles, prolifèrent.\n\nCe qui s'apparentait à de simples rixes de regards a dégénéré pour devenir des actes de violences en tout genre. Rapines, vandalisme, enlèvements et demande de rançon sont devenus monnaie courante dans la région. Outre l'escalade de la violence qui ne semble pas prompte à s'arrêter, elle risque au contraire de s'intensifier, et je gage de recevoir sous peu les nouvelles d'incursions sauvageonnes plus… dangereuses que de simples méfaits de brigandage."
 agot_colonization_events.1204.a:0 "Allez apprendre le respect à ces crapules !"
 agot_colonization_events.1204.a.duel_success:0 "Les fauteurs de troubles sont mis hors d'état de nuire"
 agot_colonization_events.1204.a.duel_failure:0 "Votre expédition punitive est mise en déroute"
 agot_colonization_events.1204.b:0 "Entamons des pourparlers avec le chef de tribu."
 agot_colonization_events.1204.b.duel_success:0 "Vous établissez des frontières claires entre vos deux peuples"
 agot_colonization_events.1204.b.duel_failure:0 "Les négociations échouent"
 agot_colonization_events.1204.c:0 "Juste une bande de va-nu-pieds en haillons, rien qui vaille la peine de s'inquiéter."
 agot_colonization_events.1204.success.toast.t:0 "La menace des bandits est écartée"
 agot_colonization_events.1204.failure.toast.t:0 "Les bandits demeurent toujours une menace"
 agot_colonization_events.1205.t:0 "[obstacle_province.GetNameNoTooltip] : [Select_CString(traitor.IsFemale,'La traîtresse','Le bandit félon')]"
 agot_colonization_events.1205.desc:0 "La répression contre le banditisme à [obstacle_province.GetName] a été une entreprise ardue, de celle qui nécessite de la patience. Il y a encore peu, les camps de bandits et brigands pullulaient à travers les étendues sauvages, et tout ce qu'il en reste désormais sont des avant-postes en miettes et des cendres balayées par le vent. Pourtant, la menace que constituent les scélérats n'est point encore matée. Les malfrats survivants, plutôt que de se disperser ont préféré se regrouper pour former un large campement, le dernier bastion de la criminalité dans ces [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')].\n\nUn beau matin, à ma grande surprise, m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] reçoit la visite inattendue d'un[traitor.Custom('FR_E')] [traitor.GetWomanMan] à l'allure… sauvage.\n\n« Vot' seigneurie, » débute-t-[traitor.Custom('FR_IlElle')] avec une espèce de gesticulation qui j'imagine doit être une révérence à ses yeux. « [traitor.GetFirstName], c'est le nom que m'ont donné mes parents. Je sais que vos gens de [obstacle_province.GetName] souffrent des attaques de bandits. C'est pour remédier à ça que je me présente devant vous. Je peux faire entrer des soldats à vous dans le campement. Comme ça vous pourrez leur trancher la gorge dans leur sommeil sans le moindre effort. Tout ce que je veux, c'est une bourse pleine. Comprenez que mes comparses sont des durs à cuire et que ça vous coûterait bien plus cher en temps et en hommes de lancer une attaque directe. »"
 agot_colonization_events.1205.a:0 "Very well, if you say so."
 agot_colonization_events.1205.a.duel_success:0 "The plan works as expected."
 agot_colonization_events.1205.a.duel_failure:0 "You are betrayed."
 agot_colonization_events.1205.b:0 "My soldiers shall curse the bandit scum."
 agot_colonization_events.1205.b.duel_success:0 "Your men slay the bandits."
 agot_colonization_events.1205.b.duel_failure:0 "Your men are driven back by the bandits."
 agot_colonization_events.1205.c:0 "I do not need your help."
 agot_colonization_events.1205.success.toast.t:0 "Bandits Cleared"
 agot_colonization_events.1205.failure.toast.t:0 "Bandits Remain"
 agot_colonization_events.1206.t:0 "[obstacle_province.GetNameNoTooltip]: The Cunning Brigand"
 agot_colonization_events.1206.desc:0 "While going through the most recent reports from the settlement in [obstacle_province.GetName], I am surprised to find a letter addressed to me. It has been sent by [brigand.GetName], one of the leaders of the bandits that plague the region.\n\nThe contents of the letter are as bold as they are brazen: [brigand.GetFirstName] wishes for my permission to claim the settlement as [brigand.GetHerHis] own, in exchange for swearing fealty to me and becoming my vassal.\n\nWhile this is an unorthodox offer indeed, perhaps there is merit to be found here?"
 agot_colonization_events.1206.a:0 "Outrageous. Have this fool captured."
 agot_colonization_events.1206.b:0 "Instead, I shall recruit this brigand."
 agot_colonization_events.1206.c:0 "Very well. Swear fealty to me."
 agot_colonization_events.1206.c.tt.success:0 "[brigand.GetFirstNameNoTooltip] keeps [brigand.GetHerHis] word."
 agot_colonization_events.1206.c.tt.failure:0 "[brigand.GetFirstNameNoTooltip] seizes [obstacle_province.GetNameNoTooltip] for [brigand.GetHerselfHimself]."
 agot_colonization_events.1206.d:0 "I don't need your fealty. [obstacle_province.GetNameNoTooltip] is yours."
 agot_colonization_events.1206.d.tt:0 "[brigand.GetFirstNameNoTooltip] is granted [obstacle_province.GetNameNoTooltip]."
 agot_colonization_events.1301.t:0 "[obstacle_province.GetNameNoTooltip] : Perdu[lost_person.Custom('FR_E')] dans les bois"
 agot_colonization_events.1301.desc:0 "Les contrées de [obstacle_province.GetName] sont porteuses de mauvaises nouvelles. [lost_person.Custom('FR_le_Char')|U][lost_person.GetName] demeure introuvable depuis qu'[lost_person.Custom('FR_IlElle')] s'est aventuré[lost_person.Custom('FR_E')] dans les [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')] alentour.\n\nD'aucuns parlent d'une bête effroyable qui l'aurait emporté, d'autres se contentent de croire que ces bois sont maudits. Peu me chaut de savoir ce qui tient éveillé la populace au coin du feu, [lost_person.GetFirstNameNoTooltip] court peut-être un grave danger, et je dois agir sur-le-champ."
 agot_colonization_events.1301.a:0 "Retrouvez-[lost_person.Custom('FR_LeLa')] ! #bold À tout prix !#!"
 agot_colonization_events.1301.b:0 "N'ayez nulle crainte, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('lost_person'))], je viens à votre secours !"
 agot_colonization_events.1301.duel_success:0 "Vous ramenez [lost_person.GetFirstNameNoTooltip] sain[lost_person.Custom('FR_E')] et sau[lost_person.Custom('FR_FVe')]."
 agot_colonization_events.1301.duel_failure:0 "[lost_person.GetFirstNameNoTooltip] reste introuvable."
 agot_colonization_events.1301.c:0 "Je ferais mieux de m'inquiéter pour la colonie."
 agot_colonization_events.1301.c.death:0 "Quelqu'un a retrouvé la dépouille de [lost_person.GetFirstNameNoTooltip]."
 agot_colonization_events.1301.c.vanished:0 "Nul ne saura jamais ce qu'il est advenu de [lost_person.GetFirstNameNoTooltip]."
 agot_colonization_events.1301.c.laamp:0 "Les déboires de [lost_person.GetFirstNameNoTooltip] l'auront conduit à s'improviser [Concept( 'adventurer', 'aventuri' )|E][lost_person.Custom('FR_ErEre')|E]."
 agot_colonization_events.1302.t:0 "[obstacle_province.GetNameNoTooltip]: Yield of the Forest"
 agot_colonization_events.1302.desc:0 "Il est porté à ma connaissance que le travail de défrichage à [obstacle_province.GetName] est terminée, et les forêts naguère si denses à l'entour de la colonie sont désormais plus que clairsemées, favorisant et facilitant la construction des structures qui vont permettre à l'économie de la région de fleurir.\n\nUne chose en appelant une autre, je dois maintenant décider quoi faire de la quantité de bois obtenue."
 agot_colonization_events.1302.a:0 "Vendez le surplus."
 agot_colonization_events.1302.duel_success:0 "Vous faites un profit considérable."
 agot_colonization_events.1302.duel_failure:0 "Vous faites de maigres profits."
 agot_colonization_events.1302.b:0 "La colonie a besoin de tout le bois nécessaire pour son développement."
 agot_colonization_events.1302.c:0 "Un feu de joie et des festivités, cela me semble bien."
 agot_colonization_events.1302.d:0 "Il y a bien des choses que nous pourrions faire avec tout ce bois…"
 agot_colonization_events.1303.t:0 "[obstacle_province.GetNameNoTooltip] : Des vestiges parmi la verdure"
 agot_colonization_events.1303.desc:0 "Les travaux à [obstacle_province.GetName] progressent à bonne allure. Les fourrés sont abattus et les sentiers tracés à travers la végétation dense, permettant un développement constant pour la colonie. Mais à mesure que les forêts ont été clairsemées, quelque chose s'est révélé au grand jour : une ancienne ruine.\n\nNi son âge ni sa raison d'être n'ont pu être estimés pour le moment. Pour les savants érudits ce serait probablement un fascinant sujet d'étude, pour les colons besogneux, un simple amas n'ayant d'intérêt que les ressources à en tirer. Pour moi, ce n'est ni plus ni moins que le fruit d'un dilemme dont j'ai la tâche de trancher."
 agot_colonization_events.1303.a:0 "Il y a matière à en faire un bâtiment utile."
 agot_colonization_events.1303.duel_success:0 "A new building is constructed in [obstacle_province.GetNameNoTooltip]"
 agot_colonization_events.1303.duel_failure:0 "Les travaux provoquent l'effondrement des décombres"
 agot_colonization_events.1303.b:0 "Dans l'immédiat, le plus important est le développement de la colonie."
 agot_colonization_events.1303.c:0 "Ces vestiges doivent être étudiés et restaurés autant que faire se peut !"
 agot_colonization_events.1303.d:0 "Rasez tout. La pierre obtenue nous sera utile."
 agot_colonization_events.1304.t:0 "[obstacle_province.GetNameNoTooltip] : La rétribution de la nature"
 agot_colonization_events.1304.desc:0 "Je peine à croire — ou à comprendre — ce que j'apprends à propos de [obstacle_province.GetName]. Les travailleurs, faisant montre de force diligence, ont déboisé les [obstacle_province.Custom('FR_TerrainTypeProvince_Plural')] à l'entour de la colonie. Le boulot abattu devait permettre l'édification de nouvelles structures et le bon développement de ces contrées, mais sans que la raison n'en soit connue, une partie de la forêt a mystérieusement repoussé en l'espace d'une nuitée.\n\nÀ moins que les yeux de ceux qui m'ont rapporté ces nouvelles n'auraient été abusé par quelques sorcelleries, la besogne accomplie a été néantisée d'un claquement de doigt. La frustration se répand comme un chancre parmi les ouvriers, et le moral décline d'autant plus. Je dois agir sans tarder…"
 agot_colonization_events.1304.a:0 "J'abattrai moi-même ces foutus arbres s'il le faut !"
 agot_colonization_events.1304.duel_success:0 "Vos efforts portent leurs fruits."
 agot_colonization_events.1304.duel_failure:0 "Les arbres repoussent une fois de plus."
 agot_colonization_events.1304.b:0 "Envoyons quelques levées apporter leur concours."
 agot_colonization_events.1304.c:0 "Oubliez ces diantre d'arbres et construisez autre part."
 agot_colonization_events.1304.d:0 "La nature doit être apaisée, et je sais comment y parvenir…"
 agot_colonization_events.1401.t:0 "[obstacle_province.GetNameNoTooltip] : Des eaux et des bas"
 agot_colonization_events.1401.desc:0 "Un terrain marécageux peut s'avérer être à double tranchant, comme en témoigne le cas de [obstacle_province.GetName].\n\nD'une part, cela offre une défense naturelle idéale pour la colonie, en plus d'être une source de nourriture avec les nombreux brèmes, perches et brochets que l'on peut y trouver. D'autre part, les risques d'inondations ne peuvent être occultés, en particulier lors des épisodes de dégel.\n\nC'est en prévision de ces aléas que les colons ont commencé à bâtir tout un système de digues et de canaux, pour assurer leur sécurité et favoriser l'agriculture par le drainage des terres. Ce n'est point une sinécure de réaliser pareil ouvrage, et cela a largement entamé les efforts de développement, mais pour ne rien arranger à la situation, il s'avère qu'une des digues a cédé. La crue qui en résulte menace d'emporter toute la colonie !"
 agot_colonization_events.1401.a:0 "Il va falloir investir si je souhaite sauver la colonie d'un désastre."
 agot_colonization_events.1401.a.duel_success:0 "Vos efforts portent leur fruit sans pour autant s'avérer trop dispendieux."
 agot_colonization_events.1401.a.duel_failure:0 "Vos efforts engloutissent votre trésorerie."
 agot_colonization_events.1401.success.toast.t:0 "En deçà du budget"
 agot_colonization_events.1401.failure.toast.t:0 "Au-delà du budget"
 agot_colonization_events.1401.b:0 "Rassemblez des soldats pour aider à la reconstruction."
 agot_colonization_events.1401.c:0 "Déveine fortuite ou acharnement [ROOT.Char.GetFaith.HouseholdGodNamePossessive], la colonie semble perdue…"
 agot_colonization_events.1402.t:0 "[obstacle_province.GetNameNoTooltip]: Marsh Fever"
 agot_colonization_events.1402.desc:0 "My marshland settlement in [obstacle_province.GetName] is often inundated during the spring floods, but the threat is slowly receding as a system of levees is completed to hold back and divert the rising tides.\n\nYet the colony remains afflicted by a mysterious ailment, seemingly brought on by the biting insects that swarm above the waters. This ague brings fever, shivering, and terrible fatigue.\n\nThe colonists have now written, demanding supplies of willow bark to relieve their suffering and mugwort to deter the insects."
 agot_colonization_events.1402.a:0 "They shall get what they need."
 agot_colonization_events.1402.b:0 "It's about time the clergy provided some charity here..."
 agot_colonization_events.1402.c:0 "If they'd worked harder to drain the marshes, this wouldn't be a problem!"
 agot_colonization_events.1501.t:0 "[obstacle_province.GetNameNoTooltip]: The Last Raid"
 agot_colonization_events.1501.desc:0 "Under cover of darkness, a band of desperate pirate stragglers strikes the colony's storage sheds. They burn grain and set buildings ablaze, leaving frightened settlers scrambling for safety. Reports come of scorched ground, plundered supplies, and the distant echo of maniacal laughter as pirates disappear into the night.\n\nThe colony will not last much longer unless I deal with these raiders decisively."
 agot_colonization_events.1501.a:0 "Pursue them and punish to the last man."
 agot_colonization_events.1501.a.duel_success:0 "Your soldiers catch the raiders by surprise, breaking their hold on the province"
 agot_colonization_events.1501.a.duel_failure:0 "You lose men in the chase. The raiders vanish with vital supplies"
 agot_colonization_events.1501.b:0 "Fortify defenses and conserve remaining stock."
 agot_colonization_events.1501.b.duel_success:0 "Your cautious planning buys time and preserves supplies until your soldiers can fight them off"
 agot_colonization_events.1501.b.duel_failure:0 "Pirate raiders quickly strike again with deadly force"
 agot_colonization_events.1501.c:0 "The pirates have made colonization here a fool's errand."
 agot_colonization_events.1501.success.toast.t:0 "Pirate Remnants Cleared"
 agot_colonization_events.1501.failure.toast.t:0 "Pirate Remnants Remain"
 agot_colonization_events.1502.t:0 "[obstacle_province.GetNameNoTooltip]: Shadows off the Shore"
 agot_colonization_events.1502.desc:0 "I awoke to strange news: this morning the fog had parted to reveal a weather-beaten vessel drifting along the coastline near [obstacle_province.GetName]. No traders were expected, and the colonists gathered on the shore, murmuring uneasily, unsure if the ship was abandoned, cursed, or some ill omen. Hours passed, yet the vessel lingered, adrift and silent.\n\nBy dusk, though no one had glimpsed a soul disembark, a warning was found pinned at the colony's gate with a rusty dagger.\n\n#italic We've come to take back what was stolen. Surrender your stores and ships, or drown beneath the tide.#!"
 agot_colonization_events.1502.a:0 "We meet them with fire and steel."
 agot_colonization_events.1502.a.duel_success:0 "Your men repel the landing party and burn their vessel"
 agot_colonization_events.1502.a.duel_failure:0 "The raiders sack the harbor before vanishing back into the mists"
 agot_colonization_events.1502.b:0 "Offer them coin to disappear for good."
 agot_colonization_events.1502.b.duel_success:0 "They take the coin and vanish with the tide"
 agot_colonization_events.1502.b.duel_failure:0 "They take the coin and attack anyway"
 agot_colonization_events.1502.c:0 "These pirates are proving to be more trouble than they're worth."
 agot_colonization_events.1502.success.toast.t:0 "Pirate Remnants Cleared"
 agot_colonization_events.1502.failure.toast.t:0 "Pirate Remnants Remain"
 agot_colonization_events.1503.t:0 "[obstacle_province.GetNameNoTooltip]: The Pirate Commander"
 agot_colonization_events.1503.desc:0 "[pirate_leader.GetName], one of the surviving pirate leaders, has rallied a band of stragglers and established a fortified encampment somewhere near [obstacle_province.GetNameNoTooltip]. [pirate_leader.GetSheHe|U] has sent word through an envoy to leave them be, or the colony will burn.\n\nA full assault could end in disaster but inaction could be just as dangerous."
 agot_colonization_events.1503.a:0 "Challenge [pirate_leader.GetFirstNameNoTooltip] to single combat."
 agot_colonization_events.1503.a.duel_success:0 "You slay the pirate commander yourself and [pirate_leader.GetHerHis] crew scatters"
 agot_colonization_events.1503.a.duel_failure:0 "[pirate_leader.GetSheHe|U] defeats you"
 agot_colonization_events.1503.b:0 "Assault the stronghold under cover of darkness."
 agot_colonization_events.1503.b.duel_success:0 "The stronghold is destroyed. The threat is ended"
 agot_colonization_events.1503.b.duel_failure:0 "Your soldiers walk into a trap. Few return alive"
 agot_colonization_events.1503.c:0 "Offer coin to see them gone."
 agot_colonization_events.1503.c.duel_success:0 "They take the gold and vanish into the mists"
 agot_colonization_events.1503.c.duel_failure:0 "They take the gold and thank you for your \"donation\""
 agot_colonization_events.1503.d:0 "If we leave them alone, surely they will do the same..."
 agot_colonization_events.1503.success.toast.t:0 "Pirate Remnants Cleared"
 agot_colonization_events.1503.failure.toast.t:0 "Pirate Remnants Remain"
 agot_colonization_events.1504.t:0 "[obstacle_province.GetNameNoTooltip]: The Ambush"
 agot_colonization_events.1504.desc:0 "While conducting routine patrols near the coast, my men were ambushed by well-armed pirates. Hidden caves have served as a staging ground for raids. These stragglers are not aimless raiders; they're organized and deadly.\n\nIf we do not root them out now, they may overrun the settlement itself."
 agot_colonization_events.1504.a:0 "Storm the caves. Leave none alive."
 agot_colonization_events.1504.a.duel_success:0 "The caves are cleared"
 agot_colonization_events.1504.a.duel_failure:0 "Your men are slaughtered in the dark"
 agot_colonization_events.1504.b:0 "Too dangerous. Post extra guards and pray they move on"
 agot_colonization_events.1504.success.toast.t:0 "Pirate Remnants Cleared"
 agot_colonization_events.1504.failure.toast.t:0 "Pirate Remnants Remain"