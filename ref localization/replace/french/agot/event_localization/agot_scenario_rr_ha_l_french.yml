l_french:
 agot_scenario_rr_ha.0010.t:0 "Un conseil de guerre"
 agot_scenario_rr_ha.0010.desc:0 "Dear [ROOT.Char.GetTitledFirstName],\nI hope this message finds you well. I am calling for a war council at [GetTitleByKey('c_harrenhal').GetNameNoTier] to plan the against the rebellion led by [GetScriptedCharacterByHistoryID('Baratheon_2').GetFirstName] [GetScriptedCharacterByHistoryID('Baratheon_2').GetHouse.GetName]. Your attendance and contribution to our discussions on how best to end this conflict will be invaluable. Together, let us rise to the challenge and do what is necessary to safeguard the Seven Kingdoms. I look forward to seeing you at Harrenhal. \nYours in service,"
 agot_scenario_rr_ha.0010.a:0 "Je répondrais présent !"
 agot_scenario_rr_ha.0010.b:0 "J'ai d'autres projets en tête..."
 agot_scenario_rr_ha.0011.t:0 "Les conséquences d'Harrenhal"
 agot_scenario_rr_ha.0011.desc:0 "The ravens were sent, and I now stand before a room full of my father's vassals, contemplating the dire situation I am in. To depose a king — not just a king, but my father... It seems unimaginable.\n\nAnd yet, before me are those who might just be loyal enough to join my cause. It's now or never: #bold Do I propose that we remove [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] from the Iron Throne?#!"
 agot_scenario_rr_ha.0011.a:0 "Bien sûr que oui ! Son règne doit prendre fin au plus tôt !"
 agot_scenario_rr_ha.0011.a.tt:0 "Vous allez expliquer votre plan à l'assemblée réuni ici, sans savoir quels vassaux pourraient rejoindre votre cause — ou vous trahir..."
 agot_scenario_rr_ha.0011.b:0 "Finalement, mieux vaut concentrer nos efforts sur la guerre en cours..."
 agot_scenario_rr_ha.0011.b.tt:0 "Vous abandonnez complètement votre complot, préférant diriger un véritable conseil de guerre dans l'espoir de vaincre l'Usurpateur."
 agot_scenario_rr_ha.0012.t:0 "Les conséquences d'Harrenhal"
 agot_scenario_rr_ha.0012.desc:0 "The crown prince has brought together the finest of his father's vassals to discuss the War of the Usurper. I eye those around the table sharply, taking measure of whom I have joined.\n\nAfter a long pause, [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName] begins his speech. \"My fine councillors, I called you hear under false pretense, a feint I hope can be forgiven,\" he begins. I shift nervously in my seat.\n\n\"The true reason of our gathering is this: My father, [GetScriptedCharacterByHistoryID('Targaryen_1').GetShortUIName] of House [GetScriptedCharacterByHistoryID('Targaryen_1').GetHouse.GetName], has gone mad — obsessed with fire, fueled by paranoia. He has led our once great house to a precipice, on the very edge of demise.\" #italic A gasp cuts through the still air like a blade.#!\n\nRhaegar is proposing treason of the highest degree... #bold To depose the Mad King!#!"
 agot_scenario_rr_ha.0012.a:0 "Le prince dit vrai, le Roi Fou doit être écarté du pouvoir !"
 agot_scenario_rr_ha.0012.b:0 "Il ne m'appartient pas de juger les rois."
 agot_scenario_rr_ha.0012.c:0 "Je dois informer le roi Aerys immédiatement !"
 agot_scenario_rr_ha.0013.t:0 "Le conseil de guerre"
 agot_scenario_rr_ha.0013.desc:0 "The crown prince has brought together the finest of his father's vassals to discuss the War of the Usurper. I eye those around the table sharply, taking measure of whom I have joined.\n\nAfter a brief pause, [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName] begins to outline the military tactics of the rebellion in great detail. I must admit, even the most seasoned warriors among us found his knowledge impressive."
 agot_scenario_rr_ha.0013.a:0 "La contribution du prince dans l'effort de guerre est admirable !"
 agot_scenario_rr_ha.0014.t:0 "Un conseil rebelle"
 agot_scenario_rr_ha.0014.desc:0 "My son, the crown prince, is bold and at times foolhardy — but I never expected him to convene a war council behind my back!\n\nA raven arrived this morning from one of my more loyal vassals, explaining that [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName] had summoned much of #bold my#! realm to advise him on handling #bold my#! war.\n\nI must deal with one usurper, pray I don't also have to deal with #N another#!..."
 agot_scenario_rr_ha.0014.a:0 "Je dois maintenant m'occuper de Rhaegar..."
 agot_scenario_rr_ha.0020.t:0 "Les conséquences d'Harrenhal"
 agot_scenario_rr_ha.0020.desc:0 "Le moment est venu, le projet a été discuté et je me tiens maintenant devant mes conseillers pour attendre leur réponse.\n\nMes yeux parcourent la salle de long en large. De nombreux vassaux loyaux sont assis devant moi. \"Qui se joindra à moi pour mettre fin au règne de mon père, le roi fou ?\n\nMa question tombe comme un coup de scorpion, chassant tout l'air de la pièce. Mais bientôt, ceux qui m'entourent commencent à prendre la parole. Bientôt, un chœur de soutien retentit - et pourtant, certains d'entre nous restent silencieux..."
 agot_scenario_rr_ha.0020.a:0 "C'est ainsi que commence ma danse avec le #N dragon dérangé#!."
 agot_scenario_rr_ha.0020.join_rhaegar:0 "Quels sont les conseillers qui rejoindront votre complot ?"
 agot_scenario_rr_ha.0020.join_rhaegar_ally:0 "[custom_tooltip_trick.GetName] soutient votre complot."
 agot_scenario_rr_ha.0021.t:0 "Un deuxième usurpateur ?!"
 agot_scenario_rr_ha.0021.desc:0 "So many things to worry about, with the Spider whispering in one ear and the pyromancers muttering in the other. Yet today, another worry arrives via raven.\n\nA loyal vassal of mine has informed me of a plot, #italic from my own son, [GetScriptedCharacterByHistoryID('Targaryen_3').GetFirstName]#!...\n\nThe crown prince means to abduct me, to depose me... He shall know the cost of betrayal, and so will all of his co-conspirators!"
 agot_scenario_rr_ha.0021.a:0 "TRAITRES ! #N ILS DOIVENT TOUS BRULER !#!"
 agot_scenario_rr_ha.0030.t:0 "Les conséquences d'Harrenhal"
 agot_scenario_rr_ha.0030.desc:0 "Today, the entire realm can breathe a sigh of relief: The Mad King, [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] II, sits in my dungeon.\n\nHow far my father has fallen since the days of his youth... The great promise his reign held for the Seven Kingdoms driven off course by madness. And now, I must do what is best for all of Westeros...\n\nProphecy tells of the prince that was promised, and today that prince becomes #bold a king#!."
 agot_scenario_rr_ha.0030.a:0 "Le règne de mon père est enfin achevé."
 agot_scenario_rr_ha.0031.t:0 "Les conséquences d'Harrenhal"
 agot_scenario_rr_ha.0031.desc:0 "Today, the entire realm weeps: The Mad King, [GetScriptedCharacterByHistoryID('Targaryen_1').GetFirstName] II, has avoided my scheme to capture him and end his reign swiftly.\n\nDid a raven from one of my councillors reach him? Or did the Spider's little birds see to it themselves? I may never know the truth of it.\n\nAll I know is that the Seven Kingdoms cannot continue under the tyranny of my father. But now, deposing the Mad King becomes even more difficult."
 agot_scenario_rr_ha.0031.a:0 "C'est la guerre..."
 agot_scenario_rr_ha.0015.t:0 "Le conseil de guerre"
 agot_scenario_rr_ha.0015.desc:0 "Les meilleurs vassaux de mon père sont réunis autour de moi pour discuter de la guerre de l'Usurpateur. Je regarde attentivement ceux qui sont autour de la table, prenant la mesure de ceux que j'ai invités.\n\nAprès une brève pause, je commence à exposer en détail les tactiques militaires de la rébellion. En levant les yeux, je remarque même que certains de mes guerriers les plus expérimentés hochent la tête en signe d'approbation."
 agot_scenario_rr_ha.0015.a:0 "Espérons que cela contribuera à l'effort de guerre..."