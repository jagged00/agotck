l_french:
 agot_filler_colonization.0001.t:0 "[colony_province.GetNameNoTooltip] : Un curieux écureuil"
 agot_filler_colonization.0001.desc:0 "Parcourant les contrées de [colony_province.GetName] pour y visiter la colonie, ma compagnie et moi-même nous attardons sous un arbre, qui nous fait grâce de son hospitalité le temps d'un repas. La fraîche brise vient caresser ma peau autant que vivifier mon esprit. Je songe à tout un tas de choses — mes déboires passés en tant que [ROOT.Char.GetTitleAsNameNoTooltip|l], les présentes épreuves imposées par [ROOT.Char.GetFaith.HighGodName], tout cela me turlupine jusqu'à ce qu'un bruissement redirige mon attention vers la pénombre d'où se dévoile une petite créature : un écureuil d'un noir élégant.\n\nCommence alors une rixe de regard. Je l'observe, il m'observe, nous nous observons. Cela dure un temps, plus qu'un temps, suffisamment longtemps en tout cas pour commencer à entrevoir une forme de vilénie dans ses yeux."
 agot_filler_colonization.0001.a:0 "Arrière, vile engeance que tu es !"
 agot_filler_colonization.0001.a.success:0 "Le rongeur prend ses jambes à son cou"
 agot_filler_colonization.0001.a.failure:0 "L'infâme créature s'attaque à votre œil"
 agot_filler_colonization.0001.b:0 "Gardes ! À moi !"
 agot_filler_colonization.0001.c:0 "Un excès d'imagination, rien de plus."
 agot_filler_colonization.0002.t:0 "[colony_province.GetNameNoTooltip] : Le cerf blanc"
 agot_filler_colonization.0002.desc:0 "[colony_province.GetName] fourmille de sentiers forestiers, et c'est d'un entrain émerveillé que je me fais fort de les explorer. La végétation abonde, tant et si bien qu'à certains endroits les arbres semblent presque enchevêtrés les uns dans les autres. Le bois mort tombé au sol sert de vivier à des champignons lumineux, tandis que le bois bien vivant lui, est drapé de vignes et de lianes, enveloppé de mousse spongieuse et de lichen rampant. Dans l'air je peux humer mille effluves vibrantes de vitalité.\n\nTandis que mes narines sont gorgées de cette essence forestière, je l'aperçois. Pris dans un rayon de lumière qui perce la canopée avec la grâce d'une lance venue des cieux, il est là, majestueux, imposant, immaculé : un cerf, pelage d'un blanc de neige, yeux d'un jaune d'ambre.\n\nUn regard d'une nature indescriptible est échangé, puis, dans un souffle rauque, le somptueux animal s'élance sur le sentier. Le claquement de ses sabots est suivi du son âpre d'une corde que l'on bande. Derrière moi, mes gens de voyage sont prêts à décocher leurs traits…"
 agot_filler_colonization.0002.a:0 "Baissez vos arcs. La bête est à moi."
 agot_filler_colonization.0002.a.success:0 "L'animal est occis d'un trait dans le cœur"
 agot_filler_colonization.0002.a.failure:0 "La bête s'enfuit après vous avoir salement rudoyé"
 agot_filler_colonization.0002.a.critical_failure:0 "Vous subissez la violente encornade de l'animal"
 agot_filler_colonization.0002.b:0 "Preste [martial_companion.GetFirstName] ! Abattez-le !"
 agot_filler_colonization.0002.b.success:0 "[martial_companion.Custom('FR_le_Char_Pi')|U][martial_companion.GetTitledFirstNameNoTooltip] occis l'animal"
 agot_filler_colonization.0002.b.failure:0 "La bête s'enfuit après avoir salement rudoyé [martial_companion.Custom('FR_le_Char_Pi')][martial_companion.GetTitledFirstNameNoTooltip]"
 agot_filler_colonization.0002.b.critical_failure:0 "[martial_companion.Custom('FR_le_Char_Pi')|U][martial_companion.GetTitledFirstNameNoTooltip] subit la violente encornade de l'animal"
 agot_filler_colonization.0002.c:0 "Que faites-vous malheureux ?! C'est un animal sacré !"
 agot_filler_colonization.0003.t:0 "[colony_province.GetNameNoTooltip] : Commerce et subsistance"
 agot_filler_colonization.0003.desc:0 "Enfin je puis faire une visite d'inspection à [colony_province.GetName]. Point fâché[ROOT.Char.Custom('FR_E')] que ce voyage exténuant se termine, l'effluve du labeur pionnier qui imprègne les lieux me revigore comme une seconde jouvence.\n\nLa colonie est aussi vibrante qu'une ruche, les braves gens vivant et travaillant au gré du son des haches qui fendent l'écorce et des marteaux qui tambourinent les enclumes. Les chants entraînants donnent du baume au cœur et favorisent l'huile de coude, de quoi rendre fi[ROOT.Char.Custom('FR_ErEre')] leur [ROOT.Char.GetTitleAsNameNoTooltip|l].\n\nNéanmoins, demeure une ombre au tableau : ces contrées rocailleuses sont impropres à l'agriculture. Quelques quémanderies sont arrivées jusqu'à mes oreilles, lesquelles font état de demande urgente de moutons et de chèvres pour la subsistance, ainsi que de peaux pour les vêtements. Puisque la colonie est riche de métaux et de pierres, il est possible de moyenner ces ressources contre des têtes de bétail."
 agot_filler_colonization.0003.a:0 "Je vais mettre tout ceci en place moi-même."
 agot_filler_colonization.0003.a.success:0 "Vous concluez un accord fructueux pour la colonie"
 agot_filler_colonization.0003.a.failure:0 "Vous ne parvenez pas à conclure un accord pour la colonie"
 agot_filler_colonization.0003.b:0 "Mon [steward.GetCouncilTitle|l], [steward.GetFirstNameNoTooltip], peut s'en charger."
 agot_filler_colonization.0003.b.success:0 "[steward.GetFirstNameNoTooltip] parvient à conclure un accord fructueux pour la colonie"
 agot_filler_colonization.0003.b.failure:0 "[steward.GetFirstNameNoTooltip] ne parvient pas à conclure un accord pour la colonie"
 agot_filler_colonization.0003.c:0 "Des broutilles commerciales ! J'ai mieux à faire…"
 agot_filler_colonization.0003.a.success.toast:0 "Colonie florissante"
 agot_filler_colonization.0003.a.failure.toast:0 "Colonie en difficulté"
 agot_filler_colonization.0003.a.critical_failure.toast:0 "Colonie abandonnée"
 well_supplied_colony_county_modifier:0 "Colonie bien approvisionnée"
 well_supplied_colony_county_modifier_desc:0 "Cette colonie reçoit des ressources de façon abondante de la part du reste du pays."
 poorly_supplied_colony_county_modifier:0 "Colonie mal approvisionnée"
 poorly_supplied_colony_county_modifier_desc:0 "Cette colonie peine à recevoir même les ressources de base de la part du reste du pays."
 agot_filler_colonization.1001.t:0 "[colony_province.GetNameNoTooltip] : Campagne de recrutement"
 agot_filler_colonization.1001.desc:0 "À bien des égards, les progrès de la colonie de [colony_province.GetName] sont satisfaisants. Un nouveau site favorable au développement a été identifié, les structures primaires érigées, quantité d'outils et de vivres stockés pour pourvoir aux besoins des colons sur les premières années, et enfin, des terres ont été défrichées pour le pâturage et les cultures.\n\nMalheureusement, à toutes ces bonnes nouvelles s'en ajoute une mauvaise que m'annonce avec exaspération [stewardship_companion.Custom('FR_le_Char_Pi')][stewardship_companion.GetTitledFirstName] : « L'afflux de colon est insuffisant, [ROOT.Char.Custom('FR_MonseigneurMadame')]. Pour assurer la pérennité de la colonie, il va nous falloir beaucoup plus de main d'œuvre. »"
 agot_filler_colonization.1001.a:0 "Envoyons des hommes d'armes pour relocaliser de la main-d'œuvre."
 maa_gathering_new_colonists_modifier:0 "Campagne de recrutement"
 maa_gathering_new_colonists_modifier_desc:0 "Ce personnage a réquisitionné ses hommes d'armes pour escorter des roturiers jusqu'à ses colonies."
 agot_filler_colonization.1001.b:0 "Finançons la subvention migratoire de travailleurs qualifiés."
 agot_filler_colonization.1001.c:0 "Mes [ROOT.Char.GetFaith.PriestNeuterPlural] accorderont les bénédictions [ROOT.Char.GetFaith.HighGodNamePossessive] aux nouveaux arrivants."
 agot_filler_colonization.1002.t:0 "[colony_province.GetNameNoTooltip] : Une nouvelle vie"
 agot_filler_colonization.1002.desc:0 "La colonie de [colony_province.GetName] étant en pleine essor, les opportunités et investissements fleurissent à tout va, et ceci attire bien évidemment l'attention des provinces voisines, notamment [origin_county.GetNameNoTier].\n\nCes dernières semaines, la vague migratoire [migrant_culture.GetName] n'a eu de cesse de s'accroître, donnant lieu à d'importants mouvements de population venus chercher une nouvelle vie sous ma protection.\n\nCertes, ils fourniront la main d'œuvre dont la colonie a tant besoin pour continuer de prospérer, mais si je laisse cet afflux se poursuivre sans veiller au grain, les colons locaux se retrouveront en sous-nombre très rapidement !"
 agot_filler_colonization.1002.a:0 "Nous avons besoin de tous les bras disponibles !"
 agot_filler_colonization.1002.b:0 "Que la milice locale chasse ces importuns !"
 allowed_migrants_in_colony:0 "Vous avez encouragé l'immigration"
 forbade_migrants_in_colony:0 "Vous avez interdit l'immigration"
 agot_filler_colonization.1003.t:0 "[colony_province.GetNameNoTooltip] : L'incendie"
 agot_filler_colonization.1003.desc:0 "J'ai eu vent d'un terrible incendie à [colony_province.GetName] qui aurait balayé une grande partie de la colonie. La cause est incertaine, même si des ouï-dire font mention d'un excès de zèle de la part d'un boulanger, quoi qu'il en soit, abris et entrepôts sont maintenant devenus un tas de cendres fumantes.\n\nSeule une intervention immédiate peut encore sauver la situation, car sans aide extérieure, les colons seront contraints d'abandonner les ruines. Un bilan des dégâts causés par le sinistre a été dressé, et il apparait évident qu'un investissement est plus que nécessaire pour permettre la reconstruction des lieux."
 agot_filler_colonization.1003.a:0 "Donnons à ces braves gens l'or dont ils ont besoin."
 agot_filler_colonization.1003.b:0 "Je vais superviser en personne la reconstruction."
 agot_filler_colonization.1003.b.success:0 "Sous votre direction, les réparations vont bon train"
 agot_filler_colonization.1003.b.success.toast:0 "D'une main de maître"
 agot_filler_colonization.1003.b.failure:0 "Sous votre direction, les réparations sont plus coûteuses que prévu"
 agot_filler_colonization.1003.b.failure.toast:0 "À bâton rompus"
 agot_filler_colonization.1003.c:0 "Qu'ils apprennent de leurs erreurs !"
 agot_filler_colonization.1003.c.failure.toast:0 "Colonie abandonnée"
 agot_filler_colonization.1003.c.success.toast:0 "La colonie perdure"
 agot_filler_colonization.1004.t:0 "[colony_province.GetNameNoTooltip] : L'Antre du pêché"
 agot_filler_colonization.1004.desc.1:0 "D'étranges nouvelles sont relatées par des [ROOT.Char.GetFaith.PriestNeuterPlural], lesquels fustigent [colony_province.GetName], dont la population croissante commence peu à peu à se détourner [ROOT.Char.GetFaith.HighGodNamePossessive] au profit de pratiques qu'ils jugent hérétiques.\n\n"
 agot_filler_colonization.1004.desc.2.deceit:0 "Le mensonge est devenu le nouveau sacerdoce de la populace, qui raille l'honnêteté désormais érigée comme parangon de la naïveté. Félonie, escroquerie et menterie sont les aléas pernicieux qui gangrènent la colonie et frappent les malheureux de passage, mais plus encore ceux qui la visitent, c'est [ROOT.Char.Custom('FR_CeluiCelle')] qui la dirige — moi en l'occurrence — qui en pâtit le plus, car comment gouverner une terre si je ne puis me fier à ses habitants ?\n\n"
 agot_filler_colonization.1004.desc.2.chastity:0 "Des pratiques décriées de par leur nature puritaine, où les gens réprouvent les plaisirs charnels et imposent leurs mœurs pudibondes aux autres. « Où vont les putes ? » demandent certains, « pas à [colony_province.GetNameNoTooltip] » leur répond-on. Et même si l'on fait fi de l'outrage manifeste envers [ROOT.Char.GetFaith.FertilityGodName], la stabilité démographique pourrait s'en trouver menacée.\n\n"
 agot_filler_colonization.1004.desc.2.compassion:0 "La bonté et la bienveillance sont devenues le pinacle de la vertu pour ces gens-là, et grand bien leur fasse pourrait-on rétorquer, à ceci près que le train de vie coloniale impose le labeur et des choix difficiles. Comment une colonie peut-elle espérer prospérer quand la naïveté gangrène des esprits qui n'ont plus la corvée mais la candeur en tête ?\n\n"
 agot_filler_colonization.1004.desc.3:0 "Ceux qui suivent [ROOT.Char.GetFaith.GetNameNoTooltip] auront en horreur un tel comportement, raison pour laquelle je me dois de mûrement réfléchir sur la manière de remédier à cette crise."
 agot_filler_colonization.1004.a:0 "Que le courroux [ROOT.Char.GetFaith.WarGodNamePossessive] s'abatte sur ces impies !"
 persecuted_colonists_county_modifier:0 "Population persécutée"
 persecuted_colonists_county_modifier_desc:0 "Les habitants de ce comté ont été contraints de se conformer aux doctrines morales de la foi du pays."
 agot_filler_colonization.1004.b:0 "Guère plus que de menues déviances. Rien qui ne justifie de s'alarmer."
 unpersecuted_colonists_county_modifier:0 "Liberté de culte"
 unpersecuted_colonists_county_modifier_desc:0 "Les habitants de ce comté bénéficient d'une tolérance religieuse qui les protège de la persécution."
 sided_with_sinners_modifier:0 "Laxisme religieux"
 sided_with_sinners_modifier_desc:0 "Ce personnage a fermé les yeux sur les pratiques immorales qui ont lieu sur ses terres."
 agot_filler_colonization.1004.c:0 "Voilà une vision du monde qui me plaît…"
 agot_filler_colonization.1005.t:0 "[colony_province.GetNameNoTooltip] : Duplicité et complicité"
 agot_filler_colonization.1005.desc:0 "Les mauvaises nouvelles font mauvaises hôtes sous mon toit, mais il serait mal avisé de les ignorer. J'apprends donc que la colonie installée à [colony_province.GetName] connaît des déboires d'ordre financier, comme l'atteste la baisse des revenus collectés. Il ne serait pas inconsidéré de n'y voir qu'un simple aléa comme il peut en exister tant lorsque l'on s'attèle à dompter la nature sauvage et intraitable, jaçoit qu'il est étrange que cette baisse soit d'une régularité parfaite. En outre, le banditisme va bon train, puisque les biens et moyens déployés pour contrebalancer ces pertes finissent immanquablement dans les mains de brigands.\n\nTout ceci éveille déjà grandement mon intérêt, mais ce qui le suscite avec d'autant plus de méfiance, ce sont les ouï-dire à propos de [governor.GetFirstName], un[governor.Custom('FR_E')] intendant[governor.Custom('FR_E')] dont on prête de l'accointance avec la vermine locale. Avec cette clé en tête, l'énigme prend tout son sens. Briganderie et corruption — l'épée et le bouclier. La combinaison mortelle en somme…"
 agot_filler_colonization.1005.a:0 "Je me trouverais quelqu'un de plus digne de confiance."
 agot_filler_colonization.1005.a.tt:0 "[governor.GetFirstNameNoTooltip] est congédié[governor.Custom('FR_E')] de son poste"
 agot_filler_colonization.1005.b:0 "Qu'[governor.Custom('FR_IlElle')] débarrasse le plancher. Et par débarrasse, j'entends… #italic disparaître.#!"
 agot_filler_colonization.1005.b.success:0 "[governor.GetFirstNameNoTooltip] n'est plus un problème"
 agot_filler_colonization.1005.b.success.toast:0 "Complot réussi"
 agot_filler_colonization.1005.b.failure:0 "Les agents de votre complot ont été pris sur le fait"
 agot_filler_colonization.1005.b.failure.toast:0 "Échec du complot"
 corrupt_governor_county_modifier:0 "Corruption"
 corrupt_governor_county_modifier_desc:0 "Ce comté souffre de la gouvernance corrompue."
 agot_filler_colonization.1005.c:0 "[governor.Custom('FR_IlElle')|U] semble coutumi[governor.Custom('FR_ErEre')] des arrangements lucratifs…"
 unofficial_income_modifier:0 "L'argent n'a pas d'odeur"
 unofficial_income_modifier_desc:0 "Ce personnage gagne un pécule supplémentaire par des moyens… détournés."
 agot_filler_colonization.1006.t:0 "[colony_province.GetNameNoTooltip] : Querelle coloniale"
 agot_filler_colonization.1006.desc:0 "Ma colonie, [colony_province.GetName], connaît des tensions intestines, comme c'est souvent le cas pour les grands projets qui n'en sont qu'à leur balbutiement. En l'occurrence, c'est un différend qui oppose deux responsables locaux, chacun ayant sa vision bien précise du devenir de ces terres.\n\n[merchant.GetFirstName], éminent[merchant.Custom('FR_E')] marchand[merchant.Custom('FR_E')] dans la région, soutient un projet mercantile, où l'or sera réinvesti dans le développement du commerce local et l'accès aux marchés extérieurs, tout cela dans le but de faire croître les conditions de vie et prospérer la population.\n\nDe son côté, [militia.GetFirstName], en bon chef de la milice locale, lui oppose une vision portée sur le militarisme, où l'investissement doit servir à renforcer l'armée, notamment pour veiller à la défense de la colonie.\n\nPuisque la situation est semblable à une impasse, et qu'aucun accord ou compromis n'a été trouvé, c'est à moi qu'il revient de trancher la question, et avec doigté, car de mon choix repose peut-être l'avenir de [colony_province.GetNameNoTooltip]…"
 agot_filler_colonization.1006.a:0 "À quoi bon coloniser des [colony_province.Custom('FR_TerrainTypeProvince_Plural')] si l'on ne peut les défendre ?"
 agot_filler_colonization.1006.b:0 "À quoi serviront des défenses si c'est pour protéger des bâtisses abandonnées ?"
 agot_filler_colonization.1006.c:0 "Je suis sûr de pouvoir trouver un terrain d'entente entre ces deux-là..."
 agot_filler_colonization.1006.c.success:0 "Vous négociez avec succès un compromis"
 agot_filler_colonization.1006.c.success.toast:0 "Un terrain d'entente"
 agot_filler_colonization.1006.c.failure:0 "Vous échouez à trouver un compromis"
 agot_filler_colonization.1006.c.failure.toast:0 "Une faction locale prend le contrôle"
 military_colony_county_modifier:0 "Avant-poste militaire"
 military_colony_county_modifier_desc:0 "Avec le développement de ce comté placé sous la responsabilité de la milice locale, la puissance militaire est privilégiée au détriment de l'économie."
 merchant_colony_county_modifier:0 "Avant-poste économique"
 merchant_colony_county_modifier_desc:0 "Avec le développement de ce comté placé sous la responsabilité des marchands locaux, l'économie est privilégiée au détriment de la puissance militaire."
 harmonious_colony_county_modifier:0 "Gouvernance efficace"
 harmonious_colony_county_modifier_desc:0 "Un compromis a fait taire les querelles intestines dans ce comté, permettant de combiner puissance militaire et économique pour garantir la prospérité de tous."
 agot_filler_colonization.1007.t:0 "[colony_province.GetNameNoTooltip]: Boycott"
 agot_filler_colonization.1007.desc.1.steward:0 "My steward,"
 agot_filler_colonization.1007.desc.1.advisor:0 "My advisor,"
 agot_filler_colonization.1007.desc.2:0 "[steward.GetFirstName] taps on my door, with a face glummer than usual. [steward.GetSheHe|U] has spent an exasperating day negotiating with the guilds, and it seems these discussions have not been fruitful.\n\n\"Why is it that whenever the guildsmen get together, it feels like a conspiracy against the people? They complain that taxes on the trade route to our colony in [colony_province.GetName] are too high, and they are threatening to boycott any goods manufactured there. If they cripple its economy now, then they will be strangling it at birth. I have tried to persuade them, yet nothing avails me. I fear you may need to intervene...\"\n\nI share [steward.GetHerHis] irritation at the news. Why must so much depend on these avaricious guildsmen? Something will have to be done."
 agot_filler_colonization.1007.a:0 "Perhaps a temporary reduction in taxation will silence them?"
 reduced_taxes_on_guilds_modifier:0 "Reduced Taxation"
 reduced_taxes_on_guilds_modifier_desc:0 "This character has temporarily reduced taxation on the guilds to gain their cooperation."
 agot_filler_colonization.1007.b:0 "I'm sure we can come to some sort of compromise..."
 agot_filler_colonization.1007.b.success:0 "You agree to a deal to sell shares in the colony"
 agot_filler_colonization.1007.b.success.toast:0 "Successful Deal"
 agot_filler_colonization.1007.b.failure:0 "You fail to draw up an attractive deal"
 agot_filler_colonization.1007.b.failure.toast:0 "Unsuccessful Deal"
 agot_filler_colonization.1007.c:0 "It's time to assert a little authority over these money-grabbers!"
 increased_taxes_on_guilds_modifier:0 "Increased Taxation"
 increased_taxes_on_guilds_modifier_desc:0 "This character has temporarily increased taxation to apply pressure to the guilds."
 agot_filler_colonization.1007.c.success.toast:0 "Guilds Relent"
 agot_filler_colonization.1007.c.failure.toast:0 "Guilds Pressure Colony"
 agot_filler_colonization.1007.c.critical_failure.toast:0 "Colony Failure"
 agot_filler_colonization.1008.t:0 "[colony_province.GetNameNoTooltip]: Plague"
 agot_filler_colonization.1008.desc:0 "The latest news from my colony at [colony_province.GetName] is truly horrifying. The settlers have been afflicted by a devastating pestilence that has swept through almost every household. I can barely read the reports, so graphic are their details.\n\nThe illness starts as a fever and unquenchable thirst — some villagers have literally burst in their attempt to slake their desperate urges. Next come the buboes — great black swellings at every joint that expel a noisome yellow pus and render the victim entirely unable to move. In the final stage, these subside, but the afflicted suffer an infernal rash on their faces, so agonizing that some have clawed out their own eyes or torn off their ears and nose in a futile attempt at relief. Death comes to most thereafter, usually with a final torment of spine-cracking spasms.\n\nIf the colony is to be saved, something must be done without delay!"
 agot_filler_colonization.1008.a:0 "Quarantine the colony — no one is to leave! I won't risk this spreading."
 agot_filler_colonization.1008.a.success.toast:0 "Colony Saved"
 agot_filler_colonization.1008.a.failure.toast:0 "Colony Failure"
 agot_filler_colonization.1008.b:0 "I will send men skilled in the treatment of such maladies to aid them."
 agot_filler_colonization.1008.c:0 "The poor souls... Bring those afflicted to [capital.GetNameNoTier] to receive our best care!"
 agot_filler_colonization.1008.c.tt.outbreak:0 "[courtiers|E] and [guests|E] may contract [GetTrait('bubonic_plague').GetName( GetNullCharacter )]"
 agot_filler_colonization.1008.c.outbreak.toast:0 "Outbreak Spreads"
 colony_disease_recovery_county_modifier:0 "Disease Outbreak"
 colony_disease_recovery_county_modifier_desc:0 "The people of this county are recovering from a recent outbreak of disease."
 agot_filler_colonization.1009.t:0 "[colony_province.GetNameNoTooltip]: Prospecting"
 agot_filler_colonization.1009.desc.1.steward:0 "My steward,"
 agot_filler_colonization.1009.desc.1.advisor:0 "My advisor,"
 agot_filler_colonization.1009.desc.2:0 "[steward.GetFirstName] approaches me in my halls with a wide smile on his face. Perhaps he has something good to report for a change...\n\n\"[ROOT.Char.GetTitleAsNameNoTooltip], I have received good news from our colonists in [colony_province.GetName]! While out scouting the uplands of [mineral_province.GetName] searching for bandits, one of their number discovered a strong seam of precious minerals on a rocky outcrop. The settlers are now abuzz with excitement at dreams of future riches and beseech you to organize a survey of the land.\"\n\nWhile this would require an initial investment, if they have truly found a significant deposit, it could provide wealth for many years to come..."
 agot_filler_colonization.1009.a:0 "Charter a survey of [mineral_province.GetNameNoTooltip] at once!"
 rich_mineral_deposit_province_modifier:0 "Rich Mineral Deposit"
 rich_mineral_deposit_province_modifier_desc:0 "A large and bountiful mineral deposit has been found in this province."
 mineral_deposit_province_modifier:0 "Mineral Deposit"
 mineral_deposit_province_modifier_desc:0 "A mineral deposit has been found in this province."
 agot_filler_colonization.1009.a.critical_success.toast:0 "Rich Deposit Found"
 agot_filler_colonization.1009.a.success.toast:0 "Small Deposit Found"
 agot_filler_colonization.1009.a.failure.toast:0 "No Deposit Found"
 agot_filler_colonization.1009.b:0 "Sounds like a waste of gold to me..."
 agot_filler_colonization.1010.t:0 "[colony_province.GetNameNoTooltip] : À croc et à cri"
 agot_filler_colonization.1010.desc:0 "« Bestiasses des [colony_province.Custom('FR_TerrainTypeProvince_Plural')] ! Engeances [ROOT.Char.GetFaith.NegativeAfterLife3] ! »\n\nCes mots, qu'ils soient encrés sur une missive, ou rapportés de vive-voix dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], sont devenus coutumiers de mes journées, à mon grand dam. Colonisation oblige, nombre de gens affluent jusqu'à [colony_province.GetName], et avec les gens viennent les troupeaux. Du bétail de toute sorte qui servira à sustenter une population toujours plus grandissante. Mais de même que l'or attire les voleurs, la viande attire les loups, et ceux-ci en flairent l'odeur de bien plus loin.\n\nPour l'heure, aucun rapport ne fait état de colons blessés, mais bon nombre de têtes de bétail ont été perdues, et pour chaque bête perdue, c'est autant de plaintes rapportées et d'appels à l'aide formulés. C'est l'avenir de la colonie qui est en péril…"
 agot_filler_colonization.1010.a:0 "Le Fléau soit ces maudites bêtes !"
 agot_filler_colonization.1011.t:0 "[colony_province.GetNameNoTooltip] : Les hors-la-loi font la loi"
 agot_filler_colonization.1011.desc:0 "Mon autorité dans [colony_province.GetName] est en déclin constant, et pour cause ? Ces contrées sauvages deviennent littéralement sans foi ni loi.\n\nLa colonie implantée n'est guère plus qu'un amoncèlement de structures primaires dédiées avant tout à la survie de sa population, et dans de telles conditions, il n'est pas rare que de la vermine plus grosse que de simples rats finisse par s'y intéresser, et s'y installer. Vauriens, escrocs et coupe-jarrets deviennent alors plus communs que le commun des mortels.\n\nDans leur vision idéalisée de leur petite personne, ils se voient comme des hommes libres, libre de toute autorité et s'enorgueillissant de préférer porter une couronne plutôt que d'obéir à celle-ci. Et grouille alors des centaines de roitelets qui font fi de #bold la#! Couronne, pour ainsi devenir leurs propres maîtres…"
 agot_filler_colonization.1011.a:0 "La peste soit ces foutus brigands !"
 agot_filler_colonization.1012.t:0 "[colony_province.GetNameNoTooltip]: A Plea for Autonomy"
 agot_filler_colonization.1012.desc:0 "It has been some time since the settlement in [colony_province.GetName] was first established. The initial reports from the colony have been positive, and the work has progressed without problems.\n\nThe next report from the settlement is delivered by [colonist.GetFirstName], who has been selected as the colonists' representative. \"My [ROOT.Char.GetTitleAsNameNoTooltip], my fellow settlers and I come before you with a plea for autonomy,\" [colonist.GetSheHe] states — much to my surprise. \"We've worked hard and reached our goals way ahead of schedule. Such diligence deserves a reward, wouldn't you agree?\"\n\nIt is a bold request indeed to ask for quasi-independence for the colony that I funded. On the other hand, granting their request might lead to mutual benefits..."
 agot_filler_colonization.1012.tt:0 "The colony in [colony_province.GetNameNoTooltip] was completed"
 agot_filler_colonization.1012.a:0 "Aye. Pay your tribute to me, and you may govern yourselves."
 agot_filler_colonization.1012.b:0 "As my vassals, I'd grant you fair treatment and protection."
 agot_filler_colonization.1012.b.tt:0 "You attempt to persuade [colonist.GetFirstNameNoTooltip] to remain your vassal"
 agot_filler_colonization.1012.b.success:0 "Success - [colonist.GetFirstNameNoTooltip] swore fealty"
 agot_filler_colonization.1012.b.failure:0 "Failure - The settlers reject your authority"
 agot_filler_colonization.1012.c:0 "The rule of [colony_province.GetNameNoTooltip] is mine, and no other's!"
 agot_filler_colonization.1012.c.success:0 "You arrest [colonist.GetFirstNameNoTooltip] and pacify [colony_province.GetNameNoTooltip]"
 agot_filler_colonization.1012.c.failure:0 "[colonist.GetFirstNameNoTooltip] escapes your grasp"
 agot_filler_colonization.1013.t:0 "[colony_province.GetNameNoTooltip]: Astonishing Progress"
 agot_filler_colonization.1013.desc:0 "The latest progress reports from the settlement in [colony_province.GetName] have arrived. As I begin to review them, it becomes clear that the workers have been making an astonishing amount of progress, and have in fact finished building up the colony far ahead of schedule!\n\nThis means that the holding in [colony_province.GetName] has been completed through a combination of luck and lack of interruptions from the surrounding wilderness.\n\nA great day indeed for [ROOT.Char.GetPrimaryTitle.GetName]!"
 agot_filler_colonization.1013.a:0 "This is excellent news!"
 agot_filler_colonization.1013.a.tt:0 "The colony in [colony_province.GetName] is completed"
 agot_filler_colonization.1014.t:0 "[colony_province.GetNameNoTooltip]: Rise of the Heretics"
 agot_filler_colonization.1014.desc:0 "A sealed letter reaches me from the settlement in [colony_province.GetName]. It was sent by [heretic_colonist.GetFirstName], one of the local leaders. Apparently, the settlement has been completed faster than expected, but the workers have started to follow the faith of [heretical_faith.GetName]!\n\nWhile I should be pleased at the unexpected progress from the settlement, this divergence in faith is a matter that I cannot leave unaddressed. Should this heresy be allowed to continue, or do I need to stamp it out as soon as possible?"
 agot_filler_colonization.1014.tt:0 "The colony in [colony_province.GetName] was completed"
 agot_filler_colonization.1014.a:0 "They have done well. I shall permit their heresy."
 agot_filler_colonization.1014.b:0 "How dare they stray from the righteous path?"
 agot_filler_colonization.1014.b.tt:0 "You attempt to arrest the heretics"
 agot_filler_colonization.1014.b.success:0 "You capture the heretic leader"
 agot_filler_colonization.1014.b.failure:0 "[heretic_colonist.GetFirstName] evades your grasp"
 agot_filler_colonization.1014.b.failure.tt:0 "Angered, the colonists declare themselves independent"
 agot_filler_colonization.1014.c:0 "Maybe we can work out a compromise?"
 agot_filler_colonization.1014.c.tt:0 "You attempt to convince the settlers to reject the heresy"
 agot_filler_colonization.1014.c.success:0 "You are able to convince the settlers"
 agot_filler_colonization.1014.c.failure:0 "Your words are ineffective"