 agot_appearance_decisions_events.1000.t:0 "Une gamme dynamique"
 agot_appearance_decisions_events.1000.desc:0 "Des dizaines de couleurs exotiques et ostentatoires se présentent devant moi, un véritable arc-en-ciel s'est formé sur la table. J'essai de contenir mon impatience alors que je parcours les différents choix, m'imaginant celui qui me conviendrait le mieux. Après un moment de réflexion, un domestique s'approche. « Avez-vous pris votre décision, [ROOT.Char.Custom('FR_MonseigneurMadame')] ? »"
