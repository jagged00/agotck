 agot_appearance_decisions_events.4000.t:0 "Ô laideur ennemie !"
 agot_appearance_decisions_events.4000.desc:0 "Une fois n'est pas coutume, je contemple mon reflet dans le miroir. Cet acte autrefois si anodin est devenu un supplice, et pour cause, le faciès qui devrait m'apparaître comme familier me semble pourtant si étranger. Est-ce bien moi qui se cache derrière une telle épouvanterie ? Est-ce réellement à moi qu'appartiennent ces traits qui me donnent tant de haut-le-cœur ?\n\nLa meurtrissure n'a pas seulement marqué ma chair, elle a aussi entamé mon esprit, et lorsque un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetWomanMan] doit déjà composer avec la bonne tenue de ses terres et de ses sujets, peut-[ROOT.Char.Custom('FR_IlElle')] se permettre de s'égarer jour après jour dans des songes gangrénant ses pensées ?"
 agot_appearance_decisions_events.4000.a:0 "Qu'on m'apporte de quoi cacher cette disgrâce."
 agot_appearance_decisions_events.4000.b:0 "J'en ai assez de voir cette trogne si repoussante !"
 agot_appearance_decisions_events.4000.c:0 "Faisons contre mauvaise fortune bon cœur, et au diable mon charme."
 agot_appearance_decisions_events.4001.t:0 "Quoi ma gueule ?"
 agot_appearance_decisions_events.4001.desc:0 "Cette journée, comme tant d'autres, s'ouvre par mon rituel matinal : attacher la lanière de cuir et sentir le baiser froid du masque sur ma chair. Un profond soupir traverse la pièce tandis qu'un être meurtri se dessine dans le miroir. Cette meurtrissure qui m'accompagne au quotidien a beau être cachée derrière l'apparat, elle n'en demeure pas moins présente.\n\nJe m'interroge alors sur la pertinence de cette chose qui orne mon faciès. À quoi bon cacher la vérité de façon si ostentatoire ? Est-ce la peur de m'accepter tel que je suis qui justifie ce rituel si grotesque ? Ou bien la crainte de voir des yeux épouvantés chaque fois que je franchis le seuil de mes appartements ?\n\nSi je suis si pleutre que j'en viens à craindre d'affronter les regards d'autrui, comment pourrais-je avoir le courage d'être [ROOT.Char.GetTitleAsNameNoTooltip|l] ?"
 agot_appearance_decisions_events.4001.a:0 "Qu'elle soit effroyable ou non, la vérité se doit d'être mise à nu."
 agot_appearance_decisions_events.4001.b:0 "La couardise est plus facile à porter que la disgrâce."
 agot_hair_dye.hibiscus_hair_dye_hash:0 "Hibiscus"
 agot_appearance_decisions_events.5000.t:0 "N’avoir d’yeux que pour son allure"
 agot_appearance_decisions_events.5000.desc:0 "Je me regarde au travers du reflet dans le miroir — moins l'œil qui m'a été honteusement arraché par l'infortune.\n\nJe devrais peut-être reconsidérer la question sur ce qu'il serait bon de porter pour cacher cette béante disgrâce."
