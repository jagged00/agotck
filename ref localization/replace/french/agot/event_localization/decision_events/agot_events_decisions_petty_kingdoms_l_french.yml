 agot_proclaim.0001.t:0 "Le Trône de Fer a été reformé"
 agot_proclaim.0001.desc:0 "Après une succession d'événements significatifs, un dirigeant a émergé pour unir les terres Westeros sous une seule bannière.\n\nDes années de batailles acharnées, de fine diplomatie et de mariages stratégiques auront permis de réaliser ce que d'aucuns pensaient infaisable — reformer le Trône de Fer. Détenant cinq des neuf titres d'empire au sein de Westeros, cet individu a fait montre de prouesses et de détermination inégalées.\n\nLe Trône de Fer, autrefois morcelé et son héritage terni par les conflits, a été restauré à force de volonté et d'ambition. Les Sept Couronnes, jadis divisées par les rivalités et les guerres, entrevoient désormais une nouvelle ère de paix et de stabilité.\n\nSeigneurs et grandes dames de Westeros ne peuvent plus feindre l'indifférence devant cette réalité émergente — et vous non plus. Ainsi, ploierez-vous le genoux ou ferez-vous face à la puissance du Trône de Fer ?"
 agot_proclaim.0100.t:0 "Le royaume de Roches-aux-runes a été reformé"
 agot_proclaim.0100.desc:0 "Un nouveau dirigeant a émergé dans le Val, parvenant à unifier les territoires morcelés en restaurant l'ancien royaume de Roches-aux-Runes.\n\nLe legs de la maison Royce a été restauré, apportant stabilité et force à la région.\n\nCette résurgence marque un bouleversement significatif dans l'équilibre des pouvoirs, et de fait, vous allez devoir répondre à l'émergence de cette nouvelle puissance dans le Val."
