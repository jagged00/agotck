l_french:
 agot_proclamation_it_succession_msg_inheritance:0 "« [player.Custom('FormOfAddressForLiege')|U], une lettre portant le sceau de la Maison [new_holder.GetHouse.GetBaseNameNoTooltip] est arrivée de [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] ; [previous_holder.Custom('FR_le_Char_Pi')][previous_holder.GetTitledFirstName] [previous_holder.GetDeathReason] — puisse-t-[previous_holder.Custom('FR_IlElle')] reposer en paix.\n\n[new_holder.GetPrimaryTitle.GetNameNoTierNoTooltip] a maintenant pour successeur légitime : [new_holder.GetFirstName] [new_holder.GetHouse.GetBaseName]. »"
 agot_proclamation_it_succession_msg_conquest:0 "« [player.Custom('FormOfAddressForLiege')|U], une lettre portant le sceau de la Maison [new_holder.GetHouse.GetBaseName] est arrivée de [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] ; les forces menées par [previous_holder.GetFirstName] [previous_holder.GetHouse.GetBaseName] ont subis une cuisante défaite et [new_holder.Custom('FR_le_Char_Pi')][new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] a pris le Trône de Fer par droit de conquête. »"
 agot_proclamation_it_succession_msg_abdication:0 "« [player.Custom('FormOfAddressForLiege')|U], une lettre portant le sceau de la Maison [new_holder.GetHouse.GetBaseName] est arrivée de [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] ; Dans un retournement de situation inattendu, Sa Majesté [previous_holder.GetFirstNameRegnal] [new_holder.GetHouse.GetBaseName] a renoncé à son droit de régner. En conséquence de quoi, [new_holder.Custom('FR_le_Char_Pi')][new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] a été proclamé[new_holder.Custom('FR_E')] comme son successeur et va gravir les marches du Trône de Fer pour ainsi gouverner les Sept Couronnes. »"
 agot_proclamation_it_succession_msg_usurped:0 "« [player.Custom('FormOfAddressForLiege')|U], une lettre portant le sceau de la Maison [new_holder.GetHouse.GetBaseName] est arrivée de [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] ; faisant fi de la ligne de succession établie, [new_holder.Custom('FR_le_Char_Pi')][new_holder.GetTitledFirstName] [new_holder.GetHouse.GetBaseName] a succédé[new_holder.Custom('FR_E')] à [previous_holder.GetFirstName] [previous_holder.GetHouse.GetBaseName] en tant que [Select_CString(new_holder.IsFemale,'nouvelle suzeraine','nouveau seigneur')] des Sept Couronnes.\n\nDans les nobles cours, les ombres laissent échapper des murmures, et le mot #italic usurpat[new_holder.Custom('FR_EurRice')]#! semble rythmer les conversations tenus à voix basse, mais que cela soit vrai ou non, il est indéniable qu'[new_holder.Custom('FR_IlElle')] a la main mise sur le Trône de Fer. »"
 agot_proclamation_it_succession_msg_fallback:0 "« [player.Custom('FormOfAddressForLiege')|U], une lettre portant le sceau de la Maison [new_holder.GetHouse.GetBaseName] est arrivée de [new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] ; [new_holder.Custom('FR_le_Char_Pi')|U][new_holder.GetTitledFirstName] de la Maison [new_holder.GetHouse.GetBaseName] a été proclamé[new_holder.Custom('FR_E')] [Select_CString(new_holder.IsFemale,'suzeraine','seigneur')] des Sept Couronnes et [Select_CString(new_holder.IsFemale,'protectrice','protecteur')] du royaume. »"
 agot_proclamation_events.1000.t:0 "Parmi les grands de ce monde"
 agot_proclamation_events.1000.desc_intro:0 "C'est le genoux à terre que je prononce les serments de loyauté envers [king.Custom('FR_le_Char_Pi')][king.GetTitledFirstName], à qui je dois [kingdom_title_to_grant.GetNameNoTier] et le titre de [ROOT.Char.GetTitleAsNameNoTooltip|l] qui va avec.\n\n"
 agot_proclamation_events.1000.desc.not_legitimate_house:0 "Jamais le sang de ma lignée n'aura atteint tel rang ni acquis tel honneur, et c'est ici, sous le regard de mes vassaux, que se dresse une nouvelle grande maison. Le nom des [ROOT.Char.GetHouse.GetNameNoTooltip] aura désormais une autre teneur dans ces contrées, et son écho, je l'espère, éteindra les murmures factieux que profèrent ceux qui compissent mon nom pour glorifier la Maison [legitimate_house.GetBaseName], dont la légitimité est le sacerdoce de maints fervents partisans."
 agot_proclamation_events.1000.desc.legitimate_house:0 "Le domaine ancestral de ma famille est de nouveau entre les mains d'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetHouse.GetNameNoTooltip], et c'est ici, sous le regard de mes vassaux, que l'honneur spolié d'une grande maison lui est légitimement rendu. Je ferais honneur à mes ancêtres, et m'assurerais de préserver d'un nouveau camouflet nos générations futures."
 agot_proclamation_events.1000.a:0 "[new_holder.GetHouse.GetMotto] !"
 agot_proclamation_it_succession_msg_title:0 "Succession du Trône de Fer"