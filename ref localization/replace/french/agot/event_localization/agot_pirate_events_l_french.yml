 agot_pirate_port_rate_changed.desc_02:0 "Les [pirate_port_rate|El] deviendront [GetLaw('pirate_tax_rate_02').GetName]."
 agot_pirate_port_rate_changed.desc_03:0 "Les [pirate_port_rate|El] deviendront [GetLaw('pirate_tax_rate_03').GetName]."
 agot_pirate_port_rate_changed.desc_04:0 "Les [pirate_port_rate|El] deviendront [GetLaw('pirate_tax_rate_04').GetName]."
 agot_pirate_events.9201.t:0 "Pirates et pénibilité"
 agot_pirate_events.9201.desc:0 "Si le soupir avait forme humaine, nul doute qu'il aurait en cet instant les traits [colonist.Custom('FR_du_Char_Pi')][colonist.GetTitledFirstName].\n\n« [ROOT.Char.Custom('FormOfAddressForLiege')|U], débute-t-[colonist.Custom('FR_IlElle')], cette terre n'est bonne que pour les pirates et tous ceux de leur espèce. Les fermiers ne peuvent rien tirer d'un sol aussi pauvre, et les dangers qui rôdent près des côtes sont une plaie pour le commerce. Je vous le dis, sans soutien, je ne pourrais rien en tirer, et quand bien même, le jeu n'en vaudrait sûrement pas la chandelle. »\n\nVoilà qui a le mérite d'être on ne peut plus clair. J'ai donc le choix ; apporter mon aide pour garder ces terres sous ma gouvernance, mais au risque de dépenses trop élevées pour de piètres profits ; ou manquer à mes devoirs de [ROOT.Char.GetTitleAsNameNoTooltip|l], et risquer le mécontentement de mes vassaux."
 agot_pirate_events.9201.a:0 "Je pourvoirai à vos besoins, [colonist.GetTitledFirstNameNoTooltip]."
 agot_pirate_events.9201.b:0 "Faites ce qu'il faut avec ce que vous avez."
 agot_pirate_events.9201.b.tt:0 "[colonist.Custom('FR_le_Char_Pi')|U][colonist.GetTitledFirstNameNoTooltip] pourrait mal le prendre."
 agot_pirate_events.9300.t:0 "Protéger la piraterie"
 agot_pirate_events.9300.desc:0 "Une invasion d'envergure vient d'être lancée par [attacker.Custom('FR_le_Char_Pi')][attacker.GetTitledFirstNameNicknamed]. Il ne s'agit pas là d'une banale conquête, mais d'une éradication pure et simple de toute piraterie dans la région.\n\nNous ne pouvons pas rester les bras ballants alors que c'est notre mode de vie qui est menacé. Nous devons nous préparer et joindre nos forces [attacker.Custom('FR_au_Char_Pi')][defender.GetTitledFirstName] !\n\nSi nous perdons cette guerre, nous perdrons nos navires, notre territoire, nous perdrons absolument tout !"
 agot_pirate_events.9300.a:0 "Tout le monde à son poste !"
