 agot_pirate_events.0003.t:0 "Frais d’amarrage"
 agot_pirate_events.0003.desc:0 "« Soyez [ROOT.Char.Custom('FR_LeLa')] bienvenu[ROOT.Char.Custom('FR_E')] » m'accueille-t-on chaleureusement sitôt le pied posé sur le quai — mais c'est moins le capitaine a qui l’on fait bon accueil que l'or qu’il transporte, après tout.\n\n[port_name.GetName] étant sous autorité pirate, l'accueil protocolaire est rapidement balayé pour en venir au cœur du sujet :\n\nLes frais d'amarrage s’élèvent à #P [SCOPE.GetValue('port_docking_fee')|0]#! @gold_icon!\nAuxquels s'ajoutent un octroi annuel d'un montant de #P [SCOPE.GetValue('yearly_port_fee')|0]#! @gold_icon!\n\nBien entendu, on ne manque pas de m'informer que cette #italic taxe#! peut être modifiée au bon vouloir et sans aucun préavis, outre le fait que son montant est proportionnel à la taille du navire. Et, comme si cela ne suffisait pas, je sens encore davantage la corde se nouer autour de mon cou lorsque je suis prévenu[ROOT.Char.Custom('FR_E')] que tout manquement pourrait se solder par ma #N mise aux fers !#!"
 agot_pirate_events.0003.a:0 "Et on dit que le crime ne paie pas ?"
 agot_pirate_events.0004.t:0 "Taxe portuaire annuelle"
 agot_pirate_events.0004.desc:0 "« Capitaine » m'interpelle-t-on, comme pour me rappeler à l'ordre, et de suite j'en comprends la raison.\n\nUne année s'est écoulée depuis les derniers droits d’amarrages, et [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip|l] mouille toujours dans le port [port_holder.Custom('FR_du_Char_Pi')][port_holder.GetTitledFirstName].\n\nConformément à la loi en vigueur, il est stipulé que je dois m'acquitter de #P [SCOPE.GetValue('yearly_port_fee')|0]#! @gold_icon!\n\n#italic Mais s'attend-on vraiment à ce qu'un[ROOT.Char.Custom('FR_E')] pirate se conforme aux lois ?#!"
 agot_pirate_events.0004.a:0 "Quelle chance que je sois un[ROOT.Char.Custom('FR_E')] honnête pirate, n'est-ce pas ?"
 agot_pirate_events.0004.b:0 "#EMP *Crache*#! Voilà ce que j'en pense de vos lois !"
 agot_pirate_events.0004.c:0 "[port_holder.Custom('FR_le_Char_Pi')|U][port_holder.GetTitledFirstNameNoTooltip] me doit un… #italic service.#!"
 agot_pirate_events.0004.c_tt:0 "Utiliser l’[strong_hook|El] que vous avez contre [port_holder.Custom('FR_le_Char_U_Pi')][port_holder.GetShortUIName] pour vous épargner les frais de l’année en cours."
 agot_pirate_events.0100.t:0 "D’écumeu[ROOT.Char.Custom('FR_RSe')] des terres à écumeu[ROOT.Char.Custom('FR_RSe')] des mers"
 agot_pirate_events.0100.desc:0 "L'ordre donné, le campement est levé, à titre définitif cette fois. Les tentes sont repliées et tout l'équipement, le matériel et les biens sont acheminés sur le pont de notre nouveau foyer.\n\n#italic [ROOT.Char.GetPrimaryTitle.GetNameNoTier] !#!\n\nIl ne paie pas de mine il est vrai, et certainement que l'on peut attendre mieux d'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetWomanMan] de ma trempe qu'un rafiot miteux, mais je saurais lui donner une seconde jouvence.\n\nJe sens d'ici la senteur du sel et le parfum du butin qui nous attends !"
 agot_pirate_events.0100.a:0 "« Capitaine [ROOT.Char.GetFirstNameNoTooltip] », voilà un nom qui fera frémir les flots !"
 agot_pirate_events.0101.t:0 "Bon vent et bonne mer !"
 agot_pirate_events.0101.desc:0 "Me voilà enfin libéré[ROOT.Char.Custom('FR_E')] d'un poids que je ne supportais plus. Fini de vivre terrer comme un rat dans un repaire miteux, fini la vie à terre alors que la mer me réclame depuis si longtemps.\n\nDésormais il n'y a que moi, la mer et [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]."
 agot_pirate_events.0101.a:0 "Du nerf moussaillons ! Les marchands ne vont pas se piller tout seuls !"
 agot_pirate_auto_join_port_war_interface_toast_title:0 "Guerre défensive rejointe"
 agot_pirate_auto_join_port_war_interface_toast:0 "En raison de la guerre déclarée contre le port où vous vous situez, vous avez rejoint automatiquement le camp des défenseurs."
 agot_pirate_events.0200.t:0 "Du vent !"
 agot_pirate_events.0200.desc:0 "Alors occupé[ROOT.Char.Custom('FR_E')] à [ROOT.Char.Custom('IdleActivity')], tout en profitant de la caresse du vent salé, on m'extirpe de mes pensées avec la même délicatesse qu'une vague qui frappe les récifs. La raison de cette brutale impolitesse est une missive, sobrement signée par [actor.Custom('FR_le_Char_Pi')][actor.GetTitledFirstName].\n\n« Par la présente, je vous somme de quitter [port_name.GetName]. Emportez loin d'ici votre rafiot, et la vermine qui y grouille, ou il vous en coûtera cher ! »\n\nQu'on m'insulte moi, c'est une chose, qu'on insulte [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] en est une autre. Mais comme il est explicitement précisé, contrevenir à cette injonction pourrait me valoir quelques foudres mal senties."
 agot_pirate_events.0200.a:0 "Mieux vaut mettre les voiles pour [new_destination.GetName]."
 agot_pirate_events.0200.b:0 "Et qu'est-ce qu'il va faire ? M'arrêter ?"
 agot_pirate_events.0200.c:0 "À bien y réfléchir, il est grand temps de me trouver une nouvelle vocation."
 agot_pirate_events.0200.msg_pirate_moved_title:0 "Pirate sur le départ"
 agot_pirate_events.0200.msg_pirate_moved_desc:0 "[recipient.Custom('FR_le_Char')|U][recipient.GetName] a consenti à lever l’ancre et quitter [port_name.GetNameNoTooltip] !"
 agot_pirate_events.0200.msg_pirate_squatting_title:0 "Refus de partir"
 agot_pirate_events.0200.msg_pirate_squatting_desc:0 "[recipient.Custom('FR_le_Char')|U][recipient.GetName] a refusé de quitter [port_name.GetNameNoTooltip] ! Vous pouvez tenter de saisir son navire via l’[character_interaction|El]."
 agot_pirate_events.0200.msg_pirate_renouncd_piracy_title:0 "Un[recipient.Custom('FR_E')] pirate en moins"
 agot_pirate_events.0200.msg_pirate_renouncd_piracy_desc:0 "Vos efforts pour contraindre [recipient.Custom('FR_le_Char')][recipient.GetName] à quitter [port_name.GetNameNoTooltip] l’on amené à renoncer à la piraterie et à devenir simple [Concept('adventurer',Select_CString(recipient.IsFemale,'aventurière','aventurier'))|E]."
 agot_pirate_events.0300.t:0 "Paiement refusé"
 agot_pirate_events.0300.desc:0 "« Nous avons un[pirate.Custom('FR_E')] #italic resquilleu[pirate.Custom('FR_RSe')]#! mon capitaine » m'informe-t-on en me présentant le registre du port, dont le cuir usé, les pages chiffonnées et l'apparente tâche de vin en coin témoignent de tout l'amour que les pirates ont pour les écrits.\n\n#italic Capiténe : [pirate.GetFirstName]#!\n#italic Navire : [pirate.GetPrimaryTitle.GetNameNoTier]#!\n#italic Montant : #P [SCOPE.GetValue('yearly_port_fee')|0]#!#! @gold_icon!\n\nJe passe outre la grossière faute pour ne lire que ce qui m'intéresse, à savoir le montant des frais qu'[ROOT.Char.Custom('FR_IlElle')] se refuse à payer.\n\n« Que fait-on de c[pirate.Custom('FR_EEtte')] [pirate.Custom2('InsultNoun', ROOT.Char)] ? »"
 agot_pirate_events.0300.a:0 "Je ferme les yeux… à titre exceptionnel."
 agot_pirate_events.0300.b:0 "Foutez-moi ça au trou !"
 agot_pirate_events.9000.t:0 "Un nouveau capitaine à la barre"
 agot_pirate_events.9000.desc:0 "Le capitaine [dying_pirate_predecessor.GetName] [dying_pirate_predecessor.GetDeathReason].\nC’est à moi qu’il revient désormais de commander #italic [ROOT.Char.GetPrimaryTitle.GetNameNoTier]#! !"
 agot_pirate_events.9000.desc_maa_reset:0 "\n\nCertains ont été prompts à m’accepter comme nouveau capitaine, mais d’autres, par contre, parmi les plus aguerris qui plus est, ont quitté l’équipage pour aller quérir la gloire et l’or autrement, autre part.\n\n#bold Pff#!, qu’ils voguent jusqu’[ROOT.Char.GetFaith.NegativeAfterLife2] si cela leur chante, et bon vent à eux. Je m’en trouverais un autre d’équipage, des loups de mer plus loyaux que ces chiens !"
 agot_pirate_events.9000.a:0 "La fortune nous attend ! #bold Hissez la grand-voile !#!"
