l_french:
 agot_trial_of_seven.0100.t:0 "Au regard des dieux et du royaume"
 agot_trial_of_seven.0100.desc:0 "Je puis à peine profiter d'avoir le plus noble des couvre-chefs qui orne ma tête, que déjà retentit l'opposition ayant pris forme sous les traits [accuser_leader.Custom('FR_du_Char_Pi')][accuser_leader.GetTitledFirstName] :\n\n« [ROOT.Char.GetFirstNameNoTooltip] [ROOT.Char.GetHouse.GetNameNoTooltip], [ROOT.Char.GetTitleAsNameNoTooltip|l] usurpat[ROOT.Char.Custom('FR_EurRice')] que vous êtes, votre règne n'est qu'une mascarade, une farce, non… une insulte ! Vous souillez le trône de votre séant, alors je vous le dis tenant, laissons de plus hautes autorités en être juges ! » [accuser_leader.Custom('lmf_neg_reaction_type')].\n\nUne effervescence d'indignation et de suspicion s'élève subitement parmi la foule, faisant taire le silence solennel qui régnait jusque-là, comme un monarque que l'on aurait contraint à abdiquer. De plus hautes autorités, dit-[accuser_leader.Custom('FR_IlElle')] ? Certes, mais ce n'est point un simple duel judiciaire qui est réclamé en cette heure, c'est un jugement des Sept. Une ordalie opposant sept champions contre sept autres.\n\nJe devrais donc laisser reposer le sort de mon règne entre des mains qui ne sont pas les miennes ? Mais si je ne le fais pas, ce serait comme réfuter ma légitimité devant les dieux eux-mêmes."
 agot_trial_of_seven.0100.desc.helper:0 "Je puis à peine profiter d'avoir le plus noble des couvre-chefs qui orne ma tête, que déjà retentit l'opposition ayant pris forme sous les traits [accuser_leader.Custom('FR_du_Char_Pi')][accuser_leader.GetTitledFirstName] :\n\n« [ROOT.Char.GetFirstNameNoTooltip] [ROOT.Char.GetHouse.GetNameNoTooltip], vous n'avez de [ROOT.Char.GetTitleAsNameNoTooltip|l] que le titre, mais en réalité, vous êtes un[ROOT.Char.Custom('FR_E')] voleu[ROOT.Char.Custom('FR_RSe')] ! Vous souillez le trône [true_heir.Custom('FR_du_Char_Pi')][true_heir.GetTitledFirstName] de votre séant, alors je vous le dis tenant, laissons de plus hautes autorités en être juges ! » [accuser_leader.Custom('lmf_neg_reaction_type')].\n\nUne effervescence d'indignation et de suspicion s'élève subitement parmi la foule, faisant taire le silence solennel qui régnait jusque-là, comme un monarque que l'on aurait contraint à abdiquer. De plus hautes autorités, dit-[accuser_leader.Custom('FR_IlElle')] ? Certes, mais ce n'est point un simple duel judiciaire qui est réclamé en cette heure, c'est un jugement des Sept. Une ordalie opposant sept champions contre sept autres.\n\nJe devrais donc laisser reposer le sort de mon règne entre des mains qui ne sont pas les miennes ? Mais si je ne le fais pas, ce serait comme réfuter ma légitimité devant les dieux eux-mêmes."
 agot_trial_of_seven.0100.desc.accuser:0 "La couronne est déposée sur la tête [defender_leader.Custom('FR_du_Char_Pi')][defender_leader.GetTitledFirstName], mais c'est moins un symbole de sa légitimité qu'un artifice visant à lui en construire une, et c'est là, devant grands seigneurs et petites gens, que je tranche de ma langue acérée, cette étoffe de fausseté dans laquelle [defender_leader.Custom('FR_IlElle')] se drape :\n\n« [defender_leader.GetFirstNameNoTooltip] [defender_leader.GetHouse.GetNameNoTooltip], [defender_leader.GetTitleAsNameNoTooltip|l] usurpat[defender_leader.Custom('FR_EurRice')] que vous êtes, votre règne n'est qu'une mascarade, une farce, non… une insulte ! Vous souillez le trône de votre séant, alors je vous le dis tenant, laissons de plus hautes autorités en être juges ! »\n\nUne effervescence d'indignation et de suspicion s'élève subitement parmi la foule, brisant le silence hypocrite qui régnait jusque-là. Ce n'est point un simple duel judiciaire que je réclame en cette heure, c'est un jugement des Sept. Une ordalie qui opposera sept champions contre sept. Et [defender_leader.Custom('FR_IlElle')] n'aura d'autres choix que d'accepter, sans quoi cela reviendrait à réfuter sa propre légitimité aux yeux des dieux."
 agot_trial_of_seven.0100.a:0 "Soit, laissons les dieux faire leur office et juger du sort des hommes !"
 agot_trial_of_seven.0100.a.accuser:0 "Voyons si les Sept vous concéderont une légitimité !"
 agot_trial_of_seven.0101.t:0 "En appeler à la justice"
 agot_trial_of_seven.0101.desc:0 "[crown_thief.Custom('FR_le_Char_Pi')|U][crown_thief.GetTitledFirstName] a usurpé le trône et spolié la Couronne, et en réponse à cette vile félonie, justice doit être demandée.\n\n#bold Un jugement des Sept !#!\n\nY a-t-il meilleur moyen de confondre la perfidie que d'en appeler à l'autorité suprême ? Par l'ordalie, nous laisserons les dieux décider qui de [Select_CString(crown_thief.IsFemale,'cette fausse','ce faux')] [crown_thief.GetTitleAsNameNoTooltip|l] ou [crown_theft_king_legit_heir.Custom('FR_du_Char_Pi')][crown_theft_king_legit_heir.GetTitledFirstName] sera [crown_thief.Custom2('FR_LeLa', SCOPE.sC('crown_theft_king_legit_heir'))] plus légitime à porter la couronne !"
 agot_trial_of_seven.0101.desc.legit_heir:0 "La réflexion ayant passablement travaillé mes songes, j'en viens à reconsidérer l'idée d'avoir laissé [crown_thief.Custom('FR_le_Char_Pi')][crown_thief.GetTitledFirstName] s'emparer de ce qui est légitimement mien. [crown_thief.Custom('FR_IlElle')|U] siège sur mon trône, [crown_thief.Custom('FR_IlElle')] porte ma couronne, [crown_thief.Custom('FR_IlElle')] gouverne mon royaume, et tous semblent s'accorder à dire que l'affaire est close, et baste. Mais la vérité, c'est que si [Select_CString(crown_thief.IsFemale,'une fausse','un faux')] [crown_thief.GetTitleAsNameNoTooltip|l] se croit intouchable depuis la plus haute marche du pouvoir, je puis en appeler à l'autorité souveraine par excellence.\n\n#bold Un jugement des Sept !#!\n\nPlutôt que de régler la chose sur un champ de bataille et de faire saigner tout un royaume, laissons sept champions en affronter sept autres, et que les dieux apportent leur concours à [ROOT.Char.Custom2('FR_CeluiCelle', SCOPE.sC('crown_thief'))] qui est [ROOT.Char.Custom2('FR_LeLa', SCOPE.sC('crown_thief'))] plus légitime à gouverner !"
 agot_trial_of_seven.0101.a:0 "Cela mérite réflexion."
 agot_trial_of_seven.0101.a.tt:0 "Vous pouvez exiger un jugement des Sept à l'encontre [crown_thief.Custom('FR_du_Char_Pi')][crown_thief.GetTitledFirstNameNoTooltip]"
 agot_trial_of_seven.9999.t:0 "Le refus de l'ordalie"
 agot_trial_of_seven.9999.desc:0 "J'ai réclamé justice, et elle m'a été refusée.\n\nCe[recipient.Custom('FR_TTte')] [recipient.Custom2('InsultNoun', ROOT.Char)] de [recipient.GetTitledFirstName] se cache derrière des civilités, des courbettes oratoires, mais ce n'est que du purin de cheval !\n\nUn morceau de papier et quelques belles formules, sont-ce là les armes qu'[recipient.Custom('FR_IlElle')] utilise pour se garder des épées qu'[recipient.Custom('FR_IlElle')] est trop effrayé[recipient.Custom('FR_E')] d'affronter ?!"
 agot_trial_of_seven.9999.a:0 "Si la justice se fait silencier, il faut s'exprimer d'autant plus fort !"
 agot_trial_of_seven.0103.t:0 "Le verdict des Sept"
 agot_trial_of_seven.0103.desc.legit_won:0 "Les épées et les boucliers ont été entendus, et c'est désormais la parole des Sept qui résonne.\n\nCe n'est pas tant ma défaite qui apparaît aux yeux de tous, mais les restes de ma cause et de ses partisans. Des partisans qui jonchent la lice, tués par l'acier pour une légitimité qui s'est tue dans le sang.\n\nLes Sept ont donc choisis [legit_heir.GetFirstNameNicknamed] comme [legit_heir.GetTitleAsNameNoTooltip|l] légitime,[Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ), ' — maudits soient-ils —', '' )] et nul ne peut plus s'y opposer, car aucun dire d'homme ne saurait silencier la parole divine."
 agot_trial_of_seven.0103.desc.legit_won.usurper_died:0 "Les épées et les boucliers ont été entendus, et c'est désormais la parole des Sept qui résonne.\n\nCe n'est pas tant la défaite de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('usurper'))] qui apparaît aux yeux de tous, mais les restes d'une cause, dont les partisans jonchent la lice, tués par l'acier pour une légitimité qui s'est tue dans le sang.\n\nLes Sept ont donc choisis [legit_heir.GetFirstNameNicknamed] comme [legit_heir.GetTitleAsNameNoTooltip|l] légitime,[Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ), ' — maudits soient-ils —', '' )] et nul ne peut plus s'y opposer, car aucun dire d'homme ne saurait silencier la parole divine."
 agot_trial_of_seven.0103.desc.legit_helper_won:0 "Les épées et les boucliers ont été entendus, et c'est désormais la parole des Sept qui résonne.\n\nCe n'est pas tant ma défaite qui apparaît aux yeux de tous, mais les restes de ma cause et de ses partisans. Des partisans qui jonchent la lice, tués par l'acier [legit_combatant.Custom('FR_du_Char_Pi')][legit_combatant.GetTitledFirstName] et de ses comparses, pour une légitimité qui s'est tue dans le sang.\n\nLes Sept ont donc choisis [legit_heir.GetFirstNameNicknamed] comme [legit_heir.GetTitleAsNameNoTooltip|l] légitime,[Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ), ' — maudits soient-ils —', '' )] et nul ne peut plus s'y opposer, car aucun dire d'homme ne saurait silencier la parole divine."
 agot_trial_of_seven.0103.desc.legit_helper_won.usurper_died:0 "Les épées et les boucliers ont été entendus, et c'est désormais la parole des Sept qui résonne.\n\nCe n'est pas tant la défaite de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('usurper'))] qui apparaît aux yeux de tous, mais les restes d'une cause, dont les partisans jonchent la lice, tués par l'acier [legit_combatant.Custom('FR_du_Char_Pi')][legit_combatant.GetTitledFirstName] et de ses comparses, pour une légitimité qui s'est tue dans le sang.\n\nLes Sept ont donc choisis [legit_heir.GetFirstNameNicknamed] comme [legit_heir.GetTitleAsNameNoTooltip|l] légitime,[Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ), ' — maudits soient-ils —', '' )] et nul ne peut plus s'y opposer, car aucun dire d'homme ne saurait silencier la parole divine."
 agot_trial_of_seven.0103.desc.legit_helper_won.legit_heir_died:0 "Les épées et les boucliers ont été entendus, et c'est désormais la parole des Sept qui résonne — mais nul ne semble en comprendre la teneur.\n\nJe porte le poids de la défaite sur mes épaules, et [legit_heir.Custom('FR_le_Char_Pi')][legit_heir.GetTitledFirstName] celui de la mort. Les dieux lui ont été favorables dans le verdict, mais point dans le sort. Alors quoi ? Que faut-il comprendre ? Que faut-il voir dans cette justice à double tranchant ?\n\nPersonne ne peut apporter de réponse à cette énigme, comme en témoigne le silence qui pèse sur la lice. La seule certitude est qu'un jugement a été rendu, et que le trône revient désormais à s[legit_heir.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('final_heir'))], [final_heir.Custom('FR_le_Char_Pi')][final_heir.GetTitledFirstName], [final_heir.Custom('FR_LequelLaquelle')] portera la couronne autant que le poids d'une légitimité concédée au prix d'un lourd tribut."
 agot_trial_of_seven.0103.desc.legit_helper_won.legit_heir_died.usurper_died:0 "Les épées et les boucliers ont été entendus, et c'est désormais la parole des Sept qui résonne — mais nul ne semble en comprendre la teneur, moi autant que les autres.\n\nLes dieux ont jugés [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstName] coupable, pour autant le verdict n'aura pas épargné [legit_heir.Custom('FR_le_Char_Pi')][legit_heir.GetTitledFirstName] d'une justice à double tranchant.\n\nLe jugement des Sept apparait comme une énigme pour les simples mortels que nous sommes. Une énigme sans réponse, mais avec pour certitude que le trône revient désormais [final_heir.Custom('FR_au_Char_Pi')][final_heir.GetTitledFirstName], [final_heir.Custom('FR_LequelLaquelle')] portera la couronne autant que le poids d'une légitimité concédée au prix d'un lourd tribut."
 agot_trial_of_seven.0103.desc.usurper_won:0 "Les Sept ont parlé ! La justice s'est abattue sur [legit_combatant.Custom('FR_le_Char_Pi')][legit_combatant.GetTitledFirstName], qui gît vaincu[legit_combatant.Custom('FR_E')] pour une cause brisée.\n\nQui osera désormais s'élever contre une légitimité réaffirmée par les dieux en personne ?! La couronne demeure à sa juste place, et aucun dire d'homme ne saurait silencier la parole divine."
 agot_trial_of_seven.0103.desc.legit_helper_won.no_heir:0 "Les Sept ont parlé, mais leur propos demeure insondable.\n\nIls ont offert [legit_combatant.Custom('FR_au_Char_Pi')][legit_combatant.GetTitledFirstName] la victoire, et [legit_heir.Custom('FR_au_Char_Pi')][legit_heir.GetTitledFirstName] la mort. Plus ironique encore, sans héritier pour revendiquer le trône, cette victoire semble moins douce qu'amère.\n\nLe silence demeure régnant parmi la lice, comme moi sur le royaume. L'on m'aurait dépossédé du triomphe tout en me laissant posséder la couronne ? Les dieux se jouent-ils de moi ? Sont-ils à se gausser de là où ils me regardent ?\n\n#italic [Select_CString(ROOT.Char.HasTrait( GetTrait('rude') ),'Qu’ils aillent se faire foutre dans ce cas !',Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ),'Cela ne m’étonnerait guère de ces engeances !','Qui saurait le dire ?'))]#!"
 agot_trial_of_seven.0103.desc.legit_heir_won_after_all:0 "L'acier a frappé et des vies sont tombées. Les Sept ont parlé, mais sans nulle clarté.\n\n[usurper.Custom('FR_le_Char_Pi')|U][usurper.GetTitledFirstName] gît au sol, mort[usurper.Custom('FR_E')], et plus qu'une vie, c'est un verdict qui est tombé.\n\nLe jugement des Sept a été rendu et le trône revient désormais [final_heir.Custom('FR_au_Char_Pi')][final_heir.GetTitledFirstName]. Les dieux ont-ils vraiment intercédé dans cette affaire, ou bien finalement n'ont-ils fait qu'observer en silence ? Nul doute que le royaume saura trancher la question, comme l'on fauche le blé lorsque vient la moisson…"
 agot_trial_of_seven.0103.desc.legit_heir_won_after_all.legit_heir:0 "L'acier a frappé et des vies sont tombées. Les Sept ont parlé, mais sans nulle clarté.\n\n[usurper.Custom('FR_le_Char_Pi')|U][usurper.GetTitledFirstName] gît au sol, mort[usurper.Custom('FR_E')], et plus qu'une vie, c'est un verdict qui est tombé.\n\nLe jugement des Sept a été rendu et le trône me revient désormais. Les dieux ont-ils vraiment intercédé dans cette affaire, ou bien finalement n'ont-ils fait qu'observer en silence ? Nul doute que le royaume saura trancher la question, comme l'on fauche le blé lorsque vient la moisson…"
 agot_trial_of_seven.0103.desc.legit_heir_won_after_all.usurper:0 "L'acier a frappé et des vies sont tombées. Les Sept ont parlé, mais sans nulle clarté.\n\n[legit_heir.Custom('FR_le_Char_Pi')|U][legit_heir.GetTitledFirstName] gît au sol, mort[legit_heir.Custom('FR_E')], et plus qu'une vie, c'est un verdict qui est tombé.\n\nLe jugement des Sept a été rendu et le trône me revient désormais. Les dieux ont-ils vraiment intercédé dans cette affaire, ou bien finalement n'ont-ils fait qu'observer en silence ? Nul doute que le royaume saura trancher la question, comme l'on fauche le blé lorsque vient la moisson…"
 agot_trial_of_seven.0103.a:0 "[Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ), 'Espérons', 'Prions' )] que [final_heir.Custom('FR_le_Char_Pi')][final_heir.GetTitledFirstNameNoTooltip] se montrera digne de [Select_CString(ROOT.Char.HasTrait( GetTrait('rude') ), 'sa putain de', 'la' )] couronne."
 agot_trial_of_seven.0103.b:0 "[ROOT.Char.Custom('CulturalCurse')|U]."
 agot_trial_of_seven.0103.c:0 "Ce jour ne sera pas oublié."
 agot_trial_of_seven.0103.d:0 "Tant de sang versé pour rien[Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ), ', typique des dieux', '' )]…"
 agot_trial_of_seven.0104.t:0 "Le verdict des Sept"
 agot_trial_of_seven.0104.desc.legit_won:0 "Les épées et les boucliers ont été entendus, et c'est désormais la parole des Sept qui résonne, leur jugement pesant sur la lice, comme la défaite sur [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstName] et ses partisans.\n\nLes fausses prétentions se sont tues dans le sang, comme un tribut payé pour que justice soit rétribuée. La couronne retrouve sa juste place, et moi la mienne, sur un trône que nul ne peut plus s'atteler à me voler, ma légitimité ayant été affirmée par les dieux en personne !"
 agot_trial_of_seven.0104.desc.legit_helper_won:0 "Les épées et les boucliers ont été entendus, et c'est désormais la parole des Sept qui résonne, leur jugement pesant sur la lice, comme la défaite sur [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstName] et ses partisans.\n\nLes fausses prétentions se sont tues dans le sang, de la main [legit_heir_helper.Custom('FR_du_Char_Pi')][legit_heir_helper.GetTitledFirstName] quand je ne pouvais faire entendre ma propre voix, contraint[ROOT.Char.Custom('FR_E')] que j'étais à rester spectat[ROOT.Char.Custom('FR_EurRice')] alors que se jouait ma légitimité. Mais désormais la couronne retrouve sa juste place, et moi la mienne, sur un trône que nul ne peut plus s'atteler à me voler, ma revendication ayant été appuyée par m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('legit_heir_helper'))], et affirmée par les dieux en personne !"
 agot_trial_of_seven.0104.desc.legit_helper_won.legit_heir_died:0 "Les épées et les boucliers ont été entendus, pour ensuite laisser la parole des Sept résonner dans un funeste mutisme.\n\n[legit_heir_helper.Custom('FR_le_Char_Pi')|U][legit_heir_helper.GetTitledFirstName] a vaillamment combattu pour m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('legit_heir'))], [legit_heir.Custom('FR_LequelLaquelle')] a trouvé la mort avant d'avoir pu constater de ses propres yeux que [Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ), 'ce jour lui était favorable', 'les dieux lui étaient favorables' )].\n\nC'est donc dans le sang et la mort que s'ouvre mon règne. Ce jour n'est en rien celui de la gloire, c'est celui de l'honneur, car plus qu'un trône, j'hérite d'une dette. Une dette envers [legit_heir_helper.Custom('FR_le_Char_Pi')][legit_heir_helper.GetTitledFirstName] pour avoir risqué sa vie afin que la justice tonne — une justice à double tranchant hélas…"
 agot_trial_of_seven.0104.desc.usurper_won:0 "Les épées et les boucliers ont été entendus, et c'est désormais la parole des Sept qui résonne, leur jugement pesant sur la lice autant que sur mes épaules, car ma légitimité a été réduite au silence[Select_CString(ROOT.Char.HasTrait( GetTrait('humble') ), '', ', et mon honneur traînait dans la boue' )].\n\nAu regard des dieux, [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstName] est donc [usurper.Custom('FR_LeLa')] plus légitime a pouvoir prétendre au trône.\n\nMon droit à gouverner gît désormais parmi le sang et la boue, car les dieux[Select_CString(ROOT.Char.HasTrait( GetTrait('zealot') ),', dans leur infini sagesse,',Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ),', maudits soient-ils,',''))] ont décrété en ce jour que [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstName] était plus légitime que moi à prétendre au trône…"
 agot_trial_of_seven.0104.a:0 "Le jugement a été rendu."
 agot_trial_of_seven.0105.t:0 "$agot_trial_of_seven.0104.t$"
 agot_trial_of_seven.0105.desc.legit_heir_won_after_all:0 "Les histoires à propos d'usurpation du trône et d'un jugement des Sept auront fait cent fois le tour du royaume avant qu'un nouveau chapitre ne vienne s'y greffer.\n\nComme attendu d'une ordalie par combat, le sang des hommes a été versé pour que les dieux[Select_CString(ROOT.Char.HasTrait( GetTrait('zealot') ),', dans leur infini sagesse,',Select_CString(ROOT.Char.HasTrait( GetTrait('cynical') ),', maudits soient-ils,',''))] jugent de leur culpabilité ou de leur innocence.\n\nMais [Select_CString(ROOT.Char.HasTrait( GetTrait('sadistic') ), 'douce', 'cruelle' )] ironie, la mort aura devancé le verdict, celle [usurper.Custom('FR_du_Char_Pi')][usurper.GetTitledFirstName] du moins.\n\n[usurper.Custom('FR_CeluiCelle')|U] que bon nombre qualifient d'usurpat[usurper.Custom('FR_EurRice')] n'étant plus de ce monde, c'est [final_heir.Custom('FR_au_Char_Pi')][final_heir.GetTitledFirstName] que revient le trône et la charge de gouverner [main_title.GetNameNoTier]. Les corps pataugent encore dans la boue que déjà l'amère vérité sur ce procès vide de sens apparaît…"
 agot_trial_of_seven.0105.desc.legit_won:0 "Accusé[usurper.Custom('FR_E')] d'avoir usurpé [main_title.GetNameNoTier], [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstName] a été contraint[usurper.Custom('FR_E')] d'en répondre devant les dieux lors d'un jugement des Sept.\n\nLes épées et les boucliers se sont entrechoqués dans la lice, et l'acier s'est fait entendre pour que puisse résonner la parole suprême !\n\nLe verdict est désormais connu de tous, les Sept ont intercédé en faveur [legit_heir.Custom('FR_du_Char_Pi')][legit_heir.GetTitledFirstName], jetant à bas et dans la boue les fausses prétentions [usurper.Custom('FR_du_Char_Pi')][usurper.GetTitledFirstNameNoTooltip] qui souillaient le royaume, lequel s'est vu restituer s[legit_heir.Custom('FR_OnA')] souverain[legit_heir.Custom('FR_E')] légitime."
 agot_trial_of_seven.0105.desc.legit_helper_won:0 "Suite aux accusations d'usurpation dont [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstName] fut la cible, c'est auprès de l'autorité suprême que [legit_combatant.Custom('FR_le_Char_Pi')][legit_combatant.GetTitledFirstName] a choisi d'en référer, pour laisser les dieux seuls juges de cette affaire en vertu d'un jugement des Sept.\n\nAinsi, plutôt que par les mots, c'est par le sang que les prétentions [final_heir.Custom('FR_du_Char_Pi')][final_heir.GetTitledFirstName] ont été défendues, laissant les épées et les boucliers s'exprimer sur la lice pour que puisse résonner la parole des dieux au sortir de l'acier entendu.\n\nLe verdict est désormais connu de tous, les Sept ont intercédé en sa faveur, mettant en lumière l'[Select_CString(ROOT.Char.HasTrait( GetTrait('deceitful') ), 'habileté', 'odieux crime' )] [usurper.Custom('FR_du_Char_Pi')][usurper.GetTitledFirstNameNoTooltip] qui a [Select_CString(ROOT.Char.HasTrait( GetTrait('deceitful') ), 'marqué', 'souillé' )] le royaume [Select_CString(ROOT.Char.HasTrait( GetTrait('deceitful') ), 'de son empreinte', 'de sa perfidie' )].\n\nDésormais [main_title.GetNameNoTier] est à nouveau entre les mains de s[final_heir.Custom('FR_OnA')] souverain[final_heir.Custom('FR_E')] légitime, affirmé[final_heir.Custom('FR_E')] par le droit divin."
 agot_trial_of_seven.0105.desc.usurper_won:0 "Accusé[usurper.Custom('FR_E')] d'avoir usurpé [main_title.GetNameNoTier], [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstName] a été contraint[usurper.Custom('FR_E')] d'en répondre devant les dieux lors d'un jugement des Sept.\n\nAinsi, plutôt que par les mots, c'est par le sang que les prétentions [legit_heir.Custom('FR_du_Char_Pi')][legit_heir.GetTitledFirstName] ont été défendues, laissant les épées et les boucliers s'exprimer sur la lice pour que puisse résonner la parole des dieux au sortir de l'acier entendu.\n\nLe verdict est désormais connu de tous, [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstNameNicknamedNoTooltip] a été choisi[usurper.Custom('FR_E')] comme souverain[usurper.Custom('FR_E')] légitime par les dieux en personne, réduisant au silence toute protestation qui pourrait persister à travers [main_title.GetNameNoTierNoTooltip]."
 agot_trial_of_seven.0105.desc.legit_helper_won.no_heir:0 "Accusé[usurper.Custom('FR_E')] d'avoir usurpé [main_title.GetNameNoTier], [usurper.Custom('FR_le_Char_Pi')][usurper.GetTitledFirstName] a été contraint[usurper.Custom('FR_E')] d'en répondre devant les dieux lors d'un jugement des Sept.\n\nAinsi, plutôt que par les mots, c'est par le sang que les prétentions [legit_heir.Custom('FR_du_Char_Pi')][legit_heir.GetTitledFirstName] ont été défendues, laissant les épées et les boucliers s'exprimer sur la lice pour que puisse résonner la parole des dieux au sortir de l'acier entendu. Mais en vain, semble-t-il, car c'est dans un mutisme mortifère que s'est conclu le verdict et la vie [Select_CString(legit_heir.IsFemale,'de la prétendante','du prétendant')].\n\n[legit_combatant.Custom('FR_le_Char_Pi')|U][legit_combatant.GetTitledFirstName], qui avait porté cette revendication jusque dans le sang et la boue, n'aura obtenu le triomphe du combat que pour se voir déposséder de la satisfaction d'une justice dûment rétribuée. [legit_heir.Custom('FR_le_Char_Pi')|U][legit_heir.GetTitledFirstNameNoTooltip] est mort[legit_heir.Custom('FR_E')] tout en ayant été désigné[legit_heir.Custom('FR_E')] comme souverain[legit_heir.Custom('FR_E')] légitime, et sans nul héritier pour lui succéder, l'usurpation est de fait choisi pour régner."
 agot_trial_of_seven.0105.a:0 "Les dieux ont parlé..."
 agot_trial_of_seven.0200.t:0 "Les lois des dieux et des hommes"
 agot_trial_of_seven.0200.desc.defender.against_accuser:0 "Des chaînes sauraient me priver de liberté, mais nullement museler ma volonté : « Je demande une ordalie par combat ! » Ma voix tonne dans la salle alors que j'en appelle aux dieux et à l'une de leurs lois les plus sacrées, mais à peine finit-elle de résonner que celle [accuser_ruler.Custom('FR_du_Char_Pi')][accuser_ruler.GetTitledFirstName] se fait entendre à son tour :\n\n« Vous voulez laisser les dieux décider de votre sort ? Alors ainsi soit-il. J'exige quant à moi un jugement des Sept ! » [accuser_ruler.Custom('lmf_neg_reaction_type')].\n\nCela aurait pu être réglé par un combat singulier, mais [accuser_ruler.Custom('FR_le_Char_Pi')][accuser_ruler.GetTitledFirstNameNoTooltip] préfère invoquer une ancienne tradition tombée en désuétude qui exigera que sept champions bataillent contre sept autres. Nous verrons si les dieux prendront le parti d'un[accuser_ruler.Custom('FR_E')] [accuser_ruler.GetWomanMan] qui en appelle à plus de sang qu'il n'en faudrait."
 agot_trial_of_seven.0200.desc.defender.against_accuser_kin:0 "Des chaînes sauraient me priver de liberté, mais nullement museler ma volonté : « Je demande une ordalie par combat ! » Ma voix tonne dans la salle alors que j'en appelle aux dieux et à l'une de leurs lois les plus sacrées, mais à peine finit-elle de résonner que celle [accuser_candidate_kin.Custom('FR_du_Char_Pi')][accuser_candidate_kin.GetTitledFirstName], [accuser_ruler.Custom2('FR_LMF_RelationToMe_Le', SCOPE.sC('accuser_candidate_kin'))] [accuser_ruler.Custom('FR_du_Char_Pi')][accuser_ruler.GetTitledFirstName], se fait entendre :\n\n« Vous vous laisser les dieux décider de votre sort ? Alors ainsi soit-il. J'en appelle au jugement des Sept ! » [accuser_candidate_kin.Custom('lmf_neg_reaction_type')].\n\nCela aurait pu être réglé par un combat singulier, mais c'est désormais sept champions qui devront en affronter sept autres. Plus de sang qu'il n'en faudrait, mais là encore, ce sera aux dieux d'en décider."
 agot_trial_of_seven.0200.desc.accuser:0 "[defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstName] a beau être placé[defender_leader.Custom('FR_E')] sous bonne garde, les fers, en propre comme en figuré, ne semblent pas aptes à museler sa volonté.\n\n« Je demande une ordalie par combat ! » [defender_leader.Custom('lmf_neg_reaction_type')].\n\nAinsi, [defender_leader.Custom('FR_IlElle')] souhaite donc placer son sort entre les mains des dieux ? Il est vrai que les lois l'y autorisent, d'en appeler à l'autorité suprême et d'espérer qu'un combat singulier pourrait lui être salvateur. Sa culpabilité — ou son innocence — serait alors tranchée aussi promptement que le sang serait versé, mais il me faut considérer la chose dans son ensemble.\n\nJe puis tout aussi bien lui accorder ce #bold duel judiciaire#! que le lui refuser, mais en outre, je pourrais également en appeler au #italic jugement des Sept#! — cette ancienne tradition qui exigera que sept champions en affrontent sept autres."
 agot_trial_of_seven.0200.desc.accuser_kin.start:0 "Bien que fait[defender_leader.Custom('FR_E')] prisonni[defender_leader.Custom('FR_ErEre')], [defender_leader.Custom('FR_le_Char_Pi')][defender_leader.GetTitledFirstName] a encore suffisamment d'aplomb pour invoquer l'aide des dieux.\n\n#italic Un duel judiciaire#!, voilà ce sur quoi [defender_leader.Custom('FR_IlElle')] escompte pour prouver sa soi-disant innocence. Mais fut-ce cette exigence formulée judicieusement ou désespérément, [accuser_candidate_kin.Custom('FR_le_Char_Pi')][accuser_candidate_kin.GetTitledFirstName] juge le moment opportun pour intervenir…"
 agot_trial_of_seven.0200.desc.accuser_kin.end:0 "[Select_CString(accuser_candidate_kin.HasTrait( GetTrait('mute') ), 'Même incapable de parler,', 'Sa voix tonne, et elle continue de tonner quand' )] [accuser_candidate_kin.Custom('FR_IlElle')] [Select_CString(accuser_candidate_kin.HasTrait( GetTrait('mute') ), 'fait savoir son exigence', 'explicite sa pensée' )] : #italic Un jugement des Sept !#!\n\nPlutôt qu'une ordalie par combat singulier, [accuser_candidate_kin.Custom('FR_IlElle')] en appel à cette coutume séculaire qui veut que sept champions en affrontent sept autres. [Select_CString(accuser_candidate_kin.HasTrait( GetTrait('mute') ), 'Le silence devenant de plus en plus pesant', 'Maintenant que le silence a reprit ses droits' )], nombreux sont les [ROOT.Char.Custom('GetCourtierPlural')|l] à attendre de connaître ma décision…"
 agot_trial_of_seven.0200.desc.accuser_kin.end.from_tbc:0 "[Select_CString(accuser_candidate_kin.HasTrait( GetTrait('mute') ), 'Même incapable de parler,', 'Sa voix tonne, et elle continue de tonner quand' )] [accuser_candidate_kin.Custom('FR_IlElle')] [Select_CString(accuser_candidate_kin.HasTrait( GetTrait('mute') ), 'fait savoir son exigence', 'explicite sa pensée' )] : #italic Un jugement des Sept !#!\n\nAinsi donc, [accuser_candidate_kin.Custom('FR_IlElle')] en appel à cette coutume séculaire qui veut que sept champions en affrontent sept autres. [Select_CString(accuser_candidate_kin.HasTrait( GetTrait('mute') ), 'Le silence devenant de plus en plus pesant', 'Maintenant que le silence a reprit ses droits' )], nombreux sont les [ROOT.Char.Custom('GetCourtierPlural')|l] à attendre de connaître ma décision…"
 agot_trial_of_seven.0200.desc.accuser.from_tbc:0 "[defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstName] a beau être placé[defender_leader.Custom('FR_E')] sous bonne garde, les fers, en propre comme en figuré, ne semblent pas aptes à museler sa volonté.\n\n« Je demande une ordalie par combat ! » [defender_leader.Custom('lmf_neg_reaction_type')].\n\nAinsi, [defender_leader.Custom('FR_IlElle')] souhaite donc placer son sort entre les mains des dieux ? Il est vrai que les lois l'y autorisent, d'en appeler à l'autorité suprême et d'espérer qu'un duel judiciaire pourrait lui être salvateur. Sa culpabilité — ou son innocence — serait alors tranchée aussi promptement que le sang serait versé…\n\nMais les chuchotements se font entendre, et d'aucuns s'accordent à dire que l'affaire n'est point si singulière pour laisser un combat singulier décider de son issue. Soit. J'entends et je réponds. C'est par un jugement des Sept que la vérité éclatera à la face des dieux et des hommes."
 agot_trial_of_seven.0200.desc.accuser_kin.start.from_tbc:0 "Bien que fait[defender_leader.Custom('FR_E')] prisonni[defender_leader.Custom('FR_ErEre')], [defender_leader.Custom('FR_le_Char_Pi')][defender_leader.GetTitledFirstName] a encore suffisamment d'aplomb pour invoquer l'aide des dieux.\n\n#italic Un duel judiciaire#!, voilà ce sur quoi [defender_leader.Custom('FR_IlElle')] escompte pour prouver sa soi-disant innocence. Mais fut-ce cette exigence formulée judicieusement ou désespérément, [accuser_candidate_kin.Custom('FR_le_Char_Pi')][accuser_candidate_kin.GetTitledFirstName] juge le moment opportun pour intervenir…"
 agot_trial_of_seven.0200.a:0 "Fort bien. M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('accuser_candidate_kin'))] aura le jugement des Sept qu'[accuser_candidate_kin.Custom('FR_IlElle')] demande."
 agot_trial_of_seven.0200.b:0 "La décision m'appartient… et je choisis un jugement des Sept !"
 agot_trial_of_seven.0200.c:0 "J'accorde [defender_leader.Custom('FR_au_Char_Pi')][defender_leader.GetTitledFirstNameNoTooltip] un duel judiciaire !"
 agot_trial_of_seven.0200.d:0 "Qu'il en soit ainsi ! Ce sera un jugement des Sept !"
 agot_trial_of_seven.0200.a.tt:0 "En lieu et place d'un duel judiciaire, c'est un jugement des Sept qui décidera de l'issue de cette affaire."
 agot_trial_of_seven.0200.a.tt.from_tbc:0 "Le jugement des Sept débutera..."
 agot_trial_by_combat.1000.f:0 "J'en appelle au jugement des Sept !"
 agot_trial_of_seven.0200.b.from_tbc:0 "Que les champions se fassent connaître..."
 agot_trial_of_seven.0200.b.generic:0 "$agot_trial_by_combat.1000.f$"
 accuser_kin_plotting:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] conspire contre moi ! [defender_leader.Custom('FR_IlElle')|U] œuvre bien à l'abri parmi les ombres, mais les Sept sauront mettre la lumière sur sa perfidie ! »\n\n"
 accuser_kin_abduction:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] a tenté de me faire enlever ! Je ne peux plus connaître le repos tant qu'[defender_leader.Custom('FR_IlElle')] n'aura pas était dûment jugé[defender_leader.Custom('FR_E')] par les Sept ! »\n\n"
 accuser_kin_murder:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] a attenté à ma vie ! [defender_leader.Custom('FR_SilSielle')|U] tient à ce que le sang coule, alors il coulera, mais au vu et au su des dieux aussi bien que des hommes ! »\n\n"
 accuser_kin_torture:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] a meurtri ma chair et supplicié mon esprit, et cela pour son plaisir personnel ! [defender_leader.Custom('FR_SilSielle')|U] a si foi en la violence, alors laissons la violence décider de sa culpabilité ! »\n\n"
 accuser_kin_maimed:0 "\n\n« C'est [defender_leader.Custom('FR_au_Char_Pi')][defender_leader.GetTitledFirstNameNoTooltip] que je dois d'être ainsi estropié[accuser_candidate_kin.Custom('FR_E')] ! De simples mots ne peuvent décrire ma meurtrissure, mais l'acier, lui, pourra parler en mon nom ! »\n\n"
 accuser_kin_stole:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] m'a dérobé quelque chose de valeur. Je veux que l'on en fasse un exemple, au vu et au su de tous ! »\n\n"
 accuser_kin_sabotage:0 "\n\n« [defender_leader.Custom('FR_du_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] s'est retourné[defender_leader.Custom('FR_E')] contre moi au moment le plus critique. Je veux que l'on en fasse un exemple ! »\n\n"
 accuser_kin_slander:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] n'est qu'un[defender_leader.Custom('FR_E')] pleutre qui se cache depuis trop longtemps derrière des calomnies pour m'atteindre. Laissons l'acier s'exprimer pleinement et avec véracité ! »\n\n"
 accuser_kin_imprison:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] m'a privé de ma liberté ! Si [defender_leader.Custom('FR_IlElle')] souhaite la sienne, [defender_leader.Custom('FR_IlElle')] devra donc la mériter ! »\n\n"
 accuser_kin_banished:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] m'a banni[accuser_candidate_kin.Custom('FR_E')] comme un simple tout-venant ! Voyons si les dieux ont meilleure opinion d[defender_leader.Custom('FR_EluiElle')] que de moi ! »\n\n"
 accuser_kin_deposed:0 "\n\n« C'est [defender_leader.Custom('FR_au_Char_Pi')][defender_leader.GetTitledFirstNameNoTooltip] que je dois d'avoir été déposé[accuser_candidate_kin.Custom('FR_E')]. Il est temps de voir si les dieux sont favorables à un tel forfait ! »\n\n"
 accuser_kin_child_kill:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] s'en est pris[defender_leader.Custom('FR_E')] à mon sang, à la chair de ma chair ! Je refuse de rester silencieu[accuser_candidate_kin.Custom('FR_XSe')] quand [defender_leader.Custom('FR_LeLa')] meurtri[defender_leader.Custom('FR_ErEre')] de mon enfant se tient devant moi ! »\n\n"
 accuser_kin_execute:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] n'est pas [defender_leader.GetWomanMan] à faire grand cas de la justice. Pour cela, laissons les plus hauts justiciers qui soient décider de son sort ! »\n\n"
 accuser_kin_mute:0 "\n\n[accuser_candidate_kin.Custom('FR_IlElle')|U] cogne d'un pied furibond pour annoncer son entremise et fait savoir par écrit sa voix qui ne peut être entendue. « Un jugement des Sept », énonce sobrement la première personne lettrée à qui le morceau de papier est tendu.\n\n"
 accuser_kin_tried_to_aith_me:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] a tenté de faire ripaille de ma chair ! Oui, vous avez bien entendu ! Ce monstre a essayé de me bouffer comme on le ferait d'une banale venaison ! »\n\n"
 accuser_kin_sacrifice:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] est un[defender_leader.Custom('FR_E')] [defender_leader.GetWomanMan] versé[defender_leader.Custom('FR_E')] dans la magie noire ! Ce genre de pratiques ne peuvent être tolérées. Il faut en faire un exemple ! »\n\n"
 accuser_kin_beaten:0 "\n\n« [defender_leader.Custom('FR_le_Char_Pi')|U][defender_leader.GetTitledFirstNameNoTooltip] m'a rudoyé[accuser_candidate_kin.Custom('FR_E')] avec force fureur ! [defender_leader.Custom('FR_SilSielle')|U] a si foi en la violence, alors laissons la violence décider de sa culpabilité ! »\n\n"
 accuser_kin_insane:0 "\n\n« Un champion qui en affronte un autre… ce n'est pas ainsi que l'on honore les dieux ! Sept dieux ! Sept champions ! Oui-da ! »\n\n"
 agot_trial_of_seven.0201.t:0 "Where Seven Fell"
 agot_trial_of_seven.0201.desc.defender_won_default.accuser_pov:0 "It is done. The Trial of Seven has spoken against me, and the field has answered what I sought to deny. My champions lie broken or beaten, and [tos_final_accused.GetTitledFirstName] stands vindicated before gods and realm alike.\n\nA victory like this cannot be hidden behind closed doors. Lords will remember who prevailed, and smallfolk will repeat the tale until it becomes truth. Whatever judgment I meant to lay upon [tos_final_accused.GetHerHim], it has returned to rest upon me."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.accuser_pov:0 "The Trial of Seven has ended in blood and ruin, and I am left to stare upon the cost. [tos_final_accuser.GetTitledFirstNamePossessive] cause has fallen on the field, and [tos_final_accuser.GetSheHe] did not rise again. [tos_final_accused.GetTitledFirstName] stands the victor, and the realm has witnessed it.\n\nNow the court turns its eyes from the field to what comes after. By steel and by the Seven's will, [tos_final_accused.GetTitledFirstName] stands vindicated. Whatever accusations were cast at [tos_final_accused.GetHerHim] have been answered, and the realm has seen the gods' judgment made plain."
 agot_trial_of_seven.0201.desc.accuser_won_defeault.accuser_pov:0 "The Trial of Seven is finished, and the gods have favored my cause. My champions held the field, and [tos_final_accused.GetTitledFirstName] is left with defeat instead of the freedom [tos_final_accused.GetSheHe] demanded.\n\nYet even victory has its price. Seven blades were gathered, and many will not return as they came. Still, the realm has seen judgment done in open sight, and that sight is a weapon as sharp as any sword."
 agot_trial_of_seven.0201.desc.accuser_won_defender_died.accuser_pov:0 "The Trial of Seven has ended, and [tos_final_accused.GetTitledFirstName] will never speak another word in defiance. The field took [tos_final_accused.GetHerHim] as its due, and my champions stood when the last blows fell.\n\nSome will call it justice, others simple power wearing a lawful mask. Let them whisper. The realm has watched the gods decide, and the dead do not argue verdicts."
 agot_trial_of_seven.0201.desc.defender_won_default.defender_pov:0 "The Trial of Seven is done, and I still draw breath. Against the weight of crown and judgment, my champions stood, and the field gave its answer. Before gods and realm alike, my cause has been proven stronger than the chains meant to hold me.\n\nBut victory is never clean. The ground is stained with the cost of it, and the screams of the dying linger longer than any cheer. Still... I am free of their verdict, and the realm has seen it."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.defender_pov:0 "The Trial of Seven has ended, and the gods have answered in a voice none can mistake. My champions held the field, and [tos_final_accuser.GetTitledFirstName] fell amid the press of steel. The crown's judgment died with [tos_final_accuser.GetHerHim].\n\nThe field lies quiet now, its judgment already passing into law and memory. By the gods' will and by the strength of my champions, I stand cleared of every charge. Whatever was spoken against me has been answered in steel, and none may deny the verdict that was won."
 agot_trial_of_seven.0201.desc.accuser_won_defeault.defender_pov:0 "It is finished. The Trial of Seven has turned against me, and my champions could not hold the field. The gods did not grant me the answer I demanded, or else they granted it to the other side.\n\nWhatever chance I had to break these chains by right has been spent in blood. Now I must face what comes after a lost trial: a realm that believes the verdict, and a victor who will not forget I forced the question."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.inherited_crown_pov:0 "The Trial of Seven has ended, and with it the life that once stood between me and the crown. [tos_final_accuser.GetTitledFirstName] fell upon the field, and the weight of rule passes to me not by quiet succession, but through blood and judgment.\n\nI did not come to the field seeking a throne, only justice, yet steel has made both mine to bear. The gods have spoken in the sight of all, and I rise from the trial not only vindicated, but crowned by the very verdict meant to break me."
 agot_trial_of_seven.0201.desc.defender_won_default.observer_pov:0 "The Trial of Seven has ended, and the victor stands plain for all to see. [tos_final_accused.GetTitledFirstName] has prevailed, with champions still standing where [tos_final_accuser.GetTitledFirstNamePossessive] blades faltered.\n\nThe realm will speak of this for years. Such trials are rare, and rarer still when their outcome touches power and punishment alike. What was a prisoner's demand has become a judgment everyone witnessed, and no one will soon forget."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.observer_pov:0 "The Trial of Seven has ended in a verdict written in corpses. [tos_final_accused.GetTitledFirstName] has won, and [tos_final_accuser.GetTitledFirstName] lies dead upon the field besides fallen champions.\n\nWith [tos_final_accuser.GetTitledFirstNameNoTooltip] fallen, the trial leaves little room for doubt. Before gods and men alike, [tos_final_accused.GetTitledFirstNameNoTooltip] stands vindicated, the accusations against [tos_final_accused.GetHerHim] answered in open sight. What was once argued in words has now been settled in steel."
 agot_trial_of_seven.0201.desc.accuser_won_defeault.observer_pov:0 "The Trial of Seven is done, and [tos_final_accuser.GetTitledFirstNamePossessive] side has taken the field. [tos_final_accused.GetTitledFirstName] is defeated, and the verdict is already spreading from campfire to court as if it were gospel.\n\nSome call it justice, others call it inevitability. Either way, the realm has watched seven blades decide what words could not. The verdict was won in steel, and the realm has seen it."
 agot_trial_of_seven.0201.desc.accuser_won_defender_died.observer_pov:0 "The Trial of Seven ended with [tos_final_accused.GetTitledFirstName] dead upon the field. [tos_final_accuser.GetTitledFirstNamePossessive] champions stood, and the prisoner's cause died with [tos_final_accused.GetHerHim].\n\nThere will be those who claim the gods have spoken clearly, and those who insist the gods were merely forced to watch. Either way, a life has been paid for the right to ask the question, and the realm will remember the cost."
 agot_trial_of_seven.0201.desc.defender_won_accuser_died.inherited_crown_observer_pov:0 "The Trial of Seven has ended in a victory no bard could have penned without sounding cruel. [tos_final_accuser.GetTitledFirstName] lies dead upon the field, and the one once named prisoner now rises as rightful ruler before gods and men.\n\nWhat began as a demand for judgment has become a passing of the crown itself. Steel has answered accusation and succession alike, and all who watched know that this throne was not taken in silence, but won beneath the gaze of the Seven."
 agot_trial_of_seven.0201.a:0 "So the gods have judged."
 agot_trial_of_seven.0202.t:0 "A Visitor in the Dark"
 agot_trial_of_seven.0202.desc:0 "The hours pass slowly within these walls, broken only by distant footsteps and the drip of unseen water. When the door finally opens, I expect another guard... not a familiar face.\n\n[tos_friend.GetTitledFirstName] steps into the dim light, and for a moment I am unsure whether to smile or curse the sight. [tos_friend.GetSheHe|U] bears the name of the same house that holds me here, yet [tos_friend.GetHerHis] eyes carry none of its iron. We speak in low voices, careful of listening ears, until at last [tos_friend.GetSheHe] promises to speak with [tos_imprisoner.GetTitledFirstName] on my behalf.\n\nIt is a small thing, perhaps — words carried from one hall to another — yet even a small promise feels different when you have none."
 agot_trial_of_seven.0202.a:0 "I will hold to that hope."
 agot_trial_of_seven.0202.b:0 "I need no favors from your house."
 agot_trial_of_seven.0203.t:0 "Before the Crown"
 agot_trial_of_seven.0203.desc:0 "A guard comes for me. I expect another questioning. Instead, I am led to a small chamber where my [SCOPE.sC('tos_prisoner').Custom2('RelationToMeShort', SCOPE.sC('tos_friend'))], [tos_friend.GetTitledFirstName], waits. [tos_friend.GetSheHe|U] wastes little time on pleasantries. If I mean to leave these walls with my honor intact, [tos_friend.GetSheHe] tells me, I must be ready to fight for it.\n\nA trial by combat may be my only path forward. Steel, not words, may be the only language [tos_imprisoner.GetTitledFirstName] will respect. Soon enough, the guard leads us onward into a larger hall where [tos_imprisoner.GetTitledFirstNameNoTooltip] and gathered courtiers await my answer. All eyes turn toward me, waiting to hear what I will demand... if anything at all."
 agot_trial_of_seven.0203.a:0 "I demand trial by combat."
 agot_trial_of_seven.0203.b:0 "I will not turn this into a spectacle."
 agot_trial_of_seven.0203.b.tt:0 "You are escorted back to the dungeon."
 agot_trial_of_seven.1000.t:0 "Champions of the Seven"
 agot_trial_of_seven.1000.desc:0 "The Trial of Seven is at hand. I must name those who will stand for my cause when the swords are drawn.\n\nIf I cannot gather six to stand with me, judgment will come without a blow, and guilt will be laid upon my name.\n\nSeveral knights have already offered their swords. I must decide who among them will take the field at my side."
 agot_trial_of_seven.1000.desc.lost_before_started:0 "The silence stretches on, unbroken. No further champions come forward to stand with me, and without seven to answer the charge, the trial cannot be fought.\n\nBy law and custom, the charge stands unanswered, and I am judged guilty."
 agot_trial_of_seven.1000.desc.sellsword:0 "The silence stretches longer than I would like. At last, a hard-eyed warrior steps forward from the crowd, pausing only when my offer of coin is made plain.\n\nSteel has many loyalties, and today gold proves enough to bind one blade to my cause."
 agot_trial_of_seven.1000.desc.helper_knight.a:0 "The silence lingers, heavy and unbroken. At last, [helper_knight.GetTitledFirstName] steps forward, setting themselves apart from the crowd and offering their sword to my cause."
 agot_trial_of_seven.1000.desc.helper_knight.b:0 "No one moves at first. Then [helper_knight.GetTitledFirstName] leaves the crowd behind, stepping into the open and declaring their willingness to stand for me."
 agot_trial_of_seven.1000.desc.helper_knight.c:0 "The moment stretches on in silence before [helper_knight.GetTitledFirstName] breaks it, coming forward to place their sword at my side."
 agot_trial_of_seven.1000.desc.helper_knight.d:0 "All eyes remain fixed on the crowd until [helper_knight.GetTitledFirstName] steps forward alone, ending the silence and committing their blade to my cause."
 agot_trial_of_seven.1000.desc.helper_knight.e:0 "For a long moment, no one moves. Then a single figure, [helper_knight.GetTitledFirstName] steps forward from the crowd, breaking the silence and offering their sword to my cause."
 agot_trial_of_seven.1000.desc.helper_squire:0 "The silence threatens to swallow the moment whole until a young squire, [helper_knight.GetTitledFirstName], steps forward from the edge of the crowd. There is hesitation in [helper_knight.GetHerHis] voice, but not fear.\n\nDropping to one knee before me, [helper_knight.GetSheHe] lowers [helper_knight.GetHerHis] head and speaks clearly for all to hear.\n\n#EMP \"[the_other_leader.GetTitledFirstNameNoTooltip], knight me... and I will stand with you.\"#S"
 agot_trial_of_seven.1000.a:0 "A fine choice."
 agot_trial_of_seven.1000.a.buy:0 "Coin speaks louder than silence."
 agot_trial_of_seven.1000.a.tt:0 "Your chosen champion will fight on your side.\n"
 agot_trial_of_seven.1000.a.lost_before_started:0 "My fate is sealed."
 agot_trial_of_seven.1000.a.need_new_char:0 "Who will stand and fight with me?"
 agot_trial_of_seven.1000.a.squire_approved:0 "Rise, Ser [helper_knight.GetFirstNameNoTooltip]. Stand with me."
 agot_trial_of_seven.1000.a.squire_approved.tt:0 "#EMP In the name of the Warrior I charge you to be brave. In the name of the Father I charge you to be just. In the name of the Mother I charge you to defend the young and innocent. In the name of the Maid I charge you to protect all women.\n#S"
 agot_trial_of_seven.1000.b.squire_denied:0 "I shouldn't."
 agot_trial_of_seven.1000.b.squire_denied.tt:0 "Without enough champions, the Trial of Seven cannot begin and you will be judged guilty."
 agot_trial_of_seven.1001.t:0 "Seven Against Seven"
 agot_trial_of_seven.1001.t.accusers:0 "$agot_trial_of_seven.1002.t$: [accuser_leader.GetTitledFirstNameNoTooltip] and the Accusers"
 agot_trial_of_seven.1001.t.defenders:0 "$agot_trial_of_seven.1002.t$: [defender_leader.GetTitledFirstNameNoTooltip] and [defender_leader.GetHerHis] Champions"
 agot_trial_of_seven.1001.desc:0 "Before the eyes of the realm, the ancient Trial of Seven is called at last. No lord's word nor king's decree may end this quarrel now, only seven blades raised for each cause, and the judgment the gods grant through steel and blood. Accuser and accused stand opposed, their fates bound together as surely as the champions who fight in their names. Let the field bear witness, and when the last sword falls silent, the gods shall decide who stood in truth and who stood in sin.\n\n#EMP [oth_1.GetTitledFirstName] stands with [oth_5.GetTitledFirstName], [oth_4.GetTitledFirstName], [oth_2.GetTitledFirstName], [oth_3.GetTitledFirstName], [oth_6.GetTitledFirstName] and [oth_7.GetTitledFirstName].\n\nFacing them stands [roy_1.GetTitledFirstName], joined by [roy_5.GetTitledFirstName], [roy_4.GetFirstName], [roy_2.GetTitledFirstName], [roy_3.GetTitledFirstName], [roy_6.GetTitledFirstName] and [roy_7.GetTitledFirstName].#S"
 agot_trial_of_seven.1001.a:0 "So the gods will judge."
 agot_trial_of_seven.1001.a.second:0 "Let the Trial of Seven begin."
 agot_trial_of_seven.1002.t:0 "A Trial of Seven"
 agot_trial_of_seven.1002.desc.usurpation:0 "Word spreads quickly through courts and camps alike. A Trial of Seven has been called, as [the_other_leader.GetTitledFirstName] openly names [the_royal_leader.GetTitledFirstNamePossessive] rise a usurpation and demands judgment before gods and men.\n\nSuch trials are rare, and rarer still when crown and claim stand opposed. Lords whisper of champions already gathering, each blade sworn to prove which ruler stands in truth, and which in sin. Soon, steel will decide what no council could settle."
 agot_trial_of_seven.1002.desc.imprisonment:0 "News travels swiftly: what began as a demand for trial by combat has grown into something far greater. After [the_other_leader.GetTitledFirstName] called for single combat to answer [the_royal_leader.GetTitledFirstNamePossessive] judgment, the crown refused, and instead proclaimed a Trial of Seven.\n\nMany call it a bold stroke, others a cruel one, for such trials reshape quarrels into spectacles the whole realm cannot ignore. Champions now gather from near and far, and before long, seven blades against seven will decide a fate that words alone could not."
 agot_trial_of_seven.1002.a:0 "I will follow the trial closely."
 agot_trial_of_seven.1002.a.tt:0 "You will observe the Trial of Seven as it unfolds."
 agot_trial_of_seven.1002.b:0 "This is no concern of mine."
 agot_trial_of_seven.1003.t:0 "$agot_trial_of_seven.1000.t$"
 agot_trial_of_seven.1003.desc.need_more_knights.a:0 "The count is short. I do not yet have the seven required to answer the charge, and the trial cannot proceed as it stands.\n\nThe weight of the moment presses in from all sides as the numbers are counted again and found wanting. More champions must be found if this cause is to be carried forward, or else the judgment will be given without steel."
 agot_trial_of_seven.1003.desc.need_more_knights.b:0 "The eyes upon me offer no answers. Too few have stepped forward, and the number required remains unmet.\n\nMurmurs stir at the edges of the crowd, some curious, some unkind, as the silence stretches on. Until more are named, the Trial of Seven stands unfinished, hanging in the balance before all who watch."
 agot_trial_of_seven.1003.desc.need_more_knights.c:0 "The law is clear, and the number is not yet met. Without seven to stand together, the charge cannot be answered.\n\nThe words of custom ring loudly in my thoughts, learned long ago and never meant to be tested this way. If this trial is to go forward, more champions must be secured, or the law will judge me without mercy."
 agot_trial_of_seven.1003.desc.need_more_knights.d:0 "Those before me are not enough. The seven are not yet whole, and the moment stretches on unfinished.\n\nEvery heartbeat draws the eyes of the crowd closer, waiting to see whether anyone else will step forward. Unless more come to stand with me, this trial will not be fought, and the outcome will be decided here and now."
 agot_trial_of_seven.1003.desc.need_more_knights.e:0 "Silence answers my call. Those willing to stand have already stepped forward, and no others come to join them.\n\nFor an instant, doubt cuts deeper than any blade, and I wonder if this is where my cause ends. If more champions are to be named, they will have to be sought out, or else the silence itself will serve as my answer."
 agot_trial_of_seven.1003.a.honorable.a:0 "Who will stand where right still stands?"
 agot_trial_of_seven.1003.a.honorable.b:0 "Does no one here still believe in justice?"
 agot_trial_of_seven.1003.a.honorable.c:0 "Is there no one left who would stand for what is right?"
 agot_trial_of_seven.1003.a.honorable.d:0 "Is there no knight left who remembers the oath?"
 agot_trial_of_seven.1003.a.honorable.e:0 "Are there no true knights among you?!"
 agot_trial_of_seven.1003.a.greedy.a:0 "What price would earn your sword?"
 agot_trial_of_seven.1003.a.greedy.b:0 "Who here would fight for good coin?"
 agot_trial_of_seven.1003.a.greedy.c:0 "Is there no one willing to be paid for their courage?"
 agot_trial_of_seven.1003.a.greedy.d:0 "Who would sell their blade for gold?"
 agot_trial_of_seven.1003.a.greedy.e:0 "Who among you would fight for a fair price?"
 agot_trial_of_seven.1003.a.dishonorable.a:0 "Do you all fear the field that much?"
 agot_trial_of_seven.1003.a.dishonorable.b:0 "Will no one answer when I call?"
 agot_trial_of_seven.1003.a.dishonorable.c:0 "Is there truly no one fit to stand for me?"
 agot_trial_of_seven.1003.a.dishonorable.d:0 "Do I truly stand among cowards?"
 agot_trial_of_seven.1003.a.dishonorable.e:0 "Who among you will step forward for me?"
 agot_trial_of_seven.1004.t:0 "Jugement sans coup férir"
 agot_trial_of_seven.1004.desc:0 "Le jugement des Sept est bien nommé, car même lorsque l'acier ne s'exprime pas et que le sang ne souille pas la lice, les dieux savent tout de même faire entendre leur volonté.\n\nRassembler suffisamment de champions pour défendre sa personne fait partie intégrante de l'ordalie, et pour avoir échouer à le faire, [leader_lost_before_started.Custom('FR_le_Char_Pi')][leader_lost_before_started.GetTitledFirstName] a ainsi démontré que sa cause ne méritait nullement d'être défendue, abandonné[leader_lost_before_started.Custom('FR_E')] qu'[leader_lost_before_started.Custom('FR_IlElle')] est par les hommes non moins que par les dieux."
 agot_trial_of_seven.1004.a:0 "Emmenez [leader_lost_before_started.Custom('FR_le_Char_Pi')][leader_lost_before_started.GetTitledFirstNameNoTooltip] hors de ma vue."
 agot_single_combat.0031.b:0 "Cela ne peut se terminer ainsi..."
 agot_trial_of_seven.0204.t:0 "A Matter of Mercy"
 agot_trial_of_seven.0204.desc:0 "[tos_friend.GetTitledFirstName] comes before me with a request that is as bold as it is inconvenient. Speaking with careful words and a measured tone, [tos_friend.GetSheHe] asks that I release [tos_prisoner.GetTitledFirstName] from my custody.\n\n[tos_friend.GetSheHe|U] claims the matter has already taken its toll and that mercy now would spare further trouble. Yet a prisoner's chains are rarely struck off without reason, and the court watches closely to see how I will answer."
 agot_trial_of_seven.0204.a:0 "Very well. Let [tos_prisoner.GetHerHim] go."
 agot_trial_of_seven.0204.b:0 "Freedom has its price. Pay it."
 agot_trial_of_seven.0204.c:0 "No. [tos_prisoner.GetSheHe|U] stays where [tos_prisoner.GetSheHe] belongs."
 agot_trial_of_seven.0204.d:0 "Release [tos_prisoner.GetTitledFirstNameNoTooltip]... and send [tos_prisoner.GetHerHim] to the Wall."
 agot_trial_of_seven.0205.t:0 "A Word from the [tos_imprisoner.Custom('GetQueenKing')|U]"
 agot_trial_of_seven.0205.desc.ok:0 "The door opens once more and [tos_friend.GetTitledFirstName] returns. This time, [tos_friend.GetHerHis] expression carries a quiet relief.\n\n[tos_friend.GetSheHe|U] tells me that [tos_imprisoner.GetTitledFirstName] has agreed to release me. The chains that held me here will soon be struck off, and the road beyond these walls will be mine again."
 agot_trial_of_seven.0205.desc.gold:0 "When the door opens, [tos_friend.GetTitledFirstName] stands waiting beyond it, though the look on [tos_friend.GetHerHis] face is not quite the one I had hoped for.\n\n[tos_imprisoner.GetTitledFirstName] will grant my freedom, but only for a price. Gold must change hands before these chains are removed."
 agot_trial_of_seven.0205.desc.no:0 "[tos_friend.GetTitledFirstName] returns to my cell, but the news [tos_friend.GetSheHe] carries is not what I had hoped to hear.\n\n[tos_imprisoner.GetTitledFirstName] has refused the request. My chains remain, and whatever hope I held of leaving these walls has been denied."
 agot_trial_of_seven.0205.desc.nw:0 "When the door opens again, [tos_friend.GetTitledFirstName] stands waiting, though the weight in [tos_friend.GetHerHis] eyes tells me this is no simple visit.\n\n[tos_imprisoner.GetTitledFirstName] has agreed to release me... but not into freedom. I am to be sent to the Wall, there to take the black and spend the rest of my days in service to the Night's Watch."
 agot_trial_of_seven.0205.a:0 "Very well. I accept."
 agot_trial_of_seven.0205.b:0 "This is not justice."
 agot_trial_of_seven.0205.b.nw:0 "This is not justice. I demand trial by combat."
 agot_trial_of_seven.0205.c:0 "So be it."
 they_agot_unavailable_due_to_grand_wedding:0 "They are unavailable due to attending a Grand Wedding"
 i_agot_unavailable_due_to_grand_wedding:0 "I am unavailable due to attending a Grand Wedding"