l_french:
 agot_birth_events.0003.t:0 "Naissance et mort"
 agot_birth_events.0003.desc:0 "« Juste une dernière poussée, [ROOT.Char.Custom('FR_MonseigneurMadame')] ! Le bébé est presque là ! » Un cri s'échappe d'entre mes lèvres, alors que je m'atèle à mon labeur. La douleur est omniprésente, excessive et accablante — mais il semble que ce soit enfin terminé. Je... je l'ai fait.\n\n« C'est un[child.Custom('FR_E')] [child.Custom('GirlBoy')] ? » Je peine à reconnaître ma propre voix. « Est-ce qu'[child.Custom('FR_IlElle')] va bien ? »\n\nLa sage-femme ne me répond pas, en fait elle ne me regarde même pas. Elle n'a d'yeux que pour le petit corps immobile dans ses bras."
 agot_birth_events.0003.a:0 "Pourquoi [child.Custom('FR_IlElle')] ne respire pas ? #EMP Faites quelque chose !#!"
 agot_birth_events.0004.t:0 "Naissance et mort"
 agot_birth_events.0004.desc:0 "La sage-femme sort enfin de la chambre d'accouchement, son visage est pâle et elle refuse de me regarder en face.\n\n« Je suis désolée [ROOT.Char.Custom('FR_MonseigneurMadame')]. L'enfant est né[child.Custom('FR_E')]... difforme » Le ton qu'elle prend est des plus explicites. J'entre dans la pièce où plane l'odeur de la mort, alors que [mother.GetFirstNameNoTooltip] tient dans ses bras une créature inerte. Sa peau couverte d'écailles et ses ailes résiduelles en feraient presque oublier qu'il s'agit d'un être humain, si il n'y a pas ces cheveux dans lesquels [mother.GetFirstNameNoTooltip] passe ses doigts.\n\nM[child.Custom('FR_OnA')] [child.Custom('GetDaughterSon')] est un monstre."
 agot_birth_events.0004.a:0 "Quelle tragédie."
 agot_birth_events.0005.t:0 "Un monstre"
 agot_birth_events.0005.desc:0 "La douleur est #bold insupportable#!.\n\nEntre les halètements déchirants et les bouffées de chaleur, je jurerais entendre le rugissement d'un dragon. Et puis... plus #italic rien#!.\n\nLe silence berce la pièce, emmaillotant tous ceux présents dans une immobilité ininterrompue par les respirations. Finalement, [second_adult.GetFirstNameNoTooltip] brise le silence : « [ROOT.Char.Custom('FR_MonseigneurMadame')], voici votre... bébé. »\n\nJe n'avais pas remarqué qu'[second_adult.Custom('FR_IlElle')] me tendait l'enfant — si l'on peut vraiment [child.Custom('FR_LeLa')] qualifier d'enfant.\n\nDans mes bras se tient un #NEG monstre#!."
 agot_birth_events.0005.a:0 "M[child.Custom('FR_OnA')] [child.Custom('GetDaughterSon')] est une abomination."
 agot_birth_events.0006.t:0 "Un monstre"
 agot_birth_events.0006.desc:0 "Les cris provenant de la chambre à coucher deviennent de plus en plus frénétiques, déchirant l'air tel un dragon qui chercherait à s'échapper de Fossedragon. #italic Ma pauvre, ma tendre [mother.GetFirstNameNoTooltip]... ce bébé va finir par la tuer...#!\n\nLe silence soudain secoue mes sens. #italic C'est terminé#!, je crois, mais je m'arrête un bref instant avant d'entrer — j'ai besoin de me ressaisir et de me préparer pour ce qui m'attends.\n\nLe désordre — quel euphémisme — de l'accouchement me laisse sans voix. Ma chère [mother.GetFirstNameNoTooltip], ensanglantée, tient le bébé proche de sa poitrine. Son regard peiné ne me rassure nullement, mais je m'approche pour voir ce qu'il en est.\n\nDevant moi ne se trouve pas un simple nourrisson. C'est tout bonnement un #bold monstre#!."
 agot_birth_events.0101.t:0 "Une naissance aigre-douce"
 agot_birth_events.0101.desc:0 "L'accouchement fut long et éprouvant, mais les cris du nourrisson qui s'égosillent sont pour moi une forme de soulagement.\n\nPiètre soulagement, il est vrai, car il a un goût désagréable dans la bouche pour [Select_CString(ROOT.Char.IsFemale,'la mère','le père')] que je suis qui voit ce tout petit être immobile dans les bras de la sage-femme.\n\nUn seul de mes deux enfants a reçu la protection [ROOT.Char.GetFaith.FertilityGodNamePossessive], l'autre a rejoint [ROOT.Char.GetFaith.PositiveAfterLife]."
 agot_birth_events.0101.a:0 "Puisse m[child.Custom('FR_OnA')] [child.Custom('GetDaughterSon')] devenir fort[child.Custom('FR_E')] !"
 agot_birth_events.0102.t:0 "Une naissance aigre-douce"
 agot_birth_events.0102.desc:0 "Je pénètre dans la salle d'accouchement et découvre [mother.GetFirstName] exténuée, les yeux rivés sur l'enfant qu'elle serre dans ses bras. Ma présence ne suscite aucune réaction chez elle, et le silence règne — un silence de mort que seul la vie d'un tout petit être se risque à briser.\n\nDe l'autre côté de la pièce, la sage-femme serre elle aussi quelque chose dans ses bras, mais ce bébé-ci n'a point autant d'éloquence que l'autre, et alors, je comprends…"
 agot_birth_events.0102.a:0 "#italic Oui, je comprends…#!"
 agot_birth_events.1000.t:0 "Mille Aigracier, ou un seul"
 agot_birth_events.1000.desc:0 "Avec la naissance de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('child'))], [child.GetFirstName], aube peut-être une toute autre naissance, celle de ma propre maison.\n\nMon frère, [daemon.GetFirstNameNicknamed], a fondé la sienne, et désormais le nom des Feunoyr inspire le respect autant qu'il instille la peur. Car il en est ainsi avec les grandes figures du monde, elles doivent noircir de leur propre empreinte les pages des livres d'histoire."
 agot_birth_events.1000.a:0 "Mon nom continuera de faire frémir les faibles, même un siècle après ma mort !"
 agot_birth_events.1000.a_tt:0 "Vous allez former une [cadet_branching|El] et votre mariage deviendra [patrilineal|El]"
 agot_birth_events.1000.b:0 "Il n'y a qu'un Aigracier, et les gens savent qu'ils doivent le craindre !"
 agot_birth_events.2000.t:0 "Plus qu'une épée, un nom"
 agot_birth_events.2000.desc:0 "[vs_blackfyre.GetName], l'illustre épée en acier valyrien, est désormais en ma possession. Elle est la personnification du pouvoir des Targaryen, symbole de leur prouesse et de leur légitimité.\n\nHélas, si le sang du dragon coule dans mes veines, je n'en porte pas pour autant le patronyme. La bâtardise étant mon camouflet, je ne peux prétendre avoir quelques héritages que ce soit au-delà de cette lame légendaire. Je pourrais cependant m'approprier le nom de celle-ci, devenant ainsi le fondateur d'une maison qui porterait fièrement le legs de l'Antique Valyria, sans plus de honte aucune.\n\nAinsi donc, dois-je laisser éclore ce qui couve dans ma chair et mon âme ?"
 agot_birth_events.2000.a:0 "Le dragon noir va prendre son envol !"
 agot_birth_events.2000.a_tt:0 "Vous allez créer la Maison Feunoyr."
 agot_birth_events.2000.b:0 "Je me montrerais digne de mon sang par d'autres moyens."