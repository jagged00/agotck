l_french:
 agot_engagement_objection_negative_opinion:0 "L'idée d'être dans la même pièce qu[betrothed_2.Custom('FR_EluiElle')] me révulse… alors être dans le même lit…"
 agot_engagement_objection_incest:0 "Bonté divine, c'est m[betrothed_2.Custom('FR_OnA')] propre [betrothed_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_2'))] ! Ne voyez vous pas que c'est… inconvenant ?! #italic Dégoûtant !#! #bold Sordide !#!"
 agot_engagement_objection_lowborn:0 "C'est un[betrothed_2.Custom('FR_E')] [betrothed_2.Custom('WomanManGirlBoy')] du commun… vous comprenez ? Un[betrothed_2.Custom('FR_E')] simple roturi[betrothed_2.Custom('FR_ErEre')], diantre !"
 agot_engagement_objection_bastard:0 "Je ne veux pas épouser un[betrothed_2.Custom('FR_E')] bâtard[betrothed_2.Custom('FR_E')] !"
 agot_engagement_objection_not_attracted_to_me:0 "Selon les dires… je doute qu'[betrothed_2.Custom('FR_IlElle')] #italic affectionne#! les [betrothed_1.Custom('WomenMenGirlsBoys')]… les [betrothed_1.Custom('WomenMenGirlsBoys')] comme moi, j'entends."
 agot_engagement_objection_not_attracted_to_them:0 "Je n'aurais nul #italic épanouissement#! à épouser un[betrothed_2.Custom('FR_E')] [betrothed_2.Custom('WomanManGirlBoy')]… un[betrothed_2.Custom('FR_E')] [betrothed_2.Custom('WomanManGirlBoy')] comme [betrothed_2.Custom('FR_LuiElle')], j'entends."
 agot_engagement_objection_dwarf:0 "C'est un nain. #bold [Select_CString(betrothed_2.IsFemale,'Une naine','Un vulgaire nabot')] !#!"
 agot_engagement_objection_hunchback:0 "C'est un[betrothed_2.Custom('FR_E')] bossu[betrothed_2.Custom('FR_E')], bonté divine ! Voulez-vous vraiment me voir épouser une telle chose ?!"
 agot_engagement_objection_greyscale:0 "Comment pouvez-vous me contraindre à épouser quelqu'un qui porte la grisécaille ?!"
 agot_engagement_objection_hideous:0 "L'avez-vous bien regardé ? [betrothed_2.Custom('FR_IlElle')|U] est si repoussant[betrothed_2.Custom('FR_E')] ! Sa simple vue me révulse."
 agot_engagement_objection_ugly:0 "Étiez-vous si désespéré[ROOT.Char.Custom('FR_E')] à me trouver un[betrothed_2.Custom('FR_E')] fiancé[betrothed_2.Custom('FR_E')] que vous avez délibérément choisi un tel laideron ?"
 agot_engagement_objection_unattractive:0 "Pour tout vous dire, je [betrothed_2.Custom('FR_LeLa')] trouve vilain[betrothed_2.Custom('FR_E')]."
 agot_engagement_objection_idiot:0 "C'est un[betrothed_2.Custom('FR_E')] simple[betrothed_2.Custom('FR_TTte')]. J'aurais plus de plaisir à converser avec une chèvre qu'avec [betrothed_2.Custom('FR_LuiElle')]."
 agot_engagement_objection_dull:0 "J'aimerais le dire autrement mais… [betrothed_2.Custom('FR_IlElle')] est bête à manger du foin."
 agot_engagement_objection_weak:0 "Avec un[betrothed_2.Custom('FR_E')] épou[betrothed_2.Custom('FR_XSe')] si frêle je pourrais goûter au veuvage à la moindre bourrasque."
 agot_engagement_objection_lesser:0 "C'est un[betrothed_2.Custom('FR_E')] [betrothed_2.GetHouse.GetNameNoTooltip], une famille de second ordre, et vous le savez."
 agot_engagement_objection_lazy:0 "Un[betrothed_2.Custom('FR_E')] partisan[betrothed_2.Custom('FR_E')] du moindre effort, voilà ce que c'est. Oiseu[betrothed_2.Custom('FR_XSe')] et bo[betrothed_2.Custom('FR_NNne')] qu'à musarder à longueur de journée."
 agot_engagement_objection_deceitful:0 "Il n'y a que mensonges et tromperies qui sortent de sa bouche. [betrothed_2.Custom('FR_IlElle')|U] est la perfidie incarnée !"
 agot_engagement_objection_craven:0 "C'est un[betrothed_2.Custom('FR_E')] couard[betrothed_2.Custom('FR_E')]. Certainement pas le genre de personne sur qui il faut compter dans les moments difficiles."
 agot_engagement_objection_shy:0 "[betrothed_2.Custom('FR_IlElle')|U] est bien trop #italic pudibond[betrothed_2.Custom('FR_E')]#!. Devrais-je passer ma vie avec quelqu'un qui peine à prononcer même les mots les plus simples ?"
 agot_engagement_objection_bold:0 "C'est un[betrothed_2.Custom('FR_E')] [betrothed_2.Custom('WomanManGirlBoy')] totalement imbu[betrothed_2.Custom('FR_E')] de sa personne !"
 agot_engagement_objection_meek:0 "[betrothed_2.Custom('FR_IlElle')|U] manque de poigne… c'est un[betrothed_2.Custom('FR_E')] [betrothed_2.Custom('WomanManGirlBoy')] sans la moindre once de caractère !"
 agot_engagement_objection_drunkard:0 "Devrais-je épouser [Select_CString(betrothed_2.IsFemale,'une soularde','un sac à vin')] qui préférera la compagnie de l'alcool à la mienne ?"
 agot_engagement_objection_sad:0 "[betrothed_2.Custom('FR_IlElle')|U] ne fait que geindre et pleurnicher de l'aube jusqu'au crépuscule."
 agot_engagement_objection_crazy:0 "[betrothed_2.Custom('FR_IlElle')|U] souffre de démence, cela se voit comme le nez au milieu du visage !"
 agot_engagement_objection_unfaithful:0 "La fidélité est un concept qui lui est étranger. Souhaitez-vous donc voir votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))] épouser un[betrothed_2.Custom('FR_E')] [betrothed_2.GetWomanMan] qui s'empressera d'aller [Select_CString(betrothed_2.IsFemale,'se faire butiner à droite à gauche','courir le guilledou')] ?"
 agot_engagement_objection_prude:0 "[betrothed_2.Custom('FR_IlElle')|U] est bien trop #italic pudibond[betrothed_2.Custom('FR_E')]#! à mon goût…"
 agot_engagement_objection_unkind:0 "[betrothed_2.Custom('FR_IlElle')|U] ne connaît ni la bonté ni la compassion. C'est un être sans cœur !"
 agot_engagement_objection_much_too_young:0 "[betrothed_2.Custom('FR_IlElle')|U] est beaucoup trop jeune ! Je n'arrive pas à croire que vous cautionnez une telle chose !"
 agot_engagement_objection_too_young:0 "[betrothed_2.Custom('FR_IlElle')|U] est bien plus jeune que moi."
 agot_engagement_objection_too_old:0 "[betrothed_2.Custom('FR_IlElle')|U] est bien plus v[betrothed_2.Custom('FR_IeuxIeille')] que moi."
 agot_engagement_objection_much_too_old:0 "[betrothed_2.Custom('FR_IlElle')|U] est si v[betrothed_2.Custom('FR_IeuxIeille')] que [Select_CString(betrothed_2.IsFemale,'son balcon doit dégringoler sans support','ses couilles doivent lui frôler les genoux')]."
 agot_engagement_objection_unlike:0 "[betrothed_2.Custom('FR_LuiElle')|U] et moi ne nous ressemblons en rien. Nous sommes aussi conciliables que la glace et le feu !"
 agot_engagement_objection_std:0 "Regardez donc sa bouche ! Dois-je vous faire un dessin ?"
 agot_engagement_objection_reputation:0 "Vous n'êtes pas sans connaître sa réputation, n'est-ce pas ?! Je préfère ne pas m'assurer de sa véracité."
 agot_engagement_objection_child:0 "Vous savez ce [Select_CString(betrothed_2.IsFemale,'qu’elle a enfanté','qu’il a engendré')], n'est-ce pas ? La bâtardise !"
 agot_engagement_objection_unremarkable:0 "[betrothed_2.Custom('FR_LuiElle')|U] est si… quelconque… d'une banalité à pleurer."
 agot_engagement_events.0002.t:0 "Le cœur a ses raisons…"
 agot_engagement_events.0002.desc.intro:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('betrothed_1'))] pénètre dans mes appartements,"
 agot_engagement_events.0002.desc.submissive:0 "ses doigts s'entremêlant d'anxiété tandis que sa langue semble s'emmurer derrière ses remparts, faute de courage. Après une impulsion de ma part pour l'encourager à parler — ou [betrothed_1.Custom('FR_LeLa')] contraindre, c'est selon — [betrothed_1.GetFirstName] se décide à me révéler la raison de sa présence.\n\n« J'ai mûrement réfléchi à mes fiançailles avec [betrothed_1.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_2'))], énonce-t-[betrothed_1.Custom('FR_IlElle')] en évitant autant que possible que nos regards se croisent. Je… J'aimerais que vous reveniez sur votre décision… »\n\n"
 agot_engagement_events.0002.desc.angry:0 "les poings serrés et les yeux chargés d'une ire dont je subodore fortement en être la cause, directe ou indirecte. Il est des conversations que l'on sait désagréables au premier instant, et celle-ci en est une.\n\n« C'est hors de question ! Vous m'entendez ?! Hors de question ! » Je n'ai pas le temps de chercher précision, que déjà [betrothed_1.GetFirstName] poursuit son esclandre : « Je refuse d'épouser [betrothed_1.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_2'))] ! »\n\n"
 agot_engagement_events.0002.desc.beg:0 "visiblement désireu[betrothed_1.Custom('FR_XSe')] de me toucher un mot, et ce malgré l'apparente nervosité que je lis dans son regard. J'enjoins donc [betrothed_1.GetFirstName] à s'installer pour être plus à son aise.\n\n« C'est au sujet de mes fiançailles avec [betrothed_1.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_2'))], débute-t-[betrothed_1.Custom('FR_IlElle')] sans grande conviction, ne m'obligez pas à l'épouser, de grâce ! »\n\n"
 agot_engagement_events.0002.desc.mid:0 "Pris[ROOT.Char.Custom('FR_E')] de court, je rétorque de sorte à obtenir la raison qui [betrothed_1.Custom('FR_LeLa')] met dans cet état.\n\n"
 agot_engagement_events.0002.desc.nothing:0 "Si sa gestuelle en fait quelqu'un de bavard, sa bouche, elle, reste silencieuse un long moment."
 agot_engagement_events.0002.desc.one:0 "« "
 agot_engagement_events.0002.desc.first:0 "« Par où commencer ? "
 agot_engagement_events.0002.desc.second:0 "Et ce n'est pas tout ! "
 agot_engagement_events.0002.desc.third:0 " »\n\n« Autre chose ? »\n\n« Oui-da ! "
 agot_engagement_events.0002.desc.lover:0 "Mon cœur est déjà pris, et c'est à nul autre que [betrothed_1.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_lover'))] qu'il me plaît de l'offrir. »"
 agot_engagement_events.0002.desc.end:0 "» [betrothed_1.Custom('FR_IlElle')|U] prend une profonde inspiration qui lui donne un regain d'hardiesse : « Je suis votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))], certes, mais je devrais avoir mon mot à dire sur ces choses là ! »"
 agot_engagement_events.0002.a:0 "Soit. Je ne t'imposerai pas de mariage… pour le moment."
 agot_engagement_events.0002.b:0 "Je romps les fiançailles, mais la question de ton mariage tient toujours !"
 agot_engagement_events.0002.c:0 "Si c'est ce que ton cœur désire, je t'accorde le droit d'épouser [betrothed_lover.Custom('FR_le_Char_Pi')][betrothed_lover.GetTitledFirstNameNoTooltip]."
 agot_engagement_events.0002.d:0 "Que t[betrothed_lover.Custom('FR_OnA')] #italic bien-aimé[betrothed_lover.Custom('FR_E')]#! brise ses fiançailles, et je t'accorde le droit de l'épouser."
 agot_engagement_events.0002.e:0 "Si t[betrothed_lover.Custom('FR_OnA')] #italic bien-aimé[betrothed_lover.Custom('FR_E')]#! abandonne ses vœux, vous serez libre de vous marier."
 agot_engagement_events.0002.f:0 "Tu es m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('betrothed_1'))] et tu feras ce que bon me semblera !"
 agot_engagement_events.0002.f.tt:0 "[betrothed_1.Custom('FR_le_Char_U_Pi')|U][betrothed_1.GetShortUIName] pourrait très mal le prendre"
 agot_engagement_events.0002.mild.tt:0 "[betrothed_1.GetFirstNameNoTooltip] est inconsolable"
 agot_engagement_events.0003.opening.harsh:0 "[actor.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_engagement_events.0003.opening.apologetic:0 "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_engagement_events.0003.betrothed.start:0 "Après mûre réflexion, j'ai décidé de mettre fin à "
 agot_engagement_events.0003.betrothed.torejected:0 "nos fiançailles."
 agot_engagement_events.0003.betrothed.toliege:0 "mes fiançailles avec votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('rejected_betrothed'))], [rejected_betrothed.Custom('FR_le_Char_Pi')][rejected_betrothed.GetTitledFirstName]."
 agot_engagement_events.0003.betrothed.end:0 "Sachez que j'agis sans le consentement de m[actor.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('actor_liege'))], [actor_liege.Custom('FR_le_Char_Pi')][actor_liege.GetTitledFirstName]. Cette décision est la mienne, non la sienne, car je refuse de n'être que spectat[ROOT.Char.Custom('FR_EurRice')] de ma propre vie."
 agot_engagement_events.0003.start:0 "Après mûre réflexion, j'ai décidé de briser "
 agot_engagement_events.0003.torejected:0 "vos fiançailles avec m[actor.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('rejecting_betrothed'))], [rejecting_betrothed.Custom('FR_le_Char_Pi')][rejecting_betrothed.GetTitledFirstName]."
 agot_engagement_events.0003.toliege:0 "les fiançailles entre m[actor.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('rejecting_betrothed'))], [rejecting_betrothed.Custom('FR_le_Char_Pi')][rejecting_betrothed.GetTitledFirstName], et votre [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('rejected_betrothed'))], [rejected_betrothed.Custom('FR_le_Char_Pi')][rejected_betrothed.GetTitledFirstName]."
 agot_engagement_events.0003.end:0 "Cette décision n'est nullement motivée par l'idée de vous nuire. J'ai simplement ouvert les yeux et décidé de respecter les sentiments et les souhaits de m[actor.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('rejecting_betrothed'))]. J'espère que vous le comprendrez et saurez pardonner ce qui, je n'en doute pas, est un acte infamant à vos yeux, mais qui est en réalité le geste d'affection d'un[actor.Custom('FR_E')] [rejecting_betrothed.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))]."
 agot_engagement_events.0003.a:0 "Malédiction !"
 agot_engagement_events.0006.opening:0 "[betrothed_1.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_engagement_events.0006.desc:0 "Depuis longtemps mon esprit est gangrené par l'idée de vous confronter en personne à cette question : comment un[ROOT.Char.Custom('FR_E')] [betrothed_1.Custom2('LMF_RelationToMeShort', ROOT.Char )] peut-[ROOT.Char.Custom('FR_IlElle')] nourrir l'idée sordide d'épouser s[betrothed_1.Custom('FR_OnA')] propre [ROOT.Char.Custom2('LMF_RelationToMeShort', betrothed_1 )] ?\n\nSi je déplore de n'avoir jamais eu le courage de le faire, j'aurais au moins le courage de quitter [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] et de fuir l'ignoble saloperie qui fait office de [ROOT.Char.GetTitleAsNameNoTooltip|l]. Je préférerais séjourner dans [betrothed_1.GetFaith.NegativeAfterLife] que supportez votre vue un instant de plus, alors de grâce, ne cherchez pas à me retrouver !"
 agot_engagement_events.0006.a:0 "Nul raison de s'en faire. Lorsque sa pugnacité s'étiolera, [betrothed_1.Custom('FR_IlElle')] reviendra."
 agot_engagement_events.0006.b:0 "Puisqu'être m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', betrothed_1 )] est une charge trop lourde à porter, je vais l'en délester."
 agot_engagement_events.0007.t:0 "Le cœur a ses raisons…"
 agot_engagement_events.0007.desc.incest:0 "« [betrothed_1.Custom2('RelationToMeShort', ROOT.Char)|U], je me refuse à épouser m[betrothed_1.Custom2('FR_LMF_RelationToMeShort_OnA', betrothed_2)], [betrothed_2.GetFirstName]. Rien qu'à cette pensée… je… » Les traits de son faciès qui s'assombrissent écourtent sa phrase, explicitant ce qui ne sort pas de sa bouche, néanmoins, que cela lui plaise ou non, ce sont là les usages de notre famille.\n\n« M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', betrothed_1)], il est de notre devoir de maintenir la pureté de notre lignée. Un devoir sacré ! » Mais aussi éloquent[ROOT.Char.Custom('FR_E')] que je m'imagine être, mes mots se meurent dans des oreilles qui n'en ont cure.\n\n[betrothed_1.GetFirstName] se mure dans son entêtement, lequel est consolidé par un dégoût manifeste : « Je ne souhaite pas marcher dans #italic vos traces#!, dit-[betrothed_1.Custom('FR_IlElle')], ni dans les vôtres ni dans celles de nos #italic usages#!…"
 agot_engagement_events.0007.desc.normal:0 "« [betrothed_1.Custom2('RelationToMeShort', ROOT.Char)|U], pourquoi ne puis-je pas jouir d'un mariage comme le vôtre ? Pourquoi me contraindre à épouser m[betrothed_1.Custom2('FR_LMF_RelationToMeShort_OnA', betrothed_2)] ? C'est ignoble… »\n\nLa plaidoirie de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', betrothed_1)], [betrothed_1.GetFirstName], me transperce avec plus d'aisance qu'un poignard en acier valyrien, et cette vérité déclamée le plus naturellement du monde en vient à me questionner sur ce qui m'a poussé à prendre cette décision.\n\n#italic Qu'ai je fait ?#!"
 agot_engagement_events.0007.desc.end:0 "\n\nLe matin suivant, la nouvelle arrive jusqu'à mes oreilles : le mariage a été annulé à son initiative."
 agot_engagement_events.0007.a:0 "Je crains de n'avoir d'autre choix que d'accepter sa décision."
 agot_engagement_events.0007.b:0 "[ROOT.Char.Custom2('LMF_RelationToMeShort', betrothed_1)|U] ingrat[betrothed_1.Custom('FR_E')]. N'escomptez pas vous approprier mon legs !"
 agot_engagement_events.0008.t:0 "Un rêve brisé"
 agot_engagement_events.0008.desc:0 "[betrothed_1.GetFirstName] et moi poursuivons notre controverse, de laquelle fleurit hourvari et esclandre. Finalement, après que chacun ait bataillé pour tenir sur ses positions, [betrothed_1.Custom('FR_IlElle')] me lance un regard éclatant de fureur auquel s'ajoute un ultimatum :\n\n« Vous faites peu de cas de mon opinion ? Alors je ferais peu de cas du vôtre ! » [betrothed_1.Custom('FR_IlElle')|U] se dirige vers la sortie, avant de brutalement tourner les talons pour m'adresser une dernière remontrance : « Je n'épouserais point [betrothed_2.Custom('FR_le_Char_Pi')][betrothed_2.GetTitledFirstName]… ni [betrothed_2.Custom('FR_LuiElle')] #bold ni qui que ce soit !#! »\n\nJ'y vois là une déclaration bravache, une hardiesse feinte et seulement mue par un caprice, mais c'est là mon erreur car je sous-estime la pugnacité de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', betrothed_1)]. Le matin suivant j'ai vent qu'une missive a été envoyée [rejected_betrothal_owner.Custom('FR_au_Char_Pi')][rejected_betrothal_owner.GetTitledFirstName] afin de rompre les fiançailles."
 agot_engagement_events.0008.a:0 "M'est avis que cela n'augure rien de bon."
 agot_engagement_events.0008.b:0 "[betrothed_1.Custom('FR_IlElle')|U] a beau être m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', betrothed_1)], la trahison se doit d'être punie !"
 agot_engagement_events.0008.c:0 "Pour prix de sa défiance, je [betrothed_1.Custom('FR_LeLa')] bannis séance tenante de mes terres !"
 agot_engagement_events.0009.t:0 "À cœur brisé rien d'impensable"
 agot_engagement_events.0009.desc:0 "Je n'ai de cesse de ressasser cette vive querelle que j'ai eue avec [betrothed_1.GetFirstName]. Elle me grève tant et si bien que je n'ai pas trouvé la force de me lever de mon bureau. Je ne saurais dire combien d'heures se sont écoulées depuis, et pourtant le souvenir de l'expression que j'y ai lue sur son visage ne s'est point encore étiolée. Je me repasse chaque mot en mémoire, chaque geste, chaque trait, et toujours avec la même question en tête : #italic aurais-je pu mieux agir ?#!\n\nImpossible pour moi de trouver quelques formes de quiétude que ce soit, lorsque j'entends quelqu'un toquer à la porte. « Entrez ! » Je réponds avec la célérité d'un[ROOT.Char.Custom('FR_E')] [betrothed_1.Custom2('LMF_RelationToMeShort', ROOT.Char )] qui souhaite saisir l'occasion de faire amende honorable, mais c'est un garde qui pénètre dans la pièce.\n\nLorsqu'il m'annonce la raison de sa présence ici, quelques chose remue en moi. D'abord la surprise : « Votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))], » puis l'incrédulité : « …dans ses appartements… » pour finir par de l'effroi : « Toutes mes condoléances [ROOT.Char.Custom('FR_MonseigneurMadame')]. »"
 agot_engagement_events.0009.a:0 "....."
 agot_engagement_events.0010.opening:0 "[betrothed_1.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_engagement_events.0010.start:0 "Au moment où vous lirez ceci, j'aurais déjà fui cette prison que l'on nomme [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pour partir en quête d'une existence meilleure que celle que vous souhaitez m'offrir.\n\n"
 agot_engagement_events.0010.leave:0 "Vous ne me voyez non comme un[betrothed_1.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))], mais comme un pion qu'il vous plaît de contrôler à votre guise. Sachez que ce n'est pas la vie que j'ambitionne, si tant est que l'on puisse qualifier de #italic vie#! une telle mascarade."
 agot_engagement_events.0010.wall:0 "Vous ne me voyez non comme un[betrothed_1.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))], mais comme un pion qu'il vous plaît de contrôler à votre guise, et cela a grandement facilité ma décision qui est de partir rejoindre la Garde de Nuit. Bien que vous soyez la famille qui m'a été imposée par [betrothed_1.GetFaith.HighGodName], je puis décider d'en choisir une nouvelle. Au Mur, parmi mes nouveaux frères, je serais traité avec plus d'égard, et malgré les lois et les vœux qu'il me faudra respecter, je vivrais avec plus de liberté que vous ne serez jamais disposé à m'en accorder."
 agot_engagement_events.0010.maester:0 "Puisque vous mésestimez l'intellect de votre propre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))] au point de [betrothed_1.Custom('FR_LeLa')] traiter comme un vulgaire pion que vous déplacez selon votre bon vouloir, j'irai quérir la reconnaissance chez ceux qui me tiendront en plus haute estime. Auprès des mestres de la Citadelle, c'est la valeur de mon esprit qui primera sur celle de mon rang."
 agot_engagement_events.0010.septon:0 "Pour vous je suis moins un[betrothed_1.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))] qu'un pion qu'il vous plaît de contrôler à votre guise. Il n'y a guère que les dieux qui seront disposés à m'aimer tel que je suis, et c'est pourquoi j'ai pris ma décision. Je vais rejoindre la Foi et dédier ma vie aux Sept qui ne font qu'Un."
 agot_engagement_events.0010.a.wall:0 "[betrothed_1.Custom('FR_IlElle')|U] préfère prendre le noir plutôt qu'un[betrothed_1.Custom('FR_EOpp')] épou[betrothed_1.Custom('FR_XSeOpp')] ?"
 agot_engagement_events.0010.a.maester:0 "[betrothed_1.Custom('FR_IlElle')|U] préfère la compagnie des livres à celle d'un[betrothed_1.Custom('FR_EOpp')] épou[betrothed_1.Custom('FR_XSeOpp')] ?"
 agot_engagement_events.0010.a.septon:0 "[betrothed_1.Custom('FR_IlElle')|U] préfère la compagnie des dieux à celle d'un[betrothed_1.Custom('FR_EOpp')] épou[betrothed_1.Custom('FR_XSeOpp')] ?"
 agot_engagement_events.0010.a.leave:0 "Qu'il en soit ainsi et que jamais [betrothed_1.Custom('FR_IlElle')] ne remette les pieds ici ! Jamais !"
 agot_engagement_events.0010.b.leave:0 "Nul raison de s'en faire. Lorsque sa pugnacité s'étiolera, [betrothed_1.Custom('FR_IlElle')] reviendra."
