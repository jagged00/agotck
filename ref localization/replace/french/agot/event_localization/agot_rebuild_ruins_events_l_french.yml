l_french:
 ruin_sigil_ring:0 "Anneau sigillaire des ruines"
 ruin_sigil_ring_desc:0 "Un anneau qui devait autrefois arborer un blason et qui a été trouvé lors de la reconstruction d'un château en ruine. Le temps ayant fait son office, on ne discerne plus grand-chose, mais nul doute qu'il appartenait à la maison qui revendiquait jadis la domination des lieux."
 ruin_sword:0 "Épée en acier des ruines"
 ruin_sword_desc:0 "Une épée forgée à partir de lingots d'acier trouvés lors de la reconstruction d'un château en ruine."
 ruin_mace:0 "Masse en acier des ruines"
 ruin_mace_desc:0 "Une masse forgée à partir de lingots d'acier trouvés lors de la reconstruction d'un château en ruine."
 ruin_spear:0 "Lance en acier des ruines"
 ruin_spear_desc:0 "Une lance fabriquée à partir de lingots d'acier trouvés lors de la reconstruction d'un château en ruine."
 ruin_axe:0 "Hache en acier des ruines"
 ruin_axe_desc:0 "Une hache forgée à partir de lingots d'acier trouvés lors de la reconstruction d'un château en ruine."
 ruin_dagger:0 "Dague en acier des ruines"
 ruin_dagger_desc:0 "Une dague forgée à partir de lingots d'acier trouvés lors de la reconstruction d'un château en ruine."
 agot_rebuilding_ruins.0016.t:0 "Diriger par l’exemple"
 agot_rebuilding_ruins.0016.desc:0 "Le labeur qu'exigent ces ruines éprouve à la fois le corps et l'esprit. Malgré mon statut, j'y ai mis du mien pour participer aux efforts de reconstruction, travaillant conjointement avec mes courtisans. Cela n'a pas passé inaperçu car j'ai bien remarqué le regain de respect qu'ils me témoignent depuis que je me salis littéralement les mains à leurs côtés."
 agot_rebuilding_ruins.0016.a:0 "Qui dit plus de bras dit moins d'efforts."
 agot_rebuilding_ruins.0017.t:0 "Une visite par curiosité"
 agot_rebuilding_ruins.0017.desc:0 "Les nouvelles à propos de mes efforts pour redonner à ces vieilles ruines leur gloire d'antan n'ont pas manqué de faire le tour du pays, jusqu'à dépasser les frontières. C'est sans doute ce qui a amené un seigneur des plus curieux à se présenter aujourd'hui, pour le voir de ses propres yeux."
 agot_rebuilding_ruins.0017.a:0 "Saviez-vous que ces ruines ont connu moult batailles par le passé ?"
 agot_rebuilding_ruins.0017.a.tt:0 "Vous utilisez vos compétences en martialité pour étayer l'avantage stratégique que peut procurer ces ruines."
 agot_rebuilding_ruins.0017.b:0 "La reconstruction de ces ruines demandent un certain #italic investissement#!."
 agot_rebuilding_ruins.0017.b.tt:0 "Vous utilisez vos compétences en intendance pour mettre en avant les efforts et les économies dont vous faites preuves avec cette reconstruction."
 agot_rebuilding_ruins.0017.c:0 "Laissez-moi vous faire la visite des lieux."
 agot_rebuilding_ruins.0017.c.tt:0 "Vous utilisez vos compétences en diplomatie pour satisfaire la curiosité du visiteur."
 agot_rebuilding_ruins.0017.win.title:0 "Vous avez fait bonne impression"
 agot_rebuilding_ruins.0017.lose.title:0 "Vous n'avez pas fait bonne impression"
 agot_rebuilding_ruins.0018.t:0 "Une fleur parmi les ruines"
 agot_rebuilding_ruins.0018.desc:0 "Autrefois le siège d'une noble maison, ces ruines sont aujourd'hui un lieu de visites régulièrement fréquentées par la populace locale. Bien que la reconstruction fût un sujet de discorde avec eux, une jeune jouvencelle s'est dressée comme un pont entre nous, son talent pour la musique lui ayant permis de conquérir par quelques notes enchanteresses le cœur de mes courtisans et chevaliers. Aujourd'hui, elle a su offrir sa plus belle démonstration à la harpe, laissant les ouvriers profiter d'une accalmie dans le labeur quotidien."
 agot_rebuilding_ruins.0018.a:0 "Nous pouvons nous permettre une petite pause."
 agot_rebuilding_ruins.0018.a.tt:0 "Vous allez profiter de la musique pour vous détendre un moment."
 agot_rebuilding_ruins.0018.b:0 "Quelqu'un d'aussi talentueux mérite une place à ma cour !"
 agot_rebuilding_ruins.0018.b.tt:0 "Vous lui offrez une place à votre cour."
 agot_rebuilding_ruins.0001.t:0 "Les vendeurs de charbon de bois"
 agot_rebuilding_ruins.0001.desc:0 "Jadis le foyer de grands seigneurs, tout ce qui reste des lieux maintenant ce sont des ruines sinistres et des étendues sylvestres.\n\nLorsque les efforts pour tout rebâtir ont commencé, des vendeurs de charbons de bois furent aperçus, et leur regard tantôt inquiet tantôt méfiant ne nous a pas échappé. Désormais, des rapports bien étranges me parviennent. La restauration subit quelques retards causés par du matériel endommagé et des vols rapportés durant la nuit tombée.\n\nCertains accusent les vendeurs de charbon, qui craignent que les travaux menés ici pourraient conduire à un déboisement provoquant la pénurie de leur gagne-pain."
 agot_rebuilding_ruins.0001.a:0 "S'ils se comportent comme des bandits, je les traiterai comme tels !"
 agot_rebuilding_ruins.0001.a.tt:0 "Les vendeurs de charbon subiront votre courroux."
 agot_rebuilding_ruins.0001.b:0 "Nous pouvons sûrement trouver un terrain d'entente."
 agot_rebuilding_ruins.0001.b.tt:0 "La diplomatie pourrait vous faire gagner leur soutien — ou leur faire gagner une compensation équitable pour la perte de leurs bois."
 agot_rebuilding_ruins.0001.win.title:0 "Un accord est trouvé avec les locaux."
 agot_rebuilding_ruins.0001.lose.title:0 "Une indemnisation a été versée aux vendeurs de charbon."
 agot_rebuilding_ruins.0001.c:0 "Je pourrais faire un présent pour éviter tout débordement futur."
 agot_rebuilding_ruins.0001.c.tt:0 "Vous offrez de l’or aux vendeurs de charbon de bois pour compenser la perte de revenus issus des bois environnants."
 agot_rebuilding_ruins.0002.t:0 "La bande du coq"
 agot_rebuilding_ruins.0002.desc:0 "Mes hommes ont passé la matinée à ratisser les ruines, à la recherche… #N d'un coq ?#!\n\nIls n'ont eu de cesse de trouver la mystérieuse bête qui fut entendue cette nuit durant l'heure de l'anguille, du hibou puis du loup. D'après certains, c'était comme si l'animal chantait depuis les profondeurs de la terre. Souhaitant mettre en lumière cet étrange mystère, c'est une quête pour débusquer la volaille qui a été lancée depuis le point du jour jusqu'à l'arrivée du soleil à son zénith.\n\nFinalement, ces pieux efforts ont été récompensés quand enfin la bête fut retrouvée dans un cellier tenu secret, en compagnie d'une poignée d'hommes. Il apparaît évident qu'il s'agit là d'une bande de hors-la-loi qui utilisait les ruines comme base d'opérations, et notre arrivée les a contraint à se terrer comme des rats."
 agot_rebuilding_ruins.0002.a:0 "Arrêtez-les !"
 agot_rebuilding_ruins.0002.a.tt:0 "Ce sont clairement des hors-la-loi et justice doit être rendue."
 agot_rebuilding_ruins.0002.b:0 "Pas de quartier, pas de pitié ! Emparez-vous du butin !"
 agot_rebuilding_ruins.0002.b.tt:0 "Vous exercez une justice éclair sans procès ni fioriture."
 agot_rebuilding_ruins.0002.c:0 "On a toujours l'utilité de truands dénués de scrupules."
 agot_rebuilding_ruins.0002.c.tt:0 "Ce sont des hors-la-loi, mais qui savent se servir d'armes. Vous pourriez les recruter."
 agot_rebuilding_ruins.0003.t:0 "Trésor enfoui"
 agot_rebuilding_ruins.0003.desc:0 "Les travaux se poursuivent dans les ruines et aujourd'hui la fortune me sourit… littéralement — #bold une bourse contenant de l'or#! a été trouvé dans une petite cache sous le plancher suite au déblayage d'une pièce.\n\nPersonne ne verra d'objection à ce que je la prenne, de toute façon ce n'est pas comme si le propriétaire allait surgir #italic d'outre-tombe#! pour s'en plaindre…"
 agot_rebuilding_ruins.0003.a:0 "Argent facile !"
 agot_rebuilding_ruins.0003.a.tt:0 "Le destin vous sourit."
 agot_rebuilding_ruins.0004.t:0 "Attaque de bandit"
 agot_rebuilding_ruins.0004.desc:0 "#bold Les fils de putes !#! Ils ont attendus l'heure du loup pour lancer l'attaque. Un groupe de malfrats et de gredins qui attendait patiemment, caché dans les lieux environnants, masqué par la végétation.\n\nQu'ils soient mus par l'arrogance, le désespoir ou la démence, peu me chaut, je les passerais tous au fil de l'épée. Mais la question est de savoir si je serais plus utile par mes compétences de commandant[ROOT.Char.Custom('FR_E')] ou de combattant[ROOT.Char.Custom('FR_E')]."
 agot_rebuilding_ruins.0004.a:0 "Soldats, rassemblez-vous ! En formation !"
 agot_rebuilding_ruins.0004.a.tt:0 "Vous allez mettre en pratique vos compétences en martialité pour diriger vos hommes contre les bandits."
 agot_rebuilding_ruins.0004.a.win.title:0 "Victoire !"
 agot_rebuilding_ruins.0004.a.lose.title:0 "Défaite..."
 agot_rebuilding_ruins.0004.b:0 "Je tirerais l'épée aux côtés de mes hommes !"
 agot_rebuilding_ruins.0004.b.tt:0 "Vous allez participer à la mêlée et user de votre prouesse pour faire pencher la balance."
 agot_rebuilding_ruins.0004.b.win.title:0 "Victoire !"
 agot_rebuilding_ruins.0004.b.lose.title:0 "Défaite..."
 agot_rebuilding_ruins.0004.c:0 "Fuyez ! Fuyez pour vos vies !"
 agot_rebuilding_ruins.0004.c.tt:0 "La bataille est perdu d'avance, mieux vaut battre en retraite que perdre la vie."
 agot_rebuilding_ruins.0005.t:0 "Des histoires de fantômes"
 agot_rebuilding_ruins.0005.desc:0 "Depuis quelque temps déjà, mon chevalier, [agot_ghost_story_knight.Custom('FR_le_Char_Pi')][agot_ghost_story_knight.GetTitledFirstName], ne cesse de colporter les histoires à propos de ces ruines et des membres de la maison qui y résidait. À chaque coin de rue et à chaque couloir j'entends les mêmes murmures incessants…\n\n#italic      Des cris à vous glacer le sang…#!\n\n#italic            Des pleutres endiablés…#!\n\n#italic                  Nul n'en a réchappé…#!\n\nDes fables qui germent et fleurissent dans l'esprit des petites gens comme autant de mauvaises herbes qui se répand. Hélas, que cela s'avère totalement inventé ou partiellement exagéré, ces mots sont un chancre qui se fraye un chemin jusqu'à ma cour."
 agot_rebuilding_ruins.0005.a:0 "Une nuit passée dans ces ruines prouvera que ce ne sont que des fadaises !"
 agot_rebuilding_ruins.0005.a.tt:0 "Dans une démonstration de bravoure vous allez mettre un terme à toutes ces histoires."
 agot_rebuilding_ruins.0005.b:0 "Que la plèbe palabre si ça lui chante."
 agot_rebuilding_ruins.0005.b.tt:0 "Quelle importance peuvent bien avoir les murmures dans les couloirs ?"
 agot_rebuilding_ruins.0005.c:0 "Je pourrais effrayer [agot_ghost_story_knight.GetFirstNameNoTooltip]."
 agot_rebuilding_ruins.0005.c.tt:0 "Vous allez discuter avec votre chevalier, pour lui faire remarquer à quel point ces histoires effritent sa vaillance."
 agot_rebuilding_ruins.0005.c.win.title:0 "Vous semblez avoir un impact !"
 agot_rebuilding_ruins.0005.c.lose.title:0 "Vous l'effrayez d'autant plus..."
 agot_rebuilding_ruins.0006.t:0 "Des histoires de fantômes : Une nuit de repos"
 agot_rebuilding_ruins.0006.desc:0 "Une nuit au beau milieu de ces ruines s'est avérée être plus agréable que je ne l'aurais cru. Aucune horrible histoire n'aura su trouver son chemin jusqu'à mes songes.\n\nAu point du jour, une fraîche brise me fait émerger délicatement de la torpeur matinale, je me sens alors exalté[ROOT.Char.Custom('FR_E')] et vivifié[ROOT.Char.Custom('FR_E')]. Mes yeux se perdent sur la lisière aux environs, où de nombreux cerfs abondent. Il n'y a aucune trace de danger ici, et ma petite démonstration devrait le démontrer aux yeux de ma cour."
 agot_rebuilding_ruins.0006.a:0 "On va pouvoir tourner cette page."
 agot_rebuilding_ruins.0007.t:0 "Des histoires de fantômes : Une horrible nuit"
 agot_rebuilding_ruins.0007.desc:0 "#bold Maudites soit ces ruines !#! #italic Même si elles le sont sûrement déjà...#!\n\nQuel enfer fut cette nuit. Je n'ai cessé d'être tourmenté par des spectres venus envahir mes songes, de vils fléaux qui ont malmené mes tentatives pour m'endormir. Le temps s'étant invité de lui-même pour participer à cette mêlée où j'étais seul contre tous ; une tempête frappant et foudroyant les lieux par mille éclairs.\n\nAu matin, je ne reconnaissais point les hommes qui hier encore riaient aux histoires sordides de ces ruines. Les voilà maintenant terrorisés et exténués, alors que moi-même je peine à dissocier le vrai du faux..."
 agot_rebuilding_ruins.0007.a:0 "J'emmerde ces histoires ! J'emmerde ces putain de ruines !"
 agot_rebuilding_ruins.0008.t:0 "Des histoires de fantômes : Visions de la mort"
 agot_rebuilding_ruins.0008.desc:0 "#bold Maudites soit ces ruines !#! #italic Même si elles le sont sûrement déjà...#!\n\nJe n'ai cessé d'être harassé[ROOT.Char.Custom('FR_E')] par des cauchemars indescriptibles durant lesquels j'ai assisté au destin funeste des résidents d'autrefois. Des cris à vous glacer le sang lâchaient par des pleutres endiablés tentant de fuir. J'ai vu [ROOT.Char.GetFaith.DeathDeityName] venir sur nous et... #italic nul n'en a réchappé#!.\n\nL'horreur est si éprouvante qu'elle fini enfin par me faire surgir de mes songes en hurlant. L'aube n'est point encore là et j'erre tel un hère au clair de lune, tentant vainement d'apaiser mes troubles par quelques moyens que ce soit. C'est à ce moment-là que je le vois — #bold un vieil anneau sigillaire#!, posé sur le sol, comme ultime vestige d'une maison disparue."
 agot_rebuilding_ruins.0008.a:0 "La relique d'une maison au destin funeste."
 agot_rebuilding_ruins.0009.t:0 "La cache du forgeron"
 agot_rebuilding_ruins.0009.desc:0 "De nombreux mystères doivent probablement reposer dans les tréfonds de ces ruines, mais la nature ayant repris ses droits, la végétation fait office de rempart qu'il nous faut abattre.\n\nEt vaille que vaille, c'est ce que font les ouvriers, qui dans leurs efforts trouvent une cache de lingots d'acier, probablement dans ce qui devait être jadis une forge. Le temps passant n'aura pas réussi à amoindrir leur état."
 agot_rebuilding_ruins.0009.a:0 "Je peux sûrement en tirer un bon prix."
 agot_rebuilding_ruins.0009.a.tt:0 "Vous vendez les lingots d'acier."
 agot_rebuilding_ruins.0009.b:0 "Mon propre forgeron sera en faire bon usage."
 agot_rebuilding_ruins.0009.b.tt:0 "Votre forgeron tentera de vous forger une arme à partir des lingots d'acier trouvés dans les ruines."
 agot_rebuilding_ruins.0009.sword.title:0 "Épée forgée"
 agot_rebuilding_ruins.0009.mace.title:0 "Masse forgée"
 agot_rebuilding_ruins.0009.axe.title:0 "Hache forgée"
 agot_rebuilding_ruins.0009.spear.title:0 "Lance forgée"
 agot_rebuilding_ruins.0009.dagger.title:0 "Dague forgée"
 agot_rebuilding_ruins.0010.t:0 "Agir sans tarder"
 agot_rebuilding_ruins.0010.desc:0 "La reconstruction de telles ruines n'est pas ce qu'on pourrait appeler une sinécure. Des années de délabrement et de dégradations par les aléas du temps doivent être effacées par autant d'années de sueur et d'acharnement.\n\nAujourd'hui, alors que les ouvriers s'attellent à la tâche, une palette de brique est hissé vers le sommet du château. Je remarque alors qu'une des cordes est sur le point de lâcher, et [agot_rebuilding_ruin_block_head.Custom('FR_le_Char_Pi')][agot_rebuilding_ruin_block_head.GetTitledFirstName] se trouve juste en dessous, inconscient[agot_rebuilding_ruin_block_head.Custom('FR_E')] du danger qui plane sur sa tête — #italic ai-je assez de temps pour lui venir en aide ?#!"
 agot_rebuilding_ruins.0010.a:0 "Attention !"
 agot_rebuilding_ruins.0010.a.tt:0 "Vous tentez de [agot_rebuilding_ruin_block_head.Custom('FR_LeLa')] prévenir."
 agot_rebuilding_ruins.0010.b:0 "Je peux encore l'atteindre avant qu'il ne soit trop tard !"
 agot_rebuilding_ruins.0010.b.tt:0 "Ce n'est pas sans risque, mais [agot_rebuilding_ruin_block_head.GetFirstNameNoTooltip] vous en sera reconnaissant[agot_rebuilding_ruin_block_head.Custom('FR_E')]."
 agot_rebuilding_ruins.0011.t:0 "L'or ou la pierre"
 agot_rebuilding_ruins.0011.desc:0 "La pierre nécessaire à la reconstruction provient des quatre coins du pays, mais un des ouvriers me fait remarquer qu'il existe une source potentielle de pierre à proximité — bien qu'il ne s'agit là que d'une carrière de moindre taille qui s'épuisera en quelques années seulement."
 agot_rebuilding_ruins.0011.a:0 "Je fournirai les fonds pour cette petite carrière."
 agot_rebuilding_ruins.0011.b:0 "Je ferais un meilleur usage de mon or en le dépensant autrement."
 agot_rebuilding_ruins.0012.t:0 "Dans les détails"
 agot_rebuilding_ruins.0012.desc:0 "Les efforts de reconstruction vont bon train. Il y a tant de choses qui peuvent être améliorées ; des petits détails dans les plans de restauration, l'acheminement du matériel qui pourrait être procédé autrement, un meilleur usage de la main-d'œuvre qualifié. Les possibilités ne manquent pas, c'est le temps qui fait défaut, et c'est pourquoi je me retrouve parfois — #italic fréquemment#! — à veiller tard le soir, jusqu'à l'heure du loup, et plus encore.\n\nUne chose que les ouvriers n'auront pas manqué de remarquer, raison pour laquelle certains sont venus m'interpeller à ce sujet, inquiets à mon endroit."
 agot_rebuilding_ruins.0012.a:0 "Il y a encore fort à faire, alors retournez au travail !"
 agot_rebuilding_ruins.0012.a.tt:0 "Vous vous reposerez lorsque la reconstruction sera achevée."
 agot_rebuilding_ruins.0012.b:0 "Peut-être ont-ils raison…"
 agot_rebuilding_ruins.0012.b.tt:0 "Vous suivez les conseils et vous vous retirez de la supervision du projet."
 agot_rebuilding_ruins.0013.t:0 "L'ardoise de bronze"
 agot_rebuilding_ruins.0013.desc:0 "Lors de la reconstruction, des ouvriers ont trouvés une relique des plus intéressantes, probablement plus ancienne que les ruines elles-mêmes. Il s'agit d'une ardoise de bronze recouverte de runes des Premiers Hommes."
 agot_rebuilding_ruins.0013.a:0 "Je pourrais en tirer un bon prix."
 agot_rebuilding_ruins.0013.a.tt:0 "Vous vendez l'ardoise pour de l'or."
 agot_rebuilding_ruins.0013.b:0 "Peut-être pourrais-je parvenir à en déchiffrer le contenu ?"
 agot_rebuilding_ruins.0013.b.tt:0 "Vous êtes instruit[ROOT.Char.Custom('FR_E')] et plein[ROOT.Char.Custom('FR_E')] de ressources, vous devriez pouvoir découvrir la vérité."
 agot_rebuilding_ruins.0013.c:0 "Je vais avoir besoin de l'aide des mestres de la Citadelle."
 agot_rebuilding_ruins.0013.c.tt:0 "Vous payez un coursier pour qu'il apporte l'ardoise à la Citadelle."
 agot_rebuilding_ruins.0014.t:0 "Le Dieu du Bronze"
 agot_rebuilding_ruins.0014.desc:0 "En ayant pris comme référence l'armure et le blason de la Maison Royce, un mestre est parvenu à déchiffrer partiellement l'ardoise que j'avais envoyée à la Citadelle. Elle aurait servi à des prières rituelles adressés à un antique dieu des Premiers Hommes, remontant à une époque antérieur au pacte avec les enfants de la forêt. Il s'agirait du #bold Dieu du Bronze#!, une divinité lié à la guerre et aux mines.\n\nLe mestre écrit qu'il serait prêt à acheter l'ardoise de bronze pour une somme décente."
 agot_rebuilding_ruins.0014.a:0 "Je pourrais peut-être essayer ce rituel."
 agot_rebuilding_ruins.0014.a.tt:0 "Vous adressez des prières à un dieu mort depuis longtemps."
 agot_rebuilding_ruins.0014.b:0 "Tout or est la bienvenue."
 agot_rebuilding_ruins.0014.b.tt:0 "La Citadelle offrira une belle somme pour l'ardoise."
 agot_rebuilding_ruins.0015.t:0 "Prières au Dieu du Bronze"
 agot_rebuilding_ruins.0015.desc:0 "La nuit est au plus sombre lorsque j'effectue le rituel décrit par le mestre. Une fièvre zélée s'empare de moi durant les préparatifs, et je me surprends à être pleinement investi[ROOT.Char.Custom('FR_E')] dans ce qui n'était au départ qu'une expérience mue par la curiosité. En réalité, ce n'est plus ce sentiment trivial qui m'anime, mais la volonté d'être frappé[ROOT.Char.Custom('FR_E')] par une révélation, la quête d'une vérité plus profonde…"
 agot_rebuilding_ruins.0015.a:0 "Tout est limpide désormais, les Premiers Hommes étaient dans le vrai !"
 agot_rebuilding_ruins.0015.b:0 "#bold Non !#! Ce n'était qu'une simple expérience. Mieux vaut tout arrêter."
 agot_rebuilding_ruins.1001.t:0 "Les dents de la fange"
 agot_rebuilding_ruins.1001.desc:0 "L'environnement d'une place forte peut faire le bonheur de ses défenseurs, au moins autant, si ce n'est plus, que ses remparts et ses courtines. Les Eyrié et sa montagne escarpée, ou bien Vivesaigues et la présence de la Ruffurque et de la Culbute en sont en bon exemple.\n\nMais parfois il arrive que l'environnement favorable d'un jour puisse devenir le danger imprévisible d'un autre. Et c'est précisément le problème auquel je suis confronté ici, avec les ouvriers en charge de la restauration de Moat Cailin qui subissent les attaques fréquentes des lézards-lions vivant aux alentours."
 agot_rebuilding_ruins.1001.a:0 "Les pertes sont acceptables pour un projet de cette ampleur."
 agot_rebuilding_ruins.1001.b:0 "Engagez des hommes pour protéger le chantier."
 agot_rebuilding_ruins.1001.c:0 "Faites quérir des professionnels pour chasser ces démons des marais !"
 agot_rebuilding_ruins.1001.c.tt:0 "Les chasseurs reviennent avec un crâne de lézard-lion"
 agot_rebuilding_ruins.1001.d:0 "Faites en sorte qu'ils ne dévorent que les moins appliqués."
 agot_rebuilding_ruins.1001.e:0 "Il doit y avoir une raison pour que ces bêtes raffolent de la chair humaine…"
 agot_rebuilding_ruins.1002.t:0 "Un savoir enfoui"
 agot_rebuilding_ruins.1002.desc:0 "Tout comme Moat Cailin n'a pas toujours été une ruine, le Neck n'a pas toujours été un marécage poisseux et inhospitalier. Si c'est une quasi certitude que le cataclysme que l'on nomme le Marteau des Eaux fut à l'origine de la naissance de ces contrées, viviers des lézards-lions et des sanguinaires, et qui est attribué aux Enfants de la Forêt, l'endroit d'où ce Marteau aurait été invoqué est encore débattu.\n\nEt c'est précisément pour ça que je reçois aujourd'hui une visite venant tout droit de la Citadelle. Mon entreprise de restaurer Moat Cailin pourrait effacer de quelconques bribes d'informations, et Mestre [new_maester.GetFirstName] souhaiterait pouvoir accéder au chantier pour analyser les lieux avant qu'il ne soit trop tard.\n\n[new_maester.Custom('FR_IlElle')|U] ne cache pas que sa présence pourrait perturber les travaux, mais [new_maester.Custom('FR_IlElle')] insiste respectueusement pour que je lui accorde cette faveur."
 agot_rebuilding_ruins.1002.a:0 "Oui-da ! Mais je gage que vous partagerez votre savoir, n'est-ce pas ?"
 agot_rebuilding_ruins.1002.a.tt:0 "Vous recevrez un livre de la part de [new_maester.GetFirstNameNoTooltip]"
 agot_rebuilding_ruins.1002.b:0 "Tout se monnaye, même le savoir. Avez-vous quelque chose à offrir ?"
 agot_rebuilding_ruins.1002.c:0 "Le projet est trop important pour tolérer le moindre retard."
 agot_rebuilding_ruins.1002.d:0 "Pour tout vous dire, je suis moi-même féru[ROOT.Char.Custom('FR_E')] de savoir."
 agot_rebuilding_ruins.2000.t:0 "Les flammes d'Harren"
 agot_rebuilding_ruins.2000.desc:0 "Depuis quelques jours l'on me rapporte des cas de fièvres sur le chantier d'Harrenhal. Si je n'y ai vu qu'un mal isolé de prime abord, leur multiplicité et leur gravité grandissante ont fini par attirer mon attention.\n\nIl est désormais fait mention de douleur interne, à l'image d'un feu qui brûle de l'intérieur. « #italic Le même feu qui a emporté Harren le Noir#! » affirme de plus en plus d'ouvriers, la superstition endémique de cette forteresse amenant toujours, d'une façon ou d'une autre, les histoires de malédiction à revenir sur la table.\n\nSi je ne veux pas que la reconstruction subisse du retard, il va me falloir faire quelque chose pour les ouvriers, en mettant en lumière l'origine de cette obscurité soudaine par exemple, mais cela pourrait n'être qu'un gâchis de temps et d'efforts…"
 agot_rebuilding_ruins.2000.a:0 "Je dois trouver le fin mot de cette histoire."
 agot_rebuilding_ruins.2000.a.tt:0 "Vous allez choisir quelle méthode employer pour connaître la source de cette #italic malédiction#!"
 agot_rebuilding_ruins.2000.b:0 "Ce n'est qu'un mal passager, quelques jours de repos suffiront."
 agot_rebuilding_ruins.2000.b.tt:0 "Vous supposez — ou espérez — que cette histoire de malédiction n'est que le fruit de l'imagination d'âmes sensibles et que les choses s'arrangeront d'elles-mêmes"
 agot_rebuilding_ruins.2000.c:0 "Quel besoin de soigner un mal quand on peut remplacer les malades ?"
 agot_rebuilding_ruins.2000.c.tt:0 "Vous ne prêtez pas l'esgourde à ces histoires de malédiction, préférant considérer que le problème vient des ouvriers"
 agot_rebuilding_ruins.2000.d:0 "[physician.Custom('FR_le_Char_Pi')|U][physician.GetName] peut tout à fait s'occuper de ça."
 agot_rebuilding_ruins.2000.d.tt:0 "Vous vous reposez sur les compétences de [physician.GetFirstNameNoTooltip] pour résoudre le problème"
 agot_rebuilding_ruins.2000.e:0 "La bonne infusion de plantes pourrait les aider."
 agot_rebuilding_ruins.2001.t:0 "Lever le voile sur le mystère"
 agot_rebuilding_ruins.2001.desc:0 "Malédiction ou non, quelque chose plane sur ce château et perturbe sa restauration. Je dois découvrir ce dont il s'agit !"
 agot_rebuilding_ruins.2001.a:0 "Mais par où commencer ?"
 agot_rebuilding_ruins.2001.a.tt:0 "Puisque vous n'avez aucune idée d'où commencer les recherches, vous allez essayer de trouver le fin mot de cette histoire… à tâtons"
 agot_rebuilding_ruins.2001.b:0 "Ce genre de cas n'est pas anodin, je pense en connaître la cause."
 agot_rebuilding_ruins.2001.b.tt:0 "Vous vous fiez à votre expertise pour remonter la piste de cette « #italic malédiction#! »"
 agot_rebuilding_ruins.2001.c:0 "Il y a #bold toujours#! un responsable ! #bold Toujours !#!"
 agot_rebuilding_ruins.2001.c.tt:0 "Votre nature #italic cartésienne#! pourrait vous aider à y voir clair"
 agot_rebuilding_ruins.2001.d:0 "Je dois m'entretenir avec le contremaître."
 agot_rebuilding_ruins.2001.d.tt:0 "Votre expérience dans l'administration en tout genre pourrait vous aider à comprendre la raison du problème"
 agot_rebuilding_ruins.2001.success:0 "Vous découvrez la source du problème"
 agot_rebuilding_ruins.2001.failure:0 "Vous ne parvenez pas à découvrir la source du problème"
 agot_rebuilding_ruins.2002.t:0 "La fin du mystère"
 agot_rebuilding_ruins.2002.d:0 "Alors que le mot « malédiction » était sur toutes les lèvres, je découvre la véritable cause de tous ces maux. En lieu et place d'un spectre en colère, c'est à un cuisinier incompétent qu'il faut en attribuer la faute. La nourriture qu'il sert aux ouvriers étant périmée, il est logique que fleurisse un peu partout des intoxications alimentaires. Quant à ces histoires de « feu intérieur », ce n'était rien d'autre que des maux de ventre grandement exagérés par des ouvriers crédules.\n\nL'affaire désormais close, les travaux vont pouvoir reprendre de plus belle."
 agot_rebuilding_ruins.2002.a:0 "En espérant qu'il n'y ait plus aucun autre incident…"
 agot_rebuilding_ruins.2003.t:0 "Le mystère demeure"
 agot_rebuilding_ruins.2003.d:0 "Mes recherches n'ont rien donné !\n\nJe les entends se gausser de moi, #italic fichus spectres !#!\n\nSi je meurs avant de voir ce château restauré, je jure par tous les dieux dans tous les putains de cieux que je viendrais vous hanter tous !"
 agot_rebuilding_ruins.2003.a:0 "Cette forteresse finira par avoir ma peau !"
 agot_harrenhal_curse_gone:0 "Les spectres s'en sont allés"
 agot_harrenhal_curse_not_gone:0 "La fièvre ralentit considérablement le travail"
 agot_rebuilding_ruins.2200.t:0 "Le bûcher ravivé"
 agot_rebuilding_ruins.2200.desc_opening:0 "La pluie battante n'est pas décidée à s'arrêter, et les nuages plus noirs encore que la pierre d'Harrenhal s'amassent au-dessus de ma tête, et tout cela alors que je m'entretiens avec le contremaître.\n\nEn dépit du temps capricieux, j'avais bon espoir que les travaux avanceraient d'un pas décisif aujourd'hui, mais c'était sans compter"
 agot_rebuilding_ruins.2200.desc_zealous:0 "sur l'intervention [ROOT.Char.GetFaith.HighGodNamePossessive].\n\n"
 agot_rebuilding_ruins.2200.desc_not_zealous:0 "sur la #italic mauvaise fortune#! qui semble régulièrement frapper ce chantier.\n\n"
 agot_rebuilding_ruins.2200.desc_ending:0 "#italic Scraaaatch !#! Sans crier gare, la foudre s'abat sur la Tour du Bûcher-du-Roi avec une violence certaine — mais certainement moindre que celle de Balerion en son temps  — laquelle entraîne un incendie. Pourquoi de toutes les tours, il a fallu que ce soit celle-ci ? Maintenant les ouvriers sont en panique, mais c'est une peur qui trouve sa force moins dans la raison que la superstition qui les anime, et si je ne fais rien, elle va se diffuser dans l'ensemble du chantier…"
 agot_rebuilding_ruins.2200.a:0 "La foudre n'est pas l'apanage des malédictions, remettez-vous au travail !"
 agot_rebuilding_ruins.2200.success.tt:0 "Les ouvriers se ressaisissent et l'incendie est maîtrisé"
 agot_rebuilding_ruins.2200.success:0 "Vous persuadez les ouvriers de se calmer"
 agot_rebuilding_ruins.2200.failure.tt:0 "La panique entraîne une confusion, et l'incendie, difficilement maîtrisé, provoque des retards"
 agot_rebuilding_ruins.2200.failure:0 "Vous échouez à persuader les ouvriers de se calmer"
 agot_rebuilding_ruins.2200.b:0 "Trente coups de fouets à celui qui osera prononcer le mot « malédiction » !"
 agot_rebuilding_ruins.2200.b_success.tt:0 "Votre voix a plus de poids sur l'esprit des ouvriers que la malédiction elle-même"
 agot_rebuilding_ruins.2200.b_failure.tt:0 "Les ouvriers redoutent plus la malédiction que vos menaces"
 agot_rebuilding_ruins.2200.b.tt:0 "Vous prenez les devants pour prévenir tout débordement superstitieux"
 agot_rebuilding_ruins.2200.c:0 "Les malédictions ne sont pas ce que vous devriez craindre le plus..."
 agot_rebuilding_ruins.2200.c.tt:0 "Votre sinistre réputation parvient à faire de l'ombre à la malédiction d'Harrenhal"
 agot_rebuilding_ruins.2200.d:0 "Ces flammes… ces beautés dansantes et scintillantes…"
 agot_rebuilding_ruins.2200.d.tt:0 "Votre comportement étrange terrifie plus les ouvriers que n'importe quelle malédiction, ce qui les amène à rentrer dans le rang"
 agot_rebuilding_ruins.2300.t:0 "Les porteurs de fléaux"
 agot_rebuilding_ruins.2300.desc:0 "Le fracas constant des marteaux est une telle routine pour un projet aussi démentiellement long qu'il vaut mieux apprendre à s'en accommoder. Mais il y a une chose à laquelle je ne saurais m'accommoder : les cris d'effarements.\n\n« [ROOT.Char.Custom('FR_MonseigneurMadame')|U] ! » La voix du contremaître est aussi prompte que l'est son allure, mais avant qu'un seul propos ne sorte de sa bouche, je saisis l'ampleur de son urgence par la foultitude de silhouettes mouvantes dans son sillage. Les quelques mots qui composent le résumé de la situation m'apprennent que les ouvriers auraient réveillé des esprits lors des travaux, faisant s'abattre une armée de nuisibles rampants sur le château en guise de châtiment.\n\nSi je ne peux aller à la chasse aux spectres, je n'en dirais pas autant des rats !"
 agot_rebuilding_ruins.2300.a:0 "Qu'attendez-vous pour aller quérir des chasseurs de rats ?!"
 agot_rebuilding_ruins.2300.b:0 "Ce ne sont pas quelques rats qui vont m'effrayer !"
 agot_rebuilding_ruins.2300.b.tt:0 "Cela pourrait avoir de très graves conséquences. Qui sait de quel mal ces bêtes sont porteuses..."
 agot_rebuilding_ruins.2300.c:0 "[ROOT.Char.Custom('DogStoryName')] ! Au pied !"
 agot_rebuilding_ruins.2300.c_cat:0 "[ROOT.Char.Custom('CatStoryName')], le dîner est servi !"
 agot_rebuilding_ruins.2300.c.tt:0 "Vous envoyez votre animal de compagnie chasser les rats"
 agot_rebuilding_ruins.2300.d:0 "#EMP Brûlez-les tous !#!"
 agot_rebuilding_ruins.2300.d.tt:0 "Il n'y a aucun mal que le feu ne puisse purifier"
 agot_rebuilding_ruins.2400.t:0 "Un[bewitched.Custom('FR_E')] [bewitched.GetWomanMan] dans le besoin"
 agot_rebuilding_ruins.2400.desc:0 "Une fois n'est pas coutume, le flot incessant de tâches qui pleut sur le chantier d'Harrenhal a retenu mon attention, à tel point que le crépuscule recouvre déjà la forteresse. Les lieux maintenant vidés de tous ouvriers paraissent bien vides, et bien calmes, installant une ambiance pesante appuyée non seulement par la pluie battante, mais également par la rencontre étrange qui va suivre.\n\nUn[bewitched.Custom('FR_E')] [bewitched.GetWomanMan], véritablement ravissement pour les yeux, apparaît devant moi, et m'adresse un regard à la faveur d'yeux captivants qui, pourrait-on croire, cherchent à scruter au plus profond de mon être. Sa silhouette humblement vêtue fait incontestablement ressortir son collier apparent, qui contraste fortement avec le reste.\n\nC'est d'une voix suave, plus agréable à l'oreille que du miel sur la langue, qu'[bewitched.Custom('FR_IlElle')] se présente : [bewitched.GetFirstName], tout en demandant respectueusement à pouvoir s'abriter de la pluie pour la nuit."
 agot_rebuilding_ruins.2400.a:0 "Mon toit vous est offert pour la nuit, [Select_CString(bewitched.IsFemale,'gente dame','mon brave')]."
 agot_rebuilding_ruins.2400.a.tt:0 "Vous acceptez courtoisement d'héberger [bewitched.Custom('FR_LeLa')] pauvre vagabond[bewitched.Custom('FR_E')] pour la nuit"
 agot_rebuilding_ruins.2400.b:0 "Gardez-vous de croire que je tiens une auberge. Du balai !"
 agot_rebuilding_ruins.2400.b.tt:0 "Vous n'avez aucune envie d'accueillir [Select_CString(bewitched.IsFemale,'cette drôlesse','ce bougre')] dans le château"
 agot_rebuilding_ruins.2401.t:0 "Car la nuit est sombre..."
 agot_rebuilding_ruins.2401.desc_denied_witch:0 "Une obscurité a pénétré mon château… et mon esprit, car d'après ce que je viens d'apprendre, [bewitched.GetFirstName] résiderait en secret à Harrenhal, [bewitched.Custom('FR_CeluiCelle')]-là même que j'avais éconduit[bewitched.Custom('FR_E')] lors de cette nuit pluvieuse. Ainsi donc, [bewitched.Custom('FR_IlElle')] se serait jouée de moi et s'amuserait à errer dans les couloirs comme si c'étaient sa pleine propriété ?\n\nJe me lance dès lors dans des recherches, retournant la forteresse sens dessus dessous, depuis la Salle aux Cents Cheminés jusqu'à la Salle du Chasseur, mais en vain hélas. Pourtant, les heures qui s'écoulent n'effritent en rien ma détermination, tant et si bien que je me retrouve à traverser la Tour du Bûcher-du-Roi pour atteindre sa sœur, la Tour de la Veuve.\n\n"
 agot_rebuilding_ruins.2401.desc_restored_widow_tower:0 "Cette dernière a beau avoir bien meilleure allure depuis qu'elle a été restaurée, quelque chose d'inquiétant continue d'en émaner. Quelque chose au-delà de toute raison ou logique. Quelque chose provenant de cette femme ?\n\n"
 agot_rebuilding_ruins.2401.desc_not_restored_widow_tower:0 "Cette dernière a toujours dégagé quelque chose d'inquiétant, comme tout ce qui a trait à Harrenhal en fait, mais l'impression se fait plus oppressante encore, du fait de la présence de cette femme peut-être ?\n\n"
 agot_rebuilding_ruins.2401.desc_ending:0 "Et justement, je la trouve là, baignant dans le clair de lune, presque auréolée d'innocence à la faveur d'une douce lumière pâle. Mais soudain, la voilà sur moi, une dague en main dont la poignée scintille de concert avec la gemme de son collier…"
 agot_rebuilding_ruins.2401.a:0 "Arrière drôlesse !"
 agot_rebuilding_ruins.2402.t:0 "Un moment d'éveil"
 agot_rebuilding_ruins.2402.desc_welcomed_witch:0 "Je me réveille en sursaut, avec le poids d'un regard qui me dévisage alors que ma chambre est vide de toute présence hormis celle qui est la mienne.\n\nAlors que je m'extirpe du lit et de ma torpeur matinière, je réalise la présence d'une chose à côté de moi : [harrenhal_soul.GetName]. Je reconnais aisément le collier que portait [bewitched.GetFirstName]… mais que fait-il ici ?\n\nLa belle serait-elle entrée dans mes appartements à mon insu ? Est-[bewitched.Custom('FR_IlElle')] toujours présente au château ? Ces questions me rongent l'esprit autant que l'envie de me saisir de cette #italic beauté scintillante…#!"
 agot_rebuilding_ruins.2402.desc_denied_witch:0 "Je laisse échapper un cri, et après quelques instants de confusion, je comprends que les formes qui m'étaient étrangères sont en fait les murs de ma chambre. Je gis dans mon lit, le point du jour trouvant la voie jusqu'à mes paupières, tandis que je serais bien incapable de me remémorer les événements de la veille.\n\n#italic Ce n'était qu'un rêve…#! ou plus exactement #bold un cauchemar !#!\n\nCette pensée, simple mais rationnelle, m'aide à reprendre la pleine possession de mon esprit… jusqu'à ce que je découvre quelque chose dans mon lit : [harrenhal_soul.GetName]."
 agot_rebuilding_ruins.2402.a:0 "Il serait plus sage de ne rien dire à personne…"
 agot_rebuilding_ruins.2402.a.tt:0 "Cette histoire va vous laisser des séquelles, mais c'est préférable au fait que l'on vous prenne pour [Select_CString(THIS.Char.IsFemale,'une folle','un fou')]."
 agot_rebuilding_ruins.2402.a.tt_2:0 "Il n'y a aucune trace ni aucun signe de l'existence de [bewitched.GetFirstNameNoTooltip] à l'exception du collier…"
 agot_rebuilding_ruins.2402.b:0 "Je dois tout mettre en œuvre pour la retrouver !"
 agot_rebuilding_ruins.2402.b.tt:0 "Qu'importe si cela n'aboutit à rien, vous décidez de retourner le château dans tous les sens pour focaliser votre anxiété sur quelque chose, quitte à gêner les réparations du château"
 agot_rebuilding_ruins.2402.c:0 "Ce n'est pas le plus étrange des rêves que j'ai pu faire."
 agot_rebuilding_ruins.2402.d:0 "J'en appelle [ROOT.Char.GetFaith.HighGodName2] pour me garder de toute faiblesse !"
 agot_rebuilding_ruins.2500.t:0 "Un contremaître sans courage"
 agot_rebuilding_ruins.2500.desc:0 "La malédiction d'Harrenhal, qu'elle soit avérée ou non, est une plaie aux effets bien réels sur mon esprit — et ma patience. Le contremaître, grevé par toute la noirceur qui se dégage des lieux, a décidé de partir, préférant son salut à son salaire. Lui et moi savons pertinemment que je ne retrouverais pas si aisément quelqu'un d'autre pour travailler sur un lieu si mal famé, c'est pourquoi il a eu la courtoisie de me recommander deux remplaçants potentiels.\n\nL'un est sans expérience, mais pas sans bravoure, et devra être chaperonné sur ses débuts ; l'autre a l'expérience mais pas la bravoure, à moins d'y mettre le prix. En outre, un troisième est venu me voir, l'attitude aussi étrange qu'est modeste son prix, tout en restant évasif lorsque je l'interroge sur son expérience."
 agot_rebuilding_ruins.2500.a:0 "J'ai déjà bien assez investi comme ça dans ce maudit château !"
 agot_rebuilding_ruins.2500.a.tt:0 "Vous préférez dépenser du temps plutôt que de l'argent. Vous devrez encore choisir la manière d'aider le jeune contremaître à prendre ses aises sur le chantier"
 agot_rebuilding_ruins.2500.b:0 "Que s'achève ce maudit projet, qu'importe le coût !"
 agot_rebuilding_ruins.2500.b.tt:0 "Vous acceptez de payer une somme exorbitante pour vous assurer que tout se passera bien"
 agot_rebuilding_ruins.2500.c:0 "Je n'aime ni le risque de l'inexpérience, ni la sensation d'une bourse vide."
 agot_rebuilding_ruins.2500.c.tt:0 "Aussi mystérieux que puisse être ce troisième individu, il représente une alternative aux deux premiers"
 agot_rebuilding_ruins.2500.continue:0 "La restauration d'Harrenhal continue."
 agot_rebuilding_ruins.2500.foreman_flee:0 "Le « contremaître » disparait avec votre or."
 agot_rebuilding_ruins.2500.foreman_robbed:0 "Le chantier sera interrompu jusqu'à trouver un nouveau contremaître qui accepte de travailler à Harrenhal"
 agot_rebuilding_ruins.2501.t:0 "Le nouveau contremaître"
 agot_rebuilding_ruins.2501.desc:0 "J'ai certes choisi la méthode la moins onéreuse pour que la restauration d'Harrenhal se poursuive, mais puisque le temps c'est de l'argent, je vais devoir m'assurer de choisir la meilleure façon de procéder pour que ce jeunot sans expérience parvienne à reprendre le flambeau de mon ancien contremaître, sans quoi je risque de payer cela par une perte de temps… et donc d'argent.\n\nOr donc, qui est le plus qualifié pour le prendre sous son aile ?"
 agot_rebuilding_ruins.2501.a:0 "On n'est jamais mieux servi que par soi-même."
 agot_rebuilding_ruins.2501.a.success:0 "Vous gérez la situation d'une main de maître"
 agot_rebuilding_ruins.2501.a.failure:0 "Vous faites perdre plus de temps au chantier que vous ne lui en faites gagner"
 agot_rebuilding_ruins.2501.b:0 "Je sais comment aider les oisillons à prendre leur envol."
 agot_rebuilding_ruins.2501.c:0 "[steward.GetTitledFirstName], cette tâche vous est dévolu[steward.Custom('FR_E')]."
 agot_rebuilding_ruins.2501.c_success:0 "L'expertise [steward.Custom('FR_du_Char_Pi')][steward.GetTitledFirstNameNoTooltip] est d'un grand secours"
 agot_rebuilding_ruins.2501.c_failure:0 "[steward.Custom('FR_le_Char_Pi')|U][steward.GetTitledFirstNameNoTooltip] cause plus de problèmes qu'[steward.Custom('FR_IlElle')] n'en résout"
 agot_rebuilding_ruins.2501.d:0 "[architect.GetTitledFirstName], c'est pile dans vos cordes."
 agot_rebuilding_ruins.2501.d_failure:0 "[architect.Custom('FR_le_Char_Pi')|U][architect.GetTitledFirstNameNoTooltip] cause plus de problèmes qu'[architect.Custom('FR_IlElle')] n'en résout"
 agot_rebuilding_ruins.2600.t:0 "Des mots, des maux et encore des mots"
 agot_rebuilding_ruins.2600.desc:0 "Le malheur des uns fait le bonheur des autres, dit-on, et nombreux sont les bardes et ménestrels qui n'auraient d'autre choix que d'acquiescer. Eux qui aiment à chanter les faits, imaginaires ou bien fondés, eux qui aiment à romancer la vérité, transformant bain de sang et histoires d'épouvante en pièces sonnantes et trébuchantes.\n\nC'est l'un de ces infâmes corbeaux de noirceur qui est arrivé il y a peu à Harrenhal. Répondant au nom de [bard.GetFirstName], [bard.Custom('FR_IlElle')] cherche dans ce funeste lieu l'inspiration qui lui servira à remplir sa chope dans les tavernes et sa bourse dans les cours.\n\nDéjà bien assez tourmentés par leur propre superstition, il serait avisé d'épargner aux ouvriers plus de raisons encore de s'inquiéter. Mais préférant éviter toute agitation en ce lieu, sinon maudit, au moins sinistre, je ferais mieux de m'occuper de cela en usant de prudence."
 agot_rebuilding_ruins.2600.a:0 "Si l'or l'a conduit jusqu'ici, l'or pourra l'éconduire."
 agot_rebuilding_ruins.2600.a.tt:0 "[bard.Custom('FR_LeLa')|U] barde s'en va sans faire d'histoire"
 agot_rebuilding_ruins.2600.a.ttwo:0 "Le barde s'en va… et répand à travers le pays de bien vilaines chansons dont vous êtes l'objet d'inspiration"
 agot_rebuilding_ruins.2600.a.toast:0 "[bard.Custom('FR_LeLa')|U] barde se retire"
 agot_rebuilding_ruins.2600.b:0 "Je ne vais pas prendre de pincette pour un[bard.Custom('FR_E')] vulgaire vagabond[bard.Custom('FR_E')] !"
 agot_rebuilding_ruins.2600.b.tt:0 "L'un de vos [THIS.Char.Custom('KnightCulturePluralNoTooltipLowercase')] va se porter volontaire pour se saisir du barde aidé de quelques gardes"
 agot_rebuilding_ruins.2600.b.ttwo:0 "[bard.Custom('FR_LeLa')|U] barde est arrêté[bard.Custom('FR_E')] sans problème"
 agot_rebuilding_ruins.2600.b.tthree:0 "[bard.Custom('FR_LeLa')|U] barde est arrêté[bard.Custom('FR_E')], mais sa capture provoque quelques accidents sans grande gravité"
 agot_rebuilding_ruins.2600.b.tfour:0 "La tentative de capture se termine mal pour [bard.Custom('FR_LeLa')] barde, le [THIS.Char.Custom('KnightCultureNoTooltipLowercase')] et le chantier"
 agot_rebuilding_ruins.2600.b.toast:0 "L'arrestation se termine sans heurt."
 agot_rebuilding_ruins.2600.b.toast_two:0 "L'arrestation entraîne quelques blessés"
 agot_rebuilding_ruins.2600.b.toast_three:0 "L'arrestation provoque plus de mal que de bien"
 agot_rebuilding_ruins.2600.c:0 "Voyons qui de nous deux manie le mieux les mots."
 agot_rebuilding_ruins.2600.c_success:0 "[bard.GetFirstNameNoTooltip], blessé[bard.Custom('FR_E')] dans son orgueil, s'en va sans demander son reste"
 agot_rebuilding_ruins.2600.c_failure:0 "[bard.GetFirstNameNoTooltip], enhardi[bard.Custom('FR_E')] par sa victoire, se montre plus envahissant[bard.Custom('FR_E')] sur le chantier"
 agot_rebuilding_ruins.2600.d:0 "Les mots ne sont que du vent en comparaison de ce que peut cracher un dragon."
 agot_rebuilding_ruins.2600.d.tt:0 "Si [bard.GetFirstNameNoTooltip] n'est pas effrayé[bard.Custom('FR_E')] par l'ombre d'Harrenhal, [bard.Custom('FR_IlElle')] le sera par celle de [dragon.GetName]"
 agot_rebuilding_ruins.2700.t:0 "L'homme vert"
 agot_rebuilding_ruins.2700.desc:0 "Le vent rapporte de bien étranges murmures venant des ouvriers d'Harrenhal, à propos d'un esprit en colère. Et même si « étrange » reste tout à fait relatif pour ce château où le bizarre devient banal, cela prend un caractère bien plus singulier quand il est évoqué de l'or offert en tribut pour apaiser un #italic homme vert#! originaire de l'Île-aux-Faces qui aurait été aperçu dans le noir.\n\nCe sinistre lieu a grandement aiguisé ma capacité à supporter la superstition, pourtant, je reste dubitati[ROOT.Char.Custom('FR_FVe')] quant à cette histoire d'homme vert en quête de métal jaune, et comme il est de coutume avec cette maudite place-forte, la moindre histoire qui sort de l'ordinaire finit immanquablement par ralentir le chantier, la faute à des ouvriers qui finissent apeurés par le propre écho de leurs marteaux."
 agot_rebuilding_ruins.2700.a:0 "Je n'ai qu'à garder un œil sur l'endroit où l'or est déposé… et attendre."
 agot_rebuilding_ruins.2700.a.tt:0 "Si vous voulez prendre la main dans la bourse ce #italic collecteur de dons#! il faudra faire preuve de discrétion"
 agot_rebuilding_ruins.2700.a.toast:0 "L'homme vert se montre plus malin que vous"
 agot_rebuilding_ruins.2700.a.duel_win_tt:0 "Vous découvrez ce qui se cache derrière ce #italic collecteur de dons#!"
 agot_rebuilding_ruins.2700.a.duel_loss_tt:0 "Le fin mot de cette histoire vous échappe, comme le fait l'homme vert"
 agot_rebuilding_ruins.2700.b:0 "De telles pratiques ne sont pas coutumières des hommes verts."
 agot_rebuilding_ruins.2700.b_tt:0 "Votre connaissance des Anciens Dieux pourrait peut-être vous aider à convaincre les ouvriers que ce n'est qu'une supercherie"
 agot_rebuilding_ruins.2700.b_duel_win_tt:0 "Les ouvriers sont convaincus"
 agot_rebuilding_ruins.2700.b.toast_win:0 "Vous parvenez à vous montrer convaincant[THIS.Char.Custom('FR_E')]"
 agot_rebuilding_ruins.2700.b_duel_loss_tt:0 "Les ouvriers ne croient pas à toutes vos balivernes"
 agot_rebuilding_ruins.2700.b.toast_loss:0 "Personne n'a cure de ce que vous dites"
 agot_rebuilding_ruins.2700.b_tt_old_gods:0 "Votre connaissance des dieux vous rend crédible aux yeux des gens"
 agot_rebuilding_ruins.2700.d:0 "Quand il s'agit de traquer une proie, je n'ai pas mon pareil."
 agot_rebuilding_ruins.2700.d.tt:0 "Votre expérience dans le pistage pourrait s'avérer utile"
 agot_rebuilding_ruins.2700.e:0 "À malin, malin et demi."
 agot_rebuilding_ruins.2700.e.tt:0 "Étant vous-même adepte de la tromperie, vous savez comment raisonnent ceux de votre genre"
 agot_rebuilding_ruins.2700.f:0 "Je veux obtenir la bénédiction des Anciens Dieux !"
 agot_rebuilding_ruins.2700.f.tt:0 "Peut-être que ce modeste don pourrait vous offrir quelques faveurs divines"
 agot_rebuilding_ruins.2700.f.toast:0 "Les dieux de l'Île-aux-Faces restent sourds à vos prières."
 agot_rebuilding_ruins.2700.f.toasttwo:0 "Quelque chose a changé en vous. Les dieux vous auraient-ils entendus ?"
 agot_rebuilding_ruins.2701.t:0 "Le faux esprit"
 agot_rebuilding_ruins.2701.desc:0 "Ainsi donc voilà le fameux #italic homme vert#! !\n\nRépondant au nom de [green_man.GetFirstName], il n'est pas plus surnaturel que le serait n'importe quel fermier qui profiterait de la crédulité des gens. Quoique je lui reconnaisse un minimum d'effort pour s'être ainsi accoutré afin de rappeler les #italic véritables#! hommes verts : une tenue verte, une tête ornée de feuilles et des bois de cerf en guise de couvre chef.\n\nQuoi qu'il en soit, ne reste qu'à décider quoi faire de lui. Si je révèle sa supercherie, les ouvriers, rassérénés, retourneront au labeur… d'un autre côté, ils ont semble-t-il si bien pris à cœur cette histoire qu'ils ont manifestement eu la main bien lourde sur les tributs en or…"
 agot_rebuilding_ruins.2701.a:0 "Que cesse cette mascarade !"
 agot_rebuilding_ruins.2701.a.tt:0 "Les ouvriers pourront reprendre sereinement le travail"
 agot_rebuilding_ruins.2701.b:0 "Vous avez un talent certain… enseignez moi tout ce que vous savez."
 agot_rebuilding_ruins.2701.b.tt:0 "Vous laissez l'escroc continuer ses affaires en guise de paiement pour quelques leçons"
 agot_rebuilding_ruins.2701.c:0 "Tant d'or à collecter… et une seule personne pour en profiter..."
 agot_rebuilding_ruins.2701.c.tt:0 "Vous prenez la place de l'homme vert, et laissez les ouvriers continuer à faire des dons"
 agot_rebuilding_ruins.2800.t:0 "L'arbre des visions"
 agot_rebuilding_ruins.2800.desc_opening:0 "« Il faut abattre cette… #italic chose#!, [ROOT.Char.Custom('FR_MonseigneurMadame')] ! Qui sait ce qui nous observe à travers ces yeux ! »\n\nJusqu'à présent, le souci premier des ouvriers d'Harrenhal avait toujours été les spectres, mais aujourd'hui, c'est quelque chose de bien moins immatériel qui me vaut cette agitation. L'un[worker.Custom('FR_E')] des ouvri[worker.Custom('FR_ErEre')]s, [worker.GetFirstName], affirme que l'arbre-cœur de la forteresse est porteur d'un mal ancien, et qu'il serait plus judicieux de l'abattre."
 agot_rebuilding_ruins.2800.desc_weirwood:0 "\n\nComment une telle idée peut germer dans un esprit quand on sait qu'il y a déjà eu bien trop de barrals coupés au sud du Neck ?!"
 agot_rebuilding_ruins.2800.desc_no_weirwood:0 "\n\nSi cela ne tenait qu'à moi, je [worker.Custom('FR_LeLa')] laisserais faire, mais beaucoup d'ouvriers ici sont trop superstitieux pour qu'un tel acte reste sans conséquence."
 agot_rebuilding_ruins.2800.desc_weirwood_craven:0 "\n\nJe redoute qu'une telle chose se produise car ces yeux n'ont jamais cessé de me dévisager, et je crains de ce qui pourrait advenir si je venais à m'attirer les foudres de ce qui se tapit derrière."
 agot_rebuilding_ruins.2800.desc_closing:0 "« Il en est hors de question ! » Mon injonction s'abat sur [worker.GetFirstNameNoTooltip] avec la même force qu'il espère frapper l'écorce de cet arbre, ce qui ne suffit pourtant pas à lui faire revenir sur sa décision. Le ton monte, et avec lui, les esprits s'échauffent…"
 agot_rebuilding_ruins.2800.desc_closing_shy_craven:0 "« Il en est hors de question ! » C'est avec tout le courage que j'ai pu rassembler que je somme [worker.GetFirstNameNoTooltip] de revenir sur sa décision, ce qui ne suffit hélas pas. Le ton monte, et avec lui, ma crainte d'avoir à prendre une terrible décision…"
 agot_rebuilding_ruins.2800.a:0 "Puisque vous ne me laissez pas le choix..."
 agot_rebuilding_ruins.2800.a.tt:0 "Vous utilisez la force pour contraindre [worker.GetFirstNameNoTooltip] à obéir"
 agot_rebuilding_ruins.2800.b:0 "J'ai dit qu'il en était hors de question !"
 agot_rebuilding_ruins.2800.b.duel_win_tt:0 "[worker.GetFirstNameNoTooltip] rentre dans le rang"
 agot_rebuilding_ruins.2800.modifier:0 "Bien que les ouvriers retournent au travail, deux mois de retards sont à déplorer"
 agot_rebuilding_ruins.2800.b.duel_loss_tt:0 "[worker.GetFirstNameNoTooltip] refuse d'entendre raison et doit être dégagé[worker.Custom('FR_E')] par la force"
 agot_rebuilding_ruins.2800.c.tt:0 "La deuxième fois sera plus convaincante que la première"
 agot_rebuilding_ruins.2800.d:0 "Bonté divine, que quelqu'un fasse quelque chose !"
 agot_rebuilding_ruins.2800.d.tt:0 "Incapable de vous occuper de ça vous-même, vous vous abaissez à quémander de l'aide"
 agot_rebuilding_ruins.2800.e:0 "Soit, passez-moi cette hache. Je vais m'occuper du #italic problème…#!"
 agot_rebuilding_ruins.2800.e.tt:0 "En effet, vous vous occupez du problème… à savoir [worker.GetFirstNameNoTooltip]"
 agot_rebuilding_ruins.2800.a.win.title:0 "Le sang de [worker.GetFirstNameNoTooltip] se répand aux pieds de l'arbre-cœur"
 agot_rebuilding_ruins.2800.b.win.title:0 "[worker.GetFirstNameNoTooltip] se soumet à votre volonté"
 agot_rebuilding_ruins.2800.b.loss.title:0 "[worker.GetFirstNameNoTooltip] refuse d'entendre raison"
 agot_rebuilding_ruins.2800.d.win.title:0 "[worker.GetFirstNameNoTooltip] est arrêté[worker.Custom('FR_E')] juste à temps"
 agot_rebuilding_ruins.2800.d.win.desc:0 "L'intervention des autres ouvriers vous épargne le fait de risquer votre vie."
 agot_rebuilding_ruins.2800.e.win.title:0 "Le sang de [worker.GetFirstNameNoTooltip] se répand aux pieds de l'arbre-cœur"
 agot_rebuilding_ruins.2801.t:0 "Un cœur qui saigne"
 agot_rebuilding_ruins.2801.desc:0 "À la faveur d'un clair de lune, je reviens auprès du barral pour m'assurer que toute trace laissée par l'incident a été proprement nettoyée. Ce fut là une fâcheuse histoire, mais son issue est peut-être préférable ainsi, car qui sait jusqu'où cela aurait-il pu dégénérer…\n\nAlors que l'arbre dévisage mon être, et plus encore, mon âme, je ressens une impression étrange. Une vigueur qui n'était pas présente lors de ma dernière visite semble se dégager de l'écorce. Je ne saurais dire si c'est l'œuvre de spectres ou si je suis sous l'influence d'une quelconque sorcellerie, mais sous la clarté lunaire, la sève me paraît… plus #bold rouge#! qu'elle ne devrait l'être…"
 agot_rebuilding_ruins.2801.desc_old_gods:0 "Est-ce la voix des anciens dieux que j'entends dans le bruissement des feuilles ?"
 agot_rebuilding_ruins.2801.desc_craven:0 "#italic Je n'ai pas la force de résister.#!"
 agot_rebuilding_ruins.2801.desc_inquisitive:0 "#italic Je dois savoir !#!"
 agot_rebuilding_ruins.2801.desc_ending:0 "\n\nMes pas m'entraînent au plus près du visage sculpté dans l'écorce, sur lequel je pose ma main…"
 agot_rebuilding_ruins.2801.a:0 "Je vois quelque chose..."
 agot_rebuilding_ruins.2802.t:0 "Une aube nouvelle"
 agot_rebuilding_ruins.2802.desc:0 "#italic Des cieux en colère, une pluie incandescente s'abat sur la pierre. Les grandes dames fléchissent et se flétrissent alors qu'il ne reste que l'ombre et la fumée. L'aube se lève, et avec lui, les prémices d'une nouvelle ère. La terreur s'est abattue, et l'air s'en retrouve imprégné.#!\n\nLa vision fait peser sur moi le poids de l'incertitude, mais même dans des fragments de vérité morcelée, je peux déceler…"
 agot_rebuilding_ruins.2802.a:0 "…le pouvoir !"
 agot_rebuilding_ruins.2802.b:0 "...la mort !"
 agot_rebuilding_ruins.2802.c:0 "…un futur plein de promesses !"
 agot_rebuilding_ruins.2802.d:0 "…le Fléau de Valyria ?"
 agot_rebuilding_ruins.2802.e:0 "...la malédiction d'Harrenhal ?"
 agot_rebuilding_ruins.2804.t:0 "Un fléau assourdissant"
 agot_rebuilding_ruins.2804.desc:0 "#italic Une horde sans fin précédée par les cris stridents, laissant entendre leur langage inquiétant. Dans leur sillage, l'herbe jamais ne repousse, et de leurs lames sont changés en cadavres même les jeunes pousses. Leur longue chevelure baignant dans le vent, la mort guide leur vie, et le feu marque leur fin.#!\n\nLa vision fait peser sur moi le poids de l'incertitude, mais même dans des fragments de vérité morcelée, je peux déceler…"
 agot_rebuilding_ruins.2804.a:0 "…des lames meurtrières !"
 agot_rebuilding_ruins.2804.b:0 "...une force inarrêtable !"
 agot_rebuilding_ruins.2804.c:0 "...une charge furieuse !"
 agot_rebuilding_ruins.2804.d:0 "…une horde Dothraki ?"
 agot_rebuilding_ruins.2804.e:0 "...la Longue Nuit ?"