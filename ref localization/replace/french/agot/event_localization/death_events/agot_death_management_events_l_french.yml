l_french:
 death_management.killer.witnessed.enemy_dragon:0 "Personne ne pouvait faire face à la puissance de [battle_death_killer.GetFirstName]. Monté[battle_death_killer.Custom('DR_FR_E')] par [battle_death_killer_rider.Custom('FR_le_Char_Pi')][battle_death_killer_rider.GetTitledFirstName], c[battle_death_killer_rider.Custom('FR_EEtte')] derni[battle_death_killer_rider.Custom('FR_ErEre')] a taillé en pièces les lignes ennemis, et [dead_character.GetFirstNameNoTooltip] figure parmi les victimes."
 death_management.killer.witnessed.friendly_dragon:0 "Personne ne pouvait faire face à la terrible puissance de [battle_death_killer.GetFirstName]. Monté[battle_death_killer.Custom('DR_FR_E')] par [battle_death_killer_rider.Custom('FR_le_Char_Pi')][battle_death_killer_rider.GetTitledFirstName], c[battle_death_killer_rider.Custom('FR_EEtte')] derni[battle_death_killer_rider.Custom('FR_ErEre')] a taillé en pièces nos lignes, et [dead_character.GetFirstNameNoTooltip] figure parmi les tragiques victimes."
 death_management.killer.witnessed.your_killer_dragon:0 "Nul ne pouvait lutter face à la puissance de [battle_death_killer.GetFirstName] tandis que je sillonnais le champ de bataille à la tête de l'armée. Et subitement, je vis [dead_character.Custom('FR_le_Char_Pi')][dead_character.GetTitledFirstName], en face nous, prêt[dead_character.Custom('FR_E')] à rôtir dans les flammes."
 death_management.killer_dragon:0 "[dead_character.Custom('FR_IlElle')|U] fut l'une des nombreuses personnes à tomber devant [battle_death_killer.GetFirstName], le dragon [battle_death_killer_rider.Custom('FR_du_Char_Pi')][battle_death_killer_rider.GetTitledFirstName].#!"
 death_management.1200.a_dragon:0 "Je vais crever c[battle_death_killer_rider.Custom('FR_EEtte')] [battle_death_killer_rider.Custom('InsultNoun')] !"
 death_management.1201.a_dragon:0 "[battle_death_killer_rider.GetFirstNameNoTooltip] ne s’en tirera pas comme ça !"
 death_management.1202.b_dragon:0 "[battle_death_killer_rider.GetFirstNameNoTooltip] paiera pour ce qu’[battle_death_killer_rider.Custom('FR_IlElle')] a fait."
 death_management.1205.b_dragon:0 "[battle_death_killer_rider.GetFirstNameNoTooltip] va payer pour ce qu’[battle_death_killer_rider.Custom('FR_IlElle')] a fait !"
 death_management.1206.c_dragon:2 "Mon héros ! Je vais envoyer [ROOT.Char.GetCurrentLocation.Custom('get_region_flower_type')] à [battle_death_killer_rider.GetFirstNameNoTooltip] !"
 death_management.1207.b_dragon:0 "... mais [battle_death_killer_rider.GetFirstNameNoTooltip] non plus !"