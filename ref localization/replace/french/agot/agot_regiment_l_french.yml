 misty_shields:0 "Boucliers brumeux"
 sistermen_pirates:0 "Pirates des Soeurs"
 unicorn_riders:0 "Licorniers"
 pass_pikes:0 "Piques de la Passe"
 storm_knights:0 "Chevaliers de l'Orage"
 winged_knights:0 "Chevaliers ailés"
 sea_snakes:0 "Serpents de mer"
 wolfswood_hunters:0 "Chasseurs du Bois-aux-Loups"
 bronze_raiders:0 "Pilleurs de bronze"
 weeping_guard:0 "Garde Éplorée"
 myrish_crossbows:0 "Arbalétriers myriens"
 holy_guard:0 "Garde sacrée des prêtres à barbe"
 indentured_legion:0 "Légions serviles"
 cohort_of_the_three_thousand:0 "Cohorte des trois mille"
 stepstone_sailors:0 "Pirates des Degrés de Pierre"
 unsullied:0 "Immaculés"
 collared_bows:0 "Arcs à collier"
 iron_legion:0 "Légion de fer"
 arbor_marines_flavor:0 "Habitués à combattre à bord des navires de la flotte Redwyne, ces régiments légèrement blindés sont d'habiles tirailleurs."
 barrow_knights_flavor:0 "Bien qu'elle soit moins bien blindée que ses homologues du sud, la cavalerie lourde des Tertres peut venir à bout de toutes les formations, à l'exception de celles qui sont les plus disciplinées."
 royal_crossbowmen_flavor:0 "Les arbalètes nécessitent moins d'entraînement que les arcs traditionnels et peuvent en plus transpercer même les meilleures armures, permettant de neutraliser l'avantage de l'infanterie lourde et de la cavalerie."
 finger_scouts_flavor:0 "Bien que moins dévastatrice que les chevaliers bien plus lourdement armés, la vitesse de la cavalerie dactilienne la rend inestimable pour assurer la protection des formations lentes et pourchasser les ennemis en déroute."
 cape_watch_flavor:0 "Le Cap Kraken est depuis longtemps un champ de bataille entre les Fer-nés et les Hommes du Nord, et ses guerriers puisent dans les traditions martiales des deux factions."
 green_hand_flavor:0 "Dernier vestige d'un ancien ordre fondé par un roi du Bief, ces chevaliers du Nord font appel à la chevalerie et aux tactiques du Sud pour un effet dévastateur sur les formations d'infanterie."
 honeywine_quirrels_flavor:0 "Les arbalétriers du Bief sont bien adaptés pour contrer l'armure de plaque des chevaliers et de l'infanterie lourde, bien que leur équipement soit plus coûteux que celui des simples archers."
 hunters_of_the_moon_flavor:0 "Nécessitant un équipement peu coûteux, ces archers des Montagnes de la Lune constituent un contrepoids efficace à l'infanterie légèrement blindée."
 stolen_spears_flavor:0 "Pourvu d'un équipement plus primitif que les soldats des basses terres, les lanciers des clans des montagnes composent cela par une appétence extrême à embrocher les chevaux de leurs ennemis Andals qu'ils méprisent tant."
 clan_champions_flavor:0 "Peuple querelleur par nature, les clans des montagnes du Nord sont capables d'aligner de formidables régiments de combattants aguerris."
 winter_wolves_flavor:0 "Dans un pays où la neige épaisse persiste pendant des années, l'infanterie lourde l'emporte souvent sur la cavalerie, mais ces guerriers nordiens sont à l'aise sur n'importe quel champ de bataille."
 greenblood_oars_flavor:0 "Après s'être débrouillés pour gagner leur vie à bord de radeaux sur la Sang-Verte, ces guerriers gardent néanmoins de fiers souvenirs de leurs ancêtres Rhoynar."
 summer_knights_flavor:0 "La chevalerie du Bief est chose magnifique en temps de paix et chose terrifiante en temps de guerre."
 river_bows_flavor:0 "Les archers du Conflans sont une force légère et agile, capable de réagir aux conditions changeantes du champ de bataille et de punir les formations d'infanterie ennemies au moindre faux pas."
 sun_spears_flavor:0 "Les lances inflexibles de Dorne représentent un ennemi tenace et dangereux pour la cavalerie de tous genres, qu'elle soit légère, lourde ou même composée d'éléphants."
 sand_steeds_flavor:0 "Réputés pour leur beauté et leur grâce, les destriers dorniens sont parmi les plus rapides du monde, et leur endurance n'en est pas moins impressionnante. Au combat, la cavalerie légère dornienne n'a pas son pareil pour déborder et poursuivre les ennemis trop lents pour leur échapper."
 misty_shields_flavor:0 "Originaires des Îles Bouclier, ces régiments sont rompus aux combats contre les plus redoutables pillards Fer-nés et doivent être prêts à répondre à n'importe quelle excursion ennemie dans les plus brefs délais."
 sistermen_pirates_flavor:0 "Considérés comme ingérables, les pirates des Trois Sœurs constituent une force agile et contrariante sur le champ de bataille."
 unicorn_riders_flavor:0 "Bien que d'aucuns les considèrent comme de simples légendes, les licornes de Skagos sont aussi lestes que robustes, ce qui en fait des créatures grandement redoutées — en tout cas par ceux qui daignent croire en leur existence."
 pass_pikes_flavor:0 "Descendants des Dorniens qui ont tenu les cols de montagne contre les invasions des Targaryen pendant plus d'un siècle, ces guerriers se dressent fièrement contre toutes les formes de cavalerie."
 storm_knights_flavor:0 "Comme le tonnerre qui a donné son nom à leur patrie, les chevaliers des Terres de l'Orage font trembler la terre et les hommes lorsqu'ils chargent."
 winged_knights_flavor:0 "Berceau de la culture andale à Westeros, le Val est le foyer d'une tradition chevaleresque dont les racines remontent à des millénaires, et ses chevaliers ne craignent nullement les formations d'infanteries ennemies."
 sea_snakes_flavor:0 "Originaires des îles de la baie de la Néra et habitués au chaos des abordages navals, la rapidité et l'agressivité de ces régiments leur servent à la fois dans la poursuite et la retraite."
 wolfswood_hunters_flavor:0 "L'immensité du Bois-Aux-Loups abrite non seulement des animaux sauvages, mais aussi des hommes qui gagnent leur vie en les chassant. Sur le champ de bataille, ces hommes sont d'habiles archers."
 bronze_raiders_flavor:0 "Si la grande majorité des sauvageons ne se battent pas avec des armes en métal de leur propre fabrication, les pilleurs de bronze originaires de la vallée de Thenn sont l'exception. Leur armement impressionnant, couplé à la férocité naturelle de leur peuple, font de la seule infanterie lourde du nord du Mur, des guerriers grandement redoutés."
 sarsfield_horse_archers:0 "Archers de Sarschamp"
 sarsfield_horse_archers_flavor:0 "Cette troupe d'élite d'archers montés sert la Maison Sarschamp comme la personnification de son blason, s'élançant sans relâche là où leur seigneur les envoie."
 weeping_guard_flavor:0 "Les hommes libres de Lys considèrent les armes et armures comme indignes d'eux, c'est pourquoi la sécurité de la cité revient à la Garde Éplorée, des esclaves armés d'armes exotiques comme une infanterie lourde et qui ont jurés de protéger Lys la Belle."
 myrish_crossbows_flavor:0 "Si d'aucuns les considèrent comme des lâches à cause de leur utilisation d'arbalète, les Myriens ont pour eux l'avantage d'avoir des armes faciles à l'emploi et pourtant dévastateur au combat, ce qui leur permet de se montrer très persuasif face à leurs détracteurs."
 holy_guard_flavor:0 "Les soldats esclaves des prêtres à barbe sont un groupe de guerriers redoutables, formés dès leur jeunesse, qui mettent leurs grandes haches au service des prêtres et des magistrats de Norvos."
 indentured_legion_flavor:0 "Constitué d'esclaves dénués de toute inspiration ou motivation, les « légions » d'escarmoucheurs de Pentos, qui n'ont de légion que le nom, servent avec obéissance uniquement parce qu'elles n'ont d'autres choix que de le faire."
 cohort_of_the_three_thousand_flavor:0 "Lorsque Qohor fut menacé par les hordes venues de l'Est, ce ne furent ni les compagnies libres, ni les milices locales, ni même les alliés des cités libres qui les sauvèrent. Trois mille immaculés, voilà ce qui repoussa par dix-huit fois les seigneurs du cheval. Trois mille soldats esclaves venus d'Astapor qui mirent en déroute vingt cinq mille Dothrakis après trois jours de bataille. Et depuis lors, les Trois Mille protègent la cité."
 stepstone_sailors_flavor:0 "Les pirates des Degrés de Pierre sont une nuisance depuis l'époque de la Cassure et le resteront probablement jusqu'au retour de la Longue Nuit."
 unsullied_flavor:0 "Légions d'esclaves formées à Astapor, les Immaculés sont la tentative de la Cité Rouge de recréer les légions de Grazdan qui furent tant redoutées du temps du Vieil Empire. Ils s'entraînent de l'aube au crépuscule et sont rompus à l'art de combattre avec les trois lances, le braquemart et le bouclier. La formation est si rude que seul un garçon sur trois survit, mais l'événement connu sous le nom de la Bataille des Trois Mille atteste de leur incroyable prouesse au combat."
 collared_bows_flavor:0 "Si Yunkaï est plus connu pour ses esclaves concubins que pour ses esclaves soldats, il n'en demeure pas moins que certains sont formés pour protéger la Cité Jaune à l'aide d'arcs."
 iron_legion_flavor:0 "Si Astapor a choisi de recréer les légions ghiscaries d'antan à l'aide d'esclaves, la Nouvelle-Ghis, elle, leur préfère les affranchis. À l'image des légions de Grazdan, ce sont donc des hommes libres issus de la cité qui défendront celle-ci, garantissant ainsi une loyauté et une discipline qui va au-delà de l'obéissance aveugle à un maître."
 black_brothers:0 "Frères noirs"
 northern_spears:0 "Lances de ferrugiers"
 northern_spears_flavor:0 "Armées de lances faites en bois de ferrugiers, ces troupes nordiennes s'avèrent être un contre mortel aux chevaliers suderons."
 dornish_crossbows:0 "Vipères dorniennes"
 dornish_crossbows_flavor:0 "Armés d'arbalètes, ces Dorniens sont connus pour leur précision mortelle et leurs carreaux à pointe empoisonnée."
 vale_heavy_infantry:0 "Garde Sanglante"
 vale_heavy_infantry_flavor:0 "Connus pour protéger la Porte Sanglante, ces épéistes sont résolus à défendre le Val."
 crownlands_spears:0 "Lanciers du crépuscule"
 crownlands_spears_flavor:0 "Ces lanciers connaissent bien la Baie de la Néra et les terres adjacentes, et sont réputés pour combattre dans les villes."
 reach_light_cavalry:0 "Messagers équestres"
 reach_light_cavalry_flavor:0 "Rapides et légers, ces éclaireurs peuvent parcourir le Bief plus rapidement que n'importe quelle autre unité montée, que ce soit pour délivrer des messages ou harceler l'ennemi."
 riverlands_light_infantry:0 "Chalandiers"
 riverlands_light_infantry_flavor:0 "Parcourant le Trident et ses très nombreux affluents, ces mariniers fournissent à leurs seigneurs une force d'infanterie rapide et mobile."
 westerlands_knights:0 "Chevaliers aux lions"
 westerlands_knights_flavor:0 "Forts et robustes, les chevaliers des Terres de l'Ouest sont aussi féroces que des lions."
 stormlands_heavy_infantry:0 "Épois"
 stormlands_heavy_infantry_flavor:0 "Revêtus et armés d'acier laminé à froid, ces hommes arborent leurs heaumes ornés de bois de cerf afin que tous soient témoins de leur fureur."
 she_bears:0 "Ourses guerrières"
 battering_ram:0 "Bélier"
 battering_ram_flavor:0 "Un bélier pour abattre les portes et les murs de n'importe quel ennemi !"
 westerosi_sellswords:0 "Mercenaires ouestriens"
 westerosi_sellswords_flavor:0 "De nombreux chevaliers ouestriens trouvent leur compte au sein des compagnies libres d'Essos. Ils ne sont cependant pas aussi dévoués que ceux qui ont prêté serment aux seigneurs de Westeros, car la monnaie n'est jamais aussi solide qu'un serment."
 ornate_helms:0 "Heaumes ornés"
 ornate_helms_flavor:0 "Ornés des heaumes complexes de leur cité mère, les heaumes ornés sont une unité de piquiers célèbres pour combattre dans les Terres Disputées."
 she_bears_flavor:0 "Les femmes de l'Île-aux-Ours sont bien plus robustes et tenaces que leurs homologues continentaux, et elles sont tout à fait capable de fendre en deux le crâne d'un Fer-né."
 anti_dragon:0 "[anti_dragon_maa|E]"
 scorpions:0 "Scorpions"
 scorpions_flavor:0 "Une imposante arme similaire à une arbalète, capable de transpercer les armures les plus épaisses. Bien que surclassé dans la guerre traditionnelle, le scorpion possède un avantage inégalé : sa capacité à percer les écailles de dragon."
 dragons_flavor:0 "Les dragons sont l’arme la plus redoutable au monde, capables de réduire en cendres des armées entières. Ils sont l'incarnation même de la mort."
 frog_spears:0 "Tridents à grenouille"
 goldcloaks:0 "Manteaux d'or"
 goldcloaks_flavor:0 "Le guet de Port-Réal, ou plus simplement le Guet, mais plus communément nommé les manteaux d'or, est une force qu'il ne faut pas sous-estimer. Équipés de piques, masses d'armes, mailles noires ainsi que de gants, ils sont surtout reconnaissables à travers le pays grâce à leurs capes en laine teintes en or."
 sworn_brothers:0 "Frères jurés"
 sworn_brothers_flavor:0 "Bien que leur nombre ait diminué avec le temps, les frères jurés restent une force avec laquelle il faut compter, surtout face aux sauvageons au-delà du Mur."
 shadow_spears:0 "Lances ombreuses"
 shadow_spears_flavor:0 "Les hommes de Tour Ombreuse gardent depuis longtemps le Pont des Crânes, et la défense d'un tel goulot d'étranglement a amené à perfectionner l'usage de longues lances."
 eastwatch_sailors:0 "Marins du levant"
 eastwatch_sailors_flavor:0 "En tant que seul port de la Garde de Nuit, les frères de Fort-Levant sont des marins expérimentés, habitués à patrouiller la Mer Grelotte."
 sea_watch:0 "Guet des eaux"
 sea_watch_flavor:0 "Le guet des eaux du Trône de Fer est une unité navale dédiée à la protection de la Baie de la Néra et à la surveillance maritime de Port-Réal. Ils sont redoutés par les contrebandiers et n'ont pas la réputation de faire des prisonniers."
 redcloaks:0 "Manteaux rouges"
 redcloaks_flavor:0 "Réputé pour son efficacité et son entraînement, le guet de Port-Lannis, également connu comme les manteaux rouges, peut compter sur les richesses de la cité pour avoir le meilleur équipement et la meilleure formation qui soit."
 greycloaks:0 "Manteaux gris"
 greycloaks_flavor:0 "Le guet de Villevieille, plus communément nommé les manteaux gris, est le plus vieux guet de Westeros, en plus d'être réputé pour son professionnalisme et sa conduite exemplaire."
 cailin_archers:0 "Archers de Cailin"
 cailin_archers_flavor:0 "Moat Cailin sert de porte d'entrée vers le Nord, et grâce à sa position avantageuse au bout de la route du Neck et protégé par celui-ci, les archers peuvent facilement défendre le château contre tout ennemi, et ce même s'il est en ruine."
 frog_spears_flavor:0 "Chassant avec leur arme traditionnelle, le trident à grenouille, ces troupes légèrement armées constituent une menace pour tous ceux qu'ils prennent en chasse."
 black_brothers_flavor:0 ""
 dragons_regiment:0 "[dragons_plural|E]"
 giant_regiment:0 "Géants"
 giant_regiment_flavor:0 "D'aucuns les prennent pour des fables ou des contes, mais ces créatures gigantesques existent bel et bien et elles ont décidé de se battre pour une tribu au-delà du Mur."
 sun_guard:0 "Garde solaire"
 sun_guard_flavor:0 "Maintenant qu''Essaria, également appelée la Cité Libre Perdue, a été rebâtie et restaurée, les boucliers de sa garde ancestrale réfléchissent à nouveau l'éclat du soleil."
 moroshi_pikes:0 "Piques moroshi"
 moroshi_pikes_flavor:0 "Bien qu'elle soit souvent oubliée, probablement en partie du fait qu'il s'agit de la plus petite des cités libres, Lorath possède une puissante garde qui protège ses colonies à l'embouchure de la Sarne, notamment Morosh. Alors que certains choisissent l'or pour calmer les Dothrakis, Lorath, elle, choisit les lances et les piques."
 stair_guard:0 "Gardes des degrés"
 stair_guard_flavor:0 "Souvent dévaluée par la Garde Sacrée composée des prêtres à barbe, la garde de Norvos tire son nom de l'escalier qui relie la partie inférieure et supérieure de la cité, que les habitants appellent les Marches de la Pécheresse."
 disputant_scouts:0 "Éclaireurs hartalari"
 disputant_scouts_flavor:0 "Autrefois utilisé par les Possessions de Valyria pour y cultiver des céréales, la région aujourd'hui connue comme étant les Terres Disputées est devenue le foyer du peuple hartalari. Celui-ci s'est fait une spécialité de former une cavalerie vive et silencieuse, capable d'échapper sans mal aux grandes armées des Trois Filles que sont Myr, Lys et Tyrosh."
 slave_legion:0 "Légions d'esclaves"
 slave_legion_flavor:0 "Si les Possessions de Valyria purent exister, c'est sans conteste grâce à trois piliers fondamentaux : la magie du sang, le feu des dragons et la sueur des esclaves. Là où on ne trouvait ni dragonniers ni sanguimanciens, on trouvait des légions d'esclaves."
 tiger_cloaks:0 "Manteaux tigrés"
 tiger_cloaks_flavor:0 "La garde de Volantis et de ses tributaires que l'on nomme les manteaux tigrés sont des soldats esclaves dévoués à défendre la volonté des triarques, armés de lances acérées et vêtus de maille d'argent."
 black_wall_chariots:0 "Chars volantains"
 black_wall_chariots_flavor:0 "L'Ancien Sang de Volantis aimant se distinguer du reste de la cité, ils ont pour coutume d'afficher une gloire ostentatoire avec la course annuelle de chars qui a lieu au sommet des Murs Noirs et qui célèbre l'anniversaire de la fondation de la cité. L'événement sert non seulement de spectacle, mais aussi d'entraînement pour leurs redoutables engins de guerre."
 dragonsworn:0 "Champions du dragon-lige"
 dragonsworn_flavor:0 "Les tribus senrilliennes des Montagnes Peintes sont un peuple sauvage et redoutable, et les guerriers qui y naissent ne dérogent pas à la règle. Parmi les plus grands d'entre eux, il en est qui décident de devenir les champions de leurs dieux de chair et de feu, traquant et terrassant tous ceux qui oseraient porter atteinte à leurs maîtres ailés, armés d'imposantes épées."
 demon_guards:0 "Gardes-démons"
 demon_guards_flavor:0 "Le peuple de Mantarys est à l'image de sa terre, distordue et maudite, et leurs gardes mettent à contribution cette sinistre réputation en revêtant des masques à la fois grotesques et effrayants."
 elyrian_sailors:0 "Marins élyréens"
 elyrian_sailors_flavor:0 "Les marins d'Elyria sillonnent la Baie des Serfs et les eaux au-delà, transportant les esclaves qui y ont été entraînés jusqu'à Lys et Volantis, faisant ensuite le chemin inverse avec les esclaves de celles-ci qui seront à leur tour entraînés, répétant inexorablement le cycle encore et encore."
 tolosi_slingers:0 "Frondeurs tolosiens"
 tolosi_slingers_flavor:0 "Les frondeurs de Tolos sont célèbres à travers Essos pour leur précision mortelle. On les dit même capables d'abattre un dragon."
 pit_fighters:0 "Combattants des fosses"
 pit_fighters_flavor:0 "Les fosses de combat de Meereen sont réputées à travers l'entièreté des terres de l'Ancien Empire, et les guerriers qui en émergent sont tout aussi brutaux que vicieux."
 lockstep_legion:0 "Légions ghiscari"
 lockstep_legion_flavor:0 "Le Vieil Empire de Ghis fut bâti par Grazdan the Great et ses légions, dont la discipline aurait permis à Ghis de menacer Valyria et ses dragons durant de multiples guerres."
 star_carved:0 "Guerriers étoilés"
 star_carved_flavor:0 "Lorsque les Andals partaient à la guerre, ils brandissaient avec fierté le fer de leurs armes et les étoiles de leur foi, allant jusqu'à s'en graver sur le front pour signifier à tous leur fidélité envers les Sept qui ne font qu'Un."
 qarlons_fallen:0 "Déchus de Qarlon"
 qarlons_fallen_flavor:0 "Qarlon le Grand fut le dernier roi andal d'Essos et il mena son peuple à travers maintes guerres et campagnes au nord du continent. Aujourd'hui encore, son héritage se perpétue à travers les Andalosiens qui combattent selon ses rites et tactiques d'antan."
 mother_sworn:0 "Enfants liges"
 mother_sworn_flavor:0 "Ceux qui vivent sur la Rhoyne vivent #bold de#! la Rhoyne, et puisqu'ils dépendent de cet imposant fleuve, ils défendront leur « Mère » avec autant d'abnégation que l'épée lige protège son suzerain."
 festival_guards:0 "Gardes des fêtes"
 festival_guards_flavor:0 "Chroyane, que l'on connaît désormais comme Les Chagrins, était jadis réputée pour ses grands festivals qui se déroulaient tout au long de l'année et à travers toute la ville, à tel point qu'elle était surnommée : la Ville des Fêtes. Ses gardes étaient vêtus de manteaux d'acier étincelants et de grands heaumes."
 flower_spears:0 "Fleurons"
 flower_spears_flavor:0 "La ville pâle sur la rive est de la Rhoyne où l'on y trouvait maintes fleurs était gardée par une troupe qui avait taillé sa réputation sur ses éminentes armes d'hast, bien souvent ornées de fleurs."
 green_daggers:0 "Dagues vertes"
 green_daggers_flavor:0 "Ar Noy, située le long du Qhoyne, aux tours et murs faits de marbres verts, était protégée par ses marins qui patrouillaient le long du fleuve et du Lac de la Dague."
 garden_guard:0 "Gardes-haies"
 garden_guard_flavor:0 "Sarhoy, le grand port des Rhoynar qui se trouvait à l'embouchure du fleuve éponyme, était protégé par sa garde du jardin, qui tirait son nom des célèbres jardins d'eau salée de la ville."
 grey_spears:0 "Lances grises"
 grey_spears_flavor:0 "Ny Sar possède une longue histoire militaire, bien plus que les autres cités rhoynar. C'est le prince Garris le Gris qui chassa les Hommes Velus de la Noyne, et c'est de lui que la garde de la cité tire son nom."
 market_guard:0 "Gardes-serfs"
 market_guard_flavor:0 "Le commerce des esclaves a apporté la richesse aux cités ghiscaries, et plus encore à Hazdahn Mo, mais parce qu'il arrive que des tensions naissent entre les commerçants et qu'une révolte d'esclave n'est jamais loin, il est important de s'assurer que le marché soit surveillé par une garde spécialisée."
 skahazdahn_wardens:0 "Gardiens du Skahazadhan"
 skahazdahn_wardens_flavor:0 "Le Skahazadhan est le fleuve qui relie le cœur de Ghis à ses avant-postes plus éloignés dans les grandes plaines, d'où la nécessité d'en assurer la protection afin que les esclaves puissent arriver à bon port jusqu'à la baie."
 dothraki_screamers:0 "Hurleurs dothrakis"
 dothraki_screamers_flavor:0 "Les hurleurs Dothraki font peu de cas des « robes de métal ». Ils chevauchent avec la célérité du vent, hurlant à tout va pour briser leurs ennemis avant même qu'ils ne soient à portée de leurs redoutables arakhs."
 fiery_hand:0 "Mains ardentes"
 fiery_hand_flavor:0 "Les soldats esclaves de R'hllor dans les cités libres se consacrent à l'exécution de la volonté du Maître de la Lumière telle que dictée par le Grand Prêtre de Volantis."
 water_wizards:0 "Sorciers des eaux"
 water_wizards_flavor:0 "Si les Rhoynar sont célèbres pour le lien puissant qu'ils entretenaient avec le grand fleuve éponyme qu'ils vénéraient comme leur déesse Mère, cette adoration était exacerbée au sein des sorciers des eaux, qui invoquaient l'essence de la Mère elle-même pour terrasser leurs ennemis, qu'ils fussent de chair et de sang comme les humains ou d'écailles et de feu comme les dragons."
 chariot_cavalry:0 "[chariot_cavalry|E]"
 game_concept_chariot_cavalry:0 "Chars"
 game_concept_chariot_cavalry_desc:0 "[men_at_arms|E] d'unité de cavalerie robuste qui [Concept('counter','contrent')|E] la [heavy_cavalry|El] et l'[heavy_infantry|El], et qui sont contrés par les [spearmen|El] et les arbalétriers."
 chariot_cavalry_damage_add:0 "[damage|E] de [chariot_cavalry|El]"
 chariot_cavalry_damage_mult:0 "$chariot_cavalry_damage_add$"
 chariot_cavalry_toughness_add:0 "[toughness|E] de [chariot_cavalry|El]"
 chariot_cavalry_toughness_mult:0 "$chariot_cavalry_toughness_add$"
 chariot_cavalry_pursuit_add:0 "[pursuit|E] de [chariot_cavalry|El]"
 chariot_cavalry_pursuit_mult:0 "$chariot_cavalry_pursuit_add$"
 chariot_cavalry_screen_add:0 "[screen|E] de [chariot_cavalry|El]"
 chariot_cavalry_screen_mult:0 "$chariot_cavalry_screen_add$"
 chariot_cavalry_maintenance_mult:0 "Maintenant des [chariot_cavalry|El]"
 chariot_cavalry_recruitment_cost_mult:0 "Coût de recrutement des [chariot_cavalry|El]"
 chariot_cavalry_max_size_add:1 "Taille maximale des [regiments|El] de [chariot_cavalry|El]"
 goldenheart_bowmen:0 "Archers d'orcœurs"
 goldenheart_bowmen_flavor:0 "Aujourd'hui, pirates et esclavagistes redoutent les Îles d'Été pour deux raisons. La première : les nef-cygnes, des navires connus pour être parmi les plus rapides au monde ; la seconde : les arcs taillés dans le bois des orcœurs, des armes redoutées et réputées pour n'être surpassées que par les arcs faits d'os de dragon."
 ruby_spearwomen:0 "Vierges de rubis"
 ruby_spearwomen_flavor:0 "C'est dans les Os, cette grande chaîne de montagne qui sépare Essos en deux, que l'on trouve de redoutables vierges guerrières, aussi féroces qu'agiles. Leur réputation leur vient aussi bien de leur adresse à la lance que de leur apparence atypique — les joues décorées de rubis et la poitrine d'anneaux de fer."
 ironborn_reavers:0 "Ravageurs"
 ironborn_reavers_flavor:0 "Véritable fléau du littoral ouestrien, ces redoutables fantassins lourds représentent une menace qu'il n'est pas bon de sous-estimer pour tous ceux qui ont le malheur d'être moins armés qu'eux."
 marcher_longbowmen:0 "Archers à arc long des Marches"
 marcher_longbowmen_flavor:0 "Perpétuant la fière tradition des marches dorniennes, ces combattants manient de puissants arcs longs pour désorganiser les formations d'infanterie qui se déplacent lentement."
 nw_rangers:0 "Patrouilleurs"
 nw_rangers_flavor:0 "Principale force militaire de la Garde de Nuit, les patrouilleurs s'aventurent régulièrement au-delà du Mur et sont rompus au combat contre les sauvageons."
 nw_trackers:0 "Pisteurs"
 nw_trackers_flavor:0 "De temps à autre, des membres de la Garde de Nuit sont envoyés loin au-delà du Mur pour pister des cibles importantes ou recueillir des informations clés. Peu nombreuses, ces troupes sont parmi les rares à monter à cheval."
 wildling_cavalry:0 "Cavaliers du peuple libre"
 wildling_cavalry_flavor:0 "Bien que moins disposé à employer une cavalerie de combat que les agenouillés, les sauvageons n'en sont pas pour autant dénués, et la leur repose sur une petite race de chevaux robustes, capable de survivre autant au froid qu'à la rareté des pâturages."
 laamp_settler_maa:0 "Colons"
 laamp_settler_maa_flavor:0 "Non de véritables soldats, les colons sont plus un regroupement d'individus en quête d'un nouveau départ. Toute personne que l'on trouve dans une propriété et encline à voyager avec un [adventurer|El] sont autant de potentiels colons qui pourraient choisir de grossir ses rangs au sein de son #V Campement de colons#!."
 marsh_walkers:0 "Rôdeurs des marais"
 marsh_walkers_flavor:0 "Lorsque les Andals envahirent Westeros, leur incapacité à conquérir la Presqu'île de Claquepince fut en partie due au terrain difficile, mais aussi et surtout aux guerriers légèrement armés qui surent l'exploiter avec brio. Aujourd'hui encore, ces régiments perpétuent l'art de la guérilla."
 smiths_axes:0 "Haches du Ferrant"
 smiths_axes_flavor:0 "Nul ne sait si les Andals de la Hache ont choisi leur nom d'après l'arme, ou si le nom de l'arme a été choisi d'après leur lieu d'origine, mais quoi qu'il en soit, ces guerriers excellent à fendre leurs ennemis aussi facilement que des bûches."
 dothraki_archers:0 "Archers Dothraki"
 dothraki_archers_flavor:0 "L'arc étant considéré par les Dothraki comme l'une des trois seules armes valables, avec l'arakh et le fouet, les archers montés des khalasars sont craints, à raison, car nombre d'armées, de cités et de royaumes ont été défaits par les pluies incessantes de centaines de traits."
 shepherds:0 "Bergers"
 shepherds_flavor:0 "À l'image du Pâtre Suprême qui veille sur ses agnelets, ces hommes défendent ceux qui ne peuvent se protéger eux-mêmes."
 tribute_guards:0 "Garde Triborienne"
 tribute_guards_flavor:0 "La prospérité d'Omber repose grandement sur les tributs versés, notamment aux menaces extérieures, pour épargner au royaume des guerres dispendieuses, tant en or qu'en sang. Voilà pourquoi une garde a été spécifiquement formée pour garantir la sécurité de ces biens de grande valeur."
 caravan_guards:0 "Gardes de caravane"
 caravan_guards_flavor:0 "Traverser la Grande Mer Herbeuse n'est en rien une sinécure, pas même en longeant les lieux habités de la Sarne. Voilà pourquoi les caravanes qui se risquent à un tel périple doivent être escortées par d'habiles guerriers."
 cymmeri_iron_shirts:0 "Porte-Fer Cymmeri"
 cymmeri_iron_shirts_flavor:0 "L'habileté des Cymmeri à travailler le fer leur vaut d'être mieux protégés que bien des peuples nomades de la Grande Mer Herbeuse, notamment grâce au port de cottes de maille."
 gipp_wicker_shields:0 "Boucliers d'osiers"
 gipp_wicker_shields_flavor:0 "Dans la Grande Mer Herbeuse, la célérité fait bien souvent la différence, et même si l'absence de chevaux pourrait porter préjudice à ces guerriers, leur style de combat à l'aide de bouclier d'osier leur confère une agilité et une mouvance qu'il serait malvenu de mésestimer."
 zoqora_chariots:0 "Chars zogora"
 zoqora_chariots_flavor:0 "Les Zogora sont célèbres pour leurs chars de combat, qui filent à travers la Grande Mer Herbeuse pour faucher tous ceux qui se dressent sur leur chemin."
 lake_wardens:0 "Protecteurs du Lac"
 lake_wardens_flavor:0 "Les protecteurs du lac de Goraez Fen ont juré de protéger non seulement leur ville mais aussi le grand lac, l'un des derniers vestiges de la Mer d'Argent."
 library_guard:0 "Gardes-Plumes"
 library_guard_flavor:0 "Protecteurs dévoués, les Gardes-Plumes de Sallosh veillent de manière intransigeante à la protection du vaste et ancien puits de savoir de la cité."
 silver_shields:0 "Boucliers d'argent"
 silver_shields_flavor:0 "Nul n'ignore la réputation des boucliers d'argent de la Cité des Soldats, à qui l'on prête une discipline inébranlable et inimitable à travers tout Sarnor."
 clan_raiders:0 "Pillards des clans"
 clan_raiders_flavor:0 "Parce qu'ils eurent la mauvaise fortune de se trouver du mauvais côté de l'édifice de Brandon Stark, les hommes au-delà du Mur furent contraints à une vie de pillage pour espérer survivre dans des contrées où l'Homme n'avait nullement sa place."
 scythed_chariots:0 "Chars à faux"
 scythed_chariots_flavor:0 "Les Grands Hommes de Sarnor furent et sont encore les héritiers de nombreuses traditions ancestrales, telles que l'utilisation d'imposants et redoutables chars à faux pour faucher leurs ennemis et semer la terreur à travers la Grande Mer Herbeuse."
 shining_cataphracts:0 "Cataphractes étincelants"
 shining_cataphracts_flavor:0 "La fameuse cavalerie de Sathar, sur laquelle se réfléchit la peur de ses ennemis quand a sonné l'heure de la charge étincelante."
 coin_collectors:0 "Percepteurs"
 coin_collectors_flavor:0 "À Rathylar, l'argent est roi, et de fait, sa collecte est encadrée si rigoureusement que ceux chargés de percevoir les taxes sont armés et entraînés pour prévenir contre tous dangers."
 temple_guardians:0 "Gardiens des temples"
 temple_guardians_flavor:0 "Les gardiens des temples de Kyth font montre d'une ferveur sans commune mesure lorsqu'il s'agit d'accomplir leur devoir sacré de défendre les demeures de leurs dieux."
 hill_runners:0 "Coureurs des collines"
 hill_runners_flavor:0 "Nul n'est plus vigilant que les fameux coureurs des collines de Hornoth, lesquels veillent sur le domaine et les terres de la cité."
 firstborne:0 "Premiers-nés"
 firstborne_flavor:0 "À Sarys, c'est un grand honneur pour les aînés de servir la cité en se consacrant à sa protection."
 lastborne:0 "Derniers-nés"
 lastborne_flavor:0 "Dernière cité des Sarnore, Saath voit ses défenseurs se faire appeler les Derniers-nés, car ils sont les derniers à perpétuer un héritage ancestral."
 dragonguard:0 "Gardes dragons"
 dragonguard_flavor:0 "Les gardes dragons sont des hommes lourdement armés ayant prêté serment à la Maison Targaryen ainsi qu'aux autres seigneurs valyriens du Détroit."
 ar_archers:0 "Archers Ar"
 ar_archers_flavor:0 "Parce qu'ils sont pris en tenaille entre les Myriens et les Pentoshi, tant géographiquement que militairement parlant, et dans l'incapacité de rivaliser avec la production en masse d'arbalètes comme le fait Myr, les Nonteloshi privilégient une archerie d'exception."
 black_blood_cavalry:0 "Cavalerie du Sang Noir"
 black_blood_cavalry_flavor:0 "Une fois débarqués sur les terres vertes, les Fer-nés ne peuvent plus compter sur leurs fidèles boutres pour piller et ravir, c'est pourquoi ils délaissent les voiles au profit des sabots, faisant du cheval leur nouvelle embarcation."
 sons_of_gendel:0 "Fils de Gendel"
 sons_of_gendel_flavor:0 "Lorsque Gorne et Gendel tentèrent d'envahir le Nord en passant par les souterrains, beaucoup de leurs hommes ne parvinrent pas à retrouver la surface. Dans le noir profond des entrailles de la terre vit leurs descendants."
 fire_flingers:0 "Porte-flamme"
 fire_flingers_flavor:0 "La vie dans les Crocgivre est loin d'être une sinécure. La mort guette partout alentour, mais le feu est une arme diablement redoutable, car il fait bouclier contre le froid et sa lente agonie, tout en faisant également office d'épée contre l'autre mort : les spectres et ceux qu'ils servent."
 cannibal_bows:0 "Archers cannibales"
 cannibal_bows_flavor:0 "Les clans des rivières de glace sont craints même par les autres tribus sauvageonnes, pour leur pratique du cannibalisme d'une part, et pour leurs archers doués d'une précision mortelle d'autre part. Doublement mortelle même, car leur talent leur vaut de savoir tirer des traits si précis qu'ils parviennent à immobiliser leurs ennemis sans les tuer, pour ensuite pouvoir les capturer vivants."
 bat_catchers:0 "Chasse-souris"
 bat_catchers_flavor:0 "La tribu des Court-la-Nuit forme ses guerriers au plus jeune âge, lesquels doivent apprendre à attraper des chauves-souris à la tombée de la nuit. C'est cet entraînement atypique qui leur vaut leur virtuosité à se déplacer à pas feutrés et grandes enjambées, mais aussi le surnom que leur ont donné les autres tribus sauvageonnes."
 wildling_raiders:0 "Pillards sauvageons"
 wildling_raiders_flavor:0 "Parce que la vie au-delà du Mur est rude, les hommes doivent également le devenir. Plutôt que de s'acharner à produire ce dont ils ont besoin, ils préfèrent s'emparer de ce que les autres ont — qu'il s'agisse de nourritures, d'armes ou de femmes."
 ice_skatters:0 "Glisseurs sur glace"
 ice_skatters_flavor:0 "Loin au nord, par-delà la Forêt Hantée, les grands lacs gelés sont le théâtre de sanglants conflits, et ceux qui s'y affrontent portent, dit-on, des lames aux pieds, faites de métal ou d'os. Là où d'autres glissent sur la glace et chutent, eux, glissent et s'élancent avec la célérité du vent et la légèreté d'une plume."
 cairn_wardens:0 "Garde-cairns"
 cairn_wardens_flavor:0 "Si peu de choses parviennent à mettre d'accord les sauvageons au-delà du Mur, le respect commun qu'ils ont pour les cairns de leurs rois et héros dans la vallée de la Laiteuse en est indubitablement une. Quiconque déshonore les morts devra goûter au châtiment de leurs gardiens."
 bronze_cavalry:0 "Cavalerie de bronze"
 bronze_cavalry_flavor:0 "C'est à l'aide de sabots et de bronze que les Premiers Hommes ont conquis les Terres du Couchant, et ce qui a permis jadis cet exploit est voué à réaffirmer sa supériorité."
 civic_guard:0 "Garde Civique"
 civic_guard_flavor:0 "Jugée trop barbare par les Impollus, le cheval est dédaigné au profit d'une monture qu'ils qualifient de bien supérieure, raison pour laquelle la chamellerie qarthéenne contrôle et protège avec brio la Reine des Cités."
 pale_cavalry:0 "Pâles destriers"
 pale_cavalry_flavor:0 "Les Qaathi furent originaires des plaines du nord, et comme maints autres peuples de la région, ils avaient la réputation d'être des maîtres équins, plus particulièrement des chevaux à la robe sabino, qu'ils privilégiaient plus que tous autres."
 gate_sailors:0 "Marins des portes"
 gate_sailors_flavor:0 "Situé à l'intérieur des Portes de Jade, Qal a souvent été le bastion depuis lequel Qarth a maintenu et défendu son emprise sur celles-ci."
 port_guard:0 "Garde Portuaire"
 port_guard_flavor:0 "Les Ibbéniens ont la mer dans le sang, et de fait, nombre de lieux qui leur sont importants sont des ports, qu'ils soient gigantesques ou modestes. Voilà pourquoi les hommes qui composent la Garde Portuaire sont vus comme des soldats de profession à bien des égards."
 mountain_spears:0 "Lanciers des montagnes"
 mountain_spears_flavor:0 "Si les Ibbéniens ont la mer dans le sang, ceux qui s'en éloignent pour s'aventurer dans les profondeurs de leur île sont confrontés à des périples d'une autre nature que ceux que l'on trouve sur les flots. L'usage des lances est la réponse à ces nouveaux dangers."
 sar_wardens:0 "Gardiens Sar"
 sar_wardens_flavor:0 "Ib Sar s'est grandement développée depuis l'époque où elle n'était qu'une colonie pénitentiaire, mais les guerriers qui y sont formés en sont toujours les gardiens."
 patriarchal_guard:0 "Garde Patriarcale"
 patriarchal_guard_flavor:0 "Les patriarches sont les derniers à posséder le sang du Héros, et c'est à travers eux qu'il reparaîtra, raison pour laquelle la lignée se doit d'être assurée et protégée."
 bone_collectos:0 "Collecteurs des Os"
 bone_collectos_flavor:0 "Si les trois cités-bastions des Os sont constamment menacées, c'est au nord, sur la Route des Ossements, que les Kayakayanayans affrontent les plus terribles dangers, mais ils ne faillissent jamais ni ne faiblissent, au contraire, ils s'accaparent les os de leurs ennemis pour renforcer les remparts de leur cité."
 stone_shields:0 "Roches-Rondaches"
 stone_shields_flavor:0 "La vie dans les Os est rude, et ceux qui vivent sur la Route de la Pierre doivent faire face aux dangers venus aussi bien de l'est que de l'ouest, et ils le font armés d'imposants boucliers que nul ne peut fendre ni transpercer."
 sand_couriers:0 "Coursiers des sables"
 sand_couriers_flavor:0 "Le long de la grande Route du Sable, les Bayasabhadans sont le rempart qui sépare l'Outre-Orient du reste d'Essos, leurs coursiers bravant tous les dangers, qu'importe leur nature ou leur origine."
 asa_scouts:0 "Éclaireurs asa"
 asa_scouts_flavor:0 "C'est leur célérité et leur furtivité qui ont forgé la réputation des guerriers d'Abashad, en plus d'aisance à se déplacer aussi bien dans les terrains escarpés des montagnes que dans les profondeurs de la jungle."
 pearl_phoenixes:0 "Phénix de perle"
 pearl_phoenixes_flavor:0 "À l'image de la bête fabuleuse qui leur a donné son nom, ces guerriers flamboyants balaieront leurs ennemis, non par le feu mais par le fer."
 jade_dragons:0 "Dragons de jade"
 jade_dragons_flavor:0 "Aux ordres des Empereurs Vert Mer, les Feicui Ren régnaient sur la Mer de Jade et celles au-delà grâce à des navires dont on les disait protégés par des dragons de mer."
 tourmaline_tortoises:0 "Tortues de tourmaline"
 tourmaline_tortoises_flavor:0 "De par leur proximité avec les Contrées de l'Ombre, les Bixi Ren sont fréquemment menacés par divers dangers, desquels ils se protègent, à l'instar des bastions mobiles que sont les tortues, avec une carapace faite d'acier."
 onyx_crows:0 "Corbeaux d'onyx"
 onyx_crows_flavor:0 "La partie septentrionale de Yi Ti étant frontalière des plaines des Jogos N'hai, les Heinao Ren se doivent de défendre farouchement l'Empire Doré, ce qu'ils feront armés de leur bravoure — et aidés de leurs lances."
 topaz_tigers:0 "Tigres de topaze"
 topaz_tigers_flavor:0 "On peut trouver dans les profondeurs de la jungle bien des prédateurs. Le plus évident reste le tigre, armés de griffes effilé comme des rasoirs, mais il serait malavisé d'oublier les archers Haungyu Ren, un tout autre genre de tigre, non moins féroce et bien plus mortel."
 opal_cranes:0 "Grues d'opale"
 opal_cranes_flavor:0 "Dans les plaines centrales de Yi Ti, la célérité est un atout majeur, aussi bien sur un plan militaire qu'économique. Voilà pourquoi les Aobao Ren sont entraînés pour être avant tout d'agiles guerriers, se mouvant au sol avec la même grâce que les grues dans le ciel."
 depth_killers:0 "Tueurs des tréfonds"
 depth_killers_flavor:0 "Les Lengii sont passés maîtres dans l'art des embuscades et des frappes précises. Quiconque menace leurs terres, et plus encore l'Empire Doré, disparaîtra à jamais dans les profondeurs de la jungle, où nul ne retrouvera la moindre trace d'un corps."
 jade_sailors:0 "Marins de jade"
 jade_sailors_flavor:0 "La vie sur la Mer de Jade regorge d'opportunités. Pour les honnêtes gens, cela se traduit généralement par du commerce, pour les gredins, par du pillage. Voilà pourquoi les marins honnêtes sont si bien armés."
 poison_stings:0 "Dards de jade"
 poison_stings_flavor:0 "Même dans les coins les plus paradisiaques de la Mer de Jade, le danger n'est jamais bien loin. Bien souvent, l'insecte qui possède les plus beaux attraits possède aussi l'arme la plus mortelle."
 crescent_blades:0 "Lames du Croissant"
 crescent_blades_flavor:0 "Il n'y a nul endroit dans la Mer de Jade où des gardes ne seraient pas nécessaires, même sur Marahai, l'île-paradis. C'est d'ailleurs là-bas qu'on trouve les plus redoutables de tous, les Lames du Croissant, nommés aussi bien pour la forme de leur île natale que pour l'aspect incurvé de leurs armes."
 moraqi_elephants:0 "Éléphants moraques"
 moraqi_elephants_flavor:0 "Les éléphants de Moraq sont célèbres à travers le monde entier, offerts bien souvent en cadeau comme en tribut. Les plus grands et les plus puissants spécimens sont précieusement gardés sur le Grand-Moraq, pour y être élevés et employés à la guerre."
 shans_herd:0 "Harde du Shan"
 shans_herd_flavor:0 "Sur l'Île des Éléphants, depuis son palais d'ivoire, la protection du Shan est assurée par des éléphants, les plus grands et les plus féroces spécimens du monde connu."
 blue_eyes:0 "Prunelles d'azur"
 blue_eyes_flavor:0 "De tous les Vahari, ce sont ceux ayant les yeux bleus qui sont les plus redoutés, car d'entre tous, ce sont eux qui ont enduré le plus rude des entraînements."
 stone_ranchers:0 "Bergers des roches"
 stone_ranchers_flavor:0 "A l'image du berger qui protège son troupeau, les bergers des roches veillent sur la Bovine de Pierre et son troupeau, les habitants de Faros."
 ash_wardens:0 "Cendrés"
 ash_wardens_flavor:0 "Grande artère empoissonnée d'Asshaï, le Cendre est porteur de mort à bien des égards, et lorsque la menace prend la forme d'ennemis venus de l'Ombre qui remontent son cours, c'est aux Cendrés que revient la charge d'en pacifier ses noires eaux."
 shadow_raiders:0 "Pillards de l'Ombre"
 shadow_raiders_flavor:0 "La vie dans les Contrées de l'Ombre est une gageure et ceux qui s'y essaient n'ont d'autres choix que de vivre de pillage, non pour prospérer mais bien pour survivre."
 lions_of_night:0 "Lions de la Nuit"
 lions_of_night_flavor:0 "Lors de la Trahison du Sang, le Lion de la Nuit, pour prix de la félonie impériale, châtia les hommes en envoyant des hordes de démons déferler sur les royaumes humains dont les plus terribles eurent l'apparence de lions gigantesques. Voilà pourquoi les peuples qui vivent par-delà les Cinq Forts revêtent aujourd'hui des armures façonnées à leur image."
 vassals_in_yellow:0 "Inféodés du Jaune"
 vassals_in_yellow_flavor:0 "Même pour une région aussi atypique qu'au-delà des Cinq Forts, Carcosa fait figure d'étrangeté, toute empreinte de mystère qu'elle est. Ses habitants sont dédiés à leur Empereur Jaune, et de leurs piques dressées, ils sèment la terreur."
 dream_questors:0 "Guerriers oniriques"
 dream_questors_flavor:0 "Il est dit que dans la lointaine K'Dath, la grandeur et la folie se côtoient dans les royaumes faits de songes. Des hommes ont suivi les murmures occultes qui les ont façonnés en guerriers privés de toute peur."
 drainers:0 "Sanguinaires"
 drainers_flavor:0 "La sinistre réputation des Hommes Exsangue va bien au-delà des Cinq Forts. Ils sont craints dans le monde entier, et ceux qui se risquent à aller à leur rencontre finissent vidés de leur sang."
 waste_raiders:0 "Pillards du désert"
 waste_raiders_flavor:0 "Par delà les Cinq Forts, les vastes étendues de désert gris sont aussi lugubres que dangereuses. Il y a si peu pour survivre que tout ce qui est trouvé doit être pris, et ce même lorsque cela appartient déjà à quelqu'un d'autre."
 wind_demons:0 "Démons ailés"
 wind_demons_flavor:0 "On évoque les hommes qui vivent au-delà des Cinq Forts comme des êtres étranges et monstrueux, et il en va de même pour les Hommes Ailés. Les récits les concernant sont troublants, mais sans doute n'est-ce qu'une métaphore de leur célérité à dos de cheval… oui, sans doute."
 venom_bites:0 "Crocs vipérins"
 venom_bites_flavor:0 "Les Gryèches frappent avec vitesse et précision, et leur morsure, venimeuse, est aussi mortelle que le baiser d'un serpent."
 knights_of_the_dragon:0 "Chevaliers du Dragon"
 knights_of_the_dragon_flavor:0 "Ayant fait leur les coutumes ouestriennes, et plus précisément celles des Andals, les Valyriens adoubent désormais leurs plus valeureux et féroces guerriers. Si les dragons sont le feu fait chair, ces chevaliers sont la vaillance faite homme. Armurés de plates noires comme d'autres le sont d'écailles, leur ardente bravoure n'est pas moins à craindre que les flammes pleuvant des hauteurs du ciel."
 rain_bringers:0 "Porteurs de pluie"
 rain_bringers_flavor:0 "Si certains considèrent l'arbalète comme une arme déshonorante, les hommes des Terres de l'Ouest font peu de cas de ce genre de considérations, et n'ont aucun scrupule à s'en servir, que ce soit sur le champ de bataille ou autre part."
 purple_marines:0 "Marins pourpres"
 purple_marines_flavor:0 "Braavos est la seconde plus grande puissance militaire des cités libres, et cette puissance vient principalement de sa marine. Les voiles pourpres, obtenus par la teinture des escargots de la lagune, transportent les braaviens à travers les mers."
 shrikes:0 "Pies-Grièches"
 shrikes_flavor:0 "Lorsque la voie du Dieu Noyé est menacée par les hérétiques et les apostats, il est du devoir de ses fervents prêtres de prendre les armes, comme jadis la Pie-Grièche l'avait fait contre Harmund III."
 poorfellow_skirmishers:0 "Étoiles des Pauvres Compagnons"
 poorfellow_skirmishers_flavor:0 "Des hommes et des femmes qui ont dédié leur existence aux Pauvres Compagnons."
 warriors_sons_heavy_infantry:0 "Épées du Guerrier"
 warriors_sons_heavy_infantry_flavor:0 "Des chevaliers issus du noble et puissant ordre des Fils du Guerrier qui ont choisi de combattre au nom de leur foi en tant que fantassin."
 warriors_sons_heavy_cav:0 "Chevaliers du Guerrier"
 warriors_sons_heavy_cav_flavor:0 "Des chevaliers issus du noble et puissant ordre des Fils du Guerrier qui ont choisi de combattre au nom de leur foi à dos de cheval."
 grey_wolves:0 "Loups gris"
 grey_wolves_flavor:0 "Le château du Roi Garou désormais rebâti, maints grands guerriers sont venus des quatre vents pour marcher dans les traces de Gaven Loupgris et ainsi perpétuer l'héritage du Roi Garou."
 hammers_of_justice:0 "Marteaux de la Justice"
 hammers_of_justice_flavor:0 "Le château de Vieilles-Pierres désormais rebâti, de grands guerriers sont arrivés pour raviver la mémoire de Tristifer d'Alluve et ainsi perpétuer l'héritage du Roi du Conflans."
 morne_guardians:0 "Chevaliers parfaits"
 morne_guardians_flavor:0 "La reconstruction de Morne a amené moult guerriers à venir se réclamer de la grandeur de Ser Galladon et ainsi perpétuer l'héritage du Chevalier Parfait."
 dust_devils:0 "Diables des poussières"
 dust_devils_flavor:0 "La reconstruction de Castel-Denfert a incité d'innombrables combattants à venir perpétuer la mémoire de Lucifer l'Aride et de fait l'héritage du Roi du Soufre."
 head_collectors:0 "Collecteurs de têtes"
 head_collectors_flavor:0 "La reconstruction des Murmures a attiré maints guerriers venus perpétuer l’héritage de Clarence Crabbe, le tant redouté collecteur de tête et chevaucheur d’aurochs."
 cruel_chains:0 "Cruels"
 cruel_chains_flavor:0 "La restauration du château des Chenu a provoqué une arrivée massive de guerriers se revendiquant de l'héritage de Qhored Chenu, le roi autrefois connu comme « le Cruel »."
 bloody_blades:0 "Lames sanglantes"
 bloody_blades_flavor:0 "Fort-Sangue ayant retrouvé de sa superbe, nombreux sont les guerriers à s’attrouper pour porter l’héritage de celui qui fut connu comme « Brandon à la Lame Sanglante »."
 sharp_claws:0 "Griffes acérées"
 sharp_claws_flavor:0 "Le fier château des Reyne ayant été restauré, nombreux sont ceux qui viennent porter la mémoire de son seigneur d’autrefois et du funeste héritage de celui qui eut des griffes aussi longues et acérées que celles des Lannister : Lord Roger Reyne."
 ursulas_screams:0 "Criards d’Ursula"
 ursulas_screams_flavor:0 "Le donjon du triton restauré, les guerriers affluent de toutes parts pour perpétuer la mémoire d’Ursula Descarpe, l’Épouse du Triton."
 pirate_archers:0 "Gaillards"
 pirate_archers_flavor:0 "Guetteurs vigilants affectés aux structures navales éponymes, les gaillards usent de leurs arcs pour faire couler le premier sang."
 pirate_pikemen:0 "Lances-à-croche"
 pirate_pikemen_flavor:0 "Rien de tel que de longs crochets aiguisés pour s’accrocher aux navires ennemis — et éventuellement désarçonner les cavaliers une fois le pied posé à terre."
 pirate_skirmishers:0 "Coutelas noirs"
 pirate_skirmishers_flavor:0 "Armés de coutelas et vêtus de noir, ces pirates n’auront nul pitié à éventrer tous ceux qui se dresseront entre eux et leur butin."