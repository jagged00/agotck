 unknown_holding_concept_key:0 "[unknown_holding|E]"
 unknown_generic:0 "Vaste, c'est ainsi que l'on se représente le monde lorsque l'on scrute les cartes qui relatent l'existence de contrées si lointaines que l'on peine à croire en leur existence. Des lieux dont les noms ne sont plus que des échos une fois qu'ils atteignent les cours des seigneurs, et dont l'intérêt n'est alors plus que d'alimenter des rumeurs et de noircir des archives. Dès lors, nous n'avons pas à nous en préoccuper. Mille autres choses requièrent davantage notre attention que les distractions qui se trouvent par-delà les confins de nos frontières."
 wilderness_holding:0 "Contrées sauvages"
 wilderness_holding_concept_key:0 "[wilderness_holding|E]"
 wilderness_generic:0 "#italic Par monts et par vaux se trouvent d'innombrables contrées qui n'ont pas été revendiquées. Des steppes gelées aux jungles suffocantes, des immensités verdoyantes aux profondeurs forestières, il existe bien des lieux où l'Homme ne règne pas — ou plus — en maître. Qu'il s'agisse de grands royaumes où la civilisation a été balayée par la nature, ou si inhospitaliers qu'aucun souverain sain d'esprit n'a jamais entrepris d'y brandir sa bannière, ces régions recèlent mille et un dangers qui nourrissent aussi bien la crainte des voyageurs que les contes pour enfants.#!\n\n#weak Pour revendiquer un comté sauvage et commencer la colonisation, accédez à la vue de la propriété et choisissez\n« Coloniser ». Lorsque vous possédez une baronnie en cours de colonisation, vous pouvez améliorer le bâtiment principal pour commencer le développement.#!"
 settlement_holding:0 "Colonie"
