 nick_agot_historical_oakenfist:0 "Poingdechêne"
 nick_agot_historical_oakenfist_desc:0 "À l'aide de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] navire amiral, la « Reine Rhaenys », [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','s’est')] illustré[CHARACTER.Custom('FR_E')] durant la Guerre des Filles en coulant un dromon braavien, le « Grand Défi », avec une efficacité fracassante."
