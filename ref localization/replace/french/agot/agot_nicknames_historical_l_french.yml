 nick_agot_historical_ryvydrakio_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U], the first Rogare known to history, is credited with brokering the first deal between the city of Lys and the Freehold. The agreement granted Lys vast autonomy and tax breaks, and is widely regarded as the foundation of the Free City. Logaro was thereafter forever known as Rȳvȳdrakio – The Mediator."
