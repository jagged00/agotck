 nick_agot_historical_the_old_kraken_desc:0 "Roi des Îles de Fer, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] envahi les côtes ouest du Nord pour s’emparer de l’Île-aux-Ours et du Cap Kraken."
 nick_agot_historical_the_old_ox:0 "le Vieux Boeuf"
 nick_agot_historical_the_old_ox_desc:0 "Chevalier d’un âge aussi grand qu’est grande [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] renommée, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes revêtu d’une','revêt une')] armure d’un rouge sang tout en étant coiffé d’un heaume orné de cornes de taureau noires."
