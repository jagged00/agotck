 nick_agot_historical_the_lionslayer_desc:0 "Pour avoir infligé une blessure mortelle à Lord Jason Lannister lors de la Bataille de la Ruffurque, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] s'est vu[CHARACTER.Custom('FR_E')] surnommé[CHARACTER.Custom('FR_E')] « Longfeuille [CHARACTER.Custom('FR_LeLa')] Tueu[CHARACTER.Custom('FR_RSe')] de Lion »."
