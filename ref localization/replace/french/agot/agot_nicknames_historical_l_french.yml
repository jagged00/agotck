 nick_agot_historical_the_lion_king_desc:0 "Roi du Roc ayant acquis ce sobriquet dans une chronique volantaine contant le récit de la flotte dorée et de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] expédition à Valyria, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] disparu dans ce périple duquel n'est jamais revenu non plus la légendaire épée Rugissante."
