 nick_agot_historical_one_hand_desc:0 "Capturé[CHARACTER.Custom('FR_E')] au combat lors de la Première Guerre Dornienne, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] été dépossédé de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] main pour s'assurer qu'elle ne puisse plus jamais être levée contre Dorne."
