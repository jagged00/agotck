 nick_agot_historical_the_bard_Bael_1_desc:0 "Pillard de grand renom et chanteur émérite, si c'est par [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] maîtrise des armes que [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes parvenu','parvint')] à devenir Roi d’Au-delà du Mur, c'est [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] maîtrise de la langue qui [Select_CString(CHARACTER.IsLocalPlayer,'vous','lui')] fit gagner la plus belle rose des jardins de Winterfell."
