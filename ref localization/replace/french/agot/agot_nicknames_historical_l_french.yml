 nick_agot_historical_the_lord_lamprey:0 "Lord Lamproie"
 nick_agot_historical_the_lord_lamprey_desc:0 "Raillé par [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] propres sujets en raison de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] appétit vorace, il n'en demeure pas moins que derrière cette bedaine proéminente, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'cachez','cache')] un esprit des plus rusés."
