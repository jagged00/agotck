 nick_agot_historical_the_dim:0 "[CHARACTER.Custom('FR_LeLa')] Niais[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_dogshead:0 "la Truffe"
 nick_agot_historical_the_dour_dorden:0 "[CHARACTER.Custom('FR_LeLa')] Sévère"
 nick_agot_historical_the_dour_durran:0 "[CHARACTER.Custom('FR_LeLa')] Lugubre"
 nick_agot_historical_the_dour_durran_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] célèbre pour avoir tué Lun le Dernier, Roi des Géants, lors de la Bataille des Eaux-Crosses."
 nick_agot_historical_the_dragonbane:0 "la Perte des Dragons"
 nick_agot_historical_the_dragonbane_desc:0 "Pour avoir régné durant la mort du dernier dragon, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] connu[CHARACTER.Custom('FR_E')] en tant que « la Perte des Dragons »."
 nick_agot_historical_the_dragonknight_historic:0 "le Chevalier-Dragon"
 nick_agot_historical_the_dragonknight_historic_desc:0 "Pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] noblesse, [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] valeur et [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] démonstration claire de l'héritage Targaryen, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] connu[CHARACTER.Custom('FR_E')] en tant que « Chevalier-Dragon »."
 nick_agot_historical_the_dragonless:0 "[CHARACTER.Custom('FR_LeLa')] Sans-Dragon"
 nick_agot_historical_the_dragonless_desc:0 "Malgré la coutume de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] maison, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'n’avez','n’a')] ni apprivoisé ni fait éclore de dragon."
