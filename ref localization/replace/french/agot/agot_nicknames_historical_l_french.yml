 nick_agot_historical_maidensbane:0 "la Terreur des Vierges"
 nick_agot_historical_maidensbane_desc:0 "En tant que Grand Roi des Îles de Fer, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] pillé la Treille et ravisé toutes les femmes de moins de trente ans."
