 nick_agot_historical_of_red_lake:0 "du Lac Rouge"
 nick_agot_historical_of_red_lake_desc:0 "Fille du légendaire Garth Mainverte, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] élu domicile aux abords du Lac Rouge, où [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] descendants ont continué de vivre. Selon la légende, les femmes de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] lignée aurait la capacité de se transformer en héron."
 nick_agot_historical_of_sour_hill:0 "de Mont-Amer"
 nick_agot_historical_of_sour_hill_desc:0 "Chevalier au grand âge ayant vécu presque autant d'années que de batailles, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'restez','reste')] néanmoins plus leste et vif que des hommes moitié moins âgé que [Select_CString(CHARACTER.IsLocalPlayer,'vous','lui')]."
 nick_agot_historical_of_the_black_hood:0 "à la Coule Noire"
 nick_agot_historical_of_the_black_hood_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] perpétué la sombre réputation de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] père en tant que seigneur d'Harrenhal."
 nick_agot_historical_of_the_bloody_blade:0 "à la Lame Sanglante"
 nick_agot_historical_of_the_bloody_blade_desc:0 "[CHARACTER.LocalPlayerString('Votre épée', 'L’épée')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltipNoFormat')] aurait tant fait couler le sang des enfants de la forêt que le Lac Bleue serait par la suite devenue le Lac Rouge."
 nick_agot_historical_of_the_brown_shield:0 "au Bouclier Brun"
 nick_agot_historical_of_the_brown_shield_desc:0 "Chevalier errant de mauvaise réputation, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] connu pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] écu en amande, fait d'un bois sombre non peint et ceint de fer."
