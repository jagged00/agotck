 nick_agot_historical_the_pale_griffin_desc:0 "Chevalier de la Garde Royale et membre d’une maison au blason arborant un griffon, le choix [Select_CString(CHARACTER.IsLocalPlayer,'de votre','du')] surnom[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltip')] allait de soi."
 nick_agot_historical_the_pander:0 "le Pourvoyeur"
 nick_agot_historical_the_pander_desc:0 "On raconte que [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'auriez','aurait')] laissé Aegon l'Indigne coucher avec [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] femme et [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] fille — en même temps, selon certains."
