 nick_agot_historical_the_mummer_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] acquis une grande notoriété grâce à [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] maîtrise de l’épée, [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] expertise du bouclier, [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] rapidité, [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] vigueur ainsi que [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] sens aigu de l’observation."
