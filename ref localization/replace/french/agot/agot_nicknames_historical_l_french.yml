 nick_agot_historical_the_boarkiller_desc:0 "Fondateur de la Maison Crakehall, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] une figure légendaire de l'Âge des Héros."
