 nick_agot_historical_the_plowman_desc:0 "Fondateur de la Maison Moreland, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] une figure légendaire ayant vécu durant l'Âge des Héros."
