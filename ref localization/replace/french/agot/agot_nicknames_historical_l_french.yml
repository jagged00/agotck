 nick_agot_historical_the_clubfoot:0 "[Select_CString(CHARACTER.IsFemale,'Pied-Bot','le Pied-Bot')]"
 nick_agot_historical_the_clubfoot_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] né[CHARACTER.Custom('FR_E')] avec un pied tordu et déformé, une affliction qui [Select_CString(CHARACTER.IsLocalPlayer,'vous ','l’')]a tourmenté toute [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] vie."
 nick_agot_historical_the_collector:0 "[Select_CString(CHARACTER.IsFemale,'la Collectionneuse','le Collectionneur')]"
 nick_agot_historical_the_conciliator:0 "[CHARACTER.Custom('FR_LeLa')] Conciliat[CHARACTER.Custom('FR_EurRice')]"
 nick_agot_historical_the_conciliator_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] connu à travers tout le royaume et au-delà pour [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] actions diplomatiques et [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] qualités d'orateurs."
 nick_agot_historical_the_conqueror_Durrandon_47:0 "[CHARACTER.Custom('FR_LeLa')] Conquérant[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_conqueror_Targaryen_27:0 "[CHARACTER.Custom('FR_LeLa')] Conquérant[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_conqueror_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] conquis les Sept Couronnes par le feu et le sang, devenant ainsi une figure prédominante de l'Histoire."
 nick_agot_historical_the_corpsekiller:0 "Tue-les-Morts"
 nick_agot_historical_the_corpsekiller_desc:0 "Lors du siège d'Astapor, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] abattu Cleon, le Roi Boucher. Glorieux exploit s'il en est — à ceci près qu'il s'agissait non du roi mais de son cadavre en armure, attaché à un cheval."
