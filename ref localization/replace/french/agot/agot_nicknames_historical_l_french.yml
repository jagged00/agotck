 nick_agot_historical_the_knight_of_the_twilight_desc:0 "Otage au Donjon Rouge lors de la Conquête de Dorne, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] l'un des membres fondateurs des Fils de la Lance."
