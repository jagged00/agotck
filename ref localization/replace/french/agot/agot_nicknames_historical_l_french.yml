 nick_agot_historical_the_openhanded_Kingsguard_11:0 "le Munificent"
 nick_agot_historical_the_openhanded_Kingsguard_11_desc:0 "Chevalier disgracié de la Garde Royale, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] souillé la cape blanche par sa couardise."
