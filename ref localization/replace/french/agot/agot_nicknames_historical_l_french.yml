 nick_agot_historical_the_knight_of_the_fountains_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] un chevalier de grande réputation dans les tournois."
