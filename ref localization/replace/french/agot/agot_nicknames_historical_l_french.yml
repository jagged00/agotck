 nick_agot_historical_the_last_loren_desc:0 "Ultime Roi du Roc, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] ployé le genoux devant Aegon le Conquérant après avoir réchappé à la bataille du Champ de Feu."
 nick_agot_historical_the_last_reaver:0 "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')] Pillard[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_last_reaver_desc:0 "Souhaitant [Select_CString(CHARACTER.IsLocalPlayer,'vous emparer des','faire siennes les')] Mers du Crépuscule, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] harcelé les côtes des Terres de l'Ouest. [Select_CString(CHARACTER.IsLocalPlayer,'Votre','Sa')] défaite mit un terme aux razzias des fer-nés pendant de très longues années."
 nick_agot_historical_the_last_valyrian:0 "[CHARACTER.Custom('FR_LeLa')] Derni[CHARACTER.Custom('FR_ErEre')] Valyrie[CHARACTER.Custom('FR_NNne')]"
 nick_agot_historical_the_last_valyrian_desc:0 "Pillard[CHARACTER.Custom('FR_E')] de renom, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] issu[CHARACTER.Custom('FR_E')] d'une lignée de seigneurs pirates lysiens descendants des valyriens."
 nick_agot_historical_the_late_lord:0 "[CHARACTER.Custom('FR_LeLa')] Tardi[CHARACTER.Custom('FR_FVe')]"
 nick_agot_historical_the_late_lord_desc:0 "Lors de la Rébellion de Robert, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] arrivé à la Bataille du Trident lorsqu'elle fut déjà terminée."
 nick_agot_historical_the_latecomer:0 "[CHARACTER.Custom('FR_LeLa')] Tardi[CHARACTER.Custom('FR_FVe')]"
 nick_agot_historical_the_latecomer_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'meniez','menait')] des pillages le long de la Mander lorsque survint le trépas de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] père et que les états généraux de la royauté furent convoqués par [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] frères, bouffis d'ambition. Néanmoins, le trône échut à Urrathon Bonfrère, quatrième du nom, lequel [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','l’a')] fait renverser dès [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] retour, faisant [Select_CString(CHARACTER.IsLocalPlayer,'vôtre','sien')] son titre et même son nom."
