 nick_agot_historical_black_bear:0 "Ours Noir"
 nick_agot_historical_black_pearl:0 "Perle Noire"
 nick_agot_historical_blackbean:0 "Flageolet [CHARACTER.Custom('FR_LeLa')] Noir[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_blackbolt:0 "Foudre-Noire"
 nick_agot_historical_blackcrown:0 "Noircouronne"
 nick_agot_historical_blackfish:0 "le Silure"
 nick_agot_historical_blackfish_desc:0 "Traité[CHARACTER.Custom('FR_E')] de « mouton noir » par [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] frère, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] choisi d'épouser pleinement l'idée d'être considéré[CHARACTER.Custom('FR_E')] comme un[CHARACTER.Custom('FR_E')] marginal[CHARACTER.Custom('FR_E')] au sein de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] maison, en arborant l'emblème d'un poisson noir et en acceptant [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] surnom de « Silure », poisson caractérisé par son cannibalisme."
 nick_agot_historical_blackheart:0 "Cœurnoir"
 nick_agot_historical_blackheart_desc:0 "Nommé[CHARACTER.Custom('FR_E')] ainsi en raison du blason de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] maison, la réputation redoutable [CHARACTER.LocalPlayerString('qui vous précède', 'qui précède')][CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUINameNoTooltipNoFormat')] cache en fait [Select_CString(CHARACTER.IsFemale,'une femme','un homme')] au grand cœur."
 nick_agot_historical_blacklance:0 "Lance Noire"
 nick_agot_historical_blackshield:0 "Noirécu"
 nick_agot_historical_blacksword:0 "Noire-Épée"
 nick_agot_historical_blackthumb:0 "Poucenoir"
 nick_agot_historical_bleak:0 "Sombre"
 nick_agot_historical_bloodaxe:0 "Hache-de-Sang"
 nick_agot_historical_bloodbeard:0 "Barbesang"
 nick_agot_historical_bloodbeard_desc:0 "Connu[CHARACTER.Custom('FR_E')] pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] grande barbe aux moustaches rouges flamboyantes ainsi que [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] longues tresses, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'vous délectez','se délecte')] à l'idée de rougir davantage [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] pilosité."
 nick_agot_historical_bloodborn:0 "Sang-né[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_bloodless:0 "Pas-de-Sang"
 nick_agot_historical_bloodraven:0 "Freuxsanglant"
 nick_agot_historical_bloodraven_desc:0 "[Select_CString(CHARACTER.IsFemale,'Fille','Fils')] nature[CHARACTER.Custom('FR_LLle')] d'Aegon IV, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] né[CHARACTER.Custom('FR_E')] avec une tache de vin ayant la forme d'un corbeau et une peau d'un blanc laiteux."
 nick_agot_historical_bloody:0 "Sanglant[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_bluespur:0 "Éperon Bleu"
 nick_agot_historical_bluetooth:0 "la Dent Bleue"
 nick_agot_historical_bold_Roxton_45:0 "Le Hardi"
 nick_agot_historical_bonehand:0 "la Main d’Os"
 nick_agot_historical_bonesuckled:0 "Tète-les-Os"
 nick_agot_historical_books:0 "Bouquine"
 nick_agot_historical_brave_bentbow:0 "la Flèche Fougueuse"
 nick_agot_historical_breakbones:0 "Brise-Os"
 nick_agot_historical_breakbones_desc:0 "Doté[CHARACTER.Custom('FR_E')] d'une silhouette massive et d'un corps robuste, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] considéré[CHARACTER.Custom('FR_E')] comme [Select_CString(CHARACTER.IsFemale,'la femme','l’homme')] [CHARACTER.Custom('FR_LeLa')] plus fort[CHARACTER.Custom('FR_E')] des Sept Couronnes."
 nick_agot_historical_breakspear:0 "Briselance"
 nick_agot_historical_breakspear_desc:0 "À l'âge de dix-sept ans, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] renversé l'illustre Ser Daemon Feunoyr lors d'une joute, gagnant ainsi le surnom de Briselance."
 nick_agot_historical_breaksword:0 "[CHARACTER.Custom('FR_LeLa')] Briseu[CHARACTER.Custom('FR_RSe')] d'Épée"
 nick_agot_historical_brightflame:0 "Viveflamme"
 nick_agot_historical_brightflame_desc:0 "Connu pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] comportement éclectique, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'préférez','préfère')] être [Select_CString(CHARACTER.IsLocalPlayer,'nommés','nommé')] « Viveflamme »."
 nick_agot_historical_brightmane:0 "Crinière Éclatante"
 nick_agot_historical_brightrune:0 "Rune Éclatante"
 nick_agot_historical_brightsmile:0 "Éclatant-Sourire"
 nick_agot_historical_bronze:0 "Bronze"
 nick_agot_historical_bronze_axe:0 "Hache-de-Bronze"
 nick_agot_historical_bronze_bitch:0 "la Garce de Bronze"
 nick_agot_historical_bronze_bitch_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] été surnommé[CHARACTER.Custom('FR_E')] ainsi par [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] époux, Daemon, en référence dédaigneuse pour l'ancienne armure de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] maison."
 nick_agot_historical_brown_Castle_Black_18:0 "[Select_CString(CHARACTER.IsFemale,'La Brune','Le Brun')]"
 nick_agot_historical_brown_Plumm_5:0 "[Select_CString(CHARACTER.IsFemale,'La Brune','Le Brun')]"
 nick_agot_historical_browntooth:0 "Dent-Brune"
 nick_agot_historical_buckets:0 "Seaux"
 nick_agot_historical_buttercat:0 "Buttercat"
 nick_agot_historical_butterkitten:0 "Burreminet"
 nick_agot_historical_cleftjaw:0 "Gueule-en-Deux"
 nick_agot_historical_cleftjaw_desc:0 "Porteu[CHARACTER.Custom('FR_RSe')] d'une affreuse cicatrice, [CHARACTER.LocalPlayerString('votre bouche', 'la bouche')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltipNoFormat')] a presque été coupée en deux suite à un violent coup de hache."
 nick_agot_historical_clubfoot:0 "[Select_CString(CHARACTER.IsFemale,'Pied-Bot','le Pied-Bot')]"
 nick_agot_historical_clubfoot_desc:0 "[CHARACTER.Custom('FR_le_Char_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] né[CHARACTER.Custom('FR_E')] avec un pied tordu et déformé, une affliction qui [Select_CString(CHARACTER.IsLocalPlayer, Select_CString(CHARACTER.IsFemale, 'vous', 'la'), 'le')]  tourmentera jusqu'à [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] dernier souffle."
 nick_agot_historical_coldwind:0 "Heurtebise"
 nick_agot_historical_cornburner:0 "Brûlemaïs"
 nick_agot_historical_corpse:0 "Cadavre"
 nick_agot_historical_cotter:0 "Cotter"
 nick_agot_historical_crabfeeder:0 "[CHARACTER.Custom('FR_LeLa')] Gaveu[CHARACTER.Custom('FR_RSe')]-de-Crabes"
 nick_agot_historical_crabfeeder_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] connu pour abandonner [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] prisonniers sur les estrans des Degrés de Pierre, laissant les #italic autochtones#! se repaître de leur chair."
 nick_agot_historical_crowfood:0 "Freuxchère"
 nick_agot_historical_crowfood_desc:0 "S'étant fait arracher un œil à cause d'un corbeau qui [Select_CString(CHARACTER.IsLocalPlayer, Select_CString(CHARACTER.IsFemale, 'vous', 'la'), 'le')] croyait mort[CHARACTER.Custom('FR_E')], [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] lui [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] rendu la pareille en lui arrachant la tête."
 nick_agot_historical_crowkiller:0 "Freux-Buteur"
 nick_agot_historical_crowkiller_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] acquis une infâme notoriété pour avoir trucidé moult corbeaux — frères noirs — de la Garde de Nuit."
 nick_agot_historical_crows_eye:0 "l’Œil-de-Choucas"
 nick_agot_historical_crows_eye_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'portez','porte')] un bandeau en cuir noir sur [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] œil gauche, pour cacher ce que d'aucuns pensent être un orbe brillant d'une malicieuse noirceur."
 nick_agot_historical_dame_of_andalos:0 "la Dame d’Andalos"
 nick_agot_historical_damphair:0 "Tifs-Trempes"
 nick_agot_historical_damphair_desc:0 "Après avoir miraculeusement survécu à une tempête, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] décidé de consacrer [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] vie au Dieu Noyé, gardant [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] cheveux trempés depuis lors."
 nick_agot_historical_dance_for_me:0 "Danse-pour-Moi"
 nick_agot_historical_darkrobin:0 "[CHARACTER.Custom('FR_LeLa')] Sombre"
 nick_agot_historical_darkstar:0 "Sombre Astre"
 nick_agot_historical_darkstar_desc:0 "Les gens [Select_CString(CHARACTER.IsLocalPlayer,'vous ','l’')]appellent « Sombre Astre » en raison de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] nature très... nocturne."
 nick_agot_historical_dashing_prefix:0 "[CHARACTER.Custom('FR_LeLa')] Fringant[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_deaf:0 "[Select_CString(CHARACTER.IsFemale,'la Sourde','le Sourd')]"
 nick_agot_historical_dim:0 "Sombre"
 nick_agot_historical_dolorous:0 "la Douleur"
 nick_agot_historical_dour_prefix:0 "[CHARACTER.Custom('FR_LeLa')] Lugubre"
 nick_agot_historical_dread_prefix:0 "La Terreur"
 nick_agot_historical_drunken_giant:0 "le Géant Ivre"
 nick_agot_historical_dryhorn:0 "Dryhorn"
 nick_agot_historical_dusteye:0 "Larmes-de-Poussière"
 nick_agot_historical_evenstar:0 "Étoile-du-Soir"
 nick_agot_historical_ever_sweet:0 "Tout-Sucre"
 nick_agot_historical_ever_sweet_desc:0 "La légende raconte que [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'aimiez','aimait')] tant le miel [Select_CString(CHARACTER.IsLocalPlayer, Select_CString(CHARACTER.IsFemale, 'que vous', 'qu’elle'), 'qu’il')] [Select_CString(CHARACTER.IsLocalPlayer,'auriez','aurait')] conclu un pacte avec le Roi des Abeilles pour prendre soin de [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] enfants, et des enfants de [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] enfants, à jamais."
 nick_agot_historical_fair_Manwoody_57:0 "[Select_CString(CHARACTER.IsFemale,'La Belle','Le Beau')]"
 nick_agot_historical_fair_Frey_13:0 "[Select_CString(CHARACTER.IsFemale,'La Belle','Le Beau')]"
 nick_agot_historical_fairhands:0 "Belles-Mains"
 nick_agot_historical_falconhelm:0 "Heaume de Faucon"
 nick_agot_historical_fat_Stark_hh_7:0 "[Select_CString(CHARACTER.IsFemale,'Grosse','Gros')]"
 nick_agot_historical_fat_Frey_52:0 "[Select_CString(CHARACTER.IsFemale,'La Grosse','Le Gros')]"
 nick_agot_historical_fat_Arryn_hh_7:0 "[Select_CString(CHARACTER.IsFemale,'Grosse','Gros')]"
 nick_agot_historical_fighting_fool:0 "[Select_CString(CHARACTER.IsFemale,'la Folle des Batailles','le Fou des Batailles')]"
 nick_agot_historical_fireball:0 "Boulenfeu"
 nick_agot_historical_fireball_desc:0 "Nommé[CHARACTER.Custom('FR_E')] ainsi en raison de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] chevelure d'un roux flamboyant ainsi que pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] tempérament intrépide, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] considéré[CHARACTER.Custom('FR_E')] comme l'une des plus fines lames de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] époque."
 nick_agot_historical_first_goose:0 "Première Plume"
 nick_agot_historical_first_goose_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] l'aîné[CHARACTER.Custom('FR_E')] d'une fratrie de triplés."
 nick_agot_historical_fist_of_the_gods:0 "le Poing des Dieux"
 nick_agot_historical_flatnose:0 "Nez plat"
 nick_agot_historical_fletcher:0 "Fléchier"
 nick_agot_historical_four_groats:0 "Quatre-Liards"
 nick_agot_historical_fourskins:0 "Quatrepeaux"
 nick_agot_historical_fourskins_desc:0 "Change-peau de grand talent, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] revêtu la peau de quatre bêtes."
 nick_agot_historical_foxglove:0 "Digitale"
 nick_agot_historical_frostfinger:0 "Froidoigt"
 nick_agot_historical_frostfinger_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] perdu deux doigts à cause du froid alors [Select_CString(CHARACTER.IsLocalPlayer, Select_CString(CHARACTER.IsFemale, 'que vous étiez', 'qu’elle était'), 'qu’il était')] détenu dans une cage de glace."
 nick_agot_historical_gatehouse:0 "Corps-de-Garde"
 nick_agot_historical_gatehouse_desc:0 "On dit [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] que [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] herse est toujours ouverte aux chevaliers de passage."
 nick_agot_historical_giantsbane:0 "Fléau-d'Ogres"
 nick_agot_historical_giantsbane_desc:0 "Il est dit que [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'auriez','aurait')] tué un ogre, #italic un géant en d'autres termes#! — selon [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] version, [Select_CString(CHARACTER.IsLocalPlayer,'vous auriez','il aurait')] ouvert le ventre de la géante pour se tenir au chaud, après quoi [Select_CString(CHARACTER.IsLocalPlayer,'vous','le')] prenant pour son rejeton, elle  [Select_CString(CHARACTER.IsLocalPlayer,'vous aurez','l’aurait')] allaité durant trois mois à son réveil."
 nick_agot_historical_ginger:0 "[CHARACTER.Custom('FR_LeLa')] Rouquin[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_godsgrief:0 "Dieux-Deuil"
 nick_agot_historical_godsgrief_desc:0 "Pour avoir conquis le cœur de la magnifique Elenei, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] déchaîné la fureur de ses parents, le Dieu des Mers et la Déesse des Vents, lesquels ont balayé [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] demeure par six fois en représailles aux épousailles. Lorsque fut érigé le septième château, celui-ci résista, apportant l'Accalmie dans les Terres de l'Orage."
