 nick_agot_historical_the_cunning_Durrandon_51:0 "le Rusé"
 nick_agot_historical_the_cunning_Hoare_25:0 "le Madré"
 nick_agot_historical_the_cunning_Hoare_25_desc:0 "Avide et habile stratège, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] minutieusement évité la guerre au profit du commerce, convaincu que l’attaque était synonyme de faiblesse. [Select_CString(CHARACTER.IsLocalPlayer,'Vous avez','Il a')] ainsi préféré engrosser la flotte fer-née et les réserves d’armes, ce qui facilita grandement la conquête du Conflans par [Select_CString(CHARACTER.IsLocalPlayer,'votre fils après votre','son fils après sa')] mort."
 nick_agot_historical_the_curt:0 "[CHARACTER.Custom('FR_LeLa')] Brusque"
 nick_agot_historical_the_daring:0 "[CHARACTER.Custom('FR_LeLa')] Hardi[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_daring_daeron:0 "[CHARACTER.Custom('FR_LeLa')] Hardi[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_daring_daeron_desc:0 "Pour avoir sauvé l'armée de Lord Ormund Hightower avec [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] dragon Tessarion à seulement treize ans, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] reçu le surnom « le Hardi »."
 nick_agot_historical_the_darling_of_the_vale:0 "les Délices du Val"
 nick_agot_historical_the_darling_of_the_vale_desc:0 "En plus de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] extrême courtoisie, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] un jouteur de grand renom, au physique avenant et fort galant."
 nick_agot_historical_the_daughter_of_the_dusk:0 "la Fille du Crépuscule"
 nick_agot_historical_the_daughterless:0 "le Sans-Fille"
 nick_agot_historical_the_daughterless_desc:0 "[CHARACTER.LocalPlayerString('Votre fille', 'La fille')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltipNoFormat')] a été enlevé par le Roi d'au-delà du Mur Baël le Barde, avant de rentrer chez elle, presque un an plus tard, enceinte d'un bâtard."
 nick_agot_historical_the_defiant_argrave:0 "le Belliqueux"
 nick_agot_historical_the_defiant_argrave_desc:0 "Chevalier de Nonnains au service de Lord Beurpuits, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] souvent décrit comme un homme particulièrement rétif et rude."
 nick_agot_historical_the_defiant_daena:0 "[Select_CString(CHARACTER.IsFemale,'la Rebelle','le Belliqueux')]"
 nick_agot_historical_the_defiant_daena_desc:0 "Continuellement obstiné[CHARACTER.Custom('FR_E')], [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] connue pour avoir défié les tentatives continues de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] frère Baelor de [Select_CString(CHARACTER.IsLocalPlayer,'vous ','l’')]emprisonner."
 nick_agot_historical_the_delayer:0 "[CHARACTER.Custom('FR_LeLa')] Tardi[CHARACTER.Custom('FR_FVe')]"
 nick_agot_historical_the_delayer_desc:0 "Ne souhaitant pas combattre la Foi Militante, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] fermé les portes de Villevieille afin de garder le Septon Lune et ses fidèles hors les murs."
