 nick_agot_historical_the_oldfather_Drumm_14_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] célèbre pour avoir engendré pas moins d’une centaine de rejetons."
 nick_agot_historical_the_one_after_the_fat_one:0 "Celui qui vint après le Gros"
 nick_agot_historical_the_one_after_the_fat_one_desc:0 "Ce Grand Septon n'est connu que pour l'énormité de son prédécesseur."
 nick_agot_historical_the_onion_knight:0 "le Chevalier Oignon"
 nick_agot_historical_the_onion_knight_desc:0 "Lors du siège d'Accalmie, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] réussi à [Select_CString(CHARACTER.IsLocalPlayer,'vous','se')] faufiler à travers le blocus maritime, apportant oignons et poissons salés à la garnison affamée. En récompense de quoi, [Select_CString(CHARACTER.IsLocalPlayer, Select_CString(CHARACTER.IsFemale, 'vous', 'elle'), 'il')] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] obtenu un titre de noblesse et perdu quelques phalanges."
