 nick_agot_historical_redhand_urron:0 "Mainrouge"
 nick_agot_historical_redhand_urron_desc:0 "Accompagné[CHARACTER.Custom('FR_E')] de [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] redoutables guerriers armés de hache, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] dévalé la Colline de Nagga et [Select_CString(CHARACTER.IsLocalPlayer,'massacrez','massacré')] tous [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] rivaux lors des états généraux de la royauté, mettant ainsi fin à l'ancienne tradition."
 nick_agot_historical_redraven:0 "Choucas Rouge"
 nick_agot_historical_redraven_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] ainsi nommé[CHARACTER.Custom('FR_E')] en raison de [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] cheveux roux distinctifs — et accessoirement parce que les bardes avaient besoin d'une bonne musicalité avec « chocotter », pour écrire quelques balades moquant [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] lâcheté."
