 nick_agot_historical_the_kinslayer_desc:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Vous','Se')] présentant comme le Roi de la Montagne et du Val, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] jeté [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] frère à travers la porte de la lune après que les seigneurs du Val aient exigé la libération de leur seigneur suzerain légitime."
