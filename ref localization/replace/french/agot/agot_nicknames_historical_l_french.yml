 nick_agot_historical_the_penniless_desc:0 "Chevalier nanti d’un esprit pragmatique mais dépourvu du moindre sou, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'maniez','manie')] une lame usée et [Select_CString(CHARACTER.IsLocalPlayer,'chevauchez','chevauche')] un canasson à l’estomac aussi rempli que [Select_CString(CHARACTER.IsLocalPlayer,'votre bourse','l’est la bourse de son cavalier')]."
