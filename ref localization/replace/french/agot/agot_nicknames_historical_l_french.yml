 nick_agot_historical_the_old_king:0 "le Vieux Roi"
 nick_agot_historical_the_old_king_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] vécu de si nombreuses années que cela a éclipsé, pour le meilleur comme pour le pire, tous [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] autres hauts-faits."
