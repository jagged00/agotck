 nick_agot_historical_the_laughing_storm_desc:0 "Riant aux éclats face à [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] adversaires, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] considéré comme l'un des plus grands guerriers de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] époque."
 nick_agot_historical_the_laughing_wolf:0 "le Loup Rieur"
 nick_agot_historical_the_laughing_wolf_desc:0 "Connu pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] réputation d'homme jovial, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] conquis le Neck, alors entre les mains du Roi des Paluds, puis [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] ensuite épousé la fille de ce dernier."
