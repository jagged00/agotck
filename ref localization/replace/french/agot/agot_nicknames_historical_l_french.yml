 nick_agot_historical_priestkiller:0 "[CHARACTER.Custom('FR_LeLa')] Tueu[CHARACTER.Custom('FR_RSe')]-de-Prêtres"
 nick_agot_historical_priestkiller_desc:0 "Lorsque [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] fait bâtir un septuaire dans le Vieux Wyk, cela provoqua la colère des prêtres du Dieu Noyé, suite à quoi une révolte s'ensuivit, qui se termina dans le sang."
 nick_agot_historical_queen_lorea:0 "Reine Lorea"
 nick_agot_historical_queen_lorea_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'aimez','aime')] porter les vêtements de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] épouse afin de [Select_CString(CHARACTER.IsLocalPlayer,'vous','se')] promener sur les quais de Port-Lannis sous les traits d'une ribaude du commun."
 nick_agot_historical_ragged:0 "Guenilles"
 nick_agot_historical_ragged_desc:0 "Meneur des Pauvres Compagnons, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] et [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] acolytes ne [Select_CString(CHARACTER.IsLocalPlayer,'valaient','valent')] guère plus que des scélérats."
