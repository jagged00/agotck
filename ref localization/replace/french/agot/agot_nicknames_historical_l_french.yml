 nick_agot_historical_the_mad_maid:0 "la Vierge Folle"
 nick_agot_historical_the_mad_maid_desc:0 "Fille aînée et point mariée du Sire de Villevieille, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] la réputation d’ourdir des sortilèges depuis [Select_CString(CHARACTER.IsLocalPlayer,'que vous vous êtes','qu’elle s’est')] retirée au sommet de la Grand-Tour aux côtés de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] père."
