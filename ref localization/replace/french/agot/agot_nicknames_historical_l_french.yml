 nick_agot_historical_the_bold_Selmy_3:0 "le Hardi"
 nick_agot_historical_the_bold_Selmy_3_desc:0 "Entré en lice en tant que chevalier mystère lors d'un tournoi à seulement dix ans, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] reçu cet épithète du Prince des Libellules en personne. [Select_CString(CHARACTER.IsLocalPlayer,'Vos','Ses')] actes ont par la suite montrés [Select_CString(CHARACTER.IsLocalPlayer, Select_CString(CHARACTER.IsFemale, 'que vous', 'qu’elle'), 'qu’il')] en [Select_CString(CHARACTER.IsLocalPlayer,'étiez','était')] digne."
 nick_agot_historical_the_bold_Greenhill_44:0 "le Hardi"
 nick_agot_historical_the_bold_Forrester_1:0 "l’Intrépide"
 nick_agot_historical_the_boor:0 "[CHARACTER.Custom('FR_LeLa')] Rustre"
 nick_agot_historical_the_boy_king:0 "l'Enfant Roi"
 nick_agot_historical_the_boy_king_desc:0 "Arrivé[CHARACTER.Custom('FR_E')] au pouvoir à un âge précoce, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] connu[CHARACTER.Custom('FR_E')] en tant que « l'Enfant Roi »."
 nick_agot_historical_the_brave:0 "[CHARACTER.Custom('FR_LeLa')] Brave"
 nick_agot_historical_the_brave_baelor:0 "[CHARACTER.Custom('FR_LeLa')] Brave"
 nick_agot_historical_the_brave_baelor_desc:0 "Lors de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] première visite dans la Fossedragon, [CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] tapé Balerion la Terreur noire sur le museau, gagnant ainsi [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] surnom."
 nick_agot_historical_the_breaker_bulwer:0 "[CHARACTER.Custom('FR_LeLa')] Fracasseu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_breaker_bulwer_desc:0 "La légende raconte que [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] acquis la force de vingt hommes en buvant du sang de taureau, allant jusqu'à voir une paire de cornes [Select_CString(CHARACTER.IsLocalPlayer,'vous','lui')] pousser sur la tête."
 nick_agot_historical_the_breaker_bulwer_line:0 "le Fracasseur"
 nick_agot_historical_the_breaker_bulwer_line_desc:0 "La lignée de Bors le Fracasseur, fils de Garth Mainverte et fondateur de la Maison Bulwer."
 nick_agot_historical_the_breaker_stark:0 "[CHARACTER.Custom('FR_LeLa')] Briseu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_breaker_stark_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] mis fin au règne de treize années du Roi de la Nuit et ainsi libéré la Garde de Nuit de son emprise."
 nick_agot_historical_the_breaker_stark_line:0 "le Briseur"
 nick_agot_historical_the_breaker_stark_line_desc:0 "La lignée de Brandon le Briseur, Roi de l'Hiver."
 nick_agot_historical_the_bridegroom:0 "le Fiancé"
 nick_agot_historical_the_bridegroom_garland:0 "l’Épou[CHARACTER.Custom('FR_XSe')]"
 nick_agot_historical_the_bridegroom_garland_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] écarté [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] épouses afin de [Select_CString(CHARACTER.IsLocalPlayer,'vous','se')] marier avec la fille de Lymond Hightower, dans le but d'intégrer Villevieille au Royaume du Bief."
 nick_agot_historical_the_bronzeman:0 "l’Homme de Bronze"
 nick_agot_historical_the_brown_dragon:0 "le Dragon Brun"
 nick_agot_historical_the_brown_dragon_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'vous','est')] tombé dans une flaque de boue suite à une joute, gagnant malgré [Select_CString( CHARACTER.IsLocalPlayer, 'vous', CHARACTER.Custom('FR_LuiElle'))] le surnom de « Dragon Brun » en moquerie de l'épithète de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] père."
