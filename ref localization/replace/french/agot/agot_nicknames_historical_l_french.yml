 nick_agot_historical_the_blue_bard_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] vêtu tout de bleu, [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] les yeux bleus et [Select_CString(CHARACTER.IsLocalPlayer,'vous teignez','se teint')] les cheveux en bleu, à la mode de Tyrosh."
