 nick_agot_historical_the_queen_of_thorns_desc:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Votre','Sa')] langue acérée combinée à [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] caractère épineux font[CHARACTER.LocalPlayerString(' de vous', '')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltipNoFormat')] une femme célèbre pour ses épigrammes."
 nick_agot_historical_the_queen_who_never_was:0 "la Reine qui Jamais ne le Fut"
 nick_agot_historical_the_queen_who_never_was_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'étiez','était')] à deux doigts de devenir [Select_CString(CHARACTER.IsFemale,'reine','roi')], mais le grand conseil en a décidé autrement."
 nick_agot_historical_the_queer:0 "l'Étrange"
 nick_agot_historical_the_quick:0 "[CHARACTER.Custom('FR_LeLa')] Vi[CHARACTER.Custom('FR_FVe')]"
 nick_agot_historical_the_quickfinger:0 "Mainleste"
 nick_agot_historical_the_quiver:0 "la Tremblote"
 nick_agot_historical_the_raper:0 "[CHARACTER.Custom('FR_LeLa')] Violeu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_raper_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat] gouvernait l'Île-aux-Ours en tant que pillard fer-né, avant d'être tué lors d'une bataille par le Loup Affamé en personne."
 nick_agot_historical_the_raven:0 "[Select_CString(CHARACTER.IsFemale,'la Corneille','le Corbeau')]"
 nick_agot_historical_the_reader:0 "[CHARACTER.Custom('FR_LeLa')] Bouquineu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_reader_desc:0 "Chose atypique — et mal vu — dans la culture fer-née, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'préférez','préfère')] avoir un livre à la main qu'une épée."
 nick_agot_historical_the_realms_delight:0 "la Joie du Royaume"
 nick_agot_historical_the_reaper:0 "[Select_CString(CHARACTER.IsFemale,'la Faucheuse','le Faucheur')]"
 nick_agot_historical_the_reaver:0 "[CHARACTER.Custom('FR_LeLa')] Pillard[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_red_Dule_21:0 "[CHARACTER.Custom('FR_LeLa')] Rouge"
 nick_agot_historical_the_red_Hollard_10:0 "[CHARACTER.Custom('FR_LeLa')] Rouge"
 nick_agot_historical_the_red_princes:0 "[CHARACTER.Custom('FR_LeLa')] Rouge"
 nick_agot_historical_the_red_Knight_Riverlands_4:0 "[CHARACTER.Custom('FR_LeLa')] Rouge"
 nick_agot_historical_the_red_Naegetos_1:0 "[CHARACTER.Custom('FR_LeLa')] Rouge"
 nick_agot_historical_the_red_Royce_5:0 "[CHARACTER.Custom('FR_LeLa')] Rouge"
 nick_agot_historical_the_red_Tarbeck_33:0 "[CHARACTER.Custom('FR_LeLa')] Rouge"
 nick_agot_historical_the_red_Sarwyck_82:0 "[CHARACTER.Custom('FR_LeLa')] Rouge"
 nick_agot_historical_the_red_crab:0 "le Crabe Rouge"
 nick_agot_historical_the_red_cofferer:0 "la Fortune Rouge"
 nick_agot_historical_the_red_dog:0 "[Select_CString(CHARACTER.IsFemale,'la Chienne Rouge','le Chien Rouge')] des Collines"
 nick_agot_historical_the_red_dog_desc:0 "En tant que Grand Capitaine des Fils du Guerrier, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'gouvernez','gouverne')] les contrées montagneuses au nord de la Dent d'Or, en pratique si non en titre."
 nick_agot_historical_the_red_kraken:0 "le Kraken Rouge"
 nick_agot_historical_the_red_kraken_desc:0 "Après avoir combattu dans les Degrés de Pierre en tant que mercenaire, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] ressorti d'une bataille, vivant mais recouvert d'une douzaine de blessures, desquelles coulaient abondamment le sang."
 nick_agot_historical_the_red_lion:0 "[CHARACTER.Custom('FR_LeLa')] Lio[CHARACTER.Custom('FR_NNne')] Rouge"
 nick_agot_historical_the_red_lion_desc:0 "Un surnom autant mérité pour l'emblème de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] maison que pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] réputation d'homme sanguinaire, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] un sire bouffi de fierté qui affirme que fourré d'or ou de rouge, un lion a toujours des griffes, longues et acérées."
 nick_agot_historical_the_red_viper:0 "la Vipère Rouge"
 nick_agot_historical_the_red_viper_desc:0 "Dans [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] jeunesse, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] été surpris au lit avec l'amante de cœur d'Edgar Ferboys. Un duel judiciaire au premier sang s'ensuivit ; duel qui se termina sur une égalité — à ceci près que Lord Ferboys mourut d'une infection, que d'aucun attribut à du poison."
 nick_agot_historical_the_red_widow:0 "la Veuve Rouge"
 nick_agot_historical_the_red_widow_desc:0 "Durant [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] jeunesse, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','s’est')] mariée quatre fois, et aucun de [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] époux et enfants ne [Select_CString(CHARACTER.IsLocalPlayer,'vous','lui')] a survécu."
 nick_agot_historical_the_redsmile:0 "le Sourire Rouge"
 nick_agot_historical_the_regent:0 "[CHARACTER.Custom('FR_LeLa')] Régent[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_rhoynar:0 "[CHARACTER.Custom('FR_LeLa')] Rhoynar"
 nick_agot_historical_the_rhymer:0 "[CHARACTER.Custom('FR_LeLa')] Rimeu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_riverman:0 "[CHARACTER.Custom('FR_LeLa')] Riverain[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_rodent:0 "[CHARACTER.Custom('FR_LeLa')] Rongeu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_rogue_prince:0 "le Prince Vaurien"
 nick_agot_historical_the_rogue_prince_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] notoirement connu[CHARACTER.Custom('FR_E')] pour avoir une personnalité aventureuse et une moralité incertaine, ayant à la fois inspiré du dégoût et de l'admiration auprès de beaucoup."
 nick_agot_historical_the_rook:0 "[Select_CString(CHARACTER.IsFemale,'la Corneille','le Freux')]"
 nick_agot_historical_the_ruin:0 "la Ruine"
 nick_agot_historical_the_ruin_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] un combattant d’une sauvagerie sans nom, dont l’ivresse du combat [Select_CString(CHARACTER.IsLocalPlayer,'vous','lui')] fait oublier toute notion de douleur."
 nick_agot_historical_the_ruined:0 "[CHARACTER.Custom('FR_LeLa')] Ruiné[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_rune:0 "la Rune"
 nick_agot_historical_the_saddlesore:0 "le Mal Scellé"
 nick_agot_historical_the_saddlesore_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] passé tout [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] règne à cheval, à écraser des rebelles et à pendre des otages à travers le Conflans."
 nick_agot_historical_the_sailmaker:0 "[CHARACTER.Custom('FR_LeLa')] Voili[CHARACTER.Custom('FR_ErEre')]"
 nick_agot_historical_the_sailmaker_desc:0 "En tant que Roi de l’Orage, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] cinglé en direction du sud pour revendiquer Estremont et les îles attenantes."
 nick_agot_historical_the_salt_rat:0 "le Rat de Sel"
 nick_agot_historical_the_sand_dog:0 "le Chien des Sables"
 nick_agot_historical_the_savage:0 "[CHARACTER.Custom('FR_LeLa')] Sauvage"
 nick_agot_historical_the_scaly_prefix:0 "Écailles"
 nick_agot_historical_the_scarlet_shadow:0 "l’Ombre Écarlate"
 nick_agot_historical_the_scrapesword:0 "Râpe-Épée"
 nick_agot_historical_the_scribe:0 "[CHARACTER.Custom('FR_LeLa')] Scribe"
 nick_agot_historical_the_scriverner:0 "the Scriverner"
 nick_agot_historical_the_sculptor:0 "[CHARACTER.Custom('FR_LeLa')] Sculpteu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_sea_dragon:0 "le Dragon des Mers"
 nick_agot_historical_the_sea_lion_Costayne_23:0 "le Lion de Mer"
 nick_agot_historical_the_sea_lion_Costayne_23_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] non seulement un marin aguerri, mais également un expert dans le commandement des flottes du Bief."
 nick_agot_historical_the_sea_lion_Hightower_25:0 "le Lion de Mer"
 nick_agot_historical_the_sea_lion_Hightower_25_desc:0 "Après avoir prêté allégeance au royaume du Bief pour assurer la sécurité de Villevieille contre toute menace venant des terres profondes, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','s’est')] consacré à poursuivre [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] ambition de bâtir une immense flotte pour aller conquérir les mers lointaines."
 nick_agot_historical_the_sea_snake:0 "le Serpent de Mer"
 nick_agot_historical_the_sea_snake_desc:0 "Après avoir navigué par monts et par vaux, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'portez','porte')] désormais le nom de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] propre navire comme si c'était le [Select_CString(CHARACTER.IsLocalPlayer,'vôtre','sien')]."
 nick_agot_historical_the_seeker:0 "[CHARACTER.Custom('FR_LeLa')] Chercheu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_shade_of_ghost_hill:0 "l’Ombre de Spectremont"
 nick_agot_historical_the_shadow_sandoq:0 "l’Ombre"
 nick_agot_historical_the_shadow_sandoq_desc:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Votre','Le')] visage[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] est si horriblement défiguré [Select_CString(CHARACTER.IsLocalPlayer,'que vous avez préféré','qu’il a préféré')] le dissimuler derrière un voile de soie noire."
 nick_agot_historical_the_shaker:0 "l’Ébranleu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_shebear:0 "l’Ourse"
 nick_agot_historical_the_shepherd_Captain_Iron_Islands_8:0 "le Berger"
 nick_agot_historical_the_shepherd_Maidens_Men_2:0 "le Pastoureau"
 nick_agot_historical_the_shieldsmasher:0 "Fend-l'Écu"
 nick_agot_historical_the_shipwright:0 "[CHARACTER.Custom('FR_LeLa')] Caréneu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_shipwright_desc:0 "Connu pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] amour de la mer, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] disparu durant sa traversée dans les Mers du Crépuscule."
 nick_agot_historical_the_silver_lion:0 "[CHARACTER.Custom('FR_LeLa')] Lio[CHARACTER.Custom('FR_NNne')] Argenté[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_silver_prefix:0 "l’Argenté[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_silver_rose:0 "la Rose Argentée"
 nick_agot_historical_the_simple_vaella:0 "[CHARACTER.Custom('FR_LeLa')] Simple[CHARACTER.Custom('FR_TTte')]"
 nick_agot_historical_the_simple_vaella_desc:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Votre','Le')] cœur[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltip')] est aussi tendre qu’est flasque [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] tête."
 nick_agot_historical_the_sisterman:0 "des Sœurs"
 nick_agot_historical_the_sisterman_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] originaire des Trois Sœurs."
 nick_agot_historical_the_sleepy_Brax_43:0 "l’Ensommeillé[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_sleepy_Sarwyck_97:0 "l’Endormi[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_sleepy_jack:0 "l’Endormi[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_sleepy_jack_desc:0 "En tant que Lord Commandant, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] non seulement laissé une armée de sauvageons passer le Mur, mais [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','il est')] également arrivé trop tard pour [Select_CString(CHARACTER.IsLocalPlayer,'vous','se')] joindre à la bataille."
 nick_agot_historical_the_small:0 "[CHARACTER.Custom('FR_LeLa')] Petit[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_smiling_knight:0 "le Chevalier Badin"
 nick_agot_historical_the_smith_Kytley_11:0 "le Ferrant"
 nick_agot_historical_the_smith_Kytley_hh_4:0 "[Select_CString(CHARACTER.IsFemale,'la Forgeronne','le Forgeron')]"
 nick_agot_historical_the_snail:0 "l’Escargot"
 nick_agot_historical_the_snail_desc:0 "Pour certains, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'méritez votre','mérite son')] surnom en raison de [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] armoiries personnelles, pour d’autres, c’est pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] propension à « [Select_CString(CHARACTER.IsLocalPlayer,'vous','se')] cacher dans [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] coquille »."
 nick_agot_historical_the_snake_eater:0 "[CHARACTER.Custom('FR_LeLa')] Croqueu[CHARACTER.Custom('FR_RSe')] de Serpent"
 nick_agot_historical_the_sneaky:0 "[CHARACTER.Custom('FR_LeLa')] Sournois[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_snowman:0 "[Select_CString(CHARACTER.IsFemale,'la Femme','l’Homme')] de Neige"
 nick_agot_historical_the_soulless:0 "[CHARACTER.Custom('FR_LeLa')] Sans-Âme"
 nick_agot_historical_the_sour_Dalt_24:0 "l’Amer"
 nick_agot_historical_the_sparrow:0 "le Moineau"
 nick_agot_historical_the_spring_king:0 "le Roi du Printemps"
 nick_agot_historical_the_spring_prince:0 "le Prince du Printemps"
 nick_agot_historical_the_spring_prince_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] né[CHARACTER.Custom('FR_E')] deux jours seulement après que les corbeaux blancs se soient envolés de la Citadelle, annonçant l'arrivée du printemps."
 nick_agot_historical_the_stargazer:0 "Lorgne-les-Astres"
 nick_agot_historical_the_stargazer_desc:0 "En tant qu’Archimestre de la Citadelle, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] féru de tout ce qui a trait aux corps célestes."
 nick_agot_historical_the_starvling:0 "le Famélique"
 nick_agot_historical_the_starvling_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] un membre proéminent de l’ordre des Pauvres Compagnons."
 nick_agot_historical_the_steelhand:0 "Main-d’Acier"
 nick_agot_historical_the_stinger:0 "le Dard"
 nick_agot_historical_the_stinger_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] habile au combat — même plus encore, car [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','il est')] considéré comme la plus fine lame du Bief."
 nick_agot_historical_the_stonemason:0 "Le Tailleur de Pierre"
 nick_agot_historical_the_stonemason_desc:0 "Ce Grand Septon est connu pour son aptitude dans le travail de la pierre, certains affirment même qu'il est le Ferrant en chair et en os."
 nick_agot_historical_the_stormbreaker:0 "Brise-Orage"
 nick_agot_historical_the_stormbreaker_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] un célèbre chevalier qui doit [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] épithète à la prouesse dont [Select_CString(CHARACTER.IsLocalPlayer,'vous avez','il a')] fait preuve durant un tournoi, jetant à bas deux adversaires originaires des Terres de l’Orage."
 nick_agot_historical_the_storyteller:0 "[CHARACTER.Custom('FR_LeLa')] Conteu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_stray:0 "l’Errant[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_strong_Greyjoy_hh_11:0 "le Fort"
 nick_agot_historical_the_strong_Strong_100:0 "le Fort"
 nick_agot_historical_the_strummer:0 "le Baladin"
 nick_agot_historical_the_strummer_desc:0 "À la fois chevalier et barde, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] connu pour brocarder [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] adversaires à l'aide de chants grivois avant chaque combat."
 nick_agot_historical_the_survivor:0 "[CHARACTER.Custom('FR_LeLa')] Survivant[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_sweet_Stark_42:0 "le Miel"
 nick_agot_historical_the_sweet_Frey_12:0 "le Doux"
 nick_agot_historical_the_sweetling:0 "Tout-Miel"
 nick_agot_historical_the_sweetling_desc:0 "Bellâtre au parler suave, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] n’en [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] pas moins un homme de troupe cruel et sadique au service de la Montagne."
 nick_agot_historical_the_sword_of_the_evening:0 "l’Épée du Soir"
 nick_agot_historical_the_sword_of_the_evening_desc:0 "Connu pour être le plus grand chevalier de Dorne, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'étiez','fut')] le dernier roi de la Torrentine de la Maison Dayne, avant d’être défait par Nymeria puis envoyé au Mur chargé de chaînes d'or, devenant ainsi la première Épée du Matin à revêtir l’habit noir."
 nick_agot_historical_the_sybarite:0 "[CHARACTER.Custom('FR_LeLa')] Sybarite"
 nick_agot_historical_the_tall_Tall_1:0 "le Grand"
 nick_agot_historical_the_tall_Tall_1_desc:0 "Grand d’un peu moins de sept pieds de haut, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'dominez','domine')] la majeure partie des gens."
 nick_agot_historical_the_tall_Forrester_9:0 "le Grand"
 nick_agot_historical_the_tall_Forrester_9_desc:0 "Nanti d’une imposante stature, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] le fondateur de la Maison Forestier."
 nick_agot_historical_the_tall_Gardener_21:0 "le Haut"
 nick_agot_historical_the_tall_Gardener_21_desc:0 "En tant que roi du Bief, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] remonté le cours de la Mander jusqu’à sa source où [Select_CString(CHARACTER.IsLocalPlayer,'vous avez','il a')] obtenu les serments d’allégeance des maisons riveraines qui bordaient le fleuve."
 nick_agot_historical_the_tall_Knight_Kings_Landing_2:0 "le Grand"
 nick_agot_historical_the_tall_Knight_Kings_Landing_2_desc:0 "Plus que bien charpenté, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] un chevalier des plus prometteurs, nonobstant [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] origines moins que modestes."
 nick_agot_historical_the_tall_Giantsbane_2:0 "le Grand"
 nick_agot_historical_the_tall_Giantsbane_2_desc:0 "Fils aîné de Tormund Fléau-d’Ogres, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] réussi la prouesse de dépasser d’un bon pied [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] paternel déjà bien imposant."
 nick_agot_historical_the_talon:0 "la Serre"
 nick_agot_historical_the_talon_desc:0 "Féroce roi de la Montagne et du Val, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez capturé et incendié','captura et incendia')] l’Antre du Loup lors de l’interminable conflit entre le Nord et le Val, connu comme « la Guerre Sans Valeur »."
 nick_agot_historical_the_tame:0 "[CHARACTER.Custom('FR_LeLa')] Docile"
 nick_agot_historical_the_tame_desc:0 "Malade depuis [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] naissance, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'n’êtes','n’est')] pas ce qu'on peut appeler un[CHARACTER.Custom('FR_E')] combattant[CHARACTER.Custom('FR_E')]."
 nick_agot_historical_the_tanglebeard:0 "Barbe-en-Brouille"
 nick_agot_historical_the_tanglebeard_desc:0 "Pêcheur quelconque de Peyredragon, il n’y a guère que [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] barbe hirsute qui [Select_CString(CHARACTER.IsLocalPlayer,'vous ','')]démarque[CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUINameNoTooltip')] de tout un chacun."
 nick_agot_historical_the_tangletongue:0 "Langue-en-Brouille"
 nick_agot_historical_the_tangletongue_desc:0 "Atteint de bégaiement, on dit[CHARACTER.LocalPlayerString('de vous', '')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltipNoFormat')] [Select_CString(CHARACTER.IsLocalPlayer,'que vous écoutez plus que vous ne déblatérez','qu’il écoute plus qu’il ne déblatère')]."
 nick_agot_historical_the_tattered_prince:0 "le Prince en Guenilles"
 nick_agot_historical_the_tattered_prince_desc:0 "Choisi pour devenir le Prince de Pentos, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] prit la poudre d’escampette en direction des Terres Disputées par peur de ce que cela impliquerait. Tour à tour mercenaire chez les Puînés, les Rondaches de Fer puis les Hommes de la Pucelle, [Select_CString(CHARACTER.IsLocalPlayer,'vous avez','il a')] finalement fondé la compagnie des Erre-au-Vent, vêtu d’un manteau formé de multiples étoffes de tissus bariolés."
 nick_agot_historical_the_terrible:0 "[CHARACTER.Custom('FR_LeLa')] Terrible"
 nick_agot_historical_the_terrible_togarion:0 "le Terrible"
 nick_agot_historical_the_terrible_togarion_desc:0 "Chef de guerre Andal redouté, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez bouté','bouta')] les Orageois hors du Bec de Massey pour y fonder un nouveau royaume, ainsi que la Maison Bar Emmon."
 nick_agot_historical_the_thrall:0 "[CHARACTER.Custom('FR_LeLa')] Ser[CHARACTER.Custom('FR_FVe')]"
 nick_agot_historical_the_thrall_desc:0 "Naguère un simple serf, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] désormais un authentique fer-né qui pille et massacre comme n’importe lequel de ses congénères."
 nick_agot_historical_the_threadbare:0 "l’Éraillé[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_threadbare_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] ainsi nommé en raison de vos armoiries personnelles : une manche effilochée blanche sur champ brun."
 nick_agot_historical_the_thrice_drowned:0 "[CHARACTER.Custom('FR_LeLa')] Triplenoyé[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_thrice_drowned_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] un prêtre du Dieu Noyé qui jouit d’une grande renommée pour avoir ramener maints Fer-nés de la mort grâce au baiser de vie."
 nick_agot_historical_the_thrice_widowed:0 "[CHARACTER.Custom('FR_LeLa')] Triple Veu[CHARACTER.Custom('FR_FVe')]"
 nick_agot_historical_the_tickler_jon:0 "le Titilleur"
 nick_agot_historical_the_tickler_jon_desc:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Vous êtes l’un','L’un')] des sous-fifres de la Montagne, et plus exactement son tortionnaire. Plus qu’une profession, c'est pour [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] une vocation qui [Select_CString(CHARACTER.IsLocalPlayer,'vous','le')] met en joie."
 nick_agot_historical_the_tiger:0 "le Tigre"
 nick_agot_historical_the_tideman:0 "des Marées"
 nick_agot_historical_the_tiger_Targaryen_hh_6:0 "le Tigre"
 nick_agot_historical_the_tiger_Targaryen_hh_6_desc:0 "Le visage et le dos tatoués de rayures tigrées, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'auriez','aurait')] servi en tant que manteau tigré, les membres du guet de Volantis."
 nick_agot_historical_the_titans_bastard:0 "[Select_CString(CHARACTER.IsFemale,'la Bâtarde du Titan','le Bâtard du Titan')]"
 nick_agot_historical_the_titans_bastard_desc:0 "Mercenaire braavien de triste réputation, ceux qui paient [Select_CString(CHARACTER.IsLocalPlayer,'vos','les')] services[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltip')] ont tout autant intérêt à rester sur leurs gardes que leurs ennemis."
 nick_agot_historical_the_toothless_lion:0 "le Lion Édenté"
 nick_agot_historical_the_toothless_lion_desc:0 "Faible d'esprit et flagorneur à l'excès, [CHARACTER.LocalPlayerString('vos propres bannerets', 'les propres bannerets')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltipNoFormat')] [Select_CString(CHARACTER.IsLocalPlayer,'vous défient','le défient')] ouvertement, s'amusant à tirer la queue du lion en toute impunité."
 nick_agot_historical_the_tormentor_Lannister_57:0 "le Tourmenteur"
 nick_agot_historical_the_tormentor_Lannister_57_desc:0 "Connu pour [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] cruauté extrême, on raconte que [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] ne [Select_CString(CHARACTER.IsLocalPlayer,'pouvez','peut')] désirer une femme qu'après l'avoir faite saigner."
 nick_agot_historical_the_trader:0 "[CHARACTER.Custom('FR_LeLa')] Troqueu[CHARACTER.Custom('FR_RSe')]"
 nick_agot_historical_the_true:0 "[CHARACTER.Custom('FR_LeLa')] Véridique"
 nick_agot_historical_the_trueborn:0 "[CHARACTER.Custom('FR_LeLa')] Vrai-Né[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_twisted_Hightower_20:0 "le Tors"
 nick_agot_historical_the_twisted_Hightower_20_desc:0 "Né bossu et avec un bras atrophié, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] été alité pendant une grande partie de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] courte vie."
 nick_agot_historical_the_ugly_Greyiron_2:0 "le Laid"
 nick_agot_historical_the_ugly_Greyiron_2_desc:0 "Condamné à mort pour [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','s’être')] autoproclamé Haut Roi sans l’aval des états généraux de la royauté, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] échappé à [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] funeste destin en brisant la couronne de bois flotté de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] père avant de la jeter à la mer."
 nick_agot_historical_the_uncrowned:0 "[CHARACTER.Custom('FR_LeLa')] Sans-Couronne"
 nick_agot_historical_the_uncrowned_desc:0 "Injustement usurpé[CHARACTER.Custom('FR_E')] par [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] oncle, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'n’avez','n’a')] pas survécu assez longtemps pour être couronné[CHARACTER.Custom('FR_E')] [Select_CString(CHARACTER.IsFemale,'Seigneur','Suzeraine')] des Sept Couronnes."
 nick_agot_historical_the_unlikely:0 "l’Improbable"
 nick_agot_historical_the_unlikely_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] ne [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','s’est')] jamais attendu[CHARACTER.Custom('FR_E')] à hériter de quoi que ce soit, mais un concours de circonstances malencontreuses [Select_CString(CHARACTER.IsLocalPlayer,'vous ont','l’a')] fait passé d'un parent éloigné [CHARACTER.Custom('FR_AuAla')] second[CHARACTER.Custom('FR_E')] dans la ligne de succession."
 nick_agot_historical_the_unready_erich:0 "l’Impréparé[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_unready_erich_desc:0 "Déclarant [Select_CString(CHARACTER.IsLocalPlayer,'que vous n’aviez','qu’il n’avait')] cure des querelles d'étrangers dans les contrées lointaines, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] ignoré l'invasion qui allait bientôt engloutir l'entièreté de Westeros."
 nick_agot_historical_the_unsmiling:0 "l’Insouriant[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_unsmiling_desc:0 "Connu pour être le plus féroce des guerriers fer-nés, nul n'a jamais vu un sourire s'afficher sur [CHARACTER.LocalPlayerString('votre visage', 'le visage')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltipNoFormat')]."
 nick_agot_historical_the_unworthy:0 "l’Indigne"
 nick_agot_historical_the_unworthy_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] passé [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] journées à n'être qu'une déception plutôt que de [Select_CString(CHARACTER.IsLocalPlayer,'vous','se')] montrer digne des responsabilités héritées."
 nick_agot_historical_the_valiant_Kingsguard_2:0 "le Vaillant"
 nick_agot_historical_the_valiant_Kingsguard_2_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] un homme au grand cœur, qui a été fait chevalier de la Garde Royale pour avoir été l’un des champions de la Guerre des Manteaux Blancs."
 nick_agot_historical_the_veiled_lady:0 "la Dame Voilée"
 nick_agot_historical_the_visitor:0 "[Select_CString(CHARACTER.IsFemale,'la Visiteuse','le Visiteur')]"
 nick_agot_historical_the_vole:0 "le Mulot"
 nick_agot_historical_the_vole_desc:0 "Petit, velu et sans charme aucun, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] n’[Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] pas volé [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] surnom."
 nick_agot_historical_the_vulture:0 "[Select_CString(CHARACTER.IsFemale,'la Vautouresse','le Vautour')]"
 nick_agot_historical_the_vulture_king:0 "le Roi Vautour"
 nick_agot_historical_the_wanderer:0 "[CHARACTER.Custom('FR_LeLa')] Vagabond[CHARACTER.Custom('FR_E')]"
 nick_agot_historical_the_wanderer_desc:0 "Bretteur émérite, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] au service des Sept en tant que chevalier des Fils du Guerrier, aux côtés desquels vous avez combattu lors de la Guerre de la Foi."
 nick_agot_historical_the_wandering_wolf:0 "[Select_CString(CHARACTER.IsFemale,'la Louve Errante','le Loup Errant')]"
 nick_agot_historical_the_wandering_wolf_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] voyagé bien loin de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] terre natale, devenant par la suite un mercenaire chez les Puînés."
 nick_agot_historical_the_war_hound:0 "le Limier de Guerre"
 nick_agot_historical_the_wasp:0 "la Guêpe"
 nick_agot_historical_the_wasp_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] devenu chevalier de la Garde Royale suite à [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] hauts faits durant la Guerre des Manteaux Blancs."
 nick_agot_historical_the_weak_legs:0 "Frêles-Guibolles"
 nick_agot_historical_the_weeper_gendel:0 "[CHARACTER.Custom('FR_LeLa')] Chassieu[CHARACTER.Custom('FR_XSe')]"
 nick_agot_historical_the_weeper_gendel_desc:0 "Pillard notoire du peuple libre, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] gagné ce surnom en raison de [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] yeux larmoyants."
 nick_agot_historical_the_wetnurse:0 "la Nourrice"
 nick_agot_historical_the_white:0 "[Select_CString(CHARACTER.IsFemale,'la Blanche','le Blanc')]"
 nick_agot_historical_the_white_bastard:0 "[Select_CString(CHARACTER.IsFemale,'la Bâtarde Blanche','le Bâtard Blanc')]"
 nick_agot_historical_the_white_bull:0 "le Taureau Blanc"
 nick_agot_historical_the_white_fawn:0 "Faonblanc"
 nick_agot_historical_the_white_owl:0 "la Chouette Blanche"
 nick_agot_historical_the_white_owl_desc:0 "Chevalier de la Garde Royale et membre d’une maison au blason arborant une chouette, le choix [Select_CString(CHARACTER.IsLocalPlayer,'de votre','du')] surnom[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltip')] allait de soi."
 nick_agot_historical_the_white_worm:0 "le Ver Blanc"
 nick_agot_historical_the_white_worm_desc:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Votre','son')] teint pâle et [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] réputation innommable [Select_CString(CHARACTER.IsLocalPlayer,'vous ','')]ont valu[CHARACTER.LocalPlayerString('', 'Loc_FR_au_GetShortUINameNoTooltip')] d’être ainsi surnommé[CHARACTER.Custom('FR_E')] par [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] ennemis."
 nick_agot_historical_the_white_watchman:0 "le Veilleur Blanc"
 nick_agot_historical_the_whoreson:0 "Fils-de-Putain"
 nick_agot_historical_the_whoreson_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez été','fut')] d’une aide précieuse pour la Maison Lannister dans la conquête de Kayce, grâce aux ribaudes qui [Select_CString(CHARACTER.IsLocalPlayer,'vous ont ouvert les portes lorsque vous avez sonné de votre','lui ont ouvert les portes lorsqu’il sonna de sa')] trompe."
 nick_agot_historical_the_widower:0 "[Select_CString(CHARACTER.IsFemale,'la Veuve','le Veuf')]"
 nick_agot_historical_the_widowmaker:0 "[CHARACTER.Custom('FR_LeLa')] Faiseu[CHARACTER.Custom('FR_RSe')] de Veuves"
 nick_agot_historical_the_widowmaker_desc:0 "Comme tant d’autres rois Chenu de [Select_CString(CHARACTER.IsLocalPlayer,'votre','cette')] époque, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] été opposé aux prêtres du Dieu Noyé, allant jusqu’à autoriser la construction du premier septuaire sur les Îles de Fer."
 nick_agot_historical_the_wild_flower:0 "la Fleur Sauvage"
 nick_agot_historical_the_winter_child:0 "l’Enfant de l’Hiver"
 nick_agot_historical_the_winter_child_desc:0 "Pour certains, ce surnom vient du fait que [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'soyez','est')] né[CHARACTER.Custom('FR_E')] durant une année d’hiver, pour d’autres, c’est en référence à [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] mère qui était à l’hiver de sa fécondité."
 nick_agot_historical_the_winterfast:0 "le Jeûne d'Hiver"
 nick_agot_historical_the_wise:0 "[CHARACTER.Custom('FR_LeLa')] Sage"
 nick_agot_historical_the_witch:0 "[CHARACTER.Custom('FR_LeLa')] Sorci[CHARACTER.Custom('FR_ErEre')]"
 nick_agot_historical_the_woe_gyles:0 "le Malheur"
 nick_agot_historical_the_woe_gyles_desc:0 "En tant que roi du Bief, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] violemment mis à sac Villevieille et, selon certaines sources, [Select_CString(CHARACTER.IsLocalPlayer,'auriez','aurait')] vendu une grande majorité des habitants comme esclaves."
 nick_agot_historical_the_wolf_Korm_1:0 "le Loup"
 nick_agot_historical_the_woodcock:0 "la Bécasse"
 nick_agot_historical_the_woodcock_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] été le plus jeune des combattants de la Guerre des Manteaux Blancs, adoubé par Ser Joffrey Doguette en personne pour mettre fin aux allégations selon lesquelles [Select_CString(CHARACTER.IsLocalPlayer,'vous n’étiez','il n’était')] en rien un véritable chevalier."
 nick_agot_historical_the_wordsmith:0 "Forge-Mots"
 nick_agot_historical_the_yellow:0 "[CHARACTER.Custom('FR_LeLa')] Jaune"
 nick_agot_historical_the_young_Paege_23:0 "le Jeunot"
 nick_agot_historical_the_young_Durrandon_8:0 "le Jeune"
 nick_agot_historical_the_young_dragon:0 "le Jeune Dragon"
 nick_agot_historical_the_young_falcon:0 "le Jeune Faucon"
 nick_agot_historical_the_young_falcon_desc:0 "Également surnommé « l’Héritier », [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] devenu l’héritier présomptif des Eyrié après que [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] grand-oncle en perdit trois."
 nick_agot_historical_the_young_prince:0 "le Jeune Prince"
 nick_agot_historical_the_young_prince_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] le fils aîné de Baelor 'Briselance', lui-même prince et fils aîné du Roi Daeron II."
 nick_agot_historical_the_young_wolf:0 "le Jeune Loup"
 nick_agot_historical_the_young_wolf_desc:0 "Nommé ainsi aussi bien par [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] amis que [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] ennemis, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] prouvé [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] valeur, et ce dès [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] plus jeune âge."
 nick_agot_historical_the_younger_Bywater_18:0 "le Jeunet"
 nick_agot_historical_the_younger_Targaryen_78:0 "le Jeune"
 nick_agot_historical_the_younger_Blackfyre_5:0 "le Jeune"
 nick_agot_historical_the_younger_Farwynd_105:0 "le Jouvenceau"
 nick_agot_historical_the_younger_Norrey_2:0 "le Juvénile"
 nick_agot_historical_the_younger_Peake_15:0 "le Jeune"
 nick_agot_historical_the_younger_Butterwell_28:0 "le Jeune"
 nick_agot_historical_the_youngest:0 "le Plus Jeune"
 nick_agot_historical_third_goose:0 "Troisième Plume"
 nick_agot_historical_third_goose_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] [CHARACTER.Custom('FR_LeLa')] cad[CHARACTER.Custom('FR_EtEtte')] d'une fratrie de triplés."
 nick_agot_historical_thrallsbane:0 "Thrallsbane"
 nick_agot_historical_three_finger:0 "Trois-doigts"
 nick_agot_historical_three_finger_desc:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Votre','La')] main mutilée[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltip')] à laquelle il ne reste que trois doigts explique la raison de [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] surnom."
 nick_agot_historical_three_toes:0 "Trois-Orteils"
 nick_agot_historical_three_tooth:0 "Trois-Dents"
 nick_agot_historical_three_tooth_desc:0 "Un surnom bien étrange que [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'devez','doit')] à [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] nombre de dents restantes."
 nick_agot_historical_threeskins:0 "Troispeaux"
 nick_agot_historical_threeskins_desc:0 "Change-peau de grand talent, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] revêtu la peau de trois bêtes."
 nick_agot_historical_thunderbolt:0 "la Foudre"
 nick_agot_historical_thunderbolt_tybolt:0 "la Foudre"
 nick_agot_historical_thunderbolt_tybolt_desc:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez été','fut')] le Roi du Roc qui repoussa les premiers guerriers andals qui s’étaient mis en marche contre les Terres de l'Ouest."
 nick_agot_historical_toad:0 "Crapaud"
