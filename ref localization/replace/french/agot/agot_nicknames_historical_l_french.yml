 nick_agot_historical_palehair_gaemon_desc:0 "Bâtard[CHARACTER.Custom('FR_E')] d'Aegon II, selon les dires de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] mère, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'possédez','posséde')] les cheveux pâles distinctifs de la lignée de votre prétendu père."
