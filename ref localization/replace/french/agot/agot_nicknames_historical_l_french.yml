 nick_agot_historical_the_king_who_flew_desc:0 "Par trois fois, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] fait le tour du sommet de la Lance du Géant, sur le dos de Vhagar. Le petit roi qui tutoya les cieux revint sur terre en tant que petit seigneur."
 nick_agot_historical_the_king_who_knelt:0 "le Roi qui s'agenouilla"
 nick_agot_historical_the_king_who_knelt_desc:0 "Ne souhaitant pas voir le Nord partager le même sort qu'Harrenhal et le Champ de Feu, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] choisi de sacrifier [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] titre de roi et de ployer le genou devant le Conquérant."
