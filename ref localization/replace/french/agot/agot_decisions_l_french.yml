 recover_brightroar_decision:0 "Retrouver Rugissante"
 recover_brightroar_decision_desc:0 "Rugissante, l'épée ancestrale de la Maison Lannister, a été perdue dans les ruines de l'Antique Valyria il y a fort longtemps. Pour la retrouver, je n'ai nulle autre choix que d'envoyer une expédition dans ce lieu de perdition. Les chances d'y parvenir sont probablement infimes, mais la récompense sera à la hauteur d'une telle entreprise."
