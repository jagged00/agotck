 high_heart_the_pact_decision:0 "Faire repousser les barrals de Noblecœur"
 high_heart_the_pact_decision_desc:0 "Depuis trop longtemps déjà, Noblecœur a été dévoyé par les Andals et leurs nouveaux dieux. L'heure est venue pour les barrals de renaître, de laisser s'exprimer les visages sculptés dans le bois et de leur permettre de veiller sur ceux qui n'auront pas oublier le Pacte."
 high_heart_the_pact_decision_effect:0 "Vous allez replanter le bosquet pour faire renaître [GetBuilding('agot_high_heart_01').GetName]"
 high_heart_the_pact_decision_tooltip:0 "Vous allez replanter les barrals de Noblecœur"
 high_heart_the_pact_decision_confirm:0 "Que les Anciens Dieux nous protègent !"
 high_heart_the_seven_decision:0 "Couper les barrals de Noblecœur"
 high_heart_the_seven_decision_desc:0 "Jadis, Erreg le Fratricide a purifié Noblecœur en débarrassant les lieux de tous ces maudits arbres blancs qui s'y trouvaient. Ce qui a été fait a également été défait, et les arbres-démons ont été replantés. Il nous appartient de nettoyer la souillure une fois encore et de faire taire les paroles hérétiques que certains trouvent dans le bruissement des feuilles."
 high_heart_the_seven_decision_tooltip:0 "Vous allez débarrasser Noblecœur de tous les barrals qui s'y trouvent"
 high_heart_the_seven_decision_confirm:0 "Telle est la volonté des Sept !"
 reforge_valyrian_steel_additional_requirements:0 "Votre $court_smith_court_position|l$ doit soit posséder la connaissance nécessaire pour reforger l'acier valyrien ou appartenir à une [faith|El] avec le [core_tenet|El] [GetFaithDoctrine('tenet_blood_magic_steel').GetBaseName|l]"
 justman_revival_decision:0 "Faire renaître la Maison Lejuste"
 justman_revival_desc:0 "Jadis, Benedict Rivers, enfant issu du sang Nerbosc et Bracken, parvint à unifier le Trident sous son joug et fonda la Maison Lejuste. Sa lignée régna sur le Conflans durant presque trois cents ans avant d'être cruellement anéantie par les Fer-nés. Aujourd'hui, quelqu'un porte à nouveau le sang des Nerbosc et des Bracken dans ses veines, et ce quelqu'un, c'est moi. Le temps est venu de ramener d'outre-tombe cette dynastie autrefois si prestigieuse, et de la mener vers une gloire nouvelle."
 justman_revival_decision_confirm:0 "Je ferais honneur à ce nom."
 agot_events_generic.0030.t:0 "[Select_CString(ROOT.Char.IsFemale,'À mon impudente vassale','À mon impudent vassal')],"
 agot_events_generic.0030.desc_vassal:0 "De quel droit croyez-vous pouvoir siéger impunément à Port-Réal ? Je vous somme séant de me céder son titre, sans quoi je m'assurerais de raviver la teinte du Donjon Rouge."
 agot_events_generic.0030.a:0 "Je vous assure que ce n'est qu'une terrible méprise."
 agot_events_generic.0030.b:0 "J'espère que vous vous embrocherez le cul sur une de ces épées."
 saerygan_revival_decision:0 "Faire renaître la Maison Saerygan"
 saerygan_revival_desc:0 "Comme frappée d’infortune et victime d’un acharnement du destin, la Maison Saerygan s’est éteinte, et avec elle, le règne d’une lignée vieille de plusieurs siècles qui fut présente pour voir l’Empire Valyrien atteindre son apogée et déchoir dans la ruine du Fléau.\n\nPeut-être est-il venu le temps d’une résurgence. Je puis faire renaître cette dynastie autrefois si glorieuse, et la mener vers un nouvel âge d’or !"
 saerygan_revival_decision_confirm:0 "Je ferais honneur à ce nom."
 agot_dump_landless_pirate_raid_loot:0 "Récupérer le butin du pillage"
 agot_dump_landless_pirate_raid_loot_desc:0 "Le butin fièrement acquis, comme savent si bien le faire les pirates, est prêt à être récupéré dès mon retour au port. Tout ce que j'ai à faire est d'envoyer quelques bras le récupérer."
 agot_dump_landless_pirate_raid_loot_tooltip:0 "Récupérez le butin issu du [reaving|El]"
 agot_dump_landless_pirate_raid_loot_confirm:0 "Du nerf ! J'attends mon or !"