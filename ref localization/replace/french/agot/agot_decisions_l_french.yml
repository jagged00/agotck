 retrieve_hidden_artifact_decision_confirm:0 "Le monde saura !"
 retrieve_stored_artifacts_decision:0 "Exhumer les artefacts du Donjon Rouge"
 retrieve_stored_artifacts_decision_desc:0 "Dans les souterrains du Donjon Rouge reposent de nombreuses reliques ayant appartenu naguère à la Maison Targaryen. Qu'ils s'agissent de couronnes ou de crânes de dragon, la poussière a trop longtemps terni ces objets de grande valeur qui méritent de retrouver leur lustre d'antan."
