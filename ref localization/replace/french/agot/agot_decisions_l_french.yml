 dynamic_bastard_house_revival_decision:0 "Faire renaître la Maison [ROOT.Char.GetHouse.MakeScope.Var('bastard_house_of').House.GetName]"
 dynamic_bastard_house_revival_decision_desc:0 "La Maison [ROOT.Char.GetHouse.MakeScope.Var('bastard_house_of').House.GetName] s'est éteinte. Ses étendards ont été balayés et sa devise n'est plus entendue que lors des histoires que l'on raconte aux chérubins. Mais en tant que descendant[ROOT.Char.Custom('FR_E')] direct[ROOT.Char.Custom('FR_E')] de cette maison, je puis récupérer son legs et arborer son nom ! Je puis raviver son souvenir et faire perdurer sa mémoire !"
