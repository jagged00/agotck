l_french:
 I_PROCLAIM_PK:0 "Vous devez [completely_control|E] au moins deux [duchies|E]"
 agot_proclaim_pk_runestone:0 "Proclamer le royaume de Roches-aux-runes"
 agot_proclaim_pk_runestone_tooltip:0 "Cette décision vous permettra de former le royaume de Roches-aux-runes"
 agot_proclaim_pk_runestone_desc:0 "Roches-aux-runes, une ancienne terre des Premiers Hommes, a été regroupée sous la bannière de la Maison [ROOT.Char.GetHouse.GetName].\n\nAutrefois gouvernée par les rois de Bronze, elle revêt une grande importance à la fois historique et stratégique dans le Val. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, vous devez être [ROOT.Char.Custom('FR_CeluiCelle')] qui rassemblera son ost pour former une nouvelle lignée de Rois de Bronze.\n\nRelèverez-vous ce défi pour l'honneur de la maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_runestone_confirm:0 "Envoyez les corbeaux"
 agot_proclaim_pk_stone_and_sky:0 "Proclamer le royaume de Pierre et de Ciel"
 agot_proclaim_pk_stone_and_sky_tooltip:0 "Cette décision vous permettra de former le royaume de Pierre et de Ciel"
 agot_proclaim_pk_stone_and_sky_desc:0 "La Voie Large, dominée par la Maison [ROOT.Char.GetHouse.GetName] de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], est la route la plus sûre pour Dorne.\n\nJadis gouvernée par les rois de la Pierre et du Ciel, la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] a suffisamment étendu son contrôle pour en revendiquer l'héritage. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir de gravir cette dernière marche afin de redorer la grandeur de ce trône défunt.\n\nRelèverez-vous le défi de faire vôtre l'honneur de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_stone_and_sky_confirm:0 "Envoyez les corbeaux"
 I_PROCLAIM_IT:0 "Vous devez avoir un [Concept('completely_control','contrôle complet')|E] sur au moins cinq [empires|El] à Westeros."
 agot_proclaim_pk_the_torrentine:0 "Proclamer le royaume de la Torrentine"
 agot_proclaim_pk_the_torrentine_tooltip:0 "Cette décision vous permettra de former le royaume de la Torrentine"
 agot_proclaim_pk_the_torrentine_desc:0 "La Torrentine, gouvernée depuis [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] par l'honorable Maison [ROOT.Char.GetHouse.GetName], est une région de grande importance stratégique et chargée d'histoires à Dorne.\n\nConnue pour ses chevaliers de légende, la Maison [ROOT.Char.GetHouse.GetName] est depuis longtemps un symbole de la chevalerie et de la prouesse pour son peuple. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir de les unifier et de restaurer la gloire d'antan de la Torrentine.\n\nRelèverez-vous le défi de faire vôtre l'honneur de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_the_torrentine_confirm:0 "Envoyez les corbeaux"
 agot_proclaim_pk_the_tor:0 "Proclamer le royaume du Tor"
 agot_proclaim_pk_the_tor_tooltip:0 "Cette décision vous permettra de former le royaume du Tor"
 agot_proclaim_pk_the_tor_desc:0 "Le Tor, gouverné depuis [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] par la Maison [ROOT.Char.GetHouse.GetName], est une région de grande importance stratégique et chargée d'histoires à Dorne.\n\nConnue pour sa lignée antique et son riche héritage culturel, cette maison est depuis longtemps un symbole de la résilience et de la noblesse dornienne. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir de les unifier et de forger un royaume digne du Tor.\n\nRelèverez-vous le défi d'apporter la gloire à la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_the_tor_confirm:0 "Envoyez les corbeaux"
 agot_proclaim_pk_fair_isle:0 "Proclamer le royaume de Belle Île"
 agot_proclaim_pk_fair_isle_tooltip:0 "Cette décision vous permettra de former le royaume de Belle Île"
 agot_proclaim_pk_fair_isle_desc:0 "Belle Île, gouvernée depuis [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] par la Maison [ROOT.Char.GetHouse.GetName], est une région de grande importance commerciale dans les Terres de l'Ouest.\n\nConnus pour sa marine puissante et les magnifiques paysages de leur foyer, cette noble maison est la plus importante qui se trouve ici. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir de les unifier et de former un royaume digne de Belle Île.\n\nRelèverez-vous le défi de faire vôtre l'honneur de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_fair_isle_confirm:0 "Envoyez les corbeaux"
 agot_proclaim_pk_bear_island:0 "Proclamer le royaume de l'Île-aux-Ours"
 agot_proclaim_pk_bear_island_tooltip:0 "Cette décision vous permettra de former le royaume de l'Île-aux-Ours"
 agot_proclaim_pk_bear_island_desc:0 "L'Île-aux-Ours, dont les rives boisées sont gouvernées par la noble Maison [ROOT.Char.GetHouse.GetName], est depuis bien longtemps un bastion contre les incursions Fer-nés dans le Nord.\n\nConnus pour leurs féroces guerriers et leur loyauté inébranlable, les [ROOT.Char.GetHouse.GetNameNoTooltip] se sont révélés de fidèles protecteurs de leur peuple. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir de gravir une nouvelle marche en formant une couronne à l'image de l'île.\n\nRelèverez-vous ce défi glorieux ?"
 agot_proclaim_pk_bear_island_confirm:0 "Envoyez les corbeaux"
 agot_proclaim_pk_great_wyk:0 "Proclamer le royaume de Grand Wyk"
 agot_proclaim_pk_great_wyk_tooltip:0 "Cette décision vous permettra de former le royaume de Grand Wyk"
 agot_proclaim_pk_great_wyk_desc:0 "L'île de Grand Wyk, gouverné depuis [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] par la noble Maison [ROOT.Char.GetHouse.GetName], est la plus grande et l'une des îles les plus importantes des Îles de Fer.\n\nConnu pour sa farouche indépendance et ses prouesses martiales, ses habitants sont depuis longtemps de fervent défenseur du mode de vie fer-né. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir de les unifier et d'apporter la gloire à cet île.\n\nRelèverez-vous le défi de faire vôtre l'honneur de la maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_great_wyk_confirm:0 "Envoyez les corbeaux"
 agot_proclaim_pk_the_stony_shore:0 "Proclamer le royaume des Roches"
 agot_proclaim_pk_the_stony_shore_tooltip:0 "Cette décision vous permettra de former le royaume des Grisesroches"
 agot_proclaim_pk_the_stony_shore_desc:0 "Le royaume des Roches, gouverné depuis [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] par la noble Maison [ROOT.Char.GetHouse.GetName], est une région d'importance stratégique dans le Nord.\n\nConnu pour son terrain accidenté et sa population résiliente, il est depuis longtemps un bastion pour les Nordiens. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir de les unifier et de faire des Roches un royaume de premier ordre.\n\nRelèverez-vous le défi de faire vôtre l'honneur de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_the_stony_shore_confirm:0 "Envoyez les corbeaux"
 agot_proclaim_pk_southstone:0 "Proclamer le royaume de Peyresud"
 agot_proclaim_pk_southstone_tooltip:0 "Cette décision vous permettra de former le royaume de Peyresud"
 agot_proclaim_pk_southstone_desc:0 "Peyresud, gouverné depuis [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] par la Maison [ROOT.Char.GetHouse.GetName], est une région de grande importance stratégique et chargée d'histoires dans le Conflans.\n\nConnu pour ses terres futiles le long du Trident, cette noble maison est considéré comme un symbole de force et de résilience. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir d'unifier ces terres et de leur redonner leur gloire d'antan.\n\nRelèverez-vous le défi de faire vôtre l'honneur de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_southstone_confirm:0 "Envoyez les corbeaux"
 raise_pirate_kingdom_decision:0 "Proclamer un royaume pirate"
 raise_pirate_kingdom_decision_desc:0 "Les Sœurois étaient autrefois des rois pirates, fiers et indépendants, avant que ne survienne le Viol des Trois Sœurs et la Guerre Sans Valeur. L'occasion de recouvrir notre fierté d'antan et de nous libérer du joug [ROOT.Char.GetLiege.Custom('FR_du_Char_Pi')][ROOT.Char.GetLiege.GetTitledFirstName] s'offre à nous. Il est grand temps de redorer l'honneur des Trois Soeurs !"
 raise_pirate_kingdom_decision_tooltip:0 "Vous déclarerez votre indépendance, redonnant aux Trois Sœurs la place qui leur revient en tant que royaume pirate."
 raise_pirate_kingdom_decision_confirm:0 "Pour les vagues et les cieux !"
 agot_proclaim_pk_old_wyk:0 "Proclamer le royaume de Vieux Wyk"
 agot_proclaim_pk_old_wyk_tooltip:0 "Cette décision vous permettra de former le royaume de Vieux Wyk"
 agot_proclaim_pk_old_wyk_desc:0 "Le royaume de Vieux Wyk, gouverné par la Maison [ROOT.Char.GetHouse.GetName] est le cœur des Îles de Fer.\n\nConnue pour ses féroces guerriers lesquels sont devenus maître des mers, c'est une maison de premier plan parmi les Fer-nés. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces îles, il est de votre devoir de les unifier pour apporter la gloire au royaume de la Baie du Fer-né.\n\nRelèverez-vous le défi de faire vôtre l'honneur de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_old_wyk_confirm:0 "Envoyez les corbeaux"
 agot_proclaim_pk_blackwood_vale:0 "Proclamer le royaume du Val Nerbosc"
 agot_proclaim_pk_blackwood_vale_tooltip:0 "Cette décision vous permettra de former le royaume du Val Nerbosc"
 agot_proclaim_pk_blackwood_vale_desc:0 "Le Val Nerbosc, gouverné depuis [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] par la noble Maison [ROOT.Char.GetHouse.GetName], est une région revêtant autant une importance historique que stratégique au sein du Conflans.\n\nIssu d'une ancienne lignée et nanti d'une féroce loyauté envers les Anciens Dieux, cette maison est l'incarnation même de la résilience et de l'honneur. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir de les unifier et ainsi former l'illustre royaume du Val Nerbosc.\n\nRelèverez-vous le défi de faire vôtre l'honneur de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_blackwood_vale_confirm:0 "Envoyez les corbeaux"
 agot_proclaim_pk_godsgrace:0 "Proclamer le royaume de Grâcedieu"
 agot_proclaim_pk_godsgrace_tooltip:0 "Cette décision vous permettra de former le royaume de Grâcedieu"
 agot_proclaim_pk_godsgrace_desc:0 "Le royaume de Grâcedieu, gouverné depuis [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] par la noble Maison [ROOT.Char.GetHouse.GetName] est le cœur battant de Dorne.\n\nSitué au confluent du Fléau et du Voi, le contrôle du passage ici a longtemps été un pilier défensif pour les Dorniens. En tant que [ROOT.Char.Custom('FR_SeigneurDame')] de ces terres, il est de votre devoir de les unifier pour ainsi forger le véritable royaume de la Sang-Vert.\n\nRelèverez-vous le défi de faire vôtre l'honneur de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] ?"
 agot_proclaim_pk_godsgrace_confirm:0 "Envoyez les corbeaux"