 agot_view_white_book:0 "Consulter le Livre Blanc"
 agot_view_white_book_tooltip:0 "Ouvrir le Livre Blanc et feuilleter les archives consignées à propos de la Garde Royale"
 agot_view_white_book_confirm:0 "Commencer la lecture"
 agot_view_white_book_desc:0 "C'est dans ce magnifique ouvrage au cuir d'un blanc immaculé que sont consignés la bravoure, les services rendus et les manquements de chaque membre ayant rejoint la Garde Royale, et ce depuis sa fondation. Noircir ces blanches pages est autant un privilège qu'un devoir pour tout chevalier qui a fait le serment de placer la vie de son roi au-dessus de la sienne."