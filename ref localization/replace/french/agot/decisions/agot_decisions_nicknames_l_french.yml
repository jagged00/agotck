l_french:
 select_dynastic_nickname:0 "Choisir le symbole épithétique de votre maison"
 select_dynastic_nickname_desc:0 "Le blason n'est pas qu'un morceau de tissu pour habiller les murs d'un château ou décorer les champs de bataille, il est l'identité même de la maison qui le brandit, un symbole de son histoire. C'est pourquoi nous devons adopter un symbole qui résonnera dans le cœur de nos ennemis autant que de nos alliés."
 select_dynastic_nickname_tooltip:0 "Choisissez un symbole pour les [nicknames|El] de votre [house|El]"
 select_dynastic_nickname_tt:0 "Vous aurez la possibilité de choisir le symbole qui illustrera les [nicknames|El] de votre [house|El]."
 select_dynastic_nickname_confirm:0 "Que nul ne puisse nous ignorer !"