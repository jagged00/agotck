l_french:
 agot_pirate_convert_whole_realm_to_feudalism_decision:0 "Adopter le féodalisme"
 agot_pirate_convert_whole_realm_to_feudalism_decision_desc:0 "À mesure que mon pays grandit, la difficulté d'en garder le contrôle grandit d'autant plus. Si je veux que [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] poursuive son expansion, nous allons devoir tirer un trait sur nos méthodes archaïques et adopter le féodalisme."
 agot_pirate_convert_whole_realm_to_feudalism_decision_confirm:0 "Adopter un gouvernement féodale"
 agot_pirate_convert_whole_realm_to_feudalism_decision_tooltip:0 "Changer le type de [government|El] en [GetGovernment( 'lp_feudal_government' ).GetName] ou [GetGovernment( 'feudal_government' ).GetName]"
 pirate_vassals_will_convert:0 "Mes vassaux pirates adopteront le [Concept( 'feudal', 'féodalisme' )|E]"
 pirate_vassals_will_convert_lp:0 "Mes vassaux pirates adopteront le [Concept( 'feudal', 'féodalisme' )|E]"
 msg_vassal_common_feudalised:0 "Un vassal a adopté le [Concept( 'feudal', 'féodalisme' )|E]"
 msg_vassal_common_feudalised_desc:0 "Votre vassal[ROOT.Char.Custom('FR_E')], [ROOT.Char.GetShortUIName], a abandonné son [GetGovernment( 'pirate_government' ).GetNameNoTooltip] au profit d'un [GetGovernment( 'feudal_government' ).GetNameNoTooltip]"
 msg_vassal_lp_feudalised:0 "Un vassal a adopté le [Concept( 'feudal', 'féodalisme' )|E]"
 msg_vassal_lp_feudalised_desc:0 "Votre vassal[ROOT.Char.Custom('FR_E')], [ROOT.Char.GetShortUIName], a abandonné son [GetGovernment( 'pirate_government' ).GetNameNoTooltip] au profit d'un [GetGovernment( 'lp_feudal_government' ).GetNameNoTooltip]"
 all_pirate_holding_will_change:0 "Toutes les [pirate_den_holdings|El] dans le pays deviendront des [castle_holdings|El]"
 agot_pirate_events.0001.t:0 "Une nouvelle ère"
 agot_pirate_events.0001.desc:0 "Nos vieilles méthodes nous ont été fort utiles, et cela nous ne l'oublierons jamais. Cependant, en tant que [ROOT.Char.GetTitleAsNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], j'en suis arrivé à la conclusion qu'il nous faut adopter les principes du féodalisme si nous avons à cœur de prospérer. C'est la prochaine étape cruciale de notre périple vers la grandeur !"
 agot_pirate_events.0001.a:0 "Longue vie à [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] !"
 agot_pirate_events.0002.opening:0 "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_adopt_kneeler_ways_decision:0 "Se conformer aux coutumes suderonnes"
 agot_adopt_kneeler_ways_decision_desc:0 "La vie dans l'étendue gelée du grand nord a fait de nous des gens impitoyables et inflexibles, très différents de ceux qui vivent de l'autre côté du Mur. Mais maintenant que nous avons élu domicile parmi eux, il serait sans doute avisé de nous acclimater plutôt que de nous obstiner. Embrassant leurs us et coutumes et faisons de leur loi les nôtres."
 agot_adopt_kneeler_ways_decision_confirm:0 "Le temps est venu de fléchir le genou"
 agot_adopt_kneeler_ways_decision_tooltip:0 "Votre peuple adoptera les coutumes des sujets du Trône de Fer. Cela facilitera les interactions avec les dirigeants suderons, tel que le mariage, mais à l'inverse, cela pénalisera celles avec le peuple libre."
 is_culture_head:0 "Vous êtes le chef de votre culture"
 hybridized_with_kneelers:0 "Votre culture a été hybridée avec une culture suderonne"
 capital_south_of_the_wall:0 "Votre capitale est au sud du Mur"
 agot_major_decisions_events.1003.t:0 "De l'autre côté…"
 agot_major_decisions_events.1003.desc:0 "Après maintes générations à avoir souhaité s'arracher aux conditions rudes d'une existence passée au nord du Mur, voilà que l'opportunité se présente. Si le Grand Nord a fait de nos anciens un peuple fort et robuste, le climat plus doux du sud nous offrira une vie plus longue et agréable. Ce que nous perdrons en force, nous le gagnerons en confort. Nos ancêtres ne nous le pardonneront peut-être pas, mais nos descendants nous remercieront pour cela, et c'est pour eux que je prends cette décision. Pour tous les futurs [ROOT.Char.GetCulture.GetCollectiveNoun] à naître !"
 agot_major_decisions_events.1003.a:0 "Levons nos coupes ! À un futur plus radieux !"
 every_freefolk_ruler_tt:0 "Chaque chef du peuple libre"
 agot_converting_to_admin_kings_become_lp_feudal:0 "Chaque [vassal|El] de [title_tier|El] [Concept('kingdom','royal')|E] adoptera la [GetGovernment( 'lp_feudal_government' ).GetName] comme [government|El]."
 become_landless_pirate_decision:0 "Adopter le mode de vie des pirates"
 become_landless_pirate_decision_desc:0 "J’ai eu mon content de simple rapine et de vulgaire briganderie, mais écumer les terres en bringuebalant un campement miteux n’est pas une fin en soi. [Select_CString(ROOT.Char.IsFemale,'Toute vaurienne','Tout vaurien')] que je sois, j’aspire à bien plus que ça. Un navire redouté sous mes ordres, un équipage de fripouille et de canaille à mes côtés, et la liberté comme seul horizon devant moi, voilà mon ambition."
 become_landless_pirate_decision_tooltip:0 "Changer le type de [government|El] en [GetGovernment( 'pirate_government' ).GetName]"
 become_landless_pirate_decision_confirm:0 "Il est temps de prendre le large."
 agot_located_in_pirating_region:0 "Vous devez vous trouver dans une région où la piraterie règne, tels que les [GetGeographicalRegion('world_stepstones').GetName]."
 become_landless_pirate_decision_tt:0 "Vous devenez un [pirate_govt|El] sans terre"
 abandon_pirate_holdings_decision:0 "Répondre à l’appel de la mer"
 abandon_pirate_holdings_decision_desc:0 "Des rochers couverts de merde de mouettes et des grottes lugubres, je n’appelle pas ça un pays, encore moins un foyer. Perdre son temps avec les doléances, écouter les flagorneurs, tout ça c’est du gueuleton pour nobliaux et roitelets affamés de viles flatteries. Ce dont j’ai faim moi, c’est de liberté, de celle qui vous transporte au gré du vent et des humeurs. Je n’ai qu’un ordre à donner, et cette liberté sera mienne !"
 abandon_pirate_holdings_decision_tooltip:0 "Abandonner vos [titles|El] et votre condition de [ruler|El] pour ne garder que votre [agot_landless_pirate_domicile|El] et votre esprit d’aventure"
 abandon_pirate_holdings_decision_confirm:0 "Hissez la grand'voile !"
 agot_pirate_higher_tier_title_decision:0 "[ROOT.Char.Custom('GetDominateTitleLoc')]"
 agot_pirate_higher_tier_title_decision_title:0 "Dominer [ROOT.Char.GetPrimaryTitle.GetDeJureLiege.GetBaseNameNoTierNoTooltip]"
 agot_pirate_higher_tier_title_decision_desc:0 "Chez les pirates, s’il y a bien une loi qui prévaut plus que toutes autres, c’est celle du plus fort. Il est temps pour moi d’asseoir ma domination sur ces contrées et d’assujettir leurs habitants."
 agot_pirate_higher_tier_title_decision_tooltip:0 "Tenter de gagner un [title|El] de [title_tier|El] plus élevé"
 agot_pirate_higher_tier_title_decision_confirm:0 "Tout le monde à son poste !"
 agot_become_landed_pirate_decision:0 "Embrasser la piraterie"
 agot_become_landed_pirate_decision_desc:0 "Lorsque je vois toutes ces fripouilles, ces canailles, ces maraudeurs et ces vauriens qui prolifèrent et prospèrent sur ces eaux, j’en viens à envisager que leur mode de vie a peut-être quelque chose de plus que les autres. Il est temps de me libérer du carcan de la petitesse aristocratique et d’embrasser une vie de liberté où je n’aurais à répondre d’aucune loi, pas même celle [ROOT.Char.GetFaith.HighGodNameAlternatePossessive]."
 agot_become_landed_pirate_decision_tooltip:0 "Abandonner votre type de [government|El] pour devenir [pirate_govt|El]"
 agot_become_landed_pirate_decision_confirm:0 "Saluez tous le capitaine [ROOT.Char.GetFirstNameNoTooltip] !"
 agot_become_landed_pirate_decision_shatter_realm_tt:0 "Tous vos titres en dehors de votre [primary_title|El] seront abandonnés à des dirigeants locaux"
 agot_become_landed_pirate_decision_gain_tributaries_tt:0 "Tous les dirigeants de vos anciens titres deviendront vos [tributaries|El]."
 agot_become_landed_pirate_decision_holding_reset_tt:0 "Votre [holding|El] principale deviendra un [pirate_den_holding|El]."