l_french:
 decision_group_type_appearance:0 "Décisions d'apparence"
 agot_dye_hair_decision:0 "Se teindre les cheveux"
 agot_dye_hair_decision_desc:0 "J'ai gardé ma couleur de cheveux actuelle trop longtemps ; c'est devenu trop familier et lassant ! Il est grand temps que je choisisse une nouvelle teinte."
 agot_dye_hair_decision_effect:0 "Plusieurs nuances de teintures vous seront proposées."
 agot_dye_hair_decision_tooltip:0 "Teindre vos cheveux avec une nouvelle couleur"
 agot_dye_hair_decision_confirm:0 "Il est temps de changer d'allure !"
 agot_buy_eye_gem_decision:0 "Acheter un œil de gemme"
 agot_replace_eye_gem_decision:0 "Remplacer votre œil de gemme"
 agot_buy_eye_gem_desc:0 "Être dépourvu d’un œil ne signifie pas être dépourvu d’allure. Je vais faire quérir un artisan et choisir une pierre précieuse pour orner cette affreuse cavité béante."
 agot_buy_eye_gem_decision_tooltip:0 "Achetez une gemme pour remplacer votre œil perdu"
 agot_buy_eye_gem_decision_confirm:0 "Choisir une gemme"
 agot_buy_eye_gem_decision_next_stop_button:0 "Apportez-moi les plus belles pierres précieuses !"
 agot_remove_eye_gem_decision:0 "Retirer votre œil de gemme"
 agot_remove_eye_gem_desc:0 "Cette pierre précieuse est devenue un peu trop extravagante à mon goût. Je vais faire confectionner un nouveau cache-œil pour un faciès moins… tape-à-l'œil."
 agot_remove_eye_gem_decision_tooltip:0 "Privilégiez un cache-œil plutôt qu'une gemme pour votre œil manquant"
 agot_remove_eye_gem_decision_effect:0 "Votre œil de gemme sera #N retiré#! et vous utiliserez à nouveau un cache-œil."
 agot_remove_eye_gem_decision_confirm:0 "Faites quérir un artisan."
 replace_eye_gem_option_red:0 "Rubis"
 replace_eye_gem_option_orange:0 "Citrine"
 replace_eye_gem_option_yellow:0 "Topaze"
 replace_eye_gem_option_green:0 "Émeraude"
 replace_eye_gem_option_blue:0 "Lapis-lazuli"
 replace_eye_gem_option_dark_blue:0 "Saphir"
 replace_eye_gem_option_purple:0 "Améthyste"
 replace_eye_gem_option_black:0 "Obsidienne"
 replace_eye_gem_option_white:0 "Diamant"
 has_eye_gem_red_tooltip:0 "Un #BOLD;COLOR:{0.48,0.05,0.09} rubis#!, d'un rouge profond et ardent, extrait dans les Îles d'Été."
 has_eye_gem_orange_tooltip:0 "Une #BOLD;COLOR:{1.00,0.44,0.00} topaze#!, aussi brillante que de l'ambre et scintillante que le feu."
 has_eye_gem_yellow_tooltip:0 "Une #BOLD;COLOR:{0.89,0.84,0.10} citrine#!, étincelante comme le soleil au zénith, et aussi vive que rayonnante."
 has_eye_gem_green_tooltip:0 "Une #BOLD;COLOR:{0.12,0.3,0.18} émeraude#!, d'un vert vibrant telle les profondeurs de Sothoryos."
 has_eye_gem_blue_tooltip:0 "Une #BOLD;COLOR:{0.28,0.52,0.9} lapis-lazuli#!, d'un bleu clair qui évoque la Mer d'Été."
 has_eye_gem_dark_blue_tooltip:0 "Un #BOLD;COLOR:{0.11,0.20,0.8} saphir#!, d'un bleu aussi profond que l'est un éclat de minuit."
 has_eye_gem_purple_tooltip:0 "Une #BOLD;COLOR:{0.35,0.00,0.45} améthyste#!, d'un mauve si caractéristique qu'il semble raviver la mémoire des seigneurs dragons d'autrefois."
 has_eye_gem_black_tooltip:0 "Une #BOLD;COLOR:{0.35,0.35,0.35} obsidienne#!, sombre et réfléchissante, plus connue sous le nom de verredragon."
 has_eye_gem_white_tooltip:0 "Un #BOLD;COLOR:{0.93,0.93,0.93} diamant#!, clair et brillant. Un choix d'exception pour un[THIS.Char.Custom('FR_E')] [THIS.Char.GetTitleAsNameNoTooltip|l] d'exception."
 agot_wear_the_mask_decision:0 "Revêtir un masque"
 agot_wear_the_mask_decision_tooltip:0 "Utilisez un masque pour cacher votre défiguration aux yeux du monde"
 agot_wear_the_mask_decision_desc:0 "Ce minois autrefois si plaisant ne m'inspire plus que du dégoût désormais, et je refuse de laisser le monde contempler ce camouflet qui a si salement rudoyé ma fierté [Select_CString(ROOT.Char.IsFemale,'de femme','d’homme')]."
 agot_wear_the_mask_decision_confirm:0 "Apportez-moi un masque !"
 agot_remove_the_mask_decision:0 "Retirer mon masque"
 agot_remove_the_mask_decision_tooltip:0 "Retirez votre masque et n'ayez plus honte d'afficher votre disgrâce aux yeux du monde"
 agot_remove_the_mask_decision_desc:0 "En y réfléchissant bien, pourquoi devrais-je me cacher derrière un masque ? Pourquoi la honte devrait-elle m'envahir pour avoir survécu à ce qui en aurait terrassé plus d'un ? Je n'ai pas besoin d'un morceau de métal pour me protéger des railleries de mes ennemis."
 agot_remove_the_mask_decision_confirm:0 "Que tombe le masque !"
 agot_change_eye_patch_decision:0 "Choisir un cache-œil"
 agot_change_eye_patch_decision_tooltip:0 "Choisissez un cache-œil pour masquer votre œil manquant"
 agot_change_eye_patch_desc:0 "Être dépourvu d’un œil ne signifie pas être dépourvu d'allure. Je vais faire quérir un artisan et choisir un cache-œil pour orner cette affreuse cavité béante."
 agot_change_eye_patch_decision_confirm:0 "Choisir un cache-œil"