l_french:
 settle_wilderness_county_or_duchy_decision:0 "Coloniser la région"
 settle_wilderness_county_or_duchy_decision_desc:0 "Je n'ai pas pour ambition de mener une vie aventureuse pour le restant de mes jours. Ce n'est qu'un chapitre dans le long récit de mon existence, et il est temps de le clore. Ici, dans cette région déserte où nulle voix d'un quelconque monarque ne résonne, je pourrais établir les fondements d'un nouveau royaume en devenir."
 settle_wilderness_county_or_duchy_decision_tooltip:0 "Entamez la colonisation de la région pour vous approprier l'[wilderness|El] afin d'en faire votre [domain|El] et devenir un [ruler|El] [landed|El]."
 settle_one_county:0 "Coloniser immédiatement le [county|El]"
 settle_one_county_tooltip:0 "$settle_one_county$"
 settle_one_county_desc:0 ""
 settle_duchy:0 "Tenter de coloniser le [duchy|El]"
 settle_duchy_tooltip:0 "$settle_duchy$"
 settle_duchy_desc:0 ""
 settle_wilderness_county_or_duchy_decision_confirm:0 "Il est temps de bâtir un foyer."
 settle_wilderness_county_or_duchy_basic_effect:0 "Vous pourrez coloniser #P 1#! [county|El] pour chaque tranche de #V 100#! [GetMaA('laamp_settler_maa').GetName|l] que vous possédez"
 settle_wilderness_county_or_duchy_current_settle_limit_effect:0 "Nombre actuel de comtés pouvant être colonisés : #V [GetPlayer.MakeScope.ScriptValue('agot_settle_wilderness_as_adventurer_county_limit')]#!"
 settle_wilderness_county_or_duchy_destroy_maa_effect:0 "Les régiments de [GetMaA('laamp_settler_maa').GetName|l] seront détruits !"
 settle_wilderness_county_or_duchy_not_enough_maa_tt:0 "Vous n'avez pas assez d'[men_at_arms|El]\n#low Un nombre minimum de 300 [GetMaA('laamp_settler_maa').GetName|l] est requis#!"
 settle_wilderness_duchy_has_underground_counties:0 "Des comtés souterrains au sein de ce [duchy|El] ne seront #N pas#! colonisés."
 settle_wilderness_county_as_pirate_basic_effect:0 "Les pirates sans terre peuvent coloniser gratuitement jusqu’à un compté dans les régions où la piraterie règne traditionnellement."