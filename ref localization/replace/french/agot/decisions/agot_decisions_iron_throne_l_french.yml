l_french:
 agot_proclaim_iron_throne:0 "Proclamer le Trône de Fer"
 agot_proclaim_iron_throne_tooltip:0 "Unifiez le pays sous l'égide du Trône de Fer."
 agot_proclaim_iron_throne_desc:0 "Le Trône de Fer a longtemps été un symbole d'unité et de pouvoir à Westeros. Les innombrables petits fiefs du royaume ayant été rassemblés sous notre bannière, le moment est peut-être venu de rassembler à leur tour les lames des vaincus et de forger un nouveau Trône de Fer pour le bien du royaume.\n\nMais aurais-je la force, la ruse et la volonté suffisantes pour ainsi revendiquer un tel pouvoir, et faire de la Maison [ROOT.Char.GetHouse.GetName] l'unique et véritable maison souveraine des Sept Couronnes ?"
 agot_proclaim_iron_throne_confirm:0 "Envoyez les corbeaux"
 set_capital_kingslanding_decision:0 "Réclamer Port-Réal"
 set_capital_kingslanding_decision_tooltip:0 "Restaurez Port-Réal comme [capital|El] de votre pays."
 set_capital_kingslanding_decision_desc:0 "Port-Réal est la capitale légitime du Trône de Fer, et à ce titre, elle m'appartient."
 set_capital_kingslanding_decision_confirm:0 "Mon titre, mon trône !"
 build_dune_road_decision:0 "Construire la route des dunes"
 build_dune_road_decision_tooltip:0 "Lancez la construction d'une grande route s'étendant d'Accalmie jusqu'à Lancehélion, afin d'accroître la production d'[gold|El] de tous les [counties|El] par lesquels elle passera."
 build_dune_road_decision_desc:0 "La construction d'une grande route qui relierait directement [GetTitleByKey('b_storms_end').GetNameNoTier] à [GetTitleByKey('b_sunspear').GetNameNoTier] permettrait de faire fructifier le commerce, apportant richesse et prospérité à toutes les terres qui bénéficieraient de sa présence."
 build_dune_road_decision_confirm:0 "Lancez la construction."
 agot_minor_decisions_events.0003.t:0 "La route des dunes"
 agot_minor_decisions_events.0003.desc:0 "[top_liege.Custom('FR_le_Char_P')|U][top_liege.GetFullNameNicknamedRegnal] a ordonné la construction d'une route reliant Accalmie à Lancehélion afin de favoriser le commerce entre les puissantes Terres de l'Orage et les fières contrées de Dorne."
 agot_minor_decisions_events.0003.a:0 "Que voilà une royale nouvelle !"
 agot_dune_road_modifier:0 "Route des dunes"
 agot_dune_road_modifier_desc:0 "Ce comté se situe le long de la grande route qui relie Accalmie à Lancehélion, ce qui contribue grandement au commerce, et donc à sa prospérité."