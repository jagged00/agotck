l_french:
 agot_mega_war_declare_independence_decision:0 "Déclarer l'indépendance"
 agot_mega_war_declare_independence_decision_desc:0 "Il est temps de déclarer mon indépendance [ROOT.Var('pre_war_liege').Char.Custom('FR_au_Char_Pi')][ROOT.Var('pre_war_liege').Char.GetTitledFirstName] ! Je ne suis pas sans savoir que faire sécession va très probablement m'attirer ses foudres, et conduire à une escalade qui poussera mes propres vassaux à reconsidérer leur loyauté, mais si c'est le prix à payer pour nous libérer du joug de la Maison [ROOT.Var('pre_war_liege').Char.GetHouse.GetName], alors qu'il en soit ainsi."
 agot_mega_war_declare_independence_decision_tooltip:0 "Vous obtiendrez l'indépendance complète pour vos terres… ou deviendrez un[THIS.Char.Custom('FR_E')] rebelle dans une [war|El] contre votre lige."
 agot_mega_war_declare_independence_decision_confirm:0 "Le moment est venu !"