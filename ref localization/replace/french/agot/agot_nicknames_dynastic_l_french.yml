 agot_nicknames.9000.t:0 "Le blason ne fait pas la maison"
 agot_nicknames.9000_desc:0 "Les grandes maisons s'enorgueillissent de leur blason, autant les loups que les lions, les krakens que les ponts. Toutes se gargarisent d'une identité propre, de symboles qui sont le reflet de leur nature ou de leur histoire. Mais tout cela n'est que poudre aux yeux.\n\nLa Maison [ROOT.Char.GetHouse.GetName], elle, sera différente. Lorsque nos bannières seront levées nous imprègneront de terreur le cœur de nos ennemis, et d'inspiration, celui de nos alliés. Les futures générations sauront que nous avons choisi pour emblème le…\n\n#help Le mot choisi sera utilisé dans divers modèles pour créer les surnoms dynastiques de votre maison.\n\nex. « le X Noir » « le X Rouge »\n\n(Il est conseillé d'utiliser un nom masculin pour un meilleur résultat en français.)#!"
 Dynasty_Nickname_Text:0 "[GetGlobalVariable('maester').Char.GetLocalizedText('dynastic_nickname')]"
 agot_nicknames.9000.a:0 "Que résonne notre blason !"
