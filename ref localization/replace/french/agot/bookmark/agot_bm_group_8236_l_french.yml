 agot_bm_group_8236:0 "236 Ap.C."
 bookmark_236_lyonel_baratheon:0 "Lord Lyonel"
 bookmark_236_lyonel_baratheon_subheading:0 "Suzerain des Terres de l’Orage"
 bookmark_236_lyonel_baratheon_desc:0 "[Concept( 'story_content_lyonel_baratheon_236', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_lyonel_baratheon_236', '$bm_story_content_available_copy|q$' )|E]\nHomme à la silhouette charpentée et à l'esprit déluré, Lord Lyonel Baratheon, ainsi nommé « l'Orage Moqueur », brilla aux yeux de tous lors du tournoi de Cendregué de l'an 209, avant qu'une nuée de noirceur ne se profile, en la personne du prince Aegon, désireux de le voir prêter main forte à Ser Duncan le Grand dans son Jugement des Sept contre le prince Aerion. La victoire lui fut acquise, mais la rançon d'un tel triomphe fut lourde à payer. Bien des années plus tard, voilà qu'une nouvelle rébellion Feunoyr semble inéluctable, mais dans l'espoir de sceller une alliance, le désormais roi Aegon espère fiancer son fils héritier, le Prince Duncan, à la fille de Lord Lyonel.\n\n#bold Alors que les dieux semblent se gausser du seigneur luron en l'enjoignant à combattre à nouveau un dragon, sera-t-il une fois encore victorieux ?#!"
 bookmark_236_ormund_baratheon:0 "Ormund"
 bookmark_236_cassandra_baratheon:0 "Cassandra"
 bookmark_236_aegon_targaryen:0 "Roi Aegon V"
 bookmark_236_aegon_targaryen_subheading:0 "Seigneur des Sept Couronnes"
 bookmark_236_aegon_targaryen_desc:0 "[Concept( 'story_content_aegon_v_236', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_aegon_v_236', '$bm_story_content_available_copy|q$' )|E]\nLe règne du roi Aegon V Targaryen a débuté par un hiver rigoureux, lequel l'a poussé à envoyer d'importantes cargaisons de vivres pour aider une population meurtrie par la faim. Un geste des plus bienveillants qui lui a attiré l'amour des petites gens, mais aussi apprécié puisse être un règne improbable, il s'en trouvera toujours pour le contester, et nombreux sont les seigneurs à réprouver ses réformes qui minorent leur pouvoir. C'est dans ce contexte où la Couronne s'en trouve fragilisée que l'on voit poindre une nouvelle noirceur par-delà le Détroit.\n\n#bold Lorsqu'un roi improbable s'attire les foudres de ses sujets, peut-il espérer rallier suffisamment de troupes pour défaire l'ascension d'un nouveau prétendant au trône ?#!"
 bookmark_236_duncan_targaryen:0 "Prince Duncan le Petit"
 bookmark_236_duncan_targaryen_subheading:0 "Prince de Peyredragon"
 bookmark_236_duncan_targaryen_desc:0 "Nommé d'après Ser Duncan « le Grand », mentor et ami de longue date du roi, Duncan « le Petit » est Prince de Peyredragon et héritier du Trône de Fer. Son père nourrit de grands projets à l'endroit de ses fiançailles, lesquelles renforceront les liens de la Maison Targaryen avec les grands seigneurs du royaume, et ainsi apaiseront les tensions causées par ses réformes. Mais le prince est garçon têtu, et si le père a pu se marier par amour, pourquoi le fils devrait-il le faire par devoir ?\n\n#bold Le prince Duncan mettra-t-il ses espoirs idylliques de côté, ou cherchera-t-il la demoiselle de son cœur au risque de tragiques conséquences pour le royaume ?#!"
 bookmark_236_jaehaerys_targaryen:0 "Prince Jaehaerys"
 bookmark_236_betha_blackwood:0 "Betha la Noire"
 bookmark_236_duncan_tall:0 "Ser Duncan"
 bookmark_236_gerold_lannister:0 "Gerold le Doré"
 bookmark_236_gerold_lannister_subheading:0 "Gouverneur de l’Ouest"
 bookmark_236_gerold_lannister_desc:0 "Sire de Castral Roc et Gouverneur de l'Ouest, Gerold Lannister accéda au pouvoir par un mystérieux concours de circonstance où son frère Tybolt et sa nièce Cerelle moururent dans des conditions fort suspectes. Qualifié de parricide, à tort ou à raison, il fut vilipendé par son peuple autant que par ses sujets, mais pour autant, son règne n'en demeura pas moins prospère, et celui que l'on nomme « le Doré » parvint à enrichir davantage la Maison Lannister, tant en terme d'or que d'influence. Mais désormais cloué au lit, l'éclat s'en trouve terni, et les rênes de son fief semblent entre les mains de l'ambitieuse Lady Elyn Reyne, épouse de son fils et héritier, Tion.\n\n#bold Bien que diminué, le lion d'or parviendra-t-il à se défaire des griffes du lion rouge, longues et acérées, qui s'enfoncent peu à peu dans les fondements du Roc ?#!"
 bookmark_236_ellyn_reyne:0 "Ellyn"
 bookmark_236_tion_lannister:0 "Ser Tion"
 bookmark_236_bittersteel:0 "Capitaine Général Aegor"
 bookmark_236_bittersteel_subheading:0 "Capitaine Général de la Compagnie Dorée"
 bookmark_236_bittersteel_desc:0 "[Concept( 'story_content_bittersteel_236', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_bittersteel_236', '$bm_story_content_available_copy|q$' )|E]\nHabité d'une furie passionnelle, Aegor, le bien nommé « Aigracier », a fait sienne une renommée qui ne souffre d'aucune frontière. Redoutable capitaine général de la non moins redoutable Compagnie Dorée, il a ceint Daemon III Feunoyr d'une couronne pour légitimer sa revendication sur le Trône de Fer, et les voilà tous deux à l'orée d'une invasion dont Westeros semble désormais coutumière. Mais cette fois, peut-être que la puissance de l'or et du noir combinés sera suffisante pour déchoir le dragon rouge de son siège.\n\n#bold Quand l'aigreur se fait plus âpre à chaque nouvelle défaite, un commandant, même émérite, peut-il encore espérer triompher ?#!"
 bookmark_236_daemon_blackfyre:0 "Roi Daemon III"
 bookmark_236_daemon_blackfyre_subheading:0 "Prétendant Feunoyr"
 bookmark_236_daemon_blackfyre_desc:0 "[Concept( 'story_content_daemon_blackfyre_236', '$bm_story_content_available_icon|q$' )|E] [Concept( 'story_content_daemon_blackfyre_236', '$bm_story_content_available_copy|q$' )|E]\nFils aîné d'Haegon Ier, Daemon Feunoyr troisième du nom a été couronné par Aegor « Aigracier » à Tyrosh. Désormais à la tête d'un ost de chevaliers et de guerriers exilés des cités libres, il s'apprête à traverser le Détroit pour cingler vers le couchant, où l'attend le trône légitime de sa maison. S'il bénéficie du soutien de taille du capitaine général de la Compagnie Dorée, il lui faudra encore rallier maints seigneurs à travers Westeros pour espérer mettre un terme au décours que subit le dragon noir depuis déjà quarante longues années.\n\n#bold Alors que les rébellions se succèdent, celle-ci marquera-t-elle l'aube d'une nouvelle ère, ou ne sera-t-elle qu'une page de plus d'un sordide chapitre de l'Histoire des Sept Couronnes ?#!"
 bookmark_236_maelys:0 "Maelys le Monstrueux"
 bookmark_236_aemond_blackfyre:0 "Prince Aemon"