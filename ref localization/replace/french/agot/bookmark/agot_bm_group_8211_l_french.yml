 agot_bm_group_8211:0 "211 Ap.C."
 agot_bm_8211:0 "Après le Printemps"
 agot_bm_8211_desc:0 "Durant près de deux années, le Fléau de Printemps ravagea Westeros, laissant derrière lui des dizaines de milliers de victimes, qu'ils fussent grands seigneurs dans leurs hauts châteaux ou petites gens dans leurs humbles masures. Parmi les morts on déplora celle du roi Daeron, dit le Bon, ainsi que de son petit-fils et héritier, le prince Valarr, et alors que ce fut le puîné du roi, Aerys, qui lui succéda en tant que Seigneur des Sept Couronnes, ce dernier s'attira l'ire de son cadet, Maekar, en nommant Brynden ‘Freuxsanglant’ comme Main du Roi.\n\nAinsi, le Prince de Lestival retourna dans son fief, l'humeur maussade et l'esprit encore rongé par son fratricide survenu lors du tristement célèbre tournoi de Cendregué, tandis que son quatrième fils, le tout jeune prince Aegon, voyage avec pour mentor un chevalier errant que l'on nomme Ser Duncan le Grand.\n\n#bold Depuis les rues crasses et malfamées de Culpucier, le naguère prénommé Dunk continuera-t-il son ascension jusqu'à atteindre les hautes salles des seigneurs, princes et rois, en chair ou en balades ?#!"
 bookmark_211_daemon_blackfyre:0 "Daemon II"
 bookmark_211_daemon_blackfyre_subheading:0 "Le dragon rêveur"
 bookmark_211_daemon_blackfyre_desc:0 "Quinze années auparavant, Daemon Feunoyr premier du nom s'insurgea contre son demi-frère Targaryen, le roi Daeron deuxième du nom, périssant avec ses deux fils aînés lors de la bataille du Champ d'Herberouge, pour ne laisser que son troisième fils, Daemon, comme héritier des prétentions Feunoyr sur les Sept Couronnes. Au sortir du Fléau de Printemps, le roi mort et le royaume meurtri, aube peut-être l'occasion rêvée pour le Dragon Noir de revendiquer ce qui lui revient de droit. Mais est-il vraiment en mesure de réclamer l'héritage de son sang quand son propre oncle, le bien nommé 'Aigracier', se refuse à lui céder l'épée et la couronne de son paternel.\n\n#bold Le Jeune peut-il trouver la victoire là où le père a trouvé la mort, et ainsi réussir à placer la véritable lignée d'Aegon IV sur le Trône de Fer ?#!"
 bookmark_211_bittersteel:0 "Prince Aegor ‘Aigracier’"
 bookmark_211_duncan_tall:0 "Ser Duncan le Grand"
 bookmark_211_duncan_tall_subheading:0 "L’épée lige"
 bookmark_211_duncan_tall_desc:0 "Alors que deux années se sont écoulées depuis la tragique mort du prince Baelor, dit Briselance, à Cendregué, Duncan a poursuivi ses pérégrinations avec le prince Aegon, lui-même fils du prince Maekar. Lorsque le Fléau s'est abattu sur Westeros, le chevalier et son écuyer trouvèrent refuge à Dorne, laquelle fut épargnée par le chancre qui ravagea cinq des sept Couronnes. De chevalier errant à épée lige, le voilà désormais au service du vieux Ser Eustace Osgris à Piéferme.\n\n#bold Est-ce toujours l'honneur qui guide les pas du gamin de Culpucier, ou bien l'homme fait chevalier a-t-il désormais de plus hautes ambitions que d'être le tuteur du quatrième fils d'un quatrième fils ?#!"
 bookmark_211_egg:0 "L'Œuf"
 bookmark_211_rohanne_webber:0 "Lady Rohanne"
 bookmark_211_rohanne_webber_subheading:0 "Dame de Froide-Douve"
 bookmark_211_rohanne_webber_desc:0 "Si comme d'aucuns l'affirment, le chaos est une échelle, nul doute que le Fléau de Printemps aura permis à certains et certaines de s'élever. Son père n'ayant laissé aucun héritier mâle, Rohanne Tyssier s'est vue devenir héritière de Froide-Douve, mais si sa position semble assurée, une ombre plane sur son règne car feu Lord Tyssier aura exigé une condition envers sa fille : trouver un cinquième époux, ou son titre reviendra à l'un de ses cousins. Mais plus que cette obligation, ce sont les ombres des ambitieux et des arrivistes qui l'enserrent de toutes parts.\n\n#bold Placée au centre d'une toile de pouvoir, la Veuve Rouge saura-t-elle tisser un destin enviable, ou bien se retrouvera-t-elle enchevêtrée dans les conspirations de ses ennemis ?#!"
 bookmark_211_longinch:0 "Ser Lucas ‘Double-Flandrin’"
 bookmark_211_eustace_osgrey:0 "Ser Eustace"
 bookmark_211_eustace_osgrey_subheading:0 "Chevalier de Piéferme"
 bookmark_211_eustace_osgrey_desc:0 "La Rébellion Feunoyr aura coûté bien cher à Eustace Osgris. Son soutien envers le Dragon Noir l'ayant dépossédé de ses fils, sa femme, sa fille et de tout espoir. D'une maison jadis bien fière, il n'en reste qu'un maigre reliquat, et n'ayant pour fief qu'une tour, l'homme grisonnant et endeuillé n'a guère plus que la patience pour l'accompagner jusqu'au soir de sa vie. Sa faiblesse apparente laissant certains entrevoir l'opportunité de spolier un chevalier vieillissant du peu qui lui reste, ce dernier devra compter sur ses deux épées liges pour l'épauler : Ser Bennis au Bouclier Brun et Ser Duncan le Grand.\n\n#bold Retranché dans une piteuse tour d'ivoire, le lion échiquetée a-t-il les griffes encore suffisamment aiguisées pour tenir éloigné les vautours qui souhaitent se repaître de la carcasse de sa maison ?#!"
 bookmark_211_bennis:0 "Ser Bennis au Bouclier Brun"