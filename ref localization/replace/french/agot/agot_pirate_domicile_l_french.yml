l_french:
 agot_pirate_ship_domicile_type:0 "$game_concept_agot_landless_pirate_domicile$"
 agot_pirate_ship_domicile_title:0 "$agot_pirate_ship_domicile_type$ de [CHARACTER.GetFirstNameNoTooltip]"
 agot_pirate_ship_domicile_type_tooltip:0 "$agot_pirate_ship_domicile_type$"
 agot_pirate_ship_move_desc:0 "Déplacer votre navire."
 game_concept_agot_landless_pirate_domicile:0 "Navire pirate"
 game_concept_agot_landless_pirate_domiciles:0 "Navires pirates"
 game_concept_agot_landless_pirate_domicile_desc:0 "[domicile|E] exclusif au [Concept('government_form','gouvernement')|E] [pirate_govt|El], les $game_concept_agot_landless_pirate_domiciles|l$ sont autant utilisés par les [characters|El] ayant des terres que par ceux sans terre. Les pirates à la tête d'un [realm|El] ne peuvent pas déplacer leur navire hors de leur [capital|El], tandis que ceux sans terre ne peuvent uniquement le déplacer qu'entre les [pirate_den_holdings|El], les [settlement_holdings|El] et les [wilderness_holdings|El].\n\nLorsqu'un navire est déplacé vers un nouveau $game_concept_pirate_den|l$, son capitaine doit s'acquitter d'un droit d'amarrage, d'une taxe annuelle et devra rejoindre toutes les guerres défensives du propriétaire du [county|El].\n\nLe montant des [pirate_port_rates|El] est évalué selon les [laws|El] en vigueur."
 agot_cannot_become_adventurer_as_pirate_with_valid_relocation_target:0 "Ne doit pas avoir de destinations de voyage valides en tant que propriétaire sans terre d'un [agot_landless_pirate_domicile|El]"
 game_concept_pirate_dominate_title:0 "Dominer le titre"
 game_concept_pirate_domination_war:0 "Guerre de domination pirate"
 game_concept_pirate_dominate_title_desc:0 "Les [pirate_govt|El] souhaitant obtenir un [title|El] de [title_tier|El] supérieur doivent entrer en [war|El] contre ceux qui y habitent pour en prendre possession.\n\nSi le titre en question est détenu par un [ruler|El], c'est contre ce dernier que la guerre sera déclarée pour l'usurper. Dans le cas contraire, ce sera contre tous les dirigeants non-[tributaries|El] et non-[allies|El] situés dans le territoire [de_jure|El] du titre.\n\nEn cas de victoire, l'attaquant s'empare du titre et tous les défenseurs deviennent ses tributaires. En cas de défaite, l'attaquant devra verser une compensation en [gold|El][gold_i] et subira une perte importante de [dread|El][dread_i]\n\nEn cas de contrôle intégral du territoire de jure, le titre est immédiatement acquis."
 pirate_domination_war_holder_custom_tooltip:0 "Débuter une [pirate_domination_war|El] contre [main_defender.Custom('FR_le_Char_U_Pi')][main_defender.GetShortUIName] pour lui ravir [title_scope.GetNameNoTier] #weak ([main_defender.MakeScope.ScriptValue('dominate_title_current_ally_strength')|N0]@soldier_icon!)#!"
 pirate_domination_war_no_holder_custom_tooltip:0 "Débuter une [pirate_domination_war|El] contre [main_defender.Custom('FR_le_Char_U_Pi')][main_defender.GetShortUIName] pour lui ravir [title_scope.GetNameNoTier]\n\t$BULLET$Tous les [holders|El] d'un [county|El] [de_jure|El] situé dans [title_scope.GetNameNoTier] qui ne sont ni [tributary|El] ni [ally|El] se joindront [main_defender.Custom('FR_au_Char_U_Pi')][main_defender.GetShortUIName] en tant que défenseur #weak ([root_scope.MakeScope.ScriptValue('dominate_title_current_enemy_strength')|N0]@soldier_icon!)#!"
 agot_raid_pirate_domicile:0 "Pillage du $agot_pirate_ship_domicile_type|l$"
 agot_raid_pirate_domicile_desc:0 "[SCHEME.Custom('FR_le_Char_U_Pi')|U][SCHEME.GetTargetCharacter.GetShortUIName|U] est devenu[SCHEME.GetTargetCharacter.Custom('FR_E')] une nuisance à qui il serait bon de rappeler sa place."
 agot_raid_pirate_domicile_desc_general:0 "[hostile_scheme|E] visant à piller le [Concept('agot_landless_pirate_domicile','navire')|E] d’un autre pirate et qui repose sur l’[intrigue|El] et auquel on peut assigner des [agents|El].\n\nSon succès peut aboutir au vol de l’[gold|El] et des [artifacts|El] de la [Concept('scheme_target','cible')|E], au saccage de son navire, ainsi qu’à la [character_death_death|El] de ses [courtiers|El]."
 agot_raid_pirate_domicile_action:0 "$raid_estate_action$"
 start_pirate_raid_domicile_interaction:0 "Piller son navire"
 start_pirate_raid_domicile_interaction_desc:0 "Tenter de piller le [agot_landless_pirate_domicile|El] [recipient.Custom('FR_du_Char')][recipient.GetName]"
 start_pirate_raid_domicile_notification:0 "$agot_raid_pirate_domicile$"
 agot_raid_pirate_kill_courtiers_tt:0 "Les membres [recipient.Custom('FR_GetCourt_Du')] de [recipient.GetFirstName] pourraient être tués"
 agot_raid_pirate_destroy_buildings_tt:0 "Un [building|El] du [agot_landless_pirate_domicile|El] de [recipient.GetFirstNameNoTooltip] pourrait être détruit ou endommagé"
 agot_raid_pirate_ship_gain_coin_tt:0 "Vous obtiendrez de l’[gold|El]@gold_icon!"
 agot_raid_pirate_ship_gain_dread_tt:0 "Vous obtiendrez de la [dread|El]@dread_icon!"
 agot_raid_pirate_ship_gain_artifacts_tt:0 "Vous déroberez des [artifacts|El]@artifact_icon!"
 scheme_target_not_agot_pirate:0 "[target.Custom('FR_le_Char_Pi')|U][target.GetShortUIName|U] [Select_CString(target.IsLocalPlayer,'n’êtes','n’est')] pas propriétaire d’un [agot_landless_pirate_domicile|El]"
 scheme_owner_not_agot_pirate:0 "Vous n’êtes pas propriétaire d'un [agot_landless_pirate_domicile|El]"
 scheme_target_not_alive:0 "[target.Custom('FR_le_Char_Pi')|U][target.GetShortUIName|U] n’est pas en vie !"
 agot_raid_pirate_domicile_invalidated_title:0 "@scheme_icon!Fin du complot de pillage d'un navire pirate"
 AGOT_RAID_PIRATE_DOMICILE_SAME_COUNTY:0 "[Select_CString(Or(target.IsLocalPlayer, owner.IsLocalPlayer), 'Votre', 'Le')] [agot_landless_pirate_domicile|El][target.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] [owner.LocalPlayerString('', 'et celui')][owner.LocalPlayerString('et le votre', 'Loc_FR_du_GetShortUIName')] sont situés dans le même comté : $VALUE|+=0$"
 OWNER_DOMICILE_FORCASTLE_DESC:0 "Niveau du [GetDomicileBuilding('agot_forecastle_01').GetName|l] que possède [target.GetDomicile.GetName] : $VALUE|+=0$"
 RAID_PIRATE_SHIP_IN_SUBREALM_DESC:0 "Le [agot_landless_pirate_domicile|El] [target.Custom('FR_du_Char_U_Pi')][target.GetShortUIName] est dans votre [realm|El] : $VALUE|+=0$"
 RAID_PIRATE_SHIP_IN_HIGH_PORT_RATE_DESC:0 "[Select_CString(target.IsLocalPlayer,'Votre','Le')] [agot_landless_pirate_domicile|El][target.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] est amarré dans un [realm|El] avec des [pirate_port_rate|El] $pirate_tax_rate_04$ : $VALUE|+=0$"
 RAID_PIRATE_SHIP_ENDURING_HARDSHIPS_PERK_DESC:0 "[target.Custom('FR_le_Char_U_Pi')|U][target.GetShortUIName|U] [Select_CString(target.IsLocalPlayer,'possédez','posséde')] l’[perk|El] [GetPerk('enduring_hardships_perk').GetName(GetNullCharacter)|l] : $VALUE|+=0$"
 game_concept_pirate_port_rates:0 "Frais portuaires"
 game_concept_pirate_port_rate:0 "Frais portuaires"
 game_concept_pirate_port_rates_desc:0 "Il existe deux types de taxes dont doivent s'acquitter les [agot_landless_pirate_domiciles|El] à leur arrivée dans un port contrôlé par un [ruler|El] [pirate_govt|El].\n\nLa première est le droit d'amarrage, un #bold prélèvement unique#! que le capitaine du navire s'acquitte à son arrivée dans une [pirate_den_holding|El].\n\nLa seconde est une #bold taxe annuelle#!, des frais qui seront renouvelés tant que le navire mouille dans un même port.\n\nLe montant de ces taxes peut être modifié via les [laws|El]."
 game_concept_pirate_ship_designated_heir:0 "Héritier désigné du navire"
 game_concept_pirate_ship_designated_heirs:0 "Héritiers désignés du navire"
 game_concept_pirate_ship_designated_heir_desc:0 "[character|E] désigné pour hériter d’un [agot_landless_pirate_domicile|El].\n\nAucun lien de parenté avec le capitaine du navire n’est requis pour le devenir. Le seul prérequis nécessaire est d’être un [courtier|El] du capitaine.\n\nSeul un [ruler|El] [pirate_govt|El] peut désigner ce genre d’[heir|El]."
 agot_pirate_events.8032.desc:0 "Il est des invités que l’on accueille plus chaleureusement que d’autres, et les bonnes nouvelles concernant [target.GetFirstName] et [target.GetPrimaryTitle.GetNameNoTier] sont de ceux-là.\n\nC[target.Custom('FR_EEtte')] [target.Custom2('InsultNoun', ROOT.Char)] n’a rien vu venir"
 agot_pirate_events.8032.kill:0 "et [target.Custom('FR_IlElle')] devra porter le deuil de ses morts pour prix de sa stupidité !"
 agot_pirate_events.8032.fallback:0 "et [target.Custom('FR_IlElle')] devra souffrir la honte d’une telle rossée !"
 agot_pirate_events.8034.t:0 "Navire pillé"
 agot_pirate_events.8034.desc:0 "C’est encore le point du jour et déjà l’effroi me sort de ma torpeur matinière lorsque je découvre que des pillards ont frappé [target_domicile.GetName]."
 agot_pirate_events.8034.kill:0 "\n\nC’est déjà une terrible nouvelle en soi, mais à cela s’ajoute la mort de plusieurs personnes qui se trouvaient sur mon navire, massacrées comme du bétail par des chiens assoiffés de sang…"
 agot_pirate_events.8034.discovered:0 "\n\nTandis que les blessures sont pansées, nombreux sont les indices à laisser paraître que c’est là l’œuvre de ce[owner.Custom('FR_EEtte')] [owner.Custom2('InsultNoun', ROOT.Char)] de [owner.GetFirstName] !"
 agot_pirate_events.8033.desc:0 "Il est des invités que l’on aimerait pouvoir éconduire, et les mauvaises nouvelles concernant [target.GetFirstName] et [target.GetPrimaryTitle.GetNameNoTier] sont de ceux-là.\n\nJe ne sais comment, mais l’incursion a échoué et c[target.Custom('FR_EEtte')] [target.Custom2('InsultNoun', ROOT.Char)] s’en est tiré[target.Custom('FR_E')] à bon compte."
 agot_pirate_events.8033.captured:0 "\n\nPire encore, j'apprends que m[owner.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('captured'))], [captured.GetFirstName], a été [Select_CString(captured.IsFemale,'faite prisonnière','fait prisonnier')] lors de l'attaque…"
 agot_pirate_events.8033.fallback:0 "\n\nPar chance, la seule perte qu'il y eut dans cette attaque ratée, c'est le temps investi et vainement employé."
 create_pirate_ruler_designer:0 "Créer votre propre pirate sans terre"
 create_pirate_ruler_designer_tt:0 "Crée un pirate sans terre dans la province capitale du personnage sélectionné."
 create_pirate_ruler_designer_must_be_pirate_start_tt:0 "@warning_icon!#warning Impossible de créer un pirate sans terre dans un pays où la [Concept('pirate_govt','piraterie')|E] n'est pas présente#!"
 move_pirate_domicile_rules_tt:0 "Vous ne pouvez déplacer votre [agot_landless_pirate_domicile|El] qu’au sein des [pirate_dens|El], des [wildernesses|El] et des [settlement_holdings|El] situés dans les régions où la piraterie règne."
 trait_viking_is_corsair:0 "Corsaire"
 domicile_building_parameter_raids_less_likely_to_make_prisoners_pirate_1:0 "Le risque que des personnages situés dans le [Concept('agot_landless_pirate_domicile','navire')|E] soient faits [prisoners|El] lors des [raids|El] et les [sieges|El] hostiles est #bold légèrement diminué#!."
 domicile_building_parameter_raids_less_likely_to_make_prisoners_pirate_2:0 "Le risque que des personnages situés dans le [Concept('agot_landless_pirate_domicile','navire')|E] soient faits [prisoners|El] lors des [raids|El] et les [sieges|El] hostiles est #bold diminué#!."
 domicile_building_parameter_raids_less_likely_to_make_prisoners_pirate_3:0 "Le risque que des personnages situés dans le [Concept('agot_landless_pirate_domicile','navire')|E] soient faits [prisoners|El] lors des [raids|El] et les [sieges|El] hostiles est #bold grandement diminué#!."
 domicile_building_parameter_raids_less_likely_to_make_prisoners_sl_1:0 "Le risque que des personnages situés dans la [estate|El] soient faits [prisoners|El] lors des [raids|El] et les [sieges|El] hostiles est #bold légèrement diminué#!."
 domicile_building_parameter_raids_less_likely_to_make_prisoners_sl_2:0 "Le risque que des personnages situés dans la [estate|El] soient faits [prisoners|El] lors des [raids|El] et les [sieges|El] hostiles est #bold diminué#!."
 domicile_building_parameter_raids_less_likely_to_make_prisoners_sl_3:0 "Le risque que des personnages situés dans la [estate|El] soient faits [prisoners|El] lors des [raids|El] et les [sieges|El] hostiles est #bold grandement diminué#!."