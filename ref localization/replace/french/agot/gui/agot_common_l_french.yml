 DRAGON_DESIGNER_STORE_DNA_TOOLTIP:1 "#T Stocker l'ADN du dragon#!\nConserve les paramètres d'ADN actuels dans le personnalisateur.\n\n@warning_icon!#X Vous perdrez les paramètres si votre personnage meurt#!"
 DRAGON_DESIGNER_APPLY_DNA_TOOLTIP:1 "#T Appliquer l'ADN stocké#!\nApplique les paramètres d'ADN conservés dans le personnalisateur."
 DRAGON_DESIGNER_UNDO_DNA_TOOLTIP:1 "#T Annuler l'application d'ADN#!\nRestaure les paramètres d'origine dans le personnalisateur."
 DRAGON_DESIGNER_EXPORT_VALUES:0 "#T Copier le contenu de l'événement#!\nCopie le texte de l'événement dans votre presse-papiers.\n\nLe texte de l'événement contiendra un effet scripté prêt à être inséré dans un fichier #high import_dragon_dna.txt#!\n\n@warning_icon! #X Veuillez utiliser le bouton#! #T Regenerate event contents#! #X (le bouton de rafraîchissement situé à gauche de celui-ci) pour actualiser le texte de l'événement et obtenir les valeurs les plus récentes du personnalisateur#!"
 DRAGON_DESIGNER_IMPORT_VALUES:0 "#T Importer l'ADN d'un fichier#!\nAssurez-vous de suivre à la lettre les étapes ci-dessous avant d'utiliser ce bouton:\n$BULLET_WITH_TAB$Créez le dossier #high %USERPROFILE%/Documents/Paradox Interactive/Crusader Kings III/run#! dans le cas où il n'existerait pas.\n$BULLET_WITH_TAB$Créez un fichier #high import_dragon_dna.txt#! à l'intérieur du dossier #high run#!.\n$BULLET_WITH_TAB$Le fichier en question contient l'effet #high import_dragon_dna = {}#!\n\n@warning_icon! #X Veuillez noter que cela déclenchera tous les effets du fichier, assurez-vous de n'avoir que ce que vous souhaitez exécuter à l'intérieur.#!"
