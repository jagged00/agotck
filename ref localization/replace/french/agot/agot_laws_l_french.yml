 pirate_tax_rate_01: "Amicaux"
 pirate_tax_rate_01_effects: "$EFFECT_LIST_BULLET$[councillor_task|E] [GetCouncilTaskType('task_find_secrets').GetName|V] : #P +10%#! de chances supplémentaires d’apprendre un [secret|El]\n#underline #underline Les [agot_landless_pirate_domiciles|El] paient en fonction de leur catégorie :\n$EFFECT_LIST_BULLET$ Chaque [GetDomicileBuilding('agot_pirate_ship_main_01').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_02').GetName|l] : 5 @gold_icon! (paiement à l'amarrage) ; 20 @gold_icon! (paiement annuel)\n$EFFECT_LIST_BULLET$Chaque [GetDomicileBuilding('agot_pirate_ship_main_03').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_04').GetName|l] : 10 @gold_icon! (paiement à l'amarrage) ; 40 @gold_icon! (paiement annuel)\n$EFFECT_LIST_BULLET$Chaque [GetDomicileBuilding('agot_pirate_ship_main_05').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_06').GetName|l] : 15 @gold_icon! (paiement à l'amarrage) ; 60 @gold_icon! (paiement annuel)"
 pirate_tax_rate_02: "Standards"
 pirate_tax_rate_02_effects: "#underline #underline Les [agot_landless_pirate_domiciles|El] paient en fonction de leur catégorie :\n$EFFECT_LIST_BULLET$ Chaque [GetDomicileBuilding('agot_pirate_ship_main_01').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_02').GetName|l] : 7.5 @gold_icon! (paiement à l'amarrage) ; 30 @gold_icon! (paiement annuel)\n$EFFECT_LIST_BULLET$Chaque [GetDomicileBuilding('agot_pirate_ship_main_03').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_04').GetName|l] : 12.5 @gold_icon! (paiement à l'amarrage) ; 50 @gold_icon! (paiement annuel)\n$EFFECT_LIST_BULLET$Chaque [GetDomicileBuilding('agot_pirate_ship_main_05').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_06').GetName|l] : 17.5 @gold_icon! (paiement à l'amarrage) ; 70 @gold_icon! (paiement annuel)"
 pirate_tax_rate_03: "Élevés"
 pirate_tax_rate_03_effects: "$EFFECT_LIST_BULLET$Les [agot_landless_pirate_domiciles|El] sont moins vulnérables aux [schemes|El] [GetScheme('agot_raid_pirate_domicile').GetTypeName]\n#underline #underline Les [agot_landless_pirate_domiciles|El] paient en fonction de leur catégorie :\n$EFFECT_LIST_BULLET$ Chaque [GetDomicileBuilding('agot_pirate_ship_main_01').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_02').GetName|l] : 10 @gold_icon! (paiement à l'amarrage) ; 40 @gold_icon! (paiement annuel)\n$EFFECT_LIST_BULLET$Chaque [GetDomicileBuilding('agot_pirate_ship_main_03').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_04').GetName|l] : 15 @gold_icon! (paiement à l'amarrage) ; 60 @gold_icon! (paiement annuel)\n$EFFECT_LIST_BULLET$Chaque [GetDomicileBuilding('agot_pirate_ship_main_05').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_06').GetName|l] : 20 @gold_icon! (paiement à l'amarrage) ; 80 @gold_icon! (paiement annuel)"
 pirate_tax_rate_04: "Exorbitants"
 pirate_tax_rate_04_effects: "$EFFECT_LIST_BULLET$Les [agot_landless_pirate_domiciles|El] sont moins susceptibles de lancer des [schemes|El] [GetScheme('agot_raid_pirate_domicile').GetTypeName]\n#underline #underline Les [agot_landless_pirate_domiciles|El] paient en fonction de leur catégorie :\n$EFFECT_LIST_BULLET$ Chaque [GetDomicileBuilding('agot_pirate_ship_main_01').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_02').GetName|l] : 12.5 @gold_icon! (paiement à l'amarrage) ; 50 @gold_icon! (paiement annuel)\n$EFFECT_LIST_BULLET$Chaque [GetDomicileBuilding('agot_pirate_ship_main_03').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_04').GetName|l] : 17.5 @gold_icon! (paiement à l'amarrage) ; 70 @gold_icon! (paiement annuel)\n$EFFECT_LIST_BULLET$Chaque [GetDomicileBuilding('agot_pirate_ship_main_05').GetName|l] et [GetDomicileBuilding('agot_pirate_ship_main_06').GetName|l] : 22.5 @gold_icon! (paiement à l'amarrage) ; 90 @gold_icon! (paiement annuel)"
