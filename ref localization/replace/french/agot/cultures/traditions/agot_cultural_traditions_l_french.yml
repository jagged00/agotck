 ethos_assertive_name:0 "Assertive"
 ethos_assertive_desc:0 "Toute civilisation a des besoins auxquels elle doit répondre pour pouvoir prospérer, et parce que cette culture en a conscience, elle usera soit des armes soit des mots pour y parvenir."
 culture_parameter_ethos_assertive_truce_breaking_twenty_five_cheaper:0 "La perte de [legitimacy|El], de [prestige|El] et de [piety|El] est réduite de #P -25%#! en cas de [truces|El] brisées"
 culture_parameter_ethos_assertive_additional_contract_change:0 "Modification disponible des [vassal_contracts|El] [Concept('feudal','féodaux')|E] : #P +1#!"
 ethos_fervent_name:0 "Fervente"
 ethos_fervent_desc:0 "Parce que le divin est au-dessus de toute considération, lorsqu'une culture est unie par la foi, elle est apte à survivre et prospérer."
 culture_parameter_ethos_fervent_same_faith_increased_vassalization_acceptance:0 "Les personnages d'une même [faith|El] sont plus enclins à accepter la [vassalization|El]"
 culture_parameter_ethos_fervent_same_faith_increased_vassalization_acceptance_tt:0 "Cultures de même [ethos|El] et de même [faith|El] : $VALUE|=+0$"
 culture_parameter_wrathful_trait_more_common:0 "Le [trait|El] [GetTrait('wrathful').GetName( GetNullCharacter )|l] est plus courant"
 culture_parameter_steppe_trait_bonuses:0 "Certains [commander_traits|El] et [personality_traits|El] ont des bonus supplémentaires dans les steppes"
 culture_parameter_craven_looked_down_upon:0 "Le [trait|El] [GetTrait('craven').GetName( GetNullCharacter )|l] est mal vu"
 culture_parameter_shy_trait_looked_down_upon:0 "Le [trait|El] [GetTrait('shy').GetName( GetNullCharacter )|l] est mal vu"
 tradition_agot_vale_andal_heritage_name:0 "Foi et fureur"
 tradition_agot_vale_andal_heritage_desc:0 "Bien que l'on ne sache pas précisément d'où, les Andals sont originaires de l'Essos septentrionale. L'expansion constante des Possessions de Valyria, toujours plus avides de terres, les contraignirent à fuir leurs terres natales, prenant la direction de Westeros où ils déferlèrent sur toute la région au sud du Neck, apportant avec eux leur ferveur religieuse et les traditions de la chevalerie."
 tradition_agot_crownlander_name:0 "Né de la Néra"
 tradition_agot_crownlander_desc:0 "Les habitants des Terres de la Couronne sont un peuple dont la culture a été façonnée par la proximité du centre du pouvoir royal et par le commerce qui se fait dans la baie de la Néra. L'administration solide et la prospérité relative de ces contrées ont fait de leurs habitants des marchands, des artisans et des négociants, autrement dit un peuple beaucoup moins martial que les Orageois au sud et beaucoup plus prospère que les Riverains au nord."
 tradition_agot_honeywiner_name:0 "Douceur exquise"
 tradition_agot_honeywiner_desc:0 "Les hommes du fleuve Hydromel et des terres environnantes comptent parmi les plus prospères de tout Westeros. Avec des terres fertiles et la grande ville de Villevieille, de nombreux échanges commerciaux transitent par la rivière. Avec la Citadelle et le Septuaire Étoilé, la région est un bastion de la connaissance à Westeros, et même de nombreux hommes de basse extraction sont lettrés."
 tradition_agot_marcher_name:0 "Chant d’épées"
 tradition_agot_marcher_desc:0 "#italic « C'est ici, où se dessinent les Montagnes Rouges, que se dressent les grands châteaux des Seigneurs des Marches. Tous bâtis pour garder les frontières des Terres de l'Orage contre les incursions dorniennes venues du sud, et contre les larbins vêtus d'acier au service des rois du Bief à l'ouest. »#!"
 tradition_agot_reachman_name:0 "D’une main glorieuse"
 tradition_agot_reachman_desc:0 "Le Bief est une terre prospère et fertile bâtie sur le dos du petit peuple. C'est aussi une terre de familles avec certaines des racines les plus anciennes de Westeros, remontant au mythique Garth Mainverte, dont la plupart des éminentes familles du Bief revendiquent la descendance. Avec autant de familles qui s'efforcent de se faire connaître dans un pays riche, les liens qui les unissent sont plus forts et plus importants qu'ailleurs à Westeros."
 tradition_agot_shieldman_name:0 "Protéger la Mander"
 tradition_agot_shieldman_desc:0 "Devant leur nom à leur rôle de rempart contre les incursions fer-nées, les Îles Bouclier forment une archipel de quatre îles fortifiées assujetties au Bief, chacune gouvernée par une maison distincte. Les Boucliens, bien qu'isolés, demeurent un peuple loyal, réputés pour leur robustesse et leur sens du devoir. Les feux destinés à prévenir de l'arrivée de boutres ennemies ont fait la renommée de l'archipel, permettant à leurs habitants de se considérer comme la première ligne de défense navale."
 tradition_agot_stone_dornish_name:0 "Gardien des cols"
 tradition_agot_stone_dornish_desc:0 "Les Dorniens rocheux sont ethniquement et culturellement les moins influencés par le Rhoynar parmi les Dorniens. Vivant dans les hauteurs et les vallées des Montagnes Rouges, leur culture a été façonnée par des générations de conflits avec les Seigneurs des Marches du Bief et des Terres de l'Orage, défendant ardemment les cols de leurs montagne contre les incursions extérieures."
 tradition_agot_vineman_name:0 "Gaillardise arrosée"
 tradition_agot_vineman_desc:0 "Depuis l'arrivée de Gilbert des Vignes, les hommes de la Treille ne connaissent plus qu'une chose : le vin. Leurs vignobles sont légendaires même par-delà Westeros pour la qualité du vin qu'ils produisent, et nombreux sont les marchands et les marins qui ont jeté l'ancre à Port-Ryam pour y acheter les meilleurs rouges."
 tradition_agot_westerman_name:0 "D’or et d’argent"
 tradition_agot_westerman_desc:0 "Les Terres de l'Ouest semblent à première vue un royaume dérisoire ; ce n'est ni le plus grand ni le plus peuplé des Sept Couronnes, mais c'est néanmoins le plus riche. S'il ne possède pas de terres agricoles fertiles, il compense largement par la richesse de ses collines, qui regorgent d'or et d'argent. C'est sur cette abondance de minéraux précieux que repose sa puissance, et ses nobles gardent jalousement leurs mines contre ceux qui les regardent avec envie."
 tradition_agot_sisterman_name:0 "Sous l’écume"
 tradition_agot_sisterman_desc:0 "Pendant une grande partie de leur histoire, les Soeurois avaient plus en commun avec les Fer-nés qu'avec les hommes du Val ou du Nord. Des millénaires durant, ils ont été gouvernés par leurs rois pirates, pillant le long des rives de la Morsure pour subvenir à leurs propres besoins, adorant d'étranges divinités inconnues des Andals et des Premiers Hommes."
 tradition_agot_ironborn_name:0 "Le prix du fer"
 tradition_agot_ironborn_desc:0 "#italic « La guerre a toujours été le sacerdoce des Fer-nés. Modelés par le Dieu Noyé pour n'être que voleurs et violeurs, ils fondent des royaumes où se gravent leurs noms en lettres de feu et de sang, portés au gré des chants et des balades. »#!"
 tradition_agot_greenborn_name:0 "De la mer à la terre"
 tradition_agot_greenborn_desc:0 "#italic « Travestissez un Fer-né autant que vous le souhaitez. Drapez-le de soierie et de velours, apprenez-lui les subtilités de l'écriture, formez-le à la lecture, couvrez-le de livres, instruisez-le à la chevalerie, à la courtoisie et aux mystères de la Foi, qu'importe, lorsque vous plongerez votre regard dans le sien, vous y verrez toujours la mer… froide, grise et cruelle. »#!"
 tradition_agot_dorne_rhoynish_heritage_name:0 "Enfants de la Mère Rhoyne"
 tradition_agot_dorne_rhoynish_heritage_desc:0 "La civilisation rhoynaise est tout aussi illustre qu'ancienne, tant et si bien que certains attribuent aux Rhoynar le mérite d'avoir enseigné aux Andals le travail du fer. Originaires des cités-états qui bordent la Rhoyne, ils vénèrent nombre de divinités liées au fleuve et ont une affinité particulière avec les bateaux de toutes sortes, qu'ils s'agissent des petites embarcations de pêche ou des péniches de plaisance indécentes. La culture rhoynaise diffère sensiblement de celle des Andals en cela que les femmes sont l'égales des hommes sur les questions de l'héritage et que les relations homosexuelles sont acceptées. Les Rhoynar sont également connus pour leur enthousiasme envers l'art et la musique, ce qui explique peut-être en partie pourquoi certaines de leurs pratiques culturelles ont été si promptes à se répandre lorsqu'ils arrivèrent à Dorne."
 tradition_agot_greenblood_name:0 "Orphelins des fleuves"
 tradition_agot_greenblood_desc:0 "Après avoir fui Essos et être arrivés à Dorne, les orphelins de la Sang-vert ont gagné leurs titres auto-imposés en refusant d'adopter les coutumes dorniennes et de s'assimiler, choisissant plutôt de vivre comme les « orphelins » de la rivière Rhoyne, la rivière qu'ils appellent « mère ». Les orphelins de la Sang-vert et leurs descendants s'accrochent à la culture et aux croyances des Rhoynar, parlant toujours la langue rhoynaise à huis clos et dans le secret, vivant sur des radeaux le long de la Sang-vert dont ils tirent leur nom."
 tradition_agot_salt_dornish_name:0 "Le sang de Nymeria"
 tradition_agot_salt_dornish_desc:0 "De tous les Dorniens, les Dorniens salés sont ceux possédant le plus de sang des Rhoynar. Ils vivent sur les côtes les plus tempérées de Dorne et perpétuent bon nombre des traditions égalitaires apportées par Nymeria. Ils font de bons marins, leurs ports étant pour beaucoup dans leur prospérité."
 tradition_agot_sand_dornish_name:0 "Désert et dune"
 tradition_agot_sand_dornish_desc:0 "Survivant avec pénibilité dans le désert harassant qu'ils nomment « foyer », les Dorniens sableux sont des gens résilients et impitoyables. Leurs châteaux et leurs colonies sont basés autour des rares sources d'eau de leur patrie désertique, qu'ils défendent ardemment. C'est un peuple naturellement audacieux et aventureux, avec de nombreuses maisons nobles de la région descendant des téméraires qui se sont lancés à travers le climat impitoyable."
 tradition_agot_wildling_name:0 "Sauvagerie et férocité"
 tradition_agot_wildling_desc:0 "Si bien des sociétés prospèrent à travers le progrès, certaines suivent une voie plus sauvage. Qu'ils s'agissent des peuplades au-delà du Mur ou des tribus dans les Montagnes de la Lune, ces cultures compensent un développement moindre par une férocité qui peuvent les rendre particulièrement mortelles lorsqu'elles décident de se rassembler."
 tradition_agot_rushlander_name:0 "Où les rivières rencontrent les collines"
 tradition_agot_rushlander_desc:0 "Une culture née à la frontière du Val et du Conflans. Les Riverains sont des gens robustes qui s'adaptent tant à la vie dans les collines que dans les rivières."
 tradition_agot_harsh_laws_name:0 "Gouvernance sévère"
 tradition_agot_harsh_laws_desc:0 "La société façonne les lois. L'histoire a montré qu'il est naturel pour une terre dure de donner naissance à des gens durs, et ils édictent à leur tour des lois dures pour gouverner."
 tradition_agot_thenn_name:0 "Les derniers des premiers"
 tradition_agot_thenn_desc:0 "Considérés comme les plus « sophistiqués » des peuples libres par ceux qui vivent au sud du Mur, les Thenns se considèrent comme les derniers Premiers Hommes. Les habitants de la vallée montagneuse des pics de Crocgivre interagissent davantage avec les géants qu'avec d'autres cultures, mais ils ont réussi à apprendre quelques mots ou phrases en langue commune, bien qu'ils n'aient jamais dévié de l'ancienne langue qu'ils parlent encore aujourd'hui. Fiers de leur croyance en Magnar, les Thenns sont un peu plus disciplinés et organisés que les autres peuples libres, et ont réussi à amasser une impressionnante armurerie de bronze. Si les habitants du sud du Mur considèrent les Thenns comme des sauvages, ils n'en sont pas moins capables et entrent souvent en conflit avec la Garde de nuit."
 tradition_agot_andalos_name:0 "Collines étoilées"
 tradition_agot_andalos_desc:0 "Ce fut Hugor que les Sept qui ne font qu'Un oignirent dans les collines d'Andalos à l'aide de sept étoiles, lui confiant la mission sacrée d'amener les Andals à Westeros, leur récompense divine pour avoir été de si fervents fidèles."
 tradition_agot_braavos_name:0 "Cité des affranchis"
 tradition_agot_braavos_desc:0 "Braavos est unique parmi les cités libres en cela qu'elle fut fondée par des esclaves qui parvinrent à fuir alors qu'ils étaient en route vers Valyria. Celle que l'on nomme la Cité Secrète ou bien encore la Bâtarde de Valyria regroupe donc des peuples venus des quatre coins du monde connu, et même au-delà. Cette singularité dans son histoire a conduit à la fondation d'une loi, la première et la plus importante de toute : #italic « Hommes, femmes et enfants de Braavos, jamais ne seront esclaves, ilotes ou serfs. »#!"
 tradition_agot_religious_fc_name:0 "En quête de la pureté religieuse"
 tradition_agot_religious_fc_desc:0 "Les Possessions de Valyria furent un mélange de nombreux peuples différents, parmi lesquels les Valyriens, Andals, Rhoynar ou les Ghiscari, sans compter la multitude d'esclaves venus d'au-delà des frontières. Pour faciliter le contrôle de la population, les seigneurs dragons firent preuve d'un laxisme religieux, autorisant les uns et les autres à prier qui et comment ils le voulaient. Une décision qui ne fut pas du goût des plus zélés, qui partirent fonder d'autres cités autre part."
 tradition_agot_three_daughters_name:0 "La dispute des trois sœurs"
 tradition_agot_three_daughters_desc:0 "Lorsque les Possessions succombèrent au Fléau, l'empire valyrien éclata en morceaux et chacune des cités nouvellement indépendante lutta pour asseoir sa domination sur les autres. Cela s'est particulièrement vérifié dans les Terres Disputées, région maintes fois mises à mal du fait des rivalités entre les cités-sœurs que sont Lys, Myr et Tyrosh dont les peuples sont piégés dans ce qui semble être un conflit sans fin."
 tradition_agot_pentos_name:0 "Nés du métissage"
 tradition_agot_pentos_desc:0 "Les Pentoshi sont probablement le fruit de l'union des colons valyriens et des indigènes andals d'autrefois."
 tradition_agot_doom_name:0 "Marqués par le Fléau"
 tradition_agot_doom_desc:0 "Si le Fléau a indéniablement marqué le monde de son empreinte, l'ayant profondément et durablement changé, il demeure encore à ce jour un mystère. Les peuples qui ont réchappé à ce cataclysme en portent encore les traces aujourd'hui."
 tradition_agot_slavers_bay_name:0 "Commerce et servitude"
 tradition_agot_slavers_bay_desc:0 "L'esclavagisme fut l'artère principale, non seulement de l'Ancien Empire Ghiscari mais également des Possessions de Valyria. Si certains jugent cette pratique inhumaine, elle aura pourtant permis à plus d'un peuple de prospérer. Pour bâtir un avenir il faut suer sang et eau, et cela même si le sang versé est celui d'un autre."
 tradition_agot_ghis_name:0 "La grandeur par la discipline"
 tradition_agot_ghis_desc:0 "C'est la discipline et la fermeté qui permirent au Vieil Empire Ghiscari de s'étendre et de prospérer. Si les esclaves étaient nombreux et eurent leur rôle à jouer dans sa grandeur, c'est surtout la force des hommes libres qui composaient les légions armées qui lui permirent d'atteindre son apogée. Leur entraînement sans égal en fit de véritables armes de guerre que nulle autre armée humaine n'était en mesure d'arrêter. Ce n'est que lorsque les dragons firent pleuvoir le feu qu'ils trouvèrent un ennemi à leur hauteur."
 tradition_agot_rhoynar_name:0 "Bercé par la Rivière Mère"
 tradition_agot_rhoynar_desc:0 "C'est sur la Rhoyne, le plus grand fleuve de l'Essos occidental, qu'est née l'une des plus grandes civilisations du monde, réputée pour la beauté de ses cités et pour sa maîtrise et ses enseignements du travail du fer."
 tradition_agot_candling_name:0 "Sous la Grande Chandelle"
 tradition_agot_candling_desc:0 "Saluez tous la Grande Chandelle ! Si grande, si sage, si belle. C'est elle qui choisi qui reste et qui jarte, alors gaffe !"
 tradition_agot_andalosi_name:0 "Purgé par les flammes"
 tradition_agot_andalosi_desc:0 "#italic « Qarlon le Grand brûla, et son armée avec lui. Et ils poursuivirent leur route, eux, les seigneurs dragons, les semeurs de feu et de sang, parmi les îles de Lorath. Le grand donjon fut ravagé, ainsi que les villes et villages de pêcheurs tout du long de la côte. Les imposantes pierres des labyrinthes calcinées et noircies par le cataclysme de feu, noyant les îles dans les flammes où nul homme, femme ou enfant ne purent trouver le salut. Tous périrent dans la Purge de Lorath, d'un feu que les enfers ne renieraient point. »#!"
 tradition_agot_andal_name:0 "En quête du couchant"
 tradition_agot_andal_desc:0 "#italic « …L'on raconte que les Sept en personne foulèrent la terre des collines d'Andalos, couronnant Hugor de la Colline et lui promettant, à lui ainsi qu'à ses descendants, que de vastes royaumes les attendaient dans des contrées étrangères. C'est selon les enseignements des septons et septas, la raison pour laquelle les Andals quittèrent Essos pour cingler en direction de l'ouest. »#!"
 tradition_agot_braavosi_name:0 "Domination du pourpre"
 tradition_agot_braavosi_desc:0 "#italic « Et parce qu'ils avaient risqué leur vie au nom de la liberté, mères et pères de la nouvelle cité firent le serment que nul homme, femme ou enfant de Braavos, jamais ne serait esclave, serf ou ilote. Telle est la Première Loi de Braavos, gravée dans la pierre de l'arche qui enjambe le Long Canal. Et depuis ce jour, les Seigneurs de la Mer se sont opposés à l'esclavage sous toutes ses formes, guerroyant contre les esclavagistes et leurs alliés. »#!"
 tradition_agot_lorathi_name:0 "Dédale sans yeux"
 tradition_agot_lorathi_desc:0 "#italic « Ces nouveaux Lorathi furent d'abord soumis aux disciples de Boash qui les avaient précédés, et des années durant, les prêtres du Dieu Aveugle continuèrent de gouverner les îles. Au fil du temps, les nouveaux arrivants se firent plus nombreux, et les fidèles moindres. Le culte s'estompa puis s'effaça quand il ne resta plus de la prêtrise qu'un amas mondain de corruption qui avait abandonné et les calices, et les capuches, et la piété. Ils s'engraissèrent d'impôts prélevés sur leurs sujets, jusqu'au jour où pêcheurs, fermiers et autres menues personnes choisirent de briser les chaînes d'hommes dont le dieu, aveugle, semblait devenu sourd lorsqu'ils appelèrent à l'aide. »#!"
 tradition_agot_lyseni_name:0 "L’amour du crépuscule"
 tradition_agot_lyseni_desc:0 "#italic « Les Lysiens engendrent eux aussi grand nombre d'esclaves. Grand nombre et grande qualité, unissant les plus beaux spécimens dans l'espoir de produire des esclaves concubins aux traits toujours plus raffinés, toujours plus avenants. Le sang de Valyria y est encore vivace, en témoigne son peuple qui arbore bien souvent les caractéristiques des seigneurs dragons d'antan, tels que peau blême, cheveux d'or et d'argent, et yeux pourpres, lilas ou bleu pâle. La noblesse lysienne valorise la pureté du sang plus que tout autre chose, et de nombreuses beautés célèbres, plus tristement qu'allégrement, y ont vu le jour. »#!"
 tradition_agot_myrish_name:0 "Une clarté sans pareil"
 tradition_agot_myrish_desc:0 "#italic « Depuis lors, le commerce est au cœur de la vie de Myr, et ses navires sillonnent les eaux du Détroit depuis des siècles. Les artisans, dont beaucoup sont nés esclaves, jouissent également d'une grande renommée ; la dentelle et les tapisseries sont réputées pour valoir leur poids en or et en épices ; et les lentilles, celles que l'on nomment les yeux de Myr, n'ont pas leur pareil dans le monde. »#!"
 tradition_agot_norvoshi_name:0 "Poil de barbe et son de cloche"
 tradition_agot_norvoshi_desc:0 "#italic « Bien que la Grande Norvos domine aujourd'hui toutes les sources de la Rhoyne, les Norvoshi ne descendent pas des Rhoynar qui régnaient jadis sur ce puissant fleuve. Comme toutes les autres cités libres, Norvos est une fille de Valyria. »#!"
 tradition_agot_pentoshi_name:0 "Chaînes et créances"
 tradition_agot_pentoshi_desc:0 "#italic « Les premiers Pentoshi étaient de simples marchands, commerçants, marins et agriculteurs. La noblesse y était rare et c'est peut-être pour cette raison qu'ils étaient moins soucieux de préserver leur sang valyrien, frayant avec les habitants des terres qu'ils gouvernaient. »#!"
 tradition_agot_hartalari_name:0 "Sur trois fronts"
 tradition_agot_hartalari_desc:0 "#italic « L'appât du gain naît des guerres incessantes entre Tyrosh, Lys et Myr ont non seulement favorisé l'émergence de nombreuses compagnies libres dans les Terres Disputées, mais également la formation de flottes de pirates et de mercenaires, pour la plupart installés dans les Degrés de Pierre. »#!"
 tradition_agot_qohorik_name:0 "Forêts et forges obscures"
 tradition_agot_qohorik_desc:0 "#italic « Les artisans de Qohor jouissent d'une grande réputation ; leurs tapisseries, tissées principalement par les femmes et les enfants de la cité, sont tout aussi raffinées que celles de Myr, quoique moins onéreuses. On trouve au sein de leurs marchés de magnifiques sculptures en bois et les forges sont sans égales. »#!"
 tradition_agot_tyroshi_name:0 "Les escargots de la vanité"
 tradition_agot_tyroshi_desc:0 "#italic « Les teinturiers de Tyrosh apprirent bien vite à créer des produits écarlates, cramoisies et indigo profond, simplement en variant le régime alimentaire des escargots. Les siècles suivants, ils inventèrent des teintures aux centaines de nuances et les couleurs vives devinrent la coqueluche des seigneurs et princes du monde entier, toutes provenant de Tyrosh. Avec la fortune naquit l'amour de l'ostentation, et bientôt hommes et femmes se délectèrent de teindre leurs cheveux de couleurs criardes, et plus elles étaient criardes et plus ils s'en délectaient. »#!"
 tradition_agot_volantene_name:0 "L'aînée des filles"
 tradition_agot_volantene_desc:0 "#italic « Lorsque le Fléau eut fini d'engloutir Valyria et les Contrées de l'Été Constant, Volantis affirma son droit à régner sur toutes les autres colonies des Possessions. La puissance de la « #italic Première Fille#! » était telle qu'elle parvint, un temps durant, à asseoir son hégémonie sur nombre d'autres cités libres. »#!"
 tradition_agot_essosi_valyrian_name:0 "Le sang de l'Antique"
 tradition_agot_essosi_valyrian_desc:0 "#italic « Nombreux parmi l'Ancien Sang de Volantis continuent à perpétuer les rites des dieux qui jadis étaient vénérés dans l'Antique Valyria, mais leur foi se trouve principalement dans les Murs Noirs. Au-delà, c'est le Dieu Rouge R'hllor qui jouit le plus de la faveur du peuple, et surtout parmi les esclaves et les affranchis de la cité. »#!"
 tradition_agot_astapori_name:0 "Leurs Bontés d'Astapor"
 tradition_agot_astapori_desc:0 "#italic « #italic De briques et de sang est fait Astapor, de briques et de sang leurs corps…#! Une vieille comptine qui évoque les murs de briques rouges de la cité et le sang versé par des milliers d'esclaves vivant, travaillant et mourant pour bâtir. Gouverné par Leurs Bontés, Astapor est réputée à travers le monde pour sa caste de soldats esclaves eunuques que sont les Immaculés, des guerriers élevés et dressés dès l'enfance pour devenir aussi durs que les briques de la cité, ne craignant ni la mort ni la douleur. »#!"
 tradition_agot_yunkaii_name:0 "Les Judicieux de Yunkaï"
 tradition_agot_yunkaii_desc:0 "#italic « Qui a-t-il à dire de Yunkaï, la cité jaune, si ce n'est qu'elle est mal famée ? Ses maîtres, les Judicieux, sont bouffis de corruption, commerçant d'esclaves concubins et de garçons de lit, et pire encore. »#!"
 tradition_agot_meereenese_name:0 "Leurs Grandesses de Meereen"
 tradition_agot_meereenese_desc:0 "#italic « De toutes les cités de la Baie des Serfs, l'ancienne Meereen est certes la plus redoutable, mais à l'instar de ses sœurs, c'est un lieu de ruine dont la population n'est qu'une fraction de celle qu'elle fut autrefois, lorsque le Vieil Empire était à son apogée. Ses murs de briques aux multiples couleurs sont le théâtre de souffrances sans fin, car les Grands Maîtres de Meereen entraînent les esclaves à combattre et à mourir dans les fosses de combats selon leur bon plaisir. »#!"
 tradition_agot_ghiscari_name:0 "Faire sien la foudre"
 tradition_agot_ghiscari_desc:0 "#italic « L'Ancienne Ghis fut fondée sur l'esclavage, quant à celui qui l'avait bâtie, Grazdan le Grand, la dévotion qu'il suscite est encore si forte que son nom est souvent transmis parmi les familles d'esclavagistes. Les vieilles histoires ghiscaries lui prêtent également la naissance de la tant redoutée Légion de Ghis, celle avec les grands boucliers et les trois lances, celle qui fut la première à combattre en formation disciplinée. L'Ancienne Ghis colonisa les environs, et un voisin tombant après l'autre, le premier empire naquit, celui qui régna en maître incontesté durant des siècles. »#!"
 tradition_agot_rhoynish_name:0 "Les liens du fleuve"
 tradition_agot_rhoynish_desc:0 "#italic « Ils furent peu nombreux à résister à l'expansion valyrienne, mais les Rhoynar étaient de ceux-là. Ils y parvinrent durant des siècles et même des millénaires. Ils fondèrent de grandes cités tout le long de la Rhoyne, et ils auraient été, dit-on, les premiers à maîtriser l'art du travail du fer. »#!"
 tradition_agot_chroyanar_name:0 "L'amour des festivités"
 tradition_agot_chroyanar_desc:0 "#italic « ...et Chroyane, d'entre toutes la plus grande, son Palais de l'Amour et son festival. »#!"
 tradition_agot_mellar_name:0 "Trônant sur les marais fleuris"
 tradition_agot_mellar_desc:0 "#italic « Sar Mell, pâle mais fleurie… »#!"
 tradition_agot_qhoynar_name:0 "À la force des poings de marbre"
 tradition_agot_qhoynar_desc:0 "#italic « Ar Noy sur la Qhoyne, avec ses salles de marbre vert. »#!"
 tradition_agot_sarhar_name:0 "Nourri par le sel"
 tradition_agot_sarhar_desc:0 "#italic « …Sarhoy, cerné par la mer, de ses canaux et jardins d'eau salée… »#!"
 tradition_agot_sarar_name:0 "Au gré et au chant des fontaines"
 tradition_agot_sarar_desc:0 "#italic « Ny Sar, la cité des fontaines, vivifiée par les chants. »#!"
 tradition_agot_insular_marriage_name:0 "Préférence culturelle"
 tradition_agot_insular_marriage_desc:0 "Sans être isolationniste, cette culture privilégie les unions au sein de son propre peuple."
 tradition_agot_debug_name:0 "Debug"
 tradition_agot_debug_desc:0 "Comment vous-avez atterri ici ?"
 tradition_agot_axemen_name:0 "Par la hache"
 tradition_agot_axemen_desc:0 "#italic « Avec les Andals vinrent leurs armes, vinrent leurs armures, de fer elles étaient, et contre des hommes armés et armurés ainsi, que pouvaient les piètres tribus de ces contrées ? »#!"
 tradition_agot_essari_name:0 "Au regard du ciel et du soleil"
 tradition_agot_essari_desc:0 "#italic « Essaria, la colonie valyrienne, celle que d'aucuns nomment également la cité libre perdue… »#!"
 tradition_agot_noynar_name:0 "Collines de fourrures"
 tradition_agot_noynar_desc:0 "#italic « …là où la Mère se rassemble dans la Noyne, sa sauvageonne de fille… »#!"
 tradition_agot_valyrian_original_name:0 "La volonté des Possessions"
 tradition_agot_valyrian_original_desc:0 "#italic « Il n'y avait nul roi parmi les Valyriens. Les Possessions étaient le nom de leur empire, car celui qui possédait des terres possédait le droit de se faire entendre. »#!"
 tradition_agot_dothraki_sea_name:0 "Flots verdoyants"
 tradition_agot_dothraki_sea_desc:0 "#italic « Pour ceux qui choisissent de vivre dans la Grande Mer Herbeuse, à ceux-là une vie de pérégrinations les attend… »#!"
 tradition_agot_dothraki_name:0 "Monter le monde"
 tradition_agot_dothraki_desc:0 "#italic « On lui connaît bien des noms ; les Terres Hantées en raison des nombreuses cités fantômes qui la parsème ; la Grande Désolation au regard de son caractère dépouillé ; mais c'est en tant que Mer Dothrak que la plupart se réfèrent à cette immensité verdoyante. Un usage guère ancien, car les Dothrakis demeurent malgré tout un peuple encore vert. Eux qui ont attendu que le Fléau frappe les dragons pour que puissent déferler leurs khalasars. Eux qui ont usé du feu et de l'acier pour apporter la ruine aux cités antiques. Eux qui sont venus de l'est pour apporter la domination sur ces terres et l'esclavage aux peuples qui y vivaient. »#!"
 tradition_agot_grass_sea_name:0 "Au son du sabot"
 tradition_agot_grass_sea_desc:0 "#italic « Le soleil frappa la Mer Dothrak, plaine de vie imprégnée des senteurs de mort et de terre. Les herbes agitaient par le vent, ondulaient comme vaguelettes sur les flots. »#!"
 tradition_agot_lhazareen_name:0 "Troupeau uni"
 tradition_agot_lhazareen_desc:0 "#italic « Dans ces contrées vivaient un peuple qui se nommait eux-mêmes les Lhazaréens, mais pour les Dothraki, ils étaient haesh rakhi, les agnelets. »#!"
 tradition_agot_omberi_name:0 "La prospérité par le tribut"
 tradition_agot_omberi_desc:0 "#italic « Ceux qui auront l'audace de poursuivre plus avant vers l'est atteindront les rivages du petit royaume pastoral que l'on nomme Omber, là où rois pleutres et frêles princes ne sont connus que pour les grains, les joyaux et les donzelles qu'ils offrent généreusement aux seigneurs du cheval contre une paix, placide et prospère. »#!"
 tradition_agot_sarnori_name:0 "Descendants des Reines Pêcheuses"
 tradition_agot_sarnori_desc:0 "#italic « Sarnor, qualifié de royaume en dépit de ses quarante rois rivaux, fut parmi les plus grandes civilisations du monde connu pendant plus de deux mille ans, et pour autant, la plupart de nos connaissances à son sujet sont morcelées, à l'image des Annales de l’Été et de l’Hiver, certaines provenant des récits de Qarth, la Baie des Serfs ainsi que les cités libres. Les marchands sarnores voyageaient de Valyria jusqu'à Yi Ti, de Leng jusqu'à Asshaï. Leurs navires sillonnaient la Mer Grelotte, Ib, les Mille-Îles et la lointaine Mossovy. Leurs rois guerroyaient contre les Qaathi, contre le Vieil Empire de Ghis, et frappèrent à maintes reprises les cavaliers nomades venant des steppes orientales. »#!"
 tradition_agot_tagaez_fen_name:0 "Rejetons des tours"
 tradition_agot_tagaez_fen_desc:0 "#italic « Les Sarnores, c'est ainsi que l'on se souvient d'eux. A son apogée, leur immense royaume englobait toutes terres qu'irriguées la Sarne, les terres attenantes ainsi que les trois grands lacs, derniers vestiges de la Mer d'Argent flétrissante. Eux-mêmes se nommaient \"Tagaez Fen\", ou Hommes Grands en langue commune. Longilignes ils étaient, au teint brun, semblables aux Zogora, à l'exception de leur chevelure et de leurs yeux, d'un noir de nuit. Qu'ils fussent guerriers, sorciers ou érudits, ils affirmaient descendre du roi-héros qu'ils nommaient Huzhor Amai, l'Étonnant de son épithète, et fils de la dernière des Reines Pêcheuses. »#!"
 tradition_agot_trimbaez_fen_name:0 "Rejetons des caravanes"
 tradition_agot_trimbaez_fen_desc:0 "#italic « À l'est s'élevait Kasath, la Cité des Caravanes… »#!"
 tradition_agot_goraez_fen_name:0 "Rejetons du lac"
 tradition_agot_goraez_fen_desc:0 "#italic « Gornath du Lac, la cité aux maints canaux… »#!"
 tradition_agot_zanhar_fen_name:0 "Rejetons des érudits"
 tradition_agot_zanhar_fen_desc:0 "#italic « Sallosh, la Cité des Érudits, bâtie aux abords de la Rive d'Argent et pourvue de murs peints et d'une vaste bibliothèque… »#!"
 tradition_agot_madekh_fen_name:0 "Rejetons des soldats"
 tradition_agot_madekh_fen_desc:0 "#italic « Là aussi se dressait Mardosh, la Cité des Soldats, celle que l'on connaissait également comme Mardosh l’Invincible. »#!"
 tradition_agot_gilal_fen_name:0 "Descendants des cours d'eau"
 tradition_agot_gilal_fen_desc:0 "#italic « Sathar, la Cité des Cascades, au confluent de deux bras de la Sarne… »#!"
 tradition_agot_giren_fen_name:0 "Progéniture des collines"
 tradition_agot_giren_fen_desc:0 "#italic « Les marchands sarnores voyageaient de Valyria jusqu'à Yi Ti, de Leng jusqu'à Asshaï. »#!"
 tradition_agot_cenaakh_fen_name:0 "Rejetons des temples"
 tradition_agot_cenaakh_fen_desc:0 "#italic « N'est encore vénérée que la divine centurie du Royaume de Sarnor. »#!"
 tradition_agot_zivylar_fen_name:0 "Rejetons de l'or"
 tradition_agot_zivylar_fen_desc:0 "#italic « En aval, là où la Sarne bifurquait vers le nord, se trouvaient les cités prospères et fluviales de Rathylar, Hornoth, et Kyth, lesquelles servaient les navires qui sillonnaient ses eaux d'un bleu profond. »#!"
 tradition_agot_cewi_fen_name:0 "Rejetons des jumelles"
 tradition_agot_cewi_fen_desc:0 "#italic « On trouve de part et d'autre du delta les ruines de Sarys, la jumelle de Saath, une cité dévastée par les Dothraki il y a de cela plusieurs siècles. »#!"
 tradition_agot_dawiz_fen_name:0 "Descendants de la dernière"
 tradition_agot_dawiz_fen_desc:0 "#italic « Il n'y a guère que Saath qui n'a pas été frappé par la ruine, quoique hors de ce qu'elle fut autrefois, cette cité portuaire est désormais d'un sinistre… »#!"
 tradition_agot_cymmeri_name:0 "Par l'épouse et la cuirasse"
 tradition_agot_cymmeri_desc:0 "#italic « …une armure qu'avait faite son épouse, Cymer, car c'est son peuple qui fut le premier à travailler le fer… »#!"
 tradition_agot_gipps_name:0 "Par l'épouse et le bouclier"
 tradition_agot_gipps_desc:0 "#italic « …les Gipps, ce peuple aux jambes longuets, aux boucliers d'osiers et aux cheveux par la chaux maculés… »#!"
 tradition_agot_zoqora_name:0 "Par l'épouse et le char"
 tradition_agot_zoqora_desc:0 "#italic « C'est son épouse, Zogora, qui conduisait son char, disait-on... »#!"
 tradition_agot_first_clans_name:0 "Au son du cor"
 tradition_agot_first_clans_desc:0 "#italic « …et dans les temps anciens, Joramun, celui qui souffla le Cor de l'Hiver pour ainsi réveiller les géants provenant de la terre. »#!"
 tradition_agot_moon_clan_name:0 "Au-dessus du soleil couchant"
 tradition_agot_moon_clan_desc:0 "Dans les profondeurs des Montagnes de la Lune vivent les membres de son clan, les hommes les plus sauvages et les moins civilisés au sud du Mur. Ils sont les derniers vestiges des Premiers Hommes du Val, leur habitat montagneux les protégeant des assauts des Andals et leur permettant de poursuivre leur vie primitive sans intervention extérieure."
 culture_parameter_brave_trait_more_common:0 "Le [trait|El] [GetTrait('brave').GetName( GetNullCharacter )|l] est plus courant"
 culture_parameter_knight_trait_more_valued:0 "Le [trait|El] [GetTrait('knight').GetName( GetNullCharacter )|l] est plus valorisé"
 culture_parameter_cul_more_likely_born_with_mark:0 "Les personnages de cette culture sont plus susceptibles de naître avec [GetTrait('the_mark').GetName( GetNullCharacter )l]"
 culture_parameter_gluttonous_looked_down_upon:0 "Le [trait|El] [GetTrait('gluttonous').GetName( GetNullCharacter )|l] est mal vu"
 culture_parameter_better_farm_estates_bonuses:0 "La série de [buildings|El] #V $building_type_farm_estates_01$#! donne des bonus supplémentaires dans les [counties|El] de cette [culture|El]"
 culture_parameter_gain_piety_from_aggro_war_victory:0 "Gagner des guerres en tant qu'attaquant principal offre de la [piety|El]"
 culture_parameter_guardians_add_more_prowess_to_wards:0 "Les enfants éduqués par un [guardian|El] de cette [culture|El] gagneront de la [prowess|El] supplémentaire"
 tradition_agot_vale_name:0 "La Montagne et le Val"
 tradition_agot_vale_desc:0 "L'antique royaume des Arryn est dominé par les Montagnes de la Lune et les vallées qui les jalonnent, dont le Val d'Arryn. C'est cette topographie qui a favorisé l'isolement des peuples qui y vivent du reste de Westeros, mais c'est aussi ce qui a grandement contribué à leur unification."
 tradition_agot_nonteloshi_name:0 "Liés par la courtoisie"
 tradition_agot_nonteloshi_desc:0 "#italic « L'on parle bien volontiers de neuf cités libres, mais à travers Essos se trouvent maintes autres cités et avant-postes d'origines valyriennes, parfois bien plus grandes et bien plus peuplées que ne le sont les cités ouestriennes comme Goëville, Blancport ou Port-Lannis. Ce qui caractérise les Neuf, ce n'est pas leur taille, mais leurs origines. »#!"
 tradition_agot_valemen_main_name:0 "Chevaliers et faucons"
 tradition_agot_valemen_main_desc:0 "#italic « Nombre de Valois se soumirent aux Andals, allant jusqu'à embrasser la Foi des Sept. Femmes et filles des rois vaincus furent prises pour épouses afin de consolider leur légitimité à régner, car tous vaincus qu'ils furent, les Premiers Hommes avaient le nombre pour eux et ils ne pouvaient être si aisément écartés des terres qui étaient les leurs. »#!"
 tradition_agot_valemen_finger_name:0 "Aux pierres étoilées"
 tradition_agot_valemen_finger_desc:0 "#italic « Septons, chanteurs et mestres s'accordent à dire que le débarquement des Andals débuta aux Doigts, la presqu'île du Val d'Arryn. Nombre de gravures représentant l'étoile à sept branches peuvent y être trouvées sur les roches et les pierres de la région ; une pratique qui finit par tomber en désuétude au fil de la conquête andale. »#!"
 tradition_agot_valemen_upper_name:0 "Au-dessus de toutes choses"
 tradition_agot_valemen_upper_desc:0 "#italic « La grand-route débute au Conflans et traverse les Montagnes de la Lune, et parce que c'est le chemin le plus probable qu'une armée empruntera pour pénétrer le Val, en dépit de son caractère escarpé et rocailleux, beaucoup de sang y a coulé. »#!"
 tradition_agot_sistermen_name:0 "Trésor florissant et flots abondants"
 tradition_agot_sistermen_desc:0 "#italic « Les Trois Sœurs furent les dernières îles à être rattachées au Val. Des millénaires durant, elles arboraient avec fierté leurs rois cruels, leurs pirates et leurs pillards qui tous sillonnaient les mers à bord de boutres qui cinglaient vers la Morsure, le Détroit, et même jusqu'à la Mer Grelotte, pour y remplir les cales d'or et d'esclaves. »#!"
 tradition_agot_valeman_finger_name:0 "Humble service"
 tradition_agot_valeman_finger_desc:0 "Parce que c'est un lieu désolé et frappé par les vents glacials venus du Nord, la végétation peine à proliférer dans cette région qu'on appelle les Doigts. Ses habitants y adoptent un mode de vie plus simple et donc plus humble qu'autre part, en vivant de l'élevage plutôt que de l'agriculture, et ainsi, bergers et métayers font contre mauvaise fortune bon cœur."
 tradition_agot_valeman_upper_name:0 "Au-dessus de toutes choses"
 tradition_agot_valeman_upper_desc:0 "Mis à l'écart de leurs semblables qui ont élu domicile dans les vallées fertiles du Val, les hommes qui habitent les hauteurs des Montagnes de la Lune sont un peuple beaucoup plus robuste et vaillant. En temps de guerre, ce sont eux qui occupent les premières lignes de défense contre les incursions extérieures, et avec leur vie à haute altitude, ce sont aussi eux qui doivent le plus faire face aux incursions des clans de la montagne."
