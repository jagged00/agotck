 tradition_agot_north_name:0 "Par le bronze et le fer"
 tradition_agot_north_desc:0 "Les gens qui ont le Nord pour patrie sont un peuple austère mais néanmoins robuste. Jadis unifié sous la bannière du Loup Affamé, il y a de cela des millénaires, c'est un peuple hétéroclite, à l'image de leurs contrées grandement diversifiées, mais qui ont tous pour socle commun le caractère sacré qu'ils attribuent aux serments ancestraux."
 tradition_agot_ironmen_name:0 "De sel et de roche"
 tradition_agot_ironmen_desc:0 "Véritable fléau des mers, les Fer-nés ont une influence aussi mouvante que le sont les marées. Tantôt confinés dans leurs îles des Mers du Crépuscule, tantôt prompts à s'étendre jusqu'aux Terres Vertes pour y gouverner, la seule chose qui semble immuable dans ce peuple au caractère froid comme les abysses et dangereux comme les récifs semble être les liens ancestraux qui les unissent au Roi Gris."
 tradition_agot_first_men_name:0 "Par le bronze et le destrier"
 tradition_agot_first_men_desc:0 "#italic « Les Premiers Hommes avaient emmené avec eux des dieux bien étranges, des chevaux, des troupeaux, du bronze, et sculptés d'une stature plus grande et d'une carrure plus forte que les Enfants, ils étaient de toute évidence une menace à ne pas sous-estimer. »#!"
 tradition_agot_northmen_name:0 "Les hurlements de l’Hiver"
 tradition_agot_northmen_desc:0 "#italic « Nos foyers, nos cœurs et nos moissons sont vôtres, mon seigneur. Nous mettons à votre service nos épées, nos lances et nos arcs. Accordez votre miséricorde aux faibles, tendez la main aux démunis, assurez la justice pour tous, faites cela et nous ne faillirons jamais à notre parole. Je le jure par la terre et l'eau, par le bronze et le fer… Nous le jurons par la glace et le feu. »#!"
 tradition_agot_bearmen_name:0 "Le sang de l’ours"
 tradition_agot_bearmen_desc:0 "#italic « Des ourses nous devions être, pour sûr. Dans le temps jadis, les Fer-nés accostaient nos côtes avec leurs boutres, et les sauvageons débarquaient depuis la Grève glacée. Quand les hommes étaient absents, c'étaient aux femmes de défendre leurs enfants et leur foyer, sous peine de finir dans des cages. »#!"
 tradition_agot_wolfswood_clansmen_name:0 "Pelage et plumage"
 tradition_agot_wolfswood_clansmen_desc:0 "#italic « Le Bois-aux-Loups recèle pléthore de dangers. Votre dernière chevauchée ne vous a-t-elle donc rien appris ? »#!"
 tradition_agot_northern_clans_name:0 "Armé de fer et de glace"
 tradition_agot_northern_clans_desc:0 "#italic « Carte et contrée ne sont point similaires, affirmait mon père. Ces hommes vivent dans les hautes vallées et les alpages depuis des milliers d'années, gouvernés par leurs chefs de clan. »#!"
 tradition_agot_barrowmen_name:0 "Charger à travers rus et collines"
 tradition_agot_barrowmen_desc:0 "#italic « Où que votre regard se porte dans le Nord, vous y verrez des tertres, Votre Majesté. Ces contrées sont froides et anciennes. »#!"
 tradition_agot_stoneborn_name:0 "L'amour de la chair"
 tradition_agot_stoneborn_desc:0 "#italic « Il n'y a guère que les arbres-cœurs pour voir la moitié de ce qui se passe sur Skagos. »#!"
 tradition_agot_krakenmen_name:0 "Né du sel et de la neige"
 tradition_agot_krakenmen_desc:0 "#italic « En effet, le Cap Kraken, de par sa proximité des Îles de Fer, a changé de mains tant et tant de fois que nombreux sont les mestres à estimer que sa population a plus de sang fer-né que de sang nordien dans ses veines. »#!"
 tradition_agot_crannogmen_name:0 "Au nom de l’eau et de la terre"
 tradition_agot_crannogmen_desc:0 "#italic « Un lieu dangereux comme l'est son peuple. Rarement visible, toujours discret, les fameux habitants des marais, les bouffe-grenouilles, les bourbeux. »#!"
 tradition_agot_harbormen_name:0 "De neige et d’argent"
 tradition_agot_harbormen_desc:0 "#italic « Ils furent grands seigneurs de la Mander… jusqu'à ce que l'ambition les fasse choir brutalement. Le roi loup se saisit de leur or, et en échange leur offrit des terres et le droit de garder leurs dieux. »#!"
 culture_parameter_poet_trait_more_valued:0 "Le [trait|El] [GetTrait('lifestyle_poet').GetName( GetNullCharacter )|l] est plus valorisé"
 culture_parameter_better_barracks_bonuses:0 "La série de [buildings|El] #V $building_type_barracks_01$#! donne des bonus supplémentaires dans les [counties|El] de cette [culture|El]"
 tradition_agot_stormlands_name:0 "Telle la tempête"
 tradition_agot_stormlands_desc:0 "Les Orageois sont un peuple gaillard, féru de violence et d'une nature tempétueuse. Ils se sont acclimatés à la fureur des éléments et des dieux, et plus encore que de simplement survivre dans la furie des affres régionaux, ils y prospèrent."
 tradition_agot_marches_name:0 "Aux innombrables batailles"
 tradition_agot_marches_desc:0 "À la croisée des Terres de l'Orage, du Bief et de Dorne, les Marches ont été témoins d'innombrables batailles depuis l'époque jadis de l'Âge de l'Aube. De fait, leurs habitants sont réputés pour leur connaissance martiale, leur féroce opiniâtreté et leur implacable vigilance envers toute menace potentielle."
 tradition_agot_stormlander_main_name:0 "Que gronde la charge"
 tradition_agot_stormlander_main_desc:0 "#italic « Les Orageois ne sont point bâtis comme les autres, et cela qu'importe qu'ils s'agissent de ceux des rivages rocailleux du Détroit, des profondeurs verdoyantes et ruisselantes du Bois-la-Pluie ou bien encore des marches balayées par les bourrasques cinglantes. Ils sont à l'image des Terres de l'Orage : tumultueux, tempétueux, inflexibles et imprévisibles. »#!"
 culture_parameter_fashionable_trait_more_common:0 "Le [trait|El] [GetTrait('fashionable').GetName( GetNullCharacter )|l] est plus courant"
 culture_parameter_fashionistas_marriage_acceptance_bonus:0 "Acceptation des [marriages|El] : #P +10#!"
 TRADITION_BONUS_WEDDING_CEREMONIES_FASHIONISTAS:0 "[culture_tradition|E] $tradition_agot_fashionistas_name$ : $VALUE|+=0$"
 tradition_agot_fashionistas_name:0 "Raffiné comme la soie"
 tradition_agot_fashionistas_desc:0 "Pour les [ROOT.Culture.GetCollectiveNounNoTooltip] l’hypocrisie est un vice à la mode, et tous les vices à la mode passent pour de la vertu."