 tradition_agot_blackwater_bay_name:0 "Domaine de la Couronne"
 tradition_agot_blackwater_bay_desc:0 "Au regard des autres royaumes, les Terres de la Couronne sont encore très jeunes. Nées de l'allégeance de diverses maisons et peuples envers le Trône de Fer, ses habitants ont adopté les caractéristiques de Port-Réal, amenant toujours plus d'individus à dédaigner la ruralité au profit d'un mode de vie plus urbain."
 tradition_agot_riverlands_name:0 "L’opulence par l’affluence"
 tradition_agot_riverlands_desc:0 "De par leur situation géographique, les Riverains ont souvent été exposés aux dangers de puissances étrangères, et malgré cela ils ont su prospérer, essentiellement en tirant avantage du Trident. Véritable épine dorsale du Conflans, ses affluents que sont la Ruffurque, la Bleufurque et la Verfurque, offrent moult bienfaits à qui sait en exploiter toute la richesse."
 tradition_agot_rivermen_main_name:0 "Les rives du Trident"
 tradition_agot_rivermen_main_desc:0 "#italic « Les seigneurs riverains n'oublient pas si aisément les injustices d'autrefois et la félonie d'antan. Des inimitiés aussi profondes que le sont les rivières qui abreuvent leurs contrées. »#!"
 tradition_agot_clawmen_name:0 "Résilience de la Pince"
 tradition_agot_clawmen_desc:0 "#italic « Les Andals se sont essayés à s'emparer de Claquepince, mais leur sang a inondé les vallées et leurs cadavres se sont embourbés dans les marais. Leurs fils ont tenté en vain de conquérir par l'épée, alors leurs filles ont essayé avec leurs fourreaux. Ce qui ne pouvait être vaincu, pouvait être épousé, ça oui. »#!"
 tradition_agot_high_valyrian_name:0 "Le sang du dragon"
 tradition_agot_high_valyrian_desc:0 "#italic « Les seigneurs dragons de l'Antique Valyria contrôlaient leurs montures en se liant à elles par des sortilèges et des cornes dans lesquelles renfermaient la magie… »#!"
 tradition_agot_western_valyrian_name:0 "Bons baisers des marées"
 tradition_agot_western_valyrian_desc:0 "#italic « Une famille valyrienne, aux origines anciennes et prestigieuses, qui précédèrent les Targaryen dans leur arrivée à Westeros… »#!"
