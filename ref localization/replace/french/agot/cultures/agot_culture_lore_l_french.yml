l_french:
 agot_culture_desc_fallback:0 "Nos archives ne contiennent aucune information sur cette culture."
 AGOT_CULTURE_COOLTIP_CLICK:0 "#I Cliquer pour voir [Culture.GetNameNoTooltip]#!\n\n#weak [Culture.MakeScope.Var('agot_culture_tt_desc').Char.Custom('GetAGOTCultureDesc')]#!"
 AGOT_CULTURE_COOLTIP_RD:0 "#weak [Culture.MakeScope.Var('agot_culture_tt_desc').Char.Custom('GetAGOTCultureDesc')]#!"
 agot_culture_children_desc:0 "Ceux-qui-chantent-le-chant-de-la-Terre, enfants de la forêt, [Glossary('woh dak nag gram', 'CHILDREN_FOREST_GLOSS')], en définitive qu'importe le nom qui leur est donné car c'est un peuple depuis longtemps disparu du monde. Déjà en déclin durant l'Âge de l'Aube avec l'arrivée des hommes, tout ce qu'il en reste aujourd'hui n'est que mythes et légendes."
 agot_culture_dragon_desc:0 "Les dragons ne sont pas simplement les armes tant redoutées de Valyria, ils en sont également les merveilles. Ils sont le feu fait chair, la mort venue des cieux, l'incarnation du pouvoir et le symbole de la domination."
 agot_culture_giant_desc:0 "À l'instar des Enfants de la Forêt, les géants sont l'une des deux espèces indigènes de Westeros, et tout comme eux, leur population a progressivement diminué depuis l'arrivée des hommes, jusqu'à ne plus être qu'une population éparse subsistant au-delà du Mur."
 agot_culture_ifequevron_desc:0 "Les marcheurs des bois, ou Ifequevron, comme les nommaient les Dothraki, étaient un peuple originaire de la région septentrionale d'Essos, et oublié depuis des siècles. D'aucuns pensent qu'ils étaient apparentés aux Enfants de la Forêt de Westeros, en raison des récits qui évoquent leur petite taille ainsi que des arbres sculptés."
 agot_culture_jhogwin_desc:0 "Les géants de pierre, ou Jhogwin dans la langue dothraki, étaient une peuplade de créatures gigantesques vivant autrefois dans la région septentrionale des Os. Si un parallèle peut être naturellement fait avec les géants de Westeros, ceux d'Essos étaient bien deux plus grands que leurs semblables d'outre-mer, ce qui ne les a pas sauvés de leur extermination par les Jogos Nhai."
 agot_culture_fisher_queen_race_desc:0 "À une époque antérieure à la Longue Nuit, les Reines Pêcheuses régnaient sur un royaume situé dans la Mer d'Argent, lequel disparu durant cette sombre période. La dernière des reines aurait donné, dit-on, naissance à Huzhor Amai, qui engendrera à son tour les Sarnores."
 agot_culture_others_desc:0 "Si l'on en croit les rats gris de la Citadelle, les marcheurs blancs originaires des Contrées de l'Éternel Hiver n'existeraient que dans les mythes et les légendes, mais pour les tribus sauvageonnes au-delà du Mur ainsi que nombre de Nordiens ça et là, les Autres reviendront tôt ou tard, et avec eux viendra à nouveau la Longue Nuit."
 agot_culture_mazemaker_desc:0 "De part et d'autres du monde l'on peut admirer d'incroyables labyrinthes faites de pierres noires, aussi bien à Villevieille qu'à Lorath, mais le plus vaste et le plus impressionnant de tous se trouve être sans nulle doute celui de Lorassyon. D'après les ossements massifs qu'on laissés leurs créateurs, appelés en toute logique les Labyrinthiers, on leur prête une nature intermédiaire entre l'Homme et les géants, peut-être né de l'union des deux espèces. Nul ne sait qui est responsable de leur disparition survenue il y a fort longtemps, mais d'aucuns accusent bien volontiers les sirènes, les selkies, les hommes-morses ou « ceux des profondeurs »."
 agot_culture_andal_desc:0 "Investis d'une mission divine, les Andals firent voile vers le couchant et entreprirent une conquête qui marqua irrémédiablement Westeros il y a près de trois mille ans. Au gré des batailles et des conversions, ils s'emparèrent de tous les royaumes suderons, apportant avec eux une nouvelle forme d'écriture qui remplaça les runes utilisées par les Premiers Hommes, mais aussi l'acier, la Foi des Sept et la chevalerie, jusqu'à voir leur avancée s'enliser dans les marais du Neck."
 agot_culture_andalosi_desc:0 "Lorsque Qarlon, Roi de tous les Andals, marcha sur Norvos, il provoqua le courroux de l'Antique Valyria, qui, pour venir en aide à sa « fille » déchaîna le feu d'une centaine de dragons sur lui, son royaume ainsi que son peuple. Ceux qui réchappèrent à ce qu'on nomme aujourd'hui la Purge de Lorath ne sont plus aujourd'hui qu'un peuple dispersé et divisé, placé sous le joug de diverses puissances d'Essos, tels que les cités libres."
 agot_culture_crownlander_desc:0 "Parce que les dragons arrivèrent et que les Terres de la Couronne furent créées, les peuplades de la Baie de la Néra purent enfin être unifiées, avec Port-Réal et le Trône de Fer comme socle commun, mettant fin à leur division en maints royaumes."
 agot_culture_sandman_desc:0 "Dorne a toujours été la région la moins peuplée de Westeros, raison pour laquelle les Andals n'eurent aucun mal à occuper les dunes et les côtes, jusqu'à faire choir les royaumes d'antan des Montagnes Rouges, par l'épée autant que par le mariage."
 agot_culture_vineman_desc:0 "Si la Treille a su acquérir une réputation aux quatre coins du monde, c'est avant tout pour ses vins de qualité, tels que le brandevin ou La Treille auré. Le savoir-faire en la matière des habitants leur a permis d'élever la viticulture au rang d'art, bâtissant par là même une flotte navale des plus impressionnantes, tant sur le plan économique que militaire, pour acheminer et protéger leur fierté culturelle."
 agot_culture_groveman_desc:0 "Les hommes des Marches du Nord sont depuis longtemps le bouclier du Bief face aux Ouestiens et aux Riverains, et si leurs homologues des Marches du Sud ont, eux, la bonne fortune de bénéficier des Montagnes Rouges comme protection naturelle, ceux du nord n'ont guère plus que des forêts et des piques comme seul rempart face aux envahisseurs."
 agot_culture_honeywiner_desc:0 "Les habitants qui vivent aux abords de l'Hydromel et de ses affluents furent les derniers à être rattachés au Bief, et si jadis ils semblaient déjà avoir plus de considération envers Villevieille que Hautjardin, aujourd'hui encore beaucoup partagent cette dilection."
 agot_culture_reachman_desc:0 "Ceux qui habitent la Mander et ses affluents formaient autrefois le cœur du Bief, et c'est sur ce royaume que les rois de la Maison Jardinier régnèrent avant de finalement intégrer les régions voisines dans leur giron. Aujourd'hui encore se perpétue sur ces terres la voie de la Mainverte."
 agot_culture_shieldman_desc:0 "Hommes et femmes des Îles Bouclier, nommés jadis les îles Embrumées, sont un peuple robuste, qui fait honneur à sa réputation en servant de première ligne de défense face à la menace des Fer-nés et autres dangers maritimes qui pourraient menacer le Bief."
 agot_culture_riverlander_desc:0 "Les Riverains qui bordent le Trident usent de ses trois affluents que sont la Verfurque, la Ruffurque et la Bleufurque, pour le commerce, la guerre ainsi que l'approvisionnement alimentaire. Ces trois rivières sont le cœur des trois grands royaumes du Conflans, autant métaphoriquement que littéralement parlant."
 agot_culture_bay_riverman_desc:0 "Les Riverains qui bordent les baies du Détroit sont semblables à ceux qui bordent le Trident, à ceci près que leur proximité avec les territoires limitrophes du Conflans les amènent à un brassage ethnique plus fréquent."
 agot_culture_cape_riverman_desc:0 "Les Riverains du Cap des Aigles sont depuis bien longtemps en première ligne dans la guerre séculaire qui les oppose aux Fer-nés, c'est donc tout naturellement qu'ils sont devenus l'avant-garde du Conflans contre les pillards venus des Mers du Crépuscule."
 agot_culture_green_riverman_desc:0 "Les Riverains qui bordent le Neck, tout du long au nord de la Verfurque, sont coutumiers des escarmouches contre les démons des marais qui vivent dans ces terres, mais en dépit de cette lutte incessante, c'est par le biais du commerce qui traverse la région qu'ils se sont enrichis."
 agot_culture_highland_riverman_desc:0 "Certains Riverains ont fait des hautes terres et des collines leur foyer, vivant reclus à l'est de la Verfurque, non loin des Montagnes de la Lune. Cette proximité a bien entendu eu un impact sur leur mode de vie, partageant des similitudes avec les Valois tout en conservant un lien étroit avec le reste du Conflans."
 agot_culture_lake_riverman_desc:0 "Les Riverains qui entourent l'Œildieu vivent de l'eau, comme tous Riverains, mais c'est au gré d'un lac et non d'une rivière qu'ils mènent leur barque. Souvent soumis à des puissances étrangères de toutes sortes, ils auront néanmoins réussi à conserver leur foi et leurs us."
 agot_culture_rush_riverman_desc:0 "Au plus au sud du Conflans, aux abords de la Néra, se trouvent les Riverains qui ont constitué le carrefour entre les principaux royaumes andals, devenant ainsi les témoins de moult batailles qui s'y sont déroulées."
 agot_culture_cape_stormlander_desc:0 "Les Orageois du Cap de l'Ire sont réputés pour s'être grandement adaptés aux conditions de vie diluviennes de la région. Aussi torrentielles que puissent être les pluies qui frappent la région, ils font preuve d'une détermination et d'une résilience à toute épreuve."
 agot_culture_hook_stormlander_desc:0 "Le Bois-du-Roi et le Bec de Massey abritent un peuple en marge du reste des Terres de l'Orage, qui, s'il partage nombre de points communs avec leurs voisins, n'en reste pas moins des Orageois intransigeants sur la moralité."
 agot_culture_stormlander_desc:0 "À l'image du « Défi de Durran », hommes et femmes qui se trouvent au cœur de l'ancien royaume des Durrandon endurent encore et encore toutes les épreuves qui se dressent sur leurs chemins, et toujours avec la même force inflexible. Ni les cieux déchaînés ni les dragons redoutés n'ont jamais réussi à les ébranler."
 agot_culture_tarthman_desc:0 "Les Orageois de l'Île aux Saphirs sont un peuple fier aux origines plus andales que leurs congénères continentaux. Jadis, l'île abritait un puissant royaume bâti dans le marbre."
 agot_culture_marcher_desc:0 "Les hommes et femmes qui vivent dans les Marches Dorniennes se sont endurcis au gré des siècles passés à repousser les pillards venus du sud des Montagnes Rouges. Les arcs longs qu'ils ont appris à perfectionner sont particulièrement redoutables dans ces contrées."
 agot_culture_bite_valeman_desc:0 "Les Valois originaires de la Morsure, du fait de leur proximité avec le Conflans et le Nord, ont peu peu assimilé certaines des coutumes de leurs voisins."
 agot_culture_valeman_desc:0 "Ceux qui vivent dans les plaines du Val d'Arryn, au cœur même de l'ancien royaume de la Montagne et du Val, jouissent des terres de l'une des régions les plus fertiles de tout Westeros. Leur culture est fondée sur les idéaux chevaleresques de la galanterie et de l'honneur."
 agot_culture_sisterman_desc:0 "Les Sœurois sont un peuple bien atypique si on les compare à leurs voisins Valois du continent. Tombé sous le joug des Andals au même titre que le reste du Val, ils ont néanmoins conservé bon nombre de leurs us hérités des Premiers Hommes. Certains d'entre eux naissent avec les doigts et orteils palmés, la marque sacrée, dit-on, de l'ancienne déesse qu'ils vénéraient autrefois, et dont le culte n'a que péniblement survécu aux Andals."
 agot_culture_green_westerman_desc:0 "En raison de leur proximité, les Ouestiens méridionaux présentent nombre de similitudes avec les Biefois septentrionaux. Habiles dans l'art de cultiver dans les collines, ils sont parvenus à trouver une seconde source de richesse en sus de l'exploitation des filons de minerai, comme attendu de tous habitants des Terres de l'Ouest."
 agot_culture_hill_westerman_desc:0 "Parce qu'ils ont élu domicile au cœur des collines et des hautes terres des Terres de l'Ouest, ces Ouestiens gardent les passages qui mènent vers le Conflans, constituant ainsi la première ligne de défense des contrées occidentales."
 agot_culture_westerman_desc:0 "Les Ouestiens, installés au cœur de ce qui fut le royaume du Roc, ont bâti leur réputation sur leurs vastes mines et leurs structures souterraines."
 agot_culture_shore_westerman_desc:0 "Les Ouestiens qui peuplent les rivages et les îles des Terres de l'Ouest ont longtemps sillonné les Mers du Crépuscule en quête de richesse et de gloire, et pour cette raison, ils furent contraints à affronter les Fer-nés bien avant le reste de l'Ouest."
 agot_culture_clawman_desc:0 "Les habitants de la Presqu'île de Claquepince, qu'on nomme sobrement les Claquepinces, forment un peuple bien étrange à qui l'on prête une vie à demi-sauvage. Encore grandement issue des Premiers Hommes en raison de la défaite des Andals par la nature même du territoire, la Foi des Sept est tout de même parvenue à s'enraciner sur leurs terres, sans pour autant qu'ils ne renient leur nature belliqueuse."
 agot_culture_first_man_desc:0 "À une époque imprécise remontant entre huit et douze mille ans, les Premiers Hommes arrivèrent à Westeros par le Bras de Dorne, marquant le début de ce qui sera l'Âge des Héros. Avec eux vinrent la maîtrise du bronze et la domestication des chevaux, leur offrant une supériorité face aux autochtones avec qui ils finirent par entrer en guerre : les Enfants de la Forêt."
 agot_culture_barrowman_desc:0 "Les habitants des Tertres sont le deuxième plus grand groupe à constituer la population nordienne, dominant aussi bien les Tertres que les Rus. C'est un peuple connu avant tout pour son lien profond avec les chevaux, aussi bien dressés que sauvages, qui prolifèrent dans ces régions."
 agot_culture_bearman_desc:0 "Les habitants de l'Île-aux-Ours sont depuis longtemps coutumiers des incursions des Fer-nés et des sauvageons. Aguerris par un tel mode de vie, ils n'en sont devenus que plus irréductibles, allant même jusqu'à pousser les femmes à prendre les armes au même titre que leurs homologues masculins pour défendre leurs terres en l'absence de ces derniers."
 agot_culture_crannogman_desc:0 "Reclus, et bien souvent méprisés en raison de leur petite stature et de leur usage manifeste du poison, les Paludiers sont autant de féroces alliés que de redoutables ennemis, qui ont, des millénaires durant, ardemment protégé le Nord des envahisseurs, qu'ils fussent Andals ou Fer-nés. Et parce que personne ne parvient à les bouter hors de leurs marais, leurs ennemis finissent par préférer les mots aux armes pour les atteindre, en les traitant de tous les noms : « bouffe-grenouilles », « bourbeux » ou encore  « démons des marais »."
 agot_culture_harborman_desc:0 "Les habitants de Blancport et des terres attenantes ont de cela singulier qu'en dépit de leur origine nordienne, ils sont bien plus cosmopolites que leurs congénères. Du fait de la ville elle-même, certes, mais aussi par le biais du commerce florissant qui les amène à échanger régulièrement avec les autres puissances du Détroit."
 agot_culture_krakenman_desc:0 "Les habitants du Cap Kraken sont des gens du Nord, jadis dominés par les Fer-nés, et cette histoire commune nourrit depuis bien longtemps une animosité réciproque. Les Mers du Crépuscule sont constamment surveillés par les continentaux qui guettent les boutres en partance des Îles de Fer."
 agot_culture_northman_desc:0 "Les Nordiens représentent le peuple prédominant du Nord, et en purs descendants des Premiers Hommes, ils perpétuent des traditions ancestrales qui n'ont jamais souffert d'ingérences étrangères, le Nord ayant été le seul royaume à n'être jamais tombé face aux Andals. Ce motif de fierté, en plus des conditions de vie difficiles, a engendré des individus austères possédant un sentiment identitaire bien plus marqué que dans d'autres régions de Westeros."
 agot_culture_skagosi_desc:0 "De tous les peuples qui habitent le Nord, les Piernés sont certainement ceux perçus comme les moins civilisés. À peine plus que des sauvageons, railleraient certains, leurs « compatriotes » Nordiens les appellent d'un ton méprisant les Skaggs, mais c'est pourtant les seuls à continuer d'utiliser la vieille langue, et les seuls à véritablement perpétuer toutes les traditions des Premiers Hommes, même les moins moralement acceptées."
 agot_culture_wolfswood_clansman_desc:0 "Ceux qui habitent le Bois-aux-Loups sont grandement liés à cette étendue boisée qui n'est pas qu'un foyer, mais aussi une mère nourricière et protectrice. Les nombreuses bêtes que l'on y trouve sont autant de sources de nourriture tandis que la profusion de bois offre un apport constant en matériaux très utiles."
 agot_culture_first_clan_desc:0 "Lorsque Brandon le Bâtisseur érigea le Mur suite à la Longue Nuit, certains eurent la mauvaise fortune de se trouver du mauvais côté. Les premiers clans sauvageons furent ainsi formés par ces Premiers Hommes, contraints à endurer des conditions de vie très rudes, pour qu'après maintes générations, émergent finalement une multitude de peuples endurcis, qui encore aujourd'hui vivent dans ce qu'ils qualifient désormais de « Vrai Nord »."
 agot_culture_axeman_desc:0 "Tandis que bon nombre d'Andals se mirent en quête du couchant, certains se tournèrent vers l'est, cherchant à renouer avec leur terre natale ancestrale, la péninsule de la Hache. Là, ils trouvèrent sérénité et sécurité, témoignant l'hommage à d'autres puissances afin que leurs terres demeurent un havre de paix."
 agot_culture_chroyanar_desc:0 "Les Rhoynar de Chroyane, jadis connus comme la Ville des Fêtes, désormais comme les Chagrins, étaient sans conteste les plus grands de tous les Rhoynar, tant et si bien que c'est vers eux que les autres se tournaient, en temps de guerre comme en temps de paix."
 agot_culture_mellar_desc:0 "Les Rhoynar de Sar Mell et les marais orientaux ont longtemps constitué un rempart contre toutes menaces venant de l'est."
 agot_culture_noynar_desc:0 "Lorsque les Rhoynar s'étendirent tout du long de la Noyne jusqu'à Norvos, ils firent leurs les collines avoisinantes tout en considérant les eaux de la région comme sacrées."
 agot_culture_qhoynar_desc:0 "Les Rhoynar qui vivent le long de la Qhoyne sont connus pour leurs magnifiques ouvrages en marbre et leur habileté à naviguer sur les eaux du Lac de la Dague."
 agot_culture_rhoynar_original_desc:0 "Peuple fluvial par excellence, les enfants de la Mère Rhoyne auraient été parmi les premiers hommes à travailler le fer, connaissance qu'ils ont d'ailleurs jadis partagée avec les Andals. Des siècles durant ils sillonnèrent les flots de leur fleuve maternel, avant que ceux-ci ne s'embrasent sous le feu des dragons, pour finir soit réduits en esclavage par les Valyriens à l'issue des guerres rhoynaises, soit exilés aux cotés de la princesse Nymeria."
 agot_culture_sarhar_desc:0 "De l'ensemble du territoire rhoynar d'antan, Sarhoy était la cité la plus au sud de toute, et ses habitants semblaient bien atypiques au regard des autres Rhoynar, lesquels étaient connus pour être fortement attachés à leur fleuve, à la fois figure divine et maternelle. Mais ceux de Sarhoy se sont risqués à s'en éloigner, naviguant jusque sur les flots de la Mer d'Été."
 agot_culture_sarar_desc:0 "Ny Sar, connue comme la cité des fontaines, était la principale puissance rhoynaise, protégeant jadis les régions septentrionales de la Rhoyne ainsi que la Noyne. C'est de là que Garin mena ses troupes contre les Hommes Velus, et c'est également ici que se trouvait le siège de la princesse Nymeria."
 agot_culture_trimbaez_fen_desc:0 "Les Trimbaez Fen, ou « Hommes qui parlent » dans la langue commune, sont connus pour leurs longues pérégrinations et les innombrables caravanes qui les accompagnent."
 agot_culture_cymmeri_desc:0 "Peuple tribal installé aux abords de la Mer d'Argent, les Cymmeri étaient réputés pour avoir été les premiers hommes à travailler le fer. Comme tous les autres peuples de la région, ils furent envahis et assimilés par Huzhor Amai, fondateur légendaire de Sarnor."
 agot_culture_gipps_desc:0 "Peuple tribal installé aux abords de la Mer d'Argent, les Gipps étaient réputés pour leur usage de bouclier d'osier à la guerre. Comme tous les autres peuples de cette région, ils furent envahis et assimilés par Huzhor Amai, fondateur légendaire de Sarnor."
 agot_culture_zoqora_desc:0 "Peuple tribal installé aux abords de la Mer d'Argent, les Zogora étaient réputés pour les chars qu'ils utilisaient à la guerre. Comme tous les autres peuples de la région, ils furent envahis et assimilés par Huzhor Amai, fondateur légendaire de Sarnor."
 agot_culture_goraez_fen_desc:0 "Les Goraez Fen, ou « Hommes des lacs » dans la langue commune, sont connus pour leur usage des herbes limniques que l'on trouve aux abords de Gornath et avec lesquels ils traitent nombre de maux."
 agot_culture_zanhar_fen_desc:0 "Les Zanhar Fen, ou « Hommes Studieux » dans la langue commune, sont connus pour leur soif insatiable de connaissances et les vastes bibliothèques qu'ils ont bâties à Sallosh pour l'étancher."
 agot_culture_madekh_fen_desc:0 "Les Madekh Fen, ou « Hommes qui parlent » dans la langue commune, sont connus pour leur grande déférence à la discipline et envers tout ce qui a trait à la guerre, ce qui a grandement façonné leur culture mais aussi leur cité, Mardosh."
 agot_culture_tagaez_fen_desc:0 "Les Tagaez Fen, ou « Hommes Grands » dans la langue commune, étaient le peuple de Huzhor Amai, descendants des Reines Pêcheuses et issus de l'union des Cymmeri, des Zogora et des Gipps. Ils furent à l'origine de l'une des plus grandes civilisations du monde au sortir de la Longue Nuit."
 agot_culture_gilal_fen_desc:0 "Les Gilal Fen, ou « Hommes Musiciens » dans la langue commune, étaient le peuple de Sathar, réputés pour les festivités célébrant les chutes d'eau qui entouraient la cité."
 agot_culture_cenaakh_fen_desc:0 "Les Cenaakh Fen, ou « Hommes Cléricaux » dans la langue commune, étaient le peuple de Kyth, Cité des Temples, réputés à travers Sarnor pour leur ferveur extrême."
 agot_culture_giren_fen_desc:0 "Les Giren Fen, ou « Hommes des Collines » dans la langue commune, étaient le peuple issu du métissage des Sarnores et des autochtones des collines d'Essaria, réputés pour être les plus délurés de tous ces peuples indociles."
 agot_culture_zivylar_fen_desc:0 "Les Zivylar Fen, ou « Hommes Dorés » dans la langue commune, étaient le peuple de Rathylar, Cité de la Monnaie, réputés pour leur fortune gargantuesque."
 agot_culture_cewi_fen_desc:0 "Les Cewi Fen, ou « Hommes du Delta » dans la langue commune, sont un peuple vivant dans les zones humides du delta de la Sarne."
 agot_culture_dawiz_fen_desc:0 "Les Dawiz Fen, ou « Derniers Hommes » dans la langue commune, étaient le peuple de Saath, la dernière cité du royaume de Sarnor. Si résurgence des Sarnores il devait y avoir, les Dawiz Fen en seraient probablement les plus proches."
 agot_culture_essosi_valyrian_desc:0 "Malgré la destruction des Possessions par le Fléau et le métissage du sang valyrien avec les peuples essosi, on trouve parmi les cités libres et même au-delà des familles qui perpétuent les us et coutumes de l'antique et glorieuse Valyria. Le sang des seigneurs dragons ne coule peut-être pas dans leurs veines, mais elles n'en demeurent pas moins fières de cet héritage sans pareil."
 agot_culture_valyrian_original_desc:0 "Les Contrées de l'Été Constant ont vu naître la plus grande civilisation que le monde ait jamais connue, les Possessions de Valyria, et ce qui n'était au départ que de simples bergers purent ainsi bâtir un vaste et glorieux empire grâce à la maîtrise de la magie, du sang, mais aussi et surtout des dragons — symbole du pouvoir absolu."
 agot_culture_braavosi_desc:0 "La fondation de Braavos et de son peuple remonte à l'époque où des esclaves sont parvenus à fuir l'empire valyrien, quatre siècles avant le Fléau. Cette origine singulière explique l'absence de trait distinctif chez ce peuple fortement métissé, lequel, pour survivre a dû faire preuve d'une assiduité qu'on leur reconnait encore aujourd'hui. Ils excellent désormais dans le domaine bancaire, la teinture mais également la construction navale, leurs navires étant aisément reconnaissables par le pourpre foncé de leurs voiles, lesquelles sont visibles aux autres coins du monde."
 agot_culture_essarian_desc:0 "Selon le peuple d'Essaria, c'est au soleil, qu'ils surnomment « le Glorieux », que l'on doit toutes les choses du monde, et c'est parce qu'ils ne partageaient pas le pluralisme religieux de Valyria qu'ils s'étaient mis en quête d'un lieu non souillé par les fausses idoles pour y vénérer leur dieu sans ingérence aucune."
 agot_culture_lorathi_desc:0 "C'est parmi les légendaires ouvrages des Labyrinthiers et les vestiges calcinés des Andals que les Lorathi ont trouvé refuge. Libérés de la domination des premiers adorateurs de Boash, ils sont désormais d'une nature plus bienveillante, sans pour autant oublier de défendre leurs propres intérêts contre toutes menaces étrangères."
 agot_culture_norvoshi_desc:0 "Voyant la tolérance envers les autres fois comme un sacrilège, les Norvoshi se mirent en quête d'un lieu où ils pourraient pratiquer leur culte en toute pureté, et depuis lors, ils font montre d'un grand zèle dans la protection de leurs terres et de leurs écritures contre toutes menaces hérétiques."
 agot_culture_pentoshi_desc:0 "Les Pentoshi, comme tant d'autres parmi les cités libres, ont toujours eu l'affection de l'or, mais parce que les premiers d'entre eux du temps de Valyria n'étaient en rien des nobles, juste de simples marchands, marins ou agriculteurs, ils furent plus enclins à se mélanger à la population locale plutôt que de s'obstiner dans une vaine quête de pureté valyrienne, comme le firent par exemple les Volantains."
 agot_culture_nonteloshi_desc:0 "Les contrées que l'on trouvent entre Pentos et Myr sont bien différentes des Terres Disputées, perpétuellement malmenées par les conflits d'intérêts entre les Trois Filles. Et parce qu'elles sont bien différentes, leur peuple l'est tout autant, privilégiant la concorde et la courtoisie, la vassalité et la soumission ne leur est en rien pénible."
 agot_culture_qohorik_desc:0 "C'est à l'orée de la Forêt Noire que les Qohoriens trouvèrent un lieu pour vénérer leur dieu sombre et pratiquer leurs arts occultes, mais outre leur sinistre réputation, ils sont aussi connus pour leurs artisans sans pareille, capables de produire des tapisseries somptueuses, des sculptures d'une grande finesse, un acier d'une qualité supérieure à celui des Ouestriens, mais par-dessus, ils sont les seuls capables de reforger l'acier valyrien."
 agot_culture_hartalari_desc:0 "Plus que les terres qui sont disputées au nom des Trois Filles, c'est le peuple qui les habite qui subit les affres de cette querelle sororale. Les conflits incessants ont ravagé la région, jadis fertile, la dévoyant en une zone de guerre."
 agot_culture_lyseni_desc:0 "Les Lysiens sont à l'image de leur cité, magnifiques vus de l'extérieur, mais sitôt que l'on gratte la surface, l'on y découvre toutes sortes de choses bien laides. L'hospitalité légendaire qu'ils offrent à ceux qui souhaitent profiter de leur foyer paradisiaque ne saurait minorer les liens étroits qu'ils entretiennent avec l'esclavage et la piraterie."
 agot_culture_myrish_desc:0 "Les Myriens sont des individus bien plus réservés que leurs voisins hauts en couleurs. Nul ne rivalise avec leur savoir-faire, comme en témoigne leurs verriers réputés à travers le monde, lesquels sont à l'origine des célèbres « yeux de Myr ». De plus, ils tirent admirablement parti du labeur des esclaves, tandis que leurs guerriers font montre d'autant d'efforts pour défendre la cité grâce à leurs redoutables arbalètes."
 agot_culture_tyroshi_desc:0 "Les Tyroshi sont un peuple animé par la passion, dès lors qu'ils entreprennent quelque chose, ils s'y investissent à cœur perdu, qu'il s'agisse de guerre, d'amour, d'artisanat, de commerce ou de tout ce qui mérite d'être entrepris. Leurs heaumes et leurs teintures ont fait leur renommée, et les uns comme les autres sont utilisés pour refléter leur individualité propre."
 agot_culture_volantene_desc:0 "Les Volantains revendiquent fièrement leur cité comme la première fille de Valyria, et sa proximité avec le territoire d'origine des Valyriens a poussé nombre de ces derniers à y trouver refuge au sortir du Fléau. Bien que divisés par les origines distinctes des uns et des autres, descendants des nobles d'un côté, riches marchands de l'autre, tous se rejoignaient sur l'idée de raviver l'ancien empire, mais encore une fois, les méthodes pour y parvenir furent motifs de division."
 agot_culture_ghaeni_desc:0 "Au sortir de la Cinquième Guerre Ghiscari, l'Ancienne Ghis tomba, et avec elle son empire, mais nombre de survivants se mirent en quête de rebâtir leur vie hors de portée des Possessions. Ainsi naquit la Nouvelle-Ghis sur l'île de Ghaen, où les anciennes coutumes se sont perpétuées aux côtés de nouvelles, toutes régies sous l'autorité d'un roi."
 agot_culture_ghardaqi_desc:0 "Les colons Ghiscari, installés en amont de Meereen, embrassèrent pleinement la vie frontalière à la Grande Mer Herbeuse et aux contrées méridionales, faisant bon usage des seigneurs du cheval pour ainsi rassembler les esclaves qui partiraient ensuite rejoindre le cœur de Ghis."
 agot_culture_ghiscari_original_desc:0 "Le Vieil Empire portait son nom, tant il était ancien même comparé au Royaume de Sarnor et à l'Empire Doré de Yi Ti. De brique il était, et de sang, celui des innombrables esclaves, mais aussi celui des Ghiscari, des légions et de tous ceux morts pour bâtir les grandes pyramides, encore visibles aujourd'hui, à l'image d'un héritage qui semble destiné à survivre même face au temps."
 agot_culture_shuzduni_desc:0 "Les colons Ghiscari qui s'établirent au sud des Lhazaréens épousèrent les us des seigneurs du cheval de la Grande Mer Herbeuse, adoptant un mode de vie propre à pérégriner à travers la région."
 agot_culture_hazdahni_desc:0 "Les colons Ghiscari qui partirent pour le nord, en plein cœur des collines et des plaines de la Grande Mer Herbeuse, durent embrasser un mode de vie propice à la région en s'adonnant au commerce avec les peuples alentours."
 agot_culture_astapori_desc:0 "Les Astapori se voient comme le reflet de l'image militaire qu'avait autrefois l'Ancienne Ghis, et c'est par leur volonté que les légions d'antan ont été ramenées à la vie sous les traits des immaculés, lesquels sont désormais l'épine dorsale d'une éventuelle résurgence ghiscari."
 agot_culture_meereenese_desc:0 "Quoi qu'en disent ou pensent ses sœurs, Meereen demeure le plus important bastion du peuple Ghiscari, un fait que ne manquera jamais de souligner ses habitants, eux qui s'enorgueillissent de posséder la plus grande de toutes les pyramides et d'abriter les tant renommées fosses de combat."
 agot_culture_yunkaii_desc:0 "Yunkaï, autrement nommée la Cité Jaune ou bien la Reine des Cités, est de loin la plus somptueuse et la plus raffinée des cités Ghiscari, et quand on sait que celles-ci sont déjà grandement supérieures à toutes autres cités de par le monde, ce n'est pas peu dire. Les Yunkaï’i ont fait le choix judicieux d'adopter les plus nobles aspects de l'Ancienne Ghis, pour ne laisser les plus vils qu'à ses sœurs."
 agot_culture_gorgari_desc:0 "Gorgaï est la plus grande cité ghiscari des régions méridionales. Ses habitants utilisant l'Île des Larmes pour capturer et convoyer les natifs jusqu'au cœur du territoire Ghiscari, un marché esclavagiste florissant y a vu le jour, parvenant même à rivaliser avec ceux de leur foyer d'origine."
 agot_culture_goroshari_desc:0 "Parce que Gorosh fut bâtie sur les rives du Cap de la Vouivre, ses habitants doivent souffrir non seulement les lézards volants mais aussi les innombrables dangers venus des marais. Tous ces affres les auront au moins rendus bien plus coriaces que leurs cousins."
 agot_culture_zamettari_desc:0 "Zamettar, bâtie à l'embouchure du Zamoyos, fait office de bastion contre la jungle impitoyable qui s'étend au sud, ne laissant d'autres choix à ses habitants que de vivre dans une lutte à mort perpétuelle contre tout ce qui les entoure jours et nuits."
 agot_culture_dothraki_desc:0 "Les Dothraki, « les hommes qui chevauchent » dans leur propre langue, que d'aucuns nomment « seigneurs du cheval » (zhey vezhak), sont d'imposants et redoutables cavaliers qui parcourent la Grande Mer Herbeuse. Craignant jadis les dragons, leur expansion n'a commencé qu'au sortir du Fléau, et désormais il n'y a guère que la mer pour faire obstacle à ceux qui craignent toute eau que ne peuvent boire leurs chevaux."
 agot_culture_lhazareen_desc:0 "Les habitants de Lhazaar forment une paisible société pastorale qui prêche une religion pacifiste, et pour cette raison, cela fait d'eux les cibles parfaites pour leurs voisins esclavagistes que sont les Dothraki et les Ghiscari. Fort heureusement, leur cité peut encore compter sur d'imposantes murailles pour les protéger, autant que faire se peut."
 agot_culture_omberi_desc:0 "Les habitants du royaume d'Omber sont un peuple paisible et placide, qui doivent essentiellement leur survie à leur soumission envers les Dothrakis à qui ils offrent de généreux présents, et au fait de n'avoir jamais cherché à étendre leurs terres, n'ayant aucune ambition expansionniste."
 agot_culture_hairy_forest_desc:0 "Les Hommes Velus, peuple dont le véritable nom aura été égaré avec le temps, inspirait pourtant la terreur à travers le monde connu. Guerriers sauvages chevaucheurs de licornes, ils pillaient et guerroyaient tous ceux qui avaient le malheur de partager une frontière avec eux. Nombreuses étaient leurs tribus, et certaines avaient élu domicile dans les vastes forêts d'Essos."
 agot_culture_hairy_isle_desc:0 "Les Hommes Velus, peuple dont le véritable nom aura été égaré avec le temps, inspirait pourtant la terreur à travers le monde connu. Guerriers sauvages chevaucheurs de licornes, ils pillaient et guerroyaient tous ceux qui avaient le malheur de partager une frontière avec eux. Nombreuses étaient leurs tribus, et certaines avaient élu domicile sur les rives et les îles de la Mer Grelotte."
 agot_culture_hairy_rivers_desc:0 "Les Hommes Velus, peuple dont le véritable nom aura été égaré avec le temps, inspirait pourtant la terreur à travers le monde connu. Guerriers sauvages chevaucheurs de licornes, ils pillaient et guerroyaient tous ceux qui avaient le malheur de partager une frontière avec eux. Nombreuses étaient leurs tribus, et certaines avaient élu domicile dans les collines entourant les affluents du nord de la Rhoyne."
 agot_culture_bayasabhadan_desc:0 "Au cœur des Os, l'immense chaîne de montagne qui sépare Essos en deux, subsistent les derniers vestiges du Patrimoine d'Hyrkoon. Dans la zone méridionale, sur la Route du Sable, se dresse l'imposante cité-bastion de Bayasbhad, dont les habitants, à l'instar de leurs cousins des autres cités, repoussent encore et toujours les menaces, jouant ainsi un rôle crucial dans le bon maintien du commerce terrestre."
 agot_culture_hyrkoonan_original_desc:0 "Le peuple du Patrimoine d'Hyrkoon sont les véritables descendants du grand héros éponyme, celui que l'on connaît également comme « Azor Ahai ». Celui-là même qui a sauvé le monde en mettant fin à la Longue Nuit. Parce qu'il s'agit d'un très lourd héritage qui ne doit en rien péricliter, seuls les spécimens masculins les plus dignes peuvent transmettre leur « patrimoine » aux générations futures. Ainsi, jamais le sang du Héros ne déclinera ni les générations futures ne failliront, quand viendra le retour inéluctable de la Longue Nuit."
 agot_culture_kayakayanayan_desc:0 "Au cœur des Os, l'immense chaîne de montagne qui sépare Essos en deux, subsistent les derniers vestiges du Patrimoine d'Hyrkoon. Dans la zone septentrionale, sur la Route de l'Acier,  se dresse l'imposante cité-bastion de Kayakayanaya, dont les habitants, à l'instar de leurs cousins des autres cités, repoussent encore et toujours les menaces, en particulier les Jogos N'hai, pour qui ils nourrissent un antagonisme viscéral et séculaire."
 agot_culture_shamyrianan_desc:0 "Au cœur des Os, l'immense chaîne de montagne qui sépare Essos en deux, subsistent les derniers vestiges du Patrimoine d'Hyrkoon. Sur la Route de la Pierre se dresse l'imposante cité-bastion de Shamyriana, dont les habitants, à l'instar de leurs cousins des autres cités, repoussent encore et toujours les menaces, tout en extrayant des montagnes les ressources nécessaires à fortifier leurs places fortes et leurs avant-postes."
 agot_culture_shan_ren_desc:0 "À l'époque où le Patrimoine était plus que trois malheureux avant-postes isolés et où la terre n'était pas encore l'étendue de poussière que l'on connaît aujourd'hui comme la Grande Mer Sableuse, Asabhad était l'une de ses cités, et ses habitants n'eurent d'autres choix que de trouver refuge sous le giron de l'Empire Doré lors de la disparition du Patrimoine. Du métissage de la population naquit les Shan Ren."
 agot_culture_ibbatese_desc:0 "Les habitants d'Ib qui cherchent le réconfort des montagnes et des hautes terres finissent d'autant plus reclus, mais pas moins féroces que leurs congénères qui privilégient les zones côtières."
 agot_culture_ibbenese_desc:0 "Bien que les voiles de leurs navires puissent être aperçus bien loin de leur foyer, les habitants d'Ib n'en restent pas moins un peuple reclus, connus pour leurs imposants baleiniers et qui font de fidèles alliés autant que de redoutables ennemis."
 agot_culture_ib_sarese_desc:0 "Parce qu'Ib Sar était autrefois une colonie pénitentiaire, elle a profondément marqué l'héritage de ses habitants, lesquels sont bien plus féroces que ceux de l'île principale."
 agot_culture_greenborn_desc:0 "Bien qu'ils soient méprisés par leurs frères insulaires, les Fer-nés des Terres Vertes ont permis d'étendre l'influence du Dieu Noyé au-delà des Îles de Fer."
 agot_culture_ironborn_desc:0 "Issus du sang des Andals qui s'est fondu dans celui des Premiers Hommes, les Fer-nés se sont progressivement éloignés des us et des mœurs des continentaux. Ils sont désormais les héritiers du Rois Gris et de la lignée du Dieu Noyé. Quiconque hume l'odeur de sel et de roc provenant de la mer sentira la terreur que peut inspirer ceux qui sillonnent les flots, depuis les Mers du Crépuscule jusqu'à la Mer Grelotte, la Mer d'Été et plus loin encore."
 agot_culture_jade_islander_desc:0 "Celles et ceux qui ont élu domicile sur les îles de la Mer de Jade sillonnent depuis longtemps ses eaux scintillantes pour le commerce, lequel est très prolifique dans cette région. Bon nombre de navires des cités libres les empruntent pour se rendre en Orient afin de s'y procurer soie, samit, jade, jais et épices."
 agot_culture_lengii_desc:0 "Habitants de Leng, les Lengii sont farouchement attachés à leur indépendance, laquelle fut obtenue après une insurrection contre la domination Yitite il y a quatre cents ans."
 agot_culture_manticorian_desc:0 "Les habitants des Îles Manticore ont la réputation d'être aussi dangereusement mortels que leur animal totem."
 agot_culture_marahaiian_desc:0 "Marahai mérite mille fois d'être qualifiée de paradisiaque, et ceux qui l'habitent savent d'autant plus apprécier à leur juste valeur les merveilleux dons qu'elle procure."
 agot_culture_bloodless_man_desc:0 "On dit des Hommes Exsangues qu'ils vivent au-delà des Cinq Forts, dans l'est lointain de l'Outre-Orient, qu'ils sont pâles comme des morts, si bien que certains pensent qu'ils ne sont que des corps réanimés par quelques sombres sorcelleries. Selon les légendes, ils draineraient le sang de leurs victimes."
 agot_culture_carcosan_desc:0 "Au cœur des Montagnes du Matin, sur les rives de la Mer Cachée, se niche la cité de Carcosa, dont on dit que ses habitants seraient des sorciers et des mages qui concluent des pactes avec d'obscurs dieux venus des profondeurs."
 agot_culture_dathian_desc:0 "On dit des habitants de K'Dath, cité des grandes plaines à l'est de la Mer Saignante, qu'ils ont à cœur d'étendre leur domination sur les terres voisines que sont Osbourg, les contrées des Gryèches et le Désert Gris que l'on trouve au sud de Mossovy."
 agot_culture_grey_man_desc:0 "Parce qu'il est bien nommé, le Désert Gris n'a que peu à offrir à ceux qui l'habitent, et il n'y a guère que le pillage pour offrir richesse et sustentation."
 agot_culture_fish_man_desc:0 "Ceux qui ont fait des Mille-Îles leur foyer sont un peuple xénophobe entouré de mystères. Parmi les innombrables rumeurs qui circulent à leur sujet, certaines les désignent comme des êtres mi-homme mi-poisson, dévorant tous ceux qui osent s'approcher de leur territoire. Mais plus étrange encore, certaines en parlent comme des créatures craignant la mer — summum de l'ironie pour un peuple insulaire."
 agot_culture_lion_man_desc:0 "Avant la Trahison du Sang, les terres au-delà des Cinq Forts étaient, disait-on, la propriété du Lion de la Nuit. Lorsque la Jouvencelle-de-Lumière et le Dieu-sur-Terre se détournèrent de l'Empire de l'Aube, les Hommes-Lions furent libres de punir les hommes pour leur infamie."
 agot_culture_mossovite_desc:0 "Les habitants de la lointaine Mossovy sont connus pour leur nature froide et réservée, ainsi que leur profond attachement à leur foi."
 agot_culture_shryke_desc:0 "Que sait-on des gryèches, si ce n'est qu'on en trouve probablement autant au-delà des Cinq Forts que dans les histoires de taverne ? Pour la grande majorité des gens leur existence est au moins aussi certaine que les snarks de Westeros."
 agot_culture_winged_man_desc:0 "On raconte qu'au-delà des Cinq Forts on peut trouver un peuple d'Hommes Ailés vivant dans une cité sobrement appelée « la Cité des Hommes Ailés ». Selon les légendes, ils seraient capables de voler tels des oiseaux, même si la légende est probablement fortement saupoudrée d'exagération."
 agot_culture_farosi_desc:0 "Les habitants de Faros dominent toute la partie nord-central de Grand-Moraq. Originaires d'une ville portuaire qui s'avère être l'un des principaux pôles commerciaux permettant de contourner les Portes de Jade, que l'on connaît également comme « le Détroit de Qarth », cette situation privilégiée nourrit depuis longtemps une profonde animosité entre eux et les Qarthiens."
 agot_culture_moraqi_desc:0 "Les habitants de la zone méridionale de Grand-Moraq sont contraints à partager l'île depuis que les Qarthiens ont conquis la zone septentrionale et que les habitants de Faros aient pris le contrôle des terres centrales."
 agot_culture_vahari_desc:0 "Le peuple de Vahar a le commerce et la mer dans le sang, deux choses qui leur ont permis de s'enrichir, notamment grâce aux épices qu'ils vendent au sud des Portes de Jade."
 agot_culture_zabhadi_desc:0 "Parce que Zabhad est une cité portuaire de l'Île des Éléphants, ses habitants ont su prospérer et s'enrichir grâce à l'ivoire. Non seulement produit d'exportation de premier ordre, c'est également un symbole de prestige et de statut social pour eux."
 agot_culture_jogos_nhai_desc:0 "Les tant redoutés nomades aux têtes coniques, chevauchant leurs zéquions rayés de noir et de blanc par-delà les Os. Depuis la nuit des temps ils sont le fléau de Yi Ti, d'Hyrkoon, des N'ghai, des Jhogwin, et jusqu'à la fin des temps ils demeureront certainement des semeurs de mort et des porteurs de destruction."
 agot_culture_nefer_desc:0 "Jadis un peuple qui possédait un vaste royaume, il ne reste des N'ghai qu'une population grandement diminuée, et cela du fait des Jogos N'hai, lesquels les ont boutés vers leur dernier refuge : Nefer. C'est ici, au sein de celle que l'on nomme « la Cité Secrète », que l'espoir perdure de voir un jour renaître leur royaume et d'en chasser les zévaliers aux têtes coniques."
 agot_culture_qaathi_desc:0 "Autrefois l'une des nombreuses tribus qui peuplaient les plaines bordant la Mer d'Argent, les Qaathi avaient grandement décliné suite aux nombreuses guerres contre les Sarnores, qui les ont contraints à fuir au sud, vers des terres alors fertiles. L'immensité verdoyante s'assécha pour devenir l'étendue désertique que l'on connaît aujourd'hui comme le Désert Rouge. Les Qaathi survécurent à cela, du moins jusqu'à l'arrivée des Dothraki."
 agot_culture_qaleen_desc:0 "Se réclamant autant des marchands de Qaarth que des natifs de l'île de Qal, ce peuple représente désormais le rempart oriental des Portes de Jade."
 agot_culture_qartheen_desc:0 "Derniers descendants des Qaathi, les Qarthiens se revendiquent d'être le seul et unique peuple au monde qui puisse être qualifié de « civilisé », s'accrochant fermement à leur cité, « la plus grande cité du temps présent et de celui à venir » selon leurs propres termes, unique vestige d'une grandeur d'antan dont ils sont — toujours selon eux — les derniers héritiers."
 agot_culture_greenblood_desc:0 "Si la majorité des Rhoynar se sont mélangés avec le peuple de Dorne, les Sang-Verts ont choisi de conservé autant que possible la pureté de leurs traditions et de leur héritage ancestral, rêvant de pouvoir un jour retourner auprès de leur Mère."
 agot_culture_salt_dornish_desc:0 "Les Dorniens à l'est de la péninsule sont les plus « Rhoynar » d'entre tous, leur sang étant issu du plus pur métissage possible entre les fils de la Rhoyne et les Ouestriens. Une union parfaite des deux cultures, à l'image du mariage entre la Princesse Nymeria et le Prince Mors Martell."
 agot_culture_sand_dornish_desc:0 "Dunes et déserts qui prolifèrent à Dorne modèlent autant ceux qui y habitent qu'ils détruisent ceux qui cherchent à les revendiquer. Avoir appris à vivre parmi les mers de sable, à sillonner des flots sans eaux et à s'y fondre jusqu'à disparaître aux yeux des non initiés, est certainement ce qui a fait de ces Dorniens des ennemis plus que redoutés par les fous qui finissent noyés dans leur ambition."
 agot_culture_stone_dornish_desc:0 "Les Dorniens que l'on trouve dans les Montagnes Rouges sont aussi inébranlables que leurs montagnes. L'influence Rhoynar est moins présente que chez leurs frères et sœurs salés et sableux, mais non moins considérés comme des étrangers par les Andals. On les connaît comme un peuple brutal et belliqueux contre qui il est de bon ton de ne pas se frotter."
 agot_culture_abular_desc:0 "Lorsque Nymeria unifia les Rhoynar pour les conduire hors d'atteinte de Valyria, son périple les mena à Sothoryos avant d'atteindre Dorne. L'hostilité des lieux l'amena à reprendre la mer, seulement un an après leur débarquement, pour aller chercher un foyer plus propice, d'abord à Naath, puis sur un îlot de l'archipel des Îles d'Été. Si l'Île des Femmes, jadis nommée Abulu, ne donna pas les résultats escomptés, faute de terres fertiles, certains choisirent néanmoins de rester et de se mêler aux natifs."
 agot_culture_asshaii_desc:0 "Dans les Contrées de l'Ombre, là où s'élèvent bâtiments et murs faits de pierre noire huileuse, les Asshaï’i forment un peuple aussi étrange que sombre. Réputés solennels, nul n'ignore que leur étrangeté est accentuée par l'aura de mystère qu'entretient leurs masques enduits de laque."
 agot_culture_shadowman_desc:0 "Ceux qui vivent dans l'Ombre sont craints par les Asshaï’i eux-mêmes, car un peuple qui s'épanouit dans les ténèbres que d'autres choisissent d'éviter ou de traverser grand train est sans conteste un peuple à redouter."
 agot_culture_basiliskite_desc:0 "Ceux qui résident dans les Îles du Basilic ont pleinement embrassé la piraterie comme mode de vie, semant la terreur depuis les Îles d'Été jusqu'aux cités libres, tous les considèrent comme la lie des mers."
 agot_culture_brindled_man_desc:0 "Les Hommes Bringés, ainsi nommés en raison de leur peau épaisse qui porte des motifs bringés, blancs et bruns, sont les natifs de Sothoryos. Isolationniste et xénophobe, leur contact avec les petites communautés côtières se limite à du commerce plus que restreint. On les dit peu intelligents, mais ils sont les seuls à avoir réussi à survivre — et même vivre — dans les jungles hostiles du continent méridional."
 agot_culture_gogossite_desc:0 "Les Gogossiens sont un peuple issu du métissage entre les grands seigneurs valyriens et les natifs de Gogossos, jadis nommé Gorgaï. Ils ont fait leurs la sombre histoire de leur île ainsi que de Yéen, cité sothoryenne."
 agot_culture_yeenite_desc:0 "L'origine de Yéen, la sombre cité de Sothoryos qui borde le fleuve Zamoyos, demeure encore aujourd'hui l'une des plus grandes énigmes pour les mestres et autres érudits. Et si l'on en sait si peu sur elle, l'on n'en sait au moins autant sur son peuple."
 agot_culture_naathi_desc:0 "Les Naathi, que d'aucuns surnomment « le peuple pacifique », vivent sur l'Île des Papillons. Leur grande beauté et leur docilité naturelle en font des cibles très prisées des incursions esclavagistes, et leurs mœurs pacifiques des proies faciles, qui n'ont que la fièvre des papillons pour se défendre, maladie mortelle des Îles d'Été dont ils sont semblent immunisés."
 agot_culture_jhalai_desc:0 "Située au sud de l’archipel, Jhala est la plus grande des Îles d'Été, et parce que la princesse Xanda Qo, souveraine du Val-aux-Lotus, mit fin aux Années de Honte en provoquant les Guerres Esclavagistes, on peut penser que la nature plus hardie et plus guerrière des Jhalai en comparaison de leurs voisins Estiviens est un héritage qui s'est perpétuée de générations en générations depuis cette époque."
 agot_culture_moluuni_desc:0 "L'on connaît les Estiviens pour être d'habiles marins, mais ceux qui vivent sur Moluu et le reste des îles occidentales sont de loin les plus habiles de tous. C'est ici qu'ont vu les jours les fameux nefs-cygnes — ou bateaux-cygnes — qui ont cartographié mers et océans du monde connu."
 agot_culture_omborui_desc:0 "Réputée pour ses festivals et ses festins, Omboru a longtemps été une terre d'accueil pour les étrangers, bien que ses habitants semblent privilégiés de plus en plus l'exil et la vie nomade."
 agot_culture_walanoi_desc:0 "L'une des trois plus grandes Îles d’Été, Walano se trouve au nord de l'archipel, et les Estiviens qui y vivent sont ceux le plus souvent en contact avec le monde extérieur. On les connaît pour leurs archives détaillées, lesquelles sont conservées sur des arbres vivants, les arbres-palabres, mais on peut trouver sur ceux-ci bien d'autres textes et récits, comme des légendes, des prières, des textes de loi ainsi que des cartes maritimes."
 agot_culture_painted_clansman_desc:0 "Les territoires des Possessions n'étaient pas dépourvus de peuplades tribales, comme en témoignent leur présence encore aujourd'hui dans les Montagnes Peintes. Bien que plus sauvages que leurs cousins du sud, ils avaient pour points communs avec eux la vénération des dragons."
 agot_culture_elyrian_desc:0 "Jadis cité riche et glorieuse des Possessions, Elyria et son peuple ont embrassé la traite des esclaves avec les cités ghiscari, tant et si bien qu'avec le temps les liens se sont resserrés non avec l'Antique Valyria mais avec l'Ancienne Ghis. Aujourd'hui, même si les Élyréens se revendiquent toujours d'une ascendance valyrienne, ils ont pleinement adopté les us ghiscari."
 agot_culture_bhorashi_desc:0 "Bhorash gisait en ruine le long de la route des démons, entre Mantarys et Meereen, mais désormais, la cité grouille d'âmes valeureuses qui font commerce tout du long de ses voies ô combien tristement célèbres."
 agot_culture_mantaryan_desc:0 "Mantarys est réputée aussi sinistre que monstrueux serait ses habitants. Si la cité a réchappé au Fléau, un mal a pourtant bien frappé ses terres et continue d'accabler son peuple, lequel souffre de difformités et de maladies. Il n'en demeure pas moins qu'ils constituent une puissance certaine, contrôlant la voie terrestre de première importance qui relie les cités libres à la Baie des Serfs : la route des démons."
 agot_culture_tolosi_desc:0 "Située sur les Falaises Noires, Tolos est réputée à travers le monde pour ses frondeurs, et à l'instar de leurs voisins, ils s'adonnent à la traite d'esclaves avec les cités ghiscari de la Baie des Serfs, renforçant avec elle leurs liens, autant politiques que culturels."
 agot_culture_high_valyrian_desc:0 "Souverains des Possessions de Valyria, les Hauts Valyriens furent un peuple sans commune mesure. Régnant du haut de leurs dragons, ils se voyaient supérieurs à toutes choses, hommes et dieux confondus. Le Fléau mit à bas leur foyer, leur empire, leur civilisation, mais pas leur arrogance, car toujours forts de leurs dragons, même décimés par centaines, ils demeurent en possession du pouvoir suprême."
 agot_culture_westerosi_valyrian_desc:0 "Bien avant que la Maison Targaryen ne cingle vers Westeros, certains Valyriens avaient déjà choisi de s'installer dans les Terres du Couchant, adoptant les coutumes ouestriennes sans pour autant abandonner leurs propres traditions et renier tous liens qu'ils avaient avec l'Antique Valyria."
 agot_culture_cave_dweller_desc:0 "Trois mille ans auparavant, Gorne et Gendel, alors rois d'au-delà du Mur, furent appelés à arbitrer une querelle entre enfants de la forêt et géants, laquelle leur permit de découvrir un réseau souterrain reliant une grotte à un passage sous le Mur. Grâce au « Passage à Gorne », ils tentèrent d'envahir le sud, avant d'être défaits par les Stark. Gorne mort, Gendel battit en retraite, se perdant dans le dédale avec le reste des survivants, lesquels ne reverront jamais la lumière du jour. Aujourd'hui encore, les « enfants de Gendel », comme les nomment certains, continueraient de vivre dans les entrailles de la terre."
 agot_culture_fangman_desc:0 "Parce que les Crocgivre sont une région accidentée, escarpée, austère, glaciale et venteuse, elle est hostile pour l'homme, et de fait, ceux qui y vivent n'ont d'autre choix que de s'endurcir ou mourir. La nature montagneuse des lieux a fait de son peuple des grimpeurs d'exception, pour qui même le Mur ne sera jamais un obstacle trop haut, raison pour laquelle nombre de suderons redoutent leurs pillards."
 agot_culture_forestman_desc:0 "Le peuple de la Forêt Hantée sont les sauvageons les plus fréquemment rencontrés par la Garde de Nuit et les mestres. De nature belliqueuse, leur territoire s'en trouve bien souvent divisé."
 agot_culture_frozen_shoreman_desc:0 "Peuple plus étrange encore que la plupart des sauvageons, ceux qui ont fait de la Grève Glacée leur foyer usent de traîneaux d'os tirés par des phoques et des morses, du moins, c'est ce que racontent les suderons, mais qu'ils s'agissent de faits ou d'idées reçues, ils n'en restent pas moins de prolifiques pillards, là encore, plus que la plupart des sauvageons."
 agot_culture_hornfoot_desc:0 "Les Pieds Cornés sont une tribu vivant loin au nord, régulièrement en conflits avec les Court-la-Nuit, et qui ont pour singularité de se déplacer pieds nus, raison pour laquelle leurs pieds sont recouverts d'une épaisse couche de corne."
 agot_culture_ice_riverman_desc:0 "Les tribus qui vivent le long des rivières gelées sont un peuple reclus, pour qui le cannibalisme n'est pas seulement une pratique parmi d'autres, mais aussi et surtout un moyen de survivre dans ces régions où la nourriture fait souvent défaut."
 agot_culture_lakefolk_desc:0 "Les peuples vivant dans les régions limniques du Grand Nord se sont adaptés de sorte à profiter de tout ce que peuvent leur apporter les immenses lacs gelés, lesquels ne fondent que très rarement, pour ne pas dire jamais."
 agot_culture_milkwaterman_desc:0 "La Laiteuse est le grand fleuve qui coule depuis le nord des Crocgivre jusqu'à la Baie des Glaces, et c'est le long de son cours que l'on peut trouver les tumulus des grandes figures héroïques du peuple libre."
 agot_culture_nightrunner_desc:0 "Les Court-la-nuit sont une tribu vivant loin au nord, régulièrement en conflits avec les Pieds Cornés, qui mènent, comme leur nom le laisse subtilement suggéré, un mode de vie nocturne. Et parce qu'ils sont grandement redoutés pour leurs incursions à la faveur du soleil des loups, leurs ennemis doivent toujours prendre soin de ne dormir que d'un œil."
 agot_culture_thenn_desc:0 "Tribu recluse dans le Grand Nord, les Thenns vivent dans une vallée, qui non seulement les protège partiellement du climat rude, mais qui de surcroît abonde de minerai d'étain et de cuivre. Ils sont ce qui se rapproche le plus d'une société disciplinée au-delà du Mur, tout en étant la tribu sauvageonne la plus culturellement proche des Premiers Hommes, comme en témoignent leur usage de la vieille langue."
 agot_culture_haungyu_ren_desc:0 "Les Haungyu Ren vivent dans les jungles septentrionales de la Côte de Jade. On leur reconnaît de profondes convictions, mais lesquelles les poussent parfois à la folie, tandis que d'autres suivent une vie de pérégrinations mystiques."
 agot_culture_zhenzhu_ren_desc:0 "Si l'on en croit les récits, les Zhenzhu Ren seraient les Yitites des origines. Des prêtres-érudits servant l'Empire Doré et dont les archives retracent l'histoire de Yi Ti jusqu'à l'époque jadis du Grand Empire de l'Aube."
 agot_culture_northern_clan_desc:0 "Installés dans les collines et les montagnes, les clans du Nord sont à considérer comme des seigneurs de maisons mineures. Bien qu'ils rejettent les commodités des régions plus développées, ils ne sont pas à confondre avec les clans des Montagnes de la Lune, qui sont eux plus sauvages que tribaux. Ceux du Nord privilégient simplement un mode de vie plus simple, quoique farouchement attachés à leurs us et serments."
 agot_culture_moon_clan_desc:0 "Les clans que l'on trouve dans les Montagnes de la Lune sont les descendants des peuples qui refusèrent de ployer le genou devant les rois Arryn d'antan. Ils abandonnèrent la civilisation pour vivre de rapines et de briganderies, espérant un jour pouvoir reconquérir les terres qui furent les leurs, et compensent la faiblesse de leurs moyens par leur connaissance du terrain et une redoutable et redoutée férocité."
 agot_culture_valeman_finger_desc:0 "C'est par la presqu'île des Doigts que les Andals débarquèrent à Westeros, et leur arrivée marqua les lieux autant que les habitants. Vivant dans l'une des régions les plus pauvres des Sept Couronnes, les Dactiliens mènent une vie loin d'être une sinécure dans des contrées rocailleuses, fouettées par les vents et bousculées par les vagues."
 agot_culture_valeman_upper_desc:0 "Les Valois qui vivent au plus près des Montagnes de la Lune sont grandement attachés aux traditions, et ont, après tant de siècles passés à se défendre contre les perfides clans des montagnes, développé une prédisposition à la défense, qui se manifeste tant dans le domaine de la guerre que de la gouvernance."
 agot_culture_aobao_ren_desc:0 "Les Aobao Ren sont les Yitites des plaines centrales, réputés pour être des sujets productifs et d'une loyauté à toute épreuve."
 agot_culture_bixi_ren_desc:0 "Parce qu'ils vivent aux frontières orientales de Yi Ti, les Bixi Ren subissent constamment les incursions venant des Contrées de l'Ombre, et des menaces d'au-delà des Cinq Forts. Ce sentiment de constante agression a grandement endurci ce peuple qui n'en est que plus dévoué à la défense de l'Empire Doré."
 agot_culture_heinao_ren_desc:0 "Les Heinao Ren sont des Yitites septentrionaux et infrangibles, que l'on connaît et reconnaît avant tout pour leur héritage martial, lequel leur permet encore aujourd'hui de défendre l'Empire Doré contre tous ennemis, et en particulier les Jogos N'hai."
 agot_culture_feicui_ren_desc:0 "Les Feicui Ren sont des Yitites méridionaux et cosmopolites, bâtisseurs des grandes cités que l'on peut admirer tout du long de la Mer de Jade, commerçants émérites, c'est à eux que l'Empire Doré devait son apogée d'antan."