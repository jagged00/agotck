 building_type_agot_westerland_silver_mines_01:1 "Mines d’argent de l’Ouest"
 building_type_agot_westerland_silver_mines_01_desc:1 "Même si bien moins prisées que les mines d'or, les mines d'argent des Terres de l'Ouest n'en demeurent pas moins une formidable source de richesse pour qui les contrôle."
