 building_type_agot_ironwood_01:1 "Bosquet de ferrugier"
 building_type_agot_ironwood_01_desc:1 "Dans le Nord, au cœur de la Bois-aux-Loups, se trouvent des bosquets de ferrugiers, dont le bois, robuste et durable, est prisé pour sa densité et sa résistance, et souvent utilisé pour fabriquer des armes solides."
