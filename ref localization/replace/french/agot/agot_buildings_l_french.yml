 building_special_kings_landing_hoodmarket_desc:0 "Les nombreuses rues de Port-Réal"
 building_type_holy_site_sept_01:0 "Grand septuaire"
 building_type_agot_the_wall_01:0 "Le Mur"
 building_type_agot_the_wall_01_desc:0 "L'un des plus grands ouvrages érigés par l'homme, le Mur mesure 700 pieds de haut et s'étend sur 100 lieues d'est en ouest à travers Westeros. Érigé par Brandon le Bâtisseur et surveillé par un ordre de frères jurés : la Garde de Nuit, il constitue un bastion contre toute menace venant d'au-delà du Nord."
 building_agot_the_wall_01:0 "$building_type_agot_the_wall_01$"
 building_agot_the_wall_01_desc:0 "$building_type_agot_the_wall_01_desc$"
 building_type_agot_castle_black_01:0 "$building_type_agot_the_wall_01$"
 building_type_agot_castle_black_01_desc:0 "$building_type_agot_the_wall_01_desc$"
 building_agot_castle_black_01:0 "Châteaunoir"
 building_agot_castle_black_01_desc:0 "Châteaunoir est le siège principal de la Garde de Nuit, servant de résidence au Lord Commandant. C'est ici que les nouvelles recrues arrivent, sont formés et prononcent leurs vœux."
 building_type_agot_eastwatch_01:0 "$building_type_agot_the_wall_01$"
 building_type_agot_eastwatch_01_desc:0 "$building_type_agot_the_wall_01_desc$"
 building_agot_eastwatch_01:0 "Fort-Levant"
 building_agot_eastwatch_01_desc:0 "Le château le plus à l'est de la Garde de Nuit, Fort-Levant est également le seul port de la Garde, ce qui en fait un lieu essentiel pour son approvisionnement en nourriture et le commerce nécessaire à son bon maintien."
 building_type_agot_shadow_tower_01:0 "$building_type_agot_the_wall_01$"
 building_type_agot_shadow_tower_01_desc:0 "$building_type_agot_the_wall_01_desc$"
 building_agot_shadow_tower_01:0 "Tour Ombreuse"
 building_agot_shadow_tower_01_desc:0 "Deuxième château le plus à l'ouest de la Garde, Tour Ombreuse sert à garder le Pont des Crânes."
 building_type_agot_nightfort_01:0 "Fort-Nox"
 building_type_agot_nightfort_01_desc:0 "Autrefois siège de la Garde de Nuit, Fort-Nox fut le foyer de bon nombre de membres de cet ordre immémoriel, autant d'illustres que d'infâmes. C'est ici que moult rois d'au-delà du Mur se brisèrent contre le Mur, et c'est également là que régna jadis le Roi de la Nuit."
 building_agot_nightfort_01:0 "La Porte Noire"
 building_agot_nightfort_01_desc:0 "Au sein de Fort-Nox, on peut y trouver la Porte Noire, un tunnel antique dont l'existence précède archives et annales."
 building_type_agot_bridge_of_skulls_01:0 "$building_agot_bridge_of_skulls_01$"
 building_type_agot_bridge_of_skulls_01_desc:0 "$building_agot_bridge_of_skulls_01_desc$"
 building_agot_bridge_of_skulls_01:0 "Pont des Crânes"
 building_agot_bridge_of_skulls_01_desc:0 "Le Pont des Crânes enjambe les Gorges et constitue l'unique moyen de contourner le Mur par voie terrestre. Deux châteaux de la Garde de Nuit assurent sa surveillance : Tour Ombreuse et Fort Couchant le Pont."
 building_type_the_red_keep_01:0 "Le Donjon Rouge"
 building_type_the_red_keep_01_desc:0 "Le Donjon rouge est au cœur même des Sept Couronnes. Au sommet de la colline d'Aegon, ses murs et ses tours rouges montent la garde sur Port-Réal. C'est d'ici que les seigneur des Sept Couronnes gouverne, du haut du Trône de fer, forgé à partir des milliers de lames des ennemis d'Aegon tombés au combat."
 building_the_red_keep_01:0 "Le Fort-Aegon"
 building_the_red_keep_01_desc:0 "Fort fait de bois érigé par le Conquérant lors de son débarquement, ce petit donjon sert de centre administratif central au jeune royaume. Malgré son état modeste, des milliers de personnes ont afflué hors de ses murs, donnant naissance à une petite ville autour d'elle."
 building_the_red_keep_02:0 "Citadelle de Maegor"
 building_the_red_keep_02_desc:0 "Pour montrer la puissance et la majesté de la maison Targaryen, le Fort-Aegon a été rasé pour laisser place à un imposant château de pierre. En son sein se trouve la Citadelle de Maegor, un château à part entière, protégé par des douves, un pont, des murs et des tours solides, et parsemé de salles et de tunnels secrets."
 building_the_red_keep_03:0 "$building_type_the_red_keep_01$"
 building_the_red_keep_03_desc:0 "$building_type_the_red_keep_01_desc$"
 building_type_seven_gates_01:0 "Les sept portes de Port-Réal"
 building_type_seven_gates_01_desc:0 "Construits sur les ordres du roi Aegon Ier par Ser Osmund Fort et le grand Mestre Gawen, les murs de Port-Réal sont dominés par sept portes massives : la Porte des Dieux, la Porte du Lion, la Porte de la Gadoue, la Vieille Porte, la Porte de Fer, la Porte du Roi et la Porte du Dragon."
 building_seven_gates_01:0 "$building_type_seven_gates_01$"
 building_seven_gates_01_desc:0 "$building_type_seven_gates_01_desc$"
 building_type_cobblers_square_01:0 "Place Crépin"
 building_type_cobblers_square_01_desc:0 "Première grande place en venant de la Porte des Dieux, la Place Crépin doit son nom aux nombreux cordonniers qui l'entourent, mais elle est connue pour abriter ceux qui prêchent le mécontentement des Dieux contre le Trône de Fer."
 building_cobblers_square_01:0 "$building_type_cobblers_square_01$"
 building_cobblers_square_01_desc:0 "$building_type_cobblers_square_01_desc$"
 building_type_holy_site_great_sept_01:0 "Grand Septuaire de Baelor"
 building_type_holy_site_great_sept_01_desc:0 "Le Grand Septuaire de Baelor, édifice de marbre recouvert par un dôme de verre, d'or et de cristal, est le plus important de Westeros. Il a été construit par son homonyme, le Roi-Septon. Il sert de siège central à la Foi des Sept et au Grand Septon."
 building_holy_site_great_sept_01:0 "$building_type_holy_site_great_sept_01$"
 building_holy_site_great_sept_01_desc:0 "$building_type_holy_site_great_sept_01_desc$"
 building_type_generic_great_sept_01:0 "Grand Septuaire"
 building_type_generic_great_sept_01_desc:0 "Le Grand Septuaire, édifice de marbre recouvert par un dôme de verre, d'or et de cristal, est le plus important septuaire de Westeros. Il a été construit pour montrer le dévouement et le soutien du Trône de fer à la Foi. Il sert de siège central à la Foi des Sept et au Grand Septon."
 building_generic_great_sept_01:0 "$building_type_generic_great_sept_01$"
 building_generic_great_sept_01_desc:0 "$building_type_generic_great_sept_01_desc$"
 building_type_dragonpit_01:0 "Fossedragon"
 building_type_dragonpit_01_desc:0 "La grande écurie des dragons, Fossedragon a été construite après l'incendie du Septuaire du Souvenir par Maegor le Cruel, et achevée sous le règne du roi Jaehaerys Ier."
 building_dragonpit_01:0 "$building_type_agot_sept_of_remembrance_01$"
 building_dragonpit_01_desc:0 "$building_type_agot_sept_of_remembrance_01_desc$"
 building_dragonpit_02:0 "Ruines du Septuaire du Souvenir"
 building_dragonpit_02_desc:0 "Frappé par la fureur de Maegor, ce qu'il reste du Septuaire du Souvenir se dresse timidement au sommet de la Colline de Rhaenys comme témoignage du sort attend ceux qui s'attirent les foudres des seigneurs dragons."
 building_type_dragonpit_ruins_01:0 "Ruines de Fossedragon"
 building_type_dragonpit_ruins_01_desc:0 "Utilisée pour des événements allant du couronnement à l'exécution, Fossedragon a été conçu par le roi Maegor Ier comme une grande écurie pour abriter les dragons. Pendant l'émeute de Port-Réal, un prophète connu comme le Berger et ses milliers d'adeptes ont pris d'assaut ce lieu, entraînant la mort de cinq dragons et d'innombrables émeutiers. Elle est aujourd'hui un rappel brutal des temps passés."
 building_dragonpit_ruins_01:0 "$building_dragonpit_01$"
 building_dragonpit_ruins_01_desc:0 "$building_dragonpit_01_desc$"
 building_dragonpit_ruins_02:0 "$building_type_dragonpit_01$"
 building_dragonpit_ruins_02_desc:0 "$building_type_dragonpit_ruins_01_desc$"
 building_dragonpit_ruins_03:0 "Fossedragon restaurée"
 building_dragonpit_ruins_03_desc:0 "À nouveau restauré, le grand dôme de Fossedragon est maintenant reconstruit et prêt à accueillir de nouveaux résidents ailés."
 building_type_dragonstone_01:0 "Peyredragon"
 building_type_dragonstone_01_desc:0 "Peyredragon était l'avant-poste occidental du fief valyrien et, après le Fléau, le refuge de la maison Targaryen. Il est construit en pierre noire fondue que les seigneurs dragons utilisaient pour leurs constructions les plus importantes. Ses tours ne sont pas les tours carrées des Premiers Hommes, ni les tours arrondies des Andals, ni même les tours à haut dôme des Rhoynar ; elles ont la forme de dragons."
 building_dragonstone_01:0 "$building_type_dragonstone_01$"
 building_dragonstone_01_desc:0 "$building_type_dragonstone_01_desc$"
 building_type_agot_claw_isle_01:0 "Pince-Isle"
 building_type_agot_claw_isle_01_desc:0 "Siège ancestral de la maison Celtigar, Pince-Isle n'est pas aussi grand que Lamarck ou Peyredragon, mais offre néanmoins un accès facile à la Presqu'île de Claquepince, au grand dam des locaux."
 building_agot_claw_isle_01:0 "La Crique au Trésor du Crabe"
 building_agot_claw_isle_01_desc:0 "Bien que Pince-Isle ne soit pas aussi bien située que Lamarck et Peyredragon, la Maison Celtigar a longtemps cherché à protéger et à accroître sa puissance économique, souvent aux dépens des habitants situés autour. C'est d'ailleurs ainsi qu'ils ont amassé maintes richesses."
 building_type_agot_whispers_01:0 "Les Murmures"
 building_type_agot_whispers_01_desc:0 "L'ancien bastion du légendaire Ser Clarence Crabbe, désormais consumé par le bois sacré environnant. Collectant les têtes des pirates, seigneurs, sorciers, chevaliers, et même d'un roi, Ser Clarence les donna à son épouse. On raconte que les murmures de ses victimes peuvent encore être entendus sur les murs délabrés où les têtes décapitées étaient autrefois fièrement dressées sur des piques."
 building_agot_whispers_01:0 "Ruines des Murmures"
 building_agot_whispers_01_desc:0 "$building_type_agot_whispers_01_desc$"
 building_agot_whispers_02:0 "Les Murmures reconstruits"
 building_agot_whispers_02_desc:0 "L'ancienne forteresse de Ser Clarence Crabbe a retrouvé de sa superbe, et les murmures des défunts se font à nouveau entendre, tandis que les piques dressées attendent de faire leur office."
 building_type_agot_stonedance_01:0 "Danse-des-Pierres"
 building_type_agot_stonedance_01_desc:0 "Le siège traditionnel de la Maison Massey après qu'ils aient été chassés des environs de la Néra par les Sombrelyn ainsi que d'autres petits rois."
 building_agot_stonedance_01:0 "Port d'Œil-de-lait"
 building_agot_stonedance_01_desc:0 "Justin Massey, dit Œil-de-lait, fut un tristement célèbre roi pirate qui combattit les rois de l'Orage Durrandon et s'attaqua au commerce le long du Détroit et de la Baie de la Néra."
 building_type_agot_duskendale_01:0 "Sombreval"
 building_type_agot_duskendale_01_desc:0 "Le foyer ancestral de la Maison Sombrelyn, où ils régnaient en tant que petits rois."
 building_agot_duskendale_01:0 "Salle des blanches épées"
 building_agot_duskendale_01_desc:0 "La Garde Royale a connu maints membres issus de la Maison Sombrelyn depuis sa création, laquelle y a toujours puisé une grande source de fierté."
 building_type_agot_flea_bottom_01:0 "Culpucier"
 building_type_agot_flea_bottom_01_desc:0 "Sans conteste le quartier le plus malfamé de Port-Réal, Culpucier est un dédale de bouges punais et de ruelles étroites, où pullule la vermine et la misère. Les indigents s'y rassemblent pour noyer leurs maux dans tous les vices possibles et imaginables."
 building_agot_flea_bottom_01:0 "$building_type_agot_flea_bottom_01$"
 building_agot_flea_bottom_01_desc:0 "$building_type_agot_flea_bottom_01_desc$"
 building_type_agot_dragonmont_01:0 "Montdragon"
 building_type_agot_dragonmont_01_desc:0 "Montdragon est le grand volcan qui domine l'île de Peyredragon. Jadis, nombre de dragons venaient se nicher dans les cavernes chauffées ou dans les formations rocheuses refroidies."
 building_agot_dragonmont_01:0 "$building_type_agot_dragonmont_01$"
 building_agot_dragonmont_01_desc:0 "$building_type_agot_dragonmont_01_desc$"
 building_type_agot_spicetown_01:0 "Port-d’Épice"
 building_type_agot_spicetown_01_desc:0 "Autrefois le cœur de Lamarck, Port-d'Épice était le second port principal de la Baie de la Néra, le premier étant évidemment Port-Réal."
 building_agot_spicetown_01:0 "Port du Serpent de Mer"
 building_agot_spicetown_01_desc:0 "Sous Corlys Velaryon, Port-d'Épice parvint à devenir un port de plus grande ampleur que Sombreval ainsi que tous les autres ports de la Baie de la Néra, exception faite de Port-Réal. Des navires venant de tout horizon vinrent y faire commerce, de Westeros aux Cités Libres, et même des Portes de Jade."
 building_type_agot_ruins_spicetown_01:0 "$building_type_agot_spicetown_01$"
 building_type_agot_ruins_spicetown_01_desc:0 "$building_type_agot_spicetown_01_desc$"
 building_agot_ruins_spicetown_01:0 "Ruines de Port-d'Épice"
 building_agot_ruins_spicetown_01_desc:0 "Durant la Danse, la Triarchie, d'anciens ennemis de Corlys, mirent à sac le port et Marée Haute au nom des verts ; Port-d'Épice est une ruine depuis lors."
 building_agot_ruins_spicetown_02:0 "Le port restauré"
 building_agot_ruins_spicetown_02_desc:0 "Reconstruit à l'image de sa grandeur d'antan, Port-d'Épice est à nouveau le grand port de Lamarck."
 building_type_agot_hightide_01:0 "Marée Haute"
 building_type_agot_hightide_01_desc:0 "Le nouveau siège de la Maison Velaryon, d'où le Seigneur des Marées apportera la prospérité à Lamarck."
 building_agot_hightide_01:0 "Château des Marées"
 building_agot_hightide_01_desc:0 "Lorsque la Maison Velaryon a déplacé son siège, elle a fait fi de toute modération financière. Des toits d'argent battu, de hautes tours et un château resplendissant témoigne de la prospérité de Lamarck et de ses maîtres."
 building_type_agot_ruins_hightide_01:0 "Marée Haute"
 building_type_agot_ruins_hightide_01_desc:0 "L'autre siège de la Maison Velaryon construit par Corlys Velaryon à Lamarck, il fut rasé par la Triarchie lors de la Danse."
 building_agot_ruins_hightide_01:0 "Ruines de Marée Haute"
 building_agot_ruins_hightide_01_desc:0 "Avec la Bataille du Gosier, l'objectif de la Triarchie était de se venger du seigneur Corlys et de sa maison. Port-d'Épice fut incendiée et les grandes tours et les toits d'argent de Marée Haute rasés. Aujourd'hui, ces ruines témoignent de la chute vertigineuse dont a souffert la Maison Velaryon, autrefois située parmi les plus hautes marches du royaume."
 building_agot_ruins_hightide_02:0 "Château des Marées rebâtit"
 building_agot_ruins_hightide_02_desc:0 "Reconstruite pour retrouver sa grandeur d'antan, la Château des Marées est à nouveau une merveille de la Maison Velaryon, dont les toits argentés et les hautes tours témoignent de la magnificence de Lamarck aux yeux de tous."
 building_type_agot_driftmark_01:0 "Lamarck"
 building_type_agot_driftmark_01_desc:0 "Le siège ancestral de la Maison Velaryon, depuis lequel le Seigneur des Marées a régné pour la première fois, apportant la gloire aux siens."
 building_agot_driftmark_01:0 "Le Pacte du Roi Triton"
 building_agot_driftmark_01_desc:0 "Lorsque les ancêtres des Velaryon arrivèrent pour la première fois à Westeros, ils n'avaient et n'étaient rien. Dénués de noms, de terres et de fortunes, le Roi Triton leur offrit néanmoins sa bénédiction, voyant en eux un immense potentiel. Après avoir signé un pacte, il leur offrit le Trône de Bois Flotté, l'île de Lamarck ainsi que le titre de Seigneur des Marées. De ce pacte naquit la maison qui devint l'une des plus grandes d'origine valyrienne à Westeros, atteignant la seconde marche — juste derrière les seigneurs dragons en personne."
 building_type_agot_rooks_rest_01:0 "Repos-des-Freux"
 building_type_agot_rooks_rest_01_desc:0 "Siège de la Maison Staunton, Repos-des-Freux a toujours été le protecteur vigilant des gens civilisés face aux engeances provenant des marais de Claquepince."
 building_agot_rooks_rest_01:0 "Restes carbonisés"
 building_agot_rooks_rest_01_desc:0 "La Danse fut sans conteste la guerre la plus dévastatrice dans l'histoire du Trône de Fer. Dragons, parents et rois perdirent la vie, et la bataille de Repos-des-Freux fut particulièrement sanglante. Aegon II et Feux-du-Soleyl en ressortirent estropiés et difformes, tandis que Rhaenys, la Reine qui Jamais ne le Fut, et sa dragonne, Meleys la Reine Rouge, perdirent la vie, ne laissant que deux corps brisés et calcinés, dont l'un se vit déposséder de sa tête pour y être emmené à Port-Réal."
 building_type_agot_sharp_point_beacon_01:0 "Pointe-Vive"
 building_type_agot_sharp_point_beacon_01_desc:0 "Siège de la Maison Bar Emmon, Pointe-Vive se trouve à l'extrémité du Bec de Massey, longeant le Gosier."
 building_agot_sharp_point_beacon_01:0 "Le Phare de Pointe-Vive"
 building_agot_sharp_point_beacon_01_desc:0 "Plus grand phare de la côte de Massey et du Gosier, le phare de Pointe-Vive est une tour de guet fortifiée qui se trouve également être le siège de la Maison Bar Emmon. Guidant des centaines de navires en lieu sûr, son entretien est assuré par les nombreuses contributions des marins et capitaines perçus par les Sires de Pointe-Vive."
 building_type_agot_old_stone_bridge_01:0 "L'Auberge du Vieux Pont de Pierre"
 building_type_agot_old_stone_bridge_01_desc:0 "L'auberge du Vieux Pont de Pierre est nichée parmi les plaines septentrionales de Port-Réal, longeant la route entre Rosby et Sombreval. Elle est généralement la première étape des voyageurs qui partent de la porte nord-est de la capitale et qui recherchent un lieu confortable pour séjourner."
 building_agot_old_stone_bridge_01:0 "$building_type_agot_old_stone_bridge_01$"
 building_agot_old_stone_bridge_01_desc:0 "$building_type_agot_old_stone_bridge_01_desc$"
 building_type_highgarden_01:0 "Hautjardin"
 building_type_highgarden_01_desc:0 "Le château pittoresque de Hautjardin a d'abord été le siège de la maison Jardinier, puis de la maison Tyrell. Il est depuis longtemps réputé pour la beauté de ses septuaires et de ses jardins, mais aussi pour être le lieu de résidence d'artistes et de musiciens."
 building_highgarden_01:0 "La Colline de Garth"
 building_highgarden_01_desc:0 "Bâtit sur une colline surplombant la Mander, Hautjardin fut l'œuvre de Garth le Jardinier, fils aîné de Garth Mainverte, qui planta les Trois Chanteurs ainsi que le Trône de Chêne."
 building_type_the_hightower_01:0 "La Grand-Tour"
 building_type_the_hightower_01_desc:0 "La Grand-Tour de Villevieille repose sur une ancienne forteresse de pierre noire située sur Bataille-Isle, ce qui est déjà gage d'une grande protection. De plus, la tour elle-même est haute de plusieurs centaines de pieds, chaque niveau ayant ses propres murs et tourelles, et au sommet se trouve un grand phare qui accueille tous ceux qui pénètrent dans son port."
 building_the_hightower_01:0 "$building_type_the_hightower_01$"
 building_the_hightower_01_desc:0 "$building_type_the_hightower_01_desc$"
 building_type_holy_site_starry_sept_01:0 "Septuaire étoilé"
 building_type_holy_site_starry_sept_01_desc:0 "Le Septuaire Étoilé est l'un des plus grands septuaires de tout Westeros. Autrefois siège du Grand Septon, il est toujours l'un des lieux les plus sacrés pour les fidèles."
 building_holy_site_starry_sept_01:0 "$building_type_holy_site_starry_sept_01$"
 building_holy_site_starry_sept_01_desc:0 "$building_type_holy_site_starry_sept_01_desc$"
 building_type_the_citadel_01:0 "La Citadelle"
 building_type_the_citadel_01_desc:0 "La Citadelle est le centre du savoir et de la connaissance à Westeros. C'est là que les mestres s'entraînent et étudient. On y trouve des docks, la Corbinière et l'une des plus grandes bibliothèques du monde connu."
 building_the_citadel_01:0 "L'île aux Corbeaux"
 building_the_citadel_01_desc:0 "Ancien fief des pirates, l'Île aux Corbeaux abrite aujourd'hui la Corbinière de la Citadelle où sont gardés les innombrables corbeaux."
 building_the_citadel_02:0 "$building_type_the_citadel_01$"
 building_the_citadel_02_desc:0 "$building_type_the_citadel_01_desc$"
 building_type_agot_port_of_oldtown_01:0 "Villevieille"
 building_type_agot_port_of_oldtown_01_desc:0 "La plus grande cité de Westeros, mais également la plus ancienne, on trouve à Villevieille le Septuaire Étoilé, la Citadelle ainsi que la Grand-Tour, ce qui en fait un symbole à bien des égards, et un véritable joyau urbain pour l'ensemble des Sept Couronnes."
 building_agot_port_of_oldtown_01:0 "Port Lymond"
 building_agot_port_of_oldtown_01_desc:0 "Bien que Villevieille ait toujours été un lieu d'importation, le port a grandement profité des apports de Lymond Hightower, dit le Lion de Mer, qui a su contribuer au rayonnement de la cité jusque sur les flots."
 building_type_agot_chequered_square_01:0 "Villevieille"
 building_type_agot_chequered_square_01_desc:0 "La plus grande cité de Westeros, mais également la plus ancienne, on trouve à Villevieille le Septuaire Étoilé, la Citadelle ainsi que la Grand-Tour, ce qui en fait un symbole à bien des égards, et un véritable joyau urbain pour l'ensemble des Sept Couronnes."
 building_agot_chequered_square_01:0 "Quart-Échiqueté"
 building_agot_chequered_square_01_desc:0 "Villevieille regorge de marchés et d'échoppes, mais Quart-Échiqueté est de loin le lieu de commerce le plus célèbre de la cité. Des biens provenant des Mers du Crépuscule, de l'Été, de Jade et du Détroit y font transit, attirant par là même des marchands venus de tous horizons."
 building_type_agot_oldtown_walls_01:0 "Murs de Villevieille"
 building_type_agot_oldtown_walls_01_desc:0 "Les hauts murs de pierre de Villevieille protégeaient la cité bien avant que les Hightower ne jure fidélité à la maison Jardinier."
 building_agot_oldtown_walls_01:0 "Murs de Otho II"
 building_agot_oldtown_walls_01_desc:0 "Les murs imposants de la cité furent érigés par Otho II, après que la ville ait été mise à sac par trois fois en un siècle, successivement par le roi de la Torrentine, Samwell Dayne dit l’Étoile ardente, par le roi fer-né Qhored, dit le Cruel, et enfin par le roi du Bief, Gyles Jardinier dit le Malheur."
 building_type_agot_seven_shrines_01:0 "Les Sept Sanctuaires"
 building_type_agot_seven_shrines_01_desc:0 "Célèbres pour les jardins qui les entourent, les Sept Sanctuaires sont dédiés à chaque aspect de l'Un et les accueillent tous."
 building_agot_seven_shrines_01:0 "$building_type_agot_seven_shrines_01$"
 building_agot_seven_shrines_01_desc:0 "$building_type_agot_seven_shrines_01_desc$"
 building_type_agot_goldengrove_01:0 "Boisdoré"
 building_type_agot_goldengrove_01_desc:0 "Le fief de la maison Rowan, qui aurait été fondé par Rowan Arbre-d’Or."
 building_agot_goldengrove_01:0 "L'Arbre de Rowan"
 building_agot_goldengrove_01_desc:0 "Le vieil arbre dont on disait qu'il avait donné des pommes d'or existe toujours. Bien que mort depuis longtemps, il reste néanmoins toujours aussi impressionnant."
 building_type_agot_bitterbridge_01:0 "Le Pont"
 building_type_agot_bitterbridge_01_desc:0 "L'ancien pont de la maison Caswell qui enjambe la Mander."
 building_agot_bitterbridge_01:0 "Le Pont-de-Pierre"
 building_agot_bitterbridge_01_desc:0 "Le Pont-de-Pierre de la maison Caswell a longtemps été une artère économique, du fait qu'il s'agit de l'un des principaux moyens de traverser la Mander, en dehors des navires."
 building_agot_bitterbridge_02:0 "Pont-l'Amer"
 building_agot_bitterbridge_02_desc:0 "Durant la Guerre de la Foi, la bataille du Pont-de-Pierre fut si sanglante que les eaux de la Mander en devinrent rouge, et les inimitiés qui en résultèrent poussèrent ceux qui y avaient combattu à faire référence au pont sous un nouveau nom: le Pont-l'Amer."
 building_type_agot_red_lake_01:0 "Rougelac"
 building_type_agot_red_lake_01_desc:0 "Fief de la maison Crane se situant au nord du Bief."
 building_agot_red_lake_01:0 "Vestiges des géants du Bief"
 building_agot_red_lake_01_desc:0 "Les vieux ossements des derniers géants du Bief sont encore visibles le long des rives du Lac Rouge. C'est ici que Brandon à la Lame Sanglante les a passés au fil de l'épée."
 building_agot_red_lake_02:0 "Fort-Sangue"
 building_agot_red_lake_02_desc:0 "Désormais plus imposant qu'autrefois, Rougelac abrite désormais le redoutable Donjon Sanglant, lequel renferme les ossements antiques des géants qui peuplaient jadis les rives."
 building_type_agot_tumbleton_01:0 "Chutebourg"
 building_type_agot_tumbleton_01_desc:0 "Lieu de moults batailles durant la Danse des Dragons, Chutebourg s'est lentement relevé au fil des années pour retrouver sa gloire d'avant-guerre."
 building_agot_tumbleton_01:0 "Ossements de Vermithor et Fumée-des-Mers"
 building_agot_tumbleton_01_desc:0 "Après la seconde bataille de Chutebourg, ce qu'il restait de Vermithor et Fumée-des-Mers n'a jamais été déplacé, et nombre de gens au fil des ans sont venus les voir, contribuant au renouveau de la ville."
 building_type_agot_cider_hall_01:0 "Cidre"
 building_type_agot_cider_hall_01_desc:0 "Le siège ancestral de la maison Fossovoie, jadis demeure de Foss l'Archer."
 building_agot_cider_hall_01:0 "L'Arc et la Cidrerie"
 building_agot_cider_hall_01_desc:0 "Renommé à travers tout Westeros pour les compétences à l'arc de leurs ancêtres, c'est en fait la fabrication du cidre qui a enrichi la demeure du même nom."
 building_type_agot_starpike_01:0 "Stellepique"
 building_type_agot_starpike_01_desc:0 "Le premier et le plus grand des trois châteaux de la maison Peake, Stellepique, située dans les Marches Dorniennes, fait figure de témoignage de la longévité et de l'endurance de la maison."
 building_agot_starpike_01:0 "Loggia de Lorimar"
 building_agot_starpike_01_desc:0 "La maison Peake a de nombreux ancêtres célèbres, mais c'est Lorimar Peake qui a donné à la maison sa plus grande puissance. C'est lui qui bannit leurs anciens rivaux de la Maison Manderly du Bief, et ce faisant, il conquit non seulement leur troisième château, Petrebourg, mais rapprocha également sa maison de celle des Jardinier, leurs seigneurs liges."
 building_type_agot_redwyne_port_01:0 "La Treille"
 building_type_agot_redwyne_port_01_desc:0 "Foyer de la Maison Redwyne, La Treille est célèbre pour ses vins et sa flotte."
 building_agot_redwyne_port_01:0 "Ancrage des Redwyne"
 building_agot_redwyne_port_01_desc:0 "Mouillant à Port-Ryam, la flotte Redwyne est réputée dans tout Westeros comme l’une des plus puissantes de l’ouest. En temps de paix, elle contribue à étendre l'influence économique de la maison régnante, et en temps de guerre, elle fait office de remparts protégeant les îles."
 building_type_agot_witchs_wood_01:0 "Corcolline"
 building_type_agot_witchs_wood_01_desc:0 "Fief ancestral de la Maison Tarly, Corcolline a été construite par les frères jumeaux Herndon du Cor et Harlon le Chasseur, fils de Garth le Vert."
 building_agot_witchs_wood_01:0 "Le bois de la sorcière"
 building_agot_witchs_wood_01_desc:0 "Il est dit que les frères Harlon le Chasseur et Herndon du Cor épousèrent la même femme, une sorcière des bois qui coucha avec les jumeaux dans le bois aux abords de Corcolline lors d'une nuit de pleine lune, leur donnant jeunesse et vitalité."
 building_type_agot_ashford_tourney_grounds_01:0 "Cendregué"
 building_type_agot_ashford_tourney_grounds_01_desc:0 "Le foyer ancestral de la Maison Cendregué situé aux abords de la Coquelle."
 building_agot_ashford_tourney_grounds_01:0 "Terrains de tournoi de Cendregué"
 building_agot_ashford_tourney_grounds_01_desc:0 "Les terrains de tournoi de Cendregué sont situés dans la prairie du même nom, de l'autre côté de la Coquelle. Il s'agit un grand champ herbeux offrant un excellent emplacement pour les rassemblements de gens, qu'ils soient d'humble naissance ou de nobles maisons."
 building_type_agot_brightwater_moat_01:0 "Rubriant"
 building_type_agot_brightwater_moat_01_desc:0 "L'ancienne demeure de la Maison Florent, la progéniture aînée de Florys la Renarde."
 building_agot_brightwater_moat_01:0 "Douves du Rubriant"
 building_agot_brightwater_moat_01_desc:0 "Proche des sources de l'Hydromel, Rubriant exploite le fleuve à son avantage pour en tirer de grandes douves qui protègent le donjon. Bien que ni aussi imposante ni aussi célèbre que celles de Vivesaigues, cela n'en demeure pas moins une protection des plus efficaces."
 building_type_agot_mermaids_palace_01:0 "Palais des Sirènes"
 building_type_agot_mermaids_palace_01_desc:0 "La Treille et ses îles environnantes ont toujours été un lieu d'abondance, attirant des hommes du monde entier, jusqu'aux tritons eux-mêmes à en croire la légende. L'on raconte également que des sirènes construisirent un grand palais sur la deuxième plus grande île, attirant les hommes qui étaient venus des quatre coins du royaume pour les courtiser."
 building_agot_mermaids_palace_01:0 "$building_type_agot_mermaids_palace_01$"
 building_agot_mermaids_palace_01_desc:0 "$building_type_agot_mermaids_palace_01_desc$"
 building_type_agot_merryweather_vaults_01:0 "Longuetable"
 building_type_agot_merryweather_vaults_01_desc:0 "Siège de la Maison Merryweather, Longuetable est réputée pour l'abondance et la fertilité de ses champs."
 building_agot_merryweather_vaults_01:0 "Les Coffres d'Abondance"
 building_agot_merryweather_vaults_01_desc:0 "Depuis des siècles, la Maison Merryweather entretient les Coffres d'Abondance, un ensemble de greniers, de silos et de fermes fortifiés destinés à stocker les récoltes des villes, villages et donjons alentours. Région la plus fertile du Bief, Pleinemoisson est chargé d'approvisionner les coffres de Hautjardin, non en or, mais en denrées alimentaires, afin de soutenir l'effort de guerre du royaume."
 building_type_agot_grassfield_florestries_01:0 "Herbeval"
 building_type_agot_grassfield_florestries_01_desc:0 "La Maison de la Nouë, considérée comme l'une des plus raffinées du Bief, parraine et soutient régulièrement de jeunes jardiniers et fleuristes prometteurs venus de tout le Bief et mêle des Terres de l'Orage."
 building_agot_grassfield_florestries_01:0 "Les Fleuristes d'Herbeval"
 building_agot_grassfield_florestries_01_desc:0 "Les créations des fleuristes d'Herbeval, qu'ils s'agissent de couronnes, de bouquets ou de compositions florales en tout genre, sont visibles d'Accalmie à Castral Roc en passant par les Eyrié. Les seuls à pouvoir rivaliser avec leur expertise se trouvent à Hautjardin, et cette solide réputation a grandement profité à la Maison de la Nouë."
 building_type_agot_honeyholt_apiaries_01:0 "Mielbois"
 building_type_agot_honeyholt_apiaries_01_desc:0 "Demeure ancestrale de la Maison des Essaims, Mielbois doit sa réputation à son abondance de miel et à ses abeilles d'une nature étonnamment douce."
 building_agot_honeyholt_apiaries_01:0 "La Capitale du Miel de Westeros"
 building_agot_honeyholt_apiaries_01_desc:0 "Ce qui n'était au départ qu'un passe-temps pour les seigneurs et dames de la Maison des Essaims s'est transformé au fil des ans en une véritable industrie. Marchands, apiculteurs et ouvriers travaillent sans relâche au nord de Villevieille où est produit le fameux miel doré de Mielbois, qui finira ensuite exporté aux quatre coins du monde."
 building_type_agot_sept_at_holyhall_01:0 "Sacrelieu"
 building_type_agot_sept_at_holyhall_01_desc:0 "Foyer ancestral de la Maison Graceford, Sacrelieu est un bastion de la Foi."
 building_agot_sept_at_holyhall_01:0 "Le Septuaire de Sacrelieu"
 building_agot_sept_at_holyhall_01_desc:0 "L'un des plus imposants septuaires personnels des Sept Couronnes, le Septuaire de Sacrelieu, siège ancestral de la dévote Maison Graceford, a fidèlement servi les seigneurs, dames et familles de Sacrelieu pendant des centaines d'années."
 building_type_agot_oakenshield_bastion_01:0 "Bouclier de Chêne"
 building_type_agot_oakenshield_bastion_01_desc:0 "Le siège ancestral de la Maison Houëtt assure la protection de Bouclier de Chêne et de la Mander depuis l'époque de Garth Main-d’Or."
 building_agot_oakenshield_bastion_01:0 "Le Bastion de la Mander"
 building_agot_oakenshield_bastion_01_desc:0 "Le château de Bouclier de Chêne, le plus grand et le plus redoutable parmi les Boucliers, est le siège ancestral de la Maison Houëtt. Nanti d'imposants remparts, d'un chantier naval pouvant accueillir une petite flottille et d'un arsenal d'armes de siège, le Bastion de la Mander constitue l'avant-garde de la défense contre toute menace provenant de la mer."
 building_type_agot_old_oak_01:0 "Vieux Rouvre"
 building_type_agot_old_oak_01_desc:0 "Foyer de la Maison du Rouvre, Vieux Rouvre est depuis longtemps un bastion de la chevalerie."
 building_agot_old_oak_01:0 "Le Cœur du Rouvre"
 building_agot_old_oak_01_desc:0 "Vieux Rouvre est le fief ancestral de la Maison du Rouvre, une ancienne et puissante maison du Bief, fondée par John le Chêne, l'un des fils du légendaire Garth le Vert."
 building_type_riverrun_01:0 "Vivesaigues"
 building_type_riverrun_01_desc:0 "Le château de Vivesaigues n'est pas particulièrement grand, mais il occupe une position stratégique au confluent de la Culbute et de la Ruffurque. Les rivières entourent deux des trois côtés du château, et le troisième est protégé par un large fossé qui peut être inondé pour faire du château une île."
 building_riverrun_01:0 "$building_type_riverrun_01$"
 building_riverrun_01_desc:0 "$building_type_riverrun_01_desc$"
 building_type_the_twins_01:0 "Les Jumeaux"
 building_type_the_twins_01_desc:0 "Les Jumeaux, également nommés le Pont, est le fief ancestral de la maison Frey. Bien nommé dans les deux cas, le château se compose de deux donjons jumeaux situés de part et d'autre de la Verfurque, reliés par un grand pont de pierre. Fortifiés par des douves qui les encerclent, les deux donjons sont ainsi transformés en petits îlots à l'intérieur même de la rivière."
 building_the_twins_01:0 "$building_type_the_twins_01$"
 building_the_twins_01_desc:0 "$building_type_the_twins_01_desc$"
 building_type_generic_harrenhal_01:0 "La Forteresse Noire"
 building_type_generic_harrenhal_01_desc:0 "Pour témoigner de la puissance et de l'unité du Conflans, ce n'est pas un simple château qui a été érigée, mais une gigantesque forteresse capable de rivaliser d'envergure avec les Eyrié, Castral Roc et Accalmie. Des murs plus hauts que tous autres, un bois sacré plus imposant qu'aucun autre, et d'immenses et terribles tours qui inspirent la terreur dans le cœur de quiconque pose les yeux dessus."
 building_generic_harrenhal_01:0 "$building_type_generic_harrenhal_01$"
 building_generic_harrenhal_01_desc:0 "$building_type_generic_harrenhal_01_desc$"
 building_type_harrenhal_01:0 "Harrenhal"
 building_type_harrenhal_01_desc:0 "Le château de la Maison Chenu, Harrenhal, témoigne de la lignée de Harren le Noir et de ses Fer-nés sur le Conflans. Considéré comme le plus grand château de Westeros, bien que cela soit contesté par les Ouestiens, il s'agit d'une déclaration claire du contrôle et de l'importance des Chenu non seulement sur ces terres, mais également sur celles environnantes."
 building_harrenhal_01:0 "$building_type_harrenhal_01$"
 building_harrenhal_01_desc:0 "$building_type_harrenhal_01_desc$"
 building_type_ruins_harrenhal_01:0 "Harrenhal"
 building_type_ruins_harrenhal_01_desc:0 "Lorsque le roi Harren refusa de plier le genou devant Aegon le Conquérant, il condamna sa propre personne, sa propre maison, mais aussi son imposante forteresse. Depuis lors devenu une ruine aux pierres fondues, Harrenhal n'en reste pas moins une place-forte tout ce qu'il y a de plus impressionnante."
 building_ruins_harrenhal_01:0 "$building_type_ruins_harrenhal_01$"
 building_ruins_harrenhal_01_desc:0 "$building_type_ruins_harrenhal_01_desc$"
 building_ruins_harrenhal_02:0 "Tour de l'Horreur reconstruite"
 building_ruins_harrenhal_02_desc:0 "La Tour de l'Horreur a servi de siège au seigneur, de prison pour les captifs de haute naissance et de tout ce qui peut se trouver entre les deux. C'est un endroit idéal pour commencer la restauration des tours d'Harrenhal."
 building_ruins_harrenhal_03:0 "Tour Plaintive reconstruite"
 building_ruins_harrenhal_03_desc:0 "Pour répondre aux exigences d'un château rénové, les réserves et les greniers existants de la Tour Plaintive ont été considérablement agrandis."
 building_ruins_harrenhal_04:0 "Tour des Spectres reconstruite"
 building_ruins_harrenhal_04_desc:0 "La Tour des Spectres a été reconstruite et sert maintenant à garder les murs ainsi que la poterne."
 building_ruins_harrenhal_05:0 "Tour de la Veuve reconstruite"
 building_ruins_harrenhal_05_desc:0 "Deuxième plus grande tour, la Tour de la Veuve était autrefois la demeure de la reine Rhaena Targaryen. Elle a désormais été reconstruite pour être de nouveau digne d'une reine."
 building_ruins_harrenhal_06:0 "Tour du Bûcher-du-Roi reconstruite"
 building_ruins_harrenhal_06_desc:0 "La plus grande de toutes les tours d'Harrenhal, l'imposante Tour du Bûcher-du-Roi, contient les appartements du seigneur ainsi que la Salle aux Cent Cheminées. Maintenant qu'elle a été reconstruite, la reconstruction de la forteresse est presque achevée."
 building_ruins_harrenhal_07:0 "Harrenhal restaurée"
 building_ruins_harrenhal_07_desc:0 "Reconstruit à l'identique, Harrenhal est à nouveau le plus splendide des châteaux de Westeros. Derrière ses murs massifs, ses cinq grandes tours s'élancent avec défi vers le ciel, et son seigneur ne craint nulle autre menace que le retour des dragons."
 building_type_agot_raventree_hall_01:0 "Corneilla"
 building_type_agot_raventree_hall_01_desc:0 "Au cœur de Corneilla, fief ancestral de la Maison Nerbosc, se trouve un immense Barral mort depuis longtemps, qui aurait jadis été empoisonné par les Bracken. C'est le lieu d'une odieuse traîtrise de corneilles, qui donna ensuite son nom au château."
 building_agot_raventree_hall_01:0 "Immense Barral mort"
 building_agot_raventree_hall_01_desc:0 "$building_type_agot_raventree_hall_01_desc$"
 building_type_agot_inn_at_the_crossroads_01:0 "Auberge du carrefour"
 building_type_agot_inn_at_the_crossroads_01_desc:0 "Une petite auberge situé au nord du Trident. Elle se trouve à la croisée de la Route Royale, la Grand-route et la Route de la rivière. Elle fut le témoin de certains des événements les plus marquants du continent."
 building_agot_inn_at_the_crossroads_01:0 "$building_type_agot_inn_at_the_crossroads_01$"
 building_agot_inn_at_the_crossroads_01_desc:0 "$building_type_agot_inn_at_the_crossroads_01_desc$"
 building_type_agot_high_heart_01:0 "Noblecœur"
 building_type_agot_high_heart_01_desc:0 "À Noblecœur se trouve un large bosquet de Barrals. La plus grande collection d'arbres au sud du Neck en dehors de l'Île-aux-Faces."
 building_agot_high_heart_01:0 "Bosquet de Noblecœur"
 building_agot_high_heart_01_desc:0 "$building_type_agot_high_heart_01_desc$"
 building_type_agot_ruin_high_heart_01:0 "Noblecœur"
 building_type_agot_ruin_high_heart_01_desc:0 "$building_type_agot_high_heart_01_desc$"
 building_agot_ruin_high_heart_01:0 "Bosquet de Noblecœur"
 building_agot_ruin_high_heart_01_desc:0 "$building_type_agot_high_heart_01_desc$"
 building_agot_ruin_high_heart_02:0 "Le bosquet abattu"
 building_agot_ruin_high_heart_02_desc:0 "Avec l'arrivée des Andals à Noblecœur, tous les arbres jugés démoniaques furent abattus, arrachant ainsi l'influence que les Anciens Dieux pouvaient avoir dans le Conflans."
 building_type_agot_seagard_01:0 "Salvemer"
 building_type_agot_seagard_01_desc:0 "Forteresse de la Maison Mallister, Salvemer n'est ni plus ni moins qu'un bastion dressé contre les Fer-nés."
 building_agot_seagard_01:0 "La Tour Retentissante"
 building_agot_seagard_01_desc:0 "Les Mallister, seigneurs ancestraux de Salvemer, ont longtemps constitué le principal rempart du Conflans contre les Fer-nés, raison pour laquelle a été érigée la Tour Retentissante, afin de prévenir les habitants de l'arrivée imminente des boutres ennemies visibles à l'horizon."
 building_type_agot_walls_of_seagard_01:0 "$building_type_agot_seagard_01$"
 building_type_agot_walls_of_seagard_01_desc:0 "$building_type_agot_seagard_01_desc$"
 building_agot_walls_of_seagard_01:0 "Les Remparts de Halmon"
 building_agot_walls_of_seagard_01_desc:0 "Construits sur ordre de Lord Halmon Mallister en raison de la prolifération des incursions de moindre envergure dans la région, les remparts de Salvemer intègrent l'étendue de la ville aux défenses du château pour dissuader tous pillards de se risquer à leurs méfaits."
 building_type_agot_maidenpool_01:0 "Viergétang"
 building_type_agot_maidenpool_01_desc:0 "La Maison Mouton a joué un rôle crucial dans le développement de Viergétang, l'une des plus grandes et plus prospères régions du Conflans."
 building_agot_maidenpool_01:0 "L'Étang de Jonquil"
 building_agot_maidenpool_01_desc:0 "Berceau ancestral de la Maison Mouton, Viergétang attire de nombreux pèlerins qui apportent richesse et prestige aux seigneurs descendants de la célèbre Jonquil la Jouvencelle et de son héros, Florian le Fol."
 building_type_agot_oldstones_01:0 "Vieilles-Pierres"
 building_type_agot_oldstones_01_desc:0 "Ce fut autrefois le château de la dernière maison royale du Conflans avant la prise de contrôle de la région par les Andals. Vieilles-Pierres est toujours gravé dans les mémoires depuis tout ce temps."
 building_agot_oldstones_01:0 "Ruines de Vieilles-Pierres"
 building_agot_oldstones_01_desc:0 "Les ruines du fief des Rois d'Alluve tiennent encore debout, bien que l'on prétend qu'elles seraient hantées."
 building_agot_oldstones_02:0 "Château de la Couronne Dorée"
 building_agot_oldstones_02_desc:0 "Le château rebâtit de Vieilles-Pierres, dont les hauts murs se dressent fièrement, symbolisant une nouvelle fois la puissance du Conflans."
 building_type_agot_inn_of_the_kneeling_man_01:0 "Auberge de l'Homme à genoux"
 building_type_agot_inn_of_the_kneeling_man_01_desc:0 "Cette auberge a été construite à l'endroit, supposé, où Torrhen Stark, dernier Roi du Nord, aurait ployé le genou devant Aegon le Conquérant."
 building_agot_inn_of_the_kneeling_man_01:0 "$building_type_agot_inn_of_the_kneeling_man_01$"
 building_agot_inn_of_the_kneeling_man_01_desc:0 "$building_type_agot_inn_of_the_kneeling_man_01_desc$"
 building_type_agot_stoney_sept_01:0 "Pierremoûtier"
 building_type_agot_stoney_sept_01_desc:0 "Ville du sud du Conflans, Pierremoûtier accueille des voyageurs venant des Sept Couronnes, depuis les Terres de l'Orage jusqu'au Nord."
 building_agot_stoney_sept_01:0 "Place de la Truite Bondissante"
 building_agot_stoney_sept_01_desc:0 "Artère centrale de Pierremoûtier, cette place est connue pour sa fontaine et ses truites bondissantes. Elle a tout ce qu'un voyageur peut désirer, des biens, des services, des lits sûrs — sans oublier des pêches."
 building_type_agot_wayfarers_rest_01:0 "Bel Accueil"
 building_type_agot_wayfarers_rest_01_desc:0 "Bel Accueil, château érigé par Armistead Vance, fut utilisé comme forteresse lors des attaques des Andals sur les Terres de l'Ouest., et aujourd'hui encore, ceux qui règnent sur ce fief maintiennent l'imposante garde personnelle mise en place par le seigneur de guerre d'autrefois."
 building_agot_wayfarers_rest_01:0 "Le Donjon de Vance"
 building_agot_wayfarers_rest_01_desc:0 "$building_type_agot_wayfarers_rest_01_desc$"
 building_type_agot_fairmarket_01:0 "Beaumarché"
 building_type_agot_fairmarket_01_desc:0 "L'un des principaux centres économiques du Conflans, Beaumarché s'est néanmoins vu refuser les chartes censées lui permettre de s'étendre pour devenir une véritable ville, ce qui ne l'empêche pourtant pas d'attirer de nombreux voyageurs et marchands en devenir. La place pourrait faire office de puissant fief pour tout aspirant roi, même ceux venus depuis les mers."
 building_agot_fairmarket_01:0 "$building_type_agot_fairmarket_01$"
 building_agot_fairmarket_01_desc:0 "$building_type_agot_fairmarket_01_desc$"
 building_type_agot_mudgrave_01:0 "Tomballuve"
 building_type_agot_mudgrave_01_desc:0 "La Maison d’Alluve s'est éteinte après avoir subi un millier de revers. Tristifer IV aura combattu les envahisseurs andals durant de longues années et pas moins de quatre-vingt-dix-neuf batailles, avant de tomber lors de celle connue sous le nom de Bataille des Sept Rois, sonnant le glas de sa lignée et laissant les Andals asseoir leur autorité sur le Conflans."
 building_agot_mudgrave_01:0 "$building_type_agot_mudgrave_01$"
 building_agot_mudgrave_01_desc:0 "$building_type_agot_mudgrave_01_desc$"
 building_type_agot_atranta_01:0 "Atranta"
 building_type_agot_atranta_01_desc:0 "Siège de la branche cadette de la Maison Vance, Atranta a longtemps été un phare pour les fidèles, pris en étau entre les royaumes du Roc, du Bief, de l'Orage et des Rois Riverains."
 building_agot_atranta_01:0 "$building_type_agot_atranta_01$"
 building_agot_atranta_01_desc:0 "$building_type_agot_atranta_01_desc$"
 building_type_agot_ruins_of_oldforge_01:0 "L'Ancienne Forge"
 building_type_agot_ruins_of_oldforge_01_desc:0 "$building_agot_ruins_of_oldforge_01_desc$"
 building_agot_ruins_of_oldforge_01:0 "Ruines de l'Ancienne Forge"
 building_agot_ruins_of_oldforge_01_desc:0 "Située non loin d'un théâtre historique de mineurs escarmouches entre les Nerbosc et les Bracken, l'Ancienne Forge fut jadis la plus grande du Conflans. Les violents conflits entre les deux maisons l'auront presque réduite à l'état de ruine totale, mais qui sait, si un jour l'une des deux arrive à sortir vainqueur de cette lutte séculaire, peut-être saura-t-elle lui redonner sa splendeur d'antan."
 building_agot_ruins_of_oldforge_02:0 "L'Ancienne Forge restaurée"
 building_agot_ruins_of_oldforge_02_desc:0 "Dans la chaleur des feux ravivés et dans la mélodie des marteaux réemployés, l'Ancienne Forge est désormais restaurée, de laquelle sortira un acier sans pareil dans le Conflans."
 building_agot_ruins_of_oldforge_03:0 "L'Ancienne Forge étendue"
 building_agot_ruins_of_oldforge_03_desc:0 "L'Ancienne Forge est désormais trois fois plus imposante qu'elle ne l'était jadis. Trois fois plus de forgerons, de tanneurs, de menuisiers, devenant ainsi l'une des plus grandes forges des Sept Couronnes, à même de rivaliser avec la rue de l'Acier de Port-Réal."
 building_type_agot_bechester_motherhouse_01:0 "Bechester"
 building_type_agot_bechester_motherhouse_01_desc:0 "Foyer de la Maison Penny, Bechester est resté dédié à la Foi, et ce malgré les très nombreux conflits qui y ont éclaté."
 building_agot_bechester_motherhouse_01:0 "La Matristère du Chant de l'Eau"
 building_agot_bechester_motherhouse_01_desc:0 "Située à la frontière commune du Conflans et du Bief, la Matristère de Bechester offre un refuge aux Sœurs du Silence et aux dévoués fidèles des Sept. Elle profite aussi bien aux habitants locaux qu'aux simples gens de passage, et la coutume veut que les seigneurs et dames du château y contribuent selon leurs moyens."
 building_type_agot_bechester_motherhouse_ruins_01:0 "$building_type_agot_bechester_motherhouse_01$"
 building_type_agot_bechester_motherhouse_ruins_01_desc:0 "$building_agot_bechester_motherhouse_ruins_01_desc$"
 building_agot_bechester_motherhouse_ruins_01:0 "Ruines de la Matristère de Bechester"
 building_agot_bechester_motherhouse_ruins_01_desc:0 "Lors de la Danse des Dragons, la gargantuesque Vhagar incendia ce qui n'était autre qu'un sanctuaire pour les Sœurs du Silence. Bien que toujours un lieu de pèlerinage pour les septentiques, les ruines témoignent du sort qui attend tout ce qui est frappé par le feu d'un dragon — et à l'occasion elles servent également de lieu de campement aux brigands."
 building_agot_bechester_motherhouse_ruins_02:0 "La Matristère du Chant de l'Eau rebâtit"
 building_agot_bechester_motherhouse_ruins_02_desc:0 "Sa sainteté retrouvée, la Matristère est à nouveau un lieu de sécurité et de protection pour ceux qui baignent dans la ferveur septentique, témoignant de la divine grandeur des Sept qui ne font qu'Un."
 building_type_agot_stone_hedge_01:0 "Haye-Pierre"
 building_type_agot_stone_hedge_01_desc:0 "Le foyer ancestral de la Maison Bracken, laquelle se revendique d'avoir été jadis des rois riverains et dont la rivalité notoire avec la Maison Nerbosc n'a fait que s'exacerber depuis qu'ils se sont convertis à la Foi des Sept qui ne font qu'Un."
 building_agot_stone_hedge_01:0 "$building_type_agot_stone_hedge_01$"
 building_agot_stone_hedge_01_desc:0 "$building_type_agot_stone_hedge_01_desc$"
 building_type_casterly_rock_01:0 "Castral Roc"
 building_type_casterly_rock_01_desc:0 "D'une hauteur trois fois supérieure à celle du Mur, l'imposant Castral Roc est à l'origine de la richesse et de la puissance de la Maison Lannister. La montagne renferme d'abondantes réserves d'or, et des milliers d'années d'exploitation minière ont rempli le Roc de tunnels qui forment aujourd'hui les couloirs, les pièces et les cours de l'un des plus grands châteaux de Westeros."
 building_casterly_rock_01:0 "Le Roc"
 building_casterly_rock_01_desc:0 "Castral Roc a été bâti à l'intérieur même d'une gigantesque montagne, presque trois fois plus haute que le Mur et longue de trois lieues, et d'aucuns racontent que la reine Visenya Targaryen en personne aurait dit de Loren Lannister : « S’il s'était abrité dans les tréfonds du Roc, nul souffle de dragons ne l'aurait point effrayé. »"
 building_casterly_rock_02:0 "Le Don de Corlos"
 building_casterly_rock_02_desc:0 "La légende raconte que la fortune de Castral Roc fut un don des dieux, lorsque Corlos fils de Caster, après avoir traqué et tué une lionne qui terrorisait un petit village, décida d'épargner les lionceaux. Sa miséricorde ayant été récompensée par les dieux en le bénissant, lui et la maison qu'il fonda, les Castral, une opulente richesse."
 building_casterly_rock_03:0 "La Fourberie de Lann"
 building_casterly_rock_03_desc:0 "Bien avant d'être le fief de la Maison Lannister, Castral Roc fut celui de la maison éponyme, les Castral, dont la légende raconte que Lann le Futé leur subtilisa habilement le trône en massacrant une partie de leurs membres et en engendrant des fils par les filles restantes."
 building_casterly_rock_04:0 "La Galerie Dorée"
 building_casterly_rock_04_desc:0 "Avec le temps, la Maison Lannister devint le symbole de la richesse et de la prospérité, et la Galerie Dorée a été construite comme témoignage de cela. Elle est non seulement ornée des trésors de la maison, mais les murs scintillent d'eux-mêmes du fait de l'or brut qui affleure dans la roche."
 building_type_agot_banefort_01:0 "Fléaufort"
 building_type_agot_banefort_01_desc:0 "Fléaufort est le fief ancestral du Capuchon et de sa parentèle nécromancienne, la Maison Fléaufort, en plus d'être un bastion séculaire qui se dresse entre les Fer-nés et les Ouestiens depuis fort longtemps."
 building_agot_banefort_01:0 "Le Donjon du Capuchon"
 building_agot_banefort_01_desc:0 "$building_type_agot_banefort_01_desc$"
 building_type_agot_castamere_01:0 "Castamere"
 building_type_agot_castamere_01_desc:0 "Castamere semble un château mineur au premier abord, mais grâce aux Reyne, les racines du château sont profondes. Les mines que l'on y trouve s'étendent profondément et solidement."
 building_agot_castamere_01:0 "Mines de Castamere"
 building_agot_castamere_01_desc:0 "$building_type_agot_castamere_01_desc$"
 building_type_agot_castamere_ruins_01:0 "Castamere"
 building_type_agot_castamere_ruins_01_desc:0 "Castamere semble un château mineur au premier abord, mais grâce aux Reyne, les racines du château sont profondes. Les mines que l'on y trouve s'étendent profondément et solidement."
 building_agot_castamere_ruins_01:0 "Les mines inondées"
 building_agot_castamere_ruins_01_desc:0 "Lorsque les Reyne et les Tarbeck se soulevèrent, ils firent face à Tywin Lannister qui ne montra aucune pitié et inonda les mines, amenant les pluies sur Castamere."
 building_agot_castamere_ruins_02:0 "Mines restaurées de Castamere"
 building_agot_castamere_ruins_02_desc:0 "Désormais nettoyées et restaurées, les mines de Castamere sont à nouveau sur l'avant-dernière marche, juste derrière le Roc. Les grandes salles s'étendent profondément sous la mer."
 building_type_agot_lann_sept_01:0 "Septuaire de Lann"
 building_type_agot_lann_sept_01_desc:0 "Le septuaire de Port-Lannis, communément appelé Septuaire de Lann, en raison de la croyance erronée selon laquelle il aurait été construit par Lann le Futé, fait partie des plus grands des Sept Couronnes. Sa taille et sa magnificence en font le troisième plus grand, juste derrière le Grand Septuaire de Baelor et le Septuaire Étoilé."
 building_agot_lann_sept_01:0 "$building_type_agot_lann_sept_01$"
 building_agot_lann_sept_01_desc:0 "$building_type_agot_lann_sept_01_desc$"
 building_type_agot_lions_dock_01:0 "Quai du Lion"
 building_type_agot_lions_dock_01_desc:0 "Les quais de Port-Lannis, bien que de taille moindre par rapport à ceux de Volantis ou moins sûr que ceux de Braavos, attirent des navires venus de tous les horizons, car d'Asshaï à Ib, tout le monde connait les légendes sur l'or de Castral Roc, et l'or est le meilleur ami du marchand."
 building_agot_lions_dock_01:0 "$building_type_agot_lions_dock_01$"
 building_agot_lions_dock_01_desc:0 "$building_type_agot_lions_dock_01_desc$"
 building_type_agot_crakehall_01:0 "Crakehall"
 building_type_agot_crakehall_01_desc:0 "Le fief ancestral de la Maison Crakehall, les descendants de Crake, dit le Tueur de Sangliers."
 building_agot_crakehall_01:0 "Les bauges de Crake"
 building_agot_crakehall_01_desc:0 "Crake, le bien nommé « Tueur de Sangliers », a gagné son épithète de par la proximité des vastes champs infestés d'imposants sangliers que l'on trouve aux abords de son château. La chasse est devenue une activité fort apprécié des chevaliers et hommes de Crakehall, dont les chevaux sont également rompus à l'exercice."
 building_type_agot_midges_inn_01:0 "Castêtre"
 building_type_agot_midges_inn_01_desc:0 "Fief ancestral de la Maison Cuillêtre, Castêtre a toujours été un proche vassal des Lannister du Roc."
 building_agot_midges_inn_01:0 "L'Auberge de l'Avorton"
 building_agot_midges_inn_01_desc:0 "Aux abords de la Route de l'Or, non loin de Castêtre, se trouve une auberge, sobrement nommée l'Auberge de l'Avorton. Si l'identité de l'Avorton demeure un mystère, malgré que l'établissement porte ce nom depuis des siècles, beaucoup subodorent qu'il fut construit par quelqu'un qui cherchait à posséder des auberges aux quatre coins des Sept Couronnes."
 building_type_agot_deep_den_01:0 "Antrecombe"
 building_type_agot_deep_den_01_desc:0 "Foyer ancestral de la Maison Lydden, ce fut également le lieu de naissance du premier andal couronné Roi du Roc : Joffrey Lannister, né Joffrey Lydden."
 building_agot_deep_den_01:0 "Antrecombe"
 building_agot_deep_den_01_desc:0 "L'une des importantes voies d'accès vers les Terres de l'Ouest est depuis longtemps sous le contrôle des Lydden, ainsi, pour assurer sa protection, le château qui s'y trouve a été étendu, autant en surface qu'en sous-sol, de nombreux tunnels, salles et bastions ayant été bâtis dans les soubassements."
 building_type_agot_cornfield_01:0 "Champmoisson"
 building_type_agot_cornfield_01_desc:0 "Foyer ancestral de la Maison Swyft, Champmoisson est depuis longtemps un fervent partisan de la Maison Lannister et de Castral Roc."
 building_agot_cornfield_01:0 "Les champs verdoyants"
 building_agot_cornfield_01_desc:0 "Champmoisson, berceau ancestral de la Maison Swyft, est depuis longtemps un lieu prisé par les Terres de l'Ouest pour ses récoltes luxuriantes qui ont permis à maintes reprises de soutenir Port-Lannis et le Roc."
 building_type_agot_fair_isle_01:0 "Belle Île"
 building_type_agot_fair_isle_01_desc:0 "Demeure ancestrale de la Maison Farman, Belle Île a connu moult batailles entre les Terres de l'Ouest et les Fer-nés."
 building_agot_fair_isle_01:0 "Quais des Farman"
 building_agot_fair_isle_01_desc:0 "La Maison Farman a fait de Belle Île une puissance navale notable dans les Terres de l'Ouest, servant loyalement Castral Roc contre les conspués Fer-nés et tous les autres pirates du même acabit."
 building_type_agot_hornvale_01:0 "Corval"
 building_type_agot_hornvale_01_desc:0 "Fief ancestral de la Maison Brax, celle-ci contrôle la région depuis l'époque de l'arrivée des Andals."
 building_agot_hornvale_01:0 "Corval"
 building_agot_hornvale_01_desc:0 "Lieu où la Ruffurque prend sa source, Corval donne sa couleur au fleuve rougeâtre de par sa richesse en fer, et a assuré la protection de la Maison Brax et des seigneurs locaux depuis l'arrivée des Andals dans la région."
 building_type_agot_feastfires_01:0 "Feux-de-Joie"
 building_type_agot_feastfires_01_desc:0 "Siège ancestral de la Maison Prestre."
 building_agot_feastfires_01:0 "La Guette de Lann"
 building_agot_feastfires_01_desc:0 "À maintes reprises, la demeure ancestrale de la Maison Prestre qu'est Feux-de-Joie a permis d'avertir Port-Lannis et les Terres de l'Ouest méridionales de l'arrivée des Fer-nés, sa tour projetant une lueur en guise d'avertissement dès lors que des boutres sont aperçus à l'horizon."
 building_type_agot_ashemark_01:0 "Cendremarc"
 building_type_agot_ashemark_01_desc:0 "Fief ancestral de la Maison Marpheux."
 building_agot_ashemark_01:0 "Les Casernes de l’Arbre Enflammé"
 building_agot_ashemark_01_desc:0 "Célèbre à travers toutes les Terres de l'Ouest pour son habileté à lancer des frappes précises et rapides, la Maison Marpheux a si bien formé les hommes de Cendremarc et des terres environnantes à ces méthodes que cela en est devenu une source de fierté, autant pour les seigneurs que pour le petit peuple."
 building_type_storms_end_01:0 "Accalmie"
 building_type_storms_end_01_desc:0 "Accalmie est le septième et dernier château construit par Durran Dieux-deuil pour résister à la colère du Dieu des Mers et de la Déesse des Vents. Il s'agit d'une immense forteresse composée du Poing, d'une grande tour qui sert de donjon, de grenier, de caserne et de salle, et d'une courtine en pierre lisse de cent pieds de haut et d'au moins quarante pieds d'épaisseur."
 building_storms_end_01:0 "La Salle Nuptiale d’Elenei"
 building_storms_end_01_desc:0 "Fondateur de la Maison Durrandon, Durran fut rendu célèbre entre autres pour l'amour qu'il portait pour Elenei. Loin d'être une femme du commun, elle était la fille de la mer et du vent, et tomba à son tour amoureuse, et de cet amour réciproque naquit une salle construite par Durran à cet honneur, bâtie sur les falaises blanches où vents et flots se rejoignent et s'unissent."
 building_storms_end_02:0 "Le Chagrin des Mers et des Vents"
 building_storms_end_02_desc:0 "Pour avoir renoncé à sa divinité et épousé un mortel, Elenei s'attira les foudres de ses parents, le Dieu des Mers et la Déesse des Vents, qui détruisirent la salle que Durran avait bâtie, tuant tous ceux qui s'y trouvaient, à l'exception de leur propre fille, qui protégea par là même son amour, Durran, provoquant ainsi la guerre entre un mortel et les dieux."
 building_storms_end_03:0 "La Caverne Dissimulée"
 building_storms_end_03_desc:0 "En raison des violentes tempêtes qui abondent dans la région, Accalmie ne possède aucun port pour les navires, mais au cœur des falaises blanches de la Pointe de Durran se cache une caverne accessible par un tunnel, capable d'abriter un unique petit navire."
 building_storms_end_04:0 "L’Arbre Solennel"
 building_storms_end_04_desc:0 "Comme tous les grands sièges de Westeros, Accalmie a toujours abrité un bois sacré au cœur duquel se trouve un barral, mais au contraire de bon nombre d'autres, le sien est encore présent, car les Andals ne sont jamais parvenus à prendre le château par la force, seulement par le mariage."
 building_storms_end_05:0 "Le Poing"
 building_storms_end_05_desc:0 "L'unique tour d’Accalmie est son imposant donjon central, qui domine largement les courtines et dont la forme évoque un poing géant émergeant du château. Plus qu'un simple donjon, l'édifice fait office également de grande salle, de caserne et même d'écuries, tant il est vaste."
 building_storms_end_06:0 "La Défense Parfaite"
 building_storms_end_06_desc:0 "Unique en son genre, la grande muraille d'Accalmie est faite de pierres si parfaitement agencées qu'il est impossible de distinguer où l'une s'arrête et où l'autre commence. Selon les dires, des incantations y auraient même été gravées, par les Enfants de la Forêt ou par Bran le Bâtisseur, mais rien ne permet d'attester cela, en dehors de la magnificence qui se dégage de l'ouvrage."
 building_storms_end_07:0 "Le Défi de Durran"
 building_storms_end_07_desc:0 "Aux dires de la légende, Accalmie tel qu'il est aujourd'hui est le septième château bâti par Durran 'Dieux-deuil' lors de sa guerre contre le Dieu des Mers et la Déesse des Vents. Toujours selon la légende, il reçut de l'aide, soit des Enfants de la Forêt soit de Bran le Bâtisseur, mais que cela soit fondé ou non, la forteresse aura résisté vaille que vaille aux tempêtes divines et à l'ire des dieux depuis lors."
 building_type_agot_griffins_roost_01:0 "La Griffonnière"
 building_type_agot_griffins_roost_01_desc:0 "Demeure de la maison Connington, la Griffonnière est un bastion depuis des millénaires."
 building_agot_griffins_roost_01:0 "Goulet du Griffon"
 building_agot_griffins_roost_01_desc:0 "La Griffonnière, le fief ancestral de la Maison Connington, se trouve à l'extrémité ouest de la Baie des Naufrageurs. Entouré d'eau au sud, à l'est et au nord, seul le côté ouest est accessible, mais est bien entendu protégé par un poste de garde qui mène à une crête étroite que l'on nomme le Goulet du Griffon et qui est la seule voie d'accès au château."
 building_type_agot_blackhaven_01:0 "Havrenoir"
 building_type_agot_blackhaven_01_desc:0 "L'une des anciennes forteresses des Seigneurs des Marches, Havrenoir a longtemps résisté aux pillards dorniens."
 building_agot_blackhaven_01:0 "Douves sans fond"
 building_agot_blackhaven_01_desc:0 "Havrenoir est depuis longtemps l'un des bastions des Seigneurs des Marches, et dont la principale protection lui vient de ses douves sans fond, qui servent désormais de tombeau à d'innombrables restes de pillards dorniens. Les croyances populaires disent que c'est ici même que la foudre aurait frappé, sauvant la progéniture de la Maison Dondarrion."
 building_type_agot_stonehelm_01:0 "Pierheaume"
 building_type_agot_stonehelm_01_desc:0 "L'une des forteresses des Seigneurs des Marches, Pierheaume est parvenu à repousser maints pillards dorniens."
 building_agot_stonehelm_01:0 "Murs de Noirs et de Blancs"
 building_agot_stonehelm_01_desc:0 "Pierheaume, siège ancestral de la Maison Swann, est depuis longtemps l'un des bastions des Seigneurs des Marches. Bon nombre de pillards dorniens sont venus s'écraser contre ses impressionnants murs construits à partir de pierres noires et blanches."
 building_type_agot_nightsong_01:0 "Séréna"
 building_type_agot_nightsong_01_desc:0 "L'une des anciennes forteresses des Seigneurs des Marches, Séréna a longtemps résisté aux pillards dorniens."
 building_agot_nightsong_01:0 "Tours Chantantes"
 building_agot_nightsong_01_desc:0 "Séréna est depuis longtemps un bastion des Seigneurs des Marches, protégé par ses fameuses Tours qui Chantent, qui ont provoqués la perte d'innombrables Dorniens venus se risquer à piller la Maison Caron."
 building_type_agot_morne_01:0 "Morne"
 building_type_agot_morne_01_desc:0 "Le siège des Rois de Torth, Morne est un phare pour tout les Andals, ainsi que les richesses et merveilles des royaumes du Couchant."
 building_agot_morne_01:0 "Siège royal de Morne"
 building_agot_morne_01_desc:0 "$building_type_agot_morne_01_desc$"
 building_agot_morne_02:0 "Ruines de l'île aux saphirs"
 building_agot_morne_02_desc:0 "Autrefois le siège royal de l'île aux saphirs, Morne est une ruine visible par tous, témoignant d'un passé jadis puissant où les Étoiles-du-Soir étaient d'authentiques rois."
 building_agot_morne_03:0 "Siège de Morne rebâtit"
 building_agot_morne_03_desc:0 "Morne reconstruit et resplendissant, est à nouveau un symbole témoignant d'un grand avenir pour l'île aux saphirs et ceux qui la gouverne."
 building_type_agot_evenfall_hall_01:0 "La Vesprée"
 building_type_agot_evenfall_hall_01_desc:0 "Fief de la maison Torth, la Vesprée est le cœur de l'Île aux Saphirs."
 building_agot_evenfall_hall_01:0 "$building_type_agot_evenfall_hall_01$"
 building_agot_evenfall_hall_01_desc:0 "$building_type_agot_evenfall_hall_01_desc$"
 building_type_agot_summerhall_01:0 "Lestival"
 building_type_agot_summerhall_01_desc:0 "Palais d'été des Targaryen, Lestival a servi à maintes occasions de fief aux plus jeunes frères et fils du roi d'alors."
 building_agot_summerhall_01:0 "Palais Royal"
 building_agot_summerhall_01_desc:0 "$building_type_agot_summerhall_01_desc$"
 building_type_agot_summerhall_ruins_01:0 "$building_type_agot_summerhall_01$"
 building_type_agot_summerhall_ruins_01_desc:0 "$building_type_agot_summerhall_01_desc$"
 building_agot_summerhall_ruins_01:0 "Ruines de Lestival"
 building_agot_summerhall_ruins_01_desc:0 "Ruiné au cours d'une nuit de folie, qui a non seulement détruit le château, mais également causé la perte d'un roi et de pratiquement toute la famille royale, Lestival est désormais un lieu de désespoir."
 building_agot_summerhall_ruins_02:0 "Résidence du prince"
 building_agot_summerhall_ruins_02_desc:0 "Rebâtit et revivifié, Lestival est à nouveau un palais parmi les Marches de Dorne."
 building_type_agot_paintwood_01:0 "Boispeint"
 building_type_agot_paintwood_01_desc:0 "Au plus profond de Bois-la-Pluie, près du centre du Cap de l'Ire, se trouve un bosquet appelé Boispeint par les locaux, où se dresse encore aujourd'hui une ancienne tour."
 building_agot_paintwood_01:0 "Tour de la Reine Verte"
 building_agot_paintwood_01_desc:0 "Lorsque le royaume des Terres de l'Orage était à son plus faible sous Durwald Ier, la Reine Verte s'était levée pour revendiquer Bois-la-Pluie et le Cap de l'Ire, résistant pendant près d’une génération entière à la Maison Durrandon. Mais lorsqu'enfin une personne capable vint siéger à Accalmie, le jeune royaume s’est effondré sous la fureur des Durrandon."
 building_type_agot_bronzegate_01:0 "Les Bronzes"
 building_type_agot_bronzegate_01_desc:0 "Ancien foyer de la maison Buckler, Les Bronzes ont longtemps étaient la fin de tout conquérant potentiel des Terres de l'Orage."
 building_agot_bronzegate_01:0 "Mur des sept crânes"
 building_agot_bronzegate_01_desc:0 "Lord des invasions andales, une alliance entre sept seigneurs de guerre, se faisant appeler la Fraternité Sacrée des Andals, jeta son dévolu sur les Terres de l'Orage. C'est lors de la Bataille des Bronzes que Monfryd V les vainquit, tuant les sept au prix de sa propre vie. Aujourd'hui encore, sept crânes ornent les murs des Bronzes en souvenir de cette victoire, et ce même si la maison Buckler et les Terres de l'Orage se sont convertis à la Foi."
 building_type_agot_weeping_tower_01:0 "Tour Blanchef"
 building_type_agot_weeping_tower_01_desc:0 "Demeure traditionnelle de la Maison Blanchef, c'est d'ici qu'ils dirigent la ville environnante."
 building_agot_weeping_tower_01:0 "$building_type_agot_weeping_tower_01$"
 building_agot_weeping_tower_01_desc:0 "$building_type_agot_weeping_tower_01_desc$"
 building_agot_weeping_tower_02:0 "La Tour-en-Pleurs"
 building_agot_weeping_tower_02_desc:0 "Lorsque le corps du Jeune Dragon fut restitué par les Dorniens, la ville garda son corps trois jours durant et beaucoup vinrent pleurer le roi Daeron. C'est ainsi que la ville et la tour obtinrent de nouveaux noms."
 building_type_agot_kingswood_brotherhood_01:0 "Fraternité Bois-du-Roi"
 building_type_agot_kingswood_brotherhood_01_desc:0 "La Fraternité Bois-du-Roi était un groupe de bandits tristement célèbre."
 building_agot_kingswood_brotherhood_01:0 "Campement de la Fraternité"
 building_agot_kingswood_brotherhood_01_desc:0 "La fraternité était soutenue par le petit peuple du Bois-du-Roi, les aidant à échapper aux seigneurs locaux et même aux patrouilles royales."
 building_type_agot_ruins_kingswood_brotherhood_01:0 "$building_type_agot_kingswood_brotherhood_01$"
 building_type_agot_ruins_kingswood_brotherhood_01_desc:0 "$building_type_agot_kingswood_brotherhood_01_desc$"
 building_agot_ruins_kingswood_brotherhood_01:0 "Tombeaux de la Fraternité Bois-du-Roi"
 building_agot_ruins_kingswood_brotherhood_01_desc:0 "La Fraternité Bois-du-Roi était un groupe de bandits tristement célèbre, qui avait le soutien de la populace locale, celle-ci estimant que la Fraternité était les seuls à se battre pour leurs droits. C'est ce soutien qui lui permit d'échapper aux seigneurs locaux et aux patrouilles royales, mais lorsqu'elle devient un problème pour le roi Aerys II, une troupe menée par Ser Arthur Dayne, membre de la Garde Royale, fut envoyée pour disperser les bandits."
 building_agot_ruins_kingswood_brotherhood_02:0 "Campement de la Fraternité ressuscité"
 building_agot_ruins_kingswood_brotherhood_02_desc:0 "La Fraternité Bois-du-Roi a été reformé et tourmente une fois de plus le Bois-du-Roi et ses seigneurs."
 building_type_agot_haywater_docks_01:0 "Vélin"
 building_type_agot_haywater_docks_01_desc:0 "$building_agot_haywater_docks_01_desc$"
 building_agot_haywater_docks_01:0 "Les Quais de la Fenière"
 building_agot_haywater_docks_01_desc:0 "Au pied des Parchemins, siège de la Maison Penrose, les quais de la Fenière, situés à l'embouchure de ce même fleuve, voient mouiller moult navires provenant de Torth, d'Accalmie et des cités libres qui y font escale avant de poursuivre plus avant vers le nord à travers le détroit de Torth, ou plus loin encore au cœur des Terres de l'Orage."
 building_type_agot_broken_shield_inn_01:0 "L'Auberge du Bouclier Brisé"
 building_type_agot_broken_shield_inn_01_desc:0 "$building_agot_broken_shield_inn_01_desc$"
 building_agot_broken_shield_inn_01:0 "L'Auberge du Bouclier Brisé"
 building_agot_broken_shield_inn_01_desc:0 "L'une des plus grandes auberges des Terres de l'Orage et la plus grande du Cap de l'Ire, l'Auberge du Bouclier Brisé est réputée pour son vaste espace ouvert dans lequel on pourrait passer une soirée entière de beuverie sans avoir fait le tour complet des tables."
 building_type_winterfell_01:0 "Winterfell"
 building_type_winterfell_01_desc:0 "Siège de la maison Stark, Winterfell est depuis longtemps le cœur du Nord. Célèbre pour ses grandes cryptes qui abritent les seigneurs et les rois morts dans le passé, et pour ses sources d'eau chaude qui chauffent le château même au plus fort de l'hiver."
 building_winterfell_01:0 "Le Premier Donjon"
 building_winterfell_01_desc:0 "Le Premier Donjon de Winterfell est un ancien bastion ; c'est une tour haute, ronde et massive plus grande que de nombreux autres châteaux. C'est la partie la plus ancienne du château et elle est entourée par le cimetière où les Stark enterrent leurs serviteurs."
 building_winterfell_02:0 "Les Cryptes de la Maison Stark"
 building_winterfell_02_desc:0 "Sous le Premier Donjon se trouvent les cryptes de la Maison Stark, où les anciens rois du Nord et de l'Hiver reposent ici depuis des milliers d'années, enterrés avec les lames et les loups."
 building_winterfell_03:0 "$building_type_winterfell_01$"
 building_winterfell_03_desc:0 "$building_type_winterfell_01_desc$"
 building_type_moat_cailin_01:0 "Moat Cailin"
 building_type_moat_cailin_01_desc:0 "L'ancienne forteresse de Moat Cailin protège le Nord depuis des siècles. Même dans son état de ruine, avec seulement la Porte, la Tour des Enfants et la Tour du Pochard restantes, une petite force peut tenir la Douve contre presque n'importe quelle armée du Sud."
 building_moat_cailin_01:0 "Portes du Nord en ruines"
 building_moat_cailin_01_desc:0 "$building_type_moat_cailin_01_desc$"
 building_moat_cailin_02:0 "Bastion partiellement restauré du Neck"
 building_moat_cailin_02_desc:0 "Arrachée des tourbières qui menaçaient naguère de l'engloutir entièrement, Moat Cailin est en passe de redevenir la tant redoutée forteresse  qu'elle fut autrefois, grâce notamment à sa courtine et ses hautes tours."
 building_moat_cailin_03:0 "Bastion restauré du Neck"
 building_moat_cailin_03_desc:0 "Retrouvant sa splendeur d'antan, Moat Cailin est à nouveau l'imposant bastion du Nord, fort de sa vingtaine de tours et de sa courtine de basalte, elle est capable de mettre en déroute toute forme de menace."
 moat_cailin_fortification_rights_desc:0 "[GetTitleByKey('e_the_north').GetNameNoTier] a $game_concept_vassal_contract$ : [GetSubjectContractType('fortification_rights').GetObligationName('fortification_rights_granted')]"
 moat_cailin_top_liege_desc:0 "[GetTitleByKey('e_the_north').GetName] est détenu par votre [top_liege|El]"
 building_type_agot_barrow_keep_01:0 "Le Grand Tertre"
 building_type_agot_barrow_keep_01_desc:0 "Sous la Tertrée se trouve le Grand Tertre, considéré comme la demeure du Premier Roi, également connu comme le Roi des géants."
 building_agot_barrow_keep_01:0 "$building_type_agot_barrow_keep_01$"
 building_agot_barrow_keep_01_desc:0 "$building_type_agot_barrow_keep_01_desc$"
 building_type_agot_white_harbor_01:0 "L'Hôtel des Monnaies de l'Hiver"
 building_type_agot_white_harbor_01_desc:0 "Lorsque les Manderly vinrent dans le Nord, ils amenèrent avec eux leurs richesses, ce qui permit au Nord de se revitaliser après un millénaire de guerre contre les Rois Faucons de la Montagne et du Val. L'édification de l'Hôtel des Monnaies du Nord contribua grandement à cet effet."
 building_agot_white_harbor_01:0 "$building_type_agot_white_harbor_01$"
 building_agot_white_harbor_01_desc:0 "$building_type_agot_white_harbor_01_desc$"
 agot_wh_mint_loc:0 "Lorsque Torrhen plia le genou devant les dragons, l'une des conditions fut que l'hôtel des monnaies de Blancport devait fermer. Le bâtiment a cependant été entretenu toutes ses années durant, dans le cas où le Nord retrouverait son indépendance."
 building_type_agot_sept_of_the_snows_01:0 "Septuaire des Neiges"
 building_type_agot_sept_of_the_snows_01_desc:0 "Lorsque les Manderly vinrent dans le Nord, la protection de leur foi leur fut garantie, et pour vénérer les Sept, ils bâtirent le Septuaire des Neiges."
 building_agot_sept_of_the_snows_01:0 "Le bastion Nord de la Foi"
 building_agot_sept_of_the_snows_01_desc:0 "$building_type_agot_sept_of_the_snows_01_desc$"
 building_type_agot_wolfs_den_01:0 "L'Antre du Loup"
 building_type_agot_wolfs_den_01_desc:0 "Érigé par Jon Stark afin de protéger la Blanchedague des pillards et des esclavagistes, l'Antre du Loup est un symbole d'effroi envers toutes les menaces."
 building_agot_wolfs_den_01:0 "Garde de la Blanchedague"
 building_agot_wolfs_den_01_desc:0 "$building_type_agot_wolfs_den_01_desc$"
 building_agot_wolfs_den_02:0 "La Prison du Triton"
 building_agot_wolfs_den_02_desc:0 "Lorsque les Manderly vinrent au Nord et érigèrent Châteauneuf, l'Antre du Loup tomba en ruine et devint une prison pour Blancport."
 building_agot_wolfs_den_03:0 "L'Antre"
 building_agot_wolfs_den_03_desc:0 "Rebâtit et restauré, l'Antre du Loup offre à nouveau un spectacle formidable."
 building_type_agot_new_castle_01:0 "Le Châteauneuf"
 building_type_agot_new_castle_01_desc:0 "Lorsque les Manderly vinrent au Nord, ils érigèrent Châteauneuf à l'image de leur fief perdu du Bief, Petrebourg. Il contraste fortement avec les autres châteaux des Nordiens, tel que Winterfell ou l'Antre du Loup."
 building_agot_new_castle_01:0 "$building_type_agot_new_castle_01$"
 building_agot_new_castle_01_desc:0 "$building_type_agot_new_castle_01_desc$"
 building_type_agot_dreadfort_01:0 "Le Fort-Terreur"
 building_type_agot_dreadfort_01_desc:0 "Demeure de la Maison Bolton, Fort-Terreur est tristement célèbre dans le Nord et au-delà."
 building_agot_dreadfort_01:0 "La Chambre Cachée"
 building_agot_dreadfort_01_desc:0 "L'ancienne forteresse des Rois Rouges où est conservé, au plus profond de ses entrailles dans une chambre secrète, les trophées les plus infâmes des Bolton."
 building_type_agot_karhold_01:0 "Karhold"
 building_type_agot_karhold_01_desc:0 "Le siège de la maison Karstark."
 building_agot_karhold_01:0 "La Motte Grise"
 building_agot_karhold_01_desc:0 "Karhold était déjà une puissante forteresse avant même que Karlon Stark en prenne possession. Située au sommet de deux collines, elles offrent au château une incroyable puissance défensive naturelle."
 building_type_agot_warg_king_01:0 "Château du Roi Garou"
 building_type_agot_warg_king_01_desc:0 "L'ancien fief du Roi Garou, l'un des anciens rivaux des Rois de l'Hiver."
 building_agot_warg_king_01:0 "Ruines du château du Roi Garou"
 building_agot_warg_king_01_desc:0 "Les vestiges du château séculaire du Roi Garou se trouvent toujours sur la Presqu'île de Merdragon, et fut l'un des premiers à avoir été vaincu par les Rois de l'Hiver. Beaucoup pensent qu'elles sont hantées."
 building_agot_warg_king_02:0 "Le château du Roi Garou rebâtit"
 building_agot_warg_king_02_desc:0 "Rebâtit à partir des ruines, le château du Roi Garou est à nouveau une véritable forteresse, plus grandiose que jamais."
 building_type_agot_greywater_watch_01:0 "Griseaux"
 building_type_agot_greywater_watch_01_desc:0 "Le célèbre château de la maison Reed, Fort-Griseaux, ou plus simplement Griseaux, est réputé pour être le plus grand des châteaux des Paludiers, et comme tous les autres, il se déplace à travers les tourbières du Neck, ce qui en fait une cible excessivement difficile à trouver et à attaquer."
 building_agot_greywater_watch_01:0 "Le château mobile"
 building_agot_greywater_watch_01_desc:0 "$building_type_agot_greywater_watch_01_desc$"
 building_type_agot_rills_stables_01:0 "Les écuries des Rus"
 building_type_agot_rills_stables_01_desc:0 "Les Rus ont toujours été le foyer des seigneurs des chevaux, qu'il s'agisse de la Maison Cavalié ou de la Maison Ryswell. Certes, les montures originaires de ces contrées ne sont point aussi imposantes que leurs homologues utilisés par les chevaliers suderons, mais ils n'en demeurent pas moins réputés pour leur célérité et leur robustesse."
 building_agot_rills_stables_01:0 "$building_type_agot_rills_stables_01$"
 building_agot_rills_stables_01_desc:0 "$building_type_agot_rills_stables_01_desc$"
 building_type_agot_widows_watch_01:0 "L'avertissement du Loup Affamé"
 building_type_agot_widows_watch_01_desc:0 "Lorsque les Andals arrivèrent dans le Nord, ils firent la rencontre de Theon Stark, autrement connu comme le Loup Affamé. Ce dernier ne se contenta pas de mettre à bas Argos Sept Étoiles et son armée, il fit voile vers Andalos en guise de représailles. Suite à son action vengeresse, il ramena sur les côtes nordiennes les têtes de tous ceux qu'il avait tués, afin que celles-ci servent d'avertissement à tout futur envahisseur."
 building_agot_widows_watch_01:0 "$building_type_agot_widows_watch_01$"
 building_agot_widows_watch_01_desc:0 "$building_type_agot_widows_watch_01_desc$"
 building_agot_widows_watch_02:0 "Le Guet de la Veuve"
 building_agot_widows_watch_02_desc:0 "Depuis l'arrivée des Manderly, la côte est du Nord n'est plus aussi inhospitalière qu'autrefois, elle est d'ailleurs surnommée : le Guet de la Veuve, du même nom que la forteresse de la région."
 building_agot_widows_watch_03:0 "L'avertissement renouvelé"
 building_agot_widows_watch_03_desc:0 "Le Nord ayant regagné son indépendance, sa principale préoccupation est désormais de protéger ses frontières, et pour ce faire, les piques autrefois dressées par Theon Stark feront un parfait moyen de dissuasion contre tous étrangers qui débarqueraient sur les côtes avec de viles intentions."
 agot_widows_watch_trigger:0 "Le Nord ayant juré fidélité au Trône de Fer, il n'est plus nécessaire d'avoir recours à de tels procédés d'intimidation, mais si d'aventure il venait à retrouver son indépendance, il serait judicieux de réévaluer la question."
 building_type_agot_flints_cliffs_01:0 "Les Falaises Flint"
 building_type_agot_flints_cliffs_01_desc:0 "Pouce-Flint a longtemps été le théâtre de moult batailles entre Nordiens et Fer-nés, et les falaises qui s'y trouvent ont bien entendu été d'une aide primordiale dans la défense de la région."
 building_agot_flints_cliffs_01:0 "$building_type_agot_flints_cliffs_01$"
 building_agot_flints_cliffs_01_desc:0 "$building_type_agot_flints_cliffs_01_desc$"
 building_type_agot_grey_cliffs_01:0 "Les Falaises Grises"
 building_type_agot_grey_cliffs_01_desc:0 "Depuis fort longtemps, les Falaises Grises ont joué un rôle majeur dans la défense des Nordiens face aux menaces venues de la Mer Grelotte ; pillards et esclavagistes étant friands des cibles vulnérables et isolées."
 building_agot_grey_cliffs_01:0 "$building_type_agot_grey_cliffs_01$"
 building_agot_grey_cliffs_01_desc:0 "$building_type_agot_grey_cliffs_01_desc$"
 building_type_agot_unicorn_glen_01:0 "Hautsoir"
 building_type_agot_unicorn_glen_01_desc:0 "Situé sur les terres de la Maison Magnar, en plein cœur des montagnes de Skagos, Hautsoir est réputé pour abriter des troupeaux de licornes."
 building_agot_unicorn_glen_01:0 "La Grande Auge"
 building_agot_unicorn_glen_01_desc:0 "Dans les montagnes de Skagos on peut y trouver une auge, une grande vallée où prolifèrent des licornes. Quiconque a la mainmise sur ces contrées aura tout loisir de s'enorgueillir du spectacle qu'offrent ces sublimes mais redoutables créatures."
 building_type_agot_rodriks_gift_01:0 "Fort-Mormont"
 building_type_agot_rodriks_gift_01_desc:0 "Le siège ancestral de la Maison Mormont, laquelle gouverne l’Île-aux-Ours depuis l'époque du roi Rodrik Stark."
 building_agot_rodriks_gift_01:0 "Le Don de Rodrik"
 building_agot_rodriks_gift_01_desc:0 "Le Fort-Mormont, de même que l'ensemble de l'Île-aux-Ours, furent offerts à la Maison Mormont par le roi Rodrik Stark, lequel reconquit l'île des mains des Fer-nés lors d'un combat de lutte. L'île est restée sous leur protection depuis lors."
 building_type_agot_ravos_base_01:0 "Dent-de-Fer"
 building_type_agot_ravos_base_01_desc:0 "Le siège du pouvoir des Fer-nés sur l’Île-aux-Ours."
 building_agot_ravos_base_01:0 "Le Siège de Ravos"
 building_agot_ravos_base_01_desc:0 "C'est d’ici que les Fer-nés régnaient jadis sur l’Île-aux-Ours, et désormais restauré, l'ancien siège de Ravos Chenu sera parfait pour aller cueillir les fruits bien mûrs de la Baie des Phoques."
 building_type_agot_last_hearth_01:0 "Âtre-lès-Confins"
 building_type_agot_last_hearth_01_desc:0 "Fief ancestral de la Maison Omble, Âtre-lès-Confins porte bien son nom, étant le dernier grand château situé aux confins du Don et des terres attenantes à la Garde de Nuit lorsque l'on prend la route depuis Winterfell."
 building_agot_last_hearth_01:0 "$building_type_agot_last_hearth_01$"
 building_agot_last_hearth_01_desc:0 "$building_type_agot_last_hearth_01_desc$"
 building_type_agot_blackpool_01:0 "Noirétang"
 building_type_agot_blackpool_01_desc:0 "Siège ancestral de la Maison Ardoise."
 building_agot_blackpool_01:0 "Noirétang"
 building_agot_blackpool_01_desc:0 "Noirétang, qui a donné son nom au siège ancestral de la Maison Ardoise, est un vaste lac dont la profondeur est telle, que ses eaux semblent noires. Il abrite une faune piscicole abondante et de nombreux animaux viennent s'y abreuver, fournissant une source généreuse de viande et de poisson aux seigneurs locaux."
 building_type_agot_torrhens_square_01:0 "Quart-Torrhen"
 building_type_agot_torrhens_square_01_desc:0 "Fief traditionnel de la Maison Tallhart, les seigneurs de Quart-Torrhen sont connus pour leur vaillance, n'ayant cure de se jeter la tête la première dans le danger."
 building_agot_torrhens_square_01:0 "$building_type_agot_torrhens_square_01$"
 building_agot_torrhens_square_01_desc:0 "$building_type_agot_torrhens_square_01_desc$"
 building_type_agot_deepwood_motte_01:0 "Motte-la-Forêt"
 building_type_agot_deepwood_motte_01_desc:0 "Siège ancestral de la Maison Glover, Motte-la-Forêt assure la protection du Bois-aux-Loups, grâce à ses seigneurs, depuis longtemps aguerris et enhardis par la lutte contre les pillards, notamment les Fer-nés venus des Mers du Crépuscule."
 building_agot_deepwood_motte_01:0 "$building_type_agot_deepwood_motte_01$"
 building_agot_deepwood_motte_01_desc:0 "$building_type_agot_deepwood_motte_01_desc$"
 building_type_agot_hornwood_01:0 "Corbois"
 building_type_agot_hornwood_01_desc:0 "La vaste forêt qui a donné son nom au château, autant qu'à la Maison Corbois, est réputée à travers le Nord pour être un lieu où abonde le gibier. On y trouve notamment de magnifiques orignacs, un défi de taille pour tout bon chasseur qui se respecte."
 building_agot_hornwood_01:0 "$building_type_agot_hornwood_01$"
 building_agot_hornwood_01_desc:0 "$building_type_agot_hornwood_01_desc$"
 building_type_agot_ramsgate_01:0 "Porte-Béline"
 building_type_agot_ramsgate_01_desc:0 "Fief ancestral de la Maison Woolfield, Porte-Béline se dresse à l'embouchure de la Brèchesaigue, la protégeant ainsi des pillards, pirates et autres esclavagistes venus du Détroit et même au-delà."
 building_agot_ramsgate_01:0 "$building_type_agot_ramsgate_01$"
 building_agot_ramsgate_01_desc:0 "$building_type_agot_ramsgate_01_desc$"
 building_type_agot_oldcastle_01:0 "Châteauvieux"
 building_type_agot_oldcastle_01_desc:0 "Le foyer ancestral de la Maison Locke, Châteauvieux, était autrefois le principal bastion qui protégeait la Blanchedague, jusqu'à la construction de l'Antre du Loup. Bien qu'éclipsée par Blancport, la place-forte n'en reste pas moins redoutable, et constitue toujours la première ligne de défense contre les invasions venues de la Morsure."
 building_agot_oldcastle_01:0 "$building_type_agot_oldcastle_01$"
 building_agot_oldcastle_01_desc:0 "$building_type_agot_oldcastle_01_desc$"
 building_type_sunspear_01:0 "Lancehélion"
 building_type_sunspear_01_desc:0 "Lancélion est le siège de la maison Nymeros-Martell. Comme les Dorniens eux-mêmes, le château est un mélange d'éléments rhoynar et andals. Aux côtés de l'ancien donjon Andal appelé la Frégate des Sables, se dressent les tours du Soleil et de la Lance, toutes deux construites dans le plus pur style rhoynar. La Tour du Soleil est l'endroit où le prince ou la princesse de Dorne règnent depuis leurs deux trônes jumeaux, l'un portant un soleil et l'autre une lance."
 building_sunspear_01:0 "$building_type_sunspear_01$"
 building_sunspear_01_desc:0 "$building_type_sunspear_01_desc$"
 building_type_agot_tower_of_joy_01:0 "Tour de la Joie"
 building_type_agot_tower_of_joy_01_desc:0 "La Tour de la Joie est une petite tour située dans la Passe-du-Prince, et a servi de refuge privé à certains des plus grands personnages du royaume."
 building_agot_tower_of_joy_01:0 "$building_type_agot_tower_of_joy_01$"
 building_agot_tower_of_joy_01_desc:0 "$building_type_agot_tower_of_joy_01_desc$"
 building_type_agot_ruin_tower_of_joy_01:0 "$building_type_agot_tower_of_joy_01$"
 building_type_agot_ruin_tower_of_joy_01_desc:0 "$building_type_agot_tower_of_joy_01_desc$"
 building_agot_ruin_tower_of_joy_01:0 "Cairns des huit"
 building_agot_ruin_tower_of_joy_01_desc:0 "Sur une crête située dans la Passe-du-Prince, on peut y trouver huit tombes situées non loin des vestiges d'une tour."
 building_type_agot_the_water_gardens_01:0 "Les Jardins Aquatiques"
 building_type_agot_the_water_gardens_01_desc:0 "Construits par le Prince Maron pour son épouse la Princesse Daenerys, les Jardins Aquatiques sont devenus un joyau du désert de Dorne. Fabriqués en marbre rose, ils servent de résidence de quiétude aux Princes de Dorne depuis leur création."
 building_agot_the_water_gardens_01:0 "$building_type_agot_the_water_gardens_01$"
 building_agot_the_water_gardens_01_desc:0 "$building_type_agot_the_water_gardens_01_desc$"
 building_type_agot_ghaston_grey_01:0 "Griseffroy"
 building_type_agot_ghaston_grey_01_desc:0 "Griseffroy est la forteresse-prison insulaire situé dans la mer de Dorne. Elle est la terreur de tous ceux qui finissent captifs des dorniens."
 building_agot_ghaston_grey_01:0 "$building_type_agot_ghaston_grey_01$"
 building_agot_ghaston_grey_01_desc:0 "$building_type_agot_ghaston_grey_01_desc$"
 building_type_agot_the_shadow_city_01:0 "Ville Ombreuse"
 building_type_agot_the_shadow_city_01_desc:0 "La triple muraille de Lancehélion forme un labyrinthe de ruelles et de rues qui ne font que semer la confusion parmi les assaillants. Il n'y a qu'à un seul endroit où ces trois murs possèdent des portes alignées : la Triple porte, qui fait office d'entonnoir et de piège mortel."
 building_agot_the_shadow_city_01:0 "Triple Porte"
 building_agot_the_shadow_city_01_desc:0 "$building_type_agot_the_shadow_city_01_desc$"
 building_type_agot_starfall_01:0 "Les Météores"
 building_type_agot_starfall_01_desc:0 "Château séculaire, fief de l'une des maisons les plus anciennes qui soit, les Météores ont été bâtis à l'endroit même où une étoile s'est écrasée et qui fut ensuite utilisé pour forger Aube."
 building_agot_starfall_01:0 "Sabrecaux"
 building_agot_starfall_01_desc:0 "La fameuse tour nommée d'après Aube, l'épée de la maison Dayne, Sabrecaux permet aux Météores d'avoir un contrôle solide sur les zones environnantes du fait de sa hauteur. Mais cette hauteur c'est avéré être à double tranchant, notamment lorsqu'un membre de la maison décida de sauter par la fenêtre, par désespoir."
 building_type_agot_vultures_roost_01:0 "Perche-Vautour"
 building_type_agot_vultures_roost_01_desc:0 "Le tristement célèbre fief du Roi Vautour, Perche-Vautour a su s'attirer l'inimitié des Seigneurs des Marches, depuis le Bief jusqu'aux Terres de l'Orage."
 building_agot_vultures_roost_01:0 "Fief du Roi Vautour"
 building_agot_vultures_roost_01_desc:0 "C'est depuis ce fief que les Rois Vautour de jadis ont terrorisés les Marches dorniennes, et c'est de ce même fief qu'un autre pourrait voir le jour."
 building_type_agot_skyreach_01:0 "Touche-au-Ciel"
 building_type_agot_skyreach_01_desc:0 "Touche-au-Ciel, autrefois demeure des Rois de la Pierre et du Ciel, était la place forte de la Voie Large, connu aujourd'hui sous le nom de Passe-du-Prince."
 building_agot_skyreach_01:0 "Les Tours Montantes"
 building_agot_skyreach_01_desc:0 "Touche-au-Ciel est célèbre pour sa position dominante sur la Voie Large, avec ses remparts sculptés et ses touts élancées. Nul n'a jamais réussi à franchir cette place-forte et à tromper la vigilance de la maison régnante."
 building_type_agot_hellgate_hall_01:0 "Castel-Denfert"
 building_type_agot_hellgate_hall_01_desc:0 "Siège ancestral de la Maison l'Aride, c'est depuis ce redoutable château qu'ils régnèrent en tant que rois du Soufre."
 building_agot_hellgate_hall_01:0 "$building_type_agot_hellgate_hall_01$"
 building_agot_hellgate_hall_01_desc:0 "$building_type_agot_hellgate_hall_01_desc$"
 building_type_agot_ruins_hellgate_hall_01:0 "$building_type_agot_hellgate_hall_01$"
 building_type_agot_ruins_hellgate_hall_01_desc:0 "$building_type_agot_hellgate_hall_01_desc$"
 building_agot_ruins_hellgate_hall_01:0 "Ruines de Lucifer"
 building_agot_ruins_hellgate_hall_01_desc:0 "Autrefois le plus puissant des châteaux situaient dans les dunes profondes de Dorne, Castel-Denfert et la maison l'Aride ont été anéantis lors des guerres d'unification de Dorne sous Nymeria et la maison Martell. Aujourd'hui, les ruines témoignent de ceux qui ont défié le Soleil et la Lance comme l'a fait le dernier roi du Soufre."
 building_agot_ruins_hellgate_hall_02:0 "Castel-Denfert reconstruite"
 building_agot_ruins_hellgate_hall_02_desc:0 "Reconstruit dans son état d'origine, Castel-Denfert sert à nouveau de demeure au roi du Soufre ; les dunes ne s'inclinant plus devant Lancehélion."
 building_type_agot_godsgrace_01:0 "Grâcedieu"
 building_type_agot_godsgrace_01_desc:0 "Siège traditionnel de la maison Allyrion, le château a été fondé lorsque la maison s'est installée dans la région lors des invasions andales."
 building_agot_godsgrace_01:0 "La Tour Sang-Vert"
 building_agot_godsgrace_01_desc:0 "La Tour Sang-Vert a été érigée par la Maison Allyrion afin d'obtenir une position dominante dans les plaines autour de la Sang-Vert, et leur permettre de maintenir leur indépendance face aux nombreux petits royaumes qui l'entouraient."
 building_type_agot_nymeros_tower_01:0 "Tour Nymeros"
 building_type_agot_nymeros_tower_01_desc:0 "Phare de Lancehélion, la Tour Nymeros se dresse depuis l'arrivée des Rhoynars sur les sables de Dorne."
 building_agot_nymeros_tower_01:0 "$building_type_agot_nymeros_tower_01$"
 building_agot_nymeros_tower_01_desc:0 "$building_type_agot_nymeros_tower_01_desc$"
 building_type_agot_plankytown_01:0 "Bourg-Cabanes"
 building_type_agot_plankytown_01_desc:0 "La plus grande agglomération de Dorne. Construite sur les eaux de l'embouchure de la Sang-Vert, Bourg-Cabanes est constituée de péniches, de barques et de navires marchands assemblés par des cordes de chanvre, des planches faisant office de rues."
 building_agot_plankytown_01:0 "$building_type_agot_plankytown_01$"
 building_agot_plankytown_01_desc:0 "$building_type_agot_plankytown_01_desc$"
 building_type_agot_hellholt_01:0 "Denfert"
 building_type_agot_hellholt_01_desc:0 "Siège ancestral de la Maison Uller, Denfert a longtemps été un puissant vassal, d'abord de la Maison l'Aride, puis des Martell."
 building_agot_hellholt_01:0 "Les Restes de Meraxès"
 building_agot_hellholt_01_desc:0 "Bien que les Uller aient restitué le crâne de Meraxès en vertu du traité de paix signé avec le Trône de Fer, le reste de la carcasse est devenu la propriété des sables et des scarabées. Les ossements sont parfois visibles au gré des vents qui balaient les dunes avant de les recouvrir à nouveau."
 building_type_agot_broken_tower_01:0 "Portmartel"
 building_type_agot_broken_tower_01_desc:0 "Sur la côte du Bras Cassé de Dorne se dresse une tour de basalte noir, une roche dont on ne trouve aucune trace dans la région. L'on raconte que la tour date d'une époque antérieure à l'arrivée des Andals et qu'elle a toujours porté le nom de « Tour Brisée ». Selon les dires, si l'on se rend à son sommet, l'on peut entendre le son du fracas des vagues, semblable à un marteau sur une enclume."
 building_agot_broken_tower_01:0 "Tour brisée"
 building_agot_broken_tower_01_desc:0 "$building_type_agot_broken_tower_01_desc$"
 building_type_agot_merling_port_01:0 "Havre du Triton"
 building_type_agot_merling_port_01_desc:0 "Le désert et la sécheresse caractéristiques du climat dornien n'ont jamais empêché de voir fleurir les contes et légendes à propos des tritons. L'on parle notamment d'un petit port qui les aurait accueilli sur les rivages de la Mer de Dorne, durant l'Âge des Héros. Aujourd'hui encore, celui-ci accueille tous ceux qui cherchent refuge face aux périls de la mer."
 building_agot_merling_port_01:0 "Port triton"
 building_agot_merling_port_01_desc:0 "$building_type_agot_merling_port_01_desc$"
 building_type_agot_pit_of_snakes_01:0 "Fosse aux vipères"
 building_type_agot_pit_of_snakes_01_desc:0 "Lorsque Baelor le Bienheureux monta sur le Trône de Fer, il chercha à panser les blessures provoquées par la guerre de son prédécesseur, le Jeune Dragon. Il se rendit donc en personne à Dorne, obtint la paix et demanda la libération de son noble cousin, Aemon Chevalier-Dragon. Demande hélas refusée par Lord Wyl dans un premier temps, lequel reviendra sur sa décision, à condition que Baelor traverse en personne la fosse au-dessus de laquelle Aemon était encagée. Les vipères qui s'y trouvaient auraient, dit-on, inclinaient la tête devant le Roi Septon. La fosse existerait toujours, et la Maison Wyl continuerait de nourrir ses résidents avec les malheureux qui finissent derrière les barreaux."
 building_agot_pit_of_snakes_01:0 "$building_type_agot_pit_of_snakes_01$"
 building_agot_pit_of_snakes_01_desc:0 "$building_type_agot_pit_of_snakes_01_desc$"
 building_type_agot_pit_of_snakes_02:0 "$building_type_agot_pit_of_snakes_01$"
 building_type_agot_pit_of_snakes_02_desc:0 "La cruauté, et plus particulièrement celle exercée sur les prisonniers, a fait la réputation des Wyl, à travers les Marches Dorniennes mais même au-delà. On parle notamment d'un traitement envers les malheureux de haute naissance qui finissent suspendus dans une cage au-dessus d'une fosse de vipères."
 building_agot_pit_of_snakes_02:0 "$building_type_agot_pit_of_snakes_01$"
 building_agot_pit_of_snakes_02_desc:0 "$building_type_agot_pit_of_snakes_01_desc$"
 building_type_agot_sandstone_01:0 "Le Grès"
 building_type_agot_sandstone_01_desc:0 "Siège ancestral de la Maison Qorgyle, le Grès a su tenir bon face aux tumultes du désert et des menaces venant d'au-delà."
 building_agot_sandstone_01:0 "La Colline aux Scorpions"
 building_agot_sandstone_01_desc:0 "Une ancienne tombe qui remonte à l'époque de la conquête de Dorne par les Andals, son nom lui vient des myriades de nouveaux occupants qui y ont élu domicile."
 building_type_the_eyrie_01:0 "Les Eyrié"
 building_type_the_eyrie_01_desc:0 "Les Eyrié sont le château d'été de la maison Arryn, construit comme un palais pour les rois de la Montagne et du Val. C'est l'un des plus petits des grands châteaux de Westeros. Cependant, son emplacement au sommet de la Lance du Géant le rend pratiquement imprenable."
 building_the_eyrie_01:0 "$building_type_the_eyrie_01$"
 building_the_eyrie_01_desc:0 "$building_type_the_eyrie_01_desc$"
 building_type_the_bloody_gate_01:0 "La Porte Sanglante"
 building_type_the_bloody_gate_01_desc:0 "La Porte Sanglante défend l'unique passage des Montagnes de la Lune vers le Val. Elle protège le Val des clans des montagnes et des autres envahisseurs potentiels."
 building_the_bloody_gate_01:0 "$building_type_the_bloody_gate_01$"
 building_the_bloody_gate_01_desc:0 "$building_type_the_bloody_gate_01_desc$"
 building_type_agot_grafton_keep_01:0 "Citadelle des Grafton"
 building_type_agot_grafton_keep_01_desc:0 "Lorsque les Grafton arrivèrent pour la première fois à Westeros, ils entrèrent au service des Rois Shett de Goëville. Les Shett tentèrent de se lier aux Grafton par le biais d'un double mariage, ce qui provoqua leur chute, puisque le père et le fils furent emprisonnés jusqu'à ce que leurs épouses Grafton soient enceintes, avant de disparaître."
 building_agot_grafton_keep_01:0 "$building_type_agot_grafton_keep_01$"
 building_agot_grafton_keep_01_desc:0 "$building_type_agot_grafton_keep_01_desc$"
 building_type_agot_gull_harbor_01:0 "Goëville"
 building_type_agot_gull_harbor_01_desc:0 "La troisième plus vieille ville de Westeros, et la seconde plus petite d'entre elle. Goëville est le principal port du Val, et il en était déjà ainsi depuis bien avant l'arrivée des Andals."
 building_agot_gull_harbor_01:0 "Goëhavre"
 building_agot_gull_harbor_01_desc:0 "Principal lieu de mouillage dans le Val, le port de Goëville a grande réputation de par son marché et le phare qui le surplombe. Quels que soient les marchandises qui puissent être trouvées à travers le Détroit, il est assuré de pouvoir s'en procurer ici."
 building_type_agot_maris_motherhouse_01:0 "Goëville"
 building_type_agot_maris_motherhouse_01_desc:0 "La troisième plus vieille ville de Westeros, et la seconde plus petite d'entre elle. Goëville est le principal port du Val, et il en était déjà ainsi depuis bien avant l'arrivée des Andals."
 building_agot_maris_motherhouse_01:0 "La Matristère de Maris"
 building_agot_maris_motherhouse_01_desc:0 "La Matristère de Maris fut fondée par l'un des Sept Orateurs, la Mère Maris. C'est ici qu'elle offrit ses enseignements à de nombreuses orphelines et bâtardes, et qu'elle fut témoin de la mort de Lady Jeyne Arryn."
 building_type_agot_gold_feather_house_01:0 "Goëville"
 building_type_agot_gold_feather_house_01_desc:0 "La troisième plus vieille ville de Westeros, et la seconde plus petite d'entre elle. Goëville est le principal port du Val, et il en était déjà ainsi depuis bien avant l'arrivée des Andals."
 building_agot_gold_feather_house_01:0 "Domaine de la Plume d'Or"
 building_agot_gold_feather_house_01_desc:0 "Les Arryn de Goëville ont depuis longtemps compris que la clé du pouvoir réside dans l'or et le commerce. Ayant abandonné les Eyrié au profit d'un foyer plus urbain, le Domaine de la Plume d'Or, ils ont adopté les us mercantiles pour s'assurer la richesse nécessaire afin d'atteindre les plus hauts sommets."
 building_type_agot_osgood_square_01:0 "Goëville"
 building_type_agot_osgood_square_01_desc:0 "La troisième plus vieille ville de Westeros, et la seconde plus petite d'entre elle. Goëville est le principal port du Val, et il en était déjà ainsi depuis bien avant l'arrivée des Andals."
 building_agot_osgood_square_01:0 "Quart-Osgood"
 building_agot_osgood_square_01_desc:0 "Autrefois maison régnante de Goëville, la chute des Shett ne les a pas pour autant boutés hors de la ville. En érigeant un château miniature à l'intérieur même des remparts, ils s'assurent de garder la porte principale tout en espérant que vienne le jour où ils pourront retrouver leur place d'antan."
 building_type_agot_runestone_01:0 "Roches-aux-Runes"
 building_type_agot_runestone_01_desc:0 "Ancien fief de la maison Royce, Roches-aux-runes a été témoin de nombreux conflits bien avant l'arrivée des Andals, et de bien d'autres par la suite."
 building_agot_runestone_01:0 "La Porte de Bronze"
 building_agot_runestone_01_desc:0 "La forteresse des anciens rois de Bronze est gardée par une grande porte ornée de bronze et arborant des runes anciennes gravées dans les pierres qui composent la guérite."
 building_type_agot_gates_of_the_moon_01:0 "Portes de la Lune"
 building_type_agot_gates_of_the_moon_01_desc:0 "Foyer d'origine de la Maison Arryn, les Portes de la Lune sont résolues. Si les Eyrié sont connus pour leur beauté, car il s'agit plus d'un palais que d'une forteresse — une résidence d'été en somme ; les Portes de la Lune, elles, sont bel et bien la place forte qui permet de contrôler les Eyrié, mais également le Val lui-même."
 building_agot_gates_of_the_moon_01:0 "Champ de bataille des Sept Étoiles"
 building_agot_gates_of_the_moon_01_desc:0 "La Bataille des Sept Étoiles marquait la première fois qu'un des sept royaumes tombait aux mains des Andals. C'est ici qu'Artys Arryn a vaincu Robar deuxième du nom et a cimenté le règne des Andals dans le Val."
 building_agot_gates_of_the_moon_02:0 "Nid d'hiver du faucon"
 building_agot_gates_of_the_moon_02_desc:0 "$building_type_agot_gates_of_the_moon_01_desc$"
 building_type_agot_sisterton_01:0 "Sortonne"
 building_type_agot_sisterton_01_desc:0 "Chef-lieu des Trois Sœurs, Sortonne est ce qui se rapproche le plus du port principal des îles."
 building_agot_sisterton_01:0 "La Lanterne des Nuits"
 building_agot_sisterton_01_desc:0 "L'ancien phare des Trois Sœurs, la Lanterne des Nuits est une tour noire qui guide les marins vers leur salut lorsqu'elle est allumée, et leur perte lorsqu'elle ne l'est pas."
 building_type_agot_redfort_01:0 "Rougefort"
 building_type_agot_redfort_01_desc:0 "L'ancien siège dont la Maison Rougefort tire son nom."
 building_agot_redfort_01:0 "Les murs des Roches Écarlates"
 building_agot_redfort_01_desc:0 "Les murs du Rougefort, comme le reste du château, ont été fabriqués à partir de pierre rouge, dont tire son nom le château et la maison. Leur solidité a été testée à maintes reprises par les Andals, les clans des montagnes de la Lune et bien d'autres ennemis."
 building_type_agot_waxley_candlery_01:0 "Combemèche"
 building_type_agot_waxley_candlery_01_desc:0 "La Ciergerie Cirley, fondée et soutenue par la maison éponyme, est la plus grande guilde de Combemèche. Des ciriers talentueux y mélangent la cire d'abeille et divers parfums pour confectionner les bougies parfumées qui ont fait leur renommée."
 building_agot_waxley_candlery_01:0 "La Ciergerie Cirley"
 building_agot_waxley_candlery_01_desc:0 "$building_type_agot_waxley_candlery_01_desc$"
 building_type_agot_sunrise_keep_01:0 "Castelaude"
 building_type_agot_sunrise_keep_01_desc:0 "Construit là où les pentes des Montagnes de la Lune rencontrent les rivages de la Morsure, Castelaude contrôle le passage de l'Entaille, l'entrée la moins fréquentée du Val d'Arryn."
 building_agot_sunrise_keep_01:0 "$building_type_agot_sunrise_keep_01$"
 building_agot_sunrise_keep_01_desc:0 "$building_type_agot_sunrise_keep_01_desc$"
 building_type_agot_ironoaks_01:0 "Chênes-en-fer"
 building_type_agot_ironoaks_01_desc:0 "Le château traditionnel de la Maison Vanbois, et ce depuis l'invasion des Andals."
 building_agot_ironoaks_01:0 "Le Donjon Cérémonial"
 building_agot_ironoaks_01_desc:0 "Connue pour son fervent attachement aux cérémonies et à la chevalerie, la maison Vanbois a construit un édifice dédié à ces idéaux afin de guider tous les chevaliers du château."
 building_type_agot_strongsong_01:0 "Forchant"
 building_type_agot_strongsong_01_desc:0 "Ancien siège de la Maison Belmore, c'est de là qu'ils ont gardé le contrôle de leur domaine dans les Montagnes de la Lune."
 building_agot_strongsong_01:0 "Lac Belchant"
 building_agot_strongsong_01_desc:0 "Foyer ancestral de la Maison Belmore, Forchant a été bâti à côté du lac Belchant, la source de tout le nécessaire indispensable aux communautés isolées dans les montagnes."
 building_type_agot_ruthermont_01:0 "Montmarri"
 building_type_agot_ruthermont_01_desc:0 "Fief ancestral de la Maison Montmarri, c'est ici que la maison a prospéré depuis l'invasion des Andals."
 building_agot_ruthermont_01:0 "Le Montmarri"
 building_agot_ruthermont_01_desc:0 "La montagne dont les Montmarri tire leur nom a été une grande source de prospérité pour leur maison. Bien que l'or n'y abonde pas comme dans les Terres de l'Ouest, elle a permis de mieux exploiter et développer les terres qui l'entourent."
 building_type_agot_upcliffs_haven_01:0 "Havre Descarpe"
 building_type_agot_upcliffs_haven_01_desc:0 "Fief ancestral de la Maison Descarpe. Les descendants d'Ursulla gouvernent toujours l'île."
 building_agot_upcliffs_haven_01:0 "Le Jardin d’Ursula"
 building_agot_upcliffs_haven_01_desc:0 "Les Andals voyaient en elle une sorcière, mais pour la Maison Descarpe et les Premiers Hommes du Val, Ursulla Descarpe n'était autre que l'Épouse du Roi des Tritons, et sur l'Île de la Sorcière, son jardin est encore entretenu par sa maison."
 building_agot_upcliffs_haven_02:0 "Le Donjon de l’Épouse du Triton"
 building_agot_upcliffs_haven_02_desc:0 "Avec le temps, Havre Descarpe est devenue une grande forteresse, digne d'Ursula, l'Épouse du Roi Triton et ancêtre de la Maison Descarpe. Elle protégeait son île aussi bien par l'épée et le bouclier que par les vagues et les torrents de son époux."
 building_type_agot_olafs_tomato_farm_01:0 "La Lance Rayée"
 building_type_agot_olafs_tomato_farm_01_desc:0 "Un donjon de moindre importance situé dans le Val d'Arryn."
 building_agot_olafs_tomato_farm_01:0 "La Ferme aux Tomates d'Olaf"
 building_agot_olafs_tomato_farm_01_desc:0 "Dans le Val d'Arryn se trouve une ancienne ferme de tomates, qui, bien que loin d'être la plus grande du pays, produit pourtant plus que des fermes faisant deux fois sa taille. Si d'aucuns se questionnent sur une telle prouesse, la légende, elle, raconte que son fondateur, Olaf, aurait fait don de son âme pour ensorceler la terre et ainsi avoir des tomates à la croissance démesurée."
 building_type_pyke_01:0 "Pyk"
 building_type_pyke_01_desc:0 "Pyk est un ancien château. Les falaises sur lesquelles Pyk a été construit ont depuis longtemps été érodées par la mer, et les tours du château se dressent désormais au sommet de trois îles et de douzaines de digues. Le Grand donjon abrite le trône de Grès, le trône des souverains des îles de Fer, actuellement occupé par la maison Greyjoy."
 building_pyke_01:0 "$building_type_pyke_01$"
 building_pyke_01_desc:0 "$building_type_pyke_01_desc$"
 building_type_holy_site_naggas_hill_01:0 "La colline de Nagga"
 building_type_holy_site_naggas_hill_01_desc:0 "Coiffée des ossements du grand dragon des mers Nagga, la colline de Nagga était l'endroit où le légendaire Roi Gris avait son fief, et où les Fer-nés se sont réunis pendant des siècles pour tenir des états généraux de la royauté et choisir leurs souverains."
 building_holy_site_naggas_hill_01:0 "$building_type_holy_site_naggas_hill_01$"
 building_holy_site_naggas_hill_01_desc:0 "$building_type_holy_site_naggas_hill_01_desc$"
 building_type_agot_ten_towers_01:0 "Dix-Tours"
 building_type_agot_ten_towers_01_desc:0 "Nouveau fief de la Maison Harloi, Dix-Tours est l'un des plus formidables châteaux que l'on puisse trouver sur les Îles de Fer."
 building_agot_ten_towers_01:0 "Dix-Tours"
 building_agot_ten_towers_01_desc:0 "Le château le plus imposant, à la fois de l'île et de la Maison Harloi, Dix-Tours est célèbre pour les structures qui ont donné son nom au fief, et ce depuis la Tour des Livres jusqu'à la Tour de la Veuve. Avec le temps, l'endroit semble être devenu un bastion du savoir, une véritable forteresse de connaissance, ce qui, hélas, n'est guère plus qu'une torche isolée dans l'obscurantisme des Îles de Fer."
 building_type_agot_hoare_castle_01:0 "Château Chenu"
 building_type_agot_hoare_castle_01_desc:0 "L'ancien château de la maison Chenu situé sur Grand Wyk. Il ne s'agissait pas à proprement parler de leur fief ancestral, mais plutôt d'une résidence secondaire sur les îles."
 building_agot_hoare_castle_01:0 "Cellule d'Harmund"
 building_agot_hoare_castle_01_desc:0 "Même s'il n'en reste que des ruines, on peut trouver au plus profond des cachots du château Chenu, la cellule où la Pie-Grièche emprisonna Harmund 'le Beau' Chenu pour avoir renié le Dieu Noyé. Lorsque sa rébellion fut couronnée de succès, la Pie-Grièche lui ôta la langue, le nez et les yeux."
 building_agot_hoare_castle_02:0 "Fief du Sang Noir restauré"
 building_agot_hoare_castle_02_desc:0 "À nouveau au plus haut de sa splendeur, le château Chenu est redevenu le bastion de Grand Wyk et l'un des principaux fiefs des Îles de Fer."
 building_type_agot_lonely_light_01:0 "La dernière lumière"
 building_type_agot_lonely_light_01_desc:0 "Le lieu le plus à l'ouest du monde connu, Lumière Isolée constitue le dernier phare avant l'obscurité inconnue au-delà des Mers du Crépuscule. Bien que les mestres et autres érudits du monde pensent qu'il est rond, personne n'a jamais fait le voyage pour le vérifier."
 building_agot_lonely_light_01:0 "$building_type_agot_lonely_light_01$"
 building_agot_lonely_light_01_desc:0 "$building_type_agot_lonely_light_01_desc$"
 building_type_agot_hammerhorn_01:0 "Cormartel"
 building_type_agot_hammerhorn_01_desc:0 "Fief ancestral de la Maison Bonfrère, Cormartel est également le plus grand donjon de Grand Wyk."
 building_agot_hammerhorn_01:0 "Le Donjon du Frère"
 building_agot_hammerhorn_01_desc:0 "Ancien donjon du frère du Rois Gris, le Donjon du Frère est non seulement le cœur de Cormartel mais également celui de Grand Wyk. C'est d'ici que la Maison Bonfrère s'est répandue à travers les Îles de Fer, devenant l'une des plus grandes, si ce n'est la plus grande, maison fer-née."
 building_type_agot_lordsport_01:0 "Lordsport"
 building_type_agot_lordsport_01_desc:0 "Le siège de la Maison Botley est également la plus imposante des villes des Îles de Fer."
 building_agot_lordsport_01:0 "Lordsport"
 building_agot_lordsport_01_desc:0 "La plus grande ville des Îles de Fer est également le port principal de Pyk. Lordsport sert aussi bien de refuge que de lieu de ravitaillement pour les fer-nés afin d'envoyer leurs boutres piller les Terres Vertes."
 building_type_agot_grey_garden_01:0 "Grisjardin"
 building_type_agot_grey_garden_01_desc:0 "Siège d'une branche cadette de la Maison Harloi, Grisjardin a longtemps été un symbole de puissance pour celle-ci ainsi qu'un véritable bastion pour leur île."
 building_agot_grey_garden_01:0 "Grisjardin"
 building_agot_grey_garden_01_desc:0 "Grisjardin est célèbre à travers les Îles de Fer pour le savoir-faire martial de ses habitants. Réputation qui ne cesse de croître à mesure que les gens affluent."
 building_type_agot_volmark_01:0 "Volmark"
 building_type_agot_volmark_01_desc:0 "Siège de la maison éponyme, Volmark est sans conteste le deuxième plus grand château sur cette île après celui de la Maison Harloi."
 building_agot_volmark_01:0 "Le Port du Léviathan"
 building_agot_volmark_01_desc:0 "La Maison Volmark a forgé sa légende sur la chasse aux léviathans, d'immenses créatures sillonnant les mers, tant et si bien qu'elle a en fait son blason, et que son port fut nommé en leur honneur. Il n'est d'ailleurs pas rare que des carcasses y soient dépecées aux yeux de tous."
 building_type_agot_hardhome_01:0 "Durlieu"
 building_type_agot_hardhome_01_desc:0 "Durlieu est probablement le seul endroit au-delà du Mur qui puisse être considéré comme une ville."
 building_type_agot_ruins_hardhome_01_desc:0 "Durlieu est probablement le seul endroit au-delà du Mur qui puisse être considéré comme une ville, mais elle n'est plus qu'une ruine depuis des siècles."
 building_type_agot_gorms_port_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_gorms_port_01_desc:0 "$building_type_agot_hardhome_01_desc$"
 building_agot_gorms_port_01:0 "Port de Gorm"
 building_agot_gorms_port_01_desc:0 "Parmi les nombreux chefs qui revendiquèrent Durlieu comme son domaine exclusif, Gorm était célèbre, non seulement pour sa renommée qui avait su traverser les mers, mais également pour la construction d'un port dans la ville. On raconte qu'il accueillit même un mestre de la Citadelle."
 building_agot_gorms_port_02:0 "Grand port du Vrai Nord"
 building_agot_gorms_port_02_desc:0 "Durlieu est le cœur du Vrai Nord. C'est depuis ce lieu que le peuple libre commerce et accueille les étrangers venus des contrées outre-mer."
 building_type_agot_ruins_gorms_port_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_ruins_gorms_port_01_desc:0 "$building_type_agot_ruins_hardhome_01_desc$"
 building_agot_ruins_gorms_port_01:0 "$building_agot_gorms_port_01$"
 building_agot_ruins_gorms_port_01_desc:0 "$building_agot_gorms_port_01_desc$"
 building_agot_ruins_gorms_port_02:0 "Ruines du port"
 building_agot_ruins_gorms_port_02_desc:0 "Autrefois unique ville au-delà du Mur, Durlieu, ainsi que son port, ne sont plus que ruines et décombres."
 building_agot_ruins_gorms_port_03:0 "Port de Gorm reconstruit"
 building_agot_ruins_gorms_port_03_desc:0 "Le port, jadis construit par Gorm le Loup, a été restauré afin de pouvoir servir à nouveau Durlieu et son chef."
 building_agot_ruins_gorms_port_04:0 "$building_agot_gorms_port_02$"
 building_agot_ruins_gorms_port_04_desc:0 "$building_agot_gorms_port_02_desc$"
 building_type_agot_raymons_hall_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_raymons_hall_01_desc:0 "$building_type_agot_hardhome_01_desc$"
 building_agot_raymons_hall_01:0 "Hôtel de Raymon"
 building_agot_raymons_hall_01_desc:0 "Parmi les nombreux chefs qui se disputèrent le contrôle de Durlieu, Raymon était célèbre pour l'édifice qu'il avait construit, où il y accueillait des rivaux potentiels pour en faire des amis fidèles, ce qui lui a valu d'être surnommé « le Charmeur »."
 building_agot_raymons_hall_02:0 "Grand Hôtel du peuple libre"
 building_agot_raymons_hall_02_desc:0 "Une imposante structure servant de phare pour le peuple libre qui peut y trouver un lieu où se rassembler et débattre avec leur roi."
 building_type_agot_ruins_raymons_hall_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_ruins_raymons_hall_01_desc:0 "$building_type_agot_ruins_hardhome_01_desc$"
 building_agot_ruins_raymons_hall_01:0 "$building_agot_raymons_hall_01$"
 building_agot_ruins_raymons_hall_01_desc:0 "$building_agot_raymons_hall_01_desc$"
 building_agot_ruins_raymons_hall_02:0 "Hôtel en ruine"
 building_agot_ruins_raymons_hall_02_desc:0 "Autrefois unique ville au-delà du Mur, Durlieu, ainsi que son hôtel, ne sont plus que ruines et décombres."
 building_agot_ruins_raymons_hall_03:0 "Hôtel de Raymon reconstruit"
 building_agot_ruins_raymons_hall_03_desc:0 "Désormais rebâti, l'Hôtel de Raymon le Charmeur peut à nouveau accueillir le peuple libre."
 building_agot_ruins_raymons_hall_04:0 "$building_agot_raymons_hall_02$"
 building_agot_ruins_raymons_hall_04_desc:0 "$building_agot_raymons_hall_02_desc$"
 building_type_agot_halgars_keep_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_halgars_keep_01_desc:0 "$building_type_agot_hardhome_01_desc$"
 building_agot_halgars_keep_01:0 "Donjon de Halgar"
 building_agot_halgars_keep_01_desc:0 "Halgar Poing-de-Pierre fut à l'origine du plus grand donjon de Durlieu, lequel fut bâti pour apporter sécurité et non confort, car l'homme redoutait constamment les agissements de ses rivaux."
 building_agot_halgars_keep_02:0 "Grand donjon de pierre"
 building_agot_halgars_keep_02_desc:0 "Durlieu est désormais protégé par un redoutable donjon fait de pierre, dont la solidité mettra à l'épreuve la détermination de tout assaillant potentiel."
 building_type_agot_ruins_halgars_keep_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_ruins_halgars_keep_01_desc:0 "$building_type_agot_ruins_hardhome_01_desc$"
 building_agot_ruins_halgars_keep_01:0 "$building_agot_halgars_keep_01$"
 building_agot_ruins_halgars_keep_01_desc:0 "$building_agot_halgars_keep_01_desc$"
 building_agot_ruins_halgars_keep_02:0 "Donjon en ruine"
 building_agot_ruins_halgars_keep_02_desc:0 "Autrefois unique ville au-delà du Mur, Durlieu, ainsi que son donjon, ne sont plus que ruines et décombres."
 building_agot_ruins_halgars_keep_03:0 "Donjon de Halgar reconstruit"
 building_agot_ruins_halgars_keep_03_desc:0 "Avec le donjon d'Halgar qui domine à nouveau Durlieu, la ville réaffirme la véracité de son nom."
 building_agot_ruins_halgars_keep_04:0 "$building_agot_halgars_keep_02$"
 building_agot_ruins_halgars_keep_04_desc:0 "$building_agot_halgars_keep_02_desc$"
 building_type_agot_drekis_tunnels_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_drekis_tunnels_01_desc:0 "$building_type_agot_hardhome_01_desc$"
 building_agot_drekis_tunnels_01:0 "Les tunnels de Dreki"
 building_agot_drekis_tunnels_01_desc:0 "Désireux de pleinement contrôler Durlieu, Dreki l'Engelé fit creuser un vaste réseau souterrain afin de pouvoir se déplacer secrètement à travers la ville pour ainsi espionner ses rivaux potentiels et d'accueillir comme il se doit les malheureux qui furent conviés sous son toit."
 building_agot_drekis_tunnels_02:0 "Les grands tunnels de Durlieu"
 building_agot_drekis_tunnels_02_desc:0 "Le réseau de tunnels creusé sur ordre de Dreki s'étendant aux quatre coins de Durlieu, quiconque a connaissance de ce dédale souterrain possède un avantage comme nul autre sur ses ennemis."
 building_type_agot_ruins_drekis_tunnels_01:0 "$building_type_agot_hardhome_01$"
 building_type_agot_ruins_drekis_tunnels_01_desc:0 "$building_type_agot_ruins_hardhome_01_desc$"
 building_agot_ruins_drekis_tunnels_01:0 "$building_agot_drekis_tunnels_01$"
 building_agot_ruins_drekis_tunnels_01_desc:0 "$building_agot_drekis_tunnels_01_desc$"
 building_agot_ruins_drekis_tunnels_02:0 "Les tunnels effondrés"
 building_agot_ruins_drekis_tunnels_02_desc:0 "Autrefois unique ville au-delà du Mur, Durlieu, ainsi que son réseau souterrain, ne sont plus que ruines et décombres."
 building_agot_ruins_drekis_tunnels_03:0 "Les tunnels rénovés de Dreki"
 building_agot_ruins_drekis_tunnels_03_desc:0 "Utilisables comme ils le furent à l'époque de Dreki, les tunnels serviront le nouveau maître des lieux, et ce en dépit du sentiment de paranoïa qui s'infusera dans l'esprit des habitants de Durlieu."
 building_agot_ruins_drekis_tunnels_04:0 "$building_agot_drekis_tunnels_02$"
 building_agot_ruins_drekis_tunnels_04_desc:0 "$building_agot_drekis_tunnels_02_desc$"
 building_type_agot_ruins_fist_of_the_first_men_01:0 "Poing des Premiers Hommes"
 building_type_agot_ruins_fist_of_the_first_men_01_desc:0 "Au sommet de la colline érodée et fouettée par le vent se dressent les restes d'un ancien fort circulaire en ruine, ce qui donne à la colline l'apparence d'un poing avec les pierres dressées comme des phalanges."
 building_agot_ruins_fist_of_the_first_men_01:0 "Fort circulaire en ruine"
 building_agot_ruins_fist_of_the_first_men_01_desc:0 "$building_type_agot_ruins_fist_of_the_first_men_01_desc$"
 building_agot_ruins_fist_of_the_first_men_02:0 "Fort circulaire improvisé"
 building_agot_ruins_fist_of_the_first_men_02_desc:0 "Installées au sommet du Poing, des fortifications de fortune ont été érigées à l'endroit même où le fort circulaire d'antan se trouvait."
 building_agot_ruins_fist_of_the_first_men_03:0 "Fort circulaire reconstruit"
 building_agot_ruins_fist_of_the_first_men_03_desc:0 "Les anciens murs du fort circulaire se dressent à nouveau, désormais pourvus de tours offrant au Poing un véritable gantelet de pierre pour faire face à tout ennemi potentiel."
 building_agot_ruins_fist_of_the_first_men_04:0 "Le bastion du Poing"
 building_agot_ruins_fist_of_the_first_men_04_desc:0 "Le Poing des Premiers Hommes porte désormais bien son nom. Au sommet de la colline se dresse un fort digne de ce nom, prêt à écraser tout assaillant."
 building_type_agot_btw_milkwater_cairns_01:0 "Cairns de la Laiteuse"
 building_type_agot_btw_milkwater_cairns_01_desc:0 "Dans la vallée de la Laiteuse se trouvent les cairns et les tertres où le peuple libre enterre leurs rois et leurs héros, lesquels sont honorés en reposant dans des tombes entretenues par ceux qui vivent à leurs côtés."
 building_agot_btw_milkwater_cairns_01:0 "$building_type_agot_btw_milkwater_cairns_01$"
 building_agot_btw_milkwater_cairns_01_desc:0 "$building_type_agot_btw_milkwater_cairns_01_desc$"
 building_type_agot_btw_frostfang_crypts_01:0 "Cryptes des Crocgivre"
 building_type_agot_btw_frostfang_crypts_01_desc:0 "Les Crocgivre sont une région ancienne et particulièrement froide. Le peuple libre y enterre parfois ses chefs et rois dans de lugubres cryptes."
 building_agot_btw_frostfang_crypts_01:0 "$building_type_agot_btw_frostfang_crypts_01$"
 building_agot_btw_frostfang_crypts_01_desc:0 "$building_type_agot_btw_frostfang_crypts_01_desc$"
 building_type_agot_haggons_tower_01:0 "Foyer du zoman"
 building_type_agot_haggons_tower_01_desc:0 "Les change-peau ne sont pas les bienvenus parmi les villages et les tribus, c'est pourquoi ils vivent à l'écart, dans des habitations isolées ou de petits hameaux où se rassemblent leurs congénères."
 building_agot_haggons_tower_01:0 "Tour d'Haggon"
 building_agot_haggons_tower_01_desc:0 "Haggon était bien connu de ceux d'Au-delà du Mur et de la Garde de Nuit. Là où d'autres utilisaient leurs dons pour inspirer terreur et domination, lui, enseignait une voie différente, essayant d'empêcher ses congénères change-peau de devenir des abominations."
 building_type_agot_ruddy_hall_01:0 "Cramoisi"
 building_type_agot_ruddy_hall_01_desc:0 "Cramoisi, le foyer de Tormund Fléau-d'Ogres, est réputé à travers les Crocgivre pour son hydromel exquis et ses feux rugissants."
 building_agot_ruddy_hall_01:0 "$building_type_agot_ruddy_hall_01$"
 building_agot_ruddy_hall_01_desc:0 "$building_type_agot_ruddy_hall_01_desc$"
 building_type_agot_the_heated_pools_01:0 "Les étangs chauffés"
 building_type_agot_the_heated_pools_01_desc:0 "Malgré le froid implacable qui règne au-delà du Mur, on peut trouver quelques étangs chauffés qui offrent chaleur et réconfort à ceux qui vivent à proximité."
 building_agot_the_heated_pools_01:0 "$building_type_agot_the_heated_pools_01$"
 building_agot_the_heated_pools_01_desc:0 "$building_type_agot_the_heated_pools_01_desc$"
 building_type_agot_cold_cradle_01:0 "Le berceau gelé"
 building_type_agot_cold_cradle_01_desc:0 "Tous les hommes au-delà du Mur ne sont pas de fervents adeptes du Pacte, certains préfèrent se consacrer à des dieux plus cruels. Quelle valeur peut avoir un fils en comparaison des faveurs divines ?"
 building_agot_cold_cradle_01:0 "$building_type_agot_cold_cradle_01$"
 building_agot_cold_cradle_01_desc:0 "$building_type_agot_cold_cradle_01_desc$"
 building_type_agot_others_arrival_01:0 "L'arrivée des Autres"
 building_type_agot_others_arrival_01_desc:0 "Lorsque la Longue Nuit reviendra, les Autres marcheront à nouveau depuis les Contrées de l'Éternel Hiver, apportant avec eux les ténèbres et la mort parmi les royaumes des hommes."
 building_agot_others_arrival_01:0 "$building_type_agot_others_arrival_01$"
 building_agot_others_arrival_01_desc:0 "$building_type_agot_others_arrival_01_desc$"
 building_type_agot_whitetree_01:0 "L'Arbre Blanc"
 building_type_agot_whitetree_01_desc:0 "L'un des plus anciens villages situé au nord du Mur et qui assure une protection stable pour tous ceux qui font face à l'hiver, l'Arbre blanc doit son nom au lieu choisi pour sa construction : sous un imposant barral."
 building_agot_whitetree_01:0 "$building_type_agot_whitetree_01$"
 building_agot_whitetree_01_desc:0 "$building_type_agot_whitetree_01_desc$"
 building_type_agot_selkie_sund_01:0 "Rive-aux-Selkies"
 building_type_agot_selkie_sund_01_desc:0 "Loin au nord, sur une portion de la Grève glacée, reposent les restes d'une bête colossale. Les sauvageons qui vivent aux alentours affirment que ce sont là les ossements d'un dragon des mers, chassés par les selkies en personne."
 building_agot_selkie_sund_01:0 "Les restes du dragon des mers"
 building_agot_selkie_sund_01_desc:0 "$building_type_agot_selkie_sund_01_desc$"
 building_type_agot_last_green_01:0 "Vert Suprême"
 building_type_agot_last_green_01_desc:0 "Avant que ces contrées ne soient complétement gelées, elles étaient nommées le Vert Suprême, et la carapace d'un gigantesque et ancien crabe y reposait déjà. D'aucuns pensent qu'il s'agissait de l'enveloppe charnelle de l'un des Anciens Dieux en personne."
 building_agot_last_green_01:0 "La grande conque"
 building_agot_last_green_01_desc:0 "$building_type_agot_last_green_01_desc$"
 building_type_agot_charred_weald_01:0 "Le Bois Brûlé"
 building_type_agot_charred_weald_01_desc:0 "Au Bois Brûlé se trouve un très ancien champ de bataille, chaque tribu revendiquant y avoir combattu jadis, et pourtant, les récits perdurent à travers les âges."
 building_agot_charred_weald_01:0 "$building_type_agot_charred_weald_01$"
 building_agot_charred_weald_01_desc:0 "$building_type_agot_charred_weald_01_desc$"
 building_type_agot_great_ice_dome_01:0 "Grand Dôme de Glace"
 building_type_agot_great_ice_dome_01_desc:0 "Point de rencontre central de la Confédération des Peuples Limniques, le Grand Dôme de Glace est une structure massive située dans les confins du nord, laquelle peut aisément accueillir des dizaines de dirigeants et de chefs provenant des myriades de peuplades et tribus qui vivent alentours."
 building_agot_great_ice_dome_01:0 "$building_type_agot_great_ice_dome_01$"
 building_agot_great_ice_dome_01_desc:0 "$building_type_agot_great_ice_dome_01_desc$"
 building_type_agot_thenn_great_kilns_01:0 "Tun Vunag"
 building_type_agot_thenn_great_kilns_01_desc:0 "Principale demeure des Thenn, c'est d'ici que les Magnars gouvernent leur peuple depuis l'Âge de l'Aube."
 building_agot_thenn_great_kilns_01:0 "Les grands Kilns de Tun Vunag"
 building_agot_thenn_great_kilns_01_desc:0 "Les Thenns sont connus parmi toutes les tribus d'Au-delà du Mur pour être les seuls à travailler le métal, extraire de l'étain et du cuivre et à fondre du bronze. Cela leur a donné un avantage sur leurs voisins, tant sur le plan militaire qu'économique."
 building_type_agot_thenn_valley_01:0 "Vallée des Thenn"
 building_type_agot_thenn_valley_01_desc:0 "De par sa température plus agréable et sa plus grande fertilité que les terres environnantes, la Vallée des Thenn a longtemps abrité le Magnar et son peuple, permettant aux Thenn de bénéficier d'une meilleure stabilité que les autres tribus sauvageonnes."
 building_agot_thenn_valley_01:0 "$building_type_agot_thenn_valley_01$"
 building_agot_thenn_valley_01_desc:0 "$building_type_agot_thenn_valley_01_desc$"
 building_type_agot_thenn_great_circle_01:0 "Kelksam"
 building_type_agot_thenn_great_circle_01_desc:0 "Kelksam abrite le Grand Tumulus, principal site religieux de la vallée Thenn, si ce n'est de l'ensemble des territoires au-delà du Mur."
 building_agot_thenn_great_circle_01:0 "Le grand tumulus"
 building_agot_thenn_great_circle_01_desc:0 "Lieu le plus sacré de la vallée Thenn, c'est dans le Grand Tumulus que les plus grands Magnars d'autrefois ont été enterrés."
 building_type_agot_thenn_small_circle_01:0 "Yaykdaes"
 building_type_agot_thenn_small_circle_01_desc:0 "Deuxième lieu le plus important de la vallée Thenn, le Petit Tumulus est plus ancien mais moins impressionnant que le Grand Tumulus."
 building_agot_thenn_small_circle_01:0 "Le petit tumulus"
 building_agot_thenn_small_circle_01_desc:0 "Au nord du Grand Tumulus se trouve le Petit Tumulus, qui, selon la légende Thenn, serait le plus ancien des deux. Il abrite les restes des trois premiers Magnars."
 building_type_agot_srunmued_copper_mines_01:0 "Mines de cuivre de Srunmued"
 building_type_agot_srunmued_copper_mines_01_desc:0 "Les mines de cuivre de Srunmued sont une ressource essentielle pour les Thenn et l'un des principaux centres économiques de la vallée."
 building_agot_srunmued_copper_mines_01:0 "Petites mines de cuivre de Srunmued"
 building_agot_srunmued_copper_mines_01_desc:0 "$building_type_agot_srunmued_copper_mines_01_desc$"
 building_agot_srunmued_copper_mines_02:0 "Modestes mines de cuivre de Srunmued"
 building_agot_srunmued_copper_mines_02_desc:0 "$building_type_agot_srunmued_copper_mines_01_desc$"
 building_agot_srunmued_copper_mines_03:0 "Grandes mines de cuivre de Srunmued"
 building_agot_srunmued_copper_mines_03_desc:0 "$building_type_agot_srunmued_copper_mines_01_desc$"
 building_agot_srunmued_copper_mines_04:0 "Vastes mines de cuivre de Srunmued"
 building_agot_srunmued_copper_mines_04_desc:0 "$building_type_agot_srunmued_copper_mines_01_desc$"
 building_type_agot_krih_tin_mines_01:0 "Mines d'étain de Krih"
 building_type_agot_krih_tin_mines_01_desc:0 "Les mines d'étain de Krih sont une ressource essentielle pour les Thenns et l'un des principaux centres économiques de la vallée."
 building_agot_krih_tin_mines_01:0 "Petites mines d'étain de Krih"
 building_agot_krih_tin_mines_01_desc:0 "$building_type_agot_krih_tin_mines_01_desc$"
 building_agot_krih_tin_mines_02:0 "Modestes mines d'étain de Krih"
 building_agot_krih_tin_mines_02_desc:0 "$building_type_agot_krih_tin_mines_01_desc$"
 building_agot_krih_tin_mines_03:0 "Grandes mines d'étain de Krih"
 building_agot_krih_tin_mines_03_desc:0 "$building_type_agot_krih_tin_mines_01_desc$"
 building_agot_krih_tin_mines_04:0 "Vastes mines d'étain de Krih"
 building_agot_krih_tin_mines_04_desc:0 "$building_type_agot_krih_tin_mines_01_desc$"
 building_type_agot_tree_of_crowns_01:0 "Arbre des Couronnes"
 building_type_agot_tree_of_crowns_01_desc:0 "Un chêne géant mort et qui porte les couronnes des innombrables rois et reines potentiels qui ont cherché à établir un royaume dans les Terres Disputées. Beaucoup croient que les serments prêtés seront toujours tenus, tant qu'une offrande est faite."
 building_agot_tree_of_crowns_01:0 "$building_type_agot_tree_of_crowns_01$"
 building_agot_tree_of_crowns_01_desc:0 "$building_type_agot_tree_of_crowns_01_desc$"
 building_type_agot_triarchy_council_01:0 "Haut Conseil de la Triarchie"
 building_type_agot_triarchy_council_01_desc:0 "La Triarchie de Lys, Tyrosh et Myr n'est pas un royaume tel que le comprennent les Ouestriens. En lieu et place d'un roi, d'un seigneur de la mer ou même de triarques, les Trois Filles sont dirigées par le Haut Conseil, composé de trente-trois membres envoyés à nombre égal par chacune des trois cités. Plutôt que de se réunir dans l'une des cités, le conseil a lieu au cœur des Terres Disputées, de sorte qu'aucune des filles ne prenne l'ascendant sur l'une de ses sœurs."
 building_agot_triarchy_council_01:0 "$building_type_agot_triarchy_council_01$"
 building_agot_triarchy_council_01_desc:0 "$building_type_agot_triarchy_council_01_desc$"
 building_type_agot_ruins_triarchy_council_01:0 "$building_type_agot_triarchy_council_01$"
 building_type_agot_ruins_triarchy_council_01_desc:0 "$building_type_agot_triarchy_council_01_desc$"
 building_agot_ruins_triarchy_council_01:0 "Le Sororicide"
 building_agot_ruins_triarchy_council_01_desc:0 "Ancienne résidence du Haut Conseil de la Triarchie, cette salle témoigne désormais des liens brisés entre les trois sœurs et de la victoire de celles qui ont combattu contre l'Alliance Éternelle."
 building_agot_ruins_triarchy_council_02:0 "Le haut conseil de la Triarchie reconstruit"
 building_agot_ruins_triarchy_council_02_desc:0 "$building_type_agot_triarchy_council_01_desc$"
 building_type_agot_monument_of_borderland_01:0 "Monument de la Bataille des Confins"
 building_type_agot_monument_of_borderland_01_desc:0 "La bataille des confins fut la première fois depuis le siècle du sang que Lys, Myr et Tyrosh agir de concert et combattirent à nouveau les Volantains. En souvenir, les Trois Filles ont élevé un pilier pour commémorer la victoire."
 building_agot_monument_of_borderland_01:0 "$building_type_agot_monument_of_borderland_01$"
 building_agot_monument_of_borderland_01_desc:0 "$building_type_agot_monument_of_borderland_01_desc$"
 building_type_agot_miviyaan_slave_market_01:0 "Miviyaan"
 building_type_agot_miviyaan_slave_market_01_desc:0 "Le marché aux esclaves de Miviyaan est le principal marché du Talon, apportant moult esclaves Hartalari capturés lors des innombrables conflits des Terres Disputées."
 building_agot_miviyaan_slave_market_01:0 "Le Marché aux Esclaves de Miviyaan"
 building_agot_miviyaan_slave_market_01_desc:0 "$building_type_agot_miviyaan_slave_market_01_desc$"
 building_type_agot_ormyan_palace_01:0 "Ormyan"
 building_type_agot_ormyan_palace_01_desc:0 "Siège du pouvoir dans les biens nommées Terres Disputées."
 building_agot_ormyan_palace_01:0 "Le Palais des Hartalari"
 building_agot_ormyan_palace_01_desc:0 "L'unification des Terres Disputées par les Hartalari a permis de ramener la paix dans le Talon, et pour célébrer cet illustre événement, un palais des plus grandioses a été construit, pour symboliser l'unité et l'autorité."
 building_type_agot_racallios_fort_01:0 "Siège de Peyresang"
 building_type_agot_racallios_fort_01_desc:0 "Peyresang, la plus grande îles des Degrés de Pierre, a toujours été un refuge pour les pirates et les corsaires qui sillonnent ces eaux."
 building_agot_racallios_fort_01:0 "Fort de Racallio"
 building_agot_racallios_fort_01_desc:0 "Racallio Ryndoon a été envoyé à plusieurs reprises pour conquérir les Degrés de Pierre depuis le royaume mercenaire établi par Daemon Targaryen : d'abord par l'Alliance éternelle de Lys, Myr et Tyrosh, puis par Tyrosh seul. Lorsqu'il réussit enfin, au lieu de confier ses conquêtes à sa cité natale, il se fit pirate et roi. Depuis Peyresang, il combattit et s'allia avec les Trois Filles, Braavos, Pentos, Dorne, Lamarck et le Trône de Fer, changeant d'allégeance au gré des vents de la fortune."
 building_type_agot_crab_fields_01:0 "Lit de la Pucelle"
 building_type_agot_crab_fields_01_desc:0 "Bien qu'ils ne soient pas aussi tristement célèbres que Peyresang, la Piaule de la Pucelle et le Lit de la Pucelle sont tout aussi dangereux que n'importe quelle autre île des Degrés de Pierre ou des Îles du Basilic."
 building_agot_crab_fields_01:0 "Les champs de crabes"
 building_agot_crab_fields_01_desc:0 "Lorsque Craghar Drahar a réalisé l'impossible et débarrassé les Degrés de Pierre du fléau de la piraterie, il s'est montré brutal envers tous ceux qui brandissaient des pavillons noirs. Tous les pirates condamnés étaient jalonnés et laissés sur la plage pour nourrir les crabes."
 building_type_agot_tyrosh_01:0 "Les Murs Noirs de Tyrosh"
 building_type_agot_tyrosh_01_desc:0 "À l'instar de Volantis avant elle, Tyrosh était à l'origine un avant-poste militaire, et pour garantir sa défense, les Possessions ont bâti un imposant mur noir. Bien que moins imposant que celui de Volantis ou de Peyredragon, il offre une excellente protection à la partie la plus ancienne de la cité, et ce depuis des millénaires."
 building_agot_tyrosh_01:0 "$building_type_agot_tyrosh_01$"
 building_agot_tyrosh_01_desc:0 "$building_type_agot_tyrosh_01_desc$"
 building_type_agot_bleeding_tower_01:0 "La Tour Sanglante"
 building_type_agot_bleeding_tower_01_desc:0 "La Tour Sanglante, avec son feu servant de signal lumineux, domine le port de Tyrosh. L'air marin salé a dégradé les aubes de fer vieillissantes à son sommet, qui dégoulinent désormais de rouille sanglante sur la maçonnerie, donnant son nom à la tour. Ses murs ont vu la fin de nombreux envahisseurs, même s'ils ont été brisés autant de fois."
 building_agot_bleeding_tower_01:0 "$building_type_agot_bleeding_tower_01$"
 building_agot_bleeding_tower_01_desc:0 "$building_type_agot_bleeding_tower_01_desc$"
 building_type_agot_grand_temple_of_trios_01:0 "Grand temple de Trios"
 building_type_agot_grand_temple_of_trios_01_desc:0 "Le Grand Temple de Trios, qui se dresse au-dessus de la rivière, est un point central de Tyrosh qui est tout autant un phare dans la ville que la Tour Sanglante."
 building_agot_grand_temple_of_trios_01:0 "$building_type_agot_grand_temple_of_trios_01$"
 building_agot_grand_temple_of_trios_01_desc:0 "$building_type_agot_grand_temple_of_trios_01_desc$"
 building_type_agot_tyrosh_walls_01:0 "Murs de la cité de Tyrosh"
 building_type_agot_tyrosh_walls_01_desc:0 "La cité libre de Tyrosh est défendue par de grandes murailles et d'imposantes tours en pierre, qui sont depuis longtemps un sentiment de fierté pour les habitants."
 building_agot_tyrosh_walls_01:0 "Les murs archontiques"
 building_agot_tyrosh_walls_01_desc:0 "Encerclant l'intégralité de la cité, les murs archontiques, construits lorsque Tyrosh s'est développé au-delà des murs noirs et a obtenu son autonomie des Possessions, offrent un refuge à la fois aux citoyens de l'intérieur et aux ramasseurs d'escargots au-delà avec ses tours semi-circulaires."
 building_type_agot_red_temple_tyrosh_01:0 "Temple de la Lumière Tyroshi"
 building_type_agot_red_temple_tyrosh_01_desc:0 "Le temple du Maître de la Lumière de Tyrosh est un élément plus récent de la cité, arrivé seulement après le Siècle du Sang. Malgré cela, les R'hlloristes ont fait de grands progrès pour s'intégrer à tous les niveaux, de sorte que même l'Archonte ne peut pas réprimander ouvertement le Grand Prêtre de la cité."
 building_agot_red_temple_tyrosh_01:0 "Temple de la Noire Suie"
 building_agot_red_temple_tyrosh_01_desc:0 "$building_type_agot_red_temple_tyrosh_01_desc$"
 building_type_agot_temple_of_trade_01:0 "Temple du Commerce"
 building_type_agot_temple_of_trade_01_desc:0 "Centre du gouvernement de Lys, le Temple du Commerce est le lieu où les magistrats se réunissent sur convocation du Premier Magistrat. Le temple est célèbre pour les nombreuses exécutions d'État qui ont lieu à l'extérieur lorsque quelqu'un venait à outrepasser ses droits."
 building_agot_temple_of_trade_01:0 "$building_type_agot_temple_of_trade_01$"
 building_agot_temple_of_trade_01_desc:0 "$building_type_agot_temple_of_trade_01_desc$"
 building_type_agot_lys_walls_01:0 "Murs de la cité de Lys"
 building_type_agot_lys_walls_01_desc:0 "La cité libre de Lys est défendue par de grandes murailles et d'imposantes tours en pierre, qui sont depuis longtemps un sentiment de fierté pour les habitants."
 building_agot_lys_walls_01:0 "Les remparts maritimes"
 building_agot_lys_walls_01_desc:0 "Érigées pour défendre la cité et les nombreuses maisons et jardins de plaisirs qui parsèment la ville, les remparts maritimes de Lys brillent pour accueillir tout visiteur, ami ou ennemi."
 building_type_agot_temple_of_yndros_01:0 "Temple du Crépuscule"
 building_type_agot_temple_of_yndros_01_desc:0 "Le grand temple dédié à Yndros du Crépuscule, l'une des nombreuses divinités populaires de Lys. L'on raconte que bon nombre d'hommes qui sont entrés, sont ressortis femmes, et inversement."
 building_agot_temple_of_yndros_01:0 "$building_type_agot_temple_of_yndros_01$"
 building_agot_temple_of_yndros_01_desc:0 "$building_type_agot_temple_of_yndros_01_desc$"
 building_type_agot_red_temple_lys_01:0 "Temple de la Lumière Lysien"
 building_type_agot_red_temple_lys_01_desc:0 "Le temple du Maître de la Lumière de Lys est un phare pour les R'hlloristes depuis l'époque du règne volantain. Malgré ses racines étrangères, il a toujours défendu Lys et ses intérêts à l'étranger, assurant sa place dans les intrigues complexes de la cité."
 building_agot_red_temple_lys_01:0 "Temple des Passions Ardentes"
 building_agot_red_temple_lys_01_desc:0 "$building_type_agot_red_temple_lys_01_desc$"
 building_type_agot_port_of_lys_01:0 "Port de Lys"
 building_type_agot_port_of_lys_01_desc:0 "L'imposant port de Lys, bien que moins célèbre que celui de Braavos ou Volantis, n'en demeure pas moins l'un des principaux ports des cités libres, et Lys étant une cité insulaire, les marchandises — esclaves compris — entrent et sortent sous le regard vigilant de la tour d'Aeksio Vilinion, seigneur du port."
 building_agot_port_of_lys_01:0 "$building_type_agot_port_of_lys_01$"
 building_agot_port_of_lys_01_desc:0 "$building_type_agot_port_of_lys_01_desc$"
 building_type_agot_prison_of_lys_01:0 "Prison de Lys"
 building_type_agot_prison_of_lys_01_desc:0 "La prison de Lys, tristement connue sous le nom d'Ozlet, est réputée pour ses murs solides, ses cellules profondes, mais également pour ses résidents qui ne revoient plus jamais la lumière du jour."
 building_agot_prison_of_lys_01:0 "L'Ozlet"
 building_agot_prison_of_lys_01_desc:0 "$building_type_agot_prison_of_lys_01_desc$"
 building_type_agot_perfumed_garden_01:0 "Jardin Parfumé"
 building_type_agot_perfumed_garden_01_desc:0 "Maison de plaisir de grand renom appartenant à la famille Rogare, le Jardin Parfumé fut autant le foyer de maints esclaves de Lys que le théâtre de machinations entre conspirateurs."
 building_agot_perfumed_garden_01:0 "$building_type_agot_perfumed_garden_01$"
 building_agot_perfumed_garden_01_desc:0 "$building_type_agot_perfumed_garden_01_desc$"
 building_type_agot_qeldlen_fort_01:0 "Qeldlen"
 building_type_agot_qeldlen_fort_01_desc:0 "Construit lors du conflit qui éclata au sortir de l'effondrement de la Triarchie, le dessein derrière l'édification du Fort d'Harako était de protéger les possessions de la Maison Bazanne et de Lys contre les insurgés tyroshi, myriens et hartalari."
 building_agot_qeldlen_fort_01:0 "Le Fort d'Harako"
 building_agot_qeldlen_fort_01_desc:0 "$building_type_agot_qeldlen_fort_01_desc$"
 building_type_agot_hartalari_makseon_01:0 "Makseon"
 building_type_agot_hartalari_makseon_01_desc:0 "Makseon est le principal port continental des Lysiens."
 building_agot_hartalari_makseon_01:0 "Les Remparts d'Hartalari"
 building_agot_hartalari_makseon_01_desc:0 "Fortifié par de solides murailles, Makseon est le siège du pouvoir tout autant qu'un bastion que les Hartalari utilisent contre les envahisseurs étrangers depuis qu'ils ont chassé les Lysiens des rivages du Talon."
 building_type_agot_great_wheel_01:0 "Grande Roue de Myr"
 building_type_agot_great_wheel_01_desc:0 "Célèbre pour ses grands ouvrages industriels, Myr fait preuve d'ingéniosité pour exploiter la puissance des rivières grâce à sa Grande Roue, lui permettant ainsi de poursuivre ses nombreuses activités."
 building_agot_great_wheel_01:0 "$building_type_agot_great_wheel_01$"
 building_agot_great_wheel_01_desc:0 "$building_type_agot_great_wheel_01_desc$"
 building_type_agot_grand_temple_of_gelenei_01:0 "Grand temple de Gelenei"
 building_type_agot_grand_temple_of_gelenei_01_desc:0 "Le Grand Temple de Gelenei est l'un des rares espaces verts de la ville industrielle. Érigé de l'autre côté de la rive du Temple Rouge, il accueille tout le monde."
 building_agot_grand_temple_of_gelenei_01:0 "$building_type_agot_grand_temple_of_gelenei_01$"
 building_agot_grand_temple_of_gelenei_01_desc:0 "$building_type_agot_grand_temple_of_gelenei_01_desc$"
 building_type_agot_red_temple_myr_01:0 "Temple de la Lumière Myrien"
 building_type_agot_red_temple_myr_01_desc:0 "Le temple du Maître de la Lumière est l'une des grandes places de Myr, ses grands murs rouges et dorés sont comme un phare à la gloire de R'hllor pour tous ; et ce peu importe s'ils ont vu la lumière ou non."
 building_agot_red_temple_myr_01:0 "Temple de l'Étreinte Enflammée"
 building_agot_red_temple_myr_01_desc:0 "$building_type_agot_red_temple_myr_01_desc$"
 building_type_agot_myr_01:0 "Palais du Conclave"
 building_type_agot_myr_01_desc:0 "Le Palais du Conclave abrite le Conclave des magistrats, le conseil en charge de gouverner Myr. Considéré comme un ancien fort andal, on peut néanmoins y voir une influence rhoynare, confirmant l'idée que les Myriens possèdent des racines au sein de ces deux cultures."
 building_agot_myr_01:0 "$building_type_agot_myr_01$"
 building_agot_myr_01_desc:0 "$building_type_agot_myr_01_desc$"
 building_type_agot_statue_of_trios_01:0 "Statue de Trios"
 building_type_agot_statue_of_trios_01_desc:0 "Bien que Trios ne soit pas l'un des principaux dieux vénérés à Myr, on pense qu'il le fut autrefois, à en juger par sa grande statue. Ou peut-être a-t-elle été construite pour attirer les marchands de Tyrosh."
 building_agot_statue_of_trios_01:0 "$building_type_agot_statue_of_trios_01$"
 building_agot_statue_of_trios_01_desc:0 "$building_type_agot_statue_of_trios_01_desc$"
 building_type_agot_myr_cliffs_01:0 "Les falaises de dentelle"
 building_type_agot_myr_cliffs_01_desc:0 "Enveloppant le port de Myr, les falaises de dentelle offrent un refuge naturel propice à garantir la sécurité de la cité des menaces maritimes. Leur proximité avec le rivage signifie un espace limité pour tout projet de construction de grande envergure, mais elle permet également de dissuader tout envahisseur."
 building_agot_myr_cliffs_01:0 "$building_type_agot_myr_cliffs_01$"
 building_agot_myr_cliffs_01_desc:0 "$building_type_agot_myr_cliffs_01_desc$"
 building_type_agot_myr_walls_01:0 "Murs de la cité de Myr"
 building_type_agot_myr_walls_01_desc:0 "La cité libre de Myr est défendue par de grandes murailles et d'imposantes tours en pierre, qui sont depuis longtemps un sentiment de fierté pour les habitants."
 building_agot_myr_walls_01:0 "Les murs cannelés"
 building_agot_myr_walls_01_desc:0 "Les murs de Myr sont bien connus pour ses six grandes tours, qui s'élèvent au-dessus de la cité, et pour les grandes cannelures qui apparaissent à travers les murs, ce qui rend plus difficile pour tout attaquant de saccager la cité scolastique."
 building_type_agot_taelas_gap_01:0 "Taelas"
 building_type_agot_taelas_gap_01_desc:0 "Principal axe de communication entre Myr et la Rhoyne, le Gouffre de Taelas fait office de frontière orientale pour les Myriens depuis des temps immémoriaux. Malgré son importance stratégique considérable, ceux qui le gouvernent sont éloignés des richesses et de l'influence de la cité, et donc privés des privilèges dont jouissent ceux qui profitent de la proximité avec le Conclave."
 building_agot_taelas_gap_01:0 "Le Gouffre de Taelas"
 building_agot_taelas_gap_01_desc:0 "$building_type_agot_taelas_gap_01_desc$"
 building_type_agot_naeros_irrigation_01:0 "Naeros"
 building_type_agot_naeros_irrigation_01_desc:0 "Le long des cours d'eau au nord de Myr abondent fermes et champs fertiles, lesquels sont enrichis et rendus plus productifs grâce à une judicieuse utilisation de l'irrigation."
 building_agot_naeros_irrigation_01:0 "L'Irrigation de Naeros"
 building_agot_naeros_irrigation_01_desc:0 "$building_type_agot_naeros_irrigation_01_desc$"
 building_type_agot_pentos_01:0 "Palais du Prince"
 building_type_agot_pentos_01_desc:0 "Le prince de Pentos est considéré comme le conduit divin de la cité : il est celui choisi par les dieux, celui qui déflore la Vierge des mers et la Vierge des champs, et celui qui est sacrifié pour apaiser les dieux. À cet égard, le palais n’est pas seulement un siège du gouvernement mais aussi un temple."
 building_agot_pentos_01:0 "$building_type_agot_pentos_01$"
 building_agot_pentos_01_desc:0 "$building_type_agot_pentos_01_desc$"
 building_type_agot_pentos_walls_01:0 "Murs de la cité de Pentos"
 building_type_agot_pentos_walls_01_desc:0 "La cité libre de Pentos est défendue par de grandes murailles et d'imposantes tours en pierre, qui sont depuis longtemps un sentiment de fierté pour les habitants."
 building_agot_pentos_walls_01:0 "Les murs du magistrat"
 building_agot_pentos_walls_01_desc:0 "Les murs de Pentos sont hauts et peuvent être vus à des centaines de kilomètres à travers les Basses Landes. Les murs bleus et gris sont un phare pour les commerçants de l’Est comme de l’Ouest."
 building_type_agot_red_temple_pentos_01:0 "Temple de la Lumière Pentoshi"
 building_type_agot_red_temple_pentos_01_desc:0 "Le temple du Maître de la Lumière est un pouvoir croissant à Pentos : si jadis le contrôle du Prince sur les questions spirituelles était incontesté, désormais le Dieu Rouge exige également l'obéissance."
 building_agot_red_temple_pentos_01:0 "Temple de la Lumière Dorée"
 building_agot_red_temple_pentos_01_desc:0 "$building_type_agot_red_temple_pentos_01_desc$"
 building_type_agot_magister_harbor_01:0 "Port du Magistrat"
 building_type_agot_magister_harbor_01_desc:0 "Le plus petit des deux ports de Pentos, le port du Magistrat abrite les navires des magistrats les plus riches de la ville, qui peuvent ainsi commercer des épices, des soieries et du fromage à travers le Détroit, la Mer d'Été et la Mer de Jade."
 building_agot_magister_harbor_01:0 "$building_type_agot_magister_harbor_01$"
 building_agot_magister_harbor_01_desc:0 "$building_type_agot_magister_harbor_01_desc$"
 building_type_agot_pentos_harbor_01:0 "Grand quai"
 building_type_agot_pentos_harbor_01_desc:0 "Le grand quai de Pentos est le plus grand port de la cité et abrite des navires du monde entier. Tous ceux qui accostent sont inspectés et taxés par les fonctionnaires, garantissant ainsi que les magistrats et la noblesse de la cité restent riches."
 building_agot_pentos_harbor_01:0 "$building_type_agot_pentos_harbor_01$"
 building_agot_pentos_harbor_01_desc:0 "$building_type_agot_pentos_harbor_01_desc$"
 building_type_agot_khals_manse_01:0 "La Manse du Khal"
 building_type_agot_khals_manse_01_desc:0 "Comme bien d'autres de ses sœurs, Pentos n'échappe pas aux « visites » des khalasars, et Dothraki oblige, un tribut est traditionnellement offert pour se prémunir des conséquences habituelles du passage des hordes. Mais l'hospitalité ici étant plus fervente, une demeure au sein même de la cité est également accordée aux khals."
 building_agot_khals_manse_01:0 "$building_type_agot_khals_manse_01$"
 building_agot_khals_manse_01_desc:0 "$building_type_agot_khals_manse_01_desc$"
 building_type_agot_valdrizes_01:0 "Collines du Sphinx"
 building_type_agot_valdrizes_01_desc:0 "Le long de l'ancienne route des dragons ayant jadis appartenu aux Possessions de Valyria, on peut rencontrer la grande statue d'un gardien vigilant : un sphinx valyrien."
 building_agot_valdrizes_01:0 "La Reine Dragon"
 building_agot_valdrizes_01_desc:0 "Cette ancienne statue, surnommée la Reine Dragon, se dresse sur sa colline et surplombe la route valyrienne. Ce sphinx valyrien était autrefois associé à son compagnon, mais les Dothraki ont depuis bien longtemps dérobés le roi."
 building_type_agot_nontelos_bazaar_01:0 "Nontelos"
 building_type_agot_nontelos_bazaar_01_desc:0 "L'une des cités majeures d'Essos, Nontelos fut autrefois conquise par les Cités Libres durant le Siècle de Sang. Elle est aujourd'hui sous la gouvernance de Pentos."
 building_agot_nontelos_bazaar_01:0 "Bazar de Nontelos"
 building_agot_nontelos_bazaar_01_desc:0 "Le Bazar de Nontelos est réputé dans tout l'Essos occidental comme un point de connexion crucial entre Pentos et Myr où l'on peut y trouver tapis, verres et fromages en abondance."
 building_type_agot_ar_kon_barracks_01:0 "Ar Kon"
 building_type_agot_ar_kon_barracks_01_desc:0 "Ar Kon, l'un des principaux centres des Nonteloshi, est perché au sommet de la Crête Konian et réputé pour ses archers."
 building_agot_ar_kon_barracks_01:0 "Les Casernes Ar"
 building_agot_ar_kon_barracks_01_desc:0 "Si les archers d'Ar Kon sont déjà grandement réputés à travers les cités libres, ceux qui demeurent encore dans leur région natale sont d'autant plus redoutables."
 building_type_agot_hugor_hill_01:0 "La Colline d'Hugor"
 building_type_agot_hugor_hill_01_desc:0 "C'est ici que les Sept qui ne font qu'Un se sont révélés à leur peuple élu et que Hugor fut choisi comme roi, oint des dons des Sept et couronné d'étoiles."
 building_agot_hugor_hill_01:0 "La Colline sous les Étoiles"
 building_agot_hugor_hill_01_desc:0 "$building_type_agot_hugor_hill_01_desc$"
 building_type_agot_godworf_01:0 "Dieulieu"
 building_type_agot_godworf_01_desc:0 "Ancien port situé dans la partie septentrionale du Détroit, Dieulieu fut le principal point d'embarquement des Andals lors de leur invasion de Westeros. Aujourd'hui encore, il constitue un port de refuge pour tous ceux qui naviguent en haute mer."
 building_agot_godworf_01:0 "Port des dieux"
 building_agot_godworf_01_desc:0 "$building_type_agot_godworf_01_desc$"
 building_type_agot_warriors_ledge_01:0 "Fenn Cepan"
 building_type_agot_warriors_ledge_01_desc:0 "Dans les collines occidentales d'Andalos, seigneurs de guerre et rois andals se rencontraient au champ d'honneur, répandant le sang le long d'une crête, laquelle fut consacrée au Guerrier, aspect bellique des Sept."
 building_agot_warriors_ledge_01:0 "La Crête du Guerrier"
 building_agot_warriors_ledge_01_desc:0 "$building_type_agot_warriors_ledge_01_desc$"
 building_type_agot_strangers_heights_01:0 "Hyrcgaes"
 building_type_agot_strangers_heights_01_desc:0 "Au cœur des collines d'Andalos s'élève une pointe que les Andals d'antan nommaient le Doigt de l'Étranger. D'aucuns racontent que la mort imprègne chaque parcelle de ces hauteurs."
 building_agot_strangers_heights_01:0 "Pointe de l'Étranger"
 building_agot_strangers_heights_01_desc:0 "$building_type_agot_strangers_heights_01_desc$"
 building_type_agot_crones_steps_01:0 "Crontun"
 building_type_agot_crones_steps_01_desc:0 "Il est dit que dans les lointaines collines d'Andalos se trouverait un lieu empreint de sagesse, et que l'on nomme les Marches de l'Aïeule."
 building_agot_crones_steps_01:0 "Marches de l'Aïeule"
 building_agot_crones_steps_01_desc:0 "$building_type_agot_crones_steps_01_desc$"
 building_type_agot_maidens_vale_01:0 "Rhotorr"
 building_type_agot_maidens_vale_01_desc:0 "À la lisière orientale d'Andalos se trouve une vallée vierge de toute impureté que les Andals considéraient comme sacrée aux yeux de la Jouvencelle."
 building_agot_maidens_vale_01:0 "La Vallée de la Jouvencelle"
 building_agot_maidens_vale_01_desc:0 "$building_type_agot_maidens_vale_01_desc$"
 building_type_agot_sealords_palace_01:0 "Palais du Seigneur de la Mer"
 building_type_agot_sealords_palace_01_desc:0 "Le Palais du Seigneur de la Mer est l'un des grands sites de la cité secrète. Avec le Bassin de la Lune, ses grandes colonnes et sa célèbre ménagerie, il égale n'importe quel palais des anciennes Possessions de Valyria et les châteaux de Westeros par sa grandeur."
 building_agot_sealords_palace_01:0 "$building_type_agot_sealords_palace_01$"
 building_agot_sealords_palace_01_desc:0 "$building_type_agot_sealords_palace_01_desc$"
 building_type_agot_iron_bank_01:0 "Banque de Fer de Braavos"
 building_type_agot_iron_bank_01_desc:0 "Étant à l'origine une mine de fer, la Banque de Fer est devenue l'une des entités les plus redoutables et redoutées du monde connu. Elle n’a besoin ni d'épaisses murailles, ni de marines de ravitaillement, ni même de vastes armées, car c'est le pouvoir de la monnaie qui protège les lieux. Car rois, seigneurs et conquérants potentiels sont liés à la fortune du commerce."
 building_agot_iron_bank_01:0 "$building_type_agot_iron_bank_01$"
 building_agot_iron_bank_01_desc:0 "$building_type_agot_iron_bank_01_desc$"
 building_type_agot_isle_of_the_gods_01:0 "L’Île des Dieux"
 building_type_agot_isle_of_the_gods_01_desc:0 "Toutes les divinités et croyances ont leur place à Braavos, et les dieux qui n'ont ni grands temples ni fidèles constants trouvent leur demeure sur l'Île des Dieux, où voyageurs et marins occasionnels peuvent prier à leur aise."
 building_agot_isle_of_the_gods_01:0 "$building_type_agot_isle_of_the_gods_01$"
 building_agot_isle_of_the_gods_01_desc:0 "$building_type_agot_isle_of_the_gods_01_desc$"
 building_type_agot_arsenal_01:0 "Arsenal de Braavos"
 building_type_agot_arsenal_01_desc:0 "Le grand Arsenal de Braavos est la fondation sur laquelle sont construits les nombreux murs en bois de la cité. Capables de produire un navire complet à partir de rien en une seule journée, les grandes flottes de Braavos se reconstituent rapidement, et ce même après des défaites écrasantes."
 building_agot_arsenal_01:0 "$building_type_agot_arsenal_01$"
 building_agot_arsenal_01_desc:0 "$building_type_agot_arsenal_01_desc$"
 building_type_agot_titan_01:0 "Titan de Braavos"
 building_type_agot_titan_01_desc:0 "Le Titan de Braavos est à la fois le phare et la porte de la cité secrète. De ses yeux proviennent les lumières qui guident les navires à travers le brouillard et les îles qui protègent Braavos, et de ses murs de cuivre, il peut repousser tout assaillant potentiel."
 building_agot_titan_01:0 "$building_type_agot_titan_01$"
 building_agot_titan_01_desc:0 "$building_type_agot_titan_01_desc$"
 building_type_agot_palace_of_truth_01:0 "Palais de la Vérité"
 building_type_agot_palace_of_truth_01_desc:0 "Le Palais de la Vérité est le lieu où les garde-clés et autres magistrats de la cité de Braavos élisent le nouveau Seigneur de la Mer."
 building_agot_palace_of_truth_01:0 "Palais de la Vérité"
 building_agot_palace_of_truth_01_desc:0 "Le Palais de la Vérité est le lieu où les garde-clés et autres magistrats de la cité de Braavos élisent le nouveau Seigneur de la Mer."
 building_type_agot_drowned_town_01:0 "La Ville Noyée"
 building_type_agot_drowned_town_01_desc:0 "La Ville Noyée est la partie la plus ancienne de Braavos. Engloutie par la lagune, seule la toiture de ses bâtiments reste non immergée, et elle sert de refuge pour les plus pauvres qui n'ont d'autre choix que de vivre ici, ou les moins honnêtes qui souhaitent se cacher des autorités de la cité."
 building_agot_drowned_town_01:0 "La Ville Noyée"
 building_agot_drowned_town_01_desc:0 "La Ville Noyée est la partie la plus ancienne de Braavos. Engloutie par la lagune, seule la toiture de ses bâtiments reste non immergée, et elle sert de refuge pour les plus pauvres qui n'ont d'autre choix que de vivre ici, ou les moins honnêtes qui souhaitent se cacher des autorités de la cité."
 building_type_agot_sweetwater_font_01:0 "Fontaine Douce"
 building_type_agot_sweetwater_font_01_desc:0 "La rivière d'eau douce, le principal aqueduc qui apporte l'eau potable, prend sa source dans les collines brumeuses au sud de la cité. Son rôle primordial en fait un important bastion qui permet à la Cité Secrète de prospérer."
 building_agot_sweetwater_font_01:0 "Fontaine Douce"
 building_agot_sweetwater_font_01_desc:0 "La rivière d'eau douce, le principal aqueduc qui apporte l'eau potable, prend sa source dans les collines brumeuses au sud de la cité. Son rôle primordial en fait un important bastion qui permet à la Cité Secrète de prospérer."
 building_type_agot_mothermont_01:0 "Mèremont"
 building_type_agot_mothermont_01_desc:0 "Haut sommet de la partie septentrionale des collines d'Andalos, Mèremont est considéré comme sacré par de nombreuses personnes originaires d'Essos."
 building_agot_mothermont_01:0 "$building_type_agot_mothermont_01$"
 building_agot_mothermont_01_desc:0 "$building_type_agot_mothermont_01_desc$"
 building_type_agot_nevios_retreat_01:0 "Sébillune"
 building_type_agot_nevios_retreat_01_desc:0 "Découvertes par Nevio Paralios, les contrées fertiles entourant Sébillune, et connues sous le nom de Noporzhyr, contribuent grandement à apporter sustentation à Braavos, et cela devient bien avant le Dévoilement de la Cité Secrète."
 building_agot_nevios_retreat_01:0 "Retraite de Nevio"
 building_agot_nevios_retreat_01_desc:0 "$building_type_agot_nevios_retreat_01_desc$"
 building_type_agot_moonbowl_01:0 "Sébillune"
 building_type_agot_moonbowl_01_desc:0 "Sébillune est une région fertile des collines septentrionales d'Andalos, longtemps réputée pour ses terres agricoles, elle possède les moyens de sustenter une ville ou une armée."
 building_agot_moonbowl_01:0 "Sébillune"
 building_agot_moonbowl_01_desc:0 "$building_type_agot_moonbowl_01_desc$"
 building_type_agot_azure_palace_01:0 "Palais impérial de la Dynastie d'Azur"
 building_type_agot_azure_palace_01_desc:0 "Le Palais Impérial de la Dynastie d'Azur, construit par les Empereurs d'Azur pour afficher leur prestige et leur mécénat des arts."
 building_agot_azure_palace_01:0 "Palais des Pierres Célestes"
 building_agot_azure_palace_01_desc:0 "Construit par le premier Empereur d'Azur, le palais des Pierres Célestes est un magnifique palais abritant de nombreuses œuvres d'art représentant les cieux et tous ce qui s'y trouvent."
 building_agot_azure_palace_02:0 "Palais des Étoiles Éternelles"
 building_agot_azure_palace_02_desc:0 "Le palais impérial du douzième Empereur d'Azur, bien plus grand que l'ancien palais des Pierres Célestes."
 building_type_agot_grey_palace_01:0 "Palais impérial de la Dynastie Grise"
 building_type_agot_grey_palace_01_desc:0 "Le palais impérial des Empereurs Gris, dont la construction débuta sous le règne de Har Loi et fut achevée par ses successeurs."
 building_agot_grey_palace_01:0 "Palais de l'épée suspendue"
 building_agot_grey_palace_01_desc:0 "Bâtit par le troisième empereur Gris, le palais de l'épée suspendue est plus proche d'une forteresse que d'un véritable palais."
 building_agot_grey_palace_02:0 "Palais de la Justice Obscure"
 building_agot_grey_palace_02_desc:0 "Le palais de la Justice Obscure a été construit par le dernier des Empereurs Gris et sert désormais de résidence au ministre impériale de la justice, ainsi que de pénultième voix en matière de droit au sein de l'empire."
 building_type_agot_indigo_palace_01:0 "Palais impérial de la Dynastie Indigo"
 building_type_agot_indigo_palace_01_desc:0 "Le Palais Impérial des Empereurs Indigo"
 building_agot_indigo_palace_01:0 "Palais des Roses Noires"
 building_agot_indigo_palace_01_desc:0 "Le palais impérial des empereurs Indigo, achevé par l'empereur Choq Choq pour abriter sa centaine d'épouses."
 building_type_agot_pearl_white_palace_01:0 "Palais impérial de la Dynastie Blanc perle"
 building_type_agot_pearl_white_palace_01_desc:0 "Le Palais Impérial des Empereurs Blanc Perle, dont les dirigeants les plus célèbres étaient les Neuf Eunuques, qui ont donné 130 ans de paix à l'Empire d'Or. C'est sous les Empereurs Blanc Perle que furent créées les grandes routes de pierre, les plus grandes au monde, à l'exception des routes des dragons de Valyria."
 building_agot_pearl_white_palace_01:0 "Palais du Serpent Enroulé"
 building_agot_pearl_white_palace_01_desc:0 "Construit par le sixième empereur Blanc perle et le premier des neufs eunuques, le palais du Serpent Enroulé se trouve près du centre de Yin et est au cœur du grand réseau routier que les Neuf allaient étendre à travers l'Empire Doré."
 building_type_agot_purple_palace_01:0 "Palais impérial de la Dynastie Pourpre"
 building_type_agot_purple_palace_01_desc:0 "Le palais impérial des empereurs Pourpres est l'un des palais impériaux situé le plus au nord de l'empire."
 building_agot_purple_palace_01:0 "Palais de la Faux Pâle"
 building_agot_purple_palace_01_desc:0 "Construit par le premier empereur Indigo, le palais de la Faux Pâle servait de point d'appui solide pour protéger les parties nord de l'Empire."
 building_agot_purple_palace_02:0 "Palais du Dragon Carmin"
 building_agot_purple_palace_02_desc:0 "Le palais du Dragon Carmin a été construit pour être plus grand et plus imposant encore que celui qui l'a précédé."
 building_agot_purple_palace_03:0 "Palais des Vents d'Améthyste"
 building_agot_purple_palace_03_desc:0 "Le palais des Vents d'Améthyste a été construit par le dernier des Empereurs Pourpres, décédé avant d'avoir eu le moindre héritier."
 building_type_agot_maroon_palace_01:0 "Palais impérial de la Dynastie Marron"
 building_type_agot_maroon_palace_01_desc:0 "Les Empereurs Marrons ont construit leur palais dans la ville orientale de Jinqi afin d'être plus apte à se protéger contre les pillards venus des Contrées de l'Ombre."
 building_agot_maroon_palace_01:0 "Palais des Vents Brûlés"
 building_agot_maroon_palace_01_desc:0 "Le palais des Vents Brûlés a longtemps protégé la cité de Jinqi des terreurs venus des Contrées de l'Ombre."
 building_type_agot_scarlet_palace_01:0 "Palais impérial de la Dynastie Écarlate"
 building_type_agot_scarlet_palace_01_desc:0 "Les Empereurs Écarlates ont construit leur palais dans la ville forestière de Si Qo. Lorsque la ville fut perdu dans les méandres de la jungle, il en fut de même pour ce palais."
 building_agot_scarlet_palace_01:0 "Palais des Arbres Lumineux"
 building_agot_scarlet_palace_01_desc:0 "Construit par les Empereurs Écarlates avec la cité de Si Qo, le palais des Arbres Lumineux fut la demeure au cœur de l'empire tout au long du règne des quarante trois empereurs."
 building_type_agot_five_forts_01:0 "Murs de l'empereur de Perle"
 building_type_agot_five_forts_01_desc:0 "Les Cinq Forts furent construits par l'Empereur de Perle pour protéger les royaumes humains des démons du Lion de la Nuit. Les murs de la forêt mesurent mille pieds de haut, ce qui en fait un mur plus grand encore que celui de Westeros."
 building_agot_five_forts_01:0 "$building_type_agot_five_forts_01$"
 building_agot_five_forts_01_desc:0 "$building_type_agot_five_forts_01_desc$"
 building_type_pirate_den_01:0 "Port pirate"
 building_type_pirate_den_01_desc:0 "Les ports pirates peuvent être trouvés partout à travers le monde, que ce soit en haute mer, le long des fleuves et même dissimulés sur les côtes. Dès lors que la loi et l'ordre sont absents, des seigneurs pirates et autres mercenaires s'installeront et troubleront tous les passants."
 building_pirate_den_01:0 "Repaire de hors-la-loi"
 building_pirate_den_01_desc:0 "Ce petit port fait office de repaire pour les hors-la-loi, où les gens trouvent du travail sur les rares navires qui y font escale."
 building_pirate_den_02:0 "Port notoire"
 building_pirate_den_02_desc:0 "Ce port est devenu tristement célèbre depuis qu'il est le point d'escale de certains des pirates et mercenaires les plus célèbres des mers."
 building_pirate_den_03:0 "Forteresse d'effroi"
 building_pirate_den_03_desc:0 "C'est dans ce grand port qu'on trouve les pirates les plus infâmes et les plus redoutés des mers ; une véritable forteresse du crime et de la vilénie."
 building_type_agot_pirate_control_01:0 "Taverne"
 building_type_agot_pirate_control_01_desc:0 "Tout bon pirate digne de ce nom se doit de posséder un navire et du rhum, ou au moins un quelconque alcool. C'est la clé pour garder un équipage satisfait et ordonné, car lorsque les réserves sont à sec, la mutinerie guette."
 building_agot_pirate_control_01:0 "Point d'eau local"
 building_agot_pirate_control_01_desc:0 "Le point d'eau local trouve son utilité lorsqu'un navire ou deux sont au port, atténuant la discorde de l'équipage."
 building_agot_pirate_control_02:0 "Tables de jeux"
 building_agot_pirate_control_02_desc:0 "Les jeux d'argent sont un bon moyen de passer le temps, et avec des tables flambants neuves, l'équipage a de quoi s'occuper."
 building_agot_pirate_control_03:0 "Maison de grog"
 building_agot_pirate_control_03_desc:0 "Une maison de grog est presque de première nécessité pour tout bon port pirate. Elle permet d'étancher la soif et de rincer les gossiers."
 building_agot_pirate_control_04:0 "Réserve de vins pillés"
 building_agot_pirate_control_04_desc:0 "Parmi les produits les plus populaires dans le commerce à travers le monde on trouve le vin et les spiritueux, et c’est toujours avec grand plaisir qu'un équipage ramène quelques barils supplémentaires de son dernier pillage."
 building_agot_pirate_control_05:0 "Salon des pillards"
 building_agot_pirate_control_05_desc:0 "Ce salon est réputé pour servir pillards et pirates, et uniquement pillards et pirates. Les marins honnêtes ne sont pas les bienvenus ici."
 building_agot_pirate_control_06:0 "Clientèle infâme"
 building_agot_pirate_control_06_desc:0 "Les cœurs fragiles et les bourses légères n'ont pas leur place au sein de cet établissement. Ici se terre la clientèle la plus notoirement infâme qui soit."
 building_type_agot_pirate_economic_01:0 "Marché noir"
 building_type_agot_pirate_economic_01_desc:0 "La clé du commerce dans la piraterie est bien entendu le marché noir. Après un pillage, le pirate devra vendre le fruit de son labeur contre une monnaie sonnante et trébuchante, car la richesse des navires se traduit plus souvent sous la forme de simples marchandises que d'un trésor de pièces étincelantes."
 building_agot_pirate_economic_01:0 "Recéleur local"
 building_agot_pirate_economic_01_desc:0 "Un recéleur local est la personne de confiance chargé de vendre la dernière prise des pirates, tout en prélevant une petite quantité pour elle-même, bien entendu."
 building_agot_pirate_economic_02:0 "Colporteurs douteux"
 building_agot_pirate_economic_02_desc:0 "Même dans le meilleur des cas, on ne fait pas confiance aux colporteurs, et ce n'est même pas le meilleur des cas, mais au vu de la taille et de la quantité de marchandises que vous possédez, vous ne pouvez pas faire la fine bouche."
 building_agot_pirate_economic_03:0 "Marché de contrebande"
 building_agot_pirate_economic_03_desc:0 "Pourquoi se contenter d'un marchand quand on peut mettre en place tout un marché ?"
 building_agot_pirate_economic_04:0 "Contrats de corsaire"
 building_agot_pirate_economic_04_desc:0 "Même les justes et les ordonnés veulent que de mauvaises choses soient accomplies ; un navire d'un concurrent qui coule, un rival qui finit derrière des barreaux, une puissance étrangère harcelée. Voilà à quoi servent les contrats de corsaire."
 building_agot_pirate_economic_05:0 "Collecteurs de tributs"
 building_agot_pirate_economic_05_desc:0 "Tous ceux qui souhaitent utiliser votre marché doivent payer un tribut dès maintenant, et vos collecteurs s'assureront que vous obteniez votre dû."
 building_agot_pirate_economic_06:0 "Compagnies écrans"
 building_agot_pirate_economic_06_desc:0 "Lorsque votre puissance économique est si grande que même les honnêtes gens souhaitent travailler avec vous, vous avez besoin de compagnies écrans pour servir de couverture et arborer des visages de confiances pour vos affaires."
 building_type_agot_pirate_supply_01:0 "Crique des contrebandiers"
 building_type_agot_pirate_supply_01_desc:0 "Il est rare que des navires de mauvaise réputation puissent accéder aux ports pour récupérer des biens de première nécessité, d'où l'utilité des contrebandiers."
 building_agot_pirate_supply_01:0 "Cachette"
 building_agot_pirate_supply_01_desc:0 "Une cachette est toujours pratique pour un contrebandier, car on ne sait jamais quand il lui sera nécessaire de faire profil bas."
 building_agot_pirate_supply_02:0 "Jetées discrètes"
 building_agot_pirate_supply_02_desc:0 "Certaines jetées sont plus accommodantes que d'autres envers ceux qui ne sont pas en règle."
 building_agot_pirate_supply_03:0 "Rames étouffées"
 building_agot_pirate_supply_03_desc:0 "Débarquer la nuit nécessite un bon œil, une connaissance des étoiles, un cœur vaillant et surtout des rames étouffées."
 building_agot_pirate_supply_04:0 "Refuge isolé"
 building_agot_pirate_supply_04_desc:0 "Les contrebandiers ont toujours besoin d'un refuge sûr, à l'écart de tout, car les tempêtes, au sens figuré tout autant que littéral, ne sont jamais bien loin."
 building_agot_pirate_supply_05:0 "Rivages dragués"
 building_agot_pirate_supply_05_desc:0 "Que peut faire un contrebandier entreprenant quand tous les ports lui sont fermés ? Construire son propre port ! Et la première étape consiste à draguer un rivage."
 building_agot_pirate_supply_06:0 "Port illicite"
 building_agot_pirate_supply_06_desc:0 "Pourquoi soudoyer les fonctionnaires du port, se faufiler la nuit ou contourner les gardes quand on possède son propre port illicite pour faire entrer et sortir des marchandises illégales dans la région ?"
 building_type_agot_pirate_troop_01:0 "Armurerie"
 building_type_agot_pirate_troop_01_desc:0 "Capturer un navire en mer n'est pas chose aisée. Outre le fait de le rattraper, il faudra également l'aborder et défaire son équipage, et une bonne armurerie permettra d'obtenir des victoires rapides."
 building_agot_pirate_troop_01:0 "Cache d'armes"
 building_agot_pirate_troop_01_desc:0 "Tous les pirates ont leur propre réserve d'armes, du plus petit commis au capitaine lui-même, chacun doit toujours avoir de quoi se battre à portée de main."
 building_agot_pirate_troop_02:0 "Dépôt de butins"
 building_agot_pirate_troop_02_desc:0 "Parmi les prises les plus utiles lors de l'abordage d'un navire, on compte les armes de l'équipage vaincu, qui peuvent ainsi être réutilisé par votre propre équipage."
 building_agot_pirate_troop_03:0 "Réserves d'entrepôt"
 building_agot_pirate_troop_03_desc:0 "Garder un bon stock d’armes est toujours une bonne idée."
 building_agot_pirate_troop_04:0 "Armurerie flottante"
 building_agot_pirate_troop_04_desc:0 "Quel est le meilleur endroit pour conserver des armes ? Sur la mer, bien entendu. De cette façon aucun voleur ne pourra voler ce que vous avez légitimement volé."
 building_agot_pirate_troop_05:0 "Armes exotiques"
 building_agot_pirate_troop_05_desc:0 "Les mers regorgent de tant de diversités qu'on ne peut jamais savoir quelle sera la prochaine prise ; une hache norvoshi, un arc fait d'orcœur, ou bien une lance lengii ?"
 building_agot_pirate_troop_06:0 "Arsenal de la flotte"
 building_agot_pirate_troop_06_desc:0 "Un seigneur pirate digne de ce nom équipe non seulement son équipage personnel, mais également le reste de sa flotte de manière à pouvoir étendre l'influence de sa terreur."
 building_type_agot_pirate_military_01:0 "Quais des pirates"
 building_type_agot_pirate_military_01_desc:0 "La puissance d'un pirate est dépendante de son navire, la redoutabilité des navires est dépendante de leurs nombres et de leur qualité, et le nombre et la qualité des navires est dépendante des quais qui les abritent."
 building_agot_pirate_military_01:0 "Amarrage rudimentaire"
 building_agot_pirate_military_01_desc:0 "La maintenance est primordiale pour un navire, et ce même si elle effectué dans un endroit des plus archaïques."
 building_agot_pirate_military_02:0 "Mouillage improvisé"
 building_agot_pirate_military_02_desc:0 "Un pirate doit savoir faire avec ce qu'il a sous la main, et même si le mouillage improvisé reste des plus basiques, cela permet d'apporter quelques menus réparations à son navire, plus qu'en haute mer en tout cas."
 building_agot_pirate_military_03:0 "Quai délabré"
 building_agot_pirate_military_03_desc:0 "Peu à peu, l'édifice s'agrandit et évolue, au point que ça commence presque à ressembler à un véritable quai... presque."
 building_agot_pirate_military_04:0 "Déserteurs navals"
 building_agot_pirate_military_04_desc:0 "De la main d'œuvre venu des quatre coins du monde, depuis Braavos jusqu'à Leng, et dont les compétences seront mises à profit."
 building_agot_pirate_military_05:0 "Caserne des marins"
 building_agot_pirate_military_05_desc:0 "Le besoin des marins de se loger s'accroit et la construction d'une caserne permet d'apporter un certain confort. Confort tout à fait relatif, mais confort quand même."
 building_agot_pirate_military_06:0 "Chantiers navals corsaires"
 building_agot_pirate_military_06_desc:0 "Désormais pourvu de chantiers navals, on peut enfin considérer ça comme un véritable port, entièrement dédié à la piraterie."
 building_type_agot_pirate_fortification_01:0 "Guets"
 building_type_agot_pirate_fortification_01_desc:0 "Contrairement aux châteaux de Westeros, ou même aux cités d'Essos, les pirates et les corsaires ne fortifient pas lourdement leurs terres, leur puissance leur venant avant tout de la mer."
 building_agot_pirate_fortification_01:0 "Patrouilles ivres"
 building_agot_pirate_fortification_01_desc:0 "Difficile de trouver des gens fiables de nos jours, comme en témoignent ces gardes à la démarche douteuse et qui prétendent que leurs bouteilles ne servent qu'à se réchauffer."
 building_agot_pirate_fortification_02:0 "Guetteurs vigilants"
 building_agot_pirate_fortification_02_desc:0 "Les guetteurs vigilants sont exactement ce que leur nom laisse supposer. Ils scrutent l'horizon à l'affût de la moindre menace... ou d'une éventuelle cible."
 building_agot_pirate_fortification_03:0 "Nids-de-pie"
 building_agot_pirate_fortification_03_desc:0 "Pour aider les guetteurs lors de leur tour de garde, des nids-de-pie ont été aménagés, offrant des points d'observation élevés."
 building_agot_pirate_fortification_04:0 "Drapeaux de signalisation"
 building_agot_pirate_fortification_04_desc:0 "L'utilisation de drapeaux de signalisation permet de créer un système de communication simple et rapide entre les différents guets, navires et avant-postes."
 building_agot_pirate_fortification_05:0 "Yeux de Myr"
 building_agot_pirate_fortification_05_desc:0 "L'utilisation des yeux de Myr permet aux guetteurs de voir à très longue distance, et ce qui n'était avant qu'une simple tâche sur l'horizon devient une menace à laquelle il faut se préparer."
 building_agot_pirate_fortification_06:0 "Épaves pourries"
 building_agot_pirate_fortification_06_desc:0 "Pour parfaire la protection des lieux, des épaves ont été disposés tout autour afin d'offrir une protection contre toute menace entrante."
 agot_pirate_ship_main_01_domicile_building:0 "Navire de fortune"
 agot_pirate_ship_main_01_domicile_building_desc:0 "Quel qu’était l'ancien usage de cette galère, elle a été reconvertie de sorte à pouvoir quérir la fortune là où elle se trouve — et c’est bien souvent auprès des autres navires qu’on peut la trouver."
 agot_pirate_ship_main_02_domicile_building:0 "Galère pirate"
 agot_pirate_ship_main_02_domicile_building_desc:0 "Une proue renforcée, des rames ajoutées, des ponts flambants neufs, si le capitaine d’un tel navire doit encore y réfléchir à deux fois avant de s’attaquer à des proies de bonne taille, les navires marchands ne seront, eux, guère plus que du menu fretin."
 agot_pirate_ship_main_03_domicile_building:0 "Galère de guerre"
 agot_pirate_ship_main_03_domicile_building_desc:0 "Désormais pleinement adapté à l’usage de la guerre, ce navire fera la fierté de son capitaine et l’effroi des honnêtes marins."
 agot_pirate_ship_main_04_domicile_building:0 "Dromon"
 agot_pirate_ship_main_04_domicile_building_desc:0 "Plus rapide, plus imposant et plus dangereux qu’une galère, le dromon est incontestablement le navire prisé des pirates — de ceux ayant plus d’ambition que de s’attaquer à quelques barques bien nanties du moins."
 agot_pirate_ship_main_05_domicile_building:0 "Dromon fortifié"
 agot_pirate_ship_main_05_domicile_building_desc:0 "Véritable forteresse marine, ce navire, pouvant compter jusqu’à quatre cents rames, est suffisamment imposant pour dissuader même les escadres les plus téméraires de s’y casser la proue."
 agot_pirate_ship_main_06_domicile_building:0 "Fléau des Mers"
 agot_pirate_ship_main_06_domicile_building_desc:0 "Aucune mer, fut-ce t’elle Grelotte, de Jade ou d’Été n'a jamais connu pareille menace. Plus dangereux que les léviathans, plus terrible que les krakens, plus impitoyable que les dragons des mers, ce navire a tant été modifié qu’il n'entre plus dans aucune classification connue."
 agot_captains_quarters_01_domicile_building:0 "Quartiers du capitaine"
 agot_captains_quarters_01_domicile_building_desc:0 "De même qu’un seigneur ne dort pas avec ses courtisans, un capitaine se doit d’avoir des appartements distincts du reste de l’équipage — ne serait-ce que pour se préserver de certaines odeurs."
 agot_captains_quarters_02_domicile_building:0 "Quartiers confortables"
 agot_captains_quarters_02_domicile_building_desc:0 "Une couche confortable, un mobilier propre, ces quartiers plus que décents tutoient l’idée du confort."
 agot_captains_quarters_03_domicile_building:0 "Quartiers prestigieux"
 agot_captains_quarters_03_domicile_building_desc:0 "Si la notion de prestige est toute relative chez les pirates, reste que ces appartements reflètent assurément l’image d'un capitaine digne de ce nom."
 agot_captains_quarters_state_rooms_04_domicile_building:0 "Chambre d’apparat"
 agot_captains_quarters_state_rooms_04_domicile_building_desc:0 "L’étiquette n'est certes pas l'arme traditionnelle des pirates, mais impressionner ses alliés comme ses rivaux peut se révéler fort utile, et quoi de mieux pour cela qu’une chambre d’apparat où figureront trophées ostentatoires et fioritures pompeuses ?"
 agot_captains_quarters_state_rooms_05_domicile_building:0 "Prestigieuse chambre d'apparat"
 agot_captains_quarters_state_rooms_05_domicile_building_desc:0 "$agot_captains_quarters_state_rooms_04_domicile_building_desc$"
 agot_captains_quarters_state_rooms_06_domicile_building:0 "Luxueuse chambre d'apparat"
 agot_captains_quarters_state_rooms_06_domicile_building_desc:0 "$agot_captains_quarters_state_rooms_04_domicile_building_desc$"
 agot_captains_quarters_private_cabins_04_domicile_building:0 "Cabines privées"
 agot_captains_quarters_private_cabins_04_domicile_building_desc:0 "En parallèle des quartiers dédiés au capitaine, des chambres privées pour les officiers sont un bon moyen de les démarquer — et de les récompenser — du reste de l'équipage."
 agot_captains_quarters_private_cabins_05_domicile_building:0 "Cabines confortables"
 agot_captains_quarters_private_cabins_05_domicile_building_desc:0 "$agot_captains_quarters_private_cabins_04_domicile_building_desc$"
 agot_captains_quarters_private_cabins_06_domicile_building:0 "Cabines prestigieuses"
 agot_captains_quarters_private_cabins_06_domicile_building_desc:0 "$agot_captains_quarters_private_cabins_04_domicile_building_desc$"
 agot_captains_quarters_wardroom_04_domicile_building:0 "Carré des officiers"
 agot_captains_quarters_wardroom_04_domicile_building_desc:0 "Si des cabines privées permettraient de pourvoir au confort des officiers, un espace commun est également un bon moyen de s'assurer de leur bien-être sans se risquer à les voir se ramollir par excès de dorlotement."
 agot_captains_quarters_wardroom_05_domicile_building:0 "Grande salle des officiers"
 agot_captains_quarters_wardroom_05_domicile_building_desc:0 "$agot_captains_quarters_wardroom_04_domicile_building_desc$"
 agot_captains_quarters_wardroom_06_domicile_building:0 "Vaste salle des officiers"
 agot_captains_quarters_wardroom_06_domicile_building_desc:0 "$agot_captains_quarters_wardroom_04_domicile_building_desc$"
 agot_ship_galley_01_domicile_building:0 "Coquerie improvisée"
 agot_ship_galley_01_domicile_building_desc:0 "Quiconque vogue aux quatre vents pour remplir sa cale d’or doit d’abord remplir sa panse, avec de la nourriture cuisinée de préférence, et ce même si la cuisine en question semble plus du goût des rats que des hommes."
 agot_ship_galley_02_domicile_building:0 "Coquerie aménagée"
 agot_ship_galley_02_domicile_building_desc:0 "Une fois la cuisine proprement aménagée, il devient bien plus facile de convaincre l’équipage de manger ce qui y a été préparé."
 agot_ship_galley_03_domicile_building:0 "Grande coquerie"
 agot_ship_galley_03_domicile_building_desc:0 "Équipée de tous les ustensiles et de tout le nécessaire qu'une cuisine à terre pourrait avoir, la coquerie de ce navire en est devenue le cœur battant, lequel assure la survie de de l’équipage pour les nombreux mois qu’il passera en mer."
 agot_ship_galley_caboose_04_domicile_building:0 "Cambuse"
 agot_ship_galley_caboose_04_domicile_building_desc:0 "Pour faciliter les voyages à longue distance, mieux vaut s'assurer d’avoir des réserves de vivres prêtes à l’usage."
 agot_ship_galley_caboose_05_domicile_building:0 "Grande cambuse"
 agot_ship_galley_caboose_05_domicile_building_desc:0 "$agot_ship_galley_caboose_04_domicile_building_desc$"
 agot_ship_galley_caboose_06_domicile_building:0 "Vaste cambuse"
 agot_ship_galley_caboose_06_domicile_building_desc:0 "$agot_ship_galley_caboose_04_domicile_building_desc$"
 agot_ship_galley_grog_stores_04_domicile_building:0 "Réserve de gnôle"
 agot_ship_galley_grog_stores_04_domicile_building_desc:0 "Les histoires comme quoi les pirates raffolent de rhum et sont toujours ivres ne sont que des racontars de vilaines gens — mais une bonne rasade d’alcool n'a jamais fait de mal à personne donc bon."
 agot_ship_galley_grog_stores_05_domicile_building:0 "Grosse réserve de gnôle"
 agot_ship_galley_grog_stores_05_domicile_building_desc:0 "$agot_ship_galley_grog_stores_04_domicile_building_desc$"
 agot_ship_galley_grog_stores_06_domicile_building:0 "Vaste réserve de gnôle"
 agot_ship_galley_grog_stores_06_domicile_building_desc:0 "$agot_ship_galley_grog_stores_04_domicile_building_desc$"
 agot_ship_galley_hardtack_04_domicile_building:0 "Réserve de galettes"
 agot_ship_galley_hardtack_04_domicile_building_desc:0 "Composé d’eau, de levain et de farine, le biscuit de mer — ou galette — est idéal pour les longs voyages en mer. Certainement pas en raison de son goût, mais de sa facilité de préparation, sa durée de conservation et son efficacité à garder un estomac repu à peu de frais."
 agot_ship_galley_hardtack_05_domicile_building:0 "Grande réserve de galettes"
 agot_ship_galley_hardtack_05_domicile_building_desc:0 "$agot_ship_galley_hardtack_04_domicile_building_desc$"
 agot_ship_galley_hardtack_06_domicile_building:0 "Vaste réserve de galettes"
 agot_ship_galley_hardtack_06_domicile_building_desc:0 "$agot_ship_galley_hardtack_04_domicile_building_desc$"
 agot_forecastle_01_domicile_building:0 "Petit gaillard"
 agot_forecastle_01_domicile_building_desc:0 "Le gaillard est au navire, ce que la citadelle est à la ville : un espace fortifié depuis lequel les défenseurs ont un avantage positionnel. Mais lorsque la ville est mobile, comme l’est un navire, les défenseurs peuvent aussi devenir des assaillants."
 agot_forecastle_02_domicile_building:0 "Gaillard"
 agot_forecastle_02_domicile_building_desc:0 "$agot_forecastle_01_domicile_building_desc$"
 agot_forecastle_03_domicile_building:0 "Gaillard fortifié"
 agot_forecastle_03_domicile_building_desc:0 "$agot_forecastle_01_domicile_building_desc$"
 agot_forecastle_aftcastle_04_domicile_building:0 "Dunette"
 agot_forecastle_aftcastle_04_domicile_building_desc:0 "En plus du château à l'avant, ce navire est désormais pourvu d’un second à l'arrière, renforçant davantage son aspect imprenable."
 agot_forecastle_aftcastle_05_domicile_building:0 "Grande dunette"
 agot_forecastle_aftcastle_05_domicile_building_desc:0 "$agot_forecastle_aftcastle_04_domicile_building_desc$"
 agot_forecastle_aftcastle_06_domicile_building:0 "Dunette fortifiée"
 agot_forecastle_aftcastle_06_domicile_building_desc:0 "$agot_forecastle_aftcastle_04_domicile_building_desc$"
 agot_forecastle_boarding_bridge_04_domicile_building:0 "Corbeau d’abordage"
 agot_forecastle_boarding_bridge_04_domicile_building_desc:0 "Tirant son nom d’après sa forte saillie en forme de bec conçue pour se ficher dans le pont adverse, la mise en place de cette passerelle basculante facilite grandement l’abordage des navires ennemis."
 agot_forecastle_boarding_bridge_05_domicile_building:0 "Corbeau renforcé"
 agot_forecastle_boarding_bridge_05_domicile_building_desc:0 "$agot_forecastle_boarding_bridge_04_domicile_building_desc$"
 agot_forecastle_boarding_bridge_06_domicile_building:0 "Corbeau fortifié"
 agot_forecastle_boarding_bridge_06_domicile_building_desc:0 "$agot_forecastle_boarding_bridge_04_domicile_building_desc$"
 agot_ships_armory_01_domicile_building:0 "Petite armurerie"
 agot_ships_armory_01_domicile_building_desc:0 "Lorsqu’un capitaine souhaite s’attaquer à de plus grosses prises que le vulgaire fretin, il lui faut s’assurer que son équipage soit nanti du meilleur matériel qui soit."
 agot_ships_armory_02_domicile_building:0 "Armurerie"
 agot_ships_armory_02_domicile_building_desc:0 "$agot_ships_armory_01_domicile_building_desc$"
 agot_ships_armory_03_domicile_building:0 "Arsenal naval"
 agot_ships_armory_03_domicile_building_desc:0 "$agot_ships_armory_01_domicile_building_desc$"
 agot_ships_armory_cutlass_storage_04_domicile_building:0 "Magasin d’armement léger"
 agot_ships_armory_cutlass_storage_04_domicile_building_desc:0 "Des coutelas, des sabres et tout ce qui est susceptible de pouvoir couper ou trancher afin de faciliter la capture du butin."
 agot_ships_armory_cutlass_storage_05_domicile_building:0 "Moult magasin d’armement léger"
 agot_ships_armory_cutlass_storage_05_domicile_building_desc:0 "$agot_ships_armory_cutlass_storage_04_domicile_building_desc$"
 agot_ships_armory_cutlass_storage_06_domicile_building:0 "Vaste contenance d’armement léger"
 agot_ships_armory_cutlass_storage_06_domicile_building_desc:0 "$agot_ships_armory_cutlass_storage_04_domicile_building_desc$"
 agot_ships_armory_long_pikes_04_domicile_building:0 "Réserve d’armes d’hast"
 agot_ships_armory_long_pikes_04_domicile_building_desc:0 "Des lances et des piques suffisamment longues et pointues pour embrocher les ennemis aussi aisément que se feront embrocher leurs donzelles."
 agot_ships_armory_long_pikes_05_domicile_building:0 "Grande réserve d’armes d’hast"
 agot_ships_armory_long_pikes_05_domicile_building_desc:0 "$agot_ships_armory_long_pikes_04_domicile_building_desc$"
 agot_ships_armory_long_pikes_06_domicile_building:0 "Opulente réserve d’armes d’hast"
 agot_ships_armory_long_pikes_06_domicile_building_desc:0 "$agot_ships_armory_long_pikes_04_domicile_building_desc$"
 agot_ships_armory_arrow_barrels_04_domicile_building:0 "Nécessaire d’archeries"
 agot_ships_armory_arrow_barrels_04_domicile_building_desc:0 "Des arcs, des flèches et tout ce qui sera utile pour armer les régiments d’archers qui feront pleuvoir des nuées de traits sur les ennemis."
 agot_ships_armory_arrow_barrels_05_domicile_building:0 "Myriade de fourniment d’archeries"
 agot_ships_armory_arrow_barrels_05_domicile_building_desc:0 "$agot_ships_armory_arrow_barrels_04_domicile_building_desc$"
 agot_ships_armory_arrow_barrels_06_domicile_building:0 "Profusion d’équipement d’archeries"
 agot_ships_armory_arrow_barrels_06_domicile_building_desc:0 "$agot_ships_armory_arrow_barrels_04_domicile_building_desc$"
 agot_ships_brig_01_domicile_building:0 "Geôles"
 agot_ships_brig_01_domicile_building_desc:0 "Disposer de cellules peut toujours être utile lorsque vous souhaitez garder sous clef un riche noble à rançonner ou bien des mutins séditieux — ou pire encore, ceux qui tentent de chaparder votre réserve de gnôle personnelle."
 agot_ships_brig_02_domicile_building:0 "Instruments de persuasion"
 agot_ships_brig_02_domicile_building_desc:0 "$agot_ships_brig_01_domicile_building_desc$"
 agot_ships_brig_03_domicile_building:0 "Aménagement lugubre"
 agot_ships_brig_03_domicile_building_desc:0 "$agot_ships_brig_01_domicile_building_desc$"
 agot_ships_brig_04_domicile_building:0 "Barreaux renforcés"
 agot_ships_brig_04_domicile_building_desc:0 "$agot_ships_brig_01_domicile_building_desc$"
 agot_ships_brig_05_domicile_building:0 "Barreaux en acier laminé à froid"
 agot_ships_brig_05_domicile_building_desc:0 "$agot_ships_brig_01_domicile_building_desc$"
 agot_ships_brig_06_domicile_building:0 "Cellules inviolables"
 agot_ships_brig_06_domicile_building_desc:0 "$agot_ships_brig_01_domicile_building_desc$"
 agot_berth_deck_01_domicile_building:0 "Couchettes"
 agot_berth_deck_01_domicile_building_desc:0 "Pour accroître la taille de l’équipage, encore faut-il avoir suffisamment de lits pour leur permettre de roupiller entre deux abordages."
 agot_berth_deck_02_domicile_building:0 "Plus de couchettes"
 agot_berth_deck_02_domicile_building_desc:0 "$agot_berth_deck_01_domicile_building_desc$"
 agot_berth_deck_03_domicile_building:0 "Myriade de couchettes"
 agot_berth_deck_03_domicile_building_desc:0 "$agot_berth_deck_01_domicile_building_desc$"
 agot_berth_deck_hammocks_04_domicile_building:0 "Hamacs"
 agot_berth_deck_hammocks_04_domicile_building_desc:0 "Même si l’espace commence à manquer à mesure que le nombre de membres d’équipage augmente, il reste toujours des solutions de secours. Un hamac n’est pas ce qu'il y a de plus confortable pour dormir, mais si des pirates souhaitent dormir dans des lits de plume ils n’ont qu’à choisir une autre vocation."
 agot_berth_deck_hammocks_05_domicile_building:0 "Plus de hamacs"
 agot_berth_deck_hammocks_05_domicile_building_desc:0 "$agot_berth_deck_hammocks_04_domicile_building_desc$"
 agot_berth_deck_hammocks_06_domicile_building:0 "Grande quantité de hamacs"
 agot_berth_deck_hammocks_06_domicile_building_desc:0 "$agot_berth_deck_hammocks_04_domicile_building_desc$"
 agot_berth_deck_quarterdeck_04_domicile_building:0 "Petits quartiers aménagés"
 agot_berth_deck_quarterdeck_04_domicile_building_desc:0 "Aménager des quartiers entiers pour l’équipage est certes moins optimal, mais l’organisation des membres s'en trouve facilité."
 agot_berth_deck_quarterdeck_05_domicile_building:0 "Quartiers aménagés"
 agot_berth_deck_quarterdeck_05_domicile_building_desc:0 "$agot_berth_deck_quarterdeck_04_domicile_building_desc$"
 agot_berth_deck_quarterdeck_06_domicile_building:0 "Vaste quartiers aménagés"
 agot_berth_deck_quarterdeck_06_domicile_building_desc:0 "$agot_berth_deck_quarterdeck_04_domicile_building_desc$"
 agot_main_mast_01_domicile_building:0 "Grand-mât renforcé"
 agot_main_mast_01_domicile_building_desc:0 "La mâture est la pièce maîtresse du gréement d’un navire, qu’il s'agisse du mât principal, le grand-mât, du mât arrière, d’artimon, ou avant, de misaine, leur rôle est primordial lorsque l’on fait grand cas de poursuivre les cibles ou de fuir le danger."
 agot_main_mast_02_domicile_building:0 "Mât d’artimon renforcé"
 agot_main_mast_02_domicile_building_desc:0 "$agot_main_mast_01_domicile_building_desc$"
 agot_main_mast_03_domicile_building:0 "Mât de misaine renforcé"
 agot_main_mast_03_domicile_building_desc:0 "$agot_main_mast_01_domicile_building_desc$"
 agot_main_mast_square_sails_04_domicile_building:0 "Gréement carré"
 agot_main_mast_square_sails_04_domicile_building_desc:0 "Les voiles rectangulaires sont conçus pour les vents portants, et pour quiconque connaît les routes maritimes, elles assurent une grande célérité au navire."
 agot_main_mast_square_sails_05_domicile_building:0 "Grand gréement carré"
 agot_main_mast_square_sails_05_domicile_building_desc:0 "$agot_main_mast_square_sails_04_domicile_building_desc$"
 agot_main_mast_square_sails_06_domicile_building:0 "Gréement carré imposant"
 agot_main_mast_square_sails_06_domicile_building_desc:0 "$agot_main_mast_square_sails_04_domicile_building_desc$"
 agot_main_mast_lanteen_04_domicile_building:0 "Voiles à livarde"
 agot_main_mast_lanteen_04_domicile_building_desc:0 "Classé dans les voiles à aurique, les voiles à livarde offrent une grande simplicité de gréement et de ferlage, idéale pour naviguer près des côtes, permettant d'aller et venir rapidement, facilitant les manœuvres pour piller."
 agot_main_mast_lanteen_05_domicile_building:0 "Grandes voiles à livarde"
 agot_main_mast_lanteen_05_domicile_building_desc:0 "$agot_main_mast_lanteen_04_domicile_building_desc$"
 agot_main_mast_lanteen_06_domicile_building:0 "Imposantes voiles à livarde"
 agot_main_mast_lanteen_06_domicile_building_desc:0 "$agot_main_mast_lanteen_04_domicile_building_desc$"
 agot_ships_hold_01_domicile_building:0 "Cale aménagé"
 agot_ships_hold_01_domicile_building_desc:0 "Pour un navire pirate, rien n’est plus important que la cale, car c’est ici que le précieux butin sera stocké. Voilà pourquoi il est important de l’aménager de sorte à pouvoir y entasser toujours plus d’or."
 agot_ships_hold_02_domicile_building:0 "Cale réorganisé"
 agot_ships_hold_02_domicile_building_desc:0 "$agot_ships_hold_01_domicile_building_desc$"
 agot_ships_hold_03_domicile_building:0 "Espace de stockage agrandi"
 agot_ships_hold_03_domicile_building_desc:0 "$agot_ships_hold_01_domicile_building_desc$"
 agot_ships_hold_04_domicile_building:0 "Coffres à butin"
 agot_ships_hold_04_domicile_building_desc:0 "$agot_ships_hold_01_domicile_building_desc$"
 agot_ships_hold_05_domicile_building:0 "Approfondissement de la cale"
 agot_ships_hold_05_domicile_building_desc:0 "$agot_ships_hold_01_domicile_building_desc$"
 agot_ships_hold_06_domicile_building:0 "Cale à butin"
 agot_ships_hold_06_domicile_building_desc:0 "$agot_ships_hold_01_domicile_building_desc$"
 building_type_agot_urban_farms_01:0 "Boulangeries"
 building_type_agot_urban_farms_01_desc:0 "L'âme d'une cité n'est ni le château, ni la forge, mais la boulangerie."
 building_agot_urban_farms_01:0 "Boulanger du village"
 building_agot_urban_farms_01_desc:0 "Le pain est la clé de la survie de tout village, et c'est pourquoi un boulanger est un investissement crucial pour tout bon seigneur."
 building_agot_urban_farms_02:0 "Boulangerie"
 building_agot_urban_farms_02_desc:0 "Une population toujours plus grandissante requiert un meilleur approvisionnement en pain, et une boulangerie digne de ce nom est la meilleure réponse à cela."
 building_agot_urban_farms_03:0 "Cuisine"
 building_agot_urban_farms_03_desc:0 "À mesure que la boulangerie s'agrandit, elle élargit ses choix et offre ainsi des aliments de plus en plus variés, ce qui a tôt fait de soutenir les besoins du peuple."
 building_agot_urban_farms_04:0 "Auberge"
 building_agot_urban_farms_04_desc:0 "Le grand nombre de voyageurs transitant dans la région a poussé la boulangerie a poursuivre son évolution, pour devenir une auberge offrant confort et nourritures."
 building_agot_urban_farms_05:0 "Grande boulangerie"
 building_agot_urban_farms_05_desc:0 "La population ne cesse de grandir, et la boulangerie en fait de même."
 building_agot_urban_farms_06:0 "Auberge de renom"
 building_agot_urban_farms_06_desc:0 "Il y a les mauvaises et les bonnes auberges. Celle-ci a su se tailler une solide réputation autant auprès des petites gens que des seigneurs."
 building_agot_urban_farms_07:0 "Boulangerie urbaine"
 building_agot_urban_farms_07_desc:0 "A mesure que la cité a évolué, la boulangerie en a fait de même. Elle est désormais capable de subvenir aux besoins d'une très large population."
 building_agot_urban_farms_08:0 "Guilde des boulangers"
 building_agot_urban_farms_08_desc:0 "Autrefois dispersé et divisé, les boulangers se sont unis pour former une véritable guilde."
 building_type_agot_steppe_farms_01:0 "Fermes des steppes"
 building_type_agot_steppe_farms_01_desc:0 "Même dans des terres à la fertilité capricieuse comme les steppes, une forme d'agriculture est viable."
 building_agot_steppe_farms_01:0 "Fermes de foin"
 building_agot_steppe_farms_01_desc:0 "Petites fermes isolées, spécialisés dans la culture du foin en raison des conditions imposées par la région."
 building_agot_steppe_farms_02:0 "Fermes de haricots"
 building_agot_steppe_farms_02_desc:0 "Les fermes étoffent leur production alimentaire afin d'ajouter des complétements aux autres sources de nourritures."
 building_agot_steppe_farms_03:0 "Fermes d'orges"
 building_agot_steppe_farms_03_desc:0 "L'orge est fondamentale dans ces régions peu fertiles et permet d'améliorer le rendement agricole afin de subvenir aux besoins d'une population grandissante."
 building_agot_steppe_farms_04:0 "Fermes de moutardes"
 building_agot_steppe_farms_04_desc:0 "La moutarde est une culture toute indiquée au climat des steppes et des régions du nord."
 building_agot_steppe_farms_05:0 "Fermes de blés"
 building_agot_steppe_farms_05_desc:0 "Le blé est une culture essentielle pour toute population, en raison de son rendement, et ce même dans des régions comme les steppes."
 building_agot_steppe_farms_06:0 "Fermes de seigle"
 building_agot_steppe_farms_06_desc:0 "Le seigle est d'une grande utilité pour les fermes qui se sont installés ici, non seulement pour la source de nourriture qu'elle représente, mais également pour l'alcool qu'elle permet de produire."
 building_agot_steppe_farms_07:0 "Fermes multicéréalière"
 building_agot_steppe_farms_07_desc:0 "Dépendre d'une seule culture peut s'avérer extrêmement problématique, il est donc vitale de varier les moissons pour assurer sustentation et subsistance à la population."
 building_agot_steppe_farms_08:0 "Fermes de blés d'hiver"
 building_agot_steppe_farms_08_desc:0 "Le blé d'hiver est probablement la culture la plus importante dans le Nord pour qui veut survivre aux longs hivers et même aux neiges estivales."
 building_type_city_walls_01:0 "Murs citadins"
 building_type_city_walls_01_desc:0 "Bien qu'ils soient moindres en comparaison de ceux d'un château, ces murs sont essentiels pour apporter une protection au centre économique de la zone, au moins jusqu'à l'arrivée des renforts."
 building_city_walls_01:0 "Palissade de fortune"
 building_city_walls_01_desc:0 "Construite à la hâte, cette palissade n'est là que pour inciter les petits groupes d'assaillants à passer leur chemin."
 building_city_walls_02:0 "Murs en bois"
 building_city_walls_02_desc:0 "Des murs en bois permanents protègent désormais les commerçants et les habitants de cette propriété citadine."
 building_city_walls_03:0 "Murs en pierres"
 building_city_walls_03_desc:0 "Dans l'espoir d'attirer davantage de marchands et de guildes, cette ville possède désormais des murs de pierre érigés pour repousser pillards et bandits."
 building_city_walls_04:0 "Épaisse muraille en pierre"
 building_city_walls_04_desc:0 "Les murs en pierres ont été fortifiés et consolidés pour protéger efficacement les habitants contre toutes menaces."
 building_type_agot_slave_camps_01:0 "Camps d'esclaves"
 building_type_agot_slave_camps_01_desc:0 "De fabuleuses merveilles ont pu être bâties grâce aux esclaves de l'Ancienne Ghis et des Possessions valyriennes. Une main d'œuvre bon marché — et brutalisée — dont le travail forcé a assuré la croissance des empires de jadis, et ce au prix de maints sacrifices."
 building_agot_slave_camps_01:0 "Petit enclos d'esclaves"
 building_agot_slave_camps_01_desc:0 "À l’étroit et confinés dans ce misérable enclos, seule une poignée d'esclaves parvient à y survivre. #V Ce bâtiment peut contenir une [GetModifier('slave_pop_1').GetNameWithTooltip].#!"
 building_agot_slave_camps_02:0 "Grand enclos d'esclaves"
 building_agot_slave_camps_02_desc:0 "Un enclos agrandi permet de confiner plus d'esclaves, mais toujours avec le strict nécessaire pour leur survie. #V Ce bâtiment peut contenir une [GetModifier('slave_pop_2').GetNameWithTooltip].#!"
 building_agot_slave_camps_03:0 "Taudis d’esclaves"
 building_agot_slave_camps_03_desc:0 "Une fois que les enclos commencent à déborder, attribué aux esclaves un taudis peut devenir nécessaire. Ces lieux sordides et encombrés manquent encore des commodités les plus basiques, mais elles remplissent parfaitement leur rôle d'héberger un plus grand nombre d'esclaves. #V Ce bâtiment peut contenir une [GetModifier('slave_pop_3').GetNameWithTooltip].#!"
 building_agot_slave_camps_04:0 "Tribune aux enchères"
 building_agot_slave_camps_04_desc:0 "Connu dans toute la région comme un lieu d'achat et de vente d'esclaves, la tribune aux enchères rabaisse les esclaves au rang de simples marchandises, enrichissant ainsi davantage les maîtres. #V Ce bâtiment peut contenir une [GetModifier('slave_pop_4').GetNameWithTooltip].#!"
 building_agot_slave_camps_05:0 "Taudis séparé"
 building_agot_slave_camps_05_desc:0 "Un trop grand nombre d'esclaves pourrait poser problème, et c'est pourquoi diviser les taudis permet un meilleur contrôle sur la population. #V Ce bâtiment peut contenir une [GetModifier('slave_pop_5').GetNameWithTooltip].#!"
 building_agot_slave_camps_06:0 "Grande tribune aux enchères"
 building_agot_slave_camps_06_desc:0 "Les ventes aux enchères d'esclaves qui se tiennent ici attirent des intéressés venant d'un peu partout, ce qui en fait une plaque tournante importante pour le commerce d'esclaves. #V Ce bâtiment peut contenir une [GetModifier('slave_pop_6').GetNameWithTooltip].#!"
 building_agot_slave_camps_07:0 "Quartier des esclaves"
 building_agot_slave_camps_07_desc:0 "Un grand nombre d’esclaves nécessite un quartier entier pour les loger, même avec un minimum de provisions. #V Ce bâtiment peut contenir une [GetModifier('slave_pop_7').GetNameWithTooltip].#!"
 building_agot_slave_camps_08:0 "Multi-quartiers pour esclaves"
 building_agot_slave_camps_08_desc:0 "La population d’esclaves augmente à tel point qu'elle atteint les dimensions d'une ville, et un seul quartier n'est donc plus suffisant pour tous les loger. #V Ce bâtiment peut contenir une [GetModifier('slave_pop_8').GetNameWithTooltip].#!"
