 building_type_agot_westerland_gold_mines_01:1 "Mines d’or de l’Ouest"
 building_type_agot_westerland_gold_mines_01_desc:1 "L'or est l'incarnation de la richesse des Terres de l'Ouest, et pour cause, les collines et montagnes de la région en regorgent, garantissant la fortune aux seigneurs qui y vivent."
