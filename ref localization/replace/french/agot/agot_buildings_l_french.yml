 building_hyperborean_trade_post_01:0 "Avant-poste de soutien"
 building_hyperborean_trade_post_01_desc:0 "C'est depuis cet avant-poste que les intendants et les caravanes de ravitaillement opèrent pour fournir aux colons des biens et des provisions indispensables pour permettre à une [colony|El] de survivre dans les terres inhospitalières d’au-delà du Mur."
 building_type_hyperborean_trade_post_01:0 "Avant-poste de soutien"
 building_type_hyperborean_trade_post_01_desc:0 "C'est depuis cet avant-poste que les intendants et les caravanes de ravitaillement opèrent pour fournir aux colons des biens et des provisions indispensables pour permettre à une [colony|El] de survivre dans les terres inhospitalières d’au-delà du Mur."
 building_type_agot_sept_of_remembrance_01:0 "Le Septuaire du Souvenir"
 building_type_agot_sept_of_remembrance_01_desc:0 "Érigé sur la Colline de Rhaenys après la mort de la reine éponyme bien-aimée, le Septuaire du Souvenir fut le centre de la Foi dans la capitale et un bastion pour la Foi Militante."
 building_agot_sept_of_remembrance_01:0 "$building_type_agot_sept_of_remembrance_01$"
 building_agot_sept_of_remembrance_01_desc:0 "$building_type_agot_sept_of_remembrance_01_desc$"
 building_dragonpit_03:0 "$building_type_dragonpit_01$"
 building_dragonpit_03_desc:0 "$building_type_dragonpit_01_desc$"
 building_highgarden_02:0 "La Courtine de Mern"
 building_highgarden_02_desc:0 "Construite sur ordre de Mern II lors des invasions andales, sa courtine était destinée à mieux protéger la Maison Jardinier et constitue aujourd'hui le plus intérieur des trois murs du château."
 building_highgarden_03:0 "Le Septuaire du Neuvième"
 building_highgarden_03_desc:0 "Construit et nommé en l'honneur de Garth IX, le septuaire de Hautjardin possède des murs blancs ornés de vitraux représentant les Sept et Garth le Vert, et nul autre septuaire ne serait son égal à l'exception du siège du Grand Septon."
 building_highgarden_04:0 "Le Labyrinthe de Ronce"
 building_highgarden_04_desc:0 "Entre l'enceinte extérieure et intermédiaire de Hautjardin s'étend le Labyrinthe de Ronce, lequel sert à la fois de divertissement pour les courtiers et les invités, mais aussi de mesure défensive pour ralentir les forces invasives."
 building_highgarden_05:0 "Le Palais de Hautjardin"
 building_highgarden_05_desc:0 "$building_type_highgarden_01_desc$"
 building_agot_fairmarket_02:0 "Le Pont de la Bleufurque"
 building_agot_fairmarket_02_desc:0 "Beaumarché possède depuis fort longtemps un pont enjambant la Bleufurque, mais les seigneurs récents de la ville ont jugé bon d'ériger un ouvrage bien plus grandiose, dont on dit qu'il rivalise avec tous ceux que l'on trouve à travers le royaume."
 building_type_agot_golden_tooth_01:0 "La Dent d’Or"
 building_type_agot_golden_tooth_01_desc:0 "Siège ancestral de la Maison Lefford."
 building_agot_golden_tooth_01:0 "La Tour de la Couronne d’Or"
 building_agot_golden_tooth_01_desc:0 "Point d'observation privilégié qui domine le château ancestral de la Maison Lefford, la Tour de la Couronne d’Or est fièrement dressée sur le Mont Lefford, et permet aux Seigneurs de la Dent de guetter l'approche d'éventuels ennemis ou de descendre dans les tréfonds de la montagne où se trouvent les mines d'or."
 building_type_agot_silverhill_01:0 "Montargent"
 building_type_agot_silverhill_01_desc:0 "Fief ancestral de la Maison Serrett."
 building_agot_silverhill_01:0 "Castelargent"
 building_agot_silverhill_01_desc:0 "Perché au-dessus de la plus grande mine d'argent de l'Ouest, le fief ancestral de la Maison Serrett est contemplé pour sa splendeur resplendissante."
 building_type_agot_ironrath_01:0 "Mont-de-Fer"
 building_type_agot_ironrath_01_desc:0 "Fief ancestral de la Maison Forestier."
 building_agot_ironrath_01:0 "Le Bosquet de Mont-de-Fer"
 building_agot_ironrath_01_desc:0 "Mont-de-Fer, fief ancestral de la Maison Forestier, abrite la plus grande réserve de ferrugier du Bois-aux-Loups. Les seigneurs du château l'ont préservée avec grand soin, ne prélevant jamais plus que le nécessaire, assurant ainsi la pérennité du bosquet."
 building_type_agot_highpoint_01:0 "Hautpoint"
 building_type_agot_highpoint_01_desc:0 "Siège ancestral de la Maison Whitehill."
 building_agot_highpoint_01:0 "Le Bosquet de Hautpoint"
 building_agot_highpoint_01_desc:0 "Si Hautpoint abritait jadis un bosquet de ferrugier semblable à celui de bien d'autres châteaux du Bois-aux-Loups, la Maison Whitehill a cependant, elle, choisi de s'enrichir en le surexploitant, en sus de s'éloigner des coutumes nordiennes, appauvrissant ainsi le bosquet jusqu'à sa périclitation totale, obligeant les seigneurs ancestraux de Hautpoint à se tourner vers les réserves des autres maisons."
 building_type_agot_yronwood_01:0 "Ferboys"
 building_type_agot_yronwood_01_desc:0 "On ignore si le château a pris le nom de la maison, ou la maison celui du château, mais ce fief ancestral abrite depuis longtemps l'une des plus grandes maisons dorniennes."
 building_agot_yronwood_01:0 "Siège du Sangderoy"
 building_agot_yronwood_01_desc:0 "Ferboys, siège ancestral de la maison du même nom, est depuis longtemps une place forte pivote de Dorne qui domine la Voie de Pierre et abrite l'une des plus grandes mines d'argent de Westeros. Le château, célèbre siège des Sangderoy, fut bâti pour être sans égal, disposant de remparts imposants et d'une porte encore davantage."
 iron_islands_poor_soil:0 "[GetGeographicalRegion('world_westeros_the_iron_islands').GetName] possèdent un sol trop pauvre pour permettre un meilleur développement."
 building_type_agot_pennytree_01:0 "Pennytree"
 building_type_agot_pennytree_01_desc:0 "One of the many towns caught between the Blackwoods and Brackens, Pennytree lies between the Teats."
 building_agot_pennytree_01:0 "The Penny Tree"
 building_agot_pennytree_01_desc:0 "Within the village stands an ancient oak with hundreds of old copper pennies nailed to its trunk. It is believed that when the sons of the village are called to war, they nail a penny to the tree. When they return, they take it down, with those still nailed honoring the men who never returned."
 building_type_agot_the_ring_01:0 "The Ring"
 building_type_agot_the_ring_01_desc:0 "The ancestral seat of House Roxton."
 building_agot_the_ring_01:0 "$building_type_agot_the_ring_01$"
 building_agot_the_ring_01_desc:0 "While the Ring has long been the ancestral seat of House Roxton, its origins date back far beyond recorded history — before the records of the Citadel or even the tales of the First Men. Its walls, which give the castle its name, form a strong ring of stone, devoid of towers yet deadly to many who have sought to take it."
 building_type_agot_dunnsbridge_01:0 "Pinkshield"
 building_type_agot_dunnsbridge_01_desc:0 "The ancestral seat of House Dunn."
 building_agot_dunnsbridge_01:0 "The Dunnsbridge"
 building_agot_dunnsbridge_01_desc:0 "Originally built by House Dunn, the Dunnsbridge lies near the castle of Pinkshield, granting its lords control over the river and the trade flowing from the hills of the Red Mountains to the port of Cuy."