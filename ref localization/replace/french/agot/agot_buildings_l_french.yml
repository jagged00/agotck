l_french:
 building_castle_05:1 "Grand château"
 building_castle_05_desc:1 "Un grand château aux fortifications impressionnantes, capable de repousser presque n'importe quel ennemi et de protéger n'importe quel seigneur ou roi."
 building_type_scorpion_emplacement_01:0 "Emplacements pour scorpion"
 building_type_scorpion_emplacement_01_desc:0 "Arbalètes à faible cadence de tirs et trop imposantes pour être maniées sans être montées, les scorpions ont longtemps été considérés comme des armes défensives dépassées. Mais leur véritable valeur réside dans leur habilité à faire ce que peu d'armes peuvent accomplir : tuer un [dragon|El]."
 building_scorpion_emplacement_01:0 "Emplacements pour scorpion"
 building_scorpion_emplacement_01_desc:0 "Une série de larges arbalètes capables de pivoter sur un arc de près de 360 ​​degrés, capables de tirer d'énormes carreaux avec une telle force qu'ils peuvent percer même l'armure la plus épaisse. Les scorpions sont les seules armes capable de dissuader un [dragon|El] d'attaquer."
 building_scorpion_emplacement_02:0 "Emplacements pour scorpion lourd"
 building_scorpion_emplacement_02_desc:0 "L'ajout de rochets permet à ces scorpions à double arbalète de tirer des carreaux de la taille d'un homme. L'arme possède une puissance excessive mais reste trop lourde pour une utilisation efficace contre l'ennemi le plus redoutable qui soit : un grand [dragon|El]."
 building_city_05:1 "Grande cité"
 building_city_05_desc:0 "Une véritable cité où le commerce y est prospère, où nombre de voyageurs viennent s'y arrêter venant des quatre coins du royaume, et même au-delà. D'importantes guildes y ont élus domicile, des gens du bas peuple, des marchands, des chevaliers fieffés et plus encore. En d'autres termes, il s'agit là du cœur économique de son domaine."
 building_type_monastery_01:0 "Monastère"
 building_type_monastery_01_desc:1 "Complexe de bâtiments abritant des personnes poursuivant des études et des enseignements spirituels."
 building_monastery_01:1 "Cloître"
 building_monastery_01_desc:0 "Un petit rassemblement de religieux qui tentent de mener un mode de vie plus simple. Malgré leur isolement, un petit village s'est formé à proximité pour faire du commerce avec le cloître."
 building_monastery_02:1 "Couvent"
 building_monastery_02_desc:1 "S'étant développé, cette communauté religieuse offre maintenant un lieu d'étude et d'apprentissage pour ceux qui partagent leur foi, et le petit village s'est lui aussi développé pour devenir un petit bourg qui apporte son soutien."
 building_monastery_03:1 "Prieuré"
 building_monastery_03_desc:1 "Symbole de dévouement et de simplicité, ce prieuré s'est développé pour accueillir de nombreux frères et sœurs assermentés dans l'ordre local et des prêtres en visite. Le bourg voisin a continué de s'agrandir et d'apporter son soutien."
 building_monastery_04:1 "Grand monastère"
 building_monastery_04_desc:1 "Autrefois petite, la communauté religieuse a transformé un simple cloître en un grand monastère au service de centaines de frères et sœurs assermentés et qui constitue un centre de réflexion et de discussion sur les croyances les plus profondes de la foi. Le modeste bourg quant à lui est devenu une véritable ville, prête à accueillir les nombreuses personnes qui vont et viennent du grand monastère."
 building_type_unknown_01:0 "Inconnu"
 building_unknown_01:0 "Inconnu"
 building_unknown_01_desc:0 "Ce lieu est inconnu."
 building_type_godswood_01:0 "Bois sacré"
 building_type_godswood_01_desc:0 "Lorsque les Premiers Hommes ont commencé à vénérer les Anciens Dieux des enfants de la forêt, ils ont par là même commencé à créer des bois sacrés, des bosquets à l'intérieur de leurs châteaux et de leurs villages où un seul barral, également appelé « arbre-cœur » sur lequel est sculpté un visage, était planté afin que les dieux puissent être vénérés."
 building_godswood_01:0 "Jardin sacré"
 building_godswood_01_desc:0 "Bien que techniquement il s'agisse d'un bois sacré, ce n'est en réalité qu'un jardin entretenu dont le seul arbre présent est un arbre-cœur."
 building_godswood_02:0 "Petit bois sacré"
 building_godswood_02_desc:0 "Un petit bois sacré avec quelques arbres, dont l'arbre-cœur, au centre. Il procure à son propriétaire un bel endroit pour se promener et réfléchir."
 building_godswood_03:0 "Bois sacré modeste"
 building_godswood_03_desc:0 "Un bois sacré de taille modeste composé de chênes, d'ormes et de bouleaux, avec bien entendu un arbre-cœur en son centre. Sa taille et son entretien témoignent clairement du statut et du prestige du seigneur, tout en préservant les traditions anciennes."
 building_godswood_04:0 "Bois sacré florissant"
 building_godswood_04_desc:0 "Un bois sacré florissant composé de chênes, d'ormes, et de bouleaux ; quelques ferrugiers ont également commencé à pousser. Au centre se trouve toujours le traditionnel arbre-cœur."
 building_godswood_05:0 "Grand bois sacré"
 building_godswood_05_desc:0 "Un grand bois sacré caractérisé par une large variété d'essence d'arbres tel que des vigiers, des chênes, des ormes, des bouleaux, de jeunes ferrugiers, et l'imposant arbre-cœur au centre. Un endroit magnifique qui combine parfaitement le prestige et le respect des traditions anciennes."
 building_godswood_06:0 "Très grand bois sacré"
 building_godswood_06_desc:0 "Un très grand bois sacré, large d'un acre et où l'on peut trouver multitudes d'essences d'arbres, tel que des vigiers, chênes, ormes, bouleaux, ferrugiers, avec comme toujours l'arbre-cœur au centre. Seuls les seigneurs les plus fortunés peuvent se permettre la construction et l'entretient d'une pareille création au sein de leur château."
 building_godswood_07:0 "Bois sacré majestueux"
 building_godswood_07_desc:0 "Ce bois sacré est sans commune mesure, s'étendant sur plusieurs acres avec une foule d'essences d'arbres différents. C'est l'ode d'une maison aux liens qui l'unit aux Premiers Hommes ainsi qu'au Pacte. Dans les tréfonds du bois trône un arbre-cœur, fier et imposant."
 building_godswood_08:0 "Bois sacré gargantuesque"
 building_godswood_08_desc:0 "Ce bois sacré primordial s'étend si largement, qu'une multitude de châteaux pourrait y être contenu, ce n'est d'ailleurs plus un bois, mais une véritable forêt à part entière. Des essences d'arbres de toutes sortes, qu'ils s'agissent de vigiers, de chênes, de ferrugiers et une multitude d'autres, y sont plantés. Un lieu sacré où les plus dévoués aux Anciens Dieux s'y sentent comme chez eux."
 building_building_moat_01:0 "Douve sèche"
 building_type_building_moat_01:0 "Terrassements"
 building_building_moat_01_desc:0 "Un peu plus qu'un fossé, une douve sèche reste un moyen efficace de fortifier une exploitation."
 building_type_building_moat_01_desc:0 "Un peu plus qu'un fossé, une douve sèche reste un moyen efficace de fortifier une exploitation."
 building_building_moat_02:0 "Douve"
 building_type_building_moat_02:0 "Terrassements"
 building_building_moat_02_desc:0 "Le fossé qui entoure cette exploitation est rempli d'eau saumâtre, ce qui rend l'assaut beaucoup plus difficile."
 building_type_building_moat_02_desc:0 "Le fossé qui entoure cette exploitation est rempli d'eau saumâtre, ce qui rend l'assaut beaucoup plus difficile."
 building_building_moat_03:0 "Large douve"
 building_type_building_moat_03:0 "Défenses extérieures"
 building_building_moat_03_desc:0 "Les douves ont été agrandies et constituent désormais un véritable obstacle pour tout assaillant."
 building_type_building_moat_03_desc:0 "Les douves ont été agrandies et constituent désormais un véritable obstacle pour tout assaillant."
 building_building_moat_04:0 "Douve profonde"
 building_type_building_moat_04:0 "Défenses extérieures"
 building_building_moat_04_desc:0 "Ces douves ont été draguées et approfondies au point qu'elles ne peuvent être traversées que par bateau."
 building_type_building_moat_04_desc:0 "Ces douves ont été draguées et approfondies au point qu'elles ne peuvent être traversées que par bateau."
 building_building_moat_05:0 "Douve alimentée par un cours d'eau"
 building_type_building_moat_05:0 "Défenses extérieures"
 building_building_moat_05_desc:0 "Les douves qui entourent le château ont été conçues pour être alimentées par un ruisseau local. On trouve plusieurs espèces de poissons dans cette eau désormais douce, et les eaux usées sont évacuées du château."
 building_type_building_moat_05_desc:0 "Les douves qui entourent le château ont été conçues pour être alimentées par un ruisseau local. On trouve plusieurs espèces de poissons dans cette eau désormais douce, et les eaux usées sont évacuées du château."
 building_building_moat_06:0 "Douve du lac"
 building_type_building_moat_06:0 "Défenses extérieures impressionnantes"
 building_building_moat_06_desc:0 "Cette exploitation est située au milieu d'un grand lac d'eau douce. Alimenté par plusieurs ruisseaux, l'eau ne peut être drainée et constitue une réserve inépuisable d'eau douce pour les défenseurs. En temps de paix, il est souvent utilisé pour la navigation de plaisance."
 building_type_building_moat_06_desc:0 "Cette exploitation est située au milieu d'un grand lac d'eau douce. Alimenté par plusieurs ruisseaux, l'eau ne peut être drainée et constitue une réserve inépuisable d'eau douce pour les défenseurs. En temps de paix, il est souvent utilisé pour la navigation de plaisance."
 building_building_moat_07:0 "Douves concentriques"
 building_type_building_moat_07:0 "Défenses extérieures formidables"
 building_building_moat_07_desc:0 "À l'extérieur des douves de ce château, se trouve une autre douve."
 building_type_building_moat_07_desc:0 "À l'extérieur des douves de ce château, se trouve une autre douve."
 building_building_moat_08:0 "Douve infestée de lézards-lions"
 building_type_building_moat_08:0 "Défenses extérieures formidables"
 building_building_moat_08_desc:0 "Les douves extérieures de cette exploitation regorgent de lézards-lions, apparemment importés du Neck. Leurs yeux scrutent l'eau trouble, à l'affût de tout ce qui a l'audace de s'approcher trop près du bord de l'eau. Seul un fou tenterait de le traverser, sauf en empruntant le pont-levis."
 building_type_building_moat_08_desc:0 "Les douves extérieures de cette exploitation regorgent de lézards-lions, apparemment importés du Neck. Leurs yeux scrutent l'eau trouble, à l'affût de tout ce qui a l'audace de s'approcher trop près du bord de l'eau. Seul un fou tenterait de le traverser, sauf en empruntant le pont-levis."
 building_type_apiaries_01:1 "Ruchers"
 building_type_apiaries_01_desc:1 "Les apiculteurs d'ici entretiennent des colonies d'abeilles pour produire des substances précieuses telles que le miel et la cire."
 building_apiaries_01:1 "Récolteurs sauvages"
 building_apiaries_01_desc:1 "Outre la collecte du miel de nombreuses ruches sauvages, la poterie est utilisée pour héberger des colonies d'abeilles sauvages en captivité."
 building_apiaries_02:1 "Ruches"
 building_apiaries_02_desc:1 "Les paniers tressés en paille et en osier servent de ruches et de récipients pour la récolte du miel et de la cire."
 building_apiaries_03:1 "Fabricants d'hydromel"
 building_apiaries_03_desc:1 "Le miel peut être mélangé avec de l'eau et fermenté pour faire de l'hydromel, une boisson populaire tout autant auprès des seigneurs que des paysans."
 building_apiaries_04:1 "Grandes ruches"
 building_apiaries_04_desc:1 "Des collections de grandes ruches parsèment la campagne et abritent un grand nombre d'abeilles."
 building_apiaries_05:1 "Ruches en deux parties"
 building_apiaries_05_desc:1 "Un couvercle amovible permet de retirer le dessus de la ruche, ce qui permet de préserver les abeilles et la ruche et de récolter facilement le miel."
 building_apiaries_06:1 "Fabricants de bougies"
 building_apiaries_06_desc:1 "Ici, les chandeliers fabriquent des bougies en cire d'abeille qui brûlent parfaitement et proprement."
 building_apiaries_07:1 "Grandes ruches en deux parties"
 building_apiaries_07_desc:1 "Les communautés d'apiculteurs s'occupent de nombreuses ruches et colonies."
 building_apiaries_08:1 "Machine à cire"
 building_apiaries_08_desc:1 "La cire d'abeille peut être raffinée ici pour être utilisée à diverses fins, comme la cire à cacheter, les tablettes d'écriture et la fabrication de moules."
 building_type_generic_dragon_pit_01:0 "Dragonnerie"
 building_type_generic_dragon_pit_01_desc:0 "Une dragonnerie est un type de [dragonpit|El], une structure conçu pour parquer en toute sécurité les dragons."
 building_generic_dragon_pit_01:0 "Dragonnerie"
 building_generic_dragon_pit_01_desc:0 "$building_type_generic_dragon_pit_01_desc$"
 building_type_agot_vineyard_01:0 "Vignobles"
 building_type_agot_vineyard_01_desc:0 "Le vin, que serions nous sans lui ? Utilisé pour purifier l'eau, bouilli pour désinfecter les plaies, et comment oublier son usage le plus précieux : le boire. Le vin est la source de richesse de maintes maisons et de la grandeur de bien d'autres."
 building_agot_vineyard_01:0 "Petit vignoble"
 building_agot_vineyard_01_desc:0 "Un petit vignoble qui produit un grand cru vendu de par le monde."
 building_agot_vineyard_02:0 "Grand vignoble"
 building_agot_vineyard_02_desc:0 "Un vignoble de plus grande taille pour cultiver de nombreux cépages afin de produire de nombreux millésimes."
 building_agot_vineyard_03:0 "Vignoble exceptionnel"
 building_agot_vineyard_03_desc:0 "Connu aux quatre coins du monde, tout ce qui est produit ici surclasse en tout point la concurrence."
 building_type_agot_dye_works_01:0 "Ateliers de teinture"
 building_type_agot_dye_works_01_desc:0 "De nombreuses grandes villes et grosses fortunes se sont bâties grâce à la teinture, produite à partir des escargots."
 building_agot_dye_works_01:0 "Collecteurs d'escargots"
 building_agot_dye_works_01_desc:0 "La collecte d'escargots sur les côtes avoisinantes n'est que la première étape de cette nouvelle industrie de la teinture, qui ne tardera pas à devenir florissante."
 building_agot_dye_works_02:0 "Guildes de pigment"
 building_agot_dye_works_02_desc:0 "Malgré des débuts modestes, les teinturiers se sont organisés en de véritables guildes, offrant une considérable puissance économique et politique."
 building_agot_dye_works_03:0 "Ordre des teinturiers"
 building_agot_dye_works_03_desc:0 "L'Ordre des teinturiers est sans conteste l'une des organisations les plus puissantes qui soient sur le plan économique, et son influence va bien au-delà des frontières de leurs propriétés."
 building_type_agot_lighthouse_01:0 "Phare"
 building_type_agot_lighthouse_01_desc:0 "Tous les ports dignes de ce nom se doivent d'avoir un phare pour guider les navires."
 building_agot_lighthouse_01:0 "Petit phare"
 building_agot_lighthouse_01_desc:0 "Petit, mais adapté pour un havre de moindre importance afin de s'assurer que les navires arrivent à bon port."
 building_agot_lighthouse_02:0 "Phare régionale"
 building_agot_lighthouse_02_desc:0 "Ce phare est le centre névralgique du commerce naval de la région."
 building_agot_lighthouse_03:0 "Phare illustre"
 building_agot_lighthouse_03_desc:0 "Cette merveille architecturale accueille des navires venus de tout horizon, qu'il s'agisse de Braavos, Qarth et même au-delà."
 building_type_agot_glass_gardens_01:0 "Jardins de verre"
 building_type_agot_glass_gardens_01_desc:0 "Exploitant la chaleur des sources chaudes, des jardins abrités sous un toit de verre ont été construits et permettent de faire pousser des plantations peu importe le climat, aussi bien en été qu'en hiver."
 building_agot_glass_gardens_01:0 "Sources chaudes naturelles"
 building_agot_glass_gardens_01_desc:0 "La présence de sources chaudes à l’intérieur des murs du château confère à ce dernier un réel avantage pour résister à l’hiver et aux sièges."
 building_agot_glass_gardens_02:0 "Tuyauterie d'eau chaude"
 building_agot_glass_gardens_02_desc:0 "Grâce à une ingénierie minutieuse, il est désormais possible d'acheminer l'eau des sources chaudes vers les murs du château, les chauffant tout au long de l'hiver."
 building_agot_glass_gardens_03:0 "Jardins de verre"
 building_agot_glass_gardens_03_desc:0 "Exploitant la chaleur des sources chaudes, des jardins abrités sous un toit de verre ont été construits et permettent de faire pousser des plantations peu importe le climat, aussi bien en été qu'en hiver."
 building_type_agot_scholastic_guilds_01:0 "Guildes scolastiques"
 building_type_agot_scholastic_guilds_01_desc:0 "Malgré sa riche histoire et ses grands accomplissements, Essos ne possède pas l'une des plus grandes forces de Westeros, à savoir l'Ordre des Mestres de la Citadelle, dédié à l'apprentissage dans tous domaines. En réponse à ce manque, de nombreux dirigeants d'Essos vont financer des guildes scolastiques locales pour approfondir les connaissances et parfaire l'apprentissage au sein de leurs terres."
 building_agot_scholastic_guilds_01:0 "Bibliothèque"
 building_agot_scholastic_guilds_01_desc:0 "Suite à un financement, la guilde scolastique locale a construit une bibliothèque afin d'approfondir ses recherches et son savoir."
 building_agot_scholastic_guilds_02:0 "Académie"
 building_agot_scholastic_guilds_02_desc:0 "La guilde scolastique ayant suffisamment gagné en taille, elle peut maintenant accueillir des étudiants dans une académie afin d'enseigner à autrui le savoir et les vérités qu'ils ont acquis."
 building_agot_scholastic_guilds_03:0 "Observatoire"
 building_agot_scholastic_guilds_03_desc:0 "Grâce à l'acquisition de quelques yeux de Myr, la guilde scolastique a achevé un observatoire, utilisant ces lentilles pour parfaire son étude du ciel et des étoiles."
 TOOLTIP_SCHOLASTIC_GUILDS_03:0 "Il vous manque suffisamment d'érudits pour vous rendre à [GetTitleByKey('b_myr').GetNameNoTier] et en inviter quelques uns"
 building_type_agot_slave_diplomacy_01:0 "Maisons de plaisirs"
 building_type_agot_slave_diplomacy_01_desc:0 "Les esclaves peuvent être formés dans bon nombre de domaines, mais c'est dans celui de l'amour et de la luxure qui les rendent célèbres à travers le monde."
 building_agot_slave_diplomacy_01:0 "Lits d'esclaves"
 building_agot_slave_diplomacy_01_desc:0 "Les esclaves-de-lit sont particulièrement utiles lorsqu'il s'agit d'évacuer le stress ou de mettre à l'aise les dignitaires venus de contrées lointaines."
 building_agot_slave_diplomacy_02:0 "La méthode des sept soupirs"
 building_agot_slave_diplomacy_02_desc:0 "Les esclaves que l'on trouve ici sont formés à la méthode des sept soupirs, apportant relaxation et revigoration à leurs bienfaiteurs."
 building_agot_slave_diplomacy_03:0 "Les seize postures d'extase"
 building_agot_slave_diplomacy_03_desc:0 "Ici, on ne trouve pas de simples esclaves formés à donner du plaisir, mais des artistes qui ont perfectionné l'usage des seize postures d'extase, faisant ainsi la renommée de l'établissement à travers le monde."
 building_type_agot_slave_stewardship_01:0 "Places de marchés"
 building_type_agot_slave_stewardship_01_desc:0 "Ce que l'Histoire nous enseigne c'est que la traite d'esclaves a toujours été une source d'enrichissement pour de nombreuses cités et de nombreux empires à travers le monde."
 building_agot_slave_stewardship_01:0 "Geôles d'esclaves"
 building_agot_slave_stewardship_01_desc:0 "Qui dit vente de marchandise, dit lieu pour entreposer la marchandise, et lorsqu'il s'agit d'esclaves, le plus simple reste encore des geôles."
 building_agot_slave_stewardship_02:0 "Tribunes aux enchères"
 building_agot_slave_stewardship_02_desc:0 "Lorsque l'on souhaite maximiser les gains, le mieux est encore de donner aux clients la possibilité de faire grimper les prix."
 building_agot_slave_stewardship_03:0 "Infrastructures commerciales"
 building_agot_slave_stewardship_03_desc:0 "Un commerce lucratif amène à de plus hautes ambitions, et les simples marchés se transforment en d'imposantes structures où le mercantilisme règne en maître."
 building_type_agot_slave_martial_01:0 "Places de la guerre"
 building_type_agot_slave_martial_01_desc:0 "L'utilisation de soldats esclaves est une chose qui remonte à des temps immémoriaux. Maints empires ont été érigés grâce aux lances maniées par des hommes dont l'obéissance n'était pas un choix."
 building_agot_slave_martial_01:0 "Place du Châtiment"
 building_agot_slave_martial_01_desc:0 "La Place du Châtiment doit son nom aux multiples sévices que subissent les esclaves nouvellement formés pour devenir soldats."
 building_agot_slave_martial_02:0 "Place de la Patience"
 building_agot_slave_martial_02_desc:0 "Les esclaves que l'on trouve ici ont été formés pendant de nombreuses années en vue d'en faire des soldats à l'obéissance sans équivoque. Les ordres qui leur sont donnés seront exécutés sans la moindre hésitation."
 building_agot_slave_martial_03:0 "Place de la Fierté"
 building_agot_slave_martial_03_desc:0 "Sur la Place de la Fierté ne sont exposés que les meilleurs soldats esclaves qui soient. Ceux, et seulement ceux qui auront survécu à toutes les épreuves qu'impliquent leurs entraînements, en plus d'avoir prouvé leur valeur sur le champ de bataille, seront dignes d'être exhibés ici."
 building_type_agot_slave_learning_01:0 "Académies des eunuques"
 building_type_agot_slave_learning_01_desc:0 "Les esclaves ici se consacrent à diverses activités savantes selon les besoins de leurs maîtres."
 building_agot_slave_learning_01:0 "Prêtres esclaves"
 building_agot_slave_learning_01_desc:0 "Même les prêtres sont esclaves, sinon des hommes, du moins des dieux."
 building_agot_slave_learning_02:0 "Archives des temples"
 building_agot_slave_learning_02_desc:0 "Les esclaves des temples ont pour devoir de conserver et d'entretenir les archives qui s'y trouvent, dont certaines remontent à plusieurs millénaires."
 building_agot_slave_learning_03:0 "Activités savantes"
 building_agot_slave_learning_03_desc:0 "Les esclaves se consacrent corps et âme aux multiples activités liées à la connaissance afin de parfaire le savoir contenu au sein des académies."
 building_type_agot_slave_intrigue_01:0 "Des yeux et des oreilles"
 building_type_agot_slave_intrigue_01_desc:0 "La multiplicité du nombre d'esclaves entraîne bien entendu une multiplicité du nombre d'yeux et d'oreilles que l'on trouve alentours, qui sont autant d'outils utiles pour recueillir les secrets d'autrui."
 building_agot_slave_intrigue_01:0 "Serviteurs esclaves"
 building_agot_slave_intrigue_01_desc:0 "Les esclaves sont nombreux dans le sillage de ceux qui sont au pouvoir. Les oreilles écoutent et les langues se délient lorsque l'odeur de l'or se fait sentir."
 building_agot_slave_intrigue_02:0 "Souris à l'écoute"
 building_agot_slave_intrigue_02_desc:0 "L'on dit que les murs ont des oreilles, mais cette croyance populaire vient peut-être de ceux qui ont élu domiciles dans les murs."
 building_agot_slave_intrigue_03:0 "Oiseaux aux aguets"
 building_agot_slave_intrigue_03_desc:0 "Plus que des murs ayant des oreilles, il faut se méfier des oiseaux qui ont des yeux. Les secrets n'en sont plus lorsqu'ils sont découverts avant même leur prolifération."
 building_type_wilderness_01:0 "Étendue sauvage"
 building_type_wilderness_01_desc:0 "Ces terres recélant bien des dangers, elles sont impropres à être habitables. Il leur faudra donc d'abord être domptées par d'intrépides colons pour qu'une culture puisse y prospérer, et permettre à un souverain d'y brandir son blason."
 building_wilderness_01:0 "Étendue sauvage"
 building_wilderness_01_desc:0 "Ces terres recélant bien des dangers, elles sont impropres à être habitables. Il leur faudra donc d'abord être domptées par d'intrépides colons pour qu'une culture puisse y prospérer, et permettre à un souverain d'y brandir son blason."
 building_wolf_den:0 "Meutes de loups sauvages"
 building_wolf_den_desc:0 "De féroces loups sauvages parcourent ces contrées, traquant et chassant aussi bien les plus preux que les plus fous qui traversent leur territoire."
 building_type_wolf_den:0 "Faune"
 building_wolf_den_cleared:0 "Prolifération endiguée"
 building_wolf_den_cleared_desc:0 "Les loups qui proliféraient ayant été chassés, ces contrées en deviennent plus sûres et le développement va pouvoir poursuivre son cours.\n\n#V Occupez vous de tous les [colonization_blockers|El] de la région pour pouvoir améliorer votre colonie.#!"
 building_bear_den:0 "Tanières d'ours"
 building_bear_den_desc:0 "De grands et redoutables ours ont fait de ces contrées leur foyer et ils en protègeront farouchement le territoire contre tout intrus."
 building_type_bear_den:0 "Faune"
 building_bear_den_cleared:0 "Prolifération endiguée"
 building_bear_den_cleared_desc:0 "La menace que représentaient les ours ayant été réglée, ces contrées en deviennent plus sûres et le développement va pouvoir poursuivre son cours.\n\n#V Occupez vous de tous les [colonization_blockers|El] de la région pour pouvoir améliorer votre colonie.#!"
 building_flooded_lands:0 "Zone fortement inondée"
 building_flooded_lands_desc:0 "Ces contrées sont sujettes aux inondations, provoquant la destruction de tout ce qui s'y trouve, naturel comme artificiel."
 building_type_flooded_lands:0 "Inondation"
 building_flooded_lands_cleared:0 "Mesures anti-inondations"
 building_flooded_lands_cleared_desc:0 "La construction de diverses structures visant à endiguer les fréquentes inondations de ces contrées a permis de rendre celles-ci plus propices à la colonisation.\n\n#V Occupez vous de tous les [colonization_blockers|El] de la région pour pouvoir améliorer votre colonie.#!"
 building_bandits:0 "Activité criminelle"
 building_bandits_desc:0 "Nombreux sont les malandrins à parcourir ces contrées, et cette nuisance représente un danger certain autant pour les voyageurs occasionnels que les colons qui souhaitent s'installer ici."
 building_type_bandits:0 "Banditisme"
 building_bandits_cleared:0 "Ordre restauré"
 building_bandits_cleared_desc:0 "La vaste majorité des brigands qui sévissaient dans ces contrées ont été traduits en justice ou ont fui de peur de l'être, permettant d'offrir aux colons un semblant de paix toute relative.\n\n#V Occupez vous de tous les [colonization_blockers|El] de la région pour pouvoir améliorer votre colonie.#!"
 building_dense_growth:0 "Végétation dense"
 building_dense_growth_desc:0 "Parfois le problème le plus épineux que l'on puisse rencontrer durant la traversée d'une région n'est autre que la végétation elle-même. Des enchevêtrements de plantes pouvant créer de véritables murailles qui s'étendent sur plusieurs lieues."
 building_type_dense_growth:0 "Flore"
 building_dense_growth_cleared:0 "Déboisement"
 building_dense_growth_cleared_desc:0 "La végétation ayant été largement éclaircie, la traversée de ces contrées s'en trouve facilitée, et le développement aussi par la même occasion.\n\n#V Occupez vous de tous les [colonization_blockers|El] de la région pour pouvoir améliorer votre colonie.#!"
 building_pirate_remnants:0 "Vestiges pirates"
 building_pirate_remnants_desc:0 "Le gros de la piraterie qui existait ici a été dispersé, pour autant il en demeure quelques vestiges persistants dans la région. Des mathurins isolés, guère plus que du menu fretin, mais qui s'attaquent encore et toujours à la populace imprudente, perturbant autant le commerce que les efforts de colonisation."
 building_type_pirate_remnants:0 "Pirates"
 building_pirate_remnants_cleared:0 "Pirates hors d'état de nuire"
 building_pirate_remnants_cleared_desc:0 "Les derniers pirates ont été boutés, hors de ces eaux ou hors de cette vie, assurant ainsi la sécurité des voies maritimes et terrestres aux colons et marchands désormais plus sereins.\n\n#V Occupez vous de tous les [colonization_blockers|El] de la région pour pouvoir améliorer votre colonie.#!"
 building_type_settlement_01:0 "Colonie"
 building_type_settlement_01_desc:0 "Permet l'exploitation des étendues sauvages en réduisant partiellement les effets des aléas environnants."
 building_settlement_01:0 "Habitations reculées"
 building_settlement_01_desc:0 "Des hameaux émaillent le paysage, permettant d'offrir de modestes logis aux valeureux colons venus braver les éléments."
 building_settlement_02:0 "Cantonnement isolé"
 building_settlement_02_desc:0 "Le développement progressif de la région attire de plus en plus de nouveaux futurs habitants, permettant d'accroître l'activité humaine aux dépens des étendues encore sauvages."
 building_settlement_03:0 "Colonie en plein essor"
 building_settlement_03_desc:0 "La région bourdonne d'activité et l'excitation est à son comble, tandis que la nature se fait moins sauvage et donc moins envahissante."
 building_stockades_01:0 "Palissades"
 building_stockades_01_desc:0 "Parfois, une simple palissade est tout ce qui sépare la civilisation de la nature sauvage et indomptable, et ce, malgré qu'il s'agisse d'une piètre protection contre les attaques d'ennemis organisés."
 building_type_stockades_01:0 "Palissades"
 building_type_stockades_01_desc:0 "Parfois, une simple palissade est tout ce qui sépare la civilisation de la nature sauvage et indomptable, et ce, malgré qu'il s'agisse d'une piètre protection contre les attaques d'ennemis organisés."
 building_trading_outposts_01:0 "Avant-postes commerciaux"
 building_trading_outposts_01_desc:0 "Les avant-postes commerciaux offrent aux colons et aux commerçants un lieu d'échange pour acheter et vendre des biens produits et demandés par la colonie."
 building_type_trading_outposts_01:0 "Avant-postes commerciaux"
 building_type_trading_outposts_01_desc:0 "Les avant-postes commerciaux offrent aux colons et aux commerçants un lieu d'échange pour acheter et vendre des biens produits et demandés par la colonie."
 building_local_militia_01:0 "Milice locale"
 building_local_militia_01_desc:0 "La milice locale, composée de robustes soldats des frontières, s'entraîne et stocke ses armes ici même. Leur faible nombre est compensé par leur férocité et leur vaillance."
 building_type_local_militia_01:0 "Milice locale"
 building_type_local_militia_01_desc:0 "La milice locale, composée de robustes soldats des frontières, s'entraîne et stocke ses armes ici même. Leur faible nombre est compensé par leur férocité et leur vaillance."
 building_construction_guilds_01:0 "Guildes d'architectes"
 building_construction_guilds_01_desc:0 "Constructeurs qualifiés et habiles artisans sont invités à s'installer dans la colonie pour y apporter leur expertise, ô combien importante pour le bon développement des colonies qui partent de zéro."
 building_type_construction_guilds_01:0 "Guildes d'architectes"
 building_type_construction_guilds_01_desc:0 "Constructeurs qualifiés et habiles artisans sont invités à s'installer dans la colonie pour y apporter leur expertise, ô combien importante pour le bon développement des colonies qui partent de zéro."
