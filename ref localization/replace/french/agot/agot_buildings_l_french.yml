 building_type_agot_iron_island_mines_01:1 "Mines des Îles de Fer"
 building_type_agot_iron_island_mines_01_desc:1 "Nonobstant que les Îles de Fer ne soient pas une figure de richesse à Westeros, on y trouve du fer et d'autres métaux non précieux, et si leur exploitation se fait dans des conditions déplorables et fortement dangereuses, l'utilisation de serfs permet de contourner le problème en limitant les coûts humains, et donc financiers."
