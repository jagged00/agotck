 lmf_extoll_spymaster:0 "un[ROOT.GetCharacter.Custom('FR_E')] [ROOT.GetCharacter.GetWomanMan] versé[ROOT.GetCharacter.Custom('FR_E')] dans l'art des complots et des machinations, parfait[ROOT.GetCharacter.Custom('FR_E')] pour officier à votre cour en tant que [second.GetCouncillorPosition( 'councillor_spymaster' ).GetPositionName|l]."
