 lmf_lover.101.t:0 "Vienne l'aube et le doute"
 lmf_lover.101.desc.start:0 "Un fin rayon de soleil vient m'extirper des contrées oniriques, et alors que j'espérais me retrouver dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], enlaçant dès mon réveil une beauté dépossédée d'atours superflus, la couche y est vide. [lover.GetFirstName] ne me fait même pas grâce d'un regard, préférant se tourner vers le lointain où s'égarent ses pensées. Attitude pour le moins étrange venant de [lover.Custom('FR_CeluiCelle')] qui, hier encore, me chevauchait grand train et avec entrain.\n\nAprès quelques mièvretés pour entamer le dialogue, j'obtiens réponse à mes interrogations :\n\n"
 lmf_lover.101.desc.soulmate:0 "« [ROOT.Char.Custom('LoverPetName_possessive')|U], jamais je n'ai aimé quelqu'un comme je vous aime. Mais bien qu'il n'y ait nulle fausseté dans ces paroles, "
 lmf_lover.101.desc.lover:0 "« Je ne suis point mécontent[lover.Custom('FR_E')] de notre #italic relation#!, bien au contraire… cependant… "
 lmf_lover.101.desc.samesex:0 "vous n'êtes pas sans savoir que l'amour, si fort soit-il, entre deux [ROOT.Char.GetWomenMen], est proscrit. "
 lmf_lover.101.desc.incest:0 "le sang que nous avons en commun et qui nous rapproche, est également ce qui nous sépare. Notre amour est impossible. "
 lmf_lover.101.desc.lover.married:0 "comment oublier l'existence de m[lover_spouse.Custom('FR_OnA')] épou[lover_spouse.Custom('FR_XSe')], [lover_spouse.Custom('FR_le_Char_Pi')][lover_spouse.GetTitledFirstName] ? "
 lmf_lover.101.desc.married:0 "comment oublier l'existence de votre épou[my_spouse.Custom('FR_XSe')], [my_spouse.Custom('FR_le_Char_Pi')][my_spouse.GetTitledFirstName] ? "
 lmf_lover.101.desc.both.married:0 "dois-je vous rappeler que nous avons prononcés des vœux ? Que faites vous [my_spouse.Custom('FR_du_Char_Pi')][my_spouse.GetTitledFirstName] et [lover_spouse.Custom('FR_du_Char_Pi')][lover_spouse.GetTitledFirstName] ? "
 lmf_lover.101.desc.not.married:0 "notre amour libertin n'a pas été scellé par les liens sacrés du mariage. "
 lmf_lover.101.desc.ruler:0 "vous êtes [ROOT.Char.GetTitleAsNameNoTooltip|l], vous gouvernez [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]. Et moi, que suis-je en comparaison ? "
 lmf_lover.101.desc.nobility:0 "ne nous voilons pas la face. Nous connaissons la triste vérité. Celle qui m'a fait naître comme vulgaire [lover.GetWomanMan] du commun. "
 lmf_lover.101.desc.default:0 "» dit-[lover.Custom('FR_IlElle')] en marquant une courte pause. « "
 lmf_lover.101.desc.secret:0 "Que se passerait-il si quelqu'un venait à découvrir notre passion tenue secrète ? »\n\n"
 lmf_lover.101.desc.public:0 "Chaque jour je vois et j'endure les regards de tout un chacun. Et croyez bien qu'ils sont nombreux ! »\n\n"
 lmf_lover.101.desc.end:0 "Mes efforts pour [lover.Custom('FR_LeLa')] rassurer sont néantisés par une angoisse qu'[lover.Custom('FR_IlElle')] explicite en quelques mots : « Où cette relation est censée nous mener ? »"
 lmf_lover.101.a:0 "Qu'importe la destination, tant qu'elle mène à votre bonheur, [lover.Custom('LoverPetName_possessive')]."
 lmf_lover.101.b:0 "Sur les chemins de l'extase, assurément."
 lmf_lover.101.c:0 "Où qu'elle nous mène, nous irons ensemble, [lover.Custom('LoverPetName_possessive')] !"
 lmf_lover.101.d:0 "Vous vous faites beaucoup de mouron pour si peu, m[lover.Custom('FR_OnA')] ch[lover.Custom('FR_ErEre')]."
 lmf_lover_promise_tt:0 "#italic [lover.GetFirstNameNoTooltip] y verra la promesse d'un investissement plus profond de votre part dans votre relation avec [lover.Custom('FR_LuiElle')]#!"
 lmf_lover_no_promise_tt:0 "#italic [lover.GetFirstNameNoTooltip] comprendra que votre relation n'est en rien sérieuse pour vous#!"
 lmf_lover.102.t:0 "Fleure l'amour les jardins de l'amant[ROOT.Char.Custom('FR_E')]"
 lmf_lover.102.desc.start:0 "L'endroit est plaisant, pour l'intérêt qu'il suscite aux yeux — certes moins que [lover.GetFirstName] — mais aussi pour ses multiples recoins où les regards indiscrets ne sont point invités. Je reprends encore mon souffle alors que la sueur ruisselle comme une rosée abondante sur le corps de [lover.GetFirstNameNoTooltip], [lover.Custom('FR_LequelLaquelle')] a su faire grand usage de sa [Select_CString(lover.IsFemale,'souplesse','force')]. [lover.Custom('FR_IlElle')|U] me gâte d'un sourire, mais qui n'est que la moindre des gâteries qui m'a été offerte dans ces jardins.\n\n« À quoi pensez-vous ? » demande-t-[lover.Custom('FR_IlElle')] en badinant, tandis que je rétorque sans bredouiller : « Où cela nous mène-t-il ? »\n\nMa confession à l'égard de notre relation suscite une réponse facétieuse de sa part : « Le voyage n'est-il pas préférable à la destination ? "
 lmf_lover.102.desc.married:0 "N'oubliez pas votre épou[my_spouse.Custom('FR_XSe')], [ROOT.Char.Custom('FR_MonseigneurMadame')]. "
 lmf_lover.102.desc.theymarried:0 "N'oubliez pas m[lover_spouse.Custom('FR_OnA')] épou[lover_spouse.Custom('FR_XSe')], [ROOT.Char.Custom('FR_MonseigneurMadame')]. "
 lmf_lover.102.desc.samesex:0 "Deux [ROOT.Char.GetWomenMen] qui trouvent du plaisir chez l'autre, voilà ce que nous sommes. "
 lmf_lover.102.desc.incest:0 "Malgré toutes nos frasques je reste votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))]. "
 lmf_lover.102.desc.end:0 "Mais pour être tout à fait honnête, je n'imaginais pas tout ceci aller plus loin que notre #italic première fois#!, mais le sujet étant maintenant sur la table, je vous le demande, où cette relation est censée nous mener ? »"
 lmf_lover.102.a:0 "Qu'importe la destination, tant qu'elle mène à votre bonheur, [lover.Custom('LoverPetName_possessive')]."
 lmf_lover.102.b:0 "Sur les chemins de l'extase, assurément."
 lmf_lover.102.c:0 "Où qu'elle nous mène, nous irons ensemble, [lover.Custom('LoverPetName_possessive')] !"
 lmf_lover.102.d:0 "À bien y réfléchir, nulle part en fait."
 lmf_lover.103.t:0 "Ébats et débats"
 lmf_lover.103.desc.start:0 "Toutes ces perles suintantes sur nos corps, [lover.GetFirstName] et moi, ne suffiraient pas à éteindre le feu qui embrase encore notre chair. Ce n'est que pour reprendre notre souffle que nous restons seulement allongé[ROOT.Char.Custom2('FR_E', SCOPE.sC('lover'))]s l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('lover'))] à côté de l'autre, mes doigts glissant le long de ses courbes, lesquelles dessinent des fleuves d'extase où coulent le flot de notre passion. Je pourrais voguer sur ces eaux pour les heures à venir, mais je suis emporté[ROOT.Char.Custom('FR_E')] par un autre courant, celui de la curiosité, et il attise mon interrogation :\n\n« Êtes-vous heureu[lover.Custom('FR_XSe')] ? Pas simplement de la soirée j'entends, mais de nous. »\n\n« Nous ? » demande-t-[lover.Custom('FR_IlElle')] en badinant, tandis que je rétorque en badinant à mon tour : « Vous. Moi. Nous. »\n\nSa réponse ne tarde pas à se faire connaître : « Heureu[lover.Custom('FR_XSe')] d'être votre "
 lmf_lover.103.desc.secret:0 "amant[lover.Custom('FR_E')] secr[lover.Custom('FR_EtEte')], vous voulez dire ? "
 lmf_lover.103.desc.public:0 "amant[lover.Custom('FR_E')], au vu et au su de tous ? "
 lmf_lover.103.desc.end:0 "Je n'éprouve nulle honte à cela, et je suis heureu[lover.Custom('FR_XSe')]. Autant que je puisse l'être en tout cas. Et vous, m[lover.Custom2('FR_LMF_RelationToMeShort_OnA', ROOT.Char )], l'êtes-vous ? »\n\nMoi qui suit l'instigat[ROOT.Char.Custom('FR_EurRice')] de cette conversation sur le tard, je me retrouve démuni[ROOT.Char.Custom('FR_E')] face à mes propres interrogations. La réponse se faisant attendre, [lover.GetFirstNameNoTooltip] insiste en formulant l'énoncé autrement : « Où cette relation est censée nous mener ? »"
 lmf_lover.103.a:0 "Qu'importe la destination, tant qu'elle mène à votre bonheur, [lover.Custom('LoverPetName_possessive')]."
 lmf_lover.103.b:0 "Sur les chemins de l'extase, assurément. Et j'en suis fort aise."
 lmf_lover.103.c:0 "Où qu'elle nous mène, nous irons ensemble, [lover.Custom('LoverPetName_possessive')] !"
 lmf_lover.103.d:0 "Je ne cherche pas à aller quelque part, juste à profiter de l'instant."
 lmf_lover.104.t:0 "Tombe la nuit, brûle l'envie"
 lmf_lover.104.desc.start:0 "Les ébats sont toujours plus enflammés lorsque la passion qui les anime est encore grandissante. On baise tout notre soûl et la coupe n'est jamais pleine. On fornique jusqu'à pas d'heure et on redoute seulement le point du jour pour nous rappeler à l'ordre.\n\nC'est dans cet esprit que la nuit s'est engagée avec [lover.GetFirstName], mais dans l'entracte de deux étreintes, la sueur encore dégoulinante sur nos corps dénudés, je vois une pointe de réticence dans son regard. Comme de bien entendu, je m'interroge : #italic ai-je été trop fougueu[ROOT.Char.Custom('FR_XSe')] ?#! #bold Ou peut-être pas assez ?#! Je lui susurre quelques mots, je lui soumet la question, et [lover.Custom('FR_IlElle')] me répond ceci :\n\n"
 lmf_lover.104.desc.end:0 "Que voilà des mots devenus familiers, autant que cette situation. Je laisse échapper un sourire badin, qui suscite une vive réaction de la part de [lover.GetFirstNameNoTooltip] : « Je veux savoir… j'ai #bold besoin#! de savoir… Où cette relation est censée nous mener ? »"
 lmf_lover.105.t:0 "Toutes les bonnes choses ont une fin"
 lmf_lover.105.desc:0 "Alors que je m'adonne à l'une de mes grandes passions, [ROOT.Char.Custom('IdleActivity')], le fil de mes pensées amène jusqu'à moi la souvenance de [lover.GetFirstName].\n\nIl est curieux de réaliser que l'amour, quelle que soit sa nature, puisse se fragiliser jusqu'à ne plus supporter le poids de la vérité. Nombreuses sont les raisons que je pourrais énumérer, mais plus encore, ruminer, pour expliquer cette fragilité, #italic mais à quoi bon ?#! Parfois, il est simplement préférable de lâcher prise.\n\nQuoi que nous ayons vécus, [lover.GetFirstNameNoTooltip] et moi, cela appartient désormais au passé…"
 lmf_lover.105.a:0 "Un jour l'amour est là, un jour l'amour est loin…"
 lmf_lover.1000.t:0 "The Bliss of a Soulmate"
 lmf_lover.1000.desc.army:0 "In a rare moment of peace today, once the army was settled into camp, [lover.GetFirstNameNoTooltip] came to find me.\n\n"
 lmf_lover.1000.desc.travel:0 "We'd settled down into our tents for the day, all but exhausted, when [lover.GetFirstNameNoTooltip] came to find me.\n\n"
 lmf_lover.1000.desc.activity:0 "I took a break from our busy schedule in the afternoon, strolling around the courtyard in [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], when I looked up and saw [lover.GetFirstNameNoTooltip] standing nearby.\n\n"
 lmf_lover.1000.desc.notlocal:0 "[lover.GetFirstNameNoTooltip] came to visit me in [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] today, a pleasant surprise to say the least.\n\n"
 lmf_lover.1000.desc.local:0 "I was strolling around the courtyard in [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] today, all but lost in thought, when I looked up and saw [lover.GetFirstNameNoTooltip] standing nearby.\n\n"
 lmf_lover.1000.desc.end:0 "I smiled the moment I saw [lover.GetHerHim], and [lover.GetSheHe] responded in kind. Almost without a word, we fell in beside each other and walked about. Anyone who spotted us would be easily forgiven to think we were nothing more than good friends, but of course [lover.GetFirstNameNoTooltip] means far more to me than that.\n\n[lover.GetSheHe|U] listened carefully as I complained about my various problems, offering little in the way of advice but more of a means for me to vent. At every heavy sigh, [lover.GetSheHe] would gently chuckle and, somehow, I felt better.\n\nBefore I knew it, hours had passed, and yet still I wasn't tired of [lover.GetHerHis] company. This, I suppose, is what it means to have a true soulmate."
 lmf_lover.1000.a:0 "I will never get tired of this."
 lmf_lover.1005.t:0 "My [lover_trait.GetNameNoTooltip( ROOT.Char )|U] Soulmate"
 lmf_lover.1005.desc.sinful:0 "It's been suggested that, over our years together, [lover.GetFirstNameNoTooltip] can be a bad influence on me"
 lmf_lover.1005.desc.good:0 "It's been suggested that, over our years together, [lover.GetFirstNameNoTooltip] has been a good influence on me"
 lmf_lover.1005.desc.normal:0 "It's been suggested that, over our years together, [lover.GetFirstNameNoTooltip] has had a strong influence on me"
 lmf_lover.1005.desc.mid:0 "... and there's some truth to that.\n\n[lover.GetSheHe|U] is rather [lover_trait.GetNameNoTooltip( ROOT.Char )|l], for instance, "
 lmf_lover.1005.desc.opposite:0 "while I, in contrast, am  [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. It's a point of contention in our relationship which manifests itself in small ways, for while [lover.GetFirstNameNoTooltip] has never tried to change me I can tell [lover.GetSheHe] disapproves.\n\n"
 lmf_lover.1005.desc.notopp:0 "and while [lover.GetFirstNameNoTooltip] has never tried to change me, still I feel [lover.GetHerHis] influence in the subtle looks and occasional frowns.\n\n"
 lmf_lover.1005.desc.end:0 "I often find myself changing how I act whenever we're together. Such is our bond that I don't truly mind, as becoming more alike feels natural... but is this what I want? To become more [lover_trait.GetNameNoTooltip( ROOT.Char )|l], as [lover.GetSheHe] is?\n\nIf I stand my ground, it stands to reason that this "
 lmf_lover.1005.desc.opposite2:0 "point of contention could grow until it's an actual problem. Yet are our differences not what drew us together in the first place?"
 lmf_lover.1005.desc.notopp2:0 "could grow until it's an actual point of contention in our relationship. Or am I perhaps over-analyzing what should not even be an issue in the first place?"
 lmf_lover.1005.a:0 "Let it happen."
 lmf_lover.1005.b:0 "No, I am who I am, and that's not changing."
 lmf_lover.1005.b.tt:0 "Your differences grow"
 lmf_lover.1010.t:0 "My [lover_trait.GetNameNoTooltip( ROOT.Char )|U] Influence"
 lmf_lover.1010.desc.sinful:0 "It's been suggested that, over our years together, I've been a bad influence on [lover.GetFirstNameNoTooltip]"
 lmf_lover.1010.desc.good:0 "It's been suggested that, over our years together, I've been a good influence on [lover.GetFirstNameNoTooltip]"
 lmf_lover.1010.desc.normal:0 "It's been suggested that, over our years together, I've had a strong influence on [lover.GetFirstNameNoTooltip]"
 lmf_lover.1010.desc.mid:0 "... and there's some truth to that.\n\nI am often rather [lover_trait.GetNameNoTooltip( ROOT.Char )|l], for instance, "
 lmf_lover.1010.desc.opposite:0 "while [lover.GetSheHe], in contrast, is  [lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]. It's a point of contention in our relationship which manifests itself in small ways, for while I've never made any effort to change [lover.GetHerHim], [lover.GetSheHe] can tell I disapprove.\n\n"
 lmf_lover.1010.desc.notopp:0 "and while I've never made any effort to change [lover.GetHerHim], it's clear [lover.GetSheHe] feels the influence of my subtle looks and occasional frowns.\n\n"
 lmf_lover.1010.desc.end:0 "More and more, [lover.GetFirstNameNoTooltip] has been changing the way [lover.GetSheHe] acts whenever we're together. To please me, I think, and to keep our differences from growing into a point of contention in our relationship, though I would never ask [lover.GetHerHim] to do such. Such is our bond that [lover.GetSheHe] doesn't complain, and I truly believe this is causing a deeper change... one that can only bring us even closer together, in time."
 lmf_lover.1010.a:0 "I love [lover.GetHerHim] so much for this."
 lmf_lover.1015.t:0 "An Elopement?"
 lmf_lover.1015.desc.start:0 "I should have known [lover.GetSheHe] had something planned the moment [lover.GetFirstNameNoTooltip] appeared by the grin on [lover.GetHerHis] face.\n\n\"Let's elope,\" [lover.GetSheHe] announced, with utter certainty.\n\n"
 lmf_lover.1015.desc.bold:0 "[lover.GetFirstNameNoTooltip] had always been bold, but this was quite something else.\n\n"
 lmf_lover.1015.desc.irrational:0 "[lover.GetFirstNameNoTooltip] had always been a little irrational, truth be told, but this was on quite another level.\n\nI started to explain the various issues with [lover.GetHerHis] plan"
 lmf_lover.1015.desc.married:0 ", starting with my [my_spouse.GetWifeHusband], but [lover.GetSheHe] stopped me. \"Is [my_spouse.GetTitledFirstNameNoTooltip] your soulmate? No? Then there's nothing else to discuss, is there?\n\n"
 lmf_lover.1015.desc.them.married:0 ", starting with [lover.GetHerHis] [lover_spouse.GetWifeHusband], but [lover.GetSheHe] stopped me. \"Is [lover_spouse.GetTitledFirstNameNoTooltip] my soulmate? No? Then there's nothing else to discuss, is there?\n\n"
 lmf_lover.1015.desc.liege:0 ", starting with the fact [lover.GetHerHis] liege would no doubt oppose such a plan, but [lover.GetSheHe] stopped me. \"Is [lover.GetLiege.GetTitledFirstNameNoTooltip] my soulmate? No? Then there's nothing else to discuss, is there?\n\n"
 lmf_lover.1015.desc.default:0 ", but [lover.GetSheHe] stopped me. \"I am your soulmate. Is there truly anything else to discuss?\"\n\n"
 lmf_lover.1015.desc.end:0 "I had no quick answer to that. "
 lmf_lover.1015.desc.end.happy:0 "\"When we first fell in love, you said you'd do whatever it took to make me happy,\" [lover.GetSheHe] reminded me. \"#EMP This#! would make me happy.\""
 lmf_lover.1015.desc.end.meant:0 "\"When we first fell in love, you said we were meant to be together,\" [lover.GetSheHe] reminded me. \"So let's be together.\""
 lmf_lover.1015.desc.end.now:0 "\"Maybe we didn't start this relationship expecting to be where we are,\" [lover.GetSheHe] reminded me, \"but we're here! So let's be happy.\""
 lmf_lover.1015.a:0 "[lover.GetSheHe|U] makes an excellent point."
 lmf_lover.1015.b:0 "This isn't going to happen."
 lmf_lover.1020.t:0 "A Long Time Coming"
 lmf_lover.1020.desc.army:0 "[lover.GetFirstNameNoTooltip] joined me at the fire late in the evening, when the soldiers had gone to their tents and all was finally quiet.\n\n"
 lmf_lover.1020.desc.travel:0 "[lover.GetFirstNameNoTooltip] joined me at the fire today, late in the evening after the majority of our entourage had long since retired.\n\n"
 lmf_lover.1020.desc.activity:0 "After the busy events of the day wound to a close, [lover.GetFirstNameNoTooltip] found me in the garden.\n\n"
 lmf_lover.1020.desc.notlocal:0 "As I strolled the garden this afternoon, I discovered [lover.GetFirstNameNoTooltip] had made a special trip from [lover.GetCurrentLocation.GetNameNoTooltip] just to spend the day with me.\n\n"
 lmf_lover.1020.desc.local:0 "As I strolled the garden this afternoon, I was found and joined by [lover.GetFirstNameNoTooltip].\n\n"
 lmf_lover.1020.desc.desc:0 "I have to admit, I was pleased to see [lover.GetHerHim]. There was a time when I considered [lover.GetHerHim] merely a lover, but I told [lover.GetHerHim] back at the very beginning that our relationship was a special one and it turns out that was no lie, for it has indeed grown into something more.\n\nThe two of us talked for hours, and eventually the topic of our relationship was broached. [lover.GetFirstNameNoTooltip] hesitated, but I wondered if now was the time to explore if the two of us had, indeed, become soulmates after all."
 lmf_lover.1020.a:0 "I'll convince [lover.GetHerHim] our love is true!"
 lmf_lover.1020.a.success.tt:0 "[lover.GetFirstNameNoTooltip] is convinced"
 lmf_lover.1020.a.failure.tt:0 "[lover.GetFirstNameNoTooltip] isn't ready for this step"
 lmf_lover.1020.b:0 "No, it's best to leave things as they are."
 lmf_lover.1025.t:0 "Causerie et coucherie"
 lmf_lover.1025.desc.courtier.other:0 "[lover.GetFirstName] pénètre dans m[ROOT.Char.Custom('FR_GetChambersOrTent_OnA')]. [lover.Custom('FR_LuiElle')|U] qui a fait le trajet depuis [lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], "
 lmf_lover.1025.desc.courtier:0 "[lover.GetFirstName] pénètre dans m[ROOT.Char.Custom('FR_GetChambersOrTent_OnA')], et "
 lmf_lover.1025.desc:0 "laisse entrevoir un éclat malicieux dans son regard, alors que la soirée n'est ni consommée, ni même encore véritablement entamée.\n\n« J'ai quelque chose pour vous, [ROOT.Char.Custom('LoverPetName_possessive')], » badine-t-[lover.Custom('FR_IlElle')] en ôtant progressivement les couches de tissu superflu.\n\n« Je vois ça. »\n\n« Je parle d'un secret, murmure-t-[lover.Custom('FR_IlElle')] dans le creux de mon oreille, un secret entendu à la cour… »"
 lmf_lover.1025.a:0 "Oh, [lover.GetFirstNameNoTooltip], vous avez décidément moult talents..."
 lmf_lover.1030.t:0 "My Talented [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
 lmf_lover.1030.desc.start:0 "Sometimes it's easy to forget just how talented [lover.GetFirstNameNoTooltip] actually is.\n\n"
 lmf_lover.1030.desc.diplomacy:0 "Yet lately [lover.GetSheHe]'s been quite the help, sitting in bed and listening as I compose my correspondence to other rulers, and then offering the most insightful advice on how to amend my wording.\n\n"
 lmf_lover.1030.desc.martial:0 "Yet just the other day [lover.GetSheHe] noticed some papers on my desk that went into boring details on supplies for our levies, and offered some suggestions on improvements which were surprisingly helpful.\n\n"
 lmf_lover.1030.desc.stewardship:0 "Yet just the other day, as the two of us were lying in bed while I complained endlessly about the tax arrangements with my vassals, [lover.GetSheHe] off-handedly offered some suggestions which have improved those arrangements considerably.\n\n"
 lmf_lover.1030.desc.intrigue:0 "[lover.GetHerHis|U] eyes are ever watchful, pointing out certain deficiencies in my personal guard and pointing out which schemes in the court I should take notice of and how.\n\n"
 lmf_lover.1030.desc.learning:0 "[lover.GetSheHe|U] shows great interest in my ramblings about my latest obsessions, and will even offer helpful pointers from time to time, all drawn from [lover.GetHerHis] storehouse of knowledge.\n\n"
 lmf_lover.1030.desc.end:0 "At first I was resistant to accepting [lover.GetHerHis] help, fearing it might be inappropriate, but more and more I've decided it's simply prudent to accept the aid of a courtier who so clearly has my best interests at heart."
 lmf_lover.1030.a:0 "[lover.GetSheHe|U]'s amazing, isn't [lover.GetSheHe]?"
 lmf_lover.1035.t:0 "Les bons amants font les bons présents"
 lmf_lover.1035.desc.ruler:0 "Piqué[ROOT.Char.Custom('FR_E')] par la curiosité à l'annonce d'un messager arrivé tout droit de [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], je viens en personne à sa rencontre.\n\n"
 lmf_lover.1035.desc.notlocation:0 "Piqué[ROOT.Char.Custom('FR_E')] par la curiosité à l'annonce d'un messager arrivé tout droit de [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], je viens en personne à sa rencontre.\n\n"
 lmf_lover.1035.desc.location:0 "Piqué[ROOT.Char.Custom('FR_E')] par la curiosité à l'annonce d'une #italic visite formelle#! de la part d'un[lover.Custom('FR_E')] #italic invité[lover.Custom('FR_E')] de marque#!, je quitte mes appartements pour venir constater cela de mes propres yeux.\n\n"
 lmf_lover.1035.desc.courtier:0 "Alors que je traverse m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], j'aperçois dans [ROOT.Char.Custom('FR_GetCourtyard_Le')] une personne manifestement très enjoué[lover.Custom('FR_E')] en m'apercevant. Piqué[ROOT.Char.Custom('FR_E')] par la curiosité, je viens à sa rencontre.\n\n"
 lmf_lover.1035.desc.messenger:0 "Le messager me remet un sachet de pierres précieuses, lequel est accompagné d'une petite note :\n\n#EMP Un témoignage de mon affection. Si cela peut vous paraître excessif, sachez que ces cailloux n'ont point autant de valeur que vous.#!\n\nAucun nom ne figure sur la note, mais je n'en ai nullement besoin pour comprendre qui est m[lover.Custom('FR_OnA')] mystérieu[lover.Custom('FR_XSe')] donat[lover.Custom('FR_EurRice')]."
 lmf_lover.1035.desc.inperson:0 "« J'ai ici un présent pour vous, [lover.Custom('LoverPetName_possessive')]. » Sur ces mots, [lover.GetFirstName] me fait don d'un petit sachet de pierres précieuses.\n\nJ'aimerais protester, [lover.Custom('FR_LeLa')] raisonner quant à cette générosité excessive, mais je ne le puis. Ses mots, ses gestes, ses airs, tout m'incite à faire taire la raison pour donner raison à l'émotion. « Sachez que ces cailloux n'ont point autant de valeur que vous », ajoute-t-[lover.Custom('FR_IlElle')] avant de s'éclipser."
 lmf_lover.1035.a:0 "Quelle délicate attention de sa part."
 lmf_lover.1036.t:0 "L'amour est d'or"
 lmf_lover.1036.desc.start:0 "Les nouvelles qui me viennent de [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] ne sont guère réjouissantes.\n\nDepuis quelque temps déjà, [lover.GetFirstName] est grevé[lover.Custom('FR_E')] par les dettes. Une bourse vide est bien souvent un lourd fardeau à porter, et de fait, je me serais attendu[ROOT.Char.Custom('FR_E')] à ce qu'[lover.Custom('FR_IlElle')] vienne quérir mon aide, mais il n'en est rien. Je reconnais bien là [lover.Custom('LoverPetName_possessive')] ça oui, "
 lmf_lover.1036.desc.proud:0 "et la fierté qu'[lover.Custom('FR_IlElle')] a pour conseillère. "
 lmf_lover.1036.desc.stubborn:0 "une vraie tête de mule."
 lmf_lover.1036.desc.humble:0 "humble pour sûr, voire même à l'excès."
 lmf_lover.1036.desc.shy:0 "et la timidité qui l'entrave plus que de raison."
 lmf_lover.1036.desc.paranoid:0 "et la méfiance qu'[lover.Custom('FR_IlElle')] a pour confidente."
 lmf_lover.1036.desc.craven:0 "bien loin d'être [Select_CString(lover.IsFemale,'la plus vaillante des femmes','le plus preux des hommes')]."
 lmf_lover.1036.desc.content:0 "toujours repu[lover.Custom('FR_E')] même dans l'adversité."
 lmf_lover.1036.desc.end:0 "\n\nQue puis-je donc faire alors ? Me garder de son avis et lui offrir mon aide en dépit de sa réticence à le demander ? De tous les cas de figure que je puisse imaginer, je me dis que c'est peut-être même ce qu'[lover.Custom('FR_IlElle')] espère. Comment le prendrait-[lover.Custom('FR_IlElle')] alors si je venais à [lover.Custom('FR_LeLa')] décevoir ?"
 lmf_lover.1036.a:0 "Je ne vais pas rester là, les bras ballants !"
 lmf_lover.1036.b:0 "Malheureusement, je ne suis pas en mesure de l'aider."
 lmf_lover.1036.b.tt:0 "[lover.GetFirstNameNoTooltip] espérait un soutien de votre part…"
 lmf_lover.1040.t:0 "L'amour est-elle bonne conseillère ?"
 lmf_lover.1040.desc.start:0 "Dans d'autres circonstances, j'aurais été grandement enthousiasmé par la visite de [lover.GetFirstName], [lover.Custom('FR_LuiElle')] qui a fait tout ce chemin depuis [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] pour me voir, mais je devine aisément que ce n'est pas la simple courtoisie qui l'amène jusqu'ici.\n\nEn effet, les traits de son joli faciès grimacent d'inquiétude. À l'égard de qui ou de quoi, cela je ne peux le savoir que de vive voix : « Je vous sais fort occupé[ROOT.Char.Custom('FR_E')], [ROOT.Char.Custom('LoverPetName_possessive')], dit-[lover.Custom('FR_IlElle')] d'un soupir articulé, mais il est une affaire pressante qui requiert une expertise que je n'ai hélas pas. »\n\nS'ensuit des explications à propos "
 lmf_lover.1040.desc.diplomacy:0 "d'une délicate affaire de diplomatie."
 lmf_lover.1040.desc.martial:0 "d'une affaire de stratégie militaire."
 lmf_lover.1040.desc.stewardship:0 "d'une affaire de contrat vassalique."
 lmf_lover.1040.desc.intrigue:0 "d'une affaire qui requiert #italic habileté et discrétion#!."
 lmf_lover.1040.desc.end:0 "\n\n« Vous êtes bien plus versé[ROOT.Char.Custom('FR_E')] que moi dans ce genre de choses, n'est-ce pas ? »"
 lmf_lover.1040.a:0 "N'ayez crainte, je ferai de mon mieux pour vous aider."
 lmf_lover.1040.a.success:0 "Votre intervention s'avère très utile pour [lover.GetFirstNameNoTooltip]"
 lmf_lover.1040.a.fail.angry:0 "Votre intervention est contre-productive, provoquant la colère de [lover.GetFirstNameNoTooltip]"
 lmf_lover.1040.a.fail.disappointed:0 "Votre intervention est contre-productive, mais [lover.GetFirstNameNoTooltip] ne vous en tient pas rigueur"
 lmf_lover.1040.b:0 "Vous l'avez dit vous-même, je suis fort occupé[ROOT.Char.Custom('FR_E')]."
 lmf_lover.1040.b.success:0 "[lover.Custom('FR_IlElle')|U] est compréhensi[lover.Custom('FR_FVe')] quant à votre incapacité de l'aider"
 lmf_lover.1040.b.fail:0 "[lover.Custom('FR_IlElle')|U] est déçu[lover.Custom('FR_E')] de votre attitude"
 lmf_lover.1045.t:0 "My [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]'s Advice"
 lmf_lover.1045.desc.start:0 "Sometimes I find it easy to forget what a skilled and intelligent [lover.GetWomanMan] [lover.GetFirstNameNoTooltip] is.\n\nWe were walking around the gardens at [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] today when [lover.GetSheHe] "
 lmf_lover.1045.desc.diplomacy:0 "started to talk about some recent troubles I was having with a vassal, and how I might resolve them peacefully.\n\n"
 lmf_lover.1045.desc.martial:0 "spoke about some supply issues I'd mentioned we were having with the men-at-arms, and provided several options as to how I might resolve them.\n\n"
 lmf_lover.1045.desc.stewardship:0 "spoke about a tax dispute I'd mentioned having with my vassals, reluctantly at first and then with greater conviction. In fact, [lover.GetSheHe] gave me a way around it completely.\n\n"
 lmf_lover.1045.desc.intrigue:0 "talked about the [ROOT.Char.Custom('FortifiedBuilding')]'s security, or rather lack thereof. The ways it could be penetrated. Not as any kind of threat, but out of genuine concern for my well-being.\n\n"
 lmf_lover.1045.desc.learning:0 "spoke at length about how I could support the libraries in [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], and how this might support increased development throughout my realm.\n\n"
 lmf_lover.1045.desc.end:0 "[lover.GetSheHe|U] continued on for much of the afternoon and I listened with fascination. [lover.GetHerHis|U] advice could prove useful indeed, if [lover.GetSheHe] was willing to keep on giving it."
 lmf_lover.1045.a:0 "Much appreciated!"
 lmf_lover.1050.t:0 "To the Rescue"
 lmf_lover.1050.desc.start:0 "My illness has me bed-ridden and coughing, and so when I hear someone enter my chambers I blearily order them to depart at once.\n\n\"Nonsense, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]. "
 lmf_lover.1050.desc.ruler:0 "I came all the way from [lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] the moment I heard you were ill.\" "
 lmf_lover.1050.desc.location:0 "I'm not about to leave you here, wasting away, when I'm perfectly able to look after you.\" "
 lmf_lover.1050.desc.notlocation:0 "I came all the way from [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] the moment I heard you were ill.\" "
 lmf_lover.1050.desc.mid:0 "[lover.GetFirstNameNoTooltip] barges in, giving me little choice in the matter as [lover.GetSheHe] immediately takes charge of my care.\n\n\"B-but, you'll catch this sickness for certain!\" I object between bouts of coughing.\n\n[lover.GetSheHe|U] shrugs. \"If [lover.GetFaith.HighGodName] wills, then so be it.\"\n\n"
 lmf_lover.1050.desc.secret:0 "I'm almost too weak to protest, but it does occur to me that it will prove incredibly tricky for [lover.GetFirstNameNoTooltip] to convince the servants that [lover.GetHerHis] doting is completely innocent. [lover.GetSheHe|U] might mean well, but this could very well reveal our secret!"
 lmf_lover.1050.desc.public:0 "I'm almost too weak to protest, and what good would it do? Everyone already knows about [lover.GetFirstNameNoTooltip] and our relationship... and [lover.GetSheHe] seems unlikely to take no for an answer."
 lmf_lover.1050.a:0 "Submit to [lover.GetHerHis] ministrations."
 lmf_lover.1050.a.success:0 "[lover.GetFirstNameNoTooltip] manages to avoid suspicion"
 lmf_lover.1050.a.fail:0 "[lover.GetFirstNamePossessiveNoTooltip] devotion reveals the truth"
 lmf_lover.1050.b:0 "Send [lover.GetHerHim] away at once! No objections!"
 lmf_lover.1055.t:0 "Slip of the Tongue"
 lmf_lover.1055.desc:0 "I didn't mean to say it.\n\nCall it 'pillow talk', call it carelessness, or even call it stupidity. [lover.GetFirstNameNoTooltip] were chatting one evening and I said far more than I meant to.\n\n[lover.GetSheHe|U] pretended not to understand me, at first, but I could see the understanding in [lover.GetHerHis] eyes. [lover.GetSheHe|U] knows."
 lmf_lover.1055.a:0 "There's nothing to be done about it, now..."
 lmf_lover.1055.b:0 "Promise [lover.GetHerHim] anything in return for [lover.GetHerHis] silence."
 lmf_lover.1055.c:0 "[lover.GetSheHe|U] won't be able to tell anyone from inside a cell!"
 lover_promise_to_keep_secret:0 "[lover.GetFirstNameNoTooltip] promises not to reveal the [secret|E]"
 lover_jailed_to_keep_secret:0 "Extracted a forced promise from [lover.GetFirstNameNoTooltip] not to reveal the [secret|E]"
 lmf_lover.1060.t:0 "Slip of [lover.GetHerHis] Tongue"
 lmf_lover.1060.desc:0 "It's clear that [lover.GetFirstNameNoTooltip] didn't meant to say it.\n\nCall it 'pillow talk', call it carelessness, or even call it stupidity. [lover.GetFirstNameNoTooltip] were chatting one evening and [lover.GetSheHe] let something slip that [lover.GetSheHe] really shouldn't have.\n\nThe way [lover.GetSheHe] instantly froze afterwards told me that [lover.GetSheHe] knew exactly what [lover.GetSheHe]'d just said... and [lover.GetSheHe] knew that I knew it, as well. Even if I still have a difficult time believing it."
 lmf_lover.1060.a:0 "Well, that was unexpected."
 lmf_lover.1065.t:0 "The Proposal"
 lmf_lover.1065.desc.start:0 "« Pourquoi ne sommes nous pas encore mariés ? »\n\nVoilà le genre de question inopinée capable de décontenancer même [ROOT.Char.Custom('FR_LeLa')] plus imperturbable des [ROOT.Char.GetWomenMen], tout particulièrement quand elle est soulevée par votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))] alors même que vos corps sont entrelacés dans la couche.\n\n"
 lmf_lover.1065.desc.secret:0 "Pris[ROOT.Char.Custom('FR_E')] au dépourvu, la première chose qui me vient en tête est de lui rappeler que notre relation a pour mortier la discrétion, ce à quoi [lover.GetFirstName] me rétorque qu'une fois marié[ROOT.Char.Custom2('FR_E', SCOPE.sC('lover'))]s et notre union officialisée, la discrétion n'aurait plus lieu d'être.\n\n"
 lmf_lover.1065.desc.public:0 "Puisque j'en perds mes mots, c'est [lover.GetFirstName] qui prend la parole, en arguant que notre relation est d'ores et déjà connue de tous, et qu'en l'officialisant cela faciliterait bien des choses.\n\n"
 lmf_lover.1065.desc.happy:0 "« Il y a bien des années, alors que notre amour n'en était qu'à ses prémices, j'ai souvenir de certains mots, d'une promesse à bien des égards, de tout faire pour assurer mon bonheur. Eh bien nous y voilà, car rien ne me comblerait plus de joie désormais. »\n\n"
 lmf_lover.1065.desc.meant:0 "« Il y a bien des années, alors notre amour n'en était qu'à ses prémices, j'ai souvenir de certains mots, d'une promesse à bien des égards, que nous serions ensemble. Que nous serions uni[ROOT.Char.Custom2('FR_E', SCOPE.sC('lover'))]s. »\n\n"
 lmf_lover.1065.desc.now:0 "« Quand notre amour en était à ses balbutiements, nous avions probablement des choses plus immédiates à penser… #italic ou à faire#!, dit-[lover.Custom('FR_IlElle')] en affichant son sourire le plus lascif, mais maintenant c'est un sujet que nous ne pouvons plus balayer d'un revers de drap. »\n\n"
 lmf_lover.1065.desc.end:0 "Force est de constater qu'[lover.Custom('FR_IlElle')] a à cœur cette perspective nuptiale. Quant à moi, eh bien..."
 lmf_lover.1065.a:0 "Rien ne me mettrait plus en joie [lover.Custom('LoverPetName_possessive')] !"
 lmf_lover.1065.b:0 "Ce n'est pas une décision à prendre à la légère."
 lmf_lover.1070.t:0 "Is it Time?"
 lmf_lover.1070.desc.start:0 "As [lover.GetFirstNameNoTooltip] and I lay in bed today, the subject of marriage arose.\n\nIt was not by [lover.GetHerHis] choice, as [lover.GetSheHe]'s often said [lover.GetSheHe] doesn't care for the idea of marriage. This was my doing.\n\n"
 lmf_lover.1070.desc.happy:0 "I reminded [lover.GetHerHim] that, years ago when this began, I said I'd do whatever it took to make [lover.GetHerHim] happy. "
 lmf_lover.1070.desc.meant:0 "I reminded [lover.GetHerHim] that, years ago when this began, I said we were meant to be together. "
 lmf_lover.1070.desc.now:0 "I reminded [lover.GetHerHim] that, years ago when this began, neither of us thought this was meant to be serious... but things have changed. "
 lmf_lover.1070.desc.secret:0 "Plus, this would mean an end to the sneaking around, keeping our relationship a secret one.\n\n"
 lmf_lover.1070.desc.public:0 "Plus, everyone already knew about our relationship. This would mean an end to the whispers and the stares I knew [lover.GetSheHe] received.\n\n"
 lmf_lover.1070.desc.end:0 "[lover.GetFirstNameNoTooltip] considered the notion. I could tell that, if I pushed for it, [lover.GetHerHis] reluctance would wear down. If I didn't, then it seemed unlikely that the subject would ever come up again."
 lmf_lover.1070.a:0 "Push for it. Let's get married!"
 lmf_lover.1070.b:0 "Let the subject die here and now."
 lmf_lover.1075.t:0 "An Arrival at Court"
 lmf_lover.1075.desc.start:0 "\"What is #EMP [lover.GetSheHe]#! doing here?\"\n\nI heard the whispers from my courtiers and, when I looked up, sure enough there was [lover.GetFirstNameNoTooltip] boldly striding into my throne room as if [lover.GetSheHe] owned the place. [lover.GetSheHe|U], "
 lmf_lover.1075.desc.known:0 "my known lover and the topic of every scandalous whisper in [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_lover.1075.desc.lowborn:0 "a lowborn [lover.GetWomanMan] and thus entirely out of place.\n\n"
 lmf_lover.1075.desc.courtier.realm:0 "[lover.GetLiege.GetTitledFirstNamePossessiveNoTooltip] [lover.GetLiege.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))] and with no reason to be here.\n\n"
 lmf_lover.1075.desc.courtier.foreign:0 "a [lover.GetWomanMan] from [lover.GetLiege.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] with no reason to be here.\n\n"
 lmf_lover.1075.desc.culture:0 "a [lover.GetCulture.GetNameNoTooltip] [lover.GetWomanMan] with no reason to be here.\n\n"
 lmf_lover.1075.desc.religion:0 "a follower of [lover.GetFaith.GetNameNoTooltip] with no reason to be here.\n\n"
 lmf_lover.1075.desc.default:0 "a [lover.GetWomanMan] with no liege, no court, and no earthly reason to be here.\n\n"
 lmf_lover.1075.desc.mid:0 "What [lover.GetSheHe] hoped to accomplish, I couldn't imagine. "
 lmf_lover.1075.desc.secret:0 "Worse, with the whispers already underway, it would be incredibly difficult to explain [lover.GetHerHis] presence without having a story pre-planned.\n\n"
 lmf_lover.1075.desc.public:0 "Perhaps [lover.GetSheHe] wanted to stare down those that knew exactly who [lover.GetSheHe] was to me, the gossipers and the rumourmongers, even if it would only incite them further.\n\n"
 lmf_lover.1075.desc.end:0 "The prudent thing to do would be to have [lover.GetHerHim] quietly removed. Knowing [lover.GetFirstNameNoTooltip], however, [lover.GetSheHe] would be more than a little displeased by that."
 lmf_lover.1075.a:0 "Let [lover.GetFirstNameNoTooltip] stay and have [lover.GetHerHis] fun."
 lmf_lover.1075.a.success:0 "You manage to explain [lover.GetFirstNamePossessiveNoTooltip] presence"
 lmf_lover.1075.a.fail:0 "You fumble the attempted explanation"
 lmf_lover.1075.b:0 "No, this is inappropriate. Have [lover.GetHerHim] removed."
 lmf_lover.1080.opening:0 "[actor.Custom('LoverPetName_possessive')|U],"
 lmf_lover.1080.desc.start:0 "La distance est à l'amour ce que le vent est au feu, dit-on. Je ne puis qu'acquiescer, moi qui aujourd'hui vois ma flamme plus attisée que jamais à l'idée de vous retrouver.\n\nJe vous sais "
 lmf_lover.1080.desc.army:0 "en campagne militaire, quelque part à "
 lmf_lover.1080.desc.travel:0 "en voyage, quelque part à "
 lmf_lover.1080.desc.event:0 "quelque part à "
 lmf_lover.1080.desc.end:0 "[my_camp.GetNameNoTierNoTooltip], et si cette missive arrive jusqu'à vous, sachez que mes pensées vous accompagnent où que vos pas vous mèneront. Puisse [lover.GetFaith.HighGodNameAlternate] veiller sur vous et vous ramener sain[actor.Custom('FR_E')] et sau[actor.Custom('FR_FVe')] jusqu'à moi."
 lmf_lover.1080.a:0 "Merci pour vos douces paroles, [Select_CString(lover.IsFemale,'ma mie','mon tendre')]."
 lmf_lover.1085.t:0 "My Ambitious [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
 lmf_lover.1085.desc.start:0 "Quelque chose couve dans m[ROOT.Char.Custom('FR_GetChambersOrTent_OnA')], cela je le subodore au vu des yeux qui me dévisagent. [lover.GetFirstName] et moi nous dépouillons de ces habits dont nous n'aurons plus besoin d'ici quelques instants, mais son regard n'est pas celui d'un[lover.Custom('FR_E')] [ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('lover'))] dans le désir, pas tout à fait du moins :\n\n« [ROOT.Char.Custom('FR_MonseigneurMadame')|U] ne me concède-t-[ROOT.Char.Custom('FR_IlElle')] pour seule compétence que de lui donner du plaisir ? »\n\n« C'est un art dans lequel vous excellez [lover.Custom('LoverPetName_possessive')]. » Ma plaisanterie est rapidement écartée par une réponse des plus péremptoires : « Musarder dans votre [ROOT.Char.Custom('ResidenceBuilding')] est une piètre ambition. "
 lmf_lover.1085.desc.target:0 "Laissez-moi devenir votre [lover.Custom('GetTargetCourtPosition')] ! "
 lmf_lover.1085.desc.bodyguard:0 "Qui mieux que moi est à même de vous protéger jour et nuit ? Moi qui suis à vos côtés jour et nuit. "
 lmf_lover.1085.desc.lady:0 "Ainsi je pourrais être comme votre ombre sans que personne n'y trouve à redire. "
 lmf_lover.1085.desc.oldholder:0 "N'allez pas me faire croire que vous jugez [old_holder.Custom('FR_le_Char_Pi')][old_holder.GetTitledFirstName] plus digne de confiance que je ne le suis ! "
 lmf_lover.1085.desc.noholder:0 "Qui cela pourrait-il bien troubler que j'occupe un poste vacant ? "
 lmf_lover.1085.desc.backup:0 "Si cela ne vous convient pas, je pourrais m'accommoder du poste de [lover.Custom('GetBackupCourtPosition')]. "
 lmf_lover.1085.desc.onlybackup:0 "Laissez-moi devenir votre [lover.Custom('GetBackupCourtPosition')] ! "
 lmf_lover.1085.desc.nothing:0 "Je souhaite simplement avoir une tâche à accomplir, un rôle à jouer. "
 lmf_lover.1085.desc.end:0 "Je ne pense pas qu'avoir pour ambition d'être un peu plus que [ROOT.Char.Custom2('FR_LMF_RelationToMeShort_Le', SCOPE.sC('lover'))] [ROOT.Char.Custom('FR_du_Char_Pi')][ROOT.Char.GetTitledFirstNameNoTooltip] soit trop demandé, n'est-ce pas ? » \n\nIl apparaît évident que [lover.GetFirstNameNoTooltip] ne va pas en démordre jusqu'à ce que je lui ai donné une réponse claire à ce sujet."
 lmf_lover.1085.a:0 "Soit. Vous voilà [lover.Custom('GetTargetCourtPosition')] désormais."
 lmf_lover.1085.b:0 "Puisque vous insistez, je vais donner congé [old_holder.Custom('FR_au_Char_Pi')][old_holder.GetTitledFirstNameNoTooltip]."
 lmf_lover.1085.a.lady_in_waiting_soulmate:0 "J'ai toujours apprécié votre compagnie, ma chère."
 lmf_lover.1085.a.lady_in_waiting_lover:0 "J'ai toujours apprécié votre compagnie, ma chère."
 lmf_lover.1085.a.bodyguard_soulmate:0 "Ô [lover.GetFirstNameNoTooltip], mon cœur, mon amour-lige !"
 lmf_lover.1085.a.bodyguard_lover:0 "Soyez mon amour-lige et puissiez-vous veiller sur mon corps, jour et nuit !"
 lmf_lover.1085.c:0 "Va pour le poste de [lover.Custom('GetBackupCourtPosition')] dans ce cas."
 lmf_lover.1085.d:0 "Que diriez-vous de servir [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] en tant que [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] ?"
 lmf_lover.1085.e:0 "Les choses sont très bien comme elles sont."
 lmf_lover.1086.title.tt:0 "Promesse brisée"
 lmf_lover.1086.desc:0 "[lover.GetFirstNameNoTooltip] n'a pas apprécié que vous révoquiez son poste à la Cour."
 lmf_lover.1090.opening:0 "[ROOT.Char.Custom('LoverPetName_possessive')|U]"
 lmf_lover.1090.desc:0 "Si cette lettre vous parvient, alors c'est que j'ai choisi judicieusement la personne à soudoyer, et qu'elle sera passée entre les mailles [my_imprisoner.Custom('FR_du_Char_Pi')][my_imprisoner.GetTitledFirstNameNoTooltip], maudit[my_imprisoner.Custom('FR_E')] soit-[my_imprisoner.Custom('FR_IlElle')].\n\nDès que j'ai appris votre sort, j'ai voulu vous dédier ces quelques mots de réconfort. Ces simples marques d'encre sur un morceau de papier ne sauraient vous libérer, mais puissent-elles vous réchauffer ou vous consoler, jusqu'au jour où je le pourrais en personne.\n\nVienne votre libération, je me languis de vous revoir."
 lmf_lover.1090.a:0 "Il n'est de chose plus réconfortante à cet instant que de penser à vous."
 lmf_lover.1095.t:0 "A Cooling Ardor"
 lmf_lover.1095.desc:0 "When [lover.GetFirstNameNoTooltip] and I first fell in love, I was so certain I'd found my true soulmate. Now? I'm not so sure.\n\nI don't deny that our feelings are still strong, but I don't feel flush whenever I think of [lover.GetHerHim]. [lover.GetSheHe|U] doesn't occupy my thoughts every hour of the day... and when I look in [lover.GetHerHis] eyes, I can tell [lover.GetSheHe] feels the same.\n\nPerhaps this is normal, something that happens to love over time. Or perhaps it's because I haven't tried hard enough to keep our love burning hot. Could this be fixed with some effort?\n\nAnd is that something I even want any longer?"
 lmf_lover.1095.a:0 "Feelings change."
 lmf_lover.1095.b:0 "Try to restore the spark in our love, if I can."
 lmf_lover.1095.b.success.tt:0 "You manage to restore the passion"
 lmf_lover.1095.b.failure.tt:0 "Your attempts only make things worse"
 lmf_lover.1098.t:0 "My Secret [my_bastard.Custom('GetDaughterSon')|U]"
 lmf_lover.1098.courtier:0 "I was surprised when [lover.GetFirstNameNoTooltip] asked to see me today, as we hadn't arranged a rendezvous. "
 lmf_lover.1098.notcourtier:0 "I was surprised when [lover.GetFirstNameNoTooltip] arrived at [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] today and asked to see me, as I wasn't expecting her. "
 lmf_lover.1098.start:0 "I was even more surprised when I saw the [my_bastard.Custom('polite_gender_ref')] trailing behind: [my_bastard.GetFirstNameNoTooltip], her [my_bastard.Custom('GetDaughterSon')] "
 lmf_lover.1098.notsecret:0 "and secretly also mine.\n\nShe presented the silent [my_bastard.GetFirstNameNoTooltip] to me and then looked me straight in the eyes. \"It's time that people knew who [my_bastard.GetHerHis] father is.\"\n\n"
 lmf_lover.1098.secret:0 ".\n\nShe presented the silent [my_bastard.GetFirstNameNoTooltip] to me and then simply said, \"It's time you knew that [my_bastard.GetSheHe]'s your [my_bastard.Custom('GetDaughterSon')], as well.\" I'd always suspected, but I was shocked to hear it stated so plainly?\n\nYet she wasn't done. \"It's also time that people knew who [my_bastard.GetHerHis] father is.\"\n\n"
 lmf_lover.1098.criminal:0 "I tried to warn [lover.GetFirstNameNoTooltip] about the serious consequences that came with such a revelation, but she was typically undeterred. \"This isn't about what happens to me,\" she said. \"This is about [my_bastard.GetHerHis] future, as well as the truth.\""
 lmf_lover.1098.notcriminal:0 "I demanded to know why she chose now, after all this time, to make such a bold demand. \"This isn't about me, or even you,\" she said. \"This is about [my_bastard.GetHerHis] future. [my_bastard.GetSheHe|U] deserves to come out of hiding.\""
 lmf_lover.1098.a:0 "Convince her not to do this. Not now."
 lmf_lover.1098.a.success:0 "She's convinced, though unhappy about it"
 lmf_lover.1098.a.failure:0 "She reveals the truth without your approval"
 lmf_lover.1098.b:0 "Threaten her, as her liege, should she go through with this."
 lmf_lover.1098.b.angry:0 "She's furious, but backs down"
 lmf_lover.1098.b.dumped:0 "She won't reveal the secret, but it's over"
 lmf_lover.1098.c:0 "Perhaps she's right. It's time."
 lmf_lover.1098.c.tt:0 "You will automatically forgive any criminal offenses applied against [lover.GetFirstNameNoTooltip]"
 lmf_lover.1100.t:0 "D'amour et d'argent"
 lmf_lover.1100.desc.start:0 "Les perles produites par ma vigueur vespérale coulent encore abondamment le long de mon corps, que déjà [lover.GetFirstName] m'affuble d'un nouveau regard insistant. Prenant cela comme une invitation à renouveler nos ébats, je m'approche langoureusement, mais son désir est en fait porté sur toute autre chose cette fois :\n\n« J'ai vu "
 lmf_lover.1100.desc.jewelry:0 "le plus magnifique des bijoux "
 lmf_lover.1100.desc.sword:0 "l'épée la plus magnifique qui soit "
 lmf_lover.1100.desc.book:0 "le livre le plus étonnant qui soit "
 lmf_lover.1100.desc.manuals:0 "des manuels fort intrigants "
 lmf_lover.1100.desc.robe:0 "une robe d'une élégance et d'un raffinement rare "
 lmf_lover.1100.desc.end:0 "au marché aujourd'hui. Malheureusement, ce genre d'ouvrage s'avère #EMP particulièrement#! onéreux… »\n\nIl n'en faut pas plus pour que je comprenne ce que ses yeux dévoreurs ourdissent comme dessein, mais semble-t-il qu'[lover.Custom('FR_IlElle')] y voit encore trop de subtilité : « [ROOT.Char.Custom('LoverPetName_possessive')|U], vous ne voudriez tout de même pas laisser votre [Select_CString(lover.IsFemale,'dulcinée','tendre aimé')] ainsi meurtri[lover.Custom('FR_E')], n'est-ce pas ? » dit-[lover.Custom('FR_IlElle')] #italic amoureusement#!."
 lmf_lover.1100.a:0 "Une breloque ! Je vous ferais un présent #EMP véritablement#! digne de vous !"
 lmf_lover.1100.b:0 "*Soupir* Tout ce que [lover.Custom('LoverPetName_possessive')] voudra."
 lmf_lover.1100.c:0 "Vous jouissez déjà de ma compagnie, m[lover.Custom('FR_OnA')] ch[lover.Custom('FR_ErEre')], n'est-ce pas suffisant ?"
 lmf_lover.1105.t:0 "Affront et amant[lover.Custom('FR_E')]"
 lmf_lover.1105.desc.start:0 "C'est en furie que [lover.GetFirstName] fait irruption dans la pièce, et alors que j'anticipais déjà être la cible de ses foudres, il s'avère que ce n'est autre que [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))] qui en est la source.\n\n"
 lmf_lover.1105.desc.relation:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('my_courtier'))] "
 lmf_lover.1105.desc.norelation:0 "[my_courtier.Custom('FR_LeLa')|U] bougr[my_courtier.Custom('FR_EEsse')] "
 lmf_lover.1105.desc.end:0 "aurait fait une remarque qui a atterri dans les oreilles de [lover.GetFirstNameNoTooltip]. Remarque acerbe qui, de fil en aiguille, aurait mûri en estrivance. « Ce[my_courtier.Custom('FR_EEtte')] [my_courtier.Custom('InsultNoun')] est en train de colporter toutes sortes de médisances à mon égard ! » tonne-t-[lover.Custom('FR_IlElle')].\n\nJe ne suis guère surpris[ROOT.Char.Custom('FR_E')] car notre liaison n'est nullement dissimulée, de surcroît, puisque les salisseurs de réputation ne veulent se risquer à calomnier [ROOT.Char.Custom('FR_LeLa')] maîtr[ROOT.Char.Custom('FR_EEsse')] des lieux, ils prennent [lover.Custom('LoverPetName_possessive')] comme cible de leurs viles infamies.\n\nSi [lover.Custom('FR_IlElle')] n'a sollicité aucune mesure de ma part contre [my_courtier.GetFirstNameNoTooltip], je ne suis néanmoins pas so[ROOT.Char.Custom('FR_TTte')] de croire qu'[lover.Custom('FR_IlElle')] ne le souhaiterait pas."
 lmf_lover.1105.a:0 "Je [my_courtier.Custom('FR_LeLa')] ferais congédier, ainsi [my_courtier.Custom('FR_IlElle')] ne vous importunera plus."
 got_me_kicked_from_court:0 "[TARGET_CHARACTER.GetShortUIName|U] got [CHARACTER.GetShortUIName] ejected from court after [CHARACTER.GetSheHe] insulted [CharYouHerHim(TARGET_CHARACTER)]."
 got_me_kicked_from_court_corresponding:0 "[CHARACTER.GetShortUIName|U] got [TARGET_CHARACTER.GetShortUIName] ejected from court after [TARGET_CHARACTER.GetSheHe] insulted [CharYouHerHim(CHARACTER)]."
 lmf_lover.1105.b:0 "Je vais lui faire ravaler sa langue, séance tenante !"
 lmf_lover.1105.b.success:0 "[my_courtier.GetFirstNameNoTooltip] fait amende honorable"
 lmf_lover.1105.b.failure:0 "[my_courtier.GetFirstNameNoTooltip] est désormais furieu[my_courtier.Custom('FR_XSe')] contre vous deux"
 got_me_reprimanded_unjustly:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString('vous ', '')][Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] fait injustement réprimandé[CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUIName')] en représailles d'insultes proférées contre [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous',Select_CString(TARGET_CHARACTER.IsFemale,'elle','lui'))]."
 got_me_reprimanded_unjustly_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString('vous ', '')][Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] fait injustement réprimandé[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUIName')] en représailles d'insultes proférées contre [Select_CString(CHARACTER.IsLocalPlayer,'vous',Select_CString(CHARACTER.IsFemale,'elle','lui'))]."
 reprimanded_me_unjustly:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString('vous ', '')][Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] injustement réprimandé[CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUIName')] en représailles d'insultes proférées envers [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre','son')] amant(e)."
 reprimanded_me_unjustly_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString('vous ', '')][Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] injustement réprimandé[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUIName')] en représailles d'insultes proférées envers [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] amant(e)."
 lmf_lover.1105.c:0 "Je crains qu'il ne faille vous y accoutumer."
 insulted_lover:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString('vous ', '')][Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] insulté[CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUIName')] sans avoir à en subir les conséquences."
 insulted_lover_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString('vous ', '')][Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] insulté[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUIName')] sans avoir à en subir les conséquences."
 lmf_lover.1110.t:0 "Always at my Side"
 lmf_lover.1110.desc.start:0 "[lover.GetFirstNameNoTooltip] is always at my side, in recent days.\n\nEither we are in bed together, walking the gardens together, at court together... "
 lmf_lover.1110.desc.secret:0 "even with the necessity of keeping the truth of our relationship a secret, somehow [lover.GetSheHe] always manages to be at my side.\n\n"
 lmf_lover.1110.desc.public:0 "there's no need to keep our relationship hidden, after all, so there's no need to keep [lover.GetHerHim] from my side.\n\n"
 lmf_lover.1110.desc.mid:0 "I suppose it makes sense, considering "
 lmf_lover.1110.desc.courtier:0 "[lover.GetFirstNameNoTooltip] holds no particular duties at [lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] to hold [lover.GetHerHis] attention"
 lmf_lover.1110.desc.mycourtier:0 "[lover.GetFirstNameNoTooltip] holds no particular duties here at court to hold [lover.GetHerHis] attention"
 lmf_lover.1110.desc.pool:0 "[lover.GetFirstNameNoTooltip] has no liege and thus no duties to hold [lover.GetHerHis] attention"
 lmf_lover.1110.desc.male:0 ", and isn't a [lover.Custom('KnightCultureNoTooltipLowercase')].\n\n"
 lmf_lover.1110.desc.female:0 ", and has no children to raise.\n\n"
 lmf_lover.1110.desc.end:0 "Still, while I enjoy our time together, it's quite the... distraction from my own duties as [ROOT.Char.GetTitleAsNameNoTooltip]. I would never tell [lover.GetHerHim] such, of course, but I might be forced to if this goes on or else my attention to [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] will suffer."
 lmf_lover.1110.a:0 "So what? I enjoy the distraction."
 lmf_lover.1110.b:0 "Send [lover.GetHerHim] away. I need to focus on my duties."
 lmf_lover.1115.t:0 "Une visite inopinée"
 lmf_lover.1115.desc.start:0 "C'est lorsque je suis perdu[ROOT.Char.Custom('FR_E')] dans les brumes de mes interrogations, songeant à l'idée de retrouver [lover.GetFirstName], que je réalise qu'un rayon de soleil vient de pénétrer les lieux, comme pour répondre à un souhait que je n'osais pas formuler.\n\n« [lover.Custom('LoverPetName_possessive')|U], vous ici ? » Je reste béat[ROOT.Char.Custom('FR_E')], mais mon étonnement ne peut m'être reproché, "
 lmf_lover.1115.desc.courtier:0 "car je l'imaginais encore à [lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_lover.1115.desc.away:0 "car la dernière fois que j'eus de ses nouvelles, [lover.Custom('FR_IlElle')] était encore à [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_lover.1115.desc.local:0 "car même si je [lover.Custom('FR_LeLa')] savais encore à [lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], je ne pensais point l'y voir.\n\n"
 lmf_lover.1115.desc.mid:0 "« J'avais le présentiment que je vous manquais, me serais-je trompé ? »\n\nEnjoué[ROOT.Char.Custom('FR_E')] par ses manières, excité[ROOT.Char.Custom('FR_E')] par son sourire, je saisis sa main et l'entraîne là où cette conversation pourra se poursuivre par le langage charnel. "
 lmf_lover.1115.desc.secret:0 "D'ordinaire la discrétion est notre alliée, mais m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] est d'un calme presque surprenant aujourd'hui. Moins d'yeux pour épier, plus de place pour s'aimer. "
 lmf_lover.1115.desc.public:0 "Après tout, nul besoin de s'appesantir de discrétion lorsque votre amour n'est point accablé par le fardeau du secret. "
 lmf_lover.1115.desc.end:0 "Et de discrétion, nous n'aurons aucunement l'usage pour cette soirée que j'escompte lui être inoubliable."
 lmf_lover.1115.a:0 "De grâce, visitez moi plus souvent."
 lmf_lover.1120.t:0 "Dans les jardins"
 lmf_lover.1120.desc.start:0 "Comment deux personnes qui vivent sous le même toit peuvent-elles trouver si peu de temps à partager ensemble ? "
 lmf_lover.1120.desc.secret:0 "Je suis enclin[ROOT.Char.Custom('FR_E')] à accuser ce cruel besoin de secret qui entoure notre relation.\n\n"
 lmf_lover.1120.desc.public:0 "Je gage que mes devoirs en sont les premiers fautifs, gouverner [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTierNoTooltip] requérant bien souvent plus de temps que je n'en ai à ma disposition.\n\n"
 lmf_lover.1120.desc.end:0 "Mais aujourd'hui, [ROOT.Char.Custom('FR_GetCourt_Le')] est d'un calme propice à me laisser profiter de m[lover.Custom('FR_OnA')] [lover.Custom('RomanticComplimentAdjective')] [lover.GetFirstName] : « Suivez-moi [ROOT.Char.Custom('LoverPetName_possessive')] » susurre-t-[lover.Custom('FR_IlElle')] de sa voix suave.\n \nJe me retrouve alors dans des jardins sans âme aucune, car toutes celles et ceux qui auraient pu troubler notre tête-à-tête ont été congédiés sur ses ordres. Et comment m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('lover'))] a-t-[lover.Custom('FR_IlElle')] réussi un tel exploit ? Avec ses mains qui se glissent dans les méandres de ma chair, la réponse ne m'intéresse déjà plus."
 lmf_lover.1120.a:0 "Ici ? Oh, [lover.GetFirstNameNoTooltip]."
 lmf_lover.1130.t:0 "Après l'effort, le réconfort"
 lmf_lover.1130.desc:0 "Journée fastidieuse s'il en est, cette halte à [army_location.GetCounty.GetTitle.GetNameNoTierNoTooltip] est l'occasion pour soldats et [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] de pouvoir se restaurer. À peine le camp dressé et déjà j'en vois moult qui rentrent dans leur tente, ce que je m'apprête à faire quand subitement, telle une flèche décochée, je vois poindre [lover.GetFirstName].\n\n« Hâtez-vous ! » dit-[lover.Custom('FR_IlElle')] d'un ton alerte. Durant les premières foulées je crains le pire, telle qu'une embuscade ennemie, puis finalement, à me retrouver poussé[ROOT.Char.Custom('FR_E')] et dévêtu[ROOT.Char.Custom('FR_E')] derrière des chariots d'approvisionnement, je comprends que ce n'est pas de l'affolement mais de l'excitation.\n\n« N'êtes-vous pas lassé[ROOT.Char.Custom('FR_E')] de votre [ROOT.Char.Custom('signature_weapon')] ? J'ai ici autre chose que vous pourriez empoigner ! »"
 lmf_lover.1130.a:0 "Voyons si vous avez autant de doigté que de phrasé."
 lmf_lover.1135.t:0 "Déveine et dévergondage"
 lmf_lover.1135.desc.start:0 "« Cela ne devrait pas trop nous retarder [ROOT.Char.Custom('FR_MonseigneurMadame')], ce n'est guère qu'un essieu à changer, une roue à réparer tout au plus. Ces [ROOT.Char.GetCurrentLocation.Custom('FR_TerrainTypeProvince_Plural')] sont perfides » me dit-on après m'avoir informé que le léger incident dont a été victime ma suite risque de nous retarder quelque peu.\n\nSubitement, bondissant de nulle part, [lover.GetFirstName] surgit, couverture en main. Son regard plein de malice me laisse comprendre qu'[lover.Custom('FR_IlElle')] s'apprête à transformer une déveine en aubaine. « Suivez-moi [ROOT.Char.Custom('LoverPetName_possessive')] », minaude-t-[lover.Custom('FR_IlElle')] alors que c'était déjà mon intention.\n\nQuelques foulées et nous voilà bien à l'écart, avec moins d'yeux pour spolier notre intimité, et plus de place pour se posséder. Notre nudité mise à nu, "
 lmf_lover.1135.desc.cold:0 "le froid n'est en rien un problème au vu de la passion sulfureuse qui nous habite."
 lmf_lover.1135.desc.sand:0 "je ne remarque même pas la présence du sable irritant, tant la douceur s'invite à mon contact."
 lmf_lover.1135.desc.bugs:0 "les inconvénients des alentours ne sauraient me faire distraire du spectacle qui s'offre à moi."
 lmf_lover.1135.desc.default:0 "notre passion va pouvoir s'exprimer au grand jour."
 lmf_lover.1135.desc.end:0 "\n\n« Si quelqu'un entend des cris, nous prétexterons l'attaque d'une grosse bête » dit-[lover.Custom('FR_IlElle')], amusé[lover.Custom('FR_E')]."
 lmf_lover.1135.a:0 "[Select_CString(ROOT.Char.IsFemale,'Il en faut plus pour me faire crier.','Vous essayez de me faire rougir ?')]"
 lmf_lover.1140.opening:0 "[ROOT.Char.Custom('LoverPetName_possessive')|U]"
 lmf_lover.1140.courtier:0 "Cela fait plusieurs lunes déjà qu'une pensée m'obsède, et que mon cœur réclame de quitter la cour [lover_liege.Custom('FR_du_Char_Pi')][lover_liege.GetTitledFirstNameNoTooltip] pour "
 lmf_lover.1140.pool:0 "Cela fait plusieurs lunes déjà qu'une pensée m'obsède, et que mon cœur réclame de "
 lmf_lover.1140.start:0 "vous rejoindre à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_lover.1140.spouse:0 "M[lover.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('lover_spouse'))] [lover_spouse.GetFirstNameNoTooltip], souhaite m'accompagner, mais n'ayez crainte, [lover_spouse.Custom('FR_IlElle')] ne sait rien de ce que nous partageons vous et moi, [lover_spouse.Custom('FR_IlElle')] ignore que "
 lmf_lover.1140.bastard:0 "[my_bastard.GetFirstName] se doit de grandir auprès de s[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.GetMotherFather], et moi de vivre auprès de vous car "
 lmf_lover.1140.child:0 "Vous pouvez certainement comprendre la peine qui est la mienne, d'être contraint[lover.Custom('FR_E')] à vivre si loin de [my_bastard_courtier.GetFirstName] d'une part, mais aussi car "
 lmf_lover.1140.mid:0 "votre absence pèse sur mon être."
 lmf_lover.1140.public:0 "Du reste, nous n'avons pas à nous cacher, n'est-ce pas ? Nul n'ignore notre relation après tout.\n\n"
 lmf_lover.1140.myspouse:0 "Je sais que j'aurais à endurer le regard [ROOT.Char.GetPrimarySpouse.Custom('FR_du_Char_Pi')][ROOT.Char.GetPrimarySpouse.GetTitledFirstNameNoTooltip] à chaque instant, mais je n'en ai cure, et je pense que vous devriez en faire autant.\n\n"
 lmf_lover.1140.secret:0 "Le secret qui entoure notre flamme restera toujours un mal, mais bien moindre que les lieues qui nous séparent l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('lover'))] de l'autre.\n\n"
 lmf_lover.1140.end:0 "De grâce, laissez-moi être à vos côtés."
 lmf_lover.1140.a:0 "Oui-da, [lover.Custom('LoverPetName_possessive')]. Vous êtes [lover.Custom('FR_LeLa')] bienvenu[lover.Custom('FR_E')]."
 lmf_lover.1140.b:0 "Votre place est dans mon cœur, pas dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')]."
 lmf_lover.1145.t:0 "Jealous of my [my_spouse.GetWifeHusband|U]"
 lmf_lover.1145.desc.start:0 "Even as our sweat was cooling from the evening's exertions, I knew something was amiss with [lover.GetFirstNameNoTooltip]. [lover.GetSheHe|U] had been quiet all evening, and distracted once we were in bed and making love.\n\n\"You love [my_spouse.GetHerHim] more than you love me,\" [lover.GetSheHe] finally blurted out.\n\nI was startled, and truthfully said I had no idea who [lover.GetSheHe] was referring to.\n\n\"Your [my_spouse.GetWifeHusband]!\" [lover.GetSheHe] snapped angrily. "
 lmf_lover.1145.desc.soulmate:0 "\"I see the way you are when you're with [my_spouse.GetHerHim]. The [my_spouse.GetTitleAsNameNoTooltip|l] is your true soulmate, and everyone knows it!\"\n\n"
 lmf_lover.1145.desc.bestfriend:0 "\"I see the way you act around [my_spouse.GetHerHim]. The two of you are so at ease, it's like you're best friends! With your [my_spouse.GetWifeHusband]! Who ever heard of such a thing?!\"\n\n"
 lmf_lover.1145.desc.lover:0 "\"I see the way you are with the [my_spouse.GetTitleAsNameNoTooltip|l]. The touching, the little smiles you exchange! How could I hope to compete with [my_spouse.GetHerHim]?!\"\n\n"
 lmf_lover.1145.desc.friend:0 "\"I see the way you act around the [my_spouse.GetTitleAsNameNoTooltip|l]. The two of you are so at ease, so friendly! How could I hope to compete with [my_spouse.GetHerHim]?!\"\n\n"
 lmf_lover.1145.desc.ruler:0 "\"It's because [lover.GetSheHe]'s a high and mighty [my_spouse.GetTitleAsNameNoTooltip|l], off in [my_spouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], isn't it? And I'm no-one. How could I ever hope to compete with [my_spouse.GetHerHim]?!\"\n\n"
 lmf_lover.1145.desc.smart:0 "\"It's because [lover.GetSheHe]'s smarter than I am, isn't it? Oh, the [my_spouse.GetTitleAsNameNoTooltip|l] is soooo brilliant, everyone says so! How could I hope to compete with that?!\"\n\n"
 lmf_lover.1145.desc.pretty:0 "\"It's because [lover.GetSheHe]'s more [Select_CString( my_spouse.IsFemale, 'beautiful', 'handsome' )] than I am, isn't it? Admit it! Everyone already says so! How could I hope to compete?!\"\n\n"
 lmf_lover.1145.desc.end:0 "As [lover.GetFirstNamePossessiveNoTooltip] jealous rant continued, [lover.GetSheHe] became more and more unreasonable until finally [lover.GetSheHe] stormed off in a fury."
 lmf_lover.1145.a:0 "I must try to convince [lover.GetHerHim] my [my_spouse.GetWifeHusband] is no threat."
 lmf_lover.1145.a.success:0 "You manage to convince [lover.GetHerHim]... mostly"
 lmf_lover.1145.a.failure:0 "Now [lover.GetFirstNameNoTooltip] is furious at you, as well"
 lover_jealousy:0 "[CHARACTER.GetShortUIName|U] has become incredibly jealous of [TARGET_CHARACTER.GetShortUIName|U]."
 lover_jealousy_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] has become incredibly jealous of [CHARACTER.GetShortUIName|U]."
 lmf_lover.1145.b:0 "[my_spouse.GetFirstNameNoTooltip] is my [my_spouse.GetWifeHusband]. It is what it is."
 lmf_lover.1150.desc:0 "When [lover.GetFirstNameNoTooltip] and I first fell in love, I was so certain I'd found my true soulmate. Now? I'm not so sure.\n\nI'm not even certain we could say we're truly in love any longer. Oh, I still have affection for [lover.GetHerHim], and I believe [lover.GetSheHe] feels the same for me, but does [lover.GetSheHe] occupy my thoughts? Does my heart burn for [lover.GetHerHim]? Sadly, no.\n\nWhether that means our relationship is slowly coming to an end, I cannot say. What can be said, beyond a shadow of a doubt, is that [lover.GetFirstNameNoTooltip] and I can no longer consider ourselves soulmates."
 lmf_lover.1155.t:0 "My Untrustworthy Lover?"
 lmf_lover.1155.desc:0 "Could it be true?\n\nI've received reports that [lover.GetFirstNameNoTooltip] was recently in contact with [my_rival.GetTitledFirstNameNoTooltip]. Why [lover.GetSheHe] would be writing letters to a rival of mine, I have no idea. [lover.GetSheHe|U] denies having done so, and while I've tried to have the matter looked into more closely it's very possible the entire thing was a rumour... one that [lover.GetFirstNameNoTooltip] suggests was undoubtedly spread by someone intending to smear [lover.GetHerHis] good name.\n\nWith no way to verify the truth, I have little choice but to take [lover.GetHerHis] word on the matter, but it eats away at me. I know something isn't right. Some manner of skullduggery is afoot."
 lmf_lover.1155.a:0 "Hopefully nothing comes of it."
 lmf_lover.1156.opening:0 "[lover.Custom2('GreetingToGenericPositive', ROOT.Char )]"
 lmf_lover.1156.stranger:0 "You don't know me, but "
 lmf_lover.1156.start:0 "I have some information on [player_rival.GetTitledFirstName] you might be very interested in, considering it's common knowledge you and [player_rival.GetSheHe] are rivals.\n\nAll I ask in return is a paltry sum of gold for my troubles and that you never mention "
 lmf_lover.1156.know:0 "this came from your [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))|l]."
 lmf_lover.1156.stranger2:0 "from whom you obtained this information."
 lmf_lover.1156.a:0 "[player_rival.GetTitledFirstNameNoTooltip] has a secret? Yes, please!"
 lmf_lover.1156.b:0 "I've no interest in this. Begone."
 lmf_lover.1160.t:0 "Attiser la passion"
 lmf_lover.1160.desc:0 "C'est lorsque je me languis à nouveau de [lover.GetFirstName] que je réalise le temps — #italic trop long#! — qui s'est écoulé depuis la dernière fois que nous nous sommes vus. Il n'y a nul grief qui nous sépare, seulement les responsabilités de l'[Select_CString(And(lover.IsFemale, ROOT.Char.IsFemale), 'une', 'un')] et l'autre.\n\nUn fossé qui agite mon âme, à l'inverse des lieux, étrangement empreints de quiétude et de sérénité. Rares sont les moments où je puis m'entendre penser ainsi, et je réalise que je pourrais alors en profiter. Déclarer sa flamme est une chose, l'attiser en est une autre. Comment alors devrais-je m'y prendre avec l'objet de mon désir ? Je réfléchis, je réfléchis encore, je réfléchis toujours, et finalement je me dis qu'en amour, mieux vaut agir que penser."
 lmf_lover.1160.a:0 "Si le cœur est une porte, la poésie en est la clé !"
 lmf_lover.1160.a.success:0 "[lover.GetFirstNameNoTooltip] est conquis[lover.Custom('FR_E')] par votre poème"
 lmf_lover.1160.a.failure:0 "Vos #italic efforts poétiques#! amusent [lover.GetFirstNameNoTooltip]"
 lmf_lover.1160.b:0 "Tout ce qu'il faut à deux cœurs esseulés, c'est d'être ensemble."
 lmf_lover.1160.b.success:0 "C'est exactement ce dont vous et [lover.GetFirstNameNoTooltip] aviez besoin"
 lmf_lover.1160.b.failure:0 "[lover.GetFirstNameNoTooltip] apprécie le geste"
 lmf_lover.1160.c:0 "Même si c'est plus que convenu, un présent reste toujours un beau geste."
 lmf_lover.1160.c.success:0 "[lover.GetFirstNameNoTooltip] adore votre présent"
 lmf_lover.1160.c.failure:0 "[lover.GetFirstNameNoTooltip] apprécie l'intention, mais rien de plus"
 lmf_lover.1160.d:0 "Une petite balade champêtre nous ferait le plus grand bien."
 lmf_lover.1160.d.success:0 "La balade est l'occasion de partager un petit moment en tête à tête"
 lmf_lover.1160.d.failure:0 "La balade ne se passe pas aussi bien que vous l'espériez"
 lmf_lover.1160.e:0 "Je puis certainement rendre nos ébats plus… #italic sulfureux#!."
 lmf_lover.1160.e.success:0 "Votre fougue fait la joie de [lover.GetFirstNameNoTooltip] !"
 lmf_lover.1160.e.failure:0 "Vos idées ne sont pas du goût de [lover.GetFirstNameNoTooltip]"
 lmf_lover.1160.f:0 "Je connais une taverne où nous pourrions nous rendre discrètement."
 lmf_lover.1160.f.success:0 "[lover.GetFirstNameNoTooltip] passe une excellente soirée !"
 lmf_lover.1160.f.failure:0 "[lover.GetFirstNameNoTooltip] apprécie l'intention, mais rien de plus"
 lmf_lover.1160.g:0 "Il faut savoir donner du temps au temps."
 lmf_lover.1165.t:0 "Une passion brûlante"
 lmf_lover.1165.desc.start:0 "Ces derniers jours, je passe de plus en plus de temps en compagnie de [lover.GetFirstName].\n\n"
 lmf_lover.1165.desc.secret:0 "Bien que la passion ait la préséance sur la prudence dans les prémices d'un amour propice, il faut néanmoins le rester, prudent, car certaines choses se doivent de rester dans la pénombre.\n\n"
 lmf_lover.1165.desc.public:0 "Perhaps it's because everyone already knows about our affair. There's no need to tiptoe about, yet I don't think that entirely it.\n\n"
 lmf_lover.1165.desc.end:0 "Lorsque je suis à ses côtés, les choses d'ordinaire si importantes me paraissent soudainement plus frivoles. Une heure passée avec [lover.Custom('FR_LuiElle')] devient aussi éphémère qu'un battement de papillon. Un regard devient aussi long qu'une existence d'homme. Un effleurement de main me fait l'effet d'une caresse. Les choses ne seront pas toujours si idylliques, mais dans l'immédiat, elles le sont, et il me plaît qu'elles le restent."
 lmf_lover.1165.a:0 "Où cela va-t-il nous mener ?"
 lmf_lover.1165.b:0 "Ces sentiments ne sont pas aussi fugaces qu'un lever de soleil."
 lmf_lover.1165.c:0 "S'amouracher ne signifie pas s'attacher."
 lmf_lover.1170.t:0 "Une ombre passagère"
 lmf_lover.1170.desc.start:0 "[lover.GetFirstName] est souffrant[lover.Custom('FR_E')], et j'en viens à quérir la faveur [ROOT.Char.GetFaith.HealthGodNamePossessive].\n\n"
 lmf_lover.1170.desc.courtier:0 "Je suis brièvement passé[ROOT.Char.Custom('FR_E')] à son chevet, souhaitant m'enquérir en personne de son état, mais la fièvre l'harassant, [lover.Custom('FR_IlElle')] n'a eu de cesse de gémir, mon nom résonnant sans cesse dans ses appartements. Lorsqu'[lover.Custom('FR_IlElle')] a remarqué ma présence, les gémissements devinrent des supplications, et son regard perdu dans le vide se transforma en une main tendue.\n\nJ'aurais sans doute du rester à ses côtés, mais ce n'est pourtant pas la décision que j'ai prise."
 lmf_lover.1170.desc.pool:0 "Son absence répétée m'a poussé à m'enquérir de son état, et désormais j'en connais la raison. [lover.Custom('FR_IlElle')|U] est en ce moment même, quelque part à [lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], frappé[lover.Custom('FR_E')] par la fièvre, et que sais-je d'autres.\n\nIl lui faut des soins sans tarder, et pour cela il faut l'amener prestement à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_lover.1170.desc.secret:0 "La situation est envenimée par le fait que notre relation a pour terreau la discrétion, voire le mensonge. Ainsi, des yeux indiscrets pourraient colporter quelques #italic calomnies#! s'ils me voyaient manifester une trop grande #italic inquiétude#! à son endroit.\n\n"
 lmf_lover.1170.desc.public:0 "Pour dire le vrai, notre relation n'est en rien un secret. Puisqu'il n'y a rien à cacher, la seule chose que je dois redouter, c'est de tomber malade moi aussi.\n\n"
 lmf_lover.1170.desc.end:0 "C'est une affliction pour moi de [lover.Custom('FR_LeLa')] savoir allongé[lover.Custom('FR_E')], à endurer mille tourments, luttant contre la maladie, et pire encore, de savoir que dans ses moments de lucidité, je ne suis pas à ma juste place, à ses côtés. Je souffre de savoir qu'[lover.Custom('FR_IlElle')] souffre, de corps et d'esprit, mais plus que mon cœur, c'est notre lien qui en souffrirait, car si d'aventure [lover.Custom('FR_IlElle')] venait à être épargné[lover.Custom('FR_E')] par [ROOT.Char.GetFaith.DevilName], mon manquement à son égard ne saurait être pardonné."
 lmf_lover.1170.a:0 "Je resterais à ses côtés, et au diable les risques !"
 lmf_lover.1170.a.success:0 "Vous inventez une petite histoire pour ne rien laisser paraître"
 lmf_lover.1170.a.fail:0 "Vous inventez une petite histoire… mais personne n'est dupe"
 lmf_lover.1170.b:0 "Amenez-[lover.Custom('FR_LeLa')] sans tarder !"
 lmf_lover.1170.c:0 "Je ne puis lui offrir de traitement de faveur..."
 lmf_lover.1170.d:0 "Puisse [ROOT.Char.GetFaith.HealthGodName] veiller sur [lover.Custom('FR_LuiElle')], où qu'[lover.Custom('FR_IlElle')] soit."
 lmf_lover.1175.t:0 "Courroux conjugal"
 lmf_lover.1175.desc.start:0 "L'entrée [my_spouse.Custom('FR_du_Char_Pi')|U][my_spouse.GetTitledFirstName] ne se fait ni attendre ni discrète lorsque la cour se vide des courtisans et domestiques. L'ire apparente que je puis lire, sinon dans ses yeux, au moins sur ses lèvres, ne laisse planer pas le moindre doute quant à la raison de sa tempétueuse irruption.\n\n« Que cela cesse ! gronde-t-[my_spouse.Custom('FR_IlElle')] avec force et fracas, sa fureur résonnant jusqu'à mes oreilles. Je sais à quoi vous vous livrez avec [my_spouse.Custom2('direct_address_by_familiarity', SCOPE.sC('lover'))] ! Je le sais et je veux que cela cesse ! »\n\n"
 lmf_lover.1175.desc.secret:0 "« Ce n'est pas… » Alors que mon premier réflexe est de vouloir nier l'évidence, [my_spouse.Custom('FR_IlElle')] me coupe l'herbe sous le pied en même temps que la parole : « Vous osez me mentir, à moi ?"
 lmf_lover.1175.desc.public:0 "J'essaie de feindre l'ignorance, mais à dire vrai, c'est inutile, comme [my_spouse.Custom('FR_IlElle')] me le fait si bien remarquer : « Reste-t-il encore une seule personne dans [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] qui ne connaisse pas déjà la vérité ?"
 lmf_lover.1175.desc.mid:0 " M'humilier ne vous suffit pas, vous voulez insulter mon intelligence en plus de mon honneur ? »\n\nLa tempête dure un certain temps et m[ROOT.Char.Custom2('FR_RelationToMeShort_OnA', SCOPE.sC('my_spouse'))] ne m'épargne aucune foudre. « Invoquez le bien commun, invoquez le respect envers [ROOT.Char.GetFaith.FertilityGodName], invoquez ce qui vous chante ! Je n'en ai cure, mettez-y un terme ! "
 lmf_lover.1175.desc.courtier:0 "[lover.Custom('FR_IlElle')|U] doit quitter [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] ! Vous m'entendez ?! "
 lmf_lover.1175.desc.end:0 "Mettez-y un terme, ou sinon… »\n\nLorsque j'entends le silence s'installer, j'en viens à regretter que la tempête fut si fugace, car même si [my_spouse.GetFirstNameNoTooltip] a déjà quitté la pièce, je ressens encore l'écho de son courroux et le poids de ses mots."
 lmf_lover.1175.a:0 "Je ferai comme il vous plaira, ch[my_spouse.Custom('FR_ErEre')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('my_spouse'))]."
 lmf_lover.1175.a.rivalry:0 "[lover.GetFirstNameNoTooltip] rejette la faute sur votre [my_spouse.GetWifeHusband]"
 spouse_made_lover_break_up:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] a forcé s[TARGET_CHARACTER.GetPrimarySpouse.Custom('FR_OnA')] épou[TARGET_CHARACTER.GetPrimarySpouse.Custom('FR_XSe')] à rompre avec [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName]."
 spouse_made_lover_break_up_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] a forcé s[CHARACTER.GetPrimarySpouse.Custom('FR_OnA')] épou[CHARACTER.GetPrimarySpouse.Custom('FR_XSe')] à rompre avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName]."
 lmf_lover.1175.b:0 "Le départ de [lover.GetFirstNameNoTooltip] est la seule chose que je consens à accepter."
 spouse_had_me_kicked_out:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] a forcé s[TARGET_CHARACTER.GetPrimarySpouse.Custom('FR_OnA')] épou[TARGET_CHARACTER.GetPrimarySpouse.Custom('FR_XSe')] a renvoyer [CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] de la cour."
 spouse_had_me_kicked_out_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] a forcé s[CHARACTER.GetPrimarySpouse.Custom('FR_OnA')] épou[CHARACTER.GetPrimarySpouse.Custom('FR_XSe')] a renvoyer [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] de la cour."
 lmf_lover.1175.c:0 "Je suis sûr qu'[my_spouse.Custom('FR_IlElle')] va se calmer…"
 lmf_lover.1175.c.rivalry:0 "[my_spouse.Custom('FR_le_Char_Pi')|U][my_spouse.GetTitledFirstNameNoTooltip] dirige sa colère sur [lover.GetFirstNameNoTooltip]"
 refused_to_dump_lover:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] refusé de mettre fin à [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre','sa')] liaison."
 spouse_wont_dump_lover:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Votre ','L’')]épou[CHARACTER.Custom('FR_XSeOpp')][CHARACTER.LocalPlayerString(' ', 'Loc_FR_du_GetShortUIName')] a refusé de mettre fin à sa relation avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName]."
 spouse_wont_dump_lover_corresponding:0 "[Select_CString(TARGET_CHARACTER.IsLocalPlayer,'Votre ','L’')]épou[TARGET_CHARACTER.Custom('FR_XSeOpp')][TARGET_CHARACTER.LocalPlayerString(' ', 'Loc_FR_du_GetShortUIName')] a refusé de mettre fin à sa relation avec [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName]."
 lmf_lover.1180.t:0 "Le poids du secret"
 lmf_lover.1180.desc.start:0 "Si notre relation n'est certes pas sans conséquence sur nos vies, c'est avant tout le secret qui l'entoure qui pèse sur les épaules de [lover.GetFirstName].\n\n"
 lmf_lover.1180.desc.honest:0 "[lover.Custom('LoverPetName_possessive')|U] est [lover.GetWomanMan] de probité, et de fait, je sais la souffrance qui doit [lover.Custom('FR_LeLa')] ronger d'avoir à draper ses sentiments dans la menterie permanente.\n\n"
 lmf_lover.1180.desc.just:0 "[lover.Custom('LoverPetName_possessive')|U] ayant la droiture pour dogme, silencier la vérité tient de l'ordalie pour [lover.Custom('FR_LuiElle')], et de fait, chaque geste devient une gageure, chaque parole une besogne.\n\n"
 lmf_lover.1180.desc.paranoid:0 "[lover.Custom('LoverPetName_possessive')|U] a toujours eu un caractère… #italic instable#!, il est vrai, mais sa défiance viscérale en toutes choses lui grève d'autant plus l'esprit qu'[lover.Custom('FR_IlElle')] doit se méfier de ses propres mots et de ses propres actes.\n\n"
 lmf_lover.1180.desc.craven:0 "[lover.Custom('LoverPetName_possessive')|U] peut être bien des choses, mais [Select_CString(lover.IsFemale,'intrépide','un preux')] ? Certainement pas. Dès lors, l'amour devient source d'angoisse plus que de bonheur, et c'est là sans conteste le pire fléau qui puisse affliger un[lover.Custom('FR_E')] [lover.GetWomanMan].\n\n"
 lmf_lover.1180.desc.intrigue:0 "Au premier abord, on pourrait l'imaginer bien aise des cachotteries, apte à ruser et à tromper, et ce en vertu de l'éducation qui fut la sienne, mais ce serait bien mal connaître [lover.Custom('LoverPetName_possessive')] de lui prêter une telle nature.\n\n"
 lmf_lover.1180.desc.bold:0 "Je [lover.Custom('FR_LeLa')] sais vaillant[lover.Custom('FR_E')], mais vivre ainsi dans le mensonge permanent est une guerre de l'esprit qui demande un courage autre que celui des champs de bataille.\n\n"
 lmf_lover.1180.desc.default:0 "Peu versé[lover.Custom('FR_E')] dans la duperie, [lover.Custom('LoverPetName_possessive')] voit ces atours mensongers dont nous nous revêtons comme un affront fait à la vérité, à être ainsi travestie.\n\n"
 lmf_lover.1180.desc.end:0 "Je ne peux rester aveugle à sa souffrance, mais par [ROOT.Char.GetFaith.NegativeAfterLife], qu'on me dise quoi faire pour l'en délivrer et je m'exécuterai dans l'instant !"
 lmf_lover.1180.a:0 "Soyez fort[lover.Custom('FR_E')], [lover.Custom('LoverPetName_possessive')] !"
 lmf_lover.1185.t:0 "Le poids du péché"
 lmf_lover.1185.desc.start:0 "Si notre relation n'est certes pas sans conséquence sur nos vies, [lover.GetFirstName] en souffre d'autant plus qu'[lover.Custom('FR_IlElle')] honore [lover.GetFaith.GetNameNoTooltip|l].\n\n"
 lmf_lover.1185.desc.incest:0 "[lover.Custom('LoverPetName_possessive')|U] n'est pas sans savoir que la foi [lover.GetFaith.GetAdjectiveNoTooltip] condamne rigoureusement le caractère incestueux de notre liaison, et ce qu'importe la pureté de l'amour qui peut s'y cacher. "
 lmf_lover.1185.desc.gay:0 "[lover.Custom('LoverPetName_possessive')|U] n'est pas sans savoir que la foi [lover.GetFaith.GetAdjectiveNoTooltip] condamne l'acte de copuler entre deux [ROOT.Char.GetWomenMen]. "
 lmf_lover.1185.desc.married:0 "Pour la foi [lover.GetFaith.GetAdjectiveNoTooltip], l'adultère n'est point seulement une souillure entachant le mariage, c'est également et surtout un péché. "
 lmf_lover.1185.desc.unmarried:0 "La foi [lover.GetFaith.GetAdjectiveNoTooltip] condamne l'acte de fornication, non comme un simple camouflet porté à la pudeur, mais aussi et surtout comme un péché. "
 lmf_lover.1185.desc.secret:0 "À cela s'ajoute le fardeau bien pesant du secret.\n\n"
 lmf_lover.1185.desc.public:0 "Et même libéré[lover.Custom('FR_E')] du fardeau du secret, cela ne rend pas son existence plus douce, bien au contraire.\n\n"
 lmf_lover.1185.desc.end:0 "Le lien profane qui nous unit l'accable, je le sais, mais que puis-je y faire ? Y a-t-il dans [lover.GetFaith.ReligiousText] quelques réconforts à trouver ? Ou de forces à puiser ? Si [lover.GetFirstNameNoTooltip] adresse des prières, alors le silence semble être la seule réponse [lover.GetFaith.HighGodNamePossessive]."
 lmf_lover.1185.a:0 "Soyez fort[lover.Custom('FR_E')], [lover.Custom('LoverPetName_possessive')] !"
 lmf_lover.1190.t:0 "Au vu et au su de tous"
 lmf_lover.1190.desc:0 "Comment une relation, dépossédée du fardeau du secret, peut devenir si pesante pour [lover.GetFirstName] ?\n\nIl semble que m'avoir pour amant[ROOT.Char.Custom('FR_E')] fait d[lover.Custom('FR_EluiElle')] la cible de tous les regards, le sujet de tous les murmures. Ses pas sont hantés par les commérages, et sur ses épaules s'appesantit le jugement d'autrui.\n\nQue ne ferais-je pour lui rendre l'existence plus simple, hélas, changer la nature humaine est là un tour de magie qui m'est étranger. Quant à l'affliction dont est victime m[lover.Custom('FR_OnA')] pauvre [lover.GetFirstNameNoTooltip], elle n'envenime pas seulement son existence, mais aussi notre relation, et en cela, je suis impuissant[ROOT.Char.Custom('FR_E')] à lui porter secours."
 lmf_lover.1190.a:0 "Soyez fort[lover.Custom('FR_E')], [lover.Custom('LoverPetName_possessive')]."
 lmf_lover.1195.t:0 "Le poids du secret"
 lmf_lover.1195.desc.start:0 "I wish I could say that keeping my relationship with [lover.GetFirstNameNoTooltip] a secret was having no effect on me, but that would be a lie.\n\n"
 lmf_lover.1195.desc.honest:0 "Truth be told, I'm an honest [ROOT.Char.GetWomanMan] at heart, so having to constantly lie and then remember all those lies is "
 lmf_lover.1195.desc.just:0 "I have a strong sense of justice. I know the difference between right and wrong. Doing something so clearly wrong, and then to #EMP keep#! doing it, is "
 lmf_lover.1195.desc.paranoid:0 "All I can think about is what will happen when we're inevitably discovered. If anyone looks at us, I strain to figure out what they're thinking. It's maddening, and is "
 lmf_lover.1195.desc.craven:0 "I wouldn't say I'm the bravest of [ROOT.Char.GetWomenMen], truth be told. The fear keeps building of what will happen once we're discovered, and it's "
 lmf_lover.1195.desc.intrigue:0 "One would think I'd be better at this, considering my education, but truth be told the intrigue doesn't come naturally to me. The constant deception is "
 lmf_lover.1195.desc.bold:0 "I've been called bold by many, and there's truth to it. Boldness alone doesn't make one unaccountable, however, and the constant need for deception is "
 lmf_lover.1195.desc.default:0 "I'm not one for deceit or scheming, truth be told. Nor am I the boldest of [ROOT.Char.GetWomenMen], and I'll admit that the constant sneaking and lying is "
 lmf_lover.1195.desc.end:0 "eating away at me.\n\n[lover.GetFirstNameNoTooltip] sees how the stress gets to me, and of course [lover.GetSheHe] urges me not to think about it, but I can't help it. There's nothing [lover.GetSheHe] can do which will make me feel good about this."
 lmf_lover.1195.a:0 "What am I to do?"
 lmf_lover.1200.t:0 "Le poids du péché"
 lmf_lover.1200.desc.start:0 "My relationship with [lover.GetFirstNameNoTooltip] is having an effect on me, much as I wish that weren't the case.\n\n"
 lmf_lover.1200.desc.incest:0 "Laying with my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))] is a sin, it's true. "
 lmf_lover.1200.desc.gay:0 "Laying with another [lover.GetWomanMan] is a sin, it's true. "
 lmf_lover.1200.desc.married:0 "Adultery committed by a [ROOT.Char.GetWomanMan] is not only a sin, it's also a criminal offense. "
 lmf_lover.1200.desc.unmarried:0 "A [ROOT.Char.GetWomanMan] who is caught and accused of fornication? Not only a sin, but a criminal offense. "
 lmf_lover.1200.desc.secret:0 "The fact that we must be constantly vigilant to keep our secret only adds to the stress I feel.\n\n"
 lmf_lover.1200.desc.public:0 "I would have thought that our relationship being out in the open would make things easier, the consequences already done, but that's not the case.\n\n"
 lmf_lover.1200.desc.independent:0 "It's not that the fear the consequences, for I have no liege, "
 lmf_lover.1200.desc.liege:0 "It's not that I need fear the fear the consequences, with [lover.GetFirstNameNoTooltip] as my liege, "
 lmf_lover.1200.desc.ruler:0 "It's not that I fear the consequences, precisely, "
 lmf_lover.1200.desc.end:0 "it's more what all this sin will do to my immortal soul. The thought of it eats away at me, and though [lover.GetFirstNameNoTooltip] urges me to put it out of my mind, I cannot. There's nothing [lover.GetSheHe] can do which will make me feel good about this."
 lmf_lover.1200.a:0 "What am I to do?"
 lmf_lover.1205.t:0 "Au vu et au su de tous"
 lmf_lover.1205.desc:0 "I would have thought our relationship not being a secret would make things easier.\n\nAfter all, there's no need for lying. There's no need to cover up any assignations with [lover.GetFirstNameNoTooltip]. I'm the [ROOT.Char.GetTitleAsNameNoTooltip|l] of [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] and I can do as I wish, can't I?\n\nThe looks, however... my courtiers and vassals don't say anything, because how could they? But I can see the judgment in their eyes. I try to dismiss it, but it happens more and more the longer [lover.GetFirstNameNoTooltip] and I are together, and I have to admit it eats away at me a little."
 lmf_lover.1205.a:0 "How incredibly annoying."
 lmf_lover.1210.t:0 "The Whispers Have Begun"
 lmf_lover.1210.desc:0 "I thought we were being careful.\n\nClearly we weren't, as there have been whispers at court about [lover.GetFirstNameNoTooltip] and I... how often we're seen together, how friendly we appear to be, suspicions that perhaps it goes even further than that.\n\n\"I knew this would happen,\" [lover.GetFirstNameNoTooltip] said when I told [lover.GetHerHim] the news.\n\nMaybe so, but now we have to do something about it, before our secret is out in the open."
 lmf_lover.1210.a:0 "I'll try to put a stop to these whispers."
 lmf_lover.1210.b:0 "Let [lover.GetFirstNameNoTooltip] try to put a stop to these whispers."
 lmf_lover.1210.a.success.tt:0 "The rumors are successfully quelled"
 lmf_lover.1210.a.failure.tt:0 "The secret gets out anyhow"
 lmf_lover.1210.c:0 "[lover.GetFirstNameNoTooltip] and I need to spend time apart, until things quieten."
 lmf_lover.1215.t:0 "Un cœur tiraillé"
 lmf_lover.1215.desc.start:0 "Une nuit en compagnie de [lover.GetFirstName] devrait être l'occasion de s'enivrer d'étreinte sulfureuse, mais je ne ressens là qu'une tiédeur sobre désincarnée. Conscient[ROOT.Char.Custom('FR_E')] qu'[lover.Custom('FR_IlElle')] couve une contrariété à mon endroit, je l'interroge, avec l'insistance nécessaire à l'obtention d'une réponse : « C'est [other_lover.Custom('FR_le_Char_Pi')][other_lover.GetTitledFirstName] ! Je veux que cela cesse entre vous deux ! »\n\n"
 lmf_lover.1215.desc.spouse:0 "« Vous n'y pensez pas ? Faut-il rappeler qu'il s'agit de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('other_lover'))] ? »\n\n« Me prenez-vous pour un[lover.Custom('FR_E')] so[lover.Custom('FR_TTte')] ? [other_lover.Custom('FR_IlElle')|U] est plus que cela ! Votre façon de [other_lover.Custom('FR_LeLa')] #italic regarder#!, de [other_lover.Custom('FR_LeLa')] #bold toucher#!, de [other_lover.Custom('FR_LeLa')] #EMP désirer#! ! Que je sois damné[lover.Custom('FR_E')] si ce n'est pas de l'amour ! »\n\n"
 lmf_lover.1215.desc.secret:0 "L'espace d'un instant, je suis décontenancé[ROOT.Char.Custom('FR_E')], et cela ne lui échappe évidemment pas.\n\n« Vous me pensiez trop stupide pour être au fait de votre #italic petite aventure#! peut-être ? Stupide je ne le suis pas, et je n'irais donc pas ébruiter l'affaire, mais je refuse de n'être qu'une vulgaire conquête à vos yeux ! »\n\n"
 lmf_lover.1215.desc.public:0 "Ma relation avec [other_lover.GetFirstNameNoTooltip] n'ayant rien de secrète, je ne cherche même pas à feindre la surprise.\n\n« Vous vous pavanez avec [other_lover.Custom('FR_LuiElle')], bouffi[ROOT.Char.Custom('FR_E')] de fierté à l'exhiber comme un trophée. N'avez-vous donc aucun égard pour mes sentiments ? »\n\n"
 lmf_lover.1215.desc.end:0 "Je cherche les mots qui pourraient [lover.Custom('FR_LeLa')] rasséréner, [lover.Custom('FR_LeLa')] convaincre, ou tout du moins me sauver de cet embarras, mais je n'en ai aucun dans l'immédiat, et mon mutisme ne saurait me garder de ce qui arrive : « Puisque les mots vous font défauts en ma présence, peut-être devriez-vous retourner auprès de votre #italic bien-aimé[other_lover.Custom('FR_E')]#! ? »\n\nUne phrase aux formes doucereuses mais au fond amer, car c'est là un ultimatum non une invitation."
 lmf_lover.1215.a:0 "[lover.Custom('LoverPetName_possessive')|U], je suis vôtre et vous le savez !"
 lmf_lover.1215.b:0 "C'est donc ici que nos chemins se séparent."
 lmf_lover.1215.c:0 "Mon amour pour [other_lover.Custom('FR_LuiElle')] n'entache en rien mon amour pour vous."
 lmf_lover.1215.c.angry:0 "Malgré sa colère apparente, [lover.GetFirstNameNoTooltip] se ravise"
 lmf_lover.1215.c.dumped:0 "[lover.GetFirstNameNoTooltip] met un terme à sa relation avec vous"
 lmf_lover.1220.t:0 "Unexpected Babysitting?"
 lmf_lover.1220.desc:0 "When [lover.GetFirstNameNoTooltip] sent me a message that she wished to spend the day together, I was pleased. The [ROOT.Char.Custom('FortifiedBuilding')] was quiet, for once, so I was able to slip away.\n\nThus it was with some surprise when I saw her arrive with a [my_bastard.Custom('ChildhoodPersonalityTrait')|l] [my_bastard.Custom('polite_gender_ref')] at her side: [my_bastard.GetFirstNameNoTooltip], her [my_bastard.Custom('GetDaughterSon')]... who happens also to be my [my_bastard.Custom('GetDaughterSon')].\n\n\"I want [my_bastard.GetFirstNameNoTooltip] to get to know [my_bastard.GetHerHis] father,\" she said. \"You see [my_bastard.GetHerHim] so seldom, [lover.Custom2('spoken_address_by_familiarity', ROOT.Char)], this may be your only chance before [my_bastard.GetSheHe]'s grown.\"\n\nI could see she was determined to make this happen, but... a whole day with the [my_bastard.Custom('GetLassLad')]?"
 lmf_lover.1220.a:0 "Maybe this was a chance at a father-[my_bastard.Custom('GetDaughterSon')] relationship?"
 lmf_lover.1220.a.success:0 "The day together is a success"
 spent_time_with_me:0 "[CHARACTER.GetShortUIName|U] and [TARGET_CHARACTER.GetShortUIName] spent time getting to know each other as father and [CHARACTER.Custom('GetDaughterSon')]."
 spent_time_with_me_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U] and [CHARACTER.GetShortUIName] spent time getting to know each other as father and [TARGET_CHARACTER.Custom('GetDaughterSon')]."
 lmf_lover.1220.a.failure:0 "It's an awkward day full of disappointments"
 lmf_lover.1220.b:0 "I have neither the time nor patience for this!"
 refused_to_spend_time_with_me:0 "[CHARACTER.GetShortUINamePossessive|U] true father, [TARGET_CHARACTER.GetShortUIName], turned [Select_CString( CHARACTER.IsLocalPlayer, 'me', CHARACTER.GetHerHim )] away."
 refused_to_spend_time_with_me_corresponding:0 "[CHARACTER.GetShortUIName|U] turned away [CHARACTER.GetHerHisMy] secret [TARGET_CHARACTER.Custom('GetDaughterSon')], [TARGET_CHARACTER.GetShortUIName]."
 lmf_lover.1225.opening:0 "My love"
 lmf_lover.1225.secret:0 "I know this may come as a surprise, but it's time you knew: my darling [my_bastard.Custom('polite_gender_ref')], [my_bastard.GetFirstName], is your [my_bastard.Custom('GetDaughterSon')].\n\n"
 lmf_lover.1225.public:0 "I'm writing to you about our darling [my_bastard.Custom('polite_gender_ref')], [my_bastard.GetFirstName], who grows older and taller by the day.\n\n"
 lmf_lover.1225.courtier:0 "I want [my_bastard.GetHerHim] to have a good education and a future, and that won't happen here in [lover.GetLiege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. "
 lmf_lover.1225.pool:0 "I want [my_bastard.GetHerHim] to have a good education and a future, neither of which I can give [my_bastard.GetHerHim]. "
 lmf_lover.1225.end:0 "It's my wish to send [my_bastard.GetHerHim] to your court in [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] where [my_bastard.GetSheHe] can be raised as a proper young [my_bastard.GetWomanMan]. Can you do that for me?"
 lmf_lover.1225.a:0 "[new_guardian.GetTitledFirstNameNoTooltip] would make a fine guardian for the [my_bastard.Custom('GetLassLad')]."
 lmf_lover.1225.b:0 "I'm sure we can find someone here to be [my_bastard.GetHerHis] guardian, yes."
 lmf_lover.1225.c:0 "Bring [my_bastard.GetHerHim] here? No, that's not going to happen."
 lmf_lover.1230.t:0 "A Place for my [my_bastard.Custom('GetDaughterSon')|U]?"
 lmf_lover.1230.desc.start:0 "When [lover.GetFirstNameNoTooltip] formally requested to speak with me in private, I hesitantly agreed.\n\nAs it turned out, what she wanted to talk about — or, rather, who — was our [my_bastard.Custom('GetDaughterSon')]. "
 lmf_lover.1230.desc.othercourt:0 "\"[my_bastard.GetFirstNamePossessiveNoTooltip] potential is wasted in [my_bastard.GetLiege.GetTitledFirstNamePossessiveNoTooltip] court,\" she complained. "
 lmf_lover.1230.desc.otherknight:0 "\"[my_bastard.GetFirstNamePossessiveNoTooltip] potential is wasted as one of [my_bastard.GetLiege.GetTitledFirstNamePossessiveNoTooltip] [my_bastard.GetLiege.Custom('KnightCulturePluralNoTooltipLowercase')],\" she complained. "
 lmf_lover.1230.desc.other:0 "\"[my_bastard.GetFirstNameNoTooltip] has no duties in [my_bastard.GetLiege.GetTitledFirstNamePossessiveNoTooltip] court. All that potential! Wasted!\" she complained. "
 lmf_lover.1230.desc.court:0 "\"[my_bastard.GetFirstNamePossessiveNoTooltip] potential is wasted here in [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip],\" she complained. \"You need to give [my_bastard.GetHerHim] something useful to do!\"\n\n"
 lmf_lover.1230.desc.pool:0 "\"[my_bastard.GetFirstNameNoTooltip] has so much potential, but no liege to properly serve,\" she complained. "
 lmf_lover.1230.desc.bring:0 "\"I want you to bring [my_bastard.GetHerHim] here, where [my_bastard.GetSheHe] can be useful.\"\n\n"
 lmf_lover.1230.desc.mid:0 "\"Define 'useful',\" I asked.\n\n"
 lmf_lover.1230.desc.target:0 "She had an answer at the ready: \"Make [my_bastard.GetHerHim] your [my_bastard.Custom('GetTargetCourtPosition')].\" I almost guffawed, but [lover.GetFirstNameNoTooltip] was adamant. "
 lmf_lover.1230.desc.notarget:0 "Now [lover.GetFirstNameNoTooltip] was less certain. \"I... I don't know. #EMP Something#!!\" I told her that was less than useful, but she was adamant. "
 lmf_lover.1230.desc.backup:0 "\"Or your [my_bastard.Custom('GetBackupCourtPosition')], perhaps!\" she shouted. "
 lmf_lover.1230.desc.end:0 "\"[my_bastard.GetFirstNameNoTooltip] is your actual blood! You #EMP owe#! [my_bastard.GetHerHim] a chance!\""
 lmf_lover.1230.a:0 "\"Very well, [my_bastard.GetFirstNameNoTooltip] will be my [my_bastard.Custom('GetTargetCourtPosition')].\""
 lmf_lover.1230.b:0 "\"I... suppose [my_bastard.GetSheHe] could be my [my_bastard.Custom('GetBackupCourtPosition')], certainly.\""
 lmf_lover.1230.c:0 "\"[my_bastard.GetSheHe|U] may come and join the ranks of my [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\""
 lmf_lover.1230.d:0 "\"I do not, in fact, owe [my_bastard.GetHerHim] #EMP anything#!.\""
 lmf_lover.1231.title.tt:0 "Broken Promise"
 lmf_lover.1231.desc:0 "You broke your promise to [lover.GetFirstNameNoTooltip], rescinding [my_bastard.GetFirstNamePossessive] position in your court."
 lmf_lover.1235.t:0 "A Legitimate Request"
 lmf_lover.1235.desc:0 "After a recent evening spent with [lover.GetFirstNameNoTooltip], she brought up the subject of our [my_bastard.Custom('GetDaughterSon')], [my_bastard.GetFirstName].\n\n\"Everyone knows who I am to you,\" she said, \"and they know who [my_bastard.GetSheHe] is, as well. It's time for [my_bastard.GetHerHim] to be legitimized.\"\n\n\"Legitimized?\" I was genuinely surprised. \"But you and I aren't married, my love.\"\n\nThe look she shot me said, very clearly, that this was #EMP my#! doing and not hers. \"Yet [my_bastard.GetSheHe] is your [my_bastard.Custom('GetDaughterSon')]! It's not right that [my_bastard.GetSheHe] be treated differently, and you can change that!\" I could tell that [lover.GetFirstNameNoTooltip] was going to insist."
 lmf_lover.1235.a:0 "Perhaps she has a point. Very well."
 lmf_lover.1235.topliege.tt:0 "You will send a request to [recipient.GetShortUIName] that [secondary_recipient.GetShortUIName] be legitimized"
 lmf_lover.1235.b:0 "No, it's simply not going to happen."
 lmf_lover.1240.t:0 "L'amour et labeur"
 lmf_lover.1240.desc:0 "Lorsque notre relation n'en était qu'à ses balbutiements, je n'envisageais pas que, maintes années passant, [lover.GetFirstName] et moi serions encore deux tourtereaux roucoulant à l'unisson.\n\nNaguère ce n'était pour moi qu'une frivolité, et pourtant, nous voilà, [ROOT.Char.GetTitleAsNameNoTooltip|l] [ROOT.Char.Custom('RomanticComplimentAdjective')] et [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))] [lover.Custom('RomanticComplimentAdjective')], bravant les aléas de la vie sous voile commune. Certes, l'ardeur a perdu de sa superbe, la fougue s'est effritée, mais la flamme n'est point morte pour autant.\n\nSi telle est ma volonté, je puis faire perdurer cette flamme, l'entretenir, la nourrir. D'une flammèche vacillante je puis attiser un brasier étincelant, mais cela ne se fera pas sans labeur. Du reste, je le redis : #EMP si telle est ma volonté…#!"
 lmf_lover.1240.a:0 "Je refuse de voir s'éteindre une si belle histoire !"
 lmf_lover.1240.b:0 "Si l'amour exige le labeur, c'est qu'il s'agit d'une corvée…"
 lmf_lover.1245.t:0 "L'amour et la haine"
 lmf_lover.1245.desc:0 "De toute évidence, [lover.GetFirstName] est fâché[lover.Custom('FR_E')] contre moi.\n\nOu peut-être est-ce plus qu'une simple fâcherie ? Peut-être commence-t-[lover.Custom('FR_IlElle')] à nourrir une inimitié à mon endroit. Voire peut-être même de l'animosité ? Cela pourrait expliquer pourquoi la fréquence de nos entrevues semble péricliter à mesure que le temps passe. Et quand enfin nous nous voyons, je ne sens plus la chaleur du feu des premiers jours, mais juste la froideur de braises consumées.\n\nJe pourrais espérer que ce ne sont là que fugaces nuages destinés à s'éloigner, mais il serait peut-être plus avisé d'y voir le présage d'un décours de notre relation, et d'y remédier…"
 lmf_lover.1245.a:0 "Il me faut agir si je ne veux point [lover.Custom('FR_LeLa')] perdre."
 lmf_lover.1250.t:0 "Un mot de travers ?"
 lmf_lover.1250.desc:0 "Je dois bien reconnaître que j'ai connu [lover.GetFirstName] plus volubile.\n\nPas un mot ne sort de sa bouche depuis le début de la soirée, et si son mutisme est mu par une colère, j'en suis vraisemblablement l'instigat[ROOT.Char.Custom('FR_EurRice')], et ce malgré moi, car mes efforts pour me souvenir de ce que j'ai pu dire ou faire restent vains. Quant à mes tentatives pour lui soutirer des réponses, elles ne sont guère plus fructueuses. Néantisées par une irritation croissante, elles finissent par gangréner la situation au point de voir la silhouette de [lover.Custom('LoverPetName_possessive')] sortir en trombe.\n\nCe n'est peut-être qu'une contrariété bégnine, mais cela n'en reste pas moins une épine dans notre relation qu'il ferait bon de retirer avant qu'elle ne nous cause plus de désagrément."
 lmf_lover.1250.a:0 "Je ne vais certainement pas rester les bras ballants !"
 lmf_lover.1250.a.success:0 "[lover.GetFirstNameNoTooltip] est touché[lover.Custom('FR_E')] par vos efforts"
 lmf_lover.1250.a.failure:0 "Vos efforts ne font qu'aggraver la situation"
 lmf_lover.1250.b:0 "Il faut donner du temps au temps."
 lmf_lover.1255.t:0 "Comme chien et chat"
 lmf_lover.1255.desc.courtier:0 "Quel plaisir d'avoir enfin une occasion de passer la soirée avec [lover.GetFirstName], "
 lmf_lover.1255.desc.notcourtier:0 "Quel plaisir de recevoir une visite de [lover.GetFirstName] lorsque le hasard nous amène à pouvoir passer la soirée ensemble, "
 lmf_lover.1255.desc.mid:0 "chose rare ces derniers jours.\n\nTout débute dans l'enjouement mais avant que je ne réalise, les lèvres courbées deviennent des sourcils froncés. Une plaisanterie mal interprétée — ou mal choisie — une remarque un peu trop cru, et nous voilà à nous quereller. Le long chemin jusqu'à la chambre nous donne largement le temps nécessaire d'envenimer la situation, et quand enfin la couche est à portée de mains, il n'est déjà plus question de consommer. "
 lmf_lover.1255.desc.courtier2:0 "[lover.GetFirstNameNoTooltip] sort en trombe et j'entends encore les échos courroucés de ses pas à travers [ROOT.Char.Custom('FR_ResidenceBuilding_Le')] bien après son départ."
 lmf_lover.1255.desc.notcourtier2:0 "[lover.GetFirstNameNoTooltip] sort en trombe et je vois sa silhouette quitter [ROOT.Char.Custom('FR_ResidenceBuilding_Le')] sans même un regard en arrière."
 lmf_lover.1255.desc.end:0 "\n\nCette discorde me donne alors matière à réfléchir. Nous sommes si différent[ROOT.Char.Custom2('FR_E', SCOPE.sC('lover'))]s l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('lover'))] de l'autre, tant et si bien que j'en viens parfois à m'étonner que nous soyons devenu[ROOT.Char.Custom2('FR_E', SCOPE.sC('lover'))]s si proches. Je pourrais rasséréner la situation, mais au prix de maints efforts… et en tout état de cause, je ne suis pas l'unique fauti[ROOT.Char.Custom('FR_FVe')] de cette foudre."
 lmf_lover.1255.a:0 "L'amour mérite que l'on s'y investisse."
 lmf_lover.1255.a.success.tt:0 "Vous parvenez à arranger les choses"
 lmf_lover.1255.a.failure.tt:0 "[lover.GetFirstNameNoTooltip] n'a que faire de vos efforts"
 lmf_lover.1255.b:0 "Pourquoi serait-ce à moi de faire des efforts ?"
 lmf_lover.1260.t:0 "Le devoir et la mort de l'amour"
 lmf_lover.1260.desc:0 "Parmi tous les points communs qui nous rapprochent, [lover.GetFirstName] et moi, nos responsabilités au pouvoir sont probablement ce qu'il y a de plus frustrant, car c'est aussi ce qui nous éloigne le plus.\n\nPuisque l'un[ROOT.Char.Custom('FR_E')] est [ROOT.Char.GetTitleAsNameNoTooltip] de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] et l'autre [lover.GetTitleAsNameNoTooltip] de [lover.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], nous n'avons que trop rarement du temps à consacrer l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('lover'))] à l'autre.\n\nÀ cause de cela, notre relation pourrait s'en trouver effritée, comme un règne peut l'être lorsque l'autorité n'est pas réaffirmé. Ainsi la solution paraît évidente, réaffirmer notre amour. Cela demandera des efforts, de la persévérance et du temps, mais si je ne fais rien, cet amour pourrait n'être rien de plus qu'une page dans un recueil de mémoire…"
 lmf_lover.1260.a:0 "Qu'est-ce que le devoir en comparaison de l'amour d'un[lover.Custom('FR_E')] [lover.GetWomanMan] ?"
 lmf_lover.1260.b:0 "Le devoir prime sur l'amour !"
 lmf_lover.1265.t:0 "Au mauvais endroit, au mauvais moment"
 lmf_lover.1265.desc:0 "[lover.GetFirstNameNoTooltip] and I had just finished another delightful evening in each other's company. In fact, [lover.GetSheHe]'d just finished gathering [lover.GetHerHis] clothes and slipped out of the bedchambers when I suddenly heard the door open again.\n\nThinking it was [lover.GetHerHim], I jumped out of bed. \"Did you forget something, my love?\" I called out.\n\nIt was only then, belatedly, that I realized my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('my_courtier'))|l] stood in the doorway and not [lover.GetHerHim], having come to deliver a message.\n\nDid [my_courtier.GetFirstNameNoTooltip] hear what I'd said? Had [my_courtier.GetSheHe] seen [lover.GetFirstNameNoTooltip] leave, not moments before? I had to think quickly..."
 lmf_lover.1265.a:0 "Convince [my_courtier.GetFirstNameNoTooltip] that it was all a misunderstanding."
 lmf_lover.1265.a.success.tt:0 "[my_courtier.GetFirstNameNoTooltip] is convinced it was nothing"
 lmf_lover.1265.a.failure.tt:0 "[my_courtier.GetFirstNameNoTooltip] knows you're lying"
 lmf_lover.1265.b:0 "Appeal to [my_courtier.GetFirstNameNoTooltip] not to say a word."
 lmf_lover.1265.b.success.tt:0 "[my_courtier.GetFirstNameNoTooltip] agrees to keep [my_courtier.GetHerHis] mouth shut"
 courtier_promised_not_to_reveal_tt:0 "[my_courtier.GetFirstNameNoTooltip] promises not to reveal the [secret|E]"
 lmf_lover.1265.b.failure.tt:0 "You aren't very convincing"
 lmf_lover.1265.c:0 "Dismiss [my_courtier.GetHerHim] and then wait to see what comes of it."
 lmf_lover.1265.c.knows.tt:0 "[my_courtier.GetFirstNameNoTooltip] saw everything and knows"
 lmf_lover.1265.c.revealed.tt:0 "[my_courtier.GetFirstNameNoTooltip] tells someone, and word spreads..."
 lmf_lover.1265.c.learned.tt:0 "[my_courtier.GetFirstNameNoTooltip] keeps the secret to [my_courtier.GetHerselfHimself], for now"
 lmf_lover.1270.t:0 "Un témoin fortuit"
 lmf_lover.1270.desc:0 "Dans un élan de lubricité sémillante, [lover.GetFirstName] et moi nous éclipsons des nombreux regards qui fourmillent dans les couloirs [ROOT.Char.Custom('FR_ResidenceBuilding_Du')] pour aller nous draper dans notre impudicité fiévreuse. Nos galipettes éhontées auraient pu — et auraient dû — continuer tout du long de la course du soleil jusqu'à l'horizon lointain, mais c'était sans compter sur l'apparition fortuite d'un[my_courtier.Custom('FR_E')] jeune [my_courtier.Custom('GetLassLad')].\n\nLes yeux de [lover.GetFirstNameNoTooltip] s'écarquillent en voyant [my_courtier.GetFirstName], plongé[my_courtier.Custom('FR_E')] dans un état de confusion à l'orée de la fenêtre.\n\n« [my_courtier.Custom('FR_IlElle')|U] nous a vu ! » dit-[lover.Custom('FR_IlElle')] d'une voix alerte, alors que mille pensées m'assaillent en un instant. Et incertain est cet instant, car tout peut basculer : que se passerait-il [my_courtier.Custom('FR_SilSielle')] venait à répéter ce qu'[my_courtier.Custom('FR_IlElle')] a vu, quoi qu'[my_courtier.Custom('FR_IlElle')] ait vu ? L'instant est crucial, la décision ne peut se faire attendre, et je me répète : #italic tout peut basculer en un instant…#!"
 lmf_lover.1270.a:0 "[my_courtier.Custom('FR_IlElle')|U] est à l'âge de la crédulité, une jolie histoire suffira."
 lmf_lover.1270.a.success.tt:0 "Vous réussissez à [my_courtier.Custom('FR_LeLa')] mener en bateau"
 lmf_lover.1270.a.failure.tt:0 "Vos tentatives pour [my_courtier.Custom('FR_LeLa')] duper ne font qu'empirer les choses"
 lmf_lover.1270.b:0 "Qui croira les divagations d'un marmot ?"
 lmf_lover.1270.c:0 "Les choses que je fais par amour..."
 lmf_lover.1270.c.tt:0 "#EMP Vous poussez [my_courtier.Custom('FR_le_Char_U_Pi')][my_courtier.GetShortUINameNoTooltip] par la fenêtre, qui a de fortes chances de mourir de la chute !#!\n"
 lmf_lover.1270.c.death.tt:0 "#EMP [my_courtier.Custom('FR_le_Char_Pi')|U][my_courtier.GetTitledFirstNameNoTooltip] est victime d'une chute mortelle… et vraisemblablement accidentelle.#!"
 lmf_lover.1270.c.death.title:0 "[my_courtier.Custom('FR_le_Char_Pi')|U][my_courtier.GetTitledFirstNameNoTooltip] meurt d'une chute"
 lmf_lover.1270.c.death.desc:0 "[my_courtier.Custom('FR_le_Char_U_Pi')|U][my_courtier.GetShortUIName] a péri après être tombé[my_courtier.Custom('FR_E')] de la fenêtre d'une chambre. Tout porte à croire à un sinistre accident."
 lmf_lover.1270.c.death2.title:0 "[my_courtier.Custom('FR_le_Char_Pi')|U][my_courtier.GetTitledFirstNameNoTooltip] meurt de la chute"
 lmf_lover.1270.c.death2.desc:0 "[my_courtier.Custom('FR_le_Char_U_Pi')|U][my_courtier.GetShortUIName] n'a pas survécu à la chute. Votre secret ne sera pas ébruité."
 lmf_lover.1270.c.crippled.tt:0 "#EMP La chute ne tue pas [my_courtier.Custom('FR_le_Char_Pi')][my_courtier.GetTitledFirstNameNoTooltip], mais [my_courtier.Custom('FR_LeLa')] laisse sévèrement blessé[my_courtier.Custom('FR_E')] et estropié[my_courtier.Custom('FR_E')]. Lorsqu'[my_courtier.Custom('FR_IlElle')] sera rétabli[my_courtier.Custom('FR_E')], [my_courtier.Custom('FR_IlElle')] sera en mesure de dire à tout le monde ce qu'[my_courtier.Custom('FR_IlElle')] a vu.#!"
 lmf_lover.1270.c.crippled.title:0 "[my_courtier.Custom('FR_le_Char_Pi')|U][my_courtier.GetTitledFirstNameNoTooltip] a survécu"
 lmf_lover.1270.c.crippled.desc:0 "Bien que sévèrement blessé[my_courtier.Custom('FR_E')] et estropié[my_courtier.Custom('FR_E')], [my_courtier.Custom('FR_le_Char_U_Pi')][my_courtier.GetShortUIName] a survécu à la chute. Une fois rétabli[my_courtier.Custom('FR_E')], [my_courtier.Custom('FR_IlElle')] sera en mesure de dire à tout le monde ce qu'[my_courtier.Custom('FR_IlElle')] a vu."
 lmf_lover.1270.c.survive.tt:0 "#EMP [my_courtier.Custom('FR_le_Char_Pi')|U][my_courtier.GetTitledFirstNameNoTooltip] survit miraculeusement à la chute sans réelle blessure, [my_courtier.Custom('FR_LeLa')] laissant capable de dire à tout le monde ce qu'[my_courtier.Custom('FR_IlElle')] a vu.#!"
 lmf_lover.1270.c.survive.desc:0 "[my_courtier.Custom('FR_le_Char_U_Pi')|U][my_courtier.GetShortUIName] est ressorti[my_courtier.Custom('FR_E')] presque indemne de sa chute, [my_courtier.Custom('FR_LeLa')] laissant capable de dire à tout le monde ce qu'[my_courtier.Custom('FR_IlElle')] a vu !"
 lmf_lover.1271.t:0 "Tomber en disgrâce !"
 lmf_lover.1271.start:0 "I was informed that [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))] fell from one of the [ROOT.Char.Custom('FortifiedBuilding')] windows today, a plummet down to the courtyard which should have ended [my_courtier.GetHerHis] young life.\n\n"
 lmf_lover.1271.crippled:0 "Instead, the [my_courtier.Custom('GetLassLad')] managed to survive... though only barely. I'm told [my_courtier.GetHerHis] injuries are quite severe, and [my_courtier.GetSheHe] may never walk again.\n\n"
 lmf_lover.1271.survived:0 "Instead, it appears the [my_courtier.Custom('GetLassLad')] managed to sustain only a few injuries, with recovery all certain. Ah, the resilience of youth!\n\n"
 lmf_lover.1271.end:0 "More concerning is #EMP why#! [my_courtier.GetSheHe] fell. As soon as [my_courtier.GetTitledFirstName] was able to speak, [my_courtier.GetSheHe] said that [my_courtier.GetSheHe]'s encountered [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('murderer'))] and [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('lover'))] in a... compromising position, there in the bedroom. Rather than risk their affair be revealed, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('murderer'))] pushed [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))] out the bedroom window! An attempted murder, to cover up [murderer.GetHerHis] own indiscretions!"
 lmf_lover.1271.a:0 "Unbelievable!"
 lmf_lover.1271.a.tt1:0 "[scope:my_courtier.GetShortUINameNoTooltip] exposes [scope:murderer.GetShortUINamePossessive] Lover Secret"
 lmf_lover.1271.a.tt2:0 "[scope:my_courtier.GetShortUINameNoTooltip] exposes [scope:murderer.GetShortUINamePossessive] Attempted Murder Secret"
 lmf_lover.1275.t:0 "My [ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))]'s Lover"
 lmf_lover.1275.desc.start:0 "[lover.GetFirstNameNoTooltip] has been acting differently, as of late. Nothing suspicious, necessarily, but distant. Distracted. It was enough that I "
 lmf_lover.1275.desc.courtier:0 "quietly had some servants in the [ROOT.Char.Custom('FortifiedBuilding')] keep an eye on [lover.GetHerHim] when I wasn't about.\n\n"
 lmf_lover.1275.desc.othercourtier:0 "paid several servants to keep an eye on [lover.GetHerHim] when [lover.GetSheHe] returned to [lover.GetLiege.GetTitledFirstNamePossessiveNoTooltip] court after our last meeting.\n\n"
 lmf_lover.1275.desc.landed:0 "paid several servants at [lover.GetHerHis] court in [lover.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] to keep an eye on [lover.GetHerHim].\n\n"
 lmf_lover.1275.desc.other:0 "paid several servants to follow [lover.GetHerHim] when [lover.GetSheHe] departed from [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] after our last meeting.\n\n"
 lmf_lover.1275.desc.end:0 "My intention was only to find out what was amiss, as perhaps it was something I could help with. What the servants reported back, however, surprised me.\n\n[lover.GetFirstNameNoTooltip] was seen several times in the company of [other_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]... and these were no innocent meetings. The two were spotted laughing, touching, carrying on, and would immediately stand apart and play innocent if they thought anyone else was near.\n\nIt's clear to me, now: [lover.GetFirstNameNoTooltip] has a secret lover of [lover.GetHerHis] own."
 lmf_lover.1275.a:0 "Well, #EMP that#! was unexpected..."
 lmf_lover.1280.t:0 "[lover.GetHerHis|U] Other Lover"
 lmf_lover.1280.desc:0 "I can't get the thought of them out of my head.\n\n[lover.GetFirstNameNoTooltip] and [other_lover.GetTitledFirstNameNoTooltip], their bodies entwined between the bedsheets, sweat mingling, gasps escaping from their lips as they...\n\n#EMP No.#! I need to do something about this before I go insane, surely."
 lmf_lover.1280.a:0 "[lover.GetFirstNameNoTooltip] has to choose between us."
 lmf_lover.1280.a.you:0 "[lover.GetFirstNameNoTooltip] chooses you"
 lmf_lover.1280.a.them:0 "[lover.GetFirstNameNoTooltip] chooses [other_lover.GetHerHim]"
 lmf_lover.1280.b:0 "I'll try to put it out of my head..."
 lmf_lover.1280.c:0 "No, I've had enough. This ends here."
 lmf_lover.1285.t:0 "Un amour mourant"
 lmf_lover.1285.desc:0 "[lover.GetFirstName] habitait pleinement mes pensées il y a peu, mais maintenant [lover.Custom('FR_IlElle')] n'est plus qu'un[lover.Custom('FR_E')] invité[lover.Custom('FR_E')] fugace. Moins que l'ombre d'une silhouette.\n\nÀ quand remonte sa dernière visite ? Sa dernière lettre ? Je pourrais maudire ce temps si prompt à s'écouler, mais je ne suis pas exempt[ROOT.Char.Custom('FR_E')] de faute non plus, moi qui n'ai rien fait pour y remédier. Que dit l'adage ? #italic Loin des yeux, loin du cœur#! ? Certes, mais peut-être n'est-il pas trop tard ? Peut-être qu'une simple décision, une simple action, un simple geste, peut encore raviver la flamme ?\n\nMais est-ce vraiment ce que je souhaite ? Moi qui me ronge les sangs presque par un simple hasard ? Certaines pages se doivent d'être tournées après tout, n'est-ce pas ?"
 lmf_lover.1285.a:0 "Si je pense à [lover.Custom('FR_LuiElle')], c'est qu'il y a encore quelque chose à sauver !"
 lmf_lover.1285.a.success.tt:0 "Vos efforts méritent d'être loués"
 lmf_lover.1285.a.failure.tt:0 "Vous ne faites qu'empirer la situation"
 lmf_lover.1285.b:0 "Soit. Adieu [lover.GetFirstNameNoTooltip]…"
 lmf_lover.1500.t:0 "Loin des yeux, loin du cœur"
 lmf_lover.1500.desc:0 "[lover.GetFirstName], où êtes-vous donc à cet instant ? Vos nouvelles me viennent bien moins vite que mes doutes, hélas. Je vous savais à [lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] il y a déjà maintes lunes, mais je sais aussi l'amour capable de distordre autant l'esprit que le temps.\n\nÔ [lover.GetFirstNameNoTooltip], mes pensées vous accompagnent, mais votre absence meurtrie si bien mes sentiments que je commence à redouter le jour où nous nous reverrons.\n\nLe goût de vos lèvres s'estompe, le parfum de votre chair s'essouffle. Vous n'êtes déjà plus qu'une silhouette, et tout ce qu'il me reste à chérir ce sont des souvenirs…"
 lmf_lover.1500.a:0 "Sans âme, je ne suis que l'amant[ROOT.Char.Custom('FR_E')] d'une ombre…"
 lmf_lover.1505.t:0 "Un amour au loin"
 lmf_lover.1505.desc.start:0 "Savoir à quand remonte la dernière fois que j'eus des nouvelles de [lover.GetFirstName] relève de l'énigme, tant les jours se font semaines, et les semaines se font mois. L'inquiétude que j'ai à son endroit allant jusqu'à me priver de mon loisir favori : [ROOT.Char.Custom('IdleActivity')].\n\nEst-[lover.Custom('FR_IlElle')] encore "
 lmf_lover.1505.desc.courtier:0 "à la Cour [lover.Custom('FR_du_Char_Pi')][lover.GetLiege.GetTitledFirstNameNoTooltip], à [lover.GetLiege.GetPrimaryTitle.GetNameNoTierNoTooltip] ? "
 lmf_lover.1505.desc.pool:0 "quelque part à [lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] ? "
 lmf_lover.1505.desc.end:0 "\n\nSi tel est le cas, alors je pourrais lui faire savoir qu'[lover.Custom('FR_IlElle')] a sa place ici, dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Pour ce faire il faudrait bien entendu que missive ou messager lui parviennent."
 lmf_lover.1505.a:0 "Allez quérir [lover.Custom('LoverPetName_possessive')]. Preste !"
 lmf_lover.1505.a.success.tt:0 "Votre message arrive jusqu'à [lover.GetFirstNameNoTooltip], qui accepte de rejoindre votre Cour"
 lmf_lover.1505.b:0 "Je m'inquiète trop. [lover.Custom('FR_IlElle')|U] saura me rejoindre si tel est son désir."
