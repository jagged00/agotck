 trait_education_heir_training_4:0 "Maître de la gouvernance"
 trait_education_heir_training_4_desc:1 "Ce personnage a probablement passé plus d'années à étudier qu'il n'en passera à régner, lui permettant de devenir un véritable virtuose en matière de gouvernance et de politique."
 trait_education_heir_training_4_character_desc:1 "[ROOT.GetCharacter.GetFirstNameNoTooltip] a probablement passé plus d'années à étudier qu'[ROOT.GetCharacter.Custom('FR_IlElle')] n'en passera à régner, lui permettant de devenir un[ROOT.GetCharacter.Custom('FR_E')] véritable virtuose en matière de gouvernance et de politique."
 heir_training_progress_tt:0 "\n\n#help (Progression vers le niveau suivant : [Character.MakeScope.ScriptValue('heir_training_progress_value')|0]%)#!"
 game_concept_lmf_heir_training:0 "Formation d'héritier"
 game_concept_lmf_heir_training_desc:0 "Lorsqu'il atteint l'âge de 12 ans, l'[player_heir|El] d'un dirigeant reçoit le [trait|El] [GetTrait('heir_in_training').GetName( GetNullCharacter )|l] et commence son éducation dans l'art de la gouvernance et de la politique :\n\n$EFFECT_LIST_BULLET$Cette formation requiert que l'héritier soit à la [court|El] d'un [ruler|El]. Elle progressera chaque année tant que l'héritier et son [guardian|El] (ou son [liege|El], une fois l'héritier devenu adulte) seront disponibles et en bonne santé.\n\n$EFFECT_LIST_BULLET$La progression dépends du niveau d'[learning|El] de l'héritier et du tuteur (ou du lige), de l'âge de l'héritier (l'efficacité de la formation s'en trouve ralentit à mesure qu'il vieillit), et plusieurs autres facteurs tels que l'intelligence, ou les traits [GetTrait('diligent').GetName( GetNullCharacter )] et [GetTrait('patient').GetName( GetNullCharacter )].\n\n$EFFECT_LIST_BULLET$L'héritier sera considéré comme « formé » une fois qu'il aura reçu le trait [GetTrait('education_heir_training_1').GetName( GetNullCharacter )|l] et il le conservera même après l'obtention d'un [title|El]. Il peut néanmoins poursuivre sa formation et espérer faire progresser le trait jusqu'à [GetTrait('education_heir_training_4').GetName( GetNullCharacter )|l].\n\n$EFFECT_LIST_BULLET$La formation cesse lorsque l'héritier n'est plus dans la même cour que son lige, par exemple lors de l'obtention d'un titre."
 game_concept_lmf_lover_rating:0 "Progression amoureuse"
 game_concept_lmf_lover_rating_desc:0 "Lorsqu'un personnage devient votre [lover|El] ou votre [soulmate|El], l'intensité de vos sentiments peut croître ou décroître, faisant ainsi évoluer votre relation, et impactant fortement le type d’événements d'amour que vous recevrez.\n\nAugmenter la progression amoureuse demande du temps et des efforts, et selon son évolution, en bien ou en mal, vous pouvez atteindre les différents paliers que sont :\n\n$EFFECT_LIST_BULLET$#difficulty_hard Adoration#! : palier de départ pour les âmes sœurs et qui permet à deux amants de devenir âmes sœurs\n$EFFECT_LIST_BULLET$#difficulty_hard Amour idyllique#!\n$EFFECT_LIST_BULLET$#difficulty_hard Amour#! : palier de départ pour les amants et qui peut amener deux âmes sœurs à redevenir de simples amants\n$EFFECT_LIST_BULLET$#difficulty_hard Amourette#! : palier auquel deux âmes sœurs redeviendront toujours de simples amants\n$EFFECT_LIST_BULLET$#difficulty_hard Cœur flétri#!\n$EFFECT_LIST_BULLET$#difficulty_hard Désamour#! : palier auquel la relation prendra systématiquement fin"
 game_concept_lmf_relatives_by_marriage:0 "Belle famille"
 game_concept_good_mother:0 "Belle-mère"
 game_concept_good_father:0 "Beau-père"
 game_concept_good_sister:0 "Belle-sœur"
 game_concept_good_brother:0 "Beau-frère"
 game_concept_good_son:0 "Beau-fils"
 game_concept_good_daughter:0 "Belle-fille"
 game_concept_lmf_relatives_by_marriage_desc:0 "La belle famille d'un personnage comprend les liens de parenté « [Concept('marriage','par alliance')|E] » que sont :\n\n$BULLET_WITH_TAB$ Belle-mère\n$BULLET_WITH_TAB$ Beau-père\n$BULLET_WITH_TAB$ Belle-soeur\n$BULLET_WITH_TAB$ Beau-frère\n$BULLET_WITH_TAB$ Belle-fille\n$BULLET_WITH_TAB$ Beau-fils\n\nBelle-mère et beau-père désignent les parents de votre [Concept('spouse','conjoint(e)')|E], tout comme vous seriez leur beau-fils ou leur belle-fille. #weak (à ne pas confondre avec l'usage de belle-mère et beau-père pour désigner les épouses ou époux de vos parents, appelés marâtre et parâtre dans AGOT)#!\n\nBelle-fille et beau-fils désignent les épouses ou époux de vos enfants. #weak (à ne pas confondre avec l'usage de belle-fille et beau-fils pour désigner les enfants de votre époux ou épouse qui ne sont pas biologiquement les vôtres, appelés tous deux fillâtre dans AGOT)#!\n\nBelle-sœur et beau-frère désignent les épouses et époux de vos frères et sœurs."
 tutor_teach_languages:0 "Précepteur linguistique"
 tutor_teach_languages_desc:0 "Ce personnage est chargé de décider pour quelles langues les membres de votre famille recevront des cours particuliers, sans que votre intervention ne soit requise."
 tutor_teach_languages_tt:0 "L'apprentissage des [languages|El] auprès des membres de la famille à la cour sera prise en charge automatiquement.\n\nAvec un niveau d'[aptitude|El] élevé, des courtisans parlant des langues jugées importantes pourront être introduits à la [court|El] de temps à autre."
