 intro_activity_short_poetry:0 "la poésie [ROOT.GetCharacter.GetCulture.GetNameNoTooltip]"
 intro_activity_short_library:0 "le bouquinage dans la bibliothèque"
 intro_activity_short_church:0 "la journée de prières"
 intro_activity_short_tavern:0 "la petite récréation dûment arrosée"
 intro_activity_short_poor:0 "la journée de charité"
 intro_activity_short_tour:0 "le tour du domaine"
 intro_activity_short_garden:0 "la balade à travers les jardins"
 lmf_interaction.1326.t:0 "Un bon début"
 lmf_interaction.1326.desc.start.actor:0 "[secondary_recipient.GetFirstName] fut d'une agréable compagnie durant une journée qui le fut tout autant.\n\n"
 lmf_interaction.1326.desc.start.actor.hunting:0 "Une journée où la traque d'une quelconque venaison n'était bien entendu qu'un prétexte pour sillonner les environs dans une sérénité devenue le vivier de longues et plaisantes conversations."
 lmf_interaction.1326.desc.start.actor.hike:0 "Une journée où nos pas nous ont menés vers des lieux chargés en histoire et marqués par l'Histoire, qui donnèrent lieu à de longues et plaisantes conversations."
 lmf_interaction.1326.desc.start.actor.garrison:0 "Une journée où le fer qui s'entrechoquait résonnait avec autant de passion que les échos de nos conversations, et où je préférais m'exprimer avec ma langue plutôt qu'avec m[ROOT.Char.Custom('FR_ArtifactWeaponBaseType_OnA')]."
 lmf_interaction.1326.desc.start.actor.poetry:0 "Une journée où les jardins sont devenus notre monde, la poésie mon langage, la passion ma foi, et les mots le vivier de longues et plaisantes conversations."
 lmf_interaction.1326.desc.start.actor.library:0 "Une journée à parcourir les étagères de la bibliothèque, pas tant pour y trouver livres et volumes, mais pour y puiser l'inspiration nourricière de longues et plaisantes conversations."
 lmf_interaction.1326.desc.start.actor.poor:0 "Une journée baignée dans la mansuétude, [actor.GetFaith.HouseOfWorship] devenant le phare d'une bonté qui a profité aux nécessiteux, tandis que nous nous sommes [Select_CString(And(secondary_recipient.IsFemale, actor.IsFemale), 'enrichies', 'enrichis')] de longues et plaisantes conversations."
 lmf_interaction.1326.desc.start.actor.tour:0 "Une journée où la visite des alentours [actor.Custom('FR_ResidenceBuilding_Du')], bien que propice à démontrer toute la grandeur de [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], n'aura été qu'un prétexte pour faire grandir notre relation."
 lmf_interaction.1326.desc.start.actor.garden:0 "Une journée où les jardins [actor.Custom('FR_ResidenceBuilding_Du')] ont vu fleurir de longues et plaisantes conversations, bourgeons d'une relation en devenir."
 lmf_interaction.1326.desc.start.actor.hated:0 "\n\nCertes, [secondary_actor.Custom('lmf_intro_activity_short')] n'aura pas été vraiment du goût de [secondary_recipient.GetFirstNameNoTooltip], pourtant "
 lmf_interaction.1326.desc.start.actor.loved:0 "\n\n[secondary_recipient.GetFirstNameNoTooltip] aura grandement apprécié [secondary_actor.Custom('lmf_intro_activity_short')], du reste "
 lmf_interaction.1326.desc.start.actor.neutral: "\n\nJe ne saurais dire si [secondary_recipient.GetFirstNameNoTooltip] a pleinement profité de la journée ou non, mais "
 lmf_interaction.1326.desc.start.actor.mid:0 "nous avons longuement échangé sur ce que nous espérions pour l'avenir, et l'indiscrétion d'yeux alentours n'aura pas été suffisante pour nous empêcher de profiter de notre mutuelle compagnie.\n\nLe soleil aura décliné dans l'horizon lointain avant que ne le fasse notre intérêt l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] pour l'autre. C'est en cela que j'ai compris que j'étais disposé[ROOT.Char.Custom('FR_E')] à l'épouser, et réciproquement, qu'[secondary_recipient.Custom('FR_IlElle')] était disposé[secondary_recipient.Custom('FR_E')] à m'épouser."
 lmf_interaction.1326.desc.actor.lover:0 "Dans ses yeux dansaient une flamme. Plus que du respect, c'était du désir. Plus qu'un[secondary_actor.Custom('FR_E')] épou[secondary_actor.Custom('FR_XSe')], [secondary_recipient.Custom('FR_IlElle')] recherchait un[secondary_actor.Custom('FR_E')] amant[secondary_actor.Custom('FR_E')]."
 lmf_interaction.1326.desc.actor.friends:0 "Notre proximité s'était muée vers un lien plus fort. Non de l'amour, mais de l'amitié. De celle qui vous lie à votre épou[secondary_recipient.Custom('FR_XSe')] autrement que par le devoir ou le désir."
 lmf_interaction.1326.desc.actor.end:0 "\n\nLa question est de savoir ce que je désire vraiment…"
 lmf_interaction.1326.desc.start:0 "Il me plaît de savoir que la journée passée ensemble pour [secondary_actor.GetFirstName] et [secondary_recipient.GetFirstName] s'est avérée être des plus réussies.\n\n"
 lmf_interaction.1326.desc.hunting:0 "Une journée où la traque d'une quelconque venaison n'était bien entendu qu'un prétexte pour sillonner les environs dans une sérénité, probable vivier de longues et plaisantes conversations."
 lmf_interaction.1326.desc.hike:0 "Une journée où leurs pas les ont menés vers des lieux chargés en histoire et marqués par l'Histoire, pour narrer tant de récits et réciter tant de narrations afin d'alimenter de longues et plaisantes conversations."
 lmf_interaction.1326.desc.garrison:0 "Une journée où le fer qui s'entrechoquaient résonnait avec autant de passion que les échos de leurs conversations, et où [secondary_actor.GetFirstNameNoTooltip] préférait s'exprimer avec sa langue plutôt qu'avec s[ROOT.Char.Custom('FR_ArtifactWeaponBaseType_OnA')]."
 lmf_interaction.1326.desc.seduction:0 "Une journée à gambader aux alentours, avec une proximité telle qu'elle ne semblait pas réellement destinée à s'écouter l'un[secondary_recipient.Custom2('FR_E', SCOPE.sC('secondary_actor'))] l'autre."
 lmf_interaction.1326.desc.poetry:0 "Une journée où je gage que les jardins sont devenus leur monde, [secondary_actor.GetFirstNameNoTooltip] usant de la poésie comme langage pour faire des mots le vivier de longues et plaisantes conversations."
 lmf_interaction.1326.desc.library:0 "Une journée à parcourir les étagères de la bibliothèque, probablement pas tant pour y trouver livres et volumes, mais pour y puiser l'inspiration nourricière de longues et plaisantes conversations."
 lmf_interaction.1326.desc.church:0 "Une journée baignée dans la ferveur, ne laissant point la place aux palabres mais uniquement à l'écoute, de prières essentiellement."
 lmf_interaction.1326.desc.tavern:0 "Une journée où l'essentiel de leur horizon fut les murs d'une taverne pour s'abreuver de longues et plaisantes conversations entre deux gorgées d'alcool."
 lmf_interaction.1326.desc.poor:0 "Une journée baignée dans la mansuétude, [actor.GetFaith.HouseOfWorship] devenant le phare d'une bonté qui a profité aux nécessiteux, tandis qu'[Select_CString(And(secondary_recipient.IsFemale, actor.IsFemale), 'elles se sont enrichies', 'ils se sont enrichis')] de longues et plaisantes conversations."
 lmf_interaction.1326.desc.tour:0 "Une journée où la visite des alentours [actor.Custom('FR_ResidenceBuilding_Du')], bien que propice à démontrer toute la grandeur de [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], n'aura été qu'un prétexte pour faire grandir leur relation."
 lmf_interaction.1326.desc.garden:0 "Une journée où les jardins [actor.Custom('FR_ResidenceBuilding_Du')] ont vu fleurir de longues et plaisantes conversations, bourgeons d'une relation en devenir."
 lmf_interaction.1326.desc.hated:0 "\n\n« [secondary_actor.Custom('lmf_intro_activity_short')|U] n'aura pas vraiment été du goût de [secondary_recipient.GetFirstNameNoTooltip] » est l'un des sons de cloche que j'ai eu vent à la Cour, et pourtant "
 lmf_interaction.1326.desc.loved:0 "\n\nJ'ai eu vent de quelques sons de cloche, tous corroboraient l'idée que [secondary_recipient.GetFirstNameNoTooltip] a grandement apprécié [secondary_actor.Custom('lmf_intro_activity_short')]. Du reste, "
 lmf_interaction.1326.desc.neutral:0 "\n\nNombreux sont les sons de cloche que j'ai pu entendre, mais rien qui me laisse à penser que la journée ne s'est pas bien passé. D'ailleurs, "
 lmf_interaction.1326.desc.mid:0 "[secondary_actor.Custom2('FR_IlsElles', SCOPE.sC('secondary_recipient'))] ont longuement dégoisés, ne se préoccupant nullement des yeux qui ne cessaient de les épier.\n\nLorsqu'[secondary_actor.Custom2('FR_IlsElles', SCOPE.sC('secondary_recipient'))] furent convier à souper, [secondary_actor.GetFirstNameNoTooltip] vint confesser en privé :\n\n« C'est [secondary_recipient.Custom('FR_LuiElle')] que je veux pour épou[secondary_recipient.Custom('FR_XSe')], » d'une voix qui ne souffrait d'aucune incertitude.\n\n"
 lmf_interaction.1326.desc.secrec.player:0 "La question maintenant est de savoir si [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstNameNoTooltip] partage [secondary_recipient.Custom('FR_LuiElle')] aussi cette #italic dilection#!, et si, bien entendu, je souhaite toujours les voir s'unir."
 lmf_interaction.1326.desc.end:0 "Il serait grotesque de ne pas voir que [secondary_recipient.GetFirstNameNoTooltip] partage [secondary_recipient.Custom('FR_LuiElle')] aussi cette #italic dilection#!. La question est donc de savoir si je tiens toujours à les unir l'un[secondary_actor.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] à l'autre."
 lmf_interaction.1326.a:0 "C'est [secondary_recipient.Custom('FR_LuiElle')] que je désire."
 lmf_interaction.1326.b:0 "Je [secondary_recipient.Custom('FR_LeLa')] prendrais pour épou[secondary_recipient.Custom('FR_XSe')], point."
 lmf_interaction.1326.c:0 "Je [secondary_recipient.Custom('FR_LeLa')] prendrais pour épou[secondary_recipient.Custom('FR_XSe')], point."
 lmf_interaction.1326.d:0 "Que l'on organise la cérémonie promptement !"
 lmf_interaction.1326.e:0 "Mon cœur réclame plus qu'un[secondary_recipient.Custom('FR_E')] épou[secondary_recipient.Custom('FR_XSe')]."
 lmf_interaction.1326.f:0 "Plus que mon épou[secondary_recipient.Custom('FR_XSe')], ce sera également mon ami[secondary_recipient.Custom('FR_E')]."
 lmf_interaction.1326.g:0 "Après réflexion, je préfère abroger tout ceci."
 agree_to_marriage_intro_ask_rec.tt:0 "Si [recipient.Custom('FR_le_Char_Pi')][recipient.GetTitledFirstName] donne son consentement, [secondary_recipient.Custom('FR_le_Char_U_Pi')][secondary_recipient.GetShortUINameNoTooltip] et [secondary_actor.Custom('FR_le_Char_U_Pi')][secondary_actor.GetShortUINameNoTooltip] [Select_CString(Or(secondary_recipient.IsLocalPlayer, secondary_actor.IsLocalPlayer), 'serez', 'seront')] uni[secondary_recipient.Custom2('FR_E', SCOPE.sC('secondary_actor'))]s"
 agree_to_marriage_intro_tt:0 "[secondary_recipient.Custom('FR_le_Char_U_Pi')|U][secondary_recipient.GetShortUINameNoTooltip|U] et [secondary_actor.Custom('FR_le_Char_U_Pi')][secondary_actor.GetShortUINameNoTooltip] [Select_CString(Or(secondary_recipient.IsLocalPlayer, secondary_actor.IsLocalPlayer), 'serez', 'seront')] uni[secondary_recipient.Custom2('FR_E', SCOPE.sC('secondary_actor'))]s"
 refuse_marriage_intro_send_rec.tt:0 "[recipient.Custom('FR_le_Char_Pi')|U][recipient.GetTitledFirstName] sera informé[recipient.Custom('FR_E')] que [secondary_recipient.Custom('FR_le_Char_U_Pi')][secondary_recipient.GetShortUINameNoTooltip] et [secondary_actor.Custom('FR_le_Char_U_Pi')][secondary_actor.GetShortUINameNoTooltip] ne [Select_CString(Or(secondary_recipient.IsLocalPlayer, secondary_actor.IsLocalPlayer), 'serez', 'seront')] pas uni[secondary_recipient.Custom2('FR_E', SCOPE.sC('secondary_actor'))]s"
 refuse_marriage_intro_send_act.tt:0 "[actor.Custom('FR_le_Char_Pi')|U][actor.GetTitledFirstName] sera informé[actor.Custom('FR_E')] que [secondary_recipient.Custom('FR_le_Char_U_Pi')][secondary_recipient.GetShortUINameNoTooltip] et [secondary_actor.Custom('FR_le_Char_U_Pi')][secondary_actor.GetShortUINameNoTooltip] ne [Select_CString(Or(secondary_recipient.IsLocalPlayer, secondary_actor.IsLocalPlayer), 'serez', 'seront')] pas uni[secondary_recipient.Custom2('FR_E', SCOPE.sC('secondary_actor'))]s"
 refuse_marriage_intro_fail_rec.tt:0 "[recipient.GetTitledFirstName] a décidé d'annuler l'union entre [secondary_recipient.Custom('FR_le_Char_U_Pi')][secondary_recipient.GetShortUINameNoTooltip] et [secondary_actor.Custom('FR_le_Char_U_Pi')][secondary_actor.GetShortUINameNoTooltip]"
 refuse_marriage_intro.tt:0 "Le mariage entre [secondary_recipient.Custom('FR_le_Char_U_Pi')][secondary_recipient.GetShortUIName] et [secondary_actor.Custom('FR_le_Char_U_Pi')][secondary_actor.GetShortUIName] n'est plus à l'ordre du jour"
 attraction_at_introduction:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'êtes', 'sont')] tombé[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] amoureu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'ses', 'x')] lors d’une rencontre prénuptiale."
 attraction_at_introduction_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'êtes', 'sont')] tombé[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] amoureu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'ses', 'x')] lors d’une rencontre prénuptiale."
 friends_at_introduction:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'êtes', 'sont')] devenu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] ami[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] lors d’une rencontre prénuptiale."
 friends_at_introduction_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'êtes', 'sont')] devenu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] ami[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] lors d’une rencontre prénuptiale."
 lmf_interaction_no_marriage.tt:0 "Le mariage n'est plus à l'ordre du jour"
 lmf_interaction_no_marriage.success.actor.tt:0 "Malgré que la rencontre prénuptiale se soit bien achevée, [actor.Custom('FR_le_Char_U_Pi')][actor.GetShortUIName] [Select_CString(actor.IsLocalPlayer,'avez','a')] préféré ne pas y donner suite."
 lmf_interaction_no_marriage.success.rec.tt:0 "Malgré la rencontre prénuptiale concluante et votre approbation, [recipient.Custom('FR_le_Char_U_Pi')][recipient.GetShortUIName] [Select_CString(recipient.IsLocalPlayer,'avez','a')] préféré ne pas y donner suite."
 lmf_interaction_no_marriage.failure.rec.tt:0 "Malgré votre volonté d'arranger un mariage, [recipient.Custom('FR_le_Char_U_Pi')][recipient.GetShortUIName] a décidé d'abroger cette idée, en raison de l'issue de la rencontre prénuptiale."
 lmf_interaction.1327.desc.start.secrec:0 "[secondary_actor.Custom('FR_le_Char_Pi')|U][secondary_actor.GetTitledFirstName] fut d'une agréable compagnie durant une journée qui le fut tout autant.\n\n"
