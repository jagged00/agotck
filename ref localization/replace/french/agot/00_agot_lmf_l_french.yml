 setting_lmf_courtier_marriage_player_realm_infrequent_desc:0 "Les courtisans dans le pays du joueur demanderont l'autorisation de se marier et proposeront des mariages à d'autres courtisans. La fréquence des demandes sera réduite pour réduire l'impact sur les performances."
 setting_lmf_courtier_marriage_disabled:0 "Désactivé"
 setting_lmf_courtier_marriage_disabled_desc:0 "Les courtisans ne feront aucune demande de mariage à d'autres courtisans, même si cette interaction leur reste possible via des événements."
 rule_lmf_introductions:0 "@lmf_icon! Rencontres prénuptiales"
 setting_lmf_no_introductions:0 "Désactivés"
 setting_lmf_no_introductions_desc:0 "Le système des rencontres prénuptiales est désactivé."
 setting_lmf_normal_introductions:0 "Activés"
 setting_lmf_normal_introductions_desc:0 "Des rencontres prénuptiales peuvent être organisées pour présenter deux personnages l'un à l'autre et voir s'ils sont enclins à se marier."
 rule_lmf_additional_maidens:0 "@lmf_icon! Jouvencelles supplémentaires"
 setting_lmf_yes_additional_maidens:0 "Complet"
 setting_lmf_yes_additional_maidens_desc:0 "Les jouvencelles sont ajoutées au début du jeu et via une décision, en utilisant les nouvelles dynasties et toutes les dynasties existantes. #X Peut provoquer des entrées déconnectées dans votre arbre dynastique !#!"
 setting_lmf_non_dynasty_additional_maidens:0 "Joueur exclu"
 setting_lmf_non_dynasty_additional_maidens_desc:0 "Les jouvencelles sont ajoutées au début du jeu et via une décision, en utilisant les nouvelles dynasties et toutes les dynasties existantes à l'exception de celle du joueur."
 setting_lmf_restricted_additional_maidens:0 "Restreint"
 setting_lmf_restricted_additional_maidens_desc:0 "Les jouvencelles sont ajoutées au début du jeu et via une décision, en utilisant uniquement les nouvelles dynasties et celles des personnages existants."
 setting_lmf_player_only_additional_maidens:0 "Joueur uniquement"
 setting_lmf_player_only_additional_maidens_desc:0 "Les jouvencelles sont ajoutées au début du jeu, mais ensuite uniquement via une décision que seul le joueur peut utiliser. Les nouvelles jouvencelles n'utilisent jamais la dynastie du joueur."
 setting_lmf_no_additional_maidens:0 "Désactivé"
 setting_lmf_no_additional_maidens_desc:0 "Aucune jouvencelle ne sera ajoutée au début du jeu et il n'y a aucune décision pour le faire."
 rule_lmf_disinheritance_change:0 "@lmf_icon! Déshéritement"
 setting_lmf_yes_disinheritance_change:0 "Revendications et exigences"
 setting_lmf_yes_disinheritance_change_desc:0 "Lorsqu'il est déshérité, un personnage obtient des revendications sur tous les titres dont il était l'héritier. Une fois adulte, il peut exiger la restitution de son héritage."
 setting_lmf_no_claim_disinheritance_change:0 "Exigences seulement"
 setting_lmf_no_claim_disinheritance_change_desc:0 "Un personnage ne reçoit pas de revendications lorsqu'il est déshérité, mais il peut néanmoins exiger la restauration de son héritage."
 setting_lmf_no_disinheritance_change:0 "Par défaut"
 setting_lmf_no_disinheritance_change_desc:0 "Le système de déshéritement fonctionne exactement comme dans le jeu de base."
 rule_lmf_family_feasts:0 "@lmf_icon! Festins familiaux"
 setting_lmf_normal_family_feasts:0 "Par défaut"
 setting_lmf_normal_family_feasts_desc:0 "Un festin familial aura lieu pour le joueur en moyenne tous les deux ans, à condition qu'il ne soit pas déjà occupé."
 setting_lmf_less_frequent_family_feasts:0 "Moins fréquent"
 setting_lmf_less_frequent_family_feasts_desc:0 "Un festin familial aura lieu pour le joueur, avec une fréquence moitié moins élevée et à condition qu'il ne soit pas déjà occupé."
 setting_lmf_no_family_feasts:0 "Aucun"
 setting_lmf_no_family_feasts_desc:0 "Les festins familiaux sont désactivés."
 rule_lmf_heir_training:0 "@lmf_icon! [lmf_heir_training|E]"
 setting_lmf_more_frequent_heir_events:0 "Événements plus fréquents"
 setting_lmf_more_frequent_heir_events_desc:0 "Votre [player_heir|El] bénéficiera des événements et des traits de formation d'héritier, mais les événements aléatoires apparaîtront plus fréquemment."
 setting_lmf_normal_heir_training:0 "Par défaut"
 setting_lmf_normal_heir_training_desc:0 "Votre [player_heir|El] recevra une formation, lui donnant des traits qui se développeront au fil du temps et vous aurez des événements aléatoires en lien avec la formation dès lors que votre héritier atteindra 12 ans."
 setting_lmf_less_frequent_heir_events:0 "Événements moins fréquents"
 setting_lmf_less_frequent_heir_events_desc:0 "Votre [player_heir|El] bénéficiera des événements et des traits de formation d'héritier, mais les événements aléatoires apparaîtront moins fréquemment."
 setting_lmf_no_heir_events:0 "Aucun événement"
 setting_lmf_no_heir_events_desc:0 "Votre [player_heir|El] recevra une formation et les traits associés, mais vous n'aurez aucun événement aléatoire en lien avec la formation."
 setting_lmf_no_heir_training:0 "Désactivée"
 setting_lmf_no_heir_training_desc:0 "Le système de formation d'héritier, qu'il s'agisse des traits ou des événements, sera totalement désactivé."
 rule_lmf_army_events:0 "@lmf_icon! Événements militaires"
 setting_lmf_player_only_army_events:0 "Joueur uniquement"
 setting_lmf_player_only_army_events_desc:0 "Les capitaines et commandants au sein des armées du joueur feront l'expérience d'événements militaires sur le terrain."
 setting_lmf_player_realm_army_events:0 "Pays du joueur uniquement"
 setting_lmf_player_realm_army_events_desc:0 "Les capitaines et commandants rattachés aux dirigeants de niveau ducal au sein du pays du joueur feront d'événements militaires sur le terrain."
 setting_lmf_independent_ruler_army_events:0 "Rois et au-delà uniquement"
 setting_lmf_independent_ruler_army_events_desc:0 "Les capitaines et commandants pour tout dirigeant de niveau roi ou supérieur, le joueur y compris, feront l'expérience d'événements militaires sur le terrain. #X Peut impacter les performances en jeu !#!"
 setting_lmf_no_army_events:0 "Désactivés"
 setting_lmf_no_army_events_desc:0 "Les événements militaires seront désactivés."
 rule_lmf_player_marriage_modifiers:0 "@lmf_icon! Modificateurs de mariage du joueur"
 setting_lmf_all_marriage_modifiers:0 "Tous les modificateurs"
 setting_lmf_all_marriage_modifiers_desc:0 "Le joueur possède les mêmes bonus et restrictions pour les offres de mariage que l'IA."
 setting_lmf_fewer_marriage_modifiers:0 "Moins de modificateurs"
 setting_lmf_fewer_marriage_modifiers_desc:0 "La plupart des restrictions des offres de mariage liées aux options de « Love Marriage Family », en dehors de celles ciblant spécifiquement l'âge et la fécondité, ne s'appliqueront pas aux offres du joueur."
 setting_lmf_easy_marriage_modifiers:0 "Mariage facilité"
 setting_lmf_easy_marriage_modifiers_desc:0 "Similaire à « Moins de modificateurs », avec en outre un bonus pour le joueur de #difficulty_easy +200 d'acceptation#! (bonus équivalent à un [strong_hook|El])"
 rule_lmf_birth_fertility_modifiers:0 "@lmf_icon! Naissance et fécondité"
 setting_lmf_all_birth_fertility_modifiers:0 "Tous les modificateurs"
 setting_lmf_all_birth_fertility_modifiers_desc:0 "Augmente les complications à l'accouchement et ajoute des modificateurs qui peuvent réduire la fécondité après plusieurs naissances."
 setting_lmf_all_birth_fertility_modifiers_ai_only:0 "Tous les modificateurs\nIA seulement"
 setting_lmf_all_birth_fertility_modifiers_ai_only_desc:0 "Les modificateurs s'appliquent normalement, mais les modificateurs de fécondité qui peuvent survenir après l'accouchement ne sont jamais appliqués au joueur ou à sa famille immédiate."
 setting_lmf_reduce_birth_fertility_modifiers:0 "Moins de modificateurs"
 setting_lmf_reduce_birth_fertility_modifiers_desc:0 "Les chances d'obtenir des modificateurs de fécondité après l’accouchement sont considérablement réduites."
 setting_lmf_reduce_birth_fertility_modifiers_ai_only:0 "Moins de modificateurs\nIA seulement"
 setting_lmf_reduce_birth_fertility_modifiers_ai_only_desc:0 "L'IA a des chances considérablement réduites d'obtenir des modificateurs de fécondité après l’accouchement. Le joueur et sa famille immédiate n'en ont aucune."
 setting_lmf_no_birth_fertility_modifiers:0 "Aucun nouveau modificateur"
 setting_lmf_no_birth_fertility_modifiers_desc:0 "Tous les changements appliqués à la fécondité ou aux complications d'accouchement sont supprimés, même si l'augmentation du nombre total d'enfants est toujours active."
 rule_lmf_automatic_guardians:0 "@lmf_icon! Tutelle automatique"
 setting_lmf_automatic_guardians_active:0 "Activée"
 setting_lmf_automatic_guardians_active_desc:0 "Les enfants qui ne font pas partie de la parentèle proche de l'hôte de la cour se verront attribuer le meilleur tuteur disponible pour leur type d'éducation."
 setting_lmf_automatic_guardians_inactive:0 "Désactivée"
 setting_lmf_automatic_guardians_inactive_desc:0 "Aucun tuteur ne sera assigné automatiquement."
 rule_lmf_lover_event_eligibility:0 "@lmf_icon! Éligibilité aux événements d'[Concept('lmf_lover_rating','amour')|E]"
 setting_lmf_lover_event_eligibility_all:0 "Tout le monde"
 setting_lmf_lover_event_eligibility_all_desc:0 "Le joueur et dirigeants IA au minimum [Concept('duchy','ducs')|E] auront accès aux événements liés aux amants et âmes sœurs. Tous les autres personnages IA auront des versions simplifiées. #X Peut entraîner une baisse des performances !#!"
 setting_lmf_lover_event_eligibility_tier:0 "Pays du joueur et IA de rang duc"
 setting_lmf_lover_event_eligibility_tier_desc:0 "Le joueur et les IA au minimum [Concept('duchy','ducs')|E] auront accès aux événements d'amants et d'âmes sœurs. Tous les autres personnages IA à l'intérieur du [realm|El] du joueur auront des versions simplifiées. #X Peut réduire les performances en jeu !#!"
 setting_lmf_lover_event_eligibility_player_realm:0 "Pays du joueur uniquement"
 setting_lmf_lover_event_eligibility_player_realm_desc:0 "Seul le joueur et les IA de rang minimum [Concept('duchy','duc')|E] à l'intérieur du [realm|El] du joueur auront accès aux événements d'amants et d'âmes sœurs. Tous les autres personnages IA à l'intérieur du pays des joueurs auront des versions simplifiés."
 setting_lmf_lover_event_eligibility_player_only:0 "Joueur uniquement"
 setting_lmf_lover_event_eligibility_player_only_desc:0 "Seul le joueur peut avoir les événements liés aux amants et aux âmes sœurs."
 rule_lmf_lover_event_frequency:0 "@lmf_icon! Fréquence des événements d'amour"
 setting_lmf_lover_event_frequency_none:0 "Jamais"
 setting_lmf_lover_event_frequency_none_desc:0 "Le système des événements liés aux amants et âmes sœurs sera complètement désactivé et le paramètre d'éligibilité ignoré."
 setting_lmf_lover_event_frequency_less:0 "Moins fréquent"
 setting_lmf_lover_event_frequency_less_desc:0 "Les événements d'amants et d'âmes sœurs se produiront moins souvent."
 setting_lmf_lover_event_frequency_default:0 "Par défaut"
 setting_lmf_lover_event_frequency_default_desc:0 "Les événements d'amants et d'âmes sœurs se produiront à une fréquence normale."
 setting_lmf_lover_event_frequency_more:0 "Plus fréquent"
 setting_lmf_lover_event_frequency_more_desc:0 "Les événements d'amants et d'âmes sœurs se produiront plus souvent."
 agot_court_ongoing.court_start_song.intro.0503.relative.desc:0 "[target.GetFirstName] est là, flânant dans les jardins et flattant tous mes sens par sa simple présence.\n\nPourquoi aurais-je mis tant d'acharnement à apprendre cette fameuse ballade [target.GetCulture.GetNameNoTooltip] si ce n'est pour la déclamer dans une si parfaite occasion ? Mon cœur palpitant comme le tambour qui rythme une charge valeureuse, je me jette à corps perdu dans la bataille pour aller conquérir l'affection de m[owner.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('target'))], faisant fi des yeux alentours."
 agot_court_ongoing.court_start_song.success.0503.relative.desc:0 "\n\n[target.Custom('FR_IlElle')|U] s'empourpre mais je prends son mutisme comme une invitation à continuer, tandis que ses gens de compagnie semblent approuver respectueusement ou réprouver jalousement.\n\n« Quelle charmante, oh oui charmante voix, » confit-[target.Custom('FR_IlElle')] après que j'eus terminé de scander la dernière syllabe comme ultime ode à sa personne. [target.Custom('FR_IlElle')|U] n'ajoute rien de plus avant de partir à la hâte — rien si ce n'est un sourire, que j'accepte comme la plus belle des récompenses."
 agot_court_ongoing.court_start_sneaky_love_letter.success.spouse.0503.desc:0 "\n\nL'attente d'une réponse est suppliciante, l'idée d'un rejet éventuel accompagnant chacun des pas d'impatience qui tambourinent mes appartements. Lorsqu'enfin réponse il y a, je déchire le sceau avec grande hâte.\n\n« Vos belles paroles me vont droit au cœur, [ROOT.Char.GetFirstNameNoTooltip]. Qui sait, peut-être que l'union nuptiale fleurira en des liens bien plus forts. Seul le temps nous le dira. Bien à vous, [target.GetFirstNameNoTooltip]. »"
 agot_court_ongoing.court_start_sneaky_love_letter.success.relative.0503.desc:0 "\n\nL'attente d'une réponse est suppliciante, l'idée d'un rejet éventuel accompagnant chacun des pas d'impatience qui tambourinent mes appartements. Lorsqu'enfin réponse il y a, je déchire le sceau avec grande hâte.\n\n« Je dois avouer que je ne m'attendais pas à de tels mots venant de m[target.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('owner'))], mais aussi surprenants fussent-ils, sachez qu'ils sont appréciés. Je garderai votre lettre en lieu sûr, pour la relire selon mon bon plaisir. Affectueusement, [target.GetFirstNameNoTooltip]. »"
 agot_court_ongoing.public_regular_rejection.0503.desc:0 "La réaction de [target.GetFirstNameNoTooltip] n'est pas celle que j'escomptais. « Cessez de vous donner en spectacle, c'est d'un #EMP grotesque !#! Je n'ai que faire de vos tentatives pour obtenir mes faveurs. »"
 agot_court_ongoing.written_regular_rejection.0503.desc:0 "\n\nLa réponse de [target.GetFirstNameNoTooltip] ne se fait pas attendre en plus d'être sans équivoque. « J'ai reçu votre lettre, [ROOT.Char.Custom2('RelationToMeAddress', target)], si elle est bien de votre fait, car l'idée m'est venue qu'elle pourrait être le vilain tour d'une vilaine personne. Si c'est bien la vôtre, alors je vous demande de mettre un terme à votre projet saugrenu. Je n'ai aucun désir pour vous, d'aucune sorte, et je gage de ne jamais en avoir. »"
 agot_court_ongoing.1000.t:1 "$court_event_title$ Une danse incommodante"
 agot_court_ongoing.1000.desc:0 "Les musiciens entonnent un joyeux air et la petite frairie prend une tournure plus #italic dansante#!. Ayant prit la peine d'y assister à dessein de me rapprocher de [target.GetFirstName], je [target.Custom('FR_LeLa')] cherche des yeux avant de réaliser qu'[target.Custom('FR_IlElle')] est déjà avec [social_bore.Custom('FR_le_Char_Pi')][social_bore.GetTitledFirstName]. Une vision qui me rend amère, mais à en juger par le peu de gaieté qu'[target.Custom('FR_IlElle')] manifeste et les piètres performances de s[social_bore.Custom('FR_OnA')] cavali[social_bore.Custom('FR_ErEre')], je réalise que ce n'est sans doute pas avec entrain qu'[target.Custom('FR_IlElle')] a accepté cette danse, mais surtout par politesse.\n\nLorsque nos yeux se croisent, je comprends à sa mine déconfite que je suis [ROOT.Char.Custom('FR_LeLa')] seul[ROOT.Char.Custom('FR_E')] à pouvoir [target.Custom('FR_LeLa')] tirer de ce mauvais pas."
 agot_court_ongoing.1000.a:0 "Tenez bon, [target.Custom('LoverPetName_possessive')], je vole à votre secours."
 agot_court_ongoing.1000.a.success:0 "Vous parvenez à mettre fin au supplice de [target.GetFirstNameNoTooltip] et à danser avec [target.Custom('FR_LuiElle')]"
 agot_court_ongoing.1000.a.failure:0 "[social_bore.GetFirstNameNoTooltip] refuse de céder et la situation devient encore plus embarrassante pour [target.GetFirstNameNoTooltip]"
 agot_court_ongoing.1000.b:0 "Serrez les dents [target.GetFirstNameNoTooltip], ce n'est qu'un mauvais moment à passer."
 agot_court_ongoing.1300.t:0 "$court_event_title$ Goûts littéraires"
 agot_court_ongoing.1300.desc:0 "En quête de [target.GetFirstName], je trouve [target.Custom('FR_CeluiCelle')]-ci bouquinant à la faveur d'un après-midi ensoleillé. Il est vrai que [location.GetNameNoTooltip] est d'un calme propice à la lecture aujourd'hui, mais ce bien pesant volume ne semble pas particulièrement grisant à en juger par la nonchalance de s[target.Custom('FR_OnA')] lect[target.Custom('FR_EurRice')].\n\nLorsque j'approche et qu'[target.Custom('FR_IlElle')] arque les sourcils par dépit, laissant échapper un léger soupir, je comprends que je puis embellir sa journée en lui recommandant un ouvrage plus stimulant."
 agot_court_ongoing.1300.a:0 "Je pense savoir ce qui pourrait vous plaire, m[target.Custom('FR_OnA')] ch[target.Custom('FR_ErEre')]."
 agot_court_ongoing.1300.a.success:0 "[target.GetFirstNameNoTooltip] apprécie le livre que vous lui avez recommandé"
 agot_court_ongoing.1300.a.failure:0 "Vous ne semblez pas connaître les goûts littéraires de [target.GetFirstNameNoTooltip]"
 agot_court_ongoing.1300.b:0 "La plus exquise des lectures se trouve dans les traits de votre joli minois."
 agot_court_ongoing.1310.t:0 "Conter fleurette sans coup férir ?"
 agot_court_ongoing.1310.opening.martial:0 "Ferraillant avec des soldats fort aise de ne point laisser leur force flétrir, je remarque [target.GetFirstNameNoTooltip] qui fait [target.Custom('FR_LuiElle')]-aussi fleurir sa prouesse flamboyante en croisant le fer.\n\n"
 agot_court_ongoing.1310.opening:0 "Flânant dans la cour, mon attention se trouve focalisée sur [target.GetFirstNameNoTooltip] qui semble fort aise de se frotter à des soldats, fleurissant au gré des frappes.\n\n"
 agot_court_ongoing.1310.mid:09 "La foultitude de grâce fugace et d'effort foudroyant fait perler son front alors que ses adversaires, tantôt fébriles tantôt fuyants, finissent tous par fléchir, de frousse ou de force.\n\nL'amour fécond ne peut faire florès sans une preuve d'affection, alors je me fais fort d'embrasser la fougue qui m'anime, espérant ne point faillir.\n\n"
 agot_court_ongoing.1310.ending.martial:0 "Je n'escompte pas conter fleurette sans coup férir. Fort[ROOT.Char.Custom('FR_E')] de ma prouesse, je pourrais me faufiler jusque dans son cœur, et le faire mien."
 agot_court_ongoing.1310.ending.spectator:0 "N'étant pas féru[ROOT.Char.Custom('FR_E')] des jeux d'épée, croiser le fer pour me farder d'une image de fi[ROOT.Char.Custom('FR_ErEre')]-à-bras serait simple fadaise, voir pure foutaise, mais je puis [target.Custom('FR_LeLa')] féliciter, et qui sait, fantasmer quelques folâtreries à foison."
 agot_court_ongoing.1310.ending:0 "Un[owner.Custom('FR_E')] [owner.GetWomanMan] ne peut croiser le fer, mais fort heureusement je puis encore [target.Custom('FR_LeLa')] flatter, [target.Custom('FR_LeLa')] flagorner, et lui accorder, par facétie, ma faveur, espérant faire fondre son cœur."
 agot_court_ongoing.1310.a:0 "C'est le fer en main que je [target.Custom('FR_LeLa')] ferais frémir !"
 agot_court_ongoing.1310.b:0 "Quelques félicitations pourraient m'apporter ses bonnes fortunes."
 agot_court_ongoing.1310.c:0 "Je suis fort aise que mon charme ne puisse me faire défaut !"
 agot_court_ongoing.1310.d:0 "Je ferais mieux de filer..."
 agot_court_ongoing.1310.a.success:0 "Vous faites forte impression, fougueu[ROOT.Char.Custom('FR_XSe')] que vous êtes"
 agot_court_ongoing.1310.a.failure:0 "Vous pensiez faire forte impression mais vous vous êtes fourvoyé[ROOT.Char.Custom('FR_E')]"
 agot_court_ongoing.1310.b.success:0 "Vous faites forte impression, flamboyant[ROOT.Char.Custom('FR_E')] que vous êtes"
 agot_court_ongoing.1310.b.failure:0 "Vos fanfaronnades jettent un froid..."
 court_outcome.0003.d:0 "Offrez-moi votre main et je vous offrirai mon cœur !"
 court_outcome.0003.e:0 "J'affronterais jusqu'au Fléau pour être avec [owner.Custom('FR_LuiElle')] !"
 court_outcome.0003.e.them.elope.tt:0 "Si [owner.GetFirstNameNoTooltip] y est favorable, [owner.Custom('FR_IlElle')] va entreprendre un complot de mariage clandestin à mon égard et devenir mon âme sœur."
 court_outcome.0003.e.me.elope.tt:0 "Si [owner.GetFirstNameNoTooltip] y est favorable, je vais entreprendre un complot de mariage clandestin à son égard et devenir son âme sœur"
 court_outcome.0003.e.no.elope.tt:0 "[Select_CString(And(ROOT.Char.IsFemale, owner.IsFemale), 'Aucune', 'Aucun')] de nous deux ne peut entreprendre un complot de mariage clandestin, mais si [owner.GetFirstNameNoTooltip] y est favorable, nous nous ferons une promesse et deviendrons âme sœur"
 court_outcome.0003.d.propose.tt:0 "Si [owner.GetFirstNameNoTooltip] y est favorable, vous l'épouserez et deviendrez âme sœur"
 court_outcome.0003.d.permission.tt:0 "Si [owner.GetFirstNameNoTooltip] y est favorable, vous pourriez devenir âme sœur et l'épouser"
 agot_court_outcome.1001.c:0 "Notre union doit être bénie par [owner.GetFaith.FertilityGodName] !"
 agot_court_outcome.1001.d:0 "Le jour viendra où nous fêterons nos épousailles, quoiqu'il en coûte !"
 agot_court_outcome.1003.b:0 "Partageons un baiser, et qu'il soit doux comme le miel."
 agot_court_outcome_seek_permission_both_to_marry_tt:0 "[proposer.Custom('FR_le_Char_Pi')|U][proposer.GetTitledFirstNameNoTooltip] doit d'abord obtenir le consentement pour le mariage de la part de son lige, [proposer_liege.Custom('FR_le_Char_Pi')][proposer_liege.GetTitledFirstName], ainsi que du lige [proposer_target.Custom('FR_du_Char_Pi')][proposer_target.GetTitledFirstNameNoTooltip], [proposer_target_liege.Custom('FR_le_Char_Pi')][proposer_target_liege.GetTitledFirstName]"
 agot_court_outcome_seek_permission_proposer_both_liege_to_marry_tt:0 "[proposer.Custom('FR_le_Char_Pi')|U][proposer.GetTitledFirstNameNoTooltip] doit d'abord obtenir le consentement pour le mariage de la part de votre lige, [proposer_liege.Custom('FR_du_Char_Pi')][proposer_liege.GetTitledFirstName]"
 agot_court_outcome_seek_permission_proposer_own_liege_to_marry_tt:0 "[proposer.Custom('FR_le_Char_Pi')|U][proposer.GetTitledFirstNameNoTooltip] doit d'abord obtenir le consentement pour le mariage auprès de son lige, [proposer_liege.Custom('FR_le_Char_Pi')][proposer_liege.GetTitledFirstName]"
 agot_court_outcome_seek_permission_proposer_target_liege_to_marry_tt:0 "[proposer.Custom('FR_le_Char_Pi')|U][proposer.GetTitledFirstNameNoTooltip] doit d'abord obtenir le consentement pour le mariage de la part du lige [proposer_target.Custom('FR_du_Char_Pi')][proposer_target.GetTitledFirstNamePossessiveNoTooltip], [proposer_target_liege.Custom('FR_le_Char_Pi')][proposer_target_liege.GetTitledFirstName]"
 agot_court_outcome.1105.a:0 "Posez-moi #bold LA#! question [owner.Custom('LoverPetName_possessive')], laissez-moi vous offrir mon cœur !"
 agot_court_outcome.1105.b:0 "Faites-moi la promesse que nous nous marierons un jour, quoi qu'il en coûte."
 agot_court_outcome_elope_promise_tt:0 "Une promesse solennelle ayant été faite, [owner.GetFirstNameNoTooltip] entreprendra un complot de mariage clandestin avec [target.GetFirstNameNoTooltip] dès que possible !"
 agot_court_outcome.1200.t:0 "Le beau geste"
 agot_court_outcome.1200.courtier.desc:0 "Ce qui a débuté comme une morne et banale journée à accueillir quelques quémandeurs à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] prend subitement des couleurs bien plus vives lorsque [target.GetFirstName] fait son entrée à la Cour. Voir sa grâce naturelle l'aider à glisser d'une manière quasi éthérée parmi la foule éveille quelque chose en moi et fait germer l'idée diablement délurée de lui déclarer ma flamme, #bold ici#!, #EMP maintenant#!, #italic publiquement#! et #EMP sans retenue#!.\n\n"
 agot_court_outcome.1200.ruler.desc:0 "Je me suis tant langui de m[target.Custom('FR_OnA')] [target.Custom('ComplimentAdjective')], m[target.Custom('FR_OnA')] [target.Custom('RomanticComplimentAdjective')] [target.GetFirstName], que je me retrouve là, à sa cour, tandis qu'[target.Custom('FR_IlElle')] domine courtisans et courtisanes qui ne sont qu'une foule d'anonymes devant [target.Custom('FR_LuiElle')]. [target.Custom('FR_LeLa')|U] voir ainsi, dans toute sa magnificence, dans toute sa splendeur, éveille quelque chose en moi et fait germer l'idée diablement délurée de lui déclarer ma flamme, #bold ici#!, #EMP maintenant#!, #italic publiquement#! et #EMP sans retenue#!.\n\n"
 agot_court_outcome.1200.desc:0 "Désireu[ROOT.Char.Custom('FR_XSe')] de voir [target.GetFirstName], je me suis rendu à la Cour [target_host.Custom('FR_du_Char_Pi')][target_host.GetTitledFirstName] en sachant que je l'y trouverais. Malgré les courtisans, les domestiques, les [target_host.Custom('KnightCulturePlural')|l], oui malgré la foule entassé, [target.Custom('LoverPetName_possessive')] m'apparait comme un phare dans la nuit, comme l'astre au milieu des bougies. Cette vision éveille quelque chose en moi et fait germer l'idée diablement délurée de lui déclarer ma flamme, #bold ici#!, #EMP maintenant#!, #italic publiquement#! et #EMP sans retenue#!.\n\n"
 agot_court_outcome.1200.end.desc:0 "La pensée est séduisante, jaçoit qu'une telle audace soit à double tranchant. Je pourrais [target.Custom('FR_LeLa')] mettre dans l'embarras, mais je pourrais également lui montrer toute la ferveur que je manifeste à l'égard de mes sentiments pour [target.Custom('FR_LuiElle')]."
 agot_court_outcome.1200.a:0 "Je ne puis éteindre cette passion qui m'embrase !"
 agot_court_outcome.1200.b:0 "Je ne dois pas laisser mes sentiments affecter ma raison."
 agot_court_outcome.1201.start.desc:0 "S'il me restait une once d'incertitude, d'hésitation ou d'une quelconque errance émotionnelle, alors elle a été balayée par la profonde inspiration prise avant que je ne m'avance. Chaque pas me rapproche de [target.GetFirstName] et tout le monde s'écarte devant moi, comme si une voie était tracée par [ROOT.Char.GetFaith.FertilityGodName] en personne. Ainsi résolu[ROOT.Char.Custom('FR_E')], j'accapare toute l'attention de la cour, et [target.Custom('LoverPetName_possessive')] semble perdre toute faculté à s'exprimer lorsque nos mains se joignent à mon initiative. Ma voix se veut forte, elle se veut inébranlable et dénuée de toute fausseté lorsque je déclare aux yeux de tous et toutes, la nature réelle de mes sentiments.\n\n"
 agot_court_outcome.1201.diplomacy.desc:0 "Malgré la tension, les mots dansent autour de moi, et j'y pioche une inspiration inépuisable pour exprimer la nature du feu qui brûle en moi. Je déclare mon amour, non seulement avec l'éloquence de celle qui sublime l'instant, mais aussi avec une sincérité qui fauche toute hésitation. À ce moment-là, je n'ai d'yeux que pour [target.GetFirstNameNoTooltip], et pourtant j'arrive à voir, tant elle est manifeste, la supplication dans le regard des gens alentours qui donneraient tout pour échanger leur place avec la mienne ou la sienne.\n\n"
 agot_court_outcome.1201.desc:0 "Je ne sais si c'est le poids du moment ou si je n'ai tout simplement pas l'âme d'un[ROOT.Char.Custom('FR_E')] poète, mais les mots me manquent. Le silence de la foule, par respect ou par gêne, est brisé à quelques reprises par mes cafouillages. Pourtant, si cette déclaration d'amour est empreinte de maladresse, elle ne manque en rien de sincérité, et cela [target.GetFirstNameNoTooltip] le comprend. Son sourire qui se dessine d'une pommette à l'autre me ravit, et me rassure.\n\n"
 agot_court_outcome.1201.end.desc:0 "M'attrapant avec une poigne ferme, mais non dénuée de tendresse, [target.Custom('FR_IlElle')] m'emmène dans un lieu à l'abri des regards. Commence alors un sermon pour réprimander mon impudence, mais ses mots sonnent creux et sa tentative paraît vaine, car tout ce que j'entends sont pures simagrées. Sa langue blâme, mais ses yeux supplient. Lorsqu'[target.Custom('FR_IlElle')] a fini son laïus, [target.Custom('FR_IlElle')] m'embrasse, comme attendu."
 agot_court_outcome.1201.b:0 "Un baiser, un seul, éphémère mais enivrant."
 agot_court_outcome.1201.c:0 "Je suis sie[ROOT.Char.Custom('FR_NNne')], et [target.Custom('FR_IlElle')] est mie[target.Custom('FR_NNne')]. Maintenant et à jamais."
 agot_court_outcome.1202.diplomacy.desc:0 "D'ordinaire les mots ne me font jamais défaut. Je puis me targuer d'être habile dans le phrasé et éloquent dans la parole, pourtant, je me retrouve ici comme un[ROOT.Char.Custom('FR_E')] voyageu[ROOT.Char.Custom('FR_RSe')] sans carte, comme un marin sans phare, comme un[ROOT.Char.Custom('FR_E')] dévot[ROOT.Char.Custom('FR_E')] sans dieu. J'assemble des mots quelconques, qui forment des phrases inconsistantes, et je me retrouve à être dévisagé[ROOT.Char.Custom('FR_E')] par une foule qui se demande si ce n'est pas là une farce que je joue à [target.GetFirstNameNoTooltip].\n\n"
 agot_court_outcome.1202.desc:0 "À cet instant, je réalise mon erreur. Parler de #italic tentative vaine de déclarer mon amour#! serait déjà trop élogieux pour qualifier ce qui est en train de se passer. Pour dire le vrai, il s'agirait plutôt d'une grotesquerie dans laquelle je perds toute capacité à m'exprimer. Je ne suis peut-être pas un grand discoureu[ROOT.Char.Custom('FR_RSe')] d'ordinaire, mais là je ne sais même plus aligner trois mots, et les gloussements qui m'arrivent depuis la foule ne font qu'enterrer toute chance d'éviter à [target.GetFirstNameNoTooltip] une singulière humiliation.\n\n"
 agot_court_outcome.1202.end:0 "[target.Custom('FR_IlElle')|U] retire ses mains des miennes et se confond en excuses auprès de l'assemblée, avant de quitter brusquement la salle envahie par une aura glaciale, comme si l'hiver lui-même avait frappé. Je doute que notre histoire ne connaisse un lendemain."
 agot_court_outcome.1202.a:0 "Quelle stupide idée ce fut !"
 agot_court_outcome.1203.start.desc:0 "Occupé à tenir ma cour, discutant avec quelques nobliaux et prêtant l'oreille à des quémandeurs, je réalise la présence [owner.Custom('FR_du_Char_Pi')][owner.GetTitledFirstNameNoTooltip] lorsque la foule s'écarte devant [owner.Custom('FR_LuiElle')] alors qu'[owner.Custom('FR_IlElle')] avance dans ma direction, le regard et la démarche marqués d'une détermination que nul ici ne pourrait nier.\n\nDevant toute l'assemblée, ses mains se joignent aux miennes et d'une voix forte [owner.Custom('FR_IlElle')] fait connaître ses sentiments à mon égard."
 agot_court_outcome.1203.diplomacy.desc:0 " Ses paroles sont aussi douces que la caresse d'une brise printanière, et les mots choisis reflètent l'éloquence qui [owner.Custom('FR_LeLa')] caractérise. J'ai beau ne pas quitter [owner.GetFirstNameNoTooltip] du regard, je ne peux feindre l'ignorance du caractère extatique de la foule devant ce spectacle.\n\n"
 agot_court_outcome.1203.desc:0 " Si son intention ne souffrait d'aucune incertitude, je ne puis guère en dire autant du choix de ses mots. Hasardeux, quelconque, donnant à sa déclaration un caractère brouillon, qui ne manque pas de faire réagir la foule, comme en témoigne les gloussements qu'elle laisse échapper. Mais je n'y prête pas attention, car aussi maladroit[owner.Custom('FR_E')] puisse-t-[owner.Custom('FR_IlElle')] être dans ses paroles, cela n'enlève rien à la sincérité qui s'en dégage — et cela, mon cœur n'y est pas insensible.\n\n"
 agot_court_outcome.1203.end.desc:0 "Lorsqu'[owner.Custom('FR_IlElle')] a terminé, je l'attrape d'une poigne ferme, mais non dénuée de tendresse pour l'emmener dans un endroit à l'abri des regards. Je commence alors mon sermon pour réprimander son outrecuidance, mais au fond je sais que mes mots sonnent creux et que ma tentative de conserver les apparences est vaine. Quoi que ma langue délivre, mes yeux me trahissent, et lorsque je me lasse de jouer à ce petit jeu d'imposteur, je rétablis le silence et m'abandonne à mes sentiments."
 public_grand_gesture:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'avez', 'ont')] trouvé l'amour éternel après que [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'ayez','ait')] déclaré [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vos','ses')] sentiments en public."
 public_grand_gesture_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'avez', 'ont')] trouvé l'amour éternel après que [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer,'ayez','ait')] déclaré [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] sentiments en public."
 agot_court_outcome.1300.t:0 "Déclarer sa flamme parmi les fleurs"
 agot_court_outcome.1300.same.desc:0 "Je soupire tant de revoir [target.GetFirstNameNoTooltip], alors comme pour répondre aux supplications de mon âme esseulée, je me mets en quête de retrouver [target.Custom('LoverPetName_possessive')], et ce n'est que lorsque le crépuscule s'installe que je découvre qu'[target.Custom('FR_IlElle')] était là, dans les jardins de [target.GetCurrentLocation.GetNameNoTooltip][Select_CString(target.IsFemale,' — un lieu approprié pour une si jolie fleur','')]."
 agot_court_outcome.1300.desc:0 "Je soupire tant de revoir [target.GetFirstNameNoTooltip], alors comme pour répondre aux supplications de mon âme esseulée, je me rends à [target.GetCurrentLocation.GetNameNoTooltip], espérant y trouver [target.Custom('LoverPetName_possessive')]. Après de vains efforts, je [target.Custom('FR_LeLa')] découvre, au soir tombant, dans les jardins[Select_CString(target.IsFemale,' — un lieu approprié pour une si jolie fleur','')]."
 agot_court_outcome.1300.end.desc:0 "\n\n[target.Custom('FR_IlElle')|U] semble manifestement perdu[target.Custom('FR_E')] dans ses pensées, préoccupé[target.Custom('FR_E')] par une affaire importante ou peut-être même dans l'attente d'une personne en particulier. Ce n'est sans doute pas le moment idéal pour l'aborder mais… le cadre poétique qu'offrent les jardins, les couleurs chatoyantes d'un coucher de soleil, en fait, c'est #bold LE#! moment idéal pour lui déclarer mes sentiments. Je me risque à l'embarras d'un moment mal choisi, mais si l'amour ne peut être porté aux nus ici et maintenant, alors quand le pourrait-il ?"
 agot_court_outcome.1300.a:0 "Si je dois souffrir d'un rejet, j'aime autant que ce soit ici !"
 agot_court_outcome.1301.desc:0 "Quel besoin avais-je de m'inquiéter ? Aucun, car [target.GetFirstName] est ravi[target.Custom('FR_E')] de me voir, un plaisir d'autant plus partagé qu'[target.Custom('FR_IlElle')] confesse que j'étais la personne qui occupait ses pensées. Le crépuscule chatoyant se transforme en une obscurité plus intime, et nous errons, main dans la main, sous un rideau d'étoile, éclairé[Select_CString(And(ROOT.Char.IsFemale, target.IsFemale), 'e', '')]s d'une lune d'un blanc de nacre, bercé[Select_CString(And(ROOT.Char.IsFemale, target.IsFemale), 'e', '')]s par de frivoles discussions qui ne sont que prétexte à continuer notre balade romanesque.\n\nNous trouvons un lieu plus reculé que les autres, plus propice à profiter l'[Select_CString(And(ROOT.Char.IsFemale, target.IsFemale), 'une', 'un')] de l'autre, et baignant dans une lumière immaculée, d'une pureté semblable à nos sentiments, je sais que nous nous aimons."
 agot_court_outcome.1302.start.desc:0 "Lorsque je me retrouve devant [target.GetFirstName] qui bafouille plus qu'[target.Custom('FR_IlElle')] ne parle, qui s'excuse plus qu'[target.Custom('FR_IlElle')] ne converse, je réalise que c'était une bien stupide idée. Mes tentatives pour rendre l'instant plus chaleureux, plus agréable, ne semblent qu'accentuer la gêne qui imprègne les lieux, et j'en comprends aisément la raison quand je découvre qu'une autre personne a fait son entrée.\n\n"
 agot_court_outcome.1302.target.desc:0 "Naissant depuis les ombres, une silhouette se dévoile. Ce qui n'est alors qu'une forme nébuleuse prend les traits d'un[targets_meeting.Custom('FR_E')] [targets_meeting.Custom('polite_gender_ref')], et lorsque les traits s'affinent à la faveur de la lumière couchante, je reconnais là [targets_meeting.Custom('FR_le_Char_Pi')][targets_meeting.GetTitledFirstName]. L'air agacé que je décrypte sur son visage me fait comprendre le caractère indésirable de ma présence, renforcé par les quelques regards échangés entre [targets_meeting.Custom('FR_LuiElle')] et [target.GetFirstNameNoTooltip].\n\n"
 agot_court_outcome.1302.desc:0 "Naissant depuis les ombres, une silhouette se dévoile. Ce qui n'est alors qu'une forme nébuleuse prend les traits d'un[Select_CString(target.IsFemale,'e jeune camériste',' jeune domestique')] à la faveur de la lumière couchante. Sa posture hésitante, son regard fuyant, je comprends aisément que ma présence n'était pas attendue, évidence renforcée par les quelques regards échangés entre [Select_CString(target.IsFemale,'elle','lui')] et [target.GetFirstNameNoTooltip].\n\n"
 agot_court_outcome.1302.end:0 "Quelques frêles politesses m'aident à me soustraire de ce bourbier de gêne, dans lequel, ni [target.GetFirstNameNoTooltip] ni moi n'avons envie de nous empêtrer à nouveau. Je gage que mon départ est un motif de soulagement pour tout le monde ici, une pensée à laquelle je m'accommode…"
 agot_court_outcome.1303.desc:0 "Flânant à travers les jardins de [target.GetCurrentLocation.GetNameNoTooltip], l'abondance de couleurs mélangeant coloris floraux et crépusculaires offre un cadre idéal pour se perdre dans de douces pensées — les miennes ont toutes pour point commun m[owner.Custom('FR_OnA')] bien-aimé[owner.Custom('FR_E')] [owner.GetFirstName]. Le flamboiement d'un astre en décours finit par révéler les myriades d'éclats dans le ciel nocturne, moment propice pour qu'apparaisse la plus belle pièce de ce somptueux tableau : [Select_CString(owner.IsFemale,'la dame de mes rêveries','l’homme de mes rêveries')].\n\nComme attiré l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('owner'))] à l'autre par une force qui nous dépasse, nous nous approchons, et les sujets de conversation nous viennent avec une aisance des plus rares. De simples mots sonnent comme des mélodies. Quelque chose sublime le cadre, quelque chose étanche notre soif de vivre, quelque chose qui guide chacun de nos pas et de nos gestes à cet instant précis. Un [ROOT.Char.GetFaith.PriestNeuter] ferait sans doute mention [ROOT.Char.GetFaith.HighGodNamePossessive], mais un regard échangé avec [owner.GetFirstNameNoTooltip] et je sais que c'est toute autre chose.\n\n#italic C'est l'amour.#!"
 garden_meeting:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'avez', 'ont')] trouvé l'amour éternel après une galante entrevue dans des jardins baignant sous un soleil couchant."
 garden_meeting_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'avez', 'ont')] trouvé l'amour éternel après une galante entrevue dans des jardins baignant sous un soleil couchant."
 agot_court_outcome.1400.t:0 "Jusqu'à l'heure du loup"
 agot_court_outcome.1400.desc:0 "Mon mariage avec [target.GetFirstName] n'est certes pas toujours une sinécure, mais dernièrement, les remous d'ordinaire bénins semblent devenus des vagues prêtes à renverser cette maigre embarcation sur laquelle je m'efforce de garder l'équilibre. Pourquoi subirais-je les foudres [ROOT.Char.GetFaith.HighGodNamePossessive] alors que mon seul crime est d'oser vouloir ravir le cœur de [target.Custom('LoverPetName_possessive')] ?\n\nEn l'observant dans toute cette [Select_CString(target.IsFemale,'grâce','prestance')] qui [target.Custom('FR_LeLa')] caractérise, je réalise qu'une tempête gronde. Les choses de l'amour sont ainsi, tumultueuses et imprévisibles. Dois-je alors braver l'intempérie, au risque de noyer mes efforts, ou bien tempérer mes ardeurs et attendre une occasion plus favorable ?"
 agot_court_outcome.1400.a:0 "À cœur vaillant…"
 agot_court_outcome.1400.b:0 "Un jour, son cœur sera mien, foi de [ROOT.Char.GetHouse.GetNameNoTooltip] !"
 agot_court_outcome.1401.desc:0 "Le désordre qui agité mon cœur s'en est allé…\n\nIl aura suffi d'un sourire pour dissiper les nuages, d'un regard pour souffler le doute et attiser la flamme. L'incertitude qui pesait sur les épaules de [target.Custom('LoverPetName_possessive')] n'était rien d'autre que cela, de l'incertitude. À se questionner à propos de notre mariage et de notre avenir, à se morfondre sur des considérations triviales, à méditer sur les raisons qui pouvait me pousser à [target.Custom('FR_LeLa')] courtiser, [target.Custom('FR_IlElle')] en avait oublié l'évidence : je suis sie[ROOT.Char.Custom('FR_NNne')] et [target.Custom('FR_IlElle')] est mie[target.Custom('FR_NNne')].\n\nLe reste de la nuit s'écoule dans une intimité romanesque, où les caresses ont l'éloquence des mots, et les mots la sensualité des caresses…\n\nCertains couples doivent souffrir leur mariage avec résilience, mais nous, c'est avec ravissement qu'il s'épanouira !"
 agot_court_outcome.1402.desc:0 "Malavisé la décision fut ou mal choisi le moment…\n\nMais comment mes efforts pour consolider notre mariage avec l'amour comme mortier ont-ils pu ainsi aboutir à un résultat aussi branlant ? J'ai moi-même semé les vents du désarroi lorsque je me suis lancé[ROOT.Char.Custom('FR_E')] dans l'entreprise de courtiser [target.Custom('LoverPetName_possessive')]. Ces mêmes vents qui auront fait naître une tempête dont j'en suis [ROOT.Char.Custom('FR_LeLa')] premi[ROOT.Char.Custom('FR_ErEre')] affligé[ROOT.Char.Custom('FR_E')]. Je m'y suis mal pris[ROOT.Char.Custom('FR_E')], j'en conviens, mais où est la faute ? Ma courtoisie a-t-elle été trop envahissante ? Ma galanterie mal comprise ?\n\nJe n'ai pas les réponses et je ne les aurai sûrement pas dans l'instant, mon insistance ne faisant qu'envenimer les choses…"
 agot_court_outcome.1402.a:0 "Oh [target.GetFirstNameNoTooltip], m[target.Custom('FR_OnA')] [target.Custom('ComplimentAdjective')] [target.GetFirstNameNoTooltip]…"
 agot_court_outcome.1403.desc:0 "Mon mariage avec [owner.GetFirstName] n'est certes pas toujours une sinécure, mais dernièrement, les remous d'ordinaire bénins semblent devenus des vagues prêtes à renverser cette maigre embarcation sur laquelle je m'efforce de garder l'équilibre. Cela ne peut être sa faute, [owner.Custom('FR_LuiElle')] qui fait montre de force courtoisie à tenter de me plaire. Alors peut-être cela vient-il de moi, et de mes interrogations sur ce qui [owner.Custom('FR_LeLa')] pousse à manifester tant d'entrain à mon égard ? Finalement, la réponse vient se présenter dans m[ROOT.Char.Custom('FR_GetChambersOrTent_OnA')], lorsque [owner.GetFirstNameNoTooltip] y pénètre de toute sa grâce.\n\nEn quelques mots [owner.Custom('FR_IlElle')] s'excuse pour son attitude cavalière des derniers jours, réalisant que son geste a pu être pris mal à propos, et expliquant que sa seule ambition était de faire de ce mariage, un mariage d'amour. « Il n'y a rien à pardonner. » Les mots me viennent avec aisance, puis le reste de la nuit s'écoule dans une intimité romanesque, où les caresses ont l'éloquence des mots, et les mots la sensualité des caresses…\n\nCertains couples doivent souffrir leur mariage avec résilience, mais nous, c'est avec ravissement qu'il s'épanouira !"
 late_into_the_night:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'avez', 'ont')] trouvé l’amour éternel après une longue nuit à régler leurs différends."
 late_into_the_night_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'avez', 'ont')] trouvé l’amour éternel après une longue nuit à régler leurs différends."
 agot_court_outcome.2000.family.opening:0 "[proposer.Custom2('GreetingToFamilyPositive', ROOT.Char )]"
 agot_court_outcome.2000.courtier.opening:0 "[proposer.Custom2('GreetingToLiegePositive', ROOT.Char )]"
 agot_court_outcome.2000.opening:0 "[proposer.Custom2('GreetingToForeignRulerPositive', ROOT.Char )]"
 agot_court_outcome.2000.my.relation:0 "Voilà quelques lunes déjà que je m'emploie à gagner le cœur de votre [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('proposer_target'))], [proposer_target.Custom('FR_le_Char_Pi')][proposer_target.GetTitledFirstName], mon âme esseulée puisant réconfort dans des songes d'amour que j'espère voir fleurir à la réalité.\n\n"
 agot_court_outcome.2000.other.relation:0 "Voilà quelques lunes déjà que je m'emploie à gagner le cœur [proposer_target.Custom('FR_du_Char_Pi')][proposer_target.GetTitledFirstName], [proposer_target_liege.Custom2('FR_LMF_RelationToMe_Le', SCOPE.sC('proposer_target'))] [proposer_target_liege.Custom('FR_du_Char_Pi')][proposer_target_liege.GetTitledFirstName], mon âme esseulée puisant réconfort dans des songes d'amour que j'espère voir fleurir à la réalité.\n\n"
 agot_court_outcome.2000.both.my.courtier:0 "Voilà quelques lunes déjà que je m'emploie à gagner le cœur d'un[proposer_target.Custom('FR_E')] [proposer_target.Custom('polite_gender_ref')], ici à la cour, [proposer_target.Custom('FR_le_Char_Pi')][proposer_target.GetTitledFirstName], mon âme esseulée puisant réconfort dans des songes d'amour que j'espère voir fleurir à la réalité.\n\n"
 agot_court_outcome.2000.my.courtier:0 "Voilà quelques lunes déjà que je m'emploie à gagner le cœur d'un[proposer_target.Custom('FR_E')] [proposer_target.Custom('polite_gender_ref')] qui séjourne à votre cour, [proposer_target.Custom('FR_le_Char_Pi')][proposer_target.GetTitledFirstName], mon âme esseulée puisant réconfort dans des songes d'amour que j'espère voir fleurir à la réalité.\n\n"
 agot_court_outcome.2000.stranger:0 "Voilà quelques lunes déjà que je m'emploie à gagner le cœur d'un[proposer_target.Custom('FR_E')] [proposer_target.Custom('polite_gender_ref')], [proposer_target.Custom('FR_le_Char_Pi')][proposer_target.GetTitledFirstName], mon âme esseulée puisant réconfort dans des songes d'amour que j'espère voir fleurir à la réalité.\n\n"
 agot_court_outcome.2000.second.liege:0 "m[proposer.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('proposer_liege'))], [proposer_liege.Custom('FR_le_Char_Pi')][proposer_liege.GetTitledFirstName], m'a déjà fait part de son approbation. "
 agot_court_outcome.2000.proposer.family.willnotwed:0 "en tant que fidèle [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer'))] à qui l'on a promis de pouvoir [proposer.Custom('FR_LeLa')] laisser suivre son cœur, "
 agot_court_outcome.2000.proposer.family:0 "En tant que votre fidèle [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer'))], "
 agot_court_outcome.2000.proposer.dynasty:0 "en tant que loyal[proposer.Custom('FR_E')] membre de la dynastie [ROOT.Char.GetDynasty.GetBaseNameNoTooltip], "
 agot_court_outcome.2000.proposer.courtier:0 "En tant que votre fidèle sujet, "
 agot_court_outcome.2000.proposer.guest:0 "En tant que votre invité[proposer.Custom('FR_E')], et je l'espère, futur[proposer.Custom('FR_E')] membre de votre Cour, "
 agot_court_outcome.2000.onlyliege:0 "[proposer.Custom('lmf_type_of_request')] votre consentement pour épouser [proposer_target.Custom('FR_CeluiCelle')] que mon cœur chéri avec tant d'ardeur."
 agot_court_outcome.2000.otherliege:0 "[proposer.Custom('lmf_type_of_request')] votre consentement pour approcher [Select_CString(proposer_target_liege.IsFemale,'sa dame lige','son seigneur lige')], [proposer_target_liege.Custom('FR_le_Char_Pi')][proposer_target_liege.GetTitledFirstName], afin de quérir les épousailles qui nous siéent."
 agot_court_outcome.2000.a:0 "Vous avez ma bénédiction."
 agot_court_outcome.2000.b:0 "Hors de question !"
 agot_court_outcome.2000.a.seek.permission.tt:0 "[proposer.Custom('FR_le_Char_Pi')|U][proposer.GetTitledFirstNameNoTooltip] va demander le consentement [proposer_target_liege.Custom('FR_du_Char_Pi')][proposer_target_liege.GetTitledFirstName]"
 agot_court_outcome.2000.a.permission.granted.tt:0 "[proposer_target_liege.Custom('FR_le_Char_Pi')|U][proposer_target_liege.GetTitledFirstNameNoTooltip] offre son consentement"
 agot_court_outcome.2000.a.permission.refused.tt:0 "[proposer_target_liege.Custom('FR_le_Char_Pi')|U][proposer_target_liege.GetTitledFirstNameNoTooltip] n'offre pas son consentement"
 agot_court_outcome.2000.b.tt:0 "[proposer.Custom('FR_le_Char_Pi')|U][proposer.GetTitledFirstNameNoTooltip] et [proposer_target.Custom('FR_le_Char_Pi')][proposer_target.GetTitledFirstNameNoTooltip] pourraient continuer de nourrir leur passion, voire même s'enfuir ensemble"
 agot_court_outcome.2001.opening:0 "[proposer_liege.Custom2('GreetingToFamilyPositive', ROOT.Char )]"
 agot_court_outcome.2001.desc:0 "Fort bien. Je vous accorde ma bénédiction pour épouser [proposer_target.Custom('FR_le_Char_Pi')][proposer_target.GetTitledFirstNameNoTooltip], à condition bien entendu que [proposer_target_liege.Custom('FR_le_Char_Pi')][proposer_target_liege.GetTitledFirstName] vous donne son consentement."
 agot_court_outcome.2001.a:0 "Oui-da !"
 agot_court_outcome.2003.t:0 "Bénédiction accordée !"
 agot_court_outcome.2003.proposer:0 "Joie et félicité ! \nMaintenant que [permission_granter.Custom('FR_le_Char_Pi')][permission_granter.GetTitledFirstName] a donné son accord, [proposer_target.GetFirstName] et moi sommes libres de nous épanouir comme il se doit. Nos épousailles seront célébrées en présence d'un petit comité à [proposer.GetCurrentLocation.GetName]. Puisse notre amour ne point souffrir des affres de la vie, sous le regard bienveillant [proposer.GetFaith.HealthGodNamePossessive]."
 agot_court_outcome.2003.proposer_target:0 "Joie et félicité !\n[proposer.Custom('FR_le_Char_Pi')|U][proposer.GetTitledFirstNameNoTooltip] a obtenu gain de cause. [proposer.Custom('FR_LuiElle')|U] et moi sommes maintenant libres de nous épanouir comme il se doit. Nos épousailles seront célébrées en présence d'un petit comité à [proposer_target.GetCurrentLocation.GetName]. Puisse notre amour ne point souffrir des affres de la vie, sous le regard bienveillant [proposer_target.GetFaith.HealthGodNamePossessive]."
 agot_court_outcome.2003.a:0 "[proposer_target.Custom('FR_IlElle')|U] est mie[proposer_target.Custom('FR_NNne')], et je suis sie[proposer.Custom('FR_NNne')] !"
 given_leave_to_marry:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] sont tombé[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] éperdument amoureu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'ses', 'x')] après s'être vu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] accorder les épousailles dont [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'elles', 'ils')] rêvaient."
 given_leave_to_marry_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] sont tombé[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] éperdument amoureu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'ses', 'x')] après s'être vu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] accorder les épousailles dont [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'elles', 'ils')] rêvaient."
 agot_court_outcome.2004.t:0 "Bénédiction rejetée !"
 agot_court_outcome.2004.desc:0 "Par [proposer.GetFaith.NegativeAfterLife] !\n[permission_refuser.Custom('FR_le_Char_Pi')|U][permission_refuser.GetTitledFirstNameNoTooltip] n'a pas daigné offrir son consentement pour que [proposer_target.GetFirstNameNoTooltip] et moi puissions nous marier, [permission_refuser.Custom('FR_IlElle')] n'a même pas daigné donner d'explication non plus, et pour dire le vrai, peu me chaut, car quelle que soit la raison de vouloir laisser flétrir une passion telle que la nôtre, aucune ne serait digne d'y prêter l'esgourde !"
 agot_court_outcome.2004.a:0 "Notre union ne saurait souffrir les lubies d'un[permission_refuser.Custom('FR_E')] [permission_refuser.GetTitleAsNameNoTooltip|l] [permission_refuser.Custom('InsultAdjective')] !"
 agot_court_outcome.2004.b:0 "L'amour prévaut sur les considérations futiles et fugaces de la politique !"
 agot_court_outcome.2004.c:0 "Cette flamme est condamnée à s'éteindre, il semblerait."
 agot_court_outcome.2004.b.tt:0 "Vous resterez âmes sœurs, même sans être lié[Select_CString(And(proposer_target.IsFemale, proposer.IsFemale), 'es', 's')] par le mariage"
 agot_court_outcome.2004.c.tt:0 "Un dernier baiser, un dernier au revoir…"
 agot_court_outcome.2005.elope:0 "M[proposer.Custom('FR_OnA')] [proposer.Custom('RomanticComplimentAdjective')] [proposer.GetFirstName] me revient, après avoir bataillé pour notre cause auprès [permission_refuser.Custom('FR_du_Char_Pi')][permission_refuser.GetTitledFirstNameNoTooltip]. Mais son visage n'est pas de [Select_CString(proposer.IsFemale,'celles','ceux')] qui ont remporté une victoire, à mon grand dam.\n\n« Notre union ne saurait souffrir les lubies d'un[permission_refuser.Custom('FR_E')] [permission_refuser.GetTitleAsNameNoTooltip|l] [permission_refuser.Custom('InsultAdjective')] ! » me dit-[proposer.Custom('FR_IlElle')], animé[proposer.Custom('FR_E')] par une passion qu'aucun refus ne peut souffler.\n\nSa main vient se joindre à la mienne, mon regard se noyant dans le sien : « Je viendrai te quérir, [proposer_target.Custom('LoverPetName_possessive')], dussé-je gravir le Mur, naviguer sur les Quatorze Mers ou braver la Longue Nuit, je reviendrais pour toi, et ensemble nous irons ! »"
 agot_court_outcome.2005.continue:0 "M[proposer.Custom('FR_OnA')] [proposer.Custom('RomanticComplimentAdjective')] [proposer.GetFirstName] me revient, après avoir bataillé pour notre cause auprès [permission_refuser.Custom('FR_du_Char_Pi')][permission_refuser.GetTitledFirstNameNoTooltip]. Mais son visage n'est pas de [Select_CString(proposer.IsFemale,'celles','ceux')] qui ont remporté une victoire, à mon grand dam.\n\n« L'amour prévaut sur les considérations futiles et fugaces de la politique ! » me dit-[proposer.Custom('FR_IlElle')], animé[proposer.Custom('FR_E')] par une passion qu'aucun refus ne peut souffler.\n\nSa main vient se joindre à la mienne, mon regard se noyant dans le sien : « Qu'importe les liens que l'on nous accorde, nous sommes faits l'un pour l'autre. Quelle valeur a le mot \"mariage\" en comparaison de \"je t'aime\" ? »"
 agot_court_outcome.2005.breakup:0 "M[proposer.Custom('FR_OnA')] [proposer.Custom('RomanticComplimentAdjective')] [proposer.GetFirstName] me revient, après avoir bataillé pour notre cause auprès [permission_refuser.Custom('FR_du_Char_Pi')][permission_refuser.GetTitledFirstNameNoTooltip]. Mais son visage n'est pas de [Select_CString(proposer.IsFemale,'celles','ceux')] qui ont remporté une victoire, à mon grand dam.\n\n« Cette flamme est condamnée à s'éteindre, il semblerait, » me dit-[proposer.Custom('FR_IlElle')], alors que sa passion semble se mourir sous mes yeux.\n\nJ'aurais cru notre idylle capable de souffrir plus que le simple refus d'un mariage…"
 agot_court_outcome.2005.a:0 "Je me languis déjà de vous, [proposer.Custom('LoverPetName_possessive')]…"
 agot_court_outcome.2005.b:0 "Oh, [proposer.GetFirstNameNoTooltip]… [Select_CString(proposer.IsFemale,'je vous veux','prenez-moi')], ici, maintenant, sans tarder !"
 agot_court_outcome.2005.c:0 "Un dernier baiser, pour un cœur éploré..."
 agot_court_outcome.2010.opening:0 "[target.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_court_outcome.2010.imprison:0 "La captivité est chose pénible, mais c'est les fers aux poignets que mon esprit papillonne au loin, me laissant songer aux chances que nous avons de nous revoir. Hélas, elles me semblent infimes.\n\n"
 agot_court_outcome.2010.normal:0 "La promesse qui fut faite, celle qui liait nos cœurs et devait nous réunir le jour venu, me paraît si lointaine maintenant. Si lointaine, et moi je suis si [Select_CString(target.IsFemale,'lasse','las')] d'attendre.\n\n"
 agot_court_outcome.2010.hate:0 "Je ne vous reconnais plus, ou peut-être les sentiments qui m'ont fourvoyés à votre égard se sont-ils estompés. "
 agot_court_outcome.2010.nothate:0 "En vérité, je ne pourrais vous blâmer. Quelque chose s'est immiscé entre nous, fut-ce le destin, [target.GetFaith.HighGodName] ou que sais-je encore, mais nous ne pouvons pas lutter contre des forces qui nous dépassent. "
 agot_court_outcome.2010.end:0 "Il serait plus sage de ne plus se mentir, l'un[Select_CString(And(target.IsFemale, ROOT.Char.IsFemale), 'e', '')] à l'autre autant qu'à soi-même. Oublions cette promesse. Oublions ce qui n'a jamais véritablement commencé. Épargnons-nous plus de regrets que nous pourrions déjà en avoir."
 agot_court_outcome.2010.a:0 "Hélas, trois fois hélas…"
 agot_elope.1004.t:0 "L'amour n'attends pas"
 agot_elope.1004.start:0 "Au matin d'une journée que j'imagine quelconque, je suis extirpé[ROOT.Char.Custom('FR_E')] de m[ROOT.Char.Custom('FR_GetChambersOrTent_OnA')] par une nouvelle qui ne l'est pas. "
 agot_elope.1004.both:0 "[owner.Custom('FR_le_Char_Pi')|U][owner.GetTitledFirstName] et [target.Custom('FR_le_Char_Pi')][target.GetTitledFirstName] ont fui m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], main dans la main si j'ose dire. "
 agot_elope.1004.target:0 "[owner.Custom('FR_le_Char_Pi')|U][owner.GetTitledFirstName] s'est introduit[owner.Custom('FR_E')] à l'insu de tous dans [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pour emmener m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('target'))], [target.Custom('FR_le_Char_Pi')][target.GetTitledFirstName], et l'épouser. "
 agot_elope.1004.mid:0 "Un complot planifié de longue date, très certainement, sinon comment expliquer d'avoir filé aussi aisément au nez et à la barbe de mes gardes ?\n\n"
 agot_elope.1004.refused:0 "Je leur avais refusé le mariage, mais [owner.Custom2('FR_IlsElles', SCOPE.sC('target'))] ont fait fi de mon autorité, se couvrant ainsi d'opprobre au mépris du bon sens."
 agot_elope.1004.owner.refused:0 "Avoir essuyé le refus de s[owner.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('owner.GetLiege'))], [owner.GetLiege.Custom('FR_le_Char_Pi')][owner.GetLiege.GetTitledFirstNameNoTooltip], n'aura nullement érodé la détermination [owner.Custom('FR_du_Char_Pi')][owner.GetTitledFirstNameNoTooltip]. Je lui concède une audace romanesque, pour s'être ainsi couvert[owner.Custom('FR_E')] d'opprobre au nom de #italic l'amour#!."
 agot_elope.1004.target.refused:0 "Bien que [target.GetLiege.Custom('FR_le_Char_Pi')][target.GetLiege.GetTitledFirstNameNoTooltip] ait refusé d'accorder à s[target.GetLiege.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('target'))] le mariage souhaité, [owner.Custom('FR_le_Char_Pi')][owner.GetTitledFirstNameNoTooltip] a fait fi de tout ordre, et en cela, je lui concède une certaine audace romanesque. #italic L'amour au prix du déshonneur.#!"
 agot_elope.1004.granted:0 "J'étais disposé[ROOT.Char.Custom('FR_E')] à leur accorder des épousailles, mais cela ne les a pas empêché[owner.Custom2('FR_E', SCOPE.sC('target'))]s d'agir dans mon dos et sous mon nez. La promesse d'un amour vaut-elle la certitude du déshonneur ? La réponse à cette question est à la discrétion de chacun, mais au moins je connais la leur."
 agot_elope.1004.married:0 "J'ose croire que si [target.Custom('FR_le_Char_Pi')][target.GetTitledFirstNameNoTooltip] n'était pas déjà marié[target.Custom('FR_E')], [owner.Custom('FR_le_Char_Pi')][owner.GetTitledFirstNameNoTooltip] aurait demandé sa main comme il se doit. À défaut de cela, les voilà maintenant couvert[owner.Custom2('FR_E', SCOPE.sC('target'))]s d'opprobre."
 agot_elope.1004.end:0 "N'était-ce pas plus simple pour [owner.Custom('FR_le_Char_Pi')][owner.GetTitledFirstNameNoTooltip] de demander la main de s[target.Custom('FR_OnA')] bien-aimé[target.Custom('FR_E')], au lieu de conchier mon autorité ? La stupidité mène à l'outrecuidance, et l'outrecuidance au déshonneur. Et voilà où nous en sommes maintenant…"
 agot_elope.1004.a:0 "Cela en valait-il vraiment la peine ?"
 agot_elope.1004.b:0 "Qu'on leur fasse savoir qu'[target.Custom2('FR_IlsElles', SCOPE.sC('owner'))] sont libres de revenir. Leur inconduite sera graciée."
 agot_elope.1005.t:0 "À cœur vaillant, l'amour possible ?"
 agot_elope.1005.start:0 "Au matin d'une journée que j'imagine quelconque, je suis extirpé[ROOT.Char.Custom('FR_E')] de m[ROOT.Char.Custom('FR_GetChambersOrTent_OnA')] par une nouvelle qui ne l'est pas. [owner.Custom('FR_le_Char_Pi')|U][owner.GetTitledFirstName] s'est introduit[owner.Custom('FR_E')] à l'insu de tous dans [ROOT.Char.Custom('FR_ResidenceBuilding_Le')] [target_liege.Custom('FR_du_Char_Pi')][target_liege.GetTitledFirstName], afin d'emmener [target.Custom('FR_le_Char_Pi')][target.GetTitledFirstName], et l'épouser.\n\n"
 agot_elope.1005.refused:0 "Je leur avais refusé le mariage, mais [owner.Custom2('FR_IlsElles', SCOPE.sC('target'))] ont fait fi de mon autorité, se couvrant ainsi d'opprobre au mépris du bon sens."
 agot_elope.1005.granted:0 "J'étais disposé[ROOT.Char.Custom('FR_E')] à leur accorder des épousailles, mais cela ne les a pas empêché[owner.Custom2('FR_E', SCOPE.sC('target'))]s d'agir dans mon dos et sous mon nez. La promesse d'un amour vaut-elle la certitude du déshonneur ? La réponse à cette question est à la discrétion de chacun, mais au moins je connais la leur."
 agot_elope.1005.neither:0 "Quelle folie a bien pu frapper [owner.Custom('FR_le_Char_Pi')][owner.GetTitledFirstNameNoTooltip] pour agir de façon si sotte ? La promesse d'un amour vaut-elle la certitude du déshonneur ? Car s'étant marié[owner.Custom2('FR_E', SCOPE.sC('target'))]s sans le consentement de leur lige, c'est l'opprobre plus que l'idylle qui les attend."
 agot_elope.1005.end:0 " Du reste, la question que je me pose est de savoir si je suis disposé[ROOT.Char.Custom('FR_E')] à leur offrir mon toit."
 agot_elope.1005.a:0 "Prions [ROOT.Char.GetFaith.HealthGodName] que cela en valait la peine."
 agot_elope.1005.b:0 "Qu'[owner.Custom2('FR_IlsElles', SCOPE.sC('target'))] ne remettent plus les pieds dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] !"
 agot_elope.1005.c:0 "Qu'on leur fasse savoir qu'[target.Custom2('FR_IlsElles', SCOPE.sC('owner'))] sont libres de revenir. Leur inconduite sera graciée."
 pregnancy.3003.c:0 "Préparons nos épousailles, prestement !"
 seduce_outcome.4900.failure.tt:0 "Le complot [owner.Custom('FR_du_Char_Pi')][owner.GetTitledFirstName] visant à séduire [target.Custom('FR_du_Char_Pi')][target.GetTitledFirstName] a échoué !"
 agot_seduce_outcome.4901.opening:0 "L'heure est au moins aussi tardive que la nuit est noire lorsque des cris réveillent [ROOT.Char.Custom('FR_ResidenceBuilding_Le')].\n\nPrestement, je quitte m[ROOT.Char.Custom('FR_GetChambersOrTent_OnA')] pour découvrir une cohue formée de domestiques et de gardes entassée devant [ROOT.Char.Custom('FR_GetDoor_Le')] de [target.GetFirstName]. Quelle n'est pas ma surprise de découvrir la présence [owner.Custom('FR_du_Char_Pi')][owner.GetTitledFirstName], d'une part, et complétement nu[owner.Custom('FR_E')] d'autre part.\n\n"
 agot_seduce_outcome.4901.reject:0 "[owner.Custom('FR_LuiElle')|U] et sa [Select_CString(owner.IsFemale,'vertu dévoilée','verge apparente')] subissent les foudres de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('target'))], me laissant subodorer que c'était un tout autre accueil qu'[owner.Custom('FR_IlElle')] escomptait.\n\nFrappé[owner.Custom('FR_E')] autant du mépris que de la honte, [owner.Custom('FR_IlElle')] ne lui reste qu'à prendre la poudre d'escampette au vu de tous, avec pour seule bouclier une main protégeant les derniers bris de dignité restants."
 agot_seduce_outcome.4901.normal:0 "La foule s'ouvre sur mon passage, laissant [target.GetFirstNameNoTooltip] remarquer ma présence, [target.Custom('FR_LequelLaquelle')] accourt dans ma direction, jurant que rien de tout ceci n'est de son fait.\n\n[owner.GetFirstNameNoTooltip], [owner.Custom('FR_LuiElle')], ose brandir le quiproquo comme bouclier, [owner.Custom('FR_IlElle')] ose cela alors même que sa [Select_CString(owner.IsFemale,'vertu','verge')] est cachée maladroitement derrière ses habits ramassés en tas et qu'[owner.Custom('FR_IlElle')] se fraie un chemin à travers des rictus d'amusement et des regards accusateurs…"
 agot_seduce_outcome.4901.a:0 "Spectacle grotesque, mais ma foi, fort cocasse."
 agot_seduce_outcome.4902.opening:0 "En flânant à travers les jardins, j'ai bon espoir d'y quérir une certaine quiétude, loin des affres de la politique, mais même ici, parmi les joliesses de la nature, une esclandre éclate, comme pour me rappeler à l'ordre.\n\nJ'aperçois [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] subir une réprimande invectivée par [target.Custom2('MyCharacterIntroduction', ROOT.Char)], "
 agot_seduce_outcome.4902.reject:0 "qui, tout[target.Custom('FR_E')] furieu[target.Custom('FR_XSe')] qu'[target.Custom('FR_IlElle')], fait fi de toute autre présence pour adresser des yeux d'ire à s[owner.Custom('FR_OnA')] soupirant[owner.Custom('FR_E')] : « Cessez donc de m'importuner, [Select_CString(owner.IsFemale,'vile tentatrice','goujat')] ! Allez chercher quelques attentions loin de moi ! »\n\nNultemps je n'ai vu pareille déroute romantique, et à souffrir d'un tel revers, [owner.GetFirstNameNoTooltip] n'a d'autre choix que de s'escamper, en emportant le peu de dignité qui lui reste."
 agot_seduce_outcome.4902.normal:0 "qui, tout[target.Custom('FR_E')] ébranlé[target.Custom('FR_E')] qu'[target.Custom('FR_IlElle')] soit, remarque ma présence et accourt dans ma direction : « Par [target.GetFaith.HighGodName], vous voilà. [Select_CString(owner.IsFemale,'Cette vile tentatrice','Ce goujat')] ne cesse de me tourner autour ! »\n\n[owner.GetFirstNameNoTooltip], dépouillé[owner.Custom('FR_E')] de toute dignité, invoque le quiproquo pour s'extirper de ce bourbier, mais [owner.Custom('FR_IlElle')] me prends pour plus so[owner.Custom('FR_TTte')] que je ne le suis…"
 agot_seduce_outcome.4902.a:0 "Ce n'est pas la honte qui l'étouffe en tout cas."
 agot_seduce_outcome.4903.opening:0 "En chemin vers m[ROOT.Char.Custom('FR_GetChambersOrTent_OnA')], je me retrouve nez à nez avec [target.Custom2('MyCharacterIntroduction', ROOT.Char)] et [owner.Custom2('MyCharacterIntroduction', ROOT.Char)], dont la proximité semble tout, sauf anodine, et de cela je suis sûr[ROOT.Char.Custom('FR_E')] car dès que ma présence est remarquée, [target.GetFirstNameNoTooltip] "
 agot_seduce_outcome.4903.reject:0 "fait un brusque pas en arrière. « Ce n'est en rien ce que vous croyez, [ROOT.Char.Custom('FormOfAddressForLiege')] ! [Select_CString(owner.IsFemale,'Cette ribaude','Ce goujat')] n'a de cesse de hanter chacun de mes pas depuis des semaines, et ce malgré mon insistance à lui faire entendre raison ! »\n\nLa colère postillonnée de l'un[target.Custom('FR_E')] contraste avec l'hésitation bredouillée de l'autre, et si [owner.Custom('FR_le_Char_Pi')][owner.GetTitledFirstNameNoTooltip] s'essaie à invoquer le quiproquo pour se sortir de cette mélasse, [target.GetFirstNameNoTooltip] n'en a trop peu cure pour rester à l'écouter."
 agot_seduce_outcome.4903.normal:0 "se confond en paroles : « Me voilà soulagé[target.Custom('FR_E')], [ROOT.Char.Custom('FormOfAddressForLiege')], je craignais que nul ne vienne me sauver de cet embarras. »\n\n[owner.Custom('FR_le_Char_Pi')|U][owner.GetTitledFirstNameNoTooltip] en vient à invoquer le malentendu pour justifier ce que j'ai sous les yeux, mais je n'y crois guère, non plus que leur proximité ira plus avant après cela."
 agot_seduce_outcome.4903.a:0 "Que se serait-il passé si je n'étais pas arrivé à temps ?"
 agot_seduce_outcome.4904.opening:0 "Ce qui avait commencé comme un simple dîner est devenu, sur le tard, un spectacle assez grotesque, du fait des frasques de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('owner'))], [owner.GetFirstName].\n\nEngaillardi[owner.Custom('FR_E')] par sa coupe [ROOT.Char.Custom('RegionalAlcoholicDrink')], [owner.Custom('FR_IlElle')] n'éprouve nulle honte à aguicher [target.Custom2('MyCharacterIntroduction', ROOT.Char)], au vu et au su de tous"
 agot_seduce_outcome.4904.reject:0 ". « Baste ! vocifère [Select_CString(target.IsFemale,'cette dernière','ce dernier')], allez donc offrir votre [Select_CString(owner.IsFemale,'con','queue')] à un[target.Custom('FR_E')] autre ! »\n\nC'est sur ces mots qu'[target.Custom('FR_IlElle')] s'en va à grande foulée, laissant un[owner.Custom('FR_E')] [owner.Custom('polite_gender_ref')] figé[owner.Custom('FR_E')] dans la stupeur et meurtri[owner.Custom('FR_E')] dans sa fierté.\n\nSi l'incertitude pèse sur ses intentions, ce dont on peut être sûr c'est qu'elles ont été balayées ici même, sous mes yeux."
 agot_seduce_outcome.4904.normal:0 ", ce à quoi [Select_CString(target.IsFemale,'cette dernière','ce dernier')] ne répond que par du désintérêt.\n\nUn désintérêt qui contraste avec l'ire que j'éructe du fond de mes entrailles : « Par [ROOT.Char.GetFaith.HighGodName] ! [owner.GetFirstNameNoTooltip] que faites vous donc ?! »\n\n[target.Custom('FR_le_Char_U_Pi')][target.GetTitledFirstNameNoTooltip] en profite pour prendre la poudre d'escampette, laissant sur place un[owner.Custom('FR_E')] [owner.Custom('polite_gender_ref')] figé[owner.Custom('FR_E')] dans la stupeur et meurtri[owner.Custom('FR_E')] dans sa fierté."
 agot_seduce_outcome.4904.a:0 "J'aurais grande honte à votre place."
 agot_seduce_outcome.4905.desc:0 "M[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] gronde sous l'ire de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('target'))].\n\n« Que le Fléau emporte c[owner.Custom('FR_EEtte')] [target.Custom2('InsultNounSexual', SCOPE.sC('owner'))] ! » profère [target.GetFirstName] comme si [target.Custom('FR_IlElle')] cherchait à invoquer [ROOT.Char.GetFaith.HighGodName] en personne.\n\nLa[target.Custom('FR_SSse')] des tentatives répétées [owner.Custom('FR_du_Char_Pi')][owner.GetTitledFirstName] de gagner son cœur, c'est son cœur qu'[target.Custom('FR_IlElle')] laisse s'exprimer, maudissant [owner.Custom('FR_LeLa')] misérable qui a eu l'outrecuidance de séduire m[target.Custom('FR_OnA')] propre épou[target.Custom('FR_XSe')] sous mon propre toit."
 agot_seduce_outcome.4905.a:0 "[owner.Custom('FR_IlElle')|U] ne perd rien pour attendre."
 agot_seduce_outcome.4906.desc:0 "En chemin vers m[ROOT.Char.Custom('FR_GetChambersOrTent_OnA')], je me retrouve nez à nez avec mon épou[target.Custom('FR_XSe')] et [owner.Custom2('MyCharacterIntroduction', ROOT.Char)], dont la proximité semble tout, sauf anodine, et de cela je suis sûr[ROOT.Char.Custom('FR_E')] car dès que ma présence est remarquée, [target.GetFirstNameNoTooltip] en use pour s'extirper de là : « [ROOT.Char.Custom('FormOfAddressForLiege')|U], vous voilà enfin ! »\n\nLe soulagement expiré de l'un[target.Custom('FR_E')] contraste avec l'effroi apparent de l'autre. Je gage que [owner.Custom('FR_le_Char_Pi')][owner.GetTitledFirstNameNoTooltip] se serait risqué[owner.Custom('FR_E')] à invoquer le quiproquo dans des circonstances plus propices, mais en cet instant, détaler comme [Select_CString(owner.IsFemale,'la vermine','le rat')] qu'[owner.Custom('FR_IlElle')] est est la meilleure décision qu'[owner.Custom('FR_IlElle')] pouvait prendre, et de loin."
 agot_seduce_outcome.4906.a:0 "Maudit[owner.Custom('FR_E')] [owner.Custom('InsultNounSexual')] !"
 tried_to_seduce_spouse:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] tenté de séduire [Select_CString(CHARACTER.IsLocalPlayer,'votre ','l’')]épou[CHARACTER.Custom('FR_XSe')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')]."
 tried_to_seduce_spouse_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] tenté de séduire [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre ','l’')]épou[TARGET_CHARACTER.Custom('FR_XSe')][TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')]."
 agot_seduce_outcome.4907.opening:0 "L'ennui est particulièrement pesant aujourd'hui, m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] semblant presque écraser sous son poids, raison pour laquelle je prends l'agitation subite comme une délivrance.\n\n"
 agot_seduce_outcome.4907.reject:0 "« [Select_CString(target.HasTrait( GetTrait('rude') ), 'Allez vous faire foutre', 'Baste' )] ! » éructe [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] qui attire sur [target.Custom('FR_LuiElle')] myriade d'yeux, ce dont [target.Custom('FR_IlElle')] fait fi pour diriger sa colère contre [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], du moins, jusqu'à mon arrivée inopinée.\n\n« [ROOT.Char.Custom('FormOfAddressForLiege')|U]… je vous prie de m'excuser, mais il est des [Select_CString(owner.IsFemale,'catins','pourceaux')] à qui il faut rappeler leur place. » Sans plus de mots, [target.GetFirstNameNoTooltip] s'en va, laissant l'endroit rempli de fureur, et [owner.GetFirstNameNoTooltip] de honte.\n\nJe ne saurais dire l'intention derrière ses efforts, mais nul doute que tous ces regards accusateurs [owner.Custom('FR_LeLa')] dissuadera de persévérer."
 agot_seduce_outcome.4907.normal:0 "« La paix, de grâce ! » tonne [target.Custom2('MyCharacterIntroduction', ROOT.Char)] qui attire sur [target.Custom('FR_LuiElle')] myriade d'yeux alors que la situation semble autant [target.Custom('FR_LeLa')] mettre dans l'embarras que [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], responsable de son débordement.\n\n« [ROOT.Char.Custom('FormOfAddressForLiege')|U], mille excuses pour cette grotesquerie, mais j'ai mon content de flatterie venant de ce[owner.Custom('FR_TTte')] [owner.GetWomanMan]. » Sitôt la phrase terminée, sitôt les talons tournés.\n\n[ROOT.Char.Custom('FR_IlElle')|U] ne donne aucune explication, et il n'y en a nul besoin. Les regards tournés vers [owner.GetFirstNameNoTooltip] en disent déjà bien assez."
 agot_seduce_outcome.4907.a:0 "[owner.Custom('FR_IlElle')|U] ne manque pas de toupet."
 agot_seduce_outcome.4908.desc:0 "I am walking through the corridor at night, on the way to my bedroom, when suddenly a [target.GetWomanMan] rushes up to walk beside me. It is [target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)], uncomfortable and nervous... though I am clearly not the cause.\n\n\"Just keep walking,\" [target.GetSheHe] pleads. \"It's a good thing you showed up when you did, as I've been trying to avoid [owner.GetHerHis] advances all day.\" Unsure who [target.GetSheHe] could be referring to, I looked back, and spotted [owner.Custom2('MyCharacterIntroduction', ROOT.Char)] lurking in the shadows attempting to appear there completely by accident and uninterested in [target.GetFirstNamePossessiveNoTooltip] whereabouts.\n\n\"Don't believe a word [owner.GetSheHe] says,\" [target.GetFirstNameNoTooltip] whispered. \"[owner.GetHerHis|U] behavior is most inappropriate, but this is all I can do to protect my dignity, if not my good name.\" As soon as we were out of sight, [target.GetFirstNameNoTooltip] thanked me profusely and ran off."
 agot_seduce_outcome.4908.a:0 "Should I intervene, I wonder?"
 agot_seduce_outcome.4909.desc:0 "Installé[ROOT.Char.Custom('FR_E')] dans mon bureau où je consacre mon temps à [ROOT.Char.Custom('IdleActivity')], je suis extirpé[ROOT.Char.Custom('FR_E')] de mes pensées par [target.Custom2('MyCharacterIntroduction', ROOT.Char)] et son entrée inopinée. Vraisemblablement à la recherche de quelqu'un en particulier, je m'imagine être ce quelqu'un, mais il n'en est rien.\n\n[target.Custom('FR_IlElle')|U] s'élance vers [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)] avec quelques lettres en main, lesquelles sont envoyées à terre avec un mépris semblable à celui qui éructe de sa bouche : « Reprenez-les et baste ! Vous m'entendez ?! Je n'en veux plus, je ne vous veux point. Gardez-vous de croire que vous pourriez obtenir mes faveurs ! »\n\n[target.Custom('FR_IlElle')|U] s'échappe, mais la colère s'attarde, et quoi qu'il puisse se trouver sur ces lettres, [owner.GetFirstNameNoTooltip] les ramasse non sans mal, car le poids de la culpabilité semble les rendre particulièrement pesantes."
 agot_seduce_outcome.4909.a:0 "Bonté divine !"
 lmf_army.1010.t:0 "Les coureuses de camps"
 lmf_army.1010.female.start:0 "Le sillage d'une armée en campagne appelle toujours un bon nombre de personnes à la suivre, la plupart étant des femmes de la roture, telles que des marmitonnes ou des lavandières. Mais on peut également y trouver ce que d'aucuns ont coutume d'appeler les « coureuses de camps », des femmes qui #italic minaudent#! ça et là pour attirer l'attention des [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], dans l'espoir d'y gagner un époux… ou un client.\n\nD'ordinaire je ne prête guère d'attention à celles-ci, mais en cette soirée, les flammes des torches révèlent dans la pénombre une beauté [follower.GetCulture.GetNameNoTooltip] qui ne trouve nullement son pareil. Les sourires qu'elle esquisse à chacun de mes regards me laissent comprendre qu'elle ne m'éconduirait point si je l'invitais dans ma tente pour une entrevue plus… #italic privée#!.\n\n"
 lmf_army.1010.male.start:0 "Le sillage d'une armée en campagne appelle toujours un bon nombre de personnes à la suivre, très souvent des femmes de la roture, marmitonnes ou lavandières, ainsi que celles que d'aucuns ont l'usage d'appeler les « coureuses de camps », des femmes tolérées pour le #italic confort#! qu'elles offrent aux [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\nJe n'y prête guère d'attention la plupart du temps, mais en cette soirée j'ai remarqué la présence d'un ravissant jouvenceau parmi elles — le fils d'une lavandière à ce que l'on m'a dit, et qui aide à la réparation des charriots. Les sourires qu'il esquisse à chacun de mes regards me laissent comprendre qu'il ne m'éconduirait point si je l'invitais dans ma tente pour une entrevue plus… #italic privée#!.\n\n"
 lmf_army.1010.end:0 "#italic Mais en ai-je l'envie ?#! Voilà la vraie question."
 lmf_army.1010.a:0 "Pour sûr ! Certaines occasions ne peuvent se refuser."
 lmf_army.1010.b:0 "Je ne m'abaisse pas à coucher avec [Select_CString(follower.IsFemale,'la première drôlesse venue','le premier venu')]."
 lmf_army.1020.t:0 "Rencontre à la taverne"
 lmf_army.1020.desc:0 "Éreinté[ROOT.Char.Custom('FR_E')] d'avaler toujours la même tambouille cuisinée au camp, quelques [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] et moi-même décidons d'aller quérir pour nos gosiers un meilleur confort — comme celui que l'on peut trouver dans une taverne.\n\nLa soirée se déroule comme il est attendu d'une soirée dans une taverne, à un détail près : des sourires qui vont et viennent à chaque nouvelle commande. Non ceux de mes camarades de boisson, mais ceux du joli minois qui nous les apporte. Une mignonnette qui finit par se joindre à notre table, pour partager nos pintes et nos rires. Elle cherche compagnie, oui, mais la mienne plus que les autres, car si tout le monde a eu droit à de l'alcool, je suis [ROOT.Char.Custom('FR_LeLa')] seul[ROOT.Char.Custom('FR_E')] à qui l'on sert des regards lascifs.\n\n« [ROOT.Char.Custom('FormOfAddressForLiege')|U] voit-[ROOT.Char.Custom('FR_IlElle')] quelque chose d'autre qui l'intéresse ? » demande-t-elle sans même feindre d'être autre chose qu'une jouvencelle sans vertu."
 lmf_army.1020.a:0 "Si c'est offert par la maison…"
 lmf_army.1020.b:0 "J'ai déjà mon content de réjouissance pour ce soir."
 lmf_army.1030.t:0 "Beuverie et bastringue"
 lmf_army.1030.desc:0 "« Oyez tavernier ! Une autre et dare-dare ! » beugle l'un des quelques [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] avec qui je me retrouve autour d'une table, pour profiter d'un moment d'accalmie, lequel est plus que bienvenu après une éprouvante journée dans les [army.GetLocation.Custom('FR_TerrainTypeProvince_Plural')].\n\nC'est avec un plaisir certain que nous avons délaissé les pénibilités du camp pour profiter de la chaleur de l'âtre et de la fraîcheur des pintes. À chaque heure qui passe, l'alcool descend dans le gosier, et le ton monte dans la salle, si bien que l'euphorie chantante se transforme en vacarme désordonné, poussant quelques clients à venir jouer les trouble-fête.\n\nDans l'anarchie festive, je ne relève pas qui porte le premier coup et qui le reçoit, mais bringuebalé[ROOT.Char.Custom('FR_E')] dans ce foutoir, je me retrouve nez à nez avec un bougre… non… deux… #italic*hic*#! euh… un… hein ? ouh là… #italic*hic*#! ça sent…"
 lmf_army.1030.a:0 "...la bagarre ! Viens par là, ducon !"
 lmf_army.1030.a.injury.tt:0 "[champion.Custom('FR_le_Char_U_Pi')|U][champion.GetShortUINameNoTooltipNoFormat|U] [Select_CString(champion.IsLocalPlayer,'avez','a')] été blessé[champion.Custom('FR_E')] dans la rixe"
 lmf_army.1030.a.injury.desc:0 "Votre [player.Custom('KnightCultureNoTooltipLowercase')], [champion.Custom('FR_le_Char_U_Pi')][champion.GetShortUIName], a été blessé[champion.Custom('FR_E')] lors d'une rixe dans une taverne aux abords de [province.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1030.b:0 "…le bon moment pour essayer de calmer les choses ?"
 lmf_army.1030.c:0 "…le roussi ! Foutons le camp d'ici !"
 lmf_army.1040.t:0 "Réjouissance nocturne"
 lmf_army.1040.siege.start:0 "Ce siège me paraît interminable, et la tension qui en résulte ne cesse de croître. Les soldats sont agités — cela se voit, cela s'entend, et cela détend sur moi.\n\nLorsqu'enfin le crépuscule daigne poindre et que les hostilités semblent comme suspendues pour la nuit, l'ambiance se transforme et les combats prennent une toute autre tournure. C'est la tente du quartier-maître que nous prenons d'assaut, et c'est armés de nos choppes que les [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] et moi-même nous mettons en formation. Le sang a âprement coulé depuis l'aube, mais ce soir, c'est l'alcool qui imbibera le sol.\n\n"
 lmf_army.1040.march.start:0 "Cette marche me paraît interminable, et la tension qui en résulte ne cesse de croître. Les soldats sont agités — cela se voit, cela s'entend, et cela détend sur moi.\n\nLorsqu'enfin le crépuscule daigne poindre, l'ambiance se transforme et les foulées s'accélèrent. Nos pas nous amènent, les [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] et moi-même, dans une taverne des environs. La sueur a ardemment coulé depuis l'aube, mais ce soir, c'est l'alcool qui imbibera le sol.\n\n"
 lmf_army.1040.end:0 "S'adonner à de tels excès dans de telles circonstances n'est sans doute pas des plus avisés, mais il me faut un exutoire — #EMP quel qu'il soit !#!"
 lmf_army.1040.a:0 "Il doit bien y avoir quelqu'un quelque part avec qui je pourrais… me détendre."
 lmf_army.1040.a.male.camp:0 "Vous vous mettez en quête d'un jouvenceau avec qui passer la nuit."
 lmf_army.1040.a.male.tavern:0 "Vous vous mettez en quête d'un jouvenceau avec qui passer la nuit."
 lmf_army.1040.a.female.camp:0 "Vous vous mettez en quête d'un peu de compagnie avec qui passer la nuit."
 lmf_army.1040.a.female.tavern:0 "Vous vous mettez en quête d'une fille de taverne avec qui passer la nuit."
 lmf_army.1040.b:0 "Un peu d'exercice me fera le plus grand bien."
 lmf_army.1040.c:0 "Y a-t-il des joueurs ici ? J'ai comme une envie de miser."
 lmf_army.1040.d:0 "Remballez votre diantre de vinasse, je veux du solide, du concret !"
 lmf_army.1040.e:0 "J'ai grand besoin d'un bon rince-gosier !"
 lmf_army.1040.f:0 "Je suis tout à fait capable de prendre sur moi."
 lmf_army.1050.t:0 "Compagnons d'armes"
 lmf_army.1050.march.start:0 "Longues sont les journées lorsqu'il faut progresser à travers [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], "
 lmf_army.1050.siege.start:0 "Longues sont les journées en période obsidionale, "
 lmf_army.1050.end:0 "et elles ne sont pas toujours placées sous le signe de la camaraderie pour les soldats, car la tension se veut parfois d'une compagnie plus insistante. Pourtant, en cette soirée, c'est bel et bien [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] qui me fait hommage de la sienne.\n\nNous devisons avec force aisance, et les anecdotes que nous partageons, amusantes ou rassurantes, m'apportent plus de réconfort que le feu de camp qui éclaire nos faciès marqués par la jovialité. Et quand il n'en reste plus que des braises fumantes, demeure encore la chaleur de la convivialité.\n\nÇa n'aura pas échappé à [army_friend.GetFirstNameNoTooltip] que je n'étais pas tout à fait moi-même ces derniers temps, raison pour laquelle [army_friend.Custom('FR_IlElle')] est venu[army_friend.Custom('FR_E')] me tenir compagnie… comme le ferait un[army_friend.Custom('FR_E')] véritable ami[army_friend.Custom('FR_E')] ?"
 lmf_army.1050.a:0 "Pour sûr que c'est un[army_friend.Custom('FR_E')] ami[army_friend.Custom('FR_E')] ! Un[army_friend.Custom('FR_E')] vrai[army_friend.Custom('FR_E')] de vrai[army_friend.Custom('FR_E')] !"
 lmf_army.1050.a.friend.tt:0 "Une amitié au sein des [player.Custom('KnightCulturePluralNoTooltipLowercase')]"
 lmf_army.1050.a.friend.desc:0 "Vos [player.Custom('KnightCulturePluralNoTooltipLowercase')], [champion.Custom('FR_le_Char_U_Pi')][champion.GetShortUIName] et [army_friend.Custom('FR_le_Char_U_Pi')][army_friend.GetShortUIName], sont devenu[champion.Custom2('FR_E', SCOPE.sC('army_friend'))]s ami[champion.Custom2('FR_E', SCOPE.sC('army_friend'))]s lors d'une halte de l'armée à [province.GetTitle.GetNameNoTierNoTooltip]."
 made_friend_at_army_camp:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'êtes', 'sont')] devenu[CHARACTER.Custom2('FR_E', SCOPE.sC('TARGET_CHARACTER'))]s ami[CHARACTER.Custom2('FR_E', SCOPE.sC('TARGET_CHARACTER'))]s lors d'une halte de l'armée à [PROVINCE.GetNameNoTooltip]."
 lmf_army.1050.b:0 "J'apprécie son geste, mais ça s'arrête là."
 lmf_army.1060.t:0 "Rivaux d'armes"
 lmf_army.1060.mid:0 "et elles ne sont pas toujours placées sous le signe de la camaraderie pour les soldats, car la tension se veut parfois d'une compagnie plus insistante. Oh ça oui, qu'elle fut insistante la tension, et cela car toute la sainte journée a été ponctuée d'altercations avec [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))].\n\nAinsi, lorsque vient le moment de pouvoir enfin s'acagnarder près du feu au soir venu, et que parviennent jusqu'à mes oreilles ses médisances à mon endroit, je peine à garder mon calme. En compagnie des autres [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], nombreuses sont les diffamations à bourgeonner dans son esprit, toutes fleurissant à la faveur de "
 lmf_army.1060.revenge:0 "son désir de vengeance."
 lmf_army.1060.impious:0 "son aversion pour ce qu'[army_rival.Custom('FR_IlElle')] considère comme un « caractère impie »."
 lmf_army.1060.pious:0 "son imprécation envers ma ferveur religieuse."
 lmf_army.1060.faith:0 "sa haine envers [ROOT.Char.GetFaith.GetName]."
 lmf_army.1060.jealous:0 "sa diantre de jalousie."
 lmf_army.1060.differences:0 "tout ce qui nous différencie dans notre essence profonde."
 lmf_army.1060.hatred:0 "d'une haine devenue coutumière, pour ne pas dire routinière."
 lmf_army.1060.end:0 "\n\n#italic Trop c'est trop !#! Je me lève, et la fureur aux poings, j'exige réparation. Les [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] s'improvisent médiateurs et tentent de nous séparer. Moi prompt[ROOT.Char.Custom('FR_E')] à le chalengier et [army_rival.Custom('FR_LuiElle')] à me calomnier, [army_rival.Custom('FR_IlElle')] en vient à se défendre en m'accusant d'être à l'origine de tout ceci !"
 lmf_army.1060.a:0 "Tiens ta langue, [army_rival.Custom('InsultNoun')], ou tu la perdras !"
 lmf_army.1060.a.rival.tt:0 "Une rivalité au sein des [player.Custom('KnightCulturePluralNoTooltipLowercase')]"
 lmf_army.1060.a.rival.desc:0 "Vos [player.Custom('KnightCulturePluralNoTooltipLowercase')], [champion.Custom('FR_le_Char_U_Pi')][champion.GetShortUIName] et [army_rival.Custom('FR_le_Char_U_Pi')][army_rival.GetShortUIName], sont devenu[champion.Custom2('FR_E', SCOPE.sC('army_rival'))]s riv[champion.Custom2('FR_AuxAles', SCOPE.sC('army_rival'))] lors d'une halte de l'armée à [province.GetTitle.GetNameNoTierNoTooltip]."
 became_rivals_army_camp:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'êtes', 'sont')] devenu[CHARACTER.Custom2('FR_E', SCOPE.sC('TARGET_CHARACTER'))]s riv[CHARACTER.Custom2('FR_AuxAles', SCOPE.sC('TARGET_CHARACTER'))] lors d'une halte de l'armée à [PROVINCE.GetNameNoTooltip]."
 lmf_army.1060.b:0 "Au lieu de jeter de l'huile sur le feu, je devrais apaiser la situation."
 lmf_army.1060.c:0 "Qu'[army_rival.Custom('FR_IlElle')] parle tant qu'[army_rival.Custom('FR_IlElle')] veut, je n'en ai cure !"
 lmf_army.1070.t:0 "De pire en ire"
 lmf_army.1070.mid:0 "et plus longues encore semblent-elles lorsque [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))] se trouve dans les parages.\n\nLe mépris qui se lit dans chacun des plis de son visage ne m'irritent pas moins parce que la langue m'est devenue familière, et au soir venu, la fatigue y va du sien pour noircir une relation déjà bien ombragée. Chacun[ROOT.Char.Custom2('FR_E', SCOPE.sC('army_rival'))] y va de sa petite remarque acerbe, et le fil de notre pensée se termine par le fil de l'épée dégainée.\n\n"
 lmf_army.1070.liege:0 "À strictement parler, de tels duels ne sont pas autorisés au sein de l'armée, mais puisque je suis s[ROOT.Char.Custom('FR_OnA')] [ROOT.Char.GetTitleAsNameNoTooltip|l], c'est encore moi qui décide des règles que je souhaite faire appliquer ou non. Soit dit en passant, je pourrais tout aussi bien [army_rival.Custom('FR_LeLa')] mettre aux fers pour avoir osé tirer l'épée contre s[ROOT.Char.Custom('FR_OnA')] suzerain[ROOT.Char.Custom('FR_E')], ce qui n'est ni plus ni moins qu'un crime, mais se faisant, je me priverais de la joie de rudoyer [Select_CString(army_rival.IsFemale,'sa petite gueule','son exécrable faciès')] [army_rival.Custom('InsultAdjective')]."
 lmf_army.1070.commander:0 "À strictement parler, de tels duels sont proscrits au sein de l'armée, mais en ma qualité de commandant, je puis habilement mettre de côté le protocole militaire, ainsi que toutes ces menues histoires de grade afin de savourer pleinement l'idée de rudoyer [Select_CString(army_rival.IsFemale,'sa petite gueule','son exécrable faciès')] [army_rival.Custom('InsultAdjective')]."
 lmf_army.1070.knight:0 "Je sais que de tels duels au sein de l'armée sont passibles d'emprisonnement, mais je ne puis feindre de ne pas vouloir rudoyer [Select_CString(army_rival.IsFemale,'sa petite gueule','son exécrable faciès')] [army_rival.Custom('InsultAdjective')] !"
 lmf_army.1070.a:0 "En garde [Select_CString(army_rival.IsFemale,'drôlesse','faquin')] !"
 lmf_army.1070.a.root.kill.tt:0 "[duel_opponent.Custom('FR_le_Char_U_Pi')|U][duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString(duel_opponent.IsLocalPlayer,'avez','a')] tué [army_rival.Custom('FR_le_Char_U_Pi')][army_rival.GetShortUINameNoTooltipNoFormat] lors d'un duel"
 lmf_army.1070.a.root.kill.title:0 "[army_rival.Custom('FR_le_Char_U_Pi')|U][army_rival.GetShortUINameNoTooltipNoFormat] a été tué[army_rival.Custom('FR_E')] lors d'un duel"
 lmf_army.1070.a.root.kill.desc:0 "[duel_opponent.Custom('FR_le_Char_U_Pi')|U][duel_opponent.GetShortUIName|U] [Select_CString(duel_opponent.IsLocalPlayer,'avez','a')] tué [army_rival.Custom('FR_le_Char_U_Pi')][army_rival.GetShortUIName] lors d'un duel clandestin, durant une halte de l'armée à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.root.kill.sanctioned.desc:0 "[duel_opponent.Custom('FR_le_Char_U_Pi')|U][duel_opponent.GetShortUIName|U] [Select_CString(duel_opponent.IsLocalPlayer,'avez','a')] tué [army_rival.Custom('FR_le_Char_U_Pi')][army_rival.GetShortUIName] lors d'un duel, durant une halte de l'armée à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.root.win.tt:0 "[duel_opponent.Custom('FR_le_Char_U_Pi')|U][duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString(duel_opponent.IsLocalPlayer,'remportez','remporte')] le duel"
 lmf_army.1070.a.root.win.title:0 "[army_rival.Custom('FR_le_Char_U_Pi')|U][army_rival.GetShortUINameNoTooltipNoFormat] a été blessé[army_rival.Custom('FR_E')] lors d'un duel"
 lmf_army.1070.a.root.win.desc:0 "[army_rival.Custom('FR_le_Char_U_Pi')|U][army_rival.GetShortUIName|U] a été blessé[army_rival.Custom('FR_E')] lors d'un duel clandestin perdu contre [duel_opponent.Custom('FR_le_Char_U_Pi')][duel_opponent.GetShortUIName], durant une halte de l'armée à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.root.win.sanctioned.desc:0 "[army_rival.Custom('FR_le_Char_U_Pi')|U][army_rival.GetShortUIName|U] a été blessé[army_rival.Custom('FR_E')] lors d'un duel perdu contre [duel_opponent.Custom('FR_le_Char_U_Pi')][duel_opponent.GetShortUIName], durant une halte de l'armée à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.rival.win.tt:0 "[army_rival.Custom('FR_le_Char_U_Pi')|U][army_rival.GetShortUINameNoTooltipNoFormat|U] remporte le duel"
 lmf_army.1070.a.rival.win.title:0 "[duel_opponent.Custom('FR_le_Char_U_Pi')|U][duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString(duel_opponent.IsLocalPlayer,'avez','a')] été blessé[duel_opponent.Custom('FR_E')] lors d'un duel"
 lmf_army.1070.a.rival.win.desc:0 "[duel_opponent.Custom('FR_le_Char_U_Pi')|U][duel_opponent.GetShortUIName|U] [Select_CString(duel_opponent.IsLocalPlayer,'avez','a')] été blessé[duel_opponent.Custom('FR_E')] lors d'un duel clandestin, perdu face [army_rival.Custom('FR_au_Char_U_Pi')][army_rival.GetShortUIName], durant une halte de l'armée à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.rival.win.sanctioned.desc:0 "[duel_opponent.Custom('FR_le_Char_U_Pi')|U][duel_opponent.GetShortUIName|U] [Select_CString(duel_opponent.IsLocalPlayer,'avez','a')] été blessé[duel_opponent.Custom('FR_E')] lors d'un duel, perdu face [army_rival.Custom('FR_au_Char_U_Pi')][army_rival.GetShortUIName], durant une halte de l'armée à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.rival.kill.tt:0 "[army_rival.Custom('FR_le_Char_U_Pi')|U][army_rival.GetShortUINameNoTooltipNoFormat|U] [Select_CString(army_rival.IsLocalPlayer,'avez','a')] tué [duel_opponent.Custom('FR_le_Char_U_Pi')][duel_opponent.GetShortUINameNoTooltipNoFormat] lors d'un duel"
 lmf_army.1070.a.rival.kill.title:0 "[duel_opponent.Custom('FR_le_Char_U_Pi')|U][duel_opponent.GetShortUINameNoTooltipNoFormat|U] [Select_CString(duel_opponent.IsLocalPlayer,'avez','a')] été tué[duel_opponent.Custom('FR_E')] lors d'un duel"
 lmf_army.1070.a.rival.kill.desc:0 "[army_rival.Custom('FR_le_Char_U_Pi')|U][army_rival.GetShortUIName|U] a tué [duel_opponent.Custom('FR_le_Char_U_Pi')][duel_opponent.GetShortUIName] lors d'un duel clandestin, durant une halte de l'armée à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.a.rival.kill.sanctioned.desc:0 "[army_rival.Custom('FR_le_Char_U_Pi')|U][army_rival.GetShortUIName|U] a tué [duel_opponent.Custom('FR_le_Char_U_Pi')][duel_opponent.GetShortUIName] lors d'un duel, durant une halte de l'armée à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]."
 army_camp_duel_rivalry:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'êtes','est')] devenu[TARGET_CHARACTER.Custom('FR_E')] [CHARACTER.LocalPlayerString('votre ', 'l’')]ennemi[TARGET_CHARACTER.Custom('FR_E')] juré[TARGET_CHARACTER.Custom('FR_E')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] après [Select_CString(CHARACTER.IsLocalPlayer,'vous avoir','lui avoir')] fait mordre la poussière lors d'un duel."
 army_camp_duel_rivalry_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] devenu[CHARACTER.Custom('FR_E')] [TARGET_CHARACTER.LocalPlayerString('votre ', 'l’')]ennemi[CHARACTER.Custom('FR_E')] juré[CHARACTER.Custom('FR_E')][TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] après [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous avoir','lui avoir')] fait mordre la poussière lors d'un duel."
 lmf_army.1070.b:0 "Je ne vais pas me salir pour c[army_rival.Custom('FR_EEtte')] gueusard[army_rival.Custom('FR_E')]. Mettez-[army_rival.Custom('FR_LeLa')] aux fers !"
 lmf_army.1070.b.imprison.tt:0 "[champion.Custom('FR_le_Char_U_Pi')|U][champion.GetShortUINameNoTooltipNoFormat] emprisonne [army_friend.Custom('FR_le_Char_U_Pi')][army_friend.GetShortUINameNoTooltipNoFormat]"
 lmf_army.1070.b.imprison.desc:0 "[champion.Custom('FR_le_Char_U_Pi')|U][champion.GetShortUIName|U] a emprisonné [army_rival.Custom('FR_le_Char_U_Pi')][army_rival.GetShortUIName] pour l'avoir défié en duel durant une halte de l'armée à [province.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1070.c:0 "Je ne lui ferais même pas l'honneur de [army_rival.Custom('FR_LeLa')] considérer comme un adversaire."
 lmf_army.1080.t:0 "Faites l'amour, pas la guerre"
 lmf_army.1080.desc:0 "Les nombreux moments partagés avec [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_lover'))] m'ont fait réaliser à quel point les liens d'amitié et de fraternité se tissent avec aisance au sein d'une armée. L'entraînement, les repas, les conversations, tout cela nous rapproche, et la convivialité se mue en familiarité, jusqu'à faire naître quelque chose que je perçois comme plus… intime. Les regards qu'[army_lover.Custom('FR_IlElle')] m'adresse sont différents — #italic plus intense…#! #bold plus langoureux…#! #EMP plus sulfureux…#!\n\nVint alors le soir où, me retirant dans le confort de ma tente, je [army_lover.Custom('FR_LeLa')] retrouve là, devant moi, dévêtu[army_lover.Custom('FR_E')] et pourtant si bien draper dans une invitation ostentatoire à venir [army_lover.Custom('FR_LeLa')] rejoindre, tandis que ses courbes semblent tracer le chemin vers un jardin d'extase."
 lmf_army.1080.a:0 "Je brûle de désir pour vous, [army_lover.Custom('LoverPetName_possessive')]."
 army_camp_rendezvous:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'êtes', 'sont')] [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'devenues', 'devenus')] [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'amantes', 'amants')] lors d'une halte militaire à [PROVINCE.GetNameNoTooltip]."
 lmf_army.1080.b:0 "L'appel de la chair, il n'y a rien de mal à y répondre pour une nuit."
 lmf_army.1080.c:0 "Couvrez [Select_CString(army_lover.IsFemale,'ce sein','cette verge')] que je ne saurais voir."
 lmf_army.1090.t:0 "Après l'effort, le réconfort"
 lmf_army.1090.desc:0 "Sinécure, voilà un mot qui sonnerait bien antithétique pour qualifier une marche militaire. Un jour après l'autre, un pas après l'autre, un pied devant l'autre, qu'importe les complaintes, et avec pour seule consolation la piètre mangeaille censée nous restaurer tandis que les aléas des [army.GetLocation.Custom('FR_TerrainTypeProvince_Plural')] se font toujours plus pesants.\n\nPourtant, si c'est bien loin d'être une sinécure, il arrive que certains moments soient d'un vrai réconfort. Ce soir par exemple, où nous profitons d'une halte à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip] pour partager un vrai moment de camaraderie entre [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]. La clameur joviale étant grandement aidée par l'alcool, en sus d'un soldat qui se livre à une prestation exceptionnelle armé d'un luth et de [army_entertainer.GetFirstName] qui lui emboîte le pas en dansant autour du feu.\n\nRires et chansons émailleront une nuit qui sera placée sous le signe des réjouissances."
 lmf_army.1090.a:0 "Voilà une nuit à ne pas oublier !"
 lmf_army.1100.t:0 "Veillée tardive"
 lmf_army.1100.end:0 "et plus longues encore sont les nuits lorsque la menace rôde sournoisement à notre chevet.\n\nLe camp ayant été gagné par la maladie, nombre d'entre nous se voient contraints de rester confinés dans les tentes. Le calme avant la tempête propre aux moments de conflit n'est donc plus source d'anxiété, mais d'ennui. J'ai beau tenter de tuer le temps par l'entraînement, m[ROOT.Char.Custom('FR_OnA_signature_weapon')] ne pourfend ni l'ennui ni ne raccourcit les heures qui se font toujours plus longues.\n\nBien vite, la lassitude se propage chez les autres [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]…"
 lmf_army.1100.a:0 "Vivement que cela cesse…"
 lmf_army.1110.t:0 "Par pluie battante"
 lmf_army.1110.t.desert:0 "Quand souffle le sable"
 lmf_army.1110.normal:0 "et plus longues encore paraissent-elles lorsque la pluie vous fait #italic grâce#! de sa compagnie.\n\nDes jours entiers à subir les affres du climat, rafales hurlantes et déluge constant, tant et si bien que lorsqu'une éclaircie pointe à l'horizon, la délivrance est toute relative. Au plus profond de ma chair, je sens encore le froid et l'humidité, bien décidés à séjourner pour quelques temps encore."
 lmf_army.1110.desert:0 "et les tempêtes de sable qui n'ont de cesse de frapper les font paraître bien plus longues encore.\n\nDes jours entiers à subir les affres du climat, rafales violentes et chaleur suffocante, tant et si bien que lorsqu'une accalmie répond à nos supplications, la délivrance est toute relative. Le vent est partie, emportant les grains de sable avec lui, mais quelque chose de plus persistant est resté."
 lmf_army.1110.end:0 "\n\nLes quintes de toux ne paraissent plus aussi bénignes quand elles se font plus fréquentes et violentes, et continuer à faire bonne figure devant les soldats en devient grotesque. Plutôt que les apparences, c'est ma santé qu'il me faut sauver !"
 lmf_army.1110.a:0 "Allez quérir le médecin !"
 lmf_army.1120.t:0 "Des limites à ne pas dépasser"
 lmf_army.1120.war:0 "Après s'être ravitaillée dans l'un des villages alentours, l'armée continue sa progression à travers [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], mais sur le départ, quelque chose retient mes pas.\n\n"
 lmf_army.1120.nowar:0 "L'armée est en progression à travers [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], et alors que j'étais à la recherche d'approvisionnement dans un village non loin, accompagné[ROOT.Char.Custom('FR_E')] d'un petit groupe de soldats, quelque chose dégénère.\n\n"
 lmf_army.1120.end:0 "Des éclats d'un accent courroucé retentissent, et la scène qui force mon attention n'est autre que [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_bully'))] qui apostrophe la populace dans la rue. [army_bully.Custom('FR_IlElle')|U] empoigne une femme, avec la conviction qu'elle a quelque chose à se reprocher — coupable d'un méfait, ou en possession d'informations importantes — mais de toute évidence il est [army_bully.Custom('FR_IlElle')] seul[army_bully.Custom('FR_E')] ici à avoir cette certitude. Pour ma part, je ne vois qu'un désarroi sincère et des supplications qui le sont toutes autant.\n\nMais plus ses supplications s'intensifient, plus [army_bully.GetFirstNameNoTooltip] semble se complaire à faire montre de cruauté, tandis que villageois et soldats assistent à ce simulacre d'interrogatoire…"
 lmf_army.1120.a:0 "[army_bully.GetTitledFirstNameNoTooltip], cessez donc de tourmenter cette pauvre hère !"
 interfered_with_army_bully:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','s’est')] interposé[CHARACTER.Custom('FR_E')] durant « l'interrogatoire » d'une paysanne par [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]."
 interfered_with_army_bully_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous êtes','s’est')] interposé[TARGET_CHARACTER.Custom('FR_E')] durant « l'interrogatoire » d'une paysanne par [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat]."
 lmf_army.1120.b:0 "Cela ne me concerne en rien."
 lmf_army.1130.t:0 "Pris la main dans le sac"
 lmf_army.1130.desc:0 "Avec un siège qui semble n'avoir nulle fin, cela m'apparait maintenant comme une gageure de vouloir prendre [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], mais la fortune, visiblement soucieuse de mettre fin à mes inquiétudes, semble se ranger de mon côté lorsque l'on vient me quérir avec une plaisante nouvelle.\n\n« On a attrapé un bougre qui tentait de traverser nos lignes, » me rapporte l'un des soldats. Si jusque-là rien ne donne particulièrement matière à se réjouir, la suite est d'un autre teneur. Le bougre comme il le qualifie, aurait bien failli être sommairement exécuté si l'un des soldats, plus lettré que d'autres, n'avait pas relevé l'importance d'un livret parmi les possessions du captif. Dans celui-ci sont consignées diverses informations sur les positions ennemies situées, notamment leurs faiblesses. Un fin rictus se dessine alors sur mon visage.\n\nJe crois que nous allons avoir #EMP beaucoup#! à nous dire, lui et moi."
 lmf_army.1130.a:0 "Voilà de quoi écourter ce diantre de siège."
 lmf_army.1130.a.title:0 "Informations sensibles obtenues"
 lmf_army.1130.a.desc:0 "[commander.Custom('FR_le_Char_U_Pi')|U][commander.GetShortUIName|U] [Select_CString(commander.IsLocalPlayer,'avez','a')] obtenu des informations sur l'ennemi située à [army.GetLocation.GetTitle.GetNameNoTier] après la capture d'un messager."
 lmf_army.1140.t:0 "Un [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] en devenir"
 lmf_army.1140.desc:0 "Parmi les soldats avec lesquels j'ai passé bien du temps dans les mois qui ont précédés, il y en a un[army_potential.Custom('FR_E')] qui a su se démarquer de ses pairs.\n\n[army_potential.GetFirstName] est un[army_potential.Custom('FR_E')] [army_potential.GetWomanMan] provenant d'une maison mineure [army_potential.GetCulture.GetNameNoTooltip], vraisemblablement sans nul autre membre notable. [army_potential.Custom('FR_IlElle')|U] a fait montre de moult adresse et de force conviction à servir, et c'est toujours avec l'intention de servir qu'[army_potential.Custom('FR_IlElle')] vient me voir au couchant. Le brin de bavardage que nous avons eu la veille l'ayant vraisemblablement décidé à me faire hommage de son serment de loyauté, avec pour seule requête que je fasse d[army_potential.Custom('FR_EluiElle')] un [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nSon talent est certain, mais ai-je besoin d'un nouveau [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] ?"
 lmf_army.1140.a:0 "Je lève ma coupe à mon nouveau [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] !"
 lmf_army.1140.b:0 "Soldat, j'apprécie votre ferveur, mais ça s'arrête là."
 lmf_army.1150.t:0 "Le fruit du hasard"
 lmf_army.1150.begin:0 "Accompagné[ROOT.Char.Custom('FR_E')] de quelques soldats, la patrouille à travers les [army.GetLocation.Custom('FR_TerrainTypeProvince_Plural')] de [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] m'amène à tomber inopinément sur un cadavre — à l'évidence un[army_stranger.Custom('FR_E')] [army_stranger.GetWomanMan] victime de la briganderie [army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip]. Mais à y regarder avec un œil plus alerte, il se trouve que le corps n'a rien de cadavérique. Je fais charrier séance tenante [Select_CString(army_stranger.IsFemale,'la malheureuse','le malheureux')] jusqu'au camp.\n\nAprès plusieurs heures de soins et de convalescence, [army_stranger.Custom('FR_IlElle')] est au moins en état de se présenter, et suffisamment ragaillardi[army_stranger.Custom('FR_E')] pour me remercier avec plus que des bafouillages ante-mortem : « Mon nom est [army_stranger.GetFirstName], [ROOT.Char.Custom('FormOfAddressForLiege')], pour vous servir. "
 lmf_army.1150.poet:0 "Poèt[army_stranger.Custom('FR_EEsse')] dans l'âme et la pratique, du moins, jusqu'à ce que quelques malandrins me fasse taire, j'en ai peur. "
 lmf_army.1150.monk:0 "Membre d'un ordre sacré, j'eus la mauvaise fortune de rencontrer quelques scélérats, à moins que ce ne fût une épreuve envoyée par [army_stranger.GetFaith.HighGodName]. "
 lmf_army.1150.scholar:0 "Érudit[army_stranger.Custom('FR_E')], mes livres ne m'auront pas été d'une grande utilité face à l'acier de viles canailles. "
 lmf_army.1150.pilgrim:0 "Je ne suis rien de plus qu'un[army_stranger.Custom('FR_E')] pèlerin[army_stranger.Custom('FR_E')] qui suivait le chemin [army_stranger.GetFaith.HighGodNamePossessive] avant que des gredins ne se mettent en travers de ma route. "
 lmf_army.1150.merchant:0 "Marchand[army_stranger.Custom('FR_E')], j'escomptais faire florès à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], mais aux prises avec des malandrins, je n'ai réussi à négocier ma vie qu'au prix du hasard. "
 lmf_army.1150.architect:0 "Architecte, j'étais en voyage pour trouver du travail à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], jusqu'au moment de tomber dans une embuscade. "
 lmf_army.1150.gallowsbait:0 "Je vous épargnerai les détails sur ce qui m'a amené dans ces contrées, mais j'ai fait une bien mauvaise rencontre. "
 lmf_army.1150.end:0 "Dépouillé[army_stranger.Custom('FR_E')] de mes biens et quasi dépossédé[army_stranger.Custom('FR_E')] de la vie, en paiement de la dette que je vous dois, je ne puis rien faire d'autre que de vous offrir ce qu'il me reste, ma vie donc. »"
 lmf_army.1150.a:0 "La fortune nous sourit [Select_CString(And(ROOT.Char.IsFemale, army_stranger.IsFemale), 'toutes', 'tous')] deux, semble-t-il."
 lmf_army.1150.b:0 "Votre gratitude vous honore, mais je n'ai nullement l'usage de vos services."
 lmf_army.1160.t:0 "Une intervention héroïque"
 lmf_army.1160.begin:0 "La patrouille que j'effectue avec quelques soldats m'entraîne à plusieurs lieues du camp, suffisamment en tout cas pour que l'on se retrouve aux prises avec de la canaille [army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip]. Les malandrins, préparés pour une embuscade, surgissent comme de beaux diables et frappent avec autant de violence que de vélocité. La situation se fait de plus en plus désespérée, jusqu'à l'arrivée inopinée d'un[army_stranger.Custom('FR_E')] inconnu[army_stranger.Custom('FR_E')].\n\nSon cri semble surgir [ROOT.Char.GetFaith.NegativeAfterLife3] et dans une tempête de rage et d'acier, [army_stranger.Custom('FR_IlElle')] apporte la défaite à l'ennemi comme la nuée apporte l'orage. La vermine s'enfuit, la queue entre les jambes, et nous pouvons alors nous réjouir, et nous présenter.\n\n« [army_stranger.GetFirstNameNicknamed], voilà comment l'on me nomme. "
 lmf_army.1160.mercenary:0 "Je ne suis guère plus qu'[Select_CString(army_stranger.IsFemale,'une soudarde','un reître')], mais si j'ai d'affection pour l'or, je n'en dirais pas autant pour [army.GetLocation.GetCounty.GetTitle.GetHolder.GetTopLiege.GetTitledFirstNameNoTooltip]. » "
 lmf_army.1160.gallowsbait:0 "Il n'y a guère à dire à mon sujet, rien de fameux ni de glorieux, je le confesse. » "
 lmf_army.1160.end:0 "De ce que je comprends de son récit, c'est son #italic travail#! qui l'aura amené dans les environs, et la chance sur notre chemin. Pour son héroïsme, je lui offre ma gratitude par un verre partagé, duquel coule une longue et plaisante conversation.\n\n« Acceptez-moi à votre [ROOT.Char.Custom('GetCourt')] et je vous serais utile plus d'une fois », conclut-[army_stranger.Custom('FR_IlElle')] avec entrain."
 lmf_army.1160.a:0 "Vous êtes plus que bienvenu[army_stranger.Custom('FR_E')], l'ami[army_stranger.Custom('FR_E')]."
 saved_by_army_stranger:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','s’est')] lié[CHARACTER.Custom('FR_E')] d'amitié avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] après que [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous lui ayez',Select_CString(TARGET_CHARACTER.IsFemale,'celle-ci lui ai','celui-ci lui ai'))] sauvé la vie lors d'une embuscade de bandits."
 saved_by_army_stranger_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous êtes','s’est')] lié[TARGET_CHARACTER.Custom('FR_E')] d'amitié avec [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] après que [Select_CString(CHARACTER.IsLocalPlayer,'vous lui ayez',Select_CString(CHARACTER.IsFemale,'celle-ci lui ai','celui-ci lui ai'))] sauvé la vie lors d'une embuscade de bandits."
 lmf_army.1160.b:0 "Vous aurez une place dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], [Select_CString(army_stranger.IsFemale,'hardie damoiselle','mon brave')]."
 lmf_army.1160.c:0 "La bravoure vous honore, mais l'outrecuidance vous dessert."
 lmf_army.1170.t:0 "Vivres ou mourir"
 lmf_army.1170.desc:0 "À mesure que l'armée poursuit sa progression à travers les [army.GetLocation.Custom('FR_TerrainTypeProvince_Plural')] de [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], les provisions s'amenuisent, pour ne pas dire, se raréfient.\n\nDans un même temps, les éclaireurs rapportent avoir trouvé plusieurs fermes et domaines dans les environs, autrement dit, des lieux propices à abriter les vivres qui nous font défaut. Il serait aisé pour des soldats d'aller piller ces #italic greniers de fortune#!, aussi aisé que de planter sa fourchette dans une assiette, mais je suis au fait des exactions qui peuvent être commises en temps de guerre. Un chien affamé n'a foi qu'en la viande, et une fois alléché par l'odeur du sang, aucune laisse ne peut le tenir au pas…"
 lmf_army.1170.a:0 "À la guerre comme à la guerre !"
 lmf_army.1170.b:0 "Les petites gens n'ont pas à souffrir de mes manquements tactiques !"
 lmf_army.1180.t:0 "Perdu[ROOT.Char.Custom('FR_E')] mais bien trouvé"
 lmf_army.1180.desc:0 "Une fois le camp levé à [army.GetLocation.GetTitle.GetNameNoTierNoTooltip], je me joins à quelques [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] qui partent en quête de bonnes venaisons dans les environs, mais à ma grande honte, je me retrouve égaré[ROOT.Char.Custom('FR_E')] par un fâcheux concours de circonstances.\n\nMais c'est tout autant par le concours de la providence que je me retrouve à croiser la route d'un[army_stranger.Custom('FR_E')] certain[army_stranger.Custom('FR_E')] « [army_stranger.GetFirstName], [ROOT.Char.Custom('FormOfAddressForLiege')], pour vous servir. » [army_stranger.Custom('polite_gender_ref')|U] [army_stranger.Custom('FormalComplimentAdjective')] s'il en est, [army_stranger.Custom('FR_IlElle')] fait office de guide dans la région à qui en a besoin, et il se trouve que je suis dans le besoin.\n\nLe retour se fait bien moins long que l'aller grâce à [army_stranger.Custom('FR_LuiElle')], et une certaine intuition me fait dire que ce n'est pas tant qu'[army_stranger.Custom('FR_IlElle')] serait bo[army_stranger.Custom('FR_NNne')] guide, que de bonne compagnie.\n\n« J'espère que nous aurons l'occasion de nous revoir, [ROOT.Char.Custom('FormOfAddressForLiege')] », dit-[army_stranger.Custom('FR_IlElle')] d'un sourire qui ne trompe pas."
 lmf_army.1180.a:0 "Pourquoi nous quitter alors qu'il reste la nuit pour continuer cette rencontre ?"
 lmf_army.1180.b:0 "Accompagnez-moi à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] et les occasions ne manqueront pas."
 army_camp_lost_guide:0 "Après [Select_CString(CHARACTER.IsLocalPlayer,'vous être','s’être')] perdu[CHARACTER.Custom('FR_E')] à [PROVINCE.GetNameNoTooltip] lors d’une halte militaire, [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] été [Select_CString(CHARACTER.IsFemale,'ramenée saine et sauve','ramené sain et sauf')] au camp par [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat], tissant le début d’une relation amoureuse."
 army_camp_lost_guide_corresponding:0 "Après [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous être','s’être')] perdu[TARGET_CHARACTER.Custom('FR_E')] à [PROVINCE.GetNameNoTooltip] lors d’une halte militaire, [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] été [Select_CString(TARGET_CHARACTER.IsFemale,'ramenée saine et sauve','ramené sain et sauf')] au camp par [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat], tissant le début d’une relation amoureuse."
 lmf_army.1180.c:0 "Soyez remercié[army_stranger.Custom('FR_E')] pour votre aide, mais nos chemins se séparent ici."
 lmf_army.1190.t:0 "Médecine [candidate.GetCulture.GetNameNoTooltip]"
 lmf_army.1190.t.maester:0 "Une main tendue"
 lmf_army.1190.start:0 "Je n'ai pas pu passer à côté du fait que les soins apportés aux troupes ont été particulièrement efficaces ces derniers temps, et désireu[ROOT.Char.Custom('FR_XSe')] d'aller congratuler le médecin, j'ai eu le plaisir de rencontrer "
 lmf_army.1190.maester:0 "un mestre, répondant au nom de [candidate.GetFirstName].\n\nC'est pour le moins une surprise de voir un éminent homme de la Citadelle œuvrer pour mon armée, et à cette surprise il rétorque d'avoir été naguère au service [enemy.Custom('FR_du_Char_Pi')][enemy.GetTitledFirstName], mais une querelle entre eux l'aura conduit à se rallier aux ennemis de son ennemi.\n\nJe hausse un sourcil, il hausse les épaules.\n\n"
 lmf_army.1190.disgraced:0 "un mestre, répondant au nom de [candidate.GetFirstName].\n\nC'est pour le moins une surprise de voir un éminent homme de la Citadelle œuvrer pour mon armée, et à cette surprise il rétorque, d'un ton pesant, que mestre il n'est plus, et cela par la faute des machinations [enemy.Custom('FR_du_Char_Pi')][enemy.GetTitledFirstName], au service [Select_CString(enemy.IsFemale,'de laquelle','duquel')] il était naguère. Lorsque je l'enjoins à me livrer des précisions sur sa disgrâce, il élude la question, par pudeur ou par fierté.\n\nJe hausse un sourcil, il hausse les épaules.\n\n"
 lmf_army.1190.physician:0 "un[candidate.Custom('FR_E')] volontaire local[candidate.Custom('FR_E')], répondant au nom de [candidate.GetFirstName].\n\nC'est pour le moins une surprise de voir quelqu'un d'aussi talentueux travailler dans un camp militaire plutôt que dans une prestigieuse cour, et à cette surprise [candidate.Custom('FR_IlElle')] rétorque, amusé[candidate.Custom('FR_E')], qu'[candidate.Custom('FR_IlElle')] était naguère au service [enemy.Custom('FR_du_Char_Pi')][enemy.GetTitledFirstName], avant qu'une querelle n'éclate.\n\nJe hausse un sourcil, [candidate.Custom('FR_IlElle')] hausse les épaules.\n\n"
 lmf_army.1190.end:0 "Pour l'heure, son seul souhait est d'employer ses talents là où ils seront reconnus à leur juste valeur."
 lmf_army.1190.a:0 "Soyez remercié[candidate.Custom('FR_E')] pour vos bons services."
 lmf_army.1190.b:0 "Nous aurions grand besoin de vos talents à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] !"
 lmf_army.1190.c:0 "Faites moi grâce de votre personne à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], voulez-vous ?"
 lmf_army.1200.t:0 "Diligence ou désinvolture ?"
 lmf_army.1200.desc:0 "Un climat de quiétude s'est durablement installé sur le camp, mais les vents de la guerre étant imprévisibles, je me garde de croire que cela durera. Une prudence que ne semble pas partager les soldats.\n\nOù que mes yeux se posent je ne vois qu'insouciance et léthargie, deux choses qui ne sied guère à une armée digne de ce nom. La mollesse a préséance sur la motivation, le flegme a raison de la fougue, et le labeur coutumier d'un camp militaire semble devenu une brimade pour beaucoup — beaucoup trop. Parmi les [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], différents sons de cloche retentissent ; certains suggèrent de confronter l'indolence de l'âme à la souffrance du corps, de doubler l'entraînement pour les sortir de leur apathie ; d'autres en revanche voient cette quiétude comme une opportunité de garder les soldats frais et en pleine possession de leurs forces, quitte à privilégier le laisser-aller.\n\nQue faire ?"
 lmf_army.1200.a:0 "C'est une armée de soldats, non de sybarites que je veux !"
 lmf_army.1200.b:0 "Qu'ils profitent de cette accalmie tant que cela dure."
 lmf_army.1200.c:0 "Les choses sont très bien comme elles sont."
 lmf_army.1210.t:0 "Perdu[army_friend.Custom('FR_E')] dans les [army.GetLocation.Custom('FR_TerrainTypeProvince_Plural')]"
 lmf_army.1210.desc:0 "[ROOT.Char.Custom('CulturalCurse')] ! Impossible de retrouver [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] !\n\nUne simple patrouille de reconnaissance, un temps qui se dégrade rapidement, et voilà où nous en sommes. Les recherches restent vaines, et plus préoccupant encore, [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] est en territoire ennemi. Chaque heure passée à arpenter ces [army.GetLocation.Custom('FR_TerrainTypeProvince_Plural')] m'expose à un danger certain, mais d'un autre côté, si je retourne au camp maintenant, cela reviendrait à abandonner m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('army_friend'))] et à abandonner par là même l'idée de [army_friend.Custom('FR_LeLa')] retrouver sain[army_friend.Custom('FR_E')] et sau[army_friend.Custom('FR_FVe')].\n\nChoix cornélien s'il en est."
 lmf_army.1210.a:0 "Je mènerais les recherches moi même !"
 lmf_army.1210.b:0 "Le mieux est encore de rentrer quérir de l'aide."
 lmf_army.1210.c:0 "[army_friend.Custom('FR_IlElle')|U] en a vu d'autres, je ne m'en fais pas pour [army_friend.Custom('FR_LuiElle')]."
 lmf_army.1210.wounded.tt:0 "Les recherches n'aboutissent pas et vous faites une rencontre hasardeuse avec l'ennemi"
 lmf_army.1210.fail.tt:0 "Les recherches n'aboutissent pas"
 lmf_army.1210.succeed.tt:0 "[army_friend.GetFirstNameNoTooltip] est retrouvé[army_friend.Custom('FR_E')]"
 lmf_army.1210.knight.lost.title:0 "[army_friend.Custom('FR_le_Char_Pi')|U][army_friend.GetTitledFirstNameNoTooltip] s'est égaré[army_friend.Custom('FR_E')] à [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]"
 lmf_army.1210.knight.lost.desc:0 "[army_friend.Custom('FR_le_Char')|U][army_friend.GetNameNoTooltip] demeure introuvable depuis sa disparition lors d'une patrouille militaire."
 lmf_army.1210.knight.found.title:0 "[army_friend.Custom('FR_le_Char_Pi')|U][army_friend.GetTitledFirstNameNoTooltip] a été retrouvé[army_friend.Custom('FR_E')] !"
 lmf_army.1210.knight.found.desc:0 "Après d'intenses recherches, [army_friend.Custom('FR_le_Char')][army_friend.GetNameNoTooltip] a été retrouvé[army_friend.Custom('FR_E')] à [army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], blessé[army_friend.Custom('FR_E')] mais reconnaissant[army_friend.Custom('FR_E')] pour avoir été sauvé[army_friend.Custom('FR_E')]."
 lmf_army.1211.knight.newliege.desc:0 "Après d'intenses recherches, [army_friend.Custom('FR_le_Char')][army_friend.GetNameNoTooltip] a été retrouvé[army_friend.Custom('FR_E')] à la Cour [army_friend.GetLiege.Custom('FR_du_Char_U_Pi')][army_friend.GetLiege.GetShortUIName], chez qui [army_friend.Custom('FR_IlElle')] demeure comme gage de sa gratitude pour lui avoir porté secours."
 searched_for_me_after_lost:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] exprimé [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] gratitude envers [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] pour [Select_CString(CHARACTER.IsLocalPlayer,'vous','lui')] avoir porté secours après [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] disparition lors d'une patrouille militaire."
 searched_for_me_after_lost_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] exprimé [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre','sa')] gratitude envers [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] pour [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous','lui')] avoir porté secours après [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre','sa')] disparition lors d'une patrouille militaire."
 lmf_army.1211.knight.found.desc:0 "Jusqu'alors disparu à [lost_in.GetTitle.GetNameNoTierNoTooltip], [army_friend.Custom('FR_le_Char')][army_friend.GetNameNoTooltip] a finalement été retrouvé[army_friend.Custom('FR_E')] et ramené[army_friend.Custom('FR_E')] à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_army.1220.t.commander:0 "Être de taille, frapper d'estoc"
 lmf_army.1220.t.knight:0 "Être de taille, frapper d'estoc"
 lmf_army.1220.desc:0 "La session d'entraînement avec [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] vient de s'achever, comme tant d'autres qui l'ont précédées dans les dernières semaines.\n\nLorsque la première d'entre elles avait commencé, je ne pensais point qu'[army_friend.Custom('FR_IlElle')] pourrait m'apprendre quoi que ce soit de pertinent, mais le temps m'ayant donné tort, je n'ai maintenant nulle honte à affirmer que c'est un[army_friend.Custom('FR_E')] bretteu[army_friend.Custom('FR_RSe')] d'exception, bien meilleur[army_friend.Custom('FR_E')] que je ne le suis. Ses leçons, aussi instructives que divertissantes, m'auront grandement aidé à parfaire mon habileté à manier m[ROOT.Char.Custom('FR_OnA_signature_weapon')] tout en tuant la monotonie avec panache."
 lmf_army.1230.desc:0 "L'entrevue avec [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] s'est terminée, comme tant d'autres qui l'ont précédées durant les dernières semaines.\n\nRien d'officiel, ni de personnel, simplement des échanges entre deux individus versés dans l'art de la guerre. Cela avait commencé de manière fortuite par une banale discussion à propos d'affaires militaires, et de fil en aiguille, j'ai réalisé qu'[army_friend.Custom('FR_IlElle')] était un vrai puits de science dans ce domaine. S'improvisant mentor à chaque halte, [army_friend.Custom('FR_IlElle')] a su me faire don de connaissances qui me seront, je n'en doute point, grandement utiles."
 lmf_army.1240.desc:0 "La session d'entraînement avec [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))] vient de s'achever, comme tant d'autres qui l'ont précédées dans les dernières semaines.\n\nCela a innocemment commencé lorsque, faisant mes exercices quotidiens, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('army_friend'))] est venu[army_friend.Custom('FR_E')] me donner quelques conseils. Certains — dont moi — auraient pu y voir une outrecuidance fort déplacée, mais après quelques défaites répétées, j'y voyais une opportunité de progresser.\n\nEt maintenant me voilà, au beau milieu de la lice, capable de frapper de m[ROOT.Char.Custom('FR_OnA_signature_weapon')] avec la célérité du vent et la soudaineté de la foudre."
 lmf_army.1220.a:0 "Gare à ma nouvelle botte secrète !"
 lmf_army.1220.a.improves.tt:0 "@knight_icon! Un [player.Custom('KnightCultureNoTooltipLowercase')] s'améliore"
 lmf_army.1220.a.prowess.desc:0 "La [prowess|El] de votre [player.Custom('KnightCultureNoTooltipLowercase')], [champion.Custom('FR_le_Char_U_Pi')][champion.GetShortUIName], a augmenté de 1[prowess_i] grâce à l'entraînement [army_friend.Custom('FR_du_Char_U_Pi')][army_friend.GetShortUIName]."
 lmf_army.1230.a.martial.desc:0 "La [martial|El] de votre [player.Custom('KnightCultureNoTooltipLowercase')], [champion.Custom('FR_le_Char_U_Pi')][champion.GetShortUIName], a augmenté de 1[martial_i] grâce à l'entraînement [army_friend.Custom('FR_du_Char_U_Pi')][army_friend.GetShortUIName]."
 lmf_army.1240.a.blademaster.desc:0 "Votre [player.Custom('KnightCultureNoTooltipLowercase')], [champion.Custom('FR_le_Char_U_Pi')][champion.GetShortUIName], a obtenu le [trait|El] [GetTrait('lifestyle_blademaster').GetName( GetNullCharacter )|l] grâce à l'entraînement [army_friend.Custom('FR_du_Char_U_Pi')][army_friend.GetShortUIName]."
 lmf_army.1250.t:0 "The Eye of a Soldier"
 lmf_army.1250.mid:0 "and I'll admit that the tension is slowly getting to me. Tonight, we mostly drank in silence around the campfire.\n\nStill, there was one [army_lover.GetWomanMan] who kept catching my eye. [army_lover.GetSheHe|U] was one of the rank-and-file soldiers, "
 lmf_army.1250.male:0 "but handsome and seemingly far more adept than most of his peers. "
 lmf_army.1250.female:0 "but fair of face and seemingly far more adept than most of her male peers. "
 lmf_army.1250.end:0 "I don't think we'd ever crossed paths before, but [army_lover.GetSheHe] seemed oddly familiar.\n\nLater, I ran into the same [army_lover.GetWomanMan] near my tent. [army_lover.GetSheHe|U] introduced [army_lover.GetHerselfHimself] as [army_lover.GetFirstNameNoTooltip]... and I could tell that, if I happened to invite [army_lover.GetHerHim] inside, [army_lover.GetSheHe] would readily accept.\n\nI'll admit, I'm sorely tempted."
 lmf_army.1250.a:0 "Why not? I'll invite [army_lover.GetHerHim] in, for the night."
 army_camp_caught_eye:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] a soldier who caught [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] your eye when [CharYouThey(TARGET_CHARACTER)] were both in the army camp at [PROVINCE.GetNameNoTooltip]."
 army_camp_caught_eye_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(TARGET_CHARACTER)] a soldier who caught [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] your eye when [CharYouThey(CHARACTER)] were both in the army camp at [PROVINCE.GetNameNoTooltip]."
 lmf_army.1250.b:0 "Actually, this [army_lover.Custom('GetLassLad')] deserves a permanent place in my court."
 lmf_army.1250.c:0 "No, it's really not a good idea."
 lmf_army.1260.t:0 "Frasque à la source"
 lmf_army.1260.begin:0 "Dire que j'empeste la sueur serait un doux euphémisme, mais c'est la conséquence logique à marcher comme un[ROOT.Char.Custom('FR_E')] bougr[ROOT.Char.Custom('FR_EEsse')] à travers les [army.GetLocation.Custom('FR_TerrainTypeProvince_Plural')] de [army.GetLocation.GetTitle.GetNameNoTierNoTooltip]. Un bon bain me ferait le plus grand bien, et à ce propos justement, "
 lmf_army.1260.oasis:0 "un éclaireur rapporte la présence d'une oasis à l'orée de la contrée. "
 lmf_army.1260.spring:0 "un éclaireur rapporte la présence d'une source naturelle à l'orée de la contrée. "
 lmf_army.1260.mid:0 "Lorsque nous nous décidons à faire une halte, je saisis l'occasion pour aller faire un petit plongeon, et quelle n'est pas ma plaisante surprise de constater qu'il n'y a nul autre âme ici que moi. L'eau qui serpente le long de ma peau est si apaisante que je ne réalise que tardivement qu'un[army_stranger.Custom('FR_E')] [army_stranger.GetWomanMan] se tient debout, m'observant avec ce que je devine être… de l'intérêt ?\n\n« Veuillez m'excuser. Je me prénomme [army_stranger.GetFirstName]. "
 lmf_army.1260.septon.female:0 "Je suis une [army_stranger.GetFaith.PriestFemale] œuvrant dans [army_stranger.GetFaith.HouseOfWorship] qui se trouve non loin d'ici. »\n\n"
 lmf_army.1260.septon.male:0 "Je suis un [army_stranger.GetFaith.PriestMale] œuvrant dans [army_stranger.GetFaith.HouseOfWorship] qui se trouve non loin d'ici. »\n\n"
 lmf_army.1260.devoted.female:0 "Je suis une [army_stranger.GetFaith.DevoteeFemale], et je viens [army_stranger.GetFaith.HouseOfWorship3] qui se trouve non loin d'ici. »\n\n"
 lmf_army.1260.devoted.male:0 "Je suis un [army_stranger.GetFaith.DevoteeMale], et je viens [army_stranger.GetFaith.HouseOfWorship3] qui se trouve non loin d'ici. »\n\n"
 lmf_army.1260.peasant:0 "Je viens d'un village non loin d'ici. »\n\n"
 lmf_army.1260.end:0 "[army_stranger.Custom('FR_IlElle')|U] justifie sa présence ici par le fait que la source aurait des vertus curatives, mais n'étant point so[ROOT.Char.Custom('FR_TTte')], je vois dans son regard que ce n'est pas l'eau qui lui fait tant envie…"
 lmf_army.1260.a:0 "Il y a bien assez de place pour deux..."
 lmf_army.1260.b:0 "Sans façon."
 lmf_birth.1001.t:0 "La disgrâce d'un[relative.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('relative'))]"
 lmf_birth.1001.opening:0 "[spymaster.GetTitledFirstNameNoTooltip] has come to me bearing unsettling news: my unmarried [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.GetTitledFirstName], has been showing signs that lead [spymaster.GetHerHim] to believe she is with child! "
 lmf_birth.1001.know:0 "[spymaster.GetTitledFirstNameNoTooltip] strongly suspects the father is my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('suspected_father'))], [suspected_father.GetTitledFirstName], but there is no way to be certain without questioning my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] and immediately bringing the whole matter out into the open.\n\n"
 lmf_birth.1001.secret:0 "[spymaster.GetTitledFirstNameNoTooltip] has no idea who the father might be, as of yet, but questioning my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] would immediately bring the whole matter out into the open.\n\n"
 lmf_birth.1001.convent:0 "There is, however, an option. We could send [relative.GetTitledFirstNameNoTooltip] into seclusion until the child is born, at a small rural estate safely away from the prying eyes of the court. Nobody needs to know what occurred, or who the true mother of the child ever was... if, indeed, it even survives. [relative.GetTitledFirstNamePossessiveNoTooltip] reputation, as well as our own, would be safe."
 lmf_birth.1001.end:0 "Unfortunately, there is no suitable place to send [relative.GetTitledFirstNameNoTooltip] into seclusion. If she remains at court then, sooner or later, everyone will know."
 lmf_birth.1001.a:0 "Send her into seclusion — this never happened."
 lmf_birth.1001.b:0 "Banish her immediately!"
 lmf_birth.1001.c:0 "We shall deal with the consequences of her indiscretion."
 lmf_birth.1001.d:0 "[suspected_father.GetTitledFirstNameNoTooltip] will do the right thing immediately... or else."
 lmf_birth.1003.t:0 "De funestes nouvelles"
 lmf_birth.1003.alive:0 "Je suis au regret de vous annoncer que votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.Custom('FR_le_Char_Pi')][relative.GetTitledFirstName], n'est plus de ce monde. Puisse [relative.GetFaith.DeathDeityName] la guider jusqu'[relative.GetFaith.PositiveAfterLife2].\n\nSi cela peut soulager votre peine, sachez qu'elle a donné naissance à un[child.Custom('FR_E')] [child.GetDaughterSon] bien portant[child.Custom('FR_E')]. Les sages-femmes n'ont pas réussi à sauver la mère, mais elles témoignent du courage qui fut le sien aux heures les plus sombres, et ce jusque dans son dernier souffle, pleinement dévoué à l'enfant qu'elle a nommé [child.GetFirstName].\n\n[child.Custom('FR_IlElle')|U] est votre sang, alors il vous appartient de décider quoi faire."
 lmf_birth.1003.dead:0 "Je suis au regret de vous annoncer que votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.Custom('FR_le_Char_Pi')][relative.GetTitledFirstName], n'est plus de ce monde.\n\nSes forces l'ont abandonnées, autant que [relative.GetFaith.FertilityGodName] oserais-je dire, car c'est en couches qu'elle est morte, et l'enfant ne lui aura point survécu, je le crains."
 lmf_birth.1003.a:0 "Je ne veux plus jamais entendre parler de ce[child.Custom('FR_TTte')] enfant."
 lmf_birth.1003.a.tt:0 "[child.Custom('FR_LeLa')|U] bâtard[child.Custom('FR_E')] [relative.Custom('FR_du_Char_Pi')][relative.GetTitledFirstNameNoTooltip] disparaîtra dans le néant"
 lmf_birth.1003.b:0 "Sa place est aux côtés des siens."
 lmf_birth.1003.b.tt:0 "[child.GetFirstNameNoTooltip] rejoindra votre [THIS.Char.Custom('GetCourt')] pour y être élevé[child.Custom('FR_E')] comme votre [THIS.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('child'))]"
 lmf_birth.1003.c:0 "Puisse [ROOT.Char.GetFaith.PantheonTerm] veiller sur eux."
 lmf_birth.1004.t:0 "It is Done"
 lmf_birth.1004.desc:0 "We have tidings from [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. [relative.GetTitledFirstNameNoTooltip] has given birth and the deed is done, as if the entire scandal never happened. Shall we call for your [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] to return home?"
 lmf_birth.1004.a:0 "Of course! Let's put this business to rest."
 lmf_birth.1004.b:0 "She can remain where she is. I care not."
 lmf_birth.1006.t:0 "What Was Lost"
 lmf_birth.1006.opening:0 "I am traveling in [ROOT.Char.GetCurrentLocation.GetName] when I spot, from my carriage, a young [stray_bastard.GetWomanMan] passing in the street. While otherwise unremarkable, there is something eerily familiar about [stray_bastard.GetHerHim]... enough so that I remember the encounter later and ask that [stray_bastard.GetSheHe] be tracked down.\n\n"
 lmf_birth.1006.mother:0 "The truth is beyond anything I could have imagined. It appears that young [stray_bastard.GetWomanMan] is none other than the [stray_bastard.Custom('GetDaughterSon')] I bore many years ago when I was sent into seclusion. I thought [stray_bastard.GetHerHim] lost, even dead, but here [stray_bastard.GetSheHe] is! Perhaps it is merely someone claiming to be that child, but [stray_bastard.GetSheHe] has never sought me out to ask for anything... and who else would know what happened?\n\n"
 lmf_birth.1006.family:0 "The truth is beyond anything anything I could have imagined. It appears that young [stray_bastard.GetWomanMan] is none other than the child of my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))], [relative.GetTitledFirstNameNoTooltip], secretly born many years ago when she was sent into seclusion. Perhaps it is merely someone claiming to be that child, but [stray_bastard.GetSheHe] has never sought out [stray_bastard.GetHerHis] family to ask for anything... and who else would know what happened?\n\n"
 lmf_birth.1006.other:0 "What my servants later reported was far beyond anything I could have imagined. It appears that young [stray_bastard.GetWomanMan] is none other than the [stray_bastard.Custom('GetDaughterSon')] of [relative.GetGetFullName], born many years ago when she was sent into seclusion at [birthplace.GetNameNoTooltip]. Perhaps it is merely someone claiming to be that child, but [stray_bastard.GetSheHe] has never sought out [stray_bastard.GetHerHis] family to ask for anything... and who else would know what happened? It was a shameful secret, kept hidden.\n\n"
 lmf_birth.1006.knight:0 "The young [stray_bastard.GetWomanMan] has become a promising [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] currently in the service of a minor lord here in [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], of sufficient skill to have gained a small reputation of [stray_bastard.GetHerHis] own. "
 lmf_birth.1006.physician:0 "The young [stray_bastard.GetWomanMan] has been working as a promising physician here in [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] for several years, of sufficient skill to have gained a small reputation of [stray_bastard.GetHerHis] own. "
 lmf_birth.1006.monk:0 "It seems the young man took his vows and became a [stray_bastard.GetFaith.DevoteeMale]... one of considerable learning and virtue, according to everything we've heard. A [stray_bastard.GetFaith.GetAdherentNameNoTooltip] man of no small accomplishment, despite his age. "
 lmf_birth.1006.nun:0 "It seems the young woman took her vows and became a [stray_bastard.GetFaith.DevoteeFemale]... one of considerable learning and virtue, according to everything we've heard. A [stray_bastard.GetFaith.GetAdherentNameNoTooltip] woman of no small accomplishment, despite her age. "
 lmf_birth.1006.rogue:0 "The young [stray_bastard.GetWomanMan] has quite the shady reputation. Here in [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], [stray_bastard.GetSheHe] is known as someone who gets things done. Both clever and resourceful, they say, though without guidance it seems likely [stray_bastard.GetSheHe] will end up on the wrong side of the law eventually. "
 lmf_birth.1006.beauty:0 "The young woman works in the household of a minor lord here in [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], and already has garnered a reputation for her beauty and elegant manner. It seems almost certain she will gain the notice of higher circles before very long. "
 lmf_birth.1006.end:0 "While [stray_bastard.GetSheHe] has never sought to use [stray_bastard.GetHerHis] birth to [stray_bastard.GetHerHis] advantage, perhaps I could find a place for [stray_bastard.GetHerHim] in my court? We could also leave [stray_bastard.GetHerHim] be, but surely the rumors of [stray_bastard.GetHerHis] existence and birth will eventually reach other ears."
 lmf_birth.1006.a:0 "I shall find a place for [stray_bastard.GetHerHim] in my court."
 lmf_birth.1006.b:0 "Let the bastard remain in obscurity. I care not."
 lmf_birth.1006.c:0 "[stray_bastard.GetSheHe|U] should have died long ago. Let's rectify that error."
 lmf_birth.1007.t:0 "It is Done"
 lmf_birth.1007.desc:0 "We have tidings from [relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]. The child did not carry to term, but [relative.GetTitledFirstNameNoTooltip] appears to be otherwise unharmed. So, truth be told, it is as if the entire scandal never happened. Shall we call for your [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))] to return home?"
 lmf_birth.1008.t:0 "Discovered!"
 lmf_birth.1008.desc.start:0 "I hadn't heard from my love for days, and was beginning to grow concerned. Had she grown tired of me already?\n\nThen I was informed of the truth: [relative.GetFirstNameNoTooltip] had been whisked off by her [relative.Custom2('LMF_RelationToMeShort', relative_liege )] to a small estate in a dismal corner of [convent.GetNameNoTooltip], where she was being kept in seclusion. Why? Because [relative_liege.GetSheHe] discovered [relative.GetFirstNameNoTooltip] was with child. MY child.\n\nIt's clear that [relative_liege.GetTitledFirstNameNoTooltip] prefers [relative_liege.GetHerHis] [relative_liege.Custom2('LMF_RelationToMeShort', relative )] have no further contact with me,"
 lmf_birth.1008.desc.secret:0 " assuming [relative_liege.GetSheHe] even knows I'm the father,"
 lmf_birth.1008.desc.end:0 " but as for what [relative.GetFirstNameNoTooltip] wants? I have no idea. Surely it can't be this!"
 lmf_birth.1008.a:0 "There's nothing I can do about it, sadly."
 lmf_birth.1008.b:0 "Bring her here. I will not leave her in [convent.GetNameNoTooltip]."
 lmf_birth.1008.c:0 "I will rescue and marry her, with or without her [relative.Custom2('LMF_RelationToMePossessive', relative_liege )] permission!"
 rival_took_secluded_family:0 "[TARGET_CHARACTER.GetShortUIName|U] abducted [CHARACTER.GetShortUINamePossessiveNoTooltip] [CHARACTER.Custom2('LMF_RelationToMeShort', TARGET_CHARACTER_2 )] while she was in seclusion."
 rival_took_secluded_family_corresponding:0 "[CHARACTER.GetShortUIName|U] abducted [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip] [TARGET_CHARACTER.Custom2('LMF_RelationToMeShort', TARGET_CHARACTER_2 )] while she was in seclusion."
 lmf_birth.1009.t:0 "Spirited Away"
 lmf_birth.1009.desc.start:0 "News arrived early this morning.\n\nNo sooner had [relative.GetFirstNameNoTooltip] been installed at the remote estate in [convent.GetNameNoTooltip], soldiers appeared to take her away and escort her to [baby_father.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. How [baby_father.GetTitledFirstNameNoTooltip] discovered where I'd sent her, I don't know, but he's revealed himself as [relative.GetFirstNamePossessiveNoTooltip] lover and the father of her unborn child.\n\n"
 lmf_birth.1009.desc.elope:0 "I'm led to understand that the two of them married as soon as they reached [baby_father.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. While I suppose this spares us the embarrassment of a bastard, this is still an elopement. Everyone will know it occurred without my knowledge or consent!"
 lmf_birth.1009.desc.abduct:0 "Now the two of them are esconced within [baby_father.GetTitledFirstNamePossessiveNoTooltip] [baby_father.Custom('FortifiedBuilding')], where the man doesn't even have the decency to marry her after this flagrant abduction!"
 lmf_birth.1009.a:0 "She has brought shame to her family."
 lmf_birth.1101.t:0 "Des complications"
 lmf_birth.1101.depressed.t:0 "Sombre nuit, sombres pensées"
 lmf_birth.1101.depressed.death.opening:0 "La perte d'un enfant est déjà effroyable en soi, mais lorsque vos pas sont précédés de bouches cousues et de visages détournés, la mort devient une geôle dont on refuse de vous libérer. Ils craignent mes larmes, lorsque je crains l'errance solitaire qu'ils m'infligent. Le mutisme que certains prennent pour un drap confortable dans lequel on souhaite m'emmitoufler n'est rien d'autre qu'un linceul qui en vient à me couper du reste du monde.\n\n"
 lmf_birth.1101.depressed.sick.child.opening:0 "Lorsque je pose les yeux sur mon enfant, mon cœur saigne et ma culpabilité grandit. #italic C'est de ma faute.#! Le chagrin chasse peut-être la raison de mon esprit, mais cette pensée qui s'est logée dans un coin de ma tête refuse d'en sortir. Les quintes de toux tambourinent au plus profond de mon être, me faisant oublier tout ce qui m'entoure, jusqu'à me retrouver seul[ROOT.Char.Custom('FR_E')] dans les ténèbres.\n\n"
 lmf_birth.1101.depressed.sick.opening:0 "La maladie ne ronge pas seulement mon corps, elle gangrène également mon esprit. Je me sens si faible, et je suis d'autant plus affaibli[ROOT.Char.Custom('FR_E')] que je me sens coupable de ne pas avoir la force de lutter. Je devrais être en train de serrer mon bébé dans mes bras, mais la vigueur me faisant défaut, ce sont les remords qui m'enserrent jusqu'à me faire suffoquer.\n\n"
 lmf_birth.1101.depressed.opening:0 "I should be overjoyed, should I not? There is a new babe in our lives. This should be a good thing. Yet a shadow lingers over my thoughts, darkening everything it touches, and I can't ever seem to escape it.\n\n"
 lmf_birth.1101.opening:0 "Things have not been the same since the birth. I know it. I can feel it. There is more bleeding than there should be, and I feel weak all the time.\n\n"
 lmf_birth.1101.end.infertile:0 "The physicians have come and gone from my bedchambers, each time clucking their tongues in disapproval. They say that, while I may recover, the complications I've experienced from the birth may mean I'll never have another child."
 lmf_birth.1101.end.infertile.long:0 "The physicians have come and gone from my bedchambers, each time clucking their tongues in disapproval. I will recover, they say, but the complications from the birth are severe. It will take time. How long, they do not appear to know."
 lmf_birth.1101.end.age:0 "The physicians say this will pass, that all of this is normal... particularly for a woman of my age. The fact I had a child at all is something of a miracle."
 lmf_birth.1101.end:0 "The physicians say that this will pass, that all of this is normal. I simply need to give it some time."
 lmf_birth.1101.a:0 "I hope that they are wrong."
 lmf_birth.1101.b:0 "I hope that they are right."
 lmf_birth.1101.tt:0 "Un accouchement difficile"
 lmf_birth.1102.husband.tt:0 "L'humeur maussade de [ROOT.Char.GetFirstNameNoTooltip] s'en est allée"
 lmf_birth.1102.tt:0 "Votre humeur maussade s'en est allée"
 dinner_past_temperate:0 "fait preuve de modération en toute circonstance, ne souhaitant ni abuser de la nourriture, ni de l'alcool"
 dinner_past_chaste_male:0 "ne montre guère d'entrain à participer à cette soirée, préférant siéger religieusement à sa place"
 dinner_past_chaste_female:0 "s'évertue à éviter au mieux les regards, en particulier ceux des jouvenceaux qui vont et viennent pour servir la nourriture"
 dinner_past_generous:0 "dans sa grande bonté, apporte son aide aux domestiques pour servir et desservir la table"
 dinner_past_diligent:0 "a le visage de [ROOT.GetCharacter.Custom('FR_CeluiCelle')] qui a trimé toute la journée, ce qui ne l'empêche pourtant pas de montrer de l'entrain pour cette soirée"
 dinner_past_calm:0 "fait montre d'un calme apaisant, contrastant avec l'agitation attendue de ce genre de réunion"
 dinner_past_patient_adult:0 "témoigne d'une extrême patience avec l'un des nouveaux domestiques, à qui [ROOT.GetCharacter.Custom('FR_IlElle')] explique comment faire correctement son travail"
 dinner_past_patient_child:0 "attend sagement que le service des plats soit terminé pour commencer à entamer son repas. Chose surprenante compte tenu de son jeune âge"
 dinner_past_humble:0 "demeure humble. Un trait de caractère qui lui vaut le respect des domestiques envers qui [ROOT.GetCharacter.Custom('FR_IlElle')] s'adresse avec plus de révérence qu'il n'en faut"
 dinner_past_honest:0 "nous fait part d'un récit sur une récente mésaventure. Comme à son habitude, [ROOT.GetCharacter.Custom('FR_IlElle')] ne saupoudre nullement les faits de quelques exagérations que ce soit"
 dinner_past_brave:0 "nous abreuve des récits qui narrent ses intrépides aventures dont [ROOT.GetCharacter.Custom('FR_IlElle')] a le secret, au grand bonheur de son auditoire"
 dinner_past_gregarious:0 "s'échine à rendre l'ambiance plus festive, agrémentant la soirée de ses bons mots"
 dinner_past_just:0 "ne manque pas de mentionner une sordide affaire qui a eu lieu plus tôt à la cour, durant laquelle la justice a été salement bafouée"
 dinner_past_zealous:0 "enjoint la famille à adresser une prière envers [ROOT.GetCharacter.GetFaith.PantheonTerm], avec la ferveur qu'on lui connaît tous"
 dinner_past_trusting:0 "boit les paroles des uns et des autres, yeux écarquillés et esgourdes grandes ouvertes, sans se préoccuper des exagérations voire des mensonges qui lui sont servis"
 dinner_past_compassionate:0 "est comme à son habitude, l'incarnation même de la bienveillance. Souriant chaleureusement autant à la famille qu'aux domestiques"
 dinner_past_stubborn:0 "refuse obstinément de changer de sujet de conversation, allant jusqu'à tenir la jambe de tout le monde"
 dinner_past_forgiving:0 "rassure un[ROOT.GetCharacter.Custom('FR_EOpp')] domestique qui a renversé de la boisson sur ses habits"
 dinner_past_charming:0 "se montre tout à fait charmant[ROOT.GetCharacter.Custom('FR_E')] ce soir, sa tendreté rayonnant de part et d'autres de la table"
 dinner_past_curious:0 "satisfait sa curiosité enfantine en posant moult questions, laissant la salle baigner dans une candeur amusante"
 dinner_past_pregnant:0 "est au centre de tous les regards, son ventre soulevant autant de questions qu'il suscite d'émotions"
 dinner_past_beauty_good_female:0 "rayonne d'une beauté exquise, sublimée par de gracieux atours"
 dinner_past_beauty_good_male:0 "accapare le regard de toutes les caméristes, dont les allers et venus excessifs finissent par devenir comiques"
 dinner_past_intellect_good:0 "nous abreuve de ses arguments bien sentis et de ses fines observations, offrant aux conversations plus de profondeur qu'il n'en faudrait"
 dinner_past_poet:0 "nous gratifie d'une ballade [ROOT.GetCharacter.GetCulture.GetNameNoTooltip], la salle baignant ainsi dans une ambiance lyrique des plus agréables"
 dinner_past_shrewd:0 "use de son habileté d'esprit pour orchestrer le bon déroulement de la soirée, tout en égayant la soirée par d'astucieux calembours"
 dinner_past_lifestyle_reveler:0 "appelle à plus de festivités, plus de boissons et plus de rires encore, ce qui ne manque pas d'égayer la soirée"
 dinner_past_lifestyle_blademaster:0 "fait une petite démonstration de son talent la lame en main, transformant un simple couteau de table en une arme digne d'un maître épéiste, ce qui ne manque pas d'impressionner tout le monde"
 dinner_past_lifestyle_hunter:0 "captive l'attention de tous en narrant la dernière chasse à laquelle [ROOT.GetCharacter.Custom('FR_IlElle')] a participé"
 dinner_past_lifestyle_herbalist:0 "agrémente le repas de divers conseils sur les bonnes herbes à utiliser dans le cadre d'un festin"
 dinner_past_lifestyle_gardener:0 "semble particulièrement emballé[ROOT.GetCharacter.Custom('FR_E')] par les légumes servis, ne tarissant pas d'éloges sur leur qualité"
 dinner_past_pos_fallback_1_adult:0 "fait preuve d'une gaieté inhabituelle, badinant à l'excès, ce qui ne manque pas de rendre la soirée plus chaleureuse"
 dinner_past_pos_fallback_1_child:0 "se montre particulièrement bien élevé[ROOT.GetCharacter.Custom('FR_E')] ce soir, faisant montre de politesse et de gentillesse envers tout le monde"
 dinner_past_pos_fallback_2:0 "fait honneur à toute la famille par son comportement exemplaire"
 dinner_past_pos_fallback_3_adult:0 "met de côté toute éventuelle animosité pour s'assurer que tout le monde passe une bonne soirée"
 dinner_past_pos_fallback_3_child:0 "fait montre d'une joie juvénile qui apporte des éclairs de gaieté tout au long de la soirée"
 dinner_past_lustful_male:0 "n'a de cesse de jeter des regards langoureux et insistants à droite à gauche, laissant dans l'embarras nombre de domestiques"
 dinner_past_lustful_female:0 "ne cesse de minauder, oubliant toute règle de bienséance pour s'amuser à aguicher les domestiques qui lorgnent sur elle"
 dinner_past_gluttonous:0 "engloutit plus qu'[ROOT.GetCharacter.Custom('FR_IlElle')] ne mange, comme si la famine guettait aux alentours et qu'[ROOT.GetCharacter.Custom('FR_IlElle')] voulait s'en protéger"
 dinner_past_greedy_adult:0 "dégoise au sujet de l'argent bêtement dépensé dans un simple repas de famille, arguant sur la nécessité de se montrer économe en toute occasion"
 dinner_past_greedy_child:0 "s'accapare les jouets des autres enfants, pour ensuite piquer une crise lorsque quelqu'un tente de l'en déposséder"
 dinner_past_greedy_teen:0 "réprimande l'un[ROOT.GetCharacter.Custom('FR_EOpp')] des domestiques, comme quoi [ROOT.GetCharacter.Custom('FR_IlElle')] n'aurait pas eu autant de dessert que les autres"
 dinner_past_lazy:0 "se tient avachi[ROOT.GetCharacter.Custom('FR_E')] à sa place, à deux doigts de piquer un somme en pleine réunion de famille"
 dinner_past_wrathful:0 "saisit le moindre prétexte pour vociférer et taper du poing sur la table, laissant les domestiques éponger ses excès de débordement"
 dinner_past_impatient:0 "tambourine vigoureusement des doigts sur la table, agacé[ROOT.GetCharacter.Custom('FR_E')] de l'attente du reste des victuailles et fustigeant des domestiques jugés trop lents"
 dinner_past_arrogant:0 "ne semble pas emballé[ROOT.GetCharacter.Custom('FR_E')] à l'idée d'être ici, levant les yeux au ciel pour un oui ou pour un non avec un certain dédain"
 dinner_past_deceitful:0 "tente de se sortir du fossé de mensonges qu'[ROOT.GetCharacter.Custom('FR_IlElle')] a [ROOT.GetCharacter.Custom('FR_LuiElle')]-même creusé, dès lors qu'[ROOT.GetCharacter.Custom('FR_IlElle')] a commencé à ouvrir la bouche en arrivant"
 dinner_past_craven:0 "se fait particulièrement discr[ROOT.GetCharacter.Custom('FR_EtEte')] ce soir, comme pour éviter le moindre conflit avec le reste de la famille"
 dinner_past_shy:0 "ne daigne pas participer aux conversations, évitant tout échange, de mots comme de regards"
 dinner_past_ambitious:0 "radote sur le moindre de ses hauts faits, probablement dans le but de se présenter comme [ROOT.GetCharacter.Custom('FR_LeLa')] plus illustre des membres de notre famille"
 dinner_past_arbitrary:0 "s'échine à brosser dans le sens du poil les membres de la famille qu'[ROOT.GetCharacter.Custom('FR_IlElle')] apprécie, au détriment des autres"
 dinner_past_cynical:0 "ponctue chaque conversation de ses remarques acerbes, fustigeant toute fioriture dans les propos pour rappeler à tous certaines cruelles vérités, ce qui n'est évidemment pas du goût de tous"
 dinner_past_paranoid:0 "commence à rendre nerveux tout le monde avec ses incessantes questions à propos de l'origine de la nourriture, des nouveaux domestiques et des éventuels invités arrivé plus tôt à la cour"
 dinner_past_callous:0 "ne manque pas de blâmer la moindre erreur commise par les domestiques, allant jusqu'à les railler aux yeux de tous"
 dinner_past_sadistic_adult:0 "s'amuse à ressasser de vieilles rancœurs qui ont tiraillé la famille, dans le simple but de voir tout le monde s'entredéchirer"
 dinner_past_sadistic_child:0 "prend grand plaisir à tourmenter les domestiques, allant jusqu'à renverser #italic accidentellement#! la cire brûlante d'une bougie sur l'un d'eux"
 dinner_past_fickle:0 "semble incapable de se décider sur ce qui lui fait envie, contraignant les domestiques à aller et venir sans cesse jusqu'à perturber le bon déroulement du repas"
 dinner_past_eccentric:0 "fait montre d'une insistance gênante à colloquer avec quelqu'un qu'[ROOT.GetCharacter.Custom('FR_IlElle')] est manifestement [ROOT.GetCharacter.Custom('FR_LeLa')] seul[ROOT.GetCharacter.Custom('FR_E')] à voir"
 dinner_past_rowdy:0 "bouillonne de vigueur, chahutant de part et d'autres de la salle, au point de couvrir le son des réjouissances"
 dinner_past_pensive:0 "semble perdu[ROOT.GetCharacter.Custom('FR_E')] dans ses pensées, préférant s'enquérir sur des sujets qui ne trouvent grâce qu'à ses yeux"
 dinner_past_bossy:0 "s'amuse à donner des ordres aux domestiques avec une vigueur qui ne tolère aucune contestation"
 dinner_past_drunkard:0 "a le visage de [ROOT.GetCharacter.Custom('FR_CeluiCelle')] qui a eu la main lourde sur la boisson et les propos de [ROOT.GetCharacter.Custom('FR_CeluiCelle')] qui le nie"
 dinner_past_reclusive:0 "se tient éloigné[ROOT.GetCharacter.Custom('FR_E')] de la table, la réunion de famille ne trouvant point grâce aux yeux de celui qui préfère la solitude à la compagnie"
 dinner_past_irritable:0 "rappelle à tous qu'[ROOT.GetCharacter.Custom('FR_IlElle')] ne fait pas bon l'inviter à une soirée conviviale"
 dinner_past_comfort_eater:0 "n'a d'yeux que pour la bouffe, engloutissant tout ce qui passe à portée de mains sans prêter la moindre attention à ce qui l'entoure"
 dinner_past_inappetetic:0 "ne s'intéresse pas un seul instant à ce qui se trouve dans son assiette"
 dinner_past_depressed:0 "jette un froid sur la famille, sa mélancolie grignotant l'allégresse ambiante comme la rouille qui ronge le métal"
 dinner_past_lunatic:0 "s'illustre dans un spectacle tout à la fois fantasque et grotesque, son comportement aliéné mettant tout le monde plus mal à l'aise"
 dinner_past_possessed:0 "commence à avoir un comportement des plus alarmants, au point de hurler des mots que nul ici ne semble comprendre, jusqu'à ce qu'enfin, [ROOT.GetCharacter.Custom('FR_IlElle')] soit rasséréné[ROOT.GetCharacter.Custom('FR_E')]"
 dinner_past_infirm:0 "est diminué[ROOT.GetCharacter.Custom('FR_E')] par son infirmité, à tel point qu'[ROOT.GetCharacter.Custom('FR_IlElle')] peine à se tenir droit[ROOT.GetCharacter.Custom('FR_E')]"
 dinner_past_intellect_bad:0 "se ridiculise par ses interventions stupides à propos de sujets dont [ROOT.GetCharacter.Custom('FR_IlElle')] ne comprend manifestement rien à rien"
 dinner_past_dwarf:0 "fait une scène à propos de la disposition de la table qui n'a pas été pensée pour sa petite personne"
 dinner_past_giant:0 "fait un boucan monstre suite à une chute causée par un siège inadapté à son imposante corpulence"
 dinner_past_dull:0 "bavasse à n'en plus finir avec un air des plus stupides, ce qui finit par éroder la patience de tout le monde"
 dinner_past_wheezing:0 "respire si bruyamment que cela finit par irriter le reste de la famille"
 dinner_past_neg_fallback_1_adult:0 "dédaigne tout et tout le monde, s'empêtrant dans un bourbier de disputes sans raison aucune"
 dinner_past_neg_fallback_1_child:0 "pique une crise et n'en démords pas même lorsqu'[ROOT.GetCharacter.Custom('FR_IlElle')] est envoyé[ROOT.GetCharacter.Custom('FR_E')] au lit"
 dinner_past_neg_fallback_2:0 "manifeste une irritabilité qui ne lui ressemble guère, ce qui manifestement finit par déteindre sur tout le monde"
 dinner_past_neg_fallback_3_adult:0 "vide une coupe de trop, et la boisson qui coule maintenant dans ses veines noie toute trace de bienséance dans son esprit"
 dinner_past_neg_fallback_3_child:0 "subit les conséquences d'avoir eu les yeux plus gros que le ventre, faisant profiter à toute la famille ses jérémiades"
 dinner_rival_reason_murderer:0 "le mot « #bold meurtre#! » est clairement sorti de la bouche de [ROOT.Char.GetFirstNameNoTooltip]. La causalité semble filer de soi."
 dinner_rival_reason_att_murder:0 "j'imagine que cela n'est pas sans lien avec le fait que [second.GetFirstNameNoTooltip] a attenté à la vie de [ROOT.Char.GetFirstNameNoTooltip]."
 dinner_rival_reason_slept_spouse:0 "cela a sûrement un lien avec le fait que [ROOT.Char.GetFirstNameNoTooltip] a été cocufié, et que [second.GetFirstNameNoTooltip] n'est pas étrang[second.Custom('FR_ErEre')] à cela."
 dinner_rival_reason_unfaithful:0 "il apparait évident que cela a un rapport avec l'infidélité conjugale de [second.GetFirstNameNoTooltip]."
 dinner_rival_reason_botched_treatment:0 "la foirade du médecin de [second.GetFirstNameNoTooltip] y est sûrement pour quelque chose."
 dinner_rival_reason_revenge:0 "[ROOT.Char.GetFirstNameNoTooltip] souhaite clairement se venger d'un quelconque camouflet infligé par [second.GetFirstNameNoTooltip]."
 dinner_rival_reason_them_cynical:0 "la vision cynique au possible de [second.GetFirstNameNoTooltip] sur la foi [ROOT.Char.GetFaith.GetAdjective] a probablement attisé la colère de [ROOT.Char.GetFirstNameNoTooltip]."
 dinner_rival_reason_them_pious:0 "la ferveur de [second.GetFirstNameNoTooltip] envers la foi [second.GetFaith.GetAdjective] a probablement érodé la patience de [ROOT.Char.GetFirstNameNoTooltip], comme l'eau sur la roche."
 dinner_rival_reason_hostile_religion:0 "il est aisé de comprendre que [second.GetFirstNameNoTooltip] et [ROOT.Char.GetFirstNameNoTooltip] sont à l'image de leurs fois, irréconciliables."
 dinner_rival_reason_both_pious:0 "je gage que cela est la résultante d'un houleux débat sur les croyances de leurs fois respectives."
 dinner_rival_reason_potential_rival:0 "ce n'est guère surprenant en fait, l'antagonisme latent qui couvait entre ces deux-là a simplement fini par éclore."
 dinner_rival_reason_war:0 "est-ce si surprenant ? À cet instant précis, ces deux là sont en guerre après tout."
 dinner_rival_reason_jealousy:0 "cela ne m'étonnerait guère que quelques imprécations soient nées d'une liaison jalousée par [ROOT.Char.GetFirstNameNoTooltip]."
 dinner_rival_reason_jealous_court:0 "le poste que [second.GetFirstNameNoTooltip] possède à ma cour a probablement attisé une certaine envie de la part de [ROOT.Char.GetFirstNameNoTooltip]."
 dinner_rival_reason_jealous_council:0 "ne serait-ce pas à imputer au fait que [second.GetFirstNameNoTooltip] ait une place privilégiée à mon conseil en tant que [second.GetCouncilTitle|l], chose enviée par [ROOT.Char.GetFirstNamePossessiveNoTooltip]."
 dinner_rival_reason_heir_position:0 "c'est très certainement une inévitable histoire d'ordre de succession entre [ROOT.Char.GetFirstNameNoTooltip] et [second.GetFirstNameNoTooltip], comme trop souvent d'ailleurs."
 dinner_rival_reason_claim:0 "cela ne peut pas être étranger aux #italic revendications légitimes#! de [ROOT.Char.GetFirstNameNoTooltip] sur [rival_claim_title.GetNameNoTierNoTooltip]."
 dinner_rival_reason_disinherited:0 "je subodore que l'héritage à venir de [second.GetFirstNameNoTooltip] alimente une certaine jalousie de la part de [ROOT.Char.GetFirstNameNoTooltip]."
 dinner_rival_reason_disputed_heritage:0 "il apparaît évident que les moqueries faussement subtiles de [ROOT.Char.GetFirstNameNoTooltip] concernant les rumeurs persistantes autour de la véritable parentèle de [second.GetFirstNameNoTooltip] n'y sont pas étrangères."
 dinner_rival_reason_hates:0 "ce n'est un secret pour personne que [ROOT.Char.GetFirstNameNoTooltip] éprouve une aversion complète pour [second.GetFirstNameNoTooltip]."
 dinner_rival_reason_grudge:0 "il semble évident que le sentiment de rancœur qui les lie y est pour quelque chose."
 dinner_rival_reason_victim:0 "je ne suis pas sans savoir que [second.GetFirstNameNoTooltip] a fait de [ROOT.Char.GetFirstNameNoTooltip] son souffre-douleur."
 dinner_rival_reason_incompatible:0 "ces deux-là peuvent coexister avec autant d'aisance que la glace et le feu."
 dinner_rival_reason_unknown:0 "il y a très certainement une raison, bien qu'à cet instant précis elle m'échappe totalement."
 lmf_feast.1001.t:0 "Festin familial : Acrimonie"
 lmf_feast.1001.desc.opening:0 "En cette belle soirée, la famille s'est réunie dans la grande salle de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], profitant de mets succulents et de quelques boissons fort plaisantes. Malheureusement, la douceur des victuailles n'a pas réussi à dissiper l'aigreur ambiante, et ce festin a rapidement tourné au vinaigre.\n\nSans la moindre semonce, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_rival_2'))] a commencé à batailler avec "
 lmf_feast.1001.desc.relation:0 "s[family_rival_2.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_rival_1'))], [family_rival_1.GetFirstNameNoTooltip]."
 lmf_feast.1001.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_rival_1'))]"
 lmf_feast.1001.desc.mid:0 "\n\nEt quelle est l'origine de cette estrivance ? Je ne puis en être certain[ROOT.Char.Custom('FR_E')], mais [family_rival_2.Custom2('dinner_rival_reason', SCOPE.sC('family_rival_1'))]\n\nLe ton qui n'a eu de cesse de monter a fini par abscondre toute autre forme de musicalité familiale, jusqu'à ce que finalement, [family_rival_2.GetFirstNameNoTooltip] "
 lmf_feast.1001.desc.child.male:0 "bondisse sur [family_rival_1.GetFirstNameTooltip], armé[family_rival_2.Custom('FR_E')] de toute sa fougue juvénile.\n\n"
 lmf_feast.1001.desc.child.female:0 "bondisse sur [family_rival_1.GetFirstNameTooltip], lui griffant le visage comme une diablesse.\n\n"
 lmf_feast.1001.desc.combatant:0 "se lève brusquement, dégainant sa lame.\n\n"
 lmf_feast.1001.desc.noncombatant:0 "se lève et [family_rival_1.Custom('FR_LeLa')] [Select_CString(family_rival_2.IsFemale,'gifle','cogne')].\n\n"
 lmf_feast.1001.desc.bystander:0 "Avant que je le ne réalise, la situation s'est par trop envenimée."
 lmf_feast.1001.desc.intervene:0 "Lorsque je m'apprête à intervenir, je réalise que c'est déjà trop tard."
 lmf_feast.1001.desc.end:0 "Le reste de la famille intervient pour les séparer, et [family_rival_1.GetFirstNameNoTooltip] sort en trombe de la salle,"
 lmf_feast.1001.desc.friends:0 "arguant que leur amitié n'est déjà plus."
 lmf_feast.1001.desc.notfriends:0 "augurant la naissance d'une rivalité grandissante."
 lmf_feast.1001.a:0 "S'en est assez pour ce soir !"
 rival_family_dinner:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] devenu[CHARACTER.Custom('FR_E')] rival[CHARACTER.Custom('FR_E')] avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] après quelques violents échanges durant un festin."
 rival_family_dinner_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] devenu[CHARACTER.Custom('FR_E')] rival[CHARACTER.Custom('FR_E')] avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] après quelques violents échanges durant un festin."
 dinner_rival_root_reason_murderer:0 "« Meurtre », voilà le mot lourd de conséquences qui n'a de cesse d'accompagner chacune de ses phrases."
 dinner_rival_root_reason_att_murder:0 "[ROOT.Char.Custom('FR_IlElle')|U] n'a de cesse de rabâcher cette soi-disant tentative de meurtre de ma part. Non mais franchement, qui pourrait croire une telle chose ? C'est d'un grotesque."
 dinner_rival_root_reason_slept_spouse:0 "Meurtri[ROOT.Char.Custom('FR_E')] par l'infidélité et accablé[ROOT.Char.Custom('FR_E')] par l'idée d'avoir en face d[ROOT.Char.Custom('FR_EluiElle')] la personne responsable d'une telle contumélie."
 dinner_rival_root_reason_unfaithful:0 "[ROOT.Char.Custom('FR_IlElle')|U] ne parle point sans ambages, mais je comprends aisément que son aigreur a pour cible mon infidélité."
 dinner_rival_root_reason_imprison:0 "Son séjour dans mes geôles ne l'aura rendu que plus am[ROOT.Char.Custom('FR_ErEre')]."
 dinner_rival_root_reason_att_imprison:0 "Rancuni[ROOT.Char.Custom('FR_ErEre')] de caractère, [ROOT.Char.Custom('FR_IlElle')] n'a de cesse de ressasser ma tentative de [ROOT.Char.Custom('FR_LeLa')] mettre aux fers."
 dinner_rival_root_reason_execution:0 "Son amertume lui vient de cette fameuse exécution. Un jugement #italic expéditif#! selon ses termes, #bold adéquat#! selon les miens."
 dinner_rival_root_reason_torture:0 "[ROOT.Char.Custom('FR_IlElle')|U] n'a de cesse de geindre à propos des tortures qu'[ROOT.Char.Custom('FR_IlElle')] a endurées, mais ce sont ses jacasseries la véritable torture à l'heure actuelle."
 dinner_rival_root_reason_blind:0 "La perte de sa vue a semble-t-il enhardi sa langue."
 dinner_rival_root_reason_castrate:0 "La perte de sa virilité lui est visiblement restée en travers de la gorge. La fameuse #italic douleur fantôme#! qui met son âme au supplice."
 dinner_rival_reason_root_potential_rival:0 "Oserais-je feindre la surprise ? Certes non. Cela couvait depuis quelques lunes déjà, et j'en avais pleinement conscience."
 dinner_rival_reason_root_disinherit:0 "Comme de bien entendu, le sujet de son déshéritement est encore une fois revenu sur le tapis."
 dinner_rival_reason_root_unknown:0 "Et pourquoi donc ? Peu me chaut en fait. Ce ne sont que des fadaises après tout."
 lmf_feast.1002.desc:0 "J'ai une certaine dilection pour ce genre de repas, du moins quand ils sont aussi paisibles et enjoués que celui-ci. Réunies dans la grande salle, nous festoyons en famille, tandis que [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nMais la joie est de courte durée lorsque [family_rival.GetFirstNameNoTooltip] m'apostrophe avec soudaineté et querelle en tête.\n\n[family_rival.Custom2('dinner_rival_root_reason', ROOT.Char )] M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_rival'))] n'en démord pas, et le ton en devient plus haut et les remarques plus acerbes. Dans l'ire verbale qui s'ensuit, quelques noms d'oiseaux s'échappent, dont un « [family_rival.Custom('InsultNoun')] », après quoi, le reste de la famille se décide à intervenir, mais peut-être est-il déjà trop tard, car les mots, comme les flèches, une fois décochés ne saurait être rappelés."
 lmf_feast.1002.a:0 "Ah, la famille…"
 self_rival_family_dinner:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] devenu[CHARACTER.Custom('FR_E')] rival[CHARACTER.Custom('FR_E')] avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] après quelques violents échanges durant un festin."
 self_rival_family_dinner_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'êtes','est')] devenu[TARGET_CHARACTER.Custom('FR_E')] rival[TARGET_CHARACTER.Custom('FR_E')] avec [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] après quelques violents échanges durant un festin."
 lmf_feast.1003.t:0 "Festin familial : Réconciliation"
 lmf_feast.1003.desc.opening:0 "La grande salle de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] baigne dans une lumière aussi chaleureuse que l'est l'ambiance de notre petite réunion familiale. Dans le marasme qui ponctue la vie d'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l], entre les intrigues politiques et les déboires de la parentèle, ces fugaces accalmies sont à chérir sans honte.\n\nJe les apprécie d'autant plus que je remarque [family_rival_1.GetFirstName] et [family_rival_2.GetFirstName], d'ordinaire si [Select_CString(And(family_rival_1.IsFemale, family_rival_2.IsFemale), 'promptes', 'prompts')] à chercher querelle, [Select_CString(And(family_rival_1.IsFemale, family_rival_2.IsFemale), 'occupées', 'occupés')] en cette soirée à ripailler sans animosité aucune.\n\nPlus que partager un repas, [family_rival_1.Custom2('FR_IlsElles', SCOPE.sC('family_rival_2'))] partagent également quelques menues plaisanteries, et lorsque j'entends m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_rival_1'))] glousser avec "
 lmf_feast.1003.desc.relation:0 "s[family_rival_1.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_rival_2'))], "
 lmf_feast.1003.desc.norelation:0 "m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_rival_2'))], "
 lmf_feast.1003.desc.child:0 "j'en viens à me demander si leur rivalité est enfin arrivée à son terme."
 lmf_feast.1003.desc.end:0 "j'en viens à me demander si je devrais intervenir pour aider à mettre un terme à leur rivalité."
 lmf_feast.1003.a:0 "Les mésententes doivent cesser, pour le bien de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip]."
 lmf_feast.1003.a.convince.tt:0 "La hache de guerre est enfin enterrée"
 lmf_feast.1003.a.fail.tt:0 "Votre intervention dessert votre intention"
 lmf_feast.1003.b:0 "Certaines semaisons requièrent plus de patience que de diligence."
 lmf_feast.1003.c:0 "J'ai bon espoir que leur réconciliation soit simple affaire de temps."
 lmf_feast.1003.b.makeup.tt:0 "Leurs différends semblent enfin mis de côté"
 lmf_feast.1003.b.nomakeup.tt:0 "Leur bonne entente ne survivra pas au-delà de cette soirée"
 lmf_feast.1004.desc:0 "La grande salle de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] baigne dans une lumière aussi chaleureuse que l'est l'ambiance de notre petite réunion familiale. Dans le marasme qui ponctue la vie d'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l], entre les intrigues politiques et les déboires de la parentèle, ces fugaces accalmies sont à chérir sans honte.\n\nJe les apprécie d'autant plus que [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival'))] et moi-même, d'ordinaire [Select_CString(And(family_rival.IsFemale, ROOT.Char.IsFemale), 'promptes', 'prompts')] à chercher querelle, parvenons à ripailler sans animosité aucune.\n\nLa douceur des mets a sans doute aidé à mettre de l'eau dans notre vin, mais en cette soirée je ressens une certaine forme d'aisance naturelle à échanger avec m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_rival'))]. Lorsqu'[family_rival.Custom('FR_IlElle')] glousse à l'une de mes plaisanteries, j'en viens à me demander si ce repas pourrait nourrir la fin de notre estrivance."
 lmf_feast.1004.a:0 "Cessons ces querelles intestines, pour le bien de la Maison [ROOT.Char.GetHouse.GetNameNoTooltip]."
 lmf_feast.1004.a.success.tt:0 "La hache de guerre est enfin enterrée"
 lmf_feast.1004.a.failure.tt:0 "Votre intervention dessert votre intention"
 lmf_feast.1004.b:0 "Je veux juste profiter de cette soirée avec les miens."
 lmf_feast.1005.t:0 "Festin familial : Deuil"
 lmf_feast.1005.desc.start:0 "La flamme des bougies chancèle comme autant d'âmes en peine, et les ombres mourantes qu'elles projettent témoignent de l'obscurité qui a frappé la Maison [ROOT.Char.GetHouse.GetNameNoTooltip].\n\nLa #italic disparition#! récente de m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('dead_relative'))] a laissé un vide dans nos cœurs."
 lmf_feast.1005.desc.miscarriage.start:0 "La flamme des bougies chancèle comme autant d'âmes en peine, et les ombres mourantes qu'elles projettent témoignent de l'obscurité qui a frappé la Maison [ROOT.Char.GetHouse.GetNameNoTooltip].\n\nLa #italic disparition#! de m[ROOT.Char.Custom('FR_OnA')] [dead_child.Custom('GetDaughterSon')] mort-né[ROOT.Char.Custom('FR_E')] a laissé un vide dans nos cœurs."
 lmf_feast.1005.desc.miscarriage:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dead_relative'))|U] ne souffle point mot, mais le chagrin que je lis sur son visage en dit bien assez.\n\nLe funèbre silence trône à la table comme le roi sur ses sujets, mais après un règne incontesté, quelques paroles sont échangées. D'abord discrètes, elles finissent par raviver quelques flammes intérieures, et au son des gentillesses, le repas — comme la vie — continue.\n\nLorsque le festin prend fin, je vois une lueur ravivée, et la main de [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('dead_relative'))] qui est discrètement jointe à la mienne en devient plus que chaleureuse. C'est lorsque les noirs nuages de la vie aubent à l'horizon qu'on réalise qu'un instant passé avec la famille, aussi fugace soit-il, peut faire rayonner une nouvelle force."
 lmf_feast.1005.desc.old:0 "Le funèbre silence trône à la table comme le roi sur ses sujets, mais après un règne incontesté, quelques paroles sont échangées.\n\nL'époque des vertes années de [dead_relative.GetFirstNameNoTooltip] était depuis longtemps révolue, ainsi, malgré le chagrin qu'[dead_relative.Custom('FR_IlElle')] nous a légué, nous pouvons au moins nous consoler par l'idée que sa mort soit survenue après une vie riche et dûment remplie. Le présent est submergé de souvenirs passés, les plus réconfortants ayant la préséance sur les moins enjoués, et alors que le repas se poursuit au son des récits de son existence, c'est comme [dead_relative.Custom('FR_SilSielle')] était à nouveau parmi nous — au moins pour nous accompagner le temps de notre deuil."
 lmf_feast.1005.desc.adult:0 "Le funèbre silence trône à la table comme le roi sur ses sujets, mais après un règne incontesté, quelques paroles sont échangées.\n\nChacun y va de son bon mot, de sa belle parole, pour raviver un instant la présence de [dead_relative.GetFirstNameNoTooltip] parmi les siens. Les mines meurtries s'éclaircissent au son des gentillesses. Les ombres se dissipent, et un feu nouveau brûle, effaçant le chagrin pour laisser naître quelques rayons de réconfort."
 lmf_feast.1005.desc.child:0 "Le funèbre silence trône à la table comme le roi sur ses sujets, mais après un règne incontesté, quelques paroles sont échangées.\n\n[dead_relative.GetFirstNameNoTooltip] était si jeune, [dead_relative.Custom('FR_IlElle')] n'avait encore rien connu de ce monde avant qu'on ne nous l'arrache. Cependant, l'aspect si fugace et fragile de la vie nous fait prendre conscience de l'importance de chaque instant présent. D'une certaine manière, [dead_relative.Custom('FR_IlElle')] continue d'être avec les siens, au travers des liens qui nous unissent. Cette pensée nous offre un réconfort, maigre, mais réconfort néanmoins."
 lmf_feast.1005.desc.baby:0 "Le funèbre silence trône à la table comme le roi sur ses sujets, mais après un règne incontesté, quelques paroles sont échangées.\n\n[dead_relative.GetFirstNameNoTooltip] venait tout juste d'arriver dans ce monde, et [dead_relative.Custom('FR_IlElle')] en a été injustement retiré. [dead_relative.Custom('FR_IlElle')|U] était l'innocence même, ce qui ajoute au chagrin de sa perte, de l'incompréhension, voire de la colère. Tant d'émotions qui peuvent devenir des chancres pour l'âme, des fléaux pour l'esprit, et c'est pourquoi partager cet instant avec des proches nous aide. Ce qu'un vide crée, une présence peut le combler."
 lmf_feast.1005.a:0 "Puisse [ROOT.Char.GetFaith.DeathDeityName] veiller sur [dead_relative.Custom('FR_LuiElle')]."
 lmf_feast.1005.b:0 "Son souvenir survivra aux dégâts du temps."
 lmf_feast.1005.c:0 "Puisse [ROOT.Char.GetFaith.DeathDeityName] veiller sur [dead_relative.Custom('FR_LuiElle')]."
 lmf_feast.1006.t:0 "Festin familial : Esclandre"
 lmf_feast.1006.desc:0 "La famille s'est réunie dans la grande salle de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], et alors que j'avais escompté une musicalité festive pour accompagner le repas, c'est finalement au son d'une cacophonie informe que je #italic profite#! des mets.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_1'))|U] [dinner_neg_family_1.Custom('dinner_activity_neg_past')].\n\nTandis que [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_2'))] [dinner_neg_family_2.Custom('dinner_activity_neg_past')].\n\nPendant ce temps, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_3'))] [dinner_neg_family_3.Custom('dinner_activity_neg_past')].\n\nExcédé[ROOT.Char.Custom('FR_E')] par ce tapage sans fin, je tape du poing, me lève et élève ma voix pour décocher un assourdissant : « #bold SILENCE !#! » Du moins, c'est ainsi que cela sonnait dans ma tête, mais la colère montante a peut-être quelque peu déformé mon propos. Je sors en trombe dans l'instant."
 lmf_feast.1006.a:0 "Qu'on m'accorde un instant de répit !"
 lmf_feast.1007.t:0 "Festin familial : Concorde"
 lmf_feast.1007.desc:0 "Il est des moments où on en vient à oublier les intrigues de Cour et les complots politiques, des moments où les conversations ne nous semblent plus cacher de sombres secrets et de sordides desseins, des moments où ce ne sont que des membres d'une même famille qui conversent de façon tout à fait ordinaire. J'aime ce genre de moments.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_1'))|U] [dinner_pos_family_1.Custom('dinner_activity_pos_past')].\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_2'))|U] [dinner_pos_family_2.Custom('dinner_activity_pos_past')].\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_3'))|U] [dinner_pos_family_3.Custom('dinner_activity_pos_past')].\n\nJe ne le réalise pas sur l'instant, mais je souris devant ce spectacle empreint de gaieté et de félicité. Après avoir profité de maintes victuailles, je ne puis faire autrement que de me lever et de servir aux miens un beau discours, comme ultime mignardise pour clôturer le repas."
 lmf_feast.1007.a:0 "À la Maison [ROOT.Char.GetHouse.GetNameNoTooltip] !"
 lmf_feast.1008.t:0 "Festin familial : Convivialité"
 lmf_feast.1008.desc.start:0 "Les bougies dansent au gré des rires et des chants de notre famille, réunie dans la grande salle de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pour festoyer, ripailler et s'amuser.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nLorsque l'ambiance est à son comble, je remarque [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_friend_1'))] qui semble s'entendre à merveille avec "
 lmf_feast.1008.desc.relation:0 "s[family_friend_1.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_friend_2'))], [family_friend_2.Custom('FR_le_Char_Pi')][family_friend_2.GetTitledFirstNameNoTooltip]."
 lmf_feast.1008.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend_2'))]."
 lmf_feast.1008.desc.child:0 "Leur fougue juvénile les entraînant d'un bout à l'autre de la salle, [Select_CString(And(family_friend_1.IsFemale, family_friend_2.IsFemale), 'elles', 'ils')] s'adonnent à faire ce que les enfants savent faire le mieux, jouer et s'amuser sans discontinuer.\n\n"
 lmf_feast.1008.desc.twomen:0 "L'un et l'autre se gaussant de tout et d'un rien, beuglant à tue-tête au rythme des percussions de leurs coupes sur la table, alors que l'alcool se déverse sur un sol que les domestiques devront éponger une fois leur beuverie achevée.\n\n"
 lmf_feast.1008.desc.twowomen:0 "D'ici je n'entends pas leurs messes basses, mais à voir leurs mines réjouies et les rictus enjoués, je comprends que plus que des mots, elles échangent de la bonne humeur.\n\n"
 lmf_feast.1008.desc.mixed:0 "Leur proximité purement platonique leur donne tout loisir de converser et s'amuser, tissant un lien qui se renforce à chaque nouvel échange, chaque nouveau sourire.\n\n"
 lmf_feast.1008.desc.end:0 "Les grandes histoires ont souvent des débuts modestes, alors une belle amitié peut bien naître d'un simple repas de famille."
 lmf_feast.1008.a:0 "Oui-da, levons nos coupes et réjouissons-nous !"
 lmf_feast.1009.desc.start:0 "Les bougies dansent au gré des rires et des chants de notre famille, réunie dans la grande salle de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pour festoyer, ripailler et s'amuser.\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nMoi-même je me découvre un[family_friend.Custom('FR_E')] [Select_CString(family_friend.IsFemale,'compagne','compagnon')] de frairie en la personne de [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend'))]."
 lmf_feast.1009.desc.child:0 "La salle de banquet se transforme rapidement en terrain de jeu, et l'éclat de nos rires papillonne de droite à gauche, précédant un chaos festif.\n\n"
 lmf_feast.1009.desc.adult:0 "La musicalité du festin change de rythme quand nos rires deviennent plus réguliers et nos échanges verbeux plus enthousiastes.\n\n"
 lmf_feast.1009.desc.end:0 "Les grandes histoires ont souvent des débuts modestes, alors une belle amitié peut bien naître d'un simple repas de famille."
 lmf_feast.1009.a:0 "Oui-da ! À notre amitié nouvelle !"
 lmf_feast.1009.b:0 "Je crois que l'alcool commence à me monter à la tête..."
 lmf_feast.1010.t:0 "Festin familial : Désaccointance"
 lmf_feast.1010.desc.start:0 "Quelque chose se glisse le long de ma nuque, comme une brise glaciale qui me fait l'effet d'un mauvais augure. Je comprends qu'il s'agit d'un frisson d'appréhension lorsque je remarque l'ambiance de discordance qui s'est installée à la table.\n\nD'un côté je vois [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))] qui [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nDe l'autre je remarque [family_friend_1.GetFirstName] et [family_friend_2.GetFirstName] qui ne soufflent point mot.\n\nPlus que [Select_CString(And(family_friend_1.IsFemale, family_friend_2.IsFemale), 'silencieuses', 'silencieux')], m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_friend_1'))] et "
 lmf_feast.1010.desc.relation:0 "s[family_friend_1.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_friend_2'))] "
 lmf_feast.1010.desc.norelation:0 "m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_friend_2'))] "
 lmf_feast.1010.desc.end:0 "d'ordinaire inséparables, sont [Select_CString(And(family_friend_1.IsFemale, family_friend_2.IsFemale), 'installées', 'installés')] à des extrémités opposées de la table. Pour peu que leurs regards se croisent, j'y vois des yeux d'indifférence.\n\nAinsi l'ambiance morose de ce repas sied à la mort d'une amitié."
 lmf_feast.1010.a:0 "C'est fort regrettable."
 lmf_feast.1011.desc:0 "Quelque chose se glisse le long de ma nuque, comme une brise glaciale qui me fait l'effet d'un mauvais augure. Je comprends qu'il s'agit d'un frisson d'appréhension lorsque je remarque l'ambiance de discordance qui s'est installée à la table.\n\nD'un côté je vois [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))] qui [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nDe l'autre je remarque [family_friend.GetFirstName] qui semble m'éviter. Quelque chose a changé. M[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_friend'))], avec qui habituellement je m'entends si bien, détourne le regard comme [family_friend.Custom('FR_SilSielle')] désavouait notre amitié. Les sourires ne sont plus, et les rires se sont tus. Qu'ai-je donc fait pour devenir un[ROOT.Char.Custom('FR_E')] étrang[ROOT.Char.Custom('FR_ErEre')] à ses yeux ?"
 lmf_feast.1011.a:0 "Je peine à comprendre ce qui a changé…"
 lmf_feast.1012.t:0 "Festin familial : Confidence"
 lmf_feast.1012.desc.start:0 "Le repas de ce soir s'est déroulé comme il sied à une réunion familiale. Des rires suaves, des échanges goûteux, et du bon alcool pour faire passer le tout. La soirée aurait pu se terminer aussi simplement qu'elle avait commencé, mais lorsque [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('tattler'))] est venu[tattler.Custom('FR_E')] me parler, j'ai su qu'elle allait prendre une tournure plus #italic intrigante#!.\n\n"
 lmf_feast.1012.desc.child:0 "Du haut de ses jeunes années, je doute qu'[tattler.Custom('FR_IlElle')] comprenne les implications de ce qu'[tattler.Custom('FR_IlElle')] partage avec moi. Cette candeur dans ses yeux me pousse à penser qu'[tattler.Custom('FR_IlElle')] a simplement entendu "
 lmf_feast.1012.desc.adult:0 "À sa façon d'aborder le sujet, de partager avec moi ce qu'[tattler.Custom('FR_IlElle')] sait, je doute qu'[tattler.Custom('FR_IlElle')] comprenne toutes les implications que cela peut avoir. De son point de vue, [tattler.Custom('FR_IlElle')] a simplement entendu "
 lmf_feast.1012.desc.relation:0 "s[tattler.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_secret'))] "
 lmf_feast.1012.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_secret'))] "
 lmf_feast.1012.desc.child2:0 "chuchoter quelques mots, et qu'[tattler.Custom('FR_IlElle')] m'en fait part car c'est pour [tattler.Custom('FR_LuiElle')] un simple jeu.\n\n"
 lmf_feast.1012.desc.temperate:0 "deviser, et ayant trouvé le sujet… troublant, [tattler.Custom('FR_IlElle')] a choisi de m'en faire part.\n\n"
 lmf_feast.1012.desc.drunk:0 "discutailler, et après #italic quelques#! gorgées d'alcool, a choisi de m'en faire part.\n\n"
 lmf_feast.1012.desc.end:0 "[tattler.GetFirstNameNoTooltip] ne l'a pas réalisé, mais le secret qu'[tattler.Custom('FR_IlElle')] m'a confié malgré [tattler.Custom('FR_LuiElle')] à propos de m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_secret'))] pourrait s'avérer très utile."
 lmf_feast.1012.a:0 "Oui, très utile…"
 lmf_feast.1013.t:0 "Festin familial : Attirance"
 lmf_feast.1013.start:0 "Au milieu de l'effervescence d'une vie de [ROOT.Char.GetTitleAsNameNoTooltip], notre petit repas familial de ce soir est d'une banalité plus qu'appréciable. Néanmoins, si l'ambiance peut être qualifiée de chaleureuse, elle en va jusqu'à devenir un poil #italic sulfureuse#! pour deux des convives.\n\nEntre deux échanges verbeux, je remarque une attitude quelque peu étrange de la part de [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_lover_1'))]. [family_lover_1.Custom('FR_IlElle')|U] n'a de cesse de #italic lorgner#! du côté de "
 lmf_feast.1013.desc.relation:0 "s[family_lover_1.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_lover_2'))], [family_lover_2.Custom('FR_le_Char_Pi')][family_lover_2.GetTitledFirstName]"
 lmf_feast.1013.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_lover_2'))]"
 lmf_feast.1013.end:0 ", qui feint de ne rien remarquer. Lorsque finalement [family_lover_1.GetFirstNameNoTooltip] invoque une excuse quelconque pour quitter la salle, [family_lover_1.Custom('FR_IlElle')] est suivi de près par [family_lover_2.GetFirstNameNoTooltip].\n\nCes échanges de regard n'étaient pas anodins, je le sais, et à mon tour, je les suis. À la faveur de la pénombre, ils s'imaginent à l'abri des regards, mais l'étreinte passionnelle dans laquelle je les trouve a confirmé mes suspicions…"
 lmf_feast.1013.a:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_lover_1'))] et m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_lover_2'))]… #bold ensemble ?#!"
 lmf_feast.1014.t:0 "Festin familial : Brutalité"
 lmf_feast.1014.start:0 "La tempête qui gronde dans la salle en ferait presque souffler les délicates flammèches qui l'éclairent.\n\nDes esclandres suivis de vociférations, si le tonnerre gronde à l'extérieur, nul ici ne saurait l'entendre. [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))|U] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nLa tension s'enracinant de part et d'autres, une véhémence soudaine a fini par en germer. [family_duel_starter.GetFirstName] bataillant avec [family_duel_target.GetFirstName], d'abord par le verbe, puis, à la surprise de tous, par le fer. M[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_duel_starter'))] dégaine ainsi une lame et se jette sur "
 lmf_feast.1014.desc.relation:0 "s[family_duel_starter.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_duel_target'))]."
 lmf_feast.1014.desc.norelation:0 "m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_duel_target'))]."
 lmf_feast.1014.end:0 "\n\nLa salle en perdit ses mots, laissant la stupeur s'exprimer tandis que le sang s'écoule sur le sol."
 lmf_feast.1014.a:0 "Que tout le monde recule !"
 lmf_feast.1014.b:0 "I guess this is when they fight?"
 lmf_feast.1014.a.start.kill.tt:0 "[family_duel_target.GetFirstNameNoTooltip] est tué[family_duel_target.Custom('FR_E')] par [family_duel_starter.GetFirstNameNoTooltip] durant le duel"
 lmf_feast.1014.a.start.win.tt:0 "[family_duel_starter.GetFirstNameNoTooltip] remporte le duel"
 lmf_feast.1014.a.target.win.tt:0 "[family_duel_target.GetFirstNameNoTooltip] remporte le duel"
 lmf_feast.1014.a.target.kill.tt:0 "[family_duel_starter.GetFirstNameNoTooltip] est tué[family_duel_starter.Custom('FR_E')] par [family_duel_target.GetFirstNameNoTooltip] durant le duel"
 family_feast_duel:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'vous êtes', 'se sont')] [Select_CString(And(TARGET_CHARACTER.IsFemale, CHARACTER.IsFemale), 'affrontées', 'affrontés')] en duel lors d'un festin familial."
 lmf_feast.1014.c:0 "Que [family_duel_starter.GetFirstNameNoTooltip] aille réfréner ses ardeurs dans une cellule !"
 lmf_feast.1015.t:0 "Festin familial : Béatitude"
 lmf_feast.1015.desc.start:0 "Un festin comme celui-ci me fait l'effet d'un avant-goût de ce que pourrait être [ROOT.Char.GetFaith.PositiveAfterLife]. Entre la convivialité et la bonne entente, chaque bouchée, chaque gorgée, est un délice renouvelé.\n\n"
 lmf_feast.1015.desc.newborn:0 "Le repas terminé et la table débarrassée, une servante s'approche, portant dans ses bras [Select_CString(show_child.IsFemale,'ma toute-petite','mon tout-petit')] [show_child.GetFirstName]. Ses petits petons et ses menues mimines gesticulant au son de ma voix tandis que [family_spouse.GetFirstName] l'étreint tendrement. Lorsque nos yeux se croisent, c'est plus qu'un regard qui est échangé, tout comme c'est bien plus qu'un instant que nous partageons. Une existence entière de bonheur semble s'écouler, et sans nul besoin de mot, nous savons ce que l'autre pense :\n\n#italic Ce petit bébé est le fruit de notre amour — la chair de notre chair.#!"
 lmf_feast.1015.desc.smallchild:0 "Le repas terminé et la table débarrassée, une servante s'approche, amenant [show_child.Custom('FR_LeLa')] jeune [show_child.GetFirstName] pour venir nous souhaiter bonne nuit. Enthousiasmé[show_child.Custom('FR_E')] par la présence de la famille, [show_child.Custom('FR_IlElle')] commence à nous faire profiter de sa fougue juvénile. Au gré de ses mots et de ses gestes, [family_spouse.GetFirstName] et moi rions, notre regard échangé témoignant de notre sentiment commun :\n\n#italic C'est notre [show_child.Custom('GirlBoy')], notre famille.#!"
 lmf_feast.1015.desc.youngchild:0 "Le repas terminé et la table débarrassée, [show_child.GetFirstName] laisse éclater sa fougue juvénile et nous abreuve d'un spectacle enfantin, avec danse et chanson. Le rire de [family_spouse.GetFirstName] rayonne à travers la pièce, et j'en suis fort aise. Lorsque nos regards se croisent, même un instant aussi fugace soit-il, nous lisons [Select_CString(And(ROOT.Char.IsFemale, family_spouse.IsFemale), 'chacune', 'chacun')] dans le cœur de l'autre :\n\n#italic C'est notre enfant, notre famille.#!"
 lmf_feast.1015.desc.stillgotit:0 "Le repas terminé et la table débarrassée, [family_spouse.GetFirstName] s'approche de moi alors que nous baignons dans un plaisir festif et familial, mais dans les yeux qu'[family_spouse.Custom('FR_IlElle')] m'adresse j'y vois une toute autre sorte de plaisir auquel [family_spouse.Custom('FR_IlElle')] souhaite se livrer. Lorsque sa bouche est si proche de moi que son souffle me caresse la peau, je sens l'invitation de son corps et le désir de sa chair, tandis que son regard me susurre :\n\n#italic La soirée n'est pas terminée pour nous deux.#!"
 lmf_feast.1015.desc.chaste:0 "Le repas terminé et la table débarrassée, [family_spouse.GetFirstName] s'approche de moi alors que nous baignons dans un plaisir festif et familial. Ses yeux se plongent dans les miens, son souffle délicat se heurtant à ma peau. Je lève ma coupe et enjoint le reste de notre famille à en faire autant, tandis que le regard de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_spouse'))] témoigne d'une joie qui puis se résumer en quelques mots :\n\n#italic C'est notre famille et j'en suis heureu[ROOT.Char.Custom('FR_XSe')].#!"
 lmf_feast.1015.a:0 "Oh, [family_spouse.GetFirstNameNoTooltip], m[family_spouse.Custom('FR_OnA')] [family_spouse.Custom('RomanticComplimentAdjective')] [family_spouse.GetFirstNameNoTooltip]…"
 friend_family_feast:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(TARGET_CHARACTER.IsLocalPlayer, CHARACTER.IsLocalPlayer), 'vous êtes', 'se sont')] [Select_CString(And(TARGET_CHARACTER.IsFemale, CHARACTER.IsFemale), 'rapprochées', 'rapprochés')] durant un chaleureux festin familial."
 lmf_feast.1016.t:0 "Festin familial : Dédain"
 lmf_feast.1016.desc.start:0 "Le festin n'avait même pas encore commencé que l'animosité était déjà la première convive installée à la table. Après quelques heures écoulées et quelques coupes vidées, les seules choses échangées avec [family_spouse.GetFirstName] furent des regards noirs et des paroles âpres.\n\nFinalement, ce qui avait couvé tout au long du repas fini par éclore sur le tard — "
 lmf_feast.1016.desc.object.to.me:0 "[family_spouse.Custom('FR_IlElle')] me jette un regard, de ceux qu'on lance à quelqu'un pour qui on a dédain et dégoût."
 lmf_feast.1016.desc.object.to.me.sodomy:0 "« Avec un autre homme ?! » éructe-t-[family_spouse.Custom('FR_IlElle')], avec la prouesse de faire contenir tant de mépris en si peu de mots.\n\n"
 lmf_feast.1016.desc.object.to.me.incest:0 "« Avec votre propre famille ?! » éructe-t-[family_spouse.Custom('FR_IlElle')], avec la prouesse de faire contenir tant de mépris en si peu de mots.\n\n"
 lmf_feast.1016.desc.object.to.me.secret.sodomy:0 "« Avec un autre homme ?! » éructe-t-[family_spouse.Custom('FR_IlElle')], avec la prouesse de faire contenir tant de mépris en si peu de mots, ne daignant pas s'atteler à s'étendre en détail.\n\n"
 lmf_feast.1016.desc.object.to.me.secret.incest:0 "« Avec votre propre famille ?! » éructe-t-[family_spouse.Custom('FR_IlElle')], avec la prouesse de faire contenir tant de mépris en si peu de mots, ne daignant pas s'atteler à s'étendre en détail.\n\n"
 lmf_feast.1016.desc.object.to.me.deviant:0 "« Je sais quel genre [Select_CString(ROOT.Char.IsFemale,'de femme','d’homme')] vous êtes ! » éructe-t-[family_spouse.Custom('FR_IlElle')], avec la prouesse de faire contenir tant de mépris en si peu de mots.\n\n"
 lmf_feast.1016.desc.object.to.me.secret.deviant:0 "« Je sais quel genre [Select_CString(ROOT.Char.IsFemale,'de femme','d’homme')] vous êtes ! » éructe-t-[family_spouse.Custom('FR_IlElle')], avec la prouesse de faire contenir tant de mépris en si peu de mots, ne daignant pas s'étendre en détail.\n\n"
 lmf_feast.1016.desc.object.to.them:0 "je ne puis réfréner davantage le dédain que j'ai pour [family_spouse.Custom('FR_LuiElle')]. "
 lmf_feast.1016.desc.object.to.them.sodomy:0 "« Avec un autre homme ?! » j'éructe alors.\n\n"
 lmf_feast.1016.desc.object.to.them.incest:0 "« Avec votre propre famille ?! » j'éructe alors.\n\n"
 lmf_feast.1016.desc.object.to.them.secret.sodomy:0 "« Avec un autre homme ?! » j'éructe alors, perçant à travers ses secrets.\n\n"
 lmf_feast.1016.desc.object.to.them.secret.incest:0 "« Avec votre propre famille ?! » j'éructe alors, perçant à travers ses secrets.\n\n"
 lmf_feast.1016.desc.object.to.them.deviant:0 "« Je sais quel genre [Select_CString(family_spouse.IsFemale,'de femme','d’homme')] vous êtes ! » j'éructe alors.\n\n"
 lmf_feast.1016.desc.object.to.them.secret.deviant:0 "« Je sais quel genre [Select_CString(family_spouse.IsFemale,'de femme','d’homme')] vous êtes ! » j'éructe alors, perçant à travers ses secrets.\n\n"
 lmf_feast.1016.desc.betrayed:0 "ses yeux iridescents reflètent tantôt la fureur, tantôt le dégoût, et cela n'est sûrement pas étranger à l'affront que j'ai commis contre nos vœux de mariage. Il est évident qu'[family_spouse.Custom('FR_IlElle')] n'en démordra pas.\n\n"
 lmf_feast.1016.desc.they.betrayed:0 "son contact me répugne autant que sa vue. De savoir… de savoir qu'[family_spouse.Custom('FR_IlElle')] a osé souiller nos vœux de mariage… Comment pourrais-je oublier un tel affront, un tel camouflet ?\n\n"
 lmf_feast.1016.desc.they.secret.lover:0 "son contact me répugne autant que sa vue. Avoir cette image… cette image [Select_CString(family_spouse.IsFemale,'d’elle','de lui')]… forniquant avec [suspected_lover.Custom('FR_le_Char_Pi')][suspected_lover.GetTitledFirstName]… je ne sais pas si l'envie de vomir est plus forte que celle de hurler !\n\n"
 lmf_feast.1016.desc.secret.lover:0 "ses yeux iridescents reflètent tantôt la fureur, tantôt le dégoût, et cela n'est sûrement pas étranger à l'affront que j'ai commis. « [suspected_lover.Custom('FR_le_Char_Pi')|U][suspected_lover.GetTitledFirstName] ! » éructe-t-[family_spouse.Custom('FR_IlElle')]. Aucun autre mot n'est prononcé, mais c'est plus que suffisant.\n\n"
 lmf_feast.1016.desc.rivalry:0 "chaque mot est source de moquerie, chaque geste, de dédain. Si l'animosité était déjà bien présente entre nous depuis quelque temps, celle-ci s'est largement envenimée, empoisonnant nos esprits.\n\n"
 lmf_feast.1016.desc.end:0 "La montée progressive de la tension finit par éclater dans un déferlement de cris et de vociférations. Le reste de la famille regarde, horrifié, une joute devenue boucherie. Finalement, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_spouse'))] sort de la salle, exsudant une ire qu'aucune bienséance ne saurait minorer."
 lmf_feast.1016.a:0 "#EMP Foutredieu !#!"
 nemesis_family_feast:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] devenu[CHARACTER.Custom('FR_E')] [TARGET_CHARACTER.LocalPlayerString('votre ', 'l’')]ennemi[CHARACTER.Custom('FR_E')] juré[CHARACTER.Custom('FR_E')][TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] après une violente dispute lors d'un festin familial."
 nemesis_family_feast_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'êtes','est')] devenu[TARGET_CHARACTER.Custom('FR_E')] [CHARACTER.LocalPlayerString('votre ', 'l’')]ennemi[TARGET_CHARACTER.Custom('FR_E')] juré[TARGET_CHARACTER.Custom('FR_E')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] après une violente dispute lors d'un festin familial."
 rival_family_feast:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] eu une violente querelle avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] à propos de [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'votre', 'leur')] mariage lors d'un festin familial."
 rival_family_feast_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] eu une violente querelle avec [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] à propos de [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'votre', 'leur')] mariage lors d'un festin familial."
 lmf_feast.1017.t:0 "Festin familial : Infortune"
 lmf_feast.1017.desc.start:0 "Jusque-là, notre petite réunion familiale organisée à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] a été marquée par la plaisance.\n\nTandis que [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))] [dinner_pos_family.Custom('dinner_activity_pos_past')], je me prépare à attaquer à une nouvelle bouchée de cet onctueux plat devant moi, quand soudainement un[ROOT.Char.Custom('FR_EOpp')] domestique accoure en panique pour m'informer que [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_accident'))] "
 lmf_feast.1017.desc.fire:0 "a subi de graves brûlures du fait d'un incendie dans les cuisines."
 lmf_feast.1017.desc.stairs:0 "a fait une chute dans les escaliers."
 lmf_feast.1017.desc.window:0 "est tombé[family_accident.Custom('FR_E')] du haut d'une fenêtre."
 lmf_feast.1017.desc.fall:0 "a fait une terrible chute dans la cour extérieure."
 lmf_feast.1017.desc.trample:0 "a été piétiné[family_accident.Custom('FR_E')] dans la cour extérieure par un animal devenu fou furieux."
 lmf_feast.1017.desc.accident:0 "s'est grièvement blessé[family_accident.Custom('FR_E')] dans la cour extérieure, pouvant à peine raconter ce qui s'est passé."
 lmf_feast.1017.desc.end:0 "\n\nL'infortune ayant choisi de s'inviter à notre repas et l'inquiétude faisant mauvaise hôte, je clos la soirée, renvoyant tout le monde dans leurs appartements pour me précipiter au chevet [family_accident.Custom('FR_DuDela')] malheureu[family_accident.Custom('FR_XSe')]."
 lmf_feast.1017.a:0 "Espérons qu'il y ait plus de peur que de mal."
 lmf_feast.1017.injured.tt:0 "[family_accident.GetFirstNameNoTooltip] s'est blessé[family_accident.Custom('FR_E')] !"
 lmf_feast.1018.t:0 "Festin familial : Souffrance"
 lmf_feast.1018.desc.start:0 "Que voilà un bien beau repas familial. Les mets sont plaisants, les convives amusants.\n\nOn rit, on s'égosille, on festoie, mais l'effervescence festive cesse subitement quand quelqu'un "
 lmf_feast.1018.desc.child:0 "remarque que [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_sick'))] est bien trop taiseu[family_sick.Custom('FR_XSe')]. En effet, m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_sick'))] est d'un blême a faire pâlir un mort, et avant que je ne puisse m'enquérir de son état, [family_sick.Custom('FR_IlElle')] tombe à terre."
 lmf_feast.1018.desc.adult:0 "se met à crier pour faire remarquer que [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_sick'))] a vomi dans son assiette. L'hypothèse d'un excès d'alcool est rapidement balayé au profit d'une frayeur qui puise sa source dans quelque chose de bien plus grave. M[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_sick'))] est d'un blême a faire pâlir un mort, symptôme auquel vient s'ajouter des tremblements et une froideur au toucher anormale."
 lmf_feast.1018.desc.end:0 "\n\nD'un ordre foudroyant, je fais quérir les domestiques qui s'empressent de l'emmener, tandis que tout le monde est congédié dans ses appartements. Quel que soit le mal dont [family_sick.Custom('FR_IlElle')] souffre, je dois éviter que cela se propage. Pour le moment, impossible de se prononcer, ni sur la cause, ni sur la gravité de cette maladie."
 lmf_feast.1018.a:0 "Puisse [ROOT.Char.GetFaith.HealthGodName] veiller sur [family_sick.Custom('FR_LuiElle')] !"
 lmf_feast.1019.t:0 "Festin familial : Quiétude"
 lmf_feast.1019.desc.opening:0 "Une fois n'est pas coutume, ma famille est réunie dans la grande salle de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], "
 lmf_feast.1019.desc.atwar:0 "ignorant les nouvelles sur la guerre qui gronde au loin, le temps de festoyer paisiblement durant une soirée.\n\n"
 lmf_feast.1019.desc.nowar:0 "festoyant dans un havre de paix relatif.\n\n"
 lmf_feast.1019.desc.end:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))|U] [dinner_neg_family.Custom('dinner_activity_neg_past')].\n\nCe mélange entre concordance et discordance illustre bien les liens qui régissent au sein d'une maison, d'un foyer. Tension et entente, familiarité et animosité, le repas souffle le chaud et le froid, mais nous sommes tous réunis, n'est-ce pas là une douce pensée ?"
 lmf_feast.1019.a:0 "Puisse [ROOT.Char.GetFaith.FertilityGodName] nous bénir tous autant que nous sommes !"
 lmf_feast.1019.b:0 "Hélas, la paix est chose éphémère..."
 lmf_feast.1019.c:0 "C'est leur rareté qui rend ces moments si précieux."
 lmf_feast.1019.d:0 "Appréciable, mais bien ennuyeux à dire vrai…"
 lmf_feast.1019.e:0 "Il me tarde de retourner sur le champ de bataille..."
 lmf_feast.1019.f:0 "Tous ces dégoisements… que quelqu'un me sorte de là."
 lmf_feast.1019.g:0 "Quoi qu'on en dise, la solitude a ses bons côtés..."
 lmf_feast.1019.h:0 "Le plus important dans un repas, c'est encore de ripailler !"
 lmf_feast.1019.i:0 "Peu me chaut, tant que la boisson coule à flot…"
 lmf_feast.1019.j:0 "Assurons-nous que le temps n'érode jamais ce souvenir."
 lmf_feast.1020.t:0 "Festin familial : Espoir"
 lmf_feast.1020.desc.start:0 "Le festin de ce soir est animé, comme il sied à une réunion familiale, mais pour dire le vrai, c'est un membre de la famille en particulier qui suscite les regards et attise les conversations.\n\nTout le monde n'a d'yeux que pour [family_spouse.GetFirstName], et si la proéminence de son ventre n'enlève rien à sa grâce naturelle, les traits de son faciès, marqués par la fatigue, lui donnent un aspect égrotant, que nul ici ne pourra bien évidemment lui reprocher. La maternité est son ordalie, mais elle y fait face sans faiblir, et parvient à faire bonne figure. Lorsque le repas prend fin, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_spouse'))] m'adresse une œillade, et plus qu'un regard, je trouve dans ses yeux une tendresse sincère.\n\n"
 lmf_feast.1020.desc.resolution:0 "« Quel que soit le grief qui nous sépare, ch[ROOT.Char.Custom('FR_ErEre')] [family_spouse.Custom2('LMF_RelationToMeShort', ROOT.Char )], dit-elle, par égard pour l'enfant à venir, nous devrions l'enterrer. »\n\nElle n'attend pas de moi une réponse immédiate, ni peut-être même de réponse tout court. Elle fait simplement signe pour quérir quelques caméristes afin de l'accompagner jusque dans ses appartements. Je reste pantois[ROOT.Char.Custom('FR_E')], me demandant si c'est bien la [family_spouse.GetFirstNameNoTooltip] que je connais. Dans mon mutisme, j'en viens aussi à me demander si elle n'aurait pas fait là une remarque pertinente…"
 lmf_feast.1020.desc.love:0 "« Mon cœur brûle pour vous, ch[ROOT.Char.Custom('FR_ErEre')] [family_spouse.Custom2('LMF_RelationToMeShort', ROOT.Char )], dit-elle avec une spontanéité certaine. Lors de nos épousailles j'étais encore dans l'incertitude, mais finalement je suis bien-aise que nous l'ayons fait. »\n\nJ'aimerais lui offrir plus qu'un sourire en réponse à sa déclaration, mais les mots me font défaut, et je me contente de la regarder quérir les caméristes qui l'accompagnent  jusqu'à ses appartements, la chaleur de sa flamme déclarée me réchauffant plus qu'aucun âtre."
 lmf_feast.1020.desc.possibility:0 "« Lors de nos épousailles j'étais encore dans l'incertitude, dit-elle subitement. Je pensais que ce ne serait qu'un mariage d'intérêt, je n'avais pas envisagé que les sentiments viendraient s'en mêler. Aujourd'hui je l'envisage. Et vous, ch[ROOT.Char.Custom('FR_ErEre')] [family_spouse.Custom2('LMF_RelationToMeShort', ROOT.Char )] ? »\n\nElle n'attend pas de moi une réponse immédiate, ni peut-être même de réponse tout court. Elle fait simplement signe pour quérir quelques caméristes afin de l'accompagner jusque dans ses appartements, me laissant dans un mutisme propice à la réflexion."
 lmf_feast.1020.desc.fallback:0 "« J'espère que l'enfant vous plaira, » dit-elle. Lorsque je lui réponds qu'il ne pourrait en être autrement, elle rayonne alors de fierté. « J'en suis ravie, ch[ROOT.Char.Custom('FR_ErEre')] [family_spouse.Custom2('LMF_RelationToMeShort', ROOT.Char )], » conclut-elle avant de quérir quelques caméristes afin de l'accompagner jusque dans ses appartements.\n\nComment pourrais-je ne serait-ce qu'espérer cacher le sourire qui se dessine sur mes lèvres ?"
 lmf_feast.1020.a:0 "Pour le bien de l'enfant, cessons les querelles intestines."
 lmf_feast.1020.b:0 "[family_spouse.GetFirstNameNoTooltip], m[family_spouse.Custom('FR_OnA')] [family_spouse.Custom('ComplimentAdjective')] [family_spouse.GetFirstNameNoTooltip]..."
 lmf_feast.1020.c:0 "J'entrevois un fugace rayon de soleil pour nous."
 lmf_feast.1020.d:0 "Cela ne lui ressemble guère… Serait-ce la grossesse qui lui joue des tours ?"
 lmf_feast.1020.e:0 "Qu'elle flagorne tant qu'elle le souhaite…"
 lmf_feast.1020.f:0 "Ce n'est qu'un sursaut d'émotion passager, rien de plus."
 lmf_feast.1021.t:0 "Festin familial : Camaraderie"
 lmf_feast.1021.desc.start:0 "Le festin de ce soir est d'un calme inhabituel, mais ce n'est pas pour me déplaire en fait. C'est là l'occasion de raffermir mes liens avec [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend'))].\n\nÀ en juger par la cire consommée des bougies et les sièges qui se sont vidés, les heures ont passé, mais [Select_CString(And(ROOT.Char.IsFemale, family_friend.IsFemale), 'transportées', 'transportés')] au gré de nos récits, ni moi ni [family_friend.Custom('FR_LuiElle')] n'y avons prêté attention. J'ai évoqué quelques desseins que j'ai pour [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], et j'ai pu apprécier l'obligeance qu'[family_friend.Custom('FR_IlElle')] m'a témoignée. Lorsqu'[family_friend.Custom('FR_IlElle')] eut pris la parole, [family_friend.Custom('FR_IlElle')] "
 lmf_feast.1021.desc.spouse:0 "m'a confié les troubles en tout genre qu'a connus sa vie conjugale."
 lmf_feast.1021.desc.ruler:0 "m'a fait part des dernières doléances qu'[family_friend.Custom('FR_IlElle')] a été amené à traiter en tant que [family_friend.GetTitleAsNameNoTooltip]."
 lmf_feast.1021.desc.court:0 "m'a rapporté quelques déboires rencontrés durant ses fonctions de [family_friend.Custom('GetCouncilOrCourtPosition')|l]."
 lmf_feast.1021.desc.courtier:0 "m'a parlé de ses diverses péripéties au sein de la Cour, des événements si bénins que je n'en entends guère parler."
 lmf_feast.1021.desc.end:0 "\n\nAprès moult mots échangés, nous voilà les derniers dans la grande salle, les dernières bougies encore vivaces pour seuls témoins de notre accointance — n'ayons pas peur des mots : notre amitié. [family_friend.GetFirstNameNoTooltip] s'excuse de son excès de bavardage, mais à dire vrai, il n'y a rien à pardonner, car tout le temps passé en sa compagnie ne peut pas être un mal."
 lmf_feast.1021.a:0 "Reprenez donc une coupe [ROOT.Char.Custom('RegionalAlcoholicDrink')], ch[family_friend.Custom('FR_ErEre')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend'))]."
 lmf_feast.1022.t:0 "Festin familial : Rivalité"
 lmf_feast.1022.desc:0 "Le festin qui se tient à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] aurait pu être agréable, oui aurait pu, mais cette éventualité se serait vu confirmé s'il n'y avait pas eu [Select_CString(family_rival.IsFemale,'cette diablesse','ce diable')] de [family_rival.GetFirstName]. La peste soit m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_rival'))] et son obstination à #italic me faire grâce#! de sa présence. Et pourquoi diantre ? Me contrarier, dirait quelques bonnes gens — m'emmerder objecterais-je alors.\n\nJ'en veux pour preuve son dessein en cette soirée de ne cesser de jacasser, toujours en messe basse, toujours à demi-mot. Des formules détournées, du phrasé calculé, privilégiant l'implicite pour me railler, pour se gausser, sans pouvoir être accusé. La finesse des premiers instants laisse place à de l'aigreur balourde à mesure que sa coupe se vide.\n\nFinalement, c'est la mienne de coupe qui en fini pleine. Je me lève, d'un bond furieux, et fustige, d'un doigt effréné. « #bold Dehors !#! » Le tonnerre lui-même n'oserait gronder après cela, mais m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_rival'))] feint l'innocence, ou l'ignorance. Cela suffit à ébranler mes derniers bris de patience, et je quitte la salle, réfléchissant à l'idée séduisante de bannir c[family_rival.Custom('FR_EEtte')] [family_rival.Custom('InsultNoun')] de ma cour."
 lmf_feast.1022.a:0 "Par [ROOT.Char.GetFaith.NegativeAfterLife], [family_rival.Custom('FR_SilSielle')] n'était pas de la famille, je…"
 lmf_feast.1023.t:0 "Festin familial : Éloge"
 lmf_feast.1023.desc:0 "Le festin avait commencé dans un calme anodin, puis finalement, de fil en aiguille, les conversations ont commencé, et je ne sais comment, on fini par tourner autour de m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('dead_relative'))], [dead_relative.Custom('FR_le_Char_Pi')][dead_relative.GetTitledFirstName] qui nous a quitté il y a maintenant plusieurs années.\n\nAu son des souvenirs évoqués, quelques rictus amusés se sont dessinés, quelques yeux se sont humidifiés, et cela jusqu'à ce que [family_toaster.GetFirstName] finisse par se lever, marquant son interruption par une déclaration enjouée mais néanmoins solennelle : « Je lève ma coupe ! [dead_relative.Custom('FR_au_Char_Pi')|U][dead_relative.GetTitledFirstName] ! Puisse [family_toaster.GetFaith.DeathDeityName] veiller sur [dead_relative.Custom('FR_LuiElle')] [family_toaster.GetFaith.PositiveAfterLife2] ! »\n\nDes paroles fortes qui incitent tout le monde à [family_toaster.Custom('FR_LeLa')] suivre dans son geste."
 lmf_feast.1023.a:0 "[dead_relative.Custom('FR_au_Char_Pi')|U][dead_relative.GetTitledFirstNameNoTooltip] !"
 lmf_feast.1024.t:0 "Festin familial : Mal du pays"
 lmf_feast.1024.desc.start:0 "La grande salle de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] est animé au son des bruyances festives, la famille ripaillant et battelant, comme tous et toutes le feraient durant un tel festin. De fait, la seule ombre au tableau se trouve être [family_hostage.Custom('FR_le_Char_Pi')][family_hostage.GetTitledFirstName], dont l'absence de sourire contraste avec le reste des convives.\n\nJe puis néanmoins comprendre que cela doit être difficile pour [family_hostage.Custom('FR_LuiElle')], "
 lmf_feast.1024.desc.language.none:0 "étant la seule personne ici présente à parler [family_hostage.GetCulture.GetLanguage.GetNameNoTooltip|l].\n\n"
 lmf_feast.1024.desc.language.one:0 "ne parlant pas [ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip|l] et n'ayant personne d'autre avec qui parler que [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_hostage_common'))].\n\n"
 lmf_feast.1024.desc.religion.none:0 "étant la seule personne ici à suivre les us de la foi [family_hostage.GetFaith.GetAdjectiveNoTooltip].\n\n"
 lmf_feast.1024.desc.religion.one:0 "étant la seule personne ici, à l'exception de [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_hostage_common'))], à suivre les us de la foi [family_hostage.GetFaith.GetAdjectiveNoTooltip].\n\n"
 lmf_feast.1024.desc.culture.none:0 "étant la seule personne ici à suivre les us de la culture [family_hostage.GetCulture.GetNameNoTooltip]."
 lmf_feast.1024.desc.culture.one:0 "étant la seule personne ici, à l'exception de [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_hostage_common'))], à suivre les us de la culture [family_hostage.GetCulture.GetNameNoTooltip].\n\n"
 lmf_feast.1024.desc.end:0 "Si aucune règle n'oblige à se préoccuper du confort d'un otage, la bienséance voudrait que l'hôte s'assure que son invité soit à son aise."
 lmf_feast.1024.a:0 "Je vais m'assurer qu'[family_hostage.Custom('FR_IlElle')] se sente comme chez [family_hostage.Custom('FR_LuiElle')]."
 lmf_feast.1024.b:0 "Une chance que ce ne soit pas mon #italic invité[family_hostage.Custom('FR_E')]#! dans ce cas."
 lmf_feast.1025.t:0 "Festin familial : Tutelle"
 lmf_feast.1025.desc.start:0 "Ma foi, les cuisiniers se sont surpassés ce soir. La boustifaille est d'un délice frappant, au contraire des conversations qui elles, restent d'une monotonie ronflante. Pourtant, [family_ward.GetFirstName] semble voir sa curiosité piquer au vif par les délibérations de "
 lmf_feast.1025.desc.relation:0 "s[family_ward.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_example'))]. "
 lmf_feast.1025.desc.norelation:0 "m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_example'))]. "
 lmf_feast.1025.desc.mid:0 "La fascination qui se lit sur son visage attise ma propre curiosité, et j'en viens à prêter l'oreille pour savoir de quoi il en retourne.\n\n"
 lmf_feast.1025.desc.diplomacy:0 "Il y est question d'affaires diplomatiques délicates, de pourparlers concernant un pays étranger aux ramifications politiques complexes."
 lmf_feast.1025.desc.intrigue:0 "Il y est question d'affaires politiques subtiles et d'imbroglios abscons, le tout formulé de façon si détournée que cela rendrait les propos confus pour n'importe quel profane."
 lmf_feast.1025.desc.martial:0 "Il y est question d'anciennes batailles durant lesquelles se sont illustrées des tactiques et des stratégies retorses — insaisissables pour qui n'a pas l'expertise adéquate."
 lmf_feast.1025.desc.learning:0 "Il y est question d'épistémologie, de dialectique, de gnoséologie et d'un tas d'autres notions aux dénominations savamment choisies."
 lmf_feast.1025.desc.stewardship:0 "Il y est question d'affaires administratives concernant [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] avec tout le jargon approprié à un tel registre."
 lmf_feast.1025.desc.end:0 "\n\nJe doute fortement qu'[family_ward.Custom('FR_IlElle')] y comprenne quoi que ce soit, et ma supposition se conforme lorsqu'[family_ward.Custom('FR_IlElle')] tourne la tête, espérant trouver en moi quelques réponses à ses interrogations, comme il est attendu de [ROOT.Char.Custom('FR_CeluiCelle')] qui est en charge de sa tutelle."
 lmf_feast.1025.a:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_ward'))], ouvrez grand vos esgourdes..."
 lmf_feast.1025.a.success:0 "Grâce à vos explications, [family_ward.GetFirstNameNoTooltip] en apprend beaucoup ce qui bénéficie grandement à son [education_focus|El]."
 lmf_feast.1025.a.success.tt:0 "Une tutelle efficace"
 lmf_feast.1025.a.success2.tt:0 "[family_ward.GetFirstNameNoTooltip] bénéficie de leçons très utiles pour son [education_focus|El]."
 lmf_feast.1025.a.fail:0 "Qu'importe ses efforts, [family_ward.GetFirstNameNoTooltip] ne comprends pas un traître mot de vos explications."
 lmf_feast.1025.a.fail.tt:0 "Une tutelle infructueuse"
 lmf_feast.1025.a.botch:0 "[family_ward.GetFirstNameNoTooltip] comprends tout de travers, ce qui nuit grandement à son [education_focus|El]."
 lmf_feast.1025.a.botch.tt:0 "Une tutelle catastrophique"
 lmf_feast.1025.a.botch2.tt:0 "L'[education_focus|El] de [family_ward.GetFirstNameNoTooltip] souffre grandement de vos leçons."
 lmf_feast.1025.b:0 "Ne puis-je donc trouver la paix le temps d'un repas ?"
 lmf_feast.1026.t:0 "Festin familial : Prédication"
 lmf_feast.1026.desc.start:0 "Cette soirée marquée par la monotonie, est semble-t-il propice selon [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_religious'))] à délivrer un bien pesant sermon, prêchant la bonne parole de la foi [family_religious.GetFaith.GetAdjectiveNoTooltip] aux oreilles de toute la famille.\n\n"
 lmf_feast.1026.desc.zealous:0 "J'esgourde avec grande attention, "
 lmf_feast.1026.desc.cynical:0 "Vaille que vaille, j'endure la chose, non sans me priver de lever les yeux au ciel sur les passages les plus grotesques, "
 lmf_feast.1026.desc.nozeal:0 "J'écoute, d'une attention moindre que ne le laisse suggérer mon visage, "
 lmf_feast.1026.desc.impatient:0 "mais la patience n'étant pas mon fort, cela devient très vite un supplice.\n\n"
 lmf_feast.1026.desc.patient:0 "ma nature patiente devenant une forteresse dans laquelle je m'abrite tandis que la torpeur s'empare des uns et des autres.\n\n"
 lmf_feast.1026.desc.family:0 "tandis que j'en vois certains aller puiser du courage au fond de leur coupe quand d'autres ont déjà cédé à l'étreinte de la léthargie.\n\n"
 lmf_feast.1026.desc.loved:0 "Pourtant, [family_religious.Custom('FR_IlElle')] semble tout de même avoir réussi à gagner l'oreille — et le cœur — d'un membre de la famille : "
 lmf_feast.1026.desc.relation:0 "s[family_religious.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_react'))], [family_react.Custom('FR_le_Char_Pi')][family_react.GetTitledFirstName],"
 lmf_feast.1026.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_react'))],"
 lmf_feast.1026.desc.loved2:0 "qui fait grand cas d'encourager l'oraison au-delà du raisonnable.\n\nLorsque la soirée fini par s'achever, de nombreux sièges sont déjà vides, mais [family_religious.GetFirstNameNoTooltip] et [family_react.GetFirstNameNoTooltip] sont encore à ergoter à propos [family_religious.GetFaith.HighGodNamePossessive] dans un débat théologique."
 lmf_feast.1026.desc.hated:0 "Comme attendu, quelqu'un a fini exaspéré par cet interminable laïus : "
 lmf_feast.1026.desc.hated2:0 "qui serre les dents depuis le premier mot prononcé, et fini par troquer le mutisme stoïque pour de l'agitation verbale.\n\nL'oraison interminable s'éteint finalement, et l'orée d'une joute théologique entre [family_religious.GetFirstNameNoTooltip] et [family_react.GetFirstNameNoTooltip] aube une soirée encore plus longue, au grand dam du reste des convives."
 lmf_feast.1026.desc.default:0 "Cela dure un certain moment — j'ai tout le loisir de compter le nombre de coupes et de sièges se vider à mesure que les bougies se font plus petites. [family_religious.GetFirstNameNoTooltip] fait preuve d'entrain, mais lorsque la fougue lui fait défaut, l'oraison s'éteint et avec elle la soirée. C'était là une belle démonstration d'endurance, qu'il me faut applaudir, mais j'espère en être épargné[ROOT.Char.Custom('FR_E')] pour les prochaines réunions familiales."
 lmf_feast.1026.a:0 "Rappelez-moi de ne pas inviter [family_religious.GetFirstNameNoTooltip] la prochaine fois…"
 loved_family_feast_sermon:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] a été conquis[CHARACTER.Custom('FR_E')] par le sermon [TARGET_CHARACTER.Custom('FR_du_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] sur la foi [TARGET_CHARACTER.GetFaith.GetAdjectiveNoTooltip] lors d'un festin familial."
 loved_family_feast_sermon_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] a été conquis[TARGET_CHARACTER.Custom('FR_E')] par le sermon [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUIName] sur la foi [CHARACTER.GetFaith.GetAdjectiveNoTooltip] lors d'un festin familial."
 hated_family_feast_sermon:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] a dédaigné le sermon [TARGET_CHARACTER.Custom('FR_du_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] sur la foi [TARGET_CHARACTER.GetFaith.GetAdjectiveNoTooltip] lors d'un festin familial."
 hated_family_feast_sermon_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] a dédaigné le sermon [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUIName] sur la foi [CHARACTER.GetFaith.GetAdjectiveNoTooltip] lors d'un festin familial."
 lmf_feast.1027.t:0 "Festin familial : Récréation"
 lmf_feast.1027.desc.start:0 "La réunion familiale de ce soir est banale au possible. Les gens se regardent dans le blanc des yeux, échangent quelques mots, se remplissent le gossier, rien de bien folichon en somme.\n\nDu moins, ça l'était jusqu'à ce que [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_entertainer'))] se décide à sauver l'assemblée d'un ennui certain. [family_entertainer.Custom('FR_IlElle')|U] bondit sur la table et "
 lmf_feast.1027.desc.poet:0 "se met à déclamer des vers issus de la poésie [family_entertainer.GetCulture.GetNameNoTooltip].\n\nMais ce n'est point de la simple poésie en fait, c'est une aventure à laquelle m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_entertainer'))] nous convie à participer. Le moindre mot devient dans sa bouche un océan de merveilles. Les rimes, l'intonation, la gestuelle, tout participe à donner vie à ce qui n'est sur le papier que quelques caractères d'encre. Personne ici présent ne reste indifférent aux couplets, comme en témoignent les yeux humides et les faciès enjoués.\n\n"
 lmf_feast.1027.desc.bard:0 "nous fait profiter de ses talents en matière de musique.\n\nL'ambiance de la salle en est immédiatement métamorphosée. Les visages, l'instant d'avant mornes et sans vie, irradient d'une plaisance vivifiée tandis que les flammes des bougies semblent presque danser de concert avec les notes et les paroles. Pieds et mains battent la mesure en rythme alors que m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('family_entertainer'))] enchaîne chanson sur chanson sans discontinuer.\n\n"
 lmf_feast.1027.desc.end:0 "Finalement, la soirée se termine, et affirmer qu'elle était plaisante serait un euphémisme, voire même une insulte visant à en minorer la vérité. Le silence qui s'installe juste après la prestation incroyable de [family_entertainer.GetFirstNameNoTooltip] ne dure guère, car un tonnerre d'applaudissement mille fois mérité résonne dans la pièce…\n\n...et résonnera encore longtemps dans les cœurs comme le souvenir d'une magnifique frairie familiale."
 lmf_feast.1027.a:0 "Oui-da ! À notre famille !"
 lmf_feast.1028.t:0 "Festin familial : Conversation"
 lmf_feast.1028.desc.start:0 "Voici le genre de charmante soirée qu'il est avisé d'apprécier.\n\nD'abord, [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))] [dinner_pos_family.Custom('dinner_activity_pos_past')].\n\nVoilà qu'ensuite, j'entame une conversation avec [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_expert'))]. "
 lmf_feast.1028.desc.diplomat:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] aborde des affaires diplomatiques, m'apportant ses sages conseils sur comment entretenir de bonnes relations à travers [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], narrant les récits de moults pourparlers ayant mal tourné durant les siècles précédents comme autant de cas d'école desquelles il me faut tirer des enseignements.\n\n"
 lmf_feast.1028.desc.family_first:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] s'étend en belles paroles à propos de la famille. Le sujet, bien que tout indiqué pour une telle réunion, m'a paru trivial sur le moment, mais la perspective avec laquelle [family_expert.Custom('FR_IlElle')] l'a abordé m'a derechef fait changer d'avis. Je redécouvre ainsi une notion que je croyais acquise et je me surprends à réfléchir à tout un tas de choses qui pourraient nous aider à resserrer les liens.\n\n"
 lmf_feast.1028.desc.august:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] évoque l'aspect diplomatique de la gouvernance, sur les liens intrinsèques qui existent entre un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] et ses vassaux, contant l'histoire d'empires de jadis dont il est primordial d'apprendre des erreurs et des réussites. [family_expert.Custom('FR_IlElle')|U] traite de tout cela avec une telle perspicacité que cela en devient fascinant.\n\n"
 lmf_feast.1028.desc.strategist:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] devise à propos de grandes batailles, celles marquées par de monumentales erreurs, ou dont l'issue a été renversée en un éclair par une prise de décision prompte et avisée. J'avais déjà eu vent de ces histoires, mais l'entendre de sa bouche en ravive le souvenir et en démultiplie l'intérêt tant [family_expert.Custom('FR_IlElle')] maîtrise le sujet.\n\n"
 lmf_feast.1028.desc.overseer:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] s'étale sur les bienfaits d'un bon ravitaillement en temps de guerre, sur l'intérêt de bien superviser les denrées, les réserves, les acheminements. C'est étrange à dire, mais je n'aurais pas cru qu'un tel sujet puisse devenir aussi haletant à écouter, et je me surprends à vouloir en savoir plus.\n\n"
 lmf_feast.1028.desc.gallant:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] me narre des récits de chevalerie romanesque et de romance chevaleresque. D'ordinaire, je pourrais trouver ça sottement niais, mais [family_expert.Custom('FR_IlElle')] emploie les mots avec une telle justesse que cela sonne à mes oreilles comme une légende épique, et il devient alors nettement plus plaisant d'entendre des histoires sur les vertus de la galanterie.\n\n"
 lmf_feast.1028.desc.architect:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] m'abreuve, que dis-je, me noie dans un jargon qu'[family_expert.Custom('FR_IlElle')] maîtrise avec précision. #italic Archivolte#! et #italic chambranle#! et #italic contrescarpe#! se succèdent dans des phrases qui n'ont que peu d'attrait à la première écoute, mais qui finissent par devenir captivantes et ouvrent les portes à tout un tas d'interrogations auxquelles [family_expert.Custom('FR_IlElle')] se fait un plaisir de répondre.\n\n"
 lmf_feast.1028.desc.administrator:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] aborde le sujet de l'administration d'un pays, m'avisant sur les meilleures décisions à prendre pour gérer comme il se doit [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]. Cela n'est probablement pas le sujet de conversation le plus pertinent pour une réunion familiale, mais à dire vrai, je me suis surpris[ROOT.Char.Custom('FR_E')] à écouter avec grande attention chacune de ses suggestions, toutes mûrement réfléchies.\n\n"
 lmf_feast.1028.desc.avaricious:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] disserte à outrance sur l'or. Comment en gagner — le plus possible — comment bien le dépenser — le moins possible — et je me rappelle subitement qu'effectivement, [family_expert.Custom('FR_IlElle')] est connu pour être un[family_expert.Custom('FR_E')] véritable grippe-sou. J'étais sceptique au début, d'écouter les élucubrations de quelqu'un à propos de sa passion pour les pièces de monnaie, mais finalement je réalise que c'est une étrange fatalité que d'éprouver tant de peur et de doute pour de si petites choses.\n\n"
 lmf_feast.1028.desc.schemer:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] zieute à droite à gauche, avant de commencer à chuchoter sur quelques desseins dont il a eu vent. La discussion, d'abord intrigante, devient subitement captivante quand elle se transforme en dédale dans lequel [family_expert.Custom('FR_IlElle')] prend plaisir à me perdre, et moi je suis fort aise d'essayer d'en connaître les moindres recoins. Je réalise l'esprit retors qu'[family_expert.Custom('FR_IlElle')] possède et son accointance pour les complots.\n\n"
 lmf_feast.1028.desc.seducer:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] commence à discourir sur ses conquêtes. Non de celles que l'on obtient sur un champ de bataille, mais plutôt dans une couche. Si en premier lieu je m'imagine qu'[family_expert.Custom('FR_IlElle')] me raconte tout cela, sans se gêner pour s'étendre sur les détails les plus salaces, pour en tirer une quelconque fierté, je finis par comprendre qu'[family_expert.Custom('FR_IlElle')] y a des enseignements à en tirer.\n\n"
 lmf_feast.1028.desc.torturer:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] commence à parler de choses sordides, de choses que le commun des gens pourrait qualifier d'immorales. Je ne trouvais pas cela approprié pour une réunion familiale, mais l'entendre ainsi pérorer sur les avantages qu'il peut y avoir à employer des moyens drastiques pour #italic arracher#! la vérité — mais pas que — à des prisonniers, finit par éveiller une curiosité morbide.\n\n"
 lmf_feast.1028.desc.whole_of_body:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] me fait tout un cours sur le corps humain. M'expliquant certaines choses sur les maladies, les infections, les humeurs. Comment se prémunir des épidémies, comment garder le contrôle sur la santé de son esprit. Finalement, ce que j'avais supputé n'être qu'un enchaînement de propos ronflants s'avère à la fois distrayant et pédagogique.\n\n"
 lmf_feast.1028.desc.scholar:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] dégoise sur divers sujets savants, mais [family_expert.Custom('FR_IlElle')] le fait avec cette petite étincelle dans les yeux qui transforme des mots arides et fastidieux en un vivier de connaissances où l'on peut étancher sa soif de savoir. En quelques échanges j'en apprends tellement sur l'histoire, les cultures, la philosophie.\n\n"
 lmf_feast.1028.desc.theologian:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))] me parle de toutes sortes de choses liées à la foi [family_expert.GetFaith.GetAdjective]. [family_expert.Custom('FR_IlElle')|U] palabre sur [family_expert.GetFaith.HighGodName], [family_expert.Custom('FR_IlElle')] devise sur [family_expert.GetFaith.KnowledgeGodName]. Tout cela aurait pu sonner comme un cours de théologie ronflant, mais la justesse de ses propos a fini par séduire mon intérêt.\n\n"
 lmf_feast.1028.desc.end:0 "Captivé[ROOT.Char.Custom('FR_E')] par ses propos, je réalise tardivement que la soirée est terminée. Les convives ont pour la plupart déjà quitté la table, eux qui se sont rassasiés de mets onctueux et abreuvés de boissons exquises, tandis que moi, non moins en reste, j'ai pu étancher ma soif de connaissance et mon goût pour la bonne conversation. [family_expert.GetFirstNameNoTooltip] fait remarquer qu'il a par trop ergoté, ce que je réfute dans l'instant."
 lmf_feast.1028.a:0 "N'ayez nulle crainte, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_expert'))], c'était très instructif."
 good_family_feast_conversation:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] beaucoup appris durant une conversation avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] lors d'un festin familial."
 good_family_feast_conversation_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] beaucoup appris durant une conversation avec [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] lors d'un festin familial."
 lmf_feast.1029.t:0 "Festin familial : Avanie"
 lmf_feast.1029.desc.start:0 "La petite réunion familiale à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] n'est pas particulièrement festive aujourd'hui, et c'est d'autant plus inconfortable que [public_lover.GetFirstName] a choisi d'être présent[public_lover.Custom('FR_E')].\n\n"
 lmf_feast.1029.desc.notfamily:0 "Certes, je lui ai savoir qu'[public_lover.Custom('FR_IlElle')] était libre d'assister à ce genre de festin maintenant que notre relation est connue de tous, mais n'ayant aucun autre sujet de conversation, tous les regards se sont portés sur [public_lover.Custom('FR_LuiElle')].\n\n"
 lmf_feast.1029.desc.family:0 "Nonobstant qu'[public_lover.Custom('FR_IlElle')] soit de la famille, compte tenu que tout le monde est au fait de notre accointance, ne pas assister au festin de ce soir aurait peut-être été plus avisé, qui plus est car personne ne semble avoir un quelconque sujet de conversation, et que tous les regards sont donc tournés vers [public_lover.Custom('FR_LuiElle')].\n\n"
 lmf_feast.1029.desc.end:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hater'))|U], d'ailleurs, ne voit pas d'un bon œil sa présence à notre table.\n\nLes demi-mots soufflés par quelques murmures et les jeux de regards émaillés durant le repas achèvent de mettre [public_lover.GetFirstNameNoTooltip] dans un état de mésaise que je ne puis ignorer. Alors que je m'apprête à lui suggérer de partir, il lui vient l'idée saugrenue d'intervenir, non pour rasséréner la situation, mais pour l'envenimer. Commence alors une estrivance entre les deux, ponctuée de doigts furieux et de mots blessants, avant que [public_lover.GetFirstNameNoTooltip] ne décide de tourner les talons et de quitter la table.\n\nLe silence reprend ses droits derechef, et l'ambiance du festin est désormais glaciale au possible…"
 lmf_feast.1029.a:0 "Quelle chienlit..."
 lover_showed_at_family_feast:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] insulté [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] pour avoir eu l'outrecuidance de se présenter à la table d'un festin familial."
 lover_showed_at_family_feast_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] insulté [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] pour avoir eu l'outrecuidance de se présenter à la table d'un festin familial."
 lmf_feast.1030.t:0 "Festin familial : Controverse"
 lmf_feast.1030.desc:0 "Le festin est d'un calme plat, du moins il l'était. Les humeurs de la famille, à l'image du vent, ne préviennent pas lorsqu'ils tournent. [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hater'))|U] et [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_react'))] décident subitement de commencer une querelle.\n\nCela commence par une controverse quelconque dont personne ne prête attention, puis le ton monte, et cela finit en joute d'arguments — quoique joute soit peut-être un poil trop noble pour ce à quoi on assiste ; #italic bataille#! serait plus adéquat. La raison ? De ce que l'on peut comprendre de leur brouhaha, [family_react.GetFirstNameNoTooltip] a dit quelque chose à propos de la cuisine [family_hater.GetCulture.GetNameNoTooltip] qui n'a pas plus à [family_hater.GetFirstNameNoTooltip] — ou peut-être est-ce l'inverse ?\n\nLes mots finissent par laisser place aux mains, et c'est à ce moment-là que le reste de la famille intervient pour les séparer, mais trop tard, car le mal est déjà fait. Alors que les domestiques remettent un peu d'ordre dans la grande salle, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_hater'))] et m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_react'))] quant à [Select_CString(And(family_hater.IsFemale, family_react.IsFemale), 'elles', 'eux')], se sont [Select_CString(And(family_hater.IsFemale, family_react.IsFemale), 'murées', 'murés')] dans un silence glacial."
 lmf_feast.1030.a:0 "Toute cette chierie pour une histoire de mangeaille…"
 argued_over_different_culture:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] se sont [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'querellées', 'querellés')] sur des considérations culturelles lors d'un festin familial."
 lmf_feast.1031.t:0 "Festin familial : Effervescence"
 lmf_feast.1031.desc.start:0 "Un calme absolu règne à la table, laissant la famille ici réunie profiter d'un havre de quiétude, qui malheureusement n'est pas voué à durer.\n\nEn un instant, tout bascule lorsque [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_fool'))] "
 lmf_feast.1031.desc.drunkard:0 "boit une coupe de trop. La raison noyée dans l'alcool, [family_fool.Custom('FR_LeLa')] voilà gesticulant et beuglant à tout va, heurtant assiettes et domestiques sur son passage. Dans un vain effort de trouver quelques partenaires de jeu, [family_fool.Custom('FR_IlElle')] incite le reste de la famille à [family_fool.Custom('FR_LeLa')] rejoindre dans ses pitreries, mais la seule compagnie qu'[family_fool.Custom('FR_IlElle')] obtient sont des regards gênés et accusateurs.\n\nFinalement, après quelques chutes provoquant maints dégâts, l'on fini par [family_fool.Custom('FR_LeLa')] faire sortir, mais même débarrassés de c[family_fool.Custom('FR_EEtte')] soûlot[family_fool.Custom('FR_E')], ses cris furibonds s'invitent encore à la table depuis l'autre bout du [ROOT.Char.Custom('FortifiedBuilding')]."
 lmf_feast.1031.desc.hashishiyah:0 "abuse du lait de pavot. Son assuétude pour ce breuvage n'est un secret pour personne, mais ce soir [family_fool.Custom('FR_IlElle')] n'essaie même pas d'en réfréner son envie, et ce malgré les protestations des uns et des autres.\n\nD'une démarche branlante, [family_fool.Custom('FR_IlElle')] finit allongé[family_fool.Custom('FR_E')] au milieu de la bouffe et de la boisson. Plus qu'incapable, [family_fool.Custom('FR_IlElle')] est inconscient[family_fool.Custom('FR_E')], et les domestiques sont alors sommés de [family_fool.Custom('FR_LeLa')] ramener dans ses appartements sous le regard gêné du reste de la famille."
 lmf_feast.1031.desc.lunatic:0 "grimpe sur la table. Sa voix résonne dans la salle, et tout le monde s'imagine que c'est le début laborieux d'un discours excentrique, mais lorsque son comportement devient erratique, pour ne pas dire insensé, il devient évident que le problème est tout autre.\n\nLes cris précédent les sanglots qui sont suivis à nouveau par des cris. Dans ce chaos inconfortant arrive le moment où [family_fool.Custom('FR_IlElle')] se saisit d'un coutelas, et je réalise que cela va dégénérer, d'une façon ou d'une autre. Je fais quérir les gardes qui [family_fool.Custom('FR_LeLa')] ramènent dans ses appartements derechef."
 lmf_feast.1031.desc.irritable:0 "commence à chercher querelle. Arguant à tout va à mesure que ses yeux papillonnent d'un côté puis de l'autre, trouvant un motif de raillerie ou de calomnie pour tout le monde. De vieilles rancœurs exhumées, d'anciens forfaits ravivés, personne n'est épargné par la tempête d'ire acerbe qui fustige les uns et frappe les autres. En quelques phrases l'on comprend que personne ici ne trouve grâce à ses yeux.\n\nLorsqu'[family_fool.Custom('FR_IlElle')] a enfin fini de vider son sac — ou que l'imagination pour de nouvelles injures lui manquent — [family_fool.Custom('FR_IlElle')] sort en trombe et on l'entend encore s'égosiller depuis l'autre bout du [ROOT.Char.Custom('FortifiedBuilding')]."
 lmf_feast.1031.desc.depressed:0 "se met à pleurer. D'abord larmoyant[family_fool.Custom('FR_E')] dans un silence stoïque, le réconfort apporté par ceux qui l'entourent ne semble rien faire de plus qu'apporter davantage de poids à sa peine, et [family_fool.Custom('FR_LeLa')] voilà fondant en larmes avec l'attention de toute la famille tournée vers [family_fool.Custom('FR_LuiElle')].\n\nLe mal qui [family_fool.Custom('FR_LeLa')] tourmente n'est point chassé par de douces caresses ni de mielleux mots, et [family_fool.Custom('FR_IlElle')] abandonne la compagnie des siens à la faveur de la solitude, laissant dans son sillage quelques regards gênés et interrogatifs."
 lmf_feast.1031.desc.rakish:0 "décide de se donner en spectacle. Ses interventions grotesques émaillent la soirée, durant laquelle [family_fool.Custom('FR_IlElle')] s'amuse à ponctuer ses phrases de remarques grivoises, à s'enorgueillir de ses attributs à tout bout de champ, et allant jusqu'à flatter à outrance les domestiques.\n\nSon attitude éhontée lui vaut déjà des réprimandes de la part du reste de la famille, mais lorsqu'[family_fool.Custom('FR_IlElle')] a une main baladeuse de trop, je l'expulse hors de la salle devant des regards empreints d'accusation à son endroit."
 lmf_feast.1031.desc.reclusive:0 "décrète qu'[family_fool.Custom('FR_IlElle')] ne passera pas une seule seconde de plus en notre compagnie. [family_fool.Custom('FR_IlElle')|U] se lève et vocifère maintes paroles crues.\n\nAprès quelques interrogations proférées à haute voix sur la raison qui [family_fool.Custom('FR_LeLa')] pousse à assister à ces repas, [family_fool.Custom('FR_IlElle')] prend congé et quitte la salle sous une assemblée de regards choqués, retournant se réfugier dans la solitude qui lui est si chère."
 lmf_feast.1031.desc.deviant:0 "décide de se donner en spectacle. Ses interventions déplacées émaillent la soirée, durant laquelle [family_fool.Custom('FR_IlElle')] s'amuse à psalmodier des propos si scabreux et à proférer des gestes si obscènes que certains membres de la famille en sont tout simplement choqués.\n\nLe clou du spectacle arrive lorsqu'[family_fool.Custom('FR_IlElle')] grimpe sur la table pour laisser éclater sa décadence libidineuse à travers sa représentation personnelle des ébats sexuels, fustigeant pour leur pudeur l'assemblée pétrifié par la honte, avant qu'[family_fool.Custom('FR_IlElle')] ne s'empresse de quitter la salle."
 lmf_feast.1031.desc.contrite:0 "décide d'attirer l'attention de toute la salle. Personne ne dit point mot, et l'attente de savoir ce qui nous vaut cette subite intervention se fait longue avant qu'[family_fool.Custom('FR_IlElle')] décide enfin à s'exprimer.\n\nDes mains tremblantes et un regard anxieux accompagnent sa confession d'un bien pesant secret qui était devenu le chancre de son âme tourmentée. Souhaite-t-[family_fool.Custom('FR_IlElle')] obtenir notre pardon, ou celui [family_fool.GetFaith.HighGodNamePossessive] ? Personne ne le sait et personne n'a le temps de le lui demander, car sitôt son cœur soulagé, [family_fool.Custom('FR_IlElle')] s'enfuit à tire-d’aile."
 lmf_feast.1031.desc.newtrait:0 "\n\nUne telle #italic instabilité#! ne lui ressemble guère. Je gage qu'un stress excessif est la cause de tout ce #italic débordement#!. "
 lmf_feast.1031.desc.trait:0 "\n\nCette #italic instabilité#! de la part de [family_fool.GetFirstNameNoTooltip] ne date pas d'hier, mais pour agir de la sorte lors d'un dîner entre famille, c'est certainement qu'[family_fool.Custom('FR_IlElle')] souffre d'un stress excessif. "
 lmf_feast.1031.desc.end:0 "Au final, peu me chaut la raison. Le festin est gâché, et j'entendrais sûrement parler de cette histoire durant les mois à venir…"
 lmf_feast.1031.a:0 "De grâce, pourrais-je ripailler en paix ?"
 lmf_feast.1032.t:0 "Festin familial : Allégresse"
 lmf_feast.1032.desc:0 "L'ambiance en cette soirée est déjà plaisante, marquée par des visages enjoués et des échos hilares, mais les festivités s'apprêtent à s'intensifier par l'intervention de trois boute-en-train, à savoir : [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_1'))], [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_2'))] et [ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_3'))].\n\nLes musiciens sont enjoints à jouer de plus belle, mais l'invitation à la fête ne s'arrête pas là. Le trio se met à danser, appelant le reste de la famille à les rejoindre, et en un éclair l'alégresse devient le mot d'ordre de notre petite réunion familiale. Il n'est plus question de juste ripailler, mais de giguer, de frétiller au son des notes. Tout le monde, y compris les plus pudibonds, s'adonne à faire profiter l'assemblée de leur talent pour la danse, aussi inexistant soit-il.\n\nFinalement, quand la soirée se termine, personne n'est épargné par la fatigue. Les jambes sont lourdes, les bouches taiseuses, et la joie omniprésente. Le glas des festivités a depuis longtemps sonné, mais le souvenir, lui, survivra pour les mois à venir."
 lmf_feast.1032.a:0 "Le genre de soirée dont je suis fort aise."
 all_stressed_family_dinner_guests:0 "Chaque invité du festin familial"
 lmf_feast.1033.t:0 "Festin familial : Contumélie"
 lmf_feast.1033.desc.start:0 "À mon grand dam, notre petite réunion familiale de ce soir a rapidement dégénéré. Le ravissement des premiers instants s'est tu au son des paroles acerbes, laissant [ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_rival_1'))] et son épou[family_rival_2.Custom('FR_XSe')] accaparer tous les regards, aussi gênés soient-ils.\n\nCe qui avait commencé par de sombres et glacials regards a fini par échauffer les esprits, au point de faire naître quelques vociférations à travers la pièce. Les flammes des bougies chancèlent au gré d'un cri, puis d'un autre, et avec le flot d'injures qui inonde la pièce, je comprends que cette colère manifeste "
 lmf_feast.1033.desc.sodomy:0 "est dû aux accointances de [target_spouse.GetFirstName] à l'endroit d'autres hommes. Une infamie que nul autour de cette table n'ignore.\n\n"
 lmf_feast.1033.desc.incest:0 "est dû aux histoires d'incestes dont fait l'objet [target_spouse.GetFirstName]. Une infamie que nul autour de cette table n'ignore.\n\n"
 lmf_feast.1033.desc.deviant:0 "est dû aux goûts sordides de [target_spouse.GetFirstName] qui ont entaché leur lit conjugal.\n\n"
 lmf_feast.1033.desc.secretsodomy:0 "est dû aux accointances qu'aurait apparemment [target_spouse.GetFirstName] à l'endroit d'autres hommes. Une révélation qui marque notre famille de par son caractère choquant.\n\n"
 lmf_feast.1033.desc.secretincest:0 "est dû à des accusations d'incestes dont [target_spouse.GetFirstName] est la cible. Une révélation qui marque notre famille de par son caractère choquant.\n\n"
 lmf_feast.1033.desc.secretdeviant:0 "est dû à un profond dégoût pour les « déviances sexuelles » de [target_spouse.GetFirstName]. Une révélation pour le moins… dérangeante.\n\n"
 lmf_feast.1033.desc.infidelity:0 "est dû aux écarts extraconjugaux de [target_spouse.GetFirstName]. Un sujet que nul autour de cette table n'ignore.\n\n"
 lmf_feast.1033.desc.secretinfidelity:0 "est dû à une liaison qu'entretiendrait [target_spouse.GetFirstName]. Une révélation qui marque notre famille de par son caractère choquant.\n\n"
 lmf_feast.1033.desc.rival:0 "n'est rien de plus que leur haine mutuelle qui a déjà maintes fois secoué les murs. Les mêmes propos, les mêmes disputes, ressassés et rabâchés sans cesse. Un spectacle devenu familier pour tous ceux présents autour de cette table.\n\n"
 lmf_feast.1033.desc.potrival:0 "est une haine refoulée de longue date qui a longuement mijoté dans son jus avant que [angry_spouse.GetFirstNameNoTooltip] ne se décide à la faire goûter à [target_spouse.GetFirstName], laissant tous ceux présent autour de cette table s'en retrouver éclaboussés.\n\n"
 lmf_feast.1033.desc.end:0 "L'esclandre se poursuit jusqu'à ce m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('target_spouse'))] me fasse comprendre, dans ses paroles comme dans ses gestes, qu'il est temps d'intervenir. À peine le petit doigt levé, et déjà je deviens la nouvelle cible de la colère d'un[angry_spouse.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('angry_spouse'))] toujours aussi furibond[angry_spouse.Custom('FR_E')].\n\nFaute de pouvoir m'escamper, je décide de mettre fin à notre #italic charmant#! repas de famille."
 lmf_feast.1033.a:0 "J'en ai assez entendu pour ce soir."
 lmf_heir.1501.t:0 "Formation secrète"
 lmf_heir.1501.start:0 "Plongé[ROOT.Char.Custom('FR_E')] dans les nombreuses tâches quotidiennes qui requiert l'attention d'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l], je suis subitement accosté[ROOT.Char.Custom('FR_E')] par [new_educator.Custom2('MyCharacterIntroduction', ROOT.Char)] qui requiert une audience privé.\n\n« C'est à propos de votre [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('focus_child'))]. Voilà déjà plusieurs mois qu'[focus_child.Custom('FR_IlElle')] est venu[focus_child.Custom('FR_E')] me voir pour solliciter des leçons au maniement de l'épée. Je n'ai pu me résoudre à l'éconduire lorsque j'ai vu cette #italic lueur#! dans ses yeux, et maintenant je me sens coupable de faire tout cela dans votre dos. »\n\nSon regard se durcit et sa voix prend un ton autrement plus solennel. « Je discerne chez [focus_child.Custom('FR_le_Char_Pi')][focus_child.GetTitledFirstName] un grand potentiel, et sauf votre respect, l'éducation qu'[focus_child.Custom('FR_IlElle')] reçoit actuellement n'est pas son fort. "
 lmf_heir.1501.unusual:0 "Certes, il n'est point d'usage pour un[focus_child.Custom('FR_E')] [focus_child.Custom('GirlBoy')] de tirer l'épée, mais"
 lmf_heir.1501.default:0 "Vous avez très certainement d'autres plans pour [focus_child.Custom('FR_LuiElle')], mais"
 lmf_heir.1501.end:0 "avec le talent qui est le sien, je gage qu'[focus_child.Custom('FR_IlElle')] y gagnera aux changes, je puis vous en faire la promesse. »"
 lmf_heir.1500.a.tt_change:0 "L’[education_focus|El] de [focus_child.GetFirstNameNoTooltip] se change en [martial|El]"
 lmf_heir.1500.a.tt_tutor:0 "[new_diplomacy_educator.Custom('FR_le_Char_Pi')|U][new_diplomacy_educator.GetTitledFirstNameNoTooltip] donne personnellement des cours particuliers à [focus_child.GetFirstNameNoTooltip] pour compenser la perte d’éducation"
 lmf_heir.1501.a:0 "Entendu. Nourrissez donc son talent."
 lmf_heir.1501.b:0 "Hors de question. [focus_child.Custom('FR_IlElle')|U] s'en sortira très bien dans ses études."
 lmf_heir.1501.c:0 "[new_educator.GetFirstNameNoTooltip] peut apporter son aide, mais c'est à moi de former m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('focus_child'))] à l'épée."
 lmf_heir.1501.d:0 "[new_educator.GetFirstNameNoTooltip] peut apporter son aide, mais je demeure [ROOT.Char.Custom('FR_LeLa')] précept[ROOT.Char.Custom('FR_EurRice')] de [focus_child.GetFirstNameNoTooltip]."
 lmf_heir.1503.t:0 "La formation d'un[focus_child.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('focus_child'))]"
 lmf_heir.1503.start:0 "J'ai ouï-dire que m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('focus_child'))] ne semble point s'épanouir dans sa formation martiale.\n\nEn allant m'enquérir auprès de son précédent instructeur, celui-ci confesse que cela n'est en rien dû au jeune âge [focus_child.Custom('FR_du_Char_Pi')][focus_child.GetTitledFirstName] : « [focus_child.Custom('FR_IlElle')|U] n'y met aucune conviction voilà tout, "
 lmf_heir.1503.female:0 "[focus_child.Custom('FR_IlElle')] sait que son statut ne lui permettra pas de prendre les armes, et quand bien même, "
 lmf_heir.1503.end:0 "[focus_child.Custom('FR_IlElle')] n'a tout simplement pas le talent ou l'intérêt pour ce genre de chose. »\n\nUne déclaration qu'[focus_child.Custom('FR_IlElle')] est pénible d'accepter, mais qui corrobore d'autres attestations de même teneur. Peut-être serait-il bon de réorienter [focus_child.GetFirstNameNoTooltip] vers quelque chose qui lui sied davantage ?"
 lmf_heir.1503.a:0 "La diplomatie peut-être ? [new_diplomacy_educator.GetFirstName] pourrait être s[new_diplomacy_educator.Custom('FR_OnA')] précept[new_diplomacy_educator.Custom('FR_EurRice')]."
 lmf_heir.1503.b:0 "[focus_child.Custom('FR_IlElle')|U] étudiera la diplomatie. Je lui trouverais un tuteur en temps voulu."
 lmf_heir.1503.c:0 "Pourquoi pas l'intendance ? [new_stewardship_educator.GetFirstName] pourrait être s[new_stewardship_educator.Custom('FR_OnA')] précept[new_stewardship_educator.Custom('FR_EurRice')]."
 lmf_heir.1503.d:0 "[focus_child.Custom('FR_IlElle')|U] étudiera l'intendance. Je lui trouverais un tuteur en temps voulu."
 lmf_heir.1503.e:0 "Qu'en serait-il de l'intrigue ? [new_intrigue_educator.GetFirstName] pourrait être s[new_intrigue_educator.Custom('FR_OnA')] précept[new_intrigue_educator.Custom('FR_EurRice')]."
 lmf_heir.1503.f:0 "[focus_child.Custom('FR_IlElle')|U] étudiera l'intrigue. Je lui trouverais un tuteur en temps voulu."
 lmf_heir.1503.g:0 "L'érudition alors ? [new_learning_educator.GetFirstName] pourrait être s[new_learning_educator.Custom('FR_OnA')] précept[new_learning_educator.Custom('FR_EurRice')]."
 lmf_heir.1503.h:0 "[focus_child.Custom('FR_IlElle')|U] étudiera l'érudition. Je lui trouverais un tuteur en temps voulu."
 lmf_heir.1503.i:0 "[focus_child.Custom('FR_IlElle')|U] trimera autant qu'il le faudra pour compenser son manque de #italic motivation#!."
 lmf_heir.1503.a.tt_change:0 "L’[education_focus|El] de [focus_child.GetFirstNameNoTooltip] se change en [diplomacy|El]"
 lmf_heir.1503.a.tt_tutor:0 "[new_diplomacy_educator.Custom('FR_le_Char_Pi')|U][new_diplomacy_educator.GetTitledFirstNameNoTooltip] donne personnellement des cours particuliers à [focus_child.GetFirstNameNoTooltip] pour compenser la perte d’éducation"
 lmf_heir.1503.tt_no_tutor:0 "[focus_child.GetFirstNameNoTooltip] travaillera intensément pour compenser la perte d’éducation"
 lmf_heir.1503.b.tt_change:0 "L’[education_focus|El] de [focus_child.GetFirstNameNoTooltip] se change en [stewardship|El]"
 lmf_heir.1503.b.tt_tutor:0 "[new_stewardship_educator.Custom('FR_le_Char_Pi')|U][new_stewardship_educator.GetTitledFirstNameNoTooltip] donne personnellement des cours particuliers à [focus_child.GetFirstNameNoTooltip] pour compenser la perte d’éducation"
 lmf_heir.1503.c.tt_change:0 "L’[education_focus|El] de [focus_child.GetFirstNameNoTooltip] se change en [intrigue|El]"
 lmf_heir.1503.c.tt_tutor:0 "[new_intrigue_educator.Custom('FR_le_Char_Pi')|U][new_intrigue_educator.GetTitledFirstNameNoTooltip] donne personnellement des cours particuliers à [focus_child.GetFirstNameNoTooltip] pour compenser la perte d’éducation"
 lmf_heir.1503.d.tt_change:0 "L’[education_focus|El] de [focus_child.GetFirstNameNoTooltip] se change en [learning|El]"
 lmf_heir.1503.d.tt_tutor:0 "[new_learning_educator.Custom('FR_le_Char_Pi')|U][new_learning_educator.GetTitledFirstNameNoTooltip] donne personnellement des cours particuliers à [focus_child.GetFirstNameNoTooltip] pour compenser la perte d’éducation"
 lmf_heir.1505.t:0 "La formation d'un[focus_child.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('focus_child'))]"
 lmf_heir.1505.desc:0 "Des nouvelles de la formation martiale de m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('focus_child'))] sont arrivées jusqu'à moi.\n\n« [focus_child.Custom('FR_le_Char_Pi')|U][focus_child.GetTitledFirstName] est certes jeune, me dit-on, mais point dénué[focus_child.Custom('FR_E')] de talent, et [focus_child.Custom('FR_IlElle')] fait montre de force opiniâtreté, réclamant sans cesse de pouvoir s'entraîner l'arme à la main. [focus_child.Custom('FR_IlElle')|U] n'en démordra pas quoi que nous lui disions, alors le plus sage serait probablement de lui donner des cours dans les règles de l'art. »\n\nSelon les us, il est inconvenant que [focus_child.GetFirstNameNoTooltip] apprenne l'usage de l'épée, mais pourquoi diantre son statut devrait-il [focus_child.Custom('FR_LeLa')] cantonner à la stratégie et à la théorie militaire ?"
 lmf_heir.1505.a:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('focus_child'))] s'entraînera, et qu'importe ce que d'aucuns en diront !"
 lmf_heir.1505.b:0 "C'est ainsi, alors qu'[focus_child.Custom('FR_IlElle')] fasse contre mauvaise fortune bon cœur."
 lmf_heir.1511.t:0 "Mariage d'amour ?"
 lmf_heir.1511.desc.start:0 "Bien qu'encore dans ses vertes années, [focus_child.GetFirstName] sait qu'approche à grand pas le jour où [focus_child.Custom('FR_IlElle')] sera promis[focus_child.Custom('FR_E')] à un[focus_child.Custom('FR_EOpp')] [focus_child.Custom('GetWomanManOpposite')], raison pour laquelle [focus_child.Custom('FR_IlElle')] décide subitement d'aborder le sujet en cette soirée :\n\n« Si épousailles il doit y avoir, je veux que ce soit par amour ! tonne-t-[focus_child.Custom('FR_IlElle')] sans retenu. De grâce, ne me forcez pas à épouser quelqu'un contre ma volonté ! »\n\n"
 lmf_heir.1511.desc.sex:0 "Ses mots résonnant dans ma tête, je songe au fait que m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('focus_child'))] n'a jamais montré d'intérêt pour les [focus_child.Custom('GetGirlsBoysOpposite')], et je réalise la raison de ce besoin soudain d'émancipation de sa part.\n\n"
 lmf_heir.1511.desc.lustful:0 "Le temps passant, les jeunes pousses grandissent, et la #italic fougue#! qui les habite également, et m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('focus_child'))] est habité[focus_child.Custom('FR_E')] d'une fougue plus sulfureuse qu'aucune autre. À son âge, j'éprouvais moi aussi cette dilection à vouloir… #italic courir le guilledou#!.\n\n"
 lmf_heir.1511.desc.sibling:0 "Comprenant que je n'ai pas encore mis le doigt sur la raison de cette soudaine requête, [focus_child.Custom('FR_IlElle')] ajoute ceci : « Vous avez accordé votre bénédiction à [favored_sibling.GetFirstName] pour qu'[favored_sibling.Custom('FR_IlElle')] épouse qui bon lui semblera, alors pourquoi ne pourrais-je donc pas en faire de même ? \n» Ainsi, c'est donc une jalousie envers s[focus_child.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('favored_sibling'))] qui motive ce besoin soudain d'émancipation.\n\n"
 lmf_heir.1511.desc.adventure:0 "D'où lui vient ce besoin soudain d'indépendance ? M[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('focus_child'))] nourrit-[focus_child.Custom('FR_IlElle')] un goût pour l'aventure ? Il est vrai que le mariage s'apparente à un fardeau pour [focus_child.Custom('FR_CeluiCelle')] qui ambitionne de vivre une jeunesse auréolée de liberté.\n\n"
 lmf_heir.1511.desc.end.female:0 "La question est maintenant de savoir si ce cri de liberté doit être bâillonné ou encouragé. Une dynastie est un ouvrage dont chaque membre se doit d'apporter sa pierre à l'édifice, sans quoi elle ne saurait résister à l'usure du temps. Cela passe par une descendance, et donc un mariage. Et que cela soit juste ou non, cela implique pour les femmes d'être encore fertiles."
 lmf_heir.1511.desc.end:0 "La question est maintenant de savoir si ce cri de liberté doit être bâillonné ou encouragé. Une dynastie est un ouvrage dont chaque membre se doit d'apporter sa pierre à l'édifice, sans quoi il ne saurait résister à l'usure du temps. Cela signifie une descendance, et donc un mariage."
 lmf_heir.1511.a:0 "[focus_child.GetFirstNameNoTooltip] est encore jeune. Nul besoin d'être hâti[ROOT.Char.Custom('FR_FVe')] à ce sujet."
 lmf_heir.1511.b:0 "Pour un[focus_child.Custom('FR_E')] [focus_child.GetHouse.GetNameNoTooltip], le devoir prime sur de #italic menues caprices#!."
 allowed_to_marry_at_will:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] accordé [TARGET_CHARACTER.Custom('FR_au_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] le droit d'épouser qui bon lui semblera."
 allowed_to_marry_at_will_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] accordé [CHARACTER.Custom('FR_au_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] le droit d'épouser qui bon lui semblera."
 invite_suitor_1_introduction_tt:0 "[suitor_1.Custom('FR_le_Char_Pi')|U][suitor_1.GetTitledFirstName] sera invité[suitor_1.Custom('FR_E')] à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pour une rencontre prénuptiale avec [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName]"
 invite_suitor_2_introduction_tt:0 "[suitor_2.Custom('FR_le_Char_Pi')|U][suitor_2.GetTitledFirstName] sera invité[suitor_2.Custom('FR_E')] à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pour une rencontre prénuptiale avec [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName]"
 invite_suitor_3_introduction_tt:0 "[suitor_3.Custom('FR_le_Char_Pi')|U][suitor_3.GetTitledFirstName] sera invité[suitor_3.Custom('FR_E')] à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pour une rencontre prénuptiale avec [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName]"
 lmf_heir.1516.warning.matrilineal_tt:0 "Si la rencontre prénuptiale se conclut par un mariage, il sera #X matrilinéaire#!"
 lmf_heir.1516.warning.patrilineal_tt:0 "Si la rencontre prénuptiale se conclut par un mariage, il sera #X patrilinéaire#!"
 lmf_heir.1516.t:0 "Une rencontre prénuptiale ?"
 lmf_heir.1516.desc.start:0 "Maintenant que [secondary_actor.GetFirstName] s'est vu autorisé[secondary_actor.Custom('FR_E')] à pouvoir se marier selon son bon plaisir, [secondary_actor.Custom('FR_IlElle')] ne lui reste donc plus qu'à trouver un bon parti, et c'est justement avec cette idée en tête qu'[secondary_actor.Custom('FR_IlElle')] vient me voir.\n\n"
 lmf_heir.1516.desc.one:0 "C'est avec le nom d'un[suitor_1.Custom('FR_E')] [suitor_1.Custom('WomanManGirlBoy')] en tête qu'[secondary_actor.Custom('FR_IlElle')] aborde l'éventualité "
 lmf_heir.1516.desc.two:0 "C'est avec le nom de deux [suitor_1.Custom('WomenMenGirlsBoys')] en tête qu'[secondary_actor.Custom('FR_IlElle')] aborde l'éventualité "
 lmf_heir.1516.desc.three:0 "C'est avec pas moins de trois noms en tête qu'[secondary_actor.Custom('FR_IlElle')] aborde l'éventualité "
 lmf_heir.1516.desc.matrilineal:0 "d'un mariage matrilinéaire.\n\n"
 lmf_heir.1516.desc.normal:0 "d'une rencontre.\n\n"
 lmf_heir.1516.desc.end:0 "Si je consens, il me faudra faire les choses convenablement et donc organiser une rencontre prénuptiale à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], en supposant évidemment qu'il ne s'agit pas là d'une lubie passagère de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_actor'))]. Si cela devait être le cas, eh bien… un mariage forcé sera toujours envisageable…"
 lmf_heir.1516.a:0 "Invitons donc [suitor_1.Custom('FR_le_Char_Pi')][suitor_1.GetTitledFirstName]."
 lmf_heir.1516.b:0 "Envoyons une invitation [suitor_2.Custom('FR_au_Char_Pi')][suitor_2.GetTitledFirstName]."
 lmf_heir.1516.c:0 "[suitor_3.Custom('FR_le_Char_Pi')|U][suitor_3.GetTitledFirstName] me parait convenable."
 lmf_heir.1516.d:0 "Foutrerie, je lui trouverais un meilleur parti que cela !"
 lmf_heir.1517.t:0 "Un[focus_child.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMeShort', focus_child )] à marier"
 lmf_heir.1517.desc:0 "C'est avec une mine bien piteuse que [focus_child.GetFirstName] vient me voir, et péniblement, dans le relent de son soupir j'entends :\n\n« À propos de ce que nous avions évoqué l'autre fois… »\n\nAu grand dam de [focus_child.Custom('FR_CeluiCelle')] qui ambitionnait voler de ses propres ailes, [focus_child.Custom('FR_IlElle')] n'a semble-t-il pas réussi à trouver chaussure à son pied, et traînant son dépit comme une ombre qui n'a de cesse de [focus_child.Custom('FR_LeLa')] suivre, [focus_child.Custom('FR_IlElle')] doit maintenant se résigner à me laisser prendre les choses en main.\n\n« Si vous pouviez m'apporter votre aide pour trouver un bon parti, je vous en saurais gré. » Ouïr cette simple phrase me donne plus risette qu'il n'en faut."
 lmf_heir.1517.a:0 "Sage décision, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', focus_child )]."
 lmf_heir.1518.t:0 "La fin de la fugue ?"
 lmf_heir.1518.desc:0 "Des nouvelles de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('focus_child'))] me sont parvenues aujourd'hui.\n\n[focus_child.GetFirstName] a choisi de mettre un terme à sa vie de pérégrination, nonobstant l'idée qu'il devra se plier au mariage que je jugerais bon de lui imposer. Ceci, bien entendu, à la condition que lui accorde le droit de rentrer à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nIl semble que les affres de l'errance soient parvenues à éroder sa pertinacité, et [focus_child.Custom('FR_LeLa')] voilà revenant la queue entre les jambes…"
 lmf_heir.1518.a:0 "Qu'on lui fasse bon accueil."
 lmf_heir.1518.b:0 "[focus_child.Custom('FR_IlElle')|U] souhaitait l'émancipation non ? Qu'[focus_child.Custom('FR_IlElle')] en profite."
 lmf_heir.1519.t:0 "My [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))|U] is in Love"
 lmf_heir.1519.desc.start:0 "Aurais-je finalement trouvé la raison pour laquelle m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('heir'))], [heir.Custom('FR_le_Char_Pi')][heir.GetTitledFirstName], semble si réticent[heir.Custom('FR_E')] à se marier ? Il semblerait que oui. C'est d'amour qu'il s'agit, comme bien souvent lorsque le devoir s'en retrouve rudoyé. Fâcheusement, "
 lmf_heir.1519.desc.samesex:0 "l'objet de son désir se trouve être un[heir_lover.Custom('FR_E')] [heir_lover.GetWomanMan] — une situation incommodante, pour sûr.\n\n"
 lmf_heir.1519.desc.order:0 "l'objet de son désir aurait prêté serment envers un ordre sacré, obstant toute union tant qu'[heir_lover.Custom('FR_IlElle')] sera lié[heir_lover.Custom('FR_E')] par ses vœux.\n\n"
 lmf_heir.1519.desc.married:0 "l'objet de son désir est déjà lié par le mariage — une situation incommodante, à tout le moins.\n\n"
 lmf_heir.1519.desc.betrothed:0 "l'objet de son désir est déjà promis à un futur mariage, si celui-ci n'a pas déjà été célébré. Tant que des fiançailles feront obstacle, leur mariage sera inenvisageable.\n\n"
 lmf_heir.1519.desc.permission.lover.man:0 "je me suis déjà prononcé[ROOT.Char.Custom('FR_E')] contre l'idée que [heir_lover.GetFirstName] puisse se marier, et il ne lui apparaît donc pas comme engageant de demander la main de [heir.GetFirstNameNoTooltip].\n\n"
 lmf_heir.1519.desc.permission.lover.woman:0 "je me suis déjà prononcé[ROOT.Char.Custom('FR_E')] contre l'idée que [heir_lover.GetFirstName] puisse se marier, et [heir.GetFirstNameNoTooltip] semble avoir supputé que ce refus lui était également destiné.\n\n"
 lmf_heir.1519.desc.permission.both:0 "j'ai déjà fait part de mon opposition à les voir se marier, [heir.Custom('FR_LuiElle')] et [heir_lover.GetFirstName]. Ce qui, bien entendu, ne les empêche pas de continuer leur petite idylle au mépris du bon sens, et cette situation incommodante pourrait s'envenimer si je ne fais rien pour la juguler.\n\n"
 lmf_heir.1519.desc.permission.heir.man:0 "au vu d'un précédent refus de ma part sur la question, [heir.Custom('FR_IlElle')] ne trouve guère engageant l'idée de quémander ma permission pour épouser l'objet de son désir.\n\n"
 lmf_heir.1519.desc.permission.heir.woman:0 "au vu d'un précédent refus de ma part sur la question, [heir_lover.GetFirstName] ne trouve guère engageant l'idée de quémander ma permission pour demander la main de [heir.GetFirstNameNoTooltip].\n\n"
 lmf_heir.1519.desc.generic:0 "puisqu'il leur est impossible de s'unir au regard [ROOT.Char.GetFaith.PantheonTerm3] et des Hommes, [heir.Custom2('FR_IlsElles', SCOPE.sC('heir_lover'))] n'ont d'autre choix que de vivre leur passion à la faveur des ombres, et l'amour étant la plus capricieuse des conseillères, nul doute que [heir.GetFirstNameNoTooltip] restera sourd[heir.Custom('FR_E')] à tout sermon sur le devoir que son statut implique.\n\n"
 lmf_heir.1519.desc.end.canact:0 "Ne pouvant rester les bras ballants, je pourrais veiller à ce que m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('heir'))] épouse [Select_CString(heir_lover.IsFemale,'la dame de ses pensées','l’homme qui fait frémir ses pensées')], ou bien plus simplement [heir.Custom('FR_LeLa')] contraindre à mettre un terme à cet amourachement grotesque. Quelle que soit la décision que je souhaite prendre, elle doit être prise dare-dare."
 lmf_heir.1519.desc.end:0 "Rien ne m'empêche de m'immiscer dans les affaires de m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('heir'))], jaçoit que nous aurons [Select_CString(And(ROOT.Char.IsFemale, heir.IsFemale), 'toutes', 'tous')] deux maille à partir si je venais à prendre cette décision."
 lmf_heir.1519.a:0 "[heir.Custom('FR_le_Char_Pi')|U][heir.GetTitledFirstNameNoTooltip] doit mettre un terme à ses petites #italic frasques#."
 lmf_heir.1519.b:0 "Je leur ferai savoir que je suis revenu[ROOT.Char.Custom('FR_E')] sur ma décision."
 lmf_heir.1519.c:0 "Les vœux de [heir_lover.GetFirstNameNoTooltip] ne sauraient être un obstacle pour leur mariage !"
 lmf_heir.1519.d:0 "Les fiançailles de [heir_lover.GetFirstNameNoTooltip] ne sauraient être un obstacle pour leur mariage !"
 lmf_heir.1519.e:0 "[heir.GetFirstNameNoTooltip] est libre de [Select_CString(heir_lover.IsFemale,'butiner toutes les fleurs','batifoler avec tous ceux')] qu'[heir.Custom('FR_IlElle')] désire."
 lmf_heir.1530.heir_training.tt:0 "[trainee_heir.GetFirstNameNoTooltip] se prépare à gouverner"
 lmf_heir.1530.heir_begin_training.tt:0 "[trainee_heir.GetFirstNameNoTooltip] débute sa formation d'hériti[trainee_heir.Custom('FR_ErEre')]"
 lmf_heir.1601.t:0 "Un jour à la Cour"
 lmf_heir.1601.desc:0 "Coutumi[ROOT.Char.Custom('FR_ErEre')] des journées à présider la Cour à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], celle-ci s'est avéré somme toute quelconque, du moins jusqu'à l'arrivée inopinée d'un[your_heir.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))] à l'air songeur.\n\nMu par la curiosité après avoir épier chacune des affaires que j'ai traitées, [your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] me harasse d'interrogations. J'ai beau faire grand cas de satisfaire sa soif de savoir, chaque question tranchée par une réponse repousse sous la forme de deux nouvelles questions, et ce petit jeu pourrait durer encore longtemps car [your_heir.Custom('FR_IlElle')] ne semble toujours guère plus savant[your_heir.Custom('FR_E')] dans l'art de la gouvernance.\n\nDu reste, je suis prêt[ROOT.Char.Custom('FR_E')] à reconnaître que la compréhension qui lui fait défaut est largement compensée par son diable d'acharnement."
 lmf_heir.1601.a:0 "Gouverner ne s'apprend pas en un jour, ne nous décourageons pas."
 lmf_heir.1601.b:0 "Il doit bien y avoir quelqu'un qui puisse lui répondre à ma place."
 lmf_heir.1601.a.success.tt:0 "Les leçons s'avèrent efficaces"
 lmf_heir.1601.a.success.effect.tt:0 "[your_heir.GetFirstNameNoTooltip] progresse significativement dans sa formation d'hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.1601.a.failure.tt:0 "Les leçons s'avèrent inefficaces"
 lmf_heir.1601.a.failure.effect.tt:0 "[your_heir.GetFirstNameNoTooltip] ne fait aucun progrès dans sa formation d'hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.1601.a.critfail.tt:0 "Les leçons s'avèrent contre-productives"
 lmf_heir.1601.a.critfail.effect.tt:0 "[your_heir.GetFirstNameNoTooltip] perd en progression dans sa formation d'hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.1602.t:0 "Furie dans les fleurs"
 lmf_heir.1602.desc:0 "À mon grand désarroi, ce qui devait être une journée paisible à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] est interrompu par un garde : « [ROOT.Char.Custom('FR_MonseigneurMadame')|U] ! [your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] et [angry_family.Custom('FR_le_Char_Pi')][angry_family.GetTitledFirstName] se sont battu[your_heir.Custom2('FR_E', SCOPE.sC('angry_family'))]s dans les jardins ! »\n\n[angry_family.GetFirstNameNoTooltip] serait à l'origine de cette estrivance, une histoire d'affront perpétré par [your_heir.GetFirstNameNoTooltip] d'après les premiers sons de cloche, mais pour dire le vrai, je penche plutôt pour un sentiment de jalousie en raison de son statut d'hériti[your_heir.Custom('FR_ErEre')].\n\nAprès une longue remontrance, je vois leurs lèvres bouger pour exprimer des excuses, mais c'est une rancœur mal dissimulée que j'entends atterrir dans mes oreilles. Cette histoire ne va pas en rester là je le crains…"
 lmf_heir.1602.a:0 "Plus facile de guerroyer que d'élever des enfants."
 fought_over_heir_status:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] déclenché une bagarre avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] à cause de la jalousie envers [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre','son')] statut d'hériti[TARGET_CHARACTER.Custom('FR_ErEre')]."
 fought_over_heir_status_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] déclenché une bagarre avec [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] à cause de la jalousie envers [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] statut d'hériti[CHARACTER.Custom('FR_ErEre')]."
 lmf_heir.1603.t:0 "Excès de curiosité"
 lmf_heir.1603.desc:0 "Élever un[your_heir.Custom('FR_E')] jeune [your_heir.Custom('GirlBoy')] comme [your_heir.GetFirstName] pour [your_heir.Custom('FR_LeLa')] préparer à gouverner [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] comporte son lot de défis, et aujourd'hui ne déroge pas à la règle.\n\n[your_heir.Custom('FR_IlElle')|U] m'aborde dès l'aube avec myriade de questions anodines en lien avec les leçons de la veille. Sa curiosité à l'endroit de la gouvernance me paraît amusante au premier abord, mais quand le soleil continue sa course et que la curiosité n'est toujours pas assouvie, je commence à la percevoir comme plus irritante qu'amusante. De la salle du trône jusqu'aux écuries, et même jusqu'aux latrines, sa soif de connaissance ne souffre d'aucune pudeur pour être rassasiée.\n\n« Je veux juste comprendre, [your_heir.Custom2('LMF_RelationToMeShort', ROOT.Char )] ! » dit-[your_heir.Custom('FR_IlElle')] alors que je modère ma migraine par un vive massage des tempes."
 lmf_heir.1603.a:0 "La paix, de grâce !"
 lmf_heir.1604.t:0 "Philosophie et martialité"
 lmf_heir.1604.desc:0 "Lors d'une visite d'inspection de la garnison de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], m[your_heir.Custom('FR_OnA')] jeune hériti[your_heir.Custom('FR_ErEre')] [your_heir.GetFirstName] m'a accompagné dans le cadre de sa formation. Une curiosité, probablement mue par le cadre militaire des lieux, l'a poussé à me poser myriades de questions d'ordre martial :\n\n#italic Pourquoi sommes-nous méprisés par [war_target.GetPrimaryTitle.GetNameNoTierNoTooltip] ?#!\n#italic Réussirons-nous à vaincre [war_target.Custom('FR_le_Char_Pi')][war_target.GetTitledFirstNameNoTooltip] ?#!\n#italic Que se passera-t-il lorsqu'[war_target.Custom('FR_IlElle')] aura rendu les armes ?#!\n#italic Que se passera-t-il si ses armées marchent sur [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] ?#!\n\nJe ne peux nier la pertinence de ses questions, et de toutes celles qui suivent, hélas, aujourd'hui il m'est difficile de faire coexister mes obligations de [ROOT.Char.GetTitleAsNameNoTooltip|l] et de format[ROOT.Char.Custom('FR_EurRice')] aussi efficacement que je le voudrais…"
 lmf_heir.1604.a:0 "Excellentes questions, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))], laissez-moi vous expliquer…"
 lmf_heir.1604.b:0 "Mon [ROOT.Char.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName|l] est tout à fait apte à répondre à ses interrogations."
 lmf_heir.1605.t:0 "Un[your_councillor.Custom('FR_E')] conseill[your_councillor.Custom('FR_ErEre')] courroucé[your_councillor.Custom('FR_E')]"
 lmf_heir.1605.desc.start:0 "Tardif est le moment de la journée où [your_councillor.Custom('FR_le_Char_Pi')][your_councillor.GetTitledFirstName] choisit de faire inopinément son entrée dans la salle du trône, furibond[your_councillor.Custom('FR_E')] qui plus est.\n\n« Votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))] ne cesse de me donner des ordres ! » érupte mon [your_councillor.GetCouncilTitle|l]. « Ai-je l'air d'un vulgaire domestique à son service ?! »\n\nJe l'invite à se rasséréner d'un geste de la main, et comme cela ne suffit guère, j'ajoute en sus : « N'oubliez pas que [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] se prépare à gouverner. Le jour venu "
 lmf_heir.1605.desc.same:0 "[your_heir.Custom('FR_IlElle')] deviendra votre [ROOT.Char.GetTitleAsNameNoTooltip|l]. »\n\n« Mais #EMP aujourd'hui#! [your_heir.Custom('FR_IlElle')] n'est point encore [ROOT.Char.GetTitleAsNameNoTooltip|l] ! » objecte-t-[your_councillor.Custom('FR_IlElle')] avec verve."
 lmf_heir.1605.desc.opposite:0 "[your_heir.Custom('FR_IlElle')] deviendra votre [ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip|l]. »\n\n« Mais #EMP aujourd'hui#! [your_heir.Custom('FR_IlElle')] n'est point encore [ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip|l] ! » objecte-t-[your_councillor.Custom('FR_IlElle')] avec verve."
 lmf_heir.1605.desc.default:0 "[your_heir.Custom('FR_IlElle')] deviendra votre [your_heir.Custom('FR_SeigneurDame')] lige. »\n\n« Mais #EMP aujourd'hui#! [your_heir.Custom('FR_IlElle')] n'est point encore m[your_heir.Custom('FR_OnA')] [your_heir.Custom('FR_SeigneurDame')] lige ! » objecte-t-[your_councillor.Custom('FR_IlElle')] avec verve."
 lmf_heir.1605.a:0 "Je tâcherai d'apprendre à [your_heir.GetFirstNameNoTooltip] à faire montre de plus de tact."
 lmf_heir.1605.b:0 "Mais [your_heir.Custom('FR_IlElle')] le sera bien assez tôt, alors habituez-vous à lui être obéissant[your_councillor.Custom('FR_E')]."
 lmf_heir.1605.b.success.tt:0 "[your_councillor.Custom('FR_le_Char_Pi')|U][your_councillor.GetTitledFirstNameNoTooltip] accepte d'aider à la formation de [your_heir.GetFirstNameNoTooltip]"
 lmf_heir.1605.b.failure.tt:0 "[your_councillor.Custom('FR_le_Char_Pi')|U][your_councillor.GetTitledFirstNameNoTooltip] refuse d'aider à la formation de [your_heir.GetFirstNameNoTooltip]"
 lmf_heir.1605.b.critfail.tt:0 "[your_councillor.Custom('FR_le_Char_Pi')|U][your_councillor.GetTitledFirstNameNoTooltip] prend cela comme une insulte"
 convinced_to_help_heir:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] commencé à [TARGET_CHARACTER.LocalPlayerString('vous ', '')]assister [TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUIName')] dans [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre','sa')] formation d'hériti[TARGET_CHARACTER.Custom('FR_ErEre')]."
 convinced_to_help_heir_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] commencé à [CHARACTER.LocalPlayerString('vous ', '')]assister[CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUIName')] dans [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] formation d'hériti[CHARACTER.Custom('FR_ErEre')]."
 not_convinced_to_help_heir:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','s’est')] enragé[CHARACTER.Custom('FR_E')] à cause des perturbations dans [Select_CString(CHARACTER.IsLocalPlayer,'vos','ses')] devoirs de conseiller provoquées par [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName]."
 not_convinced_to_help_heir_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous êtes','s’est')] enragé[TARGET_CHARACTER.Custom('FR_E')] à cause des perturbations dans [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vos','ses')] devoirs de conseiller provoquées par [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName]."
 lmf_heir.1605.c:0 "Je suis sûr que vous pouvez parvenir à vous entendre."
 lmf_heir.1605.c.success.tt:0 "Les choses s'arrangent d'elles-mêmes"
 lmf_heir.1605.c.failure.tt:0 "La mésentente ne fait que s'envenimer"
 lmf_heir.1606.t:0 "Un[your_courtier.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_courtier'))] irrévérencieu[your_courtier.Custom('FR_XSe')]"
 lmf_heir.1606.desc:0 "« [your_courtier.Custom('FR_IlElle')|U] refuse de m'écouter ! » D'une voix de forcené, [your_heir.GetFirstName] fait brusquement irruption dans mon bureau.\n\nJe dois me démener comme [Select_CString(ROOT.Char.IsFemale,'une diablesse','un beau diable')] pour l'apaiser de telle sorte que je puisse connaître la raison de ce fatras émotionnel.\n« C'est [your_courtier.Custom('FR_le_Char_Pi')][your_courtier.GetTitledFirstName] ! » laisse-t-[your_heir.Custom('FR_IlElle')] éclater, avant de poursuivre en expliquant que m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_courtier'))] semble être d'une nature dédaigneuse à son égard, au point d'ignorer ses ordres et de ne faire que peu de cas de leur statut respectif.\n\n« Et vous ne pouvez donc résoudre ce problème, vous qui allez devoir un jour diriger à ma place ? » Ma voix, teinté d'amusement, semble laisser [your_heir.GetFirstNameNoTooltip] bien dépité[your_heir.Custom('FR_E')]."
 lmf_heir.1606.a:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))], soyez prompt[your_heir.Custom('FR_E')] à pardonner et à oublier."
 lmf_heir.1606.b:0 "Je ne serai pas toujours là pour vous défendre. Apprenez à vous affirmer !"
 lmf_heir.1606.c:0 "Donnez-lui une leçon qu'[your_courtier.Custom('FR_IlElle')] n'est pas prêt[your_courtier.Custom('FR_E')] d'oublier !"
 will_not_listen_to_heir:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] été touché[CHARACTER.Custom('FR_E')] dans [Select_CString(CHARACTER.IsLocalPlayer,'votre','son')] orgueil par [TARGET_CHARACTER.LocalPlayerString('votre', 'la')] constante outrecuidance[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')]."
 will_not_listen_to_heir_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] été touché[TARGET_CHARACTER.Custom('FR_E')] dans [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre','son')] orgueil par [CHARACTER.LocalPlayerString('votre', 'la')] constante outrecuidance[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')]."
 lmf_heir.1606.d:0 "Votre règne sera parsemé de péripéties, apprenez à y faire face."
 lmf_heir.1606.e:0 "N'ayez crainte, je vais lui en toucher deux mots."
 forced_to_listen_to_heir:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] été réprimandé[CHARACTER.Custom('FR_E')] par [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] pour avoir fait preuve d'outrecuidance envers [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre ','l’')]hériti[TARGET_CHARACTER.Custom('FR_ErEre')][Select_CString(TARGET_CHARACTER.IsLocalPlayer,'',Select_CString(TARGET_CHARACTER.IsFemale,' de cette dernière',' de ce dernier'))]."
 forced_to_listen_to_heir_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] été réprimandé[TARGET_CHARACTER.Custom('FR_E')] par [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] pour avoir fait preuve d'outrecuidance envers [Select_CString(CHARACTER.IsLocalPlayer,'votre ','l’')]hériti[CHARACTER.Custom('FR_ErEre')][Select_CString(CHARACTER.IsLocalPlayer,'',Select_CString(CHARACTER.IsFemale,' de cette dernière',' de ce dernier'))]."
 lmf_heir.1607.t:0 "L'outrecuidance d'un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.1607.desc:0 "Puisqu'[your_heir.Custom('FR_IlElle')] sera amené[your_heir.Custom('FR_E')] un jour à gouverner [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], il est important pour [your_heir.GetFirstName] de connaître les ficelles du métier, dirons-nous. Et si selon l'axiome, c'est en forgeant qu'on devient forgeron, alors il est important pour [your_heir.Custom('FR_LuiElle')] de pratiquer la chose. Pourtant, j'estime que ces derniers temps, cette pratique est allée trop loin.\n\nÀ plusieurs reprises, les ordres que j'ai donnés à des courtisans ont été contremandés car [your_heir.Custom('FR_IlElle')] y trouvait à redire, pour une raison ou pour une autre, ne daignant même pas m'avertir de ses prises d'initiatives. Cette fatuité devient tant envahissante dans mes devoirs de [ROOT.Char.GetTitleAsNameNoTooltip|l] qu'arrive le moment où certains de mes sujets semblent chercher l'approbation de mes ordres dans le regard de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))].\n\nQu'[your_heir.Custom('FR_IlElle')] s'affirme en tant qu'hériti[your_heir.Custom('FR_ErEre')] est une chose, qu'[your_heir.Custom('FR_IlElle')] outrepasse l'autorité de s[your_heir.Custom2('FR_LMF_RelationToMeShort_OnA', ROOT.Char )] en est une autre."
 lmf_heir.1607.a:0 "Voyons cela comme un mal pour un bien."
 lmf_heir.1607.b:0 "Hériti[your_heir.Custom('FR_ErEre')] ou pas, [your_heir.Custom('FR_IlElle')] doit apprendre à rester à sa place !"
 lmf_heir.1608.t:0 "Colère à la caserne"
 lmf_heir.1608.desc:0 "[your_heir.GetFirstName] s'applique à parfaire sa maîtrise du combat à l'épée en compagnie des [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], mais alors que je devrais être préoccupé[ROOT.Char.Custom('FR_E')] par son jeu de jambe, sa posture, ou la précision de ses mouvements, mon attention est porté sur le peu de respect que semble lui accorder ses #italic compagnons d'armes#!, et tout particulièrement [your_courtier.Custom('FR_le_Char_Pi')][your_courtier.GetTitledFirstName].\n\n[Select_CString(your_courtier.IsFemale,'Cette dernière','Ce dernier')] semble faire peu de cas de l'entraînement, voir même tout simplement de la présence de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))], allant jusqu'à l'écarter d'un geste de la main lorsqu'une question lui est posée.\n\nMes doutes sont confirmés lorsque [your_heir.GetFirstNameNoTooltip] finit par venir me voir : « Si l'élève doit respecter son mentor, le [ROOT.Char.Custom('KnightCultureNoTooltipLowercase')] doit respecter son futur commandant ! N'ai-je pas raison ? »"
 lmf_heir.1608.a:0 "C'est moi qui vais m'occuper de l'entraînement aujourd'hui."
 lmf_heir.1608.b:0 "Vous avez tout à fait raison. Le comportement [your_courtier.Custom('FR_du_Char_Pi')][your_courtier.GetTitledFirstNameNoTooltip] est intolérable !"
 lmf_heir.1608.c:0 "Plutôt que l'épée, apprenez à faire usage de diplomatie dans ce cas..."
 does_not_respect_heir:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous êtes','s’est')] enragé[TARGET_CHARACTER.Custom('FR_E')] à cause de [CHARACTER.LocalPlayerString('votre ', 'l’')]irrespect flagrant[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] lors d'un entraînement à la caserne."
 does_not_respect_heir_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes','s’est')] enragé[CHARACTER.Custom('FR_E')] à cause de [TARGET_CHARACTER.LocalPlayerString('votre ', 'l’')]irrespect flagrant[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] lors d'un entraînement à la caserne."
 lmf_heir.1609.t:0 "L'Hériti[your_heir.Custom('FR_ErEre')] en danger"
 lmf_heir.1609.desc:0 "Les bris de l'aube sont tout juste estompés que déjà une nouvelle effarante vient marquer la journée : « C'est votre [ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))]… [your_heir.Custom('FR_IlElle')] est gravement blessé[your_heir.Custom('FR_E')] ! »\n\nC'est avec force vélocité que j'arrive à la caserne, chacun de mes pas ayant été accompagné de jurons adressés à ma propre bêtise, pour avoir laissé m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))] rejoindre les autres [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\n[your_heir.GetFirstName] n'a pas encore été emporté[your_heir.Custom('FR_E')] par [ROOT.Char.GetFaith.DeathDeityName], mais ce n'est qu'un menu soulagement compte tenu de son état, semble-t-il dû à un accident survenu lors d'un entraînement.\n\n« Faites quérir le [GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()|l] ! »"
 lmf_heir.1609.a:0 "La prière est tout ce qu'il me reste…"
 lmf_heir.1609.a.injured.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] est blessé[your_heir.Custom('FR_E')] !"
 lmf_heir.1610.t:0 "Passage de flambeau"
 lmf_heir.1610.desc:0 "Le temps passant, le corps vieillit et l'esprit s'estompe. \nGouverner [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] me demande de plus en plus d'efforts, raison pour laquelle mes conseillers suggèrent de m'enquérir de l'aide de mon hériti[your_heir.Custom('FR_ErEre')].\n\nIl est vrai que [your_heir.GetFirstName] réside ici, [ROOT.Char.Custom('FR_ResidenceBuilding_Au')], et du reste, l'absence de responsabilité sur une quelconque gouvernance lui donnerait toute liberté de m'aider dans diverses affaires du pays — rendre justice à la Cour, rencontrer des dignitaires, autant de choses qui me soulageraient d'un quotidien bien pesant.\n\nLe jour viendra où il siègera à la place de s[your_heir.Custom2('FR_LMF_RelationToMeShort_OnA', ROOT.Char )], certes, mais la question qui me taraude est de savoir si présentement, [your_heir.Custom('FR_IlElle')] en a déjà les capacités."
 lmf_heir.1610.a:0 "J'ai grand besoin d'aide, et je suis sûr[ROOT.Char.Custom('FR_E')] qu'[your_heir.Custom('FR_IlElle')] ne déméritera point."
 lmf_heir.1610.b:0 "C'est encore trop tôt pour [your_heir.Custom('FR_LuiElle')]."
 lmf_heir.1610.a.success.tt:0 "[your_heir.GetFirstNameNoTooltip] remplit ses fonctions avec grand brio"
 lmf_heir.1610.a.failure.tt:0 "[your_heir.GetFirstNameNoTooltip] ne se montre guère compétent[your_heir.Custom('FR_E')] dans ses nouvelles fonctions"
 lmf_heir.1610.a.critfail.tt:0 "[your_heir.GetFirstNameNoTooltip] s'avère être un véritable désastre dans ses nouvelles fonctions"
 lmf_heir.1611.t:0 "Apprendre à voler de ses propres ailes"
 lmf_heir.1611.desc:0 "Lors d'une réunion du conseil, le sujet d'un projet de développement pour [project_county.GetNameNoTierNoTooltip] est évoqué, mais malheureusement, j'entends divers sons de cloche à ce sujet. Certains estiment qu'il est trop ambitieux pour être confié à de quelconques superviseurs, tandis que d'autres affirment qu'il n'est pas non plus d'une importance suffisante pour justifier de monopoliser mon temps ou celui de mes précieux conseillers.\n\nLa joute verbale continue jusqu'à ce que quelqu'un fasse connaître la solution qui semble aller de soi : « Confiez cela à votre [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('your_heir'))], [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName]. Ce sera l'occasion pour [your_heir.Custom('FR_LuiElle')] de rencontrer les gens qui seront sous ses ordres un jour et d'acquérir un peu de cette précieuse ressource que nous n'avons jamais en excès : l'expérience. »\n\nSi les bénéfices qu'[your_heir.Custom('FR_IlElle')] pourrait en tirer sont évidents, je ne peux m'empêcher de réfréner cette question qui tambourine dans un coin de ma tête : #italic et si la charge est trop lourde à porter ?#!"
 lmf_heir.1611.a:0 "C'est en forgeant qu'on devient forgeron !"
 lmf_heir.1611.a.success.tt:0 "Le projet de développement est un énorme succès"
 lmf_heir.1611.a.failure.tt:0 "Le projet de développement va à vau-l'eau"
 lmf_heir.1611.a.critfail.tt:0 "Le projet de développement est un désastre total"
 lmf_heir.1611.b:0 "[your_heir.Custom('FR_IlElle')|U] n'est pas prêt[your_heir.Custom('FR_E')] pour une telle responsabilité."
 lmf_heir_trait_lustful:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')]… eh bien… lubrique, pour le dire sans circonvolutions. Faisant montre d'une grande appétence pour les plaisirs charnels."
 lmf_heir_trait_chaste:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] pudibond[ROOT.GetCharacter.Custom('FR_E')], au point même de s'empourprer dès qu'il est fait mention de #italic la bête à deux dos#!."
 lmf_heir_trait_gluttonous:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] goulu[ROOT.GetCharacter.Custom('FR_E')], n'ayant semble-t-il d'attrait  que pour les choses qu'[ROOT.GetCharacter.Custom('FR_IlElle')] peut engloutir."
 lmf_heir_trait_temperate:0 "c'est quelqu'un de tempéré. Pour [ROOT.GetCharacter.Custom('FR_LuiElle')], tout est prétexte à la retenue, même lorsqu'il s'agit de menu plaisir."
 lmf_heir_trait_greedy:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] avide. La constante quête de richesse, voilà désormais l'unique préoccupation qui semble motiver chacune de ses décisions."
 lmf_heir_trait_generous:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] fait montre de force prodigalité, tant et si bien qu'à ses yeux, la bonne gestion économique d'un pays semble passer avant tout par une #italic distribution excessivement altruiste#!."
 lmf_heir_trait_lazy:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est atteint[ROOT.GetCharacter.Custom('FR_E')] d'une paresse à la limite de l'infamant. Tout devient prétexte au moindre effort pour [ROOT.GetCharacter.Custom('FR_LuiElle')], cherchant des faux-fuyants pour s'escamper de toute besogne."
 lmf_heir_trait_diligent:0 "c'est devenu[ROOT.GetCharacter.Custom('FR_E')] quelqu'un d'assidu[ROOT.GetCharacter.Custom('FR_E')] dans tout ce qu'[ROOT.GetCharacter.Custom('FR_IlElle')] entreprend. Un[ROOT.GetCharacter.Custom('FR_E')] véritable forcené[ROOT.GetCharacter.Custom('FR_E')] du labeur."
 lmf_heir_trait_wrathful:0 "la colère a toute autorité sur [ROOT.GetCharacter.Custom('FR_LuiElle')]. Toujours prompt[ROOT.GetCharacter.Custom('FR_E')] à des débordements dans lesquels la raison et le bon sens semblent se noyer."
 lmf_heir_trait_calm:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] fait montre d'un calme absolu en toute circonstance. Comme si rien ne pouvait l'atteindre — en bien comme en mal d'ailleurs."
 lmf_heir_trait_patient:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] fait preuve d'une patience exacerbée. [ROOT.GetCharacter.Custom('FR_IlElle')|U] pourrait attendre mille ans que le Mur fonde, et n'aurait strictement rien à redire à devoir attendre mille de plus."
 lmf_heir_trait_impatient:0 "l'impatience est devenu son trait de caractère prédominant. [ROOT.GetCharacter.Custom('FR_IlElle')|U] fustigerait la célérité en personne pour son manque de ponctualité."
 lmf_heir_trait_arrogant:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est d'une arrogance irrévérencieuse. Présomptueu[ROOT.GetCharacter.Custom('FR_XSe')] comme pas deux, son regard n'affiche que dédain dès lors qu'[ROOT.GetCharacter.Custom('FR_IlElle')] regarde autre chose qu'un miroir."
 lmf_heir_trait_humble:0 "l'humilité semble être devenu comme un crédo pour [ROOT.GetCharacter.Custom('FR_LuiElle')]. La modestie peut avoir du bon, certes, mais pas lorsqu'[ROOT.GetCharacter.Custom('FR_IlElle')] empiète sur la fierté."
 lmf_heir_trait_deceitful:0 "il n'y a que perfidie et tromperie qui sortent de sa bouche. La vérité semble n'être qu'une farce pour [ROOT.GetCharacter.Custom('FR_LuiElle')], et l'honnêteté un fardeau."
 lmf_heir_trait_honest:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] l'honnêteté incarné. Pour [ROOT.GetCharacter.Custom('FR_LuiElle')], l'idée même de pieux mensonge [ROOT.GetCharacter.Custom('FR_LeLa')] révulse."
 lmf_heir_trait_craven:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] pleutre à en pleurer. Un[ROOT.GetCharacter.Custom('FR_E')] [ROOT.GetCharacter.Custom('WomanManGirlBoy')] dénué[ROOT.GetCharacter.Custom('FR_E')] de la moindre essence de bravoure, d'hardiesse ou de vaillance."
 lmf_heir_trait_brave:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] démesurément courageu[ROOT.GetCharacter.Custom('FR_XSe')]. Ce n'est même plus du courage, mais de la témérité — une #italic qualité#! qui vaut à beaucoup de finir prématurément en cadavres."
 lmf_heir_trait_shy:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est atteint[ROOT.GetCharacter.Custom('FR_E')] d'une timidité presque maladive. La moindre proximité sociale semble être une ordalie à ses yeux."
 lmf_heir_trait_gregarious:0 "la sociabilité semble être plus importante que toute autre chose pour [ROOT.GetCharacter.Custom('FR_LuiElle')]. Tout est prétexte aux réjouissances. [ROOT.GetCharacter.Custom('FR_IlElle')|U] parait plus apte à organiser des festivités qu'une cour."
 lmf_heir_trait_ambitious:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est bouffi[ROOT.GetCharacter.Custom('FR_E')] d'ambition mal placé. Lorsque son regard se pose sur ce qu'[ROOT.GetCharacter.Custom('FR_IlElle')] convoite, [ROOT.GetCharacter.Custom('FR_IlElle')] donne l'impression de n'être plus qu'une bête fauve cherchant à se repaître de chair fraîche."
 lmf_heir_trait_content:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] semble être dénué[ROOT.GetCharacter.Custom('FR_E')] de la moindre ambition, voyant la coupe à moitié pleine en toute circonstance."
 lmf_heir_trait_arbitrary:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] arbitraire, n'ayant aucune considération pour l'équité dans ses prises de décision."
 lmf_heir_trait_just:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] sensible au sujet de la justice, passant parfois des heures à se triturer l'esprit pour savoir quelle décision serait la plus juste possible."
 lmf_heir_trait_cynical:0 "le cynisme est devenu son plus fidèle compagnon, faisant preuve d'une certaine véhémence lorsque l'on aborde un sujet tel que [ROOT.GetCharacter.GetFaith.GetNameNoTooltip]."
 lmf_heir_trait_zealous:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est empreint[ROOT.GetCharacter.Custom('FR_E')] d'un zèle diablement déluré. Rien ne trouve plus grâce à ses yeux que [ROOT.GetCharacter.GetFaith.GetNameNoTooltip]."
 lmf_heir_trait_paranoid:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est aliéné[ROOT.GetCharacter.Custom('FR_E')] par une méfiance exacerbée. Tout est affaire de suspicion et de défiance. Qu'[ROOT.GetCharacter.Custom('FR_IlElle')] se méfie de sa propre ombre que cela ne m'étonnerait guère."
 lmf_heir_trait_trusting:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est d'une crédulité confondante. Sa naïveté ferait presque peur, tant le discernement lui semble être une notion des plus abstraites."
 lmf_heir_trait_compassionate:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est d'une bienveillance des plus mièvre. À trop avoir le cœur sur la main on fini par l'exposer au danger."
 lmf_heir_trait_callous:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est d'une insensibilité troublante. Je peine à croire qu'il y ait un cœur qui bat dans cette poitrine qui est la sienne."
 lmf_heir_trait_sadistic:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est capable de cruauté gratuite. Ce n'est même pas que la souffrance d'autrui l'indiffère, c'est qu'[ROOT.GetCharacter.Custom('FR_IlElle')] semble même en tirer de la jubilation."
 lmf_heir_trait_stubborn:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] a la tête dure. L'exemple typique d'une personne incapable de se remettre en question."
 lmf_heir_trait_fickle:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] versatile. Incapable de prendre une décision et de s'y tenir."
 lmf_heir_trait_eccentric:0 "son comportement est devenu erratique, voir irrationnel. Bien malin celui qui arrivera à décortiquer les rouages de son esprit."
 lmf_heir_trait_vengeful:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] a la rancœur tenace. La moindre contumélie qui lui serait infligée pourrait provoquer de sa part des représailles semblables au Fléau d'antan."
 lmf_heir_trait_forgiving:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est disposé[ROOT.GetCharacter.Custom('FR_E')] à pardonner si aisément. La miséricorde est son sacerdoce, et aucune faute ne semble inexpiable à ses yeux."
 lmf_heir_trait_drunkard:0 "la boisson l'a transformé. [ROOT.GetCharacter.Custom('FR_IlElle')|U] a beau tourner la chose avec humour lorsque j'aborde le sujet, ses joues n'en deviennent pas moins pourpres pour autant, ni son allure moins grotesque."
 lmf_heir_trait_rakish:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] n'a aucun égard pour la bienséance, s'autorisant tous les écarts de bonne conduite, aussi graveleux et grivois soient-ils, dès lors qu'un[ROOT.GetCharacter.Custom('FR_EOpp')] jeune [ROOT.GetCharacter.Custom('WomanManOpposite')] s'approche."
 lmf_heir_trait_rakish_homosexual:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] n'a aucun égard pour la bienséance, s'autorisant tous les écarts de bonne conduite, aussi graveleux et grivois soient-ils, dès lors qu'un[ROOT.GetCharacter.Custom('FR_E')] jeune [ROOT.GetCharacter.Custom('WomanManOpposite')] s'approche."
 lmf_heir_trait_rakish_bisexual:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] n'a aucun égard pour la bienséance, s'autorisant tous les écarts de bonne conduite, aussi graveleux et grivois soient-ils, envers toutes et tous."
 lmf_heir_trait_reclusive:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] s'imagine que s'emmurer dans la solitude serait la solution à tous les problèmes. Comme si l'isolement pouvait [ROOT.GetCharacter.Custom('FR_LeLa')] garder de tous périls."
 lmf_heir_trait_irritable:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est devenu[ROOT.GetCharacter.Custom('FR_E')] acariâtre, capable de s'emporter à la moindre contrariété."
 lmf_heir_trait_profligate:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] ne fait montre d'aucune demi-mesure lorsqu'[ROOT.GetCharacter.Custom('FR_IlElle')] lui vient l'envie de dépenser. Sa bêtise devenant un puits sans fond qui engloutit la moindre richesse amassée."
 lmf_heir_trait_improvident:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est prompt[ROOT.GetCharacter.Custom('FR_E')] à faire preuve de munificence. Incapable de considérer le bien commun autrement que par des dons irréfléchis."
 lmf_heir_trait_contrite:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] ne sait pas tenir sa langue. Ses cas de conscience [ROOT.GetCharacter.Custom('FR_LeLa')] poussent trop souvent à confesser à foison la moindre #italic faute#!."
 lmf_heir_trait_inappetetic:0 "[ROOT.GetCharacter.Custom('FR_IlElle')] est frugal[ROOT.GetCharacter.Custom('FR_E')], à tout le moins. Un tel rejet de la nourriture ne peut qu'avoir de graves conséquences sur sa santé."
 lmf_heir.1612.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] au caractère [heir_trait.GetNameNoTooltip( your_heir )|l]"
 lmf_heir.1612.desc.opening:0 "Après avoir passé tant de temps à former [your_heir.GetFirstName] en vue du jour où [your_heir.Custom('FR_IlElle')] me succédera, je ne peux feindre de ne pas avoir remarqué à quel point [your_heir.Custom('heir_trait_description')]\n\nPlus j'y pense et plus cela me travaille. "
 lmf_heir.1612.desc.opposite:0 "Comment m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('your_heir'))] peut-[your_heir.Custom('FR_IlElle')] être si différent[your_heir.Custom('FR_E')] de moi ?\n\n"
 lmf_heir.1612.desc.alsosinful:0 "Je ne suis certes pas un parangon de vertu, mais les craintes que j'éprouve à son égard sont légitimes.\n\n"
 lmf_heir.1612.desc.sinful:0 "Est-ce donc moi qui ait fait de mon hériti[your_heir.Custom('FR_ErEre')] un[your_heir.Custom('FR_E')] te[your_heir.Custom('FR_LLle')] péch[your_heir.Custom('FR_EurEresse')] ?\n\n"
 lmf_heir.1612.desc.default:0 "C'est un comportement des plus inappropriés pour un[your_heir.Custom('FR_E')] [your_heir.GetWomanMan] de son statut.\n\n"
 lmf_heir.1612.desc.end:0 "Le fait est qu'avec tout ce temps que nous partageons ensemble, il ne serait pas inenvisageable que je puisse lui faire entendre raison sur ce qu'il est bon ou non de faire."
 lmf_heir.1612.a:0 "C'est de mon hériti[your_heir.Custom('FR_ErEre')] qu'il s'agit. Je ne peux pas laisser passer ça."
 lmf_heir.1612.a.success.tt:0 "Vous parvenez à faire entendre raison à [your_heir.GetFirstNameNoTooltip]"
 lmf_heir.1612.a.failure.tt:0 "[your_heir.GetFirstNameNoTooltip] refuse d'entendre raison"
 tried_to_change_heir:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] tenté d'incliner de force [CHARACTER.LocalPlayerString('votre personnalité', 'la personnalité')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')]"
 tried_to_change_heir_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] tenté d'incliner de force [TARGET_CHARACTER.LocalPlayerString('votre personnalité', 'la personnalité')][TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_TARGET_du_GetShortUIName')]"
 lmf_heir.1612.b:0 "Qu'importe. Nul n'est parfait après tout."
 lmf_heir.1613.t:0 "Ce qu'implique un grand pouvoir"
 lmf_heir.1613.desc:0 "C'est grande tristesse de devoir l'admettre, mais [your_heir.GetFirstName] n'a pas avoir montré une grande assiduité dans ses devoirs d'hériti[your_heir.Custom('FR_ErEre')] ces derniers temps.\n\nSes responsabilités sont aussi nombreuses qu'elles sont exigeantes — et ne le sont pas moins les leçons qu'il lui faut apprendre. Gouverner [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] n'est guère aisé, et apprendre à bien le faire est un labeur de longue haleine. Malheureusement, cela ne semble pas être la priorité de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))]."
 lmf_heir.1613.a:0 "Il va falloir qu'[your_heir.Custom('FR_IlElle')] se ressaisisse, et au plus vite."
 lmf_heir.1614.t:0 "Plus qu'une dévotion, une vocation."
 lmf_heir.1614.desc:0 "C'est grande joie que de voir [your_heir.GetFirstName] faire grand cas de ses responsabilités envers [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] en tant qu'hériti[your_heir.Custom('FR_ErEre')] d'un tel titre.\n\n[your_heir.Custom('FR_IlElle')|U] participe aux intérêts de la Cour, s'entretient avec les conseillers, s'enquiert des affaires de la roture.\n\nTout ce qui lui reste à faire maintenant c'est de trouver le temps de souffler un peu."
 lmf_heir.1614.a:0 "[your_heir.Custom('FR_IlElle')|U] est promis[your_heir.Custom('FR_E')] à un brillant avenir."
 lmf_heir.1615.t:0 "La plus sincère des flatteries"
 lmf_heir.1615.desc:0 "J'imagine qu'après tout ce temps passé en compagnie de [your_heir.GetFirstName], je ne dois pas être surpris[ROOT.Char.Custom('FR_E')] de voir à quel point [your_heir.Custom('FR_IlElle')] me ressemble de plus en plus.\n\nSes yeux m'observent et son corps imite, dans le parler comme dans le mouvement. Tant et si bien que j'ai l'impression de découvrir des facettes de ma personnalité que j'ignorais totalement, et qu'il aurait été bon qu[your_heir.Custom('FR_EluiElle')] les ignore.\n\nMais l'admiration est source d'imitation après tout, n'est-ce pas ?"
 lmf_heir.1615.a:0 "[your_heir.Custom('FR_IlElle')|U] devrait essayer d'être un peu plus… [your_heir.Custom('FR_LuiElle')]-même."
 lmf_heir.1625.t:0 "Un voyage initiatique ?"
 lmf_heir.1625.desc.start:0 "Le point du jour s'en va à peine et c'est [your_heir.GetFirstName] qui le succède, désireu[your_heir.Custom('FR_XSe')] de me soumettre une demande qu'[your_heir.Custom('FR_IlElle')] juge digne d'intérêt.\n\n"
 lmf_heir.1625.desc.family:0 "« [your_heir.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], "
 lmf_heir.1625.desc.notfamily:0 "« [ROOT.Char.Custom('FR_MonseigneurMadame')|U], "
 lmf_heir.1625.desc.mid:0 "vous faites de votre mieux pour me préparer au jour où je devrais gouverner, je le comprends, mais il serait très réducteur de penser que toute la sagesse du monde se trouve ici, à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Laissez-moi donc découvrir ce qui se cache au-delà. Je pourrais me rendre chez [your_heir.Custom2('direct_address_by_familiarity', SCOPE.sC('your_vassal'))] par exemple. »\n\nComprenant qu'il en faut davantage pour me convaincre, [your_heir.Custom('FR_IlElle')] poursuit : « [your_vassal.Custom('FR_IlElle')|U] est "
 lmf_heir.1625.desc.diplomacy:0 "adroit[your_vassal.Custom('FR_E')] dans l'art de la diplomatie, "
 lmf_heir.1625.desc.martial:0 "un[your_vassal.Custom('FR_E')] expert[your_vassal.Custom('FR_E')] des sujets militaires, "
 lmf_heir.1625.desc.stewardship:0 "plus que versé[your_vassal.Custom('FR_E')] dans tout ce qui a trait à l'intendance, "
 lmf_heir.1625.desc.intrigue:0 "véritablement habile dès lors qu'on rentre dans les subtilités de l'intrigue, "
 lmf_heir.1625.desc.learning:0 "lettré[your_vassal.Custom('FR_E')] et instruit[your_vassal.Custom('FR_E')] comme peu [Select_CString(your_vassal.IsFemale,'de femmes','d’hommes')] le sont, "
 lmf_heir.1625.desc.bridge:0 "de plus, "
 lmf_heir.1625.desc.myfriend:0 "c'est un[your_vassal.Custom('FR_E')] très bo[your_vassal.Custom('FR_NNne')] ami[your_vassal.Custom('FR_E')] à moi. "
 lmf_heir.1625.desc.friend:0 "c'est l'un[your_vassal.Custom('FR_E')] de vos ami[your_vassal.Custom('FR_E')]s. "
 lmf_heir.1625.desc.ally:0 "c'est votre allié[your_vassal.Custom('FR_E')]. "
 lmf_heir.1625.desc.alsofamily:0 "[your_vassal.Custom('FR_IlElle')] est de la famille. "
 lmf_heir.1625.desc.vassal:0 "votre vassal[your_vassal.Custom('FR_E')]. "
 lmf_heir.1625.desc.liege:0 "notre [your_vassal.GetTitleAsNameNoTooltip|l]. "
 lmf_heir.1625.desc.realm:0 "je n'aurais même pas à quitter [ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]. "
 lmf_heir.1625.desc.end:0 "Je suis convaincu[your_vassal.Custom('FR_E')] que quelques mois passés à ses côtés à [your_vassal.GetPrimaryTitle.GetNameNoTierNoTooltip] pourrait m'être grandement profitable. Qu'en pensez-vous ? »\n\nLorsque sa plaidoirie prend fin, je réalise qu'il n'est pas inenvisageable que cela ne soit qu'un simple prétexte. Une excuse, aussi finaude soit-elle, pour aller s'adonner à quelques frasques loin d'ici. Mais y aurait-il alors vraiment matière à blâmer quelqu'un pour la simple envie d'une fugace escapade ?"
 lmf_heir.1625.a:0 "Allez m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))], et faites bon usage de ce séjour."
 lmf_heir.1625.a.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] se rendra auprès [your_vassal.Custom('FR_du_Char_Pi')][your_vassal.GetTitledFirstName] pour un séjour de six mois à [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], lequel pourrait être bénéfique pour sa formation d'hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.1625.a.player.tt:0 "Il faudra au préalable demander [your_vassal.Custom('FR_au_Char_Pi')][your_vassal.GetTitledFirstName] [your_vassal.Custom('FR_SilSielle')] est enclin[your_vassal.Custom('FR_E')] à accueillir [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName]"
 lmf_heir.1625.b:0 "C'est à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] qu'est votre place."
 lmf_heir.1626.opening:0 "[heir_liege.Custom2('AppropriateGreetingPositive', ROOT.Char)]"
 lmf_heir.1626.desc.opening.family:0 "M[heir_liege.Custom2('FR_LMF_RelationToMeShort_OnA', your_heir )], [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName], a exprimé son désir de vous rendre visite pour les prochains mois à venir.\n\n"
 lmf_heir.1626.desc.opening:0 "Je vous adresse par la présente, une requête afin que mon hériti[your_heir.Custom('FR_ErEre')], [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName], puisse vous rendre visite pour les prochains mois à venir.\n\n"
 lmf_heir.1626.desc:0 "Je ne sollicite nullement un engagement de votre part, hormis lui garantir la sécurité. C'est à dessein de s'enrichir l'esprit qu'[your_heir.Custom('FR_IlElle')] séjournera à [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip], pour y connaître vos us, y découvrir vos gens, et tout ce qui lui sera bon d'apprendre. Y consentez-vous ?"
 lmf_heir.1626.a:0 "C'est avec joie que je l'accueillerais dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')]."
 lmf_heir.1626.a.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] viendra séjourner à [your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] pour une durée de six mois"
 lmf_heir.1626.b:0 "Hélas non, vous m'en voyez navré[ROOT.Char.Custom('FR_E')]."
 lmf_heir.1627.opening:0 "[your_vassal.Custom2('GreetingToLiegePositive', ROOT.Char)],"
 lmf_heir.1627.desc:0 "C'est avec joie que j'accueillerais [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] dans m[your_vassal.Custom('FR_ResidenceBuilding_OnA')]. [your_heir.Custom('FR_IlElle')|U] sera traité[your_heir.Custom('FR_E')] en hôte de marque."
 lmf_heir.1627.a:0 "Fort bien."
 lmf_heir.1628.opening:0 "[your_vassal.Custom2('GreetingToLiege', ROOT.Char)],"
 lmf_heir.1628.desc:0 "Hélas, le moment est mal choisi, vous m'en voyez navré[your_vassal.Custom('FR_E')]. [your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] pourra goûter à l'hospitalité de m[your_vassal.Custom('FR_ResidenceBuilding_OnA')] une prochaine fois."
 lmf_heir.1628.a:0 "En lieu et place, [alternate_vassal.Custom('FR_le_Char_Pi')][alternate_vassal.GetTitledFirstName] pourrait l'accueillir à [alternate_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1628.b:0 "Fichtre."
 lmf_heir.1630.t.cancel:0 "Visite annulée"
 lmf_heir.1630.desc.title:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] a été contraint[your_heir.Custom('FR_E')] d'annuler sa visite puisqu'[your_heir.Custom('FR_IlElle')] gouverne désormais [your_heir.GetPrimaryTitle.GetNameNoTierNoTooltip] en tant que [your_heir.GetTitleAsNameNoTooltip|l]."
 lmf_heir.1630.desc.war:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] a été sommé de rentrer en raison de la guerre qui a éclaté."
 lmf_heir.1630.desc.target.death:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] a été contraint[your_heir.Custom('FR_E')] d'annuler sa visite en raison de la mort [heir_visit_target.Custom('FR_du_Char_Pi')][heir_visit_target.GetTitledFirstName]."
 lmf_heir.1630.desc.heir.death:0 "La visite [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstName] a été annulée en raison de sa mort prématurée."
 lmf_heir.1630.desc.imprisoned:0 "La visite [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstName] a été annulée en raison de son emprisonnement."
 lmf_heir.1630.desc.incapable:0 "La visite [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstName] a été annulée après qu'[your_heir.Custom('FR_IlElle')] soit devenu[your_heir.Custom('FR_E')] [GetTrait('incapable').GetName(your_heir)|l]."
 lmf_heir.1630.desc.notheir:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] a été contraint[your_heir.Custom('FR_E')] d'annuler sa visite puisqu'[your_heir.Custom('FR_IlElle')] n'est plus l'hériti[your_heir.Custom('FR_ErEre')] [heir_liege.Custom('FR_du_Char_U_Pi')][heir_liege.GetShortUINameNoFormat]."
 lmf_heir.1630.desc.notruler:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] a été contraint[your_heir.Custom('FR_E')] d'annuler sa visite puisque [heir_liege.Custom('FR_le_Char_U_Pi')][heir_liege.GetShortUINameNoFormat] n'est plus un[heir_liege.Custom('FR_E')] dirigeant[heir_liege.Custom('FR_E')]."
 lmf_heir.1631.t.cancel:0 "[your_heir.GetFirstNameNoTooltip] rentre à [your_heir.GetLiege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]"
 lmf_heir.1631.desc.dead:0 "[your_heir.GetFirstName] a été contraint[your_heir.Custom('FR_E')] d'écourter son séjour en raison de la mort soudaine [heir_visit_target.Custom('FR_du_Char_U_Pi')][heir_visit_target.GetShortUINameNoFormat]."
 lmf_heir.1631.desc.notruler:0 "[your_heir.GetFirstName] a été contraint[your_heir.Custom('FR_E')] d'écourter son séjour puisque [heir_visit_target.Custom('FR_le_Char_U_Pi')][heir_visit_target.GetShortUINameNoFormat] ne [Select_CString( heir_visit_target.IsLocalPlayer, 'gouvernez', 'gouverne' )] plus [target_county.GetNameNoTierNoTooltip]."
 lmf_heir.1631.desc.imprisoned:0 "[your_heir.GetFirstName] a été contraint[your_heir.Custom('FR_E')] d'écourter son séjour en raison de l'emprisonnement [heir_visit_target.Custom('FR_du_Char_U_Pi')][heir_visit_target.GetShortUINameNoFormat]."
 lmf_heir.1631.desc.siege:0 "[your_heir.GetFirstName] a été contraint[your_heir.Custom('FR_E')] d'écourter son séjour chez [heir_visit_target.Custom('FR_le_Char_U_Pi')][heir_visit_target.GetShortUINameNoFormat] en raison du siège de [heir_visit_location.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1631.desc.isolating:0 "[your_heir.GetFirstName] a été contraint[your_heir.Custom('FR_E')] d'écourter son séjour chez [heir_visit_target.Custom('FR_le_Char_U_Pi')][heir_visit_target.GetShortUINameNoFormat] en raison de l'épidémie qui a frappé [heir_visit_location.GetCounty.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1631.desc.capital:0 "[your_heir.GetFirstName] a été contraint[your_heir.Custom('FR_E')] d'écourter son séjour chez [heir_visit_target.Custom('FR_le_Char_U_Pi')][heir_visit_target.GetShortUINameNoFormat] en raison de l'épidémie qui a frappé [heir_visit_location.GetCounty.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1631.desc.incapable:0 "[your_heir.GetFirstName] a été contraint[your_heir.Custom('FR_E')] d'écourter son séjour puisque [heir_visit_target.Custom('FR_le_Char_U_Pi')][heir_visit_target.GetShortUINameNoFormat] [Select_CString( heir_visit_target.IsLocalPlayer, 'êtes', 'est' )] devenu[heir_visit_target.Custom('FR_E')] [GetTrait('incapable').GetName(heir_visit_target)|l]."
 lmf_heir.1631.desc:0 "[your_heir.GetFirstName] a été contraint[your_heir.Custom('FR_E')] d'écourter son séjour."
 lmf_heir.1632.t:0 "Rappeler [your_heir.GetFirstNameNoTooltip] ?"
 lmf_heir.1632.desc.atwar.primary:0 "La guerre gronde, pour [heir_host.Custom('FR_le_Char_Pi')][heir_host.GetTitledFirstName] comme pour moi, ce qui amène un épineux problème, comme il n'est pas rare d'en voir dans de telles situations. En l'occurrence, il s'agit de [your_heir.GetFirstName] qui est présentement en visite chez [heir_host.Custom('FR_LuiElle')].\n\nIl serait fort avisé de ne pas laisser m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', your_heir )] là-bas, et de [your_heir.Custom('FR_LeLa')] sommer de rentrer derechef."
 lmf_heir.1632.desc.atwar.rootattacker:0 "La guerre qui nous oppose, [defender.Custom('FR_le_Char_Pi')][defender.GetTitledFirstName] et moi-même, amène un épineux problème, comme il n'est pas rare d'en voir dans de telles situations. En l'occurrence, [heir_host.Custom('FR_le_Char_Pi')][heir_host.GetTitledFirstName] a pris [heir_host.Custom('FR_LuiElle')] aussi les armes contre moi, et [your_heir.GetFirstName] est présentement en visite chez [heir_host.Custom('FR_LuiElle')].\n\nIl serait fort avisé de ne pas laisser m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', your_heir )] là-bas, et de [your_heir.Custom('FR_LeLa')] sommer de rentrer derechef."
 lmf_heir.1632.desc.atwar.rootdefender:0 "La guerre qui nous oppose, [attacker.Custom('FR_le_Char_Pi')][attacker.GetTitledFirstName] et moi-même, amène un épineux problème, comme il n'est pas rare d'en voir dans de telles situations. En l'occurrence, [heir_host.Custom('FR_le_Char_Pi')][heir_host.GetTitledFirstName] a pris [heir_host.Custom('FR_LuiElle')] aussi les armes contre moi, et [your_heir.GetFirstName] est présentement en visite chez [heir_host.Custom('FR_LuiElle')].\n\nIl serait fort avisé de ne pas laisser m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', your_heir )] là-bas, et de [your_heir.Custom('FR_LeLa')] sommer de rentrer derechef."
 lmf_heir.1632.desc.atwar:0 "La guerre qui oppose [defender.Custom('FR_le_Char_Pi')][defender.GetTitledFirstName] et [attacker.Custom('FR_le_Char_Pi')][attacker.GetTitledFirstName] amène un épineux problème, comme il n'est pas rare d'en voir dans de telles situations. En l'occurrence, [heir_host.Custom('FR_le_Char_Pi')][heir_host.GetTitledFirstName] est désormais en guerre contre moi, et [your_heir.GetFirstName] est présentement en visite chez [heir_host.Custom('FR_LuiElle')].\n\nIl serait fort avisé de ne pas laisser m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', your_heir )] là-bas, et de [your_heir.Custom('FR_LeLa')] sommer de rentrer derechef."
 lmf_heir.1632.desc:0 "La guerre qui gronde soulève désormais la question de savoir si oui ou non [your_heir.GetFirstName] devrait mettre un terme à son séjour auprès [heir_host.Custom('FR_du_Char_Pi')][heir_host.GetTitledFirstName].\n\n[your_heir.Custom('FR_IlElle')|U] n'est certes pas en danger immédiat, mais quand bien même sa présence à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] n'est pas indispensable, je ne peux omettre l'idée qu'[your_heir.Custom('FR_IlElle')] y serait plus en sécurité."
 lmf_heir.1632.a:0 "Ce serait plus sage en effet."
 lmf_heir.1632.b:0 "[your_heir.GetFirstNameNoTooltip] est très bien là où [your_heir.Custom('FR_IlElle')] est."
 lmf_heir.1633.t:0 "Une visite de marque"
 lmf_heir.1633.desc.begin:0 "[heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )|U] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] est arrivé[your_heir.Custom('FR_E')] à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], comme convenu, "
 lmf_heir.1633.desc.away:0 "malheureusement je n'ai pas pu l'accueillir en personne, et il est peu probable que je [your_heir.Custom('FR_LeLa')] vois davantage au cours de son séjour.\n\nDu reste, je dois décider si je lui accorde un libre accès dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')]. Il n'est pas impossible qu'[your_heir.Custom('FR_IlElle')] entend ou voit des choses qu'il serait bon de ne pas laisser être ébruitées hors les murs, à dessein ou avec fortuité. Des choses qui finiraient immanquablement par arriver jusqu'aux oreilles de s[your_heir.Custom2('FR_LMF_RelationToMeShort_OnA', heir_liege )].\n\nPar prudence, je pourrais juste [your_heir.Custom('FR_LeLa')] laisser aller et venir à guise dans le reste de mon domaine."
 lmf_heir.1633.desc.end:0 "et je l'ai accueilli comme il se doit.\n\nÀ présent que les civilités ont été observées, j'en viens à considérer deux possibilités quant à son séjour. Je puis lui consacrer du temps au cours des prochains mois, ce qui nous permettra entre autres d'apprendre à mieux nous connaître — ou bien je lui accorde simplement un libre accès dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], auquel cas il n'est pas impossible qu'[your_heir.Custom('FR_IlElle')] entend ou voit des choses qu'il serait bon de ne pas laisser être ébruitées hors les murs, à dessein ou avec fortuité. Des choses qui finiraient immanquablement par arriver jusqu'aux oreilles de s[your_heir.Custom2('FR_LMF_RelationToMeShort_OnA', heir_liege )]."
 lmf_heir.1633.a:0 "Ce sera l'occasion d'apprendre à mieux nous connaître."
 lmf_heir.1633.a.tt:0 "#EMP [your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] passera les prochains mois dans votre [THIS.Char.Custom('FortifiedBuilding')] à s'entraîner avec vous et vos courtisans. Cela améliorera probablement votre relation, mais il n'est pas impossible qu'[your_heir.Custom('FR_IlElle')] provoque du désordre et découvre certains de vos secrets.#!"
 spent_time_with_visiting_heir:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'avez', 'ont')] passé du temps ensemble lors d’un séjour dans [CHARACTER.LocalPlayerString('votre', 'le')] domaine[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltip')]."
 spent_time_with_visiting_heir_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'avez', 'ont')] passé du temps ensemble lors d’un séjour dans [TARGET_CHARACTER.LocalPlayerString('votre', 'le')] domaine[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUINameNoTooltip')]."
 lmf_heir.1633.b:0 "[your_heir.Custom('FR_IlElle')|U] peut rester, mais j'ai bien d'autres affaires qui requièrent mes soins."
 lmf_heir.1633.c:0 "Nous trouverons bien de quoi l'occuper."
 lmf_heir.1633.c.tt:0 "#EMP [your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] passera les prochains mois dans votre [THIS.Char.Custom('FortifiedBuilding')] à s'entraîner avec vos courtisans. Il n'est pas impossible qu'[your_heir.Custom('FR_IlElle')] provoque du désordre, mais il y a peu de chance que ça dégénère.#!"
 lmf_heir.1633.d:0 "Je ne suis pas aubergiste, je me fiche de ce qu'[your_heir.Custom('FR_IlElle')] vient faire ici."
 lmf_heir.1633.d.tt:0 "#EMP [your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] ne sera pas autorisé[your_heir.Custom('FR_E')] à se déplacer librement dans votre [THIS.Char.Custom('FortifiedBuilding')] et sera cantonné[your_heir.Custom('FR_E')] au reste de votre domaine. Il n'est pas impossible qu'[your_heir.Custom('FR_IlElle')] provoque du désordre, et que cela déplaise à s[your_heir.Custom2('FR_LMF_RelationToMeShort_OnA', heir_liege )].#!"
 lmf_heir.1651.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] fort plaisant[your_heir.Custom('FR_E')]"
 lmf_heir.1651.desc.away:0 "Même si je n'étais pas là pour le voir de mes propres yeux, j'ai ouï-dire que "
 lmf_heir.1651.desc.busy:0 "Malgré le peu de temps passé en sa compagnie, j'ai pu noter à quel point "
 lmf_heir.1651.desc.there:0 "Je suis fort aise de réaliser que "
 lmf_heir.1651.desc:0 "[heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] s'est avéré[your_heir.Custom('FR_E')] être un[your_heir.Custom('FR_E')] invité[your_heir.Custom('FR_E')] d'exception. En effet, [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] a fait montre d'une amabilité exemplaire envers les domestiques [ROOT.Char.Custom('FR_ResidenceBuilding_Du')], en plus d'avoir été fort serviable au sein de la cour.\n\nBien entendu, son séjour à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] n'est point encore terminé, et qui sait comment il évoluera, mais c'est assurément un début des plus prometteurs."
 lmf_heir.1651.a:0 "Que voilà un[your_heir.Custom('FR_E')] [your_heir.Custom('polite_gender_ref')] bien [your_heir.Custom('ComplimentAdjective')]."
 lmf_heir.1651.tt:0 "#EMP La visite [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstNameNoTooltip] aura plus de chances de bien se passer.#!"
 lmf_heir.1652.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] fort déplaisant[your_heir.Custom('FR_E')]"
 lmf_heir.1652.desc.away:0 "Bien que je n'étais pas là pour le voir de mes propres yeux, j'ai ouï-dire que "
 lmf_heir.1652.desc.busy:0 "Malgré le peu de temps passé en sa compagnie, j'ai pu noter à quel point "
 lmf_heir.1652.desc.there:0 "Je ne suis guère ravi[ROOT.Char.Custom('FR_E')] de réaliser que "
 lmf_heir.1652.desc:0 "[heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] n'est pas ce qu'on peut appeler un[your_heir.Custom('FR_E')] invité[your_heir.Custom('FR_E')] modèle. En effet, les domestiques rapportent un comportement malvenu de la part [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstName] : discourtois[your_heir.Custom('FR_E')], irritable, critique à l'égard de tout ce sur quoi se posent ses yeux ou ses mains.\n\nJe puis mettre ça sur le compte d'un temps d'adaptation dans ses nouveaux appartements, mais il est évident que cela n'augure pas un séjour des plus prometteurs à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1652.a:0 "C'est un[your_heir.Custom('FR_E')] [your_heir.Custom('WomanManGirlBoy')] pour le moins… [your_heir.Custom('InsultAdjective')]."
 lmf_heir.1652.tt:0 "#EMP La visite [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstNameNoTooltip] aura moins de chances de bien se passer.#!"
 lmf_heir.1653.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] bien discr[your_heir.Custom('FR_EtEte')]"
 lmf_heir.1653.desc.away:0 "Bien que je n'étais pas là pour le voir de mes propres yeux, j'ai ouï-dire que "
 lmf_heir.1653.desc.busy:0 "Malgré le peu de temps passé en sa compagnie, j'ai pu noter à quel point "
 lmf_heir.1653.desc.there:0 "Je ne suis guère ravi[ROOT.Char.Custom('FR_E')] de réaliser que "
 lmf_heir.1653.desc:0 "[heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] ne semble pas apprécier l'hospitalité de m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] en dehors des appartements qui lui ont été attribués. En effet, les domestiques rapportent que [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] y passe le plus clair de son temps, pour flâner ou lire ou que sais-je encore. Et quand [your_heir.Custom('FR_IlElle')] daigne faire grâce de sa présence, c'est un[your_heir.Custom('FR_E')] [your_heir.Custom('polite_gender_ref')] taiseu[your_heir.Custom('FR_XSe')] et évasi[your_heir.Custom('FR_FVe')] qui se montre.\n\nJe puis mettre ça sur le compte d'un temps d'adaptation dans un nouvel environnement, mais il est évident que cela n'augure pas un séjour des plus prometteurs à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1653.a:0 "Trop timide pour montrer sa frimousse ?"
 lmf_heir.1653.tt:0 "#EMP [your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] aura plus de chances de rester seul[your_heir.Custom('FR_E')] durant sa visite.#!"
 lmf_heir.1654.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] morose"
 lmf_heir.1654.desc.away:0 "Bien que je n'étais pas là pour le voir de mes propres yeux, j'ai ouï-dire que "
 lmf_heir.1654.desc.busy:0 "Malgré le peu de temps passé en sa compagnie, j'ai pu noter à quel point "
 lmf_heir.1654.desc.there:0 "Je ne suis guère ravi[ROOT.Char.Custom('FR_E')] de réaliser que "
 lmf_heir.1654.desc:0 "[heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] ne semble pas apprécier l'hospitalité de m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] autant que je le souhaiterais. En effet, les domestiques rapportent que [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] passe le plus clair de son temps dans ses appartements, desquels sortent des bruits de complainte et de gémissement. De toute évidence, [your_heir.Custom('FR_IlElle')] est impatient[your_heir.Custom('FR_E')] à l'idée de retourner à [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip].\n\nJe puis mettre ça sur le compte d'un temps d'adaptation dans un nouvel environnement, mais il est évident que cela n'augure pas un séjour des plus prometteurs à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1654.a:0 "Un mal du pays passager, pas de quoi s'inquiéter."
 lmf_heir.1654.tt:0 "#EMP La visite [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstNameNoTooltip] aura moins de chances de bien se passer.#!"
 lmf_heir.1655.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] taciturne"
 lmf_heir.1655.desc.away:0 "Même si je n'étais pas là pour le voir de mes propres yeux, j'ai ouï-dire que "
 lmf_heir.1655.desc.busy:0 "Malgré le peu de temps passé en sa compagnie, j'ai pu noter à quel point "
 lmf_heir.1655.desc.there:0 "Je suis fort aise de réaliser que "
 lmf_heir.1655.desc:0 "[heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] n'a semé nulle pagaille depuis son arrivée [ROOT.Char.Custom('FR_ResidenceBuilding_Au')]. Au contraire, [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] s'est avéré[your_heir.Custom('FR_E')] aussi calme que respectueu[your_heir.Custom('FR_XSe')], autant envers les domestiques que les us en vigueur.\n\nEn dépit de son caractère très réservé, que je puis mettre sur le compte d'un temps d'adaptation, je gage que tout ceci augure un séjour des plus prometteurs à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1655.a:0 "Trop timide pour montrer sa frimousse ?"
 lmf_heir.1655.tt:0 "#EMP La visite [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstNameNoTooltip] aura plus de chances de bien se passer.#!"
 lmf_heir.1656.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] importun[your_heir.Custom('FR_E')]"
 lmf_heir.1656.desc.away:0 "Bien que je n'étais pas là pour le voir de mes propres yeux, j'ai ouï-dire que "
 lmf_heir.1656.desc.busy:0 "Malgré le peu de temps passé en sa compagnie, j'ai pu noter à quel point "
 lmf_heir.1656.desc.there:0 "Je ne suis guère ravi[ROOT.Char.Custom('FR_E')] de réaliser que "
 lmf_heir.1656.desc:0 "[heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] a causé moult pagaille dès son arrivée. N'ayant cure des règles que les invités [ROOT.Char.Custom('FR_ResidenceBuilding_Au')] sont censés suivre, [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] a proprement parasité le travail des domestiques, par dédain ou par désintérêt pour la bienséance.\n\nUn temps nécessaire pour s'accoutumer à un nouvel environnement est compréhensible, mais cela ne pardonne pas tout, et il semble plus qu'évident que tout ceci n'augure rien de bien prometteur pour la suite de son séjour à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1656.a:0 "Est-ce à dire que je vais regretter de l'avoir accueilli[your_heir.Custom('FR_E')] ?"
 lmf_heir.1656.tt:0 "#EMP La visite [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstNameNoTooltip] aura moins de chances de bien se passer.#!"
 lmf_heir.heir.progress.minor.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] progresse légèrement dans sa formation d'hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.heir.progress.moderate.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] progresse modérément dans sa formation d'hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.heir.progress.large.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] progresse fortement dans sa formation d'hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.heir.progress.negative.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] perd légèrement en progression dans sa formation d'hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.1660.t:0 "En compagnie de l'hériti[your_heir.Custom('FR_ErEre')]"
 lmf_heir.1660.desc.first.annoy:0 "Par [ROOT.Char.GetFaith.NegativeAfterLife], dans quel bourbier me suis-je empêtré ? Depuis plusieurs semaines déjà, [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] est devenu[your_heir.Custom('FR_E')] te[your_heir.Custom('FR_LLle')] mon ombre. Une ombre bruyante et insistante, dont les questions sont si nombreuses, que la première semble encore résonner quand la suivante est déjà posée.\n\n#italic Et pourquoi ci ? Et pourquoi ça ?#!\nDes questions, encore des questions, toujours des questions. Sa curiosité n'étant jamais étanchée, [your_heir.Custom('FR_IlElle')] m'accompagne de part et d'autres [ROOT.Char.Custom('FR_ResidenceBuilding_Du')], pour participer à ma routine et m'aider dans mes obligations. Mais tout bien intentionné qu'[your_heir.Custom('FR_IlElle')] puisse être, plus [your_heir.Custom('FR_IlElle')] s'essaie à être serviable, plus [your_heir.Custom('FR_IlElle')] en devient une gêne quotidienne.\n\nEt finalement, quelle que soit la question posée, la réponse se termine invariablement par le soupir d'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] dans l'attente d'être délivré[ROOT.Char.Custom('FR_E')] de cette obligation."
 lmf_heir.1660.desc.first.helpful:0 "Jusqu'à présent, la formation [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstName] n'a souffert d'aucun trouble.\n\nS'étant rapidement accoutumé[your_heir.Custom('FR_E')] à la vie dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], [your_heir.Custom('FR_IlElle')] fait montre d'une grande obligeance à mon égard, sans pour autant être une gêne. Toujours là pour donner un coup de main, sans jamais se retrouver dans mes pieds.\n\nEspérons que son séjour à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] se poursuive de la sorte."
 lmf_heir.1660.desc.second.begin:0 "Comme convenu avec [heir_liege.Custom('FR_le_Char_Pi')][heir_liege.GetTitledFirstName], les dernières semaines ont été en partie consacrées à la formation de s[heir_liege.Custom2('FR_LMF_RelationToMeShort_OnA', your_heir )], "
 lmf_heir.1660.desc.second.annoy.wasannoy:0 "et force est de constater que [your_heir.Custom('FR_SilSielle')] était un[your_heir.Custom('FR_E')] [your_heir.Custom('polite_gender_ref')] importun[your_heir.Custom('FR_E')] à son arrivée, l'air vivifiant des [ROOT.Char.GetCapitalLocation.Custom('FR_TerrainTypeProvince_Plural')] ne l'a en rien bonifié.\n\n"
 lmf_heir.1660.desc.second.annoy.washelpful:0 "et si j'appréciais sa compagnie jusque-là, à mon grand dam, cette appréciation a fini par se heurter à son incessante présence au sein de m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')].\n\n"
 lmf_heir.1660.desc.second.helpful.wasannoy:0 "et si je ne voyais en [your_heir.Custom('FR_LuiElle')] qu'un[your_heir.Custom('FR_E')] [your_heir.Custom('polite_gender_ref')] par trop [your_heir.Custom('InsultAdjective')], je ne suis point peiné[ROOT.Char.Custom('FR_E')] de constater que mon jugement était, à tout le moins, hâtif.\n\n"
 lmf_heir.1660.desc.second.helpful.washelpful:0 "et c'est avec force joie que je lui fais grâce de mon hospitalité, car sa compagnie n'a point cessé d'être plaisante comme au premier jour de son arrivée.\n\n"
 lmf_heir.1660.desc.second.annoy:0 "J'ai conscience que [your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] ne cherche qu'à se rendre utile, mais son manque de tact en fait une gêne, à l'image d'un caillou dans une botte qui, malgré toute sa bonne volonté, n'en reste pas moins un caillou dans une botte.\n\nFort heureusement, la fin de son séjour se rapproche un peu plus à chaque nuitée qui passe."
 lmf_heir.1660.desc.second.helpful:0 "Je dois avouer que je reste encore pantois[ROOT.Char.Custom('FR_E')] devant la facilité avec laquelle [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] s'est acclimaté[your_heir.Custom('FR_E')] à mes habitudes, tant et si bien qu'[your_heir.Custom('FR_IlElle')] est devenu[your_heir.Custom('FR_E')] comme une sorte de [Select_CString(your_heir.IsFemale,'camériste','valet')] de confiance, ou bien d'intendant[your_heir.Custom('FR_E')] personne[your_heir.Custom('FR_LLle')] pour utiliser un terme plus reluisant, m'assistant dans diverses tâches, plus ou moins ingrates.\n\nÀ mon grand dam, son séjour ici est voué à se terminer bientôt."
 lmf_heir.1660.desc.third.begin:0 "Mes journées continuent d'être agrémentées de la présence [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstName], "
 lmf_heir.1660.desc.third.annoy.wasannoy:0 "et ma patience ne s'en trouve que toujours plus effritée. Son temps n'a peut-être aucune valeur pour le gâcher ainsi à m'importuner, mais le mien est précieux !\n\n"
 lmf_heir.1660.desc.third.annoy.washelpful:0 "et ma patience jusque-là épargnée, s'en trouve désormais malmenée. Je n'ai plus qu'une hâte : [your_heir.Custom('FR_LeLa')] voir quitter les lieux.\n\n"
 lmf_heir.1660.desc.third.helpful.wasannoy:0 "et si je ne voyais en [your_heir.Custom('FR_LuiElle')] qu'un[your_heir.Custom('FR_E')] [your_heir.Custom('polite_gender_ref')] par trop [your_heir.Custom('InsultAdjective')], je ne suis point peiné[ROOT.Char.Custom('FR_E')] de constater que mon jugement était, à tout le moins, hâtif.\n\n"
 lmf_heir.1660.desc.third.helpful.washelpful:0 "et je gage que son départ laissera un vide dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')].\n\n"
 lmf_heir.1660.desc.third.annoy:0 "De l'air pardi ! Que dis-je, de l'air ? Du vent, putain !\n\nJ'ose croire que [heir_liege.Custom('FR_le_Char_Pi')][heir_liege.GetTitledFirstNameNoTooltip] me rendra grâces pour tout ce temps consacré à s[heir_liege.Custom2('FR_LMF_RelationToMeShort_OnA', your_heir )], tout comme je rendrais grâces [ROOT.Char.GetFaith.PantheonTerm2] de m'en libérer."
 lmf_heir.1660.desc.third.helpful:0 "Force est de constater que c'est sur une note positive que va s'achever son séjour, et je m'en réjouis d'autant que j'en déplore l'idée qu'il s'achève."
 lmf_heir.1660.a:0 "[Select_CString(your_heir.IsFemale,'Gente','Brave')] [your_heir.Custom('WomanManGirlBoy')] que voici."
 lmf_heir.1660.b:0 "Ça oui, qu'on m'en libère, et prestement !"
 spent_time_with_heir:0 "[Select_CString(TARGET_CHARACTER.IsLocalPlayer,'Votre','La')] formation d'hériti[TARGET_CHARACTER.Custom('FR_ErEre')][TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] a été l'occasion de passer du temps avec [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName], et de bénéficier d'une expérience mutuellement enrichissante."
 spent_time_with_heir_corresponding:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Votre','La')] formation d'hériti[CHARACTER.Custom('FR_ErEre')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] a été l'occasion de passer du temps avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName], et de bénéficier d'une expérience mutuellement enrichissante."
 annoyed_by_heir_training:0 "[Select_CString(TARGET_CHARACTER.IsLocalPlayer,'Votre','La')] formation d'hériti[TARGET_CHARACTER.Custom('FR_ErEre')][TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] a fini par provoquer [Select_CString(CHARACTER.IsLocalPlayer,'votre ','l’')]agacement[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')]."
 annoyed_by_heir_training_corresponding:0 "[Select_CString(CHARACTER.IsLocalPlayer,'Votre','La')] formation d'hériti[CHARACTER.Custom('FR_ErEre')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] a fini par provoquer [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre ','l’')]agacement[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')]."
 lmf_heir.1661.t:0 "In Close Company"
 lmf_heir.1661.desc.start:0 "I've spent the last couple of weeks in the company of [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )], training [your_heir.GetHerHim] to be a proper ruler as [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] requested, and lately I've noticed the [your_heir.Custom('GetLassLad')]'s behavior has been... different.\n\n"
 lmf_heir.1661.desc.child:0 "[your_heir.GetTitledFirstNameNoTooltip] dotes on me, smiling and laughing at almost anything I say, and whenever we meet I notice [your_heir.GetHerHis] cheeks are flushed. Naturally, the [your_heir.Custom('GetLassLad')] is still just a child, but anyone with a pair of eyes would notice that [your_heir.GetSheHe]'s developed a crush.\n\n"
 lmf_heir.1661.desc.adult:0 "[your_heir.GetTitledFirstNameNoTooltip] smiles often, taking any excuse at all to touch my hand or my shoulder, and when our eyes meet there is a lingering sense of keen interest. Letting this go any further would undoubtedly violate [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMePossessive', heir_liege )] trust, but it's also very clear that the [your_heir.Custom('GetLassLad')] is in favor of doing just that.\n\n"
 lmf_heir.1661.desc.end:0 "The choice is on me, then: do I end this here and now, before it goes too far?"
 lmf_heir.1661.a:0 "Why end it, if this is what the [your_heir.Custom('GetLassLad')] wants?"
 lmf_heir.1661.b:0 "A fun diversion, but the moment [your_heir.GetHerHis] visit is over we're done."
 lmf_heir.1661.c:0 "I'm flattered. Maybe once [your_heir.GetSheHe]'s older...?"
 lmf_heir.1661.d:0 "Yes, let's shut this down before it goes further."
 bonded_while_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] began a romance with [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] while training [CharYouHerHim(TARGET_CHARACTER)] as an heir."
 bonded_while_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] began a romance with [CHARACTER.GetShortUINameNoTooltipNoFormat] while training [CharYouHerHim(CHARACTER)] as an heir."
 crush_while_heir_training:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] developed a crush on [CHARACTER.GetShortUINameNoTooltipNoFormat] while being trained as an heir by [CharYouHerHim(CHARACTER)]."
 crush_while_heir_training_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] developed a crush on [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] while being trained as an heir by [CharYouHerHim(TARGET_CHARACTER)]."
 lmf_heir.1662.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] en formation"
 lmf_heir.1662.desc.away:0 ""
 lmf_heir.1662.desc.busy:0 ""
 lmf_heir.1662.desc.notrain:0 "Des nouvelles concernant notre hôte arrivent jusqu'à moi.\n\n"
 lmf_heir.1662.desc.start:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] a passé les dernières semaines en compagnie [your_councillor.Custom('FR_du_Char_Pi')][your_councillor.GetTitledFirstName], "
 lmf_heir.1662.desc.chancellor:0 "[your_councillor.Custom('FR_LequelLaquelle')] s'est fait fort de l'initier aux subtilités qu'implique sa fonction de [your_councillor.GetCouncilTitle]. « Il est des problèmes qu'une épée ne peut résoudre et des torts que l'or ne peut redresser… » avait-[your_councillor.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1662.desc.steward:0 "[your_councillor.Custom('FR_LequelLaquelle')] s'est fait fort de lui faire comprendre l'expertise qu'implique sa fonction de [your_councillor.GetCouncilTitle]. « Posséder est une chose, prospérer en est une autre. Tout le monde peut gagner de l'or, mais peu savent comment bien le dépenser… » avait-[your_councillor.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1662.desc.marshal:0 "[your_councillor.Custom('FR_LequelLaquelle')] s'est attelé[your_councillor.Custom('FR_E')] à lui comprendre la pluralité des tâches inhérents à sa fonction de [your_councillor.GetCouncilTitle]. « La force d'une armée est dépendante de l'efficacité de son commandant, et la force d'un commandant n'existe qu'au travers de son autorité… » avait-[your_councillor.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1662.desc.spymaster:0 "[your_councillor.Custom('FR_LequelLaquelle')] s'est attelé[your_councillor.Custom('FR_E')] à lui faire découvrir les soubassements du monde de l'intrigue qui ceint la fonction de [your_councillor.GetCouncilTitle]. « Les chemins qui mènent à la réussite sont nombreux, mais les sots qui privilégient les plus apparents aux plus sinueux en atteignent rarement le bout… » avait-[your_councillor.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1662.desc.admiral:0 "[your_councillor.Custom('FR_LequelLaquelle')] l'a emmené maintes fois sur les quais pour lui enseigner les ficelles de la fonction de [your_councillor.GetCouncilTitle]. « Certains préfèrent les putains aux navires, mais la seule chose qu'une putain peut ouvrir ce sont ses jambes. Un navire ouvrira la voie vers de nouveaux horizons… » avait-[your_councillor.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1662.desc.castellan:0 "[your_councillor.Custom('FR_LequelLaquelle')] lui a fait faire le tour [ROOT.Char.Custom('FR_ResidenceBuilding_Du')] quotidiennement pour mettre en lumière les maints devoirs qui incombent au titre de [your_councillor.GetCouncilTitle]. « Qu'est-ce qu'une couronne sans une tête pour la porter ? Qu'est-ce qu'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] sans [your_councillor.GetCouncilTitle] pour l'épauler ? » avait-[your_councillor.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1662.desc.well:0 "Élève studieu[your_heir.Custom('FR_XSe')] ou mentor émérite, je ne saurais le dire, mais la formation semble avoir porté ses fruits. S[heir_liege.Custom2('FR_LMF_RelationToMe_OnA', your_heir )] désormais plus versé[your_heir.Custom('FR_E')] dans les rouages du métier qu'[your_heir.Custom('FR_IlElle')] ne l'était à son arrivée, [heir_liege.Custom('FR_le_Char_Pi')][heir_liege.GetTitledFirstName] en sera bien aise, je n'en doute point."
 lmf_heir.1662.desc.poorly:0 "Fâcheusement, beaucoup d'efforts pour un piètre résultat, et à qui la faute, l'élève ou le mentor ? Je ne le sais, mais au grand dam [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName], ça oui, je le gage, pour qui la formation de s[heir_liege.Custom2('FR_LMF_RelationToMe_OnA', your_heir )] vient de souffrir d'un revers."
 lmf_heir.1662.a:0 "Fort bien !"
 lmf_heir.1662.b:0 "Fâcheusement, en effet."
 lmf_heir.1663.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] en formation"
 lmf_heir.1663.desc.away:0 ""
 lmf_heir.1663.desc.busy:0 ""
 lmf_heir.1663.desc.notrain:0 "Des nouvelles concernant notre hôte arrivent jusqu'à moi.\n\n"
 lmf_heir.1663.desc.start:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstName] a passé les dernières semaines en compagnie [your_courtier.Custom('FR_du_Char_Pi')][your_courtier.GetTitledFirstName], "
 lmf_heir.1663.desc.physician:0 "[your_courtier.Custom('FR_LequelLaquelle')] s'est fait fort de lui inculquer les pratiques de la médecine. « Nombreuses sont les méthodes pour meurtrir un homme, et à chacune convient la bonne pour le guérir… » avait-[your_courtier.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1663.desc.chronicler:0 "[your_courtier.Custom('FR_LequelLaquelle')] s'est évertué[your_courtier.Custom('FR_E')] à lui expliquer l'importance du travail d'un [GetCourtPositionType('chronicler_court_position').GetNameNoTooltip()]. « Les vérités du passé nous aident à appréhender le futur, mais qui écrit la vérité, si ce n'est celui qui tient la plume ? » avait-[your_courtier.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1663.desc.horse:0 "[your_courtier.Custom('FR_LequelLaquelle')] a fait grand cas de lui apprendre tout ce qu'il convient de savoir à propos du poste de [GetCourtPositionType('master_of_horse_court_position').GetNameNoTooltip()], et par extension, du monde équestre. « Le cheval est la plus noble des conquêtes de l'homme… » avait-[your_courtier.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1663.desc.seneschal:0 "[your_courtier.Custom('FR_LequelLaquelle')] s'est attelé[your_courtier.Custom('FR_E')] à l'accoutumer aux tâches qui incombent à un [GetCourtPositionType('seneschal_court_position').GetNameNoTooltip()] et aux responsabilités attenantes.\n\n"
 lmf_heir.1663.desc.taster:0 "[your_courtier.Custom('FR_LequelLaquelle')] lui a donné un avant-goût des méandres de l'intrigue à travers son expérience en tant que [GetCourtPositionType('food_taster_court_position').GetNameNoTooltip()]. « Bonsomme, noxombre, daemonium, étrangleur, vous n'imaginez pas la pléthore de poisons qui peut menacer un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] à chaque instant… » avait-[your_courtier.Custom('FR_IlElle')] commencé.\n\n"
 lmf_heir.1663.desc.well:0 "[heir_liege.Custom('FR_le_Char_Pi')][heir_liege.GetTitledFirstName] sera ravi[heir_liege.Custom('FR_E')] d'apprendre que s[heir_liege.Custom2('FR_LMF_RelationToMe_OnA', your_heir )] a fait montre d'une grande dilection pour les leçons, au point d'en devenir un vrai puits de science, qui sait."
 lmf_heir.1663.desc.poorly:0 "Fâcheusement, beaucoup d'efforts pour un piètre résultat, et à qui la faute, l'élève ou le mentor ? Je ne le sais, mais au grand dam [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName], ça oui, je le gage, pour qui la formation de s[heir_liege.Custom2('FR_LMF_RelationToMe_OnA', your_heir )] vient de souffrir d'un revers."
 lmf_heir.1663.a:0 "Fort bien !"
 lmf_heir.1663.b:0 "Fâcheusement, en effet."
 lmf_heir.1664.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] en formation"
 lmf_heir.1664.desc.away:0 ""
 lmf_heir.1664.desc.busy:0 ""
 lmf_heir.1664.desc.notrain:0 "Des nouvelles concernant notre hôte arrivent jusqu'à moi.\n\n"
 lmf_heir.1664.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] spent the last several weeks in the company of [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))], who brought the [your_heir.Custom('GetLassLad')] to the [ROOT.Char.Custom('FortifiedBuilding')] garrison and showed [your_heir.GetHerHim] what my [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] were capable of.\n\n[your_heir.GetTitledFirstNameNoTooltip] was drilled mercilessly... but, by all accounts, did rather well. [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] tells me [your_heir.GetSheHe] complained little and got along not only with [your_courtier.GetHerHim] but indeed with the other [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] as well.\n\n[heir_liege.GetTitledFirstNameNoTooltip] should have no complaints about [heir_liege.GetHerHis] [heir_liege.Custom2('LMF_RelationToMePossessive', your_heir )] progress, it seems."
 lmf_heir.1664.a:0 "Excellent work, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]!"
 lmf_heir.1665.t:0 "À couteaux tirés"
 lmf_heir.1665.desc:0 "Souhaitant faire parade de la prouesse propre à mes [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')], [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] a emmené [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] faire un tour à la garnison [ROOT.Char.Custom('FR_ResidenceBuilding_Du')].\n\nPiètre décision malheureusement, car notre invité[your_heir.Custom('FR_E')] semble voir en sa petite gloriole quelque chose d'autrement plus important que l'idée d'apprendre. Une histoire de fierté mal placée peut-être, qui envenime leurs rapports des heures durant, au point de transformer une simple session d'entraînement en une invitation au duel — pour ne pas dire provocation.\n\n"
 lmf_heir.1665.desc.child:0 "Mais n'ayant nulle dilection à ferrailler contre la marmaille, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_courtier'))] l'enjoint à se rasséréner, ce qui ne manque pas de jeter de l'huile sur un esprit déjà bien enflammé, lequel réagit dare-dare en dégainant s[your_heir.Custom('FR_OnA_signature_weapon')], rendant dès lors l'affrontement inévitable."
 lmf_heir.1665.desc.adult:0 "Malgré la courtoisie de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_courtier'))] de ne point chercher à tirer l'épée contre notre hôte, c[your_heir.Custom('FR_EEtte')] derni[your_heir.Custom('FR_ErEre')] n'en a cure et dégaine sans hésiter s[your_heir.Custom('FR_OnA_signature_weapon')], rendant dès lors l'affrontement inévitable."
 lmf_heir.1665.desc.end:0 "\n\nPeu me chaut qui gagne ou qui perd, tout cela est d'un risible."
 lmf_heir.1665.a:0 "[ROOT.Char.Custom('CulturalCurse')|U], tâchez de maîtriser votre ardeur !"
 dueled_during_heir_training:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] [CHARACTER.LocalPlayerString('vous ', '')][Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] provoqué[CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUIName')] en duel lors d'un passage à la garnison dans le cadre de [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre','sa')] formation d'hériti[TARGET_CHARACTER.Custom('FR_ErEre')]."
 dueled_during_heir_training_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] [TARGET_CHARACTER.LocalPlayerString('vous ', '')][Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] provoqué[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_TARGET_le_GetShortUIName')] en duel lors d'un passage à la garnison dans le cadre de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] formation d'hériti[CHARACTER.Custom('FR_ErEre')]."
 lmf_heir.1665.a.courtier.severe.tt:0 "[your_courtier.Custom('FR_le_Char_Pi')|U][your_courtier.GetTitledFirstNameNoTooltip] remporte le duel et blesse grièvement [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.a.courtier.win.tt:0 "[your_courtier.Custom('FR_le_Char_Pi')|U][your_courtier.GetTitledFirstNameNoTooltip] remporte le duel contre [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.a.heir.severe.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] remporte le duel et blesse grièvement [your_courtier.Custom('FR_le_Char_Pi')][your_courtier.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.a.heir.win.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] remporte le duel contre [your_courtier.Custom('FR_le_Char_Pi')][your_courtier.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.heir.duel.title:0 "L'hospitalité entachée"
 lmf_heir.1665.heir.severe.duel.desc:0 "[your_heir.Custom('FR_le_Char_U_Pi')|U][your_heir.GetShortUIName] a été grièvement blessé[your_heir.Custom('FR_E')] après avoir provoqué en duel l'un des [heir_visit_target.Custom('KnightCulturePluralNoTooltipLowercase')] [heir_visit_target.Custom('FR_du_Char_U_Pi')][heir_visit_target.GetShortUIName] : [your_courtier.Custom('FR_le_Char_U_Pi')][your_courtier.GetShortUIName]."
 lmf_heir.1665.heir.duel.desc:0 "[your_heir.Custom('FR_le_Char_U_Pi')|U][your_heir.GetShortUIName] a été blessé[your_heir.Custom('FR_E')] après avoir provoqué en duel l'un des [heir_visit_target.Custom('KnightCulturePluralNoTooltipLowercase')] [heir_visit_target.Custom('FR_du_Char_U_Pi')][heir_visit_target.GetShortUIName] : [your_courtier.Custom('FR_le_Char_U_Pi')][your_courtier.GetShortUIName]."
 lmf_heir.1666.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] malicieu[your_heir.Custom('FR_XSe')]"
 lmf_heir.1666.desc.away:0 "Bien que d'autres affaires requièrent mon attention, j'apprends que "
 lmf_heir.1666.desc.busy:0 "Bien que d'autres affaires requièrent mon attention, j'apprends que "
 lmf_heir.1666.desc.train:0 "Alors que j'aurais pu m'attendre à ce qu'[your_heir.Custom('FR_IlElle')] sollicite un peu de mon précieux temps, "
 lmf_heir.1666.desc.notrain:0 "Bien que d'autres affaires requièrent mon attention, j'apprends que "
 lmf_heir.1666.desc:0 "[your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] se fait plutôt discr[your_heir.Custom('FR_EtEte')] ces derniers jours. Quoique, « discrétion » ne semble pas le mot le plus approprié pour décrire son comportement. On parlerait ici plutôt de… furtivité.\n\nSon intérêt pour m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], et surtout les lieux les moins fréquentés, me laisse à croire que c'est une curiosité bien particulière qui justifie les allers et venus rapportés par les domestiques. Ces mêmes domestiques à qui [your_heir.Custom('FR_IlElle')] soumet toutes sortes de questions, et pas de celles généralement posées par des invités.\n\nAurais-je bien malgré moi laissé un rat pénétrer [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] ? Et si oui, qu'a-t-[your_heir.Custom('FR_IlElle')] pu bien découvrir qui ira se retrouver dans les esgourdes de s[your_heir.Custom2('FR_LMF_RelationToMeShort_OnA', heir_liege )] ?"
 lmf_heir.1666.a:0 "Y a-t-il vraiment lieu de s'inquiéter ?"
 lmf_heir.1667.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] impudent[your_heir.Custom('FR_E')]"
 lmf_heir.1667.desc:0 "[your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] se fait plutôt discr[your_heir.Custom('FR_EtEte')] ces derniers jours. Quoique, « discrétion » ne semble pas le mot le plus approprié pour décrire son comportement. On parlerait ici plutôt de… furtivité.\n\nSon intérêt pour m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], et surtout les lieux les moins fréquentés, me laisse à croire que c'est une curiosité bien particulière qui justifie les allers et venus rapportés par les domestiques. Ces mêmes domestiques qui auront au moins pu utiliser son manque flagrant de subtilité et son impertinence répétée comme prétexte à lui interdire l'accès à certains lieux.\n\nC'est un rat que j'ai semble-t-il invité sous mon toit, mais un rat bien moins malin qu'il s'imagine être."
 lmf_heir.1667.a:0 "J'attendais un peu plus de gratitude pour mon hospitalité."
 heir_digging_up_secrets:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] a provoqué [Select_CString(CHARACTER.IsLocalPlayer,'votre ','l’')]indignation[CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] pour avoir fouiné en quête d’informations sensibles."
 heir_digging_up_secrets_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] a provoqué [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre ','l’')]indignation[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')] pour avoir fouiné en quête d’informations sensibles."
 lmf_heir.1668.t:0 "Le rat de bibliothèque"
 lmf_heir.1668.desc.start:0 "Bien que m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] soit entièrement mit à sa disposition, [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] semble préférer l'hospitalité de la bibliothèque, et ce depuis plusieurs semaines déjà.\n\nS'étant accaparé[your_heir.Custom('FR_E')] les locaux au point d'en faire sa forteresse de solitude, [your_heir.Custom('FR_IlElle')] dédaigne tout contact avec l'extérieur, à l'image d'un mestre cloîtré dans la Citadelle. Quoique les gens lui racontent, cela n'éveille jamais autant son attention que le papier poussiéreux et l'encre sèche.\n\n"
 lmf_heir.1668.desc.well:0 "Ma foi, d'après le caractère enjoué qu'évoque les domestiques, je subodore qu'[your_heir.Custom('FR_IlElle')] trouve à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] son content en matière de lecture."
 lmf_heir.1668.desc.poorly:0 "I don't know why [your_heir.GetSheHe] didn't wait until [your_heir.GetSheHe] returned to [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], if all [your_heir.GetSheHe] wished to do was read. [your_heir.GetSheHe|U] evidently didn't find much worth reading here, anyhow, and I understand that [your_heir.GetSheHe] eventually gave up and quit the library in frustration. Perhaps that's for the best, as there's a great deal else for [your_heir.GetHerHim] to do, yes?"
 lmf_heir.1668.a:0 "I'm glad our texts were up to [your_heir.GetHerHis] standards."
 lmf_heir.1668.b:0 "Perhaps [your_heir.GetSheHe]'ll focus on learning by actually doing, instead?"
 lmf_heir.1669.t:0 "The Popular Heir"
 lmf_heir.1669.desc.impressive:0 "I suppose I shouldn't be surprised, given how impressive [your_heir.GetSheHe] was initially, but "
 lmf_heir.1669.desc.unpleasant:0 "It's a bit of a surprise, given how unpleasant [your_heir.GetSheHe] seemed at the outset, but "
 lmf_heir.1669.desc.trouble:0 "It's a bit of a surprise, given how I assumed [your_heir.GetSheHe]'d be more trouble than anything else, but "
 lmf_heir.1669.desc.dutiful:0 "It's a bit of a surprise, given how [your_heir.GetSheHe] seemed far more the quiet and reserved type, but "
 lmf_heir.1669.desc.homesick:0 "It appears that [your_heir.GetSheHe]'s finally gotten over [your_heir.GetHerHis] homesickness, as "
 lmf_heir.1669.desc.avoid:0 "It appears that [your_heir.GetSheHe]'s finally warmed up to the people here, as "
 lmf_heir.1669.desc:0 "I'm told [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] has become something of a popular figure around the [ROOT.Char.Custom('FortifiedBuilding')].\n\nEach day, [your_heir.GetTitledFirstNameNoTooltip] cheerfully greets the servants and then does [your_heir.GetHerHis] best to get involved in the goings-on at court and even things I wouldn't normally expect one of noble blood to do. Work in the kitchens? Chat with the guardsmen? Run errands for my stewards? [your_heir.GetSheHe|U] does it cheerfully while keeping [your_heir.GetHerselfHimself] from getting in the way.\n\nRather marvelous, really."
 lmf_heir.1669.a:0 "What a pleasant development."
 lmf_heir.1670.t:0 "The Nuisance Heir"
 lmf_heir.1670.desc.impressive:0 "It's a bit of a surprise, given how impressive [your_heir.GetSheHe] was initially, but "
 lmf_heir.1670.desc.unpleasant:0 "I suppose I shouldn't be surprised, given how unpleasant [your_heir.GetSheHe] seemed at the outset, but "
 lmf_heir.1670.desc.trouble:0 "My initial expectation that [your_heir.GetSheHe]'d be little more than trouble has so far bourne out, as "
 lmf_heir.1670.desc.dutiful:0 "It's a bit of a surprise, given how dutiful [your_heir.GetSheHe] seemed initially, but "
 lmf_heir.1670.desc.homesick:0 "It appears that [your_heir.GetSheHe] hasn't gotten over [your_heir.GetHerHis] homesickness, as "
 lmf_heir.1670.desc.avoid:0 "I suppose I shouldn't be surprised, given how antisocial [your_heir.GetSheHe] was initially, but "
 lmf_heir.1670.desc:0 "I'm told [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] has become something of a nuisance around the [ROOT.Char.Custom('FortifiedBuilding')].\n\nEvidently, [your_heir.GetTitledFirstNameNoTooltip] tried to ingratiate [your_heir.GetHerselfHimself] with members of my court, but when that didn't pan out [your_heir.GetSheHe] became sullen and prone to wandering. Some of the servants tried to put [your_heir.GetHerHim] to work, but nothing was 'worthy' enough, and I've heard many complaints about how [your_heir.GetSheHe] gets involved in things [your_heir.GetSheHe] knows little about and is thus always in the way.\n\nMost of the servants have begun to avoid [your_heir.GetHerHim] entirely. How tiresome."
 lmf_heir.1670.a:0 "Not a good sign."
 lmf_heir.1671.t:0 "The Industrious Heir"
 lmf_heir.1671.desc.start:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] volunteered a few weeks ago to help with a construction project just outside the [ROOT.Char.Custom('FortifiedBuilding')] grounds. To get experience, I suppose, on how such projects are run and the benefit they represent to the realm.\n\n"
 lmf_heir.1671.desc.well:0 "As it turns out, things went better than anyone could have expected. [your_heir.GetTitledFirstNameNoTooltip] didn't make any attempt to take over the project. Instead, [your_heir.GetSheHe] learned from the overseer what [your_heir.GetSheHe] could and actually pitched in with the workers. Everyone who came back to the [ROOT.Char.Custom('FortifiedBuilding')] afterwards remarked on how helpful the [your_heir.Custom('polite_gender_ref')] was and how [your_heir.GetSheHe] seemed truly interested in understanding what they were doing.\n\nA surprise result, honestly, but a pleasant one."
 lmf_heir.1671.desc.poorly:0 "There was some question as to just how much help [your_heir.GetTitledFirstNameNoTooltip] could actually be... and, as it turns out, these concerns were well-founded. The overseer confided to me afterwards that the [your_heir.Custom('polite_gender_ref')] was, at best, an annoyance and often an outright hindrance. [your_heir.GetSheHe|U] complained constantly about the labour, clearly considered [your_heir.GetHerselfHimself] above the crew of peasant workers, and tried numerous times to take over the project while clearly knowing nothing about it.\n\nNot an unexpected result, to be honest, but still disappointing."
 lmf_heir.1671.a:0 "Who knew [your_heir.GetSheHe] had it in [your_heir.GetHerHim]?"
 lmf_heir.1671.b:0 "Perhaps [your_heir.GetSheHe] should have stayed in the [ROOT.Char.Custom('FortifiedBuilding')]."
 lmf_heir.1672.t:0 "An Unfortunate Incident"
 lmf_heir.1672.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] spent much of the last few weeks in the company of my [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]. An effort that [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] was making, I think, to help with [your_heir.GetTitledFirstNamePossessiveNoTooltip] training.\n\nAs it turns out, things could not have gone worse. While the pair got along initially, apparently they got into an argument... and this led to simmering resentment until, finally, [your_heir.GetTitledFirstNameNoTooltip] blew up at [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] in the middle of court. Things were said, [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] was incredibly embarrassed, and neither is about to forgive the other.\n\nSo not only has the [your_heir.Custom('polite_gender_ref')] hardly advanced the education [your_heir.GetSheHe] came here for, [your_heir.GetSheHe] earned [your_heir.GetHerselfHimself] a new enemy in a member of my court."
 lmf_heir.1672.a:0 "Well done, [your_heir.Custom('GetLassLad')]."
 fight_during_heir_training:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] unforgiveably insulted [CHARACTER.GetShortUINameNoTooltipNoFormat] at court during a visit."
 fight_during_heir_training_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] unforgiveably insulted [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] at court during a visit."
 lmf_heir.1673.t:0 "Une amitié en devenir"
 lmf_heir.1673.desc:0 "Cela fait un moment déjà que [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] passe le plus clair de son temps avec [heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstNameNoTooltip].\n\nCertes, [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstNameNoTooltip] est ici dans le cadre de sa formation d'hériti[your_heir.Custom('FR_ErEre')], et nul doute que m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', your_courtier )] peut lui enseigner bien des choses, mais l'assiduité dont a fait montre [your_heir.GetFirstNameNoTooltip] dépasse le simple cadre formel.\n\nLes rires qui sont entendus d'un bout à l'autre [ROOT.Char.Custom('FR_ResidenceBuilding_Du')] me laissent à penser que, plus qu'une formation, c'est une amitié qu'ils mènent à bien…"
 lmf_heir.1673.a:0 "À la bonne heure."
 befriended_during_heir_training:0 "Lors d'une visite dans le cadre de [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'votre','sa')] formation d’hériti[TARGET_CHARACTER.Custom('FR_ErEre')], [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'vous êtes ','s’')]est lié[TARGET_CHARACTER.Custom('FR_E')] d’amitié avec [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName]."
 befriended_during_heir_training_corresponding:0 "Lors d'une visite dans le cadre de [Select_CString(CHARACTER.IsLocalPlayer,'votre','sa')] formation d’hériti[CHARACTER.Custom('FR_ErEre')], [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(CHARACTER.IsLocalPlayer,'vous êtes ','s’')]est lié[CHARACTER.Custom('FR_E')] d’amitié avec [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName]."
 lmf_heir.1674.t:0 "A New Friend?"
 lmf_heir.1674.desc.start:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] spent much of the last few weeks in the company of my [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]. An effort that [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] was making, I think, to help with [your_heir.GetTitledFirstNamePossessiveNoTooltip] training.\n\n"
 lmf_heir.1674.desc.adult:0 "Well, the two of them couldn't have gotten along better. Before long, [your_heir.GetTitledFirstNameNoTooltip] and [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] were basically inseparable. They went everywhere in the [ROOT.Char.Custom('FortifiedBuilding')] together, laughing and carrying on while my [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] showed [your_heir.GetHerHim] the inner workings of [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nThere were whispers at court that perhaps the two had become more than just friends? But surely that was simply gossip."
 lmf_heir.1674.desc.bothchild:0 "Well, the two of them couldn't have gotten along better. Before long, [your_heir.GetTitledFirstNameNoTooltip] and [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] were basically inseparable. They went everywhere in the [ROOT.Char.Custom('FortifiedBuilding')] together, laughing and carrying on while my [ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )] showed [your_heir.GetHerHim] the inner workings of [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nThere were whispers at court that perhaps the two had become more than just friends, but the two of them are just children. At best, it's a crush, and anything more is just idle gossip."
 lmf_heir.1674.desc.child:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))] relayed to me afterwards that, while the training went well and [your_courtier.GetSheHe] endeavoured to show [your_heir.GetTitledFirstNameNoTooltip] the inner workings of [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], [your_courtier.GetSheHe] couldn't help but get the feeling that the [your_heir.Custom('polite_gender_ref')] had developed something of a crush on [your_courtier.GetHerHim]. [your_courtier.GetSheHe|U] likes [your_heir.GetTitledFirstNameNoTooltip] well enough and is flattered by [your_heir.GetHerHis] attentions, but naturally [your_heir.GetSheHe] is still just a child.\n\nIt's a natural enough thing, and I'm sure the [your_heir.Custom('polite_gender_ref')] will get over it."
 lmf_heir.1674.a:0 "I've nothing to worry about, do I?"
 lmf_heir.1674.b:0 "Ah, young love."
 fell_in_love_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] fell in love with [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] while receiving heir training from [CharYouHerHim(TARGET_CHARACTER)]."
 fell_in_love_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] fell in love with [CHARACTER.GetShortUINameNoTooltipNoFormat] while receiving heir training from [CharYouHerHim(CHARACTER)]."
 crushed_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] developed a crush on [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] during a visit to the castle."
 crushed_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] developed a crush on [CHARACTER.GetShortUINameNoTooltipNoFormat] during a visit to the castle."
 lmf_heir.1675.t:0 "On the Hunt"
 lmf_heir.1675.desc.invite:0 "I was pleased to receive an invitation from [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] to join [your_heir.GetHerHim] on a hunting trip to a nearby forest not long ago. I don't know how much training the [your_heir.Custom('polite_gender_ref')] would receive, but with only the two of us and a few retainers it seemed as if the trip would at least be a chance for us to get to know one another better.\n\n"
 lmf_heir.1675.desc.invite.poorly:0 "Well, it did just that, and the results were not good. It rained almost immediately, and [your_heir.GetTitledFirstNameNoTooltip] complained constantly... even moreso when we had difficulty finding game. When we finally did, [your_heir.GetSheHe] missed [your_heir.GetHerHis] shot on the beast and then had the temerity to blame #EMP me#! for distracting [your_heir.GetHerHim]!\n\nAfter almost a week more of enduring [your_heir.GetHerHis] constant misery, I was glad to get back to the [ROOT.Char.Custom('FortifiedBuilding')] and leave [your_heir.GetTitledFirstNameNoTooltip] in the forest where [your_heir.GetSheHe] belonged."
 lmf_heir.1675.desc.invite.well:0 "It did just that. [your_heir.GetTitledFirstNameNoTooltip] and I spent some fine nights chatting by the campfire, and I managed to advise the [your_heir.Custom('polite_gender_ref')] on aspects of rulership I might not have thought of otherwise. We managed to find some game, and I was pleased to note what agreeable company [your_heir.GetSheHe] was throughout.\n\nBy the time we returned to the [ROOT.Char.Custom('FortifiedBuilding')], I was almost sorry to see it ending."
 lmf_heir.1675.desc.start:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] headed out on a hunting trip to a small forest near the [ROOT.Char.Custom('FortifiedBuilding')], taking along only a few retainers. I don't know what [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] would say about such a diversion, as it hardly seemed like the sort of training [your_heir.GetSheHe] came here for, but perhaps [your_heir.GetTitledFirstNameNoTooltip] needed the break?\n\n"
 lmf_heir.1675.desc.poorly:0 "Alas, I don't think [your_heir.GetSheHe] got much of one. It rained for most of the weeks [your_heir.GetSheHe] was away, and [your_heir.GetSheHe] returned both empty-handed and miserable. At least [your_heir.GetSheHe] wasn't mauled by a wild animal. What would [heir_liege.GetTitledFirstNameNoTooltip] have said?"
 lmf_heir.1675.desc.well:0 "Thankfully, it seems [your_heir.GetHerHis] trip went well. The weather was good, and when [your_heir.GetSheHe] returned several weeks later it was with some furs in hand and a big smile on [your_heir.GetHerHis] face."
 lmf_heir.1675.desc.notrain:0 "I understand that [heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] spent the majority of [your_heir.GetHerHis] time in [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] engaging in some hunting in the nearby forests. [your_heir.GetSheHe|U] could have done the same in [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], I imagine, but since I didn't allow [your_heir.GetTitledFirstNameNoTooltip] into the [ROOT.Char.Custom('FortifiedBuilding')] I suppose [your_heir.GetSheHe] had little choice but to find [your_heir.GetHerHis] amusements elsewhere.\n\n"
 lmf_heir.1675.desc.notrain.poorly:0 "Unfortunately, I'm told the trip didn't go well. The weather was poor and the game scarce, and at one point [your_heir.GetTitledFirstNameNoTooltip] got rather badly injured after falling into a muddy ravine with nobody about to fish [your_heir.GetHerHim] out. Evidently, [your_heir.GetSheHe] was stuck there for days!\n\nI hope [your_heir.GetSheHe] doesn't hold their poor trip against me."
 lmf_heir.1675.desc.notrain.well:0 "At least the trip went well, or so I'm told. The weather held out, and when [your_heir.GetTitledFirstNameNoTooltip] finally returned it was with a pile of furs and a rather ridiculous smile on [your_heir.GetHerHis] face.\n\nPerhaps [your_heir.GetSheHe]'ll consider the excellent hunting trip adequate compensation for the lack of training? One can only hope."
 lmf_heir.1675.a:0 "What a fine time!"
 lmf_heir.1675.b:0 "I'm glad [your_heir.GetSheHe] enjoyed [your_heir.GetHerselfHimself]."
 lmf_heir.1675.c:0 "What a miserable experience for us both."
 lmf_heir.1675.d:0 "What a shame."
 excellent_hunting_trip:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] and [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] bonded during a hunting trip together at a nearby forest."
 excellent_hunting_trip_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] and [CHARACTER.GetShortUINameNoTooltipNoFormat] bonded during a hunting trip together at a nearby forest."
 disastrous_hunting_trip:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] got on [CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] nerves during a disastrous hunting trip together."
 disastrous_hunting_trip_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] got on [TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat] nerves during a disastrous hunting trip together."
 lmf_heir.1676.t:0 "Un[your_heir.Custom('FR_E')] hériti[your_heir.Custom('FR_ErEre')] en visite"
 lmf_heir.1676.train:0 "[your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] a passé les dernières semaines à "
 lmf_heir.1676.notrain:0 "[your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] a passé une majeure partie des dernières semaines à "
 lmf_heir.1676.desc.begin:0 "profiter du cadre qu'offre [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] pour visiter villages et [ROOT.Char.GetCapitalLocation.GetCounty.GetFaith.HouseOfWorshipPlural|l], et ainsi découvrir les bonnes gens qui vivent alentours. Une curiosité bienvenue je le concède.\n\n"
 lmf_heir.1676.desc.poorly:0 "Pourtant, les choses ne se sont pas passées comme [your_heir.Custom('FR_IlElle')] l'espérait. Les affres du climat l'auront amené à trouver refuge dans une ferme quelconque, ensuite de quoi [your_heir.Custom('FR_IlElle')] aurait été victime de la briganderie [ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetNameNoTooltip], bien qu'[your_heir.Custom('FR_IlElle')] se soit montré[your_heir.Custom('FR_E')] assez évasi[your_heir.Custom('FR_FVe')] à ce propos.\n\nIl y a eu plus de peur que de mal, j'imagine, mais le mieux qu'[your_heir.Custom('FR_IlElle')] puisse faire maintenant est de ressortir grandi[your_heir.Custom('FR_E')] de cette expérience, n'est-ce pas ?"
 lmf_heir.1676.desc.well:0 "Selon ses propres dires, la visite fut plus qu'agréable. Jouissant d'un temps propice, [your_heir.Custom('FR_IlElle')] a pu profiter de moults lieux dignes d'intérêt. Peut-être même a-t-[your_heir.Custom('FR_IlElle')] maintenant meilleure connaissance de la région que les [ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetCollectiveNounNoTooltip] eux-mêmes.\n\nQuoi qu'il en soit, cette visite lui aura été fort instructive, à n'en point douter."
 lmf_heir.1676.a:0 "Voilà qui fait plaisir à entendre."
 lmf_heir.1676.b:0 "On ne dompte pas si aisément [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1677.t:0 "The Carousing Heir"
 lmf_heir.1677.desc.castle:0 "Evidently needing a break from the [ROOT.Char.Custom('FortifiedBuilding')], "
 lmf_heir.1677.desc.away:0 "Still opting not to come to the [ROOT.Char.Custom('FortifiedBuilding')] yet, "
 lmf_heir.1677.desc.none:0 "Rather than spend any time at the [ROOT.Char.Custom('FortifiedBuilding')], "
 lmf_heir.1677.desc.invite:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] to join [your_heir.GetHerHim] at a popular tavern in a town not far away. I was reticent to go, at first, though then I considered what kind of trouble a [your_heir.Custom('polite_gender_ref')] like [your_heir.GetTitledFirstNameNoTooltip] could get up to among the common folk and I thought I'd best tag along... with a few retainers at close distance, of course.\n\n"
 lmf_heir.1677.desc.invite.poorly:0 "As it turns out, my instincts were correct. [your_heir.GetTitledFirstNameNoTooltip] was eager to let off some steam, now that [your_heir.GetSheHe]'s out from under the watchful eye of [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], as [your_heir.GetSheHe] got so drunk over the course of the night [your_heir.GetSheHe] could barely control [your_heir.GetHerselfHimself]. [your_heir.GetSheHe|U] caused a bar fight, insulted me numerous times, and "
 lmf_heir.1677.desc.invite.well:0 "As it turns out, I needn't have worried. [your_heir.GetTitledFirstNameNoTooltip] maintained [your_heir.GetHerHis] composure and had an excellent evening. I daresay I even did the same. The two of us swapped many stories over a drink, led the tavern patrons in a round of singing, and "
 lmf_heir.1677.desc.invite.woman:0 "I think I even saw a rather comely lass lead [your_heir.GetHerHim] off somewhere private in the middle of it all.\n\n"
 lmf_heir.1677.desc.invite.man:0 "I think I even saw a rather handsome man lead [your_heir.GetHerHim] off somewhere private in the middle of it all.\n\n"
 lmf_heir.1677.desc.invite.nosex:0 "then even got sick on my shoes.\n\n"
 lmf_heir.1677.desc.invite.poorly.end:0 "Overall, chaos from beginning to end. I abandoned [your_heir.GetHerHim] long before the evening was over, I'm sorry to say."
 lmf_heir.1677.desc.invite.well.end:0 "Overall, a night to remember for us both. I think I even managed to offer [your_heir.GetHerHim] some education in those stories, if I do say so myself."
 lmf_heir.1677.desc.noinvite:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip] [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] headed off to a town not far away, where I understand [your_heir.GetSheHe] had quite the evening of merriment in a local tavern.\n\n"
 lmf_heir.1677.desc.noinvite.poorly:0 "Apparently [your_heir.GetTitledFirstNameNoTooltip] was eager to let off some steam, now that [your_heir.GetSheHe]'s out from under the watchful eye of [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )], as the stories that came from the evening are eye-opening. Drunkenness, a bar fight... somehow, [your_heir.GetSheHe] even managed to anger the patrons enough that [your_heir.GetSheHe] was run out of town.\n\nI suppose that's one way to get an education, isn't it?"
 lmf_heir.1677.desc.noinvite.well:0 "Apparently [your_heir.GetTitledFirstNameNoTooltip] was eager to let off some steam, as the good times ensued for much of the next week. Still, I'm led to believe the [your_heir.Custom('polite_gender_ref')] more or less behaved [your_heir.GetHerselfHimself]. There were no drunken brawls, no excessive drunkenness, and [your_heir.GetSheHe] didn't get run out of town by angry locals. Just pure merriment and townsfolk delighted by [your_heir.GetTitledFirstNamePossessiveNoTooltip] charisma and hoping for [your_heir.GetHerHis] return.\n\nNot very educational, if you ask me, but I imagine [your_heir.GetSheHe] was glad to have the break."
 lmf_heir.1677.desc.start:0 "I'd heard privately from [your_heir.GetHerHis] [your_heir.Custom2('LMF_RelationToMeShort', heir_liege )] that [your_heir.GetTitledFirstNameNoTooltip] might have intended to use the excuse of \"training\" to get away from [heir_visit_origin.GetCounty.GetTitle.GetNameNoTierNoTooltip]... and that seems to be the case, as the [your_heir.Custom('polite_gender_ref')] has spent much of the last few months carousing from one tavern to the next throughout [ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetNameNoTooltip], and I have a sneaking suspicion it would be no different had I let [your_heir.GetHerHim] come to the [ROOT.Char.Custom('FortifiedBuilding')].\n\n"
 lmf_heir.1677.desc.poorly:0 "I wish I could say the [your_heir.Custom('polite_gender_ref')] had a better time of it, but evidently [your_heir.GetHerHis] carousing consisted of little more than drunken brawls, getting sick until [your_heir.GetSheHe] crawled into a barn for days, and angering the locals after running up excessive tabs. Not exactly the most redeeming tales, but it seems as if [your_heir.GetSheHe]'s gotten it all out of [your_heir.GetHerHis] system now at least."
 lmf_heir.1677.desc.well:0 "From all accounts, the [your_heir.Custom('polite_gender_ref')] had a fine time. [your_heir.GetSheHe|U] more or less behaved [your_heir.GetHerselfHimself], and outside of a few tales of rowdiness appears to have won over the common folk from all over the county. The tales of [your_heir.GetHerHim] leading crowds of tavern-goers in song is rather remarkable. Now it appears the merriment has drawn to a close, but what a marvelous time for [your_heir.GetHerHim] it must have been!"
 lmf_heir.1677.a:0 "What a fine time!"
 lmf_heir.1677.b:0 "Well done, [your_heir.Custom('GetLassLad')]."
 lmf_heir.1677.c:0 "Ugh, what a display!"
 lmf_heir.1677.d:0 "#EMP This#! is [heir_liege.GetTitledFirstNamePossessiveNoTooltip] heir?"
 excellent_party_with_heir:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] and [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] bonded during a night of wild carousing in a tavern."
 excellent_party_with_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] and [CHARACTER.GetShortUINameNoTooltipNoFormat] bonded during a night of wild carousing in a tavern."
 disastrous_party_with_heir:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(CHARACTER)] disgusted by [TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] after a night of disastrous carousing in a tavern."
 disastrous_party_with_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CharWereWas(TARGET_CHARACTER)] disgusted by [CHARACTER.GetShortUINameNoTooltipNoFormat] after a night of disastrous carousing in a tavern."
 lmf_heir.1678.t:0 "Frappé[your_heir.Custom('FR_E')] de flémingite"
 lmf_heir.1678.desc.all:0 "Voilà des mois que [heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] est arrivé[your_heir.Custom('FR_E')] à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], et voilà des mois qu'[your_heir.Custom('FR_IlElle')] n'a fait que musarder.\n\n"
 lmf_heir.1678.desc.two:0 "Pourquoi diantre [heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] a passé la majeure partie de son temps à gober les mouches, voilà qui demeure un mystère.\n\n"
 lmf_heir.1678.desc.one:0 "En constatant que [heir_liege.Custom2('FR_LMF_RelationToMeShort_Le', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstName] a consacré les dernières semaines à bayer aux corneilles, j'en viens à m'interroger sur la quantité d'efforts et de devoirs qui grève son existence pour ainsi s'autoriser un séjour de paresse.\n\n"
 lmf_heir.1678.desc.castle:0 "Pour sûr que [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] aura su faire bon usage du confort de ses appartements. Tant de temps passé enfermé[your_heir.Custom('FR_E')], et pourquoi donc ? Nul ne le sait, mais ses rares apparitions à la Cour étaient surtout marquées par leur discrétion.\n\n"
 lmf_heir.1678.desc.town:0 "Ne pas lui avoir ouvert les portes de m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] n'empêché en rien [your_heir.Custom('FR_le_Char_Pi')][your_heir.GetTitledFirstName] de s'instruire par d'autres moyens, mais au lieu de cela [your_heir.Custom('FR_IlElle')] est allé[your_heir.Custom('FR_E')] faire je ne sais quoi dans les villes alentours, mais pour sûr, rien de bien productif d'après les sons de cloche qui me sont parvenus.\n\n"
 lmf_heir.1678.desc.end:0 "Or donc, paresse ou simple frasque passagère ? Je n'ai pas la réponse, mais au moins m'aura-t-[your_heir.Custom('FR_IlElle')] fait grâce de ne pas être une gêne. Je vais pouvoir retourner [ROOT.Char.Custom('IdleActivity')] l'esprit tranquille."
 lmf_heir.1678.a:0 "Qu'[your_heir.Custom('FR_IlElle')] aille se tourner les pouces chez [your_heir.Custom('FR_LuiElle')]."
 lmf_heir.1680.t:0 "Le chemin du retour"
 lmf_heir.1680.desc.notrain:0 "Le séjour [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstName], [heir_liege.Custom2('LMF_RelationToMeShort', your_heir )] [heir_liege.Custom('FR_du_Char_Pi')][heir_liege.GetTitledFirstNameNoTooltip], se termine aujourd'hui.\n\n"
 lmf_heir.1680.desc.notrain.away:0 "Étant dans l'incapacité de [your_heir.Custom('FR_LeLa')] congédier en personne, "
 lmf_heir.1680.desc.notrain.ill:0 "Mon état de santé me cloisonnant dans mes appartements, "
 lmf_heir.1680.desc.notrain.busy:0 "Présentement trop affairé[ROOT.Char.Custom('FR_E')] pour venir [your_heir.Custom('FR_LeLa')] voir en personne, "
 lmf_heir.1680.desc.notrain.nomeet.end:0 "[your_heir.Custom('FR_IlElle')] va devoir faire ses adieux à m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] sans moi. [ROOT.Char.Custom('ResidenceBuilding')] dont [your_heir.Custom('FR_IlElle')] s'est vu refuser l'accès, et quel est son opinion à ce sujet ? Je ne saurais le dire, mais ce dont je suis certain[ROOT.Char.Custom('FR_E')] c'est que mon manque d'hospitalité était justifié. Je ne doute pas qu'[your_heir.Custom('FR_IlElle')] trouvera meilleur accueil chez [your_heir.Custom('FR_LuiElle')], à [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1680.desc.notrain.meet:0 "Je n'ai guère fait preuve d'hospitalité en lui interdisant l'accès à m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], il est vrai, mais je puis au moins lui souhaiter bon départ de vive voix. Si rancœur il y a d'avoir été tenu hors les murs, alors elle doit être soigneusement cachée quelque part derrière ce rempart de politesse qui se dresse devant moi. Moult afféterie plus tard, [your_heir.Custom('FR_LeLa')] voilà sur la route au bout de laquelle se trouve [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]."
 lmf_heir.1680.desc.train:0 "Le séjour [your_heir.Custom('FR_du_Char_Pi')][your_heir.GetTitledFirstName] touche à sa fin, et un dîner sans grande prétention a été organisée en cet honneur. "
 lmf_heir.1680.desc.train.away:0 "Dîner auquel je ne pourrais hélas pas assister.\n\n"
 lmf_heir.1680.desc.train.ill:0 "Dîner auquel je ne pourrais hélas pas assister en raison de mon état de santé.\n\n"
 lmf_heir.1680.desc.train.busy:0 "Dîner auquel je ne pourrais hélas pas assister en raison d'affaires plus pressantes.\n\n"
 lmf_heir.1680.desc.train.meet.friend:0 "Dîner auquel je participe avec force joie, autant en ma qualité d'hôt[ROOT.Char.Custom('FR_EEsse')] que d'ami[ROOT.Char.Custom('FR_E')].\n\n"
 lmf_heir.1680.desc.train.meet.enemy:0 "Ayant maille à partir avec [your_heir.Custom('FR_LuiElle')], j'aurais préféré faire fi de ce dîner, mais en ma qualité d'hôt[ROOT.Char.Custom('FR_EEsse')] je me dois de faire contre mauvaise fortune bon cœur, hélas.\n\n"
 lmf_heir.1680.desc.train.meet.neutral:0 "Dîner auquel je participe en ma qualité d'hôt[ROOT.Char.Custom('FR_EEsse')] et [ROOT.Char.Custom('FR_SeigneurDame')] [ROOT.Char.Custom('FR_ResidenceBuilding_Du')].\n\n"
 lmf_heir.1680.desc.train.success:0 "[your_heir.Custom('polite_gender_ref')|U] [your_heir.Custom('ComplimentAdjective')] s'il en est, [your_heir.Custom('FR_IlElle')] fait montre de moult politesse pour témoigner de sa gratitude. Sa visite a été couronnée de succès, et ce n'est pas peu dire que cela [your_heir.Custom('FR_LeLa')] met en joie, égaillant par là même l'atmosphère de la soirée.\n\n"
 lmf_heir.1680.desc.train.failure:0 "[your_heir.Custom('polite_gender_ref')|U] [your_heir.Custom('InsultAdjective')] à tout le moins, [your_heir.Custom('FR_IlElle')] daigne néanmoins faire bonne figure en dépit de l'issue lamentable de sa visite. Lorsque la courtoisie cesse d'être nécessaire pour n'être plus qu'une vacuité pompeuse, [your_heir.Custom('FR_IlElle')] prend congé avec plus de hâte que de manières.\n\n"
 lmf_heir.1680.desc.train.neutral:0 "Il n'y a guère d'excès d'affèterie en cette soirée, juste ce qu'il faut pour respecter la bienséance. Cela, je n'en doute point, est certainement à mettre au compte du résultat en demi-teinte de sa visite.\n\n"
 lmf_heir.1680.desc.train.end:0 "Au jour levant, [your_heir.Custom('FR_LeLa')] voilà sur la route pour [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip], avec certainement bien des choses à aller conter aux oreilles de s[your_heir.Custom2('FR_LMF_RelationToMeShort_OnA', heir_liege )]."
 lmf_heir.1680.a:0 "Je ne sais si le séjour lui a été plaisant, mais il l'aura été pour moi en tout cas."
 lmf_heir.1680.b:0 "Au plaisir de ne jamais [your_heir.Custom('FR_LeLa')] revoir."
 lmf_heir.1680.c:0 "Adieu jusqu'au revoir, l'ami[your_heir.Custom('FR_E')]."
 lmf_heir.1680.d:0 "Bienheureu[your_heir.Custom('FR_XSe')] soit-[your_heir.Custom('FR_IlElle')] de cette enrichissante expérience."
 lmf_heir.1680.e:0 "Tant d'efforts pour un si piètre résultat..."
 lmf_heir.1680.f:0 "Bon, où en étais-je ?"
 lmf_heir.1680.end.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] va débuter son voyage de retour pour [heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]"
 lmf_heir.1681.desc.start:0 "« [your_heir.Custom2('LMF_RelationToMeShort', ROOT.Char)|U], » débute la missive envoyée par [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))], dont le séjour à [heir_visit_target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] est désormais terminé.\n\n« "
 lmf_heir.1681.desc.notrain:0 "Hélas, puisque [your_heir.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] m'a refusé l'hospitalité de s[heir_visit_target.Custom('FR_ResidenceBuilding_OnA')], il me fallait improviser pour mettre à profit ces quelques mois. "
 lmf_heir.1681.desc.notrain.hunt.good:0 "La chasse fut l'occasion de me mettre à l'épreuve face à la nature environnante. Une expérience des plus excitantes, j'ai d'ailleurs eu l'occasion d'apercevoir un[heir_visit_target.Custom('FR_E_RegionalFerociousAnimal')] [heir_visit_target.Custom('RegionalOnlyFerociousAnimal')]… »\n\n"
 lmf_heir.1681.desc.notrain.hunt.poor:0 "La chasse m'avait paru être une bonne idée au premier abord, mais les affres du climat m'auront donné tort… »\n\n"
 lmf_heir.1681.desc.notrain.tour.good:0 "Les contrées environnantes et les gens qui y habitent auront su se faire meilleur hôte, pour sûr. J'ai grandement appris de leurs usages… »\n\n"
 lmf_heir.1681.desc.notrain.tour.poor:0 "Un[heir_visit_target.Custom('FR_E')] [heir_visit_target.GetTitleAsNameNoTooltip|l] à l'image de ses sujets, semble-t-il, car la populace n'était guère plus encline à m'accueillir. Et je ne parle même pas du temps, exécrable ça oui… »\n\n"
 lmf_heir.1681.desc.notrain.party.good:0 "La tournée des tavernes a été l'occasion de me mêler aux petites gens. Peut-être pas la manière la plus instructive de s'occuper, mais j'ai eu l'occasion d'assister à une frairie locale des plus stimulantes… »\n\n"
 lmf_heir.1681.desc.notrain.party.poor:0 "J'ai bien tenté d'aller me divertir dans les villages voisins, mais ces contrées sont on ne peut plus maussades… »\n\n"
 lmf_heir.1681.desc.notrain.sick:0 "Du moins c'est ce que j'aurais fait si la mauvaise fortune ne s'était pas acharnée contre moi, me laissant souffrant et cloué[your_heir.Custom('FR_E')] au lit dans une auberge… »\n\n"
 lmf_heir.1681.desc.notrain.nothing:0 "J'ai parcouru les villages alentours, logeant dans une auberge, puis dans une autre… » J'abrège la lecture car la teneur des mots creux qui suivent me fait comprendre qu'[your_heir.Custom('FR_IlElle')] n'a vraisemblablement rien accompli qui puisse être qualifié de productif.\n\n"
 lmf_heir.1681.desc.notrain.end:0 "La lettre contient son lot de détails, mais j'aurais l'occasion d'en apprendre plus de vive voix. Du reste, je constate que m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))] aurait pu souffrir d'un meilleur accueil. L'hospitalité [heir_visit_target.GetCulture.GetNameNoTooltip] n'est plus ce qu'elle était."
 lmf_heir.1681.desc.train:0 "Sachez que [your_heir.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] m'a fait très bon accueil. J'avais toute liberté de parcourir s[heir_visit_target.Custom('FR_ResidenceBuilding_OnA')], et j'ai passé "
 lmf_heir.1681.desc.train.castle:0 "Sachez que [your_heir.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))] a fait preuve d'une grande hospitalité, même lorsqu'[heir_visit_target.Custom('FR_IlElle')] ne supervisait pas directement ma formation. J'avais toute liberté de parcourir s[heir_visit_target.Custom('FR_ResidenceBuilding_OnA')], et j'ai passé "
 lmf_heir.1681.desc.train.all:0 "l'entièreté de mon séjour "
 lmf_heir.1681.desc.train.most:0 "la majeure partie du temps "
 lmf_heir.1681.desc.train.some:0 "un certain temps "
 lmf_heir.1681.desc.train.rest:0 "et le reste "
 lmf_heir.1681.desc.train.second:0 ", "
 lmf_heir.1681.desc.train.third:0 ", et "
 lmf_heir.1681.desc.host:0 "à m'entraîner avec [heir_visit_target.Custom('FR_LuiElle')] en personne"
 lmf_heir.1681.desc.castle:0 "à sa Cour"
 lmf_heir.1681.desc.sick:0 "à me reposer, la faute à une maladie qui m'a cloué au lit"
 lmf_heir.1681.desc.hunt:0 "à chasser dans la nature environnante"
 lmf_heir.1681.desc.tour:0 "à parcourir les contrées pour y apprendre les us et coutumes des petites gens"
 lmf_heir.1681.desc.party:0 "à profiter des réjouissances que pouvait offrir les lieux de plaisance alentours"
 lmf_heir.1681.desc.nothing:0 "à musarder un brin"
 lmf_heir.1681.desc.train.good:0 ". »\n\nLe reste de la lettre se perd en détail, mais pour autant que je puisse comprendre, à l'issue de ce séjour, m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))] s'en est trouvé[your_heir.Custom('FR_E')] grandi[your_heir.Custom('FR_E')]."
 lmf_heir.1681.desc.train.poor:0 ". »\n\nMalgré les nombreux détails qui suivent, la lecture de cette lettre me laisse comprendre que m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('your_heir'))] est loin d'être ressorti[your_heir.Custom('FR_E')] grandi[your_heir.Custom('FR_E')] de ce séjour."
 lmf_heir.1681.desc.train.neutral:0 ". »\n\nLa lettre est émaillée de détails, mais à lire entre les lignes, j'en conclus que, à défaut d'être parfait, ce séjour n'a pas été pour autant une expérience déplaisante."
 lmf_heir.1681.a:0 "Que son voyage de retour se fasse sans encombre."
 lmf_heir.1681.secrets.to.tell.tt:0 "[your_heir.Custom('FR_le_Char_Pi')|U][your_heir.GetTitledFirstNameNoTooltip] vous révèle quelques secrets qu'[your_heir.Custom('FR_IlElle')] a découverts durant son séjour…"
 lmf_heir.1700.own.t:0 "[Select_CString(bastard_child.IsFemale,'Ma fille bâtarde','Mon fils bâtard')] ?"
 lmf_heir.1700.son.t:0 "[Select_CString(bastard_child.IsFemale,'Ma petite-fille bâtarde','Mon petit-fils bâtard')] ?"
 lmf_heir.1700.relative.t:0 "[Select_CString(bastard_child.IsFemale,'La bâtarde','Le bâtard')] de m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('bastard_child_father'))] ?"
 lmf_heir.1700.bastard.me.start:0 "Un[visitor.Custom('FR_E')] roturi[visitor.Custom('FR_ErEre')] se présente à m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] en ce jour, et si venant d'une personne du commun je m'attends à une entrevue du commun, celle-ci en devient singulière quand [bastard_child.Custom('FR_LeLa')] jeune [bastard_child.GetWomanMan] affirme être m[bastard_child.Custom('FR_OnA')] [bastard_child.Custom('GetDaughterSon')].\n\nJe saisis son visage et inspecte ses traits. La suspicion laisse place à la révélation quand j'y vois un faciès familier : « À demi [ROOT.Char.GetHouse.GetNameNoTooltip], à demi manant[bastard_child.Custom('FR_E')]. » Selon ses dires, j'aurais #italic rencontré#! sa mère "
 lmf_heir.1700.bastard.me.heirvisit:0 "lors d'une nuit de beuverie bien arrosée. Je rendais alors visite [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.Custom('FR_au_Char_Pi')][story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstName] à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], dans le cadre de ma formation d'hériti[ROOT.Char.Custom('FR_ErEre')]. Cela remonte à plusieurs lunes, mais le souvenir est bien là.\n\n"
 lmf_heir.1700.bastard.me.campfollower:0 "lors d'une nuit à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], alors qu'elle n'était qu'une coureuse de camp, certes, mais du moins celle dont le charme ne m'avait pas laissé indifférent.\n\n"
 lmf_heir.1700.bastard.me.taverngirl:0 "à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], où elle servait comme fille de taverne. Cela remonte à plusieurs lunes, mais le souvenir est bien là.\n\n"
 lmf_heir.1700.bastard.me.lostguide:0 "lorsque je me suis égaré[ROOT.Char.Custom('FR_E')] dans les [story.MakeScope.Var('story_stray_seed_location').Province.Custom('FR_TerrainTypeProvince_Plural')] de [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], et qu'elle m'aida à retrouver mon chemin. Cela remonte à plusieurs lunes, mais le souvenir est bien là.\n\n"
 lmf_heir.1700.bastard.me.campcaughteye:0 "lors d'une nuit à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] alors qu'elle n'était que simple soldat. Cela remonte à plusieurs lunes, mais le souvenir est bien là.\n\n"
 lmf_heir.1700.bastard.me.foundpool:0 "à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], lors d'une halte de l'armée non loin d'une source aux vertus curatives. Cela remonte à plusieurs lunes, mais le souvenir est bien là.\n\n"
 lmf_heir.1700.bastard.me.default:0 "lors d'une nuit passée à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Cela remonte à plusieurs lunes, et je peine à rassembler les souvenirs qui m'aideraient à y voir plus clair.\n\n"
 lmf_heir.1700.bastard.me.end:0 "« Je ne demande rien de plus qu'une place à vos côtés, père. C'est là ma seule ambition. »"
 lmf_heir.1700.bastard.alive.start:0 "Un[visitor.Custom('FR_E')] roturi[visitor.Custom('FR_ErEre')] se présente à m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] en ce jour, et si venant d'une personne du commun je m'attends à une entrevue du commun, celle-ci en devient singulière quand [bastard_child.Custom('FR_LeLa')] jeune [bastard_child.GetWomanMan] affirme être [bastard_child.Custom('FR_LeLa')] [bastard_child.Custom('GetDaughterSon')] de m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('bastard_child_father'))].\n\nJe saisis son visage et inspecte ses traits. La suspicion laisse place à la révélation quand j'y vois un faciès familier : « À demi [bastard_child_father.GetFirstNameNoTooltip], à demi manant[bastard_child.Custom('FR_E')]. » Ce même [bastard_child_father.GetFirstName] qui confesse avoir forniqué avec une femme "
 lmf_heir.1700.bastard.alive.heirvisit:0 "lors d'une nuit de beuverie dans une taverne. Il rendait alors visite [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.Custom('FR_au_Char_Pi')][story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstName] à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] dans le cadre de sa formation d'hériti[bastard_child_father.Custom('FR_ErEre')].\n\n"
 lmf_heir.1700.bastard.alive.campfollower:0 "lors d'une halte militaire à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Sans doute l'une de ces fameuses « coureuses de camps », comme certains aiment à les appeler.\n\n"
 lmf_heir.1700.bastard.alive.taverngirl:0 "qui n'était rien de plus qu'une fille de taverne à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Laquelle il a rencontré lors d'une halte militaire.\n\n"
 lmf_heir.1700.bastard.alive.lostguide:0 "alors qu'il s'était perdu dans les [story.MakeScope.Var('story_stray_seed_location').Province.Custom('FR_TerrainTypeProvince_Plural')] de [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_heir.1700.bastard.alive.campcaughteye:0 "lors d'une halte militaire à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Une soldat selon ses dires.\n\n"
 lmf_heir.1700.bastard.alive.foundpool:0 "rencontrée par hasard à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], alors qu'il se baignait dans une source aux vertus soi-disant curatives selon ses dires.\n\n"
 lmf_heir.1700.bastard.alive.default:0 "lors d'une nuit de réjouissance à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], sans pour autant donner plus de détails.\n\n"
 lmf_heir.1700.bastard.alive.end:0 "« Je ne demande rien de plus qu'une place aux côtés de ma famille. C'est là ma seule ambition. »"
 lmf_heir.1700.bastard.dead.start:0 "Un[visitor.Custom('FR_E')] roturi[visitor.Custom('FR_ErEre')] se présente à m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] en ce jour, et si venant d'une personne du commun je m'attends à une entrevue du commun, celle-ci en devient singulière quand [bastard_child.Custom('FR_LeLa')] jeune [bastard_child.GetWomanMan] affirme être [bastard_child.Custom('FR_LeLa')] [bastard_child.Custom('GetDaughterSon')] de feu m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('bastard_child_father'))], [bastard_child_father.Custom('FR_le_Char_Pi')][bastard_child_father.GetTitledFirstName].\n\nJe saisis son visage et inspecte ses traits. La suspicion laisse place à la révélation quand j'y vois un faciès familier : « À demi [bastard_child_father.GetFirstNameNoTooltip], à demi manant[bastard_child.Custom('FR_E')]. » Selon ses dires, la rencontre aurait eu lieu "
 lmf_heir.1700.bastard.dead.heirvisit:0 "lors d'une nuit de beuverie, dans une taverne à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Et en effet, je crois me souvenir que [bastard_child_father.GetFirstNameNoTooltip] a autrefois rendu visite [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.Custom('FR_au_Char_Pi')][story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstName].\n\n"
 lmf_heir.1700.bastard.dead.campfollower:0 "lors d'une halte militaire à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Si sa mère était l'une de ces fameuses « coureuses de camps » comme certains aiment à les appeler, alors je concède que son histoire est plausible.\n\n"
 lmf_heir.1700.bastard.dead.taverngirl:0 "dans une taverne à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Sa mère était alors simple fille de taverne, et pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.bastard.dead.lostguide:0 "alors que [bastard_child_father.GetFirstNameNoTooltip] s'était perdu dans les [story.MakeScope.Var('story_stray_seed_location').Province.Custom('FR_TerrainTypeProvince_Plural')] de [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.bastard.dead.campcaughteye:0 "lors d'une halte militaire à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Sa mère n'était que simple soldat, mais elle ne l'avait pas laissé indifférent, et pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.bastard.dead.foundpool:0 "par hasard lors d'une halte militaire, dans une source aux vertus soi-disant curatives située à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.bastard.dead.default:0 "lors d'une nuit de réjouissance à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.bastard.dead.end:0 "« Je ne demande rien de plus qu'une place aux côtés de ma famille. La seule famille qu'il me reste… »"
 lmf_heir.1700.mother.me.start:0 "Une femme de la roture se présente à m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] en ce jour, et si venant d'une personne du commun je m'attends à une entrevue du commun, celle-ci en devient singulière quand il est porté à ma connaissance que l'enfant avec elle… serait de moi.\n\nLes bribes de souvenirs s'amoncèlent et s'organisent jusqu'à former un récit dans ma tête. Oui, j'ai souvenance de l'avoir rencontrée "
 lmf_heir.1700.mother.me.heirvisit:0 "lors d'une nuit de beuverie bien arrosée. Je rendais alors visite [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.Custom('FR_au_Char_Pi')][story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstName] à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], dans le cadre de ma formation d'hériti[ROOT.Char.Custom('FR_ErEre')].\n\n"
 lmf_heir.1700.mother.me.campfollower:0 "lors d'une nuit à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], alors qu'elle n'était qu'une coureuse de camp, certes, mais du moins celle dont le charme ne m'avait pas laissé indifférent.\n\n"
 lmf_heir.1700.mother.me.taverngirl:0 "à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], où elle servait comme fille de taverne.\n\n"
 lmf_heir.1700.mother.me.lostguide:0 "lorsque je me suis égaré[ROOT.Char.Custom('FR_E')] dans les [story.MakeScope.Var('story_stray_seed_location').Province.Custom('FR_TerrainTypeProvince_Plural')] de [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_heir.1700.mother.me.campcaughteye:0 "lors d'une nuit à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] alors qu'elle n'était que simple soldat.\n\n"
 lmf_heir.1700.mother.me.foundpool:0 "à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip], lors d'une halte de l'armée non loin d'une source aux vertus curatives.\n\n"
 lmf_heir.1700.mother.me.default:0 "lors d'une nuit passée à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Je peine à raviver les détails, mais les grandes lignes sont là.\n\n"
 lmf_heir.1700.mother.me.mid:0 "Sa présence ici, ainsi que celle "
 lmf_heir.1700.mother.me.newborn:0 "du bébé dans ses bras, ne fait aucun doute : "
 lmf_heir.1700.mother.me.child:0 "[bastard_child.Custom('FR_DuDela')] [bastard_child.Custom('polite_gender_ref')] à ses côtés, ne fait aucun doute : "
 lmf_heir.1700.mother.me.end:0 "« [bastard_child.Custom('FR_IlElle')|U] est de votre sang, et je ne demande rien d'autre qu'une place dans votre [ROOT.Char.Custom('ResidenceBuilding')]. Ma seule ambition est celle d'une mère qui souhaite offrir la meilleure vie qui soit à s[bastard_child.Custom('FR_OnA')] [bastard_child.Custom('GetDaughterSon')]. »"
 lmf_heir.1700.mother.alive.start:0 "Une femme de la roture se présente à m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] en ce jour, et si venant d'une personne du commun je m'attends à une entrevue du commun, celle-ci en devient singulière quand il est porté à ma connaissance que l'enfant avec elle… serait [bastard_child.Custom('FR_LeLa')] [bastard_child.Custom('GetDaughterSon')] de m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('bastard_child_father'))].\n\nÀ bien y regarder, j'y vois effectivement un faciès familier, et la suspicion laisse place alors à la révélation : « À demi [bastard_child_father.GetFirstNameNoTooltip], à demi manant[bastard_child.Custom('FR_E')]. » Ce même [bastard_child_father.GetFirstName] qui confesse reconnaître la mère."
 lmf_heir.1700.mother.alive.heirvisit:0 "avec laquelle il aurait forniqué durant une nuit de beuverie, alors qu'il rendait visite [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.Custom('FR_au_Char_Pi')][story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstName] à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] dans le cadre de sa formation d'hériti[bastard_child_father.Custom('FR_ErEre')].\n\n"
 lmf_heir.1700.mother.alive.campfollower:0 "qui n'était rien de plus qu'une de ces fameuses « coureuses de camps » comme certains aiment à les appeler, et avec qui il aurait forniqué lors d'une halte à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_heir.1700.mother.alive.taverngirl:0 "qui n'était rien de plus qu'une fille de taverne à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] avec laquelle il aurait forniqué lors d'une halte militaire.\n\n"
 lmf_heir.1700.mother.alive.lostguide:0 "rencontrée alors qu'il s'était perdu dans les [story.MakeScope.Var('story_stray_seed_location').Province.Custom('FR_TerrainTypeProvince_Plural')] de [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_heir.1700.mother.alive.campcaughteye:0 "qui n'était rien de plus qu'une soldat avec laquelle il aurait forniqué lors d'une halte à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_heir.1700.mother.alive.foundpool:0 "rencontrée à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip] lors d'une halte de l'armée non loin d'une source aux vertus soi-disant curatives.\n\n"
 lmf_heir.1700.mother.alive.default:0 "avec laquelle il aurait forniqué lors d'une nuit de réjouissance il y a plusieurs lunes de cela à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_heir.1700.mother.alive.mid:0 "Sa présence ici, ainsi que celle "
 lmf_heir.1700.mother.alive.newborn:0 "du bébé dans ses bras, ne fait aucun doute : "
 lmf_heir.1700.mother.alive.child:0 "[bastard_child.Custom('FR_DuDela')] [bastard_child.Custom('polite_gender_ref')] à ses côtés, ne fait aucun doute : "
 lmf_heir.1700.mother.alive.end:0 "« [bastard_child.Custom('FR_IlElle')|U] est de votre sang, et je ne demande rien d'autre qu'une place dans votre [ROOT.Char.Custom('ResidenceBuilding')]. Ma seule ambition est celle d'une mère qui souhaite offrir la meilleure vie qui soit à s[bastard_child.Custom('FR_OnA')] [bastard_child.Custom('GetDaughterSon')]. »"
 lmf_heir.1700.mother.dead.start:0 "Une femme de la roture se présente à m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] en ce jour, et si venant d'une personne du commun je m'attends à une entrevue du commun, celle-ci en devient singulière quand il est porté à ma connaissance que l'enfant avec elle… serait [bastard_child.Custom('FR_LeLa')] [bastard_child.Custom('GetDaughterSon')] de feu m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('bastard_child_father'))], [bastard_child_father.Custom('FR_le_Char_Pi')][bastard_child_father.GetTitledFirstName].\n\nÀ bien y regarder, j'y vois effectivement un faciès familier, et la suspicion laisse place alors à la révélation : « À demi [bastard_child_father.GetFirstNameNoTooltip], à demi manant[bastard_child.Custom('FR_E')]. » Selon les dires de la mère, la rencontre aurait eu lieu "
 lmf_heir.1700.mother.dead.heirvisit:0 "lors d'une nuit de beuverie, dans une taverne à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Et en effet, je crois me souvenir que [bastard_child_father.GetFirstNameNoTooltip] a autrefois rendu visite [story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.Custom('FR_au_Char_Pi')][story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstName].\n\n"
 lmf_heir.1700.mother.dead.campfollower:0 "lors d'une halte militaire à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Si elle était l'une de ces fameuses « coureuses de camps » comme certains aiment à les appeler, alors je concède que son histoire est plausible.\n\n"
 lmf_heir.1700.mother.dead.taverngirl:0 "dans une taverne à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Elle n'était alors que simple fille de taverne, et pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.mother.dead.lostguide:0 "alors que [bastard_child_father.GetFirstNameNoTooltip] s'était perdu dans les [story.MakeScope.Var('story_stray_seed_location').Province.Custom('FR_TerrainTypeProvince_Plural')] de [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.mother.dead.campcaughteye:0 "lors d'une halte militaire à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Elle n'était que simple soldat, mais elle ne l'avait pas laissé indifférent, et pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.mother.dead.foundpool:0 "par hasard lors d'une halte militaire, dans une source aux vertus soi-disant curatives située à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.mother.dead.default:0 "lors d'une nuit de réjouissance à [story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]. Pour autant que je puisse me prononcer, l'histoire semble plausible.\n\n"
 lmf_heir.1700.mother.dead.mid:0 "Sa présence ici, ainsi que celle "
 lmf_heir.1700.mother.dead.newborn:0 "du bébé dans ses bras, ne fait aucun doute : "
 lmf_heir.1700.mother.dead.child:0 "[bastard_child.Custom('FR_DuDela')] [bastard_child.Custom('polite_gender_ref')] à ses côtés, ne fait aucun doute : "
 lmf_heir.1700.mother.dead.end:0 "« [bastard_child.Custom('FR_IlElle')|U] est de votre sang, et je ne demande rien d'autre qu'une place dans votre [ROOT.Char.Custom('ResidenceBuilding')]. Ma seule ambition est celle d'une mère qui souhaite offrir la meilleure vie qui soit à s[bastard_child.Custom('FR_OnA')] [bastard_child.Custom('GetDaughterSon')]. »"
 lmf_heir.1700.a:0 "Ma sincère hospitalité contre votre complète discrétion, est-ce clair ?"
 lmf_heir.1700.b:0 "C'est ici qu'est votre place, naturellement, et sans honte aucune."
 lmf_heir.1700.c:0 "Votre présence me déplait autant que votre odeur. Du vent !"
 lmf_interaction.0001.t:0 "The Disinheritance"
 lmf_interaction.0001.opening.submissive:0 "[recipient.GetTitledFirstNameNoTooltip] asked to speak with me in my throne room this morning, quietly taking a respectful knee as [recipient.GetSheHe] spoke with quiet but determined words.\n\n"
 lmf_interaction.0001.opening.dominant:0 "[recipient.GetTitledFirstNameNoTooltip] strode into my throne room this morning, demanding a private audience. Curious, I granted it. When [recipient.GetSheHe] stood before me and spoke, [recipient.GetHerHis] words were confident... but, even so, there was an underlying nervousness which betrayed [recipient.GetHerHis] bravado.\n\n"
 lmf_interaction.0001.opening:0 "[recipient.GetTitledFirstNameNoTooltip] requested a private audience in the throne room this morning. Curious what [recipient.GetSheHe] might have to say, I granted it. As [recipient.GetSheHe] stood before me, [recipient.GetHerHis] demeanor held the seriousness of one who had considered their words for some time.\n\n"
 lmf_interaction.0001.address.family:0 "\"[recipient.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))|U], "
 lmf_interaction.0001.address:0 "\"My [actor.GetLadyLord], "
 lmf_interaction.0001.disinheritor:0 "I cannot say for certain why you decided to strip me of my inheritance. Perhaps it's because you see me as "
 lmf_interaction.0001.dynast:0 "I cannot say for certain why my inheritance has been stripped of me. Perhaps it's because I am perceived as "
 lmf_interaction.0001.worst.deviant:0 "some kind of sexual deviant, unworthy of being given a title. Yet am I not also "
 lmf_interaction.0001.worst.unintelligent:0 "unintelligent, someone who cannot be trusted with the decisions required of a ruler. Yet am I not also "
 lmf_interaction.0001.worst.crazy:0 "unstable and erratic, someone who cannot be trusted with power. Yet am I not also "
 lmf_interaction.0001.worst.unskilled:0 "unskilled, lacking in the qualities required of a ruler. Yet am I not also "
 lmf_interaction.0001.worst.cowardly:0 "a coward, without any manner of backbone. Yet am I not also "
 lmf_interaction.0001.worst.dishonorable:0 "lacking in honor and good grace. "
 lmf_interaction.0001.worst.faithless:0 "faithless and therefore a poor follower of [ROOT.Char.GetFaith.GetNameNoTooltip]. Yet am I not also "
 lmf_interaction.0001.worst.callous:0 "too callous and cruel to be given responsibility over others. Yet am I not also "
 lmf_interaction.0001.worst.untrustworthy:0 "too untrustworthy and without moral character. Yet am I not also "
 lmf_interaction.0001.worst.drunkard:0 "a drunkard who will never pull myself together. Yet am I not also "
 lmf_interaction.0001.worst.weak:0 "too weak and frail, lacking in the stamina required of a ruler. Yet am I not also "
 lmf_interaction.0001.worst.submissive:0 "too submissive, lacking the backbone needed of a true ruler. Yet am I not also "
 lmf_interaction.0001.worst.malicious:0 "too malicious, somehow lacking in the good character required of a ruler. Yet am I not also "
 lmf_interaction.0001.worst.unworthy:0 " unworthy, lacking some unknown quality required for greatness. Yet am I not also "
 lmf_interaction.0001.best.intelligent:0 "intelligent? I have all my wits about me, and more besides.\"\n\n"
 lmf_interaction.0001.best.skilled:0 "capable? I am skilled in every aspect required of a liege.\"\n\n"
 lmf_interaction.0001.best.bold:0 "bold? I would throw myself into the flames without hesitation, if it were necessary.\"\n\n"
 lmf_interaction.0001.best.zealous:0 "a faithful and zealous follower of [ROOT.Char.GetFaith.GetNameNoTooltip]?\"\n\n"
 lmf_interaction.0001.best.warrior:0 "a strong warrior? I am, after all, most at home on the battlefield.\"\n\n"
 lmf_interaction.0001.best.honorable:0 "honorable? Is this not a quality worthy of the [ROOT.Char.GetDynasty.GetBaseNameNoTooltip] dynasty?\"\n\n"
 lmf_interaction.0001.best.compassionate:0 "soulful and compassionate? Are these not qualities worthy of the [ROOT.Char.GetDynasty.GetBaseNameNoTooltip] dynasty?\"\n\n"
 lmf_interaction.0001.best.levelheaded:0 "solid and levelheaded? I can be trusted to keep my wits about me at the worst of times, and you know it.\"\n\n"
 lmf_interaction.0001.best.benevolent:0 "a [ROOT.Char.GetWomanMan] of virtue? Surely a liege who is pure of heart can only bring our dynasty honor?\"\n\n"
 lmf_interaction.0001.best.just:0 "just? Is wisdom and an affinity for law not one of the most important qualities needed in a liege?\"\n\n"
 lmf_interaction.0001.best.proud:0 "a proud member of the [ROOT.Char.GetDynasty.GetBaseNameNoTooltip] dynasty?\"\n\n"
 lmf_interaction.0001.main:0 "[recipient.Custom2('disinherit_worst_trait', SCOPE.sC('actor'))][recipient.Custom2('disinherit_best_trait', SCOPE.sC('actor'))]"
 lmf_interaction.0001.ending.dynast:0 "\"I know you were not the one who made this decision, and thus I now request"
 lmf_interaction.0001.ending.submissive:0 "\"I kneel before you today to ask with all due respect and humility"
 lmf_interaction.0001.ending.dominant:0 "\"I stand before you today to respectfully demand"
 lmf_interaction.0001.ending:0 "\"I stand before you today to request"
 lmf_interaction.0001.close.family:0 ", as your [actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))],"
 lmf_interaction.0001.close.dynast:0 " that you reverse this decision and restore my good standing as a member of this dynasty.\""
 lmf_interaction.0001.close:0 " that you change your mind and restore my good standing as a member of this dynasty.\""
 lmf_interaction.0001.a:0 "You've convinced me."
 lmf_interaction.0001.b:0 "Alas, I cannot do as you ask."
 lmf_interaction.0001.b.tt:0 "[recipient.GetTitledFirstNameNoTooltip] may react poorly to your decision..."
 lmf_interaction.0002.t:0 "Inheritance Refused!"
 lmf_interaction.0002.desc:0 "Though I prostrated myself before [actor.GetTitledFirstName] and explained my case, the [actor.GetWomanMan] refused to restore my rightful inheritance. \"I understand why you feel as you do,\" [actor.GetSheHe] said, \"but there are reasons why this is for the best and I cannot change them. You will have to accept your fate.\""
 lmf_interaction.0002.a:0 "No, I cannot accept this!"
 lmf_interaction.0002.a.tt:0 "[recipient.GetTitledFirstNameNoTooltip] is outraged by your refusal"
 refused_to_restore_inheritance:0 "Refused to Restore Inheritance"
 jealous_of_inheritance:0 "Jealous of Inheritance"
 lmf_interaction.0002.nw.tt:0 "[recipient.Custom('FR_le_Char_Pi')|U][recipient.GetTitledFirstNameNoTooltip] est parti rejoindre la Garde de Nuit"
 lmf_interaction.0002.took_vows.tt:0 "[recipient.Custom('FR_le_Char_Pi')|U][recipient.GetTitledFirstNameNoTooltip] a prononcé ses vœux"
 lmf_interaction.0002.maester.tt:0 "[recipient.Custom('FR_le_Char_Pi')|U][recipient.GetTitledFirstNameNoTooltip] est parti rejoindre les mestres à la Citadelle"
 lmf_interaction.0002.left_court.tt:0 "[recipient.Custom('FR_le_Char_Pi')|U][recipient.GetTitledFirstNameNoTooltip] a décidé de quitter votre Cour"
 lmf_interaction.0002.b:0 "I suppose [actor.GetSheHe] is right..."
 lmf_interaction.0002.b.tt:0 "[recipient.GetTitledFirstNameNoTooltip] humbly accepts your judgment"
 disinherited_betrothal_upset_tt:0 "[disinherited_character.betrothed.liege.GetTitledFirstName] may be upset by the disinheritance and choose to break the betrothal with [disinherited_character.betrothed.GetTitledFirstName]"
 lmf_interaction.0004.desc:0 "My [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_betrothed'))] brought me upsetting news today: [disinherited_betrothed.GetHerHis] betrothed has been disinherited by [disinherited_character.GetHerHis] [disinherited_character.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinheritor'))], [disinheritor.GetTitledFirstName]! This clearly violates the understanding I had regarding [disinherited_character.GetTitledFirstNamePossessiveNoTooltip] future prospects."
 lmf_interaction.0004.a:0 "I'll consider that a violation of the betrothal."
 lmf_interaction.0004.b:0 "It's too late. The betrothal will continue."
 lmf_interaction.0005.opening:0 "[betrothed_liege.Custom2('GreetingToForeignRulerNegative', ROOT.Char )],"
 lmf_interaction.0005.desc:0 "The disinheritance of your [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_character'))] compromises the understanding I had of [disinherited_character.GetHerHis] future prospects, as well as the kind of life [disinherited_character.GetSheHe] would have with my [betrothed_liege.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_betrothed'))]. As far as I am concerned, this renders [disinherited_character.GetHerHis] betrothal with [disinherited_betrothed.GetTitledFirstName] null and void."
 lmf_interaction.0005.a:0 "Not surprising, I suppose."
 lmf_interaction.1200.t:0 "Un[recipient.Custom('FR_E')] [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] [Select_CString(recipient.IsFemale,'croqueuse de cœurs','bourreau des cœurs')]"
 lmf_interaction.1200.desc.three:0 "Je ne suis pas sans savoir l'existence des nombreuses conquêtes de m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('recipient'))], "
 lmf_interaction.1200.desc.two:0 "Se complaisant à [Select_CString(recipient.IsFemale,'jouer la gourgande','courir le guilledou')], m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('recipient'))] ne peut se contenter d'une seule aventure, "
 lmf_interaction.1200.desc.mid:0 "et je ne puis laisser cette souillure entacher davantage notre maison.\n\nDu reste, je m'interroge. Dois-je sommer [recipient.GetFirstName] de mettre un terme aux frasques auxquelles [recipient.Custom('FR_IlElle')] se livre avec "
 lmf_interaction.1200.desc.three.end:0 "toutes ses aventures ? Ou n'est-ce l'affaire que d'un seul problème ?"
 lmf_interaction.1200.desc.two.end:0 "ses deux conquêtes ? Ou n'est-ce l'affaire que d'un seul problème ?"
 lmf_interaction.1200.a:0 "C'est avant tout [lover_1.Custom('FR_le_Char_Pi')][lover_1.GetTitledFirstName], le problème dans cette histoire !"
 lmf_interaction.1200.b:0 "Frayer avec [lover_2.Custom('FR_le_Char_Pi')][lover_2.GetTitledFirstName] ? Quelle infamie !"
 lmf_interaction.1200.c:0 "Je ne veux pas voir [lover_3.Custom('FR_le_Char_Pi')][lover_3.GetTitledFirstName] tourner autour de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('recipient'))] !"
 lmf_interaction.1200.d:0 "Ces inconduites jettent l'opprobre sur notre famille, et cela doit cesser !"
 lmf_interaction.1200.e:0 "Ces inconduites jettent l'opprobre sur notre famille, et cela doit cesser !"
 lmf_interaction.1200.a.success.tt:0 "[recipient.GetFirstNameNoTooltip] consent à mettre un terme à ses affaires d'alcôve"
 lmf_interaction.1200.a.failure.tt:0 "[recipient.GetFirstNameNoTooltip] refuse, mais il pourrait y avoir d'autres manières de [recipient.Custom('FR_LeLa')] convaincre…"
 lmf_interaction.1201.t:0 "Idylle et infamie"
 lmf_interaction.1201.desc.secret:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('recipient'))], corbeau de concupiscence, se risque à jeter l'opprobre sur cette maison en raison de sa liaison avec "
 lmf_interaction.1201.desc.open:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('recipient'))] a jeté l'opprobre sur cette maison, forniquant de manière éhontée avec "
 lmf_interaction.1201.desc.theirs:0 "s[recipient.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('family_lover'))], [family_lover.Custom('FR_le_Char_Pi')][family_lover.GetTitledFirstName].\n\n"
 lmf_interaction.1201.desc.default:0 "[family_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)].\n\n"
 lmf_interaction.1201.desc.mid:0 "Une décision se doit d'être prise, et au plus vite, car "
 lmf_interaction.1201.desc.secret.end:0 "si l'affaire n'a pas encore été ébruitée, cela ne saurait tarder."
 lmf_interaction.1201.desc.open.end:0 "l'affaire est trop grave pour rester en suspens."
 lmf_interaction.1201.a:0 "[recipient.GetFirstNameNoTooltip] doit mettre un terme à cette mascarade !"
 lmf_interaction.1201.a.success.tt:0 "[recipient.GetFirstNameNoTooltip] consent à mettre un terme à sa liaison"
 lmf_interaction.1201.a.failure.tt:0 "[recipient.GetFirstNameNoTooltip] refuse, mais il pourrait y avoir d'autres manières de [recipient.Custom('FR_LeLa')] convaincre…"
 lmf_interaction.1201.b:0 "Je dois m'entretenir avec [family_lover.GetFirstNameNoTooltip]…"
 lmf_interaction.1201.b.success.tt:0 "[family_lover.Custom('FR_le_Char_Pi')|U][family_lover.GetTitledFirstNameNoTooltip] consent à mettre un terme à sa liaison"
 lmf_interaction.1201.b.failure.tt:0 "[family_lover.GetFirstNameNoTooltip] refuse, mais il pourrait y avoir d'autres manières de [family_lover.Custom('FR_LeLa')] convaincre…"
 lmf_interaction.1201.c:0 "Il n'y a guère que le mariage pour laver pareille contumélie."
 lmf_interaction.1201.c.tt:0 "Vous pourrez déterminer les conditions de leur mariage"
 lmf_interaction.1201.d:0 "Je dois convaincre [family_lover.Custom('FR_le_Char_Pi')][family_lover.GetTitledFirstNameNoTooltip] de l'épouser."
 lmf_interaction.1201.d.success.tt:0 "[family_lover.Custom('FR_le_Char_Pi')|U][family_lover.GetTitledFirstNameNoTooltip] consent à contrecœur l'idée du mariage"
 lmf_interaction.1201.d.failure.tt:0 "[family_lover.GetFirstNameNoTooltip] refuse, mais il pourrait y avoir d'autres manières de [family_lover.Custom('FR_LeLa')] convaincre…"
 lmf_interaction.1201.e:0 "Je dois convaincre [recipient.GetFirstNameNoTooltip] de l'épouser."
 lmf_interaction.1201.e.success.tt:0 "[recipient.GetFirstNameNoTooltip] consent à contrecœur l'idée du mariage"
 lmf_interaction.1201.e.failure.tt:0 "[recipient.GetFirstNameNoTooltip] refuse, mais il pourrait y avoir d'autres manières de [recipient.Custom('FR_LeLa')] convaincre…"
 lmf_interaction.1201.f:0 "Il me faut les persuader d'officialiser leur liaison."
 lmf_interaction.1201.f.tt:0 "Vous devrez d'abord convaincre votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]"
 lmf_interaction.1201.f.success.tt:0 "[recipient.GetFirstNameNoTooltip] accepte à contrecœur l'idée du mariage, mais il reste encore à convaincre [family_lover.Custom('FR_le_Char_Pi')][family_lover.GetTitledFirstNameNoTooltip]"
 lmf_interaction.1201.f.failure.tt:0 "[recipient.GetFirstNameNoTooltip] refuse, mais il pourrait y avoir d'autres manières de [recipient.Custom('FR_LeLa')] convaincre…"
 lmf_interaction.1201.g:0 "Il faut savoir raison garder."
 lmfmod.demand.agree.hook.tt:0 "Puisque vous avez un hameçon contre [check.Custom('FR_LuiElle')], [check.Custom('FR_le_Char_Pi')][check.GetTitledFirstNameNoTooltip] n'aura d'autres choix que d'accepter votre requête"
