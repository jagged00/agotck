 lmf_interaction.1327.desc.church.secrec:0 "Une journée baignée dans la ferveur, ne laissant point la place aux palabres mais uniquement à l'écoute, de prières essentiellement."
 lmf_interaction.1327.desc.poor.secrec:0 "Une journée baignée dans la mansuétude, [actor.GetFaith.HouseOfWorship] devenant le phare d'une bonté qui a profité aux nécessiteux, tandis que nous nous sommes [Select_CString(And(secondary_recipient.IsFemale, actor.IsFemale), 'enrichies', 'enrichis')] de longues et plaisantes conversations."
 lmf_interaction.1327.desc.tour.secrec:0 "Une journée où la visite des alentours [actor.Custom('FR_ResidenceBuilding_Du')], bien que propice à démontrer toute la grandeur de [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], n'aura été qu'un prétexte pour faire grandir notre relation."
 lmf_interaction.1327.desc.garden.secrec:0 "Une journée où les jardins [actor.Custom('FR_ResidenceBuilding_Du')] ont vu fleurir de longues et plaisantes conversations, bourgeons d'une relation en devenir."
 lmf_interaction.1327.desc.mid.secrec:0 "Nous avons longuement échangé sur ce que nous espérions pour l'avenir, et l'indiscrétion d'yeux alentours n'aura pas été suffisante pour nous empêcher de profiter de notre mutuelle compagnie.\n\nLe soleil aura décliné dans l'horizon lointain avant que ne le fasse notre intérêt l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_actor'))] pour l'autre. C'est en cela que j'ai compris que j'étais disposé[ROOT.Char.Custom('FR_E')] à l'épouser, et réciproquement, qu'[secondary_actor.Custom('FR_IlElle')] était disposé[secondary_actor.Custom('FR_E')] à m'épouser."
 lmf_interaction.1327.desc.secrec.lover:0 "Dans ses yeux dansaient une flamme. Plus que du respect, c'était du désir. Plus qu'un[secondary_recipient.Custom('FR_E')] épou[secondary_recipient.Custom('FR_XSe')], [secondary_actor.Custom('FR_IlElle')] recherchait un[secondary_recipient.Custom('FR_E')] amant[secondary_recipient.Custom('FR_E')]."
 lmf_interaction.1327.desc.secrec.friends:0 "Notre proximité s'était muée vers un lien plus fort. Non de l'amour, mais de l'amitié. De celle qui vous lie à votre épou[secondary_actor.Custom('FR_XSe')] autrement que par le devoir ou le désir."
 lmf_interaction.1327.desc.secrec.end:0 "\n\nPersonne ici ne pourrait feindre de ne pas voir l'entrain de [actor.GetFirstNameNoTooltip] à l'égard de notre union, mais la question est de savoir ce que #bold je#! désire…"
 lmf_interaction.1327.desc.start:0 "I've heard back from [secondary_recipient.GetFirstNameNoTooltip], and [secondary_recipient.GetSheHe] writes that [secondary_recipient.GetHerHis] visit to [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] was a success.\n\nApparently, the two of them "
 lmf_interaction.1327.desc.hunting:0 "engaged in a leisurely hunt not far from the [actor.Custom('FortifiedBuilding')]. The point, of course, was not the hunt but for the two to talk. "
 lmf_interaction.1327.desc.hike:0 "roamed the lands immediately around [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], with [secondary_actor.GetFirstNameNoTooltip] pointing out various historical sights. The primary point, of course, was for the two to talk. "
 lmf_interaction.1327.desc.garrison:0 "went to the [actor.Custom('FortifiedBuilding')] garrison, [secondary_recipient.GetFirstNameNoTooltip] watching while [secondary_actor.GetFirstNameNoTooltip] sparred with the [actor.Custom('KnightCulturePluralNoTooltipLowercase')]. Whenever [secondary_actor.GetSheHe] took a break, they would talk. "
 lmf_interaction.1327.desc.seduction:0 "roamed the [actor.Custom('FortifiedBuilding')] grounds... a bit too closely, from the sounds of it. Reading between the lines, I'd judge that  [secondary_actor.GetFirstNamePossessiveNoTooltip] behavior was at times inappropriate. Even so, they had a chance to talk. "
 lmf_interaction.1327.desc.poetry:0 "roamed the [actor.Custom('FortifiedBuilding')] gardens, [secondary_recipient.GetFirstNameNoTooltip] listening as [secondary_actor.GetFirstNameNoTooltip] recited [secondary_actor.GetCulture.GetNameNoTooltip] poems on love and valor. Mostly, however, they talked. "
 lmf_interaction.1327.desc.library:0 "toured the [actor.Custom('FortifiedBuilding')]'s library, hunting through the shelves as [secondary_actor.GetFirstNameNoTooltip] showed [secondary_recipient.GetFirstNameNoTooltip] their most prized tomes. The point was less the books, of course, but for the two of them to talk. "
 lmf_interaction.1327.desc.church:0 "went to the [actor.GetFaith.HouseOfWorship|l], listening to sermons on piety when they weren't talking. "
 lmf_interaction.1327.desc.tavern:0 "journeyed to a village near the [actor.Custom('FortifiedBuilding')], primarily in a tavern. [secondary_actor.GetFirstNameNoTooltip] was determined to make merry, [secondary_recipient.GetSheHe] writes, but even so they had many chances to talk. "
 lmf_interaction.1327.desc.poor:0 "were outside the [actor.GetFaith.HouseOfWorship|l] in [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], providing alms and comfort to the poor. While a worthy endeavor, of course the primary purpose was for them to talk. "
 lmf_interaction.1327.desc.tour:0 "toured the [actor.Custom('FortifiedBuilding')] and the surrounding lands. [secondary_actor.GetFirstNameNoTooltip] proudly showed off what [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] had to offer, though the point of course was for the two of them to talk. "
 lmf_interaction.1327.desc.garden:0 "walked around the [actor.Custom('FortifiedBuilding')] gardens for much of the day, a peaceful enough setting where the two had the chance to talk. "
 lmf_interaction.1327.desc.hated:0 "Despite not caring overmuch for [secondary_actor.Custom('lmf_intro_activity_short')], [secondary_recipient.GetSheHe] was won over in the end.\n\n"
 lmf_interaction.1327.desc.loved:0 "[secondary_recipient.GetSheHe|U] clearly approved of [secondary_actor.Custom('lmf_intro_activity_short')], very much so, and was won over in the end.\n\n"
 lmf_interaction.1327.desc.neutral:0 "They did exactly that, and spoke amiably despite all the eyes on them at all times.\n\n"
 lmf_interaction.1327.desc.end:0 "They appear to both be fond of each other, and amenable to the [secondary_actor.Custom2('BetrothalMarriage', SCOPE.sC('secondary_recipient'))|l]. [actor.GetTitledFirstNameNoTooltip] wishes for arrangements to get underway as soon as possible.\n\nThe real questions, then: is that what I still want?"
 lmf_interaction.1327.b:0 "Je [secondary_actor.Custom('FR_LeLa')] prendrais pour épou[secondary_actor.Custom('FR_XSe')], point."
 lmf_interaction.1327.e:0 "Mon cœur réclame plus qu'un[secondary_actor.Custom('FR_E')] épou[secondary_actor.Custom('FR_XSe')]."
 lmf_interaction.1327.f:0 "Plus que mon épou[secondary_actor.Custom('FR_XSe')], ce sera également mon ami[secondary_actor.Custom('FR_E')]."
 overrode_marriage_wishes:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'êtes','est')] passé[TARGET_CHARACTER.Custom('FR_E')] outre la volonté [CHARACTER.Custom('FR_du_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] d'épouser qui bon lui semblera."
 overrode_marriage_wishes_corresponding:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [Select_CString(CHARACTER.IsLocalPlayer,'êtes','est')] passé[CHARACTER.Custom('FR_E')] outre la volonté [TARGET_CHARACTER.Custom('FR_du_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] d'épouser qui bon lui semblera."
 married_to_someone_I_dislike:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] [TARGET_CHARACTER.LocalPlayerString('vous ', '')][Select_CString(CHARACTER.IsLocalPlayer,'avez','a')] contraint[TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUINameNoTooltip')] à épouser quelqu'un [Select_CString(TARGET_CHARACTER.IsLocalPlayer,'que vous n’aimez',Select_CString(TARGET_CHARACTER.IsFemale,'qu’elle n’aime','qu’il n’aime'))] pas."
 married_to_someone_I_dislike_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] [CHARACTER.LocalPlayerString('vous ', '')][Select_CString(TARGET_CHARACTER.IsLocalPlayer,'avez','a')] contraint[CHARACTER.LocalPlayerString('', 'Loc_FR_le_GetShortUINameNoTooltip')] à épouser quelqu'un [Select_CString(CHARACTER.IsLocalPlayer,'que vous n’aimez',Select_CString(CHARACTER.IsFemale,'qu’elle n’aime','qu’il n’aime'))] pas."
 force_marriage_intro_ask_rec.tt:0 "Si [recipient.Custom('FR_le_Char_Pi')][recipient.GetTitledFirstName] donne son consentement, [secondary_recipient.Custom('FR_le_Char_U_Pi')][secondary_recipient.GetShortUINameNoTooltip] et [secondary_actor.Custom('FR_le_Char_U_Pi')][secondary_actor.GetShortUINameNoTooltip] [Select_CString(Or(secondary_recipient.IsLocalPlayer, secondary_actor.IsLocalPlayer), 'serez', 'seront')] uni[secondary_recipient.Custom2('FR_E', SCOPE.sC('secondary_actor'))]s"
 became_enemies_at_introduction:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUINameNoTooltipNoFormat|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(Or(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'avez', 'ont')] nourris une haine immédiate l'un[CHARACTER.Custom2('FR_E', SCOPE.sC('TARGET_CHARACTER'))] envers l'autre lors de [Select_CString(Or(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'votre', 'leur')] rencontre prénuptiale."
 became_enemies_at_introduction_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUINameNoTooltipNoFormat] [Select_CString(Or(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'avez', 'ont')] nourris une haine immédiate l'un[CHARACTER.Custom2('FR_E', SCOPE.sC('TARGET_CHARACTER'))] envers l'autre lors de [Select_CString(Or(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'votre', 'leur')] rencontre prénuptiale."
 lmf_interaction.1328.t:0 "Une rencontre désastreuse"
 lmf_interaction.1328.desc.secact.actor.start:0 "« Désastre » est le mot qu'il convient en effet d'employer pour qualifier cette journée passée en compagnie de [secondary_recipient.GetFirstName], "
 lmf_interaction.1328.desc.secact.both.loved:0 "ce qui ne manque pas de me surprendre puisque j'avais remarqué des pointes de contentement de sa part, quelques heures auparavant.\n\n"
 lmf_interaction.1328.desc.secact.both.hated:0 "car si je pensais que [secondary_actor.Custom('lmf_intro_activity_short')] pouvait être une bonne idée pour nous aider à tisser un lien, je n'aurais pas pu être plus à l'opposée de la vérité.\n\n"
 lmf_interaction.1328.desc.secact.both.neutral:0 "en dépit du fait que [secondary_actor.Custom('lmf_intro_activity_short')] n'avait pas été une si mauvaise idée pour tenter de nous rapprocher.\n\n"
 lmf_interaction.1328.desc.secact.both.hunting:0 "La chasse eut beau être un prétexte pour nous retrouver en solitaire, j'avais tout de même escompté mettre la main, sinon sur une venaison, au moins sur sa faveur. Mais le caractère rustique de la balade à cheval n'aura pas aidé à rendre plus agréables nos échanges, que l'on pourrait résumer par une succession ininterrompue d'estrivances enflammées et de silences glaçants.\n\n"
 lmf_interaction.1328.desc.secact.both.hike:0 "J'aurais cru qu'une bonne randonnée aurait pu nous aider à faire circuler nos fluides et, par là même, grandement vivifier notre entente, mais que nenni. Ni le paysage, ni même mes récits visant à conter l'histoire entourant les lieux n'auront rendu nos échanges plus cordiaux.\n\n"
 lmf_interaction.1328.desc.secact.both.garrison:0 "Qu'importe tous les efforts que j'ai pu faire à jouer de m[ROOT.Char.Custom('FR_OnA_signature_weapon')] avec le reste des [actor.Custom('KnightCulturePluralNoTooltipLowercase')], son dédain avait l'ascendant sur mes efforts. Pour chaque adversaire que j'envoyais au sol, ses yeux montaient au ciel.\n\n"
 lmf_interaction.1328.desc.secact.both.poetry:0 "Toute la poésie du monde n'aurait jamais pu m'aider à gagner un cœur si froid à mon égard. J'aurais pu chanter ses louanges avec mille mots comme un seul, je savais qu'[secondary_recipient.Custom('FR_IlElle')] resterait sourd[secondary_recipient.Custom('FR_E')] à mes efforts.\n\n"
 lmf_interaction.1328.desc.secact.both.library:0 "Nous avons visité tant de lieux en un. Des versants de Montdragon aux jungles de Sothoryos, des dunes de Dorne aux labyrinthes de Lorath. Tout cela en parcourant des écrits consignés dans de pesants volumes. Tant de lieux où nous aurions aimé être l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] et l'autre, mais surtout loin de l'autre.\n\n"
 lmf_interaction.1328.desc.secact.both.church:0 "Les sermons proférés, les prières adressées, rien ne semblait l'ouvrir à la béatitude. Je pouvais aller puiser mon inspiration dans [ROOT.Char.GetFaith.ReligiousText] ou m'essayer à un hymne au nom [ROOT.Char.GetFaith.HealthGodNamePossessive], tout ce que j'obtenais c'était un désintérêt constant.\n\n"
 lmf_interaction.1328.desc.secact.both.poor:0 "Au pied [actor.GetFaith.HouseOfWorship3] nos occasions de converser ont été trop rares. Parmi les miséreux, je pensais que notre relation aurait pu grandement s'enrichir, mais hélas, de tous les désœuvrés j'étais [ROOT.Char.Custom('FR_CeluiCelle')] dont la fortune souriait le moins.\n\n"
 lmf_interaction.1328.desc.secact.both.tour:0 "Nous avons rapidement fait le tour [actor.Custom('FR_ResidenceBuilding_Du')] et des environs, tout comme nous avons rapidement fait le tour de tout ce que nous pouvions nous dire. Pour autant que je pouvais en juger, le paysage lui donnait prétexte à regarder au loin, sans avoir à se soucier de ce qui se trouvait au plus près.\n\n"
 lmf_interaction.1328.desc.secact.both.garden:0 "Était-ce sot de ma part de croire que fleurs et verdure aideraient notre relation à fleurir ? Que le parfum envoûtant des lieux ferait germer quelques échanges passionnels ? Je le crains, car [secondary_recipient.Custom('FR_IlElle')|U] était devenu[secondary_recipient.Custom('FR_E')] pour moi une rose dont l'animosité avait le même piquant que des épines.\n\n"
 lmf_interaction.1328.desc.secact.both.mid:0 "J'imputerais à la sensation d'avoir été constamment épié[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))]s le manque d'aisance dans nos témoignages d'affections réciproques, ou, pour le dire dans des termes à l'élégance moins ostentatoire, nous n'avons aucune affinité l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] envers l'autre et cette journée nous aura au moins permis de nous en rendre compte."
 lmf_interaction.1328.desc.secact.secact.loved:0 "alors même que j'avais bon espoir qu'il en soit autrement, voyant à quel point [secondary_actor.Custom('lmf_intro_activity_short')] semblait lui plaire.\n\n"
 lmf_interaction.1328.desc.secact.secact.hated:0 "nonobstant que [secondary_actor.Custom('lmf_intro_activity_short')] lui fut particulièrement désagréable, j'ai naïvement cru que cela allait s'arranger avec quelques efforts. Naïvement, en effet.\n\n"
 lmf_interaction.1328.desc.secact.secact.neutral:0 "et l'appréciation qu'[secondary_recipient.Custom('FR_IlElle')] avait pour [secondary_actor.Custom('lmf_intro_activity_short')] n'y a pas changé grand-chose à dire vrai.\n\n"
 lmf_interaction.1328.desc.secact.secact.hunting:0 "Notre petite chevauchée fut un tel plaisir que j'avais fini par en oublier qu'il nous fallait attraper une quelconque venaison. Une créature sortie des légendes aurait pu bondir sous mes yeux que je n'y aurais point prêté attention"
 lmf_interaction.1328.desc.secact.secact.hike:0 "Notre petite sortie fut l'occasion pour [secondary_recipient.Custom('FR_LuiElle')] d'en apprendre plus sur l'histoire de la région, tout comme j'ai pu moi-même en apprendre plus sur [secondary_recipient.Custom('FR_LuiElle')]"
 lmf_interaction.1328.desc.secact.secact.garrison:0 "Plus je mettais de vigueur à combattre mes [actor.Custom('KnightCulturePluralNoTooltipLowercase')], plus j'avais d'ardeur à discuter avec [secondary_recipient.Custom('FR_LuiElle')]"
 lmf_interaction.1328.desc.secact.secact.poetry:0 "Les couleurs étaient chatoyantes, tout autant qu'enivrant furent les parfums, jaçoit qu'il n'y avait dans ces jardins [Select_CString(secondary_recipient.IsFemale,'nulle muse plus inspirante','meilleur source d’inspiration')] pour ma poésie que [secondary_recipient.GetFirstNameNoTooltip]"
 lmf_interaction.1328.desc.secact.secact.library:0 "Installé[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))]s dans la bibliothèque, nous étions ceint[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))]s de centaines de manuscrits, de livres, de parchemins, de volumes, qui contenaient au moins autant de récits et de savoir, et pourtant il n'y avait rien de plus captivant que [secondary_recipient.GetFirstNameNoTooltip]"
 lmf_interaction.1328.desc.secact.secact.church:0 "Des heures entières passées dans [actor.GetFaith.HouseOfWorship|l], et pourtant, ce n'était ni [actor.GetFaith.ReligiousText] ni [actor.GetFaith.ReligiousSymbol] qui captivaient mon attention, mais [secondary_recipient.GetFirstNameNoTooltip] et seulement [secondary_recipient.GetFirstNameNoTooltip]"
 lmf_interaction.1328.desc.secact.secact.poor:0 "Nous devions passer la journée à nous occuper des indigents devant les portes [actor.GetFaith.HouseOfWorship3], mais en définitif, je n'étais préoccupé que par l'idée de plaire à [secondary_recipient.GetFirstNameNoTooltip]"
 lmf_interaction.1328.desc.secact.secact.tour:0 "L'histoire entourant [actor.Custom('FR_ResidenceBuilding_Le')] aura su éveiller son intérêt, tout comme [secondary_recipient.Custom('FR_IlElle')] fut [secondary_recipient.Custom('FR_LuiElle')]-même ma source d'intérêt tout du long de notre chevauchée"
 lmf_interaction.1328.desc.secact.secact.garden:0 "Nous étions encerclé[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))]s de fleurs. Je voyais leurs couleurs, je respirais leur parfum, je sentais leur caresse, et pourtant il n'y avait qu[secondary_recipient.Custom('FR_EluiElle')] qui parvenait à éveiller mes sens"
 lmf_interaction.1328.desc.secact.secact.mid:0 "— j'étais tout simplement tombé[ROOT.Char.Custom('FR_E')] sous le charme de ses manières.\n\nUne perspective qui est rapidement devenue désagréable pour moi quand je me suis rendu[ROOT.Char.Custom('FR_E')] compte que cette dilection n'était en rien partagée. Plus la conversation se poursuivait, plus ses soupirs devenaient envahissants. La passion s'est tue pour ne laisser que la tension paraître."
 lmf_interaction.1328.desc.secact.secrec.loved:0 "ne lui en déplaise, car de toute évidence [secondary_actor.Custom('lmf_intro_activity_short')] avait été pour [secondary_recipient.Custom('FR_LuiElle')] un vrai plaisir.\n\n"
 lmf_interaction.1328.desc.secact.secrec.hated:0 "et cela avait commencé quand j'ai réalisé que [secondary_actor.Custom('lmf_intro_activity_short')] ne suscitait guère d'enthousiasme chez [secondary_recipient.Custom('FR_LuiElle')], ce qui ne l'a pas empêché de faire contre mauvaise fortune bon cœur.\n\n"
 lmf_interaction.1328.desc.secact.secrec.neutral:0 "et peut-être que sa réaction toute en nuance envers [secondary_actor.Custom('lmf_intro_activity_short')] n'y a pas été étrangère.\n\n"
 lmf_interaction.1328.desc.secact.secrec.hunting:0 "Si la chevauchée s'était entamée sur un élan de courtoisie, plus le temps passait, et plus la quête d'un gibier était devenue le prétexte idéal pour détourner l'attention chaque fois que la conversation devenait un peu trop assommante."
 lmf_interaction.1328.desc.secact.secrec.hike:0 "Si la randonnée s'était entamée sur un élan de courtoisie, plus le temps passait, et plus je commençais à me perdre volontairement dans les récits d'histoire entourant la région pour n'avoir plus à lui prêter l'oreille."
 lmf_interaction.1328.desc.secact.secrec.garrison:0 "Plus j'échangeais de coups contre mes [actor.Custom('KnightCulturePluralNoTooltipLowercase')] et moins j'étais disposé[ROOT.Char.Custom('FR_E')] à échanger de mots avec [secondary_recipient.Custom('FR_LuiElle')]."
 lmf_interaction.1328.desc.secact.secrec.poetry:0 "Quel plaisir se fut de composer des poèmes dans les jardins. Quel plaisir et quel soulagement, car ainsi transporté[ROOT.Char.Custom('FR_E')] par l'inspiration des lieux, je faisais de moins en moins attention à ce qu'[secondary_recipient.Custom('FR_IlElle')] me disait."
 lmf_interaction.1328.desc.secact.secrec.library:0 "Aucun manuscrit de la bibliothèque ne m'était étranger, aucun que je n'avais pas déjà relu à maintes occasions, et pourtant j'avais une préférence pour le confort sans surprise d'un livre plutôt que pour la découverte sans éclat des paroles de [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.secact.secrec.church:0 "Nous devions originellement passer la journée ensemble [actor.GetFaith.HouseOfWorship2], mais au plus les heures passaient, au plus je me rendais compte qu'une conversation — même à sens unique — avec [ROOT.Char.GetFaith.HighGodName], restait plus plaisant qu'une conversation avec [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.secact.secrec.poor:0 "Nous devions passer la journée à nous occuper des indigents devant les portes [actor.GetFaith.HouseOfWorship3], mais en définitif, ma préoccupation première était surtout d'éviter vaille que vaille [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.secact.secrec.tour:0 "Notre chevauchée parmi les [actor.GetCapitalLocation.Custom('FR_TerrainTypeProvince_Plural')] alentours furent la promesse de grands récits historiques, mais une promesse ternie par mon manque d'implication, car [secondary_recipient.GetFirstNameNoTooltip] qui faisait un piètre auditoire."
 lmf_interaction.1328.desc.secact.secrec.garden:0 "Nous avions prévu de passer la journée à flâner dans les jardins, mais je n'aurais pas cru que les fleurs m'offriraient meilleure compagnie que [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.secact.secrec.mid:0 "\n\nPlus les mots lui venaient, plus ma patience s'envolait. Plus son intérêt était suscité, plus ma personne était suppliciée. Ne voyait-[secondary_recipient.Custom('FR_IlElle')] pas que je n'avais nul désir de converser ? Que ses afféteries et sa dilection à mon endroit servaient un dessein creux de toute réussite ? « [ROOT.Char.Custom('CulturalCurse')|U] ! » lui aurais-je décoché si je ne m'étais contenu[ROOT.Char.Custom('FR_E')]."
 lmf_interaction.1328.desc.rival.actor:0 " Lorsque c[secondary_recipient.Custom('FR_EEtte')] [secondary_recipient.Custom('InsultNoun')] s'est gaussé[secondary_recipient.Custom('FR_E')] de moi à la suite d'un faux pas, j'ai eu grande peine à me retenir de ne pas déloger son sourire suffisant d'un revers de main."
 lmf_interaction.1328.desc.end.actor:0 "\n\nEt maintenant que le soleil disparaît dans le lointain, apparaît l'évidence que cette rencontre est bel et bien un désastre…"
 lmf_interaction.1328.desc.start:0 "Il semble que la journée pour nos deux #italic tourtereaux#!, [secondary_actor.GetFirstName] et [secondary_recipient.GetFirstName], se soit soldée de manière tout à fait désastreuse.\n\nQuelques sons de cloche sont venus résonner à mes oreilles ; "
 lmf_interaction.1328.desc.both.start:0 "il n'y avait nulle alchimie entre les deux, et ce depuis l'instant même où la rencontre avait commencé. "
 lmf_interaction.1328.desc.both.hunting:0 "Entre le gibier qui se faisait rare et les querelles qui proliféraient, la chasse fut un échec à bien des égards. Nul doute que les échos courroucés alarmèrent bien des bêtes alentours, en sus d'échauffer les esprits."
 lmf_interaction.1328.desc.both.hike:0 "Si à l'orée de leur promenade, l'allure allait de pair avec le rythme de leur conversation, au plus les pas se faisaient lourds, au plus les mots le devenaient. Et finalement, la conversation, comme l'allure, devint erratique et maladroite."
 lmf_interaction.1328.desc.both.garrison:0 "L'un[secondary_actor.Custom('FR_E')] trop accaparé[secondary_actor.Custom('FR_E')] par les combats, l'autre trop indifférent[secondary_recipient.Custom('FR_E')], plus que des mots, c'est le métal qui a raisonné à tue-tête, [secondary_actor.GetFirstNameNoTooltip] préférant échanger des parades avec les [actor.Custom('KnightCulturePluralNoTooltipLowercase')] plutôt que des paroles avec [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.both.seduction:0 "À ce que l'on m'a dit, peu de mots furent échangés. Une proximité même relative avait grande peine à se créer, et lorsque [secondary_actor.GetFirstNameNoTooltip] s'est décidé[secondary_actor.Custom('FR_E')] à s'approcher, l'attitude n'a pas du tout convenu à [secondary_recipient.GetFirstNameNoTooltip]. Le mutisme glaçant laissant place à une abondance de paroles échauffées."
 lmf_interaction.1328.desc.both.poetry:0 "Armé[secondary_actor.Custom('FR_E')] d'une plume aussi affutée que sa prose, [secondary_actor.GetFirstNameNoTooltip] se fit [actor.Custom('KnightCultureNoTooltipLowercase')] de la poésie [secondary_actor.GetCulture.GetNameNoTooltip], mais sa bataille fut cause perdue dès lors que [secondary_recipient.GetFirstNameNoTooltip] érigea un rempart d'indifférence qui les emmura l'un[secondary_actor.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] et l'autre dans l'animosité."
 lmf_interaction.1328.desc.both.library:0 "La bibliothèque aurait pu être un bon moyen pour [secondary_actor.Custom2('FR_EuxElles', SCOPE.sC('secondary_recipient'))] de se rapprocher. S'ouvrir à des récits aurait pu les aider à trouver un terrain d'entente, mais pour une raison quelconque, c'est un fossé de discorde qui s'est creusé."
 lmf_interaction.1328.desc.both.church:0 "Qui aurait pu croire que deux personnes passant la journée [actor.GetFaith.HouseOfWorship2], lieu où les sermons sont légions, serait si peu à l'écoute l'un[secondary_actor.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] de l'autre ? Et lorsqu'enfin une réelle conversation a vu le jour, elle fut bien moins convaincante que les prédications du [actor.GetFaith.PriestMale]."
 lmf_interaction.1328.desc.both.tavern:0 "Une taverne était déjà un choix bien étrange pour une rencontre de ce genre, mais quand en plus le débit de paroles fut bien moindre que celui d'alcool, je n'étais pas surpris[ROOT.Char.Custom('FR_E')] d'apprendre que sur le tard, [secondary_recipient.GetFirstNameNoTooltip] devint érubescent[secondary_recipient.Custom('FR_E')] de colère quand [secondary_actor.GetFirstNameNoTooltip] le fut d'ébriété."
 lmf_interaction.1328.desc.both.poor:0 "Si de nombreux indigents purent jouir de la bonne fortune de cette charité désintéressée, le couple dut faire contre mauvaise fortune bon cœur face à la pauvreté extrême de leurs propres conversations."
 lmf_interaction.1328.desc.both.tour:0 "Une cavalcade accentuée par les récits d'histoire qui entourent la région aurait pu être un bon point de départ pour une relation en devenir, mais hélas, la faute à un[secondary_actor.Custom('FR_E')] piètre orat[secondary_actor.Custom('FR_EurRice')] ou à un piètre auditoire, cette après-midi ne sera sans doute pas à marquer d'une pierre blanche dans leur récit commun."
 lmf_interaction.1328.desc.both.garden:0 "Les jardins auraient pu être le cadre idéal pour voir fleurir une belle relation, mais hélas, des pensées envenimées auront rendu leurs échanges aussi fragiles que des fleurs de verre."
 lmf_interaction.1328.desc.both.mid:0 "\n\nEn définitif, il n'y a guère que la glace et le feu pour être aussi irréconciliables que ces deux-là."
 lmf_interaction.1328.desc.secrec.start:0 "l'impatience dont a fait montre [secondary_actor.GetFirstNameNoTooltip] en premier lieu n'est pas passée inaperçue. "
 lmf_interaction.1328.desc.secrec.hunting:0 "Souhaitant à tout prix plaire, [secondary_actor.Custom('FR_IlElle')] en aurait délaissé le gibier alentour pour se risquer à une prise bien plus méritante : le cœur de [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.secrec.hike:0 "Désireu[secondary_actor.Custom('FR_XSe')] de plaire, [secondary_actor.Custom('FR_IlElle')] fut d'un caractère particulièrement prévenant, préoccupé[secondary_actor.Custom('FR_E')] plus par la personne que par la promenade."
 lmf_interaction.1328.desc.secrec.garrison:0 "Sa pugnacité dans les passes d'armes avec les autres [actor.Custom('KnightCulturePluralNoTooltipLowercase')] semblait fougueuse, moins pour triompher de ses adversaires que pour triompher dans la conquête d'un cœur."
 lmf_interaction.1328.desc.secrec.seduction:0 "La fougue lui vint, celle des mots. Le lyrisme de la passion, le verbe de l'entrain."
 lmf_interaction.1328.desc.secrec.poetry:0 "La chaleur de sa poésie [secondary_actor.GetCulture.GetNameNoTooltip] aura grandement résonné dans les jardins, laissant la cible de ses traits lyriques sans voix. Mais était-ce d'admiration ou d'exaspération ?"
 lmf_interaction.1328.desc.secrec.library:0 "La bibliothèque contenait tant de récits du passé, mais sa flamme, elle, était nourrie par une chose bien présente. L'attrait que pouvait susciter l'encre et le papier n'avait en rien la même saveur que l'attrait de la chair et de l'esprit."
 lmf_interaction.1328.desc.secrec.church:0 "Les sermons proclamés [actor.GetFaith.HouseOfWorship2] eurent moins d'échos que sa ferveur quasi religieuse à tenter de gagner les faveurs, point [actor.GetFaith.HighGodNameAlternatePossessive] mais de [secondary_recipient.Custom('FR_CeluiCelle')] qui semblait déjà être devenu[secondary_recipient.Custom('FR_E')] l'élu[secondary_recipient.Custom('FR_E')] de son cœur."
 lmf_interaction.1328.desc.secrec.tavern:0 "Dans la clameur d'une taverne, l'ivresse de la passion se mélangea à celle de l'alcool. Au plus les choppes se vidaient, au plus [secondary_actor.Custom('FR_IlElle')] versa dans la fougue passionnelle."
 lmf_interaction.1328.desc.secrec.poor:0 "[secondary_actor.Custom('FR_IlElle')|U] donnait sans peine aux indigents, car pour [secondary_actor.Custom('FR_LuiElle')] la récompense qui valait tout l'or du monde était de se voir offrir un sourire par [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.secrec.tour:0 "Cela s'est sans doute ressenti lors de leur cavalcade, à conter maintes et maintes histoires en toute occasion et sur toutes choses. Une fougue qui puisait sa force non dans le goût de l'histoire mais dans l'envie de plaire."
 lmf_interaction.1328.desc.secrec.garden:0 "Dans les jardins, nulle fleur ne fut aussi rayonnante que la pétulance de son entrain à l'égard de [secondary_recipient.GetFirstNameNoTooltip]. Des pensées vivaces fleurirent tout du long de la journée."
 lmf_interaction.1328.desc.secrec.hated:0 "\n\nHélas, ce fut une passion à sens unique, car [secondary_recipient.GetFirstNameNoTooltip] ne trouva nul plaisir dans leur récréation, rendant chaque heure passant plus supplicieuse que la précédente."
 lmf_interaction.1328.desc.secrec.loved:0 "\n\nHélas, si [secondary_recipient.GetFirstNameNoTooltip] trouva du plaisir dans [secondary_actor.Custom('lmf_intro_activity_short')], sa joie prit un goût de cendre sur le tard."
 lmf_interaction.1328.desc.secrec.neutral:0 "\n\nUne passion hélas non partagée puisque [secondary_recipient.GetFirstNameNoTooltip] souffrait plus de l'ennui que de l'entrain."
 lmf_interaction.1328.desc.secact.start:0 "l'entrain dont a fait montre [secondary_recipient.GetFirstNameNoTooltip] n'est pas passée inaperçue. "
 lmf_interaction.1328.desc.secact.hunting:0 "Le gibier chassait de son esprit, [secondary_recipient.Custom('FR_IlElle')] n'avait d'yeux et d'oreilles que pour [Select_CString(secondary_actor.IsFemale,'la dame','le sire')] de ses pensées, comme un oiseau de proie qui lorgnait, par l'envie attisée."
 lmf_interaction.1328.desc.secact.hike:0 "Désireu[secondary_recipient.Custom('FR_XSe')] de plaire, [secondary_recipient.Custom('FR_IlElle')] fut d'un caractère particulièrement prévenant, préoccupé[secondary_recipient.Custom('FR_E')] plus par la personne que par la promenade."
 lmf_interaction.1328.desc.secact.garrison:0 "[secondary_recipient.Custom('FR_IlElle')|U] en aurait été presque à tomber en pâmoison devant la vigueur et la pugnacité qui mettait à bas les [actor.Custom('KnightCulturePluralNoTooltipLowercase')], comme une jouvencelle à l'orée de son étrenne."
 lmf_interaction.1328.desc.secact.seduction:0 "[secondary_recipient.Custom('FR_IlElle')|U] était avide de romantisme, d'affection et d'afféterie. [secondary_recipient.Custom('FR_IlElle')|U] voulait être comblé[secondary_recipient.Custom('FR_E')] de compliments, et plus encore."
 lmf_interaction.1328.desc.secact.poetry:0 "[secondary_recipient.Custom('FR_IlElle')|U] se pâmait devant tant de poésie [secondary_actor.GetCulture.GetNameNoTooltip] déclamée, [secondary_recipient.Custom('FR_IlElle')] se félicitait qu'on quiert ses faveurs."
 lmf_interaction.1328.desc.secact.library:0 "La bibliothèque contenait tant de récits du passé, mais sa flamme, elle, était nourrie par une chose bien présente. L'attrait que pouvait susciter l'encre et le papier n'avait en rien la même saveur que l'attrait de la chair et de l'esprit."
 lmf_interaction.1328.desc.secact.church:0 "La ferveur religieuse du [actor.GetFaith.PriestMale] fit pâle figure face à la ferveur passionnelle d'un[secondary_recipient.Custom('FR_E')] [secondary_recipient.Custom('polite_gender_ref')] déjà grandement épris[secondary_recipient.Custom('FR_E')]."
 lmf_interaction.1328.desc.secact.tavern:0 "Dans la clameur d'une taverne, l'ivresse de la passion se mélangea à celle de l'alcool. Au plus les choppes se renversaient, au plus l'affection s'étalait."
 lmf_interaction.1328.desc.secact.poor:0 "[secondary_recipient.Custom('FR_IlElle')|U] donnait sans peine aux indigents, car pour [secondary_recipient.Custom('FR_LuiElle')] la récompense qui valait tout l'or du monde était de gagner la cœur de [secondary_actor.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.secact.tour:0 "Cela s'est probablement ressenti lors de leur cavalcade, à prêter l'oreille plus que de raison. Mais cette attention enthousiaste n'était pas à dessein de s'enrichir l'esprit des nombreuses histoires jalonnant la région, mais simplement de se laisser bercer par la voix qui les contait."
 lmf_interaction.1328.desc.secact.garden:0 "Si la fougue était une fleur, à n'en point douter que les jardins [actor.Custom('FR_ResidenceBuilding_Du')] ferait bien pâle figure devant un tel spécimen, lequel avait son astre étincelant à qui scander son dévouement."
 lmf_interaction.1328.desc.secact.hated:0 "\n\nMais si passion il y avait, hélas, [secondary_actor.GetFirstNameNoTooltip] n'en partageait pas même une once."
 lmf_interaction.1328.desc.secact.loved:0 "\n\nHélas, si [secondary_actor.GetFirstNameNoTooltip] trouva du plaisir dans [secondary_actor.Custom('lmf_intro_activity_short')], cela n'alla pas plus loin qu'une gaieté passagère."
 lmf_interaction.1328.desc.secact.neutral:0 "\n\nUne passion hélas esseulée par l'indifférence de [secondary_actor.GetFirstNameNoTooltip]."
 lmf_interaction.1328.desc.rival:0 " La haine avait empoissonné leur cœur, tant et si bien qu'à de multiples reprises, rires et ires se mêlèrent, les uns étant la réponse des autres, et inversement."
 lmf_interaction.1328.desc.end:0 "\n\nAlors que le soleil disparaît dans le lointain, apparaît l'évidence que cette rencontre est bel et bien un désastre…"
 lmf_interaction.1328.a:0 "[Select_CString(Or(secondary_actor.IsLocalPlayer, secondary_recipient.IsLocalPlayer), 'Notre', 'Leur')] union aura pourtant bien lieu !"
 lmf_interaction.1328.b:0 "Mieux vaut tirer un trait sur cette histoire."
 lmf_interaction.1328.c:0 "Quelqu'un semble bien prompt à l'idée de partir, en tout cas…"
 lmf_secondary_actor_may_rebel_tt:0 "@warning_icon!#X [secondary_actor.Custom('FR_le_Char_Pi')|U][secondary_actor.GetTitledFirstNameNoTooltip] pourrait s'insurger à l'idée d'être marié[secondary_actor.Custom('FR_E')] contre sa volonté !#!"
 lmf_secondary_recipient_may_rebel_tt:0 "@warning_icon!#X [secondary_recipient.Custom('FR_le_Char_Pi')|U][secondary_recipient.GetTitledFirstNameNoTooltip] pourrait s'insurger à l'idée d'être marié[secondary_recipient.Custom('FR_E')] contre sa volonté !#!"
 lmf_recipient_may_rebel_tt:0 "@warning_icon!#X [recipient.Custom('FR_le_Char_Pi')|U][recipient.GetTitledFirstNameNoTooltip] pourrait s'insurger à l'idée d'être marié[recipient.Custom('FR_E')] contre sa volonté !#!"
 lmf_interaction.1329.desc.start.secrec:0 "« Désastre » est le mot qu'il convient d'employer pour qualifier la journée passée en compagnie [secondary_actor.Custom('FR_du_Char_Pi')][secondary_actor.GetTitledFirstName], "
 lmf_interaction.1329.desc.secrec.both.start:0 "et ce n'est guère étonnant quand on voit comment elle avait commencé.\n\n"
 lmf_interaction.1329.desc.secrec.both.hunting:0 "Le caractère rustique de la balade à cheval n'aura pas aidé à rendre plus agréables nos échanges, que l'on pourrait résumer par une succession ininterrompue d'estrivances enflammées et de silences glaçants.\n\n"
 lmf_interaction.1329.desc.secrec.both.hike:0 "Une bonne randonnée aurait pu nous aider à faire circuler nos fluides et, par là même, grandement vivifier notre entente, mais loin s'en faut. Ni le paysage, ni même ses récits visant à conter l'histoire entourant les lieux n'auront rendu nos échanges plus cordiaux.\n\n"
 lmf_interaction.1329.desc.secrec.both.garrison:0 "Qu'importe tous les efforts que j'ai pu faire, je ne trouvais nul plaisir à [secondary_actor.Custom('FR_LeLa')] regarder agiter s[secondary_actor.Custom('FR_OnA_signature_weapon')], et lorsqu'[secondary_actor.Custom('FR_IlElle')] venait converser, je n'étais guère plus enjoué[ROOT.Char.Custom('FR_E')].\n\n"
 lmf_interaction.1329.desc.secrec.both.poetry:0 "[secondary_actor.Custom('FR_LuiElle')|U] qui se gargarisait tant de son talent de poète n'a pourtant déclamé que des vers sans envolée et ma foi bien galvaudés. N'y avait-il nulle source d'inspiration, ou nulle implication ?\n\n"
 lmf_interaction.1329.desc.secrec.both.library:0 "Nous avons visité tant de lieux en un. Des versants de Montdragon aux jungles de Sothoryos, des dunes de Dorne aux labyrinthes de Lorath. Tout cela en parcourant des écrits consignés dans de pesants volumes. Tant de lieux où nous aurions aimé être l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_actor'))] et l'autre, mais surtout loin de l'autre.\n\n"
 lmf_interaction.1329.desc.secrec.both.church:0 "Ces heures passées [actor.GetFaith.HouseOfWorship2] furent pour moi une véritable ordalie. Entendre sans discontinuer des sermons sur la piété, des hymnes pieux, sans n'avoir jamais le droit à la parole, quel était l'intérêt de ma présence si je devais m'effacer totalement ?\n\n"
 lmf_interaction.1329.desc.secrec.both.poor:0 "Au pied [actor.GetFaith.HouseOfWorship3] nos occasions de converser ont été trop rares. Parmi les miséreux, je pensais que notre relation aurait pu grandement s'enrichir, mais hélas, de tous les désœuvrés j'étais [ROOT.Char.Custom('FR_CeluiCelle')] dont la fortune souriait le moins.\n\n"
 lmf_interaction.1329.desc.secrec.both.tour:0 "Nous avons rapidement fait le tour [actor.Custom('FR_ResidenceBuilding_Du')] et des environs, tout comme nous avons rapidement fait le tour de tout ce que nous pouvions nous dire. Pour autant que je pouvais en juger, le paysage lui donnait prétexte à regarder au loin, sans avoir à se soucier de ce qui se trouvait au plus près.\n\n"
 lmf_interaction.1329.desc.secrec.both.garden:0 "Était-ce sot de ma part de croire que fleurs et verdure aideraient notre relation à fleurir ? Que le parfum envoûtant des lieux ferait germer quelques échanges passionnels ? Je le crains, car [secondary_actor.Custom('FR_IlElle')|U] était devenu[secondary_actor.Custom('FR_E')] pour moi une rose dont l'animosité avait le même piquant que des épines.\n\n"
 lmf_interaction.1329.desc.secrec.both.mid:0 "J'imputerais à la sensation d'avoir été constamment épié[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))]s le manque d'aisance dans nos témoignages d'affections réciproques, ou, pour le dire dans des termes à l'élégance moins ostentatoire, nous n'avons aucune affinité l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] envers l'autre et cette journée nous aura au moins permis de nous en rendre compte."
 lmf_interaction.1329.desc.secrec.secact.start:0 "At first, I thought things were going well enough. "
 lmf_interaction.1329.desc.secrec.secact.hunting:0 "The hunting trip near [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] was enjoyable, and [secondary_actor.GetFirstNameNoTooltip] seemed pleasant. [secondary_actor.GetSheHe|U] made for a fine hunting companion"
 lmf_interaction.1329.desc.secrec.secact.hike:0 "[secondary_actor.GetFirstNameNoTooltip] was pleasant enough during the hike, and considerate with the pace. [secondary_actor.GetSheHe|U] pointed out numerous landmarks, explaining their history"
 lmf_interaction.1329.desc.secrec.secact.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] brought me down to the [actor.Custom('FortifiedBuilding')] garrison, where [secondary_actor.GetSheHe] fought vigorous bouts with [secondary_actor.GetHerHis] fellow [actor.Custom('KnightCulturePluralNoTooltipLowercase')]. We'd speak between each match"
 lmf_interaction.1329.desc.secrec.secact.poetry:0 "We toured the [actor.Custom('FortifiedBuilding')] gardens while [secondary_actor.GetFirstNameNoTooltip] regaled me with [secondary_actor.GetCulture.GetNameNoTooltip] poetry. [secondary_actor.GetSheHe|U] did so elegantly, even if with a practiced air"
 lmf_interaction.1329.desc.secrec.secact.library:0 "We toured the [actor.Custom('FortifiedBuilding')] library, and [secondary_actor.GetFirstNameNoTooltip] showed me [secondary_actor.GetHerHis] very favorites among the many tomes. [secondary_actor.GetHerHis|U] eyes all but sparkled whenever [secondary_actor.GetSheHe] spoke of literature"
 lmf_interaction.1329.desc.secrec.secact.church:0 "[secondary_actor.GetFirstNameNoTooltip] brought me to the [actor.GetFaith.HouseOfWorship|l] in [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], where we listened to the sermons on piety. [secondary_actor.GetSheHe|U] seemed so keen on anything related to faith"
 lmf_interaction.1329.desc.secrec.secact.poor:0 "We spent the afternoon spreading alms to the poor in front of the [actor.GetFaith.HouseOfWorship|l] in [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] seemed so earnest and true with [secondary_actor.GetHerHis] compassion"
 lmf_interaction.1329.desc.secrec.secact.tour:0 "We toured the [actor.Custom('FortifiedBuilding')] and the surrounding lands, [secondary_actor.GetFirstNameNoTooltip] explaining the history of everything with great interest and detail. [secondary_actor.GetSheHe|U] seemed so considerate"
 lmf_interaction.1329.desc.secrec.secact.garden:0 "We roamed the [actor.Custom('FortifiedBuilding')] gardens, engaging in conversation that, at least at first, felt lively. [secondary_actor.GetFirstNameNoTooltip] had a variety of interests [secondary_actor.GetSheHe] was more than willing to discuss"
 lmf_interaction.1329.desc.secrec.secact.mid:0 "— j'étais tout simplement tombé[ROOT.Char.Custom('FR_E')] sous le charme de ses manières.\n\nUne perspective qui est rapidement devenue désagréable pour moi quand je me suis rendu[ROOT.Char.Custom('FR_E')] compte que cette dilection n'était en rien partagée. Plus la conversation se poursuivait, plus ses soupirs devenaient envahissants. La passion s'est tue pour ne laisser que la tension paraître."
 lmf_interaction.1329.desc.secrec.secrec.start:0 "ne lui en déplaise.\n\n"
 lmf_interaction.1329.desc.secrec.secrec.hunting:0 "The hunting trip near [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] was enjoyable, and [secondary_actor.GetFirstNameNoTooltip] seemed pleasant and [secondary_actor.GetSheHe|U] made for a fine hunting companion... at least initially."
 lmf_interaction.1329.desc.secrec.secrec.hike:0 "[secondary_actor.GetFirstNameNoTooltip] was pleasant enough during the hike, and considerate with the pace. [secondary_actor.GetSheHe|U] pointed out numerous landmarks, explaining their history thoroughly, if drily."
 lmf_interaction.1329.desc.secrec.secrec.garrison:0 "[secondary_actor.GetFirstNameNoTooltip] brought me down to the [actor.Custom('FortifiedBuilding')] garrison, where [secondary_actor.GetSheHe] fought bouts with [secondary_actor.GetHerHis] fellow [actor.Custom('KnightCulturePluralNoTooltipLowercase')], though [secondary_actor.GetSheHe] thoughtfully attended to me between each match."
 lmf_interaction.1329.desc.secrec.secrec.poetry:0 "We toured the [actor.Custom('FortifiedBuilding')] gardens while [secondary_actor.GetFirstNameNoTooltip] regaled me with [secondary_actor.GetCulture.GetNameNoTooltip] poetry. [secondary_actor.GetSheHe|U] discharged [secondary_actor.GetHerselfHimself] well enough, even if [secondary_actor.GetHerHis] poem choices were questionable."
 lmf_interaction.1329.desc.secrec.secrec.library:0 "We toured the [actor.Custom('FortifiedBuilding')] library, and [secondary_actor.GetFirstNameNoTooltip] showed me [secondary_actor.GetHerHis] very favorites among the many tomes. I questioned some of [secondary_actor.GetHerHis] choices, but was reassured by [secondary_actor.GetHerHis] clear passion for learning."
 lmf_interaction.1329.desc.secrec.secrec.church:0 "[secondary_actor.GetFirstNameNoTooltip] brought me to the [actor.GetFaith.HouseOfWorship|l] in [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], where we listened to the sermons on piety. [secondary_actor.GetFirstNameNoTooltip] seemed truly faithful, I thought, if [secondary_actor.GetHerHis] efforts at conversation were less heartfelt."
 lmf_interaction.1329.desc.secrec.secrec.poor:0 "We spent the afternoon spreading alms to the poor in front of the [actor.GetFaith.HouseOfWorship|l] in [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. [secondary_actor.GetFirstNameNoTooltip] was clearly trying to impress me with [secondary_actor.GetHerHis] generosity, which was initially amusing."
 lmf_interaction.1329.desc.secrec.secrec.tour:0 "We toured the [actor.Custom('FortifiedBuilding')] and the surrounding lands, [secondary_actor.GetFirstNameNoTooltip] explaining the history of everything with great interest and detail. It was pleasant, even if I couldn't get a word in edgewise."
 lmf_interaction.1329.desc.secrec.secrec.garden:0 "We roamed the [actor.Custom('FortifiedBuilding')] gardens, engaging in conversation that, at least at first, felt lively. [secondary_actor.GetFirstNameNoTooltip] had so many interests and there appeared to be no end to the number of opinions [secondary_actor.GetSheHe] could express on them."
 lmf_interaction.1329.desc.secrec.secrec.mid:0 "\n\nPlus les mots lui venaient, plus ma patience s'envolait. Plus son intérêt était suscité, plus ma personne était suppliciée. Ne voyait-[secondary_recipient.Custom('FR_IlElle')] pas que je n'avais nul désir de converser ? Que ses afféteries et sa dilection à mon endroit servaient un dessein creux de toute réussite ? « [ROOT.Char.Custom('CulturalCurse')|U] ! » lui aurais-je décoché si je ne m'étais contenu[ROOT.Char.Custom('FR_E')]."
 lmf_interaction.1329.desc.rival.secrec:0 " Lorsque c[secondary_actor.Custom('FR_EEtte')] [secondary_actor.Custom('InsultNoun')] s'est gaussé[secondary_actor.Custom('FR_E')] de moi à la suite d'un faux pas, j'ai eu grande peine à me retenir de ne pas déloger son sourire suffisant d'un revers de main."
 lmf_interaction.1329.desc.end.secrec:0 "\n\nEt maintenant que le soleil disparaît dans le lointain, apparaît l'évidence que cette rencontre est bel et bien un désastre…"
 lmf_interaction.1329.desc.end.secrec.nomarry:0 " Un point sur lequel n'est certainement pas en désaccord [actor.Custom('FR_le_Char_Pi')][actor.GetTitledFirstName], en témoigne sa décision de couper court à toute éventuelle union."
 lmf_interaction.1329.desc.end.secrec.marry:0 " Un fait qui ne semble relever que du détail pour [actor.Custom('FR_le_Char_Pi')][actor.GetTitledFirstName], en témoigne sa décision de consentir à cette union. Or donc, quelle décision dois-je prendre ?"
 lmf_interaction.1329.desc.start:0 "Qu'en est-il à propos de cette rencontre prénuptiale ? [secondary_recipient.GetFirstName] apporte réponses à mes interrogations sous la forme d'une missive, dont la teneur des premiers mots me laisse comprendre que ce n'est ni plus ni moins qu'un désastre.\n\n"
 lmf_interaction.1329.desc.both.loved:0 "Pourtant, ces mêmes premiers mots explicitent un début qui semblait prometteur, car [secondary_recipient.Custom('FR_IlElle')] ne minore pas l'engouement qu'[secondary_recipient.Custom('FR_IlElle')] avait pour [secondary_actor.Custom('lmf_intro_activity_short')], bien plus qu'[secondary_recipient.Custom('FR_IlElle')] n'en eut pour la compagnie de [secondary_actor.GetFirstName]. "
 lmf_interaction.1329.desc.both.hated:0 "Des mots qui explicitent l'aversion qu'[secondary_recipient.Custom('FR_IlElle')] avait pour [secondary_actor.Custom('lmf_intro_activity_short')]. "
 lmf_interaction.1329.desc.both.neutral:0 "Est-ce que [secondary_actor.Custom('lmf_intro_activity_short')] était une piètre idée ? Rien n'est moins sûr, mais d'après ce que je lis, ce désastre est surtout à mettre au compte d'une mésentente viscérale entre m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_recipient'))] et [secondary_actor.GetFirstName]. "
 lmf_interaction.1329.desc.both.hunting:0 "Entre le gibier qui se faisait rare et les querelles qui proliféraient, la chasse fut un échec à bien des égards. Nul doute que les échos courroucés alarmèrent bien des bêtes alentours, en sus d'échauffer les esprits."
 lmf_interaction.1329.desc.both.hike:0 "Si à l'orée de leur promenade, l'allure allait de pair avec le rythme de leur conversation, au plus les pas se faisaient lourds, au plus les mots le devenaient. Et finalement, la conversation, comme l'allure, devint erratique et maladroite."
 lmf_interaction.1329.desc.both.garrison:0 "L'un[secondary_actor.Custom('FR_E')] trop accaparé[secondary_actor.Custom('FR_E')] par les combats, l'autre trop indifférent[secondary_recipient.Custom('FR_E')], plus que des mots, c'est le métal qui a raisonné à tue-tête, [secondary_actor.GetFirstNameNoTooltip] préférant échanger des parades avec les [actor.Custom('KnightCulturePluralNoTooltipLowercase')] plutôt que des paroles avec [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1329.desc.both.seduction:0 "À ce que l'on m'a dit, peu de mots furent échangés. Une proximité même relative avait grande peine à se créer, et lorsque [secondary_actor.GetFirstNameNoTooltip] s'est décidé[secondary_actor.Custom('FR_E')] à s'approcher, l'attitude n'a pas du tout convenu à [secondary_recipient.GetFirstNameNoTooltip]. Le mutisme glaçant laissant place à une abondance de paroles échauffées."
 lmf_interaction.1329.desc.both.poetry:0 "Armé[secondary_actor.Custom('FR_E')] d'une plume aussi affutée que sa prose, [secondary_actor.GetFirstNameNoTooltip] se fit [actor.Custom('KnightCultureNoTooltipLowercase')] de la poésie [secondary_actor.GetCulture.GetNameNoTooltip], mais sa bataille fut cause perdue dès lors que [secondary_recipient.GetFirstNameNoTooltip] érigea un rempart d'indifférence qui les emmura l'un[secondary_actor.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] et l'autre dans l'animosité."
 lmf_interaction.1329.desc.both.library:0 "La bibliothèque aurait pu être un bon moyen pour [secondary_actor.Custom2('FR_EuxElles', SCOPE.sC('secondary_recipient'))] de se rapprocher. S'ouvrir à des récits aurait pu les aider à trouver un terrain d'entente, mais pour une raison quelconque, c'est un fossé de discorde qui s'est creusé."
 lmf_interaction.1329.desc.both.church:0 "Qui aurait pu croire que deux personnes passant la journée [actor.GetFaith.HouseOfWorship2], lieu où les sermons sont légions, serait si peu à l'écoute l'un[secondary_actor.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] de l'autre ? Et lorsqu'enfin une réelle conversation a vu le jour, elle fut bien moins convaincante que les prédications du [actor.GetFaith.PriestMale]."
 lmf_interaction.1329.desc.both.tavern:0 "Une taverne était déjà un choix bien étrange pour une rencontre de ce genre, mais quand en plus le débit de paroles fut bien moindre que celui d'alcool, je n'étais pas surpris[ROOT.Char.Custom('FR_E')] d'apprendre que sur le tard, [secondary_recipient.GetFirstNameNoTooltip] devint érubescent[secondary_recipient.Custom('FR_E')] de colère quand [secondary_actor.GetFirstNameNoTooltip] le fut d'ébriété."
 lmf_interaction.1329.desc.both.poor:0 "Si de nombreux indigents purent jouir de la bonne fortune de cette charité désintéressée, le couple dut faire contre mauvaise fortune bon cœur face à la pauvreté extrême de leurs propres conversations."
 lmf_interaction.1329.desc.both.tour:0 "Une cavalcade accentuée par les récits d'histoire qui entourent la région aurait pu être un bon point de départ pour une relation en devenir, mais hélas, la faute à un[secondary_actor.Custom('FR_E')] piètre orat[secondary_actor.Custom('FR_EurRice')] ou à un piètre auditoire, cette après-midi ne sera sans doute pas à marquer d'une pierre blanche dans leur récit commun."
 lmf_interaction.1329.desc.both.garden:0 "Les jardins auraient pu être le cadre idéal pour voir fleurir une belle relation, mais hélas, des pensées envenimées auront rendu leurs échanges aussi fragiles que des fleurs de verre."
 lmf_interaction.1329.desc.both.mid:0 "\n\nTout lyrisme mis de côté, l'excès de zèle d'avoir rédigé cette lettre d'une encre trempée au vitriol appuie l'idée d'une relation à l'image de la glace et du feu : irréconciliables."
 lmf_interaction.1329.desc.secact.start:0 "[secondary_recipient.Custom('FR_IlElle')|U] fait mention de l'impatience qu'a manifestée [secondary_actor.GetFirstName] à son égard, au début du moins. "
 lmf_interaction.1329.desc.secact.hunting:0 "Souhaitant à tout prix plaire, [secondary_actor.Custom('FR_IlElle')] en aurait délaissé le gibier alentour pour se risquer à une prise bien plus méritante : le cœur de [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1329.desc.secact.hike:0 "Désireu[secondary_actor.Custom('FR_XSe')] de plaire, [secondary_actor.Custom('FR_IlElle')] fut d'un caractère particulièrement prévenant, préoccupé[secondary_actor.Custom('FR_E')] plus par la personne que par la promenade."
 lmf_interaction.1329.desc.secact.garrison:0 "Sa pugnacité dans les passes d'armes avec les autres [actor.Custom('KnightCulturePluralNoTooltipLowercase')] semblait fougueuse, moins pour triompher de ses adversaires que pour triompher dans la conquête d'un cœur."
 lmf_interaction.1329.desc.secact.seduction:0 "La fougue lui vint, celle des mots. Le lyrisme de la passion, le verbe de l'entrain."
 lmf_interaction.1329.desc.secact.poetry:0 "La chaleur de sa poésie [secondary_actor.GetCulture.GetNameNoTooltip] aura grandement résonné dans les jardins, laissant la cible de ses traits lyriques sans voix. Mais était-ce d'admiration ou d'exaspération ?"
 lmf_interaction.1329.desc.secact.library:0 "La bibliothèque contenait tant de récits du passé, mais sa flamme, elle, était nourrie par une chose bien présente. L'attrait que pouvait susciter l'encre et le papier n'avait en rien la même saveur que l'attrait de la chair et de l'esprit."
 lmf_interaction.1329.desc.secact.church:0 "Les sermons proclamés [actor.GetFaith.HouseOfWorship2] eurent moins d'échos que sa ferveur quasi religieuse à tenter de gagner les faveurs, point [actor.GetFaith.HighGodNameAlternatePossessive] mais de [secondary_recipient.Custom('FR_CeluiCelle')] qui semblait déjà être devenu[secondary_recipient.Custom('FR_E')] l'élu[secondary_recipient.Custom('FR_E')] de son cœur."
 lmf_interaction.1329.desc.secact.tavern:0 "Dans la clameur d'une taverne, l'ivresse de la passion se mélangea à celle de l'alcool. Au plus les choppes se vidaient, au plus [secondary_actor.Custom('FR_IlElle')] versa dans la fougue passionnelle."
 lmf_interaction.1329.desc.secact.poor:0 "[secondary_actor.Custom('FR_IlElle')|U] donnait sans peine aux indigents, car pour [secondary_actor.Custom('FR_LuiElle')] la récompense qui valait tout l'or du monde était de se voir offrir un sourire par [secondary_recipient.GetFirstNameNoTooltip]."
 lmf_interaction.1329.desc.secact.tour:0 "Cela s'est sans doute ressenti lors de leur cavalcade, à conter maintes et maintes histoires en toute occasion et sur toutes choses. Une fougue qui puisait sa force non dans le goût de l'histoire mais dans l'envie de plaire."
 lmf_interaction.1329.desc.secact.garden:0 "Si la fougue était une fleur, à n'en point douter que les jardins [actor.Custom('FR_ResidenceBuilding_Du')] ferait bien pâle figure devant un tel spécimen, lequel avait son astre étincelant à qui scander son dévouement."
 lmf_interaction.1329.desc.secact.hated:0 "\n\nHélas, ce fut une passion à sens unique, car la lettre explicite sans ambage l'idée que m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_recipient'))] ne trouva nul plaisir dans leur récréation, rendant chaque heure passant plus supplicieuse que la précédente."
 lmf_interaction.1329.desc.secact.loved:0 "\n\nHélas, si m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_recipient'))] trouva du plaisir dans [secondary_actor.Custom('lmf_intro_activity_short')], sa lettre ne manque pas de mentionner une joie devenue amère sur le tard."
 lmf_interaction.1329.desc.secact.neutral:0 "\n\nUne passion hélas non partagée puisque m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_recipient'))] souffrait plus de l'ennui que de l'entrain."
 lmf_interaction.1329.desc.secrec.start:0 "Des mots derrière lesquels [secondary_recipient.Custom('FR_IlElle')] ne cache nullement l'entrain qu'[secondary_recipient.Custom('FR_IlElle')] éprouvait, au début tout du moins. "
 lmf_interaction.1329.desc.secrec.hunting:0 "Le gibier chassait de son esprit, [secondary_recipient.Custom('FR_IlElle')] n'avait d'yeux et d'oreilles que pour [Select_CString(secondary_actor.IsFemale,'la dame','le sire')] de ses pensées, comme un oiseau de proie qui lorgnait, par l'envie attisée."
 lmf_interaction.1329.desc.secrec.hike:0 "Désireu[secondary_recipient.Custom('FR_XSe')] de plaire, [secondary_recipient.Custom('FR_IlElle')] fut d'un caractère particulièrement prévenant, préoccupé[secondary_recipient.Custom('FR_E')] plus par la personne que par la promenade."
 lmf_interaction.1329.desc.secrec.garrison:0 "[secondary_recipient.Custom('FR_IlElle')|U] en aurait été presque à tomber en pâmoison devant la vigueur et la pugnacité qui mettait à bas les [actor.Custom('KnightCulturePluralNoTooltipLowercase')], comme une jouvencelle à l'orée de son étrenne."
 lmf_interaction.1329.desc.secrec.seduction:0 "[secondary_recipient.Custom('FR_IlElle')|U] était avide de romantisme, d'affection et d'afféterie. [secondary_recipient.Custom('FR_IlElle')|U] voulait être comblé[secondary_recipient.Custom('FR_E')] de compliments, et plus encore."
 lmf_interaction.1329.desc.secrec.poetry:0 "[secondary_recipient.Custom('FR_IlElle')|U] se pâmait devant tant de poésie [secondary_actor.GetCulture.GetNameNoTooltip] déclamée, [secondary_recipient.Custom('FR_IlElle')] se félicitait qu'on quiert ses faveurs."
 lmf_interaction.1329.desc.secrec.library:0 "La bibliothèque contenait tant de récits du passé, mais sa flamme, elle, était nourrie par une chose bien présente. L'attrait que pouvait susciter l'encre et le papier n'avait en rien la même saveur que l'attrait de la chair et de l'esprit."
 lmf_interaction.1329.desc.secrec.church:0 "La ferveur religieuse du [actor.GetFaith.PriestMale] fit pâle figure face à la ferveur passionnelle d'un[secondary_recipient.Custom('FR_E')] [secondary_recipient.Custom('polite_gender_ref')] déjà grandement épris[secondary_recipient.Custom('FR_E')]."
 lmf_interaction.1329.desc.secrec.tavern:0 "Dans la clameur d'une taverne, l'ivresse de la passion se mélangea à celle de l'alcool. Au plus les choppes se renversaient, au plus l'affection s'étalait."
 lmf_interaction.1329.desc.secrec.poor:0 "[secondary_recipient.Custom('FR_IlElle')|U] donnait sans peine aux indigents, car pour [secondary_recipient.Custom('FR_LuiElle')] la récompense qui valait tout l'or du monde était de gagner la cœur de [secondary_actor.GetFirstNameNoTooltip]."
 lmf_interaction.1329.desc.secrec.tour:0 "Cela s'est probablement ressenti lors de leur cavalcade, à prêter l'oreille plus que de raison. Mais cette attention enthousiaste n'était pas à dessein de s'enrichir l'esprit des nombreuses histoires jalonnant la région, mais simplement de se laisser bercer par la voix qui les contait."
 lmf_interaction.1329.desc.secrec.garden:0 "Si la fougue était une fleur, à n'en point douter que les jardins [actor.Custom('FR_ResidenceBuilding_Du')] ferait bien pâle figure devant un tel spécimen, lequel avait son astre étincelant à qui scander son dévouement."
 lmf_interaction.1329.desc.secrec.hated:0 "\n\nMais si passion il y avait, hélas, [secondary_actor.GetFirstNameNoTooltip] n'en partageait pas même une once."
 lmf_interaction.1329.desc.secrec.loved:0 "\n\nHélas, si [secondary_actor.GetFirstNameNoTooltip] trouva du plaisir dans [secondary_actor.Custom('lmf_intro_activity_short')], cela n'alla pas plus loin qu'une gaieté passagère."
 lmf_interaction.1329.desc.secrec.neutral:0 "\n\nUne passion hélas esseulée par l'indifférence de [secondary_actor.GetFirstNameNoTooltip]."
 lmf_interaction.1329.desc.rival:0 " La haine avait empoissonné l'atmosphère, créant un climat d'animosité foudroyant toute possibilité d'entente."
 lmf_interaction.1329.desc.end.nomarry:0 "\n\nPour [actor.Custom('FR_le_Char_Pi')][actor.GetTitledFirstName], il n'en fallait pas plus pour décider de néantiser toute idée d'épousailles."
 lmf_interaction.1329.desc.end.marry:0 "\n\nPourtant, malgré le caractère désastreux de cette journée, [actor.Custom('FR_le_Char_Pi')][actor.GetTitledFirstName] n'y voit pas un échec, ou peut-être plus simplement, n'avait-[actor.Custom('FR_IlElle')] cure de l'issue de cette rencontre. Quoi qu'il en soit, les épousailles sont toujours à l'ordre du jour, et si [secondary_recipient.GetFirstNameNoTooltip] y trouve à redire à ce sujet, il n'en demeure pas moins que la décision finale me revient."
 lmf_interaction.1329.a:0 "Les épousailles auront bien lieu !"
 lmf_interaction.1329.b:0 "Je suis sûr qu'[secondary_recipient.Custom('FR_IlElle')] s'accommodera de s[secondary_actor.Custom('FR_OnA')] nouve[secondary_actor.Custom('FR_LLle')] épou[secondary_actor.Custom('FR_XSe')]."
 lmf_interaction.1329.c:0 "Leur union n'a pas lieu d'être."
 lmf_interaction.1329.d:0 "Un bien beau gâchis de temps et d'efforts."
 lmf_interaction.1331.t:0 "The Runaway"
 lmf_interaction.1331.desc.reject:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))] did not take the news of [rebel.GetHerHis] coming marriage to [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('intended_spouse'))]. Not at all.\n\n"
 lmf_interaction.1331.desc.start:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))] did not take kindly to my revocation of the right to choose a [rebel.Custom('WifeHusbandOpp')] on [rebel.GetHerHis] own. Not at all.\n\n"
 lmf_interaction.1331.desc.mid:0 "At first, everyone thought [rebel.GetSheHe] had simply stormed out of the room in anger. Then it became clear that [rebel.GetSheHe] had vanished from the [actor.Custom('FortifiedBuilding')] entirely, had in fact slipped away without so much as a note.\n\n"
 lmf_interaction.1331.desc.septon:0 "It was only later that we learned [rebel.GetSheHe] had taken the vows to join the Faith rather than accept a [intended_spouse.GetWifeHusband] [rebel.GetSheHe] didn't want.\n\n"
 lmf_interaction.1331.desc.maester:0 "It was only later that we learned [rebel.GetSheHe] had gone to the Citadel, choosing to become a maester rather than accepting a [intended_spouse.GetWifeHusband] [rebel.GetSheHe] didn't want.\n\n"
 lmf_interaction.1331.desc.wall:0 "It was only later that we learned [rebel.GetSheHe] had joined the Night's Watch. It appeared [rebel.GetSheHe] would rather endure life on the Wall than accept a [intended_spouse.GetWifeHusband] [rebel.GetSheHe] didn't want.\n\n"
 lmf_interaction.1331.desc.ranoff:0 "It was only later that we learned [rebel.GetSheHe] had fled entirely, having last been seen passing through a nearby village. Several search parties were sent out, but they came back with nothing, and nobody has any idea if [rebel.GetSheHe] will ever return. All that rather than accept a [intended_spouse.GetWifeHusband] [rebel.GetSheHe] didn't want.\n\n"
 lmf_interaction.1331.desc.end.reject:0 "Needless to say, the wedding to [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('intended_spouse'))] is off."
 lmf_interaction.1331.desc.end:0 "Who could have suspected that [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))] would be this willful?"
 lmf_interaction.1331.a:0 "So much for that."
 lmf_interaction.1500.opening.spouseliege:0 "M[actor.Custom('FR_OnA')] [actor.GetTitleAsNameNoTooltip|l] et [actor.GetWifeHusband],"
 lmf_interaction.1500.opening.liege:0 "[actor.Custom('FR_MonseigneurMadame')|U],"
 lmf_interaction.1500.opening.love:0 "[actor.Custom('LoverPetName_possessive')|U],"
 lmf_interaction.1500.opening.spouse:0 "M[actor.Custom('FR_OnA')] ch[actor.Custom('FR_ErEre')] [actor.GetWifeHusband],"
 lmf_interaction.1500.nemesis:0 "Je ne saurais trouver les mots exacts pour vous témoigner mon juste mépris, alors sachez simplement que je vous conchie et que je n'ai nullement l'intention de faire tout ce trajet jusqu'à [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] dans l'unique but de satisfaire vos envies.\n\nSi votre [Select_CString(actor.IsFemale,'con','queue')] vous démange tant que cela, trouvez-vous donc [Select_CString(actor.IsFemale,'un cheval','une chèvre')] et de l'huile d'olive."
 lmf_interaction.1500.rival:0 "Vous avez bien plus piètre opinion de moi que moi de vous pour ainsi croire que j'aurais la stupidité de faire tout ce trajet jusqu'à [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], et ce uniquement pour vos beaux yeux.\n\nJe ne saurais oublier ce que vous avez fait, alors gardez-vous de réitérer ce genre d'invitation."
 lmf_interaction.1500.betray:0 "Votre poignard fiché dans mon cœur à peine retiré, et vous osez déjà me faire cette invitation ?\n\nVeillez à méditer sur vos fautes jusqu'à ce que ma douleur s'estompe et que le pardon vous soit accordé !"
 lmf_interaction.1500.spouse:0 "Je partage votre sentiment, cela fait trop longtemps que nous n'avons pas eu l'occasion de nous consacrer l'un[recipient.Custom2('FR_E', SCOPE.sC('actor'))] à l'autre, mais hélas, le moment est bien mal choisi. Je ne peux quitter [recipient.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip] pour l'heure.\n\nVous m'en voyez navré[recipient.Custom('FR_E')]."
 lmf_interaction.1500.lover:0 "Sachez que cela me peine de devoir décliner votre invitation, mais je ne peux hélas pas quitter [recipient.GetCurrentLocation.GetTitle.GetNameNoTier] pour l'heure.\n\nVienne le moment de nous retrouver et je saurais me faire pardonner."
 lmf_interaction.1500.a:0 "Certes."
 lmf_interaction.1501.lover:0 "Quel bonheur de recevoir votre invitation alors même que je me languis de vous !\n\nJe me mets en route sur-le-champ !"
 lmf_interaction.1501.spouse:0 "Il serait regrettable que la distance qui nous sépare soit un frein à l'épanouissement de nos épousailles, n'est-ce pas ?\n\nSur ce, je me mets en route pour [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1501.a:0 "Preste, m[recipient.Custom('FR_OnA')] ch[recipient.Custom('FR_ErEre')]. Preste."
 lmf_interaction.1503.t:0 "Cancel the Visit?"
 lmf_interaction.1503.desc.atwar.betrayed:0 "Foul betrayer! My [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] has used my visit as a ruse, attacking while I am still en route.\n\nI must return to [origin.GetTitle.GetNameNoTierNoTooltip] at once!"
 lmf_interaction.1503.desc.atwar.betrayer:0 "Now I am drawn into a war against my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))].\n\nI doubt the welcome awaiting me at [destination.GetTitle.GetNameNoTierNoTooltip] would be a warm one at the moment, so there is nothing left but for me to return to [origin.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1503.desc.atwar.rootdefender:0 "I find myself attacked by [attacker.GetPrimaryTitle.GetNameNoTooltip] while I am traveling, of all things.\n\nI suppose the question is: do I return to [origin.GetTitle.GetNameNoTierNoTooltip]? Would I arrive in time to even make any difference?"
 lmf_interaction.1503.desc.atwar.rootattacker:0 "And now I am at war with [defender.GetPrimaryTitle.GetNameNoTooltip], with me in the midst of traveling.\n\nI suppose the question is: do I return to [origin.GetTitle.GetNameNoTierNoTooltip]? Would I arrive in time to even make any difference?"
 lmf_interaction.1503.desc.atwar.actorattacker:0 "I've just received news that my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] has gone to war against [defender.GetPrimaryTitle.GetNameNoTooltip], even though [actor.GetSheHe] knew I was coming.\n\nThe question now is: do I return to [origin.GetTitle.GetNameNoTierNoTooltip] or simply carry on and hope for the best?"
 lmf_interaction.1503.desc.atwar.actordefender:0 "I've just received news that my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] has been attacked by [attacker.GetPrimaryTitle.GetNameNoTooltip]. What terrible timing!\n\nThe question now is: do I return to [origin.GetTitle.GetNameNoTierNoTooltip] or simply carry on and hope for the best?"
 lmf_interaction.1503.desc.atwar.actor:0 "I've just received news that my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] has been drawn into a war, though it seems as if [destination.GetTitle.GetNameNoTierNoTooltip] would not be in any immediate danger.\n\nDo I return to [origin.GetTitle.GetNameNoTierNoTooltip] anyhow or carry on and hope for the best?"
 lmf_interaction.1503.desc.atwar:0 "I've just received news that I've been drawn into a war, with me traveling and nowhere near home.\n\nI suppose the question is: do I return to [origin.GetTitle.GetNameNoTierNoTooltip]? Would I arrive in time to even make any difference?"
 lmf_interaction.1503.a:0 "I should return at once."
 lmf_interaction.1503.a.title:0 "Visit Canceled"
 lmf_interaction.1503.a.desc:0 "[recipient.GetShortUINameNoTooltip|U] has been forced to cancel the visit and return to [origin.GetTitle.GetNameNoTierNoTooltip] due to war."
 lmf_interaction.1503.b:0 "There's no point. Carry on to [destination.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1504.t:0 "Sad News"
 lmf_interaction.1504.desc:0 "The worst news! My [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))] has died, and I am out here unable to do a single thing about it.\n\nThere is no point in continuing my journey to [destination.GetTitle.GetNameNoTierNoTooltip]. I must return to [origin.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1504.a:0 "Oh, [actor.GetFirstNameNoTooltip]!"
 lmf_interaction.1505.a.title:0 "Visite annulée"
 lmf_interaction.1505.desc.begin:0 "[recipient.Custom('FR_le_Char_U_Pi')|U][recipient.GetShortUINameNoTooltipNoFormat|U] [Select_CString(recipient.IsLocalPlayer,'avez','a')] été contraint[recipient.Custom('FR_E')] d'annuler [Select_CString(recipient.IsLocalPlayer,'votre','sa')] visite à [destination.GetTitle.GetNameNoTierNoTooltip]"
 lmf_interaction.1505.desc.norelationship:0 " puisque [Select_CString(recipient.IsLocalPlayer,'votre','sa')] relation avec [actor.Custom('FR_le_Char_U_Pi')][actor.GetShortUINameNoTooltipNoFormat] a prit fin."
 lmf_interaction.1505.desc.notprovince:0 " en raison d'un changement de capitale."
 lmf_interaction.1505.desc.actorleft:0 " en raison de [Select_CString(actor.IsLocalPlayer,'votre ','l’')]absence[actor.LocalPlayerString('', 'Loc_FR_du_actor_notooltip')]."
 lmf_interaction.1505.desc.actorill:0 " en raison de [Select_CString(actor.IsLocalPlayer,'votre ','l’')]état de santé[actor.LocalPlayerString('', 'Loc_FR_du_actor_notooltip')]."
 lmf_interaction.1505.desc.rootill:0 " en raison de [Select_CString(recipient.IsLocalPlayer,'votre','son')] état de santé."
 lmf_interaction.1505.desc.actorimprison:0 " en raison de [Select_CString(actor.IsLocalPlayer,'votre ','l’')]emprisonnement[actor.LocalPlayerString('', 'Loc_FR_du_actor_notooltip')]."
 lmf_interaction.1505.desc.rootimprison:0 " en raison de [Select_CString(recipient.IsLocalPlayer,'votre','son')] emprisonnement."
 lmf_interaction.1505.desc.actorpregnant:0 " en raison de [Select_CString(actor.IsLocalPlayer,'votre','la')] grossesse[actor.LocalPlayerString('', 'Loc_FR_du_actor_notooltip')]."
 lmf_interaction.1505.desc.rootpregnant:0 " en raison de [Select_CString(recipient.IsLocalPlayer,'votre','sa')] grossesse."
 lmf_interaction.1505.desc.actorhealth:0 " en raison de [Select_CString(actor.IsLocalPlayer,'votre ','l’')]état de santé[actor.LocalPlayerString('', 'Loc_FR_du_actor_notooltip')]."
 lmf_interaction.1505.desc.roothealth:0 " en raison de [Select_CString(recipient.IsLocalPlayer,'votre','son')] état de santé."
 lmf_interaction.1505.desc.default:0 "."
 lmf_interaction.1506.t.reclove:0 "L'appel de l'amour"
 lmf_interaction.1506.t.rec:0 "Idylle nuptiale"
 lmf_interaction.1506.t.love:0 "Ciel mon amant[recipient.Custom('FR_E')] !"
 lmf_interaction.1506.t:0 "Idylle nuptiale"
 lmf_interaction.1506.desc.reclove.notspouse:0 "« [ROOT.Char.Custom('LoverPetName_possessive')] ! »\nQuelle joie quand ce sont là les premiers mots que votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] vous fait hommage dès votre arrivée à [destination.GetTitle.GetNameNoTierNoTooltip].\n\n« Êtes-vous fatigué[ROOT.Char.Custom('FR_E')] ? » s'enquiers-t-[actor.Custom('FR_IlElle')] en sachant que tout voyage a son lot d'aléas. « Pourquoi le serais-je ? Nous n'avons pas encore entamé notre nuit. »\n\nAprès n'avoir pas su se retenir de pouffer, [actor.Custom('FR_IlElle')] me conduit dans un lieu, qui je l'espère, sera propice à manifester plus ouvertement nos sentiments…"
 lmf_interaction.1506.desc.reclove.spouse:0 "« [ROOT.Char.Custom('LoverPetName_possessive')] ! »\nQuelle joie quand ce sont là les premiers mots que votre [actor.Custom('RomanticComplimentNoun')] épou[actor.Custom('FR_XSe')] vous fait hommage dès votre arrivée à [destination.GetTitle.GetNameNoTierNoTooltip].\n\nRibambelle de [Select_CString(ROOT.Char.IsFemale,'camérites','domestiques')] vient s'enquérir de mes besoins, mais je les éconduit d'un signe de main, ce que [actor.GetFirstNameNoTooltip] semble approuver manifestement : « Il est vrai que je suis [actor.Custom('FR_LeLa')] seul[actor.Custom('FR_E')] habilité[actor.Custom('FR_E')] à satisfaire vos besoins. »\n\n[Select_CString(And(ROOT.Char.IsFemale, actor.IsFemale), 'Toutes deux amusées', 'Tous deux amusés')] par sa plaisanterie, nous nous retirons vers un lieu, qui je l'espère, sera propice à exalter nos vœux de mariage…"
 lmf_interaction.1506.desc.rec.spouse:0 "« [ROOT.Char.GetTitledFirstNameNoTooltip], c'est un plaisir ravi[actor.Custom('FR_E')] de vous revoir. »\nPlaisir partagé, car c'est toujours une joie d'être reçu[ROOT.Char.Custom('FR_E')] par s[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('recipient'))], et ce malgré la fatigue du voyage.\n\nUne armée de [Select_CString(ROOT.Char.IsFemale,'camérites','domestiques')] vient me prêter main forte jusque dans mon bain, coulée à l'avance pour m'aider à recouvrir mes forces et retrouver mes aises.\n\nLorsque [actor.Custom('FR_le_Char_Pi')][actor.GetTitledFirstNameNoTooltip] me sait disposé[ROOT.Char.Custom('FR_E')], je suis convié[ROOT.Char.Custom('FR_E')] dans ses appartements, où le dîner ainsi que la couche ont été préparés en vue de notre soirée nuptiale…"
 lmf_interaction.1506.desc.love.notspouse:0 "« [ROOT.Char.Custom('LoverPetName_possessive')|U] ! »\nQuelle joie de se savoir tant désiré[ROOT.Char.Custom('FR_E')] quand votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] vous adresse ces mots, sitôt arrivé[recipient.Custom('FR_E')] à [destination.GetTitle.GetNameNoTierNoTooltip].\n\nJe l'imagine éreinté[recipient.Custom('FR_E')] par le voyage, mais si de fatigue [recipient.Custom('FR_IlElle')] souffre, [recipient.Custom('FR_IlElle')] le cache habilement derrière son sourire et son impatience.\n\nTandis que je m'enquiers de son bien-être — « Une petite coupe [ROOT.Char.Custom('RegionalAlcoholicDrink')], [recipient.Custom('LoverPetName_possessive')] ? » — je [recipient.Custom('FR_LeLa')] conduis dans un lieu propice à manifester plus ouvertement nos sentiments…"
 lmf_interaction.1506.desc.love.spouse:0 "« [ROOT.Char.Custom('LoverPetName_possessive')|U] ! »\nQuelle joie de se savoir tant désiré[ROOT.Char.Custom('FR_E')] quand votre [recipient.Custom('RomanticComplimentNoun')] épou[recipient.Custom('FR_XSe')] vous adresse ces mots, sitôt arrivé[recipient.Custom('FR_E')] à [destination.GetTitle.GetNameNoTierNoTooltip].\n\nRibambelle de [Select_CString(recipient.IsFemale,'camérites','domestiques')] vient s'enquérir de ses besoins, mais [Select_CString(recipient.IsFemale,'elles sont toutes chassées','ils sont tous chassés')] d'un signe de main, ce que je ne peux qu'approuver, car je me fais fort de satisfaire moi-même ses besoins.\n\nTandis que je manifeste mon intérêt pour son bien-être — « Une petite coupe [ROOT.Char.Custom('RegionalAlcoholicDrink')], [recipient.Custom('LoverPetName_possessive')] ? » — je [recipient.Custom('FR_LeLa')] conduis dans un lieu propice à exalter nos vœux de mariage…"
 lmf_interaction.1506.desc.spouse:0 "« [ROOT.Char.GetTitledFirstNameNoTooltip], c'est un plaisir ravi[recipient.Custom('FR_E')] de vous revoir. »\nPlaisir partagé, car c'est toujours une joie de recevoir s[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('recipient'))] à [destination.GetTitle.GetNameNoTierNoTooltip], et ce même lorsqu'[recipient.Custom('FR_IlElle')] semble de toute évidence éreinté[recipient.Custom('FR_E')] de son voyage.\n\nUne armée de [Select_CString(recipient.IsFemale,'camérites','domestiques')] vient lui prêter main forte jusque dans son bain, coulée à l'avance pour l'aider à recouvrir ses forces et retrouver ses aises.\n\nLorsque je [recipient.Custom('FR_LeLa')] sais disposé[recipient.Custom('FR_E')], je [recipient.Custom('FR_LeLa')] fais convier dans mes appartements, où le dîner ainsi que la couche ont été préparés en vue de notre soirée nuptiale…"
 lmf_interaction.1506.a:0 "La nuit est nôtre, savourons-la !"
 lover_rating_reduce_to_4_tt:0 "@warning_icon! Votre [lmf_lover_rating|El] avec [lover.GetFirstNameNoTooltip] va flétrir vers l'#difficulty_hard Amour idyllique#!"
