 INVITE_SOULMATE_TO_VISIT:0 "[secondary_actor.Custom('LoverPetName_possessive')|U], chaque journée passé loin de vous me fait chaque fois l'effet d'une nouvelle mort. Venez me rendre visite à [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], venez y apporter l'éclat dont je ne suis que l'ombre. Laissez-moi revoir votre minois, ravivez-moi le souvenir de vos lèvres, laissez-moi chérir à nouveau votre étreinte. De grâce, même pour un instant fugace, revenez-moi [secondary_actor.Custom('LoverPetName_possessive')]."
