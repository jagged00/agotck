 lmf_interaction.1202.opening:0 "[recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U],"
 lmf_interaction.1202.start:0 "Au sortir d'une longue réflexion, j'ai pris ma décision. Je ferai comme il vous plaira, et ce à mon corps défendant "
 lmf_interaction.1202.adulterer:0 "car nous savons l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('recipient'))] et l'autre l'ironie de votre demande, vous qui n'êtes en rien un parangon de vertu. "
 lmf_interaction.1202.soulmate:0 "car quoi que vous en pensiez, [family_lover.Custom('FR_IlElle')] est bel et bien mon âme sœur. "
 lmf_interaction.1202.angry:0 "car je ne cacherai nullement la colère que j'éprouve contre vous, pour ainsi vous arroger le droit d'interférer dans mes relations. "
 lmf_interaction.1202.open:0 "car notre relation étant déjà connue de tous, les torts que cela pourrait engendrer ont d'ores et déjà été essuyés. "
 lmf_interaction.1202.default:0 "car je l'aime, et cela ni vous, ni nul autre en ce monde ne pourra rien y changer. "
 lmf_interaction.1202.end:0 "Mais soit.\n\nSi telle est votre volonté, alors je mettrais fin à ma relation avec [family_lover.Custom('FR_le_Char_Pi')][family_lover.GetTitledFirstName]."
 lmf_interaction.1202.a:0 "Rompez séant, et que l'affaire soit close."
 lmf_interaction.1202.b:0 "N'en faites rien… j'ai changé d'avis."
 lmf_interaction.1203.start:0 "Au sortir d'une longue réflexion, émaillée de grandes incertitudes, j'ai finalement pris ma décision. Je refuse de renoncer [family_lover.Custom('FR_au_Char_Pi')][family_lover.GetTitledFirstName] !\n\n"
 lmf_interaction.1203.adulterer:0 "Que vous, oui vous, me fassiez la leçon sur les choses de la bienséance, je trouve ça d'un grotesque sans nulle autre pareille !\n\n"
 lmf_interaction.1203.soulmate:0 "[family_lover.Custom('FR_IlElle')|U] est ma flamme, ma moitié. Renoncez à [family_lover.Custom('FR_LuiElle')], c'est m'arracher le cœur, et cela, je ne le puis, je n'en ai nullement la force, ni l'envie !\n\n"
 lmf_interaction.1203.open:0 "Notre relation est déjà de notoriété publique. Quel nouveau mal pourrait-il engendrer qui ne l'est déjà été ?\n\n"
 lmf_interaction.1203.default:0 "Je ne vais pas me lancer dans une longue et fastidieuse tirade pour vous convaincre. C'est d'amour qu'il s'agit. S'il vous en faut plus, c'est que c'est peine perdue.\n\n"
 lmf_interaction.1203.end.rival:0 "Si vous vous figurez pouvoir dicter ma conduite si aisément, alors allez au diable, et allez-y grand train !"
 lmf_interaction.1203.end.malicious:0 "Du reste, si cela peine votre cœur ou meurtri votre honneur, je n'en ai cure."
 lmf_interaction.1203.end.dominant:0 "Mais pensiez-vous réellement que j'allais faire bonne grâce de votre immiscion à mon endroit ?"
 lmf_interaction.1203.end.submissive:0 "J'espère avec force sincérité que vous me pardonnerez ma conduite par trop cavalière. Derechef, je l'espère."
 lmf_interaction.1203.end.default:0 "Veuillez pardonner mon opiniâtreté et comprendre mes sentiments."
 lmf_interaction.1203.a:0 "Si l'or peut acheter le silence, peut-il faire taire un cœur ?"
 lmf_interaction.1203.a.lover.tt:0 "[family_lover.Custom('FR_le_Char_Pi')|U][family_lover.GetTitledFirstNameNoTooltip] devra [family_lover.Custom('FR_LuiElle')] aussi être convaincu[family_lover.Custom('FR_E')]…"
 lmf_interaction.1203.b:0 "[family_lover.Custom('FR_le_Char_Pi')|U][family_lover.GetTitledFirstNameNoTooltip] pourrait être plus enclin[family_lover.Custom('FR_E')] à m'écouter…"
 lmf_interaction.1203.c:0 "Nul ne bafoue impunément mon autorité !"
 lmf_interaction.1203.d:0 "J'en ai assez ! Faites ce que vous voulez, et baste !"
 lmf_interaction.1204.opening:0 "[family_lover.Custom2('GreetingToForeignRulerPositive', ROOT.Char )],"
 lmf_interaction.1204.secret:0 "Quelle ne fut pas ma stupeur de découvrir que vous êtes au fait de ma relation avec votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))].\n\n"
 lmf_interaction.1204.open:0 "Ce jour était à redouter, depuis l'instant où mon accointance pour votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] n'appartenait déjà plus au domaine du secret.\n\n"
 lmf_interaction.1204.end:0 "Réfléchir n'est point aisé quand il s'agit d'amour, et j'aime [recipient.GetFirstNameNoTooltip], cela n'en doutait point. Mais il est des vérités qui chassent nos rêveries, comme fétu de paille au vent. [recipient.Custom('FR_IlElle')|U] est votre [ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('recipient'))], je puis le comprendre. Aussi, si telle est votre volonté, j'accepterais, non sans peine, de mettre fin à ma relation avec [recipient.Custom('FR_LuiElle')]."
 lmf_interaction.1205.opening:0 "[family_lover.Custom2('GreetingToForeignRuler', ROOT.Char )],"
 lmf_interaction.1205.start:0 "[recipient.GetFirstNameNoTooltip] est votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))], mais [recipient.Custom('FR_IlElle')] est aussi [recipient.Custom('LoverPetName_possessive')]. Parce que je l'aime, et parce qu'[recipient.Custom('FR_IlElle')] m'aime, aucun[recipient.Custom('FR_E')] [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )] ne saurait se dresser entre nous.\n\n"
 lmf_interaction.1205.end.rival:0 "Si cette idée vous chagrine, ou que cette vérité vous dérange, sachez que je vous conchie, vous, votre immiscion, et plutôt deux fois qu'une !"
 lmf_interaction.1205.end.malicious:0 "[recipient.Custom('FR_IlElle')|U] disait de vous que vous étiez par trop intrusi[ROOT.Char.Custom('FR_FVe')]. Ses dires étaient fondés semble-t-il."
 lmf_interaction.1205.end.dominant:0 "Mais pensiez-vous réellement que votre intrusion dans notre relation allait être accueillie de bonne grâce ?"
 lmf_interaction.1205.end.submissive:0 "De grâce, pardonnez la virulence de mes mots, mais comprenez en la véracité."
 lmf_interaction.1205.end.benevolent:0 "Sachez que je ne vous fais nullement grief pour votre immiscion, mais il n'appartient à personne, si ce n'est [recipient.GetFirstNameNoTooltip], de décider si notre relation doit cesser ou non."
 lmf_interaction.1205.end.default:0 "Veuillez pardonner mon opiniâtreté et comprendre mes sentiments."
 lmf_interaction.1205.a:0 "Toute chose est monnayable. Quel est votre prix ?"
 lmf_interaction.1205.b:0 "M[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('recipient'))] pourrait être plus enclin[recipient.Custom('FR_E')] à m'écouter…"
 lmf_interaction.1206.start:0 "I have given your demand a great deal of thought and decided that, despite "
 lmf_interaction.1206.adulterer:0 "the sheer irony that you, of all people, would lecture me on the subject of virtue, "
 lmf_interaction.1206.angry:0 "how much it irks me that you would interfere in such a manner, "
 lmf_interaction.1206.default:0 "the sheer audacity that you would require me to end ALL my affairs, "
 lmf_interaction.1206.end:0 "I will do as you ask.\n\nIf you truly think it is in my best interest to part ways with my lovers, I'll trust that you have your reasons and end things at once."
 lmf_interaction.1207.start:0 "I have given your demand a great deal of thought. In the end, however, I have decided not to discard my lovers simply because you think it best.\n\n"
 lmf_interaction.1207.adulterer:0 "Honestly, the idea that you, of all people, would lecture me on the subject of virtue? It defies belief.\n\n"
 lmf_interaction.1207.default:0 "Each of them holds a place in my heart, and in my bed, as is my right.\n\n"
 lmf_interaction.1207.end.rival:0 "Why you thought I would respond favorably to such interference boggles the mind."
 lmf_interaction.1207.end.malicious:0 "If this disappoints you, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], then so be it. I truly do not care."
 lmf_interaction.1207.end.dominant:0 "If this disappoints you, then so be it. This is my life and my decision."
 lmf_interaction.1207.end.submissive:0 "I am truly, truly sorry if this disappoints you. I would rather anything else, but I must live my own life."
 lmf_interaction.1207.end.default:0 "If this disappoints you, [recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U], then I am sorry."
 lmf_interaction.1208.desc:0 "Very well.\n\n[family_lover.GetFirstNameNoTooltip] and I have talked things over, and if this is what you require of us... we are willing to marry and have our relationship blessed by [recipient.GetFaith.FertilityGodName]."
 lmf_interaction.1208.a:0 "The marriage will favor my [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]."
 lmf_interaction.1208.b:0 "The marriage will favor [family_lover.GetTitledFirstNameNoTooltip]."
 lmf_interaction.1208.c:0 "On second thought, no..."
 lmf_interaction.1208.tt:0 "[recipient.GetFirstNameNoTooltip] and [family_lover.GetTitledFirstNameNoTooltip] will end all existing love affairs except with each other"
 lmf_interaction.1209.start:0 "You want me to marry [family_lover.GetTitledFirstNameNoTooltip]? Have you gone mad?!\n\nThe [family_lover.GetWomanMan] is my lover, but I certainly don't need [family_lover.GetHerHim] to be my [family_lover.GetWifeHusband]! "
 lmf_interaction.1209.open:0 "If it's my reputation you're worried about, you needn't be. As you well know, the damage is already done.\n\n"
 lmf_interaction.1209.secret:0 "I thank you for the concern for my reputation but, unless you plan on being the one to tell the world about us, I'll take my chances.\n\n"
 lmf_interaction.1209.a:0 "Then you must end this affair at once."
 lmf_interaction.1210.desc:0 "Very well.\n\n[recipient.GetFirstNameNoTooltip] and I have talked things over, and if this is what you require... I am willing to marry your [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))] and have our relationship blessed by [family_lover.GetFaith.FertilityGodName]."
 lmf_interaction.1211.start:0 "You want me to marry your [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]? Have you gone mad?!\n\nI understand your concern for [recipient.GetFirstNamePossessiveNoTooltip] reputation, but I certainly don't need [recipient.GetHerHim] to be my [recipient.GetWifeHusband]!\n\n"
 lmf_interaction.1211.end.rival:0 "If that upsets you, then good. This is what you deserve for interfering where you're not welcome."
 lmf_interaction.1211.end.malicious:0 "Next time, think on the matter a little more before you go making such ridiculous demands."
 lmf_interaction.1211.end.dominant:0 "I know this decision might upset you, and so be it. If I marry [recipient.GetFirstNameNoTooltip], it shall be our decision and not yours."
 lmf_interaction.1211.end.submissive:0 "Would that there were some other way, my [ROOT.Char.GetLadyLord], but it is impossible. I am sorry."
 lmf_interaction.1211.end.benevolent:0 "I'm truly sorry if this upsets you, but this is a decision that can only be made by [recipient.GetFirstNameNoTooltip] and I."
 lmf_interaction.1211.end.default:0 "If my decision upsets you, my [ROOT.Char.GetLadyLord], then I am sorry."
 lmf_interaction.1212.desc:0 "Alright, since you insist, I'll marry [family_lover.GetTitledFirstNameNoTooltip].\n\nYou're going to have to convince [family_lover.GetHerHim] to go along with this plan of yours, however, and don't expect any assistance on that from me."
 lmf_interaction.1212.a:0 "Let's see what [family_lover.GetSheHe] has to say..."
