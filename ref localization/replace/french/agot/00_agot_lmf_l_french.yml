 lmf_interaction.1301.t:0 "Une rencontre à venir"
 lmf_interaction.1301.desc.start:0 "L'invitation ayant été acceptée, [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] est en route pour [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n"
 lmf_interaction.1301.desc.actor:0 "Il y a tant à préparer, car après tout, il s'agit peut-être là de m[secondary_recipient.Custom('FR_OnA')] futur[secondary_recipient.Custom('FR_E')] épou[secondary_recipient.Custom('FR_XSe')], n'est-ce pas ?\n\nOu bien peut-être qu'[secondary_recipient.Custom('FR_IlElle')] ne m'inspirera qu'exécration et exaspération… peut-être n'aurons-nous que dégoût l'un[ROOT.Char.Custom2('FR_E', SCOPE.sC('secondary_recipient'))] pour l'autre… et peut-être que… que…\n\n#EMP Baste !#! Concentrons-nous sur l'instant présent."
 lmf_interaction.1301.desc.pleased.willnotwed:0 "[secondary_actor.GetFirstName] manifeste une joie en demi-teinte lorsqu'[secondary_actor.Custom('FR_IlElle')] apprends l'arrivée prochaine de son éventue[secondary_recipient.Custom('FR_LLle')] futur[secondary_recipient.Custom('FR_E')] épou[secondary_recipient.Custom('FR_XSe')] : « [secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))] [secondary_actor.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_recipient'))] J'en suis fort aise, mais aurais-je mon mot à dire s'il advenait que je ne souhaite pas l'épouser ? »\n\n« Voyons au moins comment se déroulera la rencontre. » Cette réponse, sincère bien que convenue, n'efface en rien ses inquiétudes mais a au moins le mérite de les calmer… pour le moment."
 lmf_interaction.1301.desc.pleased:0 "[secondary_actor.GetFirstName] ne cache en rien sa joie lorsqu'[secondary_actor.Custom('FR_IlElle')] apprends l'arrivée prochaine de son éventue[secondary_recipient.Custom('FR_LLle')] futur[secondary_recipient.Custom('FR_E')] épou[secondary_recipient.Custom('FR_XSe')] : « [secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))] [secondary_actor.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_recipient'))] Et vous me dites qu'[secondary_recipient.Custom('FR_IlElle')] est en chemin pour me rencontrer ? Mais que se passera-t-il si jamais je ne lui plais pas ? Devrons-nous faire une croix sur le mariage ? »\n\nJe modère ses inquiétudes par une réponse sincère mais convenue : « Assurons-nous d'abord que la rencontre se passera bien, » ce qui a au moins le mérite de l'apaiser… pour le moment."
 lmf_interaction.1301.desc.displeased:0 "[secondary_actor.GetFirstName], quant à [secondary_actor.Custom('FR_LuiElle')], n'est point emballé[secondary_actor.Custom('FR_E')] à l'idée de cette visite : « [secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))] [secondary_actor.Custom2('lmf_neg_reaction', SCOPE.sC('secondary_recipient'))] » [secondary_actor.Custom('lmf_neg_reaction_type')].\n\nJe m'efforce de dissiper ses inquiétudes, mais qu'importe sous quel angle j'aborde la chose, [secondary_actor.Custom('FR_IlElle')] rejette tout en bloc. Aucun argument ne semble pouvoir démolir ni même effriter ce rempart de conviction qu'[secondary_actor.Custom('FR_IlElle')] a érigé.\n\nTout ce que je puis faire dans l'immédiat c'est espérer que la rencontre produira quelque chose de meilleur que cette discussion stérile."
 lmf_interaction.1301.a:0 "Tout doit être prêt pour son arrivée."
 lmf_interaction.1302.t:0 "Une rencontre à venir"
 lmf_interaction.1302.desc.recipient:0 "Je me prépare en prévision du voyage jusqu'à [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] qui sera pour moi l'occasion d'y rencontrer [secondary_actor.Custom('FR_CeluiCelle')] qui sera peut-être m[secondary_actor.Custom('FR_OnA')] futur[secondary_actor.Custom('FR_E')] épou[secondary_actor.Custom('FR_XSe')].\n\nPrendre la peine d'organiser une telle rencontre n'est pas chose ordinaire, mais nous pourrons ainsi, [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] et moi-même, faire plus ample connaissance, pour aviser par la suite sur l'idée d'un mariage.\n\nMais pour l'heure, mettons-nous en route."
 lmf_interaction.1302.desc.pleased.willnotwed:0 "L'invitation ayant été acceptée, [secondary_recipient.GetFirstName] se prépare à partir pour [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], là où se trouve peut-être s[secondary_actor.Custom('FR_OnA')] futur[secondary_actor.Custom('FR_E')] épou[secondary_actor.Custom('FR_XSe')] : [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName].\n\nC'est un soulagement de [secondary_recipient.Custom('FR_LeLa')] savoir enthousiaste à l'idée de cette rencontre : « [secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))] [secondary_recipient.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_actor'))] » Et cela même si cet enthousiasme est en demi-teinte : « Mais si d'aventure je ne l'appréciais guère, mon opinion aura-t-elle quelques valeurs à vos yeux ? »\n\n« Nous verrons. Pour l'heure, tâchez de faire bonne route. »"
 lmf_interaction.1302.desc.pleased:0 "À peine l'invitation acceptée, et déjà [secondary_recipient.GetFirstName] se hâte de partir pour [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], là où se trouve peut-être s[secondary_actor.Custom('FR_OnA')] futur[secondary_actor.Custom('FR_E')] épou[secondary_actor.Custom('FR_XSe')] : [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName].\n\nC'est un profond soulagement de [secondary_recipient.Custom('FR_LeLa')] voir ainsi enthousiaste à l'idée de cette rencontre : « [secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))] [secondary_recipient.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_actor'))] » Et cela même si son enthousiasme est nuancé par une inquiétude grandissante : « Mais que se passera-t-il si jamais je ne lui plais pas ? Devrons-nous faire une croix sur le mariage ? »\n\n« Nous verrons. Pour l'heure, tâchez de faire bonne route. »"
 lmf_interaction.1302.desc.displeased:0 "[secondary_recipient.GetFirstName] se prépare à partir pour [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], là où se trouve peut-être s[secondary_actor.Custom('FR_OnA')] futur[secondary_actor.Custom('FR_E')] épou[secondary_actor.Custom('FR_XSe')] : [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName]. Et ce serait un euphémisme de dire qu'[secondary_recipient.Custom('FR_IlElle')] n'est guère enchanté[secondary_recipient.Custom('FR_E')] par cette nouvelle.\n\n« [secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))] [secondary_recipient.Custom2('lmf_neg_reaction', SCOPE.sC('secondary_actor'))] » [secondary_recipient.Custom('lmf_neg_reaction_type')].\n\nJe m'efforce de dissiper ses inquiétudes, mais qu'importe sous quel angle j'aborde la chose, [secondary_recipient.Custom('FR_IlElle')] rejette tout en bloc. Aucun argument ne semble pouvoir démolir ni même effriter ce rempart de conviction qu'[secondary_recipient.Custom('FR_IlElle')] a érigé.\n\nTout ce que je puis faire dans l'immédiat c'est espérer que la rencontre produira quelque chose de meilleur que cette discussion stérile."
 lmf_interaction.1302.a:0 "Il me tarde d'avoir de ses nouvelles."
 lmf_interaction.1302.b:0 "Puisse [ROOT.Char.GetFaith.PantheonTerm] guider mes pas !"
 lmf_interaction.1304.t:0 "La guerre fait mauvais hôte"
 lmf_interaction.1304.desc.atwar.actor:0 "La guerre gronde, pour [actor.Custom('FR_le_Char_Pi')][actor.GetTitledFirstName] comme pour moi, et par conséquent, il serait sans doute malséant de laisser [recall_char.GetFirstNameNoTooltip] poursuivre sa visite à [actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]."
 lmf_interaction.1304.desc.atwar.self.rootattacker:0 "La guerre qui nous oppose, [defender.Custom('FR_le_Char_Pi')][defender.GetTitledFirstName] et moi-même, soulève la question de savoir si je devrais ou non retourner à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] sur-le-champ."
 lmf_interaction.1304.desc.atwar.rootattacker:0 "La guerre qui nous oppose, [defender.Custom('FR_le_Char_Pi')][defender.GetTitledFirstName] et moi-même, soulève la question de savoir si [recall_char.GetFirstName] devrait retourner ou non à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nJe doute qu'[recall_char.Custom('FR_IlElle')] soit en danger à la cour [actor.Custom('FR_du_Char_Pi')][actor.GetTitledFirstName], mais rien n'est moins sûr…"
 lmf_interaction.1304.desc.atwar.self.rootdefender:0 "La guerre qui nous oppose, [attacker.Custom('FR_le_Char_Pi')][attacker.GetTitledFirstName] et moi-même, soulève la question de savoir si je devrais ou non retourner à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] sur-le-champ."
 lmf_interaction.1304.desc.atwar.rootdefender:0 "La guerre qui nous oppose, [attacker.Custom('FR_le_Char_Pi')][attacker.GetTitledFirstName] et moi-même, soulève la question de savoir si [recall_char.GetFirstName] devrait retourner ou non à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nJe doute qu'[recall_char.Custom('FR_IlElle')] soit en danger à la cour [actor.Custom('FR_du_Char_Pi')][actor.GetTitledFirstName], mais rien n'est moins sûr…"
 lmf_interaction.1304.desc.atwar.self:0 "La guerre qui oppose [attacker.GetPrimaryTitle.GetNameNoTierNoTooltip] et [defender.GetPrimaryTitle.GetNameNoTierNoTooltip], et mon implication dans celle-ci, soulève la question de savoir si je devrais ou non retourner à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] sur-le-champ."
 lmf_interaction.1304.desc.atwar:0 "La guerre qui oppose [attacker.GetPrimaryTitle.GetNameNoTierNoTooltip] et [defender.GetPrimaryTitle.GetNameNoTierNoTooltip], et mon implication dans celle-ci, soulève la question de savoir si [recall_char.GetFirstName] devrait ou non retourner à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\nJe doute qu'[recall_char.Custom('FR_IlElle')] soit en danger à la cour [actor.Custom('FR_du_Char_Pi')][actor.GetTitledFirstName], mais rien n'est moins sûr…"
 lmf_interaction.1304.a:0 "Ce serait plus sage en effet."
 lmf_interaction.1304.b:0 "Ce serait plus sage en effet."
 lmf_interaction.1304.c:0 "Il n'y a pas lieu de s'inquiéter."
 lmf_interaction.1304.d:0 "Il n'y a pas lieu de s'inquiéter."
 lmf_interaction.intro.cancelled.tt:0 "Rencontre prénuptiale annulée"
 lmf_interaction.intro.cancelled.our.war:0 "En raison de la guerre, la rencontre entre [recall_char.Custom('FR_le_Char_Pi')][recall_char.GetTitledFirstName] et [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.recipient.war:0 "En raison de la guerre qui a frappé [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], la rencontre entre [recall_char.Custom('FR_le_Char_Pi')][recall_char.GetTitledFirstName] et [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.death.visitor:0 "En raison de la mort [recall_char.Custom('FR_du_Char_Pi')][recall_char.GetTitledFirstName], sa rencontre avec [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.death:0 "En raison de la mort [intro_death.Custom('FR_du_Char_Pi')][intro_death.GetTitledFirstName], la rencontre entre [recall_char.Custom('FR_le_Char_Pi')][recall_char.GetTitledFirstName] et [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.actor.besieged:0 "En raison du siège que subit la capitale [actor.Custom('FR_du_Char_Pi')][actor.GetTitledFirstNameNoTooltip], la rencontre entre [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] et [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.actor.notruler:0 "Puisque [actor.Custom('FR_le_Char_Pi')][actor.GetTitledFirstName] n'est plus un[actor.Custom('FR_E')] dirigeant[actor.Custom('FR_E')], la rencontre entre [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] et [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.recipient.notruler:0 "Puisque [recipient.Custom('FR_le_Char_Pi')][recipient.GetTitledFirstName] n'est plus un[recipient.Custom('FR_E')] dirigeant[recipient.Custom('FR_E')], la rencontre entre [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] et [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.secrecp.ill:0 "En raison de la maladie [secondary_recipient.Custom('FR_du_Char_Pi')][secondary_recipient.GetTitledFirstName], sa rencontre avec [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.secactor.ill:0 "En raison de la maladie [secondary_actor.Custom('FR_du_Char_Pi')][secondary_actor.GetTitledFirstName], sa rencontre avec [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.secrecp.imprisoned:0 "En raison de l'emprisonnement [secondary_recipient.Custom('FR_du_Char_Pi')][secondary_recipient.GetTitledFirstName], sa rencontre avec [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.secrecp.incapable:0 "Puisque [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] est devenu[secondary_recipient.Custom('FR_E')] incapable, sa rencontre avec [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.secactor.unavailable:0 "En raison de l'indisponibilité [secondary_actor.Custom('FR_du_Char_Pi')][secondary_actor.GetTitledFirstName], sa rencontre avec [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.actor.imprisoned:0 "En raison de [actor.LocalPlayerString('votre emprisonnement', 'l’emprisonnement')][actor.LocalPlayerString('', 'Loc_FR_du_actor_notooltip')], la rencontre entre [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] et [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.actor.incapable:0 "Puisque [actor.Custom('FR_le_Char_U_Pi')][actor.GetShortUINameNoTooltipNoFormat] [Select_CString(actor.IsLocalPlayer,'êtes','est')] devenu[actor.Custom('FR_E')] incapable, la rencontre entre [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] et [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.intro.cancelled.fallthrough:0 "La rencontre entre [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] et [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] a été annulée."
 lmf_interaction.1311.t:0 "L’arrivée"
 lmf_interaction.1311.initial.secrep:0 "C'est de bonne heure que se fait mon arrivée à [actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], accueilli[ROOT.Char.Custom('FR_E')] dare-dare par [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] en personne.\n\n"
 lmf_interaction.1311.initial.actor:0 "L'heure est matinière lorsque [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] arrive à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], et après un accueil qui sied à un[secondary_recipient.Custom('FR_E')] invité[secondary_recipient.Custom('FR_E')] de marque, j'ordonne aux domestiques d'escorter sa suite vers leurs appartements.\n\n"
 lmf_interaction.1311.initial:0 "Bien matinale est l'arrivée [secondary_recipient.Custom('FR_du_Char_Pi')][secondary_recipient.GetTitledFirstName] [ROOT.Char.Custom('FR_ResidenceBuilding_Au')], mais bienvenu[secondary_recipient.Custom('FR_E')] [secondary_recipient.Custom('FR_IlElle')] demeure, comme en témoigne l'accueil hâtif que lui offre [secondary_actor.Custom('FR_le_Char_Pi')][secondary_actor.GetTitledFirstName] en personne.\n\n"
 lmf_interaction.1311.act.pleased.secrep:0 "Sa conduite et son phrasé baignent dans l'afféterie permanente, comme il sied à un accueil en bonne et due forme, mais son regard a quelque chose en plus de la simple #italic bienséance protocolaire#!.\n\n"
 lmf_interaction.1311.act:0 ""
 lmf_interaction.1311.secact.pleased.secrep:0 "[secondary_actor.Custom('FR_IlElle')|U] est visiblement enjoué[secondary_actor.Custom('FR_E')] par ma présence, et c'est une surprise au moins aussi plaisante que sa révérence est [Select_CString(secondary_actor.IsFemale,'grâcieuse','profonde')]. « Je vous souhaite la bienvenue au nom de m[secondary_actor.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('actor'))], » ajoute-t-[secondary_actor.Custom('FR_IlElle')] en m'examinant sous toutes les coutures.\n\n"
 lmf_interaction.1311.act.displeased.secrep:0 "Rien de ce qui émane de sa bouche ou de ses gestes me laissent à penser qu'[secondary_actor.Custom('FR_IlElle')] est ravi[secondary_actor.Custom('FR_E')] de ma présence, et cela même si ma présence est du fait de son invitation. #italic Alors quoi ? Brusque changement d'avis ou déception fortuite ?#! Si tel est le cas, il va me falloir redoubler d'efforts pour réveiller son intérêt.\n\n"
 lmf_interaction.1311.secact.displeased.secrep:0 "J'ai connu des accueils plus chaleureux, et ce malgré tous ses efforts pour faire bonne figure. Je me risque à la conclusion que l'invitation n'était peut-être pas son idée, voire même qu'[secondary_actor.Custom('FR_IlElle')] s'y opposait. Si tel est le cas, il va me falloir redoubler d'efforts pour susciter son intérêt.\n\n"
 lmf_interaction.1311.secact.pleased:0 "L'élan d'enthousiasme de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_actor'))] à l'idée de cette rencontre est toujours vivace au point d'émailler leurs premiers échanges.\n\n"
 lmf_interaction.1311.secact.displeased:0 "Jaçoit que le caractère preste de l'accueil soit davantage motivé par l'envie d'en finir que la joie de l'entamer, car m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_actor'))] ne fait montre d'aucune chaleur hospitalière, et s'en tient à la froideur d'une bienséance protocolaire.\n\n"
 lmf_interaction.1311.reaction.secrep:0 ""
 lmf_interaction.1311.reaction.actor.pleased:0 "J'entends un ton enjoué, je vois une posture affétée, et je décèle comme une pointe de satisfaction dans le regard qui m'inspecte sous toutes les coutures. Je puis en conclure que cette rencontre ne lui apparaît pas comme une corvée, ce qui devrait grandement faciliter le reste du séjour.\n\n"
 lmf_interaction.1311.reaction.pleased:0 "[secondary_recipient.GetFirstNameNoTooltip], quant à [secondary_recipient.Custom('FR_LuiElle')], donne la réplique à la faveur d'une courtoisie maniérée, tout[secondary_recipient.Custom('FR_E')] impatient[secondary_recipient.Custom('FR_E')] qu'[secondary_recipient.Custom('FR_IlElle')] est d'aller plus avant dans le vif du sujet.\n\n"
 lmf_interaction.1311.reaction.actor.displeased:0 "Point de joie, nulle afféterie, juste une bienséance distante et désincarnée. Est-ce à dire qu'[secondary_recipient.Custom('FR_IlElle')] dédaigne l'idée même de cette rencontre ? Si mon intuition est bonne alors j'aurais fort à faire pour gagner ne serait-ce que son intérêt.\n\n"
 lmf_interaction.1311.reaction.displeased:0 "[secondary_recipient.GetFirstNameNoTooltip], quant à [secondary_recipient.Custom('FR_LuiElle')], apparaît comme incommodé[secondary_recipient.Custom('FR_E')]. Appréhension de la rencontre ou conséquence du voyage ? En cela, rien n'est moins sûr.\n\n"
 lmf_interaction.1311.us.end:0 "Pour l'heure, il ne reste qu'à attendre le début de la rencontre prénuptiale proprement dite, où nous aurons tout loisir de faire plus ample connaissance."
 lmf_interaction.1311.end:0 "Pour l'heure, il ne reste qu'à attendre le début de la rencontre prénuptiale proprement dite, où [Select_CString(And(secondary_recipient.IsFemale, secondary_actor.IsFemale), 'elles', 'ils')] auront tout loisir de faire plus ample connaissance."
 lmf_interaction.1311.a:0 "Il me tarde de découvrir la suite de cette histoire."
 lmf_interaction.1312.t:0 "[secondary_actor.Custom2('FR_LMF_RelationToMeShort_Le', ROOT.Char )|U] qui murmurait à l'oreille de s[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_actor'))]"
 lmf_interaction.1312.desc.start:0 "Un peu plus tard, lorsque vient l'heure de la chauve-souris, vient avec elle [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName], qui a grand besoin de s'entretenir avec moi.\n\n« [ROOT.Char.GetTitledFirstNameNoTooltip], rien ne me comblerait plus que d'épouser"
 lmf_interaction.1312.desc.name:0 " [secondary_actor.GetFirstNameNoTooltip], "
 lmf_interaction.1312.desc.stranger:0 " votre [ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))], "
 lmf_interaction.1312.desc.end:0 "mais je redoute l'idée que cet entrain ne soit pas réciproque… »\n\nAu vu de son hésitation croissante, je redoute à mon tour trop de circonlocution, malvenue à une heure si tardive, et l'invite donc à parler sans ambage. « Je requiers simplement votre aide. En votre qualité de [secondary_actor.Custom2('LMF_RelationToMeShort', ROOT.Char )], [secondary_actor.Custom('FR_IlElle')] sera enclin[secondary_actor.Custom('FR_E')] à vous écouter et à se fier à votre jugement. Plaidez ma cause, portez-vous garant[ROOT.Char.Custom('FR_E')], conjurez le doute ! Quelques bons mots pourraient suffire, n'ai-je pas raison ? »\n\nSi tant est que j'ai un pouvoir de persuasion sur m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_actor'))], [secondary_recipient.GetFirstNameNoTooltip] semble lui accorder beaucoup de mérite."
 lmf_interaction.1312.a:0 "Je lui en toucherais un mot."
 lmf_interaction.1312.b:0 "Je préfère ne pas mettre mon grain de sel là-dedans."
 lmf_interaction_intro_chance_pos_tt:0 "Les chances que la rencontre se termine bien #positive_value augmentent#!"
 lmf_interaction_intro_chance_neg_tt:0 "Les chances que la rencontre se termine bien #negative_value diminuent#!"
 lmf_interaction.1313.t:0 "Worrying Behavior"
 lmf_interaction.1313.desc.start:0 "[secondary_recipient.GetTitledFirstNameNoTooltip] and [secondary_recipient.GetHerHis] retainers are put up in [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], and at first it seemed like all was peaceful and everyone would be ready for proper introductions the following day.\n\nThen, later that evening, a servant awoke me with news: "
 lmf_interaction.1313.desc.lunatic:0 "[secondary_recipient.GetTitledFirstNameNoTooltip] had been found, wandering the [ROOT.Char.Custom('FortifiedBuilding')]'s halls, laughing maniacally and with not a stitch of clothing on [secondary_recipient.GetHerHis] body.\n\nThe servants were able to eventually calm [secondary_recipient.GetHerHim] down and return [secondary_recipient.GetHerHim] to [secondary_recipient.GetHerHis] chambers, "
 lmf_interaction.1313.desc.lustful:0 "[secondary_recipient.GetTitledFirstNameNoTooltip] had snuck out of the [ROOT.Char.Custom('FortifiedBuilding')] and gone into a local village, where [secondary_recipient.GetSheHe]'d gotten into an altercation with several locals... apparently involved [secondary_recipient.GetHerHis] 'lewd conduct'.\n\nMy guards recognized the [secondary_recipient.Custom('polite_gender_ref')] and escorted [secondary_recipient.GetHerHim] back before further trouble started, "
 lmf_interaction.1313.desc.sadistic:0 "[secondary_recipient.GetTitledFirstNameNoTooltip] had started a fight with one of the [ROOT.Char.Custom('FortifiedBuilding')] maids. She'd evidently entered the [secondary_recipient.Custom('polite_gender_ref')]'s chambers unbidden and received such a lashing from [secondary_recipient.GetTitledFirstNameNoTooltip] it brought near half the [ROOT.Char.Custom('FortifiedBuilding')] there to intervene. The maid is mostly fine, if shaken by [secondary_recipient.GetTitledFirstNamePossessiveNoTooltip] cruel temper, "
 lmf_interaction.1313.desc.end:0 "so no real harm was done, but even so... it's worrying.\n\nWorse still, apparently [secondary_actor.GetFirstNameNoTooltip] heard of the incident just as I did."
 lmf_interaction.1313.a:0 "I suppose we'll have to pretend that never happened."
 lmf_interaction.1314.t:0 "Grabuge [ROOT.Char.Custom('FR_ResidenceBuilding_Au')]"
 lmf_interaction.1314.desc:0 "[secondary_recipient.Custom('FR_le_Char_Pi')|U][secondary_recipient.GetTitledFirstName] ainsi que ses [Select_CString(secondary_recipient.IsFemale,'caméristes','domestiques')] jouissent des bienfaits de mon hospitalité à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Au premier abord, cela ne peut augurer que du bon pour la suite, mais j'en viens très vite à déchanter lorsque durant un petit repas, si informel que [secondary_actor.GetFirstName] n'avait nul besoin d'y assister, la situation finit par s'envenimer.\n\nL'attitude plus que déplaisante dont a fait montre [secondary_recipient.GetFirstNameNoTooltip] depuis son arrivée m'a poussé à aller quérir un peu de répit en m'éloignant de la table par un habile prétexte, mais un bref instant plus tard, [secondary_recipient.Custom('FR_IlElle')] entame une joute oratoire avec [your_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] qui se termine par un déchaînement de jurons particulièrement crus.\n\nLa situation a tant dégénéré qu'[Select_CString(And(secondary_recipient.IsFemale, your_courtier.IsFemale), 'elles', 'ils')] ont faillis en venir aux mains, mais peu me chaut l'origine de cette fâcherie, car de toute évidence [your_courtier.GetFirstNameNoTooltip] s'en trouve particulièrement inconforté[your_courtier.Custom('FR_E')], et les échos de ce spectacle grotesque finissent même par arriver aux oreilles de [secondary_actor.GetFirstNameNoTooltip]."
 lmf_interaction.1314.a:0 "Quelle chienlit..."
 fought_during_introduction:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'êtes', 'sont')] devenu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'rivales', 'rivaux')] après une échauffourée lors de [TARGET_CHARACTER.LocalPlayerString('votre rencontre prénuptiale', 'la rencontre prénuptiale')][TARGET_CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')]."
 fought_during_introduction_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'êtes', 'sont')] devenu[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')] [Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'rivales', 'rivaux')] après une échauffourée lors de [CHARACTER.LocalPlayerString('votre rencontre prénuptiale', 'la rencontre prénuptiale')][CHARACTER.LocalPlayerString('', 'Loc_FR_du_GetShortUIName')]."
 lmf_interaction.1315.t:0 "Une disparition impromptue"
 lmf_interaction.1315.desc:0 "Au lendemain de l'arrivée [secondary_recipient.Custom('FR_du_Char_Pi')][secondary_recipient.GetTitledFirstName] me vient l'idée d'organiser un petit tête-à-tête entre [secondary_recipient.Custom('FR_LuiElle')] et [secondary_actor.GetFirstName]. Cela aurait été une parfaite occasion pour [Select_CString(And(secondary_recipient.IsFemale, secondary_actor.IsFemale), 'elles', 'eux')] de converser, [Select_CString(And(secondary_recipient.IsFemale, secondary_actor.IsFemale), 'libérées', 'libérés')] du poids d'une multitude d'yeux par trop curieux. Malheureusement, la disparition soudaine de [secondary_recipient.GetFirstNameNoTooltip] complique quelque peu les choses.\n\nCraignant qu'[secondary_recipient.Custom('FR_IlElle')] ait pu se faire enlever, voire pire, nous retournons les lieux de fond en comble pendant près d'une heure, jusqu'à ce qu'une servante se précipite pour nous informer que [secondary_recipient.Custom('FR_LeLa')] disparu[secondary_recipient.Custom('FR_E')] a simplement trouvé refuge dans un coin [ROOT.Char.Custom('FR_ResidenceBuilding_Du')]. Apeuré à l'idée de rencontrer tant de nouvelles têtes, [secondary_recipient.Custom('FR_IlElle')] n'a même pas réalisé que son absence allait nous causer du désagrément.\n\n[secondary_actor.GetFirstNameNoTooltip], quant à [secondary_actor.Custom('FR_LuiElle')], se forge d'autant plus une mauvaise image de s[secondary_recipient.Custom('FR_OnA')] #italic futur[secondary_recipient.Custom('FR_E')] promis[secondary_recipient.Custom('FR_E')]#!."
 lmf_interaction.1315.a:0 "À dire vrai, je ne peux pas l'en blâmer."
 lmf_interaction.1316.t:0 "Diner et désagrément"
 lmf_interaction.1316.desc.start:0 "Accueilli[secondary_recipient.Custom('FR_E')] comme il se doit dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] est maintenant convié[secondary_recipient.Custom('FR_E')] à un modeste et informel repas, en préambule de la rencontre bien officielle qui se tiendra demain. J'escompte de cette petite entrevue une occasion pour notre invité[secondary_recipient.Custom('FR_E')] de pouvoir échanger quelques mots avec [secondary_actor.GetFirstName]…\n\n…mais bien vite, la situation échappe à mon contrôle.\n\n"
 lmf_interaction.1316.desc.gluttonous:0 "[secondary_recipient.GetFirstNameNoTooltip] fait moins de manières à engloutir le contenu de son assiette qu'à répondre quand [secondary_actor.GetFirstNameNoTooltip] s'adresse à [secondary_recipient.Custom('FR_LuiElle')]. J'assiste à un spectacle désolant où les tentatives de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_actor'))] pour engager une conversation se soldent régulièrement par des bruits de déglutition et de mastication au rythme des victuailles qui tombent au fond d'un puits, semble-t-il, sans fond.\n\n"
 lmf_interaction.1316.desc.paranoid:0 "Ce serait un doux euphémisme que d'employer le terme « agité[secondary_recipient.Custom('FR_E')] » pour qualifier [secondary_recipient.GetFirstNameNoTooltip] en cette soirée. Chaque porte qui s'ouvre, chaque silhouette qui se dévoile, chaque servant qui entre sont autant de nouvelles sources d'inquiétude qu'[secondary_recipient.Custom('FR_IlElle')] doit garder à l'œil. Et [secondary_actor.GetFirstNameNoTooltip] peut faire montre d'autant d'acharnement qu'[secondary_actor.Custom('FR_IlElle')] le souhaite pour lui arracher une conversation, tout ce qu'[secondary_actor.Custom('FR_IlElle')] obtient en retour ce sont des regards plus tranchants qu'aucune lame.\n\n"
 lmf_interaction.1316.desc.lazy:0 "Dès lors que [secondary_recipient.GetFirstNameNoTooltip] s'est joint[secondary_recipient.Custom('FR_E')] à nous, j'ai su qu'[secondary_recipient.Custom('FR_IlElle')] n'avait pas la moindre envie d'être ici. Son #italic léger#! retard était déjà un signe en soi, mais sa posture avachie et ses yeux péniblement ouverts n'ont fait que me conforter dans ma première impression. [secondary_actor.GetFirstNameNoTooltip] à beau s'évertuer pour entamer un début de conversation, les bâillements qu'[secondary_actor.Custom('FR_IlElle')] reçoit en retour ne sont guère engageants.\n\n"
 lmf_interaction.1316.desc.fallthrough:0 "Je sens l'inconfort pesant qui trône sur la table, [secondary_recipient.GetFirstNameNoTooltip] n'étant visiblement pas des plus à l'aise. Est-ce à mettre au compte de la fatigue, ou bien l'endroit n'est guère à son goût ? Je ne sais pas, mais le repas s'en trouve dépossédé de toute réjouissance, et le brusque « veuillez m'excuser » de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', SCOPE.sC('secondary_actor'))] a beau provoquer un soulagement clairement visible sur le visage de [secondary_recipient.GetFirstNameNoTooltip], je doute que cela arrange quoi que ce soit à nos affaires.\n\n"
 lmf_interaction.1316.desc.end:0 "Tout ce qu'on peut espérer maintenant, c'est que la rencontre officielle de demain se fera sous de meilleurs auspices."
 lmf_interaction.1316.a:0 "Rien n'est encore joué."
 lmf_interaction.1317.t:0 "De bons auspices"
 lmf_interaction.1317.desc.start:0 "Accueilli[secondary_recipient.Custom('FR_E')] comme il se doit dans m[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')], [secondary_recipient.Custom('FR_le_Char_Pi')][secondary_recipient.GetTitledFirstName] est maintenant convié[secondary_recipient.Custom('FR_E')] à un modeste et informel repas, en préambule de la rencontre bien officielle qui se tiendra demain. J'escompte de cette petite entrevue une occasion pour notre invité[secondary_recipient.Custom('FR_E')] de pouvoir échanger quelques mots avec [secondary_actor.GetFirstName]…\n\n...et ce qui en découle est plus appréciable encore.\n\n"
 lmf_interaction.1317.desc.gregarious:0 "De tout ce qui est servi à cette table, la nature loquace de [secondary_recipient.GetFirstNameNoTooltip] est de loin la plus savoureuse des friandises. Chaque rire, chaque sourire, chaque rictus partagé est la conséquence de son entrain et de son aisance à bavarder. Dès que la conversation s'essouffle, [secondary_recipient.Custom('FR_IlElle')] trouve toujours le trait d'esprit ou le bon mot qui en ravive l'intérêt, tant et si bien que [secondary_actor.GetFirstNameNoTooltip] continue de boire ses paroles sans plus toucher à sa coupe [ROOT.Char.Custom('RegionalAlcoholicDrink')].\n\n"
 lmf_interaction.1317.desc.diligent:0 "Prompt[secondary_recipient.Custom('FR_E')] à parfaire les règles de bienséance, [secondary_recipient.GetFirstNameNoTooltip] parle avec la même assiduité qu'[secondary_recipient.Custom('FR_IlElle')] écoute, redoublant d'efforts pour bâtir de bien belles conversations sur la base d'anecdotes somme toutes anodines. Dans d'autres circonstances, le repas aurait pu être synonyme de labeur, mais à en juger par la mine réjouie de [secondary_actor.GetFirstNameNoTooltip], l'organiser en valait la peine.\n\n"
 lmf_interaction.1317.desc.temperate:0 "Si pour certains, un goût prononcé pour la tempérance pourrait être perçu comme un excès de retenue, la nature frugale de [secondary_recipient.GetFirstNameNoTooltip] apparaît ici comme une bénédiction. À ne jamais avoir la bouche pleine plus que de raison, à n'avoir jamais l'esprit embrumé par l'appétence des choses inébriantes, [secondary_recipient.Custom('FR_IlElle')] consacre plus de temps à embellir la conversation qu'à vider sa coupe [ROOT.Char.Custom('RegionalAlcoholicDrink')], au grand bonheur de [secondary_actor.GetFirstNameNoTooltip] qui trouve là un[secondary_recipient.Custom('FR_E')] interlocut[secondary_recipient.Custom('FR_EurRice')] dévoué[secondary_recipient.Custom('FR_E')].\n\n"
 lmf_interaction.1317.desc.fallthrough:0 "Je ne saurais dire si [secondary_recipient.GetFirstNameNoTooltip] est coutumi[secondary_recipient.Custom('FR_ErEre')] d'autant d'afféterie dans de pareilles circonstances, mais cette soirée baigne dans la joie et l'allégresse, et cela est grandement à mettre au compte de sa bonne humeur. Bien que de nombreuses lieues [secondary_recipient.Custom('FR_LeLa')] séparent de son foyer, ce toit lui semble être devenu rapidement des plus familiers, présageant que ce dîner pourrait être le premier d'une longue série à venir. Une perspective que ne semble point renier [secondary_actor.GetFirstNameNoTooltip].\n\n"
 lmf_interaction.1317.desc.end:0 "Un début fort prometteur ; espérons que la suite sera de même teneur."
 lmf_interaction.1317.a:0 "Ne crions pas victoire trop tôt."
 lmf_interaction.1318.t:0 "Winning Me Over"
 lmf_interaction.1318.desc:0 "Things were quiet in the [ROOT.Char.Custom('FortifiedBuilding')], after [secondary_recipient.GetTitledFirstNameNoTooltip] and [secondary_recipient.GetHerHis] retainers were put up for the night. I invited [secondary_recipient.GetTitledFirstNameNoTooltip] to my personal quarters for a small dinner, hoping [secondary_recipient.GetSheHe] and [secondary_actor.GetFirstNameNoTooltip] might have a chance to talk in private without a hundred eyes upon them.\n\nInstead, however, it somehow ended up being [secondary_recipient.GetTitledFirstNameNoTooltip] and I who did all the talking!\n\nWe chatted amiably over several drinks, and before I knew it I was laughing at the [secondary_recipient.Custom('polite_gender_ref')]'s jokes and telling several of my own. Possibly [secondary_recipient.GetSheHe] was simply trying to ingratiate [secondary_recipient.GetHerselfHimself] with me, as the one who decides the fate of the wedding, but it didn't feel that way. We were simply getting along!\n\n[secondary_actor.GetFirstNameNoTooltip] left the dinner early, bored and unnoticed."
 lmf_interaction.1318.a:0 "A fine evening!"
 got_along_at_introduction:0 "[CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName|U] et [TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')][TARGET_CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vous êtes', 'se sont')] rapproché[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')], lors d’une rencontre prénuptiale."
 got_along_at_introduction_corresponding:0 "[TARGET_CHARACTER.Custom('FR_le_Char_U_Pi')|U][TARGET_CHARACTER.GetShortUIName|U] et [CHARACTER.Custom('FR_le_Char_U_Pi')][CHARACTER.GetShortUIName] [Select_CString(Or(CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer), 'vous êtes', 'se sont')] rapproché[Select_CString(And(CHARACTER.IsFemale, TARGET_CHARACTER.IsFemale), 'es', 's')], lors d’une rencontre prénuptiale."
 lmf_interaction.1319.t:0 "Playing With Swords"
 lmf_interaction.1319.desc.start:0 "After [secondary_recipient.GetTitledFirstNameNoTooltip] and [secondary_recipient.GetHerHis] retainers were put up for the night, I'm told [secondary_recipient.GetSheHe] quickly made [secondary_recipient.GetHerHis] way down to the barracks to spend time sparring with my [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')].\n\nUnusual, perhaps, but it's possible [secondary_recipient.GetTitledFirstNameNoTooltip] is simply more comfortable swinging a sword than playing the courtly [secondary_recipient.GetWomanMan] in search of a [secondary_actor.GetWifeHusband].\n\nMore importantly, it appears [secondary_actor.GetFirstNameNoTooltip] heard the news just as I did, and went down to the armory to witness the spectacle for [secondary_actor.GetHerselfHimself]. "
 lmf_interaction.1319.desc.impressed:0 "Evidently, [secondary_actor.GetSheHe] was rather delighted by [secondary_recipient.GetTitledFirstNamePossessiveNoTooltip] display, cheering [secondary_recipient.GetHerHim] on from the sidelines and then showering [secondary_recipient.GetHerHim] with praise whenever [secondary_recipient.GetSheHe] won a bout."
 lmf_interaction.1319.desc.unimpressed:0 "Evidently, [secondary_actor.GetSheHe] was rather unimpressed by [secondary_recipient.GetTitledFirstNamePossessiveNoTooltip] display, particularly when [secondary_actor.GetSheHe] tried to engage the [secondary_recipient.GetWomanMan] in conversation only to be dismissed out of hand. At which point, naturally, [secondary_actor.GetFirstNameNoTooltip] turned and left."
 lmf_interaction.1319.a:0 "Well, at least [secondary_actor.GetSheHe] was impressed."
 lmf_interaction.1319.b:0 "Not an auspicious start."
 lmf_interaction.1320.t:0 "An Unexpected Duel"
 lmf_interaction.1320.desc:0 "After [secondary_recipient.GetTitledFirstNameNoTooltip] and [secondary_recipient.GetHerHis] retainers were put up for the night, I was certain it would be a quiet evening. That was, however, far from the case.\n\nWhile most of the [ROOT.Char.Custom('FortifiedBuilding')] was asleep, [secondary_recipient.GetTitledFirstNameNoTooltip] went down to the barracks to spend time with my [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]... drinking and gambling, most likely, though they deny it.\n\nAt some point, the [secondary_recipient.Custom('polite_gender_ref')] ended up in a game against [your_courtier.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]. There was an accusation of cheating, things got out of hand, and suddenly a duel was declared.\n\nThat this was happening without my knowledge was bad enough, but somehow [secondary_actor.GetFirstNameNoTooltip] got wind of the duel and ran down to witness just what [secondary_actor.GetHerHis] potential future [secondary_recipient.GetWifeHusband] was capable of."
 lmf_interaction.1320.a:0 "It could have been worse, I suppose..."
 lmf_interaction.1320.a.win.tt:0 "[secondary_recipient.Custom('FR_le_Char_Pi')|U][secondary_recipient.GetTitledFirstNameNoTooltip] remporte le duel"
 lmf_interaction.1320.a.lose.tt:0 "[secondary_recipient.Custom('FR_le_Char_Pi')|U][secondary_recipient.GetTitledFirstNameNoTooltip] perd le duel"
 lmf_interaction.1321.t:0 "Missing Home"
 lmf_interaction.1321.desc:0 "After [secondary_recipient.GetTitledFirstNameNoTooltip] and [secondary_recipient.GetHerHis] retainers were put up and shown to their rooms, it was a quiet night. That, I assumed, would be the end of it.\n\nInstead, I received word from one of the [ROOT.Char.Custom('FortifiedBuilding')] servants: [secondary_recipient.GetTitledFirstNameNoTooltip] had locked [secondary_recipient.GetHerselfHimself] in [secondary_recipient.GetHerHis] chambers, unconsolable and in tears.\n\nI had to go down myself, talking to the [secondary_recipient.Custom('polite_gender_ref')] through the door in order to calm [secondary_recipient.GetHerHim] down until finally, reluctantly, [secondary_recipient.GetSheHe] let me in.\n\n[secondary_recipient.GetSheHe|U] missed home, it turns out. Nothing more. I had to remind myself that [secondary_recipient.GetTitledFirstNameNoTooltip] is still just a child, really, and be thankful that [secondary_actor.GetFirstNameNoTooltip] wasn't there to witness the ordeal."
 lmf_interaction.1321.a:0 "How very awkward for the [secondary_recipient.Custom('GetLassLad')]."
 intro_planned_activity_hunting:0 "passer la journée à chasser"
 intro_planned_activity_hike:0 "profiter d'une longue et saine balade"
 intro_planned_activity_garrison:0 "passer la journée sur la lice d'entraînement"
 intro_planned_activity_seduction:0 "passer la journée en charmante compagnie"
 intro_planned_activity_poetry:0 "flâner au gré de la poésie"
 intro_planned_activity_library:0 "bouquiner dans la bibliothèque"
 intro_planned_activity_church:0 "rendre hommage [ROOT.GetCharacter.GetFaith.PantheonTerm2]"
 intro_planned_activity_tavern:0 "aller battre les environs à la recherche d'une bonne taverne"
 intro_planned_activity_poor:0 "aller faire quelques actes caritatifs auprès des indigents"
 intro_planned_activity_tour:0 "faire le tour du domaine"
 intro_planned_activity_garden:0 "profiter des joliesses qu'offrent les jardins"
 lmf_interaction.1325.t:0 "Le jour suivant"
 lmf_interaction.1325.t.same:0 "Un couple en devenir ?"
 lmf_interaction.1325.desc.same.actor.start:0 "Le but d'une rencontre prénuptiale étant d'introduire les deux partis d'un mariage, le cas ici est un peu particulier puisque [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] est membre de ma cour, à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Ce menu détail ne doit pas pour autant nous empêcher de faire les choses dans les règles de l'art.\n\n"
 lmf_interaction.1325.desc.same.actor.willnotwed:0 "Tandis que m[secondary_recipient.Custom('FR_OnA')] #italic peut-être-futur[secondary_recipient.Custom('FR_E')]-promis[secondary_recipient.Custom('FR_E')]#! se dévoile en pénétrant dans la salle du trône, sa nervosité se révèle également aux yeux de tous. Une réaction compréhensible quand on sait qu'[secondary_recipient.Custom('FR_IlElle')] a déjà maintes fois formuler son souhait de n'épouser qu'une personne qui saura lui plaire. Un souhait que je pourrais tout à fait choisir d'ignorer si l'envie m'en prenait, mais si telle était ma volonté, alors nous ne serions pas tous réunis ici.\n\n"
 lmf_interaction.1325.desc.same.actor:0 "Tandis que m[secondary_recipient.Custom('FR_OnA')] #italic peut-être-futur[secondary_recipient.Custom('FR_E')]-promis[secondary_recipient.Custom('FR_E')]#! se dévoile en pénétrant dans la salle du trône, sa nervosité se révèle également aux yeux de tous. Sentiment légitime car nous savons l'[Select_CString(And(secondary_recipient.IsFemale, ROOT.Char.IsFemale), 'une', 'un')] comme l'autre que j'ai toute autorité à décider de l'issue de cette rencontre, et ce peu importe ce que nous éprouverons l'[Select_CString(And(secondary_recipient.IsFemale, ROOT.Char.IsFemale), 'une', 'un')] pour l'autre lorsqu'elle s'achèvera. Mais bien entendu, si je n'avais cure de savoir si nous sommes [Select_CString(And(secondary_recipient.IsFemale, ROOT.Char.IsFemale), 'faites', 'faits')] l'[Select_CString(And(secondary_recipient.IsFemale, ROOT.Char.IsFemale), 'une', 'un')] pour l'autre, nous ne serions pas tous réunis ici.\n\n"
 lmf_interaction.1325.desc.same.actor.end:0 "Ma main vient se joindre à la sienne pour l'emmener au dehors, où nous pourrons [secondary_actor.Custom('lmf_intro_planned_activity')]. J'ai bien conscience que bon nombre d'yeux curieux nous dévisagerons, mais nous saurons parvenir à jouir de l'instant présent."
 lmf_interaction.1325.desc.same.start:0 "Le but d'une rencontre prénuptiale étant d'introduire les deux partis d'un mariage, le cas ici est un peu particulier puisque [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] réside à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Ce menu détail ne doit pas pour autant nous empêcher de voir si [secondary_recipient.Custom('FR_LuiElle')] et [secondary_actor.GetFirstName] sont bel et bien [Select_CString(And(secondary_recipient.IsFemale, secondary_actor.IsFemale), 'faites', 'faits')] l'[Select_CString(And(secondary_recipient.IsFemale, secondary_actor.IsFemale), 'une', 'un')] pour l'autre.\n\n"
 lmf_interaction.1325.desc.same.both.willnotwed:0 "[Select_CString(And(secondary_recipient.IsFemale, secondary_actor.IsFemale), 'Toutes', 'tous')] deux font grand cas de donner priorité à leur cœur plutôt qu'à leur devoir, et c'est bien parce que je respecte cela que nous sommes tous réunis ici aujourd'hui.\n\n"
 lmf_interaction.1325.desc.same.secact.willnotwed:0 "Rien ne m'oblige à considérer les sentiments ni les souhaits de m[ROOT.Char.Custom2('FR_LMF_RelationToMeShort_OnA', secondary_actor )], mais c'est bien parce que telle est ma volonté que nous sommes tous réunis ici aujourd'hui.\n\n"
 lmf_interaction.1325.desc.same.secrec.willnotwed:0 "Rien ne m'oblige à considérer les sentiments ni les souhaits de [secondary_recipient.GetFirstNameNoTooltip], mais c'est bien parce que telle est ma volonté que nous sommes tous réunis ici aujourd'hui.\n\n"
 lmf_interaction.1325.desc.same:0 "Je pourrais clore cette affaire promptement et les contraindre au mariage si l'envie m'en prenait, mais ce n'est pas pour ça que nous sommes tous réunis ici aujourd'hui.\n\n"
 lmf_interaction.1325.desc.same.end:0 "Leurs visages dénotent une certaine sérénité devant l'audience rassemblée, jaçoit qu'ils s'imaginent que leur idée pour la suite n'est connue de personne, mais je devine que [secondary_actor.GetFirstNameNoTooltip] a pour projet de [secondary_actor.Custom('lmf_intro_planned_activity')].\n\nAinsi, la rencontre prénuptiale peut officiellement débuter."
 lmf_interaction.1325.desc.secrec.start:0 "L'aube se dévoile sur [secondary_actor.Custom('FR_ResidenceBuilding_Le')], et j'en fais autant dans la salle du trône. Après moult préparations, comme attendu de la part d'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip], me voilà fin prêt[ROOT.Char.Custom('FR_E')] à passer la journée avec [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))].\n\nNier la nervosité qui m'habite serait malvenu, car si mon avenir n'est point encore tracé, la foultitude d'yeux qui me dévisagent font peser sur mes épaules bien plus que le poids de mes responsabilités habituelles. Pour autant, je fais bonne figure — du moins je m'y efforce.\n\n"
 lmf_interaction.1325.desc.start:0 "L'aube se dévoile sur [secondary_recipient.Custom('FR_ResidenceBuilding_Le')], et [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))] en fait autant dans la salle du trône. Après moult préparations, [secondary_recipient.Custom('FR_LeLa')] voilà prêt[secondary_recipient.Custom('FR_E')] à passer la journée avec [Select_CString( secondary_actor.IsLocalPlayer, 'moi', secondary_actor.GetFirstName )].\n\nJe [secondary_recipient.Custom('FR_LeLa')] sens fébrile, et à raison, car nombreux sont les yeux à [secondary_recipient.Custom('FR_LeLa')] dévisager, observant ses faits et décortiquant ses gestes. Si [secondary_recipient.Custom('FR_IlElle')] émet quelques réserves quant à sa présence ici, [secondary_recipient.Custom('FR_IlElle')] semble avoir la bienséance de ne pas les afficher ouvertement.\n\n"
 lmf_interaction.1325.desc.actor:0 "Quant à moi, je doute de faire preuve d'autant de retenue dans les traits qu'expriment mon visage.\n\n"
 lmf_interaction.1325.desc.secact.disapprove:0 "Quant [secondary_actor.Custom('FR_au_Char_Pi')][secondary_actor.GetTitledFirstNameNoTooltip], [secondary_actor.Custom('FR_IlElle')] ne cache nullement sa désapprobation derrière quelques afféteries ou minauderies. Son visage affiche un air monolithique, dur comme la roche, qu'aucune révérence ne saurait faire courber.\n\n"
 lmf_interaction.1325.desc.secact:0 "Quant [secondary_actor.Custom('FR_au_Char_Pi')][secondary_actor.GetTitledFirstNameNoTooltip], son entrain rayonne à travers chaque plissure et chaque courbure de son visage.\n\n"
 lmf_interaction.1325.desc.end:0 "Tous nous regardent tandis [Select_CString(secondary_actor.IsLocalPlayer,'que je lui fait part de mon intention',Select_CString(secondary_actor.IsFemale,'qu’elle me fait part de son intention','qu’il me fait part de son intention'))] : « [secondary_actor.Custom('lmf_intro_planned_activity')|U], n'est-ce pas là une brillante idée ? »\n\nAinsi, la rencontre prénuptiale peut officiellement débuter."
 lmf_interaction.1325.a:0 "Voyons jusqu'où tout cela [Select_CString(Or(secondary_actor.IsLocalPlayer, secondary_recipient.IsLocalPlayer), 'nous', 'les')] mènera."
 lmf_interaction.1325.a.tt:0 "[secondary_actor.Custom('FR_le_Char_U_Pi')|U][secondary_actor.GetShortUIName|U] et [secondary_recipient.Custom('FR_le_Char_U_Pi')][secondary_recipient.GetShortUIName] [Select_CString(Or(secondary_recipient.IsLocalPlayer, secondary_actor.IsLocalPlayer), 'allez', 'vont')] passer la journée ensemble pour mieux apprendre à [Select_CString(Or(secondary_recipient.IsLocalPlayer, secondary_actor.IsLocalPlayer), 'vous', 'se')] connaître"
 lmf_interaction.1325.a.secrec.charmed:0 "[secondary_recipient.Custom('FR_le_Char_Pi')|U][secondary_recipient.GetTitledFirstNameNoTooltip] tombe sous le charme de [secondary_actor.GetFirstNameNoTooltip]"
 lmf_interaction.1325.a.secrec.notcharmed:0 "[secondary_actor.GetFirstNameNoTooltip] fait piètre figure"
 lmf_interaction.1325.a.secact.charmed:0 "[secondary_actor.GetFirstNameNoTooltip] tombe sous le charme [secondary_recipient.Custom('FR_du_Char_Pi')][secondary_recipient.GetTitledFirstNameNoTooltip]"
 lmf_interaction.1325.a.secact.notcharmed:0 "[secondary_recipient.Custom('FR_le_Char_Pi')|U][secondary_recipient.GetTitledFirstNameNoTooltip] fait piètre figure"
 intro_activity_short_hunting:0 "la chasse"
 intro_activity_short_hike:0 "la longue marche"
