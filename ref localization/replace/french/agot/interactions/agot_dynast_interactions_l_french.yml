l_french:
 send_to_nightswatch_interaction:0 "Envoyer à la Garde de Nuit #weak (Dynastie)#!"
 send_to_nightswatch_interaction_desc:0 "$dynasty_interaction_header$ a envoyé [recipient.Custom('FR_le_Char_U_Pi')][recipient.GetShortUINameNoTooltip] servir la Garde de Nuit. Il n'engendrera pas d'enfant, ne possédera pas de terre, car tel est son devoir sacré désormais."
 send_to_nightswatch_interaction_toast:1 "[recipient.Custom('FR_le_Char_U_Pi')|U][recipient.GetShortUIName] est parti rejoindre la Garde de Nuit"
 send_to_nightswatch_interaction_toast_desc:0 "Et à présent sa garde commence."
 CHARACTER_INTERACTION_NOT_ALLOWED_IN_NIGHTSWATCH:0 "[recipient.Custom('FR_IlElle')|U] n'est pas autorisé à servir comme [knight|El] à la [court|El] ciblée"
 send_to_nightswatch_interaction_effect_desc:1 "#weak [CHARACTER.Custom('FR_le_Char_U_Pi')|U][CHARACTER.GetShortUIName] quittera votre cour pour servir dans la Garde de Nuit. [CHARACTER.Custom('FR_IlElle')|U] renoncera à tout héritage et à tout ses droits afin de servir pour la défense du royaume.#!"
 send_to_nightswatch_interaction_extra_icon:0 "$hook_extra_icon$"