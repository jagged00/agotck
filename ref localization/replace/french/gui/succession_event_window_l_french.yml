l_french:
 SUCCESSION_EVENT_WINDOW_LOST_TITLES:0 "Titres perdus lors de la succession :"
 SUCCESSION_EVENT_WINDOW_CLOSE: "Continuer en tant que [SuccessionEventWindow.GetContinueAsCharacter.GetShortUINameNotMeNoTooltip]"
 SUCCESSION_EVENT_WINDOW_LEGACY:0 "Afficher le lignage"
 SUCCESSION_EVENT_WINDOW_OBSERVER:0 "Entrer en mode observateur"
 SUCCESSION_EVENT_WINDOW_MENU:0 "Retour au menu"
 SUCCESSION_EVENT_WINDOW_MENU_TT:0 ""
 SUCCESSION_EVENT_WINDOW_END_GAME:0 "Mettre fin à la partie"
 SUCCESSION_EVENT_WINDOW_END_GAME_TT:0 "Mettre fin à la partie multijoueur"
 SUCCESSION_EVENT_WINDOW_LEAVE_GAME:0 "Quitter la partie"
 SUCCESSION_EVENT_WINDOW_LEAVE_GAME_TT:0 "Quitter la partie multijoueur"
 SUCCESSION_EVENT_WINDOW_CHANGE_CHARACTER:0 "Choisir un autre personnage"
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_1:0 "L’existence [ROOT.Char.Custom('FR_du_Char_Pi')][ROOT.Char.GetTitledFirstNameNicknamedNoTooltip] s’est achevée à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_2:0 "[ROOT.Char.Custom('FR_le_Char_Pi')|U][ROOT.Char.GetTitledFirstNameNicknamedNoTooltip] a fermé les yeux sur ce monde à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_3:0 "[ROOT.Char.Custom('FR_le_Char_Pi')|U][ROOT.Char.GetTitledFirstNameNicknamedNoTooltip] s’est éteint[ROOT.Char.Custom('FR_E')] à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_4:0 "[ROOT.Char.Custom('FR_le_Char_Pi')|U][ROOT.Char.GetTitledFirstNameNicknamedNoTooltip] a quitté ce monde à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_DEFAULT_5:0 "[ROOT.Char.Custom('FR_le_Char_Pi')|U][ROOT.Char.GetTitledFirstNameNicknamedNoTooltip] a trépassé à l’âge de [ROOT.Char.GetAge] et [ROOT.Char.Custom('GetAfterLifeDestination')]."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_PIOUS:1 "La sainte vie [ROOT.Char.Custom('FR_du_Char_Pi')][ROOT.Char.GetTitledFirstNameNicknamedNoTooltip] s’est révolue à [ROOT.Char.GetAge] ans, [ROOT.Char.Custom('FR_LeLa')] laissant trouver le salut [ROOT.Char.GetFaith.PositiveAfterLife2]."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_WICKED:1 "[ROOT.Char.Custom('FR_le_Char_Pi')|U][ROOT.Char.GetTitledFirstNameNicknamedNoTooltip] a finalement rejoint [ROOT.Char.GetFaith.NegativeAfterLife] à l’âge de [ROOT.Char.GetAge] ans, après une vie d’impénitence et de blasphème."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_WOUNDED:0 "Les souffrances physiques [ROOT.Char.Custom('FR_du_Char_Pi')][ROOT.Char.GetTitledFirstNameNicknamedNoTooltip] ont pris fin après qu’il eu atteint les [ROOT.Char.GetAge] ans, laissant son âme trouver la paix loin des tourments de sa chair."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_CHRISTIANITY_1:0 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] a trouvé la paix dans les bras du Christ à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_CHRISTIANITY_2:0 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] repose dans les bras du Seigneur à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_ISLAM_1:0 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] a quitté la maison transitoire à l’appel du Très Grand à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_ISLAM_2:0 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] a abandonné ce monde transitoire et s’est envolé[ROOT.Char.Custom('FR_E')] vers [ROOT.Char.GetFaith.PositiveAfterLife] à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_ISLAM_3:0 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] est entré[ROOT.Char.Custom('FR_E')] dans l’éternité à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_NORSE_1:0 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] a rejoint [ROOT.Char.GetFaith.PositiveAfterLife] à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_HELLENIC_1:0 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] a traversé le fleuve Styx à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_EASTERN_1:0 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] a transcendé sa forme matérielle à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_INTRO_TRIBAL_1:0 "[ROOT.Char.Custom('FR_le_Char_Pi')|U][ROOT.Char.GetTitledFirstNameNicknamedNoTooltip] a franchi la porte du monde des esprits à l’âge de [ROOT.Char.GetAge] ans."
 SUCCESSION_EVENT_WINDOW_DEAD_REASON_1:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason],"
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_AGE_CHILD:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], puisque son glas a sonné dans ses vertes années, nul ne saura jamais quel genre de [ROOT.Char.GetTitleAsNameNoTooltip|l] [ROOT.Char.Custom('FR_IlElle')] aurait été."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_AGE_OLD:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], sa très longue vie témoigne d’une expérience dont peu de [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] peuvent se gargariser."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_AGE_IMMORTAL:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], après tant d’années à fouler le monde connu, son trépas était devenu la chimère de ses ennemis autant que son existence fut la fascination de ses amis. On [ROOT.Char.Custom('FR_LeLa')] disait immorte[ROOT.Char.Custom('FR_LLle')], de parentèle divine, pour certains [ROOT.Char.Custom('FR_IlElle')] était même [ROOT.Char.Custom('FR_LeLa')] [ROOT.Char.Custom('GetDaughterSon')] [ROOT.Char.GetFaith.HighGodNamePossessive] en personne."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_AGE_PREGNANT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], c’est autant [ROOT.Char.GetFaith.FertilityGodName] que [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] qui pleurent sa disparition, car dans sa mort s’éteint également la vie de son enfant qui jamais ne viendra au monde."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_LEPER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] aura combattu le chancre qui gangrenait son corps, et ce jusqu’au soir de sa vie."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_DISFIGURED:0 "[ROOT.Char.Custom('polite_gender_ref')|U] au faciès brisé qui [ROOT.Char.GetDeathReason], son honneur ayant été meurtri dans la flétrissure de son âme, son glas sonne comme une libération de l’opprobre qui entachait son visage."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_MANGLED:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], sa mort fut moins bancroche que ne le fut sa vie, tragiquement frappée par l’infortune, tout au moins autant que sa chair en aura été marquée."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_HUNCHBACK:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], son glas sonne la fin des moqueries qui l’auront suivi[ROOT.Char.Custom('FR_E')] toute sa vie, ainsi marquée du sceau de la difformité."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_GIANT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], son imposante stature lui valu d’être comparé[ROOT.Char.Custom('FR_E')] aux géants des récits ouestriens et aux jhogwins qui peuplaient jadis Essos."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_DWARF:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], pour avoir été la cible de toutes les railleries en raison de sa brève stature, [ROOT.Char.Custom('FR_IlElle')] s’en fit une armure pour que nul ne puisse plus jamais l’atteindre."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_STRONG:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], sa force lui valu l’admiration du petit peuple, lequel affirmait que le sang des géants coulait dans ses veines, comparant sa colossale carrure à celle du Titan de Braavos en personne."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_PRETTY_YOUNG:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], sa joliesse juvénile ne s’en trouvera jamais entachée par la marque du temps, scellant une beauté printanière qui lui survivra dans les siècles à venir."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_PRETTY_OLD:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], nanti[ROOT.Char.Custom('FR_E')] d’un physique qui sut attirer les regards des [Select_CString(ROOT.Char.IsFemale,'hommes tout autant bien que bassement nés','femmes tout autant bien que bassement nées')], le temps ne l’aura pas épargné, laissant sa joliesse d’antan n’être plus qu’un lointain souvenir."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_WEAK:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], sa force était aussi fugace qu’une brise estivale des contrées du Nord, raillé[ROOT.Char.Custom('FR_E')] sans vergogne par tout à chacun en raison d’un faciès égrotant."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_UGLY:1 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] eut la laideur pour disgrâce, l’affreuseté pour compagne, et ses récits d’alcôve jamais ne déchaîneront les passions, au contraire de ses vilains traits qui dessineront balades et chansons."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_BODY_INCAPABLE:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] était devenu[ROOT.Char.Custom('FR_E')] moins que l’ombre d’une ombre, [ROOT.Char.GetTitleAsNameNoTooltip|l] devenu[ROOT.Char.Custom('FR_E')] pantin d’autrui, le repos éternel apportera la liberté à un esprit depuis trop longtemps enchaîné à un corps brisé."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_LUNATIC:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], le mal dont [ROOT.Char.Custom('FR_IlElle')] souffrait avait depuis trop longtemps gangrené et ravagé son esprit pour n’en laisser que des fragments, à l’image d’un vase fracassé au sol."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_POSSESSED_POSITIVE:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], son esprit fut en communion avec [ROOT.Char.GetFaith.ReligiousSymbol], lui parlant jusqu’au plus profond de son être et jusqu’au soir de sa vie."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_POSSESSED_NEGATIVE:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], les démons qui sévissaient dans son for intérieur auront eu raison d[ROOT.Char.Custom('FR_EluiElle')], comme l’augure d’un Fléau qui lui était propre."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_DEPRESSED:1 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], sa lente agonie avait commencé dès lors que son esprit réclamé de son chef la douce étreinte [ROOT.Char.GetFaith.DeathDeityNamePossessive], consumé[ROOT.Char.Custom('FR_E')] de l’intérieur qu’[ROOT.Char.Custom('FR_IlElle')] était par les affres de l’existence."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_GENIUS:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] fut béni[ROOT.Char.Custom('FR_E')] d’un esprit plus habile qu’aucun autre et attisait malgré [ROOT.Char.Custom('FR_LuiElle')] la jalousie non plus que l’admiration des sages grisonnants de la Citadelle."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_DUMB:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] était aussi faible d’esprit que flasque de tête. Certains y voyaient même un châtiment [ROOT.Char.GetFaith.PantheonTerm3], mais alors, qui était réellement la personne châtiée ?"
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_MIND_INFIRM:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] avait déjà perdu la tête bien avant de perdre la vie. Désormais soulagé[ROOT.Char.Custom('FR_E')] du carcan des devoirs d'un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l], son existence dans l’après-vie n'en sera que plus aisée."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_EXCOMMUNICATED:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] fut frappé[ROOT.Char.Custom('FR_E')] d’excommunication et jugé[ROOT.Char.Custom('FR_E')] impie par [ROOT.Char.GetFaith.GetNameNoTooltip]. Désormais, beaucoup subodorent qu’[ROOT.Char.Custom('FR_IlElle')] expiera ses fautes dans [ROOT.Char.GetFaith.NegativeAfterLife]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_KINSLAYER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], nul n’ignore qu’[ROOT.Char.Custom('FR_IlElle')] a fait couler le sang de son sang, et fauti[ROOT.Char.Custom('FR_FVe')] d’un tel crime, sa mort sera bénédiction pour sa parentèle qui n’en dormira que plus paisiblement en se sachant désormais hors d’atteinte de son odieuse vilénie."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_DEVIANT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], sa déviance en faisait une abomination aux yeux de tous, et les rumeurs lui prêtaient toute sorte d’inclinaison que la bienséance interdirait à quiconque d’évoquer."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_CANNIBAL:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], sa délectation de la chair humaine était source d’effroi pour beaucoup, et pour [ROOT.Char.Custom('FR_CeluiCelle')] qui festoyait la vie d’autrui, la mort aura goût de rance et d’amertume."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_SODOMITE:1 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] s’était attiré[ROOT.Char.Custom('FR_E')] le courroux [ROOT.Char.GetFaith.FertilityGodNamePossessive] en forniquant avec d’autres hommes."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_INCESTUOUS:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], pour s’être adonné[ROOT.Char.Custom('FR_E')] aux mœurs des Valyriens d'antan et avoir forniqué avec son propre sang, le nom des [ROOT.Char.GetHouse.GetNameNoTooltip] en sera à jamais entaché d’une encre déjà sèche."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_ADULTERER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], sa perfidie aura planté ses griffes jusque dans le sacrement, violentant tout égard pour ses épousailles autant que pour [ROOT.Char.GetFaith.WaterGodName] en personne."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_FORNICATOR:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], parce que sa concupiscence était pour [ROOT.Char.Custom('FR_LuiElle')] une fin en soi, qu’importe les hauts faits accomplis, c’est sa petite vertu qui lui survivra."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_MURDERER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], nul n’oubliera jamais qu’[ROOT.Char.Custom('FR_IlElle')] fit couler le sang, et si désormais [ROOT.Char.Custom('FR_IlElle')] n’est plus soumis[ROOT.Char.Custom('FR_E')] aux lois des Hommes, c'est devant celles [ROOT.Char.GetFaith.PantheonTerm3] qu’[ROOT.Char.Custom('FR_IlElle')] sera jugé[ROOT.Char.Custom('FR_E')]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_SCANDAL_WITCH:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('InsultAdjective')] qui [ROOT.Char.GetDeathReason], son goût pour les forces occultes lui vaudra d’être associé[ROOT.Char.Custom('FR_E')] aux bêtes démoniaques et aux pires maux du monde, mais c’est devant [ROOT.Char.GetFaith.HighGodNameAlternate] qu’[ROOT.Char.Custom('FR_IlElle')] devra en répondre."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_ACCOMPLISHMENT_SAOSHYANT:0 "Son ascension vers la gloire dans la restauration de l’empire perse sera immortalisée dans les sermons de tous les [ROOT.Char.GetFaith.PriestMalePlural]. [ROOT.Char.Custom('FR_IlElle')|U] est certainement assis[ROOT.Char.Custom('FR_E')] à côté [ROOT.Char.GetFaith.HighGodNamePossessive] maintenant."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_ACCOMPLISHMENT_RESTORER_ROME:0 "En restaurant l’ancien pouvoir de l’Empire, [ROOT.Char.Custom('FR_IlElle')] a assuré une gloire éternelle à son nom."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_ACCOMPLISHMENT_CRUSADER:0 "[ROOT.Char.GetWomanMan|U] zélé[ROOT.Char.Custom('FR_E')], [ROOT.Char.Custom('FR_IlElle')] s’est battu[ROOT.Char.Custom('FR_E')] pour la gloire [ROOT.Char.GetFaith.HighGodNamePossessive] contre les [ROOT.Char.Custom('GetDerogatoryNonbelieverPlural')] dans l’une des plus grandes guerres saintes de l’histoire récente."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_DIPLOMAT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], son habileté à batailler par la plume plutôt que par l’épée lui valut le respect de ses pairs, parvenant à tarir les effusions de sang par quelques gouttes d’encre."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_REVELER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], son goût pour les festivités rayonnait à travers [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], faisant de sa mort le glas d’une époque joviale qui laisse maussade les orphelins que sont troubadours et ménestrels."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_BLADEMASTER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], on [ROOT.Char.Custom('FR_LeLa')] disait de la trempe [ROOT.Char.GetFaith.WarGodNamePossessive] en personne l’arme à la main, capable de rivaliser avec les plus féroces hurleurs dothraki, les plus habiles prêtres norvoshi et les plus aguerris des immaculés."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_HUNTER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], aucun plaisir ne lui était plus doux que celui de la chasse, et [ROOT.Char.Custom('FR_IlElle')] mettait dans sa quête de nouveaux trophées une ferveur plus dévouée que les [ROOT.Char.GetFaith.PriestMalePlural] n’en n’auront jamais envers [ROOT.Char.GetFaith.PantheonTerm]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_GENERAL:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] fut un[ROOT.Char.Custom('FR_E')] virtuose de la stratégie, capable, disait-on, de défaire une armée à dix contre un. Grands stratèges et tacticiens émérites tenteront certainement de marcher dans ses pas, mais en vain, pour sûr."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_ADMINISTRATOR:1 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] avait une telle aisance dans les affaires administratives qu’on lui prêtait l’idée d’avoir préféré, dès son plus jeune âge, la bonne tenue de la maisonnée aux distractions enfantines."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_SCHEMER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], son esprit versé dans l’intrigue et féru de machinations lui valut une réputation telle qu’on pouvait aisément l’imaginer derrière chaque complot qui se tramait et chaque conspiration qui se fomentait."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_SEDUCER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('RomanticComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] fut un[ROOT.Char.Custom('FR_E')] charmeu[ROOT.Char.Custom('FR_RSe')] émérite dont l’habileté de la langue lui valut les faveurs des [Select_CString(ROOT.Char.IsFemale,'hommes','femmes')] de tout le royaume, au grand dam de leurs [Select_CString(ROOT.Char.IsFemale,'épouses','époux')]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_SCHOLAR:1 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] avait l’amour du savoir, et sa quête insatiable de repousser les limites de ses connaissances se sera conclu par l’énigme la plus insoluble qui soit : la mort."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_TORTURER:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] a su élever la torture au rang d’art, son trépas provoquant un raz de soulagement dans les froides geôles où séjournaient ces éventuels futurs sujets d’étude."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_FAMILY_FIRST:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] avait à cœur de servir les intérêts de sa famille, et de là où [ROOT.Char.Custom('FR_IlElle')] est désormais, peut-être verra-t-[ROOT.Char.Custom('FR_IlElle')] le nom des [ROOT.Char.GetHouse.GetNameNoTooltip] briller avec un peu plus d’éclat en vertu de ses actes."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_MYSTIC:1 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], nul ne saurait dire combien de temps [ROOT.Char.Custom('FR_IlElle')] passa dans son laboratoire, et l’aura de mysticisme qui nimbait sa réputation lui valu d’être comparé[ROOT.Char.Custom('FR_E')] à un[ROOT.Char.Custom('FR_E')] sorci[ROOT.Char.Custom('FR_ErEre')] par les esprits les moins perspicaces."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_PHYSICIAN:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] dédia une grande part de sa vie à étudier le corps humain, jusqu’à ce que son propre corps n’arrive à son terme, et ses connaissances acquises lui survivront à travers ceux qui les utiliseront pour repousser toujours plus avant les limites du savoir."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_GALLANT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] incarna jusqu’à la toute fin la galanterie et la hardiesse qu’idolâtrait les preux Andals d’autrefois."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_LIFESTYLE_HERBALIST:1 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], rares furent les apothicaires à travers le monde à pouvoir se targuer d’être nantis d’un savoir en herboristerie comparable au sien."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_MALICIOUS:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] était aussi mielleu[ROOT.Char.Custom('FR_XSe')] dans ses propos que fallacieu[ROOT.Char.Custom('FR_XSe')] dans ses intentions, mais tout[ROOT.Char.Custom('FR_E')] trompeu[ROOT.Char.Custom('FR_RSe')] qu’[ROOT.Char.Custom('FR_IlElle')] était, [ROOT.Char.Custom('FR_IlElle')] ne parvint cependant pas à tromper la mort."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_BENEVOLENT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] était empreint[ROOT.Char.Custom('FR_E')] d’une bienveillance comme rarement un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] le fut."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_DOMINANT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] était l’incarnation de la grandeur [ROOT.Char.GetCulture.GetNameNoTooltip], et petitesse comme bassesse ployaient le genou devant son auguste autorité."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_SUBMISSIVE:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], pour ses ennemis [ROOT.Char.Custom('FR_IlElle')] était servile de nature, pour ses amis, souple de caractère, quelle que fut la vérité, [ROOT.Char.Custom('FR_IlElle')] demeurera dans les mémoires comme un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] accommandant[ROOT.Char.Custom('FR_E')], parfois jusqu’à l’excès."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_APATHETIC:0 "[ROOT.Char.Custom('FR_IlElle')|U] [ROOT.Char.GetDeathReason], et que dire, si ce n’est qu’il n’y a rien à dire. [ROOT.Char.Custom('FR_IlElle')|U] est retourné[ROOT.Char.Custom('FR_E')] à la poussière, et c’est poussière que sera son souvenir."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_LUSTFUL:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('RomanticComplimentAdjective')] qui [ROOT.Char.GetDeathReason], là où d’autres avaient l’amour de l’or, [ROOT.Char.Custom('FR_LuiElle')], avait l’amour de la chair. [Select_CString(ROOT.Char.IsFemale,'Là où d’autres chevauchaient en vue de conquêtes, elle, chevauchait ses conquêtes','Là où d’autres montaient des destriers en vue de conquêtes, lui, montait ses conquêtes')]. Là où d’autres jouissaient des plaisirs de la vie, [ROOT.Char.Custom('FR_LuiElle')], vivait pour prendre plaisir à jouir."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_GLUTTONOUS:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], quand d’autres cherchaient à faire bonne impression, [ROOT.Char.Custom('FR_LuiElle')] cherchait à faire bonne chère. [Select_CString(ROOT.Char.IsFemale,'Fine bouche, gloutonne effrénée, masticatrice émérite, désormais elle','Fin gourmet, glouton effréné, masticateur émérite, désormais il')] se repaîtra en festoyant à la table [ROOT.Char.GetFaith.ReligiousSymbol3]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_GREEDY:1 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] avait une telle appétence pour la trésorerie, un tel amour du profit, que nul n’en aurait été surpris, qu’un beau jour, d’or [ROOT.Char.Custom('FR_IlElle')] se serait conchie."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_LAZY:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] était fervent[ROOT.Char.Custom('FR_E')] partisan[ROOT.Char.Custom('FR_E')] du moindre effort, grand[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] de la procrastination et musardeu[ROOT.Char.Custom('FR_RSe')] convaincu[ROOT.Char.Custom('FR_E')]."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_FICKLE:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], son imprévisibilité était telle que personne n’aurait osé parier sur le comment de sa mort, et semble-t-il que ce soit dans celle-ci qu’[ROOT.Char.Custom('FR_IlElle')] ait finalement trouver la constance qu’[ROOT.Char.Custom('FR_IlElle')] réprouvait tant de son vivant."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_WRATHFUL:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], là où ses ennemis voyaient dans ses excès de fureur le Fléau en chair et en os, ses amis y voyaient une passion des plus enflammées. C’est finalement dans la mort qu’[ROOT.Char.Custom('FR_IlElle')] peut enfin se rasséréner et profiter d’une quiétude éternelle."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_ARROGANT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], et amoureu[ROOT.Char.Custom('FR_XSe')] transi[ROOT.Char.Custom('FR_E')] s’il en est, c’était avant tout [Select_CString(ROOT.Char.IsFemale,'d’elle-même qu’elle était amoureuse','de lui-même qu’il était amoureux')]. Par son trépas, [Select_CString(ROOT.Char.IsFemale,'la voilà libérée','le voilà libéré')] de toute compagnie indigne d[ROOT.Char.Custom('FR_EluiElle')], et ainsi, libre de savourer la sienne pour les innombrables temps à venir."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_CHASTE:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], parce que l’intimité [ROOT.Char.Custom('FR_LeLa')] perturbait et la fornication [ROOT.Char.Custom('FR_LeLa')] répugnait, [ROOT.Char.Custom('FR_IlElle')] put se consacrer corps et âme à de plus hautes ambitions que l’assouvissement des pulsions de la chair."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_TEMPERATE:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [Select_CString(ROOT.Char.IsFemale,'elle avait embrassé','il avait pris pour épouse')] la tempérance, et se défiait de l’excès comme on se défie [Select_CString(ROOT.Char.IsFemale,'d’un amant','d’une maîtresse')] qui conjurerait la chute de tout un empire par simple jalousie mortifère."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_GENEROUS:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], l’or n'avait de valeur à ses yeux que dès lors qu’il était offert à ceux qui lui étaient chers. Pour [ROOT.Char.Custom('FR_LuiElle')] la vie était un don, et [ROOT.Char.Custom('FR_IlElle')] faisait grand cas d’en faire profiter au plus grand nombre."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_DILIGENT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], le labeur était sa raison d’être, le travail son sacerdoce, la corvée son passe temps. Si l’Homme est l'ouvrage [ROOT.Char.GetFaith.PantheonTerm3], alors nul doute que [ROOT.Char.Custom('FR_le_Char_Pi')][ROOT.Char.GetTitledFirstNameNoTooltip] a su parfaire cette création."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_COMPASSIONATE:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('ComplimentAdjective')] qui [ROOT.Char.GetDeathReason], jamais sa tendresse d’âme ne fut frelatée par quelques vilénies que ce fut, et jusqu'au sortir de sa vie la compassion fut son mot d’ordre, adressant ses prières [ROOT.Char.GetFaith.PantheonTerm2] non plus qu’à son prochain."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_PATIENT:0 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], [ROOT.Char.Custom('FR_IlElle')] était d’une patience à toute épreuve, demeurant longanime même face à la plus injuste des infortunes ou la plus désastreuse des déveines."
 SUCCESSION_EVENT_WINDOW_DEAD_OUTRO_PERSONALITY_HUMBLE:1 "[ROOT.Char.Custom('polite_gender_ref')|U] [ROOT.Char.Custom('FormalComplimentAdjective')] qui [ROOT.Char.GetDeathReason], tout[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] qu’[ROOT.Char.Custom('FR_IlElle')] était, son humilité l’a toujours amené à garder les pieds sur terre. Il était simple, oui, mais non d’esprit, [ROOT.Char.Custom('FR_IlElle')] l’était de cœur, et tout[ROOT.Char.Custom('FR_E')] petit[ROOT.Char.Custom('FR_E')] qu'[ROOT.Char.Custom('FR_IlElle')] souhaitait rester, c’est cette grandeur d’âme qui lui survivra."
 SUCCESSION_EVENT_WINDOW_HEIR_UNDERAGE:1 "N’étant non plus qu’un frêle bourgeon qui s’ouvre devant l’immensité d’une vie en devenir, [Select_CString(ROOT.Char.IsFemale,'elle devra','il lui faudra')] se reposer sur [ROOT.Char.GetDiarchy.GetDiarch.Custom('FR_le_Char_Pi')][ROOT.Char.GetDiarchy.GetDiarch.GetTitledFirstNameNoTooltip] durant ses primes années au pouvoir."
 SUCCESSION_EVENT_WINDOW_HEIR_USELESS:0 "N’ayant pour seule habileté que d’avoir survécu jusqu’alors, il serait malavisé de lui augurer un grand et glorieux règne."
 SUCCESSION_EVENT_WINDOW_HEIR_MILITARY:0 "Son sens tactique et sa virtuosité martiale lui augure un avenir des plus prometteurs, à la tête du [ROOT.Char.Custom('GetRealmOrDomicile')|l] autant qu’à la tête des armées."
 SUCCESSION_EVENT_WINDOW_HEIR_LEARNING:0 "À l'aune d’un esprit aussi savant qu’avisé, son règne est promis à la science et au savoir."
 SUCCESSION_EVENT_WINDOW_HEIR_STEWARDSHIP:0 "Certains le prétendent magicie[ROOT.Char.Custom('FR_NNne')], capable de faire apparaître l’or par simple claquement de doigt, mais la vérité est plus terre à terre. [ROOT.Char.Custom('FR_IlElle')|U] sait où l’or se trouve et comment l’amener à lui, présageant un règne faste et prospère."
 SUCCESSION_EVENT_WINDOW_HEIR_INTRIGUE:0 "Arrivistes et autres ambitieux devront réfléchir à deux fois avant de laisser échapper quelques murmures infamants à l’endroit d’un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetWomanMan] qui a fait de l’intrigue son arme la plus aiguisée."
 SUCCESSION_EVENT_WINDOW_HEIR_DIPLOMACY:0 "Si certains noircissent les livres d’histoire à coup d’épée, [ROOT.Char.Custom('FR_LuiElle')] fera grand cas de privilégier la pointe de la plume et des pourparlers."
 SUCCESSION_EVENT_WINDOW_HEIR_STRONG_AND_SMART:0 "Son corps et son esprit reflètent la bénédiction qu'[ROOT.Char.Custom('FR_IlElle')] a reçue [ROOT.Char.GetFaith.PantheonTerm3], et refléteront assurément le règne puissant et avisé auquel [ROOT.Char.Custom('FR_IlElle')] semble promis[ROOT.Char.Custom('FR_E')]."
 SUCCESSION_EVENT_WINDOW_HEIR_WEAK_AND_DUMB:0 "Frêle de chair et flasque d’esprit, [ROOT.Char.Custom('FR_IlElle')] n’a ni l’étoffe d’un[ROOT.Char.Custom('FR_E')] guerri[ROOT.Char.Custom('FR_ErEre')] ni la carrure d’un[ROOT.Char.Custom('FR_E')] savant[ROOT.Char.Custom('FR_E')], et peu sont ceux qui l’imaginent capable de supporter la charge du règne à venir."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_VARANGIAN:0 "Ayant servi dans le lointain Miklagård, son esprit aventureux inspirera probablement ses [ROOT.Char.Custom('GetSubjectPlural')|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_LUNATIC:0 "Frappé[ROOT.Char.Custom('FR_E')] du plus terrible mal dont les dieux sont armés, ses nouveaux sujets redoutent déjà l’esprit désordonné qui leur servira de [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_POSSESSED_BAD:0 "Qu’ils soient réels ou imaginaires, les démons qui sévissent au plus profond de son esprit pourraient bien plonger dans la tourmente un peuple déjà fort anxieux."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_POSSESSED_GOOD:0 "Parce que [ROOT.Char.GetFaith.ReligiousSymbol] lui parle au travers de son esprit devenu [ROOT.Char.GetFaith.HouseOfWorship] [ROOT.Char.GetFaith.PantheonTerm3], son règne sera placé sous l’égide [ROOT.Char.GetFaith.ReligiousText3]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_FAIR:0 "[ROOT.Char.Custom('polite_gender_ref')|U] rayonnant de mille attraits, les [Select_CString(ROOT.Char.IsFemale,'hommes','femmes')] tomberont en pâmoison devant une beauté dont nul mot ne saurait jamais rendre justice."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ADVENTURER:0 "Son esprit aventureux fera certainement d[ROOT.Char.Custom('FR_EluiElle')] un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] qui occupera les pages de bon nombre de livres d’histoire."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_UGLY_DECEITFUL:0 "L’antagonisme qu'[ROOT.Char.Custom('FR_IlElle')] voue à la vérité se fait déjà le héraut du règne à venir."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GLUTTON_GREEDY:0 "Avide de bectance et affamé[ROOT.Char.Custom('FR_E')] d’or, nombreux sont ceux qui l’imaginent déjà s'enrichir et s’empiffrer sur le dos vouté de la roture."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CYNICAL_JUST:0 "Ne ployant le genou ni devant l’injustice, ni devant [ROOT.Char.GetFaith.PantheonTerm], la populace jubile avec intérêt tandis que [ROOT.Char.GetFaith.PriestMalePlural] et [ROOT.Char.GetFaith.PriestFemalePlural] jugent avec insistance."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CONTENT_ARBITRARY:1 "Bien content[ROOT.Char.Custom('FR_E')] d’agir selon ses propres convenances, il n’est pas dit que ses sujets resteront les bras ballants quand leurs intérêts ne seront plus en communion avec ceux de leur[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRAVEN_MILITARY_ED:0 "Vêtu[ROOT.Char.Custom('FR_E')] de l’étoffe de la couardise, c’est à l’orée de l’âtre de s[ROOT.Char.Custom('FR_ResidenceBuilding_OnA')] qu’[ROOT.Char.Custom('FR_IlElle')] escompte mener ses guerres."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_SHY_CONTENT:1 "Préférant le calme de la solitude à l’effervescence du pouvoir, d’aucuns subodorent déjà que les plus arrivistes de ses conseillers pourraient secrètement déjà tirer les ficelles dans l’ombre."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ZEALOUS_PARANOID:0 "Son zèle à l’idée de démasquer tous les ennemis et hérétiques qui conspireraient autant contre [ROOT.Char.Custom('FR_LuiElle')] que contre [ROOT.Char.GetFaith.PantheonTerm] aube un règne noirci par la défiance à hauteur de sa méfiance."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ZEALOUS_GENEROUS:0 "Dévoué[ROOT.Char.Custom('FR_E')] autant envers [ROOT.Char.GetFaith.PantheonTerm] qu’envers son prochain, [ROOT.Char.Custom('FR_IlElle')] baignera certainement autant dans la piété que son peuple baignera dans la charité."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ARROGANT_BRAVE:0 "Hardi[ROOT.Char.Custom('FR_E')] et arrogant[ROOT.Char.Custom('FR_E')], nul doute qu’[ROOT.Char.Custom('FR_IlElle')] dédiera sa vie à rechercher toujours plus de gloire, quitte à se gargariser de glorioles oiseuses."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CYNICAL_CRUEL:0 "Conchiant [ROOT.Char.GetFaith.GetNameNoTooltip] sans aucune vergogne, il fera taire la parole [ROOT.Char.GetFaith.PantheonTerm3] pour que puisse s’exprimer sa cruauté."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_HUMBLE_STUBBORN:0 "Incarnation de l’opiniâtreté [ROOT.Char.GetCulture.GetNameNoTooltip], sa nature humble aidera certainement à arrondir son caractère péremptoire."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DECEITFUL_CALLOUS:0 "L’honneur n’étant pour [ROOT.Char.Custom('FR_LuiElle')] qu’une piètre armure qui alourdit et rend pénible chaque geste, [ROOT.Char.Custom('FR_IlElle')] s’en est délaissé[ROOT.Char.Custom('FR_E')] au profit d’une lame qu’[ROOT.Char.Custom('FR_IlElle')] planterait volontiers dans le dos de ses ennemis."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PATIENT_TRUSTING:0 "Si la confiance est chose sacrée à ses yeux, sa patience témoigne de l’idée que c’est dans des lendemains plus fastes qu’[ROOT.Char.Custom('FR_IlElle')] place le plus sa confiance."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PARANOID_STRESSED:0 "Derrière chaque visage se cache une intention, chaque sourire, une interprétation, chaque ombre, une manifestation, c’est du moins ce que pense [ROOT.Char.Custom('FR_le_Char_Pi')][ROOT.Char.GetTitledFirstNameNoTooltip] et c’est cette cautèle qui semble lui dévorer l’esprit."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_STUBBORN_COMPASSIONATE:0 "Intransigeant[ROOT.Char.Custom('FR_E')] quant à l’idée que la compassion est primordiale pour tout[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip] qui se respecte, son règne sera sous le signe d’une main ferme, mais tendue vers son prochain."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_STRONG_BRAVE:0 "Ayant la force de l’aurochs et la vaillance [Select_CString(ROOT.Char.IsFemale,'de la lionne','du lion')], [ROOT.Char.Custom('FR_IlElle')] sera autant une source de crainte pour ses ennemis que d’inspiration pour ses alliés."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_TEMPERATE_LUSTFUL:0 "Concupiscent[ROOT.Char.Custom('FR_E')], mais avec tempérance, [ROOT.Char.Custom('FR_IlElle')] saura certainement garder à la fois un œil sur ses devoirs que sur ses envies."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GENEROUS_JUST:0 "[Select_CString(ROOT.Char.IsFemale,'Généreuse donatrice','Généreux donateur')], c’est avant tout la justice qu’[ROOT.Char.Custom('FR_IlElle')] escompte offrir à ses [ROOT.Char.Custom('GetSubjectPlural')]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DILIGENT_GREEDY:0 "Son amour du labeur bien mené n’est en rien un secret, non plus que chaque goutte de sueur versée le soit avant tout pour l’or gagné."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRAVEN_HONEST:0 "Nonobstant les dires qui [ROOT.Char.Custom('FR_LeLa')] qualifient volontiers de couard[ROOT.Char.Custom('FR_E')], [ROOT.Char.Custom('FR_IlElle')] a pourtant le courage de dire les dures vérités."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_SHY_TRUSTING:0 "Doublement affligé[ROOT.Char.Custom('FR_E')] de couardise sociale et de candeur maladive, de vils arrivistes conjurent probablement déjà dans l’ombre pour s’emparer du pouvoir."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GREGARIOUS_HONEST:0 "Le goût des réjouissances lui est on ne peut plus familier, et les nombreux festins qu’[ROOT.Char.Custom('FR_IlElle')] organisera se feront au son des mélodieuses vérités qu’[ROOT.Char.Custom('FR_IlElle')] décochera avec verve et fracas."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CYNICAL_ARBITRARY:0 "Moins prompt[ROOT.Char.Custom('FR_E')] à suivre les préceptes [ROOT.Char.GetFaith.PantheonTerm3] que les siens propres, [ROOT.Char.Custom('FR_IlElle')] poussera certainement le blasphème jusqu’à peiner les [ROOT.Char.GetFaith.PriestMalePlural]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRUEL_WRATHFUL:0 "Animé[ROOT.Char.Custom('FR_E')] d’une cruauté forcenée, on [ROOT.Char.Custom('FR_LeLa')] compare plus volontiers à une bête sauvage qu’à un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_WRATHFUL_ZEALOUS:0 "[ROOT.Char.GetWomanMan|U] de caractère, [ROOT.Char.Custom('FR_IlElle')] tient en sainte horreur ceux qui insultent [ROOT.Char.GetFaith.ReligiousSymbol] et ne manque jamais de répliquer par une fureur digne [ROOT.Char.GetFaith.NegativeAfterLife3]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PARANOID_DECEITFUL:0 "Sa méfiance est-elle nourrie par sa nature fourbe, ou bien est-[ROOT.Char.Custom('FR_IlElle')] fourbe parce que méfiant[ROOT.Char.Custom('FR_E')] de nature ? Il serait prétentieux d’affirmer comprendre le dédale de tortueuses sinuosités qui se cache dans sa tête."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_COMPASSIONATE:0 "Pour [ROOT.Char.Custom('FR_LuiElle')], la bonté est ce qui fait [Select_CString(ROOT.Char.IsFemale,'une bonne','un bon')] [ROOT.Char.GetTitleAsNameNoTooltip|l], mais reste à savoir si cette compassion ne l’empêchera pas de faire les bons choix."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ARROGANT:0 "Rarement un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] n’aura été aussi imbu[ROOT.Char.Custom('FR_E')] de sa personne, mais peut-être que cette fierté sera bien placée pour ainsi faire briller davantage le nom des [ROOT.Char.GetHouse.GetNameNoTooltip]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CYNICAL:0 "Bien qu’[ROOT.Char.Custom('FR_IlElle')] ne remette pas en question l’existence des dieux, [ROOT.Char.Custom('FR_IlElle')] n'a guère une haute opinion d'eux, et de fait, n’a nulle intention d’appesantir son règne avec les enseignements oiseux [ROOT.Char.GetFaith.ReligiousText3]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GREGARIOUS:0 "Ayant l’éloquence pour mot d'ordre, certains fustigeront les mots qui s’échapperont mielleusement de sa bouche, tandis que d’autres seront déjà ralliés à sa cause par ces mêmes mots."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ZEALOUS:1 "En perpétuelle quête de la bénédiction [ROOT.Char.GetFaith.HighGodNamePossessive], ses décisions se feront à l’aune des enseignements [ROOT.Char.GetFaith.ReligiousText3] plus que toutes autres considérations."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_AMBITIOUS:0 "Son ambition sera certainement le fer de lance de ses choix, mais le [ROOT.Char.Custom('GetRealmOrDomicile')|l] s’en trouvera-t-il grandi, ou affaibli, rien n’est moins sûr."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DILIGENT:0 "Ayant fait du labeur son sacerdoce plus sacré encore que [ROOT.Char.GetFaith.GetNameNoTooltip], son règne fera couler la sueur, si ce n’est le sang."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DECEITFUL:0 "Parce qu’[ROOT.Char.Custom('FR_IlElle')] sait comment se joue la partie, [ROOT.Char.Custom('FR_IlElle')] préférera enculer ses adversaires plutôt que de les combattre."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_SHY:0 "Qualifié[ROOT.Char.Custom('FR_E')] de couard[ROOT.Char.Custom('FR_E')] par certains, ce n’est pas tant la crainte du champ de bataille qui l’habite, que celle de son prochain."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_HUMBLE:0 "Tout[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] qu’[ROOT.Char.Custom('FR_IlElle')] soit, [ROOT.Char.Custom('FR_IlElle')] demeure avant tout [Select_CString(ROOT.Char.IsFemale,'une femme','un homme')] simple qui accepte l’idée de n’être que [Select_CString(ROOT.Char.IsFemale,'la sujette','le sujet')] [ROOT.Char.GetFaith.HighGodNamePossessive]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ARBITRARY:0 "N’accordant voix au chapitre qu’à ses propres réflexions, ses [ROOT.Char.Custom('GetSubjectPlural')|l] les plus intransigeants pourraient bien mal le prendre de voir toute forme de justice ou d’équité être réduite au silence."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_TEMPERATE:0 "La pondération n’est point l’inaction, clame-t-[ROOT.Char.Custom('FR_IlElle')], au grand dam de ses [ROOT.Char.Custom('GetSubjectPlural')|l] les plus agités."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CHASTE:0 "Accommodé[ROOT.Char.Custom('FR_E')] d’étoffes de pudeur, [ROOT.Char.Custom('FR_IlElle')] dédaigne les choses de la chair pour ainsi pleinement embrasser des intérêts plus pressants."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_LUSTFUL:0 "Enflammé[ROOT.Char.Custom('FR_E')] d’une passion dévorante, certains craignent qu’[ROOT.Char.Custom('FR_IlElle')] ne transforme [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] en maison de luxure."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CONTENT:0 "N’ayant pour seule ambition que de mener une vie satisfaisante, nombreux sont ceux à craindre que le [ROOT.Char.Custom('GetRealmOrDomicile')|l] ne tombe dans une apathie mortifère."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PATIENT:0 "Si tout vient à point à qui sait attendre, nul doute que le [ROOT.Char.Custom('GetRealmOrDomicile')|l] baignera un jour dans la prospérité avec [Select_CString(ROOT.Char.IsFemale,'une telle','un tel')] [ROOT.Char.GetTitleAsNameNoTooltip], et ce même s’il faudra patienter jusqu'à ce qu’aube la Longue Nuit."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_BRAVE:0 "Hardi[ROOT.Char.Custom('FR_E')], vaillant[ROOT.Char.Custom('FR_E')], courageu[ROOT.Char.Custom('FR_XSe')], il est beaucoup de qualificatifs qui pourraient lui être concédés, mais le plus évident est téméraire. Son règne sera glorieux, ou sera fugace."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_JUST:0 "Mu[ROOT.Char.Custom('FR_E')] par un sens inné de la justice, l’iniquité ne sera point tolérée."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GLUTTONOUS:0 "Les rumeurs vont déjà grand train, affirmant qu'[ROOT.Char.Custom('FR_IlElle')] a plus d’entrain à remplir sa panse que ses devoirs et préférant siéger à un banquet plutôt qu’à un Conseil."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CALLOUS:0 "Puisque les dieux ont créé les moutons afin que s’en repaissent les loups, [ROOT.Char.Custom('FR_le_Char_Pi')][ROOT.Char.GetTitledFirstNameNoTooltip] a choisi d’être un loup."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRAVEN:0 "Souvent moqué[ROOT.Char.Custom('FR_E')] pour n’être rien d'autre qu’un[ROOT.Char.Custom('FR_E')] veule, il est vrai que les vents de la velléité vont et viennent au travers de ses vaines pensées."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GREEDY:0 "[ROOT.Char.Custom('FR_SilSielle')|U] connaissait le moyen de chier de l’or, nul doute qu'[ROOT.Char.Custom('FR_IlElle')] congédierait ses domestiques pour récurer [ROOT.Char.Custom('FR_LuiElle')]-même ses latrines."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRUEL:0 "Il y aurait beaucoup à dire sur [ROOT.Char.Custom('FR_LuiElle')], mais puisque ceux qui médisent sa personne en paient souvent le prix de la pire des façons, il serait plus judicieux de lui souhaiter bon règne et de prier."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_TRUSTING:0 "Inapte à distinguer la véracité de la fausseté, il se pourrait que certains saisissent l’occasion pour tirer les ficelles dans l'ombre."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_HONEST:0 "Parce qu’[ROOT.Char.Custom('FR_IlElle')] a conscience que les mots, comme les flèches, sitôt décochés, ne peuvent être rattrapés, [ROOT.Char.Custom('FR_IlElle')] préfère que ses traits soient justes."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_LAZY:0 "Musardant jusqu’à l’excès, [ROOT.Char.Custom('FR_IlElle')] ne dédaignera sûrement pas lire les quelques brefs passages qui lui seront consacrés dans les livres d’histoire, tant son règne est promis à l’insignifiance."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_GENEROUS:0 "Sa prodigalité présage un règne tout sauf prospère, à l’ombre des profiteurs qui s’empresseront d’étancher leur soif pécuniaire en lui présentant de plaisantes proférations."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_WRATHFUL:0 "Habité[ROOT.Char.Custom('FR_E')] d’une ire comme nulle autre, ses accès de fureur sont tels qu’ils traversent aisément le Détroit pour être entendus depuis l’autre rive."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_PARANOID:0 "La cautèle faite conseillère, [ROOT.Char.Custom('FR_IlElle')] se gardera toujours du moindre danger venant de ses ennemis, même les plus imaginaires, au risque de se mettre ses alliés bien réels à dos."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_STUBBORN:0 "Ses [ROOT.Char.Custom('GetSubjectPlural')|l] se heurteront à son intransigeance, comme l’eau se brise sur les récifs."
 SUCCESSION_EVENT_WINDOW_HEIR_PIETY:0 "[ROOT.Char.GetFaith.PriestMalePlural|U] et [ROOT.Char.GetFaith.PriestFemalePlural] se réjouissent de savoir [Select_CString(ROOT.Char.IsFemale,'une femme si dévouée','un homme si dévoué')], mais plus encore dévot[ROOT.Char.Custom('FR_E')], en charge du [ROOT.Char.Custom('GetRealmOrDomicile')|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_PRESTIGE:0 "Son nom rayonne déjà par monts et par vaux, depuis le gigantesque Mur de Westeros jusqu’aux Cinq Forts de l’Outre-Orient, assurant ainsi la pérennité du nom des [ROOT.Char.GetHouse.GetNameNoTooltip]."
 SUCCESSION_EVENT_WINDOW_HEIR_FRIENDS:0 "Affirmant avec panache qu’un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetWomanMan] sans amis est un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetWomanMan] sans pouvoir, la pléthore de gens dont [ROOT.Char.Custom('FR_IlElle')] a su s’entourer lui garantissent un soutien que tout[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] se doit d’avoir."
 SUCCESSION_EVENT_WINDOW_HEIR_TYRANT:0 "On connaît déjà de [Select_CString(ROOT.Char.IsFemale,'cette dernière','ce dernier')] une réputation des plus tyranniques, et nul doute que les années qui vont suivre ne seront pas moins placées sous le signe de la terreur."
 SUCCESSION_EVENT_WINDOW_HEIR_RICH:0 "Au regard de la fortune colossale qu’[ROOT.Char.Custom('FR_IlElle')] a amassé si aisément, certains se demandent [ROOT.Char.Custom('FR_SilSielle')] ne serait pas capable de chier de l’or."
 SUCCESSION_EVENT_WINDOW_HEIR_CHILDREN:0 "À sa façon, [ROOT.Char.Custom('FR_IlElle')] a honoré [ROOT.Char.GetFaith.FertilityGodName] en engendrant myriade de marmailles, assurant par là même la pérennité de sa lignée pour les siècles à venir."
 SUCCESSION_EVENT_WINDOW_HEIR_RIVALS:0 "Est-ce à [Select_CString(ROOT.Char.IsFemale,'sa nature','son caractère')] [ROOT.Char.Custom('InsultAdjective')] qu’[ROOT.Char.Custom('FR_IlElle')] doit d’être déjà ceint[ROOT.Char.Custom('FR_E')] d’ennemis sitôt le [ROOT.Char.Custom('GetRealmOrDomicile')|l] entre ses mains ?"
 SUCCESSION_EVENT_WINDOW_HEIR_COMBAT_SKILLS:0 "Si rien n’est moins sûr quant à ses futurs triomphes dans la gouvernance, tous s’accordent à lui augurer le triomphe sur le champ de lice non moins que de bataille."
 SUCCESSION_EVENT_WINDOW_HEIR_POOR_HEALTH:0 "Son nouveau règne sitôt entamé est déjà diapré de la pâleur maladive autant que de la noirceur de l’infortune, car le [ROOT.Char.Custom('GetRealmOrDomicile')|l] souffre déjà d’un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip|l] au plus mal."
 SUCCESSION_EVENT_WINDOW_HEIR_BASTARD:0 "Frappé[ROOT.Char.Custom('FR_E')] du sceau de la bassesse, de celle que l’on nomme bâtardise lorsque la douceur quitte les mots, [ROOT.Char.Custom('FR_IlElle')] lui faudra noircir les livres d'histoire de ses exploits [ROOT.Char.Custom('FR_SilSielle')] ambitionne de faire oublier la tâche qui macule son nom."
 SUCCESSION_EVENT_WINDOW_HEIR_VIKING:0 "Au regard de sa réputation, certains disent qu’[ROOT.Char.Custom('FR_IlElle')] ne sait que voler les honnêtes gens, mais rien n’est moins vrai. [ROOT.Char.Custom('FR_IlElle')|U] sait également tuer les honnêtes gens."
 SUCCESSION_EVENT_WINDOW_HEIR_CRUSADER:0 "Ayant mené des guerriers sacrés contre les infidèles, [ROOT.Char.Custom('FR_IlElle')] est certainement béni[ROOT.Char.Custom('FR_E')] par [ROOT.Char.GetFaith.HighGodName]."
 SUCCESSION_EVENT_WINDOW_HEIR_THREE_SKILLS:0 "Fort[ROOT.Char.Custom('FR_E')] de multiples aptitudes, [ROOT.Char.Custom('FR_IlElle')] n’en sera que plus capable lorsque viendra le moment où son règne se verra éprouvé."
 SUCCESSION_EVENT_WINDOW_HEIR_FIVE_SKILLS:0 "Plus lettré[ROOT.Char.Custom('FR_E')] que les sages, plus retors que les comploteurs, nul domaine ne lui fait défaut. [ROOT.Char.Custom('FR_IlElle')|U] brillera en temps de guerre à la tête des armées, comme en temps de paix à la tête de son Conseil. Si son règne est à la hauteur de ses aptitudes, même la bibliothèque de la Citadelle aura grande peine à contenir tous ses hauts faits."
 SUCCESSION_EVENT_WINDOW_HEIR_DREAD:0 "Pour le moins redoutable et surtout redouté[ROOT.Char.Custom('FR_E')], son ombre grandissante suffit à projeter même aux plus preux, même aux plus braves, la terreur la plus viscérale qui soit."
 SUCCESSION_EVENT_WINDOW_HEIR_GENDER:0 "Déjà les rumeurs vont grand train, car beaucoup voient d’un mauvais œil l’idée qu’un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetWomanMan] accède au trône, et c’est au son des railleries que l’incertitude et la désapprobation dansent de plus belle."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_REVELER:0 "[Select_CString(ROOT.Char.IsFemale,'Bonne vivante','Bon vivant')], [ROOT.Char.Custom('FR_IlElle')] sait comment remplir sa bedaine au moins autant que sa salle des festins."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_ADMINISTRATOR:0 "L’administration n'ayant plus aucun secret pour [ROOT.Char.Custom('FR_LuiElle')], [ROOT.Char.Custom('FR_IlElle')] n’aura aucun mal à régir son [ROOT.Char.Custom('GetRealmOrDomicile')|l]. Du moins, tant que la réponse aux futurs troubles se trouvera dans des registres."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_SCHOLAR:1 "Si le lecteur vit mille vies avant de mourir, alors nul doute que [ROOT.Char.Custom('FR_le_Char_Pi')][ROOT.Char.GetTitledFirstNameNoTooltip] est déjà fin prêt[ROOT.Char.Custom('FR_E')] pour régner, mais reste à savoir quel genre de vie a-t-[ROOT.Char.Custom('FR_IlElle')] mené durant toutes ces années."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CALLOUS_LONER:0 "Ne cherchant pas le réconfort dans la douce chaleur d'autrui, [ROOT.Char.Custom('FR_IlElle')] préfère se complaire dans une implacabilité glaciale."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_VENGEFUL:0 "La joie de ses ennemis s’éteindra dans un goût de cendre, et pour chaque camouflet qu’[ROOT.Char.Custom('FR_IlElle')] souffrira, sa vindicte n’en sera que plus ardente."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_DEPRESSED:0 "Les affres du pouvoir ont semble-t-il eu raison d[ROOT.Char.Custom('FR_EluiElle')], augurant un règne aussi maussade que le sont ses pensées."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_BLIND_WEAK:0 "Dépossédé[ROOT.Char.Custom('FR_E')] de la vue, et privé[ROOT.Char.Custom('FR_E')] de toute vigueur depuis son plus jeune âge, certains de ses [ROOT.Char.Custom('GetSubjectPlural')] ont d’ores et déjà choisis de s’en remettre [ROOT.Char.GetFaith.ReligiousSymbol2]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_EXCOMMUNICATED:0 "Excommunié[ROOT.Char.Custom('FR_E')] par [ROOT.Char.GetFaith.GetNameNoTooltip], les plus fervents des [ROOT.Char.GetFaith.GetAdherentNamePlural] redoutent qu’[Select_CString(ROOT.Char.IsFemale,'une telle femme','un tel homme')] soit à la tête du [ROOT.Char.Custom('GetRealmOrDomicile')|l]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_BERSERKER:0 "La violence pour [Select_CString(ROOT.Char.IsFemale,'confidente','épouse')], son règne pourrait être à l’image du sort qu’[ROOT.Char.Custom('FR_IlElle')] réserve à ses adversaires."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CANNIBAL:0 "Si certains sont de bons vivants savourant les plaisirs de la vie, [ROOT.Char.Custom('FR_LuiElle')] vit pour prendre plaisir à savourer ceux qui sont bien vivants."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_CRIMINAL:0 "De sordides histoires sont entendues à travers le [ROOT.Char.Custom('GetRealmOrDomicile')|l], et par un étrange concours de circonstances, elles ont toutes pour protagoniste [ROOT.Char.Custom('FR_le_Char_Pi')][ROOT.Char.GetTitledFirstNameNoTooltip]."
 SUCCESSION_EVENT_WINDOW_HEIR_TRAIT_WITCH:0 "Si la magie est bien une épée sans poignée comme d'aucuns l’affirment, quel avenir attends un [ROOT.Char.Custom('GetRealmOrDomicile')|l] avec un[ROOT.Char.Custom('FR_E')] [ROOT.Char.GetTitleAsNameNoTooltip] qui serait un danger pour sa propre personne ?"
 SUCCESSION_EVENT_WINDOW_HEIR_UNIMPRESSIVE:0 "Chaque jour qui passe [ROOT.Char.Custom('FR_LeLa')] rapproche de la tombe, et si son glas n’est point encore venu, son heure de gloire non plus semble-t-il, car de prouesse [ROOT.Char.Custom('FR_IlElle')] n’en a nulle."
 SUCCESSION_EVENT_WINDOW_GAME_OVER_INTRO:0 "Votre lignée a pris fin"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_INTRO_UNLANDED:1 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] a perdu tous ses titres est devenu[ROOT.Char.Custom('FR_E')] sans terre"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_INTRO_BARON:0 "[ROOT.Char.Custom('FR_le_Char_P')|U][ROOT.Char.GetFullNameNoTooltip] a perdu tous ses titres hormis ses baronies"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_CENTURIES:0 "Pendant des siècles, vous avez été de la dynastie [ROOT.Char.GetDynasty.GetName]."
 SUCCESSION_EVENT_WINDOW_GAME_OVER_CENTURY:0 "Pendant plus d’un siècle, vous avez été de la dynastie [ROOT.Char.GetDynasty.GetName]."
 SUCCESSION_EVENT_WINDOW_GAME_OVER_DECADES:0 "Pendant des décennies, vous avez été de la dynastie [ROOT.Char.GetDynasty.GetName]."
 SUCCESSION_EVENT_WINDOW_GAME_OVER_DECADE:0 "Pendant plus d’une décennie, vous avez été de la dynastie [ROOT.Char.GetDynasty.GetName]."
 SUCCESSION_EVENT_WINDOW_GAME_OVER_YEARS:0 "Pendant des années, vous avez été de la dynastie [ROOT.Char.GetDynasty.GetName]."
 SUCCESSION_EVENT_WINDOW_GAME_OVER_YEAR:0 "Pendant plus d’un an, vous avez été de la dynastie [ROOT.Char.GetDynasty.GetName]."
 SUCCESSION_EVENT_WINDOW_GAME_OVER_YEAR_SINGLE:0 "Pendant moins d’un an, vous avez été de la dynastie [ROOT.Char.GetDynasty.GetName]."
 SUCCESSION_EVENT_WINDOW_GAME_OVER_MAX_SPLENDOR:0 "Elle est devenue légendaire et respectée par tous"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_HIGH_SPLENDOR:0 "Elle a acquis une grande renommée"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_MEDIUM_SPLENDOR:0 "Elle est devenue notable"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_LOW_SPLENDOR:0 "Elle est restée insignifiante et ne laissera aucune trace durable dans l’Histoire"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_LOW_SPLENDOR_SHORT:0 "Elle est restée insignifiante et ne laissera aucune trace durable dans l’Histoire"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_MIN_SPLENDOR:1 "Elle est restée méconnue et sera rapidement oubliée"
 SUCCESSION_EVENT_WINDOW_DEAD_DESC:0 "[CHARACTER.Custom('DeathMessageIntro')]\n\n[CHARACTER.Custom('DeathMessageOutro')]"
 SUCCESSION_EVENT_WINDOW_HEIR_DESC:0 "\n[CHARACTER.Custom('FR_le_Char_Pi')|U][CHARACTER.GetTitledFirstNameNicknamedNoTooltip] [CHARACTER.Custom('GetSuccessionHeirMotion')].\n\n[CHARACTER.Custom('HeirMessageInterface')]"
 SUCCESSION_EVENT_WINDOW_GAME_OVER_DESC:4 "[CHARACTER.Custom('GameOverMessageInterface')]. [CHARACTER.Custom('GameOverMessageInterfaceDuration')] [CHARACTER.Custom('GameOverMessageInterfaceSplendor')].[CHARACTER.Custom('GameOverMessageNotableAchievements')]"
 SUCCESSION_EVENT_WINDOW_END_DATE_DESC:2 "La date de fin de la partie a été atteinte.\n\n[SuccessionEventWindow.GetDeadCharacter.Custom('GameOverMessageInterfaceDuration')] [SuccessionEventWindow.GetDeadCharacter.Custom('GameOverMessageInterfaceSplendor')].[SuccessionEventWindow.GetDeadCharacter.Custom('GameOverMessageNotableAchievements')]"
 SUCCESSION_EVENT_WINDOW_END_DATE_UNIFICATION_SPANISH_DESC:0 " C’est grâce à votre règne que les trônes espagnols ont été réunis"
 SUCCESSION_EVENT_WINDOW_END_DATE_UNIFICATION_SLAVS_DESC:0 " Les Slaves sont devenus une puissance inarrêtable depuis que vous avez fondez l’Empire de $e_slavia$."
 SUCCESSION_EVENT_WINDOW_END_DATE_UNIFICATION_SOUTHERN_SLAVS_DESC:0 " C’est sous votre autorité que les Slaves du Sud ont retrouvé leur identité."
 SUCCESSION_EVENT_WINDOW_END_DATE_UNIFICATION_WESTERN_SLAVS_DESC:0 " C’est grâce à vous que les Slaves occidentaux sont à nouveau unis après avoir été pendant des siècles des tribus dispersées."
 SUCCESSION_EVENT_WINDOW_END_DATE_UNIFICATION_BURGUNDY_DESC:0 " Les Bourguignons ont surmonté leurs querelles et se sont unis sous votre autorité."
 SUCCESSION_EVENT_WINDOW_END_DATE_UNIFICATION_ITALY_DESC:0 " C’est sous votre règne que l’Empire d’$e_italy$ a été formé."
 SUCCESSION_EVENT_WINDOW_END_DATE_UNIFICATION_AFRICA_DESC:0 " C’est grâce à votre travail acharné, à votre diligence et à votre règne avisé que le continent africain s’est uni sous un seul gouvernement."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_PORTUGAL_DESC:0 " Avez-vous vraiment péri, alors que le Royaume du $k_portugal$ que vous avez fondé ne sera jamais oublié ?"
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_CANARIAS_DESC:0 " Tout le monde dans les îles sait que vous avez fondé le Royaume des $k_canarias$."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_BOSNIA_DESC:0 " Personne n’ignore votre nom depuis que le Royaume de $k_bosnia$ a été créé."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_ARMENIA_DESC:0 " Votre nom sera éternellement lié à la création de l’Empire d’$e_armenia$."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_RUM_DESC:0 " Vous avez créé le Royaume de $k_rum$, il sera donc toujours d’une certaine manière le vôtre."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_VIET_DESC: " Votre peuple se souviendra toujours de vous comme de l’âme exemplaire qui a fait de l’empire du $e_viet$ une réalité."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_MAJAPAHIT_DESC: " Votre nom restera gravé à jamais au sommet du mont Semeru comme celui qui a fondé l’empire $e_majapahit$."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_RYUKYU_DESC: " On se souviendra de vous pour avoir uni les clans des îles et comme fondateur d’un empire $e_ruucuu_adj$"
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_SIAM_DESC: " Vous avez gravé votre nom à jamais dans l’histoire de l’humanité, en tant que fondateur du Royaume de $k_siam$"
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_BRUNEI_KINGDOM_DESC: " Vous avez inspiré votre peuple et l’avez uni sous le ciel d’Allah en fondant le Royaume de $k_brunei$"
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_BRUNEI_EMPIRE_DESC: " Les croyants de Bornéo se souviendront de vous comme de leur berger qui les protégeait du mal en fondant l’Empire de $e_brunei$"
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_ISRAEL_DESC:0 " C’est grâce à votre travail acharné et à votre diligence que le Royaume d’$k_israel$ a été créé."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_OUTREMER_DESC:0 " Personne ne pensait que c’était possible, mais vous avez dominé la région sainte la plus disputée du monde en tant qu’Empire d’$e_outremer$."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_SWITZERLAND_DESC:0 " On peut escalader les Alpes et ne pas voir tout ce qui vous appartient après que vous ayez fondé le Royaume de $k_switzerland$."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_AUSTRIA_DESC:0 " Suite à votre règne, l’archiduché est l’une des puissances les plus respectées d’Europe."
 SUCCESSION_EVENT_WINDOW_END_DATE_CREATED_ARAGON_DESC:0 " Le Royaume d’$k_aragon$ est né le long des rives sinueuses du fleuve Aragón, témoignant à jamais de votre règne glorieux."
 SUCCESSION_EVENT_WINDOW_END_DATE_RESTORED_ROMAN_EMPIRE_DESC:0 " Grâce à vous, le monde sait que même si des millénaires passent et que Rome est en cendres, l’$h_roman_empire$ reviendra toujours."
 SUCCESSION_EVENT_WINDOW_END_DATE_RESTORED_DUMNONIA_DESC:0 " Grâce à vous, hommes et femmes se sont levés pour reformer le Royaume des $k_cornwall$."
 SUCCESSION_EVENT_WINDOW_END_DATE_RESTORED_CAROLINGIAN_DESC:0 " Ce qui n’était qu’un rêve pour Charlemagne était réel pour vous, qui avez restaurer l’Empire de $e_france$."
