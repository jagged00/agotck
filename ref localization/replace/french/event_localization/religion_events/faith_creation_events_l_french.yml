l_french:
 faith_creation.1001.t.schism:0 "[reformed_faith.GetNameNoTooltip]"
 faith_creation.1001.t.reformation:0 "[reformed_faith.GetNameNoTooltip]"
 faith_creation.1001.desc.schism:0 "Un nouveau schisme de la religion [reformed_faith.GetReligion.GetAdjective] a eu lieu lorsque [reformer.Custom('FR_le_Char_Pi')][reformer.GetTitledFirstName] et ceux qui [reformer.Custom('FR_LeLa')] suivent se sont séparés de la communauté [old_faith.GetAdjective] pour former un nouveau mouvement religieux."
 faith_creation.1001.desc.reformation:0 "[reformer.Custom('FR_le_Char_Pi')|U][reformer.GetTitledFirstName], une personnalité éminente des [reformed_faith.GetAdherentNamePlural], a réuni les [reformer.Custom('DefaultPriestTitlePlural')] importants du pays pour discuter de leurs croyances et établir une doctrine officielle de la foi païenne."
 faith_creation.1001.desc.schism.personal:0 "J'ai trop longtemps regardé — et laissé — les [old_faith.PriestNeuterPlural] se fourvoyer, et par là même, dévoyer les enseignements [old_faith.HighGodNameAlternatePossessive]. Mais arcbouté[ROOT.Char.Custom('FR_E')] par une ferveur comme nulle autre, j'ai fédéré maints sages pour qu'ensemble nous puissions débattre et bâtir une foi nouvelle, laquelle puisera sa piété dans [reformer.GetFaith.ReligiousText], et non dans des interprétations galvaudées et délétères."
 faith_creation.1001.desc.reformation.personal:0 "J’ai finalement réussi à réunir tous les [reformer.Custom('DefaultPriestTitlePlural')] importants afin qu’ils puissent discuter de nos croyances et établir une doctrine officielle pour guider notre foi."
 faith_creation.1001.desc.outlook.ghw:0 "\n\nL'on me rapporte que les [reformed_faith.GetAdherentNamePluralNoTooltip] les plus exaltés adressent d'ores et déjà des prières envers [reformed_faith.WarGodName] en vue de répandre [Select_CString(reformer.IsLocalPlayer,'la sainte parole','leur foi')] par les armes."
 faith_creation.1001.desc.outlook.pacifism:0 "\n\nC'est par la voix et non les armes [Select_CString(reformer.IsLocalPlayer,'que nous répandrons les saintes vérités','qu’ils escomptent répandre leur foi')], [Select_CString(reformer.IsLocalPlayer,'car ce que nous apprenons à travers','car le dogme qu’enseigne')] [reformed_faith.GetReligion.GetNameNoTooltip] [Select_CString(reformer.IsLocalPlayer,'c’est que la guerre est un chancre qui meurtri autant celui qui la subit que celui qui la mène','semble profondément pacifiste')]."
 faith_creation.1001.desc.outlook.dogmatic:0 "\n\nLes [reformed_faith.PriestNeuterPlural] parlent déjà d'une unique et véritable foi, avec pour dogme les préceptes [reformed_faith.HighGodNamePossessive], pour voie les enseignements [reformed_faith.KnowledgeGodNamePossessive], et pour force la ferveur [reformed_faith.WarGodNamePossessive]."
 faith_creation.1001.desc.outlook.accepting:0 "\n\n[Select_CString(reformer.IsLocalPlayer,'Nous ne devons pas pour autant renier ce que les autres fois ont a offrir','Cette nouvelle foi affirme ne point vilipender les autres fois, bien au contraire')]. Les [reformed_faith.GetAdherentNamePluralNoTooltip] [Select_CString(reformer.IsLocalPlayer,'sauront faire montre de tolérance et prôneront le syncrétisme','appellent à la tolérance et prêche le syncrétisme')] comme mot d'ordre, pour faire [reformed_faith.GetFaith.ReligiousSymbol3] un symbole d'entente et d'harmonie."
 faith_creation.1001.desc.outlook.fallback:0 "\n\nNée d'une fracture théologique de la religion [reformed_faith.GetReligion.GetAdjectiveNoTooltip], la prêtrise [reformed_faith.GetAdjectiveNoTooltip] prêche une vision renouvelée [reformed_faith.PantheonTerm3] et [reformed_faith.ReligiousSymbol3]."
 faith_creation.1001.desc.belief.sacrifice:0 "\n\n« La bénédiction [reformed_faith.HighGodNamePossessive] s'acquiert et s'honore dans et par le sang ! » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.belief.indulgent:0 "\n\n« N'ayez nulle honte à profiter des plaisirs, terrestres comme charnels, car l'exaltation de l'âme passe par l'exaltation des sens. Honorer la chair c'est honorer [reformed_faith.FertilityGodName] ! » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.belief.incest:0 "\n\n« Les liens du sang sont sacrés, autant que ceux du mariage. Nous apprenons [reformed_faith.FertilityGodName] que l'amour connaît de multiples formes, et à cet égard, l'union entre membres d'une même famille doit être célébrée, et non conspuée ! » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.belief.aniconism:0 "\n\n« Les idoles ne sont que vacuités éphémères, car nulle effigie ne saurait reproduire la grandeur du divin, la grandeur [reformed_faith.HighGodNamePossessive] ! » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.belief.ascetic:0 "\n\n« Il n'est de bonheur que dans la pratique du corps et de l'esprit. Nous apprenons par [reformed_faith.WealthGodName] que le labeur octroie de plus grands bienfaits que toutes possessions matérielles, lesquelles doivent être abandonnées au profit d'une vie saine et simple. » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.belief.spirits:0 "\n\n« Les esprits sont les envoyés [reformed_faith.PantheonTerm3], présents parmi nous pour nous guider et nous garder [reformed_faith.NegativeAfterLife3] ! » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.belief.superstition:0 "\n\n« Oyez les superstitions d'antan et les récits mythiques, car si nous ne devons pas nous dévoyer [reformer.GetFaith.ReligiousText3], nous ne devons pas oublier que rien n'est immuable ! » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.belief.nature:0 "\n\n« Si le monde est l'œuvre [reformed_faith.PantheonTerm3], alors il nous faut le respecter, l'honorer et le protéger. La nature doit être traitée avec autant de déférence que nous traitons avec déférence [reformed_faith.ReligiousSymbol] ! » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.belief.community:0 "\n\n« La foi et la culture sont les deux piliers d'un peuple florissant, c'est pourquoi nous devons lier l'une et l'autre, pour renforcer notre ferveur et nous garder des étrangers ! » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.belief.fallback:0 "\n\n« Que cesse les vieilles estrivances et les querelles intestines ! Que cesse la désunion et la discorde ! Avec [reformed_faith.HighGodName] à nos côtés, nous resplendiront dans la nouvelle foi ! » entend-on déjà retentir dans les [reformed_faith.HouseOfWorshipPlural]."
 faith_creation.1001.desc.temporal:0 "\n\n[reformer.GetFirstNameNoTooltip] a choisi de diriger personnellement ce mouvement [reformed_faith.GetAdjectiveNoTooltip] en plein essor et s’est attribué le titre de [reformed_faith.ReligiousHeadName], un poste élevé qu’[reformer.Custom('FR_IlElle')] est censé[reformer.Custom('FR_E')] transmettre à ses descendants."
 faith_creation.1001.desc.temporal.personal:0 "\n\nJe mènerais moi-même [reformed_faith.GetAdherentNamePluralNoTooltip] et [reformer.Custom('DefaultPriestTitlePlural')] vers un âge d'or. Je serai l'épée et le bouclier de la foi [reformed_faith.GetAdjectiveNoTooltip] jusqu'au jour de ma mort, viendra alors à mes descendants le devoir sacré de perpétuer ma sainte mission pour les siècles à venir !"
 faith_creation.1001.desc.spiritual:0 "\n\nLes [reformed_faith.GetAdherentNamePluralNoTooltip] auront [reformed_faith.ReligiousHeadName] pour les guider, en la personne de [reformed_hof.GetFirstName]. Sur ses épaules reposera la lourde mission d'œuvrer pour l'ensemble de la prêtrise [reformed_faith.GetAdjectiveNoTooltip]."
 faith_creation.1001.desc.spiritual.sameold:0 "\n\nLes [reformed_faith.GetAdherentNamePluralNoTooltip] auront [reformed_faith.ReligiousHeadName] pour les guider, en la personne de [reformed_hof.GetFirstNameNicknamed]. Sur ses épaules reposera la lourde mission d'œuvrer pour l'ensemble de la prêtrise [reformed_faith.GetAdjectiveNoTooltip]."
 faith_creation.1001.desc.no_head:0 "\n\nLes [reformed_faith.GetAdherentNamePluralNoTooltip] n'auront nul chef pour les guider, car la foi [reformed_faith.GetAdjectiveNoTooltip] sera dépouillée de tout intermédiaire entre [Select_CString(reformer.IsLocalPlayer,'nous','eux')] et [reformed_faith.PantheonTerm]."
 faith_creation.1001.desc.no_holy_sites:0 "\n\n[reformed_faith.GetAdherentNamePluralNoTooltip] et [reformer.Custom('DefaultPriestTitlePlural')] attendent d'être guidés par [reformed_faith.ReligiousHeadName], dont la venue est déjà prophétisée. Vienne ce jour, vienne cette aube nouvelle, et alors le monde connaîtra la véritable ferveur de la foi [reformed_faith.GetAdjectiveNoTooltip] !"
 faith_creation.1001.o.frightened:0 "Puisse [ROOT.Char.GetFaith.HighGodName] nous protéger !"
 faith_creation.1001.o.heretical:0 "Hérésie que tout cela ! Le courroux [ROOT.Char.GetFaith.PantheonTerm3] sera terrible !"
 faith_creation.1001.o.crusader:0 "Une [ROOT.Char.GetFaith.GHWName] ou deux vont remettre ces [second.Custom('GetUnbelieverNamePlural')] à leur place !"
 faith_creation.1001.o.interested:0 "Ne nous précipitons pas en conclusion hâtive. Nous verrons ce qu'il adviendra."
 faith_creation.1001.o.uninterested:0 "Peu me chaut les fadaises qui occupent leurs pensées."
 faith_creation.1001.o.getreaction:0 "[ROOT.Char.Custom2('GetFaithCreationReaction', reformer)]"
 faith_creation.1001.o.personal:0 "Puisse [ROOT.Char.GetFaith.ReligiousSymbol] nous guider !"
 faith_creation.1010.t:0 "[HoF.GetFirstNameNoTooltip] devient [faith.ReligiousHeadName]"
 faith_creation.1010.desc.start:0 "Bien que la justesse de notre foi n’ait jamais été mise en doute, la période de temps que nous avons dû endurer sans chef spirituel a été éprouvante. Mais cette épreuve est enfin terminée, car"
 faith_creation.1010.desc.temporal.personal:0 "j’ai enfin convaincu les [faith.AltPriestTermPlural] de m’accepter comme [faith.ReligiousHeadName]."
 faith_creation.1010.desc.temporal:0 "[HoF.Custom('FR_le_Char_Pi')][HoF.GetTitledFirstName] a réussi à convaincre les [faith.AltPriestTermPlural] de l’accepter comme [faith.ReligiousHeadName]."
 faith_creation.1010.desc.spiritual:0 "les [faith.AltPriestTermPlural] se sont réunis pour élire [HoF.GetFirstName] comme [faith.ReligiousHeadName]."
 faith_creation.1010.desc.end:0 "\n\nTous les fidèles sont enfin unis derrière un seul chef et il semble qu’un nouvel âge d’or pour la foi [faith.GetAdjectiveNoTooltip] commence."
 faith_creation.1010.desc.end.personal:0 "\n\nTous les fidèles sont enfin unis derrière moi et je ferai connaître à la foi [faith.GetAdjectiveNoTooltip] à un nouvel âge d’or !"
 faith_creation.1010.a:0 "Gloire [faith.HighGodName2] !"
 faith_creation.1011.message.title:0 "Nomination d’un chef de la foi"
 faith_creation.1011.message.desc:0 "Choisi par les [faith.AltPriestTermPlural] pour devenir [Concept('head_of_faith','chef de la foi')|E] [faith.GetAdjective], [HoF.GetFirstName] aura pour mission sacrée de représenter [faith.GetName]."