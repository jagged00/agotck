l_french:
 hostile_scheme_discovery.1001.t:1 "Intrigues à [ROOT.Char.GetCapitalLocation.GetCounty.GetName]"
 hostile_scheme_discovery.1001.close_relation:0 "Le savoir est une arme, et cela [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spymaster'))], en sa qualité de [spymaster.GetCouncilTitle|l], le démontre une fois encore lorsqu'[spymaster.Custom('FR_IlElle')] vient me voir pour m'annoncer [spymaster.Custom('quirk_neg_adverb')] une #bold terrible#! nouvelle :\n\nM[agent.Custom('FR_OnA')] propre [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('agent'))], [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName], complote contre #bold moi !#!\n\nIl n'est de lame plus douloureuse que celle qui frappe votre cœur…"
 hostile_scheme_discovery.1001.close_relation_no_spymaster:0 "Chuchotement hasardeux, calomnie de [ROOT.Char.Custom('ResidenceBuilding')], confession sur l'oreiller, même sans pourvoyeur de secrets attitré il est toujours possible de glaner quelques informations utiles. Voilà pourquoi, alors que je vaque à [ROOT.Char.Custom('IdleActivity')], j'en viens à prendre connaissance d'un ouï-dire plus insistant que d'autres :\n\nM[agent.Custom('FR_OnA')] propre [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('agent'))], [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName], complote contre #bold moi !#!\n\nIl n'est de lame plus douloureuse que celle qui frappe votre cœur…"
 hostile_scheme_discovery.1001.close_relation_spymaster_other_target:0 "Le savoir est une arme, et cela [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spymaster'))], en sa qualité de [spymaster.GetCouncilTitle|l], le démontre une fois encore lorsqu'[spymaster.Custom('FR_IlElle')] vient me voir pour m'annoncer [spymaster.Custom('quirk_neg_adverb')] une nouvelle alarmante :\n\nM[agent.Custom('FR_OnA')] propre [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('agent'))], [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName], complote contre [spymaster.Custom('FR_LuiElle')] !\n\n« Damné[agent.Custom('FR_E')] [agent.Custom2('InsultNoun', SCOPE.sC('spymaster'))] », [spymaster.Custom('lmf_neg_reaction_type')]."
 hostile_scheme_discovery.1001.close_relation_other_target:0 "Le savoir est une arme, et cela [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spymaster'))], en sa qualité de [spymaster.GetCouncilTitle|l], le démontre une fois encore lorsqu'[spymaster.Custom('FR_IlElle')] vient me voir pour m'annoncer [spymaster.Custom('quirk_neg_adverb')] une troublante nouvelle :\n\nM[agent.Custom('FR_OnA')] propre [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('agent'))], [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName], complote contre m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('targeted_courtier'))], [targeted_courtier.Custom('FR_le_Char_Pi')][targeted_courtier.GetTitledFirstName] !"
 hostile_scheme_discovery.1001.close_relation_no_spymaster_other_target:0 "Chuchotement hasardeux, calomnie de [ROOT.Char.Custom('ResidenceBuilding')], confession sur l'oreiller, même sans pourvoyeur de secrets attitré il est toujours possible de glaner quelques informations utiles. Voilà pourquoi, alors que je vaque à [ROOT.Char.Custom('IdleActivity')], il est porté à ma connaissance une troublante nouvelle :\n\nM[agent.Custom('FR_OnA')] propre [ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('agent'))], [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName], complote contre m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('targeted_courtier'))], [targeted_courtier.Custom('FR_le_Char_Pi')][targeted_courtier.GetTitledFirstName] !"
 hostile_scheme_discovery.1001.desc:0 "Le savoir est une arme, et cela [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spymaster'))], en sa qualité de [spymaster.GetCouncilTitle|l], le démontre une fois encore lorsqu'[spymaster.Custom('FR_IlElle')] vient me voir pour m'annoncer [spymaster.Custom('quirk_neg_adverb')] une #bold terrible#! nouvelle :\n\nM[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('agent'))], [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName], complote contre #bold moi !#!"
 hostile_scheme_discovery.1001.desc_no_spymaster:0 "Chuchotement hasardeux, calomnie de [ROOT.Char.Custom('ResidenceBuilding')], confession sur l'oreiller, même sans pourvoyeur de secrets attitré il est toujours possible de glaner quelques informations utiles. Voilà pourquoi, alors que je vaque à [ROOT.Char.Custom('IdleActivity')], il est porté à ma connaissance une #bold terrible#! nouvelle :\n\nM[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('agent'))], [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName], complote contre #bold moi !#!"
 hostile_scheme_discovery.1001.desc_other_target_spymaster:0 "Le savoir est une arme, et cela [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spymaster'))], en sa qualité de [spymaster.GetCouncilTitle|l], le démontre une fois encore lorsqu'[spymaster.Custom('FR_IlElle')] vient me voir pour m'annoncer [spymaster.Custom('quirk_neg_adverb')] une nouvelle alarmante :\n\nM[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('agent'))], [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName], complote contre [spymaster.Custom('FR_LuiElle')] !\n\n« Damné[agent.Custom('FR_E')] [agent.Custom2('InsultNoun', SCOPE.sC('spymaster'))] », [spymaster.Custom('lmf_neg_reaction_type')]."
 hostile_scheme_discovery.1001.desc_other_target:0 "Le savoir est une arme, et cela [ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spymaster'))], en sa qualité de [spymaster.GetCouncilTitle|l], le démontre une fois encore lorsqu'[spymaster.Custom('FR_IlElle')] vient me voir pour m'annoncer [spymaster.Custom('quirk_neg_adverb')] une nouvelle importante :\n\nM[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('agent'))] [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName] complote contre m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('targeted_courtier'))] [targeted_courtier.Custom('FR_le_Char_Pi')][targeted_courtier.GetTitledFirstName] !"
 hostile_scheme_discovery.1001.desc_no_spymaster_other_target:0 "Chuchotement hasardeux, calomnie de [ROOT.Char.Custom('ResidenceBuilding')], confession sur l'oreiller, même sans pourvoyeur de secrets attitré il est toujours possible de glaner quelques informations utiles. Voilà pourquoi, alors que je vaque à [ROOT.Char.Custom('IdleActivity')], il est porté à ma connaissance une nouvelle importante :\n\nM[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('agent'))] [agent.Custom('FR_le_Char_Pi')][agent.GetTitledFirstName] complote contre m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('targeted_courtier'))] [targeted_courtier.Custom('FR_le_Char_Pi')][targeted_courtier.GetTitledFirstName] !"
 hostile_scheme_discovery.1001.a:0 "Faites savoir à tous la vérité."
 hostile_scheme_discovery.1001.b:0 "Gardes, saisissez-vous de [Select_CString(agent.IsFemale,'cette traîtresse','ce traître')] !"
 hostile_scheme_discovery.1001.b.tt_not_your_courtier_or_vassal: "[agent.Custom('FR_le_Char_Pi')|U][agent.GetTitledFirstName] n’est ni votre [courtier|El][agent.Custom('FR_E')|E] ni votre [vassal|El][agent.Custom('FR_E')|E]"
 hostile_scheme_discovery.1001.c:0 "Que cette affaire ne s'ébruite pas…"
 hostile_scheme_discovery.1001.c.tt:0 "[agent.GetFirstNameNoTooltip] reste libre de ses agissements."
 hostile_scheme_discovery.1002.t:0 "Une ombre [ROOT.Char.Custom('FR_GetCourt_Au')] !"
 hostile_scheme_discovery.1002.intro:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spymaster'))|U] s'approche, et séance tenante, sollicite une audience privée, de celle que l'on ne peut refuser à son [spymaster.GetCouncilTitle|l]. En quelques mots je saisis la raison de son empressement :\n\n[owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U]"
 hostile_scheme_discovery.1002.intro_no_spymaster:0 "Chuchotement hasardeux, calomnie de [ROOT.Char.Custom('ResidenceBuilding')], confession sur l'oreiller, même sans pourvoyeur de secrets attitré, il est toujours possible de glaner quelques informations utiles. Voilà comment j'en viens à prendre connaissance d'un ouï-dire plus insistant que d'autres :\n\n[owner.Custom2('MyCharacterIntroduction', ROOT.Char)|U]"
 hostile_scheme_discovery.1002.murder:0 "ourdit un assassinat contre"
 hostile_scheme_discovery.1002.abduction:0 "conspire un enlèvement contre"
 hostile_scheme_discovery.1002.elope:0 "planifie un mariage clandestin avec"
 hostile_scheme_discovery.1002.steal_back_artifact:0 "trame un vol contre"
 hostile_scheme_discovery.1002.fallback:0 "complote contre"
 hostile_scheme_discovery.1002.a:0 "Maudit[owner.Custom('FR_E')] [owner.Custom2('InsultNoun', ROOT.Char)] !"
 hostile_scheme_discovery.2001.intro:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('spymaster'))|U] s'approche, et séance tenante, sollicite une audience privée, de celle que l'on ne peut refuser à son [spymaster.GetCouncilTitle|l]. En quelques mots je saisis la raison de son empressement :\n\nMême s'il reste encore à déterminer son identité,"
 hostile_scheme_discovery.2001.intro_no_spymaster:0 "Chuchotement hasardeux, calomnie de [ROOT.Char.Custom('ResidenceBuilding')], confession sur l'oreiller, même sans pourvoyeur de secrets attitré, il est toujours possible de glaner quelques informations utiles. Voilà comment j'en viens à prendre connaissance d'un ouï-dire plus insistant que d'autres :\n\nJe ne connais hélas pas encore son identité, mais"
 hostile_scheme_discovery.2001.murder:0 "quelqu’un ourdit un assassinat contre"
 hostile_scheme_discovery.2001.abduction:0 "quelqu’un conspire un enlèvement contre"
 hostile_scheme_discovery.2001.fallback:0 "quelqu’un complote contre"
 hostile_scheme_discovery.2001.elope:0 "quelqu’un planifie un mariage clandestin avec"
 hostile_scheme_discovery.2001.steal_back_artifact:1 "quelqu’un trame un vol contre"
 hostile_scheme_discovery.2001.depose: "quelqu’un conjure une éviction du pouvoir contre"
 hostile_scheme_discovery.2001.target_other:0 "m[ROOT.Char.Custom2('FR_LMF_RelationToMe_OnA', SCOPE.sC('target'))] [target.Custom('FR_le_Char_Pi')][target.GetTitledFirstName] !"
 hostile_scheme_discovery.2001.target_spymaster:0 "[target.Custom('FR_LuiElle')] !\n\n« Et quoi ? Devrais-je me cacher comme une souris apeurée ? C'est bien mal me connaître », [spymaster.Custom('lmf_neg_reaction_type')]."
 hostile_scheme_discovery.2001.target_me:0 "#bold moi !#!"
 hostile_scheme_discovery.2001.a:0 "Je veux savoir qui se cache derrière tout ça !"
 hostile_scheme_discovery.3001.t:0 "Agent découvert"
 hostile_scheme_discovery.3001.intro:0 "[agent.Custom('FR_le_Char_Pi')|U][agent.GetTitledFirstName], mon agent du [scheme.GetName|l] [court_owner.Custom('FR_du_Char_Pi')][court_owner.GetTitledFirstName], a été découvert[agent.Custom('FR_E')] !"
 hostile_scheme_discovery.3001.imprisoned:0 "\n\n[court_owner.Custom('FR_le_Char_L')|U][court_owner.GetTitleAsName] l’a placé[agent.Custom('FR_E')] sous les verrous."
 hostile_scheme_discovery.3001.accused:0 "\n\nMaintenant qu’[agent.Custom('FR_IlElle')] est jugé[agent.Custom('FR_E')] indigne de confiance, [agent.Custom('FR_IlElle')] ne peut plus aider ma cause."
 hostile_scheme_discovery.3001.a:0 "Maudits soient [court_owner.Custom('FR_le_Char_Pi')][court_owner.GetTitledFirstNameNoTooltip] et son [spymaster.GetCouncilTitle|l] !"
 hostile_scheme_discovery.3002.t:0 "Complot découvert"
 hostile_scheme_discovery.3002.desc:0 "L’existence de mon complot visant à [scheme.GetFullActionName|l] a été découvert !\n\nBien que mon implication ne soit pas encore connue, cela rendra beaucoup plus difficile la réalisation de mes projets."
 hostile_scheme_discovery.3002.a:0 "Malédiction !"
 hostile_scheme_discovery.3003.t:0 "Implication découverte"
 hostile_scheme_discovery.3003.desc:0 "[target.Custom2('MyCharacterIntroduction', ROOT.Char)|U] a découvert que je suis à l’origine du complot"
 hostile_scheme_discovery.3003.murder:0 "visant à l’assassiner !"
 hostile_scheme_discovery.3003.abduction:0 "visant à l’enlever !"
 hostile_scheme_discovery.3003.elope:0 "visant à l’épouser clandestinement !"
 hostile_scheme_discovery.3003.steal_back_artifact:0 "visant à lui voler un artefact !"
 hostile_scheme_discovery.3003.fallback:0 "contre [target.Custom('FR_LuiElle')] !"
 hostile_scheme_discovery.3003.a:0 "Il doit y avoir eu un malentendu !"
 hostile_scheme_discovery.4001.t:0 "Complot découvert"
 hostile_scheme_discovery.4001.opening:0 "Mon complot contre m[ROOT.Char.Custom2('FR_RelationToMe_OnA', SCOPE.sC('target'))] [target.Custom('FR_le_Char_Pi')][target.GetTitledFirstName] a été découvert !"
 hostile_scheme_discovery.4001.end:0 "\n\nMême mes propres [ROOT.Char.Custom('GetCourtierPlural')|l] murmurent derrière mon dos. La révélation a fait voler en éclats la confiance et l’affection qu’ils me portaient."
 hostile_scheme_discovery.4002.opening:0 "Mon plan visant à voir mort[target.Custom('FR_E')] m[ROOT.Char.Custom2('FR_RelationToMe_OnA', SCOPE.sC('target'))] [target.Custom('FR_le_Char_Pi')][target.GetTitledFirstName] a été découvert ! Tout le monde est au courant !"
 hostile_scheme_discovery.4001.a:0 "C’est tout un gros malentendu !"
 hostile_scheme_discovery.4001.b:0 "Oh, je vais leur montrer jusqu’où je peux aller."