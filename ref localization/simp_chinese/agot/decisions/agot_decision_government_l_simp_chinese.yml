l_simp_chinese:
 agot_pirate_convert_whole_realm_to_feudalism_decision:0 "采用封建制"
 agot_pirate_convert_whole_realm_to_feudalism_decision_desc:0 "随着我的领地不断扩大，控制它的困难也随之增多。如果[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]想要继续扩张，我们必须放弃落后的旧制度，采用封建制。"
 agot_pirate_convert_whole_realm_to_feudalism_decision_confirm:0 "采用封建制度"
 agot_pirate_convert_whole_realm_to_feudalism_decision_tooltip:0 "改变政体为[GetGovernment( 'lp_feudal_government' ).GetName]或[GetGovernment( 'feudal_government' ).GetName]"
 pirate_vassals_will_convert:0 "我的[GetGovernment( 'pirate_government' ).GetName]封臣将会转为[GetGovernment( 'feudal_government' ).GetName]"
 pirate_vassals_will_convert_lp:0 "我的[GetGovernment( 'pirate_government' ).GetName]封臣将会转为[GetGovernment( 'lp_feudal_government' ).GetName]"
 msg_vassal_common_feudalised:0 "封臣转为封建制"
 msg_vassal_common_feudalised_desc:0 "你的封臣[ROOT.Char.GetShortUIName]，[ROOT.Char.GetHerHis]放弃[GetGovernment( 'pirate_government' ).GetNameNoTooltip]并接纳了[GetGovernment( 'feudal_government' ).GetNameNoTooltip]"
 msg_vassal_lp_feudalised:0 "封臣转为封建制"
 msg_vassal_lp_feudalised_desc:0 "你的封臣[ROOT.Char.GetShortUIName]，[ROOT.Char.GetHerHis]放弃[GetGovernment( 'pirate_government' ).GetNameNoTooltip]并接纳了[GetGovernment( 'lp_feudal_government' ).GetNameNoTooltip]"
 all_pirate_holding_will_change:0 "领土内的所有[pirate_den_holding|E]将转为[castle_holdings|E]"
 agot_pirate_events.0001.t:0 "崭新的时代……"
 agot_pirate_events.0001.desc:0 "旧道路对我们很有用，我们会永远尊重它们。然而，作为[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]的[ROOT.Char.GetTitleAsNameNoTooltip]，我断定如果我们想要继续繁荣，就必须接受封建制和它的原则。这是通往伟大之路的关键一步！"
 agot_pirate_events.0001.a:0 "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]万岁！"
 agot_pirate_events.0002.opening:0 "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_converting_to_admin_kings_become_lp_feudal:0 "任何[kingdom|E][title_tier|E][vassal|E]会将[government|E]更改为[GetGovernment( 'lp_feudal_government' ).GetName]"
 agot_adopt_kneeler_ways_decision:0 "遵循南方习俗"
 agot_adopt_kneeler_ways_decision_desc:0 "远北之地的严酷荒原上的生活，造就了我们的冷酷无情与坚韧不拔，这与长城另一边的习性截然不同。但既然我们已在他们的土地上安家落户，或许适应他们的生活方式、法律以及风俗习惯，也不失为一种明智的做法。"
 agot_adopt_kneeler_ways_decision_confirm:0 "是时候弯下膝盖了"
 agot_adopt_kneeler_ways_decision_tooltip:0 "你的人民将遵循铁王座治下人民的生活方式，这将加强你们与长城以南的统治者之间的联系，但从此你们也将失去作为自由民的种种特权。"
 is_culture_head:0 "你是你的文化的文化领袖"
 hybridized_with_kneelers:0 "你的文化是长城以南某个现存文化的融合文化"
 capital_south_of_the_wall:0 "你的首都位于长城以南"
 agot_major_decisions_events.1003.t:0 "另一边的世界……"
 agot_major_decisions_events.1003.desc:0 "我们世世代代都渴望着逃离长城以北的严酷生活，如今这一梦想终于实现。然而，如果我们继续固执己见，无视新邻居的法律和习俗，这种狂妄又如何让我们与之相处？\n\n长城以南的人可能胆怯懦弱、但他们的生活却安逸长久。他们显然真正明白如何充分利用好这片宜人沃土，如果他们正是借助现有法律习俗实现了这一点，那么我们也应该予以接纳。"
 agot_major_decisions_events.1003.a:0 "敬美好崭新的未来！"
 every_freefolk_ruler_tt:0 "所有自由民酋长"
 become_landless_pirate_decision:0 "成为海盗"
 become_landless_pirate_decision_desc:0 "我曾作为自由掠夺者，品尝过荣耀与黄金的滋味。如今是时候卸下伪装，接受自己的海盗本性了。"
 become_landless_pirate_decision_tooltip:0 "改变政体为[GetGovernment( 'pirate_government' ).GetName]"
 become_landless_pirate_decision_confirm:0 "成为海盗"
 agot_located_in_pirating_region:0 "你必须位于以海盗闻名的地区，比如[GetGeographicalRegion('world_stepstones').GetName]。"
 become_landless_pirate_decision_tt:0 "你将成为无地[pirate_govt|E]"
 abandon_pirate_holdings_decision:0 "成为无地海盗"
 abandon_pirate_holdings_decision_desc:0 "统治荒凉礁石和海盗窝点的生活无聊透顶。是时候全身心投入大海，做一个掠夺者和海盗了！"
 abandon_pirate_holdings_decision_tooltip:0 "抛弃你的领主头衔，成为一名无地海盗。"
 abandon_pirate_holdings_decision_confirm:0 "放弃我持有的领地"
 agot_pirate_higher_tier_title_decision:0 "[ROOT.Char.Custom('GetDominateTitleLoc')]"
 agot_pirate_higher_tier_title_decision_title:0 "主宰[ROOT.Char.GetPrimaryTitle.GetDeJureLiege.GetBaseNameNoTierNoTooltip]"
 agot_pirate_higher_tier_title_decision_desc:0 "是时候该证明我对这片区域绝对统治权了，我要降服所有居住在这里的人。"
 agot_pirate_higher_tier_title_decision_tooltip:0 "尝试获得更高[title_tier|E]的[title|E]"
 agot_pirate_higher_tier_title_decision_confirm:0 "他们将拜倒在我身前"
 agot_become_landed_pirate_decision:0 "采用海盗制"
 agot_become_landed_pirate_decision_desc:0 "如果我想要在海盗中脱颖而出，就必须完全采用海盗制政体。"
 agot_become_landed_pirate_decision_tooltip:0 "成为海盗"
 agot_become_landed_pirate_decision_confirm:0 "$agot_become_landed_pirate_decision_tooltip$"
 agot_become_landed_pirate_decision_shatter_realm_tt:0 "除你的[primary_title|E]之外，其他持有的头衔都将授予当地统治者。"
 agot_become_landed_pirate_decision_gain_tributaries_tt:0 "拥有你先前头衔的新统治者将成为你的[tributaries|E]。"
 agot_become_landed_pirate_decision_holding_reset_tt:0 "你的主要[holding|E]将成为[pirate_den_holding|E]。"