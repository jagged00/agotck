l_simp_chinese:
 agot_proclaim_iron_throne:0 "宣称铁王座"
 agot_proclaim_iron_throne_tooltip:0 "该决议允许你将领地统一于铁王座之下。"
 agot_proclaim_iron_throne_desc:0 "铁王座始终是维斯特洛统一与权力的象征。随着王国的无数小领地归入我们麾下，是时候收集起战败者的断剑，为七大王国打造一座新的铁王座了。\n\n我是否具备宣称铁王座的实力、智谋与决心？[ROOT.Char.GetHouse.GetName]家族又是否有能力成为维斯特洛唯一真正的统治者？"
 agot_proclaim_iron_throne_confirm:0 "送出渡鸦"
 set_capital_kingslanding_decision:0 "收复君临城"
 set_capital_kingslanding_decision_tooltip:0 "收复君临作为你领地的首都。"
 set_capital_kingslanding_decision_desc:0 "君临城是铁王座的法定首都，因此理应为我所有。"
 set_capital_kingslanding_decision_confirm:0 "重建王国的真正宝座！"
 build_dune_road_decision:0 "建造沙丘大道"
 build_dune_road_decision_tooltip:0 "建造一条连通风息堡与阳戟城的宏伟道路，促进途径伯爵领的发展。"
 build_dune_road_decision_desc:0 "一条连通风息堡与阳戟城的宏伟道路，将为所经之地带来财富与繁荣。"
 build_dune_road_decision_confirm:0 "就这样吧"
 agot_minor_decisions_events.0003.t:0 "沙丘大道"
 agot_minor_decisions_events.0003.desc:0 "[top_liege.GetFullNameNicknamedRegnal]已下令修筑一条连通风息堡与阳戟城的大道，以促进风暴地与多恩的贸易往来。"
 agot_minor_decisions_events.0003.a:0 "真不愧是王家工程！"
 agot_dune_road_modifier:0 "沙丘大道"
 agot_dune_road_modifier_desc:0 "该伯爵领位于风息堡与阳戟城之间的要道沿线，这里的商贸日益繁荣。"