l_simp_chinese:
 defy_winter_lords_decision:0 "反抗冬境领主"
 defy_winter_lords_decision_desc:0 "岩种清楚北境人的嘲笑，他们认为我们并不比野人文明。斯卡格斯曾经自由独立，不受冬境领主的统治——如今我们必将再次独立。我们的力量将让[ROOT.Char.GetLiege.GetNameNicknamedRegnal]颤抖！"
 defy_winter_lords_decision_tooltip:0 "你将宣布独立，让斯卡格斯人再次回归大海。"
 defy_winter_lords_decision_confirm_text_desc:0 "北境将记起对斯卡格斯的恐惧！"
 agot_minor_decisions_events.0001:0 "反抗冬境领主"
 agot_minor_decisions_events.0001.desc:0 "许多岩种都梦想着斯卡格斯岛重获自由的那一天。布兰登·史塔克国王摧毁我们的力量后，他禁止我们出海。现在，当我们的船只靠近时，整个北境都将颤抖！"
 agot_minor_decisions_events.0001.a:0 "我们#bold 不再#!宣誓效忠。"
 agot_minor_decisions_events.0001.a_tt:0 "北境肯定不会对这种不忠行为无动于衷。你准备好打仗了吗？"
 agot_minor_decisions_events.0002:0 "独立的斯卡格斯岛"
 agot_minor_decisions_events.0002.desc:0 "岩种再次独立自主！海豹湾的人将会知晓我们的旗号。\n\n我已经把我的遗产刻入石头，所有岩种都将记住我的名字。"
 agot_minor_decisions_events.0002.a:0 "我的遗产将经受住时间的考验。"
 agot_minor_decisions_events.0002.a_tt:0 "斯卡格斯岛获得独立。"
 abdicate_decision:0 "让位于继承人"
 abdicate_decision_tooltip:0 "我的统治该落幕了。"
 abdicate_decision_desc:0 "鉴于当前的境况，我别无选择，只能将权力的缰绳交给我的继承人，让史书为我统治的篇章写下注脚。"
 abdicate_decision_confirm:0 "召我的学士来"
 agot_abdicate.1.t:0 "退位"
 agot_abdicate.1.desc:0 "[ROOT.Char.GetTitledFirstName]决定逊位于你。"
 agot_abdicate.1.a:0 "我感激涕零。"
 stress_loss_summerhall_decision:0 "避往盛夏厅"
 stress_loss_summerhall_decision_tooltip:0 "在废墟中寻找安宁"
 stress_loss_summerhall_decision_desc:0 "我需要一些时间远离所有人独自思考。盛夏厅或许是一片废墟，但也会是一个适宜的休憩场所。"
 stress_loss_summerhall_decision_confirm:0 "出发"
 agot_minor_decisions_events.0004.t:0 "盛夏厅废墟"
 agot_minor_decisions_events.0004.desc:0 "盛夏厅的悲剧几乎是坦格利安家族的末日，但我在废墟中却找到一种奇妙的平和感。我现在头脑清楚多了。"
 agot_minor_decisions_events.0004.a:0 "该回家了……"
 end_the_ironborn_decision:0 "终结铁种"
 end_the_ironborn_decision_desc:0 "几个世纪以来，铁群岛的狗杂种在维斯特洛乃至更远的地方强奸、掠夺。现在，我们必须对这些海盗采取行动，彻底粉碎他们的势力。我们必须对铁种发动一场毁灭性的战争，让铁国王再也无法坐上海石之位。"
 end_the_ironborn_decision_confirm_text_desc:0 "拿起武器！"
 end_the_ironborn_decision_tooltip:0 "铁种去死。"
 ironborn_rebellion_decision:0 "反抗铁王座"
 ironborn_rebellion_decision_desc:0 "青绿之地的居民已经安寝多年。事实上，自从「黑心」赫伦死后，维斯特洛便不再发自内心地惧怕铁种，如今只剩少数劫掠者会时不时侵袭海岸，向他们付铁钱。铁王座上的国王换了一代又一代，我们是否忘记了，我们也有自己的王座，数百年前，我们也曾有自己的国王？\n\n其他人或许忘了，但我没有。我将解开束缚人民的枷锁；我将加冕为海盐王与磐岩王。安达尔人、洛伊拿人和先民将再一次感受到对铁民的恐惧为何物。"
 ironborn_rebellion_decision_tooltip:0 "哭泣吧，维斯特洛人，铁群岛将再度崛起！"
 ironborn_rebellion_decision_confirm_text_desc:0 "该付铁钱了！"
 recruit_forder_specialist_decision:0 "招募专业涉水者"
 recruit_forder_specialist_decision_desc:0 "招募一位不仅懂得如何穿越河流，更能够涉水作战的指挥官。"
 recruit_forder_specialist_decision_tooltip:0 "一位有涉水者特质的指挥官将加入你的宫廷。"
 recruit_forder_specialist_decision_confirm:0 "希望能找到"
 agot_minor_decisions_events.0005.t:0 "放飞自我"
 agot_minor_decisions_events.0005.desc:0 "#italic [ROOT.Char.GetFullNameNicknamedNoTooltip]已经彻底疯了……#!\n\n我听到整个宫廷上都在窃窃私语。我的廷臣们都厌恶我，即使脸上没表现出来，行为也处处透露了这一点。既然他们都这么认为，那我也没必要继续保持形象了。"
 agot_minor_decisions_events.0005.a:0 "再见了，理发师！"
 stress_loss_uncouth_decision:0 "放飞自我"
 stress_loss_uncouth_decision_desc:0 "这个世界上的压力已经够大了。如果世人视我为怪物，那就就当个怪物。"
 stress_loss_uncouth_decision_tooltip:0 "你不再整理外表，让头发和指甲疯长。"
 stress_loss_uncouth_decision_confirm:0 "我才不需要洗澡。"
 uncouth_stopped_cutting:0 "未修剪的头发"
 uncouth_stopped_cutting_desc:0 "该角色不再剪头发，看起来非常不整洁。"
 mend_dynasty_relations_decision:0 "真龙和解"
 mend_dynasty_relations_decision_desc:0 "自贤王时代起，黑龙与红龙之间的争斗就从未停止。但如今我们#italic 终于#!学会了和平共处，黑龙与红龙是否应该冰释前嫌，将这段仇恨遗弃在历史之中？"
 mend_dynasty_relations_decision_tooltip:0 "你将修复坦格利安家族和黑火家族的关系。"
 mend_dynasty_relations_decision_confirm:0 "真龙将重新团结在一起！"
 agot_minor_decisions_events.0004.desc_egg:0 "\n\n突然，我眼角的余光看到碎石下有什么东西在闪闪发光。我走过去，轻轻地移开周围的碎片，露出一个脏兮兮但完好无损的龙蛋!"
 agot_visit_house_of_baw:0 "造访黑白之院"
 agot_visit_house_of_baw_decision_effect:0 "@warning_icon!千面之神将带走你的痛苦。[Glossary( '凡人皆需侍奉。', 'VALAR_DOHAERIS_GLOSS' )]"
 agot_valar_morghulis:0 "凡人皆有一死"
 commit_suicide_decision_confirm_base:0 "我的时候到来了"
 disavow_incest_decision:0 "放弃近亲通婚"
 disavow_incest_decision_desc:0 "数百年来，坦格利安家族通过近亲通婚保持血统的纯净，教会也根据例外法则给予我们特殊豁免。但现在，是时候重新审视这一传统了。我们是该继续坚守旧俗，还是应寻求新的联盟、拓展家族的视野？"
 disavow_incest_decision_tooltip:0 "禁止你家族内的兄妹通婚。"
 disavow_incest_decision_confirm:0 "我们将打破传统"
 reinstate_incest_decision:0 "恢复近亲通婚"
 reinstate_incest_decision_desc:0 "我们家族曾因血统纯净而兴盛，这依靠的是近亲通婚的传统。尽管我们已不再恪守这一习俗，但教会的例外法则依然有效，赋予我们延续这项古老习俗的权利。我们是否应该重新拾起这份遗产，恢复我们标志性的传统？"
 reinstate_incest_decision_tooltip:0 "允许你家族内的兄妹通婚。"
 reinstate_incest_decision_confirm:0 "我们将恢复古道"
 agot_take_new_face_decision:0 "换上新面孔"
 agot_take_new_face_decision_desc:0 "我将改换面孔以侍奉千面之神。"
 agot_take_new_face_decision_tooltip:0 "你将从同性别角色中选择另一张脸。"
 agot_take_new_face_decision_tt:0 "换上一张新脸会改变你角色的外貌和年龄，但会保留现有角色身份、领地和头衔。"
 agot_take_new_face_multiple_player_warning_tt:0 "@warning_icon!当前是多人游戏，玩家不会自动切换到新的角色。"
 agot_take_new_face_decision_confirm:0 "看看千面之殿"
 agot_has_taken_face_recently:0 "你最近更换过新面孔"
 agot_faceless_new_adventure_decision:0 "开始新面孔的冒险"
 agot_faceless_new_adventure_decision_desc:0 "我将抛弃旧日的一切，改换面孔，以新生侍奉千面之神。"
 agot_faceless_new_adventure_decision_tooltip:0 "你将放弃当前角色，以新面孔开始新的冒险。"
 agot_faceless_new_adventure_decision_tt:0 "更换新面孔时：\n$EFFECT_LIST_BULLET$你将放弃当前角色并切换至新角色。仅保留[gold|E]、非宫廷[artifacts|E]、[traits|E]和[faith|E]。其余属性由所选身份决定。\n$EFFECT_LIST_BULLET$你将扮演一位新家族的无地角色。"
 agot_faceless_new_adventure_decision_confirm:0 "新生活等待着我"
 agot_commission_special_artifact_decision:0 "Commission Special Artifact"
 agot_commission_special_artifact_decision_tooltip:0 "Commission the Court Smith to create a new special artifact"
 agot_commission_special_artifact_decision_effects_tooltip:0 "You will commission a new special artifact."
 agot_commission_special_artifact_decision_desc:0 "A ruler is judged as much by what they bear as by what they do. Crown or armor, such a piece serves as both symbol and statement. I will have a new artifact made, one worthy of my station."
 agot_commission_special_artifact_decision_confirm:0 "Summon the smith!"
 agot_commission_special_artifact_button:0 "Choose Artifact"
 agot_commission_special_artifact_crown_choice_loc:0 "A Crown For Myself"
 agot_commission_special_artifact_crown_choice_tooltip:0 "A crown inspired by aspects of myself, my lineage, faith and titles."
 agot_commissioned_personal_crown_recently:0 "You cannot commission another crown for yourself until [GetCurrentDateWithDiff( THIS.VarRemaining( 'agot_recently_commissioned_crown' ))]"
 agot_commission_special_artifact_crown_spouse_choice_loc:0 "A Crown For My Spouse"
 agot_commission_special_artifact_crown_spouse_choice_tooltip:0 "A crown inspired by the lineage, faith or titles of my spouse."
 agot_commissioned_spouse_crown_recently:0 "You cannot commission another crown for [spouse_scope.GetName] until [GetCurrentDateWithDiff( GetVarTimeRemaining( spouse_scope.MakeScope, 'agot_recently_commissioned_crown') )]"
 agot_commission_special_artifact_armor_choice_loc:0 "A Set of Armor"
 agot_commission_special_artifact_armor_choice_tooltip:0 "A custom-forged set of armor, tailored to its wearer."
 agot_commissioned_armor_recently:0 "You cannot commission another armor until [GetCurrentDateWithDiff( THIS.VarRemaining( 'agot_recently_commissioned_armor' ))]"