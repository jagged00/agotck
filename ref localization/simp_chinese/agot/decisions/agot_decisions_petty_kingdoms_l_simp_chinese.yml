l_simp_chinese:
 I_PROCLAIM_PK:0 "你必须[completely_control|E]至少两个[duchies|E]"
 agot_proclaim_pk_runestone:0 "宣称符石城王国"
 agot_proclaim_pk_runestone_tooltip:0 "该决议允许你建立符石城王国"
 agot_proclaim_pk_runestone_desc:0 "符石城是先民的古老土地，如今已团结在[ROOT.Char.GetHouse.GetName]家族的旗帜下。\n\n这片土地曾由青铜王统治，承载着谷地的厚重历史和巨大战略意义。作为符石城的[ROOT.Char.GetLadyLord]，你必须召集封臣，恢复青铜王后代的荣光。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_runestone_confirm:0 "送出渡鸦"
 agot_proclaim_pk_stone_and_sky:0 "宣称峭壁与苍天王国"
 agot_proclaim_pk_stone_and_sky_tooltip:0 "该决议允许你建立峭壁与苍天王国"
 agot_proclaim_pk_stone_and_sky_desc:0 "大山口，归于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[ROOT.Char.GetHouse.GetName]家族控制，是通往多恩最便捷的路线。\n\n峭壁与苍天之王曾在此施行统治，如今[ROOT.Char.GetHouse.GetNameNoTooltip]家族已掌握了足够的控制权，足以宣称这份遗产。作为这里的[ROOT.Char.GetLadyLord]，你有责任迈出这一步，让这个早已不复存在的王国重现辉煌。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_stone_and_sky_confirm:0 "送出渡鸦"
 I_PROCLAIM_IT:0 "你必须在维斯特洛[completely_control|E]至少五个[empires|E]。"
 agot_proclaim_pk_the_torrentine:0 "宣称湍流河王国"
 agot_proclaim_pk_the_torrentine_tooltip:0 "该决议允许你建立湍流河王国"
 agot_proclaim_pk_the_torrentine_desc:0 "湍流河，归于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]正直的[ROOT.Char.GetHouse.GetName]家族统治，在多恩地区具有重要的历史和战略地位。\n\n[ROOT.Char.GetHouse.GetName]家族以传奇骑士而闻名，代表着其人民的尚武精神与骑士风范。作为这里的[ROOT.Char.GetLadyLord]，你肩负着重新统一这片土地，并恢复湍流河昔日荣耀的重任。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_the_torrentine_confirm:0 "送出渡鸦"
 agot_proclaim_pk_the_tor:0 "宣称托尔城王国"
 agot_proclaim_pk_the_tor_tooltip:0 "该决议允许你建立托尔城王国"
 agot_proclaim_pk_the_tor_desc:0 "托尔城，归于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[ROOT.Char.GetHouse.GetName]家族统治，在多恩地区具有重要的历史和战略意义。\n\n[ROOT.Char.GetHouse.GetNameNoTooltip]家族以其古老的血统和繁荣的文化而闻名，是多恩不屈精神与贵族气质的象征。作为这里的[ROOT.Char.GetLadyLord]，你肩负着团结这片土地，并建立托尔城王国的重任。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_the_tor_confirm:0 "送出渡鸦"
 agot_proclaim_pk_fair_isle:0 "宣称仙女岛王国"
 agot_proclaim_pk_fair_isle_tooltip:0 "该决议允许你建立仙女岛王国"
 agot_proclaim_pk_fair_isle_desc:0 "仙女岛，归于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]尊贵的[ROOT.Char.GetHouse.GetName]家族统治，是西境具有重要商业意义的地区。\n\n强大的海军与美丽的海岸，使[ROOT.Char.GetHouse.GetNameNoTooltip]家族成为该区域的主导力量。作为这里的[ROOT.Char.GetLadyLord]，你肩负着重新统一这片土地，并建立仙女岛王国的重任。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_fair_isle_confirm:0 "送出渡鸦"
 agot_proclaim_pk_bear_island:0 "宣称熊岛王国"
 agot_proclaim_pk_bear_island_tooltip:0 "该决议允许你建立熊岛王国"
 agot_proclaim_pk_bear_island_desc:0 "熊岛，其森林密布的海岸归于尊贵的[ROOT.Char.GetHouse.GetName]家族统治，长期以来一直是抵御铁民入侵北境的要塞。\n\n[ROOT.Char.GetHouse.GetNameNoTooltip]家族凭借勇猛的战士和始终如一的忠诚，已证明自己是人民坚定的守护者。作为这里的[ROOT.Char.GetLadyLord]，你有责任更进一步，为这座岛屿加冕。\n\n你是否愿意迎接挑战，宣称荣耀？"
 agot_proclaim_pk_bear_island_confirm:0 "送出渡鸦"
 agot_proclaim_pk_great_wyk:0 "宣称大威克岛王国"
 agot_proclaim_pk_great_wyk_tooltip:0 "该决议允许你建立大威克岛王国"
 agot_proclaim_pk_great_wyk_desc:0 "大威克岛，归于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]尊贵的[ROOT.Char.GetHouse.GetName]家族统治，是铁群岛中最大且最重要的岛屿之一。\n\n这里的人民以其强烈的独立性和军事才能著称，长期以来一直是铁种古道的坚定捍卫者。作为这里的[ROOT.Char.GetLadyLord]，你肩负着重新统一这片土地，建立一个王国，让这座岛屿走向辉煌的重任。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_great_wyk_confirm:0 "送出渡鸦"
 agot_proclaim_pk_the_stony_shore:0 "宣称磐石海岸王国"
 agot_proclaim_pk_the_stony_shore_tooltip:0 "该决议允许你建立磐石海岸王国"
 agot_proclaim_pk_the_stony_shore_desc:0 "磐石海岸，归于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]尊贵的[ROOT.Char.GetHouse.GetName]家族统治，在北境具有重大的战略意义。\n\n磐石海岸以其险峻的地貌和坚韧不拔的人民著称而闻名，长久以来一直是北境人的坚固堡垒。作为这里的[ROOT.Char.GetLadyLord]，你肩负着重新统一这片土地，使磐石海岸王国崛起的重任。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_the_stony_shore_confirm:0 "送出渡鸦"
 agot_proclaim_pk_southstone:0 "宣称南石领王国"
 agot_proclaim_pk_southstone_tooltip:0 "该决议允许你建立南石领王国"
 agot_proclaim_pk_southstone_desc:0 "南石领，归于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]尊贵的[ROOT.Char.GetHouse.GetName]家族统治，在河间地具有重大的历史和战略意义。\n\n三叉戟河畔的土地以肥沃而闻名，[ROOT.Char.GetHouse.GetNameNoTooltip]家族作为坚韧与力量的象征，长久以来一直统治着这里。作为这里的[ROOT.Char.GetLadyLord]，你肩负着重新统一这片土地，并恢复南石领王国昔日荣耀的重任。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_southstone_confirm:0 "送出渡鸦"
 raise_pirate_kingdom_decision:0 "宣布建立海盗王国"
 raise_pirate_kingdom_decision_desc:0 "在「凌辱三姐妹」和「千年之战」之前，三姐妹群岛曾经是独立的海盗王国。现在，我们的力量再次强大，是时候挣脱[ROOT.Char.GetLiege.GetNameNicknamedRegnal]的枷锁了！"
 raise_pirate_kingdom_decision_tooltip:0 "你将宣布独立，让三姐妹群岛拾回曾经的地位，成为海盗王国。"
 raise_pirate_kingdom_decision_confirm:0 "为了怒涛和长空！"
 agot_proclaim_pk_old_wyk:0 "宣称老威克岛王国"
 agot_proclaim_pk_old_wyk_tooltip:0 "该决议允许你建立老威克岛王国"
 agot_proclaim_pk_old_wyk_desc:0 "老威克岛王国，归于尊贵的[ROOT.Char.GetHouse.GetName]家族统治，位于铁群岛的中心地区。\n\n[ROOT.Char.GetHouse.GetNameNoTooltip]家族以勇猛的战士和精湛的航海技术而闻名，在铁种中享有显赫地位。作为这里的[ROOT.Char.GetLadyLord]，你肩负着重新统一这片土地，让铁民湾王国走向辉煌的重任。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_old_wyk_confirm:0 "送出渡鸦"
 agot_proclaim_pk_blackwood_vale:0 "宣称布莱伍德谷王国"
 agot_proclaim_pk_blackwood_vale_tooltip:0 "该决议允许你建立布莱伍德谷王国"
 agot_proclaim_pk_blackwood_vale_desc:0 "布莱伍德谷，归于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]尊贵的[ROOT.Char.GetHouse.GetName]家族统治，在河间地具有重要的历史和战略意义。\n\n这里的人民以其古老的血统和对旧神的虔诚而闻名，长期以来一直是坚守和荣誉的象征。作为这里的[ROOT.Char.GetLadyLord]领主，你肩负着重新统一这片土地，并建立辉煌的布莱伍德谷王国的重任。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_blackwood_vale_confirm:0 "送出渡鸦"
 agot_proclaim_pk_godsgrace:0 "宣称神恩城王国"
 agot_proclaim_pk_godsgrace_tooltip:0 "该决议允许你建立神恩城王国"
 agot_proclaim_pk_godsgrace_desc:0 "神恩城王国，归于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]尊贵的[ROOT.Char.GetHouse.GetName]家族统治，位于多恩生命线的中心。\n\n王国位于祸江与万斯河的交汇处，长久以来，这条水道自古便是多恩防御体系的关键。作为这里的[ROOT.Char.GetLadyLord]，你肩负着重新统一这片土地，并建立绿血河王国的重任。\n\n你是否愿意迎接挑战，为[ROOT.Char.GetHouse.GetNameNoTooltip]家族赢得荣耀？"
 agot_proclaim_pk_godsgrace_confirm:0 "送出渡鸦"