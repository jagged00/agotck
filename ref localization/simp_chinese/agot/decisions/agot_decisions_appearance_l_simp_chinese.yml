l_simp_chinese:
 decision_group_type_appearance:0 "外貌决议"
 agot_dye_hair_decision:0 "染发"
 agot_dye_hair_decision_desc:0 "我对现在的头发颜色太熟悉了，这也太无趣了！是时候换个新发色了。"
 agot_dye_hair_decision_effect:0 "将有几十种颜色的染发剂供你选择"
 agot_dye_hair_decision_tooltip:0 "把你的头发染成新的颜色"
 agot_dye_hair_decision_confirm:0 "是时候换个新造型了！"
 agot_buy_eye_gem_decision:0 "购买宝石眼"
 agot_replace_eye_gem_decision:0 "替换宝石眼"
 agot_buy_eye_gem_desc:0 "我传唤工匠让他呈上一批宝石供我挑选，好用来替代我失去的眼睛。既然注定要少一只眼，那不如过得体面些。"
 agot_buy_eye_gem_decision_tooltip:0 "购买一颗宝石来替代你失去的眼睛"
 agot_buy_eye_gem_decision_confirm:0 "选择宝石"
 agot_buy_eye_gem_decision_next_stop_button:0 "把最好的宝石给我拿来！"
 agot_remove_eye_gem_decision:0 "移除宝石眼"
 agot_remove_eye_gem_desc:0 "我将让人做一副新的眼罩用来代替那颗宝石。这是个简单的办法，对我来说也足够合适。"
 agot_remove_eye_gem_decision_tooltip:0 "重新戴上眼罩"
 agot_remove_eye_gem_decision_effect:0 "你的宝石眼将被#N 移除#!，你将再次戴上眼罩。"
 agot_remove_eye_gem_decision_confirm:0 "去请一个工匠！"
 replace_eye_gem_option_red:0 "红宝石"
 replace_eye_gem_option_orange:0 "黄水晶"
 replace_eye_gem_option_yellow:0 "黄玉"
 replace_eye_gem_option_green:0 "翡翠"
 replace_eye_gem_option_blue:0 "青金石"
 replace_eye_gem_option_dark_blue:0 "蓝宝石"
 replace_eye_gem_option_purple:0 "紫水晶"
 replace_eye_gem_option_black:0 "黑曜石"
 replace_eye_gem_option_white:0 "钻石"
 has_eye_gem_red_tooltip:0 "#BOLD;COLOR:{0.48,0.05,0.09} 红宝石#!，深红似火，产自盛夏群岛。"
 has_eye_gem_orange_tooltip:0 "#BOLD;COLOR:{1.00,0.44,0.00} 黄玉#!，呈璀璨的琥珀色，如火焰般闪烁摇曳。"
 has_eye_gem_yellow_tooltip:0 "#BOLD;COLOR:{0.89,0.84,0.10} 黄晶#!，明亮如正午骄阳，棱角分明且光彩夺目。"
 has_eye_gem_green_tooltip:0 "#BOLD;COLOR:{0.12,0.3,0.18} 祖母绿#!，携着索斯罗斯深处的浓艳绿意。"
 has_eye_gem_blue_tooltip:0 "#BOLD;COLOR:{0.28,0.52,0.9} 青金石#!，漾着夏日之海般澄澈的湛蓝。"
 has_eye_gem_dark_blue_tooltip:0 "#BOLD;COLOR:{0.11,0.20,0.8} 蓝宝石#!，湛蓝深邃，宛如一块打磨过的午夜碎片。"
 has_eye_gem_purple_tooltip:0 "#BOLD;COLOR:{0.35,0.00,0.45} 紫水晶#!，那浓郁的紫色不禁让人想起古老的龙王们。"
 has_eye_gem_black_tooltip:0 "#BOLD;COLOR:{0.35,0.35,0.35} 黑曜石#!，又称龙晶，色泽暗沉且具有反光性。"
 has_eye_gem_white_tooltip:0 "#BOLD;COLOR:{0.93,0.93,0.93} 钻石#!，澄澈璀璨，实属珍稀之选。"
 agot_wear_the_mask_decision:0 "戴上面具"
 agot_wear_the_mask_decision_tooltip:0 "用面具遮住你的残缺之处，好让世人看不见它。"
 agot_wear_the_mask_decision_desc:0 "我再也无法忍受看到自己这副丑陋的模样了。或许我真该考虑把脸遮起来，免得连我的廷臣看到我时都会下意识闪躲。"
 agot_wear_the_mask_decision_confirm:0 "给我拿张面具"
 agot_remove_the_mask_decision:0 "摘下面具"
 agot_remove_the_mask_decision_tooltip:0 "摘下你的面具，把你的真实模样展现在世人面前。"
 agot_remove_the_mask_decision_desc:0 "我受够了躲在面具后面。难道我的脸真的丑到必须瞒着全世界吗？"
 agot_remove_the_mask_decision_confirm:0 "让他们看看真正的我"
 agot_change_eye_patch_decision:0 "考虑眼罩"
 agot_change_eye_patch_decision_tooltip:0 "考虑为失去的眼睛选择合适的遮盖物"
 agot_change_eye_patch_desc:0 "我传唤工匠让他呈上各式眼罩供我挑选。既然注定要少一只眼，不如戴出风采。"
 agot_change_eye_patch_decision_confirm:0 "把眼罩呈上来！"