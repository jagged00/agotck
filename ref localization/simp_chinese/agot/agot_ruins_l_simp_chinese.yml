 building_type_ruin_salted_earth_01:0 "盐碱地"
 building_ruin_salted_earth_01:0 "盐碱地"
 building_ruin_salted_earth_01_desc:0 "废墟周围的土地已经被盐渍化，留下了贫瘠且没有产出的土地，只有杂草和顽强的花朵能够在未来许多年里生长。"
 building_type_ruin_desolate_01:0 "荒废之地"
 building_ruin_desolate_01:0 "荒废之地"
 building_ruin_desolate_01_desc:0 "废墟周围的土地已经被遗弃，一望无际，原来的居民无处可寻。"
 building_ruin_desolate_02:0 "振兴人口"
 building_ruin_desolate_02_desc:0 "通过胁迫、激励等等方式，一个新的社区已经被扶持起来，以支持重建工作。"
 building_type_ruin_flooded_01:0 "洪涝"
 building_ruin_flooded_01:0 "被洪水淹没的废墟"
 building_ruin_flooded_01_desc:0 "水淹没了整座废墟，使得重建工作几乎停滞不前。"
 building_ruin_flooded_02:0 "排洪的废墟"
 building_ruin_flooded_02_desc:0 "经过一些必要的作业后，一直阻碍废墟重建工作的水已大部分排出。"
 building_type_ruin_renowned_01:0 "著名的废墟"
 building_ruin_renowned_01:0 "著名的废墟"
 building_ruin_renowned_01_desc:0 "尽管如今这里只剩遍地瓦砾与断壁残垣，但它至今仍被歌手传唱在歌谣里，或许它的如此名声正源自它的毁灭。因此，人们似乎更愿意协助重建工作。"
 building_type_ruin_infamous_01:0 "声名狼藉的废墟"
 building_ruin_infamous_01:0 "声名狼藉的废墟"
 building_ruin_infamous_01_desc:0 "这片土地上的废墟被认为是充满诅咒和不幸的地方。人们对重建工作望而却步，担心给自己招来灾祸，甚至都不愿靠近这里。"
 building_type_ruin_wildfire_01:0 "野火爆炸！"
 building_ruin_wildfire_01:0 "猖獗野火"
 building_ruin_wildfire_01_desc:0 "野火在废墟中燃烧，对任何不熟练处理绿色火焰的人造成致命伤害。"
 building_ruin_wildfire_02:0 "受控的野火"
 building_ruin_wildfire_02_desc:0 "现在野火已经被控制住了，威胁不再那么令人担忧，重建的过程也变得容易了。然而，现在被烧毁的废墟周围的土地和人都遭受了损失。"
 agot_ruin_begin_reconstruction:0 "重建废墟"
 agot_ruin_begin_reconstruction_desc:0 "废墟重建工作在有序进行，现在逐渐恢复昔日的辉煌。"
 agot_ruin_reconstruction:0 "重建中的废墟"
 agot_ruin_reconstruction_desc:0 "这座废墟已经开始恢复往日风采。"
 RUIN_MUST_BEGIN_CONSTRUCTION:0 "你必须先开始[reconstruction_effort|E]。"
 ABANDON_RUIN_BUTTON:0 "放弃废墟"
 ABANDON_RUINS_TOOLTIP:0 "放弃重建废墟，让它继续荒废下去。"
 agot_ruins_character_desc:0 "[CHARACTER.Custom('RuinsHistory')]"
 ruin_history_castamere:0 "在无能的狮子泰陀斯·兰尼斯特治下，兰尼斯特家族和雷耶斯家族间维系了千年的同盟与臣属关系终于走向了灭亡。泰陀斯软弱、善良，甚至不愿主动去讨回贷款，而他的封臣们正是利用了这一点。罗杰·雷耶斯在此受益最多，他的亲族兄弟都对没牙的狮子的无能统治乐享其成。卡斯特梅无止休地向凯岩城索取着，罗杰大人已经证明了红狮的爪子比任何金狮的都要锋利。因此，当年轻的狮子替父亲来捕食时，罗杰又怎会多加在意？他的傲慢将导致他整个家族的灭亡，因为这头年轻的狮子不是别人，正是未来的泰温·兰尼斯特大人。最终，泰温收回了他父亲的封臣们所欠下的债务，并灭亡了反叛的塔贝克家族和雷耶斯家族。当兰尼斯特大军抵达卡斯特梅城下时，塔贝克家族已经毁灭，罗杰大人亦被弩箭射伤，神智不清。他的兄弟雷纳德带着剩余的人躲进了卡斯特梅的地底，并写信提议和解，但塔贝克家族的遭遇和卡斯特梅的名字已经预示了他们的接下来的命运。泰温派人封住雷耶斯矿井所有的入口，并将附近的一条溪流改道流入矿井。任何防御措施都阻挡不住滚滚的流水。据说夜里兰尼斯特的守卫听到了微弱的尖叫和嘶喊，这成了雷耶斯家族最后的反抗声浪。\n\n伟大的卡斯特梅就这样一直矗立着，这是曾经一个伟大家族的水墓。或许某天会有人来揭开这座无言的墓碑……"
 ruin_history_hellgate:0 "狱门厅曾是旱地家族的居城，如今已是一片废墟。旱地家族曾在这个古老的堡垒里统治着硫磺河王国，不向任何人低头。但当娜梅莉亚和洛伊拿人抵达后他们才明白，某个多恩的家族有能力摧毁他们的壁垒。"
 ruin_history_woodfoot:0 "席恩·史塔克第一次把铁民赶出熊岛时，这块地被赐给了伍德福特家族。伍德福特家族在近1500年的时间里保护着这个岛不受任何威胁。但在罗若·葛雷乔伊的领导下，铁种毁灭了伍德富特家族，重新夺回了熊岛。然而，即使伍德福特家族已经灭亡，但古老的伍德福特堡的废墟仍然存在。"
 ruin_history_skane:0 "斯凯恩盛宴；在北境，谁不知道斯卡格斯人和他们臭名昭著的斯凯恩盛宴？当斯卡格斯人还拥有船只时，他们登上了附近的斯凯恩岛，就在那里，他们俘虏了该岛的所有居民。幸运者被掳掠为奴工妻妾，不幸者则被当作斯卡格斯人的盛宴的食物。这场宴会结束了，而斯凯恩岛至今仍空无一人。"
 ruin_history_oldstones:0 "历代河流王一直是学士和河间地贵族间的争论话题。但可以肯定的是，第一个被称为河流和山丘之王的主要家族是穆德家族，他们也是最后一个拥有这个头衔的先民家族。穆德列王就是在今天被称为荒石城的城堡中统治着河间地，在其统治后期，他们与安达尔入侵者展开作战。特里斯蒂芬四世战败后，这座城堡随穆德王国一同毁灭。"
 ruin_history_summerhall:0 "戴伦二世国王成功将多恩并入七大王国后，他在多恩边疆地的山脉上建造了一座夏季行宫，即著名的盛夏厅，以此表明了他对和平的追求。盛夏时节，王室经常会将这里作为躲避君临城燥热空气的居所。戴伦二世后来将这里赐给了他的小儿子，即后来的梅卡一世。梅卡在他哥哥的统治时期和后来他自己的统治时期都一直保留着这个头衔。在他去世时，盛夏厅传给它最后一任主人——「不该成王的王」伊耿五世。正是在深受爱戴的伊耿国王治下，「盛夏厅的悲剧」发生了。当时国王召集亲友，希望能把龙重新带回这个世界。结果是，大部分王室成员连同盛夏厅一齐葬身在了火海。直到今天，盛夏厅仍然空无一人，满目疮痍。当听到歌声时，这里方能被重新唤起一丝活力。"
 ruin_history_morne:0 "这里曾是塔斯的王庭，安达尔人占领岛屿之后，塔斯家族的历代「暮之星」开始了对蓝宝石之岛的统治。时光流逝，塔斯家族与杜兰登家族联姻后，他们的王国并入了后者的风暴王国，王庭随之衰落，如今只剩废墟。"
 ruin_history_landless:0 ""
 ruin_history_generic:0 "从维斯特洛到厄斯索斯，从索斯罗斯到乌尔特斯，这个世界的每片土地上几乎都散布着废墟。它们有的曾经是伟大的城堡或要塞，在抵御外敌数千年后，终于被粉碎在了某个不可战胜的敌人脚下；有的只是瞭望塔或小堡垒，在经受数次小规模的侵袭后，渐渐被遗忘在了时间的某个角落。它们大多有属于自己的传说、故事或歌谣，吟游诗人们传唱着它们毁灭的故事，以及一些被遗忘的谎言和不为人知的秘辛。\n\n要宣称被摧毁的伯爵领并开始重建，请进入地产视图并选择“重建废墟”。当你拥有一个废墟男爵领时，你可以升级主废墟建筑来开始重建。"
 reconstruct_ruin_confirm_title:0 "开始重建？"
 reconstruct_small_ruin_confirm_desc:0 "重建废墟是一项艰巨的、昂贵的、甚至是危险的工作，你确定要开始进行重建工作吗？\n\n初期投入至少需要@gold_icon!#high 200#!。"
 reconstruct_med_ruin_confirm_desc:0 "重建废墟是一项艰巨的、昂贵的、甚至是危险的工作，你确定要开始进行重建工作吗？\n\n初期投入至少需要@gold_icon!#high 400#!。"
 reconstruct_large_ruin_confirm_desc:0 "重建废墟是一项艰巨的、昂贵的、甚至是危险的工作，你确定要开始进行重建工作吗？\n\n初期投入至少需要@gold_icon!#high 600#!。"
 reconstruct_small_ruin_tooltip:0 "开始重建项目，你必须拥有至少@gold_icon!#high 200#!，并且与废墟接壤或是其法理领主。"
 reconstruct_med_ruin_tooltip:0 "开始重建项目，你必须拥有至少@gold_icon!#high 400#!，并且与废墟接壤或是其法理领主。"
 reconstruct_large_ruin_tooltip:0 "开始重建项目，你必须拥有至少@gold_icon!#high 600#!，并且与废墟接壤或是其法理领主。"
 reconstruct_ruin_confirm_button:0 "确认"
 agot_ruins.1000.t:0 "不再荒废"
 agot_ruins.1000.d:0 "一砖一瓦，一砖一瓦，在我面前的那些曾经被粉碎成灰烬尘埃的东西，现在完全恢复了模样。在学士和泥瓦匠的帮助下，废墟已被重建得尽可能接近其原始设计。\n\n然而，现在还有一个问题——#italic 我们重建它的目的是什么？#!\n\n建造高大的城墙可以把这里改造成一座坚固的城堡，在这附近建造房屋和市场的话这里可能会兴起一座熙熙攘攘的城镇，或者我们可以把这里改造得更神圣、更宗教，让它成为一个受人尊敬的礼拜场所。\n\n分析了各种选择后，我决定应该……"
 agot_ruins.1000.a:0 "一座宏伟的城堡。"
 agot_ruins.1000.b:0 "一座辉煌的城市。"
 agot_ruins.1000.c:0 "一座笃诚者的庙宇。"
 reconstruct_summerhall_tooltip:0 "就连工人也觉得这里命运多舛，拒绝在这里工作。你将无法重建盛夏厅。"
 agot_ruin_disease_modifier:0 "废墟疾病调试修正"
 agot_ruin_disease_modifier_desc:0 "该修正将保护废墟免于疾病。"
 agot_ruins.2000.t:0 "悲剧后的宝藏"
 agot_ruins.2000.d:0 "重建项目动工伊始，盛夏厅的悲剧就像一朵乌云笼罩着我们。部分迷信的工人在私下里议论，说这个地方遭到过诅咒，那一晚死去的坦格利安的亡魂依然在这片石墙间游荡。即使是那些对鬼怪传闻不屑一顾的人，在工具丢失或轻微事故发生时，也不免会感到有些害怕。\n\n然而，今天，我发现那场悲剧留下的不是诅咒，而是祝福。在重建工作即将完成之际，我的人发现了一个隐藏的密室！当我踏入那密室时，喜悦之情一时难以抑制，我不禁欢呼起来。密室的中央放着一张小桌子，桌子上面放着一张枕垫，而在这个枕垫上，放着一枚完好无瑕的龙蛋！"
 agot_ruins.2000.a:0 "多棒的发现！"
 agot_ruins.3000.t:0 "重建开始"
 agot_ruins.3000.d:0 "重建命令下达后，石匠们便已投入到了紧张的工作中。我满怀期待，盼望着目睹这座北境力量的丰碑重现辉煌。\n\n颈泽的这座雄伟要塞，如今仅余三座塔楼矗立，沼泽中覆盖着白色幽灵草，仿佛在诉说着昔日的威严。假以时日，我将重建那二十座塔楼，让这个地方再度成为令人敬畏的堡垒。\n\n待到工程圆满完成之日，未经邀请，无人能再从此地通行！"
 agot_ruins.3000.a:0 "泽地人的古老要塞将重现于世！"
 agot_ruins.3001.t:0 "塔楼重建"
 agot_ruins.3001.d:0 "卡林湾的重建工程正迅速推进。二十座塔楼拔地而起，取代了这里曾经的三座塔楼，城墙所用的黑石与要塞初建时如出一辙。\n\n这座要塞现已离其古时的雄伟模样更进一步，连同其生命力也一并回到了这些石墙之中。\n\n森林之子塔——相传古时的森林之子正是在此举行了召唤「海水之锤」的仪式——如今其塔尖已得到修复，但不少迷信的工人们仍在窃窃私语，谈论着在夜晚时分听到的孩童呓语。"
 agot_ruins.3001.a:0 "这座城堡中蕴含着……超自然的力量。"
 agot_ruins.3001.b:0 "让工人回去继续工作！我们的任务还没完成！"
 agot_ruins.3002.t:0 "最后阶段"
 agot_ruins.3002.d:0 "石匠们正忙碌于完成宏伟蓝图所需的最后几块石料。昔日，卡林湾陷于沼泽的黑暗与迷雾之中，沦为废墟，被遗弃在颈泽的泥泞水域里，任由岁月侵蚀。\n\n如今，它已几乎重现昔日的荣光。很快，我将令其城墙坚不可摧，让其高大的塔楼再次耸立，并且配备充足的人手来守护它。\n\n试问，有了这样的要塞，谁还敢轻易向北境发起挑战？"
 agot_ruins.3002.a:0 "这里将再次成为北境的屏障！"
 agot_ruins.3003.t:0 "卡林湾重建"
 agot_ruins.3003.d:0 "卡林湾的重建已然大功告成。颈泽的守军再不必藏身于沼泽之中，再无需对来犯之敌畏缩不前；如今，这座要塞正巍峨挺立，连带城楼上的守军也一样。\n\n四下环顾，城堡的周围遍布着凶恶野兽出没的沼泽，二十座高塔在浓密的沼泽上投下长长的影子，显得尤为雄伟壮观。昔日的安达尔人正是倒在了这片城墙下，他们如同海浪冲击峭壁一般，在此地撞得粉身碎骨。\n\n即便是[GetScriptedCharacterByHistoryID('Stark_12').GetFirstNameNicknamed]，见到这般奇观，也定会赞叹不已！"
 agot_ruins.3003.a:0 "[ROOT.Char.GetHouse.GetName]家族也有“筑城者”！"
 agot_ruins.3003.a_stark:0 "祖先，愿这一切光耀你的名字。"
 agot_ruins.3003.b:0 "让所有人都来见证我的杰作！"
 agot_ruins.9999.t:0 "重建停止"
 agot_ruins.9999.opening:0 "重建这样的废墟可不是件容易的事，我必须提前布置好很多工作。对现在来说，推迟这项任务也许是明智的选择。\n\n尽管我们要做的事情还有很多，"
 agot_ruins.9999.no_stress:0 "我的心最近也没什么阴霾；"
 agot_ruins.9999.one_stress:0 "但近期的压力已经开始影响我的思绪；"
 agot_ruins.9999.two_stress:0 "但我的神经已经紧绷得悬于一发；"
 agot_ruins.9999.three_stress:0 "但我整个人已处在崩溃的边缘；"
 agot_ruins.9999.recent_loss:0 "但失去[deceased_character.GetName]的痛苦占据了我的整个内心；"
 agot_ruins.9999.at_war:0 "我的精力不得不放在近期爆发的战争上，领地的经济正不堪重负，"
 agot_ruins.9999.poor:0 "我的国库已经快要耗尽，而我很清楚继续重建会消耗多少资金，"
 agot_ruins.9999.bankrupt:0 "我的国库已经破产，负债继续工程是不现实的，"
 agot_ruins.9999.lazy:0 "未来会怎样又有谁知道呢。何况，我为什么要那么辛苦工作呢，"
 agot_ruins.9999.greedy:0 "未来会怎样又有谁知道呢。我宁可把黄金存起来也不想继续投在这无底洞里面，"
 agot_ruins.9999.fickle:0 "未来会怎样又有谁知道呢。何况，我早就知道这个工程会出问题，"
 agot_ruins.9999.paranoid:0 "未来会怎样又有谁知道呢。而且，把这么多人手“聚在一起”，难保他们不会密谋些什么，"
 agot_ruins.9999.impatient:0 "未来会怎样又有谁知道呢。而且，我才不想等上好多年才能看见重建的回报，"
 agot_ruins.9999.someone_else:0 "再怎么说，这个项目也不是我动工的，"
 agot_ruins.9999.relation:0 "尽管[restoration_constructor.GetName]很希望能看到工程的进展，但我近期还有很多要紧的事要做，"
 agot_ruins.9999.outro:0 "所以对我来说，最好的解决办法是将这件无止境的工作暂时放下。"
 agot_ruins.9999.a:0 "重建工作就先到这里吧。"
 agot_ruins.4000.t:0 "恐怖塔重建"
 agot_ruins.4000.d:0 "我仰望着扭曲残破的赫伦堡废墟。如果这个地方要再次强大，我必须选择从哪里开始。审视着五座高塔熔毁的残迹，我终于明白当年赫伦为何敢挑衅巨龙。这座堡垒在全盛之时，必会让人自觉不可战胜。\n\n最终，我的目光落在恐怖塔上——这便是我的起点。"
 agot_ruins.4000.a:0 "开工！"
 agot_ruins.4001.t:0 "第一座塔楼竣工"
 agot_ruins.4001.desc:0 "我疯狂的计划已然启动，五座塔楼中，已有一处恢复了曾经壮丽的模样。如今的「恐怖塔」，既得名既源于它阴森可怖的外观，也源于其本身的功能属性。塔内的监狱已扩建完毕，不仅经过了翻新，还增设了防御工事，整座建筑也重新变得坚固牢靠。\n\n这仅仅是重建工作的第一步，就已经完成得极为出色。"
 agot_ruins.4001.a:0 "还有很多工作要做。"
 agot_ruins.4001.b:0 "我应该研究一下重建计划。"
 agot_ruins.4001.c:0 "我期盼着把这些新牢房填满。"
 agot_ruins.4001.d:0 "给工人们带啤酒来！"
 agot_ruins.4002.t:0 "号哭塔重生"
 agot_ruins.4002.d:0 "继「恐怖塔」后，我重建的下一步便是「号哭塔」。这座塔的第一层是至关重要的仓库与粮仓，冬季到来时，我们将全靠这里储存的物资度日。塔身地基必须重新修建，还需翻整地面，以恢复通往地窖的通道。\n\n龙焰曾将石头熔化，但我们的汗水必将令其重焕生机。"
 agot_ruins.4002.a:0 "让我们立即开始。"
 agot_ruins.4002.a_lazy:0 "反正流汗的差事轮不到我……"
 agot_ruins.4003.t:0 "沉默塔"
 agot_ruins.4003.desc:0 "尽管仍有人声称在黑暗中听到低语声，但至少这座受诅咒城堡的哀嚎声已经平息。赫伦堡的第二座塔楼已然完工，那些曾让风发出诡异声响的裂缝也已被封堵。许多工人终于迎来了自动工到现在第一个能安稳入眠的夜晚。\n\n有人说，这是我们辛勤劳作的成果；也有人说，我们终于让老赫伦得到了安息。"
 agot_ruins.4003.a:0 "当然，我们都生活在一位蓝眼巨人的眼睛里。"
 agot_ruins.4003.b:0 "灵魂得到了安抚……我也是如此。"
 agot_ruins.4003.c:0 "这诅咒或许不仅仅是风那么简单。"
 agot_ruins.4003.d:0 "终于！尖叫声结束了！"
 agot_ruins.4003.e:0 "我们已用时间证明，任何事情都可以解决。"
 agot_ruins.4004.t:0 "厉鬼塔升起"
 agot_ruins.4004.d:0 "「恐怖塔」与「号哭塔」如今已然高耸矗立，我的注意力随即转向了「厉鬼塔」。这是赫伦诸塔中损毁最严重的一座，它残破扭曲的塔身在城堡的圣堂上空投下支离破碎的阴影，且能清晰望见东门的景象。若想让此地为我所用，我必须将这三者全部修复加固。\n\n这绝非易事，但那些已然完工的塔楼，正为我注入力量！"
 agot_ruins.4004.a:0 "召集工人。"
 agot_ruins.4004.b:0 "又一个源于迷信传说的名字。"
 agot_ruins.4004.c:0 "为什么人们总爱选最可怕的名字？"
 agot_ruins.4005.t:0 "驱逐厉鬼"
 agot_ruins.4005.d:0 "重建的屋顶、加固的墙壁、翻新的房间，这座臭名昭著的「厉鬼塔」，如今终于更适合生者居住，而非让鬼魂栖身。\n\n尽管仍有大量工作待完成，但这座堡垒如今望去，已远不似一片废墟，更像一座坚固要塞。很快，赫伦的野心便会彻底重生。我应当为已取得的成就心怀感激。\n\n心中满是祷告之意，可面对那座圣堂，我该如何处置才好？"
 agot_ruins.4005.a:0 "七神信徒有权在那里自由祈祷。"
 agot_ruins.4005.a_father:0 "我将向天父祈祷。"
 agot_ruins.4005.a_mother:0 "我将向圣母祈祷。"
 agot_ruins.4005.a_warrior:0 "我将向战士祈祷。"
 agot_ruins.4005.a_smith:0 "我将向铁匠祈祷。"
 agot_ruins.4005.a_maiden:0 "我将向少女祈祷。"
 agot_ruins.4005.a_crone:0 "我将向老妪祈祷。"
 agot_ruins.4005.a_stranger:0 "我将向陌客祈祷。"
 agot_ruins.4005.b:0 "或许那里供奉的神祇，能更护佑我呢？"
 agot_ruins.4005.c:0 "这里仍将作为祭祀之地——但供奉的是真正的神祇。"
 agot_ruins.4006.t:0 "寡妇之家"
 agot_ruins.4006.d:0 "我将目光投向「寡妇塔」——雷妮亚·坦格利安太后晚年隐居之处。\n\n这座塔楼的修缮必须格外用心，因为届时它需要与「焚王塔」搭建通道相连。如今的赫伦堡已再度以雄伟要塞的姿态矗立，尽管要在此居住仍让人望而生畏。这座「寡妇塔」将成为我们解决这一问题的关键。"
 agot_ruins.4006.d_before_rhaena:0 "我将目光投向[GetBuilding('building_ruins_harrenhal_05').GetNameNoTooltip]。\n\n这座塔楼的修缮必须格外用心，因为届时它需要与「焚王塔」搭建通道相连。如今的赫伦堡已再度以雄伟要塞的姿态矗立，尽管要在此居住仍让人望而生畏。这座「寡妇塔」将成为我们解决这一问题的关键。"
 agot_ruins.4006.a:0 "让寡妇恢复曾经的美丽。"
 agot_ruins.4007.t:0 "高贵的寡妇"
 agot_ruins.4007.desc:0 "「寡妇塔」的重建工作已然完成。这座曾供龙太后居住的寝宫，如今的模样远比她晚年所居的环境要宜居得多。\n\n赫伦堡已从一座怪诞的废墟，蜕变为几分趋近美观的建筑。昔日的恐惧得以缓解，号哭归于沉寂，鬼魂驱逐无踪，而那位寡妇也得到尊敬。如今，所有凝望这高耸城墙的人，眼中所见不再是那座被龙焰焚毁、残破不堪的墓碑，而是一座经人力修复重生的坚固要塞。\n\n修复最后一座塔楼的时刻，很快就要到来了。"
 agot_ruins.4007.desc_before_rhaena:0 "「寡妇塔」的重建工作已然完成。\n\n赫伦堡已从一座怪诞的废墟，蜕变为几分趋近美观的建筑。昔日的恐惧得以缓解，号哭归于沉寂，鬼魂驱逐无踪，而那位寡妇也得到尊敬。如今，所有凝望这高耸城墙的人，眼中所见不再是那座被龙焰焚毁、残破不堪的墓碑，而是一座经人力修复重生的坚固要塞。\n\n修复最后一座塔楼的时刻，很快就要到来了。"
 agot_ruins.4007.a:0 "赫伦堡很快将被重建。"
 agot_ruins.4007.b:0 "我将这些努力献给雷妮亚太后。"
 agot_ruins.4007.c:0 "我明白雷妮亚为什么选它了。"
 agot_ruins.4007.c_before_rhaena:0 "这里倒是很适合做私人的起居室。"
 agot_ruins.4007.d:0 "工人在王后的房间里发现了些奇怪的东西……"
 agot_ruins.4007.d_before_rhaena:0 "工人在某个房间里发现了些奇怪的东西……"
 agot_ruins.4007.d_tt:0 "凭借你的神秘学知识，你能理解那些遗留的奇怪物品"
 agot_ruins.4008.t:0 "最终之塔"
 agot_ruins.4008.d:0 "「焚王塔」是五座塔楼中最高大的。赫伦与他的儿子们们便是在此殒命，他们尖叫着被龙焰烤熟。曾坐落于塔内的百炉厅，也必将很快重焕生机。届时，这里将再度成为全维斯特洛最宏伟的厅堂，与这座最具威慑力的城堡相得益彰。\n\n当年被龙焰所摧毁的一切，如今必须由我们亲手复原。"
 agot_ruins.4008.a:0 "我要最坚固的石料和最熟练的石匠！"
 agot_ruins.4009.t:0 "五塔并立"
 agot_ruins.4009.desc:0 "尽管它的名字有些夸张，名字里的百座壁炉实际只建有三十五座，但这座大厅的修建绝非易事。工程所耗费的时间、人力，以及过程中遭遇的困难，都远超我的想象。不过，赫伦堡的五座塔楼终于悉数修复完成了。\n\n如今，离我完全修复这座宏伟的堡垒，几乎已经没什么阻碍了。"
 agot_ruins.4009.a:0 "恐惧的余烬终于熄灭了。"
 agot_ruins.4009.b:0 "我将亲自监督此事直至重建成功。"
 agot_ruins.4009.c:0 "我现在明白了——火就是力量。"
 agot_ruins.4009.d:0 "赫伦的骄傲就是教训。"
 agot_ruins.4010.t:0 "伤痕之创"
 agot_ruins.4010.d:0 "赫伦堡已重新拾得几分生机。它曾是一座深陷厄运、阴森扭曲的堡垒，如今却在时间与人力的重塑下，蜕变为一座宏伟的城堡。\n\n尽管龙焰灼烧后的伤疤仍然残留在城墙上，但放眼望去，能与我的城堡这般辉煌相匹敌者寥寥。总会有人私下谈论它的诅咒与阴影，但这座城堡的气场已然彻底改变。\n\n五座塔楼虽已完好如初，但仍然还需要再努力一段时间。\n\n终点已然在望，不容再拖延分毫！"
 agot_ruins.4010.a:0 "去干活！"
 agot_ruins.4010.a_arrogant:0 "赫伦建造了赫伦堡，而我重建了它。"
 agot_ruins.4011.t:0 "赫伦堡重生"
 agot_ruins.4011.desc:0 "清晨，我眺望自己的成果。初升的日光将神木林中的心树镀上粼粼光泽，这棵心树挺立在哨兵松林间，透着一股傲然之气。正午时分，站在高耸的城墙上远眺神眼湖，湖面在烈日当头的照耀下熠熠生辉；到了傍晚，百炉厅温暖着厅内的每一个人，金色的光芒洒满整座堡垒。\n\n这里生机勃勃，仆人与工匠在广阔的庭院中往来忙碌。所有踏入此地的人，无不为它的宏伟壮观而惊叹。\n\n仍有人私下谈论着怪异的梦境与阴森的幻象，还声称听到了来自千面屿的远古事物发出的遥远呼唤，但我毫不在意。这片土地如今属于我，再也没有任何神明能将它据为己有。"
 agot_ruins.4011.a:0 "让所有看到这地方的人都颤抖吧！"
 agot_ruins.4011.b:0 "如今这里归我所有，与赫伦当年别无二致。"
 agot_ruins.4011.b_hoare:0 "赫伦用汗水筑成的，又用鲜血重建了。"
 agot_ruins.4011.c:0 "既然我能缔造，便能摧毁。"
 agot_ruins.4011.d:0 "一条龙毁灭的，由另一条龙来守护。"
 agot_ruins.4011.e:0 "城堡不惧任何军队，我也不惧任何龙。"
 agot_ruins.4100.a:0 "我的信仰绝非虚妄。"
 the_seven_main:0 "维斯特洛的大多数人信奉七神。"
 servants_of_the_star:0 "其他信仰都是错误的，纯洁者才是正途"
 baelorism:0 "[GetScriptedCharacterByHistoryID( 'Targaryen_82' ).GetFirstName]是最虔诚之人！我必敬奉他！"
 warring_star:0 "我们将崇拜「所有安达尔人的国王」的传说，也许甚至能实现他的目标"
 weirwood_of_the_seven:0 "七神曾通过鱼梁木传达神谕，它们本是为同一神祇"
 hugor_start:0 "「丘陵之王」胡戈的古道，始于七位一体之神自我显现之时"
 original_fots:0 "安达尔人最古老、也是最接近真实教义的信仰"