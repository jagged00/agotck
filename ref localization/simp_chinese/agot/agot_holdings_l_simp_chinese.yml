 unknown_generic:0 "世界何其广阔，而其中大半土地，远非那些固守一隅的人所能理解或关心。尽管地图可能标出了遥远的海岸与传闻中的土地，但这些地方远非领主与国王所能触及，更与身边能遭遇的种种相去甚远。我们无从知晓远方究竟有什么。我们的目光始终停留在近处，停留在可以统治与记录的事物上。至于其他一切，就目前而言，都超出了能去考虑的范围，无人问津，也无人关注。"
 wilderness_holding:0 "荒野"
 wilderness_holding_concept_key:0 "[wilderness_holding|E]"
 wilderness_generic:0 "世界各处散布着许多无主的土地，从冰封的苔原到酷热的雨林，从广袤的草原到幽暗的森林。它们有些曾是伟大王国的领土，历经数个世纪荒废重归于自然；有些则环境恶劣、难以生存，从未有统治者真正征服过它们。许多无主的土地隐藏着危险、奇异生物，或早已被遗忘的秘密。\n\n要宣称一处荒野伯爵领并开始定居，请进入地产视图并选择“殖民”。当你拥有一个定居点男爵领时，你可以升级主定居点建筑来开始建设。"
 settlement_holding:0 "定居点"
 settlement_holding_concept_key:0 "[settlement_holding|E]"