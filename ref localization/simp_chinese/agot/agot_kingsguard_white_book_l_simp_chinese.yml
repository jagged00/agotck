 agot_kingsguard_white_book.0001.t:0 "白典"
 agot_kingsguard_white_book.0001.desc:0 "我翻阅着白典的书页，阅读那些曾披上白袍者的姓名与事迹。每一段记载都述说着勇气、职责与牺牲，让我想起御林铁卫对王室立下的庄严誓言。"
 agot_kingsguard_white_book.0001.a:0 "#bold 翻到这页#!"
 agot_kingsguard_white_book.0001.b:0 "#bold 合上书册#!"
