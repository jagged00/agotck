l_simp_chinese:
 nick_agot_historical_ambercloak:0 "琥珀斗篷"
 nick_agot_historical_anvil_of_hammerhal:0 "铁锤镇的铁砧"
 nick_agot_historical_anvilbreaker:0 "破砧者"
 nick_agot_historical_anvilbreaker_desc:0 "一位无畏的铁种掠袭者，[CHARACTER.GetShortUINameNoTooltipNoFormat]记不清有多少颗脑袋被[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的砧子粉碎。"
 nick_agot_historical_apple_eater:0 "苹果食客"
 nick_agot_historical_apple_eater_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在黑水河的血战中斩杀了两位红苹果家的骑士，又生擒了一位绿苹果家骑士，由此赢得了这个外号。"
 nick_agot_historical_appleseed:0 "苹果核"
 nick_agot_historical_badbrother:0 "坏人"
 nick_agot_historical_badbrother_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U]当选为国王后立即处死了老国王所有的小儿子们，很多人认为这点与[Select_CString( CHARACTER.IsLocalPlayer, '你', '其')]家族的名字不符。"
 nick_agot_historical_be_lucky:0 "幸运"
 nick_agot_historical_be_lucky_desc:0 "由于只剩下一只眼睛，很多人怀疑[CHARACTER.GetShortUINameNoTooltipNoFormat]是够真的担得起这个外号。"
 nick_agot_historical_big_belly:0 "大肚子"
 nick_agot_historical_big_liddle:0 "大里德尔"
 nick_agot_historical_big_liddle_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]生的比一般人高些，因作为里德尔大人的长子而得此外号。"
 nick_agot_historical_bittersteel:0 "寒铁"
 nick_agot_historical_bittersteel_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是伊耿四世的私生子，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]因刻薄的性格和战斗的勇猛而闻名。"
 nick_agot_historical_black_bear:0 "黑熊"
 nick_agot_historical_black_pearl:0 "黑珍珠"
 nick_agot_historical_blackbean:0 "黑豆"
 nick_agot_historical_blackbolt:0 "黑闪电"
 nick_agot_historical_blackcrown:0 "黑冠"
 nick_agot_historical_blackfish:0 "黑鱼"
 nick_agot_historical_blackfish_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]的哥哥曾称[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]是徒利家族的“害群黑羊”，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]随后用黑鱼作为自己的纹章，这点后来广为人知。"
 nick_agot_historical_blackheart:0 "黑心"
 nick_agot_historical_blackheart_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]因盾牌上的纹章而得名于此，尽管[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的名声令人畏惧，但[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]却有一颗与此绰号不符的内心。"
 nick_agot_historical_blacklance:0 "黑枪"
 nick_agot_historical_blackshield:0 "黑盾"
 nick_agot_historical_blacksword:0 "黑剑"
 nick_agot_historical_blackthumb:0 "黑拇指"
 nick_agot_historical_bleak:0 "阴冷的"
 nick_agot_historical_bloodaxe:0 "血斧"
 nick_agot_historical_bloodbeard:0 "血胡子"
 nick_agot_historical_bloodbeard_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]以浓密的火红腮须和长辫子而闻名，但获得这个绰号的原因可不止于此。"
 nick_agot_historical_bloodborn:0 "浴血"
 nick_agot_historical_bloodless:0 "无血"
 nick_agot_historical_bloodraven:0 "血鸦"
 nick_agot_historical_bloodraven_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是伊耿四世的私生子，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]出生时脖子上有一块乌鸦型的红酒色胎记，在奶白色的皮肤上额外显眼。"
 nick_agot_historical_bloody:0 "嗜血"
 nick_agot_historical_bluespur:0 "蓝刺"
 nick_agot_historical_bluetooth:0 "蓝牙"
 nick_agot_historical_bonehand:0 "骨手"
 nick_agot_historical_bonesuckled:0 "骨饲"
 nick_agot_historical_books:0 "书本"
 nick_agot_historical_brave_bentbow:0 "勇敢弯弓"
 nick_agot_historical_breakbones:0 "碎骨人"
 nick_agot_historical_breakbones_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]的身体天生孔武有力，几乎被认为是世上最强壮的人。"
 nick_agot_historical_breakspear:0 "破矛者"
 nick_agot_historical_breakspear_desc:0 "在17岁时，[CHARACTER.GetShortUINameNoTooltipNoFormat]在一场比武大会中击败了伟大的战士戴蒙·黑火爵士，由此赢得了「破矛者」的称号。"
 nick_agot_historical_breaksword:0 "断剑"
 nick_agot_historical_brightflame:0 "明焰"
 nick_agot_historical_brightflame_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]因[Select_CString( CHARACTER.IsLocalPlayer, '', '其')]不拘一格的行为而闻名，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]更喜欢被称为「明焰」。"
 nick_agot_historical_brightmane:0 "亮鬃"
 nick_agot_historical_brightrune:0 "闪耀符文"
 nick_agot_historical_brightsmile:0 "欢笑"
 nick_agot_historical_bronze:0 "青铜"
 nick_agot_historical_bronze_axe:0 "铜斧"
 nick_agot_historical_bronze_bitch:0 "青铜婊子"
 nick_agot_historical_bronze_bitch_desc:0 "由于[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]的家族的有一套古老的青铜盔甲，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的丈夫戴蒙便借此起这个外号嘲笑[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]。"
 nick_agot_historical_browntooth:0 "褐牙"
 nick_agot_historical_buckets:0 "木桶"
 nick_agot_historical_cleftjaw:0 "裂颚"
 nick_agot_historical_cleftjaw_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]的下颚几乎被一柄长斧劈成两半，最终在[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]嘴上留下了个可怕的伤疤。"
 nick_agot_historical_clubfoot:0 "弯足"
 nick_agot_historical_clubfoot_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]的一只脚天生扭曲变形，这一不幸困扰着[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的整个一生。"
 nick_agot_historical_coldwind:0 "寒风"
 nick_agot_historical_cornburner:0 "焚谷者"
 nick_agot_historical_corpse:0 "快死的"
 nick_agot_historical_cotter:0 "卡特"
 nick_agot_historical_crabfeeder:0 "螃蟹喂食者"
 nick_agot_historical_crabfeeder_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]下令将数百名海盗绑在海滩上任由螃蟹啃食。"
 nick_agot_historical_crowfood:0 "鸦食"
 nick_agot_historical_crowfood_desc:0 "有一次[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]在路边睡觉，一只乌鸦以为[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]是死人而啄掉了[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]一只眼睛，然后[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]反手就一口咬掉了乌鸦的头。"
 nick_agot_historical_crowkiller:0 "猎鸦"
 nick_agot_historical_crowkiller_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因杀害了大量守夜人兄弟而得名。"
 nick_agot_historical_crows_eye:0 "鸦眼"
 nick_agot_historical_crows_eye_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]的左眼处戴着一只黑皮革眼罩，有人嘀咕那是一只闪烁着恶意的黑眼睛。"
 nick_agot_historical_dame_of_andalos:0 "安达斯之祸"
 nick_agot_historical_damphair:0 "湿发"
 nick_agot_historical_damphair_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]在一场风暴中险些丧命，结果却奇迹般地冲上了岸边。[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]因此决定将自己的一生奉献给淹神，自此始终保持一头湿发。"
 nick_agot_historical_dance_for_me:0 "舞蹈师"
 nick_agot_historical_darkrobin:0 "暗罗宾"
 nick_agot_historical_darkstar:0 "暗黑之星"
 nick_agot_historical_darkstar_desc:0 "人们称[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]为「暗黑之星」，因[CharYouSheHe(CHARACTER)|U]属于黑夜。"
 nick_agot_historical_dashing_prefix:0 "风度翩翩的"
 nick_agot_historical_deaf:0 "聋子"
 nick_agot_historical_dim:0 "呆子"
 nick_agot_historical_dolorous:0 "忧郁的"
 nick_agot_historical_dour_prefix:0 "阴沉的"
 nick_agot_historical_dread_prefix:0 "恐怖的"
 nick_agot_historical_drunken_giant:0 "醉巨人"
 nick_agot_historical_evenstar:0 "暮之星"
 nick_agot_historical_ever_sweet:0 "最香甜的"
 nick_agot_historical_ever_sweet_desc:0 "传说[CHARACTER.GetShortUINameNoTooltipNoFormat]极度喜欢蜂蜜，以至于她在大山之中与蜂王订下契约，许诺将会永世照顾蜂王的子嗣及后代。"
 nick_agot_historical_fairhands:0 "公平手"
 nick_agot_historical_falconhelm:0 "隼盔"
 nick_agot_historical_fighting_fool:0 "武痴小丑"
 nick_agot_historical_fireball:0 "火球"
 nick_agot_historical_fireball_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]因火红的头发和火爆的脾气而获得这个外号，很多人认为[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]是[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]所处时代最杰出的骑士之一。"
 nick_agot_historical_first_goose:0 "第一羽"
 nick_agot_historical_first_goose_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是三胞胎中最先诞下的孩子。"
 nick_agot_historical_flatnose:0 "扁鼻"
 nick_agot_historical_fletcher:0 "造箭者"
 nick_agot_historical_four_groats:0 "四银币"
 nick_agot_historical_fourskins:0 "四形人"
 nick_agot_historical_fourskins_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是位天赋异禀的易形者，同时操控着四只野兽。"
 nick_agot_historical_foxglove:0 "福克斯伍"
 nick_agot_historical_frostfinger:0 "冻指"
 nick_agot_historical_frostfinger_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]曾被关在冰笼里冻掉了两根手指。"
 nick_agot_historical_gatehouse:0 "门房"
 nick_agot_historical_gatehouse_desc:0 "据说[CHARACTER.GetShortUINameNoTooltipNoFormat|U]会为每个靠近的骑士打开自己的“城门”。"
 nick_agot_historical_giantsbane:0 "巨人克星"
 nick_agot_historical_giantsbane_desc:0 "据说[CHARACTER.GetShortUINameNoTooltipNoFormat]曾经杀死了一个巨人，而[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]自己却声称只是剖开了正在熟睡的巨人的肚子，并藏在里面取暖，以躲避暴风雪——并在春季巨人醒来后被哺乳了三个月的奶。"
 nick_agot_historical_ginger:0 "姜"
 nick_agot_historical_godsgrief:0 "神见愁"
 nick_agot_historical_godsgrief_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]赢得了海神和风之女神的女儿美丽的依妮的芳心，娶她为妻。为此，海神和风之女神将怒火倾泻在[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的居所，接连摧毁六座城堡，直到第七座也是最后一座城堡——风息堡——才抵挡住神的怒火。"
 nick_agot_historical_gold_tree:0 "金树"
 nick_agot_historical_golden:0 "金发"
 nick_agot_historical_goldstag:0 "金鹿"
 nick_agot_historical_great_axe:0 "巨斧"
 nick_agot_historical_greatheart:0 "雄心"
 nick_agot_historical_greatjon:0 "大琼恩"
 nick_agot_historical_greatjon_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是个巨人般的壮汉，身高七尺，体型更是两倍于常人。这位拳头大如火腿的可怕战士，被许多人视为维斯特洛眼下最强壮的人之一。"
 nick_agot_historical_greenbeard:0 "绿胡子"
 nick_agot_historical_greenbeard_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U]的胡子被染成了亮绿色。"
 nick_agot_historical_greenhand:0 "青手"
 nick_agot_historical_greensail:0 "绿帆"
 nick_agot_historical_grey_eyes:0 "灰眼"
 nick_agot_historical_greycloak:0 "灰袍"
 nick_agot_historical_greysteel:0 "灰铁"
 nick_agot_historical_greysteel_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是位有些名望的骑士，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的武器技巧足以传授给一般人。"
 nick_agot_historical_half_hoare:0 "半血霍尔"
 nick_agot_historical_halfblood:0 "半血"
 nick_agot_historical_halfdrowned:0 "半淹人"
 nick_agot_historical_halfhand:0 "断掌"
 nick_agot_historical_halfhand_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]在某场战斗或事故中失去了半只手。"
 nick_agot_historical_hard:0 "硬汉"
 nick_agot_historical_hardhand:0 "强手"
 nick_agot_historical_hardstone:0 "顽石"
 nick_agot_historical_hodor:0 "阿多"
 nick_agot_historical_hodor_desc:0 "阿多。"
 nick_agot_historical_homeless:0 "无家可归的"
 nick_agot_historical_homeless_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]生在流亡途中，跟着流浪的黄金团长大，从来找不到一个可以称之为家的地方。"
 nick_agot_historical_honeyed:0 "蜂蜜"
 nick_agot_historical_hot:0 "热"
 nick_agot_historical_ice_eyes:0 "冰眼"
 nick_agot_historical_inkpots:0 "墨水瓶"
 nick_agot_historical_iron:0 "钢铁"
 nick_agot_historical_iron_banger:0 "铁棒"
 nick_agot_historical_ironfoot:0 "铁足"
 nick_agot_historical_ironhand:0 "铁手"
 nick_agot_historical_ironhand_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]在围攻派克城之战中因功而被册封为骑士，是役[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]失去了右手，之后[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]换上了一只铁手。"
 nick_agot_historical_ironrod:0 "铁棍"
 nick_agot_historical_jingelbells:0 "铃铛响"
 nick_agot_historical_jingelbells_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是孪河城的智障儿子，总是戴着一个缀满小铜铃的鹿角王冠。"
 nick_agot_historical_kegs:0 "木桶"
 nick_agot_historical_kin_killer:0 "弑亲者"
 nick_agot_historical_kin_killer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]杀死了迷恋[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U]女儿的亲哥哥杜伦。"
 nick_agot_historical_knight_of_the_moon:0 "月亮骑士"
 nick_agot_historical_knight_of_the_pantry:0 "储食室骑士"
 nick_agot_historical_lame:0 "跛子"
 nick_agot_historical_lame_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]天生长着一条扭曲的腿。"
 nick_agot_historical_lap_goose:0 "舔鹅"
 nick_agot_historical_lap_goose_desc:0 "即使「疯王」犯下了无数罪行，[CHARACTER.GetShortUINameNoTooltipNoFormat]却仍忠于责任，不渝地效忠王室。"
 nick_agot_historical_lazy:0 "懒人"
 nick_agot_historical_left_hand:0 "左手"
 nick_agot_historical_lefthand:0 "左手"
 nick_agot_historical_lemoncloak:0 "柠檬斗篷"
 nick_agot_historical_lemoncloak_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]所着的斗篷而得名：一件宽大的黄色连帽斗篷，这使[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]看上去像一只巨大的黄色鸟儿。"
 nick_agot_historical_lightheart:0 "轻快者"
 nick_agot_historical_little_liddle:0 "小里德尔"
 nick_agot_historical_little_liddle_desc:0 "作为里德尔的第三个儿子，时间会证明[CHARACTER.GetShortUINameNoTooltipNoFormat]是否配得上[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的名字。"
 nick_agot_historical_littlefinger:0 "小指头"
 nick_agot_historical_littlefinger_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]体格短小纤瘦，同时家族的封地是五指半岛上最小的指头，故而得此绰号。"
 nick_agot_historical_littlefoot:0 "小脚趾"
 nick_agot_historical_longaxe:0 "长斧"
 nick_agot_historical_longinch:0 "长人"
 nick_agot_historical_longneck:0 "长脖子"
 nick_agot_historical_longneck_the_hanged:0 "吊死的长脖子"
 nick_agot_historical_longneck_the_thrice_hanged:0 "长脖子吊死三度"
 nick_agot_historical_longneck_the_twice_hanged:0 "长脖子吊死二度"
 nick_agot_historical_longspear_ryk:0 "长矛"
 nick_agot_historical_longspear_ryk_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在打仗时从不使用长矛，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的“长矛”藏在裤子里。"
 nick_agot_historical_longthorn:0 "长刺"
 nick_agot_historical_lophand:0 "独臂"
 nick_agot_historical_lophand_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因为盗窃罪而失去一只手，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]始终对这一判决愤愤不平。"
 nick_agot_historical_lord_of_battles:0 "战神"
 nick_agot_historical_lord_of_daughters:0 "女儿领主"
 nick_agot_historical_maidensbane:0 "处女之祸"
 nick_agot_historical_maidensbane_desc:0 "作为铁群岛至高王，[CHARACTER.GetShortUINameNoTooltipNoFormat]劫掠了青亭岛，并掳走了所有三十岁以下的女人。"
 nick_agot_historical_merry:0 "欢乐的"
 nick_agot_historical_middle_liddle:0 "中里德尔"
 nick_agot_historical_middle_liddle_desc:0 "[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]因作为里德尔大人的次子而得此名号，虽然这种叫法并不怎么常用。"
 nick_agot_historical_milk_eye:0 "奶眼"
 nick_agot_historical_milk_eye_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位臭名昭著的海盗王，曾在马赛岬一带同风暴王埃里希·杜兰登七世作战。"
 nick_agot_historical_mossdear:0 "苔藓爱人"
 nick_agot_historical_nine_eyes:0 "九眼"
 nick_agot_historical_nine_eyes_desc:0 "“欢乐伙伴”凶名远扬的团长，[CHARACTER.GetShortUINameNoTooltipNoFormat]是臭名昭著的九人团的成员之一。"
 nick_agot_historical_noseless:0 "没鼻子"
 nick_agot_historical_noseless_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]被寒冬冻掉了鼻尖。"
 nick_agot_historical_oakenfist:0 "橡木拳"
 nick_agot_historical_oakenfist_desc:0 "在「女儿们的战争」期间，[CHARACTER.GetShortUINameNoTooltipNoFormat]驾驶着旗舰“雷妮丝女王号”，如一只硕大的橡木拳撞沉了布拉佛斯的巨舰“大挑战号”。"
 nick_agot_historical_oakshanks:0 "橡木柄"
 nick_agot_historical_of_many_honors:0 "盛名的"
 nick_agot_historical_of_oldstones:0 "荒石城的"
 nick_agot_historical_of_oldstones_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一个发际插满鲜花的神秘女孩，她自称是荒石城古代河流王的后代。"
 nick_agot_historical_of_red_lake:0 "红湖的"
 nick_agot_historical_of_red_lake_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是传说中「青手」加尔斯的女儿，安家在红湖之畔，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的后人至今居住在那里。据说这个女人是一位易形者，能够随意变化成鹤。"
 nick_agot_historical_of_sour_hill:0 "酸丘的"
 nick_agot_historical_of_sour_hill_desc:0 "一个容貌沧桑的老骑士，但身手快过年龄只有[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]一半的人，[CHARACTER.GetShortUINameNoTooltipNoFormat]自称曾参加过一百场战斗。"
 nick_agot_historical_of_the_black_hood:0 "黑帽"
 nick_agot_historical_of_the_black_hood_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]承袭了[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]父亲作为赫伦堡领主的可怕名声。"
 nick_agot_historical_of_the_bloody_blade:0 "血刃"
 nick_agot_historical_of_the_bloody_blade_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在蓝湖旁大肆屠杀森林之子，导致湖水变红，蓝湖因此被称作红湖。"
 nick_agot_historical_of_the_brown_shield:0 "棕盾"
 nick_agot_historical_of_the_brown_shield_desc:0 "一个名声很差的雇佣骑士，[CHARACTER.GetShortUINameNoTooltipNoFormat]总是带着一面高大的深色风筝木盾，盾上镶有铁边但未涂颜料。"
 nick_agot_historical_of_the_golden_bowl:0 "金碗"
 nick_agot_historical_of_the_high_tower:0 "参天塔的"
 nick_agot_historical_of_the_mirror_shield:0 "镜盾"
 nick_agot_historical_of_the_mirror_shield_desc:0 "传说[CHARACTER.GetShortUINameNoTooltipNoFormat]藏身于一面抛光的盾牌后，用反射迷惑住了恶龙乌拉克斯，最后用矛插进龙的眼睛杀死了它。"
 nick_agot_historical_of_the_red_smile:0 "血色微笑"
 nick_agot_historical_of_the_tower:0 "塔城的"
 nick_agot_historical_of_the_vines:0 "葡萄藤"
 nick_agot_historical_of_the_vines_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是传说中「青手」加尔斯的儿子，据说曾教会了青亭岛上的人如何酿造红酒。"
 nick_agot_historical_of_the_woods:0 "林地的"
 nick_agot_historical_old_hawk:0 "鹰老"
 nick_agot_historical_old_tattersalt:0 "老破烂"
 nick_agot_historical_old_tattersalt_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因总是穿着破败褪色的黑衣而得名。"
 nick_agot_historical_one_ear:0 "独耳"
 nick_agot_historical_one_eye:0 "独眼"
 nick_agot_historical_one_hand:0 "独手"
 nick_agot_historical_one_hand_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]在第一次多恩战争中被多恩人俘虏，被砍去了持剑手以确保不会再次侵犯多恩。"
 nick_agot_historical_palehair_gaemon:0 "淡发"
 nick_agot_historical_palehair_gaemon_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]拥有坦格利安家族相似的淡色银发，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的母亲宣称[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]是伊耿二世的私生子。"
 nick_agot_historical_pennylover:0 "拜金伯爵"
 nick_agot_historical_pimple:0 "疙瘩脸"
 nick_agot_historical_pimple_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U]的脸上长满了疙瘩，周围人总是喜欢强调这一点。"
 nick_agot_historical_pinchface:0 "长脸"
 nick_agot_historical_pinchpenny:0 "窄钱"
 nick_agot_historical_preachfire:0 "传火者"
 nick_agot_historical_priestkiller:0 "牧师屠手"
 nick_agot_historical_priestkiller_desc:0 "当[CHARACTER.GetShortUINameNoTooltipNoFormat|U]下令在老威克岛建立圣堂时，淹神的牧师拿起武器反抗，却被[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]屠杀一空。"
 nick_agot_historical_queen_lorea:0 "罗娜女王"
 nick_agot_historical_queen_lorea_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]喜爱穿着[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]妻子的服饰装扮成一名普通的妓女，漫步在兰尼斯港码头。"
 nick_agot_historical_ragged:0 "破烂"
 nick_agot_historical_ragged_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是穷人集会的领导者之一，但[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的支持者与强盗已无太大区别。"
 nick_agot_historical_rattleshirt:0 "叮当衫"
 nick_agot_historical_raven_feeder:0 "喂鸦者"
 nick_agot_historical_raven_feeder_desc:0 "「丑陋的」埃里希被「白杖」加隆废黜后，[CHARACTER.GetShortUINameNoTooltipNoFormat]在选王会上当选为铁群岛新一任至高王。"
 nick_agot_historical_ravenfriend:0 "鸦友"
 nick_agot_historical_reaversbane:0 "强盗克星"
 nick_agot_historical_red_oarsman:0 "红桨手"
 nick_agot_historical_red_spear:0 "红矛"
 nick_agot_historical_redarm_royce:0 "红臂"
 nick_agot_historical_redarm_royce_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因喜欢将犯人的内脏直接空手掏出而臭名昭著。"
 nick_agot_historical_redback:0 "红背"
 nick_agot_historical_redbeard:0 "红胡子"
 nick_agot_historical_redhand_line:0 "血手"
 nick_agot_historical_redhand_line_desc:0 "这是乌伦·葛雷艾恩的后代，他是第一个终结了选王会，令铁群岛之王头衔世袭的国王。"
 nick_agot_historical_redhand_urron:0 "血手"
 nick_agot_historical_redhand_urron_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]派遣刀斧手袭击了娜伽山丘上的选王会，杀死了所有与会者，终结了选王会的传统。"
 nick_agot_historical_redraven:0 "红鸦"
 nick_agot_historical_redraven_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因[Select_CString( CHARACTER.IsLocalPlayer, '你', '其')]红色的头发而得名——或者说这是某位歌手给歌曲中“撒丫子”找的个韵词。"
 nick_agot_historical_redsteel:0 "红铁"
 nick_agot_historical_redtusk:0 "红牙"
 nick_agot_historical_reek:0 "臭佬"
 nick_agot_historical_reek_desc:0 "臭佬，臭佬，押韵丑陋。"
 nick_agot_historical_salt_beard:0 "盐须"
 nick_agot_historical_sealskinner:0 "海豹剥皮人"
 nick_agot_historical_seaspray:0 "浪花"
 nick_agot_historical_seastar:0 "洋星"
 nick_agot_historical_seastar_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]的母亲以“海洋之星”为女儿命名，[CHARACTER.GetShortUINameNoTooltipNoFormat]被誉为七国最美丽的女人。"
 nick_agot_historical_second_goose:0 "第二羽"
 nick_agot_historical_second_goose_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是三胞胎中第二个诞下的孩子。"
 nick_agot_historical_sharpgrove:0 "尖树丛"
 nick_agot_historical_sheepstealer:0 "偷羊贼"
 nick_agot_historical_shieldbreaker:0 "破盾者"
 nick_agot_historical_shitmouth:0 "臭嘴"
 nick_agot_historical_shortfoot:0 "短足"
 nick_agot_historical_shortfoot_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在年轻时被影子山猫咬掉了半只脚。"
 nick_agot_historical_sick_leek:0 "病韭菜"
 nick_agot_historical_silveraxe:0 "银斧"
 nick_agot_historical_silverhorn:0 "银号角"
 nick_agot_historical_sixskins:0 "六形人"
 nick_agot_historical_sixskins_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是位天生的易形者，[Select_CString( CHARACTER.IsLocalPlayer, '你', '其')]同时操控着三只狼、一只雪熊、一只鹰，以及一只影子山猫。"
 nick_agot_historical_sly:0 "狡诈的"
 nick_agot_historical_small:0 "小"
 nick_agot_historical_smalljon:0 "小琼恩"
 nick_agot_historical_smalljon_desc:0 "尽管[CHARACTER.GetShortUINameNoTooltipNoFormat]的绰号带“小”，但[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]与[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的父亲几乎一般魁梧强壮，甚至有望能超越父亲。"
 nick_agot_historical_snowbeard:0 "雪胡王"
 nick_agot_historical_snowbeard_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]统治了北境将近一百年——在此期间王国面临内忧外患。"
 nick_agot_historical_softspear:0 "软矛"
 nick_agot_historical_softspear_desc:0 "作为马赛家族的末代国王，[CHARACTER.GetShortUINameNoTooltipNoFormat]在风暴王科尔顿·杜兰登二世攻陷马赛岬后被杀害。"
 nick_agot_historical_sourmouth:0 "臭嘴"
 nick_agot_historical_speardancer:0 "矛舞者"
 nick_agot_historical_spearlover:0 "爱矛者"
 nick_agot_historical_spotted_butcher:0 "斑点"
 nick_agot_historical_spotted_butcher_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]被称为「斑点」汤姆，仅此而已。"
 nick_agot_historical_squire:0 "侍从"
 nick_agot_historical_stammerer:0 "结巴"
 nick_agot_historical_star_eyes:0 "星眼"
 nick_agot_historical_star_eyes_desc:0 "歌手传唱，[CHARACTER.GetShortUINameNoTooltipNoFormat]用两颗蓝宝石替代了失去的双眼。"
 nick_agot_historical_starfire_samwell:0 "星火"
 nick_agot_historical_starfire_samwell_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是星坠城领主兼湍流河之王，曾一度攻陷旧镇。"
 nick_agot_historical_steelshanks:0 "铁腿"
 nick_agot_historical_steelshanks_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是个身材高大且性格阴郁的男人，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]因长腿上一直戴着铁护胫而闻名。"
 nick_agot_historical_steelsong:0 "钢铁之歌"
 nick_agot_historical_stonehand:0 "石手"
 nick_agot_historical_stoneheart:0 "石心"
 nick_agot_historical_stonesnake:0 "石蛇"
 nick_agot_historical_stormborn:0 "风暴降生"
 nick_agot_historical_stormborn_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]诞生在一场造成巨大破坏的大风暴中。"
 nick_agot_historical_stormsword:0 "暴风之剑"
 nick_agot_historical_strongboar:0 "壮猪"
 nick_agot_historical_strongboar_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]高大强壮，声音洪亮，有些人认为[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]是全维斯特洛活着的所有人里最强壮的。"
 nick_agot_historical_stump_hand:0 "瘸手"
 nick_agot_historical_stump_hand_desc:0 "传说[CHARACTER.GetShortUINameNoTooltipNoFormat]通过手指舞赢得了[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的王冠，代价仅仅为两根手指。"
 nick_agot_historical_sweetberry:0 "小瑞瑞"
 nick_agot_historical_sweetberry_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是塞妮拉公主的闺中密友，公主为[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]起了这个小名。"
 nick_agot_historical_swiftspur:0 "迅鞭"
 nick_agot_historical_swordbiter:0 "剑客"
 nick_agot_historical_tailcutter:0 "断尾者"
 nick_agot_historical_the_acolyte:0 "助理学士"
 nick_agot_historical_the_architect:0 "建筑师"
 nick_agot_historical_the_arrogant:0 "骄傲的"
 nick_agot_historical_the_artist:0 "艺术家"
 nick_agot_historical_the_bad_apple:0 "烂苹果"
 nick_agot_historical_the_bad_apple_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位臭名昭著的流亡骑士，也是九人团的成员之一。"
 nick_agot_historical_the_barren:0 "不育的"
 nick_agot_historical_the_bat:0 "蝙蝠"
 nick_agot_historical_the_bear:0 "熊"
 nick_agot_historical_the_beast_of_harrenhal:0 "赫伦堡的凶兽"
 nick_agot_historical_the_beggar_king:0 "乞丐王"
 nick_agot_historical_the_beggar_king_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]按法理应该成为国王，但这和现实存在不少差距。"
 nick_agot_historical_the_belly:0 "大肚子"
 nick_agot_historical_the_belly_lorimer:0 "大肚子"
 nick_agot_historical_the_belly_lorimer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]体型肥胖，肚子尤其的大，总是忍不住伸手去碰食物。"
 nick_agot_historical_the_besieger:0 "围城者"
 nick_agot_historical_the_big_bucket:0 "大酒桶"
 nick_agot_historical_the_big_man:0 "大人物"
 nick_agot_historical_the_big_man_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]身高六尺半，腿粗的像树干，手粗的像火腿，而且没脖子。"
 nick_agot_historical_the_big_prefix:0 "大"
 nick_agot_historical_the_black:0 "黑心"
 nick_agot_historical_the_black_centaur:0 "黑人马"
 nick_agot_historical_the_black_dragon:0 "黑龙"
 nick_agot_historical_the_black_dragon_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是伊耿四世的私生子，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的纹章是红底黑龙。"
 nick_agot_historical_the_black_harren:0 "黑心"
 nick_agot_historical_the_black_harren_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位被[Select_CString( CHARACTER.IsLocalPlayer, '你', '其')]治下人民所憎恶的虚荣且残酷的暴君，[Select_CString( CHARACTER.IsLocalPlayer, '你', '其')]修建赫伦堡的工程给河间地与铁群岛带来了沉重的负担。"
 nick_agot_historical_the_black_lion:0 "黑狮"
 nick_agot_historical_the_black_prefix:0 "黑"
 nick_agot_historical_the_black_priest:0 "黑袍祭司"
 nick_agot_historical_the_black_rose:0 "黑玫瑰"
 nick_agot_historical_the_black_shepherd:0 "黑牧羊人"
 nick_agot_historical_the_black_swan:0 "黑天鹅"
 nick_agot_historical_the_black_swan_historical_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]在年轻时被奴役，最后成为了一个极受欢迎的交际花，甚至可以说是里斯的实际统治者。"
 nick_agot_historical_the_black_tempest:0 "黑风暴"
 nick_agot_historical_the_black_widow:0 "黑寡妇"
 nick_agot_historical_the_blackhand:0 "黑手"
 nick_agot_historical_the_blackmane:0 "黑鬃"
 nick_agot_historical_the_blessed:0 "受神祝福的"
 nick_agot_historical_the_blessed_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是如此的神圣，想必是受到过神的祝福。"
 nick_agot_historical_the_blind:0 "瞎子"
 nick_agot_historical_the_blind_bastard:0 "瞎眼杂种"
 nick_agot_historical_the_blind_bowman:0 "盲弓手"
 nick_agot_historical_the_blind_king:0 "瞎王"
 nick_agot_historical_the_blue_bard:0 "蓝诗人"
 nick_agot_historical_the_blue_bard_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]全身都穿着蓝色，甚至照着泰洛西风尚将及肩卷发也染成了蓝色。"
 nick_agot_historical_the_boar:0 "野猪"
 nick_agot_historical_the_boarkiller:0 "野猪杀手"
 nick_agot_historical_the_boarkiller_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是英雄纪元的传奇人物，也是克雷赫家族的创始人。"
 nick_agot_historical_the_boastful:0 "自夸的"
 nick_agot_historical_the_boisterous:0 "喧闹的"
 nick_agot_historical_the_boor:0 "无礼之徒"
 nick_agot_historical_the_boy_king:0 "少年国王"
 nick_agot_historical_the_boy_king_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]在年幼时便开始统治，因此被称为少年国王。"
 nick_agot_historical_the_brave:0 "勇敢的"
 nick_agot_historical_the_brave_baelor:0 "勇敢的"
 nick_agot_historical_the_brave_baelor_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]第一次进龙穴就打了贝勒里恩的鼻子，因此被称为「勇敢的[CHARACTER.GetFirstName]」。"
 nick_agot_historical_the_breaker_bulwer:0 "破坏者"
 nick_agot_historical_the_breaker_bulwer_desc:0 "相传，[CHARACTER.GetShortUINameNoTooltipNoFormat]喝下公牛鲜血后能获得二十人之力，最终却因喝得太多，长出了一副牛角。"
 nick_agot_historical_the_breaker_bulwer_line:0 "破坏者"
 nick_agot_historical_the_breaker_bulwer_line_desc:0 "这是「破坏者」博洛斯的后代，他是「青手」加尔斯的儿子兼布尔威家族的创始人。"
 nick_agot_historical_the_breaker_stark:0 "解放者"
 nick_agot_historical_the_breaker_stark_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]终结了夜王十三年的统治，将守夜人从奴役中解放出来。"
 nick_agot_historical_the_breaker_stark_line:0 "解放者"
 nick_agot_historical_the_breaker_stark_line_desc:0 "这是冬境之王「解放者」布兰登的后代。"
 nick_agot_historical_the_bridegroom:0 "新郎"
 nick_agot_historical_the_bridegroom_garland:0 "新郎"
 nick_agot_historical_the_bridegroom_garland_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]通过将自己的女儿嫁给莱蒙·海塔尔大人，并休掉发妻迎娶莱蒙的女儿，从而将旧镇并入河湾王国。"
 nick_agot_historical_the_bronzeman:0 "铜人"
 nick_agot_historical_the_brown_dragon:0 "烂泥龙"
 nick_agot_historical_the_brown_dragon_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在一次比武对决中被击落掉进泥坑，不幸地获得「烂泥龙」的绰号，这是对[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]父亲的绰号「黑龙」的嘲弄。"
 nick_agot_historical_the_bull:0 "大牛"
 nick_agot_historical_the_bull_of_blackcrown:0 "黑冠城的大牛"
 nick_agot_historical_the_burner:0 "焚船者"
 nick_agot_historical_the_burner_desc:0 "当父亲远航日落之海失踪后，[CHARACTER.GetShortUINameNoTooltipNoFormat]沉浸在悲痛之中，下令放火烧毁了父亲所有的船。"
 nick_agot_historical_the_butcher:0 "屠夫"
 nick_agot_historical_the_callow:0 "笨拙的"
 nick_agot_historical_the_chain:0 "锁链"
 nick_agot_historical_the_cheerful:0 "欢愉的"
 nick_agot_historical_the_chestmaker:0 "金库制造者"
 nick_agot_historical_the_chestnut:0 "栗子"
 nick_agot_historical_the_child:0 "男童"
 nick_agot_historical_the_child_desc:0 "这位总主教以在年幼时被不顾众人反对推举为总主教而闻名。"
 nick_agot_historical_the_chopper:0 "手斧"
 nick_agot_historical_the_clever:0 "机灵的"
 nick_agot_historical_the_cloakless:0 "无袍的"
 nick_agot_historical_the_clubfoot:0 "弯足"
 nick_agot_historical_the_clubfoot_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]的一只脚天生扭曲变形，这一不幸困扰着[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的整个一生。"
 nick_agot_historical_the_collector:0 "收藏家"
 nick_agot_historical_the_conciliator:0 "和解者"
 nick_agot_historical_the_conciliator_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因伟大的外交和政治行为而闻名于整个王国。"
 nick_agot_historical_the_conqueror_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]所处时代的杰出人物，通过血与火征服了七大王国。"
 nick_agot_historical_the_corpsekiller:0 "屠尸手"
 nick_agot_historical_the_corpsekiller_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]在阿斯塔波攻防战中将「屠夫王」克莱昂斩于马下，这本该是莫大的荣誉——如果克莱昂不是一具套上盔甲绑在马上的尸体的话。"
 nick_agot_historical_the_cousin:0 "表亲"
 nick_agot_historical_the_crab:0 "螃蟹"
 nick_agot_historical_the_crackclaw:0 "蟹爪"
 nick_agot_historical_the_craftsman:0 "工匠"
 nick_agot_historical_the_creator:0 "创造者"
 nick_agot_historical_the_curt:0 "无礼的"
 nick_agot_historical_the_daring:0 "大胆"
 nick_agot_historical_the_daring_daeron:0 "大胆"
 nick_agot_historical_the_daring_daeron_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]在年仅十三岁时骑着[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的龙特赛里恩拯救了蒙德·海塔尔的军队，因此被授予了「大胆」的绰号。"
 nick_agot_historical_the_darling_of_the_vale:0 "谷地的宠儿"
 nick_agot_historical_the_darling_of_the_vale_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是一位有名望的骑士，[CharYouHerHis(CHARACTER)]英俊潇洒，风度翩翩，且举止彬彬有礼。"
 nick_agot_historical_the_daughter_of_the_dusk:0 "幽暗之女"
 nick_agot_historical_the_daughterless:0 "失女者"
 nick_agot_historical_the_daughterless_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U]唯一的女儿被「吟游诗人」贝尔偷走了，她在差不多一年后带着贝尔的私生子归家。"
 nick_agot_historical_the_defiant_argrave:0 "豪胆的"
 nick_agot_historical_the_defiant_argrave_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位来自纳尼的骑士，效力于巴特威大人，常被形容为瘦削而严厉的人。"
 nick_agot_historical_the_defiant_daena:0 "违命的"
 nick_agot_historical_the_defiant_daena_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]无比任性，一直以反抗哥哥贝勒的幽禁而闻名。"
 nick_agot_historical_the_delayer:0 "拖延者"
 nick_agot_historical_the_delayer_desc:0 "因不愿与教团武装作为敌，[CHARACTER.GetShortUINameNoTooltipNoFormat]在月亮修士与其追随者于抵达旧镇时，对他们紧闭大门。"
 nick_agot_historical_the_demon:0 "恶魔"
 nick_agot_historical_the_demon_of_darry:0 "戴瑞家的戴莫"
 nick_agot_historical_the_demonlover:0 "恶魔情人"
 nick_agot_historical_the_dim:0 "笨蛋"
 nick_agot_historical_the_dogshead:0 "狗头"
 nick_agot_historical_the_dour_dorden:0 "阴沉的"
 nick_agot_historical_the_dour_durran:0 "严厉的"
 nick_agot_historical_the_dour_durran_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因在弯河之战中杀死巨人王「最后的」伦旺而闻名于世。"
 nick_agot_historical_the_dragonbane:0 "龙祸"
 nick_agot_historical_the_dragonbane_desc:0 "由于最后一条龙死在了[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的统治期间，[CHARACTER.GetShortUINameNoTooltipNoFormat]被人称为「龙祸」。"
 nick_agot_historical_the_dragonknight_historic:0 "龙骑士"
 nick_agot_historical_the_dragonknight_historic_desc:0 "[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]高贵且英勇，是个真正的坦格利安，[CHARACTER.GetShortUINameNoTooltipNoFormat]被称为「龙骑士」。"
 nick_agot_historical_the_dragonless:0 "无龙者"
 nick_agot_historical_the_dragonless_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]没能像家族的其他人一样孵化并驯服一条龙。"
 nick_agot_historical_the_dread:0 "恐怖者"
 nick_agot_historical_the_dreamer:0 "梦行者"
 nick_agot_historical_the_drunkard:0 "醉鬼"
 nick_agot_historical_the_drunken:0 "醉鬼"
 nick_agot_historical_the_dutiful:0 "尽职者"
 nick_agot_historical_the_eagle_desc:0 "尽管父亲「强奸魔」拉瓦斯败给了「饿狼」席恩，但[CHARACTER.GetShortUINameNoTooltipNoFormat]仍继续掠夺北境的西海岸。"
 nick_agot_historical_the_eastern:0 "东大陆人"
 nick_agot_historical_the_ebon_prince:0 "乌木王子"
 nick_agot_historical_the_fair:0 "美人"
 nick_agot_historical_the_faithful:0 "虔诚者"
 nick_agot_historical_the_falcon_knight:0 "猎鹰骑士"
 nick_agot_historical_the_falcon_knight_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]的盾牌上绘有明月与猎鹰的图案，而[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的银色战盔上则装饰着一对猎鹰的翅膀。"
 nick_agot_historical_the_fat_one:0 "胖子"
 nick_agot_historical_the_fatherless:0 "无父者"
 nick_agot_historical_the_fierce:0 "凶猛的"
 nick_agot_historical_the_fighter:0 "战士"
 nick_agot_historical_the_fishwife:0 "鱼妇"
 nick_agot_historical_the_flamboyant:0 "浮夸者"
 nick_agot_historical_the_flea:0 "跳蚤"
 nick_agot_historical_the_forgotten:0 "被遗忘的"
 nick_agot_historical_the_fox:0 "狐狸"
 nick_agot_historical_the_fox_knight:0 "狐狸骑士"
 nick_agot_historical_the_frog:0 "青蛙"
 nick_agot_historical_the_fury:0 "狂怒的"
 nick_agot_historical_the_gardener:0 "园丁"
 nick_agot_historical_the_garlic:0 "蒜头"
 nick_agot_historical_the_giantslayer:0 "巨人杀手"
 nick_agot_historical_the_giantslayer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在黑城堡之战中用长枪杀死了一个逃跑的巨人，之后还砍下了它的头，由此赢得了这个绰号。"
 nick_agot_historical_the_girlfather:0 "少女之父"
 nick_agot_historical_the_glorious:0 "光荣的"
 nick_agot_historical_the_glorious_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]因足智多谋和战果斐然获得了很多的荣耀。"
 nick_agot_historical_the_glutton:0 "暴食的"
 nick_agot_historical_the_goat:0 "山羊"
 nick_agot_historical_the_gods_fearing:0 "神惧"
 nick_agot_historical_the_goldenhand:0 "金手"
 nick_agot_historical_the_goldsmith:0 "金器匠"
 nick_agot_historical_the_green_lady:0 "绿女士"
 nick_agot_historical_the_green_lion:0 "绿狮"
 nick_agot_historical_the_green_oak:0 "绿橡树"
 nick_agot_historical_the_grey:0 "灰人"
 nick_agot_historical_the_grey_lion:0 "灰狮"
 nick_agot_historical_the_grey_thunder:0 "灰闪电"
 nick_agot_historical_the_grim_handed:0 "冷手"
 nick_agot_historical_the_guest:0 "婚宴客"
 nick_agot_historical_the_haggler:0 "嘴炮"
 nick_agot_historical_the_half_year_queen:0 "半载女王"
 nick_agot_historical_the_half_year_queen_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]只在王位上坐了半年就被迫逃亡。"
 nick_agot_historical_the_halfwild:0 "半野人"
 nick_agot_historical_the_ham:0 "火腿"
 nick_agot_historical_the_hammer_of_justice:0 "正义之锤"
 nick_agot_historical_the_hammer_of_justice_desc:0 "据说[CHARACTER.GetShortUINameNoTooltipNoFormat]身经百战，赢下了九十九场，只输了一场——输在了最后一场，同时对上七位安达尔国王的联军。"
 nick_agot_historical_the_hardhead:0 "固执的"
 nick_agot_historical_the_harelip:0 "兔唇"
 nick_agot_historical_the_harper:0 "琴手"
 nick_agot_historical_the_haunted:0 "鬼魅缠身者"
 nick_agot_historical_the_heartless:0 "没心肝"
 nick_agot_historical_the_hell_knight:0 "地狱骑士"
 nick_agot_historical_the_high_lickspittle:0 "大马屁精"
 nick_agot_historical_the_high_lickspittle_desc:0 "这位总主教以对国王的忠诚著称。"
 nick_agot_historical_the_holy_fool:0 "虔诚傻瓜"
 nick_agot_historical_the_honorable:0 "正直的"
 nick_agot_historical_the_hopeful:0 "希望的"
 nick_agot_historical_the_horsekiller:0 "屠马手"
 nick_agot_historical_the_host:0 "招待"
 nick_agot_historical_the_host_desc:0 "与[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的前几任至高王不同，[CHARACTER.GetShortUINameNoTooltipNoFormat]欢迎世界各地的旅行者和商人们来铁群岛游历。"
 nick_agot_historical_the_hound:0 "猎狗"
 nick_agot_historical_the_humpback:0 "驼子"
 nick_agot_historical_the_hungry:0 "饥饿的"
 nick_agot_historical_the_hungry_wolf:0 "饿狼"
 nick_agot_historical_the_hungry_wolf_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]从安达尔人和铁民的入侵中保卫了北境，因常年征战而被称为「饿狼」。"
 nick_agot_historical_the_hunter:0 "猎人"
 nick_agot_historical_the_illuminator:0 "光照者"
 nick_agot_historical_the_imp:0 "小恶魔"
 nick_agot_historical_the_implacable:0 "躁动的"
 nick_agot_historical_the_inked:0 "眷录者"
 nick_agot_historical_the_iron_serpent:0 "铁蛇"
 nick_agot_historical_the_ironmonger:0 "铁王"
 nick_agot_historical_the_jewel_of_the_eyrie:0 "鹰巢城的明珠"
 nick_agot_historical_the_jolly:0 "快乐"
 nick_agot_historical_the_jousting_lord:0 "比武领主"
 nick_agot_historical_the_jousting_lord_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]以在骑枪比武上的技巧而闻名。"
 nick_agot_historical_the_joyful:0 "快乐的"
 nick_agot_historical_the_keg_o_ale:0 "酒桶"
 nick_agot_historical_the_king_who_flew:0 "飞上天的国王"
 nick_agot_historical_the_king_who_flew_desc:0 "小[CHARACTER.GetShortUINameNoTooltipNoFormat|U]以国王的身份骑着瓦格哈尔绕着巨人之枪的峰顶飞了三圈，着陆时便成了领主。"
 nick_agot_historical_the_king_who_knelt:0 "降服王"
 nick_agot_historical_the_king_who_knelt_desc:0 "为了不遭受与赫伦堡与「怒火燎原」同样的命运，[CHARACTER.GetShortUINameNoTooltipNoFormat]选择向「征服者」伊耿屈膝臣服，放弃了北境的王冠。"
 nick_agot_historical_the_kingmaker:0 "拥王者"
 nick_agot_historical_the_kingslayer:0 "弑君者"
 nick_agot_historical_the_kinslayer:0 "弑亲者"
 nick_agot_historical_the_kinslayer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]囚禁了哥哥并自立为山谷之王，当谷地的领主们要求[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]释放他们的合法封君时，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]将哥哥从月门丢了下去。"
 nick_agot_historical_the_knight_of_flowers:0 "百花骑士"
 nick_agot_historical_the_knight_of_kisses:0 "热吻骑士"
 nick_agot_historical_the_knight_of_the_flame:0 "烈焰骑士"
 nick_agot_historical_the_knight_of_the_fountains:0 "泉水骑士"
 nick_agot_historical_the_knight_of_the_fountains_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位在比武大会上小有名气的骑士。"
 nick_agot_historical_the_knight_of_the_twilight:0 "黄昏骑士"
 nick_agot_historical_the_knight_of_the_twilight_desc:0 "在「征服多恩」期间，[CHARACTER.GetShortUINameNoTooltipNoFormat]曾一度是红堡的人质，而后[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]成为了枪之子的创始人之一。"
 nick_agot_historical_the_krakens_daughter:0 "海怪之女"
 nick_agot_historical_the_lace_serpent:0 "蕾丝蛇"
 nick_agot_historical_the_lackwit:0 "白痴"
 nick_agot_historical_the_last:0 "末代王"
 nick_agot_historical_the_last_loren:0 "末代王"
 nick_agot_historical_the_last_loren_desc:0 "末代凯岩王，[CHARACTER.GetShortUINameNoTooltipNoFormat]在「怒火燎原」中幸存后向「征服者」伊耿屈膝臣服。"
 nick_agot_historical_the_last_reaver:0 "最后的掠夺者"
 nick_agot_historical_the_last_reaver_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]曾企图将落日之海据为己有，不断袭扰西海岸——此后多年再无铁群岛领主敢如此行事。"
 nick_agot_historical_the_last_valyrian:0 "最后的瓦雷利亚人"
 nick_agot_historical_the_last_valyrian_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是个臭名昭著的掠夺者，出身于里斯海盗领主家族，据传是瓦雷利亚人的后裔。"
 nick_agot_historical_the_late_lord:0 "迟到的"
 nick_agot_historical_the_late_lord_desc:0 "在劳勃起义期间，[CHARACTER.GetShortUINameNoTooltipNoFormat]于三叉戟河之战起义军获胜后才赶到战场，导致封君授予[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]这个不光彩的绰号。"
 nick_agot_historical_the_latecomer:0 "迟到的"
 nick_agot_historical_the_latecomer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]的父亲去世时，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]正在曼德河沿岸劫掠，并未收到选王会的消息。[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]归来后宣布此次选王会非法，并起兵反抗厄拉松·古柏勒四世，最终成功夺得王位——以及这个绰号。"
 nick_agot_historical_the_laughing_lion:0 "笑狮"
 nick_agot_historical_the_laughing_storm:0 "狂笑风暴"
 nick_agot_historical_the_laughing_storm_desc:0 "在与对手交锋时，[CHARACTER.GetShortUINameNoTooltipNoFormat]时常狂笑应对，很多人认为[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]是[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]所处时代最杰出的骑士之一。"
 nick_agot_historical_the_laughing_wolf:0 "笑狼"
 nick_agot_historical_the_laughing_wolf_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]以性情温和著称，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]从沼泽王手中夺走颈泽，并娶了沼泽王的女儿为妻。"
 nick_agot_historical_the_leech_lord:0 "水蛭大人"
 nick_agot_historical_the_leech_lord_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]相信用水蛭吸血是长寿的秘诀，因此有些人用这个外号称呼[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]，不过没人敢当面称呼就是了。"
 nick_agot_historical_the_leopard:0 "花豹"
 nick_agot_historical_the_liar:0 "骗子"
 nick_agot_historical_the_limper:0 "跛子"
 nick_agot_historical_the_lion_king:0 "狮子王"
 nick_agot_historical_the_lion_king_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位凯岩王，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的绰号源自一本瓦兰提斯的编年史，书中记载了[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]率领黄金舰队远征瓦雷利亚的事迹——[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]与巨剑「光啸」都未能从这次航行中归来。"
 nick_agot_historical_the_lion_of_braavos:0 "布拉佛斯的狮子"
 nick_agot_historical_the_lionslayer:0 "屠狮者"
 nick_agot_historical_the_lionslayer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在红叉河之战中对杰森·兰尼斯特公爵造成了致命伤，从此被称为「屠狮者」。"
 nick_agot_historical_the_little:0 "小人物"
 nick_agot_historical_the_little_bear:0 "小熊"
 nick_agot_historical_the_little_bee:0 "小蜜蜂"
 nick_agot_historical_the_little_lemon:0 "小柠檬"
 nick_agot_historical_the_little_lion:0 "幼狮"
 nick_agot_historical_the_little_pussy:0 "小猫咪"
 nick_agot_historical_the_little_witch:0 "小女巫"
 nick_agot_historical_the_longknife:0 "长匕"
 nick_agot_historical_the_lord_lamprey:0 "鳗鱼大人"
 nick_agot_historical_the_lord_lamprey_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]因贪吃的性格被臣民以此名嘲讽，但[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]圆胖的外表下隐藏着精明的头脑。"
 nick_agot_historical_the_loud:0 "大嗓门"
 nick_agot_historical_the_lusty:0 "好色之徒"
 nick_agot_historical_the_lusty_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]三度秘密结婚，与三位妻子诞下十六个子嗣，背弃了御林铁卫的誓言。"
 nick_agot_historical_the_mad_bard:0 "疯诗人"
 nick_agot_historical_the_mad_huntsman:0 "疯猎人"
 nick_agot_historical_the_mad_king:0 "疯王"
 nick_agot_historical_the_mad_king_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]偏执残忍，行为越来越脱离现实，整个王国都知道[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]已经疯了。"
 nick_agot_historical_the_mad_maid:0 "疯女"
 nick_agot_historical_the_mad_maid_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是旧镇领主的未婚长女，以研读魔法书籍而闻名。"
 nick_agot_historical_the_mad_mouse:0 "疯鼠"
 nick_agot_historical_the_madling:0 "疯子"
 nick_agot_historical_the_mage:0 "魔法师"
 nick_agot_historical_the_mage_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]前往东方研习高级神秘术，归来后便得此名——这个称号迅速流传，令灰衣绵羊们颇为恼火。"
 nick_agot_historical_the_magnificent:0 "伟大的"
 nick_agot_historical_the_magnificent_desc:0 "[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的光辉事迹从绝境长城到阴影之地旁的亚夏无人不知，无人不晓。"
 nick_agot_historical_the_mason:0 "石匠"
 nick_agot_historical_the_maul:0 "大槌"
 nick_agot_historical_the_meek:0 "温顺的"
 nick_agot_historical_the_merciful:0 "仁慈的"
 nick_agot_historical_the_merling_queen:0 "美人鱼女王"
 nick_agot_historical_the_mighty:0 "强大的"
 nick_agot_historical_the_mistress_of_swords:0 "女剑圣"
 nick_agot_historical_the_monstrous:0 "凶暴的"
 nick_agot_historical_the_moon_king:0 "月王"
 nick_agot_historical_the_moonshadow:0 "月影"
 nick_agot_historical_the_mordant:0 "媒人"
 nick_agot_historical_the_morningstar:0 "流星锤"
 nick_agot_historical_the_mother:0 "圣母"
 nick_agot_historical_the_mother_hen:0 "母鸡"
 nick_agot_historical_the_mountain_that_rides:0 "魔山"
 nick_agot_historical_the_mountain_that_rides_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]的身体是如此巨大，当[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]骑马时，看起来像有座山在靠近。"
 nick_agot_historical_the_mouse:0 "老鼠"
 nick_agot_historical_the_mummer:0 "戏子"
 nick_agot_historical_the_mummer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]的剑盾技巧高超，以敏捷、强壮和观察力敏锐闻名。"
 nick_agot_historical_the_musician:0 "乐师"
 nick_agot_historical_the_nail:0 "钉子"
 nick_agot_historical_the_necromancer:0 "死灵法师"
 nick_agot_historical_the_necromancer_desc:0 "英雄纪元传奇的铁民掠夺者，[CHARACTER.GetShortUINameNoTooltipNoFormat]因[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]修习的黑魔法而得名。"
 nick_agot_historical_the_neveryield:0 "永不投降的"
 nick_agot_historical_the_niggardly:0 "吝啬鬼"
 nick_agot_historical_the_niggardly_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因吝啬小气而著称。"
 nick_agot_historical_the_nightingale:0 "夜莺"
 nick_agot_historical_the_nights_king:0 "夜王"
 nick_agot_historical_the_nimble:0 "机灵"
 nick_agot_historical_the_nocturnal:0 "夜间人"
 nick_agot_historical_the_northman:0 "北方人"
 nick_agot_historical_the_oak:0 "橡木"
 nick_agot_historical_the_oak_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是奥克赫特家族的传奇创始人，据传[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]身高八英尺（有些故事里说是十英尺或十二英尺）。"
 nick_agot_historical_the_old_bear:0 "熊老"
 nick_agot_historical_the_old_bear_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]尽管年事已高，依然保持着强健体魄，于是根据家族纹章获得这个绰号。"
 nick_agot_historical_the_old_falcon:0 "老猎鹰"
 nick_agot_historical_the_old_grey_gull:0 "老灰鸥"
 nick_agot_historical_the_old_grey_gull_desc:0 "一名淹神的祭司，[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]的真名无人知晓。"
 nick_agot_historical_the_old_king:0 "人瑞王"
 nick_agot_historical_the_old_king_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]活到了真正的晚年，和[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]相比，所有人的一生都会黯然失色。"
 nick_agot_historical_the_old_kraken:0 "老海怪"
 nick_agot_historical_the_old_kraken_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位铁群岛之王，曾入侵北境西岸，攻占了熊岛与海怪角。"
 nick_agot_historical_the_old_ox:0 "老牛"
 nick_agot_historical_the_old_ox_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是位颇有名望的年长骑士，身着血红的盔甲和有两根漆黑的牛角头盔。"
 nick_agot_historical_the_old_prefix:0 "老"
 nick_agot_historical_the_old_steelhand:0 "老铁手"
 nick_agot_historical_the_one_after_the_fat_one:0 "胖子的继任者"
 nick_agot_historical_the_one_after_the_fat_one_desc:0 "这位总主教因其臭名昭著的前任而为人所知。"
 nick_agot_historical_the_onion_knight:0 "洋葱骑士"
 nick_agot_historical_the_onion_knight_desc:0 "在风息堡之围期间，[CHARACTER.GetShortUINameNoTooltipNoFormat]乘小船避开了围攻舰队，向饥肠辘辘的守军走私了咸鱼和洋葱，由此获得爵位和土地的赏赐。"
 nick_agot_historical_the_onion_lord:0 "洋葱大人"
 nick_agot_historical_the_orange:0 "橙衣卫"
 nick_agot_historical_the_painter:0 "画家"
 nick_agot_historical_the_pale:0 "苍白者"
 nick_agot_historical_the_pale_griffin:0 "白狮鹫"
 nick_agot_historical_the_pale_griffin_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位御林铁卫骑士，以家族的纹章为绰号。"
 nick_agot_historical_the_pander:0 "皮条客"
 nick_agot_historical_the_pander_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]主动将妻子和女儿送上了「庸王」伊耿的床——据说还是同时。"
 nick_agot_historical_the_patriarch:0 "大族长"
 nick_agot_historical_the_patternmaker:0 "翻砂工"
 nick_agot_historical_the_penniless:0 "穷鬼"
 nick_agot_historical_the_penniless_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一个务实但贫穷的雇佣骑士，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]带着一把破旧的剑，骑着一匹瘦骨嶙峋的马。"
 nick_agot_historical_the_piglet:0 "小猪"
 nick_agot_historical_the_pious_will:0 "虔诚之志"
 nick_agot_historical_the_pirate:0 "海盗"
 nick_agot_historical_the_plowman:0 "庄稼汉"
 nick_agot_historical_the_plowman_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是摩兰德家族的传奇创始人，生活在英雄纪元。"
 nick_agot_historical_the_poet:0 "诗人"
 nick_agot_historical_the_poetess:0 "女诗人"
 nick_agot_historical_the_proud_perwyn:0 "骄傲的"
 nick_agot_historical_the_proud_perwyn_desc:0 "作为奥斯格雷家族的族长，[CHARACTER.GetShortUINameNoTooltipNoFormat]建造了家族最大的城堡——冷壕堡。"
 nick_agot_historical_the_puppeteer:0 "木偶师"
 nick_agot_historical_the_queen_of_thorns:0 "荆棘女王"
 nick_agot_historical_the_queen_of_thorns_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因风趣聪慧又尖酸刻薄的说话风格而闻名。"
 nick_agot_historical_the_queen_who_never_was:0 "无冕女王"
 nick_agot_historical_the_queen_who_never_was_desc:0 "在上任统治者死后，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]几乎快要成为[CHARACTER.Custom('GetQueenKing')]，但大议会最终否决了[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]。"
 nick_agot_historical_the_queer:0 "古怪的"
 nick_agot_historical_the_quick:0 "急性子"
 nick_agot_historical_the_quickfinger:0 "快指"
 nick_agot_historical_the_quiver:0 "颤栗者"
 nick_agot_historical_the_raper:0 "强奸魔"
 nick_agot_historical_the_raper_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]曾以铁种掠夺者的身份统治熊岛，最终在战斗中被「饿狼」席恩亲手斩杀。"
 nick_agot_historical_the_raven:0 "乌鸦"
 nick_agot_historical_the_reader:0 "读书人"
 nick_agot_historical_the_reader_desc:0 "与大多数铁种不同，[CHARACTER.GetShortUINameNoTooltipNoFormat]能在书页里获得比甲板上更多的满足。"
 nick_agot_historical_the_realms_delight:0 "王国之光"
 nick_agot_historical_the_reaper:0 "收割者"
 nick_agot_historical_the_reaver:0 "强盗"
 nick_agot_historical_the_red_crab:0 "红蟹"
 nick_agot_historical_the_red_dog:0 "山丘的红狗"
 nick_agot_historical_the_red_dog_desc:0 "作为战士之子的团长，[CHARACTER.GetShortUINameNoTooltipNoFormat]无名有实地统治着金牙城以北的山区。"
 nick_agot_historical_the_red_kraken:0 "红海怪"
 nick_agot_historical_the_red_kraken_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]曾经作为一名雇佣水手，在石阶列岛受创十数处，鲜血染红了身体。"
 nick_agot_historical_the_red_lion:0 "红狮"
 nick_agot_historical_the_red_lion_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]因家族纹章而得名，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]是西境最致命的战士之一。这个极度骄傲的人坚信：无论狮子是红色还是金色，它的爪子都一样长而锋利。"
 nick_agot_historical_the_red_viper:0 "红毒蛇"
 nick_agot_historical_the_red_viper_desc:0 "在年轻时，[CHARACTER.GetShortUINameNoTooltipNoFormat]被发现与埃德加·伊伦伍德大人的情妇偷情，在之后的决斗中[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]用上了毒刃。"
 nick_agot_historical_the_red_widow:0 "红寡妇"
 nick_agot_historical_the_red_widow_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]年纪轻轻就已丧偶四次，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的孩子也没有一个活过婴儿期。"
 nick_agot_historical_the_redsmile:0 "血色微笑"
 nick_agot_historical_the_regent:0 "摄政"
 nick_agot_historical_the_rhoynar:0 "洛伊拿人"
 nick_agot_historical_the_rhymer:0 "打油诗人"
 nick_agot_historical_the_riverman:0 "河间地的"
 nick_agot_historical_the_rodent:0 "老鼠"
 nick_agot_historical_the_rogue_prince:0 "浪荡王子"
 nick_agot_historical_the_rogue_prince_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因浪荡而勇于冒险的性格广为人知，激励或激怒了当时的很多人。"
 nick_agot_historical_the_rook:0 "骗子"
 nick_agot_historical_the_ruin:0 "老朽"
 nick_agot_historical_the_ruin_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是个凶蛮的战士，以在战斗中狂热到不觉伤痛而闻名。"
 nick_agot_historical_the_ruined:0 "破败"
 nick_agot_historical_the_rune:0 "符文"
 nick_agot_historical_the_saddlesore:0 "鞍马劳顿的"
 nick_agot_historical_the_saddlesore_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]的整个统治期都是在马背上度过的，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]粉碎了一波又一波叛乱，在所到之处的树上绞死人质。"
 nick_agot_historical_the_sailmaker:0 "扬帆者"
 nick_agot_historical_the_sailmaker_desc:0 "作为风暴王，[CHARACTER.GetShortUINameNoTooltipNoFormat]率军南下，将伊斯蒙岛及周边岛屿纳入风暴王国的版图。"
 nick_agot_historical_the_salt_rat:0 "盐鼠"
 nick_agot_historical_the_sand_dog:0 "沙犬"
 nick_agot_historical_the_savage:0 "蛮人"
 nick_agot_historical_the_scaly_prefix:0 "长鱼鳞的"
 nick_agot_historical_the_scrapesword:0 "碎剑"
 nick_agot_historical_the_scribe:0 "抄写员"
 nick_agot_historical_the_sculptor:0 "雕刻工"
 nick_agot_historical_the_sea_dragon:0 "海龙"
 nick_agot_historical_the_sea_snake:0 "海蛇"
 nick_agot_historical_the_sea_snake_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]完成过多次大航海，并以[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]一艘船的船名作为自己的外号。"
 nick_agot_historical_the_seeker:0 "求知者"
 nick_agot_historical_the_shade_of_ghost_hill:0 "魂丘之影"
 nick_agot_historical_the_shadow_sandoq:0 "影子"
 nick_agot_historical_the_shadow_sandoq_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U]的脸严重毁容——[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]用黑丝巾遮掩着这一缺陷。"
 nick_agot_historical_the_shaker:0 "震颤者"
 nick_agot_historical_the_shebear:0 "母熊"
 nick_agot_historical_the_shieldsmasher:0 "碎盾者"
 nick_agot_historical_the_shipwright:0 "造船者"
 nick_agot_historical_the_shipwright_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]一生热爱海洋，后率舰队启航驶向日落之海，却再也没有回来。"
 nick_agot_historical_the_silver_lion:0 "银狮"
 nick_agot_historical_the_silver_prefix:0 "银"
 nick_agot_historical_the_silver_rose:0 "银玫瑰"
 nick_agot_historical_the_simple_vaella:0 "天真者"
 nick_agot_historical_the_simple_vaella_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]讨人喜爱，但头脑简单。"
 nick_agot_historical_the_sisterman:0 "姐妹男"
 nick_agot_historical_the_sisterman_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]来自三姐妹群岛。"
 nick_agot_historical_the_sleepy_jack:0 "睡大觉的"
 nick_agot_historical_the_sleepy_jack_desc:0 "作为守夜人军团总司令，[CHARACTER.GetShortUINameNoTooltipNoFormat]疏于职守，放任一支野人军队溜过长城前往南方，在之后的作战中也来迟一步。"
 nick_agot_historical_the_small:0 "矮个"
 nick_agot_historical_the_smiling_knight:0 "微笑骑士"
 nick_agot_historical_the_snail:0 "蜗牛"
 nick_agot_historical_the_snail_desc:0 "有人说[CHARACTER.GetShortUINameNoTooltipNoFormat]得此绰号不仅因[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的个人纹章，更因[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]惯于“缩进壳中”的性格。"
 nick_agot_historical_the_sneaky:0 "鬼祟者"
 nick_agot_historical_the_snowman:0 "雪人"
 nick_agot_historical_the_soulless:0 "无魂者"
 nick_agot_historical_the_sparrow:0 "麻雀"
 nick_agot_historical_the_spring_king:0 "春王"
 nick_agot_historical_the_spring_prince:0 "春晓王子"
 nick_agot_historical_the_spring_prince_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]诞生在白鸦从学城飞来，宣告春天来临的两天后。"
 nick_agot_historical_the_stargazer:0 "占星师"
 nick_agot_historical_the_stargazer_desc:0 "作为学城的博士，[CHARACTER.GetShortUINameNoTooltipNoFormat]教授并评判天文学知识。"
 nick_agot_historical_the_starvling:0 "挨饿的"
 nick_agot_historical_the_starvling_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是穷人集会的一名重要成员。"
 nick_agot_historical_the_steelhand:0 "铁手"
 nick_agot_historical_the_stinger:0 "蜂刺"
 nick_agot_historical_the_stinger_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]精通武艺，枪术被认为是河湾地的魁首。"
 nick_agot_historical_the_stonemason:0 "石匠"
 nick_agot_historical_the_stonemason_desc:0 "这位总主教以精通石匠技艺闻名，有人甚至称其是铁匠的化身。"
 nick_agot_historical_the_stormbreaker:0 "破风者"
 nick_agot_historical_the_stormbreaker_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是位著名骑士，曾在比武大会上击败了两名“风暴”，由此赢得这个绰号。"
 nick_agot_historical_the_storyteller:0 "说书人"
 nick_agot_historical_the_stray:0 "流浪的"
 nick_agot_historical_the_strummer:0 "乱弹琴"
 nick_agot_historical_the_strummer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]既是骑士也是歌手，总喜欢在战斗前用下流歌曲嘲弄对手。"
 nick_agot_historical_the_survivor:0 "幸存者"
 nick_agot_historical_the_sweetling:0 "甜嘴"
 nick_agot_historical_the_sweetling_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]相貌英俊，说话轻声细语，却是魔山麾下残忍嗜血的一员。"
 nick_agot_historical_the_sword_of_the_evening:0 "黄昏神剑"
 nick_agot_historical_the_sword_of_the_evening_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]被誉为多恩最伟大的骑士，却被娜梅莉亚击败，随后戴着黄金镣铐被送往长城——成为披上黑衣的「拂晓神剑」。"
 nick_agot_historical_the_sybarite:0 "花天酒地的"
 nick_agot_historical_the_talon:0 "鹰爪"
 nick_agot_historical_the_talon_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位残忍的山谷之王，在北境与谷地的战争中攻占并焚毁了狼穴的城堡。"
 nick_agot_historical_the_tame:0 "驯服的"
 nick_agot_historical_the_tame_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]生来多病，不太像个战士。"
 nick_agot_historical_the_tanglebeard:0 "乱胡子"
 nick_agot_historical_the_tanglebeard_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是个来自龙石岛的平民，留着蓬乱的胡子。"
 nick_agot_historical_the_tangletongue:0 "夹舌头"
 nick_agot_historical_the_tangletongue_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]生来是个结巴，故而所听远多于所说。"
 nick_agot_historical_the_tattered_prince:0 "褴衣亲王"
 nick_agot_historical_the_tattered_prince_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]曾被选为潘托斯亲王，却因害怕这个身份而逃往争议之地。作为风吹团的领袖，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]披着用各色布条缝制的破旧斗篷。"
 nick_agot_historical_the_terrible:0 "可怖的"
 nick_agot_historical_the_terrible_togarion:0 "可怖的"
 nick_agot_historical_the_terrible_togarion_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位可怕的安达尔军阀，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]驱逐了风暴地人，在马赛岬建立了一个新王国。"
 nick_agot_historical_the_thrall:0 "奴工"
 nick_agot_historical_the_thrall_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]曾是个奴工，如今与铁种一同劫掠。"
 nick_agot_historical_the_threadbare:0 "褴褛的"
 nick_agot_historical_the_threadbare_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因个人纹章——棕底白纹的破旧袖套——而得名。"
 nick_agot_historical_the_thrice_drowned:0 "三淹人"
 nick_agot_historical_the_thrice_drowned_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一位淹神的牧师，以施展生命之吻的高超技艺而闻名。"
 nick_agot_historical_the_thrice_widowed:0 "三寡人"
 nick_agot_historical_the_tickler_jon:0 "记事本"
 nick_agot_historical_the_tickler_jon_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是魔山的手下之一，担任格雷果·克里冈爵士的拷问者——这份差事[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]似乎乐在其中。"
 nick_agot_historical_the_tiger:0 "猛虎"
 nick_agot_historical_the_titans_bastard:0 "泰坦私生子"
 nick_agot_historical_the_titans_bastard_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是个声名狼藉的布拉佛斯佣兵，对雇主而言[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]常常和敌人一样危险。"
 nick_agot_historical_the_toothless_lion:0 "没牙的狮子"
 nick_agot_historical_the_toothless_lion_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]意志薄弱，总是想方设法讨好他人，使得[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的封臣常常公开违抗[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的命令，甚至当面嘲笑——这种行为被某些人称为‘拨弄狮尾’。"
 nick_agot_historical_the_trader:0 "商人"
 nick_agot_historical_the_true:0 "真实的"
 nick_agot_historical_the_trueborn:0 "嫡生子"
 nick_agot_historical_the_uncrowned:0 "无冕者"
 nick_agot_historical_the_uncrowned_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]的王冠被[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]叔叔非法地篡夺，最终没能活到加冕为七大王国下一任[CHARACTER.Custom('GetQueenKing')|U]的那天。"
 nick_agot_historical_the_unlikely:0 "不该成王的王"
 nick_agot_historical_the_unlikely_desc:0 "尽管[CHARACTER.GetShortUINameNoTooltipNoFormat]从没想过继承王位，但在一系列不幸的事件后，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]以原本较低的继承顺位成为了王国的继承人。"
 nick_agot_historical_the_unready_erich:0 "无准备的"
 nick_agot_historical_the_unready_erich_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]宣称对“远方土地上陌生人的争吵”毫无兴趣，对即将席卷整个维斯特洛的安达尔人入侵置之不理。"
 nick_agot_historical_the_unsmiling:0 "不苟言笑的"
 nick_agot_historical_the_unsmiling_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]被誉为是所有在世的铁民战士里最勇猛凶悍的一个，而从来没有人见[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]笑过。"
 nick_agot_historical_the_unworthy:0 "庸王"
 nick_agot_historical_the_unworthy_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]只知一味享乐，言行德不配位，辜负了所有人的期望。"
 nick_agot_historical_the_veiled_lady:0 "蒙面女士"
 nick_agot_historical_the_visitor:0 "拜访者"
 nick_agot_historical_the_vole:0 "野鼠"
 nick_agot_historical_the_vole_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是个身材矮小、毛发浓密、相貌平平的男人。"
 nick_agot_historical_the_vulture:0 "秃鹫"
 nick_agot_historical_the_vulture_king:0 "秃鹰王"
 nick_agot_historical_the_wanderer:0 "流浪者"
 nick_agot_historical_the_wanderer_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]武艺精湛，作为战士之子的骑士为七神效力。"
 nick_agot_historical_the_wandering_wolf:0 "野狼"
 nick_agot_historical_the_wandering_wolf_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]远离了北境的故乡，作为佣兵效力于次子团。"
 nick_agot_historical_the_war_hound:0 "战争猎犬"
 nick_agot_historical_the_wasp:0 "黄蜂"
 nick_agot_historical_the_wasp_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一名御林铁卫骑士，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]在「白袍之争」中获胜并被授予这个职位。"
 nick_agot_historical_the_weak_legs:0 "瘸腿"
 nick_agot_historical_the_weeper_gendel:0 "哭泣者"
 nick_agot_historical_the_weeper_gendel_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是自由民中臭名昭著的掠夺者，因[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]水汪汪的眼睛而得此绰号。"
 nick_agot_historical_the_wetnurse:0 "保姆"
 nick_agot_historical_the_white:0 "白"
 nick_agot_historical_the_white_bastard:0 "白杂种"
 nick_agot_historical_the_white_bull:0 "白牛"
 nick_agot_historical_the_white_fawn:0 "白鹿"
 nick_agot_historical_the_white_owl:0 "白头鹰"
 nick_agot_historical_the_white_owl_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是位御林铁卫骑士，因[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的家族纹章猫头鹰而得名。"
 nick_agot_historical_the_white_worm:0 "白蛆"
 nick_agot_historical_the_white_worm_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]苍白的皮肤和令人憎恶的名声而被敌人如此称呼。"
 nick_agot_historical_the_whoreson:0 "妓子"
 nick_agot_historical_the_whoreson_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]吹响号角示意凯切镇的妓女们便打开城中边门，让[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的部下为兰尼斯特家族夺取了该城。"
 nick_agot_historical_the_widower:0 "鳏夫"
 nick_agot_historical_the_widowmaker:0 "寡妇制造者"
 nick_agot_historical_the_widowmaker_desc:0 "尽管遭到淹神祭司们的反对，[CHARACTER.GetShortUINameNoTooltipNoFormat]仍允许在大威克岛上建造了铁群岛的第一座七神圣堂。"
 nick_agot_historical_the_wild_flower:0 "野花"
 nick_agot_historical_the_winter_child:0 "冬之子"
 nick_agot_historical_the_winter_child_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因出生在冬季而得名，不过也有人说是因为[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]母亲当时已过了生育年龄的寒冬期。"
 nick_agot_historical_the_winterfast:0 "短冬"
 nick_agot_historical_the_witch:0 "女巫"
 nick_agot_historical_the_woe_gyles:0 "悲痛的"
 nick_agot_historical_the_woe_gyles_desc:0 "作为河湾之王，[CHARACTER.GetShortUINameNoTooltipNoFormat]残酷洗劫了旧镇，据称将四分之三的居民卖为了奴隶。"
 nick_agot_historical_the_woodcock:0 "木棒"
 nick_agot_historical_the_woodcock_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是「白袍之争」中最年轻的参战者，杰佛里·多吉特爵士亲自授封[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]为骑士，以平息关于[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]并非真正骑士的指控。"
 nick_agot_historical_the_wordsmith:0 "字匠"
 nick_agot_historical_the_yellow:0 "黄衣卫"
 nick_agot_historical_the_young_dragon:0 "少龙主"
 nick_agot_historical_the_young_falcon:0 "少鹰主"
 nick_agot_historical_the_young_falcon_desc:0 "有人也称[CHARACTER.GetShortUINameNoTooltipNoFormat]为「继承人」，在[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的叔祖父接连失去三位继承人后，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]成为鹰巢城的预期继承人。"
 nick_agot_historical_the_young_prince:0 "少王子"
 nick_agot_historical_the_young_prince_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是「破矛者」贝勒的长子，而贝勒本人是国王戴伦二世的王长子。"
 nick_agot_historical_the_young_wolf:0 "少狼主"
 nick_agot_historical_the_young_wolf_desc:0 "无论敌友都如此称呼，[CHARACTER.GetShortUINameNoTooltipNoFormat]虽年纪轻轻却已证明[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的勇气。"
 nick_agot_historical_the_youngest:0 "最年幼的"
 nick_agot_historical_third_goose:0 "第三羽"
 nick_agot_historical_third_goose_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]是三胞胎中最后一个诞下的孩子。"
 nick_agot_historical_three_finger:0 "三指"
 nick_agot_historical_three_finger_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]的一只手残废了，只剩下三根手指，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]因此得名。"
 nick_agot_historical_three_toes:0 "三趾"
 nick_agot_historical_three_tooth:0 "三齿"
 nick_agot_historical_three_tooth_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的牙齿数量而得名，这名字颇为古怪。"
 nick_agot_historical_threeskins:0 "三形人"
 nick_agot_historical_threeskins_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是位天赋异禀的易形者，同时操控着三只野兽。"
 nick_agot_historical_thunderbolt:0 "雷霆"
 nick_agot_historical_thunderbolt_tybolt:0 "雷霆"
 nick_agot_historical_thunderbolt_tybolt_desc:0 "作为凯岩王，[CHARACTER.GetShortUINameNoTooltipNoFormat]击败了首批入侵西境的安达尔战士。"
 nick_agot_historical_toad:0 "癞蛤蟆"
 nick_agot_historical_toad_desc:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]身材矮小、长着亮晶晶猪眼，因外貌原因被起了这个不幸的绰号。"
 nick_agot_historical_too_tall:0 "高过头的"
 nick_agot_historical_tourney_goose:0 "比武公鹅"
 nick_agot_historical_tourney_goose_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]极其享受比武的过程，全然不顾受伤的风险。"
 nick_agot_historical_trusty:0 "可靠的"
 nick_agot_historical_twelve_tooth:0 "十二齿"
 nick_agot_historical_twelve_tooth_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]的牙齿数量而得名，这名字颇为古怪。"
 nick_agot_historical_twice_over:0 "双生者"
 nick_agot_historical_two_swords:0 "双剑"
 nick_agot_historical_two_swords_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一名黄金团的佣兵，[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]身上总是带着两件武器。"
 nick_agot_historical_wanderer:0 "流浪者"
 nick_agot_historical_warwolf:0 "战狼"
 nick_agot_historical_white_mask:0 "白面具"
 nick_agot_historical_white_mask_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat]是一名战士女巫，脸上戴着一个白色鱼梁木面具。"
 nick_agot_historical_whiteye:0 "白眼"
 nick_agot_historical_whiteye_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]的左眼完全瞎了。"
 nick_agot_historical_whittlestick:0 "麻杆"
 nick_agot_historical_whoresbane_hother:0 "妓魇"
 nick_agot_historical_whoresbane_hother_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]曾掏出一个试图从[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)]身上偷东西的娼妓的内脏——人们从来只敢私下谈论这件事，有人说那个娼妓其实是个男子。"
