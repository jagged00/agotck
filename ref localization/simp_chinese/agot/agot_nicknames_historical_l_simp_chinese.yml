 nick_agot_historical_the_prince_of_dragonflies:0 "龙芙莱王子"
 nick_agot_historical_strongbrother:0 "大兄弟"
 nick_agot_historical_the_bastard_king:0 "私生子国王"
 nick_agot_historical_the_black_goat:0 "黑山羊"
 nick_agot_historical_the_castout:0 "被放逐者"
 nick_agot_historical_the_great_kraken:0 "巨怪"
 nick_agot_historical_the_last_giant:0 "最后的巨人"
 nick_agot_historical_the_peasant_king:0 "农夫国王"
 nick_agot_historical_the_red_cofferer:0 "红财政主管"
 nick_agot_historical_the_fat_one_desc:0 "这位总主教因其巨大……对七神的巨大虔诚而闻名。"
 nick_agot_historical_ryvydrakio:0 "里维德拉基奥"
 nick_agot_historical_ryvydrakio_desc:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]，历史上记载的第一位罗佳尔成员，被公认为促成了里斯与自由堡垒之间的首次协议。该协定赋予里斯广泛自治权与税收减免，被广泛认为是自由贸易城邦的的基石。此后，洛加罗被永远称为“里维德拉基奥”，意为调解人。"
