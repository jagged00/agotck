 tradition_agot_blackwater_bay_name:0 "王冠治下"
 tradition_agot_blackwater_bay_desc:0 "王领是维斯特洛最年轻的地区，由那些直接效忠于铁王座的家族与民众共同铸就。正因如此，王领的风土人情与生活方式都深深烙上了铁王座的印记。君临城在这片土地上占据着绝对的主导地位，越来越多的人开始迁居城市，过上了更具都市色彩的生活。"
 tradition_agot_riverlands_name:0 "河流的回报"
 tradition_agot_riverlands_desc:0 "河间地人常年在周边各大势力的夹缝中求存，但只要能有一位属于自己的强势君主，他们便能迅速崛起壮大。三叉戟河及其支流，是塑造他们生活的核心所在，河间地人也正是仰仗着这片水域，才得以繁衍生息、兴旺发达。"
 tradition_agot_rivermen_main_name:0 "三叉戟之上"
 tradition_agot_rivermen_main_desc:0 "#italic “古老的芥蒂和过往的背叛早已深入三河诸侯的骨髓，河水渗入土地有多深，他们彼此的恨意就有多深。”#!"
 tradition_agot_clawmen_name:0 "蟹爪的意志"
 tradition_agot_clawmen_desc:0 "#italic “……给他们讲蟹爪半岛的故事。他说，每一个幽暗的山谷都各有其领主，但只有对付外人时才会联合起来。他们的血管里流着浓浓的先民之血。“安达尔人试图夺取蟹爪半岛，结果在山谷中流血，在沼泽中淹死，处处碰壁。后来他们的漂亮女儿靠亲吻赢得了他们强壮的儿子用剑无法获取的东西——是的，他们征服不了我们，转而用婚姻来怀柔。”#!"
 tradition_agot_high_valyrian_name:0 "真龙之血"
 tradition_agot_high_valyrian_desc:0 "#italic “古瓦雷利亚的龙王们用束缚咒语和魔法号角来控制坐骑。”#!"
 tradition_agot_western_valyrian_name:0 "潮汐的馈赠"
 tradition_agot_western_valyrian_desc:0 "#italic “……这个古老而传奇的瓦雷利亚家族被史学家们公认为早在坦格利安家族之前便来到维斯特洛。”#!"
 culture_parameter_reaver_trait_more_common:0 "[GetTrait('reaver').GetName( GetNullCharacter )][commander_trait|E]更加常见"
 culture_parameter_better_regimental_bonuses:0 "该[culture|E]的[counties|E]中的#V $building_type_regimental_grounds_01$#!线[buildings|E]拥有额外增益"
 tradition_agot_ironmen_name:0 "刻魔树以为长船"
 tradition_agot_ironmen_desc:0 "铁民是来自大海的灾祸，但他们的势力如同载他们前来的潮水般时涨时落。时而他们仅偏居日落之海的岛屿；时而他们又扩张至青绿之地并统治一方。然而，他们始终因古老血脉而凝聚，共同效忠于深居海底的灰海王。"
 culture_parameter_cannibal_trait_is_more_common:0 "[GetTrait('cannibal').GetName( GetNullCharacter )][trait|E]更加常见"
