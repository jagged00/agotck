 tradition_agot_vale_andal_heritage_name:0 "信仰与怒火"
 tradition_agot_vale_andal_heritage_desc:0 "没人知道安达尔人确切的发源地，只知道是厄斯索斯北部某处。随着瓦雷利亚自由堡垒的不断扩张，安达尔人被迫离开家园，前往维斯特洛，最终同七神教义和骑士精神一起，遍及颈泽以南的所有地区。"
 tradition_agot_crownlander_name:0 "生于黑水"
 tradition_agot_crownlander_desc:0 "#italic “他召唤忠诚的领主前来君临勤王，来的却只有王领的小诸侯……”#!"
 tradition_agot_valeman_finger_name:0 "谦卑仆从"
 tradition_agot_valeman_finger_desc:0 "五指半岛是一个阴郁、多风的地方，这里常年受到北方寒风的侵袭，以至于指尖一带几乎长不出植物。由于耕地的稀少，对这里的平民来说，除了放牧以外几乎没有其他可谋生的手段。因此，五指半岛人大多过着艰苦朴素的生活，而牧羊人和佃农则能在他们无情的家园找到一丝满足感。"
 tradition_agot_honeywiner_name:0 "甜言似蜜"
 tradition_agot_honeywiner_desc:0 "蜜酒河及其周边地区的居民是整个维斯特洛最富庶的人群之一。这里有肥沃的土地和旧镇这座大都市，无数的贸易流经蜜酒河，而此地居民的名字也由此发源。境内的学城与繁星圣堂，更让蜜酒地成为了维斯特洛的知识堡垒，甚至许多小平民都能识字。"
 tradition_agot_marcher_name:0 "刀剑颂歌"
 tradition_agot_marcher_desc:0 "#italic “边疆地诸侯的雄伟城堡遥遥可见赤红山脉，它们保卫着风暴地不受南方的多恩人入侵和西方河湾王的铁甲封臣们滋扰。”#!"
 tradition_agot_valeman_upper_name:0 "居高临下"
 tradition_agot_valeman_upper_desc:0 "与在山谷的肥沃流域中安家的同胞不同，他们住在明月山脉高处，是一群更加粗犷、坚强的人。在战争时期，他们是抵御外来入侵的第一道防线，在高海拔生活的同时，他们也必须应对来自高山氏族的入侵。"
 tradition_agot_reachman_name:0 "青手荣光"
 tradition_agot_reachman_desc:0 "河湾地的繁荣肥沃建立在人民的勤劳上。这片土地是一些维斯特洛最古老的家族的根源，这些家族的先祖可以追溯到传说中的「青手」加尔斯，河湾地最著名的家族都声称是他的后裔。在这片富饶的土地上，有如此多的家族为争得显赫地位而奋斗，将他们联系在一起的纽带比维斯特洛其他地方更强大、更重要。"
 tradition_agot_shieldman_name:0 "曼德河卫士"
 tradition_agot_shieldman_desc:0 "盾牌列岛因作为抵御铁民入侵的屏障而得名，它由河湾地的四座防御严密的岛屿组成，每个岛屿都由一个独特的家族守护。盾牌列岛人忠诚（尽管可以说有些孤立），以其坚韧的性格和强烈的责任感著称。这片群岛也以其烽火台而闻名，瞭望塔上的长老们会逐个点燃岛上的烽火台，向内陆的定居点发出长船来袭的警告。盾牌列岛的人视责任高于一切，他们骄傲地称自己是守卫王国的海上第一道防线。"
 tradition_agot_stone_dornish_name:0 "隘口卫士"
 tradition_agot_stone_dornish_desc:0 "多恩石人是在文化上是受洛伊拿人影响最小的多恩人。他们生活在赤红山脉的高山和深谷中，他们的文化形成于与河湾地和风暴地的边疆地领主的世仇冲突中，他们热衷于保卫他们的山口不受外敌入侵。"
 tradition_agot_vale_name:0 "山与谷"
 tradition_agot_vale_desc:0 "艾林家族的古老王国以明月山脉及其间的谷地为主，其中最重要的是艾林谷。这两大地形特征使得山脉以东的民族与维斯特洛的其他地区隔绝，却也让他们紧密地团结在一起。"
 tradition_agot_vineman_name:0 "酒色笙歌"
 tradition_agot_vineman_desc:0 "自从「葡萄藤」吉尔伯特来到这里，青亭岛的人们就只知道一件事：葡萄酒。青亭岛的酿酒厂生产的优质葡萄酒享誉维斯特洛乃至更远的地方，许多商人和水手都在莱安港停泊，以购买最好的青亭岛红葡萄酒。"
 tradition_agot_westerman_name:0 "金银之国"
 tradition_agot_westerman_desc:0 "在七大王国中，西境面积不是最大的、人口也不是最多的。乍一看，西境似乎是维斯特洛一个不起眼的地区。实际上，西境是全维斯特洛最富有的地区。这里没有连绵起伏的肥沃农田，但却有富饶无比的金山银山。西境人正是依靠这些宝贵的矿产树立起了西境的话语权，贵族们会谨慎地保护好他们的矿井，以免让有心之人垂涎。"
 tradition_agot_sisterman_name:0 "盐水之下"
 tradition_agot_sisterman_desc:0 "从他们的历史来看，比起谷地人或北境人，三姐妹群岛人与铁民有更多的相似之处。几千年来，三姐妹群岛人一直被他们的海盗王统治着，他们沿着咬人湾海岸进行掠夺，以获取他们贫瘠的岛屿所不能提供的东西，他们信仰着安达尔人和先民都不知道的异神。"
 tradition_agot_ironborn_name:0 "付铁钱"
 tradition_agot_ironborn_desc:0 "#italic “战争才是铁民的正当职业，淹神造人，便是要他们奸淫掳掠，用鲜血、烈焰和欢歌开创新天新地，并用之镂刻名姓。”#!"
 tradition_agot_greenborn_name:0 "统治青绿之地"
 tradition_agot_greenborn_desc:0 "#italic “你可以让铁民穿上丝绸和天鹅绒，教他读书写字，灌输骑士精神、礼仪制度和宗教信仰……但每当你看进他的眼睛，依旧能看到寒冷、灰暗和残酷的大海。”#!"
 tradition_agot_dorne_rhoynish_heritage_name:0 "洛恩母亲河之子"
 tradition_agot_dorne_rhoynish_heritage_desc:0 "洛伊拿文明古老且辉煌，其历史之悠久，以至于一些洛伊拿人认为是他们教会了安达尔人如何锻造和使用铁器。洛伊拿人来自洛恩河沿岸的城邦，他们崇拜河流中的众多神灵，也喜欢各类船只，不管是小渔船还是欢愉驳船。洛伊拿文化与安达尔文化明显不同，男女平等继承是常态，同性关系也被接受。洛伊拿人以热爱艺术和音乐而闻名，这可能是一些洛伊拿文化习俗在他们抵达多恩时迅速流行起来的原因之一。"
 tradition_agot_greenblood_name:0 "河上孤儿"
 tradition_agot_greenblood_desc:0 "在逃离厄斯索斯来到多恩后，绿血河孤儿们拒绝接受多恩习俗，而是选择作为洛恩河的“孤儿”生活，并继续称洛恩河为“母亲”。绿血河孤儿及其后代们坚持着洛伊拿的文化和信仰，仍然秘密地说着洛伊拿语，因生活在绿血河沿岸的木筏上而得名。"
 tradition_agot_salt_dornish_name:0 "娜梅莉亚之血"
 tradition_agot_salt_dornish_desc:0 "作为血管中流淌着最多的洛伊拿血统的多恩人，多恩盐人生活在较温和的多恩海岸上。他们继承了娜梅莉亚带给多恩的许多平等主义传统，多恩海岸的港口使他们成为优秀的水手，给当地带来了巨大的繁荣。"
 tradition_agot_sand_dornish_name:0 "沙漠与沙丘"
 tradition_agot_sand_dornish_desc:0 "多恩沙人在他们称之为家的严酷沙漠中勉强生存，这是个坚韧无情的民族，其城堡和定居点建立在稀有水源周围。沙人热情地捍卫着这片土地，他们天性勇敢，爱好冒险，该地区的许多贵族家族都来自敢于探索险恶沙丘的少数人。"
 tradition_agot_wildling_name:0 "凶猛，野蛮，自由"
 tradition_agot_wildling_desc:0 "在大多数民族与社会不断进步发展之时，总有一些群体拒绝向进步低头，维斯特洛的众多野人便是明证。他们大多聚集在长城之外，但也有部分部族生活在明月山脉。这些部落群体虽未开化却骁勇善战，一旦形成规模便可能成为威胁。"
 tradition_agot_moon_clan_name:0 "落日之上"
 tradition_agot_moon_clan_desc:0 "在明月山脉的深处居住着氏族民，他们是长城以南最野蛮、最未开化的人。作为山谷中最后的先民残余，多山的家园保护氏族民免受安达尔人的入侵，让他们能不受外来干预继续保持原始生活方式。"
 tradition_agot_rushlander_name:0 "山河相会之地"
 tradition_agot_rushlander_desc:0 "一种诞生于谷地与河间地交界地带的文化。激流地人是一个吃苦耐劳的民族，适应了在山谷与河流之间的生活。"
 tradition_agot_harsh_laws_name:0 "严苛律法"
 tradition_agot_harsh_laws_desc:0 "什么样的社会塑造什么样的法律。历史证明，在一片恶劣的土地上，自然会产生残酷的人民，而他们会反过来制定严酷的法律进行统治。"
 tradition_agot_thenn_name:0 "最后的先民"
 tradition_agot_thenn_desc:0 "瑟恩人被绝境长城以南的人称为更“老练”的自由民，他们认为自己是最后的“先民”。他们与其他野人间的来往甚至比不上霜雪之牙山谷部落与巨人族间的来往。瑟恩人主要说古语，偶尔会掺杂几个来自通用语的词汇。他们为自己对马格拿的信仰感到自豪，他们比其他自由民更有纪律和组织，并设法积累了令人印象深刻的青铜军械储备。虽然长城以南的人可能会把瑟恩人视为野蛮人，但他们的能力非同一般，同时经常与守夜人发生冲突。"
 tradition_agot_andalos_name:0 "七星之下的山丘"
 tradition_agot_andalos_desc:0 "七神一体之神在安达斯的山丘上为胡戈加冕，并以七星铸成王冠，令他带领安达尔人前往维斯特洛——他们恪守七神誓言的恩赐，安达尔人的应许之地。"
 tradition_agot_braavos_name:0 "挣脱于奴隶锁链"
 tradition_agot_braavos_desc:0 "在九大自由贸易城邦中，布拉佛斯独树一帜——它由本要被押往瓦雷利亚的逃亡奴隶建立，因此其人们来自已知世界乃至更遥远之地。这使布拉佛斯成为一个由许多民族组成的国家，只有一条凌驾于一切的律法：“布拉佛斯的子孙后代、男女老少永不为奴，包括奴隶、奴工或债奴。”"
 tradition_agot_religious_fc_name:0 "追寻宗教的纯洁"
 tradition_agot_religious_fc_desc:0 "自由堡垒是诸多民族的熔炉，从瓦雷利亚人、安达尔人、洛伊拿人、吉斯卡利人，到境外掳来的无数奴隶。为统治如此多元的臣民，龙王们允许所有信仰并存，此举却招致部分狂热信徒的憎恶，他们为追求宗教纯洁而离开，建立了自己的城邦。"
 tradition_agot_three_daughters_name:0 "手足夹缝"
 tradition_agot_three_daughters_desc:0 "自由堡垒覆灭于末日浩劫中后，其帝国随之分崩离析，各个城邦纷纷争夺权力真空。这一局面在争议之地最为明显，里斯、密尔和泰洛西彼此攻伐不休，而平民百姓则深陷于他们无休止的冲突之中。"
 tradition_agot_pentos_name:0 "交融而生"
 tradition_agot_pentos_desc:0 "潘托斯人被认为是瓦雷利亚殖民者与当地原住民的混血后裔，安达尔人早先居住在这片地区，由此诞生了潘托斯民族。"
 tradition_agot_doom_name:0 "末日阴影"
 tradition_agot_doom_desc:0 "末日浩劫永远地改变了世界，至今仍是未解之谜。那些逃离了毁灭灾难的人们，时至今日依然笼罩在它的阴影之下。"
 tradition_agot_slavers_bay_name:0 "贸易之奴"
 tradition_agot_slavers_bay_desc:0 "古老帝国乃至自由堡垒的命脉便是奴隶贸易。正是通过这种贸易，一个民族才能繁荣发展，构建起自己的未来——即使这要以牺牲另一个民族的自由为代价。"
 tradition_agot_ghis_name:0 "在伟人的掌控之下"
 tradition_agot_ghis_desc:0 "古老的吉斯帝国凭借纪律与坚韧得以崛起并扩张。尽管实施奴隶制，古老帝国的根基却是自由民组成的方阵军团。他们训练有素，纪律严明，没有任何人类军队能与之抗衡，除了巨龙与龙焰。"
 tradition_agot_rhoynar_name:0 "母亲河之上"
 tradition_agot_rhoynar_desc:0 "在厄斯索斯西部的伟大洛恩河畔，曾兴起过世界上最伟大的文明之一。洛伊拿人以他们美丽的城市以及冶铁技术的运用和传授而闻名。"
 tradition_agot_candling_name:0 "大蜡烛之下"
 tradition_agot_candling_desc:0 "万岁，伟大的蜡烛。众生皆当崇拜伟大的蜡烛。伟大的蜡烛是智慧的。伟大的蜡烛是我们的主人；它将决定谁去谁留。蜡烛，蜡烛，蜡烛……"
 tradition_agot_andalosi_name:0 "龙焰净化"
 tradition_agot_andalosi_desc:0 "#italic “「伟人」科尔龙和他的军队一起葬身火海，龙王们随后继续北上，将血与火带到罗拉斯诸岛。科尔龙的宏伟堡垒被付之一炬，岸边的市镇和渔村也难逃劫难，连巨大的石头迷宫都被席卷岛屿的火风暴烤得焦黑。据说在“罗拉斯的毁灭”中，灼热的火焰夺去了所有男女老少的性命，无人幸免。”#!"
 tradition_agot_andal_name:0 "追逐落日"
 tradition_agot_andal_desc:0 "#italic “……据说，七神曾化身人形行走在安达斯的丘陵间，亲自为「丘陵之王」胡戈加冕，并许诺其后人将在海外享有伟大的王国。修士修女们以此作为安达尔人离开厄斯索斯、朝维斯特洛扩张的因由，向世人传播。”#!"
 tradition_agot_braavosi_name:0 "紫帆横渡"
 tradition_agot_braavosi_desc:0 "#italic “为捍卫以生命换来的自由，新城邦的国父国母们对天发誓：布拉佛斯的子孙后代、男女老少永不为奴，包括奴隶、奴工或债奴。这是布拉佛斯的第一律法，被镌刻在长渠的石桥拱上。从古至今，布拉佛斯的海王总是反对所有形式的奴隶制，与奴隶主及其盟友打过许多仗。”#!"
 tradition_agot_lorathi_name:0 "迷宫中的盲目"
 tradition_agot_lorathi_desc:0 "#italic “这批崭新的罗拉斯人起初唯先来此地的博阿西信徒马首是瞻，若干年里，罗拉斯诸岛一直由盲神的祭司治理。但一段时间后，新来者愈多而信徒渐少，对博阿西的供奉日益衰微，剩下的祭司变得越来越世俗和腐化，他们不再穿着刚毛衬衣和遮眼兜帽，舍弃了信仰，并因对普罗大众课以重税而发财致富、赘肉横生。终于，渔民、农夫及其他百姓揭竿而起，打破博阿西的桎梏。”#!"
 tradition_agot_lyseni_name:0 "暮光之爱"
 tradition_agot_lyseni_desc:0 "#italic “里斯人同样精于奴隶饲育，他们会让漂亮奴隶媾和，以期生出更妩媚动人的妓女和床奴。瓦雷利亚血脉在里斯依然浓厚，即便平民百姓也往往拥有昔日龙王们的白肤，银金头发和紫色、浅紫色或淡蓝色的眼瞳，而里斯贵族重视血统纯洁高于一切，产出许多著名的（或是声名狼藉的）美人。”#!"
 tradition_agot_myrish_name:0 "透镜之光"
 tradition_agot_myrish_desc:0 "#italic “从一开始，贸易便是密尔的命脉，密尔船在狭海来往穿梭。密尔的匠人—多为奴隶出身—同样闻名遐迩，这里出产的蕾丝和织锦据说价值等重的黄金和香料，密尔透镜更是举世无双。”#!"
 tradition_agot_norvoshi_name:0 "圣发与钟声"
 tradition_agot_norvoshi_desc:0 "#italic “尽管如今「伟大的诺佛斯」把控着洛恩河源头，但诺佛斯人并非古时统御这条大河的洛伊拿人的后代。和其他自由贸易城邦一样，诺佛斯是瓦雷利亚的女儿。”#!"
 tradition_agot_pentoshi_name:0 "债务的枷锁"
 tradition_agot_pentoshi_desc:0 "#italic “最初的潘托斯人是商人、小贩、水手和农夫，少有贵族；或许正因如此，他们才不太在意自己的瓦雷利亚血统，乐于与被统治的原住民通婚。”#!"
 tradition_agot_hartalari_name:0 "三踵之下"
 tradition_agot_hartalari_desc:0 "#italic “密尔、里斯和泰洛西之间的战争不仅催生出争议之地的自由佣兵团，也养活了肯为任何金主战斗的海盗舰队和海上佣兵，其巢穴大都位于点缀在多恩断臂角和东方海岸间的石阶列岛。”#!"
 tradition_agot_qohorik_name:0 "黑森林与黑熔炉"
 tradition_agot_qohorik_desc:0 "#italic “科霍尔匠人亦声名远播。这里的织锦主要由城中女人和孩子编织，几乎和密尔织锦一样精美，却较为便宜；这里的市场上有过于精致（乃至让人害怕）的木雕，铁匠的手艺则无与伦比。”#!"
 tradition_agot_tyroshi_name:0 "蜗牛中的财富"
 tradition_agot_tyroshi_desc:0 "#italic “泰洛西染工很快学会了改变蜗牛的饮食来制造绯红、深红及深蓝色的染料，接下来几个世纪，他们还发明了其他上百种色相和深浅各异的染料，有些通过自然方法，有些通过炼金术。鲜艳的衣物赢得了全世界领主和王子们的青睐，而制造它们的染料统统来自泰洛西。该城邦因此变得富有而格调浮夸，乐于装扮华丽外表，男女都爱把发须染成夸张而不自然的颜色。”#!"
 tradition_agot_volantene_name:0 "瓦雷利亚的长女"
 tradition_agot_volantene_desc:0 "#italic “末日浩劫毁灭瓦雷利亚和长夏之地后，瓦兰提斯宣称有权统治全世界所有瓦雷利亚殖民地。#italic 「瓦雷利亚的长女」#!凭借强大实力，在「流血世纪」里一度控制了一些自由贸易城邦……”#!"
 tradition_agot_essosi_valyrian_name:0 "古老之血"
 tradition_agot_essosi_valyrian_desc:0 "#italic “许多瓦兰提斯旧贵族仍崇拜瓦雷利亚的旧神，但其信仰主要停留在黑墙之内，墙外则以红神拉赫洛的信徒居多，尤其在奴隶和自由民间。”#!"
 tradition_agot_astapori_name:0 "善主之治"
 tradition_agot_astapori_desc:0 "#italic “砖与血造就阿斯塔波，砖与血造就她的子民，古老的歌谣如是说，那指的是阿斯塔波的红砖城墙，它被成千上万为此而生、为此劳作、为此而死的奴隶的鲜血染红。阿斯塔波由自称「善主大人」的贵族统治，以出产称作无垢者的阉奴士兵而闻名——无垢者从孩童时代开始培育，训练目标是成为不知疼痛无所畏惧的战士。阿斯塔波人把他们当作老帝国步兵阵列军团的重生，但军团士兵是自由人，无垢者不是。”#!"
 tradition_agot_yunkaii_name:0 "贤主之治"
 tradition_agot_yunkaii_desc:0 "#italic “黄砖之城渊凯无须多说，那是世界上最腐化的地方，其统治者自称「贤主大人」。他们醉生梦死，贩售床奴、男妓及更堕落的产品。”#!"
 tradition_agot_meereenese_name:0 "伟主之治"
 tradition_agot_meereenese_desc:0 "#italic “奴隶湾旁最强盛的城邦是古老的弥林，虽然它和其他城邦一样只是夕日文明的残照，其人口与老帝国全盛时代相比可谓九牛一毛。弥林城的彩砖城墙同样蕴含无尽的痛苦，因此地的「伟主大人」训练奴隶在血染的竞技场中死斗，以此取乐。”#!"
 tradition_agot_ghiscari_name:0 "爪握闪电"
 tradition_agot_ghiscari_desc:0 "#italic “老吉斯：这个奴隶制城邦传说中的建立者是「伟人」格拉兹旦——他如此备受尊崇，乃至如今的奴隶主家族尚频频用他的名字为孩子命名。吉斯卡利人最久远的古史中声称，正是格拉兹旦建立了手持长盾和三种长矛、阵形紧密的步兵军团，这是人类第一支有严格纪律的作战部队。老吉斯凭借这些军队向四周殖民扩张，继而征服邻国，由是诞生出人类的第一个帝国，其统治持续若干世纪。”#!"
 tradition_agot_rhoynish_name:0 "贝壳中的誓言"
 tradition_agot_rhoynish_desc:0 "#italic “某些民族，如洛伊拿人，与扩张浪潮对抗几百乃至上千年。洛伊拿人在洛恩河畔建立了许多伟大城市，据说是首先学会铸铁的民族。”#!"
 tradition_agot_chroyanar_name:0 "节庆之爱"
 tradition_agot_chroyanar_desc:0 "#italic “……以及洛伊拿人最大的城市査约恩，人称「节庆之都」，恢宏壮美的爱心宫就在城内。”#!"
 tradition_agot_mellar_name:0 "花沼之上"
 tradition_agot_mellar_desc:0 "#italic “……花海中的白城萨·梅尔。”#!"
 tradition_agot_qhoynar_name:0 "举起大理石之拳"
 tradition_agot_qhoynar_desc:0 "#italic “……琴恩河畔有着许多绿色大理石厅堂的阿·诺颐。”#!"
 tradition_agot_sarhar_name:0 "由盐水运河养育"
 tradition_agot_sarhar_desc:0 "#italic “……以运河和盐水花园著称的海港萨霍伊。”#!"
 tradition_agot_sarar_name:0 "歌声绕泉"
 tradition_agot_sarar_desc:0 "#italic “……歌声围绕的喷泉之城娜·萨星。”#!"
 tradition_agot_insular_marriage_name:0 "封闭式婚姻"
 tradition_agot_insular_marriage_desc:0 "虽然不是孤立主义，但该文化更倾向于与自己人通婚。"
 tradition_agot_debug_name:0 "调试"
 tradition_agot_debug_desc:0 "你是怎么弄出这个的？"
 tradition_agot_axemen_name:0 "握住斧头"
 tradition_agot_axemen_desc:0 "#italic “安达尔人拿着铁铸的武器，穿着铁铸的板甲，土著部落毫无还手之力。”#!"
 tradition_agot_essari_name:0 "烈日苍穹之下"
 tradition_agot_essari_desc:0 "#italic “瓦雷利亚殖民地爱萨利亚——又称「失落的自由贸易城邦」。”#!"
 tradition_agot_noynar_name:0 "直至毛皮山丘"
 tradition_agot_noynar_desc:0 "#italic “……在这里母亲河接纳了她最狂野的女儿，娜恩河。”#!"
 tradition_agot_valyrian_original_name:0 "自由堡垒的意志"
 tradition_agot_valyrian_original_desc:0 "#italic “瓦雷利亚没有国王，它自称自由堡垒，有地产的公民均有发言权。”#!"
 tradition_agot_dothraki_sea_name:0 "大草海之上"
 tradition_agot_dothraki_sea_desc:0 "#italic “住在大草海之上的人过着游牧的生活方式，”#!"
 tradition_agot_dothraki_name:0 "骑着世界的骏马"
 tradition_agot_dothraki_desc:0 "#italic “旅行者称这片土地为「鬼地」，因废城遍布，或因其空旷称「大废土」，但草原最通俗的名称是「多斯拉克海」。然而这种说法是近代才兴起的，多斯拉克人为一年轻民族，「末日浩劫」毁灭瓦雷利亚后卡拉萨们才统治这片土地。他们带着铁与火从东方席卷而来，征服并毁灭了曾在此兴旺发达的古老城邦，将其人民掳走为奴。”#!"
 tradition_agot_grass_sea_name:0 "马蹄之下"
 tradition_agot_grass_sea_desc:0 "#italic “……阳光洒在生意盎然的多斯拉克海上，空气中充满泥土和死亡的气息。风吹草动，碧浪荡漾有如汪洋。”#!"
 tradition_agot_lhazareen_name:0 "团结的羊群"
 tradition_agot_lhazareen_desc:0 "#italic “……这个地方的人自称拉札林人，但多斯拉克人唤他们作「赫西拉奇」，意思是「羊人」。”#!"
 tradition_agot_omberi_name:0 "心甘情愿的朝贡者"
 tradition_agot_omberi_desc:0 "#italic “敢于继续向东的人，接下来会到达面积狭小、以牧业维生的奥柏王国，众所周知，这里懦弱的国王和屠弱的亲王们每年向多斯拉克马王献上谷物、宝石和少女，以求自保。”#!"
 tradition_agot_sarnori_name:0 "渔人女王的后裔"
 tradition_agot_sarnori_desc:0 "#italic “在已知世界诸多文明中，萨洛尔王国（这是习惯称呼，尽管其境内同时有四十多个彼此竞争的国王）得以发展到鼎盛，此后更存续了两千多年。但其历史今已失传，只留下残篇碎片，主要是《夏冬年鉴》及魁尔斯、奴隶湾和自由贸易城邦人士的相关记载。萨洛尔商旅远至瓦雷利亚、夷地、亚夏和雷岛；萨洛尔船只通过颤抖海驶往伊班岛、千岛群岛和远摩苏伊；萨洛尔国王与魁尔斯和老吉斯帝国开战，还频频率军深入东部大草原，扫荡游牧马民部落。”#!"
 tradition_agot_tagaez_fen_name:0 "高塔的后裔"
 tradition_agot_tagaez_fen_desc:0 "#italic “维斯特洛将后来的征服者称为萨洛尔人，因该民族强盛时的国土涵盖萨恩江及其所有支流流经的土地，包括萎缩后的银海形成的三个大湖。他们自称「高人」（在他们的语言里写作坦嘎赞·费恩），四肢修长，棕色皮肤——跟佐科拉人一样——但毛发和眼睛漆黑如夜。他们是战士、法师和学者，自称是被他们称作「神奇的」胡马佐·阿麦的英雄国王的后代。这位国王是末代渔人女王之子。”#!"
 tradition_agot_trimbaez_fen_name:0 "商队的后裔"
 tradition_agot_trimbaez_fen_desc:0 "#italic “沙那斯的东方伫立着「商队之城」卡沙斯。”#!"
 tradition_agot_goraez_fen_name:0 "湖畔的后裔"
 tradition_agot_goraez_fen_desc:0 "#italic “湖畔城市格尔纳西以运河闻名。”#!"
 tradition_agot_zanhar_fen_name:0 "学者的后裔"
 tradition_agot_zanhar_fen_desc:0 "#italic “「学者之城」塞洛西位于银海岸边，拥有宏伟的图书馆和彩绘城墙。”#!"
 tradition_agot_madekh_fen_name:0 "士兵的后裔"
 tradition_agot_madekh_fen_desc:0 "#italic “「士兵之城」莫达许也位于此间，又称「不可征服的」莫达许。”#!"
 tradition_agot_gilal_fen_name:0 "瀑布的后裔"
 tradition_agot_gilal_fen_desc:0 "#italic “「瀑布之城」沙萨尔位于萨恩江两条支流交汇处。”#!"
 tradition_agot_giren_fen_name:0 "山丘的后裔"
 tradition_agot_giren_fen_desc:0 "#italic “萨洛尔商旅远至瓦雷利亚、夷地、亚夏和雷岛。”#!"
 tradition_agot_cenaakh_fen_name:0 "神庙的后裔"
 tradition_agot_cenaakh_fen_desc:0 "#italic “唯有塞阿斯还供奉萨洛尔王国的百位神灵。”#!"
 tradition_agot_zivylar_fen_name:0 "钱币的后裔"
 tradition_agot_zivylar_fen_desc:0 "#italic “萨恩江下游折向北方的河段，洛茨拉、霍莫斯及凯萨等繁荣的河畔城市在深蓝色河域中发展出兴盛的贸易。”#!"
 tradition_agot_cewi_fen_name:0 "姐妹城的后裔"
 tradition_agot_cewi_fen_desc:0 "#italic “塞阿斯的姐妹城塞利斯位于三角洲另一头，几世纪前被一位多斯拉克卡奥洗动、摧毁，留下废墟。”#!"
 tradition_agot_dawiz_fen_name:0 "最后的后裔"
 tradition_agot_dawiz_fen_desc:0 "#italic “……今日只剩下塞阿斯，而这座港口城市也气息奄奄，不复昔日荣光。”#!"
 tradition_agot_cymmeri_name:0 "妻子的盔甲"
 tradition_agot_cymmeri_desc:0 "#italic “……他的西米利亚妻子为他打造盔甲（其族人很早就精通制作铁器）。”#!"
 tradition_agot_gipps_name:0 "妻子的盾牌"
 tradition_agot_gipps_desc:0 "#italic “……擅使柳条盾、双腿颀长、生着黄绿硬发的吉普斯人。”#!"
 tradition_agot_zoqora_name:0 "妻子驾驭的战车"
 tradition_agot_zoqora_desc:0 "#italic “据说他的佐科拉妻子为他驾驶战车……”#!"
 tradition_agot_first_clans_name:0 "号角吹响者"
 tradition_agot_first_clans_desc:0 "#italic “……在远古，还有吹响冬之号角、从地底唤醒巨人的乔曼。”#!"
 tradition_agot_nonteloshi_name:0 "礼节的纽带"
 tradition_agot_nonteloshi_desc:0 "#italic “我们提到九大自由贸易城邦，其实在厄斯索斯大陆还有许多瓦雷利亚市镇、居民点及前哨站，其中有些比海鸥镇、白港乃至兰尼斯港都大。让这九座城市脱颖而出的并非大小，而是起源。”#!"
 tradition_agot_valemen_main_name:0 "猎鹰骑士"
 tradition_agot_valemen_main_desc:0 "#italic “各地先民的结局大致同谷地一样，有的臣服安达尔人——乃至改信七神——也有些地方，安达尔人迎娶被打败的国王的妻女，以巩固统治，因为受压制的先民在数量上仍远多于安达尔人，不容忽视。”#!"
 tradition_agot_valemen_finger_name:0 "刻石为星"
 tradition_agot_valemen_finger_desc:0 "#italic “修士、歌手和学士均认同安达尔人最早的登陆点在艾林谷的五指半岛，此地的石头和岩崖上遍布七芒星雕刻——不过随着安达尔人征服的推进，这种行为渐浙被抛弃。”#!"
 tradition_agot_valemen_upper_name:0 "居高临下"
 tradition_agot_valemen_upper_desc:0 "#italic “起于河间地、穿过明月山脉的山路浸满鲜血，它虽陡峭多石，但能容大军深入谷地。”#!"
 tradition_agot_sistermen_name:0 "波涛的珍宝"
 tradition_agot_sistermen_desc:0 "#italic “最后归顺谷地的是三姐妹群岛。几千年间，这里一直以残忍的国王、海盗和掠夺者为傲，姐妹男驾长船航过咬人湾、狭海乃至颤抖海，随心所欲，逍遥法外，满载黄金和奴隶回到三姐妹群岛。”#!"
