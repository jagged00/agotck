 tradition_agot_stormlands_name:0 "性情正如天气"
 tradition_agot_stormlands_desc:0 "风暴地人向来坚韧不拔，性情尚武，也出了名的易怒。他们曾直面凡人的兵戈、自然的肆虐，甚至诸神的怒火，却非但没有覆灭，反而生生不息，日渐兴旺。"
 tradition_agot_marches_name:0 "不尽的战争"
 tradition_agot_marches_desc:0 "边疆地自古以来便是风暴地、河湾地与多恩领的交汇之处，自黎明纪元起，就见证了无数场战争的烽烟。世代居住在这里的人们，向来以精湛的武艺、骨子里的犟劲，以及对潜在威胁的时刻警惕而闻名。"
 tradition_agot_north_name:0 "青铜与钢铁的纽带"
 tradition_agot_north_desc:0 "北境人，这些世代扎根北境的男男女女向来是一群冷峻而坚韧的人。数千年前，他们因「饿狼」而团结一心；尽管族群众多，就像脚下的土地一样各有风貌，但所有人都被古老的誓言紧紧联结在一起。"
 tradition_agot_first_men_name:0 "青铜与骏马的征服"
 tradition_agot_first_men_desc:0 "#italic “先民不仅带来陌生的神祇和牛马牲畜，还带来青铜武器，而他们本身又比森林之子高大强壮，因此占据着优势。”#!"
 tradition_agot_northmen_name:0 "奔狼与凛冬的统治"
 tradition_agot_northmen_desc:0 "#italic “我们将炉火、心灵和收获都奉献与您，大人。我们的宝剑、长矛和弓箭听从您的召唤。请您怜悯我们的困苦，帮助我们的窘迫，公正平等地对待每个人，而我们将永远追随您。我以大地和江河的名义起誓……我以青铜和钢铁的名义起誓……我们以冰与火的名义起誓。”#!"
 tradition_agot_bearmen_name:0 "熊与族人并立"
 tradition_agot_bearmen_desc:0 "#italic “‘不错，我们是母熊，’梅姬伯爵夫人接口，‘环境使然。在古代，铁民们时时驾驶长船前来掠袭，野人也从冰封海岸过来骚扰。男人们必须出去捕鱼，以维持岛上生活，而留在家中的妻子得保护自身和孩子，否则便会被掠走。’”#!"
 tradition_agot_wolfswood_clansmen_name:0 "利爪与羽翼的追猎"
 tradition_agot_wolfswood_clansmen_desc:0 "#italic “狼林里危险四伏，莫非你上次还没汲取教训？”#!"
 tradition_agot_northern_clans_name:0 "寒冰与链甲"
 tradition_agot_northern_clans_desc:0 "#italic “我父亲常说，地图不等于实实在在的土地。人类在那些深山幽谷间生活了几千年，由氏族首领统治。”#!"
 tradition_agot_barrowmen_name:0 "越过溪流与山丘"
 tradition_agot_barrowmen_desc:0 "#italic “陛下，北方遍地都是坟墓啊……这是块古老的土地……也是个冷死人的地方。”#!"
 tradition_agot_stoneborn_name:0 "岩与肉的盛宴"
 tradition_agot_stoneborn_desc:0 "#italic “……嗯，连心树也只看见了斯卡格斯岛上发生的一半事情。”#!"
 tradition_agot_krakenmen_name:0 "诞生自海盐与冬雪"
 tradition_agot_krakenmen_desc:0 "#italic “其中最靠近铁群岛的海怪角更是无数回易主，以至许多学士认为当地人的血统更接近铁民而非北境人。”#!"
 tradition_agot_crannogmen_name:0 "以大地与海水起誓"
 tradition_agot_crannogmen_desc:0 "#italic “泽地人更是世上最危险的人群——这帮泥人、沼泽鬼、吃青蛙的始终潜伏在正派人难以察觉的角落。”#!"
 tradition_agot_harbormen_name:0 "雪与银的迎接"
 tradition_agot_harbormen_desc:0 "#italic “从前，他们是曼德河流域的大领主，但由于扩张过度，遂遭「青手」一家的制裁。狼王接纳了他们，他拿走了他们的金子，但允许他们保留自己的神，还划出领地给他们居住。”#!"
 tradition_agot_stormlander_main_name:0 "雷霆的战士"
 tradition_agot_stormlander_main_desc:0 "#italic “选择在风暴地定居的人——无论是在多石嶙峋的狭海海岸、潮湿苍翠的雨林抑或一望无际的边疆地——怀有特别的个性。常言道，风暴地人跟当地的天气一样变幻莫测、气势汹汹而喜怒无常。”#!"
 culture_parameter_fashionable_trait_more_common:0 "[GetTrait('fashionable').GetName( GetNullCharacter )][trait|E]更加常见"
 culture_parameter_fashionistas_marriage_acceptance_bonus:0 "[marriage|E]接受度：#P +10#!"
 TRADITION_BONUS_WEDDING_CEREMONIES_FASHIONISTAS:0 "$tradition_agot_fashionistas_name$[culture_tradition|E]：$VALUE|+=0$"
 tradition_agot_fashionistas_name:0 "织物的亲吻"
 tradition_agot_fashionistas_desc:0 "我也知道往往一件衣服没有穿旧，流行的式样已经变了两三通。"