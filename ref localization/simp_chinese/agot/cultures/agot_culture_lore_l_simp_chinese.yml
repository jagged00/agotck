l_simp_chinese:
 agot_culture_desc_fallback:0 "我们的文献中没有关于该文化的任何信息。"
 AGOT_CULTURE_COOLTIP_CLICK:0 "#weak [Culture.MakeScope.Var('agot_culture_tt_desc').Char.Custom('GetAGOTCultureDesc')]#!\n\n#I 点击查看[Culture.GetNameNoTooltip]#!"
 AGOT_CULTURE_COOLTIP_RD:0 "#weak [Culture.MakeScope.Var('agot_culture_tt_desc').Char.Custom('GetAGOTCultureDesc')]#!"
 agot_culture_children_desc:0 "那些歌颂大地的人，巨人口中的乌‑靼‑纳‑甘，或者说森林之子，无论他们被称作什么，都早已从这个世界上消失。自黎明纪元人类到来后，他们便逐渐式微，如今只留存于神话与传说之中。"
 agot_culture_dragon_desc:0 "龙是瓦雷利亚伟大的武器与奇迹。它们是火焰凝聚的生命，是披上双翼的铠甲，是狡黠的死亡化身。"
 agot_culture_giant_desc:0 "巨人是维斯特洛的两大原生种族之一，另一种族是森林之子。与森林之子一样，随着人类的到来，巨人数量也在不断减少，尽管仍有少数巨人存在于塞外的极北之地。"
 agot_culture_ifequevron_desc:0 "厄斯索斯北部的森林行者，即多斯拉克人称之为伊佛维隆的种族，是又一个早已消失在历史中的族群。据信，如果那些树木雕刻上的记载属实，他们或许与森林之子存在亲缘关系。"
 agot_culture_jhogwin_desc:0 "骸骨山脉北方的石巨人，或多斯拉克人称之为的杰戈温，是一群类似巨人的生物，很久以前被鸠格斯奈人灭绝了。"
 agot_culture_fisher_queen_race_desc:0 "在长夜降临之前，渔人女王们统治着一个位于银海之上的传说中的王国。人们认为这个王国在长夜期间覆灭，而最后一位渔人女王生下了胡马佐·阿麦，从而诞生了萨洛尔人。"
 agot_culture_others_desc:0 "异鬼，永冬之地的白鬼，只存在于神话与传说之中——至少学城是这么说的。但塞外最偏远的野人部落，以及北境的老奶妈们，都坚信第二次长夜终将降临，而异鬼也会随之而来。"
 agot_culture_mazemaker_desc:0 "从旧镇到罗拉斯，世界各地都能见到由黑石筑成的迷宫，其中规模最宏大、最引人注目的位于罗拉松岛。这些迷宫的建造者或许是人类与巨人的结合体。他们早已消失，传说是被人鱼、海豹人和海象民甚至深潜者等海洋生物毁灭的。"
 agot_culture_andal_desc:0 "安达尔人肩负着神圣使命航向西方并开启了征服。他们通过武力和言语，占领或同化了南方所有的王国，将其纳入自己的统治之下。"
 agot_culture_andalosi_desc:0 "当「所有安达尔人的国王」科尔龙进军诺佛斯时，他激怒了古老的自由堡垒，并从而为自身、他的王国及臣民招致了龙焰的毁灭。幸存下来的安达尔人如今成了一个散居各处、四分五裂的民族，受自由贸易城邦及厄斯索斯其他势力的统治。"
 agot_culture_crownlander_desc:0 "黑水湾沿岸的人民直到龙王到来与王领建立后才实现统一。在此之前，他们一直分属于不同的王国。而随着铁王座的铸成和君临城的建立，这里的人们终于有了可凝聚的核心。"
 agot_culture_sandman_desc:0 "多恩历来是维斯特洛人口最稀少的地区，当安达尔人到来时，他们主要占据了沙丘与海岸地带。但即便是赤红山脉中古老的王国，最终也通过武力或婚姻的方式被安达尔人所取代。"
 agot_culture_vineman_desc:0 "青亭岛以其美酒闻名于世，其人民以精湛的葡萄种植技艺闻名。为了将他们的葡萄佳酿运往各地销售，他们建立了一支强大的舰队，这支舰队在军事和经济层面都令人敬畏。"
 agot_culture_groveman_desc:0 "北疆地的战士历来是河湾地抵御西境与河间地侵袭的屏障力量。相比之下，南疆地尚有赤红山脉作为天然屏障，而此地唯一的防御便是周围的森林与手中的长矛。"
 agot_culture_honeywiner_desc:0 "沿蜜酒河及其支流的族群是最后被纳入河湾地版图的族群。他们向来更倾向于效忠旧镇而非高庭，至今仍有不少家族保持着这一传统。"
 agot_culture_reachman_desc:0 "曼德河及其支流沿岸的族群构成了河湾地最古老的文明核心。正是这片土地孕育了园丁王族，使其在兼并周边领地前便已建立统治基业，其人民至今仍奉行「青手」的传统之道。"
 agot_culture_shieldman_desc:0 "盾牌列岛的居民，无论男女，皆是坚韧不拔之辈。他们人如其名，世代守护着河湾地的百姓，使其免受铁民及其他海上威胁的侵害。"
 agot_culture_riverlander_desc:0 "直接毗邻三叉戟河的河间地居民倚靠其各支流进行贸易、征战与谋生。他们曾是河间地历史上三大王国立国的基石，也必将成为未来统治者的核心支柱。"
 agot_culture_bay_riverman_desc:0 "居住在狭海沿岸湾区的河间地居民，与三叉戟河沿岸的同胞虽血脉同源，但他们与河间地之外邻邦的接触与融合则要频繁得多。"
 agot_culture_cape_riverman_desc:0 "雄鹰角的河间地居民，长久以来一直是抵御他们最憎恶的敌人——铁民的先锋力量。他们时刻警戒，守护着河间地的其他地区，使其免遭来自日落之海的掠夺者与袭击者的侵扰。"
 agot_culture_green_riverman_desc:0 "沿绿叉河北缘与颈泽接壤的河间地人，世代与北境的沼泽魔鬼鏖战不休。尽管冲突不断，当地人仍凭贯穿此地的贸易路线，积累客观的财富。"
 agot_culture_highland_riverman_desc:0 "绿叉河以东、明月山脉前的高原与丘陵间，栖居着一支离群的河间地族群。他们与谷地居民有诸多相似之处，却仍维系着与河间地同胞的手足情谊。"
 agot_culture_lake_riverman_desc:0 "环绕神眼湖定居的河间地居民以水为生。他们的生活方式独具特色，因为湖泊本身就是他们的家园。尽管在历史上屡屡处于不同外部势力的统治之下，但他们始终顽强地守护着自己的信仰与传统。"
 agot_culture_rush_riverman_desc:0 "黑水河沿岸的河间地居民地处最南端，长期以来一直是安达尔人南方各大王国交汇的十字路口，也因此见证了诸多决定性的历史战役。"
 agot_culture_cape_stormlander_desc:0 "居住在风怒角的风暴地人，以其应对暴雨侵袭的本领而闻名，他们世代栖居的家园在终年暴雨如注的广袤密林间。在此地谋生是一个浸透雨水的过程，却是他们永不放弃的生活方式。"
 agot_culture_hook_stormlander_desc:0 "御林与马赛岬的风暴地人是个稍显疏离的群体。尽管与周边居民有着诸多相似之处，甚至有时也怀有忠诚，但在道德准则上却格外恪守己见。"
 agot_culture_stormlander_desc:0 "古杜兰登王国核心地带的男男女女，始终坚定不移地抵御着一切威胁，无论是敌人、风暴，甚至是巨龙。"
 agot_culture_tarthman_desc:0 "居住在蓝宝石岛上的风暴地人是一个自豪的民族。相较于大陆上的同胞，他们有着更纯粹的安达尔血统。一个以大理石构筑的强盛王国曾在这座岛屿上孕育。"
 agot_culture_marcher_desc:0 "多恩边疆地的居民，无论男女，皆以坚韧不拔著称。他们世代应对来自赤红山脉以南的掠袭者，并以手中的长弓迎击一切来犯之敌。"
 agot_culture_bite_valeman_desc:0 "咬人湾的谷地人与其近邻最为相似。因地处河间地与北境交界，使得两地的风俗习惯潜移默化地融入其文化之中。"
 agot_culture_valeman_finger_desc:0 "五指半岛是安达尔人在维斯特洛登陆的地方，他们在这片土地与人民留下了不可磨灭的印记。作为维斯特洛较为贫瘠的地区之一，五指半岛人终年栖居于风浪肆虐的礁石之上，在这片他们称之为家园的险恶环境中勉强度日。"
 agot_culture_valeman_desc:0 "谷地人位于古代山谷王国真正的核心地带。这片维斯特洛最丰饶的沃土孕育出一个基于骑士精神、侠义风范与骑士制度理想的社会。"
 agot_culture_sisterman_desc:0 "三姐妹群岛的岛民在谷地人眼中堪称异类。虽如其他谷地人般被安达尔人征服，他们却固守着诸多古老习俗。此地新生儿常伴生蹼趾，传说这是古代女神留下的印记。"
 agot_culture_valeman_upper_desc:0 "居住在明月山脉附近的谷地人是一个颇为传统的群体。他们长期守护着自己的家园，以抵御险恶的山地氏族侵袭。这种经历塑造了他们无论在战争还是治理中都偏向防御保守的风格，并格外珍视其古老的习俗与传统。"
 agot_culture_green_westerman_desc:0 "西境南部的西境人与南方的河湾地人具有诸多相似之处。凭借在丘陵地带的耕作，他们开辟了除地下矿产外的另一财富来源。"
 agot_culture_hill_westerman_desc:0 "定居在西境内陆丘陵高地深处的居民，扼守着通往河间地的陆路通道，每逢战事必率先迎击西境之敌。"
 agot_culture_westerman_desc:0 "坐落于古凯岩王国核心地带的西境人，以其广袤的矿藏和依矿而建的地下厅堂而闻名。"
 agot_culture_shore_westerman_desc:0 "西境沿岸及岛屿的西境人长期在日落之海上航行，以追逐财富与荣耀。这也意味着，他们总是比自己的内陆同胞更早面对铁民的侵袭。"
 agot_culture_clawman_desc:0 "蟹爪半岛的居民是个奇怪的民族，据说还带着几分野性。他们大多仍保留着先民的血统，当年安达尔人更多是败给了这片土地而非当地居民。他们向来好斗成性，然而七神信仰仍在此地扎下了根。"
 agot_culture_first_man_desc:0 "先民手持青铜武器，驾驭马匹，席卷了维斯特洛的平原与山丘。"
 agot_culture_barrowman_desc:0 "先民荒冢人是北境第二大族群，他们主导着先民荒冢及其东面的溪流地。无论是驯养在厩中的，还是驰骋于原野的，此地居民与马匹的深厚羁绊都广为人知。"
 agot_culture_bearman_desc:0 "熊岛居民是一个坚韧的族群，长期遭受着来自铁民与野人的劫掠。这种无休止的生存斗争使得岛上的女性也拿起武器与男人并肩作战，传说她们如同保护幼崽的母熊般令人畏惧。"
 agot_culture_crannogman_desc:0 "泽地人是一个深居简出的族群，常因身材矮小和善用毒物而受人轻视。他们既可是忠诚的挚友，亦可为致命的死敌。数千年来，他们一直守护着北境，抵御南方安达尔人的入侵，也因此被那些意图北上征服的入侵者冠以“沼泽魔鬼”的称号。"
 agot_culture_harborman_desc:0 "白港及其周边地区的居民是颇为独特的一群人。他们本质上仍是北境人，与周围的邻居有着诸多共同点，但也因白港本身的城市特质以及与狭海对岸各大势力广泛的贸易往来，而显得远较其他北境人见多识广且更具开阔的眼界。"
 agot_culture_krakenman_desc:0 "海怪角人，指的便是那些历史上曾被铁民统治的北境居民。然而，这段共有的历史并未使两个民族和睦相处。他们至今仍时刻警惕着落日之海，防范来自铁群岛的威胁。"
 agot_culture_northern_clan_desc:0 "北境的山地氏族是居住于丘陵山脉间的部落民，他们民风彪悍，部落自成体系。他们鄙弃南方及更发达地区的商品，生活简朴，然而对其誓言与传统却保持着极度忠诚。"
 agot_culture_northman_desc:0 "北境人是北境规模最庞大、地位最尊崇的族群，身为先民的后裔，他们始终恪守着古老的传统。他们的先祖曾领导北境击退了安达尔人的入侵，使其成为维斯特洛唯一未被征服的土地，这份骄傲至今仍流淌在他们的血脉之中。"
 agot_culture_skagosi_desc:0 "岩种是斯卡格斯岛的原住民，也是北境诸族中文明程度最低的一支。尽管被其他北境人鄙夷地称作“斯卡哥人”——视其与野人无异——他们却是唯一仍在沿用古语的北境人。只有他们才真正传承着古老的传统，甚至包含那些黑暗的习俗。"
 agot_culture_wolfswood_clansman_desc:0 "居住在狼林的居民，其生活方式与身份认同皆由这片他们称之为家的广袤森林所塑造。森林提供了他们所需的一切：栖息其中的动物是他们的食物来源，而林木则为他们提供了建造与制作的原材料。"
 agot_culture_first_clan_desc:0 "在长夜过后，「筑城者」布兰登筑起绝境长城时，仍有部分先民留在了遥远的那一侧。如今居住在真北之地的不同族群，正是源自这些最初的部族。"
 agot_culture_axeman_desc:0 "当大多数安达尔人向西迁徙时，斧岛人却逆流而返，回到东方的古老故土——斧头半岛。他们在此寻得僻静与安全，尽管向其他势力臣服，却始终固守疆土，安然自处。"
 agot_culture_chroyanar_desc:0 "节庆之都查约恩的洛伊拿人称得上是洛伊拿民族中最杰出的一支。无论战时还是平时，都是其他民族所仰望的对象。"
 agot_culture_mellar_desc:0 "居住在萨·梅尔及东部沼泽地的洛伊拿人，长久以来一直是抵御东方威胁的坚固屏障。"
 agot_culture_noynar_desc:0 "洛伊拿人沿着娜恩河向上游扩张，将诺佛斯据为己有。他们虽然适应了丘陵地带的生活，却依然将流经此地的水域——尤其是娜恩河的狂野水流——奉若神明。"
 agot_culture_qhoynar_desc:0 "居住在琴恩河畔的洛伊拿人，以其宏伟的大理石建筑和娴熟驾驭匕首湖的航运技艺而闻名。"
 agot_culture_rhoynar_original_desc:0 "伟大的洛伊拿人，洛恩母亲河的儿女，以其早早掌握冶铁技艺与精湛的河流舟船技术而闻名。他们曾长久地航行于他们伟大的母亲河及其众多支流之上。"
 agot_culture_sarhar_desc:0 "在最南端的城市萨霍伊，当地的洛伊拿人是洛伊拿民族中特立独行的一支。当大多数洛伊拿人固守于母亲河及其支流时，萨霍伊人却走得更远，他们不仅驾驭内河，更扬帆驶向广阔的夏日之海。"
 agot_culture_sarar_desc:0 "喷泉之城娜·萨星，曾是洛伊拿人在洛恩河及娜恩河上游北岸的中心之一。盖林曾由此地出征抗击长毛人，而娜梅莉亚得统治也从这里开始。"
 agot_culture_trimbaez_fen_desc:0 "卡沙斯的居民，即提姆巴赞·费恩，意为“健谈的人”，以其广泛的游历和众多的商队而闻名。"
 agot_culture_cymmeri_desc:0 "定居于银海周边的部落民族——西米利亚人，以其擅长冶铁而闻名。"
 agot_culture_gipps_desc:0 "定居于银海周边的部落民族——吉普斯人，以其柳条盾牌而闻名。"
 agot_culture_zoqora_desc:0 "定居于银海周边的部落民族——佐科拉人，以其战车闻名。"
 agot_culture_goraez_fen_desc:0 "湖畔的格尔纳西的居民，即戈拉赞·费恩，意为“湖泊的人”，以使用湖畔生长的草药治疗疾病而闻名。"
 agot_culture_zanhar_fen_desc:0 "塞洛西的居民，即赞哈尔·费恩，意为“好学的人”，以追求知识和藏有众多典籍的图书馆而闻名。"
 agot_culture_madekh_fen_desc:0 "莫达许的居民，即玛德赫·费恩，意为“尚武的人”，以其对战争和纪律的执着而闻名。"
 agot_culture_tagaez_fen_desc:0 "坦嘎赞·费恩，即通常所说的“高人”，他们是胡马佐·阿麦的子民，渔人女王的继承者，也是西米利亚人、佐科拉人与吉普斯人的联盟。他们在长夜过后建成了世界上最伟大的文明之一。"
 agot_culture_gilal_fen_desc:0 "吉拉尔·费恩，意为“爱音乐的人”，以围绕城市瀑布举办的节庆活动而闻名。"
 agot_culture_cenaakh_fen_desc:0 "瑟纳赫·费恩，意为“像祭司的人”，因其虔诚在整个萨洛尔闻名，使凯萨真正成为神庙之城。"
 agot_culture_giren_fen_desc:0 "吉伦·费恩，意为“山丘的人”，是萨洛尔人与爱萨利亚丘陵土著混血而成的民族，被认为是这些难以管束的族群中最桀骜不驯的一支。"
 agot_culture_zivylar_fen_desc:0 "兹维拉·费恩，意为“黄金的人”，居住在钱币之城洛茨拉，因其城市所产的巨大财富而在萨洛尔闻名。"
 agot_culture_cewi_fen_desc:0 "塞利斯的居民，即瑟韦·费恩，意为“三角洲的人”，定居于萨恩三角洲的湿地。"
 agot_culture_dawiz_fen_desc:0 "在萨洛尔人仅存的城邦塞阿斯，当地居民自称达维兹·费恩，意为“最后的人”。如果萨洛尔民族能复兴，必将从这里开始。"
 agot_culture_essosi_valyrian_desc:0 "即使古瓦雷利亚民族已经覆灭，且与其他民族有了融合，在自由贸易城邦及其更远地区，仍能找到许多保持着古瓦雷利亚多数习俗的家族。他们虽非龙王后裔，却仍珍视着这份古老的传承。"
 agot_culture_valyrian_original_desc:0 "长夏之地孕育出了已知世界最伟大的文明——瓦雷利亚自由堡垒。它凭借瓦雷利亚人对龙和血魔法的掌控而崛起。"
 agot_culture_braavosi_desc:0 "布拉佛斯人勤劳进取，在银行业、染料业和造船业都成就斐然。他们的船只穿梭于世界各大港口，暗紫色的船帆是其最显著的特征。"
 agot_culture_essarian_desc:0 "万物皆源自太阳，荣耀之主——至少爱萨利亚人是如此相信的。他们抛弃了瓦雷利亚的宗教宽容，寻找到一片净洁之地，并以他们认为正确的方式崇拜神明。"
 agot_culture_lorathi_desc:0 "在著名的迷宫和安达尔人被烧毁的遗迹中，罗拉斯人找到了自己的一席之地。在逐渐抛弃了原始的博阿西崇拜后，如今的罗拉斯更为开放包容，不过也时常为保护自身在大陆的利益而对抗外来的威胁。"
 agot_culture_norvoshi_desc:0 "诺佛斯人将对多种宗教的容忍视为亵渎，因而寻求一处能够纯粹地崇拜之地。自那时起，他们便狂热地守护着自己的土地与经文，抵御一切威胁。"
 agot_culture_pentoshi_desc:0 "与自由贸易城邦的许多人一样，潘托斯人同样致力于追求金钱。正因如此，无论结果是好是坏，他们都与钱币结下了不解之缘。"
 agot_culture_nonteloshi_desc:0 "潘托斯和密尔之间的这片土地，与三女儿王国无休止争夺的争议之地截然不同。诺特罗斯人依靠外交手腕与礼节周旋，无论哪个新的宗主国要求他们效忠，他们都欣然接受。"
 agot_culture_qohorik_desc:0 "在黑森林旁，科霍里人找到了供奉他们的黑暗之神、施展黑暗技艺的地方。他们长久以来严守秘密，尤其是锻造方面的技艺，至今仍是唯一掌握重铸瓦雷利亚钢技艺的民族。"
 agot_culture_hartalari_desc:0 "在三女儿王国的争端中，踵地的原住民哈塔拉尔人被卷入其中。连绵的冲突摧毁了这片曾经丰饶的土地，将其变成了饱经战火的争议之地。"
 agot_culture_lyseni_desc:0 "“可爱的里斯”的人民恰如他们的城市，外表光彩照人，内里却阴暗贪婪。里斯人以贩卖奴隶和海盗行径闻名于世，却又欢迎所有人来到他们人间天堂般的家园。"
 agot_culture_myrish_desc:0 "密尔人是个奇特的民族，远比他们浮夸的邻族更为内敛。他们的制造技艺无与伦比——这得益于奴隶的支持——而他们的战士则配备着致命的十字弩。"
 agot_culture_tyroshi_desc:0 "泰洛西人热情奔放，无论投身战争、爱情、工艺、贸易还是其他任何事务，都会全力以赴。他们以头盔和染料闻名，并以此二者来彰显个性。"
 agot_culture_volantene_desc:0 "瓦兰提斯人自豪地称自己为“瓦雷利亚的长女”，曾一度试图效仿母邦征服其他姐妹城邦。然而历经岁月，他们逐渐形成了独特的体制——拥有三首执政、象党、虎党，以及与已灭亡的祖先截然不同的利益追求。"
 agot_culture_ghaeni_desc:0 "随着古吉斯在第五次吉斯卡利战争中覆灭，许多吉斯卡利人试图在自由堡垒之外重建他们的生活方式。于是新吉斯便在吉恩岛上诞生，他们在沿袭古老习俗的同时也接纳了新传统，其中包括国王统治的制度。"
 agot_culture_ghardaqi_desc:0 "位于弥林上游的吉斯卡利殖民者适应了大草原与南方土地交界地带的生活。他们利用马王部族搜罗奴隶，而后将这些奴隶输送至南方的吉斯腹地。"
 agot_culture_ghiscari_original_desc:0 "吉斯帝国之古老，即便与萨洛尔诸王国及夷地的黄金天朝相较，也不遑多让。它的基石是砖与血——既有奴隶的血，也有吉斯卡利人的血；既有那些在方阵军团中行进者的血，也有那些筑起宏伟金字塔的人的血。"
 agot_culture_shuzduni_desc:0 "在拉扎林以南定居的吉斯卡利人沿袭了大草海上马背民族的行事风格，在这片土地上迅速而高效地往来迁徙。"
 agot_culture_hazdahni_desc:0 "吉斯卡利殖民者向北深入大草海的丘陵与平原，积极与草原上的部落及民族发展贸易。"
 agot_culture_astapori_desc:0 "阿斯塔波及其人民长久以来都自视为古吉斯的军事继承者。方阵军团在他们手中重生为无垢者，并将成为吉斯卡利复兴的支柱。"
 agot_culture_meereenese_desc:0 "尽管它的姐妹城邦各有主张，但弥林确实是吉斯卡利人现存最伟大的城市——任何一个弥林人都会指出这一点。它拥有最大的金字塔、最多的人口，以及最负盛名的竞技场。"
 agot_culture_yunkaii_desc:0 "渊凯，真正的万城女王，吉斯的城市本就高过其他一切城市，渊凯更是吉斯卡利诸城中最美丽、最有教养的存在。渊凯人继承了古吉斯最高尚的方面，而将那些更贪婪的特质留给了他们的姐妹城邦。"
 agot_culture_gorgari_desc:0 "高戈尔是南方大陆最强大的吉斯卡利城邦。高戈尔人将土著在眼泪岛加工后运回吉斯卡利故土，由此建立起一个能与吉斯任何市场相匹敌的奴隶市场。"
 agot_culture_goroshari_desc:0 "戈罗斯建于翼龙角的海岸，其居民不仅要应对空中飞蜥的威胁，还面临着下方沼泽湿地中无数的危险，这使得戈罗斯人比他们的同族更为强悍。"
 agot_culture_zamettari_desc:0 "夷门塔建立在夷河河口，是抵御凶险丛林的堡垒，当地人不得不对抗来自上游的威胁。"
 agot_culture_dothraki_desc:0 "大草海上令人敬畏的马王，多斯拉克人，是文明世界与其他人类王国的灾祸。他们视大地为伟大的母亲，并将给任何用犁、铲子和斧头切割母亲肉体的人送去毁灭。"
 agot_culture_lhazareen_desc:0 "拉札林是一个平和的牧民社会。他们的宗教宣扬和平主义，这让他们成了邻邦眼中理想的奴隶人选，然而他们高大的城墙仍能抵御多斯拉克人和吉斯卡利人的威胁。"
 agot_culture_omberi_desc:0 "奥柏人是个安静的民族，他们能在多斯拉克邻居的威胁下生存下来，靠的是向任何经过的卡奥献上丰厚的礼物，并安守自己的土地。"
 agot_culture_hairy_forest_desc:0 "长毛人是一个古老的种族，曾让整个已知世界都感到惧怕。其中一些部落定居在厄斯索斯的广阔森林中，，四处征战，劫掠邻邦。"
 agot_culture_hairy_isle_desc:0 "长毛人是一个古老的种族，曾让整个已知世界都感到惧怕。其中一些部落定居在颤抖海的岛屿和海岸，四处征战，劫掠邻邦。"
 agot_culture_hairy_rivers_desc:0 "长毛人是一个古老的种族，曾让整个已知世界都感到惧怕。其中一些部落定居在洛恩河北方支流周围的丘陵地带，四处征战，劫掠邻邦。"
 agot_culture_bayasabhadan_desc:0 "在骸骨山脉深处，留存着海尔科隆后裔国最后的孑遗。沙之路上，屹立着宏伟的要塞城市巴亚撒布哈德。这里的人们和其他城市的同胞一样，在抵御四方来敌的同时，守护着连接东方与骸骨山脉以西陆路贸易的关键节点。"
 agot_culture_hyrkoonan_original_desc:0 "海尔科隆后裔国的居民，是那位拯救世界、驱退长夜的伟大英雄的真正后裔。这份遗产意味着重大的责任；唯有最优秀、最强健的男性方能将传承交付后世，确保当长夜再度降临之时，必有最坚毅的守护者挺身而出。"
 agot_culture_kayakayanayan_desc:0 "在骸骨山脉深处，留存着海尔科隆后裔国最后的孑遗。钢之路上，屹立着宏伟的要塞城市卡亚卡亚纳亚。这里的人们和其他城市的同胞一样，抵御着所有潜在的威胁，尤其是与他们有着古老世仇的鸠格斯奈人。"
 agot_culture_shamyrianan_desc:0 "在骸骨山脉深处，留存着海尔科隆后裔国最后的孑遗。石之路上，屹立着宏伟的要塞城市沙米利安纳。这里的人们和其他城市的同胞一样，在挖掘骸骨山脉以巩固堡垒与哨站的同时，抵御着所有企图进犯的威胁。"
 agot_culture_shan_ren_desc:0 "在很久以前，那片土地还未化作大沙海的尘埃，那时的后裔国还远不止三座孤城，其中一座城市便是阿萨伯哈德。随着后裔国的衰落，阿萨伯哈德的人民在黄金天朝找到了新的家园和庇护者。他们接受了黄金天朝的习俗，与其民众通婚，由此形成了山族——天朝治下的众多民族之一。"
 agot_culture_ibbatese_desc:0 "那些在伊班岛的山丘与高地中寻求安宁的人们，比他们沿海的同胞更为隐居避世，却同样勇猛好斗。"
 agot_culture_ibbenese_desc:0 "尽管伊班人船只遍布四方，他们却是一个离群的民族。他们是坚定的盟友，也是凶悍的敌人，以其庞大的捕鲸船而闻名。"
 agot_culture_ib_sarese_desc:0 "伊班·萨最初作为罪犯流放地建立，这段历史深刻影响着当地的人。伊班·萨的男子比他们在主岛上的同胞更为凶悍。"
 agot_culture_greenborn_desc:0 "虽然那些在青绿之地安家的铁民可能会被其他铁种所轻视，却将淹神的疆域扩展到了前所未有的广度。"
 agot_culture_ironborn_desc:0 "凡生于铁群岛者，皆为铁种，是灰海王的后裔、淹神的子嗣。凡能嗅到海盐之味的人，无论来自日落之海，还是更远之处，都对他们心生恐惧。"
 agot_culture_jade_islander_desc:0 "那些以玉海诸岛为家的人们，长久以来航行于波光粼粼的海域，从事贸易与征战。"
 agot_culture_lengii_desc:0 "圣岛上的雷岛人极度独立，抗拒任何企图征服他们的外来势力。"
 agot_culture_manticorian_desc:0 "蝎尾兽群岛的居民以危险著称，就像他们那的著名昆虫一样。"
 agot_culture_marahaiian_desc:0 "天堂岛上的居民，即莫拉海岛人，深深珍视他们的岛屿所赐予的丰饶馈赠。"
 agot_culture_bloodless_man_desc:0 "根传奇与神话所述，五垒之外的城邦里生活有无血人。得名如此，或许因为他们肤色苍白如同大理石，又或许他们会吸干受害者的血液。"
 agot_culture_carcosan_desc:0 "在破晓山脉深处，隐海之畔，坐落着卡科萨城。据说那里的人是与深渊中黑暗诸神交易的巫师与法师。"
 agot_culture_dathian_desc:0 "卡达什坐落于血海东方辽阔的平原上，这里的居民因图谋统治周边地区而闻名，这些地区包括骨镇、伯劳鸟之地以及北方的灰色荒原。"
 agot_culture_grey_man_desc:0 "灰色荒原上的居民依靠劫掠来获取财富与资源带回故土，因为此地正如其名，几乎无法为居住者提供任何所需之物。"
 agot_culture_fish_man_desc:0 "那些以千岛群岛为家的人是排外的民族，围绕他们有着种种奇异的传说与流言。据说他们半人半鱼，会吃掉所有造访他们岛屿的人。"
 agot_culture_lion_man_desc:0 "传说在血乱发生前，五垒以外的土地归属于夜狮。在光之女与天帝不再关视黎明上国后，狮人便得以自由地惩罚背叛的人类。"
 agot_culture_mossovite_desc:0 "遥远摩苏伊的居民以冷漠的性格以及与信仰的紧密联系而闻名。"
 agot_culture_shryke_desc:0 "伯劳鸟是那些在夸张故事和酒馆闲聊中常被提及的种族。可以确定的是，他们统治着五垒外的大片土地，并且行动迅捷、来去如风。"
 agot_culture_winged_man_desc:0 "翼人是一个栖息在五垒外的种族，谣传他们能依靠翅膀飞行，但这很可能是夸张之说。据说他们在那片混乱之地建起了城市。"
 agot_culture_farosi_desc:0 "法罗斯人统治着大莫拉克岛的中北部地区。他们的城市是肉桂航线上主要的贸易港口之一，这些航线绕过了玉海之门和魁尔斯，这引发了两个民族间的严重对立。"
 agot_culture_moraqi_desc:0 "莫拉克人是大莫拉克岛上的居民。在魁尔斯人占据北部、法罗斯人统治中部地区之后，他们民族的重心便转移到了岛屿的南部。"
 agot_culture_vahari_desc:0 "瓦哈尔人是天生的商人和水手，他们靠香料和其他货物的贸易发了财，尤其是在玉海之门以南的地区。"
 agot_culture_zabhadi_desc:0 "扎巴拉人居住在象岛，他们的财富来源于这些动物。在他们的文化中，象牙既是重要的出口商品，也是声望和社会地位的象征。"
 agot_culture_jogos_nhai_desc:0 "骸骨山脉之外令人畏惧的游牧民族——鸠格斯奈人，自古以来便是夷地、海尔科隆、尼盖尔、杰戈温及其他民族的灾祸。他们顶着尖头，骑着斑马，给所有外族带来毁灭与死亡，却从不与彼此争斗。"
 agot_culture_nefer_desc:0 "尼盖尔曾是一个辽阔的王国，如今却已衰落。鸠格斯奈人将他们逼至最后的避难所——尼芙，然而在这座隐蔽之城内，他们击退尖头人并重建家园的希望依然坚定。"
 agot_culture_qaathi_desc:0 "古代的魁尔斯人正在逐渐消失。他们曾是众多在银海平原定居的部落之一，后被萨洛尔人驱逐。历经数次战争，他们南逃至一片当时青翠富饶的土地，但那里不久便荒芜变为赤土。直到多斯拉克人到来，魁尔斯城及其属地之外的古魁尔斯人才最终走向消亡。"
 agot_culture_qaleen_desc:0 "魁尔岛人的先祖可追溯至魁尔斯的行商与魁尔岛的玉海原住民。他们如今是玉海之门的东方堡垒和屏障。"
 agot_culture_qartheen_desc:0 "作为古魁尔斯人最后一支，魁尔斯人自视为世上唯一真正文明的民族，即便他们只能蜷缩在魁尔斯民族最后的孤城。"
 agot_culture_greenblood_desc:0 "当大多数洛伊拿人与多恩原住民逐渐融合时，绿血河人却坚守故我。他们竭力保持古老传统的纯洁，始终期盼着重归母亲河的怀抱。"
 agot_culture_salt_dornish_desc:0 "居住在半岛东部地区的多恩人拥有最浓厚的洛伊拿血统。他们是洛伊拿人与维斯特洛人融合最真实的体现，是这两种文化最为紧密的结合。"
 agot_culture_sand_dornish_desc:0 "多恩内陆的沙丘与沙漠塑造了这里的人民，其影响不亚于任何征服者。他们学会在缺水中生存，能在沙海中隐匿踪迹，这些多恩人因而成为致命的敌人。"
 agot_culture_stone_dornish_desc:0 "赤红山脉的多恩人是顽强好斗的民族。尽管他们是多恩受洛伊拿文化影响最少的群体，却与沙丘和海岸的同族一样，被北方的安达尔人视为异类。这些以劫掠与暴行闻名的山民，是危险而可畏的敌人。"
 agot_culture_abular_desc:0 "当娜梅莉亚团结最后的洛伊拿人逃离自由堡垒时，他们并未直接前往多恩。他们先去了索斯罗斯，但事实证明那是趟不幸的旅程。随后他们又前往盛夏群岛，其中一些人留在了女人岛，并接纳了当地岛民的生活方式。"
 agot_culture_asshaii_desc:0 "亚夏人是一个奇异而晦暗的民族，他们常年在阴影笼罩下，活动在亚夏油性黑石建筑和城墙里。据说他们表情严肃，并以佩戴漆面具而闻名。"
 agot_culture_shadowman_desc:0 "居住在阴影之地的人们，甚至连亚夏人都害怕他们。他们拥抱他人仅是短暂涉足的黑暗，并在此繁衍生息。"
 agot_culture_basiliskite_desc:0 "以蛇蜥群岛为据点的人以分裂割据、海盗习性闻名。他们时常袭击自由贸易城邦、纳斯岛与盛夏群岛，是多数海域的祸患之一。"
 agot_culture_brindled_man_desc:0 "斑纹人，是索斯罗斯的原住民，因其皮肤上遍布的斑纹而得名。他们奉行孤立主义，且常有排外倾向，仅与沿海小型聚落有有限接触，从事受限制的贸易，此外便少有往来。"
 agot_culture_gogossite_desc:0 "高高索斯人由瓦雷利亚统治者与高戈尔人土著融合而成的民族。他们坦然接纳了本岛及邻近夷林的黑暗历史。"
 agot_culture_yeenite_desc:0 "索斯罗斯大陆的黑暗之城——夷林的原住民已经回归，并再度开始扩张他们的国家。"
 agot_culture_naathi_desc:0 "纳斯岛人，又称“和平之民”，定居于蝴蝶岛。他们生性与世无争，却常常不幸被奴隶贩子和掠夺者盯上。"
 agot_culture_jhalai_desc:0 "扎勒岛是盛夏群岛中最大的岛屿，其人民性情激昂，往往比其他岛屿的同胞更尚武。正是在那里，奴隶贩子被彻底驱逐。"
 agot_culture_moluuni_desc:0 "摩鲁岛人居住在西部诸岛，尽管所有盛夏群岛人都擅长航海，但摩鲁岛人最为杰出。那里诞生了伟大的天鹅船，正是这些船只绘制出各大海域的航线。"
 agot_culture_omborui_desc:0 "奥本卢岛人以节庆与盛宴闻名。他们一直以来都热情好客，但许多族人最终也成为流亡者或流浪者。"
 agot_culture_walanoi_desc:0 "瓦兰诺岛人生活在北部诸岛。他们通常与外界接触最为频繁，并以在活着的树木上保存详尽记录而闻名。"
 agot_culture_painted_clansman_desc:0 "即使在自由堡垒疆域内也同样存在部落氏族，彩绘山脉氏族便是如此。他们生性野蛮，虽与南方文明的亲族有着共同的血源，却崇拜着那些被亲族驯服的巨龙。"
 agot_culture_elyrian_desc:0 "埃利亚由瓦雷利亚自由堡垒建立，当地民众全心投入与吉斯卡利诸城的奴隶贸易，乃至同吉斯的联系比瓦雷利亚更为紧密。如今埃利亚人仍自认是瓦雷利亚后裔，却已大多采纳了吉斯的习俗。"
 agot_culture_bhorashi_desc:0 "巴哈拉西曾是一片废墟，坐落于玛塔里斯与弥林之间的恶魔之路上，如今却因勇敢者在这条险恶的商道上往来贸易而重焕生机。"
 agot_culture_mantaryan_desc:0 "玛塔里斯及其人民据说阴森可怖，形同妖魔。畸形与恶疾似乎在该地人口中肆虐，然而他们仍是一股强大的势力，控制着自由贸易城邦与奴隶湾之间的关键陆路通道——恶魔之路。"
 agot_culture_tolosi_desc:0 "在黑色大峭壁之上，脱罗斯以其投石者闻名于世。与邻近城邦一样，他们接纳了东方吉斯卡利城邦的奴隶贸易，与奴隶湾的关系日益紧密。"
 agot_culture_high_valyrian_desc:0 "高等瓦雷利亚人是瓦雷利亚自由堡垒的统治者，他们是个与众不同的民族。他们驾驭巨龙进行统治，自视高于一切，无论是凡人还是诸神。即便在末日浩劫后——彼时他们失去了故土与帝国，却仍保有巨龙，仍翱翔于其他种族之上。"
 agot_culture_westerosi_valyrian_desc:0 "在坦格利安家族的龙王来到维斯特洛之前，其他瓦雷利亚人早已将日落之地当作自己的家园。这些瓦雷利亚人采纳了许多维斯特洛本土的生活方式，同时仍保留着部分传统，维持着与古自由堡垒的联系。"
 agot_culture_cave_dweller_desc:0 "当戈尼和詹德尔带领自由民穿越戈尼通道南下时，许多追随者的命运便已注定。戈尼被史塔克家族杀死，詹德尔则带领败军退回地下，最终迷失在下方的洞穴中。这就是至今仍居住在洞穴中的人们的由来。"
 agot_culture_fangman_desc:0 "霜雪之牙的居民坚韧而可畏。他们以善于攀爬著称——甚至能攀越长城——是最致命的袭击者。"
 agot_culture_forestman_desc:0 "鬼影森林的野人是守夜人与学士们最常遭遇的野人。他们生性好斗，总爱把自己的地盘划分成尽可能小的区域。"
 agot_culture_frozen_shoreman_desc:0 "居住在冰封海岸的居民，即便在其他野人眼中也显得颇为奇特。关于他们驾驭海豹与海象牵引骨制雪橇的传闻流传甚广，但唯一确凿的是，他们是娴熟的掠袭者。"
 agot_culture_hornfoot_desc:0 "硬足民是一个居住于极北之地的部落，与夜行部人一直战争不断，且有不穿鞋的习俗。他们的脚竟然没有全部冻伤坏死，简直是个奇迹。"
 agot_culture_ice_riverman_desc:0 "栖息在西部冰架沿冰河而居的氏族与世隔绝；据说由于缺乏其他肉类来源，食人的习俗在那里十分普遍。"
 agot_culture_lakefolk_desc:0 "在极北广袤的冰湖之畔，当地人设法在冰封的湖泊旁，有时甚至是在冰湖之上建立家园。这片水域极少有温暖，覆盖的冰层几乎从未融化过。"
 agot_culture_milkwaterman_desc:0 "聚居在乳河畔的族群，这条大河从北方的霜雪之牙发源，一路奔流入寒冰湾。沿河两岸，遍布着伟大先民英雄的古冢。"
 agot_culture_nightrunner_desc:0 "夜行部是一个生活在极北之地的部落，以擅长夜袭闻名，过着近乎昼夜颠倒的生活。对于任何睡觉不睁一只眼的人来说，他们都是堪称可怕的敌人。"
 agot_culture_thenn_desc:0 "瑟恩人是极北之地一个与世隔绝的部落，居住在山谷之中，得以躲避周遭的严寒。他们比大多数邻近部落更有组织性，以冶炼青铜闻名，是塞外最接近纪律严明社会的族群。"
 agot_culture_moon_clan_desc:0 "明月山脉中的各个部落是那些拒绝向艾林诸王臣服的人的后裔。他们舍弃了文明社会，沦为亡命之徒，希望着有一天能够夺回他们的王国。"
 agot_culture_aobao_ren_desc:0 "奥宝族是居住在中原的夷地人，他们以勤于劳作且忠心耿耿闻名于世。"
 agot_culture_bixi_ren_desc:0 "碧玺族居住在夷地东部，常年面临阴影之民的侵扰与五垒之外势力的威胁。他们是坚韧的民族，致力于守护帝国的东部边疆的安危。"
 agot_culture_haungyu_ren_desc:0 "黄玉族居住在玉海海岸以北的中部雨林地带。他们以信念坚定著称，有时甚至到了愚顽固执的地步，其部族中亦有游历各方的秘术修行者。"
 agot_culture_heinao_ren_desc:0 "黑瑙族是夷地北部的坚韧民族，以悠久的尚武传统著称。他们世代抵御着鸠格斯奈人，保卫帝国免受可憎宿敌的侵袭。"
 agot_culture_feicui_ren_desc:0 "翡翠族是南方夷地人中最通晓世事的一支。他们在玉海沿岸建造了宏伟的城市，开展海岸贸易，并将黄金天朝的疆域扩展至前所未有的规模。"
 agot_culture_zhenzhu_ren_desc:0 "珍珠族据说是最古老的夷地民族。他们是黄金天朝的学者与僧侣，历史可以追溯至古老的黎明上国时期。"