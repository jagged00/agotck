 the_others_religion_desc:0 "在人类王国之外，极北的永冬之地，崇拜的是更为寒冷的存在，是寒冰与死亡之神。"
 cold_gods:0 "永冬寒神"
 cold_gods_adj:0 "永冬"
 cold_gods_adherent:0 "臣服者"
 cold_gods_adherent_plural:0 "臣服者"
 cold_gods_desc:0 "正如人类、巨人和森林之子都有神灵与信仰，异鬼也不例外。它们的崇拜残酷无情，完全献给了凛冬的暴虐。"
 cold_gods_wildling:0 "凛冬寒神"
 cold_gods_wildling_adj:0 "寒神"
 cold_gods_wildling_adherent:0 "臣服者"
 cold_gods_wildling_adherent_plural:0 "臣服者"
 cold_gods_wildling_desc:0 "其他人往往崇拜自然、天上的诸神或圣焰之心，而只有那些感受过死亡刺骨寒意的人知道，唯一的真神是永冬寒神，他们终有一日会再度南下，带来又一场长夜。"