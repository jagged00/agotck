 agot_bm_group_8211:0 "211 A.C."
 agot_bm_8211:0 "春季之后"
 agot_bm_8211_desc:0 "维斯特洛的春季大瘟疫肆虐了近两年，夺走了数万人的生命。死者包括「贤王」戴伦及其长孙兼继承人瓦拉尔王子。随着他们的逝去，戴伦的次子伊里斯·坦格利安一世如今登上了铁王座。伊里斯选择了私生子出身的叔叔「血鸦」布林登担任首相，这让他最小的弟弟梅卡大为恼怒——自从岑树滩那场悲剧的比武大会后，梅卡一直背负着弑亲者的骂名。\n\n盛夏厅亲王郁郁不平地回到了封地。与此同时，他的第四子伊耿王子，在「高个」邓肯爵士的指引下，开始了他漫长的旅程。\n\n#bold 尽管只是跳蚤窝出身的私生子，这位教导伊耿的骑士或许很快将再度成为领主、贵妇、王子与国王们传奇歌谣的核心人物。#!"
 bookmark_211_daemon_blackfyre:0 "戴蒙二世"
 bookmark_211_daemon_blackfyre_subheading:0 "做梦之龙"
 bookmark_211_daemon_blackfyre_desc:0 "十五年前，戴蒙·黑火一世举旗反叛同父异母的哥哥——国王戴伦·坦格利安二世。他与其年长的儿子们一起战死于红草原，仅留下幼子戴蒙继承他那充满争议的王位宣称权。随着国王驾崩、书呆子伊里斯一世加冕，或许再没有比此刻更佳的时机，能让「年轻的」戴蒙争夺铁王座了。挡在他面前的是「寒铁」——他的叔叔至今既未交出他父亲的宝剑，也未让出王冠。\n\n#bold 他能否做到父亲未竟之事，夺取铁王座？#!"
 bookmark_211_bittersteel:0 "「寒铁」伊葛王子"
 bookmark_211_duncan_tall:0 "「高个」邓肯爵士"
 bookmark_211_duncan_tall_subheading:0 "誓言骑士"
 bookmark_211_duncan_tall_desc:0 "距「破矛者」贝勒王子殒命岑树滩已有两年。这期间，邓克继续带着他的侍从——化名「伊戈」的梅卡亲王之子，伊耿·坦格利安王子四处游历。当春季大瘟疫肆虐维斯特洛大陆时，邓克与伊戈在多恩的沙海中找到了避难所。如今，他效力于年迈的尤斯塔斯·奥斯格雷爵士，以誓言骑士的身份驻守在坚定堡的塔楼。\n\n#bold 邓克会恪守誓言，还是另寻更强大的主君？#!"
 bookmark_211_egg:0 "伊戈"
 bookmark_211_rohanne_webber:0 "罗翰妮夫人"
 bookmark_211_rohanne_webber_subheading:0 "冷壕堡女领主"
 bookmark_211_rohanne_webber_desc:0 "罗翰妮·维伯在春季大瘟疫爆发后继承了冷壕堡，其父未留下男性子嗣继承领地。尽管她的地位看似稳固，但已故的维伯伯爵留下了一项条件：罗翰妮必须寻得第五任丈夫，否则领地将由堂亲继承。纵使她能再度缔结婚约，四周虎视眈眈的强敌仍会不断试探她的实力。\n\n#bold 「红寡妇」会守住她的权位，还是坠入敌人的罗网？#!"
 bookmark_211_longinch:0 "「长人」卢卡斯爵士"
 bookmark_211_eustace_osgrey:0 "尤斯塔斯爵士"
 bookmark_211_eustace_osgrey_subheading:0 "坚定堡骑士"
 bookmark_211_eustace_osgrey_desc:0 "尤斯塔斯·奥斯格雷在黑火叛乱中失去了一切。他对黑龙的支持让他失去了儿子、妻子、女儿……以及希望。曾经显赫的家族如今只剩坚定堡塔楼，而他也成了年迈等死的悲痛欲绝之人。周围已有人窥见他的衰弱，想趁机夺走这位老骑士仅存的一切。他麾下收留了「棕盾」本尼斯爵士和「高个」邓肯爵士。\n\n#bold 这位年迈的方格狮会守住尊严与塔楼，还是将随家族最后的荣光一同倾覆？#!"
 bookmark_211_bennis:0 "「棕盾」本尼斯爵士"