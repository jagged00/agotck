 agot_bm_group_8236:0 "236 A.C."
 bookmark_236_lyonel_baratheon:0 "领主 莱昂诺"
 bookmark_236_lyonel_baratheon_desc:0 "[Concept( 'story_content_lyonel_baratheon_236', '$bm_story_content_available_icon|q$' )|E][Concept( 'story_content_lyonel_baratheon_236', '$bm_story_content_available_copy|q$' )|E]\n人称「狂笑风暴」的莱昂诺·拜拉席恩大人是位身材魁梧且骄傲的男人。他在伊耿历209年的岑树滩比武大会上赢得了荣誉，然而那场决定命运的骑枪比武却蒙着一层阴影。当时，年轻的伊耿王子恳请莱昂诺在七子审判中为邓肯爵士出战……这场胜利代价惨重。\n\n如今，另一场黑火叛乱迫在眉睫，伊耿五世国王希望让长子兼继承人邓肯·坦格利安王子与莱昂诺大人的女儿订婚，以此缔结联盟。\n\n#bold 狂笑风暴会再次成为胜利的一方吗？#!"
 bookmark_236_ormund_baratheon:0 "蒙德"
 bookmark_236_cassandra_baratheon:0 "卡珊德拉"
 bookmark_236_aegon_targaryen:0 "国王 伊耿五世"
 bookmark_236_aegon_targaryen_desc:0 "[Concept( 'story_content_aegon_v_236', '$bm_story_content_available_icon|q$' )|E][Concept( 'story_content_aegon_v_236', '$bm_story_content_available_copy|q$' )|E]\n伊耿・坦格利安五世国王的统治始于一个严酷的寒冬，如今这场寒冬终于结束了。在他统治的最初几年里，不该成王的王调拨了大量的粮食和谷物，用以救助忍饥挨饿的民众，这为他赢得了平民百姓的爱戴。尽管他深受农民的拥护，但在王国的贵族之中，有些人觉得国王的新改革削弱了他们的权力。\n\n#bold 王国的贵族们会团结在他们合法的国王身后，还是会倒戈投向戴蒙・黑火的阵营？#!"
 bookmark_236_duncan_targaryen:0 "「矮个」邓肯王子"
 bookmark_236_duncan_targaryen_desc:0 "「矮个」邓肯，国王的长子兼龙石岛亲王，铁王座的继承人。国王以他的导师兼挚友「高个」邓肯爵士的名字为他的长子命名。他的父亲对他的婚事有着长远的规划。为了加强坦格利安家族与王国各大领主间的联系，并借此安抚他们在国王改革中受挫的自尊，邓肯王子注定要迎娶一位出身名门的新娘。然而，邓肯是个任性的王子。既然他的父亲选择为爱结婚，他为何不能也这样做呢？\n\n#bold 「矮个」邓肯会为了王国和国王坚守职责，还是会迎娶自己中意的新娘？#!"
 bookmark_236_jaehaerys_targaryen:0 "杰赫里斯王子"
 bookmark_236_betha_blackwood:0 "黑贝丝"
 bookmark_236_duncan_tall:0 "邓肯爵士"
 bookmark_236_gerold_lannister:0 "领主 「金狮」杰洛"
 bookmark_236_gerold_lannister_desc:0 "杰洛·兰尼斯特，凯岩城领主兼西境守护，在其兄泰伯特及其侄女瑟蕾拉意外且可疑地离世后开始掌权。无论封臣还是平民都不喜欢他，认为他是一名弑亲者。尽管如此，他的统治颇为繁荣，「金狮」杰洛极大地提升了兰尼斯特家族的财富与影响力。然而，这位曾经能干的领主如今只能卧病在床，将凯岩城的统治权交给了野心勃勃的艾莲·雷耶斯夫人——他的儿子兼继承人提恩的妻子。\n\n#bold 金狮会任由自己的权力与遗产落入红狮女儿的手中吗？#!"
 bookmark_236_tion_lannister:0 "提恩爵士"
 bookmark_236_bittersteel:0 "团长 伊葛"
 bookmark_236_bittersteel_desc:0 "[Concept( 'story_content_bittersteel_236', '$bm_story_content_available_icon|q$' )|E][Concept( 'story_content_bittersteel_236', '$bm_story_content_available_copy|q$' )|E]\n伊葛·河文，人称「寒铁」，其在怒火的驱使下，于七国之外赢得了赫赫声名。这位凶猛的黄金团团长已拥立戴蒙三世·黑火为铁王座的合法国王，二人正谋划入侵维斯特洛。黄金团、黑火军队，以及任何选择加入他们事业的领主，这三方力量联合起来，必将对伪王伊耿五世及其仆从构成巨大挑战。\n\n#bold 寒铁最终能否将一位黑火扶上铁王座的王位？#!"
 bookmark_236_daemon_blackfyre:0 "国王 戴蒙三世"
 bookmark_236_daemon_blackfyre_desc:0 "[Concept( 'story_content_daemon_blackfyre_236', '$bm_story_content_available_icon|q$' )|E][Concept( 'story_content_daemon_blackfyre_236', '$bm_story_content_available_copy|q$' )|E]\n戴蒙·黑火三世——哈耿·黑火一世之子、第三代黑火国王——已在泰洛西由「寒铁」伊葛·河文加冕。他率领着一批流亡骑士与自由城邦的战士横渡狭海，决心为黑火家族夺取铁王座，彻底结束这场纷争。虽然强大的寒铁在身旁辅佐，但戴蒙仍然需要说服王国的一些领主支持他的事业！\n\n#bold 第四次黑火起义最终能否成功？#!"
