 setting_lmf_non_dynasty_additional_maidens:0 "非玩家宗族"
 setting_lmf_non_dynasty_additional_maidens_desc:0 "少女在游戏开始时添加，也可通过决议添加。这些少女使用新的宗族和现有的宗族，但绝不使用玩家的宗族。"
 setting_lmf_restricted_additional_maidens:0 "无现存宗族"
