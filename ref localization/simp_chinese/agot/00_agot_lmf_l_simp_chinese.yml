 lmf_interaction.1326.t:0 "好开端"
 lmf_interaction.1326.desc.start.actor:0 "在[secondary_recipient.GetFirstNamePossessiveNoTooltip]宫廷度过的这一天是美好的。\n"
 lmf_interaction.1326.desc.start.actor.hunting:0 "在离[actor.Custom('FortifiedBuilding')]不远的地方悠闲地打猎，他们也没想狩猎什么，只是互相聊天。"
 lmf_interaction.1326.desc.start.actor.hike:0 "在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]四周闲逛，我在期间指点各种历史景点，来成为谈资。"
 lmf_interaction.1326.desc.start.actor.garrison:0 "前往[actor.Custom('FortifiedBuilding')]的军营，[secondary_recipient.GetHerHim]看着我与[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]互相决斗。每当我休息时，我们就彼此闲聊。"
 lmf_interaction.1326.desc.start.actor.poetry:0 "在[actor.Custom('FortifiedBuilding')]花园里漫步，[secondary_recipient.GetHerHim]听我朗诵[actor.GetCulture.GetNameNoTooltip]诗，都是关于爱与勇气。不过，我们大部分时间都在聊天。"
 lmf_interaction.1326.desc.start.actor.library:0 "参观图书馆，在书架间向[secondary_recipient.GetHerHim]展示我最珍贵的书籍。当然，重点不在于书籍，而是作为谈资。"
 lmf_interaction.1326.desc.start.actor.poor:0 "在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]外面救济穷人，也作为谈资。"
 lmf_interaction.1326.desc.start.actor.tour:0 "参观了[actor.Custom('FortifiedBuilding')]和周围，我自豪地展示[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]可以提供的东西来作为我们的谈资。"
 lmf_interaction.1326.desc.start.actor.garden:0 "在[actor.Custom('FortifiedBuilding')]的宁静且美丽的花园里散步，让我们沉浸并交谈。"
 lmf_interaction.1326.desc.start.actor.hated:0 "我们确有交谈\n\n显然[secondary_recipient.GetFirstNameNoTooltip]发现[secondary_actor.Custom('lmf_intro_activity_short')]是个无聊选项，但即便如此"
 lmf_interaction.1326.desc.start.actor.loved:0 "我们确有交谈\n\n显然[secondary_recipient.GetFirstNameNoTooltip]对[secondary_recipient.GetHerselfHimself]很感兴趣，而且我们"
 lmf_interaction.1326.desc.start.actor.neutral: "我们确有交谈\n\n在这一天的时间里，我们"
 lmf_interaction.1326.desc.start.actor.mid:0 "详细讨论了未来以及我们心中所想。尽管知道到处都有人注视着我们，但我们俩都感到很安心。\n\n当太阳开始下山时，我意识到——这个[secondary_recipient.Custom('WomanManGirlBoy')]是我可以托付的另一半，而且我确信[secondary_recipient.GetSheHe]也有同样的感受。"
 lmf_interaction.1326.desc.actor.lover:0 "事实上，[secondary_recipient.GetHerHis]的眼睛里闪烁着光芒，这说明也许[secondary_recipient.GetSheHe]对我感兴趣的不仅仅是一个[secondary_actor.GetWifeHusband]。"
 lmf_interaction.1326.desc.actor.friends:0 "事实上，我觉得我们都找到了真正的联系……但不一定单纯是[secondary_recipient.GetWifeHusband]，也许是爱人。"
 lmf_interaction.1326.desc.actor.end:0 "\n\n那么真正的问题是，这是我想要的吗？"
 lmf_interaction.1326.desc.start:0 "[secondary_actor.GetFirstNameNoTooltip]和[secondary_recipient.GetFirstNameNoTooltip]两个互相陪伴，看着偎依样子，看来这一天成果不错。\n\n他们"
 lmf_interaction.1326.desc.hunting:0 "在离[actor.Custom('FortifiedBuilding')]不远的地方里悠闲地狩猎。当然重点不是狩猎，而是两人有机会交谈。"
 lmf_interaction.1326.desc.hike:0 "在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]与[secondary_actor.GetFirstNameNoTooltip]一同四周闲逛，两个在期间指点各种历史景点，作为谈资。"
 lmf_interaction.1326.desc.garrison:0 "前往[actor.Custom('FortifiedBuilding')]的军营，[secondary_recipient.GetFirstNameNoTooltip]看着[secondary_actor.GetFirstNameNoTooltip]与[actor.Custom('KnightCulturePluralNoTooltipLowercase')]互相决斗。每当[secondary_actor.GetSheHe]休息时，就会闲聊。"
 lmf_interaction.1326.desc.seduction:0 "在[actor.Custom('FortifiedBuilding')]漫步……守卫报告他们有点太亲密了。[secondary_actor.GetFirstNamePossessiveNoTooltip]的行为在交谈中甚至有些不得体。"
 lmf_interaction.1326.desc.poetry:0 "在[actor.Custom('FortifiedBuilding')]花园里漫步，[secondary_recipient.GetFirstNameNoTooltip]听[secondary_actor.GetFirstNameNoTooltip]朗诵[secondary_actor.GetCulture.GetNameNoTooltip]诗，据说都是关于爱与勇气。不过大部分时间都在聊天。"
 lmf_interaction.1326.desc.library:0 "参观图书馆，在书架间向[secondary_actor.GetFirstNameNoTooltip]展示[secondary_recipient.GetFirstNameNoTooltip]最珍贵的书籍。当然，重点不在于书籍，而是作为谈资。"
 lmf_interaction.1326.desc.church:0 "去了[actor.GetFaith.HouseOfWorship|l]，听了一些虔诚的]布道，不过他们似乎并没有聊天。"
 lmf_interaction.1326.desc.tavern:0 "前往[actor.Custom('FortifiedBuilding')]附近村庄的一家小酒馆。我听说，[secondary_actor.GetFirstNameNoTooltip]似乎决心寻欢作乐，但即便如此，他们也有很多时间交谈。"
 lmf_interaction.1326.desc.poor:0 "在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]外面救济穷人，也作为谈资。"
 lmf_interaction.1326.desc.tour:0 "参观了[actor.Custom('FortifiedBuilding')]和周围，[secondary_actor.GetFirstNameNoTooltip]自豪地展示[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]可以提供的东西来作为谈资。"
 lmf_interaction.1326.desc.garden:0 "在[actor.Custom('FortifiedBuilding')]的宁静且美丽的花园里散步和交谈。"
 lmf_interaction.1326.desc.hated:0 "虽然很明显[secondary_recipient.GetFirstNameNoTooltip]觉得[secondary_actor.Custom('lmf_intro_activity_short')]很无聊，"
 lmf_interaction.1326.desc.loved:0 "据说，[secondary_recipient.GetFirstNameNoTooltip]显然认为[secondary_actor.Custom('lmf_intro_activity_short')]让人很感兴趣，并且"
 lmf_interaction.1326.desc.neutral:0 "[secondary_recipient.GetFirstNameNoTooltip]似乎很喜欢[secondary_actor.Custom('lmf_intro_activity_short')]，并且"
 lmf_interaction.1326.desc.mid:0 "他们愉快地交谈着。尽管所有人的目光都注视着他们的一举一动，但他们看上去很放松，这一天似乎很成功。\n\n当太阳开始下山，这对新人被叫回[ROOT.Char.Custom('FortifiedBuilding')]吃晚饭，[secondary_actor.GetFirstNameNoTooltip]私下里也承认了这一点。\n\n“这就是我想娶的[secondary_recipient.Custom('WomanManGirlBoy')]，”[secondary_actor.GetSheHe]说道。\n\n"
 lmf_interaction.1326.desc.secrec.player:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]是否也有同样的感觉？这样的婚姻是我想要的？"
 lmf_interaction.1326.desc.end:0 "显然，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))]也有同样的感觉。那么问题来了，他们的婚姻还是我想要的吗？"
 lmf_interaction.1326.a:0 "是的，我祝福他们。"
 lmf_interaction.1326.b:0 "我不需要另一个情人，只需要一个[secondary_recipient.GetWifeHusband]。"
 lmf_interaction.1326.c:0 "我们将结婚，但我不需要其作为朋友。"
 lmf_interaction.1326.d:0 "继续结婚！"
 lmf_interaction.1326.e:0 "我们将结婚，[secondary_recipient.GetSheHe]将成为我的爱人。"
 lmf_interaction.1326.f:0 "是的，[secondary_recipient.GetSheHe]将是我的[secondary_recipient.GetWifeHusband]和朋友。"
 lmf_interaction.1326.g:0 "我改主意了，算了吧"
 agree_to_marriage_intro_ask_rec.tt:0 "如果[recipient.GetTitledFirstName]愿意接受这桩婚事，那么它将继续进行"
