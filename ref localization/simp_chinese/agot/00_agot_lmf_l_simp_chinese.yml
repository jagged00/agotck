 lmf_heir.1654.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]那好几周，大部分时间都在渴望回到[heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]。\n\n也许[your_heir.Custom('polite_gender_ref')]还没准备好离家这么远，我不知道，但[ROOT.Char.Custom('FortifiedBuilding')]仆人说[your_heir.GetTitledFirstNameNoTooltip]大部分时间都待在房间里，要么哭泣，要么抱怨。即使出来，但任何与其他人相遇都会让[your_heir.GetHerHim]立即掉头。\n\n虽然[your_heir.GetSheHe]才刚刚安顿下来，后面再看看[your_heir.GetHerHis]的表现如何，但这无疑是一个不好开始。"
 lmf_heir.1654.a:0 "我确信[your_heir.GetSheHe|U]会对我们热情起来的。"
