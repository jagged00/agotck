 agot_elope.1004.owner.refused:0 "显然，[owner.GetLiege.GetTitledFirstNameNoTooltip]拒绝了[owner.GetTitledFirstNamePossessiveNoTooltip]的结婚请求，所以现在[owner.GetSheHe]决定亲自处理此事。尽管我对他们的处境表示同情，但法律就是法律，他们的行为让双方都蒙羞了。"
 agot_elope.1004.target.refused:0 "显然，[target.GetLiege.GetTitledFirstNameNoTooltip]拒绝了[target.GetTitledFirstNamePossessiveNoTooltip]的结婚请求，所以现在[owner.GetTitledFirstNameNoTooltip]决定亲自处理此事。尽管我对他们的处境表示同情，但法律就是法律，他们的行为让双方都蒙羞了。"
 lmf_army.1010.t:0 "随军人员"
 lmf_army.1010.female.start:0 "行军时，总会有至少一些女人随军，她们大多是厨师和洗衣女工，但也有特殊的“随军人员”，她们希望能吸引[ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]的注意，要么是为了婚嫁，要么只是为了提供一夜的舒适，赚点钱。\n\n通常我不太关注这些女人，但最近#EMP 有一个女人#!引起了我的注意。她叫[follower.GetCulture.GetNameNoTooltip]，每次我经过她时她都会对我微笑，而且总是深夜来拜访……\n\n"
 lmf_army.1010.male.start:0 "行军时，总会有至少一些杂役随军，他们大多是厨师和洗衣女工，但也有特殊的“随军人员”，她们希望能吸引[ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]的注意，而且愿意提供一些“服务”。\n\n通常我不太关注这些人，但最近有一个男人引起了我的注意。他叫[follower.GetCulture.GetNameNoTooltip]，据说他是个洗衣妇的儿子，帮忙修理马车，每次我经过他时他都会对我微笑，而且总是深夜来拜访……\n\n"
 lmf_army.1010.end:0 "问题是……#EMP 我#!愿意接受吗？"
 lmf_army.1010.a:0 "我要亲自“拜访”[follower.GetHerHim]"
 lmf_army.1010.b:0 "最好避免这样的纠缠。"
 lmf_army.1020.t:0 "酒馆女侍"
 lmf_army.1020.desc:0 "营地单调的烹饪让我和几个[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]前往[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]附近村庄的一家小酒馆，我们喝上几杯以作慰藉。\n\n这个夜晚过得相当愉快，酒馆里的一个女侍显然注意我们，她走到我们桌边，为我们干杯，还享受我们的笑话，而且她对我一直微笑。\n\n几杯酒后发泄一后，我想来一夜激情吗？我只需要问问就行了。"
 lmf_army.1020.a:0 "我做了可别介意！"
 lmf_army.1020.b:0 "我对她不感兴趣。"
 lmf_army.1030.t:0 "酒馆里的喧闹之夜"
 lmf_army.1030.desc:0 "我和几个[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]从[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]军营溜去附近的一个村庄酒馆。\n\n酒馆还算不错，没过多久，我们就都喝得酩酊大醉，放声高歌，像士兵们一样忙碌着。\n\n但渐渐地有些失控，当地人和我们互相争吵了几句，打了几拳，不知不觉中，我就和一个暴怒且粗鲁的当地人面对面了。"
 lmf_army.1030.a:0 "是时候发泄一下了"
 lmf_army.1030.a.injury.tt:0 "[champion.GetShortUINameNoTooltipNoFormat|U]在斗殴中受伤"
 lmf_army.1030.a.injury.desc:0 "你的[player.Custom('KnightCultureNoTooltipLowercase')][champion.GetShortUIName]，在[province.GetTitle.GetNameNoTierNoTooltip]附近的一个村庄酒馆斗殴受伤。"
 lmf_army.1030.b:0 "也许我可以劝服大家，以免事情变得更糟……"
 lmf_army.1030.c:0 "先离开以免事态变得#EMP 太激烈#!"
 lmf_army.1040.t:0 "欢乐之夜"
 lmf_army.1040.siege.start:0 "围攻一直在进行，感觉看不到尽头。营地里的气氛愈发紧张，我承认自己也感受到了压力。\n\n当太阳下山时，我们去了军需官的帐篷，拿出烈酒，然后和[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]们一起痛快畅饮，他们为我鼓掌喝彩，看来明天会宿醉一天。\n\n"
 lmf_army.1040.march.start:0 "行军仿佛永无止境。营地愈发紧张，我承认自己也感受到了压力。 因此太阳落山后，我和营地的[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]，占领了[army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip]附近一个小村庄的酒馆。\n\n当地人很快就被我们吓跑了，酒馆老板则无助地看着我们欢呼痛饮，我已经预见到明天会宿醉一天。\n\n"
 lmf_army.1040.end:0 "理智告诉我我要停下来，但我#EMP 需要#!某种发泄方式。"
 lmf_army.1040.a:0 "我要找个人一起过夜。"
 lmf_army.1040.a.male.camp:0 "你在营地里寻找一名年轻男子来与之同寝。"
 lmf_army.1040.a.male.tavern:0 "你在酒馆里寻找一位年轻男子与之同寝。"
 lmf_army.1040.a.female.camp:0 "你寻找一名随军人员来陪你睡觉。"
 lmf_army.1040.a.female.tavern:0 "你在酒馆里寻找一位年轻女子与之同寝。"
 lmf_army.1040.b:0 "我要去找个人来切磋一下。"
 lmf_army.1040.c:0 "参加一些赌博活动或许不错。"
 lmf_army.1040.d:0 "我要大吃特吃！"
 lmf_army.1040.e:0 "我正需要这样一夜放纵！"
 lmf_army.1040.f:0 "我要抵制诱惑，还是去休息吧。"
 lmf_army.1050.t:0 "战友"
 lmf_army.1050.march.start:0 "[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]巡逻的日子很漫长。"
 lmf_army.1050.siege.start:0 "围攻[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]的日子很漫长。"
 lmf_army.1050.end:0 "士兵之间气氛常常紧张。\n\n然而今晚，当我在篝火旁休息，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]坐在我旁边，[army_friend.GetSheHe|U]给我讲了一些有趣的故事，让我心情平静下来，等到炉火渐渐熄灭，我几乎完全忘记了自己身在何处。\n\n我一下子了然，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]很清楚我的心情，所以特意花了一晚上来陪伴我，[army_friend.GetHerHis]真是个很棒的[army_friend.GetWomanMan]。"
 lmf_army.1050.a:0 "我觉得我交到了一个新朋友"
 lmf_army.1050.a.friend.tt:0 "[player.Custom('KnightCulturePluralNoTooltip')]成为朋友"
 lmf_army.1050.a.friend.desc:0 "你的[player.Custom('KnightCulturePluralNoTooltipLowercase')][champion.GetShortUIName]和[army_friend.GetShortUIName]在[province.GetTitle.GetNameNoTierNoTooltip]的营地中成为朋友"
 made_friend_at_army_camp:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]在[PROVINCE.GetNameNoTooltip]驻扎期间成为朋友。"
 lmf_army.1050.b:0 "感谢[army_friend.GetHerHis]，今晚就够了。"
 lmf_army.1060.t:0 "军队争执"
 lmf_army.1060.mid:0 "士兵之间气氛常常紧张。\n\n今晚就是这样，我今天一整天都和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))]发生争吵，这些争吵几乎要演变成争执，最后我干脆走开了。\n\n然而，后来我们围坐在火堆旁时，我无意中听到[army_rival.GetHerHim]对另一个[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]说起我。 这一切都是因为"
 lmf_army.1060.revenge:0 "[army_rival.GetHerHis]渴望复仇，"
 lmf_army.1060.impious:0 "[army_rival.GetHerHis]对我的“不虔诚”感到不满，"
 lmf_army.1060.pious:0 "[army_rival.GetHerHis]不喜欢我的虔诚，"
 lmf_army.1060.faith:0 "[army_rival.GetHerHis]不喜欢我的信仰，"
 lmf_army.1060.jealous:0 "嫉妒，"
 lmf_army.1060.differences:0 "我们之间的差异，"
 lmf_army.1060.hatred:0 "[army_rival.GetHerHis]对我的怨恨，"
 lmf_army.1060.end:0 "我再也不想[army_rival.GetHerHim]那犬吠。我站起来打算挑战[army_rival.GetHerHim]，然后我和[army_rival.GetSheHe]就打了起来。另一个[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]不得不把我们拉开……\n\n然后[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))]竟说#EMP 我#!才是罪魁祸首！"
 lmf_army.1060.a:0 "“你妈的！”"
 lmf_army.1060.a.rival.tt:0 "[player.Custom('KnightCulturePluralNoTooltip')]成为仇敌"
 lmf_army.1060.a.rival.desc:0 "你的[player.Custom('KnightCulturePluralNoTooltipLowercase')][champion.GetShortUIName]和[army_rival.GetShortUIName]在[province.GetTitle.GetNameNoTierNoTooltip]的营地中成为仇敌"
 became_rivals_army_camp:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]在[PROVINCE.GetNameNoTooltip]驻扎期间成为仇敌。"
 lmf_army.1060.b:0 "我会尽力劝服，弥补我的错。"
 lmf_army.1060.c:0 "忍一忍海阔天空……"
 lmf_army.1070.t:0 "怒火沸腾"
 lmf_army.1070.mid:0 "军营里有[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))]那肯定也帮不上忙。\n\n[army_rival.GetHerHis|U]从第一天起就对我冷嘲热讽，今晚的疲惫更是雪上加霜。一句尖酸刻薄的话接一句，我们擦肩而过时#EMP [army_rival.GetHerHis]#!还撞了我！\n\n肯定是故意！然后[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_rival'))]拔出剑，向我发起决斗挑战。"
 lmf_army.1070.liege:0 "严格来说，这种未经批准的决斗在军队里是不允许的。身为领主，我完全可以无视这条规定……而且我还可以因为[army_rival.GetHerHim]试图袭击领主而把[army_rival.GetHerHis]铐起来，毕竟算是背叛行为，但是#EMP 教训#!一下[army_rival.GetHerHim]感觉会好受些！"
 lmf_army.1070.commander:0 "严格来说，这种未经批准的决斗在军队里是不允许的。身为将领，我完全可以无视这条规定……也许#EMP 教训#!一下[army_rival.GetHerHim]感觉会好受些！"
 lmf_army.1070.knight:0 "唯一的问题是什么？军队里不允许这种未经批准的决斗。我们俩最终都可能因为违抗命令而被铐上镣铐……话虽如此，也许#EMP 教训#!一下[army_rival.GetHerHim]感觉会好受些！"
 lmf_army.1070.a:0 "[army_rival.GetSheHe]想决斗？那就决斗！"
 lmf_army.1070.a.root.kill.tt:0 "[duel_opponent.GetShortUINameNoTooltipNoFormat|U]在决斗中击杀[army_rival.GetShortUINameNoTooltipNoFormat]"
 lmf_army.1070.a.root.kill.title:0 "[army_rival.GetShortUINameNoTooltipNoFormat]死于决斗"
 lmf_army.1070.a.root.kill.desc:0 "军队驻扎在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]时，[duel_opponent.GetShortUIName|U]在决斗中杀死了[army_rival.GetShortUIName]"
 lmf_army.1070.a.root.kill.sanctioned.desc:0 "军队驻扎在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]时，[duel_opponent.GetShortUIName|U]在决斗中杀死了[army_rival.GetShortUIName]"
 lmf_army.1070.a.root.win.tt:0 "[duel_opponent.GetShortUINameNoTooltipNoFormat|U]赢得决斗"
 lmf_army.1070.a.root.win.title:0 "[army_rival.GetShortUINameNoTooltipNoFormat]在决斗中受伤"
 lmf_army.1070.a.root.win.desc:0 "军队驻扎在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]时，[army_rival.GetShortUIName]与[duel_opponent.GetShortUIName]进行一场未经批准的决斗，结果[army_rival.GetShortUIName]失败并受伤。"
 lmf_army.1070.a.root.win.sanctioned.desc:0 "军队驻扎在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]时，[army_rival.GetShortUIName]与[duel_opponent.GetShortUIName]进行一场未经批准的决斗，结果[army_rival.GetShortUIName]失败受伤。"
 lmf_army.1070.a.rival.win.tt:0 "[army_rival.GetShortUINameNoTooltipNoFormat|U]赢得决斗！"
 lmf_army.1070.a.rival.win.title:0 "[duel_opponent.GetShortUINameNoTooltipNoFormat|U]在决斗中受伤"
 lmf_army.1070.a.rival.win.desc:0 "军队驻扎在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]时，[duel_opponent.GetShortUIName|U]与[army_rival.GetShortUIName]进行一场未经批准的决斗，结果[Select_CString( duel_opponent.IsLocalPlayer, '你', duel_opponent.GetSheHe )]失败并受伤。 "
 lmf_army.1070.a.rival.win.sanctioned.desc:0 "军队驻扎在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]时，[duel_opponent.GetShortUIName|U]与[army_rival.GetShortUIName]进行一场未经批准的决斗，然后[Select_CString( duel_opponent.IsLocalPlayer, '你', duel_opponent.GetSheHe )]失败并受伤。 "
 lmf_army.1070.a.rival.kill.tt:0 "[army_rival.GetShortUINameNoTooltipNoFormat]在决斗中杀死了[duel_opponent.GetShortUINameNoTooltipNoFormat]"
 lmf_army.1070.a.rival.kill.title:0 "[duel_opponent.GetShortUINameNoTooltipNoFormat|U]死于决斗"
 lmf_army.1070.a.rival.kill.desc:0 "军队驻扎在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]时，[army_rival.GetShortUIName]在一场未经批准的决斗中杀死了[duel_opponent.GetShortUIName]"
 lmf_army.1070.a.rival.kill.sanctioned.desc:0 "军队驻扎在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]时，[army_rival.GetShortUIName]在决斗中杀死了[duel_opponent.GetShortUIName]"
 army_camp_duel_rivalry:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在决斗中输给[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]后，对此心怀怨恨。"
 army_camp_duel_rivalry_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在决斗中输给[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]后，对此心怀怨恨。"
 lmf_army.1070.b:0 "[army_rival.GetSheHe|U]竟敢如此？！用锁链锁住[army_rival.GetHerHim]！"
 lmf_army.1070.b.imprison.tt:0 "[champion.GetShortUINameNoTooltipNoFormat|U]囚禁[army_friend.GetShortUINameNoTooltipNoFormat]"
 lmf_army.1070.b.imprison.desc:0 "[champion.GetShortUIName]和[army_rival.GetShortUIName]在[province.GetTitle.GetNameNoTierNoTooltip]的军营进行决斗，但[player.Custom('KnightCultureNoTooltipLowercase')]被囚禁了"
 lmf_army.1070.c:0 "我要离开，这老[ROOT.Char.GetWomanMan]"
 lmf_army.1080.t:0 "军队之爱"
 lmf_army.1080.desc:0 "最近，我和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_lover'))]一起渡过很长一段时间，我们一起比武，一起用餐，互相开玩笑，讲述家乡的故事。这段友谊似乎不错，但每当我们在一起时，我总有一种……#EMP 紧张感#!，我以为只有我一个人这样，但我时不时地会注意到[army_lover.GetHerHim]的眼神，[army_lover.GetSheHe]也是这样。\n\n晚上我回到帐篷，[army_lover.GetSheHe]突然一丝不挂的站在门口，盯着我，仿佛在说我们的夜晚才刚刚开始……"
 lmf_army.1080.a:0 "这或许是一个特别的开始。"
 army_camp_rendezvous:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]在[PROVINCE.GetNameNoTooltip]驻扎期间想爱了。"
 lmf_army.1080.b:0 "[army_lover.GetHerHim]来我怀里，我们一起共渡今晚"
 lmf_army.1080.c:0 "不，这根本不可能发生。"
 lmf_army.1090.t:0 "片刻休憩"
 lmf_army.1090.desc:0 "日复一日地行军，无尽的抱怨，糟糕的食物，甚至熊熊烈日炙烤着你的额头。有时其他[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]的陪伴可以弥补一些……\n\n今晚，我们在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]扎营，畅饮酒水，士兵们的情绪异常高涨。 尤其是[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_entertainer'))]，似乎[army_entertainer.GetSheHe]肩负着提升士气的使命。\n\n在士兵用琵琶弹奏出一段曲调时，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_entertainer'))]笑着围着篝火跳舞，我也忍不住笑了，然后加入了他们的欢乐。\n\n这是一个美好的夜晚。"
 lmf_army.1090.a:0 "难忘一晚！"
 lmf_army.1100.t:0 "漫长一夜"
 lmf_army.1100.end:0 " 一场疾病席卷了营地，我们大多数人不得不困在帐篷里……这本来没什么问题，只是#EMP 能做的事情#!实在太少了！\n\n无聊让我感到焦虑。即使偶尔参加一些比武，也不足以驱散那种呆在原地的沉闷感。\n\n更重要的是，其他[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]也有同样的感受"
 lmf_army.1100.a:0 "这不能永远持续下去……"
 lmf_army.1110.t:0 "雨天"
 lmf_army.1110.t.desert:0 "沙尘暴"
 lmf_army.1110.normal:0 "而且由于持续不断的倾盆大雨……让日子越来越难熬。\n\n日子一天天过去，只有狂风和雨水打在士兵身上。我很少感到如此难受……哪怕雨停了，我依然觉得寒意刺骨。"
 lmf_army.1110.desert:0 "而且由于持续不断的沙尘暴……让日子越来越难熬。\n\n狂风和风沙吹进盔甲的每个角落，还钻进嘴里，耳朵，帐篷甚至食物里……一切都干燥易碎，即使停止了，这种感觉也从未完全消失。"
 lmf_army.1110.end:0 "我的肺部深处隐隐作痛，而且似乎越来越严重。\n\n我努力在士兵面前装出一副勇敢的样子，但我觉得我坚持不了多久了。"
 lmf_army.1110.a:0 "快去把医师请来！"
 lmf_army.1120.t:0 "过界之举"
 lmf_army.1120.war:0 "军队刚刚经过[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]，我正在当地的一个村庄巡逻，我们已经掠夺了一些物资"
 lmf_army.1120.nowar:0 "军队刚刚经过[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]，我和一些士兵去了当地的一个村庄寻找补给"
 lmf_army.1120.end:0 "然后在街上碰到[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_bully'))]正在和一个[army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip]当地人搭讪时。\n\n很明显，[army_bully.GetSheHe]似乎确信眼前人犯了什么错，或者掌握了我们需要的信息，不过对我来说这个可怜的家伙两者都没有，对方可怜地乞求饶命，这似乎只会让[army_bully.GetHerHis]玩弄心更重。\n\n看到这么多当地人，甚至我们自己的士兵都站在周围，震惊地看着眼前发生的一切，我几乎觉得有必要干预一下……尽管[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_bully'))]不会感激我的干预。"
 lmf_army.1120.a:0 "我不在乎[army_bully.GetSheHe]想什么，这种事必须停止。"
 interfered_with_army_bully:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]干涉了[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]对当地人的审讯。"
 interfered_with_army_bully_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]干涉了[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]对当地人的审讯。"
 lmf_army.1120.b:0 "这是[army_bully.GetHerHis]的事，与我无关。"
 lmf_army.1130.t:0 "好运收获"
 lmf_army.1130.desc:0 "[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]的围攻已经持续了很久，而且进展缓慢。\n\n今天我的士兵幸运地抓住了一个试图偷偷突破我方防线的当地人，若不是一个士兵识字，他们险些把这个身上有本小册子的当地人处决了。\n\n基于册子上可能有消息，这个人被俘虏并被带到了我的面前。经过一番盘问，我得知那名士兵的确说对了。这本小册子原本打算交给敌方，里面包含大量关于敌方在[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]阵地的防御工事、补给和弱点的信息。\n\n我想我和这个人应该有很多#EMP 话题#!可以聊！"
 lmf_army.1130.a:0 "我认为这会让事情进展得更快。"
 lmf_army.1130.a.title:0 "获得围攻情报"
 lmf_army.1130.a.desc:0 "[commander.GetShortUIName|U]从一名俘虏那里获得了有关[army.GetLocation.GetTitle.GetNameNoTier]的防御工事和补给情报。"
 lmf_army.1140.t:0 "一位有前途的士兵"
 lmf_army.1140.desc:0 "在与士兵们相处的几个月里，我注意到其中有一位格外突出的士兵。\n\n这位[army_potential.GetWomanMan]，来自一个[army_potential.GetCulture.GetNameNoTooltip]小贵族家族，家族没有其他显赫成员，但依靠自己技艺成功，并且渴望效忠。在晚上交谈之后，[army_potential.GetSheHe]来到我的帐篷，打算向我[army_potential.GetHerHis]宣誓效忠，如果我同意在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]接受[army_potential.GetHerHim]成为[ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]，[army_potential.GetSheHe]将效忠于我。\n\n但我还需要多一个[ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]吗？"
 lmf_army.1140.a:0 "[army_potential.GetHerHim]会成为[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]的一员。"
 lmf_army.1140.b:0 "不，我不需要[army_potential.GetHerHis]的效忠。"
 lmf_army.1150.t:0 "邂逅"
 lmf_army.1150.begin:0 "我和几名士兵在[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]巡逻时，发现了一具疑似[army_stranger.GetWomanMan]尸体的东西，毫无疑问是[army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip]土匪袭击导致。然而，仔细检查后，我们发现[army_stranger.GetWomanMan]并没有死，于是我派人把[army_stranger.GetHerHim]带回营地接受治疗。\n\n[army_stranger.GetSheHe]康复后，表达了感激之情。我得知[army_stranger.GetHerHis]的名字是[army_stranger.GetFirstNameNoTooltip]。\n"
 lmf_army.1150.poet:0 "[army_stranger.GetSheHe]是位诗人，在前往[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]的途中遭到袭击。"
 lmf_army.1150.monk:0 "[army_stranger.GetSheHe]是位[army_stranger.GetWomanMan]，在前往[army_stranger.GetFaith.HouseOfWorship]的途中遭到袭击。"
 lmf_army.1150.scholar:0 "[army_stranger.GetSheHe]是位学者，在求学途中遭到袭击。"
 lmf_army.1150.pilgrim:0 "[army_stranger.GetSheHe]是位[army_stranger.GetFaith.GetAdherentNameNoTooltip]，在朝圣途中遭到袭击。"
 lmf_army.1150.merchant:0 "[army_stranger.GetSheHe]是位商人，在前往[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]的途中遭到袭击。"
 lmf_army.1150.architect:0 "[army_stranger.GetSheHe]是位建筑师，在前往[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]的途中遭到袭击。"
 lmf_army.1150.gallowsbait:0 "[army_stranger.GetSheHe]对自己来历闭口不提，但显然[army_stranger.GetSheHe]命运是遭到袭击。"
 lmf_army.1150.end:0 "在身上财物被洗劫一空后，丢在这里。\n\n这个[army_stranger.GetWomanMan]声称欠我一条命，并提出愿意成为我宫廷的忠诚成员……我该接受吗？"
 lmf_army.1150.a:0 "我很高兴[army_stranger.GetHerHim]能加入我。"
 lmf_army.1150.b:0 "“[army_stranger.GetHerHim]该离开了。”"
 lmf_army.1160.t:0 "被陌生人所救"
 lmf_army.1160.begin:0 "我在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]营地巡逻时，突然遭到一群[army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip]土匪的伏击。\n\n伏击快且攻势迅猛，如果不是一个陌生[army_stranger.GetWomanMan]突然出现，情况很可能变得非常糟糕，用[army_stranger.GetHerHis]大吼着然后把剑刺向土匪……凭借[army_stranger.GetHerHis]的剑法和我，我们终于把土匪赶走了。\n\n之后，这陌生[army_stranger.GetWomanMan]介绍[army_stranger.GetHerselfHimself]叫[army_stranger.GetFirstNameNoTooltip]，"
 lmf_army.1160.mercenary:0 "是一位来自[army.GetLocation.GetCounty.GetTitle.GetHolder.GetTopLiege.GetTitledFirstNameNoTooltip]的雇佣兵，虽然语气并没看出其对家乡的热爱。"
 lmf_army.1160.gallowsbait:0 "[army_stranger.GetSheHe]对出身过往只字不提。"
 lmf_army.1160.end:0 "幸好[army_stranger.GetSheHe]刚好在附近，我们相见甚欢，还喝喝了酒。\n\n如果我愿意的话，[army_stranger.GetSheHe]或许会接受邀请加入我……"
 lmf_army.1160.a:0 "我很高兴在宫廷上有另一位朋友。"
 saved_by_army_stranger:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在一次强盗伏击中拯救[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]后，与其成为了朋友。"
 saved_by_army_stranger_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在一次强盗伏击中拯救[CHARACTER.GetShortUINameNoTooltipNoFormat]后，与其成为了朋友。"
 lmf_army.1160.b:0 "我会请[army_stranger.GetHerHim]来我的宫廷任职。"
 lmf_army.1160.c:0 "感谢[army_stranger.GetHerHim]帮助，我要继续前行。"
 lmf_army.1170.t:0 "供应问题"
 lmf_army.1170.desc:0 "随着军队深入[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]，补给已然不足。\n\n斥候报告说，周边乡村有许多大型农场和庄园。我可以派人去掠夺，获取所需的物资，但一旦我派人去执行这样的任务……我就无法管控军纪，到时无辜者将被杀害，建筑将被焚毁，暴行将发生，而这一切都将由我来承担。\n\n但如果我#EMP 不#!下达命令，我的许多士兵可能会饿死，甚至更糟。"
 lmf_army.1170.a:0 "[army.GetLocation.GetCounty.GetCulture.GetNameNoTooltip]的苦难与我无关。"
 lmf_army.1170.b:0 "我们只要利用现有的资源。"
 lmf_army.1180.t:0 "丢失与发现"
 lmf_army.1180.desc:0 "在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]扎营后，我和一些骑士来了次小型狩猎。\n\n但我和他们走散了，在陌生地区中迷路了，幸运的是，我在路上遇到了一位友善的当地年轻人，[army_stranger.GetSheHe|U]介绍说[army_stranger.GetHerselfHimself]叫[army_stranger.GetFirstNameNoTooltip]，是为途经[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]的商人提供向导。\n\n[army_stranger.GetSheHe]很快就带我回到了营地。 一路上，我们聊了很久，我能感觉到[army_stranger.GetSheHe]渴望离开。\n\n而且从[army_stranger.GetHerHis]的笑容和兴趣可以清楚地看出，[army_stranger.GetSheHe]也渴望加入我。"
 lmf_army.1180.a:0 "我们会一起度过一夜，但之后我继续独自前行。"
 lmf_army.1180.b:0 "[army_stranger.GetSheHe|U]可以和我去[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，成为我的新情人。"
 army_camp_lost_guide:0 "当[CHARACTER.GetShortUINameNoTooltipNoFormat]在[PROVINCE.GetNameNoTooltip]迷路时，[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]引导[CharYouHerHim(CHARACTER)]回到营地，并在途中相爱。"
 army_camp_lost_guide_corresponding:0 "当[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]在[PROVINCE.GetNameNoTooltip]迷路时，[CHARACTER.GetShortUINameNoTooltipNoFormat]引导[CharYouHerHim(TARGET_CHARACTER)]回到营地，并在途中相爱。"
 lmf_army.1180.c:0 "我只会感激[army_stranger.GetHerHim]，不做其他"
 lmf_army.1190.t:0 "[candidate.GetCulture.GetNameNoTooltip]医生"
 lmf_army.1190.a:0 "[candidate.GetHerHis]的技能在这里绝对可以大展身手。"
 lmf_army.1190.b:0 "这是我可以在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]中可以带回的[candidate.GetWomanMan]！"
 lmf_army.1200.t:0 "训练方案"
 lmf_army.1200.desc:0 "军队目前无所事事，但我知道这只是暂时。\n\n然而，感觉大多数士兵似乎并没有意识到这一点。他们懒散，还抱怨，每当[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]们要求训练时，他们似乎都抗拒。有些的[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]建议我让他们更加刻苦训练，这样他们才能更好地备战。另一些人认为，可以适度放松一下，保存体力，不用太担心纪律问题。\n\n我应该做哪一件事？"
 lmf_army.1200.a:0 "对他们进行严格的训练，他们需要做好准备。"
 lmf_army.1200.b:0 "让他们保存力量以备不时之需。"
 lmf_army.1200.c:0 "什么都不要改变，这样就好。"
 lmf_army.1210.t:0 "迷失的骑士"
 lmf_army.1210.desc:0 "我和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]出去巡逻时，天气骤变……然后[army_friend.GetSheHe]突然不见了。我找了又找，却怎么也找不到[army_friend.GetSheHe]。\n\n[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]是敌方领地，如果我继续寻找[army_friend.GetHerHim]，我自己也可能会遇到麻烦，但不找[army_friend.GetHerHim]的话，说不定[army_friend.GetHerHim]危在旦夕。\n\n我最好赶紧想办法。"
 lmf_army.1210.a:0 "我将亲自找[army_friend.GetHerHim]。"
 lmf_army.1210.b:0 "我会赶回营地并组织搜索队。"
 lmf_army.1210.c:0 "[army_friend.GetSheHe|U]是个成年[army_friend.GetWomanMan]，可以自己照顾自己"
 lmf_army.1210.wounded.tt:0 "你未能找到[army_friend.GetHerHim]并遭遇敌人"
 lmf_army.1210.fail.tt:0 "寻找失败"
 lmf_army.1210.succeed.tt:0 "找到了[army_friend.GetSheHe|U]！"
 lmf_army.1210.knight.lost.title:0 "[army_friend.GetTitledFirstNameNoTooltip]在[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]迷失"
 lmf_army.1210.knight.lost.desc:0 "[army_friend.GetTitledFirstName]在[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]巡逻时失踪，目前尚不清楚[army_friend.GetHerHim]现状如何。"
 lmf_army.1210.knight.found.title:0 "[army_friend.GetTitledFirstNameNoTooltip]已找到！"
 lmf_army.1210.knight.found.desc:0 "经过长时间的搜寻，[army_friend.GetTitledFirstName]被发现在[army.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]，其受伤并感谢救援。"
 lmf_army.1211.knight.newliege.desc:0 "经过长时间的搜寻，[army_friend.GetTitledFirstName]在[army_friend.GetLiege.GetShortUIName]的宫廷中被找到，在[army_friend.GetHerHim]在宫廷得到照顾，现在也更愿意留在那里。"
 searched_for_me_after_lost:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在巡逻期间迷路后，被[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]找到后[CharYouHerHim(CHARACTER)]对此表示感激。"
 searched_for_me_after_lost_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在巡逻期间迷路后，被[CHARACTER.GetShortUINameNoTooltipNoFormat]找到后[CharYouHerHim(TARGET_CHARACTER)]对此表示感激。"
 lmf_army.1211.knight.found.desc:0 "在[lost_in.GetTitle.GetNameNoTierNoTooltip]失踪数周后，[army_friend.GetTitledFirstName]终于被找到并返回了[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。"
 lmf_army.1220.t.commander:0 "练习指挥"
 lmf_army.1220.t.knight:0 "骑士训练"
 lmf_army.1220.desc:0 "过去几周，我花了大量时间与[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]进行对练，我得承认，这[army_friend.GetWomanMan]比我更擅长剑术。\n\n起初，我并不觉得能教我什么，但随着时间的推移，我发现我实际上学到了很多，对方是一位优秀的老师，同时也让我从单调乏味的军营生活中解脱出来。"
 lmf_army.1230.desc:0 "过去几周，我花了大量时间与[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]交流，讨论了维持如此规模武装和战略的问题。\n\n起初，我并没有太大兴趣。毕竟，如果我想了解军队的运作方式，随便看看就行了。但[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]对这个话题有着深刻的见解，远超我对[army_friend.GetHerHim]的期望，我承认这对我来说是一次学习。"
 lmf_army.1240.desc:0 "过去几周，我一直在[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]的指导下精进剑术。\n\n起初，我并没有太大兴趣。然而[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('army_friend'))]在我练习时走到我面前，锐评了我的剑术……我怀疑[army_friend.GetSheHe]的本意是建议，但我却觉得受到了冒犯。\n\n在连续三场比赛我都输掉之后，我承认[army_friend.GetSheHe]或许确实能教我一些东西，而且整个过程比我愿意承认的要愉快得多。"
 lmf_army.1220.a:0 "这可能会有用。"
 lmf_army.1220.a.improves.tt:0 "@knight_icon![player.Custom('KnightCultureNoTooltip')]提升"
 lmf_army.1220.a.prowess.desc:0 "你的[player.Custom('KnightCultureNoTooltipLowercase')][champion.GetShortUIName]在[army_friend.GetShortUIName]指导下，#P 精进#![prowess_i]1点[prowess|E]。"
 lmf_army.1230.a.martial.desc:0 "你的[player.Custom('KnightCultureNoTooltipLowercase')][champion.GetShortUIName]在[army_friend.GetShortUIName]指导下，#P 精进#![martial_i]1点[martial|E]。"
 lmf_army.1240.a.blademaster.desc:0 "你的[player.Custom('KnightCultureNoTooltipLowercase')][champion.GetShortUIName]在[army_friend.GetShortUIName]指导下，获得[GetTrait('lifestyle_blademaster').GetName( GetNullCharacter )]特质"
 lmf_army.1250.t:0 "士兵之眼"
 lmf_army.1250.mid:0 "营地紧张的气氛慢慢地让我受不了了。\n\n今晚我们大部分时间都在篝火旁默默地喝酒。 不过，有一个[army_lover.GetWomanMan]一直吸引着我的目光。[army_lover.GetSheHe|U]是一名普通士兵，"
 lmf_army.1250.male:0 "他很英俊，而且似乎比大多数同龄人更成熟。"
 lmf_army.1250.female:0 "她很美，而且似乎比大多数同龄人更成熟。"
 lmf_army.1250.end:0 "我们以前从未有过交集，但[army_lover.GetSheHe]却让我感到莫名的熟悉。 \n\n后来，我在帐篷附近又碰到了[army_lover.GetSheHe|U]。这个[army_lover.GetWomanMan]介绍[army_lover.GetHerselfHimself]叫[army_lover.GetFirstNameNoTooltip]……而且我感觉，如果我邀请[army_lover.GetHerHim]进来，[army_lover.GetSheHe]一定会欣然接受。\n\n不得不说，我真的很想这样。"
 lmf_army.1250.a:0 "为什么不呢？我要邀请[army_lover.GetHerHim]来过夜。"
 army_camp_caught_eye:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]曾是一名士兵，当[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]与[CHARACTER.GetShortUINameNoTooltipNoFormat|U]同在[PROVINCE.GetNameNoTooltip]军营时，被对方吸引。"
 army_camp_caught_eye_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]曾是一名士兵，当[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]与[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]同在[PROVINCE.GetNameNoTooltip]军营时，被对方吸引。"
 lmf_army.1250.b:0 "这位[army_lover.Custom('GetLassLad')]确实值得在我的宫廷中有一席之位。"
 lmf_army.1250.c:0 "不，这可能并不是个好主意。"
 lmf_army.1260.t:0 "春意盎然"
 lmf_army.1260.begin:0 "随军时，洗澡的机会并不多。\n\n因此，当我们在[army.GetLocation.GetTitle.GetNameNoTierNoTooltip]扎营时，当地人提到一处"
 lmf_army.1260.oasis:0 "清澈泉水的绿洲"
 lmf_army.1260.spring:0 "天然泉水"
 lmf_army.1260.mid:0 "我抓住了这个机会，好不容易找到那儿，发现这里几乎被遗弃了，没过多久我从水里出来时，惊讶地发现一个[army_stranger.GetWomanMan]站在附近，饶有兴趣地注视着我。\n\n[army_stranger.GetSheHe]注意到我的震惊，道了歉并自称是[army_stranger.GetFirstNameNoTooltip]，"
 lmf_army.1260.septon.female:0 "一位来自不远处[army_stranger.GetFaith.HouseOfWorship]的[army_stranger.GetFaith.PriestFemale]。\n\n"
 lmf_army.1260.septon.male:0 "一位来自不远处[army_stranger.GetFaith.HouseOfWorship]的[army_stranger.GetFaith.PriestMale]。\n\n"
 lmf_army.1260.devoted.female:0 "一位来自不远处[army_stranger.GetFaith.HouseOfWorship]的[army_stranger.GetFaith.DevoteeFemale]。\n\n"
 lmf_army.1260.devoted.male:0 "一位来自不远处[army_stranger.GetFaith.HouseOfWorship]的[army_stranger.GetFaith.DevoteeMale]。\n\n"
 lmf_army.1260.peasant:0 "来自不远处的一个村庄。\n\n"
 lmf_army.1260.end:0 "[army_stranger.GetSheHe|U]告诉我这泉水据说有治愈的功效，所以[army_stranger.GetHerHis]才会来这儿，但从[army_stranger.GetHerHis]的眼神中我能看出，[army_stranger.GetSheHe]现在完全对别的东西产生了兴趣……"
 lmf_army.1260.a:0 "我会邀请[army_stranger.GetHerHim]和我一起下水。"
 lmf_army.1260.b:0 "我收拾好衣服迅速离开，以防万一。"
 dinner_rival_reason_jealousy:0 "[ROOT.Char.GetFirstNameNoTooltip]显然嫉妒[second.GetFirstNameNoTooltip]，也许是为了某个情人。"
 dinner_rival_reason_jealous_court:0 "这似乎源于[ROOT.Char.GetFirstNamePossessiveNoTooltip]对[second.GetFirstNamePossessiveNoTooltip]在宫廷中的地位而嫉妒。"
 dinner_rival_reason_jealous_council:0 "这似乎源于[ROOT.Char.GetFirstNamePossessiveNoTooltip]对[second.GetFirstNamePossessiveNoTooltip]担任[second.GetCouncilTitle|l]而感到嫉妒。"
 dinner_rival_reason_heir_position:0 "这似乎源于[ROOT.Char.GetFirstNameNoTooltip]对[second.GetFirstNamePossessiveNoTooltip]继承我的头衔而嫉妒"
 lmf_heir_trait_drunkard:0 "[ROOT.GetCharacter.GetSheHe]显然是个酒鬼！不像[ROOT.GetCharacter.GetSheHe]说的那样，只是小酌，而是喝个不停！有些人认为无伤大雅，但谁又真的希望自己的统治者是一个喝得烂醉如泥的人呢？"
 lmf_heir_trait_rakish:0 "[ROOT.GetCharacter.GetSheHe]几乎对每个看到的年轻[ROOT.GetCharacter.Custom('WomanManOpposite')][ROOT.GetCharacter.GetSheHe]都要毛手毛脚，[ROOT.GetCharacter.GetSheHe|U]毫无廉耻，太不体面了。"
 lmf_heir_trait_rakish_homosexual:0 "[ROOT.GetCharacter.GetSheHe]几乎对每个看到的年轻[ROOT.GetCharacter.Custom('GetLassLad')][ROOT.GetCharacter.GetSheHe]都要毛手毛脚，还以为我不会注意到？[ROOT.GetCharacter.GetHerHis]真是毫无廉耻！而我更是无法控制[ROOT.GetCharacter.GetHerHis]！"
 lmf_heir_trait_rakish_bisexual:0 "[ROOT.GetCharacter.GetSheHe]几乎对每个看到的年轻家伙[ROOT.GetCharacter.GetSheHe]都要毛手毛脚，我无法控制[ROOT.GetCharacter.GetSheHe|U]那毫无廉耻的举止，真是太不体面了。"
 lmf_heir_trait_reclusive:0 "[ROOT.GetCharacter.GetSheHe]那怯鸡只会在事情变得紧张时往往会躲得远远的，然后把[ROOT.GetCharacter.GetHerselfHimself]锁在房间里不出来。"
 lmf_heir_trait_irritable:0 "[ROOT.GetCharacter.GetHerHis]那臭脾气在事情变得紧张时会迅速爆发。[ROOT.GetCharacter.GetSheHe|U]让身边的仆人们小心翼翼，害怕[ROOT.GetCharacter.GetSheHe]变成怪物。"
 lmf_heir_trait_profligate:0 "[ROOT.GetCharacter.GetSheHe]的钱仿佛不是钱，花钱如流水，如山倒一样，为了什么？[ROOT.GetCharacter.GetSheHe]说只是为了自己好受点。"
 lmf_heir_trait_improvident:0 "任何人只要表现出一点痛苦，[ROOT.GetCharacter.GetSheHe]就会向他们施舍金钱。有人说这是慷慨，有人说这只是缺乏理智，但这是什么？这是一种病症！"
 lmf_heir_trait_contrite:0 "[ROOT.GetCharacter.GetSheHe]总是向倾听者吐露[ROOT.GetCharacter.GetHerHis]的秘密，这的确是释放压力的一种方式，但一个无法保守[ROOT.GetCharacter.GetHerHis]秘密的统治者又有何用呢？"
 lmf_heir_trait_inappetetic:0 "一旦压力增大，[ROOT.GetCharacter.GetSheHe]就会拒绝吃饭，这不是节制。我担心，假以时日，这会影响[ROOT.GetCharacter.GetHerHis]的健康。"
 lmf_heir.1612.desc.default:0 "以一个这样地位的年轻[your_heir.GetWomanMan]来说，这不是应该有的行为。\n\n"
 lmf_heir.1630.t.cancel:0 "取消远游"
 lmf_heir.1630.desc.title:0 "[your_heir.GetTitledFirstName]因成为[your_heir.GetPrimaryTitle.GetNameNoTierNoTooltip]的[your_heir.GetTitleAsNameNoTooltip|U]而被迫取消远游。"
 lmf_heir.1630.desc.war:0 "[heir_liege.GetTitledFirstName]因战争爆发而召回家。"
 lmf_heir.1630.desc.target.death:0 "因[heir_visit_target.GetTitledFirstName]去世，[your_heir.GetFirstName]被迫取消远游。"
 lmf_heir.1630.desc.heir.death:0 "因为[your_heir.GetTitledFirstNamePossessive]已经去世，所以远游被取消。"
 lmf_heir.1630.desc.imprisoned:0 "[your_heir.GetTitledFirstName]因被监禁而被迫取消前往[heir_visit_location.GetTitle.GetNameNoTierNoTooltip]的远游。"
 lmf_heir.1630.desc.incapable:0 "[your_heir.GetTitledFirstName]被迫取消前往[heir_visit_location.GetTitle.GetNameNoTierNoTooltip]的远游，因为[your_heir.GetSheHe]现在是[GetTrait('incapable').GetName(your_heir)]。"
 lmf_heir.1630.desc.notheir:0 "[your_heir.GetTitledFirstName]被迫取消前往[heir_visit_location.GetTitle.GetNameNoTierNoTooltip]的远游，因为[your_heir.GetSheHe]不再是[heir_liege.GetShortUINamePossessiveNoFormat]的继承人。"
 lmf_heir.1630.desc.notruler:0 "[your_heir.GetTitledFirstName]被迫取消前往[heir_visit_location.GetTitle.GetNameNoTierNoTooltip]的远游，因为[heir_liege.GetShortUINameNoFormat]不再是统治者。"
 lmf_heir.1631.desc.siege:0 "由于[heir_visit_location.GetTitle.GetNameNoTierNoTooltip]遭到[heir_visit_target.GetShortUINamePossessiveNoFormat]敌人的围攻，[your_heir.GetFirstName]被迫取消行程。"
 lmf_heir.1631.desc.isolating:0 "由于[heir_visit_location.GetCounty.GetTitle.GetNameNoTierNoTooltip]疫情严重，[your_heir.GetFirstName]被迫取消行程，并在[heir_visit_target.GetShortUINameNoFormat]隔离[CharYourHerHis(heir_visit_target)]全家之前离开。"
 lmf_heir.1631.desc.capital:0 "由于[heir_visit_location.GetCounty.GetTitle.GetNameNoTierNoTooltip]疫情严重，[your_heir.GetFirstName]被迫取消行程，并在[heir_visit_target.GetShortUINameNoFormat]关闭[heir_visit_location.GetTitle.GetNameNoTierNoTooltip]边境前离开。"
 lmf_heir.1651.t:0 "一位令人难忘的继承人"
 lmf_heir.1651.desc.away:0 "虽然我没亲眼见过，但我听说"
 lmf_heir.1651.desc.busy:0 "虽然我和[your_heir.GetHerHim]相处的时间不长，但我听说"
 lmf_heir.1651.desc.there:0 "我很高兴地注意到"
 lmf_heir.1651.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]那好几周出色表现。\n\n[your_heir.GetTitledFirstNameNoTooltip]不仅对[ROOT.Char.Custom('FortifiedBuilding')]里的仆人友善且有礼，还会提供帮助，在宫廷中也受到欢迎。\n\n虽然[your_heir.GetSheHe]才刚刚安顿下来，后面再看看[your_heir.GetHerHis]的表现如何，但这无疑是一个好开始。"
 lmf_heir.1651.a:0 "[your_heir.GetSheHe|U]是个好[your_heir.Custom('polite_gender_ref')]"
 lmf_heir.1651.tt:0 "#EMP [your_heir.GetTitledFirstNameNoTooltip]在远游期间会有更好的表现。#!"
 lmf_heir.1652.t:0 "让人不悦的继承人"
 lmf_heir.1652.desc.away:0 "虽然我没亲眼见过，但我听说"
 lmf_heir.1652.desc.busy:0 "虽然我和[your_heir.GetHerHim]相处的时间不长，但我听说"
 lmf_heir.1652.desc.there:0 "我有些不悦地注意到"
 lmf_heir.1652.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]那好几周糟糕表现。\n\n[ROOT.Char.Custom('FortifiedBuilding')]的仆人说[your_heir.GetTitledFirstNameNoTooltip]脾气暴躁、喜怒无常，在走廊里走来走去，批评看到的大多数事物，甚至在宫廷上，只为了让[your_heir.GetHerselfHimself]成为关注的中心。\n\n我在心里告诉自己[your_heir.GetSheHe]才刚刚安顿下来，后面再看看[your_heir.GetHerHis]的表现如何，但这无疑是一个不好开始。"
 lmf_heir.1652.a:0 "我想知道[your_heir.GetSheHe]在[heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]以后是否也是这样？"
 lmf_heir.1652.tt:0 "#EMP [your_heir.GetTitledFirstNameNoTooltip]在远游期间会有更差的表现。#!"
 lmf_heir.1653.t:0 "消失的继承人"
 lmf_heir.1653.desc.away:0 "虽然我没亲眼见过，但我听说"
