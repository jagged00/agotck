 lmf_lover.101.t:0 "清早来临"
 lmf_lover.101.desc.start:0 "清早，在[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]与[lover.GetFirstNameNoTooltip]共度春宵后，我看着[lover.GetSheHe|U]站在窗外，一脸阴郁，这和[lover.GetHerHis]之前……之前的热情，难以想象这是同个人。\n\n经过一番交谈询问后，我了解到了[lover.GetSheHe|U]担的事情。\n\n"
 lmf_lover.101.desc.soulmate:0 "“吾爱，我们之间的情感无法用言语表达，然而"
 lmf_lover.101.desc.lover:0 "“我对现在……安排很满意，[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]。但"
 lmf_lover.101.desc.samesex:0 "你和我都是[ROOT.Char.GetWomanMan]，我们俩在一起是被禁止的。"
 lmf_lover.101.desc.incest:0 "你是我的[lover.Custom2('LMF_RelationToMeShort', ROOT.Char )]。我们俩在一起不单是不可能甚至是禁忌。"
 lmf_lover.101.desc.lover.married:0 "我是一个已婚的[lover.GetWomanMan]，我也忘不了[lover_spouse.GetFirstNameNoTooltip]。"
 lmf_lover.101.desc.married:0 "你是一个已婚的[ROOT.Char.GetWomanMan]，而我也无法停下对[my_spouse.GetTitledFirstNameNoTooltip]的思念。"
 lmf_lover.101.desc.both.married:0 "我们都结婚了，我总是忍不住想到[lover_spouse.GetFirstNameNoTooltip]和[my_spouse.GetTitledFirstNameNoTooltip]。"
 lmf_lover.101.desc.not.married:0 "我们不是夫妻，我是你的情人。"
 lmf_lover.101.desc.ruler:0 "你是[ROOT.Char.GetTitleAsNameNoTooltip]的[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]，而我呢？我什么都不是。"
 lmf_lover.101.desc.nobility:0 "我们都知道彼此的地位，我只是个平民，而您不是。"
 lmf_lover.101.desc.default:0 "即使如此，"
 lmf_lover.101.desc.secret:0 "有人知晓我们这般……”\n\n"
 lmf_lover.101.desc.public:0 "事实上每个人都已经知道我们关系，他们在暗处窃窃私语……”\n\n"
 lmf_lover.101.desc.end:0 "我试图安慰[lover.GetHerHim]，但无济于事。“我只是要知道这意味着什么，”[lover.GetSheHe]叹了口气。"
 lmf_lover.101.a:0 "“我会想尽一切让你开心。”"
 lmf_lover.101.b:0 "“我们在这里不就是放弃悲伤享受欢乐？”"
 lmf_lover.101.c:0 "“我们注定会在一起。”"
 lmf_lover.101.d:0 "“呸！这有什么意义呢？”"
 lmf_lover_promise_tt:0 "#italic [lover.GetFirstNameNoTooltip]会将此视为你承诺带来美好未来。#!"
 lmf_lover_no_promise_tt:0 "#italic [lover.GetFirstNameNoTooltip]会觉得你只是想玩玩而已没有放心上#!"
 lmf_lover.102.t:0 "在花园里"
 lmf_lover.102.desc.start:0 "在花园偏僻的一角，我和[lover.GetFirstNameNoTooltip]才云雨一番，我眼光狠狠地扫过[lover.GetHerHis]的肉体，汗水与爱液顺着皮肤滑落，[lover.GetHerHim]也注意到了我目光，对我露出笑容。\n\n“[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]？你在想什么？”\n\n“我在想我们的这一切，究竟能走到哪里……”\n\n[lover.GetFirstNameNoTooltip]直接笑了出来，“为什么要想走到哪里呢？"
 lmf_lover.102.desc.married:0 "你有[my_spouse.GetWifeHusband]"
 lmf_lover.102.desc.theymarried:0 "我有[lover_spouse.GetWifeHusband]"
 lmf_lover.102.desc.samesex:0 "我们只是两个寻求爱与刺激的[ROOT.Char.GetWomenMen]。"
 lmf_lover.102.desc.incest:0 "我是你[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))]。"
 lmf_lover.102.desc.end:0 "在我们……交欢之后，你还想保持这种关系，真是让我差异。”[lover.GetSheHe|U]扬了扬眉，“如果你想做些什么，那……我想这由你来决定？”"
 lmf_lover.102.a:0 "“我会想尽一切让你开心。”"
 lmf_lover.102.b:0 "“当然，我们来这里不就是为了欢乐。”"
 lmf_lover.102.c:0 "“我们注定会在一起，无论你信不信。”"
 lmf_lover.102.d:0 "“你是对的，多想无益。”"
 lmf_lover.103.t:0 "我[Select_CString( lover.IsFemale, '美丽的', '英俊的' )][ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
 lmf_lover.103.desc.start:0 "在花园偏僻的一角，我和[lover.GetFirstNameNoTooltip]才云雨一番，我眼光狠狠地扫过[lover.GetHerHis]的肉体，汗水与爱液顺着皮肤滑落，[lover.GetHerHim]也注意到了我目光，对我露出笑容。\n\n“[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]？你在想什么？”\n\n“你开心满意吗？”\n\n[lover.GetHerHim]愣住了，“开心什么？成为[ROOT.Char.GetTitledFirstNamePossessiveNoTooltip]"
 lmf_lover.103.desc.secret:0 "秘密[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))]吗？"
 lmf_lover.103.desc.public:0 "[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))]？然后你整个宫廷都知道？"
 lmf_lover.103.desc.end:0 "我并不感到丢人能有这一份我已经很开心了，#EMP 但你#!也开心吗？[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]”\n\n这段反问，让我哑口无言，[lover.GetSheHe]又接着问道：“你觉得我们之间的关系会发展到哪一步？”"
 lmf_lover.103.a:0 "“我会想尽一切让你开心。”"
 lmf_lover.103.b:0 "“我们在这里不就是放弃悲伤享受欢乐？”"
 lmf_lover.103.c:0 "“我们注定会在一起。”"
 lmf_lover.103.d:0 "“这不会走远，目前这样就不错。”"
 lmf_lover.104.t:0 "[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]的另一个夜晚"
 lmf_lover.104.desc.start:0 "到目前为止，我和[lover.GetFirstNameNoTooltip]相处得很愉快，这很符合新恋情发展，就在今晚，我清理了[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的御座室，这样我就可以扮演我最喜欢的廷臣和[ROOT.Char.GetLadyLord]玩法，而这一切都是我所希望的。\n\n就在一切完事后，我注意到[lover.GetFirstNameNoTooltip]有点……沉默。也许是后悔了？我问道，“我是不是太频繁地放纵自己的欲望了？”\n"
 lmf_lover.104.desc.end:0 "我被[lover.GetHerHis]的想法逗笑了。这不是我第一次听到这样的话，但我的笑声只会让[lover.GetFirstNameNoTooltip]更加不安。[lover.GetSheHe]说：“我只是……需要知道这是什么，如果你喜欢这样或者我是在自欺欺人。”"
 lmf_lover.105.t:0 "好局终散"
 lmf_lover.105.desc:0 "我有多久没想起[lover.GetFirstNameNoTooltip]了？或许我也不清楚了，[lover.GetSheHe]是否也想过我呢？还是就这样渐渐相忘？\n\n为何如此？原因我可以说出很多，但，也无关紧要了，无论我和[lover.GetFirstNameNoTooltip]曾经拥有什么，曾经分享什么，曾经感受什么，都和现在没有关系了。"
 lmf_lover.105.a:0 "如梦似幻的经历……"
 lmf_lover.1000.t:0 "灵魂伴侣之福"
 lmf_lover.1000.desc.army:0 "今天难得的清静，把军队安顿好之后，[lover.GetFirstNameNoTooltip]就来找我了。\n\n"
 lmf_lover.1000.desc.travel:0 "安营扎寨一整天天，精疲力尽的时候，[lover.GetFirstNameNoTooltip]就来找我了。\n\n"
 lmf_lover.1000.desc.activity:0 "刚忙完早上的事情，然后在[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]里闲逛，一抬头就看见[lover.GetFirstNameNoTooltip]站在不远处。\n\n"
 lmf_lover.1000.desc.notlocal:0 "[lover.GetFirstNameNoTooltip]今天来到[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]看望我，真是一个惊喜。\n\n"
 lmf_lover.1000.desc.local:0 "今天正好在[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]里边想七想八边闲逛，一抬头就看见[lover.GetFirstNameNoTooltip]站在不远处。\n\n"
 lmf_lover.1000.desc.end:0 "见到[lover.GetHerHim]的那一刻，我笑了，[lover.GetSheHe]也如此。 我们心有灵犀地没有说话走到一起，旁人若看到我们，只怕会认为我们只是好朋友，殊不知[lover.GetFirstNameNoTooltip]对我的意义远不止于此。\n\n[lover.GetSheHe|U]听着我的各种抱怨，也没开口说什么，只是紧紧地认真地听着，每次我叹气时，[lover.GetSheHe]就一莞尔，就这样，不知怎的，我感觉好多了。\n\n不知不觉，几个小时过去了，但我仍然没有厌倦[lover.GetHerHis]的陪伴，想必这就是灵魂伴侣吧。"
 lmf_lover.1000.a:0 "我永远不会厌倦这样。"
 lmf_lover.1005.t:0 "我的[lover_trait.GetNameNoTooltip( ROOT.Char )|U]灵魂伴侣"
 lmf_lover.1005.desc.sinful:0 "有人说，我和[lover.GetFirstNameNoTooltip]在一起这么多年，其可能会带坏我"
 lmf_lover.1005.desc.good:0 "有人说，我和[lover.GetFirstNameNoTooltip]在一起这么多年，其可能引导我变好"
 lmf_lover.1005.desc.normal:0 "有人说，我和[lover.GetFirstNameNoTooltip]在一起这么多年，其可能会不知不觉影响我"
 lmf_lover.1005.desc.mid:0 "，这话说的确实有道理。\n\n[lover.GetSheHe|U]可相当[lover_trait.GetNameNoTooltip( ROOT.Char )|l]，就……"
 lmf_lover.1005.desc.opposite:0 "就不知怎么说，而我是个[lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]的人，这在我们关系中经常为此争执，虽然问题不大，也让[lover.GetFirstNameNoTooltip]没想过改变我，但我可以看出[lover.GetSheHe]并不如同这样子。\n\n"
 lmf_lover.1005.desc.notopp:0 "虽然[lover.GetFirstNameNoTooltip]从未想改变我，但我还是能从[lover.GetHerHis]那微妙的眼神和偶尔皱起的眉头中明白[lover.GetHerHis]的感受。\n\n"
 lmf_lover.1005.desc.end:0 "我发现只要我们在一起，我的行为举止就会发生变化，之前如漆如胶时我并不介意，因为很自然得变得相似……但这是我想要的吗？变得更像[lover.GetSheHe]那样[lover_trait.GetNameNoTooltip( ROOT.Char )|l]？\n\n如果我坚持自己，那么"
 lmf_lover.1005.desc.opposite2:0 "到时候争执会越变越大，直到变成大问题。但这些分歧难道不是当初吸引我们走到一起的原因吗？"
 lmf_lover.1005.desc.notopp2:0 "它会成为我们关系中的绊脚石，不知我是不是过度分析了原本不应该成为问题的问题？"
 lmf_lover.1005.a:0 "“随他去吧。”"
 lmf_lover.1005.b:0 "“我就是我，什么都无法改变。”"
 lmf_lover.1005.b.tt:0 "你们之间的分歧越来越大"
 lmf_lover.1010.t:0 "我那[lover_trait.GetNameNoTooltip( ROOT.Char )|U]的影响"
 lmf_lover.1010.desc.sinful:0 "有人说，我们在一起这么多年，我带坏了[lover.GetFirstNameNoTooltip]"
 lmf_lover.1010.desc.good:0 "有人说，我们在一起这么多年，我引导了[lover.GetFirstNameNoTooltip]变好"
 lmf_lover.1010.desc.normal:0 "有人说，我们在一起这么多年，我不知不觉影响了[lover.GetFirstNameNoTooltip]"
 lmf_lover.1010.desc.mid:0 "，这话说的确实有道理。\n\n我是一个[lover_trait.GetNameNoTooltip( ROOT.Char )|l]的人，"
 lmf_lover.1010.desc.opposite:0 "而[lover.GetSheHe]则是个[lover_opposite_trait.GetNameNoTooltip( ROOT.Char )|l]的人，这在我们关系中经常为此争执，虽然问题不大，我也没想过改变[lover.GetHerHim]，但[lover.GetSheHe]知道我不喜欢这样子。\n\n"
 lmf_lover.1010.desc.notopp:0 "虽然我从未想改变[lover.GetHerHim]，但[lover.GetSheHe]敏锐地察觉到我的不满。\n\n"
 lmf_lover.1010.desc.end:0 "只要我们在一起，[lover.GetFirstNameNoTooltip]就会改变[lover.GetSheHe]的行为，也许为了取悦我，或者不让我们之间出现分歧和争执，尽管我没有要求[lover.GetSheHe]这样做，但这就是我们之间的默契，[lover.GetSheHe]也没有多抱怨什么……假以时日，这种方式只会让我们更加亲密。"
 lmf_lover.1010.a:0 "我非常喜欢[lover.GetHerHim]的这句话。"
 lmf_lover.1015.t:0 "私奔？"
 lmf_lover.1015.desc.start:0 "看到[lover.GetFirstNameNoTooltip]出现那刻，脸上那笑容，我就晓得[lover.GetHerHis]在盘算什么。\n\n只见[lover.GetSheHe]笑逐颜开，神情坚定说出那句，“我们私奔吧，”\n"
 lmf_lover.1015.desc.bold:0 "[lover.GetFirstNameNoTooltip]一直很大胆主动，但这次不一样。\n\n"
 lmf_lover.1015.desc.irrational:0 "虽然[lover.GetFirstNameNoTooltip]的思维总是很跳脱发散，但这次问题很严重。\n\n我开始向[lover.GetHerHis]解释计划的各种漏洞"
 lmf_lover.1015.desc.married:0 "，从我的[my_spouse.GetWifeHusband]开始，但[lover.GetSheHe]阻止了我。“[my_spouse.GetTitledFirstNameNoTooltip]是你的灵魂伴侣吗？不是？那就没有什么可讨论的了……\n\n"
 lmf_lover.1015.desc.them.married:0 "，从[lover.GetHerHis]的[lover_spouse.GetWifeHusband]开始，但[lover.GetSheHe]阻止了我。“[lover_spouse.GetTitledFirstNameNoTooltip]是我的灵魂伴侣吗？不是？那就没有什么可讨论的了……\n\n"
 lmf_lover.1015.desc.liege:0 "，[lover.GetHerHis]的领主无疑会反对这计划，但[lover.GetSheHe]阻止了我。“[lover.GetLiege.GetTitledFirstNameNoTooltip]是我的灵魂伴侣吗？不是？那就没有什么可讨论的了……\n\n"
 lmf_lover.1015.desc.default:0 "，但[lover.GetSheHe]阻止了我。“我是你的灵魂伴侣，难道还有什么可说的？”\n\n"
 lmf_lover.1015.desc.end:0 "我一时语噎"
 lmf_lover.1015.desc.end.happy:0 "“我们坠入爱河时，你说你会尽一切努力让我开心，” [lover.GetSheHe]旧事重提着，“#EMP 而这事#!会让我开心。”"
 lmf_lover.1015.desc.end.meant:0 "“我们坠入爱河时，你说你会尽一切努力让我开心，”[lover.GetSheHe]旧事重提着，“就让我们在一起吧。”"
 lmf_lover.1015.desc.end.now:0 "“也许我们开始这段关系时并没有想到会是现在这个样子，”[lover.GetSheHe]旧事重提着，“但我们就在这里！为何不能开心起来呢？”"
 lmf_lover.1015.a:0 "[lover.GetSheHe|U]的回答让我无法反驳。"
 lmf_lover.1015.b:0 "这是不可能的。"
 lmf_lover.1020.t:0 "等待许久"
 lmf_lover.1020.desc.army:0 "傍晚时分，当士兵们回到帐篷，四下寂静，而[lover.GetFirstNameNoTooltip]与我在篝火旁。\n\n"
 lmf_lover.1020.desc.travel:0 "傍晚时分，大部分随行人员早已休息，而[lover.GetFirstNameNoTooltip]与我在篝火旁。\n\n"
 lmf_lover.1020.desc.activity:0 "忙碌了一天后，[lover.GetFirstNameNoTooltip]在花园找到了我。\n\n"
 lmf_lover.1020.desc.notlocal:0 "今天下午，当我在花园里漫步时得知[lover.GetFirstNameNoTooltip]专程从[lover.GetCurrentLocation.GetNameNoTooltip]赶来，只为与我共度一天。\n\n"
 lmf_lover.1020.desc.local:0 "今天下午，我正漫步花园，突然[lover.GetFirstNameNoTooltip]发现了我，然后走到我身旁。\n\n"
 lmf_lover.1020.desc.desc:0 "看到[lover.GetHerHim]那刻，不得不说，我很高兴，曾几何时，我一直认为[lover.GetHerHim]只是我的情人，而我也在一开始就告诉[lover.GetHerHim]，我们的关系很特别，这并非谎言，如今我们的关系确实更加深厚。\n\n我们俩聊了几个小时，话题最终拐到谈到现在的关系，[lover.GetFirstNameNoTooltip]迟疑一会，而我只想知道我们是不是已经发展成灵魂伴侣了。"
 lmf_lover.1020.a:0 "我会说服[lover.GetHerHim]我们的爱情是真实的！"
 lmf_lover.1020.a.success.tt:0 "[lover.GetFirstNameNoTooltip]被说服了"
 lmf_lover.1020.a.failure.tt:0 "[lover.GetFirstNameNoTooltip]面露踌躇"
 lmf_lover.1020.b:0 "还是保持现状就好了。"
 lmf_lover.1025.t:0 "枕边细语"
 lmf_lover.1025.desc.courtier.other:0 "看到[lover.GetFirstNameNoTooltip]从[lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]赶来打算共度一晚那一刻，我就应该知道事情不对劲。"
 lmf_lover.1025.desc.courtier:0 "看到[lover.GetFirstNameNoTooltip]来到我的寝室过夜时，我就要发生什么事了。"
 lmf_lover.1025.desc:0 "[lover.GetWomanMan]的神情告诉我[lover.GetHerHis]想玩些小把戏。\n\n“[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]？我想跟你说些事，”[lover.GetSheHe]说着\n\n“嗯？”我尽量显得不在意，希望这不会暴露……\n\n“今天我在宫廷里听到一些小秘密，你想听听吗？”"
 lmf_lover.1025.a:0 "“聪慧的[ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('lover'))]，快告诉我吧~”"
 lmf_lover.1030.t:0 "能干的[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
 lmf_lover.1030.desc.start:0 "不得不说，我老是忽略[lover.GetFirstNameNoTooltip]是多么有才华。\n\n"
 lmf_lover.1030.desc.diplomacy:0 "最近[lover.GetSheHe]给了我很大的助力，[lover.GetSheHe]会坐在床上听我写给其他统治者信件的自语，然后建议我如何修改措辞。\n\n"
 lmf_lover.1030.desc.martial:0 "前几天，[lover.GetSheHe]注意到我桌上征召兵的物资供应清单，然后说了一些改进建议，不得不说，还是很有用的。\n\n"
 lmf_lover.1030.desc.stewardship:0 "前几天，我一边偎依一边抱怨着如何安排封臣税赋，而[lover.GetSheHe]随口说了几条建议，几天下来，不得不说还是很有用的。\n\n"
 lmf_lover.1030.desc.intrigue:0 "[lover.GetHerHis|U]那双眼似乎可以看穿他人，[lover.GetHerHis|U]老是可以告诉我注意宫廷中的哪些阴谋，以及卫兵和防卫中的漏洞。\n\n"
 lmf_lover.1030.desc.learning:0 "[lover.GetSheHe|U]对我着迷的事情也可以说出一二，甚至还可以从[lover.GetHerHis]那聪明脑袋里说上些建议。\n\n"
 lmf_lover.1030.desc.end:0 "起初我有些抗拒[lover.GetHerHis]这般，担心这不合适，但现在我越来越觉得，接受一个为我着想之人的帮助是明智之举。"
 lmf_lover.1030.a:0 "[lover.GetSheHe|U]真棒呀，谁说不是呢？"
 lmf_lover.1035.t:0 "小礼物"
 lmf_lover.1035.desc.ruler:0 "当我得知有信使从[lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]抵达时，我觉得这很奇怪，所以我走到庭院去迎接。\n\n"
 lmf_lover.1035.desc.notlocation:0 "当我得知有信使从[lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]抵达时，我觉得这很奇怪，所以我走到庭院去迎接。\n\n"
 lmf_lover.1035.desc.location:0 "当我得知[lover.GetFirstNameNoTooltip]来到庭院里见我时，我觉得很奇怪，如此正式？真稀奇，我连忙下楼去见[lover.GetHerHim]。\n\n"
 lmf_lover.1035.desc.courtier:0 "我经过[ROOT.Char.Custom('FortifiedBuilding')]的庭院时，发现[lover.GetTitledFirstNameNoTooltip]站在那里，像个癫狂[lover.GetWomanMan]一样，憨笑不止，这场面真是……出乎意料，我连忙走过去和[lover.GetHerHim]交谈了起来。\n\n"
 lmf_lover.1035.desc.messenger:0 "信使送来一袋珍贵的宝石，还附有一张简单的纸条：\n\n“#EMP 它们永远不会像你一样闪耀，爱你之人的小礼物。#!”\n\n这张纸条没有签名，但我清楚地知道它是谁写的"
 lmf_lover.1035.desc.inperson:0 "“我有一份小礼物要送给你。”说完，[lover.GetSheHe]递给我一个装满珍贵宝石的小袋子。\n\n我原本想推脱[lover.GetHerHis]那不必要慷慨，但[lover.GetFirstNameNoTooltip]在我还没来得及说话之前又开口了。\n\n“你对我意义重大，[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]，请接受我的心意。”[lover.GetSheHe]就这样说完就走了，[lover.GetSheHe]可真了解我。"
 lmf_lover.1035.a:0 "[lover.GetHerHim]真贴心……"
 lmf_lover.1036.t:0 "[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))|U]的困境"
 lmf_lover.1036.desc.start:0 "我听闻来自[lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]的消息，最近[lover.GetFirstNameNoTooltip]的处境似乎颇为艰难。\n\n"
 lmf_lover.1036.desc.proud:0 "据我所知，[lover.GetSheHe]已经负债累累，而且[lover.GetHerHis]生性自傲，也#EMP 不愿意#!向我求助。\n\n也许我应该主动伸出援手，不给[lover.GetHerHim]拒绝的机会。然而，我内心的一部分却在想，这是否正是[lover.GetFirstNameNoTooltip]默默期待的，或许我该袖手旁观，不采取任何行动？但[lover.GetSheHe]可能会失望甚至生气。"
 lmf_lover.1036.desc.stubborn:0 "据我所知，[lover.GetSheHe]已经负债累累，而且[lover.GetHerHis]显然有些倔强，现在还#EMP 不愿意#!向我求助。\n\n也许我应该主动伸出援手，不给[lover.GetHerHim]拒绝的机会。然而，我内心的一部分却在想，这是否正是[lover.GetFirstNameNoTooltip]默默期待的，或许我该袖手旁观，不采取任何行动？但[lover.GetSheHe]可能会失望甚至生气。"
 lmf_lover.1036.desc.humble:0 "据我所知，[lover.GetSheHe]已经负债累累，而且[lover.GetHerHis]显然太过谦逊，现在还#EMP 不愿意#!向我求助。\n\n也许我应该主动伸出援手，不给[lover.GetHerHim]拒绝的机会。然而，我内心的一部分却在想，这是否正是[lover.GetFirstNameNoTooltip]默默期待的，或许我该袖手旁观，不采取任何行动？但[lover.GetSheHe]可能会失望甚至生气。"
 lmf_lover.1036.desc.shy:0 "据我所知，[lover.GetSheHe]已经负债累累，而且[lover.GetHerHis]显然太过害羞，现在还#EMP 不愿意#!向我求助。\n\n也许我应该主动伸出援手，不给[lover.GetHerHim]拒绝的机会。然而，我内心的一部分却在想，这是否正是[lover.GetFirstNameNoTooltip]默默期待的，或许我该袖手旁观，不采取任何行动？但[lover.GetSheHe]可能会失望甚至生气。"
 lmf_lover.1036.desc.paranoid:0 "据我所知，[lover.GetSheHe]已经负债累累，而且[lover.GetHerHis]显然太过多疑，现在还#EMP 不愿意#!向我求助。\n\n也许我应该主动伸出援手，不给[lover.GetHerHim]拒绝的机会。然而，我内心的一部分却在想，这是否正是[lover.GetFirstNameNoTooltip]默默期待的，或许我该袖手旁观，不采取任何行动？但[lover.GetSheHe]可能会失望甚至生气。"
 lmf_lover.1036.desc.craven:0 "据我所知，[lover.GetSheHe]已经负债累累，而且[lover.GetHerHis]显然太过害怕，现在还#EMP 不愿意#!向我求助。\n\n也许我应该主动伸出援手，不给[lover.GetHerHim]拒绝的机会。然而，我内心的一部分却在想，这是否正是[lover.GetFirstNameNoTooltip]默默期待的，或许我该袖手旁观，不采取任何行动？但[lover.GetSheHe]可能会失望甚至生气。"
 lmf_lover.1036.desc.content:0 "据我所知，[lover.GetSheHe]已经负债累累，而且[lover.GetHerHis]显然有些不情愿，现在还#EMP 不愿意#!向我求助。\n\n也许我应该主动伸出援手，不给[lover.GetHerHim]拒绝的机会。然而，我内心的一部分却在想，这是否正是[lover.GetFirstNameNoTooltip]默默期待的，或许我该袖手旁观，不采取任何行动？但[lover.GetSheHe]可能会失望甚至生气。"
 lmf_lover.1036.desc.end:0 ""
 lmf_lover.1036.a:0 "当然，我会伸出援手！"
 lmf_lover.1036.b:0 "[lover.GetFirstNameNoTooltip]只能靠[lover.GetHerHis]自己。"
 lmf_lover.1036.b.tt:0 "[lover.GetFirstNameNoTooltip]期待你的帮助……"
 lmf_lover.1040.t:0 "一点建议"
 lmf_lover.1040.desc.start:0 "看到[lover.GetFirstNameNoTooltip]从[lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]到这里的那刻，我就知道[lover.GetHerHis]心里有事。\n\n看着[lover.GetSheHe|U]那眉头紧锁，满脸压力和担忧的样子，我明白[lover.GetSheHe]不是来陪我度过这一天的，而是来向我询问意见。\n\n“发生什么事了吗，[ROOT.Char.Custom2('spoken_address_by_familiarity', SCOPE.sC('lover'))]？”我开口问道。\n\n[lover.GetSheHe|U]重重地叹了口气，“我知道你在管理[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]这方面有自己的顾虑，但我需要"
 lmf_lover.1040.desc.diplomacy:0 "你帮我解决一个外交问题，"
 lmf_lover.1040.desc.martial:0 "你从在战略层面上帮我，"
 lmf_lover.1040.desc.stewardship:0 "你帮我处理一下我那封臣契约的问题，"
 lmf_lover.1040.desc.intrigue:0 "你帮我谨慎地处理一项要事，"
 lmf_lover.1040.desc.end:0 "拜托了……我已经很绝望了，恰好你擅长这块。”"
 lmf_lover.1040.a:0 "“你有要求，我都会尽力。”"
 lmf_lover.1040.a.success:0 "你成功帮助且取悦了[lover.GetHerHim]"
 lmf_lover.1040.a.fail.angry:0 "你的帮助适得其反，这让[lover.GetSheHe]很生气"
 lmf_lover.1040.a.fail.disappointed:0 "你的帮助适得其反，但[lover.GetSheHe]并没有怪罪"
 lmf_lover.1040.b:0 "说些陈词滥调和转移话题，从而避而不谈"
 lmf_lover.1040.b.success:0 "[lover.GetSheHe|U]知晓你帮不上忙"
 lmf_lover.1040.b.fail:0 "[lover.GetSheHe|U]看穿了你的转移话题"
 lmf_lover.1045.t:0 "我的[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]劝告"
 lmf_lover.1045.desc.start:0 "不得不说，我老是忽略[lover.GetFirstNameNoTooltip]是多么聪明和有能力。\n\n就像今天，我们在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的花园里闲逛，[lover.GetSheHe]"
 lmf_lover.1045.desc.diplomacy:0 "开始和我谈论封臣之间的一些麻烦，以及如何和平解决。\n\n"
 lmf_lover.1045.desc.martial:0 "谈到了我之前提到的兵源问题，并提供了几种可能的解决方案。\n\n"
 lmf_lover.1045.desc.stewardship:0 "谈到了我与封臣之间的税赋问题，[lover.GetSheHe]给了我一个完全可以绕过去的办法。\n\n"
 lmf_lover.1045.desc.intrigue:0 "谈到[ROOT.Char.Custom('FortifiedBuilding')]的安保问题，出于对我安危的关心，认为其可能被渗透。 \n\n"
 lmf_lover.1045.desc.learning:0 "详细讨论了如何支持[ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]里的藏书问题，还谈论如何发展领地。\n\n"
 lmf_lover.1045.desc.end:0 "陆陆续续讲了整个下午，我听得入迷了。[lover.GetHerHis|U]的建议确实很有用，真希望[lover.GetSheHe]还可以继续说些建议。"
 lmf_lover.1045.a:0 "不胜感激！"
 lmf_lover.1050.t:0 "救援"
 lmf_lover.1050.desc.start:0 "我生病咳嗽不止，卧床不起，正巧我听到有人想进入我的房间，我睡眼惺忪地让这家伙赶紧离开。\n\n“这怎么行呢，[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]，"
 lmf_lover.1050.desc.ruler:0 "我一听到你病了，就从[lover.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]一路赶来。”"
 lmf_lover.1050.desc.location:0 "我可以照顾你，我不会把你丢在这里卧床不起。”"
 lmf_lover.1050.desc.notlocation:0 "我一听到你病了，就从[lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]一路赶来。”"
 lmf_lover.1050.desc.mid:0 "[lover.GetFirstNameNoTooltip]说完就自顾自的走了进来，还打算照顾我。\n\n“这……这咳咳，这怎么行，你也会得病的……咳咳咳”\n\n“若是[lover.GetFaith.HighGodName]这样想，那就得呗”"
 lmf_lover.1050.desc.secret:0 "我几乎无力反抗，但要让仆人们相信[lover.GetFirstNameNoTooltip][lover.GetHerHis]这样做是出于常人般得关心，几乎是……不可能的。[lover.GetSheHe|U]是出于好意，但这很可能会泄露我们的秘密！"
 lmf_lover.1050.desc.public:0 "我几乎无力反抗，不过反抗又有什么用呢？每个人都已经知道了[lover.GetFirstNameNoTooltip]和我的关系……而且[lover.GetSheHe]似乎也不想否定。"
 lmf_lover.1050.a:0 "屈服[lover.GetHerHis]的照料。"
 lmf_lover.1050.a.success:0 "[lover.GetFirstNameNoTooltip]没被人怀疑"
 lmf_lover.1050.a.fail:0 "[lover.GetFirstNamePossessiveNoTooltip]的关心暴露了秘密"
 lmf_lover.1050.b:0 "“卫兵！让[lover.GetHerHim]走！不容质疑！”"
 lmf_lover.1055.t:0 "密从口出"
 lmf_lover.1055.desc:0 "我本意并非如此……\n\n[lover.GetFirstNameNoTooltip]和我聊天一晚上，可以说是“枕边风”？也可以说是粗心大意，反正我说了很多不该说的东西。\n\n[lover.GetSheHe|U]一开始假装不明白我的意思，但我从[lover.GetHerHis]的眼中就知道[lover.GetSheHe|U]什么都知道。"
 lmf_lover.1055.a:0 "对此没什么好说的……"
 lmf_lover.1055.b:0 "向[lover.GetHerHim]承诺任何事情，来换取[lover.GetHerHis]的沉默。"
 lmf_lover.1055.c:0 "关进牢房里！这样[lover.GetSheHe|U]说什么谁都不会信！"
 lover_promise_to_keep_secret:0 "[lover.GetFirstNameNoTooltip]承诺保守[secret|E]"
 lover_jailed_to_keep_secret:0 "花费些许代价让[lover.GetFirstNameNoTooltip]保守[secret|E]"
 lmf_lover.1060.t:0 "密从口出"
 lmf_lover.1060.desc:0 "显然，[lover.GetFirstNameNoTooltip]并不是故意想说出来。\n\n但[lover.GetFirstNameNoTooltip]和我聊天一晚上，可以说是“枕边风”？也可以说是粗心大意，反正我lover.GetSheHe]说漏了很多东西。\n\n说完，[lover.GetSheHe]瞬间愣住的样子告诉我，[lover.GetSheHe]完全知道刚才说了什么……而且[lover.GetSheHe]知道我也清楚，尽管我对此难以置信。"
 lmf_lover.1060.a:0 "这倒是出乎意料。"
 lmf_lover.1065.t:0 "提议"
 lmf_lover.1065.desc.start:0 "“我们咋还没结婚？”\n\n[lover.GetFirstNameNoTooltip]和我躺在床上时，突然问了这句，脸上还带着丝丝疑惑。\n\n"
 lmf_lover.1065.desc.secret:0 "我知的提醒[lover.GetHerHim]，我们的关系不宜曝光，而[lover.GetSheHe]想着竟然是如果我们结婚了，这一切都不重要。\n\n"
 lmf_lover.1065.desc.public:0 "我犹豫了一下，[lover.GetSheHe]提醒我说，每个人都已经知道了我们的关系，而且我们结了婚，他们最终会习惯并不再怪异的看待我们。\n\n"
 lmf_lover.1065.desc.happy:0 "“你确实告诉过我，[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]，早在几年前，你会想方设法让我开心，现在这样就可以了。”"
 lmf_lover.1065.desc.meant:0 "“早在几年前，你就告诉过我，[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]，我们注定要在一起。所以让我们好好在一起吧……”"
 lmf_lover.1065.desc.now:0 "“也许几年前刚开始时我们都没有想到这一点，[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]……我们现在就身处于此。”"
 lmf_lover.1065.desc.end:0 "我看得出[lover.GetSheHe]很坚定。"
 lmf_lover.1065.a:0 "“我同意，结婚吧！”"
 lmf_lover.1065.b:0 "“抱歉，这不是简单的小事。”"
 lmf_lover.1070.t:0 "到时候了吗？"
 lmf_lover.1070.desc.start:0 "我今天和[lover.GetFirstNameNoTooltip]在床上偎依，然后谈到婚姻话题。\n\n这不是[lover.GetHerHis]的选择，[lover.GetSheHe]经常说[lover.GetSheHe]不喜欢结婚，这是我的提出的。\n\n"
 lmf_lover.1070.desc.happy:0 "我提醒[lover.GetHerHim]，多年前刚开始时，我说过我会不惜一切代价让[lover.GetHerHim]幸福。"
 lmf_lover.1070.desc.meant:0 "我提醒[lover.GetHerHim]，多年前刚开始时，我说过我们注定要在一起。"
 lmf_lover.1070.desc.now:0 "我提醒[lover.GetHerHim]，多年前刚开始时，我们都认为这只是玩玩而已……但现在情况变了。"
 lmf_lover.1070.desc.secret:0 "这意味着我们不再偷偷摸摸地保持关系，不再保持隐秘。\n\n"
 lmf_lover.1070.desc.public:0 "而且大家都已经知道了我们的关系。这意味着[lover.GetSheHe]所受到的窃窃私语和注视将告一段落。\n\n"
 lmf_lover.1070.desc.end:0 "[lover.GetFirstNameNoTooltip]考虑过这个想法，我知道如果我坚持下去，[lover.GetHerHis]也会坚定想法。如果我不坚持下去，那么这个话题似乎不太可能再被提起。"
 lmf_lover.1070.a:0 "“我们结婚吧！”"
 lmf_lover.1070.b:0 "让这个话题就这样沉寂吧。"
 lmf_lover.1075.t:0 "抵达宫廷"
 lmf_lover.1075.desc.start:0 "“该死！#EMP [lover.GetSheHe]#!在这里干什么！？”\n\n廷臣们的窃窃私语钻入我耳内，抬头一看，果然是[lover.GetFirstNameNoTooltip]。[lover.GetSheHe|U]大摇大摆地走进了御座厅，仿佛[lover.GetSheHe]是这里的主人。"
 lmf_lover.1075.desc.known:0 "[lover.GetSheHe|U]难道不知道[lover.GetSheHe|U]被大家公认为我的情人和[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]中所有绯闻的话题中心？\n\n"
 lmf_lover.1075.desc.lowborn:0 "[lover.GetSheHe|U]不知道自己是个出身低微的[lover.GetWomanMan]？不适合在这里出现？\n\n"
 lmf_lover.1075.desc.courtier.realm:0 "[lover.GetSheHe|U]不知道自己是[lover.GetLiege.GetTitledFirstNamePossessiveNoTooltip][lover.GetLiege.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))]，不适合出现在这里？\n\n"
 lmf_lover.1075.desc.courtier.foreign:0 "[lover.GetSheHe|U]不知道自己是来自[lover.GetLiege.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]的[lover.GetWomanMan]？根本不适合在这里出现。\n\n"
 lmf_lover.1075.desc.culture:0 "[lover.GetSheHe|U]不知道自己是[lover.GetCulture.GetNameNoTooltip]族[lover.GetWomanMan]？根本不适合在这里出现。\n\n"
 lmf_lover.1075.desc.religion:0 "一个[lover.GetFaith.GetNameNoTooltip]的信徒根本不适合在这里出现。\n\n"
 lmf_lover.1075.desc.default:0 "[lover.GetSheHe|U]不知道自己是一位没有领主没有宫廷没有理由在这里的[lover.GetWomanMan]？\n\n"
 lmf_lover.1075.desc.mid:0 "我不清楚[lover.GetSheHe]想干什么。"
 lmf_lover.1075.desc.secret:0 "更糟糕的是，在众目睽睽之下没有预先计划好的故事，我无法解释[lover.GetHerHis]为何在这里。\n\n"
 lmf_lover.1075.desc.public:0 "也许[lover.GetSheHe]知道谁是八卦者和谣言制造者，但这只会进一步恶化局面。\n\n"
 lmf_lover.1075.desc.end:0 "也许应该悄悄地把[lover.GetHerHim]请走，不过，以我对[lover.GetFirstNameNoTooltip]的了解，[lover.GetSheHe]肯定会对此非常不满。。"
 lmf_lover.1075.a:0 "让[lover.GetFirstNameNoTooltip]呆着随便[lover.GetHerHis]吧！"
 lmf_lover.1075.a.success:0 "你解释了[lover.GetFirstNamePossessiveNoTooltip]为什么在这里。"
 lmf_lover.1075.a.fail:0 "你笨拙地试图解释一二"
 lmf_lover.1075.b:0 "“不不不，这不行，得让[lover.GetHerHim]离开。”"
 lmf_lover.1080.opening:0 "吾爱"
 lmf_lover.1080.desc.start:0 "人们说距离使爱更浓烈，看来这是真的，吾心与汝更近，也更欣喜。\n\n它告诉我"
 lmf_lover.1080.desc.army:0 "汝驻军千里开外"
 lmf_lover.1080.desc.travel:0 "汝远行他地"
 lmf_lover.1080.desc.event:0 "汝在千里开外"
 lmf_lover.1080.desc.end:0 "，若是如此，吾牵挂万分，希望这封信能能到汝手中，祝精神饱满、身体健康，直至汝回到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。"
 lmf_lover.1080.a:0 "希望快一点见到[lover.GetHerHim]。"
 lmf_lover.1085.t:0 "野心勃勃的[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
 lmf_lover.1085.desc.start:0 "我在寝室解开[lover.GetFirstNamePossessiveNoTooltip]衣裳时，我看得出来[lover.GetSheHe]心有所想，果然[lover.GetSheHe]没几下就停了下来。\n\n“我想成为一个有用的人，”[lover.GetSheHe]说道。\n\n“这事不能等等吗？”我打趣道，尽管我已经知道答案。\n\n“我在你的宫廷中，”[lover.GetFirstNameNoTooltip]直截了当地说，“无事可做，除了服侍你之外没有什么可以做的。”"
 lmf_lover.1085.desc.target:0 "[lover.GetSheHe|U]深吸了一口气，“我想成为你的[lover.Custom('GetTargetCourtPosition')]。”\n\n真是惊讶，我不由得脱口了一句，“嗯？就这样？”\n\n“我是认真的！"
 lmf_lover.1085.desc.bodyguard:0 "谁能比日夜陪伴你的人更好地守护你？”"
 lmf_lover.1085.desc.lady:0 "想想看！我会日夜照顾你，没有人会反对！”"
 lmf_lover.1085.desc.oldholder:0 "我会比[old_holder.GetTitledFirstNameNoTooltip]更忠诚地为你服务！”"
 lmf_lover.1085.desc.noholder:0 "那个职位还空缺，不是吗？”"
 lmf_lover.1085.desc.backup:0 "要么就这样！要么……让我做你的[lover.Custom('GetBackupCourtPosition')]？”"
 lmf_lover.1085.desc.onlybackup:0 "[lover.GetSheHe|U]深吸了一口气，“我想成为你的[lover.Custom('GetBackupCourtPosition')]。”\n\n真是惊讶，我不由得脱口了一句，“嗯？就这样？”\n\n“我是认真的！"
 lmf_lover.1085.desc.nothing:0 "我问过#EMP 她干了什么#!，但她哑口无言。”"
 lmf_lover.1085.desc.end:0 "真的！[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]，我想干些#EMP 什么#!！”\n\n我看得出，[lover.GetSheHe]并不打算就此罢休，在我回答之前，恐怕今晚也不得安宁。"
 lmf_lover.1085.a:0 "“好好好，你会做我的[lover.Custom('GetTargetCourtPosition')]。”"
 lmf_lover.1085.b:0 "“好好好，[old_holder.GetTitledFirstNameNoTooltip]会让路给你。”"
 lmf_lover.1085.a.lady_in_waiting_soulmate:0 "“我们是多般配的一对啊！”"
 lmf_lover.1085.a.lady_in_waiting_lover:0 "“嗯，没错，你可以与我相伴。”"
 lmf_lover.1085.a.bodyguard_soulmate:0 "#EMP 哦，我英勇的帕特洛克罗斯……#!"
 lmf_lover.1085.a.bodyguard_lover:0 "“永远不能离开我身边，[lover.GetFirstNameNoTooltip]。”"
 lmf_lover.1085.c:0 "“好好好，你会做我的[lover.Custom('GetBackupCourtPosition')]，该干正事了……”"
 lmf_lover.1085.d:0 "“为什么不来做我的[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]？”"
 lmf_lover.1085.e:0 "“不不不，这不行。”"
 lmf_lover.1086.title.tt:0 "违背诺言"
 lmf_lover.1086.desc:0 "你违背了对[lover.GetFirstNameNoTooltip]的承诺，取消[lover.GetHerHis]在你宫廷中的职位。"
 lmf_lover.1090.opening:0 "至受尽欺凌的吾爱"
 lmf_lover.1090.desc:0 "如果你打开了这封信，就说明我收买的那个年轻士兵信守了诺言，[my_imprisoner.GetTitledFirstNameNoTooltip]想必不会知道。\n\n我一得知你被关进监狱，就立刻写信给你。要是我能帮你找到逃跑的方法就好了！唉，现在我所能做的就是给你安慰，祈祷你早日获释。\n\n期待我们重逢之时。"
 lmf_lover.1090.a:0 "对[lover.GetHerHim]的思念会打发此段时光。"
 lmf_lover.1095.t:0 "冰镇热忱"
 lmf_lover.1095.desc:0 "当初[lover.GetFirstNameNoTooltip]相爱时，我确信我找到了真正的灵魂伴侣，但现在呢？\n\n我们的感情依然深厚，但每当想起[lover.GetHerHim]，我再也不会脸红心跳。[lover.GetSheHe|U]也不会占据每时每刻的思绪……当我看着[lover.GetSheHe]的眼睛时，[lover.GetSheHe]也是这么想1的。\n\n也许这是正常的，是感情随着时间而磨灭，或者可能是因为我没有尽全力让我们的爱情保持，这可以通过努力来解决吗？\n\n这是我仍想要的东西吗？"
 lmf_lover.1095.a:0 "感觉是会变……"
 lmf_lover.1095.b:0 "让我们重燃爱火吧。"
 lmf_lover.1095.b.success.tt:0 "你想方设法重燃爱火"
 lmf_lover.1095.b.failure.tt:0 "你的尝试只会让事情变得更糟"
 lmf_lover.1098.t:0 "我的秘密[my_bastard.Custom('GetDaughterSon')|U]"
 lmf_lover.1098.courtier:0 "[lover.GetFirstNameNoTooltip]要求今天见我时，我很惊讶，因为我们并没有约好时间。"
 lmf_lover.1098.notcourtier:0 "[lover.GetFirstNameNoTooltip]今天来到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]并要求见我时，我很惊讶，因为我没想到她会来。"
 lmf_lover.1098.start:0 "当我看到[my_bastard.Custom('polite_gender_ref')]尾随其后时，我更加惊讶了，是她的[my_bastard.Custom('GetDaughterSon')][my_bastard.GetFirstNameNoTooltip]。"
 lmf_lover.1098.notsecret:0 "当然也是我的种……\n\n她把沉默的[my_bastard.GetFirstNameNoTooltip]送到我身前，然后直视着我的眼睛，“是时候让人们知道谁是[my_bastard.GetHerHis]的父亲了。”\n\n"
 lmf_lover.1098.secret:0 "\n\n她把沉默的[my_bastard.GetFirstNameNoTooltip]送到我身前，然后直视着我的眼睛，“你该知道[my_bastard.GetSheHe]也是你的[my_bastard.Custom('GetDaughterSon')]了。 ”\n\n我一直都在怀疑，但听到这么直白地说了出来，我还是吓了一跳。但她随后又是一句，“是时候让人们知道谁是[my_bastard.GetHerHis]的父亲了。”\n"
 lmf_lover.1098.criminal:0 "我连忙警告[lover.GetFirstNameNoTooltip]，让她明白揭露真相会带来严重后果，但她却丝毫不惧。“这跟我没关系，”她说，“这跟[my_bastard.GetHerHis]的未来以及真相有关。”"
 lmf_lover.1098.notcriminal:0 "我询问道为什么过了这么久，她才选择现在提出这么大胆的要求。“这和我无关，甚至和你无关，”她说。“这关[my_bastard.GetHerHis]的未来，[my_bastard.GetSheHe|U]不应四处躲藏。”"
 lmf_lover.1098.a:0 "说服她不要这样做，至少现在不行。"
 lmf_lover.1098.a.success:0 "她服从了，尽管她对此不满意"
 lmf_lover.1098.a.failure:0 "她未经你的同意就透露了真相"
 lmf_lover.1098.b:0 "以她的领主身份威胁她。"
 lmf_lover.1098.b.angry:0 "她很生气，但还是让步了。"
 lmf_lover.1098.b.dumped:0 "她不会揭露这个秘密，但一切都结束了。"
 lmf_lover.1098.c:0 "也许她是对的，到时候了。"
 lmf_lover.1098.c.tt:0 "你将自动原谅[lover.GetFirstNameNoTooltip]的任何犯罪行为"
 lmf_lover.1100.t:0 "目标明确"
 lmf_lover.1100.desc.start:0 "在云雨一番后，我已经能感觉到[lover.GetFirstNamePossessiveNoTooltip]心里在想些什么，[lover.GetSheHe|U]想要什么时候的眼神真是太好猜了。\n\n“我看到"
 lmf_lover.1100.desc.jewelry:0 "一件精美的珠宝"
 lmf_lover.1100.desc.sword:0 "一把华丽的宝剑"
 lmf_lover.1100.desc.book:0 "一本让我惊奇的书"
 lmf_lover.1100.desc.manuals:0 "一册杰出的手稿"
 lmf_lover.1100.desc.robe:0 "一件绣工精致的长袍"
 lmf_lover.1100.desc.end:0 "，就在市场上。我非常想要它，不过似乎很#EMP 昂贵#!……”\n\n瞧瞧这狐狸尾巴翘得，[lover.GetFirstNameNoTooltip]希望我送给[lover.GetHerHim]，怪不得今晚[lover.GetSheHe]就一直说想要礼物。\n\n“[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)]？你爱我是不是？这肯定不算什么嘛对你来说。”"
 lmf_lover.1100.a:0 "我会给[lover.GetHerHim]一件#EMP 更昂贵#!的礼物"
 lmf_lover.1100.b:0 "唉，就宠[lover.GetHerHim]吧"
 lmf_lover.1100.c:0 "“哈？[lover.GetSheHe]在说什么怪话？绝对不行！”"
 lmf_lover.1105.t:0 "严重的侮辱"
 lmf_lover.1105.desc.start:0 "[lover.GetFirstNameNoTooltip]一脸怒气地冲进房间时，我还以为我做错了什么。\n\n幸好并非如此，[lover.GetSheHe]之前与[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))]发生过冲突。"
 lmf_lover.1105.desc.relation:0 "我那[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('my_courtier'))]"
 lmf_lover.1105.desc.norelation:0 "[my_courtier.GetWomanMan]"
 lmf_lover.1105.desc.end:0 "打听一下后，原是[lover.GetFirstNameNoTooltip]无意中听见一些……“流言蜚语”，然后爆发冲突了。在争吵过后，[lover.GetFirstNameNoTooltip]跑来告诉我，[my_courtier.GetFirstNameNoTooltip]正在[ROOT.Char.Custom('FortifiedBuilding')]四处奔波散布[lover.GetHerHim]的“谣言”\n\n显然宫廷人人都知道我和[lover.GetFirstNameNoTooltip]的关系，当然谅他们也不敢对我说什么，但对[lover.GetHerHim]呢？\n\n[lover.GetFirstNameNoTooltip]虽然嘴上没说我要干什么，但我可以看出[lover.GetSheHe]想要我做些什么。"
 lmf_lover.1105.a:0 "“我会立即让卫兵驱逐[my_courtier.GetFirstNameNoTooltip]。”"
 got_me_kicked_from_court:0 "[TARGET_CHARACTER.GetShortUIName|U]在侮辱[CHARACTER.GetShortUIName]后，被[CHARACTER.GetSheHe]赶出了宫廷。"
 got_me_kicked_from_court_corresponding:0 "[CHARACTER.GetShortUIName|U]在[TARGET_CHARACTER.GetShortUIName]侮辱[CharYouHerHim(CHARACTER)]后将[TARGET_CHARACTER.GetSheHe]驱逐出宫廷。"
 lmf_lover.1105.b:0 "[my_courtier.GetFirstNameNoTooltip]会受到严厉谴责"
 lmf_lover.1105.b.success:0 "[my_courtier.GetFirstNameNoTooltip]感到很懊悔"
 lmf_lover.1105.b.failure:0 "[my_courtier.GetFirstNameNoTooltip]对你们俩都很生气"
 got_me_reprimanded_unjustly:0 "[TARGET_CHARACTER.GetShortUIName|U]在侮辱[CHARACTER.GetShortUIName]后，遭到了[CHARACTER.GetFirstNameNoTooltip]不公正的呵斥。"
 got_me_reprimanded_unjustly_corresponding:0 "[CHARACTER.GetShortUIName|U]在遭到[TARGET_CHARACTER.GetShortUIName]侮辱后，不公正地斥责了[TARGET_CHARACTER.GetFirstNameNoTooltip]。"
 reprimanded_me_unjustly:0 "[TARGET_CHARACTER.GetShortUIName|U]不公正地斥责[CHARACTER.GetShortUIName]侮辱了[TARGET_CHARACTER.GetHerHisMy]的爱人"
 reprimanded_me_unjustly_corresponding:0 "[CHARACTER.GetShortUIName|U]不公正地斥责[TARGET_CHARACTER.GetShortUIName]侮辱了[CHARACTER.GetHerHisMy]的爱人"
 lmf_lover.1105.c:0 "[lover.GetFirstNameNoTooltip]必须要习惯。"
 insulted_lover:0 "[TARGET_CHARACTER.GetShortUIName|U]侮辱了[CHARACTER.GetShortUIName]并且没有受到惩罚。"
 insulted_lover_corresponding:0 "[CHARACTER.GetShortUIName|U]侮辱了[TARGET_CHARACTER.GetShortUIName]并且没有受到惩罚。"
 lmf_lover.1110.t:0 "在我身边"
 lmf_lover.1110.desc.start:0 "[lover.GetFirstNameNoTooltip]最近几天一直陪在我身边。\n\n要么床上，要么花园里，要么宫廷里……"
 lmf_lover.1110.desc.secret:0 "即使我们必须保守我们的秘密关系，但[lover.GetSheHe]总是设法陪在我身边。\n\n"
 lmf_lover.1110.desc.public:0 "我们没有必要隐藏关系，所以也没必要让[lover.GetHerHim]远离我。\n\n"
 lmf_lover.1110.desc.mid:0 "这有一定道理，考虑到"
 lmf_lover.1110.desc.courtier:0 "[lover.GetFirstNameNoTooltip]在[lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]没有特殊任务来吸引[lover.GetHerHis]的注意力"
 lmf_lover.1110.desc.mycourtier:0 "[lover.GetFirstNameNoTooltip]在宫廷上没有特别的职责来吸引[lover.GetHerHis]的注意力"
 lmf_lover.1110.desc.pool:0 "[lover.GetFirstNameNoTooltip]没有领主，因此没什么事情可以吸引[lover.GetHerHis]的注意力"
 lmf_lover.1110.desc.male:0 "，而且还不是[lover.Custom('KnightCultureNoTooltipLowercase')]。\n\n"
 lmf_lover.1110.desc.female:0 "，而且也没有孩子需要抚养。\n\n"
 lmf_lover.1110.desc.end:0 "不过我还是很享受我们在一起的时光……这分散了我作为[ROOT.Char.GetTitleAsNameNoTooltip]的压力。当然，我永远不会告诉[lover.GetHerHim]这些，但如果这样下去，我可能不得不这样做，否则我对[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]的关注就会受到影响。"
 lmf_lover.1110.a:0 "这又如何？我喜欢这样。"
 lmf_lover.1110.b:0 "把[lover.GetHerHim]送走吧，我需要专注于我的职责。"
 lmf_lover.1115.t:0 "不期而至"
 lmf_lover.1115.desc.start:0 "正当我思念[lover.GetFirstNameNoTooltip]时，正想着谁会出现？而看到[lover.GetHerHim]的那一刻，我几乎不敢相信，[lover.GetSheHe]看到我时脸上也露出笑容。\n\n“你在这里做什么？”我震惊地问道。"
 lmf_lover.1115.desc.courtier:0 "“我以为你在[lover.GetLiege.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]！”\n\n"
 lmf_lover.1115.desc.away:0 "“我最后打听到你还在[lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]！”\n\n"
 lmf_lover.1115.desc.local:0 "“我知道你还在[lover.GetLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]，但没想到会见到你！”\n\n"
 lmf_lover.1115.desc.mid:0 "“我感觉你想我了，”[lover.GetSheHe]说，“怎么？你要拒绝我？”\n\n我乐呵地傻笑，只能牵着[lover.GetHerHis]的手领上楼。"
 lmf_lover.1115.desc.secret:0 "通常我们必须对此非常保密，但是"
 lmf_lover.1115.desc.public:0 "我们没有必要保密，但即便如此"
 lmf_lover.1115.desc.end:0 "在[ROOT.Char.Custom('FortifiedBuilding')]里难得的平静一天。结果我们两都难以忘怀前一晚。"
 lmf_lover.1115.a:0 "我十分惊喜！"
 lmf_lover.1120.t:0 "花园里的一天"
 lmf_lover.1120.desc.start:0 "虽然[lover.GetFirstNameNoTooltip]是我的宫廷成员，但我们很少能在一起度过一天。"
 lmf_lover.1120.desc.secret:0 "我们的秘密关系要让我们尽可能长时间地分开，以免引起怀疑。\n\n"
 lmf_lover.1120.desc.public:0 "虽然我们的恋情是公开的，但出于责任感和礼节，我还是远离了[lover.GetHerHis]。\n\n"
 lmf_lover.1120.desc.end:0 "但今天却与往常不同，[ROOT.Char.Custom('FortifiedBuilding')]里第一次安静下来，大多数人都在忙于其他事务。[lover.GetFirstNameNoTooltip]静悄悄走了过来微笑低语道：“我知道我们可以独处的地方。”\n\n[lover.GetSheHe|U]带我往花园深处走，虽然我四处寻找园丁，却一个也没看到。\n\n“别看了，我把他们打发走了。”[lover.GetFirstNameNoTooltip]说道。\n\n[lover.GetSheHe]是如何做到的？我没有问，我也不关心，因为接下来的一天是我们俩都不太可能很快忘记的。"
 lmf_lover.1120.a:0 "我喜欢在花园里#EMP 干些#!事情"
 lmf_lover.1130.t:0 "偷得片刻"
 lmf_lover.1130.desc:0 "经过漫长的一天，军队在[army_location.GetCounty.GetTitle.GetNameNoTierNoTooltip]扎营。天色已晚，大部分士兵和骑士都已回到帐篷，我也如此。\n\n突然一个身影仿佛不知从何冒出，对方摘下头盔时，原来是[lover.GetFirstNameNoTooltip]！[lover.GetHerHis]脸上露出了笑容，“跟我来。”\n\n有那么一刻，我感觉不对劲，但[lover.GetSheHe]带我到营地一个比较隐蔽的地方，开始脱掉盔甲时，我意识到情况并非如此。\n\n“士兵们可能会看到我们，”我打趣道。\n\n“看到又怎么样，你不想在这里上我吗？”我脑中那根弦听到这句后立马断开。"
 lmf_lover.1130.a:0 "让我们来一场“露营”活动"
 lmf_lover.1135.t:0 "破损的轮子"
 lmf_lover.1135.desc.start:0 "旅队的人告诉我们有一辆马车的轮子坏了，这并不会严重耽误行程，但要等人来修修理。\n\n这时，[lover.GetFirstNameNoTooltip]突然出现在我身后，“我想……”[lover.GetSheHe]眨着眼睛\n\n我还没有想清楚[lover.GetSheHe]看干什么，但[lover.GetSheHe]胳膊上的篮子和毯子，啊我晓得了，我和[lover.GetHerHim]找了个僻静的地方，不会被人窥探，铺好毯子后，[lover.GetFirstNameNoTooltip]开始脱衣服。\n\n"
 lmf_lover.1135.desc.cold:0 "“这里有点冷，不是吗？”我笑道。\n\n“你进来就不冷了，”[lover.GetSheHe]回笑道。"
 lmf_lover.1135.desc.sand:0 "“小心别让沙子进去了，”我笑道。 \n\n“那你来检查一下，”[lover.GetSheHe]回笑道。"
 lmf_lover.1135.desc.bugs:0 "“我看你不怕虫子，”我笑道。 \n\n“这不是你在嘛。”[lover.GetSheHe]回笑道。"
 lmf_lover.1135.desc.default:0 "“你就不怕别人来看我们。”我笑道。 \n\n“那他们可得好好看看了，”[lover.GetSheHe]回笑道。"
 lmf_lover.1135.desc.end:0 "真是让我无法拒绝的家伙……"
 lmf_lover.1135.a:0 "我喜欢“爱之旅行”"
 lmf_lover.1140.opening:0 "吾爱"
 lmf_lover.1140.courtier:0 "我考虑了很久，我想把[lover_liege.GetTitledFirstNamePossessiveNoTooltip]留给宫廷，并且"
 lmf_lover.1140.pool:0 "我考虑了很久，我想"
 lmf_lover.1140.start:0 "加入你在的[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。\n\n"
 lmf_lover.1140.spouse:0 "[lover_spouse.GetFirstNameNoTooltip]愿意跟我一起去，不过[lover_spouse.GetHerHim]什么都不知道，不用担心。"
 lmf_lover.1140.bastard:0 "[my_bastard.GetFirstNameNoTooltip]需要在一个地方长大，并与[my_bastard.GetHerHis][ROOT.Char.GetMotherFather]见面。此外，"
 lmf_lover.1140.child:0 "我只是很担心[my_bastard_courtier.GetFirstNameNoTooltip]，我想离[my_bastard_courtier.GetHerHim]更近一点。"
 lmf_lover.1140.mid:0 "只是更想靠近你"
 lmf_lover.1140.public:0 "，尽管每个人都已经知道我对你来说是谁，但我不会惧怕宫廷的目光。\n\n"
 lmf_lover.1140.myspouse:0 "即使这意味着[ROOT.Char.GetPrimarySpouse.GetTitledFirstNamePossessiveNoTooltip]眼睛会一直盯着我。不过我不在乎，而你也不应该在乎。\n\n"
 lmf_lover.1140.secret:0 "即使我们必须继续做地下恋人。但我不在乎这些，你也不应该在乎。\n\n"
 lmf_lover.1140.end:0 "请这为了我，为了我们这样做吧。"
 lmf_lover.1140.a:0 "当然欢迎[lover.GetSheHe]。"
 lmf_lover.1140.b:0 "来到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]并留下来？我想这不太好！"
 lmf_lover.1145.t:0 "[my_spouse.GetWifeHusband|U]的嫉妒"
 lmf_lover.1145.desc.start:0 "刚和[lover.GetFirstNameNoTooltip]云雨一番后我就察觉有点不对劲，[lover.GetSheHe|U]整个过程都很安静，[lover.GetSheHe|U]似乎有些心不在焉。\n\n“你爱[my_spouse.GetHerHim]胜过爱我。”[lover.GetSheHe]终于开口了。\n\n我错愣了一下，如实说我不知道[lover.GetSheHe]指的是谁。\n\n“你的[my_spouse.GetWifeHusband]！”[lover.GetSheHe]随后歇斯底里地大叫道。"
 lmf_lover.1145.desc.soulmate:0 "“我看到了你和[my_spouse.GetHerHim]在一起时的样子。每个人都知道[my_spouse.GetTitleAsNameNoTooltip|l]是你真正的灵魂伴侣！”\n\n"
 lmf_lover.1145.desc.bestfriend:0 "“我看到了你在你[my_spouse.GetWifeHusband][my_spouse.GetHerHim]身边的行为举止。你们两个相处得如此轻松自在，你们就像是知己一样！”\n\n"
 lmf_lover.1145.desc.lover:0 "“我看到了你和[my_spouse.GetTitleAsNameNoTooltip|l]相处时的那个表情。你那个微笑！我怎么能指望能和[my_spouse.GetHerHim]竞争呢？！”\n\n"
 lmf_lover.1145.desc.friend:0 "“我看到了你和[my_spouse.GetTitleAsNameNoTooltip|l]相处时的那个表情。你如此轻松自在！我怎么能指望能和[my_spouse.GetHerHim]竞争呢？！”\n\n"
 lmf_lover.1145.desc.ruler:0 "“在[my_spouse.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]，[my_spouse.GetTitleAsNameNoTooltip|l]是位高权重的人，不是吗？而我什么都不是。我怎么能指望与[lover.GetSheHe]竞争呢？！”\n\n"
 lmf_lover.1145.desc.smart:0 "“每个人都这么说，[my_spouse.GetTitleAsNameNoTooltip|l]太聪慧了！而我，我怎么能指望和[lover.GetSheHe]竞争呢？！”\n\n"
 lmf_lover.1145.desc.pretty:0 "“这是因为[lover.GetSheHe]比我更[Select_CString( my_spouse.IsFemale, '美', '帅' )]，不是吗？承认吧！每个人都这么说了！”\n\n"
 lmf_lover.1145.desc.end:0 "[lover.GetFirstNamePossessiveNoTooltip]嫉妒不绝于耳，最后不可理喻地怒遏离去。"
 lmf_lover.1145.a:0 "我必须努力让[lover.GetHerHim]相信我的[my_spouse.GetWifeHusband]不会构成威胁。"
 lmf_lover.1145.a.success:0 "你成功说服了[lover.GetHerHim]……大概吧……"
 lmf_lover.1145.a.failure:0 "现在[lover.GetFirstNameNoTooltip]也迁怒与你。"
 lover_jealousy:0 "[CHARACTER.GetShortUIName|U]变得极其嫉妒[TARGET_CHARACTER.GetShortUIName|U]"
 lover_jealousy_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U]变得极其嫉妒[CHARACTER.GetShortUIName|U]"
 lmf_lover.1145.b:0 "没办法，这就是[my_spouse.GetFirstNameNoTooltip]为什么是我的[my_spouse.GetWifeHusband]。"
 lmf_lover.1150.desc:0 "当初[lover.GetFirstNameNoTooltip]相爱时，我确信我找到了真正的灵魂伴侣，但现在呢？\n\n我现在不确定我们是否还能说我们真的相爱，我仍然对[lover.GetHerHim]有感情，我相信[lover.GetSheHe]对我也有同样的感觉，但[lover.GetSheHe]还占据了我的脑海？我的心是还能为[lover.GetHerHim]而燃烧？我扪心自问，最终得出只有“否”\n\n我不知道是否意味着我们正在慢慢走向终结。但可以肯定的是，我和[lover.GetFirstNameNoTooltip]不再是灵魂伴侣了。"
 lmf_lover.1155.t:0 "不值得信任的爱人？"
 lmf_lover.1155.desc:0 "难以置信！？\n\n我最近收到消息，[lover.GetFirstNameNoTooltip]最近与[my_rival.GetTitledFirstNameNoTooltip]有联系。我不知道[lover.GetSheHe]为什么要给那家伙写信。而[lover.GetSheHe|U]也否认这回事，虽然我试图更仔细地调查此事，但很可能整个事情都是谣言……[lover.GetFirstNameNoTooltip]也暗示这无疑是有人散布的，目的是抹黑[lover.GetHerHis]的好名声。\n\n真相我不得而知，我只能相信[lover.GetHerHis]的说法，但这让我心烦意乱。也许[lover.GetSheHe]说的是真的，但万一呢……"
 lmf_lover.1155.a:0 "但愿不会有什么事发生。"
 lmf_lover.1156.opening:0 "[lover.Custom2('GreetingToGenericPositive', ROOT.Char )]"
 lmf_lover.1156.stranger:0 "你不认识我，但是"
 lmf_lover.1156.start:0 "我有一些关于[player_rival.GetTitledFirstName]的信息你可能会很感兴趣，考虑到你和[player_rival.GetSheHe]那众所周知的关系。\n\n我所要求的回报只是一笔微不足道的补偿，以及你的保密。"
 lmf_lover.1156.know:0 "落款：[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))|l]"
 lmf_lover.1156.stranger2:0 "你从谁那获得此信息。"
 lmf_lover.1156.a:0 "[player_rival.GetTitledFirstNameNoTooltip]有秘密？请说！"
 lmf_lover.1156.b:0 "我对此不感兴趣，滚。"
 lmf_lover.1160.t:0 "重燃爱火？"
 lmf_lover.1160.desc:0 "我突然意识到我最近很少见到[lover.GetFirstNameNoTooltip]。至少就我所知我们之间没什么隔阂，我们只是都在忙别的事情。\n\n现在[ROOT.Char.Custom('FortifiedBuilding')]异常安静，也许我可以重燃爱火？这能有多难呢！？"
 lmf_lover.1160.a:0 "我要给[lover.GetHerHim]写一首诗！"
 lmf_lover.1160.a.success:0 "[lover.GetSheHe|U]很喜欢这首诗"
 lmf_lover.1160.a.failure:0 "[lover.GetSheHe|U]对你的诗歌很感兴趣"
 lmf_lover.1160.b:0 "我们只是需要花更多时间在一起，仅此而已。"
 lmf_lover.1160.b.success:0 "相聚正是你们所需要的"
 lmf_lover.1160.b.failure:0 "[lover.GetSheHe|U]很喜爱你的举动"
 lmf_lover.1160.c:0 "我会给[lover.GetHerHim]买一些奢侈品，[lover.GetSheHe]一定会喜欢。"
 lmf_lover.1160.c.success:0 "[lover.GetSheHe|U]很喜欢这份礼物"
 lmf_lover.1160.c.failure:0 "[lover.GetSheHe|U]感谢这份礼物，但仅此而已。"
 lmf_lover.1160.d:0 "也许有时间一起去外面徒步旅行？"
 lmf_lover.1160.d.success:0 "徒步旅行是完美的独处时光"
 lmf_lover.1160.d.failure:0 "[lover.GetSheHe|U]更多的是被徒步旅行弄得很恼火"
 lmf_lover.1160.e:0 "是时候给卧室增添情趣了！"
 lmf_lover.1160.e.success:0 "[lover.GetSheHe|U]对你的努力很感兴趣"
 lmf_lover.1160.e.failure:0 "[lover.GetSheHe|U]对你的讨好感到厌烦"
 lmf_lover.1160.f:0 "我们乔装改扮前往[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]最繁忙的酒馆！"
 lmf_lover.1160.f.success:0 "这次偷玩非常成功！"
 lmf_lover.1160.f.failure:0 "[lover.GetSheHe|U]很感激这个夜晚，但仅此而已"
 lmf_lover.1160.g:0 "没必要这样，我们现在这样就很好。"
 lmf_lover.1165.t:0 "掌握火候"
 lmf_lover.1165.desc.start:0 "最近我发现自己在[lover.GetFirstNamePossessiveNoTooltip]花费了越来越多的时间。\n\n"
 lmf_lover.1165.desc.secret:0 "不过我们必须小心谨慎，确保无人知晓……然而，不知何故，这似乎并不难，或许我是在自欺欺人？\n\n"
 lmf_lover.1165.desc.end:0 "事实上，[lover.GetSheHe]和我在很多方面都很相似。我还没有说完一句话，[lover.GetSheHe]就能把它说完，我一直觉得不会这么顺利，但现在对我们俩来说似乎已经足够了。"
 lmf_lover.1165.a:0 "我很想知道这将会发生什么。"
 lmf_lover.1165.b:0 "也许这比我们最初想象的还要严重……"
 lmf_lover.1165.c:0 "没有必要发展成这样。"
 lmf_lover.1170.t:0 "生病"
 lmf_lover.1170.desc.start:0 "[lover.GetFirstNameNoTooltip]病了。\n\n"
 lmf_lover.1170.desc.courtier:0 "之前我曾短暂地去[lover.GetHerHis]寝宫看望过[lover.GetHerHim]，那时[lover.GetSheHe]正发烧，神志不清。[lover.GetSheHe|U]不停地呢喃着我的名字，一遍又一遍，而[lover.GetSheHe]睁眼那刻，[lover.GetSheHe]伸出了绝望的手，乞求我靠近[lover.GetSheHe]。\n\n我没能留下来，现在我在想我当时要不要留下来。"
 lmf_lover.1170.desc.pool:0 "[lover.GetSheHe|U]错过了我们上次的约会，我写信询问此事，结果得知[lover.GetSheHe]正在[lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]的某个地方，发着高烧，[ROOT.Char.GetFaith.FertilityGodName]去哪了呢？！\n\n[lover.GetSheHe|U]需要一名医生，而获得医生的唯一途径就是把[lover.GetHerHim]带到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]来。"
 lmf_lover.1170.desc.secret:0 "当然，这样做会有暴露我们的风险……我怎么解释我一直在[lover.GetFirstNamePossessiveNoTooltip]身边？\n\n"
 lmf_lover.1170.desc.public:0 "每个人都已经知道[lover.GetFirstNameNoTooltip]是谁了。我们没什么可隐瞒的了，唯一冒的风险就是感染疾病。\n\n"
 lmf_lover.1170.desc.end:0 "想到[lover.GetHerHim]奄奄一息躺在那里，[lover.GetSheHe]清醒的那一刻，我不在场，我就感到很痛苦。如果[lover.GetSheHe]挺过来了，知道[lover.GetSheHe]在最需要我的时候我却不在身边，[lover.GetSheHe]会如何想？"
 lmf_lover.1170.a:0 "我当然会守在[lover.GetHerHis]床边！"
 lmf_lover.1170.a.success:0 "你的仔细解释被接受了"
 lmf_lover.1170.a.fail:0 "大家都看穿了你的解释"
 lmf_lover.1170.b:0 "立即将[lover.GetHerHim]带到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]！"
 lmf_lover.1170.c:0 "[lover.GetSheHe|U]的待遇与其他廷臣无异。"
 lmf_lover.1170.d:0 "[lover.GetSheHe|U]只能在[lover.GetSheHe]现在的地方凑合了。"
 lmf_lover.1175.t:0 "愤怒的[my_spouse.GetWifeHusband|U]"
 lmf_lover.1175.desc.start:0 "御座厅空无一人后，[my_spouse.GetTitledFirstNameNoTooltip]突然冲了进来。从[my_spouse.GetHerHis]眼中的愤怒，我立刻意识到有些不对劲。\n\n“你必须和[my_spouse.Custom2('direct_address_by_familiarity', SCOPE.sC('lover'))]断绝关系，”[my_spouse.GetSheHe]厉声说道。“马上。”\n"
 lmf_lover.1175.desc.secret:0 "我起初试图否认，但[my_spouse.GetSheHe]打断了我的话。“我知道你的外遇。"
 lmf_lover.1175.desc.public:0 "我左右言他，但[my_spouse.GetSheHe]打断了我的话。“[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]中的每个人都知道。"
 lmf_lover.1175.desc.mid:0 "不许再侮辱我！”\n\n这场争论持续了将近一个小时，最终升级为激烈的争吵。“为了我们的婚姻，为了你自己的名声，你#EMP 必须#!结束这段关系！”"
 lmf_lover.1175.desc.courtier:0 "你必须结束并让[lover.GetHerHim]远离[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]！"
 lmf_lover.1175.desc.end:0 "如果你不这样做……”\n\n[my_spouse.GetSheHe|U]留下一个恶狠狠的眼神后转身离开了房间。"
 lmf_lover.1175.a:0 "我会按照[my_spouse.GetSheHe]的要求去做，确保和谐。"
 lmf_lover.1175.a.rivalry:0 "[lover.GetFirstNameNoTooltip]将感情的结束归咎于你的[my_spouse.GetWifeHusband]"
 spouse_made_lover_break_up:0 "[TARGET_CHARACTER.GetShortUIName|U]强迫[TARGET_CHARACTER.GetHerHis]的配偶与[CHARACTER.GetShortUIName]分手。"
 spouse_made_lover_break_up_corresponding:0 "[CHARACTER.GetShortUIName|U]强迫[CHARACTER.GetHerHis]的配偶与[TARGET_CHARACTER.GetShortUIName]分手。"
 lmf_lover.1175.b:0 "[lover.GetFirstNameNoTooltip]将被送走，但我不会结束这一切。"
 spouse_had_me_kicked_out:0 "[TARGET_CHARACTER.GetShortUIName|U]强迫[TARGET_CHARACTER.GetHerHis]的配偶将[CHARACTER.GetShortUIName]逐出宫廷。"
 spouse_had_me_kicked_out_corresponding:0 "[CHARACTER.GetShortUIName|U]强迫[CHARACTER.GetHerHis]的配偶将[TARGET_CHARACTER.GetShortUIName]逐出宫廷。"
 lmf_lover.1175.c:0 "[my_spouse.GetWifeHusband]能做什么？"
 lmf_lover.1175.c.rivalry:0 "[my_spouse.GetTitledFirstNameNoTooltip]将怒火发泄在[lover.GetFirstNameNoTooltip]身上"
 refused_to_dump_lover:0 "[TARGET_CHARACTER.GetShortUIName|U]拒绝与[TARGET_CHARACTER.GetHerHisMy]情人断绝关系。"
 spouse_wont_dump_lover:0 "[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat|U][CHARACTER.Custom('WifeHusbandOpp')]拒绝与[CHARACTER.Custom('GetHerHisOpposite')]的情人[TARGET_CHARACTER.GetShortUIName]断绝关系。"
 spouse_wont_dump_lover_corresponding:0 "[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip|U][TARGET_CHARACTER.Custom('WifeHusbandOpp')]拒绝与[TARGET_CHARACTER.Custom('GetHerHisOpposite')]的情人[CHARACTER.GetShortUIName]断绝关系。"
 lmf_lover.1180.t:0 "保密重负"
 lmf_lover.1180.desc.start:0 "我可以看到我们的关系对[lover.GetFirstNameNoTooltip]的影响\n\n"
 lmf_lover.1180.desc.honest:0 "[lover.GetSheHe|U]原本是一个诚实的[lover.GetWomanMan]，但现在不得不一次又一次地撒谎，"
 lmf_lover.1180.desc.just:0 "[lover.GetSheHe|U]原本是一位对是非对错有着清晰的认识[lover.GetWomanMan]，但现在不得不一次又一次地撒谎，"
 lmf_lover.1180.desc.paranoid:0 "[lover.GetSheHe|U]一直有点多疑，所以我们总是担心如果我们被发现会发生什么。"
 lmf_lover.1180.desc.craven:0 "[lover.GetSheHe|U]并不是一位勇敢的[lover.GetWomenMen]，所以我们总是在想，如果我们被发现了，后果会是怎样。"
 lmf_lover.1180.desc.intrigue:0 "考虑到[lover.GetHerHis]所受的教育，人们会认为[lover.GetSheHe]更善于保守秘密，但事实则是[lover.GetHerHis]更会说谎。"
 lmf_lover.1180.desc.bold:0 "一想到[lover.GetSheHe]是如此大胆，人们会认为保守秘密并不困难，但我想即使是最勇敢的[lover.GetWomenMen]也会被谎言磨灭。"
 lmf_lover.1180.desc.default:0 "但[lover.GetSheHe|U]并不擅长欺骗和阴谋诡计，也不是最大胆的[lover.GetWomenMen]，但现在一味地撒谎……"
 lmf_lover.1180.desc.end:0 "这种情况不断折磨[lover.GetHerHim]。\n\n我可以看到它如何给[lover.GetFirstNameNoTooltip]带来压力，以至于它影响了我们彼此的爱，而我对此无能为力。"
 lmf_lover.1180.a:0 "我希望[lover.GetHerHim]可以更好地应对。"
 lmf_lover.1185.t:0 "罪孽压力"
 lmf_lover.1185.desc.start:0 "我可以看到我们的关系对[lover.GetFirstNameNoTooltip]的影响\n\n"
 lmf_lover.1185.desc.incest:0 "与[lover.Custom2('LMF_RelationToMeShort', ROOT.Char )][lover.GetHerHis]发生关系按照任何[lover.GetFaith.GetNameNoTooltip]标准都是一种罪行。"
 lmf_lover.1185.desc.gay:0 "与另一个[ROOT.Char.GetWomanMan]上床，按照任何[lover.GetFaith.GetNameNoTooltip]标准都是罪行。"
 lmf_lover.1185.desc.married:0 "与[lover.GetWomanMan]通奸不仅是一种罪行，更是犯罪行为。"
 lmf_lover.1185.desc.unmarried:0 "一个[lover.GetWomanMan]被抓到并被指控私通，这可是罪行。"
 lmf_lover.1185.desc.secret:0 "我们必须时刻保持警惕来保守秘密，这只会增加[lover.GetSheHe]的压力。\n\n"
 lmf_lover.1185.desc.public:0 "我本以为我们的关系公开后会让事情变得简单一些，但事实似乎恰恰相反。\n\n"
 lmf_lover.1185.desc.end:0 "重压显然让[lover.GetFirstNamePossessiveNoTooltip]苦不堪言，我能感受到[lover.GetHerHis]的压力，以至于它影响了我们彼此的爱，而我对此无能为力。"
 lmf_lover.1185.a:0 "我希望[lover.GetHerHim]可以更好地应对。"
 lmf_lover.1190.t:0 "所有人的目光都集中在[lover.GetHerHim|U]身上"
 lmf_lover.1190.desc:0 "我原本以为我们的关系公开会让[lover.GetFirstNameNoTooltip]的事情变得更容易。\n\n然而，情况似乎并非如此。 作为[ROOT.Char.GetTitledFirstNamePossessiveNoTooltip]情人，所有人的目光都集中在[lover.GetFirstNameNoTooltip]身上，无论[lover.GetSheHe]走到哪里，[lover.GetSheHe]都觉得好像被人评头论足。\n\n我希望[lover.GetHerHim]能简单地甩掉这一切，但事实并非如此。这种压力显然影响了[lover.GetFirstNameNoTooltip]，以至于它影响了我们彼此的爱，而我对此无能为力。"
 lmf_lover.1190.a:0 "我希望[lover.GetHerHim]可以更好地应对。"
 lmf_lover.1195.t:0 "保密重负"
 lmf_lover.1195.desc.start:0 "若说隐瞒我和[lover.GetFirstNameNoTooltip]的关系对我没有任何影响，那定是谎言。\n\n"
 lmf_lover.1195.desc.honest:0 "我本是个诚实的[ROOT.Char.GetWomanMan]，但现在不得不一次又一次地撒谎，"
 lmf_lover.1195.desc.just:0 "我有强烈的正义感。 我知道对与错的区别。但现在做了如此明显错误的事情，还要#EMP 继续#!下去。"
 lmf_lover.1195.desc.paranoid:0 "我满脑子想的都是如果我们被发现，会发生什么。如果有人看我们，我就会努力猜测其在想什么。这让人抓狂，"
 lmf_lover.1195.desc.craven:0 "我是一个懦弱的[ROOT.Char.GetWomenMen]，一旦我们被发现，会发生什么，这种想法一直折磨我。"
 lmf_lover.1195.desc.intrigue:0 "我所受的教育，人们会认为我在这方面会做得更好，但我现在要不断撒谎。"
 lmf_lover.1195.desc.bold:0 "很多人说我胆大，这话不无道理。但仅有胆量并不足以掩盖不断撒谎的压力，"
 lmf_lover.1195.desc.default:0 "我并不喜欢欺骗和阴谋诡计，我也不是大胆的[ROOT.Char.GetWomenMen]，我只能不断地撒谎。"
 lmf_lover.1195.desc.end:0 "这似乎要吞噬了我。\n\n[lover.GetFirstNameNoTooltip]看到了压力对我的影响，[lover.GetSheHe]也劝我不要去想它，但我还是忍不住，[lover.GetSheHe]做什么都不会让我觉得好受。"
 lmf_lover.1195.a:0 "我现在该怎么办？"
 lmf_lover.1200.t:0 "罪孽压力"
 lmf_lover.1200.desc.start:0 "我和[lover.GetFirstNameNoTooltip]的关系对我产生了影响，虽然我很希望并非如此。\n\n"
 lmf_lover.1200.desc.incest:0 "与我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('lover'))]上床，确实是一桩罪行。"
 lmf_lover.1200.desc.gay:0 "与另一个[lover.GetWomanMan]上床，确实是一桩罪行。"
 lmf_lover.1200.desc.married:0 "与[ROOT.Char.GetWomanMan]通奸不仅是一种罪行，更是犯罪行为。"
 lmf_lover.1200.desc.unmarried:0 "一个[ROOT.Char.GetWomanMan]被抓到并被指控私通，这可是罪行。"
 lmf_lover.1200.desc.secret:0 "我们必须时刻保持警惕来保守秘密，这只会增加我的压力。\n\n"
 lmf_lover.1200.desc.public:0 "我本以为我们的关系公开后会让事情变得简单一些，但事实似乎恰恰相反。\n\n"
 lmf_lover.1200.desc.independent:0 "这并不是因为我害怕后果，而是我没有领主，"
 lmf_lover.1200.desc.liege:0 "我不需要害怕后果，因为[lover.GetFirstNameNoTooltip]是我的领主，"
 lmf_lover.1200.desc.ruler:0 "我并不害怕后果，确切地说，"
 lmf_lover.1200.desc.end:0 "这些罪行会对我造成什么影响。不过这种念头侵蚀着我，尽管[lover.GetFirstNameNoTooltip]劝我忘掉它，但我做不到。[lover.GetSheHe]做什么都不会让我觉得好受。"
 lmf_lover.1200.a:0 "我现在该怎么办？"
 lmf_lover.1205.t:0 "都注视我"
 lmf_lover.1205.desc:0 "我原本以为我们的关系公开了，事情就会变得简单一些。\n\n毕竟没必要掩盖与[lover.GetFirstNameNoTooltip]的关系。我是[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip][ROOT.Char.GetTitleAsNameNoTooltip|l]，我可以为所欲为，不是吗？\n\n然而，尽管廷臣和封臣什么也没说，但他们的眼中我看出不满，看出好奇，看出戏谑。我试图忽略它，但随着[lover.GetFirstNameNoTooltip]和我在一起的时间越来越长，这种情况越来越多，我不得不承认它在折磨我。"
 lmf_lover.1205.a:0 "真是太烦人了。"
 lmf_lover.1210.t:0 "四周低语"
 lmf_lover.1210.desc:0 "我以为我们已经很小心了。\n\n但显然事实并非如此，宫廷上有人在窃窃私语说我和[lover.GetFirstNameNoTooltip]……我们经常被人看到在一起，我们看起来多么友好，有人怀疑我们之间的关系可能还不止这些。\n\n当我告诉[lover.GetFirstNameNoTooltip]这个消息时，[lover.GetHerHim]嘟囔着：“我就知道会发生这种事。”\n\n但是在我们的秘密被公开之前，我们必须现在就采取行动。"
 lmf_lover.1210.a:0 "我会尽力阻止这些流言蜚语。"
 lmf_lover.1210.b:0 "让[lover.GetFirstNameNoTooltip]来阻止这些流言蜚语吧。"
 lmf_lover.1210.a.success.tt:0 "成功辟谣"
 lmf_lover.1210.a.failure.tt:0 "秘密泄露了"
 lmf_lover.1210.c:0 "[lover.GetFirstNameNoTooltip]和我需要分开一段时间，直到事情平静下来。"
 lmf_lover.1215.t:0 "选择时间"
 lmf_lover.1215.desc.start:0 "我们最近在一起过了一夜，[lover.GetFirstNameNoTooltip]几乎没说一句话，我看得出[lover.GetSheHe]对某事感到生气。\n\n在我的逼问下，[lover.GetSheHe]终于忍不住开口，“我要你和[other_lover.GetTitledFirstNameNoTooltip]结束关系！”\n\n"
 lmf_lover.1215.desc.spouse:0 "“与#EMP [other_lover.Custom2('GetYourConsortType', ROOT.Char )]#!结束这一切！？”\n\n“[other_lover.GetSheHe|U]不仅仅是你的[other_lover.Custom2('GetYourConsortType', ROOT.Char )]！你明显#EMP 宠爱#![other_lover.GetHerHim]，你的手从没离开[other_lover.GetHerHim]！”\n\n"
 lmf_lover.1215.desc.secret:0 "我很惊讶[lover.GetSheHe]竟然知道[other_lover.GetFirstNameNoTooltip]。\n“怎么？你以为我不知道！”[lover.GetSheHe]看着我怒气冲冲地说。“我不会泄露你的秘密，我不是傻瓜，但你不能一边爱着[other_lover.GetHerHim]，一边又说你爱着#EMP 我#!！”\n"
 lmf_lover.1215.desc.public:0 "对此表现我早有预料，“你和[other_lover.GetHerHim]到处炫耀！”[lover.GetSheHe]怒气冲冲说着，\n“在我面前炫耀，好像我对此无话可说一样！你爱上[other_lover.GetHerHim]了吗？你爱上我了吗？！”\n"
 lmf_lover.1215.desc.end:0 "我们的争论愈演愈烈，直到最后[lover.GetFirstNameNoTooltip]发出最后通牒，让我在[lover.GetHerHis]们之间做出选择，否则我们就完了。"
 lmf_lover.1215.a:0 "“当然选你啦！”"
 lmf_lover.1215.b:0 "“如果必须的话，我会选择[other_lover.GetHerHim]。”"
 lmf_lover.1215.c:0 "“我不会选择的！”"
 lmf_lover.1215.c.angry:0 "[lover.GetFirstNameNoTooltip]很生气，但还是让步了。"
 lmf_lover.1215.c.dumped:0 "[lover.GetFirstNameNoTooltip]兑现了[lover.GetHerHis]的威胁"
 lmf_lover.1220.t:0 "意外的保姆？"
 lmf_lover.1220.desc:0 "[lover.GetFirstNameNoTooltip]写信告诉我，希望我们可以一起度过一天时，我很高兴。今天[ROOT.Char.Custom('FortifiedBuilding')]很安静，所以我得以溜走。\n\n不过当我看到她身边带着[my_bastard.Custom('ChildhoodPersonalityTrait')|l]的[my_bastard.Custom('polite_gender_ref')]时，我有些惊讶，是我们的[my_bastard.Custom('GetDaughterSon')][my_bastard.GetFirstNameNoTooltip]。\n\n“我希望[my_bastard.GetFirstNameNoTooltip]能认识[my_bastard.GetHerHis]的父亲，”她说。“你很少见到[lover.Custom2('spoken_address_by_familiarity', ROOT.Char)][my_bastard.GetHerHim]，而且这可能是你在[my_bastard.GetSheHe]长大之前唯一的机会。”\n\n我看得出她很坚定，但……和[my_bastard.Custom('GetLassLad')]在一起一整天？"
 lmf_lover.1220.a:0 "也许这就是弥补父亲与[my_bastard.Custom('GetDaughterSon')]关系的一个机会？"
 lmf_lover.1220.a.success:0 "在一起的一天很成功"
 spent_time_with_me:0 "[CHARACTER.GetShortUIName|U]和[TARGET_CHARACTER.GetShortUIName]花时间以父亲和[CHARACTER.Custom('GetDaughterSon')]的身份相识。"
 spent_time_with_me_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U]和[CHARACTER.GetShortUIName]花时间以父亲和[TARGET_CHARACTER.Custom('GetDaughterSon')]的身份相识。"
 lmf_lover.1220.a.failure:0 "这是令人尴尬且充满失望的一天"
 lmf_lover.1220.b:0 "我没时间也没耐心去做这件事！"
 refused_to_spend_time_with_me:0 "[CHARACTER.GetShortUINamePossessive|U]的父亲[TARGET_CHARACTER.GetShortUIName]把[Select_CString( CHARACTER.IsLocalPlayer, '我', CHARACTER.GetHerHim )]弄走"
 refused_to_spend_time_with_me_corresponding:0 "[CHARACTER.GetShortUIName|U]拒[CHARACTER.GetHerHisMy]的秘密[TARGET_CHARACTER.Custom('GetDaughterSon')][TARGET_CHARACTER.GetShortUIName]于千里"
 lmf_lover.1225.opening:0 "吾爱"
 lmf_lover.1225.secret:0 "我知道这可能会让你大吃一惊，但也该让你知道了，我亲爱的[my_bastard.Custom('polite_gender_ref')]——[my_bastard.GetFirstName]，是你的[my_bastard.Custom('GetDaughterSon')]。\n\n"
 lmf_lover.1225.courtier:0 "我希望[my_bastard.GetHerHim]能接受良好的教育并拥有美好的未来，而这在[lover.GetLiege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]是不可能实现的。"
 lmf_lover.1225.pool:0 "我希望[my_bastard.GetHerHim]能接受良好的教育并拥有美好的未来，而这两点我都无法给予[my_bastard.GetHerHim]。"
 lmf_lover.1225.end:0 "我希望把[my_bastard.GetHerHim]送到您的[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]宫廷，在那里[my_bastard.GetSheHe]可以被培养成一个合格的[my_bastard.GetWomanMan]，恳请你同意。"
 lmf_lover.1225.a:0 "[new_guardian.GetTitledFirstNameNoTooltip]将成为[my_bastard.Custom('GetLassLad')]的优秀卫士。"
 lmf_lover.1225.b:0 "我相信我们可以在这里找到一个人来担任[my_bastard.GetHerHis]的监护人。"
 lmf_lover.1225.c:0 "把[my_bastard.GetHerHim]带到这里来？这是不可能的。"
 lmf_lover.1230.t:0 "[my_bastard.Custom('GetDaughterSon')|U]的处境"
 lmf_lover.1230.desc.start:0 "[lover.GetFirstNameNoTooltip]找我私下谈话时，我犹豫地同意了。\n\n她想谈的是我们的[my_bastard.Custom('GetDaughterSon')]……"
 lmf_lover.1230.desc.othercourt:0 "她抱怨道：“[my_bastard.GetFirstNamePossessiveNoTooltip]的潜力在[my_bastard.GetLiege.GetTitledFirstNamePossessiveNoTooltip]宫廷里被浪费了。”"
 lmf_lover.1230.desc.otherknight:0 "她抱怨道：“[my_bastard.GetFirstNamePossessiveNoTooltip]的潜力被浪费了，只因是[my_bastard.GetLiege.GetTitledFirstNamePossessiveNoTooltip][my_bastard.GetLiege.Custom('KnightCulturePluralNoTooltipLowercase')]之一。”"
 lmf_lover.1230.desc.other:0 "“[my_bastard.GetFirstNameNoTooltip]在[my_bastard.GetLiege.GetTitledFirstNamePossessiveNoTooltip]宫廷上没有任何职位，所有的潜力都被浪费了！”她抱怨道。"
 lmf_lover.1230.desc.court:0 "“[my_bastard.GetFirstNamePossessiveNoTooltip]的潜力在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]中被浪费了，”她抱怨道。“你需要给[my_bastard.GetHerHim]一些有用的事情做！”\n\n"
 lmf_lover.1230.desc.pool:0 "“[my_bastard.GetFirstNameNoTooltip]潜力巨大，但却没有好领主来侍奉，”她抱怨道。"
 lmf_lover.1230.desc.bring:0 "“我希望你把[my_bastard.GetHerHim]带到这里，让[my_bastard.GetSheHe]可以发挥作用。”\n\n"
 lmf_lover.1230.desc.mid:0 "我不由得问道，“什么是有用？”\n\n"
 lmf_lover.1230.desc.target:0 "她仿佛知道我想问什么，“让[my_bastard.GetHerHim]成为你的[my_bastard.Custom('GetTargetCourtPosition')]。”，听完我差点笑了出来，但[lover.GetFirstNameNoTooltip]似乎是认真的。"
 lmf_lover.1230.desc.notarget:0 "听完[lover.GetFirstNameNoTooltip]愣住了，“我……我不知道，#EMP 有什么能做的#!都可以！”，我告诉她这没什么用，但她坚持己见。"
 lmf_lover.1230.desc.backup:0 "“也许可以做你的[my_bastard.Custom('GetBackupCourtPosition')]！”她喊道。"
 lmf_lover.1230.desc.end:0 "“[my_bastard.GetFirstNameNoTooltip]是你的血亲！你#EMP 欠#![my_bastard.GetHerHim]的！”"
 lmf_lover.1230.a:0 "“好好好，[my_bastard.GetFirstNameNoTooltip]会做我的[my_bastard.Custom('GetTargetCourtPosition')]。”"
 lmf_lover.1230.b:0 "“若[my_bastard.GetSheHe]是我的[my_bastard.Custom('GetBackupCourtPosition')]？当然没问题。”"
 lmf_lover.1230.c:0 "“[my_bastard.GetSheHe|U]可以加入我的[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]行列。”"
 lmf_lover.1230.d:0 "“事实上，我并不欠[my_bastard.GetHerHim]#EMP 任何东西#!”"
 lmf_lover.1231.title.tt:0 "违背诺言"
 lmf_lover.1231.desc:0 "你违背了对[lover.GetFirstNameNoTooltip]的承诺，取消[my_bastard.GetFirstNamePossessive]在你宫廷中的职位。"
 lmf_lover.1235.t:0 "合法请求"
 lmf_lover.1235.desc:0 "在与[lover.GetFirstNameNoTooltip]共度了一个晚上后，她提起了我们的[my_bastard.Custom('GetDaughterSon')][my_bastard.GetFirstName]的话题。\n\n“每个人都知道我对你们来说是谁，”她说，“他们也知道[my_bastard.GetSheHe]是谁，难道不应该让[my_bastard.GetHerHim]成为您的合法血亲吗？”\n\n“合法化？”听到这话我很惊讶。“但是你和我还没结婚，亲爱的。”\n\n显然她的目光告诉我这是#EMP 我的所作所为#!，不是她的。“但[my_bastard.GetSheHe]是你的 [my_bastard.Custom('GetDaughterSon')]！区别对待[my_bastard.GetSheHe]是不对的，你可以改变这一点！”\n\n我看得出[lover.GetFirstNameNoTooltip]很坚定。"
 lmf_lover.1235.a:0 "她说得有道理，很好。"
 lmf_lover.1235.b:0 "不，这根本不可能发生。"
 lmf_lover.1240.t:0 "等待许久"
 lmf_lover.1240.desc:0 "和[lover.GetFirstNameNoTooltip]开始关系时，谁会想到这么多年我们还会在一起？\n\n我的确不认为我们的恋情是认真的。然而，我们仍然在一起，虽然我们的热情不复往日，但我不能否认，我仍然对[lover.GetHerHim]怀有深厚的感情。\n\n然而，如果我想感情#EMP 继续下去#!，我可能必须付出更多努力，但……我#EMP 真#!想这样吗？"
 lmf_lover.1240.a:0 "我的确想继续感情，我会努力实现它。"
 lmf_lover.1240.b:0 "这样就可以了"
 lmf_lover.1245.t:0 "爱与恨"
 lmf_lover.1245.desc:0 "最近几个月我很少见到[lover.GetFirstNameNoTooltip]，甚至我们见面的时候，[lover.GetSheHe]会疏远我，有时甚至很冷淡。 \n\n可能是[lover.GetSheHe]开始讨厌我，恨我了？\n\n也许只是[lover.GetSheHe]的暂时不稳定情绪？是结束的开始？我不得而知。"
 lmf_lover.1245.a:0 "如果我想留住[lover.GetHerHim]，我必须采取行动。"
 lmf_lover.1250.t:0 "祸从口出？"
 lmf_lover.1250.desc:0 "上次我与[lover.GetFirstNameNoTooltip]约会时出了点问题。\n\n在晚宴时候，[lover.GetSheHe]非常安静。我看得出来[lover.GetSheHe|U]很生气，但我无论如何也想不起来我到底说了什么让[lover.GetHerHim]如此生气。更糟糕的是，每次我试图问[lover.GetHerHim]问题出在哪里，[lover.GetHerHim]就更恼火！最终，演变成一场争吵，然后[lover.GetHerHis]收拾好衣服就走了。\n\n虽然我不认为问题很严重，但如果我不采取任何措施，这会影响我们的关系。"
 lmf_lover.1250.a:0 "我试试吧。"
 lmf_lover.1250.a.success:0 "[lover.GetFirstNameNoTooltip]心软了，对你的努力感到好笑"
 lmf_lover.1250.a.failure:0 "你的努力只让[lover.GetHerHim]更加恼火"
 lmf_lover.1250.b:0 "“还是不要惹麻烦。”"
 lmf_lover.1255.t:0 "冲突"
 lmf_lover.1255.desc.courtier:0 "我终于有机会和[lover.GetFirstNameNoTooltip]共度良宵，"
 lmf_lover.1255.desc.notcourtier:0 "[lover.GetFirstNameNoTooltip]的突然造访恰好让我有机会与[lover.GetHerHim]共度独处一晚，"
 lmf_lover.1255.desc.mid:0 "真是难得的一天。\n\n一开始还算顺利，但没过多久我们就开始争吵。 一开始都是些琐事，但[lover.GetSheHe]的一句话让我暴怒，然后开始互相指责，当我们来到卧室时，指责已经变成了一场没有结果的争吵……当然也没有做爱。\n\n"
 lmf_lover.1255.desc.courtier2:0 "[lover.GetFirstNameNoTooltip]冲回[lover.GetHerHis]在[ROOT.Char.Custom('FortifiedBuilding')]的房间，"
 lmf_lover.1255.desc.notcourtier2:0 "[lover.GetFirstNameNoTooltip]气冲冲地从[ROOT.Char.Custom('FortifiedBuilding')]离开了，"
 lmf_lover.1255.desc.end:0 "我不禁陷入沉思，我们在很多方面都不同，但我们是怎么成为恋人的，我可以试着修补关系，但这需要努力。"
 lmf_lover.1255.a:0 "我至少得试试！"
 lmf_lover.1255.a.success.tt:0 "你平息了事态"
 lmf_lover.1255.a.failure.tt:0 "[lover.GetFirstNameNoTooltip]不想理会你的示好"
 lmf_lover.1255.b:0 "要改变的是[lover.GetSheHe|U]，而不是我！"
 lmf_lover.1260.t:0 "距离"
 lmf_lover.1260.desc:0 "[lover.GetFirstNameNoTooltip]和我都很忙。\n\n我在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，而[lover.GetHerHim]身为[lover.GetTitleAsNameNoTooltip|l]也忙于[lover.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。因此，我们见面的机会很少。\n\n这可能很难弥合关系，但如果我们不这样做，我感觉我们的恋情可能会慢慢凋零……"
 lmf_lover.1260.a:0 "我们要更加努力！"
 lmf_lover.1260.b:0 "“没什么可做的，感情就是这样。”"
 lmf_lover.1265.t:0 "错误的时间和地点"
 lmf_lover.1265.desc:0 "[lover.GetFirstNameNoTooltip]和我又颠鸾倒凤一晚上，然后[lover.GetSheHe]收拾好衣服，正溜出寝室，突然我听到门又开了。\n\n我以为是[lover.GetHerHim]，从床上起身含着，“亲爱的，你是不是忘了什么？”\n\n随即定眼一瞧，糟了不是[lover.GetHerHim]，是[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('my_courtier'))|l]站在门口，是来传递信息的。\n\n[my_courtier.GetFirstNameNoTooltip]听到我说的话了吗？[my_courtier.GetSheHe]刚才看到[lover.GetFirstNameNoTooltip]离开了吗？我脑子涌入一堆问题……"
 lmf_lover.1265.a:0 "让[my_courtier.GetFirstNameNoTooltip]相信这只是一个误会。"
 lmf_lover.1265.a.success.tt:0 "[my_courtier.GetFirstNameNoTooltip]确信这什么都不是"
 lmf_lover.1265.a.failure.tt:0 "[my_courtier.GetFirstNameNoTooltip]知道你在撒谎"
 lmf_lover.1265.b:0 "让[my_courtier.GetFirstNameNoTooltip]闭嘴。"
 lmf_lover.1265.b.success.tt:0 "[my_courtier.GetFirstNameNoTooltip]闭嘴不言"
 courtier_promised_not_to_reveal_tt:0 "[my_courtier.GetFirstNameNoTooltip]承诺保守[secret|E]"
 lmf_lover.1265.b.failure.tt:0 "你的话语不太有说服力"
 lmf_lover.1265.c:0 "开除[my_courtier.GetHerHim]，然后静观其变。"
 lmf_lover.1265.c.knows.tt:0 "[my_courtier.GetFirstNameNoTooltip]看到并且知道了一切"
 lmf_lover.1265.c.revealed.tt:0 "[my_courtier.GetFirstNameNoTooltip]告诉他人，然后消息传开了……"
 lmf_lover.1265.c.learned.tt:0 "[my_courtier.GetFirstNameNoTooltip]保守了秘密，暂时"
 lmf_lover.1270.t:0 "意外的见证人"
 lmf_lover.1270.desc:0 "趁着[ROOT.Char.Custom('FortifiedBuilding')]人多时候，我和[lover.GetFirstNameNoTooltip]偷偷溜进了寝室，正是食髓知味好时候，这时[lover.GetFirstNamePossessiveNoTooltip]突然震惊地睁大了眼睛。\n\n我顺着目光看去，是年轻且满脸困惑的[my_courtier.GetFirstNameNoTooltip]。\n\n我不知道[my_courtier.GetSheHe]是怎么进来的，也不知道[my_courtier.GetSheHe]想干什么，但我赶紧抓起裤子。额……我是否应该试着说服[my_courtier.GetSheHe]，让[my_courtier.GetSheHe]知道事情不是那样子的？还是应该指望人们因为[my_courtier.GetSheHe]还年轻而忽视[my_courtier.GetHerHis]讲的故事？"
 lmf_lover.1270.a:0 "“我们该谈谈了。”"
 lmf_lover.1270.a.success.tt:0 "你让[my_courtier.GetHerHim]相信这只是一个误会。"
 lmf_lover.1270.a.failure.tt:0 "说服[my_courtier.GetHerHim]只会让情况变得更糟"
 lmf_lover.1270.b:0 "“我确信，没有人会相信[my_courtier.GetHerHim]。”"
 lmf_lover.1275.t:0 "我的[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))]劝告"
 lmf_lover.1275.desc.start:0 "[lover.GetFirstNameNoTooltip]最近的举动有些不同，没有什么可疑的，但很疏远，还心不在焉。"
 lmf_lover.1275.desc.courtier:0 "我不在的时候，让[ROOT.Char.Custom('FortifiedBuilding')]里的一些仆人悄悄地盯着[lover.GetHerHim]。\n\n"
 lmf_lover.1275.desc.othercourtier:0 "上次见面后，当[lover.GetHerHim]回去[lover.GetLiege.GetTitledFirstNamePossessiveNoTooltip]宫廷时，我雇了几个仆人监视[lover.GetSheHe]。\n\n"
 lmf_lover.1275.desc.other:0 "在我们会面后离开[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]时，我雇了几个仆人跟随[lover.GetHerHim]。\n\n"
 lmf_lover.1275.desc.end:0 "我的本想找出问题所在，也许我能帮上什么忙。然而，仆人们汇报的情况却让我大吃一惊。\n\n有人多次看到[lover.GetFirstNameNoTooltip]和[other_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]在一起……幽会……这两人在一起大笑、乱摸，但附近有其他人，他们就会立即分开，装作无事样子。\n\n现在我清楚了，[lover.GetFirstNameNoTooltip]有一位秘密情人。"
 lmf_lover.1275.a:0 "这#EMP 倒是#!出乎意料。"
 lmf_lover.1280.t:0 "[lover.GetHerHis|U]的其他情人"
 lmf_lover.1280.desc:0 "我无法摆脱这些想法。\n\n一想到[lover.GetFirstNameNoTooltip]和[other_lover.GetTitledFirstNameNoTooltip]在床上纠缠，喘息声从[lover.GetFirstNameNoTooltip]的嘴唇中发出……\n\n#EMP 操！#!在我发疯之前我肯定要做点什么。"
 lmf_lover.1280.a:0 "[lover.GetFirstNameNoTooltip]必须在我们之间做出选择。"
 lmf_lover.1280.a.you:0 "[lover.GetFirstNameNoTooltip]选择你"
 lmf_lover.1280.a.them:0 "[lover.GetFirstNameNoTooltip]选择[other_lover.GetHerHim]"
 lmf_lover.1280.b:0 "别想别想……"
 lmf_lover.1280.c:0 "妈的，我受够了，一刀两断吧就这样。"
 lmf_lover.1285.t:0 "渐渐消逝的爱"
 lmf_lover.1285.desc:0 "今天我突然意识到，最近我没再见过[lover.GetFirstNameNoTooltip]。\n\n[lover.GetSheHe|U]没有来看我，也没有给我写信……也许他们说的没错，爱情会随着时间的流逝而消逝，要么就这样，要么我来维持我们曾经拥有的感情。\n\n我该尝试一下吗？还是现在就该结束这一切，一了百了？"
 lmf_lover.1285.a:0 "我会找到办法重燃爱火！"
 lmf_lover.1285.a.success.tt:0 "你的努力成功了"
 lmf_lover.1285.a.failure.tt:0 "你的尝试只会让事情变得更糟"
 lmf_lover.1285.b:0 "还是结束一切算了吧……"
 lmf_lover.1500.t:0 "眼不见，心不烦"
 lmf_lover.1500.desc:0 "上一次我收到[lover.GetFirstNameNoTooltip]的来信时，[lover.GetSheHe]还在[lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]的某个地方，信要好几个月才能寄到[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]这里，谁知道[lover.GetSheHe]是否还在那里呢？\n\n我希望[lover.GetSheHe]能很快回来，但几个月的过去，我发现自己对[lover.GetHerHim]的思念越来越少。\n\n我不知道[lover.GetSheHe]是否也这样。"
 lmf_lover.1500.a:0 "就这样吧。"
 lmf_lover.1505.t:0 "我遥远的[ROOT.Char.Custom2('GetYourConsortType', SCOPE.sC('lover'))|U]"
 lmf_lover.1505.desc.start:0 "我已经很久没有收到[lover.GetFirstNameNoTooltip]的信件了。\n\n我最近听说[lover.GetSheHe]"
 lmf_lover.1505.desc.courtier:0 "在[lover.GetLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]的[lover.GetLiege.GetTitledFirstNamePossessiveNoTooltip]宫廷里，"
 lmf_lover.1505.desc.pool:0 "在[lover.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]某处，"
 lmf_lover.1505.desc.end:0 "我也不知道[lover.GetSheHe]在那干什么。\n\n但我想念[lover.GetHerHim]，也许我应该雇几个佣人去找[lover.GetFirstNameNoTooltip]，看看他们能否说服[lover.GetHerHim]回来[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，虽然前提是他们能找到[lover.GetHerHim]。"
 lmf_lover.1505.a:0 "“让人过来，我有事吩咐。”"
 lmf_lover.1505.a.success.tt:0 "成功找到[lover.GetTitledFirstNameNoTooltip]，其同意加入你的宫廷"
 lmf_lover.1505.b:0 "如果[lover.GetSheHe]想回来，[lover.GetSheHe]自然会回来。"
