 lmf_scheme.1040.child.specific.courtier:0 "在[requester_child2.GetLiege.GetTitledFirstNameNoTooltip]的宫廷上，我想带[requester_child2.GetHerHim]"
 lmf_scheme.1040.child.specific.pool:0 "在[requester_child2.GetCurrentLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]某处，我想带[requester_child2.GetHerHim]"
 lmf_scheme.1040.mid:0 "和我一起待在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。\n\n我知道这要求很难，但是，"
 lmf_scheme.1040.family:0 "我身为[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('requester'))]，"
 lmf_scheme.1040.dynasty:0 "作为[ROOT.Char.GetDynasty.GetBaseNameNoTooltip]宗族的忠实成员，"
 lmf_scheme.1040.normal:0 "作为您忠实的臣民，"
 lmf_scheme.1040.end:0 "我希望你能答应我的这个请求。"
 lmf_scheme.1040.a:0 "批准请求"
 lmf_scheme.1040.b:0 "不可能，这是我的[ROOT.Char.Custom('FortifiedBuilding')]，不是你家。"
 lmf_scheme.1040.title:0 "离开宫廷"
 lmf_scheme.1040.spouse.tt:0 "你的[requester_spouse.GetLiege.Custom2('LMF_RelationToMeShort', SCOPE.sC('requester_spouse'))][requester_spouse.GetShortUIName]，离开你的宫廷并加入[requester_spouse.GetHerHis][requester.GetWifeHusband]在[requester.GetLiege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[requester.GetLiege.GetTitledFirstNamePossessiveNoTooltip]宫廷"
 lmf_scheme.1040.child.tt:0 "你的[leaving_child.GetLiege.Custom2('LMF_RelationToMeShort', SCOPE.sC('leaving_child'))][leaving_child.GetShortUIName]，离开你的宫廷并加入[leaving_child.GetHerHis][requester.GetMotherFather]在[requester.GetLiege.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[requester.GetLiege.GetTitledFirstNamePossessiveNoTooltip]宫廷"
 lmf_scheme.1050.title:0 "前往远游"
 lmf_scheme.1050.tt:0 "你的[recipient.GetLiege.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))][recipient.GetShortUIName]正在前往[actor.GetCurrentLocation.GetNameNoTooltip]去拜访[recipient.GetHerHis]的[actor.GetWifeHusband][actor.GetShortUIName]"
