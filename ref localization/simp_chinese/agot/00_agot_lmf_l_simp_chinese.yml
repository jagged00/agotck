 married_to_someone_I_dislike:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]将[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]许配给[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)][Select_CString( TARGET_CHARACTER.IsLocalPlayer, '不喜欢', '不喜欢' )]的人。"
 married_to_someone_I_dislike_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]将[CHARACTER.GetShortUINameNoTooltipNoFormat]许配给了[[Select_CString( CHARACTER.IsLocalPlayer, '你', CHARACTER.GetSheHe)][Select_CString( CHARACTER.IsLocalPlayer, '不喜欢', '不喜欢' )]的人。"
 force_marriage_intro_ask_rec.tt:0 "如果[recipient.GetTitledFirstName]愿意接受这桩婚事，那么它将继续进行"
 became_enemies_at_introduction:0 "当[Select_CString( Or( CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer ), '你', '他们' )]被介绍结婚时，[CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]立刻互相讨厌起来。"
 became_enemies_at_introduction_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[CHARACTER.GetShortUINameNoTooltipNoFormat]一被介绍结婚就都厌恶[[Select_CString( Or( CHARACTER.IsLocalPlayer, TARGET_CHARACTER.IsLocalPlayer ), '你', '他们' )]"
 lmf_interaction.1328.t:0 "灾难一天"
 lmf_interaction.1328.desc.secact.actor.start:0 "在[secondary_recipient.GetFirstNamePossessiveNoTooltip]营地度过的一天简直是一场灾难。\n\n"
 lmf_interaction.1328.desc.secact.both.loved:0 "这很奇怪，主要是因为[secondary_recipient.GetTitledFirstNameNoTooltip]似乎一开始很喜欢[secondary_actor.Custom('lmf_intro_activity_short')]……但是现在……"
 lmf_interaction.1328.desc.secact.both.hated:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]非常鄙视[secondary_actor.Custom('lmf_intro_activity_short')]，从那时起事情就变得越来越糟。"
 lmf_interaction.1328.desc.secact.both.neutral:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]似乎和[secondary_actor.Custom('lmf_intro_activity_short')]相处得还好，可我们俩从一开始就水火不容。"
 lmf_interaction.1328.desc.secact.both.hunting:0 "我们骑马前往时，聊着没几句就变成争吵和冷战。我受够了，于是册马向前，把[secondary_recipient.GetHerHim]抛在身后，[secondary_recipient.GetSheHe]赶上来时，情况并没有好转多少。\n\n"
 lmf_interaction.1328.desc.secact.both.hike:0 "我们骑马前往森林时，聊着没几句就变成争吵和冷战。我试着在散步时指出[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]周围地标并讲解其历史，但却只收获了翻白眼和叹息。\n\n"
 lmf_interaction.1328.desc.secact.both.garrison:0 "哪怕我与[actor.Custom('KnightCulturePluralNoTooltipLowercase')]在[actor.Custom('FortifiedBuilding')]营地对打，但[secondary_recipient.GetSheHe]似乎不感兴趣，甚至休息间歇我靠近[secondary_recipient.GetHerHim]时，情况变得更糟。\n\n"
 lmf_interaction.1328.desc.secact.both.poetry:0 "我们在[secondary_recipient.GetHerHim][actor.Custom('FortifiedBuilding')]花园散步时，我略微表示赞赏，但[secondary_recipient.GetSheHe]似乎并不领情，在我的诗篇颂完后，事情变得更加尴尬。\n\n"
 lmf_interaction.1328.desc.secact.both.library:0 "我带着[secondary_recipient.GetHerHim]四处走走，兴奋地向[secondary_recipient.GetHerHim]展示我最珍贵的书籍，但[secondary_recipient.GetHerHim]毫不在意，我说话时[secondary_recipient.GetHerHis]都在翻白眼。\n\n"
 lmf_interaction.1328.desc.secact.both.church:0 "我们听着布道，但[secondary_recipient.GetSheHe]丝毫不感兴趣，我引经据典都只会引来白眼，最后[secondary_recipient.GetHerHis]双手交叉坐在那里。\n\n"
 lmf_interaction.1328.desc.secact.both.poor:0 "我们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]里，我们对话机会很少。不过我一走近[secondary_recipient.GetHerHim]，[secondary_recipient.GetSheHe]就躲开。\n\n"
 lmf_interaction.1328.desc.secact.both.tour:0 "我带着[secondary_recipient.GetHerHim]参观[actor.Custom('FortifiedBuilding')]周围的土地，但似乎并不愉快。每次我试图谈论私事时，[secondary_actor.GetSheHe|U]似乎都很恼火，我们的谈话很快就变成了争吵和沉默。\n\n"
 lmf_interaction.1328.desc.secact.both.garden:0 "我们的谈话很快变成了争吵和冷战，甚至[secondary_recipient.GetFirstNameNoTooltip]有几次不顾熟不熟悉花园，就加快脚步走在前面，逼得我不得不跑着跟上。\n\n"
 lmf_interaction.1328.desc.secact.both.mid:0 "这种时刻被人监视的感觉让我们不快，甚至加剧紧张。我说的每一句话似乎都不能让[secondary_recipient.GetHerHim]高兴，而[secondary_recipient.GetSheHe]说的每一句话都让我想离开。"
 lmf_interaction.1328.desc.secact.secact.loved:0 "起初，我以为事情进展顺利。[secondary_recipient.GetTitledFirstNameNoTooltip]似乎非常喜欢[secondary_actor.Custom('lmf_intro_activity_short')]。"
 lmf_interaction.1328.desc.secact.secact.hated:0 "从一开始，[secondary_recipient.GetTitledFirstNameNoTooltip]就鄙视[secondary_actor.Custom('lmf_intro_activity_short')]，但我觉得后来情况有所好转。"
 lmf_interaction.1328.desc.secact.secact.neutral:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]似乎与[secondary_actor.Custom('lmf_intro_activity_short')]很搭，一切都进展顺利。"
 lmf_interaction.1328.desc.secact.secact.hunting:0 "从[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]出发的骑行颇为惬意，而[secondary_actor.GetSheHe]也是一个很好的狩猎伙伴，我们交谈甚欢，"
 lmf_interaction.1328.desc.secact.secact.hike:0 "我很体贴地加快步伐，指出了许多地标建筑，并说出它们的历史。[secondary_recipient.GetSheHe|U]也很感兴趣，问了很多问题，"
 lmf_interaction.1328.desc.secact.secact.garrison:0 "在[actor.Custom('FortifiedBuilding')]营地中，我和[actor.Custom('KnightCulturePluralNoTooltipLowercase')]互相决斗，我承认这是在炫耀。但每场比赛后我们都会交谈，"
 lmf_interaction.1328.desc.secact.secact.poetry:0 "我们参观了[actor.Custom('FortifiedBuilding')]的花园，我向[secondary_recipient.GetHerHim]讲述故事，[secondary_recipient.GetSheHe]在一旁静静地听着，完毕后，我们长谈不止。"
 lmf_interaction.1328.desc.secact.secact.library:0 "我向[secondary_recipient.GetHerHim]展示了众多书籍中我最喜欢的一本，[secondary_recipient.GetSheHe]也没说什么，但我们还是长谈一会，"
 lmf_interaction.1328.desc.secact.secact.church:0 "我们在[actor.GetFaith.HouseOfWorship|l]聆听[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的布道。我们都沉默不语，最终我们"
 lmf_interaction.1328.desc.secact.secact.poor:0 "我们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]过了一个下午，人群让我们忙得不可开交。最终我们"
 lmf_interaction.1328.desc.secact.secact.tour:0 "我带着[secondary_recipient.GetHerHim]走遍[actor.Custom('FortifiedBuilding')]四周，详细地解释了一切的历史。[secondary_actor.GetSheHe|U]也对此十分感兴趣，"
 lmf_interaction.1328.desc.secact.secact.garden:0 "我们边走边聊，至少一开始感觉很愉快。[secondary_recipient.GetSheHe]也很乐意讨论，"
 lmf_interaction.1328.desc.secact.secact.mid:0 "我发现我完全被[secondary_recipient.GetHerHis]举止迷住了。\n\n但……我发现[secondary_recipient.GetSheHe]并不这么认为，[secondary_recipient.GetHerHim]在我说话时翻白眼，每当我靠近时就退缩，紧张让人难以忍受。"
 lmf_interaction.1328.desc.secact.secrec.loved:0 "起初，事情进展还算顺利。[secondary_recipient.GetTitledFirstNameNoTooltip]显然非常喜欢[secondary_actor.Custom('lmf_intro_activity_short')]。"
 lmf_interaction.1328.desc.secact.secrec.hated:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]显然对[secondary_actor.Custom('lmf_intro_activity_short')]不屑一顾，但还是忍了下来，并试图交谈。"
 lmf_interaction.1328.desc.secact.secrec.neutral:0 "一开始，事情还算顺利。[secondary_recipient.GetTitledFirstNameNoTooltip]并不在意[secondary_actor.Custom('lmf_intro_activity_short')]，一天下来什么都没发生。"
 lmf_interaction.1328.desc.secact.secrec.hunting:0 "从[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]出发的骑行颇为惬意，[secondary_actor.GetSheHe]似乎对此还挺满意。我们不时聊天，虽然有点尴尬，但没有什么大问题。"
 lmf_interaction.1328.desc.secact.secrec.hike:0 "我很体贴地加快步伐，指出了许多地标建筑，并说出它们的历史。[secondary_recipient.GetSheHe|U]似乎很感兴趣，但有些敷衍。不过，我很感激[secondary_recipient.GetSheHe]那努力尝试。"
 lmf_interaction.1328.desc.secact.secrec.garrison:0 "在[actor.Custom('FortifiedBuilding')]营地中，我和[actor.Custom('KnightCulturePluralNoTooltipLowercase')]互相决斗，我承认这是在炫耀。但每场比赛后我们都会交谈，并没有什么不愉快。"
 lmf_interaction.1328.desc.secact.secrec.poetry:0 "我们参观了[actor.Custom('FortifiedBuilding')]的花园，我向[secondary_recipient.GetHerHim]讲述故事，[secondary_recipient.GetSheHe]在一旁静静地听着，完毕后，我们开始长谈……至少是尝试过，但这很令人愉快。"
 lmf_interaction.1328.desc.secact.secrec.library:0 "我向[secondary_recipient.GetHerHim]展示了众多书籍中我最喜欢的一本，[secondary_recipient.GetSheHe]也没说什么，但我们还是长谈一会，尽管没有不愉快，但还是有些尴尬。"
 lmf_interaction.1328.desc.secact.secrec.church:0 "我们在[actor.GetFaith.HouseOfWorship|l]聆听[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的布道。虽然我们没有机会开口说话，但当我们交谈时，还是很愉快的。"
 lmf_interaction.1328.desc.secact.secrec.poor:0 "我们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]过了一个下午，人群让我们忙得不可开交。虽然我们没有机会开口说话，但当我们交谈时，还是很愉快的。"
 lmf_interaction.1328.desc.secact.secrec.tour:0 "我带着[secondary_recipient.GetHerHim]走遍[actor.Custom('FortifiedBuilding')]四周，详细地解释了一切的历史。[secondary_recipient.GetSheHe|U]也对此十分感兴趣，尽管有点尴尬。"
 lmf_interaction.1328.desc.secact.secrec.garden:0 "我们边走边聊，至少一开始感觉很愉快。[secondary_recipient.GetSheHe]有各种各样的兴趣，[secondary_recipient.GetSheHe]非常愿意讨论，即使我发现话题有些无聊。"
 lmf_interaction.1328.desc.secact.secrec.mid:0 "\n\n然而，慢慢地，我发现自己越来越恼火。[secondary_recipient.GetHerHis|U]的态度令人不快，让我翻白眼，紧张感越来越强烈。如果[secondary_recipient.GetSheHe]注意到了，[secondary_recipient.GetSheHe]也不会说出来，看着[secondary_recipient.GetSheHe]似乎完全被我迷住了……但我呢？我却没有同样的感觉。"
 lmf_interaction.1328.desc.rival.actor:0 "有一次，我被绊倒了，[secondary_recipient.GetFirstNameNoTooltip]竟笑了出来！我发誓，当时我真想拧断[secondary_recipient.GetHerHis]的脖子。"
 lmf_interaction.1328.desc.end.actor:0 "\n\n当太阳落山时，我们返回[actor.Custom('FortifiedBuilding')]，很明显这不合心意。"
 lmf_interaction.1328.desc.start:0 "[secondary_actor.GetFirstNameNoTooltip]和[secondary_recipient.GetFirstNameNoTooltip]在彼此陪伴下度过的一天，结果是一场灾难。\n\n附近守卫回复说，"
 lmf_interaction.1328.desc.both.start:0 "从一开始，两人好像都不在乎对方。"
 lmf_interaction.1328.desc.both.hunting:0 "他们在从[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]出发的骑行路上发生了争吵，[secondary_actor.GetFirstNameNoTooltip]一直骑在[secondary_recipient.GetFirstNameNoTooltip]前面，让[secondary_recipient.GetHerHim]苦苦追赶，但[secondary_recipient.GetSheHe]追上了，他们的谈话也据说很尴尬。"
 lmf_interaction.1328.desc.both.hike:0 "最初，他们徒步时的谈话还算愉快……直到一场争吵导致冷场。[secondary_actor.GetFirstNameNoTooltip]不紧不慢走着，而[secondary_recipient.GetFirstNamePossessiveNoTooltip]对地形的不熟悉感到恼火。两人都不想去那里，但那时已经太迟了。"
 lmf_interaction.1328.desc.both.garrison:0 "[secondary_actor.GetFirstNameNoTooltip]几乎不想理会[secondary_recipient.GetFirstNameNoTooltip]，哪怕[secondary_actor.GetSheHe]与[actor.Custom('KnightCulturePluralNoTooltipLowercase')]进行对打，等比赛结束后情况也没有好转。双方的交谈令人尴尬，一直冷场。"
 lmf_interaction.1328.desc.both.seduction:0 "他们在[actor.Custom('FortifiedBuilding')]中闲逛，很少说话。然后[secondary_actor.GetFirstNameNoTooltip]靠近[secondary_recipient.GetFirstNameNoTooltip]，据说行为举止都很不恰当，并对[secondary_recipient.GetSheHe]进行暗示，而[secondary_recipient.GetSheHe]显然对这些不感兴趣。 事情从此变得越来越糟。"
 lmf_interaction.1328.desc.both.poetry:0 "他们在[actor.Custom('FortifiedBuilding')]花园里漫步，[secondary_actor.GetFirstNameNoTooltip]用[secondary_actor.GetCulture.GetName]诗向[secondary_recipient.GetFirstNameNoTooltip]吟诵。但显然[secondary_actor.GetSheHe]不喜欢，随后事情就越来越糟。"
 lmf_interaction.1328.desc.both.library:0 "他们参观[actor.Custom('FortifiedBuilding')]的图书馆，[secondary_actor.GetFirstNameNoTooltip]向[secondary_recipient.GetFirstNameNoTooltip]展示[secondary_actor.GetHerHis]最喜欢的一本书籍。不过[secondary_actor.GetSheHe|U]似乎完全没有意识到[secondary_recipient.GetSheHe]不感兴趣，随后事情变得更糟。"
 lmf_interaction.1328.desc.both.church:0 "[secondary_actor.GetFirstNameNoTooltip]带[secondary_recipient.GetFirstNameNoTooltip]来到[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]，他们在那里听了布道，但没做其他事，对话也充满生硬和尴尬。"
 lmf_interaction.1328.desc.both.tavern:0 "那个白痴[secondary_actor.GetFirstNameNoTooltip]竟将[secondary_recipient.GetFirstNameNoTooltip]带到了[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]一家酒馆，然后留[secondary_recipient.GetHerHim]在一个角落，就跑去享乐了。据报说，当[secondary_actor.GetSheHe]后来回到[secondary_recipient.GetHerHim]身边时，[secondary_recipient.GetSheHe]怒不可遏。"
 lmf_interaction.1328.desc.both.poor:0 "他们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip][actor.GetFaith.HouseOfWorship|l]前花了一下午向穷人救济，但他们站得很远，很少说话，而他们的对话时充满尴尬，双方沉默。"
 lmf_interaction.1328.desc.both.tour:0 "他们参观了[actor.Custom('FortifiedBuilding')]周围土地，据说[secondary_actor.GetFirstNameNoTooltip]详细解释了所有事物的历史……但没有意识到[secondary_recipient.GetFirstNameNoTooltip]对此完全不感兴趣。[secondary_recipient.GetSheHe]几乎不说话，除了叹气就是打哈欠。"
 lmf_interaction.1328.desc.both.garden:0 "他们在[actor.Custom('FortifiedBuilding')]花园里漫步，但彼此相距甚远，显然他们更愿意待在其他地方。据说，他们之间对话充满生硬和尴尬，[secondary_actor.GetFirstNameNoTooltip]总是对[secondary_recipient.GetFirstNameNoTooltip]所说的一切不屑。"
 lmf_interaction.1328.desc.both.mid:0 "\n\n他们两人就好像油和水一样，完全不容。"
 lmf_interaction.1328.desc.secrec.start:0 "[secondary_actor.GetFirstNameNoTooltip]一开始似乎很热情。"
 lmf_interaction.1328.desc.secrec.hunting:0 "他们从[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]骑马出发，据说[secondary_actor.GetFirstNameNoTooltip]口若悬河，花言巧语让[secondary_recipient.GetFirstNameNoTooltip]不知如何反应是好。 事实上，[secondary_actor.GetSheHe]似乎被迷得神魂颠倒，几乎没有怎么狩猎。"
 lmf_interaction.1328.desc.secrec.hike:0 "他们沿着[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]外小径漫步，[secondary_actor.GetFirstNameNoTooltip]非常体贴放慢脚步，而[secondary_actor.GetSheHe]似乎从一开始就迷上[secondary_recipient.GetFirstNameNoTooltip]，处处想给[secondary_recipient.GetHerHim]留下深刻印象。"
 lmf_interaction.1328.desc.secrec.garrison:0 "[secondary_actor.GetFirstNameNoTooltip]把[secondary_recipient.GetFirstNameNoTooltip]带到[actor.Custom('FortifiedBuilding')]营地中，在那里[secondary_actor.GetSheHe]与[actor.Custom('KnightCulturePluralNoTooltipLowercase')]互相较量，显然[secondary_recipient.GetHerHim]想借此炫耀，[secondary_recipient.GetSheHe|U]似乎被迷住了。"
 lmf_interaction.1328.desc.secrec.seduction:0 "他们漫步在[actor.Custom('FortifiedBuilding')]，[secondary_actor.GetFirstNameNoTooltip]试图用谈话让[secondary_recipient.GetFirstNameNoTooltip]感动。而且[secondary_actor.GetSheHe|U]显然把[secondary_recipient.GetHerHis]的沉默当作鼓励，随后[secondary_recipient.GetSheHe]开始表现得……失礼，开始站得太近，发表暗示评论，感觉事情进展顺利。"
 lmf_interaction.1328.desc.secrec.poetry:0 "他们参观了[actor.Custom('FortifiedBuilding')]花园，随后[secondary_actor.GetFirstNameNoTooltip]开始吟诵[secondary_actor.GetCulture.GetNameNoTooltip]诗歌。[secondary_actor.GetSheHe|U]将[secondary_recipient.GetHerHis]的沉默视为鼓励，并继续吟诗，显然[secondary_actor.GetHerHis]被迷住了。"
 lmf_interaction.1328.desc.secrec.library:0 "他们参观[actor.Custom('FortifiedBuilding')]的图书馆，[secondary_actor.GetFirstNameNoTooltip]向[secondary_recipient.GetFirstNameNoTooltip]展示[secondary_actor.GetHerHis]最喜欢的一本书籍。据说，[secondary_actor.GetSheHe]滔滔不绝地谈论，并将[secondary_recipient.GetHerHis]的安静态度视为鼓励，显然[secondary_actor.GetHerHis]被迷住了。"
 lmf_interaction.1328.desc.secrec.church:0 "[secondary_actor.GetFirstNameNoTooltip]带[secondary_recipient.GetFirstNameNoTooltip]来到[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]，他们在那里聆听虔诚的布道。[secondary_actor.GetSheHe|U]似乎被[secondary_recipient.GetHerHis]的安静所鼓舞，并试图用引经据典布道来让[secondary_recipient.GetHerHim]着迷，显然他想得到[secondary_recipient.GetHerHis]的认可。"
 lmf_interaction.1328.desc.secrec.tavern:0 "那个白痴[secondary_actor.GetFirstNameNoTooltip]竟将[secondary_recipient.GetFirstNameNoTooltip]带到了[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]一家酒馆，然后留[secondary_recipient.GetHerHim]在一个角落，就跑去享乐了。据说，[secondary_actor.GetSheHe]喝了很多酒，而且他们俩都玩得很开心。"
 lmf_interaction.1328.desc.secrec.poor:0 "他们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip][actor.GetFaith.HouseOfWorship|l]前花了一下午向穷人救济，[secondary_actor.GetFirstNameNoTooltip]显然迷上[secondary_recipient.GetFirstNameNoTooltip]，想用慷慨来打动对方。"
 lmf_interaction.1328.desc.secrec.tour:0 "他们参观了[actor.Custom('FortifiedBuilding')]周围土地，[secondary_actor.GetFirstNameNoTooltip]兴致勃勃地向[secondary_recipient.GetHerHim]详细解释了一切的历史，不过[secondary_actor.GetHerHis]显得有些急切。"
 lmf_interaction.1328.desc.secrec.garden:0 "他们漫步在[actor.Custom('FortifiedBuilding')]花园里进行尴尬闲聊。[secondary_actor.GetFirstNameNoTooltip]急于讨好[secondary_recipient.GetFirstNameNoTooltip]，极力想让[secondary_recipient.GetHerHim]对其着迷……而且显然[secondary_actor.GetSheHe]成功了。"
 lmf_interaction.1328.desc.secrec.hated:0 "\n\n然而，[secondary_recipient.GetSheHe|U]显然不这么认为。从一开始，[secondary_recipient.GetSheHe]就不喜欢[secondary_actor.Custom('lmf_intro_activity_short')]，而且渐渐地[secondary_recipient.GetHerHim]越来越不满。"
 lmf_interaction.1328.desc.secrec.loved:0 "\n\n显然[secondary_actor.Custom('lmf_intro_activity_short')]很享受，但[secondary_recipient.GetSheHe]不这么认为。渐渐[secondary_recipient.GetSheHe]越来越不满，最终甚至厌恶。"
 lmf_interaction.1328.desc.secrec.neutral:0 "\n\n显然[secondary_recipient.GetSheHe|U]没有这种感觉。 我听说[secondary_recipient.GetSheHe]很无聊，又很反感。而且随着时间的推移，这种情况并没有得到改善。"
 lmf_interaction.1328.desc.secact.start:0 "[secondary_recipient.GetFirstNameNoTooltip]一开始似乎很热情。"
 lmf_interaction.1328.desc.secact.hunting:0 "他们从[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]骑马出发，据说[secondary_recipient.GetFirstNameNoTooltip]在那里尽[secondary_recipient.GetHerHis]所能来讨好[secondary_actor.GetFirstNameNoTooltip]，[secondary_actor.GetHerHim]的确成功了，[secondary_actor.GetHerHim]几乎没做什么事情，[secondary_recipient.GetSheHe]就被迷住了。"
 lmf_interaction.1328.desc.secact.hike:0 "他们沿着[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]外小径漫步，[secondary_actor.GetFirstNameNoTooltip]非常体贴放慢脚步，显然[secondary_recipient.GetFirstNameNoTooltip]迷上了[secondary_actor.GetHerHim]，处处想讨好[secondary_actor.GetHerHim]。"
 lmf_interaction.1328.desc.secact.garrison:0 "[secondary_actor.GetFirstNameNoTooltip]将[secondary_recipient.GetFirstNameNoTooltip]带到了[actor.Custom('FortifiedBuilding')]营地中，在那里，[secondary_actor.GetSheHe]与[actor.Custom('KnightCulturePluralNoTooltipLowercase')]互相决斗。显然，[secondary_recipient.GetFirstNameNoTooltip]对[secondary_actor.GetHerHim]印象深刻，每场比赛后都对[secondary_actor.GetHerHim]赞不绝口。"
 lmf_interaction.1328.desc.secact.seduction:0 "他们在[actor.Custom('FortifiedBuilding')]里漫步，据说[secondary_actor.GetFirstNameNoTooltip]在那里与[secondary_recipient.GetFirstNameNoTooltip]相处得很不愉快……至少一开始是这样。[secondary_actor.GetSheHe|U]站得太近，太过暗示，但[secondary_recipient.GetSheHe]的反应也很热情。到了中午，[secondary_recipient.GetSheHe]就被迷住了。"
 lmf_interaction.1328.desc.secact.poetry:0 "他们参观了[actor.Custom('FortifiedBuilding')]花园，随后[secondary_actor.GetFirstNameNoTooltip]则向[secondary_recipient.GetHerHim]朗诵了[secondary_actor.GetCulture.GetNameNoTooltip]诗。[secondary_recipient.GetSheHe|U]的反应很热情，到了中午，似乎完全被[secondary_actor.GetHerHim]迷住了。"
 lmf_interaction.1328.desc.secact.library:0 "他们参观[actor.Custom('FortifiedBuilding')]的图书馆，[secondary_actor.GetFirstNameNoTooltip]向[secondary_recipient.GetFirstNameNoTooltip]展示[secondary_actor.GetHerHis]最喜欢的一本书籍。[secondary_recipient.GetSheHe|U]很高兴，随着聊天的深入，[secondary_recipient.GetSheHe]很明显被[secondary_actor.GetHerHim]迷住了。"
 lmf_interaction.1328.desc.secact.church:0 "[secondary_actor.GetFirstNameNoTooltip]带着[secondary_recipient.GetFirstNameNoTooltip]来到[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]聆听布道。这显然让[secondary_recipient.GetHerHim]很高兴，而且从[secondary_recipient.GetHerHis]没完没了的唠叨中可以看出，[secondary_recipient.GetSheHe]入迷了。"
 lmf_interaction.1328.desc.secact.tavern:0 "那个白痴[secondary_actor.GetFirstNameNoTooltip]竟将[secondary_recipient.GetFirstNameNoTooltip]带到了[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的一家酒馆，在那里，[secondary_actor.GetSheHe]试图与[secondary_recipient.GetHerHim]享乐。但据说[secondary_recipient.GetSheHe|U]的反应非常热切，喝了很多酒，动不动就向[secondary_actor.GetHerHim]撒娇。"
 lmf_interaction.1328.desc.secact.poor:0 "他们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip][actor.GetFaith.HouseOfWorship|l]前花了一下午向穷人救济，[secondary_recipient.GetFirstNameNoTooltip]显然迷上[secondary_actor.GetFirstNameNoTooltip]，想用慷慨来打动对方。"
 lmf_interaction.1328.desc.secact.tour:0 "他们参观了[actor.Custom('FortifiedBuilding')]周围土地，[secondary_actor.GetFirstNameNoTooltip]兴致勃勃地向[secondary_recipient.GetHerHim]详细解释了一切历史。显然，[secondary_recipient.GetSheHe|U]很享受这种时刻，每一次都极力给[secondary_actor.GetHerHim]留下深刻印象。"
 lmf_interaction.1328.desc.secact.garden:0 "他们漫步在[actor.Custom('FortifiedBuilding')]花园里，进行单方面交谈。[secondary_recipient.GetFirstNameNoTooltip]急于讨好[secondary_actor.GetFirstNameNoTooltip]，极力想让[secondary_actor.GetHerHim]对其着迷……而且显然[secondary_recipient.GetSheHe]成功了。 "
 lmf_interaction.1328.desc.secact.hated:0 "\n\n然而，[secondary_actor.GetFirstNameNoTooltip]显然没有这种感觉。 我听说[secondary_actor.GetSheHe]有时对[secondary_recipient.GetHerHim]感到厌烦，有时又反感。而且随着时间的推移，这种情况并没有得到改善。 "
 lmf_interaction.1328.desc.secact.loved:0 "\n\n虽然[secondary_recipient.GetHerHis]明显喜欢[secondary_actor.Custom('lmf_intro_activity_short')]，但[secondary_actor.GetSheHe]却不是。[secondary_actor.GetSheHe|U]渐渐对[secondary_recipient.GetHerHim]越来越不满，最终甚至厌恶。 "
 lmf_interaction.1328.desc.secact.neutral:0 "\n\n然而，[secondary_actor.GetFirstNameNoTooltip]显然没有这种感觉。我听说，[secondary_actor.GetSheHe]有时厌烦[secondary_recipient.GetHerHim]甚至会反感。而且随着时间的推移，这种情况并没有得到改善。 "
 lmf_interaction.1328.desc.rival:0 "事实上，有时他们似乎完全厌恶对方。有一次，[secondary_recipient.GetTitledFirstNameNoTooltip]被一块石头绊倒了，[secondary_actor.GetFirstNameNoTooltip]甚至笑了！这只会激怒[secondary_recipient.GetHerHim]。"
 lmf_interaction.1328.desc.end:0 "\n\n当太阳落山时，两人显然都不是很满意。"
 lmf_interaction.1328.a:0 "无论如何，我们都要继续安排婚礼。"
 lmf_interaction.1328.b:0 "立即取消安排。"
 lmf_interaction.1328.c:0 "[secondary_recipient.GetSheHe|U]已经在出门的路上了……"
 lmf_secondary_actor_may_rebel_tt:0 "@warning_icon!#X [secondary_actor.GetTitledFirstNameNoTooltip]可能会反抗违背意愿的结婚！#!"
 lmf_secondary_recipient_may_rebel_tt:0 "@warning_icon!#X [secondary_recipient.GetTitledFirstNameNoTooltip]可能会反抗违背意愿的结婚！#!"
 lmf_recipient_may_rebel_tt:0 "@warning_icon!#X [recipient.GetTitledFirstNameNoTooltip]可能会反抗违背意愿的结婚！#!"
 lmf_interaction.1329.desc.start.secrec:0 "在[secondary_actor.GetTitledFirstNamePossessiveNoTooltip]宫廷度过的一天简直是一场灾难。\n\n"
 lmf_interaction.1329.desc.secrec.both.start:0 "我们就像是油和水一样。 "
 lmf_interaction.1329.desc.secrec.both.hunting:0 "我们在狩猎途中的谈话很快就变成了争吵和冷场。甚至[secondary_actor.GetFirstNameNoTooltip]有时骑着马走在前面，把我甩在了后面，而我追上时，情况也好不到哪里去。"
 lmf_interaction.1329.desc.secrec.both.hike:0 "我们徒步时的谈话很快就变成了争吵和冷场。[secondary_actor.GetFirstNameNoTooltip]不紧不慢走着，似乎对我不熟悉地形感到恼火。"
 lmf_interaction.1329.desc.secrec.both.garrison:0 "当[secondary_actor.GetFirstNameNoTooltip]与[actor.Custom('KnightCulturePluralNoTooltipLowercase')]切磋时，[secondary_actor.GetSheHe]完全无视了我，哪怕结束后也一样。"
 lmf_interaction.1329.desc.secrec.both.poetry:0 "我们在[actor.Custom('FortifiedBuilding')]花园散步时，[secondary_actor.GetFirstNameNoTooltip]向我吟诵[secondary_actor.GetCulture.GetName]诗，似乎并不在意我的看法。后来，[secondary_actor.GetSheHe]词穷了，事情就变得更加尴尬了。"
 lmf_interaction.1329.desc.secrec.both.library:0 "[secondary_actor.GetFirstNameNoTooltip]带我参观了[actor.Custom('FortifiedBuilding')]图书馆，可其心思显然全在那些书上，对我所言充耳不闻，我也不会自讨没趣进行说话了。"
 lmf_interaction.1329.desc.secrec.both.church:0 "[secondary_actor.GetFirstNameNoTooltip]带我去[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]，全程都在听虔诚的布道。我一有开口说话动作，就被要求嘘声。"
 lmf_interaction.1329.desc.secrec.both.poor:0 "我们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]前花了一下午向穷人救济。这很好，但我们几乎没有任何交谈。"
 lmf_interaction.1329.desc.secrec.both.tour:0 "我们游览了[actor.Custom('FortifiedBuilding')]及其周边土地，但只是走马观花。[secondary_actor.GetFirstNameNoTooltip]似乎对我对[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]不熟悉地形感到恼火，我们的对话很快演变成了争吵和冷战。"
 lmf_interaction.1329.desc.secrec.both.garden:0 "我们的谈话很快变成了争吵和冷战，甚至[secondary_actor.GetFirstNameNoTooltip]有几次不顾熟不熟悉[actor.Custom('FortifiedBuilding')]花园，就加快脚步走在前面，逼得我不得不跑着跟上。"
 lmf_interaction.1329.desc.secrec.both.mid:0 "这种时刻被人监视的感觉让我们不快，甚至加剧紧张。我说的每一句话似乎都不能让[secondary_recipient.GetHerHim]满意，而[secondary_recipient.SheHe]说的每一句话都让我想翻白眼。"
 lmf_interaction.1329.desc.secrec.secact.start:0 "起初，我以为事情进展得还算顺利。"
 lmf_interaction.1329.desc.secrec.secact.hunting:0 "在前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]不远处打猎的一路上都很愉快，而[secondary_actor.GetFirstNameNoTooltip]则是一个很好的狩猎伙伴，我们交谈甚欢，"
 lmf_interaction.1329.desc.secrec.secact.hike:0 "[secondary_actor.GetFirstNameNoTooltip]很体贴且热情地小步在前，指出了许多地标建筑，并说出它们的历史。"
 lmf_interaction.1329.desc.secrec.secact.garrison:0 "[secondary_actor.GetFirstNameNoTooltip]把我带到[actor.Custom('FortifiedBuilding')]营地中，在那里，[secondary_actor.GetSheHe]和[actor.Custom('KnightCulturePluralNoTooltipLowercase')]互相决斗，每场比赛之间，我们都会交谈几句。"
 lmf_interaction.1329.desc.secrec.secact.poetry:0 "我们参观了[actor.Custom('FortifiedBuilding')]花园，随后[secondary_actor.GetFirstNameNoTooltip]开始向我吟诵[secondary_actor.GetCulture.GetNameNoTooltip]诗，从这些诗词中可以看出[secondary_actor.GetSheHe|U]显然练习了一段时间。"
 lmf_interaction.1329.desc.secrec.secact.library:0 "我们参观[actor.Custom('FortifiedBuilding')]图书馆，[secondary_actor.GetFirstNameNoTooltip]向我展示[secondary_actor.GetHerHis]最喜欢的一本书籍。[secondary_actor.GetHerHis|U]谈到文学时，[secondary_actor.GetSheHe]的眼睛都会闪闪发光。"
 lmf_interaction.1329.desc.secrec.secact.church:0 "[secondary_actor.GetFirstNameNoTooltip]带我去[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]，我们在那里聆听了虔诚的布道，[secondary_actor.GetSheHe|U]似乎对任何与信仰有关的事情都很感兴趣。"
 lmf_interaction.1329.desc.secrec.secact.poor:0 "我们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]前花了一下午向穷人救济。[secondary_actor.GetFirstNameNoTooltip]行为如此真诚，充满了同情……"
 lmf_interaction.1329.desc.secrec.secact.tour:0 "我们参观了[actor.Custom('FortifiedBuilding')]周围土地，[secondary_actor.GetFirstNameNoTooltip]非常体贴地向我详细解释了一切的历史。"
 lmf_interaction.1329.desc.secrec.secact.garden:0 "我们在[actor.Custom('FortifiedBuilding')]花园里漫步交谈，[secondary_actor.GetFirstNameNoTooltip]有各种各样的兴趣爱好，我们交谈甚欢。"
 lmf_interaction.1329.desc.secrec.secact.mid:0 "我发现我完全被[secondary_recipient.GetHerHis]举止迷住了。\n\n但……我发现[secondary_recipient.GetSheHe]并不这么认为，[secondary_recipient.GetHerHim]在我说话时翻白眼，每当我靠近时就退缩，紧张让人难以忍受。"
 lmf_interaction.1329.desc.secrec.secrec.start:0 "起初，事情进展还算顺利。"
 lmf_interaction.1329.desc.secrec.secrec.hunting:0 "在前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]不远处打猎的一路上都很愉快，而[secondary_actor.GetFirstNameNoTooltip]则是一个很好的狩猎伙伴……至少起初是这样。"
 lmf_interaction.1329.desc.secrec.secrec.hike:0 "在徒步旅行过程中，[secondary_actor.GetFirstNameNoTooltip]很体贴且热情地小步在前，指出了许多地标建筑，并说出它们的历史。"
 lmf_interaction.1329.desc.secrec.secrec.garrison:0 "[secondary_actor.GetFirstNameNoTooltip]把我带到[actor.Custom('FortifiedBuilding')]营地中，在那里，[secondary_actor.GetSheHe]和[actor.Custom('KnightCulturePluralNoTooltipLowercase')]互相决斗，每场比赛间[secondary_actor.GetSheHe]都体贴地照顾着我。"
 lmf_interaction.1329.desc.secrec.secrec.poetry:0 "我们参观了[actor.Custom('FortifiedBuilding')]花园，随后[secondary_actor.GetFirstNameNoTooltip]开始向我吟诵[secondary_actor.GetCulture.GetNameNoTooltip]诗，尽管[secondary_actor.GetHerHis]诗歌风格选择值得商榷。"
 lmf_interaction.1329.desc.secrec.secrec.library:0 "我们参观[actor.Custom('FortifiedBuilding')]图书馆，[secondary_actor.GetFirstNameNoTooltip]向我展示[secondary_actor.GetHerHis]最喜欢的一本书籍。虽然我对[secondary_actor.GetHerHis]的一些选择有所疑惑，但[secondary_actor.GetHerHis]那学习热情让我感到放心。"
 lmf_interaction.1329.desc.secrec.secrec.church:0 "[secondary_actor.GetFirstNameNoTooltip]带我来到[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]，我们一起聆听了虔诚]的布道。[secondary_actor.GetFirstNameNoTooltip]看起来确实很虔诚，不过，如果[secondary_actor.GetHerHis]在交谈中能更真诚一些，那就更好了"
 lmf_interaction.1329.desc.secrec.secrec.poor:0 "我们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip][actor.GetFaith.HouseOfWorship|l]前花了一下午向穷人救济。[secondary_actor.GetFirstNameNoTooltip]显然是想用[secondary_actor.GetHerHis]的慷慨大方来打动我，这让我觉得很有趣。"
 lmf_interaction.1329.desc.secrec.secrec.tour:0 "我们参观了[actor.Custom('FortifiedBuilding')]周围土地，[secondary_actor.GetFirstNameNoTooltip]非常体贴地向我详细解释了一切的历史。虽然我插不上话，但还是很愉快。"
 lmf_interaction.1329.desc.secrec.secrec.garden:0 "我们在[actor.Custom('FortifiedBuilding')]花园里漫步交谈，至少一开始还不错。[secondary_actor.GetFirstNameNoTooltip]有很多兴趣，而[secondary_actor.GetSheHe]似乎对这些兴趣发表无数种看法。"
 lmf_interaction.1329.desc.secrec.secrec.mid:0 "\n\n然而，慢慢地，我发现自己越来越恼火。[secondary_recipient.GetHerHis|U]的态度令人不快，让我翻白眼，紧张感越来越强烈。如果[secondary_recipient.GetSheHe]注意到了，[secondary_recipient.GetSheHe]也不会说出来，看着[secondary_recipient.GetSheHe]似乎完全被我迷住了……但我呢？我却没有同样的感觉。"
 lmf_interaction.1329.desc.rival.secrec:0 "有一次，我被绊倒了，[secondary_actor.GetSheHe]嘲笑我！我发誓，当时我真想拧断[secondary_actor.GetHerHis]的脖子。"
 lmf_interaction.1329.desc.end.secrec:0 "\n\n当太阳落山时，我们返回[actor.Custom('FortifiedBuilding')]，很明显这不合心意。"
 lmf_interaction.1329.desc.end.secrec.nomarry:0 "显然，[actor.GetTitledFirstNameNoTooltip]同意了，并立即取消了婚姻安排。"
 lmf_interaction.1329.desc.end.secrec.marry:0 "然而，[actor.GetTitledFirstNameNoTooltip]却不同意，无论如何都要继续安排婚事。那么我愿意吗？"
 lmf_interaction.1329.desc.start:0 "我已经收到了[secondary_recipient.GetFirstNameNoTooltip]的回复，[secondary_recipient.GetSheHe]写道，[secondary_recipient.GetHerHis]对[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的拜访是一场灾难。\n\n"
 lmf_interaction.1329.desc.both.loved:0 "一开始显然还不错。[secondary_recipient.GetSheHe|U]喜欢[secondary_actor.Custom('lmf_intro_activity_short')]，只是不喜欢[secondary_actor.GetFirstNameNoTooltip][secondary_actor.GetHerselfHimself]。"
 lmf_interaction.1329.desc.both.hated:0 "[secondary_recipient.GetSheHe|U]非常鄙视[secondary_actor.Custom('lmf_intro_activity_short')]，从那时起事情就变得越来越糟。"
 lmf_interaction.1329.desc.both.neutral:0 "[secondary_recipient.GetSheHe|U]可以容忍[secondary_actor.Custom('lmf_intro_activity_short')]，只要不是[secondary_actor.GetFirstNameNoTooltip]即可。"
 lmf_interaction.1329.desc.both.hunting:0 "他们在前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]不远处打猎的路上发生了争吵，[secondary_actor.GetSheHe]一直骑在[secondary_recipient.GetHerHim]前面，让[secondary_recipient.GetSheHe]苦苦追赶，即便追上了，他们的谈话也据说很尴尬。"
 lmf_interaction.1329.desc.both.hike:0 "最初，他们徒步时的谈话还算愉快……直到一场争吵导致冷场。[secondary_actor.GetSheHe|U]不紧不慢走着，而[secondary_recipient.GetHerHis]对地形的不熟悉感到恼火。两人都不想去那里，但那时已经太迟了。"
 lmf_interaction.1329.desc.both.garrison:0 "[secondary_actor.GetSheHe|U]几乎不想理会[secondary_recipient.GetHerHim]，哪怕[secondary_actor.GetSheHe]与[actor.Custom('KnightCulturePluralNoTooltipLowercase')]进行对打，等比赛结束后情况也没有好转。双方的交谈令人尴尬，一直冷场。"
 lmf_interaction.1329.desc.both.seduction:0 "他们在[actor.Custom('FortifiedBuilding')]中闲逛，很少说话。然后[secondary_actor.GetSheHe|U]靠近[secondary_recipient.GetHerHim]，据说行为举止都很不恰当，并对进行暗示，而[secondary_recipient.GetSheHe]显然对这些不感兴趣。"
 lmf_interaction.1329.desc.both.poetry:0 "他们在[actor.Custom('FortifiedBuilding')]花园里漫步，[secondary_actor.GetSheHe|U]用[secondary_actor.GetCulture.GetName]诗向[secondary_recipient.GetHerHim]吟诵，但[secondary_recipient.GetSheHe]要么对这些诗句感到厌烦，要么对[secondary_actor.GetHerHim]感到厌烦，无论哪种，[secondary_actor.GetSheHe]都很厌倦[secondary_actor.GetHerHim]。"
 lmf_interaction.1329.desc.both.library:0 "[secondary_actor.GetSheHe|U]向[secondary_recipient.GetHerHim]展示最喜欢的一本书籍，似乎完全无视[secondary_recipient.GetSheHe]不感兴趣的事实。"
 lmf_interaction.1329.desc.both.church:0 "他们聆听了虔诚的布道，但没有做其他什么，他们之间的谈话也是充满尴尬。"
 lmf_interaction.1329.desc.both.tavern:0 "那个白痴竟将[secondary_recipient.GetHerHim]带到了[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]一家酒馆，然后留[secondary_recipient.GetHerHim]在一个角落，就跑去享乐了。据报说，当[secondary_actor.GetSheHe]后来回到[secondary_recipient.GetHerHim]身边时，[secondary_recipient.GetSheHe]怒不可遏。"
 lmf_interaction.1329.desc.both.poor:0 "他们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip][actor.GetFaith.HouseOfWorship|l]前花了一下午向穷人救济，但他们站得很远，很少说话，而他们的对话时充满尴尬，双方沉默。"
 lmf_interaction.1329.desc.both.tour:0 "[secondary_actor.GetSheHe|U]向[secondary_recipient.GetHerHim]展示了[actor.Custom('FortifiedBuilding')]及周边领土，详细解释了一切的历史……[secondary_recipient.GetSheHe]显然完全不感兴趣。"
 lmf_interaction.1329.desc.both.garden:0 "他们在漫游时站得很远，看起来显然更愿意待在其他地方。据报道，他们之间的对话既僵硬又尴尬，无论[secondary_actor.GetHerHis]说什么，[secondary_recipient.GetSheHe]都会翻白眼。"
 lmf_interaction.1329.desc.both.mid:0 "\n\n他们两人就好像油和水一样，哪怕过了一天，也完全不容。"
 lmf_interaction.1329.desc.secact.start:0 "[secondary_actor.GetFirstNameNoTooltip]一开始似乎很热情，[secondary_recipient.GetSheHe]如是写道。"
 lmf_interaction.1329.desc.secact.hunting:0 "他们从[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]骑马出发，据说[secondary_actor.GetFirstNameNoTooltip]口若悬河，花言巧语让[secondary_recipient.GetFirstNameNoTooltip]不知如何反应是好。 事实上，[secondary_actor.GetSheHe]似乎被迷得神魂颠倒，几乎没有怎么狩猎。"
 lmf_interaction.1329.desc.secact.hike:0 "他们沿着[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]外小径漫步，[secondary_actor.GetFirstNameNoTooltip]非常体贴放慢脚步，而[secondary_actor.GetSheHe]似乎从一开始就迷上[secondary_recipient.GetFirstNameNoTooltip]，处处想给[secondary_recipient.GetHerHim]留下深刻印象。"
 lmf_interaction.1329.desc.secact.garrison:0 "[secondary_actor.GetFirstNameNoTooltip]把[secondary_recipient.GetFirstNameNoTooltip]带到[actor.Custom('FortifiedBuilding')]营地中，在那里[secondary_actor.GetSheHe]与[actor.Custom('KnightCulturePluralNoTooltipLowercase')]互相较量，显然[secondary_recipient.GetHerHim]想借此炫耀，[secondary_recipient.GetSheHe|U]似乎被迷住了。"
 lmf_interaction.1329.desc.secact.seduction:0 "他们漫步在[actor.Custom('FortifiedBuilding')]，[secondary_actor.GetFirstNameNoTooltip]试图用谈话让[secondary_recipient.GetFirstNameNoTooltip]感动。而且[secondary_actor.GetSheHe|U]显然把[secondary_recipient.GetHerHis]的沉默当作鼓励，随后[secondary_recipient.GetSheHe]开始表现得……失礼，开始站得太近，发表暗示评论，感觉事情进展顺利。"
 lmf_interaction.1329.desc.secact.poetry:0 "他们参观了[actor.Custom('FortifiedBuilding')]花园，随后[secondary_actor.GetFirstNameNoTooltip]开始吟诵[secondary_actor.GetCulture.GetNameNoTooltip]诗歌。[secondary_actor.GetSheHe|U]将[secondary_recipient.GetHerHis]的沉默视为鼓励，并继续吟诗，显然[secondary_actor.GetHerHis]被迷住了。"
 lmf_interaction.1329.desc.secact.library:0 "他们参观[actor.Custom('FortifiedBuilding')]的图书馆，[secondary_actor.GetFirstNameNoTooltip]向[secondary_recipient.GetFirstNameNoTooltip]展示[secondary_actor.GetHerHis]最喜欢的一本书籍。据说，[secondary_actor.GetSheHe]滔滔不绝地谈论，并将[secondary_recipient.GetHerHis]的安静态度视为鼓励，显然[secondary_actor.GetHerHis]被迷住了。"
 lmf_interaction.1329.desc.secact.church:0 "[secondary_actor.GetFirstNameNoTooltip]带[secondary_recipient.GetFirstNameNoTooltip]来到[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]，他们在那里聆听虔诚的布道。[secondary_actor.GetSheHe|U]似乎被[secondary_recipient.GetHerHis]的安静所鼓舞，并试图用引经据典布道来让[secondary_recipient.GetHerHim]着迷，显然他想得到[secondary_recipient.GetHerHis]的认可。"
 lmf_interaction.1329.desc.secact.tavern:0 "那个白痴[secondary_actor.GetFirstNameNoTooltip]竟将[secondary_recipient.GetFirstNameNoTooltip]带到了[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]一家酒馆，然后留[secondary_recipient.GetHerHim]在一个角落，就跑去享乐了。据说，[secondary_actor.GetSheHe]喝了很多酒，而且他们俩都玩得很开心。"
 lmf_interaction.1329.desc.secact.poor:0 "他们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip][actor.GetFaith.HouseOfWorship|l]前花了一下午向穷人救济，[secondary_actor.GetFirstNameNoTooltip]显然迷上[secondary_recipient.GetFirstNameNoTooltip]，想用慷慨来打动对方。"
 lmf_interaction.1329.desc.secact.tour:0 "他们参观了[actor.Custom('FortifiedBuilding')]周围土地，[secondary_actor.GetFirstNameNoTooltip]兴致勃勃地向[secondary_recipient.GetFirstNameNoTooltip]详细解释了一切的历史，不过[secondary_actor.GetHerHis]显得有些急切。"
 lmf_interaction.1329.desc.secact.garden:0 "他们漫步在[actor.Custom('FortifiedBuilding')]花园里，进行单方面交谈。[secondary_recipient.GetFirstNameNoTooltip]急于讨好[secondary_actor.GetFirstNameNoTooltip]，极力想让[secondary_actor.GetHerHim]对其着迷……而且显然[secondary_recipient.GetSheHe]成功了。 "
 lmf_interaction.1329.desc.secact.hated:0 "\n\n然而，[secondary_recipient.GetSheHe|U]显然不这么认为。从一开始，[secondary_recipient.GetSheHe]就不喜欢[secondary_actor.Custom('lmf_intro_activity_short')]，而且渐渐地[secondary_recipient.GetHerHim]越来越不满。"
 lmf_interaction.1329.desc.secact.loved:0 "\n\n显然[secondary_actor.Custom('lmf_intro_activity_short')]很享受，但[secondary_recipient.GetSheHe]不这么认为。渐渐[secondary_recipient.GetSheHe]越来越不满，最终甚至厌恶。"
 lmf_interaction.1329.desc.secact.neutral:0 "\n\n显然[secondary_recipient.GetSheHe|U]没有这种感觉。 我听说[secondary_recipient.GetSheHe]很无聊，又很反感。而且随着时间的推移，这种情况并没有得到改善。"
 lmf_interaction.1329.desc.secrec.start:0 "[secondary_recipient.GetFirstNameNoTooltip]一开始似乎很热情，[secondary_recipient.GetSheHe]如是写道。"
 lmf_interaction.1329.desc.secrec.hunting:0 "他们从[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]骑马出发，据说[secondary_recipient.GetFirstNameNoTooltip]在那里尽[secondary_recipient.GetHerHis]所能来讨好[secondary_actor.GetFirstNameNoTooltip]，[secondary_actor.GetHerHim]的确成功了，[secondary_actor.GetHerHim]几乎没做什么事情，[secondary_recipient.GetSheHe]就被迷住了。"
 lmf_interaction.1329.desc.secrec.hike:0 "他们沿着[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]外小径漫步，[secondary_actor.GetFirstNameNoTooltip]非常体贴放慢脚步，[secondary_recipient.GetFirstNameNoTooltip]表示一开始就迷上[secondary_actor.GetHerHim]，处处想给[secondary_actor.GetHerHim]留下深刻印象。"
 lmf_interaction.1329.desc.secrec.garrison:0 "[secondary_actor.GetFirstNameNoTooltip]将[secondary_recipient.GetFirstNameNoTooltip]带到了[actor.Custom('FortifiedBuilding')]营地中，在那里，[secondary_actor.GetSheHe]与[actor.Custom('KnightCulturePluralNoTooltipLowercase')]互相决斗。显然，[secondary_recipient.GetFirstNameNoTooltip]对[secondary_actor.GetHerHim]印象深刻，每场比赛后都对[secondary_actor.GetHerHim]赞不绝口。"
 lmf_interaction.1329.desc.secrec.seduction:0 "他们在[actor.Custom('FortifiedBuilding')]里漫步，据说[secondary_actor.GetFirstNameNoTooltip]在那里与[secondary_recipient.GetFirstNameNoTooltip]相处得很不愉快……至少一开始是这样。[secondary_actor.GetSheHe|U]站得太近，太过暗示，但[secondary_recipient.GetSheHe]的反应也很热情。到了中午，[secondary_recipient.GetSheHe]就被迷住了。"
 lmf_interaction.1329.desc.secrec.poetry:0 "他们参观了[actor.Custom('FortifiedBuilding')]花园，随后[secondary_actor.GetFirstNameNoTooltip]则向[secondary_actor.GetHerHim]朗诵了[secondary_actor.GetCulture.GetNameNoTooltip]诗。[secondary_recipient.GetSheHe|U]的反应很好，据说，到了中午，[secondary_recipient.GetSheHe]似乎完全被[secondary_actor.GetHerHim]迷住了。"
 lmf_interaction.1329.desc.secrec.library:0 "他们参观[actor.Custom('FortifiedBuilding')]的图书馆，[secondary_actor.GetFirstNameNoTooltip]向[secondary_recipient.GetHerHim]展示[secondary_actor.GetHerHis]最喜欢的一本书籍。[secondary_recipient.GetSheHe|U]反应也很好，随着聊天的深入，[secondary_recipient.GetSheHe]很明显[secondary_actor.GetHerHim]迷住了。"
 lmf_interaction.1329.desc.secrec.church:0 "[secondary_actor.GetFirstNameNoTooltip]带[secondary_recipient.GetFirstNameNoTooltip]前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的[actor.GetFaith.HouseOfWorship|l]，在那里他们聆听了布道。事后也长谈了一番，[secondary_recipient.GetSheHe]写道，她很快就迷上了布道。"
 lmf_interaction.1329.desc.secrec.tavern:0 "那个白痴[secondary_actor.GetFirstNameNoTooltip]竟将[secondary_recipient.GetFirstNameNoTooltip]带到了[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的一家酒馆，在那里，[secondary_actor.GetSheHe]试图与[secondary_recipient.GetHerHim]享乐。但据说[secondary_recipient.GetSheHe|U]的反应非常热切，喝了很多酒，动不动就向[secondary_actor.GetHerHim]表达爱意。"
 lmf_interaction.1329.desc.secrec.poor:0 "他们在[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip][actor.GetFaith.HouseOfWorship|l]前花了一下午向穷人救济，[secondary_recipient.GetFirstNameNoTooltip]显然迷上[secondary_actor.GetFirstNameNoTooltip]，想用慷慨来打动对方。"
 lmf_interaction.1329.desc.secrec.tour:0 "他们参观了[actor.Custom('FortifiedBuilding')]周围土地，[secondary_actor.GetFirstNameNoTooltip]兴致勃勃地向[secondary_recipient.GetFirstNameNoTooltip]详细解释了一切历史。显然，[secondary_recipient.GetSheHe|U]很享受这种时刻，每一次都极力给[secondary_actor.GetHerHim]留下深刻印象。"
 lmf_interaction.1329.desc.secrec.garden:0 "他们漫步在[actor.Custom('FortifiedBuilding')]花园里，进行单方面交谈。[secondary_recipient.GetFirstNameNoTooltip]急于讨好[secondary_actor.GetFirstNameNoTooltip]，极力想让[secondary_actor.GetHerHim]对其着迷……而且显然[secondary_recipient.GetSheHe]成功了。 "
 lmf_interaction.1329.desc.secrec.hated:0 "\n\n然而，[secondary_actor.GetFirstNameNoTooltip]显然没有这种感觉。[secondary_actor.GetSheHe|U]时而对[secondary_recipient.GetFirstNameNoTooltip]感到厌烦，时而感到反感，[secondary_recipient.GetHerHis|U]的失望之情溢于言表。"
 lmf_interaction.1329.desc.secrec.loved:0 "\n\n虽然[secondary_recipient.GetHerHis]明显喜欢[secondary_actor.Custom('lmf_intro_activity_short')]，但[secondary_actor.GetFirstNameNoTooltip][secondary_actor.GetSheHe]显然没有这种感觉。[secondary_actor.GetSheHe|U]渐渐对[secondary_recipient.GetHerHim]越来越不满，最终甚至厌恶，[secondary_recipient.GetHerHis|U]那失望态度显而易见。"
 lmf_interaction.1329.desc.secrec.neutral:0 "\n\n然而，[secondary_actor.GetFirstNameNoTooltip]显然没有这种感觉。[secondary_recipient.GetSheHe|U]写道，[secondary_actor.GetSheHe]时而对[secondary_recipient.GetHerHim]感到厌烦，时而感到反感，[secondary_recipient.GetHerHis|U]的失望之情溢于言表。"
 lmf_interaction.1329.desc.rival:0 "事实上，[secondary_recipient.GetFirstNameNoTooltip]没有讨人喜欢，纯粹是彻底的厌恶。"
 lmf_interaction.1329.desc.end.nomarry:0 "\n\n[actor.GetTitledFirstNameNoTooltip]认为这不合适，并终止了婚姻安排。[secondary_recipient.GetFirstNameNoTooltip]将立即返回。"
 lmf_interaction.1329.desc.end.marry:0 "\n\n然而奇怪的是，[actor.GetTitledFirstNameNoTooltip]不同意这安排，但还是继续进行婚姻安排。[secondary_recipient.GetFirstNameNoTooltip]说这不是一个好主意……但也许这是最好的？"
 lmf_interaction.1329.a:0 "我会和[secondary_actor.GetTitledFirstNameNoTooltip]结婚！"
 lmf_interaction.1329.b:0 "我同意[secondary_recipient.GetSheHe|U]和[secondary_actor.GetTitledFirstNameNoTooltip]结婚。"
 lmf_interaction.1329.c:0 "不，取消婚姻安排。"
 lmf_interaction.1329.d:0 "到此为止吧。"
 lmf_interaction.1331.t:0 "逃亡者"
 lmf_interaction.1331.desc.reject:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))]没听到[rebel.GetHerHis]将要和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('intended_spouse'))]结婚的事情……完全没听到。\n\n"
 lmf_interaction.1331.desc.start:0 "我撤销了按照[rebel.GetHerHis]的意愿自由选择[rebel.Custom('WifeHusbandOpp')]的权利，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))]完全是一点都不领情。\n\n"
 lmf_interaction.1331.desc.mid:0 "起初，大家都以为[rebel.GetSheHe]只是怒气冲冲地冲出了房间。后来了解到，[rebel.GetSheHe]完全从[actor.Custom('FortifiedBuilding')]消失了，连张字条都没留下就溜了。\n\n"
 lmf_interaction.1331.desc.ranoff:0 "直到后来我们才知道[rebel.GetSheHe]已经远走高飞，最后一次被看到是经过附近的一个村庄。派出的几个搜查队没有任何收获，没人知道[rebel.GetSheHe]还会不会再回来。哪怕是这样，也不愿接受一个[rebel.GetSheHe]不想要的[intended_spouse.GetWifeHusband]。\n\n"
 lmf_interaction.1331.desc.end.reject:0 "不用说，对[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('intended_spouse'))]的婚礼取消了。"
 lmf_interaction.1331.desc.end:0 "谁能想到[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('rebel'))]会如此任性？"
 lmf_interaction.1331.a:0 "到此为止吧。"
