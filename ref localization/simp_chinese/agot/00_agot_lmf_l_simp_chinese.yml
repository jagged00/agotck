 lmf_pos_reaction_intellect_3:0 "[second.GetCurrentLocation.GetTitle.GetHolder.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]中最出色的[second.Custom('WomenMenGirlsBoys')]之一！"
