 lmf_heir.heir.progress.minor.tt:0 "[your_heir.GetTitledFirstNamePossessiveNoTooltip]的继承人培训进展顺利"
 lmf_heir.heir.progress.moderate.tt:0 "[your_heir.GetTitledFirstNamePossessiveNoTooltip]继承人培训进展顺利"
 lmf_heir.heir.progress.large.tt:0 "[your_heir.GetTitledFirstNamePossessiveNoTooltip]的继承人培训进展顺利"
 lmf_heir.heir.progress.negative.tt:0 "[your_heir.GetTitledFirstNamePossessiveNoTooltip]的继承人培训进展略微糟糕"
 lmf_heir.1660.t:0 "该选择继承人了"
 lmf_heir.1660.desc.first.annoy:0 "为什么要同意[your_heir.GetSheHe]过来？为什么呢！\n\n[your_heir.GetTitledFirstNameNoTooltip]在过去几周问题层出不穷，一直问个不停。\n\n“你为什么这样做，[ROOT.Char.GetLadyLord]？”\n“你现在要做什么，[ROOT.Char.GetLadyLord]？”\n“你为什么这么说，[ROOT.Char.GetLadyLord]？”\n\n每次我一转身，就看到[your_heir.GetSheHe]在那儿，想帮点忙，但往往却添了乱。\n\n想到这个[your_heir.Custom('polite_gender_ref')]的远游之行还远未结束，我忍不住叹气。"
 lmf_heir.1660.desc.first.helpful:0 "到目前为止，[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]的培训进展顺利。\n\n[your_heir.Custom('polite_gender_ref')] 很快就了解了我的行事方式，并尽力避免惹恼我，有时我几乎忘记了[your_heir.GetSheHe]在这里。\n\n当然，还有足够的时间来改变，一切未定……"
 lmf_heir.1660.desc.second.begin:0 "我花了数周时间训[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]，正如[heir_liege.GetSheHe]所要求的那样，"
 lmf_heir.1660.desc.second.annoy.wasannoy:0 "[your_heir.Custom('polite_gender_ref')]变得和以前一样令人讨厌。\n\n"
 lmf_heir.1660.desc.second.annoy.washelpful:0 "不得不说[your_heir.Custom('polite_gender_ref')]的不断出现已经开始让我厌烦了。\n\n"
 lmf_heir.1660.desc.second.helpful.wasannoy:0 "值得庆幸的是，[your_heir.Custom('polite_gender_ref')]的情况已经有所改善，已经变得几乎可以忍受了。\n\n"
 lmf_heir.1660.desc.second.helpful.washelpful:0 "并且[your_heir.Custom('polite_gender_ref')]会逗人开心。\n\n"
 lmf_heir.1660.desc.second.annoy:0 "我知道[your_heir.GetSheHe]想自力更生，但大多数时候[your_heir.GetSheHe]只会碍事，我的仆人可不多！\n\n幸运的是这次远游不会持续太久。"
 lmf_heir.1660.desc.second.helpful:0 "[your_heir.GetSheHe|U]已经习惯了我的日常生活，经常像一个值得信赖的仆人一样预料到我需要的任何东西。有几次，[your_heir.GetSheHe]甚至在我要求之前就介入并处理了烦人的任务。\n\n遗憾的是这次远游不会持续太久。"
 lmf_heir.1660.desc.third.begin:0 "[your_heir.GetTitledFirstNameNoTooltip]几乎一直都在跟踪我，在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，"
 lmf_heir.1660.desc.third.annoy.wasannoy:0 "而[your_heir.Custom('polite_gender_ref')]仍然让我头疼。[your_heir.GetSheHe]就没有[your_heir.GetHerHis]要做的事情？\n\n"
 lmf_heir.1660.desc.third.annoy.washelpful:0 "每当我想到[your_heir.Custom('polite_gender_ref')]最终会离开我们时，我就会很高兴。\n\n"
 lmf_heir.1660.desc.third.helpful.wasannoy:0 "值得庆幸的是，[your_heir.Custom('polite_gender_ref')]的情况已经有所改善，已经变得几乎可以忍受了。\n\n"
 lmf_heir.1660.desc.third.helpful.washelpful:0 "并且我怀疑[your_heir.Custom('polite_gender_ref')]走的时候，我都不会注意到。\n\n"
 lmf_heir.1660.desc.third.annoy:0 "我几乎可以肯定[your_heir.Custom('GetLassLad')]完全知道[your_heir.GetSheHe]让我多么恼火，并且只要我没有计划，[your_heir.GetSheHe]就会躲着我。\n\n[heir_liege.GetTitledFirstNameNoTooltip]最好感谢我为[your_heir.GetHerHim]所付出的所有时间。"
 lmf_heir.1660.desc.third.helpful:0 "我认为训练总体上进展顺利。[your_heir.Custom('GetLassLad')]和我已经养成了习惯，我想我几乎可以信任[your_heir.GetHerHim]可以在没有我监督的情况下完成许多任务。\n\n一想到远游马上结束了，我就感到很难过。"
 lmf_heir.1660.a:0 "[your_heir.Custom('GetLassLad')]真好啊！"
 lmf_heir.1660.b:0 "[heir_liege.GetTitledFirstNameNoTooltip]最好心存感激。"
 spent_time_with_heir:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]与[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]呆在一起，共同参与训练继承人的方案。"
 spent_time_with_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]与[CHARACTER.GetShortUINameNoTooltipNoFormat]呆在一起，共同参与训练继承人活动。"
 annoyed_by_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在培养[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]作为继承人时，对[CharYouHerHim(TARGET_CHARACTER)]头疼不已。"
 annoyed_by_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在培养[CHARACTER.GetShortUINameNoTooltipNoFormat]作为继承人时，对[CharYouHerHim(CHARACTER)]头疼不已。"
 lmf_heir.1661.t:0 "亲密之伴"
 lmf_heir.1661.desc.start:0 "过去几周，我一直与[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在一起，训练[your_heir.GetHerHim]成为[your_heir.Custom2('LMF_RelationToMeShort', heir_liege )]要求那样的合适统治者，最近我注意到[your_heir.Custom('GetLassLad')]的行为有些……不一样了。\n\n"
 lmf_heir.1661.desc.child:0 "几乎我对[your_heir.GetTitledFirstNameNoTooltip]说的任何话他[your_heir.GetHerHis]会微笑或大笑回应，每次见面时我都会注意到[your_heir.GetHerHis]的脸颊红红的。虽然这[your_heir.Custom('GetLassLad')]还只是个孩子，只要不瞎的人都知道[your_heir.GetSheHe]似乎有所好感。\n\n"
 lmf_heir.1661.desc.adult:0 "[your_heir.GetTitledFirstNameNoTooltip]经常会利用任何借口搭上我的手或肩膀，我们的目光相遇时，其总是微笑，再继续下去，无疑会违背[your_heir.GetHerHis][your_heir.Custom2('LMF_RelationToMePossessive', heir_liege )]的信任，但很明显，[your_heir.Custom('GetLassLad')]也赞成这么做。\n\n"
 lmf_heir.1661.desc.end:0 "我是否应该在事情变得无法挽回之前，就此结束这一切？"
 lmf_heir.1661.a:0 "如果这是[your_heir.Custom('GetLassLad')]想要的，为什么要结束？"
 lmf_heir.1661.b:0 "这是有趣的消遣，在[your_heir.GetHerHis]离开后，我们就结束关系。"
 lmf_heir.1661.c:0 "也许等[your_heir.GetSheHe]长大一点……？"
 lmf_heir.1661.d:0 "在事态进一步发展之前，结束它吧。"
 bonded_while_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在培养[CharYouHerHim(TARGET_CHARACTER)]作为继承人的同时与[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]开始了恋情。"
 bonded_while_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在培养[CharYouHerHim(CHARACTER)]作为继承人的同时与[CHARACTER.GetShortUINameNoTooltipNoFormat]开始了恋情。"
 crush_while_heir_training:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在被[CharYouHerHim(CHARACTER)]培养为继承人时，对[CHARACTER.GetShortUINameNoTooltipNoFormat]产生了好感。"
 crush_while_heir_training_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在被[CharYouHerHim(TARGET_CHARACTER)]培养为继承人时，对[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]产生了好感。"
 lmf_heir.1662.t:0 "继承人培养"
 lmf_heir.1662.desc.away:0 "自从我离开，"
 lmf_heir.1662.desc.busy:0 "自从我忙碌后，"
 lmf_heir.1662.desc.notrain:0 "我听说"
 lmf_heir.1662.desc.start:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在过去几周一直和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))]待一起，"
 lmf_heir.1662.desc.chancellor:0 "[your_councillor.GetHerHis]向[your_heir.Custom('polite_gender_ref')]介绍[ROOT.Char.Custom('FortifiedBuilding')]周围的情况，以及[your_councillor.GetCouncilTitle|l]职位所涉及的细微差别。\n\n"
 lmf_heir.1662.desc.steward:0 "[your_heir.Custom('polite_gender_ref')]知晓[your_councillor.GetCouncilTitle|l]管理[ROOT.Char.Custom('FortifiedBuilding')]和周边需要什么。\n\n"
 lmf_heir.1662.desc.marshal:0 "[your_councillor.GetHerHis]把[your_heir.Custom('polite_gender_ref')]带到军营，向[your_heir.GetHerHim]展示了[your_councillor.GetCouncilTitle|l]是如何管理军队。\n\n"
 lmf_heir.1662.desc.spymaster:0 "[your_councillor.GetHerHis]向[your_heir.Custom('polite_gender_ref')]展示了[ROOT.Char.Custom('FortifiedBuilding')]中较少使用的功能，解释了[your_councillor.GetCouncilTitle|l]的工作重要性\n\n"
 lmf_heir.1662.desc.well:0 "看来培训进行得很顺利，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))]和[your_heir.GetTitledFirstNameNoTooltip]相处得非常融洽。[heir_liege.GetTitledFirstNameNoTooltip]应该不会对[heir_liege.Custom2('LMF_RelationToMePossessive', your_heir )]有任何抱怨。"
 lmf_heir.1662.desc.poorly:0 "事情进展不顺，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))]和[your_heir.GetTitledFirstNameNoTooltip]相处得并不融洽，[your_heir.Custom('GetLassLad')]大部分时间无所事事，但还是得感谢[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_councillor'))]的努力。"
 lmf_heir.1662.a:0 "听到这消息真是高兴。"
 lmf_heir.1662.b:0 "额……那可真不幸。"
 lmf_heir.1663.t:0 "继承人培养"
 lmf_heir.1663.desc.away:0 "自从我离开，"
 lmf_heir.1663.desc.busy:0 "自从我忙碌后，"
 lmf_heir.1663.desc.notrain:0 "我听说"
 lmf_heir.1663.desc.start:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在过去几周一直和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]待一起，"
 lmf_heir.1663.desc.physician:0 "[your_heir.GetHerHim]在其间一直熟悉[GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()]的操作，并接受有关草药使用和疾病预防方法的教育。\n\n"
 lmf_heir.1663.desc.chronicler:0 "期间[your_heir.GetHerHim]在图书馆浏览历史记载，还知道[GetCourtPositionType('chronicler_court_position').GetNameNoTooltip()]如何利用上面的文笔描述影响当今的故事。\n\n"
 lmf_heir.1663.desc.horse:0 "期间[your_heir.GetHerHim]在[ROOT.Char.Custom('FortifiedBuilding')]的马厩里学习，还知道[GetCourtPositionType('master_of_horse_court_position').GetNameNoTooltip()]的作用不仅是让马匹做好战斗准备，还可以为运输物资做好准备。\n\n"
 lmf_heir.1663.desc.seneschal:0 "[your_heir.Custom('polite_gender_ref')]知晓[GetCourtPositionType('seneschal_court_position').GetNameNoTooltip()]需要做什么才能管理[ROOT.Char.Custom('FortifiedBuilding')]周边以及领地。\n\n"
 lmf_heir.1663.desc.taster:0 "期间[your_heir.GetHerHim]知晓[GetCourtPositionType('food_taster_court_position').GetNameNoTooltip()]在宴会上的作用，以及那些可能会威胁到年轻统治者生命的各种宫廷阴谋。\n\n"
 lmf_heir.1663.desc.well:0 "看来这些时间花得很值，[your_heir.GetTitledFirstNameNoTooltip]和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]相处得很愉快，[your_heir.Custom('GetLassLad')]有目的且带有尊重的学习了这些知识。[heir_liege.GetTitledFirstNameNoTooltip]应该不会对[heir_liege.Custom2('LMF_RelationToMePossessive', your_heir )]有任何抱怨。 "
 lmf_heir.1663.desc.poorly:0 "事情进展不顺，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]和[your_heir.GetTitledFirstNameNoTooltip]相处得并不融洽，而[your_heir.Custom('GetLassLad')]无视了[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]所说的内容，仅仅是因为这些内容来自我的宫廷成员。\n\n如果消息无误，那真令人恼火。"
 lmf_heir.1663.a:0 "听到这消息真是高兴。"
 lmf_heir.1663.b:0 "额……那可真不幸。"
 lmf_heir.1664.t:0 "继承人培养"
 lmf_heir.1664.desc.away:0 "自从我离开，"
 lmf_heir.1664.desc.busy:0 "自从我忙碌后，"
 lmf_heir.1664.desc.notrain:0 "我听说"
 lmf_heir.1664.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在过去几周一直与[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]在一起，他们还去[ROOT.Char.Custom('FortifiedBuilding')]的驻军地，并向[your_heir.GetHerHim]展示了[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]的勇武。\n\n[your_heir.GetTitledFirstNameNoTooltip]被操练了一番……不过，表现还不错。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]告诉我，[heir_liege.GetHerHis]很少抱怨，不仅相处融洽，而且与其他[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]也相处融洽。\n\n看来[heir_liege.GetTitledFirstNameNoTooltip]应该不会有什么不满。"
 lmf_heir.1664.a:0 "干得漂亮，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]！"
 lmf_heir.1665.t:0 "不幸的对决"
 lmf_heir.1665.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在过去几周一直与[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]在一起，他们还去[ROOT.Char.Custom('FortifiedBuilding')]的驻军地，并向[your_heir.GetHerHim]展示了[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]的勇武。\n\n不过他们两人相处得并不融洽，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]认为[your_heir.GetHerHis]的态度不端，吵到最后，[your_heir.GetTitledFirstNameNoTooltip]向[your_courtier.GetHerHim]发起了决斗挑战……\n\n"
 lmf_heir.1665.desc.child:0 "显然，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]一开始拒绝与一个孩子决斗……但这侮辱了[your_heir.GetTitledFirstNameNoTooltip]，以至于[your_heir.Custom('GetLassLad')]直接拔刀进行攻击……决斗不可避免。"
 lmf_heir.1665.desc.adult:0 "显然，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]一开始拒绝了，因为[your_heir.GetTitledFirstNameNoTooltip]是我的客人，但[your_heir.Custom('GetLassLad')]强行拔刀并发动攻击，这时决斗不可避免。"
 lmf_heir.1665.desc.end:0 "无论结果如何，这都是一场失败的事故。"
 lmf_heir.1665.a:0 "希望这是最后一次了。"
 dueled_during_heir_training:0 "[CharYouSheHe(CHARACTER)]在培养[CharYouHerHim(TARGET_CHARACTER)]成为继承人时，[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]因恼怒而向[CHARACTER.GetShortUINameNoTooltipNoFormat]发起决斗挑战。"
 dueled_during_heir_training_corresponding:0 "[CharYouSheHe(TARGET_CHARACTER)]在培养[CharYouHerHim(CHARACTER)]成为继承人时，[CHARACTER.GetShortUINameNoTooltipNoFormat|U]因恼怒而向[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]发起决斗挑战。"
 lmf_heir.1665.a.courtier.severe.tt:0 "[your_courtier.GetTitledFirstNameNoTooltip]赢得决斗并打伤[your_heir.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.a.courtier.win.tt:0 "[your_courtier.GetTitledFirstNameNoTooltip]赢得与[your_heir.GetTitledFirstNameNoTooltip]的决斗"
 lmf_heir.1665.a.heir.severe.tt:0 "[your_heir.GetTitledFirstNameNoTooltip]赢得决斗并打伤[your_courtier.GetTitledFirstNameNoTooltip]"
 lmf_heir.1665.a.heir.win.tt:0 "[your_heir.GetTitledFirstNameNoTooltip]赢得与[your_courtier.GetTitledFirstNameNoTooltip]的决斗"
 lmf_heir.1665.heir.duel.title:0 "[your_heir.GetTitledFirstNameNoTooltip]在决斗中受伤"
 lmf_heir.1665.heir.severe.duel.desc:0 "[your_heir.GetShortUINameNoFormat|U]与[heir_visit_target.GetShortUINamePossessiveNoFormat|U][ROOT.Char.Custom('KnightCultureNoTooltipLowercase')][your_courtier.GetShortUINameNoFormat]决斗并落败后受了重伤。"
 lmf_heir.1665.heir.duel.desc:0 "[your_heir.GetShortUINameNoFormat|U]与[heir_visit_target.GetShortUINamePossessiveNoFormat|U][ROOT.Char.Custom('KnightCultureNoTooltipLowercase')][your_courtier.GetShortUINameNoFormat]决斗并落败后受了伤。"
 lmf_heir.1666.t:0 "狡猾的继承人"
 lmf_heir.1666.desc.away:0 "自从我离开[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，"
 lmf_heir.1666.desc.busy:0 "自从我忙碌后，"
 lmf_heir.1666.desc.train:0 "我原本以为[your_heir.GetSheHe]会和我一起度过这段时间，但事实是，"
 lmf_heir.1666.desc.notrain:0 "我得到消息，"
 lmf_heir.1666.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在过去的几周里都很少露面，在[ROOT.Char.Custom('FortifiedBuilding')]闭门不出。\n\n很显然，[your_heir.GetTitledFirstNameNoTooltip]已经接近了一些仆人，并进行了恰当且“试探”的对话。[your_heir.GetSheHe]也一直在[ROOT.Char.Custom('FortifiedBuilding')]周围打探，甚至在意想不到的地方发现[your_heir.GetSheHe|U]，如果我不了解情况的话，我会说[your_heir.Custom('polite_gender_ref')]试图挖掘我本人或我的宫廷的秘密。\n\n[your_heir.GetSheHe]找到什么了吗？我不知道，也不知道[your_heir.GetSheHe]是否打算向[your_heir.Custom2('LMF_RelationToMeShort', heir_liege )]透露发现的内容。\n\n[your_heir.GetSheHe|U]相当聪明……而且比我想象的还要谨慎。"
 lmf_heir.1666.a:0 "我该担心吗？"
 lmf_heir.1667.t:0 "轻率的继承人"
 lmf_heir.1667.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在过去的几周里都很少露面，在[ROOT.Char.Custom('FortifiedBuilding')]闭门不出。\n\n很显然，[your_heir.GetTitledFirstNameNoTooltip]已经接近了一些仆人，并进行了恰当且“试探”的对话。[your_heir.GetSheHe]也一直在[ROOT.Char.Custom('FortifiedBuilding')]周围打探，我知道这一点是因为[your_heir.Custom('polite_gender_ref')]被抓住好几次了。甚至已经到了不得不要求[your_heir.GetSheHe]远离[ROOT.Char.Custom('FortifiedBuilding')]某些地方的地步，仆人也被禁止与[your_heir.GetHerHim]说话。\n\n如果[your_heir.GetSheHe]试图挖掘秘密，那么[your_heir.GetSheHe]的做法比我预期要笨拙得多。"
 lmf_heir.1667.a:0 "这就是我接待[your_heir.GetHerHim]所得到的“感谢”？"
 heir_digging_up_secrets:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]对[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]笨拙地试图挖掘秘密行为感到不满。"
 heir_digging_up_secrets_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]对[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]]笨拙地试图挖掘秘密行为感到不满。"
 lmf_heir.1668.t:0 "书呆子"
 lmf_heir.1668.desc.start:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]过去几周的大部分时间都躲在[ROOT.Char.Custom('FortifiedBuilding')]的图书馆里。\n\n也许“躲”并不恰当，[your_heir.GetHerHim]没有和任何人有过多的交流，每当有仆人过去时，[your_heir.GetTitledFirstNamePossessiveNoTooltip]总埋在书堆里。\n\n"
 lmf_heir.1668.desc.well:0 "也许[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的书籍比[heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]的要好得多？因为我听说[your_heir.GetTitledFirstNameNoTooltip]对[your_heir.GetSheHe]找到的一切都非常满意。显然，[your_heir.GetSheHe]学到了很多东西……这就是大家要求的，不是吗？"
 lmf_heir.1668.desc.poorly:0 "如果[your_heir.GetSheHe]只想读书，为什么不回去[heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]？[your_heir.GetSheHe]在这里显然找不到什么值得一读的东西，而且[your_heir.GetSheHe|U]也确实放弃了，沮丧地离开了图书馆。也许这样最好，因为[your_heir.GetHerHim]还有很多事情要做。"
 lmf_heir.1668.a:0 "我很高兴我们的书籍合[your_heir.GetHerHis]胃口。"
 lmf_heir.1668.b:0 "也许[your_heir.GetSheHe]会通过实际行动来学习？"
 lmf_heir.1669.t:0 "受欢迎的继承人"
 lmf_heir.1669.desc.impressive:0 "鉴于[your_heir.GetSheHe]最初给人留下的深刻印象，发生什么我都不惊讶，但"
 lmf_heir.1669.desc.unpleasant:0 "[your_heir.GetSheHe]一开始看起来那么不讨人喜欢，但"
 lmf_heir.1669.desc.trouble:0 "这有点出乎意料，因为我以为[your_heir.GetSheHe]更麻烦，但"
 lmf_heir.1669.desc.dutiful:0 "[your_heir.GetSheHe]看起来更像是那种安静矜持那种，但"
 lmf_heir.1669.desc.homesick:0 "看来[your_heir.GetSheHe]终于克服了[your_heir.GetHerHis]的思乡之情，因为"
 lmf_heir.1669.desc.avoid:0 "[your_heir.GetSheHe]终于对这里的人热情起来了，因为"
 lmf_heir.1669.desc:0 "我听说[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]已经成为[ROOT.Char.Custom('FortifiedBuilding')]周边的热门人物。\n\n每天，[your_heir.GetTitledFirstNameNoTooltip]都会高兴地向仆人问好，然后尽可能参与宫廷活动，甚至做一些我通常认为贵族不会做的事情，在厨房工作？与卫兵聊天？为我的管家跑腿？[your_heir.GetSheHe|U]热忱地做着这些事，同时不让[your_heir.GetHerselfHimself]妨碍我。\n\n这有些奇妙，说真的。"
 lmf_heir.1669.a:0 "多么愉快的发展啊"
 lmf_heir.1670.t:0 "累赘的继承人"
 lmf_heir.1670.desc.impressive:0 "鉴于[your_heir.GetSheHe]最初给人留下的深刻印象，发生什么我都不惊讶，但"
 lmf_heir.1670.desc.unpleasant:0 "[your_heir.GetSheHe]一开始看起来那么不讨人喜欢，但"
 lmf_heir.1670.desc.trouble:0 "这有点出乎意料，因为我以为[your_heir.GetSheHe]带来麻烦，但"
 lmf_heir.1670.desc.dutiful:0 "[your_heir.GetSheHe]最初看起来很尽职尽责，但"
 lmf_heir.1670.desc.homesick:0 "看来[your_heir.GetSheHe]还没有克服[your_heir.GetHerHis]的思乡之情，因为"
 lmf_heir.1670.desc.avoid:0 "我觉得我不应该感到惊讶，[your_heir.GetSheHe]一开始是多么的不善交际，但"
 lmf_heir.1670.desc:0 "有人告诉我，[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]已经骚扰[ROOT.Char.Custom('FortifiedBuilding')]四周。\n\n显然，[your_heir.GetTitledFirstNameNoTooltip]试图想和我的宫廷成员打好关系，但事与愿违，[your_heir.GetSheHe]很快变得闷闷不乐，容易四处闲逛。一些仆人试图让[your_heir.GetHerHim]工作，但没有一件事足够“有价值”，我也听到了许多抱怨，说[your_heir.GetSheHe]如何卷入事情中，还总是碍手碍脚。\n\n大多数仆人见[your_heir.GetHerHim]避而不及。"
 lmf_heir.1670.a:0 "这不是一个好兆头。"
 lmf_heir.1671.t:0 "勤奋的继承人"
 lmf_heir.1671.desc.start:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]几周前自愿到[ROOT.Char.Custom('FortifiedBuilding')]外的一个建筑项目帮忙。显然这是为了积累经验，了解这类工程是如何运作的，以及它们给领地带来的好处。\n\n"
 lmf_heir.1671.desc.well:0 "事情进展得比任何人预期的都要好。[your_heir.GetTitledFirstNameNoTooltip]没有试图接管该项目。相反，[your_heir.GetSheHe]从监工那里学了不少，还与工匠合作。之后[ROOT.Char.Custom('FortifiedBuilding')]里每个人都说[your_heir.GetSheHe]帮了不少，并且[your_heir.GetSheHe]似乎真的有兴趣了解他们在做什么。\n\n说实话，这很惊讶，但不错。"
 lmf_heir.1671.desc.poorly:0 "[your_heir.GetTitledFirstNameNoTooltip]究竟能帮上多少忙？监工事后向我吐露，[your_heir.Custom('polite_gender_ref')]是个烦人的东西，彻头彻尾的障碍，[your_heir.GetSheHe|U]不断抱怨劳动，认为[your_heir.GetSheHe|U]应该凌驾于工匠之上，并多次试图接管工程，而且[your_heir.GetHerselfHimself]对工程一无所知。\n\n说实话，这并不意外，但还是令人失望。"
 lmf_heir.1671.a:0 "谁知道[your_heir.GetSheHe]有什么本事？"
 lmf_heir.1671.b:0 "也许[your_heir.GetSheHe]应该呆在[ROOT.Char.Custom('FortifiedBuilding')]。"
 lmf_heir.1672.t:0 "不幸的意外"
 lmf_heir.1672.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]过去几周大部分时间都和我的[ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]在一起。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]也努力地培养[your_heir.GetTitledFirstNamePossessiveNoTooltip]。\n\n但两人最初相处得很好，不过似乎发生争执……然后不断升温，直到最后，[your_heir.GetTitledFirstNameNoTooltip]在宫廷上对[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]大发雷霆。事情一出，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]感到非常尴尬，看来双方都不会原谅对方。\n\n现在[your_heir.Custom('polite_gender_ref')]不仅没有学到什么，还在我的宫廷中树立了一位新敌人。"
 lmf_heir.1672.a:0 "干得好，[your_heir.Custom('GetLassLad')]。"
 fight_during_heir_training:0 "在造访期间，[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在宫廷中侮辱了[CHARACTER.GetShortUINameNoTooltipNoFormat]。"
 fight_during_heir_training_corresponding:0 "在造访期间，[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在宫廷中侮辱了[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]。"
 lmf_heir.1673.t:0 "一位新朋友"
 lmf_heir.1673.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]过去几周大部分时间都和我的[ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]在一起。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]也努力地培养[your_heir.GetTitledFirstNamePossessiveNoTooltip]。\n\n他们俩相处得很好，没多久，[your_heir.GetTitledFirstNameNoTooltip]和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]就形影不离了。他们一起在[ROOT.Char.Custom('FortifiedBuilding')]里到处走，有说有笑，而我的[ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]则向[your_heir.GetHerHim]介绍了[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]内部运作，可能给了[your_heir.GetHerHim]更好的教育。\n\n他们两个在宫廷中仍然亲密无间，显然他们的友谊不是短暂的。"
 lmf_heir.1673.a:0 "真是奇妙！"
 befriended_during_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]在造访期间通过继承人培养结下不解之缘。"
 befriended_during_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[CHARACTER.GetShortUINameNoTooltipNoFormat]在造访期间通过继承人培养结下不解之缘。"
 lmf_heir.1674.t:0 "一位新朋友？"
 lmf_heir.1674.desc.start:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]过去几周大部分时间都和我的[ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]在一起。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]也努力地培养[your_heir.GetTitledFirstNamePossessiveNoTooltip]。\n\n"
 lmf_heir.1674.desc.adult:0 "他们俩相处得很好，没多久，[your_heir.GetTitledFirstNameNoTooltip]和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]就形影不离了。他们一起在[ROOT.Char.Custom('FortifiedBuilding')]里到处走，有说有笑，而我的[ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]则向[your_heir.GetHerHim]介绍了[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]内部运作，可能给了[your_heir.GetHerHim]更好的教育。\n\n宫廷里有传言说两人的关系已经不只是单纯的朋友了？但这肯定只是谣言。"
 lmf_heir.1674.desc.bothchild:0 "他们俩相处得很好，没多久，[your_heir.GetTitledFirstNameNoTooltip]和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]就形影不离了。他们一起在[ROOT.Char.Custom('FortifiedBuilding')]里到处走，有说有笑，而我的[ROOT.Char.Custom2('LMF_RelationToMeShort', your_courtier )]则向[your_heir.GetHerHim]介绍了[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]内部运作，可能给了[your_heir.GetHerHim]更好的教育。\n\n宫廷里有传言说两人的关系已经不只是单纯的朋友了？但他们俩还只是孩子，充其量，他们只是暗恋而已，其他的都只是闲言碎语。"
 lmf_heir.1674.desc.child:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_courtier'))]来告诉我，虽然培训顺利，并且[your_courtier.GetSheHe]努力向[your_heir.GetTitledFirstNameNoTooltip]展示[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的内部运作，但[your_courtier.GetSheHe]似乎产生了某种迷恋。[your_courtier.GetSheHe|U]很喜欢[your_heir.GetTitledFirstNameNoTooltip]还对[your_heir.GetHerHis]的关注感到受宠若惊，但[your_heir.GetSheHe]还是个孩子。\n\n不过这种人之常情，我相信[your_heir.Custom('polite_gender_ref')]会克服它的。"
 lmf_heir.1674.a:0 "没啥可担心的"
 lmf_heir.1674.b:0 "啊，年轻的爱情！"
 fell_in_love_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在接受继承人培养时爱上了[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]。"
 fell_in_love_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在接受继承人培养时爱上了[CHARACTER.GetShortUINameNoTooltipNoFormat]。"
 crushed_heir_training:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在参观城堡期间对[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]产生了好感。"
 crushed_heir_training_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在参观城堡期间对[CHARACTER.GetShortUINameNoTooltipNoFormat]产生了好感。"
 lmf_heir.1675.t:0 "狩猎"
 lmf_heir.1675.desc.invite:0 "不久前，我收到[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]的邀约，和[your_heir.GetHerHim]一起去附近的森林打猎。我不知道[your_heir.Custom('polite_gender_ref')]接受多少训练，但只有我们两个人和几个仆从，似乎这次打猎至少能让我们更好地了解彼此。\n\n"
 lmf_heir.1675.desc.invite.poorly:0 "但结果并不好，过去没多久就下起了雨，我们很难猎物，而[your_heir.GetTitledFirstNameNoTooltip]不停地抱怨……我们好不容易找到时，[your_heir.GetSheHe]没射中，然后竟然胆敢责怪#EMP 我#!分散了[your_heir.GetHerHim]的注意力！\n\n在忍受了将近一周后，我很高兴回到[ROOT.Char.Custom('FortifiedBuilding')]，显然[your_heir.GetTitledFirstNameNoTooltip]应该留在属[your_heir.GetSheHe]的森林里。"
 lmf_heir.1675.desc.invite.well:0 "我和[your_heir.GetTitledFirstNameNoTooltip]在篝火旁度过了几个愉快的夜晚，我还向[your_heir.Custom('polite_gender_ref')]提出了一些统治方面的建议，期间我们找到了一些野味，我很高兴地认识到[your_heir.GetSheHe]自始至终都是个令人愉快的伙伴。\n\n当我们回到[ROOT.Char.Custom('FortifiedBuilding')]时，我几乎为打猎的结束感到遗憾。"
 lmf_heir.1675.desc.start:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]只带了几个家臣，就前往[ROOT.Char.Custom('FortifiedBuilding')]附近的森林打猎。我不知道[your_heir.GetHerHis]会怎么看待这样的“游玩”，因为这几乎不像来这里进行训练，但也许[your_heir.GetTitledFirstNameNoTooltip]需要休息一下？\n\n"
 lmf_heir.1675.desc.poorly:0 "唉，我觉得[your_heir.GetSheHe]没学到什么。在[your_heir.GetSheHe]离开的几个星期里，大部分时间都在下雨，[your_heir.GetSheHe]回来时两手空空，十分凄惨，不过至少没有被野兽咬伤，但[heir_liege.GetTitledFirstNameNoTooltip]会怎么说呢？"
 lmf_heir.1675.desc.well:0 "值得庆幸的是天气不错，[your_heir.GetHerHis]的旅行似乎很顺利，几周后[your_heir.GetSheHe]回来时，手里拿着毛皮，脸上挂着灿烂的笑容。"
 lmf_heir.1675.desc.notrain:0 "我知道[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )][your_heir.GetHerHis]大部分时间都在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]附近的森林里打猎，[your_heir.GetSheHe|U]也可以在[heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]做同样的事情，但我不允许[your_heir.GetTitledFirstNameNoTooltip]进入[ROOT.Char.Custom('FortifiedBuilding')]，[your_heir.GetSheHe]可能别无选择，只能在其他地方寻找娱乐活动。\n\n"
 lmf_heir.1675.desc.notrain.poorly:0 "不幸的是，我听说这次旅行并不顺利，[your_heir.GetTitledFirstNameNoTooltip]掉进了泥泞的峡谷里，没有人能捞[your_heir.GetHerHim]上来，结果[your_heir.GetSheHe]被困在那里好几天了，受了重伤！\n\n我希望[your_heir.GetSheHe]不会因为这次糟糕的旅行而怨恨我。"
 lmf_heir.1675.desc.notrain.well:0 "据说旅途还算顺利，天气也不错，[your_heir.GetTitledFirstNameNoTooltip]带着一堆毛皮回来时，脸上挂着灿烂的笑容。\n\n也许[your_heir.GetSheHe]可以用这次出色的狩猎之旅足以弥补训练的不足？只能寄希望于此了。"
 lmf_heir.1675.a:0 "多么美好的时光啊！"
 lmf_heir.1675.b:0 "我很高兴[your_heir.GetSheHe]可以如此享受"
 lmf_heir.1675.c:0 "对于我们俩来说都是一次痛苦的经历。"
 lmf_heir.1675.d:0 "太可惜了。"
 excellent_hunting_trip:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]在森林狩猎旅行中建立了深厚的友谊。"
 excellent_hunting_trip_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[CHARACTER.GetShortUINameNoTooltipNoFormat]在森林狩猎旅行中建立了深厚的友谊。"
 disastrous_hunting_trip:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在一次灾难般的狩猎旅行中惹恼了[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]"
 disastrous_hunting_trip_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在一次灾难般的狩猎旅行中惹恼了[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]"
 lmf_heir.1676.t:0 "旅游中的继承人"
 lmf_heir.1676.train:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在过去几周里"
 lmf_heir.1676.notrain:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在过去几个月里"
 lmf_heir.1676.desc.begin:0 "游览了[ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]，访问当地村庄和[ROOT.Char.GetCapitalLocation.GetCounty.GetFaith.HouseOfWorshipPlural|l]，同时了解当地人民。老实说，这种努力值得称赞。\n\n"
 lmf_heir.1676.desc.poorly:0 "但我认为事情进展并不像[your_heir.GetTitledFirstNameNoTooltip]所希望的那样顺利，因为天气很差，所以[your_heir.Custom('polite_gender_ref')]一半时间都躲在某个破旧的[ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetNameNoTooltip]农舍里，无所事事。后来[your_heir.GetSheHe]似乎被土匪抢劫了……不过[your_heir.GetSheHe]拒绝对此事发表评论。\n\n希望[your_heir.GetSheHe]能从中获得一些教训。"
 lmf_heir.1676.desc.well:0 "据我所知，这次旅行相当顺利。天气比预期的要好，所以[your_heir.GetSheHe]完成之前就游览了大半个伯爵领，从名胜古迹到建筑工程，再到古老的墓地……什么都参观了一遍。老实说，我不认为#EMP 我#!见过这么多的[ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]风景。\n\n当[your_heir.GetTitledFirstNameNoTooltip]回到[ROOT.Char.Custom('FortifiedBuilding')]时，[your_heir.GetHerHim]似乎很高兴，希望这躺旅游能给[your_heir.GetSheHe]能从中获得一些知识。"
 lmf_heir.1676.a:0 "真是奇妙！"
 lmf_heir.1676.b:0 "我们不可能拥有一切，不是吗？"
 lmf_heir.1677.t:0 "热衷狂欢的继承人"
 lmf_heir.1677.desc.castle:0 "虽然需要在[ROOT.Char.Custom('FortifiedBuilding')]放松一下，"
 lmf_heir.1677.desc.away:0 "仍然选择不来[ROOT.Char.Custom('FortifiedBuilding')]，"
 lmf_heir.1677.desc.none:0 "而不是花时间在[ROOT.Char.Custom('FortifiedBuilding')]，"
 lmf_heir.1677.desc.invite:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]去附近镇上一家热门酒馆团聚。起初我犹豫不决，但后来我考虑到像[your_heir.GetTitledFirstNameNoTooltip]这样人万一在民众中惹出什么麻烦的话，我就觉得我最好跟着去……当然，还要带上几个随从。\n\n"
 lmf_heir.1677.desc.invite.poorly:0 "事实证明，我的直觉是正确的。[your_heir.GetHerHis]在摆脱监管后喝得酩酊大醉，乱发脾气，几乎无法控制，还在酒吧大打出手，多次辱骂我，并且"
 lmf_heir.1677.desc.invite.well:0 "事实证明我的担心有些多余，[your_heir.GetTitledFirstNameNoTooltip]度过了一个美好的夜晚，期间保持了理智，我敢说我也一样。我们俩一边喝酒一边聊了很多故事，带领酒馆里的客人们唱了一轮歌，而且"
 lmf_heir.1677.desc.invite.woman:0 "我甚至看到一个相当漂亮的姑娘带着[your_heir.GetHerHim]去了某个私人的地方。\n\n"
 lmf_heir.1677.desc.invite.man:0 "我甚至看到一个相当英俊的小伙子带着[your_heir.GetHerHim]去了某个私人的地方。\n\n"
 lmf_heir.1677.desc.invite.nosex:0 "还吐在我脚上。\n\n"
 lmf_heir.1677.desc.invite.poorly.end:0 "那晚从头到尾都是一片混乱，我在清晨前就抛弃了[your_heir.GetHerHim]。"
 lmf_heir.1677.desc.invite.well.end:0 "总之，对我们俩来说，这是一个难忘的夜晚，我甚至设法在这些故事中为[your_heir.GetHerHim]提供了一些教诲。"
 lmf_heir.1677.desc.noinvite:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]前往不远处的一个小镇，据我所知，[your_heir.GetSheHe]在那里的一家小酒馆度过了相当欢乐的夜晚。\n\n"
 lmf_heir.1677.desc.noinvite.poorly:0 "显然，[your_heir.GetTitledFirstNameNoTooltip]摆脱了监管很想发泄一下，但随后的酩酊大醉、酒吧斗殴……甚至惹怒了顾客，导致被赶出了小镇。\n\n我想这也是接受教育的一种方式，不是吗？"
 lmf_heir.1677.desc.noinvite.well:0 "显然，[your_heir.GetTitledFirstNameNoTooltip]很想发泄一下，接下来一周的大部分时间[your_heir.GetHerselfHimself]都表现得不错，没有醉酒斗殴，没有酗酒，也没有被愤怒的当地人赶出小镇。只有纯粹的欢乐，当地人也喜欢[your_heir.GetTitledFirstNamePossessiveNoTooltip]，还期待[your_heir.GetHerHis]再来。\n\n这没什么教育意义，但休息一下也不错。"
 lmf_heir.1677.desc.start:0 "我私下听说，[your_heir.GetTitledFirstNameNoTooltip]可能打算以“培训”为借口从而离开[heir_visit_origin.GetCounty.GetTitle.GetNameNoTierNoTooltip]……看来情况确实如此，因为在过去的几个月里，[your_heir.GetHerHim]一直在[ROOT.Char.GetCapitalLocation.GetCounty.GetCulture.GetNameNoTooltip]的各个酒馆之间狂欢，如果我让[your_heir.GetHerHim]来[ROOT.Char.Custom('FortifiedBuilding')]，情况也不会有什么不同。\n\n"
 lmf_heir.1677.desc.poorly:0 "我希望[your_heir.Custom('polite_gender_ref')]过得更好，但显然[your_heir.GetHerHis]的狂欢只不过是醉酒斗殴然后呕吐，甚至爬进谷仓好几天，还有激怒当地人，但至少现在[your_heir.GetSheHe]似乎不再这样了。"
 lmf_heir.1677.desc.well:0 "从各方面来看，[your_heir.Custom('polite_gender_ref')]都玩得很开心。[your_heir.GetSheHe|U]或多或少地表现出风度，除了几则闹哄哄的故事外，似乎还赢得了民众的欢迎。[your_heir.GetHerHim]还带领一群酒馆客人唱歌，现在，欢乐时光似乎已经接近尾声，但对于[your_heir.GetHerHim]来说，这一定是美妙的时光！"
 lmf_heir.1677.a:0 "多么美好的时光啊！"
 lmf_heir.1677.b:0 "做得好！[your_heir.Custom('GetLassLad')]。"
 lmf_heir.1677.c:0 "啊，多么美妙！"
 lmf_heir.1677.d:0 "这是[heir_liege.GetTitledFirstNamePossessiveNoTooltip]的#EMP 继承人？！#!"
 excellent_party_with_heir:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]在酒馆里狂欢了一夜后结下了深厚的友谊。"
 excellent_party_with_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]和[CHARACTER.GetShortUINameNoTooltipNoFormat]在酒馆里狂欢了一夜后结下了深厚的友谊。"
 disastrous_party_with_heir:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在酒馆里经历了灾难一夜性后对[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]感到厌恶。"
 disastrous_party_with_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在酒馆里经历了灾难一夜性后对[CHARACTER.GetShortUINameNoTooltipNoFormat]感到厌恶。"
 lmf_heir.1678.t:0 "别无所图"
 lmf_heir.1678.desc.all:0 "我几乎难以相信，自从[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]来到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]之后的几个月里，[your_heir.GetSheHe]什么也没做。\n\n"
 lmf_heir.1678.desc.two:0 "我也不太清楚为什么，但[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]花了大量时间来到[ROOT.Char.Custom('FortifiedBuilding')]，然后什么都没做。\n\n"
 lmf_heir.1678.desc.one:0 "也许需要休息一下，但这也不是[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在[ROOT.Char.Custom('FortifiedBuilding')]什么都不做的理由……\n\n"
 lmf_heir.1678.desc.castle:0 "[your_heir.GetTitledFirstNameNoTooltip]大部分时间都待在卧室里，要么看书，要么写日记或者踱步。[your_heir.GetSheHe|U]只在宫廷露过几次面，然后大部分时间在[your_heir.GetHerselfHimself]的房间里。\n\n"
 lmf_heir.1678.desc.town:0 "自从我拒绝在[ROOT.Char.Custom('FortifiedBuilding')]接待[your_heir.GetTitledFirstNameNoTooltip]之后，[your_heir.GetSheHe]大部分时间都在当地的一些城镇里游荡……并没有#EMP 做#!任何事情或学习任何东西，而更多的是为了欣赏风景。\n\n"
 lmf_heir.1678.desc.end:0 "是懒惰？还是只是想避开所有注视？我不知道，但至少[your_heir.GetSheHe]没有惹麻烦。\n\n"
 lmf_heir.1678.a:0 "反正[your_heir.GetSheHe]不是#EMP 我的#!继承人。"
 lmf_heir.1680.t:0 "[your_heir.GetHerHis|U]在路上"
 lmf_heir.1680.desc.notrain:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]今天最后一次来到[ROOT.Char.Custom('FortifiedBuilding')]，"
 lmf_heir.1680.desc.notrain.away:0 "我当然没有去送别[your_heir.GetHerHim]。\n\n"
 lmf_heir.1680.desc.notrain.ill:0 "我病得太重，没法去送别[your_heir.GetHerHim]。\n\n"
 lmf_heir.1680.desc.notrain.busy:0 "不过我太专注于其他事情没有去送别[your_heir.GetHerHim]。\n\n"
 lmf_heir.1680.desc.notrain.nomeet.end:0 "[your_heir.Custom('polite_gender_ref')]只能与少数几个人告别，然后返程。如果[your_heir.GetHerHis]对我不在[ROOT.Char.Custom('FortifiedBuilding')]告别会有不满吗？我不知道，但[your_heir.GetTitledFirstNamePossessiveNoTooltip]的造访结束了。"
 lmf_heir.1680.desc.notrain.meet:0 "因此我下到院子里送别[your_heir.GetHerHim]。\n\n[your_heir.Custom('polite_gender_ref')]足够礼貌，如果[your_heir.GetHerHis]对我不在[ROOT.Char.Custom('FortifiedBuilding')]告别有不满，[your_heir.GetSheHe]也会隐藏得很好。\n\n短暂寒暄后，[your_heir.GetSheHe]就返程，结束造访之旅了。"
 lmf_heir.1680.desc.train:0 "由于昨晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]是[your_heir.GetTitledFirstNamePossessiveNoTooltip]的最后一晚，我们为[your_heir.GetHerHis]举办了一场小晚宴。"
 lmf_heir.1680.desc.train.away:0 "尽管我不能到场。\n\n"
 lmf_heir.1680.desc.train.ill:0 "但很遗憾我身体太虚，无法参加。\n\n"
 lmf_heir.1680.desc.train.busy:0 "不过我太专注于其他事情无法参加\n\n"
 lmf_heir.1680.desc.train.meet.friend:0 "我非常高兴参加并送别[your_heir.GetHerHim]。\n\n"
 lmf_heir.1680.desc.train.meet.enemy:0 "我宁愿完全避免这种情况，但我仍然是主办方，这是我的[ROOT.Char.Custom('FortifiedBuilding')]。\n\n"
 lmf_heir.1680.desc.train.meet.neutral:0 "我以为[your_heir.GetHerHis]会以[ROOT.Char.Custom('FortifiedBuilding')]的[ROOT.Char.GetLadyLord]身份出席。\n\n"
 lmf_heir.1680.desc.train.success:0 "[your_heir.Custom('polite_gender_ref')]对造访感到非常高兴，因此整个晚上都状态饱满。\n\n"
 lmf_heir.1680.desc.train.failure:0 "考虑到[your_heir.GetHerHis]这糟糕且失败的造访，[your_heir.Custom('polite_gender_ref')]自始至终都相当安静，并在礼貌地退席了。\n\n"
 lmf_heir.1680.desc.train.neutral:0 "[your_heir.Custom('polite_gender_ref')]很有礼貌……也许反映[your_heir.GetHerHis]的造访之旅成败得失。\n\n"
 lmf_heir.1680.desc.train.end:0 "第二天一早，[your_heir.GetTitledFirstNameNoTooltip]就踏上了返程。我不禁在想，[your_heir.GetHerHis]会怎么评价在这里的时光……但不管怎么说，[your_heir.GetHerHis]的造访都结束了。"
 lmf_heir.1680.a:0 "我希望[your_heir.GetSheHe]在造访期间过得愉快，我#EMP 自觉#!做的不错。"
 lmf_heir.1680.b:0 "希望这是我们最后一次见到[your_heir.GetHerHim]。"
 lmf_heir.1680.c:0 "是一个好[your_heir.Custom('polite_gender_ref')]以及一个朋友。"
 lmf_heir.1680.d:0 "我很高兴[your_heir.GetSheHe]收获颇丰。"
 lmf_heir.1680.e:0 "那就这样吧。"
 lmf_heir.1680.f:0 "现在该做自己的事了！"
 lmf_heir.1680.end.tt:0 "[your_heir.GetTitledFirstNameNoTooltip]将开始返回[heir_visit_origin.GetTitle.GetNameNoTierNoTooltip]"
 lmf_heir.1681.desc.start:0 "我刚刚收到了[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))]的回复，并且[your_heir.GetHerHis]已经到了[heir_visit_target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。\n\n"
 lmf_heir.1681.desc.notrain:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))]拒绝在[ROOT.Char.Custom('FortifiedBuilding')]接待[your_heir.GetHerHim]，因此[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))]把大部分时间都花"
 lmf_heir.1681.desc.notrain.hunt.good:0 "在狩猎上。\n\n"
 lmf_heir.1681.desc.notrain.hunt.poor:0 "在狩猎上，但天气恶劣，什么都没有捕到。\n\n"
 lmf_heir.1681.desc.notrain.tour.good:0 "在游览周边地区，了解当地风土人情……一切似乎都进行得很顺利。\n\n"
 lmf_heir.1681.desc.notrain.tour.poor:0 "在巡视周边的土地，还要忍受恶劣的天气以及无视平民。\n\n"
 lmf_heir.1681.desc.notrain.party.good:0 "在附近几个村庄的酒馆里欢乐地度过时光……听着不错，但没学什么。\n\n"
 lmf_heir.1681.desc.notrain.party.poor:0 "在附近几个村庄的酒馆里寻欢作乐……至少试图寻欢作乐，但从字里行间可以看出，[your_heir.GetSheHe]大部分时间都很悲惨。\n\n"
 lmf_heir.1681.desc.notrain.sick:0 "在客栈休息，只因为他病得很厉害，起不了床。\n\n"
 lmf_heir.1681.desc.notrain.nothing:0 "在附近的一些村庄游荡，住在旅馆里，然后什么都没有做。\n\n"
 lmf_heir.1681.desc.notrain.end:0 "虽然从道理上，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))]确实完成了承诺。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))]也确实造访了[heir_visit_target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，但不是[ROOT.Char.Custom('FortifiedBuilding')]的话，这很难称得上是热情好客。"
 lmf_heir.1681.desc.train:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))]亲自会见还热情款待了[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))]。[your_heir.GetSheHe|U]在[heir_visit_target.Custom('FortifiedBuilding')]获得了一个房间，并在那里度过了一段时光。"
 lmf_heir.1681.desc.train.castle:0 "虽然[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))]没有亲自接待[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))]，但[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))]还受到了热情款待，并在[heir_visit_target.Custom('FortifiedBuilding')]获得了一间房间。"
 lmf_heir.1681.desc.train.all:0 "[your_heir.GetHerHis]在整个旅程，"
 lmf_heir.1681.desc.train.most:0 "[your_heir.GetHerHis]在行程的大部分时间，"
 lmf_heir.1681.desc.train.some:0 "[your_heir.GetHerHis]的时间"
 lmf_heir.1681.desc.train.rest:0 "以及其余"
 lmf_heir.1681.desc.train.second:0 "，"
 lmf_heir.1681.desc.train.third:0 "，然后"
 lmf_heir.1681.desc.host:0 "接受[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))][heir_visit_target.GetHerselfHimself]的亲自培训"
 lmf_heir.1681.desc.castle:0 "在[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_visit_target'))]的宫廷"
 lmf_heir.1681.desc.sick:0 "病得太重，除了休息以外无法做太多事情"
 lmf_heir.1681.desc.hunt:0 "在周围进行狩猎"
 lmf_heir.1681.desc.tour:0 "在游览当地，了解当地风土人情"
 lmf_heir.1681.desc.party:0 "在附近的酒馆里尽情玩乐"
 lmf_heir.1681.desc.nothing:0 "在无所事事上"
 lmf_heir.1681.desc.train.good:0 "。\n\n从[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))]在信中所说的一切来看，这是一次极好的、最有成效的经历。"
 lmf_heir.1681.desc.train.poor:0 "。\n\n从[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))]在信中所说的一切来看，这是一次痛苦且几乎没有什么效果的经历。"
 lmf_heir.1681.desc.train.neutral:0 "。\n\n从字里行间可以看出，我怀疑这次旅行并非一切都顺利，但[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('your_heir'))]至少大部分时间看起来都很高兴。"
 lmf_heir.1681.a:0 "我十分期待[your_heir.GetHerHis]的回来！"
 lmf_heir.1681.secrets.to.tell.tt:0 "[your_heir.GetTitledFirstNameNoTooltip]向你透露了一些秘密，这些秘密是[your_heir.GetSheHe]在那时发现的……"
 lmf_heir.1700.own.t:0 "我的私生[bastard_child.Custom('GetDaughterSon')|U]？"
 lmf_heir.1700.son.t:0 "我的私生[Select_CString( bastard_child.IsFemale, '女', '子' )]？"
 lmf_heir.1700.relative.t:0 "我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))|U]私生[bastard_child.Custom('GetDaughterSon')|U]？"
 lmf_heir.1700.bastard.me.start:0 "今天，一个年轻的乡下[visitor.GetWomanMan]出现在[ROOT.Char.Custom('FortifiedBuilding')]门口，自称是我的[bastard_child.Custom('GetDaughterSon')]。\n\n我不得不亲自去了院子里看看，我承认[bastard_child.GetSheHe]确实长得像我。据[bastard_child.GetHerHim]说，我会见了[bastard_child.GetHerHis]的母亲。"
 lmf_heir.1700.bastard.me.heirvisit:0 "当时我正在拜访[story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip]的[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]……那已经是很久以前的事了，但我确实记得当时的情景。\n\n"
 lmf_heir.1700.bastard.me.campfollower:0 "在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的一个晚上，当时她是一名军营随军人员。\n\n"
 lmf_heir.1700.bastard.me.taverngirl:0 "在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的一家酒馆里当侍女。\n\n"
 lmf_heir.1700.bastard.me.lostguide:0 "那时候我在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]迷路，她带我回到了军营。\n\n"
 lmf_heir.1700.bastard.me.campcaughteye:0 "那晚在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]，她是个士兵，却吸引了我的目光。那个夜晚，我确实记忆犹新。\n\n"
 lmf_heir.1700.bastard.me.foundpool:0 "那一天，我确实记得是在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]伯爵领的一处疗愈池边，靠近军队扎营的地方。\n\n"
 lmf_heir.1700.bastard.me.default:0 "那是在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]几个月前的狂欢。\n\n"
 lmf_heir.1700.bastard.me.end:0 "那这个年轻的[visitor.GetWomanMan]现在想要什么呢？\n“您是我父亲，”[bastard_child.GetSheHe]说。“我只希望我能为您效力。”"
 lmf_heir.1700.bastard.alive.start:0 "今天，一个年轻的乡下[visitor.GetWomanMan]出现在[ROOT.Char.Custom('FortifiedBuilding')]门口，自称是[bastard_child_father.GetFirstNamePossessiveNoTooltip]的[bastard_child.Custom('GetDaughterSon')]。\n\n我不得不亲自去了院子里看看，我承认[bastard_child.GetSheHe]确实长得像[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))]。我传唤[bastard_child_father.GetFirstNameNoTooltip]后，其确实羞涩地承认自己和一个女人上床了。"
 lmf_heir.1700.bastard.alive.heirvisit:0 "当时他正在[story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip]拜访[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]，在酒馆酒后乱性，这与外面的[visitor.Custom('WomanManPossessive')]故事相符。\n\n"
 lmf_heir.1700.bastard.alive.campfollower:0 "当时军队驻扎在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]，他是一名随军人员，这与外面的[visitor.Custom('WomanManPossessive')]故事相符。\n\n"
 lmf_heir.1700.bastard.alive.taverngirl:0 "那时军队在附近扎营时，他去找了[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]一家酒馆的女侍，这与外面的[visitor.Custom('WomanManPossessive')]故事相符。\n\n"
 lmf_heir.1700.bastard.alive.lostguide:0 "那时候他在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]中迷路，是对方把他带回了军营，这与外面的[visitor.Custom('WomanManPossessive')]故事相符。\n\n "
 lmf_heir.1700.bastard.alive.campcaughteye:0 "当时军队驻扎在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]，他是一名随军人员，这与外面的[visitor.Custom('WomanManPossessive')]故事相符。\n\n"
 lmf_heir.1700.bastard.alive.foundpool:0 "他在离军队驻扎地不远的[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]疗愈池边遇到的经历，这与外面的[visitor.Custom('WomanManPossessive')]故事相符。\n\n"
 lmf_heir.1700.bastard.alive.default:0 "那是在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]几个月前的狂欢，这与外面的[visitor.Custom('WomanManPossessive')]故事相符。\n\n"
 lmf_heir.1700.bastard.alive.end:0 "那这个年轻的[visitor.GetWomanMan]现在想要什么呢？\n“您是我血亲，”[bastard_child.GetSheHe]说。“我只希望我能为您效力。”"
 lmf_heir.1700.bastard.dead.start:0 "今天，一个年轻的乡下[visitor.GetWomanMan]出现在[ROOT.Char.Custom('FortifiedBuilding')]门口，自称是我死去[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))][bastard_child_father.GetFirstNameNoTooltip]的孩子\n\n我不得不亲自去了院子里看看，我承认[bastard_child.GetSheHe]确实长得像[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))]。据[bastard_child.GetHerHim]说，[bastard_child_father.GetFirstNameNoTooltip]会见了[bastard_child.GetHerHis]的母亲。"
 lmf_heir.1700.bastard.dead.heirvisit:0 "那天晚上，[bastard_child_father.GetFirstNameNoTooltip]在酒馆里喝得酩酊大醉，然后去拜访了[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的[story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip]，尽管[bastard_child_father.GetFirstNameNoTooltip]对此只字未提。\n\n"
 lmf_heir.1700.bastard.dead.campfollower:0 "其母亲是一名随军人员，有一天晚上，[bastard_child_father.GetFirstNameNoTooltip]的军队驻扎在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]，而[bastard_child_father.GetFirstNameNoTooltip]当时确实在那里。\n\n"
 lmf_heir.1700.bastard.dead.taverngirl:0 "在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的一家酒馆里，她为来访的[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]提供酒水，这很合理，因为[bastard_child_father.GetFirstNamePossessiveNoTooltip]的军队当时确实在那里。\n\n"
 lmf_heir.1700.bastard.dead.lostguide:0 "当[bastard_child_father.GetFirstNamePossessiveNoTooltip]在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]迷路时，她是一名当地人，带他回到军营……这很合理，因为[bastard_child_father.GetFirstNamePossessiveNoTooltip]的军队当时确实在那里。\n\n"
 lmf_heir.1700.bastard.dead.campcaughteye:0 "其母亲是一名士兵，在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]扎营期间引起了[bastard_child_father.GetFirstNamePossessiveNoTooltip]的注意……虑到[bastard_child_father.GetFirstNameNoTooltip]当时确实在场，这说法相当可信。\n\n"
 lmf_heir.1700.bastard.dead.foundpool:0 "在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]靠近他军队扎营地方的一处疗愈池边，考虑到[bastard_child_father.GetFirstNameNoTooltip]当时确实在那里，这说法相当可信。\n\n"
 lmf_heir.1700.bastard.dead.default:0 "那是在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]几个月前的狂欢。这很合理，因为[bastard_child_father.GetFirstNameNoTooltip]的军队当时确实在那里。\n\n"
 lmf_heir.1700.bastard.dead.end:0 "那这个年轻的[visitor.GetWomanMan]现在想要什么呢？\n“您是我血亲，”[bastard_child.GetSheHe]说。“我只希望我能为您效力。”"
 lmf_heir.1700.mother.me.start:0 "今天，[ROOT.Char.Custom('FortifiedBuilding')]门口出现了一个农妇，这没什么特别的，只是这女人还带着一个孩子，她好像说那是我的孩子。\n\n我不得不亲自下到院子里去看，依稀记得她"
 lmf_heir.1700.mother.me.heirvisit:0 "是在我拜访[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的[story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip]，在酒馆酒后乱性，她说的很有道理……\n\n"
 lmf_heir.1700.mother.me.campfollower:0 "是一个喜欢我的随军人员，那天晚上我的军队驻扎在[story.MakeScope.Var('story_stray_seed_location').Province.GetNameNoTooltip]。所以她的故事完全可信。\n\n"
 lmf_heir.1700.mother.me.taverngirl:0 "是[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]一家酒馆的女招待，那时候为我服务，当时我的军队在附近扎营，所以她的故事完全可信。\n\n"
 lmf_heir.1700.mother.me.lostguide:0 "是[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的当地人，在我迷路时，她带我回到了军营，所以她的故事完全可信。\n\n"
 lmf_heir.1700.mother.me.campcaughteye:0 "作为一名在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]军营共处时引起我注意的士兵，所以她的故事完全可信。\n\n"
 lmf_heir.1700.mother.me.foundpool:0 "就是她看到我从[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的治疗池里出来，而且离我军队驻扎的地方不远。所以她的故事完全可信。\n\n"
 lmf_heir.1700.mother.me.default:0 "是在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]几个月前的狂欢之夜中认识的，所以她的故事完全可信。\n\n"
 lmf_heir.1700.mother.me.mid:0 "至于"
 lmf_heir.1700.mother.me.newborn:0 "她怀里抱着的宝贝？"
 lmf_heir.1700.mother.me.child:0 "[bastard_child.Custom('polite_gender_ref')]在她身边，眼睛紧张地低着？"
 lmf_heir.1700.mother.me.end:0 "“[bastard_child.GetSheHe|U] 是你的骨肉，”女人说道。“我只希望[bastard_child.GetFirstNameNoTooltip]在您的宫廷中有一席之地，在那里，[bastard_child.GetFirstNameNoTooltip]能拥有比我所能提供的更好的未来。”"
 lmf_heir.1700.mother.alive.start:0 "今天，一个农妇出现在[ROOT.Char.Custom('FortifiedBuilding')]门口，这没什么特别的，只是这女人带着一个孩子，她声称那孩子就是[bastard_child_father.GetFirstNamePossessiveNoTooltip][bastard_child.Custom('GetDaughterSon')]！\n\n我不得不亲自去了院子里看看，我承认[bastard_child.GetSheHe]确实有点像我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))]。当我传唤[bastard_child_father.GetFirstNameNoTooltip]后，他尴尬地承认认出了这个女人。"
 lmf_heir.1700.mother.alive.heirvisit:0 "那是在拜访[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的[story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip]时，酒后乱性认识的。\n\n"
 lmf_heir.1700.mother.alive.campfollower:0 "那时候他军队驻扎在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]，她是一名随军人员，但自那以后他再也没有见过或听到过她的消息。\n\n"
 lmf_heir.1700.mother.alive.taverngirl:0 "她是[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的一名酒馆女侍。当他和其他[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]去酒馆后，她对他产生了好感，但自那以后他再也没有见过她，也没有听到过她的消息。\n\n"
 lmf_heir.1700.mother.alive.lostguide:0 "那时候他在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]迷路，一位当地人带他回到了军营，他们一起度过了一夜。\n\n"
 lmf_heir.1700.mother.alive.campcaughteye:0 "一个曾在军队驻扎于[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]时让他眼前一亮的士兵，不过自那以后就再也没获得过她的消息。\n\n"
 lmf_heir.1700.mother.alive.foundpool:0 "当地人曾撞见他从[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的一处疗愈池出现，那里离他的军队扎营处不远，不过自那以后他就再没见过她，也没收到过她的消息。\n\n"
 lmf_heir.1700.mother.alive.default:0 "很久以前，他在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的狂欢之夜与她同寝，但自那以后他再也没有见过她，也没有听到过她的消息。\n\n"
 lmf_heir.1700.mother.alive.mid:0 "至于"
 lmf_heir.1700.mother.alive.newborn:0 "她怀里抱着的宝贝？"
 lmf_heir.1700.mother.alive.child:0 "[bastard_child.Custom('polite_gender_ref')]在她身边，眼睛紧张地低着？"
 lmf_heir.1700.mother.alive.end:0 "“[bastard_child.GetSheHe|U] 是你的骨肉，”女人说道。“我只希望[bastard_child.GetFirstNameNoTooltip]在您的宫廷中有一席之地，在那里，[bastard_child.GetFirstNameNoTooltip]能拥有比我所能提供的更好的未来。”"
 lmf_heir.1700.mother.dead.start:0 "今天，一个农妇出现在[ROOT.Char.Custom('FortifiedBuilding')]门口，这没什么特别的，只是这女人带着一个孩子，她声称那孩子就是我已故[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))][bastard_child_father.GetFirstNameNoTooltip]的[bastard_child.Custom('GetDaughterSon')]！\n\n我不得不亲自去了院子里看看，我承认[bastard_child.GetSheHe]确实有点像我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('bastard_child_father'))]。据这她说，她遇到了我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('bastard_child_father'))]"
 lmf_heir.1700.mother.dead.heirvisit:0 "那天晚上，[bastard_child_father.GetFirstNameNoTooltip]在酒馆里喝得酩酊大醉，然后去拜访了[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的[story.MakeScope.Var('story_stray_seed_heir_visit_target').Char.GetTitledFirstNameNoTooltip]，尽管[bastard_child_father.GetFirstNameNoTooltip]对此只字未提。\n\n"
 lmf_heir.1700.mother.dead.campfollower:0 "她是一名随军人员，有一天晚上，[bastard_child_father.GetFirstNameNoTooltip]的军队驻扎在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]，而[bastard_child_father.GetFirstNameNoTooltip]当时确实在那里。\n\n"
 lmf_heir.1700.mother.dead.taverngirl:0 "她在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的一家酒馆里，她为来访的[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]提供酒水，这很合理，因为[bastard_child_father.GetFirstNameNoTooltip]的军队当时确实在那里。\n\n"
 lmf_heir.1700.mother.dead.lostguide:0 "当[bastard_child_father.GetFirstNameNoTooltip]在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]迷路时，她是一名当地人，带他回到军营……这很合理，因为[bastard_child_father.GetFirstNameNoTooltip]的军队当时确实在那里。\n\n"
 lmf_heir.1700.mother.dead.campcaughteye:0 "军队驻扎在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]时，她是一名引起他注意的士兵。考虑到[bastard_child_father.GetFirstNameNoTooltip]当时确实在那里，这完全合情合理。\n\n"
 lmf_heir.1700.mother.dead.foundpool:0 "他在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]的一处疗愈池边逗留时，那里离他的军队扎营处并不远。考虑到[bastard_child_father.GetFirstNameNoTooltip]当时确实在场，这完全合情合理。\n\n"
 lmf_heir.1700.mother.dead.default:0 "那是在[story.MakeScope.Var('story_stray_seed_location').Province.GetTitle.GetNameNoTierNoTooltip]几个月前的狂欢。这很合理，因为[bastard_child_father.GetFirstNameNoTooltip]的军队当时确实在那里。\n\n"
 lmf_heir.1700.mother.dead.mid:0 "至于"
 lmf_heir.1700.mother.dead.newborn:0 "她怀里抱着的宝贝？"
 lmf_heir.1700.mother.dead.child:0 "[bastard_child.Custom('polite_gender_ref')]在她身边，眼睛紧张地低着？"
 lmf_heir.1700.mother.dead.end:0 "“[bastard_child.GetSheHe|U] 是你的骨肉，”女人说道。“我只希望[bastard_child.GetFirstNameNoTooltip]在您的宫廷中有一席之地，在那里，[bastard_child.GetFirstNameNoTooltip]能拥有比我所能提供的更好的未来。”"
 lmf_heir.1700.a:0 "欢迎你留下来，但这个秘密只能你知我知。"
 lmf_heir.1700.b:0 "欢迎你留下来，而且每个人都会知道你是谁。"
 lmf_heir.1700.c:0 "这里并非你的归宿。"
 lmf_interaction.0002.nw.tt:0 "[recipient.GetTitledFirstNameNoTooltip]已前往守夜人军团"
 lmf_interaction.0002.maester.tt:0 "[recipient.GetTitledFirstNameNoTooltip]已前往学城"
 lmf_interaction.1327.b:0 "我不需要另一个情人，只需要一个[secondary_actor.GetWifeHusband]。"
 lmf_interaction.1327.e:0 "我们将结婚，[secondary_actor.GetSheHe]将成为我的爱人。"
 lmf_interaction.1327.f:0 "是的，[secondary_actor.GetSheHe]将成为我的[secondary_actor.GetWifeHusband]和朋友。"
 lmf_interaction.1331.desc.septon:0 "直到后来我们才知道[rebel.GetSheHe]已发誓投身于信仰，而不是接受一个[rebel.GetSheHe]不想要的[intended_spouse.GetWifeHusband]。\n\n"
 lmf_interaction.1331.desc.maester:0 "直到后来我们才知道[rebel.GetSheHe]已前往学城，而不是接受一个[rebel.GetSheHe]不想要的[intended_spouse.GetWifeHusband]。\n\n\n"
 lmf_interaction.1331.desc.wall:0 "直到后来我们才知道[rebel.GetSheHe]已加入守夜人，而不是接受一个[rebel.GetSheHe]不想要的[intended_spouse.GetWifeHusband]。\n"
 lmf_interaction.1500.opening.spouseliege:0 "我的[actor.GetLadyLord]和[actor.GetWifeHusband]，"
 lmf_interaction.1500.opening.liege:0 "[actor.GetLadyLord]，"
 lmf_interaction.1500.opening.love:0 "吾爱，"
 lmf_interaction.1500.opening.spouse:0 "[actor.GetWifeHusband|U]，"
 lmf_interaction.1500.nemesis:0 "我宁愿撞破墙，也不愿前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，现在只是听从你的命令。\n\n你这邀约肯定是开玩笑的。"
 lmf_interaction.1500.rival:0 "邀请我去[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]？在你做了这些事之后，来见你一面？\n\n不，我宁愿不走。"
 lmf_interaction.1500.betray:0 "邀请我来[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]？就看你？\n\n不，你那背叛我还历历在目，我还不想和你在一起。"
 lmf_interaction.1500.spouse:0 " 我也同意我们该像夫妻一样共度时光了，但我现在根本无法离开[recipient.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]。\n\n我希望你也可以谅解。"
 lmf_interaction.1500.lover:0 "我真希望我不必拒绝这个邀请，但我现在根本不可能离开[recipient.GetCurrentLocation.GetTitle.GetNameNoTier]。\n\n很快，吾爱，我保证。"
 lmf_interaction.1500.a:0 "好吧，这值得一试。"
 lmf_interaction.1501.lover:0 "我前不久还在想你，没多久收到了这个邀请！\n\n我将前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，很快会见到你。"
 lmf_interaction.1501.spouse:0 "我们该渡过一段美好的夫妻时光了。\n\n我将前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，很快会见到你。"
 lmf_interaction.1501.a:0 "我等不及了"
 lmf_interaction.1503.t:0 "取消计划？"
 lmf_interaction.1503.desc.atwar.betrayed:0 "叛徒！[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))]利用了我的来访，趁我还在途中时发动了战争。\n\n我必须马上返回[origin.GetTitle.GetNameNoTierNoTooltip]"
 lmf_interaction.1503.desc.atwar.betrayer:0 "现在我被卷入了与[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))]的战争\n\n[destination.GetTitle.GetNameNoTierNoTooltip]那里肯定是有热烈的欢迎，但我只能回[origin.GetTitle.GetNameNoTierNoTooltip]。"
 lmf_interaction.1503.desc.atwar.rootdefender:0 "我发现自己在旅途时遭到了[attacker.GetPrimaryTitle.GetNameNoTooltip]的袭击。\n\n我要返回[origin.GetTitle.GetNameNoTierNoTooltip]吗？我是否能及时到达？"
 lmf_interaction.1503.desc.atwar.rootattacker:0 "现在，我正在与[defender.GetPrimaryTitle.GetNameNoTooltip]交战，而我正在旅行之中。\n\n我要返回[origin.GetTitle.GetNameNoTierNoTooltip]吗？我是否能及时到达？"
 lmf_interaction.1503.desc.atwar.actorattacker:0 "我刚刚收到消息，我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))]已与[defender.GetPrimaryTitle.GetNameNoTooltip]开战，尽管[actor.GetSheHe]知道我会来。\n\n我是返回[origin.GetTitle.GetNameNoTierNoTooltip]还是继续前进并期待会有好结果？"
 lmf_interaction.1503.desc.atwar.actordefender:0 "我刚刚收到消息，[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))]遭到了[attacker.GetPrimaryTitle.GetNameNoTooltip]的攻击，这时机太糟糕了！\n\n我是返回[origin.GetTitle.GetNameNoTierNoTooltip]还是继续前进并期待会有好结果？ "
 lmf_interaction.1503.desc.atwar.actor:0 "我刚刚收到消息，我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))]被卷入了一场战争，尽管看起来[destination.GetTitle.GetNameNoTierNoTooltip]并不会立即面临危险。\n\n我是返回[origin.GetTitle.GetNameNoTierNoTooltip]还是继续前进并期待会有好结果？ "
 lmf_interaction.1503.desc.atwar:0 "我刚刚收到消息，我将卷入一场战争，但我正在旅行，离领地很远。\n\n我要返回[origin.GetTitle.GetNameNoTierNoTooltip]吗？我是否能及时到达？ "
 lmf_interaction.1503.a:0 "我应该折返回家。"
 lmf_interaction.1503.a.title:0 "取消远游"
 lmf_interaction.1503.a.desc:0 "由于战争原因，[recipient.GetShortUINameNoTooltip|U]被迫取消远游并返回[origin.GetTitle.GetNameNoTierNoTooltip]。"
 lmf_interaction.1503.b:0 "还是继续前往[destination.GetTitle.GetNameNoTierNoTooltip]吧。"
 lmf_interaction.1504.t:0 "悲伤的消息"
 lmf_interaction.1504.desc:0 "一则晴空霹雳的消息传来——我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))]死了，而我在这里却无能为力。\n\n再去[destination.GetTitle.GetNameNoTierNoTooltip]也毫无意义了，我要回[origin.GetTitle.GetNameNoTierNoTooltip]。"
 lmf_interaction.1504.a:0 "哦，[actor.GetFirstNameNoTooltip]！"
 lmf_interaction.1505.a.title:0 "取消远游"
 lmf_interaction.1505.desc.begin:0 "[recipient.GetShortUINameNoTooltipNoFormat|U]被迫取消[destination.GetTitle.GetNameNoTierNoTooltip]的远游。"
 lmf_interaction.1505.desc.norelationship:0 " 因为[CharYourHerHis(recipient)]与[actor.GetShortUINameNoTooltipNoFormat]的关系已经结束。"
 lmf_interaction.1505.desc.notprovince:0 " 因为它不再是[CharYourHerHis(actor)]的首都。"
 lmf_interaction.1505.desc.actorleft:0 "因为[CharYouSheHe(actor)]已死"
 lmf_interaction.1505.desc.actorill:0 "因为[CharYouSheHe(actor)]患上了重病。"
 lmf_interaction.1505.desc.rootill:0 "因为[CharYouSheHe(recipient)]患上了重病。"
 lmf_interaction.1505.desc.actorimprison:0 "因为[CharYouSheHe(actor)]被监禁"
 lmf_interaction.1505.desc.rootimprison:0 "因为[CharYouSheHe(recipient)]被监禁"
 lmf_interaction.1505.desc.actorpregnant:0 "因为[CharYouSheHe(actor)]怀孕了"
 lmf_interaction.1505.desc.rootpregnant:0 "因为[CharYouSheHe(recipient)]怀孕了"
 lmf_interaction.1505.desc.actorhealth:0 "因为[CharYouSheHe(actor)]身体抱恙"
 lmf_interaction.1505.desc.roothealth:0 "因为[CharYouSheHe(recipient)]身体抱恙"
 lmf_interaction.1505.desc.default:0 "。"
 lmf_interaction.1506.t.reclove:0 "我在这儿呢，吾爱！"
 lmf_interaction.1506.t.rec:0 "与[actor.GetWifeHusband|U]共度良宵"
 lmf_interaction.1506.t.love:0 "吾爱来了"
 lmf_interaction.1506.t:0 "与[recipient.GetWifeHusband|U]共度良宵"
 lmf_interaction.1506.desc.reclove.notspouse:0 "我终于抵达了[destination.GetTitle.GetNameNoTierNoTooltip]，虽然很累，但是我迫不及待的想见[actor.GetFirstNameNoTooltip]。\n\n[actor.GetSheHe]早就在那里微笑等着我，还计划了一天，突然间我不再感到那么累了。\n\n[actor.GetFirstNameNoTooltip]把我带到[actor.Custom('FortifiedBuilding')]的一个私人区域，远离窥探，在那里我们充分利用了仅有的一点时间。"
 lmf_interaction.1506.desc.reclove.spouse:0 "我终于抵达了[destination.GetTitle.GetNameNoTierNoTooltip]，虽然很累，但是我迫不及待的想见[actor.GetFirstNameNoTooltip]。\n\n[actor.GetFirstNameNoTooltip]身边围着一群仆人，面带微笑渴望，几分钟后[actor.GetSheHe]就把他们赶走了，然后开始计划好的一天。\n\n[actor.GetFirstNameNoTooltip]把我带到[actor.Custom('FortifiedBuilding')]的一个私人区域，远离窥探，在那里我们充分利用了仅有的一点时间。"
 lmf_interaction.1506.desc.rec.spouse:0 "我终于抵达了[destination.GetTitle.GetNameNoTierNoTooltip]，我很累，急切地想要休息。\n\n但是一大群仆人急切地给我带消息，我和他们交涉了一会儿，就把他们赶走了，然后回到了[actor.GetFirstNameNoTooltip]在[actor.Custom('FortifiedBuilding')]中为我准备的房间。\n\n没多久[actor.GetSheHe|U]就到了，幸好我已经做了准备，我们开始了一个一般的夜晚。"
 lmf_interaction.1506.desc.love.notspouse:0 "[recipient.GetFirstNameNoTooltip]终于抵达了[destination.GetTitle.GetNameNoTierNoTooltip]，虽然[recipient.GetHerHis]很累，但看到我还是很高兴。\n\n我在庭院里面带微笑迎接了[recipient.GetHerHim]，然后开始我们计划好的一天……突然间[recipient.GetFirstNameNoTooltip]看起来不再那么疲惫了。\n\n我把[recipient.GetHerHim]带到[actor.Custom('FortifiedBuilding')]的一个私人区域，远离窥探，在那里我们充分利用了仅有的一点时间。 "
 lmf_interaction.1506.desc.love.spouse:0 "[recipient.GetFirstNameNoTooltip]终于抵达了[destination.GetTitle.GetNameNoTierNoTooltip]，虽然[recipient.GetHerHis]很累，但看到我还是很高兴。\n\n我在院子里带着一大群仆人迎接[recipient.GetHerHim]，仆人们急着给[recipient.GetHerHim]传话，幸好，[actor.GetFirstNameNoTooltip]只用了几分钟就把他们赶走了，然后开始我们计划好的一天。\n\n我把[recipient.GetHerHim]带到[actor.Custom('FortifiedBuilding')]的一个私人区域，远离窥探，在那里我们充分利用了仅有的一点时间。 "
 lmf_interaction.1506.desc.spouse:0 "[recipient.GetFirstNameNoTooltip]终于抵达了[destination.GetTitle.GetNameNoTierNoTooltip]，但[recipient.GetHerHis]似乎十分劳累。\n\n我让[recipient.GetHerHim]去我在[actor.Custom('FortifiedBuilding')]中为[recipient.GetHerHim]准备的房间里休息，并让[recipient.GetHerHim]处理消息。\n\n当我终于敲门时，[recipient.GetFirstNameNoTooltip]已经准备好了，我们开始共度一个一般的夜晚。"
 lmf_interaction.1506.a:0 "这样的夜晚太少见了。"
