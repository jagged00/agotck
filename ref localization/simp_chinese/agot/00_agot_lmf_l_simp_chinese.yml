 lmf_birth.1001.t:0 "我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('relative'))|U]耻辱"
 lmf_birth.1001.opening:0 "[spymaster.GetTitledFirstNameNoTooltip]给我带来了令人不安的消息，我未婚的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))][relative.GetTitledFirstName]有一些迹象，让[spymaster.GetHerHim]相信她怀了孩子！"
 lmf_birth.1001.know:0 "[spymaster.GetTitledFirstNameNoTooltip]强烈怀疑父亲是我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('suspected_father'))][suspected_father.GetTitledFirstName]，但如果不询问我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))]，就无法确定真假……将整件事公之于众！\n\n"
 lmf_birth.1001.secret:0 "[spymaster.GetTitledFirstNameNoTooltip]目前还不知道孩子的父亲是谁，但是询问我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))]就会立刻把整件事公之于众。\n\n"
 lmf_birth.1001.convent:0 "不过，还有一个选择。我们可以把[relative.GetTitledFirstNameNoTooltip]送去远离宫廷耳目的乡间庄园隐居，直到孩子出生。没人需要知道发生了什么，也没人需要知道孩子真正的母亲是谁……如果孩子真的活下来的话。[relative.GetTitledFirstNamePossessiveNoTooltip]和我们的声誉都可以保全。"
 lmf_birth.1001.end:0 "不幸的是，没有合适的地方可以让[relative.GetTitledFirstNameNoTooltip]隐居。如果她继续留在宫廷里，那么迟早会人尽皆知。"
 lmf_birth.1001.a:0 "把她送去隐居——就当从未发生过。"
 lmf_birth.1001.b:0 "立即驱逐她！"
 lmf_birth.1001.c:0 "我们将处理她的轻率所造成的后果。"
 lmf_birth.1001.d:0 "[suspected_father.GetTitledFirstNameNoTooltip]必须立即做正确的事情……否则。"
 lmf_birth.1003.t:0 "悲伤消息"
 lmf_birth.1003.alive:0 "我们从[relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]那里得到了不幸的消息。你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))][relative.GetTitledFirstNameNoTooltip]，难产而死……但孩子还活着，而且看起来情况不错。我们确信接生婆已经竭尽全力，但还是无济于事。[relative.GetFirstNameNoTooltip]只来得及把她的[child.GetDaughterSon]抱在怀里，给[child.GetHerHim]起名叫“[child.GetFirstNameNoTooltip]”，就陷入了昏迷，再也没有醒过来。\n\n现在该如何处理这个孩子呢？"
 lmf_birth.1003.dead:0 "我们从[relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]那里得到不幸的消息。[relative.GetTitledFirstNameNoTooltip]死于难产，接生婆已经竭尽全力，但无济于事，她和孩子都离开人世了。"
 lmf_birth.1003.a:0 "我再也不想看到或听到孩子的消息。"
 lmf_birth.1003.a.tt:0 "私生子[relative.GetTitledFirstNamePossessiveNoTooltip]将消失"
 lmf_birth.1003.b:0 "现在再隐瞒也没有意义了。"
 lmf_birth.1003.b.tt:0 "私生子[relative.GetTitledFirstNamePossessiveNoTooltip]将被送到你的宫廷抚养"
 lmf_birth.1003.c:0 "[ROOT.Char.GetFaith.PantheonTerm2]保佑他们俩。"
 lmf_birth.1004.t:0 "结束了……"
 lmf_birth.1004.desc:0 "我们从[relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]那里得到消息。[relative.GetTitledFirstNameNoTooltip]已经生了孩子，事情已经办妥，现在事情必须像从未发生过一样。要不要叫[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))]回家？"
 lmf_birth.1004.a:0 "我们平息这件事吧。"
 lmf_birth.1004.b:0 "她可以留在那，有她没她没区别。"
 lmf_birth.1006.t:0 "失去的东西"
 lmf_birth.1006.opening:0 "我在[ROOT.Char.GetCurrentLocation.GetName]旅行时，我在马车上发现一个年轻的[stray_bastard.GetWomanMan]从街上经过。虽然在样貌并不起眼，但[stray_bastard.GetHerHim]身上有一种异常熟悉的感觉……以至于我现在还记得那次相遇，我要找到[stray_bastard.GetSheHe]！卫兵何在？\n\n"
 lmf_birth.1006.mother:0 "事情超出了我的想象，年轻的[stray_bastard.GetWomanMan]似乎不是别人，正是多年前我隐居时生下的[stray_bastard.Custom('GetDaughterSon')]！！！我本以为此生再也见不到[stray_bastard.GetHerHim]，甚至已经死了，但[stray_bastard.GetSheHe]却在这里！曾经也有人自称是那个孩子，但[stray_bastard.GetSheHe]从未找我要过任何东西……还有谁会知道发生了什么？\n\n"
 lmf_birth.1006.family:0 "事情超出了我的想象，年轻的[stray_bastard.GetWomanMan]似乎不是别人，正是[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))][relative.GetTitledFirstNameNoTooltip]的孩子，多年前她被送去隐居时偷偷生下的。曾经也有人自称是那个孩子，但[stray_bastard.GetSheHe]从未找过[stray_bastard.GetHerHis]的家人询问过什么……还有谁会知道发生了什么？\n\n"
 lmf_birth.1006.other:0 "仆人们后来的报告远远超出了我的想象，看来年轻的[stray_bastard.GetWomanMan]不是别人，正是[birthplace.GetNameNoTooltip][relative.GetGetFullName]的[stray_bastard.Custom('GetDaughterSon')]。曾经也有人自称是那个孩子，但[stray_bastard.GetSheHe]从未找过[stray_bastard.GetHerHis]的家人询问过什么……还有谁会知道发生了什么？这是个可耻的秘密……\n\n"
 lmf_birth.1006.knight:0 "年轻的[stray_bastard.GetWomanMan]已经成为了一名前途无量的[ROOT.Char.Custom('KnightCultureNoTooltipLowercase')]，目前在[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]的一个小领主手下效力，其技艺足以让[stray_bastard.GetHerHis]自己小有名气。"
 lmf_birth.1006.physician:0 "年轻的[stray_bastard.GetWomanMan]已经在[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]这里当了好几年的医师，其医术足以让[stray_bastard.GetHerHis]自己小有名气。"
 lmf_birth.1006.monk:0 "根据所听到的一切，这个年轻人似乎宣誓成为了一个[stray_bastard.GetFaith.DevoteeMale]……一个学识渊博、品德高尚的人，尽管年龄不大，但其成就不小。"
 lmf_birth.1006.nun:0 "根据所听到的一切，她似乎宣誓成为了一位[stray_bastard.GetFaith.DevoteeFemale]……一位学识渊博、品德高尚的人，尽管年龄不大，但其成就不小。"
 lmf_birth.1006.rogue:0 "这个年轻的[stray_bastard.GetWomanMan]声名不佳，虽然在[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]，[stray_bastard.GetSheHe]是出了名有能力的人，虽然他们说[stray_bastard.GetSheHe]聪明，不过如果没有人指点，[stray_bastard.GetSheHe]最终很可能会触犯法律。"
 lmf_birth.1006.beauty:0 "这位年轻女子在[ROOT.Char.GetCurrentLocation.GetNameNoTooltip]的一位小领主家中工作，她的美貌和优雅举止广受赞誉。几乎可以肯定，用不了多久，她就会得到上层人士的注意。"
 lmf_birth.1006.end:0 "虽然[stray_bastard.GetSheHe]从未试图利用[stray_bastard.GetHerHis]的出身谋利，但也许我可以在宫廷中为[stray_bastard.GetHerHim]找到一个位置？亦或者让[stray_bastard.GetHerHim]置身事外是件好事，但[stray_bastard.GetHerHis]的存在和出身最终肯定会传到其他人的耳朵里。"
 lmf_birth.1006.a:0 "我会在宫廷中为[stray_bastard.GetHerHim]找一个位置。"
 lmf_birth.1006.b:0 "继续默默无闻吧！"
 lmf_birth.1006.c:0 "[stray_bastard.GetSheHe|U]早就该死了，让我们洗刷这个耻辱！"
 lmf_birth.1007.t:0 "结束了……"
 lmf_birth.1007.desc:0 "我们有来自[relative.GetCurrentLocation.GetTitle.GetNameNoTierNoTooltip]的消息。孩子没有怀上，但[relative.GetTitledFirstNameNoTooltip]似乎没有受到其他伤害。所以，说实话，整个丑闻就好像从未发生过一样。要不要叫[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('relative'))]回家？"
 lmf_birth.1008.t:0 "新发现！"
 lmf_birth.1008.desc.start:0 "我已经好几天没有我爱人的消息了，我开始担心起来。她已经厌倦我了吗？\n\n然后我得知了真相：[relative.GetFirstNameNoTooltip]被她的[relative.Custom2('LMF_RelationToMeShort', relative_liege )]带到了[convent.GetNameNoTooltip]的一个不为人知的小庄园，并被单独监禁。为什么？因为[relative_liege.GetSheHe]发现[relative.GetFirstNameNoTooltip]怀上了孩子——我的孩子。\n\n很明显，[relative_liege.GetTitledFirstNameNoTooltip]更希望[relative_liege.GetHerHis]的[relative_liege.Custom2('LMF_RelationToMeShort', relative )]不要再与我联系，"
 lmf_birth.1008.desc.secret:0 "假设[relative_liege.GetSheHe]甚至知道我是父亲，"
 lmf_birth.1008.desc.end:0 "但至于[relative.GetFirstNameNoTooltip]想要什么？我不知道，但肯定不会是这个！"
 lmf_birth.1008.a:0 "可惜我无能为力。"
 lmf_birth.1008.b:0 "带她过来，我不会把她留在[convent.GetNameNoTooltip]。"
 lmf_birth.1008.c:0 "无论是否得到她[relative.Custom2('LMF_RelationToMePossessive', relative_liege )]的允许，我都会救她并娶她为妻！"
 rival_took_secluded_family:0 "[TARGET_CHARACTER.GetShortUIName|U]绑架了[CHARACTER.GetShortUINamePossessiveNoTooltip]的[CHARACTER.Custom2('LMF_RelationToMeShort', TARGET_CHARACTER_2 )]，当时她正在隐修。"
 rival_took_secluded_family_corresponding:0 "[CHARACTER.GetShortUIName|U]绑架了[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]的[TARGET_CHARACTER.Custom2('LMF_RelationToMeShort', TARGET_CHARACTER_2 )]，当时她正在隐修。"
 lmf_birth.1009.t:0 "偷偷拐走"
 lmf_birth.1009.desc.start:0 "今天一早传来消息。\n\n[relative.GetFirstNameNoTooltip]刚刚在[convent.GetNameNoTooltip]的乡下安顿下来，就有士兵出现把她带走，护送到[baby_father.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。我不知道[baby_father.GetTitledFirstNameNoTooltip]是怎么发现我把她送到了哪里，但他已经暴露了自己是[relative.GetFirstNamePossessiveNoTooltip]的情人和她未出生孩子的父亲。\n\n"
 lmf_birth.1009.desc.elope:0 "据我所知，他们俩人一到[baby_father.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]就结婚了。虽然我们不用养这野种了，但这仍然是私奔，所有人都会知道这是在我不知情或未经我同意的情况下进行的！"
 lmf_birth.1009.desc.abduct:0 "现在，他们俩人安顿在[baby_father.GetTitledFirstNamePossessiveNoTooltip]的[baby_father.Custom('FortifiedBuilding')]里，在这起公然的绑架事件之后，这家伙甚至都没好意思娶她！"
 lmf_birth.1009.a:0 "她让自己的家族蒙羞。"
 lmf_birth.1101.t:0 "并发症"
 lmf_birth.1101.depressed.t:0 "夜太深"
 lmf_birth.1101.depressed.death.opening:0 "失去一个小家伙后……我不知道该怎么办。没有人愿意提及孩子的事，因为害怕把我弄哭，然而所有的不提及几乎比提及更糟糕。它已成为笼罩在我生活中的一片乌云，像一块裹尸布，遮蔽了它所触及的一切。\n\n"
 lmf_birth.1101.depressed.sick.child.opening:0 "孩子嚎啕大哭，似乎永远也哭不完。我不禁觉得这似乎是我的错，如果我早该知道、早该做些什么……它像黑暗一样笼罩着一切，玷污了它所触及的一切。\n\n"
 lmf_birth.1101.depressed.sick.opening:0 "病魔向我袭来，使我感到如此的虚弱无助。我本应该和我的新生宝宝在一起，但我却几乎没有力气移动。无论如何，这都是我的错，我知道。我应该更坚强。但阴影笼罩着它所触及的一切，我无法逃脱。\n\n"
 lmf_birth.1101.depressed.opening:0 "我应该感到欣喜，不是吗？我们生活中又添了一个新生命。这本应是一件好事。然而阴影却萦绕在我心头，让一切都黯淡无光，我似乎永远无法摆脱它。\n\n"
 lmf_birth.1101.opening:0 "孩子出生后，一切都变了。我能感觉到这一点。出血量多得不正常，而且我总是感到虚弱无力。\n\n"
 lmf_birth.1101.end.infertile:0 "医生在我的卧房中进进出出，每次都叹惜不已。他们说，虽然我可能会康复，但分娩引起的并发症可能意味着我再也无法生育了。"
 lmf_birth.1101.end.infertile.long:0 "医生在我的卧房中进进出出，每次都叹惜不已。他们说我会康复的，但分娩引起的并发症很严重。这需要时间，但他们似乎也不知道需要多久。"
 lmf_birth.1101.end.age:0 "医生说这一切都会过去的，这很正常……尤其是对我这个年龄的女人来说。能生下孩子就简直是个奇迹了。"
 lmf_birth.1101.end:0 "医生说这一切都会过去的，这很正常。我只是需要多等些时日。"
 lmf_birth.1101.a:0 "我希望他们错了。"
 lmf_birth.1101.b:0 "我希望他们是对的。"
 lmf_birth.1101.tt:0 "生育后的并发症"
