 game_concept_lmf_relatives_by_marriage_desc:0 "通过[marriage|E]获得的亲属关系通常会在亲属称谓前加上“姻亲”作为前缀。\n\n例如，#high 姻亲母亲#!和#high 姻亲父亲#!是你[spouse|E]的父母，而你则是他们的#high 姻亲儿子#!或#high 姻亲女儿#!。"
 invite_spouse_to_court_interaction:0 "邀请配偶来到宫廷"
 agot_court_outcome.2000.onlyliege:0 "[proposer.Custom('lmf_type_of_request')]，请求您允许我与深爱的[proposer_target.GetWomanMan]结婚。 "
 agot_court_outcome.2000.otherliege:0 "[proposer.Custom('lmf_type_of_request')]，请求您允许我去面见[proposer_target.GetHerHis]的领主[proposer_target_liege.GetTitledFirstName]，让我们能够结婚。"
 lmf_army.1190.t.maester:0 "学士帮帮忙"
 lmf_army.1190.start:0 "近来我发现医师帐篷的工作质量格外出色。当我去祝贺这位医生时，发现完成工作的其实是"
 lmf_army.1190.maester:0 "一位学士。\n\n此人自称[candidate.GetHerselfHimself]名叫[candidate.GetFirstNameNoTooltip]，当我对竟有一位学士在照料我的士兵这件事表示惊讶时，[candidate.GetSheHe]无奈地笑了笑，告诉我直到不久前[candidate.GetSheHe]还在为[enemy.GetTitledFirstNameNoTooltip]效力，后来两人闹翻，便决定去帮助[enemy.GetTitledFirstNamePossessiveNoTooltip]的对手。\n\n听到这番有意思的话，我惊讶地挑了挑眉，可[candidate.GetFirstNameNoTooltip]只是耸了耸肩。\n\n"
 lmf_army.1190.disgraced:0 "一位学士。\n\n此人自称[candidate.GetHerselfHimself]名叫[candidate.GetFirstNameNoTooltip]，当我对竟有一位学士在照料我的士兵这件事表示惊讶时，[candidate.GetSheHe]面色一沉，向我解释自己早已不是学士，这都拜[enemy.GetTitledFirstNameNoTooltip]的阴谋所赐，而[candidate.GetSheHe]为其效力。我委婉地追问更多细节，但不出所料，[candidate.GetSheHe]并不愿意谈起自己的那段不光彩经历……无论那经历究竟是什么。\n"
 lmf_army.1190.physician:0 "一位志愿者。\n\n此人自称[candidate.GetHerselfHimself]名叫[candidate.GetFirstNameNoTooltip]。当我提出[candidate.GetHerHis]这般才干本应服务于宫廷，而非待在某个营帐里时，[candidate.GetSheHe]笑了笑，解释说[candidate.GetSheHe]确实曾效力于[enemy.GetTitledFirstNameNoTooltip]，直到两人闹翻，显然，他们之间早已没什么情分可言了。\n\n"
 lmf_army.1190.end:0 "就目前而言，[candidate.GetSheHe]表示，[candidate.GetSheHe]很乐意在最需要[candidate.GetHerHis]技能的地方工作。"
 lmf_army.1190.c:0 "我会邀请[candidate.GetHerHim]和我一起回到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。[candidate.GetHerHis]的技能或许能派上用场！"
 lmf_heir.1662.desc.admiral:0 "带[your_heir.Custom('polite_gender_ref')]参观了码头，并向其讲解了保护王国贸易航线的细节，以及成为一名合格的[your_councillor.GetCouncilTitle|l]所需要具备的条件。\n\n"
 lmf_heir.1662.desc.castellan:0 "带[your_heir.Custom('polite_gender_ref')]参观了[ROOT.Char.Custom('FortifiedBuilding')]，并讲解了身为一名[your_councillor.GetCouncilTitle|l]辅佐君主所需注意的细节。\n\n"
 lmf_lover.1235.topliege.tt:0 "你请求[recipient.GetShortUIName]准许你将[secondary_recipient.GetShortUIName]合法化。"
 lmf_scheme.1031.stranger:0 "我请求您允许我与[proposer_target.GetFullName][proposer_target.Custom('polite_gender_ref')]成婚。\n\n"
 lmf_request_emotional:0 "我恳求"
 lmf_request_malicious:0 "因此，我坚持"
 I_CANNOT_BLACKMAIL_OVER_MY_OWN_INCESTUOUS_RELATIONSHIP:0 "你无法勒索你自己的乱伦关系"
 I_CANNOT_BLACKMAIL_OVER_MY_OWN_HOMOSEXUAL_RELATIONSHIP:0 "你无法勒索你自己的同性恋关系"
 renegotiated_betrothal_opinion:0 "重新商定的订婚"
 dinner_rival_reason_disputed_heritage:0 "我明显感觉到，[ROOT.Char.GetFirstNameNoTooltip]正在毫不掩饰地讥讽[second.GetFirstNamePossessiveNoTooltip]的可疑血统。"
 lmf_lover.1270.c:0 "我做的事情都是为了爱……"
 lmf_lover.1270.c.tt:0 "#EMP 你将[my_courtier.GetShortUIName]推出窗外，从下方庭院的高度坠落，[my_courtier.GetHerHim]十有八九活不成了！#!\n"
 lmf_lover.1270.c.death.tt:0 "#EMP [my_courtier.GetTitledFirstNameNoTooltip]显然死于意外坠落。#!"
 lmf_lover.1270.c.death.title:0 "[my_courtier.GetTitledFirstNameNoTooltip]死于坠落"
 lmf_lover.1270.c.death.desc:0 "[my_courtier.GetShortUIName]从卧室窗台坠落在庭院里后重伤不治。人们相信这是场意外。"
 lmf_lover.1270.c.death2.title:0 "[my_courtier.GetTitledFirstNameNoTooltip]死于坠落"
 lmf_lover.1270.c.death2.desc:0 "[my_courtier.GetShortUIName]没能从那次坠落中活下来。你的秘密没有泄露。"
 lmf_lover.1270.c.crippled.tt:0 "#EMP [my_courtier.GetTitledFirstNameNoTooltip]从坠落中幸存下来，但身负重伤还残废了。等[my_courtier.GetSheHe]康复，[my_courtier.GetSheHe|U]会告诉所有人发生了什么。#!"
 lmf_lover.1270.c.crippled.title:0 "[my_courtier.GetTitledFirstNameNoTooltip]在坠落中幸存下来"
 lmf_lover.1270.c.crippled.desc:0 "[my_courtier.GetShortUIName]中幸存下来，但身负重伤还残废了。等[my_courtier.GetSheHe]一康复就会将事情的经过告诉所有人！"
 lmf_lover.1270.c.survive.tt:0 "#EMP [my_courtier.GetTitledFirstNameNoTooltip]奇迹般地从坠落中幸存下来，且并未受重伤，还把事情的经过告诉了所有人。#!"
 lmf_lover.1270.c.survive.desc:0 "[my_courtier.GetShortUIName]奇迹般地从坠落中幸存下来，几乎毫发无损伤，还把事情的经过告诉了所有人！"
 lmf_lover.1271.t:0 "失宠"
 lmf_lover.1271.start:0 "我收到消息，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))]今天从[ROOT.Char.Custom('FortifiedBuilding')]的一个窗户落下去，直摔在了院子里，应该会要了[my_courtier.GetHerHis]的小命。"
 lmf_lover.1271.crippled:0 "相反，[my_courtier.Custom('GetLassLad')]想要尽力活下来……尽管很勉强。我了解到[my_courtier.GetHerHis]伤势严重，而且[my_courtier.GetSheHe]可能不能再行走了。"
 lmf_lover.1271.survived:0 "相反，[my_courtier.Custom('GetLassLad')]似乎只受了点伤，肯定能康复。啊，年轻人的韧性！"
 lmf_lover.1271.end:0 "更令人担忧的是[my_courtier.GetSheHe]#EMP 为何#!会坠落。[my_courtier.GetTitledFirstName]一能开口说话，就称自己当时在卧室里撞见了[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('murderer'))]与[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('lover'))]处于……难堪的亲密状态。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('murderer'))]为免私情败露，竟将[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('my_courtier'))]推出了窗外！这是一场为掩盖[murderer.GetHerHis]自身不检行为而蓄意策划的谋杀未遂案！"
 lmf_lover.1271.a:0 "难以置信！"
 lmf_lover.1271.a.tt1:0 "[scope:my_courtier.GetShortUINameNoTooltip]揭露了[scope:murderer.GetShortUINamePossessive]的情人秘密。"
 lmf_lover.1271.a.tt2:0 "[scope:my_courtier.GetShortUINameNoTooltip]揭露了[scope:murderer.GetShortUINamePossessive]的谋杀未遂秘密"
 diarch_succession_score.regency.spouse.pregnancy:0 "[ROOT.Char.GetLiege.Custom('GetLiegeYour')|U]的配偶已准备好与[CharYouHerHim(ROOT.Char.GetLiege)]一同旅行"
 lmf_heir.1604.t:0 "为何我们处于战争？"
 lmf_lover.1165.desc.public:0 "或许是因为我们的私情人尽皆知，也就没必要遮掩了，但我觉得事情不止于此。\n\n"
 lmf_lover.1225.public:0 "我写信是想告诉你，我们亲爱的[my_bastard.Custom('polite_gender_ref')]，[my_bastard.GetFirstName]，正在一天天长高长大。"
 lmf_lover.1275.desc.landed:0 "我在[lover.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的宫廷里收买了几名仆人，让他们注意[lover.GetHerHim]的动向。"
 ASK_TO_ai_legitimize_bastard_interaction_liege:0 "我谦卑地请求您合法化我的[actor.Custom2('RelationToMe', SCOPE.sC('secondary_recipient'))]，[secondary_recipient.GetShortUIName]。"