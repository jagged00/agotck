 lmf_heir.1655.desc.away:0 "虽然我没亲眼见过，但我听说"
 lmf_heir.1655.desc.busy:0 "虽然我和[your_heir.GetHerHim]相处的时间不长，但我听说"
 lmf_heir.1655.desc.there:0 "我很高兴地注意到"
 lmf_heir.1655.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]几周内，表现得安静又尽职。\n\n[ROOT.Char.Custom('FortifiedBuilding')]的仆人说[your_heir.GetTitledFirstNameNoTooltip]总是很有礼貌，在别人跟他说话时总会做出回应，并且非常遵守[ROOT.Char.Custom('FortifiedBuilding')]客人的风俗习惯。\n\n虽然[your_heir.GetSheHe]才刚刚安顿下来，后面再看看[your_heir.GetHerHis]的表现如何，但这无疑是一个好开始。"
 lmf_heir.1655.a:0 "[your_heir.GetSheHe]不是外向的人吗？"
 lmf_heir.1655.tt:0 "#EMP [your_heir.GetTitledFirstNameNoTooltip]在远游期间会有更好的表现。#!"
