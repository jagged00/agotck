 game_concept_lmf_heir_training:0 "继承人培训 "
 game_concept_lmf_heir_training_desc:0 "从12岁开始，统治者的[player_heir|E]将获得[GetTrait('heir_in_training').GetName( GetNullCharacter )][trait|E]，并开始接受统治和治国之道教育\n\n$EFFECT_LIST_BULLET$这项训练要求继承人在统治者的[court|E]中，只要继承人和他们的[guardian|E]（或[liege|E]，并且继承人成年）都在，并且身体健康，训练则每年进行一次。\n\n$EFFECT_LIST_BULLET$训练进度取决于继承人及其监护人的[learning|E]、继承人的年龄（年龄越大训练进度越慢），并受智力、勤奋和耐心等多方面因素的影响。\n\n$EFFECT_LIST_BULLET$一旦继承人拥有[GetTrait('education_heir_training_1').GetName( GetNullCharacter )]特质，则被视为“训练有素”，即使获得头衔，该特质也会被保留。如果他们继续训练，该特质最终会一直发展为[GetTrait('education_heir_training_4').GetName( GetNullCharacter )]。\n\n$EFFECT_LIST_BULLET$当继承人不再与领主为同一宫廷时（例如获得头衔），训练就会停止。"
 game_concept_lmf_lover_rating:0 "情人评分"
 game_concept_lmf_lover_rating_desc:0 "每当一个角色成为你的[lover|E]或[soulmate|E]时，你们的关系将获得一个评分。这个评分反映了你对这段感情的强烈程度，将深刻影响你收到的与情人相关的事件类型。\n\n这个评分会随时间而波动，但提高它需要时间和努力。\n\n评分从高到低依次为：\n\n$EFFECT_LIST_BULLET$#difficulty_hard 死心塌地#!：[soulmate|E]的初始评分，在这个评分下，[lover|E]可能升级为[soulmate|E]\n$EFFECT_LIST_BULLET$#difficulty_hard 如胶似漆#!\n$EFFECT_LIST_BULLET$#difficulty_hard 情深意重#!：[lover|E]的初始评分，在这个评分下，[soulmate|E]可能降级为[lover|E]\n$EFFECT_LIST_BULLET$#difficulty_hard 情投意合#!：[soulmate|E]肯定会降级为[lover|E]\n$EFFECT_LIST_BULLET$#difficulty_hard 貌合神离#!\n$EFFECT_LIST_BULLET$#difficulty_hard 劳燕分飞#!：在这个评分下，这段关系将随时结束"
