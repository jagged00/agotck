 lmf_heir.1653.desc.there:0 "我有些不悦地注意到"
 lmf_heir.1653.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]那好几周几乎没有露面。\n\n[ROOT.Char.Custom('FortifiedBuilding')]的仆人说[your_heir.Custom('polite_gender_ref')]大部分时间都把[your_heir.GetHerHis]锁在房间里，要么发呆，要么读书，即使[your_heir.GetTitledFirstNameNoTooltip]出来了， 也大多会避开所有人。我不相信[your_heir.GetSheHe]曾在宫廷上露过面。\n\n虽然[your_heir.GetSheHe]才刚刚安顿下来，后面再看看[your_heir.GetHerHis]的表现如何，但这无疑是一个不好开始。"
 lmf_heir.1653.a:0 "[your_heir.GetSheHe]不是外向的人吗？"
