 tutor_teach_languages:0 "直接语言教学"
 tutor_teach_languages_desc:0 "该角色负责决定你的家庭成员将接受哪些语言的辅导，不需要你来干预。"
 tutor_teach_languages_tt:0 "家中成员于宫廷内的语言教学将自动进行。\n\n当[aptitude|E]达到较高水平时，宫廷中可能会不时引荐一些掌握你尚未涉及的重要语言的廷臣。"
 agot_court_ongoing.court_start_song.intro.0503.relative.desc:0 "我翻出一首经典[target.GetCulture.GetNameNoTooltip]情歌，非常适合[target.GetFirstName]！我反复练习，一切都必须完美！\n\n我发现我的[owner.Custom2('LMF_RelationToMeShort', SCOPE.sC('target'))]在[target_location.GetNameNoTooltip]花园里散步，[target.GetHerHis]身边所谓的“朋友”，我心如刀绞，此情此景我只想半跪在[target.GetHerHim]面前放声歌唱。"
 agot_court_ongoing.court_start_song.success.0503.relative.desc:0 "\n\n听到我的歌谣，[target.GetFirstNamePossessiveNoTooltip]脸颊瞬间宛如石榴一般，但[target.GetSheHe]没有打断我。[target.GetHerHis|U]的同伴们都显，脸上的表情说不出是高兴还是嫉妒，但这无疑是个好兆头！\n\n[target.GetFirstNameNoTooltip]说：“[target.Custom2('LMF_RelationToMeShort', SCOPE.sC('owner'))]，这首歌……真……不错……”说罢[target.GetSheHe]就匆匆离开了。[target.GetHerHis|U]的朋友们也迅速跟上。我颤抖着双腿站起来，看着他们离开，心跳得比以往任何时候都厉害。"
 agot_court_ongoing.court_start_sneaky_love_letter.success.spouse.0503.desc:0 "\n\n等待总是令人难以忍受。对拒绝的恐惧使我几乎要吐了出来！终于，[target.GetHerHis]回信到了我手上，我用颤抖的双手将封条撕开。\n\n“[owner.Custom2('RelationToMeAddress', ROOT.Char)]，你的甜言蜜语令我心中欢喜。随着时间的推移，也许我们自婚姻缔结的纽带会变成爱的纽带？也许我们会看到那个时候的道路。谨启，[target.GetFirstNameNoTooltip]。”"
 agot_court_ongoing.court_start_sneaky_love_letter.success.relative.0503.desc:0 "\n\n等待总是令人难以忍受。对拒绝的恐惧使我几乎要吐了出来！终于，[target.GetHerHis]回信到了我手上，我用颤抖的双手将封条撕开。\n\n“你的话让我大吃一惊，[owner.Custom2('RelationToMeAddress', ROOT.Char)]，但我承认它们还是很不错的。我要把你的信珍藏起来，高兴的时候就拿出来读一读。你的[owner.Custom2('LMF_RelationToMeShort', SCOPE.sC('target'))]，[target.GetFirstNameNoTooltip]。”"
 agot_court_ongoing.public_regular_rejection.0503.desc:0 "[target.GetFirstNamePossessiveNoTooltip]的回应让我大失所望。“停止这种荒谬的公开示爱，[ROOT.Char.Custom2('RelationToMeAddress', target)]。别再让自己难堪了。我对你的关心毫无兴趣，将来也不会！\""
 agot_court_ongoing.written_regular_rejection.0503.desc:0 "\n\n[target.GetFirstNamePossessiveNoTooltip]回复迅速而明确。“我收到了你的便条，[ROOT.Char.Custom2('RelationToMeAddress', target)], 如果真的是你所想的，而不是某个恶棍开的残酷玩笑。如果是真的，那么我要求你立即停止这种愚蠢的努力。我对你没有兴趣，并且永远不会有。"
 agot_court_ongoing.1000.t:1 "$court_event_title$不自在的舞蹈"
 agot_court_ongoing.1000.desc:0 "在[location.GetNameNoTooltip]宴会上，为了拉近与[target.GetFirstNameNoTooltip]的距离，乐师们奏起了欢快的乐曲，舞会开始了。我眼神不断搜寻着我心仪的对象，但为时已晚……[target.GetSheHe]已经在和[social_bore.GetTitledFirstNameNoTooltip]。跳舞了，不过看来这并不是自愿的，因为[target.GetSheHe]不仅不太喜欢[social_bore.GetTitledFirstNameNoTooltip]而且[social_bore.Custom('polite_gender_ref')]跳得也很糟糕，[target.GetFirstNameNoTooltip]反而又不好意思拒绝，也无法随意离开。[target.GetSheHe]显然很是无语。\n\n[target.GetFirstNameNoTooltip]隔着舞池看着我，用眼神祈求着[target.GetHerHis]希望我把[target.GetHerHis]从绝望中拯救。"
 agot_court_ongoing.1000.a:0 "尝试优雅地切入进去。"
 agot_court_ongoing.1000.a.success:0 "你切入进去，成功地与[target.GetFirstNameNoTooltip]共舞。"
 agot_court_ongoing.1000.a.failure:0 "[social_bore.GetTitledFirstNameNoTooltip]拒绝了，使局面变得更加尴尬"
 agot_court_ongoing.1000.b:0 "恐怕，[target.GetFirstNameNoTooltip]只能靠[target.GetHerHis]自己了。"
 agot_court_ongoing.1300.t:0 "$court_event_title$文学品味"
 agot_court_ongoing.1300.desc:0 "一个阳光明媚的下午，我去寻找[target.GetFirstNameNoTooltip]，发现[target.GetHerHim]正在[location.GetNameNoTooltip]的院子里看书。当我走近时，我注意到那本书很厚，看[target.GetFirstNameNoTooltip]脸上的表情似乎并不是很喜欢，[target.GetSheHe]发现我靠近后放下了书，对我抱怨这书晦涩难懂起来。\n\n[target.GetSheHe]说完漫不经心地问我是否有更好的推荐时，一下子就把我问住了。"
 agot_court_ongoing.1300.a:0 "推荐一些我认为[target.GetSheHe]可能会喜欢的东西。"
 agot_court_ongoing.1300.a.success:0 "[target.GetSheHe|U]喜欢你的推荐！"
 agot_court_ongoing.1300.a.failure:0 "[target.GetSheHe|U]不感兴趣"
 agot_court_ongoing.1300.b:0 "找借口安慰[target.GetHerHim]……"
 agot_court_ongoing.1310.t:0 "对打练习"
 agot_court_ongoing.1310.opening.martial:0 "我正在庭院里和骑士们对练，发现[target.GetTitledFirstNameNoTooltip]也在不远处。"
 agot_court_ongoing.1310.opening:0 "我经过庭院时，发现[target.GetTitledFirstNameNoTooltip]正在不远处与士兵们对练。"
 agot_court_ongoing.1310.mid:09 "[target.GetSheHe|U]对敌人展开了猛攻，我看到[target.GetHerHis]的额头上渗出了汗珠，真是让人印象深刻。\n\n希望[target.GetSheHe]还没有注意到我，也许这就是我接近的机会？"
 agot_court_ongoing.1310.ending.martial:0 "我们可以切磋技艺，让[target.GetHerHim]对我刮目相看，甚至给[target.GetHerHim]来上几下……"
 agot_court_ongoing.1310.ending.spectator:0 "我不喜欢剑术，但我可以为[target.GetHerHim]加油。也许比武结束后，我还有机会和[target.GetHerHim]一起喝酒……"
 agot_court_ongoing.1310.ending:0 "他们不允[owner.GetWomanMan]参加比赛，但他们不能剥夺我观看的机会。或许，我还可以向[target.GetTitledFirstNameNoTooltip]施以恩惠，让[target.GetHerHim]彻底着迷……"
 agot_court_ongoing.1310.a:0 "加入对练！"
 agot_court_ongoing.1310.b:0 "在一旁为[target.GetHerHim]加油。"
 agot_court_ongoing.1310.c:0 "是时候施展魅力了！"
 agot_court_ongoing.1310.d:0 "在[target.GetSheHe]看到我之前赶紧过去……"
 agot_court_ongoing.1310.a.success:0 "[target.GetSheHe|U]被你的技艺所折服"
 agot_court_ongoing.1310.a.failure:0 "你在对练中出丑"
 agot_court_ongoing.1310.b.success:0 "你的魅力赢得了[target.GetSheHe|U]的芳心"
 agot_court_ongoing.1310.b.failure:0 "有点尴尬……"
 agot_court_outcome.1001.c:0 "我们的结合必须由[owner.GetFaith.FertilityGodName]见证！"
 agot_court_outcome.1001.d:0 "无论如何，我们总有一天会结婚的！"
 agot_court_outcome.1003.b:0 "我们亲吻，甜如蜜。"
 agot_court_outcome_seek_permission_both_to_marry_tt:0 "[proposer.GetTitledFirstNameNoTooltip]必须首先征得[proposer.GetHerHis]领主[proposer_liege.GetTitledFirstName]和[proposer_target.GetTitledFirstNamePossessiveNoTooltip]的领主[proposer_target_liege.GetTitledFirstName]，双方同意。"
 agot_court_outcome_seek_permission_proposer_both_liege_to_marry_tt:0 "[proposer.GetTitledFirstNameNoTooltip]必须先征得领主[proposer_liege.GetTitledFirstName]的同意才能结婚。"
 agot_court_outcome_seek_permission_proposer_own_liege_to_marry_tt:0 "[proposer.GetTitledFirstNameNoTooltip]必须先征得[proposer.GetHerHis]领主[proposer_liege.GetTitledFirstName]的同意才能结婚。"
 agot_court_outcome_seek_permission_proposer_target_liege_to_marry_tt:0 "[proposer.GetTitledFirstNameNoTooltip]必须先征得[proposer_target.GetTitledFirstNamePossessiveNoTooltip]领主[proposer_target_liege.GetTitledFirstName]的同意才能结婚。"
 agot_court_outcome.1105.a:0 "[owner.GetSheHe|U]向我求婚，我接受了！"
 agot_court_outcome.1105.b:0 "[owner.GetSheHe|U]承诺过，无论如何，我们总有一天会结婚的！"
 agot_court_outcome_elope_promise_tt:0 "[owner.GetFirstNameNoTooltip]郑重承诺，将尽快开始与[target.GetFirstNameNoTooltip]私奔的密谋！"
 agot_court_outcome.1200.t:0 "大手笔"
 agot_court_outcome.1200.courtier.desc:0 "当我在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]宫廷时，我在围观的人群中发现了[target.GetTitledFirstNameNoTooltip]，看到[target.GetHerHim]，我的心也跟着跳了起来。\n\n"
 agot_court_outcome.1200.ruler.desc:0 "我在[target.GetTitledFirstNamePossessiveNoTooltip]的[target.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]宫廷上呆了一段时间，却没有见到[target.GetHerHim]。忽然之间，我看到[target.GetHerHim]出现在众人面前，我的心也雀跃不已。\n\n"
 agot_court_outcome.1200.desc:0 "我听说[target.GetTitledFirstNamePossessiveNoTooltip]可能会在[target_host.Custom2('NamePossessiveCharacterIntroduction', target)]宫廷上出现，我匆匆赶过去，很快喜悦之心充斥我全身，因为我在围观的人群中发现我的[target.Custom('LoverPetName')]。\n\n"
 agot_court_outcome.1200.end.desc:0 "此刻我突然想到，如果我当着所有人的面，当场宣布我对[target.GetHerHim]的爱会怎么样？也许可能会让我们俩都难堪，但这个举动可能让[target.GetTitledFirstNameNoTooltip]相信我的爱是真情实意的。"
 agot_court_outcome.1200.a:0 "我该站出来，大胆示爱！"
 agot_court_outcome.1200.b:0 "不，我不能做这种尴尬的行为……"
 agot_court_outcome.1201.start.desc:0 "我深吸一口气，走进人群，走到被吓了一跳的[target.GetTitledFirstNameNoTooltip]面前，握住[target.GetHerHis]的手，所有人的目光都转向了我们。我提高嗓门，大声向[target.Custom('polite_gender_ref')]示爱。"
 agot_court_outcome.1201.diplomacy.desc:0 "我不由自主地说出了这番话，大声又简洁。周围的女士们欣喜若狂。男人们羡慕得抿起了嘴。[target.GetTitledFirstNameNoTooltip]愣了一下很快就微笑着回应时，我发现说出甜言蜜语再简单不过。\n\n"
 agot_court_outcome.1201.desc:0 "我承认，我并未仔细斟酌要说的话，也不是个巧舌如簧的[owner.GetWomanMan]。人群大多沉默，只有零星尴尬的咳嗽声。即便如此，[target.GetTitledFirstNameNoTooltip]还是笑了，[target.GetHerHim]清楚我的意图是真诚的。"
 agot_court_outcome.1201.end.desc:0 "不久之后，[target.GetSheHe]把我带到一个隐秘的地方，斥责我的鲁莽愚蠢，尽管[target.GetHerHis]一直在一旁抱怨，但我几乎没有听近[target.GetHerHim]的话，因为我当时就知道，只要我愿意，[target.GetHerHis]的心终归于我。"
 agot_court_outcome.1201.b:0 "一个甜蜜的长吻，结束这一切"
 agot_court_outcome.1201.c:0 "情急之下，提出结婚"
 agot_court_outcome.1202.diplomacy.desc:0 "\n\n尽管我口若悬河，滔滔不绝，但我马上就会发现我的选择很糟糕……"
 agot_court_outcome.1202.desc:0 "\n\n我立刻意识到自己做了一个蠢决定，我的话磕磕绊绊，看到[target.GetTitledFirstNamePossessiveNoTooltip]表情愈发震惊时，我慌了神，现在情况变得更糟。"
 agot_court_outcome.1202.end:0 "周围的人群变得鸦雀无声，只有几声尴尬的咳嗽。[target.GetTitledFirstNameNoTooltip]把[target.GetHerHis]的手从我手中抽出，紧张地向旁人解释，[target.GetSheHe]不知道我为什么会说出这样的话。当[target.GetSheHe]转身离开时，我只感到一阵冰冷，一切都结束了……"
 agot_court_outcome.1202.a:0 "我真是自作自受。"
 agot_court_outcome.1203.start.desc:0 "我在宫廷中一边忙着自己的事情，一边和一位贵族闲聊，突然，四周人群散开了。我疑惑地转过身，发现[owner.GetTitledFirstNameNoTooltip]正向我走来。\n\n[owner.GetSheHe|U]把手伸出握住我的手，并扬声向所有人宣布[owner.GetHerHis]永恒的爱。"
 agot_court_outcome.1203.diplomacy.desc:0 "[owner.GetHerHis|U]的话语甜美动听，虽然我看得出这只是一时兴起，但似乎是经过精心练习的。周围的女士们脸上洋溢着痴笑，男士们羡慕得直抿嘴，我的心彻底融化了。\n\n"
 agot_court_outcome.1203.desc:0 "显然，[owner.GetTitledFirstNameNoTooltip]并未事先准备过此事。[owner.GetHerHis|U]言辞笨拙，语无伦次，随着[owner.GetSheHe]越来越慌乱，情况愈发糟糕。人群沉默了下来，只有偶尔几声尴尬的咳嗽。即便如此，这也不重要了，因为我知道[owner.GetHerHis]的本意是好的。我的心彻底软了。"
 agot_court_outcome.1203.end.desc:0 "很快，我把[owner.Custom('polite_gender_ref')]带到一个隐秘的地方，责备[owner.GetHerHim]的鲁莽愚蠢，让我们俩尴尬！不过，我怀疑[owner.GetSheHe]并没有听进我说的话，唉，谁让我爱上了[owner.GetHerHis]。"
 agot_court_outcome.1300.t:0 "花园聚会"
 agot_court_outcome.1300.same.desc:0 "我已经有一段时间没有看到我的[target.Custom('LoverPetName')]了，所以我去寻找[target.GetHerHim]。天色渐暗，我最终在[target.GetCurrentLocation.GetNameNoTooltip]的花园里找到了独自徘徊的[target.GetHerHim]。"
 agot_court_outcome.1300.desc:0 "我已有一阵子没见到我的[target.Custom('LoverPetName')]了，于是前往[target.GetCurrentLocation.GetNameNoTooltip]，希望能找到[target.GetHerHim]。这费了些功夫，当日色渐暮时，我终于发现[target.GetHerHim]独自漫步在广阔的花园中。"
 agot_court_outcome.1300.end.desc:0 "[target.GetSheHe|U]似乎陷入了沉思，也许在想着什么要紧的事情，甚至在等什么人，不过此刻，我悬着的心终于放了下来。\n\n我突然想到，在这个私密的地方，也许是表白爱意的最好机会。如果我现在都不能冒着这样的尴尬去表白，那话还有什么时候值得呢？"
 agot_court_outcome.1300.a:0 "我鼓起勇气向前迈步……"
 agot_court_outcome.1301.desc:0 "我的担心似乎是多余的，[target.GetFirstNameNoTooltip]见到我很高兴，并承认[target.GetSheHe]也一直在想我。黄昏渐渐地消失，黑夜露出头来，我们独自在花园里漫步，讨论了星星、花朵、过去和未来，[target.GetHerHis]的话语让我陶醉。\n\n当我们走到一个僻静的角落发现了一条小溪，月光照样在水上，我想我们确实是想爱了。"
 agot_court_outcome.1302.start.desc:0 "我走出角落，向[target.GetFirstNameNoTooltip]打招呼时，我发现我翻了一个错误。[target.GetSheHe|U]愣住然后磕磕绊绊地道歉，我试图打破僵局，把接下来生硬的对话变得更有吸引力。[target.GetSheHe|U]一直试图左右言他，没过多久我就发现了原因。\n\n"
 agot_court_outcome.1302.target.desc:0 "从角落又出现了一个[targets_meeting.Custom('polite_gender_ref')]。当[targets_meeting.GetTitledFirstName]加入我们的谈话时，我从他们两人的眼神中意识到，[target.GetTitledFirstNameNoTooltip]一直在这里等着[targets_meeting.GetHerHim]，而不是我！！他们可能想讨论什么，我不知道，但现在显然我是不受欢迎的闯入者。\n\n"
 agot_court_outcome.1302.desc:0 "一个仆人从阴影中现身。这个年轻人小心翼翼地走近我们，显然不知所措。起初，我对他打断我们感到不悦，但我从这仆人和[target.GetTitledFirstNameNoTooltip]之间的眼神交流看出，[target.GetSheHe]一直在这里等着他，而不是我。我不知道[target.GetSheHe]要和这个仆人谈什么事，但显然那很重要，而我才是那个不受欢迎的闯入者。\n\n"
 agot_court_outcome.1302.end:0 "最后，我再也无法忍受这种紧张气氛了。我礼貌地结束话题，离开了花园，[target.GetTitledFirstNameNoTooltip]听见我要走时，也松了一口气。从那以后，我再也没有见过[target.GetHerHim]，也许这样最好。"
 agot_court_outcome.1303.desc:0 "在一个傍晚，我漫步在[target.GetCurrentLocation.GetNameNoTooltip]的大花园里，很快赤红的黄昏让位于黑夜的满天繁星，我的思绪飘向了[owner.GetTitledFirstNameNoTooltip]。然后就像被召唤一样，[owner.GetTitledFirstNameNoTooltip][owner.GetHerselfHimself]出现了。\n\n[owner.Custom('polite_gender_ref')]仿佛从梦境中走来，抓起我的手，然后一起漫步花园，谈论星星、花朵、过去和未来，具体什么我几乎都不记得了。但耳边听到[owner.GetHerHis]的声音，就会让我感到心醉神迷，[owner.GetSheHe]亦有同感。\n\n当我们走到一个僻静的角落，发现了一条小溪，月光洒在水上，我想我们确实是相爱了。"
 agot_court_outcome.1400.t:0 "深夜"
 agot_court_outcome.1400.desc:0 "我和[target.GetFirstNameNoTooltip]的婚姻时好时坏，但最近情况有所不同。争吵时有发生，大多是为了一些鸡毛蒜皮的小事，但吵着吵着就变成了互相大叫……我怎么也想不通这是为什么。事情一直进展得很顺利，我也一直在尽力赢得[target.GetHerHis]的心！\n\n现在，我在[target.GetHerHim]卧室门口看着[target.GetHerHis]时，我在想，是不是可以一劳永逸地解决这个问题？"
 agot_court_outcome.1400.a:0 "时机已到"
 agot_court_outcome.1400.b:0 "还是顺其自然吧"
 agot_court_outcome.1401.desc:0 "真是如释重负！\n\n起初，[target.GetFirstNameNoTooltip]迟迟不肯开口，但在我的劝说下，她最终承认，吵架是因为[target.GetSheHe]对我们的婚姻、未来，以及我追求[target.GetHerHis]的意义产生了怀疑……随后我直截了当地向[target.GetHerHim]保证，我的追求没有任何目的，我希望我们的婚姻幸福美满，就这么简单。\n\n[target.GetSheHe]听完我的话，脸上露出了笑容。随后我们谈了几个小时，一直到深夜。我们手牵着手，向对方表达了之前不敢说的话。不是所有的婚姻都充满爱，但我们恰好就充满了爱。"
 agot_court_outcome.1402.desc:0 "我选择的时机再糟糕不过了。\n\n[target.GetFirstNameNoTooltip]对我试图化解这种紧张关系的努力感到愤怒，[target.GetSheHe]最后承认这一切都是因为对我感到困惑。[target.GetWomanMan]说道：“你在追求一个已经嫁给你的人！”\n\n我试图解释，我希望我们的结合是爱情的结合，但[target.GetFirstNameNoTooltip]对此表示反对。当我追问[target.GetSheHe]是否对其他人有感觉，还是因为在[target.GetHerHis]心里没有我的位置。很快，我们又吵了一架，持续了好几个小时，直到最后我独自走出寝室，事情毫无进展。"
 agot_court_outcome.1402.a:0 "就这样吧！"
 agot_court_outcome.1403.desc:0 "我和[owner.GetFirstNameNoTooltip]的婚姻时好时坏，但最近情况有所不同。争吵时有发生，大多是为了一些鸡毛蒜皮的小事，但吵着吵着就变成了互相大叫……我怎么也想不通这是为什么。[owner.GetSheHe|U]最近一直莫名其妙地向我表示好感和追求，但为什么[owner.GetSheHe]要如此努力地赢得已经结婚的[target.GetWomanMan]的心？\n\n今晚，[owner.GetSheHe]来到我的寝宫，牵起了我的手。\n\n[owner.GetSheHe|U]直言不讳地向我保证，[owner.GetHerHis]的企图并非别有用心。[owner.GetHerHis]只希望我们的婚姻是爱情的婚姻。我如释重负，之后我们聊了起来一直到深夜。我们手牵着手，向对方表达了之前不敢说的话。不是所有的婚姻都充满爱，但我们恰好就充满了爱。"
 agot_court_outcome.2000.family.opening:0 "[proposer.Custom2('GreetingToFamilyPositive', ROOT.Char )]"
 agot_court_outcome.2000.courtier.opening:0 "[proposer.Custom2('GreetingToLiegePositive', ROOT.Char )]"
 agot_court_outcome.2000.opening:0 "[proposer.Custom2('GreetingToForeignRulerPositive', ROOT.Char )]"
 agot_court_outcome.2000.my.relation:0 "近几个月来，我一直与你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))][proposer_target.GetTitledFirstName]保持着贞洁而适当的求爱关系，并逐渐将[proposer_target.GetHerHim]视为真正的灵魂伴侣。\n\n"
 agot_court_outcome.2000.other.relation:0 "近几个月来，我一直与你的[proposer_target_liege.GetTitledFirstNamePossessiveNoTooltip][proposer_target_liege.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer_target'))]，[proposer_target.GetTitledFirstName]保持着贞洁而适当的求爱关系，并逐渐将[proposer_target.GetHerHim]视为真正的灵魂伴侣。\n\n"
 agot_court_outcome.2000.both.my.courtier:0 "近几个月来，我一直与宫廷里的[proposer_target.Custom('polite_gender_ref')]，即[proposer_target.GetTitledFirstName]保持着贞洁而适当的求爱关系，并逐渐将[proposer_target.GetHerHim]视为真正的灵魂伴侣。\n\n"
 agot_court_outcome.2000.my.courtier:0 "近几个月来，我一直与你宫廷里的[proposer_target.Custom('polite_gender_ref')]，[proposer_target.GetTitledFirstName]保持着贞洁而适当的求爱关系，并逐渐将[proposer_target.GetHerHim]视为真正的灵魂伴侣。\n\n"
 agot_court_outcome.2000.stranger:0 "近几个月来，我一直与一位名叫[proposer_target.GetFullName]的[proposer_target.Custom('polite_gender_ref')]保持着贞洁而适当的求爱关系，并逐渐将[proposer_target.GetHerHim]视为真正的灵魂伴侣。\n\n"
 agot_court_outcome.2000.second.liege:0 "既然我的领主[proposer_liege.GetTitledFirstName]已经同意，"
 agot_court_outcome.2000.proposer.family.willnotwed:0 "作为一个忠诚的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer'))]，其被许诺有机会遵循[proposer.GetHerHis]的内心，"
 agot_court_outcome.2000.proposer.family:0 "作为您忠实的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('proposer'))]，"
 agot_court_outcome.2000.proposer.dynasty:0 "作为[ROOT.Char.GetDynasty.GetBaseNameNoTooltip]宗族的忠实成员，"
 agot_court_outcome.2000.proposer.courtier:0 "作为您忠实的臣民，"
 agot_court_outcome.2000.proposer.guest:0 "作为你的宾客，并希望将来成为你的宫廷成员，"
 agot_court_outcome.2000.a:0 "准了！"
 agot_court_outcome.2000.b:0 "绝不！"
 agot_court_outcome.2000.a.seek.permission.tt:0 "[proposer.GetTitledFirstNameNoTooltip]将寻求[proposer_target_liege.GetTitledFirstName]的许可"
 agot_court_outcome.2000.a.permission.granted.tt:0 "[proposer_target_liege.GetTitledFirstNameNoTooltip]准许"
 agot_court_outcome.2000.a.permission.refused.tt:0 "[proposer_target_liege.GetTitledFirstNameNoTooltip]拒绝了[proposer.GetHerHim]"
 agot_court_outcome.2000.b.tt:0 "[proposer.GetTitledFirstNameNoTooltip]和[proposer_target.GetTitledFirstNameNoTooltip]可能会继续交往，甚至可能私奔"
 agot_court_outcome.2001.opening:0 "[proposer_liege.Custom2('GreetingToFamilyPositive', ROOT.Char )]"
 agot_court_outcome.2001.desc:0 "很好，我允许你与[proposer_target.GetTitledFirstNameNoTooltip]结婚，前提是[proposer_target_liege.GetTitledFirstName]也必须得到[proposer_target_liege.GetHerHis]的允许。"
 agot_court_outcome.2001.a:0 "去找[proposer_target_liege.GetTitledFirstNameNoTooltip]！"
 agot_court_outcome.2003.t:0 "准了！"
 agot_court_outcome.2003.proposer:0 "好消息！[permission_granter.GetTitledFirstNameNoTooltip]允许[permission_granter.GetHerHis]我和[proposer_target.GetTitledFirstNameNoTooltip]结婚！这是在[proposer.GetCurrentLocation.GetName]当地的[proposer.GetFaith.HouseOfWorship]举行的一个小型仪式，由一位[proposer.GetFaith.DevoteeNeuterPlural]主持，他对这一突如其来的事件感到困惑……但我不在乎！但我不在乎！我可以和我的一生挚爱结婚！这就够了！"
 agot_court_outcome.2003.proposer_target:0 "好消息！[proposer.GetTitledFirstNameNoTooltip]已获得许可，允许我和[proposer.GetSheHe]结婚！婚礼在[proposer_target.GetCurrentLocation.GetName]当地的[proposer_target.GetFaith.HouseOfWorship]举行，仪式由一位[proposer_target.GetFaith.DevoteeNeuterPlural]主持。我准备和我的挚爱结婚，一切都结束了！"
 agot_court_outcome.2003.a:0 "我永远不会忘记这一天！"
 agot_court_outcome.2004.t:0 "拒绝许可！"
 agot_court_outcome.2004.desc:0 "[permission_refuser.GetTitledFirstNameNoTooltip]拒绝同意这门婚事，而[permission_refuser.GetWomanMan]甚至连理由都不说！我们的计划泡汤了。现在我和[proposer_target.GetTitledFirstNameNoTooltip]该如何是好？"
 agot_court_outcome.2004.a:0 "现在只剩下私奔这个选择了！"
 agot_court_outcome.2004.b:0 "无论结婚与否，我们的爱永不消逝！"
 agot_court_outcome.2004.c:0 "如果我们不能在一起，那还有什么意义呢？"
 agot_court_outcome.2004.b.tt:0 "你们俩将是灵魂伴侣，即使没有结婚"
 agot_court_outcome.2004.c.tt:0 "分别前的最后一吻……"
 agot_court_outcome.2005.elope:0 "[proposer.GetTitledFirstNameNoTooltip]来找我，其刚从[permission_refuser.GetTitledFirstNameNoTooltip]那里回来……看来结果并不好。[permission_refuser.GetTitledFirstNameNoTooltip]没有批准我们结婚！[proposer.GetFirstNameNoTooltip]并不气馁，[proposer.GetSheHe]拉着我的手发誓不会让这件事被阻碍。[proposer.GetSheHe]对着我发誓：“即使要花上千百年，我也会来找你，不管别人怎么说，我们都要结婚！”"
 agot_court_outcome.2005.continue:0 "[proposer.GetTitledFirstNameNoTooltip]来找我，其刚从[permission_refuser.GetTitledFirstNameNoTooltip]那里回来……看来结果并不好。[permission_refuser.GetTitledFirstNameNoTooltip]没有批准我们结婚！[proposer.GetFirstNameNoTooltip]把我搂在[proposer.GetSheHe|U]怀里，吻着我的嘴唇，并信誓旦旦地保证：“没事的，不管结婚与否，不管别人怎么说，我们的爱都还在！”"
 agot_court_outcome.2005.breakup:0 "[proposer.GetTitledFirstNameNoTooltip]来找我，其刚从[permission_refuser.GetTitledFirstNameNoTooltip]那里回来……看来结果并不好。[permission_refuser.GetTitledFirstNameNoTooltip]没有批准我们结婚！[proposer.GetFirstNameNoTooltip]唉声叹气道：“如果我们必须秘密在一起，那在一起还有什么意义呢？不，我无法忍受”。就这样，[proposer.GetSheHe]最后一次甜蜜地吻了我，然后永远地离开了。"
 agot_court_outcome.2005.a:0 "“我会等你的，我的爱人！”"
 agot_court_outcome.2005.b:0 "“我此时此地需要你陪伴，我的爱人！”"
 agot_court_outcome.2005.c:0 "唉，这最后一吻将支撑我……"
 agot_court_outcome.2010.opening:0 "[target.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_court_outcome.2010.imprison:0 "我被关在这个监狱里，我承认我们在一起的机会似乎很渺茫。我已经很久没有见到你了。\n\n"
 agot_court_outcome.2010.normal:0 "我回想起你许下的诺言，我们有一天会结为夫妻，那似乎是很久以前的事了。事实上，也的确已经太久太久了。\n\n"
 agot_court_outcome.2010.hate:0 "我不禁觉得你在某种程度上欺骗了我。也许你甚至剥夺了我本可以拥有的生活。"
 agot_court_outcome.2010.nothate:0 "事实上，我不能责怪你。命运的安排对我们不利，这是不容否认的。"
 agot_court_outcome.2010.end:0 "无论如何，我认为现在是时候认清现实了。我解除你的承诺，如果你还依旧承认的话，我们从此各走各的路。"
 agot_court_outcome.2010.a:0 "唉，这不应该啊。"
 agot_elope.1004.t:0 "消失于夜色"
 agot_elope.1004.start:0 "早上醒来，我听到了一个令人吃惊的消息，"
 agot_elope.1004.both:0 "[owner.GetTitledFirstName]和[target.GetTitledFirstName]一起逃离了[ROOT.Char.Custom('FortifiedBuilding')]，私奔了。"
 agot_elope.1004.target:0 "[owner.GetFullName]偷头溜进了[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的要塞，然后带着我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('target'))][target.GetTitledFirstNameNoTooltip]私奔了。"
 agot_elope.1004.mid:0 "整个事件肯定已经策划了很久，因为他们成功地绕过了守卫，躲过了所有人的注意，真是令人印象深刻啊。\n\n"
 agot_elope.1004.refused:0 "我之前拒绝了他们的婚事，但现在他们自作主张的行为，让他们两带了一些负面议论。"
 agot_elope.1004.granted:0 "我之前批准了他们结婚，但这显然不足以让他们结婚……现在他们擅自行动。尽管我很同情他们的困境，但法律就是法律，他们的行为让他们俩都蒙羞了！"
 agot_elope.1004.married:0 "我想[owner.GetTitledFirstNameNoTooltip]无法正确地向[target.GetHerHis]求婚，因为[target.GetTitledFirstNameNoTooltip]已经结婚了！不管怎么说，他们未经我允许就结婚，已经触犯了法律，他俩都该为此感到羞耻！"
 agot_elope.1004.end:0 "我无法想象，为什么[owner.GetTitledFirstNameNoTooltip]没想到用正确且合适的手段来与[target.GetHerHis]结合？不管怎么说，他们未经我允许就结婚，已经触犯了法律，他俩都该为此感到羞耻！"
 agot_elope.1004.a:0 "希望这是值得的。"
 agot_elope.1004.b:0 "卫兵！告诉他们，欢迎他们回来。这次失礼就算了吧。"
 agot_elope.1005.t:0 "新开始"
 agot_elope.1005.start:0 "早上醒来，我听到了一个令人惊讶的消息，在深夜里，[owner.GetTitledFirstNameNoTooltip]偷溜进了[target_liege.GetTitledFirstNamePossessive][target_liege.Custom('FortifiedBuilding')]，并和[target.GetTitledFirstNameNoTooltip]一起逃走了，他们俩现在正在某个地方结婚。\n\n"
 agot_elope.1005.refused:0 "我之前拒绝了他们的婚事，但现在他们自作主张的行为，让他们两带了一些负面议论。"
 agot_elope.1005.granted:0 "我曾允许他们结婚，但这显然不足以让他们成婚……但现在他们自作主张的私奔让他们都蒙羞了。"
 agot_elope.1005.neither:0 "我甚至无法想象，[owner.GetTitledFirstNameNoTooltip]为什么会采取如此轻率的行动。不管怎么说，没有得到领主的允许就结婚会给他们俩带来耻辱。"
 agot_elope.1005.end:0 "唯一的问题是，[owner.GetTitledFirstNameNoTooltip]和[owner.GetHerHis]的新[target.Custom('WifeHusband')]在我的宫廷是否受到欢迎。"
 agot_elope.1005.a:0 "希望这是值得的。"
 agot_elope.1005.b:0 "这里不再欢迎他们。"
 agot_elope.1005.c:0 "告诉他们，我会把这次失礼抛诸脑后的。"
 agot_seduce_outcome.4901.opening:0 "夜深人静时分，一阵从[ROOT.Char.Custom('FortifiedBuilding')]内传来的喊叫声惊动了所有人。\n\n当我去查看发生了什么事时，在[target.Custom2('MyCharacterIntroductionPossessive', ROOT.Char)]的卧室门口看到了一群仆人和侍卫……好吧，看来[target.GetSheHe]早些到来时，竟然受到了[owner.Custom2('MyCharacterIntroduction', ROOT.Char)]一丝不挂的迎接！\n\n而无论[owner.GetTitledFirstNameNoTooltip]设想的是怎样的问候，[owner.GetSheHe]都没可能了。"
 agot_seduce_outcome.4901.reject:0 "我看到[target.GetTitledFirstNameNoTooltip]对着[owner.GetHerHim]愤怒地大喊大叫，让[owner.GetHerHim]滚出去，永远别回来。\n\n而[owner.GetSheHe]一看到我们其他人凑过来时，[owner.GetSheHe]就立刻溜走了，甚至没来得及收拾[owner.GetHerHis]的衣服！"
 agot_seduce_outcome.4901.normal:0 "[target.GetTitledFirstNameNoTooltip]显然被吓坏了，一见到我，[target.GetSheHe]就言之凿凿[target.GetSheHe]与这一切毫无关系。\n\n与此同时，[owner.GetTitledFirstNameNoTooltip]收拾起[owner.GetHerHis]的衣物，羞怯地逃走了，声称整件事显然是某种误会……"
 agot_seduce_outcome.4901.a:0 "令人震惊，但也相当有趣……"
 agot_seduce_outcome.4902.opening:0 "我正在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的花园里散步，突然听到一阵动静，起初听起来像是争吵。\n\n我迅速跑去看看发生了什么事，却看到[owner.Custom2('MyCharacterIntroduction', ROOT.Char)]正被[target.Custom2('MyCharacterIntroduction', ROOT.Char)]大声斥责。"
 agot_seduce_outcome.4902.reject:0 "[target.GetSheHe|U]显然非常生气，直到[target.GetSheHe]气冲冲地走开，才迟迟注意到我的存在。“那个[owner.GetWomanMan]”，[target.GetSheHe]厉声说道，“必须离我远点。我一分钟也不愿意忍受[owner.GetHerHis]的骚扰了！”\n\n至少，[owner.GetTitledFirstNameNoTooltip]在[owner.GetSheHe]带着所剩无几的尊严逃走时还显得有些局促不安。"
 agot_seduce_outcome.4902.normal:0 "不过与其说[target.GetSheHe|U]感到愤怒，更多的是震惊和恼火，当[target.GetSheHe]看到我时，[target.GetSheHe]走了过来。“感谢[target.GetFaith.PantheonTerm2]你来了！我再也无法忍受[owner.GetHerHis]不断的纠缠了！”\n\n[owner.GetTitledFirstNameNoTooltip]脸涨得通红，试图解释整件事只是一场误会……但我认为发生了什么事情已经是显而易见了。"
 agot_seduce_outcome.4902.a:0 "[owner.GetSheHe]难道没有羞耻感吗？岂有此理！"
 agot_seduce_outcome.4903.opening:0 "当我回到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的住处时，我发现[target.Custom2('MyCharacterIntroduction', ROOT.Char)]和[owner.Custom2('MyCharacterIntroduction', ROOT.Char)]站在一个凹室里，彼此靠得很近。几乎……太近了？当然不能是……？\n\n当[target.GetTitledFirstNameNoTooltip]发现我，"
 agot_seduce_outcome.4903.reject:0 "[target.GetSheHe]故意后退一步。“这不是我干的，[ROOT.Char.GetLadyLord]！这[owner.GetWomanMan]已经缠着我好几个星期了！我无法阻止[owner.GetHerHim]！”\n\n很明显，[target.GetHerHis]的愤怒是真挚的，而[owner.GetTitledFirstNamePossessiveNoTooltip]尴尬地语无伦次更凸显了这一点。[owner.GetSheHe|U]尽其所能声称整件事是个误会，但此时[target.GetTitledFirstNameNoTooltip]已经消失了。"
 agot_seduce_outcome.4903.normal:0 "[target.GetSheHe]变得如释重负。“感谢[target.GetFaith.PantheonTerm2]，您终于来了，”[target.GetSheHe]喃喃自语，“我一分钟也忍不下去了。”\n\n[owner.GetTitledFirstNameNoTooltip]试图把整件事说成是一场误会，但我可不相信。无论如何，[owner.GetSheHe]对[target.GetTitledFirstNameNoTooltip]的任何密谋看来都不可能实现了。"
 agot_seduce_outcome.4903.a:0 "最好是我出现的时候！"
 agot_seduce_outcome.4904.opening:0 "又是一场在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的夜宴，但这一次却意外频发，主要是因为[owner.Custom2('MyCharacterIntroduction', ROOT.Char)]的滑稽行为。\n\n[owner.Custom('polite_gender_ref')]显然酩酊烂醉，正大肆调戏着[target.Custom2('MyCharacterIntroduction', ROOT.Char)]。"
 agot_seduce_outcome.4904.reject:0 "最后，[target.GetSheHe]站了起来，大声喊道：“别再色迷迷地看着我了！快滚！你这变态！”\n\n[target.GetSheHe]气冲冲地离开了大厅，留下[owner.GetTitledFirstNameNoTooltip]错愕地站在那里……其余人都盯着[owner.GetHerHim]。\n\n无论[owner.GetHerHis]对[target.GetTitledFirstNameNoTooltip]的意图是什么，现在看来都已经彻底结束了。"
 agot_seduce_outcome.4904.normal:0 "显然，[target.GetSheHe|U]对此不感兴趣，只是勉强容忍[owner.GetHerHis]的行为。\n\n“[ROOT.Char.GetFaith.HighGodName]到底是怎么回事？”我边走边问，而[target.GetTitledFirstNameNoTooltip]趁机溜走了……只留下[owner.GetTitledFirstNameNoTooltip]站在原地，愤愤不平，所有人都盯着[owner.GetHerHim]。"
 agot_seduce_outcome.4904.a:0 "丢人现眼。"
 agot_seduce_outcome.4905.desc:0 "[target.GetTitledFirstNameNoTooltip]今晚来找我，怒气冲冲的。\n\n“我受够那个[owner.Custom('InsultNounSexual')]了！我拒绝了[owner.GetHerHim]一千次，但[owner.GetSheHe]听进去了吗？他得停止这愚蠢的行为！”\n\n让[owner.Custom('polite_gender_ref')][target.GetSheHe]如此恼火的人，似乎不是别人，正是[owner.Custom2('MyCharacterIntroduction', ROOT.Char)]……当然，现在已经被禁止再和[target.GetTitledFirstNameNoTooltip]说话了，这让[target.GetHerHis]松了一口气。即便如此，[owner.GetHerHim]也太胆大妄为了！在我眼皮底下，在我的[ROOT.Char.Custom('FortifiedBuilding')]里，试图勾引我的[target.Custom('WifeHusband')]！"
 agot_seduce_outcome.4905.a:0 "[owner.GetSheHe]好大的胆子！"
 agot_seduce_outcome.4906.desc:0 "当我回到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]中的住处时，我发现我的[target.Custom('WifeHusband')]和[owner.Custom2('MyCharacterIntroduction', ROOT.Char)]站在一个黑暗的凹室里，彼此靠得很近，几乎……太近了？当然不能是……？\n\n[target.GetFirstNameNoTooltip]一发现我，[target.GetSheHe]就走开了，显然松了一口气。“感谢[target.GetFaith.PantheonTerm2]，您终于来了，”[target.GetSheHe]喃喃自语，“我一分钟也忍不下去了！”\n\n[owner.GetTitledFirstNameNoTooltip]忿忿不平，惊恐万分，试图把整件事说成是一个简单的误会，但这显然不是真的。幸运的是，[owner.GetHerHim]还没来得及叫警卫，[owner.GetSheHe]就跑了！"
 agot_seduce_outcome.4906.a:0 "那个[owner.Custom('InsultNounSexual')]！[owner.GetSheHe]怎么敢！"
 agot_seduce_outcome.4907.opening:0 "今天又是[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]宫廷的一天，而且是无聊的一天。但突然间，事情变得有趣起来。\n\n"
 agot_seduce_outcome.4907.reject:0 "“够了！”我听到人群中有一个[target.GetWomanMan]大喊。所有人的注意力都转向了那个方向，当人群散开时，我看到是[target.Custom2('MyCharacterIntroduction', ROOT.Char)]在对[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]大吼。[target.GetSheHe|U]显然很愤怒，只有在[target.GetSheHe]突然意识到所有人的目光都集中在他们身上时才停下来。\n\n“对不起，[ROOT.Char.GetLadyLord]！只是这个……这个[owner.Custom('InsultNounSexual')]不肯放过我！为了我的名誉，我希望这件事到此为止！”说完，[target.GetFirstNameNoTooltip]转身冲出了大厅，[owner.GetFirstNameNoTooltip]只能尴尬地站在那里，忍受着在场的贵族们的冷嘲热讽。\n\n不管[owner.GetSheHe]原本想从[owner.GetHerHis]的行为中得到什么，[owner.GetHerHis]的计划显然失败了。"
 agot_seduce_outcome.4907.normal:0 "“请住手！我求您了！”我听到人群中有一个[target.GetWomanMan]大声哭喊。所有人的目光都转向了那个方向，当人群散开时，我看到是[target.Custom2('MyCharacterIntroduction', ROOT.Char)]在对[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]恳求。[target.GetSheHe|U]显得非常惊恐，更何况当[target.GetSheHe]意识到宫廷里的所有人都在看着他们时。\n\n“抱歉，[ROOT.Char.GetLadyLord]！我只是……我再也忍受不了了。”[target.GetFirstNameNoTooltip]在离开大厅之前，给了[owner.GetFirstNameNoTooltip]最后一眼怒视。\n\n由于[target.GetSheHe]从来没有解释过，我只能猜测[owner.GetFirstNameNoTooltip]到底做了什么，才引起了这样的反应……不过我想我们都知道。尽管[owner.GetHerHis]在面对众人的目光时，露出了一丝轻蔑的微笑，但我们可以肯定地说，[owner.GetHerHis]的已经付诸东流。"
 agot_seduce_outcome.4907.a:0 "可耻！"
 agot_seduce_outcome.4908.desc:0 "我正沿着走廊走向卧室，夜色已深，突然有一个[target.GetWomanMan]匆匆走到我身边。那是[target.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]，[target.GetSheHe]显得不安和紧张……不过显然不是因为我。\n\n“继续走，”[target.GetSheHe]恳求道，“您出现得真是时候，我整天都在躲避[owner.GetHerHis]的骚扰。”我不确定[target.GetSheHe]说的是谁，回头一看，发现[owner.Custom2('MyCharacterIntroduction', ROOT.Char)]正躲在暗处，假装碰巧在那里，对[target.GetFirstNamePossessiveNoTooltip]的行踪毫不关心。\n\n“不要相信[owner.GetSheHe]说的任何话，”[target.GetFirstNameNoTooltip]低声说，“[owner.GetHerHis|U]的行为太不得体了，但这是我能做的唯一保护自己的尊严，如果不是名声的话。”等我们走出那人的视线，[target.GetFirstNameNoTooltip]热情地感谢了我，然后跑开了。"
 agot_seduce_outcome.4908.a:0 "我在想，是否应该插手呢？"
 agot_seduce_outcome.4909.desc:0 "我正坐在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的书房里，款待着几位贵族，突然[target.Custom2('MyCharacterIntroduction', ROOT.Char)]闯了进来。这个[target.GetWomanMan]神色慌张，手里抱着一大捆信件。我一时以为[target.GetSheHe]是来找我的，但[target.GetSheHe]却径直走向了[owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]，[owner.GetSheHe]正坐在房间的另一边。\n\n“还给你，”[target.GetSheHe]说，“全都还给您！求您了，我的[owner.GetLadyLord]，别再给我写信了。您对我的迷恋必须结束！”说完，[target.GetFirstNameNoTooltip]把信件扔在了[owner.GetFirstNamePossessiveNoTooltip]的脚下，然后气冲冲地离开了书房，留下[owner.GetFirstNameNoTooltip]惊愕地望着。\n\n信件里的内容只能靠猜测，但从[owner.GetSheHe]羞愧地捡起信件的样子，以及房间里其他人审视的目光，我很清楚，大家都知道[owner.GetFirstNameNoTooltip]做了什么。同样清楚的是，这一切都已经结束了。"
 agot_seduce_outcome.4909.a:0 "天哪！"
