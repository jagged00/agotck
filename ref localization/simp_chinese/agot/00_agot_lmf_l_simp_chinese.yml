 dinner_rival_reason_unknown:0 "肯定有什么原因引起了矛盾。"
 lmf_feast.1001.t:0 "家宴：恶语相向"
 lmf_feast.1001.desc.opening:0 "一家人今晚齐聚[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的大厅，共享盛宴，但从一开始就不太顺利。\n\n空气中弥漫着紧张的气氛。然后，我的[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_rival_2'))]"
 lmf_feast.1001.desc.relation:0 "[family_rival_2.GetHerHis]的[family_rival_2.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_1'))]，[family_rival_1.GetFirstNameNoTooltip]"
 lmf_feast.1001.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_rival_1'))]"
 lmf_feast.1001.desc.mid:0 "\n\n原因是什么？我不太确定，但[family_rival_2.Custom2('dinner_rival_reason', SCOPE.sC('family_rival_1'))]心里清楚。\n\n他们的争吵声越来越大，响彻大厅，直到最后[family_rival_2.GetFirstNameNoTooltip]"
 lmf_feast.1001.desc.child.male:0 "跳到[family_rival_1.GetHerHim]身上，开始拳打脚踢。\n\n"
 lmf_feast.1001.desc.child.female:0 "跳到[family_rival_1.GetHerHim]身上，开始在[family_rival_1.GetHerHis]脸上抓挠。\n\n"
 lmf_feast.1001.desc.combatant:0 "站起来并拔出了[family_rival_2.GetHerHis]的刀剑。\n\n"
 lmf_feast.1001.desc.noncombatant:0 "站起来并扇了[family_rival_1.GetHerHim]一巴掌。\n\n"
 lmf_feast.1001.desc.bystander:0 "在我意识到发生了什么之前，一切都来不及了。"
 lmf_feast.1001.desc.intervene:0 "我试着出面介入，但已经为时已晚。"
 lmf_feast.1001.desc.end:0 "家里的其他人把他们拉开，[family_rival_1.GetFirstNameNoTooltip]则冲出了大厅"
 lmf_feast.1001.desc.friends:0 "，大喊着他们的友谊就此结束了。"
 lmf_feast.1001.desc.notfriends:0 "。现在，俩人已成为仇敌。"
 lmf_feast.1001.a:0 "这一晚可真够精彩的！"
 rival_family_dinner:0 "[CHARACTER.GetShortUIName|U]与[TARGET_CHARACTER.GetShortUIName|U]因一场宴会上的激烈争吵成为了仇敌。"
 rival_family_dinner_corresponding:0 "[CHARACTER.GetShortUIName|U]与[TARGET_CHARACTER.GetShortUIName|U]因一场宴会上的激烈争吵成为了仇敌。"
 dinner_rival_root_reason_murderer:0 "[ROOT.Char.GetSheHe|U]不会出来叫我“谋杀犯”，但这就是事情的原委。"
 dinner_rival_root_reason_att_murder:0 "[ROOT.Char.GetSheHe]说我一直想谋杀[ROOT.Char.GetHerHim]。"
 dinner_rival_root_reason_slept_spouse:0 "[ROOT.Char.GetSheHe|U]显然不会忘记我和[ROOT.Char.GetHerHis][ROOT.Char.Custom('WifeHusbandOpp')]上床的事实。"
 dinner_rival_root_reason_unfaithful:0 "[ROOT.Char.GetSheHe|U]不会说出来，但当然是关于我的不忠。"
 dinner_rival_root_reason_imprison:0 "[ROOT.Char.GetSheHe|U]一直在抱怨我是如何囚禁[ROOT.Char.GetHerHim]的，至少一开始是这样。"
 dinner_rival_root_reason_att_imprison:0 "[ROOT.Char.GetSheHe|U]一直在抱怨我是如何尝试囚禁[ROOT.Char.GetHerHim]的，至少一开始是这样。"
 dinner_rival_root_reason_execution:0 "起初，[ROOT.Char.GetSheHe]对处决怨声载道。"
 dinner_rival_root_reason_torture:0 "[ROOT.Char.GetSheHe|U]对折磨喋喋不休。吧啦吧啦，什么折磨这个，折磨那个。"
 dinner_rival_root_reason_blind:0 "当然是为了致盲。总是为了致盲！"
 dinner_rival_root_reason_castrate:0 "当然是关于阉割的。难道他总想着自己失去的小兄弟吗？"
 dinner_rival_reason_root_potential_rival:0 "我一点也不惊讶，真的。这件事已经酝酿了一段时间。"
 dinner_rival_reason_root_disinherit:0 "当然又是关于剥夺继承权的事。至少一开始是这样。"
 dinner_rival_reason_root_unknown:0 "是关于什么的？老实说，我想不起来了。"
 lmf_feast.1002.desc:0 "刚开始时一切都很顺利。\n\n一家人齐聚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的大厅共享盛宴，其乐融融。[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U][dinner_pos_family.Custom('dinner_activity_pos_past')]。\n\n接着，[family_rival.GetFirstNameNoTooltip]就与我吵了起来。\n\n[family_rival.Custom2('dinner_rival_root_reason', ROOT.Char )][ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))]和我那时都已经喝得晕晕乎乎的，我记得[family_rival.GetHerHim]说了一些难听的话……给我气得让[family_rival.GetHerHim]闭嘴。\n\n然后我们开始大声争吵，声音越来越大，直到最后其他人惊慌失措，纷纷上前劝阻。然而为时已晚。我们俩都说了一些可能在往后日子里会后悔不已的话。"
 lmf_feast.1002.a:0 "好吧，那真是不幸。"
 self_rival_family_dinner:0 "[CHARACTER.GetShortUIName|U]与[TARGET_CHARACTER.GetShortUIName|U]因一场宴会上的激烈争吵成为了仇敌。"
 self_rival_family_dinner_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U]与[CHARACTER.GetShortUIName|U]因一场宴会上的激烈争吵成为了仇敌。"
 lmf_feast.1003.t:0 "家宴：达成和解"
 lmf_feast.1003.desc.opening:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]大厅的聚会相对平静。没有争执，没有吵闹，只有家人在享受宁静时刻。\n\n更令人惊讶的是，我发现[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival_1'))]和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival_2'))]居然在交谈。\n\n看样子，两人都喝了不少酒，但当我听到我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_1'))]被"
 lmf_feast.1003.desc.relation:0 "[family_rival_1.GetHerHis][family_rival_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_2'))]的一个笑话逗乐了时，"
 lmf_feast.1003.desc.norelation:0 "我[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival_2'))]的一个笑话逗乐了时，"
 lmf_feast.1003.desc.child:0 "我不禁怀疑他们之间的敌对是否就要结束了。"
 lmf_feast.1003.desc.end:0 "我开始怀疑是否有可能最终化解他们之间的敌意。也许需要一些帮助……？"
 lmf_feast.1003.a:0 "试着说服他们最终和好。"
 lmf_feast.1003.a.convince.tt:0 "你说服他们和解了"
 lmf_feast.1003.a.fail.tt:0 "你的多管闲事让他们恼火"
 lmf_feast.1003.b:0 "他们可以自己解决。"
 lmf_feast.1003.c:0 "真希望他们能解决这事。"
 lmf_feast.1003.b.makeup.tt:0 "他们最终和好如初"
 lmf_feast.1003.b.nomakeup.tt:0 "不会和解的"
 lmf_feast.1004.desc:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]大厅的聚会相安无事。没有争执，没有吵闹，只有一家人在享受宁静时刻。\n\n更令人惊讶的是，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_rival'))]居然和我攀谈了起来。\n\n的确，我俩都喝了不少酒，但我们的对话却有一种久违的放松。当我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))]被我的一个笑话逗笑时，我不禁思索……我们之间是否会就此冰释前嫌？在今晚一笑泯恩仇呢？"
 lmf_feast.1004.a:0 "是时候重归于好了。"
 lmf_feast.1004.a.success.tt:0 "你说服[family_rival.GetHerHim]结束了敌对"
 lmf_feast.1004.a.failure.tt:0 "[family_rival.GetSheHe|U]被你的尝试惹恼了"
 lmf_feast.1004.b:0 "我们共度良宵，就已足够。"
 lmf_feast.1005.t:0 "家宴：纪念时刻"
 lmf_feast.1005.desc.start:0 "今晚的家宴气氛沉闷。\n\n我[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('dead_relative'))]最近的死讯仍像乌云一样笼罩着大厅。"
 lmf_feast.1005.desc.miscarriage.start:0 "今晚的家宴气氛沉闷。\n\n我的[dead_child.Custom('GetDaughterSon')]最近死产的消息仍像乌云一样笼罩着大厅。"
 lmf_feast.1005.desc.miscarriage:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dead_relative'))|U]坐在桌旁，几乎一言不发，但她的悲伤溢于言表。\n\n我们中很少说话，即便终于开口，也只是为了温柔地提醒她——实际上是提醒我们所有人——生活还要继续。\n\n我不知道这番话对她有多大帮助，但晚饭过后，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('dead_relative'))]在桌子底下握住了我的手。至少这也算聊以安慰吧，在这黯淡时刻，家人团结共济总比之前的沉默不语好。"
 lmf_feast.1005.desc.old:0 "大家都寡言少语，即便终于开口，也大多是在谈论[dead_relative.GetFirstNameNoTooltip]。\n\n[dead_relative.GetSheHe|U]称得上寿满天年，但[dead_relative.GetHerHis]的离世给我的宫廷留下了一个空缺，这并不容易填补。我们追念起[dead_relative.GetHerHim]的美好往事，将陈年旧账埋藏心底……而某种程度上，在这里的共同悼念也缓解了我们的悲痛。"
 lmf_feast.1005.desc.adult:0 "大家都寡言少语，即便终于开口，也大多是在谈论[dead_relative.GetFirstNameNoTooltip]。\n\n我们追念起[dead_relative.GetHerHim]的美好往事，将陈年旧账埋藏心底……而某种程度上，在这里的共同悼念也缓解了我们的悲痛。"
 lmf_feast.1005.desc.child:0 "大家都寡言少语，即便终于开口，也大多是在谈论[dead_relative.GetFirstNameNoTooltip]。\n\n[dead_relative.GetSheHe|U]实在是英年早逝，我们甚至还没来得及真正了解[dead_relative.GetHerHim]。于是，我们反而聊起了[dead_relative.GetHerHis]的趣事，以及如果[dead_relative.GetSheHe]有机会长大的话，[dead_relative.GetSheHe]可能会变成什么样子……而某种程度上，在这里的共同悼念也缓解了我们的悲痛。"
 lmf_feast.1005.desc.baby:0 "大家都寡言少语，即便终于开口，也大多是在谈论[dead_relative.GetFirstNameNoTooltip]。\n\n[dead_relative.GetSheHe|U]就这么夭折了，[ROOT.Char.GetFaith.DeathDeityName]不应该从我们身边早早夺走[dead_relative.GetHerHim]。谈论这件事让我们痛苦不堪……但某种程度上，在这里的共同悼念也缓解了我们的悲痛。"
 lmf_feast.1005.a:0 "愿[ROOT.Char.GetFaith.DeathDeityName]安息[dead_relative.GetHerHis]的灵魂。"
 lmf_feast.1005.b:0 "[dead_relative.GetSheHe|U]将被铭记。"
 lmf_feast.1005.c:0 "愿[ROOT.Char.GetFaith.DeathDeityName]保佑[dead_child.GetHerHis]的小小灵魂安息。"
 lmf_feast.1006.t:0 "家宴：嘈杂之声"
 lmf_feast.1006.desc:0 "我们一家人齐聚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的大厅里共进晚餐，但从一开始就是一片混乱。\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_1'))|U][dinner_neg_family_1.Custom('dinner_activity_neg_past')]。\n\n然后[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_2'))][dinner_neg_family_2.Custom('dinner_activity_neg_past')]。\n\n还有，[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family_3'))][dinner_neg_family_3.Custom('dinner_activity_neg_past')]。\n\n每个人都在大喊大叫，吵闹声越来越令人难以忍受，最终我提高了嗓门，命令所有人安静下来。我可能说了一些让我后悔的话，但我只是想离开那个地方。"
 lmf_feast.1006.a:0 "该死，曾经的美好时光呢！"
 lmf_feast.1007.t:0 "家宴：静谧时刻"
 lmf_feast.1007.desc:0 "偶尔，我会觉得我们在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的家庭可能与寻常人家相差无几，就像今晚的时光那样。\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_1'))|U][dinner_pos_family_1.Custom('dinner_activity_pos_past')]。\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_2'))|U][dinner_pos_family_2.Custom('dinner_activity_pos_past')]。\n\n甚至[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family_3'))][dinner_pos_family_3.Custom('dinner_activity_pos_past')]。\n\n大家相处融洽，有说有笑，甚至还有歌声。有一刻，我站起来说了一段演讲，让我的家人有点热泪盈眶。这很……温馨。"
 lmf_feast.1007.a:0 "一个美好的夜晚。"
 lmf_feast.1008.t:0 "家宴：友谊开端"
 lmf_feast.1008.desc.start:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的大厅举行的家宴进行得相当顺利。\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U][dinner_pos_family.Custom('dinner_activity_pos_past')]。\n\n然后我注意到[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_friend_1'))]似乎与"
 lmf_feast.1008.desc.relation:0 "[family_friend_1.GetHerHis]的[family_friend_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_2'))]，[family_friend_2.GetTitledFirstNameNoTooltip]。"
 lmf_feast.1008.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend_2'))]，"
 lmf_feast.1008.desc.child:0 "他们跑跑跳跳，做着孩子们最擅长的事情。欢笑，玩耍。\n\n"
 lmf_feast.1008.desc.twomen:0 "他们互相拍着对方的背，有说有笑。\n\n"
 lmf_feast.1008.desc.twowomen:0 "他们小声说着悄悄话，嬉笑不断。\n\n"
 lmf_feast.1008.desc.mixed:0 "他们款款而谈……并不是以随性的方式，而是带着真正的兴趣和尊重。\n\n"
 lmf_feast.1008.desc.end:0 "我相信我可能正在见证一段真正友谊的开始。"
 lmf_feast.1008.a:0 "好极了！"
 lmf_feast.1009.desc.start:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的大厅举行的家宴进行得相当顺利。\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U][dinner_pos_family.Custom('dinner_activity_pos_past')]。\n\n我还与[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend'))]相处愉快。"
 lmf_feast.1009.desc.child:0 "[family_friend.GetSheHe|U]在晚饭后与我一起玩游戏，不知不觉中，我俩就前所未有的充满欢声笑语。\n\n"
 lmf_feast.1009.desc.adult:0 "[family_friend.GetSheHe|U]在晚饭后与我杯酒言欢，不知不觉，我俩就在彼此讲述的故事中开怀大笑。\n\n"
 lmf_feast.1009.desc.end:0 "这是一段新友谊的开始吗？"
 lmf_feast.1009.a:0 "当然！这是我的新朋友！"
 lmf_feast.1009.b:0 "不，[family_friend.GetSheHe]跟我到此为止了。"
 lmf_feast.1010.t:0 "家宴：冷若冰霜"
 lmf_feast.1010.desc.start:0 "在今晚的家宴上，大厅里弥漫着一种奇怪的氛围。\n\n首先，[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))][dinner_neg_family.Custom('dinner_activity_neg_past')]。\n\n然后我注意到[family_friend_1.GetFirstNameNoTooltip]和[family_friend_2.GetFirstNameNoTooltip]毫无交流。\n\n平常他们总是形影不离，但突然间我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_1'))]和"
 lmf_feast.1010.desc.relation:0 "[family_friend_1.GetHerHis][family_friend_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_2'))]"
 lmf_feast.1010.desc.norelation:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend_2'))]"
 lmf_feast.1010.desc.end:0 "各坐在桌子的两头，就算他们彼此靠近，他们之间也是爱答不理。\n\n看起来他们的友谊已经结束了。"
 lmf_feast.1010.a:0 "这太糟糕了。"
 lmf_feast.1011.desc:0 "在今晚的家宴上，大厅里弥漫着一种奇怪的氛围。\n\n首先，[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))][dinner_neg_family.Custom('dinner_activity_neg_past')]。\n\n然后我注意到[family_friend.GetFirstNameNoTooltip]在躲着我。当我试着接近我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend'))]，[family_friend.GetSheHe]便走开了……从那时起，我们之间显而易见地变冷淡了。我到底做了什么？为什么[family_friend.GetSheHe]不理我了？"
 lmf_feast.1011.a:0 "我不明白是什么发生了变化……"
 lmf_feast.1012.t:0 "家宴：泄露天机"
 lmf_feast.1012.desc.start:0 "今晚的家宴平平淡淡，无惊无喜。实际上，当我与[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('tattler'))]交谈时，我正准备退席休息。\n\n"
 lmf_feast.1012.desc.child:0 "我认为这个孩子甚至并不知晓[tattler.Custom('polite_gender_ref')]所说的话的全部含义，只是[tattler.GetSheHe]无意中听到了"
 lmf_feast.1012.desc.adult:0 "我认为[tattler.GetFirstNameNoTooltip]甚至并不完全了解[tattler.GetSheHe]告诉我的话的全部含义，只是[tattler.GetSheHe]无意中听到了"
 lmf_feast.1012.desc.relation:0 "[tattler.GetHerHis][tattler.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_secret'))]"
 lmf_feast.1012.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_secret'))]"
 lmf_feast.1012.desc.child2:0 "关于此事的闲言碎语，觉得这一切很有趣。\n\n"
 lmf_feast.1012.desc.temperate:0 "谈话，并觉得话题相当令人不安。\n\n"
 lmf_feast.1012.desc.drunk:0 "窃窃私语，而在之后[tattler.GetHerHis]喝得醉醺醺时，顺带跟我提了一嘴。\n\n"
 lmf_feast.1012.desc.end:0 "好吧，即使[tattler.GetFirstNameNoTooltip]懵里懵懂，我也非常清楚这其中的含义。[family_secret.GetTitledFirstNameNoTooltip]有一个秘密，而我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_secret'))]现在无意中透露了这个秘密。"
 lmf_feast.1012.a:0 "真是有趣……"
 lmf_feast.1013.t:0 "家宴：花前月下"
 lmf_feast.1013.start:0 "今晚的家宴平平淡淡，安适如常……但有一个明显的例外。\n\n我注意到[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_lover_1'))]表现得相当奇怪。[family_lover_1.GetSheHe|U]一直满怀期待地望着大厅对面的"
 lmf_feast.1013.desc.relation:0 "[family_lover_1.GetHerHis][family_lover_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_lover_2'))]，[family_lover_2.GetTitledFirstNameNoTooltip]"
 lmf_feast.1013.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_lover_2'))]"
 lmf_feast.1013.end:0 "，却佯装不觉。然而，当[family_lover_1.GetFirstNameNoTooltip]终于借口离开时，[family_lover_2.GetFirstNameNoTooltip]在一分钟后就悄悄跟随而去。\n\n我决定看看他们在搞什么，结果发现这对情侣在一个黑暗的走廊里激情相拥。我立即闪人，没有声张……至少现在还没有。"
 lmf_feast.1013.a:0 "令人震惊！"
 lmf_feast.1014.t:0 "家宴：拔刀相向"
 lmf_feast.1014.start:0 "在今晚繁忙的家宴上，气氛十分紧张。\n\n每个人都在叫叫嚷嚷。[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))|U][dinner_neg_family.Custom('dinner_activity_neg_past')]。\n\n最糟糕的是，你可以听到[family_duel_starter.GetFirstNameNoTooltip]和[family_duel_target.GetFirstNameNoTooltip]在整个大厅里争吵。我看着[family_duel_starter.GetFirstNameNoTooltip]怒从心生，直到最后，我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_duel_starter'))]拔出匕首袭击了"
 lmf_feast.1014.desc.relation:0 "[family_duel_starter.GetHerHis][family_duel_starter.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_duel_target'))]。"
 lmf_feast.1014.desc.norelation:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_duel_target'))]。"
 lmf_feast.1014.end:0 "\n\n当鲜血滴落在地板上时，所有人都大惊失色，显然局面有些失控。"
 lmf_feast.1014.a:0 "最好置身事外。"
 lmf_feast.1014.b:0 "这只是他们之间的“小小情调”"
 lmf_feast.1014.a.start.kill.tt:0 "[family_duel_starter.GetFirstNameNoTooltip]在决斗中杀死了[family_duel_target.GetFirstNameNoTooltip]"
 lmf_feast.1014.a.start.win.tt:0 "[family_duel_starter.GetFirstNameNoTooltip]赢得决斗！"
 lmf_feast.1014.a.target.win.tt:0 "[family_duel_target.GetFirstNameNoTooltip]赢得决斗！"
 lmf_feast.1014.a.target.kill.tt:0 "[family_duel_target.GetFirstNameNoTooltip]在决斗中杀死了[family_duel_starter.GetFirstNameNoTooltip]"
 family_feast_duel:0 "[CHARACTER.GetShortUIName|U]与[TARGET_CHARACTER.GetShortUIName]在一次家宴上打了起来。"
 lmf_feast.1014.c:0 "把[family_duel_starter.GetFirstNameNoTooltip]关起来，让[family_duel_starter.GetSheHe]冷静一下。"
 lmf_feast.1015.t:0 "家宴：天伦之乐"
 lmf_feast.1015.desc.start:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的宴会很温馨。每个人都安份守己，举止得体，家人之间洋溢着和睦的氛围。\n\n"
 lmf_feast.1015.desc.newborn:0 "食物被端走后不久，一名女仆从婴儿房中抱出了小[show_child.GetFirstNameNoTooltip]，[show_child.GetSheHe]仍裹着襁褓，醒来的时间也比平常晚得多。尽管如此，[family_spouse.GetFirstNameNoTooltip]和我还是情不自禁，并把宝宝抱在怀中，对着[show_child.GetHerHim]小声咕哝……有一瞬间，当[family_spouse.GetFirstNamePossessiveNoTooltip]和我的眼神交汇时，仿佛在说：\n\n是我们创造了这些。我们创造了这个完美的小[show_child.Custom('GirlBoy')]。"
 lmf_feast.1015.desc.smallchild:0 "食物被端走后不久，一名女仆将年幼的[show_child.GetFirstNameNoTooltip]从婴儿房带出来向我们道晚安。[show_child.Custom('GirlBoy')]发着牢骚，却也对大厅中进行的活动充满好奇。为了不早早去睡觉，[show_child.GetSheHe]给我们表演了一段有趣的舞蹈。[family_spouse.GetFirstNameNoTooltip]和我都开怀大笑，有一个瞬间，我们的眼神相遇，仿佛在说：\n\n这就是我们的小[show_child.Custom('GirlBoy')]。我们的家庭。"
 lmf_feast.1015.desc.youngchild:0 "食物被端走后不久，年少的[show_child.GetFirstNameNoTooltip]兴冲冲地跑上来，坚持要为[family_spouse.GetFirstNameNoTooltip]和我表演一段欢快的歌舞。我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))]和我自然是开怀一笑，而有一个瞬间，我们的眼神相遇，仿佛在说：\n\n这就是我们的[show_child.Custom('GetDaughterSon')]。我们是一家人。"
 lmf_feast.1015.desc.stillgotit:0 "食物被端走后，[family_spouse.GetFirstNameNoTooltip]和我看着大家有说有笑。我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))]满足地叹了口气，然后[family_spouse.GetSheHe]转向我……我看到了[family_spouse.GetHerHis]眼中的盈盈秋波。显然，[family_spouse.GetSheHe|U]今晚想要与我共赴巫山，而且希望立刻开始！"
 lmf_feast.1015.desc.chaste:0 "食物被端走后，[family_spouse.GetFirstNameNoTooltip]和我看着大家有说有笑。我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))]满足地叹了口气，我们彼此目光交汇。我们的感情虽然没有那么轰轰烈烈，但它仍然是爱。这就是我们的家庭，无比美好。"
 lmf_feast.1015.a:0 "为[family_spouse.GetTitledFirstNameNoTooltip]干杯！"
 friend_family_feast:0 "[CHARACTER.GetShortUIName|U]和[TARGET_CHARACTER.GetShortUIName]在一场温馨的家宴中加深了情谊。"
 lmf_feast.1016.t:0 "家宴：嗤之以鼻"
 lmf_feast.1016.desc.start:0 "今晚的家宴一开始，我和我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))]之间的关系就变得很紧张。\n\n一开始我们几乎没怎么交流，仅有的几句话也是冰冷而不愉快。在用餐过后，情况变得更糟了。"
 lmf_feast.1016.desc.object.to.me:0 "[family_spouse.GetSheHe|U]向我投来厌恶的眼神，避开了我的触碰。"
 lmf_feast.1016.desc.object.to.me.sodomy:0 "“是真的吗？和别的男人？！”[family_spouse.GetSheHe]嘶吼道。现在我知道是怎么回事了，即使知道了也无济于事。\n\n"
 lmf_feast.1016.desc.object.to.me.incest:0 "“真的吗？和你自己的家人？！”[family_spouse.GetSheHe]嘶吼道。现在我知道是怎么回事了，即使知道了也无济于事。\n\n"
 lmf_feast.1016.desc.object.to.me.secret.sodomy:0 "“是真的吗？和别的男人？”[family_spouse.GetSheHe]嘶吼道。然而[family_spouse.GetSheHe]坚决拒绝说清楚。\n\n"
 lmf_feast.1016.desc.object.to.me.secret.incest:0 "“真的吗？和你自己的家人？”[family_spouse.GetSheHe]嘶吼道。然而[family_spouse.GetSheHe]坚决拒绝说清楚。\n\n"
 lmf_feast.1016.desc.object.to.me.deviant:0 "“我知道你是什么玩意，”[family_spouse.GetSheHe]嘶吼道。现在我知道是怎么回事了，即使知道了也无济于事。\n\n"
 lmf_feast.1016.desc.object.to.me.secret.deviant:0 "“我知道你是什么玩意，”[family_spouse.GetSheHe]嘶吼道。然而[family_spouse.GetSheHe]坚决拒绝说清楚。\n\n"
 lmf_feast.1016.desc.object.to.them:0 "我简直无法掩饰自己的厌恶，因为我知道关于[family_spouse.GetHerHis]"
 lmf_feast.1016.desc.object.to.them.sodomy:0 "与其他男人暧昧不清的事情。我一度嘶吼道：“我知道你是什么玩意！”\n\n"
 lmf_feast.1016.desc.object.to.them.incest:0 "对[family_spouse.GetHerHis]亲人的禁忌欲望。我一度嘶吼道：“我知道你是什么玩意！”\n\n"
 lmf_feast.1016.desc.object.to.them.secret.sodomy:0 "与其他男人暧昧不清的事情。我一度嘶吼道：“我知道你是什么玩意！”\n\n"
 lmf_feast.1016.desc.object.to.them.secret.incest:0 "与[family_spouse.GetHerHis]亲人的禁忌风流秘密。我一度嘶吼道：“我知道你是什么玩意！”\n\n"
 lmf_feast.1016.desc.object.to.them.deviant:0 "奇怪又变态的欲望。我一度嘶吼道：“我知道你是什么玩意！”\n\n"
 lmf_feast.1016.desc.object.to.them.secret.deviant:0 "那隐秘又变态的性行为。我一度嘶吼道：“我知道你是什么玩意！”\n\n"
 lmf_feast.1016.desc.betrayed:0 "[family_spouse.GetSheHe|U]变得口角锋芒，甚至是冷嘲热讽。我知道这是因为我背叛了婚姻誓言……[family_spouse.GetSheHe]绝不会善罢甘休。\n\n"
 lmf_feast.1016.desc.they.betrayed:0 "[family_spouse.GetHerHis]的每一次触碰都会让我争吵和退缩。我既不能原谅也无法忘记[family_spouse.GetHerHis]背叛了我们的婚姻誓言。我做不到！\n\n"
 lmf_feast.1016.desc.they.secret.lover:0 "[family_spouse.GetHerHis]的每一次触碰都会让我争吵和退缩。我无法从脑海中抹去[family_spouse.GetHerHim]与[suspected_lover.GetTitledFirstNameNoTooltip]同床的画面，这快把我逼疯了！\n\n"
 lmf_feast.1016.desc.secret.lover:0 "“非得是[suspected_lover.GetFirstNameNoTooltip]吗？”[family_spouse.GetSheHe]嘶吼道，但拒绝说清楚[family_spouse.GetSheHe]究竟对[suspected_lover.GetHerHim]了解多少。\n\n"
 lmf_feast.1016.desc.rivalry:0 "[family_spouse.GetSheHe|U]对我每一句话都嗤之以鼻，避开了我的触碰。最近我们之间的关系渐行渐远，而现在[family_spouse.GetSheHe]拒绝了我任何弥合嫌隙的尝试。\n\n"
 lmf_feast.1016.desc.end:0 "到晚宴结束时，我们的争吵引来了家里其他人惊恐的目光。[family_spouse.GetFirstNameNoTooltip]怒气冲冲地跑了出去，就这样……草草收场了。"
 lmf_feast.1016.a:0 "哎哟！"
 nemesis_family_feast:0 "在家庭宴会上发生争执后，[CHARACTER.GetShortUIName|U]成为了[TARGET_CHARACTER.GetShortUIName|U]的死敌。"
 nemesis_family_feast_corresponding:0 "在家庭宴会上发生争执后，[TARGET_CHARACTER.GetShortUIName|U]成为了[CHARACTER.GetShortUIName|U]的死敌。"
 rival_family_feast:0 "[CHARACTER.GetShortUIName|U]在家庭宴会上因婚姻问题与[TARGET_CHARACTER.GetShortUIName|U]发生了激烈争吵。"
 rival_family_feast_corresponding:0 "[TARGET_CHARACTER.GetShortUIName|U]在家庭宴会上因婚姻问题与[CHARACTER.GetShortUIName|U]发生了激烈争吵。"
 lmf_feast.1017.t:0 "家宴：横祸非灾"
 lmf_feast.1017.desc.start:0 "在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的家宴很热闹，开始时还不错。\n\n[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U][dinner_pos_family.Custom('dinner_activity_pos_past')]。\n\n事情突然发生了转变。\n\n一个仆人慌慌张张地跑进大厅，告诉我，[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_accident'))]"
 lmf_feast.1017.desc.fire:0 "被厨房里突发的大火严重烧伤。"
 lmf_feast.1017.desc.stairs:0 "从外面的楼梯上摔了下来。"
 lmf_feast.1017.desc.window:0 "从楼上的一扇窗户掉了下来。"
 lmf_feast.1017.desc.fall:0 "在院子里摔得很惨。"
 lmf_feast.1017.desc.trample:0 "在院子里被一头发狂的牲畜踩死了。"
 lmf_feast.1017.desc.accident:0 "在院子里受了重伤，尽管他几乎无法讲述当时的情况。"
 lmf_feast.1017.desc.end:0 "\n\n当然，这是一场意外，我们所有人都深感忧虑。我立即打发走了所有人，去看望[family_accident.GetFirstNamePossessiveNoTooltip]接受治疗。"
 lmf_feast.1017.a:0 "希望这没有太严重！"
 lmf_feast.1017.injured.tt:0 "[family_accident.GetTitledFirstName]受伤了！"
 lmf_feast.1018.t:0 "家宴：突发恶疾"
 lmf_feast.1018.desc.start:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的家宴进行得相当顺利，至少一开始是这样。\n\n大家有说有笑，直到有人突然"
 lmf_feast.1018.desc.child:0 "发现小[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_sick'))]变得太安静了。\n\n我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_sick'))]几乎面如死灰，然后从[family_sick.GetSheHe]从[family_sick.GetHerHis]的椅子上摔了下来！"
 lmf_feast.1018.desc.adult:0 "惊叫道。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_sick'))]吐在了[family_sick.GetHerHis]的盘子上！起初以为是饮酒过度造成的，但很快就意识到事情要严重得多。\n\n我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_sick'))]面如死灰，浑身颤抖，触手冰凉。"
 lmf_feast.1018.desc.end:0 "我叫仆人立刻把[family_sick.GetHerHim]带走，然后把所有人都打发走，以防疾病蔓延。\n\n截至前夜，我们仍不清楚这场突如其来的疾病到底有多严重。"
 lmf_feast.1018.a:0 "希望[family_sick.GetSheHe]早日康复！"
 lmf_feast.1019.t:0 "家宴：万事如意"
 lmf_feast.1019.desc.opening:0 "我的家人在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的大厅中相聚，"
 lmf_feast.1019.desc.atwar:0 "吃着大餐，但毫不在意前一晚传来的战争的消息。\n\n"
 lmf_feast.1019.desc.nowar:0 "聚餐时享受着领地难得的平静。\n\n"
 lmf_feast.1019.desc.end:0 "[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))|U][dinner_pos_family.Custom('dinner_activity_pos_past')]。\n\n与此同时，[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_neg_family'))][dinner_neg_family.Custom('dinner_activity_neg_past')]。\n\n即使如此，今晚依然很美好。没什么比大家相聚更重要的了。"
 lmf_feast.1019.a:0 "愿[ROOT.Char.GetFaith.FertilityGodName]保佑我们所有人。"
 lmf_feast.1019.b:0 "这般和睦确实难以长久……"
 lmf_feast.1019.c:0 "像这样的时光太稀少了。"
 lmf_feast.1019.d:0 "老实说，我几乎不能保持清醒……"
 lmf_feast.1019.e:0 "我多么渴望回到战场啊。"
 lmf_feast.1019.f:0 "我受不了这些喋喋不休的人。"
 lmf_feast.1019.g:0 "老实说，我宁愿一个人呆在某个地方。"
 lmf_feast.1019.h:0 "嗯？我对食物更感兴趣。"
 lmf_feast.1019.i:0 "嗯？我对喝酒更感兴趣。"
 lmf_feast.1019.j:0 "这是我们将终身难忘的时光。"
 lmf_feast.1020.t:0 "家宴：憧憬未来"
 lmf_feast.1020.desc.start:0 "今晚的家宴很热闹，不过说实话，我几乎没注意到。\n\n我和大多数家人一样，非常关注妻子和她隆起的肚子。[family_spouse.GetFirstNameNoTooltip]姗姗来迟，疲惫不堪。值得称赞的是，她几乎没有抱怨，还努力对每一位前来看望她的好心家人微笑。当晚宴接近尾声时，我们的目光相遇了……那是一种真正的温柔。\n\n"
 lmf_feast.1020.desc.resolution:0 "“丈夫，我们之间的关系一直不好，”她说，“如果对这个孩子还有任何期望的话，我想我们是不是该放下彼此的成见了？”[family_spouse.GetFirstNameNoTooltip]没有等我回答。她只是重重地叹了口气，让随从送她回卧室，这让我不禁思考起来：她说得对吗？"
 lmf_feast.1020.desc.love:0 "“我非常崇拜你，我的丈夫，”她突然毫无征兆地说起，“结婚时我还不知道会发生什么，但很高兴我们能彼此相守了。”我还来不及微笑回应，她就挥手让随从送她回卧室，留我一人沉浸在她的爱意中。"
 lmf_feast.1020.desc.possibility:0 "“我们结婚时，根本不知道会发生什么。”她突然说道，“我以为我们的婚姻会名存实亡，冷冰冰的。但现在我不这么想了。你和我还有希望吗，丈夫？”[family_spouse.GetFirstNameNoTooltip]没有等我回答。她只是重重地叹了口气，让随从送她回卧室，留我一人思考问题的答案。"
 lmf_feast.1020.desc.fallback:0 "“我希望孩子能为你带来快乐，丈夫，”她说。当我回答说孩子一定会时，[family_spouse.GetFirstNameNoTooltip]脸上洋溢着自豪的笑容，“那我就放心了。”她重重地叹了口气，叫来随从送她回卧室，我看着她离去，嘴角露出一丝微笑。"
 lmf_feast.1020.a:0 "为了孩子，是时候结束了。"
 lmf_feast.1020.b:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_spouse'))]消失了。"
 lmf_feast.1020.c:0 "是的，我认为我们还有希望。"
 lmf_feast.1020.d:0 "孩子出生后，她应该就会恢复正常了吧。"
 lmf_feast.1020.e:0 "不，我还没做好放手的准备。"
 lmf_feast.1020.f:0 "她最近太情绪化了，别在意。"
 lmf_feast.1021.t:0 "家宴：知己知彼"
 lmf_feast.1021.desc.start:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的大厅里，家宴出奇地安静。\n\n这让我有时间和[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_friend'))]，好好聊聊。随着夜幕降临，越来越多的家人退了下去，不过说实话，我们几乎没有察觉。我们互相讲述着故事。我谈起了我对[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]的计划，[family_friend.GetSheHe]全神贯注地听着。[family_friend.GetSheHe|U]告诉我"
 lmf_feast.1021.desc.spouse:0 "自己在婚姻中遇到的各种麻烦。"
 lmf_feast.1021.desc.ruler:0 "自己在治理[family_friend.GetPrimaryTitle.GetNameNoTierNoTooltip]时遭遇的琐碎困难。"
 lmf_feast.1021.desc.court:0 "自己作为我的[family_friend.Custom('GetCouncilOrCourtPosition')]时遇到的一些小麻烦。"
 lmf_feast.1021.desc.courtier:0 "[ROOT.Char.Custom('FortifiedBuilding')]里发生的各种事情——那些我很少听说的小事。"
 lmf_feast.1021.desc.end:0 "我点头附和，假装理解[family_friend.GetHerHis]的担忧。\n\n等我们聊完，我们俩才发现其他人都走了，天也黑了。[family_friend.GetFirstNameNoTooltip]笑着道歉，说[family_friend.GetSheHe]占用了我太多的时间……但是，说实话，能和一个朋友这样相处，我觉得很好。"
 lmf_feast.1021.a:0 "致我忠实的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_friend'))]！"
 lmf_feast.1022.t:0 "家宴：水火不容"
 lmf_feast.1022.desc:0 "我想，如果不是因为[family_rival.GetFirstNamePossessiveNoTooltip]的出现，今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的家宴也算是挺愉快的。我不明白，为什么我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))]还要继续参加这些晚宴。大概是为了刺激我吧。\n\n今晚这一点表现得尤为明显，[family_rival.GetFirstNameNoTooltip]坐在离我不远的地方，我只能勉强听到[family_rival.GetSheHe]对旁边的人说的那些充满怨气的话语，似乎没有针对任何特定的人，但实际上都是直接冲着我来的。随着[family_rival.GetFirstNameNoTooltip]喝得越来越多，这些话语也越来越大声和刻薄，我只能咬紧牙关，假装没有听到。\n\n最后，我忍无可忍，站起来命令我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_rival'))]离开餐桌，[family_rival.GetSheHe]却装出一副无辜和委屈的样子，让我无法忍受。于是我转身离开了大厅，心中气愤，真想把[family_rival.GetHerHim]从我的宫廷里赶出去。"
 lmf_feast.1022.a:0 "[family_rival.GetSheHe]的家族算是不幸中的万幸……"
 lmf_feast.1023.t:0 "家宴：我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('dead_relative'))|U]"
 lmf_feast.1023.desc:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的家宴很平静，也没什么大事。不知为何，谈话的话题转到了我已经去世多年的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('dead_relative'))]身上。\n\n家人们低声地谈论着[dead_relative.GetHerHim]，有时带着幽默的笑声，有时带着怨恨的语气，直到最后[family_toaster.GetFirstNameNoTooltip]站起来，要求所有人看过去。\n\n“让我们都举杯，纪念[dead_relative.GetTitledFirstName]，”我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_toaster'))]对大厅里的人们说道。\n\n“[dead_relative.GetSheHe|U]在世时善治[dead_relative.GetPrimaryTitle.GetNameNoTooltip]，现在安息在[dead_relative.GetFaith.PositiveAfterLife]，但关于[dead_relative.GetHerHim]的记忆将永远留在我们心中。愿[dead_relative.GetFaith.DeathDeityName]永远保佑[dead_relative.GetHerHim]！”"
 lmf_feast.1023.a:0 "说得好，说得好！"
 lmf_feast.1024.t:0 "家宴：格格不入"
 lmf_feast.1024.desc.start:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的家宴上，气氛热闹欢腾，笑声和喧哗不断。\n\n只有年轻的[family_hostage.GetTitledFirstNameNoTooltip]似乎是个例外。我注意到这个[family_hostage.Custom('GetLassLad')]孤零零地坐在桌子的最远端，低着头，显得很不自在。\n\n我想，这一定很难受，"
 lmf_feast.1024.desc.language.none:0 "不会说[ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]，而宴会上没有一个人会说[family_hostage.GetCulture.GetLanguage.GetNameNoTooltip]。\n\n"
 lmf_feast.1024.desc.language.one:0 "不会说[ROOT.Char.GetCulture.GetLanguage.GetNameNoTooltip]，而宴会上除了[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_hostage_common'))]，没有一个人会说[family_hostage.GetCulture.GetLanguage.GetNameNoTooltip]。\n\n"
 lmf_feast.1024.desc.religion.none:0 "作为宴会上唯一的[family_hostage.GetFaith.GetNameNoTooltip]信徒，没有人遵循这个信仰的风俗，甚至可能都不知道它们是什么。\n\n"
 lmf_feast.1024.desc.religion.one:0 "作为宴会上除了[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hostage_common'))]之外唯一的[family_hostage.GetFaith.GetNameNoTooltip]信徒，没人遵循其风俗。\n\n"
 lmf_feast.1024.desc.culture.none:0 "作为一个[family_hostage.GetCulture.GetNameNoTooltip]人，在这场盛宴上没有一个人了解或关心[family_hostage.GetCulture.GetNameNoTooltip]的传统。\n\n"
 lmf_feast.1024.desc.culture.one:0 "作为一个[family_hostage.GetCulture.GetNameNoTooltip]人，除了[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hostage_common'))]，谁又会了解或关心[family_hostage.GetCulture.GetNameNoTooltip]的传统呢？\n\n"
 lmf_feast.1024.desc.end:0 "说实话，那一刻我为[family_hostage.GetHerHim]感到难过。也许需要做些什么？"
 lmf_feast.1024.a:0 "我会尽力让[family_hostage.GetHerHim]感到宾至如归。"
 lmf_feast.1024.b:0 "我不是[family_hostage.GetHerHis][ROOT.Char.GetMotherFather]。[family_hostage.GetSheHe|U]可以照顾[family_hostage.GetHerselfHimself]。"
 lmf_feast.1025.t:0 "家宴：监护之下"
 lmf_feast.1025.desc.start:0 "今夜在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]举办的宴会乏善可陈，正当我昏昏欲睡之际，却瞥见不远处的年幼的[family_ward.GetFirstNameNoTooltip]正全神贯注地聆听着一场交谈。"
 lmf_feast.1025.desc.relation:0 "[family_ward.GetHerHis]的[family_ward.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_example'))]"
 lmf_feast.1025.desc.norelation:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_example'))]"
 lmf_feast.1025.desc.mid:0 "与其他人的谈话。\n\n最终，在好奇心的驱使下，我走上前询问这个[family_ward.Custom('GetLassLad')]，究竟是什么让[family_ward.GetHerHim]如此着迷。原来，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_example'))]当时正在……"
 lmf_feast.1025.desc.diplomacy:0 "讨论一个涉及一个国外非常微妙的外交问题，这个问题复杂得"
 lmf_feast.1025.desc.intrigue:0 "悄悄地谋划着一些不可告人的事，其中涉及的道德问题复杂得"
 lmf_feast.1025.desc.martial:0 "议论着另一个国家近期发生的一场战斗，其中涉及的战略复杂得"
 lmf_feast.1025.desc.learning:0 "对一件玄妙的哲学难题妙语连珠，其复杂程度"
 lmf_feast.1025.desc.stewardship:0 "就近日我宫廷中的一件案件进行说明，其中的细节复杂得"
 lmf_feast.1025.desc.end:0 "足以让[family_ward.GetFirstNameNoTooltip]完全困惑。\n\n[family_ward.GetSheHe]转向我，要求我给出一个解释。这并不奇怪，毕竟[family_ward.GetSheHe]实际上是我的被监护人。"
 lmf_feast.1025.a:0 "你看，事情是这样的…… "
 lmf_feast.1025.a.success:0 "[family_ward.GetFirstNameNoTooltip]理解了，并且[family_ward.GetHerHis]的[education_focus|E]有了推进。"
 lmf_feast.1025.a.success.tt:0 "[family_ward.GetFirstNameNoTooltip]理解了"
 lmf_feast.1025.a.success2.tt:0 "[family_ward.GetHerHis|U]的[education_focus|E]有了推进。"
 lmf_feast.1025.a.fail:0 "[family_ward.GetFirstNameNoTooltip]怎么也弄不懂你的说法…… "
 lmf_feast.1025.a.fail.tt:0 "[family_ward.GetFirstNameNoTooltip]不理解"
 lmf_feast.1025.a.botch:0 "[family_ward.GetFirstNameNoTooltip]完全不理解，阻碍了[family_ward.GetHerHis]的[education_focus|E]。"
 lmf_feast.1025.a.botch.tt:0 "[family_ward.GetFirstNameNoTooltip]完全不理解"
 lmf_feast.1025.a.botch2.tt:0 "阻碍了[family_ward.GetHerHis|U]的[education_focus|E]。"
 lmf_feast.1025.b:0 "够了！改天再问我吧。"
 lmf_feast.1026.t:0 "家宴：祷告时间"
 lmf_feast.1026.desc.start:0 "[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的今晚家宴平平淡淡，我[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_religious'))]决定今晚是向家里其他人长篇大论虔诚与美德的重要性。\n\n"
 lmf_feast.1026.desc.zealous:0 "我全神贯注地听着，"
 lmf_feast.1026.desc.cynical:0 "我尽可能隐藏我翻白眼的小动作，"
 lmf_feast.1026.desc.nozeal:0 "没多久，我就要强忍困意，"
 lmf_feast.1026.desc.impatient:0 "不得不说，这对我耐心是个考验。\n\n"
 lmf_feast.1026.desc.patient:0 "我竟不可以的坚持到最后，直到房间里的大多数人都宁愿回到酒桌上。\n\n"
 lmf_feast.1026.desc.family:0 "房间里的大多数人都盯着自己的饮料，或者开始打瞌睡。\n\n"
 lmf_feast.1026.desc.loved:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_religious'))]至少有一名家庭成员被说服："
 lmf_feast.1026.desc.relation:0 "[family_religious.GetHerHis][family_religious.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_react'))]，[family_react.GetTitledFirstNameNoTooltip]"
 lmf_feast.1026.desc.norelation:0 "[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_react'))]"
 lmf_feast.1026.desc.loved2:0 "看上去很高兴，并且很长一段时间里为[family_religious.GetFirstNameNoTooltip]欢呼，哪怕[family_religious.GetSheHe]停止了演讲很久。\n\n家宴结束后，当大多数人都离开时，还能看到两人进行着如痴如醉的宗教辩论。"
 lmf_feast.1026.desc.hated:0 "至少有一位与会者对这种活动特别不满： "
 lmf_feast.1026.desc.hated2:0 "看着一脸不满地听了一个多小时，一有机会就嘲笑和打断[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_religious'))]。\n\n当布道结束时，房间里的大多数人都松了一口气，而他们两人在房间的另一侧还在就宗教问题争论不休。我隐隐约约地猜到，这将会被他们两个记恨很久。"
 lmf_feast.1026.desc.default:0 "一直持续了一段时间，直到最后大部分家族成员都悄悄地从大厅里退了出去。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_religious'))]口干舌燥，连我都不得不为[family_religious.GetHerHis]的毅力鼓掌，[family_religious.GetFaith.GetAdherentNameNoTooltip]的耐力相当不错！"
 lmf_feast.1026.a:0 "就我个人而言，我更喜欢在[ROOT.Char.GetFaith.HouseOfWorship|l]内的布道。"
 loved_family_feast_sermon:0 "在一次家宴上，[CHARACTER.GetShortUIName|U]喜欢上了[TARGET_CHARACTER.GetShortUINamePossessive]的布道。"
 loved_family_feast_sermon_corresponding:0 "在一次家宴上，[TARGET_CHARACTER.GetShortUIName|U]喜欢上了[CHARACTER.GetShortUINamePossessive]的布道。"
 hated_family_feast_sermon:0 "在一次家宴上，[CHARACTER.GetShortUIName|U]讨厌[TARGET_CHARACTER.GetShortUINamePossessive]的布道。"
 hated_family_feast_sermon_corresponding:0 "在一次家宴上，[TARGET_CHARACTER.GetShortUIName|U]讨厌[CHARACTER.GetShortUINamePossessive]的布道。"
 lmf_feast.1027.t:0 "家宴：娱乐节目"
 lmf_feast.1027.desc.start:0 "本来今晚家宴平平淡淡，直到[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_entertainer'))]跳上一张桌子的那刻，显然[family_entertainer.GetHerselfHimself]觉得有些平淡，不得不说[family_entertainer.GetSheHe]是个显眼包，"
 lmf_feast.1027.desc.poet:0 "[family_entertainer.GetSheHe]竟想唱首史诗般的[family_entertainer.GetCulture.GetNameNoTooltip]诗来招待我们。\n\n[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_entertainer'))]抑扬顿挫，还在关键时刻戏剧性地停顿，卖足了关子，这不是普通的诗句，是一部英雄传奇！[family_entertainer.GetSheHe|U]给每个每个角色注入活力，最终[family_entertainer.GetHerHis]举起双手高呼，孩子们也在兴奋地尖叫。\n"
 lmf_feast.1027.desc.bard:0 "[family_entertainer.GetSheHe]竟给我们唱首歌。\n\n我不知道那天晚上我那[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_entertainer'))]发了什么疯，但[family_entertainer.GetSheHe]那首歌简直是大师级的。每一个节奏都很精致，每一句歌词都准确表达。就在我们以为一首歌即将结束的时候，[family_entertainer.GetFirstNameNoTooltip]会无缝地唱起下一首歌。\n"
 lmf_feast.1027.desc.end:0 "当[family_entertainer.GetFirstNameNoTooltip]最后鞠躬并离开餐桌时，全场响起了雷鸣般的掌声。\n\n我相信我们都对此很满意，且不会忘记这一晚。"
 lmf_feast.1027.a:0 "多么棒的一晚！"
 lmf_feast.1028.t:0 "家宴：彻夜长谈"
 lmf_feast.1028.desc.start:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的家宴相当愉快。\n\n首先，[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('dinner_pos_family'))][dinner_pos_family.Custom('dinner_activity_pos_past')]。\n\n后来，我与[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_expert'))]轻松地聊了起来，"
 lmf_feast.1028.desc.diplomat:0 "我们详细讨论了外交以及[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]与邻国的合作事情。我这[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]甚至讲述了几个我从未听说过的外交失败案例，每个故事都比上一个精彩。\n\n"
 lmf_feast.1028.desc.family_first:0 "我们谈论了很多关于家庭的事情……通常这不是我感兴趣的话题，但我这[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]对如何让家人更好地相处有着深刻的见解，我以前从未听过[family_expert.GetSheHe]谈论过类似的想法，真让人着迷。\n\n"
 lmf_feast.1028.desc.august:0 "我们谈了很多关于如何统治、[ROOT.Char.GetLadyLord]和封臣之间的关系，以及如何在双方之间建立更好的关系。这话题真的很吸引人，我甚至不知道不知道我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]如此洞悉明理。"
 lmf_feast.1028.desc.strategist:0 "我听了许多历史战役故事，包括将领犯过的错误，扭转战局的神来一手，甚至战争如何补给路线。我以前听过这些故事，但我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]有一种措辞方式显得如此新颖和贴切。\n\n"
 lmf_feast.1028.desc.overseer:0 "我们详细谈论了军队补给事务……这个话题通常会让我感到无聊透顶，但我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]却总能让它听起来有趣，谁会想到我在谈论补给时会笑得这么开心？\n\n"
 lmf_feast.1028.desc.gallant:0 "我们谈到浪漫和骑士精神，这些话题我通常会觉得很无聊甚至有些厌烦，但我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]却总能把这些都说传奇故事，[family_expert.GetHerHis]的眼睛总是发光，这让它们看起来似乎非常符合现实。\n\n"
 lmf_feast.1028.desc.architect:0 "我们谈论了很多关于建筑的事情……正常来说，我不会对这个话题感兴趣，但我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]有办法让这一切看起来如此重要和迷人。我从来都不知道建造一座[ROOT.Char.GetFaith.HouseOfWorship]需要多少精力！\n\n"
 lmf_feast.1028.desc.administrator:0 "我们谈论领地事务很久……通常这个话题会让我感到无聊透顶，但我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]却能以某种方式将每个平凡事情最后导向神奇后果！[family_expert.GetHerHis|U]洞察力几乎令人难以置信，而[family_expert.GetHerHis]给我的建议都是经过深思熟虑。\n\n"
 lmf_feast.1028.desc.avaricious:0 "我们谈论的主要是[family_expert.GetHerHis]对金钱的热爱以及如何赚钱……通常我对这个话题会感到厌恶，但我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]却说出无穷无尽迷人的故事。[family_expert.GetSheHe]认为每种赚钱方式都不需要讲究道德，而且[family_expert.GetSheHe]确实有充足的故事来支持[family_expert.GetHerHis]的说法。\n\n"
 lmf_feast.1028.desc.schemer:0 "[family_expert.GetSheHe]讲述了其参与的各种计谋。我一度想转身离开，但不知何故，我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]总是能让我保持兴趣。每个故事都有对计谋的知识，而且曲折离奇！我不知道[family_expert.GetHerHis]的头脑为何如此狡猾巧妙。\n\n"
 lmf_feast.1028.desc.seducer:0 "我听了许久[family_expert.GetHerHis]的性史，这种话题我通常不太感兴趣，但我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]喝醉了，认[family_expert.GetHerHis]口无遮拦地说出保密的事情。一个又一个的肮脏故事吸引了我的注意力，里面充满了我几乎不敢相信的丑闻细节。\n\n"
 lmf_feast.1028.desc.torturer:0 "我们谈论了是酷刑的作用。一开始我很反感，直到我意识到我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]喝醉了，[family_expert.GetHerHis]口无遮拦地说出保密的事情。一个又一个的肮脏故事吸引了我的注意力，里面充满了我几乎不敢相信的丑闻细节。\n\n"
 lmf_feast.1028.desc.whole_of_body:0 "我们谈论了很多关于人体和疾病、体液等事物的本质……这个话题通常有点枯燥，但我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]有办法让这一切变得如此有趣。[family_expert.GetSheHe|U]似乎很有动力，总是想知道更多，这让我也有同样的感觉。\n\n"
 lmf_feast.1028.desc.scholar:0 "我们谈论了学术问题，但我这[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]并没有枯燥地背诵哲学和历史，而是把每个问题都变成了一个迷人的谜题。“我们对[family_expert.GetFaith.CreatorNamePossessive]的创造知之甚少，”[family_expert.GetSheHe]悲伤地摇着头感叹道。\n\n"
 lmf_feast.1028.desc.theologian:0 "我们谈论了神学问题……在家宴里这是一个枯燥的话题，但我意识到我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_expert'))]喝醉了，[family_expert.GetHerHis]对[family_expert.GetHerselfHimself]本应保密的话题口无遮拦。[family_expert.GetSheHe]谈论了[ROOT.Char.GetFaith.CreatorName]与造物，谈论了[ROOT.Char.GetFaith.GetNameNoTooltip]的职责和人类……老实说，我从未听过有人这样谈论这些事情！\n\n"
 lmf_feast.1028.desc.end:0 "我大部分时间都在全神贯注地听着[family_expert.GetHerHis]讲的每一个字，直到几乎所有人都离开了。最终我们终于环顾四周，意识到这一点时，[family_expert.GetSheHe]为整个晚上都缠着我而抱歉，但我挥手示意让[family_expert.GetHerHis]安心。事实上，我学到了很多东西！"
 lmf_feast.1028.a:0 "真是一个“内容”丰富的夜上！"
 good_family_feast_conversation:0 "在一次家宴上，[CHARACTER.GetShortUIName|U]从[TARGET_CHARACTER.GetShortUIName]那里学到了很多东西。"
 good_family_feast_conversation_corresponding:0 "在一次家宴上，[TARGET_CHARACTER.GetShortUIName|U]从[CHARACTER.GetShortUIName]那里学到了很多东西。"
 lmf_feast.1029.t:0 "家宴：不速之客"
 lmf_feast.1029.desc.start:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]举行的家宴格外冷清。而[public_lover.GetFirstNameNoTooltip]还选了这一晚前来赴宴，真是不幸。\n\n"
 lmf_feast.1029.desc.notfamily:0 "我曾多次告诉[public_lover.GetHerHim]，[public_lover.GetSheHe]可以自由参加这样的活动，现在我们的关系已经人尽皆知。但是今晚，冷清的家宴让所有人把注意力放在了#EMP[public_lover.GetHerHim]身上#!。\n\n"
 lmf_feast.1029.desc.family:0 "我们的关系总所周知，哪怕我们是一家人，[public_lover.GetSheHe]可能根本不会来，但可能[public_lover.GetSheHe]想见我。糟糕的是冷清的家宴让所有人把注意力放在了#EMP [public_lover.GetHerHim]身上#!。\n\n"
 lmf_feast.1029.desc.end:0 "而[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hater'))|U]尤其反感[public_lover.GetFirstNameNoTooltip]。\n\n我看得出四周的私语和注视，让[public_lover.GetFirstNameNoTooltip]很不自在，我想建议[public_lover.GetSheHe]离开，但我还没有走到[public_lover.GetHerHis]跟前，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_hater'))]就出来骂了几句，这让[public_lover.GetSheHe]不得不愤而离席。\n\n显然这种情况让家宴的气氛更加冷清，而我对此无能为力。"
 lmf_feast.1029.a:0 "好吧，那真是不幸。"
 lover_showed_at_family_feast:0 "[CHARACTER.GetShortUINameNoTooltip|U]因[TARGET_CHARACTER.GetShortUINameNoTooltip]出现在家宴上，而出言羞辱了[TARGET_CHARACTER.GetHerHisMy]"
 lover_showed_at_family_feast_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltip|U]因[CHARACTER.GetShortUINameNoTooltip]出现在家宴上，而出言羞辱了[CHARACTER.GetHerHisMy]"
 lmf_feast.1030.t:0 "家宴：文化冲突"
 lmf_feast.1030.desc:0 "在[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_hater'))]和[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_react'))]开始争论之前，[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的这场家宴还算安静。\n\n起初，没有人在意这两人的争论，现在倒好了，变成争吵了。他们竟在争论到底是[family_hater.GetCulture.GetNameNoTooltip]还是[family_react.GetCulture.GetNameNoTooltip]更好吃？！ 然后，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_react'))]说了一些话，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_hater'))]让感到不满，就这样演变成一场争吵了。\n\n要不是家里的其他人把他们分开，这两人就差点打起来了，那天晚上剩下的时间里，他们一直互相回避，也让家宴气氛十分尴尬。"
 lmf_feast.1030.a:0 "真是倒霉啊。"
 argued_over_different_culture:0 "[CHARACTER.GetShortUINameNoTooltip|U]和[TARGET_CHARACTER.GetShortUINameNoTooltip]在一次家宴上因文化冲突而争论。"
 lmf_feast.1031.t:0 "家宴：奇人百态"
 lmf_feast.1031.desc.start:0 "今晚的家宴也……也算是安静吧。\n\n直到[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_fool'))]"
 lmf_feast.1031.desc.drunkard:0 "喝得酩酊大醉，[family_fool.GetHerselfHimself]一杯接一杯地大口喝酒，然后跌跌撞撞地跑遍了整个大厅，不顾其他家人目光，[family_fool.GetSheHe]大声呼喊着让他们也加入[family_fool.GetHerselfHimself]的出丑行列。\n\n[family_fool.GetSheHe|U]还抓仆人，又摔倒了好几次，最后不得不由其他几个家庭成员将[family_fool.GetSheHe]抬出大厅，在抬走[family_fool.GetHerHim]时，[family_fool.GetSheHe]还在大喊放[family_fool.GetSheHe]下来。"
 lmf_feast.1031.desc.hashishiyah:0 "罂粟花奶饮用过量，[family_fool.GetSheHe]开始变得神志不清陷入谵妄，几名家庭成员试图劝[family_fool.GetHerselfHimself]别这样，但[family_fool.GetSheHe]却不耐烦地挥手。\n\n最终，[family_fool.GetSheHe]跌跌撞撞地在大厅里走来走去，还呕吐了好几次，然后倒下不省人事，最终被仆人们抬走了，而我们其他人则尴尬地沉默看着[family_fool.GetSheHe|U]离场。"
 lmf_feast.1031.desc.lunatic:0 "突然站在一张桌子上，大声引起大家的注意，然后开始滔滔不绝地讲起话来。一开始，大家都以为这是在祝酒词，或者是一个故事，不过才发现[family_fool.GetSheHe]说着毫无意义的话。\n\n然后事情开始恶化。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))|U]变得反复无常，时而尖叫，时而哭得稀里哗啦。然后[family_fool.GetSheHe]抓起一把刀，威胁要刺穿[family_fool.GetHerselfHimself]自己的眼睛时，我只能让[family_fool.GetHerHim]离开大厅，以保证[family_fool.GetHerHis]的安全。"
 lmf_feast.1031.desc.irritable:0 "开始寻衅……一开始是[family_fool.GetHerHim]旁边的人争吵，但后来[family_fool.GetSheHe]站起来对整个家族的人咆哮。什么旧事都翻出来，无论是真实的还是想象的恶行都被说出来，每个人都有错，真是可怕的亲戚。\n\n而[family_fool.GetHerHis|U]的愤怒似乎没有尽头，我们面面相觑，沉默不语，直到最后[family_fool.GetSheHe]恼怒地举起手，冲了出去。"
 lmf_feast.1031.desc.depressed:0 "直接大哭，起初只是有点无声哽咽，旁人只能安慰，但似乎没效果，让[family_fool.GetSheHe]开始大哭……这让整个家族都感到震惊。\n\n没过多久，几乎所有人都围住了[family_fool.GetHerHim]，询问出了什么问题，并试图帮忙，但这似乎让事情变得更糟。很快，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))]逃离出了大厅，只剩下我们面面相觑。"
 lmf_feast.1031.desc.rakish:0 "一整晚大出风头了，[family_fool.GetSheHe|U]整晚醉醺醺地对仆人毛手毛脚，还说出下流淫语，甚至大家听得一清二楚，一些比较贞洁的家庭成员都直皱眉头。\n\n直到[family_fool.GetSheHe]抓住一个年轻的仆人，全然不顾[dummy_attracted_gender.GetHerHim]疯狂反对，当着全家人的面抚摸[dummy_attracted_gender.GetHerHis]，我再也忍不住了，我只能把[family_fool.GetHerHim]从大厅里拖了出来，回来头大家都尴尬地沉默不语。"
 lmf_feast.1031.desc.reclusive:0 "似乎受够了我们的陪伴。[family_fool.GetSheHe|U]站了起来，并开始告诉我们每个人[family_fool.GetSheHe]到底在想什么……不过[family_fool.GetHerHis]的想法并不好。\n\n“我真不明白我为什么要来参加这些聚会！” [family_fool.GetSheHe]喊道。“我不想待在这里！你们谁别想让我待在这里！所以，如果你们不介意的话，我会很乐意告别你们，我要走了！”说完，[family_fool.GetSheHe]气冲冲地走出了大厅，留下我们面面相觑。"
 lmf_feast.1031.desc.deviant:0 "一整晚大出风头了，[family_fool.GetSheHe|U]整晚醉醺醺地对仆人毛手毛脚，还说出下流淫语，甚至大家听得一清二楚，一些比较贞洁的家庭成员都直皱眉头。\n\n直到[family_fool.GetSheHe]撕掉衣服，站到桌子上，斥责我们太拘谨，无法好好享受肉欲，这时，我再也忍不住了，我只能把[family_fool.GetHerHim]从大厅里拖了出来，回来头大家都尴尬地沉默不语。"
 lmf_feast.1031.desc.contrite:0 "爬上一张桌子，吓了大家一跳。[family_fool.GetSheHe|U]站在那里一会儿，双手无处安放，直到房间安静下来，大家都等着看[family_fool.GetSheHe]要说什么。\n\n“我再也忍受不了了，”[family_fool.GetSheHe]说。“这个秘密……太让人煎熬了！[family_fool.GetFaith.HighGodName]正因我的沉默而审判我，我再也忍受不了了！”然后[family_fool.GetSheHe]说出[family_fool.GetHerHis]的秘密，在我们都震惊得说不出话的时候，逃离了大厅。"
 lmf_feast.1031.desc.newtrait:0 "\n\n没人知道这到底是怎么回事，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))]平时都不是这样的，难道是压力太大了？\n\n"
 lmf_feast.1031.desc.trait:0 "\n\n以[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_fool'))]的举止来说，符合大家对[family_fool.GetSheHe|U]的现象，但在聚会上这样做？难道是受到什么大压力吗？\n\n"
 lmf_feast.1031.desc.end:0 "无论原因是什么，大厅里的气氛都变得低落……不过我确信，家里人接下来几个月都会有闲话可说。"
 lmf_feast.1031.a:0 "这……还行吧。"
 lmf_feast.1032.t:0 "家宴：喜悦"
 lmf_feast.1032.desc:0 "今晚在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的家宴充满了欢乐。\n\n这可要多谢[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_1'))]、[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_2'))]和[ROOT.Char.Custom2('my_relation_by_name_no_comma', SCOPE.sC('family_celebrate_3'))]这几位。\n\n[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_celebrate_2'))]先叫乐师演奏了一段生动的乐曲，然后[family_celebrate_2.GetSheHe]开始跳起舞来，另外两个人也很快加入进来。\n\n他们还把家里的其他成员一个接一个地拉起来跳舞，我还没反应过来，整个大厅就沉浸在狂欢之中。[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('family_celebrate_1'))]站在一张桌子上，叫我展示我的舞技，我承认我确实这么做了，这让每个人都很高兴。\n\n当家宴接近尾声时，我们都筋疲力尽了……不过家里所有人都不会很快忘记这一晚。"
 lmf_feast.1032.a:0 "太好了，这样多来点。"
 all_stressed_family_dinner_guests:0 "所有家宴客人"
 lmf_feast.1033.t:0 "家宴：嗤之以鼻"
 lmf_feast.1033.desc.start:0 "今晚的家宴也算是祥和，不知怎么，[ROOT.Char.Custom2('my_relation_by_name', SCOPE.sC('family_rival_1'))]和[family_rival_1.GetHerHis][family_rival_2.Custom('WifeHusband')]吵了起来。\n\n我认为是[angry_spouse.GetSheHe|U]挑起了事端，只见热嘲冷讽[angry_spouse.GetHerHis][target_spouse.Custom('WifeHusband')]，周围的人沉默不语、尴尬不已，直到最后[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]再也忍受不了了。\n\n就在那时，声音又响了起来。我听到"
 lmf_feast.1033.desc.sodomy:0 "关于[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]与其他男人的暧昧秘密，这是房间里每个人都知道的丑闻。\n\n"
 lmf_feast.1033.desc.incest:0 "这是关于……呃，乱伦的事。当然，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]的丑闻我们都知道。\n\n"
 lmf_feast.1033.desc.deviant:0 "这是关于他们之间的床事，考虑到[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]那众所周知的品味……真是不好评价。\n\n"
 lmf_feast.1033.desc.secretsodomy:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]被指控与另一个男人有染……这真是让家人震惊的消息。\n\n"
 lmf_feast.1033.desc.secretincest:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]被指责乱伦……这真是让家人震惊的消息。\n\n"
 lmf_feast.1033.desc.secretdeviant:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('angry_spouse'))]对[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]的“变态行径”感到厌恶……这真是让家人震惊的消息。\n\n"
 lmf_feast.1033.desc.infidelity:0 "关于[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]不忠的事情，这个事情已经为整个家族所熟知。\n\n"
 lmf_feast.1033.desc.secretinfidelity:0 "关于[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('target_spouse'))]那些秘密事务……这真是让家族震惊的消息。\n\n"
 lmf_feast.1033.desc.rival:0 "那些我们家族都知道的陈年老调，只不过又一次拿出来争吵。\n\n"
 lmf_feast.1033.desc.potrival:0 "一连串怨念语句，显然这些在[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('angry_spouse'))]心中已经积累了一段时间。\n\n"
 lmf_feast.1033.desc.end:0 "显然这可能是#EMP 起因#!，这一架持续快一小时，直到我[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('target_spouse'))]祈求我们管管他俩，而我也同意了，然而我一介入，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('angry_spouse'))]就把怒火倾向#EMP 我#!。\n\n那时，我就知道，今晚应该早点结束了。"
 lmf_feast.1033.a:0 "真是尴尬啊。"
 lmf_heir.1501.t:0 "秘密训练"
 lmf_heir.1501.start:0 "我正在检查防御工事时，[new_educator.Custom2('MyCharacterIntroduction', ROOT.Char)]要求与我私下谈谈。\n\n“[ROOT.Char.GetLadyLord]，您的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))]最近几个月经常来找我，向我讨教剑术。我没有拒绝[focus_child.GetHerHim]，因为我看到了[focus_child.GetHerHis]的激情，但是……我不能再这样偷偷摸摸下去了。”\n\n“[focus_child.GetTitledFirstNameNoTooltip]很有潜力，”[new_educator.GetSheHe]坚持说，“而且[focus_child.GetSheHe]在[focus_child.GetHerHis]目前的学习中很痛苦。”\n\n"
 lmf_heir.1501.unusual:0 "“我知道，[focus_child.Custom('GirlBoy')]拿起刀剑是很不寻常的，但是"
 lmf_heir.1501.default:0 "“我知道您一定对[focus_child.GetHerHis]的未来另有打算，但是"
 lmf_heir.1501.end:0 "如果您允许的话，我愿意训练[focus_child.GetHerHim]，以弥补时间上的不足。[focus_child.GetSheHe|U]会学得很快的，我向您保证。”"
 lmf_heir.1500.a.tt_change:0 "[focus_child.GetFirstNamePossessiveNoTooltip]的[education_focus|E]更改为[martial|E]"
 lmf_heir.1500.a.tt_tutor:0 "[new_educator.GetTitledFirstNameNoTooltip]亲自培训[focus_child.GetFirstNameNoTooltip]，以弥补缺失的教育"
 lmf_heir.1501.a:0 "很好。让我们看看[focus_child.GetFirstNameNoTooltip]的效果如何。"
 lmf_heir.1501.b:0 "绝对不行。[focus_child.GetFirstNameNoTooltip]必须专注当前的学习。"
 lmf_heir.1501.c:0 "[new_educator.GetFirstNameNoTooltip]可以帮忙，但我会亲自教授[focus_child.GetFirstNameNoTooltip]剑术。"
 lmf_heir.1501.d:0 "[new_educator.GetFirstNameNoTooltip]可以帮忙，但我会继续担任[focus_child.GetFirstNamePossessiveNoTooltip]的教师。"
 lmf_heir.1503.t:0 "我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))|U]的学习进展"
 lmf_heir.1503.start:0 "我收到了我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))|U]军事训练的消息，并且……不太好。\n\n“[focus_child.GetTitledFirstNameNoTooltip]确实还太小，”[focus_child.GetHerHis]最新的教练坦言，“但很明显，[ROOT.Char.GetLadyLord]，[focus_child.GetHerHis]的心思根本不在这上面。[focus_child.GetSheHe|U]"
 lmf_heir.1503.female:0 "知道[focus_child.GetSheHe]永远不会被允许拿起武器，即使事实并非如此，"
 lmf_heir.1503.end:0 "在策略问题上既缺乏才能，也没有兴趣。”\n\n这已经不是我收到的第一份这样的报告了。虽然令人失望，但也许是时候考虑把[focus_child.GetFirstNameNoTooltip]移到[focus_child.GetSheHe]可能擅长的另一个领域了。"
 lmf_heir.1503.a:0 "也许[new_diplomacy_educator.GetFirstName]可以辅导[focus_child.GetHerHim]学习外交。"
 lmf_heir.1503.b:0 "[focus_child.GetFirstNameNoTooltip]可以改学外交，我们稍后会找到合适的教师。"
 lmf_heir.1503.c:0 "也许[new_stewardship_educator.GetFirstName]可以辅导[focus_child.GetHerHim]学习管理。"
 lmf_heir.1503.d:0 "[focus_child.GetFirstNameNoTooltip]可以改学管理，我们稍后会找到合适的教师。"
 lmf_heir.1503.e:0 "也许[new_intrigue_educator.GetFirstName]可以辅导[focus_child.GetHerHim]。"
 lmf_heir.1503.f:0 "[focus_child.GetFirstNameNoTooltip]可以改学密谋，我们稍后会找到合适的教师。"
 lmf_heir.1503.g:0 "也许[new_learning_educator.GetFirstName]可以辅导[focus_child.GetHerHim]。"
 lmf_heir.1503.h:0 "[focus_child.GetFirstNameNoTooltip]倒是可以接受正规教育，我们稍后会找到合适的教师。"
 lmf_heir.1503.i:0 "不，[focus_child.GetFirstNameNoTooltip]只需开发自身的潜力并努力尝试。"
 lmf_heir.1503.a.tt_change:0 "[focus_child.GetFirstNamePossessiveNoTooltip]的[education_focus|E]更改为[diplomacy|E]"
 lmf_heir.1503.a.tt_tutor:0 "[new_diplomacy_educator.GetTitledFirstNameNoTooltip]亲自培训[focus_child.GetFirstNameNoTooltip]，以弥补缺失的教育"
 lmf_heir.1503.tt_no_tutor:0 "[focus_child.GetFirstNameNoTooltip]会加倍努力，以弥补失去的教育"
 lmf_heir.1503.b.tt_change:0 "[focus_child.GetFirstNamePossessiveNoTooltip]的[education_focus|E]更改为[stewardship|E]"
 lmf_heir.1503.b.tt_tutor:0 "[new_stewardship_educator.GetTitledFirstNameNoTooltip]亲自培训[focus_child.GetFirstNameNoTooltip]，以弥补缺失的教育"
 lmf_heir.1503.c.tt_change:0 "[focus_child.GetFirstNamePossessiveNoTooltip]的[education_focus|E]更改为[intrigue|E]"
 lmf_heir.1503.c.tt_tutor:0 "[new_intrigue_educator.GetTitledFirstNameNoTooltip]亲自培训[focus_child.GetFirstNameNoTooltip]，以弥补缺失的教育"
 lmf_heir.1503.d.tt_change:0 "[focus_child.GetFirstNamePossessiveNoTooltip]的[education_focus|E]更改为[learning|E]"
 lmf_heir.1503.d.tt_tutor:0 "[new_learning_educator.GetTitledFirstNameNoTooltip]亲自培训[focus_child.GetFirstNameNoTooltip]，以弥补缺失的教育"
 lmf_heir.1505.t:0 "训练我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))|U]"
 lmf_heir.1505.desc:0 "我收到了我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))]军事训练的消息。\n\n“[focus_child.GetTitledFirstNameNoTooltip]确实还太小，”[focus_child.GetHerHis]最新的教练坦言，“[ROOT.Char.GetLadyLord]，但她表现出如此坚定的决心和天赋。她一直要求让她参加正式的剑术训练，我想如果我们不让她参加，她也会偷偷去学的。”\n\n一个女孩学习打斗是非常不合适的……但话又说回来，为什么她只能学习策略和兵法呢？"
 lmf_heir.1505.a:0 "就让她学习战斗吧，我们拭目以待。"
 lmf_heir.1505.b:0 "她目前的训练已经足够了。她应该专注于此。"
 allowed_to_marry_at_will:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]允许[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat]按照[CharYourHerHis(TARGET_CHARACTER)]自己的意愿结婚。"
 allowed_to_marry_at_will_corresponding:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]允许[CHARACTER.GetShortUINameNoTooltipNoFormat]按照[CharYourHerHis(CHARACTER)]自己的意愿结婚。"
 lmf_heir.1511.t:0 "为爱结婚？"
 lmf_heir.1511.desc.start:0 "[focus_child.GetFirstNameNoTooltip]还很年轻，但意识到[focus_child.GetSheHe]已经长大，订婚指日可待。\n\n一天晚上，[focus_child.GetSheHe]在餐桌上大胆地宣布。“如果我结婚，我想嫁给我爱的人！[focus_child.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]，你不会强迫我嫁人吧？”\n\n"
 lmf_heir.1511.desc.sex:0 "越来越明显的是，我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))]对追逐[focus_child.Custom('GetGirlsBoysOpposite')]并不太感兴趣。也许这种对独立的突然兴趣就源于此？\n\n"
 lmf_heir.1511.desc.lustful:0 "我愈发注意到，我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))]虽说年纪尚小，但[focus_child.GetHerHis]正成长为一个好色的[focus_child.Custom('GetLassLad')]。不过，谁年轻的时候没这样过！\n\n"
 lmf_heir.1511.desc.sibling:0 "当我很迷惑为什么[focus_child.GetSheHe]甚至会问这样的问题，[focus_child.GetSheHe]继续说。“你允许[favored_sibling.GetFirstNameNoTooltip]去和任何[favored_sibling.GetSheHe]想要的人结婚！为什么我就没有相同的待遇呢？”啊，原来是对于[focus_child.GetHerHis][focus_child.Custom2('LMF_RelationToMePossessive', SCOPE.sC('favored_sibling'))]的嫉羡。现在一切都说得通了。\n\n"
 lmf_heir.1511.desc.adventure:0 "[focus_child.GetHerHis]这是怎么了，我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('focus_child'))]怎么突然就想离家单干了？也许是对冒险的渴望？想趁着还没结婚挥洒自己的青春？\n\n"
 lmf_heir.1511.desc.end.female:0 "问题在于是否应该鼓励这种欲望。结婚生子是我们宗族成员的责任，无论公平与否，女人都必须趁着年轻结婚生子。不过……也许此时还不需要操心？"
 lmf_heir.1511.desc.end:0 "问题在于是否应该鼓励这样做。结婚生子是我们宗族成员的责任。不过……也许可以先放一放？在这件事上，[focus_child.GetFirstNameNoTooltip]年龄尚小，而且似乎很想按[focus_child.GetHerHis]自己的方式行事。"
 lmf_heir.1511.a:0 "结婚的事可以先放一放。"
 lmf_heir.1511.b:0 "我说结婚就结婚，这就是“终审判决”。"
 invite_suitor_1_introduction_tt:0 "[suitor_1.GetTitledFirstName]将受邀前往[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，与[secondary_actor.GetTitledFirstNameNoTooltip]进行相亲"
 invite_suitor_2_introduction_tt:0 "[suitor_2.GetTitledFirstName]将受邀前往[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，与[secondary_actor.GetTitledFirstNameNoTooltip]进行相亲"
 invite_suitor_3_introduction_tt:0 "[suitor_3.GetTitledFirstName]将受邀前往[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，与[secondary_actor.GetTitledFirstNameNoTooltip]进行介绍。"
 lmf_heir.1516.warning.matrilineal_tt:0 "如果相亲以结婚告终，那么会是#X 母系婚姻#!"
 lmf_heir.1516.warning.patrilineal_tt:0 "如果相亲以结婚告终，那么会是#X 父系婚姻#!"
 lmf_heir.1516.t:0 "相亲？"
 lmf_heir.1516.desc.start:0 "好消息是，尽管[secondary_actor.GetSheHe]已获准在自己愿意的情况下结婚，但[secondary_actor.GetFirstNameNoTooltip]似乎对[secondary_actor.GetHerHis]的问题有些自己的想法。\n\n[secondary_actor.GetSheHe|U]今天找到我，告诉我"
 lmf_heir.1516.desc.one:0 "[secondary_actor.GetSheHe]可能感兴趣的一个[suitor_1.Custom('WomanManGirlBoy')]的名字"
 lmf_heir.1516.desc.two:0 "[secondary_actor.GetSheHe]可能感兴趣的那两个[suitor_1.Custom('WomenMenGirlsBoys')]的名字"
 lmf_heir.1516.desc.three:0 "[secondary_actor.GetSheHe]可能感兴趣的一串[suitor_1.Custom('WomenMenGirlsBoys')]的名单"
 lmf_heir.1516.desc.matrilineal:0 "，并结成父系婚姻。\n\n"
 lmf_heir.1516.desc.normal:0 "，并会面。\n\n"
 lmf_heir.1516.desc.end:0 "如果我同意，我就需要邀请[suitor_1.GetHerHim]来[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]进行相亲。但愿我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))]是认真的，而不是在浪费我的时间。如果为了让[secondary_actor.GetHerHis]最终结婚，我不得不无视[secondary_actor.GetHerHim]的心愿。"
 lmf_heir.1516.a:0 "我们将邀请[suitor_1.GetFullNameNoTooltip]。"
 lmf_heir.1516.b:0 "我们将邀请[suitor_2.GetFullNameNoTooltip]。"
 lmf_heir.1516.c:0 "我们将邀请[suitor_3.GetFullNameNoTooltip]。"
 lmf_heir.1516.d:0 "胡说，我自己会找到更好的人。"
 lmf_heir.1517.t:0 "是时候结婚了"
 lmf_heir.1517.desc:0 "[focus_child.GetFirstNameNoTooltip]今天早上来找我，看起来很腼腆。\n\n“我知道我说过我想自己结婚，[focus_child.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]，但事实上，我还没有遇到一个值得结婚的[focus_child.Custom('GetWomanManOpposite')]。”\n\n“这和我想的意思一样吗？”我微笑着问道。\n\n[focus_child.GetSheHe|U]点点头，叹了口气。“是的，我想是时候了。如果您能为我找到一个合适的[focus_child.Custom('WifeHusbandOpp')]，我会非常感激。”"
 lmf_heir.1517.a:0 "终于啊！"
 lmf_heir.1518.t:0 "该回家了？"
 lmf_heir.1518.desc:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('focus_child'))][focus_child.GetFirstNameNoTooltip]，这个浪迹天涯的游子终于要回来了！\n\n显然，[focus_child.GetHerHis]不愿再流浪了，即使这意味着安定下来，无条件接受我本来给[focus_child.GetSheHe]安排的[focus_child.Custom('WifeHusbandOpp')]。当然，前提是我得同意让[focus_child.GetHerHim]回到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。\n\n[focus_child.GetFirstNamePossessiveNoTooltip]的叛逆期好像到头了。"
 lmf_heir.1518.a:0 "让[focus_child.GetHerHim]回来吧。"
 lmf_heir.1518.b:0 "说回就想回？做梦！"
 lmf_heir.1519.t:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))|U]恋爱了"
 lmf_heir.1519.desc.start:0 "我相信我终于找到了[heir.GetFirstNamePossessiveNoTooltip]不愿意结婚的原因：这[heir.Custom('GirlBoy')]坠入爱河了。\n\n不幸的是，"
 lmf_heir.1519.desc.samesex:0 "[heir.GetHerHis]所爱的对象也是一个[heir_lover.GetWomanMan]。可以肯定，这相当尴尬。\n\n"
 lmf_heir.1519.desc.order:0 "[heir.GetHerHis]所爱的对象恰好对一个骑士团发过誓。只要[heir_lover.GetSheHe]不背誓，那[heir_lover.GetSheHe|U]就不能结婚。\n\n"
 lmf_heir.1519.desc.married:0 "[heir.GetHerHis]所爱的对象恰好已经结婚了。这挺常见，不过也挺可耻的。\n\n"
 lmf_heir.1519.desc.betrothed:0 "[heir.GetHerHis]所爱的对象即使还没有结婚，但也已经和另一个人订婚了。只要婚约还在，[heir_lover.GetSheHe|U]就不能和[heir.GetHerHim]结婚。\n\n"
 lmf_heir.1519.desc.permission.lover.man:0 "由于我之前拒绝了[heir.GetHerHis]与情人结婚的许可，现在这男人显然不愿意向我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))]求婚了。\n\n"
 lmf_heir.1519.desc.permission.lover.woman:0 "由于我之前拒绝了[heir.GetHerHis]与情人结婚的许可，我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))]显然认为自己也会被拒绝。\n\n"
 lmf_heir.1519.desc.permission.both:0 "我之前不允许他们结婚，而他们现在打算私下就结婚了。如果允许他们继续下去，情况会相当尴尬。\n\n"
 lmf_heir.1519.desc.permission.heir.man:0 "考虑到我之前的拒绝，我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))]显然不愿意征求[heir_lover.GetHerHim]的结婚许可。\n\n"
 lmf_heir.1519.desc.permission.heir.woman:0 "考虑到我已经拒绝了她的求婚，这男人显然不愿意征求我[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))]的同意。\n\n"
 lmf_heir.1519.desc.generic:0 "他们俩人不可能结婚。因此，他们正秘密地进行着，而我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))]太痴情了，以至于认为[heir.GetSheHe]有比对[heir.GetSheHe]所爱的这个[heir_lover.GetWomanMan]更重要的责任。\n\n"
 lmf_heir.1519.desc.end.canact:0 "也许我应该告诉[heir.GetFirstNameNoTooltip]我知道了，然后看着他们结婚。或者告诉[heir.GetHerHim]，让他们结束这种无望的安排。无论如何，都应该有所行动。"
 lmf_heir.1519.desc.end:0 "我可能会干涉我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('heir'))]的恋情，不过我怀疑[heir.GetSheHe]会感谢我这么做。"
 lmf_heir.1519.a:0 "[heir.GetFirstNameNoTooltip]得结束这一切。这将一事无成。"
 lmf_heir.1519.b:0 "我会告诉他们我改变主意了。"
 lmf_heir.1519.c:0 "[heir_lover.GetFirstNameNoTooltip]必须放弃[heir_lover.GetHerHis]的誓言，与我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))]结婚。"
 lmf_heir.1519.d:0 "[heir_lover.GetFirstNameNoTooltip]必须结束[heir_lover.GetHerHis]的婚约，与我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('heir'))]结婚。"
 lmf_heir.1519.e:0 "不，让[heir.GetFirstNameNoTooltip]尽情享乐吧。"
 lmf_heir.1530.heir_training.tt:0 "[trainee_heir.GetFirstNamePossessiveNoTooltip]的统治准备"
 lmf_heir.1530.heir_begin_training.tt:0 "[trainee_heir.GetFirstNameNoTooltip]开始继承人培训"
 lmf_heir.1601.t:0 "宫廷中的一天"
 lmf_heir.1601.desc:0 "今天，在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的宫廷中，一切事物都如此得平淡如水，或者说我是这么认为的。\n\n在御座厅清空后，我的继承人[your_heir.GetFirstNameNoTooltip]带着疑惑靠近我，在我没有注意到的地方，[your_heir.GetSheHe]旁观了一整天我的治理过程，很明显，[your_heir.GetHerHis]并没有理解我所裁决的几个问题。\n\n随着我们的讨论逐渐深入，一个老问题又会带出一些新问题，一个小时之后，我们一直在原地踏步，[your_heir.GetFirstNameNoTooltip]并没有从中学到关于统治管理的更多知识。\n\n“这是怎么回事，[your_heir.Custom('GetLassLad')]？”我困惑地问。"
 lmf_heir.1601.a:0 "不管需要多少时间，尽可能详尽地做出解释。"
 lmf_heir.1601.b:0 "找其他人来回答[your_heir.GetHerHis]全部问题。"
 lmf_heir.1601.a.success.tt:0 "[your_heir.GetFirstNameNoTooltip]理解了"
 lmf_heir.1601.a.success.effect.tt:0 "[your_heir.GetFirstNamePossessiveNoTooltip]的继承人培训效果显著"
 lmf_heir.1601.a.failure.tt:0 "[your_heir.GetFirstNameNoTooltip]不理解"
 lmf_heir.1601.a.failure.effect.tt:0 "[your_heir.GetFirstNamePossessiveNoTooltip]的继承人培训毫无进展"
 lmf_heir.1601.a.critfail.tt:0 "[your_heir.GetFirstNameNoTooltip]完全不理解"
 lmf_heir.1601.a.critfail.effect.tt:0 "[your_heir.GetFirstNamePossessiveNoTooltip]的继承人培训开始倒退"
 lmf_heir.1602.t:0 "花园之怒"
 lmf_heir.1602.desc:0 "今天本来应该是[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]平和的一天，这份安宁却被无情地打破了，卫兵告诉我说，我的继承人[your_heir.GetFirstNameNoTooltip]和[angry_family.GetFirstNameNoTooltip]刚刚在草地上扭打了起来，他强行将他们两个分开了。\n\n“打架？”我惊呼，“他们彼此殴打吗？你一定是搞错了！”然而很快我就知道，错的并不是眼前这位卫兵。[angry_family.GetFirstNameNoTooltip]是整件争端的发起者，这整件事似乎起因于一些他认为[your_heir.GetFirstNamePossessiveNoTooltip]对他的轻蔑。当然，在我看来，这整件事可能起因于嫉妒，[angry_family.GetFirstNameNoTooltip][angry_family.GetHerHis]很明显对[angry_family.Custom2('LMF_RelationToMePossessive', SCOPE.sC('your_heir'))]作为我的继承人感到压力。\n\n无论如何，当他们在我训斥之后咕哝着道歉时，我怀疑这种不和会一直持续下去。"
 lmf_heir.1602.a:0 "为什么孩子们就不能和平相处呢？"
 fought_over_heir_status:0 "由于[CHARACTER.GetHerHis]嫉妒[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]的继承人身份，[CHARACTER.GetShortUIName]与[TARGET_CHARACTER.GetShortUIName]发生了争吵。"
 fought_over_heir_status_corresponding:0 "[TARGET_CHARACTER.GetShortUIName]因嫉妒[CHARACTER.GetShortUINamePossessiveNoTooltip]的继承人身份而与之大打出手。"
 lmf_heir.1603.t:0 "问题太多了！"
 lmf_heir.1603.desc:0 "培养年轻的[your_heir.GetFirstNameNoTooltip]统治[ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]是一个难题，今天就是这样的艰难一天。\n\n[your_heir.GetFirstNameNoTooltip]从黎明时分就开始问无关紧要的问题。[your_heir.GetSheHe|U]想了解统治者的情况。“开始得有点早，不是吗，[your_heir.Custom('GetLassLad')]？”我笑着说。不过这似乎只会鼓励[your_heir.GetHerHim]。\n\n在接下来的日子里，[your_heir.GetFirstNameNoTooltip]一直跟着我，从御座厅到庭院，到马厩……甚至到厕所！我不得不禁止[your_heir.Custom('GirlBoy')]跟着我进去！\n\n[your_heir.GetSheHe]却在门外说：“我只想弄明白！”而我坐在门内揉着太阳穴。"
 lmf_heir.1603.a:0 "你要多听，而不是多看！"
 lmf_heir.1604.desc:0 "我的年轻继承人和我一起去[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]视察驻军，但[your_heir.GetHerHis]的大部分问题都是关于战争。\n\n“为什么[war_target.GetPrimaryTitle.GetNameNoTierNoTooltip]这么恨我们？”\n“当我们打败[war_target.GetTitledFirstNameNoTooltip]后，我们会怎么处理[war_target.GetHerHim]？”\n“我们会打败[war_target.GetHerHim]，不是吗？”\n“如果[war_target.GetHerHis]的军队来到[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]会怎么样？”\n\n这些都是毫无疑问的好问题，是[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]未来的统治者应该问的问题……但……首先我们是去检阅驻军的。"
 lmf_heir.1604.a:0 "尽量耐心解答。"
 lmf_heir.1604.b:0 "让[ROOT.Char.GetCouncillorPosition( 'councillor_marshal' ).GetPositionName]去教[your_heir.GetHerHim]吧。"
 lmf_heir.1605.t:0 "愤怒的[your_councillor.GetCouncilTitle|U]"
 lmf_heir.1605.desc.start:0 "夜色映入眼帘，这时一位内阁成员也闯入御座厅。\n\n“今天你那[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))]竟敢对我下达命令 ！？”，[your_councillor.GetTitledFirstNameNoTooltip]大喊道，“把我当成一个佣人？而不是一位[your_councillor.GetCouncilTitle|l]！”\n\n我不得不打了个马虎，让[your_councillor.GetHerselfHimself]冷静下来。“我正在教导[your_heir.GetTitledFirstNameNoTooltip]遵守则，我保证[your_heir.GetSheHe]会"
 lmf_heir.1605.desc.same:0 "成为一位好[ROOT.Char.GetTitleAsNameNoTooltip]”\n\n“但[your_heir.GetSheHe|U]#EMP 还不是#![ROOT.Char.GetTitleAsNameNoTooltip]！”"
 lmf_heir.1605.desc.opposite:0 "成为你的好[ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip]。”\n\n“但[your_heir.GetSheHe|U]#EMP 还不是#![ROOT.Char.GetPrimarySpouse.GetTitleAsNameNoTooltip]！”"
 lmf_heir.1605.desc.default:0 "成为一位好领主。”\n\n“但[your_heir.GetSheHe|U]#EMP 还不是#![ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]！”"
 lmf_heir.1605.a:0 "试着教教[your_heir.GetFirstNameNoTooltip]更多技巧。"
 lmf_heir.1605.b:0 "说服[your_councillor.GetTitledFirstNameNoTooltip]帮助[your_heir.GetFirstNamePossessiveNoTooltip]培训。"
 lmf_heir.1605.b.success.tt:0 "[your_councillor.GetSheHe|U]同意帮助[your_heir.GetFirstNameNoTooltip]"
 lmf_heir.1605.b.failure.tt:0 "[your_councillor.GetSheHe|U]拒绝帮助[your_heir.GetFirstNameNoTooltip]"
 lmf_heir.1605.b.critfail.tt:0 "[your_councillor.GetSheHe|U]将你的请求视为侮辱"
 convinced_to_help_heir:0 "[CHARACTER.GetShortUIName]开始协助[TARGET_CHARACTER.GetShortUINamePossessive]训练继承人。"
 convinced_to_help_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUIName]开始协助[CHARACTER.GetShortUINamePossessive]训练继承人。"
 not_convinced_to_help_heir:0 "[TARGET_CHARACTER.GetShortUINamePossessive]对[CHARACTER.GetShortUIName]的干涉激怒了[CHARACTER.GetHerHis]。"
 not_convinced_to_help_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUIName]对[CHARACTER.GetShortUINamePossessive]的干涉激怒了[TARGET_CHARACTER.GetHerHis]。"
 lmf_heir.1605.c:0 "让他俩自己解决吧。"
 lmf_heir.1605.c.success.tt:0 "他们两人解决了问题"
 lmf_heir.1605.c.failure.tt:0 "他们之间矛盾与日俱增"
 lmf_heir.1606.t:0 "不断冒犯"
 lmf_heir.1606.desc:0 "[your_heir.GetFirstNameNoTooltip]冲进我的书房时愤怒地喊道：“[your_heir.GetSheHe]不听我的！”\n\n经过一番安抚和劝说，我终于知道[your_heir.GetFirstNamePossessiveNoTooltip]愤怒的来源不是别人，正是我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_courtier'))]，[your_courtier.GetTitledFirstNameNoTooltip]。显然[your_courtier.Custom('WomanManGirlBoy')]一直对[your_heir.GetFirstNameNoTooltip]的命令置若罔闻，粗鲁无礼到了冒犯的地步。\n\n听完我好笑地问：“你首先想到的是来找我吗？”。\n\n[your_heir.GetFirstNameNoTooltip]沮丧地举起了手，“我不知道该怎么办！”"
 lmf_heir.1606.a:0 "[your_heir.GetSheHe|U]必须学会宽恕和遗忘。"
 lmf_heir.1606.b:0 "必须支持[your_heir.GetSheHe|U]。"
 lmf_heir.1606.c:0 "给[your_heir.GetHerHim]上一课，让[your_courtier.GetSheHe]不会很快忘记。"
 will_not_listen_to_heir:0 "[CHARACTER.GetShortUIName]对[TARGET_CHARACTER.GetShortUINamePossessive]在宫廷中不断的不敬和无礼感到失望。"
 will_not_listen_to_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUIName]对[CHARACTER.GetShortUINamePossessive]在宫廷中不断的不敬和无礼感到失望。"
 lmf_heir.1606.d:0 "教[your_heir.GetFirstNameNoTooltip]如何更好地处理这种情况。"
 lmf_heir.1606.e:0 "训斥[your_courtier.GetTitledFirstNameNoTooltip]的无礼。"
 forced_to_listen_to_heir:0 "[CHARACTER.GetShortUIName]因经常对[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]的继承人不敬而被[TARGET_CHARACTER.GetShortUIName]训斥。"
 forced_to_listen_to_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUIName]因经常对[CHARACTER.GetShortUINamePossessiveNoTooltip]的继承人不敬而被[CHARACTER.GetShortUIName]训斥。"
 lmf_heir.1607.t:0 "干扰"
 lmf_heir.1607.desc:0 "[your_heir.GetFirstNameNoTooltip]要学会如何统治，因为总有一天[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]会属于[your_heir.GetHersHis]的，但最近[your_heir.Custom('GetLassLad')]做得太过分了。\n\n我已经两次向廷臣下达命令，结果！[your_heir.GetFirstNameNoTooltip]竟然阻挠了我的命令，甚至对一个违法者的判决都被撤销了，就因为[your_heir.GetFirstNameNoTooltip]不同意？但却没有告诉我！更令人烦恼的是，有好几次我下达命令后，那个人却朝我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))]看了一眼，似乎在寻求确认！\n\n真的不把我这个[ROOT.Char.GetTitleAsNameNoTooltip]放在眼里了？"
 lmf_heir.1607.a:0 "唉，随[your_heir.GetSheHe|U]吧……"
 lmf_heir.1607.b:0 "[your_heir.GetFirstNameNoTooltip]学做领主之前先学会做人！"
 lmf_heir.1608.t:0 "军营中的愤怒"
 lmf_heir.1608.desc:0 "看着我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('your_heir'))]在军营里练习剑术，我很担心看到[your_heir.GetSheHe]被其他[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]羞辱。\n\n尤其是[your_courtier.GetTitledFirstNameNoTooltip]，傲慢自大，无视意见，甚至在[your_heir.GetFirstNameNoTooltip]向[your_courtier.GetHerHim]请求指点时，摆手离开。\n\n“[your_courtier.GetSheHe|U]知道的确实比我多得多，但总有一天我会成为领主。赢得[your_courtier.GetHerHis]的尊重！”[your_heir.GetFirstNameNoTooltip]这番话让我欣慰至极。"
 lmf_heir.1608.a:0 "帮助[your_heir.GetFirstNameNoTooltip]提升[your_heir.GetHerHis]的武艺。"
 lmf_heir.1608.b:0 "让[your_courtier.GetTitledFirstNameNoTooltip]大胆训斥。[your_courtier.GetSheHe|U]必须知道[your_courtier.GetHerHis]是谁。"
 lmf_heir.1608.c:0 "让他俩自己解决吧。"
 does_not_respect_heir:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]在军营中，被[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]不尊重态度感到恼怒。"
 does_not_respect_heir_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]在军营中，被[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]不尊重态度感到恼怒。"
 lmf_heir.1609.t:0 "继承人受伤"
 lmf_heir.1609.desc:0 "当我在[ROOT.Char.Custom('FortifiedBuilding')]内收到[your_heir.GetFirstNameNoTooltip]受了重伤的消息，我急忙跑向军营，担心情况不妙，并暗骂自己，竟然让[your_heir.GetSheHe]去做[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]。\n\n让我松了一口气的是，[your_heir.GetSheHe]并没有死，不过受了重伤，据说是在训练时发生了意外。\n\n我请求[GetCourtPositionType('court_physician_court_position').GetNameNoTooltip()]无论发生什么，都要尽快处理！"
 lmf_heir.1609.a:0 "我们能做的只有祈祷。"
 lmf_heir.1609.a.injured.tt:0 "[your_heir.GetTitledFirstNameNoTooltip]受伤了！"
 lmf_heir.1610.t:0 "随时待命"
 lmf_heir.1610.desc:0 "随着年龄的增长，永无止境的[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]事务越来越令人厌烦。\n\n顾问告诉我，向继承人寻求帮助并不丢人。毕竟[your_heir.GetFirstNameNoTooltip]居住在[ROOT.Char.Custom('FortifiedBuilding')]，且没有头衔。[your_heir.GetSheHe|U]可以时不时地在宫廷里主持公道，甚至代表我与[ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l]各地的代表会面。\n\n我承认，有更多的时间休息也许是一种解脱……但[your_heir.GetFirstNameNoTooltip]真的准备好承担这样的责任了吗？"
 lmf_heir.1610.a:0 "不管准备好没有，我都需要[your_heir.GetHerHis]的帮助。"
 lmf_heir.1610.b:0 "我一个人处理没问题。"
 lmf_heir.1610.a.success.tt:0 "[your_heir.GetFirstNameNoTooltip]很好地履行了[your_heir.GetHerHis]的职责"
 lmf_heir.1610.a.failure.tt:0 "[your_heir.GetFirstNameNoTooltip]干得不尽如人意"
 lmf_heir.1610.a.critfail.tt:0 "真是场灾难"
 lmf_heir.1611.t:0 "新项目？"
 lmf_heir.1611.desc:0 "我的顾问带来了一个消息，[project_county.GetNameNoTierNoTooltip]这里可能有一个项目。不幸的是，这个项目过于雄心勃勃，不适合让监督员来监督，但也太小了，不值得我自己或内阁议员们来监督。\n\n不过，有人提出[your_heir.GetFirstNameNoTooltip]可能非常适合监督它。这样一来，[your_heir.GetHerHim]就有机会在[ROOT.Char.Custom('FortifiedBuilding')]之外与当地人交流，还能积累一些宝贵的经验。\n\n不过，我担心……[your_heir.GetHerHis]承担的责任是否太大？如果把任务搞砸了怎么办？"
 lmf_heir.1611.a:0 "[your_heir.GetFirstNameNoTooltip]应立即开始。"
 lmf_heir.1611.a.success.tt:0 "项目取得巨大成功"
 lmf_heir.1611.a.failure.tt:0 "项目失败"
 lmf_heir.1611.a.critfail.tt:0 "项目规划地宛如一场灾难"
 lmf_heir.1611.b:0 "不，这不值得去冒险。"
 lmf_heir_trait_lustful:0 "[ROOT.GetCharacter.GetSheHe]欲望如此之多，[ROOT.GetCharacter.GetSheHe]竟不懂何为满足。"
 lmf_heir_trait_chaste:0 "[ROOT.GetCharacter.GetSheHe]变得贞洁。稍有碰触，[ROOT.GetCharacter.GetSheHe|U]就会退缩，任何有关性的话题都会令[ROOT.GetCharacter.GetHerHim]脸红。"
 lmf_heir_trait_gluttonous:0 "[ROOT.GetCharacter.GetSheHe]变得贪吃。[ROOT.GetCharacter.GetSheHe]只想吃吃吃！"
 lmf_heir_trait_temperate:0 "[ROOT.GetCharacter.GetSheHe]变得节制。小心翼翼，从不过度放纵，一点享乐都不过。"
 lmf_heir_trait_greedy:0 "[ROOT.GetCharacter.GetSheHe]变得尤其贪婪，只关心[ROOT.GetCharacter.GetHersHis]自己和自己的财富。"
 lmf_heir_trait_generous:0 "[ROOT.GetCharacter.GetSheHe]变得慷慨大方，甚至只要有需要，[ROOT.GetCharacter.GetSheHe]就会毫不犹豫地把所有钱币都捐出去。"
 lmf_heir_trait_lazy:0 "[ROOT.GetCharacter.GetSheHe]变得懒惰，觉得一切都太费力了。如果有更容易的路，[ROOT.GetCharacter.GetSheHe]就会选择那条。"
 lmf_heir_trait_diligent:0 "[ROOT.GetCharacter.GetSheHe]变得勤奋，满脑子都是责任和工作，没有一丝休息的念头。"
 lmf_heir_trait_wrathful:0 "[ROOT.GetCharacter.GetSheHe]变得暴怒，随时都会爆发，压倒冷静的一面。"
 lmf_heir_trait_calm:0 "[ROOT.GetCharacter.GetSheHe]变得冷静。没有什么能让[ROOT.GetCharacter.GetHerHim]感到不安。"
 lmf_heir_trait_patient:0 "[ROOT.GetCharacter.GetSheHe]变得有耐心啊，甚至可以等到世界末日。"
 lmf_heir_trait_impatient:0 "[ROOT.GetCharacter.GetSheHe]变得急躁，期待什么事情都能很快发生。"
 lmf_heir_trait_arrogant:0 "[ROOT.GetCharacter.GetSheHe]变得傲慢。[ROOT.GetCharacter.GetSheHe|U]瞪着[ROOT.GetCharacter.GetHerHis]的鼻子看周围的每个人，甚至包括我。"
 lmf_heir_trait_humble:0 "[ROOT.GetCharacter.GetSheHe]变得谦卑。为什么如此谦卑？[ROOT.GetCharacter.GetHerHis]的骄傲何在？"
 lmf_heir_trait_deceitful:0 "[ROOT.GetCharacter.GetSheHe]变得狡诈。如今，[ROOT.GetCharacter.GetHerHis]嘴里说的话几乎一个字都不能相信！"
 lmf_heir_trait_honest:0 "[ROOT.GetCharacter.GetSheHe]变得诚实啊。即使[ROOT.GetCharacter.Host.GetPrimaryTitle.GetTierAsNameNoTooltip]的命运取决于此，[ROOT.GetCharacter.GetSheHe]也不会撒谎！"
 lmf_heir_trait_craven:0 "[ROOT.GetCharacter.GetSheHe]变得懦弱，完全没有骨气，只关心自己。"
 lmf_heir_trait_brave:0 "[ROOT.GetCharacter.GetSheHe]变得勇敢，但也很愚蠢。为了一点荣耀，[ROOT.GetCharacter.GetSheHe|U]不惜抛弃[ROOT.GetCharacter.GetHerHis]的生命。"
 lmf_heir_trait_shy:0 "[ROOT.GetCharacter.GetSheHe]变得害羞。回避所有社交活动，我看得出，与人交谈对[ROOT.GetCharacter.GetHerHim]来说是件痛苦的事。"
 lmf_heir_trait_gregarious:0 "[ROOT.GetCharacter.GetSheHe]变得热情好客。看来，生活就是一场派对，[ROOT.GetCharacter.GetHerHis]的未来远没有持续的欢乐重要。"
 lmf_heir_trait_ambitious:0 "[ROOT.GetCharacter.GetSheHe]变得野心勃勃。[ROOT.GetCharacter.GetHerHis]眼中闪烁的光芒令人恐惧，我不禁要问[ROOT.GetCharacter.GetHerHis]的野心到底在哪里？"
 lmf_heir_trait_content:0 "[ROOT.GetCharacter.GetSheHe]变得满足于现状，完全没有动力。"
 lmf_heir_trait_arbitrary:0 "[ROOT.GetCharacter.GetSheHe]变得武断。[ROOT.GetCharacter.GetHerHis]的头脑中没有一个念头能在头脑里留住超过一秒。"
 lmf_heir_trait_just:0 "[ROOT.GetCharacter.GetSheHe]变得公正和守法，不断斟酌对错。"
 lmf_heir_trait_cynical:0 "[ROOT.GetCharacter.GetSheHe]变得玩世不恭，不断质疑[ROOT.GetCharacter.GetFaith.GetNameNoTooltip]。"
 lmf_heir_trait_zealous:0 "[ROOT.GetCharacter.GetSheHe]变得多么狂热啊。如此专注于如何成为一个虔诚的[ROOT.GetCharacter.GetFaith.GetNameNoTooltip]追随者，以至于其他一切都相形见绌。"
 lmf_heir_trait_paranoid:0 "[ROOT.GetCharacter.GetSheHe]变得偏执，永远保持警惕，每件事、每个人都想抓住"
 lmf_heir_trait_trusting:0 "[ROOT.GetCharacter.GetSheHe]现在天真得可怕。全然不懂什么谨慎，而且[ROOT.GetCharacter.GetFaith.PantheonTerm2]保佑啊，连自我保护的意识都抛之脑后。"
 lmf_heir_trait_compassionate:0 "[ROOT.GetCharacter.GetSheHe]变得富有同情心，常常慷慨施舍。"
 lmf_heir_trait_callous:0 "[ROOT.GetCharacter.GetSheHe]变得多么冷酷无情。[ROOT.GetCharacter.GetHerHis]的灵魂深处还有人类的情感吗？我们几乎无法判断。"
 lmf_heir_trait_sadistic:0 "[ROOT.GetCharacter.GetSheHe]变得嗜好虐待。我怀疑[ROOT.GetCharacter.GetSheHe|U]折磨别人，纯粹是为了获得快感。"
 lmf_heir_trait_stubborn:0 "[ROOT.GetCharacter.GetSheHe]变得固执。一旦[ROOT.GetCharacter.GetHerHim]下定决心，就再也无法动摇。"
 lmf_heir_trait_fickle:0 "[ROOT.GetCharacter.GetSheHe]变得善变。前一天还好好的，今天就变得卑鄙无耻。谁也无法讨[ROOT.GetCharacter.GetHerHim]的欢心，永远不会。"
 lmf_heir_trait_eccentric:0 "[ROOT.GetCharacter.GetSheHe]变得古怪。我想知道[ROOT.GetCharacter.GetHerHis]在想什么？我相信不止我一个人这么想。"
 lmf_heir_trait_vengeful:0 "[ROOT.GetCharacter.GetSheHe]变得眦睚必报，什么小事都记得。"
 lmf_heir_trait_forgiving:0 "[ROOT.GetCharacter.GetSheHe]变得十分宽容，现在[ROOT.GetCharacter.GetSheHe|U]会原谅任何人。"
 lmf_heir.1612.t:0 "我的[heir_trait.GetNameNoTooltip( your_heir )|U]继承人"
 lmf_heir.1612.desc.opening:0 "花了这么多时间训练，在[your_heir.GetFirstNameNoTooltip]成为我的继承人后，我才注意到[your_heir.Custom('heir_trait_description')]的问题。\n\n怎么会这样？"
 lmf_heir.1612.desc.opposite:0 "[your_heir.GetSheHe]怎么会变得和我如此不同？\n\n"
 lmf_heir.1612.desc.alsosinful:0 "虽然我不是美德的典范，但这？我无法忍受！\n\n"
 lmf_heir.1612.desc.sinful:0 "我是如何培养出一个如此充满罪恶的继承人的？\n\n"
 lmf_heir.1612.desc.end:0 "现在是我该怎么办？考虑到我们经常在一起，我可以试着强迫[your_heir.Custom('GetLassLad')]改变性格。"
 lmf_heir.1612.a:0 "对[your_heir.GetHerHim]来说，这可能很难，但我必须试试。"
 lmf_heir.1612.a.success.tt:0 "[your_heir.GetFirstNameNoTooltip]被说服更改重心"
 lmf_heir.1612.a.failure.tt:0 "[your_heir.GetFirstNameNoTooltip]拒绝尝试"
 tried_to_change_heir:0 "[TARGET_CHARACTER.GetShortUINameNoTooltipNoFormat|U]试图强行改变[CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]的性格。"
 tried_to_change_heir_corresponding:0 "[CHARACTER.GetShortUINameNoTooltipNoFormat|U]试图强行改变[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltipNoFormat]的性格。"
 lmf_heir.1612.b:0 "唉就这样吧……"
 lmf_heir.1613.t:0 "不情愿的继承人"
 lmf_heir.1613.desc:0 "[your_heir.GetFirstNameNoTooltip]最近并没有认真履行[your_heir.GetHerHis]的职责。\n\n在[your_heir.GetHerHim]准备好有朝一日统治[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]之前，[your_heir.GetSheHe]要学的东西太多了，[your_heir.GetSheHe]必须接受的责任也太多了……但最近[your_heir.GetFirstNameNoTooltip]好像什么都不想做。\n\n何等悲哀……"
 lmf_heir.1613.a:0 "希望[your_heir.GetSheHe]能尽快改变态度。"
 lmf_heir.1614.t:0 "真正的奉献"
 lmf_heir.1614.desc:0 "我很高兴看到[your_heir.GetFirstNameNoTooltip][your_heir.GetHerHis]如此专注于成为[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]未来的统治者。\n\n[your_heir.GetSheHe|U]现在出席宫廷，与我的内阁会面，了解[ROOT.Char.GetPrimaryTitle.GetTierAsNamePossessiveNoTooltip|l]的最新事务，甚至定期巡视乡间，了解平民的关切。\n\n我不得不说服[your_heir.GetHerHim]休息一下！"
 lmf_heir.1614.a:0 "看来，[ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]会得到很好的管理。"
 lmf_heir.1615.t:0 "最真诚的奉承"
 lmf_heir.1615.desc:0 "我们经常在一起，所以[your_heir.GetFirstNameNoTooltip]越来越像我是不可避免的。\n\n最近，我注意到[your_heir.GetSheHe]密切注视着我，试着像我一样和仆人说话，并模仿我的行为……甚至那些我不知道我做过的事……\n\n我想我应该感到惊喜？还是惊吓？"
 lmf_heir.1615.a:0 "也许[your_heir.GetSheHe]需要更多时间独处。"
 lmf_heir.1625.t:0 "外出旅行"
 lmf_heir.1625.desc.start:0 "[your_heir.GetFirstNameNoTooltip]今晨带着一个十分有趣的旅行计划来找我。\n\n"
 lmf_heir.1625.desc.family:0 "“[your_heir.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]，"
 lmf_heir.1625.desc.notfamily:0 "“[ROOT.Char.GetLadyLord]，"
 lmf_heir.1625.desc.mid:0 "我知道您一直在尽最大努力来把我培养成您的继承人，但在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，我无法接受某些方面的指导。我想，去拜访一下[your_heir.Custom2('direct_address_by_familiarity', SCOPE.sC('your_vassal'))]是否会对我的教育更有益处？”\n\n[your_heir.GetSheHe]注意到我有些不情愿，又很快继续说道，“[your_vassal.GetSheHe|U]"
 lmf_heir.1625.desc.diplomacy:0 "在外交上很有手腕，"
 lmf_heir.1625.desc.martial:0 "是个战争事务专家，"
 lmf_heir.1625.desc.stewardship:0 "精通于领地管理，"
 lmf_heir.1625.desc.intrigue:0 "懂得如何把阴谋演绎成艺术，"
 lmf_heir.1625.desc.learning:0 "是为杰出的博学[your_vassal.GetWomanMan]，"
 lmf_heir.1625.desc.bridge:0 "并且"
 lmf_heir.1625.desc.myfriend:0 "也是我的一个好朋友。"
 lmf_heir.1625.desc.friend:0 "也是您的朋友。"
 lmf_heir.1625.desc.ally:0 "也是您的盟友。"
 lmf_heir.1625.desc.alsofamily:0 "也是家人。"
 lmf_heir.1625.desc.vassal:0 "也是您忠诚的封臣。"
 lmf_heir.1625.desc.liege:0 "也同时是我们的领主。"
 lmf_heir.1625.desc.realm:0 "我甚至都不会离开[ROOT.Char.GetTopLiege.GetPrimaryTitle.GetNameNoTierNoTooltip]！"
 lmf_heir.1625.desc.end:0 "与[your_vassal.GetHerHim]在[your_vassal.GetPrimaryTitle.GetNameNoTierNoTooltip]一起相处几个月能让我学到很多。”\n\n可能[your_heir.GetFirstNameNoTooltip]有别有用心的动机，只是希望最终能离开[ROOT.Char.Custom('FortifiedBuilding')]，但是谁能责怪[your_heir.GetHerHim]呢？"
 lmf_heir.1625.a:0 "[your_heir.GetSheHe|U]可以走了。"
 lmf_heir.1625.a.tt:0 "[your_heir.GetTitledFirstName]将旅行前往[your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]并与[your_vassal.GetTitledFirstName]相处六个月，在此期间，[your_heir.GetSheHe]将在[your_heir.GetHerHis]的继承人教育方面有所收获"
 lmf_heir.1625.a.player.tt:0 "必须先问问[your_vassal.GetTitledFirstName]，看[your_vassal.GetSheHe]是否愿意接纳[your_heir.GetTitledFirstName]"
 lmf_heir.1625.b:0 "不，[your_heir.GetSheHe]要待在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。"
 lmf_heir.1626.opening:0 "[heir_liege.Custom2('direct_address_by_familiarity', ROOT.Char)|U]，"
 lmf_heir.1626.desc.opening.family:0 "[heir_liege.Custom2('LMF_RelationToMeShort', your_heir )][your_heir.GetFirstNameNoTooltip]表示希望在未来几个月内拜访你。\n\n"
 lmf_heir.1626.desc.opening:0 "我写信请求允许我的继承人[your_heir.GetTitledFirstName]在未来几个月内拜访您。\n\n"
 lmf_heir.1626.desc:0 "除了您愿意时间，我不需要您的任何承诺。我只要求您保证[your_heir.GetFirstNamePossessiveNoTooltip]的安全，并允许[your_heir.GetSheHe]进入[ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]，以便[your_heir.GetSheHe]更好地了解那里和那里的人民。"
 lmf_heir.1626.a:0 "当然！欢迎[your_heir.GetSheHe]！"
 lmf_heir.1626.a.tt:0 "[your_heir.GetTitledFirstName]将前往[your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，逗留六个月"
 lmf_heir.1626.b:0 "向[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('heir_liege'))]表达我的歉意。"
 lmf_heir.1627.opening:0 "[your_vassal.Custom2('GreetingToLiegePositive', ROOT.Char)]，"
 lmf_heir.1627.desc:0 "当然欢迎[your_heir.GetTitledFirstNameNoTooltip]。我们[your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]期待着[your_heir.GetHerHis]的到来。"
 lmf_heir.1627.a:0 "好极了。"
 lmf_heir.1628.opening:0 "[your_vassal.Custom2('GreetingToLiege', ROOT.Char)]，"
 lmf_heir.1628.desc:0 "抱歉，现在不是[your_heir.GetTitledFirstNameNoTooltip]拜访[your_vassal.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的好时机，我也想很好的招待[your_heir.GetSheHe]，但现在最好不要白跑一趟。"
 lmf_heir.1628.a:0 "[your_heir.GetSheHe|U]可以拜访[alternate_vassal.GetFullName]"
 lmf_heir.1628.b:0 "到此为止吧。"
 lmf_heir.1631.t.cancel:0 "[your_heir.GetFirstNameNoTooltip]回家"
 lmf_heir.1631.desc.dead:0 "[heir_visit_target.GetShortUINamePossessiveNoFormat]的暴死使[your_heir.GetFirstName]被迫结束了[your_heir.GetHerHis]短暂的旅行。"
 lmf_heir.1631.desc.notruler:0 "[your_heir.GetFirstName]被迫结束了[your_heir.GetHerHis]短暂的旅行，因为[heir_visit_target.GetShortUINameNoFormat]已经不再是[target_county.GetNameNoTierNoTooltip]的统治者了。"
 lmf_heir.1631.desc.imprisoned:0 "[heir_visit_target.GetShortUINamePossessiveNoFormat]被囚使[your_heir.GetFirstName]被迫结束了[your_heir.GetHerHis]短暂的旅行。"
 lmf_heir.1631.desc.incapable:0 "因为[heir_visit_target.GetShortUINamePossessiveNoFormat]变得[GetTrait('incapable').GetName(heir_visit_target)]，[your_heir.GetFirstName]被迫结束了[your_heir.GetHerHis]短暂的旅行。"
 lmf_heir.1631.desc:0 "[your_heir.GetFirstName]被迫结束了[your_heir.GetHerHis]短暂的旅行。"
 lmf_heir.1632.t:0 "召回[your_heir.GetFirstNameNoTooltip]？"
 lmf_heir.1632.desc.atwar.primary:0 "现在我们已经与[heir_host.GetTitledFirstNameNoTooltip]开战了，但有一个严重的问题——[your_heir.GetFirstNameNoTooltip]正在拜访[heir_host.GetHerHim]。\n\n我们必须立即从[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]召回[ROOT.Char.Custom2('LMF_RelationToMeShort', your_heir )]。"
 lmf_heir.1632.desc.atwar.rootattacker:0 "我与[defender.GetTitledFirstNameNoTooltip]的战争爆发了，意味着我也在与[heir_host.GetTitledFirstNameNoTooltip]交战，但令人担忧的是，[your_heir.GetFirstNameNoTooltip]目前正在拜访[heir_host.GetHerHim]。\n\n我们必须立即将我的[your_heir.GetFirstNameNoTooltip]召回[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。"
 lmf_heir.1632.desc.atwar.rootdefender:0 "我与[attacker.GetTitledFirstNamePossessiveNoTooltip]的战争爆发了，意味着我也在与[heir_host.GetTitledFirstNameNoTooltip]交战，但令人担忧的是，[your_heir.GetFirstNameNoTooltip]目前正在拜访[heir_host.GetHerHim]。\n\n我们必须立即将我的[your_heir.GetFirstNameNoTooltip]召回[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。"
 lmf_heir.1632.desc.atwar:0 "[defender.GetTitledFirstNameNoTooltip]和[attacker.GetTitledFirstNameNoTooltip]之间的战争意味着我现在也在与[heir_host.GetTitledFirstNameNoTooltip]交战，而且令人担忧的是，[your_heir.GetFirstNameNoTooltip]目前正在拜访[heir_host.GetHerHim]。\n\n我们必须立即将我的[your_heir.GetFirstNameNoTooltip]召回[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。"
 lmf_heir.1632.desc:0 "关于这场战争，唯一的问题是，我是否应该召回[heir_host.GetTitledFirstNameNoTooltip]。\n\n虽然没有直接危险，但我不能保[your_heir.GetSheHe|U]在证[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的安全。毕竟[heir_host.GetTitledFirstNamePossessiveNoTooltip]也自顾不暇。"
 lmf_heir.1632.a:0 "让[your_heir.GetHerHim]立即离开。"
 lmf_heir.1632.b:0 "[your_heir.GetFirstNameNoTooltip]目前所在位置，应该没什么大问题。"
 lmf_heir.1633.t:0 "一位新访客"
 lmf_heir.1633.desc.begin:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]已经到达[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，"
 lmf_heir.1633.desc.away:0 "我应现场迎接[your_heir.GetHerHim]，我由于公事繁多没能前往现场，也无法在[your_heir.GetHerHim]来访期间，共度时光。\n\n我需要决定是否让[your_heir.GetHerHim]自由进出[ROOT.Char.Custom('FortifiedBuilding')]和周围。\n\n是冒险让[your_heir.GetHerHim]四处闲逛，这样[your_heir.GetHerHis]可能把情报给[your_heir.GetHerHis][your_heir.Custom2('LMF_RelationToMeShort', heir_liege )]还是并应该在一定程度上限制[your_heir.GetHerHis]？"
 lmf_heir.1633.desc.end:0 "我来到宫廷里，亲自迎接[your_heir.GetHerHim]。\n\n我需要决定是在接下来的几个月里花时间和[your_heir.GetHerHim]相处，并允许[your_heir.GetHerHim]自由活动，随意出入[ROOT.Char.Custom('FortifiedBuilding')]——但风险是[your_heir.GetSheHe]可能会把[your_heir.GetHerHis]调查的情报一五一十地汇报给[your_heir.GetHerHis][your_heir.Custom2('LMF_RelationToMeShort', heir_liege )]。还是放任[your_heir.GetHerHim]在周围的乡间自行其是。"
 lmf_heir.1633.a:0 "这是一个让我们更加熟悉的机会。"
 lmf_heir.1633.a.tt:0 "#EMP [your_heir.GetShortUINameNoTooltipNoFormat|U]将在[THIS.Char.Custom('FortifiedBuilding')]度过接下来的几个月，与你和廷臣一起训练，这可能改善你们之间的关系。不过，[your_heir.GetSheHe]可能会知道你的秘密，也有可能造成骚乱。#!"
 spent_time_with_visiting_heir:0 "[CHARACTER.GetShortUIName]和[TARGET_CHARACTER.GetShortUIName]共同在[CHARACTER.GetShortUINamePossessiveNoTooltip]]的[CHARACTER.Custom('FortifiedBuilding')]共度了一段时光"
 spent_time_with_visiting_heir_corresponding:0 "[TARGET_CHARACTER.GetShortUIName]和[CHARACTER.GetShortUIName]在[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip][TARGET_CHARACTER.Custom('FortifiedBuilding')]共度了一段时光"
 lmf_heir.1633.b:0 "[your_heir.GetSheHe|U]可以留下，但我还有更好的事情要做。"
 lmf_heir.1633.c:0 "[your_heir.GetSheHe]应该适当放松一下。"
 lmf_heir.1633.c.tt:0 "#EMP [your_heir.GetShortUINameNoTooltipNoFormat|U]将会在接下来的几个月里在[THIS.Char.Custom('FortifiedBuilding')]和你的廷臣一起训练。[your_heir.GetSheHe|U]可能会引起骚乱，甚至知晓你的秘密，但发生更糟糕的事情的可能性不大。#!"
 lmf_heir.1633.d:0 "[your_heir.GetSheHe]在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]中所做的事情与我无关。"
 lmf_heir.1633.d.tt:0 "#EMP [your_heir.GetShortUINameNoTooltipNoFormat|U]将不被允许进入[THIS.Char.Custom('FortifiedBuilding')]，而是会在接下来的几个月里待在周围的乡村。[your_heir.GetSheHe|U]可能会惹上麻烦，且[your_heir.GetHerHis][your_heir.Custom2('LMF_RelationToMeShort', heir_liege )]可能会不高兴。不过[your_heir.GetSheHe]也没法闹出什么大事了#!"
 lmf_interaction.0001.t:0 "剥夺继承权"
 lmf_interaction.0001.opening.submissive:0 "今天上午，[recipient.GetTitledFirstNameNoTooltip]请求与我交谈，当[recipient.GetSheHe]安静地恭敬地跪下，用平静而坚定的语气开始说。\n\n"
 lmf_interaction.0001.opening.dominant:0 "[recipient.GetTitledFirstNameNoTooltip]今早大摇大摆地走进宫廷，要求单独觐见。我很好奇[recipient.GetSheHe]会说些什么，于是就答应了。很快，[recipient.GetSheHe]站在我面前说话，[recipient.GetHerHis]的言辞充满自信……但即便如此，[recipient.GetHerHis]一开口的语气就暴露了[recipient.GetHerHis]的虚张声势。\n\n"
 lmf_interaction.0001.opening:0 "[recipient.GetTitledFirstNameNoTooltip]今早大摇大摆地走进宫廷，要求单独觐见。我很好奇[recipient.GetSheHe]会说些什么，于是就答应了。很快，[recipient.GetSheHe]站在我面前，神表情严肃认真，就像一个经过长时间思考……\n\n"
 lmf_interaction.0001.address.family:0 "“[recipient.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))|U]，"
 lmf_interaction.0001.address:0 "“[actor.GetLadyLord]，"
 lmf_interaction.0001.disinheritor:0 "我不明白你为什么决定剥夺我的继承权。也许是因为你把我看作"
 lmf_interaction.0001.dynast:0 "我无法确定为什么我的头衔会被剥夺，也许是因为我被视为"
 lmf_interaction.0001.worst.deviant:0 "不配拥有这样的头衔。然而，我不也是"
 lmf_interaction.0001.worst.unintelligent:0 "不聪明的人，不能被信任。但我不也是"
 lmf_interaction.0001.worst.crazy:0 "不稳定、反复无常，是个不能信任的掌权者。然而，我不也是"
 lmf_interaction.0001.worst.unskilled:0 "不谙世事，缺乏统治者应有的素质。然而，我不也是"
 lmf_interaction.0001.worst.cowardly:0 "一个懦夫，没有任何骨气。然而，我不也是"
 lmf_interaction.0001.worst.dishonorable:0 "缺乏荣誉感和风度。"
 lmf_interaction.0001.worst.faithless:0 "没有信仰，是个可怜的[ROOT.Char.GetFaith.GetNameNoTooltip]追随者。但我不也是"
 lmf_interaction.0001.worst.callous:0 "太冷酷无情了，不对他人负责。但我不也是"
 lmf_interaction.0001.worst.untrustworthy:0 "不值得信任，没有道德。但我不也是"
 lmf_interaction.0001.worst.drunkard:0 "一个酒鬼，但我不也是"
 lmf_interaction.0001.worst.weak:0 "软弱之人，缺乏耐力，但我不也是"
 lmf_interaction.0001.worst.submissive:0 "过于顺从，没有骨气。但我不也是"
 lmf_interaction.0001.worst.malicious:0 "恶毒，缺乏统治者应有的良好品格。然而，我不也是"
 lmf_interaction.0001.worst.unworthy:0 "不配，缺乏品质。然而，我不也是"
 lmf_interaction.0001.best.intelligent:0 "聪明？我有智慧，还有更多！”\n\n"
 lmf_interaction.0001.best.skilled:0 "有能力？我精通贵族所需的方方面面！”\n\n"
 lmf_interaction.0001.best.bold:0 "勇敢？如果有必要，我会毫不犹豫地投身火海！”\n\n"
 lmf_interaction.0001.best.zealous:0 "一个虔诚而狂热的[ROOT.Char.GetFaith.GetNameNoTooltip]追随者？”\n\n"
 lmf_interaction.0001.best.warrior:0 "一个强大的战士？毕竟，我在战场上无可匹敌。”\n\n"
 lmf_interaction.0001.best.honorable:0 "诚实之人？难道这还配不上[ROOT.Char.GetDynasty.GetBaseNameNoTooltip]宗族的品质吗？”\n\n"
 lmf_interaction.0001.best.compassionate:0 "富有同情心？难道这些品质配不上[ROOT.Char.GetDynasty.GetBaseNameNoTooltip]宗族吗？”\n\n"
 lmf_interaction.0001.best.levelheaded:0 "稳重而冷静？我可以在最困难的时候保持头脑清醒，这一点你是知道的。”\n\n"
 lmf_interaction.0001.best.benevolent:0 "有一个[ROOT.Char.GetWomanMan]的美德？心地纯洁的领主只会给我们带来荣耀吗？”\n\n"
 lmf_interaction.0001.best.just:0 "公正？难道这不是作为一名领主所需要的最重要的品质之一吗？”\n\n"
 lmf_interaction.0001.best.proud:0 "[ROOT.Char.GetDynasty.GetBaseNameNoTooltip]宗族的骄傲吗？”\n\n"
 lmf_interaction.0001.main:0 "[recipient.Custom2('disinherit_worst_trait', SCOPE.sC('actor'))][recipient.Custom2('disinherit_best_trait', SCOPE.sC('actor'))]"
 lmf_interaction.0001.ending.dynast:0 "“我知道做出这个决定的人不是你，因此我现在请求"
 lmf_interaction.0001.ending.submissive:0 "“今日，我跪在您面前，怀着应有的敬意和谦卑请求"
 lmf_interaction.0001.ending.dominant:0 "“今天，我站在您面前，恭敬地要求"
 lmf_interaction.0001.ending:0 "“今天，我站在您面前请求"
 lmf_interaction.0001.close.family:0 "，作为您的[actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]，"
 lmf_interaction.0001.close.dynast:0 "请您撤销这一决定，恢复我的声誉。”"
 lmf_interaction.0001.close:0 "请您改变主意，恢复我的声誉。”"
 lmf_interaction.0001.a:0 "你说服了我。"
 lmf_interaction.0001.b:0 "容我拒绝……"
 lmf_interaction.0001.b.tt:0 "[recipient.GetTitledFirstNameNoTooltip]可能不喜欢你的决定……"
 lmf_interaction.0002.t:0 "拒绝承认继承权！"
 lmf_interaction.0002.desc:0 "尽管我跪在[actor.GetTitledFirstName]面前解释了我的情况，但[actor.GetWomanMan]还是拒绝承认我的继承权”。[actor.GetSheHe]缓缓道“抱歉，虽然我很同情，但这是最好的结果，我无法改变。你必须接受你的命运。”"
 lmf_interaction.0002.a:0 "我不能接受！"
 lmf_interaction.0002.a.tt:0 "[recipient.GetTitledFirstNameNoTooltip]对你的拒绝感到愤怒"
 refused_to_restore_inheritance:0 "拒绝恢复继承权"
 jealous_of_inheritance:0 "嫉妒继承权"
 lmf_interaction.0002.took_vows.tt:0 "[recipient.GetTitledFirstNameNoTooltip]已宣读宗教誓言"
 lmf_interaction.0002.left_court.tt:0 "[recipient.GetTitledFirstNameNoTooltip]决定离开你的宫廷"
 lmf_interaction.0002.b:0 "我想[actor.GetSheHe]是对的……"
 lmf_interaction.0002.b.tt:0 "[recipient.GetTitledFirstNameNoTooltip]虚心接受了你的批评"
 disinherited_betrothal_upset_tt:0 "[disinherited_character.betrothed.liege.GetTitledFirstName]可能会因被剥夺继承权而不悦，并选择与[disinherited_character.betrothed.GetTitledFirstName]解除婚约"
 lmf_interaction.0004.desc:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_betrothed'))]今天给我带来了一个令人沮丧的消息：[disinherited_betrothed.GetHerHis]的订婚人已被[disinherited_character.GetHerHis][disinherited_character.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinheritor'))][disinheritor.GetTitledFirstName]剥夺了继承权！这显然损害了我对[disinherited_character.GetTitledFirstNamePossessiveNoTooltip]的未来展望。"
 lmf_interaction.0004.a:0 "我认为这违反了婚约。"
 lmf_interaction.0004.b:0 "太迟了，婚约仍要继续。"
 lmf_interaction.0005.opening:0 "[betrothed_liege.Custom2('GreetingToForeignRulerNegative', ROOT.Char )]，"
 lmf_interaction.0005.desc:0 "你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_character'))]的继承权被剥夺了，损害了我对[disinherited_character.GetHerHis]的未来展望，以及[disinherited_character.GetSheHe]与我的[betrothed_liege.Custom2('LMF_RelationToMeShort', SCOPE.sC('disinherited_betrothed'))]共度的未来生活。在我看来，这让[disinherited_character.GetHerHis]与[disinherited_betrothed.GetTitledFirstName]的婚约作废了。"
 lmf_interaction.0005.a:0 "我想这并不奇怪。"
 lmf_interaction.1200.t:0 "我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('recipient'))|U]的爱人"
 lmf_interaction.1200.desc.three:0 "我知道我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('recipient'))]情人众多，"
 lmf_interaction.1200.desc.two:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]不止仅有一个情人，据我所知就至少有两个，"
 lmf_interaction.1200.desc.mid:0 "而为了家族的荣誉，是时候做点什么了。\n\n唯一的问题是：我是要只解决单个的情人问题，还是要求[recipient.GetFirstNameNoTooltip]立即断绝与"
 lmf_interaction.1200.desc.three.end:0 "所有情人的关系？"
 lmf_interaction.1200.desc.two.end:0 "俩情人的关系？"
 lmf_interaction.1200.a:0 "这跟[lover_1.GetTitledFirstName]有关。"
 lmf_interaction.1200.b:0 "这跟[lover_2.GetTitledFirstName]有关。"
 lmf_interaction.1200.c:0 "这跟[lover_3.GetTitledFirstName]有关。"
 lmf_interaction.1200.d:0 "[recipient.GetSheHe|U]必须跟所有情人一刀两断！"
 lmf_interaction.1200.e:0 "[recipient.GetSheHe|U]必须跟俩情人一刀两断！"
 lmf_interaction.1200.a.success.tt:0 "[recipient.GetFirstNameNoTooltip]同意跟情人一刀两断"
 lmf_interaction.1200.a.failure.tt:0 "[recipient.GetFirstNameNoTooltip]拒绝了，也许有其他方法说服[recipient.GetHerHim]……"
 lmf_interaction.1201.t:0 "我的[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('recipient'))|U]的情人"
 lmf_interaction.1201.desc.secret:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]一直在与别人搞地下恋情，这让我感到恼火，而且我没想到竟然与"
 lmf_interaction.1201.desc.open:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]一直在与别人打情骂俏，这让我感到羞耻，而且我没想到竟然与"
 lmf_interaction.1201.desc.theirs:0 "[recipient.GetHerHis][recipient.Custom2('LMF_RelationToMeShort', SCOPE.sC('family_lover'))]，[family_lover.GetTitledFirstName]"
 lmf_interaction.1201.desc.default:0 "[family_lover.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]。\n\n"
 lmf_interaction.1201.desc.mid:0 "现在我有责任解决这个问题……"
 lmf_interaction.1201.desc.secret.end:0 "要在这场丑闻被允许继续之前，迅速地处理。"
 lmf_interaction.1201.desc.open.end:0 "要在这桩风流韵事曝光于世之前，悄无声息地解决。"
 lmf_interaction.1201.a:0 "[recipient.GetFirstNameNoTooltip]必须立即结束。"
 lmf_interaction.1201.a.success.tt:0 "[recipient.GetFirstNameNoTooltip]同意结束关系"
 lmf_interaction.1201.a.failure.tt:0 "[recipient.GetFirstNameNoTooltip]拒绝了，也许有其他方法说服[recipient.GetHerHim]……"
 lmf_interaction.1201.b:0 "我要和[family_lover.GetTitledFirstNameNoTooltip]谈谈，要求[family_lover.GetSheHe]结束这一切。"
 lmf_interaction.1201.b.success.tt:0 "[family_lover.GetTitledFirstNameNoTooltip]同意结束关系"
 lmf_interaction.1201.b.failure.tt:0 "[family_lover.GetTitledFirstNameNoTooltip]拒绝了，也许有其他方法说服[family_lover.GetHerHim]……"
 lmf_interaction.1201.c:0 "他们两人将结婚。"
 lmf_interaction.1201.c.tt:0 "你将决定他们的婚姻"
 lmf_interaction.1201.d:0 "我会说服[family_lover.GetTitledFirstNameNoTooltip]嫁给[recipient.GetHerHim]。"
 lmf_interaction.1201.d.success.tt:0 "[family_lover.GetTitledFirstNameNoTooltip]勉强同意这门亲事"
 lmf_interaction.1201.d.failure.tt:0 "[family_lover.GetTitledFirstNameNoTooltip]拒绝了，也许有其他方法说服[family_lover.GetHerHim]……"
 lmf_interaction.1201.e:0 "我会说服[recipient.GetFirstNameNoTooltip]嫁给[family_lover.GetHerHim]。"
 lmf_interaction.1201.e.success.tt:0 "[recipient.GetFirstNameNoTooltip]勉强同意这门亲事"
 lmf_interaction.1201.e.failure.tt:0 "[recipient.GetFirstNameNoTooltip]拒绝了，也许有其他方法说服[recipient.GetHerHim]……"
 lmf_interaction.1201.f:0 "我会说服他们俩同意"
 lmf_interaction.1201.f.tt:0 "首先需要说服你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]"
 lmf_interaction.1201.f.success.tt:0 "[recipient.GetFirstNameNoTooltip]勉强同意了这门亲事，但[family_lover.GetTitledFirstNameNoTooltip]仍必须被说服"
 lmf_interaction.1201.f.failure.tt:0 "[recipient.GetFirstNameNoTooltip]拒绝了，也许有其他方法说服[recipient.GetHerHim]……"
 lmf_interaction.1201.g:0 "也许我过于敏感了……"
 lmfmod.demand.agree.hook.tt:0 "[check.GetTitledFirstNameNoTooltip]一定会同意你的要求，因为你有[check.GetHerHim]的牵制"
 lmfmod.demand.agree.prisoner.tt:0 "[check.GetTitledFirstNameNoTooltip]一定会同意你的要求，因为[check.GetSheHe]是你的囚犯"
 lmfmod.demand.agree.courtier.tt:0 "[check.GetTitledFirstNameNoTooltip]一定会同意你的要求，因为[check.GetSheHe]是你的廷臣"
 interfered_in_my_romance:0 "[TARGET_CHARACTER.GetShortUIName|U]要求[CHARACTER.GetShortUIName]结束恋情。"
 interfered_in_my_romance_corresponding:0 "[CHARACTER.GetShortUIName|U]要求[TARGET_CHARACTER.GetShortUIName]结束恋情。"
 demanded_I_marry_lover:0 "[TARGET_CHARACTER.GetShortUIName|U]要求[CHARACTER.GetShortUIName]与情人结婚。"
 demanded_I_marry_lover_corresponding:0 "[CHARACTER.GetShortUIName|U]要求[TARGET_CHARACTER.GetShortUIName]与[TARGET_CHARACTER.GetHerHis]的情人结婚。"
 lmf_interaction.1202.opening:0 "[recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]，"
 lmf_interaction.1202.start:0 "我深思熟虑了您的要求，虽然并非我本意，但我还是"
 lmf_interaction.1202.adulterer:0 "觉得你这个人居然会就品德问题对我说教，这真是莫大的讽刺，"
 lmf_interaction.1202.soulmate:0 "相信[family_lover.GetHerHim]是我的灵魂伴侣，"
 lmf_interaction.1202.angry:0 "认为你以这种方式干涉我，让我感到非常恼火，"
 lmf_interaction.1202.open:0 "觉得我们的关系已经公开，很难再造成更大的影响，"
 lmf_interaction.1202.default:0 "尽管我非常喜欢[family_lover.GetHerHim]，"
 lmf_interaction.1202.end:0 "但我还是会按照您的要求去做。\n\n如果您真的认为与[family_lover.GetTitledFirstNameNoTooltip]分手对我最有利，那么我会立刻结束这段感情。"
 lmf_interaction.1202.a:0 "好吧。"
 lmf_interaction.1202.b:0 "也许我过于敏感了……"
 lmf_interaction.1203.start:0 "我深思熟虑了您的要求。最终我还是决定不和[family_lover.GetTitledFirstNameNoTooltip]分手。\n\n"
 lmf_interaction.1203.adulterer:0 "说实话，你居然会就品德问题对我说教？真是难以置信。\n\n"
 lmf_interaction.1203.soulmate:0 "[family_lover.GetSheHe|U]是我的灵魂伴侣，我爱[family_lover.GetHerHim]，我不可能和[family_lover.GetHerHim]分开，就像我不可能割舍自己的心一样。\n\n"
 lmf_interaction.1203.open:0 "毕竟，我们的恋情已经公之于众了，所以它还能对我的名声造成什么更大的损害呢？事实上，我感觉轻松极了。\n\n"
 lmf_interaction.1203.default:0 "事实很简单，我爱[family_lover.GetHerHim]，这就是最重要的。\n\n"
 lmf_interaction.1203.end.rival:0 "你怎么会觉得我会搭理你？这真是匪夷所思。"
 lmf_interaction.1203.end.malicious:0 "如果你因此失望，[recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]，那就随你吧。我不在乎。"
 lmf_interaction.1203.end.dominant:0 "如果你因此失望，那就随你吧，我已决定好了。"
 lmf_interaction.1203.end.submissive:0 "如果您因此失望，我真的很抱歉。您不知道我为此有多痛苦。"
 lmf_interaction.1203.end.default:0 "如果您因此失望，[recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]，那我很遗憾。"
 lmf_interaction.1203.a:0 "也许一些礼物会说服你……？"
 lmf_interaction.1203.a.lover.tt:0 "[family_lover.GetTitledFirstNameNoTooltip]仍需要我们的说服，以便同意这门亲事……"
 lmf_interaction.1203.b:0 "那我就直接跟[family_lover.GetTitledFirstNameNoTooltip]说吧。"
 lmf_interaction.1203.c:0 "违抗我的命令是要承担后果的！"
 lmf_interaction.1203.d:0 "还是算了……"
 lmf_interaction.1204.opening:0 "[family_lover.Custom2('GreetingToForeignRulerPositive', ROOT.Char )]，"
 lmf_interaction.1204.secret:0 "所以，你已经了解我与你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]的关系了吗？\n\n"
 lmf_interaction.1204.open:0 "说实话，自从我与你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]的关系曝光以来，我就预料到这一天终将到来。\n\n"
 lmf_interaction.1204.end:0 "我考虑了很久。我非常在乎[recipient.GetTitledFirstNameNoTooltip]……但您肯定也一样，否则您不会要求我做出这样的牺牲。因此，尽管我心存疑虑，但如果这是您真正想要的，那么我将听从您的命令，立即结束与[recipient.GetHerHim]的关系。"
 lmf_interaction.1205.opening:0 "[family_lover.Custom2('GreetingToForeignRuler', ROOT.Char )]，"
 lmf_interaction.1205.start:0 "我知道你关心你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]。我也一样，就像知道[recipient.GetFirstNameNoTooltip]关心我一样。因此我不能因为你的命令而抛弃[recipient.GetHerHim]。\n\n"
 lmf_interaction.1205.end.rival:0 "如果这让你不高兴，那很好。这是你干涉[ROOT.Char.Custom2('LMF_RelationToMePossessive', SCOPE.sC('recipient'))]事务应得的报应。"
 lmf_interaction.1205.end.malicious:0 "[recipient.GetFirstNameNoTooltip]告诉我你是个爱管闲事的[recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )]，看来[recipient.GetSheHe]是对的。"
 lmf_interaction.1205.end.dominant:0 "如果这让你不高兴，那就这样吧，但这是我和[recipient.GetFirstNameNoTooltip]私下的决定。"
 lmf_interaction.1205.end.submissive:0 "[ROOT.Char.GetLadyLord]，如果您因此不悦，我真的很抱歉。您不知道我是如何为这个决定苦恼的。"
 lmf_interaction.1205.end.benevolent:0 "如果这让您不悦，那我真的很抱歉，但这是我必须从[recipient.GetFirstNameNoTooltip]而不是其他人那里听到的。"
 lmf_interaction.1205.end.default:0 "[ROOT.Char.GetLadyLord]，如果我的决定让您不悦，那我真的很抱歉，但我别无他法。"
 lmf_interaction.1205.a:0 "要怎样才能让你离开？"
 lmf_interaction.1205.b:0 "那么我别无选择，只能直接与[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]对峙。"
 lmf_interaction.1206.start:0 "我深思熟虑了您的要求，虽然并非我本意，但我还是"
 lmf_interaction.1206.adulterer:0 "觉得你这个人居然会就品德问题对我说教，这真是莫大的讽刺，"
 lmf_interaction.1206.angry:0 "认为你以这种方式干涉我，让我感到非常恼火，"
 lmf_interaction.1206.default:0 "认为你如此厚颜无耻，竟敢要求我结束所有的感情事，"
 lmf_interaction.1206.end:0 "但我还是会按照您的要求去做。\n\n如果您真的认为与我的恋人分手对我最有利，那么我会相信您，并立即结束这一切。"
 lmf_interaction.1207.start:0 "您的要求我考虑了很久。不过，我最终还是决定不抛弃我的爱人，因为您认为这是最好的。\n\n"
 lmf_interaction.1207.adulterer:0 "说实话，你居然会就品德问题对我说教？真是难以置信。\n\n"
 lmf_interaction.1207.default:0 "他们每个人都在我心中占有一席之地，在我的床上也是如此，这是我的权利。\n\n"
 lmf_interaction.1207.end.rival:0 "你怎么会觉得我会搭理你？这真是匪夷所思。"
 lmf_interaction.1207.end.malicious:0 "如果你因此失望，[recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]，那就随你吧。我不在乎。"
 lmf_interaction.1207.end.dominant:0 "如果你因此失望，那就随你吧。这是我的生活和决定。"
 lmf_interaction.1207.end.submissive:0 "如果您因此失望，我真的很抱歉。我宁愿做其他任何事，但我必须过自己的生活。"
 lmf_interaction.1207.end.default:0 "如果您因此失望，[recipient.Custom2('LMF_RelationToMeShort', ROOT.Char )|U]，那我很遗憾。"
 lmf_interaction.1208.desc:0 "很好。\n\n[family_lover.GetFirstNameNoTooltip]和我已经商量好了，如果这是您对我们的要求……我们愿意结婚，并由[recipient.GetFaith.FertilityGodName]祝福我们。"
 lmf_interaction.1208.a:0 "婚姻将有利于我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]。"
 lmf_interaction.1208.b:0 "婚姻将有利于[family_lover.GetTitledFirstNameNoTooltip]。"
 lmf_interaction.1208.c:0 "再三考虑，还是不了。"
 lmf_interaction.1208.tt:0 "[recipient.GetFirstNameNoTooltip]和[family_lover.GetTitledFirstNameNoTooltip]将结束全部现有的恋情，但彼此除外"
 lmf_interaction.1209.start:0 "你想让我嫁给[family_lover.GetTitledFirstNameNoTooltip]？你疯了吗？\n\n[family_lover.GetWomanMan]是我的爱人，但我当然不需要[family_lover.GetHerHim]来做我的[family_lover.GetWifeHusband]！"
 lmf_interaction.1209.open:0 "如果你担心的是我的名声，那你大可不必。你很清楚，我的名声早就毁了。\n\n"
 lmf_interaction.1209.secret:0 "谢谢您对我名誉的关心，不过，除非您打算把我们的事公之于众，否则我还是会碰碰运气的。\n\n"
 lmf_interaction.1209.a:0 "那你必须立刻结束这段恋情。"
 lmf_interaction.1210.desc:0 "很好。\n\n[recipient.GetFirstNameNoTooltip]和我已经商量好了，如果这是您的要求……我愿意嫁给您的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]，并让[family_lover.GetFaith.FertilityGodName]祝福我们。"
 lmf_interaction.1211.start:0 "你想让我嫁给你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('recipient'))]？你疯了吗？\n\n我理解你关心[recipient.GetFirstNamePossessiveNoTooltip]的名声，但我当然不需要[recipient.GetHerHim]来做我的[recipient.GetWifeHusband]！\n\n"
 lmf_interaction.1211.end.rival:0 "如果这让你不高兴，那很好。这是你干涉不该管的事情应得的报应。"
 lmf_interaction.1211.end.malicious:0 "下次，在提出如此荒唐的要求之前，多动脑子想一想。"
 lmf_interaction.1211.end.dominant:0 "我知道这个决定可能会让你不高兴，那就随你吧。如果我嫁给[recipient.GetFirstNameNoTooltip]，那将是我们的决定，而不是你的。"
 lmf_interaction.1211.end.submissive:0 "[ROOT.Char.GetLadyLord]，要是有其他办法就好了，但这是不可能的。我很抱歉。"
 lmf_interaction.1211.end.benevolent:0 "如果您因此不悦，那我真的很抱歉，但这只能由我和[recipient.GetFirstNameNoTooltip]共同决定。"
 lmf_interaction.1211.end.default:0 "[ROOT.Char.GetLadyLord]，如果我的决定让您不悦，那么我很抱歉。"
 lmf_interaction.1212.desc:0 "好吧，既然你坚持，那我就嫁给[family_lover.GetTitledFirstNameNoTooltip]。\n\n不过，你得先说服[family_lover.GetHerHim]同意你这个计划，别指望我会帮你。"
 lmf_interaction.1212.a:0 "让我们看看[family_lover.GetSheHe]会怎么说……"
