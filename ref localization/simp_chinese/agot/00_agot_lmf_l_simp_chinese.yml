 lmf_interaction.1300.start:0 "经过深思熟虑，我必须拒绝你。\n\n"
 lmf_interaction.1300.youandi:0 "你和我根本就不是天生一对。"
 lmf_interaction.1300.youandthem:0 "你和[secondary_recipient.GetTitledFirstName]根本就不是一对。"
 lmf_interaction.1300.themandi:0 "我和[secondary_actor.GetTitledFirstName]根本就不是天生一对。"
 lmf_interaction.1300.them:0 "[secondary_actor.GetTitledFirstName]和[secondary_recipient.GetTitledFirstName]根本就不是天生一对。"
 lmf_interaction.1301.t:0 "引荐"
 lmf_interaction.1301.desc.start:0 "邀请已被接受，[secondary_recipient.GetTitledFirstNameNoTooltip][secondary_recipient.GetHerHis]正在前往[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的路上。\n\n"
 lmf_interaction.1301.desc.actor:0 "要准备的还有很多。毕竟，这可能是我未来的[secondary_recipient.GetWifeHusband]来见我。不过我也有可能不喜欢[secondary_recipient.GetHerHim]\n\n选择权始终在我。"
 lmf_interaction.1301.desc.pleased.willnotwed:0 "当我说出[secondary_actor.GetFirstNameNoTooltip]潜在未来[secondary_recipient.GetWifeHusband]的消息时，[secondary_actor.GetHerHis]疑惑地问我：“你要大老远把[secondary_recipient.GetHerHim]带到这里来？”[secondary_actor.GetSheHe]问道，“[secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))][secondary_actor.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_recipient'))]”\n\n然后，[secondary_actor.GetSheHe]停顿了一下，考虑了一下，“如果我最终决定不想与[secondary_recipient.GetHerHim]成婚呢？”\n\n“那就走一步看一步。”我回道，这足以让[secondary_actor.GetFirstNameNoTooltip]满意……至少目前是这样。"
 lmf_interaction.1301.desc.pleased:0 "当我说出[secondary_actor.GetFirstNameNoTooltip]未来的[secondary_recipient.GetWifeHusband]时，[secondary_actor.GetHerHis]简直高兴极了。“[secondary_recipient.GetSheHe|U]要来这里？来见我？”[secondary_actor.GetSheHe]语气兴奋得问我，“[secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))][secondary_actor.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_recipient'))]”\n\n然后，[secondary_actor.GetSheHe]停顿了一下，考虑了一下，“如果[secondary_recipient.GetSheHe]不喜欢我怎么办？哪怕千里迢迢的过来我们也有可能不成婚……”\n\n“那就走一步看一步”我回道，这句话足以打消[secondary_actor.GetFirstNamePossessiveNoTooltip]的顾虑……至少目前是这样。"
 lmf_interaction.1301.desc.displeased:0 "现在，只需告诉[secondary_actor.GetFirstNameNoTooltip]访客的情况，而[secondary_actor.GetSheHe]对此却不太高兴。\n\n[secondary_actor.GetSheHe][secondary_actor.Custom('lmf_neg_reaction_type')]：“[secondary_actor.Custom2('lmf_has_relation', SCOPE.sC('secondary_recipient'))][secondary_actor.Custom2('lmf_neg_reaction', SCOPE.sC('secondary_recipient'))]”\n\n我试图说服[secondary_actor.GetHerHim]，免得对[secondary_recipient.GetTitledFirstNameNoTooltip]有其他看法，在正常情况下，婚姻安排早就敲定了，但我说什么都没用。\n\n我们只能静观其变了。"
 lmf_interaction.1301.a:0 "是时候准备一下了！"
 lmf_interaction.1302.t:0 "在路上"
 lmf_interaction.1302.desc.recipient:0 "我即将踏上前往[actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]的旅程，这可能是去见我未来的[secondary_actor.GetWifeHusband]。\n\n在正常情况下，婚礼安排已经完成……但这是一个机会，让我见见[secondary_actor.GetTitledFirstNameNoTooltip]，同样也让[secondary_actor.GetHerHim]见见我，然后我们可以自己决定是否要继续举行婚礼。\n\n看这次结果如何吧。"
 lmf_interaction.1302.desc.pleased.willnotwed:0 "我接受了邀请，[secondary_recipient.GetFirstNameNoTooltip]已经在准备前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。\n\n我必须承认，当[secondary_recipient.GetSheHe]热情回应我选择[secondary_actor.GetTitledFirstNameNoTooltip]作为[secondary_recipient.GetHerHis]未来潜在的[secondary_actor.GetWifeHusband]时，我松了一口气。\n\n[secondary_recipient.GetSheHe]问道“[secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))][secondary_recipient.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_actor'))]。但是……如果结束后，我不喜欢[secondary_actor.GetHerHim]怎么办？毕竟未来是我们的日子”\n\n“那就走一步看一步。”我回道，然后祝福[secondary_recipient.GetHerHim]一路平安，[secondary_recipient.GetHerHis]的随从离开了[ROOT.Char.Custom('FortifiedBuilding')]。"
 lmf_interaction.1302.desc.pleased:0 "我接受了邀请，[secondary_recipient.GetFirstNameNoTooltip]已经在准备前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。\n\n我必须承认，当[secondary_recipient.GetSheHe]热情回应我选择[secondary_actor.GetTitledFirstNameNoTooltip]作为[secondary_recipient.GetHerHis]未来潜在的[secondary_actor.GetWifeHusband]时，我松了一口气。\n\n[secondary_recipient.GetSheHe]突然担心地问道：“[secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))][secondary_recipient.Custom2('lmf_pos_reaction', SCOPE.sC('secondary_actor'))]。但是……如果结束后，[secondary_actor.GetSheHe]不喜欢我怎么办？大老远跑到那里也不一定结婚……”\n\n“那就走一步看一步。”我回道，然后祝福[secondary_recipient.GetHerHim]一路平安，[secondary_recipient.GetHerHis]的随从离开了[ROOT.Char.Custom('FortifiedBuilding')]。"
 lmf_interaction.1302.desc.displeased:0 "我接受了邀请，[secondary_recipient.GetFirstNameNoTooltip]已经在准备前往[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。\n\n当我把[secondary_recipient.GetSheHe|U]启程的消息以及我选择[secondary_actor.GetTitledFirstNameNoTooltip]作为[secondary_recipient.GetHerHis]未来潜在的[secondary_actor.GetWifeHusband]时，[secondary_recipient.GetHerHis]非常生气。\n\n[secondary_recipient.GetSheHe][secondary_recipient.Custom('lmf_neg_reaction_type')]：“[secondary_recipient.Custom2('lmf_has_relation', SCOPE.sC('secondary_actor'))][secondary_recipient.Custom2('lmf_neg_reaction', SCOPE.sC('secondary_actor'))]”\n\n我试图说服[secondary_recipient.GetHerHim]别先入为主有看法，在正常情况下，婚姻安排早就敲定了，但我说什么都没有用。\n\n我们只能静观其变了。"
 lmf_interaction.1302.a:0 "我急切地等待消息。"
 lmf_interaction.1302.b:0 "我们走吧！"
 lmf_interaction.1304.t:0 "战争开始"
 lmf_interaction.1304.desc.atwar.actor:0 "既然我们已经与[actor.GetTitledFirstNameNoTooltip]开战，继续让[recall_char.GetFirstNamePossessiveNoTooltip]访问[actor.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]似乎非常不合适。"
 lmf_interaction.1304.desc.atwar.self.rootattacker:0 "我与[defender.GetTitledFirstNameNoTooltip]的战争引发了我是否应该立即返回[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的思考。"
 lmf_interaction.1304.desc.atwar.rootattacker:0 "我与[defender.GetTitledFirstNameNoTooltip]的战争引发了[recall_char.GetFirstNameNoTooltip]是否应该立即返回[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的思考。\n\n说实话，[recall_char.GetSheHe]在[actor.GetTitledFirstNamePossessiveNoTooltip]宫廷上应该足够安全，但这只是暂时……"
 lmf_interaction.1304.desc.atwar.self.rootdefender:0 "[attacker.GetTitledFirstNamePossessiveNoTooltip]对我的战争引发了我是否应该立即返回[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的思考。"
 lmf_interaction.1304.desc.atwar.rootdefender:0 "[attacker.GetTitledFirstNamePossessiveNoTooltip]对我的战争引发了[recall_char.GetFirstNameNoTooltip]是否应该立即返回[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的思考。\n\n说实话，[recall_char.GetSheHe]在[actor.GetTitledFirstNamePossessiveNoTooltip]宫廷上应该足够安全，但这只是暂时……"
 lmf_interaction.1304.desc.atwar.self:0 "现在，我是[attacker.GetPrimaryTitle.GetNameNoTierNoTooltip]和[defender.GetPrimaryTitle.GetNameNoTierNoTooltip]之间战争的一部分，现在我是否应该立即返回[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]？"
 lmf_interaction.1304.desc.atwar:0 "现在，我是[attacker.GetPrimaryTitle.GetNameNoTierNoTooltip]和[defender.GetPrimaryTitle.GetNameNoTierNoTooltip]之间战争的一部分，现在[recall_char.GetFirstNameNoTooltip]是否应该立即返回[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]？\n\n说实话，[recall_char.GetSheHe]在[actor.GetTitledFirstNamePossessiveNoTooltip]法庭上应该足够安全，但这并不能保证持久。"
 lmf_interaction.1304.a:0 "立刻召回[recall_char.GetHerHim]。"
 lmf_interaction.1304.b:0 "我该回去了。"
 lmf_interaction.1304.c:0 "[your_heir.GetFirstNameNoTooltip]目前所在位置，应该没什么大问题。"
 lmf_interaction.1304.d:0 "继续旅程。"
