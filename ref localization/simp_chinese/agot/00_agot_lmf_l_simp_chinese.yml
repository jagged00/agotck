 lmf_interaction.intro.cancelled.actor.imprisoned:0 "由于[secondary_recipient.GetTitledFirstNamePossessive]被监禁，[secondary_recipient.GetTitledFirstNamePossessive]与[secondary_actor.GetTitledFirstName]的访问之旅被取消。"
