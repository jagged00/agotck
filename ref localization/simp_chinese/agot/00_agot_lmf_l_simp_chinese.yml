 lmf_interaction.1311.t:0 "抵达"
 lmf_interaction.1311.initial.secrep:0 "我在今早时候到达了[actor.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，在[actor.Custom('FortifiedBuilding')]宫殿里，迎接我的不是别人，正是[secondary_actor.GetTitledFirstNameNoTooltip]。"
 lmf_interaction.1311.initial.actor:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]终于在今早时候抵达了[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，随后来到我宫廷里，我亲自迎接[secondary_recipient.GetHerHim]，并吩咐仆人们安置好旅途劳顿后的[secondary_recipient.GetHerHis]队伍。\n\n"
 lmf_interaction.1311.initial:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]终于在今早时候抵达了[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，随后来到[ROOT.Char.Custom('FortifiedBuilding')]里，[secondary_actor.GetTitledFirstNameNoTooltip]亲自迎接[并吩咐仆人们安置好队伍。\n\n"
 lmf_interaction.1311.act.pleased.secrep:0 "[secondary_actor.GetSheHe|U]很客气地欢迎我们，当[secondary_actor.GetSheHe|U]打量我时，我察觉到[secondary_actor.GetSheHe]赞许的目光。也许[secondary_actor.GetSheHe]以为我不会注意到？\n\n"
 lmf_interaction.1311.act:0 ""
 lmf_interaction.1311.secact.pleased.secrep:0 "[secondary_actor.GetSheHe]似乎很高兴见到我，这让我很惊喜。[secondary_actor.GetSheHe|U]代表[secondary_actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor'))]向我表示欢迎，但我可以看到[secondary_actor.GetHerHim]也在仔细打量我。\n\n"
 lmf_interaction.1311.act.displeased.secrep:0 "我不能说[secondary_actor.GetSheHe]看起来特别高兴见到我，尽管邀请是来自[secondary_actor.GetHerHim]。难道[secondary_actor.GetSheHe]改变了想法？次[secondary_actor.GetSheHe]不喜欢我的样子吗？\n\n"
 lmf_interaction.1311.secact.displeased.secrep:0 "我不能说[secondary_actor.GetSheHe]看起来特别高兴见到我，即使[secondary_actor.GetSheHe]保持着愉快的神情。也许这次邀请并不是[secondary_actor.GetHerHis]的主意？次[secondary_actor.GetSheHe]不喜欢我的样子吗？\n\n"
 lmf_interaction.1311.secact.pleased:0 "幸运的是，[secondary_actor.GetSheHe]似乎仍然对这次访问的想法和可能代表的意义感到高兴。\n\n"
 lmf_interaction.1311.secact.displeased:0 "不幸的是，[secondary_actor.GetSheHe]显然还是不喜欢这次拜访，[secondary_actor.GetHerHis]向[secondary_recipient.GetTitledFirstNameNoTooltip]表示欢迎时的冷淡态度也立刻让整个过程变得尴尬起来。\n\n"
 lmf_interaction.1311.reaction.secrep:0 ""
 lmf_interaction.1311.reaction.actor.pleased:0 "[secondary_recipient.GetSheHe|U]似乎很高兴见到我，当[secondary_recipient.GetHerHis]打量我时，我想我在[secondary_recipient.GetSheHe]的脸上发现了赞许的神情。如果[secondary_recipient.GetFirstNameNoTooltip]喜欢这门婚事，那我们俩接下来的访问肯定会轻松许多。\n\n"
 lmf_interaction.1311.reaction.pleased:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]表现得亲切而有礼貌。但[secondary_recipient.GetSheHe]似乎急切地想要开始工作\n\n"
 lmf_interaction.1311.reaction.actor.displeased:0 "[secondary_recipient.GetSheHe|U]似乎并不是特别高兴见到我。[secondary_recipient.GetSheHe|U]冷漠而紧张，也许是不赞成整个拜访。如果是这样，那事情就更难办了。\n\n"
 lmf_interaction.1311.reaction.displeased:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]的表情僵硬而紧张。很明显，[secondary_recipient.GetSheHe]对整个拜访感到不自在……也可能只是累了。\n\n"
 lmf_interaction.1311.us.end:0 "真正的介绍会在两天后开始，我们将单独相处，更好地了解彼此。"
 lmf_interaction.1311.end:0 "真正的介绍将在两天后开始，两人将单独相处，更好地了解对方。"
 lmf_interaction.1311.a:0 "让我们看看会如何……"
 lmf_interaction.1312.t:0 "请求支持"
 lmf_interaction.1312.desc.start:0 "当天晚上，[secondary_recipient.GetTitledFirstNameNoTooltip]来私下找我谈话。\n\n“我真的很想结婚"
 lmf_interaction.1312.desc.name:0 "，[secondary_actor.GetFirstNameNoTooltip]，"
 lmf_interaction.1312.desc.stranger:0 "你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))]，"
 lmf_interaction.1312.desc.end:0 "[ROOT.Char.GetLadyLord]。我担心的是，[secondary_actor.GetSheHe]可能不愿意嫁给我。”\n\n“那为什么来找我？”我问。\n\n“因为我希望得到您的支持。”[secondary_recipient.Custom('polite_gender_ref')]显然很紧张，但我可以看到[secondary_recipient.GetHerHim]在说话的过程中，[secondary_recipient.GetHerselfHimself]变得坚定起来。“[secondary_actor.GetTitledFirstNameNoTooltip]相信您的判断。您是[secondary_actor.GetHerHis]的[secondary_actor.Custom2('LMF_RelationToMeShort', ROOT.Char )]。如果您明天支持我，也许……”\n\n我怀疑[secondary_recipient.Custom('polite_gender_ref')]高估了我对[secondary_actor.GetFirstNameNoTooltip]的影响，但也许[secondary_recipient.GetSheHe]是对的。"
 lmf_interaction.1312.a:0 "我会默默地支持[secondary_recipient.GetHerHis]。"
 lmf_interaction.1312.b:0 "[secondary_recipient.GetSheHe|U]应该靠自己。"
 lmf_interaction_intro_chance_pos_tt:0 "介绍成功的概率#positive_value 增加#!"
 lmf_interaction_intro_chance_neg_tt:0 "介绍成功的概率#negative_value 减少#!"
 lmf_interaction.1313.t:0 "令人担忧的行为"
 lmf_interaction.1313.desc.start:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]和[secondary_recipient.GetHerHis]的家臣被安置在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，起初似乎一切都很平静，大家都为第二天的正式介绍做好了准备。\n\n然后，当天傍晚，一个仆人把我叫醒，告诉我一个消息："
 lmf_interaction.1313.desc.lunatic:0 "有人发现[secondary_recipient.GetTitledFirstNameNoTooltip]在[ROOT.Char.Custom('FortifiedBuilding')]的大厅里一丝不挂地游荡而且狂笑不止。\n\n仆人们最终让[secondary_recipient.GetHerHim]安静下来，并将[secondary_recipient.GetHerHim]送回房间，"
 lmf_interaction.1313.desc.lustful:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]溜出了[ROOT.Char.Custom('FortifiedBuilding')]，来到了附近一个村庄，在那里，[secondary_recipient.GetSheHe]与几个当地人因为“猥亵行为”而发生了口角。\n\n我的卫兵认出了[secondary_recipient.Custom('polite_gender_ref')]，并造成更多麻烦之前把[secondary_recipient.GetHerHim]护送回去了，"
 lmf_interaction.1313.desc.sadistic:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]与[ROOT.Char.Custom('FortifiedBuilding')]的一名女仆打了起来。就因为她闯入了[secondary_recipient.Custom('polite_gender_ref')]的寝室，这场打斗导致[ROOT.Char.Custom('FortifiedBuilding')]里近一半的人前来干预。女仆虽然被[secondary_recipient.GetTitledFirstNamePossessiveNoTooltip]脾气震慑住了，但大部分人都没事，"
 lmf_interaction.1313.desc.end:0 "虽然没有什么大麻烦，但即便如此……还是令人担忧。\n\n更糟糕的是[secondary_actor.GetFirstNameNoTooltip]和我一样听说了这件事。"
 lmf_interaction.1313.a:0 "我想我们得假装这一切从未发生过。"
 lmf_interaction.1314.t:0 "大厅里的斗殴"
 lmf_interaction.1314.desc:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]和[secondary_recipient.GetHerHis]的家臣被安排在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，起初一切似乎都很顺利。但有一次非正式的小型晚宴，[secondary_actor.GetFirstNameNoTooltip]没有出席，事情就在这时出了岔子。\n\n[secondary_recipient.GetTitledFirstNameNoTooltip]似乎从一开始就心情不好，所以我避开了[secondary_recipient.GetHerHim]……这就是为什么我直到听到大喊大叫时才看到发生了什么。[secondary_recipient.GetTitledFirstNameNoTooltip]开始骂[your_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)]，两人之间的叫骂声变得如此激烈，甚至要人拉开！\n\n事情的起因并不重要。重要的是，[your_courtier.GetFirstNameNoTooltip]对整个事件感到非常尴尬，它发生在所有人面前，而且[secondary_actor.GetFirstNameNoTooltip]听说了[secondary_recipient.GetTitledFirstNamePossessiveNoTooltip]的可怕行为。"
 lmf_interaction.1314.a:0 "真不幸。"
 fought_during_introduction:0 "在[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]介绍婚姻期间，[CHARACTER.GetShortUIName]和[TARGET_CHARACTER.GetShortUIName]因斗殴而成为仇敌。"
 fought_during_introduction_corresponding:0 "[TARGET_CHARACTER.GetShortUIName]和[CHARACTER.GetShortUIName]在[CHARACTER.GetShortUINamePossessiveNoTooltip]介绍婚姻时斗殴后成为仇敌。"
 lmf_interaction.1315.t:0 "无处可寻"
 lmf_interaction.1315.desc:0 "在[secondary_recipient.GetTitledFirstNameNoTooltip]和[secondary_recipient.GetHerHis]的家臣们安顿好之后，我想在宴会退席之前举行一个小聚会。让[secondary_recipient.GetHerHim]有机会与[secondary_actor.GetFirstNameNoTooltip]交谈，而不会受到上百双眼睛的注视。\n\n然而，[secondary_recipient.GetTitledFirstNameNoTooltip]却不见踪影。\n\n我们一度以为[secondary_recipient.Custom('polite_gender_ref')]消失了，甚至被绑架了！[secondary_recipient.GetSheHe|U]不在[secondary_recipient.GetHerHis]寝室，也不在大厅。连[secondary_recipient.GetHerHis]的仆人都感到莫名其妙，我连忙召集一支搜索队。\n\n大家慌慌张张地找了一个多小时后，我的一个女仆在书房里发现了[secondary_recipient.GetHerHim]。显然，[secondary_recipient.GetSheHe|U]在经历了这么多陌生人的压力之后，躲到了那里。\n\n[secondary_actor.GetFirstNameNoTooltip]对此非常不以为然。"
 lmf_interaction.1315.a:0 "说实话，我也一样。"
 lmf_interaction.1316.t:0 "溺爱一餐"
 lmf_interaction.1316.desc.start:0 "在[secondary_recipient.GetTitledFirstNameNoTooltip]和[secondary_recipient.GetHerHis]家臣安顿好之后，我在大厅里举行了一场小型晚宴。我想在明天正式介绍之前，[secondary_actor.GetFirstNameNoTooltip]和[secondary_recipient.Custom('polite_gender_ref')]有机会交流。\n\n结果并不顺利。\n\n"
 lmf_interaction.1316.desc.gluttonous:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]几乎不说话，不对[secondary_actor.GetFirstNameNoTooltip]说话，也不对任何人说话。[secondary_recipient.GetSheHe|U]只关心食物，只要是在[secondary_recipient.GetHerHis]盘子的东西，就一股脑儿塞进嘴里。我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('secondary_actor'))]试图与[secondary_recipient.GetHerHim]交谈，却只能在吞咽声中听到微乎其微的嘟囔。\n\n"
 lmf_interaction.1316.desc.paranoid:0 "显然，[secondary_recipient.GetTitledFirstNameNoTooltip]并不想待在那里。[secondary_recipient.GetSheHe|U]一说话就退缩，[secondary_recipient.GetHerHis]的眼睛紧盯着每个门口，任何仆人走近都会狐疑地瞪大眼睛。感觉[secondary_recipient.GetHerHim]有点被害妄想症！即使是[secondary_actor.GetFirstNameNoTooltip]，当[secondary_actor.GetSheHe]试图与人交流时，也只能得到一些目光。\n\n"
 lmf_interaction.1316.desc.lazy:0 "显然，[secondary_recipient.GetTitledFirstNameNoTooltip]并不想去那里。[secondary_recipient.GetSheHe|U]姗姗来迟，哈欠连天，衣冠不整，用餐的大部分时间都漫不经心地吃着和打哈欠。当[secondary_actor.GetFirstNameNoTooltip]询问[secondary_recipient.GetHerHim]旅途是否劳累时，只得到一句“不太累”，就这样结束了。\n\n"
 lmf_interaction.1316.desc.fallthrough:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]似乎尽[secondary_recipient.GetHerHis]最大努力与人交谈，但[secondary_recipient.GetSheHe]却显得很尴尬，显然很不自在。也许[secondary_recipient.GetSheHe]只是不适应环境，或者是在旅途中劳累了？无论如何，这都是一顿痛苦的晚餐，当[secondary_recipient.Custom('polite_gender_ref')]为[secondary_actor.GetFirstNameNoTooltip]开脱时，[secondary_actor.GetHerselfHimself]的脸上明显松了一口气，但这对事情并没有什么帮助。\n\n"
 lmf_interaction.1316.desc.end:0 "希望明天开头表现得更好吧……"
 lmf_interaction.1316.a:0 "本应有更好的结果……"
 lmf_interaction.1317.t:0 "良好的印象"
 lmf_interaction.1317.desc.start:0 "把[secondary_recipient.GetTitledFirstNameNoTooltip]和[secondary_recipient.GetHerHis]家臣安顿好之后，我举行了一场小型晚宴。我想在明天正式介绍之前[secondary_actor.GetFirstNameNoTooltip]和[secondary_recipient.Custom('polite_gender_ref')]有机会交流。\n\n结果比我预想的要好。\n\n"
 lmf_interaction.1317.desc.gregarious:0 "从[secondary_recipient.GetTitledFirstNameNoTooltip]踏进大厅的那一刻起，[secondary_recipient.GetSheHe]就是众人瞩目的焦点。从[secondary_recipient.GetHerHis]的神情，[secondary_recipient.GetHerHis]说话时全神贯注地倾听的样子……所有这一切都让气氛轻松了许多，甚至连[secondary_actor.GetFirstNameNoTooltip]也跟着笑了起来。\n\n"
 lmf_interaction.1317.desc.diligent:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]完美的诠释了什么是礼仪，[secondary_recipient.GetHerHis]会让每个人都参与谈话，并认真倾听他们的发言。当[secondary_recipient.GetSheHe]把注意力转移到其他人身上时，其他人很难不觉得被忽视了。当[secondary_recipient.GetTitledFirstNameNoTooltip]与[secondary_recipient.GetHerHim]进行轻松的玩笑时，甚至[secondary_actor.GetFirstNameNoTooltip]也明显动摇了。\n\n"
 lmf_interaction.1317.desc.temperate:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]完美的诠释了什么是礼仪。[secondary_recipient.GetSheHe|U]只会抿两口酒，只吃[secondary_recipient.GetHerHis]一小部分饭菜，做得如此优雅，以至于没有人因为没有像[secondary_recipient.GetSheHe]那样吃东西而感到贪吃。即使有人会看不起不喝酒的[secondary_recipient.Custom('WomanManGirlBoy')]，[secondary_actor.GetFirstNameNoTooltip]也非常注意……并明确表示赞同。\n\n"
 lmf_interaction.1317.desc.fallthrough:0 "我不确定[secondary_recipient.GetTitledFirstNameNoTooltip]通常在这种场合的表现如何，但今晚[secondary_recipient.GetSheHe]显然兴致很高。[secondary_recipient.GetSheHe|U]与大家谈笑风生，即使远离家乡，也显得从容不迫，甚至把原本可能是一场安静而尴尬的晚餐变成了一场令人愉快的活动，在某种程度上，[secondary_recipient.GetSheHe]仿佛已经是这个家庭的一员了。更重要的是，[secondary_actor.GetFirstNameNoTooltip]注意到了……并表示赞同\n\n"
 lmf_interaction.1317.desc.end:0 "希望这种势头能延续到明天。"
 lmf_interaction.1317.a:0 "这是一个很好的开始。"
 lmf_interaction.1318.t:0 "征服众人"
 lmf_interaction.1318.desc:0 "把[secondary_recipient.GetTitledFirstNameNoTooltip]和[secondary_recipient.GetHerHis]的家臣安置过夜后，[ROOT.Char.Custom('FortifiedBuilding')]里的一切都很平静。我邀请[secondary_recipient.GetTitledFirstNameNoTooltip]到我的私人住处共进晚餐，希望[secondary_recipient.GetSheHe]和[secondary_actor.GetFirstNameNoTooltip]能有机会私下谈谈，免得百目睽睽。\n\n然而，不知何故，最后却是我和[secondary_recipient.GetTitledFirstNameNoTooltip]说了很多话！\n\n我们边喝边聊，我不知不觉中经常被[secondary_recipient.Custom('polite_gender_ref')]逗笑了，还讲了几个自己的笑话。也许[secondary_recipient.GetSheHe]只是想让[secondary_recipient.GetHerselfHimself]对我产生好感，因为我是决定婚礼命运的人，但我并不这么觉得。我们只是在相处！\n\n[secondary_actor.GetFirstNameNoTooltip]早早地离开了晚宴，无聊而又无人注意。"
 lmf_interaction.1318.a:0 "一个美好的夜晚。"
 got_along_at_introduction:0 "在[TARGET_CHARACTER.GetShortUINamePossessiveNoTooltip]婚姻介绍访期间，[CHARACTER.GetShortUIName]和[TARGET_CHARACTER.GetShortUIName]结下不解之缘。"
 got_along_at_introduction_corresponding:0 "在[CHARACTER.GetShortUINamePossessiveNoTooltip]婚姻介绍访期间，[CHARACTER.GetShortUIName]和[TARGET_CHARACTER.GetShortUIName]结下不解之缘。"
 lmf_interaction.1319.t:0 "玩剑"
 lmf_interaction.1319.desc.start:0 "在把[secondary_recipient.GetTitledFirstNameNoTooltip]和[secondary_recipient.GetHerHis]家臣安顿好之后，我听说[secondary_recipient.GetSheHe]很快就到了军营，和我的[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]一起切磋。\n\n也许这很不寻常，但可能[secondary_recipient.GetTitledFirstNameNoTooltip]只是更喜欢挥剑，而不是扮演宫廷[secondary_recipient.GetWomanMan]寻找[secondary_actor.GetWifeHusband]。\n\n更重要的是，[secondary_actor.GetFirstNameNoTooltip]似乎和我一样听到了这个消息，并前往军营为[secondary_actor.GetHerselfHimself]见证这一壮观场面。"
 lmf_interaction.1319.desc.impressed:0 "显然，[secondary_actor.GetSheHe]对[secondary_recipient.GetTitledFirstNamePossessiveNoTooltip]的表现相当满意，每当[secondary_recipient.GetHerHim]赢了一场比赛，他就会在场边为[secondary_recipient.GetHerHim]加油打气，然后对[secondary_recipient.GetSheHe]大加赞扬。"
 lmf_interaction.1319.desc.unimpressed:0 "很明显，[secondary_actor.GetSheHe]对[secondary_recipient.GetTitledFirstNamePossessiveNoTooltip]的表现相当不好，尤其是当[secondary_actor.GetSheHe]试图与[secondary_recipient.GetWomanMan]交谈时，却被断然拒绝。然后[secondary_actor.GetFirstNameNoTooltip]转身离开了。"
 lmf_interaction.1319.a:0 "至少，[secondary_actor.GetSheHe]被打动了。"
 lmf_interaction.1319.b:0 "这不是一个好的开始。"
 lmf_interaction.1320.t:0 "突如其来的决斗"
 lmf_interaction.1320.desc:0 "在把[secondary_recipient.GetTitledFirstNameNoTooltip]和[secondary_recipient.GetHerHis]的家仆安顿好之后，我确信这将是一个平静的夜晚。然而，事实远非如此。\n\n当[ROOT.Char.Custom('FortifiedBuilding')]的大部分人都睡着的时候，[secondary_recipient.GetTitledFirstNameNoTooltip]去了军营，和我的[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]……喝酒赌博，很有可能，虽然他们否认。\n\n后来，[secondary_recipient.Custom('polite_gender_ref')]和[your_courtier.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]打了一场比赛。有人指责他作弊，事情一发不可收拾，突然宣布决斗。\n\n在我不知情的情况下发生这种事已经够糟了，但不知怎么的，[secondary_actor.GetFirstNameNoTooltip]得到了决斗的消息，跑来见证[secondary_actor.GetHerHis]潜在的未来[secondary_recipient.GetWifeHusband]的能力。"
 lmf_interaction.1320.a:0 "太糟糕了！"
 lmf_interaction.1320.a.win.tt:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]赢得决斗！"
 lmf_interaction.1320.a.lose.tt:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]输得决斗！"
 lmf_interaction.1321.t:0 "思念家乡"
 lmf_interaction.1321.desc:0 "把[secondary_recipient.GetTitledFirstNameNoTooltip]和[secondary_recipient.GetHerHis]家臣安置好并带他们回房间后，我想这应该一个安静的夜晚。\n\n然而，我却收到了一位[ROOT.Char.Custom('FortifiedBuilding')]仆人的消息，[secondary_recipient.GetTitledFirstNameNoTooltip]把[secondary_recipient.GetHerselfHimself]锁在[secondary_recipient.GetHerHis]房间里，嚎啕大哭。\n\n我不得不亲自下去，隔着门和[secondary_recipient.Custom('polite_gender_ref')]说话，让[secondary_recipient.GetHerHim]冷静下来，直到最后，[secondary_recipient.GetSheHe]才勉强让我进去。\n\n原来，[secondary_recipient.GetSheHe|U]想家了，仅此而已。我不得不提醒自己，[secondary_recipient.GetTitledFirstNameNoTooltip]还只是个孩子，真的，并庆幸[secondary_actor.GetFirstNameNoTooltip]没有亲眼目睹这一切。"
 lmf_interaction.1321.a:0 "对于[secondary_recipient.Custom('GetLassLad')]来说，这是多么尴尬啊。"
 intro_planned_activity_hunting:0 "计划花一天时间打猎"
 intro_planned_activity_hike:0 "计划花一天时间逛逛"
 intro_planned_activity_garrison:0 "计划展示剑术"
 intro_planned_activity_seduction:0 "计划与密友一起度过这一天"
 intro_planned_activity_poetry:0 "计划展示诗技"
 intro_planned_activity_library:0 "计划去图书馆度过一天"
 intro_planned_activity_church:0 "计划在[ROOT.GetCharacter.GetFaith.HouseOfWorship|l]度过一天"
 intro_planned_activity_tavern:0 "计划离开[ROOT.GetCharacter.Custom('FortifiedBuilding')]前去附近的村庄"
 intro_planned_activity_poor:0 "计划出去花一天时间救济穷人"
 intro_planned_activity_tour:0 "计划花一天时间游览[ROOT.GetCharacter.Custom('FortifiedBuilding')]"
 intro_planned_activity_garden:0 "计划在[ROOT.GetCharacter.Custom('FortifiedBuilding')]的花园里度过一天"
 lmf_interaction.1325.t:0 "第二天"
 lmf_interaction.1325.t.same:0 "选择配偶"
 lmf_interaction.1325.desc.same.actor.start:0 "考虑到[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))]是我在[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]的宫廷的一员，我们很难把它称作介绍，但尽管如此，我们还是要坚持使用。\n\n"
 lmf_interaction.1325.desc.same.actor.willnotwed:0 "当[secondary_recipient.GetSheHe|U]在大殿上走到我面前时，[secondary_recipient.GetSheHe]显得相当紧张。毕竟，[secondary_recipient.GetSheHe|U]已经明确表示，[secondary_recipient.GetSheHe]不会嫁给任何不符合要求的人……而我有权力无视这些。然而如果我想这么做，为什么还要走流程呢？\n\n"
 lmf_interaction.1325.desc.same.actor:0 "当[secondary_recipient.GetSheHe|U]在大殿上走到我面前时，[secondary_recipient.GetSheHe]显得相当紧张。毕竟，不管我们最后对彼此的感觉如何，我才是决定这桩婚事是否继续的人，如果我想在不考虑是否合适的情况下与[secondary_recipient.GetFirstNameNoTooltip]成婚，我会这么做吗？"
 lmf_interaction.1325.desc.same.actor.end:0 "于是，我拉着[secondary_recipient.GetHerHim]的手，把[secondary_recipient.GetHerHim]领了出去，想[secondary_actor.Custom('lmf_intro_planned_activity')]。尽管全场的目光都集中在我们身上，但我们还是要尽力而为。"
 lmf_interaction.1325.desc.same.start:0 "考虑到[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))]位于[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]中，很难把它称作介绍，但尽管如此，我们还是要坚持使用这词。"
 lmf_interaction.1325.desc.same.both.willnotwed:0 "毕竟，[secondary_recipient.GetSheHe]和[secondary_actor.GetFirstNameNoTooltip]都公开表示，他们只愿意和自己愿意的人结婚，如果我想推翻他们的意愿，就没意思了。\n\n"
 lmf_interaction.1325.desc.same.secact.willnotwed:0 "[secondary_actor.GetFirstNamePossessiveNoTooltip]只与[secondary_actor.GetSheHe]认可的[secondary_recipient.GetWomanMan]结婚的愿望，那我没必要去无视其心愿。\n\n"
 lmf_interaction.1325.desc.same.secrec.willnotwed:0 "[secondary_recipient.GetFirstNamePossessiveNoTooltip]只与[secondary_recipient.GetSheHe]认可的[secondary_actor.GetWomanMan]结婚的愿望，那我没必要去无视其心愿。\n\n"
 lmf_interaction.1325.desc.same:0 "我想让他们结婚而不考虑这一点，我会这样做。\n\n"
 lmf_interaction.1325.desc.same.end:0 "两人都以平静的面孔出现在宫廷上，小心翼翼地隐藏着自己的真实想法。然后，[secondary_actor.GetFirstNameNoTooltip]牵着[secondary_recipient.GetTitledFirstNamePossessiveNoTooltip]的手，走出宫廷，[secondary_actor.GetHerHis|U]显然想[secondary_actor.Custom('lmf_intro_planned_activity')]。\n\n介绍即将开始。"
 lmf_interaction.1325.desc.secrec.start:0 "早晨一到，我就来到御座厅，整装待发，准备与[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))]共度一天。\n\n我承认我感到紧张。即使未来还没有决定，但整个宫廷的目光都在注视着我。在这样的压力下，谁会不出汗呢？\n\n即便如此，我还是保持面无表情。\n\n"
 lmf_interaction.1325.desc.start:0 "当清晨到来时，[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_recipient'))]就来到御座厅，整装待发，准备与[Select_CString( secondary_actor.IsLocalPlayer, '我', secondary_actor.GetFirstNameNoTooltip )]共度一天。\n\n[secondary_recipient.GetSheHe|U]显得很紧张，考虑到整个宫廷的目光都集中在[secondary_recipient.GetHerHim]身上，纵然[secondary_recipient.GetSheHe]心存疑虑，[secondary_recipient.GetSheHe]至少保持着得体仪态，未让[secondary_recipient.GetHerHis]的情绪显露分毫\n\n"
 lmf_interaction.1325.desc.actor:0 "我也不能说我完全确定这一天会比[secondary_recipient.GetSheHe]过得更好。\n\n"
 lmf_interaction.1325.desc.secact.disapprove:0 "至于[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))]，[secondary_actor.GetSheHe]对[secondary_actor.GetHerHis]就没有那么戒备了。从[Select_CString( secondary_recipient.IsLocalPlayer, '我', secondary_recipient.GetFirstNameNoTooltip )]出现的那一刻起，[secondary_recipient.GetSheHe|U]就一直对[Select_CString( secondary_recipient.IsLocalPlayer, '我', secondary_recipient.GetSheHe )]狠不屑，而且很紧张。\n\n"
 lmf_interaction.1325.desc.secact:0 "至于[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('secondary_actor'))]，[secondary_actor.GetSheHe]对[secondary_actor.GetHerHis]就没有那么戒备了。从[Select_CString( secondary_recipient.IsLocalPlayer, '我', secondary_recipient.GetFirstNameNoTooltip )]出现的那一刻起，[secondary_recipient.GetSheHe|U]就一直对[Select_CString( secondary_recipient.IsLocalPlayer, '我', secondary_recipient.GetSheHe )]很高兴，显然迫不及待了。\n\n"
 lmf_interaction.1325.desc.end:0 "在全宫廷的注视下，[Select_CString( secondary_actor.IsLocalPlayer, '我', secondary_actor.GetFirstNameNoTooltip )]向前迈出一步，一起走了出去。[secondary_actor.GetHerHisMy|U|U]想[secondary_actor.Custom('lmf_intro_planned_activity')]\n\n这场相亲就这样开始了。"
 lmf_interaction.1325.a:0 "让我们看看会如何……"
 lmf_interaction.1325.a.tt:0 "[secondary_actor.GetShortUIName|U]和[secondary_recipient.GetShortUIName]将花一天的时间来更好地了解彼此"
 lmf_interaction.1325.a.secrec.charmed:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]被[secondary_actor.GetFirstNameNoTooltip]迷住了"
 lmf_interaction.1325.a.secrec.notcharmed:0 "[secondary_actor.GetFirstNameNoTooltip]没有给人留下好印象"
 lmf_interaction.1325.a.secact.charmed:0 "[secondary_actor.GetFirstNameNoTooltip]被[secondary_recipient.GetTitledFirstNameNoTooltip]迷住"
 lmf_interaction.1325.a.secact.notcharmed:0 "[secondary_recipient.GetTitledFirstNameNoTooltip]没有给人留下好印象"
