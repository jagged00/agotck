 lmf_heir.1656.desc.away:0 "虽然我没亲眼见过，但我听说"
 lmf_heir.1656.desc.busy:0 "虽然我和[your_heir.GetHerHim]相处的时间不长，但我听说"
 lmf_heir.1656.desc.there:0 "我有些不悦地注意到"
 lmf_heir.1656.desc:0 "[heir_liege.GetTitledFirstNamePossessiveNoTooltip][heir_liege.Custom2('LMF_RelationToMeShort', your_heir )]在抵达[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]那好几周一直无视规矩，到处给仆人添麻烦，[your_heir.GetSheHe]以为过来是度假？\n\n我告诉自己，[your_heir.GetSheHe]才刚刚安顿下来，后面再看看[your_heir.GetHerHis]的表现如何，但这无疑是一个不好开始。 "
 lmf_heir.1656.a:0 "我开始后悔这次拜访了。"
