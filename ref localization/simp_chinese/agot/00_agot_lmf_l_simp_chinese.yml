 lmf_interaction.intro.cancelled.actor.besieged:0 "因为[actor.GetTitledFirstNamePossessiveNoTooltip]首都被围困，所以[secondary_recipient.GetTitledFirstNamePossessive]与[secondary_actor.GetTitledFirstName]的访问之旅被取消。"
