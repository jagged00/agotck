l_simp_chinese:
 agot_pirate_ship_domicile_type:0 "$game_concept_agot_landless_pirate_domicile$"
 agot_pirate_ship_domicile_title:0 "[CHARACTER.GetFirstNamePossessiveNoTooltip]的$agot_pirate_ship_domicile_type$"
 agot_pirate_ship_domicile_type_tooltip:0 "$agot_pirate_ship_domicile_type$"
 agot_pirate_ship_move_desc:0 "将你的$agot_pirate_ship_domicile_type$移动到新地点。"
 game_concept_agot_landless_pirate_domicile:0 "海盗船"
 game_concept_agot_landless_pirate_domiciles:0 "海盗船"
 game_concept_agot_landless_pirate_domicile_desc:0 "$game_concept_agot_landless_pirate_domiciles$是一种专属于[pirate_govt|E][government_form|E]的[domicile|E]。\n\n无论是有地还是无地的[characters|e]都能使用$game_concept_agot_landless_pirate_domiciles$。有地海盗不能将其$game_concept_agot_landless_pirate_domicile$迁至首都以外，而无地海盗则可以将其$game_concept_agot_landless_pirate_domicile$在[pirate_den_holdings|E]、[settlement_holdings|E]和[wilderness_holdings|E]之间迁移。\n\n当无地海盗将其 $game_concept_agot_landless_pirate_domiciles$迁至新的$game_concept_pirate_den$时，他们必须一次性支付停靠费，并缴纳年费，同时在所有防御战争中必须加入该[county|e]持有者一方参战。有地海盗可以通过[laws|E]来设定这些港口停靠费的标准。"
 agot_cannot_become_adventurer_as_pirate_with_valid_relocation_target:0 "无地[agot_landless_pirate_domicile|e]持有者，不能有任何有效的旅行目的地。"
 game_concept_pirate_dominate_title:0 "主宰头衔"
 game_concept_pirate_domination_war:0 "海盗主宰战争"
 game_concept_pirate_dominate_title_desc:0 "对于海盗角色来说，要想获得更高[title_tier|E]的[title|E]，必须与一个地区的当地居民战斗来夺取头衔。\n\n如果有人持有相关头衔，会向该角色发动战争以篡夺该头衔。如果没有任何人持有相关头衔，则会与头衔[de_jure|E]区域内所有非[tributary|E]、非[ally|E]的统治者作战。\n\n如果胜利，进攻者会获得相关头衔，而防守者会成为其朝贡者。如果失败，进攻者会向防御者支付[gold_i][gold|E]，并失去大量[dread_i][dread|E]。\n\n如果采用[decision|E]的角色持有了整个法理区域，则会立即获得该头衔，毕竟已经没有可作战的防御方了。"
 pirate_domination_war_holder_custom_tooltip:0 "发动针对[main_defender.GetShortUIName]的[title_scope.GetName]的[pirate_domination_war|E]#weak （@soldier_icon![main_defender.MakeScope.ScriptValue('dominate_title_current_ally_strength')|N0]）#!"
 pirate_domination_war_no_holder_custom_tooltip:0 "发起针对[main_defender.GetShortUIName]的[title_scope.GetName][pirate_domination_war|E]\n\t$BULLET$所有非[tributary|E]和非[ally|E]的[title_scope.GetName][de_jure|E][county|E][holder|E]会作为防御方加入[main_defender.GetShortUIName]#weak （@soldier_icon![root_scope.MakeScope.ScriptValue('dominate_title_current_enemy_strength')|N0]）#!"
 agot_raid_pirate_domicile:0 "袭击$agot_pirate_ship_domicile_type$"
 agot_raid_pirate_domicile_desc:0 "[SCHEME.GetTargetCharacter.GetShortUIName]胆大包天，袭击行动会让[SCHEME.GetTargetCharacter.GetHerHim]认清[SCHEME.GetTargetCharacter.GetHerHis]的位置。"
 agot_raid_pirate_domicile_desc_general:0 "$agot_raid_pirate_domicile$是一种[hostile_scheme|E]，目标是袭击另一海盗的[agot_landless_pirate_domicile|E]。该计谋基于[intrigue|E]，可以招揽[agents|E]。\n\n成功的$agot_raid_pirate_domicile$将导致目标[gold|E]和[artifacts|E]被掠走，[agot_landless_pirate_domicile|E]被破坏，甚至廷臣死亡。"
 agot_raid_pirate_domicile_action:0 "$raid_estate_action$"
 start_pirate_raid_domicile_interaction:0 "开始袭击海盗船"
 start_pirate_raid_domicile_interaction_desc:0 "试图袭击[recipient.GetName]的[agot_landless_pirate_domicile|E]"
 start_pirate_raid_domicile_notification:0 "$agot_raid_pirate_domicile$"
 agot_raid_pirate_kill_courtiers_tt:0 "[recipient.GetFirstNamePossessive][recipient.Custom('GetCourt')]的成员可能被杀"
 agot_raid_pirate_destroy_buildings_tt:0 "[recipient.GetFirstNamePossessiveNoTooltip]的[agot_landless_pirate_domicile|E]的一座建筑可能被摧毁"
 agot_raid_pirate_ship_gain_coin_tt:0 "你会获得@gold_icon![gold|E]"
 agot_raid_pirate_ship_gain_dread_tt:0 "你会获得@dread_icon![dread|E]"
 agot_raid_pirate_ship_gain_artifacts_tt:0 "你可能掠得@artifact_icon![artifacts|E]"
 scheme_target_not_agot_pirate:0 "[target.GetShortUIName]没有[agot_landless_pirate_domicile|E]"
 scheme_owner_not_agot_pirate:0 "你没有[agot_landless_pirate_domicile|E]"
 scheme_target_not_alive:0 "[target.GetShortUIName]已经不在人世！"
 agot_raid_pirate_domicile_invalidated_title:0 "@scheme_icon!袭击海盗船计谋结束"
 AGOT_RAID_PIRATE_DOMICILE_SAME_COUNTY:0 "[target.GetShortUINamePossessive]和[owner.GetShortUINamePossessive]的[agot_landless_pirate_domicile|E]位于同一伯爵领：$VALUE|+=0$"
 OWNER_DOMICILE_FORCASTLE_DESC:0 "[target.GetDomicile.GetName]的[GetDomicileBuilding('agot_forecastle_01').GetName]等级：$VALUE|+=0$"
 RAID_PIRATE_SHIP_IN_SUBREALM_DESC:0 "[target.GetShortUINamePossessive]的[agot_landless_pirate_domicile|E]位于你的[realm|E]：$VALUE|+=0$"
 RAID_PIRATE_SHIP_IN_HIGH_PORT_RATE_DESC:0 "[target.GetShortUINamePossessive]的[agot_landless_pirate_domicile|E]停靠在一个$pirate_tax_rate_04$[pirate_port_rate|E]的[realm|E]：$VALUE|+=0$"
 RAID_PIRATE_SHIP_ENDURING_HARDSHIPS_PERK_DESC:0 "[target.GetShortUINamePossessive]有[GetPerk('enduring_hardships_perk').GetName(GetNullCharacter)]：$VALUE|+=0$"
 game_concept_pirate_port_rates:0 "海盗港停靠费"
 game_concept_pirate_port_rate:0 "海盗港停靠费"
 game_concept_pirate_port_rates_desc:0 "$game_concept_pirate_port_rates$包含两种以@gold_icon!形式征收的费用，是[agot_landless_pirate_domiciles|E]抵达由[pirate_govt|E]统治者控制的地盘时必须缴纳的。\n\n第一种费用是#bold 一次性停靠费#!，无地海盗在进入新的[pirate_den_holding|E]时必须立即支付。第二种费用是#bold 年度停靠费#!，只要海盗还停留在这片地区，就必须每年缴纳一次。\n\n统治该伯爵领的有地海盗可以通过[laws|E]来调整这些费用。"
 game_concept_pirate_ship_designated_heir:0 "$game_concept_agot_landless_pirate_domicile$指定继承人"
 game_concept_pirate_ship_designated_heirs:0 "[agot_landless_pirate_domicile|E]指定继承人"
 game_concept_pirate_ship_designated_heir_desc:0 "$game_concept_pirate_ship_designated_heir$是被指定继承[agot_landless_pirate_domicile|E]的[character|E]。\n\n他们无需与现任$game_concept_agot_landless_pirate_domicile$船长有血缘关系，但必须是该船长的廷臣。只有无领地的[pirate_govt|E][ruler|E]才能指定$game_concept_pirate_ship_designated_heir$。"
 agot_pirate_events.8032.desc:0 "黎明最终带来了从[target.GetFirstNamePossessive]停泊在[target_domicile.GetLocation.GetBaronyNameExplicitlyNoTooltip]的海盗船上传来的消息，确认了我们的成功！\n\n那些[target.Custom('InsultNounPlural')]完全没有防备，"
 agot_pirate_events.8032.kill:0 "其中数人丧命——活着的人必须忍受这种失败…………"
 agot_pirate_events.8032.fallback:0 "遭受了重创，所有人都见证了一切！"
 agot_pirate_events.8034.t:0 "海盗船遇袭"
 agot_pirate_events.8034.desc:0 "黎明时分，我很快收到了[target_domicile.GetLocation.GetBaronyNameExplicitlyNoTooltip]的海盗船被袭击的可怕传言，"
 agot_pirate_events.8034.kill:0 "\n\n他们告诉我，我的多名廷臣在袭击中遇害，像牲畜一样被敌人屠杀……"
 agot_pirate_events.8034.discovered:0 "\n\n事后，所有人都同意这显然是[owner.GetName]的杰作……"
 agot_pirate_events.8033.desc:0 "黎明最终带来了从[target.GetFirstNamePossessive]停泊在[target_domicile.GetLocation.GetBaronyNameExplicitlyNoTooltip]的海盗船上传来的消息，虽然并不是我们想听到的那样……\n\n那些[target.Custom('InsultNounPlural')]不知怎么做好了防御准备，在我们的袭击者有机会做出任何破坏前就击败了他们。"
 agot_pirate_events.8033.captured:0 "\n\n更糟的是，我的[owner.Custom2('RelationToMeShort', SCOPE.sC('captured'))][captured.GetTitledFirstName]似乎在袭击过程中被俘虏了……"
 agot_pirate_events.8033.fallback:0 "\n\n至少我们还能安心，因为唯一损失的不过是我宝贵的时间……"
 create_pirate_ruler_designer:0 "创建你自己的无地海盗"
 create_pirate_ruler_designer_tt:0 "在所选角色的首都创建一名无地海盗。"
 create_pirate_ruler_designer_must_be_pirate_start_tt:0 "@warning_icon!#warning 你只能在现有海盗角色的领地内创建无地海盗。#!"
 move_pirate_domicile_rules_tt:0 "你只能将[domicile|E]迁至沿海的海盗窝点，或传统海盗区域内的荒野和定居点伯爵领。"
 trait_viking_is_corsair:0 "海盗"
