 building_type_agot_unicorn_glen_01:0 "卡尔达斯"
 building_type_agot_unicorn_glen_01_desc:0 "卡尔达斯位于马格拿家族的祖传领地斯卡格斯岛的群山中，以其独角兽群著称。"
 building_agot_unicorn_glen_01:0 "大峡谷"
 building_agot_unicorn_glen_01_desc:0 "斯卡格斯岛的山脉中有一处巨大的峡谷，那里栖息着大量强壮的独角兽。掌控此地的领主能够获得最优良的带角坐骑。"
 building_type_agot_hellholt_01:0 "狱门堡"
 building_type_agot_hellholt_01_desc:0 "乌勒家族的古老居城，狱门堡领主自古以来就是强力封臣，他们先后效忠于旱地家族和马泰尔家族。"
 building_agot_hellholt_01:0 "米拉西斯的残骸"
 building_agot_hellholt_01_desc:0 "根据乌勒家族与铁王座达成的和平协议，他们归还了米拉西斯的颅骨，而巨龙的其余部分则归黄沙与甲虫所有。不过，当沙丘移动时，那些黑色骸骨偶尔会显露出来，随后又再次被流沙掩埋。"
 building_type_agot_sandstone_01:0 "沙石城"
 building_type_agot_sandstone_01_desc:0 "沙石城是科格尔家族的古老居城，既经受住了沙漠沙丘的险恶环境，也抵御过来自多恩之外的种种威胁。"
 building_agot_sandstone_01:0 "毒蝎陵"
 building_agot_sandstone_01_desc:0 "这座科格尔家族的古墓的历史可追溯到安达尔人征服多恩时期，后来墓中蝎子横行，因而得名。"
 building_type_agot_ten_towers_01:0 "十塔城"
 building_type_agot_ten_towers_01_desc:0 "哈尔洛家族的新居城，十塔城是铁群岛上最可怕的城堡之一。"
 building_agot_ten_towers_01:0 "十塔城"
 building_agot_ten_towers_01_desc:0 "十塔城是群屿和哈尔洛家族最雄伟的城堡，以包括藏书塔和寡妇塔在内的众多塔楼著称。近年来，它已成为学识与智慧的堡垒，可惜只是铁群岛黑暗笼罩下的一盏孤灯。"
 building_type_agot_hammerhorn_01:0 "战锤角"
 building_type_agot_hammerhorn_01_desc:0 "古柏勒家族的古老居城，也是大威克岛最宏伟的要塞。"
 building_agot_hammerhorn_01:0 "兄弟要塞"
 building_agot_hammerhorn_01_desc:0 "兄弟要塞是灰海王兄弟的古老堡垒，自古以来就是战锤角和大威克岛的中心。古柏勒家族由此遍布铁群岛，成为铁民中数一数二的强大家族。"
 building_type_agot_lordsport_01:0 "君王港"
 building_type_agot_lordsport_01_desc:0 "波特利家族的居城，也是铁群岛最大的城镇。"
 building_agot_lordsport_01:0 "君王港"
 building_agot_lordsport_01_desc:0 "君王港是铁群岛最宏伟的城镇， 也是派克城的主要港口。铁民的长船不仅长久以来在此寻得安全港湾，这座城镇更为他们劫掠青绿之地提供所需的一切。"
 building_type_agot_grey_garden_01:0 "灰园堡"
 building_type_agot_grey_garden_01_desc:0 "灰园堡哈尔洛家族支系的居城，一直以来都哈尔洛家族和哈尔洛岛的强大堡垒。"
 building_agot_grey_garden_01:0 "灰园堡"
 building_agot_grey_garden_01_desc:0 "灰园堡以其居民的精湛武艺闻名铁群岛，这一声誉至今仍吸引着四方的来客。"
 building_type_agot_volmark_01:0 "沃马克城"
 building_type_agot_volmark_01_desc:0 "沃马克家族的城堡，沃马克城堪称铁群岛上仅次于哈尔洛家族居城的第二大城堡。"
 building_agot_volmark_01:0 "利维坦港"
 building_agot_volmark_01_desc:0 "沃马克家族以猎杀在海洋中巡游的巨大海兽为立身之本，其家族纹章上便包含此类生物。他们的港口被称为利维坦港，岸边时常能看到处理巨兽尸体的景象。"
 building_pirate_remnants:0 "海盗余孽"
 building_pirate_remnants_desc:0 "尽管主要的海盗据点已被摧毁，但其残余势力仍在该地区游荡。零散的盗匪和小股劫掠者狩猎毫无防备之人，对贸易与殖民开拓事业构成威胁。"
 building_type_pirate_remnants:0 "海盗"
 building_pirate_remnants_cleared:0 "被驱逐的海盗"
 building_pirate_remnants_cleared_desc:0 "最后一批海盗余孽已经被清剿或驱逐。如今海路与陆路皆已安全，殖民者与商人终于能松一口气了。\n \n#V 清理[colonization_blockers|E]将允许您的定居点继续升级。#!"
 building_type_agot_nightfort_01:0 "长夜堡"
 building_type_agot_nightfort_01_desc:0 "长夜堡，守夜人军团最初的驻地，曾是军团中最伟大和最恶名昭著的成员的居所——正是在这里，他们击退了无数位塞外之王；也正是在这里，夜王开始了他的统治。"
 building_agot_nightfort_01:0 "黑门"
 building_agot_nightfort_01_desc:0 "长夜堡深处藏着一道黑门，那是一条古老隧道，其历史远早于有文字记载的时期。"
 building_type_agot_port_of_oldtown_01:0 "旧镇"
 building_type_agot_port_of_oldtown_01_desc:0 "作为维斯特洛最伟大、最古老的城市，旧镇在各方面都是一座灯塔。它是教会、学城和参天塔的所在地，是任何王国都引以为傲的珍宝。"
 building_agot_port_of_oldtown_01:0 "莱蒙港"
 building_agot_port_of_oldtown_01_desc:0 "旧镇向来是重要的港口，而在「海狮」莱蒙·海塔尔手中，码头与船坞经历了彻底革新，将其影响力进一步延伸至海外。"
 building_type_agot_chequered_square_01:0 "旧镇"
 building_type_agot_chequered_square_01_desc:0 "作为维斯特洛最伟大、最古老的城市，旧镇在各方面都是一座灯塔。它是教会、学城和参天塔的所在地，是任何王国都引以为傲的珍宝。"
 building_agot_chequered_square_01:0 "方格广场"
 building_agot_chequered_square_01_desc:0 "旧镇虽有许多集市和店铺，但方格广场最为有名。旧镇吸引着世界各片水域的商人，人们在这里能找到来自日落之海、夏日之海、狭海乃至玉海的货物。"
 SPECIAL_BUILDING_NOT_ENABLED_WHILE_NOT_HUMAN:0 "持有者必须是人类"
 SPECIAL_BUILDING_NOT_ENABLED_WHILE_RUIN:0 "不能是[ruin_holding|E][holding|E]"
 building_type_agot_flea_bottom_01:0 "跳蚤窝"
 building_type_agot_flea_bottom_01_desc:0 "跳蚤窝是君临城最声名狼藉的区域，这里窄街陋巷纵横交错，充斥着贫困和罪恶。城中贫民聚集于此，在酒馆、妓院、赌坑和一碗碗“褐汤”中寻求慰藉。"
 building_agot_flea_bottom_01:0 "$building_type_agot_flea_bottom_01$"
 building_agot_flea_bottom_01_desc:0 "$building_type_agot_flea_bottom_01_desc$"
 building_type_agot_gull_harbor_01:0 "海鸥镇"
 building_type_agot_gull_harbor_01_desc:0 "维斯特洛的第三大城市，也是第二小的城市，海鸥镇在安达尔人到来之前就一直是谷地的主要港口。"
 building_agot_gull_harbor_01:0 "海鸥港"
 building_agot_gull_harbor_01_desc:0 "作为谷地的主要港口，海鸥港以引航灯塔与码头集市而闻名。从狭海各地运来的货物，都能在这里找到。"
 building_type_agot_maris_motherhouse_01_desc:0 "维斯特洛的第三大城市，也是第二小的城市，海鸥镇在安达尔人到来之前就一直是谷地的主要港口。"
 building_type_agot_gold_feather_house_01:0 "海鸥镇"
 building_type_agot_gold_feather_house_01_desc:0 "维斯特洛的第三大城市，也是第二小的城市，海鸥镇在安达尔人到来之前就一直是谷地的主要港口。"
 building_agot_gold_feather_house_01:0 "金羽厅"
 building_agot_gold_feather_house_01_desc:0 "海鸥镇的艾林家族早就明白，控制的关键在于黄金与贸易。他们放弃了鹰巢城，定居于海鸥镇的家族宅邸——金羽厅。通过采用商贸之道，海鸥镇的艾林家族将积累足够的财富以实现其目标，并夺取他们想要的任何权力。"
 building_type_agot_osgood_square_01:0 "海鸥镇"
 building_type_agot_osgood_square_01_desc:0 "维斯特洛的第三大城市，也是第二小的城市，海鸥镇在安达尔人到来之前就一直是谷地的主要港口。"
 building_agot_osgood_square_01:0 "奥斯古德方城"
 building_agot_osgood_square_01_desc:0 "失去对城市主体的控制后，谢特家族在城内仍保留着一处据点，并筑起了一座微型城堡。他们在此守卫着主城门，并期盼有朝一日能夺回这座城市的统治权。"
 building_type_agot_khals_manse_01:0 "卡奥的宅邸"
 building_type_agot_khals_manse_01_desc:0 "同大多数自由贸易城邦一样，潘托斯通常会向“来访”的卡拉萨的卡奥赠送礼物。但不同于其他城邦的是，它还赠与了他们在城内的宅邸。"
 building_agot_khals_manse_01:0 "$building_type_agot_khals_manse_01$"
 building_agot_khals_manse_01_desc:0 "$building_type_agot_khals_manse_01_desc$"
 building_type_agot_warriors_ledge_01:0 "芬恩·塞潘"
 building_type_agot_warriors_ledge_01_desc:0 "在安达斯的西部丘陵，安达尔的军阀与国王们时常在此交战，他们的鲜血染红了一处高崖，将这片土地献祭给了战士。"
 building_agot_warriors_ledge_01:0 "战士之崖"
 building_agot_warriors_ledge_01_desc:0 "$building_type_agot_warriors_ledge_01_desc$"
 building_type_agot_strangers_heights_01:0 "希尔科加斯"
 building_type_agot_strangers_heights_01_desc:0 "在安达斯丘陵的深处，矗立着一座被古安达尔人称为「陌客之指」的高耸山脊。人们相信，死亡统御着这片高地。"
 building_agot_strangers_heights_01:0 "陌客高地"
 building_agot_strangers_heights_01_desc:0 "$building_type_agot_strangers_heights_01_desc$"
 building_type_agot_crones_steps_01:0 "克朗顿"
 building_type_agot_crones_steps_01_desc:0 "安达斯偏远的丘陵中坐落着老妪阶梯，安达尔人视其为圣地，据说智慧可在此寻得。"
 building_agot_crones_steps_01:0 "老妪阶梯"
 building_agot_crones_steps_01_desc:0 "$building_type_agot_crones_steps_01_desc$"
 building_type_agot_maidens_vale_01:0 "罗托尔"
 building_type_agot_maidens_vale_01_desc:0 "安达斯东部有一处近乎原始的山谷，安达尔人相信这里是少女所眷顾的圣地。"
 building_agot_maidens_vale_01:0 "少女山谷"
 building_agot_maidens_vale_01_desc:0 "$building_type_agot_maidens_vale_01_desc$"
 building_type_agot_sharp_point_beacon_01:0 "尖角"
 building_type_agot_sharp_point_beacon_01_desc:0 "尖角城位于马赛岬顶端，毗邻喉道，是巴尔艾蒙家族的居所。"
 building_agot_sharp_point_beacon_01:0 "尖角灯塔"
 building_agot_sharp_point_beacon_01_desc:0 "尖角灯塔是马赛海岸与喉道沿岸最大的灯塔，也是巴尔艾蒙家族的古老居城。它为数百艘航船指引安全航道，众多水手与船长纷纷向尖角领主进献贡礼，只为确保塔顶的烽火常明不熄，让航道始终光亮平安。"
 building_type_agot_old_stone_bridge_01:0 "老石桥客栈"
 building_type_agot_old_stone_bridge_01_desc:0 "老石桥客栈是一家坐落在君临城以北平原上的客栈，位于罗斯比城与暮谷镇之间的道路上。对于所有从首都东北门出发、寻求舒适旅程的人们来说，这里往往是他们旅途中的第一站。"
 building_agot_old_stone_bridge_01:0 "$building_type_agot_old_stone_bridge_01$"
 building_agot_old_stone_bridge_01_desc:0 "$building_type_agot_old_stone_bridge_01_desc$"
 building_type_agot_merryweather_vaults_01:0 "长桌厅"
 building_type_agot_merryweather_vaults_01_desc:0 "长桌厅是玛瑞魏斯家族的居城，以其田野的丰饶多产著称。"
 building_agot_merryweather_vaults_01:0 "玛瑞魏斯粮仓"
 building_agot_merryweather_vaults_01_desc:0 "数百年来，玛瑞魏斯家族一直经营着“玛瑞魏斯粮仓”——由坚固的谷仓、地窖与农庄组成的储粮体系，用于长期储存周边城镇、村庄及城堡收获的粮食。作为河湾地最肥沃的区域，丰收河肩负着为高庭储备军粮的重任，其中囤积的并非黄金，而是足以支撑最漫长战事的小麦与腌肉。"
 building_type_agot_grassfield_florestries_01:0 "绿谷城"
 building_type_agot_grassfield_florestries_01_desc:0 "梅斗家族被视为河湾地最优雅的家族之一，经常赞助河湾地与风暴地的初露头角的园丁花匠。"
 building_agot_grassfield_florestries_01:0 "草原堡花店"
 building_agot_grassfield_florestries_01_desc:0 "草原堡花店的作品——无论是花环、花束与插花作品——从风息堡到凯岩城再到鹰巢城处处可见。尽管常与高庭的匠人一较高下，草原堡的花匠们依然凭借精湛技艺安居乐业；而梅斗家族，自然坐收其利。"
 building_type_agot_honeyholt_apiaries_01:0 "蜂巢城"
 building_type_agot_honeyholt_apiaries_01_desc:0 "蜂巢城是毕斯柏里家族的家堡，以盛产蜂蜜以及当地蜜蜂性情温和著称。"
 building_agot_honeyholt_apiaries_01:0 "维斯特洛的蜂蜜之都"
 building_agot_honeyholt_apiaries_01_desc:0 "由毕斯柏里家族的领主们开启的一项私人爱好，历经岁月沉淀，已发展成为一项成熟的产业。商贾、养蜂人与劳工们终日忙碌于旧镇河湾北侧，酿造出金黄的蜂巢城蜂蜜，将其送往世界各个角落。"
 building_type_agot_sept_at_holyhall_01:0 "圣厅镇"
 building_type_agot_sept_at_holyhall_01_desc:0 "格雷佛德家族的居城圣厅镇，是一座虔信者的堡垒。"
 building_agot_sept_at_holyhall_01:0 "圣厅镇圣堂"
 building_agot_sept_at_holyhall_01_desc:0 "圣厅镇圣堂是七大王国规模最大的私人圣堂之一，坐落于虔敬的格雷佛德家族的祖传领地圣厅镇，数百年来始终服务着圣厅镇的领主、夫人及所有家族成员。"
 building_type_agot_oakenshield_bastion_01:0 "橡盾堡"
 building_type_agot_oakenshield_bastion_01_desc:0 "赫威特家族的古老居城，自「金手」加尔斯时代起便守护着橡盾岛和曼德河。"
 building_agot_oakenshield_bastion_01:0 "曼德河堡垒"
 building_agot_oakenshield_bastion_01_desc:0 "橡盾堡是盾牌列岛上最宏大、最坚固的城堡，是赫威特家族的世袭居城。作为曼德河堡垒，它拥有坚实的土垒工事、可停泊小型海岸舰队的船坞、厚重的石墙及配套攻城器械，是抵御沿海来犯之敌的第一道防线。"
 building_type_agot_old_oak_01:0 "古橡城"
 building_type_agot_old_oak_01_desc:0 "古橡城作为奥克赫特家族的领地，长久以来一直是骑士精神的堡垒。"
 building_agot_old_oak_01:0 "橡木之心"
 building_agot_old_oak_01_desc:0 "古橡城是奥克赫特家族的古老居城，该家族由传奇人物「青手」加尔斯之子「橡木」约翰创建，是河湾地最悠久而有权势的家族之一。"
 building_type_agot_walls_of_seagard_01:0 "$building_type_agot_seagard_01$"
 building_type_agot_walls_of_seagard_01_desc:0 "$building_type_agot_seagard_01_desc$"
 building_agot_walls_of_seagard_01:0 "哈蒙城墙"
 building_agot_walls_of_seagard_01_desc:0 "奉哈蒙·梅利斯特大人命令修建的海疆城城墙，将繁华市镇的外延区域纳入了海疆城城堡的防御体系。在时刻面临狡猾的铁民小股部队渗透威胁的情况下，这道城墙有效遏制了准备不充分的掠夺者的野心。"
 building_type_agot_ruins_of_oldforge_01:0 "古老锻造场"
 building_type_agot_ruins_of_oldforge_01_desc:0 "$building_agot_ruins_of_oldforge_01_desc$"
 building_agot_ruins_of_oldforge_01:0 "古锻造场废墟"
 building_agot_ruins_of_oldforge_01_desc:0 "古锻造场坐落于历史上布莱克伍德‑布雷肯边境冲突的次要地带，曾一度是河间地最大的锻造场。布雷肯家族与布莱克伍德家族间的世仇几乎将其化为废墟，炉火早已熄灭。或许得胜的家族能使其恢复往日荣光。"
 building_agot_ruins_of_oldforge_02:0 "重建的古锻造场"
 building_agot_ruins_of_oldforge_02_desc:0 "炉火重燃，模具补足，铁匠们也经过再培训重振精神，古锻造场由此焕然一新，时刻准备着为它的领主献上河间地人所能锻造的最精良的钢铁。"
 building_agot_ruins_of_oldforge_03:0 "扩建的古锻造场"
 building_agot_ruins_of_oldforge_03_desc:0 "古锻造场的规模已扩张近三倍，铁匠、硝皮匠、皮具匠和细木匠们在此协力劳作。如今它已成为维斯特洛最负盛名的锻造场之一，唯有君临城曲折复杂的钢铁街可与之相比，其统治家族正坐享由此带来的黄金与钢铁的双重收益。"
 building_type_agot_bechester_motherhouse_01:0 "贝彻斯特"
 building_type_agot_bechester_motherhouse_01_desc:0 "贝彻斯特是彭尼家族的居城，虽然饱经战乱，却始终虔诚侍奉信仰。"
 building_agot_bechester_motherhouse_01:0 "河畔修女院"
 building_agot_bechester_motherhouse_01_desc:0 "河间地与河湾地交界处的贝彻斯特修女院，为静默姐妹和七神信仰的虔诚信徒提供庇护。这座修女院为当地平民和往来旅人带来福祉，贝彻斯特的领主按惯例也会在财力允许时予以捐助。"
 building_type_agot_bechester_motherhouse_ruins_01:0 "$building_type_agot_bechester_motherhouse_01$"
 building_type_agot_bechester_motherhouse_ruins_01_desc:0 "$building_agot_bechester_motherhouse_ruins_01_desc$"
 building_agot_bechester_motherhouse_ruins_01:0 "贝彻斯特修女院废墟"
 building_agot_bechester_motherhouse_ruins_01_desc:0 "血龙狂舞期间，巨龙瓦格哈尔焚毁了河间地南部的贝彻斯特修女院，这里曾是静默姐妹的圣地。如今虽仍是当地七神信徒的朝圣地，但废墟本身已成为龙焰恐怖的无言见证，偶尔还会成为匪徒的临时营地。"
 building_agot_bechester_motherhouse_ruins_02:0 "重建的河畔女修院"
 building_agot_bechester_motherhouse_ruins_02_desc:0 "恢复昔日神圣的贝彻斯特女修院，再次为七神的选民提供庇护与安宁，它恒久不灭的光芒正是七神永恒圣辉的明证。"
 building_type_agot_haywater_docks_01:0 "羊皮纸镇"
 building_type_agot_haywater_docks_01_desc:0 "$building_agot_haywater_docks_01_desc$"
 building_agot_haywater_docks_01:0 "海沃特码头"
 building_agot_haywater_docks_01_desc:0 "海沃特码头坐落于其同名河流——海沃特河的河口处。作为庞洛斯家族古老居城皮纸城的水路门户，众多来自塔斯岛、风息堡或自由贸易城邦的船只在此停靠，随后继续向北穿越塔斯海峡，或深入风暴地腹地。"
 building_type_agot_broken_shield_inn_01:0 "破盾酒馆"
 building_type_agot_broken_shield_inn_01_desc:0 "$building_agot_broken_shield_inn_01_desc$"
 building_agot_broken_shield_inn_01:0 "破盾酒馆"
 building_agot_broken_shield_inn_01_desc:0 "破盾酒馆是风暴地最大的客栈之一，也是风怒角最大的酒馆。它以开阔通透的布局闻名，来客纵使畅饮整晚，也未必能在每张酒桌前落座。"
 building_type_agot_waxley_candlery_01:0 "烛穴"
 building_type_agot_waxley_candlery_01_desc:0 "魏克利家族创立并资助的魏克利烛坊，是烛穴城最大的行会。在这里，技艺精湛的烛匠将蜂蜡与香精精心调配，制作出他们远近闻名的香薰蜡烛。"
 building_agot_waxley_candlery_01:0 "魏克利烛坊"
 building_agot_waxley_candlery_01_desc:0 "$building_type_agot_waxley_candlery_01_desc$"
 building_type_agot_sunrise_keep_01:0 "日出堡"
 building_type_agot_sunrise_keep_01_desc:0 "建于明月山脉斜坡与咬人湾海岸交汇处的宏伟日出堡，控制着通往艾林谷的次要通道——伤痕岸。"
 building_agot_sunrise_keep_01:0 "$building_type_agot_sunrise_keep_01$"
 building_agot_sunrise_keep_01_desc:0 "$building_type_agot_sunrise_keep_01_desc$"
 building_type_agot_olafs_tomato_farm_01:0 "纹矛城"
 building_type_agot_olafs_tomato_farm_01_desc:0 "位于艾林谷的一座小城堡。"
 building_agot_olafs_tomato_farm_01:0 "奥拉夫的番茄农场"
 building_agot_olafs_tomato_farm_01_desc:0 "在艾林谷中，有一处古老的番茄农场。它远非谷地最大的农场，产量却比那些规模两倍于它的农场还要高。传说其创始人奥拉夫献出了自己的灵魂，因此那里生长的番茄格外硕大且营养丰富。"
 building_type_agot_miviyaan_slave_market_01:0 "米维亚安"
 building_type_agot_miviyaan_slave_market_01_desc:0 "米维亚安奴隶市场作为踵地主要的奴隶市场，带来了许多在争议之地冲突中被俘的哈塔拉尔奴隶。"
 building_agot_miviyaan_slave_market_01:0 "米维亚安奴隶市场"
 building_agot_miviyaan_slave_market_01_desc:0 "$building_type_agot_miviyaan_slave_market_01_desc$"
 building_type_agot_ormyan_palace_01:0 "奥尔米杨"
 building_type_agot_ormyan_palace_01_desc:0 "奥尔米杨是争议之地的权力中心。"
 building_agot_ormyan_palace_01:0 "哈塔拉尔宫"
 building_agot_ormyan_palace_01_desc:0 "随着争议之地在哈塔拉尔的旗帜下归于一统，踵地终于有望迎来和平。为庆贺这一盛事，这座象征统一与权威的宏伟宫殿拔地而起。"
 building_type_agot_qeldlen_fort_01:0 "凯尔德伦"
 building_type_agot_qeldlen_fort_01_desc:0 "哈拉克要塞建于三城同盟会瓦解后的纷争时期，目的是保护巴赞恩家族及里斯的领地，以抵御泰洛西、密尔与哈塔拉尔叛军的侵扰。"
 building_agot_qeldlen_fort_01:0 "哈拉克要塞"
 building_agot_qeldlen_fort_01_desc:0 "$building_type_agot_qeldlen_fort_01_desc$"
 building_type_agot_hartalari_makseon_01:0 "玛克希昂"
 building_type_agot_hartalari_makseon_01_desc:0 "玛克希昂是里斯人在大陆的主要港口。该港牢牢掌控在里斯手中，人们认为其更接近于里斯，而非厄斯索斯大陆的其他地区。"
 building_agot_hartalari_makseon_01:0 "哈塔拉尔城墙"
 building_agot_hartalari_makseon_01_desc:0 "哈塔拉尔人已将里斯人逐出踵地海岸，并夺取了玛克希昂。这座权力中心筑有坚固城墙，作为哈塔拉尔人抵御外敌的堡垒巍然屹立。"
 building_type_agot_taelas_gap_01:0 "泰拉斯"
 building_type_agot_taelas_gap_01_desc:0 "泰拉斯隘口是连接密尔与洛恩河的主要通道，自古以来就是密尔东部的边界。这里虽然战略地位至关重要，但受命驻守此地的将领们却远离城市的财富与权势，无缘享受枢机会核心圈成员所拥有的特权。"
 building_agot_taelas_gap_01:0 "泰拉斯隘口"
 building_agot_taelas_gap_01_desc:0 "$building_type_agot_taelas_gap_01_desc$"
 building_type_agot_naeros_irrigation_01:0 "纳罗斯"
 building_type_agot_naeros_irrigation_01_desc:0 "密尔以北的河流两岸，肥沃的农田与田野绵延不绝；得益于灌溉得当，这片土地愈发富饶高产。"
 building_agot_naeros_irrigation_01:0 "纳罗斯灌溉设施"
 building_agot_naeros_irrigation_01_desc:0 "$building_type_agot_naeros_irrigation_01_desc$"
 building_type_agot_ar_kon_barracks_01:0 "阿尔孔"
 building_type_agot_ar_kon_barracks_01_desc:0 "作为诺特罗斯的主要中心之一，阿尔孔坐落于科尼安山脉的顶端，以其弓箭手闻名。"
 building_agot_ar_kon_barracks_01:0 "阿尔军营"
 building_agot_ar_kon_barracks_01_desc:0 "阿尔孔的弓箭手闻名于所有自由贸易城邦。众所周知，那些留在本土的弓箭手尤为强悍致命。"
 building_type_agot_rodriks_gift_01:0 "莫尔蒙堡"
 building_type_agot_rodriks_gift_01_desc:0 "莫尔蒙家族的古老居城，自罗德利克·史塔克国王统治时期起，他们就一直统治着熊岛。"
 building_agot_rodriks_gift_01:0 "罗德利克的礼物"
 building_agot_rodriks_gift_01_desc:0 "莫尔蒙堡以及整个熊岛都是罗德里克·史塔克国王赐予莫尔蒙家族的。他通过一场摔跤比赛从铁民手中夺回熊岛，自那以后，熊岛的男女便一直守护着他们的家园。"
 building_type_agot_ravos_base_01:0 "铁牙堡"
 building_type_agot_ravos_base_01_desc:0 "铁民在熊岛的据点。"
 building_agot_ravos_base_01:0 "拉瓦斯的据点"
 building_agot_ravos_base_01_desc:0 "铁种对熊岛的统治曾由此开始。拉佛斯·霍尔的古老据点已得到重建，海豹湾成了劫掠的绝佳之地。"
 building_type_agot_stone_hedge_01:0 "石篱城"
 building_type_agot_stone_hedge_01_desc:0 "布雷肯家族古老的居所，他们自称为曾经的河流王。他们与布莱伍德家族之间的世仇臭名昭著，尤其在布雷肯家族皈依并崇拜七位一体真神之后。"
 building_agot_stone_hedge_01:0 "$building_type_agot_stone_hedge_01$"
 building_agot_stone_hedge_01_desc:0 "$building_type_agot_stone_hedge_01_desc$"
 building_type_agot_last_hearth_01:0 "最后壁炉城"
 building_type_agot_last_hearth_01_desc:0 "安柏家族的古老居所，最后壁炉城名符其实。它位于从临冬城通往赠地与守夜人军团的道路上，是沿途最后一座重要城堡。"
 building_agot_last_hearth_01:0 "$building_type_agot_last_hearth_01$"
 building_agot_last_hearth_01_desc:0 "$building_type_agot_last_hearth_01_desc$"
 building_agot_whispers_02:0 "重建的轻语堡"
 building_agot_whispers_02_desc:0 "克莱伦斯·克莱勃爵士的古老城堡如今已重现荣光。亡者的低语依旧可闻，林立的长矛仍旧锋锐，静候着未来的装点。"
 building_agot_red_lake_02:0 "血堡"
 building_agot_red_lake_02_desc:0 "扩建后的血堡坐落在红湖畔。它建造得坚固而令人生畏，安放着曾遍布湖岸的远古巨人的尸骸。"
 building_agot_upcliffs_haven_02:0 "美人鱼新娘的城堡"
 building_agot_upcliffs_haven_02_desc:0 "厄利夫港已经被建造成一座坚固的堡垒，足以配得上人鱼王的新娘——厄利夫家族的先祖娥苏拉。她守护自己的岛屿不仅靠剑与盾，还凭借她丈夫的波涛与激流。"
 building_agot_hoare_castle_02:0 "重建的黑血堡"
 building_agot_hoare_castle_02_desc:0 "霍尔堡经过重建，重现往日辉煌，再度成为大威克岛的堡垒，也是铁群岛的主要据点之一。"
 building_casterly_rock_02:0 "凯洛斯的馈赠"
 building_casterly_rock_02_desc:0 "据说，凯岩城的庞大财富是诸神的恩赐，当年凯斯德之子凯洛斯杀死了一头母狮，却饶恕了她的幼崽。诸神为了嘉奖他的仁慈，赐予凯斯德利家族难以计数的财富。"
 building_casterly_rock_03:0 "兰恩的诡计"
 building_casterly_rock_03_desc:0 "应该指出的是，凯岩城最早并非兰尼斯特家族的家堡，而是属于凯斯德利家族。据传说，「机灵的」兰恩要么杀光了凯斯特利家族的所有男性，要么让这个家族的所有女儿都怀上了他的孩子，从而夺取了这座城堡。"
 building_casterly_rock_04:0 "黄金长廊"
 building_casterly_rock_04_desc:0 "兰尼斯特家族是财富、繁荣与黄金的代名词，黄金长廊的建造便是明证。这座宏伟的走廊不仅陈列着家族的奇珍异宝，连墙壁本身都因岩层中镶嵌的未开采金矿而闪烁着光芒。"
 building_storms_end_02:0 "海与风之愁"
 building_storms_end_02_desc:0 "当海神与风之女神的女儿依妮舍弃神性，下嫁给凡人杜伦时，祂们震怒之下摧毁了杜伦建造的大厅，杀死了所有赴宴之人——只有依妮与受她保护的杜伦幸免于难，由此开启了杜伦与众神之间的战争。"
 building_storms_end_03:0 "隐秘洞穴"
 building_storms_end_03_desc:0 "风息堡由于风暴肆虐，并没有可供船只停泊的港口。但在杜伦角的白色峭壁之中，隐藏着一个由隧道连接的洞穴，足以容纳一艘小船。"
 building_storms_end_04:0 "庄严之树"
 building_storms_end_04_desc:0 "和维斯特洛所有宏伟家堡一样，风息堡也有一座神木林，林中有一棵鱼梁木。这并不奇怪，因为安达尔人从未征服过这座城堡，而是通过联姻入主其中。"
 building_storms_end_05:0 "风之拳"
 building_storms_end_05_desc:0 "风息堡唯一的塔楼就是其中央主堡，高耸于幕墙之上，据说形似一只从城堡中拔地而起的巨大拳头。这“拳头”是如此巨大，不仅用作城堡主楼，还兼作大厅、兵营和马厩。"
 building_storms_end_06:0 "完美幕墙"
 building_storms_end_06_desc:0 "风息堡的巨大幕墙与众不同，其石料契合得如此完美，让人感觉不到一块石头在哪里结束、另一块又在哪里开始。传说这是森林之子或「筑城者」布兰登建造的，且在石墙中嵌入了咒语——这当然是比喻的说法，不过当你亲眼目睹这道外墙时，或许会对此产生怀疑。"
 building_storms_end_07:0 "杜伦的抗争"
 building_storms_end_07_desc:0 "据传说，屹立至今的风息堡已是「神见愁」杜伦在与海神和风之女神的战争中建造的第七座城堡。据说森林之子或「筑城者」布兰登曾参与建造这最后一座城堡；无论如何，自杜伦时代以来，这座城堡经受住了无数次风暴与进攻的考验。"
 agot_pirate_ship_main_01_domicile_building:0 "改装桨帆船"
 agot_pirate_ship_main_01_domicile_building_desc:0 "这艘桨帆船已被改装成一艘战舰，加固了船首并增加了桨位。"
 agot_pirate_ship_main_02_domicile_building:0 "大桨帆船"
 agot_pirate_ship_main_02_domicile_building_desc:0 "一艘拥有多层甲板的大桨帆船；这艘船能追上海上任何一艘商船。"
 agot_pirate_ship_main_03_domicile_building:0 "战斗桨帆船"
 agot_pirate_ship_main_03_domicile_building_desc:0 "这艘桨帆船是专为作战而设计的，不仅能袭击商船，也能攻击敌方的战舰。"
 agot_pirate_ship_main_04_domicile_building:0 "快速大帆船"
 agot_pirate_ship_main_04_domicile_building_desc:0 "这是一艘快速大帆船，一种先进的桨帆船——比旧式船更快、更大、更强。"
 agot_pirate_ship_main_05_domicile_building:0 "战斗快速大帆船"
 agot_pirate_ship_main_05_domicile_building_desc:0 "这艘快速大帆船是为战争而设计的，足以威胁海上的任何船只。"
 agot_pirate_ship_main_06_domicile_building:0 "海洋之锤"
 agot_pirate_ship_main_06_domicile_building_desc:0 "作为海上的最大威胁，这艘船能让任何闻到海盐气息的人心惊胆寒。"
 agot_captains_quarters_01_domicile_building:0 "小型船长室"
 agot_captains_quarters_01_domicile_building_desc:0 "船长室是船长的私人休息场所，他们可以在这里与军官咨询事务、指导他们的工作，并用战利品给宾客留下深刻印象。。"
