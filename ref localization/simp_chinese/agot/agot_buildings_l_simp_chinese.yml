 building_hyperborean_trade_post_01:0 "补给前哨站"
 building_hyperborean_trade_post_01_desc:0 "军需官和补给车队从这个前哨站出发，为开拓者提供必需的商品和物资。在塞外的严酷土地上，这样的支持让艰难维生的[colony|E]得以存续。"
 building_type_hyperborean_trade_post_01:0 "补给前哨站"
 building_type_hyperborean_trade_post_01_desc:0 "军需官和补给车队从这个前哨站出发，为开拓者提供必需的商品和物资。在塞外的严酷土地上，这样的支持让艰难维生的[colony|E]得以存续。"
 building_type_agot_sept_of_remembrance_01:0 "思怀圣堂"
 building_type_agot_sept_of_remembrance_01_desc:0 "在深爱的王后逝世后，征服者在雷妮丝丘陵上建起了思怀圣堂。它一度是君临城的信仰中心兼教团武装的总部。"
 building_agot_sept_of_remembrance_01:0 "$building_type_agot_sept_of_remembrance_01$"
 building_agot_sept_of_remembrance_01_desc:0 "$building_type_agot_sept_of_remembrance_01_desc$"
 building_dragonpit_03:0 "$building_type_dragonpit_01$"
 building_dragonpit_03_desc:0 "$building_type_dragonpit_01_desc$"
 building_highgarden_02:0 "孟恩幕墙"
 building_highgarden_02_desc:0 "这道幕墙奉孟恩二世的命令在安达尔入侵期间修建，目的是更好地保卫园丁家族，如今已成为城堡三道城墙中最内层的一道。"
 building_highgarden_03:0 "九世圣堂"
 building_highgarden_03_desc:0 "这座圣堂奉加尔斯九世之名建造，据说其辉煌壮丽仅逊于总主教所在的旧镇繁星圣堂。白色墙壁上嵌有描绘七神和「青手」加尔斯的彩色玻璃窗。"
 building_highgarden_04:0 "荆棘迷宫"
 building_highgarden_04_desc:0 "高庭外墙与中墙之间有一片荆棘迷宫，既可供廷臣与宾客娱乐，也可作为减缓入侵者攻势的防御措施。"
 building_highgarden_05:0 "宫殿要塞"
 building_highgarden_05_desc:0 "$building_type_highgarden_01_desc$"
 building_agot_fairmarket_02:0 "蓝叉河大桥"
 building_agot_fairmarket_02_desc:0 "Fairmarket has long had a bridge across the Blue Fork, but the city's recent lords have seen fit to erect a far grander work, the like of which is said to rival any found within the realm."
 building_type_agot_golden_tooth_01:0 "金牙城"
 building_type_agot_golden_tooth_01_desc:0 "莱佛德家族的古老居城。"
 building_agot_golden_tooth_01:0 "金冠塔"
 building_agot_golden_tooth_01_desc:0 "Standing tall above the ancestral castle of House Lefford, the Tower of the Gold Crown rises high on Mount Lefford. From this vantage point, the Lords of the Tooth can watch for approaching enemies or descend into the mountain's gold mines."
 building_type_agot_silverhill_01:0 "银丘"
 building_type_agot_silverhill_01_desc:0 "沙略特家族的古老居城。"
 building_agot_silverhill_01:0 "银厅"
 building_agot_silverhill_01_desc:0 "坐落于西境最大银矿上方的沙略特家族居城，建起了一座被世人称为「银厅」的华美大厅，其璀璨光辉令让目睹者无不赞叹。"
 building_type_agot_ironrath_01:0 "铁壁堡"
 building_type_agot_ironrath_01_desc:0 "森林家族的古老居城。"
 building_agot_ironrath_01:0 "铁壁堡的宏伟铁树林"
 building_agot_ironrath_01_desc:0 "铁壁堡是森林家族世代相传的居城，拥有狼林中最大的一片铁树林。历代的城主都对这片林地精心养护，从不滥砍滥伐，正是这种远见确保了铁树林的生生不息。"
 building_type_agot_highpoint_01:0 "至高堡"
 building_type_agot_highpoint_01_desc:0 "白丘家族的古老居城。"
 building_agot_highpoint_01:0 "至高堡的枯竭铁树林"
 building_agot_highpoint_01_desc:0 "至高堡曾和狼林中的许多城堡一样，拥有一片繁茂的铁木林。然而，作为至高堡传统领主的白丘家族为求财富，将其中大部分砍伐殆尽，并接受了更多南方的习俗。这种过度采伐迫使他们不得不觊觎其他家族的储备。"
 building_type_agot_yronwood_01:0 "伊伦伍德城"
 building_type_agot_yronwood_01_desc:0 "是先有城堡，还是先有宅邸，已经无从知晓，但这座古老居城，长久以来一直属于多恩最显赫的家族之一。"
 building_agot_yronwood_01:0 "血之贵胄的居城"
 building_agot_yronwood_01_desc:0 "伊伦伍德城是伊伦伍德家族世代相传的居城，自古以来就是多恩领的重要堡垒。这座城堡扼守着石路，并坐拥维斯特洛最大的银矿之一，其建造规格彰显着无与伦比的地位。伊伦伍德城城墙坚固，城门更是坚不可摧，是声名显赫的血之贵胄的居城。"
 iron_islands_poor_soil:0 "[GetGeographicalRegion('world_westeros_the_iron_islands').GetName]的土壤过于贫瘠，无法进一步开发"
 building_type_agot_the_ring_01:0 "The Ring"
 building_type_agot_the_ring_01_desc:0 "The ancestral seat of House Roxton."
 building_agot_the_ring_01:0 "$building_type_agot_the_ring_01$"
 building_agot_the_ring_01_desc:0 "While the Ring has long been the ancestral seat of House Roxton, its origins date back far beyond recorded history — before the records of the Citadel or even the tales of the First Men. Its walls, which give the castle its name, form a strong ring of stone, devoid of towers yet deadly to many who have sought to take it."
 building_type_agot_dunnsbridge_01:0 "Pinkshield"
 building_type_agot_dunnsbridge_01_desc:0 "The ancestral seat of House Dunn."
 building_agot_dunnsbridge_01:0 "The Dunnsbridge"
 building_agot_dunnsbridge_01_desc:0 "Originally built by House Dunn, the Dunnsbridge lies near the castle of Pinkshield, granting its lords control over the river and the trade flowing from the hills of the Red Mountains to the port of Cuy."
 building_type_agot_pennytree_01:0 "铜分树村"
 building_type_agot_pennytree_01_desc:0 "One of the many towns caught between the Blackwoods and Brackens, Pennytree lies between the Teats."
 building_agot_pennytree_01:0 "铜分树"
 building_agot_pennytree_01_desc:0 "Within the village stands an ancient oak with hundreds of old copper pennies nailed to its trunk. It is believed that when the sons of the village are called to war, they nail a penny to the tree. When they return, they take it down, with those still nailed honoring the men who never returned."