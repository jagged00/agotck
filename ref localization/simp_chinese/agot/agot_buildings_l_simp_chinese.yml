 building_type_agot_ashemark_01:0 "烙印城"
 building_type_agot_ashemark_01_desc:0 "马尔布兰家族的古老居城。"
 building_agot_ashemark_01:0 "燃树军营"
 building_agot_ashemark_01_desc:0 "马尔布兰家族以其游击战术闻名西境，他们以此训练烙印城及其周边地区的士兵，久而久之，让城堡里的贵族和平民都引以为傲。"
 building_type_agot_blackpool_01:0 "黑池"
 building_type_agot_blackpool_01_desc:0 "史拉特家族的古老居城。"
 building_agot_blackpool_01:0 "黑池"
 building_agot_blackpool_01_desc:0 "黑池是一座因水深而呈黑色的巨大湖泊，史拉特家族的古老居城正是因其得名。湖中鱼类繁多，周边地区的野生动物也常来此饮水，为城堡内的贵族提供了充足的鱼肉。"
 building_type_agot_torrhens_square_01:0 "托伦方城"
 building_type_agot_torrhens_square_01_desc:0 "托伦方城是陶哈家族的传统居城，其历代领主以英勇效忠著称，常常奋不顾身冲锋陷阵。"
 building_agot_torrhens_square_01:0 "$building_type_agot_torrhens_square_01$"
 building_agot_torrhens_square_01_desc:0 "$building_type_agot_torrhens_square_01_desc$"
 building_type_agot_deepwood_motte_01:0 "深林堡"
 building_type_agot_deepwood_motte_01_desc:0 "作为葛洛佛家族的古老居城，深林堡世世代代守卫着狼林。这里的领主们最擅长应对各种袭击者，尤其是从日落之海来袭的铁民，他们在狼林中作战的经验无比丰富。"
 building_agot_deepwood_motte_01:0 "$building_type_agot_deepwood_motte_01$"
 building_agot_deepwood_motte_01_desc:0 "$building_type_agot_deepwood_motte_01_desc$"
 building_type_agot_hornwood_01:0 "角林"
 building_type_agot_hornwood_01_desc:0 "这片广阔的森林不仅赋予了城堡名字，霍伍德家族也因其得名。这里以绝佳的狩猎条件闻名整个北境，林中遍布高大的驼鹿，对任何猎手来说都值得挑战。"
 building_agot_hornwood_01:0 "$building_type_agot_hornwood_01$"
 building_agot_hornwood_01_desc:0 "$building_type_agot_hornwood_01_desc$"
 building_type_agot_ramsgate_01:0 "公羊门"
 building_type_agot_ramsgate_01_desc:0 "公羊门是渥尔菲家族的古老居城，坐落在断枝河的河口，保护其免受狭海对岸及更远地区的劫掠者、海盗和奴隶贩子的侵扰。"
 building_agot_ramsgate_01:0 "$building_type_agot_ramsgate_01$"
 building_agot_ramsgate_01_desc:0 "$building_type_agot_ramsgate_01_desc$"
 building_type_agot_oldcastle_01:0 "老城"
 building_type_agot_oldcastle_01_desc:0 "洛克家族的老城在狼穴建立之前，一直是守护白刃河的首要堡垒。时至今日，这座城堡虽然常被白港盖过风头，但依然固若金汤，是抵御来自咬人湾的入侵者的第一道屏障。"
