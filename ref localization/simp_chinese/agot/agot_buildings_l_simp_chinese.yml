 building_type_nunns_deep_mines_01_desc:0 "西境矿山产出的黄金数量惊人。"
 building_nunns_deep_mines_01:0 "努恩堡采矿点"
 building_nunns_deep_mines_01_desc:0 "$building_castamere_mines_01_desc$"
 building_nunns_deep_mines_02:0 "努恩堡矿井"
