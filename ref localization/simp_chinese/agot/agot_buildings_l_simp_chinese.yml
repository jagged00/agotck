 building_mines_of_the_tooth_03:0 "金牙城大型矿井"
 building_mines_of_the_tooth_03_desc:0 "$building_castamere_mines_03_desc$"
 building_mines_of_the_tooth_04:0 "金牙城矿业综合体"
 building_mines_of_the_tooth_04_desc:0 "$building_castamere_mines_04_desc$"
 building_type_pendric_hills_mines_01:0 "彭德瑞丘陵矿山"
 building_type_pendric_hills_mines_01_desc:0 "西境矿山产出的黄金数量惊人。"
 building_pendric_hills_mines_01:0 "彭德瑞丘陵采矿点"
