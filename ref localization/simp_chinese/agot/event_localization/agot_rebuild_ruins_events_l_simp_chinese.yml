l_simp_chinese:
 ruin_sigil_ring:0 "废墟符印指环"
 ruin_sigil_ring_desc:0 "在重建废弃城堡时发现的符印指环。虽然印记随着时间的流逝而褪色，但毫无疑问，它属于曾经统治过这些废墟的倒霉家族。"
 ruin_sword:0 "废墟钢剑"
 ruin_sword_desc:0 "用在重建废弃城堡时发现的钢锭所制成的剑。"
 ruin_mace:0 "废墟钢锤"
 ruin_mace_desc:0 "用在重建废弃城堡时发现的钢锭所制成的钉锤。"
 ruin_spear:0 "废墟钢矛"
 ruin_spear_desc:0 "用在重建废弃城堡时发现的钢锭所制成的长毛。"
 ruin_axe:0 "废墟钢斧"
 ruin_axe_desc:0 "用在重建废弃城堡时发现的钢锭所制成的斧子。"
 ruin_dagger:0 "废墟钢匕"
 ruin_dagger_desc:0 "用在重建废弃城堡时发现的钢锭所制成的匕首。"
 agot_rebuilding_ruins.0016.t:0 "以身作则"
 agot_rebuilding_ruins.0016.desc:0 "废墟重建工作对体力与心力都是极大的考验。尽管我身居高位，但我仍亲自投身重建的体力劳动之中，与我的廷臣一起工作。今天，我注意到我的廷臣们似乎因为我与他们一起工作而对我愈发抱有敬意。"
 agot_rebuilding_ruins.0016.a:0 "人多力量大！"
 agot_rebuilding_ruins.0017.t:0 "好奇的访客"
 agot_rebuilding_ruins.0017.desc:0 "关于我努力使旧废墟恢复昔日辉煌的消息已经传开。今天，一位好奇的领主来拜访我，他希望参观重建工作。"
 agot_rebuilding_ruins.0017.a:0 "就用遗迹的军事历史和优势来娱乐他们吧！"
 agot_rebuilding_ruins.0017.a.tt:0 "你运用你的军事知识。"
 agot_rebuilding_ruins.0017.b:0 "我会解释我的努力和节省成本的措施！"
 agot_rebuilding_ruins.0017.b.tt:0 "你运用你的管理知识"
 agot_rebuilding_ruins.0017.c:0 "我的魅力就足够了。"
 agot_rebuilding_ruins.0017.c.tt:0 "你运用你的外交知识"
 agot_rebuilding_ruins.0017.win.title:0 "你留下了一个好印象"
 agot_rebuilding_ruins.0017.lose.title:0 "你没能留下一个好印象"
 agot_rebuilding_ruins.0018.t:0 "废墟之花"
 agot_rebuilding_ruins.0018.desc:0 "这处废墟曾经是某个贵族家族的居城，如今成了当地平民参观和休息的地方。虽然我们的重建工作同当地人产生了一些不和，但当地的一位女孩一直是我们之间沟通的桥梁。凭借音乐天赋，她赢得了在我的废墟上工作的廷臣和骑士们的支持。今天，她拿起某位工人的竖琴开始弹奏，所有人都停下来听她的音乐。"
 agot_rebuilding_ruins.0018.a:0 "我想我们今天停下建筑工作，好好休息一下！"
 agot_rebuilding_ruins.0018.a.tt:0 "不妨享受音乐并休息一下。"
 agot_rebuilding_ruins.0018.b:0 "这样的人才，在我的宫廷里是会受到欢迎的！"
 agot_rebuilding_ruins.0018.b.tt:0 "你授予她一个在你宫廷的职位！"
 agot_rebuilding_ruins.0001.t:0 "卖炭人"
 agot_rebuilding_ruins.0001.desc:0 "曾经是大领主的家园，现在只剩下腐烂的废墟和杂草丛生的树林。\n\n当我们开始重建工作时，我们注意到一些赤贫的卖炭人——我们之前忽视了该地区的平民百姓。但现在，我们发现一些重建工作不断中断。设备经常损坏或丢失。粮食在夜里被偷走。\n\n我手下的一个人声称卖炭人应对此负责，称他们害怕失去赖以谋生的林地。"
 agot_rebuilding_ruins.0001.a:0 "他们要是做土匪，我也会那样对待他们！"
 agot_rebuilding_ruins.0001.a.tt:0 "你对卖炭人降下你的怒火。"
 agot_rebuilding_ruins.0001.b:0 "我会和他们谈谈，让他们知道我们不是威胁。"
 agot_rebuilding_ruins.0001.b.tt:0 "也许外交可以为你争取到他们的心——或者，如果失败的话，对他们失去的森林进行公平的补偿。"
 agot_rebuilding_ruins.0001.win.title:0 "与当地人达成和解。"
 agot_rebuilding_ruins.0001.lose.title:0 "支付给卖炭人补偿金。"
 agot_rebuilding_ruins.0001.c:0 "也许给他们一份礼物会增加对我们的好感。"
 agot_rebuilding_ruins.0001.c.tt:0 "你向卖炭人提供黄金以补偿森林收入的损失。"
 agot_rebuilding_ruins.0002.t:0 "家禽强盗"
 agot_rebuilding_ruins.0002.desc:0 "我的人早上大部分时间都在搜寻废墟，#N 找一只公鸡？#!\n\n有些人声称在某一夜听到了公鸡的叫声，听起来就好像它就在他们脚下一样。为了找到他们说法的证据，他们开始寻找这只家禽。\n\n令他们大吃一惊的是，我的手下发现了那只与世隔绝的公鸡——还有几个#bold 人 #!在一个隐藏的地窖里。看来一群强盗一直在利用废墟作为行动基地，我们的到来迫使他们躲了起来。"
 agot_rebuilding_ruins.0002.a:0 "逮捕他们！"
 agot_rebuilding_ruins.0002.a.tt:0 "他们显然是不法之徒，正义必须得到伸张。"
 agot_rebuilding_ruins.0002.b:0 "杀了他们，拿走战利品……"
 agot_rebuilding_ruins.0002.b.tt:0 "你将把这些不法之徒绳之以法，他们的赃物将作为奖赏。"
 agot_rebuilding_ruins.0002.c:0 "也许他们有兴趣为我工作？"
 agot_rebuilding_ruins.0002.c.tt:0 "显然，不法之徒知道如何使用武器； 希望他们也能对你有用。"
 agot_rebuilding_ruins.0003.t:0 "埋藏的宝藏"
 agot_rebuilding_ruins.0003.desc:0 "我的一些工人在清理塌陷房间的碎片时有了一个可喜的发现——#bold 地板下有一袋黄金！#!\n\n曾拥有这些硬币的人，如今已经不在人世了……拿走它们是我的权利。"
 agot_rebuilding_ruins.0003.a:0 "幸运的发现！"
 agot_rebuilding_ruins.0003.a.tt:0 "命运对你微笑。"
 agot_rebuilding_ruins.0004.t:0 "强盗袭击"
 agot_rebuilding_ruins.0004.desc:0 "#bold 那些狗娘养的一直等到狼时才来突袭！#!一大群土匪埋伏在废墟附近的茂密树林中。\n\n无论是出于傲慢、绝望还是愚蠢，这些训练有素的恶棍相信他们可以击败我的手下。我必须迅速决定是接管指挥还是亲自参战。"
 agot_rebuilding_ruins.0004.a:0 "我会命令我的人去击退他们！"
 agot_rebuilding_ruins.0004.a.tt:0 "运用你的军事知识，你将带领你的人对抗强盗。"
 agot_rebuilding_ruins.0004.a.win.title:0 "战斗胜利！"
 agot_rebuilding_ruins.0004.a.lose.title:0 "战斗失败……"
 agot_rebuilding_ruins.0004.b:0 "我要加入战局！"
 agot_rebuilding_ruins.0004.b.tt:0 "你的勇武将带你去战斗，在战斗中直面强盗的首领。"
 agot_rebuilding_ruins.0004.b.win.title:0 "战斗胜利！"
 agot_rebuilding_ruins.0004.b.lose.title:0 "战斗失败……"
 agot_rebuilding_ruins.0004.c:0 "我们输了，最好撤退……"
 agot_rebuilding_ruins.0004.c.tt:0 "你可不是平民；最好逃跑，并活下去。"
 agot_rebuilding_ruins.0005.t:0 "鬼故事"
 agot_rebuilding_ruins.0005.desc:0 "自从在废墟上开始重建，我的骑士[agot_ghost_story_knight.GetTitledFirstName]就开始转述那些平民百姓的关于废墟的故事。在每个角落，我都能听到手下的窃窃私语……\n\n#italic 令人毛骨悚然的尖叫……#!\n\n#italic 疯狂的胆小鬼……#!\n\n#italic 无人生还……#!\n\n不幸的是，这些曾经拥有废墟的不幸家族的故事正在我的宫廷中流传。"
 agot_rebuilding_ruins.0005.a:0 "通过在这些废墟过夜，我会让它安息。"
 agot_rebuilding_ruins.0005.a.tt:0 "你将结束这些故事，你将证明自己的勇气！"
 agot_rebuilding_ruins.0005.b:0 "哈！让傻子继续说吧。"
 agot_rebuilding_ruins.0005.b.tt:0 "他们在大厅里窃窃私语的东西与你有什么关系？"
 agot_rebuilding_ruins.0005.c:0 "我要让[agot_ghost_story_knight.GetFirstNameNoTooltip]恐惧……"
 agot_rebuilding_ruins.0005.c.tt:0 "你会和你的骑士谈谈，指出这样的故事让[agot_ghost_story_knight.GetHerHim]显得多么的懦弱。"
 agot_rebuilding_ruins.0005.c.win.title:0 "你似乎造成了影响！"
 agot_rebuilding_ruins.0005.c.lose.title:0 "你让[agot_ghost_story_knight.GetHerHim]更害怕……"
 agot_rebuilding_ruins.0006.t:0 "鬼故事：宁静的夜晚"
 agot_rebuilding_ruins.0006.desc:0 "在废墟中过夜，比想象中的还要惬意。尽管有这些故事，我还是能睡个好觉！\n\n天亮时，清晨的空气将我惊醒，神清气爽。我和我的手下注意到树林边缘有大量的鹿，想到我宫廷里的那些人为我担心，我发出由衷的笑声。"
 agot_rebuilding_ruins.0006.a:0 "这样那些故事就该消停了。"
 agot_rebuilding_ruins.0007.t:0 "鬼故事：可怕的夜晚"
 agot_rebuilding_ruins.0007.desc:0 "#bold 诅咒这些废墟……#!#italic 尽管他们可能已经被诅咒了……#!\n\n我度过了一个可怕的夜晚！在我试图入睡的整个过程中，噩梦一直困扰着我，当一场暴风雨呼啸彻夜时，天气似乎也加入了这场折磨。\n\n天亮时，那些曾经嘲笑鬼故事的男人们，现在也睡眼惺忪地复述着。"
 agot_rebuilding_ruins.0007.a:0 "该死的故事……该死的废墟……"
 agot_rebuilding_ruins.0008.t:0 "鬼故事：死者的幻觉"
 agot_rebuilding_ruins.0008.desc:0 "#bold 诅咒这些废墟……#!#italic 尽管他们可能已经被诅咒了……#!\n\n我的梦里充斥着可怕的噩梦，在这些噩梦中，我经历了曾经统治这些废墟的命运多舛的家族的最后时刻。一连串令人毛骨悚然的尖叫声，疯狂的懦夫试图逃跑。而我，在[ROOT.Char.GetFaith.DeathDeityName]降临的时候被困在人群中； 没有人活着……\n\n这些噩梦在黎明前把我惊醒，我在月光下的废墟中徘徊，希望能缓解我的烦恼，当我看到它时——在月光下闪闪发光的是一个#bold 老符印指环#!，正躺在地板上。"
 agot_rebuilding_ruins.0008.a:0 "命运多舛的家族的遗物。"
 agot_rebuilding_ruins.0009.t:0 "铁匠宝箱"
 agot_rebuilding_ruins.0009.desc:0 "这座城堡废墟的许多谜团都隐藏在长满苔藓的灌木丛中，这些灌木丛侵入了古老建筑的遗迹。\n\n在清理废墟中的碎片时，我的一个手下发现了一堆钢锭，那里曾经是城堡的铁匠铺。尽管过去了许多年，钢材的状况还非常好。"
 agot_rebuilding_ruins.0009.a:0 "这能给我换些钱来。"
 agot_rebuilding_ruins.0009.a.tt:0 "你卖掉了钢锭。"
 agot_rebuilding_ruins.0009.b:0 "也许我的铁匠可以用它创造一些东西……"
 agot_rebuilding_ruins.0009.b.tt:0 "你的铁匠会尝试用废墟的钢锭为你锻造一把武器。"
 agot_rebuilding_ruins.0009.sword.title:0 "定制长剑"
 agot_rebuilding_ruins.0009.mace.title:0 "定制钉锤"
 agot_rebuilding_ruins.0009.axe.title:0 "定制斧子"
 agot_rebuilding_ruins.0009.spear.title:0 "定制长矛"
 agot_rebuilding_ruins.0009.dagger.title:0 "定制匕首"
 agot_rebuilding_ruins.0010.t:0 "当机立断"
 agot_rebuilding_ruins.0010.desc:0 "重建这样的废墟绝非易事。必须修复多年的侵蚀，还有恢复曾经引以为豪的砖石结构。\n\n今天，当我的一些手下正在将一托盘砖块吊到废弃城堡的较高位置时，我注意到其中一根绳子开始磨损。我看到[agot_rebuilding_ruin_block_head.GetTitledFirstName]就在下方，完全没有意识到——#italic 还有足够的时间帮助[agot_rebuilding_ruin_block_head.GetHerHim]吗？#!"
 agot_rebuilding_ruins.0010.a:0 "希望[agot_rebuilding_ruin_block_head.GetSheHe]不会受伤……"
 agot_rebuilding_ruins.0010.a.tt:0 "你试图警告[agot_rebuilding_ruin_block_head.GetHerHim]。"
 agot_rebuilding_ruins.0010.b:0 "我试图接近[agot_rebuilding_ruin_block_head.GetWomanMan]并保护[agot_rebuilding_ruin_block_head.GetHerHim]！"
 agot_rebuilding_ruins.0010.b.tt:0 "这样做会让你处于危险之中，但是[agot_rebuilding_ruin_block_head.GetFirstNameNoTooltip]将不胜感激。"
 agot_rebuilding_ruins.0011.t:0 "石材选择"
 agot_rebuilding_ruins.0011.desc:0 "用于重建工作的石头正从我领地的各个角落运来。我的一个手下指出，附近有一个潜在的石头来源——尽管它只是一个会在几年内枯竭的小采石场。"
 agot_rebuilding_ruins.0011.a:0 "我将为这个小采石场提供资金。"
 agot_rebuilding_ruins.0011.b:0 "我的黄金最好花在别处。"
 agot_rebuilding_ruins.0012.t:0 "精益求精"
 agot_rebuilding_ruins.0012.desc:0 "重建工作进展顺利，但我仍然不断在深夜忙于建筑计划。有时，我会做出微小的改变，或者在已完工的地方做些小改进。\n\n我的一些手下表达了他们的担忧，他们担心我对重建有些过于偏执……"
 agot_rebuilding_ruins.0012.a:0 "这可不是一种强迫症！"
 agot_rebuilding_ruins.0012.a.tt:0 "你在废墟重建完成后才会休息。"
 agot_rebuilding_ruins.0012.b:0 "也许他们是对的……"
 agot_rebuilding_ruins.0012.b.tt:0 "你接受了建议并退出了对项目的监督。"
 agot_rebuilding_ruins.0013.t:0 "青铜石板"
 agot_rebuilding_ruins.0013.desc:0 "在重建废墟时，我的手下发现了一件有趣的遗物，它似乎比符文本身还要古老。一块覆盖着先民废墟的青铜石板。"
 agot_rebuilding_ruins.0013.a:0 "这也许能换一些金币！"
 agot_rebuilding_ruins.0013.a.tt:0 "你把石板卖了换成钱。"
 agot_rebuilding_ruins.0013.b:0 "也许我可以破译石板……"
 agot_rebuilding_ruins.0013.b.tt:0 "你知识渊博，足智多谋；随着时间的推移，你可能会发现真相。"
 agot_rebuilding_ruins.0013.c:0 "学城的学士们应该能翻译它。"
 agot_rebuilding_ruins.0013.c.tt:0 "你付钱请信使把石板送到学城。"
 agot_rebuilding_ruins.0014.t:0 "青铜之神"
 agot_rebuilding_ruins.0014.desc:0 "一位学士使用罗伊斯家族的盔甲和印记作为参考，破译了部分石板。在与森林之子达成协议之前，石板是先民古代神灵的祈祷仪式：#bold 青铜之神#!，战争和采矿之神。\n\n学士写道，他愿意以可观的价格购买青铜石板。"
 agot_rebuilding_ruins.0014.a:0 "也许#italic 我#!应该试试这个仪式。"
 agot_rebuilding_ruins.0014.a.tt:0 "你向逝去已久的神灵祈祷。"
 agot_rebuilding_ruins.0014.b:0 "#bold 金子#!总是受欢迎的！"
 agot_rebuilding_ruins.0014.b.tt:0 "学城会为此付出高昂的价格。"
 agot_rebuilding_ruins.0015.t:0 "青铜神的祈祷者"
 agot_rebuilding_ruins.0015.desc:0 "深夜，我按照学士的描述进行了仪式。仪式完成后，我充满了狂热——一种我的信仰从未给我的压倒性感觉。"
 agot_rebuilding_ruins.0015.a:0 "也许先民们是对的……"
 agot_rebuilding_ruins.0015.b:0 "不……我会忠于我的信仰。"
 agot_rebuilding_ruins.1001.t:0 "沼泽巨口"
 agot_rebuilding_ruins.1001.desc:0 "要塞天险，对守军而言，其防护作用丝毫不逊于城墙与护城河，甚至可能更胜一筹——巨人之枪上高耸的鹰巢城或红叉河畔的孪河城即是明证。\n\n但祸福相依，今日的天险地势或许转眼就成了明日的威胁所在，颈泽的环境正在拖垮整个建设工程——沼泽里的蜥狮突然袭击了毫无防备的工人。"
 agot_rebuilding_ruins.1001.a:0 "这样的大工程有些人员伤亡是正常的。"
 agot_rebuilding_ruins.1001.b:0 "雇多些人手来护卫这里。"
 agot_rebuilding_ruins.1001.c:0 "派些专业猎手去捕杀这些沼泽恶魔！"
 agot_rebuilding_ruins.1001.c.tt:0 "他们带着一个蜥狮头骨凯旋"
 agot_rebuilding_ruins.1001.d:0 "让野兽多吃些偷懒的人。"
 agot_rebuilding_ruins.1001.e:0 "它们这么喜欢人肉肯定是有原因的……"
 agot_rebuilding_ruins.1002.t:0 "废墟的教训"
 agot_rebuilding_ruins.1002.desc:0 "卡林湾并非从来都是废墟一片，颈泽也非生来就是沼泽之地。许多人坚信，由于森林之子的怨恨，海水之锤造就了这片滋生着蜥狮和血花的泥潭，但真相究竟如何，至今仍是众说纷纭。\n\n卡林湾被怀疑是森林之子举行黑魔法仪式的地点，因此，一位学士从学城匆匆赶来。由于担心我重建卡林湾的工程会破坏某些残存于此的痕迹，[new_maester.GetName]希望能在工程完结前对遗址进行考察。\n\n[new_maester.GetName]也很清楚此举会影响到工程进度，但[new_maester.GetSheHe|U]还是坚持非做不可，并一直谦卑地征求我的许可。"
 agot_rebuilding_ruins.1002.a:0 "很好，但你必须跟我分享一些知识。"
 agot_rebuilding_ruins.1002.a.tt:0 "你获得[new_maester.GetNamePossessiveNoTooltip]的书"
 agot_rebuilding_ruins.1002.b:0 "你一定有些值钱的东西能打动我。"
 agot_rebuilding_ruins.1002.c:0 "我不能拖慢工程进度。"
 agot_rebuilding_ruins.1002.d:0 "我渴望了解真我。"
 agot_rebuilding_ruins.2000.t:0 "赫伦之焰"
 agot_rebuilding_ruins.2000.desc:0 "在过去的几天里，我收到报告称赫伦堡的修复工地正蔓延着一种热病。起初我以为只是偶发疾病，便没太在意，然而病例却在持续增多。\n\n现在有患者说他们感到内脏疼痛，仿佛体内有一团火在灼烧。#italic 有人窃窃私语，说这火和当初夺走「黑心」赫伦性命的火一模一样。#!没过多久，关于诅咒的传言就像 #WF 野火#! 一样蔓延。\n\n要是不想延误工期，我必须为工人们做点什么。我可以试着找出病因，尽管那可能是浪费时间。"
 agot_rebuilding_ruins.2000.a:0 "我必须找出祸乱的源头。"
 agot_rebuilding_ruins.2000.a.tt:0 "你将选择使用哪种方法来揭示“诅咒”的起源"
 agot_rebuilding_ruins.2000.b:0 "休息几天就足够了。"
 agot_rebuilding_ruins.2000.b.tt:0 "你希望这背后没有诅咒，事情会自行解决"
 agot_rebuilding_ruins.2000.c:0 "不必再治了，即刻换人。"
 agot_rebuilding_ruins.2000.c.tt:0 "你希望问题出在生病的工人身上，而不是赫伦堡本身"
 agot_rebuilding_ruins.2000.d:0 "[physician.GetName]可以解决这个。"
 agot_rebuilding_ruins.2000.d.tt:0 "你倚仗[physician.GetNamePossessiveNoTooltip]医术来解决这个问题"
 agot_rebuilding_ruins.2000.e:0 "某些草药浸膏可能会有用。"
 agot_rebuilding_ruins.2001.t:0 "揭晓谜团"
 agot_rebuilding_ruins.2001.desc:0 "无论是诅咒还是其他什么原因，某些东西正在破坏城堡的修复，我必须找到源头。"
 agot_rebuilding_ruins.2001.a:0 "好吧……从哪里开始？"
 agot_rebuilding_ruins.2001.a.tt:0 "你将尝试弄清楚真相，却无从下手"
 agot_rebuilding_ruins.2001.b:0 "我想我曾读到过类似的案例……"
 agot_rebuilding_ruins.2001.b.tt:0 "你依靠你的知识来研究这个“诅咒”"
 agot_rebuilding_ruins.2001.c:0 "没有什么能逃过我的眼睛。"
 agot_rebuilding_ruins.2001.c.tt:0 "你保持警觉，以便更好地察觉到线索。"
 agot_rebuilding_ruins.2001.d:0 "我需要和工头谈谈。"
 agot_rebuilding_ruins.2001.d.tt:0 "你在管理方面的经验将有助于调查"
 agot_rebuilding_ruins.2001.success:0 "你发现了源头"
 agot_rebuilding_ruins.2001.failure:0 "你没能发现源头"
 agot_rebuilding_ruins.2002.t:0 "谜团解开"
 agot_rebuilding_ruins.2002.d:0 "我终于找到了祸乱的源头。这并非什么怨魂作祟，不过是个不称职的厨子罢了，工人们食用了用腐败食材烹制的餐食。所谓的热病实为食物中毒，而那些体内起火的说辞，不过是轻信的工人们将胃部不适过度夸大而已。\n\n既然问题已经解决，那工作可以继续了。"
 agot_rebuilding_ruins.2002.a:0 "但愿不会再节外生枝……"
 agot_rebuilding_ruins.2003.t:0 "谜团加深"
 agot_rebuilding_ruins.2003.d:0 "我的搜寻一无所获。\n\n我听见他们在嘲笑我，#italic 该死的鬼魂！#!\n\n如果我在城堡重建前死去，我向诸天神明起誓，—定要回来缠着你们所有人！"
 agot_rebuilding_ruins.2003.a:0 "这座堡垒会要了我的命！"
 agot_harrenhal_curse_gone:0 "鬼魂被驱逐了"
 agot_harrenhal_curse_not_gone:0 "发烧大大减缓了工作"
 agot_rebuilding_ruins.2200.t:0 "复活的火刑架"
 agot_rebuilding_ruins.2200.desc_opening:0 "大雨没有停止的迹象，乌云在头顶飘过，比赫伦堡的石头还要漆黑。我花了一段时间和工头说话。\n\n"
 agot_rebuilding_ruins.2200.desc_zealous:0 "尽管天气不可预测，我仍满心希望今天的工作能顺利推进，却未曾料到[ROOT.Char.GetFaith.HighGodName]会插手干预。\n\n"
 agot_rebuilding_ruins.2200.desc_not_zealous:0 "尽管天气不可预测，我仍满心希望今天的工作能顺利推进，却未曾料到这该死的地方似乎总被接二连三的#italic 厄运#!缠绕。\n\n"
 agot_rebuilding_ruins.2200.desc_ending:0 "#italic 轰隆！#!闪电击中了焚王塔！自黑死神掠过这片天空以来从未有过的猛烈，整座塔瞬间化作熊熊燃烧的火炬。那么多塔，偏偏是这一座被击中！我看见工人们脸上闪过迷信引发的恐慌——若我不加干预，这种恐慌可能会蔓延至整个工地……"
 agot_rebuilding_ruins.2200.a:0 "闪电才不是什么诅咒。都回去干活！"
 agot_rebuilding_ruins.2200.success.tt:0 "工人们重新振作起来，火势也得到了控制"
 agot_rebuilding_ruins.2200.success:0 "你说服人们冷静下来"
 agot_rebuilding_ruins.2200.failure.tt:0 "恐慌造成了混乱，火灾导致了工程延误"
 agot_rebuilding_ruins.2200.failure:0 "你没能说服人们冷静下来"
 agot_rebuilding_ruins.2200.b:0 "你们越说“诅咒”，拿到手的工钱就越少！"
 agot_rebuilding_ruins.2200.b_success.tt:0 "众人听了你的警告，重新投入工作"
 agot_rebuilding_ruins.2200.b_failure.tt:0 "众人没有理会你的警告，工程进度因此延误"
 agot_rebuilding_ruins.2200.b.tt:0 "你的警告打断了关于诅咒的谈论，工人们急忙扑灭了火焰。"
 agot_rebuilding_ruins.2200.c:0 "你们应该害怕的并非诅咒。"
 agot_rebuilding_ruins.2200.c.tt:0 "你的可怕恶名甚至盖过了他们对诅咒的恐惧，工人们当即扑灭了火焰。"
 agot_rebuilding_ruins.2200.d:0 "火焰……多么壮丽……"
 agot_rebuilding_ruins.2200.d.tt:0 "你令人不安的神态比诅咒更让工人们害怕，他们急忙扑灭了火焰。"
 agot_rebuilding_ruins.2300.t:0 "瘟疫携带者"
 agot_rebuilding_ruins.2300.desc:0 "工匠们锤子的持续敲击声于我而言已是惯常的喧嚣；我路过工地时，只会径直忽略这声音。然而，工人们惊恐的呼喊声，却能立刻吸引我的注意。\n\n“[ROOT.Char.GetLadyLord]，”工头快步迎到院子里开口，望见他身后那些灰扑扑、毛发纠结的啮齿动物四处乱窜，我已然猜到了症结所在。寥寥数语间我便得知，工人们声称他们施工时惊扰了沉睡的鬼魂，而那些鬼魂已派遣成群的爬行害虫涌入城堡，以此作为报复。\n\n治不了鬼魂，我还治不了老鼠吗？"
 agot_rebuilding_ruins.2300.a:0 "这正是捕鼠人存在的意义。"
 agot_rebuilding_ruins.2300.b:0 "我才不会被老鼠吓到！"
 agot_rebuilding_ruins.2300.b.tt:0 "这可能会带来严重的后果。天晓得这些畜生携带着什么邪秽……"
 agot_rebuilding_ruins.2300.c:0 "[ROOT.Char.Custom('DogStoryName')]！过来！"
 agot_rebuilding_ruins.2300.c_cat:0 "[ROOT.Char.Custom('CatStoryName')]，你知道该怎么做……"
 agot_rebuilding_ruins.2300.c.tt:0 "你派自己的宠物去抓老鼠"
 agot_rebuilding_ruins.2300.d:0 "把它们统统烧光！"
 agot_rebuilding_ruins.2300.d.tt:0 "没有什么邪恶是火焰净化不了的。"
 agot_rebuilding_ruins.2400.t:0 "求助的[bewitched.GetWomanMan|U]"
 agot_rebuilding_ruins.2400.desc:0 "我又一次被卷入赫伦堡重建工作中那永无止境的任务里，常常要在工地待到天黑之后。工人们都已离去，这座堡垒笼罩在令人窒息的寂静里——除了那连绵不绝的雨声。\n\n一阵轻快的脚步声打破了这片近乎绝对的死寂：一位迷人的[bewitched.GetWomanMan]冒着倾盆大雨来到我面前。[bewitched.GetHerHis|U]的眼睛望着我，像能穿透人的灵魂。\n\n[bewitched.GetSheHe|U]穿得很朴素，但戴着一条项链，与[bewitched.GetHerHis]全身朴素的装扮格格不入。\n\n[bewitched.GetSheHe]声音柔和，听在耳中比蜜还甜。[bewitched.GetSheHe]名叫[bewitched.GetFirstName]，[bewitched.GetHerselfHimself]做了自我介绍，并礼貌地请求能在我的屋檐下避避雨。"
 agot_rebuilding_ruins.2400.a:0 "我的屋檐今夜属于你。"
 agot_rebuilding_ruins.2400.a.tt:0 "你礼貌地同意让这位可怜的流浪者留宿一晚"
 agot_rebuilding_ruins.2400.b:0 "这里看起来像酒馆吗？滚出去！"
 agot_rebuilding_ruins.2400.b.tt:0 "你不同意让那女人进入要塞"
 agot_rebuilding_ruins.2401.t:0 "搜查要塞"
 agot_rebuilding_ruins.2401.desc_denied_witch:0 "城堡笼罩在夜色之中，我的心情也同样沉重——只因我得到消息，在[bewitched.GetFirstName]被我拒绝入内后，[bewitched.GetSheHe]竟一直秘密藏在我的城堡里。[bewitched.GetSheHe|U]在大厅里随意游荡，仿佛这地方本就归属于[bewitched.GetSheHe]。\n\n我决定亲自去找[bewitched.GetHerHim]。我搜遍了百炉厅与猎手厅，却一无所获。不知过了多久，等我反应过来时，才发现自己已经穿过焚王塔，到了寡妇塔。\n\n"
 agot_rebuilding_ruins.2401.desc_restored_widow_tower:0 "塔楼修复后看起来好多了，但空气中仍弥漫着某种令人不安的气息。某种无法用理性或逻辑解释的东西，是来自这个[bewitched.GetWomanMan]吗？\n\n"
 agot_rebuilding_ruins.2401.desc_not_restored_widow_tower:0 "这座塔始终散发着令人不安的气息，就像赫伦堡里几乎所有东西一样。但此刻有这个古怪的[bewitched.GetWomanMan]站在这里，这种感觉变得更加压抑了。\n\n"
 agot_rebuilding_ruins.2401.desc_ending:0 "我看见了[bewitched.GetHerHim]，月光正照在[bewitched.GetHerHim]身上。在柔和苍白的月光下，[bewitched.GetSheHe]看上去几乎显得虚弱。可下一秒，[bewitched.GetHerHim]朝我扑来——[bewitched.GetHerHis]手中握着一把匕首，柄上镶嵌的宝石闪着光，那宝石分明是从[bewitched.GetHerHis]的项链上取下来的……"
 agot_rebuilding_ruins.2401.a:0 "我必须保护自己！"
 agot_rebuilding_ruins.2402.t:0 "清醒时刻"
 agot_rebuilding_ruins.2402.desc_welcomed_witch:0 "我猛地惊醒，恍惚间竟觉得熟睡时一直有双眼睛在盯着我。可当我环顾房间四周，却没发现任何异常，也没有察觉任何窥视。\n\n我刚要掀开被子起身，却注意到床上我身旁放着一样东西：那正是我之前看到的、缠绕在[bewitched.GetFirstNamePossessive]脖子上的[harrenhal_soul.GetName]。\n\n既然这东西在这里，那[bewitched.GetSheHe]当时也在这儿吗？[bewitched.GetSheHe]现在还在城堡里吗？"
 agot_rebuilding_ruins.2402.desc_denied_witch:0 "我惊呼出声，一阵茫然过后，笼罩在脑海中的迷雾渐渐散去。周围的环境缓缓变得熟悉清晰——我躺在自己的床上，初升的日光正透过窗户照进来，可我完全不记得昨晚发生了什么。\n\n那#italic 只是个梦……#!#bold 或者说一场噩梦！#!这个念头让我稍稍安心，直到我在床榻间发现了一样东西：[harrenhal_soul.GetName]，洁净得一尘不染。"
 agot_rebuilding_ruins.2402.a:0 "我必须把它藏在心里。"
 agot_rebuilding_ruins.2402.a.tt:0 "尽管这个故事可能让你不安，但你不想被当成疯子"
 agot_rebuilding_ruins.2402.a.tt_2:0 "[bewitched.GetHerHim]不见踪影，，也没有任何迹象表明[bewitched.GetSheHe]曾来过。或者，[bewitched.GetSheHe]真的来过吗？"
 agot_rebuilding_ruins.2402.b:0 "我必须尽一切努力找到[bewitched.GetHerHim]！"
 agot_rebuilding_ruins.2402.b.tt:0 "即便这毫无意义，你还是决定把城堡翻个底朝天，好让自己焦虑的情绪有个发泄对象，哪怕这会妨碍重建工作"
 agot_rebuilding_ruins.2402.c:0 "我曾做过更奇怪的梦……"
 agot_rebuilding_ruins.2402.d:0 "[ROOT.Char.GetFaith.HighGodName]赐予我力量！"
 agot_rebuilding_ruins.2500.t:0 "逃跑的工头"
 agot_rebuilding_ruins.2500.desc:0 "随着赫伦堡的诅咒继续萦绕在工地上方和梦境之中，工匠们的决心已开始动摇。如今，连工头都决意要走——比起工钱，他更看重自己的性命。我本以为在这受诅咒的地方，再也找不到愿意干活的人，可他还算客气，给我推荐了两个可能的替代者。\n\n第一个人毫无经验，工钱自然也更低，但他并非没有勇气——只是需要我时刻在旁指导。第二个人经验丰富，却惧怕这地方的诅咒，除非我为他的“胆量”支付一笔高昂的报酬。此外，还有个陌生人主动找上门来：此人态度古怪，开价倒还算适中，可一旦被问及过往经验，却总是闪烁其词。"
 agot_rebuilding_ruins.2500.a:0 "我不会在工人身上花费超出预算的钱。"
 agot_rebuilding_ruins.2500.a.tt:0 "你宁愿多花时间而非金钱。你仍须设法帮助年轻的工头在工地上安心工作"
 agot_rebuilding_ruins.2500.b:0 "我要完成这个项目，不惜任何代价。"
 agot_rebuilding_ruins.2500.b.tt:0 "你同意支付更多费用，以确保一切顺利推进"
 agot_rebuilding_ruins.2500.c:0 "我需要多了解第三个人的情况。"
 agot_rebuilding_ruins.2500.c.tt:0 "尽管此人来历不明，但他毕竟是也是一个可能的选择"
 agot_rebuilding_ruins.2500.continue:0 "赫伦堡的重建工作仍在继续。"
 agot_rebuilding_ruins.2500.foreman_flee:0 "“工头”拿着你的钱消失了。"
 agot_rebuilding_ruins.2500.foreman_robbed:0 "在找到愿意来赫伦堡工作的新工头之前，工程将暂时中断。"
 agot_rebuilding_ruins.2501.t:0 "新工头"
 agot_rebuilding_ruins.2501.desc:0 "正如我所担心的那样，这位新来的、毫无经验的工头不仅难以按时完成任务，也无法让工人们专心干活。雇他或许确实省下了些钱，但他的低效可能会让我蒙受更大的损失。我必须想办法解决这个问题——要么我亲自监工，要么指派我的一名廷臣来负责这件事。\n\n无论选择哪种方式，这项工程都必须推进下去！"
 agot_rebuilding_ruins.2501.a:0 "我自己会处理好。"
 agot_rebuilding_ruins.2501.a.success:0 "你成功处理了这些问题"
 agot_rebuilding_ruins.2501.a.failure:0 "你惹了更多麻烦"
 agot_rebuilding_ruins.2501.b:0 "我知道怎么帮雏鸟学飞。"
 agot_rebuilding_ruins.2501.c:0 "[steward.GetName]，由你负责。"
 agot_rebuilding_ruins.2501.c_success:0 "[steward.GetName]成功处理了问题"
 agot_rebuilding_ruins.2501.c_failure:0 "[steward.GetName]搞砸了，惹出更多麻烦"
 agot_rebuilding_ruins.2501.d:0 "[architect.GetName]，这正是你擅长的。"
 agot_rebuilding_ruins.2501.d_failure:0 "[architect.GetName]搞砸了，惹出更多麻烦"
 agot_rebuilding_ruins.2600.t:0 "谎言的使者"
 agot_rebuilding_ruins.2600.desc:0 "人们常说，一人之不幸是另一人之趣事，许多吟游诗人和歌手用歌曲证实了这一点。吟游诗人常会歪曲事实，将流血与苦涩的仇怨化作诗篇，把悲伤变成伟大，让愚蠢化为声名。\n\n这样一位吟游诗人来到了赫伦堡。身为声名狼藉的黑乌鸦，[bard.GetName]在酒馆里为歌曲寻找灵感，好让酒杯装满美酒，在宫廷中则让钱币装满[bard.GetHerHis]的口袋。\n\n工人们已经够心神不宁了，不需要再多一块靴中的石子。但与这位歌手打交道时，我须得小心谨慎。"
 agot_rebuilding_ruins.2600.a:0 "既然钱能引他来，钱也能引他走。"
 agot_rebuilding_ruins.2600.a.tt:0 "吟游诗人默默地离开了"
 agot_rebuilding_ruins.2600.a.ttwo:0 "吟游诗人离开了……并把针对你的恶毒歌曲传播到了整个王国"
 agot_rebuilding_ruins.2600.a.toast:0 "吟游诗人离开了"
 agot_rebuilding_ruins.2600.b:0 "来人把这流浪汉赶出去！"
 agot_rebuilding_ruins.2600.b.tt:0 "你手下一名队长带着几名守卫自告奋勇去拦住那吟游诗人"
 agot_rebuilding_ruins.2600.b.ttwo:0 "队长顺利地将吟游诗人关押起来"
 agot_rebuilding_ruins.2600.b.tthree:0 "吟游诗人被关押了起来，但抓捕途中引发了几起小事故"
 agot_rebuilding_ruins.2600.b.tfour:0 "吟游诗人试图逃跑，结果却给他自己、队长和酒馆都带来了糟糕的结果"
 agot_rebuilding_ruins.2600.b.toast:0 "吟游诗人顺利被逮捕。"
 agot_rebuilding_ruins.2600.b.toast_two:0 "吟游诗人被逮捕，但有人受伤了"
 agot_rebuilding_ruins.2600.b.toast_three:0 "吟游诗人被逮捕，但付出的代价非常大"
 agot_rebuilding_ruins.2600.c:0 "其实我也算是个吟游诗人吧！"
 agot_rebuilding_ruins.2600.c_success:0 "你在吟游诗人的对决打败了[bard.GetName]"
 agot_rebuilding_ruins.2600.c_failure:0 "你在吟游诗人的对决被[bard.GetName]打败"
 agot_rebuilding_ruins.2600.d:0 "言语就像风，在巨龙吐息面前微不足道。"
 agot_rebuilding_ruins.2600.d.tt:0 "如果那吟游诗人未被赫伦堡的阴影吓倒，[dragon.GetName]的阴影会让他畏惧"
 agot_rebuilding_ruins.2700.t:0 "绿人"
 agot_rebuilding_ruins.2700.desc:0 "赫伦堡的工人们低声谈论着夜间的幽灵。若在平时我绝不会理会——毕竟这里是赫伦堡，我们早知道建造的是怎样的城堡。但近来工人们描述说，有个千面屿的#italic 绿人#!在黑暗中游荡，工人向其献上黄金贡品。这让我不得不留意。\n\n虽然我仍不信这些传言，但荒诞传闻往往导致工期延误。我必须让工程重回正轨。该如何对付这个贪金的幽灵呢？"
 agot_rebuilding_ruins.2700.a:0 "我只需留意黄金被放在哪……然后等待。"
 agot_rebuilding_ruins.2700.a.tt:0 "如果想当场抓住这个#italic 募捐人#!，你须得小心行事"
 agot_rebuilding_ruins.2700.a.toast:0 "你对绿人的调查失败了"
 agot_rebuilding_ruins.2700.a.duel_win_tt:0 "你发现了一个#italic 募捐人#!"
 agot_rebuilding_ruins.2700.a.duel_loss_tt:0 "你未能发现#italic 募捐人#!"
 agot_rebuilding_ruins.2700.b:0 "绿人才不会做这种事。"
 agot_rebuilding_ruins.2700.b_tt:0 "你试图用你对旧神的知识来说服众人"
 agot_rebuilding_ruins.2700.b_duel_win_tt:0 "人们被说服了"
 agot_rebuilding_ruins.2700.b.toast_win:0 "你说服了人们"
 agot_rebuilding_ruins.2700.b_duel_loss_tt:0 "人们未被说服"
 agot_rebuilding_ruins.2700.b.toast_loss:0 "你没能说服他们"
 agot_rebuilding_ruins.2700.b_tt_old_gods:0 "你对诸神的了解让众人信服"
 agot_rebuilding_ruins.2700.d:0 "说到跟踪猎物，我无人能及。"
 agot_rebuilding_ruins.2700.d.tt:0 "你在追踪方面的经验将很有用"
 agot_rebuilding_ruins.2700.e:0 "我能智胜这个绿人。"
 agot_rebuilding_ruins.2700.e.tt:0 "你欺骗的技巧肯定能让你看穿绿人的把戏"
 agot_rebuilding_ruins.2700.f:0 "我必须寻求旧神的祝福。"
 agot_rebuilding_ruins.2700.f.tt:0 "也许这笔微薄的捐款能为你赢得神的眷顾"
 agot_rebuilding_ruins.2700.f.toast:0 "千面屿的神明并未回应你的祈求。"
 agot_rebuilding_ruins.2700.f.toasttwo:0 "你身上发生了某种变化……神灵在听吗？"
 agot_rebuilding_ruins.2701.t:0 "虚假之灵"
 agot_rebuilding_ruins.2701.desc:0 "原来这就是大名鼎鼎的#italic “绿人”#!。此人自称[green_man.GetName]，但除此之外其实和普通农夫没什么两样，他不过是披着一套模仿传说中#italic 真正的#!绿人的行头来利用人心罢了。这套行头处处透着刻意：用树叶编成王冠，还把鹿角当头饰戴在头上。\n\n现在我得好好想想该怎么处置他。要是我揭穿他的骗局，工匠们定会安心，重新投入劳作。可反过来想，这些日子，他们为了 “供奉” 他，可是心甘情愿交出了不少金子……"
 agot_rebuilding_ruins.2701.a:0 "所有人都将知道“绿人”的身份。"
 agot_rebuilding_ruins.2701.a.tt:0 "工人们安心地回到他们的工作中"
 agot_rebuilding_ruins.2701.b:0 "你有天赋……教我你所知道的一切。"
 agot_rebuilding_ruins.2701.b.tt:0 "你默许这骗子继续行骗，以换取他传授几项技艺"
 agot_rebuilding_ruins.2701.c:0 "这里有很多黄金可以赚……但得手的人只会是我。"
 agot_rebuilding_ruins.2701.c.tt:0 "你取代了绿人，让工人们继续捐赠"
 agot_rebuilding_ruins.2800.t:0 "幻象之树"
 agot_rebuilding_ruins.2800.desc_opening:0 "“我们必须砍掉这些……#italic 鬼东西#!！[ROOT.GetCharacter.GetLadyLord]，天知道有什么东西正透过那双眼睛盯着我们？”\n\n直到现在，我的工人们一直对所谓赫伦堡的幽灵心神不宁，但今天，让他们骚动的却是更实在的东西。一个名叫[worker.GetName]的工人声称，城堡神木林里的心树蕴藏着古老的邪恶，必须将它们砍掉。"
 agot_rebuilding_ruins.2800.desc_weirwood:0 "\n\n颈泽以南已经有太多心树被砍伐了！"
 agot_rebuilding_ruins.2800.desc_no_weirwood:0 "\n\n工人中有许多对这些树木和这座城堡心存迷信。若我放任[worker.GetNameNoTooltip]继续下去，他们只会更加骚动不安。"
 agot_rebuilding_ruins.2800.desc_weirwood_craven:0 "\n\n那双眼睛从未停止凝视着我，我担心要是惹恼了它们背后的东西，后果不堪设想。"
 agot_rebuilding_ruins.2800.desc_closing:0 "“这绝无可能！”我反驳道，语气不容置疑。尽管如此，[worker.GetNameNoTooltip]似乎并不打算退让。现在我面临着一个艰难的选择。"
 agot_rebuilding_ruins.2800.desc_closing_shy_craven:0 "“绝不可能！”我反驳道，鼓起仅有的一点勇气说出这话。尽管如此，[worker.GetNameNoTooltip]似乎并不打算让步。现在我面临着一个艰难的选择。"
 agot_rebuilding_ruins.2800.a:0 "你让我别无选择。"
 agot_rebuilding_ruins.2800.a.tt:0 "用武力让[worker.GetNameNoTooltip]屈服"
 agot_rebuilding_ruins.2800.b:0 "我说过了，这不可能！"
 agot_rebuilding_ruins.2800.b.duel_win_tt:0 "[worker.GetNameNoTooltip]被说服了"
 agot_rebuilding_ruins.2800.modifier:0 "人们回到工作岗位，但进度仍将延误两个月"
 agot_rebuilding_ruins.2800.b.duel_loss_tt:0 "[worker.GetNameNoTooltip]不为所动，只能强行将其带离"
 agot_rebuilding_ruins.2800.c.tt:0 "第二次尝试会比第一次更有说服力"
 agot_rebuilding_ruins.2800.d:0 "来人啊，做点什么吧！"
 agot_rebuilding_ruins.2800.d.tt:0 "你无力自行解决此事，只得寻求帮助"
 agot_rebuilding_ruins.2800.e:0 "好吧，把斧头给我。我来解决。"
 agot_rebuilding_ruins.2800.e.tt:0 "你确实解决了——连同[worker.GetHerHim]一起"
 agot_rebuilding_ruins.2800.a.win.title:0 "[worker.GetName]的鲜血洒在心树的脚下"
 agot_rebuilding_ruins.2800.b.win.title:0 "[worker.GetName]服从你的意志"
 agot_rebuilding_ruins.2800.b.loss.title:0 "[worker.GetName]不听"
 agot_rebuilding_ruins.2800.d.win.title:0 "[worker.GetName]被及时制止了"
 agot_rebuilding_ruins.2800.d.win.desc:0 "其他工人迅速围过来调停，救下了你的命"
 agot_rebuilding_ruins.2800.e.win.title:0 "[worker.GetName]的鲜血洒在心树的脚下"
 agot_rebuilding_ruins.2801.t:0 "泣血之心"
 agot_rebuilding_ruins.2801.desc:0 "傍晚时分，我又不由自主地回到了那棵鱼梁木前，我在心里说，自己只是想确认之前那件事留下的痕迹是否已经消失。那是个不幸的故事，但或许那样的结局才是最好的。\n\n我抬头望去，发现鱼梁木的脸正凝视着我。当树的视线穿透我时，一种奇怪的感觉爬过我的皮肤。此刻的树皮上，上次来访时不曾存在的东西开始浮现。我不知道是这座废墟的幽灵作祟，还是我中了什么巫术，但在月光下，树液看起来……比应有的颜色更鲜红。"
 agot_rebuilding_ruins.2801.desc_old_gods:0 "我在树叶的沙沙声中听到了旧神的声音。"
 agot_rebuilding_ruins.2801.desc_craven:0 "#italic 我无力抗拒。#!"
 agot_rebuilding_ruins.2801.desc_inquisitive:0 "#italic 我必须弄清楚！#!"
 agot_rebuilding_ruins.2801.desc_ending:0 "我走近一步，把手放在它的脸上。"
 agot_rebuilding_ruins.2801.a:0 "我看到一些东西……"
 agot_rebuilding_ruins.2802.t:0 "新的黎明"
 agot_rebuilding_ruins.2802.desc:0 "#italic 愤怒的天空倾泻而下，炽热的雨落在石上。贵妇们弯下腰，枯萎凋零，只余下阴影与烟雾。黎明破晓，随之而来的是一个新时代的开端。恐惧降临，空气中弥漫着它的气息。#!\n\n这幻象支离破碎，但我从中窥见了某种隐秘的含义。我看见……"
 agot_rebuilding_ruins.2802.a:0 "……力量！"
 agot_rebuilding_ruins.2802.b:0 "……死亡！"
 agot_rebuilding_ruins.2802.c:0 "……满是希望的未来！"
 agot_rebuilding_ruins.2802.d:0 "……瓦雷利亚末日浩劫？"
 agot_rebuilding_ruins.2802.e:0 "……赫伦堡的诅咒？"
 agot_rebuilding_ruins.2804.t:0 "无尽之潮"
 agot_rebuilding_ruins.2804.desc:0 "#italic 无尽的群兽在嘶鸣的呼喊声中涌来，他们喉间发出的粗哑语言随风飘荡。它们经过的地方，青草永远不再生长，他们的刀锋将嫩芽都变成死物。它们的长发在风中肆意飞扬，死亡引领着它们的生命轨迹，而火焰则宣告着它们的终结。#!\n\n这幻象支离破碎，但我从中窥见了某种隐秘的含义。我看见……"
 agot_rebuilding_ruins.2804.a:0 "……致命的刀刃！"
 agot_rebuilding_ruins.2804.b:0 "……一支不可阻挡的军队！"
 agot_rebuilding_ruins.2804.c:0 "……一次可怕的冲锋！"
 agot_rebuilding_ruins.2804.d:0 "……一支多斯拉克部族在平原上行进？"
 agot_rebuilding_ruins.2804.e:0 "……长夜？"