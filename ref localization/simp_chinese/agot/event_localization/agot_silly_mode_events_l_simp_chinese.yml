l_simp_chinese:
 agot_silly_mode.0002.t:0 "“伊”外囚犯"
 agot_silly_mode.0002.desc:0 "“老爷，伊耿已经被关进龙穴最深的牢房里了。”龙卫微微鞠躬禀报道，“可我还是不明白您为什么要把他囚禁在那里，而不是黑牢。不过，既然那地方能关住龙，想必也能关住人。”\n\n我愕然瞪着他。伊耿常常被某些人叫做“鸡蛋”，我下的命令是把所有龙蛋都送进龙穴孵化，我的话怎么会被人误解成这样？"
 agot_silly_mode.0002.desc_mult:0 "“老爷，那些伊耿已经被关进龙穴最深的牢房里了。”龙卫微微鞠躬禀报道，“可我还是不明白您为什么要把他们囚禁在那里，而不是黑牢。不过，既然那地方能关住龙，想必也能关住人。”\n\n我愕然瞪着他。伊耿常常被某些人叫做“鸡蛋”，我下的命令是把所有龙蛋都送进龙穴孵化，我的话怎么会被人误解成这样？"
 agot_silly_mode.0002.a:0 "我并不是这个意思！"
 agot_silly_mode.0002.b:0 "我……很好，谢谢你。"
 agot_silly_mode.0100.t:0 "陌生的美食"
 agot_silly_mode.0100.desc:0 "又是处理琐碎杂务的一天。统治有时实在乏味，唯一的惊喜不过是身边人偶尔展现的才能。\n\n但今天不同——令我大为恼火的是，一个浑身张满鳞片的家伙突然闯进来，这东西又邪恶又卑劣，还带着一份#italic 古怪的礼物#!！“新鲜出炉的#bold 馅饼#!，老爷。”黑影用欢快的语气说道，“刚从厨房端出来的。有个陌生姑娘给我们提供了最嫩的肉做馅料。”\n\n我向来不轻信陌生人送来的可疑食物，可这香气实在诱人……"
 agot_silly_mode.0100.a:0 "只是吃一口……"
 agot_silly_mode.0100.b:0 "最好不要。"
 agot_silly_mode.0200.t:0 "绝妙“蛋”饼"
 agot_silly_mode.0200.desc:0 "厨师走了进来，脚步迟疑，眼里充满担忧。“老爷，您找我吗？”\n\n“对，我想吃个煎蛋卷。一个非常特别的煎蛋卷。”我回答着，侧身拿起选中的“食材”。\n\n他有些困惑，眉头皱了皱，但很快便转为极度震惊——特别是接过我递来的龙蛋时。“我……我不知道……但如果您坚持的话。”他结结巴巴地说，盯着那颗蛋，仿佛它随时会爆炸。\n\n我冲他点点头，笑容加深。“我有点饿了。别让我等太久。”"
 agot_silly_mode.0200.a:0 "我等不及了！"
 agot_silly_mode.0201.t:0 "绝妙“蛋”饼"
 agot_silly_mode.0201.desc:0 "厨师回来了，看上去疲惫不堪，头发也有些凌乱。他紧张地把盘子放在我面前，煎蛋卷看起来再普通不过，完全看不出是用传说中的龙蛋做的。它呈金棕色，微微蓬松，散发着淡淡的草药香。\n\n“我……我希望您能喜欢，老爷。”他声音颤抖地说道。\n\n我低头看着这盘菜，有些失望。没有散发金光，没有魔法气息，只是一份做得不错的早餐。我尝了一口。"
 agot_silly_mode.0201.a:0 "这……味道好极了！"
 agot_silly_mode.0201.b:0 "好吃到蛋疼！"
 agot_silly_mode.0201.c:0 "绝绝子的蛋！"
 agot_silly_mode.0201.d:0 "你把蛋做的好啊，厨师！"
 agot_silly_mode.0201.e:0 "蛋！这简直是我的梦中情蛋！"
 agot_silly_mode.0201.f:0 "我再也吃不到这么好的蛋该怎么办！"
 agot_silly_mode.0201.g:0 "这这这……好吃到翘蛋蛋！"
 agot_silly_mode.0202.t:0 "$agot_silly_mode.0201.t$"
 agot_silly_mode.0202.desc:0 "$agot_silly_mode.0201.desc$"
 agot_silly_mode.0202.a:0 "吃啥像啥。"
 agot_silly_mode.0302.t:0 "深渊的触手"
 agot_silly_mode.0302.desc:0 "掠夺者如潮水般涌进旧镇，带着咸腥与钢铁的气息。当他们逼近参天塔的阴影时，大海发出咆哮——是反抗，或是欢呼？港口突然掀起一股滔天巨浪，瞬间淹没了数十人。与此同时，一只巨型海怪从深渊中升起。它如城墙般粗壮的触须缠绕住古老的高塔，随着石块崩裂的轰鸣，参天塔被硬生生拔离地基，最终沉入波涛之下，消失在大海的深邃中。"
 agot_silly_mode.0302.a:0 "大海永不遗忘。"
 agot_silly_mode.0302.b:0 "诶……诶！？"
 agot_silly_mode.0501.t:0 "崇拜……一根大蜡烛……？"
 agot_silly_mode.0501.westeros_desc:0 "我穿过城堡中透风的走廊，一名廷臣拿着密封的渡鸦信件朝我走来。接过信件，我瞥见学城的蜡封……一股紧迫感涌来，我迅速打开信件封印，料想着最坏的结果。\n\n展开信纸阅读，才发现不过是[messenger.GetName]从[GetTitleByKey('k_the_wall').GetName]带来的消息。报告提及极北之地一群野人的怪异行径，他们开始崇拜所谓的大蜡烛——据传是一根在他们土地天空上漂浮了数代人的巨型蜡烛，如今却神秘消失了。我将信件反复读了几遍，最终扔到一旁，怔怔地站在原地，对刚读到的内容一时无语……"
 agot_silly_mode.0501.not_westeros_desc:0 "我翻阅着未读的信件，一封带有维斯特洛学城蜡封的信件引起了我的注意。出于对来信的好奇，我决定先看下它。\n\n拆开信件阅读，发现这是[messenger.GetName]从[GetTitleByKey('k_the_wall').GetName]带来的消息。报告提及极北之地一群野人的怪异行径，他们开始崇拜所谓的大蜡烛——据传是一根在他们土地的天空上漂浮了数代人的巨型蜡烛，如今却神秘消失了。我反复读了好几遍信件，然后用手托住额头……我刚刚究竟读了些什么？"
 agot_silly_mode.0501.nw_westeros_desc:0 "[GetTitleByKey('k_the_wall').GetName]这儿总是他妈这么冷……有人说你会习惯的，这不过是自欺欺人的鬼话。为了转移注意力，我回想起白天游骑兵押来的野人受审的情形。那个疯子满口胡言乱语，说什么极北之地有个野人部落竟开始崇拜天空之上的巨大蜡烛。这说法简直疯了，即便以野人野蛮的标准来看也匪夷所思……真想知道，究竟是多么遥远的北方，能把人逼到如此癫狂的地步。"
 agot_silly_mode.0501.btw_westeros_desc:0 "湖民部落向来行事古怪……其他自由民中流传着关于他们的种种传闻。据说他们有着让人摸不着头脑的仪式，崇拜着天空中一根巨大的蜡烛。最近，有关这些仪式的传闻变得愈发频繁和响亮，说是那根所谓天空中的大蜡烛移动了位置。他们宣称这是不祥之兆，并因此越发狂热。传言声称，，他们正在献祭其他部落的人，以求让他们的蜡烛重回天空。这简直是丧心病狂——稍加思索便令人不寒而栗。"
 agot_silly_mode.0501.a:0 "那边发生什么事？"
 agot_silly_mode.0502.t:0 "蜡……烛……蜡烛……"
 agot_silly_mode.0502.desc:0 "大蜡烛离开冰湖之地上空已经有一段时间。我们从未想过它有一天会离开，它遮挡阳光照耀我们……守护着我们的人民……自大蜡烛消失那日起，我们便不再处于它神圣的阴影下。失去大蜡烛的指引，我的人民迷失了方向。我们在这刺眼的新光芒中盲目徘徊。\n\n我知道自己该做什么……我必须带领我的族人走上一条光荣的新道路，走向启蒙，让大蜡烛为我们的向导！也许，如果我们将生命奉献给大蜡烛的名字，就能引导它重新回到我们土地的上空，让我们恢复昔日的荣光。\n\n我必须旅行并传播这种新的生活方式——传递大蜡烛的智慧与指引……"
 agot_silly_mode.0502.a:0 "蜡烛是智慧，蜡烛是生命……"
 agot_silly_mode.0502.a.tt:0 "你整个文化都转化为蜡烛"