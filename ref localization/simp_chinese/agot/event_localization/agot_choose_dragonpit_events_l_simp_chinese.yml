l_simp_chinese:
 agot_choose_dragonpit_event.0001.t:0 "[dragon.GetNameNoTooltip]的龙穴"
 agot_choose_dragonpit_event.0001.desc:0 "没有骑手的龙是不可预测且危险的资产。如果没有约束它的纽带，就几乎无法阻止这巨兽离去或倒戈相向。我们要想保持控制，就必须将其妥善安置。还好，我们准备了几处各有利弊的合适场所。"
 agot_choose_dragonpit_event.0001.desc_rider:0 "龙是强大的倚仗，但若无骑手驾驭，其忠诚便难以保证。如果[Select_CString( rider.IsLocalPlayer, '我', rider.GetName )]离世，[dragon.GetName]可能就会离去，重新回到荒野。为了保持控制，必须将[dragon.Custom('GetDragonSheHe')]妥善安置。还好，我们准备了几处各有利弊的合适场所。"
 agot_choose_dragonpit_event.0001.a:0 "这样就行了。"
 agot_choose_dragonpit_event.0001.a.tt:0 "[dragon.GetNameNoTooltip]将被安置在选定的龙穴中。"
 agot_choose_dragonpit_event.0001.b:0 "[dragon.GetNameNoTooltip]需要的是自由。"
 agot_choose_dragonpit_event.0001.c:0 "[dragon.GetNameNoTooltip]现在待的位置就挺合适的。"
 agot_choose_dragonpit_event.0001.d:0 "不，我不会把[dragon.GetNameNoTooltip]囚禁起来。"
 agot_choose_dragonpit_event.0001.a.tt_2:0 "@warning_icon!#X 如果将[dragon.GetNameNoTooltip]关在远离骑手的龙穴，将导致无法将龙用于旅行或战争，并可能削弱双方纽带#!"
 dragon_bond_weakening_toast:0 "日渐疏离的纽带"