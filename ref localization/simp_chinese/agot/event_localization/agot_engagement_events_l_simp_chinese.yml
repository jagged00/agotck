l_simp_chinese:
 agot_engagement_events.0002.t:0 "心中所想"
 agot_engagement_events.0002.desc.intro:0 "我的[ROOT.Char.Custom2('LMF_RelationToMe', SCOPE.sC('betrothed_1'))]走进我的房间，"
 agot_engagement_events.0002.a:0 "好极了。你不必结婚……至少不是现在。"
 agot_engagement_events.0002.b:0 "我会取消婚约，但你#italic 必须#!和人结婚。"
 agot_engagement_events.0002.c:0 "我允许你和[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_lover'))]结婚。"
 agot_engagement_events.0003.a:0 "[actor.GetSheHe]怎么敢……"
 agot_engagement_events.0006.opening:0 "[betrothed_1.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_engagement_events.0006.desc:0 "我一直想当面质问你，但是没有机会，现在我想问为何我的[betrothed_1.Custom2('LMF_RelationToMeShort', ROOT.Char )]竟也想成为我的[ROOT.Char.GetWifeHusband]……\n\n我无法想象余生要被如此轻率的[ROOT.Char.Custom('InsultNoun')]掌控，所以我选择离开[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]，不必寻我。"
 agot_engagement_events.0006.a:0 "[betrothed_1.GetSheHe|U]一定会回来的，我对此深信不疑。"
 agot_engagement_events.0007.t:0 "心中所想"
 agot_engagement_events.0007.a:0 "我别无选择，只能接受[betrothed_1.GetHerHis]的决定。"
 agot_engagement_events.0008.t:0 "破碎的梦"
 agot_engagement_events.0008.desc:0 "我与[betrothed_1.GetFirstNameNoTooltip]的争执仍在继续，我们的吼声越来越高，最终[betrothed_1.GetSheHe]转身面对我，发出了[betrothed_1.GetHerHis]最后通牒。\n\n[betrothed_1.GetSheHe|U]猛地转身走向门口，只回头喊道：“如果你拒绝考虑我对未来配偶的意见，那我也拒绝考虑你的！我绝不会嫁给[betrothed_2.GetTitledFirstNameNoTooltip]……#bold 或其他任何人#!！”\n\n我以为这只是虚张声势，然而第二天早上，我得知我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))]已经派出信使致信[rejected_betrothal_owner.GetTitledFirstNameNoTooltip]，由[betrothed_1.GetHerselfHimself]自己解除了婚约，一切都已成定局。"
 agot_engagement_events.0008.a:0 "有些不妙……"
 agot_engagement_events.0008.b:0 "把[betrothed_1.GetHerHim]软禁，等我决定如何处置[betrothed_1.GetHerHim]。"
 agot_engagement_events.0008.c:0 "“卫兵！把[betrothed_1.GetHerHim]逐出[ROOT.Char.Custom('FortifiedBuilding')]！”"
 agot_engagement_events.0009.t:0 "破碎之心的最后一搏"
 agot_engagement_events.0009.a:0 "不，不，不，不，#bold 不#!！"
 agot_engagement_objection_negative_opinion:0 "我实在不想待在[betrothed_2.GetHerHim]身边！"
 agot_engagement_objection_incest:0 "[betrothed_2.GetSheHe|U]是我的[betrothed_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_2'))]！这……这样不对。我不要！我不想要和#italic [betrothed_2.GetHerHim]#!一起。"
 agot_engagement_objection_lowborn:0 "[betrothed_2.GetSheHe|U]竟然是个平民！"
 agot_engagement_objection_bastard:0 "我实在无法想象自己怎么会和私生子结婚。"
 agot_engagement_objection_not_attracted_to_me:0 "我听说[betrothed_2.GetSheHe]根本#italic 不喜欢#!我这样的[betrothed_1.Custom('WomenMenGirlsBoys')]。"
 agot_engagement_objection_not_attracted_to_them:0 "我永远无法从[betrothed_2.Custom('WomanManGirlBoy')]那里获得#italic 满足#!，[betrothed_2.GetHerHim]也一样。"
 agot_engagement_objection_dwarf:0 "[betrothed_2.GetSheHe|U]是一个他妈的侏儒！"
 agot_engagement_objection_hunchback:0 "[betrothed_2.GetSheHe|U]是个驼背！你没见过[betrothed_2.GetHerHim]吗？！"
 agot_engagement_objection_greyscale:0 "这邋遢的……呕！光是看到[betrothed_2.GetHerHim]就让我恶心得想吐！"
 agot_engagement_objection_hideous:0 "说句不好听的，[betrothed_2.GetSheHe|U]就没个人样。"
 agot_engagement_objection_ugly:0 "我就直说了，[betrothed_2.GetSheHe]长得很丑。"
 agot_engagement_objection_unattractive:0 "我真不喜欢[betrothed_2.GetHerHim]那副样子。怎么会有人看得上呢？"
 agot_engagement_objection_idiot:0 "[betrothed_2.GetSheHe|U]就是个蠢货，我宁愿对着树桩说话。"
 agot_engagement_objection_dull:0 "虽然不想这么说，但那[betrothed_2.Custom('WomanManGirlBoy')]简直无聊透顶！"
 agot_engagement_objection_weak:0 "[betrothed_2.GetSheHe|U]弱不禁风，我害怕一碰[betrothed_2.GetHerHim]就散架！"
 agot_engagement_objection_lesser:0 "你很清楚[betrothed_2.GetSheHe|U]出身低微。"
 agot_engagement_objection_lazy:0 "[betrothed_2.GetSheHe]就知道无所事事混日子！"
 agot_engagement_objection_deceitful:0 "[betrothed_2.GetSheHe]整天就知道撒谎，什么事都要骗人！"
 agot_engagement_objection_craven:0 "[betrothed_2.GetSheHe|U]一点骨气都没有！"
 agot_engagement_objection_shy:0 "我几乎没法和[betrothed_2.GetSheHe|U]交流，[betrothed_2.GetHerHim]太害羞了"
 agot_engagement_objection_bold:0 "[betrothed_2.GetSheHe|U]完全彻底地沉浸在[betrothed_2.GetHerselfHimself]自己的世界中！"
 agot_engagement_objection_meek:0 "[betrothed_2.GetSheHe|U]温顺得像只小耗子！"
 agot_engagement_objection_drunkard:0 "[betrothed_2.GetSheHe|U]是个酒鬼！我每次看到[betrothed_2.GetHerHim]，[betrothed_2.GetSheHe]都是满脸通红、浑身一股酒味！"
 agot_engagement_objection_sad:0 "[betrothed_2.GetSheHe|U]整天叹息和哭泣什么也不做，这到底有完没完？！"
 agot_engagement_objection_crazy:0 "[betrothed_2.GetSheHe|U]疯了！你我都心知肚明。"
 agot_engagement_objection_unfaithful:0 "[betrothed_2.GetSheHe|U]永远不会对我忠诚，也不会对任何人忠诚，你也是知道的！"
 agot_engagement_objection_prude:0 "[betrothed_2.GetSheHe|U]太过于#italic 拘谨#!，我实在是受不了！"
 agot_engagement_objection_unkind:0 "[betrothed_2.Custom('WomanManGirlBoy')]既[Select_CString( betrothed_2.IsFemale, '邪恶', '蛮横' )]又残忍！"
 agot_engagement_objection_much_too_young:0 "[betrothed_2.GetSheHe|U]和我比起来简直就是个小孩！这太不像话了！"
 agot_engagement_objection_too_young:0 "[betrothed_2.GetSheHe|U]的年龄比我小太多了。"
 agot_engagement_objection_too_old:0 "[betrothed_2.GetSheHe|U]对我来说太老了！"
 agot_engagement_objection_much_too_old:0 "[betrothed_2.GetSheHe|U]简直是个老[betrothed_2.GetWomanMan]！"
 agot_engagement_objection_unlike:0 "我们彼此如此不同，完全不能相处！"
 agot_engagement_objection_std:0 "[betrothed_2.GetHerHis]嘴边的那些疮……你难道没看见吗？！"
 agot_engagement_objection_reputation:0 "关于[betrothed_2.GetHerHis]的传言是真的吗？你怎么能让我嫁给那样的人？"
 agot_engagement_objection_child:0 "你知道[betrothed_2.GetSheHe]已经有孩子了吧？还是个私生子！"
 agot_engagement_objection_unremarkable:0 "[betrothed_2.GetSheHe|U]平平无奇，身上根本找不出任何特别之处！"
 agot_engagement_events.0002.desc.submissive:0 "[betrothed_1.GetHerHis]焦虑地搓着手，欲言又止。经过一番哄劝，[betrothed_1.GetFirstName]终于开口了。\n\n“[betrothed_1.Custom2('spoken_address_by_familiarity', ROOT.Char )|U]，我一直在想我和[betrothed_1.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_2'))]的婚约。您是否……还有可能改变主意？”\n\n"
 agot_engagement_events.0002.desc.angry:0 "[betrothed_1.GetHerHis]拳头紧握，眼中怒火燃烧。我立刻意识到事情不妙。\n\n“[betrothed_1.Custom2('spoken_address_by_familiarity', ROOT.Char )|U]，我做不到。我不想嫁给[betrothed_1.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_2'))]！”\n\n"
 agot_engagement_events.0002.desc.beg:0 "[betrothed_1.GetHerHis]明显紧张但仍强作镇定，我示意[betrothed_1.GetFirstName]坐下，[betrothed_1.GetSheHe]便开始说道。\n\n“[betrothed_1.Custom2('spoken_address_by_familiarity', ROOT.Char )|U]，我……我一直在想关于[betrothed_1.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_2'))]的事，我……不想和[betrothed_2.GetHerHim]结婚。”\n\n"
 agot_engagement_events.0002.desc.mid:0 "我吃了一惊，“你为什么这么说？”\n\n"
 agot_engagement_events.0002.desc.nothing:0 "[betrothed_1.GetSheHe|U]扭着身子，但什么也没说。"
 agot_engagement_events.0002.desc.one:0 "“如果只能选一个的话？"
 agot_engagement_events.0002.desc.first:0 "“我该从何说起？"
 agot_engagement_events.0002.desc.second:0 "还有更多！"
 agot_engagement_events.0002.desc.third:0 "”\n\n“就这些吗？”我问。\n\n“还有！"
 agot_engagement_events.0002.desc.lover:0 "我……我已经心有所属了。[betrothed_1.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_lover'))]和我才是命中注定的一对。”"
 agot_engagement_events.0002.desc.end:0 "”[betrothed_1.GetSheHe|U]深吸一口气。\n\n“求您了，[betrothed_1.Custom2('spoken_address_by_familiarity', ROOT.Char )]！别逼我这么做！我想和一个我爱的[betrothed_2.Custom('WomanManGirlBoy')]结婚。我想要自己做决定！”"
 agot_engagement_events.0002.d:0 "[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_lover'))]会解除[betrothed_lover.GetHerHis]的婚约，转而与你成婚。"
 agot_engagement_events.0002.e:0 "我想[ROOT.Char.Custom2('direct_address_by_familiarity', SCOPE.sC('betrothed_lover'))]必须放弃[betrothed_lover.GetHerHis]的承诺，转而与你成婚。"
 agot_engagement_events.0002.f:0 "你疯了吗？！你得照我说的做！"
 agot_engagement_events.0002.f.tt:0 "[betrothed_1.GetShortUIName]可能会对你的命令反应不一"
 agot_engagement_events.0002.mild.tt:0 "[betrothed_1.GetFirstNameNoTooltip]伤心欲绝"
 agot_engagement_events.0003.opening.harsh:0 "[actor.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_engagement_events.0003.opening.apologetic:0 "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_engagement_events.0003.betrothed.start:0 "经过深思熟虑，我决定解除"
 agot_engagement_events.0003.betrothed.torejected:0 "我们的婚约。"
 agot_engagement_events.0003.betrothed.toliege:0 "我和你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('rejected_betrothed'))][rejected_betrothed.GetTitledFirstName]之间的婚约。"
 agot_engagement_events.0003.betrothed.end:0 "我向你保证，我这样做并未得到我的[actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('actor_liege'))][actor_liege.GetTitledFirstName]的同意，但我的生命已不再由[actor_liege.GetHersHis]掌控，这是我自己的决定。"
 agot_engagement_events.0003.start:0 "经过慎重考虑，我决定解除"
 agot_engagement_events.0003.torejected:0 "你和我的[actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('rejecting_betrothed'))][rejecting_betrothed.GetTitledFirstName]之间的婚约。"
 agot_engagement_events.0003.toliege:0 "我的[actor.Custom2('LMF_RelationToMeShort', SCOPE.sC('rejecting_betrothed'))][rejecting_betrothed.GetTitledFirstName]和你的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('rejected_betrothed'))][rejected_betrothed.GetTitledFirstName]之间的婚约。"
 agot_engagement_events.0003.end:0 "这完全是我[actor.Custom2('LMF_RelationToMePossessive', SCOPE.sC('rejecting_betrothed'))]的强烈坚持所致，对于我纵容[rejecting_betrothed.GetHerHis]的意愿造成的任何不便，我深表歉意。"
 agot_engagement_events.0006.b:0 "那么[betrothed_1.GetSheHe]别想分到我的遗产！"
 agot_engagement_events.0007.desc.incest:0 "“[betrothed_1.Custom2('spoken_address_by_familiarity', ROOT.Char )|U]，我不想和[betrothed_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_2'))]结婚。近亲结婚这事儿……”[betrothed_1.GetHerHis|U]的脸色沉了下来，尽管其明白家族传统，却也对此十分抵触。\n\n“这样才能保证血统纯正啊，亲爱的。” 我安慰道，但也立刻就意识到这番劝慰毫无用处。[betrothed_1.GetFirstNameNoTooltip]转过身子不去看我。\n\n“我才不想跟你一样，”[betrothed_1.GetSheHe]大口喘息着，“我才#bold 不想#!！”\n\n最后我总算劝住了[betrothed_1.GetHerHim]，至少我是这么认为的……"
 agot_engagement_events.0007.desc.normal:0 "“[betrothed_1.Custom2('spoken_address_by_familiarity', ROOT.Char )|U]，为什么我不能拥有一段像你那样的婚姻呢？”[betrothed_1.GetHerHis|U]的恳求像一道惊雷般击中了我。#italic 我怎么会想着逼迫[betrothed_1.GetFirstNameNoTooltip]去和[betrothed_1.GetHerHis]的[betrothed_1.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_2'))]结婚呢#!?\n\n“这太悖德了，而且……我不想要#bold [betrothed_2.GetHerHim]#!！”\n\n我告诉[betrothed_1.GetFirstNameNoTooltip]，我会好好考虑[betrothed_1.GetSheHe]所说的话……"
 agot_engagement_events.0007.desc.end:0 "然而清晨时分，我得知[betrothed_1.GetSheHe]已单方面取消了婚约。全都结束了。"
 agot_engagement_events.0007.b:0 "那么[betrothed_1.GetSheHe]别想分到我的遗产！"
 agot_engagement_events.0009.desc:0 "自我们分别后，与[betrothed_1.GetFirstNameNoTooltip]的争执一直沉重地压在我的心头。\n\n自那之后的几个小时里，我独坐书房，在脑海中反复回想这一幕。当[betrothed_1.GetSheHe]离开时，[betrothed_1.GetHerHis]脸上的表情……我本可以处理得更好些吗？\n\n我发呆没几会，突然传来急促的敲门声。我猛地一醒，期盼看到[betrothed_1.GetFirstNameNoTooltip]走进来，连道歉的话都已准备好。然而迎接我的是一名卫兵，其一脸……#italic 惊恐？还是难以置信？#!\n\n卫兵的话语如同决堤般奔涌而出：“[ROOT.Char.GetLadyLord]，您的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))]，[betrothed_1.GetSheHe]……有个仆人在[betrothed_1.GetHerHis]寝房里发现了[betrothed_1.GetHerHim]，而且……”然后声音突然哽咽，但我已然明白发生了什么。"
 agot_engagement_events.0010.opening:0 "[betrothed_1.Custom2('AppropriateGreetingNegative', ROOT.Char)]"
 agot_engagement_events.0010.start:0 "[betrothed_1.Custom2('spoken_address_by_familiarity', ROOT.Char )]，当你读到这封信时，我已经离开了[ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]。\n\n"
 agot_engagement_events.0010.leave:0 "你那些关于婚约的幻想，那些妄图掌控我一生的希望只会将我推得更远。我无法想象继续与你这样[ROOT.Char.Custom('InsultNoun')]的人共同生活。"
 agot_engagement_events.0010.wall:0 "你违背我意愿的联姻希望让我做出了决定，我将加入守夜人，他们不会把我当成筹码。"
 agot_engagement_events.0010.maester:0 "如果你想强迫我结婚来操纵我的命运，那你就太小看了我的决心与手段。也许在学城我会变得更好。"
 agot_engagement_events.0010.septon:0 "你想违背七位一体之神的意愿，把我当牲口一样交易。既然如此，你的选择也决定了我的去向：我今后将为信仰献身。"
 agot_engagement_events.0010.a.wall:0 "[betrothed_1.GetSheHe|U]宁愿披上黑衣也不愿结婚……"
 agot_engagement_events.0010.a.maester:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))]成为了一名学士……"
 agot_engagement_events.0010.a.septon:0 "我的[ROOT.Char.Custom2('LMF_RelationToMeShort', SCOPE.sC('betrothed_1'))]成为了僧侣……"
 agot_engagement_events.0010.a.leave:0 "如果那是[betrothed_1.GetSheHe]想要的，[betrothed_1.GetSheHe]就永远都不必再回来了！"
 agot_engagement_events.0010.b.leave:0 "[betrothed_1.GetSheHe|U]一定会回来的，我对此深信不疑。"
 agot_engagement_events.0021.opening:0 "[actor.Custom2('AppropriateGreeting', ROOT.Char)]"
 agot_engagement_events.0021.start:0 "我对此深思熟虑，但考虑到"
 agot_engagement_events.0021.self.ruler:0 "我的[actor.GetTitleAsNameNoTooltip]身份，"
 agot_engagement_events.0021.self.heir:0 "我作为未来继承人的身份，"
 agot_engagement_events.0021.self.default:0 "我的未来状态，"
 agot_engagement_events.0021.other.ruler:0 "我的[actor.Custom2('LMF_RelationToMePossessive', SCOPE.sC('rejecting_betrothed'))]目前为[rejecting_betrothed.GetTitleAsNameNoTooltip]，"
 agot_engagement_events.0021.other.heir:0 "我作为未来[actor.Custom2('LMF_RelationToMePossessive', SCOPE.sC('rejecting_betrothed'))]继承人的身份"
 agot_engagement_events.0021.other.default:0 "我[actor.Custom2('LMF_RelationToMePossessive', SCOPE.sC('rejecting_betrothed'))]未来的身份，"
 agot_engagement_events.0021.mid:0 "我必须采取行动，确保我宗族的未来。\n\n"
 agot_engagement_events.0021.self.withtarget:0 "要么我们订婚"
 agot_engagement_events.0021.self.withother:0 "要么我与[rejected_betrothed.GetTitledFirstName]订婚"
 agot_engagement_events.0021.other.withtarget:0 "要么你与[rejecting_betrothed.GetTitledFirstName]订婚"
 agot_engagement_events.0021.other.withother:0 "要么[rejecting_betrothed.GetTitledFirstNamePossessive]与[rejected_betrothed.GetTitledFirstName]订婚"
 agot_engagement_events.0021.matrilineal:0 "孩子必须跟着母亲"
 agot_engagement_events.0021.patrilineal:0 "孩子必须跟着父亲"
 agot_engagement_events.0021.end:0 "否则恐怕我只能违背条款了。"
 agot_engagement_events.0021.a:0 "很好，我同意你的条件。"
 agot_engagement_events.0021.a.matrilineal.tt:0 "[rejecting_betrothed.GetShortUINamePossessive|U]与[rejected_betrothed.GetShortUIName]的婚约将成为#EMP 母系#!"
 agot_engagement_events.0021.a.patrilineal.tt:0 "[rejecting_betrothed.GetShortUINamePossessive|U]与[rejected_betrothed.GetShortUIName]的婚约将成为#EMP 父系#!"
 agot_engagement_events.0021.a.title:0 "新订婚约已谈妥"
 agot_engagement_events.0021.b:0 "婚约可以解除，但我们的联盟应当继续。"
 agot_engagement_events.0021.b.tt:0 "与[actor.GetShortUIName]的同盟关系将#EMP 按协议维持#!，哪怕婚约解除后依然有效"
 agot_engagement_events.0021.c:0 "我绝不会重新谈判！你好大的胆子！！"