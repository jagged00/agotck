 agot_decision_events.1101_success:0 "[petition_vassal.GetName]说服[petition_liege.GetName]"
 agot_decision_events.1101_failure:0 "[petition_vassal.GetName]没能说服[petition_liege.GetName]"
 agot_decisions_events.1101_vassal_said_no_to_counter_offer:0 "[petition_vassal.GetName]已经拒绝了你的反提议！"
 agot_decisions_events.1100_this_is_my_title:0 "[petition_paramount.GetName]是我的，永远都是。"
 agot_decisions_events.1100_this_is_my_title_tt:0 "[petition_paramount.GetNameNoTooltip]的法理封臣不能再向你索要这一头衔。"
 agot_decisions_events.1100_this_is_my_title_opinion_tt:0 "[petition_paramount.GetNameNoTooltip]的法理封臣对你的好感度#N -50#!。"