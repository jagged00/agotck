 agot_appearance_decisions_events.4000.t:0 "委托制作一副面具"
 agot_appearance_decisions_events.4000.desc:0 "我发现自己又一次凝视着镜中毁容的脸。自从拆掉绷带并决定以真面目示人以来，我愈发频繁地陷入这种凝视。越看越是憎恶这张回望我的脸。熟悉的轮廓已被永久改变，我不知道该如何继续面对这样的自己。\n\n我明白必须采取行动拯救自己免受这种折磨。若我的注意力只能停留在每个倒影里那张狰狞可怖的脸上……我便无法继续统治。"
 agot_appearance_decisions_events.4000.a:0 "一副用来掩盖缺陷的面具会很适合我。"
 agot_appearance_decisions_events.4000.b:0 "必须遮住整张脸！"
 agot_appearance_decisions_events.4000.c:0 "不，我就是[disfigured_root.GetNameNoTooltip]！无需面具！"
 agot_appearance_decisions_events.4001.t:0 "以真面目示人"
 agot_appearance_decisions_events.4001.desc:0 "就像我戴上面具后的每天清晨所做的那样，把皮带套在头上，感受那冰冷无情的金属贴上我残缺的面孔。我重重叹了口气，穿过房间，从边桌上拿起手镜，举到面前。\n\n我厌恶地看着镜中的自己。一个怯于向世人展露[ROOT.Char.GetHerHis]真面目的懦夫……我已不止一次地想，或许该把面具留在房间里，就以这副模样去主持朝会。"
 agot_appearance_decisions_events.4001.a:0 "我要摘下面具，重新以真面目示人！"
 agot_appearance_decisions_events.4001.b:0 "不，我不能暴露这个。"
 agot_hair_dye.hibiscus_hair_dye_hash:0 "木槿花色"
 agot_appearance_decisions_events.5000.t:0 "独眼注视世界"
 agot_appearance_decisions_events.5000.desc:0 "我审视着镜中的自己，不确定这是否是展现失去眼睛的恰当方式。也许另一种选择更适合我。\n\n面前摆着几个眼罩。我必须做出选择，是拿起其中之一，还是就这样面对王国。"
