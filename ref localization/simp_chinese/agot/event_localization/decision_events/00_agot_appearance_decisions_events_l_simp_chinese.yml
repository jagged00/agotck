 agot_appearance_decisions_events.1000.t:0 "色彩鲜艳的染剂"
 agot_appearance_decisions_events.1000.desc:0 "几十种美妙炫目的染剂摆在我面前，宛如一道彩虹。我在思考哪一种染剂最适合我，没过一会，一位仆人轻拍我的肩膀。“[ROOT.Char.GetLadyLord|U]，您看上哪一款颜色了呢？”"
 agot_appearance_decisions_events.1000.a:0 "红色。"
 agot_appearance_decisions_events.1000.b:0 "橙色。"
 agot_appearance_decisions_events.1000.c:0 "黄色。"
 agot_appearance_decisions_events.1000.d:0 "看看更多颜色。"
 agot_appearance_decisions_events.1000.e:0 "我想保持原生头发似乎不错。"
 agot_appearance_decisions_events.1000.f:0 "还是算了。"
