l_simp_chinese:
 agot_pirate_events.9201.t:0 "凄凉的冒险"
 agot_pirate_events.9201.desc:0 "“大人，”[colonist.GetName]疲惫地叹了口气，开口道：“这片土地天生就是海盗与掠袭者的巢穴，根本不适合农夫和商人讨生活。这里土壤贫瘠，海岸凶险，海盗至今还在近海与山林里流窜作乱。没有您的援助，我实在无力让此地兴旺——即便有您相助，恐怕到头来也是得不偿失。”\n\n若是伸出援手，我便能将这片土地牢牢掌控在治下。可要是真如[colonist.GetFirstNameNoTooltip]言这般贫瘠，投入的成本真的能回本吗？但话说回来，身为君主，庇佑危难中的封臣本就是我的职责。若是连这点本分都做不到，谁也说不准这些封臣还能效忠多久，甚至还能不能算得上是我的封臣。"
 agot_pirate_events.9201.a:0 "我将给你需要的资金。"
 agot_pirate_events.9201.b:0 "这是你的职责，你从我这里什么都得不到。"
 agot_pirate_events.9201.b.tt:0 "[colonist.GetTitledFirstNameNoTooltip]可能不喜欢你的决定。"
 agot_pirate_events.0003.t:0 "港口关税"
 agot_pirate_events.0003.desc:0 "我抵达了[port_name.GetName]的海盗避风港。\n\n当我踏上码头时，有人告知我必须支付一次性停靠费#P [SCOPE.GetValue('port_docking_fee')|0]#!@gold_icon!，以及目前标注为#P [SCOPE.GetValue('yearly_port_fee')|0]#!@gold_icon!的年费。\n \n年费可能根据港口所有者的心血来潮突然改变，并根据我的船只大小计算。\n\n我得到警告，如果不支付年费，可能因此遭到#N 囚禁#!！"
 agot_pirate_events.0003.a:0 "明白了。"
 agot_pirate_events.0004.t:0 "港口关税"
 agot_pirate_events.0004.desc:0 "又到了支付年度港口费用的时候了。我必须向[port_holder.GetName]支付#P [SCOPE.GetValue('yearly_port_fee')|0]#!@gold_icon!。"
 agot_pirate_events.0004.a:0 "我会付钱。"
 agot_pirate_events.0004.b:0 "我拒绝付钱。"
 agot_pirate_events.0004.c:0 "也许可以利用自己的筹码免去这笔钱……"
 agot_pirate_events.0004.c_tt:0 "使用你掌握的针对[port_holder.GetShortUIName]的[strong_hook|E]，从而免去今年的应付费用。"
 agot_pirate_events.0100.t:0 "成为海盗"
 agot_pirate_events.0100.desc:0 "我放弃了冒险者的生活，投身于海盗的行列。"
 agot_pirate_events.0100.a:0 "海盗的生活很适合我。"
 agot_pirate_events.0101.t:0 "奔向大海"
 agot_pirate_events.0101.desc:0 "我舍弃了自己的头衔和领地，成为一名无地船长，从此与大海和战船为伴。"
 agot_pirate_events.0101.a:0 "终于过上了海盗生活！"
 agot_pirate_auto_join_port_war_interface_toast_title:0 "加入防御战争"
 agot_pirate_auto_join_port_war_interface_toast:0 "你已经自动加入港口所在地的战争。"
 agot_pirate_events.0200.t:0 "驱逐"
 agot_pirate_events.0200.desc:0 "[port_name.GetName]的统治者，[actor.GetName]，已颁布法令，命令我立刻离开港口，否则将被投入大牢！"
 agot_pirate_events.0200.a:0 "那我去[new_destination.GetName]好了。"
 agot_pirate_events.0200.b:0 "[actor.GetHerHim]有本事就来抓我！"
 agot_pirate_events.0200.c:0 "我别无选择；或许是时候金盆洗手了。"
 agot_pirate_events.0200.msg_pirate_moved_title:0 "海盗离港"
 agot_pirate_events.0200.msg_pirate_moved_desc:0 "[recipient.GetName]已遵从你的要求，离开了[port_name.GetNameNoTooltip]！"
 agot_pirate_events.0200.msg_pirate_squatting_title:0 "海盗拒不离开"
 agot_pirate_events.0200.msg_pirate_squatting_desc:0 "[recipient.GetName]拒绝离开[port_name.GetNameNoTooltip]！你可以尝试通过[character_interaction|e]强行夺取其住所。"
 agot_pirate_events.0200.msg_pirate_renouncd_piracy_title:0 "海盗金盆洗手"
 agot_pirate_events.0200.msg_pirate_renouncd_piracy_desc:0 "在你试图将[recipient.GetName]逐出[port_name.GetNameNoTooltip]后，对方宣告放弃海盗生涯，如今成了一位[adventurer|e]。"
 agot_pirate_events.0300.t:0 "拒缴港口费"
 agot_pirate_events.0300.desc:0 "停靠在我港口的海盗[pirate.GetName]拒绝向我缴纳每年#P [SCOPE.GetValue('yearly_port_fee')|0]#!@gold_icon!的费用。"
 agot_pirate_events.0300.a:0 "我暂时睁一只眼闭一只眼。"
 agot_pirate_events.0300.b:0 "扣押他们的船，并逮捕[pirate.GetHerHim]。"
 agot_pirate_events.9000.t:0 "新船长上任"
 agot_pirate_events.9000.desc:0 "[dying_pirate_predecessor.GetName]船长去世了！我已被授予#italic [ROOT.Char.GetPrimaryTitle.GetNameNoTier]#!的指挥权，现在作为他们的船长进行统治。"
 agot_pirate_events.9000.desc_maa_reset:0 "\n\n尽管我迅速赢得了整个#italic [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip]#!对我船长地位的认可，但曾效忠于[dying_pirate_predecessor.GetNameNoTooltip]的大部分久经沙场的兵士已经离去，去别处寻求新的挑战。\n\n然而，希望并未完全破灭。我前任船长的死讯也开始吸引新的流浪战士，他们渴望向我效忠。"
 agot_pirate_events.9000.a:0 "我的旅程开始了！"
