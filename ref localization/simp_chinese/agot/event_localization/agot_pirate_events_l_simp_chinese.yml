 agot_pirate_events.9300.t:0 "生存威胁"
 agot_pirate_events.9300.desc:0 "[attacker.GetName]发动了入侵，打击该地区的海盗活动。鉴于他们带来的严重威胁，我们已自动与宗主[defender.GetName]联手！\n\n如果我们战败，我们的领地将沦为荒野，海盗船队也将分崩离析。"
 agot_pirate_events.9300.a:0 "我们必须取胜！"
