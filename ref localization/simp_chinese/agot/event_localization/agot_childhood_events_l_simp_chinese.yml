l_simp_chinese:
 agot_childhood_events.0001.t:0 "硬币之掷"
 agot_childhood_events.0001.desc:0 "每当一位[GetPlayer.GetHouse.GetBaseName]降生，诸神就会将硬币抛向空中；一面通往伟大，一面通往疯狂。\n\n[child.Custom('CoinFlipChild')]"
 agot_childhood_events.0002.t:0 "$agot_childhood_events.0001.t$"
 agot_childhood_events.0002.desc:0 "每当一位[GetPlayer.GetHouse.GetBaseName]降生，诸神就会将硬币抛向空中；一面通往伟大，一面通往疯狂。而整个世界都将屏息观察结果。\n\n现在看来，硬币落在了好的那面……[child.GetFirstName][child.Custom('CoinFlip')]"
 agot_childhood_events.0002.a:0 "我们将带着兴趣关注他的职业生涯。"
 agot_childhood_events.0003.t:0 "$agot_childhood_events.0001.t$"
 agot_childhood_events.0003.desc:0 "每当一位[GetPlayer.GetHouse.GetBaseName]降生，诸神就会将硬币抛向空中；一面通往伟大，一面通往疯狂。而整个世界都将屏息观察结果。\n\n现在看来，硬币落得……不怎么好。[child.GetFirstName]几乎成了疯狂的写照。"
 agot_childhood_events.0003.a:0 "[GetPlayer.GetHouse.GetBaseName]家族的不幸！"
 coin_flip_diligent:0 "似乎天生勤奋，对一切事物都很投入。"
 coin_flip_learning:0 "似乎对学识方面很有天赋。"
 coin_flip_martial:0 "似乎对军事方面很有天赋。"
 coin_flip_intrigue:0 "似乎对谋略方面很有天赋。"
 coin_flip_stewardship:0 "似乎对管理方面很有天赋。"
 coin_flip_diplomacy:0 "似乎对外交学习很有天赋。"
 coin_flip_prowess:0 "似乎天生擅长刀剑。"
 coin_flip_shrewd:0 "似乎对任何事物都很有天赋。"
 coin_flip_genius:0 "似乎对任何事物都有令人震惊的洞察力。"
 agot_childhood_events.0004.t:0 "种姓强韧……"
 agot_childhood_events.0004.desc:0 "随着[child.GetFirstName]不断长大，我觉得[child.GetHerHim]长得越来越不像我。[child.GetSheHe]真的是我的种吗？"
 agot_childhood_events.0004.a:0 "转念一想，也许这根本不算什么……"
 agot_childhood_events.0004.b:0 "我必须知道真相！"
 agot_childhood_events.0004.b.success:0 "如果你的孩子不是你的，你会知道这个秘密"
 agot_childhood_events.0004.b.success.bastard.t:0 "调查成功"
 agot_childhood_events.0004.b.success.bastard.desc:0 "[child.GetFirstName]实际上是[real_father.GetFullName]的种！"
 agot_childhood_events.0004.b.success.notbastard.t:0 "调查成功"
 agot_childhood_events.0004.b.success.notbastard.desc:0 "[child.GetFirstName]确实是我的孩子！"
 agot_childhood_events.0004.b.failure:0 "你没找到任何证据"
 agot_childhood_events.0004.b.failure.t:0 "调查失败"
 agot_childhood_events.0004.b.failure.desc:0 "你没找到任何证据。"
 agot_childhood_events.0004.c:0 "人人都该知道真相！"
 agot_childhood_events.0004.c.tt:0 "你将公开指控你的孩子是私生子。"
 agot_childhood_events.0004.c.tt.1:0 "没有人相信你，你的封臣认为这是场可耻的指控。"
 agot_childhood_events.0004.c.tt.2:0 "大家相信你的指控"
 agot_childhood_events.0004.c.failure.t:0 "指控失败"
 agot_childhood_events.0004.c.failure.desc:0 "没有人相信你，你被视为一个无耻的骗子。"
 agot_childhood_events.0004.c.success.t:0 "指控成功"
 agot_childhood_events.0004.c.success.desc:0 "大家相信了你的指控。[child.GetFirstName]获得有争议的血统特质。"
 agot_childhood_events.0004.d:0 "是不是我的孩子都一样。"
 agot_childhood_events.0004.d.tt:0 "如果你的妻子有有争议的血统秘密，其将会失效。"
 agot_childhood_events.0001.a:0 "这样啊……"
 coin_flip_child_diligent:0 "诅咒[ROOT.Char.GetFaith.HighGodName]！我并没有什么特别的天赋，但我知道抱怨是没有用的。每个白天都是我要征服的目标，每个夜晚都是我将面临的机遇——我#italic 将#!依靠我的双手坚持下去！"
 coin_flip_child_learning:0 "如果说我有什么地方比较疯狂的话，大概就是我总忍不住想读书……等等，[GetPlayer.GetHouse.GetBaseName]家族会表现出这样的疯狂举动吗？我得去图书馆看看有没有类似的记载！"
 coin_flip_child_martial:0 "就在今天，宫廷里的骑士聚在一起演习围攻城堡。我在城墙上看着这出“战斗”不断进行，我感觉自己快被逼疯了！他们所有的决断都漏洞百出，这么简单的进攻方案他们就没想到吗？#italic 他们是傻子吗？#!"
 coin_flip_child_intrigue:0 "两个廷臣在宫廷里交换着微妙的目光，可能他们自己都没有意识到，但他们的婚外情关系已经暴露无遗，任何明眼人都能看出来……至少我是这么以为的。但当我向宫廷里的另一个[ROOT.Char.Custom('GirlBoy')|l]提起这件事时，[ROOT.Char.GetSheHe]却根本不明白我在说什么。我在想，是不是我更容易注意到这些事情？"
 coin_flip_child_stewardship:0 "在和一位我记不得名字的管家在账目上兜了几个小时的圈子后，我的头开始痛，我真心渴望睡觉。“你这个年纪，在钱币方面的知识真是渊博”，如果我再也不用听他反复说这种话，我大概会马上高兴得死去。"
 coin_flip_child_diplomacy:0 "没有什么事比讲故事更有趣，我的听众尤其喜欢听我讲英雄纪元的故事。尽管有的故事他们已经听过无数遍了，但他们仍然愿意听我讲的每一句话……我敢说我在这方面很有一套！"
 coin_flip_child_prowess:0 "我的思绪又一次飘到了剑术上。攻击！招架！#bold 反击！#!我的骑士在决斗时，我看过多少次同样的动作了？当我终于有机会亲自上场时，我的回答很简单：招架！反击！#bold 你打得不错！#!"
 coin_flip_child_shrewd:0 "我和我的摄政争论了一遍又一遍，收买囚犯作为间谍而不是直接处决他们是有道理的。然而，我每次得到的答复都是：[ROOT.Char.GetLadyLord]的职责是行使正义。要是每个人都能明白如何#italic 务实地#!行使正义就好了。"
 coin_flip_child_genius:0 "我所探索的每一门学科似乎都对我毫无保留，任由我撷取果实。我该怎么做好演讲？我该怎么规划军队部署？我该怎么策划密谋？我该怎么理解某个理论？我可怜的摄政甚至都跟不上我的思路！#bold 很好。#!"
 coin_flip_child_lunatic_1:0 "无头的国王又坐在房间的角落里看着我。在我醒来时，我能感觉到他的目光；在我思考时，我能感觉到他的思绪；在我入睡时，我能感觉到他的声音。他讲述的故事慢慢地让我平静下来，他讲述着我的天赋，他讲述着我们是多么的相似！他讲得越多，我越能理解他话里的真实。"
 coin_flip_child_possessed_1:0 "为什么廷臣们总喜欢看着我们在大厅里跳来跳去？他们是发现我们的特别之处了吗？不，不，当然不是。但如果他们真的发现了呢？没人能发现的。到时候他们会把我们分开，我能感觉到。那我们今晚得计划一下。"
 coin_flip_child_arbitrary:0 "谁谁有天赋，谁谁又疯狂。真是无聊透顶。真的，而且很幼稚！一个人怎么知道自己是不是呢？又没有什么客观的标准。所以宫廷里的那些人为什么总是不停在谈论这件事呢？我想说的是，谁真的在乎呢？我当然是不在乎，这才是最重要的。"
 coin_flip_child_paranoid:0 "我睡不着觉，也不想吃喝，甚至不能思考。我能感觉到廷臣们看我的眼神。他们都等着看硬币的正反面。他们快把我逼疯了！但是……我也忍不住想知道，真的是我疯了吗？这真的是硬币反面的标志吗？这一定是一个被编造出来的愚蠢故事，只是为了让宫廷里的孩子守规矩而已。才没有所谓[GetPlayer.GetHouse.GetBaseName]家族的疯狂呢……对吧？"
 coin_flip_child_wrathful:0 "整整三周，我一直在学习[GetPlayer.GetHouse.GetBaseName]家族历史的同一部分内容。在这种辅导下我的耐心越来越少了。今天，我无意中听到我的摄政和一些廷臣谈话，他们说我在任何领域都没有才能。如果他们管不好自己的舌头，那我就得替他们管管了。"
 coin_flip_child_fire_obsessed:0 "我曾在宫廷里听到过关于[GetPlayer.GetHouse.GetBaseName]家族天赋的窃窃私语，但我还从未在自己身上发现过这些天赋。每当我凝视闪烁的火焰，我看到……各种景象。我不知道那是什么，但熊熊燃烧的火焰一定在试图告诉我什么，或者警告我什么？我想只有在真正的大火中，我才能找到答案。"
 agot_childhood_events.0007.t:0 "宫廷里的颜色"
 agot_childhood_events.0007.desc.courtier:0 "[dyed_hair.GetNamePossessive]的头发使[dyed_hair.GetHerHim]成为了任何房间里的焦点。"
 agot_childhood_events.0007.desc.sellsword:0 "最近，宫廷里来了一个自由贸易城邦的旅行佣兵，我不禁注意到[dyed_hair.GetHerHis]那难以置信的头发颜色！"
 agot_childhood_events.0007.a:0 "或许我也应该试试……"
 agot_childhood_events.0007.tt:0 "你将把自己的头发染成自由贸易城邦风格！"
 agot_childhood_events.0007.b:0 "这种浮夸的风格只会招人嘲笑。"
 agot_childhood_events.0008.t:0 "傻瓜般的发色"
 agot_childhood_events.0008.desc:0 "我走在[home.GetNameNoTooltip]的大厅里时，眼角余光瞥见一片奇怪的颜色一闪而过。我才发现是我的[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('dyed_hair'))]，[dyed_hair.GetFirstName]，[dyed_hair.GetHerHis]把头发染成了某种可笑的颜色，让我差点不小心闪断脖子。\n\n“你觉得怎么样，[dyed_hair.Custom2('RelationToMeShort', ROOT.Char)]？这是现在厄斯索斯自由贸易城邦最流行的风格。”"
 agot_childhood_events.0008.a:0 "如果这就是你想要的……"
 agot_childhood_events.0008.b:0 "你必须马上去把头发上的颜料洗掉！"
 agot_childhood_events.0008.c:0 "你看起来真棒！"
 agot_childhood_events.0008.c.tt:0 "你也要染下头发！"
 agot_childhood_events.0009.t:0 "被监护人的教育"
 agot_childhood_events.0009.desc:0 "你坐在房间里，思索着你年幼孩子的未来时，一个令人不安的想法掠过你的脑海。[ward.GetFirstName]成长飞快，很显然，[ward.GetSheHe]需要教育来引导[ward.GetHerHis]今后的成长方向。是时候决定由谁来承担这项至关重要的任务了。"
 agot_childhood_events.0009.a:0 "我来怎么样？"
 agot_childhood_events.0009.a.tt:0 "也许应该由你引导[ward.GetFirstName]度过这个动荡的人生阶段。你的经验和智慧会塑造[ward.GetHerHis]的性格，将[ward.GetHerHim]培养成一位有价值的继承人。"
 agot_childhood_events.0009.b:0 "[guardian.GetFirstName]来怎么样？"
 agot_childhood_events.0009.b.tt:0 "你的思绪飘向了以智慧和正直著称的[guardian.GetFirstName]。把[ward.GetFirstName]托付给[guardian.GetHerHis]教育，[ward.GetFirstName]肯定会有一个充满成长和学习机会的光明未来。"
 agot_childhood_events.0009.c:0 "让其他人来吧。"
 agot_childhood_events.0009.c.tt:0 "你会找到其他人来承担这个责任的。"
 agot_childhood_events.0009.d:0 "我还没有拿定主意。"
 agot_childhood_events.0009.d.tt:0 "你肩负着沉重的责任，这种关键的时候往往犹豫不决。也许现在最好推迟这件事情，你还需要更多的时间思考。"
 child_personality.keeps_authoritative_tt: "[child.GetFirstName]保留[GetTrait('authoritative').GetName( child.Self )]特质"
 child_personality.keeps_rude_tt: "[child.GetFirstName]保留[GetTrait('rude').GetName( child.Self )]特质"
 child_personality.keeps_inquisitive_tt: "[child.GetFirstName]保留[GetTrait('inquisitive').GetName( child.Self )]特质"
 agot_child_personality_events.2010.t: "争吵的仆人"
 agot_child_personality_events.2010.guardian: "[guardian.GetTitledFirstName]将两名仆人带到我这，他们在大厅对面怒视着对方，脸涨得通红。我看到窗帘似乎染上了青亭岛葡萄酒，而他们彼此推诿责任。他们都不愿处理这一污渍，而仆人们的愤怒情绪有损士气。[guardian.GetFirstNameNoTooltip]让我解决这一争端，以此来考验我。"
 agot_child_personality_events.2010.no_guardian: "两名仆人冲进我的房间，他们的脸因愤怒而涨得通红。每个人都声称对方昨晚在打扫时用一杯青亭岛葡萄酒弄脏了窗帘。毫无疑问，这场争端会对士气造成不利影响，我必须迅速作出回应。"
 agot_child_personality_events.2010.a: "你们应该共同承担清洁的工作。"
 agot_child_personality_events.2010.b: "你们都被解雇了！"
 agot_child_personality_events.2010.c: "昨晚谁值班？"
 agot_child_personality_events.201.desc: "我的[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))]，[child.GetFirstName]，再次面临了对[child.GetHerHis]能力的考验。两个仆人产生争端，双方都声称对方将青亭岛葡萄酒洒在了一套昂贵的窗帘上。他们在众目睽睽之下大声争执并挥拳相向。"
 agot_child_personality_events.2011.t: "$agot_child_personality_events.2010.t$"
 agot_child_personality_events.201.authoritative: "[child.GetFirstNameNoTooltip]命令他们擦洗窗帘，并要求他们停止争执。[child.GetSheHe|U]不仅决策果断，而且[child.GetHerHis]的命令迅速得到了遵从。"
 agot_child_personality_events.201.confirm_authoritative: "你将成为一位鼓舞人心的领导者。"
 agot_child_personality_events.201.authoritative_change: "如果你想统治，就必须展现出领导的才能。"
 agot_child_personality_events.2012.t: "$agot_child_personality_events.2010.t$"
 agot_child_personality_events.201.rude: "[child.GetFirstNameNoTooltip]反应激烈，对所有仆人大喊大叫，因为他们自己没能解决这么简单的问题。[child.GetSheHe|U]没有注意到仆人们脸上沮丧的表情，因为[child.GetSheHe]轻率地驳回了他们的争端，全然不顾他们的感受。"
 agot_child_personality_events.201.confirm_rude: "这就对了，[child.Custom('GirlBoy')]，他们毫无价值。"
 agot_child_personality_events.201.rude_change: "你不应该浪费哪怕一丁点时间在他们身上。"
 agot_child_personality_events.2013.t: "$agot_child_personality_events.2010.t$"
 agot_child_personality_events.201.inquisitive: "[child.GetFirstNameNoTooltip]召集了仆人们，迅速查明了昨晚的值班人员，并让他们清理现场的污渍。[child.GetSheHe|U]在做出决定或下达命令前，仔细收集了更多信息，展现出体谅和机智。"
 agot_child_personality_events.201.confirm_inquisitive: "你今天展现了你的智慧。"
 agot_child_personality_events.201.inquisitive_change: "要解决问题，你必须找到问题的根源。"
 agot_childhood_events.0011.t:0 "前途的流星"
 agot_childhood_events.0011.desc:0 "我看着[prodigy.GetFirstName]在庭院里训练，[prodigy.GetHerHis]步伐稳健，挥剑行云流水。\n\n在同龄人还是无头苍蝇般胡乱挥剑的同一年级，[prodigy.GetSheHe|U]已像个老练剑客，这是家族的骄傲，而我也相信这孩子迟早可以继承[dawn.GetName]，获得「拂晓神剑」的称号。\n\n如果持续对[prodigy.GetHerHim]施压，[prodigy.GetSheHe]可能蜕变，也可能过刚易折，我该赌一把吗？"
 agot_childhood_events.0011.a:0 "[prodigy.GetHerHis|U]真正的训练现在开始。"
 agot_childhood_events.0011.a.tt:0 "你将带[prodigy.GetHerHim]走上成为「拂晓神剑」的道路"
 agot_childhood_events.0011.b:0 "[prodigy.GetSheHe|U]还是个孩子，我会让[prodigy.GetHerHim]自己决定之后的路。"
 agot_childhood_events.0011.b.tt:0 "[prodigy.GetFirstNameNoTooltip]将按照一般孩子那样培养"
 agot_childhood_events.dragon_doll:0 "龙玩偶："
 agot_childhood_events.0020.t:0 "$agot_childhood_events.dragon_doll$没龙的孩子"
 agot_childhood_events.0020.desc_dragons_live:0 "依照古瓦雷利亚的习俗，[child.GetFirstName]本应在儿时便与巨龙结成纽带，然而时至今日，[child.GetSheHe]依旧未与龙相伴。\n\n我真为这孩子揪心。只是，与巨龙的缘分即便我身为[ROOT.Char.GetTitleAsNameNoTooltip]也无法强行赐予[child.GetHerHim]。但一定有办法能弥补这个缺憾，守住先祖传下的传统；或许我可以为这孩子找到一份更合他心意的礼物……"
 agot_childhood_events.0020.desc_dragons_dead:0 "曾几何时，瓦雷利亚人驭龙而行，统治着陆地与天空。但如今巨龙皆已绝迹。\n\n然而，龙仍是我们身份的象征，代表着我们的力量与使命。也许，有办法让[child.GetFirstName]爱上[child.GetHerHis]身上的传承……"
 agot_childhood_events.0020.a:0 "那孩子会得到一条龙！"
 agot_childhood_events.0020.a.tt:0 "你将开始为[child.GetNameNoTooltip]制作一个龙玩偶。"
 agot_childhood_events.0020.ignore:0 "不敬！龙可不是玩具！"
 agot_childhood_events.0021.t:0 "$agot_childhood_events.dragon_doll$[newly_created_artifact.GetNameNoTooltip]"
 agot_childhood_events.0021.desc_simple:0 "我缝上最后一颗纽扣眼睛时，手不住地颤抖，随后将松散的线头打了个结。玩偶终于完成了……我能看到这份礼物里满是自己缝进去的瑕疵，但也只能这样了。\n\n第二天早上，我等着[child.GetFirstName]起床。[child.GetSheHe]刚一动弹，我就拿出了给[child.GetHerHim]准备的礼物。[child.GetSheHe|U]立刻从我怀里抢了过去，兴奋地抱着玩偶。\n\n[child.GetHerHis|U]的喜悦像暖流一样包裹了我。即便这玩偶满是瑕疵，但为了这一刻，我在制作它时付出的一切都值得了。"
 agot_childhood_events.0021.desc_exquisite:0 "我小心翼翼地剪断最后一根线，端详着手中的玩偶，我长呼一口气。它完美无瑕，我如释重负，心中涌起一阵喜悦。\n\n我将[child.GetFirstName]从睡梦中唤醒，急切地将玩偶塞进[child.GetHerHis]手中。[child.GetSheHe|U]开心地咯咯笑着，把玩偶抛来抛去，最终又沉沉睡去，怀里紧紧抱着这个新玩偶。[child.GetHerHis|U]的兴奋之情溢于言表，为了这个，任何代价都是值得的。"
 agot_childhood_events.0021.a:0 "哦，我的小心肝……"
 agot_childhood_events.0021.a.callous:0 "这对[child.GetHerHim]有好处！"
 agot_childhood_events.0021.desc_chosen_dragon:0 "\n\n尽管只是[chosen_dragon.GetNameNicknamed]的仿制品，但[child.GetFirstNameNoTooltip]已经和这只玩偶建立了深厚的感情，仿佛它是从襁褓中养大的幼龙一般。"
 agot_childhood_events.0021.desc_named_dragon:0 "\n\n[child.GetFirstNameNoTooltip]还亲昵地给这条龙取了个名字：[newly_created_artifact.GetNameNoTooltip]。"
 agot_childhood_events.0022.t:0 "$agot_childhood_events.dragon_doll$龙的价值"
 agot_childhood_events.0022.desc:0 "龙是由火焰凝结肉身的传奇巨兽，但这样的材料会毁了玩偶的……我该用什么代替它们呢？"
 agot_childhood_events.0022.a:0 "我会用上最好的材料！丝绸和珠宝！"
 agot_childhood_events.0022.a.tt:0 "玩偶的品质#V #Bold 显著提升#!#!"
 agot_childhood_events.0022.b:0 "当然，我们用不上金线……"
 agot_childhood_events.0022.b.tt:0 "玩偶的品质#V #Bold 略微提升#!#!"
 agot_childhood_events.0022.c:0 "我们不能将就着用库存里的材料吗？"
 agot_doll_quality_significantly_increased:0 "玩偶的品质#V #Bold 显著提升#!#!"
 agot_doll_quality_slightly_increased:0 "玩偶的品质#V #Bold 略微提升#!#!"
 agot_doll_quality_slightly_decreased:0 "玩偶的品质#V #Bold 略微下降#!#!"
 agot_doll_quality_significantly_decreased:0 "玩偶的品质#V #Bold 显著下降#!#!"
 agot_childhood_events.0023.t:0 "$agot_childhood_events.dragon_doll$龙的设计"
 agot_childhood_events.0023.desc:0 "对于这样一个精细入微、细节繁复的项目，时间和金钱同样重要。鉴于我肩负的职责，或许不得不减少在宫廷的事务，以便专注于我的技艺。我该如何分配我的时间呢？"
 agot_childhood_events.0023.a:0 "我会把所有空闲时间都用上！"
 agot_childhood_events.0023.b:0 "每一个都将得到同等的重视"
 agot_childhood_events.0023.c:0 "这不过是个爱好而已"
 agot_childhood_events.0024.t:0 "$agot_childhood_events.dragon_doll$鲜艳色彩"
 agot_childhood_events.0024.desc_dragons_live:0 "龙以其独特的色彩而闻名。从[GetScriptedCharacterByHistoryID('dragon_balerion').GetNameNicknamedPossessive]那赫赫有名的火焰，到[GetScriptedCharacterByHistoryID('dragon_silverwing').GetName]闪耀的鳞片，我不禁想，或许需要一种更加鲜艳的图案；毕竟，这是一个孩子的玩偶。"
 agot_childhood_events.0024.desc_dragons_dead:0 "当龙还存在于世时，它们便以其独特的色彩而闻名。从[GetScriptedCharacterByHistoryID('dragon_balerion').GetNameNicknamedPossessive]那赫赫有名的火焰，到[GetScriptedCharacterByHistoryID('dragon_silverwing').GetName]闪耀的鳞片，我不禁想，或许需要一种更加鲜艳的图案；毕竟，这是一个孩子的玩偶。"
 agot_childhood_events.0024.desc_fallback:0 "龙以其独特的色彩而闻名，我不禁想，或许需要一种更加鲜艳的图案；毕竟，这是一个孩子的玩偶。"
 agot_childhood_events.0024.a:0 "颜色越多越好！"
 agot_childhood_events.0024.a.tt:0 "你将尝试一种复杂的配色方案。"
 agot_childhood_events.0024.a.vibrant_success.tt: "奇怪，这种鲜艳的图案竟然很合适。"
 agot_childhood_events.0024.a.vibrant_fail.tt: "有些颜色不太协调。"
 agot_childhood_events.0024.a.vibrant_major_fail.tt: "配色方案不协调。"
 agot_childhood_events.0024.b:0 "几种颜色，用于变化。"
 agot_childhood_events.0024.b.tt:0 "你将尝试一种多样化的配色方案。"
 agot_childhood_events.0024.b.simple_success.tt:0 "这些颜色相得益彰。"
 agot_childhood_events.0024.b.simple_neutral.tt:0 "这些颜色并不出彩。"
 agot_childhood_events.0024.b.simple_fail.tt:0 "这些颜色相互冲突。"
 agot_childhood_events.0024.c:0 "确实让人无从反驳……"
 agot_childhood_events.0024.c.tt:0 "你将满足于单一的配色方案。"
 agot_childhood_events.0025.t:0 "$agot_childhood_events.dragon_doll$拖延"
 agot_childhood_events.0025.desc:0 "当我经过[child.GetFirstNamePossessive]的房间时，我皱起了眉头，想起了那个龙玩偶——它还未完成，背上插着一根针，被我藏在房间的某个角落。事实上，我正挣扎着寻找任何动力来完成这个项目。\n\n每次这个想法闪过脑海，我都会责备自己。未完成工作的阴影笼罩着我，阻碍着我的每一步行动；在它被完成或被丢弃之前，我无法专注于任何其他事情，而不被内疚吞噬。\n\n一方面，自律——从简单地拿起针开始——这可能是关键。然而，寻找一个新的项目似乎更有吸引力。也许如果我学习一项新技能，我就能找到完成这个布偶的灵感。"
 agot_childhood_events.0025.a:0 "加把劲，玩具不会自己做完的"
 agot_childhood_events.0025.a.push_success:0 "你在玩具制作中取得重大进展"
 agot_childhood_events.0025.a.push_fail:0 "你没能找到动力"
 agot_childhood_events.0025.a.push_major_fail:0 "你把自己累坏了。"
 agot_childhood_events.0025.b:0 "我一直想学学木雕。"
 agot_childhood_events.0025.b.wood_success:0 "你精神焕发地回到玩具旁。"
 agot_childhood_events.0025.b.wood_neutral:0 "你玩得很开心，但这并没有什么帮助。"
 agot_childhood_events.0025.b.wood_fail:0 "你变得过度沉迷于木雕。"
 agot_childhood_events.0025.c:0 "我最终……会完成它的。"
 agot_childhood_events.0025.c.later_success:0 "你精神焕发地回来了。"
 agot_childhood_events.0025.c.later_neutral:0 "你难以找到动力。"
 agot_childhood_events.0025.c.later_fail:0 "项目被遗忘在身后，永远都不会完成。"
 agot_childhood_events.0026.t:0 "$agot_childhood_events.dragon_doll$龙体解剖学"
 agot_childhood_events.0026.desc:0 "龙是可怕的猛兽，它们展开双翼在天空中翱翔，翅膀之大足以遮住太阳。每当龙翼扇动，远在其身影掠过地平线之前，所有目睹之人都会惊慌失措地四散躲避。要用毛绒玩具呈现如此恐怖实非易事，但我得先确定下龙的翼展尺寸。"
 agot_childhood_events.0026.a:0 "越大越好！"
 agot_childhood_events.0026.a.large_success.tt: "翼展显得很合身。"
 agot_childhood_events.0026.a.large_fail.tt: "翅膀太大了，让人感到很不舒服。"
 agot_childhood_events.0026.a.large_major_fail.tt: "它们看起来更像山羊耳朵。"
 agot_childhood_events.0026.small:0 "小巧可爱才是王道。"
 agot_childhood_events.0026.small.large_success.tt: "翼展显得很合身。"
 agot_childhood_events.0026.small.large_fail.tt: "翅膀太小了，看着不舒服。"
 agot_childhood_events.0026.small.large_major_fail.tt: "它们看起来更像鱼鳍。"
 agot_childhood_events.0026.b:0 "当然，它应该与实物等比例。"
 agot_childhood_events.0026.b.proportional_success.tt: "翼展的比例恰到好处。"
 agot_childhood_events.0026.b.proportional_neutral.tt: "翅膀并不出彩，但很合适。"
 agot_childhood_events.0026.b.proportional_fail.tt: "翅膀是歪的。"
 agot_childhood_events.0026.c:0 "听听[courtier.GetNamePossessive]的见解。"
 agot_childhood_events.0026.c.expert_major_success.tt: "这个建议非常宝贵。"
 agot_childhood_events.0026.c.expert_success.tt: "这个建议很有用"
 agot_childhood_events.0026.c.expert_fail.tt: "你得到了糟糕的建议。"
 agot_childhood_events.0027.t:0 "$agot_childhood_events.dragon_doll$画龙点睛"
 agot_childhood_events.0027.desc:0 "玩偶历来是用纽扣做眼睛，可龙比所有其他动物都要伟大。可能应该用一些更闪闪发光的材料，尽管可能增加成本……我在考虑加上宝石作为眼睛。"
 agot_childhood_events.0027.gems:0 "珍贵的宝石将成为它心灵的窗户"
 agot_childhood_events.0027.gems.tt:0 "你会试着用珍贵的宝石给玩偶做眼睛"
 agot_childhood_events.0027.gems.success.tt:0 "眼睛与设计完美契合"
 agot_childhood_events.0027.gems.fail.tt:0 "宝石格格不入"
 agot_childhood_events.0027.buttons:0 "这不过是个玩偶；就该用纽扣做眼睛！"
 agot_childhood_events.0027.buttons.tt:0 "你坚持为玩偶采用纽扣眼睛"
 agot_childhood_events.0028.t:0 "$agot_childhood_events.dragon_doll$幼龙的初次喷火"
 agot_childhood_events.0028.desc.intro:0 "在远处，我隐约听到了[child.GetFirstName]的欢快笑声，[child.GetSheHe]显然正在和[dragon_doll.GetName]嬉戏玩耍。我悄悄走近，尽量不发出声响，而眼前的一幕让我欣慰。"
 agot_childhood_events.0028.desc.fire_common:0 "[child.GetNameNoTooltip]完全没有注意到我的存在，嬉笑玩笑：“[dragon_doll.GetNameNoTooltip]，喷火！[dragon_doll.GetNameNoTooltip]，再来一次！”"
 agot_childhood_events.0028.desc.fire_valyrian:0 "[child.GetNameNoTooltip]完全没有注意到我的存在，嬉笑玩笑：“[dragon_doll.GetNameNoTooltip]，[Glossary('dracarys','DRACARYS_GLOSS')]！[dragon_doll.GetNameNoTooltip]，再来一次！”"
 agot_childhood_events.0028.desc.fire_breath:0 "\n\n龙口喷出想象中的火焰，逗得[child.GetNameNoTooltip]开心地笑了起来。"
 agot_childhood_events.0028.a:0 "多么珍贵的一刻……"
 agot_childhood_events.0028.a.flavor:0 "龙焰可能是想象的，但却已融化我的心。"
 agot_childhood_events.0028.b:0 "棒极了，[child.GetSheHe]知道龙焰的威力。"
 agot_childhood_events.0028.b.flavor:0 "龙焰可能是想象的，但就连我冰冷的心也融化了。"
 agot_childhood_events.0029.t:0 "$agot_childhood_events.dragon_doll$玩偶的灵感"
 agot_childhood_events.0029.desc:0 "尽管一个玩偶无法模仿出巨龙那种伟大与威严，但或许可以用它作为某种参考？鉴于[child.GetFirstName]目前没有龙，如果[child.GetSheHe]爱上了以某条龙为原型的玩偶，[child.GetSheHe]可能会产生依恋，并在成年时拥有足够的勇气去驯服那头真正的巨兽。"
 agot_childhood_events.0029.untamed_dragon:0 "这个玩偶的原型……"
 agot_childhood_events.0029.ask_child:0 "嘿，[child.GetNameNoTooltip]，你最喜欢哪条龙？"
 agot_childhood_events.0029.unnamed:0 "这个龙玩偶必须是独一无二的。"
 agot_childhood_events.0029.unnamed.tt:0 "龙玩偶将在活动结束时命名。"
 agot_childhood_events.0029.child_dragon_name.toast_title:0 "[chosen_dragon.GetNameNoTooltip]"
 agot_childhood_events.0029.child_dragon_name.toast_desc:0 "[child.GetFirstName]选择[chosen_dragon.GetNameNicknamed]。"
 agot_childhood_events.0029.inspiration_quality_bump.tt:0 "以现存的龙为原型制作玩偶能略微提升品质。"
 agot_childhood_events.0030.t:0 "$agot_childhood_events.dragon_doll$龙的设计"
 agot_childhood_events.0030.desc:0 "哪条龙将成为玩偶的灵感来源？"
 agot_childhood_events.0030.confirm_dragon:0 "这条龙。"
 agot_childhood_events.0030.confirm_dragon.tt:0 "玩偶将以[chosen_dragon.GetNameNicknamed]为原型。"
 agot_childhood_events.0030.ask_child:0 "嘿，[child.GetNameNoTooltip]，你最喜欢那条龙？"
 agot_childhood_events.0030.cancel:0 "转念一想，还是保持原样吧。"
 agot_childhood_events.0030.child_dragon_name.toast_title:0 "[chosen_dragon.GetNameNoTooltip]"
 agot_childhood_events.0030.child_dragon_name.toast_desc:0 "[child.GetFirstName]选择[chosen_dragon.GetNameNicknamed]。"
 agot_hand_crafted_dragon_doll_exquisite_desc:0 "一个用羊毛制成的漂亮龙形玩偶。[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_exquisite_desc_modeled:0 "一个模仿龙[chosen_dragon.GetNameNicknamed]的造型用羊毛制成的漂亮龙形玩偶。[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_simple_desc:0 "一个用羊毛制成的朴素龙形玩偶。[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_simple_desc_modeled:0 "一个模仿龙[chosen_dragon.GetNameNicknamed]的造型用羊毛制成的朴素龙形玩偶。[story.Custom('GetDollColor')][story.Custom('GetDollEyes')][story.Custom('GetDollWings')]$agot_hand_crafted_dragon_doll_creator$"
 agot_hand_crafted_dragon_doll_creator:0 "这个玩偶是[creator.GetTitledFirstName]亲手为[creator.GetHerHis]的孩子[child.GetFirstName]制作的。"
 agot_dragon_doll_color_vibrant_fit:0 "多种鲜艳颜色的绒毛搭配得恰到好处。"
 agot_dragon_doll_color_vibrant_off:0 "多种鲜艳颜色的绒毛搭配得不太协调。"
 agot_dragon_doll_color_vibrant_incoherent:0 "多种鲜艳颜色的绒毛混杂在一起，显得不协调。"
 agot_dragon_doll_color_simple_complement:0 "简洁的设计与绒毛搭配得恰到好处。"
 agot_dragon_doll_color_simple_clash:0 "绒毛的颜色搭配得很不协调。"
 agot_dragon_doll_color_monotone:0 "色调单一的绒毛看起来并不起眼。"
 agot_dragon_eyes_buttons:0 "如同传统玩偶一样用纽扣作眼睛。"
 agot_dragon_eyes_gems_off:0 "宝石被笨拙地镶嵌在玩偶的脸上。"
 agot_dragon_eyes_gems_pop:0 "璀璨的宝石镶嵌在玩偶的脸上。"
 agot_dragon_wings_large_fit:0 "巨大的翅膀在这凶猛的杀人龙身上显得很可爱。"
 agot_dragon_wings_large_oversize:0 "它的翅膀有些太大，让人感到不舒服。"
 agot_dragon_wings_large_goat:0 "它的大翅膀像山羊耳朵一样耷拉着。"
 agot_dragon_wings_small_fit:0 "这头可怕的猛兽身躯庞大，却长着一对小翅膀。"
 agot_dragon_wings_small_undersized:0 "这对翅膀相对于玩偶的体型来说太小了。"
 agot_dragon_wings_small_whale:0 "这头可怕的猛兽展翅腾飞，翅膀却看着更像鲸鱼的鳍。"
 agot_dragon_wings_proportional_lopsided:0 "这头可怕的猛兽凭借一对不对称的翅膀飞行。"
 agot_childhood_events.9001.t:0 "[child.GetNamePossessiveNoTooltip]的龙"
 agot_childhood_events.9001.desc:0 "[child.GetName]终究还是获得了一条属于自己的龙。显然，玩偶无法与活生生的龙相提并论；没有必要再继续这个项目了。"
 agot_childhood_events.9001.a:0 "真遗憾。"
 agot_dead_pirate_dragon_baby_name:0 "[dead_pirate_dragon_baby.GetNameNoTooltip]"
 agot_character_name:0 "[character.GetNameNoTooltip]"
 agot_childhood_events.0101.t:0 "不同寻常的舞蹈"
 agot_childhood_events.0101.desc:0 "我在院子里闲逛，突然发现[other_child.GetFirstName]正使用着木剑与隐形的敌人战斗。“魔鬼，吃我一击！”我津津有味地看了一会儿，[other_child.GetSheHe]这才发现我。\n\n“你好，小姐。我只是在训练而已，嗯，毕竟没有人陪我练习……或者说你愿意和我一起？”[other_child.GetSheHe]的脸微微泛红。"
 agot_childhood_events.0101.desc.alone:0 "我在院子里闲逛时，发现了几把被丢弃的训练木剑——一定是某些廷臣的儿子玩到一半，又中途离开了。现在我也不知道该去哪儿好了……"
 agot_childhood_events.0101.a:0 "看起来很有趣！"
 agot_childhood_events.0101.b:0 "我应该像男孩们那样训练！"
 agot_childhood_events.0101.c:0 "不，这太蠢了。"
 agot_childhood_events.0101.tt:0 "你将开始剑术训练"
 agot_childhood_events.0102.t:0 "不寻常的追求"
 agot_childhood_events.0102.desc:0 "当我在院子里闲逛时，我看到几个孩子在玩木剑格斗。其中一个孩子灵巧地解除了另一个孩子的武装，我猛然认出那是我的[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))][child.GetFirstName]。\n\n她看见我，马上跑到我的跟前。“你看到了吗？是我赢了！我长大后要成为一名战士，就像维桑尼亚和娜梅莉亚那样！”"
 agot_childhood_events.0102.desc.alone:0 "当我在院子里闲逛时，我看到一个孩子在对着空气练习剑术。我猛然发现那正是我的[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child'))][child.GetFirstName]。\n\n她也发现了我，马上跑了过来。“我从来不知道耍剑竟然这么有趣！我长大后想成为一名战士，就像维桑尼亚和娜梅莉亚那样！”"
 agot_childhood_events.0102.a:0 "很好，那就给我展示下你还学了些什么。"
 agot_childhood_events.0102.b:0 "也许她也想学学决斗的艺术……"
 agot_childhood_events.0102.c:0 "这可不是位淑女该做的事！"
 agot_childhood_events.0102.tt:0 "[child.GetFirstName]将开始剑术训练"