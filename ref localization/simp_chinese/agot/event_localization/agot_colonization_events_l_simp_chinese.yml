l_simp_chinese:
 agot_colonization_events.1001.t:0 "[obstacle_province.GetNameNoTooltip]：面对狼群"
 agot_colonization_events.1001.desc:0 "这些天来，我派出的斥候一直在搜寻[obstacle_province.GetName]的[obstacle_province.Custom('TerrainTypeProvince')]\n\n他们中的大多数人空手而归，而有些人则再也没有回来过。我甚至开始怀疑这个传闻中的狼穴是否存在，亦或是一直徘徊在这些土地上的狼群是某种魔法造成的结果。\n\n不过最后，我的一名斥候向我报告，他的衣服破烂不堪，眼中流露出颤抖的神情。\n\n“我的[ROOT.Char.GetLadyLord]，我找到它了，这个狼穴十分的隐蔽，它就藏匿在[obstacle_province.Custom('TerrainTypeProvince')]，那附近有很多凶残的恶狼。”"
 agot_colonization_events.1001.a:0 "我亲自去对付它们。"
 agot_colonization_events.1001.a.duel_success:0 "你击败了狼群"
 agot_colonization_events.1001.a.duel_failure:0 "你被狼群击败"
 agot_colonization_events.1001.b:0 "我的$knight_culture_player_no_tooltip_lowercase$[knight.GetTitledFirstNameNoTooltip]会轻松解决它们。"
 agot_colonization_events.1001.b.duel_success:0 "[knight.GetFirstNameNoTooltip]击败了狼群"
 agot_colonization_events.1001.b.duel_failure:0 "[knight.GetFirstNameNoTooltip]被狼群击败"
 agot_colonization_events.1001.c:0 "[hooked_character.GetTitledFirstNameNoTooltip]欠我一个人情……"
 agot_colonization_events.1001.c.duel_success:0 "[hooked_character.GetFirstNameNoTooltip]击败了狼群"
 agot_colonization_events.1001.c.duel_failure:0 "[hooked_character.GetFirstNameNoTooltip]被狼群击败"
 agot_colonization_events.1001.d:0 "我会把这个任务交给雇佣的专业人士。"
 agot_colonization_events.1001.e:0 "我还是让它们待着吧……"
 agot_colonization_events.1001.success.toast.t:0 "狼穴不再"
 agot_colonization_events.1001.failure.toast.t:0 "狼穴仍在"
 agot_colonization_events.1002.t:0 "[obstacle_province.GetNameNoTooltip]：狼群环伺"
 agot_colonization_events.1002.desc:0 "我本想在天黑前赶到[obstacle_province.GetName]的定居点，可一路上耽搁不断，直到暮色降临，我们还差着几里路。借着昏暗的天光，我们在林边寻了块空地扎营生火。虽说条件简陋，可仰望星空，心头倒也平静了下来。\n\n突然，一声低吼传来。篝火对面，一双眼睛闪着幽光。紧接着，这双眼睛旁边又冒出二十来双，我这才意识到，我们被包围了。一声凄厉的狼嚎刺破夜空，我们也终于明白自己错在哪儿了——我们竟然在狼窝边上扎了营！这就是自打我们建立新定居点以来，一直挥之不去的灰色恐怖的源头。"
 agot_colonization_events.1002.a:0 "都过来！宰了这些畜生！"
 agot_colonization_events.1002.b:0 "[knight.GetFirstNameNoTooltip]，挡住这些畜生！"
 agot_colonization_events.1002.c:0 "拿起火把，我们冲出去！"
 agot_colonization_events.1003.t:0 "[obstacle_province.GetNameNoTooltip]：狼母"
 agot_colonization_events.1003.desc:0 "找了几个月，狼窝终于有了下落——就在[obstacle_province.GetName]。这狼群，规模不小，还特别狡猾，时不时地就拦截前往我们新建哨站的商队。如今，总算被我们给围住了。\n\n营地里，狼皮已经堆了不少，可真要动手剿灭狼窝，大伙儿心里还是有些发怵。只因这狼群的头儿，是一头体型巨大的母狼，个头儿都快赶上小马驹了，嘴边、鼻子上，全是猎物留下的血迹。离狼窝越近，心里越是没底。只见那母狼，护着一堆乱跑的小狼崽子，呲着牙低声咆哮，摆明了是要拼死护崽。"
 agot_colonization_events.1003.a:0 "“杂种玩意！我亲自干了它！”"
 agot_colonization_events.1003.a.duel_success:0 "你设法杀死了母狼"
 agot_colonization_events.1003.a.duel_failure:0 "你没能杀死母狼"
 agot_colonization_events.1003.b:0 "围上！一起干它！"
 agot_colonization_events.1003.b.duel_success:0 "你成功围死了母狼"
 agot_colonization_events.1003.b.duel_failure:0 "母狼设法跑了"
 agot_colonization_events.1003.c:0 "嗯，我们晚点再办吧。"
 agot_colonization_events.1004.t:0 "[obstacle_province.GetNameNoTooltip]：狼狗"
 agot_colonization_events.1004.desc:0 "有趣的消息从[obstacle_province.GetName]传来。那里的定居者带去了许多家犬，这些牲畜成了家庭忠诚而可靠的守护者。然而，这也带来了令人不安的后果。随着狼的数量减少，这些家犬在土地上大肆游荡，一种混血物种开始变得越来越常见，一种狼与犬杂交而成的新生物。\n\n这些“狼犬”拥有狼的特征，但却有着狗的性情，逐渐成为当地人们喜爱的宠物和守护者。然而，有些人担忧这些混血物种可能太过野性，难以真正驯服，或者如果数量失控，它们可能会形成独立的野生群体！"
 agot_colonization_events.1004.a:0 "停下，把它们都处理了。"
 agot_colonization_events.1004.b:0 "狼的躯体，狗的忠诚……"
 agot_colonization_events.1004.c:0 "多有趣的猎物啊！"
 agot_colonization_events.1004.a.duel_success:0 "[obstacle_province.GetName]得到狼视"
 agot_colonization_events.1004.a.success.toast.t:0 "狼群成功散入荒野"
 agot_colonization_events.1004.a.duel_failure:0 "没能驱走狼群"
 agot_colonization_events.1004.a.failure.toast.t:0 "群情激愤"
 agot_colonization_events.1004.b.duel_success:0 "你成功驯服了狼狗"
 agot_colonization_events.1004.b.success.toast.t:0 "人类最好的朋友！"
 agot_colonization_events.1004.b.duel_failure:0 "你没能驯服狼"
 agot_colonization_events.1004.b.failure.toast.t:0 "野狼桀骜不驯"
 agot_colonization_events.1005.t:0 "[obstacle_province.GetNameNoTooltip]：失踪"
 agot_colonization_events.1005.desc:0 "今日[obstacle_province.GetName]传来噩耗，一连串的惨剧让那里的定居点人心惶惶。似乎是被人们不断侵扰领地的行为激怒了，当地的狼群开始变本加厉地袭击老弱妇孺。\n\n这些畜生越发胆大妄为，竟成群结队地在夜间闯入村庄！必须尽快采取行动，否则连襁褓中的婴孩，都难逃它们的毒手。"
 agot_colonization_events.1005.a:0 "我们必须组织村民向狼群发起反击！"
 agot_colonization_events.1005.a.duel_success:0 "狼窝清理干净"
 agot_colonization_events.1005.a.duel_failure:0 "狼窝依然存在，殖民地失守"
 agot_colonization_events.1005.success.toast.t:0 "狼穴不再"
 agot_colonization_events.1005.failure.toast.t:0 "未能清除狼窝"
 agot_colonization_events.1005.b:0 "召集村民把狼群烧死。"
 agot_colonization_events.1005.b.duel_success:0 "你烧毁了狼窝"
 agot_colonization_events.1005.b.duel_failure:0 "狼窝依然存在，殖民地失守"
 agot_colonization_events.1005.c:0 "不幸的是，这就是边境的风险。"
 agot_colonization_events.1006.t:0 "[obstacle_province.GetNameNoTooltip]：猎人成为猎物"
 agot_colonization_events.1006.desc:0 "起初似乎很轻松的围猎很快就失控了。一头巨大的黑狼跟踪我的队伍，并在夜间在雾的掩护下与它复仇的狼群一起发动了袭击。我带进[obstacle_province.GetName]狼窝的猎人一个接一个地被干掉了，很快我就孤身一人，面对着这只不寻常的野兽。\n\n这是迄今为止我见过的最大的野狼，它眼中闪烁着令人不安的智慧光芒，预示着如果我不立即逃离它的领地，我将面临漫长而悲惨的死亡。"
 agot_colonization_events.1006.a:0 "你会成为一张漂亮的地毯。"
 agot_colonization_events.1006.a.duel_success:0 "狼窝清理干净"
 agot_colonization_events.1006.a.duel_failure:0 "狼窝仍在"
 agot_colonization_events.1006.success.toast.t:0 "狼穴不再"
 agot_colonization_events.1006.failure.toast.t:0 "未能清除狼窝"
 agot_colonization_events.1006.b:0 "如果我生火，我可以困住这只野兽并以这种方式杀死它。"
 agot_colonization_events.1006.c:0 "我会勇敢地，勇敢地逃跑！"
 agot_colonization_events.1006.b.duel_success:0 "狼窝清理干净"
 agot_colonization_events.1006.b.duel_failure:0 "狼窝仍在"
 agot_colonization_events.1007.t:0 "[obstacle_province.GetNameNoTooltip]：嚎叫山丘"
 agot_colonization_events.1007.desc:0 "一位信使来到我的宫廷，带来了来自[obstacle_province.GetName]定居点的消息。虽然传来的消息令人欣慰，但当信使完成汇报时，他转达了村民们的一个请求：尽管他们已将来犯的狼群大都逐出定居点，但仍有相当规模的狼群盘踞在几里外的山丘上。村民们恳请我出手相助，将这些狼群彻底铲除。\n\n我的[steward.Custom('GetCouncilOrCourtPosition')]插话道：“如果狼群真的被赶到了离殖民地几里外的山上，我认为我们没有必要干预；狼群会在下一个冬天之前自行离开。”"
 agot_colonization_events.1007.a:0 "我们不能冒险，我会提供必要的援助。"
 agot_colonization_events.1007.b:0 "我同意[steward.GetFirstName]的看法，狼群现在构成的威胁很小。"
 agot_colonization_events.1007.success.toast.t:0 "狼群自然散去"
 agot_colonization_events.1007.failure.toast.t:0 "狼群依然存在"
 agot_colonization_events.1008.t:0 "[obstacle_province.GetNameNoTooltip]：狩猎俱乐部"
 agot_colonization_events.1008.desc:0 "由于人们致力于消灭[obstacle_province.GetName]危险的狼群，猎人们开始组建狩猎俱乐部，以便更好地协调行动\n\n除了使捕杀狼群更加安全和容易之外，随着狩猎在当地社区中变得越来越普遍和流行，它也开始在该地区形成一种独特的亚文化，成为强者和勇士之间的一种消遣。"
 agot_colonization_events.1008.a:0 "一时风潮罢了，不过挺有意思。"
 agot_colonization_events.1008.success.toast.t:0 "狩猎俱乐部成立！"
 agot_colonization_events.1008.failure.toast.t:0 "猎狼失控！"
 agot_colonization_events.1008.b:0 "我们应该进一步扶持这些狩猎俱乐部！"
 agot_colonization_events.1008.b.duel_success:0 "你成功扶持了狩猎俱乐部。"
 agot_colonization_events.1008.b.duel_failure:0 "狩猎活动失控……"
 agot_colonization_events.1008.c:0 "我应该去拜访一下这些人，他们肯定有不少经验和技巧可以分享。"
 agot_colonization_events.1009.t:0 "[obstacle_province.GetNameNoTooltip]：夜嗥"
 agot_colonization_events.1009.desc:0 " 我巡视[obstacle_province.GetName]的殖民地，发现一些村庄简直惨不忍睹。半空的鬼城，村民们面容憔悴，勉强用简陋的栅栏抵挡狼群，仿佛随时都会精疲力竭地倒下。据说，这里的狼多得可怕，光是活着熬过夜晚都是一种挑战。情况已经岌岌可危。\n\n我和随从准备返回，召集人手猎狼。途中，我不慎与大部队走散，身边只剩几个人。夜幕降临，寂静的黑暗被一阵狼嚎打破，听声音至少有上百头狼。转眼间，我们就被狼群四面围住，它们龇牙咧嘴，虎视眈眈，只能靠我的火把勉强抵挡。但随着火光渐弱，狼群也越逼越近……"
 agot_colonization_events.1009.a:0 "结阵！大家靠拢，让他们撞上来！"
 agot_colonization_events.1009.a.duel_success:0 "你的军事才能击退了狼群。"
 agot_colonization_events.1009.a.duel_failure:0 "你的军事才能没能阻止狼群的进攻。"
 agot_colonization_events.1009.success.toast.t:0 "成功防御狼群。"
 agot_colonization_events.1009.failure.toast.t:0 "被狼群咬伤！"
 agot_colonization_events.1009.b:0 "保持火势！我们必须坚持住！"
 agot_colonization_events.1009.b.duel_success:0 "你成功用火驱散了狼群。"
 agot_colonization_events.1009.b.duel_failure:0 "火势不足以驱散狼群……"
 agot_colonization_events.1009.c:0 "[knight.GetName]，保护你的[ROOT.Char.GetTitleAsNameNoTooltip]！"
 agot_colonization_events.1009.c.duel_success:0 "[knight.GetNameNoTooltip]奋勇杀狼。"
 agot_colonization_events.1009.c.duel_failure:0 "你和[knight.GetNameNoTooltip]在袭击中受伤。"
 agot_colonization_events.1101.t:0 "[obstacle_province.GetNameNoTooltip]：瑜伽熊"
 agot_colonization_events.1101.desc:0 "我派遣的殖民者们在[obstacle_province.GetName]已经习惯了熊在殖民地附近游荡。通常只需要多加小心，即使是好奇心较强的野兽，通常也能通过用力敲击炊具的声音来驱赶。\n\n但有一只熊与众不同。在当地的方言中被称为“尤‑吉”，它比一般的熊更聪明。他会跟踪工作队，并在他们停下来用餐时袭击他们。一旦工人们四散逃开，它就会袭击他们的行李，偷走他们带来的任何食物。\n\n在定居点内，如何解决这个问题引起了相当大的争论。殖民地已经雇用了北方游民，他们希望组织一次针对这只熊的狩猎。然而，定居点的铁匠认为，可以用他自己设计的巧妙陷阱来引诱这只熊，诱饵是装满蜂蜜的蜂巢。"
 agot_colonization_events.1101.a:0 "让监察队去看着。"
 agot_colonization_events.1101.a.duel_success:0 "游骑兵成功除掉了瑜伽熊和它的同伙"
 agot_colonization_events.1101.a.duel_failure:0 "游骑兵被熊忽悠住了"
 agot_colonization_events.1101.b:0 "付钱给铁匠做陷阱。"
 agot_colonization_events.1101.c:0 "胡说八道！我亲自去赶走这头野兽。"
 agot_colonization_events.1101.c.duel_success:0 "你成功除掉了瑜伽熊和它的同伙"
 agot_colonization_events.1101.c.duel_failure:0 "你受骗上当，被熊打败了"
 agot_colonization_events.1101.d:0 "嘿，嘿，嘿！让这熊待着吧！"
 agot_colonization_events.1101.success.toast.t:0 "熊穴不再"
 agot_colonization_events.1101.failure.toast.t:0 "熊穴仍在"
 agot_colonization_events.1102.t:0 "[obstacle_province.GetNameNoTooltip]：熊的报酬"
 agot_colonization_events.1102.desc:0 "经过四天在崎岖地形中的跋涉，我的猎熊之旅接近了尾声。一头巨大的母熊站在洞穴口，目光紧紧盯着我。她用后腿站立，发出咆哮，但似乎不愿意离开她岩石的庇护冲出来。我将此视为软弱的表现，便向前一跃，将长矛刺入她的胸膛。经过短暂的挣扎，熊倒下了，身体颤抖着。她用最后的力气再次看向我的眼睛，那表情看起来几乎是……恳求。感到不安的我后退了一步，丢下了长矛。\n\n就在那时，我听到了微弱的呜咽声。\n\n在洞穴深处，我找到了声音的源头——一只仍然失明、虚弱的小熊崽，正向我爬来。强烈的愧疚感攫住了我。喂养它会耗费不少粮食，但或许我可以亲自把这头熊养大……"
 agot_colonization_events.1102.a:0 "我会结束它的痛苦。"
 agot_colonization_events.1102.b:0 "我会试着亲自养这崽子。"
 agot_colonization_events.1102.b.success.toast.t:0 "驯熊成功"
 agot_colonization_events.1102.b.failure.toast.t:0 "驯熊失败"
 agot_colonization_events.1102.c:0 "让它就这么活着吧……"
 agot_colonization_events.1103.t:0 "[obstacle_province.GetNameNoTooltip]：突袭"
 agot_colonization_events.1103.desc:0 "[obstacle_province.GetNameNoTier]的新定居点已初具规模。一栋栋房屋拔地而起、炊烟袅袅。土地已被开垦平整，为耕种做好了准备；原本的荒野也渐渐变得驯服，有了人烟。正当我沉浸于这喜人的进展时，一声惊叫划破了这宁静的氛围。\n\n一头熊！那庞然大物竟闯入了定居点的中心，殖民者们如同被击倒的木柱一般，四散奔逃。"
 agot_colonization_events.1103.a:0 "拿弓来！我亲自干掉它。"
 agot_colonization_events.1103.a.duel_success:0 "你设法杀死了熊"
 agot_colonization_events.1103.a.duel_failure:0 "你没能杀死熊"
 agot_colonization_events.1103.b:0 "吹响号角！结果了它！"
 agot_colonization_events.1103.b.duel_success:0 "你的队伍设法杀死了熊"
 agot_colonization_events.1103.b.duel_failure:0 "你的队伍没能杀死熊"
 agot_colonization_events.1103.c:0 "跑啊！这敌人比我们任何人都强！"
 agot_colonization_events.1103.failure.toast.t:0 "熊穴仍在"
 agot_colonization_events.1103.success.toast.t:0 "熊穴不再"
 agot_colonization_events.1104.t:0 "[obstacle_province.GetNameNoTooltip]：蘑菇熊"
 agot_colonization_events.1104.desc:0 "我的[steward.Custom('GetCouncilOrCourtPosition')][steward.GetFirstName]给我带来了来自我们在[obstacle_province.GetName]新建殖民地的消息。这是一个如此离奇的故事，以至于[steward.GetFirstNameNoTooltip]坚持要核实后才告诉我，但他现在确信这是真的。似乎我们的一位殖民者发现了一种特别有效的蘑菇，食用后会产生惊人的幻觉和强烈的欣快感。\n\n这也许是件好事，但有一片人工种植的蘑菇田被当地一头体型巨大的熊袭击了。随后，这头熊开始了大肆破坏，摧毁房屋和仓库，屠杀定居者，以至于殖民地现在面临着生存威胁。"
 agot_colonization_events.1104.a:0 "派点征召兵对付这毛茸茸的威胁。"
 agot_colonization_events.1104.a.duel_failure:0 "你的征召兵没能赶走熊"
 agot_colonization_events.1104.a.duel_success:0 "你的征召兵成功赶走了熊"
 agot_colonization_events.1104.b:0 "挖个带刺的坑，用鲜蘑菇做诱饵"
 agot_colonization_events.1104.b.duel_failure:0 "熊设法逃离了你的陷阱"
 agot_colonization_events.1104.b.duel_success:0 "你成功把熊忽悠进了陷阱"
 agot_colonization_events.1104.c:0 "我想尝尝这些蘑菇……当然，是为了医学。"
 agot_colonization_events.1104.c.success.toast.t:0 "好菌子"
 agot_colonization_events.1104.c.failure.toast.t:0 "坏菌子"
 agot_colonization_events.1104.failure.toast.t:0 "熊穴仍在"
 agot_colonization_events.1104.success.toast.t:0 "熊被赶走"
 agot_colonization_events.1105.t:0 "[obstacle_province.GetNameNoTooltip]：眼见非实"
 agot_colonization_events.1105.desc:0 "[obstacle_province.GetName]周围的土地，向来以栖息于此的大熊而闻名遐迩。\n\n我前往殖民地查看进展，却在路上遭遇了一群巨熊，貌似是一家子。领头的是个魁梧如熊的壮汉，声称此地乃熊族领地，若不速速离去，便要为我们所杀之熊复仇。"
 agot_colonization_events.1105.a:0 "你倒是试试看啊，野兽！"
 agot_colonization_events.1105.b:0 "带着你的熊离我们的定居点远点……"
 agot_colonization_events.1105.c:0 "我们正要走，是吧？"
 agot_colonization_events.1105.toast.t:0 "大熊仍在"
 agot_colonization_events.1105.a.duel_success:0 "你赶走了那个易形者"
 agot_colonization_events.1105.a.success.toast.t:0 "熊穴不再"
 agot_colonization_events.1105.a.duel_failure:0 "你没能赶走那个易形者"
 agot_colonization_events.1105.a.failure.toast.t:0 "猎熊负伤"
 agot_colonization_events.1105.b.duel_success:0 "你设法与易形者达成了协议"
 agot_colonization_events.1105.b.success.toast.t:0 "共存"
 agot_colonization_events.1105.b.duel_failure:0 "你未能与易形者达成协议"
 agot_colonization_events.1105.b.failure.toast.t:0 "熊穴仍在"
 agot_colonization_events.1106.t:0 "[obstacle_province.GetNameNoTooltip]：食人者"
 agot_colonization_events.1106.desc:0 "夜色之中，它正注视着一切。七尺之高，半吨之重。它的皮毛比龙鳞还要坚硬，它的利爪和尖牙比刀剑还要锋利，它呼出的气息比战场之后的荒野还要恶臭。它身经百战，伤痕累累，它的脸上带着岁月和伤痛的痕迹，仿佛已经活了一个世纪。\n\n至少，[obstacle_province.GetName]的信件中是这么描述的。关于这头巨熊的传说，想必有些言过其实，但字里行间透露出的恐惧却是真真切切的。信中说，它近乎无敌，曾承受千箭而不倒；它曾屠戮五十人的狩猎队伍；它还会在夜色中悄无声息地潜入村庄，无论是牲畜还是村民，都难逃厄运——尤其是村民！殖民者们在信中哀求，他们恳求任何形式的帮助，只求能一劳永逸地除掉这个夜间的恐怖。"
 agot_colonization_events.1106.success.toast.t:0 "大熊被杀"
 agot_colonization_events.1106.failure.toast.t:0 "熊穴仍在"
 agot_colonization_events.1106.a:0 "派我最好的战士杀了这野兽！"
 agot_colonization_events.1106.b:0 "[marshal.GetFirstName]，集合垦殖者，把熊头给我带来。"
 agot_colonization_events.1106.b.duel_success:0 "大熊被杀"
 agot_colonization_events.1106.b.duel_failure:0 "大熊仍存"
 agot_colonization_events.1106.c:0 "切，农民胡说八道而已，他们自己看着办。"
 agot_colonization_events.1107.t:0 "[obstacle_province.GetNameNoTooltip]：宿敌"
 agot_colonization_events.1107.desc:0 "随着[obstacle_province.GetName]的殖民地不断扩张，当地令人头疼的熊群也遭到猎杀，为了安全，为了食物，也为了消遣。但看来我们的行动激怒了那些熊，当我巡视殖民地，检查进展时，我们竟然被这些该死的畜生包围了，而且其中还有一头我见过的最大的熊。更糟糕的是，它似乎还能指挥其他小熊！"
 agot_colonization_events.1107.success.toast.t:0 "大熊被杀"
 agot_colonization_events.1107.failure.toast.t:0 "熊穴仍在"
 agot_colonization_events.1107.a:0 "狩猎季到了，兄弟们！"
 agot_colonization_events.1107.b:0 "砍下那头巨兽的脑袋，其他熊就会四散而逃。"
 agot_colonization_events.1107.duel_success:0 "大熊被杀"
 agot_colonization_events.1107.duel_failure:0 "大熊仍存"
 agot_colonization_events.1107.c:0 "你们帮我引开它们，我……我去找援兵！"
 agot_colonization_events.1108.t:0 "[obstacle_province.GetNameNoTooltip]：斗熊"
 agot_colonization_events.1108.desc:0 "我决定去[obstacle_province.GetName]视察一番。刚到那里，就赶上了一场盛大的庆典，说是为了欢迎我。桌上堆满了食物，酒水也管够。狂欢达到高潮时，我被引到一个巨大的竞技场，并被安排在贵宾席上。一群面相凶恶的大狗从一道门被带进场内。然后，令我大吃一惊的是，一头看起来很可怜的熊，慢吞吞地从另一道门走了出来！\n\n大狗们像箭一样冲向那头熊，疯狂撕咬。整个过程很快变成一场血腥的盛宴，但最终，熊还是被幸存的猎狗咬倒在地。我转头看向坐在旁边的总督，他正笑容满面，我开始思量该如何回应眼前的景象。"
 agot_colonization_events.1108.a:0 "这才叫娱乐！"
 agot_colonization_events.1108.b:0 "这种做法太恶心了，不许再办！"
 agot_colonization_events.1108.c:0 "……我该怎么靠这个赚钱？"
 agot_colonization_events.1108.c.duel_success:0 "你成功将斗熊活动变成了摇钱树。"
 agot_colonization_events.1108.success.toast.t:0 "成功盈利"
 agot_colonization_events.1108.c.duel_failure:0 "你未能从斗熊活动中获利。"
 agot_colonization_events.1108.failure.toast.t:0 "盈利失败。"
 agot_colonization_events.1109.t:0 "[obstacle_province.GetNameNoTooltip]：野蛮大懒熊"
 agot_colonization_events.1109.desc:0 " 今早，[obstacle_province.GetName]传来了一些令人担忧的消息。自从殖民地建立以来，生性凶猛的当地的熊群就一直是当地居民的心头大患。这些熊长着鬃毛，利爪如镰、毛发蓬松，但真正让它们如此危险的是它们的野性，它们几乎不加挑衅，也毫无预兆地就会攻击人类。情况已经变得非常糟糕，当地总督亲自请求我出面，解决这些懒熊构成的威胁。"
 agot_colonization_events.1109.success.toast.t:0 "大熊被杀"
 agot_colonization_events.1109.failure.toast.t:0 "熊穴仍在"
 agot_colonization_events.1109.a:0 "[knight.GetFirstName]，想去猎熊吗？"
 agot_colonization_events.1109.b:0 "谁把我的好熊矛递给我？"
 agot_colonization_events.1109.duel_success:0 "大熊被杀"
 agot_colonization_events.1109.duel_failure:0 "大熊仍存"
 agot_colonization_events.1109.c:0 "很有意思，但我实在抽不出时间。"
 agot_colonization_events.1201.t:0 "[obstacle_province.GetNameNoTooltip]：亡命之徒"
 agot_colonization_events.1201.desc.1:0 "数周以来，我一直收到来自[obstacle_province.GetName]定居点的求援信。他们正遭受一群盗匪的侵扰，这些盗匪反复袭击城镇的粮食储备。"
 agot_colonization_events.1201.desc.2.marshal:0 "我的[marshal.GetCouncilTitle][marshal.GetName]建议发起一次惩罚性远征，以驱逐这些盗匪。\n\n然而，"
 agot_colonization_events.1201.desc.2.knight:0 "我的军事顾问[marshal.GetName]建议发起一次惩罚性远征，以驱逐这些盗匪。\n\n然而，"
 agot_colonization_events.1201.desc.3.spymaster:0 "我的[spymaster.GetCouncilTitle][spymaster.GetName]低声告诉我，这个局势并不像表面看起来那么简单。那些盗匪似乎曾是最早的殖民者，且大多数原本都是正直的臣民——直到他们的家园被之前抵达的士兵们驱逐。这些士兵装备更精良，也不愿亲手建造庇护所，而是直接抢夺已经建好的房屋。"
 agot_colonization_events.1201.desc.3.scholar:0 "学士[spymaster.GetName]低声告诉我，这个局势并不像表面看起来那么简单。那些盗匪似乎曾是最早的殖民者，且大多数原本都是正直的臣民——直到他们的家园被之前抵达的士兵们驱逐。这些士兵装备更精良，也不愿亲手建造庇护所，而是直接抢夺已经建好的房屋。"
 agot_colonization_events.1201.a:0 "管他先来后到。用剑解决这事！"
 agot_colonization_events.1201.a.duel_success:0 "你的人干掉了剩下的闹事者。"
 agot_colonization_events.1201.a.duel_failure:0 "你的人被土匪赶了回去。"
 agot_colonization_events.1201.b:0 "赦免亡命之徒，让他们回归故土。"
 agot_colonization_events.1201.b.duel_success:0 "你成功解决了亡命之徒的事端"
 agot_colonization_events.1201.b.duel_failure:0 "你没能为亡命之徒讨回公道"
 agot_colonization_events.1201.c:0 "也许我们能达成共识……"
 agot_colonization_events.1201.c.duel_success:0 "你在亡命之徒和定居者间达成了一致"
 agot_colonization_events.1201.c.duel_failure:0 "你没能在亡命之徒和定居者间达成一致"
 agot_colonization_events.1201.d:0 "我现在没时间处理这个！"
 agot_colonization_events.1201.success.toast.t:0 "匪患已除"
 agot_colonization_events.1201.failure.toast.t:0 "匪患尚存"
 agot_colonization_events.1202.t:0 "[obstacle_province.GetNameNoTooltip]：围困"
 agot_colonization_events.1202.desc.marshal:0 "我的[marshal.GetCouncilTitle][marshal.GetName]带来了振奋人心的消息。当地驻军发现了一直在[obstacle_province.GetName]地区肆虐的盗匪巢穴。士兵们已将这群不法之徒团团围住，连日来箭矢横飞，但始终未能发动决定性攻势彻底打破僵局。\n\n盗匪头目似乎准备战斗到最后一刻，但他提出可以接受一笔可观的赎金，作为离开这片区域的条件。"
 agot_colonization_events.1202.desc.knight:0 "我的军事顾问[marshal.GetNameNoTooltip]带来了令人振奋的消息。当地驻军发现了一直在[obstacle_province.GetNameNoTooltip]地区肆虐的盗匪巢穴。士兵们已将这些不法之徒团团围困，连日来箭矢横飞，但始终未能发动决定性攻势彻底打破僵局。\n\n盗匪头目似乎准备战斗到最后一刻，但他提出可以接受一笔可观的赎金，作为离开这片区域的条件。 "
 agot_colonization_events.1202.a:0 "碾碎他们！"
 agot_colonization_events.1202.a.duel_success:0 "你的人干掉了剩下的闹事者。"
 agot_colonization_events.1202.a.duel_failure:0 "你的人被土匪赶了回去。"
 agot_colonization_events.1202.b:0 "或许可以说服他们参军？"
 agot_colonization_events.1202.b.duel_success:0 "你说服土匪头目为佣金保卫殖民地。"
 agot_colonization_events.1202.b.duel_failure:0 "你谈崩了。"
 agot_colonization_events.1202.c:0 "给他们付路费吧……"
 agot_colonization_events.1203.t:0 "[obstacle_province.GetNameNoTooltip]：兄弟会"
 agot_colonization_events.1203.desc:0 "一段时间以来，[obstacle_province.GetName]的匪患一直是个问题。起初只是一些乌合之众和强盗组成的孤立团伙，但随着时间的推移，他们开始在一个或几个首领的指挥下联合起来。这些匪徒心狠手辣、狡猾且野心勃勃，他们的势力越来越大，组织也越来越严密，甚至能胁迫[obstacle_province.GetNameNoTooltip]的少量驻军放下武器，并接受这个所谓的“兄弟会”作为殖民地的新统治者。这对我来说，自然是极其令人震惊的。\n\n我集结了一批训练有素的战士，准备进军[obstacle_province.GetNameNoTooltip]，从这些篡位者手中夺回殖民地。但当我抵达时，他们却打着休战旗帜前来与我会面，并向我提出了一个条件。他们愿意用自己的力量保护[obstacle_province.GetNameNoTooltip]，并用他们的劳动力来建设它，以此换取我的宽恕，以及在兄弟会成为该地区合法行会期间的税收减免。从[obstacle_province.GetNameNoTooltip]在他们治理下变得如此繁荣来看，或许我应该接受他们的提议……"
 agot_colonization_events.1203.a:0 "你们以为这种伎俩能得逞？"
 agot_colonization_events.1203.a.duel_success:0 "你的部下击杀了兄弟会的成员。"
 agot_colonization_events.1203.a.duel_failure:0 "你的人被土匪赶了回去。"
 agot_colonization_events.1203.b:0 "有趣的提议！但我有一个更好的。"
 agot_colonization_events.1203.b.duel_success:0 "你说服了行会，让他们拿了一笔钱离开。"
 agot_colonization_events.1203.b.duel_failure:0 "你谈崩了。"
 agot_colonization_events.1203.c:0 "成交！我在此接受你们的效忠誓言。"
 agot_colonization_events.1203.success.toast.t:0 "匪患已除"
 agot_colonization_events.1203.failure.toast.t:0 "匪患尚存"
 agot_colonization_events.1204.t:0 "[obstacle_province.GetNameNoTooltip]：野人部落"
 agot_colonization_events.1204.desc:0 "塞外长期以来人烟稀少。由于地理上的隔绝，以及战争和瘟疫的摧残，如今仍在这片寒冷之地定居的人类寥寥无几，他们原始、坚韧且冷酷无情。随着[obstacle_province.GetName]的扩张，当地居民与其之间的冲突也日益加剧，因为他们不得不为争夺本地区本就稀少的资源而竞争。\n\n起初只是远距离的紧张对峙，如今已演变为小规模的冲突、劫掠牛群，以及偶尔发生的绑架勒索事件。若这些部落决定自行其是，一旦发起突袭，[obstacle_province.GetNameNoTooltip]极有可能被彻底摧毁。必须采取行动了。"
 agot_colonization_events.1204.a:0 "驱散这些匪徒！"
 agot_colonization_events.1204.a.duel_success:0 "你的人手刃了匪徒。"
 agot_colonization_events.1204.a.duel_failure:0 "你的人被土匪赶了回去。"
 agot_colonization_events.1204.b:0 "派遣使节去见酋长。"
 agot_colonization_events.1204.b.duel_success:0 "你在双方之间划定了清晰的界限。"
 agot_colonization_events.1204.b.duel_failure:0 "你谈崩了"
 agot_colonization_events.1204.c:0 "就凭这些衣衫褴褛的野蛮人，也配威胁我们？"
 agot_colonization_events.1204.success.toast.t:0 "匪患已除"
 agot_colonization_events.1204.failure.toast.t:0 "匪患尚存"
 agot_colonization_events.1205.t:0 "[obstacle_province.GetNameNoTooltip]：叛徒"
 agot_colonization_events.1205.desc:0 "清剿[obstacle_province.GetName]匪徒的行动一直困难重重，进展迟缓；但总的来说还算顺利。过去，强盗土匪的窝点星罗棋布，如今大部分都已被捣毁。然而，对殖民者们来说，威胁并未根除。残存的匪徒和漏网之鱼纠集在一起，形成了一个大据点。\n\n一日清晨，一个衣衫褴褛、面目凶恶的家伙跪倒在我的御座前。\n\n“殿下，小的知道[obstacle_province.GetNameNoTooltip]的乡亲们深受匪患之苦，整日提心吊胆，就怕遭了贼人的毒手！”[traitor.GetSheHe|U]咧嘴一笑。“小的有个主意：您让小的在夜里放几个村里的守卫进去，他们就能把那些贼人杀个精光！小的只求您赏点小钱，可比派兵强攻要省多了。”\n\n这倒是个有意思的提议……"
 agot_colonization_events.1205.a:0 "好吧，既然你这么说了。"
 agot_colonization_events.1205.a.duel_success:0 "计划顺利得手。"
 agot_colonization_events.1205.a.duel_failure:0 "你遭到了背叛。"
 agot_colonization_events.1205.b:0 "我的士兵们会狠狠地教训那些贼人。"
 agot_colonization_events.1205.b.duel_success:0 "你的人手刃了匪徒。"
 agot_colonization_events.1205.b.duel_failure:0 "你的人被土匪赶了回去。"
 agot_colonization_events.1205.c:0 "我不需要你的帮忙。"
 agot_colonization_events.1205.success.toast.t:0 "匪患已除"
 agot_colonization_events.1205.failure.toast.t:0 "匪患尚存"
 agot_colonization_events.1206.t:0 "[obstacle_province.GetNameNoTooltip]：狡猾的强盗"
 agot_colonization_events.1206.desc:0 "在我翻阅[obstacle_province.GetName]殖民地的最新报告时，我意外发现竟有一封给我的信件——这封信来自长期袭扰该地区的匪帮头目之一[brigand.GetName]。\n\n信中内容既狂妄又大胆：[brigand.GetFirstName]希望获得我的许可，将这片聚居地据为[brigand.GetHerHis]己有，作为交换，他将向我宣誓效忠，成为我的封臣。\n\n尽管这提议确实非同寻常，但其中是否暗藏着可取之处？"
 agot_colonization_events.1206.a:0 " 荒谬。把这个蠢货抓起来。"
 agot_colonization_events.1206.b:0 "相反，我要招募这个强盗。"
 agot_colonization_events.1206.c:0 "很好。向我宣誓效忠。"
 agot_colonization_events.1206.c.tt.success:0 "[brigand.GetFirstNameNoTooltip]遵守了[brigand.GetHerHis]的承诺。"
 agot_colonization_events.1206.c.tt.failure:0 "[brigand.GetFirstNameNoTooltip]把[obstacle_province.GetNameNoTooltip]据为己有"
 agot_colonization_events.1206.d:0 "我不需要你的忠诚。 [obstacle_province.GetNameNoTooltip]是你的了。"
 agot_colonization_events.1206.d.tt:0 "[brigand.GetFirstNameNoTooltip]被授予[obstacle_province.GetNameNoTooltip]。"
 agot_colonization_events.1301.t:0 "[obstacle_province.GetNameNoTooltip]：在森林里迷路"
 agot_colonization_events.1301.desc:0 "[obstacle_province.GetName]殖民地传来噩耗。当[lost_person.GetNameNoTooltip]造访该地并在周边地带散步时，竟在密林深处失踪了！\n\n消失得不留痕迹堪称奇迹，但我预感到这次失踪绝非自愿。此刻[lost_person.GetFirstNameNoTooltip]可能身处险境……\n\n如何应对此事将由我定夺。"
 agot_colonization_events.1301.a:0 "不惜一切代价！我要找到[lost_person.GetHerHim]！"
 agot_colonization_events.1301.b:0 "我将亲自带领搜救队！"
 agot_colonization_events.1301.duel_success:0 "你救下了[lost_person.GetFirstNameNoTooltip]。"
 agot_colonization_events.1301.duel_failure:0 "你没能找到[lost_person.GetFirstNameNoTooltip]。"
 agot_colonization_events.1301.c:0 "我们应该把精力放在援助那个殖民地上。"
 agot_colonization_events.1301.c.death:0 "只找到了[lost_person.GetFirstNameNoTooltip]的遗骸。"
 agot_colonization_events.1301.c.vanished:0 "[lost_person.GetFirstNameNoTooltip]依旧失踪，杳无音讯。"
 agot_colonization_events.1301.c.laamp:0 "[lost_person.GetFirstNameNoTooltip]幸存下来并成为一名[adventurer|E]。"
 agot_colonization_events.1302.t:0 "[obstacle_province.GetNameNoTooltip]：森林的产出"
 agot_colonization_events.1302.desc:0 "从定居点传来报告，[obstacle_province.GetName]周边茂密的森林已清理出足够空间，可供在该省份修建基础基建。\n\n与此同时，定居点也提出了一个问题：在开辟林间道路时砍伐的木材该如何处理？"
 agot_colonization_events.1302.a:0 "把我们不需要的卖掉。"
 agot_colonization_events.1302.duel_success:0 "你成功获得大量利润。"
 agot_colonization_events.1302.duel_failure:0 "你只获取了少量利润。"
 agot_colonization_events.1302.b:0 "利用这些木材建立定居点。"
 agot_colonization_events.1302.c:0 "让我们造一个巨大的篝火庆祝！"
 agot_colonization_events.1302.d:0 "这片树林可以加以开垦……"
 agot_colonization_events.1303.t:0 "[obstacle_province.GetNameNoTooltip]: 古代废墟"
 agot_colonization_events.1303.desc:0 "在[obstacle_province.GetName]垦殖地的工人们进展顺利。灌木丛已清理殆尽，茂密林间开辟出纵横小径，垦殖地基础建设初见成效。\n\n垦荒过程中，工人们意外发现一处形制不明的古代遗迹。曾有何种湮灭的文明在此筑造？其目的何在？\n\n尽管遗迹暂时不影响殖民建设进程，但一个问题依然悬而未决：我们该对此作何处置？"
 agot_colonization_events.1303.a:0 "让我们设法把这废墟改造成一座可用的建筑物。"
 agot_colonization_events.1303.duel_success:0 "一座新建筑将在[obstacle_province.GetNameNoTooltip]建造"
 agot_colonization_events.1303.duel_failure:0 "废墟轰然崩塌，只余下满地尘埃"
 agot_colonization_events.1303.b:0 "别管那废墟了，专心于殖民地吧。"
 agot_colonization_events.1303.c:0 "我们应该研究废墟，尽我们所能修复！"
 agot_colonization_events.1303.d:0 "拆了它！其石料可作他用。"
 agot_colonization_events.1304.t:0 "[obstacle_province.GetNameNoTooltip]：自然的惩戒"
 agot_colonization_events.1304.desc:0 "[obstacle_province.GetName]的定居点传来了令人震惊的消息。当地工人一直在努力砍伐殖民地周边的密林，可在一个格外漆黑的夜晚过后，许多被砍倒的树竟然奇迹般地长了回来！\n\n没人知道这到底是怎么回事，但定居点的大部分工作都白费了。工人们怨声载道，干劲和士气一落千丈。看来，我得赶紧想办法了……"
 agot_colonization_events.1304.a:0 "我要亲自砍倒这些树！"
 agot_colonization_events.1304.duel_success:0 "你的努力成功了。"
 agot_colonization_events.1304.duel_failure:0 "树木长得更茂盛了。"
 agot_colonization_events.1304.b:0 "抽调一批征召兵去支援工人们。"
 agot_colonization_events.1304.c:0 "先别动这些树……换个地方建。"
 agot_colonization_events.1304.d:0 "我知道该怎么安抚此地的自然之灵……"
 agot_colonization_events.1401.t:0 "[obstacle_province.GetNameNoTooltip]：沟壕"
 agot_colonization_events.1401.desc:0 "我们新殖民地周围的[obstacle_province.GetName]沼泽地形在许多方面带来了益处。其一，这里易于防守，因为大型部队难以通过错综复杂的水道。其二，沼泽地里盛产鳊鱼、鲈鱼、梭子鱼和鳗鱼，我的定居者可以随时捕捞鲜鱼或熏制过冬。\n\n但另一方面，沼泽也构成严重的洪水威胁，尤其在春季解冻时，沼泽小岛可能被上涨的水位淹没。为应对这个问题，定居者已开始修建堤坝和沟渠系统来保护家园，并排水造田。这项工程需要耗费巨大劳力，对这个新生殖民地而言是沉重的负担。如今其中一道堤坝似乎已经决口，洪水正威胁着要彻底摧毁整个定居地。"
 agot_colonization_events.1401.a:0 "我将监督救灾工程，并且提供充足劳工。"
 agot_colonization_events.1401.a.duel_success:0 "工程在预算范围内。"
 agot_colonization_events.1401.a.duel_failure:0 "工程超出预算。"
 agot_colonization_events.1401.success.toast.t:0 "工程在预算范围"
 agot_colonization_events.1401.failure.toast.t:0 "工程超出预算"
 agot_colonization_events.1401.b:0 "派部队去重建，把堤坝给做完。"
 agot_colonization_events.1401.c:0 "或许这处垦殖地一开始就要完……"
 agot_colonization_events.1402.t:0 "[obstacle_province.GetNameNoTooltip]：沼泽热"
 agot_colonization_events.1402.desc:0 "我在[obstacle_province.GetName]的沼泽地殖民地春季常遭洪水侵袭，但威胁已随防洪堤坝系统的逐步完工而有所缓解——这些堤坝用于阻挡和分流上涨的潮水。\n\n然而，殖民地仍受一种神秘热病困扰：湿热的水面上蚊虫肆虐，似乎正是这些叮咬飞虫传播了疾病。患者会发热、寒战，并伴有严重的虚脱。\n\n殖民者现联名请愿，要求提供柳树皮和艾蒿缓解疼痛与驱散蚊虫。"
 agot_colonization_events.1402.a:0 "他要多少我给多少。"
 agot_colonization_events.1402.b:0 "神职人员该做慈善了……"
 agot_colonization_events.1402.c:0 "他们要能加班加点排干沼泽，这还是问题吗！"
 agot_colonization_events.1501.t:0 "[obstacle_province.GetNameNoTooltip]：最后的突袭"
 agot_colonization_events.1501.desc:0 "夜幕的掩护下，一支走投无路的海盗残兵突袭了定居点的仓库。他们烧毁谷物、点燃房屋，受惊的居民只得慌忙奔逃以求自保。有报告称，地面被烧得焦黑，物资遭人劫掠，而海盗消失在夜色中时，远处还回荡着他们疯狂的笑声。\n\n除非我果断解决这些劫掠者，否则这个定居点撑不了多久了。"
 agot_colonization_events.1501.a:0 "追击他们，全部杀死，一个不留。"
 agot_colonization_events.1501.a.duel_success:0 "你的士兵出其不意地抓住了掠夺者，结束了他们当地的控制"
 agot_colonization_events.1501.a.duel_failure:0 "追捕中你折损了部下。掠夺者带着关键补给消失无踪"
 agot_colonization_events.1501.b:0 "加强防御并节约剩余的物资。"
 agot_colonization_events.1501.b.duel_success:0 "你谨慎的部署赢得了时间，保全了补给，直到你的士兵能将他们击退"
 agot_colonization_events.1501.b.duel_failure:0 "海盗袭击者再次发动突然袭击，攻势比上一次更猛"
 agot_colonization_events.1501.c:0 "海盗的存在让殖民成了徒劳之举。"
 agot_colonization_events.1501.success.toast.t:0 "海盗余孽被清剿"
 agot_colonization_events.1501.failure.toast.t:0 "海盗余孽依然存在"
 agot_colonization_events.1502.t:0 "[obstacle_province.GetNameNoTooltip]: 海岸上的阴影"
 agot_colonization_events.1502.desc:0 "我是被一则离奇的消息惊醒的：今早雾气散去后，人们发现在 [obstacle_province.GetName] 附近的海岸线上，漂着一艘饱经风霜的船。原本没有任何商船会在此时出现，居民们聚集在岸边，不安地低声谈论——没人能确定这艘船是被遗弃了、遭了诅咒还是某种不祥的预兆。几小时过去了，那艘船却始终静悄悄地在原地漂着。\n\n到了黄昏时分，尽管没人见过有任何人下船，定居点的大门上却被人用一把生锈的匕首钉了一张警告字条。\n\n#italic 我们只为失窃之物而来。交出你们的物资和船只，或者葬身潮水之下吧。#!"
 agot_colonization_events.1502.a:0 "我们以火与铁迎接他们。"
 agot_colonization_events.1502.a.duel_success:0 "你的手下击退了登陆小队，并烧毁了他们的船只"
 agot_colonization_events.1502.a.duel_failure:0 "掠夺者洗劫了港口，然后消失在迷雾中"
 agot_colonization_events.1502.b:0 "给他们一些钱，让他们再也别回来。"
 agot_colonization_events.1502.b.duel_success:0 "他们拿走硬币，在潮水中消失不见"
 agot_colonization_events.1502.b.duel_failure:0 "他们拿走硬币，仍然发动攻击"
 agot_colonization_events.1502.c:0 "这些海盗带来的麻烦已超出其价值。"
 agot_colonization_events.1502.success.toast.t:0 "海盗余孽被清剿"
 agot_colonization_events.1502.failure.toast.t:0 "海盗余孽依然存在"
 agot_colonization_events.1503.t:0 "[obstacle_province.GetNameNoTooltip]：海盗指挥官"
 agot_colonization_events.1503.desc:0 "残存的海盗首领之一[pirate_leader.GetName]已集结起一支散兵游勇，并在[obstacle_province.GetNameNoTooltip]附近某处建立了简易据点。[pirate_leader.GetSheHe|U]通过使者传话，要求我们别去招惹他们，否则整个定居点都将化为火海。\n\n全力进攻可能会带来后果，但坐视不管也同样危险。"
 agot_colonization_events.1503.a:0 "向[pirate_leader.GetFirstNameNoTooltip]发起单挑。"
 agot_colonization_events.1503.a.duel_success:0 "你亲自杀死了海盗指挥官，[pirate_leader.GetHerHis]的船员四散逃亡"
 agot_colonization_events.1503.a.duel_failure:0 "[pirate_leader.GetSheHe|U]拒绝了你"
 agot_colonization_events.1503.b:0 "在黑暗的掩护下强攻要塞。"
 agot_colonization_events.1503.b.duel_success:0 "要塞被摧毁了，威胁消失"
 agot_colonization_events.1503.b.duel_failure:0 "你的士兵掉进了陷阱。只有很少的人活着回来"
 agot_colonization_events.1503.c:0 "花钱让它们离开。"
 agot_colonization_events.1503.c.duel_success:0 "他们拿走金子，消失在迷雾中"
 agot_colonization_events.1503.c.duel_failure:0 "他们拿走金子，并感谢你的“赠予”"
 agot_colonization_events.1503.d:0 "如果我们不管他们，他们肯定也会离开的……"
 agot_colonization_events.1503.success.toast.t:0 "海盗余孽被清剿"
 agot_colonization_events.1503.failure.toast.t:0 "海盗余孽依然存在"
 agot_colonization_events.1504.t:0 "[obstacle_province.GetNameNoTooltip]：伏击"
 agot_colonization_events.1504.desc:0 "我的士兵在海岸附近执行例行巡逻时，遭到了装备精良的海盗伏击。隐蔽的洞穴成了他们发起突袭的集结点。这些残兵并非漫无目的的劫掠者，他们组织有序，且下手狠辣。\n\n若我们现在不将他们彻底铲除，他们或许会攻占整个定居点。"
 agot_colonization_events.1504.a:0 "冲进洞穴，一个不留。"
 agot_colonization_events.1504.a.duel_success:0 "洞穴已清剿"
 agot_colonization_events.1504.a.duel_failure:0 "你的人在黑暗中被屠戮殆尽"
 agot_colonization_events.1504.b:0 "太危险了。加派守卫，祈祷他们尽快离开"
 agot_colonization_events.1504.success.toast.t:0 "海盗余孽被清剿"
 agot_colonization_events.1504.failure.toast.t:0 "海盗余孽依然存在"