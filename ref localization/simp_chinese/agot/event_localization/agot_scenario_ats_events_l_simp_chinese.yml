l_simp_chinese:
 agot_scenario_ats.1000.t:0 "海外的黑龙"
 agot_scenario_ats.1000.desc:0 "每个夜晚，我渐渐入睡，梦境便开始淹没这宁静的时刻。我梦见过我的兄弟们，在一片猩红色的草原上，被他们喉咙涌出的血呛住，痛苦挣扎。我还梦见一柄铁锤，猛的砸在冰冷的铁砧上，将我父亲的军队击得支离破碎。我还梦见，一头黑龙被一支兄弟的箭射中心脏，倒在一座哭泣的山峰下。\n\n这些梦后来都成了现实，我知道我今后做的梦也都将成真。我最近又做梦了，我梦见一场婚宴上，一头巨龙自冰冷的蛋壳中挣脱而出。我又梦见一个巨人，身披闪亮的白袍白甲，站在一位银发国王旁。我一直琢磨着梦里的每一个细节，试图解读其中含义。现在我终于明了，那巨龙将是前来争夺我王位之人，而那位巨人，则是我守护我的勇士。\n\n这些梦境预示着我终将成为国王——它们将证明我是黑龙的儿子。但在向世人证明一切之前，我必须先证明给我的叔叔[bittercringe.GetNameNicknamed]看。"
 agot_scenario_ats.1000.a:0 "我会让[bittercringe.GetHerHim]明白#italic 我才是真正的黑龙！#!"
 agot_scenario_ats.1000.a.tt:0 "你将选择应对寒铁的对策"
 agot_scenario_ats.1001.t:0 "石头、钢铁与河水"
 agot_scenario_ats.1001.desc:0 "他们称我为「红寡妇」，冷壕堡里的老女人，尽是些冷嘲热讽。他们口中这位红寡妇在十岁时失去了第一任丈夫，他死在了[Glossary( '红草原', 'REDGRASS_FIELD_GLOSS' )]上。我曾以为今后不会再有失去，但没想到那仅仅只是个开始。我的儿子、女儿、父亲，还有另外三位丈夫，现在都已相继离我而去。\n\n父亲将冷壕堡留给了我，却在我接手时埋下了陷阱。我必须在父亲死后两年内结婚，否则父亲的遗嘱会将我的土地转给堂亲。我注意到[longinch.GetFullNameNicknamed]爵士看我时的贪婪目光，[longinch.GetSheHe]满心想着如何占有我的土地，却从没想过我的感受。\n\n父亲的遗嘱已经够让我心烦，周边的领主又开始打起我的注意。他们认为没有男人的女人是软弱的。但他们不知道的是，我已经不再相信男人。我相信的是石头、钢铁和河水。我相信的是护城河，而我的河道永远不会干涸——无论天气如何干旱。那些想要伤害我的人会发现，这个寡妇非常坚强，且满身剧毒。"
 agot_scenario_ats.1001.a:0 "填满护城河！"
 agot_scenario_ats.1001.a.tt:0 "你将在方格河上筑坝"
 agot_scenario_ats.1002.t:0 "方格狮"
 agot_scenario_ats.1002.desc:0 "我从坚定堡塔楼的阳台向外眺望，发现自己竟已变得这么渺小虚弱。尽管我的身体依旧挺拔，但我的家族已经支离破碎，红龙夺走了我的一切。这一切都是拜国王所赐，可每个人都说我应该感谢他的仁慈。\n\n但就是这份仁慈，让我在[Glossary( '红草原', 'REDGRASS_FIELD_GLOSS' )]上失去了我的儿子们；作为我支持真王的惩罚，这份仁慈又将我的女儿从身边带走；我的妻子之后也选择随之而去。\n\n戴伦让我的女儿成为了静默姐妹，我见她时，一个连父亲名字都不能说出口的人。现在，我身边只剩下两名雇佣骑士，[bennis.GetFirstNameNicknamed]和[dunk.GetTitledFirstNameNicknamed]。邓克是个不错的年轻人，但并不是我的血脉。我最后的血脉在春天走了，死在了君临城的瘟疫里，成了静默的鬼魂，这是戴伦的仁慈从我这夺走的最后一样东西。\n\n那么，我究竟为什么要感谢他？"
 agot_scenario_ats.1002.a:0 "国王的仁慈往往带着剧毒。"
 agot_scenario_ats.1002.a.tt:0 "你将独孤地坚守"
 agot_scenario_ats.1003.t:0 "比城墙还笨"
 agot_scenario_ats.1003.desc:0 "阿兰爵士去世已经有两年；那场岑树滩的意外，也已经过去两年；王国失去敬爱的王子，同样是两年前的事情。那一天，为了保住我的腿，三位善良的人死了。#italic 我#!怎么做才能对得起他们的死？\n\n[maekar.GetTitledFirstName]将他的小儿子托付给我，我终于看到了偿还一切的希望。岑树滩的事情后，我们启程前往多恩拜访伊戈的亲戚，春季大瘟疫就在这个时候爆发。伊戈的祖父死后，他的叔叔[aerys.GetFirstName]继承了铁王座，而[bloodraven.GetFirstNameNicknamed]大人则出任首相。据说血鸦大人有一千零一只眼睛——在这个酷热的夏天，整个王国都生活在恐惧中。\n\n旱灾正在王国内蔓延，我们在学城见到了伊戈的哥哥[aemon.GetFirstName]，随后在河湾地内寻找效忠对象。我们找到了[eustace.GetFullName]，一个除了姓氏和少量旧物外一无所有的老骑士。春天已经结束，盛夏来临，为了那三位死去的我所亏欠的善良之人，我会竭尽全力对领主效忠。"
 agot_scenario_ats.1003.a:0 "我们走吧，伊戈。"
 agot_scenario_ats.1003.a.tt:0 "你将返回坚定堡"
 agot_scenario_ats.2000.t:0 "没有剑的国王"
 agot_scenario_ats.2000.desc:0 "当父兄战死于[Glossary( '红草原', 'REDGRASS_FIELD_GLOSS' )]时，是叔叔[bittercringe.GetName]接过族剑黑火，带着我们投奔泰洛西——母亲的故乡。在我们流亡之际，[bittercringe.GetSheHe|U]以佣兵之业谋生，不曾承诺为我索取铁王座，也不肯将族剑交还给我。如果没有[bittercringe.GetHerHis]的支持，我不可能说服任何人支持我的宣称。\n\n若想拉拢[bittercringe.GetHerHim]，我必须慎之又慎。[bittercringe.GetNameNicknamedNoTooltip]眼中只认可刀剑与力量，一场决斗或是最佳选择——但世人皆知，[bittercringe.GetHerHis]剑术天下无双，无人可敌——或者我该扬长避短，对[bittercringe.GetHerHim]晓之以理，但[bittercringe.GetSheHe]也不大可能听信于我。又或者，我可索性扬帆西渡，任[bittercringe.GetHerHim]去生[bittercringe.GetHerHis]的闷气。"
 agot_scenario_ats.2000.a:0 "我将向[bittercringe.GetHerHim]的剑术发起挑战！"
 agot_scenario_ats.2000.a.tt:0 "你将同寒铁决斗"
 agot_scenario_ats.2000.b:0 "我会对[bittercringe.GetHerHim]说些好话。"
 agot_scenario_ats.2000.b.tt:0 "你尝试说服寒铁将「黑火」给你。"
 agot_scenario_ats.2000.c:0 "那就不管[bittercringe.GetNameNicknamedNoTooltip]了，我会找到我自己的路。"
 agot_scenario_ats.2000.c.tt:0 "你将放弃取得「黑火」和寒铁的支持"
 agot_scenario_ats.2001.t:0 "执剑之王"
 agot_scenario_ats.2001.desc.daemonwins:0 "我站在[bittercringe.GetNameNicknamed]那伤痕累累的身躯旁，手中的剑高高举过头顶。“投降！”见[bittercringe.GetSheHe]已无力起身来与我对抗，我厉声喝道。[bittercringe.GetSheHe|U]瘫倒在地上，示意自己已经投降。在我将[bittercringe.GetHerHim]扶起后，[bittercringe.GetSheHe]沉思了片刻，走到了[blackfyre.GetName]放置的地方。\n\n[bittercringe.GetSheHe]将剑从剑鞘中抽出，然后单膝跪地。“我原本不相信你是你父亲的儿子，可如今我看到，你就像是戴蒙重生了一般。收下黑火吧，还有我所能给予的一切帮助。”我颤抖着伸出手，将这把征服者之剑高高举向空中。\n\n我#italic 必将#!成为国王！"
 agot_scenario_ats.2001.desc.daemonloses:0 "我被打倒在地倒在地上，遍体鳞伤，而[bittercringe.GetNameNicknamed]站在我身旁，脸上满是厌恶的神情。“小子，你不配持有这把征服者之剑，也休想得到我的帮助——你的那些梦不过是蠢货的妄想罢了。”\n\n但我如今别无选择，即便没有[bittercringe.GetHerHis]的帮助，我也必须继续前行。"
 agot_scenario_ats.2001.a:0 "现在开始计划我的征服！"
 agot_scenario_ats.2001.a.tt:0 "你可以选择夺取铁王座的方式"
 agot_scenario_ats.2001.b:0 "我没能得到那把剑，现在只能靠自己了。"
 agot_scenario_ats.2001.b.tt:0 "你继续自己谋划今后的事情"
 agot_scenario_ats.2002.t:0 "执剑之王"
 agot_scenario_ats.2002.desc.daemonhassword:0 "我饱含激情的恳求让[bittercringe.GetNicknameNoTooltip]相信了我的梦的真实性，也相信了我有能力去争取属于我的与生俱来的权利。[bittercringe.GetSheHe|U]把[blackfyre.GetName]赐予了我，还表示会尽[bittercringe.GetSheHe]所能给予我的一切支持。\n\n握着这把征服者之剑，我#italic 将#!为我们家族开辟一个崭新的未来，登上本就属于我们的铁王座！"
 agot_scenario_ats.2002.desc.nosword:0 "[bittercringe.GetNicknameNoTooltip]打量着我，[bittercringe.GetHerHis]那双钢铁般的紫色眼眸上下扫视着我。接着，他咧嘴一笑，拒绝了我的请求，赌咒说只要[bittercringe.GetSheHe]还活着，我就永远别想得到[blackfyre.GetName]，也不会得到[bittercringe.GetHerHis]的支持。尽管遭遇了这次挫折，但我依然坚信自己的梦是真实可行的，而且我登上王位的时刻也越来越近了。\n\n我#italic 必将#!坐上铁王座，看着所有怀疑我的人在我脚下屈膝臣服！"
 agot_scenario_ats.2002.a:0 "现在开始计划我的征服！"
 agot_scenario_ats.2002.a.tt:0 "你可以选择夺取铁王座的方式"
 agot_scenario_ats.2002.b:0 "我没能得到那把剑，现在只能靠自己了。"
 agot_scenario_ats.2002.b.tt:0 "你继续自己谋划今后的事情"
 agot_scenario_ats.2010.t:0 "水坝上的麻烦"
 agot_scenario_ats.2010.desc:0 "一名仆人匆忙冲入冷壕堡的庭院，上气不接下气。“夫人啊，坝上出事儿了！”他一脸惊惶的解释道，一个在大坝干活的农民，竟被[eustace.GetFirstName]手下那个雇佣骑士[bennis.GetFirstNameNicknamed]爵士划破了脸。在场的还有一个雇佣骑士，年纪轻些，个头也高上一截。\n\n我原以为对那个农民戴克的处置能杀鸡儆猴，看来是我失算了。\n\n除开以血偿血，我已别无选择——但只要设伏以待，我或可利用这件事……"
 agot_scenario_ats.2010.a:0 "我会等[eustace.GetFirstNameNoTooltip]爵士派使者来。"
 agot_scenario_ats.2010.a.tt:0 "你等着看谁会从坚定堡过来"
 agot_scenario_ats.2020.t:0 "水坝上的麻烦"
 agot_scenario_ats.2020.desc:0 "[dunk.GetFullName]顺着台阶登上坚定堡的顶楼，打断了我的白日梦——我正在想象那些我出生前便已发生的故事，[dunk.GetHerHis]的脸上写满了忧虑。\n\n一番询问得知，[dunk.GetSheHe]与[bennis.GetFullName]发现方格河——#italic 我的#!方格河——在流经我的领地时变得干涸。[rohanne.GetFullNameNicknamed]筑坝截流，出于报复，[bennis.GetTitledFirstNameNoTooltip]打伤了[rohanne.GetHerHis]的一个农民。若想避免公开冲突，我必须派出使者面见红寡妇，希望能提出足够条件让[rohanne.GetHerHis]拆除大坝、保全我的领地。\n\n[dunk.GetFullNameNoTooltip]自告奋勇，愿意代替我前去，而我则早已发誓，除非有朝一日重新夺回城堡，否则永不踏入冷壕堡一步。话虽如此，我也心知只有亲自前往才能显示诚意——我该同意[dunk.GetHerHim]的提议吗？"
 agot_scenario_ats.2020.a:0 "就派[dunk.GetTitledFirstNameNoTooltip]前去。"
 agot_scenario_ats.2020.a.tt:0 "[dunk.GetTitledFirstNameNoTooltip]将被派往冷壕堡进行谈判"
 agot_scenario_ats.2020.b:0 "我会亲自去，尽管这会让我痛苦。"
 agot_scenario_ats.2020.b.tt:0 "尽管你发过誓，但你还是会去冷壕堡"
 agot_scenario_ats.2021.t:0 "沉睡的狮子"
 agot_scenario_ats.2021.desc:0 "当我接近冷壕堡的大门时，它的雄壮将我深深震撼。坚定堡不过是几堵矮墙包围的孤塔一座，冷壕堡则是一座真正的城堡。\n\n等到我穿过维伯家族的巨大蜘蛛旗，在看见已然褪色的方格狮浮雕时，心头不禁一阵灼痛。"
 agot_scenario_ats.2021.a:0 "我打破了自己的誓言……"
 agot_sceanrio_ats.2021.a.tt:0 "你将进入冷壕堡"
 agot_scenario_ats.2030.t:0 "水坝上的麻烦"
 agot_scenario_ats.2030.desc:0 "当我和伊戈返回坚定堡时，发现滋养当地森林与农田的溪流已近完全干涸。另一位效忠于[eustace.GetTitledFirstName]的雇佣骑士——[bennis.GetTitledFirstNameNicknamed]加入了我们溯流而上的调查队。虽说近来干旱严重，但溪水断流得着实蹊跷。\n\n我们骑行不久便发现了截断水源的水坝，以及一群效忠冷壕堡的农民。未等我反应，[bennis.GetTitledFirstNameNoTooltip]已冲上前去，口角迅速升级为肢体冲突，某个农民脸上为这件事永久留下了疤痕。\n\n返回坚定堡途中，我们将冲突之事禀报[eustace.GetTitledFirstNameNoTooltip]，且看[eustace.GetSheHe]要派遣谁去会晤冷壕堡的红寡妇。"
 agot_scenario_ats.2030.a:0 "现在就看我的领主会怎么决定了。"
 agot_scenario_ats.2030.a.tt:0 "你将等待尤斯塔斯派遣人选的通知"
 agot_scenario_ats.3010.t:0 "一袋硬币的提议"
 agot_scenario_ats.3010.desc:0 "我正练习箭术时，听说一名使者代[eustace.GetTitledFirstNamePossessive]前来。[dunk.GetSheHe|U]自称[dunk.GetTitledFirstNameNicknamed]，是一位雇佣骑士。[dunk.GetSheHe|U]确实比「[longinch.GetNicknameNoTooltip]」还要高大，肩宽体壮，眉眼间有种粗犷的俊朗。我们之间的调笑来得比我预想的更自然，虽然[dunk.GetSheHe]显然对此十分生涩。\n\n寒暄和自然的调笑过后，[dunk.GetTitledFirstNameNoTooltip]递给我一袋金币，作为对他所伤农民的赔偿，并要求我拆除方格河上的水坝——他竟然声称那河流属于奥斯格雷家族，尽管在红草原之战后他们已经失去了这条溪流。"
 agot_scenario_ats.3010.a:0 "我接受这些金子，也同意拆除水坝。"
 agot_scenario_ats.3010.a.tt:0 "你将拆除水坝，这样一来所有人都能分到少量的水"
 agot_scenario_ats.3010.b:0 "你的金子我要了，但我的护城河不能没有水。"
 agot_scenario_ats.3010.b.tt:0 "你将拿这些金子赔偿底下的农民，但水坝还要继续修"
 agot_scenario_ats.3010.c:0 "我不要你的金子，你也别想要我的水。"
 agot_scenario_ats.3010.c.tt:0 "你不要这些金子，同时将继续修水坝"
 agot_scenario_ats.3011.t:0 "血的提议"
 agot_scenario_ats.3011.desc:0 "我正练习箭术时，听说一名使者代[eustace.GetTitledFirstNamePossessive]前来。[dunk.GetSheHe|U]自称[dunk.GetTitledFirstNameNicknamed]，是一位雇佣骑士。[dunk.GetSheHe|U]确实比「[longinch.GetNicknameNoTooltip]」还要高大，肩宽体壮，眉眼间有种粗犷的俊朗。我们之间的调笑来得比我预想的更自然，虽然[dunk.GetSheHe]显然对此十分生涩。\n\n寒暄和自然的调笑过后，[dunk.GetTitledFirstNameNoTooltip]提出愿让[bennis.GetFirstNameNicknamed]爵士亲偿血债，并要求我拆除方格河上的水坝——他竟然声称那河流属于奥斯格雷家族，尽管在红草原之战后他们已经失去了这条溪流。"
 agot_scenario_ats.3011.a:0 "这个人我收下了，也同意拆除水坝。"
 agot_scenario_ats.3011.a.tt:0 "你将拆除水坝，这样一来所有人都能分到少量的水"
 agot_scenario_ats.3011.b:0 "你的人我收下了，但我的护城河不能没有水。"
 agot_scenario_ats.3011.b.tt:0 "你将拿这个囚犯来偿还底下农民收到的伤害，但水坝还要继续修"
 agot_scenario_ats.3011.c:0 "我不想去管你们雇佣骑士的事情。"
 agot_scenario_ats.3011.c.tt:0 "你拒绝了这个囚犯，同时将继续修水坝"
 agot_scenario_ats.3012.t:0 "一袋硬币的提议"
 agot_scenario_ats.3012.desc:0 "我正练习箭术时，我听见冷壕堡大门开启时的阵阵呻吟。庭院中的人们霎时间呆若木鸡，只见一员骑手孤身骑入，[eustace.GetSheHe|U]让人把[eustace.GetHerHis]马牵到马厩去，而后笨重地向我走来。那是[eustace.GetFirstName]爵士，面庞因愤怒而通红。\n\n[eustace.GetSheHe|U]在我面前停止，完全不顾试图阻拦他的[longinch.GetNickname]。[eustace.GetFirstNameNoTooltip]爵士亲身前来谈判，一如往昔记忆中般魁梧雄壮，只是[eustace.GetHerHis]眼中满是红草原一役带来的空虚。\n\n几步路程，我带他到会客厅坐下，[eustace.GetFirstNameNoTooltip]爵士提出用金子来赔偿受伤的农民，并要求我拆除大坝，这样大家都能分到少量的水。"
 agot_scenario_ats.3012.a:0 "我接受这些金子，也同意拆除水坝。"
 agot_scenario_ats.3012.a.tt:0 "你将拆除水坝，这样一来所有人都能分到少量的水"
 agot_scenario_ats.3012.b:0 "你的金子我要了，但我的护城河不能没有水。"
 agot_scenario_ats.3012.b.tt:0 "你将拿这些金子赔偿底下的农民，但水坝还要继续修"
 agot_scenario_ats.3012.c:0 "我不要你的金子，你也别想要我的水。"
 agot_scenario_ats.3012.c.tt:0 "你不要这些金子，同时将继续修水坝"
 agot_scenario_ats.3013.t:0 "血的提议"
 agot_scenario_ats.3013.desc:0 "我正练习箭术时，我听见冷壕堡大门开启的声音。庭院中的人们霎时间愣在原地，只见一骑手独自策马而入，命人把[eustace.GetHerHis]马牵到马厩去，随后便大步朝我走来。来者正是[eustace.GetFirstName]爵士，[eustace.GetHerHis]面容因怒火涨得通红。\n\n[eustace.GetSheHe|U]离我几步远的地方停下，试图阻拦他的[longinch.GetNickname]完全被忽视了。[eustace.GetFirstNameNoTooltip]爵士是来谈判的——他依旧像我记忆中那般高大魁梧、体格健壮，只是那双眼睛里多了一丝在红草原之战前不曾有过的空虚。\n\n我们简短移步至大厅落座，[eustace.GetFirstNameNoTooltip]爵士提出捉拿[bennis.GetFirstNameNicknamed]爵士，以此补偿那名受伤的农夫，并请求我拆除水坝。然而正值大旱，贸然拆坝很可能只会给我们二人带来更多的麻烦。"
 agot_scenario_ats.3013.a:0 "这个人我收下了，也同意拆除水坝。"
 agot_scenario_ats.3013.a.tt:0 "你将拆除水坝，这样一来所有人都能分到少量的水"
 agot_scenario_ats.3013.b:0 "你的人我收下了，但我的护城河不能没有水。"
 agot_scenario_ats.3013.b.tt:0 "你将拿这个囚犯来偿还底下农民收到的伤害，但水坝还要继续修"
 agot_scenario_ats.3013.c:0 "我不想去管你们雇佣骑士的事情，你也别想要我的水。"
 agot_scenario_ats.3013.c.tt:0 "你拒绝了这个囚犯，同时将继续修水坝"
 agot_scenario_ats.3020.t:0 "蜘蛛的交易"
 agot_scenario_ats.3020.desc:0 "我等了一会儿才被请入[rohanne.GetFullNamePossessive]的会客厅。[rohanne.GetSheHe|U]堂而皇之地坐本该属于我族的宝座上——在这曾是我们家堡的城堡里——竟还有脸和我寒暄。我按捺住怒火与憎恶，此刻不得不做出违背自己誓言之举。\n\n我该给冷壕堡[rohanne.GetLadyLord]什么，钱？或是血？哪个才能让[rohanne.GetHerHim]拆掉这该死的水坝？"
 agot_scenario_ats.3020.a:0 "金子应该够补偿你那些受伤的农民了。现在你能拆除水坝了吗？"
 agot_scenario_ats.3020.a.tt:0 "你将提议赔偿[rohanne.GetNameNoTooltip]金子"
 agot_scenario_ats.3020.b:0 "带走[bennis.GetFirstNameNicknamed]，现在把水坝拆了吧。"
 agot_scenario_ats.3020.b.tt:0 "你将提议将[bennis.GetFirstNameNoTooltip]爵士作为俘虏，并要求拆除水坝"
 agot_scenario_ats.3021.t:0 "我的方格河"
 agot_scenario_ats.3021.desc:0 "[rohanne.GetTitledFirstNameNicknamed]让步了，同意拆除阻塞方格河的水坝。虽然这下都得挨旱，但好歹能保下坚定堡周边的土地。\n\n现在，唯一的希望便是下雨……而且得快。"
 agot_scenario_ats.3021.a:0 "也许这个红寡妇终究没有说的那么冷酷……"
 agot_scenario_ats.3021.a.tt:0 "水坝拆除了，方格河再次流过坚定堡"
 agot_scenario_ats.3030.t:0 "狮子还是橡子？"
 agot_scenario_ats.3030.desc:0 "[eustace.GetFirstName]爵士同意了我的自告奋勇，由我代[eustace.GetHerHis]前去冷壕堡，与红寡妇谈判。关于冷壕堡夫人的种种传言在我脑中翻腾：她苍老嶙峋的手指，她那些谋杀丈夫的传说，还有她在惨白月光下于城堡中施行的邪恶巫术。也许我此行前往冷壕堡，正是奔赴自己的末日，但至少我是以侍奉领主的名义去面对的。\n\n当我与伊戈离开坚定堡时，我们一路讨论着礼仪，以及该如何恰当地接近一位出身高贵的女士。如果我们想在与维伯家族那位危险的“女巫”会面时活下来，我就必须以符合她身份的方式与她交谈——至少，伊戈是这么告诉我的。"
 agot_scenario_ats.3030.desc.eustacegoing:0 "[eustace.GetFirstName]爵士拒绝了我代[eustace.GetHerHis]前往冷壕堡，与「红寡妇」谈判的提议。[eustace.GetSheHe|U]决定亲自出面，以表诚意，尽管他曾立誓决不再踏足自己家族的古老家堡。尤斯塔斯爵士离开后，我一直在坚定堡的顶楼来回踱步，心想方格狮是不是为了闯入蜘蛛的致命陷阱而舍弃了太多尊严。"
 agot_scenario_ats.3030.a:0 "但愿红寡妇能好好讲道理。"
 agot_scenario_ats.3030.a.tt:0 "谈判继续"
 agot_scenario_ats.3033.t:0 "寡妇之巢"
 agot_scenario_ats.3033.desc:0 "我和伊戈穿过冷壕堡大门，从一座斑驳的方格狮浮雕下走过，这里显然是历史悠久。尽管被[longinch.GetNameNicknamed]爵士误导捉弄一番，我终于是见到了[rohanne.GetFullNameNicknamed]。根据所有听来的传闻，这个红寡妇是个用邪恶巫术杀死每一任丈夫的老巫婆。\n\n可是，站在我面前的是个大约二十五岁的女孩，娇小而漂亮。[rohanne.GetSheHe]从靶场走来，上下打量过我，接着用手指抚了抚我借来的奥斯格雷家族方格狮外衣。[rohanne.GetHerHis]说话的声音让我一下子脸变得通红。\n\n[eustace.GetFirstName]爵士将谈判托付给我，但怎样的条件最能取悦红寡妇？我该怎么如何说服[rohanne.GetHerHim]拆掉水坝？"
 agot_scenario_ats.3033.a:0 "[rohanne.GetLadyLord]，请拿上这些金子，让方格河继续流淌吧。"
 agot_scenario_ats.3033.a.tt:0 "你提议给受伤的农民金币补偿，并要求拆除水坝"
 agot_scenario_ats.3033.b:0 "带上[bennis.GetFirstNameNicknamedNoTooltip]爵士去把水坝拆了。"
 agot_scenario_ats.3033.b.tt:0 "你将提议将[bennis.GetFirstNameNoTooltip]爵士作为俘虏，并要求拆除水坝"
 agot_scenario_ats.3031.t:0 "寡妇之噬"
 agot_scenario_ats.3031.desc:0 "[rohanne.GetFirstName]夫人直截拒绝了我的提议，水坝不会被拆除。没有那水源，[eustace.GetFirstName]爵士的土地将会枯萎，[eustace.GetHerHis]的人民也将死去。\n\n我想起[eustace.GetFirstNameNoTooltip]爵士曾向我讲述的故事——关于[eustace.GetHerHis]的儿子[addam.GetFirstName]曾经与[rohanne.GetFirstNameNoTooltip]夫人的感情，我试图通过提起此事来向[rohanne.GetHerHim]求情。\n\n愤怒扭曲了[rohanne.GetHerHis|U]的脸，我还没来得及反应，[rohanne.GetSheHe|U]的手像箭矢一样打在我脸上，火辣的刺痛顿时蔓延。[rohanne.GetSheHe|U]厉声告诉我，[eustace.GetFirstNameNoTooltip]爵士当年带着自己的儿子们去参战，以为黑龙能帮[eustace.GetHerHis]从红龙手中夺回奥斯格雷家族曾经的一切，结果却害死了他们。我只能呆立原地，无言以对——只因得知我的领主竟然是个叛徒。\n\n[rohanne.GetHerHis]声音将我从恍惚惊醒：“滚出去，爵士。记住了，我会带着#italic 火与剑#!保护我的领地与水坝！”"
 agot_scenario_ats.3031.a:0 "我担心惹寡妇生气的后果……"
 agot_scenario_ats.3031.a.tt:0 "你等着看接下来会发生什么"
 agot_scenario_ats.4010.t:0 "燃烧的天空"
 agot_scenario_ats.4010.desc:0 "嘈杂的人声和刺眼的亮光将我从睡梦中惊醒。我走出门外，穿过聚集的城堡守卫，看到东方仿佛升起了太阳。但翻腾的浓烟和咆哮的火舌立刻打破了这种错觉。\n\n渥特林着火了！如果风向改变，我们的田地很快也会遭殃。"
 agot_scenario_ats.4010.a:0 "这件事都怪我。"
 agot_scenario_ats.4010.a.tt:0 "坚定堡将会责怪你，你被要求在河边见面"
 agot_scenario_ats.4020.t:0 "有罪的狮子"
 agot_scenario_ats.4020.desc:0 "我站在灶台旁等候时，听见[dunk.GetTitledFirstNamePossessive]的坐骑朝坚定堡靠近。从[dunk.GetHerHis]呼吸中的烦躁和跺脚的声响，我便知事情不顺。[dunk.GetSheHe|U]登上楼梯顶端，随即便指控我叛国。\n\n“你说过你为国王而战！”[dunk.GetSheHe]喊道。“我的确如此，我为继承族剑的国王而战。”我答道，感到一阵心碎的冲动。#italic 要是火球还活着，要是戴蒙碾过了加尔温·科布瑞，要是他拿下了哭泣山脊，要是我的儿子们……#!\n\n但如今为时已晚，我无力阻止[dunk.GetTitledFirstNameNoTooltip]带着愤怒冲出房间。他顺着楼梯离开，留下我一人与遗物独处。"
 agot_scenario_ats.4020.a:0 "要是当初……"
 agot_scenario_ats.4020.a.tt:0 "你今晚将会休息"
 agot_scenario_ats.4021.t:0 "燃烧的天空"
 agot_scenario_ats.4021.desc:0 "红寡妇拒绝了我的提议后，我忧郁地沉默着骑马回家，直奔自己的房间，希望忘记前一天的屈辱。夜深人静时，橙红色光芒将我从睡梦中惊醒。我揉了揉眼睛，驱散困意，把昨晚用来喝酒的旧高脚杯推到一边。我透过东边的窗户向外望去，却只见夜色的深蓝。困惑中我回头看向那太阳，才意识到根本不是太阳。\n\n翻卷的浓烟与烈火吞噬了渥特林，坚定堡的仆人们正拼命从井里打水，以防火势蔓延。我瞬间明白了——这是红寡妇干的。\n\n现在，我别无选择，要么在战场上迎战，要么选择谈判，没有中间地带。"
 agot_scenario_ats.4021.a:0 "我们将骑马过去……现在只剩下一个办法。"
 agot_scenario_ats.4021.a.tt:0 "你即将决定接下来做什么"
 agot_scenario_ats.4030.t:0 "狮子的谎言"
 agot_scenario_ats.4030.desc:0 "从冷壕堡归来的路上，我们一路沉默。我满腔怒火，心烦意乱——我效忠的领主竟曾为黑龙而战？[eustace.GetFirstName]爵士口口声声说自己“效忠真正的国王”，但他从未说过是哪位国王。\n\n伊戈同样气愤，[egg.GetHerHis]的父亲在红草原上击溃了黑龙的军队，如今却去效忠黑龙的一个骑士。#italic 呆子邓克，比城墙还笨……#!\n\n回到城堡，我吩咐伊戈照料马匹，自己则踏着重步登上塔楼。我怒气冲冲地质问[eustace.GetFirstNameNoTooltip]爵士：“你是个叛徒。”我斩钉截铁地说，却意识到事情很少如此简单。\n\n“如果黑龙获胜，我们就是忠臣，而「野心家」戴伦的支持者才是叛徒。”[eustace.GetFirstNameNoTooltip]指出。现在我必须作出决定：是继续为一个叛徒效力，还是重新成为流浪骑士？"
 agot_scenario_ats.4030.a:0 "我们必须离开，我不能为叛徒效力。"
 agot_scenario_ats.4030.a.tt:0 "你打算一有机会就离开这里"
 agot_scenario_ats.4030.b:0 "黑龙红龙都无所谓，我毕竟发誓过效忠。"
 agot_scenario_ats.4030.b.tt:0 "你决定继续留在坚定堡"
 agot_scenario_ats.4031.t:0 "燃烧的天空"
 agot_scenario_ats.4031.desc:0 "我躺在冷壕堡地下室里，正做着一个美好的梦，可一阵骚动猛然把我吵醒。伊戈已守在一旁，我们随一队仆役和征召农兵冲上台阶，来到庭院。\n\n渥特林燃起熊熊大火，干旱使树木野草干枯，火势远超普通野火。众人冲向水井，拎起水桶准备灭火。\n\n到了早晨，树林已被烧得焦黑，许多庄稼也都毁于一旦。"
 agot_scenario_ats.4031.a:0 "火与剑……我必须留下来。"
 agot_scenario_ats.4031.a.tt:0 "你将会留下来见证一切"
 agot_scenario_ats.4031.b:0 "这改变不了什么，我必须留下了。"
 agot_scenario_ats.4031.b.tt:0 "你将会留下来见证一切"
 agot_scenario_ats.4031.c:0 "我不会为这个叛徒效力。"
 agot_scenario_ats.4031.c.tt:0 "你不顾眼下的冲突离开此地"
 agot_scenario_ats.4031.d:0 "这意味着一场冲突，骑士和军队都将参战。"
 agot_scenario_ats.4031.d.tt:0 "你必须做好战斗准备"
 agot_scenario_ats.5010.t:0 "灰烬之中"
 agot_scenario_ats.5010.desc.dunkstayed:0 "我的斥候报告，[eustace.GetFirstName]爵士正在渥特林火灾后集结[eustace.GetHerHis]部队和雇佣骑士。我现在有两个选择：要么直接进军坚定堡开战，要么在中间的溪流处与他们会面谈判。\n\n现在开战虽然不太光彩，但可以在[eustace.GetSheHe]反应过来前夺取坚定堡。\n\n选择谈判的话，如果[dunk.GetTitledFirstNameNicknamed]愿意在比武审判中出战，就有机会来除掉长人。无论选哪条路，我的骑士们都等着我做决定。"
 agot_scenario_ats.5010.desc.dunkleft:0 "我的斥候报告，[eustace.GetFirstName]爵士正在[wats_wood]火灾后集结[eustace.GetHerHis]部队和雇佣骑士。我现在有两个选择：要么直接进军坚定堡开战，要么在中间的溪流处与他们会面谈判。\n\n现在开战虽然不太光彩，但可以在[eustace.GetSheHe]反应过来前夺取坚定堡。\n\n选择谈判的话，就有机会通过比武审判来除掉长人。无论选哪条路，我的骑士们都等着我做决定。"
 agot_scenario_ats.5010.a:0 "我们骑马赶去小溪！"
 agot_scenario_ats.5010.a.tt:0 "你将遇见[eustace.GetFirstNameNoTooltip]爵士和[dunk.GetTitledFirstNameNoTooltip]爵士"
 agot_scenario_ats.5010.b:0 "我们上马参战！用火与剑！"
 agot_scenario_ats.5010.c:0 "我们骑马赶去小溪！"
 agot_scenario_ats.5010.c.tt:0 "你将遇见[eustace.GetFirstNameNoTooltip]爵士"
 agot_scenario_ats.5011.t:0 "谈判"
 agot_scenario_ats.5011.desc:0 "[longinch.GetFirstNameNicknamed]，我的骑士们与我抵达时，只见[dunk.GetTitledFirstNameNicknamed]和[eustace.GetFirstName]爵士在溪流对岸等候。[eustace.GetFirstNameNoTooltip]爵士立刻将渥特林起火一事归咎于我，“看看我的田地，都快干得冒烟了。除非我是个白痴，不然绝不可能放火。”我如此回应道，然而[eustace.GetSheHe]根本不听。在[eustace.GetHerHim]眼中，我是冷壕堡的邪恶红寡妇，专施妖术的巫婆。\n\n[dunk.GetTitledFirstNameNoTooltip]示意我靠近，我们在溪流中央会面，此处唯有我们能听见彼此的声音。[dunk.GetSheHe|U]掏出一枚刻有纹章的小戒指——四分格纹中，四条喷吐烈焰的三巨头火龙盘踞其上。那是盛夏厅[maekar.GetTitledFirstName]的纹章。[dunk.GetFirstNamePossessiveNoTooltip]的侍从竟是王子之子，现在要是打压他们，搞不好会惹得王子发火，我宁愿跟龙家结个善缘。但也不能轻易妥协，否则敌人会视我为软弱，何况我还被指控犯下了滔天罪行。\n\n溪流声在我的耳边作响，我回头望向[longinch.GetFirstName]，忽然意识到这或许是个机会——一场比武审判，足以证明我与纵火案无关。"
 agot_scenario_ats.5011.a:0 "我要求一场比武审判！[longinch.GetFirstNameNoTooltip]将作为我的代理骑士！"
 agot_scenario_ats.5011.a.tt:0 "你向尤斯塔斯要求一场比武审判"
 agot_scenario_ats.5011.b:0 "不会有什么审判了，开战吧！"
 agot_scenario_ats.5011.c:0 "我承认是我的错，我会拆除水坝的。"
 agot_scenario_ats.5011.c.tt:0 "你决定屈服，这让你显得很软弱"
 agot_scenario_ats.5012.t:0 "谈判"
 agot_scenario_ats.5012.desc:0 "当我和骑士们抵达溪边时，看见[eustace.GetFirstName]爵士独自等在对岸，身边只有几个装备简陋的农民。“我知道是你放的火，女巫！你用了邪恶的巫术！”[eustace.GetSheHe]隔着水流声吼道。\n\n“看看我的田，都干成什么样了，放火对我有什么好处？”我回应，但[eustace.GetFirstNameNoTooltip]完全听不进去。在[eustace.GetHerHim]眼中，我只是冷壕堡那个会施咒语的红寡妇。\n\n[eustace.GetFirstNameNoTooltip]爵士拔出佩剑，等着我们过溪。如果我率领军队进攻，坚定堡恐怕很难守住，但这样会辜负我儿时玩伴的感情，我那亲爱的[addam.GetFirstName]……\n\n我瞥了眼[longinch.GetFirstNameNicknamed]，一个计划逐渐成形。或许我可以要求通过比武审判来洗脱指控，从而避免一场战斗。一连串的想法涌入我的脑海……\n\n战斗会结束得很快，但也会很血腥。我的代理骑士可能在决斗中胜出，而我只能得到一座旧塔楼。又或许我该做些让步，这样在这干旱时期，我们就能再次共享水源。#italic 不管怎样选择，#bold 现在#!都必须做出决定了。#!"
 agot_scenario_ats.5012.a:0 "我要求一场比武审判！[longinch.GetFirstNameNoTooltip]将作为我的代理骑士！"
 agot_scenario_ats.5012.a.tt:0 "你向尤斯塔斯要求一场比武审判"
 agot_scenario_ats.5012.b:0 "不会有什么审判了，开战吧！"
 agot_scenario_ats.5012.c:0 "我承认是我的错，我会拆除水坝的。"
 agot_scenario_ats.5012.c.tt:0 "你决定屈服，这让你显得很软弱"
 agot_scenario_ats.5013.t:0 "狮子的怒火"
 agot_scenario_ats.5013.desc:0 "尽管我尝试保持耐心与理性，[eustace.GetFirstName]爵士仍执意与我刀兵相见。遗憾的是，如今我不再只为水源而来——我要彻底踏平奥斯格雷家族那点残余势力！\n\n维伯家族将把方格纹的污渍从河湾地永远抹除。"
 agot_scenario_ats.5013.desc.eustacerefused:0 "[eustace.GetFirstName]爵士拒绝比武审判的要求，执意与我刀兵相见。遗憾的是，如今我不再只为水源而来——我要彻底踏平奥斯格雷家族那点残余势力！\n\n维伯家族将把方格纹的污渍从河湾地永远抹除。"
 agot_scenario_ats.5013.a:0 "用火与剑来审判！开战！"
 agot_scenario_ats.5013.a.tt:0 "你将同尤斯塔斯开战"
 agot_scenario_ats.5014.t:0 "血的审判"
 agot_scenario_ats.5014.desc:0 "[eustace.GetFirstName]爵士提出要求——比武审判。若我的代理骑士战败，我将拆除方格河的水坝，并为沃特林的火灾承担责任。\n\n如今已别无选择，只有应战。"
 agot_scenario_ats.5014.a:0 "[longinch.GetFirstNameNicknamed]将作为我的代理骑士。"
 agot_scenario_ats.5014.a.tt:0 "长人将参加这场比武审判"
 agot_scenario_ats.5020.t:0 "灰烬之中"
 agot_scenario_ats.5020.desc.dunkstayed:0 "渥特林大半都已烧成了灰烬，如果没有雨水，恢复原貌将遥遥无期。我几乎可以肯定，这是冷壕堡的红寡妇所为——她利用漫长旱季施展了某种邪恶魔法。[rohanne.GetSheHe|U]现在必定正向我的领地进军，我只剩两个选择。\n\n我可以集结余下的军队开战——然而眼下既无盟友，兵力也少得可怜——只能寄希望于方格狮纹旗还能有些威慑力。或者，我可以与她会面，尝试谈判。[dunk.GetTitledFirstNameNicknamed]认为我应该选择后者，听听对方的条件。[dunk.GetSheHe|U]年纪尚轻，不了解这个世界的真正残酷，但他[dunk.GetSheHe]的说法或许有些道理。\n\n我必须现在立刻做出选择，拖延太久取胜的可能性将愈发渺茫。"
 agot_scenario_ats.5020.desc.dunkleft:0 "渥特林大半都已烧成了灰烬，如果没有雨水，恢复原貌将遥遥无期。我几乎可以肯定，这是冷壕堡的红寡妇所为——她利用漫长旱季施展了某种邪恶魔法。[rohanne.GetSheHe|U]现在必定正向我的领地进军，我只剩两个选择。\n\n我可以集结仅剩的军队开战——然而眼下既无盟友，兵力也少得可怜——只能寄希望于方格狮纹旗还能有些威慑力。或者，我可以与她会面，尝试谈判。如果[addam.GetFirstName]还活着，肯定会劝我和谈，毕竟他与[rohanne.GetHerHim]曾经有过感情。为了亚当，我可以尝试和谈，也许能达成某种协议，保住我的领地和家族仅存的势力。\n\n我必须现在立刻做出选择，拖延太久取胜的可能性将愈发渺茫。"
 agot_scenario_ats.5020.a:0 "我会在小溪边见见这个女巫，并试着谈判。"
 agot_scenario_ats.5020.a.tt:0 "你将在方格河面见[rohanne.GetNameNoTooltip]"
 agot_scenario_ats.5020.b:0 "我要让他们见识下方格狮的尖牙利爪！"
 agot_scenario_ats.5021.t:0 "谈判"
 agot_scenario_ats.5021.desc:0 "我和[dunk.GetTitledFirstName]抵达方格河岸边。没过多久，[rohanne.GetTitledFirstName]出现在对岸，身披蛛网般的丝绸与鳞甲，胯下是高大的黑马。[rohanne.GetHerHis|U]的骑士们环绕在[rohanne.GetHerHim]身旁，看起来已经做好开战的准备。光是看见红寡妇，我心中积压已久的新仇旧怨便沸腾起来，我未及多想便大声喊出了我的指控。\n\n“我为什么要在我自己的领地附近纵火呢，爵士？”还没等我反驳她，[dunk.GetTitledFirstNameNicknamed]就策马上前，要求在溪流中央与红寡妇会面。\n\n我同意了，希望他能比我更冷静。两人在溪流中相遇，我惊愕地看到[dunk.GetTitledFirstNameNoTooltip]拔出匕首……然后划破了自己的脸。随后两人结束了谈话，我的雇佣骑士回到了我身边。\n\n[rohanne.GetTitledFirstNameNoTooltip]要求以比武审判裁决我的指控，[dunk.GetSheHe]说道，并自荐让我选他作为我的代理骑士出战。这是在不发动战争的前提下了结这场恩怨的机会。我本可以亲自上阵，但或许让[dunk.GetTitledFirstNameNoTooltip]代我出战会是更好的选择。"
 agot_scenario_ats.5021.a:0 "[dunk.GetTitledFirstNameNoTooltip]将作为我的代理骑士。"
 agot_scenario_ats.5021.a.tt:0 "你将同[dunk.GetFirstNameNoTooltip]展开比武审判"
 agot_scenario_ats.5021.b:0 "我会亲自出战！"
 agot_scenario_ats.5021.b.tt:0 "你将参加这场比武审判"
 agot_scenario_ats.5021.c:0 "去他妈的审判，进攻！"
 agot_scenario_ats.5021.c.tt:0 "你将同[rohanne.GetFullNameNoTooltip]开战"
 agot_scenario_ats.5022.t:0 "谈判"
 agot_scenario_ats.5022.desc:0 "我独自带着几个征召农民来到方格河岸边。没过多久，[rohanne.GetTitledFirstName]出现在对岸，身披蛛网般的丝绸与鳞甲，胯下是高大的黑马。[rohanne.GetHerHis|U]的骑士们环绕在[rohanne.GetHerHim]身旁，看起来已经做好开战的准备。光是看见红寡妇，我心中积压已久的新仇旧怨便沸腾起来，我未及多想便大声喊出了我的指控。\n\n[rohanne.GetTitledFirstNameNoTooltip]否认了这些指控，声称在自己田地附近纵火对[rohanne.GetHerHim]来说毫无意义，虽然我对此难以信服。\n\n短暂争执后，我们终于切入正题：[rohanne.GetTitledFirstNameNoTooltip]要求以比武审判裁决我的指控，化解我们之间的仇怨，并让我挑选自己的代理骑士出战。这是我亲手了结这场恩怨的机会。或者，我也可以趁他们不备，用这少得可怜的兵力立即发动突袭。"
 agot_scenario_ats.5022.a:0 "你将会会你的代理骑士！"
 agot_scenario_ats.5022.a.tt:0 "你将参加这场比武审判"
 agot_scenario_ats.5022.b:0 "去他妈的审判，进攻！"
 agot_scenario_ats.5022.b.tt:0 "你将同[rohanne.GetFullNameNoTooltip]开战"
 agot_scenario_ats.5024.t:0 "火与剑"
 agot_scenario_ats.5024.desc:0 "红寡妇竟敢向我宣战！我想封君是不会施援了，现在只能靠我与我的人孤军奋战。\n\n我会让世人瞧瞧——方格狮子仍然有利爪！"
 agot_scenario_ats.5024.a:0 "开战！"
 agot_scenario_ats.5024.a.tt:0 "战争爆发"
 agot_scenario_ats.5025.t:0 "小溪上的决斗"
 agot_scenario_ats.5025.desc:0 "[rohanne.GetTitledFirstName]提出通过比武审判来解决渥特林纵火案的指控以及我们之间的宿怨。尽管我难以信任[rohanne.GetHerHim]，但很少有人会在比武审判中违抗诸神的意愿。\n\n所以，决定权落到了我手上，要么选择一位代理骑士，要么自己拔剑出战。"
 agot_scenario_ats.5025.a:0 "我来会会你的代理骑士！"
 agot_scenario_ats.5025.a.tt:0 "你将参加这场比武审判"
 agot_scenario_ats.5025.b:0 "我将派[dunk.GetTitledFirstNameNoTooltip]代我出战。"
 agot_scenario_ats.5025.b.tt:0 "邓克将参加这场比武审判"
 agot_scenario_ats.5025.c:0 "去他妈的审判，进攻！"
 agot_scenario_ats.5025.c.tt:0 "你将同[rohanne.GetFullNameNoTooltip]开战"
 agot_scenario_ats.5026.t:0 "恩怨化解"
 agot_scenario_ats.5026.desc:0 "信使从冷壕堡赶来，[rohanne.GetTitledFirstName]提出要结束我们之间的宿怨，并已采取行动拆除了方格河上的水坝。这一举动让[rohanne.GetHerHis]冒着陷入风险的可能，却将拯救我的领地免受干旱。\n\n或许我之前对红寡妇的看法是错的，或许现在是时候放下过往了。水源依然紧张，尤其对失去水坝蓄水的[rohanne.GetTitledFirstNameNoTooltip]而言更是如此，但这一举动极大改善了我们的处境。"
 agot_scenario_ats.5026.a:0 "我的方格河回来了。"
 agot_scenario_ats.5026.a.tt:0 "水坝拆除了，尽管水还是有些紧缺"
 agot_scenario_ats.5030.t:0 "谈判"
 agot_scenario_ats.5030.desc:0 "我们小队人马来到约定的小溪边，发现那里空无一人。我瞥了伊戈一眼，但这孩子整个早上都耷拉着脑袋。#italic 若是换作我在他的处境，大概也会如此。#!\n\n我们没等多久，[rohanne.GetTitledFirstName]就带着麾下骑士出现了。[eustace.GetFirstNameNoTooltip]爵士当即高声指控，而红寡妇矢口否认与渥特林大火有关。眼看冲突即将升级，我策马上前，要求到溪中单独与[rohanne.GetFirstNameNoTooltip]面谈。骑士和士兵们面面相觑，露出困惑的表情，我则涉水踏入方格河的河水中。\n\n当[rohanne.GetSheHe]来到小溪中央与我相对时，我向[rohanne.GetHerHim]展示了带有伊戈父亲印章的戒指。毕竟，很少有人愿意轻易招惹坦格利安亲王的儿子。[rohanne.GetSheHe]虽然明白这枚戒指的分量，但却也不愿显得软弱。\n\n我迅速抽出匕首，利落地沿着自己脸颊划过。鲜血滴落在下方的小溪，[rohanne.GetTitledFirstNamePossessiveNoTooltip]的神情告诉我，这番举动打动了[rohanne.GetHerHim]，同时也算弥补了对那农民造成的伤害。\n\n现在我们必须解决指控的问题。于是，[rohanne.GetSheHe|U]得意地瞥了一眼[longinch.GetFirstNameNicknamed]爵士，提议通过比武审判来裁决渥特林火灾一事。"
 agot_scenario_ats.5030.a:0 "我们接受，我将作为[eustace.GetFirstNamePossessiveNoTooltip]爵士的代理骑士出战！"
 agot_scenario_ats.5030.a.tt:0 "你将参加这场比武审判"
 agot_scenario_ats.5030.b:0 "我必须把决定权交给[eustace.GetFirstNameNoTooltip]爵士。"
 agot_scenario_ats.5030.b.tt:0 "你将让[eustace.GetFirstNameNoTooltip]决定"
 agot_scenario_ats.5031.t:0 "小溪上的决斗"
 agot_scenario_ats.5031.desc:0 "一场比武审判将在溪边举行，由两名骑士决斗来决定这场世仇的终结。我必须决定，是代表[eustace.GetFirstName]爵士出战，还是让[eustace.GetHerHim]亲自对上[rohanne.GetTitledFirstName]选择的代理骑士。"
 agot_scenario_ats.5031.a:0 "我将成为你的代理骑士。"
 agot_scenario_ats.5031.a.tt:0 "你将参加这场比武审判"
 agot_scenario_ats.5031.b:0 "方格狮的仗得自己打。"
 agot_scenario_ats.5031.b.tt:0 "你拒绝参加这场比武审判"
 agot_scenario_ats.6010.t:0 "溪水中的鲜血"
 agot_scenario_ats.6010.desc:0 "[dunk.GetTitledFirstNameNicknamed]和[longinch.GetFirstNameNicknamed]爵士瘫倒在水中，长人的臂下有一处伤口正汩汩流血。[dunk.GetTitledFirstNameNoTooltip]赢了，但为此[dunk.GetSheHe]也付出了代价，呛了满肺的水。\n\n虽然烧毁渥特林的罪名是个麻烦事，但能除掉长人重获自由更值得庆幸。\n\n我们都在等着[dunk.GetTitledFirstNameNoTooltip]从水里站起来，但[dunk.GetHerHis]几乎没什么动静。我的学士冲上前去——他是个铁民，最擅长救治溺水者。"
 agot_scenario_ats.6010.a:0 "把[dunk.GetSheHe|U]送去冷壕堡治疗！"
 agot_scenario_ats.6010.a.tt:0 "你现在可以自己选一个丈夫了"
 agot_scenario_ats.6011.t:0 "溪水中的鲜血"
 agot_scenario_ats.6011.desc:0 "[longinch.GetFirstNameNicknamed]爵士从溪流中爬出来，大口喘着气，而[longinch_opponent.GetFirstNameNicknamed]爵士血肉模糊的尸体软绵绵地漂在水面上。我对长人毫无好感，甚至希望[longinch.GetSheHe]死在这场决斗中，但至少现在夺取坚定堡的道路已经扫清。\n\n再没什么能阻止我了，我的封君也会支持我。剩下的就是骑马过去占领它。"
 agot_scenario_ats.6011.a:0 "向[eustace.GetFirstNameNoTooltip]爵士提出要求，坚定堡将是我的。"
 agot_scenario_ats.6011.a.tt:0 "你将索取坚定堡，尽管[eustace.GetFirstName]可能拒绝"
 agot_scenario_ats.6011.b:0 "坚定堡是我的了。"
 agot_scenario_ats.6011.b.tt:0 "你将成为坚定堡的新领主"
 agot_scenario_ats.6012.t:0 "溪水中的鲜血"
 agot_scenario_ats.6012.desc:0 "[eustace.GetFirstName]爵士从溪流中爬出来，大口喘着气，而[longinch.GetName]的尸体软绵绵地漂在血染的溪水中。无论真相如何，在诸神和世人的眼中，我都是放火烧渥特林的罪人。\n\n[eustace.GetFirstNameNoTooltip]爵士肯定会要求我拆除水坝，我别无选择，不过至少[longinch.GetFirstName]爵士死了，我父亲的遗嘱也就不那么令人担忧。"
 agot_scenario_ats.6012.a:0 "我们看看[eustace.GetFirstNameNoTooltip]究竟想要什么。"
 agot_scenario_ats.6012.a.tt:0 "你将听取尤斯塔斯的要求"
 agot_scenario_ats.6013.t:0 "溪水中的鲜血"
 agot_scenario_ats.6013.desc:0 "[dunk.GetTitledFirstNameNicknamed]和[longinch.GetFirstNameNicknamed]爵士的尸体漂浮在溪流的浅水中，鲜血从多处伤口渗出，融进浑浊的溪水。我的罪行未被证实，也未被证明无罪，但事情只能到此为止了。\n\n随着长人的死，我又能自由选择自己的丈夫。而在诸神与世人面前缺乏证据的情况下，[eustace.GetFirstName]爵士也难以指控我放火烧了渥特林。\n\n现在只需解决父亲的遗嘱问题，就能继续前进了。"
 agot_scenario_ats.6013.a:0 "一个悲惨但必要的结局。"
 agot_scenario_ats.6013.a.tt:0 "你将继续为自己选择一个丈夫"
 agot_scenario_ats.6014.t:0 "要求"
 agot_scenario_ats.6014.desc:0 "在溪边举行的比武审判中，我的代理骑士落败，在此之后，[eustace.GetFirstName]爵士要求我拆除水坝。即便我此刻照办，仍可能让我显得我软弱。更何况，在干旱时期，分散水源只会加剧我们的困境。\n\n如果拒绝这一要求，便等同于宣战，因此我必须慎重考虑下一步行动。"
 agot_scenario_ats.6014.a:0 "好吧，我会拆除水坝。"
 agot_scenario_ats.6014.a.tt:0 "你将拆除水坝，这使你显得很软弱"
 agot_scenario_ats.6014.b:0 "想看我软弱的样子？我宁可背叛誓言！"
 agot_scenario_ats.6020.t:0 "溪水中的鲜血"
 agot_scenario_ats.6020.desc:0 "[dunk.GetTitledFirstNameNicknamed]和[longinch.GetFirstNameNicknamed]爵士瘫倒在水中，长人的臂下有一处伤口正汩汩流血。[dunk.GetTitledFirstNameNoTooltip]赢了，但为此[dunk.GetSheHe]也付出了代价，呛了满肺的水。\n\n既然[rohanne.GetTitledFirstName]已被认定是渥特林大火的罪魁祸首，我终于有筹码要求拆除水坝，让我的方格河重新流淌了！"
 agot_scenario_ats.6020.a:0 "是时候提出我的要求了，必须把水坝拆除！"
 agot_scenario_ats.6020.a.tt:0 "你要求[rohanne.GetFullNameNoTooltip]拆除水坝"
 agot_scenario_ats.6021.t:0 "溪水中的鲜血"
 agot_scenario_ats.6021.desc:0 "[longinch.GetFirstNameNicknamed]爵士从溪流中爬出来，身后留下[dunk.GetTitledFirstNameNicknamed]鲜血淋漓的尸体漂在水面上。泪水不受控制地顺着我的脸颊流下——我曾告诉那年轻人，如果我女儿还活着，我会乐意把她许配给你。如今他们都在七层地狱与我的家族团聚了。年轻的侍从伊戈在我身旁哭泣，而[rohanne.GetTitledFirstName]长久地凝视着那位英勇骑士的尸体。\n\n[rohanne.GetSheHe|U]现在洗清了我的指控，若[rohanne.GetHerHim]有意，随时可以夺取我的领地。我只能祈祷她别提出这个要求，否则便只能依靠武力来应对了。"
 agot_scenario_ats.6021.a:0 "再见了，[dunk.GetTitledFirstNameNoTooltip]……"
 agot_scenario_ats.6021.a.tt:0 "你会等待事情接下来的发展"
 agot_scenario_ats.6022.t:0 "溪水中的鲜血"
 agot_scenario_ats.6022.desc:0 "我抓住溪岸，奋力从水中挣脱出来，一把扯下头上的头盔。[longinch.GetFirstNameNicknamed]爵士血淋淋的尸体漂浮在浅水上，血正从他腋下的伤口涌出——正是这一击结束了我们的决斗。\n\n[rohanne.GetTitledFirstName]在一旁看着尸体被从溪流中打捞上来，我们各自分开。既然我的指控已在诸神和世人面前得到见证，现在可以要求立即拆除水坝，让河水重新流回我的领地！"
 agot_scenario_ats.6022.a:0 "拆掉那个该死的水坝！"
 agot_scenario_ats.6022.a.tt:0 "你要求拆除方格河上的水坝"
 agot_scenario_ats.6023.t:0 "溪水中的鲜血"
 agot_scenario_ats.6023.desc:0 "[dunk.GetTitledFirstNameNicknamed]和[longinch.GetFirstNameNicknamed]爵士都漂浮在溪流中，浑身是血，伤痕累累。[rohanne.GetTitledFirstName]的手下捞起了[longinch.GetFirstNameNoTooltip]爵士的尸体，当侍从伊戈帮我把[dunk.GetTitledFirstNameNoTooltip]拖上岸时，[rohanne.GetHerHis]朝我点了点头。\n\n我们本希望通过比武审判来证明各自的清白，如今两位骑士都已死去，但在诸神和世人眼中真相依然未明。没有证据，我无法指控[rohanne.GetTitledFirstNameNoTooltip]任何罪行，而这份猜疑想必也会阻止[rohanne.GetHerHim]立刻对我采取行动。"
 agot_scenario_ats.6023.a:0 "真是可惜了个好骑士……"
 agot_scenario_ats.6023.a.tt:0 "你将返回坚定堡"
 agot_scenario_ats.6024.t:0 "毒液与利爪"
 agot_scenario_ats.6024.desc:0 "尽管在比武审判中落败，[rohanne.GetTitledFirstName]非但拒绝了我拆除方格河水坝的要求，更宣称要夺取我最后的领地，[rohanne.GetHerHis]已经率军前来征讨。\n\n现在，我唯一能做的就是在战场上证明我的利爪仍在，与红寡妇开战，直到我们中的一方尝到失败的滋味！"
 agot_scenario_ats.6024.a:0 "狮子仍然有爪子！"
 agot_scenario_ats.6024.a.tt:0 "你将同[rohanne.GetFullNameNoTooltip]开战以捍卫你的土地"
 agot_scenario_ats.6025.t:0 "围困中的塔楼"
 agot_scenario_ats.6025.desc:0 "在比武审判中战败后，我连最后的尊严也荡然无存，不得不考虑[rohanne.GetTitledFirstNamePossessive]对坚定堡的要求。我可以为家族对这片土地的最后古老权利而战，但很可能会在守卫它的过程中死去，还要搭上数百名平民的性命。\n\n也许我该像[bittercringe.GetNickname]当年在红草原战败后那样，选择佣兵生活。如果黑火的残余势力组建佣兵团，我甚至可能加入他们，就像当年追随戴蒙那样再次为黑龙而战。\n\n现在必须做出抉择：为过去而战，还是离开去寻找新的未来？"
 agot_scenario_ats.6025.a:0 "我不会放弃先祖们的埋骨地！"
 agot_scenario_ats.6025.a.tt:0 "你将为坚定堡而战"
 agot_scenario_ats.6025.b:0 "这座老塔就拿去吧，我会找到新的路。"
 agot_scenario_ats.6025.b.tt:0 "你将成为无地冒险者"
 agot_scenario_ats.6030.t:0 "惨痛的胜利"
 agot_scenario_ats.6030.desc:0 "我在陌生的城堡醒来，脸上带着一道伤疤，身体到处都是淤伤，骨头也断了几根。我赢得了比武审判，人们期待和平谈判能够展开。一位学士照料着我养伤，并告诉我[eustace.GetFirstName]爵士和[rohanne.GetTitledFirstName]正在谈判，等我康复后便可自由离开。随着日子一天天过去，[rohanne.GetTitledFirstNameNoTooltip]似乎刻意避开我，整个养伤期间我都没见到[rohanne.GetHerHim]。\n\n尽管伊戈始终坚定地陪在我身边，尽力帮助我康复，但苦涩正在我心中滋长。经历了那么多痛苦、争斗和反复周折，最终达成的和解本可经由一场会谈轻易实现。\n\n无论谈判结果如何，我知道必须教会伊戈平民的价值——他们不是贵族博弈中的棋子，而骄傲也不足以成为制造如此多苦难的借口。"
 agot_scenario_ats.6030.a:0 "我们会等待谈判结果，然后继续前进。"
 agot_scenario_ats.6030.a.tt:0 "你等待着结果，是战争或是和平"
 agot_scenario_ats.7010.t:0 "夏日玫瑰"
 agot_scenario_ats.7010.desc.start:0 "随着近期的冲突问题结束，父亲的遗嘱问题又迫在眉睫，现在是时候寻找一位丈夫了。\n\n"
 agot_scenario_ats.7010.desc.e:0 "同[eustace.GetFirstName]爵士联姻是一个机会——既能整合彼此对冷壕堡的宣称权，保全[eustace.GetHerHis]的颜面，又能让我得到个对统治领地毫无兴趣、注定会比我先一步去世的丈夫。这虽然不是爱情，却是个上佳的地方政治联姻。"
 agot_scenario_ats.7010.desc.d:0 "[dunk.GetTitledFirstName]高大英俊、平易近人，那份令人心折的荣誉感总驱使[dunk.GetHerselfHimself]以身犯险。这场联姻虽然没有政治助益，或许也能收获幸福。"
 agot_scenario_ats.7010.desc.g:0 "[gerold.GetNameNicknamed]爵士是个有力的候选人。[gerold.GetSheHe|U]经常给我写信，这让我感到快乐，而且[gerold.GetSheHe]还是王国最富有领主的能力出众、颇具影响力的兄弟。但我怀疑[gerold.GetSheHe]是否愿意离开狮子的城堡、在冷壕堡的生活。这段婚姻并非没有风险。"
 agot_scenario_ats.7010.desc.l:0 "[longinch.GetFirstNameNicknamed]爵士是个毫无乐趣、刻薄阴险的可憎之人。如果有机会我一定会安排[longinch.GetHerHis]送命，但父亲生前属意这桩婚事，我终究不得不考虑[longinch.GetHerHim]。"
 agot_scenario_ats.7010.desc.ed:0 "同[eustace.GetFirstName]爵士联姻是一个机会——既能整合彼此对冷壕堡的宣称权，保全[eustace.GetHerHis]的颜面，又能让我得到个对统治领地毫无兴趣、注定会比我先一步去世的丈夫。不过我也得考虑自己的幸福，因此我看向[dunk.GetTitledFirstName]——这位英俊勇敢的骑士，虽然我们相识不久，但我已对他产生好感，而且他也会让我按照自己的意愿统治领地。"
 agot_scenario_ats.7010.desc.eg:0 "同[eustace.GetFirstName]爵士联姻是一个机会——既能整合彼此对冷壕堡的宣称权，保全[eustace.GetHerHis]的颜面，又能让我得到个对统治领地毫无兴趣、注定会比我先一步去世的丈夫。不过我还得考虑更符合政治利益的联姻。[gerold.GetNameNicknamed]爵士经常给我写信，这让我很快乐，而且[gerold.GetSheHe]来自维斯特洛最富有的家族。虽然他在冷壕堡可能不会快乐，这段婚姻存在风险，但仍值得考虑。"
 agot_scenario_ats.7010.desc.el:0 "同[eustace.GetFirstName]爵士联姻是一个机会——既能整合彼此对冷壕堡的宣称权，保全[eustace.GetHerHis]的颜面，又能让我得到个对统治领地毫无兴趣、注定会比我先一步去世的丈夫。然后是[longinch.GetFirstNameNicknamed]爵士，一个毫无乐趣、言辞刻薄的可鄙之人。若我能有机会弄死[longinch.GetHerHis]，或许早就动手了，但[longinch.GetSheHe]是我父亲希望我嫁的人，所以我仍不得不考虑[longinch.GetHerHim]。"
 agot_scenario_ats.7010.desc.edg:0 "同[eustace.GetFirstName]爵士联姻是一个机会——既能整合彼此对冷壕堡的宣称权，保全[eustace.GetHerHis]的颜面，又能让我得到个对统治领地毫无兴趣、注定会比我先一步去世的丈夫。但当我考虑自己的幸福时，另外两位候选人脱颖而出。[dunk.GetTitledFirstName]高大英俊，虽然我们相识不久，但我已对[dunk.GetHerHim]产生好感。另一方面是[gerold.GetNameNicknamed]爵士，他每天给我寄来甜蜜的信件，而且来自维斯特洛最富有的家族。他们中任何一位都可能是合适的丈夫，我只需要开口询问。"
 agot_scenario_ats.7010.desc.edl:0 "同[eustace.GetFirstName]爵士联姻是一个机会——既能整合彼此对冷壕堡的宣称权，保全[eustace.GetHerHis]的颜面，又能让我得到个对统治领地毫无兴趣、注定会比我先一步去世的丈夫。不过我也得考虑自己的幸福，因此我看向[dunk.GetTitledFirstName]——这位英俊勇敢的骑士，虽然我们相识不久，但我已对他产生好感，而且他也会让我按照自己的意愿统治领地。最后，我还得考虑[longinch.GetNameNicknamed]爵士，我讨厌这个男人，但我的父亲认为我们应该结婚。"
 agot_scenario_ats.7010.desc.egl:0 "同[eustace.GetFirstName]爵士联姻是一个机会——既能整合彼此对冷壕堡的宣称权，保全[eustace.GetHerHis]的颜面，又能让我得到个对统治领地毫无兴趣、注定会比我先一步去世的丈夫。不过还有另一只狮子值得考虑，[gerold.GetNameNicknamed]爵士是个强有力的候选人。[gerold.GetSheHe|U]经常给我写信，这让我很快乐，而且[gerold.GetSheHe]还是七国最富有领主的兄弟。最后，我还得考虑[longinch.GetNameNicknamed]爵士，我讨厌这个男人，但我的父亲认为我们应该结婚。"
 agot_scenario_ats.7010.desc.edgl:0 "我考虑着四个选择。[eustace.GetFirstName]爵士代表着稳定，能让我们对冷壕堡的宣称合二为一，并在当地政治中获得优势。[dunk.GetTitledFirstName]勇敢又英俊，对[dunk.GetHerHim]的感情连我自己都感到惊讶，虽然这样的结合没什么实际利益……但可能会很幸福。[gerold.GetNameNicknamed]爵士是个强有力的选择，[gerold.GetHerHis]最近的来信让我感到安慰，而且兰尼斯特家族的力量和财富无人能及。最后，我还得考虑[longinch.GetNameNicknamed]爵士，一个可鄙的男人，我考虑他只是因为我父亲认为我们应该结婚。"
 agot_scenario_ats.7010.desc.dg:0 "有两个人选可以考虑。[dunk.GetTitledFirstName]是个诚实勇敢的骑士，虽然我们相识时间不长，但我对[dunk.GetHerHim]的好感增长得很快。另一位是[gerold.GetNameNicknamed]爵士，[gerold.GetSheHe|U]的来信总让我期待。作为王国最富有家族的成员，这将是个理想的政治联姻，但我怀疑[gerold.GetSheHe]是否愿意离开狮子的城堡、在冷壕堡的生活。"
 agot_scenario_ats.7010.desc.dgl:0 "有三个人选值得考虑。[dunk.GetTitledFirstName]是个诚实勇敢的骑士，虽然我们相识时间不长，但我对[dunk.GetHerHim]的好感增长得很快。这样的结合虽无多少政治利益，却可能带来幸福。另一位是[gerold.GetNameNicknamed]爵士，[gerold.GetSheHe|U]的来信总让我期待。作为七国最富有家族的成员，这将是个理想的政治联姻，但我怀疑[gerold.GetSheHe]是否愿意离开狮子的城堡、在冷壕堡的生活。最后，我还得考虑[longinch.GetNameNicknamed]爵士，一个可鄙的男人，我考虑他只是因为我父亲认为我们应该结婚。"
 agot_scenario_ats.7010.desc.dl:0 "有两个人选可以考虑。[dunk.GetTitledFirstName]是个诚实勇敢的骑士，虽然我们相识时间不长，但我对[dunk.GetHerHim]的好感增长得很快。这样的结合没什么政治利益，但可能会很幸福。另一个是[longinch.GetNameNicknamed]爵士，一个可鄙的男人，我考虑他只是因为我父亲认为我们应该结婚。"
 agot_scenario_ats.7010.desc.gl:0 "有两个人选可以考虑。[gerold.GetNameNicknamed]爵士，[gerold.GetSheHe]的来信让我越来越期待，而且[gerold.GetSheHe]是七国最富有领主的兄弟。虽然[gerold.GetSheHe]是个不错的选择，但我怀疑[gerold.GetSheHe]是否愿意离开狮子的城堡、在冷壕堡的生活。另一个是[longinch.GetNameNicknamed]爵士，一个可鄙的男人，我考虑他只是因为我父亲认为我们应该结婚。"
 agot_scenario_ats.7010.desc.finish:0 "\n\n我应该如何抉择？"
 agot_scenario_ats.7010.a:0 "蜘蛛会嫁给方格狮。"
 agot_scenario_ats.7010.b:0 "我会和[dunk.GetTitledFirstNameNoTooltip]结婚，希望在这里找到幸福。"
 agot_scenario_ats.7010.c:0 "我希望这能让金狮满意。"
 agot_scenario_ats.7010.d:0 "我接受父亲安排的婚事。"
 agot_scenario_ats.7010.e:0 "我将另外寻找一个丈夫，不过必须抓紧时间。"
 agot_scenario_ats.7010.e.tt:0 "你会寻找其他人做配偶，但你只剩下六个月的时间"
 agot_scenario_ats.7011.t:0 "历史铭记的名字"
 agot_scenario_ats.7011.desc:0 "我已收到[eustace.GetFirstName]爵士对我求婚提议的回复。虽然我们在失去[eustace.GetSheHe]儿子亚当的共同悲痛中产生共鸣后，[eustace.GetSheHe]表示了兴趣，但[eustace.GetHerHis]不愿意我们的孩子使用维伯这个姓氏。\n\n如果我嫁给[eustace.GetFirstNameNoTooltip]爵士，就必须按照传统方式，让我们未来的孩子继承奥斯格雷的姓氏和方格狮纹章。\n\n如果我拒绝这个要求，就得另寻夫婿。那么，维伯这个姓氏究竟价值多少？"
 agot_scenario_ats.7011.a:0 "我同意这些条件。"
 agot_scenario_ats.7011.a.tt:0 "你将与[eustace.GetNameNoTooltip]进行非母系婚姻"
 agot_scenario_ats.7011.b:0 "我会从别处找个更好的对象。"
 agot_scenario_ats.7011.b.tt:0 "你将自由地寻找一个丈夫"
 agot_scenario_ats.7012.t:0 "残酷的回绝"
 agot_scenario_ats.7012.desc:0 "[eustace.GetFirstName]爵士传来消息，[eustace.GetSheHe|U]拒绝了我的联姻提议，让我另外寻找一位丈夫。\n\n为完成父亲的遗愿，我不得不继续物色其他人选。"
 agot_scenario_ats.7012.a:0 "我会从别处找个更好的对象。"
 agot_scenario_ats.7012.a.tt:0 "你将自由地寻找一个丈夫"
 agot_scenario_ats.7013.t:0 "残酷的回绝"
 agot_scenario_ats.7013.desc:0 "[dunk.GetTitledFirstName]回复了我的婚姻提议。尽管[dunk.GetHerHis]出身低微、与我地位悬殊，[dunk.GetHerHis]的侍从本可在冷壕城安享庇护——但这位卑微的雇佣骑士依然拒绝了我。\n\n这着实出乎我的意料，看来我只能继续物色其他人选了。"
 agot_scenario_ats.7013.a:0 "我会从别处找个更好的对象。"
 agot_scenario_ats.7013.a.tt:0 "你将自由地寻找一个丈夫"
 agot_scenario_ats.7020.t:0 "意料之外的提议"
 agot_scenario_ats.7020.desc:0 "[rohanne.GetTitledFirstName]送来信件，请求进入我的领地祭拜我儿子[addam.GetFirstName]的坟墓，我未加思索便同意了。不久后，[rohanne.GetHerHim]来到墓前哭泣。我内心深处一度以为早已死去的情感驱使我上前安慰，很快我们便围坐在炉火旁吃黑莓，谈论起往事。她离开后不久，使者便带来联姻的提议。\n\n我若不慎重考虑便是愚不可及——婚约将使我名义上成为冷壕堡的领主，并使家族免于灭绝。只是她要求我们的子嗣继承维伯的姓氏，我必须在权衡利弊之后给出答复。"
 agot_scenario_ats.7020.a:0 "我接受，但前提是我们的孩子必须是方格狮。"
 agot_scenario_ats.7020.a.tt:0 "你要求进行非母系婚姻"
 agot_scenario_ats.7020.b:0 "我接受[rohanne.GetHerHis]的条件，我们的孩子将是蜘蛛。"
 agot_scenario_ats.7020.c:0 "去她那该死的提议，我拒绝。"
 agot_scenario_ats.7020.c.tt:0 "你拒绝了这个婚姻提议"
 agot_scenario_ats.7031.t:0 "红寡妇的提议"
 agot_scenario_ats.7031.desc:0 "[rohanne.GetTitledFirstName]的使者送来了信件。拆开蜘蛛形状火漆，里面是一封甜得发腻的求婚信。我越读越是震惊——一位高贵美丽的[rohanne.GetLadyLord]竟选我作丈夫？甚至还许诺让伊戈成为城堡侍从，并让我统领家族骑士。\n\n这将改变一切。我不再是流浪骑士，而将成为冷壕堡女主人的丈夫。伊戈能在真正的城堡长大，既见识世界又享有高墙保护，还有同龄侍从作伴。\n\n更何况，[rohanne.GetTitledFirstNameNoTooltip]是任何男人都梦寐以求的妻子。放弃流浪生活固然艰难，却能换来家园——或许还有爱情——这个交换值得吗？"
 agot_scenario_ats.7031.b:0 "我会娶这个寡妇，同过去的树篱生活说再见。"
 agot_scenario_ats.7031.b.tt:0 "你将与[rohanne.GetNameNoTooltip]进行母系婚姻，并切换角色为[rohanne.GetNameNoTooltip]"
 agot_scenario_ats.7031.c:0 "我注定只能待在树篱边，它们是我的一切。"
 agot_scenario_ats.7031.c.tt:0 "你拒绝了这个婚姻提议"
 agot_scenario_ats.8030.t:0 "夏天的雨水，温柔的告别"
 agot_scenario_ats.8030.desc:0 "当雨水终于降临河湾地时，我正准备离开冷壕堡，将它与坚定堡的恩怨抛在身后。马厩前，[rohanne.GetName]娇小的身影拦住了我。这场冲突从一开始就毫无意义，我已心灰意冷，[rohanne.GetTitledFirstNamePossessive]也即将结婚——但能再见到[rohanne.GetHerHis]的脸还是让我感到安慰。马厩里的马发着不安的响鼻声，[rohanne.GetSheHe|U]向我致歉，似乎正挣扎着是否要说出某些话。\n\n最终，[rohanne.GetSheHe]提出让我担任[rohanne.GetSheHe]的骑士，让伊戈成为城堡里的侍从，表示不希望再看到我们继续流浪。\n\n这个提议令人心动，但树篱才是我唯一的归宿，而这里留给我的只有苦涩。见我可能拒绝，[rohanne.GetSheHe]表示至少希望能给我些礼物。"
 agot_scenario_ats.8030.a:0 "你会成为你的骑士。"
 agot_scenario_ats.8030.a.tt:0 "你将成为[rohanne.GetNameNoTooltip]的廷臣，并切换角色为[rohanne.GetNameNoTooltip]"
 agot_scenario_ats.8030.b:0 "我不能接受，但我会讨要一个吻和一件小礼物。"
 agot_scenario_ats.8030.b.tt:0 "你只带着她的一缕头发离开"
 agot_scenario_ats.9000.t:0 "黑龙与生俱来的权利"
 agot_scenario_ats.9000.desc:0 "我的[ROOT.Char.Custom2('RelationToMeShort', bittercringe)][bittercringe.GetFirstName]传来消息，[bittercringe.GetSheHe]已召集所有被红龙欺辱、流放和掠夺的人们。他们在金色旗帜下集结，组建了自由贸易城邦前所未见的庞大佣兵团。\n\n自从我夺得「黑火」并得到寒铁的支持后，[bittercringe.GetHerHis]已准备以我的名义开战，助我从篡夺者[ITRuler.GetFirstName]手中夺回铁王座。若我选择发动这场战争，将有成千上万人死去，我渴望统治的王国将血流成河——但若不战，红龙统治将永远无法撼动。无论作出什么决定，我都必须立即抉择。\n\n我该为与生俱来的权利进军，还是任由子民继续受伪龙的统治？"
 agot_scenario_ats.9000.a:0 "我们进军开战！"
 agot_scenario_ats.9000.b:0 "我终将夺回我与生俱来的权利，但现在还不是时候。"
 agot_scenario_ats.9010.t:0 "最后的方格狮"
 agot_scenario_ats.9010.desc:0 "[eustace.GetFirstName]爵士一死，这场水坝之争终告落幕，我的护城河将继续保持充盈。看着他们埋葬这样一个高贵家族的最后一人，也是我曾爱过的那个男孩的父亲，我心中不免有些哀伤，但埋葬老者对我已不是新鲜事。\n\n现在，即便心情沉重，我也该继续着手于其他事务了。"
 agot_scenario_ats.9010.a:0 "悲惨的人生，悲惨的结局。"
 agot_scenario_ats.9010.a.tt:0 "你将继续上路寻找新的差事"
 agot_scenario_ats.9011.t:0 "最后的机会"
 agot_scenario_ats.9011.desc:0 "父亲的遗嘱如同沉重枷锁压在我身上。我必须在一周内成婚，否则将失去所有头衔，眼睁睁看着法定继承人夺走我的城堡。我早就派出渡鸦与骑士探访之前考察过的人选，如今候选名单陈列在了我面前。\n\n我最终会选定一位伴侣吗？还是再次冒险，亲自踏上寻找真爱之旅？"
 agot_scenario_ats.9011.a:0 "方格狮未尝不可与蜘蛛联姻。"
 agot_scenario_ats.9011.a.tt:0 "你将联系[eustace.GetFirstNameNoTooltip]爵士商讨婚姻事宜。"
 agot_scenario_ats.9020.t:0 "寡妇之死"
 agot_scenario_ats.9020.desc:0 "[rohanne.GetTitledFirstName]一死，水坝之争眼下告一段落。看着儿子年轻时的爱人埋葬在我家城堡的影子下，我不禁心生哀伤。我的一生经历了太多死亡与毁灭，到头来却毫无意义。现在我的封君盯得太紧，接下来很难再有什么动作。我们只能熬过这段艰难时期，等待雨水解救我们。\n\n我只希望那雨能快点来。"
 agot_scenario_ats.9020.a:0 "我们将为逝者哀悼，为生者祈祷。"
 agot_scenario_ats.9020.a.tt:0 "你将等待这场旱灾结束"
 agot_scenario_ats.9021.t:0 "雄狮凯旋"
 agot_scenario_ats.9021.desc:0 "在一场将被世代传颂的惊人胜利中，我击溃了[rohanne.GetTitledFirstName]的大军，将[rohanne.GetHerHis]的士兵遗弃在冷壕堡外浸透鲜血的尸堆中。缓步走向城堡雄伟的闸门，细细审视着由我家族先祖筑起的每一道古墙，脸上不由得绽开宽阔的笑容。当撕下维伯家族的旗帜，看着那只随风飘落的白蜘蛛旗帜缓缓坠地，而方格狮子旗重新在骄傲的原位飘扬时，我的笑容愈发灿烂。\n\n终于，我光复了自己的家族。"
 agot_scenario_ats.9021.a:0 "水坝将被拆除，而我将统治整片土地。"
 agot_scenario_ats.9021.a.tt:0 "冷壕堡和坚定堡将共享水源"
 agot_scenario_ats.9030.t:0 "寡妇之死"
 agot_scenario_ats.9030.desc:0 "[rohanne.GetFullName]一死，水坝之争眼下告一段落。冷壕堡那位女主人的娇小身影就这样被埋葬在这场冲突的阴影下，我不免感到唏嘘。\n\n纷争已经结束，我和伊戈可以自行选择——是继续留在这里效忠，还是前往可能更美好的地方。无论如何，树篱等待着我们。"
 agot_scenario_ats.9030.a:0 "向寡妇做最后一别。"
 agot_scenario_ats.9030.a.tt:0 "你将回去继续寻找合同"
 agot_scenario_ats.9031.t:0 "最后的方格狮"
 agot_scenario_ats.9031.desc:0 "随着[eustace.GetFirstName]爵士的离世，我和伊戈再次失去了能效忠的人。看来是时候继续旅程，带伊戈去见识更广阔的世界了。\n\n最后的方格狮虽已逝去，但树篱永远等待着我们。"
 agot_scenario_ats.9031.a:0 "永别了，方格狮。"
 agot_scenario_ats.9031.a.tt:0 "你将回去继续寻找合同"
 agot_scenario_ats.9032.t:0 "火与剑"
 agot_scenario_ats.9032.desc:0 "[rohanne.GetFullName]与[eustace.GetFirstName]爵士开战了！效忠誓言要求我与伊戈必须加入[eustace.GetFirstNameNoTooltip]爵士麾下，随[eustace.GetHerHis]并肩作战。[eustace.GetSheHe]也已拨调军队交给我指挥，但让伊戈涉险着实是个艰难的决定。\n\n战争绝非易事，即便带上一个能干的侍从也充满危险，我必须谨慎决定是否要前往参战。"
 agot_scenario_ats.9032.a:0 "为了方格狮！"
 agot_scenario_ats.9032.a.tt:0 "你将加入[eustace.GetNameNoTooltip]一方参战"
 agot_scenario_ats.9032.b:0 "我现在不打算卷进这件事。"
 agot_scenario_ats.9032.b.tt:0 "你拒绝加入[eustace.GetFirstNameNoTooltip]一方参战"
 agot_scenario_ats.2002.desc.intro:0 "“叔叔，”我开口道。“私生子叔叔，”[bittercringe.GetNameNicknamed]直接打断了我的话，可[bittercringe.GetHerHis]眼中却闪过一丝光彩。\n\n“是，没错，”我强压下心头的不安，脸上挂着从容的笑意继续说，“我向来会做预知梦，其中一个梦尤为清晰——那就是夺回我的与生俱来的权利，坐上铁王座。要实现这个目标，我需要两样东西：一把宝剑，以及一位首相……”\n\n"
 agot_scenario_ats.2020.desc.nodunk:0 "一名仆人顺着台阶登上坚定堡的顶楼，打断了我的白日梦——我正在想象那些我出生前便已发生的故事，他的脸上写满了忧虑。\n\n一番询问得知，我的骑士[bennis.GetFullName]发现方格河——#italic 我的#!方格河——在流经我的领地时变得干涸。[rohanne.GetFullNameNicknamed]筑坝截流，出于报复，[bennis.GetTitledFirstNameNoTooltip]打伤了[rohanne.GetHerHis]的一个农民。若想避免公开冲突，我必须迅速与红寡妇展开谈判。\n\n然而，我早已发誓，除非有朝一日重新夺回城堡，否则永不踏入冷壕堡一步。可眼下，我别无选择，只能背誓了。"
 agot_scenario_ats.3031.desc.tookbennis:0 "[rohanne.GetFirstName]夫人直截拒绝了我的提议，不仅没有拆除水坝，还带走了本尼斯。没有那水源，[eustace.GetFirstName]爵士的土地将会枯萎，[eustace.GetHerHis]的人民也将死去。\n\n我想起[eustace.GetFirstNameNoTooltip]爵士曾向我讲述的故事——关于[eustace.GetHerHis]的儿子[addam.GetFirstName]曾经与[rohanne.GetFirstNameNoTooltip]夫人的感情，我试图通过提起此事来向[rohanne.GetHerHim]求情。\n\n[rohanne.GetHerHis|U]的脸因愤怒而扭曲，我还没来得及反应，[rohanne.GetSheHe|U]的手像箭矢一样打在我脸上，火辣的刺痛顿时蔓延。[rohanne.GetSheHe|U]厉声告诉我，[eustace.GetFirstNameNoTooltip]爵士当年带着自己的儿子们去参战，以为黑龙能帮[eustace.GetHerHis]从红龙手中夺回奥斯格雷家族曾经的一切，结果却害死了他们。我只能呆立原地，无言以对——只因得知我的领主竟然是个叛徒。[rohanne.GetHerHis]声音将我从恍惚惊醒：“滚出去，爵士。记住了，我会带着#italic 火与剑#!保护我的领地与水坝！”"
 agot_scenario_ats.5025.desc.dunkrefused:0 "尽管[dunk.GetHerHis]曾对我立下效忠誓言，也号称珍视荣誉，[dunk.GetSheHe]却拒绝为我而战。如今我别无选择：要么亲自迎战[rohanne.GetTitledFirstNamePossessive]的代理骑士，要么发动战争来讨回公道。\n\n那么，我是该向红寡妇宣战？还是最后一次提起我的旧剑？"
 agot_scenario_ats.5032.t:0 "小溪上的决斗"
 agot_scenario_ats.5032.desc:0 "尽管[eustace.GetFirstName]爵士年事已高，尽管我曾立下效忠誓言，[eustace.GetHerHis]仍选择在即将到来的比武审判中亲自上场。\n\n如今我只能观战，并祈祷我的[eustace.GetLadyLord]能从溪流中胜利走出。"
 agot_scenario_ats.5032.a:0 "我会观看这场决斗。"
 agot_scenario_ats.5032.a.tt:0 "你将收到决斗结果的通知。"
 eustace_gave_up_standfast:0 "[eustace.GetFirstName]已将坚定堡交给了我！"
 agot_scenario_ats.6031.t:0 "溪水中的鲜血"
 agot_scenario_ats.6031.desc:0 "[eustace.GetFirstNameNicknamed]爵士攀上溪岸，沉浸在胜利的喜悦中，身后对手的鲜血正将溪水染红。[eustace.GetSheHe|U]朝我微微一笑，继而松了一口气——方格河不久便能重新畅流了。\n\n最后，我向[rohanne.GetTitledFirstName]投去眷恋的一瞥，便转身离开溪畔，重新回到坚定堡。"
 agot_scenario_ats.6031.a:0 "水坝肯定会被拆毁了。"
 agot_scenario_ats.6031.a.tt:0 "你将等待，看[rohanne.GetTitledFirstNameNoTooltip]是否会接受这场决斗的结果。"
 agot_scenario_ats.6032.t:0 "溪水中的鲜血"
 agot_scenario_ats.6032.desc:0 "[longinch.GetFirstNameNicknamed]爵士从溪流中挣扎起身，身后水面漂着[eustace.GetFirstNameNicknamed]爵士瘫软的身体，随着水流轻轻拍打着溪边。鲜血在水中缓缓晕开，内疚撕扯着我的心。我转身望向溪流对岸的[rohanne.GetTitledFirstName]，原以为会看见[rohanne.GetHerHis]那张漂亮的脸上露出满意的微笑，却只看见一片忧郁，甚至可能是悲伤。\n\n[rohanne.GetSheHe|U]如今已洗清所有指控，并将获得方格狮最后的领地。当伊戈与我离开溪边返回坚定堡时，泪水因老骑士的死不知不觉滚落脸庞。"
 agot_scenario_ats.6032.a:0 "再见，[eustace.GetFirstNameNoTooltip]爵士……"
 agot_scenario_ats.6032.a.tt:0 "你会等待事情接下来的发展"
 rohanne_patrimarried_eustace:0 "罗翰妮夫人接受了我的传统婚姻提议！"
 agot_scenario_ats.7021.t:0 "严词拒绝"
 agot_scenario_ats.7021.desc:0 "尽管[rohanne.GetTitledFirstNamePossessive]一开始对我们之间的联姻提议颇感兴趣，但让[rohanne.GetHerHis]的子嗣继承尊贵的方格狮纹章，这似乎已超出[rohanne.GetSheHe|U]能接受的底线！[rohanne.GetSheHe|U]严词回绝了我按传统提婚的请求，并彻底终止了我们的联姻商议。\n\n看来，蜘蛛与方格狮终究无缘。"
 agot_scenario_ats.7021.a:0 "最好还是放下过去，去寻找属于自己的妻子。"
 agot_scenario_ats.7021.a.tt:0 "你将离开这个故事。"
 agot_scenario_ats.9011.b:0 "[dunk.GetTitledFirstNameNoTooltip]或许仍是我的救星。"
 agot_scenario_ats.9011.b.tt:0 "你将联系[dunk.GetTitledFirstNameNoTooltip]商讨婚姻事宜。"
 agot_scenario_ats.9011.c:0 "我想知道[gerold.GetFirstNameNoTooltip]是否愿意来这里。"
 agot_scenario_ats.9011.c.tt:0 "你将与[gerold.GetFirstNameNoTooltip]爵士结婚。"
 agot_scenario_ats.9011.d:0 "我可以忍受与[longinch.GetFirstNameNoTooltip]爵士的联姻。"
 agot_scenario_ats.9011.d.tt:0 "你将与[longinch.GetFirstNameNoTooltip]爵士结婚"
 agot_scenario_ats.9011.e:0 "我必须再试一次，最后一次。"
 agot_scenario_ats.9011.e.tt:0 "你可以再次尝试为自己寻找配偶，但你只有一周的时间了。"
 agot_scenario_ats.9012.t:0 "父亲的蛛网"
 agot_scenario_ats.9012.desc:0 "我父亲的陷阱终于还是困住了我。纵然百般挣扎，如今我也别无选择。我必须交出领地，将城堡留给我的继承人。这绝非我想要的命运，但现在已经无能为力了。\n\n冷壕堡的红寡妇不复存在；如今的我，只是罗翰妮夫人而已。"
 agot_scenario_ats.9012.a:0 "再见，冷壕堡。"
 agot_scenario_ats.9012.b:0 "我会去找邓肯，加入他的营地。"
 agot_scenario_ats.9012.b.tt:0 "你将切换到「高个」邓肯爵士，罗翰妮将成为追随者。"
 agot_scenario_ats.9012.c:0 "我将离开这片土地，开辟一条新的道路。"
 agot_scenario_ats.9012.c.tt:0 "你将放弃自己的头衔，并组建一个冒险营地。"
 agot_scenario_ats.9013.t:0 "塔楼化为火炬"
 agot_scenario_ats.9013.desc:0 "坚定堡陷入一片火海，[eustace.GetFirstName]爵士纠集来对抗我们的可悲军队化为乌有，我军大获全胜。现在尘埃落定，我将重建这片土地，并终于能着手处理父亲遗嘱之事。"
 agot_scenario_ats.9013.a:0 "这座塔现在归我所有，水坝可以拆掉了！"
 agot_scenario_ats.9013.a.tt:0 "坚定堡和冷壕堡将共享水源"
 agot_scenario_ats.9014.t:0 "没牙的狮子"
 agot_scenario_ats.9014.desc:0 "尽管实力悬殊，[eustace.GetFirstName]爵士仍执意对冷壕堡的寡妇开战。现在，他那支不堪一击的军队被彻底击溃，只留下一片废墟。此事既了，胜局已定，我终于能着手处理父亲的遗嘱，并进一步稳固自己的地位。"
 agot_scenario_ats.9014.a:0 "着手其他事务。"
 agot_scenario_ats.9014.a.tt:0 "你将获得多种婚姻选项"
 agot_scenario_ats.9015.t:0 "燃烧的蛛网"
 agot_scenario_ats.9015.desc:0 "维伯家族士兵的尸体，横陈在冷壕堡外鲜血浸透的田野上，骄傲的方格狮子旗则在城门前等待。我对[eustace.GetFirstName]爵士采取了行动，却为失败付出了代价。我尊严扫地，水坝也被拆毁，未来日子里，冷壕堡的农田将获得更少的灌溉。\n\n如今我能做的，只有祈祷下雨。"
 agot_scenario_ats.9015.a:0 "我只能等这场干旱过去，然后计划下一步行动"
 agot_scenario_ats.9015.a.tt:0 "水坝将被拆毁，而你会继续选择配偶"
 agot_scenario_ats.9016.t:0 "失去应得的权利"
 agot_scenario_ats.9016.desc:0 "方格狮子旗再度于冷壕堡上空骄傲飘扬，古堡的蜘蛛旗帜已被扯下，扔进下方烈焰中焚毁。我不禁思索父亲是否是对的——当我绝大部分的应得权利被生生夺走时，我是否真无法独自统治？\n\n接下来该何去何从？是复仇？还是接受现状？"
 agot_scenario_ats.9016.a:0 "我将转向其他事项，并考虑自己的下一步行动。"
 agot_scenario_ats.9016.a.tt:0 "你将从潜在配偶列表中进行选择"
 agot_scenario_ats.9022.t:0 "雄狮凯旋"
 agot_scenario_ats.9022.desc:0 "任凭[rohanne.GetTitledFirstNamePossessive]百般威胁，我已证明这寡妇的毒液徒有其表。[rohanne.GetHerHis|U]的军队在坚定堡外的战场上尸横遍野，而我的塔楼依然屹立不倒。我战胜了一切困难，为我古老的家族赢得了新的骄傲和荣耀。罗翰妮被迫签下屈辱的和约，红寡妇的势力从此衰落，而方格狮将比以往更加强大。"
 agot_scenario_ats.9022.a:0 "把那座水坝拆掉！"
 agot_scenario_ats.9022.a.tt:0 "你将拆除水坝"
 agot_scenario_ats.9023.t:0 "方格狮的末日"
 agot_scenario_ats.9023.desc:0 "随着坚定堡陷落，[rohanne.GetTitledFirstName]击溃了我的军队，夺走了我家族名下的最后一座堡垒。如今我成了无地骑士，无家可归，希望尽丧。\n\n早知如此，当初有机会时我便该退让，而今只落得独守废墟。"
 agot_scenario_ats.9023.a:0 "我的家族已经倾覆。"
 agot_scenario_ats.9023.a.tt:0 "你失去了坚定堡"
 agot_scenario_ats.9024.t:0 "没爪的狮子"
 agot_scenario_ats.9024.desc:0 "随着我的军队溃败，我的领土焚毁，奥斯格雷家族再次被证明软弱不堪。我让家族蒙受的耻辱远超想象。家族基业尽毁，领地化为焦土，我的政治地位也跌至谷底。\n\n如今我成了没爪的狮子，只能任凭这个寡妇处置。"
 agot_scenario_ats.9024.a:0 "水坝将继续存在，我必须承受失败的后果。"
 agot_scenario_ats.9024.a.tt:0 "你会等待事情接下来的发展"
 rohanne_hair_token.desc:0 "一束用丝带系着的头发，取自[rohanne.GetTitledFirstName]的红色长辫，是[dunk.GetTitledFirstNameNicknamedPossessive]侍奉坚定堡期间得到的。"
 agot_scenario_ats.9033.t:0 "破碎的狮子"
 agot_scenario_ats.9033.desc:0 "或许这并不奇怪，毕竟[eustace.GetFirstNamePossessive]爵士麾下的军队规模如此之小，此刻[eustace.GetHerHis]的士兵们已尸横遍野，残破地倒在我周围。战场上遍布流血的身躯，[rohanne.GetTitledFirstName]在血红的天空下宣告了自己的胜利。[eustace.GetFirstNameNoTooltip]爵士交给我的那些士兵，也都各自返乡归家。\n\n而我和伊戈，一如既往，会回到树篱间，努力忘记我们所看到的一切。"
 agot_scenario_ats.9033.a:0 "永别了，方格狮。"
 agot_scenario_ats.9033.a.tt:0 "你将回去继续寻找合同"
 agot_scenario_ats.9034.t:0 "狮子的胜利"
 agot_scenario_ats.9034.desc:0 "寡妇的军队溃不成军，老练的[eustace.GetFirstName]爵士的部队大获全胜，凯旋离开战场。这场以少胜多的非凡胜利让方格狮子旗的势力空前强大，自然也就不再那么需要我这样平凡的树篱骑士了。当黎明的天空染上血红，我将[eustace.GetFirstNameNoTooltip]爵士托付给我的指挥权交还，收拾行装，准备离去。\n\n一如既往，我和伊戈将重新回到树篱。"
 agot_scenario_ats.9034.a:0 "再见，方格狮。"
 agot_scenario_ats.9034.a.tt:0 "你将回去继续寻找合同"
