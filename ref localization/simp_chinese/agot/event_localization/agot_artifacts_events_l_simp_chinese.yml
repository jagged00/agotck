l_simp_chinese:
 agot_artifact_events.0010.t:0 "[prisoner.GetTitledFirstNameNoTooltip]的资产"
 agot_artifact_events.0010.desc:0 "[prisoner.GetNameNicknamed]仍在我看管下，既然[prisoner.GetHerHis]的自由尚未交还，关于[prisoner.GetHerHis]资产的处理便始终悬在我心头。\n\n作为[prisoner.GetHerHis]的扣押者，我可将某些物品列为释放条件。如果能谨慎选择条件，所得之物或许将颇具价值。"
 agot_artifact_events.0010.a:0 "我该决定对每一件物品如何处置……"
 agot_artifact_events.0010.a_tt:0 "我会逐一考虑[prisoner.GetTitledFirstNamePossessiveNoTooltip]的每一件物品。"
 agot_artifact_events.0010.a_tt_artifact:0 "我将考虑如何处理[artifact_to_inform.GetName]。"
 agot_artifact_events.0010.b:0 "我将重新评估我的要求。"
 agot_artifact_events.0010.c:0 "这些就够了。"
 agot_artifact_events.0010.c_tt:0 "我将要求[artifact_to_show.GetNameNoTooltip]。"
 agot_artifact_events.0011.t:0 "$agot_artifact_events.0010.t$"
 agot_artifact_events.0011.desc:0 "我决定给予[prisoner.GetTitledFirstName]获得自由的机会，条件是交出[prisoner.GetHerHis]的部分所有物。现在我需要决定该索要哪些物品。\n\n我想到了[artifact_to_steal.GetName]。我是否该将其列入要求清单？如果我提出要求，[prisoner.GetSheHe]会愿意交出这件宝物吗？"
 agot_artifact_events.0011.a:0 "我会将它列入我的要求列表中。"
 agot_artifact_events.0011.a_valyrian_tt_no_house:0 "如果[prisoner.GetTitledFirstNameNoTooltip]接受，[prisoner.GetHouse.GetNameNoTooltip]家族的成员会因你夺走传家宝而对你心生怨恨。"
 agot_artifact_events.0011.a_illustrious:0 "由于其稀有性，用这件宝物作为赎金需要[prestige_i|E]#N 1000#!。"
 agot_artifact_events.0011.a_famed:0 "由于其稀有性，用这件宝物作为赎金需要[prestige_i|E]#N 500#!。"
 agot_artifact_events.0011.a_masterwork:0 "由于其稀有性，用这件宝物作为赎金需要[prestige_i|E]#N 250#!。"
 agot_artifact_events.0011.a_common:0 "由于其稀有性，用这件宝物作为赎金需要[prestige_i|E]#N 100#!。"
 agot_artifact_events.0011.b:0 "我对夺走这件宝物没兴趣。"
 agot_artifact_events.0011.b_tt:0 "这件宝物属于它的合法拥有者。"
 agot_artifact_events.0011.c:0 "我已经审阅完毕所有宝物。"