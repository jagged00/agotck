l_simp_chinese:
 agot_fourth_blackfyre_rebellion.0001.t: "黑火的声索"
 agot_fourth_blackfyre_rebellion.0001.desc: "[daemon.GetTitledFirstName]已正式声索他对铁王座的宣称。时机已到；我们必须再度联手，一举荡平坦格利安家族和他们谄媚的附庸。凛冬漫漫，君王昏聩，诸侯离心，维斯特洛唾手可得。我已经能预见我们的胜利。\n\n开战！"
 agot_fourth_blackfyre_rebellion.0001.a: "黄金在上，寒铁在下！"
 agot_fourth_blackfyre_rebellion.0010.t: "黑火的胜利"
 agot_fourth_blackfyre_rebellion.0010.desc: "真是难以置信……\n\n数代以来，我的祖先历经折磨、流放和耻笑。[ROOT.Char.GetHouse.GetName]家族在战争和阴谋中付出了鲜血与生命的代价，这一切都只为一个梦想，一个目标：夺回我们与生俱来的权利，夺回我们在铁王座上的正统地位。如今梦想即将实现。\n\n当我拾级而上，迈向铁王座时，不由得想起那位于我同名的先祖。回望王座厅，泪水已然盈满眼眶。#italic 祖父啊，多希望你也能看到我如今的一切……#!\n\n多年过去，终于有一位戴蒙·[ROOT.Char.GetHouse.GetNameNoTooltip]登上了铁王座，我会开创一个绵延千年甚至更久的王朝！"
 agot_fourth_blackfyre_rebellion.0010.a: "我的统治现在开始！"
 agot_fourth_blackfyre_rebellion.0011.t: "入侵！"
 agot_fourth_blackfyre_rebellion.0011.desc: "当我准备好带领军队西进时，不由得心潮澎湃，半是激情半是忐忑。这是为夺回我与生俱来权力的最后一搏。\n\n维斯特洛会流血，但这是必要的牺牲，只为造就一项伟业。[GetScriptedCharacterByHistoryID('Targaryen_88').GetTitledFirstNamePossessiveRegnal]将[blackfyre.GetName]赐给我的祖父，其意不言而喻：他才是被指定的正统继承人。之后所有的坦格利安国王，无一不是窃居王座的篡夺者。\n\n#bold 王国必向合法的国王臣服！#!"
 agot_fourth_blackfyre_rebellion.0011.a: "我闻到了胜利的味道……"
 agot_fourth_blackfyre_rebellion.0012.t: "又一场黑火叛乱"
 agot_fourth_blackfyre_rebellion.0012.desc: "王国传来噩耗：[daemon.GetTitledFirstNameRegnal]，那个早已被遗忘、背信弃义的[daemon.GetHouse.GetNameNoTooltip]家族的后裔，带着[aegor.GetTitledFirstName]指挥下的数千士兵登陆维斯特洛！上次战争留下的伤口还未愈合，七大王国却再度陷入战火。\n\n王国再次陷入动荡，是时候做出选择了。"
 agot_fourth_blackfyre_rebellion.0012.a: "准备作战！必须消灭这头黑龙。"
 agot_fourth_blackfyre_rebellion.0012.b: "这中间或许有利可图……"
 agot_fourth_blackfyre_rebellion.0012.c: "也许我应该加入黑龙的队伍？"
 agot_fourth_blackfyre_rebellion.1000.t: "第四次起义？"
 agot_fourth_blackfyre_rebellion.1000.desc: "凛冬已逝，入侵的时机也已成熟。与我父亲和他的父亲当初一样，我也统领着一支庞大的军队。有「寒铁」和黄金团相助，我军定当所向披靡。但这还远远不够。\n\n七大王国以为我们如那残破的旗帜般衰败了，但我们或许仍能让这些养尊处优的大贵族们意识到[ROOT.Char.GetHouse.GetName]家族仍然掌握着足以统治七大王国的力量与影响力。我们必须渡过狭海，争取当地势力加入我们的阵营，从内部瓦解[aegonv.GetHouse.GetName]的统治。\n\n大议会上可耻的背叛绝不会被遗忘。我会夺回我应得的合法权利，至死方休。[ROOT.Char.GetHouse.GetNameNoTooltip]将登上铁王座！"
 agot_fourth_blackfyre_rebellion.1000.a: "我将发动入侵！"
 agot_fourth_blackfyre_rebellion.1000.b: "还需要再考虑下……"
 agot_fourth_blackfyre_rebellion.1001.t: "黄金在上，寒铁在下"
 agot_fourth_blackfyre_rebellion.1001.desc: "我亲手为[daemon.GetTitledFirstNamePossessiveRegnal]戴上王冠时，前路便只剩一条。凛冬终于过去，争夺铁王座的良机也随即到来。\n\n上一次失败的苦涩滋味至今仍在我齿间萦绕。我渐渐老去，我便愈发迫切地想要将一位[daemon.GetHouse.GetName]扶持上铁王座。而如今，可憎的血鸦被国王轻率地罢黜了，我们的胜算从没有如此大过！\n\n黄金团会为我们磨利刀剑，我们不会认输。亲爱的弟弟[daemoni.GetFirstName]，我们终于要回家了！"
 agot_fourth_blackfyre_rebellion.1001.desc.b: "流亡的岁月竟已占据我人生半数的光阴。一次又一次举旗反叛，一回又一回横渡狭海，我们只为重返故土，将[daemon.GetHouse.GetName]的后人推上铁王座。而每一次，我们都失败了。\n\n上一次失败的苦涩滋味至今仍在我齿间萦绕。我渐渐老去，我便愈发迫切地想要将一位[daemon.GetHouse.GetNameNoTooltip]扶持上铁王座。而如今，可憎的血鸦被国王轻率地罢黜了，我们的胜算从没有如此大过！\n\n或许一切还不算太迟…… "
 agot_fourth_blackfyre_rebellion.1001.a: "准备好你们的剑，战士们！"
 agot_fourth_blackfyre_rebellion.1001.a.b: "我们该怎么办？"
 agot_fourth_blackfyre_rebellion.1002.t: "不该成王的王"
 agot_fourth_blackfyre_rebellion.1002.desc: "从我登上铁王座开始到现在已有三年，笼罩在我统治初期的凛冬业已不复存在。作为第四子的第四子，过去我从未想过自己会登上如此万众瞩目的位置。然而，我仍新获得的权力，为那些受压迫者、贫弱者与不幸者谋福祉——此举在一众思想保守的贵族间激起了非议。\n\n如今，来自东方的消息传到我耳边——一位来自[daemon.GetHouse.GetName]，自称为[daemon.GetTitledFirstName]的宣称者正集结军队准备入侵。又一桩试图从合法统治者手中篡夺铁王座的愚行。\n\n如果想要[ROOT.Char.GetHouse.GetName]家族的统治在这场即将到来的风暴中存续，我必须和心怀不满的领主们缔结同盟、化解隔阂。愿诸神赐我力量……"
 agot_fourth_blackfyre_rebellion.1002.a: "也许血鸦是对的……"
 agot_fourth_blackfyre_rebellion.1003.t: "龙芙莱王子"
 agot_fourth_blackfyre_rebellion.1003.desc: "太阳在东方的龙山后升起，在龙石岛投上一道长长的影子。我再一次对这座城堡，以及领主身份带来的沉重负担心生惧意。这并非我为自己选择的命运，而是诸神与我的父亲[aegonv.GetFirstName]强加在我身上的。\n\n如今，[daemon.GetHouse.GetName]家族的一支新军正在泰洛西集结，父亲便打算将我许配给某位领主的女儿——意在缔结稳固的同盟，以抵御即将从东方袭来的攻势。\n\n说我对此不感兴趣，都能算是一种委婉。我甚至还没成年，可我的父亲却要我决定自己余生将和谁共眠——尽管他自己是为了爱情结婚甚至晚婚的。这种不公让我满心愤懑，辗转难安。可我知道一位贤明的国王应以国事为重。我内心矛盾不已。"
 agot_fourth_blackfyre_rebellion.1003.a: "诸神实在残酷！"
 agot_fourth_blackfyre_rebellion.1004.t: "金狮"
 agot_fourth_blackfyre_rebellion.1004.desc: "他们曾唤我「金狮」杰洛大人。我曾是一位精明强干的领主，我的统治繁荣且公正。为了走到今天这一步，多年来我犯下无数令人发指的恶行——那些行径至今仍让我感到羞愧和惶恐。但要想让家族这棵大树枝繁叶茂，就必须拔除一些杂草，以此利好[ROOT.Char.GetHouse.GetName]家族与西境。\n\n可诸神为我的野心降下了惩罚。首先被夺走的是我的妻子，我心爱的儿子和继承人也随之而去。悲伤、衰老和疾病，让我再也无法像往日那般紧握领主的权柄。如今的我大多数时候都只能躺在床上与书本作伴，而我的宫廷里却充斥着雷耶斯家的人。狭海对岸，战争正在酝酿。\n\n或许这样的惩罚，对我而言并不算不公……"
 agot_fourth_blackfyre_rebellion.1004.a: "王国是否会再次听到我的怒吼？"
 agot_fourth_blackfyre_rebellion.1005.t: "狂笑风暴"
 agot_fourth_blackfyre_rebellion.1005.desc: "今夜的风息堡又被暴风雨所笼罩，或许预示着另一场风暴即将到来。东方又冒出了一个[daemon.GetHouse.GetName]家族的宣称者——这类人如今实在太常见了——站出来宣称要夺取铁王座。这些伪龙什么时候才能学会安分守己？\n\n有传言说，我的封君[aegonv.GetTitledFirstName]打算把我心爱的女儿[cassandra.GetFirstName]许配给他的儿子兼继承人[duncansmall.GetTitledFirstNameNicknamed]。我得说这真是个明智的决定！这桩婚约想来不日便会敲定。\n\n现在我得赶紧厉兵秣马，让我麾下的领主们为即将到来的战斗做好准备。黑火军队很可能在我的领地登录，而我已经迫不及待想要亲自会会[daemon.GetTitledFirstName]了。"
 agot_fourth_blackfyre_rebellion.1005.a: "哦，我多么怀念战争号角的声音！"
 agot_fourth_blackfyre_rebellion.1010.t: "潜在伴侣"
 agot_fourth_blackfyre_rebellion.1010.desc: "下一次黑火叛乱已经近在眼前。我的配偶[ROOT.Char.GetPrimarySpouse.GetFirstName]提议我们可以与[lyonel.GetTitledFirstName]缔结盟约，好让家族在即将到来的战火中得以保全。倘若我的儿子[duncansmall.GetFirstName]愿意迎娶[lyonel.GetTitledFirstNamePossessiveNoTooltip]的女儿[cassandra.GetFirstName]，待她成年之后，这桩婚事定能为我们带来天大的助益。\n\n现在当务之急是先摸清[duncansmall.GetFirstNameNoTooltip]对这门亲事的态度。只有等他松口，我才好去联络[lyonel.GetTitledFirstNameNoTooltip]。"
 agot_fourth_blackfyre_rebellion.1010.a: "送出渡鸦！"
 agot_fourth_blackfyre_rebellion.1010.b: "我不需要他的帮助……"
 agot_fourth_blackfyre_rebellion.1011.t: "拒绝"
 agot_fourth_blackfyre_rebellion.1011.desc: "我的儿子[duncansmall.GetFirstName]拒绝与[cassandra.GetFirstName]订婚……这让我有些失望，但也在我意料之中。[duncansmall.GetFirstNameNoTooltip]行事向来随心所欲，哪怕要以牺牲[ROOT.Char.GetHouse.GetNameNoTooltip]家族的利益为代价……"
 agot_fourth_blackfyre_rebellion.1011.a: "此事无望了……"
 agot_fourth_blackfyre_rebellion.1012.t: "接受！"
 agot_fourth_blackfyre_rebellion.1012.desc: "我的儿子[duncansmall.GetFirstName]已经应下了与[cassandra.GetFirstName]的婚约……眼下最棘手的难关总算是渡过去了，我心里有数。这两个孩子里头[duncansmall.GetFirstNameNoTooltip]的性子最跳脱不定。接下来就得看[lyonel.GetFirstName]会不会点头应下这门亲事了。"
 agot_fourth_blackfyre_rebellion.1012.a: "雄鹿肯定会同意吧？"
 agot_fourth_blackfyre_rebellion.1013.t: "雄鹿的答复"
 agot_fourth_blackfyre_rebellion.1013.desc.a: "我欣喜若狂！[lyonel.GetTitledFirstName]已经同意将他的女儿[cassandra.GetFirstName]嫁给我的儿子[duncansmall.GetFirstName]。有了[duncansmall.GetFirstNamePossessiveNoTooltip]的首肯，这份盟约总算是彻底敲定了。我们的前路终于透出了几分光亮。纵使风暴将至......我们亦能笑着直面。"
 agot_fourth_blackfyre_rebellion.1013.desc.r: "今天早上，我收到了[lyonel.GetTitledFirstNamePossessive]的回信，只可惜内容却并非我所期盼的结果……\n\n他拒绝将[cassandra.GetFirstName]许配给我的儿子[duncansmall.GetFirstName]，即便[duncansmall.GetFirstNameNoTooltip]已经同意了这桩婚事。也许我低估了国内诸侯对我改革的不满……\n\n必须尽快为[duncansmall.GetTitledFirstNameNoTooltip]另寻一门亲事。我们的时间已经不多了！"
 agot_fourth_blackfyre_rebellion.1013.a.a: "正如计划中的一样。"
 agot_fourth_blackfyre_rebellion.1013.a.r: "真是遗憾……"
 agot_fourth_blackfyre_rebellion.1020.t: "父母的要求"
 agot_fourth_blackfyre_rebellion.1020.desc: "来自君临的渡鸦传来了父亲的消息，他要我待[lyonel.GetTitledFirstNamePossessive]的女儿[cassandra.GetFirstName]成年后便与她成婚。说实话，这结果我并非毫无预料，只是心里实在痛快不起来。我很清楚自己压根没准备好踏入婚姻。\n\n可转念一想，王国的安稳与福祉终究要放在首位。想要熬过下一场黑火叛乱，缔结盟约本就是势在必行之事……"
 agot_fourth_blackfyre_rebellion.1020.a: "我同意，为了王国的利益！"
 agot_fourth_blackfyre_rebellion.1020.b: "我——我不想！"
 agot_fourth_blackfyre_rebellion.1021.t: "失望"
 agot_fourth_blackfyre_rebellion.1021.desc: "终究，我还是没能遂了他的意。我回绝了父亲让我与[cassandra.GetFirstName]定下婚约的要求……\n\n他收到消息后，怕只会是一番愠怒的沉默吧。他会恼我，这是意料之中的事。可我实在不愿为了一场盟约就将自己的一生拴在一个素未谋面的女子身上。父亲在心里想必也明白这份苦衷。"
 agot_fourth_blackfyre_rebellion.1021.a: "我……我做了我该做的事！"
 agot_fourth_blackfyre_rebellion.1030.t: "一个潜在的联盟"
 agot_fourth_blackfyre_rebellion.1030.desc: "[aegonv.GetTitledFirstName]已递来结盟的橄榄枝：只要我点头应下这门亲事，他的儿子[duncansmall.GetName]与我的女儿[cassandra.GetFirstName]订婚。这可称得上是千载难逢的良机。毕竟能与皇室联姻，日后在朝堂之上定能手握举足轻重的权柄。\n\n话虽如此，一旦应允，他日若有任何…… 外敌来犯，我都必须倾力相助。\n\n此事我得好好掂量掂量。"
 agot_fourth_blackfyre_rebellion.1030.a: "告诉[aegonv.GetTitledFirstName]，我同意了！"
 agot_fourth_blackfyre_rebellion.1030.a.tt: "你接受提议。"
 agot_fourth_blackfyre_rebellion.1030.a.notification: "[lyonel.GetFirstName]接受了提议。"
 agot_fourth_blackfyre_rebellion.1030.b.notification: "[lyonel.GetFirstName]拒绝了提议。"
 agot_fourth_blackfyre_rebellion.1030.b: "慷慨的提议，然而我现在不感兴趣。"
 agot_fourth_blackfyre_rebellion.1030.b.tt: "你拒绝提议。"
 agot_fourth_blackfyre_rebellion.9990.t: "魔龙与城墙"
 agot_fourth_blackfyre_rebellion.9990.desc: "战争是一桩血腥的生意；我一直很清楚这一点。然而，面前这可怕的屠杀也大大超出了我的预料。当我再一次把剑刺向敌方垂死的战马是，内脏与鲜血如红雨般溅落在我全身。\n\n我拭去头盔上的血污，然后我看见了他——矗立在我的士兵们中间，挥舞着手中巨剑。我已经来不及躲避，他盯上了我，用足以撂倒一匹马的力气将一名全副武装的骑士掀翻在地。\n\n诸神保佑，他正直直冲向我……"
 agot_fourth_blackfyre_rebellion.9990.a: "[ROOT.Char.GetHouse.GetMotto]"
 agot_fourth_blackfyre_rebellion.9991.t: "城墙与魔龙"
 agot_fourth_blackfyre_rebellion.9991.desc: "又一场战争，又一次叛乱。我轻而易举地突破敌军防线，用我的巨剑将黑火家族的士兵劈成两半。虽然近年来我的体力随着年龄增长有所衰退，但知道自己仍是一般士兵之强令我十分欣慰。\n\n忽然间，在战场弥漫的血色雾气之外，我看到了他——那个叫[daemon.GetTitledFirstName]的，正将一名骑士连人带马开膛破肚。只要挥出这一剑，我今天就能结束这场叛乱……"
 agot_fourth_blackfyre_rebellion.9991.a: "国王万岁！"
 agot_fourth_blackfyre_rebellion.9994.t: "狮崽子"
 agot_fourth_blackfyre_rebellion.9994.desc: "我挥舞着手中宝剑杀穿了敌军阵线。敌兵一个接一个在我面前倒下，黑火在战场上随我起舞。[aegonv.GetTitledFirstNamePossessive]的走狗们挥剑乱砍，却屡屡落空，他们的剑徒劳地劈向我的盔甲，发出刺耳的声响。没有任何刀剑或钉锤能与我的瓦雷利亚钢剑匹敌。\n\n我再次挥剑——黑火却与一柄镶嵌红宝石的长剑相撞。剑下站着一名金发青年，脸上带着傲慢的笑容。"
 agot_fourth_blackfyre_rebellion.9994.a: "你迷路了吗，狮崽子？"
 agot_fourth_blackfyre_rebellion.9995.t: "寒铁交锋"
 agot_fourth_blackfyre_rebellion.9995.desc: "我挥舞着武器，砍倒了一个又一个黑龙叛党。这些叛逆的蠢货很快就会被赶回他们来的地方——海里。我瞥见战场对面的那个叫[daemon.GetTitledFirstName]的人，可惜距离太远，够不着他。要是他离我近一点就好了……\n\n一道带有黑色纹路的钢铁寒芒吸引了我的目光。年迈的「寒铁」正在我们的阵线上杀出一条血路。我必须抓住这个赢得永恒荣耀的机会！"
 agot_fourth_blackfyre_rebellion.9995.a: "我或许终将成为传奇！"
 agot_fourth_blackfyre_rebellion.0002.t: "寒铁的效忠"
 agot_fourth_blackfyre_rebellion.0002.desc: "[daemon.GetTitledFirstName]终于登上了王位！自那个荣耀的日子以来，已过去了数周，一切都开始趋于平静……\n\n新国王现在需要忠诚的仆人——能辅佐陛下治理维斯特洛的顾问。鉴于我在他登基过程中所扮演的角色，我或许可以为自己谋求一个职位。\n\n或者，也许一份简单的奖赏便已足够。"
 agot_fourth_blackfyre_rebellion.0002.a: "国王之手将是合适的职位。"
 agot_fourth_blackfyre_rebellion.0002.b: "我将担任御林铁卫队长！"
 agot_fourth_blackfyre_rebellion.0002.c: "我将得到盛夏厅。"
 agot_fourth_blackfyre_rebellion.0002.d: "黄金在上……更多的金子等着我们！"
 agot_fourth_blackfyre_rebellion.0002.e: "我什么也不需要；我完成了使命，这就足够了。"
 agot_fourth_blackfyre_rebellion.0002.gc_tt: "[daemon.GetFirstName]获得黄金团的[special_troops|E]。"
 agot_fourth_blackfyre_rebellion.0011.a.tt: "只有少数传统[ROOT.Char.GetHouse.GetNameNoTooltip]家族效忠者响应了我的号召。如果我能证明，这一次叛乱能对抗铁王座的强大势力，在前人失败之处取得成功，就会有更多人加入我们的正义之战。或许，我甚至可以用一起恰到好处的死亡来改变局面……"
 agot_fourth_blackfyre_rebellion.0013.t: "反叛之年"
 agot_fourth_blackfyre_rebellion.0013.desc: "自我宣称王位以来，已过去了一年。看来，我们坚持的时间越长，我违逆所谓的[aegonv.GetTitledFirstName]并存活下来的时间越久，就会有越多的领主投奔到我们的麾下。许多曾追随我先辈的昔日黑火家族效忠者，如今也纷纷宣布效忠于我。\n\n他们的再度支持能否扭转战局，尚有待观察。"
 agot_fourth_blackfyre_rebellion.0013.a: "我们的风帆上又多了一股风！"
 agot_fourth_blackfyre_rebellion.0014.t: "属于我的英勇胜利"
 agot_fourth_blackfyre_rebellion.0014.desc: "这简直令人难以置信，但事实如此。我斩杀了[aegonv.GetTitledFirstNamePossessive]麾下最强的卫士[duncantall.GetNameNicknamed]。这一壮举显然激励了一些原本犹豫不决的领主。\n\n在我做到了看似不可能的事之后，许多曾经效忠于我祖先的黑火家族旧部，现在都宣布效忠于我。"
 agot_fourth_blackfyre_rebellion.0014.a: "我们不可战胜！"
 agot_fourth_blackfyre_rebellion.0015.t: "寒铁的请求"
 agot_fourth_blackfyre_rebellion.0015.desc: "自从我取得胜利、登上铁王座以来，已经过去了几个星期。在这几个星期里，我并没有虚度光阴。我夜以继日地为巩固权力而努力，确保[ROOT.Char.GetHouse.GetName]家族对王位的掌控在未来几年内牢不可破。\n\n如今，当我坐在王座上，享受着胜利的荣光时，[aegor.GetFirstName]却来找我，提出了一个请求……\n\n"
 agot_fourth_blackfyre_rebellion.0015.gold: "这一千枚金币是犒劳我们为打赢胜仗出的力，不算多。我的人都累了，但不管以后出什么事我们都会接着为你效力。\n\n我们想要的就只是这么一点辛苦费而已。有了这笔钱，我们才能好好办一场庆功宴为你的崛起喝彩！"
 agot_fourth_blackfyre_rebellion.0015.hotk: "大人，能为您的正义事业效力是我的荣幸。如今王座已经由真正的国王坐稳了，我恳请您任命我为您的首相。请允许我继续为您效力，在您统治期间献上我的智慧，直到我生命的最后一刻。"
 agot_fourth_blackfyre_rebellion.0015.summerhall: "仗打赢了，黄金团也该解散了。我们唯一的使命就是帮助正统者重登王座，现在总算是完成了。我冒昧求您赏我一块封地，让我能以领主的身份一辈子忠心耿耿地侍奉您。"
 agot_fourth_blackfyre_rebellion.0015.lc: "大人，能在您的旗帜下征战是我的荣幸。如今王座已由真正的国王坐稳，我恳请您允许我为您献上性命，保护您免遭任何伤害。眼下的御林铁卫，效忠的是篡位的家族、不义的君主，他们根本不值得陛下托付安危。\n\n我愿主动担下这份重任。恳求您任命我为御林铁卫队长，我定会让您的王朝延续千年！"
 agot_fourth_blackfyre_rebellion.0015.gc_tt: "你获得了黄金团的[special_troops|E]。"
 agot_fourth_blackfyre_rebellion.0015.a: "合理的请求；我将予以批准。"
 agot_fourth_blackfyre_rebellion.0015.b: "很遗憾，但不行……"
 agot_fourth_blackfyre_rebellion.1000.a.tt: "#EMP 你将在两周后发起你的入侵。#!"
 agot_fourth_blackfyre_rebellion.1000.b.tt: "#EMP 你将暂时把入侵的事情搁置。#!"
 agot_fourth_blackfyre_rebellion.1014.t: "龙芙莱王子"
 agot_fourth_blackfyre_rebellion.1014.desc: "我的儿子[duncansmall.GetFirstName]退位了！我对他的失望人尽皆知，但我没想到他会采取如此极端的行动……\n\n他现在沦落得和普通乞丐没什么两样，流落街头，把他的土地和头衔都让给了[jaehaerys.GetTitledFirstName]……"
 agot_fourth_blackfyre_rebellion.1014.a: "此事#italic 彻底#!无望了……"
 agot_fourth_blackfyre_rebellion.1020.a.tt: "该同盟提议只在[lyonel.GetFirstName]同意这门婚事时才会继续。"
 agot_fourth_blackfyre_rebellion.1020.b.tt: "如果你拒绝，[aegonv.GetFirstName]可以#EMP 剥夺你的继承权#!而无须承担任何后果。"
 agot_fourth_blackfyre_rebellion.1021.b: "也许父王真的是为了我好……"
 agot_fourth_blackfyre_rebellion.1021.c: "我再也忍受不了了！我退位！"
 agot_fourth_blackfyre_rebellion.1011.a.tt: "[duncansmall.GetShortUINamePossessive]的拒绝将使你有权剥夺他的继承权。"
 duncan_the_small_laamp_name_1: "翩飞猎手"
 duncan_the_small_laamp_name_2: "蜻蜓团"
 duncan_the_small_laamp_name_3: "蜻蜓之剑"
 duncan_the_small_laamp_name_4: "飘飞王子"
 agot_fourth_blackfyre_rebellion.1022.t: "暂时的自由"
 agot_fourth_blackfyre_rebellion.1022.desc: "真是令人欣喜——也出乎意料——的消息！[lyonel.GetTitledFirstName]拒绝了我父亲提出的婚约，没有允诺我和他的女儿[cassandra.GetFirstName]联姻……\n\n我必须承认，我完全没想到会这样。当然，我没什么可抱怨的。[aegonv.GetTitledFirstName|U]肯定会很失望，甚至可能感到愤怒，但我估计这会对王国产生一些影响。虽然他未来几年可能会尝试为我另寻婚配，但毫无疑问，这次拒绝已经挫伤了他的雄心。我或许还能争取到更多时间……"
 agot_fourth_blackfyre_rebellion.1022.a: "我当然没有意见！"
 agot_fourth_blackfyre_rebellion.1031.t: "王家拒绝"
 agot_fourth_blackfyre_rebellion.1031.desc: "看来我期盼的与王室联姻终究落空了。那个愚蠢的小子[duncansmall.GetTitledFirstName]竟然拒绝了与我可爱的女儿[cassandra.GetFirstName]的婚约，声称他“想要为爱而婚，而不是为了政治联姻”。\n\n虽然这些都还只是传闻，他们还没有正式提亲，但我仍是难掩失望之情。看来，一位[ROOT.Char.GetHouse.GetNameNoTooltip]家族的淑女并不适合这位王子。"
 agot_fourth_blackfyre_rebellion.1031.a: "当这个王室的小子坐上铁王座时，七神将会拯救我们……"