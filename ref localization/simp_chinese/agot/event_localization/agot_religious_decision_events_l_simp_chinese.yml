l_simp_chinese:
 agot_religious_decision.1001.t:0 "心树"
 agot_religious_decision.1001.desc:0 "抛开信仰不谈，世界上很少有地方能与神木林的宁静和超凡的孤独相媲美，但是神木林不仅仅可以漫步其中、放松身心的花园——旧神在此有掌控的力量。\n\n当我走近心树，心中想的是……"
 agot_religious_decision.1001.a:0 "……诸神的赐福。"
 agot_religious_decision.1001.b:0 "……健康的身体。"
 agot_religious_decision.1001.c:0 "……冷静的头脑。"
 agot_religious_decision.1001.d:0 "……神圣的指引。"
 gain_piety_tooltip:0 "我的虔诚不会被忽视"
 wounds_turn_to_cripple_tooltip:0 "你的伤口完全恢复了，但你变得[GetTrait('crippled').GetName( GetNullCharacter )]"
 weirwood_fertility_bonus_modifier:0 "鱼梁木生育赐福"
 weirwood_minor_health_bonus_modifier:0 "鱼梁木健康赐福"
 weirwood_medium_health_bonus_modifier:0 "鱼梁木健康赐福"
 weirwood_stress_modifier:0 "鱼梁木的平和"
 agot_religious_decision.1101.t:0 "红色枝叶之下"
 agot_religious_decision.1101.desc:0 "高尚之心上栽种的鱼梁木以一种不可思议的旺盛生命力扎下根。它们骨白色的树干扭曲着伸向天空，枝条上挂满鲜红的叶子，在风中像是低语。这里的空气中弥漫着寂静与敬畏，打破这份宁静只有偶尔的树叶沙沙声。\n\n我站在树林中央，那些古老的树桩曾在这里静默哀悼，此刻我感到旧神再次注视着我。这片圣地已重获生机。"
 agot_religious_decision.1101.a:0 "让诸神指引我的道路。"
 agot_religious_decision.3001.t:0 "圣火"
 agot_religious_decision.3001.desc:0 "据说[ROOT.Char.GetFaith.HighGodName]会通过神圣的火焰与祂的选民交谈，但是用的是灰烬与煤渣的语言——即使是红袍祭司也很难理解其中言语。\n\n我凝视着夜晚的火堆，不禁想知道，我将在其中看到什么？\n\n[red_priest.GetFirstName]建议我献上祭品，这样一定能获得[ROOT.Char.GetFaith.HighGodNameAlternate]的青睐。"
 agot_religious_decision.3001.prisoner:0 "国王之血里的力量一定能取悦[ROOT.Char.GetFaith.HighGodName]。"
 agot_religious_decision.3001.prisoner.tt:0 "相同信仰的狂热[vassals|E]、[courtiers|E]和[guests|E]获得对#V 你#!的#P 10#![opinion|E]"
 agot_religious_decision.3001.prisoner.tt.a:0 "所有不进行宗教献祭的[vassals|E]、[courtiers|E]和[guests|E]失去对#V 你#!的#N 30#![opinion|E]"
 agot_religious_decision.3001.peasants:0 "几个平民足够满足[ROOT.Char.GetFaith.HighGodNameAlternate]吗？"
 agot_religious_decision.3001.peasants.tt:0 "所有不进行宗教献祭的[courtiers|E]和[guests|E]失去对#V 你#!的#N 15#![opinion|E]"
 agot_religious_decision.3001.peasants.tt.a:0 "相同信仰的狂热[courtiers|E]和[guests|E]获得对#V 你#!的#P 10#![opinion|E]"
 agot_religious_decision.3001.false_idols:0 "世上只有[ROOT.Char.GetFaith.HighGodName]是唯一真神，虚假的崇拜物将被烧毁。"
 agot_religious_decision.3001.false_idols.tt:0 "较廉价的祭品可能无法让我获得想要的青睐……"
 agot_religious_decision.3001.a:0 "我这次不打算献祭。"
 agot_religious_decision.3001.a.tt:0 "不准备任何祭品。"
 agot_religious_decision.3001.b:0 "转念一想，现在还不是时候。"
 agot_religious_decision.3002.t:0 "没有回应的祈祷"
 agot_religious_decision.3002.desc:0 "[red_priest.GetFirstName]和我夜复一夜地凝视着圣火，尽管我们尽了最大的努力，但却没有任何形状或迹象显现——除了向天空升起的烟雾和烟灰，我什么都没看见……"
 agot_religious_decision.3002.offering_desc:0 "几个小时过去了，尽管[red_priest.GetFirstName]仍热情不减地继续着[red_priest.GetHerHis]的祈祷，火焰却没有显现出任何形状或幻象。\n\n我的眼睛被升腾的浓烟刺痛——尽管我已经做出了献祭，但我看到的只是一团普通的夜火……"
 agot_religious_decision.3002.zealous:0 "难道[ROOT.Char.GetFaith.HighGodNameAlternate]抛弃了我？"
 agot_religious_decision.3002.cynical:0 "毕竟只是普通的火而已……"
 agot_religious_decision.3002.a:0 "[ROOT.Char.GetFaith.HighGodNameAlternate]仍然沉默不语……"
 agot_look_into_flames.vision_intro_desc:0 "[red_priest.GetFirstName]在驱散黑夜的篝火前坚持着[red_priest.GetHerHis]的祈祷，而我则慢慢陷入了沉思。\n\n"
 agot_look_into_flames.vision_outro_desc:0 "\n\n#italic [ROOT.Char.GetFaith.HighGodName]是否赐予了我未来的幻影？它传达了怎样的信息……？#!"
 agot_look_into_flames.vision_title:0 "火焰中的景象"
 agot_religious_decision.3003.t:0 "$agot_look_into_flames.vision_title$：影子"
 agot_religious_decision.3003.desc:0 "在火焰升起的烟雾中，我瞥见了一个孤零零的影子，一个在黑暗中几乎难以辨认的剪影，它随着火焰摆动，像是在用手势向我发出邀请。\n\n我不禁打了个寒颤，那个奇怪的影子已消散为薄雾，就像从没出现过一样；是火，除了火还是火。"
 agot_religious_decision.3003.a:0 "这是对我未来友谊的轻语？"
 agot_religious_decision.3003.b:0 "潜伏在黑暗中的影子……这是对即将到来的危险的警告？"
 agot_religious_decision.3003.tt: "我的祈祷得到了回应！"
 agot_religious_decision.3004.t:0 "$agot_look_into_flames.vision_title$：战士"
 agot_religious_decision.3004.desc:0 "我被跳动的火光迷住了，却瞥见火光之外有一个人影——一位征服者挥舞着威武的宝剑，脚下是倒下的敌人。一瞬间，战士的宝剑碎裂，无数火星冲天而起。\n\n我不禁打了个寒颤，刹那一切又都消失；是火，除了火还是火。"
 agot_religious_decision.3004.a: "[ROOT.Char.GetFaith.HighGodNameAlternate]将引领我们走向胜利。"
 agot_religious_decision.3004.b:0 "还是远离纷争为好……"
 agot_religious_decision.3005.t:0 "$agot_look_into_flames.vision_title$：城堡"
 agot_religious_decision.3005.desc:0 "火焰高高升起，似乎燃烧得更旺了。当我看向跳动的火光时，刹那间，我看到一座雄伟的城堡，不知为何我觉得很熟悉，城堡渐渐融化，最终化为闪闪发光的金色余烬。\n\n我的心开始狂跳，但刹那间一切又都消失了；是火，除了火还是火。"
 agot_religious_decision.3005.a:0 "未来的荣华富贵在等待着我。"
 agot_religious_decision.3005.a.tt:0 "我的坚持和努力一定会得到回报。"
 agot_religious_decision.3005.b:0 "我看到古瓦雷利亚化作了灰烬。"
 agot_religious_decision.3005.b.tt:0 "我被这种景象所吸引，决心专心研究古老帝国。"
 agot_religious_decision.3006.t:0 "$agot_look_into_flames.vision_title$：黑暗中的匕首"
 agot_religious_decision.3006.desc:0 "然而，随着噼啪作响的火焰不断向天空喷射火星，一瞬间，我看见火花化作了燃烧的匕首，毫不费力地刺穿了上空浓烟遮蔽下的黑暗。\n\n恐惧袭来，我在炽热的火堆前被吓出一身冷汗，转瞬之间，一切又都消失了；是火，除了火还是火。"
 agot_religious_decision.3006.a:0 "我必须保持警惕。"
 agot_religious_decision.3006.b:0 "也许是时候暗中行动了？"
 agot_religious_decision.3007.t:0 "$agot_look_into_flames.vision_title$：舞蹈符文"
 agot_religious_decision.3007.desc:0 "我被跳动的火焰迷住了，烟雾纠缠着火苗，转眼间，圣火中显示出奇异的符文——凝聚、摇摆、彼此交融，仿佛有影子在我面前舞蹈。\n\n它们来得快，消失得也快，符文再次变成了普通的火焰。"
 agot_religious_decision.3007.a:0 "我必须深入研究高级神秘术！"
 agot_religious_decision.3007.b:0 "答案一定藏在古老的传说之中……"
 agot_religious_decision.3008.t:0 "$agot_look_into_flames.vision_title$：安然无恙地行走"
 agot_religious_decision.3008.t.scheme:0 "$agot_look_into_flames.vision_title$：揭露背叛"
 agot_religious_decision.3008.desc:0 "[red_priest.GetFirstName]在夜火前举行神圣仪式并继续着[red_priest.GetHerHis]的祈祷。很快，"
 agot_religious_decision.3008.scheme_murder_desc:0 "舞动的火苗显露出一个蒙面影子的轮廓——我意识到这是[owner.GetTitledFirstName]在密谋#bold 杀害我！#!"
 agot_religious_decision.3008.scheme_abduction_desc:0 "舞动的火苗显露出一个蒙面影子的轮廓——我意识到这是[owner.GetTitledFirstName]在密谋#bold 绑架我！#!"
 agot_religious_decision.3008.scheme_steal_artifact_desc:0 "舞动的火苗显露出一个蒙面影子的轮廓——我意识到这是[owner.GetTitledFirstName]在密谋#bold 偷取我的宝物！#!"
 agot_religious_decision.3008.scheme_fallback_desc:0 "舞动的火苗显露出一个蒙面影子的轮廓——我意识到这是[owner.GetTitledFirstName]在密谋对抗我！"
 agot_religious_decision.3008.no_scheme_desc:0 "我在火焰中看到了自己。\n\n我手持火把，安然无恙地穿过黑暗。如此这般，我比任何时候都更加确信[ROOT.Char.GetFaith.HighGodNameAlternate]守护着我。"
 agot_religious_decision.3008.a:0 "[ROOT.Char.GetFaith.HighGodName]眷顾我！"
 agot_religious_decision.3008.b:0 "那个[owner.Custom('InsultAdjective')]恶魔！"
 agot_religious_decision.4000.t:0 "贸易远征的伟大提议"
 agot_religious_decision.4000.desc:0 "我的顾问和商人们一直在私下议论远方那些尚未开发的市场。经过慎重考虑，我决定向宫廷提议发起一场大型贸易远征。这次冒险可能为领地带来巨大财富，但也可能只是徒劳耗费资源。如今，随着内阁成员齐聚一堂讨论我的计划，我必须决定为这次远航投入多少。"
 agot_religious_decision.4000.a:0 "一笔谨慎的投资；刚好够试探一下深浅。"
 agot_religious_decision.4000.a.flavor:0 "一支远征队将在两个月内出发并返回。"
 agot_religious_decision.4000.b:0 "一笔均衡的投资；足够产生显著的影响。"
 agot_religious_decision.4000.b.flavor:0 "一支远征队将在六个月内出发并返回。"
 agot_religious_decision.4000.c:0 "一笔慷慨的投资；足以确保丰厚的回报。"
 agot_religious_decision.4000.c.flavor:0 "一支远征队将在一年内出发并返回。"
 agot_religious_decision.4000.d:0 "一笔奢华的投资；我将不惜一切代价。"
 agot_religious_decision.4000.d.flavor:0 "一支远征队将在两年内出发并返回。"
 agot_religious_decision.4000.e:0 "算了吧。"
 agot_religious_decision.4001.t:0 "远征队归来"
 agot_religious_decision.4001.desc:0 "经过数月的期盼，我的贸易远征队终于回来了，但结果远不如我的预期。由于计划不周、恶劣天气和海盗袭击等一连串厄运，船队带回的货物与投入相去甚远。虽然抢救回了一些商品，但这次冒险并未带来预期的回报。"
 agot_religious_decision.4001.a:0 "真不幸。"
 agot_religious_decision.4002.t:0 "远征队归来"
 agot_religious_decision.4002.desc:0 "我的贸易远征队回来了，带回一批不算多的货物。虽不如我期望的那般丰厚，但肯定也不算失败。新的贸易路线已经建立，尽管它们没有我想象中那么有利可图。不过，至少这是个开始。"
 agot_religious_decision.4002.a:0 "意料之中的事。"
 agot_religious_decision.4003.t:0 "远征队归来"
 agot_religious_decision.4003.desc:0 "我的贸易远征队凯旋归来，满载着财富和新开辟的贸易路线。我新结交的外国贸易伙伴足以弥补先前的投入。这次商业冒险巩固了我们首府作为繁荣商业中心的声誉。"
 agot_religious_decision.4003.a:0 "不可思议！"
 agot_religious_decision.5000.t:0 "捕鲸远征"
 agot_religious_decision.5000.desc:0 "是时候筹集物资与资金，发起我的捕鲸远征了。"
 agot_religious_decision.5000.a:0 "我会为这次探险慷慨解囊。"
 agot_religious_decision.5000.b:0 "我会进行适度投资。"
 agot_religious_decision.5000.c:0 "我会花费最少的钱。"
 agot_religious_decision.5000.d:0 "算了，我改变主意了。"
 agot_religious_decision.5001.t:0 "捕鲸远征"
 agot_religious_decision.5001.desc_great:0 "在海上搜寻了仅仅几个小时后，我便留意到附近有鲸鱼在破浪前行。尽管我身处远处，但依然能够分辨出它们每一头的体型都堪比小型岛屿。至少，回到岸上时，我将如此向交易员描述所见的情景。\n\n无论如何，我和我的水手们可以确定的是，这些鲸鱼价值不菲！"
 agot_religious_decision.5001.desc_good:0 "我的水手突然发出一声呼喊，引起了我的注意。\n\n我循着愈发响亮的呼喊声、转动的头颅与伸出的手指望去，最终发现一头巨大的鲸鱼在远处海面翻腾跳跃。从目测判断，这绝对是能卖出好价钱的那种……"
 agot_religious_decision.5001.desc_bad:0 "这次远征拖得实在太久了。水手们都在抱怨哀嚎，说我们连鲸鱼的影子都没发现，照这样下去怕是永远也找不到。\n\n虽然他们的懒散让我痛心，但恐怕他们说得对。这趟远征根本是白费力气，我的钱袋都被自己的野心给榨干了！"
 agot_religious_decision.5001.a:0 "快追上它们！"
 agot_religious_decision.5001.b:0 "它逃不掉的！"
 agot_religious_decision.5001.c:0 "该死！"
 agot_religious_decision.5001.a.tt_success:0 "你成功捕杀鲸群并满载而归"
 agot_religious_decision.5001.b.tt_success:0 "你成功捕杀鲸鱼并顺利返航"
 agot_religious_decision.5001.a.tt_failure:0 "你没能杀死鲸鱼"
 agot_religious_decision.5100.t:0 "内心的呼唤"
 agot_religious_decision.5100.desc.holy_site:0 "我的面前矗立着一座由油性的黑色巨石雕琢而成的巨大方尖碑，光滑表面映照出沉寂而永恒的力量。在它无声的守望中，隐约透露出被遗忘的神秘气息。\n\n不同时代的人们都曾从这里取走碎片作为战利品，还有人在此修建了纪念碑。此刻，这座天然的方尖碑就立在这里——但其中究竟隐藏着怎样的秘密？我又必须付出怎样的代价？"
 agot_religious_decision.5100.desc.artifact:0 "我手中躺着一块油亮的黑石碎片，光滑表面折射出一种沉郁而永恒的力量。当我凝视手中这枚石块时，那些被遗忘的秘辛似在苏醒。\n\n古往今来，无数宏伟建筑皆由这种石材凿刻而成，本不该存在的油黑方尖碑拔地而起。曾经也有人携带过相似的碎片——但其中究竟封存着什么奥秘？我又将为此付出什么代价？"
 agot_religious_decision.5100.a:0 "一份光荣的祭品。"
 agot_religious_decision.5100.a.tt:0 "我将一件极为贵重的东西放在这块油性的石头前，试图安抚它可能蕴含的力量。这样的礼物或许会引来……某些存在的注意。"
 agot_religious_decision.5100.b:0 "一份谦卑的贡品。"
 agot_religious_decision.5100.b.tt:0 "一份稍简单的祭品，仍有意义，却不那么铺张。这或许便足以引起石头的兴趣，又不会激起它的怒火。"
 agot_religious_decision.5100.c:0 "什么都没有，除了我自己。"
 agot_religious_decision.5100.c.tt:0 "我没有献上物质财富，而是将自己的意志献给这块石头，寻求理解——或是疯狂。这块石头又会要求什么作为回报呢？"
 agot_religious_decision.5100.d:0 "随它去吧。"
 agot_religious_decision.5100.d.tt:0 "石头依旧一动不动。它的力量不容置疑，但或许现在还不是献上这份供品的时候——又或许，彻底无视它才是更明智的做法。"
 agot_religious_decision.5101.t:0 "仪式"
 agot_religious_decision.5101.desc.start_no_offering:0 "我站在石头前，什么也没献上，除了我自己。我感觉仿佛石头正将我拉近，审视着我的决定。"
 agot_religious_decision.5101.desc.start_offering:0 "我将供品置于石头前，以此表达敬意。石头似乎几乎对我的举动有所回应，仿佛在等待献上更多。"
 agot_religious_decision.5101.desc:0 "\n\n我开始进行专注的仪式，那块石头，那油滑的触感，此刻占据了我的思绪。每个动作、说出的每一句话或产生的每一个念头，都像是深思熟虑过，仿佛这些行为能决定接下来发生的一切。"
 agot_religious_decision.5101.desc.end_no_change:0 "\n\n当我转身离开石头时，我并未感到自己有什么变化，而石头在我身后沉默无声。我心中涌起一阵淡淡的失望，仿佛之前的努力都毫无意义，但我始终摆脱不了一种感觉——石头像是欲言又止。"
 agot_religious_decision.5101.desc.end_changed:0 "\n\n当我转身离开石头时，我感到自己内心有些东西改变了。很难说清是什么，但我能感觉到这种变化，它潜藏在表象之下。"
 agot_religious_decision.5101.shrewd:0 "更敏锐的头脑"
 agot_religious_decision.5101.shrewd.tt:0 "石头赋予我更敏锐的战略意识。我的思维变得清晰，能以前所未有的精准度预判他人行动。"
 agot_religious_decision.5101.strong:0 "不屈的力量"
 agot_religious_decision.5101.strong.tt:0 "石头赐予我激增的肉体力量。我感到更加强壮，这副身体比从前更具有力。"
 agot_religious_decision.5101.good:0 "来自石头的礼物"
 agot_religious_decision.5101.good.tt:0 "无论石头做了什么，总归是带来了积极效果。或许是新获得的智慧，又或是前路上意想不到的优势。"
 agot_religious_decision.5101.no_change_tt:0 "石头毫无反应。我的希望与期待落空，不禁开始怀疑这一切是否都毫无意义。"
 agot_religious_decision.5101.bad:0 "支付代价"
 agot_religious_decision.5101.bad.tt:0 "无论发生了什么变化，都让我付出了沉重的代价。石头或许给了我些什么，但作为回报，它也夺走了同样多的东西。"
 agot_religious_decision.5101.possessed:0 "黑暗中的声音"
 agot_religious_decision.5101.possessed.tt:0 "我感觉内心有异样在涌动，一种陌生的存在扎根在我的意识。石头的力量似乎以我无法解释的方式占据了我。"
 agot_religious_decision.5101.no_change.zealous:0 "诸神为何要憎恨我？"
 agot_religious_decision.5101.no_change.zealous.tt:0 "我感觉诸神已经抛弃了我，它们的恩赐正从我指间滑落。我感到沮丧又困惑，在无解的地方徒劳地寻找着答案。"
 agot_religious_decision.5101.no_change:0 "没有回应"
 agot_religious_decision.5101.no_change.tt:0 "石头毫无反应。我的希望与期待落空，不禁开始怀疑这一切是否都毫无意义。"
 agot_religious_decision.5200.t:0 "生命的本质"
 agot_religious_decision.5200.desc:0 "我该放哪个囚犯的血？"
 agot_religious_decision.5200.a:0 "就这个吧。"
 agot_religious_decision.5200.b:0 "$agot_religious_decision.5200.a$"
 agot_religious_decision.5201.t:0 "生命的本质"
 agot_religious_decision.5201.desc:0 "我冷眼看着拷问者将[living_blood_bag.GetName]拖入地牢，用水蛭和其他恐怖的工具开始抽取[living_blood_bag.GetHerHis]的鲜血。"
 agot_religious_decision.5201.a:0 "真让人兴奋！"
 agot_religious_decision.5201.a_tt:0 "你获得20份血液。"