l_simp_chinese:
 agot_travel_events_dragon.9000.t:0 "留下随从"
 agot_travel_events_dragon.9000.desc:0 "正当我给[dragon.GetFirstName]披挂时，[awkward_entourage_member.GetName]紧张地向我走来：“抱歉[ROOT.Char.GetLadyLord|l]，您选择乘着[dragon.GetFirstNameNoTooltip]前往目的地，那我们这些不是驭龙者的人恐怕不能和您一起旅行了，我们将热切地等待您回宫廷。”"
 agot_travel_events_dragon.9000.a:0 "真是可惜。"
 agot_travel_events_dragon.9000.tt:0 "[entourage_member.GetFirstName]离开旅团。"
 agot_travel_events_dragon.0001.t:0 "翻跟头"
 agot_travel_events_dragon.0001.desc:0 "当我和[pet_dragon.GetName]飞越大地时，一阵无聊感渐渐涌上心头。起飞时那种新奇劲儿已经过去，我的平衡感也开始稳定下来。众所周知，龙在战斗或捕猎时能够做出各种空中特技，但对于驭龙者来说，玩这些花活也要承担不小的风险。\n\n尽管如此，找点乐子或许能让我的旅程变得有趣起来。"
 agot_travel_events_dragon.0001.a:0 "翻个跟头怎么样？"
 agot_travel_events_dragon.0001.b:0 "安全总比后悔好。"
 agot_travel_events_dragon.0001.injury_warning:0 "@warning_icon!#X 你可能会受伤。#!"
 agot_travel_events_dragon.0001.success:0 "成功！"
 agot_travel_events_dragon.0001.success.flip_past:0 "[pet_dragon.GetName]翻了个跟头！"
 agot_travel_events_dragon.0001.success.flip:0 "[pet_dragon.GetName]猛地向后一仰，我感觉到[pet_dragon.GetHerHis]身下传来的力量变化，便抱得更紧了。那惊心动魄的瞬间，天地仿佛颠来倒去——大地从头顶掠过，天空似要从脚下将我吞噬。片刻之后，一切恢复正常，[pet_dragon.GetNameNoTooltip]调整好[pet_dragon.Custom('GetDragonHerselfHimself')]的姿势，继续向前平稳飞行，而我那颗激动的心还在怦怦直跳。"
 agot_travel_events_dragon.0001.failure:0 "失败！"
 agot_travel_events_dragon.0001.failure.flip_past:0 "[pet_dragon.GetName]没能翻起来……"
 agot_travel_events_dragon.0001.failure.flip:0 "[pet_dragon.GetName]开始向后仰，但由于[pet_dragon.Custom('GetDragonHerHis')]没能正确调整重心，在空中把身体扭成很不舒服的角度，让我措手不及。我差点坠落身亡，所幸腿被鞍带缠住。重新爬回龙背的过程令人心惊胆战，好在我们总算回到了正确的航线上。"
 agot_travel_events_dragon.0001.no_attempt:0 "这没意义。"
 agot_travel_events_dragon.0001.no_attempt.flip:0 "这不值得冒风险……"
 agot_travel_events_dragon.0005.t:0 "天空之美"
 agot_travel_events_dragon.0005.desc:0 "我骑着[pet_dragon.GetName]飞行穿过云层，眼前赫然呈现出一幅奇景。四周是属于诸神的领域，轻柔的白云夹杂着浓重的灰云，下方的大地则像一幅栩栩如生的地图延展开来。"
 agot_travel_events_dragon.0005.a:0 "它如此宁静，远离一切尘嚣。"
 agot_travel_events_dragon.0005.b:0 "多么辉煌！我与古时候的驭龙者共享这一切！"
 agot_travel_events_dragon.0005.c:0 "置身于此，我仿佛更接近神明。"
 agot_travel_events_dragon.0006.t:0 "焦躁的龙"
 agot_travel_events_dragon.0006.desc:0 "我们的飞行一切顺利，直到[pet_dragon.GetName]突然开始颠簸并打着喷嚏——飞过一片树林时，它变得焦躁不安！\n\n不管是出于饥饿、无聊还是紧张，[pet_dragon.GetNameNoTooltip]显然对下面的什么东西很在意。我应该怎么做？"
 agot_travel_events_dragon.0006.a:0 "我们有更重要的事情要处理。继续飞行。"
 agot_travel_events_dragon.0006.a.tt:0 "你不会被耽搁，但你的龙会因你无视[pet_dragon.Custom('GetDragonHerHim')]而不高兴。"
 agot_travel_events_dragon.0006.b:0 "降落，[pet_dragon.GetNameNoTooltip]。你有什么烦心事？"
 agot_travel_events_dragon.0006.b.tt:0 "你将被耽搁。"
 agot_travel_events_dragon.0007.t:0 "$agot_travel_events_dragon.0006.t$"
 agot_travel_events_dragon.0007.desc:0 "[pet_dragon.GetName]轰然落地，震得我在龙鞍上一阵晃动。我四下侦察，想要找出是什么让我的龙如此不安，却发现……\n\n什么都没有……[pet_dragon.GetNameNoTooltip]仍有些躁动，但我能感受到它身下的肌肉逐渐放松，那份紧张感也开始慢慢消散。无论是什么惊扰了我的龙，此刻不是已经离开，就是从未存在过。当我再次握住缰绳时，一丝失望的刺痛仍不请自来。"
 agot_travel_events_dragon.0007.a:0 "我们都会偶尔犯错，这没关系。"
 agot_travel_events_dragon.0007.b:0 "无趣的畜生，我们最好别迟到。"
 agot_travel_events_dragon.0008.t:0 "$agot_travel_events_dragon.0006.t$"
 agot_travel_events_dragon.0008.desc:0 "[pet_dragon.GetName]轰然落地，震得我在龙鞍上一阵晃动。我四下侦察，想要找出是什么让我的龙如此不安，却发现……\n\n"
 agot_travel_events_dragon.0008.desc.pred:0 "一只凶猛的[ROOT.Char.Custom('RegionalFerociousAnimal')]明显被我和[pet_dragon.GetNameNoTooltip]的突然闯入激怒了。这只大块头野兽发出一声低沉的警告吼声，这或许没什么用，但反抗的气势已显得凶猛。龙在面对类似情况通常会选择战斗，[pet_dragon.GetNameNoTooltip]似乎也很乐意接下这不自量力的挑衅。"
 agot_travel_events_dragon.0008.desc.prey:0 "不过是一只受惊的[ROOT.Char.Custom('GetRandomRegionalSmallGame')]，被[pet_dragon.GetNameNoTooltip]这样的顶级掠食者的突然出现吓得动弹不得。只需一声令下，[pet_dragon.GetNameNoTooltip]就能瞬间结果这只惊恐的猎物，但这值得吗？"
 agot_travel_events_dragon.0008.a.valyrian:0 "#emp 龙焰！#!"
 agot_travel_events_dragon.0008.a:0 "[pet_dragon.GetNameNoTooltip]，把它烧成灰！"
 agot_travel_events_dragon.0008.b:0 "[pet_dragon.GetNameNoTooltip]，飞吧！"
 agot_travel_events_dragon.0008.c:0 "让这可怜家伙自己呆着去吧……"
 agot_travel_events_dragon.0009.t:0 "观察人类"
 agot_travel_events_dragon.0009.desc:0 "龙背上的旅程有时颇为乏味；唯一的同伴只有偶尔飘过的云朵，而它们实在算不上好的谈伴。我常借着观察下方地面打发时间，寻找任何同类的踪迹，留意能辨认出的特殊地貌——从高空望去，这可不是件容易的事。\n\n今日，我注意到一个路人，几乎难以分辨。但[pet_dragon.GetName]似乎被其吸引，于是我催动[pet_dragon.Custom('GetDragonHerHim')]下降，好看个仔细。"
 agot_travel_events_dragon.0009.desc.good:0 "降落在附近后，一个友善的[good_commoner.GetWomanMan]热情地迎接了我，自称[good_commoner.GetFirstNameNicknamed]。[pet_dragon.GetNameNoTooltip]在[good_commoner.GetHerHis]面前显得很放松，于是我跳下龙背。想来，简短交谈几句的时间总是有的吧？"
 agot_travel_events_dragon.0009.desc.bad:0 "降落在附近后，一个充满敌意的[bad_commoner.GetWomanMan]迎接了我，此人毫无礼貌可言，连自我介绍都没有。[pet_dragon.GetNameNoTooltip]不安地竖起毛发，我也有种直觉——这个平民绝非善类……"
 agot_travel_events_dragon.0009.desc.noble:0 "降落在附近后，一位名叫[noble.GetTitledFirstNameNicknamed]的人迎接了我，想必是本地人。不知[noble.GetSheHe]是迷路了，还是只想找人说说话。"
 agot_travel_events_dragon.0009.a:0 "那么，跟我讲讲你自己！"
 agot_travel_events_dragon.0009.b:0 "我没有时间浪费在这里。"
 agot_travel_events_dragon.0009.c:0 "对付坏胚，只有一种办法！"
 agot_travel_events_dragon.0009.d:0 "我会把这家伙关进地牢……"
 agot_travel_events_dragon.0009.e:0 "这些小人物不值得我操心。"
 agot_travel_events_dragon.0009.f:0 "[noble.GetLadyLord]，我可以帮你回家。"
 agot_travel_events_dragon.0009.g:0 "也许你有时间聊一聊？"
 agot_travel_events_dragon.0009.g.modifier_desc:0 "与[noble.GetName]进行了交谈。"
 agot_travel_events_dragon.0009.h:0 "我最好出发了……"
 agot_travel_events_dragon.0009.h.modifier_desc:0 "无视[noble.GetName]。"
 agot_travel_events_dragon.0011.t:0 "风暴！"
 agot_travel_events_dragon.0011.desc:0 "天空虽然美丽辽阔，却也常常像大地或海洋一样凶险。当[pet_dragon.GetName]和我撞进一片恰在我们下方形成的风暴时，我亲身体会到了这一点。\n\n风速越来越快，头顶雷声滚滚，[pet_dragon.GetNameNoTooltip]拼尽全力逆风飞行。远处天际一道闪电划过，提醒着我风暴的危险。显然，这场暴风雨不会很快过去，但如果我们不想被耽搁，运气好的话，或许能毫发无损地穿过它。"
 agot_travel_events_dragon.0011.a:0 "我们应该着陆并等待天气转好。"
 agot_travel_events_dragon.0011.a.tt:0 "你将耽搁三到七天，但不会受伤。"
 agot_travel_events_dragon.0011.b:0 "飞过去！"
 agot_travel_events_dragon.0011.b.tt:0 "你将有受伤的危险，但不会耽搁。"
 agot_travel_events_dragon.0013.t:0 "走错路了！"
 agot_travel_events_dragon.0013.desc:0 "我们这段旅程乏味得可怕——乏味到连[pet_dragon.GetName]都似乎感到无聊了。当我散漫地坐在龙鞍上时，[pet_dragon.Custom('GetDragonSheHe')]突然猛地偏离了路线！\n\n方向的突然改变把我从恍惚中惊醒，我急忙去抓缰绳。我大声命令着，[pet_dragon.GetNameNoTooltip]犹豫地开始转向我们原定的路线。"
 agot_travel_events_dragon.0013.a:0 "[pet_dragon.GetNameNoTooltip]，等到了目的地你就可以随心所欲了。"
 agot_travel_events_dragon.0013.tt:0 "你的旅行耽搁了。"
 agot_travel_events_dragon.0021.t:0 "嬉戏的龙"
 agot_travel_events_dragon.0021.desc:0 "当飞过一片格外平淡无奇的土地时，[pet_dragon.GetName]开始用一种奇怪的眼神望着我。从[pet_dragon.Custom('GetDragonSheHe')]还是条幼龙时起，我的龙就已经学会了用这种眼神，这意味着[pet_dragon.Custom('GetDragonSheHe')]想玩耍。我实在没法责怪[pet_dragon.Custom('GetDragonHerHim')]，一条龙不捕猎、进食或打架，总是很容易感到无聊的。但如果[pet_dragon.GetNameNoTooltip]过于分心，我们可能会迟到。"
 agot_travel_events_dragon.0021.a:0 "能有什么害处？"
 agot_travel_events_dragon.0021.a.tt:0 "你将与[pet_dragon.GetName]一起玩耍"
 agot_travel_events_dragon.0021.b:0 "不，我们还有地方要去。"
 agot_travel_events_dragon.0021.b.tt:0 "你不会和[pet_dragon.GetName]玩耍"
 agot_travel_events_dragon.0022.t:0 "嬉戏的龙"
 agot_travel_events_dragon.0022.desc.played:0 "我咧嘴一笑，伸手去摸鞍包。用生肉玩“我丢你捡”是我们的老游戏了，但[pet_dragon.GetNameNoTooltip]仍乐此不疲。山羊腿、野牛肋排，甚至鸡胸肉，这些肉块在空中飞过——结果都被[pet_dragon.GetNameNoTooltip]一一接住，烤得焦香，然后整块吞下。有时[pet_dragon.GetNameNoTooltip]会立马直立起来接，有时[pet_dragon.Custom('GetDragonSheHe')]则会等着肉块掉到地上，再赶过去。最后，[pet_dragon.GetNameNoTooltip]安静下来，我们重新振作精神，继续我们的旅行。"
 agot_travel_events_dragon.0022.desc.no_play:0 "[pet_dragon.GetNameNoTooltip]依旧摆出那副恳求的表情，[pet_dragon.Custom('GetDragonHerHis')]的目光几乎带着哀伤，同时口中发出一声低沉、抗议般的咕噜声。不过，再下了几道命令后，[pet_dragon.GetNameNoTooltip]终于放弃，移开了视线，继续朝着我们的目的地飞去。"
 agot_travel_events_dragon.0022.desc.fallback:0 "实话说，这条文本可能没必要，但为了工整的代码结构，以防万一加上好了。（摊手）"
 agot_travel_events_dragon.0022.a:0 "真有趣。干得漂亮，[pet_dragon.GetNameNoTooltip]。"
 agot_travel_events_dragon.0022.b:0 "这样的哀求不符合龙的身份。"
 agot_travel_events_dragon.0023.t:0 "嬉戏的龙"
 agot_travel_events_dragon.0023.desc:0 "在夜晚扎营时，[pet_dragon.GetNameNoTooltip]晃晃悠悠靠向我围坐的篝火旁，试探性地用[pet_dragon.Custom('GetDragonHerHis')]的鼻子碰了碰我，告诉我这条龙现在很无聊。自然地，它第一反应就是想让我陪它玩。龙与龙之间，常常会玩一种类似拔河的游戏，对象是它们的猎物，和骑手之间也差不多。但时间已晚，很快就该睡觉了，我大可以试着让[pet_dragon.GetNameNoTooltip]直接滚开。"
 agot_travel_events_dragon.0023.a:0 "为什么不呢？去抓只猎物来拔河，[pet_dragon.GetNameNoTooltip]。"
 agot_travel_events_dragon.0023.a.tt:0 "强化纽带，你的龙可能会感到疲劳，从而不太可能打扰你的营地。"
 agot_travel_events_dragon.0023.b:0 "不，[pet_dragon.GetNameNoTooltip]，我要睡觉。"
 agot_travel_events_dragon.0023.b.tt:0 "削弱纽带，你的龙不会感到疲劳，从而更可能独自捣乱。"
 agot_travel_events_dragon.0024.t:0 "嬉戏的龙"
 agot_travel_events_dragon.0024.desc.played:0 "[pet_dragon.GetNameNoTooltip]完全遵照我的指令，兴奋地飞走，很快带回一只死去的[ROOT.Char.Custom('GetRandomRegionalSmallGame')]，很显然[pet_dragon.Custom('GetDragonSheHe')]轻而易举地嗅到了猎物。[pet_dragon.GetNameNoTooltip]把猎物的头叼给我，我抓住它的耳朵开始拉扯。这当然只是场假戏，[pet_dragon.GetNameNoTooltip]的力量天生可比我大得多。尽管如此，[pet_dragon.GetNameNoTooltip]还是克制着力度，直到最终从我手中夺走猎物。[pet_dragon.Custom('GetDragonHerHis')]晃悠悠地挪开身子，得意地享用起[pet_dragon.Custom('GetDragonHerHis')]的深夜点心。"
 agot_travel_events_dragon.0024.desc.no_play:0 "我把手放在[pet_dragon.GetNameNoTooltip]正拱着我的鼻尖上，叹了口气。我的高等瓦雷利亚语说得很清楚，但下了好几道命令才让[pet_dragon.GetNameNoTooltip]转身，终于不再烦我休息。这一天一夜实在漫长，用一些死掉的猎物跟龙比试，实在是太难为自己了。"
 agot_travel_events_dragon.0024.desc.fallback:0 "实话说，这条文本可能没必要，但为了工整的代码结构，以防万一加上好了。（摊手）"
 agot_travel_events_dragon.0024.a:0 "啊，与龙结成纽带确实是件特别的事。"
 agot_travel_events_dragon.0024.b:0 "抱歉，[pet_dragon.GetNameNoTooltip]，即便是驭龙者也需要休息。"
 agot_travel_events_dragon.0031.t:0 "乱流！"
 agot_travel_events_dragon.0031.desc:0 "空气原本平稳——直到[pet_dragon.GetName]和我突然撞上一阵意外的乱流！颠簸的气流差点把我从鞍上掀飞，我赶紧把自己系牢，[pet_dragon.GetNameNoTooltip]则发出抗议的低吼，试图从这突如其来的剧烈颠簸中稳住身形。\n\n这阵乱流比我想象的更猛烈，持续时间也更长。我紧紧贴在龙身上，在这一过程中，地面仿佛正饥肠辘辘地朝上望着我。"
 agot_travel_events_dragon.0031.a:0 "俯身、闪避、下潜、俯冲、再闪避！"
 agot_travel_events_dragon.0031.a.tt:0 "你可能面临耽搁和受伤的风险"
 agot_travel_events_dragon.0047.t:0 "饥饿的龙！"
 agot_travel_events_dragon.0047.desc:0 "天空大多时候空空荡荡，但今天，[pet_dragon.GetName]和我迎面遇上一群正在迁徙的鸟——一阵饥饿感袭来，我这[pet_dragon.Custom('GetDragonColor')]色的龙便用利齿朝它们猛咬，希望能吃上点心！这有点缺乏管束，但龙的捕猎本能有时是无法抑制的。"
 agot_travel_events_dragon.0047.a:0 "[pet_dragon.GetNameNoTooltip]，从空中抓住它们！"
 agot_travel_events_dragon.0047.a.tt:0 "你会耽搁，但你的龙会对此感到高兴。"
 agot_travel_events_dragon.0047.b:0 "控制住自己！"
 agot_travel_events_dragon.0047.b.tt:0 "你不会耽搁，但你的龙不会喜欢。"
 agot_travel_events_dragon.0048.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0048.desc_fish:0 "虽然我们往常都习惯在云上飞行，今天[pet_dragon.GetName]却选择掠近水面，让咸涩的海风拂过。当我们掠过清澈的蓝色海浪时，下方有东西吸引了[pet_dragon.GetNamePossessiveNoTooltip]的注意力。\n\n我猜是一条鱼，因为水下明显有个阴影在游动。或许是鳕鱼或笛鲷。虽然不是最大的猎物，却也足够勾起[pet_dragon.GetNamePossessiveNoTooltip]空空的肚子里的馋虫。"
 agot_travel_events_dragon.0048.desc_dolphin:0 "虽然我们往常都习惯在云上飞行，今天[pet_dragon.GetName]却选择掠近水面，让咸涩的海风拂过。我们飞过清澈湛蓝的海面时，[pet_dragon.GetNamePossessive]肚子发出的咕噜声如此响亮，声音大得我几乎都能通过龙身感受到震动。\n\n我望向下方的海水，看到的是寻常景象：跃出波浪换气的海豚。[pet_dragon.GetNameNoTooltip]也注意到了，对于这条饥饿的龙来说，这显然是一番开胃景象。"
 agot_travel_events_dragon.0048.desc_whale:0 "[pet_dragon.GetNamePossessive]巨大的翅膀在开阔海面上拍打的声音，与我们身下汹涌的波涛声一样响亮。如[pet_dragon.GetNameNoTooltip]这般巨大的龙食量惊人，当[pet_dragon.Custom('GetDragonSheHe')]瞥见下方跃出水面的鲸鱼时，饥饿驱使它猛然俯冲而下，我立刻意识到发生了什么！\n\n像摘葡萄一样从海里捕捞一头鲸鱼绝非小事一桩。但[pet_dragon.GetNameNoTooltip]足够庞大强壮，那头不幸的海中巨兽，或许只会成为这位天空霸主的一顿大餐。"
 agot_travel_events_dragon.0048.a:0 "撒网吧，[pet_dragon.GetNameNoTooltip]！"
 agot_travel_events_dragon.0048.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0048.b:0 "控制住自己！"
 agot_travel_events_dragon.0048.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"
 agot_travel_events_dragon.0049.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0049.desc:0 "虽然天上基本空空荡荡，但[pet_dragon.GetName]却敏锐地注意到了下方连绵起伏的牧场上那些牲畜。一片满是[ROOT.Char.Custom('RegionalFarmAnimalPlural')]的田野如同一场名副其实的盛宴展现在[pet_dragon.GetNamePossessiveNoTooltip]的眼前和胃前。这只空中的[pet_dragon.Custom('GetDragonColor')]色巨兽几乎快流下口水，等待着我的指令。"
 agot_travel_events_dragon.0049.a:0 "农民不会介意少一两头……"
 agot_travel_events_dragon.0049.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0049.b:0 "控制住自己！"
 agot_travel_events_dragon.0049.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"
 agot_travel_events_dragon.0050.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0050.desc:0 "我们从下方树荫笼罩的森林上空翱翔过，[pet_dragon.GetName]发出一声焦躁的鸣叫，我立刻听出这是[pet_dragon.Custom('GetDragonHerHis')]饥饿且渴望捕猎时惯有的声调。这种冲动十分强烈，以至于[pet_dragon.GetNameNoTooltip]在树梢上方放慢了速度，并发现了一只孤零零的[ROOT.Char.Custom('GetRandomRegionalSmallGame')]。即使从这样的高处，也能看到那小家伙为上方突然掠过的阴影明显绷紧了身体。让我的[pet_dragon.Custom('GetDragonColorGrade')]色巨龙将它一口吞下虽然轻而易举，但我们还有别的地方要去……"
 agot_travel_events_dragon.0050.a:0 "没关系，龙毕竟是龙。"
 agot_travel_events_dragon.0050.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0050.b:0 "哼，不值得我们浪费时间。继续前进！"
 agot_travel_events_dragon.0050.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"
 agot_travel_events_dragon.0051.t:0 "$agot_travel_events_dragon.0047.t$"
 agot_travel_events_dragon.0051.desc:0 "当我和[pet_dragon.GetNameNoTooltip]继续旅行时，我注意到我的龙越来越频繁地向下方的地面张望。很明显，在载着我飞过大地时，[pet_dragon.GetNameNoTooltip]渐渐感到饥饿了。没过多久，我发现下方有一只大型的[ROOT.Char.Custom('RegionalFerociousAnimal')]正在狩猎。徒步状态下，这样一头[ROOT.Char.Custom('RegionalFerociousAnimal')]会是巨大威胁，但对[pet_dragon.GetNameNoTooltip]来说，它不过是又一只受困在陆地、任凭[pet_dragon.GetHerHis]的尖牙与火焰宰割的野兽而已。"
 agot_travel_events_dragon.0051.a:0 "[pet_dragon.GetNameNoTooltip]，我们拿下它！"
 agot_travel_events_dragon.0051.a.tt:0 "$agot_travel_events_dragon.0047.a.tt$"
 agot_travel_events_dragon.0051.b:0 "仔细想想，那边或许有更诱人的食物……"
 agot_travel_events_dragon.0051.b.tt:0 "$agot_travel_events_dragon.0047.b.tt$"
 agot_travel_events_dragon.0056.t:0 "鸟类袭击！"
 agot_travel_events_dragon.0056.desc:0 "我正享受着天空的宁静，突然，我和[pet_dragon.GetName]遭到了一只疯狂猛禽的袭击，它似乎自认为能与我的龙匹敌！它狂怒地尖啸着，盲目地猛啄，[pet_dragon.GetNameNoTooltip]和我则奋力将它击退。"
 agot_travel_events_dragon.0056.a:0 "滚开，臭鸟！"
 agot_travel_events_dragon.0056.a.tt:0 "你可能面临耽搁行程和受伤的风险"