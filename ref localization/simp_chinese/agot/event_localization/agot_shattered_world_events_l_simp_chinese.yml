l_simp_chinese:
 agot_shattered_world.1000.t:0 "崭新未来"
 agot_shattered_world.1000.desc:0 "历史的空白篇章正在召唤，如今我终于有了书写它的能力。我已集结我的[ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')]，扩大自身的影响范围，带领我的领地穿越危险与机遇。\n\n我的每个决定都在开启新时代，每次胜利都在书写我的统治传奇。我必须迎接挑战，将未来铸成传说——但我该怎么做？"
 agot_shattered_world.1000.a:0 "我会建立一个新的[Concept('administrative','自由贸易城邦')|E]。"
 agot_shattered_world.1000.b:0 "我会建立一个新的[Concept('administrative','封建君主国')|E]。"
 agot_shattered_world.1000.c:0 "我会建立一个伟大的[pirate_government|E]。"