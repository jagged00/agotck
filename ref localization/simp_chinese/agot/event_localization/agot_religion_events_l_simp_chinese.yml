l_simp_chinese:
 agot_religion_events.0800.t:0 "给神明的食物"
 agot_religion_events.0800.desc:0 "[recipient.GetName]赫然出现在前方，充满威胁与不祥。尽管[recipient.Custom('DragonSheHe')]还没注意到我，但面对一位活生生的神，我仍感到无比激动。\n\n我将食物箱向前挪动，把它们拖到一片空地上，好让[recipient.GetNameNoTooltip]能一览无余看到里面的丰盛食物。\n\n我躲到食物后面，准备吸引那条龙的注意。"
 agot_religion_events.0800.a:0 "[recipient.GetNameNoTooltip]！我在这里！"
 agot_religion_events.0800.b:0 "转念一想，我该离开这里。"
 agot_religion_events.0900.t:0 "觐见异鬼"
 agot_religion_events.0900.desc:0 "这世上存在着我们必须敬畏的恐怖。作为[ROOT.Char.GetFaith.GetName]的信徒，我明白异鬼便是其中之一，且他们的怒火或许可以通过献祭来平息。\n\n我带上[recipient.GetName]潜入夜色，准备将[recipient.GetHerHim]献给异鬼，祈愿它们接纳这份贡品，见证我的臣服。"
 agot_religion_events.0900.a:0 "此事必须完成。"
 agot_religion_events.3000.t:0 "仪式化战斗"
 agot_religion_events.3000.desc:0 "随着[war.GetName]的爆发，[defender.GetName]与[attacker.GetName]必须按照[attacker.GetFaith.GetName]信仰的习俗，各自组建一支武士队伍参与仪式战争。\n\n获胜的一方将赢得这场战争，而失败方的领袖则将被流放或废黜。"
 agot_religion_events.3000.a:0 "祝你好运！"
 agot_religion_events.3000.a_attackers_tt:0 "[dummy.GetName]已被选为#P 攻击方#!的一名战斗者。"
 agot_religion_events.3000.a_defenders_tt:0 "[dummy.GetName]已被选为#N 防御方#!的一名战斗者。"
 agot_religion_events.3000.a_tt:0 "战争仪式将于一天后举行。"
 agot_religion_events.3001.t:0 "仪式化战斗"
 agot_religion_events.3001.desc:0 "仪式开始了，[defender.GetName]的军队热切地迎接我的队伍。观众们在一旁观看，我们在战场上各就各位，随着混战开始，我们兴奋地发起冲锋。"
 agot_religion_events.3001.a:0 "战斗！"
 agot_religion_events.3003.t:0 "仪式化战斗：结果"
 agot_religion_events.3003.desc:0 "尘埃落定之后，只有一件事是显而易见的：\n\n"
 agot_religion_events.3003.desc_attacker_won:0 "[defender.GetName]和[defender.GetHerHis]的队伍已被我的努力所击败！"
 agot_religion_events.3003.desc_attacker_lost:0 "[defender.GetName]和[defender.GetHerHis]的队伍成功拼出了胜利之路！"
 agot_religion_events.3003.desc_attacker_tie:0 "[defender.GetName]与我成为仪式中最后仅存的两位战士。我们必须通过战斗来决定仪式走向，从而决定战争结局！"
 agot_religion_events.3003.a:0 "[attacker.GetName]获胜！"
 agot_religion_events.3003.b:0 "[defender.GetName]获胜！"
 agot_religion_events.3003.a_single_combat:0 "是时候了结这件事了。"
 agot_religion_events.3003.a_single_combat_tt:0 "你和[defender.GetName]和[attacker.GetName]将以一场决斗决定战争的结局。"
 agot_religion_events.war_winner_defender:0 "[defender.GetName]战胜[war.GetName]"
 agot_religion_events.war_winner_attacker:0 "[attacker.GetName]战胜[war.GetName]"
 agot_religion_events_involved_in_ceremony_actor:0 "[actor.GetName]已经参与了另一场战争仪式"
 agot_religion_events_involved_in_ceremony_recipient:0 "[recipient.GetName]已经参与了另一场战争仪式"
 agot_religion_events.3005.t:0 "仪式化战斗：胜利"
 agot_religion_events.3005.desc:0 "我被[war.GetName]打败了。"
 agot_religion_events.3005.a:0 "好极了。"
 agot_religion_events.3006.t:0 "仪式化战斗：失败"
 agot_religion_events.3006.desc:0 "我被[war.GetName]打败了。"
 agot_religion_events.3006.a:0 "糟了。"
 agot_religion_events.3007.attacker_toast.t:0 "你针对[attacker.GetFirstNameNoTooltip]的仪式已作废"
 agot_religion_events.3007.defender_toast.t:0 "你针对[defender.GetFirstNameNoTooltip]的仪式已作废"
 agot_religion_events.3007.ceremony_invalidated.tt:0 "情势变化迫使你取消"