l_simp_chinese:
 agot_proclamation_it_succession_msg_inheritance:0 "“[player.GetLadyLord|U]，一封有着[new_holder.GetHouse.GetBaseName]家族印记的信从[new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]寄来；[previous_holder.GetTitledFirstName|U][previous_holder.GetDeathReason]——愿[previous_holder.GetSheHe]安息。\n\n根据继承法，[new_holder.GetFirstName]·[new_holder.GetHouse.GetBaseName]是[new_holder.GetPrimaryTitle.GetNameNoTooltip]的合法继承人。”"
 agot_proclamation_it_succession_msg_conquest:0 "“[player.GetLadyLord|U]，一封有着[new_holder.GetHouse.GetBaseName]家族印记的信从[new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]寄来；[new_holder.GetTitledFirstName]·[new_holder.GetHouse.GetBaseName]击溃了[previous_holder.GetFirstName]·[previous_holder.GetHouse.GetBaseName]的势力，征服了铁王座。”"
 agot_proclamation_it_succession_msg_abdication:0 "“[player.GetLadyLord|U]，一封有着[new_holder.GetHouse.GetBaseName]家族印记的信从[new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]寄来；在经过很多艰难的抉择后，国王[previous_holder.GetFirstNameRegnal]·[new_holder.GetHouse.GetBaseName]决定放弃统治权。于是，[new_holder.GetTitledFirstName]·[new_holder.GetHouse.GetBaseName]作为王国的继承人，已在铁王座上加冕成为七大王国的统治者。”"
 agot_proclamation_it_succession_msg_usurped:0 "“[player.GetLadyLord|U]，一封有着[new_holder.GetHouse.GetBaseName]家族印记的信从[new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]寄来；[new_holder.GetTitledFirstName]·[new_holder.GetHouse.GetBaseName]打败了[previous_holder.GetFirstName]·[previous_holder.GetHouse.GetBaseName]，并加冕为七大王国新的统治者。\n\n尽管可能有人会在背后称呼[new_holder.GetHerHim]为簒夺者，但不可否认的是，铁王座现在已牢牢地掌握在[new_holder.GetHerHis]手中。”"
 agot_proclamation_it_succession_msg_fallback:0 "“[player.GetLadyLord|U]，一封有着[new_holder.GetHouse.GetBaseName]家族印记的信从[new_holder.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]寄来；[new_holder.GetTitledFirstName]·[new_holder.GetHouse.GetBaseName]已宣布加冕为七大王国新的统治者。”"
 agot_proclamation_events.1000.t:0 "一个新的伟大家族"
 agot_proclamation_events.1000.desc_intro:0 "我向[Select_CString(king.IsFemale,'Queen','King')][king.GetFirstName]下跪宣誓效忠，接受[king.GetHerHim]授予的[kingdom_title_to_grant.GetName]头衔，以及对应领地的管辖权。\n\n"
 agot_proclamation_events.1000.desc.not_legitimate_house:0 "在新老臣属的注视下，我登上了家族史上从未有人企及的高位。一个崭新的伟大家族于我的领地之上崛起，威名将响彻四方。但质疑的流言仍在蔓延，仍有人对我的正统性怀有异议，毕竟我并非出身[legitimate_house.GetBaseName]家族。"
 agot_proclamation_events.1000.desc.legitimate_house:0 "在新老臣属的注视下，我收复了家族自古以来的领土，使伟大家族重归正统之位。我发誓要光耀先祖门楣，绝不让这份头衔再从我们手中旁落。"
 agot_proclamation_events.1000.a:0 "[new_holder.GetHouse.GetBaseNameNoTooltip]家族前途灿烂啊！"
 agot_proclamation_it_succession_msg_title:0 "铁王座的继任"