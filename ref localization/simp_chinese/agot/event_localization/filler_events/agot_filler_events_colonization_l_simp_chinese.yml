l_simp_chinese:
 agot_filler_colonization.0001.t:0 "[colony_province.GetNameNoTooltip]：松鼠"
 agot_filler_colonization.0001.desc:0 "在前往巡视我的垦殖地[colony_province.GetName]的途中，我和我的同伴在树林中停下来享用了一顿便餐。我发现自己陷入了沉思，思考着我的领地最近面临的挑战。突然，上方树枝中的沙沙声打破了我的沉思。在黑暗中，我花了一会儿才辨认出声音的来源——那是一只光滑的黑松鼠。\n\n它盯着我，我也盯着它。它那圆溜溜的眼睛让我觉得有些恶毒。"
 agot_filler_colonization.0001.a:0 "滚开，臭虫！"
 agot_filler_colonization.0001.a.success:0 "你躲开了空中飞鼠"
 agot_filler_colonization.0001.a.failure:0 "松鼠的爪子扎进了你的眼睛"
 agot_filler_colonization.0001.b:0 "来人！护驾！"
 agot_filler_colonization.0001.c:0 "可能没什么事。"
 agot_filler_colonization.0002.t:0 "[colony_province.GetNameNoTooltip]：白牡鹿"
 agot_filler_colonization.0002.desc:0 "我在[colony_province.GetName]殖民地附近盘根错节的林间小径侦察，惊叹于这片古老森林的茂密。树木生长得近乎干躯相偎，倒地枯木上绽放着荧光蘑菇，活树则被藤蔓与气根缠绕，覆满海藻般绵软的青苔与飘垂的地衣。空气中弥漫着上千种充满活力的生命气息和腐烂恶臭的气味。\n\n突然我看到了。一道天矛般刺破林冠的光柱中，赫然立着一只通体雪白的巨鹿，它那琥珀色的眼睛盯着我看了一会儿。\n\n然后，白鹿喷着一口气，纵身跃入小径深处。我的身后传来同伴们张弓搭弦的声响。"
 agot_filler_colonization.0002.a:0 "我将亲自猎杀那头牡鹿。！"
 agot_filler_colonization.0002.a.success:0 "你杀死了这动物"
 agot_filler_colonization.0002.a.failure:0 "这强壮的野兽在逃走前击败了你"
 agot_filler_colonization.0002.a.critical_failure:0 "你受了致命伤"
 agot_filler_colonization.0002.b:0 "快点，[martial_companion.GetFirstNameNoTooltip]，拿下它！"
 agot_filler_colonization.0002.b.success:0 "[martial_companion.GetSheHe|U]杀了这动物"
 agot_filler_colonization.0002.b.failure:0 "这强壮的野兽在逃走前击败了[martial_companion.GetHerHim]"
 agot_filler_colonization.0002.b.critical_failure:0 "[martial_companion.GetSheHe|U]受了致命伤"
 agot_filler_colonization.0002.c:0 "白牡鹿是神圣的，让它走吧。"
 agot_filler_colonization.0003.t:0 "[colony_province.GetNameNoTooltip]：艰难拓荒"
 agot_filler_colonization.0003.desc:0 "我终于抽出时间来视察我在[colony_province.GetName]的垦殖地。旅途漫长而疲惫，但抵达定居点后我的精神立刻振奋起来。我几乎可以闻到边疆精神的气味。\n\n这个垦殖地是一个充满活力的地方，斧头砍伐木头与锤子敲击铁砧的声音在山间回响，定居者的清亮的嗓音也是如此，他们在劳动时经常自发地唱歌。这些人志气高昂、精神饱满，我很荣幸能成为他们的领主。\n\n岩石高地不适合种植，我的垦殖者们报告说，他们迫切需要吃苦耐劳的绵羊和山羊品种来提供食物和毛皮。这块垦殖地出产可以用于贸易的金属和石头，但需要与行会达成协议，将垦殖地的产品运输到领地内的市场，以便交换牲畜。"
 agot_filler_colonization.0003.a:0 "我将亲自监督这份协议。"
 agot_filler_colonization.0003.a.success:0 "你为垦殖地达成了协议"
 agot_filler_colonization.0003.a.failure:0 "你未能替垦殖地达成协议"
 agot_filler_colonization.0003.b:0 "我的财政总管，[steward.GetFirstNameNoTooltip]，会处理此事。"
 agot_filler_colonization.0003.b.success:0 "[steward.GetFirstNameNoTooltip]为垦殖地达成了协议"
 agot_filler_colonization.0003.b.failure:0 "[steward.GetFirstNameNoTooltip]未能替垦殖地达成协议"
 agot_filler_colonization.0003.c:0 "我是[ROOT.Char.GetTitleAsNameNoTooltip]，不是车夫！你们自己想想办法吧……"
 agot_filler_colonization.0003.a.success.toast:0 "繁荣的垦殖地"
 agot_filler_colonization.0003.a.failure.toast:0 "苦苦挣扎的垦殖地"
 agot_filler_colonization.0003.a.critical_failure.toast:0 "垦殖失败"
 well_supplied_colony_county_modifier:0 "充足补给的垦殖地"
 well_supplied_colony_county_modifier_desc:0 "这个垦殖地从领地其他地方获得了充足的物资。"
 poorly_supplied_colony_county_modifier:0 "补给不足的垦殖地"
 poorly_supplied_colony_county_modifier_desc:0 "该殖民地难以从领地其他地区获取基本补给。"
 agot_filler_colonization.1001.t:0 "[colony_province.GetNameNoTooltip]：征集人手"
 agot_filler_colonization.1001.desc:0 "关于[colony_province.GetName]殖民地的发展状况，目前进展总体令人满意。先遣队已选定新定居点，基础议事厅、临时庇护所及仓储设施均已完成搭建。工具与粮食储备充足，足够满足前几年需求，牧场与耕地的开垦工作也在推进中。\n\n但[stewardship_companion.GetName]指出当前移民申请人数严重不足。为确保殖民地长期稳定发展，必须采取措施吸引更多定居者迁入。"
 agot_filler_colonization.1001.a:0 "派我的兵士去安置一些当地人……"
 maa_gathering_new_colonists_modifier:0 "征集人手"
 maa_gathering_new_colonists_modifier_desc:0 "该角色的兵士正忙于护送民众前往垦殖地。"
 agot_filler_colonization.1001.b:0 "我将出资补贴移居过来的技术工人。"
 agot_filler_colonization.1001.c:0 "我的[ROOT.Char.Custom('DefaultPriestTitlePlural')|U]应当向新定居者赐下来自[ROOT.Char.GetFaith.HighGodName]的祝福。"
 agot_filler_colonization.1002.t:0 "[colony_province.GetNameNoTooltip]：新生活"
 agot_filler_colonization.1002.desc:0 "关于[colony_province.GetName]垦殖地新机遇与投资的消息，已经跨越边界传到了邻近的[origin_county.GetNameNoTier]地区居民耳中。\n\n过去几周，越来越多的[migrant_culture.GetName]移民开始在我的新兴垦殖地出现，希望在我的庇护下开创新生活。\n\n他们无疑将为哨站提供急需的人力资源，但若放任自由涌入，不出一周这些移民的人数就会超过现有垦殖者！"
 agot_filler_colonization.1002.a:0 "在我的领地，勤劳的双手永远受欢迎……"
 agot_filler_colonization.1002.b:0 "命令当地民兵把这些移民驱散。"
 allowed_migrants_in_colony:0 "欢迎了寻求在垦殖地开始新生活的移民"
 forbade_migrants_in_colony:0 "拒绝了寻求在垦殖地开始新生活的移民"
 agot_filler_colonization.1003.t:0 "[colony_province.GetNameNoTooltip]：火焰"
 agot_filler_colonization.1003.desc:0 "我得到消息，[colony_province.GetName]垦殖地的大部分地区被一场大火烧毁，据说是由于一位过于热心的面包师造成的。所有的住所、仓库和粮仓都被烧成了灰烬。\n\n如果没有外部援助，饱受创伤的定居者将被迫放弃这片冒着烟的废墟，只有果断而立即的救援行动才能拯救这个垦殖地。\n\n一位悲痛的边境居民代表总结了火灾造成的全部损失，并恳请提供重建所需的资金。"
 agot_filler_colonization.1003.a:0 "给这些勇敢的人他们所需的黄金。"
 agot_filler_colonization.1003.b:0 "我将亲自监督垦殖地的建设。"
 agot_filler_colonization.1003.b.success:0 "维修工作高效且运行良好"
 agot_filler_colonization.1003.b.success.toast:0 "有效的修复"
 agot_filler_colonization.1003.b.failure:0 "维修工作既昂贵又耗时"
 agot_filler_colonization.1003.b.failure.toast:0 "耗费甚巨的修复"
 agot_filler_colonization.1003.c:0 "这种事时有发生。下次做面包小心点……"
 agot_filler_colonization.1003.c.failure.toast:0 "垦殖失败"
 agot_filler_colonization.1003.c.success.toast:0 "垦殖幸存"
 agot_filler_colonization.1004.t:0 "[colony_province.GetNameNoTooltip]：罪恶之巢"
 agot_filler_colonization.1004.desc.1:0 "我收到来自[ROOT.Char.Custom('DefaultPriestTitlePlural')|U]的紧急报告，称[colony_province.GetName]日益增长的殖民地人口正逐渐背弃[ROOT.Char.GetFaith.HighGodName]，过着罪恶的生活。\n\n"
 agot_filler_colonization.1004.desc.2.deceit:0 "据说该省份的居民已形成了一种欺诈与诡计横行的风气，诚实反被视为天真的表现。到访者极有可能被那些“精明”的当地人坑骗钱财，或是沦为恶作剧的受害者。这种风气甚至影响了我对当地的治理——我们根本无法确定地方精英呈交的报告究竟有几分可信！\n\n"
 agot_filler_colonization.1004.desc.2.chastity:0 "据说该省份盛行一种禁欲文化，人们为专注于工作与个人成长而摒弃肉体享乐。这对该省的长期稳定构成严重威胁——若长此以往，我们又该如何实现人口的稳定繁衍？\n\n"
 agot_filler_colonization.1004.desc.2.compassion:0 "据说该垦殖地的居民在边疆的生活方式中，逐渐信奉起一种共情怜悯之心。他们如今成了心软的傻瓜，无力做出必要的艰难抉择，只知浪费光阴哀叹他人遭遇的不幸！\n\n"
 agot_filler_colonization.1004.desc.3:0 "这种丑恶行径肯定会让我的人民感到恶心和厌恶，我必须认真考虑如何妥善应对。"
 agot_filler_colonization.1004.a:0 "我要严厉惩罚这些可恶的罪人！"
 persecuted_colonists_county_modifier:0 "受迫害的平民"
 persecuted_colonists_county_modifier_desc:0 "该伯爵领的人民正被迫认可领地信仰的道德性。"
 agot_filler_colonization.1004.b:0 "人皆有罪。边疆的人有点不正常的行为又何妨呢？"
 unpersecuted_colonists_county_modifier:0 "宗教自由"
 unpersecuted_colonists_county_modifier_desc:0 "该省份的人们已获许宗教宽容，并免受迫害之苦。"
 sided_with_sinners_modifier:0 "容忍罪人"
 sided_with_sinners_modifier_desc:0 "该角色对其领地内的罪恶行径视而不见。"
 agot_filler_colonization.1004.c:0 "我不知道，或许他们察觉到了些什么……"
 agot_filler_colonization.1005.t:0 "[colony_province.GetNameNoTooltip]：官匪勾结"
 agot_filler_colonization.1005.desc:0 "我收到了来自[colony_province.GetName]定居点的令人不安的报告。该地区的税收虽然缓慢但持续下降，与此同时，盗匪活动日益猖獗，原本运往定居点的物资经常遭到抢劫，然后通过非法渠道出售。\n\n有传言说，我任命的地方总督[governor.GetFirstName]与盗贼勾结，收受赃物，并掩盖他们的罪行。\n\n但[governor.GetFirstNameNoTooltip]诡计多端，[governor.GetHerHis]的行踪隐藏得很深。我需要谨慎而精确地采取行动……"
 agot_filler_colonization.1005.a:0 "何等难堪！在[governor.GetSheHe]造成进一步危害前革了[governor.GetHerHim]的职。"
 agot_filler_colonization.1005.a.tt:0 "[governor.GetFirstNameNoTooltip]被剥夺了长官的职务"
 agot_filler_colonization.1005.b:0 "也许我能直接让问题根源消失……"
 agot_filler_colonization.1005.b.success:0 "你的卧底暗杀成功"
 agot_filler_colonization.1005.b.success.toast:0 "卧底暗杀成功"
 agot_filler_colonization.1005.b.failure:0 "你的卧底被当场抓获"
 agot_filler_colonization.1005.b.failure.toast:0 "卧底暗杀失败"
 corrupt_governor_county_modifier:0 "腐败的官员"
 corrupt_governor_county_modifier_desc:0 "该伯爵领在当地长官的腐败治理下匪患横行。"
 agot_filler_colonization.1005.c:0 "只要[governor.GetSheHe]肯分我一份，我可以睁一只眼闭一只眼。"
 unofficial_income_modifier:0 "非正规收入"
 unofficial_income_modifier_desc:0 "该角色通过不正当手段获得了一笔收入。"
 agot_filler_colonization.1006.t:0 "[colony_province.GetNameNoTooltip]：垦殖地仇怨"
 agot_filler_colonization.1006.desc:0 "我的顾问们要求我介入[colony_province.GetName]新殖民地的地方领导人之间正在发生的争端，争论的焦点是他们定居点未来的发展方向。\n\n[merchant.GetFirstName]是该地区一位著名的商人，他认为应该将他们的资金重新投入到发展当地商业和改善与其他市场的通道上，以提高当地人民的繁荣程度。\n\n与此同时，当地民兵的首领[militia.GetFirstName]认为，应该将投资用于加强军事力量，以捍卫殖民地的利益。\n\n局势陷入僵局，他们希望我来解决这场争端。我做出的决定可能会影响该地区未来几年的发展方向……"
 agot_filler_colonization.1006.a:0 "没有精兵强将，我们只能任人宰割。"
 agot_filler_colonization.1006.b:0 "强劲的经济将惠及所有人。"
 agot_filler_colonization.1006.c:0 "肯定能找到折衷的方案？"
 agot_filler_colonization.1006.c.success:0 "你成功磋商成了妥协"
 agot_filler_colonization.1006.c.success.toast:0 "实现妥协"
 agot_filler_colonization.1006.c.failure:0 "你没能想出可行的方案"
 agot_filler_colonization.1006.c.failure.toast:0 "当地派系夺权"
 military_colony_county_modifier:0 "军事前哨"
 military_colony_county_modifier_desc:0 "该省份近期的发展一直由地方民兵主导，其将重心置于军事力量之上，却以牺牲本地经济为代价。"
 merchant_colony_county_modifier:0 "商业前哨"
 merchant_colony_county_modifier_desc:0 "该省份近期的发展一直由本地商人主导，他们注重经济实力，却以牺牲地方民兵为代价。"
 harmonious_colony_county_modifier:0 "有效领导"
 harmonious_colony_county_modifier_desc:0 "该省份内各竞争派系已达成妥协，开始有效协同合作以壮大郡的实力。"
 agot_filler_colonization.1007.t:0 "[colony_province.GetNameNoTooltip]：抵制活动"
 agot_filler_colonization.1007.desc.1.steward:0 "我的财政总管，"
 agot_filler_colonization.1007.desc.1.advisor:0 "我的顾问，"
 agot_filler_colonization.1007.desc.2:0 "[steward.GetFirstName]敲响我的房门，脸色比平时更加阴沉。[steward.GetSheHe|U]今天与商会艰难谈判却毫无成果，此刻显得疲惫又沮丧。\n\n“为什么每次商会的人聚在一起，都像是密谋与人民作对？他们抱怨通往[colony_province.GetName]殖民地的商路税收太高，还威胁要抵制当地生产的所有货物。现在扼杀殖民地经济，等于在它诞生之初就掐断生机。我已尽力劝说，但毫无效果……恐怕需要您亲自出面干预了……”\n\n听到这个消息，我和[steward.GetHerHis]同样感到恼火。为什么我们的命脉要被这群贪婪的商会成员左右？必须采取果断措施解决此事。"
 agot_filler_colonization.1007.a:0 "也许暂时的减税会让他们满意？"
 reduced_taxes_on_guilds_modifier:0 "减税"
 reduced_taxes_on_guilds_modifier_desc:0 "该角色暂时降低了对商会的征税以换取他们的合作。"
 agot_filler_colonization.1007.b:0 "我确信我们能在达成某种共识……"
 agot_filler_colonization.1007.b.success:0 "你同意了出售殖民地股份的协议"
 agot_filler_colonization.1007.b.success.toast:0 "成功的协议"
 agot_filler_colonization.1007.b.failure:0 "你没能拟出一份诱人的协议"
 agot_filler_colonization.1007.b.failure.toast:0 "失败的协议"
 agot_filler_colonization.1007.c:0 "是时候对这些唯利是图的家伙展示一点权威了！"
 increased_taxes_on_guilds_modifier:0 "增加税收"
 increased_taxes_on_guilds_modifier_desc:0 "该角色暂时提高了税收以向商会施压。"
 agot_filler_colonization.1007.c.success.toast:0 "商会让步了"
 agot_filler_colonization.1007.c.failure.toast:0 "商会施压殖民地"
 agot_filler_colonization.1007.c.critical_failure.toast:0 "垦殖失败"
 agot_filler_colonization.1008.t:0 "[colony_province.GetNameNoTooltip]：瘟疫"
 agot_filler_colonization.1008.desc:0 "从[colony_province.GetName]传来的最新消息令人毛骨悚然。一场毁灭性的瘟疫席卷了几乎每户人家，定居者们正遭受着非人的折磨。报告中的细节描述之惨烈，我几乎无法卒读。\n\n这种疫病始于高烧和无法抑制的干渴——有村民在疯狂饮水时竟内脏爆裂而亡。随后全身关节处会隆起巨大的黑色肿块，渗出恶臭黄脓，使患者完全丧失行动能力。到最后阶段肿块虽会消退，但受难者面部会出现地狱般的疹斑，其痛楚之剧烈甚至有人自挖双目、撕扯耳鼻以求缓解。多数人在经历脊椎断裂般的最终痉挛后痛苦离世。\n\n若想挽救殖民地，必须立即采取行动！"
 agot_filler_colonization.1008.a:0 "封锁殖民地——任何人不得离开！我绝不能任其蔓延！"
 agot_filler_colonization.1008.a.success.toast:0 "垦殖地获救"
 agot_filler_colonization.1008.a.failure.toast:0 "垦殖失败"
 agot_filler_colonization.1008.b:0 "我将派遣精于此道的医者前往施救。"
 agot_filler_colonization.1008.c:0 "这些可怜的人啊……速将病患移送至[capital.GetNameNoTier]施以全力救治！"
 agot_filler_colonization.1008.c.tt.outbreak:0 "[courtiers|E]和[guests|E]可能染上[GetTrait('bubonic_plague').GetName( GetNullCharacter )]"
 agot_filler_colonization.1008.c.outbreak.toast:0 "瘟疫蔓延"
 colony_disease_recovery_county_modifier:0 "疫病爆发"
 colony_disease_recovery_county_modifier_desc:0 "该省份的人们正从最近爆发的瘟疫恢复过来。"
 agot_filler_colonization.1009.t:0 "[colony_province.GetNameNoTooltip]：勘探"
 agot_filler_colonization.1009.desc.1.steward:0 "我的财政总管，"
 agot_filler_colonization.1009.desc.1.advisor:0 "我的顾问，"
 agot_filler_colonization.1009.desc.2:0 "[steward.GetFirstName]满面笑容地走进我的大厅。或许，[steward.GetSheHe]终于能带来些好消息了……\n\n“尊敬的[ROOT.Char.GetTitleAsNameNoTooltip]，我收到了来自[colony_province.GetName]殖民者的好消息！在[mineral_province.GetName]高地搜寻匪徒时，其中一人在一处裸露的岩石上发现了一条富含珍贵矿物的矿脉。定居者们现在对未来财富的憧憬兴奋不已，并恳求您组织一次对这片土地的勘察。”\n\n虽然这需要一笔初始投资，但如果他们真的发现了一个重要的矿床，它可能会在未来很多年里带来财富"
 agot_filler_colonization.1009.a:0 "立即授权勘探[mineral_province.GetNameNoTooltip]！"
 rich_mineral_deposit_province_modifier:0 "发现丰富的矿物"
 rich_mineral_deposit_province_modifier_desc:0 "在该省发现了一个大型且丰富的矿床。"
 mineral_deposit_province_modifier:0 "矿藏"
 mineral_deposit_province_modifier_desc:0 "在该省发现了一个矿床。"
 agot_filler_colonization.1009.a.critical_success.toast:0 "发现丰富的矿藏"
 agot_filler_colonization.1009.a.success.toast:0 "发现小型矿藏"
 agot_filler_colonization.1009.a.failure.toast:0 "未发现矿藏"
 agot_filler_colonization.1009.b:0 "听起来像是在浪费金子……"
 agot_filler_colonization.1010.t:0 "[colony_province.GetNameNoTooltip]：狼群威胁"
 agot_filler_colonization.1010.desc:0 "随着移民涌入[colony_province.GetName]，他们的各类放牧牲畜——主要是绵羊，也包括其他牲畜——也随之而来。然而这些散养畜群的迁徙似乎引来了另一些不速之客……\n\n丰沛且缺乏防护的新猎物，使得省内狼群数量激增。\n\n尽管尚未发生袭击定居者的事件，但牲畜失踪的投诉接连不断，这不仅危及移民的经济来源，也威胁着重要的食物供给。\n\n我必须尽快解决这个问题，否则新建的殖民地恐将难以为继。"
 agot_filler_colonization.1010.a:0 "该死的恶狼！"
 agot_filler_colonization.1011.t:0 "[colony_province.GetNameNoTooltip]：土匪之国"
 agot_filler_colonization.1011.desc:0 "在[colony_province.GetName]的蛮荒边疆，我的统治权威极为薄弱。这里的基础设施极其有限，主要用于维持殖民地的基本运转。正因如此，许多臭名昭著的恶徒常以假名潜逃至此，躲避法律制裁与过往罪行的惩罚。\n\n这些自称“自由民”的人过着不受约束的生活，表面看似浪漫不羁，实则不过是个虚幻的幌子，掩盖着他们的卑劣行径与残忍暴行。\n\n边疆往往成为强盗与恶棍的庇护所，这片土地同样未能幸免。"
 agot_filler_colonization.1011.a:0 "那些一无是处的强盗！"
 agot_filler_colonization.1012.t:0 "[colony_province.GetNameNoTooltip]：自治请求"
 agot_filler_colonization.1012.desc:0 "自[colony_province.GetName]的定居点建立以来，已经过去了一段时间。殖民地的初步报告是积极的，工作进展顺利。\n\n定居点的下一份报告由[colonist.GetFirstName]递交，[colonist.GetSheHe]被选为殖民者的代表。“尊敬的[ROOT.Char.GetTitleAsNameNoTooltip]，我和我的定居者同伴们前来向您请求自治，”[colonist.GetSheHe]出乎我意料地说道。“我们努力工作，提前完成了目标——如此勤奋理应得到奖赏，您不觉得吗？”\n\n我资助的殖民地竟然大胆地要求半独立，这着实出人意料。但另一方面，答应他们的请求或许能带来互惠互利……"
 agot_filler_colonization.1012.tt:0 "[colony_province.GetNameNoTooltip]的垦殖完成了"
 agot_filler_colonization.1012.a:0 "行吧。向我上贡，而后你们可以自行其是。"
 agot_filler_colonization.1012.b:0 "做我的附庸吧，我会公平对待你，给予你保护。"
 agot_filler_colonization.1012.b.tt:0 "你试图说服[colonist.GetFirstNameNoTooltip]继续做你的附庸"
 agot_filler_colonization.1012.b.success:0 "成功——[colonist.GetFirstNameNoTooltip]宣誓忠诚"
 agot_filler_colonization.1012.b.failure:0 "失败——开拓者拒绝你的权威"
 agot_filler_colonization.1012.c:0 "[colony_province.GetNameNoTooltip]的统治权属于我，而非他人！"
 agot_filler_colonization.1012.c.success:0 "你逮捕了[colonist.GetFirstNameNoTooltip]，安抚了[colony_province.GetNameNoTooltip]"
 agot_filler_colonization.1012.c.failure:0 "[colonist.GetFirstNameNoTooltip]逃脱了你的追捕"
 agot_filler_colonization.1013.t:0 "[colony_province.GetNameNoTooltip]：惊人进展"
 agot_filler_colonization.1013.desc:0 "[colony_province.GetName]定居点的最新进展报告已经送达。当我开始审阅这些报告时，很明显，工人们取得了惊人的进展，实际上已经远远提前完成了殖民地的建设！\n\n这意味着[colony_province.GetName]的据点已经建成，这既有运气的成分，也因为没有受到周围荒野的干扰。\n\n对[ROOT.Char.GetPrimaryTitle.GetName]来说，这真是个好日子！"
 agot_filler_colonization.1013.a:0 "好消息啊！"
 agot_filler_colonization.1013.a.tt:0 "[colony_province.GetName]的垦殖完成了"
 agot_filler_colonization.1014.t:0 "[colony_province.GetNameNoTooltip]：异端崛起"
 agot_filler_colonization.1014.desc:0 "我收到一封来自[colony_province.GetName]定居点的密封信件，由当地领袖之一[heretic_colonist.GetFirstName]寄出。信中称，定居点的建设进度比预期更快，但工人们竟开始信奉[heretical_faith.GetName]的信仰！\n\n尽管定居点意外的进展本该让我欣喜，但这种信仰分歧已不容忽视。若放任这种异端思想蔓延，或是立刻将其铲除——我必须做出抉择。"
 agot_filler_colonization.1014.tt:0 "[colony_province.GetName]的垦殖完成了"
 agot_filler_colonization.1014.a:0 "他们做得很好。我将允许他们的异端信仰。"
 agot_filler_colonization.1014.b:0 "他们怎敢偏离正信？"
 agot_filler_colonization.1014.b.tt:0 "你尝试逮捕叛教者"
 agot_filler_colonization.1014.b.success:0 "你抓住了异端头目"
 agot_filler_colonization.1014.b.failure:0 "[heretic_colonist.GetFirstName]溜走了"
 agot_filler_colonization.1014.b.failure.tt:0 "被激怒的垦殖者宣布独立"
 agot_filler_colonization.1014.c:0 "也许我们可以做出妥协？"
 agot_filler_colonization.1014.c.tt:0 "你试图说服开拓者摒弃异端信仰"
 agot_filler_colonization.1014.c.success:0 "你说服了开拓者"
 agot_filler_colonization.1014.c.failure:0 "你的话一点用也没有"